body:
  text: 明文海卷一餘姚黃宗羲編賦一國事一南都賦桑悅南都有博古先生同州邑秀先遊於北都乃觀氣象之恢亢恢亢大貌楚辭收恢台之孟夏民物之遒堶徒和切多也神莽莽兮外淫意惶惶兮儷􅀈音哦癡也獨先生􅟌極凌碎矜才貌見于荀子浪驚旋拖不以為意也見文中子北都有知今子者其足如雲其辨如波揖先生而扣焉天下一家四海一都而子眺焉若蔑若眇匪夡音棄匪􅀈音那豈離渤澥别淔灘汙豈逺太華别覩嵯峨何其齒迎齒而不淟心戴心而自詑音他欺也先生曰蔑蘭衷者嚇微馨眇絲裏者景纎䰃音彭僕嘗熟班孟堅之兩都張子平之二京丹淵罪罪音罪深貌收長安之市中扄㺒㺒音佼大貌築洛陽之城寧不視此而消零知今子􅋟然而笑曰味子之言班􅀢於井切硃砂痕殷翡翠易牙之味子聞而飽儀狄之酒子慕而醉耶先生曰是誠不然僕自麗髦作適金陵偉哉若方王業攸興計南惟棟計北惟楹豈彼衍宛而子彯訇吾將語子以南都之故事以開子之聾盲焉知今子曰願卒鴻麗以拓酣𡨕先生曰唯唯明之南都宿分於斗畿域於揚斗則日月之所佉邱伽切㧙五星之所乘營是謂天維揚則拓土畫疆卓犖兼并是謂地綱論大形勢桐柏之源東馳般泊揖濁灔而招沂泗者於此乎會岷山之支東纍綿衍出庾嶺而包彭蠡者於此乎盡誠江海之都會也山林之總轄也而况口以三吳足以荆蜀八閩二廣可伸可縮堪輿之精盡於是矣論細藩屏則天設雄塹表以鍾山裼以長江山則掩譎崔聳靘千定切歜音觸峻翔裘坱碖音倫盎尖台嵬亢嶻嶫墳兀追飛廉蕩漾兮黨黨晦兮墇墇音章氣雲薄兮擬封秀􅵪職隆切挹兮可掆江則膠戾㿮音英毅砰湧便汪丕庨音梢澒溢湉音恬混澶泱漨瀴溶瀆洚洞㴐莫見切巟音荒濞兮格格允兮統統音康喜沄沄兮穆協怒趫趫兮讎闛音堂均山惟榆丕江乃桑如韓孟之齊騁類楚漢之相當挾以石頭秦望之蔓麗帶以後湖玄武之汪洋嶺一頡兮千熊羆浪一頏兮幾城隍欲纎摹其詭異洵一挂而萬亡其洞則有華陽玉柱良常羅姑若女天窗夫子酆都各有真府神切天砮音奴門􅀈􅀈音楚兮混沌未鑿室䧓䧓音周兮氣化馴刳丹崖甲乎連欐翠壁貫乎稜觚或有三茅之輩拉八仙之徒駕野馬之駕提沆瀣之壺殽以青埃核以火㯛音壺窮年縱浪竟夕歡娛三霜半局千日一餔推霛明之真境合仙迹之盤􅂒音姑其泉則有白乳一人玉喜客婁地籟之于于垂天紳之默默斂川后之津液葘山霛之骨脈雨似嘲而囂囂風或譽而嘖嘖潤止闕方名闕蠻貊其池則有覆杯石墨天淵蓮花昔人留兮指爪朽名潤兮無涯又有隄名太平堰名余家瀨名投金泓名丹砂義溝破岡瀆深澤沛長命新林芳洲名葩九曲霹靂溝何浙粲芳草躍馬澗何清華於是材以梆音邦榮竹柏枇槵胡慣切樳棈桅俱彼切松檔音當椋檯㯆椐柳平仲古度無疵文楟莫不抱遒紛溶槮音森苯較庭肅祅音夭偃梏魁􅂒音會剡弸綿枔音尋暖杈音差飛柯鬬莖風度曲而雨亂亂者樂之卒章言風度木似曲雨至而止月稿神而日呈神即傳神之神門有拔闕上薄青冥天低獨擎雲墜孤撑未回萬牛之力隂具五鳳之形言作五鳯樓之材也華以幽蘭崇蕙徑菊江蘺牡丹玉蘭香蔤華筆切辛夷忘憂赫呼歷切茀含笑嫋姕音雌絶品節蒲上瑞莖芝氣㽔曄以交獵采葉蒨以紛披零的昌於騷經布濩榮於毛詩實以朱橘赤柿娉粟含桃枇杷林擒楊梅蒲萄匹火齊之丹若鄰鍾乳之紅消特可包乎公匭具可養乎私叨水陸之饒萬育愲音汩娗音停其鳥則有鸛鶴鷺鷗鳬鵲舒鴒鴂䲹鴶鵴􅀈鵝鵁鶄剖葦竊脂隼醜蒼鶊雜縣音懸避風而爰集鴻雁隨陽以迅征暴道體之潑潑假天和而嚶嚶其獸則有鹿麋麟嬎音泛豵貘熊驉豺麕羠音夷狒犢狪音聰羭􅀈㹹音庚􅀈音當猓音果獁音馬虎獖􅓔隱霧之豹拜月之狐叢生翳伏狀異形殊伯益不能紀周公難悉驅其魚則有鰋鯉鱨鯊鰤音師􅀈音讐䱾音婁䱎公登切鱣􅀈音呼鯧鰣鯽鮚䱵䱓他成切鱸魴􅥸鮒鰱􅱆鱒慈損切􅀈音擎莫不風鰭浪鬛金鱗玉睛出罭欲飛宜膾宜烹别有龍淵湧湧蜃穴圊圊浮沉乎王鮪隱耀乎長鯨能吞巨舟可方曲陵匪漏籍於齊諧則繫名於海經又其田疇則黍稌咸宜桑柘斯植水耕火耘風經雨織一犁鬑鬑力兼切兮斛粟半筐䌨䌨兮尺帛真中華之心而四方之極者也遂古之時萬有未聚帝省山川可為皇據惟古帝王或命以陶或命於牧惟豐惟鎬文武是屋儲兹地髓以俟天牧周轍既西王氣微暴悵地勢之䒎䒎音莽兮風氣鼆鼆毋耿切而未開罔曣曣音宴以慘栗兮挈攰攰音愧而慨賅􅜜音費岑岑以闌掔烏貫切兮若草變而木衰匪􅀢伸之轟轟兮安淵蟄之匪才自罔曣曣以下形容上古之時金陵氣象未開之狀以為天遣吳晉等國為當時漸次開闢之地文有起伏意思絶妙今古於是役吳載柞命晉其耘宋齊為畚梁陳為斤其建金華赤烏玉燭重雲太極清暑之俵麗結綺永安之青􅀈地昆切孰非先掃我金門之路清吾玉殿之塵也哉如此言則吳晉等國建都雖在開國之先而非先矣詩云禹敷下土方外大國是強幅員既長有娀方將帝立子生商與此意同逮元脫紐宇宙沸􅜙如羊切閃兹地也鬱鬱蔥蔥暐暐煌煌增渥補泊衒紫浮緗虹經襊秦醉切彩雲緯成章􅣆音航兮若燭龍之焰􅀈音宏兮類若木之光蕩踞虎而將躩暈盤龍而欲翔龍盤虎踞金陵山川氣象暈蕩從王氣上説來其在山也谾音空谷就實危峰增鋩曄乎若巢金之欲彰其在水也漫泛氤氲逐㲹音已煒揚灝乎若頽波之㺯西陽自鬱鬱蔥蔥至此形容興王氣象極工禆竈瞻望而躑躅景純睥睨而周章非名都之將建而先發其祥耶時已天眷仁祖爰及陳后夢歆藥食覺聞蘭臭聖祖降天匪先匪後想遏亂略躬揮天胄音胄遐望其飈馳尼幸其雲覆翶翔太平宿徴斯簉江東攸歸兩浙既庭爰承天意兹焉作京乃殪友諒乃縛士誠乃走擴廓乃降明升龜蛇指乎迷周顛相乎成雖真宰之駐意抑非兹都之運霛也哉四方既平根本攸寧乃瞻觜陬百度惟營庸遵九重之規步九筵之迹太行空蜀山兀艋泛筏結異材山積於是伯尚呈能王爾獻績肇以承天之巢兌粹以敬身之棧斥迤以華蓋之崖晢畫以文華之葘洫武英斜峙白虎旁翼其為狀也莫不獵韚􅀢音梢昻熛霍照焱剡兮烑烑音搖龎莫江切兮齸齸音益杗瘤􅀢宏而孔毅髙桴硜矼而委迪危甍垶音新潭而鼓鬛曲閞音辨夭矯而軒翼枝牚耻孟切承宇綺疏垂閾表以翬梲賁以蜃壁有負柱之金龍火精閃而爍赩乘栭雲之拶宗滑切􅤳音逐爪拲居六切墳而上攫覩螺蓋之白黑倐退藏而躅躑飾以桁梧萬層盤紆􅛢音律圛音繹雕縷育育藻以髹音休漆俶視昭昭指歷歷閃􅀈分􅀈色交色輝奔彩赴丹輳緑易形容彩色奪目之狀極其精工雖離朱之斜視猶恍惚而箝眻音釋左順揖乎右順左掖拱乎右掖承天垠垠春和翼翼諸監六科之郁麗尚寶光祿之􅀈䟮音北億萬門堂拱闕惟敇索巧本於無無庸乾坤以為式蓋憲衆山之朝王屋列宿之拱北極也至若文武雙樓峙天西東表層俯雲輪廓翳空購解飛而莫緣兮藉凌級以相通漢書王莽購解飛人以窺丐奴凌級樓梯也繚朱闌而升降兮辟擫於頰切捻乎雄虹彼黃鵠翩翩其髙舉兮覩圜方之會同觸縹眇之罘罳兮仍斂翼而退風惟趙趟竹萌切之黠雀兮飛息參而馴嵩還處所不訌音洪惕兮遂委巢於攢叢鞠翲翲之黃口兮終身瞽乎四通俯璀錯為旁礴兮仰﨑嶬為蒼穹匪壯麗之若斯安匹休乎薇宫長廡埢埢音拳短序敷敷音敷敦以密石蔡雍獨斷天子所居加密石切以碔玞鎔朱提之鐐以節鎖煆化盂之鏐而鑭鋪萬户無名造化為徒色暴於有聲藏於無我吐微音彼應長吁四句觀理之至立言之精足趨魂悸吾亦喪吾諒妙理之所存非華説之足摹東立太廟岧岧奕奕桔崛殿乎重屋欒踡延兮夾室宰有亭而蔭牲焚有穴而置帛永言孝思孝思維則不得不斫其桷而隆其閾也耽耽六宮衍息聖躬表以乾清之盧蕩偶以坤寧之傑幪環居成市委巷成同深壼溺溺連簃彤彤蕃椒辣辣即逹切夜合芄芄方其胎營集刻飛鳶之手公輸子刻木作飛鳶三日飛不止見王充論衡召膠遊魚之工穆王時巧匠膠魚能遊見列子殫心思於其中排亮寮以開闔縷網眢之玲瓏裝以衆彩蒙以輕容紗也縜音雲兮若細颸之噴巨波漾漣漪之瀰雍拂波膩以潎孚妙切刪露水簇之􅀈奴孔切穠渟兮若山澗之雜茁深清泉而上蒙雖剽視之的的欲採擷而無從作遊千間奎麗鎈相何切台繪百卉之䔿俞兮儼憲英之樔荽神貫英而藉越兮化真芬之批楑音葵雄風衎衎以碭駭兮舉茀烈而薰幃憬東皇之旋駕兮姿冉冉而焜衰踏雙成與仙姑兮面金精而炘綏自繪百卉以下形容畫者通神故所畫之花遇風亦生香春去亦如漸衰因踏仙人故至秋亦不落也妙甚真妙鬼神者彼翠禽之自戕兮聚彥鑿以文阫委順膠而騰變兮幻林麓之垣崔顯真相於木杪兮仍翠翎之毰毸娛無隄之妙觀兮忽不自知其徘徊富有會極則有大內千間嶵嶷詭迣音列鸞彝媚垂鳯卣宛臲音蘖隋珠如月趙璧如雪桃核之洪魁鵬羽之修撇山車之剽竒昭華之英契其他方貢域獻萬寶充楶滿花回回羚角桀桀方諸夜涼朝霞春熱阿魏之腥金顔之馝音别雖夥蘊紛藏無識無别然察其性質之隂陽贅房而攢掜音蘖則又若隂配合而默調燮者也合祀天地乃建瑶宮崛大祀之𣏑子了切髞先到切兮庇瑶瓦之青蔥輸頎鋩而遊氛遞兮上混匪音非乎浮容地遊升階其洪質兮天氣降郵其危嵏翼嵩壇之忤忤兮祈光峙流而合縱山川社稷帝王功臣茹膚功而答稱兮揭壇宇之纚所宜切峋舉幽遐而遍溫兮冀孚召乎輒敐音辰舜為天子民皆輒輒敐敐見于呂氏春秋間以崇墉百里覃以通門六五偉正陽與聚寶尤碞音吟潭而晊音質昈音扈欲昻脰而瞻際覺清矑之􅀈􅀈武破蟄而起靂自榮神之栗股車岺岺以瀿瀷馬霅霅音狎以黎楚或槅音鬲相轚古的切蹄相互求疾而滯旋往無所於是嘫音然閧嘵嗑音盍跖咽旁午不啻萬艘麗閘而踶瀾六師奔敵而喪伍必踰時而後詹憮焉久喁噞於沓圍徐戞戞以脫𦋡音武泮奐其行適大通而遃遃者何可勝數又可喻造物者之不齊而莫能必漆途之夷阻也自喁噞以下就彀率中别出一種道理是謂忙中取靜斫輪之意人所難學部院寺司雲填星稠公卿惟旌郎吏惟斿爾楫我桴厥職孔修敦以京兆驕民是牧我精雕桐李子長雕梧桐以服囚見王充論衡彼畏刻木置葦杖以塵封曠圜扉而草緑主以太學英髦斯育言采其芹于彼泮瀑瑩如席珍者濟濟湛若飣梨者煴煴悉小杏園之樂而踵槐氏之躅蓋將撥流泆之風而反敦龎之俗也罔修罔攘軍容洸洸神䇿豹韜興武龍驤應天留守橫海和洋衛所如林五府提綱億萬赳赳斟𨽻為鄉舅甥兄弟羂古犬切結同疆唲呱含䯱音丕髵音而之色奕攸弮音眷邪音邪觚之剛喜則鉠鉠怒則礓礓聚兮摯摯動兮彭彭奮齦齗而淫閧鼓龍胡而􅑧囂五臯切其將大閲也聞發昫休具切之綿匝發昫閲軍鼓見周禮注引司馬法齊􅡫作結切髽音撾而峭格樅楚江切以行伍􅀈音翰以壘壁綏回回其􅱏力隄切􅵚音收兮剡殷殷其䡾魚竭切轢混枚枚其攢哲知列切兮庢音只皇皇其劙劃衆闞既尼浰力見切然而洫總戎司馬指揮退迪篥鐲蒸蒸其鴻葛兮旌旄肅肅其揄扐斯時夏説専諸之流方援龍泉以揮霍鍥雞嗚以摮音遨躍盤旋倩倩低昻畟畟援刺雲而劼劼臘奏空而騞騞大麥切心霸霸以橫騖兮神淫淫於邉場九貉八蠻孔淑不逆負畫石之隂謀兮蓄鬬神之餘力仰蒼昊而悲吒兮化蠛蒙之紛㥶音塞百步之外樹以正的烏號下嚼子召切忘歸承的搖撓視豐鴻之節鋌地頂切垸音完斟翔躁之則蕭臂參停沓寓惟直巧能中蝨力能貫石百中焉獲獲呼嘖嘖環以逼頸圍以綘額紓隆隆殺抑抑峙兀兀流奕奕重矛如式三屬如滌既蛇勢之裊裊兮復魚貫之繹繹正綿綿而不亂兮竒廉廉而罔測轟巨炮而散列兮氣方突而未􅓈音劇對勇間間徒手搏􅀈古柏切撥局齊竪提矞休筆切復逆僉思奪終童之纓遺孔明之幗悵百年之偃息而老死于軍籍又可見我朝治平之綿遐而千古莫敵也大江之中爰集水戰黃龍青雀萬艘蔓莚音硯化波為原平集組練闌衛如墉朱牌上碾止類攢蜂行超飛燕佩橫磨之陸離兮摘神機之爝炫馬銜御濤而觖徙兮竒相駕波而惕絢折兀术金山猶枝揮曹瞞赤壁若扇實江南之長技眇四海之激漩别設錦衣以伺姦叨漇以撫軍天憲橫操官配祝融薰嶽燀濤旗校如雲滑栗憍勦音巢取醒龍之珠拔過雁之毛疑箵為罝兮意旌為翢音陶聆浙瀝而掩雨兮聽颯颾而補濤形容錦衣旗校緝事精神態度如畫淑良翼其奎桓兮壬慝曀其翔翶清九陌之遊塵覺六街之肅䫜音坳守備之厰中官是府朔望會評冠蓋如堵水陸産鮮饗之皇祖獻之聖母則命代以行自刪其楛音苦畫船如櫛爛爚江滸錦纜牙檣銀笳銅鼓鈴之揚兮中流水增波兮雲橫闕􅧓􅧓兮纎風棹忽艤兮南浦鑒乾遞兮鑣楚馳訇沄兮代烽火雖抵扡扡音唾兮猶原瑛而化琥惟簿正之當然非尤物之為蠱抽億指以役役亦不知水煙之稀夃音古至若竇王之家金許之族連姻天室密邇輦轂則有朱户庨呼交切頑外􅀈音怠行鹿日食萬錢之俸月饗千鍾之祿墻壁衣文繡犬馬厭梁肉蒒卞收其神劍張毅趨其懸箔梁鴦職其禽鳥郭駝理其花木咸鐘鳴而鼎食蔭渠渠之夏屋壁鋪帓帓莫轄切其彪粲兮地衣摵摵其繁縟履綦俍俍音良其盤辟兮桂霏油油其芬馥公子王孫戴瑟頂之帽衣浪紋之服牽黃臂蒼言駕騏騄挾彈從禽勍勍睩睩遵四望兮徘徊欵牛首以彳于浩氣沴乎朱虛英風偃乎段叔內有信陵之儔田文之屬傾身下士肝膽相續曳𥚑彈劒撫袂而至者蛩蛩顣顣音促滿浮白兮賔𡨕落眼光兮自燭餞飛英兮度新曲送春歸兮水􅠵音掬振􅀢􅀢音落兮停雲鼓繁絃兮相逐主毋大怠賔忘小頊蓋指長簜以儲慶揖瓜埠而壘福畀衆無窮樂已不足而不知悉祖宗逐群雄之血刃集四方之膏鏃也墉之內外樓居如雲亂榮劖初咸切義長櫩睘睘音瓊數里齵音鈎耞音加卬罧音森齫以蔭行兮逺不見其罛音呼􅏠音誇蓱翳去其浥沛兮羲和失其赫赮音霞巷千同百靡砌容碬音遐捆絲之工捲焉如麻法五方以翟色代東皇而賦花耀光皉皉且禮切兮掩雪耀光綾名見晉書玉錦爓爓兮鑂霞玉錦錦之細者見周禮灑削追針之户販脂礪寶之家各閃尸以逎術聫鳴雞而昏鴉以至斗門淮清之橋三山大中之街烏倮白圭之儔駢背項兮交加日中貿易閧閧吒吒雲間之布雅安之茶吳會玉柵之燈勾漏石牀之砂翠聚瓊臺之館麯連淮隂之車萬貨各離其鄉土何聚會之紛拏反兮如潮之汗漫覆兮類汐之榮查來無趾兮得得散無聲兮奓奓莊加切雖殊途其貨殖而一致於金鎈音義方外之所寺觀矼石泰朝天洞神報恩天界臺榭霓兮其巹尨簷宇嬥乎其淫汰音太神摹森羅之嵬翔意影兜率之偉怪象玉清之尊威羅神兵之昧薆思凝疑兮札涪招葛洪於天外生金佛之泮奐鄒羅剎以承蓋座繞繞兮圓光俟寶融之聆戒占好山兮隆卉通幽徑兮昌箈音代悵洞簫之捐纎鄙相國之倮隘振以鐘鼓之瀧沓清以磬鈴之淅灑福無明答禍無顯害故能傾嫈音榮嫇之渥尊而來骯髒之瞻拜也龍江之關積薪如山錯岩嶽之崷􅀈丘利切兮束危㟞之蟠戔木土類兮寄育秀翠幄之拚拚音翻覺􅠌穴兮平攤疑夔魖兮誤撣音壇龍潭諸倉峙粟如海幻驚濤之騰譎下暗浪之匯逮肆晃晃以永歸冰一凝兮數載閃蕪浥兮嶺榻類尾閭之所在大比之秋覩直𨽻之選豪聚總總而􅂒􅂒音迷插羽翼於纎辭㒠層漢而橫􅬾音時叱吉鄰與黃文吉鄰黃文月中仙見萬花錦繡谷儲紅蕊之離仳孰規規於殿葉兢緭緭音位於髙枝爭徒手以白戰希點頭于朱衣􅀢力牛切經書之暗閡彼意髻而吾髭同兮相是異兮相嗤或導源赤水或爭雄黃池逮奮鵬程之路聽鹿鳴之詩又或夙昔之熟蒸而睥睨苴泛而淹支者焉於是乎有貝錦之加竹筒之吹韓文公詩熱如竹筒吹雖冥昏以摩索實神明之攸司增明堂之柱石礪後學之鋒錍萬石之長嵗聽宣諭常蘇裕子於焉慺音閭音著梯韓嫣兮齊駕拉渠公兮並驅揮夜光兮為炷購委蘆兮為絮倐物價之翔髙空群行之萃聚其各方遊衍則有悲歌慷慨之士升髙能賦之賢棄裘馬以易醉輕十萬之腰纒㩦以鐔川鳯咮之硯囊以建安毫之箋洗華林之莽莽兮刷烏衣之冕冕音淵於是奎來賔躋醉仙止梅妍宿輕煙來賔醉仙梅妍輕煙皆南京酒樓名脂臐許云切膮呼堯切兮繹華筵售倩粲兮黃金千歌南呂兮雲韶諓舞料峭兮雪嬛傎音顛精隨聲兮往滇滇音田思隨態兮逝淵淵恍難像兮忽難傳浮灙漾兮栖無邉化媚霞兮暈青天悵百嵗兮幾腲漫見東坑兮屢田又有踵𢎞景之武步劉計之躅恥干秦以飯牛笑要湯兮烹鵠收疏嚲丁可切兮三苖散濡䭘倚兩切兮九曲服春蘭兮飯秋菊皎白駒兮空谷孤吟絶兮誰續聞禺于兮修竹所謂伊人溫其如玉遡流從之言采其藚其能隂掩騷曄之門杜夔澆之俗又足以勝千百懸群衆者之碌碌也荀子云功名未顯則羣衆不懸明道南軒過化存神又有聆咳覓澌之儒真浸淫風月之趣控搏柳花之春麗道德為黼黻尊仁義為膏唇土苴罕形乎訓詁粳粃庸鑄乎魁倫匪赫烜之若斯安劄丁盍切漼乎青磷其或􅀈音低叔橋敄無慕切竒崛賅峋抹橫渠之巾垂洓水之紳芽遭踶兮殷殷粒值餐兮齗齗繪九苞以名鳯假一角而號麟與其矯情於層崖莫若任意於平津蓋京師人物之都府似不能無聿悠而脆絬思列切錯擷而參忳也夫以王畿之內䒌焉千里經旬周乎外郭悉黔黎之所止聚舟以南覆寶以北其中廣衍王氣所塞乘靈氣以鳩作悉無求而不獲上江來薪兮陳陳下江繼粟兮淢淢奠枕於中洫焉而食富有兼資貧不至貸故其民習於親上俗矯於好德豈若洛陽之桑梗關中之刪額也哉論者謂偏據之地易於分王想窺中原有限其望蓋以萬邦之方下民之王而視為三國之寓境六朝之寄鄉是猶神淵浮蚓即以為蚓淵而不知蛟龍之所藏靈囿集胥即以為胥囿而不知鸞皇之所翔豈不繆歟且聖祖定鼎於兹天下十二初得三四於焉寧齊魯定汴洛幽燕妥收晉兾奄廓灤河之所經營遼海之所開拓阺音底兮若朽木之易摧迭乎若焦薪之易爚果地之不利也耶太宗入繼大統盛德守成憤徼外之覬覘建行營於北平假天威以彈壓省防秋之萬兵命嗣皇以監國將翠華之旋宖曷鄭重而不返慨鼎湖之龍升列聖慮遷以勞民遂遙睇乎天宏是非此不足以宅壯麗而容衆庶也吾輩沾濡祖宗之恩逍遙根本之域安百年之衽席目不睹乎鋒匙特以規模之侈大氣象之深逖故閉門足以守諸夏開關足以闡遐烈挈入都之領袖而有此夷逸也由是觀之南都之建尚何百二之所能敵哉如子不以為然願聞雄辨僕將執白馬之靮焉北都賦桑悅知今子嘆曰先生真覆中人耶生長於南得其膏髓莽遊於北未能粳粃即渥彼泊此是知有矑而不知有目者也知有輪而不知有耳者也且元之季天下㴎奴大切淜偽漢歸墟偽吳西盈明升擴廓之徒亦盜息壤而湮騰我聖祖悉渟泓之既鞠瘁攸方因息搏金陵當是之時威德音楚跋殪猘懲雖漭泱斯都亦百匝巉嶸思業齊於圜燾燕聖嗣於北平意將默啓此焉作京也先生茍眩璉焉僕將北都之事以破之聞北之為都宿屬於箕地名幽州神堯之聖域召公之賢丘地形纍崇跖跖救救膊音粕齊魯為柶音四綴趙遼作旒東坑移餘之切逈而左率山律切太行㠕於鬼切峞牛罪切而右􅂒音由濎濙無涯峻峭莫儔眇轢長江之蠡斥音齒芥鐘山之塿前奎滹沱易河後􅧠匹迷切龍門狐嶺河濟碣石衛國之城隍居庸鴨緑障逺之藩屏其西香金甕覺仰鐵綿玉泉盧師平坡棋盤則貸空附形岟嶭五結切堞攢其大通盧溝黃花濕餘髙梁固安龍泉琉璃則穴地纒軀批逼盤紆峙悉延延流咸澞澞成險生潤作固於尼爾乃郊原墳盧掌掌扺扺此禮切接天王氣隨地彭邐曼泱無窮敦橆音武靡麗馳突罔銜容光必峙又或靡板層胡良為坑羅埪垌磨臺為􅩖音起約奐其歸聚英帝里天合其所人凝其績築城伊域作都伊匹揆之以日其繩則直空材九有付之偃翟規乾凖坤以究安宅堯之成陽似倮秦之阿房太嫿呼麥切角樓略摩乎漢規梧殿少武乎唐式五門環環千廬扼扼音厄雙華嬛嬛音旋丹闕額額峙以文武列以順掖東連宗廟西嶵社稷武英􅀈力篤切譎而欒駢大善臬窈而彪舄文華坺扶厥切㙐都果切而枚塙口交切文淵實䫨五髙切而隆頔南薰仁智前經後緯思善翼善左輔右弼奉天前迤齗齗特特若圜倪之無極華蓋中蒞鏘鏘礊礊音客若春盎之可即謹身後擁環環赫赫若混沌之未畫悉䀛忘拜切其桷悉扛其楹剡柱乳楣巨纖􅀈居僅切墿居石切欂步碧切櫖禁楄補沔切疏戚􅀢迸彼耕切陽栖其正隂止其冥懸魚惃古魂切凛而下垂拒鵲媋式均切䐷丁安切而上騰彼􅀈􅀈呼骨切之雄梁夥崇㙷除立切而獨承山林之日既長廟廊之任孔宏群材膺職渠渠乃成會同萬象總暴單名曰楣曰柱之屬其名不一及殿既成楣柱之名盡隱總名曰殿而已如舜五人分治天下事五人之功成則曰舜之功也以殿比君梁比宰輔其餘楣柱比衆職意思深長非茍作者覆以琉璃陸曄含黹音止曜靈接而㺯碧夜光交而成紫合色極上東西之序南北之偏墄蒼則切崖敖屴音力砌以花􅝩輦路糾繚閣道回旋髙以純升莫喻其然票彤庭之言言􅰙慈損切雙柱以擎天色侔截昉音方文以蜿蜒乙學切鱗甲之􅀈􅀈音論疑凝佇乎神淵呁尤峻切鋭頂而夷堂恆薈萋之糾纒遊衍之區爰營西苑泓以太液之音炭峙以瓊華之卯卯音苑池則汪洋漫衍溔羊小切潢漂沱沄沄淨練滈滈輕羅有約其駾它外切淃乎相磨禓以江蘺芙蓉點以芳藻緑荷含英吐華􅀈馝薰波島則巉巗磊砢岪鬱危繃太湖輸精武康貢英竒寫宗師之文怪摹辟邪之形薄平泉而不即眇艮嶽而弗登者悉茲攢掜數仞乃成點以頻婆玉桃之菶菶綴以綿梨蜜杏之庭庭乃築崇基殿以廣寒刺以復閣趽音彭以雕欄古柏十圍矮松百盤俯雙橋之千柱仰萬嵗之層巒誠禁中之蓬島豈靈圉之敢般嗤秦皇之遭紿笑漢武之受姍于先切索神居於海外類求唐而揭竿莊子云揭竿下海而求唐子南墉之中亭館綿延迷以綺鋺復以粉眢除鋪太階療綴明媊音前擁以比目之扇鋪以半肩之氊培以長命之草栽以並頭之蓮珠玕之樹苯苯純縞之禽翩翩東南其户寒暑攸偏涼登洗髓之域和躋浴沂之天居止法乎天帝奚必創乎神仙欽安而後皗直流切以日精月華之煌煌晃以景福隆宗之瀴瀴音映乾清晫都角切兮其鴻葛坤寧􅀈紆云切乎其硎清六宮弮弮丘貟切七所敻敻蠶室同繅絲之源昭德異永巷之墱丁鄧切爰有仁夀聖母所靖下萐莆之盈盈上鈎鈐之􅀈􅀈音靜萐莆瑞草王者孝則生鈎鈐星名王者孝則明嬪妃雍雍栗以宮正第禱嚴敇帷􅀢肅敬爰遵內範匪姿以貹他孟切絲纇必輯零帛必絎音柄爰洽彤史之化爰繼關雎之咏遵商周之家法豈漢唐之敢並奉先衝雲火烹纍靄北海通乎御溝主山邇乎厚載王府十邐金水之濵青宮一伉羅城之外無殿宇之甚庭明本支之共蒂司禮諸監二十有四惟披惟衆爰理厥事膺恩眷以精忠保富貴以勤勩天財承運世資物斥循和鈞之規刋不會之失夜光爍空而不離乎櫝辟寒委地而不出乎閾鄭材諸壩神龍各廄芻菣去刃切山積繁息官畜脫騩違靮兟兟溜溜喜奕悠而轠音雷轔怒跅􅕟而決驟散若旌旗合如錦繡尾拖鬼方之雲鬛帶北極之飀軒以欒針御以泰豆代驂象輿探前趹烏穴切後者谷量野散𨽻首莫究鄙衛以騋牝三千成咏眇唐以四十萬匹為富惟南有囿釗釗媞媞臺名呼鷹巋崱雲齊規以槢垣衛以危梐車兮切佳實纍􅒎音義灌木垂桋幻靈芝之䔄䔄茁紫脫之萋萋蚑息蠕動鷙擊獷趧音堤或並命而比翼或兩額而三蹄㩼音支獝領乎師師䎀許出切狘許月切鎮乎儀儀悉入營表接閧連矣音奚以至大月一峯之駝黃支獨角之犀昆明吐金之鳥三佛吞火之雞天山識樂之帝江哈烈㺯毬之狻猊亦安薛公之鞠養受毛丘之羈縻環以靈沼畫以崇溪水禽淵魚隨方躍栖悉涵負乎恩澤動濡爛而敷祈澄波􅀈􅀈詞林切流澌癸湀牽牛織女涵影東西青天鋪底籠以玻璃七夕之鵲髙低瞑迷膆音訴層漢而翻下駕雄梁而接隄疑仙駕之拂掠覺項翼之酸􅀢音犀韭蒜芋茄瓜蔔芥荽音綏湛露厭浥絡圃連畦纖䰃儷金孴音疑㿸無願切成泥苑監是職衡牧分司覆紅巾以進録伴玉食而生輝潞濟群河爰通漕運節宣齊魯之流罔京堂而不浚武夫役民彌搏劤劤香粳辭越而遐征白粲别吳而時進銀灣克抵衛縣斯親子遴切危檣連連矗如叢𥻘音吝麗新閘則倮載飛車則迅周章聽瑩同儕相呹音舜偭挺途猶珠入太倉若糞一方之貢可充四國之饔飱一嵗之儲可援十載之飢饉寶玄福順連延官肆商賈如雲駢槅連肆孰為渠公孰為丙氏南巴之竹扇東廣之藤笥蘄州抵金之簟滇南鏤銀之轡江南之薑桂錫連雲委龍門之筋角旃鐵棋置利十倍質嬌麗承弊白台紫靨揄能獻技躡祧祧之利屣翹榯榯音時之象揥轉咽緸緸音因拉㧺徒合切袲袲尺制切􅂒兮蕭蕭坲音佛兮餼霼歌歇舞收雨歸雲遲匪呰音紫窳而自擅得褥翔於聖世侈隃音堯腴氓竒貨斯婪鶴頂貓睛繡巾紫曇琨珮瓓環瑟帶瓊䀀音凡􅕒􅕒音屈耀日之簾皓皓浣火之衫或襲以阿錫或􅀈以珍緘儲白本受采希青價出藍適沉珠而毁璧竟需象而得􅀈群國賔興禮闈披遴八表逄掖名坊茶頓敘名寸楮誰與悉問施笑鄒語羌嗤楚韻爭投伐桂之銎㶴充爾切薰赤杏之焮百十髙希乎及第萬一威彪乎令聞紛紛青年之英慨慨白戰之陳吐辭則終日不嗄老子云赤子終日號而不嗄此借以喻其出言之無窮繹理則畢生無齊丘子云或寶一器至畢生無此借喻其觀理之無滲漏占夢於周宣推命於梓眘果耳不周之聲闕目鬱儀之暈簮以宮花醉以內醖健馬奕奕街遊一瞬惟煙霞填乎凡格霜雪粘乎髭鬢多瀳多見切焉復潿音闕韋升焉復揗音順似造化簡於老成隆於少進厥意尋丈而莫測其分寸焉其設官也或象以天地或配以四時盛官屬以任使為庶事於無為都臺肅朝廷之綱紀大理平訟獄之差池翰林根本之地通政喉舌之司光祿􅀈張嗉之焰張嗉星名主天飲食宗人綴天潢之支神州赤縣政沄懷鋪回切甈五計切太學斥序教沃畬災容臺掌乎大禮兵馬輯乎細辭鴻臚太僕尚寶太醫廊列黃門科憩中書比屋隆夸彼􅧓吾漦萬衛殊名五府相維扈從擒姧屬之錦衣欽天之職宣髀兼􅀈卷天道於二掌驗人事之災禠東閣元老天子是毗止戲於剪桐充仁於折枝詹事春坊青宮是師惟霡霂乎早諭冀峼它果切乎崇基年有長季職有崇卑惟政舉而時贏各溫戚而存知奭錦袍之熉熉音雲懸象牌之垂垂按節長安之街飲馬玉河之隄匪登庸之􅀈􅀈安冠蓋之祈祈或來東海或朝西域置以會同之館攭以烏蠻之驛觀其翠髮卷茸緑睛轉赤綺衣並臂文面穿鼻露金齒之齗齲搖環耳之琅咋帽樺皮而負金鎖戴皂􅀈而纒􅀈公亞切帛或厯細腰之沙或亂熱身之澤或脫黃羊渡之險或撇白龍堆之厄莋馬僰童旄牛婆律鼲納之裘雕化之勒桄榔之麵羊刺之蜜食藥之鹿伎伎銜燭之犬睪睪畢獻方物孔淑不逆此蓋周公之德不能致立本之手不能格者也若乃驕民渥夫舉肥漂斥佳辰令節嵗無虛擲迎嵗拜春殽核狼籍三杯五觥孰主孰客柔遭茹而街卧剛被扶而卷格茹扶皆指酒而言清明祭掃士女嫧嫧音責淡蕩雲天晴明風日歸信未通婚期已迫彼跨金鞍此乘油壁逝將去而㥄㥄直徵切語不通而默默金珠鳥止乎園林羅練花開乎阡陌至如鞦韆凖乎良劑蹴鞠參乎上劇登髙屏難於重陽陳瓜乞巧於七夕公子王孫內家外戚執樂千指萬錢一食者承升平之綿遐則又豫樂而無極者也熊熊百萬列營十二六時簡閲山徒海騎苞兮嶫嶫流兮㵝㵝文武吉甫諸營是司繹素王之理接玄女之思演星袊之妙扐天髓之祕故能出神入鬼陽擒隂制係單于之頸匪折鐵之難喋溫禺之血真摧木之易養翹關之全鋒遞千嵗而一試五方所聚人品無同或潤道而澤德或藏邪而蘊凶或悃􅀈音白切而愛恬或譙􅀈烏祿切而喜訟或如朱安世之虓悍或如魯仲連之豪雄守道者自尊畏法者自蒙莫不漻乎無聲泯乎濞漴以至慶夀大覺之寺朝天洞神之宮亦有躡文成之軌假逹磨之蹤煉必規乎大道坐不落乎頑空者僔僔而蓬蓬雖騁説之浮誇竟莫售乎明聰直𨽻諸藩三載一聘各率其屬鬻鬻嫈嫈音映會朝之晨衣冠􅀈􅀈音靜輿臺呼旦東方尚懵音孟天顔未覩天居遙覴丑證切一祖四宗則篤其慶四海來格九圍交亘四句想像來朝羣臣贊嘆之詞商頌云四海來格來格祁祁殷受命咸宜百祿是荷與此意同爾乃鼉鼓振絶洪鐘聲競雞人未唱禁軍絡堩居鄧切龍伯遺人操戈􅀈􅀈郎定切蓋天之幢獵峙耀日之殳疊映鳴鞭三振乾答坤應鴻臚肅班御史糾朚音孟于時尹伯與屬畢獻方政天子乃御奉天負扆而聽紫衣傳旨寬刷微􅀈乃命冡宰都憲稽嵗月之成下鈎逆之令左陟而右勵前噴而後醒一麾靡靦三接弗驕徂交求定除眚平豂音寥尤慮纎滯不宣儲沫成濤登聞既建微鬨天囂門無九重之限階通萬里之遙倣堯舜之庸才運元化而不勞時乎三陽郊祀天地夙戒其牲繭栗成隊置絼特忍切供稿古老切閲無染悴圜丘方澤合一太祖太宗作配必齋心而來成禮而退然後元尊冨媼留俞塞光而隂降大惠也齋心以下豫期獲福如是於是僃儀從肅吏兵黑卵戴鶡音曷專諸縹纓乃擊掆鼓乃扣金鉦五校沄沄建鉞欩音超旌導罕罼之赫赫攢儀艎之熒熒由基迹禽轇轕白軻車輻縱橫逼頸援撥音伐而後擁豹尾負弩而前征佽飛未離乎城闕遮列已簉乎郊坰天子乃慿載天之軾蔭覆地之蓋絡結穗之翠毬垂飛龍之䋿帶周鸞鳯之鳴鈴輾日月之修軑音大揚黃麾與玄幢紛而靄靄列以細梢巨扇標以通帛九斿遏雲之旌容容音容掠漢之葆悠悠約祫古合切輅而齊發悉軒曵而杼直呂切侔或駕以安南之白象或驂以渥窪之玄虬下黃輜而收視與造物而周流儼天門洞開星辰扈駕忽地户悠闢海嶽參輶下黃輜而下皆言存想交格帝祗如是蓋未祭時敬也意營營而腲旋見雲翳於龍輈玉趾遲遲晚蒞齋宮燭以若木祥光溢空天狼挺戈靜室彎弓壁壘絫絫變扤足之渠答太白俒俒化洞胸之􅠱䂈音彤負山捧璧司馬元戎明目張膽以俟晨鐘天未向旦玉漏猶滴天子已御具服之殿輯纓簮理珮革玉珠綴旒紅羅蔽膝錦帶綵綬朱襪赤舄色衛神而嶷嶷德浮容而昔昔二句形容主祭者之氣象至矣盡矣思締交於神明敢扄畦以寧逸自色衛以下言將祭之敬逮大祀啓扉庭燎焆焆於決切氊案陳皇邸設祭主就位百寮陪列於是協律諸郎持麾相鼓襲榮猿之迹蹈杜夔之武吹孤孫之管擊靁靈之鼓奏雲和空桑之瑟陳雲門咸池之舞惴栗駕乎聲容浮青冥而上下樂舞之聲容乘煓栗之心以上下青冥之間蓋臨祭之敬三獻既畢周旋傍徨餘愭音祈蒸蒸化為馨香愭恭也此言祭畢之敬自未祭將祭臨祭祭畢凡言敬者四而用各不同帝示祖宗是格是饗降福穰穰台輔匡衛隨日承光言內外之臣同受福也借槱燎之餘輝燭幽昏于八荒言福及民也嵗時享乎宗廟春秋祭乎社稷酬鞠聖躬之恩報粒蒸民之德陳登設鉶執事翼翼磬管鏘鏘萬舞奕奕文孫薦誠靡幽弗格福祿攸降賚及蠻貊先臣而後民而後及于蠻貊降福之次第也山川旗纛馬祖先農先師先帝靡祀弗崇澤被幽遐神罔時恫當郊祀而旋也遵鹿鳴之規舉慶成之宴司壺尚食物以等辨珍饈醯醢黃封御膳蓋以修亭東西相面天顔降禮而下垂臣采循班而上薦酒進樂奏和樂雍雍虡業維樅賁鼓維鏞箜篌琴瑟聲會音同毛象畢來化産合桐九奏將成身在心融亂以椌楬耳浮太空海洋洋而不波山躍躍而弗童二句形容作樂之功筵之初列百戲秩秩售西域之技獻犂靬之術致豬韱馬吐火起䬑王勿切吹氣則旌旗自鬬開口則旄毦音二亂出悉徹弗庸以間冥愲䀛䀛音忽諸伶欣承晏娭語齕音鴂狀異形殊都護屢請而不至舉蹙額以攢眉奉質子而見納忽顔破而心愈繼以採蓮之隊躍魚之嬉閃景態之橫生何善幻之若斯於是獻東坡之致語雜方朔之滑稽索循贋艷橦緣嬰兒馴蟻解筒黠禽銜旗娛目電掣明明熙熙九爵告終惟其令儀人醉天醺夜象彪機方三能之熚熚忽蓬宿之輝輝滿月當空元宵適屆生金鰲於後宮運赤睛之䤳䤳枯駕切委飛檄於馬童併三峰而悉借孰決江海而上孰引星宿而下燭龍褪乎光輝熒惑輸乎赫煆音亞擬登州之海市籠萬形之所化切仙人騎乎赤鯉壯士御乎奔騇閃山原㺯影遊不盡之獐麝忽園林成象飛無邉之鷃鵺音夜孰榮逡巡之草木孰造頃刻之臺榭奚西羌之堋堋委生業於騎射何洞氓之軫軫御勍敵以偏駕已上皆言燈中之景幻士女以遊觀雜人品之修跁所化切士女亦燈中士女影中之影合四海而為燈又見觀於造化忽出此警語宜聖心之洞徹付戲局于一呵枯駕切惟思林總之欲愈詔錦衣而放夜則有連鐵狡童盤金媚姹度萬寧而越木通謂疾厄之可謝萬寧木通二橋名京師俗謂之走百病慶四難之畢會宜酌醑而殽炙惟君樂之同民合歡聲之跖跖音蔗端陽之辰百僚賜箑書面刻骨佳言喢喢叱涉切綵索角黍頒畀沓匝拉上卿于南墉輟萬機於一霎中官如雲珮以韝韘蘇協切逞陳音之長技睨遙鵠而不懾屢忘歸之奏功發嚴鼓之宏鞳日中而散恩周禮洽惟好樂而無荒庶天下之同攝草木隕落農務既隙靈囿無垠百獸蕃息規其豢牢為之營域有司蒸蒸焚萊平埸禱蛛蝥而網靈祀天駟而馬力蒙莊執劒子路援戚射付紀昌御司三百部分既定闛闛洫洫蓋將四膳咸收六禽畢獲續渭濵之光益榮陽之色而使吁祛目乎兵制頑獷畏乎威德也驅逆脣脣切辰切置萃載牽褐纏旃以為門裘纒質以為槸魚列切天子既出木輅札札大魔攃攃音殺升龍之纛掜掜五禮切象翟之鼓噆噆才逹切九仞之扛作氣九合之弓去扎音札駕以角端引以舍利舍利亦能言之獸獸之所同則言其處卒長執鐃司馬建旗韋韝逺部朱鬕莫亞切健兒或跿音徒跔而科頭或􅡫髽而貫頥操殳秉戟林聚星馳扚扚丁激切沄沄肅肅暆暆音移萬足旋䢔胡答切境塵不知不傷稚牲不折季枝大庖未盈摝音鹿鐸下緌偉中黃之執雕重西巴之放麋縱如黃之犬張箘簵之繒搏而占切耐音端殪䰃鬇軫􅀈徒郎切戻㧙音必抗掁其有敧曲蟻切伏深窟扶搖太清者則命發犴矦擲雞嗚足雖敜敜乃頰切委蛇染􅝑翼雖摯摯委曲為正平聲於是按三驅之義彰一面之仁算蹄紀功舉柴頒臣小大稽首以物易身觀畢命於禮羅思棄物而獲人孔明深伏心染枉顧之輪四皓髙逝身羂古犬切卑詞之罠真情綴瑣而體乾實德結裹而絡坤網支伯於滄州掩許由於沛濵焚互而旋萬物同春播對酒之長謡知惠及乎蟲昆春日遲遲稚草萋萋帝籍千畝膴膴崇基乃呼蒼龍以駕紺犂三推即功親執洪縻牛轡也車子易成牧竪史妠變為耕黎唱採蓮之曲歌大田之詩忽木德之守心見聖化之閃尸屢視太學道脈是滋躬服衣辨降禮先師翟翟賢關爰駐龍旗吻周壁雍之制陋魯泮宮之儀司成司業講六籍之異司論百氏之背馳匪怒伊教樂此不疲實沖虛而言旋見諸侯與太微夫以養由矯矢獸號於林蒲盧縈繳神感飛禽矧綏來動和之妙得不蛻骨而孀心於是四方殊風而同化千里異俗而同治雷興稼穡之功電流絃誦之懿齊民安瀾秀夫不敡至道下降天不辭耗真寶上呈地不惜費甘露瀼瀼景星晢晢音制石有發光之竒木有自行之異青蛇幻相而不螫烏鳥隨朝而自致天人和同聖心未紓畏祖如天寶民如瑹音書惜財如頭目密賢如襟裾繹皇陵之碑玩日厯之詞知創業之艱難敢泮奐而提舒博莫約於莊心泛莫要於正軀觀明德之芬蔚駕唐虞而並幬宜天眷之毣毣永熙皥乎皇居且自古群盜多起山東此塞其衝厯代繹繹多攝蠻戎此拉其胸長淮積二彭城畸凶此操其饔訪遺迹於金元尚恃據而稱雄矧聖化如天仁為池義為墉人人勵行比屋可封故能一視無外四方咸同先生守乎雄辨意豈不曰聖祖氣象如神清明在躬靡幽不燭靡窒不融奚栖吷而棄鋒若然文王曷不遷鎬而居豐漢髙曷不即居天地之中勞有節而景或窮故耳蓋居豐者太祖遷洛者太宗交乎夏則姑洗代乎仲呂時乎旦則土圭易乎銅龍當持守而持守當變通而變通所以延王業於悠久等神基於華嵩者也尚可泥于一定而蹈子莫之蹤哉抑又聞之惟髙則能制下惟下則為髙制北之巍伉覆南若天南之卑延承北若地君惟尊南是昧天經惟知地義抑非無舵之舟不當之器也哉刋落四隅蕩蕩襄襄萬里一轍是謂大方君茍遊焉則胸次堂堂然後以窮髮為已之故鄉吾言為已之文章庶幾見北都之閫奧而不至於倀倀博古先生聞其言不黨不揚以實鋪張然後茫然自失惕然若亡曰吾儕小人於道罔識聞先生言心開意釋始知孟堅之兩都平子之二京辭長意短語徒愲愲今承啓我以大道之要納我以大公之域如脫鷃籬得見龍窟再拜受教而去明文海卷一
