body:
  text: 明文海卷五餘姚黃宗羲編賦五國事五籌邉賦沈鍊粵有五陵逰客懷鳯翼之書挾魚腸之劍南步荆吳北登燕甸䇿馬居庸之關方輈上谷之塹捧心如星營目若電於是造塞上老翁而問焉曰伊昔髙祖肇造區宇妥歡歸順縱其北處暨我文皇開拓土疆若六轡之馭馬孰違余之控縱乃若已巳之變則起侵凌之漸王振貪而中搖喜寧狡而外眩震驚土木之川彈壓清風之店然而郕王監國太傅提兵望翠華其既逺飛碼石以長征三千里外動覺無人五十年來不能窺漢此豈非今人之著聞往事之昭爛者哉𢎞治乙丑魚臺不守遊兵六千連臂而剖草垜縱橫土棚不整誰生厲階至今為梗由此言之敵人之勢不殊也昔何其衰而今何其盛中國之人不削也昔何雄強而今何退聽願大人熟慮而籌其宜劇談而究其竟僕將委心而從命矣老人越席而拜撫膺而嘆曰嗟乎嗟乎乃者學士束筆笑涉兵鈐縉紳緘口不言邉患何哉容身之趣卑而憂國之心誕也不知天之生人一體同氣性命之中萬物皆備是以黎庶有並生之仁宇宙皆當為之事乾坤等上下之交日月煥君臣之義普天均照有外有中率土胥歸無巨無細主憂臣辱上安下利一家則父子之心常齊同舟則吳越之人共濟故利有所不得獨專害有所不得獨避唐虞師師九官交針成周穆穆三后協心伯益升而夏烈傅説命而商霖一夫不獲則伊尹以為已罪六羽初獻則宣父之書至今故告老而請討陳恆之逆作經而數稱小白之功相魯而重揚夾谷之會獲麟而嘆吾道之窮是以為生民立命為天地立極合中國于一人通萬古於一息古之君子曷嘗以閨閣之奉自崇血肉之軀結䇿嗟忠孝之道衰兮人懷私而自異視君父若途之人兮曽不滿夫一睇榮寵汝其何為兮蔑秋毫以介意想九重之皇皇兮念中夜而不寐彼藐藐方自營兮曰非余之所致冀上帝之察九土兮惟懷忠藎其有幾人嗟匹夫猶戀主兮况纓紱之在身幸髙位之難得兮日汲汲以謀資感夫人之竭誠兮曽不顧百姓之流離有司斂財以結納兮三軍救死而不暇自官方之多錯兮雖嬰孺猶挾詐朝結納之有門兮夕遷轉之如響恆人不以為恥兮訴親交而欣賞將無心而血戰兮士無力而效死要中國之不適謀兮何外番之能盛客且無論公卿之議而談將帥之略無先廟廊之言而定邉陲之畫可乎老人曰事有本源物有紀綱不知先人何以安民不有內治何以外攘周公思而白狼貢虞舜讓而河鳯翔蕭何內調而淮隂之謀展魏相中協而充國之計揚亦有至難知人之哲齊威檻管仲而未諳五伯之材桓溫遇王猛而猶憶三秦之傑倘忠亮之不行雖岩谷之影絶彼朝逰而夕叩顧辭卑而禮厚若夫人之髙翔等浮榮其若臭弓旌招之不來况肯穴其圭竇椒胡有窮黃河猶漏重益蹇連空增虛謬慿所為則恩惠不由其門從所言則功名反出其右故千金而未罄衷情一言而輒生戮辱得遇而組綬蟬嫣失勢而形容踡局寧使生靈被塗炭之苦無寧使門下隔當衢之軸寧使朝廷負四海之憂無寧使寒士享一朝之祿此其病已成而為慮已熟矣雖有將帥之材邉陲之計何由而矚哉客曰鹽鐵論興文學議公卿之貴輪輿説成王成屈野人之對子之言誠明矣然則今之為公卿者宜何如老人曰主上明聖承天恭命道極精微德循中正深維社稷敬戒時行眷兹小民憂心日兢警爾三公諭爾百辟禁中揮灑雲漢昭回仗下傳宣雷霆赫奕誠濬發於九重逮風行於八極曰朕夜分而不寐展中心之規畫俾小大之盡言破逺人於絶域孰髙居而端拱實眷戀於幽側臣子而欺君父日視昭其何益天語琅琅雲容厯厯萬姓攄心千官變色小臣聞之涕淚潛滴有君如此誰忍不力於是誅怙慝之臣開僨軍之赦搆大將之材較團營之射輸榖粟而東西選良材而日夜表率神明之風躬行玄默之化恩不報而常施罪已刑而猶籍體堯舜之至仁在伯鯀其猶借暨九載而方殛詎一朝而獲罷望庶幾其改之何螻蟻之足跨欲招俊傑且安韓信之邪志重循良豈昧王成之詐由此言之陛下不曽負人而人自負于陛下凡今公卿保傅之臣率彼文武臺郎之士同􅋵厥心各勵其志夙夜孜孜有死無二茍有利于社稷吾何愛于髮膚茍有傷于百姓吾何畏于權貴聞一善則同聲而推見一惡則并力而擊扶持國是有如日月之明摘發羣邪不讓秋毫之析賢材進而流俗迸公道行而私交息如此者固陛下之所側席而思而百姓之所延頸而企者也以父事君何所不悅以家事國何所不決竊有一言不踰四字科道者耳目之官吏兵者股肱之寄耳目達而羣枉昭股肱宣而百為治然後虎豹奔命而入林狐狸望風而投穴貿遷轉則鑽刺而無門售擠排則窺伺而無隙故許厯一言而破秦馮歡三計而安薛包胥慟哭以成名魯連匹夫而仗節豈有五等之風行而三軍之政闕哉將帥承指授而成功士卒感溫醇而激烈若是而邉陲之地不守烽煙之警不息僕則受妄言之殛不知者謂老生之常談其知者以為聖人不能易且夫逐世議而衰興隨流風而披靡此其駁乎不足議已固有豪傑之才髙明之調仰屋梁而竊嘆展往籍而悲嘯人士依其令聲海內望其芳蹈然後徘徊猶豫長慮却顧欲翶翔而斂翼幾髙舉而促步蓋默成以潛處不顯著其名譽諒深衷之有為但恐年嵗之欲去琴欲調則軫為之回病欲療則藥為之劑事荏苒其日生法轉展其滋弊此老人之所拭目以流盼傷心而雪涕者也客曰本源足而後枝葉生紀綱正而後法令行是則然矣乃若張良著軍令别為三教任宏校兵律分為四種豈可仁義無節制恩威而無系統者歟角勇力則先技藝鬪智勇則尚謀猷與天則隂陽順與地則險阻修故風后撰握機之文太公垂金匱之鈎李靖演六花之陳趙德紓九宫之籌此雖近而莫廢又何深之不求老人曰適已言之詳矣世未嘗無技藝而不聞好技藝之士世未嘗無謀猷而不聞任謀猷之將逮孝文之拊髀各興心而慕尚安得至公之言推擇有道之士築壇而重其名授鉞而隆其意有關閫外之言悉聽將軍之制受命而行仰天而誓既已許國有不竭忠何異為賊然後合豪賢以詢謀集參伍以宣令既三令而五申復周言而密訂將有欺于三軍軍有欺於百姓父不得而赦子愚不得以讓聖賞不負心誅不奉命削成廉礪何殊百煉之剛照破寒邪有若千年之鏡豺狼震疊甲帳星稀烏鵲低回轅門風靜威行秋霜惠流春陽保之如子視之如傷中心貺之念投醪猶其外飾肝腸是布知挾纊幾於色莊君祿無窮請謝苞苴之客臣心可鑒那愁萋斐之郎惟愛人之一德無營已之多方欲得人之死力詎借生全之厚欲破敵之精微焉辭訓諭之詳法無時而不練令無往而不張仁至而後智全精專而後巧出惟神明之有機詎戰攻之無術往軒轅之殷憂感玄女之答述發揮至一之源推明變化之律從五人之初布積伍伍而漸舒象常山之蛇勢結首尾而同樞由教明而方定遂心合而志符起一元之精練極億兆而不殊云此道之非逺順自然以為居雖萬勝之無折亦一戰而有餘先聖運之而出竒後賢因之而作遁老氏演生三之文廣成操得一之論計然托越嶠而智恢孫武藉吳宫而謀奮鬼谷挾捭闔而譊譊黃公持牝雌而悶悶雖孔門焉不學蓋猶存夫冉求之問惟三代之盡善未嘗廢夫車戰駕四牡之彭彭被介甲之雕煥肅先偏以後伍鬱魚麗而鵝觀閲衛青之武剛訊馬隆之鹿角載輜重以不虞嚴周營而難薄相風雨而進退步原隰而前却隨險易而能驅稱大小而斟酌昔李賢之議戎贊斯藝之詳曲既揮霍其箭鋒又慿陵其馬足住彼勢之逺近由我軍之行止藏火器之煌煌鏬神鎗之齒齒縱以九龍之煙發以百鳥之矢上有無極之將軍下有纒錦之細子遊兵翼出若九天之飛下伏兵漸發若九地之突起本中堅之純一密部伍之經紀納謀士之如雲驅勝兵之若水渾渾淪淪誰知八陳之門繩繩縱縱莫測五行之理人人為伍伍則同行馬則同隊車則同箱步兵翕散各各為方車馬步以為三經竒正伏以為三緯星宿隂陽明天之時山水剛柔察地之軌望逺知微有間諜之所未詳隨機應變有圖書之所未紀此則懸於一時之權運於一心之妙參神氣之玄同齊臂指之相掉發之為機權之宜存之為仁義之要知二物之極明而后明先王之至道客曰此足明戰爭之略而未極夫攻守之常縱變化之膠轕雖千言其靡央騁辨博則枉靡乎丘索競文詞則徒切夫宫商子何不於其制禦之恆理姑略言其大綱老人曰善哉斯言僕若卷舌復將誰宣乃今積弊相尋法令不一究其深患則在於入粟而轉輸調軍而更出公有養軍之費而軍無受恩之實將有調兵之煩而兵無破敵之質所以致軍與民之交害而攻與守之兩失何為轉輸之弊飛挽千里憔悴萬夫出入之際吏緣為狙三十其鍾僅致一石樵蘇後㸑士有飢色逮臨邉而給散有無方之虧爛屯田千粒嵗破幾千軍士衣糧日銷過半稽勾則案驗難徴告訐則株連莫算又有公罰私科前催後呵修邉晨起防邉夜過敵何時了腹何時飽居為纍囚行為餓莩憂苦日多歡娛日少借問邉氓幾人能老何為更調之弊生長東塢驅馳西土一作軍夫長年愁苦恨别妻孥生離父母敵在何方戰在何所元日出征晦日歸處他鄉之亂我則何與暨其涉渡關河經過州縣望門投止竊席休倦婉轉則主者不容慿陵則閭閻積怨官軍一過雞犬皆愁客糧支而恨少馬草散而還偷挾少婦而逼辱持粱肉而強留信地將臨中心愁懼筋力已疲誰不猶豫為今之計莫若及今春融墾田勸農緣邉千里荒土無窮聽其開植任其播舂能興千頃之田者授以千夫之將能均一境之土者令當一面之衝小大參差逺近齊同效公瑾之省餽法李絳之置營規朝錯之募民塞下模重華之列徼西東民不改籍軍不受糧公不起稅私不别倉器甲自造車馬自將內連堡落外接邉疆漸穿溝洫增設杠梁且耕且練行戰行防鄉鄰即其什伍耒耜即其劍創強敵者即其私門之患邉城者即其私室之墻家有給足人有樂康妻孥連袂親戚合堂吹笙彈瑟烹牛炮羊資産易戀恩義難忘况有明訓忠孝結腸不同心堵絶欲去此何方人心既籍經制遂密干人合堡十堡連柵夾以偃月之垣伏以井欄之宅聨落不疏聲援相值魚出遊而並肩鳥將飛而比翼髙山之下隱以絶壑並土之傍多其閫域棧􅛡石之頻巇培松榆而漸植既謹屬其風火又多設其險厄一夫當關萬夫莫敵土著成兵屯田成積民無怨嗟官無譴責此謂以中國而守中國乃有附近之藩舊為羈縻之屬欲精心而撫馭令羈靮之相逐棄其往日之非示以將來之福譬搜人之養鷹飲食之而馴熟飽不致其飛揚飢不煩其蹢躅亦選擇其狡狷頗牢籠其機曲密調遣之差池善話言之翻覆就我術而不知窺彼姦其如燭散和好之日銷結怨讎而還讟故陳湯驅烏孫以滅郅支班超假北部以陵西域奉世諭諸國以攻莎車耿弇連鄯善以摧河北其有望風納欵叩關請和便煩省諭鬱絶未過必欲貢汝所有求汝所欲不用名馬不煩寶玉但徙定逺於樓蘭逐驃姚於身毒臨徼塞而稱戈向關門而橫槊我則計首馘而給繒因功勞而致祿彼逺來而疾速我近出而遲回彼狃勝而小玩我決戰而大摧下馬卸鞍臨風鼓瑟輕車突圍反幟攻壁金鼓雜聲旌旗亂色機以因生權由變得氣勢漸移風聲暗易種類凋零誰為我敵由是天子建中和之極聖人垂參贊之功文章充蔚禮樂大同聲教訖於四海仁恩洽于九重越裳之白雉盡入肅慎之楛矢方窮太史作王會之圖史氏陳吉日之風極霜露之所隊放舟車之所通頌率土之浩蕩配麗天之穹崇太平之業盛王者之化隆遊神華胥訪道崆洞抱元守一體妙思沖與二儀而並夀又何有乎喬松客乃援琴而歌曰涉塞上兮寒霜河水流兮中央言連踡兮有極道杳渺兮無方鴻雁飛兮以北鳯凰鳴兮凄惻眷日月兮行邁為夫君兮太息老人從而和之曰時不來兮安憂聊偃蹇兮河洲縱心志兮恬愈橫八極兮遨遊與鸞鶴兮為羣等富貴兮浮雲道之行兮有命寧惆悵兮夫君於是相與陟眺髙山盱衡積雪酌酒裴徊既醉而别平陽武賦李承箕搜姦民以誅之兮在昔有言昊天曰嘻兮揚武亦民惡固稔而改轍兮舍羞惡其非人黃潦涵于日旬兮功清流分品物于秋露之成兮樂風日之與春佳種視同于荑稗兮妨膏腴之如雲門孰坦道兮羌揖讓以佳賔肆鉏斧之後時兮凝冠裳而荆榛飛之以鸞凰兮瑞之以麒麟奈鵂鶹之夜鳴兮與豺狼之必仁性既染而膠固兮撋滌靡及於白新瀾漫漫而東去兮泡沫隨以紛紛昊天嗟吁兮慈敗子其何親母肆原以烈焰兮矼以收珉毋耀武以陵忽兮雲鳥奚恃于開陳除斗帳之蚊蚋兮拂几上之埃塵帥孰總而令誰一兮八州都督之雲孫選鋒鋭以虓將兮曰惟倪君大懼恩怨以昧昧兮訊逺符于閭鄰先之以藩省兮繼之以獻臣汝罪不容于死兮獄詞攄其本真緇遊對目以遊姬兮曾何云云曰遺情豈珍重于一瞥兮城中緑鬢而紅唇奕彼諸美兮月既圓而及辰綺忩髙閣兮蘭麝交熏妖歌艷舞兮樂與子勻執行道以咸詰兮汝曾我聞路東西而南北兮汝衣襟之非村抑貿販而來往兮抑伺邏而遊巡信騰口以喧喧兮我何懼而奚嗔懵不畏天人兮以螢爝而凌晨閔棄宗祀兮曾惜於犬彘之身豈所傳之皆皆兮羌澆變于既淳唯虓將之清淨兮張三面猶酸辛腰金照胄兮三品將門悠世德以停蓄兮咸以烈而心溫罪人斯百兮權度而先存曰違天以黷武兮計一時之勳胡勉強以徇物兮稱大將軍升平賦邱雲霄夫自桃谷迷津遺恨武陵漁父芝山兌道流聲商洛碁翁遂令後世耽情肥遁薦志陸沉者莫不屬心髙潔景止芳馨焉然豫嘗讀髙士傳及桃花源記未嘗不憮然罷卷慨其所遭方嬴氏之亂天紀顧民生之如露晞號嚴迅震法密凝脂當是時也搖手犯禁重足懷疑是故知者逃名達人逺迹奮鴻舉而甘豕遊避危機而謝繒及恐恐焉入山不深投林不密則其所以種朱桃啖青芝放身長往與世相遺者乃其不得己也而又何樂乎締觀其歌夷考其事則慨唐虞之世逺托深谷之逶迤懷富貴之憂大甘芝草以療飢率妻孥于絶境樂草木之無知世秦服而昧漢况魏晉之推移則其情可悲而志固可識也肆今吾人忘日月以優遊順隂陽而消息夏葛冬裘倦眠飢食羸稚相保上下各適儐籩豆翕兄弟靜琴御衎家室時賔四鄰或來三益俯仰寰區讐論今昔感兔絲于女蘿固纒綿而交結㕓城郭以憩幽林登壠丘而掃紅葉死徙同鄉桑麻連業樂彼逍遙順其生滅夫所以獲此者豈無自哉當我皇明啓運萬姓攸隮列聖建中四方來極文承武開漸仁摩義所以垂今百有八十餘年重熙纍洽林鳯郊麒烽寒斥堠兵寢潢池民稼而饔婦桑而衣是以天下皥皥四海祁祁爰擊壤于康衢忘鼓腹于帝力而曾莫知其故也昔者武成奏功歸馬牛而士女來綏宣王復古歌鴻雁而流離安宅夫當傾否亨屯之餘乃遂其室家胥慶之願則吾人于久安長治之世而保其休養生息之樂者其相去亦已逺矣况于草昧而引去者邪使後世有桃源翁芝山老未必不自嘆惋而追賞吾人之遭幸也誕今享有諸樂咸不自知因感而賦升平焉明文海卷五
