body:
  text: 明文海卷六餘姚黃宗羲編賦六時令一續春思賦徐媛於是春也遊乎江涘感條風之扇物悵吹萬之不齊喟然興思援筆為賦昔龍門年少玉藻掞天欎彼羈懷綴兹髙響既析字而成珠亦泛聲而當珮後有作者吾無間然至於繡閣雙鬟幽懷萬緒經春濺淚理非一端得無有留欲吐之章俟後來之秀者乎豫本恨人驚魂無定載成斯製廣寫幽憂可謂千古傷心一時遙集者矣其詞曰遡長流而進棹駕日彩以浮梁雲濛濛兮輕曵煙靄靄兮微揚維時青帝司晨女夷莭鼓鶯竊吳歈蝶翻趙舞碎銀沼之萍花散玊樓之氷柱氣暖平原香繁别浦欲流月姊之輝未值風姨之怒冶逰則拾翠採珠寄樂則沈宫振羽嗟哀樂之致懸匪一理之可研類銜傷於暮序或撫心於綺年境何觸而非恨淚何人而不泉若閾外之殊悰羌難得而偹宣也至如金屏椒壁繡栭瓊磶若有人兮閉其中步徙倚兮私自惜簾捲水精枕留琥珀風斜轉而吹奩月孤生而照隟艷朱謝脣輕黃罷額池桃空紫石苔長碧羊車過而塵杳鳯吹繁而院隔何遊絲之似繞更落花之如擲舞驚鴻其已緬慰真珠其奚益乃天逵之鳯子適月竁之烏孫三月雪飛萬里晝昏星懸漢影笳折邊魂駭驚沙之無斷傷芳草之盡髠俗侏􅍣其難接色蕪絶而不言登别館而凍雲集眺荒野而苦霧屯氊鄉侍寢壇酪當飱臆中鳷鵲之觀夢裏蒼龍之門睇故國兮無日知天子兮少恩亦有少小容華生來婉弱笑非蔡而羣迷腰未楚而先約芳菲菲而入宫黨訿訿其謡諑君意不自堅君恩俄已落修成之肉可糜新人之鼻幾斫鬼帝誰叩皇孫欲啄勢甚橈椎危踰巢幕恆撫莭而骨銷轉當春而神索别有便娟銅雀妓漳水東來寫姿媚俱照渚而成蓮各臨風而拂翠䆗窱玊喉翩翻繡袂旋娟為之氣奪洛珍因之色墜值君王之未疲洎賓筵之半醉態轉裾廽魂挑眼刺雕閣黛浮璜臺香膩守宫之血未乾辟寒之金爭餌痛尊酒其寂寞空西陵之歌吹駘蕩青陽悽焉雪涕况乃初歸瑶鏡慣畫青眉忽河關其遐别邈煙路而安之琅玕結意勺藥贈離舉邯鄲之翠袖泛蘭陵之淺巵君啼妾拭妾臂君持孤舟尚艤短笛乍吹草縈情而磴礙栁帶恨而橋埀寫素懷於石闕申丹欵於扊扅渭水波兮代咽越鳥啼兮助悲故歡亮已矣良晤終何期及夫秦生赴掾細君未從將千里而同子何二竪之留儂一則故廬善病一則天涯浪蹤鐺茶夕冷杵藥晨㫪錦衾橫而爐氣歇華燈燦而樓影重憐琴心而别鸐妬鏡背之蟠龍夢遙尋而難寄書促往而忘封對此關關鳩語灼灼花茸何嘗不抽簮覺短約帶憎鬆豫美亡此誰適為容是以新光新氣新景新愁固千悲而一族亦異感而同憂莫不寄微情於湘女結幽恨於靈修豈與夫康娛漂盞流連桂舟艷曲平原之第巧笑如臯之逰夜以繼日忽忽悠悠者哉重曰菉蘋既已廣紅蘭亦已長浩空江兮無人邈豫心兮愴恍復鶗鴂兮先鳴撫嵗華兮將往寧扳雲際之瓊枝不願河洲之宿莽有韓娥者聞此辭乃抗音而奏陽春之歌歌曰魚􆅛灂兮鳥綿蠻逝白日兮銷朱顔蕩許春愁終不去解許春懷終不間詎怨多而心死直歡飲而淚斑欲知妾恨復誰是皺盡雙娥不似山臨蘭臯賦徐媛縱目平川雜英繽紛晴巒染翠蒸霞吐氛於時夷猶徙倚遐眺怡神鸞簫咽夜鼉鼓喧晨爾乃倚楫俯流命酒賡詩黃鳥翩翩白雲離離青萍軟葉碧栁綿絲遼西語燕武昌逰魚璇閨春暖玉塞寒舒滯行子於天涯望征人於絶域韝鷹決起牧馬肥澤煌煌羽蓋隱隱旌旗日華飄彩素月流輝林散紅桃水芳緑蘺斯時也或驅寶馬而徊翔或駕瓊輪以逰嬉或邀靈於洛汭或紉佩於湘湄鳴雕鐘於𥄱澤沸廣樂於咸池集有名賢坐無俗侶羣謔浪以抗髙雲淡容與以遨川嶼桓伊之邃奏劉伶之觴舉量溟渤以為酒衡泰岱以為臡羅萬象於瞬息和造物於天倪極娛樂兮迎上春列逰駟兮來下里曵曵蕩輕衣珊珊揚雜珮望遙路兮驚春獨豫情兮悲涕有草兮萋萋有鳥兮差池徑苔兮蕭瑟庭花兮離披已矣哉春光媚兮秋螢飛春華燦兮秋露晞滄桑詎可定綺羅無復依聊抒情以寄恨結長風以東歸夢逰春賦袁尊尼夫何青春之熙蕩兮欣豫情以遨遊指丹六於城隅巍棲鳯之髙樓隱雕闌以朱箔疏洞户以碧鏤晴露湛其可攬暖氣晶而若浮爾其征驂乍停闔扉徐啓花豔豔兮一人草青青兮千里字比英兮方新名取艾兮信美吐鸚武之慧辭振翡翠之鮮羽瑤席紛其始設金尊絡其遞行蕙肴蒸兮陸海之珍産絲吹作兮蓬閬之清聲流盼睞於目擊狎笑語於心傾金母告豫以好逑毛公謂豫以定情於時月方中夜將半辭歌侣謝酒伴搴璇室之綃帷拂象床之羅薦既抱持而喜當亦逡巡而辭賤極繾綣於兹宵重綢繆於申旦委微軀兮何言奉君子兮靡厭若夫永晝安坐薄暮經門孟公之酲未解北海之筵已醺日何日兮且快飲夕何夕兮復開尊則有姬薑遞進秦虢偕臨婺須映彩蕙蘭挼芬坐間間而成列情耽耽而各伸驟鵾絃兮激檀板理錦筝兮間綺琴舞結風於陽阿謳白雲於西崑夕陽下兮秉燭漏水歇兮逮晨終德將而靜好謝褻態於囂喧爾乃收淫霖濯鮮景望别圃而氣新步曲徑而目騁綺羅灼爍兮分桃李之韶顔金粉繽紛兮逐蜂蝶之飛影芍藥采采以贈豫謂此妍芳之當領促羽觴以勸酬紛盤餐之沓併隨坐卧而各適恣諧謔之機頴籍緑草以為茵竟昏酣而度暝又或開霽閣兮寫素臨晴窗兮題扇親拂几席獨侍筆硯點飛墨於絳祛飄逸鬒於素靣促曉粧而屢淹佇依依而結戀投清言兮能參延靜賞兮可念至若新火迎候上已屆期遵踏青之遺俗修祓禊之故儀度嚴城以容與駕香車以逶迤雨花之髙臺兮紅粧陟而獨眺叢篁之給園兮翠斚傾而共紆曠臨風以舒寫追馳景以旋歸排邃館而再入儼髙晏之重披聊假息兮倦思夜未央兮何其惟歡悰之蟬聫猝殫陳曰錯莫獲一日兮足以極乎三春之娛况三月兮曽無間於一昔之樂顧循省於踰沗徒靦慙於獲落遊子經時兮不知其淹久畸人即次兮靡覺其飄泊緬豫生之何幸眷有美之難忘結長思於知已牽遐想於衆芳鳯臺逈兮簫韻悠秦淮森兮離歌動恍春光兮何在悵兹遊之如夢哀春賦錢福夫何鵜鴂之早鳴促繁英以俱萎雖群芳之共惜嗟國色之猶竒緬惟梁園雪霽金谷暘悲阿房競艷步幛夸靡乃有解語之紫芍協律之黃離露桃妖冶錯髙標於澗竹海棠裊娜噴餘香於江蘺梅蕚妝漢宫之額龍蜒幻褒女之姿羡飛燕於昭陽剪尾涏涏詠鴛鴦於周雅翠羽差差東皇之興方濃青鳥之信將返枕展兮黃梁飯熟衾寒兮羅浮月滿巫女雲銷宓妃珮緩望雨陽臺翳煙霧而莫尋淩波羅襪埋泥沙而誰浣香不聞兮鸞簫寂莫挽兮鳯輦王嬙去兮荒塜青回緑珠墮兮石樓翠掩慨紅紫之皆湮悼西飛之勿綰意乍飄而忽綴誓一逝兮忘轉於是逰人停轂主人覆杯山悽惋以色慘水鳴咽而聲哀月荒涼兮舞榭草莽灌兮歌臺君山笛歇弔娥皇之弗起廣陵琴亡悵王孫之不來時撫檻兮彳于或觸故兮裴回決河方注迂石以阻燎原方熾回風以灰諒無竇之可入豈有緣而匪媒啓重關兮拾遺鈿而永慕隧九地兮誓同心之再諧亂曰珠沈玉殞玻璃迸兮蕙謝蘭枯麝臍燼兮怨歡娛之不終信佳人之薄命妬芳妍而嫉寵亦造物者之深病錢布寰區棹郎不免於飢終輦馳永巷鸃冠竟坐乎短幸悲笳再贖馬嵬一盡知巫咸之難招仗少君而通問縱餘芳之勝初絶殊根而蒂並絲縈縈兮泥融看落紅之成坌却搴帷以無語儷禪關之入定試援筆以哀吟續白老之長恨禊賦薛章憲月朏明生風恬日熙修厥禊事聊張水嬉崎岸斗絶以噴洙長河迤邐而漣漪我酒既旨苾苾芬芬亦有嘉肴以炙以燔烹魚擊鮮炮鱉胹燔靈鼉逄逄威鳯翩翩螭頭掉而輕矯鷁羽斾而髙騫鴛鴦在梁鳬鷖在亹童冠雲集僕夫雷奔艤楊栁之陂塍憩枳棘之墓門意行無尚為樂無方爰除地以布席因流潦而泛觴乃歌乃舞乃祓乃禳袒裼襟裾淋漓衣裳或撫掌以蹲踞或攘臂而跳踉或偃仰其側或攖攘其旁酒力浥而陸沉兮類投醪於洪波杯既舉而流澌兮類覆水於坳堂舉桞州之故事率蘭亭之舊章杯疾如駛衆樂如狂靡三爵而有莭雖百觚而無荒既醉既飽言旋言歸匪依稀於卜洛亦庶幾於浴沂豈湛樂之是從舍齊聖其疇依以永今朝樂景物之容與未卜其夜恨林光之熹微已而返棹亦既徹爼四簋更設六博再舉肴蓛煮兮翠竹崩饙饎炊兮赤梁秬歌鶴鳴之在隂咏鴻飛之遵渚清謳間發荃橈斯弭日之夕矣瓶之罄矣三揖以上一笑而止修禊賦黃卿維嘉月之昭淑兮慶升平之豫休元已倐其依辰兮祓濯躍其可修要草莽之莫逆兮恣談笑以綢繆有頎頎不速以來兮荷衣蕙帶之紑紑霽雲拂其四沒兮條風習習其燠柔言弭步於湄澳兮策扶老之刻鳩逄龎眉之省田兮訝我行之焉求遡動樂之孔訓兮眷夷猶于芳洲山近郭以導泉兮浼浼秩秩其長流雖未比於名川兮清淺適以盥潄平聲曰順時以解禊兮除穢纍于洋洋曠襟宇以騁望兮揖相祝以吉祥石齒齒以立波兮聊浮泛乎羽觴籍柳楊之為幄兮潔野肴之我將傾蟻醑之如鬯兮復罍繼之椒漿蓛逺採以充案兮左右芼之芹香有起觀于檻泉兮或聆别𣲖之漎漎試一壺之泳下兮漂絳棗之泱泱蒲藥弱水可紉兮嗅杜若之微芳荷吐波之如錢兮辨荃芷之萌芒羌油油如各有得兮罄俯仰之徜徉余久滯於塵㙠兮載滌涴於滄浪振衣嘻而欣欣兮朗誦盤銘之章粵兹禊之源逖兮稽隨波之逸詩謂秦昭之金人兮殆諞讕之兢竒若溱洧之士女兮彼淫謔之可嗤洛水盛集之罔莭兮灞渭遊觀之荒嬉慨吾邦之過朴兮奚云飲祓之非懿猗曽晳之超然兮偕童冠以浴沂眷來逰之擇良兮咸溫溫而不比較張弛之中兮豈厭厭沉酣之為矧林澤之幽寂兮逺鄽市之喧豗倉庚睍睍叢樾兮玄鳥翐其旋廽飄絮風絲之曵曵兮鷺鶬沿洄以相隨於牣鯈蝦之上下兮萍藻翠迷乎隩隈善飛潛之油油兮逄漁獵而阻麾賔辭觥以詠歸乎恐華胥之晡暌願靚貞之靡愈兮嵗其遊以綏綏明文海卷六
