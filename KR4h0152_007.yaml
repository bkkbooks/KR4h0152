body:
  text: 明文海巻七餘姚黄宗羲編賦七時令二聽秋賦桑悦大化運行禪續無垠炎帝既斂少昊迺伸是名為秋萬物返真脱木之葉解草之節川瘦兮徒濓濓山凋兮孤岊岊惟為狀之荒凉宜出聲之凄切若乃嚴霜降白露凝天籠薄隂地吐濕蒸布落寞之景象假物物而悲鳴蟋蟀何怨而長夜訴征鴻何興而清晨吟慘莫慘兮風颷落木之韻清莫清兮雨激芭蕉之音淡日銜山助以懐舊之笛凉月墮水雜以寄逺之砧足以凋公子之朱顔凄壯士之素襟而况薄宦淹璞中之玉逺賈盡床頭之金鄉闗忽縮而近念親故乆疎而暗尋寜不逓霜華而入鬢滴蘖汁以經心者乎僕本豪徒慷慨輕生流落江湖汎飄萍嵗聞兹聲亦忳予情既而嘆曰聲從外來何由内驚豈内不足而為外攖爰主吾敬爰鑰吾扄久而吾内澄澄吾秋冥冥聲從何來摳衣而聽毛骨爽兮心胸明塵影滅兮夜氣清寂亂思之毣毣沉萬慮之營營豈為予情之美惡私喜収物之功成是知非秋景之可悲兮人獨悲傷乎秋景非秋聲之難聽兮人自難聽乎秋聲伊兹秋之為酷轢賢逹而獨忍又欲假名賢之凄韻增萬世之孤憤故宋玉謂皇天平分四時兮竊獨悲此廪秋潘安仁謂嗟秋日之可悲兮諒無愁而不盡出兹聲之尤切潜雕肝而琢腎予方觀天道之肅殺付悲秋于一哂悲夫天有四德元亨利貞人有四德仁義禮智秋之為秋在天為利在人為義君子全德是名不器于焉為文音僃五音味備五味混同天人秋吾一氣鳴吾文之商聲曽内外之足異夫然後知心源未和伏以憂蒂雖春日載陽花明景䴡聞鳥鳴之嚶嚶與童冠之歌詠亦足以欎悒而侘傺也秋懐賦屠應峻陸大夫為儀制郎中積功飭行為天子所知而宰臣議階出奉閩臬僕鄙人也撫時即事喟焉賦之于時秋也因以秋懐命篇其詞曰何秋氣之疹蠱兮儆素律之凄凄申鳴鶴使戒露兮萎修蘭于枯丘叢林旖旎奄以夕勁兮㳺氛殞葉風揚埃慄慄邑邑物錯迕而就罷兮寥落晃朗天髙而日微蝉中寂又續厲兮熠燿的的而宵燔𤣥鳥泝隂以辭宇兮㕍即陽而南征繄雝雝其羣諧兮予罔沕兮而懐友生固秋士之易哀兮感物化之難凴送將歸返故都兮心淹留而自閔子捐故而偶新兮予怦怦其若履淵不吾知其奚怨兮竊悲夫今之人蹇余生之諒直兮弱好以崇方豈惟紉蕙而佩芷兮固茹瓊而沐芳光陸離以周襲兮中矯厲而慨慷指前修使先導兮驂騏驥而服飛黄悼世俗之傾隘兮信多岐而亡羊黨機巧以㨗歩兮競詭異而改則予將持頑刄而釋堅兮固􅚖􅚖而難入眩羊腸與九坂兮方世路其猶夷棘剗剗于厥心兮誘穽檻而寤歌勢軋軋而並轡兮剚白刃而仇之瞻崛􅔍以蔽目兮遌峨峨其愉之混淆濁而伐異兮寳偽而汰真匊燃灰謂光於天兮指日月其不煒岱華坎其汚泥兮尾閭突而溢山婦鬚而男則幗兮鵬一羽而巨焦明宜虎翼而虺足兮雞牝晨而喑雄予雖要明月與懸黎兮咄黯黯而宵黜欎頷額余增欷兮子揆予之惻惻固鄰徳而不孤兮信内美其必合車間関有両輪兮耕藉藉且焉偶獲子信姱以倜儻兮又重之以修能恊神人使揆序兮帝爰褒之曰功彼登佞而折良兮陳臬事其以華采衣之粲粲兮武蹲蹲于冠弁夫孰命其匪恩兮余竊疾夫衆女之善妬而諑滛嗟驕人信好好兮奄乘髙而斁度躬絶命猶弗逭兮澤賫讒而翼怒予謂棟且隆隆兮羗撫穢而得路伊霖之效尤兮奚婪婪其求索余將望閶闔撫神龍兮虎豹耽耽其碭突鑱鎗阿那以抱日兮靁砰砰而存外夫哲后豈弗寤兮孰九死其奚語彼粲春之謇謇兮迅隠軫而北南懐邅廽猶未悔兮余覯夫裕之與安豈縷数其不可殚兮離多難而浩嘆子欣欣其逺逝兮矯九仭而降觀朝策馬于燕都兮夕次于魯之郊揖叔旦而質迓衡兮邈吐哺之上休馳汶陽且弭莭兮祗神宫而淹留庶穆穆其猶儼兮或見聖而永由存靈光而嘅渠渠兮喟佾舞胡以逾長太息而升降兮廹南征之悠悠歴豊沛而壯漢兮陟歌風之故䑓唯從諫若轉圜兮遵后皇其弼諧閔作忠而賈怨兮南浮江而吊鴟夷彼瓦瓿鳴以為惡兮矧黄鍾之若雷躋㑹稽之嶐崇兮就文命而歴兹既𤣥𤣥莫予聞兮遙緘辭而徘徊躋武夷其隠天兮嶃﨑嶇乎獨處廓騁四望以忘憂兮遽懐余之逴逴伊仙鯉之忽恍兮具靈糈為予占之帝赫赫卑而諒衷兮命掌夢使報嘉曰懋戬榖以自持兮孰險巇而弗崩茍執徳之無爽兮般修名之􅀈􅀈余服訓而絶俗兮阽危而不能舎也子玊藴以自珍兮庶來美而該輔也亂曰浮雲泱欎秋日曀兮鳯翔于淵鮑魚御兮余溘與百草同死兮胡駑駘以方驥兮余寧鏌鋣之刓以棄兮胡同鈆刀在室兮心結悁而莫從予兮荃易晰奚終懼兮秋賦盧柟楚襄王與宋玉㳺於雲夢之臺舎蘭臺之館浮漢沔略江潭射揚林眺䝉山游旌蜿蟺法象緯嫿輝䕃三湘氣彌七澤猗蘭幽以承珮芳桂逺而延軛輦瑶華之繽紛翔翠羽之翩􅀈於時凉月懸珪白露凝輝寒風鳴條微霜沾衣宵霧靄兮逺山崟暮烟横兮長河湄王廼抽牘揄翰以命宋玉曰疇昔雲夢之逰子大夫為寡人賦髙唐未及蘭臺之駕子大夫為寡人賦雄風方今日馳虞淵鶗鴂先鳴汗漫淒漺無以攄情子大夫未有說乎願為寡人賦之宋玉于是逡廵改容釋位離次跪而稱賦曰臣聞天地無閡乾坤斥衍剛柔沓分時序交禅春華發榮秋實振晏其為體也博確鴻固專翕亷凝收歛像類參伍元英乾徤不息弼成罔極上偹天道下全王德秋之時義大矣哉夫其朱明既退招拒斯昻蓐收弭葢少皥弛裝闢白門肅金方韜炎飈激清商焦溪涸而不流沸潭潜而弗揚爾其為氣也氤氲膠戾濞􅞡頽隤蓊翳綸菌掣蹠礴霈噏噏忽忽撞搪􅐀磥若廼觸土囊汙汚之口噭大木圈枅之竅熛厲叱嗃廽戯突嘯耾勃碭駭踾踧攅號倐拂改莭和喁稍嘈崪兮若促絃柱而摛筝􅌙迆兮若逸擠而鳴塤囂絪緼窳圔横酸欎陶爾其為容也澹淡晻曀皓嵩曭㬒斥坱􅀈漫廓落鴻敞荒裔凌厲上下䆲䆡黤靄轉薄㳺氛軼蕩紛態横出藴懐悵惘蕭瑟寂寥恫恨憯悽孤臣孽子遷客棄婦莫不感心傷氣流涕増欷爾其童濯崯巘分披嵓􅀢䟽離案衍宣囘㟼􅊤泐㟁崢嶸群山蕭索劉厲彌平寂寥空㬑於是清𤣥海落長江抑舄澤熒扶桑潜渫浡潏蜜鱗漰瀼霜凝龍窟霰落鼉房鮫人泣珠海童滅光陽侯馮夷天吴􅀈像魂銷魄揚率悉愴怳若乃芟糜森蔚泬寥林䧜隳葩搭􅭭伐萌沙橖繫精於松檜之林獵芳於桂椒之圃被杜若委庭蘭䝉江離夷射干翠葉紫莖朱蕚秀華隨風振綺應日傾葩於是雁㳺江浦雀流海濵燕歸𤣥穴蝉寂窮林蟋蟀宵征鵾雞夜吟隂凝氣潰萬物凋瘁倘有蔵身後時削跡未逮披零雹衝凍􅀢拆跂裂吻而死者不可稱計若夫志士坎壈中人薄寒蹇産淹留感時増歎惻懭迮莭忿瞀溷慁燎慄於邑絓結弗變此夫閉蔵萬有撙莭造化忌盛憂滿唯秋之謝王廼乘戎輅載素旂服白玊駟雲螭居明堂命將帥誅暴慢明好惡嚴㫁刑修法制繕囹圄决訟獄感氣順化應時承治所以張弛乎仁義之道彌縫乎禮樂之文於是東漸西被恩殚無垠修臂鑿齒之邦結胸驩頭之民幪鳯凰箱麒麟縶猛獸籠文禽薦上國充珍肆於昭聿皇萬萬嵗九日賦俞允文肇九旻之令莭肅凄辰之始霜悴百卉於緑林歛萬實於白蔵于時律中無射日躔在房山榝凝丹禽華吐黄感靈鍾于豐嶺收帝籍于神倉惟日月之並應数遘九而皆陽懿嘉名之宜久故髙㑹而薦觴或助術于彭祖或弭禍于長房或差實以效新或飡服以致康若乃駕言龍山于兹颷舘發戱馬之楚臺弋翔鴻于沙苑咸宴凱而稱詩悉釣竒而摛掞至如紫塞草白蒼山氣髙雲物無擾上屬澄霄觔竿精堅弓勁鷹豪狐兔鮮肥人馬並驕弢千緷之赤羽勒萬騎之黒貂或翔畋于廣虚之野或校獵于莽蒼之郊彌岡巒而掩格被川谷而横梢莫不致竒獲以耀武聊割鮮而騁豪及夫蘭閨少婦榆闗疲客結離思之幽遐念佳期之永隔睇來雁而増欷學裁鴛而掩泣寒聲壯兮悽心脾夜被空兮月入室徒有地兮限南北欲授服兮無由得愴無由兮思彌深鍼縷列跡兮抽余心心之抽兮魂四溢魂四溢兮夢難集雖有刀尺兮忘疇昔或有放臣去國感平分兮測景志士思名薄迅商而孤騫悇憛兮迍邅淹留兮蹇連繁隂積兮欎素川雲瞀瞀兮蔽窮天怳踟蹰而延佇眇去楚而辭燕于是僕本畸人棲遲丘樊于焉逍遙聊以盤桓驚四序之改莭悲倐忽之徂年想前蹤之攸邁覧窮逹之異源超遐廻以暢志玅衆志而為言憂歡軋其相承兮心與蹟猶未冺世固智寡而艱多兮孰云喻其萌秪之所先齊萬族乃無累兮求周賈之冥荃庶凴化以無吝兮還吾反乎自然樂田賦孫宜當秋期之既迨適夏緒之聿征晨颷作而漸厲時雨降而已盈罷轆轤於渚際弛桔橰於漢隂田畯自喜其至止農夫告予於西成整柴車而祗候命稚僕以相迎矜畎疆之多沃幸醴醑之惟馨廼晨興而夙戒爰星駈而露駛䑲孤舟以迅發挈良朋以偕啓渡淼莽之平湖經澄鮮之曲汜採菱荷以娱適叩舷􅀈以停弛望依微之村落指迢逓之墟里舸沿岸以前逹帆順風而遙艤載行阡陌遂訊畛畭闢䋲樞之闃静坐茂樹之扶踈覧桑榆之被畆盻禾稼之滿疇欣螟蟊之胥避慶蝻蝗於畢逋信實堅而實好良我翼而我與徵魯年之大有驗豳風之匪誣於是督豎腰鎌課童荷笠領婦子以咸勤倩傖僑而丕集刈黄雲之彌漫走緑蕪之絡繹規場圃於塽曠屏雞豚於隅隙戒滯穗而勿遺趂凉晨而維亟既則引觴肆酌命酤髙傳淹留町曲酩酊畦偏感成都之多植慰杜曲之有田殊雒陽之貧薄類周邦之十千醉何憂於得秫飽豈患於具饘時或趿履畤疃輟策塍壠乘輕颸之塏暢躭霽日之輝拱嘑老農以共談調黠佃以相恐溷頑牧而謔浪裭拾秉而冁唪匙饁飱而靡嫌甌宜飲而隨捧躬芟割以自甘假胼胝以相踵廼有隣叟暨彼里翁挈罇相過饋榼來從排几席於梁茨息杖屦於南東話桑麻之共裕詢今昔之㡬豐校倉箱之多寡述繇税之從容緬傾壺而匪厭聊續斚而再同時乎逝晷沉冥䦨暉暝側雲黯靉而宵馳宿晶熒而夕列歸巢林之群鳥揚攔户之片月萃畬師而致送整角巾而言别尋向舸之繫維泛前舟之超越景森颯而堪娱興流連而未歇嗟予生之寡分際斯世之多艱始修辭於楚激中投藝於燕関將干霄而鳯舉竟偃翮而龍蟠從遯栖之末計矢耕鑿之餘閒惟俯仰之無累斯嘯傲之可安既以身為農父又何恧乎稼觀顧斗升之儉收藉昊蒼之恒稔願霡霂之嵗㴻冀霪霖之時拯渠漬潤而可溉陂浩蕩而堪引澤我黍之秀實充乃陳之庾廪念鄙人之寡入俾竟保乎箕頴倘接禩而屡登約常㳺而來省明文海卷七
