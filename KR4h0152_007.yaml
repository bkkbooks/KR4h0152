body:
  text: 明文海卷七餘姚黃宗羲編賦七時令二聽秋賦桑悅大化運行禪續無垠炎帝既斂少昊乃伸是名為秋萬物返真脫木之葉解草之節川瘦兮徒濓濓山凋兮孤岊岊惟為狀之荒涼宜出聲之凄切若乃嚴霜降白露凝天籠薄隂地吐濕蒸布落寞之景象假物物而悲鳴蟋蟀何怨而長夜訴征鴻何興而清晨吟慘莫慘兮風颷落木之韻清莫清兮雨激芭蕉之音淡日銜山助以懷舊之笛涼月墮水雜以寄逺之砧足以凋公子之朱顔凄壯士之素襟而况薄宦淹璞中之玉逺賈盡床頭之金鄉關忽縮而近念親故久疏而暗尋寧不遞霜華而入鬢滴蘖汁以經心者乎僕本豪徒慷慨輕生流落江湖泛飄萍嵗聞兹聲亦忳豫情既而嘆曰聲從外來何由內驚豈內不足而為外攖爰主吾敬爰鑰吾扄久而吾內澄澄吾秋冥冥聲從何來摳衣而聽毛骨爽兮心胸明塵影滅兮夜氣清寂亂思之毣毣沉萬慮之營營豈為豫情之美惡私喜收物之功成是知非秋景之可悲兮人獨悲傷乎秋景非秋聲之難聽兮人自難聽乎秋聲伊兹秋之為酷轢賢逹而獨忍又欲假名賢之凄韻增萬世之孤憤故宋玉謂皇天平分四時兮竊獨悲此廪秋潘安仁謂嗟秋日之可悲兮諒無愁而不盡出兹聲之尤切潛雕肝而琢腎豫方觀天道之肅殺付悲秋于一哂悲夫天有四德元亨利貞人有四德仁義禮智秋之為秋在天為利在人為義君子全德是名不器于焉為文音僃五音味備五味混同天人秋吾一氣鳴吾文之商聲曽內外之足異夫然後知心源未和伏以憂蒂雖春日載陽花明景麗聞鳥鳴之嚶嚶與童冠之歌詠亦足以欎悒而侘傺也秋懷賦屠應峻陸大夫為儀制郎中積功飭行為天子所知而宰臣議階出奉閩臬僕鄙人也撫時即事喟焉賦之于時秋也因以秋懷命篇其詞曰何秋氣之疹蠱兮警素律之凄凄申鳴鶴使戒露兮萎修蘭于枯丘叢林旖旎奄以夕徑兮遊氛殞葉風揚埃栗栗邑邑物錯忤而就罷兮寥落晃朗天髙而日微蟬中寂又續厲兮熠耀的的而宵燔玄鳥泝隂以辭宇兮堆即陽而南征繄雍雍其羣諧兮豫罔沕兮而懷友生固秋士之易哀兮感物化之難憑送將歸返故都兮心淹留而自閔子捐故而偶新兮豫怦怦其若履淵不吾知其奚怨兮竊悲夫今之人蹇余生之諒直兮弱好以崇方豈惟紉蕙而佩芷兮固茹瓊而沐芳光陸離以周襲兮中矯厲而慨慷指前修使先導兮驂騏驥而服飛黃悼世俗之傾隘兮信多岐而亡羊黨機巧以捷步兮競詭異而改則豫將持頑刃而釋堅兮固􅚖􅚖而難入眩羊腸與九坂兮方世路其猶夷棘剗剗于厥心兮誘穽檻而寤歌勢軋軋而並轡兮剚白刃而仇之瞻崛􅔍以蔽目兮遌峨峨其愈之混淆濁而伐異兮寶偽而汰真掬燃灰謂光於天兮指日月其不煒岱華坎其汚泥兮尾閭突而溢山婦鬚而男則幗兮鵬一羽而巨焦明宜虎翼而虺足兮雞牝晨而喑雄豫雖要明月與懸黎兮咄黯黯而宵黜欎頷額余增欷兮子揆豫之惻惻固鄰德而不孤兮信內美其必合車間關有兩輪兮耕藉藉且焉偶獲子信姱以倜儻兮又重之以修能協神人使揆序兮帝爰褒之曰功彼登佞而折良兮陳臬事其以華采衣之粲粲兮武蹲蹲于冠辨夫孰命其匪恩兮余竊疾夫衆女之善妬而諑淫嗟驕人信好好兮奄乘髙而斁度躬絶命猶弗逭兮澤賫讒而翼怒豫謂棟且隆隆兮羌撫穢而得路伊霖之效尤兮奚婪婪其求索余將望閶闔撫神龍兮虎豹耽耽其碭突鑱鎗阿那以抱日兮靁砰砰而存外夫哲后豈弗寤兮孰九死其奚語彼粲春之謇謇兮迅隱軫而北南懷邅廽猶未悔兮余覯夫裕之與安豈縷數其不可殫兮離多難而浩嘆子欣欣其逺逝兮矯九仭而降觀朝策馬于燕都兮夕次于魯之郊揖叔旦而質迓衡兮邈吐哺之上休馳汶陽且弭莭兮祗神宫而淹留庶穆穆其猶儼兮或見聖而永由存靈光而慨渠渠兮喟佾舞胡以逾長太息而升降兮迫南征之悠悠歷豐沛而壯漢兮陟歌風之故臺唯從諫若轉圜兮遵后皇其弼諧閔作忠而賈怨兮南浮江而吊鴟夷彼瓦瓿鳴以為惡兮矧黃鍾之若雷躋會稽之嶐崇兮就文命而歷兹既玄玄莫豫聞兮遙緘辭而徘徊躋武夷其隱天兮嶄﨑嶇乎獨處廓騁四望以忘憂兮遽懷余之逴逴伊仙鯉之忽恍兮具靈糈為豫占之帝赫赫卑而諒衷兮命掌夢使報嘉曰懋戬榖以自持兮孰險巇而弗崩茍執德之無爽兮般修名之􅀈􅀈余服訓而絶俗兮阽危而不能舍也子玊藴以自珍兮庶來美而該輔也亂曰浮雲泱欎秋日曀兮鳯翔于淵鮑魚御兮余溘與百草同死兮胡駑駘以方驥兮余寧鏌鋣之刓以棄兮胡同鉛刀在室兮心結悁而莫從豫兮荃易晰奚終懼兮秋賦盧柟楚襄王與宋玉遊於雲夢之臺舍蘭臺之館浮漢沔略江潭射揚林眺蒙山遊旌蜿蟺法象緯嫿輝蔭三湘氣彌七澤猗蘭幽以承珮芳桂逺而延軛輦瑶華之繽紛翔翠羽之翩􅀈於時涼月懸圭白露凝輝寒風鳴條微霜沾衣宵霧靄兮逺山崟暮煙橫兮長河湄王乃抽牘揄翰以命宋玉曰疇昔雲夢之逰子大夫為寡人賦髙唐未及蘭臺之駕子大夫為寡人賦雄風方今日馳虞淵鶗鴂先鳴汗漫淒漺無以攄情子大夫未有説乎願為寡人賦之宋玉于是逡巡改容釋位離次跪而稱賦曰臣聞天地無閡乾坤斥衍剛柔沓分時序交禪春華發榮秋實振晏其為體也博確鴻固專翕亷凝收斂像類參伍元英乾健不息弼成罔極上偹天道下全王德秋之時義大矣哉夫其朱明既退招拒斯昻蓐收弭蓋少皥弛裝闢白門肅金方韜炎飈激清商焦溪涸而不流沸潭潛而弗揚爾其為氣也氤氲膠戾濞􅞡頽隤蓊翳綸菌掣跖礴霈吸吸忽忽撞搪􅐀磊若乃觸土囊汙汚之口噭大木圈枅之竅熛厲叱嗃廽戲突嘯耾勃碭駭踾踧攢號倐拂改莭和喁稍嘈崒兮若促絃柱而摛筝􅌙迆兮若逸擠而鳴塤囂絪緼窳圔橫酸欎陶爾其為容也淡淡暗曀皓嵩曭㬒斥坱􅀈漫廓落鴻敞荒裔凌厲上下㝩㝗黤靄轉薄遊氛軼蕩紛態橫出藴懷悵惘蕭瑟寂寥恫恨憯悽孤臣孽子遷客棄婦莫不感心傷氣流涕增欷爾其童濯崯巘分披嵓􅀢疏離案衍宣回嶅􅊤泐岸崢嶸群山蕭索劉厲彌平寂寥空㬑於是清玄海落長江抑舄澤熒扶桑潛泄浡潏蜜鱗漰瀼霜凝龍窟霰落鼉房鮫人泣珠海童滅光陽侯馮夷天吳􅀈像魂銷魄揚率悉愴恍若乃芟糜森蔚泬寥林塘隳葩搭􅭭伐萌沙橖繫精於松檜之林獵芳於桂椒之圃被杜若委庭蘭蒙江離夷射干翠葉紫莖朱蕚秀華隨風振綺應日傾葩於是雁遊江浦雀流海濵燕歸玄穴蟬寂窮林蟋蟀宵征鵾雞夜吟隂凝氣潰萬物凋瘁倘有藏身後時削迹未逮披零雹衝凍􅀢拆跂裂吻而死者不可稱計若夫志士坎壈中人薄寒蹇産淹留感時增歎惻懭迮莭忿瞀溷慁燎栗於邑絓結弗變此夫閉藏萬有撙莭造化忌盛憂滿唯秋之謝王乃乘戎輅載素旗服白玊駟雲螭居明堂命將帥誅暴慢明好惡嚴斷刑修法制繕囹圄決訟獄感氣順化應時承治所以張弛乎仁義之道彌縫乎禮樂之文於是東漸西被恩殫無垠修臂鑿齒之邦結胸歡頭之民幪鳯凰箱麒麟縶猛獸籠文禽薦上國充珍肆於昭聿皇萬萬嵗九日賦俞允文肇九旻之令莭肅凄辰之始霜悴百卉於緑林斂萬實於白藏于時律中無射日躔在房山榝凝丹禽華吐黃感靈鍾于豐嶺收帝籍于神倉惟日月之並應數遘九而皆陽懿嘉名之宜久故髙會而薦觴或助術于彭祖或弭禍于長房或差實以效新或餐服以致康若乃駕言龍山于兹颷館發戲馬之楚臺弋翔鴻于沙苑咸宴凱而稱詩悉釣竒而摛掞至如紫塞草白蒼山氣髙雲物無擾上屬澄霄斤竿精堅弓徑鷹豪狐兔鮮肥人馬並驕韜千緷之赤羽勒萬騎之黑貂或翔畋于廣虛之野或校獵于莽蒼之郊彌岡巒而掩格被川谷而橫梢莫不致竒獲以耀武聊割鮮而騁豪及夫蘭閨少婦榆關疲客結離思之幽遐念佳期之永隔睇來雁而增欷學裁鴛而掩泣寒聲壯兮悽心脾夜被空兮月入室徒有地兮限南北欲授服兮無由得愴無由兮思彌深針縷列迹兮抽余心心之抽兮魂四溢魂四溢兮夢難集雖有刀尺兮忘疇昔或有放臣去國感平分兮測景志士思名薄迅商而孤騫悇憛兮迍邅淹留兮蹇連繁隂積兮欎素川雲瞀瞀兮蔽窮天恍踟蹰而延佇眇去楚而辭燕于是僕本畸人棲遲丘樊于焉逍遙聊以盤桓驚四序之改莭悲倐忽之徂年想前蹤之攸邁覽窮逹之異源超遐回以暢志妙衆志而為言憂歡軋其相承兮心與迹猶未泯世固智寡而艱多兮孰云喻其萌秪之所先齊萬族乃無纍兮求周賈之冥荃庶憑化以無吝兮還吾反乎自然樂田賦孫宜當秋期之既逮適夏緒之聿征晨颷作而漸厲時雨降而已盈罷轆轤於渚際弛桔橰於漢隂田畯自喜其至止農夫告豫於西成整柴車而祗候命稚僕以相迎矜畎疆之多沃幸醴醑之惟馨乃晨興而夙戒爰星驅而露駛䑲孤舟以迅發挈良朋以偕啓渡渺莽之平湖經澄鮮之曲汜採菱荷以娛適叩舷􅀈以停弛望依微之村落指迢遞之墟里舸沿岸以前逹帆順風而遙艤載行阡陌遂訊畛畬闢繩樞之闃靜坐茂樹之扶踈覽桑榆之被畝盻禾稼之滿疇欣螟蟊之胥避慶蝻蝗於畢逋信實堅而實好良我翼而我與徵魯年之大有驗豳風之匪誣於是督豎腰鎌課童荷笠領婦子以咸勤倩傖僑而丕集刈黃雲之彌漫走緑蕪之絡繹規場圃於塽曠屏雞豚於隅隙戒滯穗而勿遺趂涼晨而維亟既則引觴肆酌命酤髙傳淹留町曲酩酊畦偏感成都之多植慰杜曲之有田殊雒陽之貧薄類周邦之十千醉何憂於得秫飽豈患於具饘時或趿履畤疃輟策塍壠乘輕颸之塏暢耽霽日之輝拱呼老農以共談調黠佃以相恐溷頑牧而謔浪裭拾秉而囅唪匙饁飱而靡嫌甌宜飲而隨捧躬芟割以自甘假胼胝以相踵乃有鄰叟暨彼里翁挈樽相過饋榼來從排几席於梁茨息杖屨於南東話桑麻之共裕詢今昔之幾豐校倉箱之多寡述繇稅之從容緬傾壺而匪厭聊續斚而再同時乎逝晷沉冥闌暉暝側雲黯靉而宵馳宿晶熒而夕列歸巢林之群鳥揚攔户之片月萃畬師而致送整角巾而言别尋向舸之繫維泛前舟之超越景森颯而堪娛興流連而未歇嗟豫生之寡分際斯世之多艱始修辭於楚激中投藝於燕關將干霄而鳯舉竟偃翮而龍蟠從遁栖之末計矢耕鑿之餘間惟俯仰之無纍斯嘯傲之可安既以身為農父又何恧乎稼觀顧斗升之儉收藉昊蒼之恆稔願霡霂之嵗澍冀霪霖之時拯渠漬潤而可溉陂浩蕩而堪引澤我黍之秀實充乃陳之庾廪念鄙人之寡入俾竟保乎箕頴倘接祀而屢登約常遊而來省明文海卷七
