body:
  text: 明文海卷八餘姚黃宗羲編賦八時令三感秋賦楊鏘昔潘安仁賦秋思自謂寓直騎省如池魚籠鳥有江湖之思蓋抱空興而抒懷焉者也余擯迹田野放浪山水其覽於秋者較安仁為適矣夫曠寂之境間則來親變化之機靜乃入悟王子安云仰觀俯察覺宇宙之無窮興盡悲來識盈虛之有數古今之致感一也因作賦焉其辭曰伊一氣之屈伸兮代謝其如轉轂惟大火之西流兮實金帝之司律化功成而退藏兮還天地之靜篤紛萬象其無垠兮凜一秋以自肅綦澄徹而峭露兮見山水之神骨覩離披而委脫兮悟分氣之已足彼春夏之隆隆兮諒此中之所蓄惟草木之無知兮靡怨雕而羡榮茍未免夫有情兮憮大化以衷怦齊闢翕於一槖兮而胡茂悴之不倫蟬何伏而螿振兮梧何催而菊紛玄鳥孰驅而逝兮隼孰激而彌嗔曰運序之肅殺兮而又何愛於松筠若乃楚臺悲風漢宫悽月銷宋玉之魂傷班姬之魄餐落英而容枯羈華省而頭白白雲飛兮汾河帝子望兮悲歌野茫茫兮荒草孤臣去國兮哀多固氣機之蕭瑟易感將物性之遷流奈何惟逹人之觀化兮稔倚伏而內昭慨愚情之中沸兮沮搖落而愈忉謂龜靈而鳩拙兮鼠果而特擺謂巧之可乞兮羽化之可徼發華亭之永歎分昧亢龍之有悔灑牛山之癡淚兮忘爽鳩之遺巢是猶艷朱華之眩爛兮意回姿於寒條耽惠風之和暢兮期反吹乎涼飈靜觀夫盈虛之有數兮彼惡知夫計拙而心勞聊優遊以卒嵗兮息輾轉於秋宵秋暑賦錢府乃者朔日立秋月維為七金不畏火三伏已畢人思涼風罔聞蟋蟀田禾幾希乎稿苑園栁相將乎枯卒嗟細流之涓涓傷眢井之沕沕黃塵蔽天兮鳥墮髙枝火雲曵地兮兔迷三窟奔走群望者徒請靈祠之泉干掫民社者莫救閭閻之疾蓋田坼水乾車竭人疲黃冠十輩紫壇八壝雖籲天而舞迎龍而祀斃青蛇於石甕書朱鳥於白旗靈符焚而不驗木郎誦而聲微秋陽皓皓愈熾炎風昏昏橫吹夜月炯爍蟇兔安在繁星陸離牛女莫知蚊薨薨而雷動螢輝輝而光移禁酒沽而潛釀斷屠宰而公欺徒填吏卒之腹何關雩禱之辭已矣乎天不悔禍吏競逞威嵗不恆稔民漸阻飢赭鞭載道已見臀之無膚繡斧當路誰念民之無衣而身居涼館更圖式廓其門堂囚多暍死尚且增髙其圜扉是欲求飽而自食其尾思肉而自殘其肌者矣嗚呼餘殃未解殘暑尚酷實上天之降災乃斯民之塗毒豈有白藏屆序商飈轉而愈熱夷則改律涼颸動而猶浴幸是不修明堂之禮左個莫御倘或追復迎秋之典少昊焉屬哉意者世界缺陷民多貪媱鷹攫虎視人面獸心狐鼠依城而縱肆豺狼當道而嗥吟妖言邪説令色孔壬貪叨在列鴟梟在林為鬼為蜮為獸為禽非此金翅可以竭阿耨之水修羅可以障日月之明者乎又有山人墨客目不識丁出必駕髙車交必盡顯者行必假薦書東西贄謁彼此吹噓筵非窮水陸客不集簮裾匪徒驚動乎四鄰實則炫耀乎通衢由此可以避堅攻瑕由此可以批亢搗虛由此可以焚林羅鳥由此可以竭澤取魚律以姦民之法所在必至誅戮究至感應之理城市寧不丘墟者乎説者徒咎夫使者四出椓人縱恣絶地脈以求礦竭山澤而求器搜索逺方之琛橫鼓空山之鞲民心嗷嗷一摑一痕衆志喁喁一哭一淚然而綱紀不弛正直在位未至泮渙尚堪飾治惟僉人繆托祖述偽學髙談仁義陰奪王者之權陽伸正人之氣尊人而實自尊媚人而實自媚期將簧鼓一時思欲籠罩一世而不知其假仁以濟其貪仗勢以逞其忮者也所以帝赫斯怒秋行夏令金流不止火恆為政農欲投繯民咸請命赤地千里焦勞萬姓白雲凝而不飛素娥藏而無鏡捲河水兮蹙天吳截鳯翅兮崇梟獍噉秋荼而口螫履熱沙而足􅚢上干天地之和下拂士民之性欲祈嵗候之調尚須燮理之功若驅厲民之虐是在救時之聖秋聲賦錢府四時行焉天載無聲九夏云徂金風序更俄蕭蕭而瑟瑟忽隱隱而怦怦憀兮栗兮衆竅或沸噌兮吰兮萬籟齊鳴井吹梧兮歷落撼庭竹兮悽清透衣襟兮淅瀝拂絃柱兮琮琤嘐唳晴空豈惟候鷹睍睆踈栁全異鶬鶊玉露瀼瀼促織應候入我床下巷戰穴閗絡緯警懶振羽鼓脰良宵明月掉籰控簆蜩螳迎秋長吟白晝蟪蛄飲泥悲嘶隂竇於斯時也征戍遼陽衰草白楊卧一甌脫能無悲傷逆旅江湖家鄉路長酒酲不睡能不悽涼鰥居寂寞祗剩半牀夢回轉展裂肝斷腸棄妻怨妾共居一房燈暗夜闌墮淚千行秋之為聲何其悲也聲之感人何其切也忠臣飲氷孝子泣血志士刳心讒夫結舌雖華堂公子亦驚簷馬悲嘶縱巖栖隱者當咏流泉嗚咽况逢桂雨之蕭蕭更挹稻風之揭揭思往事以縈懷抱孤憤而莫雪忽入耳而牽情不當食而隨噎乎至若舊歷將半新榖既升或登髙而望逺思涕泗之無憑山寺齋中黃葉一僧樵樓夜漏黃卷孤燈乍點點而滴滴又逢逢而鼕鼕誰人無心四顧而生侘傺誰人無情反側而妨寢興嗚呼秋既有聲春豈無之梁間燕子花裡蜂兒先春而鳴者百舌抵夏而啼者黃鸝笙歌絃管笑語逰嬉無人不悅無聲可悲惟蓐收臨御聲屆秋而索然太史調律客審音而傷感嗟吾生之向老白髮蒙蒙嘆凜秋之將半夕陽暗暗起居隨順掃堂皇而孤坐古今雜陳擁載籍以流覽匪懸梁而刺股偕卧薪而嘗膽疇追蹤於屈宋爰綴緝於鉛槧雖標目於秋聲附先逹則豈敢悲秋雨賦孟思伊商飈之遞爽兮凄繁彚而驚秋倐慘雲之劣起兮薄長空以鬱浮日暗曖其匿景兮火流耀之光幽林煙䓃以收蔭山巑岏而斂愁爾乃庭臯悲鳴西風隕籜烏鵲晚投長煙暮合氣淅淅以寂寥景翳翳而蕭索其始踈珠綴林繁絲系天芙蕖跳玉決明媚錢助長渠以汜派映逺岫而為煙溜入耳而聲亂雲運睫而態遷爾其侵夜含潤崇朝其涼槭槮萎紅薜荔郁芳竹凄風而驚韻鞠含露而帶香草木以之變衰人情因而感傷若乃紫閣彤闈玉堂朱闕龍篆銷沉帳綃沓疊肴醴興闌管絃聲咽聽簷鈴以譜詞俯檻流而書葉蓋亦耽碧雲之洵美而不知愁欎之煩結也亦有幽窗暗室别館離宫永巷暮寂長門晝扄金井生菭銀床葉封承恩匪貌誰適為容悵别夢之暗斷杳芳魂之自驚苦無聊於風幌亦何堪於雨聲至蒼野平疇碩苖佳實窏洝汩流滂沱淅瀝禾耳糜爛蔓草狼籍悼終嵗之胼胝杳西成之莫期飬監憂而瞀亂翁婦對而涕洟爾乃燕塞防秋秦關戍卒慘淡邉聲啾咋鬼哭萬里淹羈終宵煢獨寒薄征衣心碎鄉曲若呼名引英俠利牽巨商陸馳華轂水泛艫航雲橫泰山雨黯瀟湘壁燈暗兮秋夜長孤館閴兮管蒻涼瞬將寐兮旅魂結鄉夢破兮心慘傷恆點滴于室階時衝襲於敗窗或隕涕而欹枕亦惆悵而未央悲兮增欷久婺矛牙麗姝新寡薑姬冷恨幽房漏永重幃絡緯遞鳴墻垣暴頽腸一夕而九廽耿無語而淚滴斯嬰世之至慘亦天下之極悲者也爾乃孤忠逺投謫宦離家放臣楚澤遷客長沙庾愁何既江恨無涯路迢遞而思竭愁一宵而鬢華秋雨兮秋風序悲兮物終有愁兮必苦有怨兮必盈正梧桐兮搖落近芭蕉兮亂鳴非至人之無欲不能對此而忘情愁隂賦張寧閉塞嵗徂和暢時至庶物迎熙萬象開霽進陽退隂向明背晦暉暉乎其來冉冉乎其繼郁郁乎其華燦燦乎其麗胡為哉滃欎雲蒸杳冥霧漫縹漠煙霏仌結氛亂鴻濛如未分清濁如未判日月如未旋寒燠如未變黎黃如晝之將夕昧爽若夜之始旦無乃元英返斾震御停車屏翳斂施飛廉倦趨豐隆布令阿香轟驅將然否也是耶非歟爾其峯巒暗靄陂澗昏沉樓􅀢寂閴林木蕭森山兜散麓湖舫維潯餘春惜賦人日追吟企浴沂之遐軌羡修禊之芳音悵良辰之易邁悟宿約之難任時則林泉逸侶詩酒幽尋嗟今弔古莫不欎欎無聊之心花萎栁瘠燕懶鶯驕翠斂潤掩寶篆寒銷青燈短焰素帳垂綃蘋緑濵而堪采桃須晴而未夭望將歸而益久阻吉好而增遙傷白日之無光悲青春之寥寥時則空閨淑配邃閣嬌嬈居幽閔莭莫不有依依觸景之憂乃若孤舟江海匹馬關山留時倚棹待旭逑驂白雲迷望紅日違瞻仰帝閽於薊北眄親舍於江南目懵懵而不見涕澘澘而垂沾口忘言而心悟魂欲逝而形掩亦有災祥切已調燮功兼農功既及國用方嚴冷不宜秧濕不便蠶念西郊之不雨憫東海之無鹽省蒙昧之所自徴休咎之攸占此則孤臣出子卿士師尹之忠愛非可比登臨燕私之逰耽也老病衰遲嵗序遄疾壤缶聲歌千金一日慨人已之同情懷大小之欣戚蹇豫心之靡他羌逺近而如一永惟海宇之清寧聊以畢志於山澤愁霪霖賦唐俞羲和失馭萍翳號空黑豬渡河黯淡郺􅀈補後之漏天仍破奠餘之洪潦重逢爾其列缺揮鞭帝弓抗弦鷦明蹲屋神蜧逰川殷鼓則驚殘石燕閃户則血染農㕓于時蠙衣上垣蝌子産竈橋上行船樓干垂釣層濤滮涆崩沙磤􅀈莫不送目心瞿憂年衷悼借如穆王西邁駐蹕重臺風雨三月坐卧蒿萊皇馬噴沙寶鐙莓苔赤烏之美酒欲盡盛姬之清歌可哀佇層城以尚遙盻青鳥而未來玉笛吹殘呌雲不開及夫三閭去楚憔悴江干枉渚十載玉笥九年猿慘淡而啼月鬼窈窕以嘯煙思公子兮徒離憂坐幽篁兮不見天窮隂匝地荷裳自憐又若伏波南征屯軍滇上飛鳶站水馬丁嘯塢戍士蟣蝨僰人飢坐藤甲濕而將穿銅柱浥其欲腐又如蜀國儒生有才未祿舟居非水陸處非屋貰酒雲中髙歌獨漉騎崩浪於沙嘴濺洪波於鳥築詛霆不靈把書痛哭别有東海龍孽娶婦涇陽煙寰遭貶南山牧羊凂及栁生傳書扣橘錢塘眥裂晝飛霹靂隂雨兼旬海水羣立辰發靈虛午戰水國以至石龜眼赤老婦驚嚬江漢之孑遺頳尾繇拳之人物魚身目泣煙而誰竈耳厭滴而長鳴况乃天害粢盛災祲不良呪彼㸑星安覔稻梁鶉衣訴風兮糜人為糧纍纍菜色兮蒺藜紫雞犬無聲兮煙火死嗟乎哉天心仁愛兮玉吾君以令圖抱杞憂而長嘆兮呌民無辜湍轉浪動滙為文瀾匪丹青而善繪宜慨然金門之獻西成賦毛紀粵神禹之敷治兮佃原隰之畇畇暨后稷之率育兮時播植而耔耘倬甫田之廣袤兮農并力以效勤既深耕而易耨兮美茂生之欣欣地既豐以腴沃兮天又重之以嘉澤方亟活而厭飫兮繼滋之以霂霡軍優渥而霑足兮亦發秀而頴栗零白露之為霜兮告西成於平秩實栗栗其堅好兮美蠙珠之綴團穗委委其修碩兮宛蛟蛇之結蟠比穹隆其倚疇兮密茨屋之覆完黃冉冉其溢目兮天同雲之漫漫農猥告其比屋兮紛嘉榖之在地將圃場之曰築兮亦礪修其銍艾約百室之齊開兮率同功而穫刈彼伯主之既出兮爰疆以之與隨就斂穧而執秉兮蟻潰垤之參差穫桎桎其有聲兮積如櫛之交比喈囂囂其會選兮數萬梯之纍纍乃求萬斯箱兮牛載重以憊蹇乃求千斯倉兮人舉勤而嗟倦紛粒米之靡暇畜兮盛在田之餘羡伊寡婦之承筐兮往鷺巡而鳩斂私家既盈公家斯賦大家牛車小家擔負繦屬組連充塞周路崇崇公廪纍積日富我藏既豐我食既厭彼公之稅取之太亷役車既休子婦皆恬琴瑟擊鼓賽神有嚴自天降康匪民力也於皇帝德天隂隲也田塗多稌太倉侈積也國用殷用帝心怡懌也既吉既蠲以往蒸嘗為酒為食苾苾芬芳聖祖神宗來格洋洋錫爾百福萬夀無疆圜丘既掃栗牲斯烹粢盛􅟍醴將享蒸蒸於皇上帝居歆明明錫爾遐福萬方以貞烹狗東房以御胡考春酒既介耄耋黃耆庶僚百工三台元老邦家之光列鼎而飽重譯遝至越裳儋耳雕題編紒啞啞濟濟彼餐而精而飲而美大小稽首騰歡以喜王之爪牙曰唯六軍行者槖囊居者飰饋食充力昌闞虓虎賁甲胄于邁叢具如雲於豐年之敷錫兮斯邦露之振嗟我田之既臧分維農夫之慶農曰匪我之猷兮帝德之盛帝謂朕匪德兮皇天之命誶曰天無降祥兮麒麟鳯凰錫有用兮豐年穰穰地無産竒兮琅玕琳球育有用兮豐年九州天地無錫異兮甘泉氛氣育有用兮豐年繼繼瑞雪賦商輅嵗壬午三五前始雨雪亦其常候特以嚴寒亢晴乃始肅殺於三陽倘隂凝尚未既乎昔人侔色揣稱非不盡態極妍顧箕斗不殊而揭挹異視曩或以處優志協而感慨不與焉因為綴之已臆云辭曰玄隂之辰廣漠既烈太空融寒膏澤上結於是太昊之辟下起伏炎之溫拂釋長宇乃使風伯拂彗露師密製散玉闕之瑤華布瓊宫之浩砌和氏家登絶肪盈眸院署紛披豐蔀翔浮光昭錫乎朱􅀈照臨下乎襤褸絶蹤曠域密運虛投故寶榭朝峙銀茨旦綢名都罄輝窮谷聲裒爰用無心平心廣造均造太昊乃睊俯顧而詢吾用子需弱之積就下之凝明昭有錫率土維均彼太和當陽而春叢有零廣冒羣覆亦或稱云維兹六出之英唯命而付泛若無情起况爰居會意羣生故曰排閶闔兮緣龍􅀈媚君王兮御九重彼君王兮被貂貉之輕溫潄蘭英之芳潤椒房獸焰體含餘燠俯見瑤英氷潔闕映墀輝丹墄璧色金屋瓊飛於是志灑神淫懸旌漫羈危榭升兮綺疏闢藍田盛兮千里璧遙巘明兮琪樹光君王樂兮夀無疆又曰阻積雪兮被楸梓怡王孫兮酌芳醴彼王孫兮襲紈縠之曼暖便巋亘之崇居樂事填腔飢寒不愈仰排空兮飛灑俯地輿兮雲霓於是四望皎然逸興遄飛流霞薦兮簫管陳簮珥集兮綺羅輕歌白雪兮凌沍寒歡何極兮難為情爾乃邉徼絶塞征戍連營隨風颯厲蔽幕降烽旌旗凍而夜樹嚴更戒而宵征霰花縈而眥裂寒氣湧而摧唇馬蕭蕭兮嘶風車漫漫兮垂輪傷狐貉兮不可御酌桂酒兮難為因若乃孤村荒落被牧緣郊家如疊壘室似傾巢餐瓊液兮餒不辟承金颷兮體復撓雁哀鳴兮安歸愁百室之敖敖故曰景則是兮心則非心不樂兮孰者多姿昊天悠悠兮儔慮儔惟樂恐無莭兮綴以悲怡明文海卷八
