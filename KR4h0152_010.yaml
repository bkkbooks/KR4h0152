body:
  text: 明文海卷十餘姚黃宗羲編賦十山川二三谷賦何喬新麻源三谷之勝為吾旴江山水甲今司勳員外郎左君時翌之先廬在焉時翌嘗為豫道其泉石幽雅之趣巖壑瑰詭之觀豫欣然欲逰而未能乃想像以賦之每一展玩庶幾乎宗少文之卧遊矣出城闉以遐覽兮爰陟岡而捫幽度駝嶺之􅢋谺兮訪仙臺乎山之陬銅陵岌嶪而凝黛兮紅泉汩㶁其鳴璆琪花瑶草紛不知其名兮桂樹鬱其相繆豫乃凌犖確厲清泠窺石門之窈窕躡雲蓋之峥嶸石梁龍矯兮卧波仙觀翬飛兮凌空吸紫霞兮石閣招白雲兮羅峯步豫馬於靈豐兮悵宿莽之離離訪翻經之遺臺兮蒼煙慘其增凄若乃崇岡􅍶崒疊穎巑岏丹光夜爍土花春殷非子期仙隱之所存乎寒磷宵飛山精暮泣折戟沉沙戰血凝碧非危郎駐兵之故柵乎山川宛其如昨嗟昔人其安在扳古柏之虬枝兮增豫心之永慨謂仙人之不死兮吾不得而見之謂英雄之不朽兮亦澌滅而無遺招黃鶴而訊之兮鶴翩翩其髙翥尋斷碑於荒榛兮蝸延苕花閟而不可覩重豫懷之耿耿兮撫幽篁而延佇回飈冷兮欲秋斜月淡兮將夕駕豫輈以復路兮聊容與乎田北騁豫目以流觀兮見夏屋之渠渠萬瓦鱗鱗以波偃兮曰美人之故廬緑樹藹其承宇兮清泉琤其循除詠先生之遺風兮有左琴而右書愛茲境之幽勝兮恍王官於緑野欲誅茅以葺廬兮敢云信美非吾土何所獨無芳草兮羌眷眷而懷茲念美人之好修兮茍去此其從誰儻解印以南旋兮將稅駕乎旴之湄從美人以徜徉兮終嵗晏以為期石鍾山賦何喬新彭蠡之口有石鍾山焉蘇文忠公辨之詳矣士大夫喜幽尋而樂勝選者莫不遊焉景泰六年春三月豫與今夏官郎中王君尚忠俱以進士奉使江南尚忠家湖口邀豫艤舟絶壁之下以訪其所以謂石鍾者水石相激響若洪鍾始信昔賢之言不誣也因為賦之後十有二年尚忠示舊稿俾重書之因嘆豫學之不進而悼勝遊之難再也乃刪其辭以歸之云乙亥之歲暮春之夕豫與王子泛舟澄湖艤於絶壁援危藤登懸崖以訪昔賢之遺迹于時天和氣清江空月明魚龍咸伏波濤不驚縱豫目以遐覽舒懷古之幽情但見怪石嵯峨㠍嶫碨磊峥嶸竒形異狀不可殫名或如鳳如螭欲蟠欲飛或如鬼如獸將行將駭岩崿霮䨴拂藍撲黛冗罅呀􅥾欱雲噴雷異哉石乎蓋造物者之所胚胎也俄而微雲生於廬阜長風來乎太空驅濤擁瀨吼鯨躍龍爰有洪聲發於水中殷殷喤喤如遊舜庭而聽鏞鍾之撞鏘鏘鍧鍧如入周廟而聞無射之聲填兮若雷颯兮若雨又如郤至使楚而金奏作於下豫乃恍然而驚悄然而思問王子曰是何聲耶豈靈鼇奮首而三山頽耶抑海若驚起而號風雷耶無乃共工氏觸不周而天柱摧耶胡為乎有是聲也王子笑曰子不知耶是所謂石鍾也昔者酈元言之而不詳李勃訪之而失實東坡居士泛舟江上以求之而後衆論定於一也豫曰石之為物塊乎其形未與水遇不聞其鳴水之為物湛乎其清未與石鬬若嘗有聲彼函乎清越窽坎鏜鞳之音果出於水耶亦出於石耶王子曰不然夫水之性動石之性靜動靜相摩厥聲以應水之質柔石之質剛柔剛相蕩厥聲以彰是非水之聲也亦非石之聲也水石相搏而聲出焉此石鍾之所以名也夫峭壁岩岩鍾之銑角也懸蘿裊裊鍾之旋蟲也丹崖翠壑鍾之簨簴也驚濤駭浪鍾之撞杵也是鍾也蓋天地為爐萬物為銅隂陽為炭造化為工齊侯不得銘其績而鳬氏無所與其功也嗟夫洪水橫流巨浸稽天象罔出而侮人螭蜃過而垂涎民其魚矣尚何鍾之聽焉今吾與子脫介鱗而辨冠去沮洳而宫室泛蘭舟以遨逰聽水樂以自適揆厥所元伊誰之力耶於是相與徜徉眺望咨嗟感激已而雲銷風止浪平響息水天相映瑩然澄碧返而登舟呼酒相酢乃鼓枻而歌曰駕吾舟兮泛長江馮夷起舞兮酌我以羽觴侑以嘉樂兮鼓鐘喤喤慨念上古兮濁流湯湯孰致平成兮孰理懷襄願銘此鐘兮紀神功千秋萬嵗兮永不忘吳子城賦王鏊余每過吳故墟未嘗不慨想其盛而悼其哀也故為之賦泰伯遺墟干將故里臺閣翬飛冠蓋鱗次喟彼荒郊羌何為乎城之裏但見愁煙鬱而四積悲風慘而時起頽庸突阜剩水殘濠野雉朝雊鵂鶹夜號沉矛折戟墮珥遺翹漸漸惟麥之秀離離彼稷之苗父老告豫曰此吳王之遺宫也方吳盛時志大功髙入楚柏舉敗越夫椒城規方於八卦門僣擬於三朝跨長洲之茂苑館苧蘿之豔妖帶以錦帆之涇壓以金母之橋爰有涼臺溫室鏤楣繡栭風亭月榭碝壁椒塗飾以璆琳琅玕間以木難珊瑚鳴珮鳬簉髙冠鵠趨自謂百世君之豈意至於是耶吳祿既更歷代崇飾春申夏桃秦皇刻石危亭岌夷雕欄紆直齊雲之樓凝香之室木蘭之堂交映翕赫疊石則嶻嶪嶣嶤鑿沼則囦潾澄碧蘭芷羅生乎其間竹松環列於其側羅綺爭春而冶妖歌鍾入夜而嘈雜韋白耽於吟玩皮陸侈於酬答逮宋迄元更為治所雙蓮四照池光春雨歲時觀遊麗無踰者而何至於是耶蓋自元政隳羣雄騖紫色蛙聲乘間竊據挾嘉湖杭以自雄擢黃蔡葉而為輔盛稷下之文儒忽太湖之飛渡煬戀迷樓卓矜郿塢倐天兵四面以重圍金城百雉而莫固技殫九攻蒼皇一炬歷代繁華可憐焦土遂使燕巢再燬麋鹿重遊竭南國之脂膏坐受其困激東溟之波浪莫洗其羞且夫傾宫阿房非不麗也巨橋瓊林非不富也崤函鞏洛非不固也自古如斯曷之故也豈仁義不修燕安之可畏耶將氣運靡常盈虛之有數耶惟是吳墟殷鑒斯在前既顛隮後仍荒殆登兹城以裴􅏆寄千古之一慨洞庭兩山賦王鏊楚之湖曰洞庭吳之山亦曰洞庭其以相埒耶將地脈有相通者耶郭景純曰包山洞庭巴陵地道潛逹旁通是未可知也而吾洞庭實兼湖山之勝始山特為幽人韻士之所棲靈仙佛子之所宅至國朝名臣徹爵往往出焉豈湖山之秀磅礴鬱積至是而後泄於人耶東岡子曰山川之秀實生人才人才之出益顯山川顯之維何蓋莫過於文兩山者祕於古而顯於今其實有待子無用辭豫曰然乃為之賦其詞曰吳越之墟有巨浸焉三萬六千頃浩浩湯湯如滄溟澥渤之茫洋中有山焉七十有二眇眇忽忽如蓬壺方丈之倣佛日月之所升沉魚龍之所變化百川攸歸三洲為界所謂吞雲夢八九於胸中曾不蒂芥者也客曰試為吾賦之夫太始沕穆一氣推遷融而為湖結而為山爰有羣峰散見疊出於波濤之間或現或隱或沉或浮或吐或吞或如人立或如鳥騫或如黿鼉之曝或如虎豹之蹲忽起二峯東西雄據有若巨君彈壓臣庶乂若大軍之出千乘萬騎旌幢葆蓋繚繞奔赴東山起自莫釐或騰或倚若飛雲旋飈不知幾千百折至長圻蜿蜒而西逝西山起自縹眇或起或伏若驚鴻翥鳳不知幾千萬落至渡渚廽翔而北折試嘗與子登髙騁望近則重岡復嶺喊呀庨豁縈洲枉渚蜿蟺緬邈逺則煙蕪渺瀰天水一碧帆影見而忽無飛鳥出而復沒靈巖則返照孤稜辨山則輕煙一抹此亦天下之至竒也若乃長風駕浪噴山欱野足使人魂驚而汗駭及其風日晴熙縠紋漣漪又使人心曠而神怡至於瑶海上月流光萬頃星河倒懸蕩漾山影又一竒也遙山霽雪凝華萬疊玊鑑氷壺上下相合又一竒也風雨晦明頃刻異候煙雲變滅咫尺殊狀雖有至巧莫能為像試嘗與子弔古尋幽則有廽岩穹壑䆗條相通琳宫梵宇暮鼓晨鐘壽藤靈藥美箭長松金庭玊柱石函寶書靈威丈人之所窺也貝闕珠宫繡縠鳴璫栁毅書生之所嫓也翠峯杜圻范蠡之所止息黃村甪頭綺皓之所從逝也而闔廬夫差之迹尤多存者玩月之渚消夏之灣牧馬之城圈虎之山練兵之瀆射鶴之巒出金鐸於淺瀨逸梅梁於驚湍他若毛公燒丹之井蔡經煉藥之墩聖姑絶雉之塘雪竇降龍之淵其石則岌嶭嶙峋瘦漏嵌空牛竒章有甲乙之品宋艮嶽有永固之封其泉則囦淪觱沸甘寒澄碧墨佐君表無礙之名天衣禪留悟道之迹斯時也孫尚書欲卜居而不能范文穆思再至而不果豈如吾人長生兹土依巖架棟占野分圃散為村墟湊為闤闠桑麻交蔭雞犬鳴吠里無郭解劇孟之俠市無桑間濮上之音婚姻相通若朱陳之族理亂不識若武陵之源佛狸之馬迹不到周顒之俗駕自旋星應五車地絶三斑盧橘夏熟楊梅日殷園收銀杏家種黃柑梅多庾嶺梨美張谷雨前芽茗蟄餘萌竹水族則時裏之白鱠殘之銀魴鱸鮒鮆自昔所珍吾且與子摘山之毳掇野之茸割湖之鮮釀湖之醲泛白少傅月夜管絃之舟和天隨子太古滄浪之歌弔吳王之離宫扣隔凡之靈窩凌三萬頃之瓊瑶覽七十二之嵯峨其亦足樂乎彼嶽陽彭蠡非不廣且大也而乏巍峩之氣天台武夷非不髙且麗也而無浩渺之容蓋物不兩大美有獨鍾兹謂人間之福地物外之靈峯是故極遊觀之美而未知造化之工且夫天地之間東南為下非是湖為尾閭泄之瀦之則泛濫橫溢江左之民其為魚乎懷襄之世湖波震蕩非是山為之底柱鎮之繞之則奔激暴囓湖東之地其為沼乎唯夫天作之寬以納以容地設之隘以襟以帶禹順其流分疏别派三江既入萬世永賴而後吾人乃得優遊於此蓋至是而後知造化之意深神禹之功大誶曰吾何歸乎吾將歸乎湖上之青山世與我而相遺超獨邁其逾逺海山兜率不可以驟到非兹峯之洵美兮吾誰與寄此髙蹇祝融峯觀日出賦顧璘嘉靖丁酉仲冬幾晦姑蘇顧璘巡方至衡謁嶽神訖乃登祝融宿上方翌曉觀日出景象特竒遂述而賦焉賦曰維南衡之崇嶽標祝融之危峯下蟠據乎厚地上峻極乎蒼穹匪丈引之可度盡他山其難比隆睇四極而無蔽乂何限乎寰中觀其嶔崎崒嵂直上莫止捫歷參井靡髙弗至躡浮履霄帝居或指足踠汗栗不敢俯視何其髙也若乃斗杓既仄啓明未升漏刻已盡荒雞甫鳴天莽蒼其一色泯萬動猶無聲謂日出其可觀乃跂望於髙亭爾其遊氛且凝灝氣欲豁萬里乍近沕沕穆穆眷彼陽輸尚爾淵汩冥迷遼漠恍不可度少焉光景上燭髙漢舒白如火將炎大暗微晰羣望方勤目不移盻積靄倐裂閃爍驚電駭指失呌乍見一線漂沉搖曵湧出波面燭籠外赤鳬卵中黃上殷下暗半吐半藏依微滉漾如覿海色水火交爭良久乃脫於是金烏髙舉若木影離羲和叱馭八表馳暉所可疑者視扶桑如咫尺東曠望而無窮日遲天於一度何環周之莫同參渾儀於宣夜猶想像其若懵大哉天之為天也固致詰而難終明文海卷十
