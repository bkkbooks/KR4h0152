body:
  text: 明文海卷十二餘姚黃宗羲編賦十二山川四續中流砥柱賦毛愷江陵曹先生柄文三晉博綜六籍暇日有感於黃河之砥柱抗九曲而不回厯萬古其如新爰托楚聲揮毫成賦間示毛子三復讀之意髙而雅辭麗以則揆之禮義中正秩如也宗玉景差風斯下矣式遵步驟輒續厥篇深愧鄙蕪聊代就正之贄云耳其辭曰黃鵠道人覩世變之日下羌欲挽而回之託大河之巍石寄微意於雄詞慨彼夏氏受命於帝導兹洪流沛然下注粵遺竒迹削如芙蓉嶻岌嵳峩崔巍巃嵸亭亭孑孑鬱鬱蔥蔥不偏不倚不蹇不崩千仞壁立屹乎波中聲鼓萬雷勢奔九龍倒垂玉蝀直挂長虹下壓鴻龎上摩太空真成天造疑為鬼工激鯨濤以澎湃戴鰲背之穹窿山川森其蔽虧煙靄翕以冥濛巨靈乘時而屭贔天吳奔靡而下風廽狂瀾於既倒俯馮夷之幽宫茲非所謂三門之砥柱障百川而之東者耶若夫日觀泰岱之宗霞標赤城之峯華表曾聞夫唳鶴支磯見卜于仙翁媧石裁成精煉補天之色秦皇東狩神驅駕海之功斯皆似涉於茫昧俱不足以擬其形容嗟夫古之君子比物醜類罕譬而喻物有所假情有所寓湯盤銘以自新孔登山而小視斯目擊而道存何莫學而非事况夫宇宙之間爰有正氣燦日星以華天奠河嶽而緯地在人得之亶為聖智弗礪而砥弗斫而柱莫怵以威難誘以利招之不來麾之不去值危疑而靡驚投艱大而罔懼舉世尚同吾非立異舉世好圓吾方以制舉世百慮吾以一致人多炎炎吾寧踽踽人多汲汲吾寧泄泄黜身外之浮遊恥墦間之富貴窮則採薇之歌逹則霖雨之志生以望乎萬夫沒以風斯百世庶植立乎兩間乃浩然而無愧辭曰嗟橫流之靡兮夫孰知其非兮繄君子之挽其趨兮志百折而弗移兮端吾軌兮範吾驅吾將從道入於聖域而日躋兮誓白首以為期兮三泖賦范守已無心子宦於雲間再易寒暑日往來於姑熟恆泛舟於泖之沮搰搰焉披紛牘於蓬窗而忘其川澤之修阻一日塵襟少豁旋自雲陽絶婁淞而闞笠澤走單舸而鼓鳴榔櫓啞啞以激波帆縮縮以辭檣窮斷連之瀦蕩凌灝渺之洸茫于是啓扄而出緣舷而步徘徊於維纚之所謾踟蹰而四顧望津涯而辨方隅窅乎皇皇而錯愕乃招舟子使陳其故舟子有扣舷叟者齤然進曰先生未知澤國之勝概乎抑未知此水之源派乎夫自鯈忽鑿渾沌之竅而地多谺壑共工觸不周之山而水歸東南洎禹乘之既歇滙震澤以泓涵肆浸淫而旁溢歸長泖之澄潭水連綿其如一勢續斷而為三其上則吞澱山之流波來金澤之㵿渺納白牛之泛滔引葑澳之浩溔洶洶焉湧湧焉爭趨並下而不辭汙凹之湫小其下則㵼洄湍於黃浦導泛濫於吳淞通别港於檇李散微濱於五茸雍雍焉溶溶焉支分派析而不計衆流之纎洪其中則孤沙平湧茂木林立梵宇耀甍雁塔飛級闍黎翻貝頭陀縣汲樹薜蘿兮灌杜衡焚椒蘭兮㸑玉粒壙兮與塵世其若違恍兮接員嶠而拱揖其四望則洞庭鬱其西北下扄千丈之龍穴天馬蹲於東南上來萬姓之燔爇崑岡遙峙鍾賈并列聳九峯之孤碧羅海角之封凸矗矗然嶨嶨然插五湖而表三江皆可以翹首而引瞥若此者固松郡之巨匯吳會之名湍往來之利津遊眺之竒觀先生之遡洄久矣而猶未得其端倪乎無心子囅然有間曰形氣之概既已知之其亦有利爾郡耶叟復吁睢而對曰嗚呼孰水不滋孰滋不利而况汪洋澄徹吞吐浸漬之若斯乎故自其煩育於深渦類聚於廣奫或泳或躍或介或鱗鱨鯋鰷鰋之異其端鮞鯢鯉鱭之別其羣金鯽穿藻玊鱸翻蘋輸稻芒兮紫蟹嚙荻芽兮河豚蟛蜞蝤蛑兮與蝦鰈而為伍鱣鮪螭虬兮並鮦鱧而俱淪凡若此者可網可笱可筒可綸乘舴艋而矛射於茫漾擕笭箵而掇拾於湄濵可炙可繪可飫可珍貧矣乎鬻而厚得其值富矣乎剖而燕樂其賔此固漁利之大而猶為三泖之纎塵若夫澳限之所沮洳之旁茭蘆彌望蒹葭垂蒼菱角泛紫荇帶浮香芡之實兮啄雞咮於泥滓茈之荄兮插鳬足於淖壤堪采堪列堪剝堪嘗為管為薄而資藉之不匱以登以豆而賓筵之有光此又種植之利而亦未盡其無方至若清曠之濵空廓之渚乃有屬玉聫翩陶河並舉鸛戞戞以長鳴鶴翻翻而覔侣羣鷗浮兮點白雪於碧波孤鶩遊兮泛緑羽於清泚鈎輈格磔兮鷓鴣飛鳴喔咿嚅唲兮鸜鵒調語鴻鴈窺稻粱而來賔鵜鶘挹清流而振羽或以矰或以繳或以網或以籞光澤乎籠鞲而擾馴腴美乎宰割而烹煮斯乂禽鳥之利而猶不止於如許逮夫沆漭之流衍汗漫之旁敷引之而為溝為澮穿之而為汊為澞尋墟岸以逹畝趂陂陀以分隅或架桔橰或為轆轤或以牛運或以人竘滚滚乎收白浪於軸輻滔滔乎輸洪波于壤壚遍南畝而既優既渥盡西疇而載泥載塗以粳以糯以秀以稃緑雲堆野黃波翻區穫之而秉穧之盈畝斂之而芒穗之連􅰡萬寶告登兮盡百室而充盈三農慰願兮合四民而歡虞斯則田疇之大利借三泖以豐腴者也至于清淑所萃靈秀所鍾豪傑並起英彥晞蹤聚之為人文之藪達之為國士之宗康績以行誼顯孫抗以功業封機雲之詞章尤著敬輿之忠烈彌隆梁唐迄宋科目不窮逮皇明之撫運荷聖化之陶鎔文班班以爭曜材濟濟而奮庸或宣臚于北闕或敓錦于南宫或秉鈞于黃閣或輸皂于丹楓其他攀鱗附翼宣力效忠藹藹乎麟馳而鳳躍繩繩乎魚化而鴻翀又孰非淵澤之靈異風氣之偉功先生之盤旋已二載矣尚未知衆利之充豐乎無心子聽既憮然曰大哉泖乎其利於邦畿有若是者乎吾思夫魚禽之繁夥種植之敷暢猶云利民而未及利于國也至于灌溉禾稻而國家之供億所需孕育賢哲而國家之楨幹所賴則將利及於天下矣叟其退諸吾今而後知澤國之所以名天下也已觀瀾生賦并序趙寬僉憲徐君朝文自號曰觀瀾生謂豫曰某生江湖之間長而置身宦海之上驚浪駭濤蓋飽閲而熟覩之苐力有不逮時有不然思欲障頽波回狂瀾而未能也然嫠婦之憂洵有不能忘情者是有取乎觀焉豫聆之而深感其言永歎不已遂為賦之其詞曰元化交流之馮翼兮孰翕而孰施春秋旦暮之荏苒兮彼逝者其如斯波濤被於宇內兮何一物而無之巨者為澎湃兮細者為漣漪豈特江與河兮日浩浩而東馳合羣動而皆然兮試比類而旁推羣鴻飛而蔽空兮萬馬逸而無羈雲霧滃而上蒸兮岡巒邐迤而厜㕒長林撼風起伏而號呼兮禾黍秋熟極目之紛披蚊蚋蠓蠛隊分而陳合兮蟻坌集於階墀蠻觸氏之鏖戰兮螳臂奮以相持長楊羽獵車騎之彌山兮昆陽巨鹿設萬壑之旌旗蓋無往不寓夫懷襄之勢兮信物情之險􅤡渙崩奔而洶湧兮莽曠蕩而無涯詎天命之難諶兮亦人心之惟危彼六鑿之相攘兮判水火之坎離或深谷而為陵兮或平陸而成池或行險而幸全兮或居安而傾欹或吕梁縣水之可蹈兮或濡裳於涔澬况乎世變愈降兮民偽日滋籧篨與戚施兮競風靡而相隨瞪雙目而無見兮悲衆人之蚩蚩何夫君之不凡兮獨幽覽而深窺洞玄機之靈扄兮徹秋毫而靡遺始者吾將要其終兮盈者吾將究其虧孰往矣而不復兮孰成焉而不隳堅胡為乎易觖兮芳胡為乎易萎惟綱常之為大兮實吾職之攸司吾既有此夸節兮鯁特立之權竒茍橫逆之觸吾目兮吾安能忍而嚅唲固將挫其鋭而解其紛兮豈但恤緯而憂葵操巨舟以宏濟兮屹砥柱而不移投寸膠於溷濁兮揚醇酎於澆漓追邃古之往躅兮還炎帝之希夷既彰善而疸惡兮亦起廢而興衰上以紆宵旰之憂勞兮下以洗赤子之瘡痍睨華勛之未逺兮奚凱元之不可為嗟此志之耿耿兮窮日夜以遐思患精誠之未白兮恐效妍而成媸世蓋有披肝膽而不信兮矢金石而猶疑使交淺而言深兮徒速纍而招疵將鉗吾舌而括吾囊兮非吾心之所期欲超然髙舉而莫之顧兮又酬恩之無時故吾將觀其會以制變兮庶順動之攸宜奮果毅而勇進兮夫皇恤乎吾私願悃欵以自效兮豈堅白而磷緇圖寤言之可復兮及吾髮之未絲亂曰八荒滔滔一瀰漫兮孰澄其源殺其湍兮惟彼達人得大觀兮旁燭無疆神之完兮仰輔聖明瀝𠂻丹兮魑魅魍魎莫敢干兮海不揚波永清安兮白嶽賦錢府原夫扶輿磅礴凝結為山尊為五嶽名山副焉大江之南天日巖巖黃山九華鳳翥龍騫潭洞巖壑岡阜陵嶽伏而忽起斷而復連嶔崟盤鬱踔躍蜿蜒其山纍百其名數千界乎徽嶺白嶽雄峙翠巘騰空紫霄特起矗如展如若城若壘水簾珠落石池氷齒怒類渴猊奔擬走兕纛影翻翻罏煙纚纚摩挲老人娟纎美女皓雪不融赤日停晷松偃柏茂藤牽葛藟雲霞變化不可向邇此其山之大凡也若乃靈區有待殊域天開鬼藏神祕歷盡劫廽鳥道上附鸞旗下來北駐黑帝之輦中起玄君之臺構珠宫而璀璨涌貝闕而崔嵬步虛奏兮霏雪鈞天闋兮停雷翩躚白鶴似昆丘之瑶圃青蔥玉樹類瀛海之蓬萊雲車兮恍惚日馭兮徘徊神蛇兮天矯靈龜兮唐頽既福民而壽國亦弭亂而消災北對玄武上應斗魁豈白冥之瑞華皇在御幼海無波前星未著爰發圭璋専命清署修靈寶之科儀邀九霄之真馭奏青詞之懇切感玄帝之鑒注震宫發祥青旗軒翥帝心用嘉駢繁敕諭遂三公乎升秩視五常乎支庶蓋有感而遂通誠旦暮而斯遇者也繇是播神威於宇宙振肸蠁於寰中蹩躠士民奔命黃童自南自北自西自東輪蹄不絶四方來同纍朝增飾歷聖褒崇神光倣佛旭日瞳矇非山嶽降神於蔘嶺虛危分秀於玄穹者乎慨夫霾名山邑蔽秀僻壤迹類洪荒事出蒼莽漸入人文始獲昭朗超五嶽而六之越四鎮而上焉碉房架於層巖玉梅寄於仙榔王褒張載之詞刋琬琰於蒼崖元常仲將之筆懸徑丈於金榜使負濟勝之具者既不升崑崙而扳若木擅凌雲之賦者豈徒侈太華而窺仙掌乎哉固知地有逺近山有崇卑東南奧區勝實在兹宿臼而往吾不為疲披覽圖籍神逰帝祠爰命墨公綴以蕪辭貽笑大方繪天莫知惟有孤心凝神帝師千秋萬歲為君祝釐鼓山賦徐􅎾繄石鼓之崔巍作海邦之巨鎮周圍百里壁立千仞地軸盤峙乎坤山勢障屏乎震並華頂之穹窿齊嵩髙之極峻下臨滄海逺望扶桑遐哉渺渺鬱乎蒼蒼盻瀛涯而點綴眺島嶼之微茫盱琉球之國而隱見矚天吳之首以昂驤隘羣峰於下界空萬頃於八荒觀曜靈於昧谷接羲馭於東陽若乃㟏岈䆗窱岝崿幽邃萃川嶽之嘉祥鍾巖壑之靈祕寒雲際曉而鎖青古木當春而積翠靈水澄源甘泉湧地緇衲聚僧精藍創寺開山則祖師神晏檀施則閩王忠懿標佛土以莊嚴表禪宫以壯麗祇園寶殿紺宇珠林臺鋪碧瓦地布黃金馴鴿紛飛現半空之影頻伽解語送靜夜之音栴檀有香而馥馞薝蔔有氣而蕭森至於國師登壇髙座説法澗底泉聲奔流䀨䀨雜梵唄以喧豗混摩訶而活潑立運神通放聲一喝回别竇而倒流涸空潭而停歇望石壁兮徒存聽澗澌兮永絶洞門峭蒨磴道岧堯石封苔而稜漸損藤抱樹而葉微凋亭跨丹鳳之尾橋蹴巨鰲之腰摩古賢之篆刻辨名姓於前朝法嗣曾兹以卓錫髙人昔此而挂瓢懷古迹而心悸感往事而魂消爾其異草竒花珍禽怪獸妖艷蒙茸髙飛逺走彌布於疊嶂嵁巖吟嘯於窮崖廣岫澗旋别徑路轉人家錯村落其如繡開場圃以種茶植先春之粟粒采未雨之靈芽老翁負筥而向火稚子持筐而踏霞笑北苑龍團之莫匹渺陽羡紫笋以難誇極林巒幽翳之足賞何陵谷變幻之堪嗟樵火夜遺琳宫瓦礫佛國榛蕪禪房荆棘風吹蔓草兮芊綿水漾寒花兮寂厯山魈哭雨以啼霜行客撫今而追昔痛頽廢兮六十餘秋悟殘灰兮百千萬劫寶銷佛面已多年金舍給孤於何日登臨自美弔古徒勞歌以咏志賦以憑髙等滄溟於一勺睇天風之海濤躡應貞而飛渡挾子喬以逰遨身陟雲山兮渺渺眼空塵海兮滔滔優哉逰兮以翔以翺明文海卷十二
