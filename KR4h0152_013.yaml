body:
  text: 明文海巻十三餘姚黄宗羲編賦十三山川五浣花溪賦郭棐昔杜少陵成都之㳺在唐天寳板蕩之季俯臨浣水爰構草堂因申房相國以棲遲乃依嚴僕射而肥遯大節峥嶸於劍北鴻名照耀於岷西余入蜀川緬懐髙躅濯浣花之寒碧仰玉樹之清標聊綴俚言用抒素臆詞曰入岷峨之錦里兮懐拾遺之精忠掬浣花之溪水兮濯汶川之秋蓉猗先生之慨慷兮纉太古之流風探四始之𤣥奥兮窺二雅之鴻濛獻三賦以明禮兮殫一心以奏功忸臣紀之澌冺兮障萬派而必東悲妖雛之􅛺飛兮挺勁特之精衷乃艱闗於庸蜀兮矢直節於崆峒朝拜命於彤廷兮夕申捄於房公出青瑣以幽棲兮歌白駒而髙翀依僕射於成都兮聲轟轟而摩空既卜築於浣西兮載偃蹇於蟠龍抒七歌之哽咽兮歎大厦之帡幪身彌隠而道顯兮志彌窮而詩工樹百家之標幟兮協一代之笙鏞雖當時之流離兮廓萬䙫之昭融嗟余生之相後兮仰髙山以為宗昔守䕫之暇豫兮結草堂於巃嵸兹入蜀之伊始兮訪浣花之遺踪灑潭水之清冷兮披卉樹之䝉茸婉風景之如在兮挹道範之無從但見細石清泉之瀟洒兮人聞黄鸝白鳥之琤琮誦藻賦之琅琅兮洵大雅之渢渢雖世䙫之寥廓兮諒精神之流通吁嗟乎先生之徳兮玉潔春融先生之風兮山髙水溶望靈爽兮颯飛鴻釃桂醑兮奠華鐘白羽翩翩兮閟𤣥宫思不見兮愁忡忡蟇頥津賦郭棐唐拾遺孟昭圖者正色立朝直言匡國方嗣音於鳴陽之鸞鳳竟見忤於當道之豺狼擠兹冠裳投彼津水自古貂􅀈氣燄莫酷於斯而簮組流離亦莫慘於斯唐社安得不屋哉予以春暮鼓棹蟇津訊諸榜人指所汩處澘然洒涕憮然陳詞聊冩悲思弗籌工拙云際涒灘之暮春兮予鼓檝於蟇頥弔拾遺之孤貞兮掩𤣥袂而歔欷維先生之姱脩兮攬瓊玦以自持紉芳馥之澧蘭兮佩芬馨之江籬燃太乙之青藜兮立當軒之文螭侍黄樞而捧簡兮直青瑣而簮珥言必闗於民社兮慮每謹於淵㣲憤貂􅀈之煽熖兮爰昌言以排之借上方之雄劍兮斵長樂之封狶翊皇路於清明兮掃霄漢之昏霾何乾剛之弗斷兮反酷燄之横罹投簮紱於清流兮望天闕而涕洟同三閭之魚腹兮類伍胥之鴟夷自古皆有死兮先生獨殉國而捐糜俯流澌之回瀾兮沉文光之陸離覽滄波之東注兮緬浩氣之嶔巇悵彼昏之無知兮悼末路之陵夷瞻銅駝以浩歎兮擲白馬而同悲噫嘻乎先生不可作兮徒令人千秋萬禩臨淵水而漣洏彼視人目睫以干寵而偷生兮寧無愧丈夫之鬚眉盪木蘭兮遡江湄濯津波兮漾朱曦奠絮酒兮薦霞巵望翠羽兮駐𤣥旂悲風蕭颯兮孤鴻飛𤣥雲黯淡兮烟雨霏霏邈岷山之嵲屼兮浥蟇水之漣漪嘉忠貞之不偶兮尚萬䙫而流輝磨崖賦郭棐浯溪以元子磨崖文而重崖文以顔魯公書而益重物之相須而不朽於天地間者良不偶哉後之吟卿賦客類喋喋焉楊㢘夫作賦亦云至攷頌以論體兮垢磨石之小疵絜大唐之罪案兮異瓊琚之賞詞致後來之墨客兮紛石刻之是非嗟夫阿犖煽禍於漁陽上皇間闗於巴蜀誰一戎衣而大物如故誰全宗社而區宇以寧功出非常談何容易雖太阿之柄見竊椒房西内之遷貽譏輿論然未可以瑕而掩瑜也昔周宣中興常武江漢諸篇列於風雅晚年不籍千畆敗績𦍑戎史臣識之乃吉甫之頌祭公之諫並垂金石矧顔元二子唯知頌徳揚功詎能逆覩其後也則崖文奚容喙訾哉竊因籃輿之暇廣㢘夫意而賦之猗峿崖之矗矗兮干層霄而嶙􅀈撑砥柱於兩間兮摩青蒼於萬仞俯石鼓而拉岣嶁兮應星纒而分翼軫郊東南之半壁偉衡湘之巨鎮誰從磨其崚嶒兮當李唐之中興有忠讜之老臣兮振雅頌之元聲發金薤於聱叟兮爛銀鈎於顔卿翔虎豹而騰蛟螭兮與諸崖並峙而峥嶸嗟六葉之仙李兮悼三郎之耄荒嬖玉蘭於綳兒兮動鼙鼔於漁陽紛潼闗之虐燄兮痛馬嵬之郎當舞駿躍以悲憤兮青騾駕而傍徨羣生劻勷以弗寧兮百僚首䑕而奔竄咸稱臣以紆紳兮儔置身而廵逺唯不識面之平原兮連棣蕚而忠謇亦有倚圩之漫郎兮歌楚騷而憤惋天不厭於皇唐兮起匹馬於朔方據靈武以一呼兮掃横霄之欃槍冕泌運籌以制勝兮儀弼仗義而于襄爰授璽以踐阼兮又誰咎其倉皇羌三月之徂征兮暐兩京之恢復美鐘簴之不移兮欣廟社之未屋誕旋乾以轉坤兮乃濡沐而膺福追甲乙以齊軌兮嫓宣光而同躅奠唐鼎於再安兮迎上皇於慶宫迺旌烈而酬勲兮亦布惠而蠲庸臣結作頌兮敬鋪張乎駿功臣真濡毫兮載掞揚乎丹衷掲日月於重光兮信肅皇之為勛也章盛徳而標豐功兮允純臣之義也雖未禩之瑕纇兮庸何傷乎前美也彼江漢常武之風兮固不以耄惓而弛也繄兹文與兹石兮逈同峙乎天地也亂曰君臣父子艱危共兮羯鼓喧豗社稷動兮太上播遷遐邇恐兮肅皇劻勷再垂拱兮廓清妖氛嗣帝統兮迎養慶宫心曷恫兮豐功大烈今古重兮元文顔書忠義供兮鏗鍧陸離配雅頌兮喬崖穹碑萬世式誦兮灧澦堆賦郭棐睠瞿塘之浩瀚吞西川於一㰱肆犇騰而千里載瀠洄於三峽儼兹石之孤起水滙之而湁潗抗流澌之横放壯地氣之呼吸盖鎮䕫軸以長存峨砥柱而中立者也原灧澦之鑄形屼滄波之尋丈既挺立而若馬亦蹲峙而如象固自植之根蒂任狂流之蕩漾捍蜀川之門戸作荆襄之保障偉片石之為功洵亘古而莫尚即吾人而擬議若振世之豪傑張浩氣於獨立植人紀於既絶標格天之勲庸樹盖世之功烈既炳烺而磊落亦嶙峋而岌嶪矧鍾兹之瓌特聚來逰之雋哲豈無障百川而東之與兹堆而並列者乎是故有如昭烈拯漢末造氣吞曹瞞力驅吳獠百戰艱闗三分控抱若堆斯堅孑䇄蒼昊有如諸葛濟時人龍托孤授政盡瘁鞠躬將星弗隕仲逹必窮若堆斯植氣横白虹有如雲長髯脩且揚明燭逹旦志嚴秋霜樊城之圍聲震荆揚若堆斯壯樹我天常有如翼徳鐡面突兀長鏢風馳神駒電颯變起侍帳心明皎日若堆斯挺精爽不佚有如工部樹幟詩壇内篤忠懇外歴艱難一飯不忘千載所歎若堆斯固大節孤攀有如濂溪自得深造愛茲池蓮不除窓草上探洙泗下開頥顥若堆斯立示我大道有如康節學究先天居䕫有咏演易有傳心勤觀象淚堕聞鵑若堆斯嚴範兹東川有如梅溪攬權獻䇿忤彼巨奸因之外謫馬綱抗疏義泉遺澤若堆斯正爰立臣極繄昔賢之幹世運奚啻夫灧澦之障頽波在地為兹堆之屼嵲於人為氣節之嵯峨豁古今之大觀詎坎流之殊科諒兹心之貞白又遑恤乎其他茍吾力之既殫胡可委世變於江河指前修以作則礪貞石而礱磨切予衷之仰止望灧澦而髙歌歌曰川水瀰漫兮䕫石嶻嶪波有堆兮士有節茍弗自立兮非潰則裂吁嗟士兮視此石兮百挫而不折兮巫山十二峯賦郭棐繄金方之靈鼇兮屹䒶墜之雄觀列坤輿以奠趾兮劃參井而為門曰瑶姬之靚粧兮鋪十二之瓊簮峩翠黛之六六兮重青螺之三三駕豐窿以縹緲兮搴雲軿而囬環靈虯朱鳥翔躍於其上兮琪花瑶草芊茸于其間諒𤣥天之咫尺兮夐㧞地而西盤仰羣峰而舒矚兮可屈指而縷言如飛鳳之連蜷兮如登龍之蜿蟃如集仙之幻變兮如聚鶴之翩翻松巒儼其嶻嶪兮上昇踔其巉巖朝雲蔚其靉靆兮望霞耀其斑斕翠屏列而逼斗兮净壇聳而孤扳灑起雲以霮䨴兮浥聖泉而潺湲諸峯森森其羅列兮孰謂竒穴之可探維仙都之寥廓兮宜鸞馭之往還緬華容之清芬兮佐禹績之駢蕃導岷江以疏九澤兮壯灧澦而障狂瀾茲神功之不磨兮澤萬世其何刋悵仙風之既邈兮空餘𤣥猿黄鶴吟咷而飛翻年年春風荏苒兮杜鵑啼雨桃花斑洵瑶姬之瓌瑋兮詎塵寰之可攀何宋玉之狡狡兮恣唇吻而謔談混神仙於世上兮辱懐襄於筆端詞人襲其荒唐兮競藻繪而騰諠非沈洪之博辨兮孰究測其真詮惟秋序之既杪兮弭予棹於江干望十二峯之岧嵽兮惟聞松風鶴唳交紛喧發長嘯於山川兮挹餘香於蘭蓀慨古跡之緬邈兮寄幽懐於芳尊逰雁蕩山賦并序劉文卿叙曰蕩名乎山山上澤也山系乎鴈誌澤物也大易垂通氣之文夏書陳導及之次非以標應天靈表章地紀者哉故氣通則穹窿之源厚本緼則竒闢之未華山則並海而窮海則幅山而盡斯鴈蕩之所以欎竒而分態也余以壬辰五月役於臨海走黄岩出鴈山南三日而觀止礨之㣲阜之博悉有形肖怵目駭心其為二儀之英審矣而用晦在昔不與吉烟望崇之典或勾吳未通上國所由乎乃誌之所稱土瘞也雖然山川之變大矣哉會稽之勺山經述焉今又安所考其去來乎然則賦之奈何逹生生之始而忽有形之結則梁山何以書崩於晉岍岐何以首叙於禹余之此作興公遐宅之慕靈運休足之悵庶其有暢山林宣於來情者矣至於逸險遺幽忘美實多所謂得意忘象三餐而返者與伊東印之巨海鄙􅀈浴而脉融四明峙漸會之表天台臂越障之觀嵬踞踴於綖中罕剝磕於抃鼇惟鴈山之奠跨􅀈潮之所戮流映扶桑而浸日祖天都乎父姥托窮跟而廽履迷谷隧於藜藿畤典遜而絶書緼䞈峯於謝樂豈閉秦乎桃源抑錮竒兮地底髙岸谷其坏落兮沒浮天而莫徙澂雷震龍蛟之所澆委兮海童轝以為紀崕削襞以無鄰兮體嗇塊其孰止歘大壑之蛻骨兮兹中刼而幽掀維星介於牛女兮滙温泉以建經鶻僧授記楚之湘兮山鳥地花謂我則靈盤峯欎萃其陽紆兮數四九而脊休芙蓉應予以汭光兮鑑帝壘之鬚眉玉環南辮於外澨兮障空掩靉而連琉璃却余跟於嶺岐兮見石虎之咆吼摩斯宅夫磑隂兮澗沙湮而不存食雲衆而取食兮鉅鑊野處其無徒考至正之鐫號兮曰蘭茗之始基翳荇菉於瀕湲兮窮五轉之名溪舒淺水之麗石兮晞朝日之鮮葩盻寳觀之端委兮天剪􅐅􅐅而蕩余曲直象以合股兮景中射而流渚趨龍湫之谷結兮屹瓊標而質改被霏㣲之墜露兮仰懸晶而目惘聳丹崖之脩廣兮振襏襫之披離中霤激而外漩兮舞霜雪之滛裔驚流合其駕白蝀兮照倒影以為霓逞裊變於迅風兮瀰雨谷之滂沱烟面水而澹澹兮寒風静籟而遹皇艧壁萬仞絶齟齬兮欹上覆而虚巨若示寂於三昧兮寳絲網而為華罔明既其神力兮曾東來其刹那屏崖半其兩穴兮息閻浮之齁齁昂東慄而虎蹲兮嘯谷風之飈谽陶熛絳天沍碨瀝乳應龍巻靆宻雲兹府雖散徙於中霄亦爰集於祥嶺倚招揺以象天兮騖海印而住光伏撮米於下壠兮睇帝壘而降衮既麓子而為珪兮亦峰曾而為筍喻馬鞍而宣眺兮像化身以得命綠黛束之榖玉兮中四望而馳驅列宿布節以罘罳兮翠􅀢稽首而淟涊左更北服乎前輅兮二龜相睞於中天望頂湖之浩蕩兮金鴈雝雝其來遷蘅蘭欎其競芳兮流棄匏於谷口殆應真之所廬兮噴寒濤乎木未掇若華以為艎兮鞭地行彼為榜湯播洩于離湫兮嗟近代其每涸云青泥其淖䧟兮左未入而右縶顧頂珠而直進兮摩尼煇乎六種轉蝥姑而旗立兮天柱峋嵂乎艮土豈斷足以立極兮首瓊枝其芬敷比丘抱石無沉疴兮鉢盂覆側頂不覺兮爰有靈岩是為天宫紫甲信甌錯之肖異列蕭佐法雷之淵卓筆小果天女供疏平牙瑰玫方城赭堊山蔽虧其暱曜兮障中裂而洞胷蒼龍偃其下飲兮何有漏之涓涓鼻低徊以觸滴兮修爪鬛之連巻積溜長而成體兮液閬風之玉英具青紺之殊色兮獻纎腰之妙婧患羅隐之不仁兮戲逗靈鼻之潺潺晨南望以徜徉兮轉金色臂而上􅫙面天柱以半􅀈兮巧倕斷其圓姍嗟敷座其放洵兮㕭􅀈峭壁而含風豈土曩之别穴兮碄碄杳其通幽都韎􅀈奮於千仞兮足半垂而疾驅藏金簡其靡開兮天笥浮於帝隅伽玲䃥䃥其淵鳴兮左右幅應而孤居横溪震其缸鼓兮亦谷虚之所吟吁蜀桐戞乎吳石兮繞娜𦕈而降鷟鳯蓮葩吐其馥座兮三萬二千之法王大鼖􅗟磞其四陳兮雷骨掘而聲揚五色燦其燭天兮東陵𤓰類而佐徐越怪象之彪騰兮廣晳偉鼻其下垂目烱烱而中削兮凌蟭螟之疇騊駼入榛莽而静志兮悅五姥之背駢循荼崖之帶胃兮兩夫釋鎩而箕門雙鸞比而引首兮謙謙矩其北翔靈子整翼於右梢兮西鷲孕度其方驤右伏翅之翹起兮擘海取其敗龍概班陛於下陳兮靈峯處髙而聳蓬􅀢干霄而雙峙兮中配體而上下離鵷雛運目於比肩兮犛牛南嘷以率毗天門開以敞豁兮狀如梭而陽虚扳升㮙林而定氣兮兀觴神之帝臺朗怳空寂以彤樂兮粘石疎乳而滴帨壇丹黛縐澀而松鱗兮殺巨掌開合而神竒返元滅乎色隂兮姑安詳起而察雲物驚五姥皤立於朱隅兮雙鸞匹棲於户闑瑰鎗鎗來儀於瑶池兮有封狶矯首而北卬瞰琅琊之旋坻兮悲大人之幻市矗方石霞駮而磊轉兮赤瀨倒嵓以東邐逕謝嶺之止足兮薈秋蟲之譻喔望石虹之蹇㛯兮疑逃台而飛砢亘曲絶崥而覆岩兮亦蔽雨而怒風胡髪種種而團首兮面盂欲飯於濞津偏袒舒鞸垂瓔珞兮豐肩缺齒陋靡髭兮貝鐘硠硠而罔聆大通十坐乎僧祗方巖嶻嶭以牙張兮溜湍浮響而迓余罟香鱗於清冷兮緤厥弛於東塗咽竒茗於蕩口兮屬芳流而踟蹰從大平而廻矚兮浸翠阜於黄波振列繒於空澄兮實花落而本陂超荒經而為體兮詭麗勃屑伯昏於是乎恂慄勢若倚而反植貌似夷而忽憑煜四方兮三壇灼九龍兮層城為豻為貍兮妙珪璋之不琢為猾褢而蝮虫兮孰都盧之能度咢濯依於窮顛亦沒像於紫澗惟趾随而號殊慨目移而影别雲𤣥嵬黯電急風騰罣曜金縱披霰璚立絶磴縱中崖磔揭草滋麗采葉落成章上有拜岩百藪之飛泉下有洄穴千仞之幽谿玩神龍於滅景其大小之所如雲布濩其經宿風颼瀏而入無虎類戒足鹿蜀窮途發鷩鳩之狂呌媚蒼舌於宻蒲春卉幽蒔㽔嶺舖峩龍居作祟氣朋雲和潤嶽沉峽激石吞沙濺白篠箭澒雷漢槎秀情命駕龍瀑是嘉炎司四涸裂翰林崟爍石如然木客戒陰積苔露淺巻石成霜紫蚌傳殻於粉沙𤣥甲潜形於深漿辟足髙岑邀風伽林金天登牒瀟爽暑路鴈距始還流雲縈度四照猶芳薑芋畦布松幹浮根於清漢頳石倒縮於青楮揺木菸華黧獮嘯月若夫重氷固島積雪封巒曒日踆於虞淵幽崖閴其黝墨茍落曜於平垠惟亥午而是則寒鴉凛爪而失條纎魚沍壑以轉迮千桐失其菁葳翳㯶零其浮蒂兹頀質其縞衣宵光曙乎天地洪崖為之歎息明通靡能措跡葦稻秸以豐蔀兮曾君王之莫知尋竹綆以溉畦兮橰數泆為多機雞飲啄於鳥道兮豐隆仰震於杙題或乃猛氣宵興山雲晝出喊白鶴兮孤蹇為修羅以匝足怪石支離而呈藝冡頂挂星以綰玉或乃􅀈臺帝䇿萬世莫發山鬼夜號於疊􅀈谷神接響於斵木元緒呼老桑而絶耳芘羸似洵出而為族支竹緣偶金橙夾麓木連被兮白沙萍藻潔兮列潭亦山瘠而土刋故生嗇而靈長是乃列仙之所都居豈尸逰之茫茫二峯締長離之瓊盖瞀松因絶頂之赤光盍棲神以發蹤夸追影於列峯隰湖瀁洸於四野兮凌萬頃之碧波天吳揚舲而歕欱兮桑田代變其云何想叵羅於毗耶兮御白牛乎震東老僧度於化城兮震五鼓於雲中噴肥膩之佳味兮𢎞六天之雨花洗余心於錦溪兮忘陰入乎自他歴南詢以入樓觀兮證十身於海漩冠樺皮而譯藏兮衣䟦耆之擻賤聚􅟴璖以應供兮將採櫓而取麻棄鼔刀以正位兮宴靈峰而拈華反初服之崑崙兮攝兹山於末毫明文海巻十三
