body:
  text: 明文海卷十四餘姚黃宗羲編賦十四山川六海市賦黃卿猗巨壑之連大荒兮何灝渺之無垠浸盤藍之淡濘兮兩曜晃其吐吞西極以東之流㵼兮總滙溶而不霪維五行之贊二儀兮水邃廣而獨神指三山十洲之宫府兮聿杳邈而難論眷海市之譎變漂疾兮駭靈異於見聞彼喬嶽之雲霧兮氣氲蒸之可知若潮汐與八月之濤兮亦實理之所為何洪波之泱漭兮恍惚出示之瑰竒倣佛世之形質兮頃刻更移其態姿寒晦斂而宜和朗兮計歲見之無幾詢海叟之慱練兮槩罔究其兆倪陟蓬萊之峻閣兮出海隈之崇岡盱雯䨴之乍斂兮泛霽日之浮光渺萬頃之瀲灔兮胸襟豁以徜徉人走報以市起兮僕御奔而踉蹌兩竹山之夢夢兮牽牛島失其青蒼肇蓊鬱於尋尺兮旋騰翥以悠揚少徙倚於巖阿兮已宛在水之中央卧青霓之空明兮如潼潼於沸湯簇碧霞於一區兮浮暗靄而回翔譬畫苑之會衆藝兮懸繪品之千章天吳群下而蜲蜲兮亟為築厥厚墉罔象十輩而出捧兮躍蜒蜒而爭能爰居潛鵠翩翩兮如助勢而蛔鳴爾乃開五都之闤闠兮集日中之市㕓南北睟貨之雜陳兮海賈陸商之爭先立候殆工匠之售技兮佻佻類駔儈之輕狷販鬻之繽紛兮繄接踵而摩肩言不聞而有營兮覩巾服之粲然緂獲貿易以散返兮行負戴以傴僂伊機巧之戲劇兮爭聚觀之如堵負耜耒而荷畚鍤兮走農豎與田父一二辨屨之若逺兮意何居而踽踽山冥冥以逺隔兮巨介避之何所俄而金榜之日耀兮列甲第之逶迤崇堂層樓之翼翼兮雕甍朱拱之翬飛亭臺微突其尖兮重簷密瓦參差雉堞嚴城之洞啓兮藻繢黼黻之葳蕤寶塔矗矗凌霄兮華表踞立乎虎獅余擬長楊五柞之麗兮客謂未比其光儀忽逮纛幢之孑孑兮散旐旟之旖旎棨戟干戚峥峙兮躍騶騎之蹻駛安輿飛蓋之徐徐兮襜帷流蘇之鮮袲從官健卒侁侁兮郊迎野將之迤邐憶名城之孔道兮輪蹄輻輳之如是爾其酒斾揚揚兮芳菲近郊遨遊絡繹兮飛虹之橋王孫俠客兮鷹狗靚粧姣服兮笙簫竹娟娟兮俯垣茂樹交兮徑遙熒熒兮日下射翳翳兮風不飄欣欲就兮水之隔招名筆兮臨之圖有懷華胥兮風景爾殊空中波上兮靡盬璘斑爛熳兮易佉滭沸兮奔電息潢􅗛兮涵杳虛如錦棚之迅撤兮傀儡紛散於須臾望島嶼之隱隱兮招玄鶴之翩翩顧偕遊之大小兮漸容與以言旋謂老農之播怪兮何鯨鯢巨而不然殆海若之幻戲兮較浮世之絢妍嗤方士之陋以誕兮誘秦漢之求仙侈金銀之宫闕兮或緣此而誦謾嗟么麼兮貴幸若赫橫兮威權燎熖兮易燼綺繡兮露乾百爾翕散消息兮咸有極而有端寥廓忽荒如夢兮嘉曠士之達觀奚詰辨之倣雕龍兮漫贅費於幽玄杏壇賦黃卿魯邦奕奕兮少昊之遺有阜隱起兮維天作之乃因乃壇兮碩人築之乃植之杏兮厥壤之宜陽噓隂吸兮風雨維時唐虞邈逖兮西周聿衰道堙詩亡兮世不可為篤生先覺兮文其在兹眷兹階址兮木鐸其鏜朋來四方兮濟濟蹌蹌函丈樂育兮麗澤孔芳瓊琚陟降兮揖遜鏘鏘琴瑟在御兮雅歌洋洋四教循循兮兩端無餘三才六籍兮一貫萬殊進之語上兮反之三隅何類之無誨兮何材之不儲謂宫蓋廣兮厯級步趨謂墻數仭兮行之次且彼杏之灼灼兮卉木同春彼實之有蕡兮寢廟薦新蕤蕤猗猗兮言憩其隂居之弗雕弗藻兮存太古之淳在洙之涘兮維洙滮滮在泗之上兮泗之徵幽逺有岱宗峻極兮近有峩峩之尼丘吁嗟隅圮壝陵兮風樹逺而澤流萬方多士之翹跂兮沐私淑之餘休彼土木之雄麗兮曾何足以少侔濰水賦黃卿侈觀海之雄濶兮復靈山之巍峩捐東征於膠牟兮爰厲褰於濰河同清淄以既道兮慨禹績之未磨惋古渡之無梁兮停輿騎之逶迤叶泊汜泭之泛泛兮乏維楫而罔拖泅人戟手以招呼兮逺旋睥睨而遲過石齒齒以夾列兮岸岌岌其頺沙榆如楓之芃芃兮栁毿毿其俯柯兹東方之稱望兮淡澶湲之洪波佇瞪眸以上下兮聿泝沿之莫量值漆漲之既定兮受諸溪之泱泱日杲杲以下映兮嘉瀲灔之浮光風微掠以蕩淪兮輕文鱗鱗以相頏忽層浪之洸洸兮珠漚起沒於中央水鳥翩其錦翼兮相泛浴以廽翔有巨魚之突起兮鰷鯽尾而分行掬涵渌之湛湛兮誦孺子之滄浪考圖經之源委兮出琅琊之懸淙詢土人之往躅兮曰韓王之戰場曩欲閲其形勝兮肆延却以睇觀善將兵之多多兮佐以張耳之桓桓乘連勝以東下兮殆破竹之無前夜囊沙以潛渡兮竒計莫測其端龍且亦楚之矯矯兮併數萬而蹙殘揚捷音之赫濯兮築京觀於廣原強楚為之奪氣兮東方震悸而膽寒遂挾功而請假王兮奄有齊氏之山川憶戰士之橫戮兮爾何生之不辰立頺垠而愴惘兮弔千載之旅魂骸胔堙於沙洳兮血濺歷於朱殷想隂曀而喑泣兮搖冥夜之鬼磷或波聲之哽咽兮亦玄靈之嘆嚬何天視之茫茫兮棄三代之遺氓秦燔燎之幸熄兮重以劉項之忿爭諸滅國之甫復兮旋橫摧於強兵噫田橫之遁海島兮失虞舜之禘祾春秋之善救者兮龍且師來之有名嗤汝韓之鷙噬兮殞萬命以誇能仰大賢之惻怛兮斥善戰於上刑止戈禦亂之不得已兮稽九伐於遺經覽浩蕩之宗海兮懷濟川之先正叶彼格鬪之錚錚兮等漾漾之浮萍滹沱河賦石珤介然子將如東瀛放舟於滹沱之浦覽郡國披山川辨土壤聆風泉俯象六極仰窺無垠問遺俗於故老招海上之飛仙於是揖漁人而進之曰子亦知夫兹水之源乎出自繁畤經於代谷放乎雁門之坂帶於太行之麓朔方巨嶽實扼其胸恆衛諸流半入其腹氣吞萬壑激硊􅓓而未平勢應三泉墮平原而逾蹙時乎春氷乍融積雪方解支流趨順客浪藏駭迂回縵延千里一帶霤石成渠鏘波赴海千城藉其潤色萬畝資其灌溉鏦錚鳴帝子之環嘔軋散將軍之凱編桴賈客燈火輝煌罷釣漁郎歌聲欵乃芳洲乍晴倐昏忽明攬神農之遺譜得靈均之杜衡及夫積霖未止秋水大至巨濤坼空駛溜軒地律令助威飛亷擁勢海若為之改容巨靈因而避位鯨翻渤海鬼母長呼虎栗昆陽英雄失智山刋災翳野誅朴樕先驅一指崩沙潰屋怒留城邑薪藁如雲殃及鱨鯊僵尸遍谷亦有傾城摧山變陵不雨而怒無龍而興湍隨鯨徙勢若雷崩斷岸蒙隤殷輪牟赤平岡被囓戈戟猶青雷崩斷趺訝魚龍之識字赭留袍笏豈犀火之通靈乃有泗濵磬浮汾隂鼎見寶鏡入秦號鍾歸梵涇陽嫁女簫鼓猶喧龍叟射綃波濤飽戰壞百尺之長橋剗千年之古塹人懷魚鱉之憂國有沼池之嘆忽幾劫之餘灰出昆明之一旦蓋自列國兵屯朝齊暮秦盟偷韓魏兵來薊門趙國上卿功名一擊平原公子車騎長奔虎狼勢成合從事緩頗牧既亡望諸已晚建不出援丹空起變常山之蛇陳徒存主父之龍顔幸返復有劉項相雄赤旗建功淮隂故壘東垣廢宫王霸詭氷再光舊坂蕪亭飯麥猶著遺忠保河北以待朕亦何異於關中乃至開元弛網漁陽肆毒投鞭斷河驅王入蜀常山太守首厄天下之亢帳下諸兒竟破羯奴之腹惟宋有國兹當北垂契丹伺便西夏來窺築甬梁津任布有備邊之䇿山崩海覆劉竦興致死之師自餘紛紛以暴易暴中更幾秦世厯多號劉琨有志獨枕長戈虞詡難逢空增萬竈太平之日少於戰爭隴畝之民耗於邊徼是宜地下白骨多於黃土長河東奔為泄其怒推車卷甲蕩百世之餘凶濺沫飛流刷遺羌於千古山蓋不得不峻水蓋不得不駛陵谷蓋不得而不變城市蓋不得而不徙是雖天時人事交會之偶然然亦豈惡殺好生造化之得已者乎乃知天本待人地亦藏宅畀我祖宗增其式廓既定鼎於金陵又相居於恆嶽若成周之豐鎬復營邑於伊洛挽唐虞三代之遺風增版圗萬里之式擴於是山多獻靈川亦效職噓氣成雲蒸地得澤不須劉纍豢靈沼之二龍亦有豫且得白龜之徑尺木多杞梓自河而東波有鰋魴望海而入其有異氣藴鬱孕為賢良輝煌事業璀燦文章髙門大纛紫綬金章或名流乎林藪或身負乎綱常乃若蘭陵著述功裨墳典文貞論諫治逮成康閣敞平津屢屈吾丘之博辨屛張便殿猶存李綘之封章武惠忠誠身兼將相韓維兄弟並在巖廊趙賔客之名懸調燮黃牧伯之風挽循良一代龍頭世頌文忠之相業兩朝司馬名登恭敏於旗常是其在昔有作於今益昌孰非山河之所鍾育地氣之所敷揚者乎矧吾生之行休值海波之方晏駕木蘭之長舟縱千里於遐覽橫桓伊之古笛飽亷頗之一飯藉荒磯之芳草憩清風之别館采江籬以為佩畦揭車之九畹悵九原之莫作想古人之如見於是流魚出波沙鳥鳴苑月華窺林露色凄晚樂未極而悲已生日己夕而路猶逺既引領而高歌又一唱而三嘆浩浩乎飄飄乎蓋不知吾之所欲之而忘吾之所欲返也歌曰山窅窅兮波鱗鱗臨長洲兮思古人魚來迎兮鶴與吟惟秋鴻兮北以南志不可騁兮樂不可單還豫舟於江臯兮吾將續先王之遺音艮嶽賦李濓宋政和間詔築山於上清寶籙山之東象餘杭之鳯凰山初名曰萬嵗山後更名艮嶽以其在國之艮位也嶽之正門曰陽華故亦號陽華宫飛樓傑觀竒花怪石崢嶸巧麗可為極矣詳見宋史暨僧祖秀陽華宫記靖康兵燹之後無一存者余汴人也數遊其地周覽荒基追憶其盛賦以哀之時正德丙寅嵗也躡陂陀之土丘曰艮嶽之遺趾杳臺池其何存悵宫殿之圮毁走狐兔於窟壕莽蒹葭於潦水想全盛於前朝當政和之初紀倡豫大而豐亨崇苑囿以經始咄蔡京之姦諛進朱勔而任使廣興築以遊觀傾帑藏之儲積耽逸樂於當時殫民力而罔惜寶逺物以自娛役耳目之無益費千金而一花勞萬夫而一石萃珍異於天波門名也致希有於汴陌搜洞庭之瓌竒罄太湖與靈璧爰鑿堰而破閘始克達乎都驛乃有紫石之巖萬松之嶺海棠之川朝真之境馴禽猛獸之聲野店村居之景又有龍吟之堂巢鳯之閣極目蕭森飛岑八角斷峽層崖回巒峭壑白鳥成群錦鱗自躍蘆渚梅汀栖鷴駐鶴其上則夀山峩峩兩峰對列瀑布下垂噴氷灑雪煙霏冥濛寒氣凄冽其下則景龍之江澄波瀰瀰鸂鶒鴛鴦飛鳴戾止朝暉夕隂變化倐爾其最髙者則有絳霄之樓白雲之屋木棧驚鳶石磴駭鹿巘接巒回岡連阜屬左右蔽虧前後聨續沿澗而轉坡降巔而憩麓十里笙簧四面檜竹徙蓬壺於中土漏渤澥於平陸十步一館五步一亭雕欄曲檻碧牖朱櫺枇杷橘柚黃楊冬青虎耳鳯尾含笑素馨遍滿山谷婀娜娉婷見髙陽之酒肆倚南山之翠屏觴壘不竭絃管可聽更有竒玩崛﨑玲瓏玉京獨秀之巖慶雲萬態之峰去天咫尺宿霧千重秀拔雄峙若削芙蓉巨石數仭屹立有容或如儀鳯或如伏龍嘉名帝錫盤固侯封馳道行幸陽華之宫百鳥迎駕飛翔蔽空見桯史王孫絡繹寶玦相逄栁隂蹴踘花市歌鐘謂太平其萬載俄潢池之逞凶失戰守之大計括金帛以和戎屯牟駝而縱牧邀青城而俯從歘鳴笳以北去擁鑾輿於雪風眷舊京而返顧洶煙熖於域中信悲生於樂極徒抱恨於無窮嗟天命之不常惟一德之是輔究治忽之有繇實人事之自取茍好樂之無荒保生民於安堵仰無逸之姬公誦旅獒之召父並陳戒於顯王永輯寧乎海宇何宋人之不然誅京勔其奚補矚陳迹而撫然聊摛辭以弔古登秦嶺賦王雲鳯我登秦嶺之巔撫清風之泠然雲飄飄以翼豫兮搴長松而繫馬覽千里於咫尺兮萬山纍纍而在下野老導豫以前路兮曰此韓子之遺蹤望翠巘之片石兮得夫子之幽宫世皆輿傴僂而婢詬喻兮子有丈夫氣安得不窮直諌自古不容於朝兮又何問家於湘之童蒙厯炎海之瘴厲兮奄歲月其既老胡生還而益壯兮塞胸中之浩浩蹇悃諒之蹈嵌巖兮何不改路以嚅唲屈原葬於魚腹兮今之智者笑之吾將剪彩霞以為裳兮結長虹而為綬榼洞庭以為漿兮種千頃之蘭蕙以為糗愁猿吟兮石泉鳴九頓首兮公之堂鬱豫懷之極悲兮豫亦不自知其何情退而讀公之文兮夜爛爛乎其有光渡黃河賦王雲鳯造化剖胎混沌開函黑水沆漭崑崙嶄碞乃有百泉星聚以下列九派虹分而可􅀢忽茫􅀈洶湧稟中央之正色兮飛下萬仭之重嵒滌戎蕩氛兮望神州而南騖抹雍貫豫兮上擁磧石之滓下吞滄海之醎澓湋東西衝突南北蓋不知其幾千萬折謂之千里而一曲者乃其大凡時或帶雨以奔怒齧崇崖而肆饞渺平原兮曾不一瞬渠深如谷兮崖突如巖聲若迅雷之將擊勢如怒兵之鼓儳河伯踴躍兮蛟龍肅舞濁濤巨浪不啻日浴而天銜野老稚子號顧以遁走兮壯夫健婦爭持敝畚荷長鑱峻隄忽亘以百里兮林空山赭曾未惜乎合抱之松杉慨何代不罹此患兮豈水德之匪仁抑上帝之降災兮而吾未有乎至諴何艱兹辰汴隄決緘千村萬落如刮如芟天子震怒乃責守監何獻䇿之紛紛兮曾不異乎燕語之呢喃匪順下而障塞兮斯乂鯀之搶攙泯脂膏兮竹石絙百丈兮落緘溘瀑㵡兮一芥􅂒疲癃兮喃喃欎里閭之㗲嘖兮望天閽於霄漢鐫功伐之矗矗兮輦西山之珉瑊我扣舷兮太息但見漁人舟子天際挂一葉之輕帆欲訴真宰何辜兮蒼生安得神巫起鄭之咸明文海卷十四
