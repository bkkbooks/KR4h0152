body:
  text: 明文海卷十五餘姚黃宗羲編賦十五山川七渡瀘賦何景明晨瞻崇丘欎乎相袤扄以水峽隱以大洲沙莽寒日江深夕流蓋將濟於瀘水榜人告豫以理舟沿洪波以直度迎廽飈於上遊顧中原而緬邈久西域而滯留感逆旅之長勤懷古人而增憂想夫漢炎既燼蜀都始家區土未闢士馬不加深入五溪橫制三巴冒險通塞柔邇來遐收羌髣以帶甲率庸盧而習戈撻吳權之堅鋭摧魏懿之精華今其斷岸遺津寂寥水涯苦霧縈石悲風振沙音塵淪絶古今長嗟嘆餘風兮莫覯幸故址兮重過西望開創之基形勢蒼蒼襟夔府而控荆門峙巫峽而流瞿塘簡書零落陳圖縱橫煙磧下月隂岸積霜風雲慘而猶憤魚鳥畏而將翔功雖殞而譽逺身既沒而國亡南瞻祠廟巍兮惝宏松柏蔭户丹青閟宫垣罥林蔓階卷寒蓬亦徒嘻吁父老涕淚英雄而己嗚呼當其長嘯之後三顧之餘氣感雲龍恩同水魚念季葉之否運思中興之遠謨偉雄並乎三分恥偏安乎一隅何遂違其懿志竟弗騁其長驅吾哀斯人遭時不淑宜三代以翶翔胡羣姦而馳逐矧功業兮難成且年嵗兮易促嗟哉天道髙不可摩得志者寡失意恆多茍道之不行雖孔孟其如何泛泛吾舟載揚其波艤彼清潯陟彼中阿無人可邀聊獨行歌歌曰朔風起兮瀘水寒扣楫中流兮懷昔賢遇匪其時兮良獨艱嗟嗟遇匪其時兮良獨艱夢遊山賦楊爵時和煦以轉泰兮嵗惟丁夫壬寅豫倣佛於夢中兮夢歸遊於咸秦歷韓魏之故疆兮泛柏舟於渭濵浮䫻􅂒以逺覽兮暫憩夫山之危岑乃吳嶽之崔嵬而秀麗兮古號曰西雍之鎮峯突屼以峻出兮勢若連乎霄辰石巉巖以崚嶒兮百壑砑其嶙峋風習習以清和兮迹迥脫於世塵草與木森森而夭喬兮秀雲邊其苯䔿鳥與獸蹌蹌而頡頑兮若解意以相馴豫乃采芝蘭以聊茹兮氣和煦而苾芬把清泉以時酌兮蕩我夙昔之塵襟忽回顧以寥廓兮百峯羅翼其共臨俯仰豫長笑而朗吟兮髙胸次以樂真山有廟焉迤邐其麓之東南兮以時妥侑乎嶽神棟宇苞翬其壯固兮丹青煥乎其惟新背􅑬嵼而面涇渭兮延廣袤其幽沉古取大萃與渙之大義兮儼嶽像以獨尊豫乃肅容儀以瞻拜兮心栗祗其快覩復長跽而祝之曰惟明神其監觀於下土以大義而降禎祥與妖孽兮斯固無幽而不燭夫何世事之紛紛乃有稽典訓而不類兮固豫中心其眩貿豫敢筮遊衍而不豫隱兮願得夫豫奪之微故惟豫小子之有生兮何不辰而遭世風波灑憂時之血忱而負志於孚先兮固久罹於窞坷時有愆而思咎兮求不忝於屋漏於嵗月之陽春兮今已兩過念豫總角而志學兮每矢心以克邁嚴步履以出戶兮敢斯須而或怠景先哲以周旋而與歸兮乃忽罹此凶害豫小子反復思之而莫知其謂也語畢悽慘流淚澘然傴僂伏俯聽神所言惟神囅爾而有聲兮復喟然其長嘆曰嗚呼來汝小子兮是爾之愆爾不聞曲其躬而圓其形兮取封侯以相先或有貞直方而未少回兮死固不免於道邊當行而我行之兮當止而即止斯先達之明訓而可敬服兮胡不珍身而量處道固不能無消息兮應斯有常而不茍相幾而或少戾兮夫孰非以災而自取惟明哲之見髙一世兮動自逺於坎砢燭隱機而尚肥遁兮泛長江之一舸乃有迷檢括而未諧兮拂潛晦以自頥衒昆山之良璧兮人共惜夫楚和履大間而不茍措兮固自謂世所尚也當枘鑿之不類而欲強置兮孰不指身心以為訛嗚呼小子而今後其尚亹亹焉以克勵未可以一蹶而遽挫思福堂之玉汝其成兮方一念之偏頗惟古良士之堅志於患難兮日尚友以切磋寧雉介之耿於羅網兮勿狡免其爰爰寧松柏挺挺於嵗寒兮勿桃李其灼灼何所往而非我所安之地兮慎無惕中而懷憂彼皇矣之全賦於有生之初兮惟反身而自求聽吾誨爾之諄諄兮尚不忝於前修茍迷途其終不悟兮乃脂韋以自羞豫乃再拜稽首而起應噍噍其未巳將周旋以出户忽驚愕以覺悟時東方之既晨愧絲粟於枕衾嗚呼天耶神耶教戒懇切誠可信而可遵大道坦坦而無曲兮固不越乎我之心交南賦湛若水豫奉命往封安南國王睭正德七年二月七日出京明年正月十七日始達其國覩民物風俗黠陋無足異者怪往時相傳過實託三神參訂而卒歸之於常作交南賦皇穹極乎無朕兮廓空窿而罔象厚壤淵其莫測兮又坱圠而無垠爰上下乎中土兮中氣聚其曰人風四漸而四荒兮極泱莽乎禽獸草木而為鄰維中氣以風之又漸兮聖神肇乎盤古降皇皇而帝帝兮哲王以之疆理乎中土列四方而五服兮薄四海又建長而以五惟悉主而悉臣兮哲要荒以為度帝曰南之荒裔兮疇分野而代工南翼軫而朱鳥兮帝炎帝而神祝融窅乎皇后君之攸治兮曰火仙而徵龍燭九隂於赤水兮覿馮夷之幽宫昔陶唐之咨命兮羲叔南宅乎交趾庸均秩乎南訛兮亦暨時之與事季德涼而莫遐兮荒忽以之自異維彼交之蕞爾兮北五管而越南裔際尉陀之七郡兮漢九郡而同置憑都盧於天末兮望越裳乎海際南迤邐兮占不勞西聨屬兮滇溟之尾派諸葛之渡瀘兮州炎漢之經始李唐承乎厥後兮恢都護之府治昔炎氏之方殷兮泛海外之樓船二女蘖乎中葉兮薏苡用惑夫馬援矻銅柱之磷磷兮厭欃槍乎南天彼髙氏之定交兮建石塔之巋然故峍崒乎橋市兮立富良之江埏彼爾黠曰炎均兮冒耳聃之仍雲維公藴之肇緒兮紹八葉以斯君京用篡而易位兮附胡公之逺孫和叔後其曰黎兮亦攘之於纍傳昔少皥之方衰兮九黎擾而亂德北正黎之司地而屬民兮羌始受之顓頊彼三苖以效尤兮陶唐亦復乎貞則皇混一以為家兮亘地載而天覆一正朔以同文兮又同軌而輻輳物土方之包匭兮則九載而三奏厥易世而來王兮叩天王而庭受析圭玉乎上方兮球辨旒而七綴襪凌波以赤舄兮帶靈犀之與玉珮乘龍節於雲亭兮將天語於揚對帝曰疇咨若時余其以兮疇専對而學詩謬曰豫之顓蒙兮之四方其以宜班麟服其粲粲兮疇豫珮之陸離帶飛霞之弱弱兮冠切雲之巍巍書余紳以忠信兮申篤敬而行之悵世途兮曲囏乂修阻兮嶮巇羌跋疐兮淮泗乃嘯歌兮江湄望南極於嶺嶠兮馮炎飈而長嘆徘徊蒼梧之墟兮揖重華而聨翩西遙睇乎桂湘兮見二妃之嬋娟眺崑崙而容與兮憩舒嘯乎籌邊嵗月經於五管兮青牛服乎南關凱風薰而迎余兮余因以寄興於五絃扳南巢而盤桓兮睹鳯鳥之翩躚始問道兮諒山孰鳯眼兮七源晞晴曛於坡壘兮濯北峨之清湍朝曦發乎不慱兮度卜鄰而僕山步飛空於風磴兮遐縹眇乎雲巔懸巖崖兮淵邃設鳥道兮側旋或深入兮厚土又上登兮髙天鬱山林之險隘兮川屈詰而纒綿暮虎豹之蜿蜒兮朝蝮蛇之蜒蜒過丕禮而昌河兮渡市橋而吕瑰余息徒而班班炎均遙遙以斯迎兮渡富良兮洄灣曰余中華之子族兮家增城之九重從遊帝之玄圃兮間逍遙乎閬風初離郡之豫章兮嘉厥名曰清源派炎漢之司農兮居余都兮甘泉依雲母兮髙嶺邇安期兮左鄰處太乙之穹廬兮抱羅浮之飛雲承帝歌之皇華兮兼咨諏乎炎德泛淫遊乎方外兮觀泱漭之無極嵗攝提之癸酉兮斗杓忽其東捩火輪躔乎娵訾兮魄下弦之次夕蹇余渡以王舟兮亦黝黃而丹堊紛龍舟其後先兮沓蛟人而祼涉楫百撓以象刀兮扶黑欛而刃白夫惟寓藝夫水戰兮或因用以刺擊肆迎拜於厥明兮瀕祥夀之别殿入修門其大興兮見廣文之顔扁臨炎官之窕窈兮祝融蹕而東轉依南風以弭節兮睇天使之離館炎均俯候於朝元兮肅敬天之北面儼百辟以皇皇兮奔重候之欵欵陳黃幄兮月殿時六龍兮臨下叶虹橋渡而未雲兮又鵲橋而參伍聆天書乎洪音兮伏羣黎於下土時中律之太簇兮洪鍾寂而不作叶置鳴鳯之嶰管兮擊靈鼉之髙鼓應河鼓之磅硠兮屢天吳之蹈舞夜義奮其怒臂兮裸竪挺而前杜開廣宴於勤政兮崇余東之席端珍羞蟲蝦兮太牢别陳椰席敷重兮下地登土偶兮簇盤粔籹雜爼兮逺苾芬嗚呼廣樂兮蔑棄大吕跳梁舞蹈兮弗事干羽登庸瓦缶兮捐謝鼎爼時斗杓之孟陬兮列青梅之碧彈櫐杯盤之狼籍兮瓜亦先期以為獻奏蠻樂於殿上兮鼓譟雜進而零亂列雄虺以為陳兮又沐猴而加冠曰而重黎其苖裔兮實乃祖之司農也曷不返乎初服兮乃祝髮而脫屣也敷余闖其度關兮實孟陬之中適嗟陽候之逈絶兮茁芋苗乎三尺農告畢而苖離離兮鷺亦以之藏色望炎火之千里兮臨回風而就炙盼仙果以舒懷兮丹實纍其枝碧傾都人以雜觀兮士女不分而塞途悉鞠躬而加額兮恆首下而尻髙儒冠帶而伏迎兮交大指而跣趺見梟揚之拂拂兮披髮走而迅徂肅龍節兮啓行前指南兮先路駕象輿兮太一使風伯兮為之御搴雲霓以為梁兮先朱雀而向道攬蒼龍而左驂兮縶右騑乎白虎騎箕尾之瀏瀏兮乘燭龍而先後掣日旌之輝煌兮填雷鼓之轟轟閃雲旗之委蛇兮參星軺之鏘鏘飄風裊裊兮朝霞纓舉風袂兮揚揚右余參之以蓐收兮左擕拉乎勾芒厭旄頭以無光兮曵鶉尾之閬閬擊木星以節行兮披鶴􅌁而荷戈兵銜枚以無言兮挾天弧而誰何伏萬矢於林中兮一夫呼而衆呀設丹幄於羣館兮雲帔具而不移羅銷金之蕙帳兮綴五綵之流蘇坐沉香兮氤氲列絳帷兮纚纚或髙歌以擊壺兮滌陶硯於天池山鬼下兮吹燈招木客兮題詩重候珮玉兮進羞儼禮神兮益卑貴者冠兮跣途餐席地兮趺居咨由余於戎方兮訪有吳之季子紛披髮而冠纓兮胡觀樂乎大方而與之論詩旨懸鞦韆兮縹眇乘風雲兮步虛眺有娀之嫺女兮覯蒙山之都姝羌雪白而漆黑兮亦蛾眉而曼膚上衣古而過骭兮又罔裳而重襦袖飄飄其仍風兮足跣跣而泥塗資珍髢以弗售兮齒黝黝而牙聱仍葛洪之丹砂兮將博訪乎勾漏逄鮑靚於南海兮余亦與之幽遘觀民居之鳥翼兮恆居髙而簷低方甍瓦而鋭下兮槩厥形如短圭爰乘葺而平敷兮象鱗鱗其魚魚豈水族相感而則然兮乃厥類而象諸鳥翼堂而里置兮日中市於虛落環四面以施榻兮中市官而均𣙜國無馬之千乘兮又何擇乎驥與駘曰國君之稱富也又曷數以為對兵裸以靡甲兮亦焉用夫犀兕豈厥家之罔藏兮恐其德之未改木寄生之纍纍兮亦既繁而木萎藉若人之福威兮不再世而貽殆炎均貺豫以非芷兮又蕙蘭之旖旎余辭以帝之紉襟兮有縣圃之芳藹又重余以椒苓兮曰余襟之難改余受閬風之繽紛兮兼月殿之菌桂慨有職乎咨誨兮雖草木鳥獸而莫豫䜋或申申而問俗兮恐邦人之女紿招朱鳥兮七宿分南野而司天乃靈哲夫天飛兮盍於余而具陳鳥恍惚而夕降兮曰余不習乎世言交三趾而作篆兮庶豫意之或宣曰普天兮殊方逈氣風兮不同俯南極兮地下仰南斗兮天中規燬度兮鶉尾天地罔肅兮涼風爰又戾兮玄枵澤不腹堅兮溶融馮碧雞兮右掖接烏衣兮鄰邦服余華蟲兮乘駕鵝跨鴻鵠兮鳴天雞振鷺吾其潔修兮海鷗嗒乎忘機疾黃鳥之讒巧兮鳩癡黠而攘棲雉胡臻化蜃而呈樓兮鱔聲霹靂而震怒鸚鵡慧而訴寒兮翡翠胡喪質於竒羽彼紛紛乎斗筲兮亦焉足以多數奮九萬於溟溟兮鵾鵬翼其垂天紛有鳥而九頭兮省蛤胡感而化遷鴂鳴而草芳兮天虹藏而不雪隨陽懵乎氷泮兮布穀啼於冬月曰邈邈乎皇穹之冥玄也昭昭乎博厚邇而不可原也揖祝融之冥冥兮而南紀之專也紛㧾㧾其淵陸兮盍悉余之昌言也曰維揚之末裔兮土赤殊乎塗泥貢竒南以沉水兮又南金之與纎綈橘柚包而莫致兮丹荔遠而見遺繄鑄山兮為金又煮海兮以為鹽波羅特乎彼岸兮安息以液而自殱狶具矢而捷射兮獸帶甲而穿山麝藉香以為祟兮猩猩機疏乎能言探余驪龍之頷珠兮又網海根之珊瑚珮明月乎南海兮拂若木於明都獸為舞而銜戈兮蓬萊浮海而負鰲射工巧而俟影兮巴蛇吞象而吐哺又九首吞人兮天吳怒號犀胡靈兮而厥角通天象奚知兮而委齒自埋乎有鯈忽兮玄虬負黃熊兮出遊眺西皇之青鳥兮見王喬之雙鳬恍海若兮夜出水妃偕兮朋遨胡馮夷兮娶婦諒佳期兮好逑何海上之居人兮頭宵飛而海食晨則返而完歸兮又追隨於往夕歌曰二神僪詭誕慌惚兮懵乎余狐疑助莫決兮騎彼箕尾揖傅説兮天路漫漫何修越兮昔羲氏之宅交兮化為神於日馭曰南訛以平秩兮就余訂以一語依朝曦而折𠂻兮庶吾之猶豫曰物之生顱玄趾基一體齊氣孰首飛之斷永不續孰能彌之補天有石誰其治之鰲足立極孰睹裁之象能埋牙誰親掘之無爪無角誰與鍤之馮夷娶婦匪形安協水仙有宫胡身業之鵬翼垂天誰能運之扶搖而起擊水三千孰其仭之有鳥九頭孰啄食之惟天之本誰參析之虺毒一足誰附益之天地之常傳物有極日月曜靈風動雷拆動植潛飛咸識其職百家九流荒唐莫測爰有典謨聖人作式厥民析因鳥獸孶革過此則非吾之所識於時日車就駕引挽羲和朱明離離扶桑參差炎均擊鼓且笑且歌乃臨橋梁送余於河恍乎忽忽若夢南柯載歌曰中氣磅礴山川繆兮蝘蜒糾隔離中州兮常而不常怪詭幽兮不常而常三光周兮聖人耀德文明流兮海波不揚庶徵休兮結余忠兮為軸又揆信兮以為路乘余敬兮於堪輿廓自得而容與兮余因以從容乎周道觀八極之無窮兮浮遊馳騁乎宇宙而上下聊反觀而知天兮迢逍遙於閉户乃旋氛旄之班班兮攬霓旗之翕翕掣搖搖之雲旌兮叫帝閽乎閶闔入鈞天兮紫微聞廣樂兮九合明文海卷十五
