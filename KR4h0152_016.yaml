body:
  text: 明文海巻十六餘姚黄宗羲編賦十六山川八海月賦謝杰繄波臣之徠服矢寶目於明庭敦簵楛之遺則徼皇王之濯靈帝嘉聲教之被訖鑒孤遐之欵誠爰命二臣以於邁泛艅艎而東征余乃棄孥息辭弟兄耦星使趣王程出晉安道新寧駕飛亷馮大庭望洲島渉禆瀛翩然霞舉泠如風行比中流以遥矚值華月之方升瞻彼月兮太隂之精潮生而魄潮應而興潮侵而闕潮盛而盈既與潮而為候自與海而相仍此善下而大彼虛受而凝此浮天而為岸彼借日而生明此納百谷而稱王彼從衆星而名卿滄桑以為晝夜晦朔以為死生被窮髮而黑經閻扶而青三蝬肥而滿六鰲奠而寧魚腦滅而减龍伯䠞而傾既㵗㵗而􅀢􅀢亦淵淵而泠泠爰㵿㵿而皫皫復而熒熒儵忽異状瞬息殊形方夫崦嵫既沒扶桑未啟光風乍融太宇轉霽下無驚濤上無㣲翳望舒狩而升輿羿妻奔而騁轡纎阿驂乗結鄰翼衛重輪税於歸墟合璧騰於䝉汜黄道經之碧津赤路交乎黑齒滄嶼養魄沃焦抱珥員嶠奉規尾閭循緯碣石薄而鳬飛之罘蕩而兎逝天墟浹而蔩長析木浮而桂墜玉珧石華潛盗其靈海鏡方諸亦禀其氣非朓非朒非匿非朏時五而三時八而二増潤重溟流輝萬里洗光金銀之宫湛碧珊瑚之址或縐者如縠或爛者如綺或潔者如圭或平者如砥或好者如瑗或激者如矢或華者如蜃或躍者如鯉或如素鳯之下池頭或如白鼉之嬉水次或如瑶瑟之鼓湘江或如鮫綃之絢蓬市或如寳筏度於恒河或如玉華㸃乎蒼洱或如螢火映於林塘或如梅花落夫沼沚或浮或沉赤烏浴而淵暉或滅或沒驪龍頷而川媚或閃或鑠電騰雲漢之墟或錯或落斗轉明河之涘想而像之驚心駭視至於皓靈披披湲瀾生紫儼若軒帝遺珠赤水廽雪宛轉清麗射人又若宓神歸於洛濵夜光盈盈蟾蜍在腹又若女狄暮汲而育陽侯疾驅金虬狂舞又若澹䑓碎璧水滸須臾浪息㣲明不波又若武皇晀於影娥皜素繽紛非練非組又若天孫夜渡河渚靈暉煜煜萬濤増姸又若神劍沉於鐔淵兹時兹景洵不易得水鏡空明氷壺津液玉杵秋清𤣥霜夜碧漢臯風洄珮環淅瀝陽臺雨歇朝雲生白以泳以遊其樂何極於是舉酒以屬諌議分韻賦詩余歌曰月出兮東方水流兮湯湯我所思兮道路長欲徃從之兮河無梁諌議亦歌曰月暈兮知天雨海水兮知天寒佳期逝兮衆芳䦨思羙人兮隔雲端歌竟魚龍交奮餘景就畢滿船跧伏不寒而栗余獨怡然載賡載繹秋水之篇明月之什一闋未終飈舉兩腋流響淜湱排山破石馮夷邅廻天吳辟易少焉風定雲色猶黑諌議曰羙哉色也洋洋奕奕宜諧宫商服之無斁眎彼乗興南樓賦詩赤壁牛渚泛舟晉陽卻敵洵夷險之殊致又遐邇之迥跡奚翅大明之與爝火海若之於河伯風穴賦王尚絅聞風氣為之天地之號令也必五行得令四時順序而後八方之風各應律而至以成歲功否則變恠百出不可具状然有正有變皆氣之為也而汝州獨有穴又有所謂風伯者主之故又有風伯廟春祈秋報祀饗靡闕而風時為虐余惑焉感而賦之其辭曰倚嵩陽之二室兮瞻鴨路於隆中鬰鳴臯以西圍兮汝海灝以流東倦余游之倥傯兮聊偃息於風穴忳恒卦之未觧兮捫予腸之百折俯千峰之白雲兮憶鈞臺之天樂謝箕潁之鳴瓢兮媿龍山之帽落籍吹噓於鼓籥兮厯千古而互見判正變於洪鈞兮本一氣之流轉肇醇樸於三皇之世兮煦雍熈於帝畿濯三王之清秋兮惨五覇之凄凄入虞絃以㧞周木兮縱烈火於狂秦憫七國之擾擾兮歌豐沛乎真人懲奸雄之狐媚兮烘一炬於長江吹灘上之一絲兮繫九鼎於漢邦揚沙石於昆陽兮結河氷於王郎繄昔日之休休兮將誰復於爾傷奮噫氣之餘烈兮雜氛颶於羣籟粤予今之侘傺兮念誰為之否黍惟風伯之巍峩兮厰廟貌之凌雲惟嵗序之迭遷兮供祀事之孔殷迓之以鸞椉兮御之以龍軺左敶剛鬛兮右薦柔毛酌桂酒之芬烈兮錯水陸之飫飽坐以享余之報兮一不聽余之所禱發玉囊之先聲兮驅天末之長飊初習習以出谷兮䆮汹汹以怒號飄忽鼓盪刺以撞兮淜滂澒湧撼以颺兮騰走石於層空歘埃沙於萬里伐巨木如朽葦兮海水為之沸起泣覊旅之逐客兮阻京洛之征人方大火之如燬兮醨雲雷而為屯涸農家之跂望兮鑠霖雨於垂成怖雞犬之狨獝兮又鵜鴂之無聲園林胡以萎兮嘉穀無實而容長唁顑頷以歔欷兮盡溘死以流亡視纍纍之足畫兮孰知謡諑之足哀將卒嵗之何依兮望丘壠之裴徊朝遺田之百畮兮夕頺垣之百堵顧何賴於谷中兮乃隨山而鑿戸掩涕淚以擕幼兮雖未飽而娛懐究窮民之無知兮嗟何罪於風霾亶此穴之為厲兮何乖予之前聞詠周南之遺風兮爰遵道於汝墳猗撫景以傷心兮徒意逺而無旁惜衆卉以揺落兮􅂒荃蕙其猶芳嗚呼己焉哉甘馬革於櫪下卧牛衣於溝中跽㣲詞以伸志悲逺游之囘風亂曰雨暘若時兮風伯之司旱魃為虐兮匪伯之作睠而風伯兮何庸何尤曰祈與報兮厲爾春秋天髙難頌兮民隱叵説安得帝怒兮爰塞此穴庶㡬羣動兮其獲銷歇泰山觀日出賦申旞仰止兹山兮夢想平生嵗惟壬子兮余有西行道經齊魯兮瞻望峥嶸飄然神徃兮貺焉心傾爰驅車而就之兮指翠㣲以徂征於是景薄孟冬序猶杪秋紅樹吟風寒禽啁啾雁盡天空雨霽烟浮爾乃振歩於紅門之麓兮攀青磴之逶迤厯幽壑之窈窕兮怨層巒之蔽虧忘登頓之縈紆兮恣選勝而探竒漱水簾之飛泉兮弄白鶴之漣漪窺龍吻之㟏岈兮摩蓮峯之葳蕤既捫蘿以度險兮亦䇿杖而支疲撫秦松之霜姿兮弔漢畤之荒圯悲御帳之虛無兮俯明堂之蕪基遡徃迹以儃佪兮心感慨而猶夷仰睇奎婁引手可掇廽望白雲四山如雪不堪贈持聊以怡悦爾乃躡天門之崔嵬兮陟霞宫之岧嶤禮蓬𤣥之洞天兮覲絳節之僊朝劍佩儼其班列兮虎豹躨跜而怒驍帝室赫奕以威神兮天妃嬉睞而逍遥吾欲覿海日之竒觀兮驗靈經之嘗讀徧三峯以翺翔兮留日觀而止宿魂中夜而屢驚兮恐宵興之不夙聞雞鳴而衣裳兮又虞夫繁雲之礙目起視星河之耿耿兮愉璇霄之霽肅淟涊靖而無纎埃兮玉䋲粲而騰煜乃𡨕心兮澄神穆誠想兮寅賔遲東方兮未明晰㣲茫兮海濵漸赤霞兮萬里映滄波兮粼粼朱光騰爍兮一躍驚見火山兮半輪謂曦駕兮己升乃鮫宫兮尚淪圓輝外見兮如隔琉璃之景曜德中涵兮若㞐元化之娠浺瀜沆瀁兮映初照以明㓕膠㵧澒洞兮浮𤣥旻而無垠忽乾坤之低昂兮蕩漾揺空互水天以吐吞兮曈曨欲晨光呵歘以掩忽兮噓吸潮汐波浡潏而潗㵫兮簸蕩化鈞沃焦沸汩兮餞日車陽候熾威兮辭坎㞐離水際兮登太虛將出潛兮光未舒洊上盈而下縮兮佀欲去而躊躇俄縮極而規湧兮晴輝颺而隂氣除馮夷廻馭兮海㝠𡨕而就沉六龍飛轡兮雲鱗鱗而鑠金靉靅收兮暘谷罷祲晴旭䠶兮霞彩髙臨炘炎景之照灼兮二儀開而融朗揚燎爥之光耀兮五色絢而彌深瀖濩燐亂目矆睒而不能視兮爌熀爣閬視􅀈而不能任溢光華於六合兮昭物像散陽和於萬品兮惬羣心暢流覽於遼濶兮䟽煩鬰於心胸俯九垓之茫茫兮見萬有之茸茸逺而嵩華恒霍秀如拳石兮近而龜鳬沂羽山如蟻封帶水辨百川之潮淙兮町畦頫千仭之崇墉醯雞蠛蠓紛紜以徃來兮乃羣生之興亡相代而利害相攻信乎登泰山而小天下兮倚天㧞地而為五嶽之宗也嘆勞生之堪哀兮吾何為乎淹留望故鄉之諳藹兮心灼爍其離憂懐親舍而惨雲飛兮氣歔欷而涕流情眷然而思歸耕兮慕曾氏之前修反初服以勑吾身兮獲中心之所求警夙夜而惕厲兮庶以寡此生之諐尤系曰無閡之先遐鴻濛六區之外邈難窮海岳髙深天地中隂陽變化陶冲融晦明寒暑逓始終陽精麗天赩太空斡旋元氣行西東遠遊何必追荒躅俯仰堪輿適所欲人生幾何俟河清焉用倒景凌蓬瀛願得歸田娯我情静觀無始契無名周天一息千萬程不出户庭遊八紘衡嶽賦俞安期在昔黄帝辨位正疆咸取崈山表其五方湘江之隂荆漢之陽乃有衡山位是離宫上直璣衡之度殷朱鳥之精曰維南嶽以奠火鄉灊霍為副其後匡廬佐理其旁爾其山也逺而望之􅟬􅪾嶒􅗆崝嵤嵢㟥㟎􅧓􆃗嶾􅸊亘坤絡掩天經噓雲吷霆直干乎太㣲之廷既而入也峽崥峛崺􅑬嵼崴㠢鬰􅔍㠌㞤萬谷千㟚峰岑踈密以離立岡嶺相屬而邐迤同丘共壑一雨一暘連厓接岫或隂或陽雷電冬出淩雪夏藏衆態之變譎恠靡常理不可㑹語不及彰於是䟦碨硃蹀峭岓出􅀈礹入嶮巇翔燕翓􅀈之道蟠蛇廽復之蹊驟瞻已絶屢覸若迷既前征而後折亦陟隆而降卑畢厯夫磍碬之䃡始逮乎厜㕒而上躋斯乃赤帝之所幸祝融之所棲彼􅏳羣有而特上孰下載者而並之𦍑獨立以頫仰恍履地首而巾穹窿肆馮敻以遐矚信目至而地窮川九向以九背嶺五伏而五崇九嶷負百粤而禮極江漢領九派而朝宗介巫黔而辨巴徼越南訛而延暑門夜日觀乎海澨極星指乎地中其邇察兹山之全形度脉絡之終始零陵挈其首洞庭濯其趾右掖夫夷之流左㪺瀟蒸之委周環計之何啻八九百里其峰則岣嶁别起紫葢爭髙石廩一闔天柱雙標芙蓉轢乎靈藥軫宿之壓瑰霄雲宻與雲楚旅列靈禽與翠鷲同翲耆闍状類乎竺國安上名托乎仙曹金簡暎慧日而相耀屏障倚雲居而周旋蓮花冠青岑之上華葢導白石之前惠車所棲之煉玉劉根晚遯之仙巖以逮白馬廻雁吐霧煙霞毛女巾紫碧岫日華雖羣形之殊肖孰不奮倜儻而矜瑰異其鴻鉅以列名者總七十有二巖有黄帝之特室神禹之齋房雞公九子夕陽夜光壇有蒼王白璧洞有朱陵抱黄又多仙靈之寄托化人之經行類傅㑹以建號者致不可乎具詳其水則演㴸􅀈􅟫浩漻􅀈㳁滮滮沜沜沏沏氻氻始滭沸以瀎㴽既潨澴以急疾渗漉則潛潤乎弱土歕薄則觸聲於危石或下墜若絡絲或上縣若飄帛或盪爛分流或潝濞相激百潭瀦而淵渟千谿劃而溭淢池不墨而成黟泉不而為碧靈澗不雨而㴻溉雷泓不流而塴湱其石則硱磳䂺􅀈䃎􅚱磊砢凌兢砐硪傾若待扶聚若鳩族譎者鬼栽巧者神琢中有五金之璞維繳之碧礜雲母青艧絳砂𤣥䃜碧砮青磷赤磏碝磩礇􅪗其木則杉梓娑羅枉棃楮㮿楓楢栗㯶椿檜櫧㮨鬼桃女貞桂桹榧漆郁郁芬質維檀及榓徃徃而是匪松伊柏堙塹葢顛黝黝鬰鬰噫氣類槖鑰之懐風夾道若㫋幢之障日挟響則萬壑同鳴吐蕚則千丘互色若夫産於深谷植自平原葉糾夾而栙直上而森棽短猶數仭脩或十㝷至於踈立峑托根阞石本澁縮而不長枝倍之以横出􅠠蜷擁腫椸曲屈紛綸不一其有萬年之松枯使活之千年之竹截甑可炊小而矩者中杖可攜青黄之精珊瑚之芝木石之耳芋蕷之魁餌之澤悴兼可調饑又有紫茜可染龍鬚可編蔊綴厓石荈編沙田耎神農所嘗之藥羽釋所藉之粻諸莫不亘深而冒迥茍至者咸得而可將逮夫瑶荑金卉琳腴玉漿赤瓊之髓五石之英太上所秘山祗是䕶非棲心杳冥之輩窮跡靈奥之區者夫孰得而可遻獸則黄斑之狼白銀之麏𤣥猿青􅴩鹿麂麖鳥則白鷴蒼鵠黄雀鸕諸鴒鵖鸅鸆鷩鴺鷓鴣羽不吝飛蹄不吝趨各逍遥於幽突隨所赴而寧居其諸幽恠弛張䕫罔跳嘯執書之老翁鳥颺之年少類齊諧之所編然犀之所照實談之而匪經將述之而寡要其宫室則赤帝之居顝為豐傑儀紫宫以繚垣法象魏而表闕飛樓岑疊乎四隅輦路矢行乎八達入南端歴左掖歩彤墀納文石金神提鋭而旅陳玉女捧匜而分侍恭禮垂旒洋洋在位目一其瞻心雪其穢容不肅而自莊精不顓而自萃既其覽穹殿之鴻麗又目駴而心驚肇規制之區畫儷峰數而作程崇以七十二尺列以七十二楹文梁霓起以夭矯華榱蝟集而縱横綺錢周網層楶相承鏤以四荒之獸倒以玉井之英朱塗電散彩飾霞蒸腑爣閬以􅢏嵟赫赩爓而晶熒乃其長廊九十六翼首自端闈旁抵寢室紺碧其材繡繪其壁凡遊閒燕樂優俳戯劇振帙披圖擊鞠博奕農作女紅樵採漁弋楊杵搗衣轆轤井汲加以奩香篝衣嬪御上直罔弗曲摹其形態殚恊榘乎洞清之筆其前環以百家之市其中貫以三條之術右弼釋氏之寮左輔黄冠之宅二教並居同門異閾粤自軒遊之駕虞廵之蹕以至舉柴而望及乎遣使宣臆加帝王之尊稱比公衮之上秩庪縣牲牲埋瘞圭璧禮以赤璋藉用茅席盛典於是乎臻百神於是乎集靈臺侈於𤣥文寶洞宣於玉笈古今告饗之辭猶載穹碑之勒故屢易受命而不忒故昔盛時睠彼圖經萬夀靈虛安寶玉清光天銓徳九真黄庭若此者稱宫建九為觀十八浮圖之居五十四刹及樓閣亭榭書室講堂靈樞神屋竹院松房謂鴻紛而屹峙鬰被谷而彌岡錯金碧於蒼翠侔乎甘泉與林光慨今昔之夐殊返太始之鴻荒間新基而古號亦稱存而若亡廬􅂒偃壓十九付於無何有之鄉乃若方廣昉於天監上封改於隋煬嶽麓䕃於星沙鴈峰起乎衡陽楚安垂明月之下寳勝列香爐之傍白鹿踞武陽之里白鶴棲崇嶽之鄉龍横覺海雞鳴上方雙峰浄居七寳大明道林崇果髙臺清凉爰及西明南臺福昌福嚴衡居㑹善天臺祝先法輪多寶雲封湘南化成花藥攝授白蓮豈中墜而末舉抑大圯而小延寧無肇建于後亦有盛踰乎前計十存其七八而鐘磬之聲猶相聞焉其若登山海印衍宗石頭或有賜號隋主服役金門嬾殘思大林公十八僧之儔又若白膠辟榖於雲隱雙子擷秀於靈芝太㣲太案並依金母之殿景童丹霍分卜石室之棲帝女感𤣥皇而飛遯華存慕至道而宅兹禮正飯靈草而顔駐道全駕仙驥而軀飛赤精授經壇上郁之諷誦靈臺二薛前後以息駕鳯仙幽獨而杜機彌明靈期廖師三清之儕以棄俗為教居山為藪師清静而友太和家彼岸而户浄土神臯靈窟固其所也穹厓邃壑亦其主也然自夏載探玉字之册發蒼水之司剜鳥跡之碣紀治水之辭及周之譲王采藥臻斯其後懐竒抉異之偉士逃虛傲世之仙才司馬浮湘而至向禽結侣而來於以覯决雲之㑹而得遂采霞之懐鄴侯英國劉氏三之若其類也皆繭趾黧顔抗險梯艱里土或萬挾糒彌年或僻居茹苦或冥索罹顛豈非兾僤詭之倘遇而神秘之或宣参大塊之羣變易眸目之恒觀也哉乃有菰蘆之鄉縫掖之士㓜沈六義之淵壯結五嶽之志嗤婚嫁之待畢乗䈥力之未瘁至自闕天門之月焉逄敦牂之嵗始歴其一未覩其四意者較夫嵩華之與泰恒亮非𨽻其左次綴徃哲之闕章併作頌而告之大庭氏之帝曰天作有崈望禮既隆百神既同維南之宗誕裒厥靈靈亦駿發蕃育萬物物亦昌達煌乎帝靈火德是興降昭厥禎以畀我文明异顯帝德有炳有蔚華予之國黄離永吉明文海巻十六
