body:
  text: 明文海卷十八餘姚黃宗羲編賦十八山川十煮惠泉賦徐獻忠叔毗逺遊來歸汲惠山泉一罌遺豫東皋之上豫方靜掩竹門消詳鶴夢奇事忽來逸思橫發乃乞新火煮而品之因述其槩授童子歸謝叔毗焉乃何子之特發探水穴於山椒挂清寒於齒牙訊老羽於惠寮甘平雲之乳竇因起興於瓢操望徐子以馳神出簡書於下曹侑以陽羡之珍穀雨之苗走奇芬於鼻觀參春靈之上苞合二美於一旦嘉朋好之我遭如上客兮在門赴靈修之久要發空濛之玄閟辟塵網之喧囂爾則陶氏之鼎改餘之火既精滌蕩遂集文武㵼玉液兮懸崖分小瀑兮如布忽變紺寒蒸氣如霧覺蟹眼之旋生復中起兮如破涌江潮於羅剎沸晶濙於洛浦於是歸功茗事頌德玄溟出太素於碧落浮瑶光於紫清露華紛其秋淡佳氣鬱乎春明媚幽懷之無始眷髙況兮凌雲遊玄神兮顧渚仍舊事兮南陵興咄咄兮七發心冉冉兮獨醒來山谷兮雙井扣太上兮黃庭奔走羣公逍遙竹門品上池之獨重解煩思而宵征信馳心於冥漠無乃下甘露而清洪河也武夷山賦瞿汝稷昔興公寄想於赤城第形毫素青蓮懷異於天姥徒勤夢思二賢或剖竹永嘉或柄蹤姑熟欲振策兩山但取杭一葦而煙霞僅通於枕席泉石未接其嘯歌以是語遊遊未易哉萬厯庚子暮春豫自昭武解組塗經武夷夷猶九曲躋覽羣峰幸埃壒之既逺嘉魚鳥之自親一詠一觴再信再宿聊為短賦以志勝遊事緯繣其疇回兮願逺遊以自疏聞控鶴之休德兮拊余騑而遄驅越嶰壑之㟏岈兮凌連岡之﨑嶇溯寒流之淡淡兮覺囂紛之盡祛嘉澄波之活活兮炯鑑瑩而練紆寄湍急而潔清兮復奚涅而可渝揚舲津口引領頓異聨嶺周繚而陀㠧兮墮玉城於氷澨天柱嶕嶢而崒起兮若竦麗譙於天之際杳窱丹臺巃嵸靈氣氷桃華敷兮萬齡碧藕芬含兮千祀鰲負闕兮璨以羅芝成宫兮芳且邃鼓蘭枻以縱尋泛泠溪之森沉千峰拔漪瀾以翔霄萬彩落雲霞而印潯靡竒弗寫於文漣靡影弗會於幽襟迎覽競爽隨姿易隂姱無駢態秀各異臨行彌進而眺彌新境愈移而賞愈深如是循溪之曲凡九殫一曲而佳麗不可勝紀矣每曲盡則軌芴若塗盡轉楫而婉蟬復前啓歷九轉而九啓殆萬變而萬美無尺壤而不改觀無片石而不壞詭愷之眙􅀈而莫能圖文考腐毫而莫能擬蒼麓回環丹崖中闢搖筍左擢綺屛右翼蘅蓀暗愛竹檜攢碧禽流好音磴謝塵迹是藏紫陽之精廬實奠兹山之正中亦首兹山之幽寂焉超氛埃而曽舉兮夫子既徑其雲翮豈升皇之有竦兮悲沉濁之方塞返狄成於章夏兮功寧後於禹稷懸素瀑於青靄挺仙掌之苕苕拾復坂稅重椒臻天遊之仙館追逸駕於虹橋窮八閩於目睫收九曲於堂坳霏彩下羅隱伏畢昭向之雞睨魚瞰而猝不能悉者於是還矑流覽不能遁其秋毫焉鼓子􅞸􅀈莫之與齊齊雲孤騫峭拂斡維珠庭璇字馮煙抱霓丁巖腹以虛搆若鷾鴯之巢於層栭仙舫橫空千秋不移仙杼織月如聞理絲升真玉華厜㕒莫階垂銀鐺於絶壁倚遊鵾而仰躋豈都盧所能逞惟玄族所長棲一豫志而斯登恍逍遙於太儀撫翠鬛於龍穴㪺峚膏於鑑池采若木之初花折白榆之修枝精皎皎以往來何彼蛻之云稽旿真寄於列函抉金華於潛基豈假鑄於首山昉馳車犬於天逵唐曜飛沫勝益卓絶兩崕百轉一徑中豁凝黛環舞淙流紛戞入蘿洞以旁折煙光蔚兮望别紫翠四合而嵾嵯飛泉空垂以飄瞥英英煥披皛皛瑩徹灑情雪於岑阿散天花於芳越夜光簾箔兮先日燦雲母罘罳兮侵漢列至於九曲既逾溝塍膴膴藹藹桑榆芃芃禾黍居盡抱甕之丈人行皆牽犢之巢父赫胥匪遙尊盧接武茍玄都之可托又奚謂非吾土稽神樞於雲笈錫玄化之嘉名幸浮遊於斯域得信宿乎福庭於谷神而知根何幔亭兮靡徵雲禋爛兮紛可接居巢婉兮鳴何清昔康樂之遷閩兮日念歸而怔營之問之望越臺兮綴北思而靡寧中纆繳於外物對青輝而弗察雖雅尚於山川顧當美而搖奪彼夢烏之厲天亦奚矜夫騰越倏為魚而沒淵又何悵於夭閼知天淵之靡二兮將安錯其欣怛彼丘山之善於人實神者之不勝矧涉山猶未善雖豫騫挽之將焉正山蒼蒼兮木蚴蟉水湜湜兮環山以流合氣於漠兮憺何求掌移九曲兮吾奚行而不與之夷猶聽泉賦贈歙邑洪希仁顧彥夫繄兹人之洵美兮紛世俗以鞿羈哀往轍之莫吾追兮寤警枕以增欷沐蘭湯之浮浮兮束蕙􅓙之楚楚振芰衣之芳緑兮跖芝麓之幽阻石凝碧以硱磳兮雲垂白而蘢蔥憑修篁以少憩兮忽機慮之消融耳山竇之流泉兮儼鏘金以鳴玉風吹之而若斷兮勢迫之而遽續豈水石之交激兮或髙下之相形抑天機之自爾雖遏之而亦鳴彼簫韶之九成兮致鳯凰之來儀非后夔之使然兮奚盡善之可為嗟爾泉之清兮隨古今而有聲罔假六律以損益兮亦若五音之鏗訇羌筝琶之里耳獲清音而一洗溘曜靈之西墜兮欲歸與而載止乃援琴而歌之曰泉非琴兮聲與琴同琴非泉兮韻與泉通豫覺其妙兮口不能形容維泉涓涓兮維山崔崔嗟知音之人邈兮其誰知之春山曉煙賦何偉然春山冶媚敷㽔吐鮮乃酲曙色溟蒙罩煙隱曉籹而藴黛籠翠微而連婘維煙雲之逸性原與山而為便乍娟鬟之亂風復仙繭之抽月乍文縠之霧捲復氷綃之市揭忽忽悠悠非粘非曵若山靈春睡未覺而素幃尚垂野鶴夜唳而羽衣猶刷草木無香入薰野燎不焚爓發寒江之水面飛至神丘之火穴分來迷花抱石春艷朝頺屯巒罥岫嶮巇欲埋類愁人之眉鎖顔鬱結而未開山圖巖畫李夫人簾內朦朧幻魄遊魂椘襄王夢中倣佛何綿茫盤礴之難狀而廽散縈積之無恆也豈中有異人焉如介子者天啓其逸欲燻之而出谷有異珍焉如和璞者天愛其寶故暗之而霾采有清臞之骨焉翳被之而留其瘦影有幽潛之姿焉沈冥之而飬其龍德不則憐山屐之方縣未許青鞋踏破侈春工之淫佚不嫌粉翠太盈問蜿蟺之奚從莫披根而躡影嘆譎起而橫出豫適悲夫人情既見世態之如曉煙誠藏山之惟恐不深星石賦黃卿履古墉之沙隈有孤石之欹頽形落落其怪漏質泐解如將隳巨不堪於礎墄小弗取於砌磓以磨礲則踈欲踞立則危石工過而不睨蹇永謝於鑿鎚余眴若嘆嗟之曰兹非氣之核乎非土之精乎何異乎硜硜磊磊之確亦與粼粼矸矸者殊豈初平羣羊之變或經秦皇之鞭驅有一頒白笑揖前曰子儉於博物哉是隕星之棄耳萬物之中石最粗重然變化幻怪尚幽矣夥矣嗟耿耿之懸曜聿萬物之騰光固積石之有耀亦神物之靡常或飛趍而急隱兹朽墜之永僵惟氣類之從土而石乃土之至剛羌理氣之必有抑何惑於渺茫余釐然復之曰星隕之石傳之逖矣今果徵罔誕也夫古稱良之羲和甘石逮常秩之靈臺保章夜候躔度之流孛守射夙以獻夫占兆機祥其動雖微不迂其事則隱而章麟經之砉如雨書隕五則聖人之於變也致慎而且詳顧兹數尺之頑礐諒亦關於推步不知嵗代之逺邇飽風霜與雪露惜群志之失書致傳播之屢誤苔蘚翳以如衣泥滓紛其凝涸我載拂拭正我襟履重其來之髙逺也彼其頑泐吾何惡明文海卷十八
