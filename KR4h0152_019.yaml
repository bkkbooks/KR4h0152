body:
  text: 明文海卷十九餘姚黃宗羲編賦十九弔古一弔賈生賦朱伯賢恭承間氣兮大賢天縱明王不作兮怠棄三統文章經國兮痛哭規諷獨倡寡和兮不能從衆材大無偶兮世莫為用嗚呼夫子兮何獨使豫之悲慟世溷濁而不分兮螭龍蝘蜓御濮便娟兮九韶博衍鸞鳳髙逝兮鷃雀堂壇羣愚滿廷兮賢良日逺大儒逆斥兮嗇夫俊善謂夔無能兮微蚿婉娩卞薛無知兮懷由自衒於乎夫子兮竟罹此變烏呼哀哉行或泥沮兮何為亡故用而毁兮天馬振迅渥窪之渚兮鯤鵬搏搖瀚海風雨兮驪龍遺珠照耀天下兮神龜負文九疇攸敘兮嗟若夫子三代該輔兮摰旦上天世莫與伍兮於戲哀哉杞梓連抱兮執斧袖手良璞萬鎰兮玉人郤走騏驥逸羣兮轡御徒後巨舟乘風兮楫者坐受命世大材兮履昌是就夏殷忽沒兮時非吾有吁嗟蹭蹬兮孰為此醜有大志而不伸兮千載誰偶誶曰己矣世其莫吾知兮子獨鬱悒其誰尤時之不吾遇兮志之不盡施用行舍藏兮嗟憂泣其欲奚為獨不見夫黃鵠之髙舉兮遭矰繳而羅之麒麟之不羈兮鉏商獲以糜之謂仁者之必信兮世無伯夷賢正之必容兮孔孟以治傅説列星兮巖築胥靡寧戚疾歌兮牛下單衣吕望之鼓刀兮非熊非羆將老死於渭蟠兮殷民曷懷箕子之忠諫兮終于囚纍洪範之不陳兮吾將曷歸嗚呼噫戲物故各有遇兮遇故各有時服吾道之在人兮俟天定而勿違出則棄咎兮入而莘野之夫楚萊之廬達固大行兮窮獨離居樂天知命兮顔氏庶幾吁嗟夫子兮曷獨為爾之憂悲彼尋常之詭遇兮孰為之範我馳驅也循徇名而未遑兮夫何抑示之逺思也生民之不幸兮堯舜逺而遂使夫子兮汩沒逢災匪皇天之憗遺兮實人事之弗基若夫人之有知吾將指三代以為期弔賈太傅賦桑悅從長江之莽莽兮中有江曰汩羅惟靈均之往湛兮衍千古之清波何先生之清風兮正靈均首丘之所都投雄辭而慨弔兮若救種而烹蠡珮帶遺乎蘭蕙兮衣裳留乎芰荷儼騷經之滿目兮邀豫辭以相吹赫炎漢之芳隆兮親溺楚于一螺穩璣衡以平運兮齊日月乎羲和飛修墉而內薄兮爭排挾乎嵩嶓駏魋􅂒而比健兮豈息脈之微瘥本根豐而皓皓兮亦盤翳乎條柯鬱蚩尤之柱天兮入剪伐而么魔倒冠履之上下兮視蟻蛭為嵯峨僉談談以笑語兮獨豫淚之滂沱催黃潤以成匠兮豈斂止乎龍梭舍圭璋于巨璞兮隨岡阜之陂陀左控搏乎南威兮右撫抹兮妖娥憐陵華之竒質兮弄光景而逶迤收馳驟而守閶兮夢天山以秣禾憑旱雲以輸悰兮惜來日之無多悲崦嵫之易暮兮慨致鵬之非囮團􅂒之汶汶兮鑄寶鑑而為模羌空言之際遇兮皎夜􅊤之鸞坡曰豫又倅兹土兮後千載而殺那遭聖明而獨詘兮胡今古之同科謇人生之旁達兮直寒暑之經過委吾身於造化兮任刀秼而香塗紛紛世之變幻兮消長袖之傞傞豫將釀沆以霑醉味淪隂以成鋪升都嶠以長嘯兮陟委羽而髙歌至息憤而默默兮欲反觀乎太初終吾生以泮渙兮補先生之婆娑間田賦王翰條山之陽黃河之傍灌莽極目獸駭鳥翔畎澮縱橫以逺際溝塗陂陀以衍長經界宛其未改廬井己不可得而詳問平髙之耆老乃知古虞君之故邦及芮伯爭而未決質成於文王者也嗚呼姬周之造迹自后稷之建邦公劉之啓土古公著撫民之庸王季號勤王之祖至翼翼之文王得奔奏禦侮之賢輔三天下而有二猶臣勝商受而遵王之所也傷漢儒之鄙陋議圖讖以厚誣以虞芮質成而被化為周始稱王而受符以區區之陋邦覩至德於須臾來四十國之臣妾如父召而子俞文王之受命固定於虞芮之質成若尊號改元斯盛德之所必無也嗚呼天有昭昭之明無諄諄之教視其命之去就在人心之好惡苟處時而得中何必丹書朱雀而為符告也眺荒原之茫茫撫往事而增悼追淳風之不反傷衰世之末造誦綿詩而永嘆為執筆以三呌土木賦王世貞嵗在執徐哉四月生魄臣某服驂牡越燕關而北上谷之墟陀靡墝埆若陵若伏者焉土則或赭而堊澤翁童造物鮮功埃眯鬱而要風隂鏃飽血敗削咀精㦫乎挾鬼車以噭鳴狂茅畏棲貒貈辟宫夔魈夷猶叩之莫譍有一丈人跔􅀈前曰此所謂土木者也我前人之徇皇輿代逖靡微大夫金匱之逸臣庶一二寓目焉為蒙熟之臣曰唯唯昔在故元主有中夏為㾆為瘵易耕而獵倏鯈嘒嘒詩書啁唽禮樂兜昧髙帝因天之厭亂提三尺犄元鹿於西隃之外投諸大荒毋令睚眥挽七澤揚九派靖風塵而如掃飲湛恩之汪濊文皇勃興介猋騎鏐雷轅阿台土干之流莽伏麅奔者或收椎而內臣或儴袵而外藩陽隂山南北斗鑿條支以界天門時則有若魏鄂曹衛宋潁涼英萬衆一羽揮無留衡甌脫樓煩臲搖神鉦䇄乎金湯厯再紀而恟恟如草覭髳螟蟘滋萠蚩尤乃迫上帝下欃槍獝狂猰貐之妖鍾為布哈其豪額森熐蠡逰魂耆金吮鋋曽不足以當漢之一連時則有若左璫垂貂帷房之幹以為斯徒包藏禍心蠱我六驅狼山之旁七萃森如虎豹之衛􅓈誳就屠列缺噤火以伏隂羲和東鞭而淪虞輔勇佐野鼐益之徒楚材晉良其麗不億膏陂衍而施朝霜海立山卧羡漫荒搶然而天容穆然神武不崩單于除掃閼氏却行左賢且渠大小奉觴巴延冥契乎項伯臣善曷沗乎候生曽未閲嵗乘輿蹌蹌雖七曜暫騫而兩儀就康今天子惟先德慨武功追周文之遏密陋漢武之稱襄下書御史千夫長百夫長材官挽強繽駍拉㗉踊距騰驤死藝辱國謀夫孔臧抑虎賁而右鷹揚於是少府發將作詘寺人絶宫虞衡弛法減膳削御吏士衣食蜀蘇析而縷膺楚金銷以鋈軜􅀈三千長轂九百期門佽飛飽勇怒而不得發摶人以軾投石而樂天狐掌射豐隆脂軏博望鄉導水行亡乏乃鹵溫禺梟郅支回刃南面者寸劉銖獮斬轒輼以夕薪炮駃騠而佐朝麋載嫖姚之金人仆竇氏之故碑天子曰止毋究兵毋招不軌襲爾胄槖爾矢吏士十嵗復無事事赦海內與更始坐明堂柔羣裔雕題瞷目日月出沒靡不梯航而勞象胥於是大置酒合樂而饗之歌曰雪忸信威翼文德父不哭子鮮鰥室百千萬年戰鬬息告成祖禰樂無極老人起拜曰子之言美矣郁郁哉請毋死而俟諸土木哀曹娥賦有序李濓曹娥江在紹興府城西五十餘里有曹娥廟在江之滸李子赴官四明渡是江艤舟謁廟乃作賦哀之時正德辛巳嵗也我舟南下兮待罪四明道經娥江兮維纜廟傍肅我衣冠兮跪奠椒漿搦管屬賦兮敬弔娥英越中山水兮靈淑攸聚上虞之墟兮産兹孝女五月五日兮父溺於斯逆濤而上兮不得其尸娥年十四兮柔婉令儀哀吟澤畔兮聞者歔欷旬有七日兮哭聲弗衰沈淵尋父兮與家人辭皇天監娥心后土憐娥悲載經五日抱父江湄父子聚首兮厥事神竒川靈擁導兮若負而隨烈魂千䙫兮如或見之瞻拜廟貌兮靈風颯旗毛髮竦竪兮心口嗟咨誶曰人孰無死兮古今一軌娥名永垂兮死猶不死穹碑漢篆兮麗牲庭戺度尚雅志兮邯鄲文美絶妙好辭兮悟三十里摩挲諷誦兮嘉歎不己我賦孔哀兮投之江沚援翰寫情兮聊以代誄江雲漠兮江波瀰瀰西日發棹兮極目煙水剡溪賦有序李濓余嘗聞越中山水之佳者剡為最思往逰焉而未能也屬者壬午之秋偶以公事至剡放舟逰矚殊慰平生緬懷昔人棹雪之訪厥事己竒然又不見其人而返則益竒矣倚棹賦之亦以識吾興耳放官舸以南騖尋古迹於嵊州出嶀蒲之浩渺泛剡川之清幽水潺潺而畢滙山矗矗而四周嗟千巖之競秀復萬壑之爭流粵山水之絶佳惟會稽之為冠豈竹箭之能當發人文之炳煥昔山隂之子猷值夜雪之初霽詠招隱之髙篇友太沖而相契聿獨酌以暢心慨古今而睥睨對朗月以懷人遡寒飈而鼓枻乃經宿而造門遽轉舟而回挽曰乘興而偶來忽興盡而可返任天真以遨逰隨已意之舒卷何必見乎其人始盡豫之繾綣留雋語之千年信迹竒而意逺茍神識之潛孚斯骸形之可諼仰賢達之孤標恨吾生之太晚比挂席而入越浩逸思之翩翩訊安道之故居歷艇湖之澄淵望金庭與天姥合百里之雲煙岫青青而不斷花冥冥而欲然人已逰而風存話猶傳而味玄爰夷猶以成賦羌薄暮而言旋明文海卷十九
