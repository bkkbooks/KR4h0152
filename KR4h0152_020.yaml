body:
  text: 明文海卷二十餘姚黃宗羲編賦二十弔古二首陽山賦有序李濓首陽山在蒲州南四十五里即雷首山也禹貢曰壺口雷首至於太華昔伯夷叔齊隱居兹山李子按部河東過首陽謁二子墓憫其祠宇頽廢乃下令葺焉夫二子篤萬世君臣之大義孔子褒之裴徊祠墓緬懷懿德於是作首陽山賦黃鉞兮白旄諫不聽兮豫逃豫逃兮何之望首陽兮棲遲山有林莽兮乃遁而匿山有薇蕨兮乃飢而食神農虞夏兮邈弗可追聊隨鹿豕兮朝夕娛嬉孰抱祭器兮西歸於周孰陳洪範兮載衍其疇豫寧溘死兮弗忍事仇綱絶柱壞兮孰知豫憂周粒不可餐商命不可延豫將曷歸兮雷首之巔夜汲沆瀣兮晝玩雲煙吁嗟二子兮求仁得仁舉世非之兮爾獨真自有兩儀兮即有君臣天冠地履兮上下攸分文王泰伯兮沒齒事殷同稱至德兮何意孟津不降其志兮不辱其身許由伯成兮異代同神子臧季札兮挹厥光塵大道之準兮夷齊二人誶曰叩馬遮説兮丹心瀝血君臣大義兮爾扶其􅑾旦奭適望兮一時之傑目覩危行兮故緘厥舌順天應人兮固權之潔堅守臣節兮實士之潔謂韶盡善兮武僅盡美仲尼垂訓兮意亦如此民到於今兮歌頌二子首陽之殍兮死猶不死亷貪立懦兮聞者興起維聖之清兮萬世仰止弔長平賦有序李濓長平之坑武安君之無道極矣嘉靖癸未秋余西巡澤潞道經斯地山川如舊風景愴恍停車四顧怛然傷之於是毁竪子之廟撰文以示父老然猶有餘慨焉復造斯賦以泄千古之悲星軺西邁兮上黨古城山路﨑嶇兮夕抵長平賦曰夫何積骨之成丘兮厥山名曰頭顱詢丹河之既堙兮猶壤赤而塊蘇宵鬼磷歘明沒兮天隂雨而嘯呼惻趙卒之四十萬兮乃一鼓而盡屠翳衆命如彼夥兮胡無一之少延張虛拳猶可奮兮矧執鋭而被堅彼豈知坑降之禍大於劇戰兮後難以重得志於邯鄲詫趙成之惡夢兮衣偏裂而墜飛龍見金玉之山積兮筮史告王以閔凶越三日馮亭之使者至兮獻城市邑十七聖人甚禍無故之利兮棄忠言而罔恤韓嫁災於汝國兮引虎豺以入室信反間以易括兮竟喪師而失律遺小者二百四十人兮咸奔歸而竄逸嗤鋭頭之竪子兮性殘忍而嗜戕視人命如雀鼠兮入虞羅而無一生惟王者之師如時雨兮迎簞食與壺漿何荼毒以騁暴兮恝挾詐而坑降合哭聲以震野兮仄兩儀而暗三光嗟天道之好還兮網恢恢而靡漏孰蹈仁而無慶兮孰逆天而有後豈善戰者不必善亡兮死杜郵其何咎對使者而自訟兮見爾心之微明付勛名於一劍兮曷足以償百萬之生靈積不善必有餘殃兮遺詬罵於寰宇余過兹地毁廟兮爰斧像而燔俎趙既亡而秦亦滅兮亦何貴乎黷武用兵者宜戒其覆轍兮獨不觀諸鄧禹為將久弗妄殺一人兮不貪功而功聚綿福祚於無窮兮衍子孫之蕃廡彼竪子之不仁兮勦厥命其自取弔亡卒而成賦兮慰遊魂於終古弔古賦有序葉良佩嘗讀江文通恨賦而莫喻其意夫文通之恨鮮矣奚以賦為乃豫讀之則戚戚然若有創於其心者於是遂祖襲其製作弔古賦云登髙丘以騁望兮淡萬里之長空山奔湧若競赴兮雲裊裊兮相從播衆流而羅絡之兮眇草樹之回縈曼流觀乎原野之古迹兮歷選幽憤而弔之泉垌何楚均之謇謇兮遭世眊濁而弗庸騏驥困以伏櫪兮騰跛蹩使橫空放孟娵之佳治兮嫫母姣而從容吾蹈彭咸之抗迹兮將及申生而締盟蠲爾誠以進胙兮被鴆君之偽名死且虞國之多難兮夫何命促而志貞去華館之皎皎兮襲夜臺之冥冥諒舍死誠獨難兮詒嫚子以典刑白日出之悠悠兮睹厥扶蘇之負寃監蒙將以築邊兮值孽弟而遘患寢絲綸之夕詔馳鴆毒於晨煙外攘禦之多績內循省而靡愆作忠奚以見殺玄霧鬱其漫天覽增成於陽朔録女德於班姬傷淑閻之貿處驅鸞鳳而翔鴟矰弋機而在上兮聽和鳴之昌詞軫芳𠂻之不怒兮美清潔之可儀久矣友道之淪喪吾獨有感於魏齊當秦怒之方張惕平原其見縶輸哀悃於虞君損重位以赴急髙信陵之慕義輕千里而負笈何託命於斯須乃佯襲而罔答相投之見矜啜爾嗟其何及吁嗟世之多故兮屯余衆以礧砢望介子於綿山兮窺伍胥兮江滸息侯要余以陳詞兮萇叔含成而未吐嶽魂偃蹇於杭湖禰魄摧殘於鶯鵡東見田橫於海島兮北悼明妃於逺浦循西戎閔厥非子兮南尋項籍於垓下己矣哉人生斯世兮視彼過隙之白駒胡五常之好合紛萬變其難推猗揚園之君子綜百代之民彛抒幽懷而作賦聊以配乎佹詩蓮池賦王嘉言夔城之北途路欹傾窮谷幽壑重岡大陵突然呀然攢巖蹙坰偃仰樊援斗折蛇行􅀈莊之側有池濴濴冬盡寒消春歸水增爰有新荷應候發生延及夏月漸以敷榮員葉鮮蕚咉彼長莖爛熳而紅交加而青娟娟靚好冉冉苾馨微風一吹散入芝林乃考載籍以詢民萌曰嵗綿邈矣鑿於熙寧周子判夔是用陶情嗟名儒之遺迹可想像乎典刑陋武子之嘉樹擬召伯之棠隂嗚呼武侯八陳之圖洪濤滉漾而石不轉濓溪半畝之池大旱焦鑠而水常泓豈非二賢之意注神會故越千百祀而不沒其精靈今之人竊周子之愛以種兹花者何限而非其自得之學非其灑落之襟則亦羊質而虎皮也識者寧不笑其效美人之捧心謁箕子廟賦使朝鮮作祁順有商之衰兮大道沈淪女戎煽處兮積粟成塵荒亡敗度兮虐熖肆氛藐天威之不戒兮逺忠言而罔聞嗟哉夫子兮遭時孔疚義為大臣兮親則諸父視祖烈其至重兮敢恝然而安處翳象箸之始造兮憂未流之莫支進藥石於俞緩兮兾沈痼之可翳羌狡童其弗悟兮嗜堇􅀢而如飴耿余𠂻之激切兮獨遑遑乎何之顧微子之已去兮余安忍復肖其君也嘆比干之既死兮余安可徒隕其身也甘隱忍以晦遁兮乃佯狂而為奴傷宗社之覆墜兮抱鳴琴而嘆吁夷羊滿野兮麥秀故都非夫子之不力兮良天運之已徂維朝鮮僻在東土兮實夫子之封國祠宇久而彌新兮儼清風之如昨服八條之教令兮安蠶織而耕鑿信德順以流光兮足亷頑而敦薄吾生數千載下兮偶奉使而謁兹想儀型以起敬兮懷不盡之遐思書有九疇兮易有明夷仲尼有贊兮宗元有碑斯夫子之道大兮又奚用贅乎一辭反反騷有序樊鵬昔屈原仕楚以讒見棄憂君不己乃作離騷投江而死以明忠漢揚雄以為君子不得志則蛇龍何必沈身哉故托離騷文而反之名曰反騷余讀其文重為泫然流涕也悲夫屈子負屈千載莫信而雄屈身莽下不能如龔鮑超然逺舉反譏原之沈身實欲藉彼非明此是也故曰遜于不虞以保天命其旨意見已哀哉余故復托反騷文而反之名曰反反騷蓋非徒騁辭飾説於一時實欲信鈎環直軏轅於異代也其詞曰惟有芊之建拓兮祖髙陽而正系派季連之蟬嫣兮流靈修嗣世慨靈均降叔運兮隨王車以後先營營蠅蟲止荆兮君反疑忠而信讒彼既窘步於險隘兮被災殃而不無言傷靈修之不吾與兮賦騷詞而沈江潭漢揚眊雄命原為纍余故命雄為眊投文相弔兮辭反騷而病屈余既懷兹靡夷兮越千載而直屈彼造化發育蠢靈兮固將妍醜之靡同賢哲生此人國兮奚必與濁世而皆通麒麟鳳凰飛步兮豈不擇世而量世茍非其時兮豈不髙飛而逺去眊既知天軌不辟兮嘆純潔而離紛躬自蹈其淟涊兮空暗纍之繽紛纍帶矩而佩衡兮固君子之髙致豈曰履欃槍以為棊兮豈肆文而薤質眊閉室而養志兮既紉秋蘭而扈江離飭娵娃之腰裊兮顧鬻諸棘林而墮諸蒺藜鳯凰鳴於釡竈兮騏驥試步於鹽車知枳棘􅌙􅌙兮猿貁且不敢下莽奪漢輿自載兮乃羡驥而驅驢襟芰荷之緑衣兮被芙蓉之朱裳卧汙池而􅀈仰伸兮蒙穢濁其可傷纍修容自綽約兮固未嘗競諸閨中衆惡貌而量峨眉兮難免乎嫉妬於深宫既不如羣類之要媚兮亦難毁刑而冽貌若眊之屈身説類兮亦楚纍之所笑謂神龍宜潛深淵兮纍非眊無葭莩之親謂鸞鳳宜棲蓬渚兮纍非眊無鴻毛之真既疑彼不髙飛兮胡自羣於燕爵恥靈芝不處谷兮以浮萍而為托夫揚煜煜芳苓兮方當季秋之辰嚴霜落而知明哲之保身結中情之激烈兮憂王國之無人達清香而揚素美兮欲靈修其吾許宣忠芳曜義艷兮庶靈修而迪啓非不欲精瓊靡與秋菊兮將以延夫天年非不憂老冉冉其將至兮憂日薄於西山非不惡落華喪英兮或傷生而伐性非不欲全修養正兮常樂天而知命卷薜芷與若惠兮豈願投於湘淵混申椒與􅌲桂兮豈願己於江干將以身而明國兮以死而明生將以命而知天兮以心而暴誠重華豈為不與兮傅説豈為不儔豈不與虙妃乘雲兮不與瑤臺逸女同舟情婉戀於宗邦安得望崑崙以樛流腸牽據於祖社安得去彼乎髙丘魂飄飄凌青霄兮八龍焉不可駕逰唐庭揖虞堂兮九招九歌夫奚呀夫賢聖之不遭兮非親舊固不可如纍之沈溺既云道不吾以兮固不可流通而弗息知仲尼在魯遲遲兮不知在齊之接淅知眊之全身保終兮不知龔鮑之芳譽既譏纍之沉身兮又譏纍不返乎故鄉豈如眊之乾沒兮乃逐流波之湯湯臣強敵而忘仇讐兮又何從而美新何惶惑而投閣兮又奚笑纍之沈身纍固棄由𣆀之珍兮吾恐眊貽許巢之憂纍固跖彭咸之所遺兮吾恐眊亦為彭咸之所羞弔田橫義士賦黃卿昭人生之勩劇兮贍蟾免之往來羌行野而遡古兮覽齊都之圮頽昔全勝之嶸􅀈兮丘纍纍其茅萊憶蒿薤之肇音兮季世田橫之可哀殞旅途以藁葬兮閉悠悠首丘之懷兄弟乘時以復國兮繄神明之世胄何時命之不辰兮瞻蒼蒼之罔祐七十城之全跨兮徒勤瘁以奮戮俯事大以請欵兮旋掩襲而莫救失蹇據之殢踣兮潛褁甲以奔走裂衮冕以東遁兮甘君子之居陋何微服之漁耕兮尚新朝之弗容奉檄命以西覲兮奄中路以舍生雖恚懥之自迫兮僉深憫其弗平值炎劉之天授兮焉責王之無功顧同時之提劍兮誰知乎成敗之形昔太王之去邠兮孟子稱述以告滕土地豈厥弗欲兮脫我黎庶於兵鋒設爾幸生於平世兮諒可以為善國觀多士為之死兮聿輝映於史册含悲咽以營葬兮嘉祔殉之二客慨從容以處死兮允時流之匪易逮海嶠之聞訃兮同刎斃者五百將衆多之少疑兮憑良史之真迹快漢廷之亡憂兮庸三齊之屯厄嗟乎女悅已以適容迹委質於相知遙辭家而許君兮誓鞠瘁以相隨豈山川四顧之罔避兮寧漢京之不可馳誰之猶訹迫劫兮奚其獝滅而瘖迷想荒屋之相枕藉兮孰虆梩而掩尸海若殆為之鼓蕩兮山靈亦為之凄悲世逺尚言之太息兮矧挽悼於當時昔孟嘗之多食客兮猶得力於馮歡漢髙之緩爵賞兮功臣已聚謀於沙間淮隂之縛於陳兮楚士誰為之明寃夫義合詎保其心貌兮矧顛沛之周旋若人情之竭盡兮孰不為死之至難不識橫之何道兮羣士紛為之喪元曩東陟於牢山兮眺壘址紆其延攣詢島名曰嗚呼兮野叟惘惘而無言招堂堂英魂兮眷故國以言旋無全文之紀述兮僅附見其大端噫多士之死以安兮缺誄志以奚妨山岊岊以摩霄兮水濊濊其汪洋多吾國之貞烈兮欽芳懿之可忘粵覆載之濟濟紛紛兮孰齡算之獨長彼戰勝以創興兮等大塊之亡羊千載旅墳之􅀈蕪兮名賢慨稱其耿光竊謂君王之可以不死兮詘所遇之何傷為多士之愍悼兮俾考終於遐荒惜一夕激憤之難制兮遺曠世之倇厄兮悲涼明文海卷二十
