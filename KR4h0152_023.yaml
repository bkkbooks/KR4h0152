body:
  text: 明文海卷二十三餘姚黃宗羲編賦二十三述懷一述志賦劉基鮮余生之眇眇兮荷后皇之深仁具五氣以成形兮受明命而為人體乾坤之粹精兮晞日月之景光潄飛泉之華滋兮浥灝露之醇英製杜蘅以為衣兮藉茝若之菲菲佩琳璆之玲瓏兮帶文藻之葳㽔朝濯髮於蘭池兮夕偃息乎瓊苑願馳騖以逺遊兮及白日之未晚駕輕軺之將將兮服蒼虬之騑騑遵大路以周流兮曵虹霓之委蛇挾長離以乘鵷兮欵閶闔之九門豐隆為豫先導兮百靈為豫駿奔前燭陰以啓途兮揚凱風使清埃覲北斗於文昌兮朝玉皇於帝臺食玄圃之丹荑兮澡天潢之芳津激微焱於桂枝兮輕波起而龍鱗元都不可以久留兮忽乘雲而遐征浮江湖之浩溔兮陵山嶽之崢嶸野莽蒼以多榛兮路險隘而紆曲猰㺄炮烋而攫噬兮蝮蛇蜿蜒以當陸欎忡忡以怵愓兮遹皇皇以營營雨淫淫而不止兮霧黯黯以晝冥烏鳶號以成羣兮鳯孤棲而無所楚屈原之獨醒兮衆皆以之為咎欲振迅以高舉兮無六翮以奮飛將脂韋以從俗兮非余心之所怡長太息以增欷兮哀時世之異常棄韶夏而非聽兮登傑佅於中堂芼軒于以和羮兮腌鮑魚而實爼斫梗楠以給爨兮束荆棘而為柱施罾䍡於丘陵兮怨魴鯉之弗獲虎兕逸於山林兮循户庭以求索前蒙瞍以指途兮強揚子使操轅命侏儒令舉鼎兮刖都盧使守閽嵗冉冉而將頽兮日曖曖以就昧松柏摧而根死兮江河化而為澮秣豫馬於不周兮整豫轡於樊桐無蓍龜以決疑兮迷不知豫所從摶扶搖以為輿兮攬列缺以為輈驂清鸞之茇茇兮超煙靄而上浮梁天津以濟河兮睇紫薇之神闕開明怒目而電視兮貔豹吼而山裂進無人以為之先容兮欲自獻而不敢氣勃鬱以憑中兮心惻傷以憯懍過少微而歷明堂兮就軒轅而陳情雷霆砰其隱轔兮馬辟易而不行訪六符於泰階兮求民極之所在咎繇不可以作兮競狂直以為罪凌天街以徑度兮造旬始而瞻覀清衆畏讒而卷舌兮孰能白豫之忠誠怊愮其無止兮然悄悄以狐疑要傅説於箕尾兮命靈龜使占之曰有名必有實兮若形影之相因相福極出自天兮又何尤乎世之人鼎胡跱而不烹兮旗胡張而弗麾弧不可以射侯兮駟不可以策而馳衆蠕蠕以朵頥兮若頽波之東趨謂翬翟為弗章兮愛羸豕之負塗方不可刓而規兮白不可涅而黑悲桂椒之芬芳兮與朝菌而偕落殷比干之剖心兮時豈不知其聖人魯仲尼之過化兮焉役役而無所容其身由強義而罹殃兮惠直道而被黜子胥忠而殞命兮伯夷清而不食將登山而迷路兮欲涉水而無航東西南北安所之兮顧焉擇其所長神冥冥而不下兮龜又厭而弗告思糾結而不抽兮意恍惚以震悼忽濫汜以遐舉兮行遊目於太荒羲和不可扳而留兮恐年嵗之弗將駕廣漠而南征兮叫重華於九疑山岑岑以蔽天兮江渺渺而不可窺邅吾道夫西陲兮聽鳴鳯於岐陽慨禾黍之離離兮梧桐摧而不生浮龍門以泝河兮訪夏后之遺迹川瀆混而不分兮鯨鯢起而人立攬騑轡而回騖兮謁陶唐之舊京無衣裳以禦寒兮哀蟋蟀之悲鳴心悢悢以增傷兮神夢夢其若醉淚洛洛以交流兮憂湛湛兮而來會傅説之版築兮無武丁其誰舉夷吾不逢夫鮑叔兮竟淪沒於囹圄推竭心以服勤兮上介山而立枯種霸越而滅吳兮終刎頸於屬鏤樂毅升於金臺兮何遁逃而走趙周條侯之耿介兮卒含怨以餓􅥌忠有蔽而不昭兮道有塞而不行名不可強而立兮功不可期而成李斯上書以相秦兮空自陷於罪尤買臣顯而戮辱兮豈如負薪之無憂魚赴餌以中鈎兮雉慕媒而膺鏑鳯凰翔於丹穴兮又何患乎矰弋返余斾之旖旐兮遝豫車之轔轔采薇蕨於山阿兮擷芹藻於水濵冽玄泉以瑩心兮坐素石以怡情聆嚶鳴之悅豫兮玩卉木之敷榮挹清風之泠泠兮昭秋月之娟娟登高丘以詠歌兮聊逍遙以永年四愁賦黃淮沖虛子索居屏迹息慮省躬因洞觀夫玄化爰有感夫深𠂻年與時馳羌景物之不異情隨事變何欣戚之靡同若乃陽和煦育品彚昭融穠李芳桃耀繁華於朝日金鞍繡轂醉羅綺於春風轉歌喉之窈窕藹香霧之空濛踏鞠鬪雞斯遊未巳爭妍索笑其樂何窮我則低摧喪氣憂悶填胸虛負嵗華之遷易那知花信之始終聽簷外鳴禽空教夢斷見牆頭飛絮始覺春濃慨窮途之寂寂奈幽思之沖沖至若蘭雨傳香鷗波漲緑開池館以來南薰折荷筒以泛醽醁和白紵之新詞歌采蓮之麗曲或鳴琴以俯清流或岸幘而倚修竹扇影風泛兮齊紈簟紋涼透兮湘玉我則衆穢流腥炎蒸藴毒飛虻旋繞遣拂何暇於言談流汗沾濡起居不離乎禋縟紛然塵垢之侵肌蕞爾竈煙之迷目焉敢肆其趨蹌豈能頻於盥沐及夫序屬三秋金風扇冷時維殘臘素雪揚威盼鄉信之沈迷目窮雁字苦凝寒之慘栗體怯鶉衣漏沉沉兮長夜魂眇眇兮親闈警鐸傳聲兮駭膽而栗魄殘燈照影兮灑淚而長吁於斯時也爾乃鬪勝誇竒携朋拉友浥九霄之沆瀣待月南樓玩六出之竒葩張筵北牖列侍女擁歌姬薦嘉肴稱壽酒婉兮媚物之情哆兮懸河之口苐恐為樂未央而盛時年貌之不留又豈知窮愁迫戚而羈人嵗月之易久也嗟夫豫嘗究夫庶物之理萬化之原是非互見得失相沿競侈靡縱遊觀則流之於放閔厄窮極愁苦復溺之於偏况消長盈虛實玄機之旋斡而窮通壽夭豈人事之能遷是故陋巷簟瓢回也不改其樂易簀待盡參乎獨得其傳又若陸續顛危而不忘乎孝行史遷殘毁而猶校夫陳編韓退之貶潮陽而侃然正大之氣上下霄漢杜子美走川峽而懇乎忠孝之情屢見詩編此皆騰輝於汗簡非徒誇大於浮言復有至人道備德全不與時化不為物牽吻悲喜於一致安性命之自然匪棘匪徐留心淡泊之域爰清爰靜遊神沖漠之天斯其盛矣我願學焉戎旅賦楊慎恭承恩譴兮于役滇越捐珮江臯兮解紳雲闕三陟崔崔兮九折􅝨􅝨不日不月兮遂屆窮髮撫孤旅而悁脰兮掩衆困而􅜢心悵圭籥之駸遄兮逾四稔而迄今父母孔逺兮懿親離而北南類連逵而分衢兮似同波而殊潯慈鳥欣於共巢兮恆鳥悲乎異林彼纎羽之微族兮亦命侣而跢跦何生人之含靈兮乃離羣而弗如咏清人之介駟兮感放士之鳴鴸姬公畏於熠耀兮尼父唶夫蟪蛄屈托乘於螭豹兮莊寄徑於􅂒鼬在聖哲而固然兮攬古人而重欨哀吾生之罹郵兮背中土而播荒粵戴盆而伏嵁兮望崦嵫之末光神恍悢而蜚揚兮形臠卷而傖囊睇孫水之浩渺兮瞻靈關之峻極聆猩猩之夜啼兮履狒狒之朝迹尋終古之攸居兮問祝融之昔宅胥靡登而不懼兮魑魅過而奚栗崛􅞸猋揚兮含沙影流喟兹徂春兮忽焉杪秋月令殊於九州兮瘴卉華而嵗周若有人兮好我携旨酒兮思柔采檳榔兮綴扶留贈相離兮結忘憂寒􅝄雞兮為脯露江魚兮為修滇歌兮爨舞白日遊兮玄景浮獨持觴而懷逺兮雜歎嘯其向陬遂還軫而休室兮隱零雨乎寂夜引簟枕而假寐兮遙夢歸乎親舍家人嘻以欵語兮閭里紛其來訝衆雞鳴而驚余兮晨光曶乎東射悵夢歡而覺悲兮淚承睫而交下假靈氛以歷古兮援龜頌兮余謝曰明庭其布德兮子行歸乎肆赦系曰莫靡荒服自中古兮日月之表燭不普兮章亥步窮禹罔睹兮蘭津開道行商苦兮碧雞望祭使者阻兮余亦何為恆此土兮金躍不祥順不忤兮樂天知命去何憮兮續思玄賦并序桑悅昔漢張平子以圖身之事吉凶隱伏難明作思玄賦豫居京師數月觀之人情物理有難曉者因自號思玄居士為續其賦云其詞曰惟大化之茫茫兮邈瞢蕩其無垠極浮氣之斡營兮淘五行以鑄身五行之氣糅雜不齊故稟氣多濁曰淘天意為之去濁來清者矣留帝則之精鑿兮抱羣聖之貴珍列聖所貴同此性善流涓涓以瀉澗兮糅滿湊而夾塵喻天理幾微雜於物欲穩衡衡以徵濾兮膠谷投以逗真勝私復禮如是出清冷於熛霍兮歸鎮靜於紛繽混太初以翾騖兮悲衆物之不純明出仕之由繄長江之湛湛兮窈窈其沚泫湜有瀨兮芬苾有芷二句屬興三百篇家法茹秉德以鼂飫兮紛或迎而迪理孰有濡而不潤兮孰有翼而不起吐火霧以糅錯兮憚毫光於一指孰呦呦以滿聽兮攝霍鳴乎在子汲冡周書云周時有獸名曰在子餐桃漿於金墉兮味甘露於沃渚張華博物志沃渚之野有甘露食之人壽千嵗謂肝腸之葷穢兮薄天閽而叱止汨淵居以沒景兮作溟漠而延佇田甫田畇畇兮鑿搢稗而藝黍懷美人於寥廓兮敢遺芳於下女彼古聖之涵被兮翼踵輿於平丘事栗栗於刻木兮黃帝上仙其臣刻木以朝諸侯朝鬻鬻於委裘矧祖宗之渥德兮又藎臣之好修拔傅説於版築兮舉寧戚於飯牛巢父出而就祿兮州支起而運籌咀宣尼之委脯兮觴三五以遨遊恨毫芒之不建兮退貧賤之可羞攬明月於燕臺兮逝將去而夷猶閉旅關以靜俟兮間徙倚乎長臯冀植蔥之成韭兮埤雅云王道明蔥為韭恐蘭委而化茅鑒朋詒之朴滿兮愧戚投之佩刀憑旱雲以輸悰兮痛賈生之弗遭賈誼傷已不得行道於時作旱雲賦悵歷仕之不遇兮軫仲舒之賦騷董仲舒作仕不遇賦捫萬象以般礴兮亦何自失於囂囂守專誠於拯物兮撫大化而鬱陶初豫選日以朝宗兮馬垂頭而玄黃假詹尹而詢占兮衡氣機而莫量執稷契之陳靶兮佩伊吕之餘囊觀天瞇以探兆兮鷓鴣忽鳴乎中堂進揆途而聽瑩兮退離則而倣徨荃育德於深宫兮開明堂而聽政目絶傾乎柔曼兮耳不聆乎衛鄭役田文以接士兮驅巷伯而治佞優􅉏御之嶽嶽兮賞從諫之羸正向子遷乎卑室兮沈潰徙而出境五侯負乎羈絏兮三家奔乎詔令圖澄長髠以力作兮左慈刋眩以委命嘗九天之梗味兮和鹽梅以調證審八表之虛湊兮進藥石以愈病才有峻而莫嫉兮功有大而莫競光龕煒以昭近兮惡私恩之燈燭刑垤坎之昭示兮邇鞶珩其必戮溫詔令以參繚兮郵遞氷於春谷崇國塹以懷夷兮曾鞠武之可黷倡優拙而呐呐兮吉士悃愊而恧祿披端練汰乎飛漓兮躬質亮回乎華褥鐫羸遺之并噬兮克限田以為躅力儲豐以熟凶兮毁璧珠而比榖鑒尤物之為痏兮炎禎祥而豫撲礫不遺於鰥寡兮金精披於伯牧扈直毫以臨匱兮稽回忠而必録心應龍而自畫兮浚瀦淤而疏瀆務根本而剝華兮一四海而同俗淵洋洋以逝鱗兮野伎伎而奔鹿悵兹懷之莫展兮臨河水而彳亍袵大易以行藏兮冀徵顔而判辱紛毣毣以閵參兮何玄理之難徵孝婦稿禾以彪寃兮子推抱樹而隕生雨采孝而密意兮火焚忠而莫靈魯陽何揮而日駐兮秦青何唱而雲停耿恭何拜而泉湧兮鄒衍何嘆而霜零共工何觸而崩山兮杞妻何哭而隕城詢往牒以昭晰兮胡邇鑒之冥冥諟本初而瑩察兮不外蝕而虧盈盼中逵以旋車兮且縱覽乎八荒披雲夢之霧褐兮表赤城之霞裳騎白鵠以上騰兮引牽牛以服箱離雲旗之藹裔兮弄電幟之輝煌江祿邀豫於江淮兮姬晉歌嶠而稱觴懷所美於方壺兮翛然贈之以扶桑容成愜豫之才藻兮雙成訾豫貌之不揚悵形容之迭泄兮敢徙倚於帝鄉鋪豫仁為木德兮流豫智為天潢融豫骨骼為四嶽兮化豫津液為三江鋪豫仁以下四句有楚詞以來無人道得混吾我而俱喪兮獨與道而翺翔顧兹遊之可樂兮念墜崖而忳傷茍吾真之未返兮焉斯世之可忘明文海卷二十三謹案卷十九第六頁前五行布哈舊作不花今改後倣此前六行額森舊作也先今改後倣此後四行巴延舊作伯顔今改後倣此
