body:
  text: 明文海巻二十四餘姚黄宗羲編賦二十四述懷二述歸賦何景明有序僕聞之殊途者不可以同觀異趣者不可以強翕故嗜竽者不媚之以瑟好圓者不進之以矩何則殊途而異趣也故賈子投荆南仲舒屏江都屈原遊澤畔三子者非容之不能謀有不合有不可以容者矣故射者不為人易其彀琴者不為人改其操故師可易而法不可易也是以物有不以貴易賤富易貧榮易辱者矣故茂草不負垣美榖不生轍懼所托者非也是故求樂其心者不求華其身求顯於後者不求耀於今故夫子周流刪述墳典筆削魯史左氏者著國語馬遷抽史記荀卿董子之流皆有論譔大抵困屈窮阨發憤作述兹數聖賢者寧徒耀於當世哉僕少執寡昧竊有慕於古人之義弱冠即仕出入班行者已越六嵗頗有齟齬之嘆焉正徳戊辰皇上御極之三年詔許罷歸田里得侍親膳既荷洪宥殊恊夙情於是始欲究著作之原博覧厯之勝竊附一家之傳庶艾不稱之戒僕嘗以漢之文人工於文而昧於道故其言雜而不可據疵而不可訓宋之大儒知乎道而嗇乎文故長於循轍守訓而不能比事聨類開其未發故僕嘗病漢之文其道駁宋之文其道拘反復求斯尚未有得要之鄙意則欲博大義不守章句而於古人之文務得其宏偉之觀超曠之趣至其矩法則閉户造車出門合轍不煩登途比試矣然又欲傚子長好遊之意抗志浮雲徹迹九有以博其大觀以成其文章斯亦不墜古人之餘烈哉於是叙出處之槩援聖賢之風揄始終之志作述歸賦豈敢自附於前哲用以最之於將來矣辭曰有申氏之遺封兮吾顯祖乃肇家洎大人之有立兮遂振落而揚花爰伯昆之繼美兮惟末身以降予寔獲夢之曰吉兮日舍寅而筮嘉予既承此幼美兮懼服志之不遐登隴坂之陂陀兮泛涇渭之洪波極崤函之重塞兮由惇物與大華覧酆鄗之餘風兮泝漆沮之遺歌究城隧之湮没兮哀二世之禍羅雖孺齒以隨侍兮虞年嵗之日加飭華驥以西反兮恐修路之蹉跎忽天門之廣開兮值日月之盛明願自飾以進君兮得近君之末行欝文昌之中興兮聳圖闕之卬卬掲華葢於正殿兮翼玉闥之與金廂塊層臺之隆起兮嚴複道之委長儼宫觀之榮瞻兮接修翼而翺翔奉鸞車之清塵兮竊黼帷之下光服恪勤於朝夕兮冀予𠂻之必揚倐天地之易位兮星辰錯而無綱聿迅飈之亟至兮會浮雲之徂征憂雪霰之交増増兮履中庭之凜霜紛衆莽之凋毁兮恥松栢之孤芳豈予情之耿介兮實悲夫蕙華之揺傷顧涓忱之莫彰兮敢幸澤而干榮仰皇度之寛綽兮得屏放於故鄉嵗戊辰予南騖兮臨大路而高車眺𤣥宫之閴曠兮倚修城之曲隅汨潢潦之濡轍兮白日曀而忽逾塵曖曖以蔽空兮風發發而揚衢視僕御之零涕兮驂悲俛而不驅遵涿野之通行兮經虽尤之故墟陟燕昭之崇臺兮訊樂毅之所居覧冀州之圯址兮式有虞氏之故都出晉野以于邁兮行谷亘以逶迂下滹河之隑洲兮接邯鄲之修塗企魯連之風烈兮雖異世其弗渝懲奢麗之覆亡兮憫豪盛之靡餘朝予濟乎洪河兮夕弭駕於淮澨逝逍遥於故域兮躭樂極於桑梓治丘墓之穢草兮考先祖之徳裔侍顔色於閨闈兮服左右於起居分崖谷以畢處兮辭纓緌而不縻啓衡門而葺茅兮循蘭徑之委委藝嘉菊之百畆兮采芳若於中沚伊予既秉兹之超寂兮恐邁吾之盛年檢古人之遺美兮心竊傚而不敢愆樹六藝之旄節兮數百家之遺編殫仁義之遐風兮略𦕈少之陋觀下何探之不幽兮上何求之不𤣥乘二儀而列三光兮揜九區與八埏揚素筆之芳烈兮修薄辭以為編綴大賢之緒論兮紹斯文之未傳曷章句之足守兮發矩彀之自然汲時日以迅厲兮惡名稱之不延昔夫子之喪位兮迺周流而轍環望龜山之蔽翳兮去魯國而盤旋臨河水之洋洋兮托哀操於鳴絃疾予心之迫隘兮願輕舉而逺旃羌筮日以造遊兮嚴吾驂之翼翼飭桂衡之超駕兮搴采旄以前飾乘白螭於上㐮兮曲文蜺於兩服張孔雀之翠盖兮諧鸞音於下幅施結璜之委珮兮謹垂鞶之式式涉洛水之靈波兮恐宓妃之不得使文魚以媒之兮怨約言之我食抗予力於江南兮秣我馬於漢側豫遊女之不信兮解我玦以明徳順湘流而下沿兮望九疑而夕發從二妃以並翔兮忌神人之相越離江夏以東邁兮覔呉越之所在弔夫差之故宫兮尋伍胥之濤瀬痛麋鹿之遊宫兮惋鴟夷之被害極禹穴之幽冥兮窮會稽之勝槩慕太伯之清聖兮欽季札之耿介朂余馳以流汎兮安崇卑之不臨北旱海之爛灼兮西太素之積陰氷沍結以承輿兮霜霰雰而接岑南陸届以暑徂兮或受蛇之陵侵取嵎夷以極行兮盼東海之漫淫怵天地之冥晦兮懼陵谷之隳沈速反轍以旋服兮息余丘之茂林終養恬以順年兮厭予心之所諶世淆濁而莫察兮修短錯而不倫芻桂芝以秣蹇兮吝糠糲以飼人豢罷牛而被以文服兮良馬棄而不陳賤馨烈而不銜兮反逐臭於海濵予憂乎鳯凰之不鳴兮豈云係乎麒麟彼蘭草之國香兮歛空谷以自珍聊委順以祈齡兮吾又安尤夫人亂曰南有嘉木有鳥居之朝破其巢夕則去之代愈下兮詩書道㣲曷曰予不還歸即彼昭昭去彼汶汶今則靡榮後有問兮司命賦趙時春客有以束芻加塗綵繪飾素金碧縈紆繡刺抹傅冠夏后之章甫合軒轅之制度標曰司命之君祗承則畀福祚惠而好我用啓窮固主人辭而難焉曰夫陽輝而穹圓垂象陰翕而柔祗敷形故形則為水土木石象則為日月辰星萃兩間之精華麗至道之模型要其所極則參差難并究其所始則突奥窈㝠盖七聖之智而於此乎迷四科之愽而不能訂謬彼譸幻假此芻靈類燕人削猴於棘端同偃師舞巧於周庭縱無求而不獲匪余𠂻之所寧客曰迂矣子之言也夫三五淪喪剝落真元陽明凋㓔陰邪昻軒勢失則擎拳曲跪以取媚志盈則招權攬威以自尊一波瀠而萬濤漲孤壘摧而三軍奔况七曜焉輪迴而兩間乎平反醜正惡直其徒實繁足恭令顔其竟實㪟豈𦕈􅂒之所能撑柱空於悒以䝉邅屯朂余忠告慎爾出論余乃再拜而受之妥於中堂致蠲吉肅冠裳注椒醴奠蘭漿列胾餌獻餱糧鳴洞簫鼓笙簧陳靈蓴招巫陽望左右幸歆饗已乃兀然突然燭影亂而神颷翔慄然竦然毛髪竪而相扶將若有恫喝于隅虩笑於梁乃審厥相則恍惚兮難量乃聆厥辭則嘈唧乎難詳叩之則無所應已焉則復來降良久巫致嘏曰神靈訊汝謂汝有所凶吝而求祥乎汝之祥由天神不能逆天而取殃謂汝有所咎尤而懲創乎汝之尤由已神不能易汝之肺肝而柔汝之剛腸夫不揆於人而於鬼乎厚望不圖於誼而受俗之羈韁悲世所以馳騖追逐而卒仆僵者也吾且示子以廣大之論遊子於曠逸之塲下抉乎地維上觀乎天閶騁雋永之至辨析聖教之㣲茫明以語子子其聴卬盖聞大造以天地為洪爐以山川為巨防鼔動之以五行鎔液之以陰陽綴日月使煽灼驅風雷使播揚於是鍾淳懿者茂以昌值澆漓者肆而狂譬諸爍金精者為百錬之鋼鈍者為一割之鋩其間等倫皆可辨明返造物之本原此其較然大章者也乃若遭其窮阨值其淫汪變態萬端靡可久常或保其慝或賊其臧伊摯之任兮乃孕空桑重華之睿兮乃殯南蒼陶唐咨岳兮巢由深藏履癸愎諫兮乃臣龍逢磻溪垂綸兮暮獲真王甘童舞智兮為趙鳯凰此則糅錯難齊事理或爽者也至若箕子陳疇於周而奴僇於商仲尼勁於夾谷而畏於宋匡齊桓雄於五霸而蛆出於床秦穆𢎞於乙丙而殉其三良此其始終異故本末披猖者也又其甚者尤可悼傷接輿獨見兮楚稱為狂三閭忠藎兮爰投三湘伍員獻謀兮翻盛革囊𢎞演納肝兮國破身亡著乎詩人之諷刺編為史册之輝煌然懷寶含瑜逢時搶攘既不其力覆用胥戕或有義烈精誠感動𤣥黃萇𢎞迸血而化碧鄒衍痛哭而飛霜然猶乖世負俗絶頸扼吭其餘齎志飲憤激薄乎三光者不可以比方也窺古今之殊致感流波之相蕩合至道於㝠漠揆安宅於久常縱目乎紘垓之表神遊乎夫何有之鄉窮通好醜孰能為之弛張進退虞豫孰能為之低昻願含章兮藏器俟乎時運之芳勿韋脂兮模稜永含愧於滄浪余聞斯言警悟倉皇方欲殫其要眇療砭膏肓但見皓月覆地落葉凝霜向之所睹儵然而衰矣逺遊賦并序袁袠余弱冠登朝讀書中秘繼官刑曹調武選武庫灾編戍湖州赦歸䝉薦起為南武選遷職方署員外郎尋有廣西之命昔孔子乗桴浮海不以為陋廣西古百粤也今海内同軌且余既仕矣安敢以逺辭乎爰作逺遊賦以述事抒情焉其辭曰沐鴻私於嘉運兮擢遺反於樊丘曵華緌以登進兮踐舊京而嬉遊幸朝野之無事兮肆驩虞而靡憂謝文墨之填委兮稽圖牒以諮搜差榖旦以休息兮爰嘯侣以集儔升北山以遐眺兮遡大江而榜舟或閲武於廣塲兮或祓禊於清流尋廢興於六代兮仰駿業於皇猷念無荒之有戒兮信佚樂而不偷乏佐時之竒畧兮竟投裔於僻陬駭顔駟之龎眉兮恠馮唐之白首嘆滯淹於更生兮笑浮沉之楊叟羞子安之巧宦兮䝉良史之譏醜偉潘仁之拙政兮賦閒居而不朽衆捷徑以窘步兮固余顔之所厚獨修姱以委順兮諒余心之所取茍貪婪以競進兮寧坎壈以自守昔孔聖之周流兮君子居而弗陋羗下惠之直道兮遭三黜而無咎顧樗櫟之非材兮雖棄捐其何有奉簡書以畏忌兮戒僕夫而啓行出檇李之下邑兮游臨安之故城痛越霸既不終兮宋社又以圮崩肅陽侯以先驅兮遵淛水以揚舲感錢鏐之雄武兮提尺劍以縱橫悼伍胥之忠憤兮浮鴟夷以隕身忽怒濤之山立兮儼白馬以耀靈沿桐江以容與兮憇嚴瀬之澄清躡高臺以長嘯兮懐哲人之典型於是芳嵗將徂𤣥冬告畢雨䝉䝉其下淫兮雪霏霏以蕭瑟䨧霧曀以冥冥兮同雲曖其無色雁􅗳􅗳而南翔兮日忽忽其西匿坐修夜之難旦兮步列星以太息繹寗越之曩歌兮材士顑頷而失職心侘傺以紆軫兮思絓結而瞀惑水泉涸其不流兮石巉巖而阻塞既儃佪以川浮兮復﨑嶇而山陟野蕭條而無人兮獸躑躅以屏跡愁車殆而馬煩兮汩吾朝征而夕于役形枯槁以渇饑兮精消鑠而内蝕魂􅚡瀁以踰佚兮涕浪浪而霑臆撫壯年之不居兮恥修名之未立於是歴甌粤觀豫章攀嵥閣於江渚兮詠瑋辭以徬徨帝子不可作兮王生亦已淪亡睇彭蠡之巨浸兮追鴻伐於高皇想湖水之盡赤兮殪元􅀢於大黃剪鯨鯢於溟渤兮陋巨鹿與昆陽謁羣忠於叢祠兮覩丹青之耿光甄孫許之壯烈兮實後先以相望咸致命以竭節兮終身㓕以名揚越臨江以信宿兮矚玉笥之崇岡修降禪於漢武兮欽登封之閟藏忽獻嵗以發春兮迴青陽於幽谷鳥嚶鳴其相和兮麗冬榮之嘉木悲去鄉其日逺兮時反顧以蜷局魏牟皇皇以戀闕兮嗣宗塗窮而慟哭何賢哲之逺觀兮猶委心於榮辱諷龍蛇之至言兮勵浮雲以自朂聳韓廟於袁疆兮哀逢辰之不淑黜百家以述聖兮排二氏以箴俗雖馴鱷以開雲兮卒罹殃而貶逐弔楚纍於江潭兮披騷經而三復椒蘭妬而搆讒兮嫉蛾眉而謡諑怨靈修之不化兮傷郢都之傾覆式彭咸以自靖兮葬汨羅之魚腹涉長沙以夙駕兮嗟賈生之夭年遭漢文之殊遇兮何卒困乎綘灌之巧言闢宣室以徒召兮賦鵩鳥而自憐挺異才以命世兮竟齎志於重泉亂衡陽之洪河兮厲沅湘之大川覽呉楚之上游兮極耳目之偉觀瞻栁侯於永郊兮薦蘩茝以羞筵世溷濁而壅塞兮紛妬忌以蔽賢慨四子之一轍兮羌異代而同患士不遇以永嘆兮諒自古而已然望朱垠以俶裝兮指象郡而驤軌肆流目於南疑兮悵重華之野死蒼梧曼曼以在望兮悼二妃於江之汜山巃嵸以造天兮嵐昏昏而晝起桂樹叢生於巖阿兮春炎炎其若暑壌濵海以沮洳兮土墊濕而恒雨猺狫娭以伺人兮咸雕題而黑齒蝮蛇蓁蓁於中林兮􅈮含沙於淵水雄虺九首以觺觺兮封狐捷而千里何此邦之炎瘴兮固蠻族之所止徵禹跡之所不到兮檢職方而未序詫漢帝之喜功兮肇開拓而疆理猗皇風之泰昌兮界昆吾以為宇包五嶺以作藩兮括百粤以置吏朝越裳以重譯兮撫交州而即叙眇余躬之陋㣲兮敷文教於兹隅戾泮宫以振鐸兮選青衿之秀儒懼聖逺而言湮兮病曲學之支離列四科以作人兮愧五教之未施憑丘墳以頥志兮寄絃歌以自娯聞老聃之適戎兮講道徳之𤣥虛䝉莊遁於漆園兮馳放言以恣睢虞卿窮而亡聊兮猶發憤以著書茍斯文之未喪兮竊希志於前規吾將籠今古以騁騖兮掇罔象之𤣥珠亂曰去鄉逺逰心不樂兮自冬徂春將焉薄兮炎州卑濕風土惡兮魑魅晝出瘴癘作兮狐死首丘不忘故兮代馬北風尚知慕兮世不我知羌誰愬兮歸兮歸兮娯竹素兮思歸賦袁袠旅荒徼以羈處兮心忳忳而多憂陽春逝以流邁兮曜靈迅馳而不留涉恢台之炎夏兮赫燋灼以鬱蒸瘴曀曀以中人兮觸沉痾以驟興寒熱搏而襲逆兮苦痁崇之相乘乏單豹之内養兮二豎伏而伺升哀吾生之孔艱兮逢百罹以備嘗進觸藩以跼蹐兮退曵尾而摧藏嘉魯連之肆志兮雖貧賤其何傷世好朋而習佞兮懼婞直之搆殃遯幽谷以逾紀兮忽奔走乎遐方豈好爵之我縻兮實簡書之可畏收孟明於三北兮䝉嬴繆之渥惠奉周任之炯戒兮勉陳力以就位冀鉛刀之一割兮庶伐檀之無媿老冉冉之將至兮疾疢糾其相仍俟河清之幾時兮恐朝露之易零誦夫子之雅言兮疾没世之無稱紛王事之鞅掌兮籲天閽而乞身積頽思而寢息兮憎愠惀以怵惕喟中情之莫我察兮眷懐歸而未得夜申旦以不寐兮就角枕而反側蟲􅖇􅖇以潛飛兮聴空除之蟋蟀先秋氣以哀唫兮感時物之數易魂營營以夢歸兮覩故鄉之髣髴歘驚寤以在床兮怊惝怳而悐悐昔鍾儀之囚晉兮操土風而不忘彼莊舄之仕楚兮詠越聲以徬徨覽季倫之奏引兮思娯老於河陽繹陶令之賦辭兮修初服於柴桑人情各懐土兮豈必經營乎四方余既不能狥華以茍祿兮又焉能棲棲於此邦孔接淅以違齊兮軻濡滯而出晝欽䟽傅之炳幾兮脫桎梏於組綬梁歌噫以竄稽兮梅掛冠以遯呉仲樂志於園藪兮張興思於蓴鱸鴻㝠𠖇於寥廓兮起繒繳而逺徂非斯人其誰與歸兮永逍遥於江湖亂曰𤣥鴞黑烏號寢宫兮鳯凰翩飛匿林中兮人各有心紛不同兮靜躁殊趣貴中庸兮塊獨居此將安從兮我思古人希哲蹤兮内咎賦并序許應亨嘉靖已亥七月之閏余從兄至京師道齊魯之墟中夜無寐徬徨起坐悼徃過之寖深懼將來之易溺忸怩中熱撫几赧顔而作是辭余徃躭此竒徑兮顧中道而背馳極曠遊之快心兮决轡御而不羈白日既下西麓兮竊獨處此纍畸魍魎蔽於大澤兮山鬼迎將以噬石巉巉以躡足兮水澌澌以披靡彼哲人立於高岡兮搴余裳戒以勿濟虎嶷嶷以肆翼兮將以食予之肝肺余方憒而莫知兮神怳怳以心醉忠言逆余之耳兮反迎之以罵詈披蒺藜以為衣兮又紉之以為裳席荆棘以自娯兮雜蕕茨以佩嚢狐九首而襲媚兮蛇蜿蜒以引吭涉流離而弗顧兮道嵳峩以徜徉心揺揺而不寧兮體糜糜以皆傷妻子泣以向余兮友明招我以簡書此地不可以久處兮曷返子之故居子烈祖之南徙兮固以振兹令圖洎乃考之仁厚兮遵繩墨而不踰伯追躅於古哲兮既為世之大儒子獨何其不肖兮自喪子之嘉模夫人孰能無過兮貴速改之惟謹昔殷王之齊聖兮曰不吝以為訓顔氏既以不貳兮後世稱其亞聖茍朝作而暮改兮亦云天之明命辛受恥過而作非兮墜洪業以隕軀有渾敦之長傲兮聖人投之於四陲惡無纎而弗㓕兮徽罔積而不虞鬼神福善而禍淫兮天培栽而殛愚余雖聞而不繹兮猶赧顔以忸怩乃已亥之孟秋兮膏吾車於北衢既逺跡於塵陌兮遂肆心於詩書緬溽暑之既退兮又申之以秋初風蕭瑟以怒號兮氣抑鬱而莫舒月既望於東陸兮夜氣清而不渝達中宵而不寐兮獨慘慄而嘻吁昔嬰身於湯鑊兮痛百創之在膚譬狂藥之喪心兮赴水火而莫辭既號噭於南北兮復跳梁乎東西自安止於汚下兮惟佼僮之是師齒雖壯而猶弱兮氣方鼔而復摧曩㓜學之聦慧兮竊自比於瓊瑶慕吾兄之高蹈兮將頡頏於青霄胡中道之廢墜兮滓異質以涇淆使蘭茝雜於糞土兮豈云異夫蓬蒿雖徃者之不可諌兮懼來者之易殽誶曰宴安鴆毒不可親兮蝮首蠆尾豈可矜兮君子明哲以保身兮孱士窮欲將戕生兮放僻邪侈罔桎桁兮戴仁抱義至公卿兮遷善改過有殷之興兮長傲遂非桀紂同征兮明文海巻二十四
