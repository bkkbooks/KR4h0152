body:
  text: 明文海卷二十五餘姚黃宗羲編賦二十五述懷三閔獨賦葉良佩閔諒貞之獨立兮阽衆險以乘危謇離披以隕穫兮循本初而自思始豫之未有知兮專六籍以為師朝帶經於兒圃兮夕發憤乎董帷物何幽之不鏡兮理何微而不窺既釋以從政兮棼亂絲其難治索慮謀於古訓兮判與彼而異宜心無歸之茫茫兮疑簡䇿之我欺步徙倚而遙思兮寐展轉而反惟困極其必通兮神恍惚兮若有得曰道有玄機兮而靡定式乘時制用兮妙存悟識親賢爾輔兮稽古自益任重惟毅兮篤信靡惑愓靈魂以驚悟兮奉神貺以周旋抽詩書之祕訣兮萃仁友以討論遺驪牝之粗迹兮遡九河兮崑崙披義塗於棘榛兮排私闥以為禮門搴木蘭繼余佩兮扈芳洲之芷蓀冠切雲之寶升兮明月懸乎帶鞶衆讒嫉之弗回兮猶汲汲乎疇昔之言夫惟被服之魁崔兮衆果薆然而忌之加以險陂之偽名兮乃集羣怒而噬之衆口垂涎之瀺灂兮張怒目而睚眥忳鬱邑余煩寃兮雖百喙莫之能解豈不歷情以陳辭兮荃詆余之善誑競服面而背憎兮反托豫言以肆謗聨矰弋之在上兮覆深淵而在下仰側身以發機兮俯置足之靡所念豫初志之好修兮今何以侘傺而遘殃將惟言語以階亂兮無亦擇交之不詳世舉好朋而惡異兮余獨蹈其所怪揭吾日月以孤行兮豈不招尤於暗昧仗貞信於幽明兮全形軀之已多及年嵗之未晏兮修初服其何為襲余芳兮鏟余彩坐若忘兮行若待中以為廬兮和以為馬馳騖於順適之途兮休息乎曠漠之野衆之不可勝兮險不恬乎再試頌我過以成章兮書爾紳以自識申臆賦朱應登炳哲靈以儀圖兮靚人文之攸章遡終古以橫視兮羌姱美之鮮雙紛總總之林府兮嗟要指之必同探寶航於百濟兮豈珍錯之畢將吾形吾之內熠兮表鑽窄於縱橫倘神解以貫一兮雖襞裂其奚傷彼固擁篲以清道兮俟塵躅於周行惟體裁變於異世兮嘻末流之濫觴曽大雅之弗程兮日佌佌以叛經鑿龎洪以頽靡兮毖國運而不昌彼英㽔之夕霣兮曷椅梧之在岡握道樞於環中兮固匪夷之所思寧勃屑於徽纆兮卬超脫乎馽羈歘神化之蟬蛻兮蓀獨宜於流裔謝鏤刻以返沕穆兮萃要領之所之噓沆芒之元氣兮象萬有之陸離掇九據以定玄兮指六緯之攢羅興九懷以繼騷兮衍五際之委蛇舍黃虞以下索兮鬱秦漢之足跂彼渾朴之未雕兮視大道為近而眷爵之雖誃兮疇更倣乎蜼彛聆錚礦之易節兮反黃鍾之克諧矢之曰貞豫見兮無毁甈篤余道兮發蒙翳馭吾氣兮合采齊律豫格兮絶訛盩守質薤以揚確兮俾凡例之有挈參􅀈摘以袚飾兮既繁富而不劌鴻邃兮巨麗雋永兮敦大㠍嶫兮疏越流鬯兮撇捩崇作述之渢渢兮庶不乖乎所制期絶代以高視兮以式耀於斯世嗚呼古人兮其儷其儷誶曰已焉哉紫氣蛙聲道日靡兮縱縱季世昧厥義兮雕虎擒龍各相惎兮肆類終造校昔踲兮而日呶呶承流波兮顧瞻中道將安師兮矢心古若匪今懟兮定志賦陸容后皇賦物兮孰嗇孰優衆皆善世兮我獨離憂舌弗能便兮意弗善投每行身以直道兮恆速悔而招尤初余受言於先正兮曰放心之是求朝窘步於春氷兮夕束手於縲囚儼矜持以日慎兮馭朽索於八騶余豈不能狎侮以戲豫兮懼加冠於沐猴彼囂囂之訾余兮謂余作偽而宣驕叶凜斯言之可畏兮贅余心以縣疣余將踵詩人之善謔兮襲老氏之同流逸軌範以騰騖兮舍舟航而泳遊騁余志之猖狂兮與斯世而沉浮求諸心兮不可念前功兮率由矧人情之難一兮紛萬狀其弗侔茍甘心以徇物兮將何時而可休彼夷之峻絶兮實惠之所憂和同若惠兮亦夷之所羞人固有能有不能兮惟至聖其能周慨眇躬之涼薄兮夫孰告余以嘉謀余惟口宣尼之便恂兮顔衛武之輯柔戒悻直於伯鮌兮懲巧令於左丘茍余行之不悖兮尚何恤乎楚人之咻亂曰已矣乎人言之啾啾兮匪時俗之偷兮實余德之不修彼動容之中禮兮余將企斯人以為儔幽鞫賦盧柟帝顓頊之嬋媛兮皇波􅐹乎姬薑儃海岱蜿蜒於北陬兮靈宗嘉牒於范陽遻雲雷之霮䨴兮闕改此南服淑浚土作甘美兮躡闕之芳躅皇傑梧董道以迪惠兮母氏靜約而告育曰余夢文杏靃骫於霄漢兮芙蓉華而尚粹溘焱熖倏而進兮應龍觺觺而下䀣倐恍悅以隕虛兮覺懷妊而因惎余母夜夢此有娠謇余降於衛滸兮幼好姱而岐嶷岌青雲之偉冠兮挾長劍之陸離朝晞髮於崑崙兮暮濯足於咸池余長喟其厯之未塊兮勔修余之菲芳裁薛荔為衣兮𠂻芙蓉之翠裳集菌􅉅為藉兮糅杜蘅以為粻揭旌於蘭臯兮稅駕乎芳之塘余迅淢靸以高舉兮汩鎩翮而顛隕謂曾參之殺人兮談市虎而成愪蒼蠅習習其貝錦兮魚目敓明月之璀璨嫫母憗以闕兮擯西施之頩娩而自㫬蝮虺侁侁於几筵兮戈鋋森森以剚余目既厄余之瘁廲兮又囏之以􅎂拲低曼睩彼狴犴兮桀血齗而封矚窅闐怒以蹲踞兮視將躨跜而矯鵠檻樛􅔒以黝軋兮棟倔蠖而黶翳縲纚纚於伏棧以苦余兮仍反接而窘臂耳嘈嘈若有聞兮闕怫㥜目炯炯以或見兮佇鏗勿而闕曶以􅚡漾闕精憧憧而往來覺塊然滯此一方兮心􅓥􅓥而增哀鼷鼠淫喔以嚙余髮兮魑魅含睇而毰毸傫㗊㗊相喃以對泣兮禦糾糾而呵護般逮余兮紛豗繄鵬鳥之巢蚊睫兮焉能戢此軀也枕雕虎以燕憩兮又誰知不我虞也悲時晷之遄邁兮曜靈忽其西藏微霜淪而下降兮恐瑶草之不芳高馳志乎雲中兮乘精氣而相佯王喬衙衙而弗顧兮赤松告余又荒唐行偊偊獨日暮兮安放乎不死之鄉橫衝波而微舟楫兮天吳搖首而振怒厯泰山之坎軻兮魍魎咬盻以當路猿狄蹇以在柙兮雖輕捷其焉去鳯凰之罹蔚羅兮縛茇茇之華羽抱鬱軫以顝處兮呼蒼天以為直戒五嶽與嚮服兮禆河海使聽殛咎繇逺以不聞兮玄武違而莫惻何羣神之豐豐兮靈炳耀而罔恤夫余既不能蟬蛻於兹蕪穢兮眇乘風而長鶩心結思於大荒兮魂焭焭而上度澄青雲之霏霏兮飄風回而霽霧載玉女於後乘兮飭豐霳以先路羲和儼以驂乘兮望舒翥而警御征輕輬之闐闐兮八鸞鏘鏘以迥步承雲霓之氛靄兮靈旗繽紛蟉虬乎翠羽挹朝霞以為餐兮吸沆瀣之精英漱華池之飛泉兮聆鈞天於帝庭素女涕泣以淋浪兮間絙瑟而咿嚶虙妃欷歔以結軫兮潛咨語而沉情余凌軯虛而佚蕩兮將攬結乎三光撰余轡而馳騁兮問元化於勾芒採三秀兮眺瀛洲之微茫弭余節兮聊解珮乎扶桑睇南州以凌厲兮嘉桂樹之叢叢召風伯以驅燠兮謁炎帝於清宫何蒼梧之翳靄兮重華穆以揚靈湘密鱗而淨瀼兮二妃胡為而弗從決白門以西望兮覿蓐收於金樞氣澔澔以莽曠兮薄暗􅀈而誰須觴王母之仙姝兮挾瑶池之芳都指玉勝以為約兮歌白雲以相愈荃既婦余以好艾兮絶弱水而進輅齊玉轂之磤磤兮指寒門而並騖軼鐘山之幽黦兮令照之以燭龍召玄武為備禦兮勾辰翼乎紫宫託鷖鳥為之先後兮問太乙之繚垣靈剡剡以黝約兮鳯凰承旗而飛軒雷師碨􅓓轟􅐀以震蕩兮列缺傓爍而施鞭謢屭屓以揕余兮闐吒噁而俾還卒攬涕反此舊都兮潔筳篿從卜乎巫咸曰天地無隘兮物無終始變化互渝兮幹流遷徙形氣轉薄兮或浮而沉造化沕穆兮禍福無門聿性命之難言兮誰知其極萬物糾以氛蕩兮又安所止息惟大人齊物我兮以天地為廬舍總山川於毛髮兮騎日月以為馬夫有虞之潛歷阪兮當厯數之在躬夏后胼胝而陟大寶兮季有光於黃熊震龍漦而夏櫝兮顧駕禍於周庭白魚躍以膺大命兮劉氏顯而有功奚五羊以自鬻兮由余振於西戎尚鼓刀於海濵兮仲父射鈎而桓榮仲連談笑以却嬴兮胥重繭而存楚條相后而餓死兮鄼搖筆以光輔墨不黔以衛道兮孔轍旋而微伍光狷介以自湛兮夷顑頷而振古大道固無涯涘兮行焉知其所如惟恬淡與寂寞兮斯貞人之攸居從委命而乘流兮遊寥廓之鄉忽喪我而無是兮觀泰初之茫茫余託蜉蝣與遊兮曽日月之徜徉忽歸魄於玄壤兮又何足傷勉修余之俶服兮珮芳澤之幽蘭紉揭車之落英兮襞江蘺與射干飾翡翠而綴珠被兮爛的皪而芊眠組綺縞而飄揚兮下結之以雙璠余嫓美而自鑑兮何媒妁之可攀夫君眩而弗御兮亦余心之㛹嬛系曰天地緼綸何時明我欲見之心倣徨輾轉懷憂祗自傷超軼絶世窮大荒帝極洪洞不可量緘悲歸來卜巫陽勵志肥遁含大章獲我所思樂無強明文海卷二十五
