body:
  text: 明文海卷二十八餘姚黃宗羲編賦二十八人事二歡賦有序屠長卿余處冗賤百憂煎人側身天地長苦局蹐思欲揮悶散心寄興楮墨我思古人動多憂愁昔士衡歎逝文通賦恨驚心動魄一字一歎每一披覽秋氣颯颯風雨欲來使人惻愴幾不知有生人之樂矣友人馮夢楨謂僕曰子何不為歡賦恱心暢意破彼我之煩悶宣萬物之鬱塞則此道貴矣夫愁苦之語易好歡娛之言難工然烏可以其難而含毫沮喪也於是為賦焉文通諸君子見當掩口晨登山阿下覽八紘天地開朗風日熹明遊人出嬉川途載平於是僕本曠士解顔畼鬱百慮盡捐萬愁若失我思古人歡情靡一娟娟皇娥夜處璇閨薄焉遵渚帝子是依精靈感化中心不違清歌相答遊漾忘歸軒轅守和冥心合道夢遊華胥萬國熙皥終登崆洞後天地老子晉仙才神骨蕭爽丹經既成捫霞直上羣英夷猶九州糞壤薄富貴而不懷希世外之幽賞英英穆滿志狹乾坤萬里煙霧八駿雷奔謁西王母登彼崑崙奏白雲之長謡俯弱水而歷天門秦家公主氣凌紫氛一當蕭史遂厭人羣攬虹霓而作佩製丹霞以為裙睇樓上之明月躡天邊之彩雲長辭綺閣永隨夫君千秋萬世此樂何云越王破吳奏凱言歸載蛾眉於金車挂將士以錦衣樓船壓江濤朱旗晃日輝緹騎填乎廣野羅綺盈於中閨堂上燭滅笙歌不喧尊罍酒清房櫳月昏閽者出客主人留髠坐細毳以終夜傾一石而何言至若漢帝英雄初誅項王山河入掌弓矢斯藏過豐沛兮訪故偕父老兮尚羊歌大風而慷慨覽雲氣之飛揚又如延年獻歌夫人初御驚玉骨之凝霜艷輕綃之如霧樓閣含風階除墜露洵明珠之照人判傾城於一顧衛霍出帥士馬精強胸奴滅漢道昌黃金朱第列侯煌煌鈿叉作隊歌舞成行相如弄琴文君私喜臨卭夜亡成都歸市姿態艷目芙蓉心死紅蘭茁芳砌青苔生玉戺雖貧賤其何傷願百齡以為矢若夫太液波明昭陽月滿香蓮罥舟涼風送管黛色欲絶歌聲乍緩既和媚而魂癡亦宛麗而心斷兔園既開梁王意歡碧瓦宵白朱門夜寒集詞客之鴻藻驅凍雲於毫端孟德芟除四方蒿萊雄圖既就猛士歸來引漳河以為池鑄銅雀以為臺清吹干雲步軍轟雷髙歌烈士泰山崔巍陳王妙才應劉卓犖寶馬金羈光輝歷落出馳東郊歸燕平樂神飈蕩空青山映閣會稽諸賢遠覽髙步山川崩峭雲物莽互喬松夾道修篁繞户一詠一觴凌虛徑度庾公風流作鎮武昌挾賔佐娛景光暢飲其無人代長嘯而下天霜又有征夫戍邊思婦含悽長想忽見遠行乍歸今夕何夕月白星輝髙堂敞兮春溶溶朱簾捲兮秋漫漫新昏合兮出瓊珮佳期至兮藉芳蘭金爐兮乍焰紅燭兮未殘莫不欵爾彌洽爽焉和愈寸腸不結雙眉長舒知離憂之為何物豈羡夫神仙之所居孤燈賦顧紹芳當夫羲和促駕陽景戢曜露凝霜而未飛星含芒以漸照肆目則黮黯而若迷極聽或淜吰以如咷爾乃燧人獻伎祝融效靈沃以馨蘭之膏列以黃金之檠覆以綃縠之幕然以琪華之莖續龍銜于既灰俾幽穸之大明爰有貴人公子耽妖冶之劇遊縱浩奓之至娛曲房隱間髙軒周疏左擁姣女右挾子都趾動流光齒露生姿盤辟巧笑終宵不疲玉漏漸撤猶仰餘輝又有遷臣逐客投湘竄澤猿啼兮腸斷林嘯兮夕惕淹寂寡儔面之太息亦有傑客俠朋豪舉踔厲風流相師吐辭眩日積釃成池振歌舞吹塤箎御翠尊撫雕巵為歡未央聨翩淋漓恍修炬之爓朗佇扶桑之朝暉又有思媛戍婦神挂紫陌魂馳玄關日晷空擲良夜徒闌握金剪以凜霜抱孤裯而盤桓睹殘燼之在壁攢哀思而長嘆兹物情之詎殊亮憂愈之異觀惟余今之所覿將為悲兮為歡始熖熖以昭爛既憧憧而飄颻乍隱乍舒若邇若遼當隙風以披靡近間牀以泬寥于斯時也鼯鼬啼覘乎其側塵坌繚繞乎其上月皎皎以奏光雁嚦嚦而飛響悄焉孤影凄其萬狀爾乃沈酣千代咀嗽百家彤管吐精竹素揚花寐不知其枕席遊罔借其煙霞於是孤燈亦熠爚吐氣輪囷生花似目余以知已矢久要而靡他亂曰聘靡曼兮窶無資徇節俠兮獨無徒蹇余賤兮焉所放穆余姣兮焉所思坱兮軋兮大化紛以離披乘運順流安余其居余弗知其懌又焉知其悲願優遊以卒嵗請終身而誦之罪鬚賦有序靳學顔豫試童子見有魁梧而甚鬚者命作此辭不諧吾意遂援筆製此以示風焉辭曰遵彼旄丘莫赤匪狐叔兮伯兮有鬚丈夫爰自鄉甸來適都市曰往試乎偕彼童士童士曰嚇於思於思譽髦方臻爾胡為哉兵衛總總大夫在公髯於衆中緣階自東既旅進以獨聳指危冠而上衝乍引領以斂翼忽脫穎而露鋒於是髯也俯而不昂肩髙頥隱欲蓋彌章大夫曰髯前吾語汝道逺云來跋疐良苦汝其心童而貌則皤顧名思義人其謂何髯謂大夫失之子羽長揖不辭將歸有處既歸返舍盛氣自厲攬玄錫之光華鼓金錯之利器鏗將舉而未下先聲罪而矢意曰陶無見膚其以汝貴何吾殖汝乃貽棄纍凡吾百體纎悉有以齒決爪搔冠以髮紀睫衛離朱毛通肺理宛彼兩眉所占無幾輔頰匪尺而據踰中實繁有徒汝吾奚功發論則附以作勢微詞則鬱而不通解顔而燦然之美若失長嘯而宫商之旨弗融雖有嘉食淋漓引膩雖有麗服覺我形穢流火之期揮汗成雨紈扇弊搖亟麾不去積塵為垢積垢為蠕無而不治疹其興諸是用多方剪理拂疏嗚呼子鬚汝大負豫上官見憎職汝之居龍蛇之蟄時有卷舒寧不少潛以忍須臾顧乃森發爭張競挺參鬢侵歡翼腮蔽領黃氛繚繞赭茸不整使我染翰無光吐氣不揚誓將決汝離彼故疆已而鑷人呈技待詔獻功芟荑搜剔根株斯窮長條冉冉以錯落弱苖離披而飄蓬既乃假寐隱几憮然自喪鬚作人言見夢陳狀曰豫受命與子形俱妍媸在子不在吾鬚內充外瑩血氣有餘赭茸不整子自中枯不曰妍乎綽約妙姿黝光可鑒玄圭載垂毶毶長揚清飈吹之落落喬松麗葩施之吾於此際何負人為且夫鼎龍墮小臣之泪編虎設尼父之戒賁須上興和樂示愛子之無情一何自壞禮云斯須不可去身我須我友詩範人倫智者不拔一以利世何吾子之棄彚而捐親巧賦有序孫宜巧者何傷仕之譎也遂古之初道惟一真厖厖噩噩混混冥冥時皆朴戅世罔哲霛緣渾而治循厚而行錐者就絀鞟者孰淪詭者孰褒狷者孰稱醇風肆揚本俗用成嗚呼噫嘻敦厖既分渾朴以喪雕鏤是工鎖研是仗悃欵者麾哫訾者尚正直者棄喔咿者放突梯者顯滑稽者相衆方貿貿莫知攸為僉曰倀倀罔適所之守蹇則怯徇捷則疑厥有巧夫曰識時宜掄聰揣慧啓鍵發機觸物妙見當事計施非為世縛不與道稽出則響應用則影隨斂則電伏運則風馳變則雲煙幻則蛟螭詭爭詐騁孰察所會竒蹤異態翩其可畏故若隆隆者時赫赫者位指授君造掌握朝寄低昂重輕噓吸榮悴禍福與階死生併係既大以聲亦侈厥氣勢雖灼爍我獨狷利爾其妖媱狐惑壈坎猱攀蘿依蔦附根引枝援折節降意尸心靦顔祕潛畏境暗昧當關入於左腹持彼要端矯趨偽合曲順旁干術寧缺漏智罔遺慳是故傳璣宛珠堅琨瑩璧裊蹄馴齒冰綃霧帛索咸髙價市本絶域隱購冥搜遐求淟責恪慎標題縝嚴封籍馳以腎腹約以時刻旦啓途津暮充藪澤假物奉交緣情寓識推轂汲引庶几斯策下逮侍僮㺯僕嬖媵豪兒廣為賕賄咸有賂貽稱名敬納舉號哀祈渠官某秩孰地誰司心乎愛之懷欲得之賴假調協矢兾維持片言倘辱千金不欺乃至幕客座賔周親近故茍可贊辭但能獲助鮮論同異無分今素重足伺庭多岐覔路環贄奚慳珍資畢付獻達悃忱開示臆愫稠疊表虔周詳見慕凂以先容因而媒顧若夫湛恩濡渥峻級崇班偶增一命時進一銜或當壽紀容值宴歡晨雞未聽駑馬已鞍投謁貴室整沐華冠出詞袖內捧斚筵間德頌旦奭功誇范韓爭新停駟市寵聨鵷時乎辨屨悉臻縉紳咸共發言盈庭借箸有衆利害懸招蒸黎係重有凛而斷亦微而諷正則砭礪竒斯切中聆者忤深覿焉恨痛載觀若人善藏其用順語逆探陽操隂縱舌任轉易口與彌縫又若繽紛國度膠臘帝幾權將奚撓職豈攸移彼勢之子曰豫利斯循軌者隘沿法者泥彼甘一怒我曰兩宜鶻突含糊模稜脂韋頥吹頷仰巷遇牖窺以綿厚眷以結殊知逮夫寵過災生釁深禍萃對理陳寃祼躬屬吏狡兔嗟興鴟夷革被於斯之時及門之士善自解携速為規避逺迹內踈逃嫌外議偽無半面佯寡尺幣茍免是良負心疇計嗚呼噫嘻人有爵位我則取之人有利祿我則有之彼取者何惟巧取之彼有者何惟巧有之凡此者術孰云語之凡此者儔孰任數之於戲噫嘻天地賦性醇朴章矣人曰受形厥有常矣亷潔弗馳真原固矣強梗弗撓本始復矣此謂吾能實云賊矣彼謂吾知實云拙矣於戲噫嘻茫茫大塊悠悠蒼旻吉凶原數禍福匪人左伏右見細逝巨形疇敏而逭疇慧而成我敏彼又我慧彼能於戲噫嘻衆人皇皇未值其定昊天曰明厥有成命源古稽今近述逺證窮豈盡朴達豈成競守道藏晦人逆我順􅞽險鬪譎繄成者幸君子聽之毋侈厥進燈花賦徐陽暉乍匿隂魄初生曲房暗室短架孤檠剔銀缸於獨夜爇蘭膏於深更歘吐蕚而結蕊徐擢跗而舒光閃閃以搖玉影離離而綴瓊侔寶炬之羅列讓庭燎之晶熒爾其非緑非青如珠如紺艷態芬敷冶容璀璨素瓣宵燔丹葩夕煥垂穗抽條縈枝繞幹既乍翕以還張偶將明而復暗青蓮傍火以爭開金礦在爐而鑄煆孕蓓蕾之轉鮮鬬葳㽔而愈爛若乃囊挑金粟叉綴玉蟲熠耀宵行而獨照蜻蜓拂水而雙瞳飛蛾投明以赴火浪蝶誤色而隨風不異泣鮫珠於月裏何殊剪綵勝於宫中至若席啓芙蓉尊調芍藥絲竹遞鳴履舄交錯輝掩映於晚妝熖朦朧乎翠幕綻竒卉兮芬菲絢天葩兮的爍任更籌之云殘洗杯觥而猶酌别有征夫遠塞思婦深閨為歡未罄決絶分携掩錦衾而寄慨揮羅袖而空啼雖占繇於永夕難委恨於孤棲燼伴妝而共落暈繞思而俱迷况夫志士窮經騷人授簡偏惜夜長恆愁晷短垂惟下篝含毫搦管悵年華之不留念景光而莫挽羡夜明之珠胎重含輝之琰琬豈曰嘆榮瘁於須臾實效燃藜光於日晚乍見賦徐􅎾嗟人生之轉轂兮恆一東而一西恨蹤迹之流萍兮真聚散而弗齊痛逺别兮道路邈嘆離羣兮天一涯傷人遐而室邇感會少而情暌歘不意以遭遇或無心以追隨既樂深而不殫復喜極而難持若乃曲院踈楹涼天靜夜絶過客之履聲寡髙人之軒駕落月滿乎屋梁寒雲停於草舍倏驟見兮綢繆陳酒殽兮杯斚樂傾蓋兮方新驚會面兮何乍烏鵲已飛鷫鸘猶卸至若臨邊戍客草載塞垣雲埋龍漠月照雁門遼兵朝閧牧馬夜奔顧身自恨吊影難言偶故人兮邂逅揮涕淚兮寒溫述沙場之痛楚問鄉國之田園當年鬢髮兮白復白舊日交遊兮存不存乃有五陵少年千金任俠重諾輕生執仇飲血愛趙女兮秦娥指青樓兮紫陌過狹邪之娼家遘邯鄲之賔客選絲竹兮徴歌奏笙簧兮按拍玉燭羅幃璚筵玳席行醇酎兮千巡盡歡娛兮永夕或有深閨少婦久别征夫雁稀鯉絶日居月諸秋風冷落芙蓉帳夜月空明翡翠襦愁復愁兮容色改怨復怨兮形影孤值夫君之歸輪聞門外之嘶馬涉逺道兮言旋喜從天兮而下慶再世之伉儷隔幾年之春夏嬿婉由此兮重伸别淚從今兮不灑至若永巷長門深宫凄惻紅葉傳情團扇掩泣著舞衣兮空自傷歌悲愁兮倍於邑閉椒室兮徒含情恨君王兮不相識一旦親召幸非常賜顔色得寵有時承恩無極其或才子風流髙唐夢寐朝朝暮暮雲雲雨雨二八佳人妖嬈旖旎被繡縠兮桂裳服羅紈兮繢綺廽眸轉盻芳心歘起雖夢幻之非真亦交歡之堪喜又若修真羽士拔宅飛升黃龍可御白鶴堪乘遊玉樓兮金闕踏紫府兮瑶京視人間於凡濁謁上帝於杳冥拍羣真兮嚼瓊蕊揖八公兮參雲駢欣聚首之有數幸宴樂之匪輕若夫流落羈臣長沙逺謫鵬既來棲地復卑濕一朝命下身歸故國談夜半之鬼神會至尊之前席上與下兮相親悲與喜兮交集又若文人墨客千里神交偶通姓名於逆旅或枉車駕於衡茅似磁引鐵如漆附膠又有苧羅妖妃江漢遊女逍遙水濵顧盻江汜一見兮目成相對兮魂裭既贈珮兮委心不投梭兮折齒别離倏忽遘會匪常雖日月之逾邁豈中心之能忘覺悲欣之交戰疑晤對之倉皇誰能當綢繆顧戀之際而不神爽飛揚者乎亂曰伊擾擾之浮生真如過客兮乃世路之多岐何太輻仄兮惟人生之見期詎能預必兮祗惙惙之憂心殆真如積兮憬彼迷途之茫茫益寤天地之何極餮客賦夏樹芳會稽子門下故多客客有曼衍支離而善彈壓者輒握麈希夷而笑曰子之堂有詞客有劍客有俠客有説客有章逢禮義之客所謂餮客者何居會稽子長嘯纚纚而答之曰吾聞叨者嗜財餮者嗜食餔糟餟醨風斯下矣請為子談諸客是故語詞賦則吐鳳吞龜􅀢龍繡虎藻掞天葩靈開秀圃昔人所稱咳吐落九天隨風生珠玉者非詞客乎語劍客則揚紫電淬流黃躍青萍舞含光揮斥八極天地低昂非劍客乎語遊俠則慷慨淋漓激烈瓌竒義重泰山名垂四維一死輕鴻毛而功成不受賞非俠客乎語説士則押闔權輿一縱一橫口若懸河目如矅星投足所向判若畸贏彼夫㧙跋揣摩而趨時如炙輠非説客乎若夫章逢禮義之客此吾家分內事無容贅矣抑上所稱數客者右多負俊略而宣瑰行今則托宿於此而純盜虛名猶夫日及之竊楩楠山雞之竄長離也請言餮客夫餮客者非史非曽不真不贋迹埒散儒乞墦居半態若餓鴟捷如壟斷賓未迪夫初筵鼎已嘗其一臠熊蹯未熟而食指先驚羊舌既埋而客心猶戀肥腯甫入於喉甘芳若達於面盻需雲之油油樂鴻磐之衎衎一者嗿犬􅀈􅀈逐􅀈侍􅀈容若沉若湎䭘影􅀈怨饀逃􅀈崇二者大餔飽􅀈柏𩛌示􅷩飫如逐如馳䭓銀餤鹽餼乞􅀈預三為饞口􅀢淹意􅀈撑䭚牀頡之頑之䭙僣熾􅀈登􅀈牀四則鼓腹􅀢飲䬧官叨叨𩝡遣去聲左顧右攫􅀢敦􅀈零􅀈農懴蠢爾餒士􅀈飢䬶恨餧侍􅀈飽前喁後於􅳗坎􅀈厄𠣿救飽此皆飲食之徒望門投轄以身為壑曽不知節其行趑趄伊口嚅囁蓋爼豆衣冠之所不容剎利旃陀之所不屑奚足以厠周孔之門挂詞臣之頰乎將俠客視之為烏有説客視之為土苴為蠛蠓仗劍而遊者曾不足以膏霄錬而蘸豪曹也語畢會稽子復愴悢椰榆而贈之以歌歌曰大道邈邈凃多惄飢四豪不作三河蔑如孰鳴短鋏孰曵長裾侯鯖不設壺餐莫携中人好事市惠飲􅋳雖則飲􅋳昌救枵樗已而已而今之為客者殆而於是餮客泚然汗下而機發於踵曰舍爾靈龜觀我朵頥屠門大嚼壯夫不為蓋下莫下於餮客而肸蠁醯雞之不如矣然而詞客者靡劍客者霸説客者橫俠客者邪抑亦有志者所不齒先生為世大儒其為我執牛耳而攻之我其從先生遊食簞瓢枕曲肱追詩書守固窮且絃且歌金石相從願洗滌前愆而作儒門之鼓吹乎饘於是鬻於是明文海卷二十八
