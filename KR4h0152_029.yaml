body:
  text: 明文海巻二十九餘姚黄宗羲編賦二十九居處一葯房賦王禕夫何羙人之練要兮謇脩好以為常既昭質之弗虧兮又姱節之孔彰爰托物以自表兮曰清修之是將滋幽蘭而樹蕙兮蘭為佩而蕙為纕褰薜荔以為衣兮集芙蓉以為裳既所服之孔修兮粲芬芬其文章所處欲其芳華兮又申之以葯房何斯房之結搆兮獨以葯而為之薦芳馨之菲菲兮絢繁飾以陸離文杏煥以成梁兮琢辛夷而為楣橑木蘭之差差兮棁文藻其紛披繚疏牖以杜衡兮扈素壁以江蘺桂樹欝其當軒兮隂團團而成帷􅞽百草為庭實兮肆把玩乎瓊枝襲芸編以緫緫兮縆空桑之朱絲餐繁英與落蕋兮飲沆瀣以自怡澹逍遥以容與兮聊棲遲而偃仰撫榮華之未艾兮睠兹葯以自况維葯之澤兮所以示昭質之匪飾也維葯之馨兮所以表姱節之不忒也朝夕處乎斯房兮信脩潔之不忘茍所好之絶俗兮人不知其何傷方世俗之溷濁兮糅薫蕕而莫質蕭艾蔽乎中野兮葹菉薆其盈室彼惡榝果何物兮亦雜然而充幃衆舍是而尚非兮孰於芳其能祗何美人之耿介兮乃獨為此度也夫豈傲世以自異兮亦惟好脩之故也委厥美以自棄兮固非其心之所安也使矯名而無實兮又胡若是拳拳也顧予生之侘傺兮曽靡求乎安處塊獨守此敝廬兮蓬蒿紛其環堵雖凝塵之滿席兮情晏然猶冲豫外物一無所狥兮曰惟德之為馨兾和順之中積兮致英華之外形徒潔脩以自表兮愧非予之所能既好尚有不同兮又孰揆予之中情幸美人之嬋娟兮夙與予其目成欲相仍乎斯房兮恐莫堅乎芳盟命靈氛為予筳篿兮靈氛告予以吉占日外好雖不同兮實中情之可堅聞斯語以邑欝兮恐佳期之遲暮思美人而未見兮悵盤桓而延竚將何物以結言兮恨衆芳之已萎采芳洲之杜若兮聊遺予之所思願相從而相羊兮終嵗晏以為期慮誓言之未固兮結微情以成詞詠歸亭賦王禕夫何君人之耿介兮志與俗其背馳絶紛華之外騖兮壹冲澹以自怡守忠信以佩服兮被道義之光煇豈修禊之徒事兮將聖賢以為師睠笠澤之沃野兮寔若人之所居豈藏修之無所兮有厦屋之渠渠閒田以開圃兮俯平川而結廬木參參以繞舍兮水湯湯而循除爰有亭其新搆兮謝雕薨與綺疏既琴瑟之在前兮亦左圖而右書來良朋於逺方兮聊於焉而樂娛揭亭名曰詠歸兮示聖門以為徒仰聖門之多賢兮各負材而懐器求藝能之孔多兮由剛勇而尚義彼願試於為國兮葢同科於政事赤循循以謙讓兮嘗適齊以通使彼小相之願為兮亦量能以自計迹三子之所志兮狥功名而規規何㸃爾之曠達兮獨從容以無為謂我服之既成兮屬莫春之芳期集冠者及童子兮浴沂水之戲嬉遂風凉乎舞雩兮同詠歌而乃歸唯所志之若斯兮斯脱畧乎物累弗舍己以從人兮殆春融而蟬蜕侔氣象於堯舜兮同化工乎天地宜有契於聖心兮亟嘆賞而興喟念去今踰千載兮孰此志之能承向若人之耿介兮乃感慕以作興亦見道其庶幾兮匪惟飾乎修名繼寥寥之絶響兮長詠歌於兹亭日遲遲以載陽兮雲油油以成雨鳥和鳴以在樹兮魚羣躍以在渚任衆情之變化兮嘉萬彚之樂所撫物我之各適兮肆安居而逸處彼世俗之溷陿兮囿利名為網羅衆羣趨以競進兮紛遑遑其謂何茍返求乎初服兮亦所得之已多余倀倀之無類兮誓蹈道之弗頗微若人吾誰與依兮願從游以靡他後東園賦有序朱升余既為東園賦寓言放詞自病其繁不能使人一見心快遂更為後賦石門陳君悠然見山即居之畔辟兹東園割鄉井之廣袤藂卉木之繁植於焉寄興於時言言攬遥空之雲霧俯流水之潺湲涉斯園而富失其肆貧解其攣少者愛日老者忘年超乎世網之外融乎化機之先恍不知托身乎宇内實寓目於斯園冷冷兮胸臆虚明羅萬象而灑然者也若乃美觀沓見異狀層出遽而數旃莫終其物地生其圩天施其巧人因其質制之無了軒牕翠侍樓環秀也琴書清娛堂四美也香葉欝欝栢嵗寒也佳實垂垂梅青子也花伴月圓長春亭也色蒸霞爛武陵源也香雪落盃芳且馨也嫣紅夾徑花中仙也有亭濟舟以利涉也有臺凌雲以俯臨也閑居生計所樂者善也虚櫺搜納樂得之心也一曲一景獻怪挺竒紆縈迤邐莫知所之目應接而不暇心遊漾以忘歸斯園也仙之所幻歟人之所為歟余以為方輿之景何所蔑有得而樂之非善曷守必有通神之財則可以領佳而㑹秀必有賞心之具則可以朝歌而暮酒又必有千堆錦之逸才而後可以發斯景之清幽又必有萬金産之令裔而後可以綿斯景之永久或有鳴騶之入束帛之賁果不以外之偽易内之真否耶主人才髙行直心妍貌古人悦其賢姦畏其武奮自信而出類余愛之而莫助爰周覽其東園集厥美以為賦勉菴賦楊守陳四檐白雲半壁蒼蘚誰氏之菴榜題曰勉葢赤城之老生承粉署之餘烈志屢屈於文塲心長懸於魏闕鐵硯將穿唾壺盡缺白首一經猶勉不輟勉之一辭廣矣大矣貴賤同科古今一軌乃若閭閻之子沮溺之曹業惟務本力昬作勞荷雨蓑於南陌植烟杖於東臯冰未開而畊墾水方沸而耘耨凛腰弓之欲折赫背火之恒燒積三時其不懈冀百榖之皆饒若夫梓匠輪輿築冶鳧㮚弓和六材畫繢五色各執藝以效勤或貪傭以成疾眥已闔兮强開腕垂脱兮未釋悵花桞之芳菲羡禽魚之放逸至若三槐九棘庶尹百司夙興見斗夕寢聞雞侍延英而戰汗冒九折而驅馳厭簿書之沓擾惡敲朴之驚啼思醉花於金谷將嘯月於瑶池恥功名之不立懼職業之將隳恒矻矻以終嵗敢悠悠以度時復有望重勲髙窮貴極富將逸樂之無期乃滿盈之有懼嗜紅鱗兮苦辭悦翠蛾兮却顧挺髙節於晚凋煜餘光於方暮又若五都三市萬水千山紛攘利以交易競乘危而往還唏颶風於粤海唉積雪於燕闗惟百贏之足望曽一寢之遑安若乃邊塵四驚烽火交灼三軍競馳兩陣相搏鼓礟殷兮鳴雷戈矢紛兮灑雹孰不魄禠而魂飄心摧而膽落强賈勇以鷹揚遂捐軀而虎躍收功業於垂亡獻俘纍於既縳標銅柱兮炎荒銘燕然兮朔漠茂矣哉人無往而非勉事無勉而弗成生何徐徐於本實獨汲汲於華榮盍改爾轍廽爾航發軔兮横渠張帆兮紫陽踰濓洛而迅邁望洙泗而髙翔朝蠠沒其無已夕燕娛其未遑景孳孳之伯禹企亹亹之文王茹仁義為玉食服道徳為金章庶垂名於不朽同天地之悠長已有園賦魯鐸粤昔余有兹園兮首宦途而違棄中罹疾而獲請兮逮蕪穢而復治曏幽人之過我兮謂兹豈應於無名名余園曰已有兮矢終老而依憑繄池臺之微具兮列香芰以為區惟卉木之整華兮紛色異而氣殊既素積以皜夜兮亦朱殷而赭曙或步屧乎其中兮或席䕃於其下寘名蘤而為塢兮天寔縱夫落花惟譜牒之有稽兮悉吾園以為家嘉樹沃其成列兮夫豈獨善夫橘柚果實茍宜於土性兮皆新登而時輳挹池泉以灌余蔬兮薙蕪翳而蒔芳草攬芙蓉於清波兮閱潜魚之在藻沿輕舟於罄渚兮艤鳬洲之草堂據紅雪午隂之磯兮信釣縷以相羊取憇㺯之夷猶兮撫楸枰而識異薦鳴琴於石几兮按古調以自懌田父相求於松䕃兮話桑麻之有養吾令荆布任莒兮葅松葵而就餉神魂知由所稔兮夢翰苑與成均豈忘情於堯舜之從兮身羸憊而無因心營營以謀報兮將逺事乎芹曝願閭閻之相與戮力兮還唐虞之舊俗朝余纕九畹之蘭兮夕紉夫湘之蕙茝茍衆服之屑余同兮勞采擷其奚懈余陟夢野之臺兮望辰極乎帝鄉扄大椿之洞兮忽塵宇之相忘安余分之遇兮求余心之所好茍沒世其有稱兮奚外身而有校松栢森其蒙欝兮筠篁比而若櫛衞檻䦨以東下兮狥坡陀而周折查篠出而曠虚兮臨明池之可鑑儼山林之盡歴兮獲江湖之泛泛取于城市之墟兮亦殊無而僅有惟余心之所㑹兮擬咫尺於千里時鼓枻於清漣兮騰羣魚之待餉睨痺鷇之安巢兮鳴禽競而捋子江梅侈夫朱英兮皎安榴之素蕚旦月桂之長春兮倐舜華之間落坐碧梧之真隂兮隕佳粒於巾舄披藂桂而襲芬兮服冠裳其無斁豫章勃焉峻達兮勢兹務於干霄杉檜櫨橘枝相樛兮若求友於後凋善飛潜之得時兮悦草木之向榮遭聖哲之在上兮宜萬類之咸成惟中林之宜夏兮逃大暑而迅免夫何霽夜之棹遊兮適非遐而若逺念煙霄之朋舊兮𣺌遥濶其難即眷林丘之親故兮繼靳暮而相及人生恒亦有涯兮嗟世事之莫塵往者幸於免咎兮來者可委於余分亂曰謂余衣之既渝製芰荷而重成兮謂余嵗之可卒資杞菊之充盈兮冀形逸而神閒余兹頼以永齡兮茍松喬之不予誣從玉軑以廽凌兮嵗寒軒賦陳璉猗歟美哉嵗寒之為軒也去戎衞而匪遥隣公廨之伊邇峻宇臨街崇基猶砥文牕洞開逺見百里雖創闕之髙明較於制而靡侈每肆遐矚足暢幽情羣山獻秀或蒼或青竒形異狀不可得而名惟松與栢近乎簷楹根蟠厚地樹䕃空庭於是外設緗簾内施棐几爐鑄博山劍懸秋水蓄鄴侯之書講郤縠之禮延賦詠之鴻儒逺酣歌之妖妓凡古今之名物亦無求而弗備想夫軒居整飭松栢蕭森陽烏轉影緑雲布隂苔錦滿地市塵不侵巢遼海之孤鶴來炎州之珍禽度清風於萬􅊤激鳴籟於喬林於斯時也正宜投壺雅歌擊節長吟或鼓曽㸃之瑟或操伯牙之琴神境適愜萬慮消沉然則此皆尋常之樂未足以表嵗寒之心也至若萬木號寒窮隂閉塞臘雪飛璚山川改色郊野斷樵牧之踪江湖絶禽鳥之跡百卉以之而摧殘萬彚以之而變易惟松栢之森然翠盈盈而欲滴於斯時也寄傲軒中或倚或徙醉飛觴而飲羊羔坐清談而揮麈尾效斯立之吟哦慕田鸞之服餌因有感於流光復細推於物理何草木之易零惟松栢之獨美想其為物也受正氣於天地禀精華於隂陽故能挺生竒貭異乎衆芳排九霄之風雲傲嚴冬之雪霜恬晚節以自髙期有用於明堂豈聖人嘗取以比君子之德而君子亦假嵗寒名軒以徜徉者耶誶曰嚴冬届兮萬物閉兮雪霰紛紛山川寂寥兮俯仰六合浩無垠兮維兹嘉植節操貞堅兮共守嵗寒以盤桓兮明文海巻二十九
