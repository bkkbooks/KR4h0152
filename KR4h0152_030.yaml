body:
  text: 明文海卷三十餘姚黃宗羲編賦三十居處二山居賦有序李裕辛丑之冬十月乙邜是日天宇瑩淨朝暾曈曨明霞絢綵於平林晨雞亂號於鄰屋豫乃命僕夙駕整衣就車渡鄭溪之瀎㴽踰文岡之﨑嶇過􅀈塘之仁里訪故人之山居於時山明野􅯛風清日溫主人歡迎童稚候門延豫入室坐以氍毹鼎爇檀箋地席籧篨奉匜進悅者蹌蹌躋躋操巵執觚者周旋進趨獻我以大宛之葡萄飲我以顧渚之紫筍豆實南海金虀之鱠杯分東坡玉糝之羮醢箈葅之是將糗餌粉餈之送進山肴野䔩靡不備具酬酢既畢豫亦醉焉乃與主人退坐於庭軒之下乘鮮颷之飂􅀈覩白雲之悠悠白鶴飛舞鳥鳴嘲啾遂使豫懷抱頓豁神思飄逍乃喟然嘆曰僻哉幽哉真隱者之居也故為賦之隱者為誰故人范君至祥也其辭曰夫何一佳士兮獨煢煢而寡儔蹈先哲之軌轍兮寄書圃以遨遊絶紛華以潔內兮惟德業乎好修匪仁宅而弗居兮匪義路而弗由懷良玉之璀璨兮被美服之陸離紉芳蘭以為佩兮又纗之以江蘺假髙衢以騁力兮何遭際之不時譬濟渡而無航兮心惝恍而猶疑抨巫咸以兆禎兮蓍飛遁以為吉遂隱曜而􅌢幽兮求黃綺以為匹厭囂氛之淟涊兮意翩翩乎逺徂擇山水佳麗之地兮葺茅茨以為廬背珠峯之千仭兮面膏壤之百區道林􅀈屼而西峙兮超嶺嶻嶭而東趨纒縈迂之小徑兮挾潎洌之清渠閴庭軒之明敞兮素窗楹而不艧闢間田以開圃兮插木槿以為籬落既琴瑟之在壁兮又圖書之盈閣森長松古檜於逺阜兮鬱華楓翠柏於前岡蔭楸梧緣舍以凝緑兮間槐楊被路以搖黃含丹芍藥襲紫薔薇爭妍而獻秀兮忘憂之萱愈疾之菊挺生而薦芳茂蕙芷芃芃以繞砌兮崇蘅藒馥馥以當窗若乃橙橘蒙金梅奈曜白丹杏朱櫻兮羅生石榴胡桃兮亟列大谷之梨烏椑之柿飛英而同榮弱枝之棗房陵之李騰實而甲宅茖藿含滋兮葑荽流澤豐茙連花兮薤韭代殖菘芥帶露而暢茂兮蕓藜沾雨而肥茁瓜匏緣隂以延蔓兮葵藿傾陽而可摘况夫蠶桑動而翎闕始降農務興而鷤鵙有聲鷦鷯鴝鵒兮棲深叢而嘲嘲哳哳鶬鶊杜宇兮轉髙樹而喈喈嚶嚶巨石奰而磈礧兮繜甝而虓嘯深谷谽谺而窈窕兮藏猿猱之哀鳴洞雲出岫兮影悠揚而點綴溪流激石兮勢滂湃而砰訇類終南之深僻兮宛豹林之闕曠同子真之髙致兮有稚圭之氣象絶㕓間之嘲􅀈兮超域中之塵坱擷羣芳以玩蕤兮倒接籬而曵杖追樵牧以抱犢兮醉鄰翁而擊盎暫棲遲以養天真兮聊相羊以釋情恍而又系之以歌曰春陽煦兮山花馥夏風暢兮山樹緑涼月皎兮山鳥號朔霰飛兮山峰秃山居山居真僻哉四面無鄰秪深竹池有魚兮塒有雞圃有蔬兮廪有粟朝犁鋤兮暮經書酒一瓢兮棊一局俯首石兮盝清流坐明月兮賦新曲放情物外總無羈世事紛紜任榮辱竹溝泉賦楊循吉時雨晝零至夜不休集我屋上仰瓦承流乃所積之既多遂衝奔於竹溝爰有筠管立於其下中節既去洞乎空者溝唇來接其水倒瀉鏜鏜竒響相擊而鳴應空答韻如谷中之聲觀其滴瀝傾注九止一作譬銅盆之在地而墮淙之投落楊子讀書既困安就床簀目合神定泉聲時得若雅樂之作自有奏節忽寤而知又寐而失以為彈絲品竹敲金擊石千吕萬律皆出人力然又非貴介公子莫得而常接也而此泉聲特借於雨其音自然若虛堂築杵乍歇乍有錚乎答語又復助以嘈雜之細韻集階除而戰簷廡蓋貧居之士可以寄聼於厭沃焉不必解衣輟食呼工召伶而為一日歡樂之舉也楊子於是心納耳受怡然自適起而賦之書之於策淳菴賦李承箕太虛之惟一兮曠乎其混茫其來無體兮其去無方故無始於存兮亦何終於亡風雷以變動兮日月以為明鬼神以屈伸兮寒暑以更相物萬回薄兮曰惟其常所謂伊人兮空悵望而難見釋宇宙同大通兮亦何有於關鍵山河惟形兮春風惟面雲霓惟衣兮風月惟緣裳集落葉兮隕籜其辨酥芳華以朝渴兮月以夕咽枕絶壑流兮雲根為薦古今兮蜂紛而蟻爭死生兮浮雲而過電一視兮無榮枯夷屹兮胡利便魚兔得兮忘筌蹄鋪張墳素兮棄紛華之箋傳抱甕兮無機真珉兮何瑑鳬短兮鶴長木雞兮何變紛渾元其忽恍兮俯千春而浩歎因事物以隨變兮形既妄而影誕噓萬竅不足激乾坤兮墜終古於虛幻慨前路之悠悠兮一寄身於鵬鷃若乃軒輊於進熟兮齒修齊而獻粲落日迷丹唇暖兮七盤妍迹其雲散鄭紫衛紅浮而艷兮棄霓裳於萎爛雕輪畫轂兮渾堅其盡鏟翠羽纎揚兮緑波射意而爛瀾圓丘瓶罌而登薦兮彛尊龍杓其誰盻循荆棘之狹斜兮舍周行之坦坦厭麒麟之仁軌兮闕於闕之翰仰冥冥於無際兮况沙蟲其何但我思古人兮無方我見古貌兮胡僎登樓賦有序桑悅學舍中有小樓豫名之曰乾坤一寄時登覽以寄遐情豫懼兹樓之易毁也爰作賦以傳不朽云豫少期摶於九萬􅵵薄風而禔禔占師儒之末席抱圓材而應規然戚戚興戀主之念悄悄動懷親之悲幸兹樓之髙明跳虛空而自怡曷消遣乎世慮揖雲霞而賦詩一滚説下未生波濤恨市㕓之伊邇乏蕩目之崛竒貶樓之乏偉觀此第一假意然開窗延四海之明月啓户納八方之涼颸匪堯夫之傑閣饒廣大之若斯取古今大家景象以為樓之所有蓋救所貶之詞曰堯夫之傑閣則樓又非所登之樓矣文章能虛處取用方能入神此第二段意年時遊乎南康此以下又别生議論如連山絡嶺雖不相接而骨脈如一見樵於匡廬之顛釣於彭蠡之湄者意甚歆焉然察其轢芳洲之宿莽伐空谷之桂枝形蠢蠢而意嗤嗤則又安知水石之多姿信造化之光景為吾輩而設施前因言樓之乏佳景至此又言非其人雖得佳景亦不知好矣此第三假意兹樓雖限吾之偉觀不限吾之遐思此又出一竒從心上説去登臨之際試心存乎瀟湘洞庭雁蕩峨眉反視霛府之耽耽覺水繞而山圍儼環樓之多景兮供吟眺於不資此言環樓皆市㕓惟胸藏丘壑則乂皆化為佳景矣又非無蕩耳目之崛竒也此第四假意彼登嶽陽與黃鶴者心又或繫於災畬見塵外之草木兮化禾黍之菲菲併人樓而相凖兮造化又焉肯以彼而易兹因上文言胸藏丘壑則市㕓皆化為佳景此又言主非人則佳景反化為塵俗矣此第五假意嗚呼噫嘻此以下平收拾到樓上乾坤浩浩熟吾一炊明日之事隂晴未期泛飄飄之萍梗兮寓兹樓而幾時惟修道德為梁棟兮吐文章為桷榱庶樓名之羽化兮不成敗於氣機黃金臺賦桑悅嗟豫生之好遊兮擬放浪乎九垓入燕都而暫憩兮逝將去而徘徊寄身世於一哂兮獨眷戀乎茲臺胡置金之故地兮積千古之塵埃悵遺址之莽莽兮愁鬱結而未開有地硜硜兮獨不産乎蒿萊鳥將下而躑躅兮雲欲度而邅廽觀雲鳥之敬護兮識真址之所在叶才昔昭王之初政兮受強齊之控扼勢有輕而可助兮力有寡而可益侵雲漢而築臺兮招竒賢以為國置千金於臺端兮心貫金而赤色拜郭隗以為師兮忽毅辛之繼迹士不輕於一感兮感精誠以來格走湣王於臨淄兮重揚威於莒墨雪先王之遺恥兮成霸強之偉績匪吾前身之故巢兮胡念此而不忍釋也重遺址而莫踐兮念昭王之貴德也風蕭蕭而吹衣兮雲隂隂以將莫乘返照以旋歸兮神愴恍乎中路顧所乘之駘駑兮越臺前而縱步使瀏瀏之竒姿兮騫將行而淚墮嗚呼噫嘻沉英鏟光匪士之祥簡才棄能乃國之殃屈原悲憤以投湘祖逖慷慨以渡江困賈誼於長沙竄李白於夜郎寄遊魂之無地兮或兹臺以徜徉易水為酒兮碣石為觴招諸賢兮共酌昭王天與久兮地與長臺肉可朽兮臺骨不亡明文海卷三十
