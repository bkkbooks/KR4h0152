body:
  text: 明文海卷三十一餘姚黃宗羲編賦三十一居處三逍遙園賦有序穆文熙余舍東有園一區帶城下自為儒時與拱辰石君分席共業為鉛硯之所後相繼登第去比余既解考功郎歸稍稍作地館壘山石裒集詞翰日棲遲其間乃未幾而拱辰倦於太僕亦謝病歸歸則無日不晤於此晤則習於幽事而委命順理怡情養性庶幾有逍遙之風余因據莊生逍遙篇為賦紀之拱辰覽之謂與樂志論唐子西語相輊軒也遂刻置臺端其辭曰伊豫性之好僻兮開别圃於城隅築垣墻以周衛兮誅白茅以為廬蒔花竹以匝徑兮種菱芰以盈池懸桔橰於金井兮時自挽而灌蔬招隱以名吾洞雲鶴以號吾堂臺則有讀書遲鴻東山俯溪皆環列槐桞有雲樹之蒼茫亭則有牡丹芰荷松蘿止觀悉斜帶清溪儼山家之行藏時其條風布暖紅藥繽紛朱明協候緑葉垂雲秋至而籬菊葳㽔冬至而簷梅郁芬景緣時至興隨賞殷爾其偕我良朋契若蘭薰鶡冠草履褐衣苧襟相與臨花塢步芳亭撫白日玩青冥觀鯈魚聽鳥鳴數飛花搴落英㺯池水蕩浮萍指點竒石較計隂明雲霞團座鷗鳥不驚而或投博賭勝角奕取贏縱歌層臺蹴踘廣廷鳴琴深洞放鶴髙城已而偃息臺端何慮何營酒泛緑醅飯煮青精時復有墨客琴士畫史騷流詩談白雪圖擬丹丘譜探飛龍帖抹蒼虯日有文事之起豫了無俗務之交酬時燕坐兮箕踞長嘯兮科頭羲和兮御頓玄兔兮影留蘧蘧兮蝶夢擾擾兮浮漚方來兮隨分既往兮堪羞若夫五嶽三江勝地無垠梁苑金谷樂事紛紜金張之家炙手可熱許史之門吐氣成雲子雲著書而諛莽相如作賦而得金稷下梟鳴而千人辨折座間麈動而百夫生欣古非不有吾非不聞苐以靜躁不同趨舍有方或圖南以廣運或蚊睫以自藏茍所志之得適雖微渺其何妨吾故遵南華之遺訓於以逍遙乎此鄉於是拱辰聞之踴躍歌曰邈天地兮蘧廬紛世事兮風嶼紉幽蘭兮吾黨撫桂樹兮城隅誓從子兮逍遙安所問兮盈虛歌既余復為之亂曰惟余之志子與侔兮惟余之園子與遊兮園有水澤被芙蓉兮園有碣石鬱虬龍兮火山焚不能為之爇層崖氷不能為之裂返巨雀於條枝脫蒼鷹於縶紲與子共逍遙於一世尚期不愧於往哲藥市賦楊慎蓬丘山伯匕刀圭而通神奈園老宿品千二而稱珍何如蓉城之日重開藥市之春若夫岐摯湯液和緩瀡滫采嘉林之嘉草掇芳洲之芳羞屏風水發書帶山抽人參三丫來自髙句麗之國桃枝九折出於嶲昆明之陬椒聊下虛星之舍果窳薦織女之樓逢茅龍之衛叔遇木羊之葛由檢本草之聖録極山海之冥搜别有天棘日精澤葵海藻火林之蔚炎柯雪津之擢陽草欵冬叩冰而吐葩葶藶迎露而先稿青綸碧組蒼龍就食於甲辰素茵皓蔯白兔騰仙於辛卯帝休鬼蕩邪而觸憂神錦仙鹽駐顔而難老又不若剸犀截角搴翠刪毛澄禺山之水碧􅨢樊桐之金膏鮫人泣珠而酬價狼䐠嗅金而解櫜神鹿兩頭飲上池之水靈鳥四翼歸金匱之韜莫不攀丹危而陟翠險霄仙的而下神囂涉渺渺馳蘋蘋刈翹翹伐丁丁香草比於君子嘉卉方於女貞藤名簡子花號長卿五芝色配乎五嶽六飲芳冠乎六清乃延巫彭招長桑飛綘雪搗玄霜巴戎赤斧梓谷王昌蓬州塗定辭玄武張開光希夷出崇龕之落真多栖葛璝之鄉黃足之鳥呼季玉而並復朱頂之鶴名令威而駢翔負局磨鏡之翁篐桶講易之叟扶龜床於行阿策鳩杖於林藪嚴遵之芳乳平分王烈之香膏共剖是月也江波錦落火井星還楓瑟瑟而鳴籟菊英英而綴斑訪名迹於古昔啓藥市於重關被開明廣都之野帶杜宇天隳之山哀危蟪於寸隂矜局竈於井谷布濩天府之區蔓衍坤維之域八萬四千之人煙五十四州之謡俗國無夜户之虞人有春臺之燠郤公程鄭之倫驥子魚文之服乍發劑以針龍奄飛符而擒蜮黃耉背鮐蒼崽髫蝸行歌擊壤羣嬉聚沙成行鴈鴈學語鴉鴉毛姬餌葉鳯子藏花色輝九壁之錦光漾百潭之霞採思婦之卷耳折放臣之疏麻息風枝之不靜起露蓼之含嗟崔公之錦云逺華陀之囊已遐既富矣韓康之肆寧蘄乎博望之槎楊雄夢腸頓醒滯思於雕篆相如消渴歘涓沉疴於齒牙豈知西皓之盤露北方之河車哉有林閭翁孺者起而為系曰黃能兮休入寢朱熊兮罷窺屏永遁兮二竪載殱兮九嬰分菊潭兮艷艷宴蓉城兮冥冥鴻安丘繼而作曰安期神樓散扁鵲陷冰丸銀筒昔誰藴金瓶今子殫謝驚飍兮駐流電訪大藥兮浴還丹邀籛偓兮雀躍共喬松兮鯢桓主人聞之欣然稱蔅修容麗級獻壽升筵敬緝光誦奉以周旋羅蔭堂賦許相卿矗雲峰之亢峙眇玉湖之澄涵孤城值其秀爽而隱居卜於其間菅茅上覆泥堵周環恆雨暘之淋炙缺苫蓋於東南主人仰屋太息曰狡兔三窟鷦鷯一枝咸克禦外侮而圖寧居矧吾將幹前蠱燕後昆顧無所庇吾廬乎爰躊躇其搆思又般礴以殫慮𠂻若天啓謀與神會繄樛木之長蘿方下縈而上延彼徒贅於有餘我則病夫不完爾乃解自樹杪援之簷端補此罅隙紓彼紏纒意祖少陵之詠巧奪媧皇之權老幹繫諸撓棟密蔓勻於疏椽柔枝盤旋以重復修條縷絡而夤緣初蕭森兮扶疏久蒙密兮隂沉旁翳薈兮紛敷上盤結兮雍閼逺睇兮矯龍首而騫鳯翼迫視兮儼黃琮之間蒼玉春薦芳蕊可方杞菊夏布清隂弗讓修竹冬雪積而玉蛟結蟠秋風振而冰絃斷續晨則雲表之露下零宵而書檠之焰上燭殆造化有意育兹堂之秀滌世氛之俗者也客有造堂下而進説曰上棟下宇中右盛制子獨矯情因陋仍廢夫瑣瑣數椽革而創之曽不費子下筯之需潤筆之賄也主人囅然而笑適然而興顧謂客曰昔常議斯役矣圖厥新恐彰先陋而競俗侈葺以故懼蹈前愆而貽後纍又嘗博觀今昔之變矣耽耽巨厦巍巍崇宫拔地千尺在天半空計其壯麗悠永將與金石者同亡何勢窮理復化為塵蒙而已矣而此堂特借蘿以補茆任造化之經營役隂陽以刻雕潛德培其本餘澤潤其標吾聚族處於中也寒露不吾凄赫日不吾驕雷電不吾震撼風雨不吾飄颻容與委蛇其樂陶陶矧其易故增新我財不靡巧搆密架人力不勞惟歷嵗之愈久則維持之益牢蓋造物者輟其功則斯堂方就圮也而子得無以吾論為過髙乎方將結陋巷為芳鄰追巢居於太古味道德之腴狎詩酒之侣摽俗子而出諸户髙臥濶視藐富兒之土木齪齪鼠壤蟻垤無足數也言未既客謝曰命之矣逡巡而退居然亭賦并序陳鶴夫刻桷之室未足娛心塗金之居聊以適目若以臨虛取悅矚逺抽思倚薇風以送歌抱松雲而舒笑則九華三章無以肆其觀含芳永光但以章其麗契道之士斯何取焉西淙洪公録浙參事身逐塵軒而心留霞谷蓮船載月長為湖上之賓珠履乘煙幾作山中之客偶於淨慈沙門傍求寶域乃得翠壁玄隚環襟川麓搆亭循性目曰居然蓋意取朱詞情方鄭隱徹牘之頃則散屨摛詞集爼之辰則聨裾協樂詞不任僻樂不忘憂誠希代之宏才擅古之通人也鶴耽幽成癖致曠遺生爰涉芳亭頓空氛想遂營蕪語用記名區賦曰惟人統極含采潛靈居仁作靜縱化通冥交譁即昧接逸若醒乃有佇情丘壑結意園林聨芳襟於安石踐幽蹤於管寧寄丈人以怡志托傲吏而遺形俯蘭洲以命記緣蜀嶺而著經是皆臨物以取適亦因勝而流馨爰瞻斯宇業業停停前控西湖後帶南屛六橋遞碧雙峯送青盤坤方之寶軸依營室之華星列垂雲以為户羅修檟以為櫺草入簾而舒緑泉穿幕而呈泠蓮奪花以長麗薔移春而不零蘭香散麝松濤震霆蕨被九畹樅薄三冥捋椒實以袪穢采精苖以引齡矯覿雲翰俯玩沙禽薨薨軫軫雍噰嚶嚶霄鳶較翎於鸋鴂洲雎叶和於􅜇鴒鶅晝奮鵧鷑宵鳴彩鷽巡簷而覬客玄鶴繞砌而隨人復有白􅘻黑虪蒼鼬黃􅍪貒卉歙而據穴獮猴蚴蟉而經林麋擇邃以陸梁貙居曠以橫行仰見飛崖蹎巘崒屼嶔崟縈廽九曲積疊千層俯觀靈巖秀洞崿然天成崎礒碉砫􅑬嵼嶺營含輝流采雕玉鏤金若玄宫之四起猶青蓮而長生晴則泰風西至旭日東升萬象在望皎然以興雨則蘇隄走霾葛嶺出雲星日蔽耀雷峯避形梯萬松而莫上指三竺而無憑若夫東引青波南望錢塘西通虎跑北揖初暘矚劔門之桃花羡孤山之草堂縱四顧之無極達一嘯於蒼茫時或取魚為爼采䔩為豆卣坎齊陳灑離交奏於是集賔僚敘故舊踄飛巒啓重牖車馬喧闐雕璫擊輳延賞良辰盤桓芳晝飲不執禮樂不偕時或酣而傞或奔而嗤或倚或坐衣冠參差有凌虛以娛志有探幽而怡思有倒幘以調歌有臨流而賦詩投壺博簺藏鈎圍棊雍容上下命爵傳巵呼五白於一擲決百戰於斯須頺然而臥蒙然而迷曽不知天地之為廣與日月之有推移雖古荆臺之遊雲􅀢之馳會稽探禹濠梁觀魚樂則樂矣亦不能旦夕而有焉若乃公驂暫駐案牘輟書遊駢罷騁亭月長虗嗟往來之不常任去住而自如激流泉以濯纓乘飄風而振裾拱北極而思君念西淙而懷廬道援周孔文述劉徐進抗匡衡之疏退驅李耳之車馭萬化以容與翔千仭而躊蹰人知斯亭孰識其居人知斯樂詎知其餘斯則公之泉石也而非賔客所能與哉嶽陽樓賦并序李濓丁丑之秋余客巴陵郡守黃侯巽設宴於嶽陽樓酒既酣侯洗觥揖豫曰古今達人勝士登遊留詠者多矣顧皆五七言近體而未有賦若有待於公也余固辭不獲乃倚檻延佇援筆立就酣墨潦草情景罔盡曷敢當衆賔之一噱乎巍乎巨哉斯樓之為勝也枕巴山面洞庭俯黿鼉瞰川靈卑九霄隘八紘應翼軫於咫尺接衡巫而與平波濤撼之而不動君山對之而為屏曩余閲圖經而向慕今始艤舟而一登翩逸思之浩發欲跨鶴而上升曰登髙而作賦非賤子之所能且夫豫章滕閣九江庾樓黃鶴奠諸鄂渚疊嶂峙於宣州皆天下之雄構詎斯樓之可侔極百仭之孤髙肆萬言而難述聊憑欄以縱觀忽變態之層出合青草湖名與雲夢滙洞庭而為一倐朝暉而夕隂漭沃天而浴日突中流之青螺乃有如乎黛髻眺黃陵之遺宫望瀟湘之遙煙鴈嗷嗷以南度鷗娟娟而暮還吊皇英之二妃泣碧川之潺湲帝蒼梧而不返留叢筠之淚斑憶牧羊之蛾眉寄龍宫之尺牘擊橘樹而啓扉露紅粧而駭曯誦髙唐之麗篇歌湘靈之妙曲凄楚調於行雲鏗瑟音於佩玉杳魂夢之徒勞何大雅之能續事荒誕而靡經非君子之攸録韙范公之名言謂江湖與廊廟矢體國以忘家故先憂而後樂叶倘登樓而念兹庶有警於不肖客巴陵而訪竒睇飛甍以舉觴仰希文之清風猗山髙而水長嗟滕君其溘逝垂善譽於湖湘樓以文而增勝文以樓而益彰欽先民之懿則眷君民而弗忘采渚蘋以薦潔擷汀芷而懷芳指九淵以為正雖留滯其何傷諗登臨之志士寧無感於嶽陽玉屏山居賦俞文夫何嵬嶷巋嶻而寡麗兮挺孤秀於平臯璠玗琪之熛炳以遺照兮聳修屛而建標面文嶺之峍屼兮帶二溪之淪坳二溪文溪武溪森蘙薈之菁蔥兮掩霞芬而上交託荆豫以曜質兮應斗極以示兆固缺紀於長篇兮亦抗竒於近郊伊濬哲之攸止兮肆編菼而搴茅葺芳槿於扶援兮羅穹崖於軒橑豈取路於華閫兮每收聽於林巢陋區中之委曲兮獨延覽以逍遙山盤盓以錯崎兮象濆淪之涌濤倐氛嵐之靉靅兮羌近失乎岑嶅泉濛濛其飄灑兮鬱翠霧於曽霄鳥歡鳴而啅枝兮猿凄吟而擁條送流月於秋渚兮覿升陽於春翹乍容與而休精兮佇惠風以自陶頥沖志於典墳兮滌煩想於喧囂潄乳竇之積液兮咀瓊芝以為膏循四序以為則兮混萬族而不恌固忘己而自適兮匪違人而后髙匡匡智貞觀中至廬山遇異人曰此隂山也不如王山遂詣王山果得道焉别谷而遙興兮度盧度隱居三顧山偃蹇於巖椒應真唐武德間僧道信飛錫結庵於潮山通天巖飛錫而泠泠兮瑶晉永嘉中有王子瑶者修煉於王山滅景於寥寥茍涉無而反經兮固徇有者之所嘲諒伊人之濬哲兮遵中和之所操求昔士之所迷兮咸永逝於重幽泯心迹而齊同兮選自然之至要聊援翰而宣詞兮庶揚㽔而靡雕卜居賦徐應雷登髙岡以四顧兮何域中而非吾土慨濁世之塵勞兮曽不可與偕處願長往而獨立兮身飄颻其輕舉念婚嫁之未畢兮返余步而延佇雖浮湛金馬之門兮實厭承明之廬京塵堀堁而襲人兮素絲荏苒而涅如嬰沈痼而弗瘳兮抱慰睯而弗舒陟吳山巔臨長洲兮芳草摧而菹如干旌絡繹而在郊兮日莫憧憧而不虛黃鵠離哉其不可追兮絶四海而遵渚晝一瞚而夢無涯兮放志意以自娛神惝恍而上升兮捫青天以摘白榆帝髙凥而覗聽下兮雲氣晧􅀈而曵婁罡風烈烈吹我寒兮肉身恇怯而不可凥涉流沙以濟白水兮察昆崘縣圃之有無三老贈我以一丸兮再拜欲餐而躊躇騙其東而峨眉兮歷棧道之﨑嶇五嶽芝菌其萎兮有癯者過而不取投長竿於東海之外兮珊瑚叢蔓而不可漁六鼇戴三山而下上兮颶母噴騰震蕩而不可廬秉禮樂以行化逺陬兮又不禁僸佅兜離互作而烏烏雖達人無適而不可兮吾不能遽忘桑梓之墟去去不忍逺兮嵗時往返而遊衍挹長公之髙芬兮種橘千棵剡棘為栫青黃雜糅而文章兮犯嚴霜朔吹而逾爛創穹亭於樹杪兮標楚頌而得所願耽寂寥而私自憐兮誰與共此燕燕造物之與遊兮漁樵之與伴探洞壑之窅冥􅌄窱兮出而憩磐石之矸矸澗瀨雨歇而淙淙兮山寺鐘鳴而投一飯野人勞余以紅友兮浮太白而無算參太育而習靜兮采芙蓉於天半恭承孔聖之祐貺兮既霍然而病己又申錫之以麒麟兮徼福施於孫子􅡒名香以滌慮兮潄寒泉而叩齒采茶及其旗鎗兮白瓷瀹之瀰瀰遂初衣而薜荔兮雜蘭蕙與蓀茝願隨毛萇以探張公兮及林屋而餐石髓登縹眇而御長風兮七十二峯白雲莽莽而不止於是返而宴坐日月曠朗酒至自斟詩成自賞間有幽人兮如清風颯然而至歎曰先生五湖長也明文海卷三十一
