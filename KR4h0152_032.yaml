body:
  text: 明文海卷三十二餘姚黃宗羲編賦三十二居處四太白樓賦有序陶允宜萬厯元祀嵗在癸酉會稽山人將再上於春官乃與胡先生何文學者同舟而北九月九日遲於濟上登太白之樓山人慨然而歎先生文學曰吾子之歎蓋嘆魯也山人曰樓以太白何更魯為二客曰吾聞登髙作賦盍賦之山人曰唯唯惟重陽之佳節兮想龍山之舊遊乃舍舟而就陸兮囊茱萸以消愁厯三橋之屈曲兮步大白之髙樓披雲日之蒙翳兮據天壤之上遊奠疆域於徐兖兮應列宿於奎婁背渤澥之巨浸兮面泰岱之崇丘惟東嶽之截􅑖兮映帝闕而紛糾麓蜿蜒而斷續兮水委蛇而迸流闢岡壟而原陸兮表任城之名州總輿圖之棊置兮羌特拔其無儔矧兹樓之鼎建兮擁睥睨之上頭超靈光之𡻭嶵兮聳嶽雲之飛浮對大庭之雄庫兮入玉虛之凄颼嗟往者之不作兮胡斯名之久留於是先生目余而問曰甚矣夫魯國之多材也蓋聞羲皇晝封自彼魚臺軒轅夀陵石象崔嵬少昊宅其東畔陶唐祠其西隈漢皇受命而璇壇秦皇頌德以珉碑此帝皇之極盛咸璀璨於常彛次之則有伯禽疏封僖公獻馘郯子紀官衛侯徙國梁孝躡蹻於棲霞魯共拓基於故壁此侯王之己事亦照耀於方册其人則有展禽和惠叔孫禮儀韋賢燕翼疏廣知幾黃石方平起仙靈而爭竒內吉魏相握鼎鼐而聲蜚其豪俠則有陶朱别業孟嘗遺署射戟賈溫侯之勇鬬雞奮季郈之距蔣生緣開徑以養髙朱雲因折檻而起譽彼千載之名流蓋宇內之人傑何影響之悠悠獨李君之烈烈言未竟文學起立獵纓而前曰先生之旨謬矣夫功業之於文章果孰暫而孰久矧冨貴於一時視吾身於何有若帝王之餘蹤與賢聖之陳迹六音倐以無聲五采黯以無色獨篇章之為用比雲漢之昭回躁者遇之心懌怒者覽之顔開遡風雅於三百迄漢季而中衰恣六朝之綺靡逝頽波之莫回逮武德與貞觀生氣絶而復蘇自匡山之崛起揮逺駕以長驅挾風霆之怪鑠召神物以慿扶爛筆端之蜀錦吐頷下之驪珠走一介之布衣奪赤幟於中原搜大澤於雲夢鼓長流於荆樊擬東山之安石號太華之青蓮入江淮而容與探齊魯而流連繄四明之狂客主當代之玄言忽傾蓋其若素締分誼於諸昆當其登斯樓也吐吞滄海笑傲乾坤弄初陽於日觀拉真人於天門挽長虹而為帶呼明月而可捫偕浮丘與安期將稅駕於崑崙視碻磝與大沫羅几席之兒孫於是撫劒談詩對酒論文詞髙白雪氣薄秋雲策黎眉於絶境黎眉見公詩拜堯祠於南濆弔石人之長跽覽歌舞之繽紛咏半月之崇臺揚陶公之芳聞勒貞碑於廳事記風俗之沄沄已上皆公任城事將翺翔於物表豈齷齪於人羣爾乃單騎入都明皇召見中夜披衣詰朝賜宴踏花蕚之危梯醉芙蓉之别殿鼻齁齁其如雷目閃閃而為電忽奉制於俄頃馳詞鋒於百戰決江河其不停紛綵色其相絢力士為之更衣太真為之捧硯天子神驚宫人色變分寶炬之華輝歸金鑾之深院爾時廄臣御馬大官進饌五侯執鞭七貴捧罥爭趨候其中涓或十日而不面獨賀監之深知尤故人之戀戀於是鳬繹改觀東蒙生色汶濟洋洋徂徠奕奕惟兹樓之寵光逈千門其疇匹悼古昔之塵埃如溝中之餘瘠子胡舍其長而競其短知其白而守其黑也先生憮然目瞚面赤欲發一詞噤未得出山人恐文學之矜而先生之屈也徐而應曰子謂樓之得名於白耶抑知白之獨名於樓也夫景星之芒孰與夫日月之光世主之褒揚孰若夫函夏之蒸嘗濟固魯國之域而吾夫子之鄉也闕里閟其閫閾曲阜峻其室堂顓邾列其廊廡齊宋衛其藩墻萬古傳其子弟六經煥其文章故入其門者多至於三千治其業者並振於漢唐猗謫仙之殊質挺光嶽之精英或取裁於狂狷可庶幾於中行使沉潛於彥聖綽左顔而右曽若子輿之芳軌將與之以爭衡然而瞪乎後代眇矣孤生身不逢其轘轍足未履其門庭訪相如於酒壚寓子雲之玄亭肆風雲之變態諧月露之音聲心怦怦而獨賞神恍恍其靡寧矯鷙鳥之雄飛阻潛龍之遐升故中年竄於夜郎末路極於塗城既保全於郭令復訣絶於陽冰坐清江而撈月托駕海以飛鯨類莊生之幻夢甚王粲之飄零蓋美玉而靡琢亦鍊金而弗精是可以快雄談之資斧而未可以標後學之凖繩也是可以競溫泉涼焰脫絶於種類而未可以並太和元氣布濩於綖紘也念斯樓之亢朗樹城上之孤甍鷹隼窺其户牖燕雀掠其丹青夏炎炎而觸日寒颯颯以飛霙延金飈於八月送玉魄於三更涉盛衰之相禪觀往來之無停所遊者江湖之思客所藏者騷墨之篇銘稀西崑之琬琰乏東壁之瑶瓊杳清廟之敦彛寂武庫之甲兵齊崇嶐於紫閣謝廣邃於玉京奮峻嶒而獨出悵危險而難慿較地位之髙爽與聲價之重輕歸樓名於太白何比擬之中情視宣尼之矩步猶雲物之去太清顧往迹之紛沓亦奚暇於他評於是先生既喜文學恱服哦天姥之髙篇歌襄陽之艷曲倚畫檻以開襟俯清流而縱目傾竹葉之新醅向東籬之黃菊聽舟子之張帆足將行而欲縮倘倡和於長宵願斂衾而就宿歸來堂賦朱應登緬兹堂之攸建兮肇錫名曰歸來欽嘉遁之時義希明哲之所懷繄堂中之人兮固臯契之上材遭昌時以振奮兮緣天路而徘徊􅀢龍虎之文章兮呈道德之瓊瑰信中情之好修兮矢貞志而靡虧嵗曖曖其將暮兮芳烈烈而彌滋既姱麗而鮮儔兮要非時之所宜嗟時俗之難周兮衆比同而恥獨謂忠信以為頗兮指潔清以為濁亮恥獨亦何傷兮患偽滋而真惑觚可破以為圜兮繩可引以追曲何孤行之煢煢兮乃惴惴而棲木彼烈士之耿介兮務矯俗而徇名逢忠諫以捐軀兮讓感遇而戕形和重刖於獻璞兮由搆難於結纓胥肆直以伏劒兮種成謀而蹈刑遷逢怒以下腐兮陽上書而自明然皆信道以昧權兮故罹殃而速傾惟哲人之先幾兮揆進退而適當也知受生之有涯兮懼寵祿之踰量也進懷憂而畏讒兮退將從吾之所向也返初服以徜徉兮不吾知焉其何病也覽衆女之善妬兮羌佻巧而多言孰蛾眉之可恃兮沈憂積而罔宣誓淪謝以遊衍兮雖貧賤而不遷竭馬知於銜轡兮殘純朴於犧樽固莊生之所誚兮實繕性之本源庶永言以奉斯兮縱九死亦何難誦同人之先號兮覽道家之明忌諷武公之悔過兮遵宣父之求志宵炯炯以延佇兮候將旦乎於邁抑吾生之不罔兮曷駢贅之為侈相宇宙之無窮兮傷寓形之不長不撫壯而策勵兮恐修名之不揚鶗鴂鳴而隂至兮白露隕而為霜心感時而增惕兮目睹物而臚情吾將遜堯舜使前驅兮揖周孔而隨後要回點以為徒兮謁羲文而占之聳巍峩之籜冠兮製委蛇之蘭佩被中正之芰裳兮襲溫恭之荷衣闢文藝以為囿兮崇典籍以為臺飲豫馬於義津兮晞豫髮於仁階續小山之招隱兮歌泌水之樂飢望咸池而振步兮遡閬風以陳辭撫吾躬其有獲兮顧外此將安求信榮辱之所如兮吾將觀之造化重曰歸來歸來吾堂闢兮層櫨疊枅飛栱翼兮奕奕恢恢麗以則兮周覽八窗九垓赫兮風雲月露昭晱暘兮㛹娟奧祕紛埃息兮情暢意恱形神適兮假日永年不知其極兮登玄覽閣賦有序安紹芳紹芳子生而誕靈長而鬱志歷落﨑嶔伏匿山澤乘春散矚登玄覽之閣徘徊慷慨悵然有感爰為之賦伊春陽之煦煦兮漸淑景之熙熙羡萬卉之葳蕤兮欣苾茀其俱馡爰憑髙以縱睇兮暢形神其若怡山巃嵸以蔥鬱兮水滉漾其瀰瀰繄白羽之翯翯兮惟玄鳥之飛飛瞻停雲之旖旎兮倐靉靆其若垂披條風之溫燠兮淡飄忽而吹衣覿麗景之宜樂兮胡躑躅其憂思哀時運之未逢兮悼畏路之􅀈巇何迍邅而偃蹇兮徒蒿目而歔欷聊憑欄以徙倚兮玩杜若之菲菲望美人於天末兮安得解蘭珮以相貽嗟晨晞之易邁兮適晝晷之遲遲感時序之倏忽兮形若稿而自嗤顧人命之易衰兮俟河清之幾時悲青嵗之無聞兮懼朱顔之或馳愆往轍之既蹶兮猶來者之及追彼康莊之未騁兮德驥見哂於猶狸搏扶搖而鎩羽兮威鳯速誚於鶩雞志固匪衆之所窺兮又奚恤乎世譏寧􅖄俗而尤人兮甘棄置其若遺恥窮途之涕泗兮差溷迹於滑稽獨低徊而慘惻兮悵中心其若迷茍天命之或然兮雖戚戚其何禆澗阿可以考槃兮衡門可以棲遲諒剝復之相乘兮肆秉志以待期遵聖哲之遐軌兮詎困窮而或虧煙雨樓賦有序王文祿煙雨樓五代景陵王創於彪湖西廢我明嘉郡守趙公復建於馬當湖中南曰鴛鴦同一湖也壬申秋仲重葺經畫本兵憲劒南沈翁且賦之王生文祿步韻隘塵埃之卑棲兮遡彪湖以盤遊振雜佩以凌虛兮渺瀛渤之十洲瀼白雲之英英兮豁清都之瓊樓瀲三光以灧兩間兮漾一碧於四周移花蕚於相輝兮縮海湧之虎丘旋雍而如璧兮湛濚洄而不流總水輪之乘載兮連大地之俱浮浮生洞悟能幾兮畫船紛泊於水滸賸有先憂後樂之希文兮將無吸海噴珠之李杜靄輕隮而凝煙兮魚龍吹沫而霏雨瑩粼粼之水晶宫兮倒影青天而作侣四時朝暮之靡恆兮皎月沉而日麗倏煙雨而忽開霽兮水氣溢而互為晦明肇景陵之創兮繼馬當而再成棠隂散而卿雲興兮纍層臺而飾丹甍恍若空中之樓閣兮倬銀漢以呈章樅萬卉以待陽和兮鄂韡韡其芬芳壯東南之砥障兮擎玉柱而跨金梁想卷阿之伴奐兮歌喜起於明良森嶧桐於髙岡兮招苞鳯以來翔洗兵以淨寰宇兮烽煙淡其永息霖雨之潤膏兮鴛鴦蕩而雙集湘靈鼓瑟兮馮夷按節飛仙至止兮亦不怡懌錯蘋蓼之紅白兮埒梅菊之早遲及滄桑之未變兮爭磽瘠與腴滋稼穯維寶兮胡寧茹芝磴級霞蟠兮迎風歷兹憑闌悵望兮曷殫遐思豈玄圃暨閬苑兮盡草瑶而樹琪浥煙雨化甘露兮一滴蘇乎疲痍嗟彼勤農兮病於夏畦北懸金臺新極兮五百昌期雲臺麟閣兮際雍熙藏拙亭賦陸容陸子稅駕南都備官逾月賔客日至絡繹不絶禮或簡於逢迎物或嗇於餔啜啓居從容言論迂濶然而上不聞指其驕下不聞病其褻稱譽風聞謗議景滅始訝而求之曰吾其非故吾也耶兼人乎未能炙手乎不熱而人之遇我何遽别耶豈昔者昂昂類傑而今屈其節諤諤類訐而今結其舌耶抑脂韋圓滑而匪昔之昜缺垢汚蒙蔑而匪昔之易涅耶將易誠以譎易剛以劣而滑稽以為哲耶兹數者殆非也彼其羣姝爭寵粉黛羅列市人爭利錐刀瑣屑於是乎蛾眉見棄流涕哽咽良賈不售甘心折閲昔吾居榮寵之地蹈聲利之轍既不能夤緣以媚附又不能周容以交結而獨株守一隅以求自别是宜鼓吳蛙於積潦吠蜀犬於飛雪也今幸而投諸間散脫去羈紲挹鍾山之靈秀守髙皇之宫闕下無譏議上無請謁神完而體舒心逸而志悅况乎花木媚我以姢妍亭池假我以清徹經史在御壺觴亦設可以養東漢之節義采江左之髙潔徜徉其間用藏吾拙則吾於世亦何望之觖邪乃歌曰鷦鷯未化安一枿兮狡兔已死塞三穴兮有美斯亭可以藏吾拙兮又曰黃鐘鏗訇醜塊鐵兮緑耳飛騰笑跛鱉兮命之不猶彼胡訾吾拙兮客有聞而和者曰犧尊青黃木之孽也海圖波濤帛之裂也彼既失性無寧守吾之拙也陸子於是得意忘言失聲一嘻遂書其事於斯亭之梲後長門賦王樂善排太紫以通籍兮昉徼靈於天孫肆蒙幸於嘉采兮猥代匱於下陳惟女子之事主兮繄載德而載色緬坤儀之述宣兮敢淄蠧而愆則卬奉君之清燕兮俯遂君之壼教通貫魚於小星兮寧屯膏於煬竈眷二姚之遺矩兮宵振珮於雞鳴冀蒙成而有相兮懼憎子以同夢陽春之華滋兮日鏡融而駘蕩恩暉煦而拍拍兮誓萬年其可亮詎福逾而􅀢積兮曽何容於擢髮廓天覆之並包兮尚蒙恩於紫闥唾咳偎其淟涊兮誰可使為束緼戴髙天而循墻兮日嫶妍而待盡低羅幕之瑩煌兮襲蘭茝之芬馧緬金屋之前模兮君不偕而忍陳援雅琴以銷憂兮寄幽臆於新聲嗟逺君而誰為虞兮中操縵而涕零豐隆殷其軒谹兮驚紫軿之臨造九光照而隱約兮乃宵行之熠耀戃恍侍於中宵兮承恩借而薄從剡中道而驚寤兮耿蘭炷之熒熒涼露隕於枯楊兮訝間庭之秋早眷然顧於閬風兮應清颸之惎峭明月皎其流輝兮照孤影於空堂蟋蟀鳴於東壁兮忳一鬱余陫傷數尤悔之歷歷兮冥附心而自悼維聖明之雄斷兮敢希恩於回照顧從一之孤悰兮矢萬折而朝宗即蓍簮之終委兮亦沒世其有徴詞緣情以詉詉兮詎白華之敢託望九乾而抒愫兮庶有取於臯鶴緑窗賦王樂善夫何一美人兮謇獨留兮中谷衆芳咸有以發舒兮曷獨為此局縮峯盤盤兮石如玉撫嶔崟而愁春陽兮翳此朴遫葺木蘭以自藩兮延薜蘿而屋之嗟坎壈而無家兮紉蘭茝而服之襜攝葉以儲與兮謝鉛華於曼睩捫髧髦而晞惠風兮噫其遲暮紛余既有此修姱兮惜違時而莫畜踉位悄其無侣兮來明月而往復悵婉孌之調飢兮日盤辟於薋菉緝江蘺以充虛兮託遐情於采緑蕙性綽其孰憐兮冰心齎而孰悟芳澤具而孰容兮控幽悰而誰告日亹亹曶其過中兮逈去我而不偕鶗鴂送春以春歸兮青陽易而恢台紅芳鄂其葳蕤兮郯從風以紛飛余蔞約而紆軫兮重抽思於芳藹之變衰傷韶華之易零兮時一往而不來肆冰泮以桃柂兮俄驚心於標梅羌送目於行雲兮惝恍而羞自媒豈禔躬不逮古之人兮抑膏沐之未諧也將我辰之不淑兮果蛾眉之多乖也把平蕪之緑色兮居怏怏而徘徊氣轑轉而靡鬯兮心絓結而不開縹綿綿之相屬兮浩渺渺而無垓藐冥冥之不可測兮來渺渺而彌恢糾煩寃以為纕兮翩蔓蔓乎不可裁四序冉冉以遞遷兮汩莽莽與靡草以同灰老逴逴而漸迫兮浩惆悵而傷悲悼年嵗之不吾待兮豈女子之善懷吾將遵微行以舒夭紹兮睇鵲巢之居鳩也俯新川以袚憂兮又浮陽之並浮也鷾􅀈倉庚曽何知兮鳴上下以相求也余獨為此孤馘兮如石田之不有秋也生而願為之有家兮得無為二人憂也貿貿隨波靡屆兮孰是人斯而不紼之舟也茍橋運實為此隆施兮固非人可戚而仇也倘力命之不能迭而勝兮又何庸計去住而辨夷由也重曰關彼王雎在河洲兮孌此淑姬滯樊丘兮冥冥飛鴻羅無囮兮鼠肝蟲臂順所投兮風筐月杼以自謀兮秉遺穗滯食可侔兮鄰燭分輝聊淹留兮漆窒含恤何當瘳兮臨風抒愫畔牢愁兮委運乘化與造物者遊兮我思古人俾無訧兮假山賦黃猷吉臨安上郡都會名區覽山川之佳麗開髙堂之畫圖湖蕩漾以浮碧通太液而東注山排撻以送青接天台而南去羡勝地兮如斯供主人兮樂胥時肩輿而短棹收湖山於肺腑侣麋鹿與魚蝦忘形骸於塵宇顧歷覽兮不足乃收拾而歸與移湖山之萬頃列咫尺之盤盂一拳太華一勺江湖烽嵯峨兮聳百尺而有餘壁巉巖兮懸數仭而難踰藏虎豹之阿丘而風雲時噓列神仙之洞府而煙霞晝居竒葩異卉映林壑而爭舒好鳥幽禽隱深林而對語勢曲屈以勾連杳深邃而莫知所如形變態以恍忽忙兩眸而難為有無胡斗室之經營生無邊之佳趣如入乎蓬萊之三島天台之三萬六千丈而一遊一豫奚羡乎十里之蘇堤三百六十之臺榭而以遨以娛此假山之大概而難紀其餘乃若紅笑緑言暉映齋閣春光富也槐隔日而生蔭松過軒而度涼夏隂濃也木葉脫而石出月庭寒而色深秋容淡也雪花細綴而石膚斑梅香暗浮而木生氣晚華新也此假山之真景視湖山兮何如至若鈎簾憑几挹青光而琴書徘徊瞻眺窮四際而長盱奏笙歌兮聲細飛羽觴兮醉呼入丘隅兮覔句撫卷阿兮迂徐此假山之真樂彼六橋三市兮何殊噫嘻吁昔湖山兮帝王所都兹弔古兮滄桑幾枯觀古今之代謝兮良可慨夫彼長安之皓首兮將何為乎維假山有真樂兮毋俾荒蕪苟厥心罔歆羡兮奚適匪吾燈市賦有序吳伯興今王正月燈會上元當年運之清夷藉聖明之光飭其晴開甲申軺九市而出遊冶之百色也則若法雁吐珠神龍銜燭金標轉力寶界廽新於時卿士約隊且觴且咏小人密倚或鼓或歌豫小子既自公而多暇疇有政而必聞乃邀好友減人從以微􅂒弛冠裳而攬袂談深佐酒夫亦極其致矣而山隂雲間清人興寄各獻所儲響如也余念而序之聊取機於映賞因緣生而發悟蓋太平之樂事無涯一瞬之新歡易㡯愧豫官之淡淡當纒徽之晥晥滌滯慮於榮觀敢效陶歌將追歡於良士并佐虞針云爾眷神都之寶勢承造天之玄居樹華闕於黅霄鬱葐蒕於層虛金臺值乎銀潢玉河􅕉乎歸墟恍瑶宇與峮嶙酌允鑠而樂胥戺皇德於周成豈其鮮終而僅有初是日也氣朗葭琯星正春辰青陽襟乎沖和太皥柄其威神物孕寧而改舊人逗機於若新冰將泮以微流氣無肅而有仁聖天子登三緯地乘六御天考月令之所宜究休佑之所同第從臣之椒頌採太史之觀風將以望杳瞻蒲敦耕勸農爾乃鳯蓋棽麗象輦霆軙郎將叢而虎戟交臚人圍而九賔重究濟濟之皇儀展穆穆之帝容藩國要荒辨等以入壁羔皮帛各獻其贄乃羡羣后於東除軔機宜而問質曰萬物之爭揚春氣喜而自生倘民􅀈之未捐何以稱陽節之淑清爰抗稜而布德蒸霞液而賑嗇荒束帛欲賁乎丘園諫鼓新開於明堂民望如草而澤如春僾天道之皇皇於是皇心歡浹太牢斯鄉春風風人其樂愈愈化衍而流遐騖天區天子乃肇年榖之豐登裙有唇而偕樂開節假於黃扉引春光而駐腳時則景星煜煜爰璨於蕊焱風散鬊雲英間錯紫磨素雯十色圍空天門呀然混沌欲鑿日䵎䵎而上春臺筵穼穼而開油幕欲接通天之梯不閉萎蕤之鑰鬬縷之香繚繞龍川之蠟方灼儼翠築之蔥菁并蕙華兮交蕚出珊瑚於鐵網問隨侯以歷落想流珠於丹竈現莊嚴之瓔珞燦乎若五金在鎔翔陽瀲艷而沖融䁗乎若神瀵湧璣􅀢矞雲以岎靡晃乎若白榆􅀈􅾣而蕩銀波駐芒潁之紛拏􅀢乎若仙掌巨靈之贔負䦠觩瓉而紛聚至如紫宫列宿環彩景彰虹霓廽帶激日流光栽菡蓞於倚雲噴梨花於霞觴綴碧紗之火棗舞星毬於錦襠簫韶奏兮鰲海繡芾列兮蛾房薏酒萬斛兮滴珠琲雲炮千丸兮棼霓裳望觚稜之金爵起蓬萊於中央目眩轉而欲迷依天表以洋洋若絶地之行難人顧影而聳軀浮十步而一息拂埃壒而載驅各􅩚跚以結襪擬飛蝶之栩栩井里綴鐵橋而如織門户光靈池於有無等風食於魚子走步帶於青驢競作樂兮宣馬上有才情兮誰匿諸繞東華之樂事頌堯仁於康衢乃其場開九市貨別三條闐城溢郭東西呌囂裂繒結綺拋彈飛鳶狄鞮旋舞角抵絃么器品則有哥窰秦籕周鼎商彛瓦爵銀瓶金蟬玉貂書連於屋牀疊通闤驥子魚文鱗萃表標鉛鍇銅錫麗於星賨􅞲琛幣湧如潮熒隆隆之火井吐金景兮雲歊燒柏子之銅爐織冰室之鮫綃青珠向風其欲乳瑪瑙􅪛日而轉驕騰酒車以斟酌齊宫商於雲翹豈分艷於十三樓漫爭勝於二十四橋蓋如寶坊之布金烘六合以為窯爾其冠帶鱗起驂䩛憑輈控寶鉸而纒金羈綴錦帶而懸吳鈎履躡兮飛雲鳴佩兮琅球比懸璃之􅀢目類芙蓉之照秋千唱萬隨從颸曼延于于喁喁與雲流連跋躠魚貫欏榻絲牽鶴蓋鸞吹眇若騰騫乃出金而擲璧進舞市而御歌宫發皓齒於哇咬娛密坐而撾鏞莫不羽􅜎犀紕露紒練帢跐豸轉增芬澤微發既偠紹而便娟亂芳鬱於五風亦微眺而連跆等金石之􅀈同躡蹀兮馳帶醉酣兮曲終華燈錯兮鋒霄微投詩賦兮殷層空想夫儒生授學樂列絳紗楚姝委潤舞歇章臺行行誾誾洙泗步趨彭彭鏘鏘韓姞偕來和具光而同其塵羣不黨而矜不爭庶幾似之其在斯哉是以五宅夜遊淡蕩諸峯之雪千炬圍燭流連隔水之煙脂冷韓虢空餘百樹花燈橋駕廣陵渺矣五雲仙樂曷若千官休沭萬井笙歌賜酺樂豈接羽擫籥凌波之子繽紛姑射之仙綽約景得人而增妍人因景而欣躍亦何異乎榮露騰軒蕭雲掩閣覲王母於崑墟要帝臺於宣嶽實仙都之陸海文成五利之所不能託也雖然人生有涯苦樂無期隨寓皆客主者其誰愛流成海趨而赴之過眼空華駟不及追彼夫水觀之棲結蜃之市金人海藏未可殫窺清歡已矣良夜何期主茍皭然而不緇客亦何傷乎隨寓而隨馳倘其畔援而欣羡或難事而易悅將無始之趨未超斯有終之相難閲吾將歸山河於大定悟空明於一切九衢之屮千計四照之花不折慧日曜於重昏法雲蔭於火宅固靈境之常然豈一夕之覯絶夫堅冰履霜尋木栽孽聖天子樂不及荒取戒蟋蟀故上下式燕且盤豈蜉蝤之掘閲淨域非遙兮敻不知乎春色之所窮以矢其音兮吾以觀乎中􅀢而彌烈瀑園賦有序徐􅎾大中丞南公家本渭濵園臨湭水買山得瀑築館開林種樹蒔花看雲聽鳥地多靈勝泉極蜿蜒輞水不足狀其淪漣渼陂詎能擬其滉漾公方結志巖廊馳神藪澤寫圖作記託興抒懷爰屬操觚敢辭獻賦溯雄關之迤邐徑清渭以瀠紆山蟠二華兮達嶓冡幾千餘里水合灞滻兮環周原數百其都畛域壯天府之形勝提封表三輔之黃圖聳玄象之峯屏若黛滙猶川之流沫如趨㟏岈􅌄窱崒嵂嶔嶇峯夾湭以削玉猶噴瀑而咳珠洪瀾飛乎千丈泛濫迸於一區奔騰淜湃漭沆渟瀦羣龍挾湫兮倐忽萬馬蹴浪兮須臾玉虬懸挂兮等巫峽銀河倒㵼兮同匡廬爰有丈人瞻竒仰異就壤營園緣崖相地嶽作賦兮間居統著論兮樂志世諦於焉而輕曠懷因兹而寄芟蓁莽以結構循林巒而葺治施以堊丹塗以茨塈髙者磴承危者棧置界接東西之豐源疆畫南北之郊隧於是息機心兮築圃致爽氣兮開堂引石雲縹眇兮入洞激寒泉飛灑兮渡梁振袂俯亭亭之小閣披襟步曲曲之長廊比鄰數舍灌木千章茶寮柴柵藥竈石牀深淵鑒影澄潭漾光吟新詩於逺嶼晞短髮於崇岡爾乃跨層岑傍遙崿抵井里帶墟落春風長芳徑之青莎夜雨滋雕闌之紅藥餐英玩秋町之餘花洗竹聼寒林之殞籜蘭侔楚畹而馨香桃擬綏山而綽約芙蓉媚沼兮間修堤荷芰沿陂兮通略約嶺松貌古以同喬灣桞腰纎而較弱樹枳類木奴之衡種果效槖駝之郭若夫登髙逺眺陟險遐觀側身崖畔躡足林端眂秦峙密臺之消歇盱渭流故苑之渺漫斜村莊之半日折危坎之九盤雉飛林而煦澤牛飲澗而驚湍煙鴻渡渚以嘹喨春鶯出谷而間關秦女已仙兮峯自在胡公既去兮陂長間至於析酲名齋瑩心鑿沼嚴逺囂兮隂陽割乎曉昏樓延真兮心神徹乎灝渺柿葉墜兮供學書柏枝悅兮借棲鳥待饁耕兮稼穡知禮文殊兮心性了或當晨爽乍闢朝曦未升嵐光初散花霧猶蒸携益友集良朋接畸士招髙僧扶笻共眺引酌同登循崇巒之嶪嶪躡絶巘之層層傷五柞長楊之代謝感阿房麟閣之廢興悵漸臺百尺兮淪沒愴藍田千澗兮澄泓俄而景汜於崦西霞標於天末涼籟迭吹清飈遞發禽語爭喧漁歌互答月睨璧兮依微星縣璣兮旋斡瀑響瀺灂兮震空山容杳靄兮排闥羡斯園之清幽暢遊蹤之遼濶慕赤松以遨遊等漆園之曠達况乎天植丈人之大德帝寵元老之無疆已播勳猷於當寧復秉節鉞於要荒方際熙時而揚歷豈容暇日以翺翔緑野先開莵裘預樂身在廟堂夢逰巖壑尹正輟耒以出莘奭乃樹棠而至雒行且為瑞世之鳯麟慎毋戀北山之猿鶴明文海卷三十二
