body:
  text: 明文海巻三十三餘姚黄宗羲編賦三十三惜愍賦史明古秋風蕭條夕起兮白露變而為霜原野寂寥無色兮草木為之不芳嗟夫君去國而逺逝兮将往遵夫行路謇徘徊而不進兮歩十舉其九顧望皇居而不見兮涕浪浪以沾衣情㤞憏而莫釋兮何湏叟能忘之繄願忠而慕義兮冀少伸其㣲志胡壅遏而不通兮曾不能以一試彼蕙纕與佩蘭兮宜日切乎君身忽棄捐於山谷兮豈将惠夫南之人覩江湖之浩浩兮紛日夜而東流駐駟馬於山臯兮乘舲舡而下浮去故鄉之日逺兮路險囏而多牾濟錢塘而上稽山兮跽陳辭於神禹慨聖功之無間兮民日用而至今仰昭回於上天兮儼光華之昭臨入浦江以南徂兮眷新昌之所治俗儉嗇以憂勤兮乃風氣之所㑹山巃嵸而多雲兮晝冥冥其若雨林幽深以行迷兮疑非人之所處虎豹穴處而咆嘷兮猿􅀈跳梁而嘯啼溪谷嶄巖而險阻兮草莽委被而萋迷苟衆芳之不乏君用兮雖僻遠其何悔也𦍑好修以為常兮矢初心之靡改也昔賈誼以才見嫉兮卒長竄於長沙終焉宣室之召對兮語前席而忘罷叶茍其言之見用兮身不必在乎君側係貴寵之與賤踈兮諒由命之所出惟定心而廣志兮寧時俗之能從橋茲媚以潤身兮豈将愁苦而終窮亂曰鳯凰集於髙岡兮世已見其文章固非時俗之所好兮然共以為嘉祥托靈風而上浮兮俾翺翔於帝鄉暌難賦戴欽暌難别彭子美中也抒我素懐爰稽同心辭之工拙不暇計矣𦕈予生於絶粤兮悲斯文獻之莫徵帝復靳予厥初兮性悾恫而顓􅲰悵前修予罔及兮去聖途其将日逺孰導予於先路兮孰驂予椉之偃蹇汨予恒若不及兮恐年嵗之不吾留将溯流而求原兮淜江淮而無舟予朝挹桂巗之清露兮秋采禽華之落英畹䔾車與芝蘭兮雜蕙茝之紛芳嗟道周之枤杜兮上童龍而無枝彼美人兮冩予𠂻而曷致之予獨慕夫古之人兮咸喜能而好修曠百代而神交兮豈云界夫遐陬懐佳人其不忘兮馳予思於海隅杳盍簮之無再兮紛予懐之縷縷曰予不撫壮而修姱兮𦍑自􅗴其靈根也苟予芳其信無兮寧美人之不予親也既襲瑶華以為履兮又􅀢芙蕖以為裳紉璚英以為佩兮結胡繩於香嚢抱衆芳以獨處兮世寧挹予以馨香嘅美人不可以坐招兮思蔵修之莫吾予将往觀於天下兮庶嬋娟之可覩伊嵗比於閹茂兮日正纒於夀星凉風飄飄而吹衣兮白露湛湛而湑零廼朝􅀈予於栁涯兮夕弭檝於漓江妴帝子之蛾眉兮倐逺邁於瀟湘蒼梧邈而皇逝兮灑予涕泗之淋浪采江蘺於衡湄兮聞哀鴻於南浦嘆幽人之莫逄兮渺雲亭於衡之武予登岳陽之髙楼兮望漫漫之洞庭孰憂樂之以天下兮𦍑獨有慕乎斯情因江潭而敬吊楚之湘絫兮復悲賈誼於長沙胡夀夭之在天兮寧俾斯人之莫遐遂凌長江之浩浩兮吊青蓮於采石冺鯨波之無跡兮惨黄蘆之一色予使蒼螭以翌舟兮驅素蚪使衛行馮夷為予鼓柁兮江妃為予揚舲衝風定而素波澄兮駛邇􅂒於金陵􅍻予舟於河渚兮振予歩於江臯瞻天門之峩峩兮覧秀麥之油油僉謂予其好敖兮疇識予心之揺揺予乃蠲吉以齊明兮稽靈氛之占辭曰两美覯而必合兮紛百朋以相貽孰意絶代之佳人兮驚一見而相好荃慕予之修名兮予亦慕荃之善窈窕予投荃以雲錦之衣兮荃報予以明璫心康愉而莫逆兮情傾倒以相忘芝蘭芬而相投兮慶予𠂻之允臧忻靈修之獲㢸兮滋衆芳而日榮曰天軌辟而衆馪登兮𦍑盍觀於帝京予駕木蘭之舟兮剡文梓以為􅀈楫溯千仭之龍門兮宛仙槎而泛月濟雲龍之嘉㑹兮仰虎豹之九闗排閶闔而進予兮𦍑共彼乎琅玕嗟時運之糾纒兮悵仕途之多舛愚者不必卑兮賢者不必尊而顯鸞鳯伏而不鳴兮鴟鴻羣而翺翔黄鍾擯於甈甖兮㼜缻進而雷鳴哀昊天之不弔兮恐靈修之数改蕭艾而纕苞莨兮孰更敶之以蘭茝憶荃與予成言兮曰修正以俟時也守靈龜而靡它兮罔與波而推移也茍予行其圭璋兮長顑領予何辭也寧溘死而流亡兮罔喔咿嚅唲之為也予藏此言乃可服兮懼嵗序之如流方翊荃以為正兮奄棄予以逺遊予固知枳棘非鸞鳯之所棲兮恐靈修其日逺浮雲蔽而白日隂兮孰邇夫忠之蹇鑒𦍑皇輿之轁轁兮哀民生之多艱衆貧婪而競進兮徽罔紹乎南山伊予荃之清修兮寔蒲民之有榖孰竊脂而宜粟兮孰矜寡之宜獄悵美人其将别兮凛秋風之蕭騷衆芳萎而揺落兮山容澹而寂蓼鵾雞啁哳以悲鳴兮鴻鳥飛而南號感萬物之凄列兮增予心之憂勞余将裁雲錦以為衣兮鏤明月以為璫祿蘭茝以為珮兮遥予美之煌煌予恐波濤汹湧而雷電以風兮蛟龍起而制人觧干将以相贈兮披燦爛之星文哀予心之罔極兮悼美人其将日逺𦍑信宿以少留兮即逍遥而遊衍白日曶其不淹兮愴予美之将行心揺揺如懸旌兮憂耿耿而如酲予固不難於為別兮恐春芳之遲暮淼江海之無涯兮思同心而共渡悵美人之莫予留兮遐不披乎琳琅𠂻心藏而未敢言兮羌何日而可忘紛既莫致予情之緫緫兮聊陳愚而盡言孰非蘭而可佩兮孰非善而可傳予獨恧夫時俗之諂諛兮偭規矩而改錯紛枉尋以直尺兮競雷同而茍合予行信姱練以庶貞兮致予之坎坷予何傷芝蘭之在幽谷兮不以無人而不芳荃其氷雪以食兮金玉以為􅋵曷求美於天下兮而蛾眉之不遭亂曰黄鵠髙舉羽儀皇兮彼其之子惟其有章兮出牧於民政斯臧兮噫予贈言摧忠膓兮情不可既風斯長兮慷慨載歌美洋洋兮抱一委順貞士其常兮感舊賦王寵正徳辛未寵師事林屋先生於包山精舍凡再閲寒暑而退迄今庚辰八年於茲矣乃復来山中作感舊賦其詞曰紛余慕夫好修兮潜大道以遊神漭江河之浩溔兮悵欲渡而無津彼哲匠之巍峩兮揭日月於八垠折疏麻之瑶華兮将以贈夫斯人亟惝恍而仰鑚兮又靡知其所止紛虯龍之下上兮尺蠖蜷於泥滓車既怠而馬煩兮阻山川而徙倚忽日月之我邁兮去冉冉而不已經疇昔之故居兮志欿憾而顙泚漭淹留以無成兮将復修吾初服佩長劔之陸離兮冠切雲而矗矗民生各有所樂兮放吾道於空谷吸朝霞以為漿兮夕復飡夫秋蘜茍矩矱之攸存兮冀来者之可追吾令羲和弭節兮将以窮乎我師路㬅㬅其阻修兮殚吾生以求之亂曰驂騑斯皇莫予好也洵彼前修為我導也海嶽嶄巖何當造也長夜漫漫志懣􅏥也矢心白日遵長道也感別賦皇甫汸戊申之秋八月初吉季弟水部郎子約以制滿還闕而余覊紲都亭移書告别發函披誦悲不能勝嗟乎丈夫之生自懸弧矢以来孰不有志於四方故曰人豈鹿豕也而可常聚乎此光禄之賦惜其淵雲詞靡而病於兒女情多盖別不足以興悲而情有所感於别則悲可知矣因譔茲賦以代餞云爾辭曰别方異緒離状殊端在有情而必欵豈同氣而能堪軺車陳於埛側舟檝戒於江干或感慨於川逝或行嗟乎路難涕臨觴而共抆心執袂而俱酸善哉江生之言曰黯然以銷魂值我愛弟遄徃帝閽愧䨇鵠之並舉兮矯乘鴈而孤騫若夫未營四方聊事一室侍讌庭闈聫經几席辨索研墳遊璣討歴繹孟氏之有三詠詩人之既翕至其恭承嘉恵忝竊龍光仲兮叔兮乃以軒而以翥伯也季也復載翺而載翔或彯纓於建禮或結綬於文昌或馳麾於趙魏或沿牒於楚湘乍乖雲雨少别闗山旌指洛而将赴裘滯秦而未還行行路何極去去情不忍寄芳草於春池攬素毛於秋省夏暑溽而扇違冬飈厲而衾冷顧奚別而非悲抑奚悲而云甚迨夫丁辰荼酷軫患纒綿乾覆奄奪慈景俄殱悼金昆之脆質凋玉樹於華年同朝露之溘盡展夜壑之已遷繄慶徃而弔来亮福倚而禍伏豺狼逞兇蜂蠆隱毒搆曽参為殺人收張儉而属吏謂死灰其不燃詫凝脂之可畏投清流使合汙惡獨醒而強醉胡人心之險巇兮亦天道之冥昧賂茍輸而在宥兮嚢無金之可致鄒投珠而遭盼兮和抱璧而蒙寃乏文姬以請駟兮望融弟為急原得與䘮其齊塞兮退未遂而觸藩肆蒼鷹之亂紀兮實桀犬之餘孽隕東晋之𤣥風兮黜西州之英烈誰百口其相明兮空撫鏡而存舌中郎奮於鉗徒兮應相起於溺摺尚錄過於代門兮布揚芬於漢闕將逆施於末路兮終雪恥於前哲斯時也雖其邇其含悁矧駕言以逺別遵道路之逶遲兮睇蕭晨之凄𦂳凴江閣之交疏兮見中洲之帆影淮水落而彭城荒燕雲飛而冀門近想天上之仙班恍夢中之幻境粲西笑而心揺託南楼而跡警追二陸於疇昔兮緬两到之徂征置美酒以高㑹兮列祖讌於華楹徵綺羅之妙舞兮被絲竹之新聲懼堂中之蠟燼忘户外之驪鳴雖擬跡而同別亦原悲而異情憤世道之黮黯兮請以予言為殷鑒衆女嫉茲蛾眉兮均自沉於明艶客方戒乎用光兮稽弗戢而罹患雲賦就而晩疲賈書上而早譴齒何貴而象焚鞹乃災於豹變庶飬徳於木雞毋處才於能鴈辟渉海而獲濟兮諳風波之苦辛傷虎口而幸脱兮猶心悸而告人疢已痼而復初兮舉藥石以具陳羽有落於虗弹兮咎無蹈於震隣紛余季之玉秀兮又襲之以蘭芳振逸響於寥漢兮赫掞藻於明光恩被命而攸渥兮德潤身而彌彰渺岐分於川岳兮瞥星散於參商季昔時兮送予予今日兮送子若迭代於天運匪徃復於人事喜何劇而無悲悲何窮而無喜情生文以叙離詞因情而歛思膓屡絶於停毫泣欲盡而盈紙願行者其勉旃惋居者之已矣別知賦孫承恩河予心之無聊兮𦍑忽忽如有遺匪懐禄而靡釋兮乃獨悵悵而弗怡予昔有志於泛愛兮謂傾蓋猶知心何人心之險幽兮迨山高而海深繄自信而靡顧兮幾顛踣而阨窮紛栩栩以相逐兮孰有能諒予之愚𠂻孔聖所貴乎無悶兮在予心其何疚嵗冉冉其不居兮恐姱名之日仆嗟夫子之何謂兮曰予心之靡他予亦未敢自謂其必然兮顧夫子之與我共勵志於進修兮勤相予之不能𦍑窮探而力紹兮尚墜緒之大振指迷途以並驅兮謂千古其一時追逸軌而莫及兮顧蹇鈍而已疲窺末光於徳隣兮資輔仁之麗澤感夫子之巨誨兮皦此心其如日謂因依以沒齒兮奉周旋以綢繆何此㑹之弗可常兮遄欲別而莫留呼天龍而為駕兮逝褰裳而去茲溯長風以遐征兮指故山以為期掩衡門以索居兮𦍑畢志乎初服奉教言之孔明兮期報君以不辱念夫子之悃欵兮即欲去而盤桓出都門以悄悄兮感雲龍而永嘆鳥孤飛而嗷嗷兮獸失羣而悲鳴伊物類且有然兮顧若為乎予情亂曰春江兮水深春草兮愁人靡靡兮長路望望兮雲岑渺懐人兮何極浩離思兮難任倘不我兮遐遺時惠我兮徽音後别知賦孫承恩夫何天日之凄厲兮嵗忽届此凛冬𤣥雲渰渰以布濩兮原野閴其多風舟人告予以吉日兮翩予袂乎吾将逝懐氷蘖以為羞兮襍申椒以為糒嵗昔甲戌之南騖兮指故山以欣欣懐友生以戀戀兮尚凄惻而弗禁矧茲二三子之濶違兮復背鄉而去邑顧予情之若為兮獨悹悹其莫釋吁嗟末世之溷濁兮競佻儇以自賢倡冶妖之淫狐兮子都掩抑而弗妍蹇予生之顓顓兮抱迂拙而不知去莫或諒予之濩落兮惟二三子之我與沕淵潜以僻處兮寄遐情於逝波安澹泊而靡予厭兮同衡門之詠歌𦍑窮居之足娯兮予将終此而無悔何前瞻而後顧兮觸予心而多慨紛搃搃其憂集兮予豈樂為此故也曠慈闈之晨昏兮忍而不能措也昔予有志於千古兮指前修以作則屯中道而邅回兮恐令名之不植曰不仕無義兮懐依依而靡寧茍抱質以勉進兮或将来之有明予既採杜蘅以充幃兮又薜荔之盈擷將以遺夫美人兮致情愫以永結女嬃要予以慎重兮盍從巫咸而訊之巫咸陟而靡降兮世悵悵而誰稽予令猿鶴以共策兮猿鶴告予以不可曰時俗之迫阨兮顧茲行之或左抱予拙以自試兮恐枘鑿之宜然子誠欲丐夫濟兮思刓方以為圓予詎不諒茲兮𦍑㣲𠂻之故在予誠鄙庸而靡似兮忍以祿位而自械信吾志以無疑兮依前修之節中置得失於自然兮詎媕婀以為容予兢惕而慚恧兮惟淺薄之靡濟紛羣龍之滿朝兮顧顓顓之何恃鑄柔鉛以為劔兮束葭葦以為楹不審已以自度兮将顛殞而莫任道貴黽勉兮予其敢摧頺而自畫碔終不可使為珵兮俟顛殞其奚益吾與猿鶴共要兮洎松菊使為盟曰吾行之不逺兮保姱節以堅貞繄二三子之共鍳兮諒斯言之靡措叅追逐以無由兮獨臨風而延竚亂曰維吾行兮合散故無常期與子別兮又何嘆息而増欷嵗忽忽其遒盡兮恐流光之弗居其各崇爾徳兮庶以究將来之所基擬思舊賦王文禄丁酉季冬予與張太華方十洲沈秦川同舟赴春官昔同浙薦今幸同行甚懽也除夕泊彭城沙淤氷沍明發將起陸同車於是醵飲太華少舉酒唱流水馬和車頃刻間途路别清音嬌婉傾座惨悽淑質髙才罕儷云秦川掄魁太華固窮績學竟夭十洲承天守終予每御飲聞唱此二句即泫然沾襟蓋思日月輪迅閃電奔駒舉世大夢逆旅胡殊抱竒莫展賫志永違傷哉迺效向子期思舊賦聊志感云將射策於南宫兮遂束裝而北征濟清淮以同舟兮宛攣如之年情洶洪濤之浩潏兮紛雪霰而氷凌沙且淤而水涸兮暫紼纚於彭城燔柴燻天而爆竹震兮伴旅次之孤燈醵設醴以交懽兮揚高調於新聲岐途路之易别兮迅頃刻而無停藹白雲於鄉闗兮罩紫霧於彤亭奪錦袍於綉句兮誓臚占於一經那譙羽而低翼兮冀再飛而再驚奈璧判而珠沉兮至寳䘮而離形記玉楼於閶闔兮殆修文於玉京抑文昌之化現兮應張翼之列星黔娄貧而不汙兮項託夭而無成徒梓窮居之稿兮留宇宙之空名十洲横金而遲逝兮俱放浪於蓬瀛偭遼鶴之䨇䨇兮挟遊仙以憑陵催晷景之彈指兮訝日月之頻更又孰短而孰長兮搃齊之而杳冥維天地有混沌兮世何人之乆生獨全神而不亡兮超塵刼而遐升肆求舊而難悟兮汔轉輾而靡寧望寥濶而寂閴兮心怵惕而怦怔越發奮而偃蹇兮朅彈冠之無朋隻隨陽之鴻雁兮揺在原之鶺鴒憯失羣而翔集兮每顧影而悲鳴豈伊人而不如兮寒雞壇之夙盟一誠可通金石兮烏間於幽明曽思顔之不校兮顔胡舎曽孔門之重朋兮兊麗而匪輕末俗之凉薄兮倐雲雨之隂晴追蘭臭以長嘯兮感伐木之嚶嚶明文海巻三十三
