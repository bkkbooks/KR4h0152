body:
  text: 明文海卷三十三餘姚黃宗羲編賦三十三惜愍賦史明古秋風蕭條夕起兮白露變而為霜原野寂寥無色兮草木為之不芳嗟夫君去國而逺逝兮將往遵夫行路謇徘徊而不進兮步十舉其九顧望皇居而不見兮涕浪浪以沾衣情㤞憏而莫釋兮何須叟能忘之繄願忠而慕義兮冀少伸其微志胡壅遏而不通兮曾不能以一試彼蕙纕與佩蘭兮宜日切乎君身忽棄捐於山谷兮豈將惠夫南之人覩江湖之浩浩兮紛日夜而東流駐駟馬於山臯兮乘舲船而下浮去故鄉之日逺兮路險囏而多牾濟錢塘而上稽山兮跽陳辭於神禹慨聖功之無間兮民日用而至今仰昭回於上天兮儼光華之昭臨入浦江以南徂兮眷新昌之所治俗儉嗇以憂勤兮乃風氣之所會山巃嵸而多雲兮晝冥冥其若雨林幽深以行迷兮疑非人之所處虎豹穴處而咆嘷兮猿􅀈跳梁而嘯啼溪谷嶄巖而險阻兮草莽委被而萋迷苟衆芳之不乏君用兮雖僻遠其何悔也羌好修以為常兮矢初心之靡改也昔賈誼以才見嫉兮卒長竄於長沙終焉宣室之召對兮語前席而忘罷叶茍其言之見用兮身不必在乎君側係貴寵之與賤踈兮諒由命之所出惟定心而廣志兮寧時俗之能從橋茲媚以潤身兮豈將愁苦而終窮亂曰鳯凰集於髙岡兮世已見其文章固非時俗之所好兮然共以為嘉祥托靈風而上浮兮俾翺翔於帝鄉暌難賦戴欽暌難别彭子美中也抒我素懷爰稽同心辭之工拙不暇計矣眇豫生於絶粵兮悲斯文獻之莫徵帝復靳豫厥初兮性悾恫而顓􅲰悵前修豫罔及兮去聖途其將日逺孰導豫於先路兮孰驂豫乘之偃蹇汨豫恆若不及兮恐年嵗之不吾留將溯流而求原兮淜江淮而無舟豫朝挹桂巗之清露兮秋采禽華之落英畹藒車與芝蘭兮雜蕙茝之紛芳嗟道周之枤杜兮上童龍而無枝彼美人兮寫豫𠂻而曷致之豫獨慕夫古之人兮咸喜能而好修曠百代而神交兮豈云界夫遐陬懷佳人其不忘兮馳豫思於海隅杳盍簮之無再兮紛豫懷之縷縷曰豫不撫壯而修姱兮羌自􅗴其靈根也苟豫芳其信無兮寧美人之不豫親也既襲瑶華以為履兮又􅀢芙蕖以為裳紉璚英以為佩兮結胡繩於香囊抱衆芳以獨處兮世寧挹豫以馨香慨美人不可以坐招兮思藏修之莫吾豫將往觀於天下兮庶嬋娟之可覩伊嵗比於閹茂兮日正纒於夀星涼風飄飄而吹衣兮白露湛湛而湑零乃朝􅀈豫於栁涯兮夕弭楫於漓江妴帝子之蛾眉兮倐逺邁於瀟湘蒼梧邈而皇逝兮灑豫涕泗之淋浪采江蘺於衡湄兮聞哀鴻於南浦嘆幽人之莫逄兮渺雲亭於衡之武豫登嶽陽之髙樓兮望漫漫之洞庭孰憂樂之以天下兮羌獨有慕乎斯情因江潭而敬吊楚之湘絫兮復悲賈誼於長沙胡夀夭之在天兮寧俾斯人之莫遐遂凌長江之浩浩兮吊青蓮於采石泯鯨波之無迹兮慘黃蘆之一色豫使蒼螭以翌舟兮驅素蚪使衛行馮夷為豫鼓柁兮江妃為豫揚舲衝風定而素波澄兮駛邇􅂒於金陵􅍻豫舟於河渚兮振豫步於江臯瞻天門之峩峩兮覽秀麥之油油僉謂豫其好敖兮疇識豫心之搖搖豫乃蠲吉以齊明兮稽靈氛之占辭曰兩美覯而必合兮紛百朋以相貽孰意絶代之佳人兮驚一見而相好荃慕豫之修名兮豫亦慕荃之善窈窕豫投荃以雲錦之衣兮荃報豫以明璫心康愈而莫逆兮情傾倒以相忘芝蘭芬而相投兮慶豫𠂻之允臧欣靈修之獲弼兮滋衆芳而日榮曰天軌辟而衆馪登兮羌盍觀於帝京豫駕木蘭之舟兮剡文梓以為􅀈楫溯千仭之龍門兮宛仙槎而泛月濟雲龍之嘉會兮仰虎豹之九關排閶闔而進豫兮羌共彼乎琅玕嗟時運之糾纒兮悵仕途之多舛愚者不必卑兮賢者不必尊而顯鸞鳯伏而不鳴兮鴟鴻羣而翺翔黃鍾擯於甈罌兮盎缶進而雷鳴哀昊天之不弔兮恐靈修之數改蕭艾而纕苞莨兮孰更敶之以蘭茝憶荃與豫成言兮曰修正以俟時也守靈龜而靡它兮罔與波而推移也茍豫行其圭璋兮長顑領豫何辭也寧溘死而流亡兮罔喔咿嚅唲之為也豫藏此言乃可服兮懼嵗序之如流方翊荃以為正兮奄棄豫以逺遊豫固知枳棘非鸞鳯之所棲兮恐靈修其日逺浮雲蔽而白日隂兮孰邇夫忠之蹇鑒羌皇輿之轁轁兮哀民生之多艱衆貧婪而競進兮徽罔紹乎南山伊豫荃之清修兮實蒲民之有榖孰竊脂而宜粟兮孰矜寡之宜獄悵美人其將别兮凛秋風之蕭騷衆芳萎而搖落兮山容淡而寂蓼鵾雞啁哳以悲鳴兮鴻鳥飛而南號感萬物之凄列兮增豫心之憂勞余將裁雲錦以為衣兮鏤明月以為璫祿蘭茝以為珮兮遙豫美之煌煌豫恐波濤洶湧而雷電以風兮蛟龍起而制人解干將以相贈兮披燦爛之星文哀豫心之罔極兮悼美人其將日逺羌信宿以少留兮即逍遙而遊衍白日曶其不淹兮愴豫美之將行心搖搖如懸旌兮憂耿耿而如酲豫固不難於為別兮恐春芳之遲暮渺江海之無涯兮思同心而共渡悵美人之莫豫留兮遐不披乎琳琅𠂻心藏而未敢言兮羌何日而可忘紛既莫致豫情之總總兮聊陳愚而盡言孰非蘭而可佩兮孰非善而可傳豫獨恧夫時俗之諂諛兮偭規矩而改錯紛枉尋以直尺兮競雷同而茍合豫行信姱練以庶貞兮致豫之坎坷豫何傷芝蘭之在幽谷兮不以無人而不芳荃其氷雪以食兮金玉以為􅋵曷求美於天下兮而蛾眉之不遭亂曰黃鵠髙舉羽儀皇兮彼其之子惟其有章兮出牧於民政斯臧兮噫豫贈言摧忠腸兮情不可既風斯長兮慷慨載歌美洋洋兮抱一委順貞士其常兮感舊賦王寵正德辛未寵師事林屋先生於包山精舍凡再閲寒暑而退迄今庚辰八年於茲矣乃復來山中作感舊賦其詞曰紛余慕夫好修兮潛大道以遊神漭江河之浩溔兮悵欲渡而無津彼哲匠之巍峩兮揭日月於八垠折疏麻之瑶華兮將以贈夫斯人亟惝恍而仰鑽兮又靡知其所止紛虯龍之下上兮尺蠖蜷於泥滓車既怠而馬煩兮阻山川而徙倚忽日月之我邁兮去冉冉而不已經疇昔之故居兮志欿憾而顙泚漭淹留以無成兮將復修吾初服佩長劔之陸離兮冠切雲而矗矗民生各有所樂兮放吾道於空谷吸朝霞以為漿兮夕復餐夫秋蘜茍矩矱之攸存兮冀來者之可追吾令羲和弭節兮將以窮乎我師路曼曼其阻修兮殫吾生以求之亂曰驂騑斯皇莫豫好也洵彼前修為我導也海嶽嶄巖何當造也長夜漫漫志悶􅏥也矢心白日遵長道也感別賦皇甫汸戊申之秋八月初吉季弟水部郎子約以制滿還闕而余羈紲都亭移書告别發函披誦悲不能勝嗟乎丈夫之生自懸弧矢以來孰不有志於四方故曰人豈鹿豕也而可常聚乎此光祿之賦惜其淵雲詞靡而病於兒女情多蓋別不足以興悲而情有所感於别則悲可知矣因撰茲賦以代餞云爾辭曰别方異緒離狀殊端在有情而必欵豈同氣而能堪軺車陳於埛側舟楫戒於江干或感慨於川逝或行嗟乎路難涕臨觴而共抆心執袂而俱酸善哉江生之言曰黯然以銷魂值我愛弟遄往帝閽愧雙鵠之並舉兮矯乘鴈而孤騫若夫未營四方聊事一室侍宴庭闈聫經几席辨索研墳遊璣討歷繹孟氏之有三詠詩人之既翕至其恭承嘉惠忝竊龍光仲兮叔兮乃以軒而以翥伯也季也復載翺而載翔或彯纓於建禮或結綬於文昌或馳麾於趙魏或沿牒於楚湘乍乖雲雨少别關山旌指洛而將赴裘滯秦而未還行行路何極去去情不忍寄芳草於春池攬素毛於秋省夏暑溽而扇違冬飈厲而衾冷顧奚別而非悲抑奚悲而云甚逮夫丁辰荼酷軫患纒綿乾覆奄奪慈景俄殱悼金昆之脆質凋玉樹於華年同朝露之溘盡展夜壑之已遷繄慶往而弔來亮福倚而禍伏豺狼逞凶蜂蠆隱毒搆曽參為殺人收張儉而屬吏謂死灰其不燃詫凝脂之可畏投清流使合汙惡獨醒而強醉胡人心之險巇兮亦天道之冥昧賂茍輸而在宥兮囊無金之可致鄒投珠而遭盼兮和抱璧而蒙寃乏文姬以請駟兮望融弟為急原得與喪其齊塞兮退未遂而觸藩肆蒼鷹之亂紀兮實桀犬之餘孽隕東晉之玄風兮黜西州之英烈誰百口其相明兮空撫鏡而存舌中郎奮於鉗徒兮應相起於溺摺尚録過於代門兮布揚芬於漢闕將逆施於末路兮終雪恥於前哲斯時也雖其邇其含悁矧駕言以逺別遵道路之逶遲兮睇蕭晨之凄緊憑江閣之交疏兮見中洲之帆影淮水落而彭城荒燕雲飛而冀門近想天上之仙班恍夢中之幻境粲西笑而心搖託南樓而迹警追二陸於疇昔兮緬兩到之徂征置美酒以高會兮列祖宴於華楹徵綺羅之妙舞兮被絲竹之新聲懼堂中之蠟燼忘户外之驪鳴雖擬迹而同別亦原悲而異情憤世道之黮黯兮請以豫言為殷鑒衆女嫉茲蛾眉兮均自沉於明艷客方戒乎用光兮稽弗戢而罹患雲賦就而晚疲賈書上而早譴齒何貴而象焚鞹乃災於豹變庶飬德於木雞毋處才於能鴈辟涉海而獲濟兮諳風波之苦辛傷虎口而幸脫兮猶心悸而告人疢已痼而復初兮舉藥石以具陳羽有落於虗彈兮咎無蹈於震鄰紛余季之玉秀兮又襲之以蘭芳振逸響於寥漢兮赫掞藻於明光恩被命而攸渥兮德潤身而彌彰渺岐分於川嶽兮瞥星散於參商季昔時兮送豫豫今日兮送子若迭代於天運匪往復於人事喜何劇而無悲悲何窮而無喜情生文以敘離詞因情而斂思腸屢絶於停毫泣欲盡而盈紙願行者其勉旃惋居者之已矣別知賦孫承恩河豫心之無聊兮羌忽忽如有遺匪懷祿而靡釋兮乃獨悵悵而弗怡豫昔有志於泛愛兮謂傾蓋猶知心何人心之險幽兮逮山高而海深繄自信而靡顧兮幾顛踣而厄窮紛栩栩以相逐兮孰有能諒豫之愚𠂻孔聖所貴乎無悶兮在豫心其何疚嵗冉冉其不居兮恐姱名之日仆嗟夫子之何謂兮曰豫心之靡他豫亦未敢自謂其必然兮顧夫子之與我共勵志於進修兮勤相豫之不能羌窮探而力紹兮尚墜緒之大振指迷途以並驅兮謂千古其一時追逸軌而莫及兮顧蹇鈍而已疲窺末光於德鄰兮資輔仁之麗澤感夫子之巨誨兮皎此心其如日謂因依以沒齒兮奉周旋以綢繆何此會之弗可常兮遄欲別而莫留呼天龍而為駕兮逝褰裳而去茲溯長風以遐征兮指故山以為期掩衡門以索居兮羌畢志乎初服奉教言之孔明兮期報君以不辱念夫子之悃欵兮即欲去而盤桓出都門以悄悄兮感雲龍而永嘆鳥孤飛而嗷嗷兮獸失羣而悲鳴伊物類且有然兮顧若為乎豫情亂曰春江兮水深春草兮愁人靡靡兮長路望望兮雲岑渺懷人兮何極浩離思兮難任倘不我兮遐遺時惠我兮徽音後别知賦孫承恩夫何天日之凄厲兮嵗忽屆此凛冬玄雲淹淹以布濩兮原野閴其多風舟人告豫以吉日兮翩豫袂乎吾將逝懷氷蘖以為羞兮雜申椒以為糒嵗昔甲戌之南騖兮指故山以欣欣懷友生以戀戀兮尚凄惻而弗禁矧茲二三子之濶違兮復背鄉而去邑顧豫情之若為兮獨悹悹其莫釋吁嗟末世之溷濁兮競佻儇以自賢倡冶妖之淫狐兮子都掩抑而弗妍蹇豫生之顓顓兮抱迂拙而不知去莫或諒豫之濩落兮惟二三子之我與沕淵潛以僻處兮寄遐情於逝波安淡泊而靡豫厭兮同衡門之詠歌羌窮居之足娛兮豫將終此而無悔何前瞻而後顧兮觸豫心而多慨紛總總其憂集兮豫豈樂為此故也曠慈闈之晨昏兮忍而不能措也昔豫有志於千古兮指前修以作則屯中道而邅回兮恐令名之不植曰不仕無義兮懷依依而靡寧茍抱質以勉進兮或將來之有明豫既採杜蘅以充幃兮又薜荔之盈擷將以遺夫美人兮致情愫以永結女嬃要豫以慎重兮盍從巫咸而訊之巫咸陟而靡降兮世悵悵而誰稽豫令猿鶴以共策兮猿鶴告豫以不可曰時俗之迫厄兮顧茲行之或左抱豫拙以自試兮恐枘鑿之宜然子誠欲丐夫濟兮思刓方以為圓豫詎不諒茲兮羌微𠂻之故在豫誠鄙庸而靡似兮忍以祿位而自械信吾志以無疑兮依前修之節中置得失於自然兮詎媕婀以為容豫兢惕而慚恧兮惟淺薄之靡濟紛羣龍之滿朝兮顧顓顓之何恃鑄柔鉛以為劔兮束葭葦以為楹不審已以自度兮將顛殞而莫任道貴黽勉兮豫其敢摧頺而自畫碔終不可使為珵兮俟顛殞其奚益吾與猿鶴共要兮洎松菊使為盟曰吾行之不逺兮保姱節以堅貞繄二三子之共鑒兮諒斯言之靡措參追逐以無由兮獨臨風而延佇亂曰維吾行兮合散故無常期與子別兮又何嘆息而增欷嵗忽忽其遒盡兮恐流光之弗居其各崇爾德兮庶以究將來之所基擬思舊賦王文祿丁酉季冬豫與張太華方十洲沈秦川同舟赴春官昔同浙薦今幸同行甚歡也除夕泊彭城沙淤氷沍明發將起陸同車於是醵飲太華少舉酒唱流水馬和車頃刻間途路别清音嬌婉傾座慘悽淑質髙才罕儷云秦川掄魁太華固窮績學竟夭十洲承天守終豫每御飲聞唱此二句即泫然沾襟蓋思日月輪迅閃電奔駒舉世大夢逆旅胡殊抱竒莫展賫志永違傷哉乃效向子期思舊賦聊志感云將射策於南宫兮遂束裝而北征濟清淮以同舟兮宛攣如之年情洶洪濤之浩潏兮紛雪霰而氷凌沙且淤而水涸兮暫紼纚於彭城燔柴燻天而爆竹震兮伴旅次之孤燈醵設醴以交歡兮揚高調於新聲岐途路之易别兮迅頃刻而無停藹白雲於鄉關兮罩紫霧於彤亭奪錦袍於繡句兮誓臚占於一經那譙羽而低翼兮冀再飛而再驚奈璧判而珠沉兮至寶喪而離形記玉樓於閶闔兮殆修文於玉京抑文昌之化現兮應張翼之列星黔婁貧而不汙兮項託夭而無成徒梓窮居之稿兮留宇宙之空名十洲橫金而遲逝兮俱放浪於蓬瀛偭遼鶴之雙雙兮挾遊仙以憑陵催晷景之彈指兮訝日月之頻更又孰短而孰長兮總齊之而杳冥維天地有混沌兮世何人之久生獨全神而不亡兮超塵劫而遐升肆求舊而難悟兮汔轉輾而靡寧望寥濶而寂閴兮心怵惕而怦怔越發奮而偃蹇兮朅彈冠之無朋隻隨陽之鴻雁兮搖在原之鶺鴒憯失羣而翔集兮每顧影而悲鳴豈伊人而不如兮寒雞壇之夙盟一誠可通金石兮烏間於幽明曽思顔之不校兮顔胡舍曽孔門之重朋兮兊麗而匪輕末俗之涼薄兮倐雲雨之隂晴追蘭臭以長嘯兮感伐木之嚶嚶明文海卷三十三
