body:
  text: 明文海卷三十四餘姚黃宗羲編賦三十四思子賦黃宗會唶荒雲稠霧綢繚紏以馳騁兮粘天谷而崩陊彼哀􅊤傾崖磊硊磳􅥁沓以回抱兮重以旋風走瀑之轟豗莾長林之蓊欎镺蔓羃以窮敻索落兮嘯罔象而舞夔魑蟋螅既喘哀喙於積葉兮訓狐厲飢吻於危枝彼巋然之新壘兮竊獨此二孺哀呌天之無辜兮慘不知其所之形眇眇而日逺兮魂煢煢而誰依月逝年徂其炯神朗識恐隨風雨而遷改兮又何况綽約之容姿何豫生之多虞兮變故曲折而交推兩兒見屠於匝月兮行道之人亦為之心惻而凄其走房櫳而悄滅兮坐書室而如疑倚道傍之榆楸見同學之翩翾兮猶獨憶其佁擬而不來淚漬篋中之陳衣兮重之以殘書弄墨之紛如豫章之折於拱把不足見其巃嵸干霄兮秋蘭之閼其芽茁又孰佩夫繽芬芳菲忽矯首以逺望兮目怐瞀而神馳休歇行流兮痛返逝之無期使死而無知掬化安之壞土以封汝骨兮猶愈夫爾髆我骼甲脊乙脅漂泊於河壖江湄死而有知兮則上為皇祖之宅兆旁為汝叔之墠壝其中絫絫多汝戚兮又奚若夫伶仃而無歸乘化安之玄鹿兮或先驅之以角螭化安山舊傳有玄鹿又有蛇者角觺然上出或曰虬也駭杜鵑之爛漫兮俄霜楓之披離春花秋月風晨露夕兮汝宜挈汝弟以追隨北山之缺其上可登以望汝家兮慨然念平昔之遨嬉野煙倐起而轇輵兮梧楸尚倣佛乎舊籬超埃壒而薄神霄兮始皎然蛻塵寰之垢滋彼天地之無窮恆千萬年一瞬兮耄殤又區區相較於暮􅀈思平生之誦讀兮精力過絶乎等夷不能口論手畫少有所施兮長松之下白石之側後千載猶聞其哦依江妃賦俞安期鄭交甫客遊於楚星紀載期邈焉索處忽焉以嬉遘彼江妃於漢之涯微詞相感譎乎見紿懷佩既失靈迹莫追五色無主纍日歔欷楚王聞而召見命抽緒而賦之乃湛思其授受放􅜜其風儀爰濡毫而引牘遂掞藻而敷辭其辭曰粵青祗之發春兮草木菀而華生倉庚熠其振羽兮翟鷕鷕而飛鳴羌豫有煙煴之思兮若昧旦欲辨而未明聊紓徐以遊步兮寫羈懷之怦怦遂乃遵修術履神區江之臯城之隅或蕩心以遐矚或寄目而踟蹰休乎漢南之喬木覯彼東門之如荼帷裳成塞鉛黛成林笑言諧謔亦各有心班兮雜遝匪我所歆復有二姝末至遵彼微行遺視成采揚顔施光姱容特顯態無定方劃兮若排積晦而燭龍吐耀恍兮若擁卿雲而文鳯驚翔其輕弱也絳氣遊彩叢霄中其清映也朗月流景方諸宫其狀則曲翠隨眉層波溢眥頳唇欲合瓠犀微翳膚肉似豐骨法且細屈鬋如玦髾尾如蠆蟠鬒聿修不屑施䯰靨暈瓊藻氣吐玉㽔皎非凝粉澤豈塗脂步珠塵而不動倚條楊而不欹仰若寄傲俯若銜思衆妍屢變若合若離其飾則寶葉扶鬟鏐蕊承足繩璣絡臂裁碧耀目鞶帶飛飛香纓馥馥簮以黃支之犀曵以苕華之玉纎紈致乎東齊明錦濯乎西蜀金縷藝黃離羅微緑腰約綺裳項圍繡襮袂舉揚綃襟垂掩縠表裏交映參差相屬其佩則北荒之明月莫難之夜光英英粲粲焜焜煌煌鑒容益媚當暑昭涼爾乃屣行則芳躅並進少頓則衫袖交聫雙顔合美異體同妍回颷欲舉皓腕相牽既振迅以辭避復矜顧而回旋若將迎而欲却類含意而待宣余斯時也目轉注而不定魂搖曵而翾翻欲迫之而恐逝懼招之而不前冀承間而送欵復投會以告虔歌曰遭子於漢之臯兮我心勞兮願有要兮子之佩爛昭昭兮於是麗姝安軌正儀情會體近步整若遲履輕若敏解彼明珠爰赴所請口鮮違辭色無微愠舉而授受其光清炯握之分明懷之諦審既而意警神超氣愈願適行才十步時僅頃刻再探懷中佩已旋失劍云善亡珠豈生翼回瞻麗姝亦不可覿即蹇修無由以通辭象罔不可以求索矣羲輪既頽望舒將御佇立敞惘尚希神遇居人問之余告之故彼曰噫嘻此江妃也出而遨遊不可逑也人祗異軌毋爾思也始乃循來陌曵歸策顔藴勃趾踧踖疑結夢之乍還逮䘖憾而未釋楚王曰子懷惸惸亦既勞止楚國雖隘幅員千里豈無其人惟肖彼美試求得之願以賜子邂逅賦孫七政昔子雲謂相如之賦曲終雅奏有近於戲若楚騷則詞雖逸宕長寄心於君王本托曲以寄雅非廢雅而為曲也此固屈宋楊馬之流别與豫間居作邂逅賦倣佛斯義雖矯逸以度曲實沖逺以攄懷知音者寡聊自適情云爾夫何南國之佳人兮獨希世而含英裁輕綃以結態酌皓氣以舒情非霧非煙信自靈區謫艷傾城傾國偏能欲界韜精翔千仭而歷覽遡羣玉以孤征歎紅顔之薄命悲代幻之朝榮於是則忘念沈灰氷心錬璞鴆毒紛麗膏肓恬莫去復去兮翩翻恍惚盡蟲沙玄又玄兮倜儻沖虗總猿鶴西陵松柏羞結同心東海滄桑愁拋宿約時則有廬山白社之舊竹溪仙逸之流尋嶽未遂天涯寡儔問芙蓉之别館弔鳯臺之遺丘簫聲既斷弄玉偏留乍相見兮恨相見之獨晏倐相知兮悲相知之即離劍術銷而神光在狡獪盡而丹砂飛片片青霞誰家握瑾採採明月君心有珠俱云有意求仙未偷桃實不意無心得果却付交梨贈我兮交梨莫報兮瓊芝訝君情之低回使豫忽焉踟蹰意朝雲若暮雨兮異宵夢之幽期倘漢臯之神女兮寧解佩以相欺欲凌波而微步兮又宛然而遘之實神交而意接兮疇云色授而神怡夫何舉世皆腥穢兮獨申以蕙蓀之芳好握水鏡以玄鑒兮懷冶化於窈窕謂心巧而善幻兮珠為情兮玉為盻謂雅􅋵以幽真兮嬌疑盡兮態逾新詫佳人之若神兮藹出沒兮無垠以江月之杳眇兮灼流光以相親若江風之綿邈兮襲清虗以懷人悄倣徨而佇想兮倘夙緣兮心殷殷乃歌曰絶代兮佳人皎潔兮芳芬恍邂逅兮一見指明星兮殷勤又歌曰佳人兮難再得海水可量兮情難測𠂻腸結好兮永無斁御彼冽風兮蓬萊宅歌既闋兮月揚輝佳人倚曲兮氷絃悽芳草年年兮向君萋萋願君採佩兮長相思顧司封傷寵賦祝允明滿不久秦臺月聚不住楚觀雲雲凋月墮兮紅粉黃塵於是緬邈宵情芊綿晝臆憐生信誓之留怨觸箱奩之歷則有鈿叉孔翠繡領鴛鴦窗窺鸞照珮解風篁髮燕草之碧絲臉越渠之紅房望惑弓鞋兮隻脫魂迷黼帳兮半張昔喻麗於群芳茲萃芳而何益悲瑤草之不聲痛瓊華以無息苦莫苦兮斷知心悼莫悼兮難國色撫幽棲兮淚盈巾傷四海兮無佳人便為巫女終成夢便作姮娥有底親銀蠟九枝光緑沉百和香香香香不歇光光光不絶瑟鼓殘兮湘水咽紫簫吹斷兮黃泉裂雖令魂返少君丹假使貌成虎兒筆爭如歌出李延年會道佳人難再得幽期賦董夢桂晨攬衣以感懷悵終宵之反側魂歡洽而先往身悵罔其難及夫何修阻之乍生乃興思乎疇昔當邂逅之漠漠繼漸及而溫溫心曰許而迹違每接就而逡巡逮綢繆之已至屬繾綣之方新得頃刻之真契覺三秋之渺恩怪曩日之不我逑怨今日之牽豫心春風融融宵月朧朧與子同期期我房中擬開簾而竹動訝玉宫之早扄畏多露之沾草謝風雨之妬紅鳯孤飛而夜唳感求凰之不逄步徘徊而氣結徒抑抑其何從猶棄擲之未忍遙相對而訴空挑短燈以嗟咏長吁伴乎曉鐘當斯之時翻憐吾子子心伊何我情伊爾目應眩夫花隂耳或驚乎窗紙匪轉展而難寐必夢魂之勞止一愁兩分誰約誰侈料芳心之善懷想柔情之過此嗟哉形開若寐未酒而昏離思渺密厥緒難尋自審失之孰究吾心千秋絶艷賦王驥德吳郡毛允遂公子出其內所臨錢叔寶會真卷周公瑕為題曰千秋絶艷命豫作賦卷中悉次金元人所為傳竒語稍波及賦曰美夫河中麗人洛下書生㛹娟蕙質繾綣蘭情嫣然色授眷兮目成宛轉生前之恨嬋媛身後之名爾其漢皋春麗蕭寺花濃心勞金屋人閉珠宫托嫺辭於尺素尋芳信於飛紅逮夫佼人月下綺樹墻東既緘情於麗句亦示赧於頩容凄其良夜黯彼回風於是酬卓琴兮多露薦韓香兮下陳雲捧瑶叉不負明星之約粧留角枕猶嬌在闥之春乃至王孫之草才青河橋之栁堪結殢錦帶於新歡愴羅巾於生别投夜絃而留連報春鴻而凄絶環一解於中摧鏡長分於永訣憯紫玉之張羅悵青陵之同穴海填衛而難平血啼鵑而不滅則有南宫辭客北里騷人繡腸欲絶彩筆如新韻清商於子夜度艷曲於陽春亦有丹青點筆之工盤礴含毫之史憶彼多情圗其有美髙唐片障崔徽一紙未若秦家之婦張玄之妹麗比舜華才方錦字抽烏絲之逸藻聊試隃糜榻粉本之餘妍詫傳側理夫其塗黃乍就浮渲欲飛額瞬似語態弱堪持嫵然而狎俯然而思粲然而笑蹙然而啼神情綽約芳澤陸離洛水無聲之賦金荃設色之詞乃知凡理有窮惟情無盡感於決脰愁堪雕鬢楚楚短綃茫茫長恨俯仰今昔我輩差近噫嘻崔娘窈窕天人其儷張郎才地則鈞嗟紅顔之薄命怨錦翼之離羣抱丹誠而不化咏白首而難陳即憔悴之見絶仍掩抑而含辛悲絶艷於既謝盡麗辭於長顰倘有情之披攬當三慨於斯文嬌女賦唐寅臣居左里有女未歸長壯潔節聊賴善顧態體多媚窈窕不妬既間巧笑流連雅步二十尚小十四尚大兄出行賈長嫂持户日織五丈罷不及暮三丈縫衫餘剪作袴抱布貿絲厭浥行露負者不擔行者佇路來歸室中嘖嘖怨怒策劵折閲較索羡貨著屐入被不食而飫雙耳嘈雜精蕩神怖形之夢寐倣佛會晤咀桂嚼杜比像陳賦螳蜩夏蛻額廣平而春蛾出甬修眉揚而白雲懷山黛浮明而朝星流離目端詳而華瓠列犀齒微呈而含桃龜膚口欲言而菡萏呈露舌含藏而嘏蟇蝕月鬒髮圎而毒蠆搖尾髻含風而雅羽齊奮飾梳妝而逰魚吹日口輔良而蝶翅輕暈鼻端中而恆月沐波大宅黃而琵琶曲項肩削成而蝤蠐囓李領文章而霧素一束腰無憑而鼠姑舒合體修長而酥凝脂結袵微傾而鵝翎半擘爪有光而玉鈎聨屈指節纎而蓮本雪素臂仍攘而角弭脫韣履髙墻而輕颷捲霧行蹇裳而梨花轉夜睡未明而溫泉浸玉澡蘭湯而陽和駘蕩醉敖翔而咏曰纚火齊兮瑱木難簮鳴鳯兮叉琅玕絡瑟瑟兮銀指環被珠綬兮龍係臂珮璜而浣兮褶翡翠金裾鈎兮繡曵地襜黃潤兮袣方空綈倒頓兮玉膏筒綦丹縠兮素五綜麗炎炎兮倫無雙醜女賦周廷用古人以文為戲亦聖門遊藝一端也豫于舟中暇日以醜女命意造此賦焉伊彼醜女鍾此盩氣生長茅茨形甚可畏厲隂奪陽殊羣别類背滅華容潛移戎鄙惡冠女流醜踰男子唯有嫫母黃帝愛之女德內正煒煜有辭亦有鍾離膂王寵焉讜言四殆明鑒攸傳咄爾詭貌醜疾百端雄顙廣額深目頳顔臨鼻鬤髮濁舌難言粉不能白朱不能丹見者奔走聞者顣顔市童擲石鄰女羞觀欲擬形象引譬惟艱詞曰土偶分形爾被其粗獸吻肖軀爾忌其都棘端母猿爾性太愚深山鬼嫗爾靈特無敦洽犨彌爾其苖裔隴亷仳倠爾之儔儷噫嘻醜女爾胡居世固陋賦王樂善維混元之塊圠兮唾萬彚而陶甄有駁而為物兮有粹精而為人肖貌紛其雜揉兮妍媸判於兩陳辟噫氣之吹萬兮散葳㽔而繽紛此何為乎置案兮彼何為乎投溷蓋隆施之偶值兮謇黔嬴兮何心惟此有女所值胡竒媒婄儓􅤵䫪䫂仳倠有熊之號嫫母無鹽之氏鍾離才慚彥女德謝鴻妻身如橛株面類蒙魌臼頭硉矹卷鬢䰀鬌魋顔反唇蹙頗過頥施朱太紫傅鉛成黧學步失其故履效顰走其里兒植耗土而稱五極撫青陽而長仳儷逆旅反面登徒難覯三遂去閭五嫁不售不忠來諑少禮蒙詬強顔誰親飾詞孰受逄鬢愈枯裋褐彌垢衡門寂寥中情眩瞀瓦石益其委頓風雨增而僝僽束薪睇於三星朝汲憯乎雉雊嗟年矢之不居悼菅蒯之愈後傷前路之無期兮叩靈氛而卜之繇內貞而外侮兮龜告我以好詞曰去留其何常兮好醜人焉知也得者固足羡兮失亦安可訾也孤逐之屢困兮千襄主而驟榮施也宿瘤之不可飾兮説行而乘蔭固未移也彼越施之淑姿兮遂鴟夷而自寇悵魏子之嬋媛兮俄中讒於鄭褎尤物移人傾城戒畜北里誨淫東鄰遺臭史醜玄妻詩陳中冓孰與夫支離而無用兮羌飬德而且無咎何短何長何左何右何危何安何榮何垢大化茫茫無庸深究女貞待字匪寇婚媾蕉萃承匱玉衒愈謬所患不待者年子其就唐舉而問夀明文海卷三十四
