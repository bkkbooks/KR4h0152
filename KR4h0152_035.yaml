body:
  text: 明文海卷三十五餘姚黃宗羲編賦三十五輞川圖賦王邦才自王摩詰别業輞川而為圗者四後之覽勝者爭相慕焉余吏藍五載僅得兩遊然昔亭榭雖成丘墟而翠然之景天然之趣令人快心怡目戀戀然不忍去者命匠總為一圖剡於石自谷口以至鹿原寺上下二十餘里轉折步驟山巒水灣閲之盡在目前爰掇景成賦以紀其勝云爾出郭而南十里之許名曰輞峪兩山相閗水自南出深崕臨谷無路可通就山鑿石棧棧砩砩寬不過尺必須振衣怯步走出三里而後大川即焉夫川胡以輞名也水不直行逶邐成灣傍灣為村傍村為田雞犬相聞煙火相連出作入息猶有上古之遺黎夏麥秋稻無慮旱潦之失天凡十三區周匝團轉如車縛頭始至鹿原諸峯排闥水聲潺湲前為菩提之宇羅列諸天後為右丞之祠瞻像儼然面對翠屏兮森藤蘿之芳蔚背倚巍峩兮蒙古樹之槎牙􅏭嶭特峙於左兮聽飛泉之鼎沸泜洄溜頃畝於右兮乃維母之古塔松風響振於隂􅊤兮嵐霧滃其已溟山寂不聞乎人聲兮抱豫懷之耿耿此摩詰氏别業之出處也其文杏竹里二館與南北二垞年逺無存曰辛夷塢曰漆園曰木蘭柴曰茱萸沜今不復見矣雖有華子岡孟城坳欹湖栁浪欒家灘金屑泉不越寺之東西亦不能辨其孰此而孰彼也止有白石二方在水之滸其直如案四角有孔相去數尺即昔之白石灘者是也坐於其上對客欵酌寧不爽然自適乎寺後有斤竹嶺乃維之手植葉如斧斤幹不盈尺每年所産僅有數株翩翩翠袖其質如玉多被牛羊所踐踏僧不知其貴重而我始嚴以護持至於竒花美卉逞姿閗顔緣時開放爛熳重巖時有珍禽異鳥鳴飛咿軋毛羽絢彩翻翻喈喈聽之笙歌迭奏共我所適者也面南森蔭蒼翠懋林叢密有虎豹猿鹿晝吼夜啼伯千為羣而樵採牧獵之子唱和出林余與客舉杯而嘆抑何悠遊之自得既而煙光晚濃攬轡而歸夕陽已下燈月交輝依依乎再歌再咏又何知塵世之靡靡時在萬厯癸卯秋也古繪賦談宗嵗在著雍閹茂館舍逼市㕓日出入輪蹄間昏塵惡臭眼塞鼻蔑有已幾不知身世之謂何嘗偕人走廟市流眱瞑念觸物愴懷歸而為古繪賦以志感也辭曰曼方老人嘗來都市有持繪册而售於市者間取而觀之則畫古羣賢之像各為一家之目絹素陳久緣飾脫落不驚人眼率率朴朴然而丹粉雖謝神采奐然麋睫能動襟裾欲仙筆墨之妙睇而視之斯殆非人世所得而偶見者也問之其值幾何則千百為計待售幾時則於今且一十祀矣夫售之數十祀猶且售之售之數十祀不售而猶千百以招之子之不明豈有休乎繪者然然然吾嘗聞之貞志篤性勝事茂能皆有見亮之日觸於時會以興雖處之莽穴之下閟之幽暗之地不能沒其神爽遏其氣勢是以傳巖協肖像之求渭水入非熊之卜采榮南山而匡若劉祚埀釣東海足加於帝腹辟猶隋珠發水而照乘趙璧興山而敓城屈指而獨伸秦楚必爭之馬也而似鹿異域必登之何况立之都會矢之闤闠萬目洞於焚烈鑒别呈於毛髮者哉吾所以守而弗置陳之弗輟也老人曰不然人情好動而惡靜天道向變而背常二三綱紀於柱史支離恢張於彼莊此自然之數不可或罔者也今吾子所謂賢哲之象善則善矣然能靜而不能動能常而不能變坐者不得持之使立起者不得偃之使伏怒者不可強之而喜笑者不可移之而哭鬚眉者不能柔之使巾幗冠冕者不能髠之使鉗秃况處此遷忽之世習夫遊衍之流而秉勢成相斤斤弗休唯子業實不咸於人乎其又何尤子不見夫魁儡乎頭額不盈寸軀體不中尺面封中央之土身函甲乙之德倐而冒之以辨甫倐而傅之以粉墨繫惟掣之以顛倒當場俳優呌之以驅走絶域時而濶步於康莊時而屏氣於閫閾朝登鄒魯之堂莫入崔苻之澤膏沐之則為妾婦毛角之則為彘特授之利劍則殺人衒以事權則賣國前可以秦而後可以楚南可稱象而北可稱譯乎富貴貧賤嘗反顔以事仇判乎成敗利鈍且倒戈以逆敵此皆魁儡之能事為其無一定之勢寡不遷之識故日中貿之日入而婆娑踊躍於王侯之几席矣繪者聞之舉體投地反袂塞膈蒙戎包匭函金襲石盤辟足縮而去之不復敢厠乎道側明文海卷三十五
