body:
  text: 明文海卷三十七餘姚黃宗羲編賦三十七崆洞雪樵賦宋濓伊空同之拔起兮鎮嶠南之靈區翠旓繽其蕩空兮播皓氣之蕤綏章貢挾以比流兮盎土脈之滋腴穴遙通於龍翕兮勢蟠亘於欎孤信地維之與宅兮為靈真之所都則有白鶴羽人黃唐丹士闢玉為房鑄金成黍仰青帝之布帷撥赤霞而啓笥悼下土之坌濁凌剛風以徑度惟彭城之仙子兮式爛柯之遺軌謂靈奕之可觀兮意翩翩而遐舉裘剪鹿肌之花屨約芝田之蕊巾割湘雲之枝鞶點彩鷮之尾傷胡麻之未飯愛白石之堪煮踰洞真之石扉借修月之寶斧期緱笙之下臨兮庶緑文之可㖟於時玄冬屆朔風交水腹堅金莖高二鶴夜語陽鳥晝韜莾六花之聚白合溟涬於空寥幻九清之祕景闢太素之神苞奪人目精兮若流汞翻空而不定一白無地兮如爛銀炫耀於霜臯瓊林玉樹疊頴聫柯條頓忘於春緑花巧綴於晴梢乃陟瑤磴乃依氷樾膚中寒而生鱗指屢僵而弗屈丁丁許許不遺餘力已枯成采方長不折玉屑隨聲而輕墮霜莖倚雲而初積束以九真之赤藤附以千年之苓魄既逍遙而咏歸忘蕉鹿於今昔歌曰我采我樵兮太濛之野萬樹瓏􅌑兮玉光照夜孰能相從兮與霓旌而俱下於是築石竈翻金經養神火煉黃寧汞生水虎之窟鉛出火龍之扄液承太一之珠機運元華之精憑添抽之卦泰植鄞鄂之丹城逮伐毛而洗髓致隂爍而陽凝種芝於瓊玉之山折桂於廣寒之庭領襟佩於橋門集鵷鷺於王廷白簡霜飛繡衣春明近一出而持斧使九夏之生氷乃乘風而來歸兮將瀛洲之先登隔人間之風雨兮遽真凡之異程至若西鄰之子沈酣羶葷屏龜香曙笙火花春葆階舞楚銀館歌秦黃塵迷南華之夢弊屣嗤東郭之貧樂鐘鼎之遺艷厭煙霞之近醇尚父吊渭阿衡耕莘或封齊於東海或致君於華勛齊出處於一塗肻變志於屈伸世繽紛兮麗以新蠟代薪兮傷芳辰翻海水以為霖兮曽莫濯夫遊塵孰不化為胡燕兮依華榱之飛文丹禽鳴於空谷兮亦寥寥之一聞彈樵歌之逸響兮寄緑綺於秋旻歌曰若有人兮在蘭屈止白虎為使陟崇巇止皓毳回飈敷天葩止虛白內朗絶纎瑕止仁斧戕龍鏘鳴止鵜膏匪施痂弗形止剪彼薪樗扶松柏止養賢大鼎熟以烹止天下為公大道行止遡花屹立思盈盈止耽犁子賦練子寧閩粵之區有先號耽犁者耕於寬間之野而老於熙皥之鄉以告松月居士曰吾拙於進取而惟犁鋤之是耽安於蹇窮而惟稼穡之是務方吾犁之在手也茫乎其無思熙乎其自怡不啻執圭秉璧之榮而運斤遊刃之適也夫是以取而自名子其為我賦之居士曰嘻子知所以得遂夫耽犁者乎天生蒸民紛然有欲強則凌弱衆則暴獨非聖神之首出孰克為之司牧藹德禮於春生凛威刑於秋肅夫婦以別父子以屬彛倫是惇風俗返朴夫士得以遂其詩書商得以通其販鬻工得以措其巧於方圎農得以盡其力於穜穋昔者堯舜在上皥皥熙熙康衢擊壤幼恬老嬉湯武革命應天順人漸仁摩義頌聲以興洎戰國之爭雄遂下逮夫秦楚開阡陌而廢井田窮干戈而瀆威武民生斯時何所控訴漢祖大度文景無為光武明章世紹丕基藹黎民之醇厚幾刑措於斯時魏晉以降僭閏分爭裂冠毁冕僣亂相仍偉唐室之開基繇太宗之神武感魏徵之仁義歎封彛之莫覩曾未幾何藩鎮跋扈更歷五季民困常主及乎宋室之興削平僣亂開文明之景運幾跨唐而軼漢休養生息三百餘年彼畨畨之黃髮咸沒齒而無怨元氏之哀羣雄奮起鹿逐鯨吞瓜分鼎峙哀蒼生之紛藉轉溝壑而未已赫焉大明如日之升攙搶渙其氷釋魑魅匿而無形接統乎千嵗受命於穆清偃武修文坐致太平出斯民之塗炭化愁怨為歡聲是以四海之內無一夫之不獲皆女織絍而男農耕向使世途方難真人未出於斯時也救死而恐不贍又何暇耽犁鉏而樂溝洫自今知之服膺勿失雖耕田而鑿井皆歌詠夫帝力貧窮相資患難相恤租必先公食必先粒耕必讓畔以同歸乎吾皇之極於是耽犁生仰而謝俯而揖請書諸紳服之無斁鏡湖漁隱賦宋訥通判大名府事紹興周侯巨淵自號鏡湖漁隱前進士滑臺宋訥乃為賦之其詞曰猗與勝景之權輿乎維揚東區惟超南隅山水佳處鏡然一湖偉馬臻於東漢信智巧之靡誣爰渴水之築塘引山泉之來潴岸之以林麓域之以郊墟疏之以灘瀨豁之以路途中流亘城積水涵虛非磻溪而嚴瀨非齊汶而魯洙匪合流之涇渭匪會同之漆沮陋梅溪之水泓澄而清淺嗤桃源之水洄洑而縈紆川流之所歸湊雲霧之所涵濡視之無端撓之不汙曵澄練兮弗絶磨瑩玉兮弗渝逺而望兮若明月一輪湛寒光於咫尺近而察兮若白雲千頃化秋水於須臾溶溶乎無鎔錬之蹤迹浩浩乎非爐範之規模不假乎祝融氏之烈火不出乎歐冶氏之湯爐有美君子爰處爰居卓然嘉遁不狂不迂以道為師以隱為漁整頓乎舟楫蓬棹收拾乎網罟筌笟衝波濤之浩渺蕩風煙之虛無愛茲湖之四圍恍天開其畫圖其東則岧嶤東山逺際雲衢花屮異品松柏間株亂川霞而岫靄或騰翠而凝朱紛山村與野徑競涉渡而陟岨其西則會稽山秀越王臺孤峰巒屏倚林壑翠鋪陂塘盛灌溉之利商賈盡闤闠之趨散煙際之牛羊啼花間之鷓鴣其南則襟海帶江百艘千艫浪槳風帆逺泛長驅聳秦望之傑山擁煙霞之可娛天逺而樹色浮閩地險而江聲下吳其北則樓閣簾櫳臺榭參差山處水行舟楫轉輸青山壯卧龍之勢黃堂來太守之車萬家之簷楹丹青環合一郡之繁華錦繡重敷其中則鴛鴦鸂鶒鵁鶄舂鋤碧荇緑藻紅蓼黃蘆遊人畫舫泛泛徐徐歌兒金縷唱舞妓翠雲梳栁姑廟前賣魚為市道士莊畔納菱為租觀風景之變化若越女吳娃爭妍而競姝者也此鏡湖之在紹興猶西湖之在錢唐其遨遊登臨之勝蓋不少殊焉若夫和氣漸融化日初舒船尾載琴船頭載書茶竈兮蒙頂石花硯床兮白玉蟾蜍和滄浪之短歌賦孫綽之遂初寄興於白頭之波移家於黃茅之廬又若南薰生涼小雨如酥停橈沉網怡怡愈愈錦鱗勝乎河魴素類乎江鱸船漾漾兮波心之葉人悠悠兮水中之鳬纜翠絲兮楊栁棹紅錦兮芙蕖又若理我絲竿整我冠裾短笛聲斷紅塵迹踈見青蟲之化蝶看白鳥之將雛江簌洗夕陽之藕野飯炊秋風之菰載明月兮歸來共清樂兮妻孥至若六合飛雪天地氷壺短簔如蝟撑舟載徂斫鮮鱗以細烹問香醪以再沽對野橋之梅花傾蓬窗之杯盂頺玉山之就枕幻醉夢於蘧蘧隨寒暑之往來惟所好之從吾朝出而暾暮歸而晡湖上之山久而相識湖中之鳥熟而見呼放神於林泉之境絶迹於市井之閭乃有山隂高士寓迹樵夫逺訪漁隱雅意勤劬携童子以桃酒就沙鷗為友於樵漁既會相顧咨諏幕以青松茵以緑蕪屏以白蘋簾以青蒲採江菱以剝玉煮紫芡以餐珠持之以蟹螯剖之以橘奴酬酢既頻禮法弗逾話今昔之興衰論事物之精粗樵者欣然而笑曰昔陸龜蒙高致自放遊歷溯蘇交無流俗行無趦趄乘扁舟以往采載釣具以與俱觀所為而所處莫非適意以自如也張志和江湖散誕以哲若愚有高趣而酣酒嗜畫無忤色而執畚浚渠辭翰林之待詔忘百慮與百須垂釣鈎以無餌蓋亦志不在乎魚也一自號江湖散人一自號煙波釣徒二子之事與子之志同歟否歟今子際皇明之治平聞巖廊之都俞紫薇翥池頭之鳯蒼梧飛臺上之烏司諌者簮獬豸之冠牧郡者佩銅虎之符煙霞痼疾者起而獻策泉石膏肓者入而陳謨彼濟濟之多士悉萃聚於清都漁隱曰人各有志不為藏而屈不為行而攄侍老母於萱堂戲綵衣於庭除聞君臣之大義熟矣尚敢忘四海之民潔七尺之軀哉樵者曰子又知夫昔之居此郡者謝安有東山歌舞之樂王徽有剡溪回棹之譽昔之居此湖者賀監為四明之狂客方干為一世之詩逋蓋將問其故老既皆湮沒而無餘矣又徒豫古人之既逝論出處而躊蹰况吾與子樵漁於山水之間侣魚蝦而友麋鹿亦何有利縻而勢拘哉賔主釋然而笑舉酒更酌醉起携扶樵者呼童而去乃歌曰隱漁先樂於湖上兮山澤之癯舍漁後樂於天下兮經綸之儒釣渭陽而非虎非羆兮佐蒼姬以無虞遂去不復與言詢隱賦孫宜若有人兮山之坳摘瑤草兮芳桂謡朝攬轡於椒丘兮夕振策乎蘭臯六馬繫之弗顧兮謝灻茀而凌清飈豫既解玉佩以相招兮又結璚枝以繼贈訪名山之窈􅀢兮扳翠壁之孤峻迹緬邈而莫覩兮身翩躚而逺遁蹇懤悵余欲歸兮羌盤桓兮不反步遐舉於絶壑兮登塋之長坂見先生之了鳥兮擲青藜而余挽嗤余匪巖谷之高士兮詫豫渺渺而自殊不溷世而隨波兮焉灑之乎此區余跪敷袵而致辭兮援載籍以為説慕肥遁焉可終兮懷隱淪迹又焉用滅昔前聖之棲逝兮卒與世而留名有虞之躬稼兮受臣位而佐放勛摯處莘待三聘兮成湯用之四征説巖棲以避世兮乃卒相夫商丁惟巢由之奮志兮謂俊乂之既獲卞隨務光屏於深山兮誠際時而中悅夷齊採薇登首陽兮恥二德以事周園黃隱如高尚兮終焉翊夫漢猷彼皆始潛而隨躍兮何夫子之煢獨既埋名而莫顯兮斯以身為稿木天生材必有用兮雖治世將必籍人寧塊焉以長往兮耿不念夫修名吁嗟瞀瞀未知隱之為義兮胡篿之徒執也言有由而行有謂兮隱與曜諒不殊也使隱而可留其名兮亦何隱之足稱外逺蹈而內甘譽兮斯終南之捷徑韙先哲之勒勛兮詢有志而未能泯虞歷山而升臣位兮紛其始之不逄摯耕野而逺已兮胡天民之自崇令傅説卒辭武丁兮何一求而遽從黃綺園甪採芝相羊兮炯猶知時之為漢夫惟蛻形迹以自臧兮必與世而無見循軌轍而中悔兮又奚望乎是也不凝心志之固兮雖已屆而猶去也既呈宫而辭謝兮甘木石以為鄰摶九萬而麗日月兮請各從夫子之所營乞者賦樊鵬樊子昔遊西秦至於太原南過連雲北阻岢嵐東登華嶽西陟臯蘭千里三宿百里一餐晝弗安坐夜或不眠用是罷倦攬轡東旋時維霜飈嚴肅萬物凋殘至於洛陽之野周道之邉見一乞者枕塊而眠不如懸鶉百結不完帽不蔽頂履下則穿繫瓢於腰橫杖於肩霜露侵體草壤相連樊子側然憫之呼而問曰今聖人在上雨順風和百穀用成品庶繁多庸曰斗麥酒食委錯人人獲所禽鳥不羅子丈夫也獨何行乞而苦如是乎乞者乃伸肱延頸舉頭張目若不聞也者而答曰吾乞者也大夫貴客何得下問之樊子曰吾欲命於有司責之閭長加女冠履製女衣裳授女田宅歸女妻房止供賦役不為獲臧子欲之乎乞者曰嘻嘻大夫所言何其憊也人生太虗百年寄客役智勞形均可哀惜故黃鵠高舉良驥羈的麋鹿逺害􅀈牛祀禘堯舜誠愚巢許信知周孔以虗莊老則實自然合道禮法牽制嗟彼衆庶惟日匆匆身應百役心有萬營姁偷喔咿常若悸驚精氣耗竭魂夢沸騰富貴貧賤異類齊名垂老不寤乃殞厥生今我方視宫室為囹圄冠蓋為樊籠妻子為債負禮樂為嚴刑將以宇宙為室日月為燈大地為席玄天為屏清風為食甘露為羮一身有餘萬事為輕無所繫纍喜樂雍雍時遊㕓市取醉不醒所餘盡棄用之不窮不知其辱不知其榮不知其死不知其生雖南面之樂視猶病症方哀衆庶之癡拙咸莫望吾之高隆大夫乃反欲汙我髙潔卑我垣墉非有仇怨何至苦楚而相仍於是樊子瞿然加慚惘然自失傷今昔之所為遂為之長嘆而趨去明文海卷三十七
