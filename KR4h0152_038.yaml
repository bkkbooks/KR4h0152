body:
  text: 明文海卷三十八餘姚黃宗羲編賦三十八禽蟲一聞早蛩賦髙啓至正丙午五月十三日夜坐中庭聞蟋蟀之聲感而有賦龍集丙午仲月維夏祝融當衡蓐收伏駕悵炎氣之興晝欣湛露之流夜於是蓮塘涵清梧館閟靜纖絺方御輕箑未屏息號蟬之繁喧罷棲鵲之暗警何隂蛩之忽鳴寤余寐而獨省稍入户而侵幃才緣階而傍井若暑徂而律變簟色凄兮欲冷迅颷發兮騷騷斜漢回兮耿耿方其或咽如啼或激如嘯喓喓孤吟嘖嘖相弔蔭淺莎之蒙籠翳深叢之窈窕已厭聞而愈逼乍欲尋而莫照含清商之至音非假器而為妙促素機之惰工亂朱瑟之哀調未連響於絡緯暫依明於熠耀若乃靜院間宫荒園廢驛草長幽扉苔滋壞壁候月光而未旦聽雨聲而乍夕久棄長嫠之婦逺寓窮居之客莫不對境興愁攬衣動戚謬感年之將逝誤經寒之已積影就燭而誰依淚橫襟而自滴不待風凋漢苑之栁霜隕湘皋之蘭茍斯聲之接耳即掩抑而摧殘余何為而亦起答悲韻而長嘆聞七月而在野實詩人之所志今胡早而不然豈天時之或異乘火令之中衰應金氣而先至推象類而占之若有兆夫人事然物生兮何常庸詎測夫玄意抱微憂而何言乃拂枕而復睡畜鷹賦劉球惟鷹之為鳥有號曰鷞鳩鍾炎精以為武德稟金氣而多伐謀習學則時乃夏祭鳥而天以秋威以時養翎以日修非其類不與非其林不休此羽族之雄傑百鳥所不得儔也是以有炳其文不一其色竦膺而昂脰博頸而健翮尾以合盧為貴目若點漆之黑喙曲於酋矛趾利於鐵棘望逺兮若愁胡立屹兮若置石髙舉則飄然凌乎九重之霄漢下視則廓然見乎萬里之山川倐然閩越忽然幽燕嶽靈不能障川后不能延其奮楊也有尚父之勇其捕逐也有子産之賢其數飛也髣佛乎學者之功其以小制大也兼總乎御史之權故百獸望之而迹斂衆禽觸之則軀捐豈有情之好殺蓋亦天使其然也一旦應明詔沽善價貯雕笯覆黃帊足紆碧絲之縚以為常首冠繢韋之幘而少謝脫風霜於渤澥之濵濡雨露於闕廷之下顧玩嘆賞徘徊堅駕乃命鷹坊寧厥攸舍處之溫涼之室棲乎丹朱之架肥鮮飽於歲月食息時乎晝夜幸遇比乘軒之鶴不殊親愛雖入懷之鷂莫跨使其才不絶倫則是寵也亦何由而迓哉逮乎閉蟄屆候冬狩及期萬乘雷動億騎雲隨則臂以金吾之衛士乘以內廏之驍騅左右乎紫鸞之駕後先乎翠鳳之旗入泱漭之野以較獵臨奔逐之時而脫羈是宜竭所能政厥翅與西旅之獒戮力東海之豹合勢大搏熊狸小殪兔雉獻獲虞人奏功輿次以羞大庖以實賔器以為乾豆祖廟有事思效報以萬一求以免乎素餐之愧則於恩為不孤於德為無負茍飢則惟人是依飽則髙飛而逺去則雖有矯矯之翰善攫之距較名而考實曽鴟梟之不如若困厄而賴濟於人為臣而叨食於主蒙其施當懷其報可不鑒視於鷹而思所以自處乎異鳥賦桑恱豫應會試之京中乙榜除江西泰和縣儒學訓導時姊丈錢君世恆以進士宰阜平因迂道訪之既至黃槐見一異鳥形大如鶴五彩爛然其步若凝其止若懲疑驚曲木者嗚呼是鳥乃靈囿瑞物而與雁鶩同棲遲於荒煙野水之濵不可惜耶因為之賦以弔落寞云詞曰出都門以南騁將存戚乎阜平亂山崷崒莫知其名爰有異鳥止於林坰目配日月聲含宫商天孫收文於兩儀龍女取色於五方摛毛繪羽組織成章羞山雞之錦綬鄙皋禽之素裳肯鬭慧於鸚鵡宜接趐於鸞凰想其遭嚇于于值抵默默思冥西池神會南極巢凝天根飲期月窟孰忍拔乎一毛以毁傷乎六翮茍盡命於大庖視汁滓為恩澤捐微軀以效用異稿死乎山澤繞扶桑以三匝悵天風之未積覽八表以無羣甘荒壄而遁迹若乃朝翔齊魯莫回幽薊愁雲凝空淡日照地傍易水而孤吟盼金臺而一憩返荆軻之英魂回燕昭之生氣匪寄林之常質合虞人之見棄豈不顧望凄涼徘徊警省瞻層漢而忳情望長空而弔影霜映爪而肌寒月穿喉而心冷嘆飛烏之迅速知微生之非永安得不以入谷為安居遷喬為幻景也哉嗚呼飾以雕籠樂以鼓鐘主人寓目春光融融爰噍其音爰瘠其容用違所樂與棄同宫吾又安知何者為塞何者為通何者為達何者為窮雀瑞漢兮同神鷁飛宋兮何凶轉千古以為今合衆異以為同庶物我之兩忘寄得喪於虛空感雙雁賦石珤己未歲或餽豫雙雁育於庭中問其從來曰弋人獲之也雖復窮蹙雅有髙志蕭然獨立若賢士君子罹困侮遭播越而耿介絶俗固將終身也豫既悲之而惜其未能即去乃作感雙雁賦何日月之徂邁兮草若木其易黃慨雙雁之翩翩兮去霜雪而南征彼弋人之慕之兮乘冥飛之未揚吾徒違其日逺兮中道失而悲鳴昔南發於衡湘兮北又逾乎翰海既隨陽以定居兮又銜蘆以伺殆行伍而進有律兮豈知周之不逮乃為罻羅之所收兮命或懸乎葅醢噫嘻悲哉物莫不有時兮時不可再來一失其幾兮胡人不哀方得意而逺適兮恆一舉而千里傳海上之遺書兮歷烏孫之故壘明妃去而張弦兮文姬歸而按拍感中夜之哀吟兮寫萬里之明月豈不居危而思安兮悲羽翮之既傷相眄顧於中庭兮獨徙倚而傍徨棲不於茭蒲兮失風雲以為翔忽流影之感豫兮聲激烈而慘惶孤臣失志而惝恍兮貞女聞之而淚零維國逺而交疏兮茍𠂻誠其未明昔仲宣之去都兮踰荆江以淹滯陵失援而喪身兮亦胡為國士梏南冠之鍾儀兮縶越吟之莊舄相賢哲之不免兮固流離其焉悔余獨怪夫童子之無知兮恆蹴踏而呼之貿貿焉其欲往兮顧雞鳬而去之念天秩其能序兮內行純其有别富與貴其莫淫兮豈威武之可攝余獨好此髙志兮薦芳泉而具粒相徜徉以容與兮知謝世之可食羌欲舉而低回兮臨干磐而欲放羽被鎩而未齊兮愛莫能其助長鶴既鳴於九皋兮白鷴翩其逺歸有鸚鵡之能言兮亦振迅而西飛惟昔先王之觀化兮順物性而明人倫不使山者居澤兮不使水者居中原誠物情之各適兮亦何必豢虎豹而羈麒麟古道逺而不可見吾與汝其焉往離憂患之孔多兮世紛穢而鞅掌無忝爾所生兮吾茍得其養指歲晏以為期兮雖困鬱其奚喪亂曰吁嗟雁兮其德一兮其進有列不輕配兮是宜用之為儀大夫執兮雖則困窮心如結兮彼人而禽胡可説兮孔雀賦張治道嘉靖庚子余逰藩府見孔雀四一雄三雌佳麗間雅珍竒可愛西北之人不識此鳥偶一見之目耀神聳衆賔歡賞余亦歎羡感異驚竒觸情動興惜王不授簡才阻即席歸為之賦以遺同好其詞曰值崢嶸之歲暮遊佳麗之仙洲見南方之竒鳥立浦嶼之清幽性馴雅而弗驚色倏爚而寡儔稟金火以成形故文章之孔修怒則危冠間則舒體尾屢變而如雲貌恂恭而有禮雖寶愛之周身實珍竒之在尾金閃灼而浮光翠繽紛而極斐步欵移而幽間舞按節而迤邐屢却顧而自矜每含情而獨喜見服彩而生嗔疾文章之奪已值晦隂以藏形遇朝陽而刷羽氣糾糾而射人聲鷕鷕而逐侣離炎方而更珍非江北而為枳遂嬉逰於宫閣謝飲啄於蓬芑雖鸚鵡之能言何靈表之堪比方其始也千金勿惜購自南方致不單來到必疊雙跋山超海踰嶺越江鳥尊人賤地逺威降期一毛之不損庶千金之可償保一二於千百謹存歿於毫芒恐風土之弗宜慮寒暑之相妨經年歲而始至豈日月之可將若乃綺筵初秩佳賔咸蒞罷絲竹之孔歡命雅觀於禽類爾乃整步肅容揚尾戢翅襄首蹻足斜盼流視意象如思動止無忌舉喙昻眉似陳其意我生何地兮我處何鄉恨不如鴻鵠一舉兮萬里翺翔華屋非不可娛樂兮奈離恨之鑽腸抱幽衷以徙止歷信美而倣徨雖極人之觀美徒增己之悲傷既來路之弗知又雲天之渺茫不假容而強顔何異域之流離逺故山之羣匹懷嶺表之差池類南冠之楚囚每降志而自卑終惠養以畢命願委身而承怡庶無入而不得同達人之隨時蠛蠓賦張治道何蠛蠓之微細兮秉隂氣而成形肖蚊蚋而時出兮恣上下之營營天將雨而靉靅兮固如舂之弗止風聿發而䬐猛兮旋如嵦之靡停飛則罔離息則靡散雨騁昏朝晴失夜旦攢仄羃歷拂汩糜漫雖托命於逢霖終絶生於覩晛時夫蓐收秉令少皞専秋商風震烈密霧四流草木搖落風氣颼飀鳥畏濕而藏羽螢韜光而暗投斯時也爾何地而不生生何處而不遊蕩漾閨閣綿羃林樓既挾風而低昻復帶雨而紛糾將撲之而不滅誰視之而可驅叶伴螅蟀之幽響雜落木之飄蕭叶胡杲杲之不出將攘攘之靡休雖禦冦有取乎湯問喻道不嫌於孔丘而余也終睹之而靡樂每見之而生愁鵲賦李東陽爰有靈鳥集於中林修尾長喙玄衣素襟皎皎竒質冷冷警心我有嘉辰懷此好音若夫飛甍峻閣繡闥雕楹旭日始照纖飈不生茂樹芳潔繁隂翳清忽促刺以雙透歘翅翀而迅征刷凝鮮之委羽寫宛轉之幽情紛衆啅以爭墜屢馴飛而不驚晴雪衝騰其下上間華匝地而縱橫爾其乍東乍西忽近忽逺棲初危而不定去未極而終返或周旋其却顧或撇捷其將轉方小佇於中庭誤遲歸於别館曳餘音於未絶裊柔條之半綰若乃玉關遷客金屋佳人淹沈幽圄之士雜遝髙軒之賔託春心於錦字迓曙色於雕輪聽泥金之小敕擁織翠之重茵曉枕驚夢春山罷顰莫不窮途拭淚幽谷生春或擎杯以酬地或倒屣而迎門嗤村鴟於牖户怪野鵩於水塵不利俗以投好徒增疑而召嗔試比物以引類信兹禽之足珍乃有上苑虞人五陵年少挾孤彈於懷中探危巢於木杪智藏乎其無形禍出其所不料豈百金之足圖曽不滿夫一笑物固有所偏工意固有所獨適故知來歲之風不能庇一卵於終日報羅幃之喜不能解雙顔於漆室彼世態之無常徒因之而太息復有梁州金印月浦銀橋羡崔梁之窈窕駭魯木之翔翺信慌惚而莫究徒夸浮而可嘲吾將使茂先卷舌而却走成式遁辭而先逃見天機之流轉知造物之非雕坐觀物以自適聊寄情乎離騷鳴蛙賦顧璘嗟余病之眩瞶閴虛館而澄神何汙池之湫隘聚羣蛙以為鄰遭暑雨之淫溽鳴聲沸其聒人憎豫懷之煩瞀竟長夜而達晨嘗觀夫蛙之為狀也蠕動沮澤化始科斗匪鱗匪介形質甚陋修脛何趨怒目何詬囊氣於腹鼓聲於口呱呱閣閣不中音奏羣喧衆噪不辨誰某幽人掩耳羇旅疾首矧豫卧病無所避走將垂餌以斃之又不足以充君豆少焉隂曀既澄皎日初出鳥鳴嚶嚶蛙聲盡息豫乃䇿杖臨水倚嘉木而歎曰吁嗟萬物隨氣陶鎔音量異度莫可齊同乾鵲何吉鴟鳥何凶鳴雁何拙鸚鵡何工故唐虞受禪舜禹雍和湯武放伐伊吕攫拏七雄虎鬬頗牧橫戈稷下濫説百氏喧譁大化斡以軒輊雖天地其奈何星何塞而滅影雷何侈而轟車彼衆籟之噭嘯吾又何怪乎鳴哇誚沙燕賦顧璘河朔之野川崖壁起有鳥曰沙燕穴居鷇化以陋見全厥類日夥人舟過驚則飛噪憑怒余與八崖子惡其驕也並作賦誚焉嗤彼沙燕翾翾川湄不巢而穴託體何卑族類冗瑣毛羽褵褷大不盈握弱靡自持象恧玉叉棲惴華榱祥乖玄卵貴失烏衣堁塊堇户鼠壤資飢朗日弗照清風鮮吹童稚攸害蹂轢橫施莫假矰繳矧乎罔罝嗚呼是淫譟而雜處惡濕而居下者邪是獺以為魚鳶以為鼠者邪是泥啄而風舉者耶是旅獖羊以為厲藪者耶羽不飾旌旄肉不登鼎爼狡伏而惡寒􅏥動而附暑譬之人倫穿窬是伍請付之鬵釜明文海卷三十八
