body:
  text: 明文海卷三十九餘姚黃宗羲編賦三十九禽蟲二相思鳥賦莫雲卿惟鴻化之生生埒萬類而和均溥醇精以繁育亨品物其無垠丹鳳産而徵聖碧雞降而稱神鸚鵡獻於遐裔孔翠貢於罽賔魯史書鴝鵒以紀變姬公託鴟梟以自伸鴛鸞啄實於梧竹鸑鷟兆興於周邠玄鵠矯征於千里化鵬揭象於九旻雀覽德而棲漢隼表異而集陳何斯禽之微璅亦靈慧而多仁羽則飾而緑襟的若染其朱唇毳含金以雜紺翅鈿碧而垂紳體盈盈之媚態舒咬咬之好音偕伉儷而翔集永顧利而同心無蹇修以通辭詎天作之良緣每遨嬉於險峻時升降於嶙峋或相呼於岑蔚亦招類於松筠忽芳聲之逺揚羡冶容之可珍乃命驂乎陽子遂較技於虞人掩寰區而播弋竟野曠而張罘既􅛺􅛺而莫逝乃浚浚而自投雖罹難而不怖惟返顧其匹儔始翕翼以順命終見畜而優遊於時置以雕籠罩以黼裳啖以珍果處以蘭房若夫六翮漸成資德馴良乃啓牖而縱往復留配而相將彼脫樊而翅奮此離羣而倉皇欲淩霄而不返更惆悵而若狂忽斂翰而來下集故地而倣徨流微睇而綿邈渺容與而徜徉恨拘肆之異途情相向而悢悢飛徐徐以翋𦑲聲噭噭而淒其闒輕枝而未至纍顧步而棲遲嘆孤鸞之久隻似别鶴之逺離曳清風以黯黮帶鮮霞而差池或往或來乍驚乍疑願同居以畢志雖羈幽以無辭發采緑之佳章詠東山之麗句效海鶼之比翼悅朝雉之雙飛愧鳲鳩之逐婦羡鷦鷯之安棲雖縣情於巷􅳾終釋兹而在兹往者懷來以降止留者佇伺而存思聞啾唧之呼求見蹈躍而外窺豈長門之多怨乃尾生之有期爾則闔其後扉褰其前帷輕舉飄颻誘而入之雄雌狎羣嘈嘈道悲交頸接足誓無捐遺笑朱婦之不德薄秋胡之無知肯中途而多適託中天以恆隨願擇林而憩止將感愛而來儀慕明慈之施惠雖及物而務滋歉荆榛之末質陋壠坻之凡姿感隆恩於既渥乃日侍而相怡竭𠂻誠以委命豈終始之異思相思鳥賦葉憲祖鳥大如爵朱咮褐色雌雄並棲捕必雙得如縱其一百里尋赴名曰相思職是之故戊辰冬集龍山殆以千數偶有籠致一雙者戲為賦之絪緼所化類必有耦血肉之物雌雄牝牡繄有合之為歡逮仳離則為咎兹羽族之么眇兮固孕氣於玄黃詎配靈於鸑鷟兮並媺乎鴛鴦亦胡比鸚鵡之能言兮鷹鸇之摩秋蒼賦形非饒稟性則異情惇仇匹誼叶専摯猶木連理猶花並蒂惟沒世以追隨無中道而捐棄偶不免乎羅罻或見閡於樊籠一目可脫百里必從别有美而弗顧甘幽縶之與同余自去冬始覩斯鳥羽衣楚楚亦既馴擾晝共啄兮欣欣夕交棲兮若抱彼鷕雉與奔鶉固不足以比數兮即比翼之鶼鶼亦遜兹之情好名曰相思於稱不虛疇能似之其伊人與指皎日以為誓兮願同穴以安居樂伉儷之相守兮靡曠望乎居諸至若嘉偶不諧麗情中斷音乖琴瑟星暌河漢侯門有陌路之傷溝水有分流之嘆洵薄劣之可嗤顧斯禽而顔汗嗚呼情脈脈兮無詞明月千里兮空期搦素管兮長相思後相思鳥賦葉憲祖鳥名相思以其從一而必歸也兒子華滋試之果然已並縱之遂飄然長逝矣余聞之更快沈日倪吏部慫恿入賦中作後賦澤雉畜乎樊中訖未神王矧兹情種曷勝摧喪去復回兮亦既勞止居者望兮亦既號止捨彼寥廓來就羇囚覩兹微鳥恩誼何稠是非忍人胡寧汝留維我小子類有心者抉彼藩籠並為縱舍縱囚若唐宗之庭開網若商王之野任所如於廣莫之鄉恣和鳴於叢薄之下悲哉人生既險以巇每當盛年寡合多離閨人凝愁於關塞征夫絶念夫扊扅覔徐郎之照兮入侯門而忸怩裁蘇氏之錦兮悵道逺之逶迤歷間關而偶遇蓋不可乎庶幾此千古之長恨鍾情者攬筆而歔欷孰與斯鳥之得所接翼而聨飛余不得重招斯鳥而告之將介鳩氏以致詞爾其就間而避患審處而察機偕爾族類娛爾唱隨無復為人所得而徒寄爾之相思哉憐寒蠅賦駱文盛吁嗟乎寒蠅爾胡為有生繄氣序之流易歘涼飊之襲楹念爾類之尚繁顧非時而營營豈弱質之能久諒寒威之莫勝爾乃僵矣其形悽矣其聲既蹌於飛復蹶於行方縮縮以憔悴遂奄奄而伶俜點汚莫施其技攻鑽曷見其能或沿几而莫起或觸櫺而輒仆障不施以曷入麈不揮而先墮進退踡局將焉攸措吁嗟乎寒蠅眷言爾寒能無爾憐感念疇昔忽復長嘆方夫太昊司辰祝融揮鞭赤日在地炎威赫然爾於斯時氣適志便蹺足洋洋鼓翼翩翩翕兮類征豗兮羣喧逐汚湛穢醉醲飽羶弗召以合袪之莫殫恣意一時貽患百端吁嗟寒蠅詎知物從化遷時不可常惟暑爾乘寒宜爾藏庶知止而不殆或自逭於喪亡爾乃淹留濡滯自掇其殃獨不見夫蝠遊以夜梟鳴於晦妖狐乘昏尸蟲伺寐蓋有所肆尚有所避也豈趨就之懵懵能自逃於顛蹎哉吁嗟乎寒蠅始豫爾憐亦終爾患念死灰之復燃將殞枝之再蔓矧羸豕之蹢躅惟易繇之明鑒爰命童子攘臂執紼爾撲爾摧用殄厥類靡令孑遺羌除惡之務盡弗自嫌於乘危庶幾乎庭宇虛靜幃幄搴開俟南風之景延當時物之葳㽔絶擾攘於爾輩欣四體之悠哉聽秋蛩賦顧大典戊寅之秋余官舍間居清宵孤坐鳴蛩四壁逰子多懷悽然感焉因作斯賦若夫溽暑既闌商飈始至悽矣客心悲哉秋氣夜如何其夜未央獨處廓兮私自傷􅑀幽軒兮閴寂撫孤幌兮虛涼颯颯兮聞空階之墜葉哨哨兮吟暗壁之寒螿始躍躍兮振翮於中野既喓喓兮遞響於西堂逺而聽之似斷而似續近而即之若抑而復揚爾其晚砌籠煙夜堂棲霧斂怨向隅含情欲訴哀韻沸而紛流繁音促而叢聚雜雁聲兮嚶嚶而慕羣伴烏啼兮啞啞而待曙乃若銀河錯落璧月徘徊蕙帳髙褰蘭缸半輝聲啁哳而未輟思瘀鬱而淒其至若暝色凝寒沈隂流濕獨夜無歡荒苔翳室客愁霖而欲賦鳴當忩而轉急爰有淪落畸臣流離逺竄賈傅長沙屈平澤畔懷故國以心搖望帝閽而目斷感蟋蟀之宵征蹇煩憂而永歎又乃玄宫潛閉紫闥髙扄秋深永巷漏斷層城翠華不御兮履綦絶玉階罷迹兮網絲縈飄回風於别殿亂絃管以淒清載有逺塞書沈中閨涕隕鐵騎生寒羅幃乍冷奏逸響於鳴砧罷流黃於織錦雜耳偏依翡翠簾驚心故傍芙蓉枕又若貧士失職羇人滯留秦裘已敝和璧空投悵蕪途而自阻處蓬室而誰儔方下帷而凝思奈四壁之啾啾及夫脂車在坰愁雲日暮客子遐征居人偃卧慘淡兮荒原逶迤兮岐路馬蕭蕭兮嘶風蟲切切兮吟露當斯時也莫不魂黯黯而潛銷淚淫淫而欲注夫情因感觸感以情牽情分萬緒感引千端糾紛雜遝不可名言蟬聲嘒嘒鳥鳴關關未若秋蟲偏傷夜闌夜將闌兮聲轉激歲云暮兮愁欲劇希髙蹈兮鴻冥慨流光兮駒隙綬一尺兮仍黃髮三千兮欲白感彼無情為我心戚豈特腸斷巴吟魂驚蜀魄而已哉亂曰秋節至兮秋風生秋風生兮秋蛩鳴秋蛩鳴兮秋草積秋草積兮秋思盈秋復秋兮秋未歇愁復愁兮恨難平彼至人兮無纍何微物兮縈情來雁賦俞允文明府大梁王公以亷平惠愛為邑而尤以文學緣飾之百姓乂寧彬彬有單父之理隆慶二年冬十有一月公在廳事忽有翔雁降於公庭依遲宛頸留止不去公乃異而畜之不以籠檻益用柔馴咸謂公之理刑不唯孚乎民而且暨於翔泳矣昔禰衡為黃祖賦鸚鵡韋誕為曹公賦山雞然皆獲自林虞因以致獻猶欲侈之於詞矧夫兹雁雍雍實有來儀之徴由是士之及公門者並為賦以獻允文衰蹇伏迹蓬樞公尤禮之齊以古人之度目睹𢎞美其可缺而無述乎敢輒畢愚悰用嗣斯作其詞曰有塞門之逸禽稟一性之純貞絶大漠以安集介二嶺之崢嶸才識機而逺害性知時以通靈故其族類雖繁飛翔有序唼食相召鳴號同趣徑翮蹼足黃喙玄羽泛素壑而並遊矯泰清而軒翥伊兹禽之特殊何燕雀之足比爰取象以明義亦表德於嘉禮若乃蓐收戒節月壯霜凝衰草共黃雲一色飄沙與紫塞俱平萬里蕭條天髙氣清乃違寒而就燠咸嘯侣而鳴羣度關山之無極翩嘹嘹以南征望煙路而中憩遵枉渚以自營忽蒼茫以頽落趨單父之諍庭且其容止柔馴徘徊延佇無籠檻以羈縻甘輯翼而自弭豈暗霧之相失將疾風之乍驚懼鷙擊之遄迫怯虞機之見攖抑毛羽之摧瘁竟偏特而伶俜顧日暮而途逺悵中心之有懲遂歸仁於君子偶來儀之瑞徵於是飼以稻粱豐其肌體諒俎味之至珍終周防以休處及夫洞庭水緑吳苑花繁青春麗兮燕已還望故鄉兮渺關山嗟儔侣之偕逝獨棲遲而莫從遭斯世之險巇罹慘毒之切躬幸微軀之見托荷盛德之能容輯風雲之遐想狎階墀之近蹤庶承君之惠渥長保已而永終蟋蟀賦俞允文蟋蟀秋蟲也猛性嗜鬬志在必勝其鳴聲又特悲壯庶幾感靈激神固蟲豸之可貴然豫覽國風月令及歷世才士所為詩歌咸非専賦郭賈之博物多識又絶無定名率相襲而未盡其理因綴敘其所産化聊以備數焉其詞曰伊蟋蟀之微渺兮惟秋蟲之獨靈含春華之昭質兮吸玉液之清泠性耿介以毅武兮才盡節以僄輕挺天姿而無因兮相歷覽其修能不程才以知類兮豈瓌異而見珍爾其為類也則有噓吸汙洝叫嘯魁圻崩榛灌莽之原渟涔淺草之區緑房紫莖之囿黃苔白蘋之陂堀堁灪燠滲灕沮洳埃藹煙䓃夕徑朝晞㵫㵫濕濕底壅腐餘芴焉是産為蠅為蛆别有復閣成臺離榭幽堂玄疏墨䃤之室曲瓊椒塗之房蘭金藻玉之宫璇題縹壁之廬清馨轉蕙之館晏溫流香之渠爰有麗人妙妓姣女妖姬姱態柔情妖蠱嫷窳盤衍其中者忘日夜而冥迷熺緑煙􅦈朱輝或乃淪精降魄含形儲軀詭色非純正氣戾違由斯言之未足稱竒余固可得而略也至若月竁風丘蒸巒霧谷炎崖錡甗以屼礧霒壑崔􅵏以􅬵􅺌峛施巷􅳾㟋􅱓隈隩蹊絶往蹤藪斷來牧若乃昈豹孽狐甝虪獦狙鞅􅱐格磔乎其側王虺巴蛇毒螭巨蝮歍尼陵卵乎其傍雄鴟猛鷙雕鷹俊鶻咆嘷亶翔乎其巔赤蟻玄蜂射蜮蠚蝎噬噆剖殈乎其陽山魈木魅隂鬼厲神熊熊焉魂魂焉錞窟宅而跳陸梁復有千年積死之樹孤軍隕馘之坑蕭蕭古馗簌簌蕪城仆雷之幹𡵻雲之楨櫹兮榝兮若陀若崩疊衆怪攢百靈壯瑰偉之所積卒成氣乎竒生其為狀也則有敦脄紫茜平膚銀液齗斫霜葩股弩狟戟翅鑠流金翼凝點漆頂握丹砂項塈青䨼鋸牙辟灌以􅚖䶪巨顙碨􅓓而簡積馮馮兮駓駓觡觡兮觺觺何竒形而異模差可仿象而靉霼亦將有公子王孫幸豎權戚驃將豪商遊俠燕飾三川五都之雄六郡三輔之客厭百戲之已疲嘆黃金之無益聆烈音之䃔䃧羡節鄂之岝􅣉命林穴以獮秋兮彃曜靈使西沈揮赫熛以列炬兮戒富媪以見琛爾乃頳玄顔炘浮林鬬獑猢躐獜㺑阽嶄巖刉岑崟飛聰硿濛沈明突冥巧網四匝狡穴三門雲布星羅下無軼奔闒茸殪魁梧臻畢獻所獲犒其朂勤納以琦璜之窩飴以珠穟之榮沐以華清之潔晞以赫曦之晶攬翠菣之纚縰􅀈青蠅之臊腥信襲養之既和率應機而莫攖於是命儔集好駢駕連纓相與狠觀夫戰鬭之變態亷度其勝負之殊形各施綵以代幟均約結以定盟設誘哤聒用壯敵情其始也則踆踆躍躍躪躪躤躤或峙若植鐵或蹶如陷石或口闞唅而彪休或趫捷以狼戾或深沈如保介或俇攘象赴勢或怦怦伺抽憑或桓桓包慷慨乍渾奔以相饞倏急對而分躓擇肉而唰􅀈拉折扼吭而扳翻批㧙聲砰礚以先鳴騁後凱而彌厲或逐北而隨旋或受詘以淩遽固三接而三捷亦再角而再礪循性情之自然陋孫吳之韜祕然後衆變殫單伎􅀈怯負者愁賄助勝者榮立價傾兩都射溢千鎰功以虓武見貴名以將軍是䇿豈獨衛鶴乘軒秦松受職此固偷樂之方信足以極一時之偉竒也若乃燕地飛霜楚水增瀾天崝嶸而短景風颼飀而薄寒才已盡而見放形枯稿而摧殘聲酷􅀈而不舒夜漫漫其未闌感唐風之覽化興楚客之永嘆亦有貧士失職獨婦棲山久客登樓愛子戍關畸人鞠而無偶壯士去而不還臨年被戮之孤垂老欲别之鰥忽傾耳以頽思何愁戚之多顔心有懲而彌亂涕無從而獨澘奚哀音之中人兮誰能破涕而為歡蓋亦聲音之至妙也豈若簫琴之比律於夔襄昆蚑之唭㘈蜿蜒云爾哉亂曰素節玉貞類介士兮雲翼振振發皓商兮馮化撰體靡有方兮窮隂弸割陽精降兮雖有竒心怊替爽兮俾協歌詩闡靈藏兮蚊賦徐師曽萬厯改元歲在癸酉余避暑於南溆書莊是夏蚊獨多晝夜不得休息因憶歐陽公云當作憎蠅賦蠅可憎矣尤不堪蚊子自逺喓喝來咬人也遂作憎蚊詩余今易之以賦賦曰蚊之為物也一軀藐小六趾昻藏口帶三針翅軒兩張其來孔捷其去復揚飽若櫻桃之重實飢如栁絮之輕狂當夫朱明啓候薰風薦涼或吐母於鷏口或羽化於水旁擇草樹而托處尤彌滿呼南邦方其日倚崦嵫暝色在户千百為羣豫集簷宇聲殷殷其如雷勢薨薨而若雨主人且晏息於中房掩絺帷而交股不揮箑以為安謂斯蟲之莫侮夫何伺一隙以潛入漸增加於莫數展轉不寧且驅且怒兩手交拍而濡血若染腥膻於塵土彼虻蝎猶可防詎兹物兮相伍然此特幽暗之時吾無怪其為苦也至若赫曦上晉萬室當陽主人厭永日之難遣或假息於胡床展蘄楚之文簟將夢寐乎羲皇爾乃奄忽而來如有告報窺怠乘疏肆其虐暴拂面噆膚就睡輒覺嗟髙枕兮徒設胡黑甜兮足道憐江南兮美景惟平望兮尤閙似白晝大都之中劫吏奪金而為盜也想夫畝宫環室甕牖繩樞明逺日月淺迫薪芻欲焚無藥欲障無㡡因可欺而欺焉曽何間乎窮民與貧儒獨有髙棟層軒廣除巨室敞虛明其莫容縱至止而難匿然而來者之稍稀匪云種類之盡殛譬則唐虞之世羣賢秩秩尚有共工歡兜逞其憸壬而猶待夫放黜也尤忌文身殊為刺骨頓成斑疹頗費搔抑噫嘻蚊乎利甚鏃飛風成市集有翼而不能戾天有針而不能砭疾但充己腹殊無一德彼蜂虺之含毒尚醫師之見拾視營營之蒼蠅蒙讒名而罔實徒令人子不驅以為孝貞女露筋而野卒既與鱉而相讐復類虎而加翼豈乏孫謙之屏風難為趙炳之道術春暮早出深秋未藏為民生半載之害使阽危而倣徨安得焦冥巢其睫而滅目泰山壓其背而絶吭者耶嗚呼天地生人以安為説何物纎微獨令吞嚙世有肉食為國謀顧亦朘民之膏血吾將叩乎帝閽冀斯族之殄滅明文海卷三十九
