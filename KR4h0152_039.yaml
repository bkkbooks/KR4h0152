body:
  text: 明文海巻三十九餘姚黄宗羲編賦三十九禽蟲二相思鳥賦莫雲卿惟鴻化之生生埒萬類而和均溥醇精以繁育亨品物其無垠丹鳳産而徵聖碧雞降而稱神鸚鵡獻於遐裔孔翠貢於罽賔魯史書鴝鵒以紀變姬公託鴟梟以自伸鴛鸞啄實於梧竹鸑鷟兆興於周邠𤣥鵠矯征於千里化鵬揭象於九旻雀覽徳而棲漢隼表異而集陳何斯禽之微璅亦靈慧而多仁羽則飾而緑衿的若染其朱唇毳含金以雜紺翅鈿碧而垂紳體盈盈之媚態舒咬咬之好音偕伉儷而翔集永顧利而同心無蹇修以通辭詎天作之良縁每遨嬉於險峻時升降於嶙峋或相呼於岑蔚亦招類於松筠忽芳聲之逺揚羡冶容之可珍乃命驂乎陽子遂較技於虞人掩寰區而播弋竟野曠而張罘既􅛺􅛺而莫逝乃浚浚而自投雖罹難而不怖惟返顧其匹儔始翕翼以順命終見畜而優㳺於時置以雕籠罩以黼裳啗以珍果處以蘭房若夫六翮漸成資徳馴良乃啟牖而縱往復留配而相將彼脱樊而翅奮此離羣而倉皇欲淩霄而不返更惆悵而若狂忽斂翰而來下集故地而徬徨流微睇而緜邈𣺌容與而徜徉恨拘肆之異途情相向而悢悢飛徐徐以翋䎓聲噭噭而淒其闒輕枝而未至累顧步而棲遲嘆孤鸞之乆隻似别鶴之逺離曳清風以黯黮帶鮮霞而差池或徃或來乍驚乍疑願同居以畢志雖羈幽以無辭發采緑之佳章詠東山之麗句效海鶼之比翼悦朝雉之雙飛愧鳲鳩之逐婦羡鷦鷯之安棲雖縣情於㟟􅳾終釋兹而在兹徃者懐來以降止留者佇伺而存思聞啾唧之呼求見蹈躍而外窺豈長門之多怨乃尾生之有期爾則闔其後扉褰其前帷輕舉飄颻誘而入之雄雌狎羣嘈嘈道悲交頸接足誓無捐遺笑朱婦之不徳薄秋胡之無知肯中途而多適託中天以恒隨願擇林而憇止將感愛而來儀慕明慈之施恵雖及物而務滋歉荆榛之末質陋壠坻之凡姿感隆恩於既渥乃日侍而相怡竭𠂻誠以委命豈終始之異思相思鳥賦葉憲祖鳥大如爵朱咮褐色雌雄並棲捕必雙得如縱其一百里尋赴名曰相思職是之故戊辰冬集龍山殆以千數偶有籠致一雙者戲為賦之絪緼所化類必有耦血肉之物雌雄牝牡繄有合之為歡迨仳離則為咎兹羽族之么緲兮固孕炁於𤣥黄詎配靈於鸑鷟兮並媺乎鴛鴦亦胡比鸚鵡之能言兮鷹鸇之摩秋蒼賦形非饒禀性則異情惇仇匹誼叶専摯猶木連理猶花並蒂惟沒世以追隨無中道而捐棄偶不免乎羅罻或見閡於樊籠一目可脱百里必從别有美而弗顧甘幽縶之與同余自去冬始覩斯鳥羽衣楚楚亦既馴擾晝共啄兮欣欣夕交棲兮若抱彼鷕雉與奔鶉固不足以比數兮即比翼之鶼鶼亦遜兹之情好名曰相思於稱不虛疇能似之其伊人與指皦日以為誓兮願同穴以安居樂伉儷之相守兮靡曠望乎居諸至若嘉偶不諧麗情中斷音乖琴瑟星暌河漢侯門有陌路之傷溝水有分流之嘆洵薄劣之可嗤顧斯禽而顔汗嗚呼情脈脈兮無詞明月千里兮空期搦素管兮長相思後相思鳥賦葉憲祖鳥名相思以其從一而必歸也兒子華滋試之果然已並縱之遂飄然長逝矣余聞之更快沈日倪吏部慫惥入賦中作後賦澤雉畜乎樊中訖未神王矧兹情種曷勝摧喪去復回兮亦既勞止居者望兮亦既號止捨彼寥廓來就羇囚覩兹微鳥恩誼何稠是非忍人胡寧汝留維我小子類有心者抉彼藩籠並為縱舍縱囚若唐宗之庭開網若商王之野任所如於廣莫之鄉恣和鳴於叢薄之下悲哉人生既險以巇每當盛年寡合多離閨人凝愁於闗塞征夫絶念夫扊扅覔徐郎之照兮入侯門而忸怩裁蘇氏之錦兮悵道逺之逶迤歴間闗而偶遇蓋不可乎庶幾此千古之長恨鍾情者攬筆而歔欷孰與斯鳥之得所接翼而聨飛余不得重招斯鳥而告之將介鳩氏以致詞爾其就閒而避患審處而察機偕爾族類娛爾唱隨無復為人所得而徒寄爾之相思哉憐寒蠅賦駱文盛吁嗟乎寒蠅爾胡為有生繄氣序之流易歘涼飊之襲楹念爾類之尚繁顧非時而營營豈弱質之能乆諒寒威之莫勝爾乃僵矣其形悽矣其聲既蹌於飛復蹶於行方縮縮以憔悴遂奄奄而伶俜㸃汚莫施其技攻鑚曷見其能或沿几而莫起或觸欞而輒仆障不施以曷入麈不揮而先墮進退踡跼將焉攸措吁嗟乎寒蠅睠言爾寒能無爾憐感念疇昔忽復長嘆方夫太昊司辰祝融揮鞭赤日在地炎威赫然爾於斯時氣適志便蹺足洋洋鼓翼翩翩翕兮類征豗兮羣喧逐汚湛穢醉醲飽羶弗召以合袪之莫殫恣意一時貽患百端吁嗟寒蠅詎知物從化遷時不可常惟暑爾乘寒宜爾蔵庶知止而不殆或自逭於喪亡爾乃淹留濡滯自掇其殃獨不見夫蝠㳺以夜梟鳴於晦妖狐乘昏尸蟲伺寐蓋有所肆尚有所避也豈趨就之懵懵能自逃於顛蹎哉吁嗟乎寒蠅始予爾憐亦終爾患念死灰之復燃將殞枝之再蔓矧羸豕之蹢躅惟易繇之明鑒爰命童子攘臂執紼爾撲爾摧用殄厥類靡令孑遺𦍑除惡之務盡弗自嫌於乘危庶幾乎庭宇虛靜幃幄搴開俟南風之景延當時物之葳㽔絶擾攘於爾輩欣四體之悠哉聴秋蛩賦顧大典戊寅之秋余官舍閒居清宵孤坐鳴蛩四壁逰子多懐悽然感焉因作斯賦若夫溽暑既䦨商飈始至悽矣客心悲哉秋氣夜如何其夜未央獨處廓兮私自傷􅑀幽軒兮閴寂撫孤幌兮虚涼颯颯兮聞空階之墜葉哨哨兮吟暗壁之寒螿始趯趯兮振翮於中野既喓喓兮遞響於西堂逺而聴之似斷而似續近而即之若抑而復揚爾其晚砌籠烟夜堂棲霧歛怨向隅含情欲訴哀韻沸而紛流繁音促而叢聚雜雁聲兮嚶嚶而慕羣伴烏啼兮啞啞而待曙迺若銀河錯落璧月徘徊蕙帳髙褰蘭缸半輝聲啁哳而未輟思瘀鬱而淒其至若暝色凝寒沈隂流濕獨夜無歡荒苔翳室客愁霖而欲賦鳴當忩而轉急爰有淪落畸臣流離逺竄賈傅長沙屈平澤畔懐故國以心搖望帝閽而目斷感蟋蟀之宵征蹇煩憂而永歎又乃𤣥宫潛閉紫闥髙扄秋深永巷漏斷層城翠華不御兮履綦絶玉階罷跡兮網絲縈飄迴風於别殿亂絃管以淒清載有逺塞書沈中閨涕隕鉄騎生寒羅幃乍冷奏逸響於鳴砧罷流黄於織錦襍耳偏依翡翠簾驚心故傍芙蓉枕又若貧士失職羇人滯留秦裘已敝和璧空投悵蕪途而自阻處蓬室而誰儔方下帷而凝思奈四壁之啾啾及夫脂車在坰愁雲日暮客子遐征居人偃卧慘淡兮荒原逶迤兮岐路馬蕭蕭兮嘶風蟲切切兮吟露當斯時也莫不魂黯黯而潛銷淚淫淫而欲注夫情因感觸感以情牽情分萬緒感引千端糾紛雜遝不可名言蟬聲嘒嘒鳥鳴闗闗未若秋蟲偏傷夜䦨夜將䦨兮聲轉激歳云暮兮愁欲劇希髙蹈兮鴻冥慨流光兮駒隙綬一尺兮仍黄髪三千兮欲白感彼無情為我心戚豈特腸斷巴吟魂驚蜀魄而已哉亂曰秋節至兮秋風生秋風生兮秋蛩鳴秋蛩鳴兮秋草積秋草積兮秋思盈秋復秋兮秋未歇愁復愁兮恨難平彼至人兮無累何微物兮縈情來雁賦俞允文明府大梁王公以亷平惠愛為邑而尤以文學縁飾之百姓乂寧彬彬有單父之理隆慶二年冬十有一月公在㕔事忽有翔雁降於公庭依遲宛頸留止不去公乃異而畜之不以籠檻益用柔馴咸謂公之理刑不唯孚乎民而且暨於翔泳矣昔禰衡為黄祖賦鸚鵡韋誕為曹公賦山雞然皆獲自林虞因以致獻猶欲侈之於詞矧夫兹雁雍雍實有來儀之徴由是士之及公門者並為賦以獻允文衰蹇伏跡蓬樞公尤禮之齊以古人之度目睹𢎞美其可缺而無述乎敢輒畢愚悰用嗣斯作其詞曰有塞門之逸禽禀壹性之純貞絶大漠以安集介二嶺之崢嶸才識機而逺害性知時以通靈故其族類雖繁飛翔有序唼食相召鳴號同趣勁翮蹼足黄喙𤣥羽泛素壑而並㳺矯泰清而軒翥伊兹禽之特殊何燕雀之足比爰取象以明義亦表徳於嘉禮若乃蓐收戒節月壯霜凝衰草共黄雲一色飄沙與紫塞俱平萬里蕭條天髙氣清乃違寒而就燠咸嘯侣而鳴羣度闗山之無極翩嘹嘹以南征望烟路而中憇遵枉渚以自營忽蒼茫以頽落趨單父之諍庭且其容止柔馴徘徊延佇無籠檻以羈縻甘輯翼而自弭豈闇霧之相失將疾風之乍驚懼鷙擊之遄迫怯虞機之見攖抑毛羽之摧瘁竟偏特而伶俜顧日暮而途逺悵中心之有懲遂歸仁於君子偶來儀之瑞徵於是飼以稻粱豐其肌體諒俎味之至珍終周防以休處及夫洞庭水緑吳苑花繁青春麗兮燕已還望故鄉兮渺闗山嗟儔侣之偕逝獨棲遲而莫從遭斯世之險巇罹慘毒之切躬幸微軀之見托荷盛徳之能容輯風雲之遐想狎堦墀之近踪庶承君之惠渥長保已而永終蟋蟀賦俞允文蟋蟀秋蟲也猛性嗜鬬志在必勝其鳴聲又特悲壯庶幾感靈激神固蟲豸之可貴然予覽國風月令及歴世才士所為詩歌咸非専賦郭賈之博物多識又絶無定名率相襲而未盡其理因綴叙其所産化聊以備數焉其詞曰伊蟋蟀之微𣺌兮惟秋蟲之獨靈含春華之昭質兮吸玉液之清泠性耿介以毅武兮才盡節以僄輕挺天姿而無因兮相歴覽其修能不程才以知類兮豈瓌異而見珍爾其為類也則有嘘噏洿洝叫嘯魁圻崩榛灌莽之原渟涔淺草之區緑房紫莖之囿黄苔白蘋之陂堀堁灪燠㵕灕沮洳埃藹菸䓃夕勁朝晞㵫㵫濕濕底壅腐餘芴焉是産為蠅為蛆别有複閣成臺離榭幽堂𤣥疏墨䃤之室曲瓊椒塗之房蘭金藻玉之宫璇題縹壁之廬清馨轉蕙之館晏温流香之渠爰有麗人妙妓姣女妖姬姱態柔情妖蠱嫷窳盤衍其中者忘日夜而冥迷熺緑烟􅦈朱煇或乃淪精降魄含形儲軀詭色非純正氣戾違由斯言之未足稱竒余固可得而略也至若月竁風丘蒸巒霧谷炎崖錡甗以屼㠥䨧壑崔􅵏以􅬵􅺌峛施㟟􅳾㟋􅱓隈隩蹊絶往蹤藪斷來牧若乃昈豹孽狐甝虪獦狙鞅􅱐格磔乎其側王虺巴虵毒螭巨蝮歍尼陵卵乎其傍雄鴟猛鷙雕鷹俊鶻咆嘷亶翔乎其巔赤螘𤣥蜂射蜮蠚蝎噬噆剖殈乎其陽山魈木魅隂鬼厲神熊熊焉魂魂焉錞窟宅而跳陸梁復有千年積死之樹孤軍隕馘之坑蕭蕭古馗簌簌蕪城仆雷之幹𡵻雲之楨櫹兮榝兮若陁若崩叠衆怪攅百靈壯瑰偉之所積卒成氣乎竒生其為狀也則有敦脄紫茜平膚銀液齗斮霜葩股弩狟㦸翅鑠流金翼凝㸃漆頂握丹砂項塈青䨼鋸牙辟灌以􅚖䶪巨顙碨􅓓而簡積馮馮兮駓駓觡觡兮觺觺何竒形而異模差可仿象而靉霼亦將有公子王孫幸豎權戚驃將豪商㳺俠燕飾三川五都之雄六郡三輔之客厭百戲之已疲嘆黄金之無益聆烈音之䃔䃧羡節鄂之岝􅣉命林穴以獮秋兮彃曜靈使西沈揮赫熛以列炬兮戒富媪以見琛爾乃頳𤣥顔炘浮林鬬獑猢躐獜㺑阽嶄巖刉岑崟飛聰硿濛沈明突冥巧網四匝狡穴三門雲布星羅下無軼奔闒茸殪魁梧臻畢獻所獲犒其朂勤納以琦璜之窩飴以珠穟之榮沐以華清之潔晞以赫曦之晶攬翠菣之纚縰􅀈青蠅之臊腥信襲養之既和率應機而莫攖於是命儔集好駢駕連纓相與狠觀夫戰鬭之變態亷度其勝負之殊形各施綵以代幟均約結以定盟設誘哤聒用壯敵情其始也則踆踆躍躍躪躪躤躤或峙若植鉄或蹶如陷石或口闞唅而彪休或趫捷以狼戾或深沈如保介或俇攘象赴勢或怦怦伺抽凴或桓桓包慷慨乍渾奔以相嚵儵急對而分躓擇肉而唰􅀈拉折扼吭而扳翻批㧙聲砰礚以先鳴騁後凱而彌厲或逐北而隨旋或受詘以淩遽固三接而三捷亦再角而再礪循性情之自然陋孫吳之韜秘然後衆變殫單伎􅀈怯負者愁賄助勝者榮立價傾兩都射溢千鎰功以虓武見貴名以將軍是䇿豈獨衛鶴乘軒秦松受職此固媮樂之方信足以極一時之偉竒也若乃燕地飛霜楚水増瀾天崝嶸而短景風颼飀而薄寒才已盡而見放形枯槁而摧殘聲酷􅀈而不舒夜漫漫其未䦨感唐風之覽化興楚客之永嘆亦有貧士失職獨婦棲山乆客登樓愛子戍闗畸人鞠而無偶壯士去而不還臨年被戮之孤垂老欲别之鰥忽傾耳以頽思何愁戚之多顔心有懲而彌亂涕無從而獨澘奚哀音之中人兮誰能破涕而為歡蓋亦聲音之至妙也豈若簫琴之比律於䕫襄昆蚑之唭㘈蜿蜒云爾哉亂曰素節玉貞類介士兮雲翼振振發皓商兮馮化撰體靡有方兮窮隂弸割陽精降兮雖有竒心怊替爽兮俾協歌詩闡靈蔵兮蚊賦徐師曽萬厯改元歳在癸酉余避暑於南溆書莊是夏蚊獨多晝夜不得休息因憶歐陽公云當作憎蠅賦蠅可憎矣尤不堪蚊子自逺喓喝來咬人也遂作憎蚊詩余今易之以賦賦曰蚊之為物也一軀藐小六趾昻蔵口帶三鍼翅軒兩張其來孔捷其去復揚飽若櫻桃之重實饑如栁絮之輕狂當夫朱明啓候薫風薦涼或吐母於鷏口或羽化於水旁擇草樹而托處尤彌滿虖南邦方其日倚崦嵫暝色在户千百為羣豫集簷宇聲殷殷其如雷勢薨薨而若雨主人且晏息於中房掩絺帷而交股不揮箑以為安謂斯蟲之莫侮夫何伺一隙以潜入漸増加於莫數展轉不寧且驅且怒兩手交拍而濡血若染腥膻於塵土彼䖟蝎猶可防詎兹物兮相伍然此特幽闇之時吾無怪其為苦也至若赫曦上晉萬室當陽主人厭永日之難遣或假息於胡床展蘄楚之文簟將夢寐乎羲皇爾乃奄忽而來如有告報窺怠乘疎肆其虐暴拂面噆膚就睡輒覺嗟髙枕兮徒設胡黒甜兮足道憐江南兮美景惟平望兮尤閙似白晝大都之中刦吏奪金而為盜也想夫畝宫環室甕牖繩樞明逺日月淺迫薪芻欲焚無藥欲障無㡡因可欺而欺焉曽何間乎窮民與貧儒獨有髙棟層軒廣除巨室敞虛明其莫容縱至止而難匿然而來者之稍稀匪云種類之盡殛譬則唐虞之世羣賢秩秩尚有共工驩兠逞其憸壬而猶待夫放黜也尤忌文身殊為刺骨頓成斑疹頗費搔抑噫嘻蚊乎利甚鏃飛風成市集有翼而不能戾天有鍼而不能砭疾但充己腹殊無一徳彼蜂虺之含毒尚醫師之見拾視營營之蒼蠅䝉讒名而罔實徒令人子不驅以為孝貞女露筋而野卒既與鼈而相讐復類虎而加翼豈乏孫謙之屏風難為趙炳之道術春暮早出深秋未蔵為民生半載之害使阽危而彷徨安得焦冥巢其睫而滅目泰山壓其背而絶吭者耶嗚呼天地生人以安為説何物纎微獨令吞嚙世有肉食為國謀顧亦朘民之膏血吾將叩乎帝閽冀斯族之殄滅明文海巻三十九
