body:
  text: 明文海巻四十二餘姚黄宗羲編賦四十二禽蟲五嗤彪賦湯顯祖予郡巴丘南百折山中有道士善檻虎兩函桁之以鐵中不通也左闗羊而開右以入虎懸機下焉餓之抽其桁出其爪牙楔而鍖之縆其舌已重餓之飼以十銖之肉而已乆則羸然弭然始飼以飯一杯菜一盂未嘗不食也亦不復有一銖之肉矣以至童子皆得飼之已而出諸囚都無雄心道士時與撲跌為戲因而賣與人守門以為常率虎千錢大者千五百錢初猶驚動馬牛後反見犬牛而驚矣或時伸腰振首輒受呵叱已不復爾常置庭中以娯客月須請道士診其口爪鐫剔擾洗各有期道士死其業廢予獨夫虎雄蟲也貪羊而窮以至於斯辱也賦之夫何山中之一獸兮受猛質於西旻貌低團而項廷鼻黝隆而齒齦目斜眶而電爍聲倨頷以雷殷舌理粗而莝樹鬚峰横而獵人爪含銛而巻曲尾拂彗而縆伸咤形模其足怖矧精威之絶塵静嘯而隂飈窣起坦步則稠林自分凜氣候之相制隠形勢而見尊況百折之深山常此窟之成羣黄斑屬而卧隴白頞連而飲津初涉味於牛馬遂䑛及於人民戸震躬而屏徙或重遷而逺藩獨無生之道士故有心而與隣力不加於子路術不詭於黄神布石闗之宛轉交鐵葉以繽綸界鴨羊於接檻誘聞羶而見循進宻厯以窮路退蹢躅而下門遂乃聊浪擲跌偪仄輪囷始傖㲰而怒湧乆牢騷而意煩氣屈而皽力癉而踆壙局拘而勢改積威約而理均於是道士欣然待旦及晨舉之於懸處餓之以兼旬待威神之委頓任處置之紛紜未陷頭而拔髮先罥爪而剔蹯捩權牙於巨斧磨刺舌以疏巾香泔變其腸胃清水洗其喉唇欲次第而施食己隨宜而致馴初猶啖以碪肉次則習以盤飡或設以粰粒之餘或投以菘芥之根既苦饑而伏檻敢擇食以懟恩遂乃改山林之性氣狎雞犬之見聞遇夫人之下視即弭耳而意親諒厓柴之已去放野牧以逡巡非止柔性兼弱其肋圓腰纎而脇息艷斑摧而襞皴撫之而亦喜撲之而不嗔似巨貍之擾足若卑犬之纒身偶循隅而吐喑輒䝉呵而愴魂懊撐距之無時委降戢於匪倫見其弱而可弄牽以售而論斤有守犬其未足借虛名而守閽第周旋於死薄得渾迹於毚麏學婆娑而昵主戲矍綽以娛賔感知音之君子被嘆涕之慇懃偉兹靈之巨猛鬱有武而有文論雄心與剛力固決乾而倒坤略網絓而風飛觸熛燎以雷噴哮怒則千人自廢憤蹶則萬瓦皆震匪胥疏其有欲何牢檻之敢陳偶朶頥於跛羊落一髪於千鈞饑窘來而餌施利器往而性冺足人間之玩擾何氣決之可存諒如此而乆生固不如即死之麒麟太平鵲賦陳子壯余步掖門見鵲羣飛入太廟啄松子毛衣甚都云太平鵲賦之伊孳氄之何方亦翾􅀈而成族蔽越裳之翡翠驕建章之黃鵠絢采雜而成文莫損益其紛郁占賀世之劭名謝虞機於莽麓宜小過以遺音羞唶嘖於覆軸望廟廷而不眩躡罘罳兮若木寧軀弱而宇寛毋搏擊乎踡曲將學語以猶人旋照影以自鬻懍皇神之在兹幸免妬而逺辱展䆗窱兮蓊薈泛枝柯兮霑足縱鷇雛之罔知諒因𠂻而表暴顧蟣蚋之禄命勞握粟而出卜否乎雉雊於彤日休者烏流於火復其若斯之渾忘以載飛而載逐乎沙鷄賦陳子壯沙雞西北邉鳥也邊境數擾沙雞無止冬月薄暮羣飛過都如風斯陣後飛至江北食禾稼鳳陽守臣以異鳥聞夫物疇微而無徵性奚遷而弗革名禽經之罕詳形迅駚而難索度野馬於塵埃息相吹其逍遙初無疑於衆羽簸比屋以飄颻跨陽鳥之遞征泥鶢鶋於魯郊彼六鷁之退飛或鸜鵒之來巢聖惟芒而必剔蠢以亂而益􅀈秦吉了曰我今者曽不彼入胡爾今者乃我之逃鶻回紇兮鵽突厥阿得脂兮甥博勞從連雞而自并觸穹廬以為髙幕有烏而四起城千雉兮將翺轟逐肉以頓盡咮長尺其猶饕韓盧反猘虎倀晝號沙蟲祝化猿鶴周遭是以閨閣饑思於空倉纓冠膽弱於乘軒迨夫蓬蓬颯發望望星奔日意黫憯脱葉豗喧亘重障其閃爍有隔脰而摧魂若乃摠銍欠出艚艎在屯沙烟栁雪眢井窒門石馬間嘶餘㱴連墩雄雌既割弟不識昆梟音何徙鷹眼耐存搶天窟地為魗滋繁越陌踰阡䆉稏秋翻刑􅖆􅀢使鶡啞執虸蚄而並吞若有人兮共蜡主帝使益兮縶其羽系曰倉庚於飛九鳸忙坎坎伐鼓築我場抨我弓兮相舉柴槖我矢兮烏三至蟲拚飛兮肆無害失前驅兮邑不誡夕蛾賦郭造卿余旅㳺於塞投野寺而托宿謂暗室之偪隘乃露處而秉燭二三童子若驂若服時維仲夏百物繁生惟坱圠之潛動與圓榘之賦形若絡緯之夜織若熠燿之宵征若蛙部之鼓吹若蚊陣之軍聲蚓竅初啓鶴棲復驚彼凄清而嘹唳皆助予之苦吟蕞爾飛蟲曷來繩繩短喙燦粉巨翅搖金倐多倐少或夥或零有知無知有情無情豈暗投之弗白及覆照之未明爭借輝以叢集徑如燬而迴縈非上下之火鼠及往來之青蠅焰焰所燎薨薨而傾余將以為無幸少間鼓翅而復升又以為焦爍之不可當必逺向菌木而自藏尋復振羽何異探湯微者或一再而繚繞鉅者則旋轉而徬徨胥糜爛於鏖戰不知曽為燎之所戕盡爾族黨至已斯亡俄頃瞬息折堲無光浮盆盂為鼎鑊沈膏脂如豆觴寧趨熱而速斃不就涼而延長豈薫之有馥而煨之為芳甘蹈火而俱焚以篝燈為崑岡嗟夫物之外蔽故昧死以趨炎乃人之内熱孰不如彼之􅑒􅑒嗜義易厭嗜利彌堅或因難而止或中道而遷奉首幸免蔑理茍全方寸之慾勝則七尺其何慳旦夕之謀遂則百歳其可捐貿貿汩汩蟲何辨焉故有感於物物用告乎元元惟隨日月之照臨而保天年於自然放蟹賦夏樹芳長孺許伯子倡放蟹之㑹每歳秋杪與同心擇日為盟隨量大小買而放之江濵自黄田閘揚聆二島意陶陶樂也予喜而賦之賦曰伊水族之介類負郭索以成形客名之為公子或自號曰長卿香稻時稔天髙氣清爾乃颼颼抵岸􅈪􅈪沙行盤礴菰蘆之野婆娑鴻鴈之汀蝤蛑為兄􅀈蛣為侣雌名博帶雄名􅀈䱺或撥棹而横斜或擁劔而奮起若夫文則有匡直則無腸止為離象動合乾剛懐金抱玉噴露含霜響入琴聲之雅兆指兵符之祥朝魁者每執其穗祭海者必輸其芒郭景純載之江賦陶隠居列為仙方即爾質之么䯢視凡物而異常有等好事勤為采捕設之笭箵懸之穇滬貫以綸索升之􅑄釡訝風味之絶倫供拍浮而不顧或營糟丘或雜醢腊夸揚州之好羞饜婁東之桀步曾思一箸為食幾何輒絫絫以登盤戕物命兮實夥稽古顯報昭哉不誣富陽以裂斷而幻為人言章安以屠客而見噬于於莬所以何𦙍輟食於方丈范尉徵夢於庭柯鄒志完解釋於嶺海蘓長公遣放於江波胡不轉殺為生開此令圖客喜而笑半予半奪謂吾江干家餔户啜數丸者候潮烹臍者酧月有若子言不幾唐突杜相之饞口曷充夏統之養親誰掇傅嘉祐之譜案亦坐虛無畢吏部之風流依稀抹摋當夫江市始開矗矗闐闐大者如楪小者如錢搖江盪浦品實稱鮮繄昔賢之染指我寧得而棄捐謝尚搜之爾雅揚雄擬之太𤣥田彦升逺貿於蘇湖陸魯望近乞於江邉且也方輿之内此種殊異詭形怪狀莫可亶記海陽巨品其大盈車姑射山中廣竟千里􅔢鼊之壑雄稱虎頭善菀之國珍踰鳳喙飛行絶島之墟淩歴三辰之次若是者子可得而盡放之乎客談未已予狂且駴何要𦕈之繁稱類齊諧之志怪不聞天台放生見則生全流水長者應縁無礙子但求之目前庸暇計夫方外於是宰官居士圓頂方袍普發𢎞願竭蹶江皋喜津梁之一啓競輻輳於錢刀或負擔以趨或攜簏而招載入芙蓉之艦同上木蘭之橈脱爾蟲孽解爾天弢乍輪囷以偃蹇頃勃窣而消搖忽泠然以御風駕萬頃之洪濤任二螯之展舒騁八足之逰敖永弗罹於梁笱恣海濶兮任夫天髙牡蠣賦蔣徳璟𤣥貝之朋若人共之蠯蠃之羞鼈人簎之顧牡蠣王㑹闕焉文通氏津津石蜐而外史所識霧成黑蚌藻亷紫螺陽羡六眸之龜真臘萬年之蛤信為竒也海東四郡西施舌第一蠣房次之案雷公炮炙論有石牡蠣石魚蠣真海牡蠣蜀本又有􅀈蠣歐人插竹為簄縁竹生者曰竹蠣漁師曰肥則黃故稱蠣黄用修乃以江珧為蠣黃何也夫南蠣北鰒造化所構遂賦之焉爾竒相㑹諸侯於雒洋使滄州從事檄諸道曰歳云杪矣寡君須矣良乆江漘潒渹蚴蟉㶔逶迤霓旌燐亂維諸侯至而諸辭臣胥在焉蚖脂既張鳳盉既均絃焆棽麗海錯􅏪紛有從馬人來者伏波將軍故部曲深目猳喙家於象豆左顧中郎之間遂以中郎獻於時也㪺酶方半水灂颷旋古月雲端竒相屬之螺女而詔海門司户曰諸侯客能頏左郎者上坐伊洛侯辭曰寡人有臣無腸公子常使闗中威慴神鬼文章横一世匡不可以厲至淞江侯曰金虀玉膾仚人石桂至且歐侯曰秦王算袋化花枝懐墨白事飌矴之願四海若吏賜之玉蟾兒竒相听然而笑曰哉虖君侯馬人遂言曰臣以為皆未若左顧郎之美也其狀如稜􅓓㠑确嶄巖磔牢嵫釐踡􅀈崴嶫嶠􅀈呀潚率小字曰蠔𣲖則臨海通泰廣州昌陽經則殺邪强骨僷焉益精除汙消結破悶解瘧甹怒輕身蠲渴却酲昔列山氏之有天下也以闗節榮衛之術進帝嘗而善之命雷公試於祝誦以為萬年珀封之蠔山毋庶龜宗黿碩耳偪腹為海月昆若其迅澓戕氛童奔若舞五嶽磓蒲牢走馬銜屾海市舉鳴山嶈􅝏鏡朒宅石笋而含滋飲靈潮而成族被碨䃁之裳衣結渾沌之眉目惡浮沈乎風波守堅貞而不副於是鼉精表𤣥鮫客推黄錐師遵碕罶子鐫房菀幽菽其凝琭燀勺藥而搆瓊㷅霜飫雪􅀈乳酟珠天地一朝萬期須臾於時也諸侯莫不相視而嘻射銀海怫靈堅瀝始梁敂羅千捧手致辭釦砌華隒笑鍾岏之巧詆嘉蘇公之隠傳乃倚簣叩鼎而歌曰今夕何夕兮明鐺工造化兮炭隂陽漬玉粘兮金漿登天㳺霧兮醉鄉歌畢客䦨杓冷滈寒三星在户不知其殘竒相庚授竿太虛先生曰為孤作頌寵之且媵諸侯其辭曰維牡蠣化百嵗能延年老鵬蜕維牡蠣石為膚禀剛徳月盛虚諸辭臣相與拍而歌之於是乃珥青蛇鞭素虬整璿鑁建辰旒齊鯨較裔龍輈顧賜馬人幺貝之龜雙鶴賦朱静庵惟仙禽之髙潔禀玉雪之貞姿翔崑崙之琪樹啄𤣥圃之靈芝共遨逰於碧落同沐浴乎天池與鸞鳯而為侣矧燕雀之敢窺何虞人之見獲遂羈絡於軒墀䝉主人之過愛聊隠跡而棲遲故其呼之則應撫之則馴山雞雜處野騖為倫志昻蔵而獨立情偃蹇而弗伸若夫春雨初晴花隂滿庭臨風振羽向日梳翎或翩躚而對舞或夭矯而同行望故巢之修阻徒奮起而長鳴既而白露初降金風始髙丹頂皎潔𤣥裳飄蕭發清唳於永夜徹遺響於九臯感㳺子之躑躅使遷客之無聊爾乃安於棲息飲啄適宜受乘軒之寵渥釋籠楹之羇縻愧微軀之菲薄承眷顧之恩私感厚徳而猶未報徒馳情而在兹永充君之玩好誓畢世而不違明文海巻四十二
