body:
  text: 明文海卷四十三餘姚黃宗羲編賦四十三花木一落葉賦汪偉大火既沒玉衡回標著微霜于短草振修柯以輕飈丹鳥行宵以含景玄禽望社而違巢嘆百卉之何知亦感時而早凋于是梧飄金井之床木落洞庭之浦岸栁江楓前槐後栩碧者為丹堅者為窳望葳㽔兮朝霞聼淅瀝兮夜雨初戀條以猶澀終脫然而别去忽紛沓以爭先漸悠揚而徐下或既往而獨還或已墜而更舉顛倒自擲回旋效舞趨逺若避控空如捕逐水迢遞隨風容與惜連駢而異分歡邂逅而相聚無根蒂以焉托任飄泊其何所悲興弔楚之騷人詩遞深宫之怨女圓者如錢鋭者如斧剡者如圭平者如楮龍鬭兮摧鱗鳥鎩兮委羽填溝湮谷浮渠泛渚雖使𨽻首握籌子房借箸蓋亦莫之能數也若乃嚴霜之晨皓月之夕深閨懷逺之婦戍邉思歸之客莫不感之增悲對之太息夢繚亂以難成思紛糾其如積爰有松柏凌寒不殷表秀色于疏林揭孤標于空山獨心許兮幽人相與同兮歲寒伐老柳賦楊守陳翰林院之後庭有巨栁數章參天蔽日民之輸廪米者欲暴之庭患栁隂之翳之也請豫伐其最巨而尤老者余不可為之賦曰吳民輸稅于京群告于翰林大夫曰吾儕小人供王之賦殫資竭勞罔敢違誤顧玉粒之含滋恐久儲而紅腐仰赫日之暴之奈栁隂之周布瞻彼衆栁欎如車蓋幹輪囷而離竒根拳曲而軸解惟條葉之輕盈若張少年之可愛時隨風以媚人作妖姬之舞態豈解禁雪霜之嵗寒安可作棟梁而雕繪異松柏之後凋同櫟樗之徒大胡俾其蟠據乎紫垣掩映乎黃屋倚乾坤之發生占雨露之濡沐旁惟茂乎棘榛下不秀夫蘭菊既矜翹而擅榮且裒凶而萃毒巢鴟鴉于其顛孕蟻蠍于其腹落葉點玉河之清流飛花蠹金毳之上服况其隂影之連接共浮雲而蔽天晝雖晴而若雨地恆濕而不乾喟吾米之頻暴尚吐氣如浮煙望廪收其何日徒困苦而憂煎昔叢竹以蔽庭而􅜩矣櫻桃以翳廟而伐焉况兹栁之為害可使其據上地而長年欲盡屏去勢難遽然敢指其最巨而尤老者請伐而置諸海壖大夫曰此非吾力之所能為亦豈汝喙之所當議凡物之生貴得其地故鼠穴社而不熏豺當道而皆避然物盛而衰理所必至故負擔者極重則顛躋攀者過髙斯墜吾恐天渝于旦夕風與雷其皆厲盡衆栁而拔之併掃六合之隂翳曦光洞燭于九垓陽德普施于萬類物何暴之不晞民何欲之不遂惜汝命之未遭徒沉憂而永喟謂余言其無徴盍姑淹而少俟水仙花賦姚綬伊昔涪翁夙罹謫逐行邁阻修浮水奔陸方歸與以息駕乃燕坐于蔀屋惟是屋也倚髙山臨大江影薄髙雲聲飛怒瀧敞宇衡門洞乎八窗式遣懷于吟嘯忽有覩乎神娏爾乃乍近乍遙水靣微步羅襪生塵綃裳沾露腰纎弱蘭唇冶樊素匪揚桂旗匪踏神魚遽引遽却或疾或徐袖翩翻兮婉娩帶繚繞兮紓舒悵數年之獨往鄙良夜以鰥居矯望延佇掠盼躊躇泛若斷梗浮猶馮虛乃若貼金蓮于玉趾眷兹樂胥于焉邇止瑪瑙坡荒仙王祠圯睇梅兄于嶺頭懷礬弟于澗涘進左右而諗之曰水上步月彼其仙耶惟炫素質不御鉛華中有金㽔輕蒙臂紗衝斥暮雨揮霍朝霞爾或見之而豈吾之過誇耶左右屏息對曰彼之來斯誠類仙子馨香芬芳容光旖旎其綽約也儼藐姑之神其聫姢也齊洛川之子初雖瞻馳終莫摹擬是則主人之所見僕輩之所跂者也于是之時涪翁啞然而作聲彼人泯然而無迹江風惟清江月自白倀倀何之翳翳寢息晨興向明躑躅于庭忽幽花之托根依后土以降靈胡然生之太瘦嵗晏流形宋玉招魂之賦莊周夢蝶之經翁遄作詩調同金石有頃比夕載驗厥迹無被花之懊惱出門一笑而橫大江之空碧黃楊賦方逢時樗散野人逰于章貢之濱憩於水西之亭厥有叢木孤植於庭蒼枝樛錯碧葉繽紛團如翠蓋蔚若青林顧謂童子此木何名童子曰噫余沖罔知命物未詳聞諸父老厥稱黃楊材質堅細可為圖章琢磨雕刻玉石同光其為性也終嵗所息僅逾毫芒閏餘之嵗反縮弗長故諺有之閏厄黃楊君胡未逹而詢之詳野人悵然俯而思仰而嘆曰有是哉造化小兒其以是戲耶夫長之難則然矣閏而縮曷故哉將造化者之欲神其用也胡不於楩楠杞梓蒲葦榆栁之皆然而顧勞其機于一木之微也夫一氣紛擾萬有不齊或遲而速欲速或遲物各值于所遭有非司命之所能移矧夫干霄巨木匠石斯戕榖桑夙拱謂之不祥既忘情于速化又何恨乎黃楊楊梅賦朱應登吳人沈石翁為楊梅寫生緑葉敷暢朱實纍然即而締觀天趣溢發如江南盛夏見其熟時也田南山使君購藏於家永以為好命應登賦云維茲珍卉稟精于陽嘉后皇之錫類眷鶉火之遐方覆赫曦之炎景沐瀼露之休光丹粼粼以即次緑蓁蓁而含芳耀員輝而外朗斂潤液而內藏始的爍以璀璨或婑媠而低昻乃若長嬴開敘朱明應候緑刺未脫丹實已皺吳都越壤有豐其族絡谷包山輪輥纚屬或絳如綃或赤如縠或青如黛或碧如玉嫣者如愁鮮者如沐纍者如貫並者如逐遲者未苞疾者先熟驪珠駢首夜光溢目焜焜韡韡爛若龍燭掩奔星之流彩奪明霞之灝魄鮫人見而宵泣翔禽駭而晝伏譬之魏侯照乘之珠趙氏連城之璧勾漏丹砂之産金谷珊瑚之植雖剛柔之殊體殆煜爚而同色至若河干水涯靡靡半垂髣佛江妃解佩贈遺暑雨既零紅肌生粟又若王嬙畏寒嚬顣溫風南來紫艷半開又若象罔赤水初回繁枝葰楙一顆獨嫵又若息媯丹唇欲舉夜月皎映萬樹皆赤又若廣陵燈火元夕烏剝蟲穿落紅滿前又若馬嵬妖血尚鮮肇服青而變緋擬官資之著令爰田酸而入甘協五味之中正謂圓融以諧俗實精核而懷徑説衆口而靡要蓋天然以成性于是狡童媛女遨逰采掇擢纎指于羅袖攘玉腕于跳脫扶輿猗靡揚柂戌削撫筠籠之未盈盻柯條之漸薄點素裳而成絢互目成而相謔若夫中使宣言上供見督揚翠華之羽旗挽黃龍之飛軸欽厥包于下里致欵誠于上國寢園經薦天官獻新內廷遍賜波及羣臣含桃辭寵素奈失御穠李慙出枇杷寢妬于斯時也孰悲其不遇又若公子愛客廣堂豐燕酒殽醉飽賓主俱倦而斯果在側莫不炫目而侈心貪取而爭羡覺煩憒之去體喜清芬之下咽然果木之珍適口充腹茍為無饜名曰嗜欲欽軻生之制命鑒老氏之知足聊用賦而廣之庶可以蠲乎殆辱莽草賦靳學顔豫道商顔谷中見莽草橘葉桂莖丹蕚素蕾意若自負不儔凡卉者厥形麗矣然一葉入吻百內潰裂是何形情之詭與豫始撫而狎之繼知其然委諸絶壑彌嘆而去旋復自咎夫已既已知矣而不以詔人不仁是草有負于造物甚厚不厚誅之不義乃追製此賦示之來哲毋若豫之始狎之也豔山兮神丘麗水兮炎洲祥芝兮九葩赤葉兮璚流既採服以返精兮亦練餌而千秋胡茲植之獨戾秉駁氣之弗協生百需而無益獨戕物而呈捷紺藹敷芬蒼條輪囷素苞冒朱縹茸施殷乍斂乍開含嘻含嚬葉不辨橘莖不分桂叢莢周柯益津豐媚曰旋樞之流精與皋塗之麗卉孰凝爾質俾疑厥類熙榮外揭酷氣內藏危鋒誤觸飈迅機張彼太行之隂産紀炎經而已習未若兹之可玩貽永戚于一吸弄影濫泛之沚托迹蘋藻之濱殖中逵而揚意挺修坰而驕神瘏馬飲波倦旅息蔭將淫毒之有加曽自知其已甚后皇申嘉錫淑慝均化光覆露渥涵湛隂陽宣照明受命誠不遷美利咸各正厲滓何偏滯範兹不肖形矜已若不足害物為有嬴是以作賦敬陳明則比物聮類具懲賊德其詞曰秀色可餐言若醴飾貌深𠂻詎測底觀莽草兮類若子覆人邦家利舌齒白者膚革黝者理觀莽草兮類若子金石示剛脂韋裏覆却色沮觀者鄙觀莽草兮類若子疏節濶視淡無滓嫉刻填膚唯有已靣而頌兮背而訾觀莾草兮類若子梧桐落葉賦靳學顔序曰循祿窮海忽焉入秋獨寤空塗感兹一葉悲少壯之幾何耻尺寸之不效因託毫素抒我幽隱非若嘆息流光惜丹華而愁素髮者也賦曰何朱明之不處兮俄金祗之振節鼓三隂于璿籥兮桐應候而飛葉墮金井之離離兮下瑶階之琤琤音中律以諧商兮孰辛酸之可聼若乃逐回風兮紛舞與靈雨兮俱零辭故枝兮無語宛長逝兮含情近抱根以若親兮遐乘飈而翔漢乍縈蔓以潛迹兮忽出林而自見徘徊曲榭飄颻環堵若往若來如泣如訴風簷簌簌亭皋蕭蕭形孤影隻羣萃朋遨托響天末借光日表委兹輕質遊夫縹眇故有蘭臺苔繡金屋螢飛鑒團圞之朗曜覩嘉樹之漸稀蛾眉嚬兮素心結怨莫怨兮新離别紈扇恩情中棄阻白紵陽春為離舞亦有江潭逐客關塞征人撫青柯以流盻慨沃若之非心御重恩兮報無所悵佳期兮歸無因目千里兮湛湛怪陽鳥兮先人若夫烈士愴神雄心感遇惕修名之將墜恐芳華之遲暮情飛乎九岡之陽魂銷乎華平之坻腸一日而九廽夜十起而未巳耳驚其聲目不成視扳條撫膺憫時悼已鼓神劍以無歡援鳴琴而失理斯悲之極致非離思之能擬也金錢花賦宋鑒異哉植物之中有至竒之艷至巧之容繡毬圓而非刺錦帶美而非攻玉盤牡丹之白木筆辛夷之紅蕉舒緑扇荷卷碧筒標形質異取類名同繄茲花之為卉兮宛然出乎良冶九府之規以成五銖之形以寫色眩塗丹光凝點赭排朵重交柯􅀈爾乃鍾麗水之粹揚棠溪之燀隂陽為之槖籥天地為之陶甄肉好存其周郭體態像其方圓囊奚堪貯貫何能穿雖心生侈羡而吾人不資於用焉是空擅芳菲之𢾗竟乏富貴之實纍百至千纍一至十子母不能以相權商賈不可以貿易動貪夫之心錯愛重稜驚賭客之眸勝持短陌風暄則蝶化􅀈翻雨暗則蚨歸倣佛向雕欄而買斷秋光臨綺窗而挽回春色陸放翁紅蓉江上興廢吟哦陶徴士黃菊籬前情忘採摘然一元亭毒之氣隨所寓而流形故草木得之發為金錢之英抑豈帝天無主化工得以賄行夫錢也作威福㺯權勢乍冨乍貧倐來倐去或愚而摽或癖而聚或親以兄稱或守以虜鄙軀亡鄧通國滅劉濞鮮不為錢之所制鳴呼前車覆後車戒觸物感懷吾何以兹花為憓明文海卷四十三
