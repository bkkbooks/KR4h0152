body:
  text: 明文海卷四十四餘姚黃宗羲編賦四十四花木二瑞蓮賦魏學禮慈寧宫有蓮于花房中更挺花萼按花譜有臺蓮斯殆類之然世未之覯也聖母之億夀皇孝之感孚國運萬葉重華世治九寰彌靖厥兆兹矣上命圗示閣臣俾作賦曰瑞蓮臣某謹拜手稽首而作頌曰粵皇天之眷德昭太和之上禎蔚慈寧之荷萼吐芬艷之重英新姿崇擢嘉蕤茂挺若凰翼之翥霞效鳯閣之延頴超衆卉而修翹凌九華而彯影秀菡萏之令芳矯芙蓉以獨逈映亭亭之奇采薦奕奕之秋光對月華以比曜度鸞幄而飛香不雕琢而層臺出非煙霧而重雲翔於是瓊瑶奪色蘭杜非芬藕千常而靡信花十丈以徒聞豈如結種帝閽敷榮慈殿紺房表異丹葩呈蒨鍾氣厚而加豐育神全而增炫拱祕寢而恩輝多近太液而露華羡拱揖乎萬年之枝搖曵乎五明之扇祥不虛來而有感斯興瑞罕昔聞而大衆咸見兹誠太母淵仁格乎上穹厚德齊乎地極重以聖主大孝臻于古初隆化洽乎九域是用上至太清而蒸為醇鬯下至太寧而沾于羣植藉非若此何以萬方𢎞逺而特徴于聖母之宫宇宙久長而肇開于今上之日彼圗陳瑞應疑信相參曲奏芝房功德末廣逖觀前代遐紬玄想治斯協于登三應有符于明兩畏天戒則躬步恭祈振潦旱則捐租錫帑緩大辟以法解網之矜恤貸小過以宏肆眚之曠蕩海內欣欣其如春神祗穆穆而如響驗慈齡之永延應聖夀之髙朗况蓮花以比君子重臺以示道長坤宫以母飬萬物無疆以靜成萬象實太平之彰兆而億􅑤之有像于是天子方湛思乎道德之玄微克謹乎皇天之昭命治已隆而若沖祥薦膺而彌敬親賢人若芝蘭之宜就逺憸讒若枳棘之當迸視民為邦家之本根民歸比桃李之蹊徑三光順軌而內安外綏萬葉承庥而武戢文順繪圖即文武戶牖之銘而祥荷亦姬旦嘉禾之進矣茉莉賦魏學禮猗絶域之名草植方夏之崇岡結繁柯以披翠粲芳華以飄香幽蘭婉兮被中谷杜若發兮吐新緑千章檜兮蔽丹曜百尋芬兮麗嘉馥爰有姣童豔媛搴蘿辟莾接袂紛隮揮雲直上睹修條而佇瓊佩折榮􅞉而眇遐賞翔縹霞兮鸞思飛排蔥煙而蕙情蕩遂乃和玉軫鏘瑶弦送姿媚邀媞妍振芳裾而舞宛轉擢纎腕而歌便娟歌曰時日晏兮涼風生采莉蘂兮衣羅輕山隂隂兮杳愁寂將媚卉兮遺佳人於是茂苑公子皇庭大夫騫雅藻而抗淵標舒沖懷而激清奏馳神乎希妙之觀凝想于瓌竒之覯邈嘉樹之來臻映璇階而逾秀弱英皓晳崇繁霜兮敷氣逸靚浮朱房兮帷茵藹藹襲郁芳兮葉莖蘙薈蒙雕堂兮九夏氛雪映檀梁兮方疏泛緑錯丹光兮金皥凄清華未央兮薄飉邐迤入犀觴兮空月徘徊翡翠翔兮文石藻井附製良兮翩翩蒨婉玉露瀼兮瞻霧衣而比緑對皎顔而合素綺檻密而丹樓春荃除漠而紺欄暮大夫于是撫娟冶之華㽔掞麗美之機緯鄙秦聲而穆𢎞述薄燕音而鬯蔚旨才鋪肆而矯翰疾響耀炫而寄神超煩雄章而照紫宿裁燦詞以卷朱霄菊賦俞允文伊兹菊之貞麗挺庶類而擅竒含內美之醇精敷藻蒨之清儀翠葉掩以䓲茂紫莖翕其褷褵迎上春而解作凌九陽而振㽔越流芳于秋坂託纎根于幽崕糅五色而相宣鬱彪炳其陸離狎鳯子來毛姬繡分苔徑錦匝煙陂影亂蔥河之燭光搖苑之芝足使華林掩縟琪樹韜姿晃雕霞之驚絶藹繁星以紛菲矧夫爽籟凝隂涼飈送燠日短晷以向南雁違寒而度北露冷吳宫之草波增漢臯之曲人有愁而必盡物無微而不肅天泬寥兮彌髙木蕭槭兮就剝彼晚榮於此時曽靡踰于兹菊匪負霜而淪操每遡飈而賸馥殖女几而蕃滋出甘津于濬谷纂嘉名於流記閲上藥于丹籙若夫英隱考槃仙徒邁俗或餐英以充虛或擷蘂以佩服或咀實以引年或傳葩以代祝或咽液以療疴或沉醪以媚獨故其為性也可以比德而延期其為芳也可以揚娥而表淑粵有南國上公中朝元輔覽鳯圖以修文總虎賁而勵武道無謝于佐殷神有鍾于生甫玩玄月之改律又朱明之徂暑欣年志之樂康省勛庸之豐偉而乃闢華堂涉芳圃登貴客召真侣蒸蕙肴沃蘭醑集珠履兮翠裾鏗鳯簫兮鼉鼓當令辰而璀璨撫物華而容與于是南園逸叟東海遐賓祇聆勝事緬憶清塵慨契濶之既久慚酬德之無因爰染毫于縑縞命蕪詞以俱敶歌曰金商戾兮被徑楚月華白兮蟋蟀入户清風乘兮輕袿舉神恬愈兮美無度陽芳絢兮彌終古宜永御兮夀黃耉須申頌兮承靈祜瑞麥賦陸深僕間居田野多見瑞麥兩岐三岐至五六岐彼九岐者得于傳聞殆未之見云實有之感兹休禎造賦一篇有頌有美有風有刺義主勸戒附于古詩人之譎諌雖不足以希蹤相如子雲庶東京之流亞也示我同志靡得而布焉天子正德五祀孟月維夏知知子瘍發下體更朔新愈有客唁焉登堂三揖乃掀髯吐論曰夫物有異産事有竒遭談肉者不可與論味眯采者不可與即文濶哉希乎今兹之所覩也子足良苦抑未之知乎知知子蹶然而起危襟橫几奉客下風曰唯唯願詔之客曰走故農家五穀是理爰自弱齡勤厥四體今年逾知命而農穰凡幾一畝三石稂莠吐米皆未若今嵗之為瑞也麥苖芃芃穟岐為二揚芒含頴復為三四多者五六將將覆地東鄰一枝九岐尤異殆淳和之所薰蒸而上帝用以錫類也周書異畝漢歌兩岐陋昔人之誇詡昭后皇之惠慈雖蒙白之翁負玄之老皆緣畝玩視相與嗟咨若走者齒髮猶盛涉歷未廣宜乎驚悸而夥頥也知知子仰屋太息索然久之曰否否客何談之盩也夫緣物者貴質敷文者適用且夫麟鳯之希難以療飢芝菌之祥難以充庖雲錦之爛難以禦寒蠙蚌之光難以續膏是以聖明抑難得之貨壅不稽之言誠以重本而緩末棄無益而即有用也客目覩岐麥津津稱瑞民瘼甚矣果誰之致獨非客之所觀見者乎試為客語往嵗己巳運厄元元夏雲被壟淫雨注天晝夕閲七颶風相牽海波怒而山立江潮噴以駿奔蛟龍舞于街弄岡阜淪為漭淵漂尸橫野浮畜蔽川千里一壑萬竈絶煙于是百年之完聚連邑之生全化為魚鱉葬于鯨鱣者殆過半矣暨乎水退民失故居滄桑一變形勝都非朱門沈其閥閲碧瓦蕩為丘墟鳥窺巢而不下狐訪穴而重疑號哭振野提負沿途父棄其子妻别其夫相與轉徙乞丐奔逐投依若流星之逼曙而敗葉之離枝也于是強有力者牢朽材于古岸塞行潦以腐薪依濕林為棟幹綴敗席為闥閽溷㸑無别卧食不分十併為五棄仇講鄰相依為命枵腹連旬野無留萊樹不遺根徼幸于萬一茍活于旦昏爾乃積隂鬱結隆冬盛寒層氷千文竹柏枯乾豈祝融之故都為玄冥之􅀈驂何曖曖之陽國顧風烈于塞垣民無夙其習不素安于是受凍而仆者乂如干矣天子方軫念南服融照閭閻發德音大王言貸常賦闢四門封簡書于芝檢勤使者于輶軒省大官之供調減司冦之坐論賑倉廪之儲積蠲逋負之浩繁方將奪民命于溝壑續生氣于遊魂蓋三五之罕有而二氣所不能全之曠恩也良有司方憂經費之不足懼考課之殿後鴻澤持而不下限令疾于電走朝四暮三示一藏九使民破十家之産僅足以輸一家費數畝之田未足以賦一畝笳鼓盈村擾及豚狗爾乃制為嚴刑逮乃黃耉巨木囊頭重金繫肘臀無完膚指欲墮手溪壑之填未厭伸暴之門何有于是孑遺之民瘡痍之末斃于敲朴困于征科者蓋淪胥以盡漸不可久矣戾氣醖釀蒸為疫癘方且乘陽發騰獷不可制今枕籍而病卧者比比皆是招醫降巫若憒若醉是其凍餒蝕于胸腸刑罰慘其心志發雙伏而並攻何方藥之能治厥禍方萌殆未知其所至也使壟畝之植一本而十岐共蒂而百穗將安救之而客誇以為瑞哉且菽粟所以貴于珍鼎布縷所以加于玄黃者為其有用也今夫用者徒存而用用者已亡是謂隆虛而病實忘逺而娛細矣僕竊為客贅而不取也客聞而憮然曰噫嘻有是哉子之迂也信乎執一者未足與權二泥彼者不可與適此子徒鑒于己巳之變為流而不止乎是殆滯于隂陽之迹而未深于斯理者也且夫於穆之化圜運不已剝終必復泰因于否吉凶互尋禍福相倚夫蟲之蠕蠕也不屈不發地之窿窿也不伏不起數逆斯通氣順乃死是故九載之水或以成堯七年之旱終以啓禹子豈知夫凶儉之後繼之以豐稔登進之漸承之以君子耶然而氣機橐籥必有攸始兆先于物發逺伊邇鐘鳴而隕霜礎潤而降雨走誠得于俯仰之餘是以釋近憂而崇逺喜也且夫麥備四氣實首五穀詩人頌其於皇下氓賴以率育續嵗功于發春函潛氣而多淑是休嘉之先露徯斯理于將復示帝心之仁愛啓方來之祉福諒有開而必繼孰無徴而乃獲走且與子託丘壑以優遊咏皇風之清穆是故有取于麥岐子何責之備而論之刻耶知知子不能難客乃躡履而退曵杖而歌歌曰麥秀兮多岐覆壟兮纍纍彼其之子曽是兮弗思于是知知子返乎潛室沈思淵默緯情愫于渾淪抽端緒于開闢推玄化之始終考休咎于遺册覽春秋之所書測消長于三易道有殊而歸同理既契而心戚然則客之言似亦未為失也將以厥明戒館客循阡陌辨麥岐之踈數聽鄰䣊之損益問勤勩于三時弔疾苦于緩急于時風輕景融煙朗霧清謝雕輿却繁纓被大練䇿溪藤道以童子從以經生指三汀以東鶩遵龍江而緩征瞻桑梓于原隰拜松楸于佳城睇海氛于極際儼波浪之奔轟感釣遊之舊迹慨嵗月之不停藹里墟之蔓延有孤物而屢更亦浮雲之多態何難樹而易傾悵久寄于異土心戀戀乎故京方徘徊以瞻眺蹇倣徨而屏營顧見道左麥穗岐岐本同未異旁無附枝始戟戟以競秀竟孌孌而莫擕將神工之妙合復化鈞之巧持或雙昂以森矗或左右以紛披或越畎而希挺亦共房而駢垂薄長飈以洄洑照圓景而陸離等比翼于異類嗤連理而不為固物薄而稟厚騰衆喙以增竒胡哲人之超軼隨所如而見疑昔宣尼之瑞魯匡人怪而圍之比干之忠殷曰不祥而戮尸彼二聖且猶然般罹此又何辭抑軒輊之偶致將彼蒼之有知于是厯覽既倦羲馭未疲覽厥頴異采掇以歸洵皇澤之滲漉拯黎民于阻飢託子墨以宣祕聊洋洋以陳詞松聲賦瞿汝稷昔人有謂絲不如竹竹不如肉者以其漸近自然也必如斯言則孰有過于松風之為聲者耶客既有為之賦者遂援毫而和之然聲彌妙則和彌寡深有愧于白雪之音云爾其詞曰粵有逃虛之士淵尚之賓選八荒而無悅渺萬物而寡鄰超人世而獨鏡廓杳眇以怡神乃獨娛夫衆竅之諧會自然之雅音非絲竹而遞㺯迭拊遺鍾罄而觸石摐金並嶰谷以取韻託徂徠以標名實惟要妙是曰松聲蓋方風之起蘋末盛土囊而緣于泰山之阿也維松固已灑然清矣及其飄搖呦漻蕭灑颼飀竦萬尋兮忽舞徐波起而逺流盈空谷而澎湃映别壑而澄幽林氣如此劃然成秋則又聳乎其足聽焉以至清揚遐厲森沉沸渭上漢斯蜚稍雲慙憩夕飈振而柯鳴涼颸引而條曳猿狖哀嘯乎其側飢鼯呻吟乎其內于是蕩漾乎絶巘之下浸淫乎深溪之澨截微徑與荒丘經石林及花嶼衆芳肹蠁其坌集輕靄霏微乎莽際斯則蕭逺沖虛空澄幽翳似春雨兮滿江若廣陵兮潮至涓子不能撫其弦韓娥不能宣其意以故天籟非一松聲最矣松聲若虛會心契矣爾其絶迹箕潁逃名首陽視揖讓兮喪道非放伐兮不王窅然天下喪頽然出處忘澗户無人兮濁世逺孤雲在岑兮獨徜徉惟聽曉鶯變語春壑鳴淙和虛濤之逺寫足幽耳之笙簧若夫幽窗獨坐泉石孤吟方𢎞景兮開徑及彭澤兮歸林煙芊綿兮如織霞朗映兮清隂一鳥偏㺯踈花冒潯聽孤松之流韻似幽人兮整琴悠然忘世洗耳披襟至若松子引年於緱嶺劉阮採藥于天台萬壑度盡生平始來杳松聲兮喧豗使人心爽令人意哀莫不念仙期之綿邈悔短計之迷回永結長生之願深盟錬魄之懷别有楚襄蘭臺之上漢帝蓬萊之旁玉樹磊夥雄風忽揚並蔥蒨以發韻惟松風兮悠揚上君玉堂入君洞房使窈窕兮間靜俾君王兮清涼方欲輟洞庭之張樂罷鼓瑟于瀟湘已矣哉松聲之為妙也是以至人聽之與道若一洗心滌志含光去迹收無聲以為聽鑒至清以為心與天逍遙與世陸沉泠然將御風而遐逝從列仙兮無古今荒菊賦繆一鳳賦菊之生于叢荒中也偶得是紙于倭餘殘篋揭而軸之爰作短詞以自感繄大造之無私運玄樞而莫停受羣植以殊質咸飫氣而暢生桃競春而夭矯蓮接夏以娉婷桐莫辭其早雕柏孰遏其遐齡華不謝榮于東震葉何怨落于西成伊順時而得序分品類以迭更茍至性之不易混荒穢而彌清時乃蓐收司令青女啓行稻方底于有實蒲已萎之先零爾其挺紫莖于太皥標淑采于竒英葉盈盈而墜露葩粲粲以欣晴含金精而內結凌肅氣以孤升味久要乎蘭桂香結佩于荃衡胡為乎不薦爾華屋蓻彼芳庭護以雕楹列以彤櫺供延賞而式燕偹珍玩以怡情競羣穠而進媚附衆冶以爭呈念遭時之弗偶爰托根于幽貞遵叢莽而挺拔並危石以崢嶸譬彼懷瑰竒之介士不徇俗而沽名去故國之擯臣抱忠憤而孤征又如斥嬪之失御姣修容以自珍處幽宫之岑寂低翠眉而含情襲芬芳以勵志何憂乎邪妁之縱橫慨余植之既晚顧操性之有恆諒時命之不忒願歷蹇而終亨檻寒芳以自蓄搴竒馨而結盟解余佩兮以贈友斷余玦兮以明行羌奚羡乎朝妍而夕殞惟欽志于衆瘁而獨榮嗟嵗月之蹉跎慮氷雪之交併茍不隨雜卉以同腐庶無恧于大塊之陶形亂曰猗彼佳人洵清幽兮彤霞為容翠雲裘兮金莖為飱佩琳璆兮獨處空谷懷蹇修兮秉志貞潔孰可儔兮秋水湯湯思悠悠兮遡遊從之無使我心憂兮菊賦李雲鴻僕治詩經而詩之中多不言菊豈詩人有遺採與抑物有辛有不幸與丁酉之秋天行多雨而山園叢菊綽有幽致且把玩之際足以怡神爰作菊賦漫記其盛其辭曰惟玄黃剖判品彚分形宏括罔象細掇焦螟迅四序之天吏煥五色于丹青是故芙渠蕩漾于澤畔蓂莢開落于帝庭氷姿鬭粧于宫主紅衣迷艷于郎星雪染梨而成陳壇依杏以鐫銘至若西施酒酣太真春睡淵林猶恨其無馨也繡簇羅襦曉啼珠露石家方倚之為錦屏也萍一宵而七子松千􅑤而化苓詞臣草詔紫薇光熒騷客豪吟新聲載播乎沉香之亭若乃韻友仙友端伯寄興含笑破憂衛足保孕似證切木筆絲毯異相殊稱昌孕切金鼎玉盤將離標勝或紛披鹿苑芝房之外或蓊菶離宫别館之中或櫢檽齊州赤縣之北或鬱鞅海澨蓬瀛之東巔崖峭壁顔郁鮮紅雕欄寶幰芳雜髙叢繡織局之縠紋刺蘭閨之女工紛泊蜂午蓋巧厯所不能徴陟隆切矣百卉既然菊當何似爰居上皇木橋草茂渾殽獉狉之封為石年君之所氏黃白入劑厥聲斯起日精周盈爾雅分解舉履切籬綴陶潛之金英飫屈平之齒切神于延祚而弭災抑何美乎虎顧而鴟視稽僕下土世奠丹湄謝人世之三窟卓天地之一錐羅恬夷之萬有郤紛攘之九逵其山則白崖玉照杏兒臺子三峰蟉虯而嶺巆東嶺蟬嫣而碨􅓓其水則丹江衍其𣲖石港揚其波漰湱㶖㴸泊岸浴沙桑阿切其産則雹葖蓒芋豇䝄巨勝萮茈﨑亷計然難罄其士則少伯龍躍于中古浮休蠖屈于末年諸范接踵文彩聫翩僕處此所謂大塊私我以於田耎而步武乎考槃之在澗經天切于是傍東阜連西樊闢老囿開晴軒圖史牙籖而錦秩卉木蝟聚而雲屯剃水臺之與地菅藝節華之與蘭蓀是故孟陬之辰青帝司令紅紫輝駢芳菲色競爾獨本枝賱賰音蘊蠢若時保性既杜蜂囮復逺蝶騁比屆朱明曛熖登閎夭妖者炙之而瘁柔脆者觸之而傾方且治爾蟘去爾虻亭亭物表孰敢抗衡逮夫招拒秉樞蓐收布政玉露波浸商飈兵徑第見新羅蓊茸而敷粉黃鶴崙菌而翻翎紫綬綰金章以並蒂碧蕊含玲瓏以垂庭勝金綦黃遇佛稔笑牡丹珍其嘉名芙蓉貴其雅號左漾猗狔右飄窈窕蓮妬太液之穠毬奪香瓊之妙彼波斯之與楊州特各取其速肖百種紛綸僅撮領要然且破蕚茅茨不厭其空吐顔玉砌不矜其豐辟則端人莊士龍德正中堅持晚節無玷厥躬豈若宵夫儇子趨勢之炎而背時之窮耶是故狂夫賞心以開口悶士寓目而舒𠂻蓋其質介其德充也菊之時義洪矣哉此鼓城石湖兼得著譜而披金甲戰秋風聖祖取以志武其致則抹煙帶月窺簾映户醁􅌬可酣柘枝可舞僕即不能擅洛下以稱名園亦可跨甘谷而為玄圃徴酒之籌搜詩之伍一玩忘形神再玩忘爾汝于是不知興之未盡神之莫忤乃亂曰太素無色孰滋榮兮至人無物孰鍾情兮惟感懷以揚聲敢命不律磨陶泓而摛辭于方寸之靈扄云爾芭蕉夜雨賦李蔭猗緑蕉之茂止值隂雨之凄其顧幽人之閴寂撫斯景以欷歔隔疏櫺而傾聽憂中來其莫支若乃聲之清也比于緑桐中乎金石敗梧翼其酸楚哀蛩助其蕭索聲之濁也若擊皮鐸若扣木鐘老鴉用以繼響狂蛙因之糾訟聲之緩也將作復止方鳴乍歇似妍唱與良謳每遲徊而不發聲之急也若千鱗跳瀨萬羽刷林亂簇倐以破革羣手競以摐金至于仇之而親逺之而傍避之而隨麾之而向苦覓疑于相干平侵建于相抗淅淅撼乎肩山點點雜于心浪幽恨釀于睂端煩寃寄于枕上縱善摹其莫詳雖工擬而難狀于斯時也乃有孤臣去國逰子懷鄉郵亭瀟灑旅館昏黃抱書劒以愁絶對童僕而倣徨既徙倚于危坐復反側于方牀挾飛霜以入鬢攢利刃而斷腸思縮地于千里歎各天于一方知不可乎奈何乃抵死而相當又有阿檻擯嬙霜閨思婦歎覆水兮難收仰呼天兮莫訴蘭軒閉兮燈焰殘蕙帳空兮螢火度君王絶迹兮長門宮蕩子從軍兮遼陽戌有所思兮期不來欲往從之恐難遇玄結隂兮夜漫漫旦何時兮淚交注聆滴瀝之苦聲想焦心而生妬思持斧以運斤將斬葉而伐樹凡若此者皆牽于所遭之戚而未得乎所植之趣者也若夫王孫公子髙門甲第大宴朋賓盛陳佳麗簾幕圍兮氛翳逋蠟炬烘兮夜堂霽剖腴割鮮兮送水陸之珍竒換羽移商兮縱管絃之嘹唳屢舞兮傞傞踏歌兮嘒嘒㺯酒盞兮歡呼戲簮珥兮暗墜雖畢命于明朝且暢情于斯際將俾晝以作宵又何知夫寂寞之况味也耶此猶其淫樂者爾若夫禪房窈窕琳館清幽一塵不染佳客來逰爇蘭芬于石鼎薦茶味于磁甌或貝葉之三復或丹經之一抽或煩赤髭以講西方之教或屈黃冠以闡柱下之猷清涼入肺腑爽氣襲衣裘將興還偃息欲去且淹留若此者固冝纍朝暮而不厭又何知夫外物之相搊哉于是申之詞曰風瀟瀟兮雨涔涔夜色穆穆兮漏沉沉形與聲兮兩相戰芭蕉之上兮葉之心戞青玉兮峭稜濕翠鸞兮修尾羌美人兮舞袖似半醉兮扶不起引愁緒兮填胸遞哀音兮滿耳茍欲淡兮相忘在洞觀乎玄理吾心兮淨空纎芥兮不容湛太虛之本體兮等震電于蠛蠓將聲臭之俱泯兮反造化于鴻濛明文海卷四十四
