body:
  text: 明文海卷四十五餘姚黃宗羲編賦四十五花木三落花賦葉憲祖武林張次公舊有落花賦膾炙人口余未之見也乙丑秋日晤次公于都門始得快讀才艷鮮穠情寄悽惻已極詞人之致第賦與興比不同始末詮敘各有厥體兹賦縱橫言之若以之入歌行可與盧駱同風余不揣蕪陋效顰一篇深愧拘于所聞聊博知己之覽笑云爾原夫芳藂茂苑綺合上林條風布暖淑氣垂隂吐鮮華于雜樹紛麗色之交森臨軒之鼓堪催連夜之符待發河陽之仙令爭看鄴下之清歌未歇恣王孫之宴賞兮盼駐景于朝霞重騷人之題諷兮欲留春于碧月夫何容華盡兮憔悴風雨妒兮飄搖含姿别幹抱馥辭條點蒼苔而尚媚瞥秀目兮空撩惜繁英之易墜恨好物之非牢繄惟綴庾嶺之瓊㽔發羅浮之清夢顧瘦影兮雲橫挹幽芬兮月送冷蕊驚飛關山一㺯乃若影碎百株之錦春迎十里之紅指前村兮沽酒探御宴兮登龍殘粧欲褪麗彩俱空粵若紅饒一捻欄開百寶姚黃魏紫傾富貴之家國色天香極形容之巧會歡賞之無多亦摧殘之恨早亦有西府之産特異垂絲之種還妍迎風兮若纎腰之怯舞著雨兮宜冶態之增憨覔佳人于空谷竟形影之難探若夫玄都之樹新栽紫陌之塵自滿憶避秦兮何年嗟乞漿兮期短亂紅雨兮其如擲春風兮不管復有西湖十里玉井一枝六郎之面姣好妖妃之步逶迤倦紅衣之欲卸忽凌亂于漣漪爰及招搖之種吕覽攸稱賁禺之樹禹經所薈托幽叢于小山蕩天香于雲外惟金粟之繽紛亦秋風之無賴于是花云異狀落亦殊顔墜梨花之粉兮白晳灑杜鵑之血兮紅殷豆䓻之相思散漫酴醿之倚駕闌珊木蘭飄雪薔薇隕露榴照眼兮輸丹栁飛綿兮失素或繞砌以依欄或沾泥而撲路其乍零也翩弱態于廽風其既落也付香魂于流水蝶蹴舞于低枝燕銜歸於舊壘伊造物之多情似裴􅏆而未巳若夫身墜玉樓容慘壽陽咏寂寞則阿嬌之長門乍掩悲棄置則班姬之紈扇初藏還故枝而不得徒垂涕于空房嗟夫物疇榮而不萎世靡盛而不衰信芳菲之易謝冝為歡之及時濡毫兮太息落花兮凝思狀元紅賦蔣德璟若夫金棕玉栗鱉卵龍牙麝囊椰鍾黑葉緑紗蚶殼朱柿星毬雞肝霞墩松蕾金線冰團牛心鵲卵淨瓶蜜丸夫固亞僕乎瀘粵然猶閩囿之下丹也往者忠惠之書遺于方氏嬌二百而為讖竟淪掩于鐸里維鐸及奕誕降嘉㽔延壽是孳祥井是氿移紫度緋法藍心恥流觀夫伏熸秋回百荔垂􅀈黛葆扈雲彤實射暹夜星晝燭圓蓋方陳譬若火峯其木不燼乂若琅玕萬斛鳯丸離離藝風氣聞千步又若雒媛含辭未吐寒泉三尺泄浴天芳又若合德初出蘭湯廣上圓下皓肪中沒又若冝主柔溫無骨霧綃半劈醴津斯皬龍漿斯落又若吉雲露珠一勺昶膜醲英又若水晶槱核焦封又若丁香應啜灰滅乂若甜雪留芬射越弛服墜裾又若茵墀流汁入渠故其冬青春榮之性絳襦玉膚之狀駁犖辨艷之粧蠲渴補之湩亮羣族之所伏嗟難得而覼况是以叉頭盛鬋雙髻奉王娘鄣袂將軍􅗙鐲服其實者挹膏潄瓤為荔羡偓昔扶荔之宫積草之池金明搖風十不一易若乃雒陽置于嶺南長安賮于巴蜀法部初哇明駝暗䎘撫酸苞而虛憐悵珠靨之已秃悝嬌環之解笑固以瑊玏為結琭忠惠之書􅚹二産汰閩江之􅀈馤未若兹種羃厯乎三十二之外重曰震氣五滋狎獵的纚生代巧兮答遝蚌胎誰其冠者繄延壽兮元鼎風堠宣和航瓦珍非質兮皇罕連賨願登上林比禹橘兮弔落梅賦談宗厯長安道幾遍其為土無幾何皆惡也日亭午猶平分之加晡則七之即晨起幾于無土矣乃者忽見片梅於道殊不知其所自驚視却步愴焉感懷為落梅賦以弔之夫梅又曷嘗不以落終然昧于時非其埊豫亦何為而不弔耶既而慰之明情以理申不敢漫為不平徒相與以無益也其辭曰越嵗淵獻兮實維京師厥月臘蠟兮蹢躅塗泥爰有梅華兮零落道旁旋步却顧兮不知所從􅀈呼彼梅兮生有定處匪山及泉兮必亭與野胡兹不辰兮遭遻多故不榮而枝兮乃戕於路播彼林薄兮逼此溝瀆剝其馨澤兮入於臭惡竟與煙露相失兮􅘞矢為親烏違惑兮犬豝蹂躪存莫歡鳴兮亡誰哀些戴天徒髙兮履地安大覆品藻於學士兮孰庸庸之論破掩粧靚於隔世兮空美人之思慕縱軒騎之䢔遝兮疇復下而問之感匹士之拓落兮獨為文而唁之訊曰哀哉世事之不可憑兮唯遭逢之為政也抗則雲而抑則淵兮蓋物固有其命也瑚璉登於廟堂之上兮右太羮而左玄酒及其骩棄瓦礫兮牧豎攫之以啜行潦故夫神龍夭蟜於田間兮狂童不敢指而為言假而受困於蚍蜉兮雖仁人未必見之或憐奄淒淒其􅍦却於條枚兮實爾蒂之不固爾既漂墮不得集於鈿頞乎亦所際之不遇爾麒麟繫纍于罷牛之後兮即安所觖望爾實乃華蕚之聖哲兮毋為凡木而失足而悢悢雖身周於糞兮不過皮髮之滓涅茍此心之潤玉兮夫誰不奉之以芳潔明文海卷四十五
