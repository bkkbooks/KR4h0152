body:
  text: 明文海卷四十八餘姚黃宗羲編奏疏二除授方面疏楊士竒昨日太監金英傳奉聖旨今後除授方面官及府州正官若專用保舉即是恩出於下還依洪武永樂年間例行欽此本官後又令臣計議臣伏思宣德七年以前其前項官員多不得人百姓受害欽奉宣宗皇帝敕旨布政司按察司官及知府知州得其人則民安非其人則民受害該部往往循資升授不免賢否混淆自今布政司按察司官及知府知州有缺吏部行移在京三品以上官舉保及布政司按察司堂上官連名舉保必取亷公端厚識達大體能為國為民者吏部審其所保果當具名奏聞量授以職後犯贓罪并罰舉者欽此以後凡所保者多得其人皇上臨御以來悉遵先皇帝敕旨而行今後處方面官與府州正官十有八九得人停當所以百姓得安其間或十有一二舉不得人却是保舉之人審察不明亦或實是徇私惟是該部不行糾舉以致四品等官舉保知縣者十有三四舉保不當然所保得當者還多自今舉官之人亦已多知謹畏不敢輕易濫舉恐纍及自身臣愚見伏望聖明仍遵宣宗皇帝敕旨而行大抵宣宗皇帝仁民之心皆是上體太祖皇帝太宗皇帝仁宗皇帝三聖仁民之心而行非是有所更改但因時損益耳昔我太宗皇帝於洪武之政仁宗皇帝於永樂之政皆有因時損益之宜亦皆是上體祖宗保民之心而行故當其時無人曽有異議宣宗皇帝臨御之時體祖宗之心以行保民之政者尚多此保官一令是第一事蓋用人者帝王之首務也伏望皇上奮獨斷之明今後舉保方面及府州正官宜悉遵宣宗皇帝敕旨而行昔唐太宗行仁義之政命在京三品以上官舉郡守縣令後來致天下斗米三錢外戶不閉之效明鑒所在可無疑也聖旨所諭保官則恩出於下切緣衆臣舉保之後吏部審擇具名奏請必得聖旨賜允然後授官如不賜允即不得除授凡授官者莫不感戴聖恩恩實非出於下也此令行於宣宗皇帝在位之時數年不聞人有異議惟近年始有一等京官不才輕薄無人保舉者造為謗語傳播中外其意專欲隳壞先帝之良法不行則此等無狀小人皆得升用此等小人升用則百姓受害天下何由治平自古朝中用一正人行一良法則小人皆不便之毁之壞之如孔子初攝魯相國之小人作歌謗之及久而定也國人愛之作歌頌之又惟恐其死也在古聖賢尚然可以觀小人之心矣伏望聖明只依先皇帝敕旨而行但所舉之人後有犯贓須明正濫舉之罪并罷其官便是臣濫舉亦請究治不宥庶幾其餘有所警省臣受四朝大恩常切慚愧無能補報惟念用人賢否關係生民休戚國家治忽今若知而不言是臣不忠之罪大矣是以謹竭愚誠冒瀆天聽伏惟聖裁奉天殿災上疏鄒緝臣伏奉敕書以今月初八日奉天殿災敕諭文武羣臣詢求所以致災之由令臣等逐一條陳無隱俾知警懼以回天意臣惟陛下敬天勤民之意至深至切未嘗少怠而羣臣奉行或失初意故不能無少過誤致使下民失所怨讟上興上天眷懷遂加譴罰陛下心存警懼咨訪羣臣惟臣愚昧淺陋不足以識致災之由但有所見不敢遂隱謹採耳目所聞上陳聖覽伏帷少垂察焉切以皇上紹嗣太祖髙皇帝之統緒建立兩京所以為子孫帝王萬世之丕基天下萬民尊仰之根本爰自肇建北京以來焦勞聖慮幾二十年工力浩大費用不資調度既廣科𣲖亦繁羣臣不能深體聖心致使措置失宜所需無藝掊尅者多冗官濫員內外大小動至千百使之坐相蠶食耗費錢糧而無益於事是竭盡生民之膏髓猶不足以供工作之用由是財用匱乏莫知所圖民窮無告猶不之恤夫民之所賴以為生者衣食也而民以百萬之衆終嵗在官供役既不得保其父母妻子遂其樂生之心又不能躬親田畝以事力作使耕種不時農蠶廢業猶且征求益深所取無極至於伐斬桑棗以供薪㸑剝取桑皮以為楮料而民之衣食無所資矣加之官司胥吏橫征暴斂日甚一日民生無聊愁歎滿室且如前兩嵗買辦青緑顔料本非出産之所而科𣲖動輒千數百斤民無可得則相率斂鈔遍行各處收買每大青一斤至萬六千貫及至進納又多以不中不肯收受往復展轉當須二萬貫鈔方得進收一斤而所用不足以供一柱一椽之費其後既已遣官採辦於出産之處而府縣買辦猶不為止蓋緣工匠計料之時惟務多派以為濫取之利而不顧民之艱苦難辦此又其為害之甚也然此特買辦之一耳其他又有不可勝言者矣且京師者天下之根本也人民安則京師安京師安則國本固而天下安此自然之勢也而自營建以來用事之人不思人民為國之本謀所以安輯之乃使羣輩工匠小人假托威勢驅迫移徙號令方出即欲其行力未及施屋已破壞或摧毁其墻壁或擊碎其屋瓦使孤兒寡婦坐受驅迫哭泣號呌力無所措或當嚴冬極寒之時或當酷熱霖汗之際妻子暴露莫能自蔽倉惶逼迫莫知所向所徙之處屋室方完又復軀令他徙至有三四遷移而不能定者及其既去而所空之地經月逾時工猶未及陛下之愛民本甚深而工作小人橫害下民如此其甚陛下皆有所不知此京師人民之受害而不能無怨讟者也貪官汚吏遍布內外剝削之患及民骨髓朝廷每遣一人出差即是其人養活之計誅求責取至無限量州縣官吏答應奉承惟恐不及間有亷潔自守心存愛民不為承應及其還也即加讒毁以為不肯辦事朝廷不為審察遽加以罪無以自明是以在外藩司府縣之官聞有欽差官至望風應接惟恐或後上下之間賄賂公行略無畏憚剝下媚上有同交易貪汚成風恬不為怪夫小民之所積幾何而內外上下誅求如此豈能無所怨讟乎今山東河南山西陜西諸處人民飢荒水旱相仍至剝樹皮掘草根簸稗子以為食而官無儲蓄不能賑濟老幼流移顛踣道路賣妻鬻子以求茍活民窮財匱如此而猶徭役不休征斂不息京師之內聚集僧道幾萬餘人日食廪米百餘石而使天下之人粳粃不足至食草木此亦耗民食以養無用者也至於報效軍士朝廷厚與糧賜使之就役而乃驕傲橫恣不執常役間遊往來擾害良民此乃姦詭之人懼還原伍科徭不堪假此為名以圖規避非真有報效之心此其可以信用之乎朝廷嵗令天下有司織錦段鑄銅錢遣內官賫往外蕃及西北買馬收貨所出常數千萬而所取曽不能及其一二耗費中國糜敝人民亦莫甚於此也且錢出外國自昔有禁今乃竭天下之所有以與之此可謂失其宜矣馬至雖多類皆駑下散與人民畜養馬多人少畜養不周及至死傷輒令賠償馬戶貧困則復鬻賣妻子猶不能償夫國家之所賴者人民也人民已耗土地空虛養馬雖多亦何所用此又其害之大者昔晉武帝徙邊人於河南內地羣臣皆諌以為不可恐貽他日之患武帝不聽其後卒致邊陲之亂今乃許令達靼之人入中國以鞍馬弓矢居室牛羊衣服盛具供帳以待之此等皆窺中國姦細之人尤其所不可者夫人莫不安土重遷不樂逺徙況此蕃部習俗既殊所性亦異豈肯背其本主違去鄉土而居中國乎是必有可疑不可以不察也今宜使之來朝之後即遣歸本國不必留之以為後日子孫之患也至於宫觀禱祠之事自古有國者所當深戒漢武帝嘗極意以求之而卒無其驗取譏後世亦宜去而絶之也古人有言淫祀無福況事無益以害有益蠧財妄費國用無度亦其一耳凡此數事皆足以損傷和氣下失民心上違天意怨讟之興實由於此夫奉天殿者陛下正朝之殿所以朝羣臣發號令出政之所古之所謂明堂也而災首及焉其為災之大自古以來未之或有誠所謂非常之變也非省躬責己深察所以致災之由大布恩澤改革政化以疏滌天下窮困之人不能以回上天譴怒之意也夫應天以實不以文臣願陛下深下明詔散遣工匠營造之人停止役作使天下之人得遂其父母妻子相安相樂之心罷絶下蕃買馬之役勿令復出四邊外國來朝貢者賜賚而遣之勿使久居中國有願留者亦宜遣令出塞俟三四年餘後復議之蓋四邊歸附朝貢雖足以為中國之盛然使久居於此窺見中國之虛實恐非今日之所宜亦非他日之利也彼皆徼外之人未洽恩義徒以貪求中國之貨賄而已一旦待之有不至必且為中國患矣冗官濫員宜沙汰之使歸田里有可用者亦使暫歸俟其官有闕則取用之簡拔賢才申行薦舉嚴官吏有貪贓蠧政壞法為民之害者在內則令六卿大臣及監察御史在外則令按察司官按核其實而罪黜之勿復寬貸若有亷能之官善績昭著許令保薦於朝量加升擢使有激勸大抵敦教化厚風俗勵廉恥勸善良此有國之先務善有所勸惡有所懲則亷恥之道立而姦貪之俗自止息矣前者常有監生生員告乞單丁侍親因而獲罪發充軍者亦乞赦原取回使得遂其初心蓋其間亦有先告侍親後以親終已行出仕有司不行分理一槩查發充軍此皆有虧治體難以垂訓將來至於宫廟禱祠之事亦宜罷絶無聽其妄近者大赦天下之時法司執滯常條罪有無大干涉所當赦宥者尚復拘繫亦乞重加湔洗使之自新常為京職者則降出於外復還舊職蠲除租賦一切征斂科需不急之務悉乞停罷飢荒之民則令所在有司發廪賑濟或官廩不敷則勸令大戶之家出粟以賑之官為之主俟有豐收則俾償之凡此皆天下之大計所以保安宗社收拾人心挽回天意而為國家千萬年無窮之命脈今皆舉行之則人心歡悅和氣可臻民心既固國本益安欲為天下蒼生之福子孫帝王萬世之基莫有大於此者矣夫國家之所恃以久長者天命也人心也而天命所在常視人心以為去就未有不得人心而可以保天命也未有人心既歸而天命不歸之者欲和人心必敦教化必修禮讓必使之遂其生養於閭閻之下教化行而禮讓興則人知父子君臣之教尊君親上之義則任之以事驅之以役雖勞而不怨生養遂衣食足則人知重亷恥樂妻子保親族盜賊息而無爭奪凌暴之風矣如此則人心和附天命凝固國家久長之利又莫有過於此者矣姦人細民有以詭術異道而惑人者則抑絶而禁止之使不亂吾民之教信賞罰一號令使人有所守而不為疑惑賜豫有節而不至於濫恩財出有經而不至於妄費則國本充實財用可舒而不至於空乏有司百官全其祿廩使有以養其亷恥天下之人得以休養於田里之間而有司官吏無貪殘虐害之政則災沴不作太平可臻人心既和天命攸屬而國之基本自固此誠國家之至計保安天下消弭災變之大者也至於邊防守禦之臣則令其修飭軍伍謹察烽堠以防冦盜此又其所當慮於未然者也今天意如此災變已極不宜復有所造作以重勞其民當還南京奉謁陵廟告以災變之故保養聖躬休息於無為數年之後天意既回始可為之不宜聽信小人之言復有所興作以誤陛下於其後彼小人者不知國家憂戚之大計惟欲諂諛順旨以希幸恩寵而已若復聽其言以為無害則誤陛下益甚殆非國家之利也臣不勝惓惓請革西厰疏商輅題為體天道循舊章安人心弭災異事仰惟皇上臨御以來敬天法祖任賢使能政事修明紀綱振舉是以十餘年間海內晏然雖天象屢以示戒而災變自消雖水旱比嵗相仍而民無離叛實由皇上寬仁大度省刑薄斂慈仁愛人之心感孚於上下也夫何近日伺察太繁法令太急刑網太密官校提拿職官事皆出於風聞暮夜搜撿家財初不見有駕帖人心洶洶各懷疑畏內外文武重臣託之為股肱心膂者也舉皆不安於位百司庶府之官資之以建立政事者也亦皆不安於職商賈不安於市行旅不安於途士卒不安於伍庶民不安於業承平之世豈宜有此究其所以蓋緣陛下委聽斷於汪直之一人而汪直者轉寄耳目於羣小汪直之失雖為未甚而羣小之中其姦謀足以顛倒是非其巧佞足以蠧惑人心如韋瑛者自言親承密旨得專豫奪之柄自謂百官進退盡在掌握之中擅作威福虛張聲勢其間同惡相濟如王英者則以附己而薦之稍存公論有所諌正者則以異己而黜之如狼虎肆無忌憚原其立心惟知希求進用以為一身之榮不知傷害善良虧損聖德之纍陛下若為防微杜漸不得不然則前數年間何以帖然無事往者曹欽之反皆由逯杲生事有以激之人所共知可為明鑒昔唐太宗當天下甫定之後骨肉相殘羣雄側目嫌疑之際宜乎過慎也而乃從魏徵仁義之言拒封德彞刑罰之説遂致海內殷富斗米三錢外戶不閉幾於刑措太宗因封德彞死謂羣臣曰此魏徵勸行仁義之效也恨不令封德彞見之夫德修而民自化法急而民愈亂考之前史厯厯可驗孔子曰道之以政齊之以刑民免而無恥道之以德齊之以禮有恥且格國家積德百有餘年深仁厚澤浹洽人心四方萬國莫不歸戴陛下為守文令主嚴刑峻法誠非所宜況今天鳴地震無處無之水旱災傷日甚一日省躬念咎弭災息患之道莫先於恤刑獄莫要於安人心而乃反此所為使人人嗟怨感傷和氣一旦有警變且莫測腹心之患可不懼乎可不慮乎伏願皇上體天地之包容勿察察於事情遵祖宗之成憲勿屑屑於改易旨意必經於六科防將來之假冒奏訴必由於通政杜濫受於他門責政事於府部而嚴課功核實之權付刑獄於法司而申三覆五奏之令收回伺察之人誅逐姦邪之輩其有謀逆姦細并貪贓壞法重情悉依舊規委任厯練老成之人營理如此則讒言不入於耳自足以頥情而養神苛政不加於下自足以安邦而定國延聖夀於萬年保皇圖於不拔其端皆在於此不然此風日長衆口嗷嗷國之安危未可知矣臣等荷陛下生成之德置諸宥密之地一念愛君之心拳拳朝夕有所聞見豈容緘默謹條陳大略具題以聞伏候聖斷即賜施行則宗社幸甚天下幸甚臣等俯伏俟命一舊設行事人員專一緝訪謀反妖言強盜人命及盜倉庫錢糧等項大事今西厰却專尋搜細故凡街市攘鬭罵詈爭雞縱犬及一時躲避不及者或加捶楚或煩瀆聖聽置於重法以致在城軍民驚皇不安一官職有犯緝訪得出請旨拏送經該衙門問招明白有罪者奏請發落供明者請旨還職係是定制今聞西厰將廣西勘事郎中武清自通州聽選方面官劉福自歇家俱拿到厰監禁數日輒又釋放且武清係五品官劉福係正三品官擅拏擅放恣意所為紊亂朝政莫大於此一官員犯罪追贓者法司自有成規今西厰擅自封兵部武選司門以後遇官員有犯正身未曽問招先將本家門封閉或夤夜越墻進入搜撿財物或將命婦剝去衣服用刑辱打被害之家有同抄劄以致各衙門大小官員驚惶不安若從此不止日後或有姦人強盜假名害人者真偽何由而辨一京營管軍頭目俱係朝廷托以重寄之人其公私勤惰朝廷自有賞罰今聞西厰不論有無事情一槩令人跟緝鈐束以致各懷危疑不安一各處鎮守總兵官乃一方安危所係既被選用當任之無疑待之從厚其或有事不得不差人體訪事畢即已今聞西厰各處差人採聽事情彼一聞之無不慮恐患及退縮自保誤事非輕一各布政司多有王府所在今西厰差校尉分投去彼行事不但官司驚疑各王府亦未免自危事生不測天順年間曽差校尉各處行事皇上即位之初即已革去後三四年尚有假充校尉詐錢害人者此明驗也不可不懲一河道係兩京各處錢糧貨物經由之路要在通行不宜阻滯今聞西厰官校分布沿河一帶遇有船到即加盤問間有公差官員被其搜撿以致往來客商軍民人等聞風驚疑有未起程停止不來者有在中途寄放回還者似此貨物不通將來京師公私費用何以仰給抑恐姦盜假此搜船劫人卒難禁止一朝廷威福不可下移自立西厰之後太監汪直每日外出跟隨之人數多但遇官員人等無不喝令下馬雖大臣亦謹回避如兵部尚書項忠當早朝鼓響伺候之時汪直令校尉就左掖門下呼呌項忠不待朝罷被校尉擁逼而去其欺凌大臣如此至於法司郎中御史等官每遇弔查文卷俱要親賫赴厰竟日伺候不得一見又如東西兩長安門牌上用黃紙帖寫太監汪傳奉聖旨不書其名滿朝官員見者無不驚駭一百戶韋瑛係無籍小人纍投勢要不肯容留從征僥幸得升前職自夤緣投西厰行事之後發人事情言多失實又引進譎詐小人王英結為心腹專一訐人陰私以固信任凡前項拿人放人擅封門戶搜撿家財凌辱婦女驚動人心紊亂朝政等項俱係二人所為一臣等切詳此等事情非惟與治體相關又與天道災異相關何也去嵗七月以後有妖物出自西北繞城傷人當時人言必有應驗及妖怪方息遂立西厰驚駭人心一如妖物害人之時由此觀之天道預先示戒不可不慮今太監汪直年幼未諳世事止憑韋瑛等主使呈報中間固有一二似為禁革姦弊奈非祖宗舊制所革未多其失人心則己甚矣中外騷然安能保其無意外不測之變若不早為除革一旦禍興卒難消弭伏望皇上斷自宸𠂻革去西厰罷黜汪直間住以全其身將韋瑛王英拏送法司會同錦衣衛推問明白治以重罪如此則人心可安天意可回矣論太學疏李賢竊惟太學者天下貢士所萃乃育賢成材之地故天下之士所以賢所以才胥此焉出所以盛所以衰胥此焉係然則生民之休戚風俗之美惡國家之安危豈不皆關於此哉洪惟太祖髙皇帝聖神文武平定天下定鼎金陵首崇是道方是之時宫殿城池未盡完也百府諸司未盡創也佛寺僧道未盡舉也乃建太學於國宏其規樓極其壯麗凡所以教士之法戒士之條居士之所養士之具無不詳審周密完備又慮表率之職實難其人務選天下學明行修德尊望重海內所向慕士大夫所依歸足以師表一代名蓋一時者然後命為祭酒崇以師道以振文風以增士氣其愛諸生如慈母之顧嬰兒貴之若席上之珍恩惠極隆無以加尚於是天下之士入太學者居無不正習無不端衣無不具食無不足無飢寒之亂心無邪僻之墮行其所事者治禮義明人倫窮修己治人之方務致君澤民之術故當時賢才俊傑之士濟濟輩出布列中外大綱一正萬目畢張自古太平之盛未能或之先也易曰聖人養賢以及萬民其斯之謂與永樂初年駕臨北京太學之設因元之舊凡百規制未暇增新洪熙宣德以來因仍未舉至其教戒居養之道頽然廢弛不遑介意師儒之職率皆庸常學行荒疏無從矜式雖有遺規不過承虛名為文具踵因循應故事而已於是天下之士入太學者蔑教戒之嚴無居養之正置禮義為外物輕亷恥如錙銖雜處於軍民之家渾住於營巷之地與市井之人為伍與無籍之徒相接同其室而共其食啖其夫而私其婦易君子之操為鄙夫之行改士夫之節為穿窬之心所習如此一旦居官不過志於富貴而已尚何望其尊主庇民建功立業乎夫近朱者赤近墨者黑居處所致無怪其然也嗚呼天下之士修之於庠序而壞之於太學賈誼所謂可為太息者也今陛下春秋鼎盛纘成大統凡一舉措不可不慎舉所當舉則天下之人莫不歡心舉所當措則天下之人莫不解體可不慎歟我國家建都北京以來有廢弛而不舉者有創新而不措者所廢弛者莫甚於太學所創新者莫多於佛寺舉措如是臣以為舛矣然成事不説廢者當舉若重修太學雖極壯麗不過佛寺一所之費況佛寺無益於朝廷而太學實關於治體伏願皇上興廢舉墜乞敕該部計料興工一新太學作養秀才重選師儒厚加眷注果能此道將見數年之後賢才濟濟文風大振生民於是乎安天下於是乎治我太祖養賢及民之效復見於今日太平之盛不期自至而國家社稷永享無窮之福矣臣性質凡陋無所知識偶有所見豈敢隱默冒干天聽不勝惶汗之至考正孔廟從祀疏程敏政臣聞古聖王之治天下必以祀典為重所以崇德報功而垂世教淑人心也故有功德於一時者一時祀之更代則已有功德於一方者一方祀之踰境則已然欲勸一時範一方而不敢輕議焉況先師孔子有功德於天下萬世天下祀之萬世祀之則其廟庭之間侑食之人豈可苟焉而己必得文與行兼名與實副有功於聖門而無疵於公議者庶足以稱崇德報功之意若侑食者非其人則豈惟先師臨之神不顧歆將使典模範者莫知所教為子弟者莫知所學世教不明人心不淑通於天下而施及後世其為關係豈特一時一方之可比哉邇者言官欲出文廟從祀諸賢之有罪者詔禮部集議臣愚亦在預議之列疑其所言尚有未盡而議者相持憚於改作臣考之於書揆之於心不敢妄為異同謹畫一條陳上瀆聖覽伏乞皇上丕顯文謨主張斯道仍下禮部通行集議采而行之一洗前代相習之陋永為百世可遵之典使世教有興起之益人心得趨向之兮其於治道未為無補謹具奏聞一唐貞觀三十一年始以左丘明等二十二人從祀孔子廟庭蓋當時聖學不明議者無識拘於舊注疏謂釋奠先師如詩有毛公禮有髙堂生書有伏生之類遂為專門訓詁之學為得聖道之傳而併及馬融等行之至今誠不可不考其行之得失與義之可否而釐正於大明有道之世也臣考厯代正史馬融初應鄧隲之召為祕書厯官南郡太守以貪濁免官髠徙朔方自刺不殊又不拘儒者之節前授生徒後列女樂為梁冀草奏殺忠臣李固作西第頌以美冀為正直所羞即是觀之則衆醜備於一身五經為之掃地後世乃以其空言目為經師使侑坐於孔子之庭臣不知其何説也劉向初以獻賦進喜誦神仙方術嘗言黃金可成鑄作不驗下吏當死其兄陽城侯救之獲免所著洪範五行傳最為舛駁使箕子經世之微言流為陰陽術家之小技賈逵以獻頌為郎不修小節專一附會圖讖以致貴顯蓋左道亂政之人也王弼與何晏倡為清談所注易專祖老莊而范寧追究晉室之亂以為王何之罪深於桀紂何休則止有春秋解詁一書黜周王魯又注風角等書班之於孝經論語蓋異端邪説之流也戴聖為九江太守治行多不法懼何武劾之而自免後為博士毁武於朝及子賔客為盜繫獄而武平心決之得不死則又造謝不慙先儒謂聖禮家之宗而身為贓吏子為賊徒可為世鑒王肅在魏以女適司馬昭當是時昭篡魏之勢已成肅為世臣封蘭陵侯官至中領軍乃坐觀成敗及母丘儉起兵討賊肅又為司馬師書策以濟其惡若好人佞已乃其過之小者杜預所著亦止有左氏經傳集解其大節亦無可稱如守襄陽則數饋遺洛中貴要紿人曰懼其為害耳非以求益也伐吳之際因斫癭之譏盡殺江陵之人以吏則不亷以將則不義凡此諸人其於名教得罪非小而議者謂能守其遺經轉相授受以待後之學者不為無功臣竊以為不然夫守其道經若左丘明公羊髙榖梁赤之於春秋伏勝孔安國之於書毛萇之於詩髙堂生之於儀禮后蒼之於禮記杜子春之於周禮可以當之蓋秦火之後惟易以卜筮僅存而餘經非此九人則幾乎熄矣此其功之不可泯者以之從祀可也若融等又不過訓詁此九人所傳者耳況其書行於唐故昔姑以備經師之數祀之今當理學大明之後易用程朱詩用朱子書用蔡氏春秋用胡氏又何取於漢魏以來駁而不正之人使安享天下之祀哉夫所以祀之者非徒使學者誦其詩讀其書亦將識其人而使之尚友也臣恐學者習其訓詁之文於身心未必有補而考其姦諂淫邪貪墨怪妄之迹將自甘於效尤之地曰先賢亦若此哉其禍儒害道將有不可勝言者矣至於鄭衆盧植鄭玄服虔范寧五人雖若無過然其所行亦未能以窺聖門所著亦未能以發聖學若五人者得預從祀則漢唐以來當預者尚多臣愚乞將戴聖劉向賈逵馬融何休王肅王弼杜預八人褫爵罷祀鄭衆盧植鄭玄服虔范寧五人各祀於其鄉后蒼在漢初説禮數萬言號后氏曲臺記戴聖等皆受其業蓋今禮記之書非后氏則不傳於世矣乞加封爵與左丘明等一體從祀則偽儒免欺世之名賢者受專門之祀而情文兩得矣一孔子弟子見於家語自顔回而下七十六人家語之書出於孔氏當得其實而司馬遷史記所載多公伯寮秦冉顔何三人文翁成都廟壁所畫又多蘧瑗林放申棖三人先儒謂後人以所見增益殆未可據臣考宋邢昺論語注疏申棖孔子弟子在家語作申續史記作申黨其實一人也今廟庭從祀申棖封文登侯在東廡申黨封淄川侯在西廡重復無稽一至於此且公伯寮訴子路以沮孔子乃聖門之蠡螣而孔稱瑗為夫子決非及門之士林放雖嘗問禮然家語史記邢昺注疏朱子集注俱不載諸弟子之列秦冉顔何疑亦為字畫相近之誤如申棖申黨者但不可考耳臣愚以為申棖申黨位號宜存其一公伯寮秦冉顔何蘧瑗林放五人既不載於家語七十子之數宜罷祀若瑗放二人不可無祀則乞祀瑗於衛祀放於魯或附祭於本處鄉賢祠仍其舊爵以見優崇賢者之意亦庶乎其名實相符而不舛於禮也一洪武二十九年行人司司副楊砥建議請黜揚雄進董仲舒太祖髙皇帝嘉納其言而行之主張斯道以淑人心可謂大矣然荀況揚雄實相伯仲而況以性為惡以禮為偽以子思孟子為亂天下以子張子夏子遊為賤儒故程子有荀卿過多揚雄過少之説今言者欲併黜況之祀宜也然臣竊以為漢儒莫若董仲舒唐儒莫若韓愈而尚有可議者一人文中子王通是也通之言行先儒之論已多大約以為僭經而不得比於董韓云爾臣請斷之以程朱之説程子曰王通隱德君子也論其粹處殆非荀揚所及若續經之類皆非其作然則程子豈私於通哉正因其言之粹而知其非僭經之人耳朱子曰文中子論治體處髙似仲舒而本領不及爽似仲舒而純不及又曰韓子原道諸篇若非通所及者然不免文士之習利達之求若覽古今之變措諸事業恐未若通之精到懇惻而有條理也至於河汾師道之立出於魏晉佛老之餘逮今人以為盛則固豪傑之士也今董韓並列從祀而通不預疑為闕典臣又按宋儒自周子以下九人同列從祀而尚有可議者一人安定胡瑗是也瑗之言行先儒之論甚詳大約以為少著述而不得比於濓洛云爾臣亦請斷之以程朱之説程子看詳學記曰宜建尊賢堂以延天下道德之士如胡瑗張載邵雍使學者得以矜式朱子小學書亦備載瑗事以為百世之法臣以為秦漢以來師道之立未有過瑗者矧程子於瑗之生也欲致其與張邵並居於尊賢之堂其沒也乃不得與張邵並侑於宣聖之廟其為缺典甚矣況宋端平二年議增十賢從祀以瑗為首若謂瑗無著述之功則元之許衡亦無著述但其身教之懿與瑗相望誠有不可偏廢者臣考之禮有道有德於教於學者死則為樂祖祭於瞽宗鄉先生沒則祭於社若通瑗兩人之師道百世如新得加封爵使與衡同列祀於學宫最得禮意一自唐宋以來以顔子曽子子思孟子配享坐堂上而顔子之父顔無繇曽子之父曽點子思之父孔鯉皆坐廡下臣考之禮子雖齊聖不先父食而三代之學皆所以明人倫也夫孔子之所以為教與諸弟子之所以為學者不過明此而已今乃使子坐於上父坐於下豈禮也哉若以為此乃論傳道之功則自古及今未有外人倫而言道者縱出於後世之尊崇非諸賢之本意臣恐諸賢於冥冥之中必有不安於心而不敢享非禮之祀者臣考之元至順三年嘗封顔無繇杞國公諡文裕孟子之父孟孫氏亦嘗封邾國公臣愚乞下有司於各處廟學如鄉賢祠之制别立一祠中祀啓聖王以杞國公顔無繇萊蕪侯曽點泗水侯孔鯉邾國公孟孫氏配享庶不失以禮尊奉聖賢之意臣又竊觀聖學失傳千五百年至程朱出而後孟氏之統始續則程朱之先亦不可缺況程子之父大中大夫封永年伯程珦首識濓溪周子於屬掾之中薦以自代而又使二子從逰朱子之父韋齋先生追諡獻靖公朱松臨沒之時以朱子託其友籍溪胡氏而得程氏之學珦以不附王安石新法退居於洛松以不附秦檜和議奉祠於閩其厯官行已俱有稱述臣愚乞將永年伯程珦獻靖公朱松從祀啓聖王使學者知道學之傳有開必先明倫之義不為虛文矣明文海卷四十八
