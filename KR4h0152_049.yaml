body:
  text: 明文海卷四十九餘姚黃宗羲編奏疏三扶植綱常疏羅倫臣聞朝廷援楊溥故事起復李賢者臣竊謂李賢大臣起復大事綱常風化之所繫天下後世之所監伏讀聖策有曰朕夙夜惓惓欲正大綱舉萬目使人倫明於上風俗厚於下陛下是言直可為國家扶綱常為天地立民極為萬世開太平者也然欲正大綱莫先於明人倫厚風俗欲明人倫厚風俗莫先於孝孝者天之經也地之義也國而非此不可以為國家而非此不可以為家人而非此不可以為人古今以來未之有易故先王制禮子有父母之喪君命三年不過其門者所以教人孝也古者求忠臣於孝子之門誠以居家孝故忠可移於君為人臣者未有不孝於親而能忠於君者也為人君者未有不教其臣以孝而能得其臣之忠者也昔子夏問三年之喪金革之事無避禮與孔子曰魯公伯禽有為為之也今以三年之喪從其例者吾弗知也陛下於李賢以金革之事起復之歟則賢所未聞也以國家大臣起復之歟則禮所未見也以故事大臣當起復歟則為君者當以先王之禮教其臣為臣者當據先王之禮事其君臣不暇逺舉請以宋事言之仁宗嘗以故事起復富弼矣弼之辭曰何必遵故事以遂前代之非但當據禮經以行今日之是仁宗卒從其請孝宗嘗以故事起復劉珙矣珙之辭曰身在草土之中國無門庭之冦難冒金革之名以私利祿之實孝宗卒允其辭此二君者未嘗拘當代之故事以強起其臣此二臣者亦未嘗循當代之故事以茍從其君故功澤加於當時名聲垂於後世史筆書之以為盛事士夫誦之以為美談此無他君能教其臣以孝臣有孝可移以忠於君也自是而後無復禮義史嵩之欲援例起復為丞相王黻起復為執政陳宜中起復為宰相賈似道起復為平章此數君者未嘗不以當代之故事起其臣此數臣者未嘗不以當代之故事從其君然生靈以之而困天下以之而亂社稷以之而傾貽禍於當時遺臭於後世此無他君不教其臣以孝臣無孝可移以忠其君也詩曰殷監不逺在夏后之世臣願陛下以宋為鑒使賢盡孝於君親為萬世之大臣陛下以禮處賢為萬世之大君此臣之願也亦賢之分也若以賢身任天下四方多虞而起復之與則仁宗之時契丹方盛未為無虞也孝宗之時金人甚強未為無事也陛下必欲賢任天下之事不專門內之私則賢身不可起口則可言宜降溫詔俾如劉珙不以一身之戚而亡天下之憂使賢於天下之事知之則必言言之則必盡陛下於賢之言聞之則必行行之則必力則賢雖不起復猶起復也使賢於天下之事知之而不言言之而有隱陛下於賢之言聞之而不行行之而不力則賢雖起復猶不起復也陛下無謂廟堂無賢臣衆庶無賢士君盂也臣水也盂圓則水圓盂方則水方君好諌則臣直好諛則臣佞陛下誠能於退朝之暇清間之燕略崇髙貴重之勢親直諒博洽之士開懷延納降禮尊賢講聖學之大要明君道之急務詢政事之得失察生民之利病訪人才之賢否考古今之治亂諏風俗之盛衰咨邊防之緩急舍一己之見而以衆人之見為見舍一己之知而以衆人之知為知順旨之言則察而逐之使貢諛保寵者無以自容忤旨之言則容而受之使輸忠為國者得以自盡羣策畢陳衆賢並用則賢所欲言者人亦能言之又何必違先王之禮經拘先朝之故事損大臣之名節虧聖明之清化而後天下可治哉朝廷舉措大臣出處天下觀之史筆書之清議雖不行於朝廷天下以為何如公論雖不行於今日後世以為何如誠不可不慎也夫賢之起復猶諉之曰負天下之重任應先朝之故事比年以來朝廷以奪情為常典縉紳以起復為美名食稻衣錦之徒接踵廟堂據禮守經之士寥寂無聞不知此人於天下之重何所關耶此事於先朝之故事何所據耶先朝自楊溥之外未聞起復某人為某官也今起復之官何如此之多耶以其髙謀逺慮足以建天下之大議耶何未見其發也以其折衝禦侮足以定天下之大難耶何未見其能也以其直節徑氣足以勵天下之士習耶何未見其有也以其深仁厚澤足以浹天下之民心耶何未見其行也以其忠言讜論足以禆朝政之闕失耶何未見其敢也陛下何取於斯人而起復之哉意其平昔之計不過阿媚權勢豫為己地及遭通喪之時則必曲為諛説上蒙天聽不曰此人辦事理可奪情則曰此有故事例當起復既遂姦計略為虛辭一見俞允歡然就位未有堅請如富弼懇辭如劉珙者也且婦於舅姑喪亦三年孫於祖父母禮有期服奪情於夫初無與其妻起復於父初無與其子今或舍館如故妻孥不動乃號於天下曰本欲終喪朝廷不容雖三尺童子臣恐其不信也為人父者所以望其子之報豈擬至於此哉為人子者所以報其親之心豈忍至於此哉枉己未能直人忘親者豈能忠君望其直人而先枉己望其忠君而先忘親陛下何取於斯人而起復之哉何不使之全孝於家而後移忠於國哉昔富弼有母喪韓琦言起復非盛世事而富公竟不可奪史嵩之遭父喪太學生留之至數百人嵩之竟乞終制今大臣起復羣臣不以為議且從而為之辭所以豫為己地也羣臣起復大臣不以為非且從而成其事亦所以豫為己地也大臣既無忌羣臣復何慚羣臣既有例大臣復何辭今之大臣固韓琦富弼之罪人今之群臣又太學生之罪人也上下成風混然同流致有公無起復之例私為匿服之計例在薄恩則匿服以受封例在得官則匿服以聽選例在掇科則匿服以應舉例在遷官則匿服以候選例在求賄則匿服以之任率天下之人為無父之歸臣不忍聖明之世風俗之敝綱常之壞一至於此也夫愛親之心孩提有之短喪之説下愚耻言況在冠裳之列聞聖賢之道肯於其親無三年之愛乎特以貪利遂至忘親孔子曰是可忍也孰不可忍也又曰上有好者下必有甚焉者陛下誠能守先王之遺禮遵祖宗之成憲待之以禮義而不縻之以爵祿激之以廉恥而不誘之以名位使積習之弊脫然以除則忠孝之心油然而生向雖忘其親今則為孝子向雖後其君今則為忠臣亦理之所必有勢之所必至也特在乎陛下轉移之間何如耳天子者以孝治天下也大臣者佐天子以孝治天下者也欲孝行於天下必先行於大臣臣願陛下不惑羣議斷自聖𠂻取回內臣許令李賢依富弼劉珙故事守制其餘已起復者悉令終喪未起復者悉許守制脫有金革之事亦從墨衰之制任國事於外盡心喪於內將見朝廷既正則天下自正大臣既行則羣臣自效人心天理不可泯滅誰肯甘心為不孝之子靦顔為不忠之臣乎綱常由是而明風俗由是而厚士心由是而純紀綱由是而張國勢由是而一矣應詔封事疏鄒智伏覩今月初十日五鼓有大星飛流起西北亘東南光芒燭地蜿蜒如龍蛇人馬辟易蓋陽不能制陰之象也臣竊惟陛下即位以來慷慨奮發恭儉勤勞擯斥宦官黜逺左道根究浮費裁抑冗員痛懲法王佛子大放珍禽奇獸凡天下之人所欲而未得所患而未去者以次罷行幾無遺憾宜其克享天心而景星卿雲昭回乎霄漢之表今變異若此其故何哉臣反復思之無乃陰之當消者未消陽之當長者未長而陛下所以事天者獨有未至歟伏讀明詔曰天下大小衙門政務如利所當興弊所當革者所在官員人等指實條具以聞臣有以見陛下知前日登極詔書為姦臣所誤阻塞言路物論囂然故復下此條以自解耳夫不曰朕躬有過失朝政有闕遺而曰利所當興弊所當革不曰許諸人直言無隱而曰所在官員人等指實條具以聞陛下之所以求言者已不廣矣然欲興天下之利當求利之所以興欲革天下之弊當求弊之所以革欲正天下之衙門當自大衙門始臣請遡流窮源為陛下陳之惟陛下虛心以聽夫內閣者天下之大衙門也利莫利於君子進弊莫弊於小人不退小人不退欲弊之革也不可得已君子不進欲利之興也不可得已且如少師萬安持祿怙寵殊無厭足少保劉吉附下罔上漫無可否太子少保尹直挾詐懷姦全無亷恥世之所謂小人也陛下留之則君德必不能輔朝政必不能修紀綱必壞風俗必偷天下之賢必有所觀望而不敢來天下之邪必有所盤結而不肯去上弊社稷下弊蒼生此弊所當革者也臣願陛下諷之再辭以全其體給之餘祿以飽其欲放之田里以休其勞則天下之弊無不革矣至如致仕尚書王恕矢志忠勤可任大事尚書王竑秉節剛徑可寢大姦都御史彭韶學識醇正可決大疑世之所謂君子也陛下用之則君德必為之開明朝政必為之清肅紀綱必振風俗必淳天下之賢必拔茅而來天下之邪必望風而去上利社禝下利蒼生此利所當興者也臣願陛下豫之安車以優其禮賜之手詔以重其行置之左右以展其藴則天下之利無不興矣然君子之所以不進而小人之所以不退豈無自哉大抵宦官之權重也漢元帝嘗任蕭望之周堪矣一制於𢎞恭石顯則不得以行其志宋孝宗嘗任陳俊卿劉珙矣一間於陳源甘升則不得以盡其才李林甫牛仙客與髙力士相為犄角而玄宗之朝政不經賈似道丁大全與董宋臣相為表裏而理宗之國勢不振君子小人進退之機未嘗不在於此曹之盛衰也臣願陛下鑒其所既往謹其所未來大張英斷總攬天綱凡所以待宦官者一以太祖髙皇帝為法凡所以任大臣者一以太宗文皇帝為法則君子可進小人可退而天下之治出於一矣齊醮進香疏張寧臣聞釋道之教邃古所無下至漢唐其法寖盛然三代君主夀考世運靈長後世衰亂相仍年祚少永佛老無補視昔可知夫父子君臣夫婦兄弟朋友長幼人之大倫自古體國立法修政建事無非為此五者而為之經理防範耳五者順序百度以寧是以聖人之道始於有為而終於無為彼佛老之法不足以有為而強於無為遂欲去君臣廢夫婦一切歸諸虛無寂滅假使其教盡行則婚姻既無子嗣俱絶不過百年人類盡矣雖有事物將誰用之厯代英君誼辟有見於此非不欲深惡而痛革之特以其頗能倡禍福輪回之空談警動於人可以化導愚昧姑將存之以為治化外之一術耳非真謂其能扶世立教延永國步而為之崇奉也恭惟皇上曩在青宫繼登大寶夙精儒學日御經筵于凡治亂之由正邪之辨洞明深識允蹈躬行當即位之初詔天下寺觀不許藏匿無度牒僧道等項尋承睿旨不許增修寺觀乞請額名上書言事者又每以濫度叫化不便為詞多被奬納傳之將來固當永逺無弊矣邇者恭遇皇太后誕日令僧道建設齋醮此見皇上將欲表揚孝道慰悅聖慈無所不用其極之心也諸大臣及百職事但當和𠂻助德仰贊至情上綏懿祉則心誠道得允合舊章而禮部尚書姚夔等乃於各衙門斂會財物收辦炷香約以至期赴壇行禮為儒者自失其守業彼者烏知其非臣雖至愚為此深惜切惟人臣之於君願其福也則當勸以修德善願其夀也則當勸以去逸欲願天心之向順則當相之以和保小民康濟四海故曰求福不回夭夀平格又曰欲王以小民受天永命未聞有以禱祠得福丹藥致夀假符瑞以永天命者今乃不能盡所當為徒以瓣香尺楮列名其上宣揚於佛老之神相率而拜曰為朝廷祈福祝夀天地鬼神山川河嶽昭布森列可厚誣如是哉昔孔子之於異端孟子之於楊墨韓愈歐陽修諸儒之於佛老為其惑世誣民充塞仁義故詞而闢之論而排之今若此其流不止於惑與誣矣通朝之人靡然而從仁義不止於充塞矣學聖賢之學者既不能闢而排之又不能以正自處天下後世謂之何哉伏惟英宗睿皇帝當復位之初國事多虞屬有足疾其時一二大臣所見不逺不察古人行禱之意故嘗舉行此事蓋一時臣子迫切至情事不得已然非祖宗之舊典先帝之本心也因循至今實意不存尚沿故習夫臣之於君猶子之於父一指一髮皆其長養一飲一食皆其賜豫若能以齋醮助國雖殺身亦所不辭豈敢自以儒者門戶為此倔強與彼相較量哉但以無益事情徒傷大體其於經筵聖學不無略有所妨其於進講儒臣亦恐難以身勸伏望皇上法古昔聖賢正常道之心監大學衍義明道術之語乞敕禮部及文武衙門今後凡遇慶賀日期不許仍前擅備炷香於寺觀行禮庶可以扶名教振士風全一代之治體而與三代之時並隆矣論聖政疏劉健竊惟天下之事有輕有重有緩有急得其序則治不得其序則亂而所不當為者弗論也夫事之重且急者不過親賢愛民賞功罰罪而已近時以來奏事之期日漸遲晚散本不及禁門已閉內外章疏動經纍日甚者或延至半年或終留不出因循積習遂以為常仰惟皇上於聲色貨利無所嗜好宫禁嚴密臣等所不敢知但恐佛老鬼神之事有妨聖政耳夫神之所當祭者不過天地宗廟社稷山川及古昔聖賢而已其禮有時而不妨於政其用有節而無害於民若佛老之教邪妄不經空虗無益蠧政病民非所當務者也竊聞寺院宫觀齋醮無時佛書道經刋寫相繼甚者或纍嵗挂袍於千里之外或白晝散燈於大市之間朝野傳聞無不駭異夫寵尚僧道則親賢之禮疏耗費錢糧則愛民之意闕以方便為仁厚則冒功求進者得蒙濫賞以慈悲為寬容則壞法失機者得逃重罰是當急者反緩當重者反輕凡政之弊皆由於此孔子曰務民之義敬鬼神而逺之蓋謂當祭之鬼也而況非所當祭者乎老子亦有曰明王在上其鬼不神蓋謂邪之不能干正也而況為吾聖人之教者乎伏願皇上法孔子之正言原老子之初意洞啓聖聰奮行乾健以萬幾為重務而速賜施行以異端為蠧政而不勞聖慮務使紀綱大振德化旁通下結人心上回天意實宗社萬萬年無疆之慶也覆正祀典疏倪嶽先該禮科給事中張九功題前事臣等謹詳古制天子祭天地祭宗廟祭社稷祭天下名山大川祭五祀凡載於祀典者皆有功德垂世如祭法者所謂法施於民以死勤事以勞定國能禦大災能捍大患則祀之非此族類不在祀典故孔子曰非其鬼而祭之諂也又曰淫祀無福而先儒亦曰帝王無妄祭無徼福又曰明于天地之性不可惑以神怪知萬物之情不可罔以非類皆謂此也自秦以降乃多淫祠厯漢至元有因有革逮至國朝太祖髙皇帝即位之三年首詔天下改正祀典列聖相承恪遵成憲間有因所感應之事而增益祠祭或以萬夀千秋等節而修建齋醮一時行之不察後遂襲以為例因循莫改增置益繁異端之徒轉相鼓扇怪誕相乘矯誣殊甚夫非禮之祭非類之禱近代帝王固不能無然絶地天之通嚴幽明之分在帝舜以為當務之急蓋非聖明之君卓然有見必不能深禁而痛絶之此給事張九功之言所以深有望於今日者也伏乞聖明敬事天地孝事宗廟嚴事山川百神舍此之外凡有一應齋醮禱祠之類通行革罷不惟屏斥異端之姦亦可節省無益之費既可允合乎聖祖以禮事神之心而亦足致乎聖王至誠感神之妙和氣協應國祚綿長人心以明風俗以正其為治道誠非小補也今將查到在京各項祭祀除太倉之神漢夀亭侯關公宋丞相文天祥俱祀典應祭外其餘詳為辨析窮加考究以正萬年之祀以解萬世之惑云夫所謂釋迦牟尼文佛三清三境天尊者謹按傳記西方有佛國曰天竺天竺有五中天竺乃釋迎所生之地後漢明帝時其法始入中國後之宗其教者遂以釋迦為師其曰三世佛者則以釋迦之本性為法身德業為報身并其真身而為三其實本一人耳今乃分為三像而并列之失其旨矣唐儒韓愈有曰三代之時天下太平百姓安樂夀考中國未有佛也明帝時始有佛法其後亂亡相繼運祚不長宋齊梁陳以下事佛漸謹年代尤促惟梁武帝捨身施佛其後餓死臺城事佛求福乃更得禍由此觀之佛不足事亦可知矣至於道家以老子為師其所謂三清者蓋倣釋氏三身而為之尤為謬妄宋儒朱子有曰玉清元始天尊既非老子之法身上清太上老君又非老子之報身設有二像又非與老子為一而老子又自為上清太上老君蓋倣釋氏之失而又失之者也況莊子明言老聃之死則聃亦人鬼耳豈可僣居昊天上帝之上哉由此觀之三清三境天尊實無所據況躬親祠醮傾心崇奉如宋徽宗者可謂至矣卒之陷身北廷覆亡宗社千載可為明戒但緣佛老異端之徒轉相模倣惑世誣民厯代因之莫之有廢是以遞年以來凡遇萬夀千秋等節奉欽依修建吉祥好事或遇喪禮七七修建薦揚好事俱先期一日遣官詣大興隆等寺祭告釋迦牟尼文佛朝天宫祭告三清三境天尊此皆因襲而行不合祀典所謂北極中天星主紫微大帝者謹按象緯書有曰北極五星在紫微垣中一名天極一名北辰其北第五星名天樞蓋極星之在紫微垣萬神所宗七曜三垣二十八宿衆星所拱為天文之正中又曰紫微大帝之座天子之常居也即今朝廷宫殿所在乃其象焉國朝正統初年建紫微殿一所於大德觀之東設立大帝之象每遇萬夀聖節正旦冬至俱遣大臣一員祭告夫日月星辰並曜於天故古有大明祭日夜明祭月幽宗祭星之文祖宗以來每嵗南郊大祀內壇已有星辰壇合祭之禮今乃像之如人稱之為帝以極星之正祠於異端之宫稽之祀典誠無所據所謂九天應元雷聲普化天尊者謹按傳記有曰凡隂氣凝聚陽氣在內而不得出則奮擊而為雷霆非如異端所謂龍車石斧鬼鼓火鞭怪誕之説也雷聲普化天尊者道家以為玉霄一府總司五雷而雷部諸神皆其所主而又託以六月二十四日為天尊示現之日朝廷嵗以是日遣官詣大德顯靈宫致祭夫風雲雷雨皆隂陽之妙用鬼神之盛德祖宗以來每嵗南郊大祀外壇已有合祭之禮而八月望後山川壇復有秋報之祭況自二月發聲之後無非雷霆震奮之日顧乃止於六月二十四日於義何取至於像設名稱禮亦無據所謂梓橦帝君者謹按圖志英顯王廟在劍州即梓橦神姓張諱亞子其先越嶲人因報母仇徙居劍州之七曲山仕晉戰沒人為立廟唐玄宗西狩追封左丞僖宗入蜀封濟順王宋咸平中改封英顯又按文昌六星在北斗魁前為天之六府道家謂上帝命梓橦神掌文昌府事及人間祿籍故元加號為輔元開化文昌司祿宏仁帝君而天下學校亦多立祠以祀之京師舊有廟在北安門外景泰五年闢而新之敕賜文昌宫額嵗以二月初三日為帝君誕生之辰遣官致祭道家謂梓橦以孝德忠臣顯靈於蜀廟食其地於禮為宜祠之京師不合祀典至於文昌之星與梓橦無干今乃合而為一誠出傅會所謂祖師三天扶教輔玄大法師真君者謹按傳記張道陵字輔漢光武十年生於吳之天目山善以符治病桓帝永夀元年於靈峯白日上升百二十嵗唐天寶七年册贈天師中和四年封三天扶教大法師宋熙寧中加封三天扶教輔玄大法師大觀二年册號正一靖應真君子孫厯代相傳皆有封號逮入國朝仍令傳襲正一嗣教真人之封秩正二品以正月十五日為祖師示現之辰遣官詣大德顯靈宫告祭又按宋邵伯溫聞見録建安二十年曹操破張魯定漢中魯祖陵順帝時客蜀學道鳴鶴山中造作符書惑百姓從其道者輒出五斗米時謂之米賊陵子衡衡子魯以法相授受自號師君其衆曰鬼卒曰祭酒大抵與黃巾相類朝廷不能討就拜魯漢寧太守鎮蠻中觀此則陵本非異人而道家祖陵為天師者特因天寶詔稱漢天師而然耳今正月十五乃其生辰自宜其子孫祭於其家可也所謂大小青龍之神者謹按碑記昔有僧名盧自江南來寓西山之尸陀林祕魔巖一日二童子來拜於前盧納之鬻薪供奉雖寒暑無怠時久旱不雨二童子白於盧能限雨期言訖即委身龍潭須臾化二青龍一大一小至期果得甘雨事聞賜盧師號曰感應禪師建寺設像立碑以紀其事又别設祠於龍潭之上春秋遣官祭二青龍神國朝宣德中敕建大圓通寺二青龍出現禱之有應於是加封號至今春秋二時遣順天府官致祭及遇嵗旱遣官祭告蓋因舊傳二龍能致雲雨故纍朝崇奉如此然雖稱二青龍其實蛇也蛇有神蛇其名曰蜦亦能致雨今此二蛇西山寺院處處有之略無靈異近者京師連年水旱祈禱無應則此亦非蜦蛇乃凡蛇耳蓋妖由人興久自衰息無足崇奉明矣昔宋祥符中天慶觀有蛇極怪異人以為龍孔道輔以手板擊其首死之其患遂息程明道為上元主簿茅山池有小龍如蜥蜴崇奉以為神物明道捕而脯之使人不惑後亦不聞如何則此二蛇之怪誕正此類也所謂東嶽泰山之神者謹按圖志東嶽魯之泰山今在山東濟南府泰安州山下有廟自黃帝以來封禪七十二君唐宋元皆加神以封號曰王曰帝若祀人鬼國朝洪武三年詔去封號稱為東嶽泰山之神有司春秋致祭有事則遣臣祭告今京師朝陽門外亦有東嶽廟實自元延祐中玄教大宗師張留孫買地為宫奉祀東嶽天齊仁聖帝國朝仍而不廢嵗以三月二十八日及萬夀聖節遣官致祭夫嶽鎮海瀆以其山川靈氣有發生潤澤之功故厯代祀之而泰山在魯封內嵗時俱有合祭之禮前項祀典煩瀆無據所謂北極佑聖真君者謹按傳記北極佑聖真君者蓋真武神也真武本元武宋真宗尚道教避聖祖諱改元為真元龜也武蛇也此本北方元武七宿虛危星形似之故因而名後乃以元武為真君而作龜蛇於下靖康初詔加號助順曰佑聖助順真武靈應真君及考圖志乃云真武為靖樂王太子也生而神靈長而勇猛志除邪魔遇紫虛玄君授以道祕東逰遇天神授以寶劍入武當山修錬功成白日飛升奉上帝命往鎮北方披髮跣足建皂纛玄旗統攝元武之位此則道家傅會之説殊為誕妄再考國朝御制碑文太祖髙皇帝平定天下兵戈所向神隂祐為多及定鼎金陵乃於雞鳴山建廟以崇祀事載在祀典太宗文皇帝肅靖內難以神有顯相又於京城艮隅并武當山各重建廟宇而兩京嵗時春秋及京師每月朔望各遣官致祭武當山則命內外官員專一在彼提督列聖崇奉之意可謂至矣憲宗純皇帝在位常範金為像屢遣內官陳善齎往武當山安奉蓋亦不過承先志以祈神休耳豈期陳善援引左道之人鄧常恩等上則熒惑聖聽糜費內帑下則騷擾道路虐害生民且又奏請重修京師廟宇改號靈明顯佑宫日居其間引進邪術遂使香火之地幾為姦盜之區固非朝廷崇奉之本意使真武有神亦豈其所樂聞哉所謂崇恩真君隆恩真君者謹按道家之言有曰崇恩真君姓薩氏諱堅西蜀人在宋徽宗時嘗從虛靖天師張繼先及王侍宸林靈素傳學道法纍有靈驗而隆恩真君則玉樞火府天將王靈官也又嘗從薩真君傳受符法國朝永樂中有杭州道士周思得以靈官之法顯於京師附體降神禱之有應乃於禁城之西建天將廟及祖師殿宣德中改廟為大德觀封薩真人為崇恩真君王靈官為隆恩真君又建一殿崇奉二真君左曰崇恩殿右曰隆恩殿成化初年改觀曰宫加顯靈二字遞年四季更換袍服三年一小焚化十年一大焚化乂復易以新製珠玉錦綺所費不資每嵗萬夀聖節正旦冬至及二真君示現之辰皆遣官致祭其崇奉可謂至矣今就其言議之薩真人之法因王靈官而行王靈官之法因周思得而顯而其法之所自皆宋徽宗時林靈素輩之所傳一時傅會之説淺謬如此本無可信況近年附體降神者乃欽發充軍顧珏顧綸之父子其為鄙褻尤甚往往禱雨祈晴杳無應驗則其怪誕可知所謂金闕上帝玉闕上帝者謹按大明一統志福州府閩縣南舊有洪恩靈濟宫一所祀二徐真人即今之金闕玉闕二真人也真人五代時徐溫子曰知證封江王知諤封饒王嘗提兵平福州福父老戴之圖像以祀宋賜今額又考之御制碑文云太宗文皇帝臨御之十有五年適遘疾弗豫百藥罔效或有言神靈驗者禱之輒應脫然平復於是大新閩地廟宇命有司春秋致祭嵗易時衣給戶灑掃又於京師立廟以祀之加封金闕真人玉闕真人十六年又加封金闕真君玉闕真君賜廟額曰洪恩靈濟宫正統初年重新宫宇進號金闕崇福真君玉闕隆福真君成化二十二年重加尊號伯曰九天金闕總督魁神洪恩靈濟慈惠髙明上帝仲曰九天玉闕總督罡神洪恩靈濟仁惠𢎞靜上帝遞年以來每月朔望并萬夀聖節正旦冬至及二真君誕辰俱有祭祀遣官行禮及時食獻新至今不缺四時已有皮辨冠大紅紗羅紵絲織金錦雲龍朝服近又加以平天冠明黃紗羅紵絲衣服其黃服五年一次更換焚化紅服十年一次更換焚化夫神之世系年代可考如此本非有甚異也先年止因有功於閩廟食一方後以保護太宗文皇帝聖躬故京師有别廟之奉但本處既有春秋二祭而京師一年之間復有前項祭祀不無煩瀆且惟皇上帝主宰於天而兄弟並稱上帝其為僣擬可知所謂神父聖帝神母元君金闕元君玉闕元君者謹按徐仙真録及國朝御製碑文神父神母者即二徐真人之父母金闕玉闕元君者蓋其配也宋理宗朝封父齊王為忠武真人母白氏仁夀仙妃配許氏助順仁忠仙妃陶氏善助慈懿仙妃國朝永樂中加封父翊亮真人母淑善仙妃許氏真應仙妃陶氏恭靜仙妃繼又進封其父為真君成化二十二年神父加封髙上神主慈悲聖帝神母加封安寧護國恭靜元君金闕妃天房衛保節靖元君玉闕妃天房衆母顯祐元君每嵗萬夀聖節正旦冬至俱遣官祭祀金闕玉闕元君又有誕辰之祭皆因二真君一時禱應之功故推及而崇奉之如此夫神父徐溫乃五代時誤國之臣專權弒主殊無功德祀以報功豈宜濫及況父母并妃並受隆名稱帝稱君僣擬益甚所謂城隍之神謹按易坎卦有曰王公設險以守其國蓋謂君人者觀坎之象知險不可陵也故設為城郭溝池以守其國而保其民人傳記謂其制自黃帝始厯代建國必有髙城深隍上以保障宗社朝廷下以衛捍百官萬姓其所繫甚重其為功不小故國朝之制天下府州縣皆有城隍之祭京都城隍廟舊在順天府西南纍朝皆加修葺嵗以五月十一日為神之誕辰萬夀聖節各遣官致祭夫廟祀城隍之神本非人鬼安得誕辰可謂謬妄況每嵗南郊大祀壇八月山川壇俱有合祭之禮事體已重既與天下府州縣之祭不同今又復為煩瀆之祭不亦謬乎前項祭告俱合罷免謹具覆奏伏候聖裁明文海卷四十九
