body:
  text: 明文海卷五十餘姚黃宗羲編奏疏四郊祀對潘潢臣聞周禮春官掌治天神人鬼地祇之禮凡以贊其長佐王和邦國者臣職是也雖微明命猶將寅清夙夜觀會通之嘉以行典禮臣實承詔敢不奉職正對臣聞禮者體也昔者聖人作易設卦觀象以乾為天為君為父以坤為地為母為妻為臣而繫之曰天尊地卑乾坤定矣卑髙以陳貴賤位矣此禮所由生也是故因天事天祭帝於郊因地事地祭社於國燔柴泰壇崇效天也瘞埋於泰折異樂殊日不與帝同牢以卑法地明王者父乾母坤禮至而辨示民嚴上焉故孔子曰天無二日土無二王禘嘗郊社尊無二上知其説者之於天下也其如視諸斯乎蓋慎之也以此坊民後世乃猶有合享分郊如新莾匡衡之云者其於上也不亦二乎臣愚竊謂禮有貴多亦有尚寡文質無常惟稱之適圜丘不屋致誠之極也明堂大享宜非所施是故掃地之典義不可曠奕奕郊廟列聖作之踐位行禮於今百祀神靈之所依祖宗精神之所聚律之以春秋譏毁泉臺之法而揆之以詩人勿剪勿拜之意有其舉之孰敢廢乎是故大祀之殿義不可墮按尚書孝經春秋凡言郊不卜郊郊祀用牲於郊皆斷名之曰郊不别云某郊凡言郊以明天道郊則天神格祭天于郊皆直繫之天更不並云天地是知祭天之外無郊郊祭之中無地易明也匡衡徒見天子有兆于南郊之語妄意祭地當於北郊其言本孝經緯於經無據且北既陰方地象母位則郊配亦當以其類矣嚴母莫大於配地古有之乎是故北郊之謬義不可襲王者受命有天下謂之有土是故古者天子大社丘方五丈封土五色祭后土焉凡封建諸侯則各割其方色之土苴以白茅而錫之使各立社祭於其國亦曰胙土是天子大社五土王社自祭畿內分土諸侯獨得祭其方土而已故曰王者有分土祭天地諸侯方祭於土而尚書周官禮記皆謂祭地曰社或曰后土曰冡土示曰大示亦曰地示又曰土示丘方曰方丘折曰泰折天下之社莫大焉曰大社社所以明地道列地利命降乎社之謂殽地社之為大示昭昭矣自鄭玄諸儒牽附讖緯誤分泰折為祭崑崙方丘為祭神州於是大社自為五土之神而夏至祭地别在北郊夫五土之神非地而何旅五帝獨非祭天耶周禮宗伯師甸用牲於社大祝大師大會同宜於社小祝寇戎之事保郊祀於社大司馬搜田獻禽祭示大合軍以先愷樂獻功於社大司冦軍旅之事蒞戮於社類皆言社而不及稷臣謂此天子大社也張載曰大社王為羣姓所立必在國外王社王所自立必在城內夫大社既在國外則小宗伯建國之神位所謂右社稷左宗廟者固王自立之社而大社無稷矣漢儒乃謂大社有稷王社無稷是無怪其以社為地別體而雜求諸泰折方丘卒啓後來紛紛之議非胡宏王炎諸臣相繼講正流惑可勝慨乎是故大社之祭義不可廢春秋大復古然勞民動衆雖義且時必書重民力也今兵饉相仍所在虗耗大役煩興民厪於食雖弛力緩征猶懼弗贍而去古逾遠時異俗殊禮樂器度類不應典一變至道卒難為力此周公所以仰思其不合孔子所為博學而從今也聖人通變務與民宜大易之義中重於正陛下誠欲舉先王之成法明當今之可行則所謂包荒之量馮河之勇不遐遺之明朋亡之公不可不先加之意矣趨向既定修和有常道洽政乂時然後動斯順天理當人心損益之善者若徒以其事不迹古理須改圖不勝欲速之心取祖宗成憲一朝遽紛更之正使盡如往制未必克當人心殆非所以興聽於民而行思其反者也是故時措之宜義不可忽易曰已日乃孚革而信之文明以説大亨以正革而當其悔乃亡臣前之説明禮審是求文明之正也後之説擇善用中冀已日之孚也兼斯二者乃當革義合乎天德可行周官之法度惟陛下留神省覽庶言慎與大臣計慮毋固求禮以幸天下郊祀疏潘潢臣聞生人之道禮為大禮祭為大祭大郊為大大郊也者原本反初奉天地以子道示民嚴上也自二帝三王以及我朝厯聖所以祇答神休萃聚天下未有外此義也今祀事未恤一嵗不郊臣愚以為此非聖明所以率先天下後世以崇重本始之道請得據所見聞乞陛下試垂聽焉謹按禮大喪惟天地社稷越紼而行事傳曰不敢以卑廢尊也蓋君雖尊不尊於天國喪雖重不重於郊祀故聞郊之日喪者不哭不敢凶服矣不聞有喪哭者不郊也古者天子諒陰冡宰攝位有代之言乃不言有代之祭乃不祭故越紼之禮先儒有謂使大臣越紼而攝祭者後世懼獨任成害南面聽治既不得不出於權制所謂郊祀不宜獨責諸代矣若能行古諒陰三年之典則主以天子之名祭用冡相或如周禮大宗伯有故攝行祭事無不可也宋英宗時或問程頤郊祀當否頥曰今人居喪百事皆如常獨於祭祀廢之不若無廢人君無一嵗不祭天人子無一日不見父母必曰不敢以非禮見豈不能因人通定省之問乎故茍事事如禮雖不與祭可也無祭不可也伏覩大明會典天地諸神皆天子親祀有故則遣官祭告又曰郊祀國之大事雖有三年之喪亦不敢廢又曰每嵗正月擇日行禮是每嵗必郊遣官攝郊喪不廢郊皆祖宗定制也今習見每嵗用正月郊遂以郊非正月為不可執一失三非繼述之善者也春秋成公十七年書九月辛丑用郊胡安國曰郊之不時未有甚於此也此譏郊遲為不時非謂自孟春後皆非郊時而九月為特甚也譏其前此失時不郊因循至是則不可復郊也春秋之法為旱為雩雖過時猶且許之茍魯之郊禘以禮且或有故未郊則聖人必恕之曰有故後郊其猶愈於已也若曰過時矣不如無郊則春秋數書過時不郊矣果豫其不郊乎左氏曰郊祀后稷以祈農事也啓蟄而郊郊而後耕既耕而郊宜其不從也此魯之郊非周天子之郊也且舜八月西巡狩柴望如初是春秋皆得郊也郊特牲曰郊之祭也迎長日之至也是冬得郊也今既失孟春之郊矣又不得以時酌古通今圖所以修嵗郊之法則春郊不可復行亦將如漢宋三嵗一郊而已然則倘或三年之內設又有他故焉則如夏商叔季罔事於天地祇而後可耶且祖宗之時前用分郊後合郊前建圜丘方丘後用大祀殿前配仁祖後配太祖太宗前親祀後或攝祀前攝以皇太子後或遣官聖人之治因時制宜無所不可然則前以春後以秋冬豈不可也臣愚以為失今之時而能從古之道縱有過時之嫌猶免亡本之誚况前日之過未為失時今者復郊愈見祇肅其於變通之宜不遠之復蓋兼得之又何疑哉傳曰郊祀天地所以修嵗事也今或以為既以秋冬郊又以明年春郊是黷祀也宜待嘉靖改元新正朔易服也乃昭告於皇天后土不當以先帝之遺年復舉大郊上古之禮不知一嵗不郊即不成嵗古者啓蟄長至之典與時偕行未聞以為黷也先帝所欲行而未成者陛下所宜朝訪夕思以代有終若處此以優遊行之以猶豫凡所宜行惟曰以待來年則自今數月之間天下事孰肯任其責耶昔魯與齊戰莊公謀於曹劌曰犧牲玊帛弗敢加也必以信劌曰小信未孚神弗福也今國家之於神祇可謂大不信矣十四年二月郊十五年十二月郊十六年春有司定日凡三竟不得郊鬼神非人實親惟誠是依不信者三神誰與我若又復益之豈惟神聽疑惑民不用情外藩君長聞之皆且曰中國今廢郊矣殆非所以尊國體之極而耀德於四逺况今日精門災陰雨連日雨暘失職諸榖爛浥天之譴告明矣安得不起敬起孝為民求福乃猶紆徐怠緩固自執異豈不重拂天怒哉臣愚以為今陛下繼統先帝嗣厯服承天地宗廟社稷之祀以為天下神人主義不得忽髙皇帝之命祀宜略倣古圜丘報本之制近守祖宗一嵗一郊之法以今冬十一月郊其親祀攝祀則視陛下處今日服制何如非臣所得與也陛下不以臣卑鄙庸妄斷行臣言則禮達誠通幽明協順令聞遐福與天無極臣死且不悔諌迎佛疏王守仁臣自七月以來切見道路流傳之言以為陛下遣使外藩逺迎佛教羣臣紛紛進諌皆斥而不納臣始聞不信既知其實然猶竊喜幸以為此乃陛下聖智之開明善端之萌蘖羣臣之諌雖亦出於忠愛至情然而未能推原陛下此念之所從起是乃為善之端作聖之本正當將順擴充遡流求原而乃狃於世儒崇正之説徒爾紛爭力沮宜乎陛下之有所拂而不受忽而不省矣愚臣之見獨異於是乃惟恐陛下好佛之心有所未至耳誠使陛下好佛之心果已真切懇至不徒好其名而必務得其實不但好其末而必務求其本則堯舜之聖可至三代之盛可復矣豈非天下之幸宗社之福哉臣請為陛下言其好佛之實陛下聰明聖智昔者青宫固已播傳四海即位以來偶值多故未暇講求二帝三王神聖之道雖時御經筵儒臣進説不過日襲故事就文敷衍立談之間豈能遽有所開發陛下聽之以為聖賢之道不過如此則亦有何可樂故漸移志於騎射之能縱觀於遊心之樂蓋亦無所用其聰明施其才力而偶託寄於此陛下聰明豈固遂安於是而不知此等皆無益有損之事也哉馳逐困憊之餘夜氣清明之際固將厭倦日生悔悟日切而左右前後又莫有以神聖之道為陛下言者故遂遠思西方佛氏之教以為其道能使人清心絶欲求全性命以出離生死又能慈悲普愛濟度羣生去其苦惱而濟之快樂今災害日興盜賊日熾財力日竭天下之民困苦已極使誠身得佛氏之道而拯救之豈徒息精飬氣保全性命豈徒一身之樂將天下萬民之困苦亦可因是而蘇息故遂特降綸音發幣遣使不憚數萬里之遙不愛數萬金之費不惜數萬生靈之困斃不厭數年往返之遲久遠迎學佛之徒是蓋陛下思欲一洗舊習之非而幡然於髙明光大之業也陛下試以臣言反而思之陛下之心豈不如此乎然則聖知之開明善端之萌蘖者亦豈過為諛言以佞陛下哉陛下好佛之心誠至則臣請毋好其名而務得其實毋好其末而務求其本陛下誠欲得其實而求其本則請毋求諸佛而求諸聖人毋求諸外藩而求諸中國此又非臣之茍為遊説之談以誑陛下臣又請得而備言之夫佛者外藩之聖人聖人者中國之佛也在彼外藩則可用佛氏之教以化導愚頑在我中國自當用聖人之道參贊化育猶行陸者必用車馬渡海者必以舟航今居中國而師佛教是猶以車馬渡海雖使造父為御王良為右非但不能利涉必且有沉溺之患夫車馬本致遠之具豈不利器乎然而用非其地則技無所施陛下若謂佛氏之道雖不可以平治天下或亦可以脫離一身之生死雖不可以參贊化育而時亦可以導羣品之囂頑就此二説亦復不過得吾聖人之餘緒陛下不信則臣請比而論之臣亦竊嘗學佛最所尊信自謂悟得其藴奧後乃窺見聖道之大始遂棄置其説臣請毋言其短言其長者夫西方之佛以釋迦為最中國之聖人以堯舜為最臣請以釋迦與堯舜比而論之夫世之最所崇慕釋迦者莫尚於脫離生死超然獨存於世今佛氏之書具載始末謂釋迦住世説法四十餘年夀八十二嵗而沒則其夀亦誠可謂髙矣然舜年百有十嵗堯年一百二十嵗其夀比之釋迦則又髙也佛能慈悲施捨不惜頭目腦髓以救人之急難則其仁愛及物亦誠可謂至矣然必苦行於雪山奔走於道路而後能有所濟若堯舜則端拱無為而天下各得其所惟克明峻德以親九族則九族既睦平章百姓則百姓昭明協和萬邦則黎民於變時雍極而至於上下草木鳥獸無不咸若其仁愛及物比之釋迦則又至也佛能方便説法開悟羣迷戒人之酒止人之殺去人之貪絶人之嗔其神通妙用亦誠可謂大矣然必耳提靣誨而後能若在堯舜則光被四表格於上下其至誠所運自然不言而信不動而變無為而成蓋與天地合其德與日月合其明與四時合其序與鬼神合其吉凶其神化無方而妙用無體比之釋迦則又大也若乃咀呪變幻眩怪揑妖以欺惑愚冥是固佛氏之所深排極詆謂之外道邪魔正與佛道相反者不應好佛而乃好其所相反求佛而乃求其所排詆者也陛下若以堯舜既沒必欲求之於彼則釋迦之亡亦已久矣若謂彼中學佛之徒能傳釋迦之道則吾中國之大顧豈無人能傳堯舜之道者乎陛下未之思耳陛下誠於大臣之中茍其能明堯舜之道者日日與之推求講究則必有能明神聖之道致陛下於堯舜之域者矣故臣以為陛下好佛之心誠至則請毋好其名而務得其實毋好其末而務求其本務得其實而求其本則請毋求諸佛而求諸聖人毋求諸外藩而求諸中國者果非妄為遊説之談以誑陛下者矣陛下果能以好佛之心而好聖人以求釋迦之誠而求諸堯舜之道則不必涉數萬里之遙而西方極樂只在目前不必糜數萬之費斃數萬之命厯數年之久而一塵不動彈指之間可以立躋聖地神通妙用隨形隨足此又非臣之謬為大言以欺陛下必欲討究其説則皆鑿鑿可證之言孔子云我欲仁斯仁至矣一日克己復禮而天下歸仁孟軻云人皆可以為堯舜豈欺我哉陛下反而思之又試以詢之大臣詢之羣臣果臣言出於虗謬則甘受欺妄之戮臣不知忌諱伏見陛下善心之萌不覺踴躍喜甚輒進其將順擴充之説惟陛下垂察則宗社幸甚天下幸甚萬世幸甚再辭封爵普恩賞以彰國典疏王守仁嘉靖元年七月十九日準吏部咨該臣奏前事節奉聖旨論功行賞古今令典詩書所載具可考見卿倡義督兵勦除大患盡忠報國勞績可嘉特加封爵以昭公議宜勉承恩命所辭不允兵部知道欽此欽遵臣以積惡深重禍延先臣方煢然瘠疚僅未殞絶聞命悸懷魂魄散亂已而伏枕沉思臣以微勞冒膺重賞所謂貪天之功掩人之善襲下之能忘已之恥者臣於前奏已具陳之矣然而聖旨優恩獨加於臣餘皆未蒙採録者豈以江西之功果臣一人之所能獨辦乎朝廷爵賞本以公於天下而臣以一身掠衆美而獨承之是臣壅閼朝廷之大澤而使天下有不均之望也罪不滋重已乎夫廟堂之賞朝廷之議也臣不敢僭及至於臣所相與協力同事之人則有不得不為一申告者古者賞不踰時欲人速得為善之報也今效忠赴義之士延頸而待已三年矣此而更不一言事己日遠而意已日衰誰復有為之論列者故臣輒敢剖痛忍哀冒斧鉞而控籲氣息奄奄之中忽不自覺其言之躁妄亦其事有所感於昔情有所激於中也切惟宸濠之變實起倉卒其氣勢張皇積威凌劫雖在數千里無不震駭失措而况江西諸郡縣近切剝牀觸目皆有賊兵隨在皆有賊黨當此之時臣以逆旅孤身舉事其間雖仰仗威靈號召遠近然而未受巡撫之命則各官非統屬也未奉討賊之旨其事乃義倡也若使其時郡縣各官果懷畏死偷生之心但以未有成命可保土地為辭則臣亦將何如哉然而聞臣之調即皆感激奮厲或提兵而至或挺身而來是非真有捐軀赴難之義戮力報主之忠孰肯甘粉虀之禍從赤族之誅蹈必死之地以希萬一難冀之功乎然則凡在與臣共事者皆有忠義之誠者也夫均秉忠義之誠以同赴國難而功成行賞臣獨當之人將不食其餘矣此臣所以不敢受也且宸濠之變天實陰奪其魄而摧敗之速是以功成之後不復以此同事諸人者為庸使其不幸而一蹶塗地則粉身滅族之慘亦同事諸人者自當之乎將猶可以藉衆議之解救而徐免之乎夫下之人犯死難以赴義則上之人必行之賞以報功今臣爵獨崇而此同事之人者乃或賞或否不行其賞而并削其績或賞未及播而罰已先行或虗受升職之名而因使退間或蒙不忠之號而隨以廢斥由此言之亦何苦而捐身赴義以來此呶呶之口而自求無實之殃乎乃不若退縮引避反可以全身遠害安處富貴而逭於衆口之非也夫披堅執鋭身親行伍以及期赴難而不免於不忠之罰則容有托故推姦坐而觀望者又將何以加之今不彼之議而獨此之察則已過矣昔人有蹊田而奪牛者君子以為蹊田固有責而奪牛則已甚今人驅牛耕我之田既種且穫矣而追究其耕之未盡善也復從而奪之牛無乃大遠於人情乎今議者或以某也素貪而鄙某也素躁而狂故雖有功而當抑其賞雖有勞而不贖其罪噫是亦過矣當宸濠之變撫按二司等官咸被驅縛或死或從其餘大小之職近者就縻遠者逃潰矣當此之時茍知有從我者皆可以為忠之士尚得追論其平時耶况所謂若貪與鄙者或出於讒疾之口而未必皆真耶若居常處易選擇而使猶不免於失人况一時烏合之衆而顧以此槩之其責於人無已甚乎夫考素行别賢否以激揚士風者考課之常典較功力信賞罰以振作士氣者軍旅之大權故鄙猥之行平時不齒於士列而使貪使詐軍士有所不廢也急難呼吸之際要在摧鋒克敵而已何暇逆計其他乎當此之時雖有禦人國門之寇茍能效其智力以協濟吾事亦將用之而事果有成亦必賞之况乎均在士人之列同有勤事之忠者乎人於平居無事扼腕抵掌而談孰不曰我能臨大節死大難及當小小利害未必至於死也而或有倉皇失措者矣又况矢石之下劍刀之間前有必死之形而後有夷滅之禍人亦何不設以身處其地而少亮之乎夫考課之典軍旅之政固並行而不相悖然亦不可以混施之今人方有可録之功吾且遂行其賞可矣縱有既往之愆亦得以今而贖據其顯然可見者毋深求其未然不可見者賞已行而其人之過猶未改也則從而行其黜謫人將曰昔以功而賞今以罪而黜功罪顯勸懲彰矣今也將明軍旅之賞而陰以考課之意行於其間人但見其賞未施而罰已及功不録而罪有加不能創姦警惡徒以阻忠節之意快讒嫉之心譬之投杯醪於河水而曰是有醪焉亦可飲也非有易牙之口將不能辨之矣而求飲者之醉可得乎夫人臣於國家之難凡其心之可望力之可為塗肝腦而膏髓骨皆其職分所當然則此同事諸臣者遂敢皆自以為功而邀賞於其上乎顧臣與之同事同功今賞積於臣而彼有未逮臣復抗顔直受而不以一言是使朝廷之上果以獨賞其功於臣而此諸人者之績因臣之為蔽而卒無以自顯於世也且自平難以來此同事諸人者非獨為已斥諸權姦之所誣搆挫辱而已也羣憎衆疾惟自搜羅以為罪曽未見有鳴其不平而伸其屈抑者今陛下龍飛赫然日月之光英賢輔翼廓清風而鼓震雷於是陰氣始散而魍魎潛消而覆盆之下尚有未能自露者也故臣敢不避矜誇僭妄之戮而輒為諸臣者一訴其艱難抑欎之情昔漢臣趙充國破羌而歸人有諷之謙讓功能者充國曰吾老矣爵位已極豈嫌一時事以欺明主哉兵政國之大事當為後法老臣不以愚命一為主上明言其利害猝死誰當復言之者卒以實對夫人之忠於國也殺身夷族有不避而乃避其矜功伐善之嫌乎臣始遇變於豐城也蓋舉丘倉卒茫昧之中其時豈能逆睹其功之必就謂有今日爵賞之榮而為之哉徒以事關宗社是以不計利鈍捐身家棄九族但以輸忠憤而死節是臣之初心也至於號召三軍則雖激之以忠義而實歆之以爵祿延世之榮勵之以名節而復動之以恩賞絢耀之義是非敢以虗言誘之也以為功而克成也則此爵祿恩賞亦有國之典理所必有也今臣受殊賞而衆有未逮是臣以虗言罔誘其下竭衆人之死而共成之掩衆人之美而獨取之見利忘信是為貪鄙外以欺其下而內失其初心亦何顔面以視其人乎臣不敢獨當殊賞者非不知封爵之為榮也所謂有重於封爵者故不敢茍得耳伏願陛下鑒臣之言不以為誇也而因以察諸臣之隱允臣之辭不以為偽也而因以普諸臣之施果以其賞在所薄與則臣亦不得獨厚果以臣賞或可厚與則諸臣亦不得而遂薄也江西同事諸臣於前奏亦已略舉且諸部亦有册可查不敢復有所塵瀆臣在衰絰憂苦之中非可有言之日事不容已而有是舉不勝受恩感激含哀冒死戰栗惶懼懇惻祈禱之至處置平復地方以圖久安疏王守仁臣聞傅説之告髙宗曰明王奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民今天下郡縣之設乃有大小繁簡之别中土邊方之殊流官土襲之不同者豈故為是多端哉蓋亦因其廣谷大川風土之異人生其間剛柔緩急之異稟服食器用好惡習尚之異類是以順其情不違其俗循其故不易其宜要在使人各得其所固亦惟以亂民而已矣臣以迂庸謬膺重命勘處兵事於兹土節該欽奉敕諭謂可撫則撫當勦即勦是陛下之心惟在於除患安民未嘗有所意必也又節該欽奉敕諭謂賊平之後公同議處應設土官流官何者經久利便是陛下之心惟在於安民息亂未嘗有所意必也始者思田梗化既舉兵而加誅矣因其悔罪來投遂復宥而釋之固亦莫非仰體陛下不嗜殺人之心惓惓憂憫赤子之無辜也然而今之議者或以為流官之設中土之制也已設流官而復去之則嫌於失中土之制土官之設蠻方之俗也已去土官而復設之則嫌於從蠻方之俗二者將不能逃於物議其何能建事而底績乎是皆不然夫流官設而蠻民服何苦而不設流官乎夫惟流官一設而蠻民因以騷亂仁人君子亦安忍寧使斯民之騷亂而必於流官之設者土官去而蠻民服何苦而必設土官乎夫惟土官一去而蠻民因以背叛仁人君子亦安忍寧使斯民之背叛而必於土官之去者是皆虞目前之毁譽避日後之形迹茍為周身之慮而不為國家思久長之圖者也其亦安能仰窺陛下如天之仁固平平蕩蕩無偏無黨惟以亂民為心乎臣於思恩田州平復之後即已仰遵聖諭公同總鎮鎮巡副參三司等官太監張賜御史石金等議應設流官土官何者經久利便不得茍有嫌疑避忌而心有不盡謀有不忠乃皆以為宜仍土官以順其情分土目以散其黨設流官以制其勢蓋蠻方之性譬猶蛟龍虎豹必欲制以中土之郡縣而繩之以流官之法是束龍虎於堂室之中而欲其馴擾帖服終必觸樽爼翻几席狂跳而駭擲矣故必放之間曠之區以順適其獷野之性今所以仍土官之舊者是順適其獷野之性也然一惟土官之為而不思有以散其黨與制其猖獗是縱麋鹿於田野之中而無有乎墻墉之限豶牙童梏之道終必長奔直竄而無以維縶之矣今所以分立土目者是墻墉之限豶牙童梏之道也然分立土目而終無連屬綱維於其間是畜麋鹿於苑囿而無守視之人以時守其墻墉禁其羣觸終將踰垣遠逝而不知踐禾稼決籓籬而莫之省矣今所以特設流官者是守視苑囿之人也議既僉同臣猶以為土蠻之心未必盡得而窮山僻壤或有隱情也則亦安能保其必行乎則又備厯田州思恩之境按行其村落而經其城堡因而以其所以處之之道詢諸目長率皆以為善又以詢諸其父老子弟又皆以為善又以詢諸其頑鈍無恥厮役下賤之徒則又亦皆以為善然後信其可以久行而庶或幸免於他日之戮也矣夫然後敢具本以請亦恃聖明在上洞見萬里而無微不燭故臣得以信其愚忠不復有所顧忌然猶反覆其辭而更互其説者非敢有虞於陛下不能亮臣之愚良以今之士人率多執已見而倡臆説亦足以搖衆心而僨成事故臣不避頰舌之騰者亦欲因是以曉之也煩瀆聖聽臣不勝戰栗惶懼之至緣繫處置平復地方以圖久安長治事理未敢擅便為此開坐具本請旨謝存問獻講學親政疏王鏊奏為謝恩事伏蒙聖恩特降敕諭遣行人柯維熊存問并示優眷者臣久伏草莽忽聞詔使臨門有若自天而降光生巖壑歡溢里閭莊誦璽書誨諭諄悉憫臣以直道難容嘉臣以勞勛自效臣之寸衷特荷九重之知雖殞百身何能為萬一之報乎隨欲赴闕陳謝而衰病侵尋恐顛越於道路乃敢具疏以聞臣本樗材遭際聖明亦嘗承乏內閣預聞國論適值逆瑾盜政播弄威福臣力既不能沮抑性又不善詭隨不得已乞身而退處於野十有三年無復當時之望矣恭遇陛下龍飛九五庶政一新海隅蒼生欣欣相告復覩太平之治而草莽之臣又不意獲沾優老之典臣不自揆嘗著講學親政二篇志欲效野人食芹之獻而無由今幸天恩下逮何敢復自疑外而以出位為嫌哉竊念古之聖君賢相共成至治之隆者蓋起上下之交而近世之交其道有二一曰講學二曰親政陛下踐阼以來時御經筵聖學勤矣臣愚猶過憂工夫或間斷而不洽所望清燕之間廣厦細旃之上時召文學侍從從容講論凡古帝王為政之大經大法日陳於前萬幾之暇惟是觀書觀書之暇靜以養心則自內及外無非進學之地殷高宗所以為學遜志務時敏道積於厥躬者此也陛下昧爽視朝聖政勤矣臣愚猶過憂堂陛太懸絶而不親所望視朝之暇時御便殿公卿大臣侍從臺諌逐日輪對從容咨詢生民苦疾政事得失使得日陳於前總攬乾綱不治微細接見忠賢不隔疏遠則自朝至暮無非修政之時宣王所以早朝晏罷卒成中興之名者此也講學則聖心日明親政則聖政日修君臣上下日周旋於一堂之上又安有間隔之患哉二帝三王之治可復見於今日矣聞古人雖在畎畝義不忘君故敢輒效其愚誠不自知其言之可用與否其義則臣子事君盡心之道也惟陛下少留一夜之觀如其可采采而行之則臣雖填溝壑無復恨矣其講學親政二篇附奏以聞臣不勝感恩激切屏營之至講學篇國家經筵之設其盛矣乎天子自正朝輦御文華殿公卿大臣盛服侍列羽林之士亦皆環列以聽經筵一開天下莫不欣欣焉傳之以為希濶之典故曰其盛矣乎然一嵗之間寒暑皆歇春秋月分日不過二三日之間風雨則免政事有妨則免講之日夙具講章至期講訖綸音賜宴儼然而退上下之情未見其親且密也至於日講可謂親矣然體分猶過於嚴上有疑焉未嘗問也下有見焉未嘗獻也昔傅説之告高宗曰學於古訓乃有獲惟學遜志務時敏厥修乃來遜者遜其志如有所不能敏者敏於學如有所不及成王訪落於羣臣曰學有緝熙於光明示我顯德行學有緝熙者繼續而光明之也示我顯德行冀羣臣有以開示之也商周之君其學如此之切夫人主一日萬幾固不暇如儒生學士日夜孜孜然而帝王精一之傳治天下之大經大法古今治亂之迹天人精微之際自非遜敏緝熙亦安望其有得而今也濶略如是暴之之日少寒之之日多傅之之人寡咻之之人多未見其能得也且不獨商高宗周成王為然也漢光武雖在軍中投戈講藝息馬論道至夜分乃罷唐太宗延四方文學之士房杜禇薛輩十八人分番直宿討論經籍或至夜分今貞觀政要與魏徵所論亦可見矣宋世賢主宫中暇日惟是觀書居常禁中亦有日課翰林侍從日寓直禁中以備顧問我太祖高皇帝甫得天下開禮賢館與宋濂劉基章溢輩日日相講論其後聖學髙明詔告天下皆出御製睿翰如流羣臣拱視今御製文集是也仁宗皇帝臨御建𢎞文館於思善門之右文學之臣數人直入至館中講論孝宗皇帝經筵之外每觀永樂大典又嘗索太極圖西銘等書於宫中玩之尤嗜故學士沈度之書日臨數過夫自古帝王之學如此祖宗之學如此陛下睿哲自天春秋鼎盛講明聖學正其時也臣愚特望於便殿之側復𢎞文館故事妙選天下文學行藝博聞者七八人更畨入直內閣文臣一人領之如先朝楊溥故事陛下萬幾有暇時造館中屏去法從特霽天威從容詢問或講經或讀史或論古今成敗或論民間疾苦間則遊戲翰墨雖詩文之類亦惟所好而不禁蓋亦日講之義而加親焉大略如家人父子上有疑則必問下有見則必陳日改月化有不期然而然者時御經筵所以昭國家之盛典日造𢎞文所以崇聖學之實功如是不已則聖德日新又新高宗成王不得專美於前矣親政篇易之泰曰上下交而其志同其否曰上下不交而天下無邦蓋上之情逹於下下之情逹於上上下一體所以為泰下之情壅閼而不得上聞上下間隔雖有國而無國矣所以為否也交則泰不交則否自古皆然而不交之弊未有如近世之甚者君臣相見止於視朝數刻上下之間章奏批答相關接刑名法度相維持而已非獨沿襲故事亦其地勢使然何也國家常朝於奉天門未嘗一日廢可謂勤矣然堂陛懸絶威儀赫奕御史糾儀鴻臚舉不如法通政司引奏上特視之謝恩見辭惴惴而退上何嘗治一事下何嘗進一言哉此無他地勢懸絶所謂堂上遠於萬里雖欲言無由言也愚以為欲上下之交莫若復古內朝之法蓋周之時有三朝庫門之外為正朝詢謀大臣在焉路門之外為治朝日視朝在焉路門之內曰內朝亦曰燕朝玉藻云君日出而視朝退適路寢聽政蓋視朝而見羣臣所以正上下之分聽政而適路寢所以通遠近之情漢制大司馬左右前後將軍侍中散騎諸吏為中朝丞相以下至六百石為外朝唐皇城之北南三門曰承天元正冬至受萬國之朝貢則御焉蓋古之外朝也其北曰太極門其內曰太極殿朔望則坐而視朝蓋古之正朝也又北曰兩儀殿常日聽朝而視事蓋古之內朝也宋時常朝則文德殿五日一起居則垂拱殿正旦冬至聖節稱賀則大慶殿賜宴則紫宸殿或集英殿試進士則崇政殿侍從以下五日一員上殿謂之輪對則必入陳時政利害內殿引見亦或賜坐或免穿靴蓋亦三朝之遺意焉蓋天有三垣天子象之正朝象太極也外朝象天市也內朝象紫微也自古然矣國朝聖節正旦冬至大朝會則奉天殿即古之正朝也常日則奉天門即古之外朝也而內朝獨缺然非缺也華蓋謹身武英等殿豈非內朝之遺制乎洪武中如宋濂劉基永樂以來如楊士竒楊榮等日侍左右大臣蹇義夏元吉等嘗奏對便殿於斯時也豈有壅隔之患哉今內朝未復臨御常朝之後人臣無復進見三殿高閟鮮或窺焉故上下之情壅而不通天下之弊由是而積孝宗晚年深有慨於斯屢召大臣於便殿講論天下事方將有為而民之無祿不及覩至治之美天下至今以為恨矣惟陛下遠法聖祖近法孝宗盡剗近世壅隔之弊常朝之外即文華武英二殿仿古內朝之意大臣三日或五日一次起居侍從臺諌各一員上殿輪對諸司有事咨決上據所見決之有難決者與大臣面議之不時引見羣臣凡謝恩辭見之類皆得上殿陳奏虗心而問之和顔色而道之如此人人得以自盡陛下雖深居九重而天下之事燦然畢陳於前外朝所以正上下之分內朝所以通遠近之情如此豈有近時壅隔之弊哉唐虞之時明目逹聰嘉言罔伏野無遺賢亦不過是而已明文海卷五十
