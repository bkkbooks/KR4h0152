body:
  text: 明文海卷五十一餘姚黃宗羲編奏疏五正典禮疏張孚敬臣竊謂孝子之至莫大乎尊親尊親之至莫大乎以天下養伏惟皇上應天順人嗣登大寶乃即敇議追尊興獻玉以正其號奉迎聖母以致其養此誠孝子之心有不能自已者也兹者朝議謂皇上入嗣大宗宜稱孝宗皇帝為皇考改稱興獻王為皇叔父興獻大王興獻王妃為皇叔母興獻大王妃者然不過拘執漢定陶王宋濮王故事謂為人後者為之子不得復顧其私親之説耳伏承聖諭以此禮事體重大令博求典故務合至當之論臣有以仰見皇上純孝之心矣比有言者遂謂朝議為當恐未免膠柱鼓瑟而不適於時黨同伐異而不當於理臣固未敢以為然也夫天下豈有無父母之國臣厠立清朝發憤痛心不得不為皇上明辨其事記曰禮非從天降也非從地出也人情而已矣故聖人緣人情以制禮所以定親疏決嫌疑别異同明是非也夫漢之哀帝宋之英宗乃定陶王濮王之子當時成帝仁宗無子皆預立為皇嗣而養之於宮中是尚為人後者也故師丹司馬光之論施於彼一時猶可今武宗皇帝已嗣孝宗十有七年比於崩殂而廷臣遵祖訓奉遺詔迎取皇上入繼大統豈非以天下者祖宗之天下天下之天下也臣伏讀祖訓曰凡朝廷無皇子必兄終弟及夫孝宗興獻王兄也興獻王孝宗親弟也皇上興獻王長子也今武宗無嗣以次屬及則皇上之有天下直猶髙皇帝親相授受者也故遺詔直曰興獻王長子倫序當立初未嘗明著為孝宗後比之預立為嗣養之宮中者其公私實較然不同矣或以孝宗德澤在人不可無後夫孝宗誠不可忘也假使興獻王尚存嗣位今日恐弟亦無後兄之義夫興獻王往矣稱之以皇叔父鬼神固不能無疑也今聖母之迎也稱皇叔母則當以君臣禮見恐子無臣母之義禮長子不得為人後况興獻王惟生皇上一人利天下而為人後恐子無自絶父母之義故在皇上謂繼統武宗而得尊崇其親則可謂嗣孝宗以自絶其親則不可或以大統不可絶為説者則將繼孝宗乎繼武宗乎夫統與嗣不同而非必父死子立也漢文帝承惠帝之後則以弟繼宣帝承昭帝之後則以兄孫繼若必強奪此父子之親建彼父子之號然後謂之繼統則古嘗有稱髙伯祖皇伯考者皆不得謂之統矣或以魏詔謂由諸侯入奉大統則當明為人後之義殊不知曹睿是時尚未有嗣其詔蓋預為外藩援立者坊此有為之私非經常之典也可概論乎故曰禮時為大順次之不時不順則非人情矣非人情則非禮矣臣竊敢謂今日之禮宜别為興獻王立廟京師使得隆尊親之孝且使母以子貴尊與父同則興獻王不失其為父聖母不失其為母矣夫人必各本於父母而無二議禮者亦惟體之於心而已今者不稽古禮之大經而泥末世之故事不守祖宗之明訓而率曹魏之舊章此臣之所未解者也雖然非天子不議禮今皇上虛已宏大疇咨衆言倘以朝議為禮之當稱號一定不可復易且將使天下後世之人皆知以利為利而自遺其父母疑非永言孝思孝思維則之謂也臣竊惟此禮乃天經地義萬代瞻仰毫釐之差千里之謬故大臣平章小臣獻納皆分之宜也書曰有言逆于女心必求諸道有言遜于女志必求諸非道夫逆心之言疑于忠而未必皆道也遜志之言疑于諛而未必皆非道也臣愚豈敢導諛君上以自誤於不臣又豈敢昧於自獻以誤君於不孝惟聖明體察而裁決焉臣不勝懇切聽命之至廟議疏張孚敬臣伏惟皇上以大孝之心議尊親之典初因廷臣執論聚訟四年更詔三遍蓋自漢宋以來之君所不決之疑至皇上決之所未成之禮至皇上成之真可謂洗千古之陋垂百王之法者也是以新詔傳宣愚氓丕應蓋禮必如此然後合乎天理之正即乎人心之安也兹光祿寺署丞何淵妄肆浮言破壞成禮稱獻皇帝為所自出之帝請立世室列祀太廟此何言也臣與廷臣抗論之初即曰當别為興獻王立廟京師又曰别立禰廟不干正統此非臣一人之議天下萬世之公議也今何淵以獻皇帝為所自出之帝比之今之德祖請立世室比之周文王武王不經甚矣皇上聰明中正諒已察之兹言也上干九廟之威監下駭四海之人心臣不敢不為皇上言之昔漢哀帝追尊父定陶共王為共皇帝立寢廟京師序昭穆儀如孝元帝是為干紀亂統人到于今非之今何淵請入獻皇帝主於太廟不知序於武宗皇帝之上與序於武宗皇帝之下與孝宗之統傳之武宗序獻皇帝於武宗之上是為干統無疑武宗之統傳之皇上序獻皇帝於武宗之下又於繼統無謂何淵所請此何言也如謂太廟中不可無禰漢宣帝嗣昭帝後昭為宣之叔祖史皇孫嘗别立廟未聞有議漢宗廟無禰者蓋名必當實不可強為也如謂獻皇帝廟終當何承臣謂由皇上以及聖子神孫於太廟當奉以正統之禮於獻皇帝廟當奉以私親之禮尊尊親親並行不背者也先儒謂孝子之心無窮分則有限得為而不為與不得為而為之均為不孝皇上追尊獻皇帝别立廟者禮之得為者也此臣所以昧死勸皇上為之也入獻皇帝主於太廟者禮之不得為者也此臣所以昧死勸皇上不為之也夫成禮則難壞禮則易伏乞皇上念此禮大成原出聖裁匪由人奪何忍一旦遽為小人所破壞邪重制誥疏張孚敬臣竊惟制誥者王言也知制誥者臣職也知制誥而使王言不重則不得其職矣臣按國初以來成化以前制誥之體猶為近古明揚履厯宣昭事功其於本身者不過百餘字其覃恩祖父母父母并妻室者不過六七十字言之者無費辭受之者無愧色近來俗習干求文尚誇大藻情飾偽張百成千至有子孫讀其祖父母父母誥敕莫自知其所以然者卒使萬乘之尊下譽匹夫匹婦之賤良可惜也孔子曰天下有道則行有枝葉天下無道則辭有枝葉今當聖明之世可使制誥之文為枝葉之辭哉伏乞敕下內閣自今以後凡為誥敕必須復古崇實一切枝葉浮誇之辭盡行刪去庶王言重而人知所勸矣釐正孔廟從祀疏張孚敬臣謹按程敏政奏曰唐貞觀三十一年始以左丘明等二十二人從祀孔子廟庭蓋當是時聖學不明議者無識拘于舊注疏謂釋奠先師如詩有毛公禮有髙堂生書有伏生之類遂以専門訓詁之學為得聖道之傳而并及馬融等行之至今誠不可不考其行之得失與義之可否而釐正于大明有道之世也臣考厯代正史馬融初應鄧隲之召為祕書厯官南郡太守以貪濁免官髠徙朔方自刺不殊又不拘儒者之節前授生徒後列女樂為梁冀草奏殺忠臣李固作西第頌以美冀為正直所羞即是觀之則衆醜備于一身五經為之掃地後世乃以其空言目為經師使侑坐于孔子之庭臣不知其何説也劉向初以獻賦進喜誦神仙方術嘗上言黃金可成鑄作不驗下吏當死其兄陽城侯救之獲免所著洪範五行傳最為舛駁使箕子經世之微言流為隂陽術家之小技賈逵以獻頌為郎不修小節専一附會圖讖以致貴顯蓋左道亂政之人也王弼與何晏倡為清談所注易専祖老莊而范寧追究晉室之亂以為王何之罪深于桀紂何休則止有春秋解詁一書黜周王魯又注風角等書班之以孝經論語蓋異端邪説之流也戴聖為九江太守治行多不法懼何武劾之而自免後為博士毁武于朝及子賔客為盜繫獄而武平心決之得不死則又造謝不慚先儒謂聖禮家之宗而身為贓吏子為賊徒可為世鑒王肅在魏以女適司馬昭當是時昭篡魏之勢已成肅為世臣封蘭陵侯官至中領軍乃坐觀成敗及母丘儉文欽起兵討賊肅又為司馬師畫䇿以濟其惡若好人佞已乃其過之小者杜預所著亦止有左氏經傳集解其大節益無可稱如守襄陽則數饋遺洛中貴要紿人曰懼其為害耳非以求益也伐吳之際因斫癭之譏盡殺江陵之人以吏則不廉以將則不義凡此諸人其於名教得罪非小而議者謂能守其遺經轉相授受以待後之學者不為無功臣竊以為不然夫守其遺經若左丘明公羊髙榖梁赤之於春秋伏勝孔安國之於書毛萇之於詩髙堂生之於儀禮后蒼之於禮記杜子春之於周禮可以當之蓋秦火之後惟易以卜筮僅存而餘經非此九人則幾乎熄矣此其功之不可泯者以之從祀可也若融等又不過訓詁此九人所傳者耳况其書行於唐故唐姑以備經師之數祀之今當理學大明之後易用程朱詩用朱子書用蔡氏春秋用胡氏又何取於漢魏以來駁而不正之人使安享天下之祀哉夫所以祀之者非徒使學者誦其詩讀其書亦將識其人而使之尚友也臣恐學者習其訓詁之文於身心未必有補而考其姦諂淫邪貪墨怪妄之迹將自甘於效尤之地曰先賢亦若此哉其禍儒害道將有不可勝言者矣至于鄭衆盧植鄭玄服虔范寧五人雖若無過然其所行亦未能以窺聖門所著亦未能以發聖學若五人者得預從祀則漢唐以來當預者尚多臣愚乞將戴聖劉向賈逵馬融何休王肅王弼杜預八人褫爵罷祀鄭衆盧植鄭玄服虔范寧五人各祀于其鄉后蒼在漢初説禮數萬言號后氏曲臺記戴聖等皆受其業蓋今禮記之書非后氏則不復傳於世矣乞加封爵與左丘明等一體從祀則偽儒免欺世之名賢者受専門之祀而情文兩得矣又曰孔子弟子見于家語自顔回而下七十六人家語之書出于孔氏當得其實而司馬遷史記所載多公伯寮秦冉顔何三人文翁成都廟壁所畫又多蘧瑗林放申棖三人先儒謂後人以所見增益殆未可據臣考宋邢昺論語注疏申棖孔子弟子在家語作申續史記作申黨其實一也今廟庭從祀申棖封文登侯在東廡申黨封淄川侯在西廡重復無稽一至於此且公伯寮訴子路以沮孔子乃聖門之蟊賊而孔子稱瑗為夫子決非及門之士林放雖嘗問禮然家語史記邢昺注疏朱子集注俱不載諸弟子之列秦冉顔何疑亦為字畫相近之誤如申棖申黨者但不可考耳臣愚以為申棖申黨位號宜存其一公伯寮秦冉顔何蘧瑗林放五人既不載于家語七十子之數宜罷其祀若瑗放二人不可無祀則乞祀瑗于衛祀放于魯或附祭于本處鄉賢祠仍其舊爵以見優崇賢者之意亦庶乎名實相符而不舛于禮也又按洪武二十九年行人司司副楊砥建議請黜揚雄進董仲舒太祖髙皇帝嘉納其言而行之主張斯道以淑人心可謂大矣然荀况揚雄實相伯仲而况以性為惡以禮為偽以子思孟子為亂天下以子張子夏子遊為賤儒故程子有荀卿過多揚雄過少之説今言者欲並黜况之祀宜也然臣竊以為漢儒莫如董仲舒唐儒莫如韓愈而尚有可議者一人文中子王通是也通之言行先儒之論已多大約以為僣經而不得比于董韓云爾臣請斷之以程朱之説程子曰王通隱德君子也論其粹處殆非荀揚所及若續經之類皆非其作然則程子豈私於通哉正因其言之粹者而知其非僣經之人耳朱子曰文中子論治體處髙似仲舒而本領不及爽似仲舒而純不及又曰韓子原道諸篇若非通所及者然終不免文士之習利逹之求若覽觀古今之變措諸事業恐未若通之精到懇惻而有條理也至於河汾師道之立出於魏晉佛老之餘逮今人以為盛則通固豪傑之士也今董韓並列從祀而通不預疑為缺典臣又按宋儒自周子以下九人同列從祀而尚有可議者一人安定胡瑗是也瑗之言行先儒之論已詳大約以為少著述而不得比于濂洛云爾臣亦請斷以程朱之説程子看詳學記曰宜建尊賢堂以延天下道德之士如胡瑗張載邵雍使學者得以矜式朱子小學書亦偹載瑗事以為百世之法臣以為自秦漢以來師道之立未有過瑗者矧程子於瑗之生也欲致其與張邵並居于尊賢之堂其沒也乃不得與張邵並侑于宣聖之廟其為闕典甚矣况宋端平二年議增十賢從祀以瑗為首若以為瑗無著述之功則元之許衡亦無著述但其身教之懿與瑗相望誠有不可偏廢者臣考之禮有道有德于教于學者死則為樂祖祭于瞽宗鄉先生沒則祭于社若通瑗兩人之師道百世如新得加封爵使與衡同祀于學宮最得禮意謝鐸奏曰孔廟從祀之賢實萬世瞻仰所係有若龜山先生楊時程門髙弟伊洛正傳息實演晦翁之派雖其晚節一出不克盡從其言而新經之闢誠足以衛吾道而不預從祀之列臣竊惑焉又若臨川郡公吳澄著述雖不為不多行檢則不無可議生長於淳祐貢舉于咸淳受宋之恩者已如此之久為國子司業為翰林學士厯元之官者乃如此其榮生前朝而居然忍於忘君親而事仇敵昔人謂其専務聖賢之學卓然進退之際不識聖賢之於進退果如是否乎如是而猶在從祀之列臣固不能以無惑况二人者皆太學之師其於廟祀黜陟之際尤不可以不正也舉人桂華議曰嘗讀宋史有蔡元定者史曰朱熹疏釋四書及易詩傳通鑑綱目皆與元定參訂啓蒙一書則元定之藁又曰元定平生問學皆寓朱子書集又曰朱子論易推本圖書往往與元定往復而有發焉然則後朱熹而生者於朱熹皆受罔極之恩惟元定獨為有功於朱熹死者可作朱熹之志可知也更復考其所著成書有律呂新書皇極指要洪範解大衍詳説等篇昔我太宗編輯性理全書指要新書固已擢録至於範數雖止入其子沈之所著者沈之所受則何自哉觀其命沈之言女宜演吾皇極數而真德秀又謂範數西山獨心得之沈之受於元定蓋不由師傳而自得之也可知矣先王制祀以死勤事則祀之竊以元定蓋亦勤斯道而竄死與古以死勤事者同所宜從祀臣謹詳敏政所奏率多正論可采𢎞治初曾奉孝宗聖旨著禮部照例會官議率為沮格不行及按孝宗實録云鐸議吳澄不當從祀尚書傅瀚力詆鐸言為謬又力稱前人之請為有見不可遽易侍郎焦芳曰所謂前人者蓋楊士竒也今天下方議其當柄用之際雖從祀大事猶能私庇其鄉人可又襲其非耶瀚竟引禮所謂凡祭有其舉之莫敢廢詩書所謂率由舊章監于成憲以文其説而於澄忘宋事元之大節略不及澄遂仍舊從祀而鐸議皆寢論者謂士竒之以澄欺宣廟非特私其鄉人而措意亦有在瀚不悟此則為溺鄉里之私而不顧君臣之大倫正道統之攸繫乃據為舊章成憲再不可議然則楊時奏黜王安石之配享當時安石豈無朝命而配享哉特其命雖出自朝廷而事實由臣下阿私所親以誤朝廷而非天下之公議所以易之後世竟不以為過也此豈橫私意於胸中者所能與哉臣又詳桂華之議蔡元定宜列祀典以協衆論之公也臣又按歐陽修乃有宋一代人物未與從祀嘗觀其所著本論實有翊衛聖道之功蘇軾曰自漢以來道術不出於孔氏而亂天下者多矣五百餘年而後得韓愈學者以配孟氏蓋庶幾焉愈之後三百餘年而後得歐陽子其學推韓愈孟子以逹於孔氏故天下翕然師尊之曰歐陽子今之韓愈也夫韓愈既已從祀歐陽修豈可闕哉孔子祀典或問張孚敬或問孔子祀典自有唐以來稱號定矣子必願皇上正之者何也臣答曰為尊孔子也為人道大倫也聖人人倫之至也孔子以德則師也以位則臣也大倫正而後孔子之道尊故曰尊孔子也然非愚一人之見也今昔諸儒之公論也世之人徒知以封王尊孔子而實不知所以尊也或曰孔子封號聖祖詔仍元舊也臣答曰聖祖初未嘗為孔子作諡號也仍元舊耳按洪武三年詔曰夫禮所以明神人正名分不可以僣差厯代忠臣烈士依當時初封以為實號後世溢美之稱皆與革去其孔子善明先王之要道為天下師以濟後世非有功於一方一時者可比所有封爵宜仍其舊夫故元祀神瀆禮極矣名之不正甚矣聖祖一切革去獨存孔子祀典者實以孔子明先王之道為天下師也曰為天下師聖祖實尊之以師也非以王號也祖訓凡傳制遣官代祀厯代帝王孔子廟於帝王則直曰帝王於孔子則直曰孔子故凡祭祀遣命俱稱先師孔子實未嘗有以王號稱之者也夫孔子稱文宣王太公稱武成王實始於開元之制也洪武二十年禮部奏請如前代故事立武學仍祀太公建武成王廟聖祖曰太公周之臣封諸侯若以王祀之則與周天子並矣加之非號必不享也太公之祀止宜從祀帝王廟遂命去王號罷其舊廟觀此則孔子専廟祀之實聖祖尊之以師之故其不王孔子之意亦自可見矣不然孔子道德雖非太公可擬然以周天子視之則皆臣子也加以非號太公既必不享也孔子又豈肯享哉或曰追崇之禮其來尚矣凡為人君者皆尊崇其祖父孔子師也獨不可追崇乎臣答曰此國朝楊守陳之論也其言曰孔子道德教化之盛賢堯舜而配天地自生民以至於今一人而已後世人君皆師之則皆其弟子也稱為先師固當矣若追崇之典必當臻乎極而後已焉周公制禮追王其父祖前未有也師生之義與父子之恩同子可以追王其父則生亦可以追王其師况孔子又萬世一人後王實被罔極之恩者乎噫斯言也悖也甚矣天子而追崇其父周公之制也弟子而追王其師古有是制乎信斯言也成湯之於伊尹學焉者也亦追崇伊尹可乎或曰孔子有天德王道者也追崇為王奚為不可臣答曰孟軻氏曰匹夫而有天下者德必若舜禹而又有天子薦之者故仲尼不有天下夫昔者堯薦舜於天矣舜薦禹於天矣故舜禹之有天下天與之也孔子德雖無愧於舜禹而無天子薦之者故不有天下自夫唐玄宗加孔子以王號也末世因之若將使孔子有天下者也以為尊孔子也噫欺天甚矣或曰然則周惇頥以為萬世無窮王祀夫子其言不足證乎臣答曰周惇頥曰春秋正王道明大法也孔子為後世王者而修也亂臣賊子誅死者於前所以懼生者於後也宜乎萬世無窮王祀夫子報德報功之無盡焉夫王祀夫子自唐宋未之有改也惇頥之意特主言孔子功德之隆宜萬世報之無盡焉耳夫豈既以孔子正王道明大法也而復以王祀為宜乎讀者不以辭害意可也或曰孔子王號自唐宋至今未之有改也雖三尺童子皆知所尊也臣答曰三尺童子皆知所尊者尊孔子以師也非以王也有人於此列堯舜禹湯文武之像而祀之其罹刑禁也必矣孔子雖三尺童子皆得以祀之尊之以師故也或曰塑像之説果非禮乎臣答曰非禮也諸儒已論之詳矣又按國朝宋濂曰不以古之禮祀孔子是褻祀也褻祀不敬不敬則無福開元之制摶土而肖像焉則失神而明之之義矣或曰孔子塑像固非禮也然仍元之舊一旦毁之忍乎臣答曰以土梗為孔子也為禮也誠一旦不忍毁也以土梗非孔子也非禮也則不可不亟毁之矣毁之所以尊孔子也以全禮也夫奚疑哉或曰塑像毁矣無假於章服矣然則籩豆樂舞之數其仍舊可乎一旦殺之忍乎臣答曰以籩豆樂舞之加為尊孔子也為禮也誠一旦不忍殺之矣以籩豆樂舞之加非尊孔子也非禮也則不可不亟殺之矣殺之所以尊孔子也以全禮也夫奚疑哉或曰祭用生者之祿天子以天子之禮樂祀其先師夫奚不可臣答曰祭用生者之祿人子推之以事其父則古禮也弟子推之以事其師則古禮未之有聞也杞宋用天子禮樂以祀其先為二代王者後也若魯以周公之功用天子禮樂則非禮矣孔子謂季氏八佾舞於庭是可忍也孰不可忍也又謂爼豆之事則嘗聞之矣然則八佾十二籩豆天子之禮樂也孔子肯安然享之乎或曰廟仍以殿名可乎臣答曰孔子學宮之祭本古弟子釋奠先師之禮也謂廟可也非殿也或曰孔子祀典之正將行之天下也然則闕里也如之何臣答曰孔子之後其傳道者宜莫如子思也昔魯哀公誄孔子曰尼父子思作中庸則直稱曰仲尼固未嘗援之為孔子重也曾子將死起而易簀責曾元曾申曰君子之愛人也以德細人之愛人也以姑息是不安用大夫之禮也孔子豈肯安享天子之禮樂乎又子思曰今天下車同軌書同文行同倫言天下一統也奚疑於闕里乎哉或曰聖明在上凡諸祀典誠不可不正也無乃太速乎臣答曰天地定位日月隂陽各止其所禮儀有成典矣夫孔子與天地合其德日月合其明實祀典之大者不可不急正者也非速也宜也慎出命以示大順疏汪思邇者給事中劉最得罪禠職科道諸臣以為斥逐言官殊乖治體交疏懇請乞賜優容不意上犯天威嚴加詰責聖恩浩蕩尚免刑誅螻蟻微軀粉骨難報臣已隨班入謝感激無涯退而深思猶有疑惑既存胸臆不敢腹腓謹用敷陳冀回天聽此臣區區一念之忱陛下誠有社稷深憂則曰是朴直者或可聽也不然則曰是狂愚耳不足問也其又不然則是奏擾之罪無復可逃萬鈞所壓雷霆所擊摧折敗壞臣復何惜但恐天下之事方將勞聖慮耳然臣念陛下聖明必不肯至此極也臣聞之易曰重巽以申命夫巽順也重巽者上下皆順也上順道以出命下順道而從之於是乎風四方而鼓萬姓古之善治天下者用此道也陛下之出命於此殆有慊乎陛下即位之始詔旨流宣臣工奉行罔有或怠可謂得巽之義矣既而初心漸弛德意頗乖人心未免驚疑臣下未免駁議馴至今日更又可愕陛下豈未自知乎臣請言之聖諭有曰朝廷設言官務以指實具奏不許虛詞奏擾似也然言官風聞言事自祖宗來固已許之蓋勢有所不及詳機有所不可泄一有見聞即當奏報徐行勘實庶足防姦如曰止當據實不許風聞則論劾益難憸邪日肆矣聖諭又曰劉最劾奏事不以實輕率妄言回話又不認罪最誠輕率可罪矣然崔文之惡言者競興各以所聞告之陛下多糜內帑最亦奏所聞耳其實固不可知最既有聞不敢不告最之心則實也律文曰奏事詐不以實最何嘗詐使最而不以所聞告乃為詐不實耳若夫回話之説尤有可議方崔文有訴陛下止令最查明銀兩耳最之再奏亦止言內帑不得查究崔文不當搆陷耳陛下固未嘗責最回話最亦何得認其罪哉聖諭又曰姑從寬調外任以稱朝廷容宥之恩臣則以為陛下何能容宥之有夫崔文陛下㺯臣也劉最陛下爭臣也㺯臣以快一身者也爭臣以利天下者也假使最更疏狂徑訐陛下猶當宥之以彰仁聖乃為㺯臣私昵之故而黜忠直之臣未見其為容宥也聖諭又曰這厮每如何這等奏擾恣意回護本當拿問究治且饒這遭再不許仍前奏擾夫諸臣之意蓋為社稷深憂故敢交章匡救豈有敢為同官奏擾聖情以輕蹈拏問究治之禍又况草疏初心已分顯戮其身不敢保於最乎何回護之有陛下殆亦不亮諸臣之心矣虞夏之治亦既盛矣而君臣之間更相敕戒不敢怠忽陛下繼亂而興治績未就竒災大沴所在興嗟正宜恐懼修省訪問缺失乃禁臣下使勿復言臣之愚狂誠不敢奉詔也夫自興獻帝尊崇之議外廷羣臣不能悉合陛下之意及夫近日都督同知陳萬言賜第之事又復議論相乖左右近褻必有獻諛貢佞抑或借此興讒將謂外庭於陛下懿親每不相假遂使聖情疑惑心意漸踈謂此輩為尊承謂羣臣為違慢言不足聽計不足從是未可知也如其信然則陛下之赫怒固宜然此豈盛德事哉又如內帑銀兩陛下既有職掌不容擅支矣若以妄劾崔文為最之罪則直罪之可也何為而使最查明以難之及最言其難然後加之罰也是乃挾術搆陷之謀殊非王者正大光明之體又陛下先因刑部之參已曰崔文已有旨了饒他後因崔文之訴乃又極其慰留溫語褒詞不一而足是方以有罪而恕之忽以有德而章之私情公義轉展相妨意有偏投便為所勝臣恐陛下剛明之資或其有可憾也夫王言如絲其出如綸王言如綸其出如綍一言一話若甚細微流布四方實關大體蓋一時詰難雖下情易窮而少有乖違則人心未服甚非重巽順出順從之義也陛下如欲諸臣勿言何不俯從衆志省察愆尤割去已私深惟至計納諸臣之説復劉最之官自今睿旨擬行一切責付內閣務俾注慎允當大順人心如或過差責有攸在若是則羣臣將順之不暇又奚奏擾之病乎唐臣魏徴言於其君曰願使臣為良臣毋使臣為忠臣亦臣之夙願也臣言已盡涕淚交零待罪闕庭不勝戰栗明文海卷五十一
