body:
  text: 明文海卷五十二餘姚黃宗羲編奏疏六容直言霽嚴譴以廣聖聰疏陳時明臣竊見近日禮科給事中劉最論太監崔文以左道蠱惑聖心糜費內帑銀兩數多節奉聖旨內帑銀兩自有職掌豈容擅便動支劉最不諳事體輕率妄言本當提問且饒這遭著對品調外任吏部知道欽此嚴命一下舉朝驚駭夫劉最非他言官也言官非他朝廷之耳目也自古帝王暨我祖宗所以設立言官者以朝政缺失姦邪情狀責之而後察察之而使言也所以博視聽而防壅蔽也所以圖安全而戒危亡也言之而當雖于君身不便左右不便強而從之其不當雖觸忌諱亦包而容之所以盡下情而冀善言也所以略小過而存大體也最自以身荷國恩官以諫名職當耳目誠見邇者聖學之不篤也時政之不修也大臣之不親也忠諫之不行也意必有左右險佞之徒惑移聖心蒙蔽聖聰者已而廉得崔文誘導誦經設醮事且風聞崔文指以齋醮為由濫用內帑銀兩至六七萬故為陛下言之所以輸忠欵舉職事也當最此疏下時臣竊自愧均一待罪言官而耳目短淺識見疏暗不知左右欺罔有如此者將謂陛下必痛罪崔文以彰英斷以肅近幸也詎意閲月之後復有崔文強肆之奉致有陛下今日之怒乎最以假齋醮侵內帑劾崔文有是事當命內司查勘果出風聞亦可因以戒諭左右而為先事之防最為朝廷慮無不可也文被劾時若無此事即當明白陳奏使外廷知之何有事涉旬月之餘言者已目為墮甑矣乃敢喘息而為反噬之計乎乃敢讒譛而注誤陛下乎詩曰取彼譛人投畀豺虎豺虎不食投畀有北有北不受投畀有昊蓋痛憤讒邪之傷善類而欲其死亡之甚也臣意文被劾時自以肺肝畢見所懼者陛下之知其姦而致其罰也所經營者在乞哀左右而求免於戾也正多方救罪之不暇安能謀人及陛下曲賜恩宥文罪已脫矣人言亦稍息矣其彌縫亦已固矣左右頗有助矣讒計度可行矣內外一無顧忌乃讐言者發其隂事潛為狙擊之謀要言官以必不能根究之事以激怒陛下故陛下墮其術中而不悟也自古設敢諫之鼓立誹謗之木樹進善之旌言之而善尊其爵富其家不善則姑置之猶不敢顯言其諫之過也舒徐以諭之和顔色以悅之何則古先哲王誠見進言之難而慮人之不敢盡言也言官進言實難循默不言誰則不能蓋有言必有讐凡言官所指而不讐者百千中間一二也所賴者聖明為之主而庇護之耳猶司防之犬搏噬姦宄為之主者不知憐恤其不為盜賊之虀粉也罕矣自非忠鯁獨立之士幾何不為利害所林故言官敢言之難非獨臣以為難自古以為難也若使言官持祿以富家積考以遷官從容附會上無忤于君下無怨于人此言官之利也恐非有國之福也前有讒而不見後有賊而不知政事日非而其社稷亦隨之矣其一時風聞之誤雖有言過其實者人主亦當取其千里而略其牝牡驪黃昔人所謂不激切不足以動人主之心是也至其正言不諱尤足以闡揚盛德古所謂主聖則臣直君仁則臣直載諸前史可復尋也况陛下嘉靖改元之詔有曰給事中御史職當言路今後凡遇朝廷政事得失天下利病許直言無隱明詔一出播諸萬國傳諸四海載諸青史為千古盛德事今最忽以言得罪恐非陛下明詔之本意也人有千金之璧固珍襲以藏之也而自毁棄之而自點汚之觀者以為何如哉伏讀嘉靖改元一詔陛下一代之大制度也猶漢髙之約法也三章之法亦草草粗具耳猶終漢世未之改易陛下登極之詔質諸天理揆諸人心斷諸聖裁採諸輿論與帝王致治之迹如出一軌轍固將傳之聖子神孫為萬世不刋之典陛下之寶陛下自當惜之可也詎意方自為而旋自背之乎彼漢唐宋願治之主其自為法制猶兢兢持守終其世而不肯少變陛下有此大制度良法美意縱不能貽厥孫謀猶當矜持永世今乃始終參差一至如此陛下方比隆堯舜豈可使所為出漢唐宋之下乎就使最言委狂妄罪委當加天下之人先以明詔為主而望治之深也必將悵然曰向也求言今也罪言何以異於正德之世天下太平無復望焉最雖狂率妄言之罪誰與家喻而户曉也聞諸中國尚不知况可使聞於四逺乎最設以他事得罪猶之可也今以劾崔文而得罪天下聞之必曰陛下之寵幸宦臣又所以蒙幸者習道經建齋醮也最之所以得罪者忤幸臣闢異端也寵幸宦官非朝廷美事也崇尚異端亦非朝廷美事也陛下雖曰最狂率天下則曰陛下阿私近幸之故陛下雖曰最妄言天下則曰陛下惑於異端之故將最之名愈彰而朝廷之失益著此一事最言官之責庶幾矣如陛下何忤已而罪言官雖漢唐宋願治之主猶弗為也今以忤近幸而罪言官不亦異乎夫天下人心竭力收之而不足一事失之而有餘此風一出逺近傳布其於盛德關係匪輕願留三思無為聖明之纍此轉禍為福之機也陛下寵幸崔文縱不治前事之罪然因其中傷言官亦足以明其為凶悍無良之人知人之惡而不能去自古以來未有不遺後日之悔者也况因文而罪言官虧朝廷納諫之美蓄天下忠義之憤阻蒼生思治之望首壞明詔上玷盛德阻言官忠藎之門長姦諛驕橫之氣他日事有大于此者誰敢復為陛下言之後世有秉朱子綱目之筆者必書曰某月日以給事中劉最為某官分注曰時宦官崔文誘上設齋醮因而盜費內帑不資給事中劉最以為言文訴之上怒命對品調外任自是在廷以言為諱嗚呼文非獨誤陛下于一時而實使陛下取譏於萬世只此一事文可斬也後世之主固有始好言而終惡言如唐之玄宗者彼因在位日久世道小康志滿意得不勝驕矜之偏私汩其禮義之良心然卒致天寶之亂流離巴蜀局蹐南內抑鬱而終今陛下在位日淺恩澤未洽于人心威令未行于左右無玄宗數十年納諫之美而有玄宗末年拒諫之非今各省水旱異常留都疫癘大起草澤冦盜屢發人情岌岌方有土崩魚爛之憂此正朝廷兢兢業業上下交修奬忠直求善言以祈天永命以收集人心之時若復罪言拒諫是病危之人甘烏喙而嗤和扁也况左右近習多宮掖宿姦習于揣摩敢于縱肆方朝夕窺伺陛下之淺深陛下固宜操其鞭箠攬其䘖勒以防不掉之虞今復假之恩顧拂逆天下之心為之黜責言官箝制天下之口細民猶烏也烏將散復從而駭之近幸猶虎也虎出柙又隨而翼之臣恐氓𨽻耰鉏不特起于秦指鹿為馬將復見於今也伏望陛下惕然猛省收回成命存劉最以誘致盡言罪崔文以湔雪聖德于以疏通既塞之言路于以招徠將散之人心于以控馭泛駕之近習則四海清寧尚可望也若終迷不復他日之患臣有不敢盡言者矣亦有不忍盡言者矣易曰不逺復無祗悔元吉言改過貴速也臣待罪言官知言出于口必觸犯近幸但臣職在進言非言無以報國觸犯近幸固知有不測之禍然陷君父于有過之地當蒙萬世不忠之誅其實一也一時之禍是為纍及身家萬世之誅實以得罪名教臣非不解人意而為是瞽言也亦非暝目宵行而自投陷穽也於罪戾之中擇其近且輕者而居之誠日夜拳拳於君父不願朝廷有此不美事也惟陛下留神靜察勿以臣名位踈逺而忘其衷悃勿以成命已下而難于收回使天下之人知今日之罪言官果非陛下本意也則社稷幸甚天下蒼生幸甚臣待罪言署之臣亦幸甚對禘祫疏魏校朕每觀書見論祭義曰祫曰禘但不知其義何謂卿可指陳之使朕得聞其旨伏承問及禘祫之旨臣愚何足以知仰惟皇上聖孝逹天德固已默契古聖人制禮之原復欲講求其名義此堯舜好問好察之盛心也臣敢稽古經傳異同擇其可徴者以對禮記大傳曰禮不王不禘王者禘其祖之所自出以其祖配之趙匡曰禘王者之大祭也王者既立始祖之廟又推始祖所自出之帝祀之于始祖之廟而以始祖配之朱子曰以始祖配祭而不及羣廟之主不敢褻也臣惟太廟祭始祖子孫千百世不忘孝心固得伸矣但祭不及始祖而上則孝心伸有不盡故又推廣始祖孝心追禘其所自出其義至為深逺人之祭祖考也聲容相接則其情易通今推而至於始祖所自出世代遼隔邈不相親自非仁孝誠敬到那極處何由感通然則如之何願我皇上常齋厥心致其精誠之極右論禘禮春秋公羊傳曰大祫者何合祭也其合祭奈何毁廟之主陳於太祖未毁廟之主皆升合食於太祖臣按祫有二有大祫有時祫天子七廟太祖百世不遷自太祖而下親盡則祧祧則不祭故時祫惟遷六廟之主於太廟至于大祫則凡已毁廟未毁廟之主咸在而合食馬蓋子孫之于逺祖恩雖無窮義則有止故親盡則不免祧然其恩終有不能忘者故又制為大祫之禮而後可以伸其孝心也臣願皇上常念祖宗一脈相傳以至於今則報本追逺之誠自篤矣右論祫禮臣按禘祫之禮不明也久矣古者天子有禘有祫諸候有祫而無禘周衰諸侯祫祭其祖僣擬王者禘禮行之是故禘祫之禮始混後人從而附會之曰禘者諦也審諦昭穆也蓋因誤以傳誤耳詩云禴祠蒸嘗此四時祭名也記禮者誤以禴為禘後之人推其説而不通則曰此夏殷禮也是又因誤而生誤矣衆言殽亂折諸聖臣嘗考訂周禮而著其説曰古者天子祭祀之禮有六一曰禘大祭也周禮所謂以肆獻祼享先王也禘莫重于祼孔子嘗歎禘自既灌而往者吾不欲觀之矣二曰祫合祭也周禮所謂以饋食享先王也祫莫重于食故春秋傳曰升合食于太祖二者其禮極隆故謂之間祀三曰祠春祭也周禮所謂以祠春享先王也四曰禴夏祭也周禮所謂以禴夏享先王也五曰嘗秋祭也周禮所謂以嘗秋享先王也六曰蒸冬祭也周禮所謂以蒸冬享先王也四者其禮少殺故謂之常祀四時惟春特祀各行禮于廟夏秋冬則合祀之故又謂之時祫右總論祭禮御札朕聞卿禘祫之義論朕惟禘祭王者所重之祭我聖祖之制何無此舉古之王天下者嘗有此祭者幾君朕欲聞之朕又聞郊祭曰祀天宗祀于明堂曰祀上帝夫上帝即天之主宰何為焉又古者祭天地於圜丘方丘取冬夏二至以為隂陽之始又有合祀之説不知皆起何時也卿其言之伏讀聖諭臣瞿然而驚作而歎曰我皇上真聖人之資也郊禘之禮不明也久矣自昔章句俗儒終身學之往往牽制於文義而不能曉今我皇上聞言即悟渙然不逆于心才一二言便了大義自非聰明睿知超越古今曷克臻此誠千載之竒逢也更得博求二三名儒有實學者以備顧問朝夕啓沃明乾坤易簡之理發聖賢心學之要述生民困苦之狀陳帝王經世之略聖心洞然開悟天下事可運之掌從頭整頓一畨此真大聖人作為出于尋常萬萬者也臣不勝願望之至禘固王者大祭然此乃守成之君推隆創業之祖特制此禮在創業時却未有此禮可行故我太祖止立親廟追帝四世祖考所謂禮時為大也古之行禘禮者唐虞不可聞矣前三代夏商周也皆行此禮而夏商周之禮不可通於今後三代漢唐宋也漢未嘗行此禮惟唐宋行之然不盡合於古以諸儒論議紛紛也右答禘禮之問虞書肆類於上帝周禮以禋祀祀昊天上帝其言明而有徴孝經乃謂郊祀后稷以配天宗祀文王於明堂以配上帝是分昊天與上帝而二之朱子刋誤嘗辨其非聖諭謂上帝即天之主宰可謂一言以蔽之矣天人一理上帝神明正如人身渾合中間一點靈處豈可分而為二也右答祀天祀上帝之問禮家謂冬至祭天於圜丘夏至祭地於方丘然考之周禮不合大宗伯以禋祀祀昊天上帝以血祭祀社稷初未嘗以皇地祗與昊天上帝並稱宋儒胡宏考定古禮謂先王祭天于郊祭后土于社而已人與造化一體臣每論學必推之造化論造化必反諸身驗之天地渾渾一氣正如吾人之身只有一箇主宰獨運豈有兩箇主宰並持故知分祭天地之説非也乃若天地合祭比諸夫婦同牢始於王莽其言不經後世因而未改耳不特此也後世訓詁為學始於漢儒科舉取士始於隋煬帝資格用人始於拓跋魏之崔亮君臣不相接始於秦二世之聽趙髙皆非先王之舊也右答天地分祭合祭之問臣自少有志古禮嘗與司志講求今幸躬逢聖明何忍默而不獻誠以天下事有緩急今四海困窮所在人相殘食此豈功成制禮治定作樂時邪若欲潤色太平為事則是以禮樂為虛文矣我皇上豈務虛文者臣愚惓惓惟願皇上恢廓大度收用天下豪傑共圖太平是乃今日急務制度文物在所可緩况今學士大夫知禮者甚少知樂者絶少徒使皇上勞心焦思誰與討論哉宜敕下禮部博求能通禮樂者薦之來京使之考求先王遺法以備他日任使仰惟皇上欽明仁孝固性之於天但聖體清癯臣縷縷血誠竊以為今日第一義莫大於保護聖躬焉耳皇上思慮太多勵精太急故於不急之章奏無益之文義亦或留神恐非養德養身之道也易曰乾以易知坤以簡能易簡而天下之理得矣臣敢稽首以獻昧死陳言以效愚忠疏楊名時臣以災異修省妄有建白繼奉聖旨令臣明言臣捧誦之餘不勝悚懼切念臣本庸劣無所知識荷蒙皇上簡拔及第寵列詞林感仰殊恩每懷圖報近見諸臣奉詔陳言議論不一恐未足以上慰淵衷故以草茅之見騰為狂妄之説塵瀆睿覽但臣涵養未至故氣乏和平問學未明故言多疏謬乃重煩明旨臣驚悸隕越無地自容既而伏自思省所以有言實出于犬馬一念之誠非敢故為矯激以速譴責也以臣之愚時務人品固未能一一周知然得於見聞實不容已者况承嚴命之下茍復畏罪隱默或支離遷就以求幸免豈不有負皇上虛心納諫之仁也哉而臣願忠之初心亦自負矣故敢不避誅殛謹以所聞見出于臣民之公論者為皇上明言之臣惟吏部諸曹之首尚書百官之表而汪鋐者小人之尤者也往者吏部尚書有缺皇上亦慎重其任不肯輕子今乃屬任于鋐豈不以鋐為賢于諸臣耶然而命下之日大小臣工罔不驚愕雖閭閻細民亦切切不已皆曰此地非鋐所宜處也蓋以鋐之為人心行反覆舉動乖張志惟務于逢迎心秪期于報復向總憲臺纍遭論劾今遷吏部又被羣言臣恐失今不處使在位日久益以逢迎之巧濟其報復之私內外臣工用舍盡謬則其為害可勝言哉此鋐之不當用也如武定侯郭勛賦性姦回立心險詐阿奉權貴叨受天恩蓋不必考其心術之微觀其氣象之著亦知其為險人也皇上使之久典戎務屢代祀事及凡要緊朝政皆得與議彼復不自撿飭肆意猖狂使為臣子者朝夕觀效皆如勛之為人豈得無可慮乎此勛之不當用也如太常寺者本司掌禮儀以事神祗祖宗導迎和氣光昭國祚者也位列崇階稱為清要非心行純白資深望久者不得與矣近者乃使陳道瀛金贇仁輩庸惡道流充任其秩臣每觀其聲音容貌即極粗鄙及聞其素行則飲酒食肉貪財好色無所不至一遇祭祀則専意于分受品物及香燭柴炭之類而已如此等人如此等心而望其誠敬精白以贊助皇上明禋之敬有是理乎此道瀛輩不當用也臣愚竊妄以為是數人者羣心皆曰不當用也而皇上用之豈亦聖心之偏于喜者耶又如皇上踐祚以來在廷之臣條建議論之間識見偏執言辭紕繆以上觸天威自取罪戾者固非一人一事但據其迹雖若難恕而究其心則皆可原自明示薄罰之餘懲創已久况皆纍朝作養才能文行各有可取其遺我皇上共成光明之治者也而可終忍于廢棄老死已乎雖纍有寬釋起用為言者尚未蒙慨然允行近見大學士李時以愛惜人才為請即荷嘉納中外臣民不勝欣躍此可以觀人心矣但下該部已久未見覆題則臣所謂遲回觀望不能悉力將順縱有陳焉不過虛文塞責之説豈可謂無哉臣愚竊妄以為是得罪者羣心皆曰當矜宥也而皇上亦未能釋然豈亦聖心之偏于怒者耶推而至于施為之間如稽復舊典以偹一代之制真盛舉也但未免工作屢興財力並竭採運木植燒造磚瓦裝載灰石所至騷然民無寧日則閭閻之下形諸愁歎以戾太和者亦豈少乎又如真人邵元節者得以其術過蒙采聽于內府修建醮事此雖皇上祈天永命之心不能自已但禱祀之説自古無驗今乃不惜糜費使之頻舉且命左右大臣奔走共事而元節復率其徒侶持其幡樂敢于大內闡揚法事遂至不肖之臣妄為依託且聞有昏夜乞哀出其門下者亦不能必其無市恩播威夤緣僨事之失也夫以皇上敬一之心臣民祝願之念感格天地萬夀之福百男之祥可以坐致乃使異端小術攘以為功書之史册以垂後世謂之何哉凡此或皆聖心少有所偏者故臣敢為內照自省及戒謹恐懼之説蓋欲皇上逺稽堯舜所以德髙羣聖治冠百王者不外此心之中和也使或一念之微一瞬之際及一事之末少有間斷即未純一即弗中和是故慎獨之功確乎不可忽也乃臣之誠不足以孚感悟言不足以偹採擇至厪明諭臣罪安可逃矣慰人心以隆治道疏楊爵臣惟人主一身萬化本原履至尊之位膺艱大之責用人行政是非得失方在幾微而關于民心之向背天命之去留者即甚可畏也是以聖帝明王深察乎此致治必于未亂保邦必于未危事無微而不謹時無暫而不懼為大于其細而圖難于其易然後天人交與而可以延國祚于永久矣方今天下大勢如人衰病之極內而腹心外而百骸莫不受病即欲拯之無措手之地以臣觀之其危亂之形將成目前之憂甚大也大抵因仍茍且兵戎廢弛奢侈妄費公私困竭奔競成俗賄賂通行遇災變而不憂非祥瑞而稱賀讒諂面諛公肆欺妄士風民俗于此大壞而國之所恃以為國者掃地盡矣撥危亂而反之治安此在陛下所以轉移率勵之者何如耳况當朝覲大比之期百司多士濟濟來趨延頸思化人人切仰極重不可反幾失則難濟伏願陛下汲汲于此時留心焉以為善後之圖也臣以病居林下者八九年誤蒙聖恩賜之起用擢以耳目之官任以糾劾之責受命以來早夜耿耿每思國事日非而臣于國恩有未報至于痛心流涕者有之臣請略舉目前之所見大要足以失人心而致危亂以貽聖心之憂者為陛下告誠不忍默默保位以上負陛下之洪恩下負生平之所學也伏願聖明垂聽焉臣竊惟天下之患莫大于以危為安以災為利實則可憂而以為大可樂法家拂士日益逺而快意肆情之事無敢齟齬于其間積弊而至于蠱則不可得而救矣此實天下之患也往年夏末入秋恆暘不雨畿輔千里已無秋禾既又立冬無雪暖氣如春元旦僅雪即止民失所望洶洶無聊憂旱之切逺近所同此正陛下徹樂減膳率臣下以祈惠寧之時也而在廷之臣如大學士夏言數人者乃以為靈瑞而稱頌之其欺天罔人不亦甚乎其不幾于安危利災而以大可憂者為樂邪孔子告顔淵為邦在逺佞人若是而謂之佞人者非邪大臣之職輔君當道志于仁而先天下以為憂者也無忠亮體國之心而居人臣之極位所謂小人而乘君子之器也欲天下之治安可得耶又如翊國公郭勛者中外皆知其為天下之大惡朝廷之大蠧也勛之舉動蹤迹豈能逃于聖鑒雖陛下盛德優容不忍即罪神謀逺慮自有所處臣愚以為姦不可近惡不可長若止之于微遏之于漸則朝廷優禮人臣之體貌未失而勳戚之餘裔亦得以保全而善終也或使稔惡肆毒潛干政柄則羣狡趨赴善類退處其為天下國家之禍日益深矣治道去其太甚者此其為害治之人之甚所當急去而不可緩也凡此任用匪人足以失人心而致危亂者一也天生斯民立之司牧君人者奉天以安民而使之各得其所也民不得所則其心不能無怨民日怨則天意可知矣古者民勤于食則百作廢今民勤食不可得而至于離散離散無所歸而至于死亡臣近巡視南城兩月中凍餒者八十人此一南城一郭耳共計五城未知有幾目所不及見而在于千萬里之逺者又未知其有幾孰非陛下之赤子也而顛連無告委命溝壑蓋望一豆羮疏食以延須臾之生而不可得也此正陛下愛民惜財與天下休息之時也而土木之功十年于此矣而尚未止工部屬官添設者至數十員又差部官逺修雷壇以一方士之故浚民膏血而不知恤則民何以得其所哉民惟邦本本固邦寧窮民之力盡民之財是自蹶其本根也而國何以為國乎昔漢文帝惜百金之費不營一臺故海內富庶隋氏以盛修宫室而至于亡國願陛下以為鑒戒則宇內生靈之慶也况今北邊擾動內寇竊發警報日聞加以頻年災沴上下一空百計取之愈為不足而興作未巳以結怨于天下此其足以失人心而致危亂者二也唐虞三代之世君臣每以勤敬之道交相警戒其見於經傳者如堯舜兢兢業業無怠無荒禹惜寸隂湯昧爽不違文王不遑暇食武王以敬而勝怠故能夀躋耋期治隆熙泰是數聖人所以崇德益夀善政和民之道不外乎敬與勤而已矣周公召公之相成王也周公則以逸而戒之召公則以敬而勉之蓋敬逸之間身之修否政之理亂所由分此固周召忠君惻􅈤之心也陛下即位之初勵精有為不遑寧處嘗以敬一針頒示天下其于堯舜三王之道蓋已心得之矣數年以來因聖體違和朝儀間缺經筵未講大小臣庶朝參辭謝未得一覩聖容敷奏復逆未得一聆天語若是者今已久矣夫天位者艱難之器逸樂之具也陛下一身天地百神賴以享六軍萬民賴以安一日二日有萬幾之繁近聞聖躬調頥大獲福履中外臣民罔不歡慶况此春氣漸和人思新化庶官入覲雍雍肅肅來自萬里之逺者孰不欲鞠躬垂委北面舞蹈望龍顔以慰快覩之心乎易曰聖人作而萬物覩正今日之事也若未得曕于咫尺天顔之下以伸有孚顒若之敬臣恐人心日益怠惰中外日益渙散非隆古君臣同寅協恭以臻太平之氣象也此其足以失人心而致危亂者三也執左道以惑衆聖王所必誅而不宥者也今異言異服列于庭苑金紫赤紱賞及于方外之士臣不意陛下睿哲先物明見萬里而所為一至于此夫保傅之職坐而論道古人謂官不必偹惟其人故非道隆德盛極天下之選者不足以任此責今舉而畀諸迂怪之徒輕之若芥流品之濫至此極矣且陛下以天縱之聖資為上天之元子若逺宗帝王之道近守祖宗之法細旃廣厦之下與公卿賢士講論治道則心正身修與天地合其德與日月合其明和氣致祥罔有天災則山川鬼神莫不寧矣安用假此妖誕邪妄之術列諸法禁之地而藉之以為聖躬之福耶甚非聖天子所以崇正逺邪平平蕩蕩奉三無私以化天下之道也臣聞風聲所及人起異議豪傑之士聞而解體貽四方之笑取百世之譏于聖德國政所損不細此其足以失人心而致危亂者四也古人有言君聖則臣直陛下臨御之初延訪忠謀虛懷納諌其于狂直敢言之士往往矜宥故一時臣工恃陛下之能容敢以直言冒千天聽言過激切而獲罪者亦多有之自此以來臣下懷危慮禍未聞敢有犯顔直諫而為匡救逆心之論者昔人論求言之益以為勉強以聽不若悅而從之悅而從之不若導之使言蓋人臣持祿保位者多而忘身以殉國者少雖識見有明暗言論有得失在陛下明目逹聰鑒别取舍于黜陟賞罰付之公論則可矣若震之以天威加之以危禍如往年太僕寺卿楊最者言出而身即死近日翰林院左贊善兼修撰羅洪先等皆以言罷斥此于國體治道所損甚多伏願聖明少致思焉成湯大聖人也仲虺稱其改過不吝從諫弗咈髙宗有商之令主也傅説告以木從繩則正后從諫則聖此二君作聖之功為萬世人主之龜鑑也臣非區區為一楊最等惜也但厯觀古今以來有天下國家者未有不以任諫而興以拒諫而亡者也今而後雖有素懷忠義之心者非灰心仕進甘退林園亦必深自晦藏為保身計矣孰敢發言以論天下之事哉臣恐忠藎杜口則讒諛交進上德不能下逹下情不能上通安危休戚無由以見而堂陛之近即逺于萬里矣此其足以失人心而致危亂者五也此數者關于天下之治亂國勢之安危貽聖心之憂誠未已也伏望皇上念祖宗創業之艱難思今日守成為不易察臣忠悃覽臣所陳賜之施行戒飭夏言務篤忠貞之道以報國家崇顧禮遇之恩于郭勛則豫有以裁抑而保全之止土木之功開諫諍之路屏邪妄之行陛下仍以慎獨養天德以天德逹王道以慰人心以祈天祐則莊敬日強而眉夀永于千億虛靈照物而忠邪莫可逃遁其為宗廟社稷萬萬年無疆之福聖子神孫萬萬年無疆之規者端在此矣明文海卷五十二
