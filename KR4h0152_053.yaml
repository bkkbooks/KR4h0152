body:
  text: 明文海巻五十三餘姚黄宗羲編奏疏七除邪妄以彰聖化疏夏言比者恭遇皇上諮及羣臣欲除去禁中釋殿奉建兩宮以備一代之制一時廷議翕然仰賛皇上篤養盡制之孝闢邪崇正之化盛徳大業光前振後矣今月十一日伏奉聖㫖命大學士臣李時同臣言入㸔即所謂大善殿者臣等㸔得殿内有金銀鑄像鉅細不下千百且多祅神淫䙝之狀仰惟聖明燭其誕妄不經一旦奮然舉而除之甚盛舉也但臣見諸几案之上及懸庋梁栱之間與夫金函之所藏貯者為物尚多不可識辨問之守者且云是為佛骨是為佛牙枯朽摧裂竒離磈礧計不下千斤臣惟佛法之入中國自漢明帝時始然不過人誦其書習其教而已至唐憲宗朝乃迎佛骨至京師其臣韓愈上表極言其邪穢不祥不宜以入宮禁憲宗不能聽且深罪愈竟逺斥之臣意自是厥後人莫敢矯其非凡畨人持以誑惑中國之人而名為佛顱佛骨者相屬於道由是流入天子宮禁之内歴世皆然而不以為異今殿中所有未必非勝國所遺累朝以來亦必以為彼法則然未嘗深究以延至今兹者恭惟皇上躬堯舜禹湯文武之資行堯舜禹湯文武之道乃始議徹佛屋毁除穢像使詭異之形不得凟留清禁此真卓越千古之見出於尋常萬萬者也然殿宇像設既除所有前項佛頭佛牙之類皆屬汚穢不宜使之尚存臣請乞以此物勅下所司瘞之草野一切掃而净之以永杜愚㝠疑惑之端實為大聖人非常作為有補名教甚大功徳㒺極臣不勝幸甚後世幸甚縁係除邪妄以彰聖化事理未敢擅便謹題請㫖申議天地分祭疏夏言臣於前月初十日伏承聖制問及南北郊大祀并朝日夕月之禮臣即時欲述所聞以對乃以臣前上疏已畧開陳奉有諭㫖今方廣詢廷臣以求公是臣固可以無言日夕覬望公卿大夫必有稽古識治之學必能悉心殫慮敷陳先王之典以仰稱休命者不意旬日以來側聞議論紛糅人懐異見殊為可訝及昨覩詹事霍韜之奉則又大可駭懼臣心亦不能無疑矣夙夜再三思惟求其說之不得于是考先王之遺訓稽國朝之典章殊未見其不可然後知韜之言過矣臣兹不容于不言也請先以郊祀之禮為對而後辯韜之失言臣聞之中庸曰武王周公其逹孝矣乎又曰郊社之禮所以祀上帝也盖天之作君實為神主君之受命惟典神天武王伐商以其不祀上帝周公稱繼志述事惟以致孝鬼神陛下聖諭議及于此盖敬天之誠禮神之至寔為天地神人之慶也竊聞周禮一書言祭祀甚詳大宗伯掌禮者也而首及天神人鬼地祗之三禮此即有虞秩宗典朕三禮之意是故以祀天神則有禋祀寔柴槱燎之禮以祀地祗則有血祭貍沉疈辜之禮以享人鬼則有獻祼饋食祠禴蒸嘗之禮大司樂冬日至地上圜丘之制則曰禮天神夏日至澤中方丘之制則曰禮地祗圜丘禮天方丘禮地則天地分祀從來久矣宋儒引昊天有成命為郊祀天地之詩則曰郊祀無天地之分劉安世以豐年潜有多魚二詩証之以為郊祀天地皆歌此詩何嘗言其合祭朱熹則斷以此詩多道成王之徳疑祀成王之詩以今觀之盖終篇無一語渉天地此朱熹之言的然可據而小序不足凖也况周禮掌次王大旅上帝則設氊案設皇邸司裘為大裘以共王祀天之服皆言天而不及地宗伯六器則以蒼璧禮天黄琮禮地是天地之禮玉有别也典瑞則以四圭祀天兩圭祀地是天地之祀玉不同也祀天於冬至以陽氣來復於上天之始祭地於夏至以隂氣潜萌于下地之始時不同也用圜鍾于震之宮取其乾出乎震之義用函鍾于未之地取其坤居于未之義是樂不同也小宗伯言五帝且兆于四郊而不言與昊天上帝同郊祀况可與后土地祗合祭乎則天地不合祀從來亦久矣是故宋儒葉時之言曰郊丘分合之說當以周禮為定今之議者以社為祭地而不知天子之社有三曰大社曰王社曰亳社大社為百姓而立王社為籍田而亳社則遷國之社也而祭地不與焉朱子釋中庸曰社祭地不言后土者省文耳盖祭地之名亦曰社也祭祀之社總大地言之與天對者也大社乃自王畿千里之地言故諸侯國社以至庶民鄉社皆社其所主之土也故社字從示從土義有在矣且議者既以大社為祭地矣則南郊自不當祭皇地祗何又以分祭為不可乎議者又疑古無北郊然郊特牲曰兆於南郊就陽位也則南郊固見於經矣祭天而兆於南郊以就陽位則祭地而兆於北郊以就隂位曷見其不可也程子曰北郊不可廢况陳氏禮書直曰祭地于北郊方丘者北郊之丘也丘方而下所以象地則古人固嘗行之矣議者又謂莫大于天地實天中之一物耳不必别祭則以天為尊以地為卑不得與天抗似也然天地合祀則同尊並大是崇地以抗天與天為敵矣乃不以為非何也程子曰郊天地與共祭父母不同此是報本之祭須各以類祭豈得同時又曰冬至祭天夏至祭地此何待卜朱子曰古時天地定是不合祭日月山川百神亦無合共一時祭享之禮又曰天下有二件極大底事其一是天地不當合祭於南郊夫程朱三代而下大名儒也然則其言皆不足據乎秦去古未逺則祀天不于圜丘而於山下祭地不于方丘而于澤中漢之制祀天于甘泉祀地于汾隂則秦漢天地之祭猶分也至元始之制則天地同牢于南郊此則莽賊隂媚元后之計欲以妣並祖故不得不以地並天也合祭之說實自王莽始矣自漢而唐而宋皆合祭而地之特祭少矣漢之前皆主分祭而漢之後亦間有之如魏文帝之泰和周武帝之建康隋髙祖之開皇唐睿宗之先天皆分祭也開元制禮則専主合祭矣元豐一議元祐再議紹聖三議皆主合祭而卒不可移者以宋人有郊賚之費故三年一郊至傾府藏之財而不足以從事所以必于合者從省約安簡便也亦未嘗以分祭為非禮也蘇軾言祖宗幾年合祭一旦分之恐致禍朱子謂其說甚無道理然兩郊之說在宋似為難行與今日之事異矣本朝丘濬之言以類于上帝類字強訓為合此盖臆說又以元始禮天地同牢不為黷不可以莽廢又謂夏至祭地則地先天食其辭多歸美本朝之制盖從周之意而不知其言之悖于義也今之議者大率主濬之言而往往以太祖之制為嫌為懼然知合祭乃太祖之制為不可改而不知分祭固太祖之初制為可復也知大祀文乃太祖之明訓為不可背而不知存心錄固太祖之著典為可尊也且皆太祖之制也從其禮之是者而已矣矧敬天法祖無二道陛下固已灼見禮之實矣當時學士解縉固嘗請復掃地之儀矣使太祖尚在知禮之臣亦當請而改之况陛下以聖子神孫有聖人之徳而在天子之位顧不得操制作之權以隆繼述之孝乎且陛下今日之舉欲復古禮以大報天也遵祖初制以求盡善也欲逺跡三代之隆而正千古之謬建一代中興之業而陋漢唐宋于下風也所謂功光祖宗業垂後裔之事未有大于此者是故文武之制未備周公作禮樂以成之未聞周公變文武之舊也况禮樂必積徳百年而後興今以其時考之則可矣我太祖天造草昧䂓模宏逺訏猷懿範可守可則者多矣乃若禮樂之興恐亦有不能不待於後世者至於振起而拓充之雖我聖祖之心豈無所望於後世之聖子神孫者乎豈有泥於祖宗已然之跡遂一成而不可變也中庸曰非天子不議禮不制度不考文孔子曰禮樂征伐自天子出然則所謂天子者豈盡專指創業之君言邪信如諸臣之議則守成之主皆無所事事矣雖有周公孔子之聖亦不敢言禮樂矣所謂善繼人之志善述人之事者皆無所用其力矣無乃失之逺乎韜之奏曰紊亂朝政曰變亂成法必有任其責者既而曰諫官創議盖指臣也韜之此言私心害之也欲中人以禍而不知祖宗之大法故韜往往自蹈之而不知其施諸人無足怪也臣請得以講明之非以曉韜且以曉在廷諸臣也夫律有奸黨之條内開若在朝官員交結朋黨紊亂朝政者皆斬此指國家一應法度政令干係紀綱名分而奸臣交結朋黨紛更壊亂交通扶同為奸作弊以欺君㒺上虐民害政者言也今日所議者郊祀之禮耳乃古先哲王令典我太祖髙皇帝之所已行載在典章律亦有毁大祀丘壇之文解律者曰丘壇祭天圜丘祭地方丘壇其所登祭之處此法家之所知也言官議禮本非變法以此為紊亂朝政恐非律意矣變亂成法之文屬在講讀律令條下曰凡國家律令叅酌事情輕重定立罪名頒行天下永為遵守百司官吏務要熟讀講明律意判决事情末一欵若官吏人等挾詐欺公妄生異議擅為更改變亂成法者斬此所謂成法者即太祖所定之大明律令也未聞以禮樂制度為成法也韜嘗奏言有祿人受枉法贓八十貫律絞欲將在外知縣以上等官但犯贓八十兩即挐解來京絞諸都市不許准徒是改雜犯為真犯也此則非成法矣臣嘗伏讀太祖御製大明律序今後法司只依律與大誥議罪合黥刺者除逆黨家屬併律該載外其餘有犯俱不黥刺雜犯死罪并徒流遷徙笞杖等刑悉照今定贖罪條例科斷臣又嘗伏讀皇明祖訓如曰守成之君所用常法止守律與大誥不許用黥刺剕劓閹割之刑臣下敢有奏用此刑者文武羣臣即將劾奏如曰以後不許立丞相臣下敢有奏請者亦要即時劾奏皆處以重典若此類者乃我太祖成法非臣所敢變亂者也豈惟臣下雖我皇上亦豈得遽變之惜乎韜之未逹乎此也臣備員諫諍使萬一有干祖宗典憲亦豈敢輒犯哉臣雖至愚或不至此也至於毁周禮一書尤為妄議臣不暇一一指摘當於其大者辯之韜曰宋儒胡宏有言周禮非周公之書王莽劉歆為之也韜名為讀書知禮者且備位儒臣矣何其不考之甚也胡宏之言非宏言也承舛踵訛之說也夫周禮之出自劉徳始累周禮者亦自劉徳始周禮之立自劉歆始誣周禮者亦自劉歆始周禮之傳自鄭康成始壊周禮者亦自鄭康成始昔秦人焚書滅學周禮藏之山巖屋壁僅而獲存武帝時有季氏得之以上河間獻王徳乃以考工記補五官之缺漢臣詆之以為末世瀆亂之書實劉徳一記累之也至成帝時劉向子歆校理秘書乃獨知其為周公致太平之迹不幸身為國師取之以輔王莽乃為泉府理財之說於是六幹立法則皆置市官當時漢儒訾之以為六國隂謀之書是劉歆一法誣之也先儒嘗謂累周禮者其罪小誣周禮者其罪大誣周禮者其法在壊周禮者其法亡然禮經之學所賴相傳至今不墜者實諸儒講明之功也今韜不以諸儒講明者之為陛下獻乃獨取胡宏慿私臆决之一言以厚誣周禮不惟取辯一時以誤陛下而又誤天下後世使信周禮為王莽偽撰不得表章而遵行之其闗係名教非細故矣臣竊為韜懼也臣何敢隱而不盡言與之辯乎夫諸儒講明之功莫大于朱子程子朱子曰周禮乃周家盛時聖賢制作之書又曰周禮一書周公所以立下許多條貫皆是從廣大心中流出又曰周官徧布精宻乃周公運用天理熟爛之書又曰說制度之書惟周禮儀禮禮記便不可深信又曰周禮非聖人做不得程子曰周禮一書周公致治大法在其中又曰必有闗雎麟趾之意而後可以行周官之法度他如文中子居家不暫捨周禮至謂如有用我執此以往又曰周禮其敵於天命乎又曰吾視千載以上聖人在上者未有若周公焉其道則一而經制大備後之為政有所持循東萊呂氏曰周典所載綱以六官之職統端于内治逹于外樞動于上政行于下此聖人之所以好要而百事祥也范氏曰人君如欲稽古以正名茍舍周官未見其可楊氏曰周官之書先王經世之務是不可不講然則韜之學果純於程朱數子乎至力詆天官冢宰篇為莽誑天下之術則又大可異矣夫天官冢宰一篇朱子以為周公輔導成王垂法後世用意最深切處欲知人主正心誠意之學于此攷之可見其實又謂冡宰一官兼領王之膳服嬪御此最是設官者之深意盖天下之事無重于此後世雖不能行豈可盡廢聖人之良法美意而誣以莽之偽為邪且莽之前固嘗有周禮矣今則以為周制之土苴而莽集其大成韜又曰合祭以后配地自莽創始夫莽既偽為是書矣何不削去圜丘方丘之制天神地祗之祭而自為一說邪其說不得而通也是故疑周禮者漢武帝何休謝氏黄氏之徒也彼程子朱子東萊横渠則固無疑矣用周禮誤天下者王莽劉歆蘇綽王安石也彼周公召公畢榮毛散諸公則未嘗誤也韜謂皇上好古之篤如此志復三代如此千萬世一人而已矣未見儒臣以三代純王之學上輔聖主此言誠是也然既以皇上好古志復三代則分祭天地固古禮也三代之典也何以言其非禮而必欲使襲王莽黷亂之舊耶夫致主之學周公之道純矣今乃欲盡廢周禮使不行于世則祖宗之設官分職大小政體其倣於周禮者多矣然則必一舉而變亂之邪抑不知此外又别有何道乃為純王之學可以輔聖主邪是故韜之言臣不敢以為是也獨怪夫韜之言出而和者遂紛紛也况近年禮部行移令立小學習讀周禮又令科塲必以周禮䇿士是皆奉陛下明㫖施行者也乃不聞韜奏止之及韜修大明㑹典嘗具奏欲將内府各監局職掌屬之禮部亦復援引周禮天官冡宰之文是韜平日未嘗非周禮也何得因議郊祀而一旦遂欲盡棄其學邪殆不可曉也臣竊憤懣以今日之事乃陛下光明俊偉超軼今古之盛舉而不得羣臣同寅協恭之助實韜有以啓之也但在廷羣臣之奏或謂事體重大憚于更改或謂合祀從來久逺宜仍舊貫或以費助動衆恐傷國力此固私憂過計之言自是一說亦何不可之有獨怪夫牽合附㑹背畔决裂以聖人之言為不必盡信則不免于欺矣且建白者言官之職議可者執政大臣之事主張議禮之權又惟天子得以獨專非臣下所敢與也况臣前疏固已言之矣臣又竊惟今日之事職掌者禮官則考訂折衷以求定論者當在禮官也謀國者大臣則議擬奉行以身任其責者當在大臣也至於羣臣則既各以所見上陳矣但前月仰奉明問旬日之間既以疏上竊恐考究未必盡精意見不能無異中間固有詭辭詖說黨邪惑衆者殆不足深校盖議禮之家名為聚訟常情所向自古已然惟是天地大祭國家重務况于千八百年之下興起三代而上之盛典所當尤加慎重必使損益合宜足以垂範宇宙不致少有遺憾以貽後議則天下之大幸也伏望皇上恢𢎞天度開張宸聰矜愚盡下曲示優容大小臣工必能克去已私仰體聖心深求古義以奉明詔所據圜丘方丘朝日夕月諸神壇壝䂓制自有我太祖刋定之典備載存心錄一書不須創設無所變更一凖乎舊而已矣但大祀殿以之祀天則不應經義以之饗帝則脗合周禮然祖宗並配父子同列稽之經㫖未能無疑夫周人郊祀后稷以配天臣以為我太祖聖神文武欽明啓運俊徳成功統天大孝髙皇帝足以當之宗祀文王于明堂以配上帝臣以為我太宗體天𢎞道髙明廣運聖武神功純仁至孝文皇帝足以當之臣區區之愚有見於此不敢不以為獻如䝉再下臣章勅禮部一併㑹議所貴廷臣協心同徳深考博求務合經訓破除臆說不狃于茍且之情不遷于衆多之口忠誠精白以仰承皇上中興大有為之志以光復我太祖之始制使天下後世之郊祀天地獲全古禮一洗千古之陋自陛下始顧不休哉伏惟聖明觀其㑹通取厥中正斷而行之以幸萬世臣不勝戰懼昧死願忠之至申議郊祀二祖並配疏夏言臣於三月十一日節該欽覩聖制南郊祀天北郊祀地以二至日行事臣無任慶幸以為天地合祀南郊自東漢以來歴代循襲朱子所謂千五六百年無人整理而陛下今日獨破千古之謬一旦舉行誠可謂建諸天地而不悖者也又伏覩聖制南北二郊俱以我皇祖髙皇帝奉配仍於嵗首祀上帝於大祀殿以我皇祖文皇帝奉配臣無任慶幸以為虞夏殷周四伐之郊惟配一祖後儒穿鑿分郊丘為二祭及誤解大易配考孝經嚴父之義以至唐宋變古乃有二祖並侑三帝並配之事宗周典禮隳棄蕩然而陛下今日獨觀萬化之原一旦更定誠可謂質諸鬼神而無疑者也夫天地合祀之非與祖宗並配之失一也漢唐而下天地之祭或分而復合合而復分祖宗之配或正而復失失而復正中間大儒名賢之論未嘗不確有定見而時君世主膠于淺陋疑於信從使郊祀大禮卒不得以大明于世此聖人之所以難逢而大道之所以日隱也恭惟我皇上以天縱之聖挺生千載之後而一旦為此度越百王之舉誠可謂考諸三王而不謬百世以俟聖人而不惑者也柰何今日禮官廷臣乃猶或依違疑沮于其間臣誠不知其可也昨於十日禮部㑹官於東闕集議尚書李時首言天地分祀南北郊聖諭已定無容議矣惟太祖太宗功徳並隆並配天地已久今宜仍舊大祀殿及圜丘方丘俱當以二聖並配於時臣應之曰聖諭以太祖配天太宗配上帝正是各全其尊天與上帝一也因是功徳並隆故皆得配天非有差等大祀殿並配則兩失其尊矣臣不敢擅議宜從聖制萬一遷就猶為非禮若圜丘方丘俱配二祖則是今日之失况是我皇上肇建大禮豈可重貽後人之議臣不敢從于是尚書方獻夫賛之曰言之言亦是兩郊之配今日新禮也當求至當李承勛亦賛之曰是冝以兩請議上以俟宸斷羣臣次第畫題而退自是不知禮官議奏云何然疏上今九日矣不奉明㫖連日外間傳聞少傅璁大學士鑾聫翩上奏必欲二祖並配臣不勝疑駭初意聖制已明示在廷得禮之正無容喙矣及久候明㫖不下竊恐聖心亦不免於疑疑則不免於改制矣萬一有是則違經叛禮貽譏萬世非細故也臣敢昧死為陛下陳之臣謹按孝經郊祀后稷以配天宗祀文王于明堂以配上帝春秋傳曰自外至者無主不止則天地之祭必有所配者皆侑神作主之意也且對越天地神無二主禮專一配所以奉天帝之尊明不敢凟耳稽諸神理其不可並配一也且三代兩漢之盛莫之敢易西漢以髙祖配天東漢以光武配上帝義亦正矣唐初始有兼配之事垂拱中禮官希㫖郊丘諸祠遂有三祖同配之禮開元十年明皇親饗圜丘禮官建議遂罷三祖同配宋至道三年詔書親郊圜丘以太祖太宗並配至景祐二年詔禮官詳按典禮辯崇配之序仍以太祖定配嘉祐六年諫官楊畋論水災由郊廟未順禮院亦言三祖同配非禮翰林學士王珪等曰推尊以享帝義之至也然尊之不可以凟故郊無二主今三后並侑欲以致孝也而適所以凟乎享帝非所以寧神也請如禮官議七年詔南郊以太祖定配司馬光曰古之帝王自非建邦啓土及造有區夏者皆無配天之文故雖周之成康漢之文景明章其徳業非不美也然而子孫不敢推以配天者避祖宗也光之言可為萬世訓矣此漢唐宋之故事如此考諸往牒其不可並配二也禮曰父坐子立孔子曰事死如事生又曰祭之以禮今太祖父也太宗子也然則太祖在御之日我太宗敢與並坐否乎以分則父以功徳則肇基受命之祖我太宗建北都以垂子孫萬世久安長治之業功則盛矣然克平僣亂混一區宇建開天之功以復我中國帝王所自立之天下而全付于聖子神孫者則太祖之功徳又振古帝王之所無也今以父子之間連袵並席尊卑不協於序幽明不通於理豈所以安我皇上之心乎揆之倫理其不可並配三也且聖諭曰朕原因缺祀天報本之典故所為問當遵復皇祀之始制露祭于壇方合古先聖王之意以盡事天之本又曰人君祭天乃報本之祀大哉王言真洞逹禮樂之本矣程子曰萬物本乎祖故冬至祭天而以祖配之以冬至氣之始矣是故人本一祖也萬物本一氣也寧有二本乎哉若以二祖並配則失一本之義矣先儒陳氏曰古者祭天於圜丘掃地而行事器用陶匏牲用犢其禮極簡聖人之意以為未足以盡其意之委曲故有大享之禮焉此周家明堂之祭所由起也天即帝也郊而曰天所以尊之也故以后稷配焉后稷逺矣配祭于郊亦以尊稷也明堂而曰帝所以親之也以文王配焉文王親也配文王于明堂亦以親文王也尊尊而親親周道􅊀矣故郊者古禮明堂者周制也周公以義起之也欲尊文王而不敢以配天者避稷也此周事然也今陛下覽觀古昔更定大禮正允合于宗周之典是故奉我太祖配天於圜丘則周之后稷配祭於郊者也所以尊太祖也奉我太宗配上帝于大祀殿則周之文王配祭于明堂者也所以尊太宗也二配至重萬世不遷之法也豈有抑揚輕重于其間哉故並配則各失其尊分配則各全其尊矣臣不知議者又何所疑也以臣觀之所謂聖人復起不可易者也仰惟陛下天資英邁聖學淵㣲志崇業廣才大有為臨御十年于兹敬天法祖敏學懋政二帝三王之美萃于一身臣下仰承休徳之不暇盖所謂無間然矣廼者降詔大議郊祀始而外廷之臣因一二臣之言以分祀為不可則譁然而爭之今則咸以為是矣二祖分配之禮陛下既勅下禮官外廷之臣聞者歎服無不以為是也乃内閣輔臣則又疑以為非而爭之卒使掀掲宇宙炳如日星之事而陛下不得以宣昭誕布雷震而風行之此臣之所以獨抱惶惑而莫知所措也今中外臣工方幸快覩盛事閭閻父老願少須臾無死以觀大禮之成而數日之間未聞睿斷殊切憂疑恐陛下萬一惑于異說斯禮稍有乖戾則不免上損逹孝頗傷至明失天下萬世之望臣今黙而不言則負罪大矣臣聞大哉聖人之孝在乎善繼人之志善述人之事者也陛下以大孝之心上承太祖太宗之徳臣敢不以大忠之言仰賛陛下之决乎孟子有言曰我非堯舜之道不敢以陳于王前故齊人莫如我敬王也非臣愚戅㒺識忌諱不敢為陛下建此議非陛下仁孝格天英明邁古亦不足以行此事臣區區之愚不勝激切倘䝉采擇伏乞斷自聖衷明諭閣臣所宜將順仍依已降勅㫖施行建百王不易之盛典垂萬世無疆之令名則堯舜禹湯文武周公孔子在天之靈我太祖太宗列聖在天之靈我恭睿淵仁寛穆純聖獻皇帝在天之靈無不慰悅下至濂洛闗閩諸大儒及我國初定禮諸臣歿而有知亦將含笑于九原之下臣雖死之日猶生之年也惟聖明留意焉天下幸甚萬世幸甚與夏公謹書附霍韜承恵教拳拳韜謹以所疑請教于執事幸執事終恵教之執事曰紊亂朝政俱自律例一事而言非郊祀大禮之謂也韜則曰皇祖定天下之大本垂萬世之大法莫大于郊禮如郊禮可輕易變亂律例無不可變亂者矣政令紀綱無不可變亂者矣變亂律例誤一事而已矣罪猶擬斬變亂郊禮不知何以處之也此某所益疑也執事又曰分祀合祀皆皇祖之制也今行分祀復皇祖初制而已矣非變制也某則曰凡國家制度率以後定為善皇祖於前十年行分祀後二十年行合祀太宗遷都率從合祀是合祀者祖宗定制也今假曰復太祖初制以幸脫罪獨不犯太宗定制乎太祖又曰自今永為定禮指合祀而言也如曰復太祖初制不亦上誣皇祖乎皇祖在天之靈又可厚誣乎戊申以前國號吳矣更號大明則後之定制也分祀之禮亦吳元年初制也今從分祀曰復初制則國號亦復初制而曰吳也可乎此又韜所益疑也執事曰兆於南郊則禮有據矣至曰祭於北郊則禮所無也如知其為禮所無也勿附㑹可也乃強以秦漢凟亂不經之說附益之是聖主有復三代之志執事誤之行秦漢之禮也不知而附㑹焉錯誤之罪也猶可言也知而遂非文過焉欺㒺之罪也不可言也韜素亮執事非欺㒺者也又所益疑也執事曰天官冡宰兼宮嬪内侍之職古人良有深意此則韜所不知也試自周秦漢唐宋觀之宮嬪與外臣交通有不搆亂者乎内臣與縉紳交通有不搆亂者乎天子宮寢以卿大夫領之有不搆亂者乎宋儒之見徒曰天子以一人縱于萬民之上防之不可不嚴也然而防禁天子而束縛其手足鈐制其􅉏御剪落其肘腋天子固塊然不敢恣肆矣不知冡宰恣肆將誰制之乎宋儒之論徒知制天子不知制冡宰也徒知天子易縱于民上不知冡宰易縱恣于天子之上也徒知天子之當防不知冡宰之不可不防也徒知防天子之惡徳不知防冡宰之惡之不可馭也徒知律天子以后代之庸君不知防冡宰為後世之權臣也故曰宋儒之論皆䆿語也執事之明乃不察焉韜又所益疑也執事曰韜厚誣周禮闗係非細韜則曰執事誤用周禮闗係非細韜今不暇備舉惟述一二執事試虚心察焉如曰禋祀祀昊天上帝禋祀何物也如曰實柴祀日月星辰實柴何物也如曰槱燎祀司中司命槱燎何物也禋柴槱何以異也如曰血祭祭社稷五祀血祭何物也如曰貍沈祭山林川澤貍沈何物也如曰疈辜祭四方百物疈辜何物也疈辜血祭何以異也是皆瞽巫語也試深思焉曰享先王則衮冕享先公則鷩冕然則父祖為庶人者祭之皆以庶人之服與試深思焉又曰靁鼓靁鼗革之謂也孤竹之管竹之謂也雲和之琴瑟絲之謂也八音用其三缺其五十二律用其四缺其八五聲用其四缺其一謂作樂之道固如此乎試深思焉韜謂執事讀書究理必不如腐儒之淺淺也韜前疏畧舉周禮紕繆大節執事乃不深思而誦宋儒䆿語以誤主上豈執事不明一至此乎抑亦偏之為蔽也又韜所甚疑也執事曰祖宗並配不應經義然則北郊何以為配然後應經義耶北郊之文抑何據耶太宗配明堂果應經義否抑亦自為之說耶執事之始疏也則曰引君法成周也今乃援秦漢為據援葉氏陳氏為據不知葉氏陳氏果有得於周禮否耶抑又自為之說耶盖執事徒誦宋儒䆿語然不知宋儒之䆿實王莽教之也今夫王莽之學一傳而得宇文泰再傳而得王安石然而安石惟能行泉府一法而已矣盖泉府之政即桑𢎞羊均輸之政也安石行焉遂致元豐熈寧棼棼如也猶不如宇文泰焉宇文泰為大冡宰盡行周官之法其嗣遂為周天王然猶不如王莽法行周官身為宰衡遂上兼舜禹而宅帝位故曰敢用周禮王莽其上也宇文泰其次也王安石其下也執事將誰師乎如其無所取師徒慕周禮而習宋儒之䆿恐執事之明不至是也又韜所以益疑也執事向建親蚕之議天下之善政也惟于苑内行焉則至善之術也今必于北郊則皇后出郊自執事啓之矣我祖宗閨門之法超越千古執事一舉而壊之矣士夫妻女鮮出郊者豈執事妻女皆出郊郭不以為異耶男女内外之閑自執事决潰之矣顧募女轎夫則内郡騷矣一婦應募一夫隨之耕織廢矣供一日之勞預一月之役貧民告匱矣惟席殿行禮而已矣費且數萬若遂興工費耗不知其紀矣蚕婦未勸閭閻已蕭索矣况宮嬪出郊以官軍圍宿不知官軍皆婦人攝事耶抑亦丈夫為之也如曰官軍皆丈夫也則何以嚴外内之防邪故曰執事此舉壊盡祖宗閨門之法矣此皆執事所不深思也前日人有尤執事者曰啓釁之罪必有歸矣韜曰執事急於引君當道未思及此徐當自有處也不意又啓南北郊之說將自是而東西郊建矣將自是而更九廟矣天下之憊自是極矣祖宗紀綱法度極大者郊祀宗廟之禮也因執事而盡更革之矣聞商周哲王亦各守其祖宗家法已矣未聞舍其祖宗之法他有所慕而更革之也凡變禮易樂必改玉改歩而後可不知執事亦靜思之否也明文海卷五十三
