body:
  text: 明文海卷五十四餘姚黃宗羲編奏疏八乞誅姦險巧佞賊臣疏楊繼盛方今在外之賊惟邊庭為急在內之賊惟嚴嵩為最邊庭者疆圉之患瘡疥之疾也賊嵩者門庭之寇心腹之害也賊有內外攻宜有先後未有內賊不去而可以除外賊者故臣請誅賊嵩當在勦絶之先敢以嵩之專政叛君之十大罪為皇上陳之我太祖髙皇帝親見宰相專權之禍遂詔天下罷中書丞相而立五府九卿分理庶政殿閣之臣惟備顧問視制草不得平章國事故載諸祖訓有曰以從子孫作皇帝時臣下有建言設立丞相者本人凌遲全家處死此其為聖子神孫計至深逺也及嵩為輔臣儼然丞相自居挾皇上之權侵百司之事凡府部每事之題覆其初先呈稿而後敢行及今面稟而後敢起稿嵩之直房百官奔走如市府部堂司嵩差人絡繹不絶事無大小惟嵩主張一或少違顯禍立見及至失事又謝罪于人雖有前丞相之專恣未有如斯之甚者是嵩雖無丞相之名而有丞相之權有丞相之權而無丞相之干係以故各官之升遷未及謝恩先謝嵩矣蓋惟知事權出于嵩惟知畏懼奉承于嵩而已此壞祖宗之成法一大罪也權者人君所以統馭天下之具不可一日下移臣下亦不可毫髮僣踰皇上令嵩票本蓋任人圖政之誠心也豈意嵩一有票本之任遂竊威福之權且如皇上用一人嵩即差人先報曰我票本薦之也及皇上黜一人嵩又揚言于衆曰此人不親附于我故票本罷之皇上宥一人嵩即差人先報曰我票本救之也及皇上罰一人嵩又揚言于衆曰此人得罪于我故票本報之凡少有得罪于嵩者雖小心躲避嵩亦尋别本帶出旨意報復陷害是嵩竊皇上之恩以市已之惠假皇上之罰以彰已之威所以羣臣感嵩之惠甚于感皇上之恩畏嵩之威甚于畏皇上之罰也用舍賞罰之權既歸于嵩大小臣工又盡附于嵩嵩之心膽將不日大且肆乎臣不意皇上之明斷乃假權于賊手如此也此竊皇上之大權二大罪也善則稱君過則歸已人臣事君之忠也書曰爾有嘉謨嘉猷則入告爾后于內爾乃慎之于外曰斯謨斯猷惟我后之德蓋人臣以已之善而歸之于君使天下皆稱頌君之德不敢彰已之能以與君爭功也嵩于皇上行政之善每事必令子世蕃傳于人曰皇上初無此意此事是我議而成之蓋惟恐天下之人不知事權之出于已也及今則將聖諭及嵩所進揭帖刻板刋行為書十册名曰嘉靖疏議使天下後世皆知皇上以前所行之善盡出彼之撥置主張皇上若一無所能者人臣善則稱君之忠果若此乎此掩皇上之治功三大罪也皇上令嵩票本蓋君逸臣勞之意嵩乃令子世蕃代票恣父逸子勞之為世蕃却又約諸乾兒子趙文華等羣會票擬結成姦黨亂政滋弊一票屢更數手機密豈不漏泄所以旨意未下滿朝紛然已先知之及聖旨既下則與前所講若合符契臣初見嵩時適原任職方司郎中江冕稟事于嵩曰昨御史蔡朴參守備許實等失事本部覆本已具揭帖與東樓聞東樓已票送入未知何如東樓者世蕃之别號也嵩云小兒已票罰俸內分兩等甚有分曉皇上定是依擬臣初甚疑及後旨下果如嵩言即臣所親見一事則其餘可知矣又前經歷沈錬劾嵩皇上將本下大學士李本票擬本又熟愞庸鄙奔走嵩門下為嵩心腹感嵩之恩畏嵩之威倉皇落魄莫知所措差人問世蕃如何票世蕃乃同趙文華擬票停當趙文華袖入遞與李本李本抄票封進此人所共知也即劾嵩之本世蕃猶得票擬則其餘又可知矣是嵩既以臣而竊君之權又以子而並已之權百官孰敢不服天下孰敢不畏故今京師有大丞相小丞相之謡又曰此時父子二閣老他日一家盡獄囚蓋深恨嵩父子並專權柄故耳此縱姦子之僣竊四大罪也邉事之廢壞皆原於功罪賞罰之不明嵩為輔臣以明功罪以勵人心可也乃為壟斷之計先自貪冒軍功將欲令孫冒功于兩廣故先布置伊表侄歐陽必進為兩廣總督親家平江伯陳圭為兩廣總兵鄉親御史黃如桂為廣東巡按朋姦比黨朦朧湊合先將長孫嚴效忠冒兩廣奏捷功升所鎮撫又冒瓊州一人自斬七首級功造册繳部效忠告病乃令次孫嚴鵠襲替鵠又告併前效忠七首級功加升錦衣衛千户今任職管事有武選司昃字十九號堂稿可查夫效忠嚴鵠皆世蕃子也隨任豢養未聞一日離家至軍門乳臭孩童亦豈能一人自斬七首級而假報軍功冒濫錦衣衛官爵以故歐陽必進得升工部尚書陳圭告病回京得掌後府印信黃如桂得驟升太僕寺少卿是嵩既竊皇上爵賞之權以官其子孫又以子孫之故升遷其私黨此俑既作倣效成風蔣應奎等令子冒功打死發遣皆嵩有以倡之也夫均一冒功也在蔣應奎等貪冒科道則劾之在嵩貪冒人所共知科道乃不敢劾則嵩積威足以箝天下之口可知矣此冒朝廷之軍功五大罪也逆賊仇鸞總兵甘肅為事革任嘉靖二十九年張逹等陳亡正西戎竊伺之時使嵩少有為國家之心選一良將西戎聞知豈敢輕犯京師世蕃乃受鸞銀三千兩威逼兵部薦為大將及鸞冒哈扎爾軍功世蕃亦得以此升官廕子嵩父子彼時嘗自誇以為有薦鸞之功矣乃鸞權日盛出嵩之上反欺侮于嵩嘗自嘆以為養虎遺患後又知皇上有疑鸞之心恐其敗露連纍始不相合互相誹謗以泯初黨之迹以眩皇上之明然不知始而逆鸞之所以敢肆者恃有嵩在終而嵩與逆鸞之所以相反者知皇上有疑鸞之心故耳是致敵背逆者鸞也而受賄引用鸞者則嵩與世蕃也使非嵩與世蕃則鸞安得起用雖有逆謀亦安得施乎進賢受上賞進不肖受顯戮嵩之罪惡又出鸞之上矣此引背逆之姦臣六大罪也嘉靖二十九年西戎犯京深入失道歸路已絶我軍奮勇正好與之血戰一大機會也兵部尚書丁汝夔問計于嵩嵩宜力主勦戰以伸中國之威以紓皇上之憂可也乃曰京師與邉上不同邉上戰敗猶可掩飾此處敗皇上必知莫若按兵不動任賊搶足便自退回以故汝夔傳令不戰及皇上拿問汝夔求救于嵩嵩乂曰雖是拿問我具揭帖維持可保無事蓋恐汝夔招出真情故將此言啜哄以安其心汝夔亦恃嵩平日有回天手假故安心不辨及汝夔臨刑始知為嵩所誤乃大呼曰嚴嵩誤我矣此人所共知也是汝夔不出戰之故天下皆知為嵩主張特皇上不知之耳此誤國家之軍機七大罪也黜陟者人君之大權非臣下可得專且私也刑部郎中徐學詩以論劾嵩與世蕃革任為民矣嵩乃于嘉靖三十年考察京官之時恐嚇吏部將學詩兄中書舍人徐應豐罷黜荷蒙聖明洞察其姦將應豐留用夫應豐乃皇上供事內庭之用嵩猶敢肆其報復之私則在內之臣遭其毒手者又何可勝數耶户科都給事中厲汝進以論劾嵩與世蕃降為典史矣嵩于嘉靖二十九年考察外官之時逼嚇吏部將汝進罷黜夫汝進言官也縱言不當皇上既降其官矣其為典史則無過可指也嵩乃以私怨罷黜之則在外之臣被其中傷陷害者又何可勝數耶夫嵩為小人故善人君子多與之相反嵩不惟罷其官又且曲加之罪不惟罰及一身又且延及子弟以故善類為之一空此時計數正人君子能幾人哉是黜陟之權皇上持之以激勵天下之人心賊嵩竊之以中傷天下之善類此專黜陟之大柄八大罪也嵩既專權則府部之權皆撓于嵩而吏兵二部大利所在尤其所專主者文武官之遷升不論人之賢否惟論銀之多寡各官之任亦通不以報效皇上為心惟日以納賄賊嵩為事將官納賄于嵩不得不剝削乎軍士所以軍士多致失所而邉方為甚有司既納賄于嵩不得不濫取于百姓所以百姓多致流離而北方之民為甚一人專權天下受害怨恨滿道含寃無伸人人思亂皆欲食嵩之肉皇上雖屢加撫恤之恩豈足以當嵩殘虐之害若非皇上德澤之深祖宗立法之善天下之激變也久矣軍民之心既怨恨思亂如是臣恐天下之患不在疆場而在域中此失天下之人心九大罪也風俗之隆替係天下之治亂我朝風俗淳厚近古罕􅓻逆瑾用事始為少變皇上即位以來躬行古道故風俗還古及嵩為輔臣諂諛以欺乎上貪汙以率其下通賄殷勤者雖貪如盜跖而亦薦用奔競踈拙者雖廉如夷齊而亦罷黜一人貪戾天下成風守法度者以為固滯巧彌縫者以為有才勵亷介者以為矯激善奔走者以為練事卑汚成套牢不可破雖英雄豪傑亦入套中從古風俗之壞未有甚于此時者究其本源嵩先好利此天下所以皆尚于貪嵩先好諛此天下所以皆尚乎諂源之不潔流何以清風俗不正而欲天下之治得乎此壞天下之風俗十大罪也嵩有十大罪昭人耳目以皇上之聰明固若不知者何哉蓋因皇上待臣下之心出于至誠賊嵩事皇上之姦入于至神以至神之姦而欺至誠之心無怪其墮于術中而不覺也臣再以嵩之五姦言之知皇上之意向者莫過左右侍從之臣嵩欲托之以伺察聖意故先用寶賄結交情熟于皇上宮中一言一動一起一居雖嬉笑欷歔之聲遊觀燕樂之為無不報嵩知之每報必酬以重賞凡聖意所愛憎舉措嵩皆預知故得以遂逢迎之巧以悅皇上之心皇上見嵩之所言所為盡合聖意蓋先有人以通之也是皇上左右皆賊嵩之間諜此其姦一也通政司納言之官嵩欲阻塞天下之言路故令乾兒子趙文華為通政司使凡奏章到文華必將副本送嵩與世蕃先看三四日後方才進呈本內情節嵩皆預知事少有干于嵩者即先有術以為之彌縫聞御史王宗茂劾嵩之本文華停留五日方上故嵩得以展轉托拾其故是皇上之納言乃賊嵩之攔路犬此其姦二也嵩既內外彌縫周密所畏者厰衛衙門緝訪之也嵩則令子世蕃將厰衛官籠絡強迫結為兒女親家夫既與之結親雖有忠直之士孰無親戚之情于賊嵩之姦惡又豈忍緝訪發露不然嵩籍江西去京四千餘里乃結親于此勢屬不便欲何為哉不過假婚姻之好以遂其掩飾之計耳皇上試問嵩之諸孫所娶者誰氏之女便可見矣是皇上之爪牙乃賊嵩之瓜葛此其姦三也厰衛既為之親所畏者科道言之也嵩恐其奏劾故于科道之初選非出自門下者不得與中書行人之選知縣推官非通賄門下者不得與行取之列考選之時又擇熟愞圓融出自門下者方補科道茍有忠鯁節義之氣者必置之部屬南京使知其罪而不得言言之而亦不真既選之後或入拜則留其飲酒或出差則為之餞贐或心有所愛憎則唆之舉劾為嵩使令至五六年無所建白便升京堂方面夫既受嵩之恩又附嵩且有效驗孰肯言彼之過乎其雖有一二感皇上之恩而欲言者又畏同類泄露孤立而不敢言而嵩門下之人每張大嵩之聲勢隂阻其敢諫之氣以故科道諸臣寧忍負于皇上而不敢忤于權臣也是皇上之耳目皆賊嵩之奴僕此其姦四也科道雖籠絡停當而部官有如徐學詩之類者亦可懼也嵩又令子世蕃將部官之有才望者俱網羅門下或拔之鄉里或托之親識或結為兄弟或招為門客凡部中有事欲行者先報世蕃知故嵩得預為之擺布各官少有怨望者亦先報世蕃知故嵩得早為之斥逐連絡蟠結深根固蒂合為一黨互相依附各部堂司大半皆嵩心腹之人皇上自思左右心腹之人果為誰乎此真可為流涕者也是皇上之臣工多賊嵩之心腹此其姦五也夫嵩之十罪賴此五姦以彌縫之識破嵩之五姦則其十罪立見噫嵩握重權諸臣順從固不足怪而大學士徐階負天下之重望荷皇上之知遇宜深抵力排為天下除賊可也乃畏嵩之巧足以肆其謗懼嵩之毒足以害其身寧鬱怏終日凡事惟聽命于嵩不敢持正少抗是雖為嵩積威所劫然於皇上亦不可謂之不負也階為次輔畏嵩之威亦不足怪以皇上聰明剛斷雖逆鸞隱惡無不悉知乃一向含容于嵩之顯惡固若不能知亦若不能去此不過欲全大臣之體面姑優容之以待彼之自壞耳然不知國之有嵩猶苗之有莠城之有虎一日在位則為一日之害皇上何不忍割愛一賊臣顧忍百萬蒼生之塗炭乎况邇來疑皇上之見猜己有異離之心志如再賜優容姑待之恩恐致以前宰相之禍天下臣民皆知其萬萬不可也臣前諫阻馬市謫官邉方幸復今職皇上既以再生之恩賜臣臣安忍不捨再生之身以報皇上臣如不言又再有誰人敢言乎伏望皇上聽臣之言察嵩之姦羣臣于嵩畏威懷恩固不必問也皇上或問二王令其面陳嵩惡或詢諸閣臣諭以勿畏嵩威如果的實重則置以專權重罪以正國法輕則諭以致仕歸家以全國體則內賊既去外賊何憂其不除然除外賊者臣等之責而去內賊者則皇上之事臣感激無地故不避萬死請斥添祀疏唐胄臣惟自古一代帝王之興必生一代佐命之臣以為之輔故君當大統既成之後必隆褒臣之典非但以報其功亦所以尊崇吾之德業以昭示萬世也我太祖髙皇帝南京功臣廟之建此開國之大典今百六十九年天下至今無不仰者近日武定侯郭勛無故將伊始祖郭英奏欲添祀以致該部乞請多官會議不敢遽抑之者以稱伊祖與在祀徐逹等功同一時但逹等物故各當廟建之時而英獨以後死不與此可欺以其方之言惑之也及都給事中邢如默之奏已明而我皇上慎重猶欲禮部看了來説豈如默之論理雖甚當而敘事或未詳也臣惟皇祖當開基洪武之二年正月乙已命立功臣廟于雞鳴山六月丙寅甫成遂論功列祀凡二十一人命塑死者之像虛生者之位蓋是時胡大海馮國用趙德勝耿再成丁德興俞通海張德勝茅成皆已死先棲神於卞壼蔣子文等廟今復祀此所謂塑像者此也而徐逹常遇春李文忠鄧愈湯和沭英華髙吳良吳楨曹良臣康茂才吳復孫興祖俱現在所謂虛位者此也是當論祀之時已合生死者之功而定之矣勛何據而敢為此言也哉及細讀勛奏稱英于洪武十七年論開國功受封至永樂改元始卒享祀非功有優劣實死有先後然後知勛乃不學少知之誤也蓋洪武十六年雲南既平次年論功以大將頴川侯傅友德進封頴國公而於副將已侯之藍玉仇成王弼許世其爵因論及偏禆謂陳桓胡海郭英張翼等兵興以來屢效勤勞今勳尤著於是各都督僉事桓封普安侯海東川侯英武定侯翼鶴慶侯子孫世襲食祿各二千五百户蓋廟之定祀至是已十六年而英始侯其所論者乃雲南之功而勛誤以為開國也且大明一統志凡天下郡縣例書人物故鳯陽志英蓋各以其地言彭韶尹直楊廉所著皇明名臣録俱不載英惟黃金開國功臣録五百九十三人凡建功于國初者不論大小皆録而英亦與蓋各以其人言皇明祖訓首章議親條下開列三公二侯五家而英以皇妃王妃駙馬之貴其家亦與蓋專以親言俱與廟祀無干而勛皆泛引以為證又惑也又太廟配享當廖永安未除之先凡一十三人其已死廖永安俞通海張德勝桑世傑耿再成胡大海趙德勝之七人于洪武二年正月丁未太廟之享已躋在配至九年始加封號贈諡而徐逹常遇春李文忠鄧愈湯和沐英等六王則各隨其卒之年進侑皆皇祖親定即古爾祖從享祭于大蒸之義比之廟祀其典尤重英于廟且不與祀而又欲望其配享豈不尤惑也哉夫英功纍至侯非不大又以武辨詩書大􅊀孝友恭儉謙虛之德為世所仰而勛今日之祗奉眷顧且能奏大禮大獄諸罪之釋以將順聖德之美亦為可重故尊祖而陷于不知其情雖輕而于我開國之一大禮所關則重前代帝王之舉此者若漢髙祖唐太宗之于其身漢明帝之于其父光武皆身當龍虎風雲之會目擊乾坤再造之真鱗翼攀附之勞素孚于平居而山海排倒之機又燭於臨境其翊戴之力雖俱不負于山河帶礪之盟而意氣之興則自有出於牝牡驪黃之外如西漢元功十八位次東漢雲臺三十二及唐凌煙二十四之圖畫烜赫宇宙歷其世代未有異議而欲參差之者至今照映青史然皆託褒揚於位貌而我聖祖之享祀則以血食寓褒揚其報尤重故品題尤精如六王元勳配享廟祀兩聫上爼其配享六王以下今尚六人俞通海張德勝桑世傑耿再成胡大海趙德勝皆取於死事而當時茅成亦死事者惟與廟祀而不得配享廟祀六王以下十五人以功多於五百九十三人之中僅取馮國用丁德興華髙吳良吳禎康茂才吳復曹良臣孫興祖九人以酬其功雖今配享六人之中惟胡大海趙德勝耿再成俞通海張德勝得與茅成而下六人其桑世傑雖在配享而不得兼廟祀其神會之妙非口舌能言筆墨能盡者故今位列差次之間尚不可輕移易况有無之額敢得而增損乎使勛而知此縱英侯功先于開國亦當俯首斂避况後以南征而敢啓口也哉伏賴皇上於英之配享廟祀且寢其議使在天之靈慰聖祖當日之心額序之席悅諸臣素聚之魂而英平生謙讓之精爽安食家廟于百世不致忸怩於非擬之旁則勛知孝而不知學之誤亦可洗雪以全終臣節而我國朝之一代禮樂崇隆於聖明之世為史籍萬萬年無疆之光矣臣以事干祖宗成憲故敢罄衷披瀝冒瀆天威不勝戰栗待罪之至伏望聖恩俯賜鑒納則輿情允協禮樂昭明神人悅服矣講求財用疏選兵鑄錢積榖靳學顔臣論今日耗天下之財者天下之兵也而邉兵不可以言耗即以山西論之以八百里之邉而守以不滿五萬之卒無時不言修無處不言守無嵗不罹兵患也即一意主戰或可言冗然山西之計在守不在戰雖城操老弱之軍無不從事於修築之役者若以其不任戰而汰之則任戰者不多而修築者無賴焉即如灰溝一營今招軍十年矣尚不滿其半也故他鎮兵或患冗山西兵患少至于山西軍糧原不及數而軍士有逃亡馬匹有倒失故以不及數之糧而餉不滿額之兵若嵗無災傷而年例應時早給則僅僅充足若軍滿其額則糧不盈算矣且民力有限譬如血脈一有針鋩之漏便成全體之枯今養兵之費既不容已則自兵以外但一力節省而已夫以徭役夫馬供給交際文移迎送之類皆不必言至于詞訟一節今世方目之為生財之一術而不知此其為耗民之一孔也臣巡撫衙門自數年前限解贓罰銀兩因攬受多詞臣愚以為一省獄情有巡按臬司守巡主持于上有郡縣有司分決于下民之寃抑者鮮矣若巡撫又加多事則官司紙贖一兩之入民間有十數百兩之費不啻也贓罰所得能幾何哉臣今所受詞唯關軍情邉事地方利弊其餘民間齒牙之競一切不行凡事關兩院者臣即于批詳中委曲數語以省異同之擾故臣巡撫贓罰從此免解可也臣于理財中單提詞訟為言者以民間之詞訟正如有國家之用兵一開釁端此罷而彼不肯休心欲惜財而勢不由已此二事最相同也今山西無礦可開無錢可鑄以鹽法則盡通矣以屯田則盡闢矣以耕作則盡力矣而財用之絀乏日甚臣謂除節省外無䇿焉然該部責臣等以言者蓋不止為山西計為天下計也臣請陳其迂誕之説臣惟詩曰殷鑒不逺在夏后之世夫殷之所鑒者夏周之所鑒者殷則今之所鑒者宋也宋自太祖立國懲唐藩鎮遂欲盡去天下之兵故于京師置禁軍十萬而天下諸路總之亦不過十萬曰以京師十萬而制一路有餘力焉當時曹彬潘美等所將以下江南平漢伐蜀滅越皆禁軍也乃一再傳而西備寧夏北備契丹慶厯以來招募漸多至八九十萬治平以後又增十五六萬至熙寧以後又有女直之備而兵益不勝紀矣彼時財用不言絀乏故佞人得以扇其豐亨豫大之説是宋之患不在乎理財以困民而坐夫馭戎之無策不獨其馭戎之無策也而坐夫上下之茍安不獨其上下之茍安也而坐夫國是之不定夫天下之患莫大乎上下之茍安也而宋恃之彼其元昊請和則舉朝稱賀契丹尋盟則邉防解嚴敵計日密我圖日疏而不悟也莫大乎國是之不定也宋人忽之彼其世方無事言官請繕洛陽則目為迂談戎及近郊廷臣言和言戰則終日不決大計如此小者可知而不悟也議者歸咎于王安石之理財夫敵強則增兵兵增則食益欲不言利得乎而宋計又如此即無安石未有能振之期也我朝自成祖北征至于南望北斗彼弱極矣初非若宋人立國之初即有契丹之鄰也東盡西極奄有諸險又不若宋人之僅保中域棄險資敵也其始沿邉一帶治兵不過四十萬人此後烽火日警叛氓日衆至今增兵益戍稍倍于前初不若宋人之十倍其初也輿圖廣逺二百年來無彈丸黑子之虧初不若宋人疆宇蹙迫也客兵雖增主兵多缺初不若宋人軍餉之外又有嵗幣輸鄰緍錢賂敵也然而自嘉靖年間即言詘乏嵗嵗講求而卒無一效何哉臣亦反覆思之而不得其説于是乃以臆揆之曰宋人雖增新兵而天下原無養兵之費我朝海內皆兵民處其七以供舊軍之餉而新軍一切仰給太倉是舊軍之餉不減而新軍之餉日增其費一也前代惟周有豐鎬漢置南都率有其名而無其實我朝留都之設建官立衛稱兩京焉坐食公帑其費二也宋人宗室亦有王公之號而親疏粲然或通名仕版或散處民間我朝分封列爵強支固本不農不仕啖民膏脂其費三也夫此三費者天下之大費也皆前代所無而我朝獨盛焉又駸駸乎日增也賦斂安得不日急儲蓄安得不日匱哉今之計宗室者形之章奏亦屢以煩而見之施為則病其窒此在樞軸之臣必有逹其權而通其變者非臣愚所能竟其説焉至于留都官曹備設軍衛林立是否聖祖垂統列聖貽謀初意此在館閣之臣討論綜核必有得其詳而言其故者非臣愚所得預其意焉臣愚惟有見於耗天下之財者在兵故敢陳兵説以俟司計者擇焉夫天下之兵有四曰邉兵曰京兵曰留都之兵曰腹內衛所之兵此四兵者坐食則同而緩急之用異焉又其目有五曰見伍曰召募曰徴調曰清勾曰充發此五目者尺籍則同而名實之歸異焉然四兵之中邉兵為急何也強敵日臨所以外捍而內恃之者非邉兵而誰乎京兵則居重馭輕彈壓四方爾故次之至于留都腹內之兵除駕運差撥京班做工之外無庸施矣五目之中召募見伍為實何也應急濟事所與負強徑而當矢石者非召募而誰乎根生土著所與長子孫而充營伍者非見伍而誰乎徴調則虛彼實此但資擺守爾故曰次之至于清勾充發按册則可觀責實則難必無益兵數而專取擾民矣夫惟為急而邉兵之中又惟見伍召募為實所謂新增仰給太倉者正此輩也今為計者曰欲言理財先裁冗食夫邉鎮自大小頭目以及督撫之臣其見任在職者彼或為身謀或為利計姑無敢為其説試使曾見任在職而今罷去者令之熟計而獻之曰某所某鎮兵誠多可損也食誠冗可裁也如是而損其數裁其食何不可之有然而臣知彼不敢為是説也其敢為是説者必其人未嘗居是地者也誠使為計者知緩急之異用也而酌量於損益之間以緩之損而益之急如免班軍之役而徴價以解邉非一計乎知名實之異歸也而通融于因革之際先其實而後其名如省充發之解而量其等以折贖非一計乎夫所貴乎兵者不謂其習號令間技擊日走演場而已謂其衝鋒對敵旗鼓相當乃兵之實也猶之醫也不謂其明素難究岐黃議論風生而已謂其臨榻對症起死回生乃醫之實也今敵視邉兵易與耳然邉兵則猶有戰時而以殺人為樂盜馬斬級之事接踵見焉不獨邉兵雖邉民亦有奮死而一躍者何者彼固習之而數嘗之雖瀕死尚冀一生若他兵則不能爾是以邉兵則易腹兵腹兵則易京兵京兵則易南兵謂其終世皆不嘗冦皆不足恃也臣嘗有驗于此請試言之臣每見海內但有山賊竊發之處多不動用官軍非隂醫雜職則丞二判簿以為之將非鄉夫里保則義勇快壯以為之兵在北則有鹽礦徒毛葫蘆角腦之借在南則有狼兵土官之借觀正德辛未壬申之間劉賊起霸州無幾豎子耳舉中原之衛所而不能當至不免于邉軍之調是以有郎山之捷嘉靖中年倭冦發海上五十餘人耳轉掠十餘府至于應天門外而四十八衛者無一人出攖其鋒卒見夷于淮揚民兵之手是以有振武營之設己巳之役腹內衛所尚實也而卒無一至此固年逺莫大之驗也鄖陽有行都司漢中有衛所近日亦何憚而不能圖乃往返數千里外調邉鎮之兵以臨之此又么麼目前之驗也臣所言者非謂盡去腹內之兵謂既名以兵當責以實當試以戰欲試以戰當限以輪番戍守之法彼其或逺而不可使或弱而不願戍則優其身以自便而移其食以解邉有事則按籍而徴之而饋餉一出于官無事則任其自便而耕商無異于民要之無事時多有事時少也而民籍屯牧住居部署固在也人有恆言軍強民弱謂夫正屯之外又兼餘地餘地之外又買民田差役不能干有司不能得制比夫民之輸筋膂竭筐篋終嵗而辦官捐親戚去墓墳隨地而占籍者相什百也臣又見庚戌以來山東河南江北等處有檄皆創募義勇餘者臣不知在山東者臣略知之山東義勇蓋六千人其始一民徴銀八十兩而民不堪命今漸減至三十餘兩民猶以為病也而國又無賴焉此盜去關門之計今皆不敢言去臣愚以為既不敢言去試六千人者分為二班賣其馬之半而歸其值于官以其半而給三千人三千人者嵗一上班其下班三千人者每名于貼户下徴銀三之二貯庫而優免其身以自便遇有徴發計日而與之銀其上班者來嵗亦復下班而交其馬于上班之人三年無事則計其所貯以一年者留補不測以二年者解輸于邉其河南江北等處亦復如是其于邉餉又一計也臣又見天下腹裏民壯原非祖宗舊制亦自巳已以後始今不過充遊手勾攝之差官府掃除之役無事時多有事時少亦終嵗無戰鬪之事者臣請亦如義勇分班之例其於邉餉又一計也故曰臣非欲盡去腹內之兵以此兵二百年來而未嘗見敵如邉兵之一年及偶一見敵而往驗又章灼如此今乃與不可一日緩之邉兵同一坐食焉孔子嘗言不得已而去兵今當去何兵不得已去食今當去何兵之食今日固不得已之時也司權度者可容忽焉一不至較哉或曰懲噎廢食不可夫是其食雖日一遇噎不可恃以為療飢之資也若乃京兵臣言其次者非謂京兵虛設無謂冗無益也謂京兵依託輦轂涵育太平比夫邉兵之日臨鋒鏑濵危亡者有間也若乃求其食則京兵視邉兵乃以心視臂主臨僕焉為繫甚重乃今懷生顧養銷軟積弱為邉兵所易也奈何望其控制四方以懾羌戎威蠻獠者哉臣愚以為欲京兵強亦宜試以戰欲試以戰亦宜責以輪番戍守之法夫京師去宣府薊鎮才數百里耳以京營九萬之卒嵗以一萬而戍二鎮是九年而一戍京卒未為苦也不數年而成編而京卒之怯亦與邉兵同其徑矣又以畿輔之卒填京戍之空其部伍號令月糧犒賞亦與京卒同焉不數年而畿輔之卒皆親軍之兵矣夫出京卒以戍薊鎮則延固之費可省出京卒以戍宣府則宣府之勢益強宣府之勢益強而大同之氣自倍敵騎雖衆即敢扣巉巖而搖根本則畏宣大以全力而制其後京卒之徑當其前而仰攻深入之事鮮矣臣所謂耗天下之財者在兵在京與邉猶當倍其數而責其實何敢言耗也乃在腹內留都徴調清勾充發之兵則緩急名實居然指掌之間而通融斟酌斯其時矣失今不為臣見夫內外並耗三費交加而區區于今日罷一役明日裁一員泄之以尾閭而益之以畎澮也何益于計哉臣又見近世之言理財者曰財無從生也惟有節費而已臣以前代生財之法較之今日尚缺一大政焉臣舉此一大政何謂其無從生哉而錢法是已臣聞人之所由生衣食為大王者利用厚生必先乎此此出于天時地利人力相待而共成三才之用者也有此三才即有此布帛五榖增虧相乘有無相貿而非有水旱之災兵革之奪癘疫之妨以一嵗之功而供一年之日用自周也今天下之民愁居懾處不勝其束濕之慘司計者日夜憂煩遑遑以匱乏為慮者豈布帛五榖不足之謂哉謂銀兩不足耳夫銀者寒之不可衣飢之不可食又非衣食之所自出也不過貿遷以通衣食之用爾而銅錢亦貿遷以通用與銀異質而通神者猶雲南不用錢而用海巴三者不同而致用則一焉今獨奈何用銀而廢錢惟時天下之用錢者曾不什一而錢法一政久矣其不舉矣錢益廢則銀益獨行銀獨行則豪右之藏益深而銀益貴銀貴則貨益賤而折色之辦益難而豪右者又乘其賤而收之時其貴而糶之銀之積在豪右者愈厚而銀之行于天下者愈少再踰數年臣不知其又何如也則錢法不行之故爾計者又欲開礦夫礦不可開開蓋無益也一禁而不可弛弛則亂矣臣試根極錢説而司計者擇焉臣聞錢者泉也如水之行地中不得一日廢者一日廢則有枯稿之虞從成周兩漢唐宋以來見之史籍一一可覩未有用銀廢錢如今日之甚者也而用錢之多鑄錢之盛者尤莫如宋故宋太祖欲集錢至五百萬而贖山後諸郡于遼靖康中趙良嗣奉使嵗加稅銀一百萬于金其平時賂契丹寧夏也嵗幣率有常額其外國亦用錢可知又宋之饒州處州江寧等處皆其鼓鑄之地今江南人家嘗有發地得窖錢者則無南北皆用錢可知其餘書史所嘗言幾百萬無慮巨萬纍巨萬之説率多以錢計臣亦不暇枚舉今去宋不逺故所用錢多宋之物夫用錢則民生日裕鑄錢則國用益饒此裁成輔相之業惟人主得為之故曰聖人之大寶曰位因位而制權因權而制用故又曰錢者權也人主操富貴之權以役使奔走乎天下故一代之興則制之一主之立則制之改元則制之軍國不足則制之此經國足用之一大政也奈何廢而不舉臣竊聞江南富室有積銀至數十萬兩者今皇上天府之積亦不過百萬兩以上若使銀獨行而錢遂廢焉是不過數十里富室之積足相擬矣皇上試一舉其權而振之則彼富室者智勇豪俊者將奔走于吾權之不暇彼敢冒萬死而盜鑄吾一文者哉故曰權也權者立之乎無形而逹之乎無窮用之則天下舉有求于我而有餘不用則日擾擾焉以求之于天下而不足為驗甚明也且夫富貴其權一也皇上今出數寸之符移片紙之檄以匹夫而拜將相焉又能使同姓王異姓侯焉于公帑未有損也此馭貴之權若是乎其易也若乃今日與人以千金焉明日與人以萬金焉曾不踰年而太倉告匱矣夫何馭富之權若是乎其不侔與誠以有其權而不用與無權等爾昔漢文帝之寵鄧通也曰吾能富之賜以蜀山之銅而鄧氏之錢滿天下夫鄧氏之錢滿天下則天下之貨萃于鄧氏明矣吳王濞擅鑄山之利而輒稱兵漢廷與之抗亦不過竊漢廷之權明矣夫以竊一日之權尚足以得民而抗漢况以萬乘而自振其權可勝用哉今之為計者謂錢法之難有二一曰利不酬本所費多而所得鮮矣臣愚以為此取效于旦夕計本利于出入蓋民間之算非天府之算也夫天府之算以山海之産為材以億兆之力為工以修潔英逹之士為役果何本而何利哉此所為本猶不免用銀之説爾臣所謂本蓋無形之權是已何則鑄錢之須一曰銅料一曰炭一曰轉致一曰人工夫此四者在民間計之銀一分而得錢四分誠十不酬五矣自臣愚計之皆可不用銀而取辦者誠將天下出産銅料之處贖軍徒以下之罪而定其則以收銅于西山産煤之窯以法司有罪之人而準其罪以納炭其運銅則通水路者附以官民之舟如臨清帶甎之例通陸路者資以驛遞之力而給之官庫之錢其運炭則請出府庫見貯之錢或于京城或于近縣或于營軍如係官身則量給以工食如係民户則平給腳價如是而患無材與夫轉致之難臣不信也至于人工取之見役而皆足則又不煩銀兩而可辦也臣不知工部及寶源局原額匠役若干見今坐食與否即以營軍九萬人論之抽用其一二千人足矣而謂妨訓練耶今京城之內煆金刺繡聲技力作之徒與夫靠衙門而衣食者孰非營軍奚啻一二千也而未嘗患其妨凡此皆不用銀而可以成務固無本利之足較矣其二曰民不願行強之恐物情之沸騰也臣愚以為歷代無不用之至稱為錢神我先朝又用之祗見其利不聞其病正德嘉靖以前猶盛行之蓋五六百而值一兩今七八十嵗人固多尚可一召而訊也獨至于今屢行而屢廢甫行而輒輟焉何哉臣竊詳之錢比鈔異于小民無不利也獨所不便者姦豪耳一曰盜不便一曰官為姦弊不便一曰商賈持挾不便一曰豪家蓋藏不便此數不便者于小民無與也臣竊聞往時但一行錢法則輒張告示戒厰衛不先之于賣菜之傭則責之以荷擔之役愚而相煽既閉匿觀望之不免而姦豪右族依托城社者又從旁簧鼓之以濟其不便之私一日而下令二日而閉匿不三四日而中沮矣務大計者豈宜若是其易動哉臣聞施恩澤者自無告始行法令者自貴近始豈惟貴近自朝廷始可也請自今以後追紙贖者除折榖外而責之以納錢上事例者除二分納銀外而一分以納錢存留户口則兼收錢榖商稅課程則純用收錢此謂自朝廷始又因而賜豫之費宗室之祿百官之俸則銀錢兼支又因而驛遞應付雇夫雇馬則惟錢是用又因而軍旅之餉則分其主客量其逺近或以代花布或以充折色此謂自貴近始矣此數者有出有入而民間無底滯之患誠以上下交會血脈流通故也輕斂輕散官府有餘積之藏誠以正賦之銀既以無減于常額而一切之費又取辦于一權故也此權不可行之于天下以啓盜權之釁請于寶源局或西倉專設侍郎或即用左右侍郎一員督于上以十三司員外或主事分理十三省事于下以科道各一員監之銅料工材各有攸掌各省斂散悉照分司先之以區畫條議計定而行而又輕重適均無駭于俗仍以唐宋以來舊錢兼之或上有施于下或下有納于上著之以必行之令遲之以嵗月之效久之而本末兼利公私循環可以輟鼓鑄之勞而罷工作之使臣愚不揣竊謂千慮一得也昔我祖宗初制鈔時下令甚嚴有以金銀貨物交易者輒沒給告者然不徒責之下也後又令各處稅糧課程贓罰俱準折收鈔則聖意淵微可測矣此固血脈流通之意所謂泉也而法以佐之所謂權也臣又聞之邉鄙強固則逺方怵服中原乂安則邉鄙傾嚮故中原者邉鄙之根本也百姓者中原之根本也衣食者百姓之根本也閭閻之細民有終世無銀而不能終嵗無衣寧終嵗無衣而不能終日無食今百司夙夜宰卿不遑者乃在銀而不在榖臣竊慮之夫以國家建都于燕東極齊西盡秦南阻江淮神鼎之重金甌之固此萬世不拔之業也而臣竊有慮焉何哉誠以京師北據幽都更無郡縣而守在四邊雖有東齊西秦其形勢皆足以外中原而自固京師以南絶無名山大澤之限強藩與國之資皇上南面臨之所恃以為腹心股肱之重者惟河南山東江北裏八府之人心耳此數處之人率鷙悍而輕生易動而難戢遊食而寡積者也一不如意則輕去其鄉一有所激則視死如歸臣固視之熟矣八府遭歉則走山東山東遭歉則走江北又未已也匹夫作難而千人嚮應往事蓋屢驗之然其弭之之計無他不過曰恤農以繫其家足食以繫其身聚其骨肉以繫其心而已今試移文于此數處者而核其官舍之所藏每郡得榖十萬焉則司計者可安枕而無慮矣得三萬焉猶可以塞轉徙者之望設不滿萬焉真寒心哉臣竊意其不滿萬者多也即有水旱何所賴焉即有師旅之興何所給焉臣觀自古中原空虛未有如今日者也漢以前有敖倉隋以前有洛口倉唐有義倉宋有常平倉皆隨在而貯不專京師今徐臨德州皆有官倉本為寄囤至於存積幾何哉臣近日有疏為山西積榖荷蒙皇上通行各省臣非不知以用言為榮而所慮者人意向不同或行之不力或施之無序輒以為無益有損焉臣且不堪其任咎也臣前疏謂一曰官倉蓋發官銀以糴者此必甚豐乃可以舉一曰社倉蓋收民穀以充者此雖終嵗皆可以行臣知中原空虛不但榖少而銀亦甚少其官倉一節今嵗已不能舉又聞有災變則社倉一節今嵗亦不能行但能以今嵗始講求其條件加意于積儲即明嵗舉而後嵗效未晚也此二倉者社倉舉之甚易而效甚捷然非官府主持于上則其事終不能成矣夫社倉即義倉也蓋始于漢耿夀昌而盛于隋長孫平唐戴胄之徒唐又最盛計天下積至數千萬以上及推其故唐義倉之開每嵗自王公以下皆有入是以其積獨多臣所謂法令之行自貴近始也宋則準各民正稅之數于二十分而取其一以為社蓋富貴者必田多田多則稅多稅多則社入多亦唐意也要之其出也則中歉賑極貧大歉及中户又大歉焉乃沾及于富室所謂恩澤之加自無告始也今之言官倉者今年曰庫無銀焉明年曰庫無銀焉如是除八分紙贖之外無幾耳言社倉者此曰官户當優免我也彼曰占役何科擾我也又田多者曰我不願賑于後亦不願出于今也如是不過貧民下户之輸無幾耳是二法終不可行而中原之空虛如故也夫民之飢也必轉徙轉徙不已必至于盜盜必先諸官户與夫役占有力之家而此輩多不悟非官府主持而鼓舞之終空言耳臣請下之各省以唐宋斂榖之法為則而就土俗合人情占嵗候以通其變限明春以裏盡報各府已前見貯之數以品其虛盈于明年冬末通計一嵗二倉新收之榖以驗其功能著而為令嵗嵗修之在官倉者時其豐歉而斂散之利歸于官若民有大飢則以賑之在民倉者時其豐歉而斂散之利歸于民雖官有大役亦不許借此藏富于民即藏富于官皇上所為南面而恃以無恐者其根本在此今之言計者不憂榖之不足而憂銀之不足夫銀實生亂榖實弭亂銀之不足而泉貨代之五榖不足則孰可以代者哉故曰明君不寶金玉而寶五榖伏惟聖明垂意明文海卷五十四
