body:
  text: 明文海卷五十六餘姚黃宗羲編奏疏十劾張桂諸臣疏陸粲臣謹按大學士張璁桂蕚皆以凶險之資乖僻之學悖傲大不敬無人臣禮即此已不容於聖明之世矣臣愚以為君之御臣有功固不可不賞有罪亦不可不誅璁蕚區區之功已叨厚賞則其有罪獨得無誅乎是在陛下斷之而已然張璁雖狠愎自用執拗多移顧其術猶疏為害猶淺桂蕚外若寬迂中實深刻其忮忍之毒發於心如蝮蛇猛獸犯者必死以此較彼則蕚之姦尤甚臣姑舉數端言之尚書王瓊姦貪險惡在正德年間交結權姦濁亂海內罪不容誅自蕚等用事瓊令伊女壻家人潛在京城日夜鑽刺所賂遺蕚等數至巨萬蕚連章力薦璁在內閣從中主之瓊遂得起用乃為之言曰使功不如使過瓊雖有過才不可棄也果若斯言是小人之有才者皆縱惡而無罪共工歡兜不見誅於舜矣引用凶人為國生患豈大臣以人事君之義哉昌化邵杰本邵氏養子爭襲伯爵時尚書胡世寧乃邵氏親鄰而杰之主母昌化伯夫人為邵門婦數十年皆明知其來厯蕚受杰之賂力為主張竟得承襲使奴𨽻小人濫膺封爵勳戚世胄與之同列辱國甚矣蕚素厚醫官李夢鶴假托進書夤緣授職與之所居相鄰內開便門以通往來并序班桂林及蕚之管家吳從周者人呼為念一官尤被聽信三人專一説事過贓道路之人皆知之蕚又引鄉人周時望為文選郎中通同賣選凡好官好地方皆其鄉里以關節得之蕚則容嬖妾納賄逮事發銷假銀而退還時望則縱悍妻受贓臨去官猶以受金而反目時望倚恃蕚勢肆無忌憚且如南京太僕少卿已經議裁革欲為己地仍復朦朧具缺即此一事其他欺罔可推自知公論不容乃托養病而去若使斯人幸免姦臣何所懲戒陛下試令吏部查其在任時大選急選過官員有無私厚鄉里其外官推升者比對厯年撫按守巡考語及各官年資淺深該升與否姦弊自見矣且吏部為六曹首文選又諸司首從來皆擇清謹有名者為之今周時望既去代之者胡森并主事楊麒王激三人皆輔臣之鄉里親戚也銓選要地盡用私人升黜豫奪惟其所欲每要職有缺外人竊議謂必江西人與浙人得之既而果然久之亦習慣不以怪矣先因霍韜建言已議準京堂及外官有缺各部屬相兼推用自蕚在部如戴時宗薑清以即中徑升少卿丁汝夔以員外郎徑升副使蕭璆以主事徑升僉事他部亦有此比乎故違明旨用市私恩不但不畏人言亦不畏陛下矣官爵者以待天下賢材偏徇至此豈不可為痛憤蕚典選僅逾年所為姦弊不可勝計引用鄉曲故舊如原任工部尚書今致仕劉麟其中表之親也偏躁自用狂譎不情外示矯激以要流俗之名內為交關以滿姦雄之橐雖已罷官猶為漏網禮部侍郎嚴嵩其子之師也始典成均因撥厯而甚招物議尋遷卿二遂感恩而益固私交僉都御史李如圭由按察使而轉而徑入內臺依阿有迹南京太僕少卿夏尚朴由知府期月而遂亞卿寺情狀可窺禮部員外郎張敔通律厯而假以結知懷金錢而為人請託御史戴金承望風旨論劾大臣公為諛辭形諸奏牘甘心鷹犬之流大壞憲臣之體此皆蕚之死黨相與比周為姦者其他如禮部尚書李時柔和善逢狡猾多智布腹心於羣邪始進之日固黨援於二凶當路而躐取清華負乘可耻倚官勢以虐害鄉里奏訐屢聞右諭德彭澤因罷黜而夤緣改秩致金壺夜饋之謡懷汲引而依託權門玷玊堂清貴之選此皆隂厚於璁而陽附於蕚者諂佞之輩相師成風人心士習壞敗極矣蕚等威勢既大黨與又多天下畏之重足屏息前此莫敢公言其非者天啓宸𠂻覺悟其姦彼自知罪大惡極無地可容強顔班行希望恩貸不亟去之臣恐凶人之性不移怙終之惡益甚目前決無寧靜之日將來必為社稷之憂伏望皇上奮乾剛將璁蕚等速加誅竄以謝天下仍將其心腹如周時望李夢鶴桂林吳從周等孥送法司明正其罪及諸阿諛諂幸之徒重加懲治以為人臣附下罔上之戒庶幾公道昭明人心痛快天變可消民怨可弭賢材之進用有階海宇之清平可望足副皇上惓惓圖治之盛心矣社稷幸甚天下幸甚進禮記集注奏藁華鑰原任兵部職方清吏司郎中臣華鑰謹奏為仰遵首詔請正禮經以崇聖學事臣聞六經之道同歸而禮樂之用為急禮樂非由外鑠也喜怒哀樂之未發謂之中發而皆中節謂之和中者禮之存和者樂之逹禮樂本非二物也所謂同歸亦歸宿於吾心而已今之易詩書春秋所以發明夫禮樂之理禮記所以發明夫禮樂之文文者品節文章器象度數之謂也學者非徒學夫品節文章器象度數而已也將以致其中和之實而無事多言為也禮記一書精粗雜載多為儀禮之傳周未秦漢諸儒之説不無附會其間其不純為先王之典無疑也然舍是則先王之典無稽矣故其為書自不可廢而考據訓解亦不可闕顧讀者擇而執之何如耳若漢鄭玄注多所自得宋大儒朱熹謂其文簡意足或數字同一訓或一字兼數用實深取之間嘗附以緯學或於要義未精唐孔頴達又隨玄所注假為之疏獨考析於儀文度數之詳而其辭益繁蓋純駁斑如也是後訓解雖多宜無出此我朝洪武三年首詔天下開科取士示以所習經書禮記則本古注疏此我皇祖聖學高明千古獨得之見也時非不欲刪繁復古以成聖經亦草創鼎建未暇及耳今國家造士有禮記大全考其凡例則以陳氏集説為宗諸家之説有互相發明及足其未備者分注於下不合者不取是以海內之所傳習獨宋末陳澔所為集説而已夫禮記既非純為先王之典初學但音義章句一明足矣澔乃遂假敷演成説合之無慮數萬言較諸古文或正文訛謬而亂真或簡假破碎而無緒或訓解猥陋而失旨習者既困於篇帙之多又倍其精力於集説之繁而卒茫無歸宿之地所謂約之以禮者其固若是乎哉臣嘗潛心是書專宗古注隨其玩味之所得輒手録以自識及讀宋元諸儒之書有互相發者撮其要義入之一切緯説支詞不得混采時日既久積纍成編然讀書不多知識有限恆竊歉焉恭惟皇帝陛下龍飛御極以來禮文之盛並隆於古真千載一時也而海內之習是書者猶抱蕪説而未悟造士興賢者心知之而未敢適從臣竊願言焉每困職務在公未敢出位言事邇以家居悉心舊學爰取所録重加校訂章分句析要在音義可曉大旨易明而已至於章下餘説亦多迎取記者之意點掇提省庶乎知所歸宿云爾篇依舊次分卷卷凡四十有四名曰禮記集注是敢繕寫正本一部副本一部裝襲進呈伏望陛下俯察微忠少垂乙覽倘以臣言不謬特命館閣儒臣取禮記古注疏逐一編摩或備臣集注讎校得失以為草創萬一之資務在博采衆長折𠂻至理仰承首詔之訂謨表章先王之遺典更望陛下亶神智之髙明任考文之大柄就禮記各篇中刪削繁衍裁成正經班布學官實於千萬世聖學淵源有光矣臣不勝戰兢祈懇之至謹具奏聞伏候敕旨請慎選左右停止齋醮疏蔣冕臣某等謹題為慎選左右速停齋醮以光聖德事竊惟人君一身天下根本欲令出入起居事事盡善惟在左右前後皆用正人日聞正言日行正道則姦佞之徒不須斥逐自然逺去異端邪妄之説何從而生臣等先於正德十六年四月初間已嘗具啓請於昭聖慈夀皇太后乞命司禮監官將尚冠尚衣等四執事及膳房茶房殿內答應掌宫侍衛牌子等項人員逐一豫選老成重厚慎密小心之人以侍陛下任使其曾經先朝隨侍壞事人員並不許濫與即蒙懿旨施行暨陛下登極之初臣等又嘗極言異端邪説瀆經亂倫傷風敗俗亟宜痛絶又條奏慎始修德十二事寫成牌額懸置殿壁其一事謂一應齋醮禳禱必須豫絶其端不可輕信不意近來不時修設齋醮寵用僧道等過於尋常遠近傳聞莫不驚駭推原其故皆因先年壞事之人各名下掌家管家等項人員計引畨漢僧道人等巧言誑惑以致陛下不察誤蒙信用各該名下人員從來壞事非止一端至於今日猶以齋醮一事試探聖心夫齋醮之事乃異端邪説誑惑時俗假此名目以為衣食之計佛家三寶道家三清名雖不同其實同一虛誕誣罔之説聖王之所必禁在昔梁武帝宋徽宗崇信尊奉無所不至一則餓死臺城一則纍繫金人廟社丘墟生靈塗炭求福未得反以召禍史册所載其迹甚明若使二君當時左右隨侍皆得正人何至受禍如此哉二君且未暇詳論只如近日劉瑾建玄明宫錢寧建石經山祠張雄建大慧寺張鋭建夀昌寺于經建碧雲寺張忠建隆恩宫費金銀不計其數其心本欲求福也然皆身被誅竄家底敗亡略不蒙佛與天尊之庇佑由此觀之則其不足信也明矣奈何讒邪小人公肆昡惑不遵祖宗法度不畏天下議論至使宫闈之內修建齋醮萬乘之尊親蒞壇場上惑宸聰下誑愚俗以為福田可種利益可求災患可除祥瑞可致不知近來遠近亢旱風霾災變彼何不誦一經念一咒以消弭之乎南北直𨽻山東河南流賊焚劫殺戮彼何不驅神兵役鬼將以掃平之乎陛下試以此驗之則其無益有損不待辨矣况陛下親蒞壇場行香拜籙亦甚勞矣何不移之以御講筵修設齋醮耗費錢糧亦以多矣何不移之以濟窮困蓋正道異端不容並立心既繫於彼則必不繫於此邪説既入則聖賢之經訓自疏播之天下傳之後世其為陛下聖德之纍不小非止虧損聖治耗蠧民財而已臣等職在輔導陳善閉邪培養君德分所當然苐以積誠未至言雖諄諄未蒙嘉納今不得已揚言於廷以為不如是則不足以聳動天聽以故不避干冒率爾上塵伏望聖明函納臣等所言特命司禮監官將前項有名蠱惑誘引人員逐一查出先將首惡從重究治其餘夤緣阿附者盡數斥逐不使仍前隨侍再命禮部查訪在外寺觀同惡相濟表裏售姦僧道一體治罪又命光祿寺備查近來每次齋醮取用過米麵蔬果等數又命內庫查報各該人員賞過襯施銀兩等物各開數進呈查究追奪以杜冒濫更乞大施乾斷於凡無益齋醮一切停免惟日以敬天法祖修德保身為先務則聖治益隆聖夀自延聖德愈光所以綿國祚於千萬年無疆者端有在於是矣臣等不勝忠懇仰望之至題覆進樂律疏王健題為進樂律效愚忠以圖補報事祠祭清吏司案呈奏本部送禮科抄出太常寺典簿廳典簿李文察奏聞等因奉聖旨禮部看了來説欽此欽遵抄出送司案呈到部臣等竊惟古者聖王治定制禮功成作樂其治辨者其禮具其功大者其樂備故禮樂者所以整齊上下諧和民物見天地之情通鬼神之德治道所急不容偏廢者也昔我太祖高皇帝之既定鼎也首命儒臣修大明集禮而樂附焉其見於聖論有曰治天下之道禮樂二者而已若通於禮而不通於樂非所以淑人心而出治道達於樂而不達於禮非所以振綱紀而立大中必禮樂並行而後治化醇一此以見全智獨稟超然遠覽觀昭曠之道察化理之原其所以昭示將來何盛哉夫昔人謂禮樂百年而後興識者尚竊遲之以為不忠不恕之論况今聖代重熙纍洽垂二百年則夫禮樂之興其不在兹乎洪惟我皇上紹統御極執中葆和德澤洋溢施乎方外延及羣生治功隆赫倫制全盡祀天地禋日月禮先農享宗廟諸凡禮制巍然煥然斯已昭一代之大典垂萬古之宏規而廟樂猶有未備者則經之不傳而教之不崇所謂心達者求知而無師知之者欲教而無徒故興之為尤難也蓋嘗莊誦御製圜丘樂章天機流動道妙呈露仰窺聖心之於樂有神會焉數年以來德化涵育風聲感召一二臣工稍稍能言其義嘗有奏請古樂以裨盛典者矣又有請復古樂以裨聖政者矣然而其説猶略今太常寺典簿文察奏前因進古樂筌蹄青宫樂調等書即所撰述較為詳密臣等看得其書生黃鍾述有補解者以取聲也大司樂六變八變九變有推明者以和調也文武行列有分屬者以定舞也簫管鍾鏞之屬有諸虞青宫之樂兼倣虞周而用之皆據經考傳貫穿載籍法有得於往古論不詭於前賢庶幾哉能用心之勤而聞樂之教矣但中間大報一節欲移於冬至後九日使緣是改厯則享祀受賀不容以失序均之未見其可而其他亦或有泥而未融偏而未舉蓋以樂之義既為難知而氣之候亦未易考固不得以一二之謬而并廢之也所據前項奏進等書請下太常寺等衙門取其用宜於世者選能歌舞童幼肄習每季終赴本部按試以别勤惰臣等又查得嘉靖十七年六月間先該本官奏進樂記補説補注等書該本部題奉欽依委本官協同協律郎咱議金司樂王重卿陳文鐸等官教習待聲律和諧候氣應驗奏進另議擢用近該臣等面試粗已可觀兼此撰述詳密亦見職業之修合無候命下之日本部移咨吏部並查年資應否擢用施行外仍委照前教習使之益殫心力益𢎞職業則所以考定中聲章宣和氣當更有進於此者而禮樂並隆此其會也再照本官條陳九事以發揮書中未盡其意雖未必盡當類如前議要之義在尊君志在華國相應一併議處謹具前件分别可否上請伏乞聖裁緣係進樂律效愚忠以圖補報及奉欽依禮部看了來説事理未敢擅便謹題請旨計聞一曰博稽古樂以兼衆善臣考周禮所載周家之禮樂兼用乎前代之制如舞雲門以祀天神兼用乎黃帝之樂也舞咸池以祭地祗兼用乎堯之樂也舞大夏以祭山川兼用乎禹之樂也舞大濩以享先妣兼用乎湯之樂也蓋樂各有所宜而兼用之乃能全盛故曰周監於二代郁郁乎文哉臣伏讀太祖高皇帝諭禮臣曰近代樂流已久究之甚難卿等宜究心於此庶幾可以復古人之意是知太祖髙皇帝當時拳拳以復古樂為急而未及也今臣於昭代聖樂之外編撰古樂筌蹄九卷以備皇上兼用之盛伏望聖明采擇則或損或益於二帝三皇之樂皆兼其大成矣前件看得周禮載周家之禮樂兼用前代之制大明集禮嘗述之樂篇矣本官所稱蓋出於此非無所據依而漫云也但本朝祭天地社稷宗廟制定雅樂用之幾二百年殆難遽變夫五帝不相沿樂孔子亦曰樂則韶舞未聞必兼前代也樂之用不必兼不必於不兼惟其善美焉已矣合候命下行令本官與本寺官通知音樂者議處如必兼八代為全盛即督令樂童等另行演習如或不然姑與仍舊但務精熟以候應用二曰備全律吕以正樂器臣伏讀太祖髙皇帝諭禮臣曰古之律吕協天地自然之氣後世之律吕出人為智巧之私大哉聖諭深得乎軒轅氏制律吕之本意故令協律郎冷謙定合聲為黃鐘宫四聲為太簇商一聲為姑洗角尺聲為林鍾徵工聲為南吕羽臣聽之與管子之所謂宫如牛鳴窖中商如離群羊角如雉登木以鳴疾以清徵如負豬豕覺而駭羽如鳴鳥在樹者吻合而無間矣不待飛灰積黍而天地之氣自協惜當時禮臣未能擴充聖祖五音之妙以成六律六吕之管故鍾縣磬縣雖有十六而七音之外間置不用皆因律吕不全七音之外無以正之也孟子曰師曠之聰不以六律不能正五音况非師曠舍律吕其何以正五音耶臣今依太祖髙皇帝所定合聲為律吕之原聲約為九寸廣三分由是損益相生以成律吕之正管者十二又倍九為十八倍三為六以為律吕倍數之管者亦十二合正管與倍管而對吹之其聲中和純粹可用以正五音以和鐘鼓以制笙簫實太祖髙皇帝所定全聲非臣之愚所敢妄作伏望皇上敕下太常寺收貯凡有遇制八音用以和之則樂器之音皆得其正矣前件看得鐘懸磬懸雖有十六而七音之外間置不用皆因律吕不全無以正之斯弊之來已久自秦而下旋宫不用厯代所存黃鐘之宫一調而已十二律中惟用七聲其餘五調謂之啞鐘唐太宗時祖孝孫張文收周世宗時王朴一再嘗正之在懸之器才無亞者自後因循旋復壞缺今官能依太祖髙皇帝命冷謙所定合聲為正管伍管而對吹之使全聲之盛復見明時似為有見合候命下行令太常寺官收貯凡有遇制八音取以和之不得視為虛器不見實用三曰攢奏五音以備育德臣考虞舜命夔典樂教胄子則知東宫不可以無樂也東宫之樂與郊廟朝廷之樂小有不同不可不辨而用之也蓋大君至尊樂以黃鐘為主皇太子次尊樂以太簇為主取黃鐘十二律之父而太簇為黃鐘之長子記曰宫為君商為臣角為民徵為事羽為物有君斯有臣有臣斯有民有民斯有事有事斯有物故大君之樂全用宫徵商羽角以著統官分職治民理事備物之義也宫僚之官皆統於大君而不敢専民則未治事則未興物則未用故樂惟用本宫而商角徵羽之宫皆隱集於本宫之內有其音而未底其宫所以尚德渾然在中而未發以為他日功業之本也臣已備解在古樂筌蹄第一卷中頗為明白而可據矣臣本此理此數編撰三卷名為皇明青宫樂調以偹東宫之育德伏望皇上采而用之則直溫中和之教日聞忠孝聰明之德日成而我皇上之盛德大業悠久無疆與天地而同流矣前件看得有虞教胄子之樂曰律和聲又曰八音克諧無相奪倫神人以和未聞主於太簇者也大君之樂以黃鐘為主皇太子之樂以太簇為主斯言也始自本官發之然而緣察正音遂明大禮雖不必出於古人似亦為有見矣但考之國朝之制朝會宴享皆用大樂而今者所進青宫樂調則雅樂也夫至尊次尊雖當有辨而大樂雅樂豈應有殊臣等竊以謂樂無分於大之與雅使詞正曲淡而節疏大乃所以為雅矣此我朝所以酌古今之宜而成一代制作也昔子貢稱古之德音有曰示後世有尊卑長幼之序夫既至尊次尊有辨則已得制樂之本即以大樂行之無不可者孟子曰今之樂猶古之樂也其斯之謂歟合候命下行委教坊演習備用四曰預調琴瑟以足八音夫樂之有八音猶天地之有八風也缺一風天地無以成其化則知缺一音不能成樂也明矣况琴瑟聲清以合人聲故曰琴瑟虛器而少鼓雖鼓而少得其聲之正蓋因琴瑟久貯內器臨祭而後領出其絃有朽多不可調瑟柱或因臨鼓而仆故鼓琴瑟者不求其聲之正惟不絶仆以免罪耳夫絃絶柱仆偶然失禮失之小者也琴瑟失音恃為故習失之大者也豈可以其小而犯其大者乎伏望皇上命各壇今後近祭之期預擇其絃之精緻新美者而蚤調之庶臨時可免絃絶柱仆之患偶或有之亦略恕其罪而不盡究則司琴瑟者乃可盡其能而於絲屬為備音矣前件看得琴有大琴中琴小琴七絃琴瑟有大瑟中瑟小瑟次小瑟大明集禮載之已備蓋皆堂上之樂取其聲之輕清與人聲相比本官所引琴瑟以詠是也周漢相承歌者在堂不設鐘鼓宫架在庭不設琴瑟亦猶有虞之遺制也而八音之不可無琴瑟舊矣故我朝尚之比年貯久而絃腐而柱仆而但求免罪不復求聲之正其弊蓋常相因本官習見既久故言之詳悉其用心亦謂勤矣合候命下行令神樂觀今後各壇近祭之期務要精擇新絃預先調習如有仍前因循以致誤事者聽本部參究五曰備正鐘磬以節五音夫鐘磬所以節五音之上下猶兵家之金鼓所以示進退之方者也今各壇鐘磬其音多不正蓋因始鑄取者不明用之日久漸變其初則鍾磬不足以節五音惟憑歌工以為髙下其不合於律吕者蓋亦多矣且我朝舊制鐘鼓各縣十六夫既縣之則當均用之矣今雖有十六之數而取字之音惟七餘皆虛設而無字無音何以備大成之樂乎恐非舊制意也伏望皇上若遇再造郊廟鐘磬悉當用律吕之管和之以全舊制十六之音則器備而調正矣前件看得大明集禮載鐘之屬有八磬之屬有三本官此論本為編鐘編磬而發蓋小鐘大磬編而縣之其數十六各應律吕鄭康成所謂十六枚同在一簴謂之堵者也其始未嘗不欲均用而徒為虛設也特樂工因循遂致取字之音惟七餘皆無字無音誠非備樂但既未均用則始鑄之時取音明否尚不可知今遽難議鑄即今議鑄鑄者之能亦遽難便得勝前始鑄人也然本官亦曰若遇再造則固自遲疑之矣合假命下始令督率演習均用十六之數如果不應律吕另行奏請定奪六曰考復排簫以助簫籧夫排簫舊制十二管自長而漸短以應十二律所以助乎簫籧之音者也蓋簫籧各六竅中含十二音是一竅兼二音兼音之中恐其難正故以排簫助之取排簫與簫籧皆竹為之故以竹助竹其音可正近年本寺前任卿張鶚不知舊制之音取排簫而更造之狀如山峯吹之全不成音所謂可觀而不可用有同兒戲今當悉除其制復如國初之舊亦以律吕之管和之排簫十二管之音皆正而簫籧乃有助也前件看得排簫即大明集禮所載䇾簫蓋所以助簫笛雖十二管而有正倍之數以應十二律正倍之聲即郭璞所稱二十四管無底而善應者也臣管嘗驗視太常寺舊藏者其制小本新造者其制大爾雅曰大簫謂之䇾小者謂之筊則舊藏者已訛為筊而非䇾矣况新造者取而吹之其音果有可聽似合古䇾簫之制合候命下令該寺今後作樂用此以助簫笛其舊藏既不成音置勿用七曰致重塤箎以存質素夫塤箎二音最濁而最細與笙簫並奏則壓於笙簫而難聞因其難聞故吹之者多不求其音之正惟執虛器具數而已耳殊不知難聞之中有真聞焉最濁最細之音有至大至妙之理寓焉蓋簫籧得之而厚重古人以為質素之音夫音有質素而後有華美猶繪畫之事後於素工忠信之人而後可以學禮也音雖濁細其取義之大有如是然則作樂者寧可不致意於斯二者乎伏望皇上敕演樂之官今後演樂須演小成先鐘磬次塤箎次琴瑟次簫籧排笙次笙鏞次舞前後合大成而通演則小大畢舉八音各盡其妙而樂之道成矣前件看得大明集禮載塤箎各有大小考之揭土為塤作竹為箎其聲相應故詩稱伯氏吹塤仲氏吹箎又稱如塤如箎而周官笙詩并掌而教之也本官謂音雖濁細其取義大此正合樂記以塤箎為德音之音之説但記云聖人作為塤箎然後鐘磬以和故釋者以為塤箎唱德音於始鍾磬和德音於終而此云先鐘磬次塤箎蓋一指制樂之意一指作樂之宜非有不同而塤箎之當重愈可見矣合候命下行演樂官今後演樂如本官議八曰崇樂教以興樂學臣按周禮大司樂掌成均之法以治建國之樂政而合國之子弟教焉是時樂德樂語樂舞學有師承而六律六同五聲八音六舞之奧下達閭巷是以治出於一而禮樂之教大行於世今之教者以詩書為重而禮猶習行之間知其義至於樂則絶無師受律尺短長聲音清濁學士大夫莫有知其説者誠有如宋儒朱熹所言者矣我太祖髙皇帝定鼎之初首以禮樂為急特開禮樂二局徵天下耆儒宿學分局講究其意甚盛也今可師其意於國學特設一齋或於禮部另立一局如古人所謂經義治事者先徵天下通曉之儒以主其教次令郡縣舉薦其質之通敏學之究心者以補弟子員學成而後官之如遇大比之年樂生許其入試果能精通樂經量定中試數名庶士有所勸樂得其道則樂經與禮經並盛樂化與禮化齊隆唐虞雍熙之治復見於今日矣伏望皇上表章樂經使不混於禮樂之中是樂一經久廢於前朝者至我朝而後大明豈非千古之一快哉前件看得本官講國學特設一齋禮部另立一局先徵天下通曉之士以主其教無非欲興復古樂但往年亦曽欽命薦舉至今未聞有的然知樂者可以應詔夫主教既無其人乃泛及郡縣以求補弟子員又何益哉聖明德化感召固自有如后夔者出以鳴一代之盛區區漢以下雍朂逸照不足前稱然此恐非一齋一局所可得也而又云如遇大比之年樂生許其入試是廣幸進之門而開旁通之路必自此始且比年所稱冒籍固皆易詩書春秋禮經學之士也經一也在五經禁之在一經引之亦太輕重不均矣合候命下行令加意演習所謂齋局似難更設九曰纂樂書以廣樂傳臣按漢書禮樂志曰六經之道同歸禮樂之用為急則知樂之有經舊矣三代以降是書不傳今所見惟戴記中之樂記及周禮所存如大司樂之數章耳自漢及宋儒者各有著述如司馬遷之律術蔡元定之律吕新書朱熹之通解鐘律雖未必盡合古之經然亦可緣是以求原以臣愚意欲將數書乞命史官類成一書至於我朝所用郊廟樂音樂章亦倣大明集禮之書編為全帙庶幾學者得見千古之全與我昭代制作之盛顧不韙與前件看得經所以載道也如其道存即數語或附見已自為足用不待重牘纍帙又不待另立一書虞書教胄子之詞戴記之樂記周禮大司樂之數章是樂之經義也夫今世不傳者元聲耳而使重牘纍帙另立一經又何補元聲之亡者昔宋建中靖國間陳暘著樂書二百卷載樂之道頗為詳備乂不特司馬遷有律術蔡元定有律吕新書朱熹有通解鐘律也且史官既非通知音樂一旦命類成樂書亦不過重寫翻刻前數書耳於是之傳何與至所謂郊廟樂音樂章則既載之大明集禮固我朝禮樂全書也而曰倣大明集禮之書編全帙誤矣合候命下寢其所議還宫疏王同祖奏為仰祈聖明乘運法天體元居正以隆聖治以安聖躬事臣聞王者乘運而興必體乾元以更化法天而動必建皇極以居中此隆古之道也何以謂之體元臣聞元者善之長也乾道之始也皇上臨御九有二十一年於兹聖德神功丕冒海宇無以加矣然適當三七之會故一旦變生榻寢自非聖德格天天心眷聖何以轉危為安若此哉是以我太祖髙皇帝於祖訓一書惓惓以警戒為言良有以也我皇上受兹眷佑是今日維新之會詩曰周雖舊邦其命維新此之謂也臣願皇上乘乾元之運一切推恩布德赦過宥罪覃及萬方與天下更始是臣所謂體元以隆聖治也何以謂之居正臣聞天象有紫微垣乃中宫北極之謂也故王者法天必居中而馭外我太祖髙皇帝祖訓曰乾清宫者朕之正寢也其垂訓之意大矣臣伏見皇上近歲恆居西苑臣以為西苑僻在一隅宫墻淺隘豈萬乘臨御之所近者致變可為寒心臣願皇上入居乾清宫書曰皇建其有極斂時五福用敷錫厥庶民此之謂也是臣所謂居正以安聖躬也臣惟皇上聖神御極天人協徵微臣管窺何能為益但臣近觀時變心實驚惶一念之忠不能自己伏惟聖明俯賜鑒納如臣言可采乞敕下禮部詳議可否取自上裁臣愚不勝幸甚辟雍紀事王同祖嘉靖壬寅十月朔國子監司業王公與祭酒張公同至西苑道經皇上所居萬夀宫因見宫墻淺隘門禁疏簡官員人等往來出入無常公意惕然以為目今邊塞騷動多有姦人潛住京師且宫門逼近西安門市井煩囂一旦竊發禍不可測大臣數年以來無一人敢勸回宫者臺諫亦不敢言是月二十一日忽有御寢大變聖上幾危獲安爾後大臣臺諫但疏入慰安慶賀而已司業公因竭忠發憤草奏未上猶俟有言之者至十二月十五日以後竟無敢言之人公遂以死自誓以體元居正二事委曲諷諫兾移上心十九日拜叩左順門上疏二十日一更時司禮臣奏上御覽二十一日早公席藁待罪朝房是日已刻有旨宣成國公朱希忠京山侯崔元大學士翟鑾嚴嵩申時至西苑諸臣皆入戌時下御劄密封諭四臣劄云兹召卿等以王同祖之説似可難行則不如傳位改元至正之義夫我皇曽祖考蒙塵改元是有景泰一代朕昨遇害小同只是傳位為當庶朕得以仰承仁愛於安生矣夫彼之所言可取曰三七之變夫此時氣數不古若非至聖大賢不可當也宜熟思焉頃之召四臣入萬壽宫面諭上曰王同祖所言他主意只是要勸我還宫這是他納忠他又先説改元是要歆動我還宫這也是他忠我只是傳位東宫好四臣叩頭皆云東宫幼沖豈可傳位上曰别人不敢言此事他却進言有所恃嚴公曰他是一介儒臣有何所恃上曰數年前在山陵上李時夏言曽面薦他是真儒朕答曰古有周程張朱是真儒今日復見真儒矣上又曰改元之事如何內一公曰似乎變亂上曰我朝天順改元亦是又曰他既有本如何不在我遇變之後就言今巳幫著年如何逼著我要行又言蕚璁當時議大禮只是楊廷和不與他做主以致激成許多事又曰他似急於功名他從容些那一樣官沒有他做四臣皆唯上曰今不可不處治他恐後面還有人説我四臣出至無逸殿直房內閣臣票擬云國朝原無再改元之制王同祖輒行奏擾好生狂妄都察院參看了來説二十二日命下都察院參題二十五日進二十六日五更上覽過發內閣票有旨宣四臣戌時至西苑四臣先至東閣上有密劄諭四臣蓋因禮部題請正月初一日食不及分不該救護請上減禮御殿三老復進票票擬都察院本王同祖妄議改元倡邪惑衆本當拿問姑從寬降二級調外任封入須臾至西苑上又降劄盛怒四臣如何不回答御劄四臣請罪上又降御劄言乾清宫不祥如何要我還宫四臣兢兢戰懼待命至四鼓方遣出不得見面二十七日申時又發下改票曰且擬為民不許起用是日一更奏覽二十八日留中不下二十九日辰刻命下三十日早謝恩司業公初進時自分必死不意聖上深知其忠曲從寬宥放歸田里優遊山林古人所謂吉人天相良有以也竊因著其顛末如此治安疏海瑞臣聞君者天下臣民萬物之主也惟其為天下臣民萬物之主責任至重凡民生利病一有所不宜將有所不稱其任是故為君之道宜無不備而以其責寄臣工使之盡言焉臣工盡言而君道斯稱矣昔之務為容悅阿諛曲從致使災禍隔塞主上不聞者無足言矣過為計者則又曰君子危明主憂治世夫世則治矣以不治憂之主則明矣以不明危之無乃使之反求眩瞀莫決趨舍矣乎非通論也臣受國厚恩矣請執有犯無隱之義美曰美不一毫虛美過曰過不一毫諱過不為悅諛不暇過計謹披瀝肝膽為陛下言之漢賈誼陳政事於文帝曰進言者皆曰天下已安已治矣臣獨以為未也安且治者非愚則諛夫文帝漢賢君也賈誼非苛責備也文帝性仁頗柔慈恕恭儉能有近民之美優遊退遜尚多怠廢之政不究其弊所不免槩以安且治當之愚也不究其才所不能槩以政之安且治頌之諛也陛下自視於漢文帝何如陛下天資英斷睿識絶人可為堯舜可為禹湯文武下之如漢宣之勵精光武之大度唐太宗之英武無敵憲宗之志平僭亂宋仁宗之仁恕舉一節可取者陛下優為之即位初年剗除積弊煥然與天下更始舉其大槩針敬一以養心定冠履以辨分除聖賢土木之像奪宦官內外之權元世祖毁不與祀祀孔子推及所生天下欣欣然以大有所為仰之識者謂輔相得人太平指日可期非虛語也髙漢文帝逺甚然文帝能充其仁恕之性節用愛人吕祖謙稱其不盡人之財情是也一時天下雖未可盡以治安豫之然貫朽粟陳民多康阜三代之後皆稱為賢君焉陛下則鋭精未久妄念牽之而去矣反剛明而錯用之謂長生可得一意玄修富有四海不曰民之脂膏在是也而興修土木二十餘年不視朝綱法紀弛矣數行推廣事例名節濫矣二王不相見人以為薄於父子以猜疑誹謗戮辱臣下人以為薄於君臣樂西苑而不返宫人以為薄於夫婦天下吏貪民不聊生水旱靡時盜賊滋熾自陛下登極初年亦有之而未甚也今賦役煩增萬方則效陛下破産禮佛日甚室如懸磬十餘年來天下極矣天下因即陛下改元之號而臆之曰嘉靖者言家家皆淨而無財用也邇者嚴嵩罷相世蕃極刑差快人意一時稱頌焉然嚴罷相之後猶之嚴嵩未相之先而已非大清明世界也不及漢文帝逺甚天下之輕量陛下久矣內外臣工之所知也知之而諱語詩云衮職有闕惟仲山甫補之今日所賴以弼棐匡救格非以歸正諸臣責也夫聖人豈絶無過舉哉古者設官亮采惠疇足矣不必責之以諫保氏掌諫王惡不必設之也木繩金礪聖賢不必言之也乃修齋建醮相率進香覔寶戶部差求四出陛下誤舉諸臣誤順無一人為陛下正言焉都俞吁咈之風陳善閉邪之義邈無聞矣諛之甚也然愧心餒氣退有後言以從陛下昧沒本心以歌頌陛下欺君之罪何如夫天下者陛下之家也人未有不顧家者內外臣工有官守有言責皆所以奠陛下之家而磐石之也一意玄修是陛下之心惑也過於苛斷是陛下之情偏也而謂陛下不顧其家人情乎諸臣顧身念重得一官多以欺敗不事事敗有不足以當陛下之心者其不然者君心臣心偶不相值也遂謂陛下為賤薄臣工諸臣正心之學微所言或不免已私或失詳審誠如胡寅撓亂政事之説有不足以當陛下之心者其不然者君意臣意偶不相值也遂謂陛下為是已拒諫執陛下一二事不當之形迹臆陛下千百事之盡然陷陛下誤終不釋諸臣欺君之罪大矣記曰上人疑則百姓惑下難知則君長勞今日之謂也為身家心與懼心合臣職不明臣以一二事形迹既為諸臣解之矣求長生心與惑心合有辭關於臣君道之不正臣請再為陛下開之陛下之誤多矣大端在修醮修醮所以求長生也自古聖賢止説修身立命止説順受其正蓋天地賦豫於人而為性命者此盡之矣堯舜禹湯文武之君聖之盛也未能久世不終下之亦未見方外士自漢唐宋存至今日使陛下得以訪其術者陶仲文陛下以師呼之仲文則既死矣仲文尚不能長生而陛下獨何求之至為天賜仙桃藥丸怪妄尤甚伏羲氏王天下龍馬出河因則其文以畫八卦禹治水時神龜負文而列其背因而第之以成九疇河圖洛書實有此瑞以泄此萬古不傳之祕天不愛道而顯之聖人藉聖人以開示天下猶之日月星辰之布列而厯數成焉非虛妄也宋真宗獲天書於乾祐山孫奭諫曰天何言哉豈有書也桃必採而後得藥由人工搗以成者也兹無因而至桃藥是有足而行耶天賜之者有手而付之耶陛下玄修多年矣一無所得至今日左右姦人逆陛下玄修妄念區區桃藥之長生理之所無而玄修之無益可知矣陛下又將謂懸刑賞以督率臣下分理有人天下無不可治而玄修無害矣乎夫人幼而學既無致君澤民異事之學壯而行亦無致君澤民殊用之心太甲曰有言逆于汝心必求諸道有言遜于汝志必求諸非道言順者之未必為道也即近觀嚴嵩有一不順陛下者乎昔為貪竊今為逆本梁材守道守官陛下以為逆者也歷任有聲官户部者至今日首稱之雖近日嚴嵩抄沒百官有惕心焉無用於積賄求遷稍自洗滌然嚴嵩罷相後猶之嚴嵩未相之前而已諸臣寧為嚴嵩之順不為梁材之執今甚者貪求未甚者挨日見稱於人者亦廊廟山林交戰熱中鶻突依違茍舉故事潔已格物任天下重使社稷靈長終必賴之未見其人焉得非有所牽制其心未能純然精白使然乎陛下欲諸臣惟豫行而莫違也而責之以效忠付之以翼為明聽也又欲其順乎玄修土木之誤是股肱耳目不為腹心衛也而自為視聽持行之用有臣如儀衍焉可以成得志與民由之之業無是理也陛下誠知玄修無益臣之改行民之效尤天下之安與不安治與不治由之翻然悟悔日視正朝輔宰九卿侍從言官講求天下利害洗數十年道君之誤置其身於堯舜禹湯文武之域使其臣亦洗數十年阿君之耻置其身於臯陶伊傅之列相為後先明良喜起都俞吁咈內之宦官宫妾外之光祿寺厨役錦衣衛恩廕諸衙門帶俸舉凡無事而官者亦多矣上之內厨內庫下之戶工部諸厰假絹糧料珠寶器用木材諸物多而積於無用用之非所宜用亦多矣諸臣必有為陛下言者諸臣言之陛下行之此則在陛下一節省間而已京師之一金田野之百金也一節省而國有餘用民有蓋藏不知其幾也而陛下何不為之官有職掌先年職守之正職守之全而未行之今日職守之廢職守之茍且因循不認真不盡法而自以為是敦本行以端士習止上納以清仕途久任吏將以責成功練選軍士以充召募驅緇黃逰食使歸四民責府州縣兼舉富教使成禮俗復屯鹽本色以裕邊儲均田賦丁差以蘇困敝舉天下官之侵漁將之怯懦吏之為姦刑之無少姑息焉必世之仁博厚髙明悠逺之業諸臣必有為陛下言者諸臣言之陛下行之此則在陛下一振作間而已一振作而諸廢具舉百弊剗絶唐虞三代之治粲然復興矣而陛下何不為之節省之振作之又非有所勞於陛下也九卿總其綱百職分其任諸撫按科道糾舉肅清之於其間陛下持其大綱稽治要而責成焉勞於求賢逸於任人如天運於上而四時六氣各得其序恭已無為之道也天地萬物為一體固有之性也民物熙浹薰為太和而陛下性分中自有真樂矣可以贊天地之化育則可以與天地參道與天通命由我立而陛下性分中自有真壽矣此理之所有可旋至而立效者也若夫服食不終之藥遙興輕舉理之所無者也理之所無而切切然散爵祿竦精神玄修求之懸思鑿想繫風捕影終其身如斯而已矣其可乎君道不正臣職不明此天下第一事也於此不言更復何言大臣持祿而外為諛小臣畏罪而面為順陛下有不得知而改之行之者臣每恨焉是以昧死竭忠惓惓為陛下言之一反情易向之間而天下治與不治民物之安與不安決焉伏惟陛下留神宗廟幸甚天下幸甚臣無任戰栗恐懼之至明文海卷五十六
