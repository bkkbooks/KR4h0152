body:
  text: 明文海卷五十七餘姚黃宗羲編奏疏十一時政切要疏張居正臣聞帝王之治天下有大本有急務正心修身建極以為臣民之表率者圖治之大本也審機度勢更化冝民者救時之急務也大本雖立而不能更化以善治譬之琴瑟不調不解而更張之不可鼓也恭惟我皇上踐祚以來正身修德講學勤政惓惓以敬天法祖為心以節財愛民為務圖治之大本既已立矣但近來風俗人情積習生弊有頽靡不振之漸有極重難反之幾若不稍加更易恐無以新天下之耳目一天下之心志臣不揣愚陋日夜思惟謹就今時之所宜者條為六事開欵上請用備聖明採擇臣又自惟幸得以經術遭逢聖主備位輔弼朝夕與同事諸臣寅恭諧協凡有所見自可隨事納忠似不必更有建白但臣之愚昹切見皇上有必為之志而淵𠂻靜默臣下莫能仰窺天下有願治之心而舊習因仍趨向未知所適故不敢避形迹披瀝上陳期於宣昭主德而齊一衆志非有他也伏乞聖慈垂鑒俯賜施行天下幸甚臣愚幸甚一省議論臣聞天下之事慮之貴詳行之貴力謀在衆斷在於獨漢臣申公云為治不在多言顧力行何如耳臣竊見頃年以來朝廷之間議論太多或一事而甲可乙否或一人而朝夷暮跖或前後不覺背馳或毁譽自為矛盾是非淆於唇吻用舍決於愛憎政多紛更事無統紀又每見督撫等官初到地方即例有條陳一疏或謾言數事或更置數官文藻競工覽者每為所眩不曰此人有才即曰此人任事其實蒞任之始也地方利病豈盡周知屬官賢否豈能洞察不過採聽於衆口耳讀其詞藻雖若爛然究其指歸茫未有效比其久也或并其自言者而忘之矣即如昨年皇上以賊內犯特敕廷臣集議防禦之䇿當其時衆言盈廷羣䇿畢舉今又將一年矣其所言者果盡舉行否乎其所行者果有實效否乎又如薊鎮之事初建議者曰吾欲云云當事者亦曰吾欲云云曾無幾何而將不相能士譁於伍異論繁興訛言踵至於是議罷練兵者又紛紛矣臣竊以為事無全利亦無全害人有所長亦有所短要在權利害之多寡酌長短之所冝委任責成庶克有濟今始則計慮未詳既以人言而行終則執守靡定又以人言而止加之愛惡交攻意見橫出讒言微中飛語流傳尋之莫究其端聽者不勝其眩是以人懷疑二動見譸張虛曠歲時成功難睹語曰多指亂視多言亂聽此最今之大患也伏望皇上自今以後勵精治理主宰化機掃無用之虛詞求躬行之實效欲為一事須審之於初務求停當及計慮已審即斷而行之如唐憲宗之討淮蔡雖百方阻之而終不為之搖欲用一人須慎之於始務求相應既得其人則信而任之如魏文侯之任樂羊雖謗書盈篋而終不為之動再乞天語丁寧部院等衙門今後各冝仰體朝廷省事尚實之意一切章奏務從簡切是非可否須明白直陳毋得彼此推諉徒託虛言其大小臣工亦各冝秉公持正以誠心直道相與以勉修職業為務反薄歸厚尚質省文庶治理可興而風俗可變也一振紀綱臣聞人君以一身而居兆民之上臨制四海之廣所以能使天下皆服從其教令整齊而不亂者紀綱而已綱如網之有繩紀如絲之有總詩曰勉勉我王綱紀四方此人主太阿之柄不可一日而倒持者也臣竊見近年以來紀綱不肅法度不行上下務為姑息百事悉從委徇以模稜兩可謂之調停以委曲遷就謂之善處法之所加唯在於微賤而強梗者雖壞法干紀而莫之誰何禮之所制反在於朝廷而為下者或越理犯分而恬不知畏將陵替之風漸成指臂之勢難使賈誼所謂􅏓盩者深可慮也然人情習玩已久驟一振之必將曰此拂人之情者也又將曰此務為操切者也臣請有以解之夫徇情之與順情名雖同而實則異振作之與操切事若近而用則殊蓋順情者因人情之所同欲者而施之大學所謂民之所好好之民之所惡惡之者也若徇情則不顧理之是非事之可否而惟人情之是便而已振作者謂整齊嚴肅懸法以示民而使之不敢犯孔子所謂道之以德齊之以禮者也若操切則為嚴刑峻法虐使其民而已故情可順而不可徇法冝嚴而不冝猛伏望皇上奮乾剛之斷普離照之明張法紀以肅羣工攬權綱而貞百度刑賞豫奪一歸之公道而不必曲徇乎私情政教號令必斷於宸𠂻而無致紛更於浮議法所當加雖貴近不宥事有所枉雖疏賤必申仍乞敕下都察院查照嘉靖初年初定憲綱事理再加申飭秉持公論振揚風紀以佐皇上明作勵精之治庶體統正朝廷尊而下有法守矣一重詔令臣聞君者主令者也臣者行君之令而致之民者也君不主令則無威臣不行君之令而致之民則無法斯大亂之道也臣看得舊規凡各衙門章奏奉旨有某部看了來説者必是緊關事情重大機務有某部知道者雖若稍緩亦必合行事務或關係各地方民情利病該衙門自冝參酌緩急次第題覆至於發自聖𠂻特降敕諭者又與泛常不同尤冝上緊奉行事乃無壅蓋天子之號令譬之風霆若風不能動而霆不能擊則造化之機滯而乾坤之用息矣臣竊見近日以來朝廷詔旨廢格不行抄到各衙門槩從停閣或已題奉欽依一切視為故紙禁之不止令之不從至於應勘應報奉旨行下者各地方官尤屬遲慢有查勘一事而數十年不完者文卷委積多致沉埋干證之人半在鬼録年月既逺事多失真遂使漏網終逃國有不申之法覆盆自苦人懷不白之寃是非何由而明賞罰何由而當伏望敕下部院等衙門凡大小事務既奉明旨須數日之內即行題覆若事理了然明白易見者即行據理剖斷毋但諉之撫按議處以致耽延其有合行議勘問奏亦要酌量事情緩急道里逺近嚴立期限責令上緊奏報該部置立號簿登記注銷如有違限不行奏報者從實查參坐以違制之罪吏部即以此考其勤惰以為賢否然後人思盡職而事無壅滯一核名實臣聞人主之所以馭其臣者賞罰用舍而已欲用舍賞罰之當在於綜核名實而已臣每見朝廷欲用一人當事者輒有乏才之歎切以為古今人才不甚相逺人主操用舍豫奪之權以奔走天下之士何求而不得而曰世無才焉臣不信也惟名實之不核揀擇之不精所用非其所急所取非其所求則上之爵賞不重而人懷僥幸之心牛驥以並駕而俱疲工拙以混吹而莫辨才惡得而不乏事惡得而有濟哉臣請略言其槩夫器必試而後知其利鈍馬必試而後知其駑良今用人則不然稱人之才不必試之以事任之以事不必更考其成及至僨事之時又未必明正其罪椎魯少文者以無用見譏而大言無當者以虛聲叨譽倜儻抗直者以忤時難合而脂韋逢時者以巧宦易容其才雖可用也或以卑微而輕忽之其才本無取也或以名髙而尊禮之或因一事之善而終身借之以為資或因一動之差而衆口訾之以為病加以官不久任事不責成更調太繁遷轉太驟資格太拘毁譽失實又有一種風尚士大夫務為聲稱舍其職業反屬茫昧主錢榖者不知出納之數司刑名者未諳律例之文官守既失事何由舉凡此皆所謂名與實爽者也如此則真才實能之士何由得進而百官有司之職何由得舉哉故臣妄以為世不患無才患無用才之道如得其道則舉天下之事唯上之所欲為無不應者臣願皇上慎重名器愛惜爵賞用人必考其終授任必求其當有功於國家即千金之賞通侯之印亦不冝吝無功於國家雖嚬笑之微敝袴之賤亦勿輕豫仍乞敕下吏部嚴考課之法審名實之歸遵照祖宗舊規凡京官及三六年考滿毋得槩引復職濫給恩典須明白開具稱職平常不稱職以為殿最若其功過未大顯著未可遽行黜陟者乞將誥敕勳階等項酌量裁與稍加差等以示激勸至於用舍進退一以功實為凖毋徒眩於聲名毋盡拘於資格毋搖之以毁譽毋雜之以愛憎毋以一事槩其平生毋以一眚掩其大節在京各衙門佐二官須量其才器之所宜者授之平居則使之講究職業贊佐長官如將官庫所儲盡行催解以致各省庫藏空虛水旱災傷視民之死而不能賑兩廣軍兵供餉百出而不能支是國未充而元氣已耗矣臣切以為天之生財在官在民止有此數譬之於人稟賦強弱自有分别善飬生者惟撙節愛惜不以嗜欲戕之亦皆足以却病而延夀昔漢昭帝承武帝多事之後海內虛耗霍光佐之節儉省用與民休息行之數年百姓阜安國用遂足然則與其設法征求索之於有限之數以病民孰若加意省儉取之於自足之中以厚下乎仰惟皇上即位以來凡諸齋醮土木淫侈之費悉行停革雖大禹之克勤克儉不是過矣然臣以為矯枉者必過其正當民窮財盡之時若不痛加省節恐不能救也伏望皇上軫念民窮加惠邦本於凡不急工程無益徴辦一切停免敦尚儉素以為天下先仍乞敕下吏部慎選良吏牧飬小民其守令賢否殿最惟以守已端潔實心愛民者乃與上考稱職不次擢用若但善事上官幹理簿書而無實政於百姓者雖有才能幹局止與中考其貪汚顯著者不必引例發遣但將所犯贓私嚴行追併押發各邊自行輸納完日發回原籍為民不但懲貪亦可為實邊之一助再長官有缺即以佐二代之不必另索其屬官有諳練故事盡心官守者九年任滿亦照吏部升授京職或即轉本衙門堂上官小九卿堂上官品級相同者不必更相調補各處巡撫官果於地方相宜久任者或就彼加秩不必又遷他省布按二司官如參議久者即可升參政僉事久者即可升副使不必互轉數易以滋勞擾如此則人有専職事有責成人材亦不患其缺乏矣一固邦本臣聞帝王之治欲攘外者必先安內書曰民惟邦本本固邦寧自古雖極治之時不能無賊盜之患惟百姓安樂家給人足雖有外患而邦本深固自可無虞惟自百姓愁苦思亂民不聊生然後盜賊乘之而起蓋安民可與行義而危民易與為非其勢然也恭惟皇上嗣登大寶首下蠲恤之詔黎元欣欣方切更生獨昨歲以元年蠲賦一半國用不足又邊費重大內帑空乏不得已差四御史分道督賦三都御史清理屯鹽皆一切權冝以佐國用之急而人遂有苦其搜括者臣近日訪之外論皆稱不便緣各御史差出目覩百姓窮苦亦無别法清查止乞敕下户部悉心講求財用之所以日匱者其弊何在今欲措理其道何由今風俗侈靡官民服舍俱無限制外之豪強兼并賦後不均花分詭寄恃頑不納田糧偏纍小民官府造作侵欺冒破姦徒罔利有名無實各衙門在官錢糧漫無稽查假公濟私官吏滋弊凡此耗財病民之大者若求其害財者而去之則亦何必索之於勞苦之民而自耗國家之元氣乎前項催督御史事完之後宜即令回京此後不必再差重為地方之病其屯鹽各差都御史應否取回别用但責成於該管撫按使之悉心清理亦乞敕下該部從長計議具奏定奪以後上下惟務清心省事安靜不擾庶民生可遂而邦本獲寧也一飭戎備臣惟當今之事可慮者莫重於邊防廟堂之上所當日夜圖畫者亦莫急於邊防邇年以來患日深邊事久廢比者屢蒙聖諭嚴飭邊臣人人思奮一時督撫將令等官頗稱得人目前守禦似亦略備矣然臣以為不一創之其患不止但戰乃危事未可易言須從容審圖以計勝之耳今之上䇿莫如自治而其機要所在惟在皇上赫然奮發先定聖志聖志定而懷忠藴謀之士得效於前矣今談者皆曰吾兵不多食不足將帥不得其人臣以為此三者不足患也夫兵不患少而患弱今軍伍雖缺而糧籍俱存若能按籍徴求清查影占隨宜募補著實訓練何患無兵損無用不急之費併其財力以撫飬戰鬬之士何患無財懸重賞以勸有功寬文法以伸將權則忠勇之夫孰不思奮又何患於無將臣之所患特患中國無奮勵激發之志因循怠玩姑務偷安則雖有兵食良將亦恐不能有為耳故臣願皇上急先自治之圖堅定必為之志屬任謀臣修舉實政不求近功不忘有事熟計而審行之不出五年邊可安矣至於目今自守之䇿莫要於選擇邊吏團練鄉兵併守墩堡令民耕牧時簡精鋭出其空虛以制之寇即入犯亦可不至大失此數者昨雖已經閣部議行臣愚猶恐人心玩愒日久尚以彌文塞責伏乞敕下兵部申飭各邊督撫務將前事著實舉行俟秋防畢日嚴查有無實效大行賞罰庶沿邊諸郡在在有備而不敢窺也再照祖宗時京營之兵數十萬今雖不足尚可得八九萬人若使訓練有方亦豈盡皆無用但士習驕惰法令難行雖春秋操練徒虛文耳臣考之古禮及我祖宗故事俱有大閲之禮以習武事而戒不虞今京城內外守備單弱臣常以為憂伏乞敕下戎攻大臣申嚴軍政設法訓練每歲或間歲季冬農隙之時恭請聖駕親臨校閲一以試將官之賢否一以觀軍士之勇怯有技藝精者分别賞賚老弱不堪者即行汰易如此不惟使輦轂之下常有數萬精兵得居重馭輕之道且此一舉動傳之逺近皆知皇上加意武偹整飭戎事亦足以伐敵人之謀銷未萌之患誠轉弱為強之一機也明制體以重王言疏張居正竊照閣臣之職專一視草代言故其官謂之知制誥若制詞失體以致輕褻王言則閣臣為不職矣謹按舊規凡官員應給誥敕該部題奉欽依手本到閣撰述官先具稿送臣等看詳改定謄寫進呈候批紅發下撰述官用關防挂號然後發中書舍人寫軸用寶此定制也至於制命之詞貴在簡嚴莊重乃為得體查得成化𢎞治間誥敕敘本身履歷功績不過百餘字祖父母父母妻室不過六七十字至於慶典覃恩則其詞尤簡蓋以恩例槩及比之考績不同故以賚被為榮不必詳其閲歷此制體也近年以來俗尚干求辭多浮靡撰述官沿襲宿弊往往不候進呈先將文稿傳示於人其中詞語又過為誇侈多至百千言或本無實行虛為頌美或事涉幽隱極力宣揚臣等方欲為之更定而本官已先得稿登軸矣夫誥敕者朝廷所以告諭臣下者也臣諛其君猶謂之佞况以上諛下是何理乎查得嘉靖十二年該大學士張孚敬等題為重誥敕事奉世宗肅皇帝聖旨卿等所言已足見敬慎至意近年以來委的誥詞之文浮泛誇譽至於數百甚非制體甚非王言今後都著刪去浮詞以存實體欽此又該本官題為前事參論制敕房辦事大理寺評事嶽梁撰擬南京兵部尚書陶琰贈官誥文浮詞誇誕又不先送內閣看詳輒便進呈等因奉世宗肅皇帝聖旨卿等另撰誥文來看嶽梁騁賣浮詞蔑視制詞不遵前旨著法司提問欽此此時嘉靖初年誥敕之文視成化𢎞治雖為稍繁然尚未如近年之甚也竊以禮貴從先辭尚體要况命令之辭乃一代典制傳之四方垂之後世所關非小此係臣等職掌不容不為釐正伏乞皇上念朝廷體統之當尊國家典制之當守敕下臣等戒諭各撰述官自今以後凡為制誥必須復古崇實毋得徇情飾辭以壞制體及文字未經進呈亦毋得預行傳示以市私交如此庶王言重國體尊而臣等亦得以守其常職矣申明冠禮疏孫存禮部主客清吏司署郎中主事臣孫存謹奏為申明冠禮事近該臣奏請皇帝陛下舉行冠禮伏蒙敕下禮部覆題奉聖旨是既先朝俱未舉行罷欽此欽遵臣有以仰窺陛下虛心聽納無意無必之盛節矣蓋本部言家語載孔子謂人君治成人之事者何冠之有肆我英宗皇帝武宗皇帝俱未舉行冠禮陛下因是其言而罷之若本部詳言天子冠禮乃我太祖髙皇帝之聖制與歷代之所已行則陛下亦且是其言而行之矣臣謹按家語周公使祝雍頌曰令月吉日王始加元服去王幼志思服衮職欽若昊天六合是式率爾祖考永永無極此周公之冠禮也歷漢魏晉唐帝冠之禮大率祖之博物記漢孝昭帝冠辭曰陛下摛顯先帝之光輝以承皇天之嘉祐欽奉仲春之吉辰普遵大道之郊域秉率百福之休靈始加昭明之元服推逺沖孺之幼志藴藉文武之純德肅勤髙祖之清廟六合之內靡不承式永永與天無極後漢書正月甲子若丙子為吉日可加元服儀從冠禮乘輿初服緇布進賢次爵辨次通天皆於髙祖廟以禮謁見世祖廟又興平元年正月甲子帝加元服司徒淳于嘉為賔加賜玄纁駟馬此漢天子之冠禮也三國志魏天子冠一加其説與家語相發明曰士禮三加加有成也至於天子無加數之文者將以踐阼臨下尊極德備豈得與士同也此魏帝之冠禮也晉書穆帝孝武帝將冠皆先以幣告廟訖又廟見江左諸帝將冠金石宿設百僚陪位又預於殿上鋪大牀御府令奉冕幘簪導衮服以授侍中常侍太尉加幘太保加冕太尉跪讀祝文曰令月吉日始加元服皇帝穆穆思𢎞衮職欽若昊天六合是式率遵祖考永永無極眉夀維祺介兹景福加冠訖侍中繫玄紞常侍脫帝絳紗服加衮服事畢太保率羣臣奉觴上夀王公以下三稱萬歲乃退此晉天子之冠禮也唐書四曰嘉禮皇帝始加元服有司卜日告於天地宗廟祝曰令月吉日始加元服夀考維祺以介景福乃冠此唐天子之冠禮也今曰天子無冠禮然則彼皆非與我太祖超越百王親集五禮其制天子冠禮蓋取諸周奏告郊廟百僚陪位行禮殿上進醴稱賀蓋取諸晉一加冕冠蓋取諸魏祝詞爾雅蓋取諸唐今陛下將冠誠述我太祖之禮而行之幣告於天地宗廟詔告於文武羣臣於奉天正殿行之以文武大臣攝之太師太尉相之使臣子喜哉遂其嵩呼舞蹈之賀則四海之民聞之舉欣欣然有喜色而相告曰明天子冠矣復行太祖之政矣天下自此太平也豈不光明俊偉哉乃若今之所行以巍巍天子之冠禮官不與其儀史臣不書其事天地無奏告之文臣民無慶賀之節不相之以元老大臣而相之以近習閽寺不行之於當陽正衙而行之於燕居寢殿竊為聖明惜之且臣之所論者非謂陛下不行三加之禮為不重人道之始也謂陛下不行一加之禮為不偹冠禮之儀也蓋三加者士之冠禮載諸儀禮者是也自元子以下皆然天下無生而貴者故也一加者天子之冠禮行於周王衍于魏人備載於大明集禮者是也惟天子行之其禮異於士則義亦異於士矣士之冠禮成人之禮也君之冠禮君人之禮也家語所謂人君不冠者謂人君不行士之冠禮也乃謂人君不行人君之冠禮可乎况家語文不類於六經義或繆于聖人殆不可盡信之書也若大明集禮之冠禮本之周公監於歷代而折𠂻於吾聖祖乃無非可行之成憲也我聖祖嘗命羣臣議毋服古今言人人殊乃斷自宸𠂻著為定制而曰禮樂征伐自天子出正以三代之禮不相沿襲時王之制所當遵守凡所著定者皆精神心術之運萬世不易之定體也若以天子冠禮之制為有戾於孔子之言則我聖祖萬幾之暇博極群書豈獨遺家語而必欲從周公之制哉殆必有槩於中而損之益之以適厥中耳惟我英宗武宗未行冠禮則亦當時之疑議也與其法當時之疑議孰若法聖祖不刋之成憲耶其有謂周公以叔父攝位故冠成王以成人之禮非後世臣下可同也臣謂此言尤謬大抵成王君也周公臣也君臣之義無所逃於天地之間而何有於叔父何有於居攝惟如此而後天下之為君臣者定故有周君臣之分猶萬世君臣之分也周公可以舉冠於成王固知冠禮未有不可行於天子也今陛下冠期日近而臣復瀆宸聰無及於事而祗蹈干冒天威之罪但心有所懷不得不盡倘蒙聖明採擇則大婚尚在半月之後尚可改卜日行也臣言之後恐有以非正月甲子為言者則漢惠帝冠以三月固不必正月可冠也伏望皇上仰遵祖訓俯賜宸斷訪於元老儒臣毅然復行隆古之禮則修已化民之大端而敬天法祖之一道也臣極知方今天下之事甚有大於此者則陛下有股肱之寄有耳目之司有諤諤之六卿有師師之庶職夫既已言之矣如臣卑微愚昧徒陳一節之禮猶弗可底行尚敢他説哉臣不勝隕越待罪之至先夫子曰孫存字性父滁陽人官至河南布政使所著豐山集文亦應酬略兼理學乞行攀送梓宫疏孫繼臯奏為古今大綱常必不可虧國家大典禮必不可缺冒懇聖明扶疾攀送母后以光聖人大孝慰寰海同情事臣於本月十五日忽禮部接出聖旨朕自閏八月初旬偶爾痰流注於左足動履不便今大行皇妣引發朕不能恭行攀送不勝哀慟著遣獻代行卿還傳示務要虔潔敬慎恭誠供事欽此臣再三捧誦再三思維於所謂痰注左足動履不便者而見聖情之萬不獲已也於所謂虔潔敬慎恭誠供事者而見聖心之萬不獲安也雖然皇上綱常之主而典禮之宗也兹舉而遂皇上異日必自追悔又必將追咎羣臣不言而以為朝廷無人臣敢先言之以無勤皇上悔可乎夫皇上大孝聞天下久矣毋論母后生前極天下飬即初逝而成服皇上且奔且哭哭極哀外廷所聞也上慈諡奏册寶登降薦獻戚與禮步而過宫門而後登輿外廷所見也蓋天生大聖人其舉動不愆往往若此矣今只一攀送而以疾格九仭一簣臣竊為皇上惜之且皇上不出宫眷必不得帷而至午門神帛朝祖必且降而藉奠獻使手宫眷即不送其小者也神帛何帛朝祖何事奠獻使何人而猥令褻瀆不知母后之神靈肯於帛乎慿依否耶列聖在天之神靈肯於使乎降鑒否耶古人於親喪雖小物細故必誠必信必躬必親而今却於大處不無虧缺也臣又為皇上重惜之然而皇上固曰吾適於痰弗良於行耳臣請有以進今夫禮居喪無沐浴飲酒食肉而有沐浴飲酒食肉者疾故也皇上誠適於痰弗良於行即輿而出午門等門掖而成禮何弗可者親之喪達乎天子在所自致而已事關大綱常大典禮四海觀刑萬代瞻仰實在兹舉臣不勝狗馬之心攄其愚忠惟皇上深思力行勿之有悔臣冒昧陳言無任惶恐待罪之至史職疏張位臣聞古者左史記動右史記言故當時聖君明臣經世之迹炳然侈於後觀厯代建置不同厥任均重我祖宗尚設起居注官故聖政記日厯諸書謨烈孔彰允為昭代啓佑之典後因詳定史職以翰林修撰編修撿討專任紀載之事而起居注遂罷今國史之員雖設其名存其實廢矣臣頃偹員纂修切見先朝政事不過櫽括章疏之存者紀之若非出於詔令形諸建白則近者以無據而略逺者以不知而遺中間精神脈絡每每不相聯貫致使聖代鴻猷茂烈鬱而未章非所以嫓前徽而光後範也舊聞史氏中亦有隨所覩記暗疏之者因事無專責往往中輟紀載既失其職徒令野史流傳淆亂失真甚亡謂也况不值纂修則史官充位無以自效徒日費大官供給循名責實其將謂何兹事關係不細舉世知之以為冝復久矣恭遇聖厯更新明良會合凡典學勤政都俞警戒盛美之事有不見於章疏而為中外傳誦者甚多紀載無徴誠為缺典夫當職而不能舉守官之恥也主上明聖而德不布聞有司之過也以臣愚見今不必大為更張别創名秩第令見在諸臣日輪數人進直史館候有明旨及朝講召對宫禁逰習凡一言一行為師保所及知者謹據見聞敬紀之其各衙門所奏所行大事疏下六科亦據緣繇紀其節略藏之祕府以備參考且今之史臣將以儲講論弼直之選者學古而未通今奚以待用誠使之日有見聞明習國家政體異時備顧問當大事不患無具夫天下事不知其非而安之猶可言也今明知之轉移無難逡巡莫肯先發欲何待也臣切憂之不特此一事為然伏乞敕下閣部會同計議如果臣言可采事體無礙特賜斟酌施行則盛美傳而國典備職業修人才儲於治道未必無補萬一矣建輔城定兵制疏張位奏為建輔城定兵制以鞏萬年皇圖事臣聞之易曰王公設險以守其國書曰申畫郊圻慎固封守以康四海蓋險不設則不可守國尊嚴王畿則根本固而天下蒙安國家定鼎燕京雄勝超越九重居尊三面鄰邊固與前代建都中原者不同成祖文皇帝三犂北庭力強盛草創建設以俟後人念自大寧撤防東勝失守關隘彌近拱衛冝嚴今京東距薊鎮不二百里京西去宣鎮不四百里東南之去天津海口不二百里西南之去紫荆關路不三百里朝衝隘口夕抵郊原鐡騎乘風勢不可遏夫以至重之地而伏至危之形防護未周形勝未備咸抱隱憂久矣嘉靖庚戌年間敵騎闖入邊關徑至城下輦轂萬姓米㸑所需城門一關內外交阻况今北邊騷動倭防正殷桑土綢繆尤當亟慮臣竊以為冝於近京周圍十里內外卜擇水土善利要害處所特建輔城四座護衛京師每城置兵萬人內設營房以處軍士外設教場照常操練聲勢犄角有恃無恐猝有外患城門可開合遵照祖宗五軍舊制即以三大營見操官兵為中軍大營其四城應撥營兵各萬分練或查取京衛五十四屯及京營三屯餘丁挑選精壯以充其數擇前後左右五府見任官知軍事者統之俱聽戎政大臣節制偏禆將領一視大營之制城內兼置倉場各貯一年芻粟再設憲司文臣二員監􅋵督餉令熟兵事以儲邊才量撥近城田地給軍耕種以優飬贍四隅聯絡墩堡以嚴守望周遭開通溝洫栽植樹木以扼戎馬險足以守兵足以防此真國家強本之圖萬年不拔之計也嘗考漢設南北二軍宋設禁廂二軍彼此相制為安我太祖定鼎金陵長江天險復設浦子口大營屯兵積餉具有深意伏見今之講武者但計兵力不考兵制蓋兵弱則有耗費之患而兵強則有肘腋之虞虎豹在山牙爪自恃尾大不掉輕重倒持冝令各將官於營軍中揀擇壯勇千百名稍厚廩餼常置左右即以此千百人充伍長甲正部隊名色視將領官職崇卑以定多寡差等俾名分相維苦樂相通臂指可使緩急可賴或一營揭挺彼此勢足以相制或一夫脫巾上下力足以相鈐分數既明多多益善此又為將領強本不特可行於京營而且可行於各邊者也若言四輔之城兵力尚少則請於畿甸八府州縣民壯中再行挑選充數或以入班之軍酌量湊補或以召募之衆事寧續增仍令巡視京營科道官一體稽閲此制一定不惟可壯居重馭輕之勢且可弭驕悍譟呼之事矣或謂營建多費時詘舉贏然久逺之圖豈必旦夕之就期以數歲何患其遲或謂守在四邊在德非險若為堂奧之備恐示張皇之形徒襲常談終誤大事蓋非常之原黎民所懼及臻厥成天下晏如今夫冨人之家欲防外侮必須固籓籬守門户而後室家即安戒僮僕嚴備禦而後盜賊難犯今建城制兵之議是即固守備禦之䇿也庶人且能為一家謀况以天子之尊可不為皇居萬世計乎謹繪城圖一幅恭進御覽伏乞敕下該部及時會議待邊事稍寧次第舉行宗社生靈不勝幸甚明文海卷五十七
