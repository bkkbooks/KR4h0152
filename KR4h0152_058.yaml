body:
  text: 明文海巻五十八餘姚黄宗羲編奏疏十二國用匱乏有由疏趙世卿葢國家錢糧徴収有額曰稅糧曰馬草曰農桑曰塩鈔者為正課各運司者為塩課各鈔關者為關課稅契贖鍰香商魚茶屯折冨户等項為雜課内除徑解邊鎮外大約三百七十餘萬两此外則開納撙省軍興搜括等銀為非時額外之課大約五六十萬不等合此數項方足四百餘萬之數以當一歳之出年來權冝開採之命一下各處撫按司道有司皆仰體皇上不忍加𣲖小民之意遂將一切雜課如每年山東之香商等税一萬五千五百餘两福建之屯折等銀三萬四千八百餘两南直𨽻徽寧等府之稅契銀六萬两江西之商稅塩課等銀二萬六千七百餘两改歸内使而臣部之雜課失矣其間雜課不敷誅求無藝百姓不得不以應徴之銀錢暫免箠楚有司不得不以見完之正稅量為那移為上官者亦諒其愛民萬不得已之𠂻而曲為彌縫以致三年之間省直拖欠一百九十九萬有竒而臣部之正課虧矣山東運司每年分割去銀一萬五千餘两两淮運司别立超單八萬引而臣部之塩課壅矣原額關課三十三萬五千餘两二十五年新增銀八萬二千两今則行旅蕭條商賈褁足止解完二十六萬二千餘两而臣部之關課奪矣髙淮開納中書李敬開授揮使而臣部事例之課分矣關中軍興撙省等銀毎年七萬餘两盡抵礦稅各省援請而臣部額外之課虚矣他如南直𨽻蘇州等十八府州自萬厯十四年起至二十九年止袍價軍餉造船等項借過本部銀三十八萬七千六百餘两浙江自十四年起至二十九年止袍價借過本部銀三十三萬八千五百餘两陜西羊羢協濟自十三年起至三十年止共用銀一十四萬二千五百餘两四州議留陜西濟邊銀自二十五年起至二十九年止俱於太倉補發過銀一十五萬两雲南自十二年起至三十年止每年題留提舉司解京課銀共五十七萬两而臣部之逋課又如此其多矣國家利源止此數項而在在握以中官天下錢糧止此額數而處處自為那抵當此之際欲開利孔則無可復開欲急催征則勢難再急譬如縳手而求持縶足而求走也抑已難矣而年來征哱之費用過銀一百餘萬兩兩次征倭之費用過銀五百九十五萬四千餘兩征播之費用過銀一百二十二萬七千餘两鋪宫典禮之費用過銀三百六十萬餘两節年添進買辦共用過五百餘萬两入者如彼出者如此即全盛之世所不能堪而况今日乎老庫將窮京糧告竭太倉無過歳之支漕運有目前之阻九塞之兵動言鼓譟徐潁一帯近有掲竿從古以來未有公私匱竭如今日之窮者皇上聦明絶世事事周知試察臣兹所條有一字欺妄否臣部職守既奪既分臣尚别可措手否夫煩歛與惟正其需孰急此盈則彼虚其數甚明皇上誠穆然深思毅然立斷逺者臣不敢望第猶行十年前之政事而臣部得循十年前之職守臣所以待天下入者猶夫故也即所以備皇上出者猶夫故也内釋匱之之憂外弭叵測之變是在皇上一轉移間耳今朘剥侵漁民害已極支撑展轉臣計已窮臣之要領固不足言而皇上之金甌大寳臣亦不知其所終也憂危疏吕坤臣聞治亂之兆垂示在天治亂之實召致在人竊見元旦以來天氣昏黄日光黯淡占者以為亂徴當今天下之勢亂象已形而亂機未動天下之人亂心已辦而亂人未倡今日之政皆撥機而使之動助亂人而使之倡者也陛下知天子之所以尊乎輳天下之億兆生靈而處其上也又知億兆生靈之樂有天子乎頼其休飬生息以保我身家者也故曰君民一體休戚相關欲衍靈長國脉於萬年惟有固結人心之四字昔者二帝三王之為君豈不以崇髙冨貴之可恃乃曰四海困窮天禄永終者何知君身之安危社稷之存亡百姓操其權故耳故曰五帝愛民三王畏民盖世有幸亂之民四焉皆取天下者之所資而守天下者之所懼也一曰無聊之民飽煖無由身家俱困安貧守分未必能生世變兵興或可茍活因懐思亂之心以緩須臾之死二曰無行之民氣髙性悍玩法輕生或結黨而占窩開塲或呼羣而鬭鷄走狗居常愛玉帛子女為法所拘有變則刼掠姦淫惟欲是遂三曰邪說之民白蓮結社黑夜相期教主傳頭名下成千成萬越鄉隔省宻中獨徃獨來情若室家義同生死倘有招呼之首此其歸附之人四曰不軌之民懐争帝圖王之心為乗機起釁之計或觀天變而煽惑人心或因民愁而収結衆志惟幸目前有變不樂天下太平此四民者何代無之聖王約已愛民損上益下則無聊者歸恩無行者守法邪說者無所售其姦不軌者不得行其智四民皆我赤子一失其心而堕其計四民皆我㓂讐昔者元之疆土大於我朝未亂之先天下全盛我太祖以布衣单身提三尺劍唾手而得之者何四民之心前元失之而太祖収之也今日之人心臣何敢言惟望陛下擇其無益於國家有益於天下者収之而已請言収人心之大者數事可乎洮蘭之間氣寒土薄小民無計為生則織羢貨販以餬口自傳造以來數多限廹宫府散𣲖民間急於星火百姓苦於催逼遂棄農捻線者數十萬户工作者聚數萬人提花染色日夜無休千手經年不成十疋且是物也曬晾不早則白蛀即生風日太頻則紅色易落多積躭心乆積無益至於山西之紬蘇杭之紗羅叚絹歳額已自充盈加造豈因缺乏臣以為與其積於無用孰若定於有常假如四季袍服歳用千疋則見造一年預造一年是宫中省収藏之累歳歳見新天下無多取之憂人人樂辦且花様欲新則随時改造此處增數則彼處减機那借工銀將餘補乏此無損於陛下而有益于蒼生何憚而不為至於饒州磁噐西域囘青總是有餘不急之物徒累敲骨捶髓之民望陛下一切停罷而江南陜西之人心収内府宫庭自須大木而採木之苦陛下聞之乎臣自一木言之丈八之圍非百年之物或孤生萬仞崖邊或叢長千重嶺外寒暑渇饑瘟疫瘴癘而死者無論矣乃一木初卧千夫難移每日一祭神明每行不過數歩倘遭艱險之處跌傷壓死常百十人蜀民語曰入山一千出山五百苦可知矣至於磕撞之處豈無傷痕而官責民罰謂不合式依然無用重去伐山每木一根官價雖云千两比來都下民費不止萬金臣見川貴湖廣之民談及採木莫不哽咽且木能生火積乆易焚前年山西厰之災是已今大工木料既已報完採辦新林止需後用倘少其數目多其歳月减其尺寸增其價值而川貴湖廣之人心収山澤之藏本非山澤棄物但勅天下之寳當與天下共之礦也者藏天下大害於大利之中者也故軍國告匱則一開如嘉靖年間開湖南礦但勅該省撫按誰敢侵利殃民南陽等府數歳饑荒今日之民即前歳子食父肉人喫鷹糞陛下發銀賑濟之民也自報殷實户而民半驚逃自一切在官供應礦夫工食官兵口糧倚辦殷實户而民多累死鄖陽廵撫馬鸞前與臣書謂六十餘頃之地常聚十萬之衆文家洞近二千人開之三月止見砂十六眼銀之有無費之多寡可槩知矣伏乞勅下各省使臣嚴禁散砂不許借解但有侵奪小民揑害地方者必誅無赦而各省之人心収官店租銀理宜収解自趙承勲有四千之說而皇店開自朝廷有内臣之遣而事權重夫市井之地貧民求升合以活身家者也陛下以萬乗之尊何頼彼錐末之微財䙝此崇髙之大體乎且馮保入店為屋幾何而歳有四千金之房課乎解進之數既有四千徴収之銀豈止數倍不奪市民將安取足乎縱使内臣亷静不擾市民而長随之下各有長随掛搭之中又有掛搭强吞横噬獨占羣侵内臣何由知寃民何處訴夫楊村張灣南通省直北接都城天下咽喉之地也陛下鎻此咽㗋不及一年商賈不至緩急之用將安取給臣望陛下將两店内臣仍取囘京原坐租銀責令所在有司照數解進此一舉也而畿甸之人心收刑法者所以平天下之情服罪人之心者也應輕應重太祖既定為律情重罪輕列聖又增為例如輕重可以就喜怒之情則律例不為一定之法臣待罪刑部三年矣每見詔獄一下持平者多拂上意甚則加重而降司官從重者皆當聖心故司官每遷就以逃譴怒如近日李吉等本非把持也而必擬軍張澤等預納局料也而必欲追銀此皆真屈真枉臣等不敢執奏而陛下安知其寃臣願陛下俯從司㓂之平勉就祖宗之法而囹圄之人心収自古聖明之君豈樂誹謗之語然而下求言之詔賞直諫之臣者知天下存亡係言路通塞言官者朝廷之耳目也不可以不重也比年以來新進小生好矜名節遂激陛下之怒波及臺省之臣驅逐既多選補皆罷臣以為天閽邃窈法座崇嚴若不廣達四聰何由明見萬里陛下所聞皆衆人之所敢言者也其不敢言者陛下不得聞之矣臣望陛下思祖宗廣置言官之意為國家不為言官檢建言得罪之逐臣分别召用應復除者即與復除應行取者早為行取以後如有心行不端建白無當者勅下吏部分别降黜此亦足示懲矣何至禁錮於既徃杜絶於將來快濳伏之姦飬壅蔽之禍哉至於天下多故全頼官吏彈壓吏部用人本為計安社稷此其關係國家最急最重果吏部非人則聽科道糾彈即為罷斥果吏部得人則聽其推陞選取早賜施行庻練兵督餉者無廢缺之事候銓待補者無典賣之憂而士大夫之心収我朝敵國外患惟南北兩邊稱雄倭居大海之中豈能航糗糒豕突中原又豈能自浙閩蠶食上國哉惟是朝鮮附在東陲近吾左掖平壤西隣鴨緑晉州直對登萊倘倭奴取而有之藉朝鮮之衆為兵就朝鮮之地為食生聚教練窺伺天朝進則斷漕運㨿通倉而絶我餉道退則營全慶守平壤而窺我遼東不及一年京師坐困此國家之大憂也夫我合朝鮮是為两我两我尚懐勝負之憂倭取朝鮮是為两倭两倭益費支持之力臣以為朝鮮一失其勢必争與其争於既亡之後孰若救於未破之前與其以單力而敵两倭孰若併两力而敵一倭乎乃朝鮮請兵而二三其說許兵而延緩其期或言屬國逺戍或言兵餉難圖諺曰小費偏惜大費無益今朝鮮危在旦夕矣而我計必須歳月願陛下早决大事併力東征而屬國之人心収解京錢糧一物十費措辦既苦轉運尤難若於實用有禆則積貯何嫌過侈今十庫貨財各厰物料麄惡不堪者固有朽腐無用者更多上納歳歳堆積陳陳可惜倘每年一次查盤每夏三畨曬晾不堪者嚴濫収之刑朽蠧者重典守之罪變惡為美出陳易新但一年可備三年之資則本色暫改折色之解既不匱乏國用亦不暴殄民財陛下一留神則歳省不下百萬而解納之人心収京師者朝廷腹心之地也祖宗時嘗徙冨户以實京師以冨民者貧民依以為命者也今京師貧民不减百萬九門一閉則煤米不通一日無煤米則烟火即絶如有庚戌之事京師戒嚴雖有倉塲止足官軍守禦之用城中冨户正備緩急勸借之資今商人有預納之稱貸有鋪墊之常規一報在官百年不替而上冨貧自暴民聚衆凌奪姦民設機騙詐逰食者坐耗民財淫巧者誘奢民而中冨貧自各衙門印結之雜捕送之輕吏書貪如餓豺兵畨狠如翼虎無批票而稱勾攝本良弱而誣姦盗而下冨貧自房號重於優免之濫科𣲖苦於名色之多一身衆役一事衆害而貧者愈貧自抄沒法重株連數多坐以轉寄則並籍家資誣以多贓則互攀親識宅一封而鷄犬豕羊大半饑死人一出而親戚骨肉不敢収留加以官吏法嚴兵畨搜苦臣曾見之掩目酸鼻此豈正犯之家重罪之人哉一字相牽百口難解陛下知之當必憐之矣伏望省不急之上納禁監収之鋪墊嚴騙奪之刑重需索之罪清差役之繁定優免之則慎抄沒之舉而都下之人心収祖宗以來有一日三朝者有三日一朝有一日一朝者盖一人勵精則萬事嚴肅雖朝門宴閉早開誰敢興邪起妄陛下不視朝乆矣人心之懈弛極矣姦邪之窺伺熟矣守衛官軍虚應故事耳乃宫鑰仍舊早發諸人仍舊早進今乾清修造逼近御前軍夫徃來誰識面貎萬一不測何以應之臣望發宫鑰於平明放軍夫於日出自非軍國𦂳急慎無昏夜傅宣陛下豈不曰世宗晚年不視朝亦無外患乎顧今日之人心非昔日之人心惟陛下慎之章奏不批先朝間有未如今日强半留中盖疏之照入也㑹極有簿疏之進奏也外廷不聞萬一有國家大事邀截實封揚言於外曰留中矣外人知之乎萬一有詐傳詔㫖匿不封還揚言於外曰進繳矣陛下知之乎今陛下精明中官謹畏必無此事臣恐聖子神孫守為家法倘不逞為姦則何變不起臣望自今以後留中章奏每月御前發未覽掲帖一紙内開某人某人未及批下㑹極門轉發各衙門備照其繳還御札原本乞批知道了三字發該科備照庻君臣雖不面談而上下猶無欺蔽所關重大不可不防臣觀陛下昔日步禱郊壇發銀賑濟非忘民者朝無一事之壅疏無四日之下非怠政者乃今章奏半停民愁罔恤當此春秋鼎盛之年豈無夙夜憂勤之事患不冨耳自古帝王之求冨者亦多矣史册所載開巻可知陛下試觀其時治乎亂乎其君安乎危乎夫天下之財止有此數君欲冨則天下必貧天下貧則君豈䏻獨富故曰同民之欲者民共樂之專民之欲者民共奪之天下民窮財盡未有甚於此時者矣臣一㸃血誠籲天叩地齋宿七日抽思萬端難裁廹切之𠂻敬上憂危之疏陛下倘信臣將臣所己言者慨賜施行所未言者再加修舉移宫中之勤以勤庻政推利國之念以利蒸民將人心懽悦天意轉囘臣所言天下大計臣具疏未敢告人望陛下宻行臣言若出聖意乆留臣疏以驗將來臣日夜祈天惟願臣言不驗使臣言而驗陛下雖悔將何及耶明文海卷五十八
