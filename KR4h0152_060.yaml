body:
  text: 明文海巻六十餘姚黄宗羲編奏疏十四議改北岳疏沈鯉謹題為仰承德意請正祀典以隆聖治事祠祭清吏司案呈奉本部送禮科抄出廵撫大同地方贊理軍務都察院右副都御史胡來貢題奉聖㫖恒嶽祀典著禮部查明定議來説此臣等謹查得渾源州志内開恒山在州南二十里古北嶽也上有嶽廟陶唐氏所建舜時北廵狩至于北嶽值大雪遥祀之忽飛一石墜帝前名曰安王石乃建廟于大茂山又五載再廵狩其石又飛于曲陽復建廟于曲陽今州之恒山有觀乃唐武德中道士髙明素所建也又有洪武十二年重修古北嶽廟碑文内載渾源恒山為古北嶽自有虞氏嵗十一月北廵狩躬行望祀後飛石東遷卒建祠于曲陽歴代因之而恒山之祠廢不復舉是則北嶽之紀于渾源州志者如此及考得尚書禹貢冀州恒衛旣從註云恒水出常山郡上曲陽縣恒山北谷在今定州曲陽縣西北恒山也周禮職方氏正北曰并州其山鎮曰恒註云在上曲陽縣盖職方之并州即禹貢冀州所分也史記趙簡子藏寳符于恒山曰從常山上臨代代可取也註又云在上曲陽西北杜氏通典及文獻通考皆云定州曲陽縣北嶽常山在焉而通鑑地理通釋亦云常山在定州曲陽縣西北百四十里常水出焉盖漢置恒山郡避文帝諱改曰常山皆今真定也宣帝神爵元年詔太常寺祀五嶽四凟而北嶽在常山之陽即常山郡之屬縣也唐武德貞觀之制祭北嶽恒山于定州盖至唐復置恒山郡宋初縁舊制亦祭北嶽于定州漢碑不存無所于考唐宋碑刻具載北嶽祠事録則曲陽之祀北嶽不始于五代之際明矣元起朔漠正宜祀于渾源乃代祀碑記仍在曲陽迨至國朝洪武二年二月首奉太祖髙皇帝之命肇祀北嶽及三年六月降詔正名定為常典列聖繼統遵行無斁是則北嶽之著于曲陽縣者如此及考曲陽縣在隋為恒陽縣恒山在縣西北一百四十里渾源州元初為恒隂縣恒山在州南二十里山南曰陽山北曰隂或曰皆指恒而名未可知也後魏立五嶽四凟廟于桑乾水之隂考之北史盖其時建都平城因統祭嶽凟于此非因北嶽所在而専祀也又查得𢎞治六年七月内該太子少保兵部尚書馬文昇題為釐正祀典事該本部覆題北嶽恒山之神祀于曲陽自漢唐宋以至國朝上下幾二千年未之有改其渾源州雖有恒山亦名北嶽然祀典不聞碑志無考禮云凡祭有其廢之莫敢舉也有其舉之莫敢廢也今一旦廢此舉彼恐有窒礙奉孝宗皇帝聖㫖是欽此欽遵今該前因通查案呈到部看得廵撫大同都御史胡來貢題請改祀北嶽于渾源州恒山即命大臣出關祭告各一節除今次祭告己經題奉欽依無容别議外照得改嶽事體關繫重大據今所查反覆叅詳竊謂載籍雖博必折𠂻于經傳典禮至重難輕信乎傳聞今據本官所請固非無據第其引虞書魏史之文亦止言祭于恒山而未見恒山所在至禹貢恒水出常山郡上曲陽縣恒山北谷即今定州曲陽縣則恒山之在曲陽旣已明著于經文而漢神爵元年祠北嶽上曲陽唐武德貞觀祀北嶽定州則曲陽之祀恒山又非肇始于五代盖歴二千餘年而明禋如一日誠考據精確非漫然沿襲也其謂五代之後祭于曲陽者盖因宋失幽并遥祭北鎮巫閭山于定州北嶽祠中遂誤以為望祭北嶽耳至于渾源之稱北嶽止見于州志碑文而稽之經傳茫無可考想其紀載之辭亦出傳聞之誤即志内飛石等語在本官亦謂其不經矣而可據其文以改祀乎大抵恒山自大行東來綿亘千里同一分野在南在北皆可取名即以山之向背而言則祀于隂者終不若祀于陽者之為正也昔金世宗時議者以都燕請别議五嶽太常卿范洪力言其不可而止則改嶽之事自昔重之而先臣尚書倪岳所謂有其舉之莫敢廢之者誠千古之確論矣况我太祖髙皇帝神聖開天極重祀典當時山川地理無不圖上而曲陽之祀仍舊即今大明集禮所載漢唐宋北嶽之祭皆在定州曲陽與史俱合可見當時考核已自精詳二百餘年國有大事必行遣告豐碑鉅刻林立祠下則今恒山寔為畿内重鎮孕靈已久一旦毁廟貌廢碑刻舉而改建于邊徼之地竊恐未可輕易也而况在彼無稽在此有據又彰彰如是乎臣等再三酌議北嶽恒山之神委應遵依憲典仍祀于曲陽縣其渾源州恒山旣有洪武年間重修廟宇合無查照𢎞治中原題行該鎮廵撫衙門轉行彼處官司量加修葺用存古蹟庶為兩全但事關典禮臣等未敢擅便伏候聖裁議開泇河疏李三才議照河自開歸而下合運入海其路有三繇蘭陽道考城至李吉口過堅城集入六座樓出茶城而向徐邳是名濁河為中路繇曹單經豐沛出飛雲橋泛昭陽湖入龍塘出秦溝而向徐邳是名銀河為北路繇潘家口過司家道口至何家堤經符離道睢寧入宿遷出小河口入運是名符離河為南路此三路者近代以來河所遞行之道也較而言之南路雖近陵然有隋堤障其上有九岡十八窪隔其中有歸仁堤䕶其外于陵無害也第其北扼于山南近于淮倘淮流淤塞不逆流而上則潰隄而南是皆能亂淮亂淮則久之而淮亦淤淮淤而沮洳之患上及陵園矣且全河下宿遷徐邳運道不免告涸則南路者利不勝害者也北路雖近運然太行隄足障驚濤徐吕洪足東亂流且汶泗有接艘之利也第其下流徃徃潰堤堤潰而魚沛之間城郭夷牽路壊不直殃民亦且梗運則北路者利害正等者也惟中路則不南不北旣逺于陵亦濟于運有利無害稱全善焉前督臣排羣議而斷之獨合三省以興兹役亦謂得奠假今不惜大費必竟全功一勞永逸豈不休哉乃以資用乏工程減以故狂瀾已回下流復溢陵麓雖云亢爽運道尚在梗塞盖所得已多直全利未收耳然則今日為計也將若之何夫百四十萬之估冊具在也自堅城以至鎮口河形尚宛然也乞金于冏寺借力于省直完濁河之全功收中路之永利亦何不可之與有顧今之時非昔之時矣霪潦為虐人魚地沼非死而徙生靈盡矣且黄河之工不比運河官估其一民費其二估冊之五十萬即民間之百萬不啻也以財盡民流之時興勞民傷財之役坐見運畚荷鍤之夫立成揭竿斬木之衆彼時噬臍其有及乎故挑濁河者議之所不敢出也若是則復賈魯之河走符離之道挑王所樓竟小河口南路通而北流折不旣稱便事乎顧是道也不加隄防而任其漫流以分水則可大肆開挑而縱其奪河以亂淮則不可盖黄堌之新㫖尚可以理奪而傷陵之隠禍寔難以逆覩此宜熟察而緩圖未可輕為而嘗試者也然則守行隄開泇河事所必出無容再計矣夫黄水已逼太行扼隄以守此謂禦門庭之㓂救剥膚之災計不旋踵豈俟問哉惟是泇河之役向來數議竟成畫餅談者恐以為疑乃臣等則以為其善有六而其不必疑有二今之稱治河難者謂徃代止避其害今且兼資其利故河由宿遷入運則徐邳涸而無以載舟是以無水難也河由豐沛入運則漕堤壊而無以過牽是以有水難也泇河開而運不借河有水無水第任之耳疏瀹排决皆無庸矣善一黄河者運河之賊也用之一里則有一里之害避之一里則有一里之利以二百六十里之泇河避三百三十里之黄河二洪自險鎮口自淤不相關也善二河之當治固不問其濟運與否而皆不容已者也顧運借河則河為政河為政則河得以困我當不憚勞費而治之運不借河則我為政我為政則我得以相河當熟察機宜而治之夫熟察機宜之與不憚勞費也其利害較然覩已善三先年估全工以三百九十萬估半工以二百六十萬即朱尚書開新河百四十里費亦以四十萬也今直以二十萬開二百六十里比之全工則二十之一比之半工則十之一比之新河亦事半而功倍者也善四江之北山之東患水極矣老弱轉乎溝壑壯者散而之四方矣召募行而富民不苦于賠窮民且得以養春荒而役興麥熟而人散以仲淹之隄湖代汲黯之發倉此即國計無禆計猶且為之也善五糧艘過洪約在春盡盖畏河漲之為害耳運入泇河而安流逆浪早暮無妨過洪之禁可弛叅罰之累可免即運軍不至以趕幇失事所全多矣善六運不借河則河防遂疎恐遂恣横流而沼鳳泗也奈何夫開封歸德上下千里未聞濟運不兼治河何也彼直為民禦災而若此矣何况乎為陵捍患其何防之敢疎無疑者一徐州天下咽喉處也奈何一日而令其索莫荒凉安所稱重地乎夫太王遷岐盤庚遷毫第審利害安問重輕且徐沼于河直湏時耳徐民安土重遷聞泇河之役且刺心隠痛曰奪其利也此如蛾赴火蠅趨餳大利在前害不暇顧一日而洪水暴至城沼民魚悔之晚矣泇河開而徐城之貿遷化居者必且移之泇口必且移之沿口上下即土著者利所不在必且擇髙土而居之即使水能破城必且為魚者少此為曲突徙薪于徐而出之罟獲陷穽者也無疑者二故泇河之開無俟再計而知其可行者也查初估二十萬再估石礓水工備加三萬幇培太行隄估至七萬總之可三十萬及查應支錢糧徐庫文剰漕糧變價與廬揚貼夫銀益以省直嵗脩之餘並預備嵗修多寡及解到與否皆不可必然總之不及三分之二再量碾州縣倉榖及請留東省見年兑運漕糧十萬石庶幾僅僅足用不敢妄意内帑也國本䟽史孟麟臣惟冊立大典貴協輿情羣言僉同即為至論自正月二十六日聖諭甫下人心悚惶卿僚大小諸臣前後數十餘疏蓋以必不可行之事創見于今是以大不得已之心共激于義誠思聖覽未遍封章撮其總歸條為問答竊佐萬年之計敢希乙夜之觀問曰元輔王錫爵所擬待嫡封王聖諭是乎答曰非也朝廷舉動必守祖宗家法而為後世慮深逺祖宗朝東宫無待嫡之條元子無封王之例重儲貳先正名繫人心也乃不立長子今日而待嫡于將來欲令皇長子與皇三子皇五子並封為王輕國本紊名分壞祖宗家法遺子孫隠憂無大于此問曰信如東宫不待嫡元子不封王則世廟晚年不建太子而皇考穆宗以裕王登極斯何以稱焉答曰查得嘉靖十八年二月朔冊立元子為皇太子第二子為裕王即皇考第三子為景王是皇考非以元子為裕王同太子而封王者也皇祖蓋立太子于初年非晚年而猶不立也是豈可為待嫡封王者例乎問曰然則祖訓立嫡之文何以答曰詳讀祖訓法律全文曰凡朝廷無皇子必兄終弟及湏立嫡母所生者庶母所生雖長不得立若奸臣棄嫡立庶庶者必當守分勿動遣信告嫡之當立者務以嫡臨君位朝廷即斬奸臣按此乃藩王入繼大統如皇祖故事非繼體承祧者比援之則悖祖訓也臣下引之則誤皇上也且嫡長並重有嫡立嫡不聞無嫡而待嫡無嫡立長不聞有長而虛長必若無嫡待嫡者乎答曰藩王有之祖訓職制條曰藩王嫡長子年及十嵗朝廷授以金冊金寳立為王世子如以庶奪嫡輕則降為庶人重則流竄逺方如王年三十未有嫡子其庶子止為郡王待王與正妃年五十無嫡始立庶長子為王世子是藩王待嫡之例也問曰親王可以待嫡而東宫不可以待嫡何歟答曰是祖宗憂天下之深也宗藩無民社而重統緒重統緒故長不可先嫡無民社故嫡可待而世子可緩至于朝廷則不然天子為宗社生靈主太子副天子為宗社生靈主儲位不可一日虛天子不可一日無副故帝王即位即立太子嫡子未生即立長子誠謂前定可以守法不前定則爭且亂安危係之耳且考之藩制元妃之後有子不復繼室繼選之妾有子不復稱嫡即藩王何嘗不重長哉今以東宫而援繼統之條天子而襲藩封之例其遵祖訓耶非耶無乃非祖宗憂天下之心乎問曰嫡之不可待既得聞命矣元子不封王亦有説乎答曰有天子繼體之𦙍稱子稱孫故名皇太子皇太孫若曰以子孫而承祖宗也非爵之也别子則王之王必繫之以地蓋爵之官而胙之土俾稱藩臣今皇上繼體者元子也不可爵其可王王則卑元子亦卑皇上皇上所有天下皆元子有王之則當以何地王之故皇三子皇五子可封而元子必不可王也問曰允若此則元輔所擬聖諭誤矣其所引元子拜嫡之説或可權宜行之而奈皇上不聽何答曰非也誠皇上所謂非光明正大之道也盖中宫敵體皇上有子則已子為嫡庶子為庶無子則凡子皆子而長子即嫡何待拜而後子乃為太子耶秦異人之拜華陽漢惠后之子少帝典冊所著指為厲階奈何以秦漢一二偶為之事為國朝創一家法貽後世利㓜抱養之釁耶問曰是無難知然則皇上曷為而權宜元輔曷為而曲引廷臣曷為而固諍皇上曰被誣元輔䝉謗意其有隠情歟幸畢其説答曰皇上元輔之意廷臣何能知顧連署而爭累章而懇非為皇上一身非為元子一王非為輔臣一㫖誠恐作法自今流弊無已倘自此以還代無嫡出則代無東宫長子非太子則凡子皆太子矣寧保無詐稱遺詔更為賜書如趙髙之禍秦者乎寧保無貪立㓜年禁中定䇿如閻顯之禍漢者乎寜保無積愛成嫌投懐希寵睥睨儲位如魏王泰之伺承乾乎寧保無秘語不售搆獄株連危言惑上如李林甫之誤𤣥宗乎寧保無片紙出宫中乘其倉猝援立所厚善如司馬光之所慮者乎寧保無羣小窺伺耳屬于垣樹功藩邸如李泌之所懼者乎有一于此誰任其咎試使皇上而念及必不忍子孫有此元輔而念及必不忍皇上有此廷臣而念及必不忍皇上聖明元輔膺眷相與計安宗社而有此獨目前計也乎哉而觸忌諱甘斧鑕以爭也問曰然則奈中宫何答曰祖宗朝立長者非自今矣長子不過數嵗即立立時中宫俱在盛年而當時不聞以嫡母壓長晚年亦不聞以嫡出兩儲宫闈中自有家法皇上豈不明之則以一時宫闈之情較之萬世宗社之計理則不敵忍于萬世宗社之計而不忍于一時宫闈之私情亦不敵皇上豈宜以此貽子孫元輔豈宜以此誤皇上易曰主器莫若長子傳曰國有長君社稷之福孔子曰名不正則言不順言不順則事不成賈誼曰天下之命懸于太子太子之善在于早諭教叔孫通曰太子天下本本一揺天下振蕩奈何以天下為戱屈建曰楚必多亂一兎走于街萬人追之一人得之萬人不復走楚多寵子而嫡位無主亂自此生魯漆室女曰吾憂魯君老太子㓜魯國有難身必與焉夫處君臣父子兄弟之間不據理執經明大義以杜禍始而徒以中宫為解以封王為權待不必然之嫡遲十二齡元子冊立之期壞祖宗二百年一定之法是忽主器悖正名緩教諭之義啓振蕩之端無漆女憂魯之心而犯屈建逐兎之戒拂人心誤國計甚矣問曰然則何道而可答曰昔宋太宗謀建太子于寇凖凖對曰陛下為天下擇君謀及婦人中官不可也謀及廷臣不可也唯擇所以副天下望者太宗首肯而仁宗立英宗為太子韓琦力贊不疑帝竟付中書行不使宫人與知願皇上如太宗仁宗之斷元輔盡㓂凖韓琦之忠從外廷羣臣之望則宗社幸甚天下幸甚明文海巻六十
