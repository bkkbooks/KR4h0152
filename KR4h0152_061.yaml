body:
  text: 明文海卷六十一餘姚黃宗羲編奏疏十五劾方從哲疏孫慎行臣以待罪家居杜門七八年不敢一聞世事值皇祖皇考相繼賓天勉隨諸臣匍匐哭臨哀號無地傳説紛紛謂皇考速逝雖云夙疾實緣醫人進藥不密一時形迹可駭可疑覩邸報有鴻臚寺官李可灼進紅丸兩丸乃原任大學士方從哲所進凡進御藥須太醫院官呈方并傳示天下藥咀片須一一揀點明白恐致失誤可灼非用藥官也丸不知何藥物皇考病證相宜與否又不知何如而乃敢突然越職以進春秋許世子進藥于父父卒世子自傷與弒不食死春秋尚不少假借直書許世子弒君然則從哲宜何如處焉速劍自裁以謝皇考義之上也闔門席藁以待司寇義之次也而乃宴然傲然含吾支辨至滿朝攻可灼僅票回籍調理豈以已實薦灼恐與同罪夫已可灼可愛而皇考反可忍乎又豈以已實忠愛不知為罪夫許世子以死愛父尚不能自明而從哲之愛皇考于何處明乎且我朝列聖賓天曽有大臣薦藥事否乎臣以為縱無弒之心却有弒之事欲辭弒之名益難免弒之實實録中即忠愛深心欲為君父隱諱不敢不直書云方從哲連進紅丸藥兩丸須臾上崩恐百口無以為天下萬世解矣且從哲所不能解者非獨此也先是則有傳皇貴妃欲立皇后事夫祖制未有以妃為后者古今亦未有帝崩立后者貴妃寵幸數十年皇考英明絶未嘗有楚歌楚舞欷歔態即數日彌留之際尚不能因緣徼幸而突傳此旨不知何因觀禮部疏云內閣輔臣方從哲傳其言可味可思若非禮部執爭諸科道力責貴戚而貴戚隨上章請免幾何不誤立皇后貽禍宗廟社稷以受顧命元臣而視非常大變若漫無主持一任可行可止事成則已操其重何所不為即事不成亦已任其恩無所復忌此從哲不能為天下萬世解者其事一也先是又有議上諡稱恭皇帝事議諡旨雖下部然擬進者閣臣部不能主也夫宋之恭端已係將亡衰主臣又考晉主降宋其亡也宋諡為晉恭帝隋主降唐其亡也唐諡為隋恭帝周主降宋其亡也宋諡為周恭帝以皇祖四十八年升平天下平緬平寧夏平倭平播功烈無前豈無他美懿可稱而下比降王逋裔若非言官預糾便應如議以上天下何忍傳稱皇上覽觀前史何忍為念豈真不學無術至此謬盩實乃詛呪君國等于辨髦此從哲不能為天下萬世解者其事二也自後又有選侍欲垂簾聽政事夫選侍在宫中何知前代有垂簾大變事即劉遜李進忠么魔小豎何遂膽大揚言言者以為遜進忠隔嵗業偷珠寶藏之從哲家此事曖昧從哲即未肯承認然以受顧命元臣曽不聞慷慨一言若非九卿言官急請移宫選侍一日得志皇上幾無駐足所髙皇社稷將不血食可為寒心聞彼時從哲濡遲不肯進科臣拉之以進請移宫又不肯急請以為遲數日也無妨已又欲急退科臣擋之以住大叱曰你豈做李家官喫李家飯如此光景豈可堪聞任婦寺之縱橫而特佐其焰忍沖主之􅑾杌而不與其憂此從哲不能為天下萬世解者其事三也以此三事例彼進藥此是非易了相臣所宜極擔當之事一切茍且泄沓彼以利害叵測相臣所宜極慎重之事無端勇猛嘗試夫進藥猶可自為忠愛而三事尚可自為忠愛乎此又臣于從哲終始反覆深維不能為解者也臣在禮言禮每舉一事其罪惡逆天萬無一可生之路若在吏言吏罔上行私在兵言兵督戰悮國在刑言刑縱情蔑法其敢于犯天下之大名義釀成社稷之大禍患者章不啻公車滿臣亦不能悉數也即在禮言禮亦就鼎革間一時事若其他罪惡逆天萬無一可生者臣亦不敢深數也大都從哲挾私任術寡亷鮮恥有威有力不以之奉公家而以之趨私門有智有謀不以之捍外侮而以之戕國脈春秋無將漢法不道真無以過凡此皆羣臣所極口急攻亮皇上素所痛心飲恨者也然第退其人而不加之罪臣知皇上英明洞照神武淵謀未嘗一日而忘也直以大寶初登羣情未定而從哲又狙張多機傾嚇中外皇上雖有除凶雪恥之思正在含垢匿瑕之際羣臣雖有借劍攀裾之義不無憑城倚社之虞今亮隂將終大禮畢就宫闈寧謐羣賢布列溥天喁喁無不望皇上急討國賊臣惟癰疽不決後必大潰積蠧不去終當極壞今正決疽去蠧時矣臣為是抱憾已久夙宵不寧一承恩召便欲叩叫帝閽發憤畢誠祗緣兩足廢裂跬步難前有懷至今臣覩皇上大孝閎仁追蹤堯舜貴妃選侍優待各得可謂仁至義盡無容言矣惟是從哲貰而不問何以雪不共之仇慰皇祖皇考于九天何以彰不軌之罰銷姦臣逆賊于異日伏乞皇上大奮乾綱赫然振怒毋訪近習近習皆從哲所攀援也毋拘忌諱忌諱即從哲所布置也立下臣章令九卿科道從公詳議如臣言有當乞將從哲大正四放之罰速嚴兩觀之誅并將李可灼嚴加拷問置之極刑如臣一言無當即重治甘心焉臣知此疏一出身無處所矣明文海卷六十一
