body:
  text: 明文海卷六十三餘姚黃宗羲編奏疏十七救錢閣學疏黃道周臣執筆九載未效纖塵猥以編摩分光桂海臣退而感泣思人臣致身自一命而上皆有微勞足塞瘝曠而臣獨無有又流覽古今自一代主臣必有二三蹇諤照耀中外而今諸臣亦皆無有是臣所慨然興歎也嘗觀舊史稱臺省諸臣自劉瑾摧折而後不敢言事者一十四年然而大禮議起百僚廷爭不避鼎鑊雖人無灼見而梗概頓挫各自可觀未有一往莫違大小收聲共託默容至於今日者也臣素泥古初出山不知世上經權何似不知羣臣值明主媕阿何故竊觀比來逮繫舊輔錢龍錫拳梏鋃鐺對簿法庭搶首獄吏羣臣相視啞無一言此自書傳以來所未經見也尚古不具論秦漢而下窣相有犯坐請室不過數日自非大逆或裁或原人主未嘗不為引痛也今纍輔所坐昏庸疏率為罪督攀緣耳督臣受劍制閫外忘君忘親僨事誤國雖磔裂莫贖閣臣坐綸扉遙度邉事不知能否成敗浪浪叩頭此於鬼薪城旦奚加乎先是輔臣髙拱嘗以邉功得廕錦衣堅辭不受曰吾身未嘗至疆場而受上賞即一旦有敗何所逃誅臣疑其言以為不忠由今而觀未謬于先見也凡疆場事最難言勝負相倚一彼一此今閣臣以邉事坐誅後之閣臣必顧盼躊躇不敢任邉事又令邉臣得以瑕罅卸閣臣後之邉臣有事必托閣臣隻語單詞為質則是使綸扉之內割邉牆為殊域也自古窣相生值明時無大故而伏斧鑕者惟漢劉屈氂及先朝夏言耳漢武帝決意空漠南心疑丞相墜北伐之師故一旦破法而戮屈氂世宗決意棄河套心疑開釁撓玄修之事故一旦破法而誅夏氏今東疆之圖未有定算恢復之計上下持疑未有一男子據案而斫騎牆之案者獨斷然決意于一纍輔纍既無斂碁引杯之致廷臣又無蹴芻齒馬之嫌遂使三台灰溺于貫城斗柄銷光于理勢每見衣冠相語以目不曰不敢言則曰那得歸天下人心衰颯如此誰復挺脊梁擔安攘之略者乎為治無多端大要不可使外輕內下慢上賤破貴今巷議謬悠謂殺纍輔為毛文龍報仇朝廷自為神人攄憤何曾計一罪辨然物情既如此則邊將必驕邉將志驕則閣臣權絀故殺一閣臣為毛文龍報仇猶可為劉興治樹幟則不可借一閣臣為邉臣今日示前車則可為政府異日開後阱則不可且自陛下御極以來輔臣負重譴者九人矣一代之間寧有幾窣輔而三年每降愈下至此當堯舜盛時嶽牧舉鯀貽禍滔天浮沉九載能無事迹往來放殛之餘未聞嶽牧係纍而煩臯陶之聽也人臣事主自以堯舜為師秦漢而下有何足法陛下即欲整齊羣臣敷求言功不過倣虞廷故事令諸廷臣各陳時政考詢屬省因而澄之何材不服即欲威柄獨運操縱海宇但乘輯瑞之期雲日在望綱舉條貫别貴賤辨輕重親渙德音俄頃釋滯嘉與更始使天下噩然誦如天之仁神不殺之武何必囹圄憤盈孤卿駢首令四方傳者謂天朝獄吏甚貴士紳甚賤乎今天下漸多事人心漸散彼此顧望胥怨一方臣閉户半生獨立無徒於萬物無所畔羡臣而不言誰當言者臣于纍輔未有三刺之投一揖之雅然度其人中人耳殺之不足明威而徒有損於國且今流寇方張四郊多壘決無內訟毛帥以外鼓劉帥之理倘天下遂無才臣不揣請以鉛刀從事倘纍輔罪猶可贖臣請輟清華厯疆場視要害約束東江收拾遼廣誓得一當橫原草以為纍輔減千一之死臣非不惜身家不愛通顯誠不忍當聖明之世抱頭容默與螢草同腐使後世鯁士笑當時無人臣手疏溢額席藁待命不勝戰栗之至明文海卷六十三
