body:
  text: 明文海卷六十五餘姚黃宗羲編奏疏十九直陳三大可惜四大可憂疏華允誠臣最駑下濫更清秩固守拘諒無禆聖明昨以母老乞休情迫呼天罔知違例特蒙聖慈矜宥感激涕零中夜循省既無寸長可以自效若復耽榮愳禍依回容默有懷不吐君親兩負何以為人竊見三四年來皇上焦勞於上羣工百執事鞅掌拮據於下匆匆孜孜日不暇給而法令滋章臣民解體人材蕩盡根夲受傷此臣所謂可惜可憂者也以皇上聖德加之厲精何難手握大權坐躋至治乃當事諸臣借皇上剛嚴而佐以舞文擊斷之術借皇上綜核而騁其訟逋握算之能遂使和恆之世競尚刑名清明之躬浸成叢脞以皇上圗治之盛心為諸臣鬭智之捷徑可惜者一人臣典幹展采止此精氣今但以窺瞷微指為盡心抉擲細故為快意乃至率屬大僚驚魂於回奏認罪封駁重臣奔命於接本守科直指風裁徒徵事件長吏考課惟問錢糧遂使官守言責止歸牒牘之繁吏治民生盡成鉤較之務以多士修職之精神為小夫趨辦之能事可惜者二今何時乎非大小臣工同舟遇風之時乎而廟堂不以人心為憂政本不以人才為重四海漸成土崩瓦解之形諸臣但有角户分門之見意見互觭議論滋煩遂使佹剿佹撫等於築舍忽用忽舍有若舉碁以興邦啓聖之日時為即聾從昧之舉動可惜者三人主所以總一天下者法也今雷霆所及幾莫知其方矣喪師誤國之王化貞何以與楊鎬異辟潔已愛民之余大成何至與孫元化並逮甚而一事偶誤一言偶咈執訊隨之反使輕猾者不以扞網為懼而矜矯者且以對吏為榮刑罰不中鈇鉞無威可憂也國家所恃以為元氣者公論也今直言敢諌之士一鳴立斥指姦薦賢之章非訐則黨不惟不用其言并錮其人不惟錮其人又加之罪遂使諸臣相戒拱默喑塞求容是非共蔽忠讒互淆可憂也國家所賴以為防維者亷恥也今大臣握重權大官而有徒𨽻之心小臣惟望氣占風而鮮特立之概近者中使一遣妄自尊倨與之抗衡者僅二三人耳其餘奔走期會惟恐後時詰曲趨承猶虞獲戾皇上以為近臣可倚而不知幸竇已開以為內臣可惟吾操縱而不知其屈辱士大夫已如此矣貪競成風羞惡盡喪可憂也國家所藉以進賢退不肖者銓衡也古者丞相之職實兼今之閣部權大重而易以為姦國朝罷設丞相於是用人之職吏部掌之而閣臣不得侵焉今閣臣兼操吏部之權而加膝墜淵惟其所欲以朝廷黜陟而供報復之私會推公典兩手握定而私人遍布勢日傾乎南北封疆重寄一味遊移致覆轍相尋憂獨遺於君父甚至庇同鄉則逆黨可公然保舉而白簡翻為罪按排正類則講官可借題逼逐而薦剡遂作爰書皇上惡諸臣之欺欺莫大於此矣皇上怒諸臣之擅擅莫専於此矣皇上厭諸臣之黨黨莫固於此矣威福下移而舉錯倒置姦焰薰灼而正氣消靡可憂也臣區區之心願皇上尚德緩刑用賢去佞勿以至神至聖之資為臣下所誤勿以治人治法之大為姦回所牽勿過用嚴而使士氣人心日趨於頑懦勿偏為任而使名流善類永錮於清時使臣言得行即治臣以出位僣言之罪臣有餘榮即臣母亦無遺憾矣請贈官三孝亷疏陳子壯題為微臣巡方事竣敬舉真忠節真孝亷仰祈聖明鑒裁賜諡贈官以勸忠臣以維士習以彰聖化事儀制司案呈奉本部送崇禎七年十月初十日禮科抄出巡按蘇松等處監察御史今降職五級祁彪佳題前事內稱朱紈長洲縣人生三日遘家難即與其母繫獄後賴有司白其寃稍長為諸生孤苦自立正德間成進士知景開二州俱以亷惠幹濟稱擢南駕部備兵四川威茂時以平深溝諸部冦功歷廣東左布政使又以剿平獞賊進都御史撫南贛移撫閩浙時沿海姦民與畨舶通因緣為姦利而以大姓豪家為主紈拜官請便宜從事及視事斥去貪汚者數人窮治通海舶者批根豪右剪除無貸提兵平漳州同安冦移師定海屢破島夷又大破賊於溫盤南麂諸洋以忤時數上捷僅得一拜賞後悉平佛朗機黑白二畨舶俘其酋及餘衆四百餘有言其為變者紈下令誅渠魁為言者誣劾削職聽勘紈讐嫉墨吏大猾以為必死嘆曰吾家無一錢且數負氣節安能對獄吏遂仰藥死陸粲長洲縣人連科選庶吉士以不謁謝權貴遂出為工科給事中感激受命三日聞邉警即上言兵事又請開𢎞文館與博聞有道之士講論政事優太學舉貢諸生途與進士並復上四事曰久任使慎考察汰冗官復制科言事無所避忌時法司與厰衛獄互異粲力持法司議遂下獄踰月杖而釋之復劾輔臣張孚敬桂蕚并及諸要路夜草疏鬼嘯於庭粲大言曰我男子死耳疏不可已嘯乃寂疏入罷二輔臣直聲震動會有以蜚語聞者復下獄謫都勻驛丞遷永新令平寃獄擒劇盜杖殺土豪以母老致仕歸十八年不通朝臣一字郡邑罕覩其面葉茂才無錫縣人生而孝友痛母早逝每館歸坐卧父側時刻定省萬厯己丑成進士授刑部主事三月告南迎養改工部分榷蕪關盡革他稅不留一錢差竣上羡金數千疏曰久早得通故有羡金請不為例蒙賜白金松布以旌異改南吏部郎中再請告歸起禮部郎中歷升太僕寺少卿家十五年至是始一出時言者議論異同抗疏相關且纍疏乞休又七年起太僕太常少卿皆不就升南京工部右侍郎到任三月即致仕布衣蔬食以終其身居僅有堂三楹妻安人老而織紡以給饘粥及與同志講論道德切磋不倦無片紙入公門雖小夫稚子無不知其清節張基吳江縣人中嘉靖庚子舉人例得坊金散宗黨略盡會試時有顯者欲為道地堅謝弗應是年擬魁選竟爾落第父卒孝事祖母上南宫時忽念祖母病遽爾返棹自是遂謝應舉究心為己之學所著有孝經附注讀書疑獨鑒廣頥數十卷隆慶初詔采山林隱逸撫按彚薦力辭不應歲大祲賑米數百斛屬軍興族皆任役不忍獨以例免為請代於官毁家紓之産盡弗顧學既有得預刻亡日至期趺坐而逝歸子慕崑山縣人中萬厯辛卯舉人為文苑名臣有光子少喪父讀遺書必捧之而泣母疾衣不解帶者數月少具勝情若不可一世及有得於晏坐默存之學其學専於訟已過若創痏刺心毫不假借以是遘疾嘔血雖制義妙天下竟絶意進取不與衣冠之會不詣府縣不受當路問餽不為子弟應試干請雖甚貧養其兄子之孤者養其弟婦之寡者自處無不得之言與人無不足之色里俗皆化之甫強仕以前疾卒朱升宣吳縣人中萬厯壬子舉人念父母老一再公車往返不踰百日乙丑心動馳歸歸則父九十尚無恙而母氏甫七十康養旬餘遽卒識者謂誠孝所感自此遂絶意計偕設榻疾父之側凡一菜一糜以至中單厠牏之類靡弗親者與先臣周順昌為總角交順昌中璫禍時小民號呼稱寃徂擊緹騎閣郡震恐多避難獨陛宣周旋於左右後以親殁拮據喪事不得辦致患噎膈卒以身殉孝門下從逰百餘人多一時譽髦會殮之日相向哭失聲已上在忠節三臣徑骨不容膚功早建孤忠九死回天之諌草猶香恬退一生獨對之衾影無愧在孝亷三臣學修已底純全志行毫無餘疚高文懸市士人皆挹其丰神至行飭躬賢者獨欽其藴藉是真輿論允合國人曰賢者也伏乞聖明鑒裁敕部覆請忠節者賜之諡典孝亷者贈以官階奉聖旨該部知道欽此欽遵抄出到部送司除朱紈等賜諡應俟咨訪另議外其張基等贈官一節查得往例以撫按薦舉由孝亷蒙恩授官者如萬厯二十一年正月江西舉人劉元卿授國子監博士鄧元錫授翰林院待詔萬厯二十一年二月四川舉人來知德萬厯三十八年十月湖廣舉人瞿九思並授翰林院待詔俱奉欽依在卷夫同一舉人生者之潛德既行旌敘則死者之幽芳似更宜優恤事例固可援也等因案呈到部看得蘇松巡按御史祁彪佳所舉孝亷已故舉人張基歸子慕朱陛宣三人殁有久近其行事亦有互異而大都孝以為經文以為緯讀書明理守身事親皆有志於古人而無同於流俗鄉里共髙其誼紳襟咸以為賢者宜按臣之聽採而臚舉以請也案查舉人繇薦授官往例具在未有贈職於身後者國家名器固所當嚴乃其人往矣非有月旦之依附徑路之汲引也其光焰不足以熱人而直道不泯潛德猶芬擬授官之典於論定之餘似為較愜伏惟敕下吏部照劉元卿鄧元錫等例各贈一官銜以為好修者勸蓋於三舉人身後所得者不過虛名而於今日士風世教所禆者即為實效矣伏惟皇上裁奪施行糾內臣檄謁疏金鉉奉為監臣移檄非體微臣瑣言漸驗伏乞聖明立賜申飭以全士節事臣於十月二十三日具疏懇止總理太監建署蓋惟恐以此開交結之漸決亷恥之維所爭甚大非止為糜費無益也臣靜候綸音不蒙批發未幾而建署之舉卒行矣此在聖明自有裁制臣不敢補牘強聒乃昨見臣部司務應傳總理太監張彛憲信牌內開本監公署已完擇於初七日上任所有兩部司屬官吏人等謁見一應儀注合照部堂體制會同斟酌妥當逐欵詳開先期呈報臣見之不勝驚異夫彛憲之遣皇上原使之監視兩部出入錢糧未嘗假以堂屬相臨之體也今彛憲移檄曰司屬曰合照部堂體制是明欲驅清署之臣羣然屈節於奄寺試令彛憲自思皇上敕諭中曽有是乎抑祖宗典故中曾有是乎且彛憲銜猶司禮職則監視原與巡視之體制相等惟是貪墨侵欺一任覺察若必欲亢顔昧心妄自尊大以皇上迪簡之臣子而令其磬折傴僂將置自有之堂屬别行僭妄之儀去不易之公庭強抑刑餘之下則彛憲殆儼然以卿二自命其意不知以何者處諸臣矣不亦羞朝廷而辱當世之士耶況從此結納奔趨彼則日驕此則日諂干憲典而壞士風有如臣前疏所云者其流弊可勝言哉臣委質聖明自矢無玷生殺豫奪惟君父命決不敢匍匐於彛憲雄踞之庭致罹交結之條也伏望皇上俯採臣言立勑彛憲勿謬以部堂之體自居并飭兩部諸臣勿輕以司屬之體自褻公署雖置決宜絶迹不相往來止以錢糧文册移會稽核庶國體正而士風伸矣臣無任惶悚待命之至崇禎四年二月初六日具奏初九日奉聖旨內臣總理錢糧各官遇有職事相關自當禮見其餘不必通謁金鉉亦不必借題激陳該衙門知道明文海卷六十五
