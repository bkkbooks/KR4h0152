body:
  text: 明文海巻六十六餘姚黄宗羲編詔表一定嶽鎮海瀆名號詔王褘詔曰自有元失馭羣雄鼎沸土宇分裂聲教不同朕奮起布衣以安民為念訓將練兵平定華夏大統以正永惟為治之道必本於禮考諸祀典知五嶽五鎮四海四瀆之封起自唐世崇名美號歴代有加在朕思之則有不然夫嶽鎮海瀆皆髙山廣水自天地開闢以至於今英靈之氣萃而為神必有受命於上帝幽微莫測豈國家封號之所可加凟禮不經莫此為甚至於忠臣烈士雖可加以封號不惟當時為宜夫禮所以明神人正名分不可以僭差今命依古定制凡嶽鎮海瀆並去其前代所封名號止以山水本名稱其神郡縣城隍神號一體改正歴代忠臣烈士亦依當時初封以為實號後世溢美之稱皆與革去其孔子明先王之要道為天下師以齊後世非有功於一方一時可比所有封爵宜仍其舊庶幾神人之際名正言順於理為當用稱朕以禮祀祀之意故兹詔示咸使聞知進書表胡廣伏以六經之道昭如日星經緯乎天地貫徹乎古今放之則彌六合巻之則退藏於宻用之於身而身修行之於家而家齊推之於國而國治施之於天下而天下平蓋世必窮經而後道明未有舍經而能治理者也是以聖王垂憲必資道以開人賢哲肇基必稽古以作範故伏羲則河圖而演畫大禹因洛書而錫疇孔子刪詩書修春秋寓一王之法周公陳王業制禮樂𢎞百世之規況乎精一執中之傳尤重丁寧告戒之㫖如斯顯跡昭然可觀自王道既衰異説蜂起燔烈秦火之餘穿鑿漢儒之弊其間存者不絶如絲莫能究其指歸一切趨於茍且夤縁故習鮮克正之於乎聖人之道不行而百世無善治聖人之學不傳而千載無真儒遂令往轍之難尋益發前修之永歎夫否必有㤗晦必有明繇夫濓洛闗閩之學興而後堯舜禹湯之道著悉掃蓁蕪之蔽大開正學之宗不幸屢阨狂言即揚復抑又因循數百年之間卒莫能㑹其説於一蓋必有待於今日者矣天啓聖明誕膺景運太祖髙皇帝天縱之聖以武功定天下以文教興太平首建學校頒賜書籍作養人材茂隆政治四海内外翕然同風欽惟皇帝陛下文武聖神聰明睿知纉承大統紹述鴻勲成功盛徳雖三皇而無以加事業文章與二儀而同其大治已至而猶以為未至功已成而猶以為未成體道謙冲遊心髙逺乃者渙起宸斷修輯六經恢拓道統之源流大振斯文之委靡發舒幽賾鉤纂精𤣥博采先儒之格言以為前聖之輔翼合衆途於一軌㑹萬理於一原地負海涵天晴日曒以是而興教化以是而正人心使夫已斷不續之墜緒復属而復聨已晦不明之藴微復彰而復著肇建自古所無之制作纉述自古所無之事功非惟偹覽於經筵實欲頒布於天下俾人皆由於正路而學不惑他岐家孔孟而户程朱必獲真儒之用佩道徳而服仁義咸趨聖域之歸頓回太古之淳風一洗相沿之陋習煥然極偹倚歟盛哉竊嘗觀之周衰道廢汲汲皇皇以斯道維持世教者惟師儒君子而己未有大有為之君能倡明六經之道紹承先聖之統如今日者此皇帝陛下所以卓冠百王超越千古者也臣廣等一介書生粗知章句大學賢闗渾未造其閫奥圓冠句履固慙列於章縫幸逄熈洽之時謬忝校劘之任每受成於指教亦何假於施為樂覩就編曷勝歡慶與天下而同恵於萬古而有光尊所聞行所知求不負於教育正其誼明其道期補報於昇平無任瞻天仰聖激切屏營之至謹奉表隨進以聞擬進大明一統志表丘濬伏以並日月以照臨千載啓大明之運全天地所覆載萬邦咸正統之歸輿圖之廣曠古所無地志之成於今為盛粤自三才定位歴代迭興封山濬川舜肇十有二州之地列爵分土周㑹千八百國之君迨夫嬴秦始置郡縣繼以劉漢益拓土疆自魏晉以來由宋元而上或閏位之弗齒或霸業之偏安或威令之阻行或恩徳之未洽皆未有若我朝得國之正闢地之大者也徳與地而兼廣政與教以並行南都吳北都燕立標凖於四極大為府小為縣總要㑹於三司藩府分封並峙維城之固衛所布列廣宣禦侮之威規制周嚴氣勢聨屬南踰銅柱東越鯷波盡入版圖之内西亘金河北彌狼望率歸聲教之餘殫九服於域中通八荒於化外青羌黑濮遙候月以來賔黄支朱鳶畢占風而受吏禹迹之所不至章步之所未周地無間於華夷治獨超乎今古不有盛製曷彰丕圖粤若帝王受天命以建國皆有載籍志地理以貽謀於虞有禹貢之書在周有職方之典方冊所載若管氏地員吕覽有始百家之傳説不同館閣所修若元和郡縣開寶圖經一代之典章可考寰宇記之作於宋畧有未明大統志之述於元泛而失實肆我聖祖嘗命儒臣雖采録之有餘尚編輯之未既時如有待事豈偶然恭惟皇帝陛下聰明首物神聖自天膺厯數以在躬收政權而獨運光昭祖武𢎞迓天休凡聖賢經世之圖咸留睿覽於祖宗待成之志尤軫宸𠂻謂此輿地之書闗係甚大特詔文學之士纂述是司授成命於九重考遺編於千古上自聖經賢傳下及水志山經發中秘之所蔵萃外史之逌掌遍閱累朝之史旁蒐百氏之言與夫羽陵宛委竒文汲冡酉陽逸典𤣥詮梵藏小說方言靡不網羅舉皆蒐采綴貫羣籍約為成書義類凡例悉有據依信疑是非壹加訂正首辨方州之域次推星野之分建置有革有因疆界或分或合如水自源而徂委如木由榦而分枝山川形勝之殊風俗物産之異巨細不遺公署學校之類宫室闗梁之倫古今俱載留則民愛去則民慕宦蹟非循良不書出而道行處而道明人物惟名賢是取非徒儒道而二氏兼收不獨華風而四夷亦附所以廣聖道之咸容示皇威之無外比之前志允謂全書綱舉而目張有倫有要事增而文省不泛不疎海内廣輪如指掌而斯見天下險易不出户而可知自有地志未之前聞宜並聖經垂之後代此誠皇上繼志述事之孝卓冠乎百王髙出乎千古者也臣等章句腐儒草茅賤士叨䝉拔擢豈能如楚左史之讀九丘忝効編摩竊自比晉司空之創六體莫能稱詔深虞玩愒之尤幸覩就編少助清間之學闕書同文車同軌大一統而四海嚮方天為蓋地為輿中闕間而萬世永賴進歴代通鑑纂要表李東陽臣某等恭承先帝勅㫖纂修歴代通鑑纂要今已成書謹奉上進者臣東陽誠惶誠恐稽首頓首上言伏以世有古今史冊鑒興衰之迹聖無先後文章昭作述之光事或因舊以為新體則似輕而實重司存纂輯道切規箴寧辭寸晷之多圖効萬分之一洪惟孝宗建天明道誠純中正聖文神武至仁大徳敬皇帝陛下徳運堯天聖躋湯敬求多聞於古訓發渙命於羣臣謂先儒綱目之書本明正統顧上古帝皇之世未稡成編下逮宋元尤多巻帙盈箱充棟實繁四庫之藏旰食宵衣豈有三餘之暇親分義例預錫名稱寒暄閱二載之期朱黒更數人之手攀龍髯而莫逮撫蠧簡以増悲不敏是慙無功可録兹蓋伏遇皇帝陛下英明出類剛健居中上同舜哲之重華下軼啓賢之繼道實録方修於金匱餘功載續於汗青非徒撮要以刪繁抑亦要終而原始政必稽其得失行必著其忠邪詞雖省而事已該人既往而言獨在博采諸家之斷略致品評間陳一得之愚代為講説法多從舊理貴折𠂻不求敝力於難知務期開巻而有益肇呈首帙進讀經緯漸底終篇告成寢廟臣等或躬承神授或續奉宸音心微河嶽之涓塵識陋海天之蠡管治鑑開英皇館局而成於神宗之朝政要本貞觀君臣乃輯於開元之世矧兹庸劣詎免稽遲幸惟往責之粗償敢詫前時之未有伏願聖不自聖益𢎞作聖之功新乂日新茂著知新之效考治亂存亡之故為賞刑黜陟之規主善為師豈謂借才於異代建中制事用能垂裕於後昆謹以所修歴代通鑑纂要九十二巻目録凡例一巻共六十冊隨表上進以聞重進大明㑹典表李東陽伏以有謨訓以貽子孫垂萬世之燕翼觀㑹通以行典禮昭百世之鴻規蓋非天子則不考文然惟孝者為善繼志粤自結繩政代契託書傳象魏法陳理同家喻制偹於周官之後經傳於秦火之餘漢模略定乎三章唐式僅頒乎六典大典垂於宋而光嶽弗完經世紀於元而彛倫攸斁當天心之厭亂屬聖主之開基峻徳神功彌綸宇宙宏綱大法敷賁臣民文皇紹統於昌期列聖承休於奕葉政由俗革道與治同中間或斟酌以隨時大抵皆後先而合節顧夫簡編穰浩條貫繁多彼宿儒老吏亦不暇詳豈僻壤遐隅之所能徧故博學貴乎知要必㑹極然後歸極欲圖文獻之足徵須及典刑之尚有昔我孝皇之志實惟英廟之遺上遡累朝仰稽烈祖謂一代之制在諸司職掌之書或更定於暮齡或増修於繼世發石室金縢之秘徵兩京百府之藏儀文每據乎舊章義例特施乎宸斷命官分局開六館以編摩類事歸曹備百年之損益蓋自洪武戊申之歳迄於𢎞治壬戌之秋既挈領以提綱亦刪繁而就簡體之重者雖微必録令之善者雖寢亦書庶幾愛禮以存羊非敢按圖而索駿文取達而不勝乎質信可傳而寧闕其疑制異典墳宜於今而不泥於古法殊紀傳叙其事而不録其名標題榮華衮之褒序簡煥雲章之錫告成雖乆刋布未遑恭惟皇帝陛下煥有堯文緝熈湯學兵民利弊以次罷行禮樂章程悉加釐革特令臣等重訂是編當巻帙之粗成荷奎文之載賜獻諸天府副在有司期言之必有可行俾習矣而無不察譬則麗空之宿一舉首而在目中合轍之車不出户而通天下臣等才輕襪線識小甕天功不厭詳貫惟仍舊拂塵掃葉深知校閱之難測海窺天詎免遺㤀之失伏願上念宗祧之重大下知稼穡之艱難主善為師任賢立政惟一心之克恊罔庶獄之攸兼不愆不忘率祖考憲章於有法可乆可大配乾坤徳業於無疆謹以校大明㑹典一百八十巻合凡例共一百冊隨表上進以聞進元史表宋濂伏以紀一代以為書史法相沿於遷固考前王之成憲周家有監於夏殷蓋因已徃之廢興堪作將來之法戒惟元氏之有國本朔漠以造家用兵戈以爭强并部落者十世逐水草以為食擅雄長於一隅逮至青吉斯之時大㑹鄂諾河之上始尊位號漸定教條既近取於奈曼復逺攻於回紇渡黄河以蹴西夏踰居庸以瞰中原太宗繼之而金源為墟世祖承之而宋籙遂訖立經陳紀居重馭輕肆宏逺之規模成混一之基業爰及成仁之主見稱願治之君惟祖訓之式遵思孫謀之是遺自兹以䧏聿號隆平豐亨豫大之言鼓倡於天厯之世離析渙奔之禍馴致於至正之朝嬖幸蠱惑於中權姦䝉蔽於外漢網秪因於疎濶周綱遽至於陵夷風憲皆為不捕之猫將士盡成反噬之犬由是羣雄角逐九域𤓰分風波徒沸於重演海嶽竟歸於真主中謝欽惟皇帝陛下奉天承運濟世安民建萬世之丕圖紹百王之正統大明出而爝火息率土生輝迅雷鳴而衆響微鴻音斯播載念盛衰之故即推忠厚之仁僉言實既亡而名亦隨亡獨謂國可滅而史不當滅特詔遺逸之士欲求議論之公文詞勿至於艱深事迹務令於明白茍善惡瞭然在目庶勸懲有益於人此皆天語之丁寧愈見聖心之廣大於是命翰林學士臣宋濂待制臣王褘儒士臣汪克寛臣胡翰臣宋禧臣陶凱臣陳基臣趙壎臣曾魯臣趙汸臣張文海臣徐尊生臣黄箎臣傅忠臣王錡靡不網羅嚴加搜采恐翫時而愒日每繼晷以焚膏故於五六月之間成此十三朝之史況往牒舛訛之已甚而他書參考之無憑雖竭忠勤難逃疎漏若自元統以後則其載籍無存已遣使而旁求俟續編而上進愧其才識之有限弗稱三良兼以紀述之未周殊無寸補臣濓忝司鈞軸幸睹成書信傳信而疑傳疑僅克編摩於歳月筆則筆而削則削敢言褒貶於春秋仰塵乙夜之觀期作千秋之鑑所撰元史紀三十八巻志五十三巻表六巻傳六十二巻目録二巻通計一百三十萬六千五百餘字謹繕冩成百二十冊隨表上進以聞進歴代通鑑纂要表張邦竒臣某等伏奉先皇帝勅㫖令修歴代通鑑纂要書成進呈者臣等誠惶誠恐稽首頓首上言道有常經貴諗從違之實治多異法恒階興替之原顧鑑龜已定於前人而考卜宜精於今日不觀往轍曷啓前途欽惟皇帝陛下天挺英資日新聖學率由祖訓繼緒無忝於成康敷求哲王成功逺期乎堯舜臣等叨陪講幄忝職儒班先皇不鄙其庸愚明命畀司乎纂述分曹秘閣發册石渠窮念豐芑之遺實注情於簡䇿而涓埃之報敢忽意於編摩矧慙襪線之才無補衮職之闕庶采前古之迹可資乙夜之觀爰惕爰兢胥勤胥勵欲備一代之典盡搜百氏之書自髙辛以來史凡十九由故元而上年歴數千其間編簡之龎茸與夫文辭之棼浩雖専門之士或不及詳豈萬幾之餘所能悉覽顧事貴得要故泛載於書契之餘者雖詳或去然道欲無遺則傳文於結繩之上者雖逺亦書春秋以前本聖經之斷例威烈而下宗綱目之法程旁逮遼金法遵今史咸臻實録豈曰傳疑規模體統之詳尺楮或稽於百代侈剥興隆之故片時可昉乎萬年昔漢儒說苑之編事非大要唐相金鑒之録辭不萬言核實若歐陽容有未闡之㫖博洽如司馬不逃輕信之譏備而不繁約而無晦徧觀列史莫便此書是皆先皇之克開而有望於陛下之善述者也然制方雖存乎古用藥則由乎人茍捐網以臨淵雖羡魚而焉獲㐲願慎終於始圖大於微主善為師動止罔愆乎成憲克念作聖陟降如見乎先皇定命訏謨務俾與治同道遏惡揚善永期應天時行臣等無任瞻天仰聖激切屏營之至謹以所修歴代通鑑纂要若干巻隨表上進以聞聖駕臨幸太學謝表林文俊國子監祭酒臣林文俊等嘉靖十二年三月十三日欽䝉聖駕臨幸太學謹奉表稱謝者臣等誠懽誠忭稽首頓首上言伏以典禮更新百代仰大君之有作辟雝臨幸四方占泰運方隆載舉曠儀聿光舊典懽均朝野慶洽天人兹蓋伏遇皇帝陛下聖由天縱徳與日新彛倫叙而五典以惇禮樂興而百度咸正況兹首善尤在留神黙契聖心大祛俗見謂孔子稱王本非禮宜正先師之名陋元人塑像為不經特遵皇祖之制别祠啓聖聿明父子之倫配食先賢盡去公侯之號禮無僭瀆道益尊崇顧兹典之鼎新煩至尊以賁重當薄海同文之日適踐祚一紀之初乃涓令辰爰修盛事六龍捧御逺戾止於膠庠萬乘執圭親奠釋於先聖崇儒重道稽古諏經喜溢章縫光流簡冊執豆邉以奔走乃有三氏之子孫圜橋門而聴觀奚止六館之英俊瞻威顔於咫尺奉法語之丁寧建皇極以敷言斯其至矣觀人文以成化是之謂乎臣等職忝師儒躬逢盛美幸覩大人之虎變願先多士以駿奔賜坐而講易書覺叨榮之已過教人必先忠孝誓圖報於將來伏願配乎天配乎地皇朝綿一統之圖作之君作之師天子介萬年之夀臣等無任瞻天仰聖激切屏營之至謹奉表稱謝以聞明文海巻六十六
