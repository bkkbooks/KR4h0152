body:
  text: 明文海卷六十八餘姚黃宗羲編碑二施義烈廟碑周鼎皇明成化十有一年春桐村牧預修杭州府志按舊志載宋殿前司後軍帥施全義烈事全挾刃於道候秦檜入朝遮刺之不中送棘寺檜引問曰汝心風乎曰我非心風舉天下欲復仇汝獨不肯我故殺汝遂磔於市太學生為立碑伍胥廟前碑近亡嗟夫豫讓欲手刃趙襄子而襄子殺讓全欲刺檜而竟為檜所磔二事同也然有大不同者智氏之亡無足為天下輕重使讓之志行僅快其在我者之恩仇耳使全而獲行其志焉則金人猶將曰南朝有人無所恃而肆諸將勤王之師必不由中而沮大姦去而天心自回士氣自奮父兄之讐有可復之機中原不至於板蕩而莫之為也二子之義烈皆足以千古不死使事功或成讓其亞於全矣矧智伯以國士遇讓而讓以國士報之公義私恩固兼盡焉全此舉純乎公義非有所私報於嶽武穆也抑武穆之國爾忘身大有所感發歟張巡許逺之同日死者皆巡逺有以激勸之耳全之事乂同此也太學生亦將以天下之大義激萬世之同有是心者歟惜亡其姓氏無考杭父老嘗祠全於碑所祠壞而附祀於伍廟左廡廟毁於往嵗甲午今與鎮海樓城隍康張諸廟皆次第新作為補此記與劉邦彥議刻諸石亦志乘中所不可少者也懷賢弔古之士每致意於嶽祠而於全無一言焉牧此記可不作乎有官君子治民事神其毋以文辭視之南樂縣倉頡廟碑銘邵寶南樂侯王汝昭為邑之明年改建倉頡氏之廟廟成樹碑中庭以麗牲焉因刻嵗月而屬寶書之寶未嘗習古文其何敢執筆於斯惟頡為黃帝史臣實始造鳥迹之書厥後變為古文古文變籕籕變而大篆而小篆而𨽻𨽻之變為真為行為草由今之真行草而視古文則逺甚矣然其形聲之類皆頡之遺也顧雖不敢抑何能忘贊頌哉夫頡始制文以代結繩萬世宗之宗之則宜祀之然而后稷以穀勾龍以土萬世通祀而頡也不與嗚呼頡而上有伏羲氏伏羲氏八卦文之肇也頡而下有仲尼氏仲尼氏六經文之成也頡之功孰與二聖故萬世知二聖之功頡不與焉豈其下於稷與龍哉或曰微頡斯文亦有制者世運之相承不得不然頡奚其功雖然頡為之是頡之功也况飲食必祭示不忘本古之道也而操簡握管記事立言者獨可以不知頡乎物原其初事究其所從始頡既不得通祀兹其故邦廟其可不崇王侯之政於是為大矣侯名德無錫人銘曰維魏之西維衛之東有神斯功曰倉頡氏維文之宗侯行其庭慨其蕪落仍而有作宫以妥神贊頌在碑惟頡之功惟天之機惟物之象惟民之宜前羲後尼建立三極頡於其間亦克有力相彼鳥迹在古猶今頡神雖亡其存者心斯宫斯享尚時歆之漢愍帝碑邵寶世有存之足以為亂賊之戒者君子存之有不毁則無以懲夫人而示天下後世者君子必毁也於其毁也而有所易黜其不正以歸於正者君子則以義起焉此皆關於萬世之綱常而不專為往事之褒貶蓋天下之公論而非一人之私心也古今篡竊之雄首稱曹魏其惡有不待論者始其為禪受也實在許之繁城寶在領郡得達觀其故都有壇焉曰禪受皆誇詡之迹有碑焉曰禪受皆矯誣之詞千載而下指而笑之讀而唾之者不謀同心不和同聲此所謂存之足以為亂賊之戒者存之可也其地有廟焉以祀魏文南面帝服儼然臨之雖易姓改物彼亦有不能泯者然當其親為篡竊之地而舍此與彼則凡彼之所謀以欺後世者今皆墮其智計之中吾恐先儒筆削之旨終託之於空言而亂臣賊子將益無所忌此所謂不毁則無以懲夫人而示天下後世者毁之可也壇固存也碑固存也而獨毁其廟則他日必有復舉以奉之者卒亦何貴於此舉動哉謂宜易所祠以祠漢之愍帝而其臣孔融配焉彼以其新此以其故若將驅而逐之撥而反之使姦雄之徒不得一日立乎其地此所謂於其毁也而有所易黜其不正以歸於正者以義起焉可也愍之孱弱勢同寄生然猶天下之君也融雖義廣才踈而忠言義色至不容於賊操亦足以愧夫北面稱臣上表勸進者矣帝不稱獻而稱愍從昭烈所諡且漢之君非魏之所得諡也凡此皆所謂以義而起者嗚呼君臣之分有大防焉順逆之際有大法焉彼姦邪之所不敢動於惡即動焉猶必有以文之豈獨懼夫天下之將攻之哉亦以大防大法之所在雖後世有不得而逃也若曹氏之於漢是也然當時郡國之中既無一人仗義執言揚旗伐鼓以討其篡竊之罪而在廷在野又無一人登西山蹈東海以明大義於天下蓋畏威附勢無足怪者至於後世之君子亦以空言無補因仍茍且視大防大法而不一顧念焉抑獨何哉存其所宜存毁其所宜毁而易其所宜易此吾輩讀春秋學孔子者事也况職在守土乎是故寶雖不敏不敢讓雖不韙不敢辭吳郡治水之碑王鏊今天下財賦多仰東南東南財賦多出吳郡而吳郡於東南地最下最多水患南方夏秋之間最苦多雨蘇湖渺然輒成巨浸故官多逋負民多流殍於是在廷之臣爭言水利而以吳淞白茆港為首請設官專治時巡撫應天等處都察院左副都御史西蜀李公方著名績詔即委之進太子少保工部尚書得便宜從事公奏是非臣一人所能獨理詔復以工部都水郎中林君文沛顔君如瓌往佐之公奉詔感激思奮欲為國家建東南無疆之利博訪羣策相度源委謂東南諸水咸匯太湖太湖由三江入海而三江久失故道東江不可復尋獨婁江尚在吳淞江雖在而多涸其别出一支分從常熟白茆港入海最大且駛而海沙閼塞久成平陸民且屋廬墳墓其上自成化以來每議開之輒畏其難而止𢎞治中徐侍郎貫濬之不能深廣旋開復塞以大勢論之太湖吞納衆流猶人之腹白茆吳淞則尾閭也陽城昆承華亭諸處猶脈絡也尾閭不泄腹且䐜脹為病四肢百脈無不病者將事之初橫議紛起或謂水旱天數非人力可治或謂治之復塞徒費且勞或謂濵海地勢髙卬鑿之覆引水入內為患公皆不聼曰我知奉詔行事耳民固可與樂成不可與慮始乃駐節湖上且行且度度地賦功量功賦役仞淺深計逺邇力多賦諸近財分取諸逺而蘇獨任財才之半廬舍有次樵㸑有所分授以責成時犒以行賞天時晴和法令明一衆心競勸率未明興作入夜未巳河上燈攢如星臿奮如雨歡呼之聲數里不絶不數月功告成矣初白茆自北達於江河形詰屈不可復通乃改就東南挑平陸直注諸海自雙廟至東倉通一萬七千三百九十二丈其深一丈五尺闊三十三丈白茆上流又開尚湖昆承陽城湖各隘為塘為洪為港為涇為漊者凡十有九又於宜興濬百瀆武進無錫濬桃花港龍蕩九曲城墅河江隂申港利港橫市河皆文沛所理也吳淞江上流頗通利自夏駕浦至舊江口僅如衣帶不復容舟因其舊形廣之深之自夏駕浦至龍王廟江口凡六千三百三十六丈其深一丈二尺闊十八丈又於湖州濬大錢小梅七十二漊吳江濬長橋一帶引湖水散澱山等湖崑山濬趙屯太盈道褐等浦其為浦為港為涇為洪尤多皆如瓌所理也白茆港口海潮日至沙泥易閼則為石閘一陽承湖水至斜堰分流七浦塘則可少殺白茆之流又為堰一夏駕浦新洋江吳淞之交橫引江水斜趨婁江則吳淞勢弱不能蕩激易淀且閼乂為石閘一蓋疏宜興湖州諸閼水歸太湖無礙則常之宜興武進湖之烏程歸安松之華亭可無水患濬吳淞白茆之閼太湖之水入江海無礙則蘇之長洲常熟崑山可無水患而吳淞白茆之役最大功費尤多始事於正德十六年十月嘉靖元年四月訖工是役也為工凡四十一萬二千五十三銀為兩若干米為石若干費亦大矣雖然天下之事成之難隳之易故曰功者難成而易壞者也東南之水古人治之多矣至國初則又壞故夏忠靖治之正統間則乂壞故周文襄治之景泰中則又壞故李侍郎敏治之𢎞治中則乂壞徐侍郎貫治之則今日之功又安保後日之無壞乎保而勿壞則在後之人焉勿廢疏瀹勿惰啓閉勿縱豪強勿規小利所以保之也豫家於吳嘉公之績之有成又欲其久而不壞也刻碑河上以示後之人銘曰清濁肇奠勢東南傾萬流趨之赴於滄溟厥趨未至太湖是匯三江分流朝宗斯沛神禹之績萬世攸賴三江既洇水乃潰溢大浸稽天傷我稼穡當寧患之命我今公許以便宜為朕司空公來湖上詢民之瘼白茆吳淞三江故迹故迹久閼河則為虐乃經乃謀乃疏乃鑿萬夫子來其集如雲勞民以佚勞乃不勤三閼既疏百川來同吳民歡呼司空之功公曰何功奉詔之旨古亦有言行所無事無事之事民乃奠安刻碑河上以視不刋旴江書院碑李夢陽旴江蓋古有書院今莫考其址今之書院則廢東嶽廟而為之者曰旴江者存故也豫按江西郡縣江西故楚地其俗好鬼而尚巫於是至所按郡縣則令毁其鬼祠顧郡縣吏不皆才毁之率亦不大力也今年冬十有一月豫至建昌府安知府奎公廉而端厚趙推官漢志超厲而力向往南城知縣楊清亦慎密人也聞豫言一日而毁其城內外鬼祠盡蓋十有五處十四處小為社學乃其一為今書院云書院屋議更置為廟為堂為齋為閣為號房為垣為門為坊擇士集而講習是廟故入租一百三十八石七斗又鳴山廢廟租八百五十四斗今其田悉歸之書院即以膳集習者書院址東西一十五丈五尺南北二十七丈五尺民居犬牙入者如其直取焉諸所總之知府奎責成推官漢而同知何恩通判蘭斌又咸克慎襄厥嘉事豫始至建昌也訪度其土俗乃喟然而歎曰嗟乎豫今乃知利之為禍之大也蓋其土俗重賈而輕業儒其言曰夫賈出本而入息嵗有程算相當即不偶不甚逺夫儒者勞費而效逖者也即中科第有官職富田宅衣馬庇耀其族黨然遡其供膳積費不償所亡矣况未必皆有官職也信如斯言則業儒者亦利耳可畏哉夫儒者讀書明理道辨義利者也是故居則事其父兄入學則隆師而親友有官職則行所學以事其君今謂儒一切圖他日田宅衣馬而為是業誠賈之不若矣何則賈以利名者也儒者名固義也實則利其終也至於無君父師友兹其禍不可畏哉豫既令創其書院擇士集習於中復書其土俗於碑俾遊於斯者覽焉知吾之業非為有官職圖田宅衣馬茍志田宅衣馬莫若從其俗為賈毋混處以禍吾儒子遊言公祠堂碑桑悅吾邑子遊言公北遊而學孔子之道得其文學一體以歸為東吳興文學之祖大江而南萬世尸而祝之攸宜宋慶元間孫君應時窣吾邑增廟於學宫之東後令王君爚加意存其後人其廟纍代修輯至今惟祠之於家者或有興廢繫時與人何如本朝巡撫工部尚書周公忱及健令甘君澤皆鼎新之後燬於鄰災四明之慈溪楊侯子器由名進士知邑事至任拳拳以稽古崇德為事於公之胤周其學歉婚其未匹既為屋數楹以妥公神仍置田若干畝資延世祀祠成公之六十四代孫江以記求豫言豫觀應時嘗求紫陽朱子為之記凡公髙弟聖門與能過化於吳大略朱子言之巳詳豫何敢贅一辭獨公在當時以文學名獲居四科之列公之所為文學者當以為鄉之後人告易曰觀乎人文以化成天下何如其文也孔子曰文王既沒文不在兹乎是故聖人學文於天地賢者學文於聖人文學以經緯天地為極自非聖人莫能與乎斯文也然則公之文學又何如其文學哉觀其為學必欲知本燕居必論禮取人必以正大治人必用禮樂故朱子謂其敏於聞道道即吾夫子聞道是聞夫子然則公之文學乃入聖師文學之階梯又豈止言語文字而巳哉若曰孔子作春秋筆則筆削則削遊夏不能贊一辭是又以言語文字為文學也以言語文字為文學特藝焉而巳耳所以漢唐諸書以儒林文藝分為二傳抑彼揚此意深有在杜子美詩亦曰文章一小技於道未為尊若公之文章誠可謂道德傳聞者果可以小技目之歟今去公二千餘年而世之名為儒者不過餔啜簡册二尺四寸之糟粕為出入口耳四寸之妙用就使其文其學華藻如相如勤篤如元凱亦畫餅充飢曷足以窺聖學之一斑而况識淺謏聞之士稍能呼風喝月抽黃配白即以小才自恃渴思吞海狂欲上天不復知身心為何物甚至剽竊章句惟取掇拾科第而止以是謂之文學寧不有玷公之文學乎學公之文學必以求道為主等而上之見道卓爾則顔子之文學在是由是優而遊之不知由之乃孔子之文學也嗚呼是可一蹴而至否耶人能學公之文學則不死公之心庶幾齋心以祀公者無窮而凡暗室屋漏之中明窗淨几之下皆為廟公之祠宇者矣古稱王謝崔盧謂之髙門然則為公之子孫者則又何如茍能不墜家學之傳斯為公之佳子孫以是為一瓣香為五十席為十七物以供以獻猶為過之而今日之梁棟亦可化萬間之廣厦大庇學公之徒也豫辱與公為後進雖願學孔子而景仰於公者自丱角以至白首亦非一日故記公之祠遂述公文學之實以勉鄉之人并公之後人亦因以自勉平蠻碑桑悅皇帝治天下七載四方寧謐惟西廣巢賊屢經斬艾蘖芽稍茁時復陸梁永安生獞成萬攻圍州治且結搆修仁荔浦等邑沿府江惡黨阻截江道軍民大擾監察御史林公廷選巡按廣西堅於用兵自新不忒遂會議馳驛奏聞命下爰整六師期旦夕吹氛爭先是年三月守興安指揮麻林諜報湖廣武岡之楊岡苗二千餘出抄掠居民列營於西延石溪千戶唐瑛總甲葛明鑑迎敵而殞虜益鴟張林公即檄副使武君清督行都指揮事指揮楊觀嚴兵於魯塘咸水諸處分布乂欵熟猺於要地賞罰嚴明人奮其勇右布政司黎君福僉事王君本儉又協相其間斬首三百級生擒一百五十諸苗賊逺遁一方底寧至冬遂舉永安之師總鎮太監王公敬總督都御史閔公圭總兵伏羌伯毛公鋭又同林公俱臨平樂駐劄昭平總計三廣官軍狼兵達軍民欵多寡分為四哨會委副總兵郭君鋐副使武君清統兵從荔浦洗府江西岸諸村左參將毛君倫僉事劉君信從五屯除西鄉諸賊巢自象州修仁直掃六洞等穴則屬之右參將歐君磐參議吳君昭自廣西盡平府江東岸等地則畀之遊擊王君永僉事王君本儉乂調僉事黎君鼎巡賀縣截漏逋會遊擊侯得雋參政徐君鏞繼饋無缺乏僉事陳君烓閲視紀功惟謹其西東水陸攻城北面恐賊覔途潛逸則别令副使向君榮指揮楊觀背腹夾攻設網既密脫目者寡太監張公瑄又輸資助軍究心贊畫克成厥功共破村寨巖洞一百八十處斬首六千級奪回被虜男女四千四名口俘獲賊屬及賊器械俱無算我師大捷無亡矢遺鏃之患四月二十六日班師攻各巖洞凡險阻莫上歷代為賊長城率不可拔者熏搜扒擊今皆化為虀粉惟郭武所分通天巖賊憑髙下矢石我師攻圍月餘其固如故今總督右都御史唐公珣初下車即星馳至平樂督戰益力衆勇智俱奮巖遂破時郭巳擢漕運總兵去軍歐繼郭為副帥奉唐公區畫經理府江無不順流豫觀我朝命將出師有事南夷其功莫偉於是也初功將成閔公巳擢南京刑部尚書之任自出師而旋其間運籌進討核實功次委任得人勸懲有道無不用命用是賊衆數十年螯虐之患一旦盡平謂非林公始終其功耶東漢大將軍竇憲既破胸奴當時威靈氣熖亦必烜赫宇宙不旋踵野煙沙草磨滅殆盡班固為作勒燕然銘有斬溫禺釁鼓戮石逐膏鋒之句藉此轟震千古若林公者集羣䇿協衆力平蠻之功無愧於古可以紀述以見我朝武功之盛挾雷霆而共迅配日月而並明者哉宜磨桂山之石勒豫言以傳之不朽銘曰自古南夷或臣或叛充國董威新恩彌亂有如孔明生擒孟獲有如狄青崑崙夜克永安接壤四面生夷漻漻府江化為鯨鯢文武協謀分哨進討無險不登無堅不搗少壯誅死僵尸如麻髙巖漬血凝帶殘霞獻馘連連千牛行酒宜築京觀以懾羣醜邊患底平其功何屬曰惟柱史終始提督捷音聞朝天喜滿容定膺爵賞以示褒崇昔漢竇憲大摧胸奴燕然勒銘孟堅秉筆歐詩南獠韓疏黃家我勒斯銘昭代之華馬平縣儒學科甲題名碑桑悅唐虞之才出於推薦周始行鄉舉里選之法鄉大夫貢賢能之書王祭司祿而受之藏於天府今鄉會二試登名者有録蓋昉於此唐時登進士第者題名雁塔宋立進士題名石刻於禮部國朝又立之於胄監京師所為四方標凖若然則府州縣學重刻本學科甲之名以見人材之盛以為山川之光非以義起者歟馬平科甲代不乏人號小莆陽宋景祐間甘君翔又嘗一占掄魁實為嶺南文獻之邑大明洪武初賢才益盛非郡學可容因各建學以便絃誦自是進士則有蕭君文秋元則有計君宗道其地得雋發解每大比不下數十人分入郡學成名者乂在格外縣令潮陽鄭君碩掌教賔州宋君逺司訓蒼梧李君升等懼本學先後登一第者其名久而湮滅相與伐石題名以圖不朽求豫詔之以言夫人之名文詔之然響隨呼滅是故常人之名不出十里君子之名能揚四海聖賢之名能傳千古今則勒之於録刻之於石非可揚可傳之一事歟嗚呼莫堅於石然石之刻於人者有盡莫脆於人然人之刻於石者無窮曹娥郭有道峴山等碑炙野火而礪牛角化為朽壞巳久今則因其人而思其石矻然拄空者常存是非人之能刻其石耶子曰古之學者為巳今之學者為人文中子曰古之仕者為人今之仕者為己諸君子仕學之間一毫天理未純人欲未盡則見之事業公焉而揉之以私王焉而雜之以霸又安能光明俊偉以示天下後世哉學必為己仕必為人明德新民兩造其極夫如是則於名也欲離之而愈合欲逺之而愈近吾知今日之石雖細書之而遐邇共睹大莫踰焉雖淺刻之而嵗月不磨深莫踰焉斯石之遭如何傳曰往者不可諫來者猶可追諸君盍共勉之頊等進曰班孟堅作勒燕然銘韓昌黎作送李願歸盤谷記柳刺史作柳州東亭記當時畢刻於石今石皆何在若此者不可枚舉兹又因其文而思其石則又刻石於文者斯石之遭不在先生之文乎豫應之曰不敢當不敢當當與諸君交相勉平香爐山碑周廷用貴陽清平東北四十里有山曰香爐巉巖岌嶪髙出萬仞諸山環列若戈鋋相向連亘三四層鳥道攀緣而上上可容百萬人煙雲出沒合沓蜿蟺不可名狀望之者皆以為窮地之峻極天之險有一人荷戟萬夫趦趄之勢劔閣孟門靡曰固鎮我明正統間苗有韋同烈者憑阻作昏以張狠戾朝廷命徂征七月弗克勉以撫順班師正德丙子春叛苗阿傍阿肉阿皆阿義諸黨扇行妖孽復據舊巢列柵數十里掠集粟稻堅利鋒刃以拒大順意靈誅或可逃也守臣以事聞天子憂焉乃下司馬議當勦上臨軒授敕曰爾巡撫右副都御史鄒文盛往即乃任總理調度維撫維勦以生貴人爾鎮守太監李鎮離爾城守協心翊輔罔或誕慢以負朕心爾總兵官李昻暨湖廣副總兵官李瑾張皇六師振耀邊鄙用命者賞弗用命者戮以成厥勳爾巡按御史周文光紀驗俘馘簡閲必實毋濫以啓冒毋刻以蔑功命下諸臣受惟謹巡撫公曰艱哉武不可究宜撫之衆如議乃命參議蔡潮都指揮潘勳王麟先後往諭冀其有順苗方怙恃憑陵殺我軍士都指揮權繼武死焉列焰薰熾蹂躪衛邑睢盱咿嗢背辭僭號雖百喙弗能解已皆曰醜類之不我命罪當誅諸公因誓衆曰惟朝廷畀兹重任豫數人豫數人何敢不力况文武諸司罔敢不從志曰左布政使趙文奎按察使林長繁汝二人釐兹城社以贊戎理豫等暨事事者咸往焉九月二十一日諸公往蒞軍在合示方略分布營壘曰參將洛忠汝𨽻前壘軍兵六千有竒皆統之曰都指揮劉麟陶霖汝二人𨽻右壘軍兵五千五百有竒皆統之曰都指揮祝鎮王璽𨽻左壘軍兵五千五百人汝共統之有前前壘軍兵六千四百人有右右壘軍兵五千九百人都指揮許詔葉曇楊淮三人分統之曰宣慰彭明輔彭九霄汝其約束步兵各以時力戰曰將材余大綸汝往巡視諸壘曰僉事詹源汝監前左二壘曰副使李麟參議蔡潮汝監左右二壘曰僉事許效廉汝監左右壘曰參政胡濂惟整理糧餉幣物曰前有將軍營二總兵帷幄居中以號令焉營壁整肅師旅鞠陳既禡於山刻日進勦苗恃額額狂奔呌呶罔知天罰十月初三日我軍乘其不備掩襲前進殺苗賊一百人土兵答直可宜為苗所縳令妻孥揮刃刲肉如雨尼我士氣兵乃不恤創巨具以苗穴虛實仍號於衆三軍之氣用是益振苗猶不挫方且刻木為盟約都黎都蘭天漂天霸龍頭龍對苗百萬人欲內外䇿應以寇我營軍中密以聞鎮巡公因言於衆曰用兵貴謀集謀貴賞今盍以賞激耶衆俞懸千金於軍門有能先登者授十月十四日夜三更永順土軍數人奮其謀勇架木懸縋援崖而上是夜雷雨大作苗方安睡軍遂屠守路者數人遇柝者殺之柝焉遇鑼者殺之鑼焉遇鼓者殺之鼓焉俟衆軍登者數百人然後毁柵燔巢鼓譟而入各壘軍士拔幟齊上鋒鏑交接震聲四達迎刃授首勢若破竹計窮亡命者奔突絶頂五百餘人次日皆捕殺之斬首二千人俘獲男女五百人面縛首惡二十人賊所蓄者曰牛羊曰米稻曰衣服曰皮革曰器械咸為軍兵有焉脅從之黨暨素所弗悛者膽泣神禠悉願聼撫諸公皆縱之蓋不欲黷武也十一月二十二日以捷奏上御奉天殿受羣臣賀䇿勳論功曰巡撫都御史增爵一級任子一人鎮守太監增祿十石任弟姪一人貴州總兵官湖廣副總兵官各增爵一級任子一人俱錦衣衛世襲百户紀功御史增爵一級俟京職擢用其有功文武諸臣各加官爵賞有差噫兹舉也上以紓一人之憂恢拓邊裔下以破萬年之險大振天聲鑑鍧炳耀蕩人耳目厥功何偉哉廷用不佞請勒諸石以垂後裔用以獻其文曰貴陽荒徼時維外藩限山作鎮界石為垣曰有爐嶺險踰劔門三苗素窟憑此作昏粵惟正統大肆陸梁我皇赫怒出車千驤彌師七月成功未襄收旗旋斾示以歸王阿傍阿苗扇此毒虐狺狺嘯聚於山之落嗜為寇亂恣行剽掠滔天阻兵氣焰薰灼越自丙子至於丁丑􅀈􅜙衛邑阻絶林阜憑據勢勝萬夫莫有屠我軍民戕我官守憲臣疏聞天子厪慮乃命鎮巡兵旅大峙授以軍機降以睿旨奕奕金戈英英虎士撫臣爰言武不可既載示皇仁載諭聖意維彼小醜愈恣堯肆暴非德馴狂罔言示乃用羣謀乃調士卒土兵官軍桓桓仡仡參以文武分以營壁禡以良時攻用吉日犄角聿布貔貅載陳統以諸部蒞以威神玄甲耀日朱旗彗雲乃樹電幟乃駕飈輪彼苗何恃恃此層山山不可恃天罰攸干矯矯勇士罹此凶殘揮肉亂墜凜不動顔且言虛實告示同班我士益勵我兵益揚懸以千金義士奮強下攻九地上入穹蒼陵彼巢穴伐鼓琅琅衆軍咆哮排山登陴萬刃雜沓噍類無遺橫尸成嶺流血為池逺近苗裔納欵來思馬騰而驤士飽而樂貴之卒夫解甲生活貴之婦女迎門笑躍破險除凶邊疆再拓捷書上奏乃開明堂論功授賞金幣輝煌曰兹文武實惟忠良於鑠竒功昭徹遐荒勒兹隆碣永代熙明水仙大王廟碑楊循吉人有曲直必告諸吏至於水火疾病之厄吏無能焉神斯専之神之治人比於吏而其可憑過之何也吏不能皆公神則無不公者焉故人之憑神甚於憑吏寧欺吏不寧欺神也吾鄉世事水仙大王王建炎天子之所封也鄉人之視他神尤貴鄉人有事則告惟大王之神在上巍巍而聼之若受焉者及其歸而或賜之或不賜之又若有分别者蓋誠有吏職焉然人得賜於神則喜不得賜於神不怒則神之尊吏不得參焉非其公之至也又烏以若此嗚呼有良吏或易而去神一而己則吾鄉人其敢不虔矣乎夫牲醴錢幣所以報也若夫無辭以宣神德神謂人莫知其公焉故碑御史中丞西蜀張公靖皖紀事碑莫如忠皇明隆慶六載御史中丞西蜀張公奉命秉鉞江南會所部皖郡兵變建議戡定之於禆國體甚大其事足紀云皖故濵江要害郡也先朝專敕守備武臣駐其地督衛所諸官兵日夕邏江上以備警法至周慎矣嵗久而敝邏卒不備盜乃身自為盜皖遂為盜藪積且有年會近例嚴捕盜令而皖獨白晝殺掠如故延及郡城旬而三劫居民當道者論罷郡守更置之則以查守代守奉當道者檄迹盜而盜乃邏卒也主名二伯人黨羽無算莫可誰何則姑建議城卒與江卒更畨示均勞逸實寓潛消意云行之數月盜警果息而武辨之分轄江洋故嘗與邏卒賄而相蒙者無所得利􅀈忿滋深顧未有間會懷寧邑尉司夜巡杖一城卒則故江卒也奮臂起挺尉隙自此搆而武辨首禍者夜誘故江卒畢集為危言激之曰奈何挺尉業已抵法旦且不免曷不遂大逞等死耳且有十一相全聞者響應即昔所相蒙思亂者也乃聚而曰吾計必反顧羽翼弗張奈何則誘其寮之司屯政者召屯卒納之城合千餘人既而曰兵且集矣器械弗具奈何則誘其寮之司篆者啓公帑刀戟人授之一器諸武辨者乃遂申飭之躬率以往旗纛神祠為歃血盟蓋其年閏二月七日之夕也旦日叛卒白其情守備守備弗禁則羣噪而前撻邑尉執郡倅聲言入劫郡藏拒之不果則竪旗幟乘城大呼金鼓動地恣行虜掠不嗛輒奮擊殺人燬居廬詭稱郡激變驛報逺近張皇城晝扄不啓要郡中公移不為通當是時張公銜督撫命蓋未下車也甫乘傳經蘄黃行且抵皖界聞變則兼程馳進以是月十有一日抵皖界邑大湖諸武辨不虞公猝至膽為之奪城乃啓會九江兵使者張觀察以單車臨之而叛者稍輯然皖士民洶洶莫必其命則見以為幕府且至填撫我而公方期會前幕府於南都須代乃得當一面權而又不忍去危城失士民望乃身擁一旅從皖下邑桐城陸道亟馳南都而以所携家衆休舍皖城時母夫人在行間皖武辨傎相告曰太母在是幕府必無意督過我矣遂不復逞而郡士民始帖席公入南都則毅然倡議以謂法不可假且非獨一郡憂也江南諸郡實胥觀望而令得縱謂紀綱何時大司馬石首王公操江御史中丞儀封張公兵科給舍大冶周公巡江侍御沔陽楊公皆議與公協公甫啓篆亟上其事於朝具列變所由起其略謂指揮某造謀首禍指揮某擅發軍器指揮某擅調屯軍守備某觀望故縱及叛卒渠魁某某輩故皆江洋賊黨憑藉武辨叛亂法所不赦云會守緣故事詣臺謁公受約束公密進而策之曰此屬即暫幸面其心固自危又多為耳目知余疏且行謀絀矣有如亡命復逞江上為之奈何若宜出其不意先處置以須朝命毋生得失守唯唯公又策之曰余授若檄余奉敕得逮繫四品武辨彼叛卒渠魁從便宜亟捕不者勦密為之所毋踈虞守唯唯公又策之曰余再授若檄撫諸脅從盡宥弗治若渠魁既得亟出此揭之通衢令無恐守唯唯諸所指示具有成畫時三月五日也而兩檄方屬草未及授守會有先入搆言螫守者禍且叵測守即以是夕間行出南都公聞之扼腕曰守行而檄不與俱事殆矣彼安所操以擒叛會懷寧丞護公家室至公即手兩檄與丞誡囊以出密授守守從龍江關得檄亟馳還郡則首禍者果復以訛言鼓叛卒謀大逞守悉遵公方略先期密遣壯勇迹叛卒首惡物色之遂以是月十有二日部署民兵外隊使衛倉庫截要害固城守張聲援咸事事而以曩所屬迹叛壯勇分捕遇諸市猶有敢格鬬者守出檄示之曰幕府固命我勦捕若惟所便則士民協力咸進生得賊二十餘名皆公疏中所列無一脫者而黨羽猶未解守復出檄示之曰幕府固命我脅從弗問盡散去而諸武辨杜門竄匿莫測所為守又出檄示之曰幕府固命我繫逮若如敕旨則諸武辨咸自繫投獄凡此種種籌畫皆公耳提面命守者也時武辨有詭托以運糧行者捕及之於淮即庇者多方公弗為貸居無何而上俞公前疏命錦衣官校械繫諸武辨詔獄而以叛卒屬公訊治戮於市傳首諸郡昭示天下公因請特建置應天兵使者駐節江上弗復以九江道遙制之自是法度寧一寇警晏然何啻皖郡即江南諸郡賴之其為國家規久逺蓋如此會守以浮議并械詔獄公慨然疏救之其略以為夫安慶府知府查志隆敏才強力剔弊愛人前者擒叛而士民扞衛及今詔逮而老幼悲號賢聲在郡邑公論在朝廷宜特宥之為任事者勸疏上守竟事白不奪前官優調守雲間有循良之績如忠因得詳皖事而嘉公之能抗直舉賢也公聞毅然動色曰余固才守然豈庇一守哉為朝廷申直道惜人才爾即守居常頌揚公伐不啻口出而語及白巳事輒自挹損曰辱在疆事遑恤其軀職之不供實負公德斯兩端者忠益交賢之有古祁奚叔向之風云公蜀之銅梁人張觀察嶽浙之餘姚人查守志隆浙之海寧人論曰紀法何可一日不振哉古之帝王宰制萬物役使羣衆所賴以維持其間必有軌事之臣定傾於談笑之間指顧而收成算者洵非紀法所賴耶當皖始發難時公未在事也有如循守常轍弗蚤馳進填撫之事固未可測巳而捕叛時有如弗蚤決策專信任守即百守安能展分寸哉巳及事見功定而守困詔獄有如弗為疏鳴其寃無論守殆矣於國是何有哉公籌畫於事變紛糾之會收功百全為國家修明法紀外不敢玩內不能奪斯舉誠偉烈也可不謂忠與才合膽與智并文武全器屹然社稷臣哉及若開誠布公保護善類非休休大臣孰能當此者乎公勳庸滿江南去後所在見思靖皖蓋其一事云明文海卷六十八
