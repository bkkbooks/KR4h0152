body:
  text: 明文海卷七十餘姚黃宗羲編碑四懷來城通濟橋碑翁萬達夫水之行地也槩於世為多西北則鮮率可舟而漕西北則否率易梁而渡西北則難何也其勢使之然也水原於山天下之山皆起於崑崙而燕冀為天下脊地形崇峻水率東南走入海其流湍急無巨浸廣陂容受澤潤故西北鮮水且水道所經土去石出建瓴而下衝激震撼力攫齒齒斷斷故不可舟而其霖雨集潢潦漲也則驚波電掣駭浪雷擊值之者陵崩阜斷故又難為梁夫鮮水則土燥土燥則其産猛厲而寡深思不可舟則轉輸困轉輸困則無所廣粟以食戰士而又難為梁使咫尺之間畫為兩地倚馬相望莫可即救古稱西北恆多事禦戎寡全功此其一也懷來直國北門為居庸要路自京逹宣大兩鎮罔不由之其通永寧獨石諸處猶有經也媯水出隆慶州大海沱山中流與洋桑乾河合東歷懷來城南下合水關放蘆溝以逹於海既不可舟又無渡梁于是軍餉戎器材官騎士自京師調撥以為宣大偹者往往告難又其急者邉塵遇警馳上便宜瞬息異形一騎千里阻於水滸莫可以為謀坐是望洋浩焉興嘆者屢矣豫督軍塞上思欲橋之故嘗為之畫曰深根以固其本逺岸以殺其勢軸柱鱗密以嚴其隙蹲鴟脈絡而莫與之鬬庶幾可成也屬軍旅事殷且有塞垣之役未之能及土人曰舊有石橋永樂間廢武廟北巡命內使以萬金成之尋為水壞或於所謂四者未之偹講也夫徒杠輿梁王政攸繫而况通警急關軍政者耶嵗乙已余閲邉次宣城聞有僧慧燈者謀為橋謂助我者也召見之授以前四者之説今戊申春僧來言曰橋成矣無愆初約願乞所以志嵗月者使使𢾗輩視之良信問所以成則曰力能感中貴人捐俸金紀綱之又能募邉富人出粟為佐於戲先民有言曰近世橋梁功利之大且廣者多為浮屠氏有蓋佛以利物為心而橋梁居八福田之一豈真有是耶何成之速也然豫有侈喜焉自嵗庚子以來北人擾我邉境侵軼時至邉人苦之聖天子不以某愚不肖授鉞專閫擐甲厲兵與之從事者四年于兹矣賴陛下神靈威武烽燧無警連嵗塞垣之役工費頗巨俱克有成今兹大熟民以寧謐惟天子建中和之極賚及黎庶疆埸之臣得保塞垣稱無事大幸也彼中貴人者復能出俸金以佐時急至於小民亦不忍專其贏餘是僧乃籍之成橋光其師説更竒事也使格戰之未休則瘡痍之是恤年榖之不登則垣役之告病而庸暇及此耶是役也若其與邉人百𢾗萬口其敢忘聖天子丕顯休德遂為銘付之橋曰通濟仍舊名也銘曰漢後將軍是曰充國屯田金城威震西域治橋七十枕席過師千載相望豫每羞之浮屠氏子其名慧燈相時所急因年之登請金貴人募粟邉城材石偹施巨橋斯成不工而妨不事而擾龍見波中鶴歸華表顧兹邉土此嵗有戰投兩以耕于今再見悠悠來往匪兵者人馬爭逸足車無停輪亦有疆事星軺入奏天閽九重曽不崇宿念是王政重以機宜嗟我有心彼是度思匪力胡役匪粟胡餐足我邉人屈彼呼韓惟天眷德稻梁㵼鹵惟帝格天干羽載舞我書此石以詔後賢貢篚來庭斯橋萬年汀郡守華山陳君平兩灘碑翁萬達汀州故東南陬上遊去其地隆崇皆山盤亘屣連中拆而微豁劃若兩岸而溪水即焉水源非一始惟濫觴既會既逺率可舟而通舟制視他舟獨異土人以三枋為之褊小而輕薄於此溪為宜也然水道所經多陡峻束隘無廣陂巨浸為之停潤容受故其流迅疾徑南走入海有建瓶下岑樓之勢衝擊震撼力攫聲鬪齒齒齦齦故舟行甚艱􅑴焉如登沿焉如崩而其淋雨注潢潦漲也則驚波電掣駭浪雷擊榜人股栗于洄谷而莫敢與水爭蓋諸灘皆然而龍磜為甚磜灘𨽻長汀龍灘𨽻上杭長各可三里許雜然頑石偃蹇波中密若星列錯若棋布森若戟立蹲若虎踞乍隱乍見或起或仆有羅詰相輔而害舟之狀即潦銷溪細猶呀呷逬怒舟師素稱巧絶一失趨避靡不顛淪莫可援救甚足患也而兩岸又巉峭仄塞跣陟為難華山陳君守郡之明年考量櫽括捐資召匠人而授之時冬水淺落羣然攻鑿又明年冬僦工程能不愆于始摧其堅剛以殺湍悍而兩灘始平他灘亦稍疏治又詢度岸勢開縴道斬斬異往時矣翁某曰余聞昔有障大澤勤其官而受封國者重水事爾汀自建牧以來歷世久逺間亦有聞人然未聞有平險拯溺如今兹所遘覩者余𢾗𢾗道汀嘗舍輿即桴歷經兩灘土人往往為余言灘險不可為蓋係之天事非人力云余窈怪以為不然龍門逼天大禹鑿之豈需鬼力積蘆沈璧何其誕也夫茍無意於平險􅀈溺即拉朽之事比之捕風易者且難况其難耶乃今陳君毅然己任行所無事以利安斯人轉輸百貨吾潮比壤自是士商往來亦賴無恐其孰不舞躍歡呼歌詠利澤與此溪相為無窮哉余又聞君昔嘗為水部治徐梁通漕河人為立石至今盛略不衰平灘之績靡所因于前尤章章焉不可沒也而上杭知縣趙丈同守禦千户所千户余相長汀知縣祝一鑑典史某亦與有賢勞並宜勒而存之陳君名洪範字某辛丑進士浙之仁和人在郡多惠政平灘特其一事云海陽朱令去思碑翁萬達夫觀令者觀之民令凡以民爾夫民同彛而異習故令賢而以為德亦或以為厲不賢而以為厲亦或以為德夫賢而以為德不賢而以為厲恆民也賢而以為厲不賢而以為德蠧民也恆民什九蠧民什一然什九之民嗷嗷而動睨睨以眴爾力不能致美刺於觀風與執筆者什一之民則左右滑佞若冠蓋之族頗於好惡而利於令之易與也斯其人往往能談説有口疑誤視聽令亦謂可私肺腑也故虐恆以自豐昵蠧以屏毁縮朒比之長者操切疑於忍人集垢棄亷潤修聲色去之日要亦有為之墮淚臥車轍者吏道日降余蓋傷焉里居以來得與什九之民相竊聚而觀至海陽朱令未始不為之擊節而委心也會令被召去民倉皇走道衢爭覷令聚而轉相語巳復泣下計留不可得白諸父老欲相與紀載休美以永其去思於是諸父老抵余言令賢而有功德於吾民者甚厚即所睹往者縣胥吏相煽動賈法為盜姦章賄祗候大者白手置田宅與富豪埒莫可劼毖冠蓋之族不自檢押有所橫暴凌唆亦竟不何問自得吾令祗候胥吏之徒靡不懼避無復敢睥睨恣睢仕族亦帖帖斂豪股辨而脅息矣往者縣里甲值官供億日輒費十餘金重苦無恤甚有不旋踵而貧窘死者徭編則視貨重輕訟牘積滯即不滯亦不中法理自得吾令里甲直費日不能一金大吏使臣輻輳臨止費繁溢額輒捐資以充不以責直賦役必手自較定獄訟盈庭迎刃輒解人稱神明即老吏弗如也他亦稱是語曰藥石去病膏梁飬生故不務比周而加意於吾人是吾令也微令即老死安得見今日嗚呼誠如父老言其與余所觀聼何異哉父老與什九之民誠知令即什一為蠧卒亦當誦令賢者人患不自立爾顧何事於淟涊脂韋媕阿卒託以宣譽為哉夫皭然而不汚亷也凛然而難犯節也朗然其不可欺明也沛然而措之於事為才也愷悌惻怛之意行焉惠也有此五者是仁義之偹而化理之成也誠如父老言其功德於吾民孰能忘之去思有碑亦以告後之為令者朱令名寵湖廣漢陽人嘉靖甲辰年進士敕建太平寨忠義廟碑屠應埈史竣曰休哉淵淵乎先王之御天下也賞不遺幽罰不淫逺惠流而不費威震而不有風被羣動功洽後世所以導物闡化經世規俗者遐乎莫之敢忽也髙皇帝剪凶戡亂昭奠華夏而燕朔諸州喪淪千祀者亦始復我帝王疆土之舊侔德天地邁功湯武越既首褒元功忠臣余闕及殷祀先代休烈懿臣肇修天常茂建人極百五十年來朝有批鱗之臣野有死綏之士雲蒸霧變異世同揆皇皇哉聖人一變之功若是至己皇上綏文詰武萬宇和洽越十有五年侍御金君敷華奉命按畿輔諸關軍事建節遐御慿軛遙覽于是慘焉悲曰是地也巖險周古襟帶易守豈無干城巋嶽扞外勤內甘死蹈節之臣乎豈無膚鋌瘢耆袒刃決眥蹴部陷堅致命不二之士乎此而不録以勸難矣于是疏建忠義廟於沿邉四路以分祀死敵諸臣而是廟則𨽻之太平寨云廟祀官軍周朋而下若千人博採群議允若輿情奬義貞度庇休稱勞不踰月工迄成介使者來徴豫記嗟乎嗟乎夫王教之作也始未嘗不飭終以玩也匪浚則湮弗植則仆恆度而時振之故操弗倦而人靡有匱己自夫教之衰也士知死而不知耻于是懷二心以事上忠義之道鮮焉故危言色厲氣溢於平居而徼􅓈恐詘靦顔茍難旁睇則鷹擊豹眒無少下乃預危茹詬豕鼠突竄者衆也夫大同遼陽謂盡非朝廷素訓之卒哉蹙曠悍肆外靡禦冦而亂內訌居若煦煦餔驕子其終則豢虎而假之翼也豈其性誠異哉眇乎勸懲之未盡漸靡之習非也是故袵金蒙革委誠敵愾者時弗知聞而媻姍選愞盱睢罔上者或登大僚洞膺逹腋元隕弗懲顧死不得以蒙澤其全軀保妻子之臣從以議之嗚呼難矣難矣斯廟之建也崇死以詔生樹往以表後是不足恢恢勸乎堂廡枚枚望之翼翼而翬翬勇夫哲士過者欷噓沾臆其否也未嘗不額蹙汗頥驅疾以睨也嗟乎嗟乎人之生等死耳其延促於世須臾也貪夫徇生畜縮竦讋自視恬然久矣生為遊氣死為萎草聞者弗知見者罔道哲人徇義守死潔身氣蒸霜雷騰虹薄星聞斯嶽嶽酸鼻撫膺故義士不忍須臾之安而易萬世之名不以同盡之生而喪吾弗死永存之氣夫今而後可以喻也戰陳不果不可謂勇封疆不守不可謂忠隳職廢命不義之大者觀於斯廟可以知耻矣豫既以廟事文之碑復為迎送神辭三章俾祀者歌之侑神焉金君名燦豫同郡人具弛張之才今之名御史也後世於是乎覘政矣辭曰振金兮交鼓醴湛兮蒸爼雲馮馮兮莽蕭蕭靈不來兮日將暮瞻雲兮鬱紆佇繁會兮九衢靈剡剡兮抗旗班白馬兮朱衣繄遙望兮平原怒目冏兮頳顔操長劒兮控鳴弦天窈杳兮日書寒隂沙零兮夏雪氷鱗鱗兮夜波合天時殫兮厲兵接洞犀革兮首身裂揆耆武兮又以忠威靈懟兮神愈雄恍昭朗兮歸故宫光有僾兮氣靡終來繽紛兮御華宇泠泠風兮乂以雨騰虹煜兮雷填填天聲飛兮士爭怒倐既假兮惠成焱逺遊兮揚旍橫北海兮歷幽雲都恆霍兮偶列星嵗事秩兮為民正殪強暴兮振靈武徒皇皇兮植戈以舞王江涇戰功本末序胡松國家地廣治極文禔武嬉海壖姦商乘時盜販因緣忿怒轉為冦賊民不覿兵為日既久望風奔潰莫之誰何賊既連得利內附外連聲應氣合徒黨滋蔓動以𢾗千萬計又善用兵能以少為衆所徴四方材勇懻忮武力之士率殱其手勢若烈火焰焰狡焉思啓蓋自壬子春更癸丑甲寅恣行轉剠戕殺燔燒叢萃藪窟新故環迭而兩浙三吳之禍變慘矣乙卯春柘林巢賊積增至萬餘人出掠嘉善諸處夏四月劇賊徐海麻葉等探知嘉杭兵調松江搗巢率衆𢾗千人水陸並進聲言先攻嘉興次及杭時故巡撫李公留守杭總督軍門在華亭無兵可恃軍民洶洶甚懼按司梅林胡公方巡浙東台溫諸郡得報連日夜馳詢嘉興會賊從嘉善來前驅迤邐薄城外衆益懼甚公曰在法攻謀為上角力為下矧又無兵乃密屬吏取酒百餘罌鑽其顛投以毒劑塞如故載兩船選兵卒機警而猛者假冠服持赤牘坐船上稱解官解酒餉軍載向賊所從道見賊即禠去冠服走賊信不疑馳報諸酋長酋長得酒大歡相率高會痛飲率多死巳又令村市酒家皆入毒甕中約償以直民所有米漬藥水淅而遺之賊往往爭取飲餟輒又死然賊黨尚衆我兵寡且恇怯適保靖宣慰彭藎臣所領土兵𢾗千人至可使胡公䇿其恃勇犯忌使人傳語之曰賊善伏且知分合我兵嘗為其誘冝分竒正左右翼擊防其衝圍藎臣不聽乘鋭直前果遇伏墮賊計挫于城南石塘灣始大悔遂有潰志逺近震駭大失望胡公深憂之曰如是則我之技窮矣于是親詣軍營宣諭且勞苦之曰勝負兵家常事惡足介介几爾所以僨者以不知地利中其伏我聞賊酋多死衆絲棼無紀且久不得食息瑕可攻若等無畏顧兵多無衣與器械使人悉索諸質肆故衣頒給之加賜錢帛牛酒飲食召諸金木工晝夜繕造器具懸重賞苗兵感激思奮察可用乃指畫石塘地形曲折曰汝宜以兵若干為前鋒從塘路進若干為竒兵伏道左水兵船若干環列道右防其逸皆後前鋒𢾗里候賊將至某處前鋒迎敵佯敗走俟其過伏伏藎起三靣夾擊蔑不勝矣藎臣如公䇿賊果僨敗北走平望平望故别有苗兵營賊不知會總督張公從松江兼程來視師而永順宣慰彭翼南復從泖湖西出胡公又同督察趙公部署參將盧鏜等厲擊之且躬擐甲胄徑馳馬趨出四靣合圍軍聲遂大振賊大阻還走王江涇既連疲于奔又餒且病矧無統紀遂大潰不支土兵與我軍乘之斬倭首二千餘級墮溺水死者不可勝校蓋自是嘉興杭人始安枕軍民主客始知賊猶人非真若鬼神雷電虎豹然不可嚮邇浸有鬬志賊亦自是稍稍顧忌逆氣狂謀漸以虧朒始可誘而圖矣嗟乎嗟乎竒變決而波才破洛澗襲而淮淝捷嘉山合而博陵奔蓋自昔禍亂之興必有忠義材武韜鈐之臣以指揮擘畫敉寧戡定蓋天所以奠安維極綏輯神人鴻德好生常假手乎巨公偉人實為之孰云其果夢夢哉毗陵左子好論次當世事而謂故所收公私牘牒所載王江涇戰功淆無紀屬全詮次余為詮次而歸之庶後經世者有考焉誅楊髠碑田汝成西湖之飛來峰有石人三元之總浮屠楊璉真珈閩僧聞剡僧澤像也蓋其生時所自刻畫者莫為掊擊至是陳侯見而叱曰髠賊髠賊胡為遺惡迹以衊我名山哉命斬之身首異處聞者莫不霅然稱快嗟乎談宋事而至楊浮屠尚忍言哉當其發諸陵盜珍寶珠𥜗玉匣零落草莽間真慘心竒禍雖唐林兩義士易骨潛瘞而神魄垢辱徹於九幽莫可雪滌己夫趙氏立國庶幾存仁而叔世寖削寖微覆宗海㵝又不慗借一壞以蓋藏題湊悲夫悲夫或謂藝祖欺婺孤竊神器冥報宜然嗟乎天之所壞不可支也所興不可禦也假令天不祐宋藝祖能冒昧篡取之乎如以冥報論則今古姦雄以窫窳濟事者或不蒙鞭暴之禍又將何以通之然則趙氏遘厄豈其天乎元運方張中華祚歇殺機橫發敷毒兩間即沈淪黃壤猶不免與不然胡為乎荼烈若此也陵谷遷移觸目鮮故而梟髠儼列留玷兹山殆非所以令衆庶見也穆陵顱骨韜匿穹盧高皇帝籍而返之惜其時無以賊像事上聞者乃今竟誅滅於陳侯宣皇帝之德意泄異代之幽憤作義士之雄心掃名山之氛厲良足快矣昔申屠迪毁曹操之祠薛伯高去鼻君之廟史氏紀之以為竒節以今方之不亦並美前修哉春秋之法翦絶亂賊雖死曰誅以明刑也竊有取焉系之頌曰有宋不競圖存海陬胡為梟憝犯彼靈丘株送橫分猶有餘譴孰以峩容黷我峻巘陳侯殛之義憤所宣人讐神怒倐焉偕蠲生脫明誅死伏幽戮何必市朝遊魂駭觫烈烈陳侯為政有紀崇正祛邪規民於禮陳侯烈烈秉德靖共旌善疸惡教民作忠澤及枯胔受天百祿報爾宿讐宜隲遐福黎民述頌我用是修名誅三賊竊取春秋先夫子曰有馮具區漫録一假當附後謹查漫録孫太守遊飛來峰見楊璉真伽像怒命石工截其頭石工誤截地藏菩薩及侍者頭置獄中其頭常滚獄中遂大疫命僧作七晝夜道場而疫不減乃返其頭於冷泉亭傍遊人踐踏輒病寺僧乃函供他處而楊髠像竟無恙田叔禾作戮楊髠文亦不知其誤楊髠像前作天女獻供併酒缸內置一杓上刻楊璉真伽云云𢾗字今亦殘毁乃竟遺禍於地藏可笑也周申父説征南碑田汝成皇帝承運文宣武謐宇內熙皥兆四郊以崇天建九廟以尊祖於是百靈薦祉元儲應期將以誕告多方外諭四裔乃坐明堂朝羣辟按圖數貢至于安南曰兹邦不庭草有餘稔豈其叛哉曷往詰之禮官肅將瀕行會有黎氏逋臣詭辭而控曰臣南裔藩臣黎氏之嫡派也國有不令之雄曰莫登庸者實篡黎宗逐臣草莽惟陛下憐而納之皇帝若曰信兹稱亂其往討之乃命兵部左侍郎蔡公經安逺侯柳公珣經略邉務以需大舉蔡公簡委賢豪恭謀畫䇿而左恭政翁君萬達實總其凡乃圖山川發間諜探要領峙芻粟礪矛鏑選偏禆練卒乘義問昭乎日星威稜抗乎風霆交人聞之大懼登庸披腸吐欵奉表而稱曰臣先臣黎氏之陪𨽻也黎氏式微國亂無象臣以皇靈削芟草竊僅有寧宇黎氏天絶屬纊之晨倉皇解佩印而屬之臣曰天錫元寶爾姑守之請命以聽所立也臣恐駭逃匿國人周章索臣擁之左推右挽責以大義曰不守錫寶是不共天朝也不受君命是蕩析黎民使不保也臣不得巳茍從夷俗護印五年而犬馬之齒耋矣復以屬臣之子十有一年再嘗遣使欵關而關尹令嚴不敢啓方物敝不敢移易也封題較然臣父子兢兢惕惕罔敢專席旦夕稽首北望曰天鑒在兹夫黎氏不請而屬之臣臣又不請而屬之臣之子死罪死罪第黎氏忽亡而國人謬擁避迹無所若臣違道以徼之安能攣如於再世也謹以土地人民之𢾗咸簿録之登獻闕下惟天朝處分事聞皇帝若曰咈哉豈其挾諼以緩我師其往核之乃命兵部尚書毛公伯溫節制六省咸寧侯仇公鸞都統諸軍敕曰聼以軍往違即征之毛公蔡公協忠同心以作義勇乃勒兩粵徑士分為三軍副總兵張君經將中軍翁君萬逹監之恭將李君榮將左軍副使鄭君宗古監之都指揮白君涖將右軍僉事李君文鳯監之勒滇南徑士分為三軍都指揮胡君紹將中軍副使鮑君象賢監之都指揮方君䇿將左軍副使鄭君騮監之都指揮王君立將右軍副使張君絅監之而幕府邃穆進止機宜則惟翁君與焉於是八蠻五獠侮食左言之長吳鈎越棘狼纛鳥章之士俴牡介象雲梯樓船之具莫不嶽嶽傱傱麻列蝟合箕張翼舒闐駢乎桂海跆籍乎炎徼矣交人聞之愈益大懼登庸之使疊迹轅門攄襮哀愫懇以降請轅門僉議以為在古降儀或牽羊以表順或舁櫬以請誅倣佛于斯乃見悃抱登庸頓首敬諾轅門乃啓滇南之關奠龍輿抗黃幄陳兵森扈登庸徒跣囚首白組繫頸稽首稱曰臣斧鑕逰魂也無異圈豕陛下不發乘軺曵尺纒牽而刲之縣首藁街以昭誡不譓是陛下以不忍羣黎之故而宥微臣微臣幸藉羣黎以延殘喘臣聞命巳來魂魄飄喪慺慺荒懇又不足以感格皇乾重煩訊使詰責誠偽死罪死罪復更何言臣今共順之情觳觫之狀繪圖不足以為獻剖心不能以自明惟陛下憐而察之臣率土編氓也戮之惟命俘而放之四荒惟命若以天地之量覆育螻蟻宥之故穴亦惟命謹以先朝所賜金印一枚黎氏所侵四洞之地遣從子文明表獻闕下以聼處分臣昧死言不勝隕越轅門僉議以為其辭順其儀恭其𠂻無偽違即征之天之命也服而舍之武之經也為之解組而遣之按兵不進以狀聞皇帝若曰嗚呼皇天以豫一人撫鞠四海匪威力是慿匪玉帛山河是愛惟蒼生塗炭是憂黎氏守職無狀衆叛親擕馴至夭絶莫氏宣力比户按堵朕亦嘉之其革王爵易國號置都統司以莫氏為都統使世掌其土以共王命詔至諸軍解嚴南土歡呼颷馳鼎沸矣是役也君子以為莫氏知命者四繫組以請死也歸地以贖罪也函印而獻之以完寶也不貢方物以明畏也詩曰畏天之威于時保之其得不死而且世官也冝哉當兵事之初興也汝成嘗以藩寮分守江左悉厥愍末昔愍其勞而今欣其訖也乃述而銘之曰粵有交州蕞爾瀛介三代之隆擯于荒外嬴秦逺略乃闢其疆聲教漸被歷漢而唐五季紛綸土酋竊據涉宋而驕益煩邉慮大明受祚陳氏奉寶皇祖嘉之俾仍舊封季犛賊逆毒蔓雕題文皇征之掊戮鯨鯢索胤于陳絶不可得乃建省垣約以繩墨黎利再叛詐擁陳後宣廟慈𢎞包荒弗扣錫爵給印樹為藩邦三葉而墮遂覆厥宗莫氏承之諸裔麕懷不請而禪於義則乖皇帝赫怒渙號徴師如雷如電海嶽離披緯武經文維兩司馬矯矯元侯從天而下司馬有令既嚴既明翊用翁君亷信以匡鋪敦義勇鷹搏虎奔朱鍪日麗玄甲雲屯籍令戡之倐如畦耨載鞠載詢蓄武不究交人聞之喙喙嘽嘽傾巢舉落俯訴仰干蓬跣繫組蛾伏而進順效牽羊請同舁櫬匪寇匪篡庶幾有辭皇帝憐之遂以德來乃削其爵而畀世官比于內吏輯我龍編交人歡呼曰父母且完我妻子築我室廬赫赫天威盱睫而在濊濊天恩含哺以戴如春之育如海之容訓爾子孫惟王之共虞格苗民淹于七旬交人來欵曽不浹辰商伐鬼方三年而服宰割交州曽不遺鏃我紀其事勒之貞珉伏波銅柱又何足云明文海卷七十
