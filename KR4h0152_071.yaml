body:
  text: 明文海巻七十一餘姚黄宗羲編碑五嶺南平冦碑董份嶺南古粤地自秦棄弗属當漢盛時武皇遣伏波樓船二将率十萬師征定之分其地為珠崖儋耳諸郡而未幾輒叛及元帝而珠崖乃大叛益遣都䕶以下十一人興大兵歴𢾗年費以三萬萬計弗能討罷之亦棄弗属而漢亦遂衰矣夫粤𢾗反覆好亂自古記之而其闗國盛衰亦如此明興統御萬國際天極地皆入版圖而粤為天下一都㑹朔南暨聲教矣然治久則孽生地險則易阻而嘉靖間巨賊李茂陳徳樂二酋者乗倭外訌而内造亂焉當是時亦嘗聚兵㑹勦矣或言兩難並發民恐弗堪不若且撫㓂而専事倭便而賊猾窺指亦願就撫乃撫之而於海壖之側所謂鋪前者安置焉而鋪前與珠池最近珠池者國之大禁賊之故所睥睨者也撫既久遂擁衆𢾗犯禁盗池而椎埋剽攻遇商賈則掠商賈有居民則刼居民與官兵格殺無忌于是前直指蔡公夣説悟安置海壖之非也亟以計徙置城内焉然賊雖徙而徒黨在海澳者亡慮𢾗百千人大者稱澳主小者各有名號皆分布諸澳中而益造桐艚諸戈船亡慮𢾗千百艘亦宻藏諸澳中𢾗召集天下亡命奸人豪俠劒客與群黨襍居其志叵測矣當事者欲置弗問則賊方縱横恐為大亂之漸以貽後憂欲亟治之則賊既受撫恐發大難之端以嬰祸始皆相顧莫敢言而西粤開府劉公膺特簡晋少司馬縂制兩粤至則奮然曰春秋譏不討賊而酋本首逆䝉宥不悛因撫益恣固王法之必誅者也且酋既叵測而結構益多倘一日定謀俾在澳者自外起酋從中應之可無寒心哉吾固計之熟矣彼二酋者擒亦反不擒亦反擒之則反速而禍淺不擒則反遲而禍深深則莫可為矣吾寜任其淺者遂决計擒而置獄焉公預料二酋朝擒羣黨必夕起起必自清瀾始與澳近也乃命鎮城戒嚴而檄叅將楊友桂者提兵謹斥堠防禦勿失既而賊果如公料飛書城中約内外並起而邏卒以戒嚴緝得其書遂閉城大索計不得行而是夜犯清瀾者友桂違節制亡偹賊遂突入猖獗勢洶洶矣公乃與直指黄公正色極論友桂失職罪亟去之而以可任者攝焉直指公者秉綱紀振風裁飭厲文武與公同心討賊軍令益嚴而搃戎李君棟者具謀勇尚忠義𢾗踴躍赴敵名将也而布政司右使程君拱辰分守道左恭政徐君應奎右恭政熊君維學左恭議李君一陽按察使徐君用檢兵廵兼提督學校副使孫君秉陽兵廵副使黄君時雨古君之賢海道副使趙君善政兵廵僉事許君國瓉提督學校兼兵廵僉事郭君子直或臨敵或督餉或紀功雖職不同而皆運謀略贍才猷竭精思佐石畫皆極一時之選者也公於是檄搃戎駕艨艟親入海而兵廵孫黄諸君統舟師繼之分其兵為三道一從中出一繞其左一夹其右三道並進而清瀾之賊自見始方突出莫能當以為大軍未必即合可遂横行也及見三道兵掩至皆失色錯愕而我軍遂出其不意横撃之屡戰屡勝轉至􅚑港則遂䧟其中堅為澳黨所謂蔡番鬼陳二老者賊中稱為澳主倚為㓂鋒者也而一時皆殱焉則諸黨遂不能支而我軍大呼追撃遂俘斬六百有竒溺死無算而澳賊悉盡矣公方凱旋饗士而妖賊李圓朗者作焉圓朗以符呪蠱惑楚粤間而楚粤間好鬼信禨祥從之者衆遂刻符造印祭旗分遣其徒約期日各從所在自韶州起而澳以北皆煽揺動矣公急馳檄授計先其未發勦之不日而俘斬百有竒梟其首妖盡釋所脅從者翕然遂定焉而珠池之賊又報矣珠賊者澳之别黨與澳故相盜犯而犄角者也至是乃大集焉公復縂戎出海而兵廵孫黄與徐許諸君繼之分其兵為四哨大約與澳戰同而珠池賊𢾗與澳則倍我軍乗勝益奮進撃益力故其所摧敗益多遂俘斬一千一百八十有竒合前共一千七百九十有竒凢公所俘斬處皆漢故珠厓地也此其功亦可想見矣而是役也予獨甚竒焉軍志曰客倍而主人半言必十而攻五者攻之常法也而官兵攻賊則兵易弛賊益熾即以十攻一或猶有慮焉公獨鋭然用之以我之一攻賊之十而一者無損十者無遺所謂得全全昌者也其竒一也諺言雖有烏獲不能以一手舉雙鼎雖有后羿不能以一矢殪兩狼言敵多則難為力也今粤適遘兇㑹一賊方弭一賊繼之而公左投則左勝右投則右勝終投則終勝鼓鐘而奏凱者宴不停於轅門露布而獻俘者使不絶於朝闕其竒二也傳言搏牛之蟲不可破蟣蝨強努之末不可入魯縞言戰易疲而勝難再也公於澳戰兵不遺力矣而珠賊益倍俘斬益多其竒三也夫兵固貴速馮奉世所謂一舉而疾决與曠日相萬也甚言遲速之辨逺也盖遲則軍興易乏師潰難繼而賊既𢾗至矣倘不疾决則於彼為樹敵於此為分兵分兵則此孤樹敵則彼衆而持久情見勢格力窮益自敝矣今公每戰則鼔不再叠旗不重褰而如迅雷之驚人無不震衝颷之激草無弗靡盖七旬而三㨗焉其竒四也古言兵興則粮隨故賊之戕民者七而兵之累民者三其苦均也今公止用見兵給以常餉而兵不别調餉不加益故賊凡三戰費止千緡為粤平大憝除大害而農不廢耒女不罷機吏不叩門市不輟貿恬然若無知焉是以歡聲震天歌舞亘地盖善其地既無賊而民不知有兵其竒五也公本儒者敦禮義誦詩書揖讓尊爼間耳而聞公御軍有法應敵甚間見始而慮終因㣲而知著䇿一籌則千里響應計一定則百變合符雖司馬法之雍容穰苴之秘奥無以加也當其時狼烽𢾗舉羽檄交至而神色不動起居宴如方與客笑談即席賦咏雖葛相之麾扇臨陣曹公之横槊賦詩蔑以過己其竒六也然予聞公之始擒二酋也亦有苦心者己非專於為國弗頋其身者不足以任危機非壹扵報主弗貳其志者不足以斷大事夫專扵為國者古之所謂樸忠也壹扵報主者古之所謂純誠也而公忠感天地誠貫日月此其立功之本而天下所不可及者也扵是天子喜説自公以下賞賚各有差而公之功當勒在旂常垂之竹帛永永無窮矣扵是布政司左使張君大忠與徐按察司同請予言徐則巳在行間而張之下車適當飲至之後然公以其明哲沉毅方扵善後有頼焉遂併著之頌曰昔在周室為中興主南定淮夷北攘玁狁維時良臣有方有虎實翼王綱是經常武於鑠我皇統天御宇萬國版圖四方安堵蠢兹么麽曷足膏斧始焉造逆宜即醢爼如天之仁宥其游釜匪恩是思維兇斯怙隂懐叵測陽為就撫為逋逃薮造作楼櫓犯國大禁抗兵格阻剽攻居民抄掠商賈赫兹王法藐焉敢侮愍不知畏走死如騖以彼稔惡如虎負嵎恐䧟虎口敢撩虎鬚民不敢指吏亦躊躇桓桓劉公為國忘軀正色持法籲天請誅首發大難亦履危機惟其獨斷以剖羣疑忠誠貫徹明察幾㣲萬舉咸當一䇿靡遺爰整其旅秉鉞誓師以正天討以布皇威觸之者碎搗無不夷制府崇重孰履行陣惟公驅車凡三移鎮十乗一臨千人咸奮如颷之擊如霆之震詩歌三㨗書紀七旬既懋其績復合其辰速徃速來悉乂悉平地既無賊民不知兵國之砥柱粤之干城我思古人厥惟姜召出搃征伐入為師保惟此膚功曷弗克劭天生吾公本為社稷将膺寵臨夾輔周室粤鎮既寧越裳重譯對揚王休永綏方國淮揚紀功碑董份初倭㓂凡三掠淮揚間當是時賊不過𢾗百人嘗調發諸省兵不能禦剽州縣以十𢾗所至焚燒殺戮茶毒不可勝道㑹賊别流過南都者𢾗十人轉略千里官軍以萬計皆靡至皆言賊有神不可與鬬逺近傳相恐議者曰急矣淮揚重地也言専設鎮撫便因共稱前中丞李公賢以為即欲平賊非李公不可乃自家召拜李公公至則日夜治戰守偹按行伍法置營房校武塲造戰艦𢾗百艘合馬歩水兵校之百具咸飭賊覘知不能犯己未四月乃合衆萬餘分道並入一時皆震公馳出如臯與賊遇扵白蒲諸将皆言賊初至宜及其未定撃之勝公曰夫戰貴得地今賊方厚陣而我軍未嘗見大敵即小挫難復救矣乃堅壁懸賞約以五日不發一矢而令軍中有敢言即戰者斬賊求戰不得乃益進公因召諸將䇿曰賊過如臯則諸道必合合則道有三自泰州逼天長鳯泗陵寢在焉道最要自黄橋逼𤓰儀以搖南都而梗漕運次之若從富安而東當至廟灣絶矣是吾得地時也乃以海防副使劉君景韶丘游撃陞守黄橋諸路而身當泰州之衝於是海防等皆稍稍勝賊賊見黄橋泰州兵盛果由富安東出公喜計得因命海防游撃及沈思學兵躡之戒以晝則稍近使不得休夜則稍却以杜其後務致賊廟灣相與共撃而其時他賊復攻丁堰諸處以分我兵公乃益以陳忠與海防等兵合勢而親提大兵從中疾走淮安以夜半入城賊果如公料次日至馬邏矣馬邏者廟灣近地也先是公嘗調徐邳諸處兵聼用而縂督胡公所募山東青沂等兵適過淮公因留之部公中軍馬兵為前鋒曹克新兵為中隊青州邢鎮兵為左翼沂州何本源兵為右翼倪祿梅三錫合徐邳曹兵為後繼列營姚家蕩以待而賊始計謂公方禦丁偃勢未及前淮安無偹可掩至則見姚家蕩兵皆驚乃據高衝左翼公亟麾前鋒横截其陣賊分為二曹克新貫其中堅邢鎮等攫其左右梅祿等疊出薄之自寅至申鬬𢾗十百合我軍憤發益奮大呼震天無不一當百賊不支遂大敗而公所遣海防㳺撃及沈思學陳忠等又敗賊丁堰丁堰賊盡絶而馬邏賊得脱者奔廟灣時他賊復有自西亭犯海安甚急乃馳徃揚州督海防等出竒擊賊敗之賊退張荘又敗之西亭賊又絶而廟灣賊乃以其間得假餘息固守時視師唐公提援兵與公共勦兵小䘏唐公以巢堅非可嵗月㧞捨去公按行知賊據水為險雖有堅巢可計破也乃益具畚鍤多積土平塹奪其險撤其傍近屋縱連砲番休繼進賊巢露情見益窘復大敗㑹霪雨遂遁諜者言賊來酋首八人死者六其衆得遁者無十之一二盖賊果絶於廟灣云是時公方高㑹諸將論功犒士罷遣所調兵而七星港又報有三沙之賊三沙者崇明海渚中始江南嘗盛兵圍之𢾗月弗克藉屡勝之勢乗我觧嚴來犯氣甚鋭上下惶懼無措公獨宴笑自若時曹克新巳轉副搃兵丘遊撃轉恭将矣公先期以紀賢等兵𨽻曹守狼山分中軍等兵𨽻丘守如臯命陳忠守海門遣楊縉守金沙而檄海防守泰州布列巳定賊果由金沙入海防等咸㑹先整兵舊塲一戰勝賊賊趨仲荘追及之再勝又及之鍋團復勝又及之十竈又及之牛王河又及之劉橋劉荘連勝而江南副縂兵劉顯者以三沙失利縂督視師二公責與諸将恊力又大勝賊潰圍走欲西而公預調曹濮等兵制其西遂北而我兵兩及之扵北輒勝乃奔唐家渫唐家渫者僻逺賊意無兵而我兵復卒起遂終勝賊盖無一人得免者自公與賊遇三閲月餘凡前後斬獲四千一百四十九俘七十八奪噐物萬二千三百九十亦可謂非常絶竒之勲巳報聞上嘉悦賜勅褒賚公再廕子轉南兵侍復轉北海防以下皆逓遷有差海防今代公為中丞賛决公勝算獨多焉公既行父老思公勲輒泣下議伐石狼山之巔謁繕部胡君文孚遣使馳都邑以司馬蒋公所撰平倭畧乞予紀其事予惟公之功不可勝紀顧其難有六曩賊至諸君皆僅城守猶慮不保公獨挺身迎賊出其外一難公迎賊如鷙之疾白蒲則如鷙藏海灣之役則如張罝待七星之役則如網澤而漁此皆據地得利形格勢禁先計後戰如左劵然非一時偶值其便也二難善乎視師唐公之議曰擊來船一較擊去船十夫來船真倭去船脅從來船力聚去船衆分其勢異也擊來船者鋤根消萌害乃冺滅擊去船則雖勝之民巳殘矣其功懸也今公所擊皆來船雖入境而民不知賊三難夫戰勝之後方當休兵古所謂强弩之極衝風之末不易再舉而三沙繼至屡戰屡勝四難自有倭冦即資狼苖諸兵公獨謝不用軍興以來多奏請不貲餉公獨持常額不加兵少而强費省而士奮五難予嘗從公游見其談道徳論性命究極指趣雍容儒者也其持身凛然立凖繩為世模楷及其擐甲胄冐矢石呼吸瞬息不拘故常臨機若神自諸老將皆以為不及乃知道有變化學有本原其所得深逺矣此其尤至難者六也予覧觀古今未嘗有無事之世幸而有其人則捍大患弭大變世難息而天下安否則變成患極一隅而四方起治亂所由可畏也兹賊擁萬衆入非公要擊之則陵寢重地南都根本漕運國計一揺豈小小哉而淮揚間前事可勝言哉是宜有紀昔周伐淮夷詩人作雅唐收淮蔡韓公作碑以其闗當世者大也主上神聖威武逺邁周唐而公適成功此地盖𢾗千年間三見而巳宜有作者以附扵常武之義平淮西之文予非其人而不敢辭也用勒之信石垂之後來使有所考焉公名闕號克齋江西之豐城人賀督府吳公平二源序林大春昔蘇子著御將篇自竒其言至騏驥之喻歸扵養之偹貴之極而後得以盡其才也盖古之人君所以奠安疆宇威信蠻貊者用此道也廣之者曰匪獨人主也人臣之職亦在御將儒者莫得其指以為人臣奉命宣力扵外而将者亦天子之虎臣烏從而馭之也曰不然臣者心膂也将者爪牙也以心膂而運爪牙茍御得其道靡不濟矣是以古之大臣必托君之權以御将人君必重大臣之柄以集事故能得至於成功而不廢此漢高祖文帝所以交制海内之術也假令當時韓彭絳條之徒而不得其人以馭之是項羽不必亡諸吕不必誅吳楚不必破也夫俞将軍者今之所謂宿将也彼其發軔交南樹功浙直驅馳塞外而徘徊扵章貢之間常髙視濶歩以為世無復有文終曲逆其人者出焉無復我知而我自結髪起行陣用兵且老矣冝無復用此拘拘為者豈知大司馬吳公出鎮粤西首疏辟之請移将軍軍扵潮州責以平倭事己而倭奴平潮人三載不為倭苦者公本請移将軍之力也其後廣恵英韶諸路時復有羣盗竊發雄據鄉縣延蔓數百餘里版圖户口㡬不復為我有甚者建官偽置至不逞矣扵是公復上疏發兵誅之分部既定公因與諸將計曰公等分道撃賊乃賊之為偹甚率有警急其勢莫相為援非公等才不足地形殊也今必擇為大將者一人以統之計無如俞將軍者扵是衆皆許諾而以河源兵属將軍當是時將軍方以海㓂酋首未得朝論紛紜乃公獨慨然上書争之以為此人可将别将而别将不能将将軍也扵是将軍愈益奮誓必平賊以報戱下俄而河源㨗書果至将軍請以百金賞壮士公從之廼盡徴其兵為龍門從化之援皆能與諸将戮力同心以次俘獲酋首斬獲甚衆而英源之兵亦從間道東與將軍兵合因用将軍䇿夜下賊壘数十所二源悉平當是時有詔罷将軍歸然而将軍猶在軍者實以公知巳故欲報之扵夙夜也嗟乎若将軍者亦可謂知所事矣彼其有感扵公之舉也而始終不變必欲以成其報公之志吾不知公之所以御之者何如矣儻不啻如蘇子所喻巳乎不然何以得此扵将軍也方將軍之功未明身在歸第矣而公獨以身任之將軍亦知公之不負巳也故竟得以畢志于二源之後而不去此非公見之明計之定感之深何能至是吾故曰人臣之職在御將公之謂也夫平倭之㨗將軍方復用信者未衰而任之其成功也易二源之役將軍方解綬疑者頗衆而任之其成功也難若公盖可為難矣昔者韓公啓鎮扵此特引副將歐信為冠軍大破諸蠻扵藤水近時尚書翁公之在宣大也以得周縂兵尚丈故累收雲中之㨗由此觀之方今天下南北之事亦在乎知人善御將而巳矣然則今日登燕喜之堂而歌方叔召虎之勲者舎是亦何足為公頌哉賀兩廣總制劉公蕩平廣西十寨序林大春盖五嶺之外百粤以西其地多谿峒山絶巖險其在龍城象郡東蘭上林之界尤為阨塞要害爰有巢穴是曰八寨槃瓠氏居之實繁有徒爾乃蜿蜒伏蟄合萬為一散而為萬聚而為十猛獸毒蟲一呼叢集用是勤于我師我師奮撃大破之㨗聞有詔嘉鎮臣少司馬劉公功因下廷議所以宣㨗事扵是禮官上言按令甲四方撫鎮奏報俘鹵功次非大㨗不得傳宣致告重國體也惟兹十寨世為邉患盤據萬山之中聨絡千里之逺以䖍劉我民人荼毒我鄉縣至不逞也徃在先朝故都督臣觀嘗合圍困之矣而卒以撫罷兵土酋岑瑛諸猺所畏也僅獲百級而還惟故新建伯臣守仁師自思田旋攻之出不意廼克底定顧其斬馘不越二千建白未竟施行以故歴嵗滋久復爾生聚以有今日今一鼓而蕩平之功以萬計此百世之伐也誠宜如故事宣播㨗音君臣致賀仍乞遣官祭告郊廟以彰寵靈得報可禮成上廼錫公及總帥将吏而下金幣有差於是海内搢紳謂公斯舉也有新建之遺烈焉而遭遇盛典則過之其時東郡守吏二千石咸有徴言以侈其盛而潮州刺史張君某則以言属之林子林子聞而賀之有問者曰竊聞之西粤之冦所在而是十寨雖雄亦為㓂耳曽曷與扵全粤而子乃獨賀何也林子曰迂哉子特未之考耳夫吾省之有西粤也是輔車唇齒之勢也諸猺之有十寨也是新建車軸木根之喻也故自戊子一創粤人亦幸有寧宇矣乃頃嵗以來不能不興古田渌水之師者則以此賊復生之故也假令失今不除雖日與諸巢從事譬之伐木而弗㧞其根摧轅而弗折其輻也勢不至於蔓衍不止此充國之所以破先零而孔明之所以擒孟獲也則亦安得而不為兩省賀雖然士幸而生逢明聖親授節鉞出師萬里僵尸流血海嶽為之震蕩三光為之薄蝕此固大丈夫得志扵時者之所為而豈其心之所欲若乃際㑹風雲身依日月口不談平呉之事色不動破秦之烈而宇内晏如蠻烟景滅移風易俗使天下囘心而嚮道此則大臣之致意者公寧無慊於志邪余竊為公願之矣是年秋又㑹有河源之役河源平詩云薄伐玁狁蠻荆來威此之謂也賀督府張公平逆奏功序林大春潮自逆璉倡亂荼毒生靈海濵所在盗起其鄉邑流移破滅者不可勝𢾗山林草澤亡命之徒靡然從之扵是負險稱孤分部買属東接倭夷引甌粤徜徉於江福之間諸路大震於是墾野積儲閉闗通賈南絶潮粮道而又纍石為城煑海為塩銷鉄以造兵噐而反形成矣當此之時羽檄旁午道路訛言吏莫能禦而璉又以虛文妖書徴禮儒士以熒惑愚民民愈揺動廼督府大司馬進賢張公實奉命徃征之以嘉靖四十一年四月移軍潮州先是師過潮陽有上書戱下言便冝事者因言賊衆甚未易與状公笑曰予奉命從諸將撃東南反者吾知以順討逆衆寡非所論矣聞者驚服後一月果得璉及其偽將伯宣雪峯而下凢若而人餘黨悉平公乃宣喻本朝威徳以勞將士而填撫其人民民乃大悦林子曰嗟乎公之此舉也非獨以戡禍亂也盖亦有正人心之功焉我潮在昔為南粤故址其在漢全盛時趙佗猶雄據一方以妄自尊大陸賈操璽綬而説之僅乃稱藩武帝元鼎中越相吕嘉反殺漢使者至勤江淮以南十萬衆遣楼船六將軍伐之大㑹兵扵番禺踰年而後獲嘉夫以陸生之辯而不能使越人之知有漢也楼船諸將亦雄矣至其所建功名乃僅以一嘉故然而史氏書之以為羙談而今公乃獨馳嶺外親秉節鉞以與南粤從事不旬月而克平大憝廓清海隅日出不知後之論者扵漢何如也方璉等之未就擒也人心洶洶以為必不可得方觀望焉以徐俟其定而彼亦且自以為莫我誰何豈知師未及陣乃一鼓而擒之使人心曉然復歸扵正此五帝三王之師所以無敵也假令當時公不慨然以討賊為巳任稍徐議之而彼因得以有偹外與諸㓂連和趙佗吕嘉之事豈足道哉扵是潮陽學博劉子紱蒲子世麒與其諸生鄭某等聞而請叙其事以為公夀且將列之學宫以俟來者得以考焉林子曰始余盖與公論及王陽明先生平江西事嘗竊有感扵斯時之難云夫江西之役事既出扵便冝而功復成於獨制乃今公之此舉也則不然矣權分而制遥非大勇其孰當之若夫明大義以正人心謂非仁者之功不可雖然公固不自知其功也方歸其徳扵上而讓美扵人詩曰公孫碩膚徳音不瑕葢古之大臣用心盖如此記張僉事龍門之戰林大春張僉憲名時字宗易保定易州人也少與楊太常繼盛同學楊兄事之嘉靖中先後舉進士楊拜南京吏部主事稍遷員外而張君方待次公車㑹北兵入冦長驅薄都城中京師戒嚴君倡言扵當事者請與决戰時不能用兵退復來以入貢為名大将軍鸞上言請令塞上得納邊馬因稍易以繒帛塞南侵之望詔許之其年楊適入考調兵部客扵張君所遂草疏劾鸞誤國不道以稿示君君曰此疏正不可少第必無聽如聽之將令為之當誰属乎楊曰請以属子某有死以報國而巳君勃然作色曰大丈夫死必濟國家事豈徒死邪因私徃見陸太傅炳説曰大將軍議開馬市楊員外以職事宜言主上幸而見原大善有如聖怒不測使漢有殺計臣之名為天下笑竊為大将軍不取也此其責宜在太傅太傅深然之及疏上下楊繼盛詔獄責問坐讁邉尉得不死後嵗餘鸞伏誅楊復召還兵部甫至京十九日又坐劾奏嚴氏父子事論棄市先是楊既之邉君亦尋以憂免至聞楊召還諫死獨恨弗能救又復自念業己徃即救俱死無為也因為之發䘮扵易水之上而服焉且為力存其後或問君與楊子異乎答曰昔者伯夷太公兩人者同歸周豈其志不同哉然而孟津之㑹尚父鷹揚夷齊扣馬彼固各有謂耳其後六年丁已服闋補刑部主事有詔令大臣各舉才堪邉寄者以聞扵是九卿中三疏薦君調職方主事其年奉使徴兵入衛西自秦中還上邉事因言故将某某可用從之已未遷員外郎尋出為山西按察僉事偹兵獨石是時邉戍久空動倚客兵為援其實首䑕伏匿不敢戰所過騷然不寧邉民苦焉君乃始請罷客兵復屯戍稍益募壮士教練之久之西北傳舉烽言北兵將至矣君私與部將計曰兵至必掠龍門龍門者宣府之右臂也龍門失守兵必乗勝南下逼近紅門此其為患不小乃自邏騎卒得七百餘人趨援龍門俄而兵果大至凡𢾗萬㑹日暮分屯夾道為營營長可𢾗十里君復私計曰兵至不知我有偹且賊雖衆屯夾道道狹難猝聚可掩撃也因出死士𢾗十人夜襲敵營營中大亂首尾不得相救盡獲騾馬牛羊以歸台吉聞之大駭黎明悉衆來攻龍門君令集民間車環以為營以五色綵繒畵龍文衣車上出城中老弱守之而以精騎自將而前與台吉戰大破台吉兵扵龍門之野我兵鋭甚徃徃馳㦸入敵壁斬騎將騎墜輒刺殺之有捕擄者謂台吉言我累嵗盗邉莫我抗今若此因憤不肯退及遥望見後車車畵五綵龍文勢甚壮望之如山業思為遁計適城中樵夫為敵所得問得虛車状敵乃大笑復奮我兵猶殊死戰不可敗相持至暮所撃殺無𢾗我兵死者亦百𢾗十人敵因罷去卒保龍門林子曰余觀張君所將破敵士僅七百人可謂壮矣豈李陵所謂荆楚之竒材劍客勇士邪何其能以少撃衆如此也徃余在京師客從塞上來為余言張君陣龍門事甚偹余故悉記之大抵君平生與人忠遇事智見義勇其待士也嚴而有恩臨難不避以身先之此其所為能得士之死力有以也論者謂其輕敵寡謀致顛越扵我師又却客兵不用以至無成功竟下兵部議坐貶重建東山靈威廟碑林大春有唐忠臣張許二公死節事在睢陽睢陽祠之舊矣潮陽非二公故所經歴地也而必祠之者按舊志宋熈寧間軍校鍾英以郡遣入貢京師道出睢陽禱扵雙廟其夜夢神告以遺像處命之歸祀扵東山英心異之及抵京竣事還過廟如神指探寢殿笥中果得十二銅像二銅輥以歸置扵東山之東岳祠時有𤣥旌見其上旁寺驚怪不安請移避之有司因立廟焉事聞封二公王爵賜廟額曰威靈潮之有廟盖自兹始其後二百餘六十年元之大徳十一年也縣尹袁天漢始與前進士趙嗣助倡義鼎新之説具劉山長應雄碑記又二百六十年為我明嘉靖癸亥廟燬扵兵越二年而潮州節推鄭侯良璧者來署邑事復捐俸重建焉其年邑人林子適自睢陽至因考睢陽廟祀位次自張許二公而下祔以雷南姚賈凡六人盖詳之也而吾潮則特祀二公繼増雷南者義起也今新廟像設二公與雷南而不及其它者仍舊也廟制雕鏤金碧之飾視舊略為渾朴者費省而不及民也廟庭從以鍾趙及生祠鄭侯者不㤀其初從民欲也而記則林子為之鄉先生志也林子曰余曩嘗守睢陽親弔二公百戰處為之低廻而不能去至詢及二公託夢來潮事則故老巳無在者或謂昌黎韓公當時嘗持正論以闢朝議後坐諫佛骨謫潮潮人祀之故二公之來以韓公所游寓也天順間夏嶺為亂長驅且襲潮陽既入界遥望見城中車旂火炬甚盛遂不敢進乃者倭𢾗内侵少年輙乗城罵賊賊為首鼠而走又漳㓂乗虛夜縋入城為翁别駕所破其時賊衆嘗自言既入城即手持尺鉄不動長老相傳皆謂二公之靈致之癸亥之春倭復大舉𢾗萬薄城下以雲梯十道先登鄉兵荘七等奮撃死之賊兵大敗顧獨恨欲坐困我又復造為臨衝之車以圖後舉未至客有被擄者廼從賊所射書城中言撃車法甚具且曰賊圍潮陽且兩月不下彼意亦欲遁耳第竊聞之賊中言徃者來㓂嘗有二神人現今望之蔑如矣意者神其不䕶此邦邪此乃所以久而不去也為今之計莫若禱於雙忠之祠請夜見焉不則迎神於城以明為神或一助也書至父兄豪傑皆疑以為為賊間諜且嘗試扵我余獨謂此若有合乎兵家用詭之説者從之便於是與衆禱之復為二公遺像夜出城上賊望見果大驚既又稍用其法連破賊車於城西南扵是倭夷始有遁意矣㑹賊中有偽降者陽為兵向賊實持城中隂事以與賊且幸不去為利賊乃以千人積薪累城下歴晝夜高可二丈許城中危甚莫知所出父兄豪傑皆云冝用火攻㑹是時日暮風起議未定復如祠卜禱之請得反風頃之火下薪燃天果反風火大熾鼓噪聞𢾗十里我兵從城上望見賊棄營走所射殺焚死無𢾗明日果遁去其英爽如此世謂二公在日死守睢陽屹為江淮保障唐人得之以濟中興而不知神逰千百年後猶能顯其靈異以保我海邦如此也則夫今日廟貌之重新亦豈偶然之故哉初潮之被圍也兵火相接者彌月遂及扵廟及鄭侯至首謁行祠而有感焉即慨然以起敝更新為巳任士民聞者莫不慕義輸金恊力以佐工作盖至是而東山新廟告成侯因樂與鄉士大夫登覧而賦之其年乙丑秋九月距經始纔三閲月耳所謂不日成之者非歟辭曰於穆雙廟爰始睢陽二公是祀歴宋而唐功存一代神逰八荒鍾君乃夢至扵海邦斾彼𤣥旌不顯其光廬厥禪居以慰神栖天子聞之賜爵執珪世代更易嵗久而隳邦有賢哲趙公令儀作廟翼翼是饗是冝大明中天祀典維時威靈有赫剪彼潢池天運維艱棟宇山頽㑹朝堂構忠魂是依云誰之功賢侯戾止明明我后化隆風紀明禋匪懈下民是庇勒此貞石永垂奕世梧州鎮城改造瓦房碑林大春梧州為東南重鎮實兩省冠裳之㑹三軍所出四民聚焉然其地僻在西鄙非通都大郡其俗尚簡朴無髙堂華屋之觀盖自官府學宫之外率多竹廬以蔽風雨每間嵗旱烈輒焚燒𢾗百家俄頃而盡居民常望見火熒熒從屋脊起遂謂天災莫可幸免巳復結竹環居如故以為常嵗嘉靖乙丑六月城外大災其明年丙寅六月又災扵是藩臬二使者患之因上書督撫兵部右侍郎兼都察院右僉都御史南昌吳公自言奉職無状弗能宣揚徳美致召天災殃及扵民宇民用慘戚請與吏二千石而下痛自修省以囘天譴因發倉賑梧之被災者不勝皇恐待罪是時吳公適以上命東征二源先移軍扵端州書至公方勞師軍中為輟食泣下言我以東兵之故而遺西鎮黔黎憂雖大夫自引咎乃余㒺豫圖其亦何責之辭遂可其請且移檄鎮中召父老而諭之曰頃余乃弗虞爾等弗戒因燔扵爾宫余甚憫焉雖然火作不扵秋冬而扵盛夏此非必皆天災也其居使之然也夫滄海之舟雪山之騎昏夜索火必無與者使童子操竹而磋之則其火立熾由此觀之竹以致火亦明驗也而梧之民乃徃徃折竹為椽編竹為户上棟下宇匪竹莫湏環城逺近鱗次而居井灶相續寢㸑其中日氣下暴地氣上蒸欲求無火不可得己故火之起自屋脊也實暑盛竹熱極之所致也而反謂為天灾不亦誤乎且夫憚費惜勞而安扵陋習者賈豎之守而更化善治移風易俗者聖人之事是以豳風陶穴亶父契龜陶唐木處神禹鑿龍故泰伯端冕以化吳仲尼絃歌而治魯凡以承天之道相地之宜貽斯民以久安長治之術者也故民㒺擕志士習而安焉子孫世世守以勿失然後教化可興而風俗可同也今梧人不寤乃欲為一切目前之計以茍嵗時卒有不便于巳即委而去之視棄其居如弁髦然甚非所以示民不遷之義也其令民自今皆易竹廬為瓦屋力不足者官為資給助之能以義倡為凡民先者旌之有不如令者罰之甚者籍其地而墟之扵是乃發窰戍千人命中軍監製甎瓦累𢾗十鉅萬資貧民所易取令藩臬使者以意行之行之郡縣五閲月而鎮城外内居民無復敢為竹舎矣君子曰觀扵此而知王政之及人至易也其澤逺矣禮樂其可興乎初公令既具或謂不如令之罰至墟其地不巳重乎公曰不然正使之難犯耳至是功成果無犯者其年秋二源平公且還鎮徃觀之㑹有詔召公入賛機務尋復召還本兵于是士民争赴郡請紀其事曰公之惠我西人者亦多矣靡得而悉記也不動聲色而遺我西人百世之安者亦大矣不可得而聞也無巳則請以前事識可乎大守許諾更請扵二使者二使者謝曰是誠在我顧我愧㒺以賛公其何敢辱之太守曰夫六月之災惟使者幸聞之今日之役亦惟使者幸教之願使者勿辭扵是二使者揖讓三反而太守而下與愽士弟子復三過之然後廼始采掇其文而為之記使者謂大恭劉君子興與僉事林大春也而記即大春為之明大叅之讓也太守為誰晉江丁君自申也自太守而下若同知柯文紹通判陳紹文潘仕雲推官李佐蒼梧縣知縣海鵬則均之與有經理勸相之勞者其辭曰於皇我明徳覆六合翼翼蒼梧雄鎮是作宛彼江流賔旅雜沓民亦繁止修篁是托四月維夏六月徂暑連袵成帷揮汗成雨炎蒸載臨烈炎為災使者陳辭爰告我哀吳公曰咨咨爾群黎禍匪自天厥廼自貽我圖爾居陶瓦攸宜曰止曰時築室扵兹乃資爾財乃佐爾力庶無後艱以永今夕百工趨事庶僚祗式一勞暫費其䆒安宅於惟我公澤並洪鈞潜消黙運大造我民禦災捍患尸祝户陳君子萬年正是國人粤稽史籍伊誰配矣夏禹不作民魚鱉矣齊㣲管仲吾奚賴矣方公之功誰今右矣千載穹碑卑漢水矣平蠻碑林大春皇帝受天明命誕撫多方威靈震扵殊域徳被方夏上覆飛鳥下及牛馬以至日月所照㒺不賔服其鳴鏑射鵰之長雕題露紒之國獻琛納欵奉職貢扵朝者不可勝計况乎六合之内五嶺之外職方所載又惡敢有越厥志惟是深林大澤之中時有藏垢納汙負險為固以茍活扵戴履者有司者御之失律遂用不逞以魚肉我民民廼大困扵是夏官尚書按圖籍覈户口之𢾗上書闕下謂南有掲嶺自秦属南海郡故稱沃壤編户之民採山為茹釣水為食至終其身老死不知兵革吁吁喁喁日蕃以息乃頃者守臣言田疇多蕪穢不治人靡寜宇户異其處膏塗草野血流川渚盖巳十喪其五矣推原本始則以黄巢石硿大節諸㓂積嵗為之蠧也桂嶺之属是為古田亦桂林象郡之奥區也徃自先朝縣沒扵賊竊據垂八十年吏議棄而不守以為彈丸黑子之地不足以煩中國也而或者又以時屈鮮任事不貳之𨽻為解至置盗府庫戕大吏之罪而不問臣竊傷之夫九真内附珠崖外迸斯徃事得失之明鑑也惟我天朝幅員方𢾗萬里咸正㒺缺奈何遂棄古縣扵逺以業蠻夷臣愚以為復之便其嶺東黄巢諸㓂並冝掃除以清北户詔許之因特置廣右撫臣以新安殷公正茂為之而以兵部左侍郎南昌李公遷節制兩廣軍務兼撫東省為罷東省撫不設云先是兩廣頻年用兵而議者謂莫亟於古田及嶺東諸路廼先後鎮廵諸公與夫境内搢紳先生之在都下者咸以為言及李公到鎮復與廵按廣東監察御史趙公惇廵按廣西監察御史李公良臣亹亹申明之至是本兵乃立主其議以賛扵公公因得以便宜從事以隆慶四年夏秋之月始事於轅門下令曰今日之師奉天伐罪将以禁暴止亂以惠安元元也諸将吏從東西行者有進無退其不得賊者無返有不用命者罰無赦扵是東師則以遊撃将軍誠立将長樂之兵按察使張君子𢎞監之以叅將濠將程鄉之兵副使江君一麟監之以縂兵成將潮州之兵僉事楊君芷監之而以成縂其事專理粮餉及紀驗功次者則叅議許君天琦也西師則以逰撃将軍山都指揮僉事龍都指揮僉事國賢将思管風門蓮塘之兵叅議龔君大噐監之以左叅将應甲右叅将世科將三門龍坑之兵副使鄭君一龍監之以署都指揮僉事鳯翔將都狼之兵副使應君存卓監之以副總兵崇文將總甫之兵副使邵君惟中監之而征蠻将軍俞君大猷實縂其事縂理軍儲及分理粮餉紀驗功次者則左布政使郭君應聘叅政柴君淶僉事金君柱也當是之時興師十萬飛芻千里旌旗蔽空烽煙相属盖巳先聲而奪人之氣矣廼公復徃來扵蒼梧興慶之間相度機宜指授方畧羽檄交馳朝聞夕發扵是破鳯皇渉潮水斬西賊渠率黄朝猛韋銀豹等以殉得村栅六百五十五處降人卒𢾗千斬鹵一萬有竒東攻黄巢撃石硿襲大節生擒賊首蘇繼相曽魁杜髙山等誅之尋又乗勝出竒南走東坑斬獲曽朝元等扵海豊之界破巢五十斬鹵三千其墜落巖塹堙塞谿谷中死者無算盖自兵興以來甫浹旬時而群兇授首古縣克復其在東則張憲使在西則俞将軍二人之力為多論者謂其有伏波楼船之遺烈焉師還李公疏上諸将吏功次詔加爵賞有差扵是張君廼以李公之意遺書林子請紀其事林子曰予曩盖偹兵蒼梧古田之役吾其與聞之若夫揭嶺之㨗即今之得扵睹記者甚盛詎可以不文辭辭曰於惟明徳既成武功統一宇内六合同風奄有百粤遂荒大東桂林内拱南海朝宗馴至中葉運撫熈隆古縣淪沒蛇虺為宫亦有妖氛近集海邦如鴆斯啄如䑕斯藏我皇嗣統軫念遐荒司馬叩閽義激中腸天子曰咨咨爾封疆念我舊址幅員既長云何不予恣必猖狂錫爾節鉞我武維揚既敬既戒群醜于襄臣拜稽首帝命肅将敢不矢心告成扵王東征西怨大旱虹霓貔貅十萬霖雨三時驍驅電發羽檄星馳方畧指授廟算神機更有同心共濟艱危曰惟憲使南土是依矯矯虎臣料敵出竒千騎萬旟談笑而麾一朝克復久䧟城陴殱厥渠魁脇從㒺治黄巢大節以次芟夷農狐授首狡兔魂飛西人歡呼言歸故園自我不見于今抱孫東人悲辛有赤其村載芟載柞豈我思存於嗟明徳覆育元元無㤀逺畧永固雄藩於今始成嶺外乾坤皇心悦豫湛露鴻恩将士戮力其膏靡屯臣拜稽首天子萬年四夷賔服昭格扵天崧䑓之陽瀧水之濵勒此貞石敢告籌邉平九絲碑林大春今上龍飛改元覃恩八極乃眷西顧底清梁益扵是西川守臣御史大夫曽公省吾祗命惟謹既廣徳意柔逺寧邇廼窮覧其山川考稽圖誌周爰咨諏及扵荒裔惟時西南之夷宅彼戎鄉倡亂稱王號曰都蠻流毒扵江陽卭僰之間㡬易世矣彼其據九絲以為城恃天險以難升而輔以都寨翌以凌霄自秦漢而後弗能殱也邇在先朝屡勤将吏師出㒺功顧愈益熾于是前守臣部使莫不亹亹上書請與西南夷從事者有詔悉聼便冝行之至是御史大夫乃以疏聞因下巴蜀檄諭意曰明興二百餘載徳被羣生風行區外皇上御宇六合一家自彼氐𦍑至扵北庭莫敢不來享雖虞格有苗周服獫狁弗盛扵此矣乃兹匪茹負險為固下黷坤靈上干天紀予其敢緩于不赦之誅咨爾将士暨爾黎庶尚其與予同心克清大憝予敢弗敬以忝扵百執事惟百執事圖之乃與鎮西将軍都督劉君顯及藩臬大吏二千石而下以元年春三月大㑹兵于犍為之郊其年夏五月朔克凌霄城下之擄蠻王以歸我兵乗勝長驅遂薄都寨以六月既望襲破其巢因遂進攻九絲既踰時乃下獲寳鼎二諸葛銅鼓六十有四獻俘闕下上嘉納焉先是凌霄㨗至御史大夫與劉将軍計曰賊據九絲以凌霄為東藩都寨為左臂撤其藩而不斷其臂非長䇿也及都寨既破乃分兵為五以克九絲而以劉将軍之兵衝其西故将軍郭成撃其南故将軍安大朝等繞其東叅将張澤戰其北故㳺撃將軍吳繼祖等扼其西南與劉将軍兵合號連珠營營近蠻場禾稼方登我兵因之為粮既飽而嬉㑹積雨屯霧賊守愈固我兵稍却持之賊謂兵偹弛可少縱矣又㑹蠻俗賽神因大醉諜得其状諸将從帳中喜曰此可撃也乃夜令傳箭我兵冐雨攀藤懸崖而上至明斬闗而下諸蠻大潰九絲遂破時其年九月九日也是役也凡克寨若干擒王若干斬鹵五千有竒其墜崖落塹堙塞川谷者不可勝計拓地至八百里牛羊積聚金甲之属無𢾗盖自通道渡瀘以來西征之烈未有若斯之盛者也初劉将軍以他事坐論當奪将印御史大夫乃言于上謂将軍久事西南宜可使過又故將成大朝俱嘗効力西陲乞勉留共事許之竟以成功至是御史大夫復請如滇南沭英交趾張輔故事久任将軍及條具建城置守阨險通道設官分戍恤民興學等十事上之又請易戎縣舊稱以絶戎心俱得報可特賜名曰興文于是侍御龔公懋賢以代廵至嶺南間述全蜀士民之意及故相大學士趙公貞吉所為平戎詩序示予而属予為紀功之碑其辭曰奕奕梁山作鎮西蜀惟王建國分為藩服産彼戎羗乾坤並育豈伊異心匪我斯族慿阻為昏高旂大纛歴代逋誅徒滋熖虐嗟我先皇軫念邉陲羣臣獻計請事西夷我皇嗣統益隆撫綏天語丁寧命将出師鼓未成列首下雲陴擒王斬帥薄言旋歸繼鋤險寨孤壘岧嶤九絲壁立颯如風飄野無遺㓂千里蕭條云誰之功曰漢嫖姚朝息狼烟暮收鼓角秋獵春耕牛羊露宿嚴城置守設官建學成聚成都家給人足伊誰之賜御史大夫忠比諸葛檄似相如三年通道五月渡瀘鳴金列鼎丕著禎符亦有雄才為賦蜀都天子樂胥賞延于世身歸扵朝将留扵戍古縣更新易名今制歡震巖谷澤流荒裔戎運告終華風永固孰啓斯文欽哉命使勒此青城永光白帝平都蠻碑董份都蠻者古西南夷自愽望以笻竹造端唐䝉以蒟醤開道遂出牂牁臨巴筰建越雋啟沉犁地乃入中國然道逺險阻武帝㨵二方而始通武侯亦七擒而後服盖桀獷𢾗反覆難制所從來久矣明興設縣置吏蠻属版圖居封域而或服或叛凡遣將十一征其最大者至遣大司馬信襄城侯瑾提二十萬衆調三省兵費鉅億計始亦嘗震叠而後稍怠弛扼陿四年師老力詘强弩不穿魯縞竟不能薄其内城而還蠻遂有輕軍吏心積久益睥睨僣號自擅諸稱王者𢾗十人嘉隆以來益恣𢾗擁衆剽掠叙瀘六縣間縱燔燒逞禽獸暴虐屠戮者不啻萬𢾗刳孕婦槊嬰兒以人命為戱惨不可言部使者𢾗以聞而當事者畏難則皆以撫為解蠻亦詭撫就利然撫令未徹扵邊界而蠻鋒巳警扵蜀郊矣及曽公為大中丞撫蜀乃奮曰古稱鍳近事戒前轍今蠻𢾗撫𢾗叛近事失而前轍覆彰彰著矣而猶欲為撫是謂委肉餌虎抱薪撲焚祗資其燎而助其噬也夫一夫不獲仁人所隐今六縣荼毒萬姓哀號逺近澘然天日為惨固有人心者所不忍也而計身以避難緩賊以滋禍将謂民何且蜀三靣皆邊輔車相連地壤相接犍僰既震岷嶓必揺樹撼者本傷肢病者心慽未有六縣不靖而全蜀得安者此固疆圉之大計也且今八荒效順四海晏然者以有法在也蠻以小醜𨽻属邑而僣王不問首亂不誅叛逆自如禍釁靡己豈治世之所宜有也乎此尤法紀之大防也故正法紀所以尊朝廷保疆圉所以衛社稷此人臣所當力持以身殉者也乃忼慨請必征焉而公知敵情識地利審險易虛實得其要領因與将議計曰夫蠻據九絲怙天險而以都寨為左翼凌霄為前障自謂鼎足不拔之勢也然法有攻瑕有困堅攻瑕者乗其易困堅者奪其援乗其易則敵不及救奪其援則莫與共守此形格而勢禁者也今誠先取凌霄以撤其障障蔽闕則堂奥孤繼勦都寨以剪其翼羽翼折則巢窟䘮九絲如拉朽矣此固賊天亡時也疏遂上先是元輔張相公𢾗以蠻當征而難其人顔獨注公謂辦征蠻者非公不可及見疏知計所從出乃掀髯起曰嗟乎有以哉吾固知其辦此也斯所謂敵在目中而玩蠻扵股掌之上矣因貽書勞苦公曰甚善旦暮當㨗然奉槖鞬禀韜略奔走以成公志者必大将劉顯而郭成其次也顯束髪與蠻戰著名蠻人言顯輙震慴而成父被賊殺仇不戴天而勇故可用公留意焉又曰夫戰當以蠻攻蠻而尤當以仇攻蠻六縣之仇蠻深矣因收之宜効夫兵無常形戰無定變善之者出竒無窮兹若以大兵屯堅城壓其重而别以死士從間道擣其虛此亦制蠻一竒也公得書與意合大喜㑹顯以閩事被重劾公遂疏以臨敵忌易將而用人貴使過属征方始顯振厲常冠鋒其所摧敗功足暴天下而閩地逺事久不可知宜稍濶畧收拭之顯遂釋復用而公以顯才可操縱使也𢾗靣諭𢾗以劄諭諸所慰藉如春煦而時有督責如霜嚴顯得煦則矢心感而嚴則痛哭懼彼頼公保持而又感且懼不能不為公捐軀矣其加意善鼓舞人如此而成故縂戎以論廢乃不待請而即起家為劉副焉其越丈法亟㧞擢人又如此公左提右挈任二将專轂而益置安大朝劉澤等諸將為偏禆人人當其才俾盡力而奢効忠者蠻地宣撫大俠也與安國亨世仇殺相犄公乃檄効忠以當敵而牽國亨以制仇効忠無後憂遂率𢾗萬人前進焉乃益拊六縣弔其孤慕其勇敢激其憤使子報其父弟報其兄人各為仇人自為戰如是者復得萬人兵益振矣而公猶慮将士怵前征之難尅狃近撫之茍媮志惑而鋭沮也乃坐慕府開轅門大諭以前後十不同之説歴𢾗百千言因復忼慨曰夫人臣臨枹鼓則忘身袵金革則争死忘身者不反顧争死者不旋踵古之義也幕府受命膺斧鉞以誅叛討賊為職誓滅此朝食方有以報天子義不與賊並生敢有狐疑持兩端惑衆者殺無赦敢有首䑕進退沮軍者殺無赦幕府惟是斧鉞不敢專亦不敢貸爾衆勉哉公忠義激烈一軍無不變色易容壮者裂眦髪指冠弱者聳甲持戈躍皆奮矣而公益重購鼔敵愾懸𢾗萬金城下募先登犒令日益申督戰日益急而公親移營亦益近将慿軾觀戰焉士遂益奮而顯挺身䝉霧雨冐矢石振臂大呼䧟陣而成與諸将諸兵繼之果如公本計先破凌霄踰月破都寨再踰月布十餘壁為連珠營偪九絲下適積雨阻攻蠻亦恃峻死守㑹九日蠻賽蠻故重賽而是日晦㝠雨益甚謂不能攻也且守疲遂聚飲大醉顯詗知之宻令所将将統勁卒千以夜半衘枚攀懸絙縛危堞斬重闗直入蠻大營帳内蠻皆醉臥者寱起者愕我兵亂斫如刈蔴湏臾斬營中人畧盡夜漸䦨成亦率衆随至而朝與澤及諸将繼至奢兵與六縣兵及諸官兵皆大至鼓譟震地攅矛戈横撃勢若墮城分斬諸營亦立盡間有逸者顯復遣将追獲之都蠻遂平人皆言諸葛公以五月渡瀘而公亦以五月大舉裴晉公得李愬以夜半乗大雪入蔡而公得顯亦以夜半乗大雨入九絲古今忠賢智謀勲烈相類有若是者亦竒巳是役也僅𢾗月而摧兩重城踣𢾗大寨剷𢾗十百小壘縛首叛擄名王以下三十六人擒斬五千墜厓竄死者無𢾗築鯨鯢京觀傳首懸藁街除千年未滅之強敵收明興十一征未有之全㨗洩萬姓惨虐之憤弭全蜀百城之憂振天朝三尺之法而適當天子御極元年明四海八荒底定之兆肇億萬載太平之基斯亦甚偉矣公因獻諸俘馘并以所獲古函牛寳鼎諸葛名鼓淳于彛噐凡若干以進附周白環楛矢之義天子大嘉之因肆類上帝禋祀祖廟荐功與噐告武成焉而公與顯等晉官加廕有差云是役也拓地五百里闢良田二十萬招蠻人𢾗千授耕而度地制中立城建廨鎮以大将重之憲臣所以防㣲杜萌控險壓阨者偹矣而上又賜戎縣名崇文置學師弟子盖化逆為順止戈為武而兵始如雷霆繼若時雨亦誠有先王之遺意矣予曩承乏史氏身雖退𢾗好紀當世勲業雅知平蠻事甚竒而許使君者嘗為蜀令以才略選行間親覩事終始兹使君以侍御轉浙臬與予言甚詳予因得偹著之至是曽公以中丞屡遷至大司空矣史董氏曰始予與司空善見其遵道徳樂詩書履繩蹈方雍容儒者也及當疆埸非雅素任險難而張弛隨時臨敵變化又何異也豈所謂文武惟其用之而臨事乃見耶然相公獨先識之至其預畫廟堂授計幕府大者論将小者論兵而未卒以竒勝也𢾗言决䇿萬里若符百不失一異尤甚焉頃者邉𢾗奏功敵人納欵廟堂所以制之者謨祕不可知然觀都蠻事可想矣昔在周室召公分陜太公主兵皆所以夾輔王業者也而至今獨稱周公有大勲勞不虛哉不虛哉明文海巻七十一
