body:
  text: 明文海卷七十二餘姚黃宗羲編碑六少司馬兼御史中丞掖川侯公紀功碑何洛文夫人臣折衝扞難樹絶世之勛蓋有所甚難焉方四邊為蟊賊而疆圉之吏執櫜鍵以禦之長短之形易見也及其回首靣內剖符通關中國不愛金繒之費以休士民而贏詘之數亦易𣙜也惟彼之情忽有不可知而我之算猝有不及用則勞臣畢力而策士殫精矣北方自先帝時固巳交臂欵關歸命下吏比聖天子威靈燀赫遂益親附邉保塞惟謹而濟農故部落居漢所取河南地號為套內而西與番接又徑隴西塞馳之西海以與衛拉特為難至折北不支忿捐失圖欲歸重於俺乃創禮佛之議紿之西遊彼久偃兵勢不能無轉徙又心慕佛欣然兾遇之於是率二十四長悉舉引弓之民並塞而西假道酒泉張掖之間將吏惶愕莫知所出屬制府大司馬董公病困而少司馬侯公鎮甘肅憤然任之曰人臣職在封疆夫使先為其易而誰當難者乃畫方略奏狀䇿其所從入部材官騎士分屯要害以建武節而隂為之偹吏具繒絮米蘖食物道上召主將以下畢勞賜而驅之彼勢蜂屯鳥舉前後絡繹公所布遣事有成算竟出境不聞有它天子嘉其績下書褒勞寵賚優渥將吏咸受金爵矣套之西也其設變乃有數端至則請開市甘肅入馬而受中國所與番茶公䇿之以為套與番不可使合也朝廷以茶制番之命而以其柄豫敵是驅番而附之也乃使使謂彼北邁市費以十數萬甘肅餉萬金耳奈何市於是敵謀折矣先使一隊往嘗衛拉特沒不出而套內猶日夜譬説必甘心乃己公又策之以為套與衛拉特不可使搆也衛拉特破則驕驕則我受兵衛拉特勝則憤憤則我受兵皆非得也又使使謂曰今倍數險越數千里而攻人控弦之士有一不備而歸得無如鯨失水語未卒彼色動謀又折矣志既不得逞無以自解于諸部又借媾土魯番以哈密為地又懼哈密之小梗則使使出嘉峪關以中國要之公又以為關門所以限羌氐奈何示以扄鐍則露師哈密愒之謀又折矣套倚鄰兵為重不欲使東兵亦樂西海方築宫事佛無歸志公又以為此非西邉利則委之鎖南堅參鎖南堅參者烏斯藏法王子所謂佛也彼稽首而事之公計惟此能操其進退乃詳向慕其言風以朝廷威德使自從其所便彼乃決䇿東歸上書謝邉吏去而謀又折矣外兵去而公又念以為套人修怨之志不可使畜也畜則西方無寧曰乃召其長招進台吉以下賜以綈繒比餘雜物面慰藉之遂大感率衆拜去不復以衛拉特為言而謀又折矣是役也彼以四十萬衆頓之門巷之間事變翕忽情勢暗昧呼吸轉移疾若迅電而公測深探情批郤𨗳窽使內無隱謀外無匿形進退如運諸掌即又不請內帑一金也以較之擐甲而鬬與出金帛為媾者其勞有功未可以上下計難易之勢不又相去遼絶哉往漢時空天下之藏置河西四郡以隔絶胸奴相通之路又西通月氏大夏以分丐奴西方之援國故至宣帝世呼韓入獻見比內侯王也然郅支以一旅西走擊城郭而臣之易于折挺况其甚盛者矣國家依漢以來故事以西域為屬國關玉門而護之而烏思藏在巴蜀徼外北與羌接契丹右方或斗辟入其中彼挾數䇲而西假詐中國之操柄以役使番西求瓦刺而并之屬其地於青海而南注之巴蜀徼是朔方隴右不相有也有如萬一乘利敗約即代雲中安得如今日何言張掖酒泉間哉賴天子神聖持斷受成一二元公相與翼宣廟謨而公以深識逺見從良將吏握籌而算一舉而絶西北之要霍耀邉境震讋殊俗其為萬世之計寧在戰與媾之間乎雷將軍與諸大夫相與勒石紀公功介憲副張君以請不佞幸得以經術入侍見天子憂勞邉而公有以稱塞業巳志而藏之金匱矣敬次第其事而系之詞曰惟天降佑皇纘𢎞猷聲教覃敷薄海有截彼何狙獷上古不臻仰流歸命今為外臣天子聖明罔恬於逸大簡卿臣分蕃授戟維丑之秋大兵西徂厥衆如雲疾如風雨騎而控弦四十萬弩天子曰嘻時非我利乃命司馬女其豫乂桓桓司馬才略天成謀如淵默斷乃霆聲乃簡才官朱鍪載路虎螭其戈衷而不露乃數邊庭以恩撫輯一草一木罔我莫折敵人通辭其謀萬端公炳沈幾應如湧泉敵衆洊居厥患將逺公蹴之東如丸走阪彼隴之西寢烽卧鼓重關不鑰公在門户天子曰嘻曷酬爾庸乃三錫命秩以上公帛分於笥金出於府煌煌大賚光彼西土公拜稽首臣其何力維帝聖神羣公效職亦有帥臣文武吏士協忠宣力以克有此粵昔炎漢爰敘西戎蓋以制敵折其右肱今彼遺支絶羌而有匪斷其要害善厥後功有不顯而力無隄桓桓司馬忱國之基維邊吏士公歌公舞惟諸大夫來相告語昔在南仲往城於朔大難克襄頌聲乃作况我司馬武功赫然既勒諸鼎不銘諸邉乃篆貞珉志之罔極匪耀公功維以為式潯州重修劉侍御先生祠碑銘蘇濬當萬厯初主上沖齡楚臣柄政以豫奪死生之權恫喝天下士時則名竊于負扆而迹章於見斗一時逐耆之夫且謏之曰保曰衡安福侍御劉公獨抉其深姦而虞其隱禍諤諤錚錚幾數千言卒之無不合劵者殆柄臣顓擅日久釁孽如山親終弗顧巷議弗聞吉水爾瞻鄒公請借尚方以死爭之二公皆吉安人也柄臣恚二公甚箠掠無完膚而後先戍之邉徼一時同里諸君子與二公善者俱盡遷謫以去當是時吉之直聲幾震天下余獨謂劉公之疏治之將病者也望色而施針觀神而調息其慮先而其治也易鄒公之疏治之巳病者也隂陽交攻附喙迭用其時亟而其治也難然向使劉公之言獲信萬一貴曲突移薪之䇿尚安有焦頭爛額之禍耶則劉公尤處其難矣當劉公初入潯博士家爭嚮之公亦喜為談説先民軌可接軫而吕無停音也居亡何公暴卒二蒼頭繼卒僅餘一弱息旅槖蕭然郡大夫江公萬仭捐資為斂復從諸文學請立祠顓祀以寄思云余入潯州謁公祠諸文學從余有潸然涕者不覺松隂漠漠鳥語啾啾余亦為之愴然悲也嗟夫大丈夫死等耳或觸雷霆探驪珠焉而死或霑白刃潤野草焉而死或不勝悁忿抱石沉淵焉而死或履巇甘穽招蹶焉而死或據梧誦經委化焉而死或圄焉而死或顧兔蹲烏西崦巳沉老妻子牖下焉而死或寄寓四方餐風枕露隨所之焉而死夫死生人所時有也余于公乎何悲余所悲者公之志耳當權臣奪魄睿謨日恢乾綱挈于上坤軸順于下曩時鄒爾瞻諸君子為權臣所齮齕者夕臥鐵衣朝膺彤錫早羣樵豎暮徴蒲輪而諸君子亦各抒其胸中以自表見或結靷而陳補衮之針或昌言而搜慿城之慝揭表樹標昭昭然為的而從之而公獨與權臣同月同日同歸于盡縱造物者固有深意而半生壯志竟托遺編毋亦令忿悶悲歌之士有未能釋然者耶余又聞之郡守江公云公冢子孟銑從公戍所磊塊有正骨必大其聲今孟銑君萬里間關拜公遺廟臺使者交檄郡邑葺舊祠而新焉潯之多士靡不加額者嘻公其不殁哉因為之銘銘曰九萬里兮帝閽心搖搖兮罔聞跨豐隆兮弭節聼寒螀兮斷魂望潯山兮盤白石去洞天兮咫尺神之來兮繹繹泝潯川兮珠聨濯玉魄兮蟬娟神之來兮翩翩彼蒼兮悠悠萬古兮一丘芝為車兮容與龍為友兮夷猶不言兮桃李肸蠁兮春秋平古田碑林廷機古田為桂林屬邑獞據其中百餘稔令是者率不敢入獞有善村惡村善獞僅供賦役餘則羈縻而巳國初迄今種類出沒匪常未敢大逞由狼兵能制之嗣是更用募兵獞無復憚嘉靖四十三年獞酋韋銀豹黃朝猛乘間率衆突入藩司戕殺黎參政劫庫而去人心丐丐變聞久之未討今皇帝即位之三年廣士都御史張公翀御史劉公思賢太僕少卿今軍門殷公從儉各疏陳勦撫之䇿上嘉納特設撫臣廣右尋發帑金四萬兩為兵費時石汀殷公膺簡命以往全省賴焉古田距桂林百里許獞盤據山寨或白晝殺人過者為之禠魄頃有征勦之命或曰賊慿高據險蟻聚蜂屯道梗不通長技有徑弩毒矢足以自固非百萬之師遲以嵗月未見卒拔也公曰不然彼負不赦之罪神人共憤吾奉命征討惟上下協心將士用命即一鼓而下矣何慮之有于是謀之總督李公遷巡按御史李公良臣總兵俞公大猷暨藩臬將領為進勦計因與衆誓曰今日之事務期滅賊上紓聖慮所不與戮力共濟者明神鑒之衆皆感奮遂分屬司道各據要害以防賊衝諸將統漢逹土兵𢾗萬為七哨約四年十二月朔進兵會俞總兵挺戈先入副總諸將繼之奮勇擒斬首克東山石玉龍口等𢾗十巢次破三千藤浪渌里等巢又次克龍旋等村各斬首千餘級賊勢急悉衆據潮水巢拒戰相持旬日我兵併力夾攻所向披靡復夜乘絶頂設伏其下賊望見驚潰遂大破之潮水馬浪苦利諸寨悉拔賊駢首就戮山寨蕩平先是黃朝猛死于亂兵韋銀豹計脫未獲或言于公公曰賊黨巳盡此直釜中魚耳重懸賞格嚴兵督捕居頃之生擒豹至獻俘闕下上嘉悅擢公兵部右侍郎錫以金幣仍廕一子入監餘加秩賞賚有差是舉也下堅巢者百餘破惡村者萬竈斬首七千六百六十六顆俘獲男婦一千三十三名奪獲賊器三百四十一牛馬二百五十六招安善獞六百六十六村兵臨三月威震百蠻復百年之版圖殱纍世之積寇奏凱言旋歡聲動地功誠偉矣賴天子明聖決意討賊公當其任忠誠激發智勇兼濟運籌調度悉中機宜是以殱厥小醜勢如破竹且費止七萬有竒兵止十六萬衆所省甚巨而成功之速若神助其間安攘之烈前此所未有也昔周宣王之時荆蠻背叛王命方叔南征詩人為之賦采芑謂方叔壯猷蠻荆來威千載之下誦之猶有餘烈兹公平蠻之績較之方叔未多讓也是宜勒之金石昭示萬世爰系之銘曰明明天子君臨萬邦穹廬卉服罔不來王獞據南陬居然跋扈玩我王章恃險為固敢行暴亂戕我藩臣歷年有七尚逭誅刑時維殷公帝心簡在曰茂汝往其討厥罪載卜吉日載出我師率此貔虎翦滅為期爰搗其墟爰焚其窟天戈所臨遂赤其族渠魁既獲獻俘闕庭稽首上言曰伏寵靈羣然拜伏是惟獞老自謂天誅妻孥不保公亷其狀曰獞汝來苗莠不辨吾亦汝哀汝衆無罪吾其活汝汝父汝兄其歸告語汝有子弟吾其教之立之鄉校爾命爾提汝有田疇吾為立長爾耕爾耘可生可養自兹而往惟善是行毋作惡逆自殞厥生獞人聞之曰公生我感泣羅拜願公夀考宣威布德荒服以寧於昭我公永垂頌聲平建越碑吳國倫萬厯十四年丙戌司馬中丞宛陵徐公奉制討平蜀吐蕃業己奏三城之捷會建越二蠻起搆亂藩臬諸大夫請賈餘勇圖之公從容曰余豈一飯忘建越哉顧念蜀多役民甫息肩又溪箐深阻機難隃度不敢不重發然圖之此為時矣于是謀諸按部使議且畫一乃上言請討其大略曰臣所部西土土人不靖非獨三城有吐蕃也瀘河之南卭池之東亘千餘里諸㺐蠻雜居由秦漢以來不受號自我高帝傳檄下之始奉要束願世世稱蕃臣因置六衛越嶲諸處而設行閫建昌控制之巳又敕憲臣一人居中治兵蓋有深計焉頃二蠻不逞大為諸邉患在建則二咱負固姦王命在越則黑骨蠻以讐殺始禍流毒軍民且相望為左右角以抗官兵罪在不赦臣有荷戈之責不敢避選事名而不以請願藉皇上威靈為蜀久逺計使臣得便冝從軍興一舉靖之臣不勝大幸疏下大司馬議可公旋請于天部願得文武才一人治兵蠻不足破也天部推擇嘉陵守周君光鎬應之公遂徴天全刺馬諸土兵益以牂牁犍為諸材官鬪士得一萬八千人而以都督將軍李君應祥帥之參將朱文逹將左軍佐以禆將滕光國遊擊邉之垣將右軍佐以禆將王之翰周君適解郡符趣至公大喜以一切機事屬之而總餉則大參周君嘉謨稽功則少參李君士逹分道食士則閫帥宰調元别駕丘一竒並受司馬公密畫以行周君乃先諸將馳卭郲坂問漢孔明出師故道刑牲渡瀘時諸路兵未集而黑蠻方據相嶺建蠻日擾禮德二所出沒鈔劫閡絶我聲援又蠻黨安四兒煽亂城中戲刈戍者頭而爭溲之時時遮殺過使道上旁若無人卭笮川原人盡怖急鮮生氣會周君單騎馳入行間密設疑以嘗相嶺賊賊恐退保桐槽明日奉司馬公令宣布朝廷威德天戈所指意在誅首亂以紓邉氓而脅從回嚮俱待以不死因密伺難端得一二大猾為蠻內詗者捕論誅諸蠻聞風稍稍震懾巳乃移檄龍湖沈黎按兵扼間道勿動尋與李將軍禡牙越嶲分部文逹攻河西當五咱之垣攻桐槽當大咱即以其冬十二月甲子夜傳發馳三百里鼓噪渡河殊出賊不意丙寅之垣兵先破桐槽凡三戰大咱敗遁而五咱尚據險迎敵文逹兵夾擊走之而圍之旄牛山是夜攙槍星霣軍中譁曰天喪賊也夜半五咱果潰圍遁與其死黨安守合明日謀夜襲將軍營偵至則將軍密徙他所而以禆將楊師旦提新調刺馬兵當之比賊千騎載燧至見大營巳拔所遇衝突皆獰猙祼軀知其為刺馬兵鋭不可敵遂自驚擾相蹂踐死傷大半時丁亥三日也我兵乘勝深入搜剃諸岩洞俘斬不下千人建境稍定獨二咱逋未獲司馬公移鎮臨卭責問諸將吏師出五旬大憝無一授首何以故諸將吏惴惴失色益矢心戮力而前聲言益餉萬石為久攻計賊乃大恐五咱走摩些番與守復合諸將議必先破守而後咱可得顧守黠詐深壘不出三月庚寅將軍計以禆將田中科六百人餌之而大軍悉西嚮圖五咱守果易中科兵寡弱謀出鋭兵夜襲其營將軍諜知之隂遣才官髙逄勝部死士三百人從間道疾趨伏中科營守至伏起大敗之斬守馬上而獻其刀甲甲飾銀繡雙龍刀刻五星文蓋酋之最豪者甲辰之翰兵破大孤山生得阿弓等七大酋戊申禽五咱于昌州四月甲子文傑兵擒安四兒等四大猾于西番因繫其家并得隂賊張煒趙應宣殪之而大咱窮蹙走普雄丙子之翰兵攻普雄急得大咱射殺之是日文逹攻南箐之垣攻桐槽盡犁其巢柵破之俘斬無算黑骨幾無遺種于是卭部酋來獻其所匿印而四堡七枝諸酋長各率所部來乞降並釋去惟廣洪番罪在必問屬之翰擊破之時六月既望振旅渡河蓋是役誅叛蠻種落四生縳大酋長十馘而獻者七獲諸小酋五十有七上首功二千有竒收降者三千七百有竒奪邛部印一奪鐎鋋弓刀甲盾旄牛笮馬焚塹壘木樵碉房不可勝𢾗且約大小三十餘戰皆完師而出入山隧下潦上霧無一卒犯瘴癘離蒸濕而稱病者豈盡人力焉天實贊之矣露布所過道路歡呼稱千百年再造不則建越非蜀有也于是司馬公郊勞諸文武將吏將吏曰公天威也士用命也將吏何力之有焉司馬公曰帝神武也將吏勤事也軍府何力之有焉夫軍府讓大功不居而將吏以下皆讓其猶行古人之道乎乃諸將退而請于周君曰古者明王伐不敬取其鯨鯢而封之以為大戮于是乎有京觀考之春秋單襄子亦曰不式王命淫湎毁常王命伐之則有獻捷王親受而勞之所以懲不敬勸有功也今二蠻罪浮于不敬而軍府實奉王命討平之即紀勞彰大戮用示蠻方久逺曷嫌于自旌彼鏤燕然石而標銅柱交趾者豈盡哆乎周君頷之諸將因礱石介丘别駕馳𢾗千里致幣山中屬豫碑豫嘗頌采薇之詩六月出師及冬而還故始曰靡室靡家不遑啓居卒曰昔我往矣楊栁依依今我來思雨雪霏霏夫建越之師冬往夏還適與南仲期不爽而將士之室家啓居與若所經雨雪楊栁諸艱勞司馬公蓋深念之不欲攘其力以為功甚盛德事乃玁狁于襄而南仲赫赫之名與天壤不朽豈無徴而傳乎建越于是乎可碑矣銘曰於赫上帝祚我皇室八遐來庭鞮譯貢職咸戴嘉祉罔敢不式蠢兹卭醜負嵎猖狂矯誣自擅彪闞鴟張侵敗王略擾我疆場司馬征西請奮其旅鼎士虎臣響從所舉鬯德宣威深入蠻圉天鉞所加逺邇震怖顯僇元憝潛刋內蠧四部一空諸酋悔悟苴蘭筰僰纍纍角崩乞降受號交臂矢膺問弔之師若時雨興凱還蜀都歡呼盈耳蠶叢可宫鳥道如底椎牛饗士捷奏天子龍顔嘉悅盟府書勞介圭列壤五兵其韜勛震西土聲流不毛文武為憲其孰贊之曰周與李勇略兼資儒林將種並峙西陲岷峨造天巴江亘地按堵奠居亭不再燧樹兹豐碣以永千祀德郡重修東嶽廟碑記程瑶五嶽莫尊於泰山而其神亦莫靈於泰山觸石生雲膚寸而合不崇朝而雨天下惟泰山為然其神斡旋元氣發育萬物功德溥於天下則通天下而祀之固人心之所同祭發之所與也瑶亦因是而觀世變焉古者民有井田有溝洫國都閭巷有學校又設疾醫痬醫掌治邦之疾病疕瘍而總之以醫師當是時生飬遂而風俗醇奚以祈禳為也降及後世凡先王教飬之法相次盡廢而苛政日興而民于是有飢寒水旱之虞疾病夭札之患窮困迫切無所告而求諸神曰萬一其庇我乎此人之情也蓋王政衰而祈禳盛亦世變使然上之人方自負愧責而何暇禁令冝其有舉而無廢愈逺而愈滋也德郡城中有古東嶽廟碑記無存創始莫考正殿為間者五中奉東嶽天齊仁聖帝左右各有親侍之臣一寢殿及左右殿各為間者三東西廡各為間者五塑繪諸神題有位號必能翊宣玄化默贊隂功不可得而測也表以大門繚以周垣守以黃冠蓋其所從來者逺矣國朝嘉靖四年郡守雁門何公洪重修迄于今將六十年復就傾圮郡之義士耆宿及黃冠宋靜深輩協謀修葺財取于捐施力出于顧役諏吉始事以次興舉不勸而輸之者衆不督而為之者疾易朽為堅飾舊為新黝堊丹漆金碧交輝視昔有加焉足以表崇重聳觀瞻信神聖之靈宅祈禳之勝區也經始于萬厯七年四月而以次年十二月落成焉其耆宿及靜深輩謀志嵗月示久逺乃偕豫同學友蓋君鉛來屬豫為記豫謂兹義舉也曷敢以昏耄辭乃為稽之祭法本之人情質之世變肆為贊論以彰往事詔來者庶于兹祠有助焉嗟乎以東嶽之靈寵當與天無極區區鄙人之言曽何足為有無而敢以自侈乎甚矣其不知量也雖然豫恐後之人有如梁公之毁祠廟者得吾説而讀之庶其免乎又恐嵗久而後有如耆宿之好義者得吾説而讀之庶其復新乎若是則斯言不能無助因次第之使勒諸石而系之銘曰維天生物維神奉天峻極發育元化昭宣雲出崇朝澤布八埏俾稿者蘇俾夭者延災疢以消疾疴以痊德施斯溥報施宜豐有廟奕奕屹立城中爰加修葺人願攸同巍如煥如顯顯閟宫匪人之力伊人之功維此成功士庶胥懌駿奔匪懈神其監格降福無疆生民有庇褒功頌德乃勒貞石援理縱辭昭示無極濮州新建帝堯陵祠碑王道帝堯陵見于山東郡邑者凡三而史牒事證的然可據者惟濮之竹林寺為最著蓋史記注既以為堯葬濟隂成陽矣吕不韋又云堯葬穀林皇甫謐謂穀林即成陽也漢地志濟隂郡成陽縣有堯塜雷澤在其西北杜佑通典濮陽雷澤即漢成陽而郭緣生述征記云堯塜在雷澤東南其説皆與史記合則堯陵當在濮境無疑且堯父帝嚳墓在濮陽頓丘其母慶都墓在成陽靈臺見於皇覽及酈道元水經注及歐陽公所録漢靈臺碑甚詳而郾朱故城今名朱家阜者又丹朱之所藏也族葬之禮上古無有而情則然也堯從父母子朱從堯蓋理勢之可揆者元人墓碣必有所據然則竹林寺本穀林遺址其為堯陵也益無疑矣彼其在曹與東平者雖志載其名官秩其祀求諸左驗如前所云蔑之聞也豈當時穀林之事既襄而傍近居民取其遺衣弓劍藏之以繫其考妣之思也邪然而世逺不敢質言矣皇明嘉靖甲辰巡按監察御史莆陽鄭公某觀風至濮諏詢故實慨想遺蹤若曰修葺帝王陵寢邇來明詔屢頒凡我臣工所當祗奉無敢失墜是故弗嫌與東平並祀也乃行曹濮兵備副使王君某分守參議楊君某分巡僉事黃君某轉行所司訂正訛稱封崇夷壠拓其區宇護以周垣仍取佛堂之𢎞壯可因者撒而新之以為享獻之所田有定額祭有常期凡諸軌物罔不簿正遂使聖帝體魄之藏晦于𢾗千百載而顯于一旦可為盛矣既又慮其久而或湮也復托三君子具其顛末需言于道以文諸麗牲之石道惟昔之論堯舜者曰我忘天下易使天下忘我難竊以為此非知聖人之盡者也聖人之所以異于人者無他無為而無不為而巳矣無為者道心之微聖人之所以藏諸用也無不為者人心之危聖人之所以顯諸仁也顯斯危藏斯微精而一之斯謂之允執厥中中也者無他無為而無不為而巳矣方堯之在位也居衢室隱精神宛心約志以從事于無為篤恭而王天下不施智力而萬國平蓋嘗立于靈扉而雲生牖坐於華殿而松生棟雲行雨施品物流行誠昔之人所謂範圍易簡權輿清淨者也夫何為哉然而未嘗不為也欽若厯象而日月星辰順其軌所以事天也克明峻德而族姓萬邦致其和所以事人也洪水咨乂而六府三事歌其敘所以事地也而且戰戰栗栗日慎一日竹帛有銘杅柈有戒逵建進善之旌廷置敢諫之鼓咨芻蕘以成勳收困窮以廣德而又伐宗膾攻叢枝劘有唐于丹浦屠長蛇于洞庭射十日于青丘殺窫窳於桑林誅鑿齒於疇華戮九嬰于凶水凡所以立三極之道除天下之害通庶類之情垂萬世之利者固巳無所不用其極矣逮夫勤倦耄期會厄九六通變宜民舉舜而禪之位焉宜若屣脫黃屋擔弛蒼生可也方且暨舜修壇于河沉璧于洛升首山道河渚遇五老受圖書歸而賞侯伯封卨棄進禹臯誅四凶蓋亦無非存心天下加志窮民之事其最後也乃復有成陽之遊而始就穀林之木焉嗚呼聖人憂勤惕厲之心真所謂沒而後巳者矣夫自其無為也匪惟聖人能忘天下天下亦且忘聖人矣擊壤老人所謂作息飲食帝力何有者是也夫自其有為也謂聖人之于天下與天下之于聖人何嘗一日而相忘哉善乎孔子之言曰大哉堯之為君也巍巍乎唯天為大唯堯則之蕩蕩乎民無能名焉言乎其無為者也又曰巍巍乎其有成功也煥乎其有文章言乎其有為者也執中之妙盡于此矣昔商之祀成湯也頌其日躋之敬周之祀文王也頌其不顯之純是皆發聖人之藴奧以仰祈顧歆云耳今也聖寢聿新靈爽如在小子不敏敢附詩人之義敬述所聞薦之祠下如此且再拜稽首而為之頌曰粵若稽古惟帝放勳其仁如天其智如神神以藏心無思無為用顯諸仁成功巍巍格于兩間立乎三極誰其尸之不宰之力曰危曰微同出異名惟精惟一允執厥中是惟道源帝握其紀仰承羲昊俯開姚姒乾元用九天德出寧知存知亡大器為公位則不有道未嘗息二十八載廣運如昔神徂聖伏白雲帝鄉四海同悲其何可忘頓丘在左靈臺在右鬱鬱穀林是正丘首閟千百􅑤顯于我明細札是承中臺之英豸史經之藩臬營之奕奕新廟濮人成之香幣有當籩豆有踐載報載祈皇鑒不逺敷卨五典相棄三農冨我教我誘我民衷始于一邦終于四海大哉皇仁惟億萬載明文海卷七十二
