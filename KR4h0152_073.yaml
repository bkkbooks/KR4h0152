body:
  text: 明文海卷七十三餘姚黃宗羲編碑七重修泰山碧霞元君靈應宫碑邢侗蓋聞之孔子云質有餘者不受飾也碧霞宫胡以修也又聞之德彌盛者文彌縟中彌理者文彌章碧霞宫胡以弗修也夫大室不營春秋致貶華山加繕光和見述張寵以二千祠堯史晨用王穀表聖東溟標媺乎桓相淮源歸勛于郭守沿經舉廢自昔然巳岱宗爰長諸嶽冠以帝稱廟貌崇閎雄峙州治而碧霞元君靈應宫則巍然托址抗擢岱椒其列在集仙搜神道籙等編未究元君之始寧襲耳食之謬唯是四嶽避峻九山推烈碧霞于斯宫焉要之人天允叶精饗合答則下臣倣佛可得而言無懷之所稅鞅黃帝有虞之所駐蹕三代以降迄乎秦漢臚禪紛如廣心競設乎壇陔中懇厚集乎瑄玉浸尋無巳輝鑠若何昭代列皇重厪遣告幸福陋贊䇿之罔竭禋酌刻牒之緒以故明祗惠以豐㮊下土逭于榖嗛蓋有馬談􅌢其册典寬舒戢其頦頰者矣厥有冠帶之儕布衣之醜估販之魁帷闥之侣靡不指奉髙以首路望雲封而膝地瑶則珠松徽尾鋂師比帛則春草雞翹黎單􅀢毲幣則楊邁朱提鮫文白撰供則盎緹䣯􅮢豚拍宫脂器則雕纂黃目䀂􅀢梡嶡樂則雲和别柎丁寧埒竿儀則金支翠葆徽章星施焚燎絳天于喁震墜蟬匷畫轂木寓龍駟殷轔萬狀不可勝窮百千億兆跆藉雜遝或遙檻乎木之采或下瞰乎治邸之宇或依稀乎白馬之影或隱見乎明堂之墟羣情翕赴亦巳極矣嶽靈忞穆能無應乎竊見降瑞錫祉調風布霖膚寸澤乎遐表彌天飽其至德所謂逭榖嗛而被豐㮊則又惟一人之所暨及也元元之衆則有疾癘覬覦愚蒙思牖年夀丐延子嗣祈夥水火希逺離暌求聚休嘉啓夢各副所懷亦有梁父云亭斂焉聼命共驅族炊施糜之屬益廣金銀鏈銅之用凡此有位可無報旃覩傑構之少逾乃鳩僝而不懈藻井連茹會遘脊茅之地飛雲麗日若開寶雞之天席葺苴秸典還嶽畤于來者可念行築者云勞遡惟畫議之先實出尊明之斷方諸前哲今古同符則此碧霞宫者胡可以不修也胡可以不紀也是役也合岱廟計費四千九百五十金有竒撫中丞晉江黃公主議侗以螢燭嗣光碑當有辭辭曰泰山巖巖萬物伊始帝册帝孫倘元君是呼吸上通僅尺有咫膚寸八荒人事甚邇四嶽苞祗四流遵軌唯岱是宗靡敢抗壘先民有言神怪譎詭我儀圖之佑善殄否萬方玉帛走不停止孰云奉髙有道如矢巍然仙居棟厦宜庀疇兹新宫我撫則以靈篇載韜神司其匭發函爥宵皇乃受祉新建平畨堡城記于慎行平番堡城者右司馬宣城徐公建也地當松潘之南故號黃沙壩雪山諸羌葆為窟穴萬厯十有四年公大發兵平羌取其地城焉詔賜今名旌公伐也兵備副使謝君詔實視厥成以告內史請記記曰諸番蓋土番種也在巴蜀徼上夾河而屯列塞四十有八慿陵絶險狎為不譓守者取恩意羈縻嵗遺金繒食物費無慮𢾗十萬緡幸旦夕無事飬成狙獷莫之翦滅從來久逺矣萬厯乙酉羌大豪國師刺麻剽猾多𢾗與邊右方長賔兔結稍稍引穹廬自近諸小種豪灣仲占柯輩附之相與鐫石而盟出沒黃沙狹中伺便劫略所戕殺軍尉二人及殘吏卒行旅以千百計而冉駹北道不通矣會公以御史中丞出鎮巴蜀有詔議撫勦方略以便宜從事公至則申布章程預飭士馬傳告羌戎宣示威德兾其解沮使者三反羌怗不悛猶以衆𢾗千嘗掠我掠得我兵至刲刳腎腸纒牛角而奔之公聞大奮則進諸大夫將吏議羌惡貫盈不一大創兵不得決無言撫也御史南昌陳君瑫議亦如公公乃與大將軍應祥計發虎符調諸屬國伉健分𨽻四校檄右布政使朱君孟震主餉副使王君鳯竹監軍謝君佐之因稽功焉文武百執事咸簡以充明年丙戌正月諸屬國兵至合戍兵四萬人集于轅門乃秉鉞誓曰夫羌戎小醜㺯兵盜邉法不得赦幕府奉上威靈敢留天誅願諸大夫將吏矢志報國毋縱寇毋馘降即有逗撓巽愞齋斧在是有功不敢蔽則議曰黃沙壩羌要地也先據者勝遣故將軍成以馬敘兵七千奪而營之遣遊擊將軍于德以播州兵七千營鑼鍋嶺掎其前遣遊擊將軍之垣以酉陽兵五千營橋壩腦角其後遣故參將文逹以平茶天全兵四千五百營茨溝當其要脊大將軍居中制焉公乃親御戎路移駐永康商軍所向謂兩河難並取河東接諸關塞勢亟且險先定而河西可潰也二月庚寅昧爽李將軍陳師鎮平分道並進會國師刺麻以灣仲占柯來冦歸化于德伏兵鐵爐溝北之獲三酋首以歸殱其六寨而文逹成之垣各縱兵勦阿孝龍溪鹿卜諸寨連十餘戰羌棄牛馬輜重走填崖谷不踰月河東悉平唯大小粟穀尚伏險觀望未即下而河西羌半巳奪氣禠魄頓顙受言其半恃河為阻猶恣睢首鼠未決四月辛卯李將軍為浮橋六所夜半濟師諸將畢渡河西諸寨以次剃絶罔有遺育又以其間回戈東指略定大小粟穀諸殘羌走附絶壁俯瞰湍流礧石雨擊兵不得上師三面而環之土酋楊應龍先登􅡒其巢穴羌乃潰奔我師疏捕山間畢收為鹵所􅝌藉蹂躪水中死者復不可計而兩河皆平矣始西域有法王通望氣術語所善羌結賽嵗在雞犬中國大勝蠻方大敗若等毋反至是諸殘羌震駴始相責𢾗因結賽以請願得葆塞奉貢職為編氓指故所立盟石踣而捽諸河各獻驍逆一人坑而斃之以誓謂之埋奴而之垣大父輪當嘉靖初以指揮將兵為羌所鹵漆其頭為器至是得之以葬邉人嗟嘆異焉六月乙亥下令班師諸降羌頂香伏道左鉦鼓旍旄欱噴坰野萬衆歡呼聲如震霆御史𢾗俘校獲核上功狀取寨三十有八擒羌豪酋三十人斬首鹵一千七十有竒焚碉房千六百有竒鹵馬牛羊器械無算所省嵗時犒羌費以若干露布以聞上曰羌人逆天貪亂虐我西鄙都御史元泰躬率戎士克有厥績其進元泰兵部右侍郎任一子太學生賜之金綺應祥以下爵賞有差公頓首受命不自居功則詢于衆曰以天子神靈諸大夫將吏之功羌幸平矣不惟所以控其形便使無生心善後謂何於是堡遂城焉城周三百六十丈髙二丈五尺為樓者為櫓者四為敵臺者八奏設守備一人奉璽書行事戍兵三千五百人自是虺蟠蛇引之墟廓為夷塗屹成巨防而松茂間無柝燧矣主上聖文神武暨鬯殊俗薄海窮裔遡風仰流罔敢不龔巴蜀僻在坤垠一二羌髳馮負其阻時為蠆蜮天戈所指罔不糜潰異時建武之役闢地四百南荒綏靖及兹十有四稔復城是堡而蜀之西北又增重險以威邉輯圉使蠶叢魚鳬之隩咸晰于文明化為保障豈不鏗鍧燀赫稱社稷功哉蓋建武附麗內土壤接六詔時有繹騷憂在郡邑繫在國家安危未要巨也而雪山枕輢絶檄西直漳臘連邊右方日者右方之長悉舉引弓之民西獵海上築宫事佛王庭故在也古所稱丐奴右臂今直猿攫萬里汰三十六國之腋而注之冉駹卭筰間形勢何如羌獨足憂耶中丞公一舉定四十八羌使獻賮請吏列在版圖又築斯城以據其吭喉斷其胸腹苐令一尉保之以春秋耀兵講武用戒不虞其餘邊部之戎其敢有它心以憂疆吏因以懾彼右方無緣得與羌合窺我西境此名平番實壯邉威也與建武之役挈勞程功未相軼越至論折衝厭難勝于無窮此實倍之猗與中丞公奮其忠謨英略以奠安疆圉而諸大夫將吏咸能翼宣丕猷用集大勳亦何烈也往漢遣徐自為出五原塞外築城障列亭以蹴丐奴謂之光祿塞而張仁願為三受降城于河北以控回鶻終唐之世賴之皆斗入冦境制其要害以今方之何多讓焉豈惟西關沫若北銘劍門稱蜀都之險哉爰托蘭臺石室之藏得公平羌始末備著于篇使後之籌邉者知城所繇建如此以無忘備禦匪直勒公功云爾敕賜岢嵐州蘆芽山永慈寺碑銘瞿汝稷我佛之生也于伽維衛而成道則于摩竭提相距震旦五萬八千里而晉陽之岢嵐有蘆芽山凡所名其境若寺者多因五竺其熙連河最稱神靈蓋祥光彩霱時時不絶金蓮紛披寶座恆現雖闡提種性目擊非常恆緣感發距河西北一牛鳴許為永慈寺實我慈聖宣文明肅皇太后所建也初沙門妙峯登公負笈過此眷其地幽勝宜作旃檀林遂稍為剃闢居士李本義倡諸淨衆奔湊疆理會皇太后久聞公禪行遂賜創兹寺復賜公紫伽架公受命住持既又纍敕中使楊輝尤用張本等賫金檀如來像及經藏至寺供飬眷遇之榮冠諸叢林公髫齡驅烏弱嵗遍參嘗晝夜經行不寢者七閲寒暑悟華嚴帝網法界因于清涼山刺舌血書華嚴經以酬佛慈書三年而成戒珠旁照波旬乞法心月孤懸果位印宗真人天津梁也既巳安居七衆稽首而問曰能仁氏之降迹炳列聖典昭昭乎其無容混矣則兹山諸所託于能仁氏者皆由人之擬議與人之擬議而神靈以著又何歟神靈之著于往者無論姑言其近而人所共證者今上巳卯秋七月如來現相于雲端寺之空中紫摩金色真身儼坐于須彌座光明煒煜映曜山谷僧本空同緇素六十餘人相望瞻禮移時乃隱是可以人之擬議而得歟稽之山川邈不相及考之見聞卓絶乃爾七衆皆迷願為解蔽公據座良久衆復請乃顧第二座命答之于是第二座合掌公前而告衆曰三千大千世界無芥子許地非我能仁捨身命處爾常聞之經矣于是無量無邉百千萬億劫前巳久成佛而常于此娑婆世界説法教化亦于餘處百千萬億那由他那僧祗國導利衆生隨所應度處處現種種方便或示己事或示他事能令衆生發歡喜心爾亦常聞之經矣由是觀之何方何隅非能仁氏之寶所顧衆生垢重未能悉覩而如來願深特示兹境以折攝耳吾向聞和尚語我以華嚴無盡法界知我此身一毛一節莫不廣含華藏世界不可窮歷旋視一切有情無情莫不皆然我雖亦居此域哉無邉剎海出沒自在即有微纒莫為我縻我此堂宇繡栭雲楣曽桴重撩左墄右階外簷中霤一一有十方如來及菩薩衆圍繞唱化藉而有能聞者即歸爾之市􅀈返爾之帷幕皆聖境也而何疑于能仁氏𢎞攝之勝壤乎七衆聞巳踴躍稱善念世之逰是者多熒惑于秦竺之異壤而同化因述所聞俾余銘之以示久逺而顔其寺曰永慈言以之而永我人王法王之慈于無窮也銘曰逺涉維衛垂六萬里誰為正覺降靈于此妙嚴四土解脫三身彌布法界疇境非真謂此為假鷲峯詎實金腋珠眉悉同幻質能契此同境無不融竺奚必西秦奚必東塵有剎海海入微漚萬億須彌列一毛頭矧是勝壤十力所現三災蕩覆此壤不變猗與登公露門芝英道契帝網行朗日城乃眷兹壤鬱有靈氣是剃是荒駐錫言憩民之聞之攘攘悅來奔湊疆理鱗萃雲迥唐哉太后遐受聖記示迹紫禁撫期利世旁采道韻因民之願聿搆精藍錦敷霞煥堂維雁堂林即鸚林龍窟窈窱鹿苑森沉樹王非逺能仁豈滅不越流沙安居摩竭公振一音公揚五衍曇花復荂奈輪還轉昭列智炬遐燭冥蹈惠我蒸民昌我王道九類攸仰百劫彌崇我銘貞石垂休無窮東莞縣晉黃孝子特祠碑湯顯祖今上幸卯夏余以言事尉海北冬道南海過東莞諸生陳君啓心書來為其先賢晉孝子黃公舒特祠欲有以記也然孝子生處其地乃割在新安界中孝子晉人也家貧自力養侍雖盛暑未嘗不冠帶親意所在千里之外不以為難親死皆身為墳而廬深野中無人猛獸左右嘷安之也有司表旌其居曰參里至於今且千年矣學宫闕焉不祀諸生李元表祁衍曽陳啓心三人言於縣令樂安董君董慨然曰此嶺表人士之初也曲江諸賢猶在其後而郡以上學使者莫不勸動焉然有以新安疑者董君曰入新安界者今為莞人者昔也乃擇日附主學宫十有餘年一妄人來視縣事竟議祀之新安而主在東莞學宫者遂置屏處是時祁生病且死李生一人不能爭而陳生日又廢發憤抱其主以出且言曰仁人孝子天下一家東莞新安故非兩邑也今巳罷祀主無所歸生等願不煩費縣官一人一緡錢但得城北空外地七丈餘足以容主視學者許之三年而後克成而是時東莞伯何真之祠亦成真于元喪亂時有粵地十七歸髙祖賢于尉陀逺矣讀其書不使人感惝而嗟咨孝子無尺土之柄獨身事一父母又非有竒孝其孝閭野人所得為也至今人人讀不能半其傳即涕嘆結塞皆願如黃孝子事其親願有子皆如黃孝子固未有願如東莞伯者也豈非雄力智𢾗之事于人心必有所疑然而接神明感天性乃在于其根本至德也與銘曰粵于西晉荒落蒙靡不可父母乃有孝子生死至性愛而有禮哭不能言心孝而巳綿綿嶠士孝子伊始鄉可以祀豈有分里為主特廟厥義良偉有門有堂有寢孔搆關門在左石梁在右江水在前睥睨在後稍有形勝儼雅窅峭汝莞之人誰無父母有孝以敬誰為來者亦有人子來吏斯土惟孝以忠神明是與遙遙參山氣鬱且明其類維何樓觀蒼蒼冠帶愴泱蠻方有風我愛為銘以感人心兩朝忠烈碑黃道周以身殉道與以道殉君之有以異乎曰無以異也道足以生其身而後死之道不忍死其君而因以生之是皆可以不死故置死地而皆生其皆生者何曰仁也天下之可以殺人者二曰水曰火是二者人皆賴以生而投于水火無有不死者有道仁人必取其精神而用之仁者水火之精神也人抱形質而脫其精神見水則謂之曰水見火則謂之曰火見其生死而不見其所不生不死者故權姦盜賊日思以其水火殺天下而天下之鄙夫貪生憚死者亦指水火踆踆然以焚溺為戒卒之天下以焚溺坐死者比比也當天啓之時太阿下墜天子制於權璫諸君子思還主柄持之太躁若以勺水沃鄧林之熖既而權姦煽熾諸君子坐死其為孽也為火為旱為焚突及棟及崇禎之時王鈇上握羣工屏息仰命于天子諸君子承之太柔武人藉虎以為大君既而盜賊韋辨相與淪胥諸君子亦皆坐死其于孽也為水為潦為襄陵滔天夫以水火共搏或欲殺君子或不欲殺君子而君子皆死者君子領水火之精神以蹈日月以其形質分天下之毒痛故出入焚溺而其不可焚溺者與日月薄射也凡日月水火其精神託于君子其沴見于天下贏絀晦望往往相食漢熹平之際治鉤黨獄誅蕃武膺滂等錮天下名賢二百餘人及長安之亂諸君子無死者惟袁隗伍瓊周毖孔融楊修五六人耳然皆為卓操㺯斧非有慷慨致命之義宋宣和時籍元祐姦黨百二十人豐稷陳瓘等僅得不死及汴京之亂諸君子無死者惟吳革孫傅張叔夜三人耳何栗李若水則猶之墜阱也我眀初興尊賢禮士治藍胡之黨不及名賢逮于靖難慷慨致身者百二十餘人所株連芟夷無算至于土木而衰矣故水火日月一盈一竭精神所托或滿或滅前後贏縮可屈指舉也獨是啓禎之際諸賢奮發手掬霜雪與雷電爭烈雖有逆璫煽熖不鉥之于前黨禁株連不鉗之于後計自天啓蒙難隕身者十有六人曰髙攀龍楊璉左光斗周起元周朝瑞繆昌期魏大中萬燝周順昌袁化中夏之令周宗建李應升黃尊素顧大章劉鐸及崇禎甲申之禍致命遂志者十有九人曰范景文倪元璐李邦華施邦曜王家彥孟兆祥凌義渠吳麟徴周鳯翔馬世竒劉理順汪偉吳甘來王章陳良謨成德許直金鉉孟章明其遺逸遐方陷于秦晉及綏鼓死職攖城謝關者别為幽闡不在二班蓋自漢宋以來仗義死節之臣未有盛于我朝者也嗚呼學術不明道誼為事功所亂鍾荀之針李杜榮翰之砭機雲康樂寄詠於房連黃冠叟詞于顧問不曰事猶可為則曰思得一當是以徘徊瞻眺失之一瞬而千古莫贖是猶臨泛濫而繫匏睹燎原而祀竈多見其迂愚諒下于溝瀆矣夫當管夷吾之時天下無王主惟所適魯莒分馳先入者上春秋雖以子與糾不得不以霸與桓既以霸與桓不得不以仁與管仲使天下一君生民共主而夷猶于刁牙之間轉側于魯莒之下則仲尼必以為不臣季路可正其彈射矣故仁之所生人者殺之愈以生水火之生人者生之或以殺人不見不生之生不死之殺則其疑死之不生惡殺之必死輾轉以避焚溺而卒不免者比比也虞部陳公來𣙜南關適當甲申時遂捐資貿地西湖之上得六一泉舊址背距孤山靣臨鳯凰營構上下為十六棟層樓九楹湖水瀠之以祀兩朝殉難諸先生豫至湖山覽和靖之遺迹因得與虞部商略上下慨然歎曰死而可樂則吾將先往蘧氏之言夫豈謂此乎虞部又將南關所汰出小稅置為祠租使嵗時伏臘得尸祝其下因為迎送神之曲詞曰靁鼓闐兮龍在野雲離披兮龍血下龍上天兮星無光椒糈偷兮蘭不芳靈之集兮四國鴻八蹄兮驎九翼凌滄澥兮柏白日蹌徂征兮何不得息歸休兮此堂水周兮中央寒雞葅兮蒲菖羅百珍兮瓊漿驂素虬兮騑文鴦絻靈車兮縶靈馬執靈祛兮淚盈把珮琚兮灑灑晝不足兮宜宵夜雕舟兮鏤筵新夫君兮王正年靈參差兮無後先淡眉鬚兮馭青天靈何為兮中悁悁漳州新建王忠文先生祠碑黃道周半芝山之麓東瞰朝暾有王忠文祠焉龍溪令蓼莪徐公之所建也徐公以精敏敷治既底績將行矣諸生耆宿謀所以貌徐公者徐公逡巡謝諸生曰不敏自塗飾之未能敢尸逆旅之舍一日僕入漳諸公坐間談祠事且道徐公遜敦懇也魏給諫中嚴時以抗疏里居謂諸公曰然其祀王忠文乎忠文判吾漳既期年未有阼奧徐公嗛嗛置意中今祀忠文為堂皇嵗時集諸生容頌雅歌于吾漳源瀾甚逌且為徐公暢風教窮海三百年無復缺事也諸公韙其言且謂是徐公意者衆翕然若振鼉鼓又一日僕見王總憲東里張聘君汰沃舉給諫語矍然曰果爾建白須讀書人東里曰是足張吾漳于天下矣自是而祠遂成祠成廣延之𢾗上視朱考亭下視劉愛禮舉屨衡杖得相及也嗚呼考亭治吾漳不期年道化綱紀穟于心繫愛禮與忠文同時不能鎮足坐講幄及今去之各𢾗百年而都人士旁皇追趨若兾朝夕者何也人生自呱哺至含斂各視所學其學逺聲息亦逺其學近聲息亦近考亭與愛禮皆學程氏所得不同原本一也忠文少學于黃公晉卿晉卿學于金公吉甫胡公汲仲胡汲仲曰千古聖賢藉文而顯人托于道如不相及而道托于文如相語也晉卿以是湛于文章其為文明靜淵粹和順道德而理于義宋潛溪每見晉卿飯頃序置𢾗百言繇根逹葉常自茫然嘆未聞道忠文從之遊泛濫𢾗十年驅馳燕吳困于車塵幸及風雲鼓其羽翰至使聖祖手其編詠與景濓軒輊上下翺翔嗚呼如忠文者未為不遇矣自忠文涖吾漳二百餘年而吾漳之文藻風概竦肅天下即不謂忠文興作其為忠文開采奚疑乎忠文論詩所推許髙季迪胡仲申風雅掩映髙出六代亦皆其鄉人也士君子生幸與清明先正同其里閈又有良師帥匡其不逮辟咡離席正容消意函丈之間或河或海即舍曰講道其去道則亦不逺矣胡仲申曰余見王子充詩唯讀之不暇子充之學亦以求道而巳茍得其道則其見于立言者猶其措于事業也今誰復知忠文為求道而立言者方勝國時宋學翻瀾有志之士皆舍津筏湛深獨著以修詞立誠為本而其相懋勉如此于以鱗翼日月乘昌運稱先鳴者則亦固宜耳余嘗過金華見其山川清壯大率與吾漳風土樹藝亦相近然自四傑先鳴而後負竒俊者不復如前吾漳固僿于前而開抒于後豈地道使然抑師友董率有懋不懋故夫安得金胡黃髙之徒起而襄立誠之事修惡池泮林之祭者乎先是二年雲間何半莪督學來漳中所胥學租尚三百餘金諸生因請以置祠中其前楹以祀忠文其後楹以載督學及令公之德自朱考亭劉愛禮兩祠上下巋然登降數百步而逺近師友源瀾之觀燦然偹矣余不肖蠻溷文藝晚遂自放於斯道無所聞知然幸托吾漳漸考亭愛禮之遺訓思一光大之今幸伏里巷與諸君子同時親睹徐公之治聆中嚴之論以為紫芝天寶後與金婺爭華也不揣迂謬復述所感憶者於此何督學諱萬化華亭人壬戌進士徐令公諱耀揚州人戊辰進士綱紀其事者有鄒生遷蘇生棠棣吳生鶴丹陳生士愚張生鳴駿魏生呈習戴生垂寶皆二公門人其公費載於碑隂明文海卷七十三
