body:
  text: 明文海卷七十四餘姚黃宗羲編議一孔子廟堂議宋濂世之言禮者咸取法于孔子然則為廟以祀之其可不稽于古之禮乎不以古之禮祀孔子是褻祀也褻祀不敬不敬則無福奈何今之人與古異也古者將祭主人朝服即位于阼階東西面祝告利成主人立于阼階西面尸出入主人降立于阼階東西面此皆主人之正位也卒􅀢祝盥于洗升自西階主人盥升自阼階祝先入南面主人從户內西面祝酌奠主人西面再拜稽首皆為几筵之在西也尸升筵主人西面立于户內拜妥尸尸酢主人主人西面奠爵拜皆為尸之在西也漢晉春秋所載章帝元和二年幸魯祀孔子帝升廟西面再拜開元禮亦謂先聖東向先師南向三獻官皆西向是猶未失古之意也今襲開元二十七年之制遷神于南向而行禮者北面則非神道尚右之義矣古者造木主以棲神天子諸侯之廟皆有主卿大夫士雖無之大夫束帛以依神士結茅為菆無有像設之事開元禮亦謂設先聖神座于堂上西楹間設先師神座于先聖神座東北席皆以莞則尚掃地而祭也今因開元八年之制搏土而肖像焉則失神而明之之義矣古者灌用鬯臭鬱合鬯臭隂逹于淵泉既灌然後迎牲致隂氣也蕭合黍稷陽逹于墻屋故既奠然後焫蕭合羶薌蓋求神于隂陽也今用熏薌代之庸非簡乎古者朝覲會同與凡郊廟祭饗之事皆設庭燎司烜共之火師監之其數則天子百公五十餘三十以為不若是則不嚴且敬也今以秉炬當之庸非瀆乎古之有道有德者使教焉死則以為樂祖祭于瞽宗之謂先師若漢禮有髙堂生樂有制氏詩有毛公書有伏生之類也又凡始立學者必釋奠于先聖先師釋奠必有合有國故則否謂國無先聖先師則所釋奠者當與鄰國合若唐虞有夔伯夷周有周公魯有孔子則自奠之不合也當是時學者各自祭其先師非其師弗學也非其學弗祭也學校既廢天下莫知所師孔子集羣聖之大成顔回曾參孔伋孟軻實傳孔子之道尊之以為先聖先師而通祀于天下固宜其餘當各及其邦之先賢雖七十二子之祀亦當罷去而于國學設之庶幾弗悖禮意開元禮國學祀先聖孔子以顔子等七十二賢配諸州但以先師顔子配今也雜置而妄列甚至荀况之言性惡揚雄之事王莽王弼之宗莊老賈逵之忽細行杜預之建短喪馬融之黨附勢家亦厠其中吾不知其為何説也古者立學專以明人倫子雖齊聖不先父食久矣故禹不先鯀湯不先契文武不先不窋宋祖帝乙鄭祖厲王猶上祖也今一切置而不講顔回曾參孔伋子也配享堂上顔路曾點孔鯉父也列祀廡間張載則二程之表叔也乃坐其下淳祜初張居程上後因國子監集講再定張遂居程下顛倒彜倫莫此為甚吾又不知其何説也古者士之見師以菜為贄故始入學者必釋菜以禮其先師其學官四時之祭乃皆釋奠今専用春秋亦非釋奠有學無師而釋菜無樂是二者之重輕係乎樂之有無也今則襲用魏漢津所制大晟之樂乃先儒所謂亂世之音者也其可乎哉古者釋奠釋菜名義雖存其儀注皆不可知唐開元禮倣佛儀禮饋食篇節文為詳所謂三獻各于獻後飲福即尸阼主人主婦及賔之義也今憚其煩唯初獻者得行之其可乎哉鳴呼學校者理之所自出猶河瀆之宗瀛海也猶山嶽之祖崑崙也今乃舛謬若是則其他可知矣禮固非士庶人所敢議有人心者孰能默默以自安乎雖然此姑言其略耳若夫廟制之非宜冕服之無章器用則雜乎雅俗升降則昧乎左右如此類甚多雖更僕不可盡也或者曰子之言信辨矣建安熊氏欲以伏羲為道統之宗神農黃帝堯舜禹湯文武各以次而列焉臯陶伊尹太公望周公暨稷契夷傳説箕子皆可與享于先王天子公卿所宜師式也當以此秩祀天子之學若孔子實兼祖述憲章之任其為通祀則自天子下逹矣茍如其言則道統益尊三皇不汩于醫師太公不辱于武夫也不識可乎昔周有天下立四代之學其所謂先聖者虞庠則舜夏學則以禹殷學則以湯東膠則以文王復各取當時左右四聖成其德業者為之先師以配享焉此固天子立學之法也奚為而不可也孔子廟庭從祀議王禕孔子廟庭從祀者凡百有五人自淡臺滅明至孔鯉七十二人皆受業聖人之門而承聖人之教者也自左丘明至許衡三十四人皆傳注聖經尊崇聖學而有功于聖人之道者也蓋自唐貞觀二十一年始以左丘明至范寧等二十一人從祀廟庭及宋元豐七年復增荀况揚雄韓愈以世次先後從祀左丘明二十一人之間淳祐元年乃以周敦頥程皓程頥張載朱熹列于從祀景定二年又增張栻呂祖謙咸淳三年又增邵雍司馬光及元皇慶二年乃以許衡繼宋九儒居從祀之列所謂三十四人者也以今論之漢儒之從祀者十四人而猶闕者一人董仲舒是也唐之從祀者一人而猶闕者一人孔頴逹是也宋之從祀者九人而猶闕者四人范仲淹歐陽修真德秀魏了翁是也元之從祀者一人而猶闕者一人吳澄是也自夫孟軻既往聖學不明邪説盛行異端並起歷秦至漢諸儒繼作然完經翼傳局于顓門之學而于聖人之道莫或有聞惟董仲舒于其間號稱醇儒其學博通諸經于春秋之義尤精所以告其君者如天人性命仁義禮樂以及勉強遵行正誼明道之論皆他儒之所不能道至其告時君罷黜百家表章六經以隆孔子之教使道術有統異端息滅民到于今賴之則所以尊崇聖學其功殆不在孟子下以荀况之言性惡揚雄之事新莽猶獲從祀而仲舒顧在所不取何也秦火之後聖經闕逸漢儒收拾散亡各為箋傳而偏學異説各自名家晉宋以來為説滋蔓去聖既逺莫可考證學者茫昧不知所歸唐初孔頴逹受詔撰定諸經之疏號曰正義自是以來著為定論凡不本于正義者謂之異端誠學者之宗師百世之取信也是其所以傳注聖經者較之馬融鄭康成輩功無所與遜且何休注公羊而黜周王魯王弼注易而專尚清虛害道已甚然在祀列胡獨至于頴逹而遺之也聖人之道或著之事功或載之文章用雖不同而實則一致三代以下人才莫盛于宋東都其間慨然以聖人之道為巳任而著之行事者范仲淹而己其言以為士當先天下之憂後天下之樂而樂雖伊尹之任無以尚之况當其時天下學術未知所宗尚而仲淹首以中庸授張載以為道學之倡蓋其為學本乎六經而其議論無不主于仁義雖勛業之就未究其志而事功所及光明正大實與司馬光相上下自聖道不行世儒徒知章句以為事而孰知聖人經世之志固不專在是也歐陽修與仲淹同時實倡明聖賢之學而著之文章其易春秋諸説詩本義等書發揮經學為精至其欲刪諸經正義讖緯之説一歸于正尤有功于聖道其為言根乎仁義而逹之政理所以羽翼六經而載之于萬世至于本論等篇比之韓愈之原道夫復何愧而世之淺者每目之為文人夫文以載道道因文而乃著雖經天緯地者亦謂之文而顧可少之哉然則如范仲淹之立功歐陽修之立名皆可謂有功于聖人之道者韓愈司馬光既列從祀則此二人固決在所當取者也自周敦頥接聖賢千載不傳之緒而程頥兄弟承之道統于是有所傳逮朱熹有作五經四子皆有傳注論定之統宗會元集聖賢大成紹程氏之傳其中更學禁其道不行于是真德秀魏了翁並作力以尊崇朱學為巳任而聖賢之學乃復明真氏所著有大學衍義讀書記魏氏所著有九經要義大抵皆黜異端崇正理質諸聖人而不謬其于聖人之道可謂有功而足以纘朱氏所傳之緒矣是則此二人者固又當繼朱氏而列于從祀者也及元興許衡起于北方尊用朱氏之學以教人既有以任斯道之重而其時吳澄起于南方能有見于前儒之所未及孝經大學中庸易詩書春秋禮皆有傳注櫽括古今諸儒之説而折衷之其于禮經尤多所刪正凡以補朱氏之未偹而其真修實踐蓋無非聖賢正大之學則其人又可謂有功聖人之道固宜與許衡同列于從祀而不可以或遺也按祀法有功于聖道則祀之是七人者其有功于聖人之道如此而從祀闕焉此甚不可搜纍代之曠典昭萬世之公議舉而明之固在于今日矣又按聖孫孔伋故列孔鯉之下而曾參亦在曾晳後咸淳三年始升配享于顔孟為四侑東坐而西向父以從祀立廡下而子以配享坐堂上尊卑舛逆莫此為甚聖人之道在于明人倫而先自廢亂何以詔後世借曰曾子子思以傳道為重然子必當為父屈昔魯祀僖公躋之閔公之上傳者謂子雖齊聖不先父食以為逆祀今孔氏曾氏父子之失序非逆祀乎是故曾參孔伋今當降居于曾晳孔鯉之下又司馬光于程皓程頥為先進張載于二程為表叔而位次皆在下其先後次序亦不可不明咸淳之定從祀徒依朱子六贊以周二程邵張司馬為序而不知朱子之贊特以形容六君子道德之盛初未嘗定其先後之次胡可遂據以為凖乎是故司馬光張載今當升居于程皓程頥之上若夫荀况楊雄何休王弼之徒有不當與于從祀者兹又未敢以遽數也嗟乎天下之禮有似緩而實急似輕而實重者以其有關于名教也公議所在孰得而廢之况乎禮文之事自儒者出則于有功聖道之人禮所宜與祀而未稱于禮者固不得置之而不之議也是用疏其為名教所繫而公議之不可廢者列之如右庶幾議禮之君子有所采擇云孔子廟堂續議祝允明孔子廟堂歷代禮文大率不相遼濶至于本朝崇隆尤至其中或應調酌以趣大中宋學士濂王忠文公禕咸有説焉今日儀章出入宋王議未及者間有毫末蒙朴竊自疑焉因私妄條著云曩者憲宗皇帝推重道之心加祀享禮樂同于天子此其越度古昔哲王逺矣愚竊以為凡為祀享所以報功功有隆卑而其身之品級不可易報者底于其身之極尊焉止矣孔子之功侔配天地然其位惟臣而己夫臣功雖並天地未聞人君事以天地禮也孔子之報極諸臣道可矣非欲殺之無其地焉且孔子之功正人倫也君臣之分可遷則人倫不正孔子又奚功哉今使孔子偃然受天子禮樂孔子安乎愚竊慮其不安假令安焉則必不歎季孫之僣佾三子之歌雍也先朝褒贈窮于王爵王本非臣爵後世以冠五等則王固臣之莫加者耳孔子雖聖臣爵或受越此則非人類所敢聞矣異時儒臣纍請增加帝號天子明聖竟格其議此則天地之至公也今苐格其爵而還用其禮樂是令孔子明以臣子冒行君上事也百官居服等第稍僣猶無逃于國家憲令矧孔子曾不如今百官之知禮乎故愚謂三數年來之祭孔子計應朝服旁立而無敢當矣夫父子人倫始也今顔子曾子子思並坐堂上無繇點也伯魚悉列廡下此不幾于倒置耶昔者之論嘗謂孔廟之祀出于朝廷乃王者事禮因道統而起通為天下後世施報不暇計私倫焉矯之者謂道統不過明倫王事不可偏廢故又有别室祀叔梁紇以顔曾子思三父配者此其説雖佳然究之為未明順愚竊以為直應引三子以歸厥考之下何不可也又孟子之傳固得其真要其私淑徒也曷若權其體勢儕之冉閔數子間乎又禮樂之用不可偏廢今禮之節文甚己精密樂之聲容恐未至當愚竊謂宜特令學子顓刻習樂間暇無缺考校之頃兼用升降務俾禮備樂和無可間然如患未獲師承難猝舉作或令諸生鄰寄太常習其聲容必求合乎古雅通熟者歸授其黨而首通者科目收焉則亦不患其不工也又近時郡縣或有上援朝廷祀典用黃冠為樂舞生此又不然學者學夫禮樂也素昔所誦孔子之文何文學道何道顧報祀之頃委之人乎借曰未易習則曷為不習乃忍北面而立以觀異類之舉措耶黃冠者今之所謂異端雖未知孔子視為何如要為黨昌言排之者矣寧有暇時則極力以排有用則暫假而不麾者今使孔子以明道黜邪受報而更令異道稱邪之人為報具哉此又末節愈不通者也嗟夫聖人之道中正而己有生蒙被教澤孰罔報忱顧翻有病焉則未免更為罪乎故愚恐久而有建白者輒申諸鄙陋詞旨迫局將幸以來薦紳先生之教焉毁文廟塑像議馬一龍文廟塑像自漢以降有之衮冕圭玉擬王者而其貌則不肖也天子師事孔子上追千載之志議除先朝瀆封而祀之以先師之禮焉羽用六籩豆各十遵祖制不敢踰亦不敢抑詔國都及天下郡縣悉毁像作木主孔子之徒以國家遺聖晦道莫之削也人而説之嗷嗷然有司奉詔進羣彥而咨之或曰先師也不可毁也過諸室而蔽之稱旨或曰神所依馮也久矣不忍毁也葬之于寢隂合法或曰禮樂自天子出違禮不敬慢命不職且召尤焉其速毁之遵制龍聞而錯之曰禮祧主無寢與墓則葬之道路之間是主也非像也謂之真孔子歟蔽之壁落之內是囚之也故囚則毁聖毁聖者無師且神不可間也謀不可遂也間則不享遂則不周速之者棄聖而虞者也棄聖無禮之三者豈朝廷尊祀先師之意哉生民以來未有盛于孔子者也德侔天地道冠古今刪述六經垂憲萬世加亦不隆削何可得乎天子聰明齊聖以為楚子僣王春秋奪之季孫八佾論語譏之巳則無位而受享焉非聖人志也是故去王號省備物殺禮樂以成其志而師事之隆加于昔也毁像謂其弗肖也弗肖何像焉故毁之其毁之也必先作主木卜而刋之釋菜以求謬合也蓋不先立主以行釋菜遽而毁之則神有所不據事有所不安故曰棄聖而無禮矣雖然像毁矣王去矣禮殺矣天子而弗躬于太學焉子孫之祿不加焉其言之不顯其道之不行其學之不講若之何其不削耶故在太學視天子在郡國州縣若曲阜視列爵其禮以是為差而孔子如太極隨物物而物之其大小豐嗇厚薄所賦不同而全體之具于是物者仁者見之而為仁智者見之而為智無物不然隨在皆足也否則槩以六羽十豆籩是尚躋孔子以公侯之爵而死享之孔子不義僣王能受虛公哉若曰裔公也公祀之則惟在曲阜太學則有天子焉郡國州縣則有列大夫焉尊不可降卑不可亢是紊之也啓聖祠先後祭議馬一龍禮以義起事以理定今有司于嵗時祀大成文宣朝廷推聖人之心舉古昔未有之典又于文廟别立祠祀啓聖公正先賢先儒後于其子者位為是祠配從王廟制出自上裁而薦饗未分先後祭必同日主祭必同官若謂文宣德侔天地道貫古今帝王之師後學之宗致齋肅戒首事灌降禮畢乃推其所尊而後以祭文宣者祭啓聖竊恐聖人盛德至孝使其虛據几筵于待食之父而巳則燕然受大烹之養神必不安况子雖齊聖不先父食傳有明文但崇德報功祭法所尚盡舉其禮于啓聖祠而齋戒誠敬之意不得致精一于文廟難免誠意既散寖以懈怠之弊至如遣官分祭在啓聖祠或稍先焉又兩廟呼唱趨拜樂節奏止紛然譁矣雖執事者之心疑二觀聽無復精一之思縱地逺隔越不能相逮而分獻官亦難以長佐為差某欲推文宣之心合古傳之語然須于文廟整肅班次主分并諸執事就位伐鼓鳴鐘樂懸而不作主祭者由位出次禮生導入啓聖祠行如分獻儀僦而退乃即先在文廟位庭燎倍明禮樂偹舉祭如常此庶幾以義起以理定者也神人之心或其兩得之乎惟執事裁之緣命撰祠石刻內及是禮故有是議廟祀議毛紀時有建議廟祀之禮者下禮官覆議曰祧廟者按古者天子七廟親盡則祧祖功宗德百世不祧周文武有功當宗故别立廟謂之世室合為九廟漢廟七室共堂唐宋為九室我太祖髙皇帝肇修典禮立德懿熙仁四祖廟後更定九廟同殿異室即今之制𢎞治初集議祧禮尊德祖為始祖懿祖而下以次祧遷後憲廟孝廟升祔奉祧懿熙二祖武廟升祔奉祧仁祖俱藏主於太廟寢殿之後曰祧廟折禮𠂻禮文允合古意若如周制立七廟與二世室左昭右穆昭之祧者藏于武之夾室穆之祧者藏于文之夾室但其規制位列世尚異宜如廟主東向穆主北向今可行乎度數儀文繁縟莫究如西酌犧象東酌罍尊今可用乎是皆所以序昭穆之倫順隂陽之義乃禮之精者此而不講是徒文而遺其本矣大抵禮因時世人情而為之節文者也泥古者可以鑒矣曰禘祫者天子宗廟之祭五年一禘禘其祖之所自出周禮所謂肆獻祼是也三年一祫合食于太祖之廟周禮所謂饋食是也并春祠夏禴秋嘗冬蒸凡六享然禘祫之祭歷代廢舉不時合禘祫之外每嵗時享于四孟及季冬行國朝一嵗五享同于太廟儀文且載諸司職掌而無禘夾之制蓋我德祖廟諱猶未之著以上實無可推之親亦以後世封建廢譜牒亡而禘之祭遂廢而不舉耳惟于嵗暮之祭奉祧主于太廟同享是即大祫之禮也蓋天道三月一小變而為一時未及三月而又祭則為數而煩己過三月而不祭則為疏怠今一時一祭誠合乎天道不疏不數得禮之中矣曰特享者周禮四時之祭春則特祭各于其廟所謂犆杓是也夏秋冬則合享同于太廟所謂祫禘祫嘗祫蒸是也合享于太廟所以尊其始祖特祭于其廟所以各伸其尊我太祖初建四廟蓋嘗行之其後改建廟制故四時之祭皆合享于太廟而特祭不行議者多謂太祖宜于孟春之享特祭于其室以當南向之祀然必各為一廟然後可以行之但九廟行禮儀節甚繁先儒謂一日而歷七廟則日固不足而強有力者亦莫善其事矣若日享一廟前祭視牲後祭又繹則彌月之間亦莫既其事矣况于九廟乎蓋天子以奉宗廟為孝若不得自致其如在之誠則于承祧踐阼之意寧無歉乎然竊思之廟制固難輕議而特享之禮議所當講惟我德祖實為始祖所自出之帝可比周之后稷宜藏其主于别廟居中一室而懿熙仁三祖列于左右遇夫祫太廟奉以南面至我太祖受命創業實為有功之祖所謂始祖也可比文武百世不祧他日太廟四時之祭太祖宜正南向之祀庶足以伸崇德報功之典而愜天下萬世之公論矣曰出主者禮合享于太廟有出主之儀國初廟享亦嘗行之其後止出各廟衮冕亦古人設其裳衣衣冠出遊之意也若欲出主必須如禮主祭者捧之或遣親臣代捧猶之可也至于諸后神主則將何人代捧乎然古禮直祭于室祝祭于祊所以求神之所在况今郊社配天奉先殿及陵寢皆設神位是豈虛設哉蓋神無乎不在有其誠則有其神而必曰木主非迂則泥也曰祔食者古者廟享皆以功臣配食盤庚曰兹豫大享于先王爾祖其從與享之是也所謂殤與無後者從祖祔食亦從祖而毁固禮之所有然今太廟配享東設親王四壇西設功臣四壇中山諸臣無容議矣其夀春以下諸王似皆祔食揆之于禮亦宜從祖罷享但配享與祔食不同安知夀春諸王非有功當祀者乎恐未可以殤與無後論也况天子之宗廟豈有殤與無後者祔食之禮乎仰惟我太祖聖德御極制作大備其于宗廟祭享之禮參稽前代之載籍博采儒臣之論議斟酌損益斷自聖心足以垂諸萬世而不可易者經所謂有其舉之莫之敢廢有其廢之莫之敢舉者實禮家之律令也可以破千古聚訟者之惑矣明文海卷七十四
