body:
  text: 明文海卷七十五餘姚黃宗羲編議二天子絶期議王樵嘉靖二十八年莊敬皇太子薨逝禮官議本朝喪服之制父為長子服期又儀禮臣為君長子齊衰不杖期傳曰何以期也從服也言從君而服也奉旨天子絶期况十五嵗之外方出三殤朕服非禮止輟朝十日百官服制可無謹按期之喪有二有正統之期為祖父母者也有旁親之期為世父母叔父母衆子昆弟昆弟之子是也正統之期雖天子諸侯莫降然古禮父為長子喪亦三年故周穆后崩太子夀卒叔向曰王一嵗而有三年之喪二焉本朝雖為長子服期然于國本之重似猶有當議者先朝既未有定議至莊敬太子之薨禮官當詳考以請上裁而止泛引服期則聖語天子絶期之一語宜乎折之而無辭也宗法議陳九川明水子曰大傳所載宗法諸侯國族之制非通禮也夫惟諸侯族人不得以戚戚君位故命别子為之宗于是始有别子為祖繼别為宗之禮非大夫士之宗道也支子為大夫以上牲祭于宗子之家不敢奪宗也然則大夫斯戚之矣又奚以别子為哉茍以嫡長為祖則非别于繼别之義矣周禮大夫三廟不及其髙有禱焉為壇祭之繼髙之宗五世乃遷則小宗且踰大夫矣而况于大宗乎惟國族重以君命故大宗得擬于太廟小宗得亞于大宗而不以為僣也今大夫且不得為者而士庶得通為之禮固如是舛乎哉且别子有君命矣又以公族得為卿大夫爵祿不絶于朝輔窣具偹與國咸休于是始可以世統宗人雖百世而莫之違死為之齊衰三月大夫以下至士庶之家遷徙零落勢固萬有不齊矣欲比而同之得乎世儒不觀會通鑿用經禮欲通公族之禮于士庶至不可行委罪世道不亦惑歟夫士之考廟王考無廟而祭之去王考為鬼庶人無廟而禰于寢周公非以薄為道也程叔子曰髙祖有服安得不祭某家却祭髙祖是士之祭髙自程氏始也德厚者流光位卑者禮殺上下有等夫祭豈以服制邪一廟亦及髙曾于禮無之同堂異室君子之所以陋漢也茍侯國宗法下逹則士庶當直為五廟不宜復沿漢制而重殺之然後世儒者終不敢為而易廟以龕者是必有制乎其心者也周大小宗本法果如是乎哉然則吾安所適從也夫諸儒之議我明姑采而頒之附于彜典自公卿下達猶古禮也夫君子之事其先也不得為而為之是誣其祖也其失也僣得為而不為是儉其親也其失也薄是故宗祀四世身事四宗吾從時制焉耳而敢立大宗焉禮有小宗而無大宗而後之士庶乃欲冒為之甚矣然小宗日分則族散而莫之合也于是竊以義起立始遷之祖之廟而弗宗焉世以族之長而知禮內外具官者嵗率羣宗一祀之或猶恐其嫌于大宗也曰是亦不遷也己又烏在其異乎曰不祖别子不世其宗享不備時祭無適主主不統族又烏得同于大宗乎嵗一行之亦幾于壇之矣且古禮族厲夫始遷之祖顧不重于族厲乎是故繼髙之宗羣分于下而支流明敘矣始遷之祖獨統于上而本原合一矣是故欲報本追逺敬宗合族勢可行而禮不背者斯其庶幾乎若今之公侯伯則可以奪宗而立大宗矣或曰古宗法為統生者耳四禮議徐霈承示宜民禮要文公家禮而芟削之務在簡易可行其説甚善然禮貴隨時變通故國奢示之以儉國儉示之以禮隨時也昔林放問禮之本夫子大其問者蓋世方虛文相競而實意愈衰欲矯時之弊者務在反朴還醇以復古之治乃對病之劑也冠禮尚矣三加之祝教以為人子為人臣為人少者之行也而筮日迎賔布席陳器之類亦自簡易可行親迎之禮南方不行久矣欲驟復之似難女入門見舅姑拜祀堂後壻即見女之父母蓋當時男親迎女父母送過壻家故可一時行之今鄉俗期年後女壻方登門或有數年不見女父母者壻或至必坐首席父母反位其下俗薄甚矣宜痛革之亦惇俗明倫之一端也鄉俗締姻央媒人多用親黨數十人盛服登門拜跪禮數太隆重筵設席牲幣承筐餽送太費粧奩出嫁破家鬻産金珠寶錠眩耀於街衢太盛多財者俗以為榮慳吝者女以為耻或不愜于舅姑而女致死者有之故俗中以養女為寃家富家止育一女中户何能匹配今雖禁淹女之條而不革嫁娶之弊猶投薪息火不可止也莫若嚴其侈靡不許仍前眩耀則破家厚嫁者少而育女者必多父母之心人皆有之誰肯淹其女以自滅其天倫哉不識死者則不哭不識生者則不吊今婦人稍沾瓜葛者多來吊喪輿從跟隨嘗兼數人動至三四百人喪家憚于設齋分帛必夤夜移柩出外非薄于親勢使然也宜禁止之凡婦人非至親不許出外吊喪違者罪坐夫男亦所以慎男女之别省喪家之費也余在河南提學時見河北每十家出銀若干共計若干付約長收之約副司其出入先將父母衰麻重服及期功緦麻等服一一製備置之􅀢每遇約中有喪擡至其家分散事畢仍付約長以俟他家有喪其衣衾棺椁孝子自辦外設齋立靈明旌一切應酬俱約中十人代之孝子但執杖哭泣而已其事甚簡便亦見中州帝王所居風化所及也祭禮今民間俱祭髙曾祖考稽諸古似不合古者適士二廟不及其曾矣官師一廟不及其祖矣今合四代之祭亦順人情而設非古制也矧追始祖而祀之乎朱子以祀始祖疑于禘而削之是也但先王制禮不忘其所由始如制宮室器用教民稼穡凡有功于生民者皆祀之始祖者吾身之所自出也而可忘乎則祀始祖者人情之不容已也近來民間合族建立祀堂動至千金有門堂寢室丹青壯麗以相晃曜冬至祭日子孫各迎其父祖神主于祀堂而祔祭之始祖南向其餘東西遞列彼此混淆昭穆莫辨褻亦甚矣祭者所以聚已之精神以格祖考今神主紛錯憧憧焉莫知為誰其將奚所聚乎余謂嵗終節日小宗各祀于其家冬至合祭于祀堂惟始祖正東向之位子孫有素行著于鄉閭如古之鄉先生者得祔祭之亦所以勸善而惇俗也余自廣東謝病歸家乃立宗子一人為主擇族中有德望者為家相以佐之寒家五大房幾四百人每房立宗正一人凡有忿爭侵奪不服者本房告于宗正宗正告于宗子家相會于祀堂以剖理之不許經告官府行之數年訟端少息其祀于溪東惟始祖神位子孫各自祭于其家不相混雜祭之日班次甚嚴不許踰越明尊卑序少長使貴不至于凌賤富不至于輕貧先王化民成俗之意其庶矣乎文公家禮儀節惟四代不祭始祖其于合族維宗之義似缺然矣偶因下問而敷陳之姑俟採擇焉髙明以為何如議劉靜修薛文清從祀劉定之謹按元儒容城劉因德性剛正學識明悟所作詩文理趣出人意表非腐儒曲學循行數墨者所倣佛而進退之際安于義命若其稱許管幼安詠歎陶元亮則傲睨濁世涕唾祿爵之本心可見也是以裕宗不能留世祖不能致因豈不可謂之賢也哉然而建言者遽欲以因列諸孔廟則事體甚重不可以不詳議建言者謂顔子未嘗著書而配享孔子不可以因未嘗著書而不之取夫顔子何可當也孔子之道傳之顔子後世取信于孔子之言其言具於論語載于中庸見于孟子存于易繫辭等書不一而足雖顔子未嘗著書不害其為傳道也譬如蕭何無戰功而髙祖取為漢臣之首房喬無戰功而太宗取為唐臣之首所謂知臣莫若君知弟莫若師者此之謂也今以因未著書而仰攀顔子為比則是人臣無汗馬之功者皆得攀蕭房為比惡有是理也哉建言者又謂從祀諸賢其中有不能無過者因無過奈何反不得從祀夫及門速肖之徒固有狂狷失中者矣又有聚斂而聖人斥其非吾徒短喪而聖人言其不仁者矣然而莫不親炙溫良恭儉讓之德親受文行忠信之教髙者名列四科餘者亦皆身通六藝是以孔子家語太史公仲尼弟子列傳備書之以為三千之徒此七十子者其最也然則七十子之有過者亦先儒所謂聖人數其事而責之其所善猶多爾至于左丘明以下經師二十二人有未能深明聖經之旨者矣又有無威儀若劉向好諛佞若王肅者矣然而當世哀道微火于秦黃老于漢佛于魏晉之時而此二十二人守其遺經轉相付受講説注釋各竭其才以待後之學者則其為功殆猶周文武成康之子孫雖衰替微弱無所振作而尚能保守姬姓之宗祀譜諜以閲厯春秋戰國不亡而幸存者也雖有大過亦將宥之况小失乎今以因無過與七十子二十二經師有過者校量彼此欲得登因于從祀愚竊以為仲尼素王也七十子助其創業者二十二經師助其垂統者也遇其有過議而貸之猶得陪從也非是之比而從曰我無過可以陪從未之前聞也建言者又謂與因同時若許衡吳澄其德學無以踰因而亦得從祀因豈得獨遺夫因之于衡澄其德學無大弗若者其功則有弗若也何也衡以其行道之功澄以其明道之功當元氏奮自朔漠統據華夏其當時尚者知夫堯舜禹湯文武周公之道傳之孔子孔子傳之其徒以至于宋之周程張朱者其道足以撫世御極而衡首倡率誨誘之使知是道之可行至于澄所作諸經纂言發揮洞達自朱子以後依經立説者鮮克儷之是以我朝太宗文皇帝命儒臣修輯五經四書性理大全于澄之説多所採入澄可謂能明是道者矣而因之説未有採者則是因既未若衡之道行于當時又未若澄之道明于後世其不從祀未必為闕典也若乃薛內翰瑄直躬慕古談道淑徒進無附麗退不慕戀勤學好問可謂文矣歸潔其身可謂清矣是以存蒙聖知沒錫美諡其為皇朝明臣夫何間然然論其于道所得以與朱子之徒相比並若黃直卿輔廣之親承微言金履詳許謙之推衍緒説尚未知可伯仲其間否也而遽欲從祀竊恐世之君子將以建言者為非愚則諛孰敢和附其説哉故愚以為瑄可無施行因則準作者所議楊龜山例令其所在官司建祠奉祀庶足以伸敬先賢勸勵來學謹議服制私議顧清數日來聞諸公議禮區區愚暗竊有所疑今不敢逺引盛際直以春秋之世禮教殘闕之時言之亦自有不然者按擅弓記魯莊公之喪既葬絰不入庫門士大夫卒哭絰不入傳云莊公卒慶父作亂閔公時年八嵗既葬遂以吉服即位故云絰不入庫門士大夫仍麻絰至卒哭乃不以入且曰記禍亂恐迫禮所由廢也夫閔公以沖幼之年迫于禍亂既葬從吉廢先王之禮儒者記之為萬世戒曾不少貸今天下一家南北西東無纎塵之警大行晏駕嗣聖飛龍四方萬國于是觀禮議者乃欲于即位之後遽從吉服臨御正衙是不以堯舜三王之盛望吾君而使下襲衰世亂邦之迹也而可乎且閔公從吉于既葬羣臣從吉于卒哭亦君除而後臣除先儒尚以不能三年為失禮之甚今遺詔雖詳臣以四月十二日釋服而此時車駕方在中途約計踐阼之期尚在易月之內夫喪寧過戚禮貴從宜古之道也議者不原此意徒執遵奉末命之説欲以是日即遂公除如從所言使君被齊斬之衣臣曵玄縞之製于禮則不順于情則不安傳之四方何以為訓是不惟得罪于古先制禮之聖王亦魯閔君臣迫于禍亂者之所不為也又按喪服小記傳云近臣從君往他國既返而君之親喪服限已過君追服之此臣亦從而追服若卿大夫之後行者返而君之服限未滿則亦從而服之若在限外則不從而追服明君服未除則臣下皆當從服也今日嗣君從外來與在他國而還者略相似就使成服而行計其至日猶在服限之內則羣臣不可遵易月之制而從之服者正此禮之謂也而議者執于四月十二日羣臣皆服吉冠又欲嗣君即位三日而釋服皆不知何所本也貢舉私議祝允明傳曰非天子不議禮儀制典程作于祖宗率由是貴故小宜損益不敢易談然愚以為三重之柄在上芻蕘之獻在下今萬幾沿革羣工言之聖人裁焉蓋不敢議者臣道無成而不能不言者效忠之常範也竊見貢舉一事有應稍為更定以合時措而分在下士未敢昌言輒復私列一二覬異時或有以備草茒之陳焉議曰貢舉昉乎周漢考試興于隋唐假考試之法應貢舉之目姓名不識其孰何性行未察其淑慝僥幸于一朝筆墨之下以為終身隆卑之第斯已術之淺矣然其間猶可稱者蓋貢舉以質考試以文質者必極夫德行之核文者必盡夫詞華之美茍充其實乃稱其名故漢唐之士有行足以範世文足以師來者焉由選之各極其科程也當時之文以詩賦論策咸有旨焉自宋代有道統性理之學而世主居宿其説于士爰有疑義之制本朝因之初試以口義七篇聞其創體出于劉學士三吾其意不過以筆墨代口講之義不使面陳故措詞稍令類文章成首尾云爾本非古今文章家有此式也三試皆因言以審心詳外以測中本之初場求其性理之原以論觀其才華詔誥表判觀其詞令䇿問觀其政術咸善焉則為臣也道立才通而令修政舉矣否則反之理難明而翳重故求之最多以驗其心政匪一途故求之亞于性理辭令異施故隨地求其一才最易見故特取一以充知焉其權衡非不精後先非無序然談理最深細故才雖或減焉不妨吾所求也今之司校者惟重首考而略于後選是國家定制之旨已有重輕今復加偏焉益重其重輕其輕也故愚以為三試取舍宜均其力為便夫聖賢之言渾涵易直學者宜寬意以玩之無不明逹雖所見或殊觀其意可獲其歸自先儒詁釋已不能無異今必欲同歸一道或執宋人一詞兩字以為主意翻亂經文以徇傳家或自出詭見雕鑿聖文乃窒通途暗求符已凡斯有違必見黜落故愚以為求之宜大勿拘一律為便經詞宏深理趣賾奧或涉𡨕思類移晷刻紛紜之場茍欲精核又望周完日辰有涯資賦非齊無邪一語足蔽全經芣苡數疊徒衍餘興何必務圖盈數祗廢紙筆哉今或過午篇數未登終場如制減作輒至不謄或不給燭俾研核之功委之無用強記之輩多遂登升故愚以為如制減場不關去取為便孔氏所述實惟六籍樂經既亡三禮固在後世傳經儀周二禮固同戴記為一科本朝獨取戴記文多論説可以作題敷論而二禮文多敘詳制度可為詞者寡也然因事明理他經所同直述制度又且何害故愚以為三禮宜復為便五經之外孝經論語同出孔門與五經者均也自宋以來始有四書之目本朝因之非敢妄議然愚謂大學中庸終是禮記之一篇孟子之言羽翼孔氏然終是子部儒家之一編耳古人多有刪駁國初亦嘗欲廢罷故愚以為宜以學庸還之禮家論語并引孝經同升以為一經孟子祗散諸論場為便諸經箋解傳釋今古浩穰然自昔注疏一定似有要歸本朝惠製大全書俾學者遵守亦未嘗禁使勿觀古注疏諸家也今習之既久至或有不知人間有所謂注疏者愚恐愈久而古習傳經家之旨蓋至泯滅故以為宜令學者兼習注疏而宋儒之後為説附和者不必專主為便減場之法以五篇為則愚謂既欲其精不須務廣或以五篇為全場而其餘隨力所極但不得省于三篇必理精詞逹雖寡亦取為便論場之考求之甚博至如性理道學乃其中一事初場既得其説于此勢宜簡略或摘一語或搜一人使旁推曲喻亹亹無已似無宏益于學故愚以為論題宜簡于性理道學而多論政術人才等事為便詔誥表判或上以令下或下以告上正有官之切用不可意易故愚以為詔表內宜增科二道判語須求用事精博詞文華縟為便詩賦之説固非所急先進論駁既繁不必廣辨但愚謂人之性情惟言可測而因言識情詩賦尤易故古人之用詩賦以求性情也今或稍用一二以驗其性情正邪心術寬猛亦可也至如設策問答正為從事之需政事之方何有限極五篇所具初不為多以此求才宜無遁飾今或分問不急之務碎細之談與記古人陳腐之片詞衆知之一行以暗中摸索為貴則曷若商榷今日安上治下施為之切務哉故愚以為䇿場所試專以政術為便大抵貢舉之設欲得才而用之也致用之道向已養之學校令求之矣今日之求乃以用為急而欲知其體故先以理性道德經籍之説察之耳于是而一得其實則凡後場諸作悉是為政之事貢舉之本意也故宜執守此意則求之之道自不失其權宜矣今人往往謂科目為進身之階梯意以致用之術固自有在此特借以入其地云爾愚謂祖宗定立國之典巨細俱到用人者萬政之本貢舉者用人之基豈茍焉為暫借之具而已其必有不易之故矣及靜觀今日之從政者類多建偉傑之業而其設施措置類不豫著于學校文具之間場屋敷陳之內功名之出文章不與焉其進身也在此其立身也在彼此所以有似于借用之器也然則何以是為哉此愚深求其故所以謂主求其用而先察其體乃貢舉立制之本意至于久而奉行者稍失其宜如前所云則今日目科目為階梯之由也或者稍以其用為急求之重輕微形應者趨向立變斯則通明俊偉之才益可前卜于潛深興起之際矣荒魯妄見似戾大通將就正于有道焉爾明文海卷七十五
