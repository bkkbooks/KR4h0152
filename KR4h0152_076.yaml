body:
  text: 明文海巻七十六餘姚黄宗羲編議三旌表趙氏女婦議錢福趙氏女受華亭張昱聘有吉日而昱卒女喪之三年告諸父往侯昱之父母事之終身不改志郡太守以為節聞諸朝旌之吾友顧子士㢘以為稱婦則無所麗于其夫稱女則既逺于家無所于當且為詩哀之若旌之者過然太守感焉乃獻議曰禮由情立政由俗更先王之治弗能外也儀禮之納采問名納吉納徴請期男女各主于其家之長而為男女者不與焉非若冠笄告廟拜賔躬引而詔之也迨親迎之夕壻之主人醮之曰往迎爾相女之主人醮之曰往之爾家于是男始知所配女始知所歸是以志不蕩而從有專也唯有所謂女子許嫁笄而字者然繫于笄猶男子之冠而字不繫于許嫁也朱子引以釋易十年乃字為許嫁則傷于巧矣當以程子字育之義為正然所謂字亦不過别其男女以序兄弟之行初未嘗即所許嫁而寓之稱也又先嫁三月教之公宮若諭之矣其所謂教汎語之以婦徳婦功容而已未嘗指言事舅某夫某也故未親迎不敢稱婚姻示未可必父母尚得改而議之也今之世則不然納采醴儐男之家壻已侍筵女之家外言已入保姆或戯之曰某家婦某郎妻矣甚或為若之父母者亦謂之曰汝舅若何汝姑若何郎若何夫女子方抱専靜混䝉之徳而有以鑿其竅啟其情萌觸其性天原闕能㤀乎于是乎知所主適一而不二固執確守不隨嵗月長少情景之變而失其初心此其禀賦之剛毅烈女貞婦忠臣義士皆從此出雖事有難易闗有大小繫乎所遭而其志一也乃聖人之所深取者而孰得而少訾乎是故今乃有未婚而壻死女聞其父改議則自盡夫死生亦大矣所聞者執一而心有所主自不知生之為樂也君子不暇責其室取而外慕昧于從父之禮而寧過與焉曰烈女豈不傷末俗之移而歸咎其父母不慎于内外無防㣲杜漸之慮而重悼女子之遭不幸乎善乎曾子曰上失其道民散久矣如得其情則哀矜而勿喜足以為千古斷獄者之成案若以為未識其夫之面而槩之理以為不當死則魯女憂君得為罪乎國當易姓有處士奮于畎畝舉義兵誓殉故主與夫太學生舉義旗報國以死者皆以為未霑其禄未識其君而不得為義乎以此例之其當旌也固宜然未有能舉而旌之者獨趙氏賴壻之父母得不死而受旌焉故人或異之抑孰知太守逺見獨斷樹此義舉以愧死夫伉儷半生衾枕几席富貴共享而朝哭其夫莫檢其篋神窺他人之室者故知有闗于風教甚大非淺見薄識可輕訾也凡吉凶之為禮雖有私于其子入其門必先告諸其父示尊無二上也唯婚禮則自醮其子之後合卺醴從皆不與于其父厥明始見舅姑三月始見廟以成婦示有所主也故未有主而婦何謂乎婦未廟見而死不得附于其姑歸𦵏于其家盖未成婦而以女處之也而况于未親迎者得為婦乎然昱之父母姑憐其情不能深究于禮固不可以非禮之禮臨其子若據禮雖昏三月而未廟見子不得而婦之則婚雖重所主而以尊臨之亦莫敢以情奪昱不得而婦趙氏其父母則婦畜之矣以其父母之命而臨昱雖曰非禮之禮昱亦宜姑受焉既曰當旌旌必于門門當隨其所止趙氏既逺其家而守張之節不于張氏之門而誰歸乎旌于張而謂之張女可乎史稱韓亡張良少未仕宦後說項梁立韓後姑授韓司徒韓司徒項所愛也君子弗與也其卒則漢留侯也陶潛宋彭澤令也朱子特表之曰韓司徒張良卒晉處士陶潛卒君子以為不泥其迹而原其心㣲顯闡幽以扶植人道之大閑充斯義也則趙氏不得已而原其志以繫之張姑稱曰張節婦則亦未可深疵也獨恨夫世之拘曲而持小節以忘大端卒之頽綱墜紀宏禮放樂俾人莫敢齒及焉者罪當何如也是以敢犯不韙而為之言也伏惟禮官采擇焉謹議唐神堯罷浮屠老子法議吾謹唐神堯即位九年四月詔沙汰天下浮屠老子法凡僧尼皆沒為平民後太宗即位復之遣僧入西域取浮屠氏經由是中國二法大熾吾以為髙祖之貽謀不克盡善所以滋後世之失也夫盛衰相推者天下之常非有以絶其根源則其滲漏茁芽必至于薆荗渤漲而不可壅也消于此必息于彼止于暫必流于他日是非識見之素定而使後世確然不可易者難之也佛道者興于漢而厎于六朝陳隋之間繁昌連絡不絶暗主愚氓皆極其侈麗而奉之以求福祉髙祖獨能毅然而廢之是不可謂其不賢于人也然非真有以識其道之邪晻而足以壊吾綱常倫理之正其所以廢之者特以習其道者不事徭賦以空吾之户口而已矣固非惡其道而廢之也觀其下語盛稱二氏之道之大而惟俗之不能守其道耳彼太宗者則以為吾誠能守其道使天下咸知所率由是而福祉可求也烏害其為道哉此其所以興于既淪沒之餘也今夫殺越人於貨者非君子之道也其父懼怯而不敢為而其心固以是為計則其子之驍勇悍鷙者將必冒法而為之矣使其父知其非君子之道而以告其子則其子必知所懲不俟法之厲禁而終身不為矣何者誠見識有定而利欲固不足以撓之也故夫太宗之興浮屠老子法者皆髙祖識見不克素定之過也彼其心誠知其道足以禍人則必以是道不足為教於天下後世而芟夷之㫁㫁然矣太宗者顧不知所懲耶嘗以唐之三百祀反覆搶攘者皆太祖太宗之所貽謀者不善也識者當知所歸復修撰康公鄉賢祠議陳以忠故修撰康公海卒之若干年某郡某公某來督學闗中采郡邑博士弟子議以鄉賢祠之後有欲罷祠其者余竊以意折衷之夫文章可以觀人康公舉進士孝皇帝策寘第一人謇諤之辭驚傳海内所著對山集倜儻雄偉此可以文章知公也夫氣節可以觀人武皇帝初進退百官出閹瑾之口附之者躐致通顯瑾為興平人公與之里閈也瑾嘗使人喻指曰能一過我拜相非難公竟無往狀元及第八年于修撰而不一遷官也此可以氣節知公也夫行義可以觀人劉瑾竊弄威福韓尚書率諸大臣伏闕請去之寔李夢陽代草彈之瑾以他事下夢陽獄將寘之死公特為造瑾數言出之直道以逺勢而屈身以急難公之義重矣公嘗忌于政府有楊侍郎者勸其通書公手胡床格楊斥之去此可以行義知公也公之賢其大者若此所謂鄉先生道徳可尊沒而可祭于社者其不在斯人與罷祠者以東山之好為公瑕纇夫指其小者掩其大者亦奚可哉世人峩冠博帶尺歩繩趨而髙談性命不知其燕私之頃隱㣲之際作何狀態視公磊落軒豁不飾瑕瑜翻有媿矣馬融列女樂而授生徒王九思亦未嘗離去聲色此兩公者一在扶風一在鄠杜若公東西家馬猶異代王則與公相徴逐上下論議者也彼皆爼豆學宮矣公獨不得半菽之享耶夫善人不循蹈途轍狂者自放故不得以祀法繩之也今欲以狷譏狂以有恒律善人或者非孔子之意與請復康公鄉賢祠三髙三忠祠議徐師曽吳江舊有畫像三軸筆法頗工不知作于何人盖即三髙像而其名未立也宋熈寧中縣令林肇膺其本而繪之鱸鄉亭榜曰松陵三髙畫像自是始有三髙之名然未祀也塑而祀之自石處道始厥後孔公克中顧瞻祠下以為人如三髙誰與為國乃立三忠祠以配之相沿至今四百餘年人方仰其遺風而於祭法則未暇議也惟宋蘇軾劉寅元瞿佑謝應芳我朝謝常莫旦數公議之瞿佑之辭跌宕剴切盖寓言以斥之耳然怪誕不經不足錄也謝氏上饒叅政書大約以為禮不祀非族况可祀讎敵乎范蠡進美女獻寶器以惑吳之君臣積謀二十年而墟其宗社吳人之讎莫大于此雖其勇退一節或有可稱而私西施事營殖猶未離乎貪穢之迹尚何風節之足慕乎吳人欲祀髙士當以泰伯為主配以仲雍季札而張陸二公列之從祀黜范蠡而去之則得之矣其論甚善而饒竟不省豈禮樂待人而後行與舊志又載彈文有云匿怨友其人丘明所耻非其鬼而祭聖經是誅今有竊髙人之名處衆惡之所有識之士莫不共憤無知之鬼豈當久居又云越則謀臣吳為敵國以利誘太宰嚭而脫彼勾踐鼓兵郤公孫雄而滅我夫差既遂厥謀反疑其主鄙君如烏喙累大夫種以伏誅目已曰鴟夷載西施子而潛遯又云變姓名為陶朱詭蹤跡于江海語其髙節則未可謂之智術則有餘假扁舟五湖之名居笠澤三髙之首况當此無邉勝地之上豈應著不共戴天之讎此文不知誰作要足以服輿情而扶風化雖蠡復生恐亦無以自解而近時張公明道之論乃曰范蠡熟識越王之為人又恐其惑于西施以蹈吳轍故假貨色以自愚耳春秋書于柯之盟傳曰敵恵敵怨不在後嗣入吳自春秋戰國而下幾三千餘年人之君人而死之吾焉得而死之事不近情非春秋之義祀之可也或疑垂虹雪灘相峙而祠子胥之靈不能無憾焉者予謂不然蠡以鴟夷自號其傷于胥者又有甚焉况東門抉眼之觀胥亦知事幾之必然英雄神交酌之以幽厲之公雖慈孝者不能相掩此李左車不深讎于淮隂皆英雄之善于權義也其辯雖雄然終無解于非族之議由此言之蠡之當黜于吳無疑矣至于三忠則亦有可議者夫郡于子胥既有專祀復祀于我近侈然先儒謂其所浮之江即或松江則是祭于死所猶有說也彼二公者何與于我而祀之邪昔漢丞相忠武矦之没蜀人求為立廟朝議以禮秩不聽百姓遂因時節祭之道陌上言事者或謂可聽于成都立廟帝禪不從習隆向充拜章言巷祭野祀非所以存徳念功若盡順民心則凟而無典建之京師又偪宗廟止可令其近墓為之所親以時設祭故吏欲奉祠者皆限至廟斷其私祀以從正禮于是始從之為廟于沔陽漢人于忠武矦其難之也如是非以禮秩之不可紊乎今二公之祠既各有所不應侈祀一至此極也若但取其忠與髙而不稽諸祀典則巢由箕比之徒當先之矣然非司風紀者按祭法而是正之則何以湔前人之謬盭新斯民之耳目哉莫氏又欲以王份易范蠡以向子韶陳瓘易張岳與謝氏不同夫由謝氏之說則近于僣今亦未敢輕議然竊以為二祠之謬在拘其數而妄取足焉即使去蠡與巡與飛雖二髙一忠亦奚不可豈必盡三其數而後為得乎姑著之兹議以俟君子紀夢為先楊乞祠議游曰教歳丙辰余客寓遵義令官舍時新守遵義者固始許公在庭同守者稷山趙公懋徳二公清風凛然自開郡以來未有也許公擕有愛子文學某赴任不十日而卒越月而同守趙公卒再越月而太守許公復卒黄堂之上閴其無人府基即楊應龍廢署二公臨卒皆言有紅袍客出入卧所余聞之心知其為厲鬼祟也慘然傷惻一夕寢衙齋夢一紅袍偉丈夫冠帶峩然拱立于余館門之外而不入余問之曰汝何人也對曰楊舊民知太史為仁人餓而乞食于太史余驚而覺心知其冠帶峩然為楊氏先侯也餓而乞食者為乏祠也拱立館門之外而不入為恭敬不敢犯余欲感余而為剴切也余方落魄兩呼余為太史或以吉祥報余也歆然歎曰有是哉先楊之靈乎大丈夫擔當世宙受託一言終身不負矧受託于鬼神者乎因思商滅夏封夏之後于杞周滅殷封殷之後于宋皆不斬其先人之血食使陽有伏辜之罪人隂無啼饑之怨鬼古聖王所以調爕隂陽神欽鬼伏永為乾坤社稷主也今去郡城六十里曰永安庄應龍故宅也以都督劉公之意幸為兵燹所存宮院巋然日就荒地當事者何不試一題請榜曰楊氏家廟考楊氏歴代有功于朝者祀之訪楊氏舊民楊姓者世賜一衣巾以奉香火查永安附近有餘田未入民籍者或二三十畝立一楊氏户嵗藉其入以供祭祀併修理祠宇郡大夫每嵗清明前一日屬衙官一人鼓樂以往祝郡主之名而代禮焉亦庶幾乎古先王存恤幽靈忠厚享國之遺意而厲鬼可不作也余恨不得身任其事姑擬議于此以待留心國事者採行倘謂此以君伐臣非杞宋之比唾余謬妄則又有光武祠竇神宗祠錢蘇子瞻表忠觀碑可覆按也明文海巻七十六
