body:
  text: 明文海卷七十七餘姚黃宗羲編議四均糧議錢薇或問古哲王疆理天下則壤成賦九州析為九等于是禹貢載上中下三壤而區分之是糧雖哲王莫能議均從古然矣豫曰子何以天下例一鄉一邑也夏書定賦九等别九州也今大江以南全浙以東皆屬揚州揚之賦下上蓋指通州不聞更有九等也我嘉一郡耳麗以七邑特揚一區之地賦同上下可知是糧之均在古則然矣或曰地力不齊如山木數年而僅拱把蕩葦百畝而收錙銖髙昻之阜多雨乃收霪澱之鄉遇旱反獲物之不齊物之情也必欲均之無乃名美而實左乎豫曰是何因瑕棄瑜者也夫地力不齊如周官一易再易之田是也今吾邑之田髙下肥瘠大略相當無田不耕無耕不稔故穰則皆穰歉則皆歉其收有多寡係農之勤惰是不可以肥瘠論吾邑田也况不均之害不在田亦不在山與蕩而在官民麥之三等何也官田之糧一畝之輸有至五斗者民田則五升至八升而止麥地則三升至五升而止故貿易之際買者利糧之輕寧多價以推糧賣者利價之重寧存糧以增價于是改官為民改民為麥此積荒之糧所由起也又區書乘機為姦甲户有荒糧而乙丁或絶惟賄是視將甲糧推于乙户甲户暗減乙户暗增而荒糧愈夥此積荒之糧之再變也至于狡猾之徒與弊為市一遇官府與民灑派存糧利民之賄冒認圖糧故裝已户輾轉告豁官府一時難于辨究鄉民愚訥不能分訴弱者含寃屈抑巧者明認暗飛此積荒之糧之三變也夫糧三變而害乃滋甚矣今欲去斯害無他妙巧也止宜于官民麥田三則而均之何可援山蕩寡收之例而混阻哉然其間亦有册籍名為山蕩而業家實得水田者乃區書旋幹之積弊但此弊少則此害輕况太察者民無所容非若官民麥地之三則叢積隱害上眩有司而難察下纍貧户之倍輸也且官民麥田其耕同其獲同其凶豐又同則糧之所出亦奚可不同乃固為是紛紜莫詰之弊哉或曰官民麥田非私名也乃國家等則有此昔已定制而今輒更無乃不可乎豫曰此正所以尊制也夫制豈非纍朝斟酌時宜而勒為定典以便民乎洪武初令官田起科畝五升三合五勺民田畝三升三合五勺七年詔蘇松嘉湖等府田如每畝起科七斗五升者減半十三年又令七斗五升至四斗四升者減十之二四斗三升至三斗六升者減十之一是洪武間已變通初年之制矣宣德四年詔各處官田每畝糧一斗至四斗者減十之二四斗一升至一石以上者減十之三此在宣德間又變通洪武之制矣正統元年令浙江等處官田每畝糧四斗一升至一石以上者減作二斗七升二斗一升以上至四斗者減二斗一斗一升至二斗者減作一斗此在正統又變通宣德之制矣由此觀之官田之糧當以後定為準正統之詔今所宜遵是官田之糧多不過二斗七升輕則止于一斗今吾邑官田尚有四五斗者豈當時奉行諸臣不能體列聖減賦恤民之意行之五邑耶又𢎞治二年令應天上元等縣官田糧每石減耗二斗五升民田每畝勸出米二升此在𢎞治又變通正統以前之制矣夫減官田糧之多量增民田糧之少得損益宜民之道即今日均糧意也獨惜當時掌計之臣不能將順德美遍行東南乃止行之一處耳今之議均正默體纍朝減賦至意推廣孝皇裒多益寡之洪仁也故均糧正尊國制也或曰田一也而分官民何居豫曰嘗讀大誥以宋元入官田我朝籍沒之田宋元豐間畢仲遊計處兩浙官田九百六十四頃紹興十二年以户産有契書不上占基簿者沒官淳熙三年劉邦翰等奏湖北荆南兵役地荒以請佃之田入官後李椿年阿秦檜意以水鄉秋收後妄廢田官修陂塘塍埂亦為官田是皆言利之臣損下益上之為也入國朝凡叛竊亂常譎偽詐逆剪平以後盡沒其田此官田所從來也今當太平全盛之日中興純德之治豈肯存南宋利臣富國之計况國初罪人歷年幾二百子孫殫盡寧無一體休息之意哉或曰誠若所言均糧是矣説者謂平湖之四則不若湖州之一則何如豫曰是易見耳所謂四則者僅補偏救弊之方然田既存乎四則糧亦分為四等富貧貿易之際得藉手投隙改重為輕改民為麥是往弊仍在也若湖之合官民麥地為一是姦狡不得減多為少愚蒙不致冒少為多雖五尺之童亦可擁魚鱗之甽而享土膏之利誠蕭曹畫一之政龔黃坐嘯之資而堯舜垂裳之理也或曰糧則均矣黃册亦可均乎豫曰惡是何言哉册所以紀田也凡差徭輕重因乎册者也則所以實徴也凡官民麥地載之則者也今黃册照則收田某户田若干原額無改所以存制也實徴照田派納三則歸一則不分多寡所以祛弊也若併黃册均之亂之道也十年大造後册承前册而欲均之是今亂之也况黃册國制也非啓奏不得輒更是故決于理理因于時時協其宜一本可以萬殊而殊途要于同歸今也究民俗之利病痛宿蠧之奚窮探摉剔之要源塞姦宄之深竇遵明聖之屢詔決便計之咸宜則糧之則不可不以時均均之此其時矣一條鞭法議徐鳯來一條鞭法通府州縣十嵗內夏稅秋糧存留起運額若干均徭里甲土貢顧募加銀額若干通為一條總徴而均支之也蓋其法不輪甲徴收通一縣丁糧均派之而下其帖于民備載十嵗中所應納之數于帖而每嵗分為六限納之官其起運輸解給募皆官府自支撥也大都輪甲則遞年十甲充一嵗之役條鞭則合一邑之丁糧充一年之役也輪甲則十年一差出之驟且多民易困條鞭令每年出辦所出少民易輸分給諸役錢主之于官而承募人役不得復取嬴于民民如限輸錢訖可無復追呼之擾矣夫十年而輸一兩固不若一年輸一錢之輕且易也且人安目前孰能嵗積一錢以待十嵗後之用哉况均徭法通州縣徭銀數不得減而各甲丁糧多寡勢不能皆齊如丁糧多則其年派數加輕丁糧少則其年派數加重固已不均而所當之差有編銀一兩而止納一兩者有加二加三加四五六者有賠四五倍七八倍者甚且相至什伯則名為均徭實不均之大者今合民間加納之銀俱入于官正派之數均輕重通苦樂于一縣十甲之中役人不損直徭户不苦難即如金銀庫子已革定名于徭編之舊照司府吏納銀為募人工食費止令巡守不與支收其支收委之吏毫末稟承于官則需索者不得行而誅求之橫自戢又以時得代不久若查盤吏有身家不得竊庫銀而逃至倉中斗級于舊有募充親充彼徭户親充償所耗固當乃募人看守其折耗亦徭户自償彼守而此償之適教之使盜也今募吏充之嵗加腳費而折耗責之勢不敢自盜又年終更換無嵗久浥爛之憂尤甚便也諸遞運夫馬俱官吏支應勢不得多取即用之不敢濫大概徴附秋糧不雜出名目吏無所措手人知帖載每嵗並輸可省糧長收頭諸費利固不可勝計矣是法也通計里甲均徭驛傳民兵合用銀派之名四差皆視户丁糧為差次議者以為通十里以編不分年則丁糧均法當優免者不能分數户以幾幸則冒濫消核實數以編銀則賠纍息合銀力二差併公私諸費則名目簡富人不坐官役人不坐名則覬覦寢官給銀于募人而募人不得反覆折勒則市猾屈去頭户貼户之派則貧富平糧有多寡役無輕重毋需花分毋為詭寄則册籍清便民利國信無善于此者蓋始于都御史周如斗創議繼之以劉光濟奏可以行之于江西而通行於天下所當世世守之者也泉貨議王禕天下之物以至無用而權至有用者泉貨是也謂之泉者言其形謂之貨者言其用其制先有銅錢後有楮幣銅錢之制自五帝三王下更歷代莫之有改其為法最古而楮幣之制所謂關會交鈔者又所以權錢而行金宋之末造也之二物者握之非有補于暖也食之非有補于飽也而先王以守財物以御人事而平天下命之曰衡有國家者恆賴以為生民之大命而不能以一日廢一日或廢則國家之命幾乎息矣故曰以至無用而權至有用者泉貨是也國朝因時制宜襲近代之法一切用鈔而錢盡廢不用自中統至元鈔之行且一百年中更至大雖嘗改法然旋亦即復舊乃自頃嵗以中統交鈔重其貫陌與至元寶鈔相等並行京師復鑄至正新錢使配異代舊錢與二鈔兼用其意殆將合古而逹今而不知適以起天下人心之疑夫中統本輕至元本重二錢並行則民必取重而棄輕鈔乃虛文錢乃實器錢鈔兼用則民必舍虛而取實故自變法以來民間或爭用中統或純用至元好惡不常以及近時又皆純不用二鈔而惟錢之是用而又京師鼓鑄尋廢所鑄錢流市不甚廣于是民間所用者悉異代之舊錢矣嗟乎二鈔者國家之所用而民則以為棄物而弗之用舊錢者國家未嘗專以為用而民爭相寶愛而用之是天下之民反操國家之柄而國家之命已下制于民泉貨之弊莫此時為甚矣詔旨屢飭禁令愈嚴民頑然相視而弗之恤而上之人亦坐視其法之弊舉無䇿以救之民情所至如水就下勢之趨嚮不可復遏是故善為天下者因民之所利而利之民以為利上之人何故而不為今外宰相得承制行事亦既審察民情即浙江省府治鼓鑄纍月之間國用頗賴以資給則其為效固有不可誣者然其為鑄乃當十大錢止用于杭城而不足以行逺間有流布諸路者民亦易視之弗信泉貨之弊自若也愚竊以為今日鈔法宜姑置弗問而錢法當在所速講錢法之議有二一曰廣開鼓鑄二曰罷鑄大錢考之史傳漢郡國皆得鼓鑄而縣官往往即多銅山而鑄錢唐亦即出銅所在置監天下罏九十有九宋鑄錢總二十六監而諸路所鑄其數多寡各有差其法皆為不可廢賈誼所謂事有召福而法有起姦今令細民人撡造幣之勢者此謂不可使人私鑄爾非謂官不當廣鑄夫錢便于貿易而銅不便于轉輸轉輸不便故即其所出而鼓鑄貿易相便故隨其所在而流布此勢之必然而國朝至大中亦置江淮等六監此可見鼓鑄之開當廣矣自周景王楚莊王欲鑄大錢其臣即以為非漢之赤仄以一當五王莽之大錢五十蜀之直百後周之當千唐之乾元後唐之永通宋之熙寧皆為當十大抵一時茍且之為張商英言當十錢自唐以來為害甚明蓋大錢質輕而利重利重故盜鑄者多質輕故寶愛者少小錢費厚而利均費厚故盜鑄者少利均故貿易者平此亦勢之必然故歷代大錢皆旋踵而廢而至大大錢今亦存者無幾此可見大錢之鑄當罷矣由是言之鼓鑄不可不開而監之置不可不廣大錢不可不罷而小錢之鑄不可不多為今之計無踰此者且今江浙地大物衆省府鼓鑄固必仍舊其浙東西江東閩中諸路宜各斟酌所在分置監局或一州二州置一罏而凡所鑄錢必以漢五銖唐開元金大定宋大觀及今至正小錢為則其大錢更不復鑄夫鼓鑄廣則造錢多而人易致小錢多則稱物均而人知貴易致則其用不匱知貴則其行可久推而放之其法將遍諸天下而準固不特浙江一省而已至于權銅有禁尤當加嚴宜如唐制佛像以鉛錫土木為之惟鑑磬釘環鈕得用銅餘皆禁絶又民間所有銅皆得入官官為鼓鑄除工本之費更取其三而以七歸于民而又鼓鑄之際關防嚴密制作精緻定其輕重而有度平其出納而有常如是則今日之錢始可流于地上而異代之錢將不銷而自廢矣于是國家之命得以伸于民民生由之而可遂因民之所利而利之莫此為便匡今之弊以復古之道為計宜無踰于此者上之人豈亦不是之思誠思之顧胡為而不急于行也抑嘗因是復有其説古者三幣珠玉為上黃金為中白金為下後世或為二幣秦制黃金以鑑為名即銅錢是也今誠使官民公私並得鑄黃金白金為錢隨其質之髙下輕重而定價之貴賤多寡使與銅錢母子相權而行當亦無不可者且今公私貿易苦于銅錢重不可致逺率皆挾用二金藉使有司不明立之制而使之用公私之間有不以之為用者乎是則用黃金白金為錢與銅錢並行亦所謂因其所利而利之者也或者顧謂廢錢而用鈔實祖宗之成憲而于術數之説為有符今唯用錢無乃稽之典章驗之圗讖有相乖違者乎是不然天下之法雖聖人不能使之久而無弊及其弊也固未嘗無法以救之變而通之存乎人焉耳而可泥于拘攣之見偏于尋常之論哉記曰一張一弛文武之道夫弛而不張張而不弛要皆非先王之所以為天下者弛之張之與時宜之斯為善矣嗟乎當今時事之急可言者衆矣然孰有急于泉貨者故述斯議庶上之人得採擇焉疏通錢法議髙克正自成周制九府圜法權子母而行之嗣功龜貝而錢之用蓋重歷代已來行之不廢製亦代更焉其輕重利病可得而言要以天下之利權不可使操于下而其利源不可使壅于上上令之而下不行行矣而以儇巧溷之上為是懲而止是利權自下操也下過上欲令下之行也而上固不行行矣而且有所竒贏以抑之下不見利而且望上是利源自上壅也上亦過於乎錢者寶于金利于刀而取法于泉夫泉出不窮而注無方財幣欲其行如流水與民相灌輸上而下下而復上亡少閼塞而乃稱便也國家錢法上林三官職之今上酌古制詔天下省直開局鼓鑄以贍國用亡何而私錢公行制錢為厲雖懸重辟以繩之猶不能止也齟齬不已遂成廢格若然廢之是使盜鑄者擅其權而官為作止也非國體矣然猶有可諉者曰饒今天下用詘矣計嵗所入僅百一十三萬八千有竒而嵗出不翅倍之主計者廩廩焉憂不足則有仰屋嘆耳夫錢者天地間不涸之源不竭之府先王制之以利民伯主藉之以強國而今自棄之此所謂舛也談者曰錢之制必權其重輕輕則費一而利三之民且殽什為他巧而與上爭其利即欲禁之必作重而行使肉好輪厚後民無所牟利而盜鑄自息然而用之之利不足以當鑄之之費也若之何夫王人以四海為家費百萬以鑄百萬則民已得二百萬之用矣費千萬以鑄千萬則民已得二千萬之用矣積錢漸廣民用漸舒此誰非官之財乎其鑄之也業已不愛銅不惜工導利以豫之下矣然而復不行者夫有所撡之也豪強右族不顧上之文網而隂以私錢易之司市者明知其姧而弗敢詰也駔驓又從而倚之力能斂錢而使之貴又能散錢而使賤賤徴貴貴徴賤愚民睹聽靡常疑駴日生始既以私鑄行而欲避其贋繼乃以避私鑄而并棄其真錢法之蠧大率由此夫上實自有法而下骳之患豈獨在錢哉此不有一大創之不可者顧是猶易弭也一精悍之吏足制其命矣然而復不行者夫有所壅之也今制朝廷之貢賦官府之鍰贖關市之榷稅鹽鐵之存留俱以鏹毋以錢為其輕微而輸將易逹也若是則錢之行也豐于出而嗇于入藩封之祿食百僚之俸薪軍興之市賞戚畹之賚錫又以錢不便故輒罷不行其所為督之必行罪其不行者夫皆其貧無力者也若是則錢之行也嚴于下而寬于上夫上自賤之而求其貴上自塞之而求其通勢必不能得之于下矣試以兩者相提而用金用其六錢用其四如循環然所出之塗亡不開也所入之塗亡不廣也所不便者于賤不必信也所便者于貴不必詘也夫既明示以錢之當于用矣而用之實自上始民其誰不趨焉行之數年而錢法尚壅者未之前聞也雖然天下事法屢變人亦屢變以法而授之人不若得人而聽其法矧錢法之行原非細故而內責之二局外聽之有司事權不一法何由行請下廷臣議兩郡以水衡主之郡國添設臬使一員專督鼓鑄令與民相灌輸上而下下而復上一以便宜從事而毋以文法繩之救時之算宜無出此昔嘗聞劉晏陳恕杜鎬輩曾以重臣領錢使彼所謂心計臣能以利權通造化學士家故棄置不道乃今知其裨于實用也令今得數子者為度支使何憂錢法哉至于足國裕民尚有至計則廟堂之上在而何以佐末議焉明文海卷七十七
