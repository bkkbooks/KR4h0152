body:
  text: 眀文海巻七十八餘姚黄宗羲編議五錢法郭子章錢法者不收之田不計之海不出之府庫無大損于國貯而博利于民生誠今日捄弊之急務也考之列星圖曰天錢十星在北落西豈天之所布不可變而治天下者當因之與夏鑄厯山商鑄莊山成周圜法泉府其制獨詳則先王所藉也漢自元狩至元始成五銖錢二百八十億萬庫開元中天下七十餘爐嵗入錢百萬宋元豐中天下五十三監嵗入錢千萬則後王所資也國家百典上稽三代下陋漢唐宋乃獨鑄錢一事自洪永迄今阻格不甚行而欲其富之埒古人乎此愚所未觧也鑄之不得其方用之不盡其法一或齟齬輒曰錢法難行吁亦過矣愚請悉言之其說有六一曰收銅之權二曰固銅之源三曰開銅之利四曰精錢之制五曰廣錢之涂六曰專錢之官古今議鑄無若西漢二賈誼之言曰銅畢歸于上山之言曰民不應與主共柄今天下姦民私鑄隂持主柄以厲公錢果如誼言上收銅勿令布民安所得銅而私鑄之故收銅之說人主持柄息姦之要術也髙皇帝神智洞燭止令軍民鑄鑑及軍器一切廢銅並聽官收毋令私藏即二賈意也後寢不行至于今銅布于下極矣浮屠佛像及民間鐘磬盂爐之類比比皆銅今欲收之無故而奪民銅則民亂盡貿之以金則國困愚意兩亰各立一收銅厰督以司空之屬外省責之藩臣外郡責之府倅毎月定期與民市銅毎銅若干估直予錢若干其私藏者罰如律大約一嵗收盡民銅則民以無用之銅易有用之錢既可為私家之利而又得免于私藏之罪其誰不欣然而輸之官官以既鑄之錢易未鑄之銅既可為續鑄之貲而略無費于公帑之金又何惮而不收之民況藏銅于民銅皆銅也而私鑄有訾銅一入官銅盡錢也而國家日富聖主所以獨持大柄而利天下者無出于此故銅之權不可不收也銅器收矣銅源未固民得濫取其私鑄猶故也防水者先源後流披木者先根後枝銅山者錢之根源也黄帝封山令十里外乗者行行者趨桓公封山令犯者左足入刖左右足入刖右禁至嚴矣乃今滇中之銅商得私販盜掘銅錫罪止戍邊則私鑄之賊何慮無銅今欲禁私鑄當先禁私販欲禁私販當先封銅山欲封銅山當先嚴盜掘之律銅源一絶即有項梁叅木之徒無自而逞故銅之源不可不固也或曰天地之利不導之開而反封之何也曰非終錮而不開也公錢未布則閉之以塞姦公錢既流則開之以疏利顧今之銅止滇南一隅亦云隘矣山海經曰海内銅山四百六十七漢鄧通鑄于嚴道吴王鑄于豫章唐置于陜宣衢信銅冶九十六宋鑄于諸路銅冶百三十六國初令天下藩司設寳錢局文皇帝遣官于江浙閩廣鑄錢宣徳間始罷信饒銅塲則亦非止滇南一路也若盡籍天下銅山倣漢唐宋故事隨山掘銅設置鼓鑄則天下之銅盡為國計故銅之利不可不開也善乎孔顗之言曰民之盜鑄嚴法不能禁者縁上惜銅愛工也或曰鑄錢利國先以耗國錢成之利不以償工其識末矣王者以四海為家費百萬以鑄百萬則二百萬費千萬以鑄千萬則二千萬一生二二生四四生八生生不已鑄鑄無窮何契契乎銖兩之較也苐顗之説容有未盡者不惜銅似矣不擇銅而定其衡則雜不愛工似矣不擇工而峻其防則疏銅者錢之質也蒼則蒼黄則黄而誰能違之輕重者錢之衡也四銖則太輕六銖則太重而誰能準之工者錢之範而弊之藪也模不模範不範而誰能覈之故惟不雜以錫鐶之銅以虧其肉好而獨流五銖之制以一其品目擇二局之良者分布天下以為之工師而髙其垣圉嚴其防檢以稽其私挾故曰錢之制貴精也夫錢泉也流于下而壅于上行于賤而塞于貴即日肆諸人于市無以為也今自折俸募役外朝廷不入賞賚不予是自賤之也自賤之而欲人貴之其勢焉得志曰天用莫如龍地用莫如馬人用莫如龜此言用錢之涂不可狹也漢隆慮主以錢千萬為其子贖死今鍰金獨不可入乎漢律人出一算算百二十錢今民賦獨不可入乎漢募豪民入粟縣官而内錢于都内今開納獨不可入乎漢館陶主為其子求郎不許賞錢千萬今賞齎貴戚閹尹獨不可予乎漢制降者贍以少府禁錢今各邊互市獨不可予乎夫錢下而不上則其權在市井上而下下而上則其權在朝廷誠用之如循環行之如流水上闢其出之涂若賞賜若俸薪若顧募之類無不以下下闢其入之涂若軍興若榷稅若鍰贖之類無不以上銀用其六錢用其四又何不行之足慮乎故曰錢之涂貴廣也雖然治法治人相為表裏錢法之行原非細故内責之二局外辦之藩司事權不重稽覈未嚴奈之何其卒行之也周公太公管敬仲孫叔敖則宰相主之唐賜爐止世民元吉則親王領之晏琦以侍郎領鑄錢使于江淮杜鎬等以秘閣校理討鑄錢故事于禁苑惟其利溥而用鉅耳今宜略倣古制令兩京領于工部侍郎各省添設督鑄司道嵗終嚴考成之法差竣正舉刺之典薄惡者黜壅塞者黜自㸃汚者黜縱民開山藏器者黜縱民盜鑄者黜又何不行之為慮乎故曰錢之官貴專也夫收銅之權則利不散之委巷固銅之源則商賈無所牟于山澤開銅之利則地不愛寳精錢之制則民鑄不得亂其形廣錢之涂則下不賤錢專錢之官則法必行而民重于犯刑盖雖管賈之餘談而國家之完計何以易此嗟乎海内宗室鷇食者半百官秩薄勢将漁民邊海閭左動至脫巾水旱天行民空懸磬當此之時使公錢之貫山積帑藏則以親親重其禄可也以勸百官加其秩可也以養兵増其直可也以存百姓减其筭可也不食之而人飽不分之而家給弭其亂而經其費釋其怨而救其竭籍民之衆以為强守國之富以為封豈非所謂治天下之本也哉錢榖議萬恭今制天下生民之命者非銀榖二權哉顧銀賤則病商榖賤則病農善養民者必持二權而盈縮之勿使偏勝而後天下安人之言曰年歉則榖貴年豐則榖賤今天下比年往往病年歉矣而榖愈賤人之言曰榖貴則民饑榖賤則民飫今天下比年在在病榖賤矣而民愈饑乃三農終嵗疲婦子斃耕鉏其所獲曽不足以供官府銀帑銖兩之積給閭簷瓶釜旦夕之儲此其故非榖之多也患在銀之少也夫銀少則榖不得不賤售而輸之官賤售則榖益乏榖乏則民養日微民命日蹙而又比年大司農水旱災傷在天下往往見告矣奈之何不年愈歉而榖愈賤榖愈賤而民愈饑也循此安窮制民命者則豈可不為之寒心哉其救弊之䇿莫若多銀夫銀非從天降也地之所産也人之所變化也其䇿在廣銀礦廣錢法夫礦者銀之母也錢者銀之子也計今國家天下常供四百餘萬兩而發邊獨二百萬兩徃年發邊之銀所得者皆吾軍也吾邊之民又轉貿易而歸于腹之民軍民相化邊腹相通而天下之銀故在也自互市之法起而發邊之銀嵗入于敵地者一去而不復還又自風濤之患起而商舶之銀嵗沉于江水者一陷而不復起終嵗計之豈百萬已哉是中國之銀嵗以百萬消鑠也厯代所開之礦銀有限而坐令消鑠不盡不止乃今開礦有厲禁則銀之母索然矣古者慮礦銀不足則為之鑄錢以濟之其意令民大用則以銀小用則以錢是小以濟大之不足也比年通錢百姓欣欣相告矣偶以庸人一二不善流布遂報罷之則銀之子又索然矣是銀為無母無子之婺婦也而又嵗嫁于敵嵗溺于水夫婺婦見存海内者㡬何而上需之益急下輸之益艱奈之何不銀益貴而榖益賤民益貧且饑也故其䇿急在開礦在通錢開礦之䇿有三一曰廣礦地往年浙嘗開處礦矣民競趍之旋復閉之誠懼争也不思萬室之國一人陶則爭十人陶則和百人陶則相忘于無事矣今何不令兩京十三省凢有礦山者盡令所司發之各發各礦則民各趨各礦是萬室而百人陶者也何爭之有二曰嚴礦防今天下邊腹之兵坐而食者奚啻數百萬哉礦利既開即令踐更就近守礦月糧之外仍給礦砂為行糧每日約以出銀五分為率則兵得分外之行糧民得出礦之隂利兩便之計也三曰公礦利礦既盡開不必籠而歸之官也不必厲而禁之民也若蘇浙之織造江饒之燒造有司者治其爭耳兵防者遏其亂耳諸色人等盡許販礦鎔礦母有所禁久之則山礦之利既廣民間之銀愈多上之賦役易以供下之衣食易以饒百姓足君孰與不足其視與民争山澤之利孜孜然歸之内帑需之官庫者所得孰多也通錢之法有三一曰廣錢鑄往年大司農議天下税契官銀留貯本省鑄錢萬厯八九年間鼓鑄成市流通如泉乃浙江錢法以強抵軍糧而塞遂為懲噎廢食江西錢法以嚴禁私販而塞尤為阻流廢源國家大計庸人壊之一至此哉今令甲兩京十三省者成法具在但在速舉無俟旁求二曰濬錢流夫錢流之不大通于天下者非源之不廣也以流之術未通也今錢源在鑄錢局一流而為官庫再流而為大賈三流而為市肆四流而為販夫五流而為小民故官庫納則大賈有所售而欲之矣大賈納則市肆有所售而欲之矣市肆納則販夫有所售而欲之矣販夫納則小民有所售而欲之矣故通錢法者先通流今有司者不責官庫而責大賈不責大賈而責市肆不責市肆而責販夫不責販夫而責小民流之不濬源將安施此所謂舛也今而後宜立錢法考課縣官不能通者則有讓因而生事者削其籍則錢法亡不流矣三曰公錢利夫吴浙之織造江饒之燒造所以萬古流通而亡塞者固以天下用之又四邊用之假令織造不出吴浙之境燒造不出江西之境此兩者坐而廢耳往年萬厯錢法大通各省轉販識者以為大一統氣象在萬厯間矣乃肉食者鄙自私其錢自誇其鑄該省四境委官盤詰甚則背鑄私記令不得透于他省是織造不得出吴浙燒造不得出江饒也奈之何不塞今宜止嚴私鑄之條大開私販之禁彼此流通則萬物一體四海一家豈不蕩蕩大一統哉所條二䇿非迂也盖天下嵗以銀開十萬兩之礦則併其母二之矣又嵗以銀鑄十萬兩之錢又并其子而二之矣是嵗以二十萬兩益天下也而况四海之廣母子相生益不止此十年之後何有紀極而謀國者坐受困盍亟借箸籌之乎又非言利也傳有之因天地自然之利是義之利也王道之上駟也彼令富商大賈亡所牟大利是利之利也伯者之陋軌也今天下民命若懸絲矣唯經國者流涕籌之屯田鹽法議萬恭今國家制用理財之法常賦正供之外利莫大于鹽法屯田弊亦莫大于鹽法屯田弊尤莫大于沿邊之鹽法屯田盖𢎞治以前沿邊二法合而為一嘉靖以後沿邊二法分而為二盖嘗熟厯鴈門諸邊覩二法而流涕長太息久矣𢎞治以前邊外屯田原屬荒沙朝廷視之全不甚惜捐而給邊將養廉者又捐而為軍士之屯種者原未履畝定賦特曰給此不毛之産優邊帥邊卒耳但以種地得石則官之石也得畝則官之畝也邊外人所駐牧帥臣養㢘之地必整隊出邊而耕如總兵則率四千兵以耕叅遊則率三千人以耕守偹則率千人以耕而各邊軍之屯田因藉大衆出邊通力竭作弓馬器械無日不戒遇敵零騎則以屯田之衆而殱之敵衆至則糾屯田之衆而殱之敵大至則糾各屯田衆而闘之而邊商遂籍出邊兵帥耕作之期亦糾邊民偹軍器農器依附以耕屯田之所不及恣其耕作官不問之而夏秋所獲兵師得之以養生邊商得之以種鹽以故千里莽蒼之塲盡成禾黍萬衆夏秋之入盡為糧餉官富商裕士飽馬騰遂使石粟止直一錢即可種鹽二引買窩賣窩禁之不止上粟易引拒之益至時則有六便焉邊將富足號召羆虎一便兵有餘粟無待月糧二便以邊之食養邊之軍三便户部絶無發銀之勞止操鹽引之柄四便軍士鹽商出邊耕作屯可為農陣可為戰即耕作為操練即力穯為防邊五便商以荒地之粟遂獲鹽引之利養軍之餉不可勝食支鹽之益不可勝用六便此不可募民而塞下自充寔不必發銀而邊卒自富强祖宗御敵之法度越前代萬萬者此也正嘉之際戴御史者忿邊商以賤粟而得貴引遂定輸銀之制若曰天下鹽引可坐而得銀百萬大司農豈不坐得嵗百萬稱富哉奈何以惠奸商粟一石得鹽二引此二引者在户部可得一兩之利在奸商不過二錢之費徒滋買窩賣窩之擾以故大司農銀益盈而邊将士之粟日縮而命愈蹙粟日益貴甚至發邊之銀一兩止易粟數斗何者養亷屯田之利廢而大司農嵗發邊餉二百萬曽不足易百萬之粟而僅足以養十萬之兵朝廷雖有發邊之恵邊衆殊無養生之資也寒心矣不可言矣而往年屯田御史不知邊外屯田與腹裡屯田不同徒查出荒沙為寔田加報虚科為子粒今日清邊帥養亷之畝眀日給邊軍占種之田而造冊報命以為功不知養亷清矣孰與耕之占種出矣孰敢領之何者邊帥不勒衆出邊耕作邊卒獨驅牛負耒出邊則零敵肉耳此二法分而二之之弊也今宜破拘攣之見祛近日之害斷自萬厯十五年大司農恢復二法于屯田仍廣養亷之土開占種之禁如係邊外漠地許令邊帥恣意開墾驅卒出耕亡有禁令永不起科則永不征子粒于鹽法盡復上粟買引之制嚴邊商納銀之禁逓减戸部發邊之例邊卒商人合為一家屯田鹽法通為一體如此而戸部仍苦發邊邊卒仍苦乏食鹽商仍苦貴引是𢎞治以前之利當革而嘉靖以後之弊當因矣而其㡬在大司農替一年百萬之鹽銀發邊而後可何則盖一年救弊二年興利邊商邊卒出邊耕作必一年而後脩此朝廷之入即損一年百萬之費而可以利邊卒利邊商足邊脩建萬世之長䇿何利不為而坐受困獨奈何不寒心哉此邊說也故邊人有言曰論鹽法于𢎞治以前唯恐其買窩論鹽法于嘉靖以後惟恐其不買窩論屯田于腹裏唯恐其占種論屯田于沿邊唯恐其不占種誠有所激而振長䇿善二法者也司計者試流涕借箸焉鹽法論錢薇鹽曷為法也藉足國也鹽曷為足國也國耗在邊而邊之陸輓甚難故假鹽之利以召商藉商之力以儲粟積商之粟以寔邊邊可足也然商猶昔也鹽猶昔也而邊每患不足者何是法之弊也法曷弊也其始也起于司農之變法其既也壊于權勢之爭利其卒也加以餘鹽之大行夫鹽之有法國初所定酌議既審公私兩利厯世遵之不改者也故商或齎粟赴各邊輸納或自墾邉土以積粟此鹽之為利而邊所由無乏也𢎞治中有淮人長司農部商多其鄉人親故因奏更舊法苐令輸銀于京分送各邊自糴折銀較舊為増得引比粟甚易于是一遇凶嵗邊粟如珠矣既而劉瑾并革送銀邊人更無糴本遂多餒死此商賈不通之始也正徳時勲戚椒房之家倚勢擅利而商之無力者中納不行乃羣附勢家賣其引冒其名勢家分其利而商之得微矣間有一二得中納者取鹽于各塲勢家先取足而無力者坐視此商賈不通之再也而操柄者乂隨時規利恐商人夾帶羡鹽利歸其手建議公賣餘鹽徴其價值每引或至百餘斤餘鹽盛行而正鹽反壅此商賈不通之又再也況今各邊屯種之政廢而粟粒芻束之運艱度支空缺之用多而誅求取盈之令下勢家且為斂迹而商賈益病矣為今之計苐使鹽引仍徴粟即商騖邊商騖邊而田之墾闢必多使邊方各屯種則本色贏本色贏而商之中納亦便不待司農出銀以糴而邊自可饒且引弗増而餘鹽祇支正額則商之買易利而正鹽自通又司農酌權宜變通之術令各塲照民間田稅例便其生理盖民田或本色或折色苐取其原定之額羨粟任其所用莫之禁也惟塲竈既取嵗徴之價又禁其通販故鹽之行愈難遂至千百為徒駕船執械突出拒捕屢見告矣非惟不為公家之利抑且貽地方之害釀為禍萌莫甚于此今為兩利孰若使見丁徴銀隨地辦課照之民賦而羨鹽任其他貿則戸與商俱得上不廢官之取下不壅民之資乃人情之至便而公法所宜寛也夫鹽一也中引不以粟以銀則邊無藏粟而邊地病煎戸徴其課禁其貿則徒有逞奸而内地亦病國家利藪化為弊區其惟復收粟之故制則不勸之耕而以商積粟邊無虞匱矣通自貿之一途則各利其利公無乏課竈無匿奸矣今也綱紀不張而法網太宻以囊金易引無苦逺耕且下戸肩挑尚恐白敓此其利害粲若指掌故得縷指而竊較之屯鹽屠中孚夫屯政之立也使邊士各縁南畝而自食其力軍不煩餉而邊塞已寔且又紓東南轉輸之苦盖亦姬公寓兵于農漢之金城伊吾晉之襄陽唐之府兵營田意也髙皇帝允蘇琦請一言當㫖分屯九邊計慮豈不周哉遡其法之所為便而綜其敝之所由来則喜事紛更之過也當軸者蒿目于兵農兩困慨然欲借前籌而無由矣以國初考之大都一軍給田五十畝就其中賦正糧十二石屯倉以俟秋杪取給又賦餘糧十二石充官衛俸且併給城操至洪熙元年减徴餘糧六石則稍稱便矣正統二年有詔即各屯正糧悉令屯軍收以自贍無事收倉支給則又稱便矣而屯之為賦由此定焉髙皇帝眀見萬里猶慮若寒迫邊且耕且守為力殊艱也召商人于邊寔粟種鹽以維屯政之窮每商官且給引赴鹽所領鹽轉貨在永樂初一引得粟二斗五升原鮮利饒商爭趨之各商自為召募墾土督耕商以鹽集屯以商集屯軍商賈更為保障更為守望肆力耕穫諸邊軍餉就中取足民無灌輸軍有宿飽豈不甚善哉一壊于抽屯軍以捕外伍而揷種者㡬虛無人再壊于抽屯田以養官亷而官據其肥軍當磽瘠繼又壊于勲臣戚畹半入莊田而半為縂叅幕府所剖割夫軍有束手而却走耳即欲耕也而安從得田即欲民也而安從得食議者欲徙富民家西北則烹鮮之擾欲給牛種資召募則東野之販欲免征科誘力業則狙公之詐無已則有召商田邊可佐緩急而大司農葉琪往與廣陵賈媾不惟始末頓議改折商不入粟而入金矣金不之塞而之鹽司矣夫風塵沙漠商豈樂趨哉且也主上又無所事粟一時耕塞下者皆釋耒耜而東西適故所墾闢盡為榛莽粟日益貴而餉日益詘盖故額之不可復非旦暮矣計遼東初屯稱最饒糧以七十萬石計今存者僅二十七萬甘肅次之則六十萬今存者僅二十三萬大同又次之則五十一萬今存者僅三十一萬宣府二十五萬石今苐得十三萬寧夏十八萬石今苐得十四萬九千薊州千一萬石今第得五萬最下則延綏初不過六萬止耳今現存亦不過五萬山西無可考計國初亦不下十萬今僅僅二萬八千有竒視故額均損矣余甚慨焉嗟嗟不議復鹽政而徒清屯田吾未見屯之果足為利否也故志其始末以俟掌計者採焉屯田郭造卿趙充國條屯田便宜是之者皆頓首服南粤葉公舉孝亷孝亷上書其言軍政余服之盖以國家戸口登籍者六千五十四萬以二十之一為軍三百一十餘萬以四百九十一衛三百一十一所居之守城者三屯田者七且因地異宜又有二八一九四六中半之法為田八十九萬九千餘頃時官民田八百四十九萬餘以屯田麗軍人得二十九畝而以戸口麗田比軍之所耕者半耳是軍盡力南畝而民不逮之也軍嵗糧食三千七百二十二萬餘石屯田二十畝除正糧而納餘糧六石通得餘粮二千七百萬軍之食自給之供于民者無㡬故雖興師數十萬而不見其為難今日軍存者四之一粮存者七之一以七一之粮而食四一之軍必不能給是以悉取諸民有急軍坐食環視而不能戰復驅民兵代之死此民之所以重困也宜復兵食之舊有田則不患無兵有兵則不患無食有兵食則不患無用嗟夫言亦熟悉矣彼索餉者輒及乎其地是萬金之子負郭田萬餘頃苦窳不治而競錐刀為竒勝富家且不可其如富國何今之屯田雖多失亡而以給軍軍耗亦甚盖盈縮之故畧相當也比年取其所折充餉又有議令軍自取止豪右之兑免徴收之弊而除坐給之民粮充餉亦區區富國之術要之當自覈田始請畧道之上不挂乎陳說下不引乎吻口庶執事觀擇焉天下屯田因勢異宜西北多瘠而占者少軍之失賦其弊在地東南少瘠而占者多軍之失賦其弊在人是以西北多害而東南少利也閩利多害少稍饒而佃之者衆矣乃官賦不充而軍丁且困非有隂奪其田而陽負其賦者乎田奪則軍受疲賦負則官失利其弊非一而此其最者焉是故一衛之中屯異一屯之中畝異饒者奪瘠者荒則奪者多浸沒而荒者多流亡田安得不紊賦安得不闕也且軍不離衛而田隔他郡者有之始而謀其佃久而易其田又久而還其賦即能理于有司尤為里胥所困田多失舊而賦自不復矣督屯行部豈能徧及于田野而必委司屯之官其田既有力者所主官職卑而難與抗民田雜而難與辦甚至以近衛者屬衛近縣者屬縣可矣然縣多視之若贅旒衛多需之為竒貨不親亷問則田半失畝不相統攝則賦必漏額也況乎佃而非軍納賦未甞以輸公軍而不佃受賦而且以營私至于追徴則軍甘受其刑佃坐享其利而賦安得不受其削乎其變而通之因革于其間既不枉于國法又不拂乎輿情軍自佃而賦固不煩于有司所占田者其田必良也既不敢自承于公而必借名于軍則當籍其軍之名而又籍其佃之名昔私代其賦者今直入于官焉某也田為某佃而稽賦若干某也佃某之田而納賦若干軍屬于衛賦責于縣則人無私避之奸國有公取之利田之良者未有失賦者也其有荒屯明其疆畔官著為令而使之墾今夫民田日墾軍田日荒以民為世業貿易可隨籍而轉占奪于軍者安能久假而不歸哉故惟不限軍民但願墾者聴之或軍聞于官欲與某而佃或民聞于官欲佃某之田将見稍有可墾無不願效之矣盖良田雖為豪右所佃其私相授受未嘗無數金之費苐以此費而墾之耳軍既以荒而賠賦則墾而代之者自當受其利若既以之為世業而軍安可復奪其田故欲佃則償之如是則墾者衆自無不輸之賦計度閩屯五千三百八十一頃三十一畝雖毎屯受畝不同槩以二頃七人耕之合二人之入以食一人可食二萬七千餘閩軍舊額四萬八千餘固可食之過半矣況行都司所屬者寡沿海為都司所屬其田三千七百四十四頃司食一萬九千八百餘三分有二以自給其餘粮尚可募兵六千六百餘人水寨萬軍亦可食之過半矣不然亦什之三奈何聴其失亡哉鹽法私議沈槩榷鹽之議昔人道之詳矣義之可否姑置弗論以利言之極天所生窮地所産皆國家之利也利之大者莫踰菽粟轉移糶糴罔有厲禁而國用自舒惟鹽則禁之者祗謂鹽之為利其出有方取用甚速不設禁利弗專歸于上耳然未悉其患害則有不可勝言者夫利之所在人必趨之趨之而禁勢若壅水其潰焉不可遏也故禁之愈嚴而趨之愈力巡徼官兵多係顧役無頼適與私販者潜相交通彼此習于戈㦸蹙之則叛矣異日東南之禍必自鹽始往轍可鑒言之寒心矧鹽之在榷也煎釀者有停滯之耗支貿者興候伺之嗟規利者藏夾帶之計監臨者多批驗之勞巡捕顧役者有増直賠鹽之苦弊孔百出催督交加濵海之役瘡痏日甚矣夫煮海為鹽國課所倚跡此推之則夫今之所謂大利者害之媒蘖也伏險無形可不懼哉愚以私臆籌之與其爭利賈害孰若因其利而順導之試將鹽課收支較以累年中數某塲應徴㡬何每丁應辦㡬何于凢𨽻籍濵竈者聽其儘力煎釀任其與人貿易而但輸鹽價于官使得轉輸贍國分區設限以時收支畧如民産徴輸之法而不復設禁夫如是則上不失其常利下不至于犯禁鹽官可省法網可疎戈㦸可消目前諸弊當不革而去矣利孰加焉不然竊恐沿海之民日漸窮蹙而私鹽益熾以習武之民鼓愁怨之心積薪之禍未可量也或謂國朝鹽禁為邊壤兵荒而設肥商于竈以奔走趨利之人用拯急難而代民飛輓其制不可廢也然不謂邊餉所須在芻與粟鹽商所入不過買之近地非逺輓于東南也若以鹽價輸邊獨不可委人收糴乎夫人心所嗜者利所重者信耳茍或變生倉卒常課未充則但資人以利而以信持之誰不樂從者乎抑聞曽有大臣身齎帑銀收糴邊境而無一人應命者此必由于設法未便而勢家利于中引者隂為沮撓況或處糴乖方更令日淺故未覩其成功耳未可懲羮而吹虀也然則轉輸涉逺費安從出曰鹽引賤給貴支利歸商耳如今之議但以額辦之鹽稍平其價而懲之則課不加多而費可贍矣兩便之䇿當不踰是不必法禁紛紛人得倚鹽為姦而乃按為定制也況夫兵荒靡常有僃無患僃之弗豫而徒欲扼民之利區區仰給于鹽商事亦末矣更法時議大㫖相符而先獲我心者胡端敏公奏疏存焉尚兾憂國者熟圖之以裁其可否明文海巻七十八
