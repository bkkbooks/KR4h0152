body:
  text: 眀文海卷七十九餘姚黃宗羲編議六治河理漕雜議黃綰豫嘗陳理漕洽河之䇿聖眀已俞而行之既而二三公各以意見求勝當事者觀勢為趨向遂止不行至今五六年間漕河日塞黃河益患夫漕河之塞已甚但黃河源流盛大一時不見淤塞之迹人皆玩之以為無事殊不知彭城皆山吕梁三洪實皆山峽形勢易阻兼之黃河多泥為塞尤甚日塞日髙一旦黃流不流則漕河自清河口至濟寧幾千餘里皆為平陸當此之時將為開濬則為費無紀民力實有不堪將欲坐視國賦命脈繫于漕舟一嵗不至京師告急為今計之將何卒善夫物必有本害必有端今但知黃河為患而不知其所以患漕河為利而不知其所以利雖有神禹亦無如之何且黃河為患不甚于三代之前而甚于秦漢之後何哉蓋三代行井田之制井田之間必有溝洫溝洫之水必引源泉以足之故涇渭漆沮伊洛瀍澗衡漳恆衛澧汭榮桓汾瀋皆分于雍豫梁冀平野溝洫之間則水之入河者少水小則河勢自弱故黃河衝決之患不在三代之前自商鞅開阡陌李悝盡地力井田既廢則溝洫俱廢故涇渭伊洛諸水皆歸于河水之入河者衆水衆則河勢自盛故黃河衝決之患特甚于秦漢之後況自秦漢已來通渠開漕皆在河南髙原之上以致黃河不復由河間地中之故道遂失禹迹潤下之性猶以盤盂盛水置諸几案几案略搖則水溢堂陛乃其所也然又不求其故惟築堤防以捍之是故堤防稍決則瞬息之頃數千里之內室廬漂蕩黔黎皆為魚鱉且堤坊之費嵗無休息生靈墊溺百年凡幾自秦漢迄今為害可勝言哉今欲息數千年之巨患以成當今之急務因地勢髙下之可見溝渠陂沼舊迹之或存即其源泉略加疏引堤防之工使之各歸其處則黃河之勢自弱然後導之北流復禹舊迹使行地中以順其性則衝決之患自銷生民之害可除且今天下之土北方肥厚實過江南惟水失瀦蓄土皆枯燥故生植稀疏反有不及昔唐虞三代之時江南諸路皆未入版圖軍國常賦之需稻梁重穋之産皆北方自足若使水利復興則生植必多財賦之充又奚假于江南哉且今北方盜賊縱橫亦由無水之故使溝洫足以限隔則驅逐不難一舉而數利並興亦何憚而不為也人皆未之思耳今日漕河源出山東山東之水已足漕用但失瀦蓄之方故潦則漂蕩以傷農旱則枯涸以病漕何哉蓋巨野為東國之浸乃沇濟鍾聚之區亦山東諸泉瀦蓄之所今之漕河因元之舊置諸濟寧髙原之上南北分下常如髙屋建瓴只賴諸閘節縮僅足浮舟設或一旦少有風塵諸閘不守則漕河已絶為慮可勝言哉今欲為國家經久無窮之計及舒目前漕河淤塞之急惟有蓄水一䇿庶幾為力易成緩急足濟且南旺昭陽安山諸湖皆居漕河之上舊稱水匱今隄防俱廢或開濬非宜反為黃河所塞積水甚少寧陽為諸泉出沒之所實漕河之源今不為之陂障瀦蓄但以其流導歸一溝至于分水入于漕河南北奔流日夕不息故溝水僅見一線陂障常憂枯竭失今不圖一日漕河盡塞雖加畚鍤億萬金粟山委將何措手而可以飛舟京師莫若及今預將南旺昭陽安山諸湖隄防修築完固及擇寧陽至漕河之間可為陂障之所髙為隄防使山東諸泉之水盡歸于湖乃于湖隄築閘泄其餘水入于分水溝中俾入漕河則陂障常溢而漕河不憂其竭矣又求巨野舊迹究其當時積水之故必有隄防之所因其舊迹為之疏築遷其居民使居原野之上則巨野可復或又憂其不足則西南諸泉亦可導入因其涵浸之盛分流南北測其地形髙下略為閘座為之節縮以為漕河經久之計此實國家萬年之福不但足救淤塞而已又可以省每嵗閘座隄防夫役之費則諸州民力之舒亦有不可勝言者矣漕河議萬恭夫唐虞不言漕三代不苦漕蓋天子諸侯分土而治天子以王畿養諸侯以國中養則亦分土而食而諸侯特修貢以眀臣節而已焉用漕即禹疏九河特以去中國之害而非以資漕運之利也且唐虞有夏皆都冀州商都河南周都關中即諸侯之貢唐虞夏商自黃河而至周自渭河而至舟楫之制特以修王會之利而非以避漕運之害也又焉用漕蓋秦有事于泰山碣石則雲帆滄海而海運始興唐有事于河朔汴洛則粳稻東吳而河運始利若宋人都汴則江湖之粟自江入淮吳浙之粟自浙入淮而皆會于河以直達于汴京師仰給東南而餉道甚便漕未苦也元人都燕則始以河運顧黃河衛河不貫通也中飛挽數百里曰陸運繼之海運又繼之會通河之運又繼以賈魯河之運然陸運費海運險河運阻漕甚苦也而元始困以斃矣天祐國家洪武初都金陵江南之粟萬艘集于龍江是建瓴之便也永樂初都金臺江南之粟千艘浮于東海苦漂流之患也永樂九年宋禮始治會通河壩戴村逆汶水之患而西注于南旺以其七分合衛河北流入于天津之海以其三分合黃河南流入于安東之海而北道大利矣偉哉宋康惠之績乎其北道萬世之計乎永樂十年陳瑄大治淮揚漕堤髙寶修范蠡之業導天盱之流而東注于太湖以其五閘北流淮安而注之河以其三閘南流儀真而注之江而南道大利矣偉哉陳忠襄之績乎其南道萬世之計乎顧南道二百年無恙也唯北道河漕閘漕不通條貫耳夫春夏之交黃河安流而閘漕告涸是春夏之交運則利于河不利于閘也夏秋之交閘漕通流而黃河大溢是夏秋之交運則利于閘不利于河也隆慶中天子特允萬司馬建早運之䇿創瓜洲之閘江南七千艘俱以二月過淮三月過洪遂閘天妃以便入河之捷徑又塞草灣以束雲梯之專流而南道始利又灘坎河以助開河之涸泉又改九月大挑南旺便來夏之運舟又加濬泰山五百泉以廣旺之協濟乘春夏之交發湖山之藏而北道始利建千萬世之長䇿變二百年之舊圖因風之南北而為運期乘閘河之未凍而南還蓋祖宗以來漕運于隆慶萬厯之交獨盛矣是國家獲黃河之利無黃河之害小有淤決苐疏之塞之令不敗運不大傷農足矣則黃河何負于國哉好事者顧欲從海運而棄黃河此丘文莊之議也夫文莊但計漂溺之米而不計漂溺之人嗟乎傷人乎不問馬仁人之言也曽是而海道可行乎開泇河此翁中丞之議也夫赤獨蟃蛤諸湖之巨浸不可堤而良城侯灣之頑石不可開嗟乎損有限之民財填無窮之巨壑仁人之言也曽是而泇河可通乎鑿膠河而棄閘河此劉司空之議也夫海潮之淖沙日濬日淤而百里之石骨愈鑿愈堅嗟乎竭民事河無故料民智者之言也曽是而膠河可通乎夫黃河非可棄之水也萬一泇河可通黃河終不可不治也閘河非可棄之路也萬一膠河可通閘河終不可不治也國家財利幾何每年事黃河又事閘河又事膠河又事泇河夫一長城之役足以斃秦一賈魯之役足以踣元乃今四役並興上下疲命胡不引秦元之事觀之也宋臣有言天下未有有利而無害者唯擇其利多而害少者為之夫利多而害少者祖宗之河運是也有大害而無微利者海運膠河泇河分河之議是也司國者其取𠂻焉治漕河議何洛文邇者河決徐沛淤塞漕河百數十里運道告阻特命大臣往督理其事愚謂今國家財賦悉仰給東南而一資之于河運是漕運者誠咽喉之地不可使一日不通者也然使漕運不假于黃河則亦易防其塞而今運道之塞者實河流致之也故今之計其急務在開運道而其本源在治河自永樂九年宋尚書禮開復會通河故道引汶水使出南旺四分南流以接徐沛六分北流以達臨清徐沛以上汶水小恆患于乾涸徐沛以下河水大恆患于壅淤方河水之平也則由溜溝小浮橋諸處接濟漕河以下達于儀真及河水之決也則其害亦殷于接濟之處故今西水漲漫徑沖魯村閻村沽頭金溝口以及境山茶城諸處及水去沙存而徐沛之運道遂淤此當急挑濬以通運舟者也然溜溝以上河水不及其為刀也易溜溝以下河水尚泛其為力也難此在相其淺深緩急以施之耳挑濬之後更訪先年房村故事築為長堤以捍水勢漕河之可為者如是而已若夫河水不能更保其不決則運道不能更保其不淤此可不深求其故而為一勞永逸之計乎夫以數千里之黃河加夏秋之霖潦建瓴而下乃僅以開封蘭陽以南之渦與徐沛百數里之堤拘而委之于海其不至于橫流潰決者實萬一之幸也故自古言治河者曰分則勢小合則勢大又曰不與水爭地昔大禹治水之後無河患者數百年以大伾而下釃為二渠至于大陸播為九河入于渤海蓋河流分而其勢自平也自宋以後漸決而東南以入于淮然因決而分亦得以殺其勢故河自經汴以來南分者二道焉東南分者一道焉東分者新舊五道焉況元人雖排河入淮東北入海故道亦久已湮廢是所謂合則勢大而河身又狹不能納不得不泛濫橫溢是以豐沛徐州之間漫為巨浸不特漕渠壅塞而桑麻菽粟之場悉為波浪魚鱉之窟矣可勝嘆哉為今之計有二䇿焉疏其枝流開其故道而已蓋欲得上流之不決必先使下流之疏通國家誠不惜棄地動民命深達大計之臣沿河流相地勢于其下流迤東之地擇其便利淤下之處條為數河以分水勢又于所條支河之旁地堪種藝者依江南法創為墟田多作水門引水以資灌溉分疏之後水勢自然消減此一䇿也又古之黃河自孟津至懷慶東江入海今衛河自衛輝東北至天津入海猶黃河也而沁水自經荆口分流一道六十里通衛河近年始塞是河因沁可以通衛也況今河流舊身多有存者誠相其形便引水注于衛河使南北分流則其勢益平使漕河永無淤塞之患此又一䇿也或曰多開枝河是無故捐數百里膏腴之地其間懷民廬舍田園墳墓不止一處將如之何殊不知自開封南至鳳陽每嵗河水淹沒中原膏腴之田何止數十萬頃今縱于迤東之地開為數河所費近海斥鹵之地不過數萬頃而已利害果孰為多哉或又曰河決東南有山限隔禍猶小也決而東北平原廣野無所障隔浸灌之虞可不慮乎夫若使水力專於東北誠有可慮者今不過旁出支分以復故道當不至于洶湧泛濫且漕河上流之涸又可賴是以濟未為失計也蓋黃河治則漕河亦治黃河不治則隨修隨壞而迄無成功故為萬世計不顧一時為天下計不拘一方為萬民計不恤一人陸贄所謂小損以致大益暫薄以成永厚者也司國計者其長計熟慮之哉河議黃永玄為水患方殷羣形貴審謹酌淮黃最便事宜以圖萬全以利久逺事伏覩鳳泗祖陵乃國家萬億斯年凝命發祥之地神祗效靈山河永奠者也奈何邇年以來黃淮夾湧湯沐淪胥波及陵寢皇上因臺臣之奏赫然震怒特簡科臣行視薄海內外見者聞者莫不震驚職官守介于鄰封衣袽同于職內竊自徐沛以南鳳泗以東淮揚以北究水災所起之因及漕渠掣肘之弊私心竊計以為今日之計與其見事于殺淮則不若先事于分黃與其分黃于既合淮之下則不若分黃于未合淮之上與其暫分而使之復合則不若永分而聽其自去與其僅分其支流則又不若全分大河而使之各入于海至論分黃于未合之地則又不必就其逺且難者而當就其近且易者庶幾內不病陵外不病漕而中不病役何也方今咎淮之壅者曰清口之淤也由髙堰之築然非其所以壅也其所以壅則黃也蓋惟黃之壅淮而不能時泄則清口不得不淤恐黃之躡淮而闖入髙寶則髙堰不得不築淮既上束于髙堰下扼于清口而退瀦于旴泗之間則二陵受災又安得不劇也故黃水未分則所以壅淮者猶在髙堰其可遽卸乎清口其可遽闢乎周橋雖開其遂能有濟乎惟黃流既分而淮無齟齬則此三役者然後可次第舉行以理淮未盡之壅闢此先殺淮不若先分黃也然分黃于合淮之後則二瀆相持逆壅之勢如故雖少有所殺而終無救于清口之淤況分之小則新行之水力微而所分之道淤分之大則正河之水微而故道亦淤即自數年以來王鮑諸口何嘗不留以泄伏秋暴之水而卒無減于泗上之逰波也此分在下者不若分在上也又黃既分則中流必斷斷而逺則其開濬難而通漕亦難斷而近則其開濬易而通漕亦易故分在逺者又不若分在近也且今海口已墊矣下流已壅矣黃與淮有不會會必淤矣脫也上分之而下復合之則數十里之間所去幾何殺于上者能保其不淤于下乎移腓股之疾而為脛踵之瘍吾不知其可也此暫分必不若永分之利也至支河之分議以減會淮之半若曰是可殺黃爾尚欲持其強半以為漕利也不知黃河勢不兩行支通則幹淤幹通則支淤湍泳永旱叵測之洪流能必其就我約束半為我用而半不為我厲乎竊以為正河可奪新渠穿而嵗漕不患其難達此支分又不若全分之便也今欲分全黃于未合淮之上而擇其地之近且易者則崔鎮舊決口在桃源之下固已甚逺即近議黃家嘴分河入海之地誠已得之但尚在三千里之外猶恐去淮尚逺他日斷流難濬漕役俱淹或當别就近處如向所議開腰鋪之地清黃尚未交接距淮近止十里計無便于此者獨向所議者欲分之于腰鋪而復合之于草灣我則欲如今議竟導之自漁溝金城由連河灌口以别入于海向所議者欲僅分其三分之一我則欲回全河盡令北注而遂斷其東流然後舉清口以下清淮故道全以讓淮而更闢門限之沙大遂其建瓴之勢則全淮水力自盛清水自能刷沙不過旬日之間清口之空洞可幾鳳泗之洪濤立殺矣此陵便也黃與淮既分則自清口上至腰鋪十里之間河流乍斷則當從舊河河身之中穿一漕渠還平江之舊以通餉道或遂臨黃口創兩石閘謹鑰啓閉以却泥沙不過浹旬之間淮揚徐沛之帆檣仍還舊觀矣此漕便也陵便矣漕便矣至疏導下流經營海口之役亦非甚難但當前期詳議爾私計之自腰鋪至海口約百八十里而遙其間經行之地淤而淺澀者什之一假道于諸湖者什之三舊決新衝卑窪衍隰之地什之六其在淺澀則宜濬之稍深俾水足以由可也其在卑衍之場諸湖之畔則宜寬設隄岸稍加約攔俾水足以檢可也至海口則又宜就其徑而寬者闢為經流就其迂而狹者條為支𣲖俾水足以滔滔大去可也大約隄繇之費什居其四濬瀹之費什居其六總之多不出向所議腰鋪支河之費而可令全黃北徙獨淮東下祖陵既登于爽塏運道復置于安瀾其措施最捷其垂利甚逺豈不一舉而收萬全之效暫勞而獲永逸之休乎職故以為最便之䇿無踰于此者雖然此其梗概大都爾中間節目條貫之繁施為緩急之次甲乙異同之見期會調度之宜一時議中未及詳盡者復為逐一設難解酬欵具如左是雖不敢望禆諶謀野之獲亦或禦災捍患之一籌爾難曰方今陵患燃眉聖天子宵衣南顧覬泄此而朝食也故議者務導淮幾效旦夕倘舍淮而務黃則需時曠日其何救于近災酬曰淮非不可導也苐導于黃流既分之後無論尋丈即尺寸皆足為淮利若導于黃流未分之前無論尺寸即尋丈不足為淮損故欲導淮自必當以分黃為首務焉何也黃與淮消長無定時而強弱有定數方黃之發也其勢居淮之十雖以全淮敵之而不足洎淮之發也其勢居黃之三即以弱黃障之而有餘惟至冬春水涸黃落歸槽而後清口以內瀦蓄之淮流乃稍稍乘黃東下然所泄者特伏秋以來新漲之浮波爾浮波雖去其舊水向相平停者仍不得出也他日秋水時至強黃灌淮其騰湧洋溢之狀將復如故矣自來議者徒睹夫黃水消落之時因謂淮有可泄之勢而遂議闢清口議開周橋甚則議撤髙堰猥曰是可以盡宣鳳泗久積之閼可以亟收祖陵旦夕之效矣不知禍生有基議先探本泗水之積非積于水落順下之時乘隘而不得出也乃積于水發相持之際中停而不得下也今欲祛積水則當祛其壅之者爾矣祛其壅之者則有分黃爾矣倘不先分黃而汲汲為泄淮之計無論髙寶上下湖腹之易飽也尾閭之難達也漕堤之崩囓而下邑之潢池也即令泗水盡消陵麓盡露若可僥幸于目前之安者然能保來嵗之黃流不復發乎能保其發而不復為淮壅乎又能保其壅而吾别有以制之乎夫黃不能無發發不能無壅壅而必無術以制之也則吾恐減之尺寸者必且益之尋丈矣消之旬月者必且復之旦夕矣被毒淮揚而無救于鳳泗虛糜巨萬而無益于絲毫夫然後返而求為分黃之計則亦噬臍無及已難曰黃之合淮自宋熙寧間始迄今五百餘年向未聞為淮壅也壅淮自今日始將執事者其有遺慮乎何獨諉罪于黃也且嵗漕四百萬石灌輸京師又因所為利子大夫其何輕議焉酬曰然誠有利如子説者顧均之合淮而正派與支派異也上流與下流乂異也此今昔之利害所由懸絶也何也按淮與黃初皆獨入于海故稱瀆焉自隋大業間引河由汴泗達淮周顯德間濬汴口導河達淮皆上流也宋興國間河由彭城入淮熙寧間由南清河入淮則支派爾金元季由渦河入淮亦上流也國初河決原武由夀州正陽鎮全入于淮則正派又上流矣嗣後或由孫家渡或由趙皮塞皆從陳潁亳夀懷逺等處入淮皆上流正派其由小浮橋經徐邳自清河縣北合淮者此雖下流亦支派爾至嘉靖中年塞渦河口截野雞岡則正派皆歸孫繼口厯徐邳桃清入淮而涓滴不及于上流矣已而從清河縣南合淮下流且奪淮入海之路矣夫以黃正派合淮上流則淮挾黃而強其勢如懸瀑而下海也易此陳亳潁夀之黃非惟不足以礙淮而適足為淮助也以黃支派合淮下流則黃力分而弱其勢如附枝而下海也亦易此清河縣北之黃雖非有助于淮而亦不足為淮礙也以黃全派合淮下流則勢如交衢如對壘而清不敵黃主不勝客其下海也實難此清河縣南之黃非惟無助于淮而適足以為淮礙矣況隆慶末年黃決崔鎮而北淮決髙堰而南清口填淤海口幾成平陸後雖兩河築合運道復通而海口河身十不能恢復其三四故下流日滯日壅日深泗陵水患遂至此極也若兩河初決時當事者苐聽黃之自去由崔鎮北入于海而徐闢清口故道逼淮使入雲梯另穿一支渠以接運道斯非上䇿乎乃計不出此而必欲北逼黃南逼淮以幸兩河之合也語云誰生厲階至今為梗良可惜矣今若欲仍導黃從潁夀會淮于上流勢既不能亦復不敢即嘉靖末年嘗議穿孫家渡由露西華以入荆山議開趙皮寨由渦河蒙城以達臨淮時亦隨議隨罷有其廢之莫或舉之而坐受其困可乎將淮欲徙而避之得乎故議必分黃北去而令淮自復其故則雖不必復合上流之正派而自可以紓下流輻輳之狂瀾矣説者猥以國家利黃灌輸未可輕議不知黃之實為漕而不為漕利也勢不得避而姑假道焉是明知其為不速之客而姑假以為入幕之賓爾孰知引盜入室養虎貽患始于入幕者卒于操戈乎故我以為漕可别通而分黃最便難曰分黃非難而所以為分黃之地者實難今以數百年東注之黃一旦欲鑿空而改之北去聞者駭焉子大夫將何途之從而致之海也酬曰此正職所欲前期詳議者也蓋凡水盛則欲其有所遊蕩而不迫故腹貴容也凡水平則又欲其循軌而趨故喉貴通也凡水下流則欲其縱而易泄故尾閭貴廣也腹不容則潰喉不通則噎尾閭不廣則懼其驟焉而大漫也故吾今日為分黃之地則欲以河壖海口方二百里捐以豫河上自緣溝下薄海口跨南北兩漣河間中包金傳大諸湖旁引五港大小諸川河所必侵者隨其便宜因髙陴下稍列陂障以為洚洞容納之區又自腰鋪漁溝陳溪金城舊漣河兩淮之間河所必經者宣之滌之或稍左右之約水直趨灌口蓋此口較他口故濶當益濬之以定入海之經流又灌口迄東為莞瀆五丈河口又東為白蜆板浦口乂東為新壩東漣河口諸尾閭可泄者悉為之疏導以定入海之支派庶伏秋泛漲之時黃流湧盛則吾以其經流出以其支派分之而復以陂澤曠衍休息之逮秋迅過期黃水消落則吾苐以其經流出之蓋既不與河爭地致有潰溢之虞乂必由地中行使有歸墟之便所稱前事而為之計者備在斯也再稽禹之治河鑿三門釃二渠播九河不惜數百里地多為之途以達于海誠謂其源逺流長未易頓殺焉爾今縱不能驅黃直北以還九河及碣石之故道亦宜略倣此意講求于可釃可播之間倘亦九河之三四乎難曰分黃之役估費不資以老黃河之八十餘里也而費九十萬以訾家營之四十餘里也而費五十萬即以腰鋪之省約也而費亦三十六萬有竒且亦旋議而旋罷也今自河口以抵下流海口不啻百八十里而遙所費亦當稱是國家財力將安給乎酬曰在兵法水因地而制流兵因敵而制勝蓋天下事因之則易強之實難彼夫攻堅擊瑕拙速巧久或至于師老財匱迄無成功者則未聞因為利也今黃河奔騰萬里而來其勢本自欲北下而吾徒以藉之故強之使東強之使上及數逄其害事不可為則求為老黃河之説焉為訾家營之説焉最後為腰鋪之説焉此其利害難易之間逺近分合之故蓋已權之甚審計之甚詳矣然方避其害而復欲強資其利旋分于上而又欲強合于下總之奪河之所必趨以強就我之縶縛焉爾夫既欲奪河之所必趨則必為墮崇堙卑築垣居水涓滴不容外泄而柵落之費不資夫既欲強就我之縶縛則必為鑿河深川曲防股引尺寸在所不遺而畚鍤之費亦不資詎直不資強之合而不必其遂合也能為合而不能必合之不淤也用不資之費而不必其費之有益也故議者雖建為必然之畫而其心尚懷不必然之慮以致旋議旋罷旋行旋止竟成作舍之謀其故可知也雖然當其時阽危未甚則難于捨已成之津濟而謀未劇之懷襄爾乃今水患已極矣吾所議者又不徒強之而已黃不欲東而欲北吾因之使北黃不欲上而欲下吾因之使下黃不欲迫而欲寬吾因之使寬舊決衝深之處水足以行者則因為利導望海以趨而不必曲為穿鑿也諸湖霪漭之鄉水足以容者則因為陂澤稍加約攔而不必強為厄塞也毛家溝以至腰鋪河口填閼之地水微有澀者則因加疏濬使利通行而不必創為河形也此其方隅逺邇平陂參差不無就淺就深增髙繼長之費然要之上不及老河之估次不及訾營之估下亦不必踰腰鋪三十六萬之數何也強之之功難因之之勢易也昔者伐楚之役李信以二十萬敗而王剪以六十萬勝是二十萬敗衄之費為已多而六十萬勝兵之費為已少故君子曰惜財省費之説非所用于變故不獲已之時識其大矣矧又費之省乎且國家上為祖宗窀竁計下為地方生靈計中為足饋餉便輸將計僅僅數十萬緡夫復何憚哉難曰議者云海口淤沙必藉黃淮并流衝滌若兩河分道水力益微海口不虞更塞乎酬曰不然夫淮初未嘗有沙也其有沙者黃也海口初未嘗塞也致其塞者亦黃也今曰滌沙將借淮以滌之乎抑借黃以滌之乎如借淮以滌沙孰若分黃而使無沙之可滌若借黃以滌沙則吾恐舊沙未除而新沙繼至所滌者有限而所繼者無窮矣即二十年兩河築舍以來何嘗不曰藉其衝滌之力乃今海套日增口沙之積壅如故也此已事之眀鑒也今若分黃使北分淮使東則清口以上黃河自有之沙黃自挾之而北去清口以下故黃淤墊之沙淮亦挾之而東去兩河各得其職而不相姦是一快也海口客沙止有此數而黃不得援之則沙易窮以有限失援之沙而刷以長淮之力則沙尤易窮是二快也淮會泗沂東入于海自禹時已然初非有藉于黃也今挈數千百年之故道而還之于淮清日來而濁日去主日勝而客日消是三快也夫沙日消則流日駛流益駛則沙益行縱淮入海之勢將十倍于今矣又向以兩河而共一淮之經瀆則其勢常壅其水不得急下今以一淮而縱兩河之故道則其勢必迅其水必無滯留倒峽奔澌一㵼千里又且百倍是四快也兩瀆分四快具而尚憂海口之塞乎不待智者而蘧然悟確然信矣難曰即今時已入秋新運伊邇若為分河濬渠之役謂妨運何酬曰然乃獨不聞乎更事者忌于後時應猝者用于宿戒國家萬艘飛挽燕往雁歸在涖漕之臣廪廪循環嵗事尚虞不給即空回未幾而新運又將告急矣此而欲興大役誠見為難然我所謂分河濬渠計非曰斷流停運為浩瀚難竟之功而有妨于國計也又非曰久需時日奪過洪入閘之期而有妨于程限也蓋分黃之役全在下流凡畚鍤之功柵落之具當正河未改舊河未斷之時皆可以先期集事至穿鑿之役大約從黃南至淮北半勾半折逺不能十里廣不及十尋深不過二丈物土計方亦不過以三萬人為一月之役而建閘甃石之務又可鱗集而並為之作者若伺漕之隙而為之其于運乎何妨難曰決黃濬渠嵗漕無恙則吾既得聞其説矣然兩河合襟王氣攸繫形家之言遂不足信與酬曰唯唯否否天子以四海家為家普天之下莫非王土不似諸侯僅有四封以至庶人僅有環堵據形家之言曰千尺為形百尺為勢形勢之地是為福地此其徼籍能幾何者今黃河從幾萬里來淮河從幾千里來是但可以尺寸計哉且當後周顯德間黃與淮尚風馬牛不相及也而世宗望荆塗二山已占知濠州有王者氣迄今五百餘年育秀鍾靈而誕生我聖祖則初何籍于黃淮之合與不合耶乃議者動以合襟之説阻撓大計亦惑甚矣故某以為不若大為分決使黃下于清河之北淮下于清河之南聨絡百里之中相望並趨于大海則本之異也以萬萬里末之同也以萬萬頃豈不全首全尾彼此均稱乎又極西北之水黃河挾之從華嶽而來極西南之水江漢挾之從衡嶽而來暨沁泲從恆嶽而來泗沂從岱嶽而來淮挾中條之水從嵩嶽而來五嶽四瀆之精神若期若赴有同軌畢至之風焉而又大海洪濤環擁于其下洋洋乎浩浩乎斯宇宙間一大走集而慶源福祉孰能測其深且長者此亦神效其靈天祚其盛彼淺夫小術烏足語此難曰果如子大夫之計分黃讓淮泗水不足平矣然而周橋可弗開而髙寶以下金灣芒稻涇河廟灣之議將遂可廢乎酬曰此何可廢也苐議者意在泄淮而我則意在泄湖議者専為泗陵而我則兼為民生運道同行異情而先後緩急之序有不可紊者蓋今之有事于髙寶諸湖者曰開金灣逹芒稻而注之江也曰濬涇河子嬰溝等處會廟灣而注之海也此不過為今日周橋地爾以江海為髙寶之害則已爾不知引淮而之湖也恆易導湖而之江海也恆難況兩河之勢粗抵相持進退維谷淮有不得而自便者故我以為議周橋髙寶者不當在今日黃淮未分之時而當在他日黃淮既分之後我之所以為髙寶下流計者則又不但求消泗水未盡之餘瀝而實欲大涸諸湖久蓄之洪流何也初髙寶諸湖原係淮揚二郡民間膏壤其地形西髙而東下自隋大業間鑿渠通道至國朝陳平江又修復之築隄障水遂成漕渠以漸滙為巨浸是髙寶原非湖也隄之為湖也無隄是無湖矣邇年以來黃淮逆壅濁沙內灌湖身因日以髙蓋不啻丈許矣已而湖日墊岸日增汜光白馬之間隄齊樹杪矣今民田仰視水平又不啻丈餘少亦五六尺矣夫以幾千萬頃之洪濤全恃一線之隄以為之屏障下薪揵石勞費無已時而且日有叵測之患甚非計也故謂宜乘黃淮既分之後即當汲仍為髙寶計多方講求設法疏導或從金灣灣頭沙􅄵達芒稻白塔瓜儀以入于江或從涇河子嬰溝淳家灣東達牛灣北達射陽等處以入于海其他建閘改壩穿港瀹口之務一切先期荒度程役奏功于是伺轉漕之隙大放諸湖積水聽其東注勿以涸運為虞苐使湖腹洞然一空即將淮揚一帶河身大加挑濬務在復其老底庶河深岸髙水落地露不惟向來魚鱉之鄉可轉為桑麻之境而隄防鞏固運道安瀾不必更事修葺而所省水衡金錢嵗無算矣況湖腹既虛容納有地而泗淮之暴漲易消洪濤盡落羡溢無虞而下邑之民田可藝祖陵運道民産民生豈不一舉而三利乎職故曰議髙寶于黃淮既分之後則尤其最便者經始泇河議黃承玄為議濬泇河以濟運便民事竊照泇河之議蓋已有年前經翁傅二總河先後具題再遣科臣行視率以工難費巨旋議寢至萬厯二十年舒總河復議開韓莊渠二十餘里以泄吕孟諸湖之水下達泇河蓋雖微引其端而猶未竟其緒也復因黃河南徙運道告艱復經科臣具題勘然亦以費逾百萬工力難施竟成築舍之議近該職親詣韓莊泇口一帶踏勘熟察地形遍觀水勢周咨荒度盡得此河源委前有可因之績後無難竟之功然後乃知人言不足盡憑而百聞不如一見也蓋先議者謂性義葛墟二嶺地勢髙懸沙礓難鑿今原開韓莊新渠業已避髙就下水見通流苐展挑深濬便可行漕且近發徭夫挑濬已十完七八矣議者謂梁城等處地方伏石難以施工今勘自侯家灣至梁城水底伏石僅二百餘丈先年試鑿已去其半今若再去一層而于梁城之下建閘節蓄則水可盈漕自無妨礙又議者謂諸湖聨絡難以築堤不便牽挽今議自黃泥灣之下就湖旁實地開渠直達宿遷而韓莊以上則或從旁開濬或就淺築堤亦絶非難事也又議者謂工程重大非百萬之費不可以成功今據估濬河鑿石建閘築堤一切之費不過二十六萬金若止役徭夫從容從事以三嵗畢工則可省費二十萬兩即其他犒賞料價之費總計亦不過六七萬金耳夫使其工果難其費果巨固不可妄興大役以希難必之功若事有可為費不甚大亦何可坐失事機以廢前人之績故職今日謂此河斷斷可成不宜再計數十年道旁不決之謀若有待于今日也泥此河一成豈直可以預備不虞其他利便有不可殫述者蓋舊河自夏鎮以至宿遷計地四百里而新河自夏鎮至宿遷僅二百五十里此舊河可省兩日之程其便一也舊河借河行運而河性不常去來靡定其去也不免有艱澀之虞其來也不免有漂流之患必不能分河兩行久而無弊也況鎮口上下地形陡峻水不能留故時病淺澀若令新河一衣帶水直達宿遷更無波濤之險其便二也李家口以下地髙水澀議者至欲復留城舊河以水浸堤傾淤泥難濬不果若新河既成湖水自涸即留城舊河亦可修復新河自有薛永泇沂諸湖之水可引灌漕不必全資汶泗其正河強半之水仍可聼入留城舊河出鎮口蓋新河專行重運其貢鮮官民船隻及回空糧船則聼從其便兩河並行其便三也微吕連汪周栁落馬諸湖共計地一萬五千餘頃皆民間膏腴也緣鎮口灌淤及武河沂河直河三口並塞所受薛永泇沂諸水不得時泄故泛濫成湖今新河既成兩堤夾峙則束水歸漕自無泛溢沮洳將盡化為良田久困之民可以大蘇其便四也徐邳東鄙多鹽徒嶧縣多荒地蓋緣人稀地廣生計無聊故轉徙失業耳今新河既通則民有生意安分復業者自多榛莽之郊變樂土其便五也新河之工為費既不甚巨而既成之後所應添設官夫及一切嵗修之費計亦不過萬金即將耗出湖地召民佃種照例徴租一嵗所入供一嵗之用寬然有餘其便六也職知之甚真計之甚悉翻前人數十年不決之案創國家億萬載永賴之圖所用止于徭夫可以隨便調發所費不過七八萬兩省直額徴嵗修之費可以隨便動支要以三年為期勿以欲速見效事蘄于集不必先自鋪張功蘄于成不必盡自己出務使河成而國不費功完而人不知此今日所當計而力行者也伏乞再行細估一面興工一面具揭報部俟功有次第然後題知庶不苦于慮始之難矣明文海卷七十九
