body:
  text: 眀文海卷八十餘姚黃宗羲編議七吳江水利議史明古吳江之地土疏水緩左江右湖故水之為患也特甚太湖東南巨浸即禹貢之震澤也具西北納荆溪宣歙蕪湖宜興漂陽溧水數郡之水西南合天目富陽分水湖州杭州諸山諸溪奔注之水瀦聚于湖汪洋浩瀚不可涯涘而松江承其下流松江吳江古名也即禹所書三江既乂之一也逶迤曲折洄流洑逆行百餘里始入于海而吳江據江河之會屹然中流每遇霖雨積旬潦水漲溢渺然無際或風濤大作吞嚙衝擊其害又甚于雨東風則江水西浸西風則湖水東泛俄頃數尺人力莫施故瀕江之人謂之賊水者此也議者徒欲開一渠濬一涇置一閘以為治之之方是皆徇偏一之見而無救患之益也何則吳江水多田少溪渠與江湖相連水皆周流無不通者特有大與小急與緩之異爾假令南置一閘而北流者自若東開一渠而西溢者如故固不當與諸縣治法同也竊以為今日措置之方其要有四一曰築隄吳江之田皆居江湖濵支流旁出蕩漾不可以名計茍不致力于隄防以捍禦之則未見其可也國朝永樂初治水東南尚書夏忠靖公創于前通政使趙君繼任于後無不注意于隄防皆妙選官屬分任諸縣而二公則周爰相度而考課焉其法常于春初編集民夫每墟先築樣墩一為式髙廣各若干尺然後築隄如之其取土皆于附近之田又必督民以杵堅築務令牢固隄既訖工令民䈒泥填灌取土之田必使充滿復于隄之內外增廣其基名為抵水蓋隄既髙峻無基以培之則嵗久必頽矣又課民于抵水之上許其種藍而不許種豆蓋種藍必增土久而日髙種豆則土隨根去久而日低矣此雖為繁碎難行然亦可使民由之而不知也厥後二公去任二十三年間豈無水患而不至于大害者良由隄防猶存之力也然人亡法廢隄日就傾水患復作正統間尚書周文襄公講求二公之法而損益之由是水患漸平民安其業近年以來法度廢弛上恬下熙民無所恃每年府雖下縣縣雖下鄉率皆以偽應之所任糧長耆老之屬不過頭會箕斂以賂姦吏為虛文其于防隄略不加省壞者十七八欲求水之無害者難矣且自戊子以至丁卯其間稔者才二而旱者一水者七固由天災流行然亦隄防圮壞水不能禦旱不能蓄有以致之自國初以來水之為患未有甚于今日也今生民之困已極茍不加意而拯救之其不轉死于溝壑殆無幾也今為之計莫若上按三公已行之成規嚴為之制于來春課民興作官屬躬親臨視務臻實效毋令吏胥得售其姦則隄防有成民免其害矣所可慮者但此承積荒之後多苦無食當令取勘貧者驗口每日給糧就準作賑濟之數至秋還官則民皆樂趨而無逃避之患斯亦講求荒政之一端也二曰審分泄吳江之地當太湖東南其在南者分衆流以入湖吳漊港宋家港朱家港蠡思港直瀆港黃沙港韭溪是也居其東者引湖水以入江花涇港七里橋栁胥港虹橋長橋三江橋三山橋定海橋萬頃橋仙槎橋甘泉橋白龍橋是也又自縣治至平望四十里間亦係分泄湖水之所今為石塘雖便往來前輩常言其有害水道故鑿竇以通水流近年傾圮俗吏鄙夫不知大計輒堙而築之又湖水多渾易為停積沿河之人多種菱蘆嵗久成田咸登糧額遂致水道日微又花涇港長橋正當太湖東流入江要道至為深濶而花涇港居民慮為盜賊所侵茍利于已輒夤緣巡捕官為之築堰長橋又為豪家堙塞規為田宅水遂不通為患極大今則入湖者泛濫而南流矣入江者洄流而西浸矣日滋月長其害將見甚于今日伏惟深為利民至計不惜小費不求近效不惑浮言一切疏濬仍為之防不計踵襲前迹則水有所歸而無泛濫之患矣三曰務車救夫水之泛濫者既築隄以障之矣水之壅遏者又疏渠以導之矣而水之停積者若不竭力以車戽則何從而減之乎然民之貧乏者或無力而弗供豪獷者又恃頑而不服以致互相推調坐視陸沉在乎上之人為之激勸而安集之爾往年水患初作上自長二下至簿吏無不躬親看視奔走道路未嘗寧居故諺有救水如救火之言此言當急不當緩也頑者治之貧者寬之由是人知警勸而法在必行自近年設立水利官後一切委之然地既廣逺卒未能周居東則西不知在南則北罔恤欲求其無悮難矣夫軍國之需在賦稅賦稅之供在土田土田之出在豐歉豈可忽而不務者乎伏望著為令典今後水潦凡任牧民之任者悉令分投巡視督民而力救之務在水平而後可不可專委水利一官以悮大計則水患可禦而民有粒食之惠矣四曰專委任夫事功之成由委任委任之方貴專一伏覩永樂年間凡興建水利庶事皆責糧長而官自節度之蓋糧長之任職在農功賦稅而己用心必専自近年以來添設塘長又立耆老復革去塘長而立圖長又有屬官義官之委糧長耆老之總紛紛多制一國三公十羊九牧民無定志莫知所從且屬官望淺位卑民不知畏義官總糧總耆又皆貪猾之人招權納賂靡所不為是皆無益于民適足以為聚斂之端張其兼併之勢又況保選耆老圖老皆由糧長則其人可知矣倚法為姦病民尤甚望將所設諸色盡行革去専令糧長墟長管之糧長管其都墟長管其墟縣之佐二咸令分管地方往來巡視而正官總攬其綱考其殿最如比法歸于一而民免侵漁之患矣明文海卷八十
