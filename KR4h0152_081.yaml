body:
  text: 明文海卷八十一餘姚黃宗羲編議八議處日本貢余大猷職等會同審據蔣洲等口稱日本統一之主原住山城地方私稱年號曰天文其餘豐後山口松浦博多津對馬島有馬島蔭摩洲大隅等處十有餘島並受以太守之名分鎮各方共奉天文年號政令天文島王故其别立之主僭改年號曰𢎞治今方二載而干戈爭擾向無寧日原奉天朝勘合俱被火焚惟金印一顆尚存見係山口島太守源議長收管源議長即豐後州太守源議鎮之親弟也此兄弟二人近嵗以來聲勢相倚令行諸島源議鎮見管之州六源議長見管之州十有二蔣洲等至彼因兵亂路險不得達於山城源議鎮禮館彼島將齎去浙江布政司宣諭明文轉行各島禁戢過海為盜之倭亦甚嚴切今嵗入冦之賊數較少是其驗也等情據此職等看得豐州乃日本之一島太守乃小島之一長以彼中僭改之年號擅用於進奏之表不恭之罪已昭以倭島之一長徑奏夫白頭之章驀越之責難逭如有印信勘合亦當查照舊例駁其年限之未及况無印信勘合將何所據而納之乎如其所求止於假貢買貨亦當照例却回以絶衆島之仿效况金印勘合之請越禮犯分為尤甚乎但自古聖王之於邊方不服則加之以威服則施之以恩恩施而不至褻威加而不至黷斯足以服邊方之心今源議鎮敬迎天威遂盡館使之禮恪遵帝令能禁衆倭之侵今嵗揚州之賊雖有數千又直浙沈家門等處屢有小警要之比諸前嵗江北江南共有數萬之賊似亦小綏而源議鎮輸欵效勞之功誠有不可掩者職等再三計議合無將德陽等四十三人暫令泊住海外石牛港給與薪米魚菜嚴禁其買賣交通聽候軍門奏請命下之日量用金帛之類奬賞源議鎮以勸其效順之心另用花紅酒米之類給賞德陽等四十三人以慰其逺來之勞仍令回諭源議鎮再行用心傳布天朝威令嚴禁各島盡將今歲入犯楊州之倭捕治以法使二三年後通無倭冦入犯乃許源議鎮請伊國王印信勘合表文照依限期來貢如此則浩蕩不褻之恩行於天威赫臨之下而邉方久安之計得於恩威並用之餘矣其王直等船五隻待其到日仍阻住泊外海聽候另行呈報處分緣係哨報海船事理關係重大職等未敢擅便海上事宜議錢薇吾浙初設巡撫或人問曰國家設官恆有定制何巡撫昔無而今有朝進議而夕俞旨耶海石子曰是議非始於今也嘉靖八年有奏揚子宜設總督武臣兩浙宜設巡撫文臣其時已得旨推舉才望謀勇文武大臣矣後江淮開建督府而浙撫獨寢至今復舉行耳或曰浙何為而設巡撫也海石子曰為海冦也先朝無論在嘉靖中御史王化等屢有海冦殺官之奏其為患久矣海故有漳州賊崇明賊獨倭奴為害最大倭奴自漢靈帝始通中華至唐咸亨賀平髙麗稍習華音惡其名不善更號日本史載其日出處天子致書日沒處天子倔強如此或曰倭奴何以冦也嘗考唐宋史倭奴雄據海島伏屬拘耶韓等國凡百餘尊倭為大倭王其地無良田可耕漁海自給又乘舟南北市糴其土墳壚有金玉而無陶冶覆屋不以瓦仰中國之潤土為陶為竈其嗜中國物猶西畨之嗜茶也西畨不得茶必冦掠倭奴必假冦通商始得所欲否則沿海為冦勢所必至也或曰吾嘗觀史唐宋以來但修貢而不聞冦抄中國亦加優恤不為防禦如漢賜以印綬魏封親魏倭王晉使都督百濟等六國唐賜燕麟德殿授使臣官左補闕或賜書籍佛經自宋雍熙至嘉定貢使不絶時或失風詔給常平米錢贍養何嘗為冦而防之哉元初常入寇世祖諭之不從范文虎等率舟師十萬討之盡沒五龍山下終元世為冦橫甚何也海石子曰是有説也唐宋以來倭奴利吾華物故修貢也勤元為海運倭奴劫掠運舟已滿其欲奚藉貢市乎是宋以前我執其利柄而彼求之元之時彼乘其利便而每為我患故冦不在唐宋而在元也或曰國初以來百蠻效順何為倭奴獨梗海石子曰洪武間亦海運以濟北伐之師永樂初海運凡十有三舉以給遼東惟我運於海故彼冦於海丘瓊山嘗言自宣德以來倭患已少惟運從內河而冦無所利此其所以少也或曰吾聞倭之冦浙屢矣故國初遣信國湯公築登萊至浙沿海蓋五十九城而冦掠不撤至後乃少何也海石子曰此不足驗罷海運之故哉永樂以前屢寇不止宣德而後僅一寇耳自後求貢不絶蓋非貢則不能得所用之物其意誠不在貢而在商也或曰倭奴之貢在洪武已遣僧奉表稱臣矣此言宣德者誤也海石子曰吾非謂貢始宣德之後也蓋永樂以前之貢假貢以觀虛實因為冦也宣德以後之貢假貢以通商賈非為冦也故洪武奉表之時貢方入已掠溫州其後或貢無表文安置其使於川陕畨寺又嘗與胡惟庸交通謀不軌祖訓曰日本雖朝貢暗通姦臣故絶之是永樂以前之貢意在寇也又侍郎楊守陳曰倭人變詐凶虐時以刀扇小物褻瀆天朝規牟大利不當與之通好是宣德以後貢意在商也或人乃悟曰運於海倭假貢以為冦罷海運倭緣貢以求商情較然矣商亦可通否乎海石子曰難言也謂可通則祖訓嘗絶之矣謂不可通則洪武末年許令十年一貢永樂初賜日本王印誥許之通融或二三年或五六年入貢矣且松江寧波先曽各設市舶市舶者與倭舶市也然則貢而商亦國制所許也或曰胡兩市舶今無一耶海石子曰史言松江宋建市舶司元有市船務國朝為市舶監在澱湖之北後以官多民擾罷之而并於四明市舶四明者寧波也嘉靖二年市舶內官隂為瑞佐嚮道是市舶首尾為始禍故四明市舶廢或曰市舶廢是不許其貢而商矣海石子曰嘉靖四年敕給事中勘報倭情已奉明命許復洪武十年一貢之例矣非終拒之也且市舶之廢非絶其來商乃慮市舶之為禍始也使監船得人彼貢而商焉互市而兩利焉海警消而倭禍息非地方之福乎况巡撫之設誠非無意將俾之仰遵國典俯察時宜杜其釁於無形耳或曰嘗覽海經南自汀漳北抵登萊沿海之區皆可駐舶何必寧波海石子曰考之倭奴貢道唐天寶以前率由百濟新羅入山東境自倭與新羅讎殺乃不北而南由明越州矣又山川略中載永樂時所封夀安鎮國山與四明相值春時東風便帆直抵寧波境為便聞之海濱人云江淮未設總督海商或由海門入建業潛相貿易今江上有操江中丞巡江有兩都史海口有總督太倉有兵憲彼勢日窘故必之寧波今浙復專設巡撫防範甚周吾恐兩浙地奧區僻徑可通舶賈者能保其不乘我無備而肆擾乎蓋倭既藉華物必資商為利貢限十年彼不能待也諺謂閏月風便舶至非閏月風便三年一閏彼適來正其候耳况華人亦利其貨交相覬覦而時禁特嚴則旁溪曲徑潛相勾引勢在必然姦人乃或從中梗之官不達其利害而搜治稍急彼欲脫身以解必至弄兵沿海之憂方大耳往年大同甘肅之變皆措置失宜以至潰決正德中兩河流賊彼寧不畏死而甘禍哉幾事不密釀成大患或曰似此將何道而可海石子曰在自治耳必也申明法紀禁絶通畨之人杜塞勾引之路若彼稱貢而來縱不合十年之期挈重資涉溟濤無復回之理况內地所需亦有必仰之物昔韓昌黎送海州刺史有曰海外之國馭得其道處中其情則洋賈之貨皆可為中華用而海上之患亦可潛消今日之計在巡撫大臣知我知彼識其機宜而善應之耳况國家如天之覆於外庭未嘗拒之遼東朵顔諸衛三年入貢容其貿易而西畨如吐魯畨等來朝十日平市於京師何獨東海之人必拒之耶况祖訓絶之謂其暗通姦臣將圖不軌今不設丞相寧有惟庸之姦如以市舶既革為疑則又非互市之故也考之正德中市舶內官暗通朱素卿等受寶賄以萬計且內通劉瑾欲勾外邊逞侮而嘉靖中復激忿宗設殺總督武臣皆閹人之階禍耳今聖明當陽百僚奉法何虞一小醜之交市為或曰是固然矣慮貴十全今欲善圖其後使彼不敢逞而我無虞其害何道致之海石子曰有二説焉一諭彼國不得各道爭貢一海上近舶之家不得冒利啓釁是也倭國有七道道各統郡數十倭王政令行則不敢擅求貢自原義植主國幼沖無道勢不能制遂令各道強請勘合爭先求貢及抵寧波互相詆毁求勝致屠戮釁開而兵戈貽害今當諭彼照先年各道輪貢不得交爭違者照洪武事例却其貢物安置其使於川陕則禍端可息矣若彼沿海之姦嗜利無幾必投勢豪之家以為奧主始則誘賖舶貨既而不償又謬托貴勢展轉相蒙激其憤怒必也嚴憲典輒擅通畨之禁督巡司下海捕緝之條方畨舶之至必報官閲視方得議估既入其貨立限以償凡勢要之家不得投托必選謹厚之人自顧身家者乃得與之交易則狡猾失勢當自斂戢且舶船不許入港令彼不得覘吾虛實市易之際差官檢押不得乘機虧負如此中外各獲其利釁何自生或曰誠如所論則不惟杜禍萌且各受益何如限以十年之貢既不拒倭人嚮義之心而彼國亦不數數勞費一利也抑其爭貢之端既以禮義治彼又以尊嚴事我二利也仿國初市舶之意而不絶其情在我則以通逺方之百貨在彼又以慰仰藉之貪心三利也於是海石子曰然海船郭造卿國初法嚴水軍之船其官造之在閩都城三衛之肆各一景泰乃合之即今河口厰云造之分於五寨汛畢以授鹽司商修之轉運官無甚費而船完固汛至還之水軍故防汛無他船或漁人朝暮往返焉其船以丈許受米有河泊所司之安有他可以弄兵而經年於千里之外哉逮夫禁網漏鹽䇲日起官聽商便自造之其法斯廢冦生輒召商船商苦之國課日損乃復官造而不為商用不足又括民船船小無器械遇賊急收保為幸或使之緝候報水軍戰及告鄰里據岸而相為守可耳若可以迎擊賊必違丈尺以挾器械者也由此官民亡擇而巨船塞海矣嗣而幕府告匱便宜一切取稅匪惟私鹽樂隂輸而魚課且甘重榷種豪雜之陸則商而水則盜捕之陸則玉石難辨擊之水則玉石俱焚因而容之則橫是猶教猱升木縱魚而之巨壑也將嚴禁之其勢故難舊禁凡汛寸木不下海嚴矣苐細民以海為業猶嬰兒以乳為生禁之則號惟當節之耳茍汛而無警下海之禁勿厲有警非汛亦當飭禁以絶交接則賊待哺而鹵食勢不能持久戰而屈上也絶其戰而先禁之上之上者也蓋自造船始凡船檣髙者大檣多者長方可以入逺海禁其毋使兩檣單檣乃授之符一如談中丞令刻名籍於舳艫而因地以異其色漳白泉黑莆以上紅為圜徑丈各於帆如其色當波蕩中亦可以逺别之焉夫莆以上同而漳泉異之何也自商鹽多則海禁難今漳無場泉場廢鹽不通行各船難以藉口行之自莆以上里場抵閩北之黃﨑鎮其內地可戢非漳泉之商假充餉而亡賴者比故通行之以惠商也或云尤當以檣而别縣漳之附郭龍溪白詔安白漳浦紅參紅黑者海澄同安白惠安紅其晉江附泉郭黑自此而紅者亦稍别之莆田白福寧黑福州之閩縣紅福清其上白長樂其上黑連江其下黑羅源其下白人易識之則防之者審矣又限地而示之期凡商以年貌册籍及所什物於官受符刻期近過邑而返逺過郡而返漳泉皆許至莆莆之擊蓼民居稠密有巡司可為譏察有水寨可以擒獲設為駔儈居之無符者必沒如所符而為之易船駕以莆人其商安能以逞越者如出外境之律返而踰浹旬者罰浹旬而留罪其所主福興而下者其船則不易之使上遊之人各得以自致其貨而往來於其窟則彼不得以寡暴衆久而不禁姦宄亦銷矣然古者市㕓抑逐末况海上而不之制乎則無論福興漳泉凡漁鹽有課者勿稅其他稍如塗中丞令船大者丈五尺而止各尺稅銀一錢視廣狹為多寡以佐水軍之費若有警借而用之壞則當取稅以償并未壞者事竣計日免其後稅而優之其所載者違禁既嚴多假漁船分載而可以濟近島當亦為漁人期風波不過五日必詰其往凡所用外無他器必詰其歸凡所取外無異貨他有挾者按而沒之其按諸姦莫如保甲但海人刁悍不利束縛束縛之亟則蹄齧跳梁惟編其船澚立之甲長六丈以上為一類長五丈以上為一類以次而下者為一類其總以恆産充之其衆重土著異縣無熟識非我族類不許相挾入海行連坐之法一船之罪罪其同甲長不舉者究蓋海其所歸也船其所聚也於此而嚴稽之簡於編戶舍匿之法是以官問其長長問其甲鄰里之習熟桑梓之情稠狙詐無逺交睚眥不近攻而姦宄可清水軍之法行矣若造軍船當不惜費劉晏於漕且然况於海船乎今特籌錙銖匪直半減汛期將至始肯議發帑執事無羡餘且有從而朘削之督者視成應者塞責故器具多敝守則易朽漏戰則難衝突曩征曽一本初括商民船如擊梃於不格明矣乃議巨艦分之縣而速成之伐木之役竭膏血而赭墳墓漳浦未移即為之燬督帥所擁先為之奪多破於江磧至者無一二而與之猝戰惟舊船稍大者焉古之水戰江河淮泗洞庭彭蠡舟利於大赤壁蒙衝尚沿岸而焚則海艦過大而崖山可鑒也故必視賊籌為三等亦如陸戰以備三駟大者加之數尺次者稍如其大靣以三丈上下為度小者愈小愈便俱當為之極備未汛即經營之有司稍贏其出納各將令如舊制使之自督若不堪駕責在其將其將與同生死安敢謾而自敝哉駕而弗審與無船同水陸異勢故人和不如地利地利不如天時亦當審之耳夫沿海之夫其壯足賴不善馭之為賊善馭之皆兵也即有不輯急在呼吸鬩牆而禦侮惟此時為然茍非先擇便宜逆潮阻淺則破或失險要戰而多北但得善地而風不便即賁獲百輩亦無所施矣故必熟風角占其上風下風則避其船如轉圜而便器具雖多火戰為長可以因風及逺當衝而先為用其器必備其械必精其技必練其防必嚴而布陳毋密慮彼之我施則易動耳故舟戒過大火攻為先他守將皆能辨之矣稍隙而修銅山遙屬之漳南日烽火以春汛畢浯嶼小埕以秋汛畢俱赴南臺賞罰此戚都護舊議亦習戰於昆明池意也又以海防諸僚去水軍而遙則有冒兵侵餉逗遛故縱之弊且因懸逺而以風波為解賊入謂其難遏賊去謂其難追勝敗互蔽賞罰無章故必各監諸將庶乎同舟共濟之誼凡議鑿鑿稱是具於舟師條約今不能出其算惟按而行之便明文海卷八十一
