body:
  text: 明文海卷八十二餘姚黄宗羲編議九復河套議翁萬逹盖聞智者必待時以舉事君子不昧勢以圖功是故理有所當盡而機有所宜審志有所必奮而謀有所不可略者是之不備難與慮終矣河套本中國故壤界以黄河固天之所以限中外也詎宜棄而不收藉冦齎盜然揆以今之時勢則有當復之理而無可乘之機多必奮之志而鮮萬全之算是故不能不為圖事者深長思也河套自周秦以來為國為郡漢置朔方唐城受降據險阨逺往跡俱在我太祖以神武定天下成祖躬御六飛三犂北庭其地既殘破我亦未暇舍黄河而衛東勝計則偏矣後又撤東勝以就延綏套地遂淪之邊外矣然正統𢎞治之間我雖未守彼亦未取不見可欲其心不動不奪所恃其争不力取之可也乃竟因循畫地自捐天設之險失沃野之利此邉疆之臣所宜臥薪嘗膽而有志之士所以扼腕而攘袂者也先巡撫余肅敏公置鎮榆林想亦有志斯舉而套卒未復鎮則空設開墾無聞轉輸難繼孤懸獨立沙磧為墟外之不足恃為藩籬内之無所資其賦役不有其利而益處其勞豈賢豪固略於逺謀抑其時亦或掣肘而未終其志耶然𢎞治以前我軍猶嵗常搜套搗其巢穴嗣是我謀日疎任彼出入涉流履氷揮鞭近塞蔑所顧忌今且盤據其中滋其畜牧遂其生養譬之為家成業久矣又今昔異時强弱異勢事體利害之緩急人情好惡之向背萬有不齊不可以不慮也欲一舉而復之無乃難乎故曰有當復之理而無可乘之機多必奪之志而鮮萬全之算也請極言之以干天聽夫敵有盛衰我有强弱以强值弱僅足相當以弱值强是為無䇿漢武雄斷天啓衛霍不世之將也絶幕四出不能一屈匈奴之膝成哀短祚内釁且生而呼韓稽顙願保塞北此何也漢武值其盛强而成哀際其衰弱也馬步矢刄各有所宜主客勞逸從來異狀韓信背水置陣死地以生魏武舍鞍馬與吳越争於舟楫之間烏林削跡是何也韓信以死地為生而得其逸魏武舍中國之長而困於所短也人情莫不愛其親然負米以致其養與遇變而捍其患緩急自有不同人情莫不愛其身然一勞以永其逸與暫息以休其體向背亦為殊等喪先王之乘舟不如死則取艅艎者必濟義兵謳歌思歸則定三秦者易為力也我國家拯天下於前元天威所及雷擊風掃遺嗣逰魂僅存喘息年來收養殘敝兼之掠我生口日滋月息即今小王子濟農諳達諸部落可三四十萬視昔之奔命窮荒不見馬矢者盛耶衰耶强耶弱耶而我承平日久軍政多偷三五年來雖賴廊廟注意邉防漸次振舉而其竭籌慮耗財用費功業也不少矣回視二祖之時其强弱盈縮又何如耶河套乆淪敵中間諜罕至人不屋居畜牧其内山川之險易途路之紆直水草之有無我不可必知也提軍深入其境能無慮乎夫塞以内我中國地也將領講求其形勢卒伍暗記其要害尚不能悉而况塞以外乎今我勞而往彼逸而待我馬出塞三日而疲彼騎遍野一呼而集得有小利歸途尚難倘失鄉導全軍何賴數萬之衆緩行持重則敵備益嚴疾行趨利則輜重在後且刻日有定期褁糧有定數敵遷徙靡常則戰無定地逺近不測則戰無定期一戰之後敵或保聚或佯為逃遯笳角時聞壁壘相待已離復合終不渡河而吾軍於此戰耶退耶兩相守耶數萬之衆出塞亦必有數萬之衆援之否耶有驍將以通糧道否耶保無抄掠不至匱乏否耶是皆至難而不可任者也夫馳擊者彼之所長也守險者我之所便也弓矢利於馳擊而火器利於守險者也舍火器守險而與之馳射突擊於黄沙白草之間得耶失耶今塞下兵即塞下人也墳墓廬舍先人之所營妻孥眷屬骨肉之所居禾黍桑麻業産之所具牛馬牲畜身養之所供迫於兵刄怵於生死尚每每退怯以煩上人之督責今驅之於無人跡之地限之以可立盡之食要之以難必成之功苦之以不即罷之役恐之以將徙之禍而欲得人之死力可乎議者欲六萬之衆為三歲之期春夏馬瘦為彼弱而我利於征秋冬馬肥為彼强而我利於守春蒐於套秋守於邉三年三舉敵必難支待其逺遁拒河為守是固一説矣然天時物性不甚相逺也秋冬彼馬肥矣而我馬不亦肥乎乃止利於守耶春夏彼馬瘦矣而我馬不亦瘦乎乃獨利於征耶夫春夏馬瘦而敵弱不能入冦然坐以待我誠懼其擾擊也秋冬馬肥而敵强既能為㓂則多方設謀誠恐其報復我也六萬之衆非所以襲人千里之途非所以自逸轉盼之間情態異致歲一為之以俟三舉其可得乎兵家勝敗本難預期一舉失利士傷馬耗議論蜂起則將已之乎竭天下之力排天下之議以俟其成乎三年三舉咸可得志彼敗而守我去復來終不渡河版築難舉則將何時已乎盖議者見近時搗巢之舉恒獲首功昔年城大同五堡之邉敵亦不來深競以為套地易復然復套與是二者實有不同盖搗巢因其近塞乘其不備勝則倐忽而歸敗亦支持以退舉足南嚮便是家門壕塹城堡為援可恃復套則深入人境後援不繼勝固艱難敗虞陷沒事勢異也夫必勝之兵有限之矢此李陵所以失也今我之將士能為陵之所不能為者乎往城諸邉實近我土又沿邉之地敵原不以為利故雖城邉築垣少有侵取彼不恤也套地則是和碩入冦以來據以為家四時之間不離住牧一旦欲取而有之彼肯晏然不有争乎事體異也故曰殺虎者易奪虎子者難奪虎子者易奪虎穴而居者難今未能殺虎而奪其子欲處其穴得乎夫先據北山將勇者勝趙奢之所以得也今吾之將士能為趙奢之所為者乎若曰伺敵出套拒河為守先將渡口及可以履氷道路亟築垣牆以次移置邉堡於沿河如昔年王晋溪近年張南川及總兵官周尚文所論似若可為而不知今日諸敵各有分地套地為濟農四子所居控弦者當不下十餘萬豈有空套以出之理沿河計二千餘里築垣為限豈時日可完移置邉堡非百數十不相聯絡堡置兵非千人不可而逰徼瞭望哨守不與當三十萬衆不止也誠恐布置未定而爭穴之虎至矣况吾邉去河動輒千里一年之食為數億萬沿邉所出僅足自供益以此數必仰内地由内地而輸之邉逺者二千里近亦不下千餘里乃又自邉而輸之於河即糧道可通飛輓實難此尤所當攄慮而殚思者也然則套中之地其終不可復乎曰事變之來至無常也要之君子不可有徼倖之心夫秦之所慮者邊而終秦無北邉之警漢之所備者邊而中葉有欵塞之順事變之來孰能逆覩我皇上以天徳建極元老以上知作輔天心助順將來敵之盛衰强弱何能保耶自相攻擊如匃奴之南北洊遭疾疫如先零之殄滅豈無期耶彼有其隙我乘其弊套地之復此其時乎謹我塞障飭我戎備和我行伍固吾元氣以俟其隙計之得也故曰知彼知已百勝之道也若不察敵勢之强弱不審事情之難易不揆吾力之有餘不足使塞下之民迫於備邊者喘息不獲定沿邊之卒傷於鋒刄者瘡痍不獲起而復横挑强冦以事非常則愚所不解者也謹議明文海巻八十二
