body:
  text: 明文海巻八十六餘姚黄宗羲編論三宋論劉定之安石為神宗變法大取民財與力而用之也在于兵兵之所用至于破遼而志願畢矣取民財之法曰青苗春貸而秋償之收息十二秋又貸而春償之亦收息十二歳再收息則名為十二其實十四也名為貸償其實無故取民財也曰免役凡民出力以役于官者皆無出力而但輸錢官自以錢雇民應役名為均役而其實欲自操其雇錢之奇贏也夫民孰皆不貸償而自足哉私貸償焉治世之所不免今也禁其貸償而官與之貸償以利其息錢之入民孰皆不雇募而自役哉私雇募焉亦治世之所不禁今也免其自役而官與之雇募以利其雇錢之餘即此二端言之其他取民財之法無遺巧矣而又編保伍以練兵則民自為兵而養兵之費不以煩官是曰保甲編保伍以養馬則馬皆在民而養馬之費不以煩官是曰保馬豈不謂古者寓兵于農也然今既有保甲矣而待餔之兵何嘗為之廢亦豈不謂漢嘗括民馬今使民養無害也然民既増保馬之勞而他勞何嘗為之損是其取民力幾于竭矣民財與力悉歸于我自以為我非用之于土木非用之于狗馬聲色非用之于仙佛欲用之于兵而復漢唐之故疆無不可也然畏遼之大故將于遼必先于夏又先于羣小自小至大嘗試以圖之安石君臣相與深謀宻議而悉掃異已者之論無非此心也于是王韶試于熈何章惇試于湖北熊本試于瀘夷郭逺試于交趾皆能尚有所得而試于夏則馴至于徐禧之死得不償其失彼遼者不待其試而先來求地安石低徊躊躇為欲取之必與之之說卒遣韓縝割與七百里之地無得而有失焉若獵者罝狐兔刺鹿豕而辟易于虎失其所操以歸蓋安石之技窮而神宗漸以沮悔矣然而援引共事之人固在也踵其故智以用于哲徽之時互起迭進以至賢路盡壅民命僅存之秋適值遼釁躍然攻之以卒安石之所圖而遽以國斃焉故宋之亡本于安石為神宗謀破遼而己向使其不謀破遼則不用兵不用兵則不大取民財與力不大取民財與力則何至俾羣小為之交攫互噬于天下也抑遂其始謀亦不過如唐太宗擒頡利可汗然太宗用魏徵先以養民為務而兵自强安石先弊其民不及魏徵矣乃動以堯舜周孔藉口其誣矣哉宋論二劉定之康王前嘗為質于金營而宋使姚平仲刼營金疑其非親王且嘗與較射而連發中的意其將家子因郤還之泊宋復遣王奉使講解而為民所遮止因此得脫而遂繼宋統蓋天留之也使其在圍城中則與諸王幷俘以北矣昔者周漢宗室皆分封于宇内非獨資之于泰山磐石得以固其存不幸而亡矣死灰復然猶得以續其統又不幸而統絶矣苗裔蔓衍猶得以保其姓周東遷而晉以强宗為霸主糾合諸侯為周翊衛至于戰國而燕韓魏居七雄之三以祀姬姓之祖禰秦虎視東周不敢吞者數百年自載籍以來未有若周之長所謂固其存者也漢懲吳濞楚戊之强而犯上盡封各國支庶以裂其壤至于哀平之際宗室載屬籍者十二萬人莫不據士民之上有王公之勢莽既盜漢而光武兄弟呼于南陽此十二萬人者近逺響應故東京之復舊物易于反掌靈獻之末表琮焉璋猶能崛强荆益以資昭烈之興所謂續其統者也唐宋則不然其宗室皆聚居于京師故朱温簒唐而徳王等九人一日同沈于九曲池濮王等數百人夜同阬于龍興寺女真取宋而惟康王以出使孟后以被廢二人得脫其舉宗北遷卒見屠戮於金人無一人幸免蓋無以保其姓矣夫聚居之也樂其易防制此利之小者而其後有大害觀于唐宋可見矣分封之也惡其難約束此害之小者而其後有大利觀于周漢可見矣蘇子瞻諸人言封建之害胡明仲諸人言封建之利各有其說而未嘗言其大利害見于繼世之後如此然則有天下者為其子孫計可以無疑于此矣抑宋統之幸而絶而天留康王以續之何也曰汴宋二百年矣仁如慶厯元祐之日多不仁如熈豐崇宣之日少其不仁也民怨之而其仁也民憐之其怨之也足以亡而其憐之也足以不絶民之心即天之意也善得天者得于民而已矣善得民者以其仁而己矣無鬼論包瑜或有問于予曰世人多言有鬼而儒者以為無鬼果孰是而孰非歟予應之曰無鬼之言是也問者曰嗤鬼神之徳見于經訓載鬼一車著于易象阮瞻不信鬼而鬼現形温嶠不信怪而怪呈狀鬼信有矣今子言無無乃背于前聞而為好異之論乎予應之曰吾之言無非鬼無也子之言有以人有也天地日月風霆流形庶物露生莫非鬼神所為此聖賢之所垂訓者也非若今人之所謂鬼也今人之所謂鬼者夜嘯于梁晝瞰其室獻妖夢露光景憑依土木假托人言乃妖由人興者也然人不知其若此而舉世信尚之者猶以其能知人之隠匿也能前知吉凶也奉之而有福謗之而有禍殊不知天地間至靈者人而己人之所以至靈者心而已鬼神之靈其能外人心而有知哉鬼神之禍福其有去人心而外至哉人心所向彼亦向之人所不知彼亦不知之因人之福而乗之以為惠因人之禍而乗之以為威又況不能為之禍福者焉昔者臧㑹欲為僣卜之則曰僣吉南蒯欲為叛卜之則曰叛吉然而一成一敗效驗不同者蓋以僣者見其僣叛者見其叛皆人之所自發見耳夫以僣之與叛使有識者觀之必知其不吉也使鬼神有知不受不臣之愬況肯以僣與叛為吉哉惟其以僣與叛為吉而復不效吾以是知因人心所向而無預于鬼神之前知也然世所謂禍福者又有說以曉焉昔者晉悼公在宋宋公享之用桑林之樂晉侯由是得疾卜之曰桑林見或請禱焉荀罃以義㫁之以為鬼神不當加禍于我卒不禱而晉侯之疾亦瘳他如狄梁公毁淫祠而爵愈顯孔道輔擊神蛇而名益彰果能為之禍乎後漢佛法初入中國楚王英最先好之潔齋三月與神為誓及圖謀不軌廢徙自殺坐誅死者以千數又如閩王昶恃神而尋遇禍害張遇賢信鬼而因致誅夷果能為之福乎舉此數端則天下之事莫不皆然矣嗚呼天下之事當聽于人而不當聽于神當求于己而不當求諸鬼不為逸欲則灾患無自生不為非辟則罪戾無自至鬼神何損于我哉不先播種則鬼不能輸之粟不先學業則神不能顯其名鬼神何加于我哉或者曰然則自古聖賢制為祭祀之禮洋洋乎如在其上如在其左右者亦豈為是虚文而不究其實哉曰古人之為祭祀惟盡我心之誠而己潔粢豐盛非以求福也齋戒嚴肅非以畏禍也追惟其本則報之仰慕其徳則祭之有功于民則祀之惟求盡此心之誠而己夫豈有他故哉曰然則子獨不事神乎曰予何為不事苐予之所事者司馬公所謂心神也非黍非稷而明徳之惟馨非腥非羶而道腴之味厚為善也則心廣體胖優游暇豫神已降之福矣失一善也則心常戚戚惴慄危懼神己奮其怒矣是以上帝臨女無貳爾心湛天君之泰然不敢有一毫之慢毋曰不顯莫予云覯儼神明于不測不敢有一息之違為其所當為無慕乎其外是以處下位而不憂居困厄而自亨是皆所事之得其正者之明效也大哉心乎𢎞于天地靈于鬼神吉凶禍福皆出于其間矣尚何外求而從淫巫瞽史之說乎問者唯唯而退因葺是語作無鬼論世變劉玉嗚呼世變之下可勝道哉古之為士者知有道徳而己知有義理而己修諸身而徳以立措諸人而道以行證諸經而義以明修諸辭而理以達雖無心于功名訓詁述作也而後世之功名訓詁述作莫尚焉此士習之最隆也降世以還管仲出而事功啓李膺出而名節興鄭𤣥作而訓詁章韓愈生而述作勝道徳變而事功理義變而訓詁述作此士習之既下也然道徳而功名固有依于道徳者義理而訓詁述作固有達于義理者迨夫末世則士之所志者科第而己士之所營者禄位而已士之所習者呫嗶而己士之所述者蹈襲而己功名變為科第禄位訓詁述作變而為呫嗶蹈襲此又士習之愈下者也嗚呼山夷而陸陸沈而淵淵潰而流流溢而海詩云譬彼舟流不知所届安得豪傑之士一挽斯世而歸諸古哉碑志論胡侍夫俾幽貞潜徳流光莫掩鴻勲駿伐垂馥靡盡髙岸為谷而碩懿永存委骨成塵而聲華益亮不有碑志其何賴乎故孝子文孫靡不丐筆詞人闡其先烈中世以降藹然同風固彌文之通懐含靈之極致也而時變道涼俗靡文敝墟墓之製率是誇誣奬其元忠則行齊八凱稱其篤孝則蹟邁二連或云散粟凶年施非望報或云却金暮夜清恐人知苦節與汎柏同貞義教共㫁機等辨狀梟獍為鸞鳯進蹻跖為勛華雖語有精粗而咸歸矯飾夫以存多遺行没獲嘉名淑慝俱旌真贗誰别不論其世孰匪令人譬則冩照傳神眉目盡舛素交卒覩未免誰何儻昧平生秪云惟肖殆令漢臺之畫耿鄧不分傅野之賢旁求靡及矣意者非分之譽鬼亦靦顔無情之辭後將奚信而作者無愧色受者無遜心觀者無異論有識之士所深憎也蓋近代史編惟憑碑志碑志烏有史編子虚矣又縉紳壽耉乃可君公才士雅人方堪别號碑表之等倬有王章夫孺之銜並須廷授乃今賈豎敗夫咸冒君子之號乗田筦庫輒樹神道之碑市妾里妻詐假夫孺之貴祇以自罔寧曰罔人犯分誣親憝兹彌甚且仲叔繁纓宣尼致惜重耳請隧周襄不許方物則飾馬之具小麗罰則闕地之罪均而不學之徒蔑禮任心僣侈顛越秉文之士依阿取信不知所裁俾表徳之器林列丘隴之間華衮之辭波及輿臺之鬼憑風詭濫其說愈長冠履混同無復等别矣然金石之撰體異汗青史法則褒貶兩存碑志則揄揚獨運故纂文貞石表鎮𤣥途例皆黼藻温華斧鉞不用儻于事理泥閡便當婉言莫承勿令回我兔鋒眩彼來葉茍或情在難咈勢不可辭其于命翰遣言須存商訂不識避就將賈釁端蓋雖空空鄙夫平生詎無一善獵其可欲舎其深瑕裁辨之間頗加恢潤譬諸刻鶩畧企鵠形若畫無鹽不淪魍魎庶幾是非不逺梗概猶存在彼既獲稱情于我亦非曲筆亦摛章之活術御物之圎機也明文海巻八十六
