body:
  text: 明文海卷八十八餘姚黃宗羲編論五吾子行論楊循吉吾衍年四十未娶其友為買酒家女事之女有夫者也夫死事連衍衍遂逸去投水死矛不悲衍而鄙之衍杭人也世稱其博洽好學豫觀其所論著信然然其死乃若是則與其學若出二人者亦獨何哉夫士所為異於人者正以處生死禍福之間能不動而己矣故有含垢忍汚以全功名而振臂掉首以快忿怒誠知夫生死大故不可以輕判也古君子則皆能無憂其死矣而有不然者非特商確於死生之間以為不當死而不死也亦其小辱小忿自不能動吾之心亦欲受夫小辱以去其大恥者而己矣及其臨大難遇大事即授首不辭至其以身許人也若舉破履擲之道間耳以其小者言之若曹沫荆軻聶政之流是也豈謂管仲龍且鄒陽不能行之乎若匹夫匹婦其中固無分寸之見茍一辱之則閉户深匿以為恥不死不足以見人於是有自經於溝瀆者彼小人宜知有小恥豈知天下有大恥也噫嘻衍為士人亦匹夫匹婦邪何其識之似乎方衍買酒家女被逮時身既受誣則豈不能具一牒自理闕下耶即不能理豈不能逃遁長山大谷間俟赦出耶即不能逃豈不能手殺誣者自械繫詣獄就死耶即不能殺豈不能無辨而受之以長者自處耶即不能受豈不能求解於時之有勢力人耶凡此數事衍皆不能而投水以死死則死耳何重乎衍哉然則衍之志氣尚未堅定以一小辱小忿而能動之何貴乎學也由是觀之衍無結人之能無脫己之智無含物之量無應世之權無報怨之節無奉身之仁矣匹夫匹婦目不識詩書心不諳道德彼其有死固然耳若夫衍其學不為不善博古乃其所成就者若是吾乃所以責衍也士之不幸而不得其死者多矣天下或壯之或悲之或笑之慷慨激烈而死世所壯也顔杲卿輩是也幽囚抑鬱而死世所悲也屈平是也無賴妄庸以死世所笑也古莫傳其人鄙之甚也若衍之死不足壯不足悲乃足笑也嗚呼衍之死何不幸而至為天下所笑也哉或傳衍尸不獲豈固飄然自遁而世遂以沈淵誣之耶若是則可也性論祝允明今昔之説性者棼然角起而未肯以物證之而明也人與物也高下懸殊其必有受斯謂之性謂之性斯必有恆乃同也今夫物之性剛柔熱寒生殺平毒受於是則恆於是故稼必生虎必殺豈惟生爾燔草石至為粉塵斃鴆之翮一染於醴察之不可覩而尋仞之夫一納諸咽傷生以死此時上帝不之違焉然則性不恆乎哉羲炎軒嚳伊姚姒姬迫之死使惡必弗從癸辛道之生令善亦弗能不從者稼不殺人也不能者鴆不活人也此一而己矣其必然者也奈何談者之弗校於是彼有類乎是者嘗以犬異牛牛異人云之矣是未究之語也犬牛人之性則異爾其有恆一也烏可以其異也而廢乎有恆者耶然則謂有恆者謂皆惡與皆善與不然也有善者也有惡者也有善惡并者也善者則甚少犧姬是也惡者亦甚少癸辛是也并者一而其劑分彼此侵互其品極繁由千萬至於無算也古今之賢良中人以至細人是也天地之道二隂陽而己矣陽善也隂惡也陽善亦有惡也隂惡亦有善也如令獨陽而亡隂則亡生矣亡隂則亡生然則生矣復安得獨善而亡惡乎由其甚少者有恆甚繁者亦有恆故鳯寡鴆亦寡而雞崔彌彌今古亡變也彼將達其辨故必曰惡者氣爾夫理非氣不之舍必舍於是合焉而始生生而性始見性非見而有有於合之際矣非鳯其胎而鴆其卵也必置性於偏善而曰惡者氣然則必曰鴆性本善其殺物氣也斯可矣生生之屬又奚必有性字哉吾非有黨仇乎軻告卿雄愈翺頥熹諸子之間循吾見而章之亦俟萬年下有定之者然亦非臆議也由孔子曰性近而己自孔子至於今皆稱為至聖語必師疑必質而獨不是其言性不亦怪乎審是則孔子亦不得為至聖矣嗚呼吾獨知從孔子也治亂論祝允明有治者有維治者有亂治者有還治者有亂者有捍亂者有治亂者無絶亂者無絶治者治不可絶也亂亦不可絶也凡人有治亂焉凡天有治亂焉人之為治亂人習識之天治亂奈何天之始咸無治無亂生為治死為亂安為治擾為亂腴完為治悴傷為亂氣化自為之為之而非謀為之猶無為爾無為而然也故物有適與戚而無愛憎比後久且人者擅而弗天乃為之用謀非自然已而天之自然終弗遷是以無為歸於天人無以無為為己孔子云舜無為亦衰世之意耶夫人之始天為之有戚與適而無愛憎久且甚愛憎起焉有愛憎而無願與尤更久而滋甚願尤勃而作遂至於后讐遂至於戴殺崇卑之守隳不能持之矣兹焉謂獨下民之辜歟夫人之治者為穀膳相甘絲枲相燠牝牡相契慈孝相親禮樂相順夫焉不愛願亂者反之焉不憎尤至於國天下皆然而始治也人為之續而亂人為之在治而維之先亂捍之在亂治之既治還之皆人為之治者聖哲才賢亂者不肖姦究盜賊校然己至乎天則未知其有治亂也知之而未知治之職乎人也以天之大尊愛願焉而不敢憎尤亦以其公仁故聖教稱大德曰生而俾不怨然而人物安焉而不知治其亂之職乎人人之力至而救還之萬分一猶若自然矣力而無救還若堯之於水湯之於旱亦末如之何矣兹所謂亂不可絶治亦不可絶者也然而弗可任而無力者焉今夫鏡之以日月或曀霿焉潤之以雨露或亢烈焉暢之以風氣或飈飍焉舉而隅及之無不有治亂者治者若常亂乃至踣陷焦灸摧衄以至癲虐萬形令枯困迸越痛毒磔裂死滅不可以忍語嗚呼割矣哉可不謂天之亂而能免下民之咨怨懟尤者與於是有膏薪漿翣屏障之救是不謂夫天能治亂於自然而不能治其亂人能治亂又能治其亂又能治天之亂矣夫天由天之治謂之大德以不能治亂為無厚皆不與於天惟公若仁其本性無庸以私讟於乎人不治亂交責之天不治奈何亦置之也耶為孔氏之學獨當不怨天而務民義會仍嵗四方飢星在壬午以闕二字癸未以風是為天亂申之春夏亦屢風激論以爾凡言人之治亂之術者衆矣古今論祝允明談者類判古今為岐途吾恆患之大校君子多是古而非今細人多狃今而病古吾以為悉謬也君子之是古非誠是其實也是其聲也彼若禮而擯相尸祝升降盤還樂而咸池承雲縣簴干戚冠而收冔母追衣而袀袨逢掖紳佩器而豆籩鉶瓚俎几車斾布席納履豈不美與然而細人未之安也非未可安也古者之為禮樂器服者不徒爾矣其為視聽步趨御用者不同今矣其中先有是也由是投之而適舉之而宜也蓋賢愚之情略近聖者制之而賢者由愚者隨稍從其間舉而先之耳後之人中無是也其為賢者亦非果有是也其知及之遂茍云古是而今非漫然欲以皎皎之身而行渾渾之典是獵其聲而己矣若夫細人之狂今亦非誠狃其聲也狃其實也其於諸具亦曰投之而適舉之而宜苐見其外之便於中也吾是以知為古今之辨者亦執其實而校之耳聖之成者莫踰孔子子曰生乎今之世反古之道災及其身者也孔子亦狃今之徒與非合汙也非逃眚也其心也天運其動也天行至當而已矣茫茫宇宙積今成古古今非兩世也彼曰無古則曷以成今豫亦曰無今曷以為古也前既作之後乃述焉非必今之藉乎古也或曰若是則何貴乎聖人者乎哉曰人盡克聖克之而弗為斯後人之不肖也匪曰弗能弗為之罪也鴻荒邈矣唐虞之雍雍殷周之烈烈至矣厯祀二千而乾坤倒懸非我皇祖之更造也而尚有斯世耶唐虞殷周之盛君而生斯辰也其亦若是否乎哉知其一契也然則謂今之弗逮古者然乎哉方孔子時則以結繩為上古羲黃為後世矣又以視今日何如哉猶是則人之不足為世也久矣老列莊周之徒皆然也及至漢氏以來纍降而纍病豫嘗統究千古儀制風俗大率三皇之前一時也三五一時也三代一時也周末一時也秦一時也漢一時也六代一時也唐一時也宋一時也元其繼矣吾明一時也閏窮肇章猶三五也而豈徒哉然而有作於上下未齊也故豫病乎其為辨於古今非無辨也徒辨其聲非其實也而豈徒哉嗚呼非激也激而有以為之者蓋存乎其中矣推天地之道迹元聖之訓原群黎之情察陋儒之識為古今論國年論祝允明語為國者知在師三五根道德張禮樂而審政刑矣又知得是者永命失命者趣祚矣或從而案之有爽焉夏之道不降於殷殷之道非劣於周而其世每趣焉陶虞之禪則是以天地之道公於萬世其祚命恆在宇宙非所謂趣者其後劉氏李氏趙氏率三四百􅑤他則不然蓋三氏者弗能純得乎是而猶弗瞀之此其效也然其去文命之道亦濶矣何其年且庶幾乎如是哉按稽之弗能無二者吾求其故觀其國不可識觀其人乃得之矣今夫人之年以百二十為大紀而克爾者萬一其視為恆度上者九十而己耳八十而已耳亞者七十六十而己耳今由賢以逮愚凡其間心行智術生養以有其躬者貴富賤貧佚勞通窮萬萬殊矣究而至於死率底於是無縣相違矣則國之修促亦何縣去之有何也茍有充於腸無必盡粱鑿茍有裹於軀無必盡蠶毳亦勉勉乎終厥人矣茍有發於此無必極神化茍有被於彼無必極康乂亦勉勉乎終厥圖矣惟去穀稷而鴆葛棄仁義而戈鉞乃以賈滅亦無爽焉然則為國者無以年敗道無以道疑年不盡物而人况加於備養不極理而國况進於純道純道之效至矣哉或曰純道者奈何曰師三五根道德張禮樂而審刑政是也後國年論祝允明或曰審若子言國之祚以德符之則周之德其可七百也斷可識矣又何以卜為而後始曉也曰卜史之吻吾不知也雖然即有是者亦奚比於德之為符也與夫其必以卜者豈不曰年存諸未至非人知所察而惟天察之乎夫天則察其年之所未至者矣亦能察乎其德之未至者乎不能察乎其德之未至者矣亦能察乎其立於今者乎以其立於今者而察其來是奚必蒼蒼者能之乎今使問曰文王奚如哉皆曰仁也秦政奚如哉曰不肖也文王二世可乎曰不可也秦政八百可乎曰不可也若是者能語之豎子能之無伺乎祝史也而况於君子乎而况於天乎天之於物也實良者條荂樹薄者楨蹶故曰栽者培之傾者覆之故畀以松柏而自然後雕畀之菌槿而不能私延天能畀之不能察之耶周史之卜天之答之弗容自眯也七百之厯非不可溢而八涸而六也大校若是而己故更過之其為斯數者史人候測推步有其術矣蟻徙而澤鴻號而曙不足異矣嗚呼持斯説以質千古弗遷矣辟國者亦奚為而不師文王乎戲論祝允明天地貞觀日月爭明有物有則性習不齊聖王修德囿民內於大彛咳笑有度教束刑截無恥弗格以為患何以戲為哉夫遊息時舍弛張互用諧隱發歡博奕舒氣賢哲不廢方册有之子曰割雞焉用牛刀古之戲也嗚呼周旋中規舞蹈象德遂為冠猴綬狗緣撞手步以禮樂為戲肉刑五等輔教止辟遂為椓烙刳斫以刑罰為戲播種什一粒民養後乃遂稅榷椎剝以稼穡為戲理財禁非命令役使乃遂漁賄殘慘以官政為戲學古有獲誦詩授政乃分經爭傳偽道賈宦以學術為戲襄政紀事顯道摛華乃繆辨夸辭妄製逐科以文章為戲配祖嗣育乃奔淫蒸報以夫婦為戲傳賢禪授乃九錫勸進以君臣為戲降𠂻繼善秉彛好德遂悖心欺天盜聖罔衆以心性為戲篡之郊弒之類類祭奪而詔侈而封封禪莫不攀厯數陳應順應天順人敘五運類肆讕詞對越百靈以天地為戲蓋本柢心性臨冒天地以有我嗚呼至夫以心性天地為戲聖人有作能如之何矣哉甚哉人無畏如此如此大夫士稱為賢才莫不以周孔吾師天地吾性性理吾學皇王我政擊臂白眼麾睨天地天生蒸民嬰兒乎用姦文生殺之為樵蘇然為夫婦之别令夭窮孀婺矛牙凍餓死君臣以義令良淳民征輸役徭奔踶以死咸謂屠劉嬰兒羊豕等類大略主務譎欺以相為君以戲臣臣以戲君父戲子子戲父夫戲婦婦戲夫族屬友朋鄰閭爾我交逐逐用此戲天下日走息戲中其行莫不用此戲其言莫不謂聖哲令賢其執彌貞其事彌戲由有聖人教而來日走息戲中獨醒者翻惑羣酗曰其是同舟弗寤其歸也各趣戲無己時乃移戲以爭爭以反反以亂天地弗見所以救飭人人不知死所其所云教之咎耶其戲之罪乎哉噫其終矣乎謂吾言必云妄輕之其必以謂戲嗚呼其誠矣乎心氣體交養論祝允明夫軒蓋載塗金錢積櫝禮樂充庭勳勞被物緗素列架豪楮飛案英俊歡趨士女愛戴樽罍雜遝聲容璀璨田苑蕃麗煙霞出入莫不名響海嶽敬咸卑尊如是則志意敷暢精神采發而四肢澤腴是心氣體之得養果在於外物然而聖人之徒以謂不然故有浮雲之麾執鞭之棄至如朝冠不彈銅山無迹鸞刀不更賔館生塵故舊寂寥吟諷靡寄有謨必僨所投輒戻如是則悰况牢落神襟忽恍偃息蕉萃心氣體之不得其養也外物之乏也而聖復不然故有顔巷之樂原室之泰是故衆人以物養氣體氣體美而心從之聖哲用道養心心安而氣體從之雖遇有欣戚而賢聖長熙然而肌血所嗜必在佚美有骸之所同特徇道不暇耳其在道獨為肌血吾無言之如道可佚而佚之也心氣體亦有間焉養心氣體猶未曰粗之乎食色聲味衾裳堂室舟車之類也精之乎卷籍誦覽章句歌吟筆墨灑染圖畫拊玩偕得而具享三者飬之完矣若是者咸假外物須資金錢事事而求之營營而萃之得而養則心獲矣而氣體未免於煩勞乎或得甲而缺乙昨有而今無茍不必慕其全不追於昔快乎此且慊乎彼喜其存抑勿惋乎亡則心少不足而免於勞煩氣體則泰紓然則得其全三者備而道無害不可尚己於其間或得失不齊歟必求且嗟三者必欲全弗乏而終弗克無寧任之與力為氣體以損心無寧息氣體心亦未嘗不可舒也余性極任時昨有養三者頗皆得一二比來為人移假洎攘竊去物甚多始多惋惡將復求完之暇坐漫想得此因寫出之期以自從焉燒書論祝允明客入祝子書室譽曰富哉先師之淑萬世者其具夫既而曰痛嬴政之賊聖典也不然尚博厚矣夫祝子曰聖訓在淑身不淑口吾見淑口也衆而身之鮮吾不能一乎感實懼倍焉雖然安得政更生以終惠我客驚曰怪哉曷為宥其賊而又惠諸祝子曰政不善燔玉石俱焚然而嬴氏博士之司不與也幸蒙賴漢室君臣灰復燃簡復漆今士身厥一辭不遷必去小人徒於君子者若復浸廣以臻厥全可賢可聖而奚其少獨敗吾淑者林林爾吾力綿弗能祛思得吕氏之子之手而假之曰將燒者何祝子指數十篋曰可燒也客試窺之所謂相地風水術者所謂隂陽涓擇蕪鄙者所謂花木水石園榭禽蟲器皿飲食諸譜録題詠不急之物者所謂寓言志傳人物以文為戲之效尤嵬瑣者所謂古今人之詩話者所謂杜甫詩評注過譽者所謂細人鄙夫銘志别號之文富子室廬名扁記詠為册者所謂詩法文法評詩論文識見卑下僻繆黨同自是者所謂坊市妄人纂集古今文字識猥目暗略無權度可笑者所謂濫惡詩文妄肆編刻者所謂淅東戲文亂道不堪汙視者所謂假託神仙修養諸門下劣行怪者所謂談經訂史之膚碎所證不過唐宋之人所由不過舉業之書者所謂山經地志之荒誕塵遊宦歷之誇張者所謂相形祿命課卜諸技之荒亂者所謂前人小説資力己微更為剽竊潤飾茍成一編以獵一時浮聲者所謂纂言之凡瑣者所謂類書之復陋者所謂僧語道術之茫昧者所謂揚人善而過實專市己私毁人短而非真公拂人性者問祝子曰斯何惡而去之祝子不應又問子亦以科第之録場屋之業若贅疣然何不及之曰試録者國家用人之階彰勸之具是王章也非書也科舉之作士藉以應求今工之斧斤也抑亦非文也不足去又問所將去若是將不有甚於兹者乎胡不之覩曰下此者吾弗有之矣丹竈之方盜鄰也房中之猥者淫誨也房中非邪妄黃帝內素言之史志具之第今傳非故䇿悉穢妄耳妖讖之文吾耳目無接也吾安得有之而安得去之客出語人曰祝子悍哉乃將是嬴政而欲用之抑猶惡其聲徒口以侜我將毋復思假吾手以為政秉炬也乎學壞於宋論祝允明祝子曰凡學術盡變於宋變輒壞之經業自漢儒訖於唐或師弟授受或朋友講習或閉户窮討敷布演繹難疑訂訛益久益著宋人都掩廢之或用為己説或稍援他人皆當時黨類吾不知果無先人一義一理乎亦可謂厚誣之甚矣其謀深而力悍能令學者盡棄祖宗隨其步趨迄數百年不寤不疑而愈固我太祖皇帝洞燭千古令學者治經用古注疏參以後説而士不從也嗚呼試一閲兩漢魏晉六代隋唐遵聖之學其義指理致度數章程為何等精密宏博宋人之勞不見何處及之况並之又况以為過之乎此非空言可強辨解也明文海卷八十八
