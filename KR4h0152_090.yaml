body:
  text: 明文海卷九十餘姚黃宗羲編論七文論彭輅曹子桓曰文章經國之大業不朽之盛事因著典論詳列衆文之體又取建安諸子而褒刺其利病其為論美矣不可以復易矣昔伯牙妙音操而峨峨洋洋惟鍾子能耳會其神及鍾子之沒也伯牙至毁軫絶絃謂知音難再得也若夫窮鄙之社擊甕扣缶以為天下之樂莫已若也引而與之聆絲竹之希夷金石之哀越則吁愕而莫解故文者作之固難而知之為更難也昔周之東也文不在名物而盡在於觚牘之間天下學士各恣所欲言而無射䇿徇人之纍故自周衰迄於先秦文章之作於斯為盛由今考之左氏之為傳也若左珩右瑀步履合節安車間駟和鸞交應且事緒棼如約之不過數語而情理粲粲不遺直可懸金咸陽人莫能操管增損一字者誠宇宙之竒也屈大夫之為騷也鎔鑄風雅而更以新範憑陵震厲創往者之所無而其瑰辭儻調膏馨霑被後人日用之而不盡誠曠古之竒也蒙莊操其虛無謬悠之説散道德而放論之言無不暢其意而模寫衆竅足稱冥搜浩乎巨海重濤無復涯渚兹亦一方之竒也他如諸子百家脫秦灰而僅存者靡不吐自中臆故管不襲晏墨不軌老荀不勦孟孫不録苴彬彬乎其文矣夫彖象典謨巍巍聖人之經不可幾及過此則先秦其太上矣既而有漢之西京抑亦可以為次矣漢初惟枚乘所製大似七雄時人而洛陽年少肆筆成書內無乏思莫有攖其鋒者雖子長氏或稍遜而避焉惜乎二子篇章零落不克多見遂使子長席世史之業揚蹀躞之才獨步當年冠絶來葉殆以藏山之籍未湮而盈几之帙可諷也向使其盡如八書之殘闕無次人肯漫爾推崇也哉故文章之於世實有幸不幸也余謂先秦逼古不可以學地知而子長有本可以學力到也但其文騁騖縱橫捭闔變化所敘謀臣健將刺客俠士之迹皆曲悉其情態斫輪所謂得之心應之手詞波未至而意己􅀈湧橫陳於先矣故讀快意事則令人躍然喜讀不平事則令人裂眥竪髮怫然怒讀志操政行之淑則欣欣而慕欲與同遊讀讒夫邪佞之陷人誤國則切齒蓄憾欲投升豺虎如國工者之貌人形神從筆端躍出凡入乎其書者其人久而猶生固文之一奇也而本之戰國䇿之洄瀾疏節非出自創為則遷之竒亦有自也而次遷者其班孟堅乎班之漢書蓋過半窬掠遷史其餘則乃父叔皮氏與曹大家為之而固躬所摛撰僅十之二三觀諸兩都典引及賓戲之答筆力可以概見人或稱其採酌經緯藻潤雅馴要亦向歆之勍敵而揚雄之副亞也東都自崔蔡而下間已造為駢語浸淫乎晉宋齊梁力務比偶蓋江左之國士女多靚色冶容文物葳蕤儀觀照耀而銓文者似之競以新巧贍麗為佳而不喜遒徑風骨然非胸包充棟辭擅雕龍亦無厠於作者之林也惡可以俳而輕訾之哉唐人不逮六朝日以寖遠韓栁氏起而振之非復唐人之文駸駸兩漢之文也韓子浣猶江漢變擬鬼神常怪夷險倐忽錯互髣佛躡足煙霞之中控蒼螭鞭赤霆而與之下上也栁雖理不副韓而雄贍過之直輸指趣而不雜以浮遊支蔓凄乎其行二崤絶壁之間而風雨驟至也沛乎其馳八駿於西極之野絶塵而蹈乎空虛也韓之平淮毛潁信工矣尚有假於分架橫結栁必能為之栁之騷賦晉問諸篇出幽入祕精摛秀掞韓豈能之哉夫二子信唐之雋也而唐人之文概有可觀前之而王楊燕許李華蘇頲之流後之而元結杜牧之劉禹錫孫樵皇甫湜之屬或駢或散各有工拙高下均為遠行之文也不意至於弱宋而陵遲甚焉宋人無他技能惟長於著論工於上表宋所著名者曰歐陽大蘇大率歐平而弱讀之未終卷即昏昏思寐蘇略有西京風骨而傾竭無藴藉下此益疲薾而不奮矣噫宋其無文乎嘗試論之先秦西京之文秦中太華也東都六朝者峨眉劒閣也唐人者金陵錢塘也西京之於先秦其伯季乎東都六朝之於西京其父子乎唐人之於兩漢其祖孫乎繇宋而視唐以上則孫之遠裔與主人之臧獲矣而近之談者乃曰論文貴略其眉髮而究其神髓不知有秦中太華之形容必有秦中太華之精神氣魄彼峨眉劒閣之岏阻不能舒而為天府者其精神悍而蹙也金陵錢塘之卑坦不能突而為崇岡峻嶺者其精神緩而衰也即以人喻則項羽負扛鼎拔山之力其氣必軒雄蓋世而非樵汲之荷擔石可並也夷施趙燕挾絶世獨立之姿其神必澄瑩豐溢而非里婦之施粉黛可並也寧有眉髮都異而神髓不相懸者乎豫非能文者抽典論之末竭其狂斐然鍾期以賞音名而未必善為音豫雖不文奚其讓性習論彭輅孟子性善之論非其創始也繼善成性孔子言之降𠂻成性先孔子者言之宋儒疑性善為未備號於人曰氣有清濁故性有善惡又曰形而後氣質之性善反之則天地之性存焉又曰善固性也惡亦不可不謂之性性一也而有天地氣質之分宋儒承孔子性相近一語而衍其説而不知其有大繆不然也孔子但言性近不言性有惡宋儒顧揉而參之曰氣質之性有美惡不同孔子於人之善惡一舉而歸之習宋儒乃一舉而歸之氣識者譏宋儒舍習主氣之失悖孔戾孟之非而聖門正脈始蘇蘇更生矣今夫吾之有身自少而壯壯而老其念萬起萬滅其習萬徙萬變吾於一歲一月一日之間念起而滅不知其幾習徙而變不知其幾即為未久茍其習之不善而汚壞吾性者過甚則不易返厥初矣何待終身即終身之間汚壞之者愈積纍則愈淪落愈淪落則愈銷亡矣曰習之善不善人耶我耶曰所共習者人也習之而與性成者我也蓋吾少而觀之家長而觀之村聚里閭既而為諸生觀之黌序又既而注仕版觀之內廷外藩大凡子之習率類其父女之習率類其母至兄弟姑姊妹之相後先臧獲與主之所事使為習莫不皆然而惟朋友遊從其薰染尤速世未有交之得朋而淫比邪侈者亦未有交之匪人而能以度制欲以禮制縱者習善而心善心善而氣善氣善而性乃善習惡而心惡心惡而氣惡氣惡而性乃惡皆非氣質之罪也習之而臻于上智則不能移習之而成下愚則不可移非上智之不能移常恐其或至於移也非下愚之不可移暴棄而弗思其移也此皆習之為也且習不惟交遊也凡目之所及睹耳之所及聞胥有習焉散而論之有一家之習有一村聚之習有一郡若邑之習廣而論之不惟近地也九服區分寓其方有一方之習史記所稱汧雍重為邪三河纎儉中山椎剽邯鄲潁川任俠臨災勇持刺鄒魯好儒西楚矜己諾南楚好辭少信江淮剽輕而呰窳燕代雕悍懻忮者是也又逖而論之不惟近時也世代遞遷當其世有一代之習如夏願而僿商敬而鬼周文而靡西漢經術蘩蕪而好為長者東京氣節矯厲而吏治苛急晉清談而廢事梁苦空而廢刑唐詩藝而廢理是也又細而論之不惟既生也未生之前胚胎之內已有善不善之習而古者豫胎教有以也甚哉習貴慎也曰釋氏之論性有異乎曰無以異也禪宗授受曰見性曰明心此其最上乘也則吾聖門亦己微言之矣曰盡心知性盡之者明之也知之者見之也孰謂禪者為祕密神竒哉陽明曰聖學之妙後儒失而為二氏所得余則譬之富人有明月之珠偶亡失於外他日賈人持珠鬻於市富人子太息曰嘻世寧有此寶乎不知乃其家之故物也國脈論上彭輅聖主之治有形有脈知治而不知形失其所以治知形而不知脈失其所以形形者治象之可見者也脈者聖主之所葆以隱然克鞏其國者也脈何在乎曰人心是己人心所懷將在德也古者文王仁博於三分武王仁博於肇造原夫周之所以長世則姬公輔相之力也公之誨伯禽也曰惇親録舊任臣器能如是而己其用意藹然一出於忠厚公之治周即其所以治魯者也逮周之東天下列侯士庶靡不惜其衰而痛其亡也後王有能紹周之德則必配蒼姬之厯明矣下周而談治者其管子四民之説乎夫分人而各授之業其秀異者為士疏敏者為商技巧者為工蠢朴者為農愚智相越而情之欲惡則群然以一故養士憫農恤商勸工政之要務也古者藏富於天下後世乃以天下利而國之最下則以天下利而帑藏之而不知有天下周自六典外其取於民者僅什一耳乃今一切取之於田畝尚不足以應上之需而秉耒荷鋤者終歲刺骨慘然寡樂生之歡焉夫吳會之間京師財源也涸其源而欲瀹其流奚益哉此首當軫念者也商旅之在今日亦云艱矣趨而共者愈衆𣙜而稅者日殷行乎矛戟之畏途而什一之息皇皇焉其不易獲也則農與商交病矣農商者工之所與通什器者也此而既病則百工之技焉攸施之以故天下之人不論能與不能而惟士之為慕七雄之世不得己羅之於食客東京以來群萃於黌校方今羅以天府賢書高材擢異者無論矣試觀章縫之侣焚膏矻矻而或寡穎脫之文設若中道而盡擯之則弗能再理他業列高等廩食於公者乘其衰暮而絀其年資俾有後薪之凌前魚之泣則彼之曩時故嘗與洛陽年少爭鋒鍔者也而奈何以鬱咿終也漢制入資者得拜為郎名卿張釋之司馬相如假以奮迹頃聞太學之盛注籍者以萬數非前此𢎞德間比而解額不增於昔甚非所以長育而陶鎔之也又獄者聖王所慎不得己而用者也使者行部則必有刺訪然使者不能坐臆而旁採之或借聽於怨憎之談流傳之語傳云所見異辭所聞異辭所傳聞異辭以傳聞者而麗之辟是忍生人之命於草菅也民以寃抑之氣上干隂陽之和豈獨東海一婦哉凡此數者皆出臣工奉行之過非朝廷意也夫人心者國之脈也而天從之周漢而下以富饒雄往代者無如開皇大業之隋鞭笞九服蹂躪河華強兵徑馬攖突無前者無如全盛之金疆土廣大環鯨波蜃嶼窮荒絶迹咸入版圖設尉候而關柝之者無如奮起之元然而隋才再世而太社己墟金元俱不滿百年奄然倐滅天下之人覩其革命之際恬而安之求其顧砥道而出涕懷西歸以好音如靈王以後之周者吾未之聞矣何者君不愛其民民罔戴其君上下無聮維之素徒以區區位號控馭而操束之一旦掉臂而去無難也繇此而言國家命脈不在富強廣大而在人心之嚮附可知己善攝生者調其吸呼固其元真六氣之沴蔑從而攻之使違保攝之宜恣愈快之樂膚革充然而脈寖以澌泯則一蹶而仆雖扁鵲俞跗弗能救也國之延促猶生之修夭審大計者培其脈而己天以春為脈人以平為脈國以仁為脈民生周成漢文之代唐之開元天寶與宋慶厯元祐之日暨我朝列聖之熙洽皆春也秉國者法天之春生此遠方黔黎所以喁喁焉重有望於今日國脈論下彭輅今夫人焉耳目人也手足人也聲色笑貌人也豈形骸為之哉則脈為之也脈者榮衛之根呼吸之槖而精神之合也故其得以康寧而壽考偶或至於疚痾智者獨以為無患故越人氏曰越人非能生死人也其生者則自能生之何者其脈治也治國家者亦然四海九州萬國體膚也必有所以為之四海九州萬國者內庭外庭頭面也必有所以為之內庭外庭者百司庶府耳目四肢也必有所以為之百司庶府者紀綱法度聲音笑貌也必有所以為之紀綱法度者其盎然流衍磅礡與之淪洽其間而莫或閼遏則國之脈也脈非天之所為非人之所設則有國者自為之也邃古之世以無脈為脈皇之脈渾以醇帝之脈和以粹殷夏蒼姬之脈厚以藹故夫夏厯四百殷厯六百周厯卜年卜世益綿其鼎何三代有道之長也彼五霸驟興驟廢秦之慘刻焚坑促世其最下者也由此觀之自古國家世數之長短可見於此矣人之脈在元氣國之脈在士氣士氣昌則國昌士氣弱則國弱士氣削則國削士氣消則國消士氣亡則國亡國依於士士依於氣是氣也經乎古今而不為老塞乎滄溟而不為大揭乎日月而不為明凌乎泰山嵩華而不為高參乎寒暑而不為變順適乎恬愈淡漠之鄉獨立乎風靡波頺之際皆是氣之為也存之人則為元氣散之乎天下則為士氣善攝生者養一身之元氣善治國家者養天下之士氣如是而己矣昔漢之時天下之氣嘗昌矣王莽者出借六藝文姦言以箝天下之口以弱天下之氣而漢亡唐之時天下之氣嘗昌矣朱溫者出任一劒奮睚眥殺諸清流以絶天下之善類以折天下之氣而唐亡宋之時天下之氣嘗昌矣熙寧紹聖之紛紛起黨錮之禍一切目為黨人戮辱之以禁斥天下之賢人君子以消天下之氣而北宋亡東漢之云亡亦大率類此則士氣不振之故也夫國之治也拱揖談笑而有餘國之亂也紛紜馳騖而不足方鑑之未審幾之未定轉圜力挽而可救逮時勢之敗壞天運之往復則咨嗟噬臍而無及天下事以天下之心優遊而處之則裕以一家一人之心剛憤而處之則敗此必然者也我國家自肇造以來迄於今深仁基命涵喣培養天下之士氣者何昌且厚也夫茍從而憑陵之挫折之不得使舒布蕭然如風雨之蕩晴空然夫待士如此他於何有甚非所以長國家之道也奈何不為國脈計也春秋論彭輅豫讀春秋而知胡氏之傳鑿且妄也彼不得孔子之意而謬為之説者胡氏也夫春秋雖孔子所作乃孟子固己言之曰其文則史矣故句析而字屬皆魯史之舊文而其筆其削則裁自聖心之義也義出孔子書成於孔子故稱孔子作之云爾繇其著義垂訓大懼乎亂臣賊子是聖人無位者維傾戢亂之功故不曰定而曰作也彼魯史雖有舊文假令不經孔子勒定即悠悠然與乘檮杌並立俱廢孰知魯有春秋哉由此言之謂之作亦宜也春秋有為人君父之道焉有為人臣子之道焉所指為亂臣賊子者非必身陷篡殺甘心君父之謂也凡專政竊權擅興師旅僣王會盟締外交結黨與朘削其君之土宇人民以自封殖與夫負邑而要擁國而拒皆臣之亂子之賊也仲尼於是厯厯書之以垂世誡俾回僻之迹邪逆之名章灼於數百載之後若可得而戮骸汙墓罪及其後裔然者甚則拂其意而誅之抉其微而闡之故亂臣賊子以懼而罪我惟春秋斯當年之旨也或曰然則何以必其盡魯史之春秋而無所竄易哉曰昔周之先王詩書禮樂之澤漬液於天下海內賢者能識天下之大其不賢者猶識其小而魯自姬公伯禽日以秉禮之教礱厲其國人故魯多君子自古而記之况世居掌故之任者乎周自史佚而下多聞而蜚譽者曰儋曰克之流纚纚不乏齊之南史兄弟爭死其官則周齊之史固有足觀矣而世所最著稱者惟曰在晉有乘楚則檮杌是乘檮杌之善他史俱莫及也若魯之春秋其斟酌經緯藴藉囊括義密辭嚴刺鉞褒衮又超軼於乘檮杌之上故孔子睹其可采可據遂因而修之獨其二百四十二年之間彼以史為職者必巨細臚列捆托不遺聖人曰是蕪而賾不足以訓天下與來世故苐取其切於彛章政務之大所謂典敘禮秩服命刑討者而後筆之為書約之每嵗不數條餘悉在所削焉是故即述為作因史成經事半而功倍也審如胡氏之論曰聖人多革而不因安在其為文之則史哉胡氏者謂聖人道淵德博一屬辭比事輒異於人詎知是非之公野夫里婦所共有皆可以據事直書若魯之史臣其發凡起例立言之妙則所專攻而世習也夫孔子固神聖然耕不如老農藝不如老圃故使孔子而為詩必不能加於閭巷之謳吟婦女之哦諷如關雎芣苡草蟲燕燕諸篇也使孔子而為書必不能加於二帝之典三臣之謨與禹貢分州濬川之撰次也使孔子而為史必不能加於魯春秋之舊發凡起例專攻而世習也何者物各有其至至則何可以加也孔子之因舊文而無竄易者以此然芟刈訂𣙜僅存其百一蓋法以為權道以為衡隂陽以為端象緯以為紀聖心精藴參貫其間遊夏尚不得與而况於後之儒者又况於鑿以為儒之胡氏胡氏之鑿不可縷數吾兹得其槩焉其傳春王正月者曰以夏時冠周月夫孔子周人也修史之時非為邦之日曷為舍周正用夏時身冒僭亂之魁乎其傳西狩獲麟者曰文成麟至大近乎妖矣左氏親見國史者於隱公之元年傳之曰春王周正月及獲麟之事僅曰商鉏獲之以為不祥將賜之虞人仲尼曰麟也取之而己竊思獲麟之後世故傖儴譬之江河愈下仰視周平王之四十九年倐己更一古今運會此而不為絶筆將何所底止乎胡氏又動曰春秋天子之事無其位而操南面之權兹又妄乎妄者也夫申周天子之法以繩其下則盟會征伐出自諸侯大夫陪臣皆罪也霸者假尊王之名則姑有取焉何必託柄於素王恣意於誅絶哉吾故嘗曰胡氏之傳乃胡氏之春秋非孔子之春秋也靈識同異論吾謹虛而生靈靈之逐於知也而虛之性波蕩矣靈者無知也而無弗知也混冥純朴覺而周應此靈之所以全乎體用也是故窮高極厚而測神明之德萬類必陳而其始終各含夫至性譬如繭絲之各有緒也而咸能照而知之若有以見其四體膚毛而無待於推測也是非不周知也而去知之識則遠矣夫識也者物之誘而非虛靈之德也莊周曰物與物何以相遠也夫物膠於一隅而欲達萬物之性可得哉惟虛則達物之性自本自根一物之終始而紐貫之其照物之情若數一二三四也而物無能遁者矣是故天地雖大特形氣之粗也而物視之則無弗知者矣靈雖周知乎萬物固虛之自然之用而非有所異也彼無知者則其所以知之體也外其體而求其用以為達焉斯惑矣而况乎測求其萬分之末殫其神而逐物求知之則其所知也終薄矣斯不亦大惑哉今夫日月星辰之為文於天也風雨氣候之為變於中也山川道里之為列於下也草木禽獸之繁育于兩間也其運移次舍晦明遲速去留作止為祥為孽遠邇險易大小名數易氣變形化生弗常紀志之所博傳尚弗殫厥類雖以神禹子産之辨博且弗能窮其微設有能窮之亦何異夫量升斗之器計瓦礫而出入之哉是以古之聖人貴朴而不貴知純其性而遊心於至知古之聖哲知物類性德之不可以知數知也虛其神志養其知之本以求夫至知及其知也而弗以為尚也後之愚者逐事物之類而記之博之以載籍廣之以耳目欲以殫庶類之微而未得其概焉即其所深至而察之其所知之是非且不知其契乎道否也顧猶誇諸聾瞽者以為知不亦恥乎夫不喪其所以知之之性而羅天地萬物而照焉此虛靈之德也逐於物誘於知而知焉此情之識意之見也雖知焉弗知也而愚者每欲以情識意見測天地之理盡事物之類非惟不及知而固己喪其知之德矣心性論吾謹未有耳目不無厥心而心實生於視聽物生而象既象而滋滋而變焉而性亦隨之變故靜曰性動曰心動而靜曰神知神之所為者則弗以視聽喪厥心矣夫心無得喪而耳目有作止徇作止而因之為得喪可悲哉嬰兒而耳目具而未知視聽則未始動厥心也及其知視聽而動厥心矣動而弗息與物同歸夫然後曰喪心而不動之心果喪乎夫惟大成之人雖有耳目而不用其耳目故能復返於嬰兒悲夫世之悅生畏死者其弗知心之本也甚矣且人之貴生者貴其心之有知也貴其耳目之有聞見也而不知耳目聞見弗及者是亦若死而已矣奚必悅其聞見之所及者為生乎是故生死緣於視聽而視聽緣於物見物見而視聽作則曰生物隱而視聽止則曰死山川城郭舍廬妻子凡聲色可悅者見則愛而弗欲棄之其所不見者固不愛也見與不見之間遽以之為生死欣戚此愚者所以日競厥心而喪厥性也越人有贅於吳者生子未期而歸越及復往而子長矣遇諸津而弗識其己子也爭渡而毆之幾斃傍有知者告之曰若固爾子何毆之甚其人乃大戚以悲當其毆之也未嘗不為父子也及其戚之也未嘗始為父子也而先後憎愛異者知變於物而情動於中也若乃遺視聽忘愛憎一智之所知者固有是乎哉故曰至人不緣物不喜求視得若失人貌而天若然者其心既不逐物而生矣顧安得而死之哉明文海卷九十
