body:
  text: 明文海卷九十四餘姚黃宗羲編論十一太極論陸􅀈太極之辨自朱陸後若不可置喙客復有以為問者豫疏答之然非敢求異也姑存所疑為論尚請正於君子孔子曰易有太極太極其儀象卦爻之會乎在造化則一氣之渾淪者耳由一氣之渾淪者分之為隂陽又分之為五行為萬事萬物統言之則一氣一物也會歸所在正如屋之有極故名太極以此言之太極不可訓理不可謂形而上者蓋既名太極矣而兩儀以下乂不過即此以分之特離合之名異耳非有他也太極既可以言理則兩儀以下獨可以言器乎蓋太極而兩儀而四象而八卦以至於萬事萬物之彚莫不有條理焉其自然而不容已當然而不可易所謂形而上者合於一而一之所以為一者理也散於萬而萬之所以為萬者理也是其不能外形器以有見而亦不可滯形器以有求此則理之於氣本無先後彼此之别者然非謂太極也若認太極為理則儀象之生咸自於太極故不得已而有理生氣之説又謂沖漠無朕之中而此理已具則其説理似稍懸空矣其不善學者遂至𡨕思妄想以求所謂太極於天地萬物之先其不流於老氏之論幾希大儒朱子反覆辨解雖其所以訓理者則是然恐非太極本旨而詞説纒繞宜其無以服陸氏之心也要之周子之於太極亦就隂陽之未分者言故曰太極動而生陽靜而生隂又曰隂陽一太極太極本無極也朱陸海瑞朱陸之論定久矣何自而辨之辨之以吾之心而已維天之命其在人則為性而具於心古今共之聖愚同之得此而先堯舜禹有危微精一允執厥中之傳得此而後孟子有求放心先立乎其大之論未有舍去本心别求之外而曰聖人之道者軻之死不得其傳而人心之天則在也孟子曰大人者不失其赤子之心者也恃有赤子之心故雖出之千百載之前其事千百載之下可以一言而定陸子門人問陸子學以何進曰得之孟子則精一執中之旨陸子得之矣乃朱子其學則異於是大學致知在格物借之為誠意正心之用也猶之惟精乃惟一之功明善乃誠身之功功在格致道在誠上朱子篤信大學平生欲讀盡天下之書議盡天下之事引而伸之觸類而長之天下之事畢矣天下之書可得而盡讀之乎事可得而盡議之乎韓退之原道言誠正不及格致朱子指為無頭學問是以格物致知為大學頭一事矣入門一差是以終身只做得大學先之之功不盡得大學後之之益無得於心所知反限王陽明謂晦翁氣魄極大合下便要繼往開來少年已著了許多書然則此非其誤認之故毫釐之差而為千里之謬者乎夫顔子曽有一著述乎聖人以其躬行心得之餘出之於威儀文辭之末富於中見於外不可強而亦不得而飾也心齋坐忘不遷不二顔子之著述大矣舍去本心日從事於古本册子章章句句之好勝之私心好名之為纍據此發念之初已不可以入堯舜之道矣聖人不廢學以為涵養是以中庸有尊德性而道問學之説賢人而下不廢學以求復初是以孟子有學問之道求其放心之説子思孟子傳自堯舜陸子識之然陸子不免應舉子業即其語録文集年譜可見餘力學文尚不如是也自傳心之法視之猶俗學也朱子反謂其專務踐履盡廢講學輪對互劄言涵心性乃自其所心知者出之如孔子答哀公修道誠身孟子告齊梁仁義孝弟亦推本之論也朱子答之書而戲之云這些子恐是蔥嶺帶得來天下之人只一性命而事物在焉朱子只要人讀書講説研究於外豫不知朱子之所謂矣儒學禪宗其判不啻千里而要其初只是毫忽儒道寂守其心中涵事物有天下國家之用禪宗廢棄百應徒為空虛寂滅之養朱子指陸為禪然則將不講其心就外為家國天下之用呻吟其占畢而曰某章某句如此某章某句如彼然後為能學歟顏子終日不違如愚夫子以道統寄之生丁朱子之時言論相及不知其如之何而為禪之詆矣陸子不免少溺於俗然心知其然平日拳拳以求放心先立其大為教聞彼也自聞而已見彼也自見而已猶得之朱子則楚辭隂符參同契韓文皆其年年月月訓詁之册不知此一訓詁何日而已也末年之悔謂令此心全體都奔在册子上若有得矣而先入之深讀書為主而待其餘未見其真能脫去舊習收功一原也危疾一日前猶解誠意章深溺於誦説沒身不復聖人六經躬行心得之餘為之飬盛之充因著其用朱子則極意於此讀書為先求心反為後繭絲牛毛識者以集大成歸之謂擇諸家之訓釋而纂其長則亦可矣謂道在是則周元公或可而朱不然矣説者又謂朱子羽翼六經嘉惠後學其功不淺夫朱子自少至老無一日不在經書子史間平生精力盡於訓詁而其所訓又多聖人之經賢人之傳也夫豈得無功於後聖真以此破碎道一由此支離又不能不為後人之誤功過并之而使人繁於枝葉昧厥本原其過為大三代而後學之陷溺如朱者比比然也朱子欲以其學為天下宗天下亦以此信宗於朱子故豫不及其他獨指朱子為過陸子謂此老平生志向不汩於利祿當今誠難其匹夫朱子豈不知心之為大而求之心哉誤認格致為入門指著述為功業途轍既乖所得隨之韓退之因文以見道而非明道以為文日月至焉而已矣無乃朱子過歟欲往京師心識國都之所在行逺自邇計日可到懵於定向執途之人而訊之岐路之中又有岐焉訊之所不及失之矣大抵天下得意忘言區區於文義講説之間真趣薄矣深造自得者當見之顔子默契道體孔子豫欲無言天淵禪學而其致虛之篤一而已矣然則朱子無乃得言而自薄於其意無自得之則居之安資之深之益日從事於故紙堆中外強中乾吕東萊謂銖銖而析之寸寸而較之無復有詩矣朱子之謂矣朱子平生誤在認格物為入門而不知大學之道誠正乃其實地以故一意解書其解書其論人心術見焉謂司馬溫公只恁行將去無致知一假朱子日日經史其不滿於實心實事無私無黨有餘力而後文學之君實無足怪矣大凡人言語文字皆心為之陽明致良知其釋經不取朱子之説者多説在心性上朱子釋經全説在多學而識上陽明鶻突其説誠有之然猶不失為本原之養也猶第一義也朱子則落而下之離而去之矣道問學之功為尊德性而設與孟子學問求放心同義朱子解之曰非存心無以致知而存心者又不可以不致知闕正諸儒入膏肓之病也使在周邵聞之喜過而樂與之矣孝弟忠信常不足以應天下之變而才術辨智常不足以定天下之經亦此意也朱子遺婺人書乃謂諸君子聚頭磕額理會何事乃致有此等怪論少見朱陸交惡録齊則失矣楚亦未為得也光風霽月灑落襟懷有如周元公邵康節其人者寧有此言説舉措耶情見乎辭行如其心涵飬未融克伐為纍晦庵不能無大不滿於後學之意矣後人為朱陸之議聶雙江以黨同伐異挾勝崇私言之然當其時門弟子則已然矣豈非朱子身自作則一時門下習氣而又因以貽之後乎自宋至今五百餘年是朱非陸所在羣如也正雙江黨伐挾崇之謂陽明之所稱今之尊信晦翁無異於戰國之尊信楊墨也抑何從而辨之乎孟子曰是非之心人皆有之請以是為朱陸之辨天下之勢最患於成張居正天下之勢最患於成成則未可以驟反治之勢成欲變而之亂難亂之勢成欲變而之治難譬之霖潦之時淡雲薄霧皆足致雨雖日光暫吐旋即彌覆隂之勢成故也亢旱之歲日光酷烈潤氣全消雖雲靄旋興旋即解散熯之勢成故也夫亂非一日之積也上失其道民散於下貪吏虐政又從而驅迫之於是不逞之徒乘間而起堤防一決雖有智者無如之何矣夫吏之被訐也以虐政毒民然茹其毒者恆不能訐吏而訐吏者皆武斷鄉曲素不畏官法者也盜之起也以迫於飢寒然飢寒者不能為盜而為盜者皆探丸亡命喜亂好鬬者也彼方含毒挾刃以鬭一時之釁而為人上者又以亂政驅之藉其怨憤無聊之心以鼓其好亂不逞之氣飇至火烈一旦遂欲撲滅之能乎故識其幾而豫圖潛消之上也不幸而至於是在上者有人引咎罪已拯罷困之民誅貪賊之吏使天下之人係心於上而未暌離則盜賊之勢孤而應之者少數年之後根本漸固人心漸安不逞之徒其忿已泄而其勢日殺庶可解散耳然至是國家之元氣十損八九矣故勢之未成中材可以保圖勢之既成智者不能措意賈生之論曰借使子嬰有庸主之才僅得中佐山東雖亂秦之地可全而有此不揣事勢之言也夫天下怨秦久矣當此之時雖伊吕何益乎天下之事極則必變張居正天下之事極則必變變則反始此造化自然之理也堯舜已前其變不可勝窮已歷夏商至周而靡敝已極天下日趨於多事周王道之窮也其勢必變而為秦舉前代之文制一切剗除之而獨持之以法此反始之會也然秦不能有而漢承之西漢之治簡嚴近古實賴秦為之驅除而貢薛韋匡之流乃猶取周文之糟粕用之於元成衰弱之時此不達世變者也歷漢唐至宋而文敝已甚天下日趨於矯偽宋頽靡之極也其勢必變而為元取先王之禮制一舉蕩滅之而獨治之以簡此復之會也然元不能久而本朝承之國家之治簡嚴質朴實藉元以為之驅除而近時迂腐之流乃猶祖晚宋之弊習而妄議我祖宗之所建立不識治理者也三代至秦渾沌之再張居正三代至秦渾沌之再闢者也其創制立法至今守之以為利史稱其得聖人之威使始皇有賢子守其法而益振之積至數十年繼宗世族芟夷已盡老師宿儒聞見悉去民之復起者皆改心易慮以聽上之令即有劉項百輩何能為哉惜乎扶蘇仁懦胡亥稚蒙姦宄內發六國餘孽尚存因天下之怨而以秦為招再傳而蹙此始皇之不幸也假令扶蘇不死繼立必取始皇之法紛更之以求復三代之舊至於國勢微弱強宗復起亦必亂亡後世儒者茍見扶蘇之諌焚書坑儒遂以為賢而不知亂秦者扶蘇也髙皇帝以神武定天下其治主於威強前代繁文苛禮亂政弊習剗削殆盡其所芟除夷滅秦法不嚴於此矣又渾沌之再闢也懿文仁柔建文誤用齊黃諸人踵衰宋之陋習日取高皇帝約束紛更之亦秦之扶蘇也建文不早自敗亦必亡國幸賴成祖神武起而振之歷仁宣英憲孝皆以剛明英斷總攬乾綱獨運威福兢兢守髙皇帝之法不敢失墜故人心大定而勢有常尊至於世廟承正德群姦亂政之後又用威以振之恢皇綱飭法紀而國家神氣為之再揚蓋人心久則難變法之行不可慮始即有不便於人者彼久而習之長而安焉亦自無不宜矣三代惟商之規模法度最為整肅成湯伊尹以聖哲勇智創造基業其後賢聖之君六七作故國勢常強紂雖無道而周取之甚難以文武周公之聖世歷三紀始得帖然順服蓋天下之歸殷久矣余嘗謂本朝立國規模周以下逺不及也列聖相承綱維丕振雖歷年二百有餘纍經大故而海內人心晏然不搖斯用威之效也腐儒不達時變動稱三代云云及言革除事以非議我二祖法令者皆宋時姦臣賣國之餘習老儒臭腐之迂談必不可用也酒德論汪道昆昔都人之飲客者非婺不甘比年鬻婺者半至人謂中山以下若吳醴楚瀝其地屢遷將婺以遷德耶何今之婺非昔之婺也余居婺且久蓋嘗習之即今之鬻者果必皆良其良者猶故耳始都人無善酒必以婺為上尊頃之則酤者良矣其後王公貴人鬬其供具監六物而求其良焉即婺之良曽不以當醴盞况粢醍乎哉余聞𢎞治中羣臣奉職無闕退朝則相與講業故文事興今上端拱而治百執事無夙夜之勞日飲而醉是故酒德茂此治徴也楚好戰故堅甲在楚韓好兵故利兵在韓然則今之所服者必楚之甲韓之兵也婺何有焉理氣論侯一元子曰豫欲無言自漢以下抑何其言之多也然訓詁而已雖云無益而亦無害若談道而多則吾懼道術之為裂也夫緩使弟墨卒以戕緩君子歎之可不慎哉夫隂陽氣也一隂一陽氣之自然所謂理也猶木之有文理絲之有條理也而文理豈離木哉去絲又安得條理哉今曰先有理而後有氣又曰氣成形而理亦賦焉則若二物然者此後學之所以疑也或曰無人之區而人生焉無魚之水而魚育焉非其先有理哉曰不然也氣之未滋固無由而見其條理也氣之既滋則即此而條理粲然寧有所待哉故人心道心名異而心一也天理人欲情異而行同也仁固惻隱也義亦惻隱也非惻隱則焉有辭讓焉有是非分之則四合之則一而已上蔡得玩物之言而面發赤程子以為惻隱之心心寧有二哉或曰人之與物所同者氣也所異者非理歟曰非也人有人之理物有物之理莊子曰惟蟲能蟲惟蟲能天言盡其天也聖人與我同類而惟聖人能盡其天故曰踐形既謂之人矣氣雖有清濁也有厚薄也獨如其理之一何哉故曰論氣論性二之則不是程子則可謂深於理也已墨佛論謝廷讚世有消豪傑征邁之氣而柅愚不肖馳騖之心者則墨佛之教是也今夫秦之為長城也至寢處人之骨飲人之血而曽不姑息故將曰使子孫萬世為王讖緯之説曰亡秦者胡而不知胡亥生於離裏嗟夫堯舜之天下不傳於朱均而後世推聖劉裕以儉風其孫子而後世之孫子且曰田舍翁得此已為過也然則墨者之兼愛非乎記不曰慈者所以使衆乎父子天性雖不論報施而為蝎為牛少得錐刀之贏以為固然此田舍翁之説也故墨者兼愛非曰使至親如路人也執塗之人而親之也四海兄弟豈弟父母亦非邪夫秦之長城安在也張禹之哀憐其少子願補黑衣之數又安在也以為跖實故為君者寧菅蒯其民為長城為積貯為臣者寧朘削為墨吏拄吏議曰為其子孫不知轉盼如截道之猋試問桃源天台諸人陵谷變遷遼東鶴返子孫尚有涕泣而迎之者乎孝者尚惻愴一抔之土不肖者至市其陵寢粥其題輳矣此佛氏之所以空一切山河大地也豈惟世界空亦世念空我不空之自有空之者故墨氏之兼釋氏之空猶賢於蟻之夤緣與夫蠅之羶聚者彼賢智之士聞若説也者必將絶聖棄智而世界一切俱幻故若語不可使聞於賢智愚不肖之人聞若説也者曰吾毁其身汚其名競錐刀以貽所不知何人得我者以為固然而吾殆幾於非人其亦夫有悛心故曰墨佛之説不可為而不可不為也是銷賢豪征邁之氣而柅愚不肖馳騖之心者也性論王漸逵性至難言也必原於天遡於命驗於人衷於聖會於心放之天下準之古今而皆合焉斯得之矣是故性至難言也得其要一人論之而有餘不得其要千萬言演之而不足性果可以易言哉吾嘗即古今之論性者而折衷之商書曰降衷下民若有恆性詩曰民之秉彛好是懿德劉子曰民受天地之中以生此以理言也易之大傳曰一隂一陽之謂道繼之者善也成之者性也子思子曰天命之謂性率性之謂道此亦以理言也記曰民有血氣心知之性則墮於氣質矣在孟子之時有為杞柳之説者矣有為湍水之説者矣有為無善無不善之説者矣曰食色性也又曰生之謂性此又專以形質而言也孟子之後有荀子荀子曰人之性惡其善者偽也荀子後有董子董子曰性者生之質也董子後有揚子揚子曰人之生也善惡混修其善者為善人修其惡者為惡人揚氏之後有佛氏佛氏曰作用是性夫荀子之言是專夫氣之偏塞者言之也生之質氣也善惡混亦氣也作用者知覺運動之謂也亦以氣言也唐時有韓子韓子曰性有三品蓋酌乎荀揚之間者也宋時有周子周子曰性者剛柔善惡中而已矣又有眉山蘇氏蘇氏曰古之君子以可見者言性皆性之似也蘇氏之後有胡氏胡氏曰性者天地鬼神之奧善不足以名之孟子言性善猶佛所言善哉贊嘆之辭也胡氏之後有象山陸氏陸氏曰人之性惡告子論性強孟子斯又黨於告子者也夫言三品言告子論性強孟子氣質之説疑之也剛柔善惡之中中性存焉雖未離乎氣而已别乎氣矣可見者性之似以吾心之不測言之鬼神之奧以吾心之至虛言之也嗟夫盈天地間理氣合一而已矣太極者理也隂陽五行者氣也人之生得乎太極之理以成性得乎隂陽五行之氣以成形故太極之理落在人心則為之性本無不同也但人稟於隂陽五行雜揉不齊則有昏明強弱之異耳故程子謂論性不論氣不僃論氣不論性不明夫性善也蔽於氣則昏矣故性猶寶珠也落之清水則明落之濁水則暗是水之清濁不齊而珠之明暗以之然終非水之所能溷也過則明矣故孔孟後千百年而得張子程子張子曰有天地之性有氣質之性善反之則天地之性存故氣質之性君子有弗性者焉張子之言又足程子之所未足也雖然程子以性言性而氣質歸之氣質則亦張子弗性之意矣即是而觀孟子子思以上論性是舉其上焉而論之也所謂生之理是也荀揚諸子是舉其下焉者而論之也所謂氣質之渣滓是也胡氏蘇氏之説又以虛靈竅妙言之則涉於佛矣周子之中所以别乎氣而言之矣噫張子程子既發於前而朱子又分析於後世無二三子則性善之論終或疑之而氣質之説諸子可以自解矣雖然程子以性氣對言張子以天地氣質互舉則以氣質為性者尚未脫然所以致後世之紛紛者吾猶憾焉愚則曰具於心者謂之性成於形者謂之質則性固性也氣質固氣質也性則至善氣質則有昏明強弱之不同焉以是而言則性不混於氣質而氣無與於性是故不必謂不僃不明不必謂君子有弗性之論而使天下曉然知吾性之本善聖賢可學而至氣質雖有昏明可善反而復之則天下之性一天下之性一則天下之見一天下之見一則天下之論一矣愚蓋以此而足張程未足之意以證古人性善未疏之旨好名徐應雷今人見孝友忠信高潔超曠慷慨義烈之士弱者不知自愧而訝人之能強者頗知其愧而忌人之能輒加以好名二字蔽其生平於是談道講學者動輒曰當剷盡名根噫何言之易哉吾未見有好名者也記得有談某名公由翰林外補官滯外臺近日病甚某名士曰此公文章人品俱卓獨名根尚在未得賜環是故病甚余時不敢言而心哂之曰嗚呼憒憒此何與於名根有談某禪師使人諷某名士某名士往拜者余曰禪師果真心實行那得爾某名士曰禪師獨名根尚在耳余時亦不敢言而心哂之曰嗚呼憒憒此何與於名根有談某名公不得會元某名公不得狀元終身不懌者曰名根尚在余時亦不敢言而心哂之曰嗚呼憒憒此何與於名根又見一大家議葬録乞甲撰墓志乙撰葬表乞丙撰傳則又議乞丁撰傳戊撰誄則又議乞已撰誄乞庚撰挽章則又乞辛壬癸撰挽章余曰何不憚煩如此其家子孫曰吾恐丁已辛壬癸之愠也余曰彼家葬録無求於我吾省一事吾省一畨曲筆諛辭吾甚安佚何愠之有曰丁己辛壬癸名根重嗚呼此又何與於名根凡此數者非名根未剷也乃不及於名者也其名根尚埋藏九地之下者也夫世以孝友忠信高潔超曠慨慷義烈之士為好名猶可乃至舉一切鄙陋齷齪之情態而目之曰好名吾不知所好何名名者何物也孔子曰立身行道揚名於後世屈子曰老冉冉其將至兮恐修名之不立賈子曰烈士殉名是故吾未見有好名者也文士徐應雷夫一世皆意不可一世吾不知誰可一世者一世誰可者哉蓋意不可一世者一世皆然文士為甚顔介曰一事愜當一句清巧神厲九霄志凌千載自吟自賞不覺更有傍人斯小才而氣浮者也彼得意則客氣橫溢不得意則怨天尤人得意而無厭則亦怨天尤人故常意不可一世其志不在高山流水本非伯牙也而謂一世無子期其聽不能察峩峩泱泱本非子期也而謂一世無伯牙才如禰正平必不待孔北海以顯彼非禰正平也而謂一世無大兒孔文舉小兒楊德祖夫世無孔文舉楊德祖何與吾事也甚矣文士之急知已也獨不聞老子曰知我者希則我貴矣張仲蔚博物善屬文所處蓬蒿沒人時人莫識唯劉龔知之而已揚子雲草太玄衆人不好也獨桓談以為絶倫夫以一世之大而并無劉龔則仲蔚益尊矣并無桓談則子雲益貴矣彼不求可知而急求人知惟求知愈急而人愈不知則意不可一世之無知已古人抱獨知之契以俟知已於後世揚子雲之草太玄蓋後世有揚子雲必好之也師曠之欲調鍾謂後世有知音者也彼急於求知者惡能待後世哉且後世無知音者而師曠之聰無窮也後世無復楊子雲而子雲之玄不朽也張季鷹曰使我有身後名不如即時一杯酒林君復詩就藁輒棄之曰吾且不欲以詩名一時况後世乎是故雖遁世不見知有以自娛而何以後世為而又何以一世為哉且即欲求天下後世之名乎陶隱居讀書萬餘卷一事不知以為深恥顧惜光景老而彌篤文士如此何敢意不可一世且即無一書不讀無一事不知乎宋杲曰讀書少無明少讀書多無明多又曰官小人我小官大人我大則才大者人我尤大然則有大才讀書多而意不可一世者其無明多而人我大耶鴻烈曰不小學不大迷不小慧不大愚夫未聞道而博學者猶小學也安得不大迷不能行而多文者猶小慧也安得不大愚然則有博學多文而意不可一世者其大迷大愚耶凡意不可一世者固一世之所不可也而何以不可一世哉是故吾意滿可一世而亦意不可一世之意不可一世者也然則文士有以文章蓋一世者則何以視一世曰以文章蓋一世者必不以文章為事不以文章為事者必不以文章意不可一世也南華以世外不可世間靈均以獨清不可一世之皆濁陶元亮以無欲不可一世之多欲子長太白子瞻以超上不可一世之齷齪數君子皆出世者也其意所不可以維世曽何文章蓋世之足云名士徐應雷所謂名士者非姓名流傳人人皆知其名之謂也蓋有天下萬世皆知其名不名名士夫伯夷叔齊之與齊景公也一則民到于今稱之一則民無得而稱焉然天下萬世莫不知有齊景公者豈可謂伯夷叔齊名士而齊景公亦名士乎司馬君實之賢也兒重誦君實走卒知司馬豈非天下之重名哉然同時公卿大臣其勢力之盛亦能使兒童走卒皆知其名豈可謂皆天下之重名乎博學能文章者或幾與名士齊名而不名名士庸惡詩文偶然流傳人間者不可謂不朽之業推此以類天下萬世皆知其名而名名士者甚鮮也彼徒以科第仕宦為成名以交遊遍海內冠蓋車馬充其門者為名士何也吾獨有感於古之名名士者袁侍中謂韓康伯門庭蕭寂居然有名士風流袁粲每經傅昭户歎曰經其户寂若無聲披其室其人斯在豈非名賢夫名下豈有間人而曰門庭蕭寂而寂若無聲無乃不知名者也則古之名名士非若今之名名士邪王孝伯言名士不必竒才但使常得無事痛飲酒熟讀離騷便可稱名士夫痛飲酒何關於名而常得無事又無乃不知名者也且人知飲酒讀騷之名名士而不知常得無事之名名士甚矣其不達於孝伯之旨之輕重也王太尉問眉子汝叔名士何以不相推重眉子曰何有名士終日妄語夫名下應接勢必終日妄語而何以謂終日妄語非名士也王濟輕其癡叔湛所食方丈不以及湛湛取菜蔬對食晚與談易始知之歎曰家有名士三十年而不知濟之罪也夫三十年不能使從子知而何以驟名名士也崔瞻在御史臺獨食僃盡珍羞有御史姓裴者伺瞻食造之瞻不與交言亦不命匕箸明日裴自攜匕箸就食瞻謂裴曰昔劉毅在京口冒請鵝炙豈謂是耶君定名士此何以名名士吾以為客自攜匕箸就主人食者名士而主人不命匕箸亦名士也御史自攜匕箸就御史食者名士而癡叔取菜蔬對從子方丈食者亦名士也其傲然不屑一也由此觀之所謂名士者必非姓名流傳人人皆知其名之謂也然則士有五十無聞沒世不稱者亦可謂名士乎曰不可吾嘗覽故太史陶氏所撰題名記推夫子聞達之旨以論士曰達者為士聞者非士聞猶非士况泯焉無聞者哉吾嘗太息以為名言今不特在家在邦之聞乃至於天下萬世皆知其名且不名名士而况於五十無聞沒世不稱者哉且今人謂五十無聞沒世不稱者與草木同腐吾嘗笑之夫草之萋萋木之欣欣令人欣賞悅玩無已彼五十無聞者必不如草之萋萋也沒世不稱者必不如木之欣欣也此草木之不如而謂與草木同腐則不可彼其中豈有名士乎然而五十無聞沒世不稱者或能使人人皆知其名未有名士而不名者也故一鄉一國皆知其名不名名士而一鄉一國之名士必有一鄉一國之令名天下皆知其名不名名士而天下之名士必有天下絶盛之名萬世皆知其名不名名士而萬世之名士必有萬世無窮之名蓋姓名流傳至天下萬世皆知其名者僅知其姓名而已初非令名與絶盛之名無窮之名也惟名士必有令名與絶盛之名無窮之名茍非有令名與絶盛之名無窮之名不名名士而所以名名士又非令名與絶盛之名無窮之名之謂也何以故名士之名非名譽之名也名節是也名與實對苟有其實斯曰名士猶曰名教名理名言云爾炳若日月之謂名教通乎神明之謂名理至當不易之謂名言超然不凡之謂名士明文海卷九十四
