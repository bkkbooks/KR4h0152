body:
  text: 明文海卷九十五餘姚黃宗羲編論十二廣諡論徐師曾國家有大柄焉賞罰是矣國家有大典焉諡法是矣賞罰者一時之榮辱也諡法者萬世之榮辱也夫賢而賞不消而罰理之常也然賢者或不幸而罰不肖者或幸而賞則是非之辨不明勸懲之典不著而人主鼓舞天下之術于是乎窮矣聖人知其然而又不可無道以變通之也是以作為諡法以濟之賢者不幸生前罹罰而死後獲美諡則足以為萬世之榮不肖者生前幸賞而死不免惡諡則足以為萬世之辱嗚呼一時之榮辱世俗驚焉然而甚輕也萬世之榮辱衆論定焉斯乃甚重也人情安肯冒一時之榮而甘萬世之辱哉古者臣子於君稱天以諡且猶不敢徇私故有幽厲桀紂之號况君之於臣乎國朝賞罰當矣間有見稱於生前而不能無議於身後者則諡法誠不可緩也太祖初興未遑此務故惟藩王武臣有諡至成祖始諡文臣是後被賜者多然或緣奏請或出內降不由考功不牒太常豫者享美譽不豫者免惡名國家二百年文治隆洽而於此顧有不數數然者愚竊怪之豈其别有大焉者而不屑此與抑或吝惜而不豫也夫古所謂諡者兼美惡而稱之也是以有榮有辱可勸可懲若豫者享美譽不豫者免惡名則榮幸冒於生前辱不及於身後猶廢諡也諡既廢矣將必專恃刑罰以懲惡而可乎愚竊謂今在內則府部院寺五品以上在外則方面諸臣皆當有諡或仕或罷沒必申報考功司江南道稽查在任功過評隲人品高下移文太常撰議奏請然後吏禮大臣審定覆題不由閣擬不從中制使天下曉然知賢者雖抑而必伸不肖者雖伸而必抑則勸懲之機風動海內顧有出於刑賞之上者何憚而不為哉或曰古者生無爵死無諡如子之言不幾於濫乎愚應之曰不然古人所謂爵者有二書曰列爵惟五此以公侯伯子男為爵也孟子曰公卿大夫此人爵也此以公卿大夫為爵也况周人稱爵下逮命士豈必分土析圭然後為爵也方今京朝五品以上在外方面諸臣列於大夫非特周之命士而已以應諡法何名為濫安得謬引曲説而沮古今之大典邪驛傳論上徐師曽驛傳之疲起於借關借關之弊起於立法之太嚴朝制員役非公差不得乘傳而進表應朝督解之類又不得列於公差其它以私事行者必大臣奉特旨而後可其法嚴矣夫法太嚴則情有所不堪而勢有所不行故往往逸於法外雖欲禁之不可得也今百官往來於途大約有六一曰赴任謂除官赴任服除赴任遷官赴任調官赴任謫官赴任二曰給假謂給假省親給假展墓給假送父母還鄉妻亡給假送幼子還鄉給假遷葬給假歸娶三曰回籍謂飬病回籍丁憂回籍致仕回籍四曰赴京謂考滿赴京注選任滿赴京五曰起復謂病痊起復丁憂起復六曰還京謂諸給假還京諸如此類自進士恩廕以及舉貢京官有不乘傳者乎自祖宗來專用符驗符驗例得分給齎奏舍承由是生借關之弊及東南用兵增置火牌而其弊滋甚厥後更為勘合行未幾年弊復如故則是終不可禁也夫其不可禁者何也勢使然也蓋行旅之難不在廪餼而在募夫募夫而不先豫之直則不肯應募先豫之則中道而逃非遇親識為有司倩使代募鮮有得其力者嗟乎親識有限焉得在在而遇之如必令自出錢而官為之募是令有司怠棄民務朝夕惶惶為牙儈之事而已可不可也夫官募不可則雖禁之而勢有不能徒令恩澤不出於朝廷而臣下自相為市也愚以為百官往來如公差進表應朝督解四項兼豫廪夫其他赴任六項則明開某官某為某事自某處啓行至某處而止或水或陸各注所由由水則但給夫而革其廪餼由陸則既給夫馬仍具饔飱蓋饗飱之費省於廪餼若使沽飲食於村莊市肆之中非政體也夫然將見館人得供億之中行旅免雇募之苦豈不兩利而俱安乎往余待罪兵科翻閲録本見有上言其事者與愚意大略相同然竟為大臣所抑寢閣不行夫不行者大臣之私非體國之誠也何則大臣僕𨽻日傍午於途中上者冒公子下者充舍承冒公子則以指揮千百户等護送為名充舍承則以齎奏疏齎軍册為名行符驗則借分關行勘合則借勘合恣情需索莫敢誰何前法茍行則此輩非官何敢詐冒縱令詐冒不過舍承耳其與幾何愚故曰大臣之私也如使懷體國之誠則必行核實之法俾恩歸主上弊絶權門百官之往來有限驛傳之應付有時需索不行民自受賜何必膠故襲常徇大臣之私而坐視其弊哉驛傳論下徐師曽驛傳敝於需索其最盛者宗室宦官焉耳自餘則館人行旅迭為強弱彼此低昂勢若持衡然嘗見行旅之強者矣廪夫貼舟徴至倍蓰既豫廪矣復索看廪錢既給夫矣復索折夫錢他如捲簾䉡鑼船頭伴當名目種種不一稍不如意則捽首而束縳之捶撻之縣繫之必填溪壑之欲而後止館人無如之何是謂行旅強而館人弱大臣之不飾簠簋者然也又嘗見館人之強者矣有鐍門走匿莫可蹤迹不能久待而去者焉有閉户登陴挂錢豫關無由校論而去者焉有持梃奮摶訟音公言抗拒不敢與敵而去者焉比其既去則越程抄關駕言應付乾沒夫廪徒費徭户行旅亦無如之何是謂館人強而行旅弱庶官之勢力不逮者然也夫行旅雖強可以亷恥諭可以刑罰懲處之易耳至若館人禁之弗止罪之弗悛良由無籍之徒窟穴其中視職官如辨髦以徭户為竒貨甘刑憲如飲食寧死而不忍舍也愚觀設驛大抵並音傍州縣之治則有檢束在遼曠之鄉則無忌憚今宜不計道里逺近苐循治所而設之雖云稍遠卻蒙實惠其他隔離州縣者一切革罷又廪餼不市本色時估折金定以三等縣官印緘付丞吏饋之則乾沒之輩久當自散近時賢令有行之者此可法也夫不必多但禁勿逃人立一牌量舟大小以牌豫之須到點給及其代還縣官審驗無牌可驗者杖而追其直近亦有行之者此可法也若然則徭户但令出金不必身親至驛夫絶虛名途無滯客不資之費什省五六矣而又宗室申嚴祖訓宦官無得濫差驛傳之病庶幾其有瘳乎均役論徐師曽國朝役制首先論丁見於洪武四年詔令者可考也厥後兼論丁糧然未聞專論糧也邇來有司不原祖制凡遇僉役專視田之多寡以為差殊不知田不足憑者有六富民以餘田竄仕籍是謂詭寄一也揑丁裝田至托女户是謂花分二也産已易主尚存故籍三也田多磽瘠永售不能四也商賈逐末不占丘畝終身無役五也典質規息役之無由六也他如胥吏為姦則披籍取人不以一邑計多寡而以一號計不以一號計多寡而以一區計不以一區計多寡而以一扇一圖計者往往有之則夫以多寡論貧富何足憑也國初京朝官不問崇卑並免全户外官雖以品秩為差而所免亦多由是詭寄之弊出惟貧民驟富不識貴臣者然後不得已而花分嘉靖中輔臣桂公萼請照內外品秩量免丁糧江南糧重所免最少官不自芘豈芘人自兹詭寄頓衰而户非二十畝以上者役終不及故今百畝之家率分十户少亦不下五六户既不論丁雖多何害由是花分之弊滋斯二弊者勢若持衡然此重則彼輕不兩立也愚以謂國初之制太寬而桂公之議太嚴今夫役其身則思恤其家勞於前則思逸其後是以古者既有官祿又有圭田而庶人在官者其祿亦視農夫以為差宋朝待士尚有祠祿况於口業而可役之乎且桂公之議施諸他省猶可若我江南則京官一品僅免田五十三畝有竒下逮九品則十畝有竒耳於時都御史歐陽公必進巡撫江南亦以其難行也議糧一石準田十畝則京官一品免田二頃九品四十畝耳夫今之四十畝有竒即古之百畝也古者一夫受田百畝其入可食九人又有餘夫自食其力今九品之家父母妻子以及薪水之丁大率倍於九人既供稅糧復充里役已異乎古矣乃自百畝以下至四十畝又僉雜徭使之呼名應役恐非所以體羣臣也夫見刖廢履天下非盡刖者也因噎廢食天下非盡噎者也為人上者惡可懷逆詐之心而行概廢之法乎愚以為今官户免役縱不能盡如祖制亦宜稍寬其限而必嚴詭寄之罰民田不唯不容其詭寄尤宜并籍其數而必杜花分之姦則自然役不逮貧而有力之家莫不帖然心服奔走恐後矣若慮二弊未易搜剔則當并委量田進士於履畝之時密詢主名而錯記之曰某都某圖某字墟某址田若干係某都某圖某甲某人産事竣攢合為一不任親供不假里書於祛弊也何有外此又令三年一會計則無易主存籍之田磽瘠既辨明則無貧富混淆之弊若乃商賈典質不務本業則如長洲吳縣估資之法皆二百兩準田一頃槩令供役以寓抑末之意夫然後田之多寡足憑而役無不均矣或疑丁不宜於北不知余非專論丁也兼丁糧而論之也東南苦於論糧而不兼丁猶西北之苦於論丁而不兼糧也因地制宜去泰去甚達諸天下何不利之有均賦論徐師曽什一天下之中正也方今田賦輕者一升重者七斗夫田雖瘠所入豈止一斗雖肥豈至七石不均孰甚焉夫不均者天下之通患也而吾蘇為尤甚蓋天下之賦莫重於東南東南之賦莫重於吾蘇吾蘇之賦又莫重於長洲及我吳江今姑以吾邑言之嘗聞國初有徴石以上者宣統中巡撫侍郎周文襄公忱郡守况公鍾嘗為奏減其額故其所存自一升以至七斗三升者減額之餘也已而文襄公又病其不均乃立加耗之法六斗以上悉蠲本色止徴金花銀銀一兩準米四石以常價計之捐米三斗而足矣六斗以下始加耗米本折兼徴後復減及五斗直至四斗以上而始加幸矣然自二斗以上四斗以下亦重額也而與五升三升者同加可謂均乎故當時重額之田其直最輕而不能售由是鬻田者利目前之厚直忘日後之遺艱詐稱輕額以求售自是户有虛糧而逋負益多矣嘉靖中郡守王公儀亷得其弊乃立墟號推收之法各照所業輕重以輸官而照户推收悉置不論百年之弊一洗殆盡矣特其所論攤耗之法槩以三斗七升六合為則是謂什而取二自此輕額變重而重額愈重所稱平者獨三斗二斗上下耳其與幾何夫以公之美意良法而人猶有所憾者豈無自哉高下之不分也肥瘠之莫辨也丈量之隱蔽也磨算之挂漏也公占之復除也坍荒之失實也姦户之無糧也吏胥之歲匿也科麥科租升科之未入會計也使無是數者則雖攤耗豈至若是之多哉然則如之何而後可曰國家以東南為根本以財賦為命脈誠能不惑浮言不惜俸廪特簡進士中老成才幹者一人準知縣之資專量田之任履畝計步勿假他手辨其高下肥瘠核其頃畝廣狹以定徴賦之差事竣則簡稱職者如例徴召授以憲職不稱者罰如是不過數十人假以三年而江南之田可畢均矣由是推之天下因俗制宜任土作賦豈不易易哉此之不務而徒委諸丞簿日玩月愒甚有不可言者吾見刑罰日繁民生日蹙國計日耗嗚呼誠不知其所終也明文海卷九十五
