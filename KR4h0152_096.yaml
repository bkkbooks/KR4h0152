body:
  text: 明文海卷九十六餘姚黃宗羲編論十三諌難上鄒觀光始鄒子以進士論劾故相罪戍戍六載相敗超拜給事中無論天下艷慕若威麟祥鳳也者人主虛已而聽大章小疏立得俞可天下高其義而喜人主能受言郅隆之治有幾矣最後慈寧災復抗章言事忤旨謫而南楚鄒子曰夫諌難矣哉蘇子言古今論諫常與諷而少直至欲秦儀其術而逢干其心李獻吉非之曰禍天下者洵之言也鶡雀與孔鸞長短哉獻吉之論是也使儀秦之術而可以事君則縱橫押闔之徒比肩而事主而端士正人且羞與之為伍何論諫雖然以術而濟其心則不可以誠而盡其心則可夫任術者其言反覆辨難疑于誠而非也夫本誠者其言忱深剴藹疑于術而非也有事于此君德成敗宗社安危呼吸以之吾顧慮而徘徊謀其國復謀其身計其利復計其害如是者不誠吾無所顧慮而徘徊度其身不度其君創其始不慮其終如是者不誠蜵蜎蠼濩之中及其未章可以靜而正也而吾粗而翹之暴主過以示直如是者不誠人主方畏議而愛名可以巽而道也而吾先為盛氣使人主有所難受如是者不誠誠積于中而時而出之則婉而言之而人主吾悅戅而言之而人主吾亮淺而言之而人主吾解深而言之而人主吾思廣而言之而不吾迂數而言之而不吾厭危而言之而不吾怒驟而言之而不吾疑斯不亦身與名俱泰而宗社尚亦有利賴哉脫或十言十不效百言百不效吾誠非不積而亦必不效然必不可無吾言冀動人主異日之思而垂萬世鑑則雖言之不效而亦可謂心盡又或十言十不效百言百不效吾姑無言以吾身為標日積其誠信以格人主于蜵蜎密勿而無以吾身輕發其機如是者即不言而可謂心盡何也反諸心而誠故也為爾瞻計繇前日言之宜危言諤論植義而匡時以身之去為忠繇今日言之宜愛身重道樹標而格主以身之留為忠不然天下豈復有隆德方聞蒙知遘會如爾瞻氏者而一言不忘諱令人主有逐直臣之名而吾無復進言之日夫諫難矣哉作諫難論諫難下鄒觀光余友元孚一日上封事言宦官擅政及諸大臣附離宦官慷慨憤烈凡數萬言或語孚如生曰自昔建言之臣身詘而道伸周子得臯去固當顧不免遺議焉何居如生曰近世之言有六而元孚不與焉氣類既殊章疸亦異于是有擯詆善類比周邪流公滅私佞伐直肆然而無顧忌其名曰罔上虞威靈中愳柄貴下難清議躊躇四顧劑度所不急而細微是苛其名曰竊掇拾陳詞補綴綺語老生豎儒所棄不道而彼栩栩然談策為治安其名曰誕辨之晳爭之強庶幾哉稱諍臣矣夫諫官與史官異則奈何祗衡其仆弗起者而彈擊之哉而其人與骨則己朽矣其名曰荏抑又有慧而善揣摩者黠而善偵伺者幾所伏巧厯不能計而彼隲其微陽託折檻請劍之忠而隂為附會將迎之計抑折于此而取償于彼其名曰盜抑又有已雖不言而度不乏言者言虞不先也已則不言而度終無言者噤莫可發也一再言之而不勝而度終無大觸忤者聒不遂已也其名曰狡繇斯以談周子有一于是乎而詬病周子斯何以稱矣或曰蓋謂周子激云夫賈生豈不稱天下才哉而立談之頃輒痛哭流涕儒者猶然惜之夫宫闈肘腋之間亦難言矣周子非有投知之愫而一旦排詆禁近故曰周子激也嗟夫世之言激者我亦知之矣巽軟從臾之流習于浮沈而無所激沈捷儇儈之儔托于中庸而不肯激長顧却虞之士較于利害而不敢激夫時君世主非激則無以聞其過憸士壬人非激則無以伐其萌激何負于國乎嗟夫由今之道而欲以髙言讜論效其悃欵則難矣則難矣明文海卷九十六
