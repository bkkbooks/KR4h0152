body:
  text: 明文海卷九十七餘姚黃宗羲編論十四嗤道學周思兼世之庸醫挾其術而不售于天下也曰天下無知己有痺疾者庸醫謂之曰而必無飲酒而必無食肉聽其言則疾者速死死而猶咎其不盡從嗚呼庸醫之誤人危矣哉知其為庸醫而不試其術而庸醫之名幸以聞于後世而世之君子猶以不試為庸醫悲是亦大惑而已矣宋之小人才不足以自達于上故必為髙天下之行以矯天下之名名不足以震于人故必取天下之所共駭且愕非昔日之所聞見者旦夜而習之以自表是故漢以節義稱唐以文章稱居宋之時非學不足以顯于世于是儻然易其冠裳而不以為恥俄然倡為異論而無恤于天下之議且怪其師與弟皆若狂然奔走而逺從之以為真足以窺仲尼之門墻而不察其果與否吁師知其非仲尼也而謾欺其弟子弟子亦知其師之非仲尼也而亦謾從而聽之相與延譽于世以盜天下之名是故道學之名興人君聞其名之可喜而不察其實之不足以副也故纍辟而屢召之以庶幾于賢者之一至而道學亦忘其材之不足以用于世也故偃蹇髙卧而後出以睥睨天下之髙位而人君亦從而授之及其叩之而易窮用之而易竭與之謀而卒無竒偉之略以拔于衆人則人君亦遂厭之而不親于是激一豪論一事憤然決去以自附于天下之清議以掩其所短而曰吾以不用去國吁吾不失天下之名而所以孤吾君之心亦多矣世之淺夫疾其盜天下之名而憤其孤君之心則建為偽學之論以逐天下之道學而天下之溺于道學者遂以小人目之而其人亦遂不齒于清議少正卯言姦行僻孔子執而戮之吾未知少正卯之黨其所以目夫子者果何如也而今之君子有能嗤道學者舉世訾之曰此陳同父之流然則同父之論果非也哉憤橫議周思兼天下之事最可患者莫大于國是之橫起而莫知其所定而其最不可為者則在于人主之無斷古者諫無定官而臣民皆得以達其情故下無所壅而上之人安坐以聽之天下大治及後世而諫官立焉天下之事非諫官莫敢言而其杜門不言者有誅而無赦不言者有誅則諫官得以盡其情于上而無所顧忌非諫官莫敢言則臣子之議莫得而亂之而諫官之情愈明故天下之大議曉然有所别白而其人君亦知天下之利害可以聽之而無疑是故諫無定官者所以大天下之公而諫官之專其責者亦足以遏天下之橫議而不至于亂故漢唐之世國是定于上臣子奉行于下無敢喧譁以亂國家之紀者而大政或失于當則諫官得而陳之而宰相亦得以引其咎而人君亦可以從其説而朝廷之勢益尊是以漢唐無橫議禍昔者宋之亡非一道也而其患起于諫官之職不專而小臣皆得以議國家之政以攻大臣之不便于已者而其君莫之罪故國家有大政未有深病于天下而其臣紛然而擊之又紛然而和之大臣不勝其憤而思所以去之于是有貶斥削奪之罪國家用一人未有深賊于其君而其臣紛然而攻之又紛然而和之天子惡其不情而思所以快其怒于是有流徙安置之罪夫議朝廷之政而至于貶削以去攻天子之寵臣而至于徒流于外則天下羣然稱之以忠直而其淺狹小人欲取忠直之名舍是無以自顯故橫議之風愈昌而不可輯而人君遂莫知所從而國因以亡唐髙祖之攻長安也其智足以遏突厥之衝而其既也劉文靜輩爭之彌日而兩從之而突厥之勢遂昌秦王非房杜之策不見用而所向皆克故宋之亡皆起于羣臣之好爭而人君之莫罪也論賦薛甲為國之計莫急于食莫重于兵古者供軍出于鄉遂頒祿出于井田無逺輸之勞矣兵軍出于丘乘征役制于什伍無養兵之費矣足食足兵大端既立卒有水旱盜賊之災亦不足以動其國故得以暇裕舒徐度量諸事而凡百經費不過昻前却于九賦九貢之中所謂式者式此也所謂詔者詔此也所謂考者考此也蓋計畝而入謂之稅計口而出謂之賦稅出于田不可以多取而賦取諸人亦易以橫斂聖人以為財生天地間止有此數均于稅而盈于賦其弊一也故專于財而均節之是則稅之與賦初若不相干然節于賦則民財不朘亦為有資于稅者矣夷考其時雖云量入為出亦非強出以求合其人也恆使入者恆贏出者恆縮故九年耕有三年之積此縮之于稅者也嵗用有餘歸之職幣此縮之于賦者也以其稅之餘者而行興發之政則足以補助民之不給以其賦之餘者而行泉府之政則足以貸民祭祀喪紀之需取民于常法之中施惠于用法之外真以一人養天下不以天下奉一人也後世此意不存法則猶有近似者唐之租庸調是己租以出粟如貢助庸以出泉如九賦調以出軍如丘乘雖粟米未免輸之于民然不以庸調參之則人不得起姦于法民力猶未甚竭此善法古而不泥于古者自楊炎取租庸調盡歸之兩稅後世因之然用有盈縮兵有增減費用取給而會計所出不免皆歸之田以一田而供數端之用吏因得以濟私于其中費緣事而起賦緣費而加本出權宜按為成法前之加者事廢而仍存後之起者方加而未艾蓋未暇論興發補助之政欲自支吾目前不可得矣不謂法弊得乎我朝因田定稅正稅有定額撮勺不可加減其餘凡百經費一出正額外每一費出則總括若干計畝而加此于法誠便于用誠足但加增之賦非從天降地出以此取之似乎罔民為不可爾然亦豈當國者樂為此哉其源皆起于租庸調既併蠧穴盤亙不可窒塞故雖有愛民之君亦不得溥其仁惠之心雖有通變之臣亦不能行其均式之政間有嘉言善行可師法者不過減膳省費裁冗官幾百員汰冗兵幾千人而已未有搜姦剔蠧曠然一新追復隆古之盛者勢不可也夫因循者易為力創始者難為功以今日言之雖云井田上古之遺制然欲復井田須復封建造端宏大驚疑庶民與創始者何異此決不可為已要以倣井田為之而民不病則唐租庸調之制其尚可復乎論兵薛甲今天下之法備矣補偏救弊之政要在于有漸而不驚古者邊庭未有能為中國患者也惟吾中國之法不至故邊庭起而乘之今夫聚兵百萬列屯數千分將而守之雖有覬覦亦震焉而不敢動一旦盜發于中國而土兵不足以制則其勢不得不調邊鄙之兵彼其日夜荷戈執鋭以與胸奴戰勇悍強力一足以當土兵之十此其剪盜宜若拉朽振稿然而制勝反出土兵後何哉盜賊虞邊兵之窮其穴則竄伏于髙深土兵慮邊兵之專其功則恥為之鄉導窮追則地勢不習散歸則再調之難于是屯聚而守之曠日持久以待其弊則府庫內竭邊鄙外虛而外敵之患乘間起矣此天下之大患也今西北屯重兵而中國要害皆立衛所此其為法可百世無弊愚獨以為可漸而變者鄉兵是也我朝鄉兵皆出于田庶古者寓兵于農之意然其實有不同者古者兵出于井田所集者皆其父兄子弟之兵今者田聚于富室所閲者皆其傭倩顧直之輩夫其為傭倩顧直也吾固可因其利導之彼其操戈以就閲一志以承命亦曰吾受若直當然也彼處其實吾以名試之可乎要在因耳目之所習者作新其氣因心志之所安者便熟其節平居簡閲之有道則臨難皆勝兵也吾又以時使盤詰其鄉之小盜有捕獲者以獲與之夫盜賊皆起于細微小盜不戢故轉而為大盜今吾重購以厲素教之兵則莫不競勸發摘搜訪穿窬必獲盜賊何所容其姦哉如是則內可以消中國之冦攘外可以防四裔之竊發不易人耳目而勝兵布天下皆時務之最大者要在畫一以示有司如古者立標簡試之法使承而用之則得之矣活魚論陸容杭俗尚活魚故市魚者必畜之水久則或側或仰殭浮水中腮頰喁喁尚活也不活者人恥買之豫始至杭聞此風致食魚必細嘗之覺腥韌而不鮮淡薄而無味殆不若吾鄉之不活者未知其所以也及之於潛食一魚甚佳問之庖人己非活者蓋其俗猶吾鄉也後之新城之富陽亦莫不然豫始悟而知之蓋活水之魚固多風味使非活水茍得逰動則亦適其性而不損其真也杭城四周皆堰無活水養魚則魚無風味有自來矣及漁人欲活者以應不時之需則預網而籠之水中是猶平居溫飽逸樂之人困之囹圄非其所也命雖未盡而其血肉精華蓋已憔悴消削之矣于是日取入市特市其名耳尚何計其風味之何如哉吾鄉食魚不拘活死故魚之不活者猶肥人遇害暴死息雖不存其肌體之豐腴脂血之凝固自若也故豫嘗謂杭之魚得其名于殘喘之餘蘇之魚全其味于一死之後然則杭之人以活魚相尚者皆食其名而不知其味者也知其味則名固不足較矣嗚呼天下之徇名而不求其實者豈特活魚而己哉豈特活魚而已哉豫于是乎有感潮汐論趙樞生潮汐之説古今論之詳矣自余襄公海潮論一出而諸説皆廢于是張子邵子宗之而朱子信之張子謂地有升降地純隂凝靜之物豈有升降之理邵子謂地有喘息不知地塊然一物豈有喘息之理故謂地有升降不若謂氣有升降謂地有喘息不若謂氣有喘息也喘息即升降也是乃元氣之氣絶地浮天而非地之所得而囿者也故噓之而若浮吸之而若縮譬猶湯之在釡其沸也足以騰藉乎釜之外而非釜之有升降也然則元氣曷為而有是升降與喘息曰隂陽相蒸也水火既濟也元氣非隂陽則不能生化隂陽非蒸激則不能生物水者隂火者陽水生于天一而地六成之火生于地二而天七成之是水火既濟天地相交造化之至精也海者隂也其有潮汐者陽所蒸也猶水在釜而熱之薪也人徒見火附于木而陽無所附不知天地間有煴鬱燠暖之氣固無形之烈熖而天地之大火也以是為薪宜其能灼海水而騰大地矣或曰如子之言則凡水皆有火皆能蒸之而使沸矣江淮河漢之水何以獨無潮汐耶曰江淮河漢之水皆發源于山而流行于地中者也此其為物與始生之元氣固不能無間矣若夫海水則發源于天一而絶地浮天者也故能與元氣相為升降夫與元氣相為升降則能使隂陽蕩薄而生潮汐不與元氣相為升降者則隂陽隔絶雖火性未離而其盈縮之機息矣猶之人身血氣然其聚而在心則元氣會合而升降有候若散而在四肢則空竅閉塞而有不能者然則山川在地皆所以為元氣障也使有排山倒海舉大地而沈之則吾但見鯨波濁浪蕩雲沃日混然太虛中不知孰為海也孰為江淮河漢也孰為有潮汐也孰為無潮汐也安得謂為地之喘息乎然則所謂應月者其義何在曰此尤非知理者夫月隂精也水隂氣也蓋其類同矣然月之行于天則有方位潮生于海亦有方位乎且彼所謂月臨卯酉則潮漲于東西也豈獨不漲于南北乎謂月臨子午則潮平于南北也豈獨不平于東西乎今以居東海者言之此海之西也以為月臨于酉而東海之潮左來是矣不知有人居東海之東者潮獨不右去乎推之四海莫不皆然故潮之生也東西南北靡不橫溢非流于東則不流于西非流于南則不流于北而不可以子午卯酉論也然則潮何以有盈縮曰盧肇之言近之矣日激海而潮生是也獨其言日而不言月耳一日之間日月出于海者各一而潮汐之生于海者亦各一方其日月始出則升而為盈及其日月逺于海則降而為縮禮有之祭日曰朝祭月曰夕江海之水朝生為潮夕至為汐則潮應乎日汐應乎月日月回環于上元氣蕩薄于下而海水為之沸此所謂隂陽相蒸水火既濟而其理適相符合者也安得謂之獨應月而不應日乎今夫聚一泓水于盆盎中有一物從中躍出則其水必然四溢妄行少焉則復還其故此理至明者至于潮汐則以為隂類之應月吾不知其何説也且月既已離海而上升于天矣潮胡為而亦從之苟謂精氣相感則何不從之于天而惟于地中與之懸應乎且水與月既以隂類相從矣則火與日亦陽類也日行于天火獨何不從之乎至所謂一月之潮大于朔望一嵗之潮大于春秋則係氣之盛衰如冬夏有寒燠日晷有修短理之自然不待論矣巾論孟思伊古玄始哲聖肇生權輿文物𢎞啓典制觀翬翟感角􅏋旃冕有成纓蕤斯備飾首之製遐哉邈乎蓋以開人文之休觀革冒皮于洪濛者也至夫文章誕著組織聿興絲帛元首之上勾領覆冒之下憲度精而益備風氣祛而轉盛夏商周之代興收冔辨之迭變非徒異古人新今制也時宜焉耳矣後其著者委端治禮章甫願相君子容良其冠曰進儒者究天其辨特圜及其敝也鄭臧以聚鷸而貽戚酈生以側注而干時約竹蒙楯茍簡于裁成巧士岸幘奚取于名義此下趨之世馳騖之俗也逮乎宋握天鏡人文炳煥時有眉山蘇軾曠世英髦雋才絶學宏辭遒句逺駕淵雲麗賦清章前無陸謝方諸漢時南陽之朱北海之孔聲譽頡頑然而睿心哲性創制物始穢時冠慕古道安于山林清逸也裁幅為巾垂帛象纓雅製不羣豐儉適義誠儒者偉儀隱居之髙蹈也今其妙譽恆芳遺規猶在乃有謭麼小生鄙偽陋儒竊宵燭之光擬顰捧之迹噂沓權門貰米都市汩沒于囂紛臭處塵容俗狀之中爾乃首山林之巾心壟斷之賤節非幼安而服青帽德愧有道而效折角宋一坡翁今何多也昔仲尼居宋章甫同人從殷道也哀問舜冠孔對以德崇性本也今巍巍焉纍纍焉皆蘇其首亦堯服而桀行冠夷而心跖使其因名視義顧影思形方且心悚而神愧辱多而榮鮮矣亦何必前辱古人後纍時彥而速畫虎續貂之刺為故夫矯詐颷起而姦時制象恭偽行而釣虛譽者君子欲毁裂而擲之誠恥之也論三代孟思唐虞而後有天下者曰夏商周謂之曰三代而其君之聖而創業者曰禹湯文武謂之曰三王後世之士肆口而談縱筆而書以望功業之盛者必曰三代之治以望君之聖且賢者必曰三代之君天下莫之有異焉者也然人之賢聖者不常有而天下之理勢不常治今試以詩書之所載史册之所紀質而驗之其于後世亦未必常治也禹功之在天下而浹人心萬世莫之忘也千嵗之下尚有魚鱉之思夫何啓立未幾也而有扈不服乃至大戰于甘而召六卿亦岌岌矣三苗之征彼且蠻服不至是也啓崩又未幾也羿逐太康于河仲康立又未幾也而胤侯之役又興相立又未幾也而為浞澆之滅甚慘自是而後夏德日衰諸侯不朝矣四百七十一年之間求如禹啓之世亦不能半之也商世稱多賢君孟子曰賢聖之君六七作湯之後而太甲使不伊尹典刑厥德顛覆未可知也雍已立而殷道衰諸侯不至也陽甲立而殷乂衰諸侯益又不至也自仲丁而後廢適立弟爭相代立比九世亂使無盤庚武丁殷道又未可知也易載鬼方詩頌中興則四百九十六年之間前之亂亦不為少矣周以仁厚立國歷世積纍何基之厚也武王弔伐四海永清一傳而三監畔亂使聖臣狼跋于東再傳而膠船肆虐使昭王溺死于南三傳而穆王耄荒幾亡于徐偃五傳而懿王不道見刺于詩人厲王之流于彘幽王之弒于戎使無宣王一中興致詩人美頌之義則二百五十七年之間赫赫宗周滅已久矣後至平王車轍一東陵夷不如一列國萎然紛然殆不能君孰謂卜年八百之常治哉雅亡而春秋作聖人有大不忍書者矣夫天下之勢一也盛衰相尋而世不常治天下之人一也善惡相軋而君不常賢况時或有君而無臣世或有臣而無君安能百年之盛治哉故觀之詩書之贊頌載之文士之揄揚以古之三代似乎别有一天下而非後世之可及及考之治亂之迹亦太平之不多日而已余為此説非劣聖謗詩書也亦欲後之君臣相與用賢圖治則曰三代者非虛言矣果非别有一天下而非後世之可企及也明文海卷九十七
