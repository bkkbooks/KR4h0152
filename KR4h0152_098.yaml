body:
  text: 明文海巻九十八餘姚黄宗羲編論十五毛詩論楊兆京記曰詩三百一言以蔽之曰思無邪此詩教也亦孔子刪詩之教也夫人心之不能有正而無邪也中人以下所必不能免也今也聖人立言以垂教但彬彬焉告天下後世曰若者為閨門之化也若者為邦國之儀也天下後世之人讀其書想見其人當此之時孰不肅焉生敬慨焉生慕哉迨其情移事接其心有不可知矣于是其邪焉者駸駿復生彼且不自知為邪矣即自知為邪將以為情之匿者聖人所不恐窮也又不然則以為情之至者聖人所不及知也是邪為主而正反為客客時去時來而主常在以時去時來者而欲勝其所常在其勢必不可得矣語云見其作而不見其撤雖盜跖為伯夷可也譬若有人之與端人正士接也方其敷陳禮義稱説先王孰不敬而無斁淫僻之語燕私之情咸屏而不道盖恐言之者䙝尊聽之者嫌于推見至隐耳及其既退一與淫朋比昵者俱我不知一如對端人正士之時乎或亦有未可知也然則至是而聖人之術窮矣今詩之為教則不然狡童逰女之怨咨不妨與明君哲相之賡和並垂為鑒觀如易之吉凶並列如春秋之賢奸並書以聽人自擇焉而聖人若無與乎其事則天下後世之人見其邪之有合乎已之所為者孰不赧焉深恥索焉無味哉禮論楊兆京禮也者聖人持天下之大權而隠于無形者也禮起于人心之有所不敢聖人因而止之禮縁于人心之有所不安聖人因而用之所以勇怯智愚至此不知何故咸俛首却步而不能踰此聖人之神化藏于迂濶繁重之中人固莫得而知也今夫天下之大必非一人之力所能勝也亦非嚴刑峻法所能齊一也至治之世君臣相安兵革不試若有繩尺以束之誰為之與至秦并天下始一任其威力以愚黔首焚滅先王之禮樂惟恐其不盡不旋踵天下羣然而爭而後知先王為慮之逺也且夫生民各有無涯之欲也苟窮其欲而莫為之止則天下必無有安于人下者矣先王于是命名以定之陳數以紀之自后王以至于氓隸各隨其才與分之所至而莫之競所以悦其耳目擾其心思者童而習之白首而不解其故不惟君父樂得其尊臣子亦樂得其卑此豈勉强而然與嘗試執徒隸之人而被之以章服不必刑罰隨其後也已亦驚顧而不敢居矣子弟坐于堂父兄趨于側不必斧鉞以誅之也已亦跼蹐而不安矣先王知其有不敢與不安之心而後知民之可以禮御也故因其一念而衍之為節目制之為度數其説愈繁其事愈贅而此不敢與不安之心乃愈著明于天下而不可隠于是推之天地通之鬼神凡吉凶軍嘉之事逮夫一旋一折之間莫不從而為之説非真有所凖則而分毫不可缺也先王以為禮縁義起必如是而後快于是賢者思其意愚者習其數以為先王之制如是其不測也孰知皆出于不敢與不安之心哉先王又知人心之不一也既制禮矣則又起而損益之隨時而起隨地而起時之所趨不知其端或始于朝市或出于閨闈衣冠言動創于一人羣焉樂效積久而風氣移易雖有神禹莫能禁止此其人皆智雕萬物足以奪先王之權者也故先王畏之戒之而又無可如何也于是因而利導持其本不爭其末神而化之使民宜之何必古之是而今之非與此禮之因時而起者也若夫荒逺之紀不可以治商周燕齊之俗不可以施吳越彼其聞見之所習風土之所宜性使然矣必欲强異以為同則必至于扞格而難通天下不知禮之樂將以為先王之禮抑何其不情也其勢亦終莫之為奉行易曰風行地上觀先王以省方觀民設教此禮之因地而起者也因乎時因乎地而一因乎人心雖有勇怯智愚孰不樂為之用哉聖人論上戴士琳民之夭札也司命仇之也司命之仇于民也其釁聖人開之也聖人盖有功于萬民者而實以抉真宰之秘發渾沌之藏要造化之柄而竊弄之故司命亦還而仇于人試觀洪濛已前及文字已後一切作用何者不與造物闡抉而欲全其天也大抵含生羣動以不生為生求其生則不生矣求其壽則不夀矣聖人出而教民衣食不免戕及衆生之輩以求養生己不免微憾于天地至剖魚鳥為書畫竒偶為易則兩儀之秘大為宣洩而且算厯齊衡移山測海令天地無可藏其竅用其權故天地亦乗人之巧智設為機穽以愚之令自戕琢以老如聲色嗜好人競趨而不覺皆從開闢已後日増月益以迄于今也甚則治亂相尋積骸如山流血成池至極慘毒造物亦憒憒然不一置問若曰不如是此其智謀巧幻安所極哉噫可懼矣果聖人開其釁耶抑學聖人者之自為釁也然則何道而解曰塞其兌聖人論下戴士琳尼父已前文章出聖人故為六經尼父已後文章出賢智者故為諸子六經之綂一一故純諸子之説散散故漓然其漓也皆各立門户創自胸臆以求合于大道寧誕怪支離不肯雷同附和至秦漢之交而文章之變極矣宇宙間之情理攄洩殆盡矣祖龍一炬幾于混沌假令復有尼父必反而歸之于黙乃漢儒不解此理襲經而訓詁之遷固襲春秋而史之其後逓襲而逓下晉人之清言襲老莊而誕者也黄初已下暨于開元襲葩而浮靡者也宋人之理學襲易洪範而支離者也其後無可襲則為制舉義又襲訓詁理學而失之鄙俚者也吾不知尼父有知宜何如太息也嗟乎六經聖人之糟粕不意此糟粕為人心蠧一至今日數聖人有知又何如太息也釋論戴士琳竺乾氏之書有功于聖門也闢之者非深于其書者也夫聖門立論貴在中庸而痛懲夫賢智者若愚夫愚婦又欲引而收之于大道當佛氏未入中國已前諸子百家縱横辨博創臆快心爭竒競爽以與聖人之書作敵彼皆髙明特達之夫不受降束故不肯俯心而從大道自佛氏教行欲不立文字空有我之相打佛罵祖以求解脱而天下髙明之人殆盡捐其智數才能以求見性無復敢為異説以抗聖人者乃其于下愚不肖又以小果修羅之利害脅而動之其説卑近易曉令愚民皆洗心滌慮終其世而不敢背盖乗有大小教其權實能上收夫賢智者下逮于愚不肖而僅餘中才一等以歸于聖人之道豈非大有裨于聖門哉何世之必欲闢之也明文海巻九十八
