body:
  text: 明文海巻九十九餘姚黄宗羲編論十六井田論顧大章井田之不可行學者皆能言之其説莫辨于蘇子蘇子曰井田成而民之死也骨已朽矣盖苐言其難成也若夫行之之不為利而為害則蘇子未之及也且愚以為殷周之世盖未嘗舉海内而盡井之也請先正言其害井田之法方里而井井百而成成百而同盖百里之國提封萬井而已城郭溝塗三分去一故註疏之家以為止于六千四百井每井而八夫為夫五萬一千六百今世繁庶之邑生齒有數倍此者其將何以給之孟子曰天下之生民乆矣一治一亂夫亂極而始治其生必耗治極而未亂其生必繁以百里之法賦之其始也必患其地之曠而其終也必患其人之倍患其地之曠則虚其地以待其人猶之可也一再傳而地與人相得矣自是而漸倍焉其將何以給之韓非曰人有五子不為多矣夫一人而五子老而傳百畆則授之長矣自其仲以及其季寸土之茅無獲焉剖而耕則非制也是以慈父必憂其幼子而賢兄必憂其有弱弟憂之而無以為計産子將有不舉者焉如是則骨肉之恩殘慈孝之理虧矣曰閭井之田宜有絶而歸于官者因而賦之可也今民户之絶者令得以兄弟之子為嗣富民之老而無子者族之不肖人睥眤而竊幸其死甚則毒殺行焉彼骨肉也而若是使閭閻之絶者人得而取之則隣里而産子也將不為賀而為戚如是則睦任之教廢隂賊之計興矣且絶者適而一耳圜視而欲取之者十將誰授而可必且差次其年之長幼而等其分之疏戚交爭焉則貪吏黠胥將狡焉而肆其慾如是則請寄之途廣賕賂之門啟矣即有公中之長覈其當而授之飽其一九猶然飢也度其乆而終不可得必相聚而為奸邪以幸旦夕之飽如是則盜竊之權衆刀鋸之用亟矣聖人者以仁義禮智治天下者也骨肉之恩殘慈孝之理虧則喪其仁睦任之教廢隂賊之計興則喪其義請寄之途廣賕賂之門啟則喪其禮盜竊之羣衆刀鋸之用亟則喪其智率天下而喪其仁義禮智以胥于大亂之歸者必井田為之也吾見其害之浮于利也曰是則然矣殷周之井田通乎天下自孟子迄于今無異説也于何而得之曰得之孟子孟子曰夏后氏五十而貢殷人七十而助周人百畝而徹夫貢之更為助也猶易為也若既七十而助矣民田之治為道途浚為溝洫者自一夫之間積而通之以達于千夫萬夫如此其多制也驟而更為百畝則向之為道途溝洫者將墮之堙之以為田而其為田者復治之浚之以為道途溝洫雖盡海内之田十年而不得耕其勢猶未幾也殷民之出于水火者僅然生耳烏得此十年之盖藏以盡廢其井而從事于畚鍤乎將武王周公别有道以廪食之也且二聖人之在位亦幾耳武王末受命二年而疾疾瘳三年又二年而致政焉得此十年之暇而為之如曰為之而未成以待成康也體國經野之未制而驟興禮樂號為功成治定周公無乃恥之此得之孟子而為吾之説者一也孟子曰惟助為有公田由此觀之雖周亦助也當是時周儼然東耳燕衛魯宋以暨泗上諸侯猶周之建國也周而助焉徴諸周而可矣雖與亦之云其詞何疑而不定乎此得之孟子而為吾之説者二也又曰使畢戰問井地孟子曰夫仁政必自經界始夫滕文之昭也而周之卜正也諸侯盡徹滕豈後焉有其舉之宜歸視諸故府何咨于孟子藉曰有司失其籍矣孟子之立言也亦宜告以愆忘之過而勉以祖武之繩今之教畢戰也其詞若創云爾使滕之君臣忘其祖而惟吾是師其言不讓無乃疚焉有以知滕之向未徹也此得之孟子而為吾之説者三也又曰請野九一而助國中什一使自賦夫郊遂之殊于都鄙固也孟子不以告齊梁而獨以告滕何耶豈非托之空言則理可概舉見之行事則勢須區别乎髙山之阿廣川之隈林麓沮洳險阻之隘國乎其間者其為郊遂也大矣孟子不敢徑情于五十里之滕而周先王乃膠柱于千八百國何孟子之智而周先王之愚此得之孟子而為吾之説者四也他日又言曰文王之治岐也耕者九一夫此之九一者為殷之助耶為周之徹耶夫其助也周之侯于商者四百餘年其助也宜乆矣何待文王其徹也天下盡助而周獨為之徹變禮革制以自彰其受命服事之誠或不其然又以知岐之田向未井也田之向未井也獨岐也與哉此得之孟子而為吾之説者五也竊謂三代之治天下也所為煩委曲折以制其産而養其民者亦盡之于畿内焉耳外諸侯之嗣者各使物土之宜以自治而不親授之以法故殷之助止于亳而周之徹止于岐與東都魯之為徹也則周公之教也齊富以魚鹽晉強以戎索烏在其必井田哉岐與東都之徹其乆而敝也無有道之君子以通其變而遂裂于商鞅李悝之手鞅之所開則岐阡陌也東都之畧盖有侵于晉而析于魏者焉悝盡地力其在是與魯與東遷之王守其故而不變者也田之不給其民之愿者去為商賈而其亡頼者羣而私養于權門以為公室之禍太史公曰洛陽民多賈子家羈之慮季氏也曰隠民多取食焉豈不灼然于前史哉趙也韓也田齊也燕也楚也不聞其阡陌之開地力之盡而井田之迹亦各無有存焉者豈非其始之未嘗通行哉敢以是補蘇子之畧明文海巻九十九
