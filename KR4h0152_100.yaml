body:
  text: 明文海卷一百餘姚黃宗羲編論十七本治上黃道周為治而不明王道述禮樂以視天下其猶社與社者蓬屣而食􅠡棬而去乾餱詬以為情實故天下者非沿俗之所能治也沿俗之治循衣而坐大問車馬小察雞豕有或啓口序先王之道則必以為朽戅決笑而去夫先王者而皆草野耳食不試之士則為決笑宜爾先王亦嘗坐明堂立表懸象垂百世獨以其言為過者何也古昔聖賢咨嗟話告動必曰天天者聖賢所以明人示有尊也人君之尊于人無上以為無上之尊可立象不可以施化故為之天地社稷日月山川四時之祀以致其齋遫引其卷曲又舉勝社之嗣簡碩德之彥體近意匹以為之賓為之師言立人者承天則夫婦兄弟朋友之倫未均廢也詩首夫婦春秋首兄弟書首君臣其意亦自朋友取也唐虞之稱其臣曰鄰曰股肱殷周之稱其臣曰友邦曰甥舅伯父叔父以為天子者尊不絶上貴不絶下尊絶上則姦桀生心貴絶下則忠讜不效故為天子者有一德之朋有夀人之朋有燕及之朋天子見一德之朋差軒授几伸玉于俯絀玉于仰言論亹亹先引而後竟見夀人之朋侑飲而導舉劒首直奧絇屨不齧言論加喣後大而先細見燕及之朋離門而御鐘鼓北房而進琴瑟修職陳藝油油而退凱凱終日天子有此三朋者而後見人所祇受于天有其等級有其德慧有長不敢傲才不敢肆而後知人所立體于山川耀精于水火參差相式光景相避而後其體肅其性理言動以時和敬以立而後以為禮樂以郊祀天地及其宗廟山川帥農祥蠶室之作辨朝聘會同之事臨辟雍敶詩書旌賢黜姦章內别外而後淫聲不蕩炫舞不飾器物有度章采有制而後農守其畔士安其業內外邪偽上皆知之上訊不煩而下白其式夫如是而後先王之道備舉矣先王之道不舉而謂天子無朋禮樂世廢舉之則為訟藪者此大誣民不可不别也故夫婦兄弟朋友此三者之倫自天子博不自天子薄也天子之動心敬天敬天而後敬人敬人而後可阜萬民而致百神故言朋友之倫于天子而絶者猶挈瓢之民傲帝以為無涉者也君臣之倫通于絶域朋友之道喻于極貫火上于天其勢太孤以宥天下謂之大有大有初九害生無交上祐于天故友者佑也畜者孝也兩者道之至大者也雲興于中而山畜之本天之氣而以奉天謂之大孝天為至剛昧晦其精借日麗暉為之大有故大有者明堂之義大畜者封禪之道也古者天子封禪必在介丘之下所以明天之所封培嶁無增也故就壇以示卑夫有聖賢之德在于下位纍冕不益貴徒跣不加賤則天子齒遇焉藉茅而承之是石閭鄧林所致其風雨也天子必與聖賢競貴則暴悖梟鷔者必與天子競位是以天地交閉則沴厲作彗孛雜見陵谷顛變濁者反清漥者反突髙者反下直者反屈故天子之稱臣妾天下以為大奉則可以為大取則不可也天子而敬天地禮日月祇事宗廟則必敬其夫婦天子而事山川柴望祭修告五禮六帛奉五嶽四瀆社稷鬼神則必敬其朋友子曰明王之以孝治天下也不敢遺小國之臣而况于公侯伯子男乎故臣妾天下者天下奉之以為敬非以為傲也古之士貴故天子與貴今之士賤故天子與賤貴不必人益賢賤不必人益愚物簡則與貴物多則與賤古者王后甚辨屏寧甚設隂德所治三妃九嬪七十二夫人八十一尚御凡百二十人陽德所治公卿大夫士之數如之倍長而三又倍而六象天地之候晝夜之策繁數極矣以故其晉接易周笑語易洽情貌通而施化一邪窕不生視聽不惑今內外所治動數千人冠帶之倫日棄職事朝夕過從折百分之一有終嵗不得名狀者以故湫隂沍于內愆陽暵于外灌翳蒙叢不可得而材也不可得而材則蠧生其中蠧生其中則醜竅而𤸈奰天子于是謂是可賤者簡眂而賤之輿不為下伏不為起獸豢而鳥視其臣下又無有蹈古之志拔身之能其所事者不過與輿臺刀筆同事其所誦説則自貂璫女史老故侲兒勝側理者皆足以治之自是而乞言齒胄燕召坐論遊豫封問之禮皆絶也禮絶而後樂熄樂熄而後王道不作故鹿鳴之禮廢而鴛鴦之刺興伐木之禮廢而頍辨之詩作蓼蕭之禮廢而魚藻之刺興湛露之禮廢而采菽之詩作菁莪之禮廢而匏葉之刺興此五詩者皆所以刺禮樂之不興恩澤之不降君臣之誼衰而朋友之道絶也聖人者灼其大原故要于和敬以為禮樂之本見其夫婦以為天地隂陽日月宗社見其臣友以為五嶽四瀆鬼神山川剔擢內外涓實而慎采以澄其耳目一其心意故薈蔚之氣清則好我之情浹好我之情浹則順信之助生順信之助生而禮樂可作王道可舉矣故為治而不明王道述禮樂以治天下猶以手潔海岱而自為立其徑率也本治中黃道周為天下有序其條而貫之有數言之則以為常言不言則購天下無言之者序何别曰遠近內外數何貫曰禮曰政曰刑曰兵兵者試于逺外以治邊陲而邊陲非兵所能治也凡天下之數舉近而御逺詳內而靖外邊陲不治責畿輔畿輔不治責宫府宫府不治責黼座黼座治而後宫府治宫府治而後畿輔治畿輔治而後邊陲治此數者雖變天地不能易也今曰邊陲不治天下言者宜釋宫府而談邊陲唯邊陲之言則聽不邊陲之言則罪嗚呼是豈嘗察于本計也哉古者天子以疆圉之事託牧伯徵發期會不越其疆大司馬致郊遂之衆車萃屬甲不及侯甸天子穆然執和鬯之柄公卿百執舞羽總干不改其度故其君不震小人不囂是非姦慝無由而作今一方有事則動天下而營之表裏相激主客亙射狡黠樂動以為朝夕故有五萬之師千里之役數年不決則反舌寄頸相靡于道矣夫火發于山藪之內百夫千指虞者以為宜獵薪者以為宜炭田者以為宜灌盜發于廕室之下則門者不及伺笥者不及鑰宵飲逮旦而後相愕也故禍患之生不在言者而在不言者邊陲之失非不言之禍而無本言之禍也故曰什耦而射貍首非虎也磔狗而譟儺鼓非鬼也使禍鏑之動而皆集於羣言之彀則千夫閧市無有覆國者矣三正以來七代二十五氏喪敗相起坐邊陲者十不得二總其巨較皆以宵小權奄搆于內而後邊警冦攘來于外宫府先弊而後畿輔不理畿輔不理而後州郡攜志州郡攜志而後嚴關重鎧不足恃故姦賊之來不于所甚較而于所甚諱也甚諱之始必始諱內諱內者賊在于內內宄不上聞久宿而潰于外潰于外而後諱外諱外者賊盛于外外攘不上聞驟至而噬于內天下有此兩諱者則肘足之地有萬里之蔽萬里之冦發肘足之際矣故人臣之事其君君之事于天皆前而自相名也自相名者以名已之無所諱可聲應而治之故呼干以為之干呼戚以為之戚聖人用之而皆有所不樂呼管以為之管呼籥以為之籥聖人樂之而皆有所不蕩自筵几枕簟箕帚畚梮之彚則亦維所自名也名有所從入彚有所從出弓矢之彚出管絃鎗劍之彚出刀筆戎馬之彚出狗彘易種之彚出蠻髦咬骨之彚出讒刺邊警冦攘之彚皆出于宵小權寺聖人以為是皆不可諱不可諱則人皆知所防外而慎內故聖人之道貴審其所從出審其所從出則本道而末不害也兵之本出于刑刑之本出于政政之本出於禮紳冕而救鬬此世所謂濶懦也而衷介之士能使人益鬬不能使人不鬬道出于衆競之路勝敗爭半者則聖人不由焉使聖人而舍堂陛守邊陲其道亦不過戰必勝守必固而已即纍世無百年之治啓髙宗皆用之矣而天下不悟者人皆惑于標害而救于急搏以為千里之治不可以坐制也夫日月星辰山川之眚其于人不知幾萬里之遠也就而救之絲窮鼓弊灰盡帚敗羣國人而哭之無濟者聖人坐明堂發言而善則眚去而沴卻即不為卻亦不為害聖人之坐此五步之內耳夫五步之內豈濶于蒼青之末哉以為氐本所在精曜與宅故其行不馳疾不速今曰邊陲事遠則宜言之堂陛事近則不宜言之邊陲事急則宜言之堂陛事緩則不宜言之信然則以為堂陛之患細於邊陲邊陲之禍急于堂陛也是未為本序也古之聖人日昃訪問以救已過瞽史鞀鐸不離左右其公孤百執補闕是思讓才而授任勞而處其精者存于罘罳其險阻易簡制服之數皆存于國邑故聖人之治常若不憂邊陲者而邊陲無釁則聖人所以治之有道也道者知物之所從出集近而馭逺外若甚絀內有餘故有道之人不急鬬人有道之政不急鬬政有道之人豢士以明醴之醑秣馬以芻靈之藁繫敵以綰璽之組有道之政輟一食而軍士宿飽拆一劵而丐奴解甲夫豈為誕説哉齊莊公楚威王猶未及于中古也一戰之覆邊境薄削反而治內弔死問生哭大夫之廟立百姓之社弛酒卻肉三年而天下畏之霸者成喪者復夫差主父者天下之強君也威立于絶漠厲馳于上國乃教羣臣曰內治之道吾既聞之矣其不足以包諸方兼齊晉者勿告寡人也自是多勿告者窣嚭李兌因以捘臂探其內白起伍胥因以蕩足取其外故夫耀火之蟬外視取室之賊外譟多禁者竒喪惡聽者多餓今不知禍敗之所從出條貫之所組絡緩急輕重之所救濟但曰邊陲之事則言之非邊陲之事則勿言之是豈嘗察於本計也哉聖人之臨天下懸衡握斗以為物藪官府取萬畿輔取千邊陲取一焉詩書所稱成敗之源禮樂取千刑政取萬而兵取一焉一握之樹一􅎌之稻而皆有數死螟蜮蟊賊死之翕陽沍隂死之斥鹵沮枯死之稂莠宿莽死之雞豚搔聚死之縱此數死而獨輟食以論刈穫之盜競勝不解毛髮相捽不待疾風飄雨而豐本美蔭已蒙然穢矣故錮四達之聽禁密勿之告設一切以排衆説者必有甚諱隱慝生焉不可不察也本治下黃道周然則為天下者慎無諱而已諱在內賊則在于內諱在外賊則在于外姦宄竊國必大扃限而多舉諱大扃限而多舉諱者佯為毖慎以閉天下使天下忘禍而易過世之寡識者既樂於自閉又以為國慝所在重言為好蓋自是賊滿而莫之敢告也古之天子簡處而一治壼巷寢室達于日月應役之册舉指可數若是其所露索者亦亶矣猶自以為幽翳四聽而八視惴惴焉廷處而號衆若行窱䆗之索其膏火也今楯陛之內盤泉桓淵動千里數能含雲霧致霜露者跖足而至若是即有不測龍蛇雜興未可知矣而又重其扃鐍使千百人擁之一人獨閉而卧之猶自以為安處故今之為宅中者宜賢于古之為宅中者也古之宅中者以一人治數十人以為不足又使數百人外視而正之今之宅中者以一人治千百人以為有餘矣又益之以虎豹龍蛇之囿故古今之賢聖與其道術各相反也古之嚮者趣以明今之嚮者趣以幽古之植晷測以南今之植晷測以北夫非其道術之反則必有隂説而亂之者知其隂説而共與諱則是隱亂也知其隱亂終不可諱而且不得不諱之則是無術也古之為術者規弦天地而始于日月日月者萬物之所相見也聖人之道欲使萬物皆見之故晝行而著日月夜行而著星辰窺牖而杓太青俯水而鑒大晶包陽不見則其道必戰故聖人之相天地謂與之為明不與之為冥萬物之貴聖人亦與其明之不與其冥之也廣隂之下盤陸之底日月則亦間照焉積羽之西扶桑之東祥雲甘露則亦間被焉然而萬物不往者以為彼此不相見則光耀霮䨴與之俱失故聖人之賞民道民而賞之其罰民道民而罰之故喜一人則曰天子喜也無曰誰喜者怒一人則曰天子怒之無曰誰怒者天子之喜怒賞罰見于天下則其不喜不怒不賞不罰者亦見于天下喜怒賞罰不見于天下則一人隱志天下皆意之賞一人則曰誰喜之也罰一人則曰誰怒之也夫一人之喜怒而天下以為有代喜怒者則雖耀佩鑑鐫刀鋸户據人之項徒足以失柄無顯威于天下故君子之為法也亦使萬物各相見也萬物不各相見而日月常見萬物日月常見萬物故萬物之怪皆出以示人萬物之怪皆出以示人則人皆知其祟不受其禍故聖人之為鼎所以使物之祟出相示也魑魅魍魎雖甚魌醜其種類亦各相美好也出而人醜之雖甚鬼情亦自以為忸怩聖人以為知此者可以治天下矣故其治物也以鼎治人也以鐘鼓治物者隱其情而見其形治人者隱其形而見其聲見其形則天下無遁情見其聲則天下無遁形聖人以為知此而天下之數可義起矣今曰見鬼物者必死量聲而度其形者不祥則是天下之物皆相與諱也天下之物皆相與諱則強者橫口柔者閉齒喜怒賞罰明或竊之而目相視明或竊之而目相視則殆矣天下之殆皆始于有所諱而終于不可諱豎牛之禍孟季氏皆知也以為告之則憂二子又不信於穆叔公子成之怒李兑氏知之也禍未發則不敢正已發而與其事則不得不為賊故賊有發于慮禍討不討而皆為賊者季氏李兑氏也太宰嚭爭霸於晉勝之而不居不為不智也李斯請罷阿房減轉作戍邊不為不忠也以閉其內賊而憂于外其過愈于賊故賊有發于據寵告不告而皆為賊者宰嚭李斯是也韋匡翟蔡褒衣雅冠唯隨中書子文子夏棲遲五侯之間大臣寃而不能白權幸移而不能諫卒以覆國身名俱喪故賊有發于保身過無過而皆為賊者韋匡翟蔡子文子夏是也此數子者其初皆不甚罪也以其中有所諱始諱之而卒不可諱故不可諱者皆歸焉故鼎鐘鼓者聖人所别鬼神正告于天下也聖人為鼎而因以為斧鑕為斧鑕而因以為較梏為較梏而因以為金矢為鐘鼓而因以為鞀鐸為鞀鐸而因以為橋梁之木為橋梁之木而因以為方册削牘凡此數者皆以其類愈廣而愈白凡以已自見于天下使天下共見之而已今曰主希聲則臣見尊數問人則權不神猶曰登髙則民散夜火則矢集此大昧慧不可為天子道也為天子者已錮于是説不得所以道之其道莫如廣之使見所樂廣之使見所樂則其勢漸親外漸親外則其數多告而寡諱矣故古者之為明堂皆在南郊之外日月之壇夾城之東西講射之地皆饒芹藻環水為澤春秋雨露陵寢自步大狩之月不廢騎獵凡以抒慮明精宕爽閟鬱㵼幽清之況與士君子百姓陶其日夕疑難多積則于通達古今博奧之士必有所取之矣必有所取之而後可與灼治亂之原證成敗之事吐日月之耀刋鬼寐之怪總中外之幾商素王九主之務也失此不圖彌隂抱陽暈生于外賊成于內禹鼎鐘鼓不能正告徒負紳帶而號虎兕龍蛇之澤以為多諱不已殆哉仲尼曰聖人覩物而見情愚人見怪而諱名唯其諱名是以與怪為鄰而莫之知也過臣楊鏘傳曰忠信重祿所以勸士也三代之君成周以忠厚待臣故卜世三十卜年七百其收效也為獨逺降自漢唐以來待臣下之寬厚有禮莫如宋期以養其廉恥厲其名節以作其忠愛也終宋之世士大夫戴主之馴輯端謹絶無跋扈悍背之患食報彰彰矣但其弊失于文弱無斷士之負國也在驕縱廢弛迂徐寡效其矜激自是者又往往與人主爭勝異同矛盾以國為擲急于分黑白而緩于課功能怯于當事機而重于畏清議試以朴忠強幹擔荷勇決者求之仁宗時已不如開雍祥興時何也守繩墨多顧忌愛磽潔而尚文飾也至鼎沸于熙寧乖刺于元祐決裂于紹興靖康紛紛皆一夥大頭巾自相抵觸而人主略無裁制以故習于尊主而主威日削講于為國而國勢日虛而宋于是南矣嗟嗟推彼祖宗崇重士大夫之意豈望其如此耶南宋則又益偷矣以虛譽為真才以空言為實用持議者以先負重名而人不敢忤首事者自謂忠勤而全懵機權聚頭磕膝祇説道理掀唇擊掌橫肆詆訾當時人主亦束縛于積習恂恂儒默曽何有一毫英氣雄略而號為君子者猶謂莫急于格心觀蘇雲卿陳同甫之説則槩可覩矣嗟嗟豈禮士用人道固自異耶國朝培養人才視前代加隆髙皇帝崇師儒洪作育一洗浮靡姑息之弊嚴刑重典頗加于法外疑其挫折寡廉而臣下習于憂勤篤于忠愛至靖難節烈震疊千古有養士數百年所不能得者何也蓋髙皇造就之心殷勤懇切如嚴父課子但知玉成毫無矯飾真足以洞徹簡在而感動人主豈特一時之憤激也哉宣順成𢎞以來體貌益優文網益濶雖球同時勉輩不無慘楚辱剝而天下皆知姦豎所為非天子意用是愈堅其靖獻之心逆瑾以苛法淫刑箝制士大夫笞譴抄贖死亡狼籍而凶熖旋撲正氣畢伸所以纍朝人才瑰瑋勳業炳耀擬于兩漢蓋至土木之變宸濠之變江彬之變于王楊諸君子投軀戮力勘定消弭功在社稷食報亦彰彰矣大段本朝立國其脈原強其氣原厚故人才之挺出也雖入富貴却無豢養氣雖出經生却無頭巾氣朝廷之待諸臣也其禮甚渥其法甚明上誠于委任以開功名之路下惕于後效以收敬事之功此我明用人圖治之大本大端也肅皇帝聖神英斷大吏時伏斧鑕批鱗間遭訶譴然節目敦大委任得人諸司凛于奉法恬于仰成所係洪矣晚年深居端拱外庭日狃嬉窳萬厯丁丑以前救時者稍矯以嚴飭羣情已局蹙靡騁數十年來中外無警上下交弛入仕籍者浮文傲態澤貌枯中進退自由趨避適意壯心消于逸欲智慧讋于穠華淡泊寧靜目為疏腐惕勵憂勤惡其害已養交植黨玩嵗愒月天下事廢壞至于今日勢理自應刷振而承靈者頓覺倉皇失措固無怪也夫才何常練之則出力何常習之則勝不練不習而驟當驅督如膏梁逰冶之子弟一旦責以負擔穿耳纒足之婦女一旦迫以奔趨其何以堪宜乎海內興有君無臣之嘆遂使天子有鄙疑臣下之心因而漸相水火因而别有信任因而削禮峻法而世事人情愈益緒紛紐解豈休徵也與以陳寵琴瑟之喻與敬薑勞逸之論推原觀之草莽局外之見有不能自昧者已學術楊鏘天下有維世之學有濟世之學維世者明天人析義理金玉其質鸞鳳其羽厚彛倫而美風俗繩異趨以一道化無此等人則雖己安已治而元氣斯薄囂凌易生矣濟世者審理亂急事功逺略長才應機導竅兼文武之資切緩急之用俾主勢尊于上反側貼于下無此等人則雖已治已安而髖髀之斧斤弛風波之舟楫乏矣維世存乎德濟世恃乎才夫謂德之即為才也治平之根乎誠正也世務之備于經術也此如河之有星宿海方脈之有素問也誰能外之雖然但窮河源即為神禹但讀方脈即為倉公乎夫始天下而原自治安也何用贅為治安惟其智不能自謀力不能自給散不能自聨害不能自衛然後奉一人以稟仰之一人不能獨理然後公孤尹牧以綱紀休養之公孤尹牧不皆生而知師心而自用也然後立庠序隆師儒彰典謨以講求薰習之弓旌軒裳以寵拔貴耀之非徒使其自了也蓋欲以用之也一入其彀則曰我已修稷契伊吕之業卑卑功利固道誼所不出矣夫督功課利有國之急務也不計功將狃敗乎不謀利將恬害乎即稷契伊吕又焉用之夫抱必不靈之術以享人華膴而任勞宣力者一切付之卑小功利之徒何道誼之不恕也竭資異數以得必不屑用之人而一旦緩急又别從茍且赴功者圖之何養士之無益也又不啻此也逮夫勢機交迫目亂技窮有申韓桑孔所不為者亦攘臂為之而又寡效焉何親切之道誼去若熱而卑視之功利如捕風也夫天下有識時務之俊傑無無實用之聖賢吾固謂俗儒之誤世非獨其見之迂乃其才之短也今天下有能振墮偷破積習實邊儲紓閭左清嘯聚却訌擾俾兵不驕吏不墨士不偷民不流離思亂者乎吾願截格致誠正一半精詣以歸談理之儒而推斯人為真王佐可已國是楊鏘國是有定體無定局何謂有定體槩言之有以縝密為是者有以疏濶為是者有以明審為是者有以含糊為是者有以緊捷為是者有以漸次為是者有以剛割為是者有以隱忍為是者有以振刷為是者有以因仍為是者此千古不易者也何謂無定局槩言之有古為是而今為非者有前為是而後為非者有名為是而實為非者有常理為是而窽會為非者此當隨變通者也國是之得或出于英主之獨斷或出于碩輔之老謀或拾遺于隱君子之昌言或醒迷于虛中者之旁論國是之失或際夫已窮而不變或狃于積習而苟安或決裂于書生之執拗或厄奪于重臣之專愎或隂撓于朋黨之盈廷或紛更于躁夫之喜事此所謂有治人無治法者也夫謀國之是非與行已之是非大不同矣行已者隨地而處遵軌而趨成敗利鈍置之可也謀國者君父宗社之安危四海九州之利害關繫何如而可執邊見徇恆情畫不足以規益而曰道不計功智不足以紓憂而曰心不負國然歟否歟常觀古之識時務者如登絶頂覽方隅飲上池見五藴因形設阻對症下藥聞見不牽浮囂不恤擔當不辭勞怨不避固非畏首畏尾膠柱調瑟者所能勝也是故謀國之要不難于有所見而難于有所淆淆之者持之似有理言之似可用而實謬于時宜此孔子所謂辨言亂政者也當國者可不審哉可不審哉民生楊鏘夫民生而須衣食居處有養有終如是而已矣兩愚不能相理兩賤不能相制而後君師官長生焉不過使之并生并遂相安于天地之間而已自世法益變人之術業亦益變而艱辛悽楚莫可逃遁者獨萃于愚賤之民世幸泰寧公私不擾則一時三代也然兵出命以衛農農出力以養兵兵則長征畨戍南燠北寒楊栁雨雪之不禁其悲湯火雷霆之莫必其命但得酣眠甲盾醉卧沙場已為厚福矣農則萬苦所集萬賦所出終嵗胼胝復有水旱之虞但得不入縣門不見胥吏麥收十斛社博一醉即稱擊壤矣百伎微營勞筋苦骨亦復如是而于斯時也堅肥鮮美歌舞遊般包苴餽遺窮珍極麗恣耳目之快愈昧勢理之剝復皆智且貴者之長也皆愚賤之膏脂而愚賤且甘奉之虔事之而毫不得與者也及夫驕縱惰弛養成釁孽天下掀然多事則抽丁選壯橫取酷徵貪墨猾蠧澤吻摩牙公一私十如羣鴟之啄腐集蠅之嘬血洶洶乎備受剜剝者皆愚賤之民也甚至魚潰鳥離頽然隄決則潢池緑林之魁雞鳴狗盜之流超距裂眥之士又皆策髙足據要津乘約肆盈益薪助火而草菅以用羊豕以驅奴虜劫奪蹂躝焚蕩顛連而無控告者又皆愚賤之民嗚呼哀哉何斯民之有萬苦而無一安樂耶孟子曰勞心者治人勞力者治于人治于人者食人治人者食于人今以勞力者虐于人食于人者虐人民生之痛其何極之有然則嚴于吏而寬于民非神明仁覆之主先憂後樂之臣不能奮然行之矣君子小人楊鏘自古國家之治亂君子小人平任之何以明其然也易曰內君子外小人為泰夫外者內之對也非無之也蓋理不能無勢不能無也外之者以君子用小人也使君子不能用小人小人且自用矣何也人主所以鼓動天下者爵祿富貴也使爵祿富貴不足以鼓動之則人主無權矣為人臣者起家而委身一也受事而宣力一也獨于其中競進而寡廉機變而善麗公不勝私義不勝利則謂之小人矣然此等更多才幹之人能自致要津之地醇謹端雅者反易入其彀中誠能駕馭而驅使之涵容而調劑之使之長有所展而勢不得肆則其溪壑之欲未必皆如莽操之無己也而世儒之所謂分别黑白者必不使一小人厠于其間夫既以爵祿富貴鼓天下而又必欲盡得不愛爵祿不貪富貴之人將使王衍持籌嗣宗理棼楊震孔融供使令而正心誠意之君子僅僅褒衣拱手于廊廟之上此不可期之赫胥無懷之世而以治今天下可乎彼小人者又豈肯甘心自以為小人終俯首以窮死也于是黨益堅隙益開幸門日益廣而世事從此壞矣是國家之治小人猶得分其勞而亂則君子且獨受其責也可勝嘆哉或謂流放竄逐書有明訓不知彼所謂流竄宰相而媢疾者也有才有度之相其藥籠固已廣矣亦安能使人臯夔而家曽史哉噫君子不幸而與小人共事駕馭而用之者上也有策以去之者次也盛怒而胥之嚴扃以絶之搜索攻擊以窮之磽磽然自謂清正疾惡而使小人得肆其反噬是以名節行誼害人國家者也憤世楊鏘古者英偉卓絶之士負經濟之略抱治安之志或生違其時或用乖其器其一段牢騷憤悶之氣不得已寄之猖狂沈湎悲歌痛哭令人怪惡驚詫意殊不屑而胸中實耿耿醒醒悲天憫人未能頃刻置念如龎士元阮嗣宗者流詎可測量乎哉乃若咿吾俯默雕肝刻肺以課鉛槧之業其初念止為一身一家幸而入彀祗同空華不幸而棄置不過孤負幾句朴􅈪學子語耳有何瑰異不得售而往往托之勞人棄婦怨訕咄嗟以為千古竒厄尚為知類乎或者負愆罔悛途窮不返而且謂世路荆榛浮雲蔽日以被棄之朽質謬托于湘纍之眷懷以啄瘡之憊骨自比于絡頭之神駿其亦厚顔矣故君子春不侈榮秋不怨雕憂人之憂而人不知樂人之樂而人不與非獨見其大者乎放言楊鏘嗟乎茫茫浩浩之古今變變靈靈之造化果只有人之一途乎果只有綱常名教之一端乎古聖人立言垂範一依于謹確平常者何也蓋身任世道之責如宗子課家衆苐期勤儉克立以無墜箕裘未有教之幻骨肉薄生聚塵甑鶉結以為髙者也如孰師訓童子不過訂其句讀考之影倣納于端謹文雅未有與之談出世之旨離經毁方絶聖棄智以為竒者也即兢兢軌物猶恐有佻黠之民軼我防維以鑿人渾沌而洪深要渺如天地與吾心未應有漏之精藴俱用不著此莊生所謂緒餘以經世者也惟夫既隱矣既廢矣遁其迹于四民之外曠其情于萬物之表沕沕穆穆寥寥廓廓不入類以亂羣不比偶而立異乃始得搜山川自有之嶔竒泄宇宙莫窮之祕密一家可藏六合靡竟使天下守經之士駭以為怪禮法之儒笑以為支而因用以自晦何也唯駭益徵彼之習于常唯笑益見彼之遵于度而後先王治世安民之大經大法不以一二狂誕畸癖之人病故言放先以隱言廢先以清若夫肆吻而戀世華入羣而畔繩墨謂之惑世誣民可也管仲楊鏘自古雄才實學義正志明建補天回日之勳樹翼戴匡扶之幟者無如管仲周自昭王南征膠舟不返荆人以戲弄賊主此時去成康之世幾何天下固全盛也玉帛會同之邦凛凛于明法敕罰罔有斁也士馬物力又不啻十百于江南也吾意普天同仇枕戈泣血汚瀦芈氏以報天子怒猶未怠也乃恬然相安噤無一言是舉中國俱無肝膽矣不待幽虜平遷而奄奄氣息決不復振矣獨管子生周中葉為血性丈夫痛心蒿目奮然以匡救為己任不輕其身善用其主作內政寄軍令生聚教訓招懷輯睦者二十年人心己乎兵食已足號令已明乃始鳴鐘擊鼓振旅南向問昭王之故當時諸侯一聞此言如夢乍覺方知先朝有此未了之恨楚君相亦相顧駭愕方知先世負此不貸之辜幸事涉久逺尚可謾詞抵塞而齊亦知其極重難返姑聽其納欵輸貢俾滎陽上蔡間粗得安枕而後圖東京之方物此其心刻刻在王室也試觀北杏以來諸侯乍信乍猜旋輯旋渙始驚其創咸懼其無成繼幸其成復忌其強盛費幾許圖回幾許收拾僅乃不負初志英雄敏手結作巍然曾西何人而卑其功烈吾不知處仲之地任仲之責將何如揮霍而後云可也夫霸者伯也方伯連帥之長藩臣之名也商命文王為西伯專征伐豈文王亦雜伯者乎彼齊之所以明目張膽于楚者固曰周有成命五侯九伯女實征之楚亦知賜履之有所奉也乃不敢以江漢衡而謂齊無王何也吾不暇與諸儒辨王伯純駁之微苐借令孔子得志于魯亦不過奉周公之靈申夾輔之命合諸侯安中國攘外叛尊天王止矣能進方伯一步乎將亦謂孔子為雜伯乎孔子深知管仲之功曰民到于今受其賜曰如其仁如其仁而孟子乃謂聖門羞稱謂王齊反手何言之易也且夫以齊伯則尊周以齊王則代周矣或者戰國之周業已可代而孟子訟言代之則春秋之周尚有可尊而管子極力尊之者未足深鄙也是小子之所疑也後世惟孔明乃心漢室故南陽一晤首談伯業皎然以方伯連帥討賊復仇之義望先主矣必至丕篡而後建帝號以存祖業其自許管樂豈虛語也哉世儒狃于評伯之文昧于伯字之義動輒曰仲胡不勉其主王噫陋亦甚矣夫直有二伯無五伯則吾鄉用修翁辨之詳矣莊子楊鏘楊子曰莊周可無著此書也其言根本老子縱橫透徹極性命之致蓋謂機智開則巧偽生而憂患始直欲破澆漓之習解世綱之縛而還之混溟之初也然而適所以開人之機智也孔子曰民可使由之不可使知之蓋聖人喻其意而心愈默每每低一著以程世穩一步以立言其于斯世之幻妄冷淡處不欲道破恐賢者得之益任其曠誕不肖者得之愈利其縱恣則非世道之幸也莊生誠欲遊方之外守性命之宗何不離言語文字自比于古之沈冥乃昭昭然闡抉太盡徒為後人開一頺惰放肆之惡門户其尚未至于至人之域乎庾子嵩讀莊子曰了不異人意蘇子瞻曰吾昔有見于中口不能言今見莊子得吾心矣由此推之不畏人參不透正謂盡決其防今夫慈母之愛兒子也見其近于井則惕之曰是不可窺其中有鬼見其弄果核則誡之曰是不可銜誤吞之則腹中生樹于是羣兒遇井則逺避手果核則不敢入于口有黠兒教之曰井安得有鬼腹安得生樹為剖析其必無之理又為之窺井銜核以示其無他于是羣兒競效之為慈母為誑已略無忌憚而溺且噎者種種矣故謂黠兒之言為謬乎非也其愛羣兒之心大異乎慈母也大扺莊子生于周之末造士大夫無復警敏憂惕之志而聰明特達者遂偃仰放逸以全其天年其書亦氣運使然然其中皆至言微言與六經相發明者殊多非莊子不能著此書吾惡夫機鋒嗜欲橫口填胸而效顰莊子者也死節論陳確嗟乎死節豈易言哉死合于義之謂節不然則罔死耳非節也三代以前何無死節者無非死節者故不以死節稱也三代以後何多死節者無真死節者故爭以死節市也何以言之生死亦平常事絶無足竒者要善其死之為難耳子曰志士仁人無求生以害仁有殺身以成仁孟子曰生我所欲義亦我所欲二者不可兼則舍生取義是故義可兼取則生不必舍仁未能成而身亦不必殺也由賜未悟心疑管仲之不死夫子盛推管子之仁而終黜匹夫婦之小諒孟子亦言可以死可以無死死傷勇故參觀一聖一賢前後之言而談死節者可以鏡矣殷之三仁惟比干之死紂殺之耳使紂不殺則比干終與微箕同賔周室必不死也惟孤竹二子獨能自立名行不食周粟窮老西山故孔孟嘗稱其餓蓋紂雖暴君也武雖聖人也何至使八百諸侯同聲一詞冠帶之倫服膺新命向無夷齊之餓則天下後世尚復知有君臣之義哉此抗古以來一大砥柱也故古今談節義者必以夷齊為稱首嗚呼若二子者可謂真節義矣然夷齊之所以為夷齊只在窮餓節如是止矣不必沾沾以一死為快也使二子而亦若後世之不食七日而死不成夷齊矣子長好竒猥云餓死遂使學古之士信孔孟不如信子長不亦悲乎夫以二子之義即優遊西山之下竟以壽終已大節凛然照映千古何必死蓋惟其不官不死不十亂不三監非殷非周非仇非后伯叔逍遙西山終老求仁得仁斯其至也而復何慷慨之足云凡言餓者只是窮困之詞孔稱夷齊與齊景之千駟相提而論可知只是貧耳故詠詩嘆美不以富而以異孟子謂七十非肉不飽不飽謂之餒夷齊之餓不肉食之謂也即何嘗許其兄弟捐軀同殉國難者乎春秋褒善之文舉其大者遺其小者如其餓死則死大于餓不當但稱其餓也即叩馬之諫采薇之歌或傳好事或采軼文何可慿斷且二子自北海來歸已與太公同稱大老後西伯死又十三年武始伐紂則二子者已皆皤皤期耋之年天下而無不死之人二子安得獨不死只不是餓死耳自此義不明而末世好名之士益復紛然致有赴水投繯仰藥引劒趨死如騖曽不知悔凡子殉父妻殉夫士殉友罔顧是非惟一死之為快者不可勝數也甚有未嫁之女望門投節無交之士聞聲相死薄俗無識更相標榜虧理傷化無大于此近世靖難之禍益為慘毒方練之族竟踰千百一人成名九族揕首何可説哉甲申以來死者尤衆豈曰不義然非義之義大人弗為且人之賢不肖生平具在故孔子謂未知生焉知死今士動稱末後一著遂使姦盜優倡同登節義濁亂無紀未有若死節一案者真可痛也即又何云三代以前無非死節者耶曰堯舜禹湯文武周公孔子繇此其選矣生有所以生死有所以死如四時隂陽更相禪代不爽毫髮正所謂與天地同其節者乃真死節者也即向所舉箕微夷齊之節各有攸歸微箕志存宗祀故受封而不辭夷齊志扶綱常故辭祿而靡悔要之四子易地皆然節如禮節揖讓進退之不可踰咫尺也節如音節髙下疾徐之不可微芒忽也若繇是推則三代以還死不失節者蓋亦鮮矣昔人有云東漢之節義不若西漢良有以也古人見其大今人見其小古人求其實今人求其名人心之淳漓風俗之隆替繇斯别矣然則今之所謂死節者皆非與曰是不同有死事有死義有死憤有不得不死有不必死而死要以無愧古人則百人之中亦未一二見也忠矣可謂仁乎曰未知而何易言殺身成仁之學乎古人學道只如布帛菽米日用靡間猶難言純熟今人皆有意求之何易可合果成仁矣雖不殺身吾必以節許之未成仁雖殺身吾不敢以節許之節也者不可過亦不可不及故曰中節之謂和豈惟今罕其人子固言中庸之德民鮮己久蓋言中節之難也喪實論陳確先王之制喪也權親踈而為之斷非以其名已也蓋皆必有其實焉昔者宰豫欲短喪而子罪之齊宣王欲短喪孟子議之儒者必曰宰豫齊宣之非而孔孟之是也何待言哉非惟然也前古之為母也齊衰杖期近古之為母也斬衰三年儒者必又曰前古之失而近古之為得也近古之為適母也三年為生母也期今之為生母也亦三年儒者必又曰近古之未得而今制之得也于是聞漢文以日易月之制則羣非之見時宰有奪情起復之事則大笑罵之嗟乎不循其實而徒悅其名曰吾寧從其厚者則天下之可非而笑者必多矣雖然今儒者之所為三年喪吾知之矣書之簡曰孤哀子而已矣曰制而己矣曰泣血稽顙而已矣而言笑則晏晏也睹其外貌則傫然衰冠而已矣而內皆纎縞也飲食則厭酒肉也寢處則安房帷也夫且靦然晏會而不知恥也預人間事匍匐公庭而不知其非也有三年之名而曾無緦小功之實而猶欲非且笑天下之人可乎哉文帝雖更三年之制然有短喪之名無短喪之實歷觀漢代之主並篤于所生故死而皆以孝諡非茍而已也昌邑入繼以尊則天子也以親則非所生也徒以居喪無禮私買飲食為大臣所奏至不能保其九五之位則漢乃嚴于喪制非弛喪制者也陵夷至于魏晉一時風俗號為頺敝而劉隗所奏世子文學王籍之居叔母喪而婚東閣祭酒顔含在叔父喪嫁女廬江太守梁龕明日當除婦服今日請客及同宴丞相長史周顗等三十餘人並應特罷黜故謝安石期功之慘不廢絲竹則王坦之致書苦諫至往復再三故同宴者且不免則喪主可知期功之喪曾不得少假則三年者可知六朝之敝也而猶篤于喪若此則三代以上可知何圖至于今日雖號稱名賢行若禽獸曾不省察親朋不之規有司不知罪誠舉所謂三年喪者與古齊宣宰豫之流潔情而量實已不可同年而語矣又何暇談姚虞稱曾閔哉夫孝者百行之原喪死尤孝事之大一端虧損百行莫救故曾子曰人未有自致者也必也親喪乎孟子曰養生不足以當大事唯送死可以當大事何得不求其實而徒驚其名曰大夫必三年而後服官士必三年而後出試三年則三年矣試回思三年之中服食何如也居處何如也有不背汗交流錐心刺骨局躬無地者乎故古之期母而三年父也非薄于母也父在則禮然也況乎非適母而生母也然禮雖殺也而情彌篤矣今而不然禮彌隆也而情則薄矣故古人之于親也似薄而實厚今人之于親也似厚而實薄古人之喪親也劈踴哭泣而己今則盛集僧尼伶優以悅里耳夫僧尼伶優之為費非不繁多也然而未若劈踴哭泣之至也古人之葬親有懸棺而窆者今必擇地擇年備物而後葬非然則寧久停而不葬夫擇地擇年備物而後葬之于親非不厚也未若懸棺而窆之可速安親魄也非唯事親為然也古之稱朋友者以字今之稱朋友者曰某翁某老古之于朋友多規今之朋友多頌夫翁之老之而多頌似厚矣然不若稱字多規之真篤也古之飯客者有以蔬食今之飯客者必備味不備味寧弗飯備味非不厚也未若蔬食之可以速飽也古之于妻也嘗三世出今之于妻也舉世無一出不若三出之可以肅違也古之婚者六禮備然不過數金今之婚者未能半六禮已不下數千金夫數千與數金之為厚薄易知也然不若數金之逮時也古之嫁女者荆布而可已今之嫁者必珠玉綺繡光耀白日迎奩之舟相銜而進而後嫁夫珠玉綺繡之于女誠厚矣然不若荆布之貴德也種種薄俗自謂能勝古人而己不如古人逺甚吾故欲籲今世之士之稍知道理者凡事皆求其實毋徒騖其名而況終天之痛乎哉僕昔年喪父隨俗習非不能循禮真是千古罪人然每當賓朋宴集之日亦未嘗不良心中發頭面赤􅀈坐者怪之自後每近先人忌日輒斷腥一月然亦何能贖吾罪之萬一此僕己覆之轍故敢拈示吾同志以為殷鑒嗚呼士苟念此則時蹈氷淵乂何敢非笑人之有明文海卷一百
