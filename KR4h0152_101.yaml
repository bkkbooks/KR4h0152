body:
  text: 明文海卷一百一餘姚黃宗羲編説一醫説趙汸醫之為術古之君子類皆能之以為養生事親慈幼之切務非可漫焉諉諸人者是以百家衆技莫得而先焉况人之有身肌膚之會筋骸之束元氣之藏神明之谷經之所起脈之所止營衛周流屈伸聚散與天地比運氣靡常土風殊理五臟六腑勝負衰旺死生疾病之所以皆儒者格物致知之目所當必究未有𡨕然於一身之內而得為大儒君子者也去古既逺由百家衆技而上率以空言相師而不既其實惟醫則利害得失決於旦暮間甚逺不過旬日非可以文辭隱蔽故學者鮮焉於是判為専門而世俗養生事親慈幼之際亦惟他人是託其不能無憾者衆矣宋之盛時嘗命文臣知其説者取前代方劑雜民間所獻遴選而慎存以極謹審之道業斯術者賴焉奈何庸人謬為增損一以溫平和解掩其所不知而終無益于治療之效漢長沙太守之書觀證察脈以知病之所在而湯劑施焉其道最為精當而近世以來遂為絶學間有剽聞一二曽未得其要領而疏導湧泄率意妄施戕生人於掌股間而目不瞵其流弊豈有涯哉故凡儒者所當為而不知講則世俗之士將起為之其禍有不可勝言者不獨醫也河南處士郭公子和嘗以其修已治經之餘取張氏書精意研覃補其闕略朱子為敘以表章之沙隨程公可久亦有論著今傳者罕矣四海既一河間劉氏東垣李氏之説始行東南其遺書未嘗散布者猶有數十種有志者由是以遡長沙之學而有得焉可以養生可以事親可以及人庶幾古者大儒君子之能事不遂泯於方來已乎雖然醫仁術也其體甚大其理甚微其用物也猥而雜其取效也近而著非通乎天地之化辨乎事物之賾者不足以成其能也非貫乎方論之博極其心思之至者不足以致其用也蓋必有明敏之資躬質厚之行而又反諸身以求古人格物致知之所必究者而用力焉使其心靜而理明志堅而神定然後聖神功巧脈病證治之説可以意會金石草木形色氣味之性可以類推而又博濟而匪私善施而不伐庶幾醫道復古者乎豫嘗重有慨於斯切意通都大邑或有其人而未之見聞浙東朱公彥修親得河間東垣之傳於其師每欲一從之遊亦因循未暇也至正己丑冬來錢塘卧病進士臨川葛元哲會舍君時為行省掾以長沙法親煮藥飲豫且曰豫書佐慮叔原善論醫當使為子發藥既而叔原至按脈處方乃東垣治內傷法也藥三進而病愈豫歸山中每思叔原不忘辛卯十月豫復來而叔原方給事公府少暇日則指徐君子貞相識因造其家得觀李氏諸書歎其用力之久客中感疾屢從子貞得藥如鑰透簧湯沃雪又喜其取效之速聞朱公昔遊會府子貞之先君子愛慕之因遣子受其説又知其學為有傳書肆老人陳思復為豫言子貞之父孝於親養生送死不墮流俗尤篤友誼則其過庭之間所以為學問之本者必有道矣蓋是數者皆非今日方技家所能備而子貞兼有之且年甚富氣甚清讀書論文日進因之以成其能致其用使得於已者可及於人續于前不絶於後其事甚偉而乃優遊獨善使其道暗然而不章豫蓋深惜之故具以平昔所見為子貞言子貞倘因豫言而有感其必善施博濟不失父師之意有以副交遊之望乎染説蘇伯衡凡染象天象地象東方象南方象西方象北方象草木象翟象雀以為色取蜃取梔取藍取茅搜取槖盧取豕首取象斗取丹秫取涗水取欄之灰以為材熾之漚之暴之宿之淫之沃之塗之揮之漬之以為法一入再入三入五入七入以為候天下染工一也於此有布帛焉衆染工染之其材之分齊同其法之節制同其候之多寡同其色之淺深明暗枯澤美惡則不同其深而明澤而美者必其工之善者也其淺而暗枯而惡者必其工之不善者也蓋天下之技莫不有妙焉染之妙得之心而後色之妙應于手染至於妙則色不可勝用矣夫安得不使人接于目而愛玩之乎此惟善工能之非不善工可能也夫工於染者之所染與不工於染者之所染其色固有間矣雖然工者所染之布帛與天地四方草木翟雀其色則又有間矣無他天地四方草木翟雀之色二氣之精華天之所生也天下之至色也布帛之色假乎物采人之所為也非天下之至色也學士大夫之於文亦然經之以杼軸緯之以情思發之以議論鼓之以氣勢和之以節奏人人之所同也出于口而書于紙而巧拙見焉巧者有見於中而能使了然於口與手猶善工之工于染也拙者中雖有見而詞則不能達猶不善工之不工于染也天下之技莫不有妙焉而况於文乎不得其妙未有能入其室者也是故三代以來為文者至多尚論臻其妙者春秋則左丘明戰國則荀况莊周韓非秦則李斯漢則司馬遷賈誼董仲舒班固劉向揚雄唐則韓愈栁宗元李翺宋則歐陽修王安石曽鞏及吾祖老泉東坡穎濱上下數千百年之間不過二十人爾豈非其妙難臻故其人難得歟雖然之二十人者之於文也誠至於妙矣其視六經豈不有徑庭也哉六經者聖人道德之所著非有意于為文天下之至文也猶天地四方草木翟雀之為色也左丘明之徒道德不至而其意皆存于為文非天下之至文也猶布帛之為色也學者知詞氣非六經不足以言文玄非天黃非地青非東方赤非南方白非西方黑非北方夏非翟緅非雀紅緑非草木不足以言色可不汲汲于道德而惟文辭之孜孜乎天台方希直從太史宋公學為文意其年甚少而其文甚工不惟同門之士未有及之者自朝之搢紳以至四方之老成凡與宋公友者無不推許之以為不可及余每過宋公退即希直讀其所為文未嘗不擊節而歎其有得于文之妙也今希直將歸其鄉大肆其力于文故因以此勉焉余自蚤歲徒盡心於文章垂五十而迄無成不知自勉乃欲勉希直寧不知愧然希直得余説而及時以道德自任則又何至若余哉此余之所以致愛助于希直也雷説上劉基有夫耕于野震以死或曰畏哉是獲罪于天天戮之矣劉基曰噫誣哉何觀天之局也一夫有罪天將自戮之乎天生民而立之牧付之以生殺之權而又自震以討焉惡用是司牧者為也曰天鑒于民有隱慝焉人罰弗能及也而震以威之微顯闡幽神道也曰惡是何言也古帝制刑以為天下均故執刑如執權因罪之輕重而前知之又不敢専而聽于天曰天討也夫是之謂贊天地之化育今曰天又自以震戮人罪吾不知天之所自戮者以何等罪乎謂其積之極人不能勝而戮之耶則天下之為人子而不考為人臣而不忠為人長而不慈為人幼而不孫為人友而不義為人妻而不順賊義而戕仁縱私而滅公倚勢而行姦乘約而肆淫人言而獸心隂慘而陽和磨牙吮血朘膏刮骨擅威作福殘害正直而逭于司冦之誅者不為不多矣豈司雷者有所畏乎乃不一有戮而庸夫乎戮焉使彼有以覘天之意而謂天之所怒在彼而所容在此也則恃以不忌是天以震勸逆而濟禍也豈天道哉必不然矣曰然則雷何物也曰雷者天氣之鬱而激而發也陽氣搏於隂必迫迫極而迸迸而聲為雷光為電猶火之出炮也而物之當之者柔必穿剛必碎非天之主以此物擊人而人之死者適逢之也不然雷所震者大率多于木石豈木石亦有罪而震以威之耶雷説下或曰雷有神焉有諸曰人曰有之曰然則雷神所為而非氣矣曰否雷與神皆氣之所為也氣也者無所不能為也忽而形倐而聲為雷為神或有或無不可測知人見其忽而形也而謂之神夫神也者妙萬物而無形形則物矣是故有形而有質者有形而無質者有暫者有久者莫非氣所為也氣形而神寓焉形滅而神復于氣人物鬼神或常或變其歸一也曰既為神也而曰不能戮人罪何耶曰神形而暫者也彼且不能以其形惡能求罪人而戮之菜窩説并序劉基菜窩者宗姪彬之所以名其居室也彬字宗文少好學有識而未用其居在處州府城之東門每求豫為文而恆弗得暇今年豫來京師而彬亦以儒士貢為工部主事因戲作菜窩説且以勉而進之云爾犁睂公謂東門子贆曰子之居東門也井地十畝既夷既壤俯壕為溝倚城為墉藩以枳林緯以蘖場是蓋比如東針錟若攢鎗蛇蜴不能求其縫罅蚍蜉不能為之穴隙也何不墾之以種樹乎又何不耕之以藝稷黍乎不然何不大為之池分北山之泉流以養鱉與魚乎徒何為乎築陋室于其中墼糞土以為壁茨以腐茅蟦蝎是宅藉以瓦礫羊蹄豕迹與蚡鼠為主客平明出門不馬不車不騾不驢以造他人之廬呼朋命徒左蹌右趨談無用之空言強相名而曰儒坐視殷賑之腴索為蓬藋之區不亦悲乎吾聞燕秦棗栗穰橙鄧橘李梨薁鬱秦杏周漆柿桃奈楔琬容琰質椅桐栝柏堅繢有瑟桂椒萸榝吐芳馞馝木瓜榅桲薯藇葛芴叢蔓轇轕彼揫此茁或庸其材或以其實或黃如金或赤如日翹蕭逺條可蜂以蜜克勤厥營茍獲其一富擬封君受天之秩范子所至穿池種魚史傳貨殖盛稱陶朱八口之家五畝之宅牆下栽桑足以衣帛今子不士不農不商不工綴籍州庠口體不充人皆子嗤子曷不懵東門子贆聽之愀然思之杳然瞿然而作再拜而怍立而言曰公有言吾獲矣而吾亦有知焉請以復于公吾將以藝稷黍乎則古人一夫受田百畝而給今將以五畝為宅矣則所羡不過二十之一不能以不飢也抑將以種樹乎則近者非四三年不成不知逺者又幾年乎不可以懸吾釡而俟㸑也抑且為池以畜魚乎則我身畸耳貸力於人何日成乎不可以暵吾疣而待汲也今當種菜而鬻焉尚庶幾乎可也夫夫菜也者采也君子之所采也或謂之蔬焉蔬也者疏也食梁肉者之所疏也君子所采而食梁肉者疏之庶幾或者可以裕我矣乎乃往訪于溪南之圃人得膏土沃泉之術搜四鄙之菜類其族而種之買牛牯一牸三鏺其萊蕪芟去奧薉拔其荄杜阜翳籜而灺之穿井於其四隅建桔橰焉潴水有池泄水有渠或培或滋或叢或竒灌溉攸宜或耘或耔疏稠比稀慈稚舉肥根莖實荑各隨其時羅之離離攬之菲菲未浹旬月而東門氏之童色澤如也貌懌如也窺其園則鬱鬱芊芊入其門則盎然春溫有酒盈尊他日犁眉公過焉東門子贆御諸門犁眉公笑曰子亦足於斯而已乎東門子贆再拜謝曰吾願見公而有陳焉久矣請坐于吾廬而為公言之可乎公曰吾願也東門子贆曰公能悉識吾菜乎公曰未也請之園而言焉曰始吾之不營是園也漠乎其無思也今吾之既營是園也惟其所以壯吾址而厚吾生則非一日也天地久其道而萬物生聖人久其德而庶功成士農工商久其業而百務貞故植韭以為之君韭者久也所以久吾生也致久必慎其揆故植之以葵葵者揆也揆得其道則視明而聽聰故植之以蔥聰達則得算多故植之以蒜蒜者算也算不失家必豐故植之以蘴豐則強矣故植之以薑薑強也物大強則過剛剛過則折君子戒焉故植之以芥芥者戒也戒事者思必苦思苦則毒故植之以荼荼毒罹于中而用力勤故植之以芹勤極則病故植之以蒲蒲痛也病之劇也病劇必弱故植之以荏荏柔而弱也弱則微矣故植之以薇微骭痬也骭微則羸其行故植之以蔞蔞者僂也愈病必以藥故植之以芍藥藥攻病不可失其養故植之以鞠鞠養也得其養而後蘇故植之以蘇蘇則起矣故植之以芑起必慎以保其後故植之以瓠瓠者護也護不違乎道則難舒而福生焉故植之以芷芷者祉也引祉莫大乎育德故植之以蓄蓄必有濟故植之以薺薺者濟也濟自近而之逺自卑而底髙也故植之以菘菘者髙也髙極必窮故植之以芎藭慮窮者必早計故植之以薊薊者計也吾朝而遊焉觀其菶菶菁菁可以悅吾目而暢吾情夕而遊焉擷其芳而茹其英可以旨吾腹而曼吾齡又可以究吾知而通物理安得不悠然而永懷怡然而自喜哉夫吾廬窩也不足以延長者而長者肯臨焉不可以不志請名之曰菜窩願公為志之犁眉公大悅遂旅其菜酌其酒書其言而去南岐癭者説劉球南岐在秦蜀山谷中其水甘而不良凡飲之者輒病癭故其地之民無分大姓小家子男婦女老人後生無一人無癭者彼既安於常故而莫醜之亦莫思所以去之及見外方人至則羣小子婦人聚觀而笑之曰異哉爾之頸也焦而不吾類焉外方人曰爾之纍然凸出于頸者癭病之也不求善藥去爾病反以吾頸為焦耶笑者曰吾祖然也吾父然也吾家之人然也吾鄉之人然也烏用去乎哉終莫知其為醜也夫世之人紛然以貨利病其心而不念其背于道外于義猶癭者不自覺其失于形矣及見正人君子言不能相入輒羣起而攻之曰爾何迂也非吾類也噫是何異癭者笑世人為焦頸哉説舟劉球余常觀舟於江湖之上矣其水盛而風烈波濤之勢洶湧黿鼉蛟魚出沒遠近山川為之震蕩晝日為之昏黑彼羣小艇方港收岸泊之不暇所謂巨艦穹艫者且欲髙其牙檣張其帆席當中流冒白浪以上下乎其間萬斛中藏不見其為重千里倐至不覺其為逺蓋其物大而具備故雖涉江濤之險而恬若無事而功百倍於羣小艇焉使其在恬風之潴止水之淵雖有載重致逺之能且無所施其與衆小艇何辨焉士君子負才美不能得名于僻壤小邑而能得名于大方亦何異于舟哉友人羅君勉學工部侍郎寅菴先生從子也以歸安丞得代來京中外人皆薦之限于常格不能拔調江夏丞江夏湖廣首邑當水陸四達之衝朝使蕃物往來無虛日勢逼而政瑣以煩人無樂於官其邑者猶風濤險阻而羣小艇皆畏縮不敢前也羅君有學問文章而才能優于已識量髙于世猶巨艦穹艫之為物大而其具備也往丞劇邑雖喧囂交集其耳疑難充塞其胸必能無動於懷猶舟之犯險浪而若履安流也事必敏于為為必果于收猶舟之行愈速而至愈逺也政令之施事業之就必將異于人而優於人猶舟大而功倍也雖然羅君猶當端其心以為之舵樹其節以為之檣察於世故以髙下其帆席體乎人情以緩急其綯索然後能有濟也不然將危于羣小艇焉尚望其功之成乎交遊之士皆贈羅君以詩余獨舉舟以喻之物形説李賢萬物之形不出方圓二者然草木鳥獸之類由天生者其形圓惟器用室宇之類由人為者方圓兼之大抵出于自然者未有不圓而方者反是蓋圓之出於自然者以有理為之主也理即太極假使有形無不圓者故周子為圖以示人亦必圓其形焉或謂天圓而地方地豈不出于自然乎曰以地為方者據其平言之也殊不知天包于地地如卵黃蓋亦未嘗不隨天而圓其形焉且紙窗之隙初無圓者日來射之其影必圓蓋亦隨日之形耳水波之靜雖曰平焉以物投之其紋必圓蓋一生水水亦隨天之形耳以類而推之莫不皆然于以見造化之知矣捕魚者説李賢湍之北涯有港焉水自湍流滙而為淵始容小舟入百步外漸濶成潭水深莫測相傳有龍隱其中魚大至尋丈戲躍自得觀之者環步垂涎而不敢犯村有漁者不勝其欲獨棹往捕之飽其船以歸潭亦寂然無所靈異里人見之驚其得大且多爭問所自漁者靳不以告由是潛持羊酒粟帛以賂之始告焉求者既多告之亦衆衆懼前所聞猶豫不往漁者利其賂曰傳有龍者妄也昨者吾捕良久寧不興起邪能我從者與俱于是隨以往者十八九惟一二熟計之謂龍處必深彼必會其未知耳其可再乎獨不從已而漁者進從者繼之至潭方捕之頃水忽湧溢漁者不知所在餘皆驚亂迅雷大震墨雲匝地烈風暴雨驚電閃爍漁人溺死過半得附岸者神飛心悸不知言語飲食者纍日惟一二不從往者無恙嗟夫漁之貪利而蹈害也如此人之趨附權勢也亦然方見其赫赫炎炎可以富人可以貴人莫不趨之附之百計效勤以餌其所欲已而天道一還權勢既滅趨附之人逮禍莫逃與從漁者何擇焉惟守道秉義君子能逺之耳録其説以為士之立身者鑒焉媒説石珤西里之婦有習為媒者三年不成凡為絲蘿之好鮮扣其門釡竈蕭索將營他技聞國有大媒氏乃載束帛往問之再拜而進曰自婦之為媒也膏唇錯牙毁方削亷意隨波流辨逐風生化強為姦扛卑使尊堅白同異燦爛紛綸盼移喜怒咳定取豫左顧漢勝右麾齊衄自以為術已精矣一行而節應再舉而轍亂久益齟齬行唾于塗立詈于垣不敢出户庭者厯寒暑矣將逃之他郊無復言媒妁事竊聞大媒氏旁通于道大化于藝願進之階下以祛愚婦之惑大媒氏呼而起肅而入布席于堂斂神凝思屏左右人三引其端里媒不悟乃閉之别室致憤發悱明日又問之對曰將無夸毗大繁吸訾失幾功急大勞反損事圖速成反敗與曰未也趣復入户三日然後召焉則見里媒之眉間栩栩然有動意曰幾矣得之矣問曰女知吾媒有大權變乎曰然吾為女言之天下之道有經有權聖人用之智者效焉先王之道至大極逺吾儕巾櫛賤婦矮巷小人安敢議之雖然御有百車不如詭驅兵有百萬不如反間是故我遇其常揚兵正旗三戰而勝功非我誰卒遇勍敵我計不展進與無所得退與後有患彼乃嚴兵以待我亂我乃騰飛語飾謗書賂左右私名姝嫁怨賈禍以保我軀是以亞父抑田單走樂毅奔朝錯剖忠反遇禍正反蒙詬必如是然後兵可制勳可就矣媒有兵道焉女之所習者蓋尋盟屢講朝平暮成蓐食而更戰既陳而後擊之法也故口血未乾而盟已解圍柵未備而敵大至矣女所謂知媒之常而不知媒之變者乎吾為媒三十年矣被選入官亦復十年吾譽枯楊使為春華毁白台使為嫫母吾言一出彼各心醉彼執一端我當其會收兩家之歡得三倍之惠卒有乖忤吾委諸其鄰其鄰不受吾委諸其親其親不受委諸他人彼自交惡而吾潔其身故吾老矣國中推善為媒者無以逾我而老婦壯子少孫行女感我者亦多矣雖然其難易之理成敗之數爾亦宜知貞女易成冶女難成妍女易成醜女難成禮法家易成失節婦難成蓋其媺惡素定風聲素逺幸我輩者雌黃炫亂黑白顛倒使芍藥之艷得儕行露而升者以有此舌與齒耳故吾輩者為正人小利為邪人大利而怨不及焉抑吾聞之嫁怨於人其怨將繁賈禍自我其禍始大吾恐明王之世終無稅駕之所姑以卒歲利吾身而已乃更教女為之吾不仁吾不仁於戲大媒氏固不足取然其言時合於道特擇術之不精糊口之欲亟以至此耳以吾觀今之仕者何止一大媒氏哉而顧偃然自以為得計亦甚矣鼎鐺説吕默楚人兵後徙居故宫之址既結草為廬壘甓為墻壁又鑿土為池忽獲古鼎量可受百斛上為蛟龍紋下為鬼物怪狀欵識磨滅不可以考若夏周所遺故物實希世之寶也中有大小二鐺一折其足剝蝕幾盡一缺左耳中已斷而未罅雖劘刮下下鱗鱗若痂痏者如故鼎文不可以挽乃負二鐺適市售之時亂甫定市之乏釡鬲以㸑者為多爭欲酬而易之始酬以五十則怒以五百則笑以五千則又笑且怒有酬以五萬者乃售之歸視鼎喜曰鐺以如許此豈倍蓰而已哉自吾亂後弊衣糲食不自裕蓋天以此優我也但未能舉而置諸通都大邑富貴不須口也於是圖之以揭市門久無有應募者適有博古君子過焉因請而質之乃笑曰寶則寶矣奈時何夫狐腋雖珍而襲布帛者衆熊蹯雖美而嗜菽粟者多龍泉太阿為天下大寶以之補履不若兩錢之錐鐺固小勺水以沃束芻以然炊之易炎揚之易飱其熟也可立而待此朝暮之不可無者故爭欲易之鼎雖大以之熟犀象烹黿鼉則不可投川雞鳬汁少則熬而不熟汁多則淡而無味將焉用焉楚人憮然自失曰古云才大難為用其斯之謂歟遂斂圖匿鼎以自晦云移樹説李東陽豫城西舊塋久弗樹比闢地東鄰有檜百餘株大者盈拱髙可二三丈豫惜其生不得所有種樹者曰我能為公移之豫曰有是哉請試許之豫嘗往觀焉乃移其三之一規其根圍數尺中留宿土坎其四周及底而止以繩繞其根若碇然然其重雖千人莫能舉也則侈其坎之南稜絙樹腰而卧之根之罅實以虛壤復卧而北樹為壤所墊漸髙以起卧而南亦如之三卧三起其髙出于坎棚木為牀橫載之曳以兩牛翼以十夫其大者倍其數行數百武植于墓後為三重閲歲而視之成者十九則又移其餘左右翼以及于門又夾神道而南以及于塗再閲歲而視之其成者又十而九也於是條幹交接行列分布鬱然改觀與古墓無異焉夫規大而坎疏故根不離宿土厚故元氣足乘虛而起漸故出而無所傷取必于旦夕之近而巧奪于二十餘年之逺蓋其治之也有道而行之也有序爾豫因歎夫世之培植人材變化氣習者使皆得其道而治之幾何不為君子之歸也哉族子嘉敬舉鄉貢而來豫愛其質近於義留居京師與之考業論道示之嚮方俾從賢士大夫遊有所觀法而磨礪知新而聚博越三年志業並進再詘有司將歸省其親豫冀其復來以成其學且見之用也作移樹説以貽之明文海卷一百一
