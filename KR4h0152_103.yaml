body:
  text: 明文海巻一百三餘姚黄宗羲編説三修天草説黄𠂻方家貴修天言修天神草也汁以淬鉛七返而瑩然潔七返而鏗然堅乃鍊以他藥而鏐鋌成葢方士之上業云楚人有務鉅積者力而致兹術秘謂其孥曰吾為猗頓反覆手耳謁諸藥師三年亡識也聞青城山有神鍊師者舊知其物乃遣其子如青城詣神錬師錬師餘百歳矣命其子曰修天幹如茁蕉葉博而澤似蒟醬而上岐末鋭本類蹲鴟而毒若必得之其舒之黄山之隩乎其子棘如黄山居久之求其草之茁蕉其幹蒟醬其葉岐上鋭末澤且博而本類蹲鴟者斸之赭其山得野芋數百斤實艦以歸或嗤之曰子奚貨野芋為耶其子瞪目直視曰使若如能是天下無窶夫矣擇冷淵而浴潔室而藏之即市青鉛汁而淬之無效也楚人瞿然顧泫然泗下曰術匪誣我師匪嫚我而我貲且困藥豈匪全力乎而必再往其子復之黄山虎斃焉嗟乎甚哉方士之回矞愚俗之貪鄙也夫五金不相為用亦不相為制使鉛而可銀則銅可金石可玉萬類之質可亂隂陽剛柔動植之故可變置則造化之柄可竊弄而災沴之氣溢兩間矣凡今方士之惑人也類曰吾承某師某師承某仙去幾時矣是鳥知仙之為道窒情竇外形骸以抱神為㫖以沈𡨕静黙為真以飛冲化蜕為極使仙而逞其誕幻變置夫隂陽剛柔動植之故亂萬類之質以竊弄造化之柄而混濁斯世是猶為人臣盜主威而禍天下也夫盜主威而禍天下也國有常刑仙安逭於幽𤣥門耶昔淮南王安隂蓄邪謀謾稱好古招致饕餮之客數千人競為論著知天下之人可以利動也故中篇黄白之論餘二十萬言無亦襲妖僧度世之故智眩惑齊民以寓夫烏合之計耳淮南既亡其言往往雜出於記載方士乃撮其渣滓以售其隂狡愚俗之易惑無恠也而峩然其冠者且猶師其邪妄以覬富夀不己甚乎或曰信斯言也黄白不可成則鉛為粉水銀為硃非質變者乎嘻謬何一至是耶聖人因物制用以佐民生者法固種種也乃猥附於濫偽焉宜邪正混淆於世矣東皋説王啓東皋自陶彭澤吟咏之後而凡騷人墨客之竊名注意者衆矣然皆湮㓕無聞豈非以其人歟天下土地之廣山川盤鬱之處上原下隰田夫野婦出沒之所其肖於東皋者何止十之三也皆棄而不譚其置於齒牙者獨柴桑所稱今古無異豈非以其人歟啓每嘗心醉於是而未獲識其真謂是必天設地造以為彭澤獨步之地後世莫預焉及承乏霍丘偶劉倅親經其地為啓言其狀且云今皆淪於荒烟㫁草不復可辨當時舒嘯所在葢世之相去久矣嗟乎觀劉倅所言則淵明所稱者與今日所見何異哉顧獨以其人得名而不泯泯以湮㓕者豈非其地之幸歟地終古以長存人千百而一遇後有作者視前者為有光則名亦將隨之不在此則亦在彼矣焉知其終之不遇也沙溪葉君𢎞達學古而髙行純而確其詩歌也浸淫乎陶氏矣而又迯名不出擇其地之尤勝也而吟咏之天固將與之歟不然何日前之湮㓕無聞也然則繼陶氏之東皋者一人而已其猶以為易得也啓與葉君為通家子弟知之深故期之厚如此非謂陶氏實足以知之也旱苗説蔣顒丁酉之夏予偶郊行時天久不雨田禾盡焦予乃喟然嘆曰是苗其勿秋乎旁一田父謂予曰公業士者而奚知苗吾於是苗播之於春藨之蓘之其植既深耔之於夏藴之崇之其培既豐植之深則根本固培之豐則旱不能侵乃今一雨愆期偶失生意然天有常運不久而復夫其不久而復也則五風十雨之以時而兹苗之勃然興煥然華芃然實也夫孰禦乎吾於是苗其終有望也子乃覩其始而不要其終遂逆兹苗之勿秋惡在其為知苗也予聞其言而思之非惟苗也吾之為士亦有然者敦本尚實窒欲防非求之心而罔歉持之文而勿隳其兹苗之深植而豐培也命與仇謀與時俱晦黝然黒者而蒼蒼渥然丹者而憔悴其兹苗之遇旱而焦槁也柔順文明確乎不㧞天道以栽而益培深者藏蓄而未發其兹苗之葉槁而根全也一旦逢時而興揚翅舒英薦清廟昭鼎鐘勿與凡草而俱腐勿使荑稗而専工兹非苗之得雨而有秋邪故曰觀苗於旱可以見真苗觀士於窮可以見真士吾父始以予為業士而不知苗今因吾父之言苗而益達其所以為士矣田父曰吾於子之言苗而知士焉知子之知類而通達也吾於子之言士而知志焉知子之強立而不返也知類通達其道明矣强立不返其徳立矣道明徳立人道大成子其天下士邪余既歸遂輯其言以為旱苗説牧説戴豪往予居山澤見東村主人畜羊且萬計其牧者甚謹朝露既晞即驅羣羊以出就善水草而牧焉既飽且適日未暮復驅之歸羣羊前走牧者操尺箠從之逺近疾徐惟命不幸有病者即屏諸他所俾其羣勿近故其羊日以肥息家日以裕主人召牧者多予之直且勞之曰若善視吾羊用裕吾家吾持是為若酬牧者安受之主人亦無徳色又見西村主人其初畜羊與東村埓其牧者怠不事事日且午始出羊于闌羣趨水草如不及狂奔四逸輒怒而鞭之鞭愈急走愈亂且踣其既病也混一闌以居多染死者故其羊日耗家日落主人詬曰若徒受吾直乃大耗吾羊即不去若且敗吾家叱遣之予嘆曰豈惟羊也吾觀牧人者亦若此而已矣古之稱養人者為牧虞有十二牧周有九牧我朝稽古建官分天下為十三布政司各置使以領之其意猶古也下此郡有守縣有令皆有牧之責者今之守令為西村之牧者相望也非直不遭斥遣而已顧多取直且受勞彼且自以為得計嗚呼吾人之生理幾何其不日耗而國家之元氣幾何其不日以朘削也哉黄岩王君景昭以丁未進士出知霍丘縣其同年蔡君從善盧君希哲屬予以言予特作牧説以贈之景昭將為東村之牧者乎抑為西村之牧者平請景昭自擇且自勉須進而為虞周之牧可也虎銜魚説張含春秋推災度云四方煩擾衆氓失恩則虎銜魚矣禺山子曰奚趐魚乎奚趐魚乎今恐不免於銜蝦也䝉邇停都見漁石公唶謂䝉云前之廿歳監司鮮以賕著近鮮以不賕著方嶽滋倍焉况銅章名實皆銅墨綬名實皆墨鄶下無譏矣又曰士也固窮之節女也偶影之操也監司而賕殆六珈而姣者也方嶽而賕殆翟服而嫪者也銅墨而賕殆十金中饋而奔也䝉復於公曰昔者之賕鑽穴踰墻今也之賕連闥洞房昔也之姣叔孫僑如今也之姣衛渾良夫昔人有云臣父清惟恐人知臣清惟恐人不知今也反是前兹之賕惟恐人知今兹之賕惟恐人不知賕非美名曷曰惟恐人不知曰不知則何為來哉由此觀之虎奚趐銜蝦哉傳曰國家之敗由官邪也官之失徳寵賂章也説弓屠應埈有持大黄于市者勁柘疾角深觔固撫力中六鈞質素而弗縁三月而莫之售歸取敝弭而飾之穹隆重彤象幹珠韇稱價千金觀者忘瞬于是通侯諸豪互市疾得持弓反走道逢飛鴻繳矢而射之矢墮車下弓分為兩惶惑慙愞俛首盡氣終日而不敢言也嘻嘘病哉今之用武者其若此矣古之論將者惟其才不惟其類是故舉于國族于大夫士于卒伍甚者于管庫奴𨽻曰求任其事焉今也惟其世不惟其能所推轂而遣分閫而治者非帶礪綺紈之子不與也垂金貂披紫符若兒戲然寄空名于三軍之上耳至其蓄縮逗撓邪揄外玩身不以為耻而任者不以為非曰制也習有故焉迺今轉漕之法也令甲曰服勤而事集者三歳而陟不問其等是不習有制乎然所以僉揚而廷簡者非指揮又不與也迺千百夫之長也卒力殫知督輓而㑹期終歳逾紀老死不收上有世及之私下多抱闗之怨嗟乎以勸難矣千户鞏君巨川武而才者也督漕于今七年㑹有制武官得入粟市級署事于是鞏君入粟為指揮得署事横金衣朱入謁屠子屠子曰善勉哉君之才大黄之材也鬻之七年而不售今也幹飾而韇文行且争市而服矣其母敗于飛鴻為市者所醜以呈六鈞之功則僉揚而廷簡也其勿自兹始乎予且觀矣説琴贈華亭莫子侯一元華亭莫子好琴而雅善東嘉王子樂成侯子數為二子鼓二子善之戊戌之秋進士論冡宰莫子得南工降階也莫子請之也莫子適侯子而問贈焉侯子諾之三授筆而章弗成於是侯子嘆曰是其難為言也夫往見莫子從語琴焉侯子曰僕弗知琴而嘗聞之夫琴者以材寄聲以窽藏之以越發之以絃收之以徽標之以軫旋之殊用而求聲殊聲而求比弗比則弗文弗文弗樂天下未嘗聞有一絃之琴者也今或以弗比為琴雖牙曠不能以適耳矣莫子曰弗比則安能為琴雖然均比也而有牙曠焉豈以不比為異哉乃以比異之也天下萬物盡比也隆隆比汙汙比同而以順比異而以齊比鄭衛比乎靡曼秦雍比乎廣賁陶唐之墟比乎中正故夫善為琴者達耳就之里耳去之去之以為弗比也而弗識其大有比也物莫不若是侯子曰今夫鄭衛之靡曼也秦雍之廣賁也陶唐之中正也以地異者也牙曠楊荂以人異者也然地異其槩人殊其精故地弗能有其人人則能易其地天下誠有牙曠之調居鄭衛挺其弱處秦雍柔其強夫何擇於陶唐氏之居乎中正既在矣莫子曰夫地廣矣音繁㑹矣牙曠者不一二焉比之為弗比樂之為弗樂聞巍巍為寥寥聴洋洋為啁啁不得詈必且數窮焉若是而弗嫁諸所便且奚之乎且牙曠則可也不至乎牙曠者居之則或崩或蹶或妖或孽將為地易而又何易地之有乎侯子曰吾聞之樂也者樂也樂者必將多其奏繁其節盛揮而綽之遷而徙之翕之張之綺之麗之芳之馥之則其入乎耳也亦必融液而暢悦焉而善琴者則獨不然乃為泬寥之音沉鬱之節樸魯之飾獨唱獨和自震自詘此其為娛耳也孰若彼哉是以魏侯為之卧北門為之感樂而弗樂奚樂之為莫子曰籟也者聴于人而悦以已者也天籟以億地籟以萬人籟以千未有弗豫而鳴者也雖然有異焉夫聴靡靡之樂者靡不始之以樂終之以楛鼓灝灝之音者靡不先之以怠後之以得或終身而不厭或一夕而去之子將何依侯子曰不然即樂違楛人之情也賤少貴衆樂之經也子嘗聴於廣都巨塗𢎞闉之間乎林林而趨稯稯而叢一夫之指萬人之耳是能以衆樂者也唱而弗和一而弗二悲振乎槁木而聴者弗為感歡劇乎冥魚而聞者弗為懌猶且操而不舍樂而不厭雖有以自適獨如斯人何莫子曰不然造適者已引適者人成適者天得乎已不必得乎人得乎人不必得乎天且夫心好之則手安之體康之神怡之若是雖去人羣離天地而不失其適也夫我為之俗去之我汙之俗就之是猶秦人適秦越人適越各趨其所便而不相為行今將舍我而從物違心而順流則彼適而我竭矣譬之行者必失其家侯子曰不然僕聞伯牙善指子期善耳伯牙為善矣雖然無子期之耳則巍洋之音湮鬱而泰山江河之志不彰彼固待彼是以子期死而伯牙破琴絶絃而輟彈誠尊其知也必若言自適而已矣則伯牙亦將適子期之適而弗自適其適是伯牙猶有累也莫子曰不然夫物有精音有君精者技之窮也君者神之盛也故精有極而君無化牙以是鼓期以是聴期之樂乎牙也縁精而得君牙之息乎期也捐精而尊君雖然夫牙亦有矢之心焉彼將以卒歳要也故期死而破琴絶絃而不彈雖然夫何病焉期雖往也其聴則存牙雖破琴絶絃而不彈也其彈則存盖君子有破琴絶絃而無改絃更張一以酬知一以定操有累而無累有待而無待是聲之盛也天下不復有期之耳也有之則牙固將絃而趨之且夫期亦戔戔淺耳如牙之音者使得佐南薫之聲而合有焱氏之樂其相為知也豈特期哉故翟籥思美人而鼓鐘懐君子傒同聲而從之於是侯子不復有言既合數日而莫子行王子侯子郊送之侯子贈之篇視之則語琴語師儉篇侯一元或訊予曰聞子逺法東坡席惟三饌以御賔客意師儉歟曰然曰不己細乎曰竊聞禮始飲食頤正則吉故易嗟不節詩詠匏葉夏王菲食而禄綿何曽豪侈而禍烈可不戒歟今齊民鮮盖藏豪右恣夸張計其一人之食可當三十人之粮十人之㑹肉藿酒漿則三百人之食溘焉以亡珍窮水陸甚者椎牛惟辟玉食將焉取羞及其敝也朝夕不謀君子慼之每勤礪刃頋或作法于奢亦且無徴不信此予之所以觀火蘇君嘘其遺燼者也曰蘇法云何曰蘇法曰客至則一爵一肉此明無客則不用酒肉也然以酒介夀非肉不飽則老者宜之君子有酒肉食無墨則貴者宜之至如富人難同窶子斗酒自勞于牢執豕又如事親必具甘㫖茅容半庋林宗為起但一而足矣多則二簋不得至三是為常軌藩法曰有尊客盛饌則三之此明重肉兼味極于三也葢數成于三月明于三人衆于三女粲于三獸羣于三讓終于三事理殫矣過則為貪且嘉殽脾臄一肉也炰鼈膾鯉兩鮮也惟筍及蒲二蔌也詩所侈言不過如此夫一席二人人踰一簋若坐三人亦各盈簋此而不已真饕餮矣四人以上器當稍碩若滿六人則分兩席大率席少鷄鴨席多則鵝是為特殺一饌孔嘉其二豬肉三即魚蝦客或不喜宰生則當别供三物又如中下之家物力本屈三饌隨便可二可一至如米麫自不拘數但取充腹非以生禍又如時菓園蔬家下所儲可用小碟出以為娛或多或少可有可無期守蘇法三饌弗渝惟酒無量為樂多方厭厭夜飲亦豈太荒從便可也昔蘇子以少食養胃少享養福少費養財其論誠確愚則以師古哲知也養大體仁也㧞流俗勇也誠得自力師範先賢飲食之人我其免焉雖以儉陋見誚戔戔其榮多矣敢不勉㫋或曰子言則善吾聞賓禮主擇子主而可若為客何予曰景行行止直道固存人同此心告之話言如曰不然驪駒在門扳倒井説盧雲龍井在邯鄲西北去城二十里世傳光武逐王郎於此士馬俱渇因無汲具輒扳倒飲之事渉荒唐志者謂滹沱氷合之事可以類觀或天所以相光武者當如是耳余初未之信也及親履其地諦視久之則傾側之狀頗存土人指余曰此水髙下不平以繩測之東西相去尚二寸許余曰此其故難知矣夫天至無私也而何獨私於光武水至平也何兹水之失其平者若此易稱改邑不改井謂其居所而有常也何兹井之失其常者又若此此其故難知已天下之以有所私而失其平失其常者又何限哉滹沱之氷雖為光武一合然未畢數騎而即解後世僅得於傳聞耳獨此井與此水猶若未能盡復其初也意者有巨靈主之昭示其私於千百世之下而使為有目者所共睹耶况人而一有所私也縱可以掩覆於一時亦安能逃乎後代之指摘哉古愚説李承箕予嘗讀韓非子説難及漢史以晁錯為智嚢未嘗不廢書而嘆曰揣摩世變熟於去來以持其幾二子且盡矣而卒死於所不意何哉盖人莫危於以所擅者而示之人也我以智名天下莫不以智而困我我以勇名天下莫不以勇而困我我以辨名天下莫不以辨而困我故我於偃息談笑之間飛揚奮發而調養其所短者以來天下之情而其所長者固已藏伏於中茍用之於其所當然如雷霆之不可知其情鬼神之不可知其迹風雨之不可知其始江海之不可知其終矣孰得而禦之哉大白若辱盛徳若不足舍者不避席煬者不辟竈彼二子者烏足以知此也子聞陳獻文者為人率直好吟詩善斵琴每一詩成輒走數里為友人誦之敲人之門驚人之夢雖風雨不廢鄉人延之主塾教則令子弟自課斵琴不輟人莫之知也以古愚目之予曰古愚古之愚而非今之愚也誰從而知之嵇康達士也好鍜薛公賣漿毛公為博徒盖所以守雌豈害其為髙哉若古愚者其異趣而同歸者歟古愚下世矣鄉人道其事至于今不衰予懼其久而亡也故作古愚説嗚呼深山窮谷之下信有如斯人者又孰得而知之候氣説周如砥夫諸家所稱候氣之説盖紛紛云制本古初法叙厯代不可謂不詳不可謂不審然而僉有成説迄無左驗何也大樂必易大禮必簡人自難也人自煩也孟子曰天之髙星辰之逺茍求其故日至可致天誠如此地亦宜然而加之候氣於形驗無於有非渉髙逺非勞布算乃竟令千古而下有厯而無律也是説者誤也蓋有為黄鍾九寸之説者以為冬至陽生其深在九泉之下距地九寸故以九寸之管候之大寒而後陽漸以升律亦漸以短馴至小雪而陽氣所距地者四寸六分六釐而已候以應鍾是也此一説也又有為黄鍾三寸九分之説者以為升陽漸盛故三寸九分陽之始也盛而至於蕤賓之九寸而陽極歸陽漸損故九分陽之極也損而至於黄鍾之三寸九分而陽復始如環無端焉此又一説也二説者必有合矣然謂陽終于四寸六分六釐者或非旋相為宫之法謂陽始於三寸九分者或非雷在地中之義其於以候氣槩乎其未盡也且氣之候也未可執以管之長短也未可執以地之淺深也執長短淺深以求氣者是先為厯而強日月五星之合也故所稱分數云者可用於中氣已得黄鍾已定之後以為生十二律之法而不可執之以為候氣之法且天地之有氣也非猶人之有脉也與哉脉之曰寸曰尺雖有定名而候無定法曰臂長則疎其指短則宻其指肌厚者重之薄者輕之期於脉與指相得而已故愚請以候脉之法候氣百不一失之術也盖昔黄帝命伶倫㫁竹以准鳯鳴以定律吕持以候氣蔑不應者人徒見其氣之應在既有律吕之時而不知其作用乃在准鳯鳴之時夫禽鳥得氣之先是以鳯凰得天地之中氣以生其聲中聲彼當其聴而准之也吾意即黄帝之聖伶倫之聰必非止為六管以准雄鳴止為六管以准雌鳴亦必非一吹而輒似必且多為之管更迭以吹以求其似焉聲似而氣乃協非偶然也故今之求中氣之法當如黄帝求中聲之法欲如黄帝求中聲之法非多為之管若醫之候脉者然不可矣誠多為之管自極長以至極短而長短之間毫忽錯綜不但若蔡元定之所謂以一分為差者而竹必厚薄齊一置必宻室緹縵之内必均其土必隔以木夫然後實其灰而候之宜有應者若乃應有先後先後之中又或有久近出有多寡多寡之中又或有全半試一叅酌中氣立辨而又試之中聲以驗其和揆之圭景以驗其正以已應之管加之聲和景正之符吾不知即太古之黄鍾胡以異此盖至是而後實之秬黍以度周徑以起積分長短淺深可施而十二律可得制也或曰律之不能㝠符自昔歎之黄鍾應他律未必盡應施之一歳二歳而應數歳之後未必盡應將古樂竟不可復也愚以為此皆未定中氣之過也夫人必脉與息應而後為平不然者病醫不能執平脉以驗病脈而以病脈疑平脈乎武王伐紂吹律聴聲推孟春以至於季冬殺氣相并此以中氣凖之而知其為殺氣也師曠聞樂而識南風之不競亦以中氣凖之而識其不競也要之中氣中聲自若也曰若是則三代而降太和洽而風氣正之世尠矣即欲候氣其毋乃以病脈驗病脈乎是又不然晚近風氣雖謝上古然不可槩謂之未正校數歳必有一歳校一歳必有一時吾聞之事有不可以㝠㝠决者則多其法以求之氣之未應候以數管氣之未正似亦宜參以數歳古稱禮樂百年而後興彼不獨欲積徳致和或亦有參驗其中焉是未可知以今樂之不興垂二千年而動謂百年為迂説抑過也大抵人心有自然之和亦可以宣之使和其能宣人心而使之和者必其故洩于人之真心者也古聖王作樂以宣八風之氣而惓惓中氣之求意正如此盖未有機之不協而感之能通者傳曰王者制事立法物度軌則一禀于六律嗚呼厥㫖深哉明文海巻一百三
