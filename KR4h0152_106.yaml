body:
  text: 明文海卷一百六餘姚黃宗羲編説六别説吳時來舟瞰彭蠡子儀欲道九江泛洞庭入都勻乃作别説以處我二人且索所以處之余曰别則别矣又何説焉不見湖之漁人乎方乃揚風東作吹浪若山衆皆拏舟爭避寧所漁人鼓棹泠然御風而趨與波上下窮其所之而後還彼固常於風波者奈何以風波懼之子粵人不聞合浦採珠人乎左執筐右執杓閉息如龜沒頂如鸕􅀈踰時而不出須臾有吞舟巨魚裂波而至衆皆唶然謂其為魚腹中矣彼採珠者以杓鼓水潛遊水底杓中魚鼻魚翻然仰天彼採珠者且行且伏不知巨魚之殞其杓端也彼其志於螺而猶若是故魚常於淵不知其為淵身鳥常於林不知其為林身漁人珠人常於風波不知其為風波身兹别又安非我常也是故離邦去里吾不謂憂嵗月淹留吾不謂懼吾所深憂大懼者唯在不聞道然則何如靜焉以觀勤而行之敦吾初念以及乎死之日幸而與子會也則將乘巨鯤負大珠就觀海之庭以問損益若其未則死葬蠻貊中吾亦無悔舍是無以為説矣尚書師説李舜臣吾師故濟南太守蕭先生也先生諱孟景字時泰順天三河人也寓家於京而余以正德乙亥從先生於崇文門外草場巷余讀尚書蒙於先生者矣憶為余稱書者書曰宗彛藻火粉米黼黻先生曰蔡宗彛虎蜼據疏虎彛與蜼彛爾若是為一章而二具二之則兼藻火粉米黼黻為七夫宗彛者宗廟之常尊也至周而文何遂言是虎耶蜼耶弼成五服至於五千先生曰五千者五服每面一千二百二十五里矣故王制流沙至海衡至恆皆三千里然而三千里者周尺小也厥貢璆鐵銀鏤砮磬厥貢璆琳琅玕先生曰璆琳西城産也雍鄰西域梁介西南蓋雖先王不能不務其所不能不用不能不令如漢以來互易外矣何也圭也璧也惟斆學半先生曰半者一生二也雖然有離而二有儀而二斆學半者儀而二也何也譬之錢璧於圓尺寸於十夫錢璧中好而分則不成為錢璧尺寸中五而分則不成為尺寸今欲人善而自不為善者有矣惟天陰隲下民相協厥居我不知其彛倫攸敘先生曰王之問也謂王執以為不知彛倫問歟則謂王知彛倫已而止欲為之甲乙之歟乃王誠執以為不知彛倫而問若是敘訓次者次猶在也君子所其無逸先知稼穡之艱難乃逸則知小人之依先生曰所所君子也乃逸者其始欲為逸也觀鴨説吳廷翰家僮取鴨卵伏之得雛鴨數拾枚始育則飼之盆中少與之水其聲詬詬然其毛羽滈滈然豫甚愛戲之不數日僮以告曰雛鴨有斃者矣既而聽其聲啾啾然哀鳴視其毛羽蘇蘇然以散落豫讓僮不善畜也僮曰是非不善畜也畜不以水也次日豫適憩亭中時雨初歇地水方強顧而樂之憑欄而語曰曷不以畜鴨雛僮趨而去不移時筐而至稍出之水涯皇皇然驚愕不已其目睢睢然睨其足逡逡然前而郤竿之則遂羣奔水中或揚足而馳或拍翅而飛不定者良久既乃狎水或仰而飲或俯而啄三五而陳各適其所已則又或沉而沒或浮而出盤旋戲躍於萍藻間既休而理羽交口扇翅或曵而行或拳而立或屈而睡消搖相羊容與如也既晡僮將筐而歸則相與復嬉於渚或逐於湜或蔽於叢不可得遂縱之明日至亦如之其聲嗈嗈然以和其毛羽濯濯然以光澤其去畜池之前僅三日充長已倍三之一矣余乃歎曰大哉造物之育萬物乎大而龍蛇之於淵澤虎豹之於山林細而蠛蠓黿龜醯雞之於甕於坎於蹄涔各遂其性而已鴨之斃於陸而育於水亦一理也夫反其性造化不能以育物聖人豈能以育民乎君子為政當斯民淪喪之後煩之以法令脅之以刑罰誘之以智巧蕩之以淫華本性日耗生理日促相與駢死而不知一旦欲其改塗易轍驅之以道德範之以禮義納之以忠信囿之以淳朴莫不相顧駭愕不信不安及其久也教成而化行行安而俗美追視昔日之所為與今日之所趨安危利害相去什伯而千萬則雖械之使為惡日撻之而欲其蹈刑戾履訌詐亦不可得矣然則民之初生鴨之育於盆者也狃於習而不悟斃於陸者也視其斃而不知所以救僮之讓者也反其自然之性而猶疑試於水者也得其所以為性而安且樂水之狎而不歸者也生養蕃息既富且昌水之畜而充長也乃復嘆曰因育鴨得育民然則兹觀也鴨與也乎哉述觀鴨疑塜説尹耕朔野子由鄴渡漳道磁而北路多大阜東西縱橫峙立相屬如象如馬纍纍然七十而竒呼輿夫而問之曰此故巍曹氏操之遺塜也嗟哉瞞賊敢於欺人至是邪蓋其本生大姦似忠大詐似信居之不疑以欺斯世也久矣是故天下方亂以命世之才許之則已欺品藻者矣九錫將加以義兵責之則已欺才智者矣布也勇指馬以欺之於戟鋒之下超也捷笑語以欺之於刎頸之餘至於遷許而天子欣然則又上欺其君父矣臨事而豪傑效死則又下欺其將佐矣啖野葛卧中殺美人則又內欺其近屬矣操誠多術哉然卒莫掩也治世能臣亂世姦雄許劭知之擁萬人挾天子孔明知之寧我負人無人負我陳宫知之托名漢相其實漢賊孫權知之若不相輔幸相捨衣帶密詔則漢獻伏后亦知之竟亦受益今垂死不忘故作是疑塜可笑也哉夫疑塜將以疑人也豫以為操之疑亦多奚以疑人官渡之不敵糧食且盡固已疑於進退矣舍鞍馬與吳越爭衡固已疑於形勢矣雞肋致意徘徊漢中固已疑於進取矣荆州一借匕箸是失固已疑於機事矣七軍盡沒下議遷都固已疑於棄守矣又有六者操所憚惟玄德公故曰天下英雄其次為孫仲謀故曰生子當如又孔明十倍曹丕而五官將之立非其素心操死時數公皆無恙則其身後之疑莫大焉而作疑塜以疑人豫謂操之術至是窮矣又世傳疑塜皆虛其一操也豫謂不然夫七十雖多豈不可以盡伐勞民而愚不類操舉動其必七十皆有所葬如其嬪御功臣之流夫伐者得骨而止此操之用心處也不終於臣節以愧其先不善於貽謀以戚其後而塜中枯骨百計自私操至是術真窮矣或曰虛塞三間仲尼曽為之矣噫此非孔門之言也其戰國遊士附會之説也夫君子之愛其身也不加於親防墓蓋欲不封樹矣門人修墓潸然曰吾聞之古不修墓故曰此非孔門之言也戰國遊士附會之説也宋鄭俠流民圖説陳沂宋史載鄭俠力攻安石新法繪其上東門所見流民圖之以進其圖有為風沙霾曀􅍠疾不伸者有飢羸骨立力不自前者有僵仆不起者有行且戴負提攜皇皇焉無所以歸者有無完衣踝跣耻不自顧者有負麻籸麥麩為糜茹木實啖草荄以求活者有身被縶械且負瓦揭木市以償官者飢嵗征斂苛急之慘為狀曲盡其時閣門不納乃急發馬遞必欲上覽以天下之憂若不可見而求之目前以目前之不可見而求之几上俠之心何心哉至神宗觀圖反覆欷歔夜不能寐翼日並罷十有八事後復出責宰臣以示開悟俠之圖不為無益也雖深究馬遞之罪不足自恤所切齒者悔言未行而執信又復具觀百圖不抵片言可勝歎哉每慨齊宣不忍一牛於所見使妨於偏聽則朝見一牛焉暮見一牛焉而王之心忍矣故曰偏聽生姦獨任成亂勢之使然曷足怪云性説毛愷古今之言性者何不一也孟軻氏則以善言矣蓋信諸四端發見者之真也然人固有殘忍無恥爭奪昏昧者之不可訓矣而概謂善也可乎荀卿氏則以惡言矣蓋疑諸刻意尚行者之偽也然人固有惻隱羞惡辭讓是非之非外鑠矣而概謂惡也可乎揚雄氏則又以善惡混言矣蓋取孟荀氏之言而兩端以持之也然人固有生而岐嶷神明在傅不煩與夫聲若豺狼必滅厥宗者矣而概謂善惡混也可乎是皆見其偏而未覩其全得乎此而且遺乎彼均之非所以語夫性之大通者也當必若孔子之言曰性相近也習相逺也惟上智與下愚不移斯其大通之論也乎夫上智焉者是孟氏所謂善者也夫上智之於善也如水之必寒如火之必熱雖欲移而之惡有不可得者故虞舜罔變於頑嚚神禹勿渝於伯鯀何也原未嘗稟有惡氣耳下愚焉者是荀氏所謂惡者也夫下愚之於惡也如荆棘之必刺如烏附之必毒雖欲移而之善有不可得者故朱均莫化於堯舜管蔡自絶於周公何也原未嘗稟有善氣耳相近也者是楊氏所謂混者也蓋自其善也若可以言上智矣而容有不善以混之是故怵惕於孺子之入井而或不能無內交要譽於其親友之私自其不善也若可以言下愚矣而容有善以混之是故為不善於間居矣而或不能不著善於君子之見蓋其遊氣紛擾剛柔摩蕩得之者固非純善亦非純不善苟始也習之未深則其性體之相去善惡不甚懸絶固中人之大較也是孔子蓋嘗兼三子而大通以言之矣若性果無别也孔子將曰性相同也習相異也寧當逺近云之乎或曰吾聞之性者萬物之一原是故途之人可以舜禹愚不肖之夫婦可以知能信子言也然則彼將非歟曰奚為其非也孔子他日不又云乎一陰一陽之謂道繼之者善也成之者性也斯尤論性者之宗也蓋自繼之而言道之翕極方施靜極方動將有所流行賦豫而尚未著於人物則其體之虛朗清通沖然粹然殆邵子所謂一陽初動萬物未生玄酒太音希聲淡味斯但可以言善而未可以言性故曰人生而靜以上不容説才説性便已不是性者是也比其有所賦豫或成而人或成而物則囿於氣稟屬於體質氣有清有濁質有純有駁於是乎有得其至清至純而為上智之善者矣有得其至濁至駁而為下愚之惡者矣乂有得其清濁純駁之交錯而為善惡相近之混者矣殆周子所謂剛善剛惡柔善柔惡中焉而止斯則始可以言性而不可復以善概言矣故曰善固謂之性惡亦不可不謂之性者是也是知善也者以言乎其繼也雖無渣滓之可議而實所以始乎其成性也者以言乎其成也雖有氣質之可見而實所以終乎其繼然則昔人所謂可舜可禹可知可能而為一源焉者將非即其已成而遡其始繼者言之乎奚為其非也辟之雨與水然陰氣油然布濩周密陽氣上升鬱無所泄則薰蒸津潤沛而下施是名曰雨觀其清通之體猶夫始繼之善蓋不可以渾濁言也及夫在地也或瀦之靜深之淵焉或注之泥沙之澗焉或積之糞土之渠焉始乃稱名曰水而不可仍曰雨矣惟其為水也故在渠者視澗為濁在澗者視淵為渾惟淵之清為不失雨之本體耳雖然渠之濁也以糞土也澗之渾也以泥沙也而其各得夫雨之清通之體固在也自非至汙澄之汰之與淵無異故曰敏用力敏勇則疾清由是言之水不可以復言雨而舍雨則無可以為水性不可以概言善而舍善則無可以為性奚為其非也子盍觀之易乎夫易之有六十四卦也以類萬物之情者也今姑即其卦畫之隂陽類善惡而言之六畫純陽名卦曰乾求諸其類蓋上智也善者也六畫純陰名卦曰坤求諸其類蓋下愚也惡者也然純陽之卦無二乾焉純隂之卦無二坤焉以是知豈惟堯舜之上智曠世不一見即楊食我之下愚亦絶無而僅有者若夫卦之或陽多而陰少或陰多而陽少或陰與陽也各居其半數蓋六十二焉寧非中人之善惡混而相近者衆乎夫惟中人者衆也是故聖人之教立焉蓋上智不待教下愚不率教而中人者可善可惡者也教也者所以去其惡而反之善者也人能緣教習之自強不息將隨其陽卦所成之多寡而各得以復其所繼之純全就其所復之陽畫而言雖成章分限小大或殊然即一畫固與純乾之六畫本體無二也故曰及其成功一也兹聖人立教之本意也宋儒言性宗孟氏以為是天地之性也而復出夫氣質之性以補其所不及焉不知凡所謂性便已屬之氣質氣質之外更無所謂性者若特屬之天地則懸虛無所於附麗烏得而性之哉且孟氏之所善也率自上智言之也故必稱堯舜堯舜以下未必純善而無惡則固皆善惡相近而混者也惟相近而混也是故可以言善矣而或容有不善者以雜之於內雖或雜之以不善而其成性之根諸始繼之善者渾然固自如也猶夫六十有二之卦焉竒畫之陽雖不能不間之以偶畫之陰而竒陽之畫卒未嘗因夫陰畫之間而少有所虧變自其未嘗有少變之陽即如剝之上九焉猶為不食之果而舜禹無間於途人知能可與夫婦者此也然亦非卦之外别有所謂陽畫云耳斯孟氏言善之旨也特其直指陽畫專言之而陰畫則置弗一及焉是無怪乎諸子之論紛如也求其不詭於孔子者吾竊有取夫昌黎性有三品之説遊山説楊夢衮登臨山水自是髙人事隱逸之流自適其適便不俗只宜獨往多不過兩三人行則徐步坐則清談選峰嶺林麓幽勝處席地而坐俯聽潺湲仰觀雲物翠微中清磬數聲茶煙一縷令人神青翛然自逺若多携朋輩兼以紈袴粉黛自是狹斜景色非泉石宜也如欲踵東山芳躅當取一二名姝善清言者素服淡粧佐我壺觴媚我松桂但絃索歌喉不宜數數耳此外更得老衲一人參其中為佳坐不必席石可几草可裀䔩可殽鳥語可絃管花枝可酒籌渾是眼前真趣著一毫濃艷富貴氣習不得散步之間或登古剎或訪僧居拂蘚讀碑掃壁題句或徘徊澗谷之間探竒攬勝尋幽弔古與樵子牧監躊蹰問答駐立移時脫略形骸渾忘城府方於幽賞有得耳凡遊亦自有時春月桃花夾岸栁色青青輕衫瘦蹇携酒而往滿目爛然吾擷其芳夏月修竹茂林清泉漱玉時而披襟時而坐隱吾養其懶秋月紅葉滿山望之如赤城霞蘿月散影清光可掬涼飇颯颯襲人衣裾壁上琴絃琤然有聲吾披其爽冬月六花飛舞羣峯如玉龍偃蹇一蓑一笠行仄磴小橋間恍如圖畫中人歸來休斗室垂布簾圍爐而坐濁醪小酌蕭然非人世景色吾甘其寂至如朝旭夕陽煙嵐霞霧晨昏異態頃刻萬狀筆舌不能罄其妙繪畫不能逼其真此唯得趣者知之難為俗人言也尤可忌者是一種戴進賢冠人高車駟馬從者如雲前驅負弩之屬夾道而馳猿鳥驚散僧徒避匿足迹所至前後人如蜂蟻焉嘯不得舒句不得覔杯不得銜膝不得抱方且羅列腥羶喧闐鼓吹徒以赫赫者驕稚山靈囂然來歘然往此何異檻猿籠鳥從閙市上取來暫置丘壑間俄而復還故處耶然則貴人將無遊乎曰葛巾野服攜一二素心人屏騶從卸冠裳容與半日可也萬厯丁已仲春長白山人書於醴泉精舍漁父説孔天胤愚公歸釣大陵之西涔浦之南為汾汀漁父夫漁父有三有魯漁父者與孔子言於緇帷之林其言不受名迹不邇疵患不拘於俗不分於道法天而貴真任放而無我孔子以為有道也有楚漁父者與屈原言於湘潭之滸其言掘泥揚波餔糟啜醨摽指玄同揮斥矯亢法聖而貴權遁世而無悔屈子之所不能測也汾汀漁父者初非漁也嘗學劒學劒不成去學書學書不成去學為儒為儒博而寡要勞而無功乃落而為漁今漁十九年矣蒙風雨冒霜雪襲煙光明滅與水波沒興垂鈎益深挂魚益少至終嵗而不獲一鱗妻織布兒緯蕭蒼首治石田計其所入以糊余口有微羡焉則沽取鴟夷而酣就蘆葦而卧竊自視之翩翩一漁父也然無所取魚空名為漁是其學漁復無所成日垂景西矣遂徘徊婆娑而不能去茲即去兹奚學也彼魯之漁也抱道而間於江海楚之漁也達世而隱於山澤然至今不忘繇於孔屈孰辨汾之漁哉其野莾蒼其濵寂寞鳥獸之過我者日數百而不驚除罔兩問景絶迹無與晤談者而後嗟斯人之孤也於是作漁父篇以自表焉古二人今一人合而言之三也愚公志無盡説顧慤汝南王覺壽師事鄂陽雨華丈人得法號焉曰無盡以求豫説豫固非學於佛者蓋嘗聞諸吾儒亷得其説焉無盡之源出於無始無始者其生人之初乎其生物之性乎草木榮於春瘁於秋冬疑若有盡也而寒暑之機循環無端而草木之榮瘁乘之至於斧斤伐焉牛羊囓焉殘其枝以敗其本是草木之棄於盡也而操斧斤牛羊之業者患無山焉有則不本而植不嵗而拱以周天下之用者其孰使之然邪譬之天焉風雷雨雹晦明萬變而卒不能害夜旦之相生則是人之生死無以異於草木之遭斧斤牛羊而不離其性也亦審矣然則生物之性果有盡乎無盡乎天地之大也不免於一朝之盡以語其成數又疑若有盡者然元始之氣自混沌而判為天地而傾圮於三萬六千年之後者將不復合為混沌乎亦將不復判為天地乎若是則元苞之鑿孰斧其柄而所謂生人之初者又果可得而盡耶無盡耶然則生人之初與生物之性其極安歸曰道而已或者謂凡世之曰天曰人曰草木者皆物也草木殤於此而萌於彼者不離其性則人之出死入生而蔑有終盡者且何以證之不然烏知其非盡邪是尤非知理之言也君子故思夫好鑿者夫所謂殤於此而萌於彼出死入生而蔑有終盡云者亦各不失為人為草木而已執草木與人欲離而更之他則世將幾何而不笑我哉且天之所以為天一理而已苟即其所判而合合而復判以與古今更始於無盡者而以為離元始之祖氣而别為一天則亦安在其知天邪今雨華丈人之所謂無盡者我知之矣易曰心之精神是謂聖精神者不以形言其妙用雖係乎一心而天地不能逃其量鬼神不能測其機水火不能為之戕賊者也日月之明大可以被四海而小或不能窺覆缶之奧吾用其精神忽焉思至於天思入於地思赴於千百里之外而曰天曰地曰千里之外皆在吾囿所謂不疾而速不行而至苟神而明之所以參天地而立人極也故天行健而君子以自強不息所以誠其德以至於神明而已彼佛氏者豈以吾心之精神為慧通而大而化之以致其無盡之極者乎師曰唯唯請書之明文海卷一百六
