body:
  text: 明文海卷一百七餘姚黃宗羲編説七候氣説鄧宗齡夫候氣之法起於唐堯命官治厯允釐庶績后世持論者無慮數十家濫觴於呂氏淮南流衍於劉歆京房班馬而潰裂於李照胡瑗范鎮房庶之流其言人人殊其語法者十同其二三其語律者十異其八九愚以為法以代殊雖不盡合然規制不甚相逺也乃其律一繆即有法安施夫班固司馬彪著漢書志律厯灑灑數百千言大都祖搆劉歆京房語不敢自創一見後世候氣者猶若奉功令而趨今考其法密室中以木為案置十二律管各其方實以葭灰覆以緹縠一氣至則一律飛灰世皆疑其所置諸律方不踰數尺氣至獨本律應何也或謂短長至數冥契造化或謂干支方位相感召統非定論也蓋漢書亦得其略耳開皇中遣毛爽蔡子元于普明等以古法候之有初入月即應有至中下旬始應者有灰飛出數夜而盡有終一月才飛無幾者高袓舉以詰牛𢎞𢎞曰灰半出為和氣灰全出為猛氣灰不出為衰氣和氣應者其政平猛氣應者其臣縱衰氣應者其君暴夫臣縱君暴其政不平寧月異哉乃十二律於一嵗內應並不同則何舛也要之氣機有早晚灰出有多少其理固有然者夫古之聖人制為十二管以候十二氣而十二長之音所從出焉以十二管較之惟黃鍾為最長惟應鍾為最短以林鍾比於黃鍾則短其三分之一以太簇比之林鍾則長其三分之一其他或長或短皆上下於三分之一之數時維冬至陽氣距地九寸而止惟黃鍾一琯逹之故黃鍾應焉正月陽氣距地八寸而止自太簇以上皆逹黃鍾大吕先已虛故太簇一律應焉如醫者以針徹其經絡則氣隨針而出矣然必先密其室令地極平以木案間之實土案上調度得冝以水平則概然後律其可使無疏密之患此候氣之法百世不易也夫候氣以律造律以黍李照胡瑗房之説類纍黍以求律議者謂照以縱黍纍尺管空徑三分容黍千七百三則太長瑗以橫黍纍尺管容黍一千二百而空徑三分四釐六毫則太短彼以尺生律不合古法房庶盡闢其説而欲以千二百黍亂實之管中隨其短長之數以為黃鍾九寸之管取三分以度空徑不知空徑三分之管非縱非橫則何以為分乎此馬端臨力辨其非是未為無見也或者尤謂周禮有聽律之官無算律之法纍黍之造律考古籍不少概見惟國語載伶州鳩答問律稱古之神瞽考中聲而量以漢制以較度量衡所謂黃鍾之長黃鍾之籥黃鍾之重云者特以明三物之與律相表裏耳未嘗専言纍黍以為律也愚以為數者既相表裏必毫髮不爽始能相通可以律而起度量衡亦可因度量衡而知律則纍黍之法又焉得而廢之嘗考郭守敬所置太院景表尺比市尺僅八寸許以黑黍充其中者一千二百粒日乾之重五錢以九十粒纍之命為九寸與表尺合又截竹為管長同黍寸其竅上下均容一千二百黍吹之其聲與人之最下一聲合是為黃鍾之聲制管之法其得之矣然未易言也後齊有仰觀音色即指天曰孟春之氣至矣人往驗管而灰已應又為輪扇二十四埋地中以則二十四氣一感則一扇自動與管灰相應若符契焉候氣之法信在人哉在人哉明文海卷一百七
