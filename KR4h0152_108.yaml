body:
  text: 明文海巻一百八餘姚黄宗羲編説八鄞水利叙説上戴鱀鄞自句章以東瀕海帶江原野夷衍畊民所病水難蓄而善泄如誌記之所稱盖已乆矣然由昔水政之修且可考也邑西南連山起四明水之所出滙流注壑百五十里而始渟涵湍泳永旱至今之所謂它山堰者入於江迤而東且北環郡城以走海潮汐激引下上故鄞之地東西㓶不合分而為鄉各七而水之所資亦殊而三曰西鄕之田它山溉之東鄕之田錢湖溉之二水之所不能及惟南鄕則江之流溉之它山始唐太和間王令元偉者梁石兩山之間為堰以截鉅流激而注之河支絡村墟逹於城郭疏為漕渠瀦為陂湖昔人度其不决於江者大約旱則什七澇則什三然積嵗沙淤水道填窒浹月不雨輙以旱病此水無所蓄而善泄之故也錢湖則因諸山之麓隄而續其不合環里八十納流七十二為堰七湖高於河決而下注凡得三河半故其時鄞之東田弗祲於嵗自唐厯宋湖則屢澱乃令陸南金守李夷庚者益加開築荆公魏王嗣而浚之其後又復買田市葑勤亦數矣然宋人已稱湖水僅支一决今於葑之不治且三百年則湖之加塞可知也乃者甲午夏仲不雨至於六月湖遂先河而涸它山亦尼于沙港水入益微東西鄕之田盡病郡縣之大夫日夕跽龍而雩論者謂令二水之利盡復則餘潤奚直更支半月東西鄕之田寧有不熟者乎夫君子之憂民則為之慮也逺故其為利也博今欲鄞利博而逺無他修二水之政而已水利叙説中戴鱀夫二水之為鄞利功簡而事要博取而利㣲何也江水中注則二鄕皆並江而田然河髙於江可以决泄而江故溪之委也恒亢流寡乃後滷汐漸至故徃者於竝江置碶累石扃木而閉縱之澇則分泄於江旱則納江於河如東之五鄕西之上下水風堋石碶乗時潮漲啓而入之則可以資佐二水是故天有愆時而地無遺利今南鄕地髙率於上流鑿瀆引潮注之又稍下為碶以捍拒滷汐如棟木碶是也使入瀆者迂徐曲折而弗能遽盖古之君子智足先物故能取利博而利患㣲如此也歴世既乆湮弛日加民固病之而賢智之士乃或未能察識古人之意因循苟簡乗數百年今逾月勿雨二水莫可仰注矣又胡得不亟為之慮也它山堰石世傳非王令者水輙壞法考之宋時錢億唐意張必强皆嘗増石以遏羡流矣物無乆勿壞者或堅泐精窳相懸民愚率謂神力弗可加也今宜取石之麗趾者益堰纘宋故緒仍窒其旁罅沙港所以釃導溪流入河廣度尋僅三數沙每乗漲淺隘易塞宋人於其外置閘曰逥沙亦莫能禦予讀考工記有曰凡溝必因水勢善溝者水潄之盖言導水就下則湍駛自能漱激留淤冝益治港令廣浚且務徙沙毋置近壖今多置港旁遇雨復入又稍於堰之上流為防遏水以入庶幾什七之利民得而食也若錢湖之所恃惟蓄水淤久蓄㣲其利害可不言而喻然議者輙難之有二一曰財力弗豫二曰畚運深阻夫宋人之役至出常平錢米萬計役七鄕之民與水運之畨上者勞費誠鉅其後則以田佐湖市葑今湖久不治侵水者非獨葑也故非浚之不可嘗見曽南豐廣德湖記稱其時張令名峋熈寧初為鄞令度七鄕之田計力賦財擇民之為人信服有智計者使督役不以屬吏而民皆歡趨夫萬金錢湖一名萬金之視廣德東西湖爾廣德在鄞西政和間廢今之民豈異於宋故欲浚之非是道不可浚之而淤土之在湖中者分隅别積為阜與旁之在山者浚水舟之畢盡乃已或欲如宋議為堤於湖蘇文忠故嘗行之所謂西湖六堤者是也已乃行視諸碶繕弊興舊為其扄木釃泄有禁決納惟時如是而鄞東西二水之利可以盡復然而莫為者非地利殊而財智不逮於古也責任弗專而茍簡之政多狃於小費而可以慮始者希也水利叙説下戴鱀夫天下之事智者創之仁者守之故君子因民之利而不違也鄞西故有廣德湖廢而為田錢湖故有田佐浚棄而業民使昔人之休澤斬焉弗洎於今然皆弗可復已可復而利民者惟風堋一碶風堋在北渡西南宋令虞大寧積石為之以却暴流而納淡潮者舒學士亶嘗記其事今碶旁有廟疑即祀虞者俗訛堋為伯誌誤從木考之韻註壅江以溉曰堋如五鄕碶田名逥江先民命物之意可見也自行春即今石碶三十里而近為積瀆又數里而為烏金即今上下二水碶行春居江下流滷汐之所易及烏金積瀆則處上游非潮盛漲不可及也惟風堋截然中居去行春十五里當三江之合江水一出它山二出奉化至是始合流而滷汐之自行春逆上者又踰旬日乃至河少涸則壅江入潮視他碶為要潦亦數十里之間易於分泄然則為諸鄕之利焯焯可見而湮廢嵗久莫有過而問焉嘗見石埭尚頺陷故瀆中誠欲繕復度水沾洎者計田而賦趨者必衆孔子曰以佚道使民雖勞不怨言不違乎其利也抑鄞之所恃者二水二水之所恃者諸碶吳潜為碶閘為水利命脉此猶善計財者必裁濫蠧也比有司嵗役民守碶所扄木率責之守者往往雜藁土塗塞引日至或竊啟盜決近碶者利于捕魚蠏過舟故也且竝江之隄疎劣易潰釃泄之不制甚矣變而通之以盡利此其時乎夫先王之政匠人溝洫列於六官達於天下後世則猶有令牧之良因水任川以勤斯民如王陸諸公者流澤滲漉吾鄞未艾今之君子懐負絶識而深究痛隠修二水之政以永鄞人之賜者當有在也芻蕘之説不知所裁惟明者察焉似説王同軌長木之斃無不標也國狗之瘈無不噬也當其標且噬而不察焉其不為善類及尠矣聴言者惟似而已彼讒夫方乗時事挾人怒迎衆怨而造其事為真不即猶可以為似始固欲中以似而謂足也天下之罔莫毒於似矣何也時為之也在時事無有肯為言者甚怨者不旁恤大怒者不小顧也逺以近為基也萬以一為階也以聽言者之不察也白之與黒朱之與紫犁然用也白安得而不黒也朱安得而不紫也即離婁其能以無難也狗似玃玃似母猴母猴似人人之與狗異類甚逺有似焉人固狗矣雖然似也狗自狗何常似玃玃自玃何常似母猴而况人乎雖然似也猶鷺之可為鵠也驢之可為馬也亦似也今以烏而名鵠可乎天下烏之鵠即欲自異於烏不可得矣以鹿而名馬可乎天下鹿之馬即欲自别於鹿不可得矣跡是而觀天下之罔寧獨其似哉故條侯之不反地下與晁錯之不足以謝七國反也天下知之而豈能脱二人之㒺語有之魯之君子迷之郵者焉其以是乎龍先生之以斃仕期遘禍也天下群然訾之予小子賤士非所敢聞然心知先生慷慨節士忠君信友平生視利害如毛髮不宜以不貲之身自塗㸃若此及讀東吳友人俞䇿所撰訓妄篇而始扼拏歎憤知某令乗時以似中先生於怨怒者諸公天下宜若知之而莫肯為言因著似説以廣䇿所未及嗟乎彼䜛夫亦酷矣里有神叢焉悍少年過之請之曰與爾博博勝借我神三日因左手為神博右手自博果勝之叢借其神三日遂不返五日而叢楛七日而叢亾國之威神叢也䜛夫始借以釋憤先生耳今乆而不返天下之大耳目之衆事乆論定當有國是神之不返不足惜寧有不為國威惜者乎詩説孫慎行余讀詩于古今慷慨湮鬰之際愴焉感也二雅曰我瞻四方蹙蹙靡騁危時也曰維此惠君民人所瞻維彼不順自獨俾臧指之切也曰皇父卿士艶妻煽處諸番陬蹶踽之論無不具指於名無敢一隠也至曰家父作誦以究王訩即於己名不敢隠也夫子録詩顧皆特有取者當是時先聖之澤未衰而正氣尚完上無誹謗之誅下無婞激之嫌不忌不阿而讜議出焉古所謂詩史詩諫者也迨其後有欲射諫臣者有欲立法監謗者而道路且相目莫敢言即黍離大夫其言曰知我者謂我心憂不知我者謂我何求盖隠諷云耳而二雅之意熄矣如是則主縱臣諛将何逞不可故曰詩亡然後春秋作盖言直亡也直道之行也家自為詩直道之亡也聖獨為經其褒揚少而貶絶多至斧鉞凛於無窮者豈非詩之大義耶或者謂南山桑柔等非詩之正也夫文王曰命之不易無遏爾躬告君者不切而至耶頌曰未堪家多難予又集于蓼君自憂者不更廹耶稱詩者顧云温柔敦厚何也夫温柔詩之小心也所謂怨誹不亂者也憂其危不忍諱其詞而冀一遷改焉是所以為敦厚若謂温柔者不必抗顏無乃愞乎若以保姦忍惡為敦厚澆也滋甚繼詩而作者無如騷其爱君憂國與詩人不二也然其言敢愁思展轉而不敢抗厲至託茝蕭蘭艾見意斯已婉矣終為羣小所搆自沉汨羅夫家父不聞以直誅而靈均何至以婉廢也班固評原曰露才揚已憤懟不容沉江而死噫謂原憤懟則曩家父諸人更以何名耶甚矣固不知原也且不知詩夫原廢而直道不信於暗君固譏而直道不信於後之人且不信於士君子魏晉來作者代不絶皆騁於浮藻其盛者鳴獨得瀟然間逺不闗世也杜甫元白所作諸詩誌天寳后禍敗之因皆道之事後非規之事前然千載誦歌其致能令人可涕可思欷嘘而不忍釋者何也此亦直之未亡於人心也乃今學士家顧羞莊言喜巵語唯靡靡之躭嗚呼風之流也公忠少而遜全之術多茍以與世靡靡無害而止者豈獨詩云爾哉紙説贈戚竹坡先生王文祿竹坡先生藴潔素之心研精純之學昭汗青之志運巻舒之才拔萃春曺試毗花邑士觀貞白之操而達本章成民向直方之風而柔隨温冩甲辰冬孟藩臬旌賢檄以督剡藤之行盖將諗於銓司復乃初誓乞為育英丕化之職欲長共墨卿之游而大振藻翰之雅去予東海漸近朔燕文禄情寄聫箋義孚片牘縶維無術信處興懐爰説紙以贈云説曰浙之常山殆古剡溪之隩也紙材所産而紙工攸都焉於是􅀈之以楮膚擣之以石舂漬之以流泉灑之以堊粉撒之以筠簾炙之以元罏層層玉映葉葉霜敷秋雲净展水練平鋪是故造之者巧力之殫也由是監别而掄擇之進獻而採受之分頒而録用之幸不幸存焉爾或宣之詔令乎綸綍之出也或矢之賡頌乎奎壁之煥也或陳之謨諌乎乾坤之旋也此上焉者或摹之藝籍乎英華之發也或布之檄移乎幽隠之達也或識之記注乎久逺之明也此中焉者或囊之緘封乎包含之徧也或障之忩牖乎風塵之衝也或毁之拂拭乎土苴之從也此下焉者夫紙一也造之一也而不同焉何也抑豈紙之罪乎曰非也瑩然其色也有不可汙也截然其矩也有不可回也飄然其質也有不可累也不汙足以日新不回足以立程不累足以時行日新者崇徳立程者作師時行者應天竹坡先生之謂乎竹坡選紙知紙也貢紙猶紙也奚特竹坡也凡為士者亦紙也故曰幸不幸存焉爾然紙一也揮毫頴維吉逢折裂多凶凶固弗堪吉宜先辨若呈䛕詞則迎侈攻綺語則長浮匿謗書則增誕尤紙之大不幸也竹坡先生其免夫盖已幾上焉者之具而得中焉者之遭下焉者非所蹈也矧夙探羲畫之源屢絶韋編之篤窮經史以茹美垂竹帛以揚休慕濓洛之學而私淑艾者是别也請無如其薄願克敦其厚望鴻札之遐寄占鯉簡之頻通云明文海巻一百八
