body:
  text: 明文海巻一百九餘姚黄宗羲編説九古硯説許獬余家有古硯往年得之友人當一硯之用不知其爲古也已而有識者曰此五代宋時物也古矣予亦從而寳焉不暇辨其為真五代宋與否雖然斯物而真五代與宋也當時人亦僅以當一硯之用耳葢至於今而後知其為五代與宋也不知其在五代與宋時所寳為周秦漢魏以上物者視此又奚如乎而又不知其以周秦漢魏以上物示周秦漢魏以上人其人自視則又奚如人見世之沉酣於紛華之樂奔走於權貴之門被僇辱而不知羞於是有一人焉卓然以道自重以古先琴書圖畫器物自娛命之曰好古故凡名能好古者必非庸俗人也以其非庸俗人之所好則庸俗人亦從而效之於是士之射利求進者必窮極其所無以諂事權貴權貴亦時出其所有以誇士而士之慕為古而不知務者亦毎與世競逐必盡效其所有而後快噫嘻是非真能好古也特與庸俗人同好而已夫既與庸俗人同好矣而猶嘵嘵然竊好古之名以求自異於庸俗不知其名則是而其意則非吾之所謂好古者學其道為其文思其人而不得見徘徊上下庶幾得其手澤之所存而觀玩焉則恍然如見其人也是以好之而不厭故夫古之為好者非以其物以其人也如以其物而已矣今亦何以異於古哉夫茍不惟物惟其人則吾亦可以為古人矣安知千百世之下不以好古者好吾乃必舍其在吾而惟古之好亦已惑矣予觀今世之所好大率類是葢皆所謂名是而意則非者也不能盡述述其近似者作古硯説諸曹佞臺諫説顧大章天下無不佞臺諫也而六曹之奏議為甚吾欲正言之而不可也聊借昔言為喻以資談者之噱焉昔人之言其出於愚癎而可笑者莫晉惠帝若也惠帝見道傍餓殍曰何不食肉糜聞蝦蟆鳴問曰為官乎為私乎左右對曰在官地為官在私地為私此兩言者即今世愚癎之人猶將隨人而笑之愚以為斯言也特不出於臺諫耳使其出於臺諫則六曹亦將覆請而行矣試擬肉糜之覆疏必曰米穀雖歉肉食頗豐愚民不食自取僵餓某官之議深禆荒政所當亟為宣布者也曹之屬呈之曹之長署之無何得㫖而報可矣蝦蟆之覆疏必曰官私地産分界截然官地蝦蟆宜令着籍其在私地亦須科取某官之議裕國惠民所當著為令甲者也曹之屬呈之曹之長署之無何得㫖而報可矣設又有一臺諫具疏而駁之則又調停其説以覆曰前某所議具為苦心及見某疏更為精覈今議畜多處並依前例如偶缺之合勅有司别作區處官地蝦蟆委難悉記姑著籍第禁居民毋得竊捕他如原議所當永為遵守者也曹之屬呈之曹之長署之無何又得㫖而報可矣如是則曹之屬為能其長為賢而宰相為無罪不然皆咎之徒也客聞而咤曰是何異趙高之欺二世乎曰何可比也高之為鹿馬也二世左右猶有言鹿者高能中言鹿者以罪而不能得其始之一詞於馬也今臺諌之所謂馬則舉朝之臣無敢有知其鹿者矣歸以告其家夢以囈其口必皆曰是誠馬也向既誤以為鹿嗚呼臺諫之氣其服人如此豈不更烈於趙高哉知説鄭以偉歐陽作怪竹説以為天下之物若有知若無知皆不可以窮詰其言甚辨然於人身亦有然者豈特物哉作知説人之心活而能應名之曰知凡身皆有靈如手足耳目之類有觸必知是也而爪甲眉髮則不然爪甲眉髪皆活然劖爪剪甲眉脱髪落如鋸木割絲而人曾不之覺是豈有知哉附我之一體猶然有不覺之物矧夫金石草木之類耶然則天地之金石草木猶人之有爪甲眉髪耳爪甲眉髪猶曰頑冥液與血出於膚則與水同斷蠏之一足蠏已羮而足猶動動者知而羮者不知也是一體之中有半知半不知之物矣誰頑而誰靈哉人之至靈者心而嬰兒之事壯必恍慌少壯之事老或遺忘又或少壯之事記憶而得心一人之心耳或知焉或否焉又或憶而得焉而憶而不得者又或有焉何也夢騎而入鼠穴者必以為真夫人之不能入鼠穴晝必知之審矣而夢或忘之豈夢為氣所蔽乎晝之所為不蔽何况少壯之不相憶耶方其不憶之時此心與爪甲眉髪何異爪甲之生眉髪之長我又不可謂之無知也然則聖人智於衆人衆人智於禽獸禽獸智於蟲豸蟲豸智於蛤蚌蛤蚌智於草木而龜殻雞骨可以卜蠛蠓之飛螘則知晴舂則知雨睴目知晏陰諧知陰人未必能蓍草之類聖人借以决疑則是禽獸蟲豸草木復智於人矣故天下無物而無知而無一物無不知聖人之身亦有爪甲眉髮不靈之體而物之體亦有聖人之知知與不知孰與定其倪請以質之混沌氏混沌氏嘿然不答筍江社申寧儉説蔣德璟璟向有戒侈諸約同年林讓菴先生作寧儉説行之一時奉爲指南予懼乆而渝也再撮五要以申同志一省柬費前輩相訪率用單帖即京師諸公惟初次用全後即用單有吉慶則用單紅體既簡雅意亦親厚今泛用全帖是踈之也槩不宜受一省宴費古人以四簋爲敬至天子則用八簋爲最腆今羅列水陸幾至數倍非禮也司馬温公與文潞公作真率會酒止數行食止五味惟菜不禁每召客共用一柬不待促蘇文忠三養説曰安分以養福寛胃以養氣省費以養財大是今時藥石至如蛙蟮蟃鼈石鱗諸物皆他處所賤吾鄉顧貴之而膳失又以偽者斃者充庖尤可哂也宜盡斥不用諸宴坐會合坐止五簋即大饗止用八簋勿效何曾輩所為一省餽費古人相別贈芍藥相招贈當歸相慰贈萱草相蠲贈合歡物輕情厚即東坡集如酒筍花魚茶墨之類相餉皆有詩李文正當國值生辰趙司成用二帕魯學士止用一半枯魚爲壽亦留酌賦詩劉忠宣父為御史餉楊文定止一茗一蜜王端毅餉内閣止一羊毛口袋曰可盛米皆千古羙談近日幣盒套俗物既難繼意亦非真宜盡洗之間有贈問止用一二小物務極輕省以成君子道義之交一省僕費古人不知其主視其僕凡僕謙樸其主必君子其家必興僕侈肆其主必非君子其家必替厯數古今錙銖不爽且衣裙無等體既凌夷縻費無從勢必欺騙累主累身皆非福也何如㮣從儉約以成主之名且可自爲身家之計乎願相戒勿復爾間有不悛去之扮一省邪費世間早已即有釋道二教皆勸人爲善佛經曰人事天地鬼神不如孝其二親二親最神也道經曰求仙以忠孝和順仁信爲本人欲地仙當立三百善欲天仙當立千二百善此真佛老之教也若崇飾土木廣誘士女則佛老之罪人也按律婦女入寺觀神廟燒香者笞四十住持不禁止亦笞四十若有刁姦因誆騙財物者充軍粧扮神像鳴鑼擊鼓迎神賽會者杖壹百師巫假降邪神書符咒水妄稱白蓮等會為首者絞為從者各杖壹百流三千里愚民不知多悞犯之吾黨宜預相曉戒不獨為衆省財亦以造福明文海巻一百九
