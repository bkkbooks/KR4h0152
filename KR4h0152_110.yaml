body:
  text: 明文海卷一百十餘姚黃宗羲編辨一詩辨王縉聖人垂訓於方來也其見諸言行之間者既同且詳而盡心焉者於六經尤著焉六經非聖人之所作因舊文而刪定者也易因伏羲文王之書而述之大傳所以明隂陽變化之理書因典謨訓誥之文而定之所以紀帝王治亂之迹春秋因魯史之舊而修之所以明外伯內王之分詩因列國歌謠風雅之什而刪之所以陳風俗之得失禮所以著上下之宜樂所以𨗳天地之和皆切於日用當於事情而為萬世之凖則也其於取舍用意之際似寬而實嚴若疏而極密故學者捨六經無以為也奈乎秦焰之烈燔滅殆盡至漢嘗尊而用之莫得其真或傳於老生之所記誦或出於屋壁之所祕藏記誦者則失於舛謬祕藏者未免於脫略先儒因其舛謬脫略復從而訂定之務足其數而以已見加之其缺者或偽為以補之或取其已刪者而足之其受禍之源雖同而詩為尤甚夫詩本三千篇聖人刪之十去其九則其存者必合聖人之度皆吟咏性情涵暢道德者也故聖人之言曰興於詩教其子則曰不學詩無以言與門弟子語曰詩可以興可以觀可以羣可以怨至於平居雅言亦未嘗忘之詩之為用矇瞽之人習而誦之咏之關雎被之管絃薦之郊廟享之賓客何所往而非詩耶後世置之博士以謹其傳為用固亦大矣則其溫厚和平之氣皆能感發人之善心者可知焉今之存者乃以鄭衛淫奔之詩混之以足三百十一篇之數遂謂聖人之所刪至如桑中溱洧之言皆牧豎賤𨽻之所羞道聖人何所取而存耶玩其辭者何所興言之復何嘉耶學之何益於德誦之閨門烏使其非禮勿聽耶被之管絃薦之郊廟鬼神饗之賓客意何在耶是未可知也且聖人又曰詩三百一言以蔽之曰思無邪然思且無邪見於言者又何盩焉假使聖人實存之則其刪者必又甚於是耶或曰聖人存之者蓋欲後世誦而知恥所以懲創人之逸志亦垂戒之意也是故春秋據事直書臣弒其君子弒其父皆明言之而不隱及其成也皆知畏懼詩之為意豈外是哉嗟乎舉善之足尚惡者固自知其非且春秋者國史也備列國之事必欲見其葬弔會盟聘享征伐嫁娶之節闕之則後世無所傳無所傳則後世無所信故備書之而用意之深則在明褒貶於片言之間也然詩既為民間歌謠之什遺其善固不可失其惡又烏害於道乎由是論之則淫奔之詩在聖人之所刪蓋必矣且張載子厚嘗論衛人輕浮怠墮故其聲音亦淫靡聞其樂使人有邪僻之心而鄭為尤甚矣夫聖人教人以孝悌忠信恨不挽手提耳以囑之何乃以淫靡之樂而使人起邪僻之心乎故其論為邦亦曰放鄭聲然則揆之于理據之于經考之于聖人之言意雖有儀秦之辨吾知其叛于理而失聖人垂訓之意矣天辨烏斯道或問余天有知乎余曰有知曰天穹然蒼然冥冥然莫之極也説者謂天如雞卵左旋故渾天儀似焉此亦臆焉而已日月星辰麗乎空中二氣交則為雲為雨蕩焉則為電為雷霆隂氣遊焉則為霜雪為霰豈故為之耶以陽剛言則謂之乾以主宰言則謂之帝以形體言則謂之天天無心肝腎腸無耳以司聽無目以司視無喉舌以司言無喜怒無好惡何有知之有哉曰盈天地間何莫非天之為耶故位曰天位爵曰天爵秩曰天秩民曰天民物曰天物伐有罪則曰天討罰天之道凜乎其不可違也故書曰天道福善禍淫詩曰昊天曰旦及爾遊衍傳曰違天必有大咎老子曰天網恢恢申包胥曰人衆則能勝天天定亦能勝人汝以天無心肝腎腸也易何以曰復其見天地之心乎汝以天無耳闕夷齊十辨王直一辨夷齊不死於首陽山二辨首陽所以有夷齊之迹三辨山中乏食之故四辨夫子用齊景公對説之由五辨武王之世恐無夷齊六辨史記本傳不當削海濱避紂之事七辨道遇武王與周紀書來歸之年不合八辨父死不葬與周紀書祭文王墓而後行者不同九辨太史公之誤原於輕信逸詩十辨左氏春秋傳所載武王遷鼎義士非之説亦誤謹按論語第七篇冉有曰夫子為衛君乎子貢曰諾吾將問之入曰伯夷叔齊何人也曰古之賢人也曰怨乎曰求仁而得仁又何怨出曰夫子不為也第十六篇齊景公有馬千駟死之日民無得而稱焉伯夷叔齊餓於首陽之下民到於今稱之其斯之謂與此二章孔子所以稱夷齊者事無始末莫知其所指雖有大儒先生亦不得不取證於史記蓋孔子之後尚論古人莫如孟子孟子止言伯夷不及叔齊其於伯夷也大概稱其制行之清而於孔子此二章之意亦未有所發惟史記後孔孟而作成書備而記事當時有以補前聞之缺遺如子貢夷齊何人之問孔子求仁得仁之對倘不得史記以知二子嘗有遜國俱逃之事則夫子不為衛君之微意子貢雖知之後世學者何從而知之也此史遷多見先秦古書所以為有功於世也然遷好竒而輕信上古之事經孔孟去取權度一定不可復易者史記多從而變亂之以滋來者無窮之惑則遷之功罪豈相掩哉蓋夷齊不食周粟之類是已史記既載此事於傳又於周紀齊世家諸篇厯言文王武王志在傾商纍年伺隙備極形容文字既工蕩人耳目學古之士無所折衷則或兩是之曰武王之事不可以已而夷齊則為萬世立君臣之大義也昌黎韓公之論是已其偏信者則曰夷齊於武王謂之弒君孔子取之蓋深罪武王也眉山蘇公之論是已嗚呼此事孔孟未嘗言而史遷安得此歟或聞豫言而愕曰謂孟子未嘗言則可首陽之事孔子彰彰言之子既知有論語而又疑此則是不信孔子也余應之曰豫惟深信孔子是以不信史遷也且謂論語本文何以言之夫齊景公有馬千駟死之日民無得而稱焉伯夷叔齊餓於首陽之下民到於今稱之論語未嘗言其以餓而死也而史遷何自知之餓者豈必皆至於死乎夫首陽之隱未見其必在武王之世而二子昔嘗逃其國而不立證諸孔子對子貢之意則可信矣安知其不以逃國之時至首陽也孤竹小國莫知的在何所傳者謂齊桓北伐山戎嘗過焉山戎與燕晉為鄰則孤竹可知而首陽在河東之蒲坂詩之唐風曰采苓采苓首陽之巔采苦采苦首陽之下或者即此首陽蓋晉地也若夷齊果孤竹之子則逃國以來諒亦非逺何必曰不食周粟而後隱此耶今且以意度之國謀立君而已逃去則必於山谷無人不可物色之所然後能絶國人之思首陽固其所也蓋倉卒而行掩人之所不知固宜無所得食又方君父大故顛沛隕越之際食亦何心其所以兄弟俱在此者一先一後勢或相因而今不可知耳然亦不必久居於此踰月移時國人立君既立則可以出矣惟其遜國俱逃事大卓絶故後之稱指其所嘗栖止之地曰此仁賢之迹也夫是以首陽之傳久而不泯何必曰死於此山而後見稱哉豫所以意其如此者無他蓋論語此章本自明白於景公言死而於首陽不言死後人誤讀遂謂孔子各以死之日評之爾此大不然也孔子以景公與夷齊對言大意主於有國無國尤為可見問國君之富數馬以對諸侯有千乘所謂有馬千駟者蓋亦言其有國也夷齊可以有國而辭國者也崔子弒景公之兄莊公而景公得立崔子猶為政景公安為之上莫之問也享國日久奉己而已觀其一再與晏子感慨悲傷眷戀富貴直欲無死以長有之其死也泯然無一聞之人耳孔子嘆之曰嗟哉斯人彼有內求其心棄國不顧如夷齊者獨何人哉彼所以千古不泯者豈以富貴哉由此論之則孔子所以深取夷齊但指其辭國一節而意自足若曰孔子取其不食周粟以餓而死則此章本文之所無也夫今去夫子又逺矣餓於首陽一語之外前不言所始後不言所終豫疑其在遜國俱逃之時而不死者蓋意之蓋豫之意之也蓋猶近似而無害於義理若遷之意之也略無近似而害於義理特甚焉大概遷也專指文武為強大諸侯窺伺殷室以有天下故於世家則首吳泰伯於列傳則首伯夷遷之説出而孔孟所以言文武盛德至仁者皆變亂矣此事若不見取於大儒先生猶可姑存以俟來哲今亦不幸君子可欺斷然按之以釋論語則武王萬世當為夷齊罪人夷齊借之以徇使萬世亂臣賊子知畏清議如此也而武王何罪哉豫言更僕未終亦不得已也然實欲反覆究竟折服史遷使不可再措一辭者吾徒之學誦詩讀書論世知人不當草草幸毋倦聽夫夷齊孔子之言略孟子雖不言叔齊而言伯夷甚詳若併取證於孟子則史遷所載諫伐以下曉然知其決無也孟子言伯夷之歸周也曰伯夷避紂居北海之濱聞文王作興曰盍歸乎來史記本傳則不然削其海濱避紂之事俱於遜國俱逃之下即書曰於是往歸西伯及至西伯卒此下遂書叩馬諫武王之語數其父死不葬以臣弒君蓋以為遇武王於道也所謂於是云者如春秋之書遂事才逃其國遂不復返而歸周也則不知此行也二子亦已免喪否歟厄於勢而不返容或有之然逃彼歸此如同時然身喪父死自不得與於哭泣之哀也而忍以父死不葬責他人歟嗚呼此必無之事也夫遷所以削其海濱避紂者何哉謂遷為未嘗見孟子歟則遷知其有書七篇其作孟子傳自言嘗讀之而屢嘆矣然而如此書伯夷者其意可想也遷以不食周粟為竒節故欲見伯夷處心後來全不直武王而其初本無惡於紂也夫事不維其實所不合已意則削之千載而下讀於是一語尚可想其遷就增損之情態而何以傳信乎故曰當一以孟子為斷夫伯夷太公兩不相謀而俱歸文王孟子稱為天下之大老太公之老古今所共傳則伯夷之年當亦不相上下孟子必不虛加之也然伯夷德齒昔縱與太公同而後來年齡豈必與太公等吾意武王之時未必有所謂伯夷也而遷所作周紀又自與傳不同何以言之伯夷以大老而歸文王文王享國凡五十年吾不知其始至也在文王初年歟末年歟不可考也而遷於周紀則嘗以為初年矣其言曰文王繼公季而立敬老慈幼禮賢待士士以此多歸之夷齊在孤竹聞西伯善養老往歸之然後曰太顛閎夭散宜生鬻子辛甲太公之徒皆往歸之然後曰崇侯譖西伯於紂囚于羑里然後曰紂釋文王賜弓矢鈇鉞得専征伐又數年而書聽虞芮訟又明年而書伐犬戎自此每年書一事而各以明年二字冠於其上如是者凡七上去夷齊來歸之年不知其幾矣大概書文王五十年之事稍稍排布嵗年而夷齊之歸為首其他未之先也以天下之大老其來在文王即位未久之年若謂其人猶及武王以平殷亂天下宗周之後姑少計之亦當百有餘嵗矣恐不必不食周粟隱於首陽山而考終已久矣遷既書於周紀如此及作伯夷傳乃言夷齊方至文王已卒道遇武王以木主為文王伐紂叩馬而諫不知此當為兩夷齊乎抑即周紀所書之夷齊乎若即周紀所書之夷齊則歸周已數十年非今日甫達岐豐之境也諫武王當於未舉事之初不當俟其戎馬既駕而後出竒駭衆於道路也太公與已均為大老出處素與之同不於今日白首如新方勞其匆匆扶去於鋒刃將及之中也嗚呼紀傳一人作也乃自相抵牾如此尚有一語之可信乎觀其摩寫二子冒昧至前左右愕胎欲殺武王無語太公營救之狀殆如狂夫出鬭羣小號呶而迂怪儒生姓氏莫辨攘臂其間陳説勸止嗟乎殆哉其得免於死傷也不亦幸哉武王方為天下去賊虐諫臣毒痛四海之紂而行師無紀左右遽欲害敢諫之士戕天下之父死生之命在左右與太公而武若罔聞知萬一扶去之手緩不及用則是彼殺比干此殺夷齊其何以有辭於紂也武王應天順人之舉後世敢造此以誣之噫甚矣傳曰父死不葬紀則曰武王祭于畢東觀兵于孟津載木主車中畢也者文王葬地也古無墓祭祭畢之説亦妄然一曰祭于畢一曰父死不葬又何也故凡遷書諫伐之下大率不可信使其有之孔子不言孟子言之矣豫若以孔孟之説折遷遷未必屈服惟傳自言之紀自破之其他卷猶曰破碎不全不盡出于遷之手而此紀此傳皆遷全文讀者知其非遷莫能作又不得疑其補綴於後人也曰然則紀與傳孰愈曰紀書文王其妄居半及書武王其妄極矣若其書夷齊一節猶略優於傳也蓋紀言其歸周及文王之生而傳言其至值文王之死也及文王之生者與孟子同而值文王之死者無稽之言也曰然則首陽之事其究如何曰豫前固言之果有夷齊暫隱之迹而不在武王克商之時武王克商之時恐已無所謂夷齊而孟子又不言叔齊歸周惟後之讀論語者惑於遷史增加孔子本文執所謂餓者謂夷齊蓋棺之終事是以展轉附會爾夫理止於一是而止豫生百世之後安敢臆度輕破古今共信之説蓋見遷於論語才有一字之增而遂與孟子略無一字之合又紀傳色色不同徒以無稽之言貽惑後世是以詳為之辨庶幾自此觀夷齊者惟當學其求仁得仁與夫制行之清亷頑立懦之類而不必惑其叩馬恥粟以至於死然後語孟稱道之意可明也夫讀語孟則見二子可師乃志士仁人甚自貴重其身抗志甚髙觀理甚明俯仰浩然清風可仰而不可及孔孟之所謂賢由之則俱入堯舜之道也讀史記則見二子可怪乃羈旅妄人暗於是非進退輕發嘗試不近人情悻悻然以去終與自經於溝瀆而莫之知者比遷所謂賢由之則不過於陵仲子之操也學者於此從語孟乎從史記乎曰如此則遷無所據而容心為此何也曰遷自言之矣所謂豫悲伯夷之志睹逸詩可異焉者此遷之所據乃一傳之病源也逸詩者西山采薇之章也三百篇詩經夫子所刪尚莫知各篇為何人作遷偶得一逸詩而妄意之曰此必夷齊也夷齊嘗餓於首陽今言采薇西山是不食周粟故也夫古詩稱采草木蔬茹于山者甚多豈皆有所感憤而不食人粟者乎粟生于地人人食之已獨不食則食之者人人皆非也異哉恥一武王而天下皆無已同類之人然則試使夷齊之教行一世之人無一人肯食周地之粟而後可乎夷齊之風百世聞之而興起何當時此事無一人見之而聽從乎夫天下所謂西山不知凡幾自東觀之皆西也詩言西山不言首陽不當以附會論語之所云也末句曰吁嗟徂兮命之衰兮遷以為夷齊死矣悲哉此臨絶之音也夫徂者往也安知作歌者之意不思有所往上言我安適歸則無辟地辟世矣下又言吁嗟徂兮則於不可中求可猶思有所往焉既而遂自決曰命之衰矣歸之於天而終無可奈何之辭也豈必為殂卒之殂乎神農虞夏固不可見而以暴易暴何可以指武王武王非暴君也必欲求其稱此語者則自春秋戰國至于秦項滅國滅社何處不有乎然則世必有遭罹荼毒而作此詩者非夷齊也此詩誤遷而遷誤後世也或曰然則春秋之初魯臧哀伯曰武王克商遷九鼎于洛邑義士猶或非之杜元凱以為伯夷之屬也此在孔孟之間豈亦非歟曰非也武成之後武王嵗月無幾散財發粟釋囚封墓列爵分土崇德報功亟為有益之事則吾聞之遷鼎恐非急務也滅人之國毁人宗廟遷其重器強暴者之所為誰謂武王為之使果有所謂鼎則天下一家無非周地在彼猶在此矣豈必皇皇汲汲負之以去而後為快乎况罪止紂身為商立後宗廟不毁而重器何以遷乎書稱營洛乃成王周公時事在武王無之義士所非亦不審事實矣而義士又不知為何人自克商至周衰然後左氏載此語蓋已四五百年四五百年之間豈無一士心非武王者得稱為義亦各有一見也而何必以夷齊實之乎况左氏近誣未必斯言果出于哀伯乎嗚呼此武王夷齊千古曖昧俱受厚誣之事與或丘蒙之徒妄言堯舜者頗同惜其出於孟子之後無一人識其為齊東野人之語故使流傳至今幸而竊讀論語偶思首陽之章未嘗言死遂得以盡推其不然惟此章之疑既釋則史遷失其所以慿藉附會之地豈非古今之一快哉然此愚見也不知來哲又以為然否反夷齊十辨鄒守愚一辨夷齊不死于首陽山二辨首陽何以有夷齊之迹三辨山中乏食之故四辨夫子用齊景公對説之由五辨武王之世恐無夷齊六辨史記本傳不當削海濱避紂之事七辨道遇武王與周紀書來歸之年不合八辨父死不葬與周紀書祭文王墓而後行者不同九辨太史公之誤原於輕信逸詩十辨左氏春秋傳所載武王遷鼎義士非之説亦誤余嘗讀王文端公夷齊十辨掩卷而伏思之嘆曰士生百世之下持一時之見破千古之疑必其援據精詳議論正大天理民彞不可泯滅非但使天下後世灼然見昔非而今是即使其人當時見之亦不敢以有辭于我也庶乎其可爾吾讀遷史遷固好竒者夷齊之辨公亦未為得也何以言之公曰齊景公有馬千駟死之日民無得而稱焉伯夷叔齊餓於首陽之下民到於今稱之論語未嘗言其以餓而死也而遷何自知之餓者豈必皆至於死乎余曰不然吾聞之夫子陳蔡之厄告子路曰汝以仁者為必信也則夷齊不餓死首陽則夫子固已言之矣莊子曰昔周之興也伯夷叔齊二人相謂曰吾聞西方有人似有道者試往觀焉至岐陽武王聞之使叔旦與之盟二人相視而笑曰吾聞古之士遭治世不避其任遇亂世不為茍存今天下暗周德衰其並乎周以塗吾身不如避之以潔吾行北至首陽遂餓而死列子曰伯夷叔齊始以孤竹君讓而終餓死於首陽之山又曰伯夷無欲矜清之節以故餓死戰國䇿曰廉如伯夷不敢素餐汙武王之義而不臣辭孤竹之君餓而死於首陽之山其言又與夫子合夫以夷齊之餓死首陽彰彰明信雖婦人女子猶能知其名誦其美不衰况當時之故老去商未逺也安可直以為不死于首陽哉公曰首陽之隱未見其必在武王之世而二子昔嘗逃其國而不立安知其不以逃國之時至首陽也孤竹國小莫知的在何所傳者謂齊桓北伐山戎嘗過焉山戎與燕晉為鄰則孤竹可知而首陽在河東之蒲坂唐風曰采苓采苓首陽之巔或者即此首陽蓋晉地也何必不食周粟而後隱此耶倉卒而行固宜無得食然不必久居於此惟其遜國俱逃事大卓絶故後稱之曰此仁賢之迹也何必曰死于此山而後見稱耶余曰不然夷齊之逃以成讓也其心炯炯若日星然倉皇就道不相要約齊不知夷夷亦不知齊也豈有俱入首陽之理耶况其逃也不過徐徐以俟國人立君之定耳而首陽之距孤竹幾二千里豈有當君父之喪廢躃踴之戚踰都越邑以邀讓國之名也哉吾恐其獲小廉而喪大節也而謂夷齊為之乎按今之永平府古孤竹地也今孤竹三塜存焉首陽一在河南一在山西按志河南首陽者五惟偃師首陽山世傳夷齊隱此尚有夷齊墓山西蒲州首陽山即唐詩所謂采苓者賈逵注史記即此首陽也有墓有祠以此考之未知孰的然偃師舊亳地也武王伐紂還息偃師徒遂以為名恐夷齊不當至此耳然其上亦有墓豈好事者因首陽之名而為之歟然皆與孤竹相去之逺雖未暇論其孰是要皆有以見其非遜國之時也則首陽之所以有夷齊之迹當在革商之後天人革命絶景窮居之時歟夫豈所謂倉卒乏食之故哉公又曰孔子以景公與夷齊對言大意主于有國無國尤為可見余曰不然景公登牛山而流涕至為晏子所笑亦可謂畏死者矣夷齊則寧餓死而不顧夫子以景公夷齊並言之蓋亦有所感而云爾抑揚豫奪以為世勸固不在於有國無國也公又曰武王之時未必有所謂伯夷也若有夷齊則歸周已數十年諫武王當於未舉事之先不當使之戎車既駕而後出竒駭衆於道路也太公與已均為大老出處素與之同不於今日白首如新方勞其匆匆扶去於鋒刃將及之中也豫曰不然太公伯夷二老也計太公之初遇文王年且八十矣武王之時猶且以鷹揚奮而獨疑無所謂伯夷者何哉且均之歸周也太公則已至者也夷齊則歸之而未至者也叩馬之諫義士之稱其不相識也固宜東海北海孟子蓋列言二老之歸心見文王之善養老爾若莊子則止言其見武王而不及文王亦可槩見以前後考之太公之來當在文王之未年而夷齊之來其文王既殁之後武王初立之時耶海濱避紂之事非遷削之也按孤竹至海僅百餘里有孤山屹然獨立於海上四面皆水豈逃立之後避紂之亂蓋嘗隱於是歟今青州昌樂州邑亦有孤山上有夷齊廟不知漢始以北海名郡又萊州維邑亦有孤山上有夷齊廟不知隋始以北海名邑又孤山之名相似故好事者因孟子北海之説而為之廟爾遷博逰天下名山其有不知此耶孟子以孤竹為北海遷以北海為孤竹烏可謂遷削之耶道遇武王雖與周紀來歸之年不合然周紀但稱聞西伯善養老盍往歸之之語則亦未可以是即為來歸之年也公又曰傳曰父死不葬紀則曰武王祭于畢東觀兵于孟津載木主車中畢也者文王葬地也古無墓祭祭畢之説亦妄一曰祭于畢一曰父死不葬又何也故凡遷書諫伐以下皆不可信余曰不然畢有二説一曰文王墓一曰星名畢星主兵固不可遽以為祭墓之禮也但古者諸侯五月而葬於時武王立九年矣乃云不葬不可考也公又曰觀夷齊者但當學其求仁得仁與夫制行之清廉頑立懦之類而不必惑其叩馬恥粟以至于死然後語孟之意可明也余曰不然叩馬恥粟以至死是所以見夷齊之大者也君臣之義與天地並立與日月並耀此義明而人紀立此義明而名位定此義明而亂賊息忠臣烈士其不可奪者正以是爾仁孝之心赫赫乎天地鑒之太公以為義士而武王獨無言焉吾知武王之心不待伯夷非之而後知也又詎可決以為羈旅妄人暗於是非進退悻悻以去自經於溝瀆而莫之知者比哉公又曰詩自夫子刪後遷偶得逸詩而妄意之曰此必夷齊也采薇西山是不食周粟故也粟生於地人人食之已獨不食則人人皆非也試使夷齊之教行一世之人無一人肯食周粟而後可夷齊之風百世聞之而興起何當時此事曽無一人見之而聽從乎以暴易暴何可以指武王武王非暴君也余又曰此大不然恥食周粟夷齊之所以為此者其亦無如之何而姑以是盡吾心之所安焉而巳也若曰使夷齊之教行無一人肯食周粟而後可則亦將以號之天下夫孔子之殺身成仁孟之舍生取義忠臣之捐身報國若王蠋襲遂張巡文天祥之為皆率天下之人相趨以死則生人之類絶尤不可之大者必若蕭瑀之於隋唐馮道之於五代朝仇暮君然後為疾風徑草然後為屹若巨山不可動而以為賢乎哉吾見其率天下之諛生畏死貪寵叨榮若犬彘者流引其塗而誨之趨也公言何為者耶况武王與夷齊不兩立自其以救天下之大亂而言謂之仁自其以裂天下之大分而言謂之暴若夷齊者以武王為暴也亦宜公又曰魯哀伯曰武王克商遷九鼎于洛邑義士猶或非之杜元凱以為伯夷之屬非也武成之後武王嵗月無幾遷鼎恐非急務也遷其重器強暴者之所為誰謂武王為之使果有所謂鼎則天下一家無非周地何必遷乎書稱營洛乃成王周公時事而義士又不知為何人自克商至于周衰蓋四五百年豈無一士心非武王者何必夷齊實之乎余曰不然夫九鼎也者神禹之所鑄以象九州者也厯世寶之夏亡鼎歸之商商亡鼎又歸之周不可得而私也禹尚不可得而私而况商乎然則謂遷其重器亦誤矣其載諸史稱釋箕子之囚表商容之閭封比干之墓散財發粟公則皆信之而命南宫適史佚展九鼎寶玉獨疑焉何哉武王克商定鼎郟鄏至于南望三塗北望嶽鄙顧瞻有河粵曕伊洛則經營規畫蓋非一朝夕之故矣豈遷鼎在將營之時耶左氏載義士非之者雖不必指為夷齊要周之時宜亦有之亦足以見天理民彞之不可已也或曰然則易之順天應人非耶余曰聖人之言各有指要不當以執一論也若謂湯之心果於放桀武之心果於伐紂則非所以為湯武矣然則湯武與夷齊可兩是乎余曰夷齊哀萬世之亂也經也湯武哀天下之亂也權也其可是彼而非此乎要之湯武之心猶夷齊也伊尹五就孟津觀兵使夏癸商辛由兹而悔禍可以為少康太甲則禹湯之澤猶未遽斬于天下也泰伯文王之至德亦將歸之矣此則事之或然者也湯武何至于有慚未盡善之云也哉時之窮湯武亦無如之何也已或又曰然則子之言右遷者也余曰天下之言惟理焉視其理是而言可據雖下於遷者萬萬吾將信之况遷耶且遷作夷齊傳不襲常體使人慷慨膾炙齊得喪輕死生有不可幾及之意後世至以為怨不知遷者也况公讀論語偶思首陽之章未嘗言死遂以盡推其不然以叩馬恥粟為千古曖昧厚誣之事其何以服遷乎哉雖然遷失亦多矣吾因夷齊而為之辨懼天下後世之多於託武王而不果於信夷齊也明文海卷一百十
