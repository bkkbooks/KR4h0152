body:
  text: 明文海卷一百十一餘姚黃宗羲編辨二夷齊辨郭造卿尚論夷齊者當觀之三仁三仁與凡為殷臣殊既尊尊親親居元子太師少師不能易位而去不能潔身而奴不能匡君而死其同仁焉何居蓋死生大矣而莫難於得死故微箕議去留干未嘗有異辭微曰耄遜于荒箕曰我罔臣僕干曷曰必死于諫乎夫諫非臣之幸必不聽乃去不幸于去者奴不幸于奴者死死而君臣恝觀貴戚則國可知矣倘死者與之奴奴者與之去焉其有去而請奴奴而請死者乎非惜身也為愛國也奴而周戢于西土尚為其諫之或悛死而兵觀于孟津則知其言之始絶是身關國之存亡寧忍以死而塞責哉觀戡黎及箕子篇祖伊但警紂曷嘗以咎周微箕傷殷之必亡未嘗忌周之必興茍可以無死干其有以異乎蓋君為社稷死則死之非社稷而死之謂何必君命無所逃斯蹈仁而死矣何必同况於夷齊乎身非貴戚何以死為若任綱常懼亂賊自軒轅放伐以來三聘五就為己任乃壞綱常之俑為長亂賊之階矣彼卞隨務光者其義不已髙乎亦有疑其誣者乃不疑于夷齊豈未觀之三仁及乎孔孟之旨哉孟言非其君不仕避居北海以待天下之清將就文王而養老焉孔言餓於首陽之下未言所以餓而死者且稱之曰逸民寧非不降不辱因避紂而餓乎史從為之辭而有叩馬之諫及采薇之歌以死於不食周粟則會朝清明非其君而天下清不可待矣亦有言其遜國者史並採之以為傳孔何以稱泰伯而不少及乎此若以齊景並言因衛君而問也觀彼之得國則此失國可知然好名能以千乘讓為聖之讓而何怨故稱是用希者謂不念舊惡而已其何以失國未嘗言之矣蓋紂醢九侯脯鄂侯囚西伯皆有國者也而孤竹無聞世多以為讓事之有無不可知而于諫伐乎何有故孔謂求仁得仁而有可有不可孟謂聖之清者若隘君子不由也然風為百世師亷頑立懦而已未嘗言遜國而况於諫伐乎聖賢所論如此他不敢知之矣且史於伯夷削大老之事其齊世家尤譎故讀者疑之善為之辭者蓋有三人焉王充曰太公伯夷俱賢也並出周國皆見武王太公行耦而伯夷操違羅大經曰鷹揚叩馬其道並行而不相悖也處東海之濱者進以功名濟世處北海之濱者退以名節勵世豈故相為矛盾哉觀伯夷之諫太公曰義士可見矣唐順之曰夷之歸周歸文王也文王終身事殷故夷叩馬而諫夫子稱文至德而未盡善乎武則微意可知矣夷不嫌其同於父而不同其子亦不嫌于太公始同而終異也然則遷之説亦未可以為誣哉按太公為大老興渭之年可考而伯夷共稱焉乃其年則何如詎鷹揚獨遺乎一老下車不聞有異典倘叩馬有是事也既知其為義士豈以為紂之所播棄而以同于頑民歟然嘉亡國之守節三代以下之主類能之况十亂克廣德心而武王之稱義師哉若叩馬無是事也然有讓國之義在焉則天下惟二老太公何忘于斯即未嘗與同事亦必相聞矣下車不表此而表者何人哉夫既同避於亂世而不同出于清時則或當就養之後而年不待或當文王既殁而歸首陽影響無傳久矣故不見于周書及孔孟之言焉必如史所云則以三仁而論二子彼諫而戮者本出於不幸諫而餓者實其所自取意之也非仁也故孟言夷尹所同淮南子謂異道同仁者是也乃於龍戰之郊而抗鷹揚之師非惟勢所不行於義無乃不可乎謂始與太公同其父而終與太公異其子者心雖不可知事則未嘗有也其可以事所無者而斷其心之所必有哉豫故不敢舍孔孟而為之辭璽辨劉定之咸陽縣民段義於河南鄉修舍得古玉印文曰受命于天既夀永昌上之詔蔡京等辨驗以為秦璽遂命曰天授傳國受命寶改年號為元符秦始皇以藍田玉製璽六面方正螭紐李斯撰文以魚鳥篆刻之子嬰降時獻漢祖漢諸帝常佩之故霍光廢昌邑王賀持其手解脫其璽組王莽篡位元后初不肯與後乃出投諸地螭角微玷董卓之亂帝辨出走失璽孫堅得於城南甄宫井中袁術拘堅妻得以稱帝術死璽仍歸漢傳魏𨽻刻肩際曰大魏受漢傳國之璽魏傳晉晉懷帝失位璽歸劉聰聰死傳曜石勒弒曜取璽冉閔篡石氏置璽於鄴閔死國亂其子求救於晉之謝尚尚遣兵入鄴助守因紿得璽懷以歸尚送還晉方其未還也劉石方且以璽不在晉謂晉帝為白板天子晉蓋恥之然則晉之謂紿得璽意者以解此恥也惡足盡信哉不旋踵鄴為慕容燕所取璽或者實在燕矣謂在燕則燕為苻堅所併而堅見虜於姚萇萇從堅求璽堅當日不與且復紿之曰璽已送晉不可得也卒拒之以死蓋堅未嘗以送晉而璽於此乎亡矣謂晉果紿得之於鄴則傳宋齊梁而侯景取之景敗其侍中趙思賢棄之草間奔廣陵告郭元建取送髙齊齊亡歸宇文周周傳隋隋煬帝死宇文化及取之化及死竇建德取之建德見擒其妻曹氏奉以歸唐唐傳朱梁朱梁亡歸于後唐然後唐之未取朱梁也自云得璽于魏州僧僧得于黃巢亂唐之時而莊宗用以建大號則所取於朱梁之璽與所取於魏州僧之璽又不知孰為秦之故物也抑卒同歸於後唐矣後唐廢帝從珂與璽俱焚繼之者石晉晉出帝重貴降遼太宗德光德光以其所獻璽非真詰之重貴對以昔璽既焚今璽先帝所為羣臣共知蓋自有秦璽以來其間得喪存毁真偽之故難盡究詰而至於重貴降遼之日秦璽之燬于火也已灼然著于人人口耳自是以後有天下者不託以為言矣哲宗蔡京乃能復得之於咸陽豈堅之所瘞藏至此而始出乎非也是又作天書之故智也天書號年為祥符秦璽號年為元符既紹述其乃考神宗之法又紹述其乃髙考真宗之符不亦異哉堯舜禹之傳國其言著於書曰惟精惟一允執厥中言為國之道也秦始皇之傳國其言著於璽曰受命于天既夀永昌言享國之福也志於其道者福從之志於其福者福未必從之假令哲宗所得信為秦璽而其短世絶傳何有于受天命而夀昌哉信元后所謂亡國不祥璽哉其後徽宗以哲宗所得者為未足而復製二璽其一龜紐六寸其文曰承天福延萬億永無極謂之鎮國寶其一于闐玉大二寸許文曰範圍天地幽贊神明保合太和萬夀無疆謂之定命寶與哲宗所得曰受命寶者為三已而悉為金人所俘以去前此金人以遼取石晉意其得秦璽於獲遼主延禧之日責而徵之延禧訴以兵敗失于桑乾河及既得宋自謂愜所欲而義宗守緒死于蔡州幽蘭軒又為煨燼然則哲宗之所得縱使真為秦璽元人亦不得取之矣詭妄之臣乃猶以之藉口欺世基禍黷武亦獨何哉詩曰投畀豺虎豺虎不食投畀有北有北不受投畀有昊言歸諸天庶幾禍端永絶也其亦無如之何而為此言哉其此璽之謂哉古禮尚右辨童軒古禮尚右厯上下二千餘年莫有覺其非者至我朝始以左為尚蓋順天之經地之位也何則日月行度二十八宿經天莫不左旋地之方位先東而後西先南而後北是皆以左為先胡人道獨右尚乎嘗考之書甘誓左不攻于左汝不恭命右不攻于右汝不恭命太甲左右惟其人説命王置諸其左右詩關雎左右流之左右采之左右芼之文王在帝左右棫朴左右趣之常武左右陳行有客左右綏之裳左之左之君子宜之右之右之君子有之是三代之時一皆以左右為序固自若也奈何春秋戰國而下禮俗壞亂上下陵逼始有以右而尚左者果禮耶按曲禮凡與客入者每門讓於客客入門而右主人入門而左此尚右也獻粟者執右契疏謂右者先書為尊射禮曰若右勝則曰右賢于左若左勝則曰左賢于右先言右後言左此尚右也詩葛屨宛然左避傳謂讓而避者必左彤弓鐘鼓既設一朝右之我將維天其右之又曰既右享之時邁實右序有周此尚右也彤弓皆昭王以後之詩故云左傳襄十年王叔陳生伯輿爭政王右伯輿晉士丐曰天子所右寡君亦右之此尚右也大學曰所惡於右毋以交於左所惡於左毋以交於右先言右後言左此尚右也趙史載藺相如請秦王擊缶之事趙王歸以相如為上卿在亷頗右頗曰吾為趙將有攻城野戰之功相如徒以口舌居吾上吾羞為之下此亦尚右明矣秦紀發閭左戍漁陽九百人蓋當時以富強為右貧弱為左也又漢書孝惠帝五年以王陵為右丞相以陳平為左丞相孝文帝元年以陳平為右丞相周勃為左丞相俱以右居左上又文帝時田叔等十人隨趙王至長安上召與語廷臣無出其右者遂拜為守晉史吳士拜元帝於道左亦皆以右居左上自是厯代相沿至元世祖以安圖為右丞相位在百官之上未嘗改也故稱治道者曰稽古右文稱氏族者曰名門右族謂非正之術曰左道謫官曰左遷不適事宜曰左計莫不以右為上以左為下惟禮記國君升車居左御者居中勇士居右蓋勇士主執兵便於擊刺非尚左也嗟乎先王制禮男子生而設弧於門左女子生而設帨於門右是謂女不可以先男右不可尚左此天之經地之位也可萬世行之而無弊也或概謂古今禮皆尚右豈其然乎談命辨童軒或有問於余曰談命之術果有之乎余曰命在有無之間非術數之所能知也何以明之語不云乎道之將行也與命也又曰死生有命富貴在天孟子曰莫之為而為者天也莫之致而至者命也得之有命如此之類不一而足此皆所謂有也唐吕才有云長平坑卒未應同犯三刑南陽貴臣何必俱當六合本朝宋太史景濂曰天下之廣兆民之衆一日之內未必止生一十二人然而同時生者不少何吉凶之不同哉此皆所謂無也曰然則厯代有以術數鳴者如司馬季主李虛中珞琭子徐子平者彼皆妄與曰豫有明徵焉本朝揚州人髙公穀與松江人李昂者甲子同物也公以永樂辛卯中應天府鄉試第九十五名未上春官丁外艱李昂是年落第後甲午亦中應天府鄉試第九十五名既而乙未同中會試髙公第五十四名李昂第五十六名廷試俱三甲進士髙公選入翰林為庶吉士除中書升侍讀學士李昂觀政刑部除主事升郎中品級崇卑亦頗相等無何昂死矣時年四十有餘後髙公官至少保年八十二始卒昂死之日有子五人髙公至七十餘始舉一子今為南京戶部貟外郎此非術數之所能知也豫又得二人焉泰和單昂與金溪王稽俱江西人而甲子亦同物也二人癸酉皆舉鄉試甲戌俱第進士同日送大理觀政同日除評事後單昂奉命讞刑閩中事竣死於途王稽是年亦遘重疾不死尋除僉河南按察司事又數年致仕今尚在齒且老矣此非術數之所能知也由是觀之謂命為無四人者始焉何同也謂命為有四人者終焉何不同也此命所以在有無之間也然豫又嘗考四人者之行矣李昂為人心險而多詐好以智術籠人其居刑官出入重輕必有悖乎天理者况其身死之日田園布野金帛盈室則其行有可知矣此其所以夭也髙公居翰林存心正大非賢不交非義不取聞有階宦官以進用者則囓齒罵曰此真穿窬輩也又嘗見其所刻詞翰印章有曰以清白遺後人則其行亦可知矣此其所以夀也單昂王稽人品不大相逺苐單昂讞刑閩中時人謂其行囊大有所獲是其刑罰出入必有不訖於當以欺心者此其所以夭也王稽雖無大獲亦無大繆之事此其所以夀也故即四人論之由前則謂之有由後則謂之無此命所以在有無之間也或又曰所謂命者富貴貧賤得喪通塞俱一定而不可易是也今若子之言則是命者有時而不定矣然子言亦有所本乎曰有文中子曰召之在前命之在後余又嘗與一術士談及四位皆同之命余問後來不同何耶術士曰地有南北故耳余因舉髙李皆南直𨽻人單王皆江西人問之術士曰雖生居一鄉一里間亦有南北矧王畿千里與一省乎余又問人家有嬲生二子同出一母此不可以南北分也然亦有貧富夀夭不同何耶術士曰往往為先生者奪其元氣故先生者冨後生者貧先生者夀後生者夭又當以此論也余曰周有八士四乳八子皆賢此又何耶術士語塞因併録之辨周子太極無極圖出周易列子童軒周子無極太極圖其原蓋出周易列子雖文公鵝湖往復之辨吳草廬論數千百言皆不言其所本以為無極者無形之理太極者至大之理是固然矣不知果能外於周易列子之旨乎易曰乾道成男坤道成女又曰易有太極是生兩儀兩儀生四象四象生八卦乂曰天地絪緼萬物化醇男女構精萬物化生今圖曰此所謂無極而太極也又曰五行一隂一陽太極也又曰乾男坤女男女一太極也萬物化生萬物一太極也又曰易有太極如此者謂非本於周易可乎列子有曰昔者聖人因隂陽以統天地夫有形者生于無形又曰天地含精萬物化生太極含天地者亦如天地含萬物也含萬物也故不窮含天地也故無極今圖曰太極本無極上天之載無聲無臭也又曰乾男坤女以氣化者言也萬物化生以形化者言也如此者謂非原于列子可乎由是觀之是知圖之太極者即周易所謂太極也圖之所謂無極者非列子所謂無極乎先儒謂周子不階師承默悟道體蓋有悟於此耳宋太祖太宗授受辨程敏政太祖太宗授受之際所以致後世之疑者誰乎曰李燾刪潤湘山野録而啓之陳桱附會洓水紀聞而成之不深考者以為實然爾夫燾之所以啓之者何也曰燾為長編以太祖顧命實録正史不載而刪潤野録之事載其下初意本以備闕文然野録謂太祖太宗對飲燭影下時見太宗有不可勝之狀而燾改不可勝為避遜太祖下階戳雪顧太宗曰好做好做而燾改戳雪為戳地好做為好為之又加大聲二字野録出于僧文瑩之傳聞固不足據就其中考之如所載太宗慟引羣臣環瞻聖體玉色瑩然等語則亦初無毫髮可疑之隙而燾略加刪潤遂不免有畫蛇添足之病夫燾既刪潤之為正文矣而又細辨其非者何也曰實録正史皆謂太祖有病命內侍就建隆觀設醮而野録以為無疾方且登閣望氣下階戳地紀聞謂癸丑帝崩王繼恩始召晉王入宫而野録以為太祖壬子夜召晉王屬以後事遂宿禁中故燾反覆致詰於太祖之病否太宗之出入時日之先後本以為刪潤之地而不自知其刪潤之語未瑩反以啓後世之疑也夫桱之所以成之者何也曰桱止據燾之所刪潤者書之又於好為之下妄以已意添俄而帝崩四字復以宋后母子託命之語繫之則遂駭人之聽聞矣母子託命之語本為王繼恩召德芳而發出于癸丑帝崩之後而桱以屬之壬子且并去召德芳之事而獨存此語則是不知紀聞野録兩書之文本相抵牾強合於一其附會比燾之刪潤抑又甚焉近世保齋宋論復指桱所書者以為太祖事之首尾不過如此則其不考又出桱下矣然則宋后召德芳之事信乎曰正史實録載之紀聞又出溫公事當不妄燾并疑德芳非宋后之子則過矣德芳在當時年最少育于宋后或為所鍾愛皆不可知但事出于兩人所記而不同者當視其人溫公可據之人也溫公可據而文瑩可黜召德芳之事有則留宿之事無矣或乃謂燾之刪潤蓋有意著太宗之惡姑引野録以藉口而又自破其説以避禍則臆度之太過亦恐李燾復生不肯自當爾史稱燾博極羣書其為長編專務廣采擇焉不精殆有所不免也若曰太宗子孫繼立故人無敢言者然南渡孝宗以後其事當無所諱亦無一人言之者何也借曰髙孝授受之懿可以蓋前人之愆故其迹泯然元史成于歐陽玄諸公當無復有所諱又無一語及之蓋必有定論矣不然此何等大事而不加之意哉或曰太宗於太祖崩不踰年改元宋后崩不成服廷美德昭不得其死皆足以追證燭影之疑是又不深考之故也不踰年改元五代常事宋乃太祖第三后長編謂其崩太宗設次發哀羣臣奉慰以后初立未嘗降詔故喪儀多所貶損百官不成服固當時禮官之過也就使因召德芳而銜之則其事亦在太祖崩後矣廷美之死趙普為之太宗固有不得辭其責者至於德昭之死非出於幽囚躪逼之舉長編謂太宗育其子惟吉於禁中日侍中食凡八年始出閣詔邸第供億悉與親王埒諸王子不得偕也况德昭因他人行賞一言之憤不惜一死乃忍其父為人所戕而噤不出一語哉就使不踰年改元宋后崩不成服德昭之死皆出太宗則亦未可以後來之不善而遂逆探其有今將之心加之以無名之罪也胡一桂楊維禎梁寅之流鋭欲以篡弒加之恐皆以不見李燾全書之故正猶獄官不據人原發之案而深文巧詆鈎致其罪偶有刻吏見而喜之又從而和之此太宗之事所以不能自解於今日也或曰太祖既欲傳弟何不使太宗正太弟之名考之九朝通略謂唐天祐以後建儲之禮不復講行至太宗立真宗方知討論故事又五代凡當次者多領開封尹故太宗廷美相繼為之則知太祖亦承唐末五代之習兼以年嵗之未邁耳是或將有待焉而遽自意其死乎夫傳疑史法也茍無疑可存則亦何必托拾小説強為之辭以滋後世無窮之惑此燾桱之罪也或又引宋朝類要載陳摶對太祖火日之説終有可疑是不知摶於太宗初入朝終身未嘗見太祖其説蓋不攻而破矣夫千載不決之論其可懸斷者理與事爾以事言之不過如此以理言之凡古之篡弒者多出深仇急變大不得已之謀又必假手他人然後如志未有親自操刃為萬一僥幸之圖于大內者觀太祖於太宗如灼艾分痛與夫龍行虎步之語始終無纎芥之隙太宗何苦而為此舍從容得位之樂而自處於危亡立至之地病狂喪心者且不肯為凶殘絶世者所不忍為而謂太宗為之斷乎其不可信矣矧類要野録皆託於佛老之徒之口縱使有之亦儒者所不道而况於無乎余之所篤信者溫公紀聞之外一無取焉爾余初為此辨以告同館之士然猶以考據未的且不能盡諸説異同之故因别為宋紀受終考三卷藏於家春王正月辨王鏊春秋書春王正月左氏曰周正月也建子非春而以為春為胡安國之學者曰以夏時冠周正書王正月存周之正冠以春示行夏之時之義也是為改月不改時夫改月不改時時則夏也月則周也上下不相值寒暑不相蒙下之所系將安從從夏乎從周乎聖人書法不當如是之悖也為蔡九峰之學者曰商書所謂正朔者以是月為嵗首朝會聘問頒厯授時於是始焉耳時不改月亦無改也詩言七月流火六月徂暑周禮正月始和吕覽月令中星皆與夏正合前乎商之建丑也其書即位曰元祀十有二月後乎秦之建亥也其書始建國曰元年冬十月曷嘗改乎是説也於經史合矣其如春秋之所書何桓八年冬十月雨雪僖十年冬大雨雪桓十四年春正月無氷成元年二月無氷莊七年秋無麥苖定元年冬十月隕霜殺殺則何以為異而書之左傳僖五年正月日南至禮記孟獻子曰正月日至可以有事於上帝七月日至可以有事於祖又將何以通之且時月既不改矣孔子告顔回何必曰行夏之時賈誼於文帝時何必請改正朔乎為孔安國鄭康成之學者曰商周之正朔非獨改月時亦改也後漢陳寵傳冬至陽氣始萌天以為正周以為春十二月陽氣上通地以為正殷以為春十三月陽氣已至人以為正夏以為春三微成著以成三統是説也於春秋所書合矣其如諸經有不合且天時人事有不便乎曰惟其不便故孔子不取不然何獨取夏時哉是其説之不一儒者苦之以為千古不決之論愚嘗反覆求之而得其説夫商周有天下改正朔易服色殊徽號以新天下之耳目也安有不改月可改時獨不可改乎夫春夏秋冬之名安始哉亦聖人始名之建子之月一陽所始獨不可為春乎午未之月隂氣所始獨不可為秋乎冬夏亦然商周既以是新天下之耳目而天下習於夏正已久且天時人事為順故行之官府則從時王之制民間所行猶多從夏春秋所書朝廷之正也諸經所載或因民間之舊乎汲冢周書云亦越我周王致伐于商改械以垂三統至於敬授民時巡狩蒸享猶自夏焉且周禮有正月又有正嵗周時二正實兼行之矣何獨民間哉曰是義也曷從受之曰受之孔子春王正月孔子之所書行夏之時孔子所以告顔子也春王正月辨鄒德溥春王正月之辨無慮十數家而總其説有五則愚請先折四説者之非乃後證其定説焉或謂周人雖以建子為嵗首然而不改時與月也魯史曰冬十一月夫子更而曰春正月也或謂周人改月不改時也魯史曰冬正月夫子更而曰春正月也此二説者以為此夫子所以示行夏時意也夫子固曰我從周又曰非天子不議禮不制度豈其以匹夫而改天子之正朔乎夫子患天下諸侯大夫之無王也而作春秋而已則首改天子之正朔其何以服天下且如其説則是周人猶以寅為春而夫子直以子為春是易夏時者自夫子始也又惡在其示行夏時意也此愚之所未解也或謂周雖以建子為嵗首而不改時月夫子所紀春正月蓋建寅也必若是説則夫子胡不係元年於冬十一月之上乃每嵗輒截子丑兩月而屬之前年乎若曰周人紀年仍自建寅始又惡在其改正朔也此又愚之所未解也或曰自古未嘗改正朔其曰商建丑周建子者後儒附會之説也必若是説則百代一時也夫子何以曰行夏之時即如輅也冕也樂也厯代各異夫子較而酌其可行者奈何獨以百代不易之時而係之夏乎且考之經史諸書周正與夏正兩者互著苟自古無改正朔之説何以得有周月而秦人又何緣而以建亥為首騶衍五德劉歆三統彼亦豈能舉千古未有之事而鑿空造論乎此又愚之所未解也然則其説云何則愚直斷以為周人固自改之矣漢書律厯志周正月辛卯朔合辰在斗前一度戊午師渡孟津明日己未冬至而外傳伶州鳩復載武王伐殷之日嵗在鶉火月在天駟日在析木之津其為建子月明矣而書稱十有三年春大會于孟津又稱惟一月壬辰旁死魄戌午師逾孟津則周人之以建子為春正月可證也左傳僖五年正月日南至雜記孟獻子曰正月日至可以有事于上帝七月日至可以有事于祖七月之禘獻子為之也冬至之為子月也必矣夏至之為午月也必矣然而稱曰正月七月則周人之以建子為正月可證也而明堂位又稱魯君孟春祀帝于郊配以后稷季夏六月以禘禮祀周公于太廟夫既曰七月之禘獻子為之則必以正月之郊為故典矣而魯郊稱孟春焉則周人之以建子為春可證也周禮州長正月屬民讀法正歲讀法如初言初則正月居先可知如以寅為正月又安所更得正嵗乎則周人之以建子為正月可證也夏令曰九月除道十月成梁而孟子曰十一月徒杠成十二月輿梁成則周之所謂十二月者蓋夏之十月也則周人之以建子為正月可證也詩豳風十月蟋蟀入我床下即繼之曰曰為改嵗唐風蟋蟀在堂乃十月之候而曰嵗聿云暮則周人之以建子為嵗首可證也春秋桓十四年春正月無氷成元年春二月無氷襄二十八年春無氷莊七年秋大水無麥苖定元年冬十月隕霜殺菽若曰以建寅為正乎則寅卯之月之無氷也亥月之隕霜也惡在其為異也而紀之而申酉之月尚安有所謂麥苖乎則春秋所書春正月之為建子又可證也難者曰冬之不可以為春至著也豈謂武周大聖而顧錯繆至此哉曰謂冬之不可以為春此自後人習用夏時之久而執之云爾也在書甘誓曰有扈氏威侮五行怠棄三正三正之所從來舊矣非周獨創之也且陽生於子而極於已午隂生於午而極於亥子自一陽之復而極於六陽之乾而為春夏自一隂之姤以極於六隂之坤而為秋冬何為而不可大抵周之正也本於陽氣之始萌而名之也因天者也商之正也本於陽氣之上通而名之也因地者也夏之正也本乎陽氣之已至而名之也因人者也而時以作事則因人要矣故夫子取夏時焉奈何其必武周之不以子為春也曰豳風流火之陳小雅徂暑之嘆二月載離之歌暮春來牟之頌此周詩也而舉夏時者何也中春始蠶之詔季冬斬氷之令此周禮也而舉夏時者又何也曰汲冢周書不云乎亦越我周王致伐于商改正異械以垂三統至于敬授民時巡狩蒸享猶自夏焉故周禮有正月又有正嵗則周人誠改正朔而夏正固未嘗廢也當時行之官府一遵時王之制若春秋所載是已而民間猶或襲稱夏正故詩若禮時時雜舉則議論之書與紀載之書異也執是而必周之不改正朔固矣曰商書始即位曰惟元祀十有二月則月不易也秦書始建國曰元年冬十月則時不易也豈獨周而易之曰聖人創制立法各自有度夫安能執商之不易而必諸周乎若亥月之陽氣未至其不可以春固也與周正異矣且子據十有二月之係于元祀也而必商之不易據冬十月之係于元年也而必秦之不易豫獨奈何不得據春王正月之係于元年也而必周之易哉蓋武王可得而與天下改正朔者也君道也夫子不可得而與天下改正朔者也臣道也愚怪夫世之敢以改正朔屬夫子而不敢以改正朔屬武王也於是乎為之辨春王正月辨鄧宗齡聖人之言無異也而何人之過求聖人如此其多岐也何也聖人之心有為議道法而言者有為紀國事而言者議法者欲其詳故揆古以酌今紀事者欲其實故不敢創一字不敢易一言遵國典也為下不倍之義也春秋者夫子所以尊王道昭國法誅姦雄警僭竊慮至逺也非孔氏之書而魯國之史也為魯之史則當遵周之正奈何以論道之書而並觀之也故凡春正月者史之舊文也加王於上者孔子筆也若曰王道寖微羣雄日熾吾假是以扶人紀遵時制則意念深矣非謂其必改周正而行夏時也乃儒者求其説而不得則曰周人不改時與月者曰改時不改月者曰改時與月者為不改時與月之説者自蔡九峯氏始彼蓋以七月流火莫春來牟孰非周詩乎而何其皆夏正也不知列國歌詠異詞未可以概論也為改時不改月之説者自程伊川始彼蓋以從夏尊天從周尊王不為兩得乎不知於夏為反古於周為倍時非所以示訓也為改時與月之説者自左氏始彼蓋去古為稍近而於理為近正也吾何以知之請證以春秋而旁及於諸書可乎春秋桓公八年冬十月雨雪十四年春正月無氷成元年春二月無氷襄公二十八年春無氷莊七年秋無麥苖定元年冬十月隕霜殺菽使其夏正則冬而雨雪春無氷秋無麥苖冬霜殺菽宜也而春秋何以書以其為周時周月也此一證也書泰誓十有三年春大會于孟津武成惟一月壬辰旁死魄戊午師逾孟津使皆以寅月為嵗首則泰誓武成又何以書以其為周時周月也是又一證也左傳僖五年正月日南至為其以周時周月也是又一證也諸如此類不可勝舉而議者徒執大傳之帝出乎震齊乎巽相見乎離以為詞不知文王在商而象易夫子在周而繫易固明道之書非記事之史也况自一陽之復以極于六陽之乾而為春夏自一隂之姤以極于六隂之坤而為秋冬王文成嘗備述之矣而胡見其為異也大抵天下之事出於耳目所睹記者猶紛紛迄無定論而况據其簡策追究千載之上能一一而符合之乎所可信者惟此心此理而已况典籍所載有一卷之中而前後異論者有一人之言而始終異旨者又何可勝數也如必盡舉而詰之則彼甲此乙百喙無當也茍直以理斷之則未有不可信者茍舍正理而取信於諸書是惑也援諸書以證而強為之解者亦惑也世儒求其説而不得而曰以夏時冠周月是夫子作春秋以警僣竊而顧變易天朝之正朔僣孰大焉則惑之甚也或曰必如周將必寒暑乖異分至啓閉自相悖戻何以成嵗功哉然杜元凱汪克寬諸人皆號稱厯理一則依周正以作長厯一則以唐厯遡之日月星辰無一不合其厯厯可考也如此且周禮所載雖皆周正然有正月又有正歲者何也正月者周正也正嵗者夏正也意其並用乎先儒又云朔改正者獨於是月行朝覲會同者頒朔授時耳時月無易也不知三王之禮樂政事代自為損益而何獨一正朔乎且既已行朝覲會同頒厯授時矣烏得謂之不改也正朔既不改則周已行夏時矣孔子又何以云行夏時也吾是以決周之改時與月而孔子從之也所謂不改月與時與改月而不改時者愚未敢以為然也明文海卷一百十一
