body:
  text: 明文海巻一百十二餘姚黄宗羲編辨三辨通鑑綱目書漢亡何喬新炎興元年十一月魏鄧艾至成都帝出降皇子北地王諶死之漢亡尹起莘曰書漢亡者以見漢之自亡非艾輩所能滅之也君子曰尹氏之説非也子朱子之作綱目上下千餘年其紀亡國多矣未有書某國亡者獨於此書漢亡乃綱目之特筆也昭烈帝室之胄也忿奸臣竊命漢鼎將移志欲芟刈羣兇以復髙光之大業不幸天命已去力挽不囘及曹丕簒位乃即位武擔之南噓炎燼於已熄宣烈祖之重光其名甚正而其義至宏也自陳夀諂晉其作三國志尊曹而抑劉於昭烈父子不稱漢而稱蜀盖絶之於漢也司馬氏因之遂以黄初之年接建安之紀盖謂漢已亡矣子朱子之意則以為一脉尚存不可謂之亡昭烈父子建號隴蜀祀漢配天者四十有五年是漢未亡也及鄧艾兵至成都帝禪不用皇子諶之言而用譙周之計于是赤帝不祀而漢統絶矣故特書漢亡非亡于奉帝為山陽公之日乃亡于鄧艾至成都之時也尹氏求其説不得從而為之辭是惡足以知大賢筆削之㫖哉陳子桱之續通鑑綱目其知此㫖乎故崕山之破特書宋亡盖以巴延入臨安宋猶未亡也及帝昺蹈海宋始亡矣由是觀之陳夀書丞相亮討賊之師為入冦姚燧詆陸秀夫之属為逋播者真名教之罪人也黑水辨李元陽禹貢黑水西河惟雍州華陽黑水惟梁州又曰禹導黒水至于三危入于南海傳論紛紛或謂其源出某山流逕某地或謂跨河而南流或疑其世逺而湮涸或謂三危在今麗江或謂竄三苗不應復在南蠻之地此皆出於臆度不足為據愚之所據知有經文而巳夫黑水之源固不可㝷而入海之水則可數也夫隴蜀無入南海之水惟今滇之䦨倉江潞江二水皆由土番西北来盖與雍州相連但不知果出張掖地否水勢並汹湧皆入南海是豈所謂黑水者乎然潞江西南趨蜿蜒緬中内外皆蠻其於梁州之境若不相屬惟闌倉江由西北迤邐向東南徘徊雲南郡縣之界至交趾入海今水内皆為漢人水外即為緬人則禹之所𨗳于分别梁州界者惟䦨倉江足以當之孟津之會曰髳人濮人以今考之皆在闌倉江内則䦨倉江之為黑水無疑矣地里志謂南中山曰昆彌水曰洛山海經曰泔水西流入于洛故闌倉江又名洛水言脉絡分明也元史至元八年大理勸農官張立道使交趾並黑水跨雲南以至其國觀此則䦨倉江之為黑水益彰彰明矣若三危山即不在麗江當亦不逺古今山川之名因革不可紀極夫不可移者山川之蹟也隨時異稱者山川之名也不據不可移之蹟而據易變之名亦末矣大都為論傳者未嘗知三省地形但謂隴在蜀之北蜀在滇之東北而禹貢言黑水為梁雍二州之界又入南海故不得不疑其跨河知跨河非理又不得不疑其湮涸曽不知隴蜀滇三省鼎足而立隴則西南斜長入蜀滇則西北斜長入隴蜀則尖長入滇隴之間正如三足旛然黑水之源正在旛頭故雍以黑水為西界對西河而言也梁以黑水為南界對華陽而言也葢各舉兩端若曰西河在雍東黑水在雍西華山在梁北黑水在梁南云爾故梁州可移而華陽黑水之梁不可移也楊墨辨何炯甚矣老氏之害道也百家之學實宗老氏自其有老氏也而後有楊墨也自其有老氏也而後有申韓也申韓求老氏之説而不得得其所以輕天下齊萬物之術是以敢為刑名而不疑楊朱墨翟求老氏之説而不得各得其虛無淡泊之偏而遂倡其猖狂浮游之論是以流為為我兼愛而不悟太史公曰申子卑卑施於名實韓子引繩墨切事情其極慘礉少恩皆原于道徳之意夫道徳刑名之歸相去逺矣茍知刑名之原于道徳而道徳之為刑名也則其為我兼愛又何惑于老氏云今夫天下之人有以君臣父子之親而不相顧者舉皆歸楊而道塗之人皆可以為父子兄弟者舉皆歸于墨也而老氏不為為我不為兼愛獨其于君臣父子之間汎汎乎若萍浮于江湖而適相值也夫是以父不足愛君不足忠不忠其君則不復致其身不愛其父則不復竭其力此其勢之所必至者特以老氏之道辨之而無所窮攻之而無所間也故常以翕張取予之術玩弄天下而天下之人卒莫辨其所歸此其所以為異端之尤惑人與老氏之道有三曰慈曰儉曰不敢為天下先墨子得其慈與儉故其學主于兼愛其言曰慈故能勇儉故廣摩頂放踵有所不愛不亦勇乎墨子思以易天下也不亦廣乎然而反天下之心而天下不堪縱彼能任奈天下何哉楊子得其不敢為天下先故其學主于為我其言曰不敢為天下先故能成器長拔一毛而不以利天下則天下之故不以傷其身不亦長乎然而吾不以一毛利人人亦不以一毛利吾也雖欲久長不可得矣嗟乎何楊墨之不善學老氏也老氏者無所是無所非而卒歸于無有故其縱横堅固而不可破而楊墨者是其所是非其所非故為我者為兼愛之所詆兼愛者為為我之所議其説有時而遂窮噫何老氏之譎而楊墨之愚也老氏以其全而兼二子之偏二子以其偏而失老子之全然則老子之不以利器示人類如此而二子者猶不免於悲絲泣岐之迷與嘗謂老氏之有楊墨猶吾夫子之有顔曽顔曽各得聖人之一體而不害其為聖人楊墨各得老氏之一偏而遂别為楊墨盖聖人之道雖一言一行皆可以成其身而老氏之術則捭闔變化反覆百端不得其術不可以相用雖然楊子有言矣生相憐也死相捐也相憐之道勤能使佚飢能使飽寒能使溫窮能使達也相捐之道不含珠玉不服文飾不陳犧牲不設明噐也此其摩頂放踵以薄治喪之遺意與墨子貴儉貴儉則不能兼愛不能兼愛則不得不復於為我故曰逃墨必歸楊其此之謂也世謂楊墨之學不相為用也又謂楊宗老氏墨宗大禹故吾有是辨也以自附於太史公申韓之議阡陌辨失名商鞅壊井田開阡陌而經界壊解之曰凡田南北曰阡東西曰陌其義非也盖古者聖人計口授田編户齊等八口之家無過百畆使人廬井有伍勞逸調平冨者不敢僣差貧者無所企慕况乎涇渭豐鎬之間周家肇迹厯世營之其為溝塗封植尤為嚴整故其民盡力畎畝其所入有分下無餘貲而上亦不得多取秦既承之隳圮成法尚功力鬬惟利之趨尊奨兼并之人以倡豪武而商鞅復開阡陌之禁受田者不復以計口為限故阡之義千也陌之義百也或規千畝而為阡或規百畝而為陌各從其便而購易之溝塗縦横割畫自任於是巧猾之萌肆無品制上户累鉅億之鏹占業侔封君之土行苞苴以干宫陛養劍客以威黎首而人主方貪其賄潤殊禮寵之若烏氏以牧豎比諸侯嫠清以攻丹稱國賔至于下户踦􅛤無所峙足乃父子蓬首奴事富豪躬率妻奴為之服役故雄擅者席餘而日熾单陋者躡短而嵗促當其時秦家雖計效目前収旦夕富强之利而黎民惋憤無復安堵之思易于倡亂此阡陌之開為之禍本也如直以東西南北為界而云盡壊其溝塗封植之舊以為田號為地無餘力則脱有水旱胡以恤之是自斃也雖至愚者不為而商鞅欲以富强其君必不然矣雜辨三首顧璘或問曰鬼神隂陽之氣也烏乎靈顧子曰氣之所聚精必歸焉精也者宰萬物而善應者也故山川土木風霆雨雹之應通乎人道矣又問曰雖精亦氣也烏乎能靈曰人之生固二氣之聚也血肉凝而為心淵然中處精者居焉故具衆理應萬事其神廣矣及其死也則精者散焉復為槁木也已謂鬼神為氣而勿靈亦将謂人心為血肉而弗靈也可乎是故氣聚必有精精斯靈矣靈則無不宰也雖聖人復起不易吾言矣世嘗稱士大夫通塞曰命豈不信然哉抑余嘗為知道者言人生有命一通一塞而已若國家之興亡則一時人士所概禍福焉不可以人人徵也漢髙之興吹簫屠狗販繒之徒悉位卿相豈其五行皆當拔興之數哉故太史公曰髙祖功臣之興時如此云盖究此義也及其亡也黨錮之禍遍天下非必諸君亦㑹其凶度若是同也盖國運繫之矣國之将興福逮乎天下焉國之將亡禍逮乎天下焉大舉小從天之道也譬諸火炎都邑斯都邑災也而欲切切焉户推其厄豈不泥甚矣哉聼者然吾言或問湘山浮屠之中有唐僧真骸至于今存盖數百年矣土人祀禱輒應若是其神乎顧子曰人之身猶木也生則氣附死則氣離氣且離矣靈將安附夫楩楠杞梓其伐也能使材充棟梁備器用而已顧安能使其枝葉扶踈而上出乎彼人者今亦槁木而已人固嚴之而謂其有靈者愚也或又曰禱而應何哉曰子不視其所託乎山川之靈是謂鬼神四海五嶽是已湘山之南粤興雲雨蕃草木育禽獸百物成化萬民歸心化之所成是謂神靈心之所歸是謂感應彼託而居之其智固逺而南方之人無賢不肖嘵嘵然舉造化之情而歸之槁骸豈非大惑矣乎今夫聚土木之像而禱祀應者精發乎其人也夫既有若湘山者雖無若人居之吾固知其靈矣又問曰其體之不壊何也曰若今之皮革然率不信宿而壊者也茍法存而噐藏可厯數十百嵗無壊曰其始能自存之何也曰彼道也聖人所不語吾烏乎聞五行辨王廷相禹貢言六府洪範言五行其義一也謂此五者流行于天地之中切于民用不可一日而缺治天下國家其政所宜先者如溝隧灌溉水政也昆虫未蟄不以火田鑚燧改火火政也井田疆理土政也鼔鑄陶冶金政也仲冬斬陽木仲夏斬隂木木政也水土平而後五行之政修五行之政脩而後庶政可舉是五行者王政之根本不然則民用有缺民用既缺則民生不遂雖有庶政安得順而施之古之聖人其論五行之義如此而已自夫聖王之政衰而異端之術起始有以五行分配十二支于四時者矣始有以五行配五臟六腑者矣始有以五行名星緯者矣始有以五行論造化人物者矣斯皆假合傅㑹迷亂至道遂使後之儒者援緯附經擬議造化其隨聲附和者浸淫為怪誕之談而不知其非嗟乎後世所以囂囂也且夫水火土天地之大化也金木者三物之所自生與人物所同出者也安可與之相配地闢矣人物即生之金石之質必積乆而後結吾恐其生之必後於人物矣謂金之氣生人得乎哉且夫天地之間無非氣之所為者其性其種已各具于太始之先矣金有金之種木有木之種人有人之種物有物之種各各完具不相假借五行家曰人一身具五行故曰五行生人嘗觀于木矣津液血水也鑚燧氣火也皮之柔肉土也心之堅骨金也又何異于人哉然則謂人生木不亦可乎此義也惟張子正䝉乃獨得之其曰陽陷于隂為水附于隂為火木金者土之華實也其性有水火之襍故木水漬則生火然而不離盖得土之浮華于水火之交也金得火之精于火之燥得水之精于水之濡故水火相持而不害爍之反流而不耗盖得土之精實于水火之際也由是觀之金木者豈非水火土之所生乎然則周子五氣順布四時行焉非與曰此惑于五行家之説而為言也何以言日有進退乃成寒暑寒暑平分乃成四時于五氣之布何與焉其曰春木夏火秋金冬水皆假合之論土無歸配于四季其謬妄尤甚焉何也土之氣在天地之内何日不然何處不有何止流行于季月何季月之晦尚存而孟月之朔即滅其滅也歸于何所其来也孰為命之聖人精義之學決不如是然則天一生水之説何如曰此緯書之辭而儒者援以入經也何以言之水火者隂陽始化之妙物也故一化而為火日是也再化而為水雨露是也今曰天一生水地二生火戾於造化本然之妙可乎夫有地即有土矣何至天五方言生土若曰天地以造化言尚未有土矣則天三生木地四生金將附於何所乎其牴牾不合又如此朱子曰五行之序木為之始水為之終而土為之中何如曰此以四時流行之氣論五行也又曰水一木三土五皆陽之生數火二金四皆隂之生數何如曰此以天地竒耦之數論五行也又曰天地生物先清輕以及重濁水火二物在五行最為清輕金木次之土最重濁此論何如曰此出太極圖所謂陽變隂合而生水火木金土也前二説出緯書假合之論後説雖出周子俱非造化本然之序矣且夫天地之初惟有隂陽二氣而已陽則化火隂則化水水之渣滓便結成地渣滓成地即土也金木乃土中所生五行本然先後之序如此後之學者乃不於是而求之怪怪然惟五行家自信亦何不思之甚哉或又曰五行以氣言非論其質也曰吾已言之矣天地之先氣種各具于元氣不獨五行而已也泰伯三以天下讓辨王漸逵予按仁山金氏謂太王遷岐乃在商小乙之世值髙宗之中興者六十年厯祖庚祖甲祖甲二十八年而生文王是太王當商之盛時未見其衰也胡為有翦商之志哉况太王前日能遷國以避狄人於相侵之時而今日乃欲取商於未亂之日太王之心必不如是之悖也而集註謂太王有翦商之志而泰伯不從則失之誣矣又謂不從之説見于春秋傳及觀吳越春秋則曰季厯娶太任生子昌古公知昌聖欲傳國以及昌泰伯仲雍知之乃託採藥逃之荆蠻古公將卒季厯讓國于泰伯泰伯三讓弗受古公卒二人赴喪復逃之觀此亦未見其不從之事也而勿軒熊氏亦謂翦商乃魯頌夸詡之詞與書肇基王迹意同非真有也余因是而推焉自古聖賢皆得天地生物之心以為心所謂以天地萬物為一體者也堯舜但知天下之不可托于匪人也故不傳于子而傳于賢禹之不傳于益而傳啓知其子可托天下也太王之欲傳于季厯知其孫之可托天下也泰伯知而逃之知其猶子之可托天下也文王之舍伯邑考而立武王知其次子之可托天下也古之聖賢以天地之心為心故于其可托者而托之所謂以天下為一家惟盡吾萬物一體之念盖有天下非之後世非之而不顧者矣且夫古公不忍以土地之故而殺人則必不以匪人而殺天下可知矣集註又謂泰伯之心即夷齊叩馬之心益不然也太王當商之盛未嘗有翦商之心胡為而有以臣簒君之嫌哉後儒不知聖賢以天地萬物一體之心求其説而不得又從而為之辭使太王之心不得白于天下而泰伯之心亦不得白于天下而文王之心亦不得白于天下矣是故聖賢之心皆為天下也泰伯三讓之心亦為天下讓為斯民讓也至商周之間文武之道大被于天下天下隂受其賜而人莫知之故曰三以天下讓民無得而稱焉此所謂至徳也予又讀二程子之言益信之不疑明道曰泰伯知季厯之賢必能開基王業故為天下而讓之言其公也伊川云泰伯三以天下讓立文王則道被天下故泰伯以天下之故而讓之不必為革命之説乃知聖賢先得我心之所同然者陶潜書晋辨盧格綱目書晉處士陶潜卒潜字淵明侃之曽孫也自以先世為晉宰輔恥復屈身後代今按淵明自叙云長沙公於予為族祖同出大司馬陶舍昭穆既逺已為路人則侃與淵明分源五百餘年不知梁統何據而本傳稱為祖孫自後論淵明者皆本于此有謂其年書甲子者有謂其志似子房者雖多褒詞殊非據實要之淵明為人閑靖寡慾恬淡樂道初無舍己為人之意故其著於詩文和平深粹亦無怨尤迫切之詞天性自然不待勉强求之於古其所謂逸民者歟惟熟讀其詩文則得之矣詩亡辨盧格孟子曰王者之迹熄而詩亡詩亡然後春秋作集註曰王者迹熄謂平王東遷而政教號令不及于天下詩亡謂黍離降為國風而雅亡也愚按詩者風雅頌之總名非特言雅也亡者喪失之謂平王東遷雅不作爾非亡也黍離十篇本王國之風故列為王風非降也昔周盛時上至郊廟朝廷下至鄉黨里巷莫不有詩天子巡狩陳列國之詩而觀之以行黜陟之典此詩之所以盛也及幽王為犬戎所弑國都破滅而四詩俱亡矣四詩既亡則天下風俗政治無復可考此春秋所以作也或曰詩既亡矣三百十一篇何所本乎曰周自文武至于幽王三百餘年中間若成康之刑措宣王之中興外有千八百國陳詩詩之云多不可勝數今所存者二雅僅百十篇三頌僅四十篇二南二十五篇豳風七篇其他邶鄘而下俱春秋時詩疑魯樂官所藏或夫子採拾而得者故吾自衛反魯然後樂正雅頌各得其所若曰西周遺詩寧無西周國風厠其間也理恐未足繋之以詩詩曰周詩三百篇篇篇似珠玉雅頌共百五國風特百六二南正風首列國變風續小雅燕饗樂大雅朝㑹曲頌為宗廟歌盛徳被絲竹四詩未嘗亡孟氏云何讟昔周全盛時恩威被草木朝廷雅頌興閭巷風謠足幽王自不君犬戎肆荼毒宫廟變禾忝篇章盡溝瀆汲汲魯中叟憂世長痛哭國風千萬篇一散不可復幸有雅頌南家傳人誦讀并拾春秋風列為四詩目孰云忝離降王風本民俗中有淫奔詩豈與雅相属寄問鄒國公公喜云戩榖是非一朝明願爾繼芳躅揚雄熊過藝文志載劇秦羙新論稱門下中郎大夫臣揚雄上云爾按桓君山傳稱譚數從揚雄辨疑異今所著新論具在也然云雄作甘泉賦一首始成夢腸出収而内之明日遂卒與史文不同漢書永始四年正月成帝幸甘泉宫雄從幸還奏賦風之李善甘泉賦注連引而増其文曰乃卒然則漢書所載甘泉已後訛舛實多善豈非有證于論耶子雲識古文竒字而思深湛法言太𤣥淵奥竒澁故其體裁辭氣區别烏有所謂同功異曲者乎谷子雲最稱筆札兩子雲同時谷稱後谷子雲者永也豈大家續書采擷未精誤谷為揚乎初雄被薦待詔承明之庭庭在未央宫霍光傳太后駕幸未央宫承明殿罪狀昌邑王則其必嚴重矣按翼奉傳連言前殿曲臺漸臺溫室承明則承明當近前殿稍南解嘲云登金馬上玉堂按後漢輿服志盖黄門東有所鑄苑馬勢故曰金馬雄時待詔承明故得由金馬入宦者黄門之直上達玉堂翼奉傳曰奉待詔宦者署雄之給事黄門亦謂此也晉灼以黄屋非人臣所居因曰廬于門失猶未逺張晏以為直于石渠閣不亦逺乎石渠者本南引滄水下流轉北為渠閣在石渠之外祗役趨命勢相遼逺若其校書則石渠有蕭何圖籍在焉假使石渠有直盧之便乃舍之而校書于天禄閣則于情理亦有可疑天禄石渠二閣雖並在滄地水北於滄地水益北又别為明光桂宫中間不言天禄又在明光桂宫之北矣人情地勢不亦迂逺乎然則雄不寓黄門則不應直于石渠閣又烏得逺直天禄而有投閣之事也漢自惠帝始居未央非若髙帝以前居長樂故今就未央言之也其從閣自殞豈有生理既云位侍郎給事黄門又何為官之拓落不觀非聖之書何為復作符命前後自相詆誤永始四年王商秉政初不與丁傳同時課其生平雄卒丙辰未嘗得事哀帝下至丁丑二十二年莽乃簒漢為莽大夫校書投閣者果何人耶雖然誤與誣未可必也稽康傳髙士雄本與董仲舒同科康恥事二姓者而肯以莽大夫為髙士乎劉知幾曰太𤣥深奥難以探賾既絶窺踰故致譏謗子雲獨悲太𤣥之不遇耳假説託依謗以厚誣雄法言比莽於阿衡者皆是也悲夫楊廷秀有言班固經術不如揚雄則誣以阿莽嗟夫固豈必誣雄固書所叙與典籍不合者衡條上之惜哉衡所條者不可見也雄書衡尊以為經其必不使雄受誣明也惜哉衡所條者不悉也或曰劉向何以校書天禄也曰不同也漢元帝北闕上書奏事謁見之所公車司馬在焉漢以光禄大夫為中朝而天禄在北趨北闕為近方為䕶左都水使者光禄大夫正中朝官故可就天禄校書雄本待詔承明止應于蒼龍東閣出入無縁却轉而北予嘗疑漢書之地有二待詔金馬者校石渠列中朝者乃校天禄如此則子雲無殞身天禄之理不有明驗乎明文海巻一百十二
