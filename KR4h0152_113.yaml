body:
  text: 明文海卷一百十三餘姚黃宗羲編辨四孔子誅少正卯辨上陸瑞家孔子為魯司冦誅亂政大夫少正卯豫嘗疑其事既而深維焉果可疑也蓋昔季康子之問政欲殺無道以就有道孔子親折之曰子為政焉用殺豈有已為政未滿旬日而即誅一大夫耶孟子曰今有王者作焉將比今之諸侯而誅之乎抑教之不改而後誅之乎孔子王者之師也斟酌禮樂和其隂陽不教而殺斯為虐矣豈王政乎舜去四凶也以四凶罪惡貫盈神人共憤所謂求其生而不得死者與我俱無憾也然堯在位數十年而不行誅必待舜而後誅聖人為政殺非所先也明矣堯數十年而不誅四凶曽謂孔子七日而誅正卯乎縱欲誅之抑何驟也聖人如天地於人何所不容宰豫之欲短喪也切責之而已冉求為季氏聚斂使門人鳴鼓攻之而已重絶人也他如互鄉南子之類猶未嘗無惜焉其欲人自遷於善至廣也正卯既為魯之聞人則亦非不可以教誨懷者何至遂絶其遷善之路而使之首身異處時至春秋大夫之亂政者比比皆是在魯則有僣八佾之季氏以雍徹之三家囚主君之陽貨此則姦雄之尤者聖人為司寇正刑明弼一正父母之邦則當自姦雄之尤者始矣尤者尚緩而不誅誅者可疑而不緩兩觀之鬼不亦有辭于孔氏哉陳恆弒其君告於朝而請討聖人固未嘗廢殺也然一請於君再請于相君相從則上請于天王也必矣今正卯未有弒君之惡不告而誅又不啻專殺大夫矣五伯不為而謂聖人為之乎凡此皆涉於無理固可疑而不可信大抵家語左傳國䇿諸書文雖足取而實出刑名浮誇者之所以自託故如子貢之辨宰豫之死皆妄誕而不據蓋欲毁孔氏者為也不則視聖人過髙以為聖人政事必有風馳電掃駭人耳目故附會其事以眩惑後來耳豫之為文於古寓言之類亦嘗稽取證引然大抵藉之發理道針世疾非決其實有此事也吁孫武列陳而美人梟穰苴行師而莊賈戮兵家懲一警百不得不爾然實李績欲仗壻立威之習也聖人之兵如時雨有征無戰况政乎况孔子乎然則正卯之誅蓋斷無其事而不必疑也孔子誅少正卯辨下陸瑞家或曰誅卯之事既涉誣妄然則兹言曷始乎古臺子曰殆始于荀况也不則亦况之類言之也朱元晦亦嘗疑此以為不載於論語不道於孟子雖以左氏春秋內外傳之誣且誇而猶不言獨荀况言之愚謂况忍人也刑名之學也斯言始於况殆無疑也况惟以此為倡李斯事秦故必以殺為先而還自殺歟然則聖人廢殺矣古臺子曰刑亦兵也聖人不得已而用之虞戮四凶周誅管蔡孔明涕泣而斬謖非能廢殺不好殺耳且堯之所以不誅四凶者子知之乎堯非不鑒也堯於共工則曰象恭滔天於鯀則曰方命圮族豈不鑒哉特以惡未大著故不遽加以刑耳或亦兾其有改也今據家語荀書所載正卯之惡則亦未著之類矣况行僻而堅記醜而博罪實未至於可殺何為而遽殺之乎當是之時吾見三桓之弱魯矣未聞正卯之奪君也此其刑政緩急之間一庸吏能辨之况吾夫子乎或謂權臣竊權以亂國其害小正卯偽學以惑人其害大然則春秋孔子之刑書也誅大夫亂國者耶誅大夫惑人者耶譬諸醫不治心腹之疾而急理皮膚之間聖人之治殆不若是之迂也武王聖人也以征誅得天下猶曰武未盡善孔氏殷人也殷湯以放伐得天下而至德猶不稱焉聖人之不喜殺也一至於此曽謂身為司冦而遂濫殺于七日之間乎彼其他日論治而曰善人百年去殺用我期年而可以此例之縱使正卯有可殺之罪亦當俟於期月之後待於三年之餘况實疑似未著之人乎吁吾恐喜殺者之藉口於聖人也又懼夫妄殺者之見欺於荀况也雖然在正卯則擯之在三桓則法之若神宗之誤用荆舒李固之失賊不討是畏噎而併廢夫食又孔子之所甚惜也徐君墓辨邵寶徐君墓在襄城北二十里墓前有樹相傳為季札挂劒之處名曰靈樹按史季札之初使北過徐君徐君好季札劒口勿敢言季札心知之為使上國未獻還至徐徐君已死於是解其寶劒繫之徐君塜樹而去徐即書所謂徐戎詩所謂徐方其地在今泗州季札自吳適魯乃其所經之道是故過徐君焉襄城非徐地安得徐君而有是墓耶樹之靈否不論也且季札適魯觀樂之後遂使齊去使於鄭去鄭適衛自衛如晉未聞其道於襄奚從而挂劒哉或謂古者諸侯有邦交之禮然則徐君適鄭而卒于是亦不可知也獨不觀乎史稱季札還至徐徐君死則其死在徐也明矣其曰解劒繫於塜樹則其塜在徐也亦明矣於是過於是弔奚不可知而必為之曲説乎豫讀一統志泗州城北則有徐君塜云或曰襄又有徐君故誤稱之醫辨三首李濂嘉靖已酉夏六月余避暑於城南墅客有造訪者留酌林木之隂偶談及醫事數條間有溺於舊説之非者余劇論以闢之客既去豚子曰請盍識之以破積疑余憮然曰六經注疏承偽襲繆者亦多矣寧獨是哉聊漫録之俟質止于有道者李子曰虛心察理乃讀書之要法而杜撰穿鑿輒自立説以騁已見最學者所深戒余嘗讀素問至移精變氣篇黃帝問曰豫聞古之治病惟其移精變氣可祝由而已注曰移謂移易變謂變改皆使邪不勝正精神復強而內守也精神內守病安從來是以移精變氣無假毒藥祝説病由不勞針石而已此説本無可疑而全元起以祝由為南方神是誤以祝由為祝融其謬固不待辨近世陳定宇櫟乃引書泰誓篇祝降時喪以解之而訓祝為斷以為轉移自已之精神變改其所感受隂陽風雨晦明之六氣而斷絶其受病之由則其病自巳與下文岐伯答辭意不相貫豫不敢從也按韻書祝詛也與咒同書曰否則厥口詛祝是也竊窺素問本意蓋言上古之人處恬淡之世嗜欲寡少邪不能深入凡厥疾患感受輕微不必毒藥針石故可移精變氣祝由而已觀岐伯答辭可見定宇乃謂詛祝實素問之大禁而引拘於鬼神不可與言至德為説殊不思拘于鬼神不可與言至德謂志意邪而好祈禱者言也非是之謂也周官瘍醫掌腫瘍潰瘍金瘍折瘍之祝藥劀音刮殺之齊才細反曰祝者即此祝由也夫醫之用祝尚矣而瘍尤宜祝南史載薛伯宗善徙癰疽有公孫泰者患背癰伯宗以氣封之徙置齋前栁樹上明旦癰消樹為之痿損即其遺法孰謂天下無是理耶唐王燾氏著外臺祕要一書而符水咒禁咸在焉朱丹溪亦曰外臺祕要有禁咒一科乃移精變氣之小術未嘗謂其無是理也定宇獨不之信而著論非之亦幾于強辨矣善讀書者何事於杜撰穿鑿輒自立説以騁已意為哉杜元凱曰優而柔之使自求之饜而飫之使自趨之若江海之浸膏澤之潤渙然氷釋怡然理順然後為得也學者果能玩味斯言則虛心察理之方思過半矣周禮醫師掌醫之政令凡邦之有疾病者則使醫分治之嵗終則稽其醫事以制其食十全為上十失一次之十失二次之十失三次之十失四為下注曰全愈也謂每嵗之終總考其所治愈不愈之狀而制其祿以為五等之差必十無一失始為最耳李子曰此解經者之誤也且人之受病有淺深故治療有難易乃若偶爾違和感觸輕眇雖初學醫之士一二劑可愈也假使醫緩遇晉景公疾者三四人扁鵲遇如齊桓侯疾者三四人太倉公遇如曹山跗疾者三四人皆弗能使之生然則三子者果下醫乎或曰十全為上非為十人皆愈也言診視之頃即知其孰可治孰不可治逺則期嵗近則期月又近則期日十人之安危死生無不中者故以為上而食祿獨厚蓋優之也李子此説得之曲禮曰醫不三世不服其藥言君子用藥之當審也蓋以其父祖子孫傳習既久術以纍葉而精脈以診多而驗藥以厯試而效故抱疾者倚之以為命度不至于有誤也周官司徒以世事教能者意亦如此世儒不達厥旨乃為之解曰古之醫師必通於三世之書所謂三世者一曰雷公針灸二曰神農三曰素女脈訣脈訣以察理本草以辨藥針灸以祛疾非是三者不足以言醫故記禮者云然李子曰為此説者何其好竒之甚而果于立異也博雅如宋景濂亦從而喜談之甚矣讀書察理之難也雖然斯言也亦道其常惡可泥此以為擇醫之準乎且古之名醫如扁鵲太倉公張仲景華元化姚僧坦許智藏諸子皆自我始業未聞其先世有精醫者神功異迹流傳不泯又何必于三世哉即論近代如劉河間張潔古張子和李明之朱彥修輩皆非世醫也著述滿家而並著顯名於天下今之學醫者咸師宗之如學者之於濂洛關閩然惡在其為世醫也是故三世之説君子不泥焉濟池靈石辨李濂河北之濟源縣蓋有濟瀆廟云廟中有二池世所傳濟源池是也豫逰濟池徘徊池上見廟之裏門有石碣一刻記云大漢通容元年甲辰大旱有懷州河內縣人李繼安為商泛湖至君山廟禱祀忽見一朱衣人持書一封付繼安命寄至濟源縣西北三里許有龍池焉池前有石一塊擊之必有人應其形差異第勿驚畏此書乃玉帝勑濟瀆之神行雨者繼安如其言以書叩石其事果驗末云大宋開寶六年四月草日再書此記不著撰者姓氏豫遍考史册兩漢蜀漢五代漢並無以通容紀元者乃知後人妄為此記以欺愚瞽而又繆塑繼安像於廟門像前置大石一塊方三四尺以為即昔所擊之石大可笑也且其事竊倣栁毅傳傳書洞􅒉君之事但改擊橘樹為擊石耳抑豈知栁毅傳書之事亦好竒者為之而非理之所有者乎嗟乎正學不行邪説競作神仙鬼怪一切不經之談鑱石刻書假託傳播格物窮埋之君子固弗為之惑而庸夫俗子或從而信之是不可以不辨嘉靖乙巳春三月夷門老人李濓書于濟池之天慶宫顧命辨周復俊蘇氏云成王崩未葬君臣皆冕服禮與曰非禮也謂之變禮可乎曰不可禮變于不得已嫂非溺終不可以援也豫曰禮孰為重君為重親為重天下次之成王顧命傳於康王君命也親命也以天下基業之大畀于後人而明述文武之大下及經逺保世之格言諄諄切戒于彌留之頃其命顧不重歟豈直一嫂之溺已乎而何可以喪服受也夫親有三年之愛則子有三年之喪而服之必三年者所以明其為子而盡乎子道非曰服在子而有所加于親也蘇氏又云禮將冠子未及期日而有齊衰大功之喪則因喪服而冠冠吉禮也猶可以喪服行之受顧命見羣侯獨不可以喪服乎噫甚哉蘇氏之懵於禮也冠者親正子道於始顧命者子受親命於終其大小輕重固自區别也故子之冠而或有齊衰大功之喪親曰是可以喪服行之乎故子冠而以喪服者臨之以親命也顧命則子之受於親而可以喪服承之乎蘇氏云晉平公既喪諸侯之大夫欲因見新君君使叔向辭之曰大夫之事畢矣而又命孤其以嘉服見則喪禮未畢其以喪服見是重受命也曰此又蘇氏之懵也國有君喪而列國之大夫皆往弔諸大夫皆賔也賔不可以加諸君父故叔向之辭禮也要之諸大夫之見可以已者也可已而已之故曰禮也康公于羣公之見其可已乎今顧命之禮康王既以嘉服見羣臣而受乘黃玉帛之幣者所以明其為嗣君而以冕服受先王之顧命者所以明其為臣子而受君親之命不可輕也當是時召公畢公洎在廷之臣其於行禮之際亦議之熟矣孰謂其失禮乎藉使失禮孔子刪書當先削之矣既而羣公皆聽命相揖趨出王即釋冕反喪服三代以上嗣君受顧命之禮委曲詳密僅見此篇自是而後惟見新君即位之文而未聞先考臨終之命故其禮邈焉而莫講耳禮辨周復俊或曰婦有七去非聖人之言也夫淫也妬也不孝也多言也盜也天下之惡德也婦而有焉去之宜也不幸而惡疾而無子夫豈其所欲哉為夫者值婦有此安于義命存之可也而去焉無乃不仁乎豫不其然子言之身也者親之枝也是身非吾之身親之身也祖考以來之身也重莫加焉今婦有惡疾如風癩且將延及吾身而遷染於子孫禍莫大焉於此坐視而不為之處是豈知愛其身者乎不愛其身是不敬其親也不孝孰甚焉孟子曰不孝有三無後為大斯言至矣乃今不憫其無子而若將逺之此必有妬心者也已不宜子而妬焉則必至於無後矣此聖賢所深絶者也假令自歉於生子而推其妾媵俾得侍接於夫肅肅宵征抱衾與裯有小星之風樂色以進于君而已不淫有關雎之行則其夫尊之敬之沒身不衰矣而何忍薄之乎夫疾者六極之一雖人情所不堪而亦非聖人所惡今疾云惡疾必非恆疾之比而可不逺之乎夫孝以似續為先宗祧為上以惡疾而纍吾身且及子若孫非獨忘親且忘厥祖矣仁孝者不為也而况於絶其後乎多言尚去而况於斯二者乃更無更張之術乎通於此者可以知古人立言之意矣周禮辨周復俊周禮有冡人之官凡祭于墓為尸則祭墓之禮周公已創立之矣張南軒云古不墓祭非略也知鬼神之情狀不可以墓祭也神主在廟墓以藏體魄而祭之於義何居其言非也吾鄉先達陸文量先生有言為主之木與吾親平昔神魂素不相干特以禮制所在人心屬焉故凡有事薦祭惟主是尊是親而况親之體魄乃神魂之所依載安知委魄之後神魂不猶依於此乎蓋魄有定在而魂無不之古人之祭或求諸陽或求諸隂或求諸隂陽之間不敢必也故以墓祭為非禮者泥古忘親者也行之無害也豫謂陸先生之言達於禮矣今代清明掃墓天下士庶皆通行之而從厚者或於十月朔亦率其家人展墓焉此即古人雨露霜雪之思也顧時祭不獨於廟而今此必於墓者以吾親體魄所棲一嵗之間兩瞻望焉非數而煩也斯禮也其以義起者乎熠耀辨徐思曾詩豳風東山之篇曰熠耀宵行毛傳曰熠耀磷也磷螢火也崔豹古今注亦云又曰一名耀夜腐草為之今以其説質諸月令良然王氏本草曰螢火一名夜光一名熠耀則熠耀之為螢自漢以來則然矣孔頴達曰宵行夜飛也至朱子傳詩始以宵行為蟲而以熠耀為明不定貌蓋本陸璣飛而有光之説及以下章熠耀其羽例之亦皆可通故今學詩者宗之然非所以施於他詩也張華勵志詩曰熠耀宵流劉良注曰熠耀螢也劉履曰流飛行也是即毛孔説耳吾有取焉或者非之嗟夫古人作詩各有所指執勵志以解東山則東山之旨戾而致誤執朱傳以釋勵志則勵志之旨晦而不明故解經之法在乎隨文會意不可執一論也且蟲有名宵行者矣未聞有名宵流者也而欲強同之可乎夫宵流既非蟲名熠耀又非螢火則勵志之所指者果何物乎古人治經必守其師之説故毛不可以為韓韓不可以為鄭為公羊者必讎乎左氏為左氏者必詆乎榖梁安知茂先當時之學不為毛詩乎矧朱傳之出在茂先後八百餘年彼其時但知有毛説耳不能逆探朱説以求合即使當時已有如朱説者而茂先或不暇考未可知也潘安仁秋興賦有曰熠耀燦于階闥兮蟋蟀鳴乎軒屏夫熠耀蟋蟀相對而言則以熠耀為螢晉人亦不一矣詩韻辨張弼韻書始於江左弊於因襲雖有覺者力莫能正我朝始刋定洪武正韻一洗千載之陋誠萬世之幸也唯詩家猶泥唐韻曰凡古詩之流可用正韻近體律詩惟用唐韻問其所以則曰律詩自唐始故也茍依正韻則曰落韻特遵今之制耳樂其寬耳試叩以唐韻冬東青清之屬何以異虞模麻遮之屬何以同則曰自有五聲七音輕清重濁於其間也噫是因襲而不察淺陋而無見口耳相承臆度妄語殊不知江左制韻正坐不知七音之當辨直據一方之所習故失立韻之本原也何輕清重濁之分耶借曰唐詩用唐韻則騷詞用楚韻古選用漢韻耶唐韻襲類譜而作故梁韻也何唐詩而用梁韻耶唐韻至宋已加通並非唐之舊則宋韻矣又何唐詩而用宋韻耶正韻惟取諧協固寬也唐韻之聱牙者亦得而押豈窄耶且作者何計寬窄也謂遵今之制者非茍同也據天下之公闢江左之偏也觀學士宋景濂所序慎重精密之至凡詩皆合宜用正韻且不待辨矣猶慮詩家習觀隂氏韻府羣玉又以正韻定之則凡詩之不宜用唐韻又可識矣何淺陋者之因襲未復於正又倡傳妄説使髙明者亦不得由於正也或曰李杜蘇黃諸家者用唐韻人不知病蓋唐宋之世病在韻作者弗病也况雖在唐宋不依唐韻者亦多矣泥者不知唯取諧協則傅會其説曰漏底韻出入韻猶韻書上平下平不知由編帙重大而分乃曰音有上齶下齶之異也上本始於東終於山不知偶分及此乃曰日出於東沒於山之意也淺陋類此不足一笑泥者反以正韻為失寧免笑乎或曰朱子訂詩書之序破千載之陋使唐韻當易何無言之及也曰宋以賦取士通並唐韻朱子不當制作之任其容變乎使朱子生於今日尚泥唐韻乎必不然也髙明者自當有見四明辨並詩戴洵豫觀道書謂四明丹山赤水為三十六洞天之第九靈仙一都會也山頂有石開四窗通日月星辰之光故曰四明豫自少小時甚竒羡焉萬厯癸酉春至仗錫寺求所謂四窗者不可得或由道傍竪一方石髙丈許刻曰四明山心者是也或曰别有巨石中空可入四邊透明然去寺尚二十里道險不可往豫信之遂歸然意常悔之至今萬厯庚寅巳十八年矣復至仗錫九月九日決意往尋從西南下峻嶺至谷底大愈溪復上危岡逾絶頂者四五乃至其處而石在山半絶陡峻無路可下乃解脫衣履呼三四土人牽挽寸寸行始得到則石壁面南開一口可髙四五尺俯僂而入僅足坐十許人口上下相連者三因謂不連處為忩耳豫行天下見如此者甚多何足云通日月星辰之光而以為竒也及歸過佛巖下見一石髙數丈刻曰四忩此亦道傍竪石類耳豫思四明之義乃此石虛冒其名察其實不然蓋寺在半里許一峯絶髙豫嘗再登之見數百里羣峯以千百可指而數東西南北無蔽遮又此峯最中四面山環繞如內城外又層層環繞如外郭豫嘗登泰山雖極髙然獨北去甚長其東南西皆無山直下一望至山麓盡矣故獨此山可稱為四明正以四望通徹如一故也若曰通日月星辰之光凡石洞皆然何獨於此山云爾哉豫怪好竒者徒欲觀四窗而以身試不測之險又怪此峯去寺甚近而不知登覽使四明之真體面不露也故特為著辨以告後來者毋尚險逺而遺近易且知四明之義在山而不在一石窗也系之以詩曰四明古洞天回環五百里仗錫宅其心羣山此綱紀左峯最孤絶四顧爛張綺山尖千萬點一一可指取所以稱四明義正如此耳彼謂石有窗乃在西南砥匪惟幽且偏亦復險而鄙倘欲往尋之步步學緣蟻失足千仞溪援手何及矣寄語後來人好為辨兹理忽邇而騖遐達觀良足恥明文海卷一百十三
