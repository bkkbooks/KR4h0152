body:
  text: 明文海巻一百十四餘姚黄宗羲編辯五大禮問辯潘希曾或問禮官之説皇上以小宗後大宗特重大宗降其小宗亦既合禮經矣曷為議者未已也曰此宗子法也非所以定天子之大禮也曷為議者之説亦復引大小宗也曰兹所謂楚則失而齊亦未為得所以重紛紛也則其説何也曰宗法為公子卿大夫設也大傳別子為祖繼別為宗朱子曰君適長子為世子繼先君正統自母弟以下皆不得宗其次適為别子不得禰其父又不可宗嗣君又不可無統屬故死後立為大宗之祖其適子繼之則為大宗君不與族人為宗也大傳族人不得以其戚戚君陳澔集説為君有絶宗之道為人後為繼大宗設也喪服傳為人後者孰後後大宗也大宗不可以絶故族人以支子後大宗也君無為人後之禮也魏明帝詔禮王后無嗣擇建支子以繼大宗然禮無王后無嗣之文明帝乃附會喪服傳後大宗之説耳且禮適子不得後大宗設使今上有弟亦必以適長入繼可見宗法不可行于君誠以君至尊也不得與臣庶同也理也亦勢也喪服自期以下諸侯絶見中庸章句而為人後者有大功焉小功焉見喪服傳故知後大宗非天子諸侯事也且古之後大宗者必屬乎子道者也故可以為父子兄弟之子謂之猶子是屬乎子道也仲嬰齊以弟後兄非禮也而公羊高曰為人後者為之子附會之過也魯僖公以兄繼弟非世及之常也見禮運父子相傳曰世兄弟相傳曰及而胡安國曰臣子一例以僖嘗為臣謂臣猶子也則可謂為之子惡乎可左氏子雖齊聖不先父食之説公羊先禰後祖之説以父子喻君臣故胡氏謂臣子一例近世人主禰其所後則何如曰屬乎子道嘗受命為後儗諸宗法庶乎其可也若漢哀帝以猶子為成帝後宋英宗以猶子為仁宗後之類非此類也何可比而同宗法耶若商仲壬以弟魯僖公以兄漢宣帝以曽孫光武以從祖今上以從弟皆不可曰後而為之子然則稱號奈何曰天叙有典人不可汨也如父不可曰叔姪不可曰子之類其廟次奈何曰生為之臣死不躋于君也如僖公繼閔公僖雖兄臣也閔雖弟君也僖不當躋于閔上其昭穆奈何曰父昭子穆未之有改也或世次不相當不以親親害尊尊可也如兄弟或從父祖嗣位昭仍為昭穆仍為穆但當明其君臣之義臣不得位于君上信斯言也大禮其定諸曰然明乎宗法之原而不以其所同强齊其所不同則千載不明之案可判而今日紛紛之論不崇朝可决也如哀帝英宗之事可同宗法者也故當降其小宗而師丹司馬光程頥朱熹之説為是然司馬公引魏詔不得顧私親之語則将視所生為路人又不若程子推所生至恩明尊崇正禮之説如宣帝光武之事不可同宗法者也故光武當祖髙祖帝四親而張純朱浮之説為非宣帝得稱父為皇考而范鎮以小宗合大宗之譏為非然程子亦以宣帝稱所生皇考為失禮但宣帝於昭帝為姪孫叔祖不可為考所生又不稱考是竟無父矣此亦拘於為後為子之例或因一事一時而發未必其定論也且尊信程子莫如朱子而其作本義定家禮不能盡從程説亦惟其是而已仰惟我皇上之即位承武宗遺詔遵祖訓兄終弟及之文揆諸春秋之義克正其始矣其繼武宗之統以主宗廟之祀非若宗法必為之後而後得奉其祀者故以倫則武宗兄也孝宗伯考也以位則皆君也皇上以弟代兄以臣道事先君其繼武宗也名正而言順矣假如興獻帝在以叔代姪亦以臣道事先君而繼其統武宗而有繼也則孝宗固未嘗絶也何得舍武宗而不繼何必考孝宗而後為繼耶或以宗廟無禰為疑然事有常變漢宣時亦無禰廟况孝宗廟在禰廟之班乎由此言之興獻帝聖考也興國太后聖母也名正而言順矣若夫尊崇之典則亦有可言者宋英宗旣後仁宗程頥尚謂其父濮王當别殊稱矧我皇上聖父母乎如曰子無爵父之義周不有追王之禮乎或疑此非尊無二上之義殊不知興獻帝本處臣道又謚號視列聖少殺又不敢稱宗何嫌於二上設宗藩入繼欲併崇其祖却難盖繼統與創業不同創業之君功徳自已立故得追崇四世以報本繼統之君功德本乎創業之祖故止可及父母而不得及祖壓于創業之祖故也又疑如此父祖有間據先王制禮父服三年祖朞曾祖三月亦自有差等若夫廟祀之典則又有可言者天子為百神之主尚當祭其國之無主後者見王制顧不得祭其父乎别建寝廟不敢干宗廟之紀不亦可乎然則子之説無亦勦議者之説歟曰議之是者天理人心之同也議之非是者予不得而同也子盍亦上聞歟曰皇上至孝之心既已燭夫兩端之説矣大禮其次第舉矣予竊重夫禮官之固執而惜其弗加察也乂慮夫紛紛之論真成聚訟而或胎患也故為是答問者將以解學士大夫之惑而明我皇上至孝之心於天下也怪辨丘雲霄丘子遊山與翁子夜宿武夷之髙明樓中夜有怪作人語倚門不進曰同遊不樂乎何睡之蚤也丘子應之曰我戴晨而遊抱日而歌汝胡不吾和而同吾樂胡深暮而來也怪應曰不能丘子亦應之曰我亦不能怪嘆而去丘子就睡翁子䝉頭屏息不敢語明日路問丘子曰物之常人之怪也人之常物之怪也翁子曰語胡而通丘子曰物常其常我亦常其常耳翁子曰能役乎丘子曰彼不能變怪而常所以物也我不能變常而怪所以人也翁子曰能害乎丘子曰彼之于我猶我之于彼也翁子曰能去乎丘子曰天地自然之理爾理可去邪翁子之疑釋醫辨丘雲霄藍子者學于老氏澹然于物外而嗜于醫或告之曰是亦欲焉已耳夫情有所偏重志有所定趨而能謂無欲邪吾聞有道者心無所係而適適爾也藍子曰執術以求直天下之通志也役役焉耳吾将工于濟而不工于報也吾将得術而忘術也吾将一物我而忘之欲天下皆我忘也吾将以求仁也而子謂欲不亦異乎君子于是乎多其能術于時或有病氣者鳴而走痛治者曰痰熱中欝氣由邪道耳劑之寒而疾日益或又曰欝乘温則散抱寒則窒乃劑之温而疾日益藍子曰二者不知中和之道也温凉並施寒燠兼劑夫誰而憂治丘子曰有是哉子之昧也吾聞醫之道輔其弱抑其强而已矣何有于是藍子曰人之一身猶天地也天也之氣隂陽而已矣在人之氣寒燠而已矣隂陽相勝則天地疾寒燠相勝則一身疾善者調而和之是故天地之氣和則春無凄風秋無苦雨冬無愆陽夏無伏隂而萬物不疾人之氣和則六脉不亂五内不傷九竅不窒七情不欎而百體不疾夫益弱而損强治之善政也益之益之弱将强至損之損之强以弱憊是豈利于和物之道哉是故善将者無定筭趨其利于勢則强弱皆精兵也善治者無定法趨其利于從則善惡皆馴民也善醫者無定方趨其利于性則寒温皆和劑也故曰膠漆之子不能授以弄丸之巧藜藿之家不可語以大烹之調無他所執者固而所知者拘也丘子戄然曰逹子之説可以使功可以使過可以任賢而位能相之道在是矣作醫辯小宗辯羅虞臣失重本始聯族屬叙親踈别嫡庻莫大乎宗法傳曰繼禰為小宗夫繼禰之為小宗何也小宗別子之庻子也庻子不得禰父故以長子繼已為小宗也是故繼禰之嫡諸弟宗之至二世之嫡其父之諸弟曰叔叔之子曰同堂兄弟共宗之三世之嫡其再從之伯叔兄弟共宗之四世之嫡其三從之伯叔兄弟亦共宗之舉三從而同父同堂再從之伯叔兄弟可知也是謂小宗至于五世四從兄弟視小宗之高祖為高祖兄弟無服也故各祖其祖為宗其得各自為宗可也謂其為與高祖異也宗之言尊也尊無二明無二嫡也宗以五世為限服盡也服者先王所用為宗子聯屬族人之具也服盡則親盡親盡則廟毁故曰高祖遷於上宗易以下此之謂也孔頴逹曰族人一身事四宗并大宗為五考諸禮經原無四宗之説假令四宗為之宗法視子孫互有異同族人将誰適從此决其不能行也四宗之説起於班固固曰宗其為高祖後者為高祖宗宗其為曾祖後者為曾祖宗宗其為祖後者為祖宗宗其為父後者為父宗此固臆説也夫大宗以始祖為宗小宗以髙祖為宗宗至四世族人雖各有曾祖及祖禰之親然視之髙祖彼皆支子支子不為宗得為宗者髙祖所傳之嫡而已是宗安有四乎或曰禮經所稱曰繼禰曰繼髙祖何謂也曰據其初言則為繼禰自其終言則為繼髙禰之傳嫡下及𤣥孫𤣥孫推而上及於禰然後為小宗者偹矣夫小宗以五世為率五世之内雖父子祖孫相承然世之止一嫡耳序之昭穆别之以禮義而後族人尊之為宗故曰宗法有君道焉如固之説則宗有四嫡廟有二主喪有二孤土有二王甚非古者所以定名分防僣奪之義或又曰人之族數蕃庻有高祖同而曾祖不同者有祖同而禰不同者吾為嫡可以主吾高祖之祠不可以主高祖叔之祠可以主吾曾祖之祠不可以主曾祖叔之祠可以主祖之祠不可以主祖叔之祠可以主禰之祠不可以主諸叔之祠謂其各有子孫也則宗安得不分而為四曰夫羣旋之有宗子猶裘之有領也五世之族無二宗猶裘之無領也故嫡子可以宗父而支子之嫡不得為其宗嫡孫可以宗祖而支子之孫不得為其祖宗嫡之曾孫可以宗曾祖而支子之曾孫不得為其曾祖宗何也以義屈也服屬未斬則尊不可貳也五服之外支之嫡孫始得為宗者謂高祖已遷也故尊其曾祖為髙祖可以自宗尊有所伸也五世未竭則髙祖在上曾祖以下皆子孫也子孫同享高祖之廟統于尊也祭同廟享同時羣族之兄弟同在也宗之嫡主高祖及其曾祖祖禰之獻而兄弟各佐獻其祖禰于同堂之上是故無奪嫡之嫌而一廟同享子孫曷嘗不各盡其孝思哉曰内則有云夫婦皆齊而宗敬終事而後敢私祭若子之説庶子無私祭乎曰此小宗事大宗之禮也小宗雖有嫡子然要諸大宗則庶也小宗雖奉四代之祭然要諸大宗則私也故祭先公而後私先大宗後小宗尊卑之義也非庶子私之謂也大傳曰庶子不祭明其宗也斯先王所以重嫡庻之分而謹偪僣之防者也曰然則老泉宗法非歟曰洵以高曾祖禰之嫡分為四項是惑于四宗之説也其言曰繼髙祖之嫡祈死而無子放其宗亡而虚存繼曾之嫡者曾祖之嫡宗善宗善之嫡昭圖繼祖者祖之嫡序序之嫡澹夫洵之曾祖祖皆庻也高祖之嫡祈死而無子則當以祈之弟福福之子宗夐為宗以繼髙祖不應自為其曾祖立宗既為曾祖立宗則洵祖當宗宗善洵父當宗昭圖不應復舍曾祖之嫡而又自為其祖立宗今人孰不欲尊祖而私禰然充洵之説是率天下亂嫡庻之分也何者大宗之嫡通夫百世之小宗小宗之嫡止夫五世故五世之羣兄弟宗之五世之内無二嫡猶大宗也故曰大宗率小宗小宗率羣族族人之所事者此二宗耳不然則先王之宗法也猶官多而令煩也欲求其致理也得乎東海若之臭瓠辯孫七政東海若之臭瓠其穢其狭其幽㝠其安故不遷為糞壤為蟯蚘為堅石栁州先生述之備矣一日東海若見栁子之文而驚曰噫嘻乎予何忘是臭瓠之辠不誅逾千年也乃議流之西弱水流沙之域沈溺墊没隨風流行逹之八紘之表以禦魑魅無得汙于此中國戒行有期東海之波臣聞之則介雲將師而謁諸東海若曰以臣觀之東海莫公平安分善揚海若之譽如臭瓠之德者而若一何誅之暴也東海若復大驚曰怪哉臣胡瞀亂若是有説則臭瓠并生無説則波臣并死波臣仰而笑俛而嘻而言曰臣安敢無説哉夫臭瓠之徳亦極汚衊耳顧能自安其穢不敢以穢大海也自安其狭不敢以狭大海也自安其幽㝠不敢以幽㝠大海也及若欲抉石破瓠盪羣穢於大荒之島而同之清流也則瓠自安其分突然而徃終古不敢言變其德者彼豈不知𡨕腐之可畏清明之可浥而思一日自洗濯其惡哉誠内顧其徳不敢以自同於清流耳且以是瓠而浮遊大海也大海不加汚焉益足以昭若之大揚若之芳馨予故曰東海之中莫公平安分善揚海若之譽如臭瓠之德者若縱欲誅是獨不見東市之贅蛙乎夫東市之井有賈禽焉為賈於東海之􅀈拮据捋荼羽尾譙翛為巢六十年而始克家東海之百貨咸輳積以累鉅萬計而禽之贅為井底之蛙思欲盡攫井禽之室而無由也乃蟯蚘於井禽之腹糞壤於井禽之役堅石於井禽之蓄藏靡不甘也靡不忻也以蠱井禽之家於是果盡攫井禽之室不遺錙銖窟而藏之井此亦足以汚衊其身矣猶未也而乃幻為滛哇之音安忍為之以亂井禽之嗣使井禽之鬼為若敖氏此亦足以汚衊於物矣猶未也而乃澎腹攘臂而怒號於井梁曰予蛙之德莫馨若世皆穢予蛙之德莫廣若世皆狹予蛙之德莫明且達若世皆幽㝠且拘躑躅而噫氣恣睢而滿意適一鵷雛之禽過而憐之呀之曰來汝井蛙予将濯磨汝於東海之清流矣則復澎腹攘臂而嚇之曰東海之波孰清流予者得予之清則鴟鳶之腐鼠皆鸞鳯之食矣汝疾去毋亂吾業鵷雛之禽為弗聞也者而去之曰彼井蛙之王長也而亦天之戮蛙也然則東海之臭瓠特形累耳未若東市贅蛙漸於肌浹於髓腊於腎腸沈錮於膏肓而不覺也向使井底之蛙與臭瓠絜芳比潔則臭瓠之不為許由之瓢者幾希矣奚啻軼魏王之大瓠且蛙之藏東海之波濤也則亦東海之治也今若也垢疾不藏蒐慝不殄錯天之紀亂天之刑是謂反常上帝将誅東海若矍然改容而遽謝曰微子予幾干上帝之誅哉乃亟赦臭瓠不誅誅東市之贅蛙而東海之風益清郡志辯疑符錫巴丘縣即玉峽驛古𨽻廬陵郡後省入新淦𨽻臨江舊志沿革辯疑二類皆載周瑜墓周将軍廟而湖廣志岳州亦有巴丘山兩地皆瑜身所歴一則曰留鎮巴丘一則曰道於巴丘病卒遂使後人不能無疑者今按瑜本傳建安三年瑜領居巢長還吳授建威中郎将䇿欲荆州以瑜為中䕶軍領江夏太守從攻皖進潯陽破劉勲討江夏還定豫章廬陵留鎮巴丘又孫賁傳賁嘗擊揚州刺史劉繇繇走豫章及與䇿征豫章廬江太守劉勲江夏太守黄祖軍旋聞繇病死還定豫章上賁領太守江表傳曰時丹陽僮芝自署廬陵太守䇿留賁弟輔兵注南昌䇿請賁曰兄今據豫章是扼僮芝咽喉而守其門户矣但當俟其形便今國儀仗兵而進使公瑾為埶援一舉可定也後賁聞芝病即如䇿計周瑜到巴丘輔遂得進據廬陵是為建安四年冬明年夏策薨權統事瑜将兵赴喪遂留吳由是觀之則瑜鎮巴丘者方數月而裴松之註云孫䇿于時始得豫章廬陵尚未能定江夏瑜所鎮應在巴丘縣是也至建安十三年春權討黄祖瑜為前部大督始擒祖於沙羡而盡有其地其年九月曹公入荆州戰于赤壁曹公狼狽而還是為十三年冬曹仁留守南郡十四年瑜與呂䝉等累破之曹仁退權拜瑜偏将軍南郡太守以下雋漢昌等四縣為奉邑屯據江陵十五年瑜自江陵詣京見權陳取蜀之計權然之還江陵為行装而道於巴丘病卒則所卒巴丘當岳之巴陵而松之註亦云瑜欲取蜀還江陵應在今巴陵與前所鎮巴丘名同處異是也然史稱瑜卒權素服舉哀喪當還吳又迎之蕪湖盖瑜本舒人今輿地志廬江宿松二縣皆有周瑜墓則瑜不塟巴丘亦明矣或曰周将軍墓當為周徹徹瑜之次子也封都侯以罪徙廬陵郡赤烏間卒于貶所理或然也嗣統辯沈槩禮行于天壤之間號為大閑者尊尊親親而已天子諸侯絶宗繼别大宗不遷尊尊也大人世及為禮得以傳之弟姪旋人之子得後大宗親親也匪尊無忠匪親無孝二者廢一不可夫親親之倫昭穆焉耳父昭則子穆子穆則孫昭雖支姓日蕃分有踈戚以祖視之在昭為父則在穆者皆子也有相嗣續之道焉况大宗者尊之統也嗣不可絶絶則後以族子為之後則誠子也嗣大宗者小宗降矣寜敢貳乎斯禮也大夫士且然君獨可畔乎哉所謂絶宗者言君尊者雖有合旋之道族人則不敢以其戚戚君耳非謂君無宗而親可廢嗣可絶也孔子有言君於同姓皆有宗道焉又曰宗廟之禮所以序昭穆也皆謂名位雖殊宗道一也夫世及之禮非以其親耶非以其昭穆耶故君或無子則同宗諸子皆可立為己子如不逮立則先君諸子皆可推為先君子也為之後者禰其君親親也或禰其先君而不敢復禰其私親尊尊也尊尊親親而統嗣之義兩得矣至謂長子不得為人後者經也茍廹於權矣則重有所歸復欲兩重而兼尊之得乎使於位則曰吾倫序當承也於所後則曰吾有父焉吾承君之統耳非繼嗣也嗚呼非以其親統不虚承既承其統而避為之嗣是廢昭穆懿親而欲與舜禹異姓崛興者齊衡也尊祖敬宗之道若是恝乎故凡以旁支承統有所受焉者不問生禪遺迎不計疏戚高下於所後之君皆為之臣為之子孫也其所生之親移宗改禰仍為臣屬但不臣於己耳私報雖隆不得而尊稱之焉是非薄於生制於義而不敢抗以禮抑其情安其心萬世不易之公也議者如謂其不然而曲為之辭其亦誣聖經而遺其君親者禮云尊無二上故國無二主家無二嫡焉昔魯考仲子之宫用致夫人春秋譏之嫌二嫡也身繼一皇而復尊一皇是二主矣其由來也有漸推其端妾母私尊之失啟之然歟何其防潰瀾倒日趨於尤而不可止也或曰生死不相及無相厭也噫事死如事生事亡如事存斯謂至孝無所厭而逞焉則将無所不至矣此愛禮者所為拳拳也二隍神辯徐渭凡府之有城隍並一而吾紹獨二一居卧龍山之巔曰隋縂管龎公珏守越有功德于民死而人祀之事詳舊碑信矣一居其麓者不知其為誰或曰禱祀者處山北則陟巔為便故巔有祠審爾則巔之祠似後麓或曰有司以朔望謁神謂非便故麓始有祠審爾則麓之祠又似後巔此祠則二而神猶一也或者又曰高皇帝有天下舉百神而新封之合主以享諸隍主並仆而伏越獨否夜乃上夢曰臣玨守越近不如呂珍願陛下進珍而退臣事雖不行而民間譁傳其説故麓祠者民自祠呂也或又曰當胡公大海攻越神嘗現巨履以怖胡及聖祖擬新封神之主又植不仆将馳使斬首道士夢神言令負以匿初未信也再夢乃獨肩神履如飛至巔重不可歩曰神樂是也遂止茨以覆焉麓祠虚補以貎遂相推以呂以呂嘗守越乃吠堯如錄其功亦宜祀也審爾則祠二而神亦二矣考諸紀及問故老之有識者咸云高皇時未聞有聚主事即欲斬不仆者誰敢匿且高皇明聖寕有此及再夢説盡不經若曰巔祠便山北禱祀亦非民間所敢擅謂麓祠便有司謁者差近耳然審爾則祠雖二而神又止一矣向知是府漢中白公某者嫌兩神而汰其一得疫舉族塟是山之西則神又似真有二耶其祠麓者果呂公珍耶或者又曰世一神而百奉者多矣二而汰其一亦似非宜然以予所考諸紀高皇更始定諸隍位無姓名直府爵比公曰顯佑公州比侯縣比伯其人詳祝文紹有兩巔以龎祠麓以呂祠可也明文海巻一百十四
