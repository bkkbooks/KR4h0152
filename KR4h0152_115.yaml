body:
  text: 明文海巻一百十五餘姚黄宗羲編辯六深衣辯侯一元嗟乎夫用禮豈不難哉先儒言深衣之用無所不可于是士大夫多以之正終余年及矣則喟然而欲營之顧其製白布而青縁者也乃郡之人則皆藍而青縁焉盖諱白也而台州南渠王中丞者名公也又獨青而藍縁焉人初疑之余則獨敬之以為是求心而不泥古者也顧未及深考焉耳愚因而遡觀儀禮士冠則主人𤣥冠朝服不言色者與冠同也凡衣必同冠韠必同裳故冠禮始加緇布緇黒之弋入者也則𤣥端而𤣥裳是太古之齊冠也士庶所同也士既冠則敝之而不復用也再加皮弁則素積以存古也三王之所共也三加爵弁爵色赤而微黒者也則絲衣而纁裳所以從祭也其見君則𤣥冠𤣥端而爵韠故曰彌尊豈復庶人之所可同哉内則曰子事父母緇冠緇衣而𤣥裳誠以采而不以素也寜有用白哉禮曰無君者不貳采不貳采者衣冠同色謂大夫去國有可弔之道必素衣素裳踰三月而後𤣥端𤣥裳也故曰冕衣裳者又曰衣白者山人盖古之衣裳必上下異制而深衣中衣長衣則續袵同制皆取其簡焉耳續袵則衣長衣長故謂之深衣也夫玉藻所謂夕深衣者吾固不知其何色也然其中於朝服祭服也則謂之中衣中衣即襯衣耳不着于中而着于外則謂之長衣長衣素縁乃所以卜葬也又豈得為禮服而吉服也哉故知深衣者簡便之服也記者亦自言之矣而規矩凖繩權衡之説特漢儒之文之焉爾獨不觀之復者乎君以衮大夫以𤣥頳而又曰不以襲也欲更新也又不觀之襲者乎君衣百稱大夫五十稱而又曰不盡用也欲隨宜也然而必曰畢主人之祭服焉今夫深衣者其可以祭乎哉不可以祭其可以正終乎哉雖曰人之終事人之所弗得見也而固自見者也自見曰明如以簡便自安是季孫之賜不足易而曽元之愛有足多也嗚呼古今之變非一矣今欲易據案而席地易三醴而𤣥酒則惑矣古之蠺少績多故𤣥黄皆績也特以精為貴耳故衣則十五升冕則三十升也後世蠶既盛矣又加卉服以佐麻葛故純為儉而麻為艱且玉藻曰帛不裏布王制曰五十衣帛今尋常之人有不衣帛者乎而可以裏布哉嘗聞衲子以傳衣為得法不知其有貴于衣者也可以儒者而同之哉深衣之傳恐亦先人之誤也愚以為有位者當服命服無位者可服深衣生乎由是没乎由是而勿為習俗之所移則善矣其有不便于衡縮者自宜通之以唐之中若古之紳焉可矣惜吾不及南渠公之存而是正之也庸書以俟後之人易簀辯侯一元易簀之事自朱子疑之以為非曾子耶則一息尚存非正不處惟曾子能爾以為曾子耶則隨事精察獨何以受不正待童子而後更哉余嘗沉思而得其説焉盖人道之始終也猶隂陽也之生為陽之死為隂陽主仁隂主義仁則寛舒義則剸割一物而二用者也大夫有賜士則受之服以拜賜固其宜耳是仁之方也士而没于大夫之簀則不為士是故易之是義之制也吾何以知之吾以禮知之禮屬纊則男子不絶于婦人之手婦人不絶于男子之手夫人之平居焉有夫婦而不同者哉而其嚴乃若此故之死而致生之不可也之生而致死之不可也吾又以是而悟申商之法其所以異於先王者刻覈而無恩執一而不通耳盖非法之罪也用法者之罪也故謝而不食則曾子微之母而不母則孟子非之歌而不哭則蘇氏姍之折枝而諫則老臣迂之是皆有餘于義而不足于仁知簀之所以易而不知其先之所以受者也嗚呼非通方之君子其孰能與于斯哉陳圗南蜕骨成仙辯王尚絅仙非可學而至也愚于陳摶乎騐之夫長生不死世之所謂仙也自有生以來安有所謂不死人哉葢命之脩短各懸于氣之禀受而不係于人之修為孔子何人夀止七十有三則聖人固若是耶粤維上古稟氣厥生各千餘嵗至堯舜時猶踰百嵗繼此雖人物禀受差殊而天地之氣亦薄矣脩長者猶間或一值焉如籛何學顧七百餘嵗乃若陳摶卒年一百八十有竒今考漁鈎媪乳之傳雖若難信要其生固自于人異者頭顱骸骨今匧置硤中死有足徴世猶以蛻骨成仙云者術士之妄惑之也辟諸星麗于天光彩燦爛猶人之生也隕而為石摶之骨是已蟬蜕羽化尸解飛昇仙家幻妄卒歸于此焉爾矣乃使世人絶欲導氣貪生妄想卒之猶速其死者首駢踵聚禍不甚耶是故世儒立論執以為無者不知間值之説者也過以為有者不知稟受之説者也學之而至者亦其禀受之有者也否則學似顔子難矣是故程子以為天下至難事其知言哉嗚呼仙本非學也必欲學焉終以無成老且死而不悟聖人所可學也天下其幾矣棄聖人之道而學仙無惑乎退之皆以為自棄其身爾夫茍以為聖人果不可學而至也則學仙之妄可熄術士種種之説尚足以禍天下哉荆蠻辯顧彦夫史記記泰伯逃之荆蠻考其所都實今之蘇常而謂之勾吳者及讀禹貢則曰淮海惟揚州三江既入震澤底定震澤乃古揚州之域即今之湖與蘇常者也其謂荆蠻者何盖古者中國亦有蠻居如徐戎淮夷之類是已徐戎者非徐即戎也戎而處於徐者也淮夷者非淮即夷也夷而處于淮者也則知荆蠻者亦蠻之處於荆者也或蠻嘗徙于揚泰伯逃其所徙之地者也或始逃于荆後至于揚封于吳者也吳即揚之一隅宣王命方叔伐楚詩曰蠢爾蠻荆王子朝奔楚使告諸侯亦曰竄在荆蠻則知荆蠻非揚州之土産也信矣荆與揚固皆中國也而皆不能以無貶歴世既乆㫁髪文身之俗或變之或除之或遁而去之未可知也或曰春秋貶吳楚何歟曰春秋之貶吳楚以其僣王也貶其道貶其人非貶其地也其地固皆聖賢之封國禮樂衣冠所從出者胡可貶也予每見江南詩禮家家譜必曰吾始祖從高宗渡而南者也又或曰吾始祖官於斯遂家焉者也間見宋初遺譜亦皆委曲遷就曰吾始祖非江南人也求其故而不得得非惑于史遷之説亦以荆蠻之種自諱故更相蹈襲而謬妄至此耶不然江南亦大矣何獨無一人吳産也舜東夷之人也文王西夷之人也固皆不足為舜文累也蠻與否奚足為江南之輕重哉然予吳産也産於吳而不知吳之自不可也作荆蠻辯
