body:
  text: 明文海卷一百十七餘姚黃宗羲編辨八施敬辨馬統記曰社稷宗廟之中未施敬於民而民敬嗟乎敬在施先敬敗施後聖人神道設教之意窮矣窮則通變後聖之事也一日因修縣志見所志鬼神多非典祀為之普辨而盡廢之以示客客曰毋得罪於愚衆衆口且鑠金遂中止嗟乎聖人神道設教之意窮矣凡今之所謂淫祀者何始乎在三代以上己有之蓋妖人邪士假鬼道以愚弄鄉曲而利之者也鬼道者又神道之變而旁出之鬼神亂乎俗禍福蠱心冥惚借口譬之妾媵且奪嫡故曰國將亡聽於神且其建祠塑象作法念咒為之拜祈之節祭祀之儀混男女倒晝夜匿盜藏姦又一大萃淵藪也言敬者偽也而本然之敬亡矣即此又可以見人之情惡匪修道之教也鮮不胥為禽獸老莊蓋先見者也故其言曰禮者忠信之薄而道德之衰也而吾俗儒非之不知變不足與權者也權也者用中之度聖人之所以成能又嘗為之櫽括諸記之文相與錯綜而辨之記曰有畏而哭之有愛而哭之夫哭以宣哀情也其畏者偽也而且偽而為愛至終日號泣而淚不濡目如今婦女之祈祠進食打扇敬無不至又如呼號於岱山頂上女主之祠不翅喪乃考妣泰山固有配如衛南子之招搖市里乎其偽哭者祇以文姦真者要之亦貪爾皆偽也而其女主何嘗如執符契之責報施即此可以見情惡記又曰祭不欲數蓋知敗敬之道乎夫先王神道使人嵗時得一再為社廟之見故或生敬若厭見而習接之則褻者至矣褻則敗敗則禮樂盡廢今之淫祠則人人褻狎如兒女子之於鄙弱翁姑嘻笑淫戲鬼其饗之是敬狎皆偽也即此又可以見情惡根於性即又可以見性之不為全善故曰繼之者善也性不足以制情雖天下有修道之教吾恐後聖人亦將難之矣大抵世變江河今不可古故秦不得不變法法緣時而立者也後世之民敝民也為法三代之上或當先德禮三代之下當並先乎刑政矣刑政根於德教而後民知敬上敬上然後人知敬神畏天蓋民多貧貧則益智詐智詐結而神可以變亂是非所謂不待教之誅是故匪刑則教不可入黃叔度二誣辨徐應雷黃叔度言論風旨無所傳聞入明嘉靖之季崑山王舜華名逢年有髙才竒癖著天祿閣外史託於叔度以自鳴舜華為吾友孟肅之諸大父余猶及見其人知其著外史甚確自初出有纂入東漢文王舜華尚在而天下謂外史出祕閣實黃徴君著則後世曷從核真贋乎叔度故無弦琴曷橫加五弦七弦誣之也近復有溫陵李氏著論曰牛醫兒一脈頗為害事甚至互相標榜目為顔子自謂既明且哲實則賊德而禍來學其視國家將傾諸賢就戮上之不能如孫登之汚埋次之不能如皇甫規之不與下之不能興狐兔之悲方且沾沾自喜因同志之死以為名髙是誠何忍哉此鄉願之學不可以不早辨也噫此李氏有激而言也李氏嘗曰世固有有激而言者不必説盡道理明知是説不得然安可無此議論乎李氏蓋激於鄉原之與世浮沉也而移色於叔度竟不考諸史傳詳叔度之始末按朱子綱目於漢安帝延光元年冬書汝南黃憲卒當是時天下無黨人又四十五年為桓帝延熹九年捕司𨽻校尉李膺太僕杜密部黨二百餘人下獄遂䇿免太尉蕃永康元年六月赦黨人歸田里又三年為靈帝建寧二年冬十月復治鉤黨殺前司𨽻校尉李膺等百餘人史册之章明較著如此計諸賢之就戮去黃憲卒巳四十有八年矣夫諸賢之最激烈者莫若膺與滂膺且死曰吾年已六十滂之死年三十三溯黃憲卒之年李膺年十三范滂正未生故曰當是時天下無黨人蓋憲卒之十有六年而滂始生憲卒之三十有八年為延熹二年而膺以河南尹按宛陵大姓羊元羣始與時忤又七年而黨事起則黨人之禍於憲何與哉憲雖大賢安能救諸賢之就戮於身後之四十有八年耶豈謂當憲之時黨人有兆李膺雖幼而有長於膺者范滂雖未生而有先滂生多年者叔度曷不化誨之使不及於禍耶噫即使叔度與諸賢皆同時自孔子不能改一子路之行行以善其死而何以鈎黨百餘人責一叔度也豈謂不能維持國事使吾身沒四十年之後刑戮不加于善人耶則大樹將顛非一繩所維而何以責不就徴辟之一布衣也是故叔度之隤然處順淵乎似道無異孫登之默何以曰不能如孫登之汚埋當叔度之生存尚未有黨人之名何以曰不能如皇甫規之不與諸賢未至於就戮何以曰不能興狐兔之悲又何以曰其視國家將傾諸賢就戮方且沾沾自喜因同志之死以為名髙李氏之輕於持論如此不亦無上事而唾罵名賢盛德乎哉且叔度之為顔子為千頃波蓋諸賢之目叔度不聞叔度之目諸賢也何嘗互相標榜叔度稍以言論自見則為郭林宗叔度不死遭亂則必為申屠蟠總之必能保身何嘗自謂既明且哲夫以李膺之簡亢獨以荀淑為師乃牛醫兒年十四荀公一見竦然異之曰子吾之師表也以戴良之才高倨傲自謂仲尼長東魯大禹出西羌獨步天下無與為偶而見叔度未嘗不正容及歸罔然若有失也叔度蓋易之所謂龍德耶何以曰賊德而禍來學曰此鄉原之學也且李氏既惡鄉原矣顧於胡廣馮道有取焉何也蓋李氏竒人盛氣喜事而不能無事以濟世為賢而不以遁世為髙故喜稱胡廣之中庸馮道之長樂絶不喜叔度之無事今李氏書方盛行於世恐覽者不察也余故以綱目之大書特書者辨之雖然千頃汪汪萬古如斯澄之淆之河海不知余固辨乎其所不必辨而卒不能已於辨也周公不殺兄辨郝敬是非淆亂起於庸俗人之訛言而成於鄙儒之泥古好信周公殺管叔千古訛言大謬也尚書金縢之篇曰武王既喪管叔及其羣弟乃流言于國曰公將不利于孺子周公乃告二公曰我之弗辟我無告我先王蔡仲之命曰羣叔流言乃致辟管叔于商經義本屬明顯易解不必臆斷為大辟之辟自漢儒誤解金縢我之弗辟為刑辟孔書承訛撰蔡仲之命謂周公以流言致辟管叔而緣飾於左傳子産放遊楚問於遊吉對曰周公殺管叔蔡叔夫豈不愛王室故也夫左傳假托丘明虛誕非一事猶汲冢書謂益干啓位太甲殺伊尹武丁殺王季舜臣堯瞽瞍朝舜禹德衰孔子主癰疽之類好事橫議從來多有左傳與孔書轉相蒙蔽而世儒誤以金縢東為東征引詩東山附合大誥為討管叔朱元晦解詩遂云周公東征二年得管叔誅之作鴟梟貽王承襲殺兄之謬以金縢罪人斯得為公得管叔所由誤也今按金縢公居東為流言避位也詩東山則成王悔悟迎公歸而公奉王東征也時管叔已死而紂子在東方五十國挾紂子叛故東征討鴟梟釋取子之恨也三年而後事竣故詩曰自我不見於今三年孟子云周公伐奄三年討其君即此行也金縢記公居東二年耳與東征異管叔死於公居東之二年故曰罪人斯得非謂周公居東即討管叔也但言罪人斯得不言罪人叛亦不言王師討罪人蓋王與二公以計得之猶後世雲夢縳韓信千金購羽頭之類耳公不知知亦不能止當時所得惟二叔然禍實由武庚故公怨鴟梟而不罪兄不怨王但怨首禍者所以傷二叔也豈公自殺兄而反怨鴟梟乎殺叔者成王也無王命誰敢殺之公無如王何但斥鴟梟故金縢謂王未敢誚公王亦知公怨已而但不敢誚讓耳及其感悟迎公公歸乃大誥天下東征専為討紂子武庚伐奄平五十國故作大誥豈兄弟鬩牆至播告天下乎今其詞具在曰有大艱於西土我西土人亦不靜又曰若兄考乃有友伐厥子民養其勸弗救又曰惟大艱人誕鄰胥伐於厥室皆怨紂子詿誤二叔也及康叔東封又告曰勿或刑人殺人勿或劓刵人又曰弟弗念天顯兄亦不念鞠子哀又曰小臣諸節别播敷瘝厥君汝乃速由兹義率殺亦惟君惟長不能厥家人於無逸曰小人怨汝詈汝則信不寬綽厥心亂罰無罪殺無辜於立政曰孺子王矣其勿誤於庶獄凡諸告辭悽楚伊鬱皆深有懲於兄之死而怨王之率殺也故余於解詩書特詳之世儒未逹謂金縢大誥難解彼既以金縢居東為東征大誥為討管叔則事辭􅏓戾甚矣難解又何怪乎再觀公之繫易也追思文考蒙難與已遭讒正同於坎離中孚小過爻象情見乎辭蓋周本火德坎水為難故坎初象管叔二象公三象武庚四象二公五象成王六象東征離初二象箕微三象紂子四象管叔五象成王上象東征中孚初象育子二象監殷三象流言四象公避東五象王悔悟上象黜殷小過初象武庚二象公三象管叔四象蔡叔五象成王與二公上象二叔九五爻辭即用文考小畜之彖辭而曰公弋彼在穴在穴者同氣之象也取子由於鴟梟而關弓則二公與王也不能射鴟梟於髙墉而取黃口於在穴在穴者即恩育之子也其辭苦其情微余於問易詳之世儒反以為大義滅親夫非大義則已豈有滅親而可為大義者乎口舌相侵風聞曖昧雖中傷不過亡公一冡宰而汲汲澡雪八議不分推刃同氣其殘鷙不反甚於鴟梟乎必如左傳云王室之故夫二叔流言未嘗顯然稱兵犯王室也何遽討之公討必請於王王惑流言請必不許不請而討其惟莽操耳公不請而行為避位也故曰我之弗避無以告我先王原未請討既未討何緣得罪人公居東二叔亦在東二年之內成王疑公轉深殷頑不殄多士多方非盡二叔為梗也五十國皆叛二叔且奈何易云飛鳥以凶不可如何正此謂耳但二叔不靖如蝮蛇在手不暇愛腕此王與二公之意公在東二公在內機事隱密出其不意取罪人如磔鼠公焉得而止之此鴟梟所以作而世儒反謂公殺叔豈不寃乎司馬遷作伯夷傳曰學者載籍極博猶考信於六藝詩書雖缺虞夏之文可知今詩書有明徴還以誣詩書聖心昭如日星還以誣聖人終古夢夢誦詩讀書而不知其人尚論所以難也孟子曰規矩方圓之至聖人人倫之至無人倫何以為聖人小儒誦甲子問周公皆知其為聖人大儒通六籍語周公殺兄皆箝口不辨良心死公道滅是可忍也孰不可忍是非之心人皆有之今謂聖人殺兄則心疑疑而竟不察誣聖人何其決也謂無是事則心安安而竟以為疑信訛言何其堅也甚矣人情之難曉也余已解經又為之辨明文海卷一百十七
