body:
  text: 明文海卷一百十八餘姚黃宗羲編辨九昏禮辨陳確新婦初見朴庵叔為綺思昏新婦見欲先昭華叔祖辭曰先親者於是先爾宣叔祖他日以問確曰禮與曰禮幼先長可乎曰幼先長非禮也疏先戚亦非禮也故禮之悖於古者未有能善者也古者新婦三日而後見廟見舅姑而後會宗戚鄉黨僚友則何先長先戚之嫌之有吾拜吾父母而後受子婦之拜也禮與曰拜父母是也而受子婦之拜非也曾為父母而不得受子婦之拜與曰非不得受子婦之拜也而分祖父母父母拜之不可也且吾叔所謂受子婦之拜者南面者耶坐耶否耶曰奈何為父母受子婦之拜而不南面坐也曰此確所以為必不可者也禮父母在人子坐不中席新婦見是教禮之始也而先以非禮示之可乎祖父母在新婦見祖父母南面坐父母拜而左右侍命之坐然後坐而後新婦拜而饋食焉何分祖父母父母之有有授之者乎未有所受也然則子何以知之以廟中之位知之無祖父母之父母猶別子之祖南面焉可也有祖父母之父母猶繼別之宗昭穆焉可也推而上之雖髙曽咸在焉禮未有易此者以家無二南面焉者也若見於私寢雖先舅姑可舅姑又率之以見於祖父母中堂則否凡新婦初見必中堂喪禮辨微陳確弔者之不飲酒食肉也從孝子水漿不入於口推之也不然則儉孝子之不送客也從朝夕苫塊推之也不然則慢去年張尹來有父喪確弔之而出尹來送確辭曰非禮也尹來曰敢問孝子之必不送客何義也曰孝子之守親喪也寢於斯哭泣於斯杖而後能起曾不能離此苫塊之咫尺也則何忍以客故奪之也故不送也且孝子之不送客也非不送客也有代之送者也雖不送客庸非禮歟今之孝子則不然他日則無所不至及客以吾親故來弔反褁足不出門而又無代之送者而曰吾將以行禮也則失其義矣尹來泣而謝曰然友不孝嘗以無僕役躬出市買物矣敢不送客於是遂送客至河滸茍孝子之未能食粥也雖列饌以羞賔可也未能朝夕不離喪次也雖送客可也然則子之出弔而必不用酒肉何也曰弔者亦有一日之喪而不能忍歟且吾亦何遑逆孝子之必不以禮自持也答翼兒不脫衰問季武子寢疾蟜固不脫齊衰而入見君子以為禮今翼有大功之喪而素服出問疾夫子何罪之深也曰吾未見子有功之喪也翼曰何哉夫子之出此言夫蓋君子之居喪有內服有外服外服衰絰之謂也內服非衰絰之謂也古君子之執親之喪也悲哀不忘於心食粥寢苫便已者而無敢徇焉故雖不便於人者而弗遑顧焉衰而見不亦可乎今之學者惟知恕其不便於己者而不知恕其不便於人者故不可也吾見子之飲酒矣寢於內矣無功之喪亦已久矣而曰何哉夫子之出斯言也蟜固能守禮議脫衰於私門非禮也不脫衰而見遂可以為禮乎哭武子非情也倚門而歌可以為情乎記者蓋交譏之君子不見亦不歌昔者吾邑之故諸生之見邑長以揭帖後之守禮者執用刾確曰用刾正矣雖然不若不見之更為正也禮三年之喪無外事曾子齊衰而弔友君子猶或非之况齊衰而問疾乎雜記疏衰三年之喪既葬人請見之則見不請見人權臣之門豈少問疾者雖無親喪不入可也注美其能守禮非黜佛事辨石丈之母之喪潮生為相而黜佛事爰立疑之曰母生而好佛死而黜之事死如生之道然與曰然喪者之有相也知有禮焉耳禮所有者行之所無者弗之行也雖孝子不得過而問焉且子以查母之好佛為是耶非耶非也而為人子未能勸止猶不免非道事親之譏况母既死矣而又無成命而又託於母以為之是益其過而已矣今雖有儒者生而好學不聞死而又使人誦書以樂之也况佛事之誕妄者乎且母之好佛非真好之也惑於浮屠家言而姑聽從之也云耳使知其非道焉則弗好之矣故惑之與正之二者功罪之相去遠矣生而順之未能喻親於道死而黜之使母得正其終雖使人子斷行之吾猶以為孝也而况相者之志乎喪服妄議父在而其子有母之喪非母之喪也妻之喪而已矣祖在而其孫有父之喪非父之喪也子之喪而已矣期而除之無終三年之服焉禮也禮君子不奪人之喪而奪其子與孫之喪乎曰其子與孫之服除外不除內三年之中不昏不宦飲食寢處無敢越於喪制憂戚之勿忘焉何奪人喪之有故母服之同父服非禮也生母之同適母謂庶子為所生母非之非者也失禮甚矣况庶母而杖期何居嫡庶議春秋之義甚嚴嫡庶蓋君臣父子夫婦之倫於是焉係嫡庶亂則君臣父子夫婦兄弟之倫亦亂故明主重之逮乎後王全以私情絀公義推已及物俾大夫士庶並得為生母行三年喪至於今不易不亦異哉夫私情之不可以絀公義久矣故以情則生母之恩遠過嫡母豈惟同焉而已以分則嫡母之尊遠過生母豈惟不同焉而已故庶母謂嫡母主母謂父主君尊卑之分截然今而同之亂倫蔑理莫此為甚必欲遵時王之制為生母行三年之喪者確亦有説以處此曰可行之於身不可行之於家雖可行之於家謂庶長子而無父與嫡母者不可行之於鄉黨死不訃葬不告期不當開喪如父與嫡母之喪雖時王之制君在不聞為太子之母妃喪况大夫士庶乎正其為母後然後可正其為母之喪妃之子為天子必尊其所生妃為太后故薨則為太后之喪當其為妃雖太子之貴不能使天下喪之也士庶之母妾則終妾婢則終婢已耳孰尊之而孰喪之喪之實在身親喪固所自盡其名在家國天下王喪天下如喪考妣諸侯行之於國大夫行之於家喪之實在心其名在功期三年不用浮屠伊川先生家治喪不用浮屠在雒亦有一二人家化之今吾鄉之不用浮屠者何翅一二家要有其本非止不用浮屠已也子言喪禮之本與易寧戚非取不易也然戚尚矣得毋微存矯飾而非用吾情者乎用吾情矣得毋一往而過幾於滅性乎不易猶可而易之反為亂其可乎是皆不可不察雖子言之猶三纍而後至於中焉道固未可以一言盡也凡事盡然惟戒懼君子自得之耳若以用浮屠為非禮而即以不用浮屠為能盡禮則可笑矣譬之殺人為盜固未可而止於不殺人不為盜者亦豈遽有所可耶為人後而復歸者為所後服議吳裒仲幼嘗與從兄仲木同為緑野後受田五百踰二十年矣而復辭之而歸其田以有仲木之為後故也所後之母之喪裒仲問服於陳子陳子曰古未有言之者也雖然將退而就子之本服則不可必也其加服乎或曰先王之禮不可以妄有加也蓋服緦麻之本服而心喪三年焉耳陳子未有難之也既而思之曰皆非也必期年非加也降也本生之降服也何以知其必同本生之降服也易知也三年同則出反之降服亦同奚疑乎且夫父母之名不可以妄稱也亦不可以妄奪也故雖出為人後而於所生不敢曰伯叔父母曰族父母而必曰本生父母則雖出而復歸而於所後亦不敢曰伯叔父母族父母而必曰嗣父母今之稱所後為嗣父母者非也推而遠之之詞也父母則父母耳何嗣之與有以為之後而復歸者之稱斯可矣同有父母之名名隆則服從而隆於期為己降矣而何功緦之可言茍本緦麻而緦麻之本無服而無服之亦可歟或曰何為而不可所生恩重故一降不再降謂以親兄弟之子為後者為本生固當期矣而一從再從與袒免以下之子為後者為本生服皆期而不遞降也所後恩輕歸則已絶矣雖遞降而至無服可矣陳子曰輕則何以為人後服服必三年也重故也所生恩重所後義重且恩生義義亦生恩何輕重之有故正服皆三年降服皆期禮也雖先民未之嘗言焉有以知其必然也且是二者謂兩降服皆禮之變也惟變故為必不可變以節之又變之將不勝變亦謂親兄弟及一從再從與袒問以下之異故為人後者為所生期親期踈亦期疏謂一再從而下無可復降之道也後而復歸者為所後期親期疏亦期無可復降之道也為人後者為生母服議議者有謂人後不喪生母故論之禮為人後者為其私親皆降一等惟本生父母降服期心喪三年詳觀禮文仍是降而不降之意蓋不得不降者義也降而不忍降者情也然禮所謂本生父母乃是嫡母繼母皆有為之三年者故降生母異是有有兄弟之生母有無兄弟之生母有兄弟之生母固本生降期之條不待言矣無兄弟之生母則非本生兄弟之母而為人後者之母也奚辭而不喪與古無為生母三年者有之自近代始前者不可考至朱子家禮儒者推為禮義之宗八母圖生母固三年矣然猶齊衰而己耳逮洪武五年竟改斬衰至於今莫更斯則禮之過厚者也雖然禮所不許而情有不能已者人子猶思自盡焉况禮之所許乎禮許之矣或所後父母皆在人子不能徑情直行則殺其外文而死不訃葬不告期位不中堂可也若夫三年之中不飲酒食肉不內寢不干進衣則外熟布內生布哀戚之不忘焉此非所後之得制者也矧其在所後父母之喪之後者乎王子有其母死而欲終喪不得原之曰不得哀之也指之曰其母則固親之也蓋雖壓於嫡母可曰非其母與故曰豫也有三年之愛於其父母乎一則曰其父母一則曰其母皆不待其辭之畢已使人惻然心動今雖為人後生母非其母而誰母與家禮庶子為其母三年為父後則降為父後降則為人後亦降不待言而可知也至洪武定制已無為父後降之文矣不為父後降亦必不為人後降不待言而可知也豈惟生母無降雖出母嫁母慈母養母乳母之服亦皆無降也出母嫁母之不降一降不再降者也謂固己降期矣慈母養母乳母之不降無所疑故也蓋不降本生父母則疑於並所後父母不降慈母養母乳母不疑於並所後父母即嫁女降父母而不降父母以上之義也慈母養母之恩則不能兼生而生母之恩實兼慈與養故慈母養母之視生母恩故已殺矣猶皆斬衰三年而不云為人後降况生母乎雖降期之本生父母有本生兄弟為之三年矣而為人後之仕者猶為之請假治喪三年始補選豈惟父母雖伯叔兄弟之喪猶得請假况獨子之生母更莫之三年者乎故不降期固不可不喪而降期亦不可不喪豈惟三年期雖緦麻焉袒免焉猶不可以不喪也喪有無後無無主無五服之親則袒免以下者為之喪無族黨則友朋鄰里以為之喪今所生子在也而莫為之喪可乎豫宣欲短喪猶見誅孔孟况不喪乎孔氏之不喪出母自白也始然不曰自白始而曰自子思始不忍言白始也今曰為人後之不喪生母自其子某始忍言之乎不忍言之而忍為之乎其母元隨本生父居而未嘗就養其子者死則何如曰本生父主之斂於本生葬於本生子歸為位而終喪雖父死而迎養者亦反葬或其母雖生數子而皆為人後者宜何喪曰所養子喪皆不養則長者喪之可也長以下則同本生降心喪三年斯不易之禮乎曰小子何敢言禮蓋推本時制而云然或曰生母服議雖推本至情然禮無不降生母之文而子創為此議無乃徇私情而害公理與曰何敢然也天下豈有離情之理耶凡僕所言皆參情與理之中而云耳夫為人後者非樂為人後也痛其無後故也故凡無後者皆天下之大痛也烏有謀人後而先絶所生之後之理乎夫不後吾父母而後伯叔父母此情之所不忍言也然吾父母多後而伯叔父母無後亦情之所不忍言也故不得己而分所後以後之故雖為人後而吾父母固有子矣惟生母則有子無子未可知之辭也未可知則必為可知以一之曰有二子則降無二子則不降禮雖無明文焉有以知其必然也人情莫􅉃於無子尤莫􅉃於有子而無子禮諸姑及姊妹雖嫁無子者並不降不降諸姑姊妹之無子而反降所生母之有子而無子者與今雖不降生母而養於私喪祭於私謂私室私廟如事適母之禮焉何嫌於所後而云害公理乎所後先亡則斂於寢祭於寢同日祭於别室禮兄弟之子猶子也則兄弟之母猶母也適子衆子既皆為之杖期可謂非其子其母與而必奪為人後之子而子之母之何與曰所謂有子之庶母杖期者惟其子之而母之故謂之有子之庶母也今必不許其子之而母之直一無子之父妾己耳尚得謂有子之庶母而杖期之乎夫禮循名而責實者也故奪其所生子則并奪其適子與衆子矣而復何庶母之有所謂禮權親疏輕重而為之制者也今且無言奪其適子與衆子也不降也即降矣不奪矣而庶母與生母孰親並期與心喪三年之期孰重喪從其所親親從其所重重從其所専一則必不於適子衆子而於其所生子矣况不降乎奪乎或又曰子前議禮甚嚴嫡庶聞者快心今議生母之服而忽反之何也曰非所謂反也前議為君與父言今議為臣與子言故然也君主法以一臣民父主義以一妻子有不可茍徇者臣與子則兢兢惟禮法之守不敢過亦不敢不及安可同乎今學士大夫已事事從俗而於為人後者獨引古禮以絶其所生則不通矣蓋庶母之嫌嫌於並嫡不嫌於並後今適母繼母在為生母固斬衰三年矣避為父後不避為人後今不為父後降矣不降並存之適父母而降兩亡之所後父母此禮之不近人情者故不容不議也蓋子為人後猶女為人婦嫁女降父母而不降高曾祖父母又為兄弟姪之妻不降兄弟之為父後者不降又雖嫁而無夫與子者並不降則知雖為人後亦必有所不降凡禮無明文而可以意求者此類是也時制既重生母則就時言時有當然耳若夫嫡庶之嚴在三代以上者此神聖之制作天造地設豈容以私意增減其間如用之吾從古明文海卷一百十八
