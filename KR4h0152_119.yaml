body:
  text: 明文海卷一百十九餘姚黃宗羲編考一周正考趙汸春秋雖修史為經猶存其大體謂始年為元年嵗首為春一月為正月加王於正皆從史文傳獨釋王正月者見國史所書乃時王正朔月為周月則時亦周時孔氏謂月改則春移是也後於僖公五年春記正月辛亥朔日南至昭十七年夏六月記太史曰在此月也日過分而未至當夏四月是謂孟夏又記梓慎曰火出於夏為三月於商為四月於周為五月皆以周人改時改月春夏秋冬之序則循周正分至啓閉之候則仍夏時其經書冬十月雨雪春正月無冰二月無冰及冬十月隕霜殺菽之類皆為記災可知矣汲冡周書有周月解亦曰夏數得天百王所同商以建丑為正亦越我周作正以垂三統至於敬授民時巡狩蒸享猶自夏焉其言損益之意甚明經書春蒸春狩夏搜以此蓋三正之義備矣而近代説者往往不然夫以左氏去聖人未逺終春秋二百四十二年以及戰國之際中國無改物之變魯未滅亡傳於當時正朔豈容有差而猶或有為異論者何也蓋嘗考之曰殷周不改月者據商書言元祀十有二月而秦人以十月為嵗首曰夏時冠周月者則疑建子非春而孔子嘗欲行夏之時也按太史公記三代革命於殷曰改正朔於周曰制正朔於秦曰改年始蓋正謂正月朔謂月朔何氏公羊注曰夏以斗建寅之月為正平旦為朔殷以斗建丑之月為正雞鳴為朔周以斗建子之月為正夜半為朔是也殷周即所改之月為嵗首故曰改正朔曰制正朔秦即十月為嵗首而别用夏時數月故曰改年始其言之已詳漢書律厯志據三統厯商十二月乙丑朔旦冬至即書伊訓篇太甲元年十有二月乙丑朔伊尹祀于先王以冬至越茀行事其所引書辭有序皆與偽孔氏書伊訓篇語意不合且言日不言朔又不言即位則事在即位後矣凡新君即位必先朝廟見祖而後正君臣之禮今即位後未踰月復祠於先王以嗣王見祖此何禮也暨三祀十有二月朔奉嗣王歸于亳是日宜見祖而不見又何也所謂古文尚書者掇拾傅會不合不經蓋如此説者乃欲按之以證殷周不改月可乎又言後九十五嵗十二月甲申朔旦冬至無餘分春秋厯周文王四十二年十二月丁丑朔旦冬至後八嵗為武王伐紂克殷之嵗二月己其晦大寒閏月庚寅朔三月二日庚申驚蟄周公攝政五年正月丁巳朔旦冬至禮記孟獻子亦曰正月日至七月日至其説皆與傳合夫冬至在商之十二月在周之正月大寒在周之二月驚蟄在三月夏至在七月而太初厯其在立冬小雪則曰於夏為十月商為十一月周為十二月唐人大衍厯追算春秋冬至亦皆在正月孰謂殷周不改月乎陳寵曰陽氣始萌有蘭射干藝荔之應天以為正周以為春陽氣上通雉雊雞乳地以為正殷以為春陽氣已至天地已交萬物皆正蟄蟲始振人以為正夏以為春蓋天施於子地化於丑人生於寅三陽雖有微著三正皆可言春此亦厯家相承之説所謂夏數得天以其最適四時之中爾孰謂建子非春乎乃若夫子答顔子為邦之問則與作春秋事異蓋春秋即當代之書以治當代之臣子不當易周時以惑民聽為邦為後王立法故舉四代禮樂而酌其中夫固各有攸當也如使周不改時則何必曰行夏之時使夫子果欲用夏變周則亦何以責諸侯之無王議桓文而斥吳楚哉何氏哀十四年傳注曰河陽冬言狩獲麟春言狩者蓋據魯變周之春以為冬去周之正而行夏之時以行夏之時説春秋蓋昉於此然何氏固以建子為周之春但疑春不當言狩而妄為之辭至程子門人劉質夫則曰周正月非春也假天時以立義爾則遂疑建子不當言春此胡氏夏時冠周月之説所從出也先儒見孟子謂春秋天子之事而述作之旨無傳惟斟酌四代禮樂為百王大法遂以為作春秋本意在此故番陽吳仲迂曰若從胡傳則是周本行夏時而以子月為冬孔子反不行夏時而以子月為春矣何氏之失又異於此故子朱子以謂恐聖人制作不如是之紛更煩擾錯亂無章也薛氏又謂魯厯改冬為春而陳氏用其説於後傳曰以夏時冠周月魯史也是蓋知春秋改周時為不順而又移其過於魯爾然謂魯有厯實劉歆之誤按律厯志言劉向所總有黃帝顓頊夏殷周厯及魯厯為六厯自周昭王以下無世次故據周公伯禽以下為紀自煬公至緡公冬至殷厯每後一日則由厯家假魯君世次逆推周正交朔之合否因號魯厯非魯人所自為明矣宋書禮志又言六厯皆無推日食法但有考課疏密而已是豈當代所嘗用者哉劉歆惑於襄哀傳文遂謂魯有司厯而杜氏因之謬矣然説者亦自病夏時周月不當並存故直謂春秋以夏正數月又疑若是則古者大事必在嵗首隱公不當以寅月即位其進退無據如此固不足深辨而惑者猶以為千古不決之疑則以詩書周禮論語孟子所言時月不能皆合故也夫三正通於民俗久矣春秋本侯國史記書王正以表大順與頒朔告朔為一體其所書事有當繫月者有當繫時者與他經不同詩本歌謡又多言民事故或用夏正以便文通俗書乃王朝史官託言之體或書月則不書時或書時則不書月况偽孔注二十五篇決非真古書其有合有否皆不可論於春秋周禮所書正月正嵗皆夏正也諸官制職掌實循二代而損益之其著時月者又多民事與巡狩蒸享自夏者同故仍夏時以存故典見因革蓋非赴告策書定為一代之制者皆得通言之則又不可論於春秋矣若論語言莫春亦如詩書言春夏皆通民俗之恆辭也不可據以為周不改時孟子言七八月之間旱十一月徒杠成十二月輿梁成在左傳後則周改月猶自若竹書又記晉曲沃莊伯之十一年十一月魯隱公之元年正月也竹書乃後人用夏正追録舊史故與春秋不同然亦未嘗輒以夏正亂春秋之時月也蓋殷周改時月與所損益只是一理如尚齒之由貴德而貴富貴親親迎之由庭而堂而户大事之由昏而日中而日出之類皆是迭進法所以順天道通世變在當時自不為異故孔子以為百世可知非徒曰以易人之觀聽而已彼秦人以三代為不足法既不足以知之而後之蔽於今而不知古者亦不足以言之也自啖趙而後學者往往習攻左氏而王周正為甚以其尤害於經特詳著焉詩考程敏政按孔子刪書凡百篇刪詩凡三百五篇皆遭秦火而絶漢興罷挾書之律經生學士乃敢掇拾於煨燼之餘料理於記誦之末而書之所出者非一時所得者非一手參互考定為五十九篇亡者幾半而識者尚不能無真偽之别今古文之疑也詩也者與書同禍漢初傳者有齊魯韓毛四家而三百五篇完整如舊其藏之何所授之何人此固已不能不啓人之疑矣三家亡而毛氏獨行子朱子從而為之集傳其深闢小序之非有功於學者甚大而愚者讀之猶有所不能領解者非立異也無當於心而不敢以自欺也劉歆傳云文帝時詩始萌芽皆諸子傳説至武帝然後鄒魯梁趙頗有詩禮春秋一人不能獨盡其經或為雅或為頌推此意也則知今詩乃出於漢儒之所綴輯而非孔子刪定之舊本矣詩之名始見於虞書曰詩言志歌永言聲依永律和聲大抵古詩皆樂也詩雖有風雅頌之分而皆主於樂亦猶易雖有辭變象之别而皆主於占也古者胄子之教過庭之訓皆於詩乎得之所謂養其良知良能者也而今之詩乃取夫狎邪淫蕩之詞雜乎清廟生民之列言之汙齒頰書之穢簡牘師何以授之於徒父何以詔之於子而况聖經賢傳之旨本以為治性養心之具曰非禮勿言非禮勿聽也曰口不道惡言耳不聽淫聲也其嚴如此詩也者心之聲而發乎性情者也孔子刪而定之放其鄭聲以為萬世之常經顧乃有取於斯則其所刪者為何詩而其所放者又何聲哉或曰古者太師陳詩以觀民風故美惡不嫌於兼取也是大不然陳詩觀風不過曰某地之詩其可傳者若干如二南之類則其風之美可知也某地之詩其可以示戒者若干如刺淫之類則其風之雜可知也至於某地之詩無可采者則其風之惡亦不言而喻矣豈必以其狎邪淫蕩之詞而盡陳之哉且詩者求治之一端爾其他之可以觀民風者固多也施於政麗於刑而見於官府之文法者何限謂參之詩可也而必求之詩可乎亦恐先王不為是之迂也大槩小序不當以淫者自作之詞為刺淫故未子辭而闢之然刺淫二字則實古者講師授受之言得之孔門而不可誣者何哉漢儒徒見三百五篇之目散軼不存則遂取孔子所刪所放之餘一切湊合以足其數而小序者不察亦一切以其得於師者槩之曰刺淫此其所由失也未子闢之是也然集傳則又以孔子鄭聲淫之一語為主凡鄭風之中小序以為懼讒思賢刺廢學而閔無臣者皆舉而歸之淫則亦未免於矯枉過直者矣夫諸詩既無指名又無證佐茍以善心逆之則淫可以為雅以不善之心逆之則雅可以為淫漢儒故有以二南為刺詩者矣説詩者豈可棄其已然之疑信者而以臆見懸斷之哉由是觀之刺淫之詩乃孔子之所必存者也淫者自作之詩則孔子之所必刪者也古今人情不大相逺而理之在人心者無古今也如有以狎邪淫蕩之詞與伊川擊壤之集朱子感興之詩俱收而並録之日與學者講肄而誦習之曰此將以示勸也彼將以示警也其不以為侮聖言者幾希又日以之敷陳演説於講幃經幄之前曰此將以示勸也彼將以示警也則下流於不敬而蹈誨淫之轍上以為故常而啓效尤之心其賊經而害教有不可勝言者矣或曰春秋亦孔子之筆而所載者多篡弒淫亂之迹以為不如是不足以垂法立戒云爾詩之所存亦此意也是尤不然詩之與史其體截然不同也故稱孔子者於春秋曰修修則有褒貶之義焉其法不容於不備也於詩曰刪刪則有放鄭聲之義焉其法不容於不嚴也集傳云深絶其聲於樂以為法而嚴立其詞於詩以為戒愚以為詩與樂無二道也茍易詩之一字以為史則垂法立戒之義兼舉而益明矣或曰胄子之教過庭之訓太師之陳亦取其善者爾其不善者則姑置之以示戒而不以教不以訓不以陳也如此則直詩爾亦何煩於聖人之刪而謂之經哉其不然矣詩之為教蓋無出溫柔敦厚思無邪之兩言茍去淫者自作之詞而存刺淫之作則其説可通也不然求其説而不得不失之過則失之不及而聖人刪詩放鄭聲之意終不白於後世矣未子學孔者也以為此經實出聖人之所刪定故深闢小序之非少祛學者之蔽而豈逆漢儒之欺哉漢儒亂大學矣而朱子訂其章句漢儒亂周易矣而朱子訂其經傳漢儒壞禮與樂而朱子編三禮不究其義集詩傳僅止於此是漢儒之幸而後學之不幸也噫取狎邪淫蕩之詞垂萬世而為經其罪大且久矣今故重加抉擲别為此編雖極僭踰不敢逃避者非立異也無當於心而不敢以自欺也亦果於非漢儒而篤於尊聖經云爾聖裔考程敏政先聖之後凡嗣爵奉祀者謂之大宗子宗法在禮不可不慎重而考諸史籍則因襲之間尚有可議蓋自先聖一傳為泗水侯再傳為沂國公沂國五傳生順仕魏以孔子後封魯國文信君蓋聖裔之受封始此順生三子長曰鮒秦封魯國文通君又為陳王博士次曰騰為漢長沙王太傅次曰樹而鮒騰之後分為兩宗鮒六世生何齊成帝時梅福上書言孔子殷人宜封其後以奉湯祀遂封何齊為殷紹嘉侯尋進爵為公地滿百里此一宗也騰四世生霸元帝時賜號褒成君奉孔子祀此一宗也然則紹嘉公乃大宗褒成君乃小宗何齊生安光武時嗣爵又進封宋公為漢賔位諸侯上霸三世生均平帝元始初進封褒成侯均再世生損和帝永光中徙封褒尊侯至獻帝初國絶蓋兩宗至於漢亡俱失傳矣魏文帝黃初中復求先聖之後得議郎羡賜爵宗聖侯傳再世生震晉武帝泰始初改封奉聖亭侯震再世生懿隨元帝南渡居會稽孔氏自此復分南北兩宗懿生解宋文帝元嘉八年以罪奪爵十九年以隱之嗣隱之復以子不道失爵二十八年以惠雲嗣又以重疾失爵孝武大明二年以邁嗣邁傳其子荂亦以罪失爵此南宗也後魏時求先聖之後得二十七世孫乘以為崇聖大夫孝文太和中改封其子珍為崇聖侯珍三世生渠北齊文宣帝改封恭聖侯入後周宣帝進封鄒國公渠再世生嗣哲隋煬帝時改封紹聖侯此北宗也然則從元帝南渡者為大宗受北魏所封者為小宗南北兩宗至於隋亡又并失傳矣唐太宗貞觀十一年始得先聖之後德倫賜爵褒聖侯德倫再世生燧之玄宗開元中進封文宣公傳七世生光遭五季之亂失爵為泗水令有灑掃户孔未欲冒襲封盡殺諸孔氏光妻生子仁玉方九月遂祕養之後周時乃得嗣爵入宋而卒至太平興國中復召仁玉之子宜嗣封宜再世生聖祐無子以弟宗願嗣仁宗嘉祐中以祖諡不可加後人改封衍聖公宗願傳若蒙哲宗元祐初改封奉聖公若蒙坐事廢以弟若愚嗣復為衍聖公若愚傳其子端友從髙宗南渡居衢州孔氏自此又分南北兩宗端友傳四世生洙以宋亡失爵此南宗也偽齊劉豫自濟南僭位得先聖四十九代孫璠賜爵衍聖公豫廢金因之璠三傳生元措金末崔立作亂降元遂并俘元措以去此北宗也然則從髙宗南渡者為大宗受劉豫所封者為小宗矣元措入元而卒乃召洙俾嗣爵固讓歸衢州仁宗延祐四年召中書定議先聖五十三世孫當嗣封者遂得元措宗人思晦以聞思晦受爵以卒因子貴追封魯郡公蓋今之為大宗子者皆思晦之後矣作聖裔考測影臺考程敏政按周禮以土圭之法測日景凡立五表其中表在陽城即今登封東南告縣舊治是也豫至其地有二臺存焉其南一臺琢大石為之上狹下濶髙丈餘廣半於髙中樹一石碑刻曰周公測景臺臺北三丈所復有一臺約髙三丈餘壘磚為之其北之中為缺道深廣二尺許下列石為道直達於北約五丈許石上為二小渠渠側刻尺寸甚精密最北一石為二小竅以出水詢其土人云故老相傳為量天尺又以為銅壺滴漏考之縣志此名觀星臺亦周公所築然豫見其刻尺寸所書特今文耳恐非出於周公况歷代律書言尺度者亦未嘗言及陽城測星臺尺蓋不可信恐惟石臺乃周公遺迹所謂觀星臺者則後人因而建耳且其地嘗置金昌府治乂嘗置告縣治建斯臺者豈其時耶又按禮疏四方之表各去中表千里豫以禹迹圖考之南表當在郢之北東表當在遼之東北表當在肅之北西表當在華之西南終南山之東今其地不知亦有遺迹在否姑記茲臺之制以備恭考禘祫考王道夫禘祫者天子諸侯宗廟之大祭也周衰禮廢其詳不可得聞而義意之見於傳記者諸儒又從而汨之是以其説不得大明於世夫先王制禮建宗廟而事之以禘祫後世禘祫之義不明而宗廟之制因以不定宗廟之制不定則禘祫之行乎其間者紊亂煩復名實乖刺非復先王之意而報本追逺之義亡矣甚可惜也愚嘗考之諸儒之論聚訟紛紛雖若不一而其大端有二鄭康成混禘祫為一而惟求之於五年再殷祭之中故謂祫大禘小二祭相因並為盛祭凡説之近乎此者皆主康成者也趙伯循判禘祫為二以祭其祖之所自出而以其祖配之不及群廟之主者為禘以大合祭如公羊傳所云者為祫而謂天子有禘有祫諸侯有祫無禘凡説之近乎此者皆主伯循者也康成之説支離纒繞誠非禮意楊信齋諸人攻之掊擊抉摘無餘藴矣然詳考大傳之文參之儀禮喪服子夏傳而斷以程子之説則伯循所見亦非先王制作之本意所謂齊則失矣而楚亦未為得也按大傳曰禮不王不禘王者禘其祖之所自出以其祖配之諸侯及其太祖大夫士有大事省於其君干祫及其髙祖子夏傳曰都邑之士則知尊禰矣大夫及學士則知尊祖矣諸侯及其太祖天子及其祖之所自出此二條者更互發明是禘祫之義見於傳記可得而推尋者也所謂王者禘其祖之所自出以其祖配之云者即天子及其祖之所自出也及云者自此而盡乎彼也蓋謂王者推其太祖所自出之帝於太祖之廟正東向之位而太祖暫就昭穆之列總率有廟無廟之主以共享於其前故曰配而謂之禘禘者諦也以審諦昭穆為義也以審諦昭穆為義則合食在其中矣其曰諸侯及其太祖云者謂諸侯殺於天子無所自出之帝惟大合有廟無廟之主於太祖之廟而祭之公羊氏所謂毁廟之主陳於太祖未毁廟之主皆升合食於太祖是也是之謂祫祫者合也正以合食為義也天子言禘其祖之所自出而諸侯不言祫及其太祖者通下干祫之文而互見之也干祫云者謂大夫士則又殺於諸侯無太祖亦不得祫惟嘗有功德見知於其君許之乃得合祭及其髙祖而已故謂之干祫干者逆上之名以其上干諸侯之祫也由此言之合祭祖宗一也天子盡其祖之所自出而止則為禘諸侯盡其太祖而止則為祫天無二日民無二王天子之禮不可干也故曰不王不禘諸侯雖尊亦人臣爾其禮可通於下也故大夫士有可以干其祫者蓋以位有尊卑故祭有逺近而名有異同程子以一言蔽之曰天子曰禘諸侯曰祫其禮皆合祭也可謂至明白矣趙伯循單托王者禘其祖之所自出以其祖配之一語立説而不察其通章對舉禘祫之意蓋考之有未精也且禘之為禘本以審諦昭穆得名而爾雅又曰禘大祭也若惟以始祖配所自出而不兼羣廟之主則既無昭穆可言而寂寥短簡亦已甚矣尚何足以為大哉傳説曰禮煩則亂事神則難今既不以合食言禘則不得不取諸侯之祫以補天子之禮而祫又有大祫時祫此外又有時祭則是天子宗廟之中有禘有祫有時祫有時祭一歲之間僕僕焉幾無虛日縻費貨財妨奪政事固不待言而先王神明祖考之道恐亦不如是之煩且黷也其不然可知矣或曰天子曰禘諸侯曰祫魯諸侯也春秋有禘有祫何也曰春秋未嘗言祫言祫者公穀諸儒之失也禮不王不禘魯以成王之賜得用天子禮樂故以禘代祫然非禮矣故曰魯之郊禘非禮也周公其衰矣魯既以禘代祫遂為常祀春秋不能悉書則書其失禮之中又失禮者以詳事變而僭竊之罪亦因以著然有書禘者有書大事有事者有書從祀者先儒謂義在用禘則書禘義不在禘則書事是也左氏去春秋之世未逺而又嘗見國史故於有事武宫及從祀先公之傳皆以禘言其必有所據矣公穀惟以諸侯待魯而不究其當時僭竊變亂之詳故以禘為禘以大事為大祫有事為時祫然不知魯實無祫也漢儒因之而禘祫之混亦自此始矣故曰春秋未嘗言祫言祫者公穀諸儒之失也蔚廢代城考尹耕蔚城東二十里許有故墟焉俗呼代王城周回二十五里九門遺趾俱在金波泉發源其北夾城東南流即搜神記所謂始築時亡西南板於澤中自立者也長老曰蓋昔有代王者居是城與燕約相救置傳鼓為信敵大入傳鼓燕救不至代王出奔國為墟又曰廢城南數里小山即鼓臺也余尋之果然今仍名擂鼓堝其言有證矣而竟不知所謂代王者何人也一統志曰蔚東有代王城即漢代縣故城文帝封代居此郡舊志亦云夫文帝封代固矣約燕相救敵至出奔文帝無是也史記曰文帝都晉陽遷中都其幸太原也復晉陽中都三嵗租而蔚無聞焉又文帝分其故國王二子武為代都晉陽參為太原都中都皆即其故都而蔚不與焉然則謂蔚之廢城為文帝所居可乎廢城非文帝所居而誣文帝以被敵出奔可乎文帝自代入奉宗廟其故都亦必培植以示不忘而謂遂為墟可乎及考之髙帝紀十一年下詔曰代地居恆山與他境接壤數有邊患難以為國頗取南太原之地益屬代代之雲中以西為雲中郡則代受邊冦益少矣乃立子恆為代王都晉陽後遷都中都夫蔚廢城代故都也漢髙衆建王喜因之其謂數有邊冦難以為國者以喜之奔還也頗取山南太原之地益屬代則代南矣雲中以西為雲中郡則雲中不屬代矣漢又有代郡則代亦不屬代矣代不代而存其名此後人之所疑也是故知文帝之封代而不知其未嘗至蔚也知晉陽中都之復租而不敢援以為證也知文帝之未嘗被敵出奔而不敢為之辨也附會之説紛然矣且王喜之封也與盧綰同時草昧之際披荆棘立城邑日不暇給燕代與國土壤接近則相為救也必矣燕救不至王喜出奔長老所傳信而有徴也鑒王喜之失國而徙都因代之南徙而置郡此髙帝之籌而代因之南也一統志郡志不詢長老之詳不考史文之實不稽十一年之詔見一代王城遂指為文帝不亦惑哉又擂鼓堝在廢城南更東南則為蔚之九宫口由此百六十里可以達易今道雖湮塞而問之樵人可知也史言盧綰王燕時都易則所謂傳鼓者不愈信矣乎噫子長足迹遍九州其以是夫代國考尹耕考之代自入漢以來其國數易大抵有三曰山北也山南也山東也山北之代舊國也始於商湯歷代因之是故齊桓之所服趙襄之所并代成安陽之所封公子嘉之所奔趙歇陳餘之所王夏説之所守劉喜之所棄陳豨之所監皆是也所謂蔚之廢城也山南之代徙都也始於髙帝十一年分山北為郡而稍割太原地益之以自為國是故文帝之始封中年之所徙入繼之所自臨幸之所復以及子武子參之所分後武徙淮陽子參之所合皆是也所謂晉陽中都也山東之代再徙也始於武帝元鼎中漢廣關以常山為阻徙代於清河後王莽繼絶改號廣宗是故王義之所都子年之所廢如意之所復皆是也所謂清河也語其都則始為代繼為晉陽中都終為清河前後三變也語其號則始為代繼為代太原復為代終為廣宗前後四變也故夫凡言代王代相國其在文帝以前者為吾土而以後者否凡言代郡代守尉則上自趙秦下終兩漢皆吾土也執是以往可無迎刃於古牒矣代郡考尹耕夫代國之故按考可知也代郡紛紛為論不一則後之人疑焉蓋有謂代之治廣南有上黨銅鞮蔚不過其北境者又有謂今代州為代在鴈門南蔚不可指為代者於是引韓信斬夏説於閼與以證代之治廣誣文帝都代為今代州以證代之在南無惑乎人之疑也夫代吾蔚也為國則都蔚為郡則治蔚國有遷變不過文帝之晉陽如意之清河郡有更置不過隋初之鴈門唐初之陽曲秀容而已史皆載之不相淆也今以諸地里志考之前漢代所領縣十八代為蔚靈丘廣昌為今靈丘廣昌延陵平舒為今廣靈東安陽為蔚廢安定縣馬城為馬邑陽原為𢎞州桑乾參合髙桞皆近塞地且如為中部都尉治鹵城近參合當城直桓都皆不在南所不考者道人班氏徐氏北平邑而已後漢所領縣十一皆前漢之故而無延陵且如陽原參合靈丘廣昌鹵城晉所領縣三廣昌平舒而加富城後魏所領縣四平城太平武周永固則曷嘗南及閼與與今代州耶夫文帝不都代代國考辨之明矣夏説之閼與不過出師於彼以逆韓信之來可遂以閼與為代地耶蓋自烏桓鮮卑之雜居而邊土漸淪建安黃初之不競而邊郡多廢自兹以降元魏屬之司牧齊人止置靈丘而代遂不郡矣唐之初也代陷於突厥乃因隋改鴈門為代郡也則置代於鴈門因後周置蔚於靈丘也則僑治蔚於陽曲又僑治於秀容皆非舊也逮貞觀破突厥置郡靈丘而仍蔚舊稱天寶更定名復定代郡而仍鴈門舊地自此以後更變不常要不出此遂以代為代以蔚為蔚而不知蔚之舊為代代之舊為鴈門也於戲代可移之南也而磨笄之山不可移鴈門可改為代也而勾注之山不可改究沿革者亦惟本之禹貢表山川以定疆域斯萬世可求也莊定山起用考羅欽順定山以𢎞治甲寅起用其年冬復除行人司副時內閣則徐文靖丘文莊劉文簡也明年乙卯二月文莊卒李文正始入閣三月定山升南京吏部郎中丁巳三月考察以老疾致仕其復司副升郎中文靖皆在內閣實為首相後丁巳一年乃老定山初至京文靖既有當復翰林之言不知何故不力主之湛甘泉作定山墓志大率回互之意多其波及文莊及文正皆出偏辭初非有的據也定山晚年出處自是難説其引退之欠決以為子弟之過猶可今乃歸咎倪青溪反覆不置得無重為定山之纍邪青溪與定山亦非同榜頗聞嘗先事風曉甚欲為保全計及衆論既合亦無如之何矣偶閲甘泉文録及此漫志之明文海卷一百十九
