body:
  text: 明文海卷一百二十餘姚黃宗羲編考二九邊屯政考鄒德溥髙皇帝念軍餉浩大重以徴輸病民於是經理屯政使軍士各自食其力蓋三代以來寓兵於農之遺意在民既無轉輸給軍之勞而千里饋糧士有飢色之患亦鮮故籌邊之良法美意莫善于屯政自元年即命諸將分軍屯種龍江矣其後立法浸備屯田遍天下而其區畫九邊者尤密遼東屯糧最多以石計者七十萬其次乃甘肅甘肅計六十萬又其次乃大同大同計五十一萬又其次固原固原乃三十二萬又其次宣府宣府乃二十五萬又其次寧夏寧夏乃十八萬又其次薊州薊州乃十一萬延綏差少然尚計六萬山西亡其籍不可考可考者八十餘石計其初當亦不下十萬大率分軍士十之七屯種而留其三城守每軍一人給田五十畝賦正糧十二石貯之屯倉俟其人月取給焉納餘糧十二石充衛所官俸併給軍城操者洪熙元年詔減徵餘糧六石正統二年復詔各屯正糧即令屯軍收自贍毋輸倉蓋屯賦之定自此始而國初又因計邊地寒近邊且耕且守力最艱乃通商種鹽以維之令賈人輸粟邉郡官給之引赴鹽所領鹽轉鬻永樂時粟二斗五升得鹽一引商贏利過當爭趨之各自設保伍募衆督耕於是邊地盡墾而塞下粟充溢露積饒於中土屯軍亦因其保障守望相助得肆耕當此之時各鎮軍餉就其地足給不倚輸於內藏閭閻自正供外無他征賦蒸庶樂業其後邊事漸興多抽屯軍補伍於是屯種乏人田浸蕪已又設養亷之田官因私其腴區而移瘠磽於軍士低昂竄易其籍糧益不均加以豪右侵奪而農事益弛矣逮𢎞治中大司農葉淇見謂賈人輸薄而獲厚利遂奏令納銀運司解部部分輸各邊夫商業苦邊塞危險既無所事粟遂各散歸逐末業營資而故所墾田盡廢居無何邊地米價踊騰鹽課不足給食當食者日漸增加益以各鈔關商稅猶不足至傾天子內帑以助之於是民賦日重而東南力竭矣正德時閹瑾嘗訝謂年例銀兩天順以前無有也罷不送然不知令商輸粟於邉邊儲大匱詢之以為屯田不復故乃遣使各邊丈田以清地多及追完逋負者為能使者承風比較苛刻致激指揮何錦等怨叛議者以為不復鹽法而獨清屯田邊人無力耕種子粒終不入徒擾貧軍釀亂耳要其論年例非祖宗令甲固當嘉靖以來纍清屯田時縮時盈而終不克復故蓋至於今遼東僅得屯糧二十七萬損故額三之二大同僅得十二萬損故額四之三甘肅得二十三萬宣府得十三萬薊州得五萬各損二之一寧夏得十四萬九千損故額五之一固原乃存三十一萬延綏存五萬視故額亦各損巨千山西僅清得二萬八千有竒計亦且損故額過半鄒生曰余讀萬厯會計録睹大同一鎮年例至四十五萬薊州四十二萬密雲三十九萬宣府二十九萬即少者率不下數萬蓋愴然心悲無論國初第以初輸時額較之殆幾十倍民安所益地而能辦此曩者非能令兵不食而守胡今獨費之巨也悲夫當葉淇奏改折色時意謂折色一石可易數石豈意厲階至此仲尼稱毋見小利有以也夫然吾又怪何向者廢之易若彼今復之難若此也則毋亦重損鹽稅故今者罄鹽稅不足給邊即屯政復年例可盡罷試權以此易彼何如也成祖嘗下令民能墾治沿邉荒地者得自為業不起科其後有司或征之故今莫敢任墾者夫使邊饒粟可省內輸又藉防禦焉豈必科其租入乃稱利哉屬稻田使者徐君奉璽書疆理西北水田庶幾徐君功成邊積穀多而糴賤是亦將屯之一助也余傷夫屯政不復至罄中原脂膏以供邊而猶不足故略著其顛末令憂國計者得考覽焉鄉飲酒禮考沈槩鄉飲酒之禮昉於有虞氏養國老庶老於上下庠周禮則云天子三年大比興賢能鄉老及鄉大夫乃以正月禮賔而諸侯法之其義尚賢崇長而貴貴之意參焉按儀禮飲酒前期主人就先生而謀賔介既戒及期乃席賔主人介獻酢既畢而遵入樂作乃立司正而旅酬釋之者曰主人謂諸侯之鄉大夫也先生鄉中致仕者賔介處士之賢者古年七十致仕為師而教學焉恆知鄉人之賢否是以大夫就而謀之賢者為賔其次為介又其次為衆賔而與之飲酒蓋將獻賢於君故以禮賔之然鄉貢一人焉耳其位次賔席牖前南面主人席阼階上西面介席西階上東面席衆賔於賔席之西遵與僎同謂鄉人為鄉大夫或來觀禮而助主人樂賔者來則席於賔東蓋尊之不與衆賔齒也司正立於兩階之間北面監察愆儀其飲酒也於賔備獻酢酬於介獻酢不酬衆賔獻而不酢而推其長者三人拜受爵焉三人者所謂三賔也是則周制序德尚賢而賔介不問長少其序齒者衆賔耳序爵之義於隆殺之節於僎見之然僎後入不千獻酢正禮也至漢郡國之禮使黨正屬民飲酒舉行於十月乃有正齒位之説焉逮我國朝酌取三代之制嵗必再舉儀從簡朴而頗有異同大都兼尚齒德爵位而於賔興之典無相涉矣伏讀大明會典洪武間頒行禮式主席者以府州縣僚長位於東南大賔以致仕官為之位於東北僎賔擇鄉人年髙有德者位於西北介以次長位於西南賔之次者為三賔位於賔主介僎之後司正以教職為之此正文也附載禮圖則有三僎位於大賔之左西上僚屬位於東序西面而三賔位於僎賔之右東上衆賔位於西序東面司正位於主東三僎者初無明文今以佐二官為之由是觀之賔僎三賔位皆南面主位東南介位西南衆賔序齒此與周制不殊賔位東北以爵而尚左僎位西北兼論德齒介以次長與主皆北面司正並主而坐此皆異於古矣然里中鄉飲其制仍以年髙有德者為賔而介以其次僎以致仕官為之則又稍合於古也三僎次於東北僚屬西面而衆賔東面此則古未詳言之耳至於别姦頑異罪人而列於外坐使聽讀律受戒諭此雖古禮未及乃亦周禮大司徒坐罪人於嘉石而恥之之意也禮時為大而當從今其間大義炳炳者古今非可易也竊惟聖祖定法微意蓋謂朝廷尚爵而鄉黨尚齒守令職官儒學公署也故以致仕官當賔禮而里社仍尚耆德司正者古用主人擯相之吏耳古坐飲而立監之今用師儒矣其坐宜也然於支辦酒殽但言酌量豐儉而未詳其數故行禮者於三豆五豆或酢或酬之宜未之深辨而長少之節踈矣公過私罪别席之令雖再申明然恐啓爭生釁廢閣已久而淑慝之戒微矣夫賔主象天地介僎象隂陽古今位次雖殊皆正席也所頒圖式業已分明近嵗或踵他圖之訛四席乃皆隅坐蓋以不究古禮四隅之席特據賔主介僎四位而言耳非謂四隅斜向如童子之席可不正而坐也夫所謂僚屬者同僚合屬皆在焉耳袁氏儀注圖席亦皆正而僎位東北近古矣然既以佐二居僎三僎既列而又旁列同僚將誰指耶凡此皆由後學誤解禮文遂至各行己見相沿成習豈其然乎夫鄉飲之設王風所係厯代儀文其義各有所指古禮非可泥也謹按會典所載而遵行之斯無畔時之咎矣明文海卷一百二十
