body:
  text: 明文海卷一百二十一餘姚黃宗羲編考三五德之運考張養蒙自古帝王受命而興其嬗代之序載在史䇿可考而知也逮戰國鄒衍始推言五德之運以決帝王相乘之統劉向復推廣其義作五行傳自今考之有主於相克者則曰夏得木德商以金勝之商得金德周以火勝之此衍之説也有主於相生者則曰太昊氏始出震以木德王次而神農以火黃帝以土少昊以金顓頊以水帝嚳以木堯以火舜以土此向之説也若夫配以五方分以五色屬以五音貫以五數世代循環相尋不已術士家咸祖談之在儒先則直斥其不經見矣愚故竊有疑焉夫五行之用布濩於天地之間自一人一事以至於百工萬化罔不取足而况帝王重寶可獨遺之若謂衍之説盡不可信與則秦代周從所不勝為水德漢克秦張蒼等皆云應赤帝之祥宜尚火德公孫臣推衍議言宜尚土德當有黃龍見後黃龍果見成紀蒼議卒詘此何以驗也謂衍之説盡可拘與則黃帝顓頊帝嚳堯一姓而所尚頓殊何秦漢以後不然也夏之揖遜同於虞何主於克而不主於生也要之讖緯術數之學與星官堪輿諸家並傳亦自不可盡廢但達人之通致不當拘術士之偏談耳蓋論五德之流行雖足以乘其運而論厯代之世運亦不必分屬於德吾聞其有撫五辰修六府而興者矣不聞其修一德而興也吾聞其有狎侮五行汨陳五行而替者矣未聞其乖一德而替也如徒以數尚六七色尚青赤音尚徵羽類而附之則興者果一德之旺而替者果一德之衰耶蓋五德之運天之所以示乎人而非人之所易測五德之修人之所以應乎天而自足以維其運天人之際微乎微乎帝王厯數何拘小術定之哉至謂天地人之異統忠質文之異尚夏商周之迭更此則理之説而非數之説也是故儒先重之也漢以後術士謂唐用火德宋用土德我朝受命有謂其尚火德有謂其尚土德紛紛無定若必拘拘於此則六朝之更姓五代之分裂豈五德遂絶而無所乘耶契丹之滅晉劉石之亂華元之代宋乂乘夫何德耶故愚斷以為不可廢衍向之説亦不必拘衍向之説也若夫探五行之精敬五行之用以斡造化轉移之微權使吾之德足以當天之運而天之運不至於爽吾之德此在今日所當兢兢者也衍向之説存而弗論可也明文海卷一百二十一
