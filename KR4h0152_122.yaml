body:
  text: 明文海卷一百二十二餘姚黃宗羲編頌平江漢頌宋濓天命皇上為億兆生民主旌麾所向悉臣悉庭初以軍旅之師興濠泗間遂撫淮南平江東攻浙東西下之版圖所入方數千里定都江左發政施仁戴白之叟垂髫之童涵泳至化皥皥熙熙如承平時於是陳友諒據有江漢之地僭居大號賊殺其主大修蒙衝虐驅蒸黎如蹈水火不自度力又集蜂蟻之衆直窺豫章三月不解皇赫斯怒乃召羣臣於庭而告之曰友諒不道敢屢豫侮昔者蕩搖我邊方侵軼我姑孰伺偵我金陵賴爾一二臣鄰之力攻而敗之豫亦親覆其穴巢中宵竄走假息武昌豫不忍追殱之冀其悔禍以自逭於天刑癸卯之夏乃復圍我豫章是其凶德無厭自取殄滅此天亡之時天之明威豫不敢不順唯爾熊羆之臣不二心之士尚弼豫以成厥功羣臣曰都於是右丞臣達參知政事臣遇春帳前親兵指揮使臣國勝同知樞密院事臣永忠臣通海備厥戎器簡厥師徒以俟七月癸酉上躬擐甲胄禡纛龍江帥樓船數百蔽江而上友諒大讋解圍而逃丁亥與我師遇鄱陽湖之康郎山戊子上分舟為十二屯命達遇春永忠突入其陳呼聲動天地矢鋒雨集炮聲雷鍧波濤起立飛火照耀百里之內水色盡赤焚溺死者動一二萬流尸如蟻滿望無際己丑焚偽平章舟刈戮餘二千辛卯復酣戰偽將張定邊素號梟猛上親禦之將士皆死戰厯一二時遇春等左右夾擊殺士卒無算張中矢百餘而退潛保鞋山不敢吐氣我師亦據湖口扼彼喉襟列柵南北江岸置火筏中流水陸嚴戒以候其發八月賊食盡遣舟五百艘掠糧都昌又為我大將所獲士戌賊計窮冒死突出將上趨九江上命諸將一時俱合其大戰如戊子自辰達酉督戰益急友諒中飛矢斃於舟中癸亥降其衆五萬上命釋之不戮一人凱歌而旋舳艫相銜旌旗飛翻不疾不徐委蛇而來萬姓歡迎俯伏道左山川草木皆有喜色告廟飲至行賞論功賜遇春田若干永忠田若干其餘將士賚金繒有差臣稽在昔曹操治水軍八十萬來攻孫權而周瑜黃蓋敗之於赤壁苻堅發長安戎卒六十餘萬騎二十七萬以侵晉而謝玄謝石敗之於淝水然赤壁不過一焚而走淝水亦不過軍亂而奔初未嘗大戰也而史臣具書之以為千古美談矧今湖口之捷血戰纍日天地為之晦𡨕日月為之無光山河為之震蕩其神功駿烈炳耀鏗鍧與天無極較之二國未足多讓而歌咏不作非甚闕典歟臣謹備著其事撰為詞頌一通以流鴻績於無窮以俟太史氏之采録云其詞曰天眷有德實為哲皇肆其神略以靖冦攘義旄東指罔敢弗恭風烈虎嘯雲遊龍驤長淮既歸江左攸屬浙之東西樹侯置牧乃建國家以奠南服以懷中原以控西蜀蠢爾小醜敢讎大邦集其凶頑鋒蝟斧螳輕涉我疆以跳以踉亦既剪刈僵骸覆江洊齊六軍直傾其穴釋而勿誅俾自懲刷闔胡不然復豕而嘻翹其蟲臂當吾車轍皇明震怒厯告在廷是決不悛命將往征爾選舟師爾整甲兵漕爾糗糧各罄爾誠搖光在中夷則之月禡牙江濱皇秉巨鉞以誓以戒以速其發紀律精明飊火奮激旟旐揚揚艂艭將將矛戈洗洸鎧胄明明載怒載厲載飛載揚雄威所吞已無荆湘既與虜逢大呼衝擊藥騰藜駁星流火戟虐焰電奔巨轟雷劈殺氣冥蒙不辨咫尺矢鋒所貫什伍聫聫縱橫交紅命隕弗顛欑桅湊帆筍束蝟編流尸塞川舟行弗前魄既天禠扶創而逸聚於湖奧僅存喘息我方植柵江之南北火筏在流掩蔽如翼越厯四旬飛走途窮將冒萬死以絶其衝我師見之千臚如龍似兔之走而鷹之從酣戰六時由辰達酉僕姑一發殪此酋首貫晴及顱仆若枯柳大憝既除餘不能醜遞相告言我誠不振我革我頑我歸至仁誰謂培塿可髙嶙峋再拜稽首來降來臣皇曰俞哉汝俘豫受宥汝弗劉豫汝父母汝凍豫衣汝飢豫哺昔何昏迷今始撒蔀奏凱而旋騎吹鬱搖形於樂歌節以鐲鐃飲至於廟頒賞於朝帛堆其家肉登其庖都人聚觀舉手加額或嘆或謠有聲嘖嘖干戈相尋匪一朝夕自今升平可坐而策惟皇神武動則克之羣䇿盡屈四方式之惟皇寬慈降則釋之義聲動蕩疇能敵之惟皇明斷遇事即決洞見千里不隔一髮所以四征成此駿烈小大畢朝孰敢肆孽在昔赤壁洎乎合淝事以幸集尚傳䇿書况兹之功俊偉赫熹揆古無讓可無咏詩臣雖微賤文字是職對揚皇休并獻臣臆三代以還用仁興國皇宜遵行永作民極鄧院判勳德頌朱升嵗辛卯淮西兵起明年自蘄渡江者蹂饒陷徽江東大擾至於丁酉之六月間勝負相尋徽民受兵者凡十有二矣而猶不知所終也於是泗水鄧公奉江南行省平章公命由宣取徽先聲所至不戮一人郡邑以定公淑德夙成威信昭著始至則立城堡作廬舍旬日竣事而民不知有役納降附下條教村疃帖服而民不知有軍分兵戍諸縣掄才以官治之軍民有職上下相維遺黎乃知免矣將官張思聰戍休寧縣能宣布公之德美以福其民庶又請邑士朱升作頌以傳之頌曰徽之為郡介乎萬山昔有革代招附以安曩歲淮兵渡江窺浙直搗于徽肆其燔劫突來洊至奔北相仍六勝六負哀哉民生猗歟辨章秣陵開省勳業崇崇紀綱井井既克宛陵南復楚疆有獻于公請事徽方公曰噫嘻無窮于逺蕞爾山城其邉三面䇿者曰否彼鄰杭封全有三關浙右囊中公曰噫嘻兹為重役總率招徠必資淑德曰鄧友德茁其蘭芽汝父汝兄致命邦家宣衆未降長搶餘黨既屯于徽懼殘彼壤事有機速為我南行汝親我養汝家吾承鄧公曰唯惟辨章令辨章之心徽人之命爰勑渠帥即曰啓行衙兵之胡新附之湯江淮之雄苖獞之鋭列騎聨旗西州相綴惟徽厭亂城郭久空諸軍畢入誅其萊蓬既柵既城以營以室將士分功成之旬日乃納降附漿酒溫存受其雞豚為之饔飱使觀其軍使行其壘意氣包涵家人笑語民曰此軍與我為儕曩者轢我吾寧服懷士曰此軍非曩之匹閫幕衣冠中原典則曩之來者驅民為兵何為強弱徒殱厥生曩之來者每事報復指擲吹求熾然荼毒今兹下令軍民判然不教之衆奔北之先今兹下令新自今日毋長澆風酷為指擲流離還定漸復其初里有耕桑家有詩書凡此之功在於鎮靜萬喙同聲歸功於鄧鎮靜之道制勝之規謝公指顧遂敗淮淝鎮靜之道教治之式曹師蓋公民以寧一繄公懿質平章登之進之於學玉而成之雲臺元功少年杖䇿人謂我公今之髙密以究勞績以開隆平秉心罔替引我民生徽民願公祝公眉夀仰彼昊蒼夕昕稽首戍將承德請作詩章刻之縣齋以傳無疆平安南頌楊士竒臣聞天以風雨霜露育成萬物聖人以禮樂征伐綏輯天下一出於至仁周之文武皆一怒以安其民故雖聖人不志用兵亦不去兵以為治洪惟我國家肇興太祖聖神文武欽明啓運俊德成功統天大孝高皇帝深仁大義順天應人平清四方以教以育罔有孽害時謂太和至於皇上益廣仁義禮樂之化海內奠安四裔嚮慕小大遐邇熙然同春惟是安南其王孱微其賊臣黎季犛暨其子蒼沿襲悖凶屢弒國主淫刑暴斂毒虐下人滋久滋甚皇上閔焉弗寧發詔使諭使遷悔賊罔忌畏數侵掠厥鄰占城又冦我思明祿州寧逺之地在廷之臣咸請發兵討罪上曰彼匪人乎斯不可終化發詔使申諭焉賊聞其主有遺嗣子奔來京師即上表謝過還之上曰彼其庶幾有悔乎遣使者衛送出境賊伏衆邀遏使者執殺其主遺嗣子事聞皇上震怒召文武羣臣諭曰豫承天命保康兆億民一民弗獲惟豫弗恭人有弗迪而遽誅斯遏抑厥自新乃有弗迪至於再三而釋弗誅惟豫弗君今盜滋弗迪豫必不釋將往大征匪豫志用武惟盜滋稔惡羣臣合辭力贊必決乃告祀天地宗廟及天地山川命征蠻將軍左右副將軍左右恭將暨神機橫海驃騎逰擊鷹揚五將軍率師討賊師發金川門上臨江送之諭之曰汝其代豫往行天討惟盜暨厥子必誅弗釋暨同惡必誅弗釋凡厥脅從咸釋弗誅惟兹安南咸朕所統厥民兹困於盜罔攸訴告汝其代豫往弔毋有侵害或有侵害即既殄戮盜猶底汝罰既殄戮盜其咨求其王遺嗣子俾統治厥民往哉惟懋師入安南黎賊脅驅其民號七百萬拒於境上民聞王師來為已除害皆倒戈迓降師渡富良江入其東都城又入其西都城如蹈無人之地賊窮迫盡棄其衆獨與其孥數人並海遁去王師追之悉生縶之不遺一人乃縱所脅從咨民所苦罷其苛禁敷求安南王遺嗣民既罔有侵害又蒙哀矜撫恤悉解去所苦咸竊喜曰我幸復見今日幸聖天子不遐棄我萬里外而復生我欣然如脫虎口歸慈父母相率跽軍門言曰惟故安南王遺嗣悉殱於冦暴無遺惟兹土故𨽻中國誠願復列中國氓密比聖化俾我暨我子我孫永覩夫衣冠文物軍中獻所獲俘且具言民所欲皇上重違民意下詔郡縣其地選置守吏復置交址布政司總之左廷文武羣臣上表稱賀臣惟安南本漢南越地武帝置交址郡暨五季丁氏竊據之始僭稱王宋弗能制因授之卒循為常更厯數姓蟠結深固屢叛弗服宋元數舉兵誅訖無成功皇明奄有四海率先欵服曽不踰世終梗冦盜天地之德務隆包荒纍誨弗悛肆急援溺仁義之旅弔伐並行恩威所臨有迎無拒纍月之頃肅清凶憝大拯塗炭𢎞復疆土功德俊茂振古無倫焉惟古帝王施德建功皆有頌歌傳播後世臣忝列從臣後輒擬古作者之意撰平安南頌一首以示後來謹拜手稽首上進頌曰維天生民咸俾遂適有攸弗及肆命有德惟德格天為君為師以教以治俾適咸宜天啓皇明悉被所覆明明太祖生育教誘衣之食之邇安逺歸禮昭義布長幼尊卑皇帝繼統四方萬國益富而教和豫安適蕞爾蠻交醜孽其間為狼為豺小大畢殘皇曰彼醜匪異人類庶或改率豫其化誨誨言諄諄弗遷益驕戕暴厥鄰盜我邊郊百辟文武俯伏陛言弗時剪屠將俾蔓延皇曰申誨猶或改率弗改弗率跳梁狂橘偽恭籲命賊我使人暨彼遺孽磔身百分皇曰彼醜獸心靡易螟􅀈弗除曷遺嘉稷惟皇上帝付豫八埏有溺弗援豫滋違天誕命將臣暨旅師徒往勵汝勇往宣汝謨咸弔困窮殱惟醜鹵職敷豫仁匪曰究武六師遄邁辭直氣厲涉危蹈深若履平地嘽嘽烈烈赫赫業業如飄剟剟如霆􅎒􅎒蠢彼醜鹵脅驅為拒仁威天降孰有強禦雞翎夜闢富良為帶投兵委戈奔降迓拜乃入郊城乃走凶渠縶之海隅如探取雛乃咨脅從悉解而縱乃視交人弔其疾痛交人悴悴爰始色溫舒其兢兢爰始笑言交人有言我困荼毒天子生我旋厲為福交人有言我初若迷逖逺淪汙陷兹塗泥天子聖仁曷返我初內我庇我永康不虞俘獻於廷天子受之民有願欲天子豫之四裔有聞歡喜告語天子聖仁我有父母救民之疾不以遐僻有梗弗率必誅不釋天子聖仁孔武且神孰其為梗鑒彼交人芒芒四裔威服德拊巍巍中夏奠安鞏固海航陸車來享來庭千萬億年拱我皇明平西夏頌楊一清正德五年庚午夏四月寧夏賊臣何錦周昻丁廣挾宗室置鐇以叛戕殺鎮巡重臣傳偽檄召調各路兵馬偽鑄印章拜封其黨僭稱大將軍都統總𬋩名秩且以誅賊瑾為名刻期將渡河關中震動皇帝下羣臣議以置鐇大逆不道罪在不赦乃祗告宗廟削其屬籍命涇陽伯臣英率京營兵三萬討之帝若曰御用監太監張永宜往總督豫師致仕右都御史楊一清宜起提督戎務以賞罰用命不用命以便宜從事朕不忍百姓橫罹鋒刃誅止首惡凡脅從者皆原之永拜稽受命賜關防金瓜鋼劍各一并勑符旗牌以行臣一清在江南聞命兼程而往維時先聲所動不怒而威守臣聞之曰方隅有變吾儕弗力而以煩王師可乎乃相戒誓約期進勦逰擊將軍仇鉞為內應遂手刃周昻執置鐇父子械繫之又執何錦丁廣於外并誅其黨捷聞聖心惻然不欲究武召涇陽伯臣英以其兵還勑臣永臣一清往撫諭用寧其人六月至靈州先是逆黨多逸未就法心懷懼疑搆危言相恐唱衆兀兀不自保臣等乃手書紙榜數百言諭以禍福且密部署將吏亷得始謀從亂者六十餘人悉下之吏并置鐇何錦輩既鞫既明傳之檻車比入夏城耕鋤不廢市肆如故以天子命問其疾苦約法定令老稚歡呼如更生西夏大定關中以安八月臣永歸京師臣一清仍留節制陜西諸軍事臣永獻俘於闕皇帝慰勞再三先是置鐇檄數瑾賊過惡守臣上之瑾輒匿之至是臣永進曰致冦者瑾也流毒宇內不誅之無以謝神人因疏其大罪十有七事帝覽之震怒下瑾獄遂籍其家具得其隂謀不軌狀獄成瑾暨其黨皆伏誅大姦既除國是始定凡所紛更一切苛察病民之政盡釐革之舊章以漸修復中外欣然想望太平臣惟自古削平僭亂皆其君之聰明睿聖委任臣下獨斷不疑周人美宣王中興江漢常武之什可考也唐憲宗平淮夷其臣韓愈柳宗元為之碑為之雅用以鋪張揚厲鏗鍧震蕩至今在人耳目矧我皇上以神聖之資制命海內奮威辟以震元憝一動容變色而定亂於孔棘消患於未萌澤被天下推較千古誠莫與班而歌頌不作顧非缺典與臣不佞制作非其職任然西征實領督師之役而內難既靖又首被勑召以來與諸大夫士重覩天日清明不勝慶忭謹疏所見聞以頌成績頌曰皇帝正德越今五年謨烈紹祖聰明憲天聖武震蕩仁聲昭宣諸藩奉職莫敢弗虔關西之西曰惟寧夏慶藩分封厥裔安化置鐇搆禍伏其機牙欲奮螳臂以當吾車隂結叛臣操矛以逞曷指為名謂誅賊瑾乃戕守將奪之兵權志窺神器將冦中原夏城小大崩角懍懍妖氛苦之弗覩光景有騰天狼太白無光漸水以腥驅雲為黃帝聞曰吁此何為者得罪祖宗朕不敢赦告廟削籍師出有名救焚拯溺六月徂征帝謂臣永爾朕心腹爾偕一清惟我師是督有征無戰爾先文告諭以逆順勿恣屠戮戮止首惡宥其脅從代朕親行歸奏爾功臣拜稽首臣當盡節臣有還期須賊之滅既禡既牙鉦鼓明發金節煌煌於道於陌劍橫招搖幟翻列缺如羆如熊觀者變色指山山摧畫地地裂賊雖未死其氣已折關西之將聞風震驚吾儕何為與賊俱生憤激於中有仇將軍一呼而起從者如雲手斬昻首遂擒賊鐇彼錦與廣如刈草菅帝聞曰都勿曰易易二帥宜往宣我德意握符仗鉞早夜以趨暑不張蓋行不乘輿市不易肆師入夏郛維時逆黨其徒實繁督府有令執其渠元乃諭脅從爾冥爾愚天子命我戡定爾都安爾幹止恤爾惸孤爾凍豫衣爾飢豫餔往者妖氛豫為爾除夏人歡呼加額以手天遣重臣為我父母始時昏昏病狂而奔今安於室朝饔夕飱始時靡靡延頸就死今作而息仰父俯子我生不辰丁夏之屯不有督師曷寧我人武功告成凱還於京寶甲鏘鏘龍旗明明天子有詔命使郊迎鼎臑是崇玉醴百觥帝曰休哉爾忠爾貞外冦其攘中土底寧曽是顛危化為熙平臣拜稽首天子神聖臣實何功荷天休命臣有隱憂內難將作念彼瑾賊在帝帷幄致冦者誰其惡滔天褻天之威盜天之權礪其豺牙梟聲四逹鹿馬鉗口莫之敢發犬嗾鷹攫為逆多朋厥謀孔深俟機以興不共戴天惟臣之義此賊可滅臣死不避十有七事臣得其粗窮其罪狀罄竹難書帝親賜問盡伏厥辜乃赫斯怒有將必誅與衆共棄何假斯須惡羽凶翼次第剪屠神人之憤一旦而舒帝曰汝往於今三月既奠方隅遂清君側金帛汝賚祿廩汝錫宣示史官鼎彛汝勒臣拜稽首惟帝至明如離之照如日之升有赫厥臨何魍魎逃形臣拜稽首惟帝剛克如乾之運如雷之發震撼萬國不大聲以色匪帝明剛內有遺姦臣身未遑何社稷之安睿謨神授高視前古凝然端居自耆其武兵櫜不刃箙委而羽百二熙熙羣生與與草木蕃廡鳥獸率舞濮沿之北祝栗之南於壤於轅式昭德音海波不揚和氣旁洽重譯而來梯航而格祝帝之夀與天長久祝帝之紀天為終始臣作頌詩莫罄名揚登之絃歌以示無疆毁淫祠頌并序邵寶中丞林公巡視江西之一月檄毁諸寺觀神廟弗在典與志者有司聞公風義奉行唯謹時寶舟由臨江入袁河見土木像浮水而下後先沓至乃嘆曰自狄梁公後不見此舉幾百年矣而公毅然行之不俟終日非信道篤而自知明者其孰能之公昔在朝嘗止建寺語忤權要得禍幾斃後在雲南乂嘗毁諸佛像蓋其闢邪崇正之念平生所存如此而非出於一時之感也夫安得不力哉頌曰卓哉林公心與道謀是衛是距以邪為仇昔在先朝有寺將建孰不惜之而莫敢諫公書千言佛骨之遺曰有殃咎臣身不辭赦公復公惟明天子僉曰異哉一生九死公節滇南其氣益昌曰毁斯毁神伏鬼藏公來江西諏民之瘼飲之食之培善剗惡公曰汝吏民愚罔覺舍人求神日谷以壑粵若帝舜絶地天通降禮折刑民協於衷我非為異期古是同國憲斯在汝罔弗共吏奉公檄夙夜惟力靡逺弗臨靡深弗即曰火而焚曰水而流美石良材學宫是修唐有狄公嘗事斯舉太史書之君子所豫公心正直與神明居凡此邪慝弗怒而除除其邪慝一崇我正曰士曰民肅肅於政民耕於郊士誦於庠公入相帝為國禎祥保障江南頌并序俞允文嘉靖三十有三年春蠢兹倭夷弗譓肆虐中夏大江以南糜沸雲亂婪婪狡衆狂趨渾奔攻燔城邑剽殺將吏百姓流亡歸命無所列校緣戍屠潰失守者難以比數往往告敗上京殆靡寧嵗皇帝為之旰食晏寢推命上將畀之提鉞乃大舉楚蜀之趫悍齊秦之技擊諸羌之豪雄暨閩禺之楫師隱隱􅟁􅟁厚集堅重之陳十有餘萬期於殄滅乃已饋餉傾於州郡天下騷然夫驅天下之全力摧魁折之殘醜泰山壓卵未足稱喻然而師乏謀律損費傷威亡士無功淹移嵗月時惟侍御史汝南周公膺英哲之上資茂卓邁之純德謇諤著節貞亮熙朝達變知機肅祗誕命監戎四郡保障江南示德示威有張有弛申號明誓勒部按隊簡稽精堅采拔淪滯賞無費留罰不渝制援籌六竒之中決勝千里之外謨臣武將袨服裻衣之士莫不怫􅀈蜂駴爭騖推鋒而乃陸格矛盾海蓋艨衝雷厲風驅天旋電激建祀姑震鳴鼉藐觀乎高岡流慮乎絶垠橫厲翋􅢣肆險奔欲敵未及發刃已先加鋋鏑所從不期俱殪摼褲生俘聨括腐􅀈棄所獲蹂猺蠻窟殫巢焚星流彗掃反斾回軫以恬以嬉凶頑既夷宿憤既攄而公尤以亂離斯瘼飢饉荐臻閭閻有杼軸之憂城邑無藩籬之固乃犯顔剴奏蠲免田租底力辭豐損滋示儉不矜不伐雖休弗休帝用酬庸寵以殊典進式多士載觀厥成炳文武其並隆兼德威而兩懋保障之功未有若斯之盛者也昔漢趙充國之伐先零竇憲之擊胸奴皆以才技權威希亂圖功窮城極邊黷武於不爭之地而揚雄班固之儔猶著之銘頌至今稱之不絶矧公義在庇民忠惟效主遊神禮樂之場夷凶財賦之壤俾決力於一戰之眇致元功於纍挫之餘茍非被之歌頌則後世將何所稱法哉某幽介末才學慚庸陋雖不足以軼芬先藻揚闡殊烈然不勝悾疑敢述保障之義作頌一篇亦庶萬分之一也頌曰芒芒圓象渾渾方儀降祚有明拓統開基肇建皇極墋黷以釐俊氏用章九有以綏其一周所不臣漢所未征驟山驟水輦贐航珍狼歌鳥談玉潤金聲十聖相禪重輝襲明其二既輝既明崇極斯圯蠢兹狡蠻犯威干紀猛勢煽熾䟃𧽼􅛖騃揮鋒成霜飛矢成雨其三火烈燎原炘爓浮煙載隂載陽上頳玄顔愜愜士女扶服號天野有委骸填坑塞原其四師無専䇿兵交卒潰稔冦資糧挫鋩衄鋭我既無素彼乘其弊覆師敗績流毒宇內其五環我華域化為敵墟分我黎蒸化為敵俘敵強援濶城危氣孤我之不克日月其徂其六帝赫斯怒誕命虎臣選徒十萬是討是震顯允惟公允武允文監我六師帝曰汝能其七料敵合變恢我鴻算九地匪幽重玄彌煥濟威能寬處仁則斷臨危引義剋期剪亂其八我師無方有紀有綱初服齊志渴鬭俇攘懦夫虎奮弱子鷹揚我矛我盾靡用不臧其九左屠右𠢐至於海隅維綃揭檣連艦接艫島驚龍掣汨薄空虛曷悟所歷惟敵之謨其十于海于陸胥我王旅海抶修鯨陸斫揆窳彼鯨既窳我噉我哺舉無失䇿謀無遺諝其十一惟彼卒昏亡精怖魂進不及降退不及奔仇頭髠鬝獷眼瞋瞵悔前之為惟乞豫恩其十二明文海卷一百二十二
