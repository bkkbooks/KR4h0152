body:
  text: 明文海卷一百二十三餘姚黃宗羲編贊一溟涬生贊有序宋濓溟涬生者旴江廖應淮海學也抱負竒氣好研摩運世推移及方技諸家學年三十遊杭上疏言丁大全誤國狀大全怒中以法配漢陽軍生荷校行歌出都門道傍觀者嘖嘖壯之抵漢江濵遇蜀道士杜可大揖曰子非廖應淮耶生鄂然曰道士何自知之可大曰宇宙大虛一塵爾人生其間為塵幾何是茫茫者尚了然心目間矧吾子耶然自郡堯夫以先天學授王豫天悅天悅死無所授同葬玉枕中未百年而吳曦叛盜發其冡得皇極經世體要一篇內外觀象數十篇余賄盜得之今餘五十年數當授子吾俟子亦久矣乃言於上官脫其籍盡教以冡中書其算繇聲音起生神鑒𨽻利可大指畫未到者生已先意逆悟可大自以為不及學既成去隱宣歙間遇余安裕弋陽將教之安裕勸生業中庸生瞪目厲聲曰俗儒幾辱吾康節於地下矣復去之杭客賀外史家晝市大衍數夜沽酒痛飲飲即吐吐即飲不醉如泥弗休醉中嘗大叫曰天非宋天地非宋地奈何奈何語聞賈似道遣客叩之生曰無多言浙水西地髮白時是其祥也似道未解復召至屏人與語生曰明公宜自愛不久宋鼎移矣似道惡其言掩耳走生亦徑出過曽淵子家索酒轟飲酒酣作嬰兒啼曰大厦將焚燕猶呢喃未巳耶復賦歌以見意都人士聞之競指以為怪民不與接獨太學生熊睎聖猶時造其廬生死執熊手謂曰吾端居曽樓聞空中戎馬百萬來人鬼作哭泣聲壬申襄樊陷甲戍宫車晏駕乙亥長江飛渡似道亦殛死臨漳丙子三宫播遷諸王大臣皆南北亂走噓吸事耳子不去欲何為居亡何宋事日非沿江州郡望風奔潰生大慟曰殺氣又入閩廣中吾不知死所矣遂遁去其言無一不驗後四年病死處州學中年五十二無子惟一義女從之生宗堯夫先天之學頗自謂知易每見諸易師傳疏不問淺深輒訕駮以為樂及論後天則尊羲畫為經彖爻繫辭為傳黜文言彖象二傳為九師之言且謂説卦非聖筆必不能作上下繫乃門人所述序卦直漢儒記爾蓋生聰明絶人未聞道而驟語數故其論經多失中然性使酒難近又好訐人隂私人面頸發赤不顧罕有從其學者唯國子簿吳浚進士彭復學師之浚不卒業復屢受唾斥不怨生將遁時召復至口發例手布籌雖平昔所靳若終身不示人者一舉授復復後又授鄱陽傅立云或曰生瀕死語女曰吾死後一月中朝命山姓鳥名使者來徴吾及傅立立當過豫門汝可出藏書示之立當以此致大官後皆如其言所謂山姓鳥名崔鵬飛也生所著書有玄玄集厯髓星野指南象喻統會聲譜畫前妙用數十萬言今猶聞傳於世贊曰龍圖成章有文從衡以濬以明以泄其藏以奠乎玄黃昔我素王韋編三絶墜緒微茫誰其我綴我參我腴九師襄之我苞我晶百代攘之如河之渾如曀而昏如治絲以棼天未降割一髮攸存維洛有士居於百原超神沖漠凝於畫先數往知來小大斯甄莫峻匪崖我陟其顛莫深匪淵我瀹其泉簡材以升非隱弗傳有𡨕者冡卒昭以宣或得其粗載神於言炎炎宋籙維其訖矣長星蝕栁色之赤矣眚祥見徴土髮􅓈矣明昏以世莫之戚矣魚在在鬵尚其息矣維生之知中如沸羮彼惛弗知覆謂我狂我狂如何我憂孔多我山我河我用弗磨俾淪胥以訛我酒既嘉我瑟又和我寧不嘯歌北風其涼旗旐央央我車龎龎蕩蕩江流杭之如陸有腥其穢流血沃沃海氛方殷其何能目人有恆言風雨漂搖夏宇障之涉於大川蒸徒楫之楫副宇橈孑孑焉依國武斯墜不知攸戒日隕弗升雖晝作夜號舞於林鬼瞰於舍孰投是艱曽莫之艾乃惄乃驚乃瞻乃行乃遁死於𡨕眷生之為胡乃神以著徴之古聖匪程伊度何以言之卒淪於數一曲之淹不通其故易道既泯數亦不類激贊於生發我長喟月出皎兮在天之心在天之心何古何今筮竹贊有序唐肅豫子之欲筮而無蓍請以竹代之豫曰易謂聖人之德幽贊神明而生蓍則蓍固靈矣然地無蓍可廢筮乎屈原離騷云索瓊茅以筳篿漢方技傳亦有筳篿須臾孤虛之術説者曰筳竹篿也楚人以結草析竹卜為篿然則楚人之筳篿以無蓍歟夫蓍蔡産也大龜可卜者出於蔡上有蓍百莖下必有靈龜守之蔡非楚地故以筳代蓍而卜焉今越去蔡尤逺蓍或不能致則放筳篿之法無害况吾所以質諸神者在誠不在物之既作之因為贊俾刻其櫝云辭曰祝蜥蜴以祈雨龍之同類也禁原蠶以助牧馬之同氣也繄竹之視蓍均少彚也虛中弗窒又圓其外也虛則靈具乎智也蓍百莖而同本合萬殊為一致也以有代無理或弗悖也爰韜爰櫝受命則出也載營載盡吉凶以示也於戲泰筮神明之攸寄也曷竹曷蓍惟秉誠之無二也義鶴贊有序髙啓吳報恩寺浮屠之顛有二鶴巢焉以逰以宿出返必俱一日其雄罣脛輪索中奮翼自擲空懸弗脫雌下首大鳴若籲於人衆憐之莫能升遂宛轉而絶雌依其傍弗去羣鳥欲磔之輒引喙怒逐不使近逮毛骨盡化乃已余居值寺東嘗見其倣徨飛旋形貌慘悴風雨之夕哀唳噭噭若號慕然余念夫世固有伉儷相恱者矣一旦失所天哀未改而已他適塗膏自媒惟恐非艾農咷夕噱曽無含忸世嘗以禽喻惡人寧不辱是鶴哉乃贊曰嗟爾鶴乎維鳥之特猗雄死自守禦鳥之賊猗獨棲於標夜失其匹猗哀嘶返顧不啄而食猗厥質始化豈貞之魂猗匪魯黃鵠孰配爾德猗象山先生贊趙汸儒者曰其學似禪佛者曰我法無是超然獨契本心以俟聖人百世黃氏三夀圖贊有序方孝孺余少聞近古致治之主惟漢之文帝最賢求其本紀所載殊無甚異之事而太史遷獨稱其時老年六七十翁未識至城市遊遨嬉戲如小兒狀以為極盛心嘗疑之謂此何足見其盛乎後逰四方海內經大亂之餘風俗益偷垂髫之童輒往來郡邑用智巧相欺紿然後慨然思文帝之時信不可及追惟其盛未嘗不歎其難遇也間竊自解以為唐虞三代固未易及至若文帝仁厚之主有志於治者皆可庶幾效之安知不復遇乎昔年逰婺聞浦陽黃氏兄弟三人者合食以居至老不出閭巷心甚慕之今年至其家三老人者出迎鬚髯頒白冠裳如畫行步踆踆可數默然若不能為辭余私念史遷之所稱者其謂是乎天下自此殆將治矣治亂之來雖由於天而實係乎俗便捷巧佞之俗成其流必至於亂忠厚朴願之俗成治之漸也當文帝時漢興三十載矣故其俗之盛如此今國朝之興方一紀而東南逺邑之間已有若三老人者使越一世之後安知不如遷之所稱乎然則三老人者君子於其身觀國俗焉所繫豈小哉其鄉之好事者繪而為圖而請余贊贊之固宜也雖然使天下之人皆若三老人者余之志伊周之志於是而見也謂三老人為異而贊之者非余之志也贊曰俗之澆淳視乎斯民治亂之原非天伊人世之方亂民喪厥德詐諼機巧胥援以溺維治之符俗厚人龎厥風既成邦國以昌元亂既弭殆臻於理曷占其瑞視諸黃氏維黃世族為婺望家爵位非崇其德孔華恃德而驕德則日隳弗居其名福祿攸躋懿兹黃氏有伯有季既錫之富又賚之齒人豈不富僅以資名孰能與夷咸以善稱人之耆艾集於一身疇得乎天施及弟昆伯氏持觴維仲之授季也夔夔以殽以豆其服豈華斯帛斯絺食非云珍於以療飢孰不能言我弗出口一其誠敬樂有夀耉凡爾子孫曷不是程以革其漓以揚休聲豈惟爾家宜俗之導孰能旌之四方是效程文憲公雪樓先生畫像贊并序胡儼儼嘗聞諸先生長者言初勉齋黃公為新建丞與𢎞齋李氏講學於東湖書院極論性命道德之旨時雙峯饒氏從𢎞齋實與有聞焉黃李二公皆朱子門人而饒氏親承二公故學有本源傳饒氏之學者徽庵程先生得徽庵之傳者程文憲公雪樓先生吳文正公草廬先生二人也雪樓於徽庵為從孫草廬亦雪樓之薦起也後人徒知雪樓遭逢世運文章事業烜赫當時而不知其理學淵源實與草廬同一揆也公之玄孫今吏部郎中翰林侍書南雲持公遺像見示儼獲拜觀乃述贊曰天生人豪英偉特達義理精微源泉浚發學得其宗乘時遭逢論思密勿廟堂雍容掌帝之制渾噩古風金薤琳琅焜耀無窮登薦遺逸名德式崇懸車引年進退以禮其心休休豈曰知止幅巾短褐逍遙夷猶麻源之谷實邃且幽流瀑涓涓白雲悠悠午橋緣野令德作逑九原不起吾孰與遊平心杯贊劉定之陶瓷為杯有童中立斟之以酒浸趾沒膝滙腰平心不可復益益則下漏淋漓滴瀝至於杯乾衣履盡濕童僕竊笑賓主失色維昔哲匠用戒貪得豈維酒哉可該凡百郭令公像贊失名唐尚父太尉中書令汾陽王姓郭氏其元勳偉烈著於社稷豈獨其身為國宗臣而垂裕子孫百世賴之余從其裔孫獲觀遺像乃知將相自有真也韓退之所謂如髙山巨谷龍虎變化蓋其麾下偏禆頥指氣使者尚然而况於王乎為作贊曰唐室中微主昏臣僭長驅腥膻摧裂宇縣青騾蜀道龍種路隅嗣皇朔野號令蒸徒風飛雷厲英雄羣集孰若汾陽其聲赫奕躬扶日馭手揮天戈光弼懷恩左翼右呵蕩滌咸雒勦滅安史盡挈寰海歸唐天子歷肅代德常為虎臣功名蓋代貴富超倫入於其家綺疏朱户侯伯僕𨽻妃主女婦立於其朝真王上公強藩屈膝姦相斂容出於其郊貝胄金鉞回紇羅拜吐蕃奔北唯兹汾陽何福之隆本於厥心全德大忠厥心何見其儀孔碩河目海口泰華屹立宜爾憸壬匍匐趦趄鬼貌藍色狐遇於菟十世宥之尚百其世凜乎猶生遐哉勿替文丞相像贊孫燧偉哉文公千古之士方國脈尚存也流離顛沛唯恐不得其生及國脈既絶也慷慨從容唯恐不得其死求生匪生求死匪死生死唯求成就一是丈夫事業固每如此百世聞風孰不興起震川先生贊有序王世貞故太僕寺丞直文淵制敇歸震川先生諱有光字熙甫崑山人也生而美風儀性淵沈於書無所不讀而尤邃經術長於制科之業自其為諸生則已有名及門之屨恆滿而先生方以久次膺貢尋舉應天省試第二人故相張文毅公治時主試得先主文而竒之大以國士相許然至公車輒報罷行年六十而始登第又不得館選出令湖之長興踰三載僅遷判順德府高新鄭其座主也以大相秉銓憐先生屈拔為太僕丞尋以太僕入司制敕氣稍發舒而浙之臺使復苛擲之先生方屬疾欎欎不樂遂卒先生於古文辭雖出之自史漢而大較折衷於昌黎廬陵當其所得意沛如也不事雕飾而自有風味超然當名家矣其晚達而終不得意尤為識者所惜云贊曰風行水上渙為文章當其風止與水相忘剪綴帖括藻粉鋪張江左以還極於陳梁千載有公文運斯昌衰起八代如韓在唐宗工哲匠宋之歐陽余豈異趣久而始傷國寶新編傳贊并序顧璘李夢陽字獻吉本關中人從父官遂寓大梁仕至江西按寮副使朗暢玉立傲睨當世初讀書斷自漢魏以上聞人論古昔有不解事即曰豈六代以還書耶蓋不之讀故其詩文卓爾不羣晚始泛覽諸家益濟𢎞博或失則粗抑矯枉之偏不得不然耳夙尚氣節當孝宗朝上書言事意翕翕希賈生代韓司徒草奏劾諸閹危矣賴武功康子海脫其難視江西學政文教鬱興不能與俗俯仰躬陷縲絏誠亦負氣之過卒使讒毁叢積擯棄終身伊誰咎哉空同集六十三卷可謂富矣姑蘇黃省曾詮次至以辨獄等辭亦錯其間詆之耳贊曰黃初響絶詩道中微唐興二傑大發厥機世豈不逺知繼者希桓桓李君生也實後上泝風雅志則多有一鳴驚人千古為友何景明字仲默信陽人仕至陜西按察副使少有神解弱冠入京身不勝衣馳才長賦便凌作者時海陵儲公巏錫山邵公寶領袖文苑咸加賞歎和粹沖夷人樂為友撓之不濁澄之不清衆目為台輔中人然性簡意寬不善事樞要遂出為校文之職以勞致瘁弗臻大成咎在政人不在其身也夫文章之道初慎師承乃能立體馴臻妙境始自成家觀其與李氏論文宜取舍筏登岸為優斯將盡棄法程専崇質性茍為已地固非確論賦咏著述互見短長自古恆然匪徒今日若乃天才騰逸咳唾成珠實亦人倫之雋乎贊曰辭尚體要矩矱式陳異稟拔萃乃貫天人立訓範世俾也可循穆穆何君學緣宿解源出自山委折歸澥既濟視筏弗舍胡待祝允明字希哲蘇州人仕至應天道判超頴絶人讀書過目成誦巨細精粗咸貯腹笥有觸斯應不事猥鄙學務師古吐辭命意逈絶俗界效齊梁月露之體高者凌徐庾下亦不失皮陸玩世自放憚近禮法之儒故貴仕罕知其藴真州蔣山卿嘗見所撰建康觀雲記吐舌下之曰文不在兹乎偏才曲學真河伯未離龍門難與言水也余特賞其知言書學精工自急就以逮虞趙上下數千年變體罔不得其結搆若羲獻真行懷素狂草尤臻筆妙本朝書品不知合置誰左贊曰漢隱方朔明玩祝子傲睨冠紳遊戲文史蓄之海滙發也雲蒸騰踏藝苑孰敢爾陵徐禎卿字昌穀蘇州人仕至國子博士神清履弱雙瞳燭人幼精文理不繇教迪著交誡感暮賦諸篇詞旨沉欎遂闖晉宋之藩凌躐曹魏長宿驚歎稱為文雄筮仕武宗朝厭司法比請移學職斯亦可窺其雅識矣専門詩學究訂體裁上探騷雅下括高岑融會折衷備兹文質取充棟之草刪存百一冀成一家之言傳兹來世至今海內奉如圭璧所謂雖多亦奚以為也其所研索具在談藝録中可謂良工獨苦者與交誡感暮賦迪功集不載贊曰博士清資冰淵斯濯遺編熒熒鳳羽鱗角唯寶貴竒匪以其多有人弗粹山委則那朱應登字升之寶應人仕至雲南參政孝友性成篤厚人理愷悌無惎刋夷町畦故能善下仁賢兼容謭劣綽𢎞大賢之度職錢穀則政理飭教化則才興斯忠信基之矣特詞章彪發泉涌錦燦或當人落筆一掃千言旁觀者往往奪氣萋斐伊興此唯芽孽然高舉闊視渺然不為意也及其拂袖歸田益窮詞奧以彼易此又豈媢嫉所能知乎今觀其文賦敘綴贍麗森張武庫殆且伯仲潘陸奴僕元白有餘地矣羽儀斯世其兹數人也夫贊曰仁哉參政不遺其親異類廣含矧我同人天授藻心讒夫側目白璧永輝蠅罪何贖趙鶴字叔鳴江都人仕至山東按察副使文性淵奧吏道精核主覆户曹屢籌大計督學山東誓清膠庠其甚乃舉郡邑弟子十六汰之士始洶洶弗任毋亦矯枉過其正乎詩耻凡語於古愛謝靈運於唐愛孟郊於元愛劉因嘗曰此道不宜淺淺則庸茸下矣善乎嚴滄浪有言劊人宜取心肝喻於立命處殫力耳毛膚焉足試乎後登泰山金焦諸篇言自作更不隨人真凌駕千古膽也晚注五經考論厯代史刋正先誤自信彌篤或者以爵位駭按察不知正腐鼠等烏能驚動之哉贊曰文尚已出襲乃稱賊江都奮精羣譟靡惑言曰法後政曰正邦志所嚮往迅霄長江鄭善夫字繼之福州人仕至南京驗封郎中氣秀巗谷發情聲詩雖才韻弗充而古色精言髙映霞表飄飄然有逍遙逺舉之志好逰名山嘗入武夷雁蕩峻陟𡨕搜都忘內顧養疴自逺逡巡郎曹樂負髙標殆輕人爵時與衢州方豪同好意泊如矣嘗與豫期曰明年海上有紫氣東來是吾觀化至矣赴官留省中道奄殂吁亦竒怪也哉贊曰靈運樂遊嵇康慕仙超矣驗封千載同然南海孕靈陽春呈響鵠性鴻情永遺遐想都穆字玄敬蘇州人仕至太僕少卿清修博學網羅舊聞考訂疑義多所著述好逰山水雖居官曹奉使命有間即臨賞名勝騁其素懷所得必撰一記輯成巨帙又廣録古今金石遺文為金薤琳琅集齋居蕭然樂奉賓客銜杯道古以永終日不植生産或至屢空輒笑曰天地之間當不令都生餒死日晏如也文簡古有法詩雖孤孑沖泊竟非俗韻贊曰詞士托華技陋雕蟲雅儒慕古力紹揚雄懸罄非貧玄酒非薄自顧充然疇測其樂景暘字伯時流寓南京本儀真人仕至太子中允事母至孝目盲數嵗復明昆弟不逺故舊不遺人歸其德厚矣夷曠有度無競無傲仕既融達好學無怠法左馬遷為文不尚鈎棘字順語圓具有繩凖詩主盛唐蕭散遺俗庶幾髙卧北憲之懷體固所緩言矣余器重其人每言必正三事乃弗陟五階而逝其命也夫善書初工真行後師周伯琦小篆頗得風骨贊曰文以體正詩以興竒昧者志怪乃蹈支離中允端士德厚氣直詞鋒沛發靡不中的王韋字欽佩南京人仕至太僕少卿孝德純修喪母毁瘠卒父徽憲宗朝給事中直諫有聲少卿承志執節屹有稜範厯仕留署匪云要樞確明職司金石不撓不曰孝思維則者乎論詩専尚才情其言曰唐風既成詩自為格不與雅頌同趣漢魏變於雅頌唐體沿於國風雅言多盡風辭則微今以雅文為近詩未嘗不流於宋也故其詩婉麗多致雋味難窮或者謂為纎弱豈知所操之殊向哉贊曰王子維介明辨義利千金可捐一諾無替詞流别代力紹唐風涵情獨逺執象奚工唐寅字子畏一字伯虎蘇州人舉應天鄉試第一坐事廢坦夷疏曠冥契禪理弱冠居庠序漫負狂名著廣志賦暨連珠數十首跌宕融暢傾動羣儕青溪倪公見之亟稱才子以故翰苑先輩爭相引援驕妬互會竟媒禍孽棄落之餘益任放誕邪思過念絶而不萌託興歌謡徇情體物務諧俚耳罔避俳文雖作者不尚其詞君子可以觀其度矣今司馬袁帙所刻僅僅數篇則其絶詣也贊曰嗟嗟伯虎孰廣爾志登臺則流牖下斯滯生滅既一寵辱奚驚上善如水是生令名孫一元字太初不知何許人自云關中長寓吳越間卒於湖州風儀秀朗蹤迹竒譎玄巾白夾混逰貴賤常以鐵笛鶴瓢自隨遇所會心輒一傾倒蓋隱淪之髙逸性好吟詩初談導引人疑其仙晚嬰婚娶入司空劉公湖南雅社援進儒術皆非其本色也詩詞極其苦心所乏天才耳贊曰宦逹無私愧彼塵鞅山澗考槃乃嘉髙尚龍笛吟風鶴瓢酌月皎皎太初江湖之傑王寵字履吉蘇州人貢入太學卒清夷恬曠與物無競人擬之黃叔度尊官宿儒忘年友善罔不樂其溫醇詩詞刻尚風骨擺脫輕靡陶鎔李杜汰滌清文既正體裁復滅蹊徑可謂後來之髙足惜乎天不假年進而未止學士覩其汗血可也諺曰瓊以蚤折白石嶻嶪豈不信然哉行書疏秀出塵頗得晉法贊曰有美吉人溫其如玉既安孝友亦泯清濁楊芳詞苑先軌是程心逺節促靳其大成陳幾亭先生像贊陳素此幾亭先生待漏圖也昔者偕陟春闈聫趨丹陛今二十年事矣茫茫日月終始可言獲對典型愾焉如昨贊曰蔚蔚豐鎬澗西瀍東北極雲翳星共攸同懷我哲人克秉惇庸遡源濓雒正氣在躬搢笏明廷堂階聿崇肅肅裳衣神明與通大用未極遺範無窮一髮千鈞欽兹德容沐日浴月先生之風明文海卷一百二十三
