body:
  text: 明文海巻一百二十四餘姚黄宗羲編銘一義門銘并序宋濓天地之間有大防焉孝友之謂也水之始也濫觴爾茍無土以障之則必至於滔天火之初也熒爝爾茍非水以制之則必至於燎原人心感物而動不能無欲其端亦甚微不有孝友之人出為表式則淪胥以成風而彛倫斁矣昔先王有見於斯雖委巷刺草之民能行之者必旌命之所以贊皇治章仁風而挽之於正也世之評唐史者且謂張公藝季如本劉君良孝行推於友睦數世不衰真豪傑之士嗚呼當是時金章紫綬之賢皂盖朱轓之英布列中外未嘗無之顧以豪傑歸於閭巷之士者以其不俟教令所加而後奮也嗚呼南陔白華之詩盖亦商之末世周之盛徳也斯民以孝友著稱君子可以觀其世矣浦陽黄氏其先與文節公庭堅同所自出有諱度者宋隆興癸未進士亦諸祖也元至正中傳至諱珪君生三子其二曰隆曰生隆生一子曰逢原生生二子曰逢吉曰逢昌逢吉兄弟亦各生子至十有餘人三世之間孝友無間言逢吉乃殫志竭慮設為教條既鑱諸樂石復遣從子宿請濓銘之嗚呼子壮而分婦姑反唇相稽秦之俗已然矣况去古日逺風氣日益漓黄氏能不染於末俗卓然不變其恒度豈非豪傑者耶浦陽以義居聞者二三人惟鄭綺之家已至十葉黄氏知惑慕而興起進修益力烏知不綺若耶雖然許史之稱未足為貴也猗頓之貨未足為富也惟孝友積諸躬令名昭於時其為貴且富也大矣所恃立兩間而無愧稽諸賢哲而有徴著之後世而可法何莫不由於斯黄氏孫曽可不思自朂或能如濓言揆之張公藝之流他日可馴致矣詩有之風雨如晦雞鳴不已濓於黄氏盖深有望焉銘曰浙河東疆地曰浦陽厥氏維黄雙井同枝科名陸離世服詩書有儒其冠以義為藩奕葉共飱視其齋庭左史右經踵武繩繩視其房除前絲後纑燈火與俱至和所形揖讓而升穆然無聲既衍而葩實而匪夸三代一家世道下趨子父割閨婦姑勃蹊十室九衰瀾倒波頺為天莫回蠅聲方𡨕忽聞怒霆孰不為驚植範建防翼法輔常斯徳之元造端非難延裕惟艱任重於山如為高陵世益代増非人獨能如松之青故隕新承所以永貞方先與謀庶行之修其道曷由執敬為符夙夜究圖百世如初菜薖六器銘唐肅余子治圃越城南屋其中曰菜薖榘軒先生既銘之唐肅復銘其器六以余子之治圃也其蓺菜也必以鉏銘其鉏曰墾而植本斯立培而垕蘖斯茂衡深淺毋爾苟既蓺其灌之也必以甕銘其甕曰泉之容伊徳之充泉之吐伊澤之溥其掲勿羸其挈勿隳勿事乎桔橰之機既灌矣而草害焉薙之必以刃銘其刃曰惡草之滋資女以剪夷弗剪而夷則茅其蹊草去矣菜豐矣采之必以筐銘其筐曰掇其美毋以下體斂其實勿滿而溢虚而受之乃其徳左之右之慎爾執采而得之芼之必以釡薦之必以盤銘其釡曰溉於斯烹於斯我有㫖畜甘如飴彼鼎食者殆而銘其盤曰脂弗我汚兮羶弗我慕兮惟味道之助兮銘已余子曰噫子善銘吾器切於物奥於理其足為吾儆乎請書之菜薖以繼榘軒之作於是乎書周宁父丁斝漢素温壺銘并序童軒周宁父丁斝漢素温壺各一欽差鎮守雲南太監錢公素嗜珍玩愛其古雅購而得之乃徴銘於軒軒按欵高九寸九分深五寸二分口視深而減二分容四升八合兩耳三趾簡質無文者廼周宁父丁之斝也髙七寸口徑一寸五分腹倍高而少縮光彩瑩潔色若流丹者廼漢素温之壺也是二器逺者不下二千餘年近者亦千數百嵗或顯而彚進或晦而陸沉予不知其幾矣然其所以用不用者豈物自為之哉盖必有使之以顯尼之以晦者也嗚呼士之處世何以異此是故耕莘者伊也保衡者亦伊也築傅巖者說也置左右者亦說也方其耕莘築巖身執賤役何異物之見棄而自淪於瓴甓瓦礫者乎及其保衡左右斯道大行又何異於器之見用而自同於殷彞周鼎者乎是知人之遇不遇物之用不用皆非已之所能為也雖然人之見遇者亦多矣使非其器安能必無其敗乎故器非鼎也秪見其折足而覆耳器非瓶也秪見其未繘而羸耳器非罍也秪見其缾罄而恥耳果足用乎故人之欲善其用者又不可以不利其器也或曰人奚物之比耶人之用大可以毗一人康四海小可以修庶事共百職而其所藏之器所通之用豈直兩耳三趾方口圎腹之謂哉矧舊臣可任也夀耉可謀也故傳曰人舊則習器舊則弊人奚物之比耶予惑其言竊惟舊臣夀耉皆老成之人予不能無望於世之君子遂取二器之義以銘之其詞曰有鼎之形靡折其足有罍之量匪枵其腹斝兮斝兮盖有類乎養其大不累於小者其將求王明之受福者乎右斝銘瑩於外盎然以豐虚其中廓乎有容壺兮壺兮盖有類乎體之大而用不窮者非所謂有始而有終者乎右壺銘居庸闗銘有序劉定之余觀自古帝王建極作都君制華裔維本於大徳以膺天命結人心而未嘗不據依形勝以自固而謂扼天下之吭者也彼侯國所恃若齊穆陵闗楚武闗小不之論而秦與西漢唐都雍周與東漢晉都洛乃宇内大都㑹且傳世久逺統御廣際者然雍之險在函谷闗洛之險在成臯闗亦不過控臨中國而已唯我皇明定鼎冀方南向以御諸夏北眺以威邊界其介乎中外之闗曰居庸實為覆載以内莫大要地謹按地志闗在昌平西北四十里元翰林學士王煇謂始皇築長城居息庸徒於此故以名焉夫講求地理實蹟而勤述其義書生事也况兹闗重險鉅防若前之云可不銘乎銘曰帝承天命朔野是都坤奠其軸乾屹其樞長城為帶自天繚繞中聳雄闗洞城裏表鐡壁谽谺玉峽嶕嶢俯壓博厚仰矗層霄冠以雉堞守以虎旅屏翰中華昄章土宇龍旗北伐鼓行其中如雷之震以出太空呼韓南來欵塞其下如蟻叩閽以干天赦昔秦興役庸徒乃居宋失其防遼金長驅曷若皇明天所綏顧不創而因不嚴而固一夫當之萬夫莫前一世開之萬世其傳攬翠為書席崖作碣勒此銘章以貽無極石鐘山銘有序楊守陳彭蠡之口有山名石鐘尚矣後魏酈元以為下臨深潭微風鼓浪水石相搏響若洪鐘也而唐李渤非之謂如其說則瀕流庶峰皆可以膺斯名盖潭際雙石叩而聆之南聲函胡北音清越是石鐘也而宋蘇軾非之謂石之鏗然有聲者所在皆是何獨此以鐘名盖山下皆石穴微波入之聲嚕吰如鐘鼓中流大石空中多竅與風水吞吐有窽坎鏜鞳之聲嘗親察而得其實故是酈矣而周必大又謂上鐘石高四尺下鐘石濶丈餘叩之皆響若鐘磬他石則否復是李焉余謂波間衆竅其豐山之自鳴者乎潭際雙石其宋左師之毎擊者乎是皆可謂鐘也然瀕流庶峰其下響若鐘者盖鮮石之高大而叩之函胡清越如兩鐘石者亦安得所在皆是且山之以物象名者若石鼓文筆之類亦豈必為天下獨然後名哉昉名山者其舟而察諸波間耶果屐而叩諸潭際耶抑若大寧之山嘗有巨石狀如大鏞而今以已為波淪之九鼎火焚之崑玉耶是皆不可知者事不目見耳聞而可臆斷其有無蘇之戒也前四人皆目見耳聞而言猶不能定於一余固不敢臆斷顧區區一山名何損於天下亦無足深辨者聞之故老我太祖高皇帝伐偽漢陳友諒時駐師湖口嘗登是山既而大捷友諒殪焉時羣敵惟友諒實彊難克肆勞六飛躬駕後戡四方皆指授將帥勢如破竹然則湖口之捷實天下之基也方登此時廟算先定聖謨孔神高陟逺覽之頃固已空七澤而奄八荒矣抑或山靈水伯變草木為甲兵驅龍魚為蹕警以張皇威助聖武耶凡山川獲一賢貴登臨以名於世皆可謂幸而是山乃䝉玉趾親臨龍顔寵顧一岑一壑至今猶有輝耀何幸尚焉古之人睹河洛則思禹功往在元季㣲我高祖民其殱矣今四海内外百年之間庶職恬逸萬民乂和雖羣動庶植猶勝於亂世之烝黎者皆高祖戡定輯寧之勞而列聖紹述煦嫗之澤也凡登是山者左顧彭蠡右瞻金陵江漢之心其可已哉兵部正郎王尚忠嘗書於山之佛閣間属余言故為之銘俾鑱諸崖石用告來者舍其細而懐其大云銘曰楚有巨浸漫五百里曰鄱陽湖盖古彭蠡陽鳥攸居禹貢肇紀其委之窮或扼其衝有山特起㠎嶫穹窿水經載之其名石鐘往在元季有梟横厲江漢之間雲擾麻沸崇岡震驚汔可小愒天命聖武舟師徂征矛㦸百萬飈馳霆鍧烈火西耀煌煌赤城敵衂而逋岠之湖口乃躋兩鐘以望九有鸞旗前登羽衛擁後猿麋羣迓魚媵鳥將雲霞増耀木石焜煌天覧電瞩已空荆湘玉輅方降捷音沸騰矢激酋殪厥衆角崩或者草木奮為甲兵四方羣敵兹迺惟劇一鼓殱之餘何庸力席巻萬邦拯其焚溺永康兆民澤垂萬世峻徳穹勲惟天其至謂天盖高曷足與儷山有巨石舊銘禹功苔蝕蘚剥有光流虹相古勲業亦銘鼎鐘於皇聖明式配神禹宜偕厥銘以耀終古厲我臣民無忘烈祖韶石銘幷序王漸逵惟皇舜既攝元位躬厯數受於文祖乃朝羣岳以釐庶政觀風於多方於是嵗仲春二月東巡守於岱宗柴燔於名山大川以恊天時以修人紀敦禮明政以憲於東后嵗五月仲夏復南巡守於明都迄衡岳沿湖湘上陟九疑廼厯郴桂又其南抵於曲江之濱受覲於皇岡羣后羣牧畢㑹圭璧琮璜五瑞三帛侍於荒坰南蠻貢琛惟瑤琨象犀具皇舜迺矢文徳舞韶於皇岡之陽鳳凰來儀百獸蹌蹌羣后荒服㒺不丕格以遜皇舜曰都予聞惟帝祗承明徳不寳異物予其懋哉廼歸覲於羣牧歸貢於蠻荒之長三讓弗克委而去之廼陟方西惟皇既西羣后蠻荒亦各抵厥疆衆物棄於水湄粤古迄今遂成靈異天帝廼命祝融司䕶永奠厥荒以風於多邦某謂皇徳廣運後之士庶㒺或測識曰為韶石曰為香爐相傳以譌兹惟湮哉廼敬述其事而銘之其辭曰洪荒之餘宣命之紀肇厥元聖中天而起維彼元聖徳配彼天重華協光放勲是禪帝曰汝舜予耋於勤爾巽朕位萬邦皇君厥位既攝廼陟羣方修禮同度迄彼南荒維皇寧止南荒嘉祉羣后敷功蠻方聿至其至惟何格兹文命維琛祗徳克讓以敬維徳維寳不珍異物蒼璧竒皇載堙以汨湞水溶溶皇岡䓗䓗億萬斯年維皇之宫靈涉自天百世之下錫我元元草木夭喬山川沖郁維皇之光衍此遐福溟東小臣勒此蕪文昭皇之徳以詔後人書齋銘并序歸有光齋故市廛也恒市人居之鄰左右亦惟市人也前臨大衢衢之行又市人為多也挾䇿而居者自項脊生始無何同志者亦稍稍來集與項脊生居無中庭以衢為庭門半開過者側立凝視故與市人為買賣者熟舊地目不暇舉信足及門始覺而去已乃為藩籬衷以修扉用息人影然耳邊聲閧然毎至深夜坐者欲睡行者不止寧静之趣得之目而又失之耳也項脊生曰余聞朱文公欲於羅浮山静坐十年盖昔之名人高士其學多得之長山大谷之中人跡之所不至其氣清神凝而不亂也夫莽蒼之際小丘巻石古木數株花落水流令人神思爽然况天閉地藏神區鬼奥邪其亦不可謂無助也已然吳中名山西亘巨海東浸林屋洞庭類非人世皆可宿舂逰者今遙望者幾年矣尚不得一至即今欲稍離市廛去之尋丈不可得者也盖君子之學有不能屑屑於是者矣管寧與華歆讀書户外有乗軒者歆就視之寧弗為顧狄梁公對俗吏不暇與偶語此三人者其亦若今之居也而寧與歆之辨又在此而不在彼也項脊生曰書齋可以市㕓市㕓亦書齋也銘曰深山大澤實産蛇龍哲人静觀亦寧其宫余居予喧市肆紛那欲迯空虚地少天多日出事起萬衆憧憧形聲變幻時時不同蚊之聲雷蠅之聲雨無微不聞吾惡吾耳曷敢懷居學顔之志高堂静居何與吾事彼美室者不美厥身或静於外不静於心余兹是懼惕焉靡寧左圖右書念念兢兢人心之精通於神聖何必羅浮能敬斯静魚龍萬恠海波自積火熱水濡深夜亦息能識鳶魚物物道真我無公朝安有市人是内非外為道為釋内外兩忘聖賢之極目之畏尖荆棘滿室厥恐惴惴危階是習余少好僻居如處女見人若驚噤不能語出應世事有如束縳所養若斯形穢心忸矧伊同胞舉目可惻藩籬已多去之何適皇風既邈淳風日漓誰任其責吾心孔悲人輕人類不滿一瞬孰塗之人而非堯舜丁氏半山亭銘并序李東陽潛川丁君繼仁隠士也作亭於銅山之半名曰半山亭其子鴻臚序班鉷乞予銘諸石縣之近區若槽山之奸雄冶父之神恠龍湫之虚幻皆君子所不談麟山之風致亦未足深論彼半山者王荆公之故名也荆公争謝公墩詩議者謂其習氣所發使其有知未必忘情於地下予為君識之以貽其後人使知兹亭為丁氏故物君之心非有所競而人亦莫得而競也銘曰盧之潛川有山曰銅有亭厥中作者丁翁雙甍夾飛層簷闞空繩平度均不下以上吐呑嵐霧凌薄蒼莽俯臨豁閕仰抗髙爽羣竒羅列萬象森朗連山逶迤如屏如牆長江重湖溔溔茫茫喬林長堤曲澗方塘晨暉夕隂往來其旁西望槽山魏武所駐姦雄一顧乾割坤據金卯訖籙旋為典午河山猶在俯仰千古歐冶遺山鳴金既躍張干雷邪光彩淪落幻術莫究九原不作僧有伏虎龍湫是於龍亡虎逝此事長吁亦有龍眠麟山故蹟丹青窈眇千載泉石山峙川流嵗月若奔歸視吾山吾亭固存我居我㳺我燕我飱終我齒髮貽我子孫昔有半山粤惟安石謝墩王寺名同代隔我來君去誰主誰客平生英氣所遇成敵終焉一歸誰失誰得今有半山若蹈陳迹彼豪有知此憾誰釋物各有主古人則云往者勿追來者有聞富貴難恃虚無莫陳不朽有圖惟徳與文汝亭不欹汝山不磷我銘在兹垂千百春讀易銘并序楊爵余既乆在罪難中自念君子存仁造次顛沛未嘗少懈嵗月云邁百年昜失頃刻光隂未可以若醉若夢而玩處之也即卧側障之以席盥手焚香凝神清慮讀易於其間客有謂予者曰其名此為安樂窩可乎余應之曰不然也余之罪多矣奚以安樂為哉人之處世非安樂則困辱二者而已世之人或以富貴為安樂以患難為困辱此固未然而謂吾之處困為安樂亦非也夫其所為慊于心而合乎義理之中正則雖日在患難此心未嘗不安樂也夫其所為愧於心而戾乎義理之中正則雖日處富貴而此心未嘗不困辱也吾之所為質於古人之作用為何如其愧於四聖亦多矣然則名吾所處為困辱窩可也又奚以安樂為哉况易之為書廣大悉備天地萬物之理具於此損益困節中孚習坎則切於處憂患之道也因銘以自警銘曰安樂安樂由心之作輾轉困辱惟吾所速四聖垂訓炳炳簡編議之而後動擬之而後言或可以觀象玩辭而補吾之愆約菴銘并序顧璘正徳庚辰之嵗璘來京師太僕少卿周君見於舍曰吾竊幸乎子來吾方有解於中未以語人請質之子始吾論學恥弗愽也故統覧聖經汎涉羣言多識廣思唯恐或漏作為文章既被雲漢囊山岳且猶慊慊焉羞其鄙瑣今也多言而患馳茍有㑹焉兀兀終日而已始吾論才曰震奮為雄曠朗為特剸裁巨細弗見棼糅者斯天下之通才也古之人廣謀若平宏辨若誼吾甘執鞭其門今也覩沉黙淵密之士外木而中理動簡而節周有餘味矣服今吾取其素也味今吾取其薄也居室今吾取其適體也交際今吾取其不廢禮也推之百物靡不以約為尚乃築菴稱約志吾警焉豈釋故即新有㳺於道階乎抑氣衰志頺将戔戔自居齷齪以茍終乎物有自蔽道有自疑故目不視面燭不輝跋明所弗逮也乃今願得承教於子於是璘乃正客起賀曰善哉先生之學乎所謂黜華掇實舍凡而執要者也按約之義為省為束為要均道本焉是故太饗之𤣥尊大路之素幬省也服之用大帶射之用拾束也稽數以籌張網以綱要也匪省則華華則濫質匪束則散散則淫志匪要則泛泛則隳功故君子之學省也而後質固束焉而後志荘要焉而後功篤三者既修聖人之道具矣然則先生之務約也又何以加諸璘不佞無以復高明願修銘于菴以相厥志乃銘曰道本一原物始太朴維皇建則貴順惡鑿澆風既澶繁縟紛錯士尚彌荒靡所止託君子孔憂遡懷渾噩爰究道真統玆守約内存必專外動必確豈無多方匪我攸學埋奴銘有序郭子章蜀之交川古氐羌地繇來逺矣其遐裔錯住洞島混跡漢蠻結氊毳以自蔽習精悍而健鬬其性然也明興經略西川招撫邊戎當事者以豺狼不可狎也嵗捐金繒羈縻之然亦不敢負阻馮兇以逞邇來蟻衆彌夥犬牙隃厲皴􅀈不䖍貪猥無饜隊西戎以剥行道連北敵而騷居民至刈我堡長刳我邊人殘孽貫盈天人共怒時皇帝君天下嵗之柔兆閹茂也大司馬徐公奉天討揭靈旗屬文臣材官而畫以方畧飲冰授節指日揚麾先庚而號令嚴肅未鼓而士卒譁釦或攻或伐或圍或追勢如解籜事埒拉枯蠻且披靡莫知所嚮曳兵而實塹谷者自成京觀冐衂而赴江河者歘若斷流渠賊就擒碉房悉燬不半載而四十餘砦一埽無存故穴匪依餘黨深竄懼天戈之盡劉悔偏頭之末從面縳軍門以乞降還銀錁而納欵攪其首亂㰱血埋奴以矢必不敢逆命司馬公乃奏凱班師西鄙之民始囅然解戈而即衽席矣露布以聞聖天子獨偉其功爵賞有差余同年謝彦實氏觀察威茂出入帷幄親履矢石嘗以其所睹記者紀西征事甚偹因屬子章為銘鐫之石以彰一代頋膚且以示羌戎之後來者嗟乎漢當中興尚閉玉闗謝西域唐丁盛際諸蕃僅質侍子未聞自縳首兇數十人甘心幽土以堅誓盟自非靈威神武安能鎮壓其狼心建千古駿業哉赫矣壮乎洵為不朽敬綴其概而系之銘銘曰芒芒天府坤維接畛綱以封艐綴以仁允狡焉彼獠滋蔓如稹勝乎梟獍殘於玁狁侵玩不蠲酷兹邊疢事聞當宁帝赫斯怒授大司馬琱戈以捕爰擘文韜廣掇武庫獰将操盾謀臣獻謨鼓􅬧震天轒輼塞路蹴嶽拔山掣電巷霧虵豕陵亂狼狽而嘑曷矯其鷙曷馮其固埶壓穹廬機駭槃瓠追奔逐北俘馘滿野餘孽窮屈悔負咻噢願罷金繒以謝西征稽顙植頷籲天丐生詎曰騂旄縳而乞盟瘞之邊土僇彼不庭五兵既隠七宿尊衡啓陲之疆篤國之禎功序廟廊茂賞殊旌在昔嚴帥劍閣勒銘矧兹偉煜豈直蠻平异哉京觀自劌鯢鯨刻石山阿千載威名􅩯村石硯銘錢允治吳西界三十里有村名􅩯亦曰硯石之山上為吳王之故宫其石也村中人取以為猪之欄糞之窖等於瓦甓城中人取以為牆之趾階之級稍為尊崇而為硯者千不得一也羅紋鸜鵒金星玉帶富貴者得而狎之貧賤者莫得而庸焉乃鄙人取􅩯材之中硯者付之良工琢而為之不古不今可異可同高其外虛其中寛而不偪深而有容於以吮筆濡毫其大徑文其小徑尺或為雲虹夭矯長空或為游絲披拂清風可以發越吾之鬱勃可以輸寫吾之心胸其徳靡改其壽無窮噫嘻兹石也非玉也詎曰比徳乎帝鴻彭祖觀井銘孟思維古人中名善養生於我老彭獲壽極永靡物不警尤謹觀井覆井車輪絙樹縈身扶杖蹲蹲乃敢少前俛視惕然猶恐墜旃意若孱孱苟能效焉維以永年予曰不爾怵怵蕙蕙非養身㫖拘若凍蠅氣拂厥膺必夕飲氷跼蹐以臨蹜蹜滯淫奭傷厥心即有井幹匪冽泉寒苟或以看損目傷肝兢然若墜是為過懼懼過膽傷脉絡不注榮殘衛單交相為瘉養生如彭四體不諭我養生術術簡弗難非吐而納不藥而丹弗輪弗繩去杖而安既不隕越亦不蹣跚厥術云何有井勿觀明文海巻一百二十四
