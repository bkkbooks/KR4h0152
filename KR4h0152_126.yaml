body:
  text: 明文海巻一百二十六餘姚黄宗羲編戒一三戒趙撝謙昔柳子厚作麋驢䑕三戒蘇子瞻愛其辭乃以河豚以下三者擬之其風戒之意切矣近有觸於余懷者頗類乎是故亦作三篇於其左灘之龜余舍濵溪上石皛皛然延袤數十畆間而新霽有龜出暴於石牧兒適有見者蹶步執之號於衆曰吾得龜矣從衆往趨視之戲玩百状有欲視其首者龜堅縮不出戲祝曰龜乎龜乎能出首以視予乎頃復不出乃相謀以幾棘揕之揕其尾則首出揕其首則尾出兒乃大笑曰以善道求汝則首不出以惡法侮汝則首尾俱應尚為知所從耶吾以汝能先吉凶以告人而不能先吉凶以免已尚為知者耶羣兒皆揶揄大笑余聞之亦含笑而歸援筆識之穿山甲甲蟲有穿山其名者善穴山而出故名性嗜蟻於羣聚處輒開其甲佯死於地蟻入甲罅咂咂然如得珍物俟其至衆則固斂其甲入水甲張浮螘水上徐以口拾之日食皆然一日遇人於山谷間人以沙礫擲之則巻然作束如石状以紿人人見其紿也因持以歸臠其肉而食之甚㫖以其甲能已風疾復貨於藥肆吁穿山謀食之計亦巧矣何其巧於取蟻而拙於避人也哉卒至肉臠甲拆之患悲夫水之鷸鷸一名翡翠體雖小其毛羽青瑩輝彩可玩常循飛水厓入水底取魚蝦水族食之巧者利其毛羽以一囮飛舞水上媒而執之取其羽市於富貴家為女子飾直視金玉因致富夫負毛羽之美而不能循幽藏僻乃栩然終日競誘於人至於斷取而終不悟哀哉雖然世以羽毛夸於人者豈獨一鷸與車戒蔡潮逸休先生居洛下八十年未嘗一日不讀書潛心聖學灼然燭事理恒計人禍福於幾先㒺或不應騐人以為通神嘗閑行郊外遇有商販虞孚者厚其載以貨於洛日且昃違城市尚舎許懁促急趨意倉皇不循軌轍問蚤暮之節於先生答曰宜調爾轡舒爾御範爾馳驅雖暮尚可到亟則不能也孚怒目抵憤謂先生迂且誑箠䇿甚急兼步疾驅電歘而飈旋矢激而霆迅揚揚然拊軾呼噪飛塵蔽天日茫乎若憑虚而莫知所指未數里側越峻岐左凹右凸讙聲聞逺社而車覆矣輪傾輻敗盖折軫虧貨毁壓過半震愕噭號僅以身脱輯理漸向瞑竟止於郊外謁拜先生寓所願聞先知之故答曰吾非䜟緯術數之學洞觀古今據理審勢而必然也不聞孔子云欲速則不達見小利則大事不成吾豈教汝以緩不及事哉昔晉陽處父以剛愎敗乃事鄭子陽以迫隘災其身前車之覆後車之戒也能如西門豹佩韋以自緩董安于佩弦以自勵均其緩急使之調和何以至此極孚愧謝而去雖悔無及矣靖州馮生鑾發跡轅門初授天台令其於禍福之機軸倚伏之途轍領受予門舊矣因其請教之勤述往事作車戒貽之五誡張純越有女桑氏年十六而寡誓不改節髙垣墉辨内外雖童子不得見盛年遷於逸慾旁室有美男子聲音相悦私握地而通焉每至旦貞操又凛若蓬鬢垢面哭泣不絶皆曰楚之貞姬也縣尹上其事於朝以旌之未報女桑氏則姙身就館矣且曰予思苦而腹疾也或令其家求醫診脉曰男女不相凟死固吾所也何求於生鄉人益賢之數月呱呱而生子噫鐘聲自宫鶴聞於天本之先蹶枝葉從之魚之在淵欲盖而章孰謂微之不顯而令名可以倖取哉女桑氏早知戒焉吾知不必傳笑扵世也余讀書於瑶山下忽有人告余曰是巔有白人洞草木叢幽鬼神焉司之樵牧者必墜死怠於祭祀則稼穡不能登每聞有訶斥聲余曰有是哉是嵗五月五日之夜分風凄雨黒見流火星然散而一二而什伯也其光燭天復合於一俄上俄下守舎者不敢指曰虎豹棲止暮夜何之人乎非也吾知洞君逰也余亦不能辨閉户歎息而已詰旦閱其所有人跡焉盖某人舉族求其牛羊也夫訛言先入繼眩於目見茍非参騐之固焉誰其以理觀乎詩曰人之為言茍亦無然此之謂也吳人客於楚八年而歸道宿於山舎見一美女無父母兄弟為作飲食設衾􅎭心悅之結為夫婦未曙負而逃焉其友問其故具答之曰是謂非望之福也必有竒禍盍為爾卜諸卜曰狐也不聼其妻知之日夜泣不止曰是恐割吾愛也妒婦人也遂出之期年形體羸弱語言訛亂或為召巫師燃鹿角而照之狐立於牀下始矍然而悟遂召其友與故妻也再拜而謝焉滄江道人曰取諸外妖而為祥不信其内親而為仇今之人皆然妄也是故惟仁者能愛人能惡人余行括之深山中見一翁顔色如童子坐一石室余異而問之曰皇都北徙老夫居此余曰何術而夀何老而幼也曰余兄業商賈北走湖南窮百粤以巧射利珠玉逼楹手足不停先余而死九十年二弟佞不能辨奸不能眩好文辭日事筆硯識利害是非瑣瑣而計析之不倦先予而死百有十年余長而愚妻子曰咨遂不室廬風雨霧雪言蔽其樗朝陽明月抱犢于于起卧無常黄精為糧曰春與夏花明草叢落葉飛鴻乃知秋冬憂不至我樂不知終言訖而去嘯於長松翁盖有道者也余思結髪記誦逶迤盛年窮通好醜其中乃遷𤣥鬢種種顔色不妍攬鏡自照為之茫然自今而後須命於天如木如石謹識斯言吾鄉有鄭學究者隂為不善妻子詬詈如傭丐出而教小兒峩而冠衣裳楚楚束帶而佩玉勃然而顔色如神命出則唯唯奉行不敢慢有惡之者紿其子弟曰爾師平素如是如是謹效之弗受責也兒輩信之凡聲音舉動悉夫人所云也鄭覺焉甚愧不越月而去之噫今之為民上者反所好而令不自度而作威百姓之化于惡德能無愧乎故曰善為人者能自為者也善治人者能自治者也明文海巻一百二十六
