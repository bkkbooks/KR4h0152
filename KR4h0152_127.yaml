body:
  text: 明文海卷一百二十七餘姚黄宗羲編解一琴釋胡翰嬀仲子學琴於東峴之叟三日而鈎絃七日而成章不習者踰月而幾於忘矣客有造者曰大夫無故不徹縣士無故不徹琴瑟吾見仲子之琴徹矣亦有故乎仲子曰無故也吾聞清角者天子之琴也號鐘者諸侯之琴也皆古之制也未之能詳焉吾嘗以今之琴攫而醳之揆之於古其制有曰八尺六寸正度者有曰七尺二寸者又有法四時五行長四尺五寸者又有象三百六旬有六日為朞之數者代有不同孰從而凖之五絃宮商角徴羽大絃寛而温小絃清亷而不亂故宫為首商次之角又次之徴羽又次之未有以宫居中央商張右旁小大相次不失其序如漢儒所傳者習而不察孰從而正之五絃之外為少宫文王所加也少宮之外為少商武王所加也未有為文王操能去武聲不以少商應大絃如唐人所論者此又弗察也謂之變音可也音止為五加二為七蔡邕益之為九絃孫登損之為一絃由一衍之為二儀由十倍之為二十者有之以為好事者之過而二十七絃之離周已具矣此别出變音也故名曰變後世迭為損益蓋不知其非正也漢去古近史遷所載當時之制豈不由周人之舊乎桓譚蔡邕可謂好古矣未聞有取於遷也歴數百年而至唐楊収奮其獨見之言以折安涗生之徒而在邕亦未之有及也以史遷桓譚蔡邕楊収之博物通類猶不能正之後世孰取法焉况聲音之别有經有緯有從其製有暢有操有引有吟有弄其妙窮本極幽得之心者不可喻以言得之手者不可傳以譜得之天者人不與力焉求其如成連師曠師襄師文者益又逺矣天地之間形氣相軋而聲生焉今夫高厓巨壑泉源所出淙然而鳴沛然而决澎湃沓湤放乎江河之間瀄乎舂容而自得及其遇大礜批大窽怒而相射囬旋相薄大者砰然小者硜然聽不可極砉若神物慿之莫測此非水石之聲也耶鴻䝉廣莫之野噫氣鼓之或穆而清或凄而厲八方蕩摩其變也霅然外隂閉而内陽欲出二氣未分若與敵遇轟然動乎九地轠而磕磕颯然而天雨此非風霆之聲也耶奮至德之光合生氣之序剛而不怒柔而不懾嘽緩而不肆幽深而不怨不播不石不噍不殺不惉懘其情深其文明其氣也盛其化也神洋洋颯颯乎非風非霆非水非石此何聲也惡得而寫諸客竦而聽俯而怍卑陬而退邃菴解李東陽邃菴主人通籍禁廬僑居京第隟地晨掃重扉晝閉客有過者叩門而問曰此非揚子之居乎童子對曰是也導客而入若引若曵複院繚垣巍堂巨欐客乃蹜足脱屨探懷出刺將修容以為禮且厯階而就次童子曰未也再導而前委蛇隱翳突霤中啓懸櫳外蔽客乃髣髴指擬逡廵睤睨耳側聽而無聞歩將舒而復䟦童子曰未也盡厯紆曲豁達蒙曀仄徑旁通曾軒倒綴棐几庭設牙籖架庋主人方兀坐書堆凝神注思聆謦欬而倔起具冠裳而出俟客乃揖而請曰子何居之邃耶主人曰從善實難從惡則易地有所宜擇俗有所宜辟吾將寄逺心於車馬託大隱於城市屏物誘於紛華去塵襟於祓禊期深造以獨得匪超舉而長逝客曰如斯而已乎主人曰六籍絲棼諸家鼎沸衆難交錯羣疑積滯吾將辨亥豕於偏旁註蟲魚於疏記思縷析而毫分庶窮􅊧而絶繼豈塊處而無營亦嬰心於有事客曰如斯而已乎主人曰理窟淵㣲天機奥秘尼叟之所罕言庖犧之不盡意吾將高仰堅鑚深鈎逺致求四情於未發之時探五性於有生之際繇粗而益極其精舉大而不遺其細尋墜緒於唐虞溯長源於洙泗窺數仭之宫墻涉千尋之涯涘會萬變以同歸或殊途而一揆顧兹菴之攸寄若百工之在肆彼居安以資深亦引伸而觸類者也客起再拜領邃之義識道理之鄉方得工夫之次第若馳康莊請執君轡若游大川請鼓君枻隨君所之無畫無廢鉅卷長辭髙楣大字睎唐學觧擬漢賔戲匪菴則名敢告同志香灰解楊爵予復下獄半載為丙午年三月初七日晨旦東厰使邏者來覘即予卧側以殘甎藉囚板上相與偶坐者久之獄中穢氣鬱蒸久在内者習不自知從外乍進則臭不可堪乃以棒香一莖揷坐前甎縫中焚之須臾香盡灰不散宛如一完香焉予取而懸諸壁上至第五日猶未散因思其故為作觧以散之夫是物也其將中抱憾積憤凝滯於此而有不釋然耶抑焚猶未焚而托此以為永久耶二者雖有間焉而其精誠感致則一也遭世乖變人定勝天即一物之㣲而其用之所措固有幸有不幸焉耳葢賔筵廣設幄錦幃羅庖翟薦德恪舉殊儀叶五和切音哦上肅環冕下列笙歌君臣交慶委佩鳴珂旅語之際嘉謀孔多聞善即聽若决江河王猷下降枯槁滂沱雍容揖遜永息干戈上安下順宇内冲和則唐虞三代之境界也燒異薫以昭明德固已有之舎彼其處而來焚吾獄中焉此何等氣象也墐櫳掩戶日影不通塵留負鼠隙引汚風一息淹淹百慮忡忡其與吾環列而偕坐者不過三五囚徒東西南北偶此相逄或十三四齡口尚乳臭之䜿子或八九十歳鬚眉皓然之老翁身披帶索首冒飛蓬額蹙氣䘮肌削腸空縱蓄百金一動即窮荷校滅耳罪彼不聦手梏足械膿白血紅俯就坎窞仰叫穹窿使聞之者皺眉見之者戚恫甚至於不能為心則閉目掩耳佯為瞽聾爾來焚此可謂擇地擇人之未審忽於所入而謬於所從者矣久而不化疑有神明類彼志士之死不瞑嗚呼其劉忠愍耶抑周蹟山浦竹塘耶不死正寢死此福堂名垂不朽同彼霄壤與我國家為龍為光雖然陵谷有時而變遷金石亦至於消泐故凡合氣成質寓形宇内而為人為物者終歸於盡天地如此其大也古今如此其逺也其孰不蕩為灰塵而揚為飄風乎爾其欲外消息盈虛之常道觀反復無窮之世變以後天而終乎是固無此理也吾為爾摩散之再拜而祝之曰匪人焚爾惟爾自焚爾不馨香與物常存煅以烈火騰為烟氲上而不下聚而不分直衝霄漢變為奇雲餘香不斷苾苾芬芬龍逢比干相與為羣爾宜自慊胡為云云理無二致吾以喻人事茍可死何憚殺身願爾速化歸彼蒼旻樂天委運還爾之真拜起悽愴雙淚盈襟嗚呼易化者一時之形難化者萬世之心形化而心終不化吾其何時焉與爾乎得一相尋也許白雲求誌解張寧虞文靖公不肯銘白雲許先生之墓以書幣復張率性轉致其門人門人於先生猶父子以父事於人而為人所阻未有不怒者庸暇計其可否哉無怪許氏門人之致辨也王餘慶聯往復書為一通識其末曰世固有越世而相感並世而不相知者詩書文章天下所共知人品氣節亦天下所共知是惡用以口舌辨敬書以見古今士俗隆汙其言意正平和婉不激不露度越同門逺甚後之觀者止可致感歎於存殁之際敢以為身之戒勉不宜巧排力辯為死者定枉直於不可致詰之鄉而加之意非侍於君子之道也公書中語於先生固已尊待之至若其論列為銘非知之盡則無以詔天下而信後世意即東萊所謂待人不得不寛論人不得不盡者或遽以此議公昧於知人公於先生言極尊待豈得不知所不知者特以行狀多未諭終莫能得其學行道德之詳而難於序述耳豈可與蘇東坡不肯奉詔作苑公埋銘者例論哉寧三復荘誦因文靖公書見古人為文之不茍因王餘慶諸門人之書見古人師弟子恩義之篤餘不敢知也是卷流落人間楮墨如故而今為彥章都閫所得可以托不朽矣予見卷中題識者無不致疑於彼此之間敬為之解冩騷亭釋張弼淮陽子為秋官郎以寫騷名亭有非之者曰屈原之離騷其何時乎使非楚襄懷之世恐弗作也子當成康之治而寫騷殆所謂不病而呻吟乎能無背時乎淮陽笑不答其弟子吳之珍以吿夏官郎東海居士居士艴然而起曰汝知春秋乎春秋叔世之書也亂臣賊子之事也孔子不得已而著此刑書宜治世之弗之用也漢之盛時儒先君子嘗治之乎曰治唐之盛時儒先君子嘗講之乎曰講宋之盛時儒先君子嘗究之乎曰究使在堯舜之世必將併絶之乎之珍黙然意若有弗懌者居士曰吾方患世之陋儒俗子謂孔子道之以政齊之以刑為五伯之事未知堯舜之治亦用政刑乎曰此猶天地之四時有春無秋何以成萬物曰然則堯舜既不可無刑政則春秋在堯舜時亦必不廢也曰諾曰亦有廢之者乎曰有曰誰曰王安石也安石之流嘗鄙棄春秋謂斷爛朝報矣曰其究云何曰塗炭華夏招徠邊釁播遷王室陸沈神州遂至亂臣接踵怙勢擅權而宋祚因以淪亡實肇自春秋之毁也居士撫几曰噫亂世之春秋乃治世之膏梁不可毁者如是夫則離騷之在治世當毁之乎離騷固非春秋比倫也忠君愛國之心九死不變則春秋之所必與也敢問盛治之世懷忠君愛國之心者將在所斥逺乎加奬也朱子所以雖扶病必詳釋之也處方今盛時而寫騷可乎不可乎其志忠乎佞乎其行潔乎汚乎必有能辨之者然而必不逮彼捧溺嘗惡之流華爵秩盛輿馬飽妻子志得意滿而誇詡里氓市童矣此流若有諂書汲汲然以攻之亦不暇寫也之珍乃悚然拜曰敬以吿吾師遂書以為寫騷釋立愛解蔡羽或問立後大義也夫道一而已法有二原何哉外史氏曰何謂二客曰律所以取平也息爭也吏之案斷曰生則從心所愛死則昭穆相當竊疑之若二原然外史氏曰余見其一未見其二也立後之人一也云生者謂其已定於生前也云死者謂其生時未有所屬擬立於身後也夫父子祖孫託於乆逺非其素所愛則不可非愛則隙生矣甚或相嫉相亂至不可言矣隙生嫉且亂是讐也可以延其枝乎故立後莫大於立愛律家曰生則從心所愛聖人原情之論也其曰死則昭穆相當者生時不暇為逡廵乎身後衆求立之為奉其祀是時父祖考妣已亡無從詢其愛否但據昭穆立之則䟽不得間親幼不得越長亦原情以息爭也翰林院孔目蔡羽九逵先有子名震哥早亡九逵年逮五旬思立嗣無親兄弟之子求諸從兄弟之子昔多違碍紛紛非余愛也惟翥弟之季子師少素愛遂援立之更名學禮後為之冠且娶生一孫不乆死連生二女孫時外史氏年逾六十將宦遊京師自顧㷀㷀逺適他方無以自壮念震哥之慧而札學禮年三十未有子顧箕裘奚屬哉於是又求諸從孫之中有傳姪之子敏行可愛遂立為孫改名延蓀為之聘矣將行冠矣使學禮而無子固其子也使天憫學禮幸而有男則震哥之靈悠悠恒軫余懷若因延蓀而引其緒無損於學禮也况二子二孫亦何嫌哉嘉靖十七年歳戊戌外史氏從南京翰林院考滿還思勉學禮以耕延蓀以學聊為各委其業而資養之母令荒廢均思其職因解立愛之義豫用曉之請諸名人圖咏為二卷子孫謹守焉三不幸解李濓伊川先生曰人有三不幸少年登高科一不幸席父兄之勢為美官二不幸有高才能文章三不幸敢問斯言何謂也曰古人為學之道以明明德為本已之明德既明而後可以新民故子夏曰學而優則仕季路使子羔為費宰而孔子以為賊夫人之子也葢凡人少年登高科必無深蓄厚養之學練逹精明之識志滿意得輕佻浮薄其能致逺者鮮矣席父兄之勢為美官多挾貴恃權弗自檢飭行已則乖臨事則眩其能自立者鮮矣斯二者皆未能明乎脩已治人之術或有任情妄作並保終之為難謂之不幸誠哉其不幸也至於有高才能文章則其氣必揚凌忽長者傲慢同列自以為辭藻超異人莫我及必不肯俛首求益虚心下問以探討義理之精㣲其於治心飬氣之功不復知所用力縱使成名亦不過為文人詞客而已豈非人之不幸耶胡仁仲有言今之儒者移學文藝干仕進之心以收其放心而美其身何古人之不相及哉㫖哉斯言實與伊川之言相表裏嗟乎當今之世父兄之所訓督師友之所講授惟舉業文章而已宗族之所期望鄉黨之所欣羨惟科第官職而已茍能有是皆以為家之令子里之竒士抑豈知科第文章而外有聖賢之正學乎風俗至此良可慨歎故嘗為之説曰少年登髙科則快意於進取必萌侈大之心何有乎謙虚勉進之功席父兄之勢為美官則溺志於逸樂必致敗亡之禍何有乎畏慎持盈之道有髙才能文章則騁技於枝葉必棄根本之實何有乎沉潛為已之學伊川以是三者謂之不幸其憂深其慮逺其為天下後世人才計至警切矣顧習俗之移人雖資禀淑厚者亦必逞其英雋亟于功利弗能自脱然則人才之不古若有由然哉𠯗酒解莫如忠余昔逰闗中時問酒之名則惟桑落為最著至是客有自闗中来者以𠯗酒餽余曰亦闗中名品也余嘗而甘之何論桑落而後悔其遇之晚也𠯗之義以飲名可無煩盃斚獨卓管甕中噏而取之時其耗挹水注焉以度贏縮水漬成酒機相灌輸飲罄而貯常盈舉數而序不亂津津乎若𤣥蟬之吸露而無損於亷偃鼠飲河各充其量也不洵為酒德頌哉余喜止客及所與偕来者凡為大賔三初筵既峻斯釀乃陳客殊饜之命爵無算時則陪儐者或不任爵儼然呴余而諐曰子實擇禮大賔在是匪觴之稱而𠯗之䙝無乃不可乎余曰唯唯否否如子之云則孅趨鞠􅎽盤辟雅拜而以為容者余非不知也然酒客之貺也而敢弗供毋乃使客謂余已曰無䙝而實䙝之貺乎大禮有初古汙樽而抔飲非賓禮之初耶禮則不愆奚飲之擇傳曰茍有明信潢汙行潦可薦於神明可羞於王公而况君子合賓主之交享用𤣥酒以佐大烹質而有文菲不廢禮明信孰甚焉而云不可何也於是陪儐者起謝曰我過矣我過矣我乃不知亡於禮者之為禮也㣲子詔之余惡覩夫大方以負鼎非聖飲瓢毁賢之惑終矣再拜避席而退賓飲如初鳴楸解屠應峻齊郡黄君德兆仕於朝退耕於海野居數年太宰舉其才徴還郎中道莒城止客舍庭中空夜聞聲焉聲之所起如風飀飀迤颺羣卉枝柯相樛飄舉升降涓泉若流砉然勃鬱激逸較輷疾浪汨没駭騎奔騰綿延抑歴翕恊䪫韺迭盛更㣲若諧若怒恍惚靈變幽暮遘迕究若有端視不見所邑大夫晨馳而吿曰是之謂楸鳴者也楸植於舍且數百歳矣曠世一鳴聲聞喤喤土人志之曰維禎祥理或晰而莫析事有㣲而必彰陳寳鴝而節來室木蘖而蹶張鶴鳴隂而爵縻鳯止岐而德昌宜哲民則以興業典册煜而垂光也海野子來以吿少㣲生曰吁有是哉運化莫齊氣感斯激應月而潮矢風而疾龍矯雲翃電迅霆擊予覯夫物之感於聲也清商奏夏木零處女嘆巍城震彤昵豐鼎雉升宫鐘應銅山傾風出囊而應嘯獸仰秣而翔廷石何憾而質隕水何蹙而淵騰虛管恊候空谷授音固無心以類致亦頑㝠而兆靈吾請語子以楸鳴之徴可乎夫人之為精也摭英韞靈委端於天體則軌曜智越垓埏故能淪格晦邃徹厯幽𤣥肹蠁變動㣲入無縁也王者循民辨政鳩䖍治官裁紛釋憾匡奠以安皇皇羣辟掌之宰史明掄周虞登賢斥鄙百度齊均四海咸乂子實哲良宅揆繩馭乃今服休采列冡貳輩者抑皆緝緝濟濟視民若子競競繟繟位暨於理哉其或躡蹤恢詭秉志獝狂殫民厚殖背道自藏仇若秦越刈若莠稂急若束濕薪剽若振萎黄令鵂伏鷇牧羊以狼上下弗恤隕越為昌於是羣黎畢逋籲天自辜大東興謠鴻雁矢歌舛易隂陽互暌天和斯楸之鳴恍與為徒也亦有慿慿俊乂屹屹榦楨荒遜在野播遺弗賓容瘁楚澤名淹衡門藿藜弗給山澤長辛圭璧膚玷驊騮棄櫪窮徼終遷没身永謫南冠伏纍圜轅執㦸天生若才用之不卒則亦戚慄屏怦情營氣蒸俯觸草木䀛通神明淵黙暝聽寄之斯鳴子方作凝丞弼後先踐斗樞提衡銓迸黜蠱吏平章化元植登曠哲甄崇逸賢景風四恊穆氣不奸神之聽之福禄來延名勒洪鼎功被朱絃嗣卷阿於國雅張廣樂於鈞天斯固感楸鳴於兹夕信禎祥之不愆也雷解屠應峻已亥秋七月朔雷擊奉先殿古室是夕鼓樓災宗伯右諫議請明黜大僚以勅天戒於是司冦屠公僑南宗伯吕公楠請罷詔可僉戚戚心異之以為黜之弗若也史某氏解之曰吁夫天之赫怒以威也為雷為霆隂薄陽摧隱轔若巡軿訇若追飈揚電矯虩虩虺虺磅磕鬱律磔薄迅越千轂駢撃萬鼛虓伐駭氣漂奔殺機闞發當是時也丘崩嶽遷魑潰魍蹶凶人𠂻危儵忽亡魄窮奡失勇蒙卓䘮力子婁罔施其精夸娥莫措其疾行若負刃廋安得穴身尠定舉靣鮮恒色及究其所摧滅也僥倖得免邂逅時脱疇惠廸而抵攠或轢㩧而罔慝不滔之命罔渝之理亦遇而已矣乃或嶢崋􅔊􅂒其石虬木摧折其枝故宫焚甍雋宇壞栭釋此糾彼其故何與天道恢恢當威見值逄衝則櫪過披則入固非斤斤以晰㣲纎纎若飾職也將臠噬惨嚙赦毒所觸隱若虺蜴云爾哉今夫萬乗之怒九重之威矍矍赫赫亦猶霆雷也􅀈然廣運逆意則誅珉瑜在御當者為竒罣脫函車之獸網漏吞舟之魚故愛之加膝憎之苴履惡之成厔􅏓好之生翮羽惨燠為冬春進退異虎鼠崇之則跨騰青雲之上抑之則委墮黄泉之下朝握夕擯安論潔汚猶之雨露所潤日月所臨函氣者育失化者零豈云荃蕭之貴賤騶騑之美惡鸇鸞之鷙與仁哉雖然天不可慮道不可㡬仕無常遇士有恒持嶢崋不以顛石損其形虬木不以折枝毁其幹君子不以罹阨决其維是以三閭九遷而未悔孫叔旅進而弗愉展季抗迹於三公姬旦孫德於碩膚豈其情之爾殊哉固以義為不可離也故齊得齊失逹人之極融融娛娛味道之腴遺物定志竒德之止改玉改裳不改其行至人恬漠與道翺翔損華宅實時暗乆彰斯非美乎且聞之舉世同好皭然莫淆慎修可願神聽不恌火齊彌光乎莫眡大屈厲質乎重銷隋阿别利於糾紛新栢辨節於後凋衆庶慿朽乎株木賢哲蜚聲於寥寥二先生者獨行不懼遯世不幽覽輝千仞德音矯矯詩曰潛雖伏矣亦孔之昭其斯之謂與至若堅磷於砥絲湼而緇鏤剛以折荃化為荑違則去窮易執射時則固二先生之所譏亦非僕之所敢知也明文海巻一百二十七
