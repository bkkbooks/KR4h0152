body:
  text: 明文海卷一百二十八餘姚黃宗羲編解二充然子解顧慤豫既放辱在南荒籯無餘金衣弊弗完𨽻籍戎行武夫怒呵荷鍤負戈疲於奔命呼噓毒癘靡間寒暑世無知已名聞不彰矻矻於役可謂窮矣豫乃不窮其窮自號曰充然子且取以命其居又自題其扁以其號而諱其姓與字忽焉若與斯世不相為者求其為人則謹然諾尚節槩重義輕生勇氣騶發平居常慕公孫杵臼之行而自恨不得與之同出處託死生甚而至於慷慨激烈形諸歌咏以想見其為人善顔讐之事親而傷今世無仲由蔑有納金於衛以贖之者其輕財善施隆師重道之鋭使得仲尼而事之可以掩公良孺之名而淺陋率略安於小成讀古聖賢書未及通誦語孟輒把筆為文章纍數千百言往往以管見顛倒前人之是非且謂君子學以求聞道道果在是何有乎窮歲月弊精神掇拾陳言雕蟲篆鏤以夸工於時也奈何計墮迂濶拙於謀家糲食藜羮纍至匱乏既不能自奉其身乂不能鳴號其飢於一時之貴遊惟稍稍知發於詞藻以自見凡在縉紳君子莫不加嘆勉之以相其勤永樂己丑春嘗用天官卿薦敓情起事青宫拜正字矣未始以利祿二其心繼嘗以正字遭斥逐矣亦未始以憂患貶其志怡焉食焉樂以終日而不自知其一蹶至此衆且咎其偃蹇傲兀酷似夫不近人情而充然子則捧手醲笑佯謝踈僻衆亦卒莫知其所得即其言動形色則灝然而容淵然而貌不拘曲亷以為讓不事繁詞以為辨屈圓就方黜巧捧拙泛與物會而無滯情焉客有湖海之士怪而問曰子襲先緒蚤事東壁垂紳正笏侍帝之側樂見絶域荒種貢獻相望浮航而來庭者四方雲合威儀舄奕華夏同風搖唇堯階鳴當世之盛仰王化而頌聖德退訂六經之謬刻畫模寫取裁於上以贊時制以昭盛典於是立雲霄之上覲日月之光登蓬萊簉鵷班挾所有以炫於時而所私適售投肯綮於慮外乘志以騁求必得而願必遂適哉時乎子之無色喜於遭遇未可知也一旦所好不投齟齬百出蹭蹬戎伍間失身為介胄之士吾方意子膽落瘴癘之墟不暇今子顧以充然自名而乂以名其寓軒不惕惕以安不戚戚以喜等身世於浮雲忘胥靡之可耻其為究固非愚者所能深喻然或議以為視屈如伸以失為得是謂中情不實情不中實則端欵相戾端欵相戾是名不祥不祥非惟召訕於一時亦以開悔端於異日敢問明德亦何取於矯飾然也充然子舒徐而笑曰噫嘻曷識豫之指哉豫少時衣食於父母豢養於逸樂縱情六籍溺於見聞挈所性之安而與陳腐俱化不涉世故蔑知時艱芥視青紫之榮敏手可拾談胸中之耿耿於吳楚間亹亹不忘於喙上追姚姒下詔嬴劉旁及趙宋靡不究臆括前代廢興治亂之機於舌丸之端而與天下之好惡辨智相尋於無窮遊轍既廣所見滋濶於是隱然自得以為向之所恃者在是矣再進而談於京師則十九不合年邁終軍齒力益壯至此始稍悟功名事業又未可倚之以必集也厥後僥幸遭遇僅録於時究其所自實出於偶然而亦未嘗知所謂得之者繇是也乃今困掊之餘然後憮然悼身外之事富不足羡窮不足嘆廟堂丘壑貴賤勞佚苟可以通吾意養吾氣暢吾四體而取足於一旦之安者無往而非平生之志夫子以詰鄙人鄙人不敢隱願辱明倫之教客曰吾子情信而有辭無乃學孔孟之徒歟若然愚不敏請即孔孟之道而明之曰唯唯客曰竊聞古人稱聖賢者莫孔孟若也孔孟何以得名於天下後世哉亦惟道濟於時功著於用澤施於無窮云耳仲尼之為委吏乘田司冦也汲汲求售唯計伸道班資崇庳略如弗聞是故長沮桀溺交口而諷之以為夫子之德或病於此而聖人天下有道之嘆則寧為此而不為彼也孟軻間關七國柄仁義之機反世好以事齊門之瑟者為貧乎為養乎亦曰急於行道以援天下之溺耳夫聖賢萬世之標準也故曰君子居廟堂之上則憂其民處江湖之逺則憂其君然則進亦憂退亦憂未嘗一日忘天下而自安也吾子學孔孟之徒也卒所以去國而取棄於時者吾不得而知也若所謂事有可適於俯仰之安反身而求之則快然以為意外之遇者不佞得以有辭焉奈何以一顛頓之纍而輒二其初也不然則充為盈數在數為極盈者不可以加盈必終之以虧極者不可以加極必資之以元此欹器之銘所由作而吾子之牿亡反覆不勝其自持者從可卜也充然子唯唯否否而應之曰固哉夫子之求聖賢殆異乎吾所聞也鄙人之所聞者與人異請陳固陋惟夫子擇焉周衰哲王不作禮樂委地聖道澌盡詐力相乘天下之趨於壞有甚於洪水未平之勢也方是時孔孟負聖賢之責出應灼爛沸騰之變誠畏天命而憫人窮也乃不得已而操濟川之舟觸蛟龍冒風波決橫流而放諸海使智術之衝舒為安流而仁義道德舉而出諸股掌之上危檣徑櫓投顛頓於一捩柁之安而儼然無恐者有不啻倚南山而坐平原焉是故以障狂瀾之僨則起以拯魚鱉之民則化以承萬世之責則塞然則聖賢無乃有所恃乎方今聖人在御四海一家握乾符攬化機逺撫長駕荒要賓服坐赤子於袵席之上措磐石之基於萬世不拔之固多士輩出稷契盈廷文恬武熙政實具修方將作禮樂修封禪石勒泰山著一代之偉績以期垂光錫祚於無窮焉矧豫以椎魯之質遭承平之世則耕鑿於野以祝堯年顧亦分內事耳尚何有他求哉且鄙人為器譬之僅勝溝澮之陋舟不幸而強之以為濟川之具則必有漂沉之溺而已吾知其不足為也比嘗忘已量之所稱挾不足之器以求試小涉於徑海之危焉失意而歸舟師栗然奮掉之氣去昔百倍而惴惴之軀僥幸不至於獱獺之所魚肉者無幾矣夫子不審時之治亂士之賢不肖而輒以聖賢之責加諸人何異夫強澤中之麋而被之以麟兕之章者乎夫厭窮利逹天下之同情也然命之所在不可以幸而進是故君子不得於彼則雖飯蔬飲水曲肱而枕亦足以寓吾之樂安在鼓弱抗轍觸人之機以求免斃於一蹴之怒邪豫嘗讀秦丞相斯傳而得太史公之旨矣何哉自期於有為者乃志士之纍而東門黃犬之嘆政出於羡廡鼠之漸也夫子以利進之道求聖賢殆異乎吾所聞也鄙人之所聞者與人異用之則行舍之則藏仲尼有是言矣毋意毋必毋固毋我七十子記之書矣可以仕則仕可以止則止可以久則久可以速則速孟軻以聖之時者詔後學矣傳不云乎窮則獨善其身達則兼善天下此孔孟之所以為孔孟也而夫子若未之究豫雖固陋嘗奉教於長者矣君子素其位而行不願乎其外素富貴行乎富貴素貧賤行乎貧賤素夷狄行乎夷狄素患難行乎患難今吾所處之地果如何而夫子之言則過矣且君子之量要必至於不可涯涘限量而後不纍於物是故晏子不欲使人指名其治行房杜不使秉筆者品題其相業子房之掉臂長往陶朱公之問津於五湖者然也必若所喻則鄙人之事業可指而議矣夫子盍求魯仲連黃叔度之為人乎夫牛服於箱馬服於轅鷹隼服於樊籠此三者豈不足乎跳踉以自便哉特出於制御之下是故牛不可有觸馬不可有踶鷹隼不可以有擊搏不幸而即其俯首貼耳附於人而不去者遂指以為物性之安其常則過矣吾從而縱之乂孰知其不鵲厲而喜以為向之僅免於鼎鑊者常在於毫髮乎魚相忘於江湖不知江湖之深也獸相忘於林藪不知林藪之廣也一或知藪澤之深廣未必非僥幸羅餌之餘而始得之也人有恆言鵾鵬斥鷃各適其所欲螟蛉螻蟻各得其所終巢田帝堯各靖其所志泰山秋毫各安其所受嗟乎天之所以與我者如何我豈可坐視褻天之咎邪亦惟隨遇而安處困而亨委身大化以道理相為始終而洞視死生得失若太虛浮雲之變虛以受益靜以出動熙熙陶陶與元氣渾融而相忘於無何有之鄉而已耳豫豈故為炳炳琅琅矯世獨立自疑於匹夫匹婦之量耶豫又安知夫盈虧滿覆之理得以取病吾之終身者邪夫子教我以求世之道若曰屈情應物驅衆人之欲而求售於吾身進不辭勞退不諱辱歙歙訿訿迎合以欺有死而弗居必也毋奔競毋茍得毋墮乃職毋蔽于苞苴抗大節以披逆鱗迎仁義之機以作雍熙之治進賢舉能去讒逺佞約君心之向背而納之於至中富貴之加脫有以戾吾順事雖萬乘之卿不一日而屑就忽幸而道合義孚言聽計行則必使社稷倚吾以為固朝廷倚吾以為尊邊逺倚吾以為卑蒼生倚吾以為命日月倚吾而用其行山川倚吾而安其常禽獸草木倚吾而各得其情堯舜湯文周孔之道倚吾而不墜於地謀猷進於廟堂而亷恥禮讓之風霆行於九有祿位顯於當時功烈著於不刋使天下之怨仇卷舌而不敢私議政成而歸功於時寵極而善後以忠勢尊而遇下以卑道伸而行也吾志其有寧也道塞而不行也吾固守而弗通也士有終身而困且辱也道不可一日而小屈也於乎懿哉誠大同之所趍而有志斯民之所同願也客乃點首默會猖狂而進曰吾乃今知明德信所謂融深凝逺之度矣雖然富貴移人人多溺焉竊怪夫愚者過慮尚懼吾子有定見而未能加定力於此也盍勉乎哉充然子乃攝衣而起再拜而謝曰豫也可謂天下之至愚者矣遊於夫子之度中竟日而不自知也於是坐客而志其問答之詞曰敬奉教禮解顧彥夫婦有七去古也載諸經今也頒諸律豈聖人或失之忍哉不得已而豫為之防爾蓋知不順父母去或能執婦道矣知無子去或能畜妾而子矣知淫去或能以禮自間矣知妒去或能無違夫子矣知惡疾去或能令其夫再娶矣知多言去或能戒於長舌矣知竊盜去或能謹其取豫矣以是為防而莫之改焉則為之夫者如之何而不去哉若姑息苟容其為家門之禍烈矣今之士大夫於婦之可去者如鬼怪神妖非惟不能去且莫敢犯焉或去之則人以為薄德而瑕疵之居官者往往坐是不振嗚呼此天下之婦所以肆行而莫之顧忌也或曰儀刑在我我不之責而責之婦人可乎不思孔門三世出妻豈儀刑之道亦有虧哉隂惡之性化之無自不得已而出之耳若有三不去而或去之斯則失之忍也世之君子守經以論天下之變執律以定天下之罪幸勿為婦人立赤幟也當今之時有能去可去之婦吾必謂之知經者矣吾必謂之知律者矣吾必謂之大丈夫矣若吞聲隱忍反為婦人所制雖可去而莫之去此何人哉此何人哉又解顧彥夫天下疲癃殘疾皆仁人之所矜憐惟恐其失所者也况妻以夫為天仰之以終其身不幸而有惡疾為夫者其忍去之乎聖人列為七去之一無亦纍於仁乎曰此其所以為仁也蓋婦人隂屬也悍妒實其恆情且既有惡疾其性情隨之而惡者十或八九彼以為我妻也齊於夫者也雖有惡疾不可去也則其夫不復再娶又不容置一妾以接之焉則終身無子矣此聖人所以深思曲慮列為七出之一使之莫敢誰何而善心生也其去無子之婦亦然惟如是故再娶在夫置妾在夫婦人有所警省可化而為善矣况人皆有不忍人之心其於去惡從善之婦誰忍去之乎與之生與之死可也雖賞之亦不忍去矣况又有三不去之條以容之乎然則聖人去惡疾之婦非去之也留之也仁之也非絶之也為萬世為人夫者立大間也為萬世為人婦者立大防也非聖人之仁乎問社解郭造卿天子建國左宗廟右社稷宗廟之義所以尊祖而報本反始也社稷之義所以維國而重民敬事也社稷之義大矣古者立社之意其見於經傳詳矣周自武王勝商班其社於諸侯魯有兩社一曰周社一曰亳社哀公四年亳社災故公問焉則所當對者有三觀夫莊公如齊曹劌舉成典而説之曰非先王之訓所以使之遵也社自勾龍氏後其制詳於周禮魯有社以來則自有成事可述祭法大夫以下成羣立社曰置社以不得専土地示以有尊也春秋譏遂事惡大夫専政也定公盟三桓於周社盟國人於亳社大夫要諸侯盟於社其遂事亦甚矣若斯則在所諌焉君不能保社稷至以社為廟屏屋其上而不得通陽棧其下而不得通隂尸亦以刑官為之戒其為社稷僇也若諸侯之社則王者能變置之魯國至哀社稷既危矣亳社之災况為國亡社哉此則當咎其既往而使之監戒焉者也宰我不知乎此乃以土宜木為對夫夏都安邑宜松殷都亳宜柏周都豐鎬宜栗各社不皆松柏與栗也古者尚書亡篇云大社惟松東社惟柏南社惟梓西社惟栗北社惟槐夫亦不必以各代論矣且栗使民戰栗而松而柏何取耶此皆妄對而夫子不辨之者以其昧乎大義而惜其不能為社稷重乃以松以柏以栗且云使民戰栗何哉若其戰栗之言不過謂民致敬於社而戰兢齋栗之云非取戮人於社之義乃謂啓時君殺伐之心蓋亦幾於深文者也且謂其言已出不可復救則責之曰既往不咎可矣答問之間未必成事若既成矣又言未成而遂者何哉考之臣子於君父言諌未聞師與弟子稱諌者也聖人之言吾決其不然也况彼八佾雍徹之類事之成而乃説之既與之五秉矣既使門人為臣矣而皆説之何耶伐顓臾旅泰山皆事之遂成者乂何必使之救之止之也為季氏聚斂者鳴鼓以攻之使為費宰者而斥其賊夫人之子奚不以既往而獨咎之如此哉南東其畝解郭造卿禹貢雍州荆岐既旅終南惇物至於鳥鼠原隰砥績至於豬野此即南山禹甸畇畇原隰之證蓋治水成功自高而下故先言山次原隰非無謂也劉執中云周京於鎬南距於山其田獨廢故此以南山為言疆理之制劉氏見於小注已詳又云南東其畝順地勢水勢之所趨得之矣蓋天下大勢地不滿東南其間豈無西北下者制田亦宜因之但此詩専主東南非舉以互見西北也考禹貢灃水注出終南山東入渭南注之則終南水大勢東南下矣注畝壟也此本書傳壟畝也史陳勝傳輟耕之壟上師古曰田中之高處爾雅丘如畝畝丘則畝亦高矣食貨志后稷一畝三畎廣尺深尺壝壠土至壠盡方與畝平則畝乂不止深尺廣尺矣人知田之謂畝不知畝之攸名古者步百為畝封土界之即今之塍説文所謂田畦也自其畝之中而言謂之田自其田之界而言謂之畝非此為之識别何以有彼畝此畝之分邪今人以田為畝號畝為塍猶知二五不知十習之不察焉耳周禮稻人以溝蕩水以遂均水遂人夫間有遂十夫有溝井方一里田九百畝此言十夫舉成數也遂者水之道深廣各二尺在百畝之間乃一夫所獨通田水入溝溝水入田者也溝者水所鍾深廣各四尺在百畝之外乃九夫所共遂水灌田必資於此田水入遂必泄於此者也由是洫澮川海疆理之大凡如此故土無異壤向背必審其宜水不平流高卑必順其勢地勢東下水因東注故橫溝於東以受之遂則引田水以入溝必自高直下始順東既卑而與溝橫無受遂水之理西高水無逆就之勢且間田而難達於溝又非遂之所宜北亦如西之高均之不可遂矣惟南與東而俱下遂又以自西而東直達於溝故遂在南而畝因之不容以復東故亦南其畝使田中之水耕則豬之穫則泄之藉是畝以為隄防且使遂水常流不至溢於田遇旱引溝水入遂遇潦引遂水入溝皆限制於畝東其畝倣此因東南其遂故東南其畝注於西南其戶引此為證蓋田在遂北則南其畝田在遂西則東其畝猶在北者南其戶在東者西其戶也若以溝論溝東則田西溝南則田北詩特據遂而論以田水必趨之遂而達溝溝水必經乎遂而納田也大抵溝遂皆在東南畝既因乎遂故據田在西北而觀則畝俱在東南耳或謂自西而東者不至溢乎南自北而南者不至溢於東此泥於西北之説當云不至溢於北於西始可或知遂在東南云南畝以障水之東東畝以障水之南此不必然遂淺於溝二尺使水盡淺於遂其勢自趨於溝不至乎障之而始東南也如左傳齊國佐曰先王疆理天下物土之宜而布其利故詩曰我疆我理南東其畝鄭玄稍人注曰丘乘讀與維禹敶之敶同其訓曰乘賈公彥疏曰鄭據韓詩為説敶是軍陳故訓為乘彼詩畇畇是均田之意是以畇畇為畇畇也明文海卷一百二十八
