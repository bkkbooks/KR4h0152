body:
  text: 明文海卷一百二十九餘姚黄宗羲編解三乳母廟訓仇俊卿事貴合經勢嫌樹表若乳母有廟何始乎漢靈帝封乳母宋娥為山陽君左雄奏曰尚書故事無乳母爵邑之制惟孝安皇帝變亂舊典封阿母王聖為野王君生為天下所咀嚼死為天下所忻快初封野王漢陽地動今封山陽君京城復震專政在隂其灾尤急此皆生前爵里之榮猶未嘗立廟也若廟宇之創詎可以易言者乎昔東晉元帝為王妃虞氏先亡欲立廟王導與賀循論虞廟猶云於名則未滿於理則變常夫以帝子之妃而廟猶多議况乳母特設一廟恐於法理不經尢甚今嘉靖庚辛間嘉禾創廟不啻野王山陽之封大水為沴三吳漫渰百榖無穫得非隂氣侵淫為孽之應猶漢之地震者乎識者巷議而不能以大義裁其寵倖曷不聞莽氏祖廟其灾異不一書耶或曰此非請於朝而命之也自以貲賄之贏為卜吉為翬飛者時為郡侯者改豫備倉公地以定其址闢四近民居以拓其規旦夕臨工所猶自嗟不能厚餽以逞其快噫其向進之心亦勤矣夫善乎漢孝武之處乳母東方朔之為營救迨韓晉公之守法禮者不可多得宋太宗責益王乳母用以正輔道斯其治之鑑與按禮曰世子始生負以士之妻大夫之妾卜之吉以食􅀈之此乳母之謂也夫乳世子不以内官嬙媵之䙝外方裙布之麄必以士大夫妻妾雖士大夫妻妾亦不輕狥必俟太卜吿吉然後用之舉世子則太子可推也如是而用之焉有乳母驕恣之弊重國本者當取法於此可也明文海巻一百二十九
