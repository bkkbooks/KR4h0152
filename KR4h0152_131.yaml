body:
  text: 明文海卷一百三十一餘姚黃宗羲編原一文原宋濂余諱人以文生相命丈夫七尺之軀其所學獨文乎哉雖然余之所謂文者乃堯舜文王孔子之文非流俗之文也學之固宜浦江鄭楷義烏劉剛楷之弟柏嘗從豫學己知以道為文因作文原二篇以貽之其上篇曰人文之顯始於何時實肇於庖犧之世庖犧仰觀俯察畫竒偶以象陰陽變而通之生生不窮遂成天地自然之文非惟至道含括無遺而其制器尚象亦非文不能成如垂衣裳而治取諸乾坤上棟下宇而取諸大壯書契之造而取諸夬舟楫車馬之利而取諸渙隨杵臼棺槨之制而取諸小過大過重門擊柝而取諸豫弧矢之用而取諸暌何莫非粲然之文自是推而存之天𠂻民彛之敘禮樂刑政之施師旅征伐之法井牧州里之辨方域內外之别復皆則而象之故凡有關民用及一切彌綸範圍之具悉囿乎文非文之外别有其他也然而事為既著無以紀載之則不能以行逺始託諸辭翰以昭其文略舉一二言之禹敷土隨山刋木奠髙山大川既成功矣然後筆之為禹貢之文周制聘覲燕享餽食昏喪諸禮其升降揖讓之節既行之矣然後筆之為儀禮之文孔子居鄉黨容色言動之間從容中道門人弟子既習見之矣然後筆之為鄉黨之文其他格言大訓亦莫不然必有其實而後文隨之初未嘗以徒言為也譬猶聆衆樂於洞庭之野而後知聲音之抑揚綴兆之舒疾也習大射於矍相之圃而後見觀者如堵牆序點之揚觶也茍踰度而臆決之終不近也昔者遊夏以文學名謂觀其會通而酌其損益之宜而己非専指乎辭翰之文也嗚呼吾之所謂文者天生之地載之聖人宣之本建則其末治體著則其用彰斯所謂乘隂陽之大化正三綱而齊六紀者也亘宇宙之始終類萬物而周八極者也嗚呼非知經天緯地之文者惡足以語此其下篇曰為文必在養氣氣與天地同茍能充之則可配序三靈管攝萬象不然則一介之小夫爾君子所以攻內不攻外圖大不圖小也力可以舉鼎人之所難也而烏獲能之君子不貴之者以其局乎小也智可以搏虎人之所難也而馮婦能之君子不貴之者以其騖乎外也氣得其養無所不周無所不極也攬而為文無所不參無所不包也九天之屬其髙不可窺八柱之列其厚不可測吾文之量得之規燬魄淵運行不息燭地萬熒躔次弗紊吾文之焰得之崑崙玄圃之崇清層城九重之嚴邃吾文之峻得之南桂北瀚東瀛西溟杳渺而無際涵負而不竭魚龍生焉波濤興焉吾文之深得之雷霆鼓舞之風雲吸張之雨露潤澤之鬼神恍惚曾莫窮其端倪吾文之變化得之上下之間自色自形羽而飛足而奔潛而泳植而茂若洪若纎若髙若卑不可以數計吾文之隨物賦形得之嗚呼斯文也聖人得之則傳之萬世為經賢者得之則放諸四海而準輔相天地而不過昭明日月而不忒調燮四時而無愆此豈非文之至者乎天德堙微文氣日削騖乎外而不攻乎內局乎小而不圖其大此無他四瑕八冥九蠧有以纍之也何謂四瑕雅鄭不分之謂荒本末不比之謂斷筋骸不束之謂緩旨趣不超之謂凡是四者賊文之形也何謂八冥訐者將以賊夫誠撱者將以蝕夫圜庸者將以混夫竒瘠者將以勝夫腴確者將以亂夫精碎者將以害夫完陋者將以革夫博眯者將以損夫明是八者傷文之膏髓也何謂九蠧滑其真散其神糅其氣徇其私滅其知麗其蔽違其天昧其幾爽其貞是九者死文之心也有一於此則心受死而文喪矣春葩秋卉之爭麗也猿號林而蛩吟砌也水湧蹄涔而火炫螢尾也衣被土偶而不能視聽也蠛蠓生死於甕盎不知四海之大六合之廣也斯皆不知養氣之故也嗚呼人能養氣則情深而文明氣盛而化神當與天地同功也與天地同功而其智卒歸之一介小夫不亦悲哉余既作文原上下篇言雖大而非誇唯智者然後能擇焉去古逺矣世之論文者有二曰載道曰紀事紀事之文當本之司馬遷班固而載道之文舍六籍吾將焉從雖然六籍者本與根也遷固者枝與葉也此固近代唐子西之論而豫之所見則有以異於是也六籍之外當以孟子為宗韓子次之歐陽子又次之此則國之通衢無荆榛之塞無蛇虎之禍可以直趨聖賢之大道去此則曲狹僻徑耳犖確邪蹊耳胡可行哉豫竊怪世之為文者不為不多騁新竒者鉤摘隱伏變更庸常甚至不可句讀且曰不詰屈聱牙非古文也樂陳腐者一假場屋委靡之文紛糅龎雜不見端緒且曰不淺易輕順非古文也豫皆不知其何説大抵為文者欲其辭達而道明耳吾道既明何問其餘哉雖然道未易明也必能知言養氣始為得之豫復悲世之為文者不知其故頗能操觚遣辭毅然以文章家自居所以益摧落而不自振也今以二三子所學日進於道聊一言之畫原宋濓史皇與蒼頡皆古聖人也蒼頡造書史皇制畫書與畫非異道也其初一致也天地初開萬物化生自形自色總總林林莫得而名也雖天地亦不知其所以名也有正名者出正名萬物髙者謂何卑者謂何動者謂何植者謂何然後可得而知之也於是上而日月風霆雨露霜雪之形下而河海山嶽草木鳥獸之著中而人事離合物理盈虛之分神而變之化而宜之固已達民用而盡物情然而非書則無以紀載非畫則無以彰施斯二者其亦同歸而殊途乎吾故曰書與畫非異道也其初一致也且書以代結繩功信偉矣至於辨章服之有制畫衣冠以示警飭車輅之等威表旟旐之後先所以彌綸其治具匡贊其政原者又烏可以廢之哉畫繪之事統於冬官而春官外史専掌書令其意可見矣況六書首之以象形象形乃繪事之權輿形不能以盡象而後諧之以聲聲不能以盡諧而後會之以意意不能以盡會而後指之以事事不能以盡指而後轉注假借之法興焉書者所以濟畫之不足者也使畫可盡則無事乎書矣吾故曰書與畫非異道也其初一致也古之善繪者或畫詩或圖孝經或貌爾雅或像論語暨春秋或著易象皆附經而行猶未失其初也下逮漢魏晉梁之間講學之有圖問禮之有圖列女仁智之有圖致使圖史並傳助名教而翼彛倫亦有可觀者焉世道曰降人心寖不古若往往溺志於車馬士女之華怡神於花鳥蟲魚之麗遊情於山林水石之幽而古之意益衰矣是故顧陸以來是一變也閻吳之後又一變也至於關李范三家者出又一變也譬之學書者古籀篆𨽻之茫昧而唯俗書之姿媚者是耽是玩豈其初意之使然哉雖然非有卓然拔俗之姿亦未易言此也南徐徐君景暘工書史善吟古今詩信為才丈夫也旁通繪事有士韻而無俗姿一時賢公卿皆與之遊名稱藉甚有薦于朝者景暘以母老不仕豫尤愛景暘者於其别去故作畫原以贈焉嗚呼易有之聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象然象之事又有包乎隂陽之妙理者誠可謂至重矣景暘其亦知所重乎文説宋濓明道之謂文主教之謂文可以輔俗化民之謂文斯文也果誰之文也聖賢之文也非聖賢之文也聖賢之道充乎中著乎外形乎言不求其成文而文生焉者也不求其成文而文生焉者文之至也故文猶水與木然導川者不憂流之不延而恐其原之不深植木者不憂枝之不蕃而慮其本之不培培其本深其源其延且蕃也孰禦聖賢未嘗學為文也沛然而發之卒然而書之而天下之學為文者莫能過焉以其為本昌為源溥也彼人曰我學為文也吾必知其不能也夫文烏可以學為哉彼之以句讀順適為工訓詁艱深為竒窮其力而為之至於死而後己者使其能至焉亦技而己矣況未必至乎聖賢非不學也學其大不學其細也窮乎天地之際察乎隂陽之妙逺求乎千載之上廣索乎四海之內無不知矣無不盡矣而不特乎此也反之於身以觀其誠養之於心而欲其明參之於氣而致其平推之於道而俟其成德果成矣道果至矣視於其身儼乎其有威確乎其有儀左禮而右樂圓規而方矩皆文也聽乎其言溫恭而不卑皎厲而不亢大綱而纎目中律而成章亦皆文也察乎其政其政莫非文也徴乎其家其家莫非文也夫如是又從而文之雖不求其文文其可掩乎此聖賢之文所以法則乎天下而教行乎後世也今之為文者則不然偽焉以馳其身昧焉以汩其心擾焉以乖其氣其道德蔑如也其言行棼如也家焉而倫理謬官焉而政教泯而欲攻乎虛辭以自附乎古多見其不察諸本而不思也文者果何由而發乎發乎心也心烏在主乎身也身之不修而欲修其辭心之不和而欲和其聲是猶擊缶而求合乎宫商吹折葦而冀同乎有虞氏之簫韶也決不可致矣曷不思乎聖賢與我無異也聖賢之文若彼而我之文若是豈我心之不若乎氣之不若乎否也特心與氣之失其養耳聖賢之心浸灌乎道德涵泳乎仁義道德仁義積而氣因以充氣充欲其文之不昌不可遏也今之人不能然而欲其文之類乎聖賢亦不可得也嗚呼甚矣今人之惑也聖賢之為學自心而身自身而家其為事亦多矣而未嘗敢先乎文今之人未暇及乎他自幼以至壯一惟文乎是學宜乎今之文勝於古之聖賢而終不及者豈無其故耶不浚其源而揚其瀾不培其本而抽其技不至於稿且涸不止也然則何為而後可為文也蓋有方焉聖賢不可見矣聖賢之為人其道德仁義之説存乎書取而學焉不徒師其文而師其行不徒識諸心而徴諸身小則文一家化一鄉大則文被乎四方漸漬生民賁及草木使人人改德而易行親親而尊尊宣之於簡册著之於無窮亦庶幾明道而立教輔俗而化民者乎嗚呼何由而得見斯人於斯世也吾何為而不思夫聖賢之盛也虎林王生黼年甚少讀春秋而好為文問法於豫豫美其有志也以其大者語之文訓王禕華川王生學文於豫章黃太史公三年而不得其要倀倀焉食而不知其味皇皇焉寢而不安其居望望焉如有求而不獲也太史公一日進生而訓之曰子之學文有年於兹志則勤矣吾聞天地之間有至文焉子豈嘗知之乎夫雲漢昭回日星宣朗煙霞卷舒風霆鼓蕩者天文之所以暢山嶽錯峙江河流行鳥獸蕃衍草木茂榮者地文之所以成天地之文不能以自私誕賦於人人則受之故聖賢者出以及瓌人畯士相繼代作莫不大肆於厥辭蓋自孔氏以來兹道大闡家修人勵致力於斯其間鞠明究曛疲弊歲月刓精竭思耗費簡劄者紛趨而競馳孰不欲爭裂綺繡平攀日月髙視萬物之表雄峙百代之下卓然而有為然而躑躅而不進骫骳而不振思窮力蹙吞志而沒者往往而是而能登名文章之籙者其實無幾則所謂至文者固夫人所罕知是故文有大體文有要理執其理則可以折𠂻乎羣言據其體則可以剸裁乎衆製然必用之以才主之以氣才以為之先驅氣以為之內衛推而致之一本乎道無雜而無蔽惟能有是則統宗會元出神入天惟其意之所欲言而言之靡不如其意斯其為文之至乎凡吾之説子豈嘗知之茍知之其試以語吾生曰文之為物貴適時好粲然相接合喜投樂有如正始不完文氣遂偏俗尚化遷而排偶之習興焉四屬六比駢諧儷聫抽黃對白調朱施鉛五采相宣八音相便握摛穠纎啽哢寒暄豐腴醲酣眩麗娟妍珠璣溢緘膾炙滿篇凡慶函與賀牘咸纍幅而疊畨王公之門下逮閭閻彛儀縟典往來交際率奉之以周旋又如大雅既逺詩歌日變玉臺西崑其流也漸支為詞曲爭嫩競艷字分重輕句協長短浮聲切響清濁和間羽振宫潛商流徴泛笙簧觸手錦繪迷盼風月留連鷪花凌亂振妙韻於沈冥託葩辭於清婉性情因之而暢宣光景因之而呈獻好會暌離歡欣悲歎莫不假是以託情固無間於貴賤也若是者其為文何如太史公曰古語變而四六古聲變而詞曲文之弊也甚矣請置勿道為言其他生曰命鄉選士之法廢而科舉乃興以文取士設為範程漢有射䇿唐有明經復有詩賦逮宋日益增經衍為義而三篇以明賦本於律而八韻以成咸各専其科各精其能其義則意融旨切言粹辭達枝語蔓引叢論英發剗聖祕而立辨斡天機而生説其賦則句鍊字戞音核韻軋秀春擷花艷晴掇校妍醜於錙銖品抑揚於毫髮他若宏辭制舉大科别設文法靡不該文格靡不列又必學稱博極才號閎傑乃能攻其業凡習於斯者皆賈勇詞場角雄藝闥不厲兵而白戰爭奪弧而先拔若工若拙三年是力若勝若劣一日而決及其中文衡入文彀則遂圍棘聲徹榜金名揭上賢書於天府承洪恩於帝闕乃躋膴仕乃展遐轍若卿若相鮮不由兹而出矣上以此而求賢士以此而致身文之用世信不可誣也歟太史公曰科舉之文趨時好以取世資特干祿營寵之具耳學古之君子恥言之生曰文之古者登諸金石記志頌銘具有成式或鍾鼎是勒或琬琰是刻或鐫於麗牲懸繂之碑或鑱在封嶽磨崖之壁莫不炫耀崇勳恆焯茂德載丕丕之嘉猷紀赫赫之休績然皆一筆之力九鼎可扛一字之價千金是直爾其宏奧之思雅健之姿瑰瑋之辭攟托馬班凌厲蔡陳躁躪韓栁玉采金聲焜焜煌煌鍧鍧鏘鏘衮章繡紋炳炳焞焞繽繽紜紜詭然而蛟龍翔蔚然而虎鳳昂翕然而律吕張正音諧䪫韺變態類雲霆徑氣排甲兵沈冥以之而開褰幽閟以之而著宣逖逺以之而綿延然非儒林宗匠藝營宿將道德為世之模楷名位為國之儀望堂堂焉章章焉擅鴻筆攬魁柄稱文章之大家者孰當仁而不讓宜其嫓美古昔傳信今後昭四裔以無倫垂千載而不朽此其為文也不幾於古乎太史公曰文至是謂之古宜也雖然其為用殆不止是己生曰朝廷之上有巨文焉典謨誓誥制册令詔藹為王言渙為大號而帝王之制作存焉灝灝噩噩渾渾洋洋凌厲蓬孛揮霍奮揚或溫潤而精粹或宏偉而秀雄或嚴肅而簡重或衍裕而深長經緯天地槖籥隂陽黼黻萬化轇轕三光封職則氣含雲雨之潤授官則義炳重離之明勑戒則吐星漢之華治戎則揚遊雷之轟肆赦則垂滋於春露明罰則示烈於秋霜一字之褒沛漏泉於下地一言之感被挾纊於黎蒸朝出九重暮行四方如風動而草偃如山鳴而谷應奮迅乎宇外旁薄乎域中鼓舞乎區夏陶鑄乎帝皇文章之用蓋與造化而侔功矣若是何如太史公曰記曰王言如絲其出如綸詩曰辭之輯矣民之協矣辭之懌矣民之莫矣文之為用誠莫盛於此矣姑舍是豈無復有所聞者乎生曰文之難者莫難於史故良史之才古今或無皇道帝德王略霸圖運祚興衰治道隆汚將相卿士武烈文謨賢智忠孝凶慝姦諛天文五行地理河渠禮樂兵刑食貨賦租選舉職官冕服車輿遐方異區恍惚詭變俗怪習殊凡一代之本末皆載於史故曰史者一代之成書是故事以實之辭以給之法以立之例以律之作史之要必備乎此然非其能足以通古今之體明足以周萬事之理知足以究難知之意文足以發難顯之義者曽烏得以稱良史蓋自紀表志傳之制馬遷創始班固繼作綱領昭昭條理鑿鑿三代而下史才如二子者可謂特起拔出雋偉超卓後之為者世仍代襲率莫外乎其矩矱論者以為遷固之書其與善也隱而彰其懲惡也直而寬其賤闕也簡而明其防僭也微而嚴是皆合乎聖人之旨意而非庸史之敢干及乎范曄陳夀之流則遂肆意妄纂曲筆濫箋曖昧其本旨而義駁以偏破碎其大體而辭謭以纎況乎曄夀之不若者則又卑陋而無足觀矣故史所以明乎治天下之道而為之者亦必天下之才然後勝其任兹其所為難乎太史曰噫史之為文誠難乎其盡美矣文而為史誠極天下之任矣抑吾聞之文有二有紀事之文有載道之文史者紀事之文于道則未也生曰聖人既沒道術為天下裂諸子者出各設戶分門立言以為文是故管夷吾氏以霸略為文鄧析氏以兩可辨説為文老聃氏以秉要執本持謙處卑為文列禦冦氏以黃老清淨無為為文墨翟氏以貴儉兼愛上賢明鬼非命上同為文公孫龍氏以堅白名實為文莊周氏以通天地之統序萬物之性達死生之變為文慎到氏以刑名之學為文申不害氏韓非氏復流於深刻之文尹文氏又合黃老刑名為文鬼谷氏以捭闔為文蘇秦氏張儀氏因肆為縱橫之文孫武氏吳起氏以軍形兵勢圖國料敵為文荀卿氏揚雄氏則以明先聖之學為文淮南氏則以總統道德仁義而蹈虛守靜出入仙道為文凡若此者殆不可遽數也雖其文人人殊而其道未始不有明焉譬猶水火相滅亦以相生和敬相反亦以相成易所謂一致而百慮同歸而殊塗者言本於一揆而己文以載道其此之謂乎太史公曰諸子之文皆以明夫道固也然而各引一端各據一偏未嘗窺夫道之大全人奮其私智家尚其私談支離頗僻馳騁穿鑿道之大義益以乖大體益以殘矣此固學術之弊而道之所以不傳也生曰聖人之文厥有六經易以顯隂陽詩以道性情書以紀政事之實春秋以示賞罰之明禮以謹節文之上下樂以著氣運之虧盈凡聖賢傳心之要帝王經世之具所以建天𠂻奠民極立天下之大本成天下之大法者皆於是乎有徴斯蓋羣聖之淵源九流之權衡百王之憲度萬世之凖繩猶之天焉則昭雲漢而揭日星布煙霞而鼓風霆猶之地焉則山嶽峙而江河行鳥獸蕃而草木榮故聖人者參天地以為文而六經配天地以為名自書契以來載籍以往悉莫與之京斯其為文不亦可以為載道之稱也乎太史公囅然而驚喟然而歎曰盡之矣其蔑有加矣此固載道之器而聖人之至文矣嗟乎世之學者無志於文則己茍有志焉舍是無以議為矣是故本之詩以求其恆本之易以求其變本之書以求其質本之春秋以求其斷本之樂以求其通本之禮以求其辨夫如是則六經之文為吾之文而吾之文一本於道矣故曰經者載道之文文之至者也後聖復作其蔑以加之矣今子知及乎此則於文也其進孰禦焉特在加之意而已矣生於是再拜謝曰謹受教敢不拳拳服膺是則是效以無忝夫子之訓告文旨贈許海嶽沈虹臺二內翰先生茅坤孔孟沒而詩書六藝之學不得其傳秦皇帝又從而燔之於是文章之旨散逸殘缺漢興始詔求亡經而海內學士始得以沿六經之遺而轉相授受西京之文號為爾雅其最著賈誼鼂錯董仲舒司馬遷劉向揚雄班固是也晉魏宋齊梁陳隋之間斯道幾絶唐韓愈氏出始得上接孟軻下按揚雄而折衷之五代之間寖微寖滅歐陽修曾鞏及蘇氏父子兄弟出而天下之文復趨於古數君子者雖其才之所授小大不同而於六藝之學可謂共涉其津而遡其波者也由此觀之文章之或盛或衰特視其道何如耳秦以來操觚為文章者無慮數十百家其間虎步而鷙攫不可勝數然皆譬之草莽之雄項籍陳勝之亂秦王郎隗囂之姦漢唐之藩鎮宋之金遼特擅兵裂土以相雄於其間而己而帝王之統卒不外屬區區孱弱之裔顧得以延其不絶者之如帶躬厯數而正名號髙拱而議焉何哉得其道而折𠂻於六藝者漢唐宋是也雖其衰且弱也不得而廢也不得其道而外六藝以興甲兵割山河項籍王郎以下是也雖其強且悍不得而與也本朝劉宋嘗拓門戶𢎞治正德間北地李夢陽攘袂而呼曰文在是矣倡者叱吒聽者辟易於今學者猶勦而附焉嗟乎間以之按六藝之遺及西京以來作者之旨然乎否耶得非嚮所謂草莽而竊者邪傳不云乎聖人沒而微言絶此豫所以嘗私為之絫欷而不能已也友人新安許君海嶽姑蘇沈君虹臺並鑱志於六藝之道而得其深者也抱古之文後先崛起江以南今且聨珮於承明著作之庭於是作文旨以貽之嗚呼世皆以豫騃且非笑之矣獨二君子以古之作者自信而不惑於流俗者也倘聞豫言得無異同而頷之者乎原文孫慎行豫頗慕古得往者名家言輒欣誦之企焉而瞪若後也每誦之即竒正紛起並犂然當于心辟諸酸醎異味皆適口矣雖然即所犁然當者而或攬之未竟或撫卷以思則又若嗛然有所不盡而淵淵乎津津乎其别有解者何也嗚呼是文之真也今夫文生於變變生於有所不盡故造化不盡而人發之古所不盡而後之人發之聖賢所不盡而發之竒人偉士文人又不盡而田夫野老發之斯變之至也曩令造化而果足盡也即造化之文章或幾乎窮文之在人也曰修意曰修辭其在修辭者必絀意文固不以意盡也即修意則亦必絀辭不然則文亦以辭而盡也即辭意合矣而俶詭正平茁軋清夷韜黯漫衍遞相絀無已又其甚也髙者下卑者昂清者溷汙者揚即絀而無當未始盡也夫唯不盡而後見文也不盡故鼓舞無端而變愈以繁且吾一心耳而昔之所是今或非之昔之所非今或是之其將謂昔盡乎今盡乎即吾觀之往而嗛然不盡者豈果彼之未工此之已得乎倘令還而觀之彼未嘗不自為盡也是我之觀又益之不盡者耳夫卵之毛雞之三足世無有也海外九州不得而觀也車之入穴不可以致思也然而人心皆及之者變固不盡也獨文異哉莊周云天籟之鳴吹而不息此亦一無窮彼亦一無窮蓋士衡不能賦其原昭明不能闢其藩希元不能正其末矣吾獨怪世之持一察迷大觀也其一察也而文且病雖然唯一察也而各私智能不相為下矻矻焉窮敝日力逞流極支而文乃相靡相衍於無窮况大觀者其變之不可盡更如何吾於是有覺焉作原文法原王樵天討有罪五刑五用其來尚矣周禮始有其目曰五刑之法墨罪五百劓罪五百宫罪五百刖罪五百殺罪五百凡二千五百至穆王之時五刑之屬增至三千魏文侯時李悝撰次諸國法著法經六篇曰盜法曰賊法曰囚法曰捕法曰雜法曰具法商君受之以相秦而多變古法法令繁苛漢髙帝初入咸陽與民約法三章曰殺人者死傷人及盜抵罪除秦苛法兆民大悅然大辟尚有三族之誅先黥劓斬左右趾笞殺梟其首葅其骨肉於市其誹謗罵詛又先斷舌故謂之具五刑彭越韓信皆受此戮後以三章之法不足以禦姦遂令蕭何定律除參夷連坐之罪立部主見知之法益事律興律廄户三篇與李悝六篇合為九篇叔孫通益律所不及旁章十八篇文帝除肉刑以髠鉗城旦舂代黥笞三百代劓笞五百代斬趾景帝元年定笞五百者曰三百笞三百者曰二百中六年又減笞三百者曰二百笞二百者曰一百至武帝時徴發煩數民窮犯法令張湯趙禹條定法令張湯撰越宫律二十七篇趙禹撰朝律六篇與前合共六十篇曹魏采漢律定為新律十八篇集罪例以為刑名冠於律首有劫略律自盜律內分有詐律自囚律內分有毁亡律自賊律金布律內分有告劾律自囚律廄律內分有繫訊律有斷獄律並自囚律興律內分有請賕律自盜律雜律內分有興擅律取興事以擅事附之有留律並自興律內分有警事律有償贓律有免坐律凡所增定十三篇就故五篇合十八篇於正律九篇為增於旁章科令為省晉就漢九章又增十一篇改舊律曰刑名法例分囚律曰告劾曰繫訊曰斷獄分盜律曰請賕曰詐偽曰水火曰毁亡又因事類而設者曰衛宫曰違制曰諸侯律合二十篇六百二十條梁天監初定律二十篇一曰刑名二曰法例三曰盜劫四曰賊叛五曰詐偽六曰受賕七曰告劾八曰討捕九曰繫訊十曰斷獄十一曰雜十二曰戶十三曰擅興十四曰毁亡十五曰衛宫十六曰水火十七曰倉庫十八曰廄十九曰關市二十曰違制後魏起自北方刑法峻急每以軍令從事犯大逆者親族男女無少長皆斬男女不以禮交皆死至於人相殺者聽與死家牛馬四十九頭及送葬器物以平之則又太無法矣殆闕俗也孝文泰和中修改舊文隨例增減凡八百三十二章門房之誅十有六大辟之罪二百三十五刑三百七十七除羣行剽劫首謀門誅律重者止梟首北齊初因魏舊後定齊律一曰名例二曰禁衛三曰户婚四曰擅興五曰違制六曰詐欺七曰鬭訟八曰盜賊九曰捕斷十曰毁損十一曰廄牧十二曰雜其定罪九百四十九條又上新令三十卷大抵采魏晉故事其制刑五一曰死刑重者轘之其次梟首並陳尸三日其次斬刑殊身首其次絞刑死而不殊凡四等二曰流刑謂論犯可死原情可降鞭笞各百髠之投於邊裔以為兵卒未有道里之差其不合逺配者男子長徒女子配舂並六年三曰刑罪即耐罪也有五歲四歲三歲二歲一歲之差凡五等各加鞭百又加笞五歲者八十四歲者六十三歲者四十二歲者二十一歲者無笞並鎖輸作左校而不髠無保者鉗之婦人配舂及掖庭織四曰鞭有百八十六十五十四十之差凡五等五曰杖有三十二十一十之差凡三等後周定律凡二十五篇一曰刑名二曰法例三曰祀享四曰朝會五曰婚姻六曰戶禁七曰水火八曰興繕九曰衛宫十曰市㕓十一曰鬪競十二曰劫盜十三曰賊叛十四曰毁亡十五曰違制十六曰關津十七曰諸侯十八曰廄牧十九曰雜犯二十曰詐偽二十一曰請賕二十二曰告言二十三曰逃亡二十四曰繫訊二十五曰斷獄大凡定罪千五百三十條其制刑一曰杖自十至五十凡五等二曰鞭自六十至百凡五等三曰徒自一年至五年亦五等徒一年者鞭六十笞一十自二年以上皆加鞭笞有差四曰流自去皇畿二千五百里至四千五百里亦五等皆加鞭笞有差五曰死刑一曰磬二曰絞三曰斬四曰梟五曰裂五刑之屬各有五隋文帝定新律除死罪八十一條流罪百五十四條徒等千餘條定留唯五百條一曰名例二曰衛禁三曰職制四曰户婚五曰廄庫六曰擅興七曰賊盜八曰鬪訟九曰詐偽十曰雜律十一曰捕亡十二曰斷獄煬帝新律一曰名例二曰衛宫三曰違制四曰請賕五曰戶六曰婚七曰擅興八曰告劾九曰賊十曰盜十一曰鬬十二曰捕亡十三曰倉庫十四曰廄牧十五曰關市十六曰雜十七曰詐偽十八曰斷獄亦凡五百條唐之刑書有四曰律令格式令者尊卑貴賤之等數國家之制度也格者百官有司之所常行之事也式者其所常守之法也凡邦國之政必從事於此三者其有所違及人之為惡而入於罪者則斷以律律之為書因隋初之舊篇目同其刑五一曰笞二曰杖三曰徒四曰流五曰死自隋以前死刑有五而流徒之刑鞭笞兼用數皆踰百至隋始定徒一年一年半二年二年半三年凡五等流刑千里千五百里二千里凡三等死刑止絞斬除其鞭刑及梟首轘裂之酷又有議請減贖當免之法唐皆因之然隋文帝性刻深至於殿前決人盜一錢亦死而煬帝昏亂盜賊蜂起更為嚴制民不聊生唐髙祖起義入京約法十二條惟殺人劫盜背軍叛逆者死武德二年又頒新格五十三條太宗即位定律五百條於隋世舊律減大辟入流者九十二條入徒者七十一條玄宗刪定律令格式總成律十二卷疏三十卷令三十卷式二十卷開元初格十卷至今前代之律皆不傳傳者唐律也五代時周世宗命竇儀解律名曰刑統本文是厯代相傳注字是世宗所修宋初止用編敕敕係太祖時所修至神宗元豐中因執政上所定勑令諭安燾曰設於此而逆彼之至謂之格設於此而使彼效之謂之式禁於未然謂之令治其已然謂之敕修書者要當知此朱子曰神廟天資絶人觀此數語真是分别得好格如五服制度某親當某服某服當某時各有限極所謂設於此而逆彼之至之謂也式如磨勘轉官求恩澤封贈之類只依箇樣子寫去所謂設於此而使彼效之之謂也令則條令禁制某事不得為某事違者有罰之類所謂禁於未然敕則是已結此事依條斷遣之類所謂治其已然者格令式在前勑在後今但欲尊勑字以勑居前殊非當時本旨又曰律輕而勑重今世斷獄只用勑勑中無方用律又曰刑統與古法相近故曰八分書又曰宋莒公曰應從而違堪供而闕此六經之亞文也謂子不從父不義之命及力所不能養者古人皆不以不孝坐之義當從而不從力可供而不供然後坐以不孝之罪元之刑書大綱有三一曰詔制二曰條格三曰斷例大約纂輯世祖以來法制事例而已其五刑之目自七下至五十七謂之笞刑自六十七至一百七謂之杖刑其徒法年數杖數相附為加減流則南人遷北北人遷南不定里數死刑則有斬而無絞惡逆之極者又有凌遲處死之法焉笞杖之數十減為七者世祖嘗言天饒他一下地饒他一下我饒他一下故每數至七而止而缺其三也逮乎我明肇基遂生聖人復萬古之綱常定三尺之明法其損益雖因乎前代而品裁一出於聖心凡舊律輕重失當者正之文意艱奧者顯之條目分散者併之有倫有要使人易讀易曉易避難犯作我明之一經垂憲章於百代嗚呼至哉因聖人之法見聖人之心斯世斯民日遷善逺罪而不自知其所由來者深矣原智趙統傳言聖人周身之智故無死法此特自慰之辭耳千古之大智宜莫如舜舜之當瞽瞍箕子與周文之當紂孔子之當匡人與桓魋要皆死地死法云爾匪曰化之處者也曲為善處是之謂權傳不云乎微服過宋一物釋西伯可以觀迹矣要亦遇乎爾此猶三代以上之處也三代以下以言為諱矣夫智而含言言以行知言且諱矣智將安出今夫士孰非誦法孔子姑以言究之孔子曰聖人善人吾不得而見之矣此特一時几席間語耳使揚於王庭傳簡策人將曰非聖鮮不敗言夫後人之欲自聖者豈少哉莽彘武麀亦曰頌聖自聖者每切於不聖夫漢唐之死市者豈少哉孔子之論人之孔惡也又曰不如鄉人之善者好之夫善人已自不得而見之矣天下之善者無幾而取善於鄉乎鄉無一善何所決擇夫天下之惡里也豈直一闕黨互鄉而已邪將孔子不自免矣夫孔子智欲擇里昔叔孫武叔為毁也不知何辭一言薄父已阻孟子或及出妻將速魯訟所何為智且後世人之所謂善人皆富貴利達者也而鄉稱善士類為左道善之趣譽如水就下非古之所謂鄉願必後世之謂惡少也一言之譽衆口交贊一言之毁百犬吠聲故古語曰一人毁之而有餘又曰鄉乏不二之老又况亂之以官有行私之吏朝有善言之臣氤氲媒蘗粧揑瘢垢錮為姦黨以隕國是君子之退縮以自處也如剃草圍獸難乎其為孤蘭特麒矣而况妒名已才以相襲麒趾而撲蘭馨者乎辨如韓非竟以辨死智如朝錯卒以智死非多其智與辨也而况不智不辨者乎聖人其如智何哉嗟夫毁譽者人之情也是寓褒貶以别善惡以為天下刑賞勸懲然執此以求勝一夫之私耳誣上行私是為朋黨且以動搖天子誣上罔下至閼上下之交以激衆憤姦天地和氣而上下病之昔孔子之周流也非必罪春秋之諸候也假使厯轍漢唐亦徒老耳且君之不黨亦無如黨何退而不進上也退且防毁毁且畏訟故曰欲加之罪何患無辭又曰自安之道在人之死哀世之苦辭也古今之死市者豈必皆有死法哉是以君子不貴智也用智之術莫如忘智亦莫如藏智忘智者刓亷刷耻土木形骸不識不知如鹿與豺墮網逃獵死生往來以幸不死野不絶鹿也藏莫如老子存玄守黑和光同塵不為禍始不為福先或庶乎容於世矣然青牛且西出乎流沙且我之愚人將欺之弱人將陵之心可剖而肝可炙也竟如藏何是故君子貴之命也命不在天亦不在人勢之順至君子存存俟死為終有死即正龍蛇之蟄不性決命將焉用智為莊子曰周將處乎才不才之間君子之逃世者也智不智之間本無善地也原訟張弼訟者公言也所以攻夫不公者人莫不有之不特人也凡有血氣者莫不有之不特有血氣者凡物之相戾者莫不有之故聖人觀諸乾坎而名之曰訟天水相違也坎險而內乾健而外險健相乘而成訟則聖人有以見人情之變言不盡公矣是故訟之始義之激也智之致也人物皆有之其弊也義之賊也智之蔽也君子之所深惡恆人之所弗尚小人之所樂為無弗公言矣鑿空扇虛醜詆巧刺變亂黑白顛倒邪正順其欲者跖蹻為賢非其志則夷齊為汚蔓延流衍莫知底極蓋日甚焉雖明者不能眩矣習經好文之士宜痛絶之也然以天下觀之南土則文於北土者也北土寡訟而南土之訟乃繁以南土較之江右若文於諸邦矣諸邦寡訟而江右之訟實繁何哉豈習經好文之士反工為口語巧於訐訕乎古稱鄒魯之士齗齗守禮不聞其蠧政毒民如是也豈經不當習文不當好耶豈小人鄙夫假經詭文以飾其詐耶彼習經好文卒為賊義蔽知之事何若推魯朴陋者目不識書而自信其天耶南海陳公夢祥由大理寺副拜江西僉事其操髙其學碩熟爛天下之故者於其行豫原訟以問之必有以復我也已原新法周思兼大臣之道可以相濟而不可以相忌也夫茍有相忌之心則惡人之勝已而樂其無成惡其足以勝已則所以排擊而擠陷之者無所不用其謀而樂其無成則從中扼之以害其功而後持其所短必逐之而後巳故新進之士常樂於紛更以圖天下之大功而大臣從而壞之則天下之事始決裂潰散不可以復收而國家之勢日傾天下之禍鮮不自斯人為之哉夫介甫厄於外者幾二十年而天子一旦首拔而用之故奮身決䇿以新天下之政而國家之所以憤抑而不振者皆思所以整頓之以庶幾於夏啇周之盛而稱有宋之元臣於是廣儲蓄寬搖役積兵馬以攘遼夏之橫皆宋氏之所未講而大臣之所駭且愕天下之所共驚而莫知其誰何者也故介甫之法雖所以病天下而天下不能無疑雖所以濟國家之用而天下之安於其故者不能遽去彼而從我夫其不能無疑而不欲遽從我也而一二大臣首以身當之而必求其無弊則介甫之法未必不足以興宋氏之治而成大功而富韓輩從而擠之鳴乎法未行而先擠之己不足以鎮服天下之心而况其所擠者又當世之望人則豪傑之士共起而攻新法以求工其所甚難夫人臣害其功而豪傑之士又羣起而攻擊之則新法不可以一日行故不得不引小人之有才者以自輔而小人既衆遂至於亂天下之事而卒無成功宋氏之禍未必皆王氏之罪而二三大臣亦與有責也介甫判西京而韓魏公方為留守冬不爐夏不扇夜不就寢以自苦於學而魏公笑之以為狂嗚乎魏公果知王氏者哉而王氏既去元祐大臣各立黨以相攻擊而免役一法爭之而不己此則介甫之所竊笑而不為者也擠介甫之政者固元祐之大臣而犯介甫之政者又皆元祐之黨鍛錬而成之然則讀介甫之傳者又何以白其公議於天下也明文海卷一百三十一
