body:
  text: 明文海卷一百三十二餘姚黃宗羲編述一陶述朱衡余嘗逰於龍門之野而觀陶焉晉陶者諏之則曰凡為陶不範則不匡不合則不附已厚則闕益薄則泐不堊則不飭不細則不澤故範之以視其規也合之以循其塗也適之以防其摰與龜也堊之會其微也細之觀其潤也由此者內諸火而出焉而後為良然範之合之厚薄之己而堊之細之而色者遷乎其施模者易乎其受則火土所運神機自生力弗與焉其名曰變目之炯然若扣之埒金玉其遭也寄一二於千萬品中故非可嘗期遂不敢以供歲貢間有之亦將毁其大且竒者取碎瑣蒙而售之蓄賈罔厚值而已督之司亦罔覿之矣問所供上者率無異常品特非龎隙玷璺為精縝絢爛端正耳於是浡然動焉曰不亦善夫陶技之下也然其貴足以禮清廟其次預燕享其大贍華夏生民之用乃皆常品獨其竒不與故萬物之情皆陶焉夕駐祇林視弟子所為文讀之不能句朱子曰余欲言文耶盍往觀陶諸弟子咸往觀陶事學初述曽朝節余蓋素未信學睹講學者目攝之曰道中天日也奚俟講而明乎學行而己講何為嘉靖乙丑春余與同里王楚陽解元南宫下第辭座主侍御徐巖泉公公授以古太極測一帙途次展玩至陷溺禽獸圖瞿然曰人之不學乃至此乎遂相與矢天而盟必為聖賢顧茫然莫知所以為學之方余謂楚陽曰中庸論性道教道不可離其功夫惟曰戒慎不睹恐懼不聞吾人亦勉於敬而已於是日相戒飭目不妄視耳不邪聽口不戲言身不媟動如此者四十餘日以為精神歸併庶幾君子戒慎之功時亦覺其束縛勞苦以咎之於功未熟也及抵家各以人事不相聚者月餘則前功皆弗復記憶之矣居有頃徽州程天津公至衡凝齋先生亟謂余天津者心齋先生髙第弟子余乃約楚陽訪之於石鼓一見問余植齋之義余告曰節之直也不植則不立欲有以自立爾天津公曰固也不猶之植木者乎將於枝葉植之與抑於根植之也余曰亦於根植之耳然則先生之植安在余未有以應天津公曰吾人此心即性命靈根也培養者只於靈根培養自然枝葉暢茂開花結實不向根上用力根既不固而欲其湊泊能乎余乃恍然悟為學之功若此其簡易君子之戒懼初非束縛勞苦於外而束縛勞苦者宜其一放失遂不復記憶也天津他日示余二絶云一種靈根天上來幾人知向此中培津津生意無窮妙葉自隂濃花自開葉自隂濃花自開枝頭忽見已成梅好將鼎內調羮味毋負當年苦意栽自是余與楚陽既宗敬之先贈君迎致之家孰而余日叩公所得於心齋先生者與之辨駁不休余告公曰吾之所無疑於古人者孔子而己以公與先生之見讀孔子之言而無疑也則己矣以公與先生之見讀孔子之言而有疑也吾安得而不問辨以思乎久之公所得於心齋先生者余既無所不置力余亦忽若有以自得一時同志密齋益齋楚陽諸君與易僉憲蒙菴劉冏卿仁山二公相約為學會而公之於衡人士多所開發先贈君舍弟守齋涵齋賴公之教而立尤覺蒸蒸於家庭間殆未六七年公卒於嶺南先贈君楚陽涵齋亦後先物故矣盛事不可以久徼九原不可以復作念之其能不雪涕哉今年癸未天津公次郎勉之走京師訊余余重其别而憶曩者所得於公之教不可以無紀也故述學初以寓我感慨之懷焉旱述雷禮歲玄黓執徐八閩自季春至仲夏不雨赤旱千里余時司理興化郡惻之謂太守曰大旱則雩祭禮也遇災修省其可後乎太守曰然率僚屬齋沐宿山川社稷壇朝夕虔禱越七日不雨有告壺公山其脈通海視潮盈縮石穴水深數十丈有雙蟹占年禱雨見之即應於是太守以下徒步二十里虔禱山靈如是者又七日不雨或薦有道人善符水運雷驅雨太守令使者召而問之則對曰能可計期乃立髙臺虔祀道人暴烈日中指掌運雷如是者又七日不雨太守怒曰邪術不經徒惑衆耳立譴出之時士民洶洶憔然相對以泣太守憂歎長吁某忽恍寐夢衣朱者排户而入謂余曰汝語守夫人旱未除徒咎天旱其誰欺乎古人啓蟄不殺方長不折所以廣生道也今矜殘恣忍賊及無辜一罹告訐牽連根附以意而周納之少犯其怒則敲撲痛詆無完膚其渠憸宿狡乘為牙噬晝禁食夜楚寐使瘐死不可質詰其名曰酷旱財為民命一芥不可橫取今婪心如熾溪壑難填巧立名色以便侵牟於罪條之出入差役之輕重視賄為差甚或利其重積緣為姦市辟之割葵者不傷其根不止至於國課逋負通同隱匿每遇監司按核謾讕不能得其真數其名曰貪旱有司奉天子命令所以宣教化也今驕盈踰制麋用百出備肥甘則羅海錯陸羞角為尊貴侈服御則奪良賈綺紈價不半給而又新公廨飭器具廣交遊納欵澤惟求炫人觀聽不知公私已殫矣其名曰奢旱國依於民民依於信今大道不行習為狙詐朝弄其民夕􅐩其行時伺上官意旨文飾條目無一善狀有中其鉗口者則掩黑為白使悃愊無華之吏治反抑下考其名曰欺旱夫食人之食當分人之憂今習寵偷安牽耗歲時坐堂未幾旋即私居惟計日以需遷不留情於民瘼以致文移束閣吏胥竊權有經年裹糧聽讞而生理盡廢者及姦囂不軌剽敓坊閭則曰有司捕在民焉賴之其名曰慢旱夫天居髙聽卑陟降厥士兹五旱者動拂人心致其怨詈甚於旱魃之為害也不洗精澄慮反其所為乃測之冥冥徼於難必是熒惑退舍不由乎善言而反風滅火可以私邪致也不亦戾乎言訖而逝某覺起歎曰有是哉天且譴告之矣言之太守請理繫囚寬宿賦罷重役延耆舊名德於庭審所宜者興革之逾宿大雨越信又雨民欣若更生某於是益知砥礪自修因述其説置座右云農述雷禮山隴之陽其野石溜寒惡不便闢墾有附地居叟利其曠幽可田操銚鎛去蔓草芟夷蘊崇之如是者不遺力越歲成田解凍而耕暴背而耨計秋獲甚微或曰利不償力固若是盲乎叟曰不然夫赤土可沃吾力固進於地利矣時灌溉習培壅如是者三稔乃擇嘉種是穮是蓘弗虞恆暘稿之倐變恆雨又腐之不獲半或曰異乎子之勩也豈餒在其中非耶叟曰不然夫飢饉必有豐年吾力固進於天時矣於是濬溝澮平封畛如是者又三稔且慮蟊螣諰諰甚謹於苗也懼其仆日一視焉於稼也懼其涸日三視焉於穡也懼其搖日五視焉暨登圃其獲倍或曰子力則徴矣苐薾然疲役可不哀耶叟曰有是哉夫好逸惡勞人之情也不云好生惡死者乎吾固無以易此矣雷子聞其言壯之曰韙哉叟之志可貞矣夫石溜寒惡之野叟不以好逸焉奪其好生者不以惡勞焉奪其惡死者卒登腴壤大獲有秋況仁義者人心之田存則榮甚於好生也舍則辱甚於惡死也乃愛心不如田不亦自棄於居叟哉是故質美者腴壤易治者也其下則石溜寒惡之野耳茍定仁義以立基存養省察日夕靡懈則始於立身終於濟物其利不亦大乎豫固壯叟之志有君子自強之道述其事以勵諸子焉拙政述陸釴政亦難矣哉篤撫字則催科怠急催科則撫字忘然則如之何或曰寧拙催科勿忘撫字不失為良有司嗟乎是不達於政之論矣夫以民奉君古今通議軍國浩繁賦稅是需催科之政如之何其可緩也第求之當有道取之當及時災沴不可以不蠲豪傑不可以不抑侵漁不可以不杜幽隱不可以不達虐胥姦吏舞文作慝不可以不懲能行五者撫字存乎其中矣是故撫字所以行催科之政催科所以運撫字之心非判然二物也其或不達乎是而姑息以惠姦市恩以徼衆沽一已之虛譽廢國大經而不顧獵一時之歡娛貽民重害而不恤若是者邦政之積蠧王政所必誅良有司弗為也或曰然則陽城不足法乎曰唐至貞元海內疲於兵革間架酒𣙜無名之征紛然四至而諸道競以羡餘取貴寵如城之抗志不回為民蘇息可謂賢矣苐不知今之所謂賦稅果無名之征耶抑亦中正之法所不可廢耶而今之布列郡縣者果盡能如陽城之宅心否耶使陽城處今之世抑不知視今之賦稅將拙耶勤耶不可得而知也是故為令如陽城當貞元之時則可非貞元之時縱焉爾矣有陽城之心則可無陽城之心詐焉爾矣吾願諸有司皆陽城其人如學陽城之拙而不得其意流而為縱為詐斯不亦涉於巧乎易曰君子定其交而後求傳曰未有上好仁下不好義者也圖政之本實惟在兹拙與巧又奚足論哉余性素拙不能以巧容於時乃兹來督藩稅蓋於拙性為拙政稱其能矣獨慮有司求拙者涉之於巧也非復古之所謂拙也見輒與辨辨必有以稽其政而反之以自省因退而書於拙政堂之屏云明文海一百三十二
