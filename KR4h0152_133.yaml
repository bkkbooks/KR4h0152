body:
  text: 明文海卷一百三十三餘姚黃宗羲編讀一讀遵巖先生集蔣德璟歐陽公識蘇子瞻置第二子瞻推重歐公不啻口吾鄉王道思先生識李于鱗先生置第一而于鱗譏毁亦不啻口論者以此定二人優劣非也使于鱗之文果勝道思如子瞻出永叔一頭地即毁之於師見薄而於文示公猶未為過今舉世厭于鱗文即元美奉之最恭而晚年己有異議大約如史漢語輔以詰曲聱牙而已讀之雖古色斑駁而非真史漢也即元美弋獵五車於今故亡所不綜辨史才高而六經之學似亦惘惘故學元美者入門甚便去古彌逺道思先生嘗云學司馬子長莫如毆陽永叔學班孟堅莫如曾子固吾正是學馬班豈學毆曾哉第其所學非今人所謂學今人何嘗能學馬班止是每篇中抄得四五句史記漢書餘皆舉子對䇿與往來贈答寫柬寒溫之套語而曰學班馬亦可笑也此語直為七子傳神然元美淵富故不易及亦自成其元美故余嘗私論明文以金華北地晉江太倉為四大家而為晉江者非沈酣經術湛深史漢力厚氣釀獨立間架未易下手政恐逗入䇿套寒溫蹊徑耳若于鱗不足深論也讀黃帝素問趙玉余讀黃帝內經素問愛其文雅義該竊獨疑其非黃岐舊文蓋有三焉一曰名物之疑夫上古聖人作物適用立名便稱匪物曷名匪名曷稱素問所引多堯舜時事黃岐雖聖何曲前知如飲酒燔炭歃血九州之類是也二者音韻之疑周公彖易孔子刪詩其間韻語多用叶聲是書逺在二經之前反用沈約顧野王江左之音如生榮平明藏光張章之類是也三曰字畫之疑許叔重上取六經旁搜百代著説文解字不應獨遺此書顧其字乃出叔重之後如痱疔悁皏黅䪼版衃髑􅚯之類是也嗚呼厯年既久豈無舛訛存義設疑以俟來哲至於法攝養以保身窮病態以惠民察運氣以燭理辨隂陽以候時明智君子亦有所取也夫三才之原探萬物之本要非聖賢詎能有作夏蟲疑氷凡夫非聖罪我者其以是歟讀二谷先生詩文集夏鯨僕垂髫受讀經史百家竊臠旨而擬趨馳三四十年當逮古人末軌即不逮不違里也駸駸四十年瞪後將伯引豫而莫之顧亹亹躋涉於兹望洋瞻巘浩浩乎巍巍乎吾及其半已乎將半莫之及邪儻不遄沒勉勉捫危厯室坐閬風巔俯大瀛海環帝下都庶幾少愜吾志嘗語妄推者曰謂吾載籍中識之無十數字吾無讓焉將名我讀書人惡敢哉比有學者方據案句讀離牘口占輒自號讀書譬之陟階數級闖首簷端曰余天上人也不乃良可笑哉兹讀二谷先生詩文集畏而脅息作而壯歎大荒中有先生焉始可謂讀書人也已矣先生詩文悉祖三百篇三百篇至矣試略其音準他經誦之其詞亦為六經冠竊師之而未之能先生得之夙矣超忽坐閬風巔企豫瞻之其天人也邪先生嘗與僕有罛弋之獲乃自忘其以六合為樊汙魚鳥何之邪即罛弋之獲幾何良賈虛無肩牆窺室先生與僕之謂矣盱尋見丈盱丈見常戚施之目莫見嵩梁滎洛五尺之童指泰華而相謂曰其髙並我先生光射於詩文具瞻於時髦者其洛西之華山也乎後學夏鯨附塵末册讀汲冢周書郭棐古書自六籍外傳者蓋眇少矣劉向班固所録則有周書七十篇晉大康中盜發汲郡魏安釐王冡得之所言皆文武周公及穆宣幽靈之事故曰汲冢周書云豫披閲之就中時有格語度訓篇曰天生民而制其度度小大以正權輕重以極明本末以立中武稱篇曰美男破老美女破舌淫圖破國淫巧破時淫樂破正淫言破義大開武篇曰其維天命王其敬命祭公篇曰汝無以小謀敗大作汝無以嬖御士疾大夫卿士汝無以家相亂王室而莫恤於外尚以時中乂萬國芮良夫篇曰民歸于德德則民戴否則民讐民至億兆后一而已寡不勝衆后其危哉玉佩篇曰王者所佩在德德在利民不過在數懲施舍在平心不幸在不聞過福在受諫基在愛民固在親賢至哉斯數言者即壁中書奚加焉諡法解則周公之所制時訓明堂乃禮記所采王會解博於鳥獸草木之名史記解明於治亂興亡之迹卓有可觀他篇蓋多誇詡詭譎如利維生痛痛維生哀哀維生禮禮維生義義維生仁則非文王之謨也射之三發擊之輕吕斬之黃鉞懸之太白則非武王之烈也六則四守五示三極則非周公之訓也春違其農秋伐其穡夏收其麥冬寒其衣服則非司馬之法也世俘解言凡憝國九十有九馘魔億十有萬七千七百七十有九俘人三億萬有二百三十則嬴秦之暴不酷於此也官人解言設之謀以觀其智示之難以觀其勇煩之事以觀其治臨之利以觀其不貪濫之樂以觀其不荒醉之酒以觀其恭從之色以觀其常則儀衍之詐不深於此也又奚謬盩若是故或謂戰國時纂輯出逸民隱士之手然閲其云勇則害上不登於明堂則晉狼曋稱之綿綿不絶蔓蔓奈何毫末不掇將成斧柯則蘇秦引之夷羊在牧蜚鴻滿野則史遷周紀述之其書蓋似出春秋戰國之前抑周之野史與未可知也謂為周之誥誓號令經孔子刪定之餘則吾不敢信明文海卷一百三十三
