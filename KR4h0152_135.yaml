body:
  text: 明文海巻一百三十五餘姚黄宗羲編問答二襍體雀鷂對張治道太微子西園兀坐見鷂逐雀欲捕而食之雀懼縮如蝟投叢林中鷂往回搏擊雀自林中投下鷂亦側身下擊之得雀擒而未食令左右捕鷂並得之擲雀地上雀㥄懼喘息於是縳鷂責之曰汝毒惡鳥也雀何罪焉而汝擊殺之將令左右撲殺鷂鷂張喙瞪目口不能言而對之以意曰天地以生物為心造化以隂陽為權氣有隂陽則質有剛柔質有剛柔則性有善惡善者弗論惡者可言鳥則鷹鶻鷂隼獸則虎豹狼豺皆以搏擊為性啖噬畜心我形雖微厥類同性性以役形形以成性自忘其毒不知其惡而子責我以死則子惑矣盖上帝不仁賦我以性生我以形喙短而利爪鉅而鈎目瞥而疾翮矯而健有此數者舍雀何加焉捕雀而食是盖天性也使我喙如鵝鴨爪如鸛鶴目如帝江翼如翟雉則將潜形隐性之不暇矣又安能擊雀哉今聽子言將吾拳其爪閉其喙戢其翼瞑其目見雀而避則我將餓而死矣子徒知雀無罪而遭噬而不知我無罪而遭死則我與雀何擇焉且我食雀性也日食三四雀而飽飽則擇木而棲以待饑雀食蟲性也日不知食幾萬蟲而猶吮墻喙壁以尋雖萬蟲不能飽一饑亦貪矣而子憐之則蟲與雀又何擇焉子徒知我食雀之為毒而不知雀食蟲之為害我類尚少雀類惟多天下不知幾萬雀日食不知幾萬蟲也子徒知一雀之可憐而不知衆蟲之可惜也子徒知一鷂之可殺而不知衆雀之尤可殺也子能訴之上帝變隂陽之權奪剛柔之性生蟲而不生雀生雀而不生鷂推而至於萬物善者存惡者除擊者潜身而受擊者安體俾天下之物居居于于各遂其生各安其性而不相賊害其為仁也豈不大哉子不能禁上帝之不生而乃尤物類之相養余故曰子之心惑矣太微子俯而思仰而歎囅焉而笑令觧鷂之縛而縱之去鷂驤首而謝昻然舉飄然逝矣馬對李夢陽秦子北遊京師墮馬傷足時郁郅子亦有霜露之疾二子共巷而處郁郅子素善秦子居頃之謂其門人曰西不有秦子乎然吾聞其人矣非所謂守道自信者耶於是作黄鵠之歌以其門人上官氏為使往遺秦子秦子是日會使使來遇諸塗使異其事各反於主而後交焉久之秦子愈先造郁郅子遂及墮馬事郁邳子强起問故秦子曰吾南産也不習馬出卒假人馬即不觧良惡是以墮耳郁郅子曰異哉言也且子能盡習天下之馬乎曰不能能盡觧其良惡而後假乎曰不能曰二者既不能矣子能終身棄馬乎曰又不能曰子墮馬喪何曰傷足曰幸若是鄉使傷藏絡捩脰磕腦抉眥毁齒子尚能即起耶殆哉殆哉秦子聞之讋慴無人色呫呫語曰奈何先生幸以敎之郁郅子曰昔者伯樂學相馬於其師三月不進其師曰可以益乎伯樂曰未得其骨三月得其骨矣曰未得其神又三月得其神矣曰吾未得馬之外竟盡其師之術乃辭歸於是持以相天下之馬聆其聲而會其精睨其形而貫其靈然後天下無逃馬當是時也而暇於習乎今吾子不求諸馬之外日僕僕較良惡墮且滋甚秦子於是囅然笑曰濶哉談也千里馬常有而伯樂不常有子以伯樂望予無乃過乎雖然伯樂即幸而生今之世吾恐驪黄牝牡之徒得以鑠金而刺天也誠使人衆議堅伯樂即幸而復生固不得破非其良也郁郅子不荅憮然有間曰夫物非天不生非地不長非人不成故材美弗牣是謂棄天芻粟豐足怠厥力是謂戕地材牣矣弗怠厥力而世無王良造父之儔是之謂命故馬一也遇王良造父則過都歴塊靡流景逐奔電蹀血萬里顯名天下不遇則放之沮澤之中與鹿豕烏鳶並遊豈非命哉豈非命哉昔有獻馬於楚王者王愛之衣之文繡處之華屋席之露牀之安啖之棗脯終其身弗駕也馬慚憤悲鳴蹄齧思効王一日之用王不從竟老死廏下故知而弗愛不如弗知愛而弗用不如弗愛故寧甘心沮澤之中與鹿豕烏鳶並遊不願衣文繡之衣席華屋露牀之安故即有棗脯之餐弗餐也此之謂盡性以俟天者也且子亦將俟其在天者乎抑需在人者乎秦子出郁郅子呼上官氏記之頃之郁郅子疾亦愈秦子客久鬱鬱不得意乃卒取學職往敎於楚下邑郁郅子往餞之曰子記疇昔墮馬之説乎子之不為天下知亦久矣奈何雖然行有物色子者第行矣神難王廷陳予獄既久請於神曰盖聞之洞舛者靈也賛貞者天也故哲領不折妖體必離亂魄見褫欹𠂻每迷故刺聖之刃必斷毒賢之鴆必覆掩正之網必裂墮良之穽必夷是神職也予之獄也奚罪待命移時倦肢憒志恍兮忽兮聆神之難一難曰醜士懟妍修夫詈短東家之宴西隣怨詛是故握珠懷珍而賛瓦礫彼有跛鼈稱之駃驪鄰姬之瞽而曰是則明眸汝也䝉垢在伊讓其不潔彼髪不括若已蓬首是瞽鄰姬明跛鼈而擲瓦礫也汝奚無罪予曰天之畀予厥鑑湛湛乃緇其素詭中以容則予豈敢予不知罪二難曰據崇者卑附操首者尾隨宅腴者瘠依言勢忌失也虎豹違山見威於犬悍夫不戒或孺襲焉鸞折其翼而鳶啄腹汝乃捐華背要而昔心不移夫舍陵趨壑誨擠者也去重即輕朂擲者也服冕不則命裂者也子失勢矣固昔憎所乗而往怨所便也汝奚無罪予曰勢若龍蛇誰與執之且棄耻若疾掩耳冒詈貪主人之利而憚進苦劑予未能也予不知罪三難曰虎搏鄰牛操弧弗射非已利也虞人布羅獲禽丘若見者弗禁有在野也讐腹可飽忍割朋肉痛弗切膚也故攘隣之膏以赴盜火庇已而已子則塞勢者之賄奪肥乎大嚼之口而飼之人貽國人以富而甘以其身賈戾夫存鄰牛而射虎逢虎之怒惡禽斃而毁虞羅遭虞之疾是眩者為也汝奚無罪予曰梟搏雞雛其母奮翅知不能庇愛不已也夫聞啼助戮良所弗忍予不知罪四難曰衆直頌行不勝單佞十堯崇治一桀潰之黠夫伸舌惠口是屈故堅榦不伐决漲不遏鑠熖不撲族節不觧奔飊不障虞反傷也而子務勁者之摧而孱士之庇汝奚無罪予曰吾寧吾歩之蹶誠不能使勁者之肉孱也且覆惡以求立也德强以避抑也曷可説矣予不知罪五難曰不拔之道存乎托也衆植其援以備攻也王屋之鳥弋人弗射皇囿之兎獵子不逐集瓉之蠅忍而弗擲若木之條引手莫牽蓂莢生陛弗剪弗踐其附然也故陽區無凍蟲仁壤無槁品潤國無燥類附之及也予膚托而子援矣汝奚無罪子曰予聞之健夫終日立不倚不僵衆恃而不怵非夫也予不知罪六難曰世有尊官莫知其名手握雷電奔轟閃耀旭昃倐忽殊態改視傴僂而趨償以最考唯唯將事是為豐績磬折之腰夀其文組如醴之脯頥祿是求故勁項者辱剛膝者斥毅面者黜符中者完既泄之孔忤臆者扇不薪之熖是天下之至威也汝乃規守矩執恭不踰憲不省己倨咎人之僣兹搆之由也何謂無罪哉何謂無罪哉予乃俯伏歎息茫然汗洽駭然股慄厥罪自知無復以對神不復難囚對周怡周子被罪下獄手有梏足有鐐坐卧有㭱日有數人監之客過問曰辱乎周子曰國法也而敢辱怨乎曰君罪之也而敢怨然則樂乎周子蹙然正色而對曰君之怒也而敢樂也然則安乎曰安曰何安也曰余今而始知檢也手有梏則㳟足有鐐則重坐卧有㭱則不敢以妄動監之者衆則不敢以妄言行有鐐則疾徐有節余今知檢夫是之謂安客曰不然也子之所云禮樂也子之所居刑具也以刑具為禮樂非繆則戲忠臣之事君也不逆其忠不反其行知國之法也而不敢以不共知君之罪也而不敢以不訟知君之怒也而不敢以不畏由此而往其庶乎周子肅然起敬曰請事斯語矣客問郝敬郝子有疾客問之主人據牀而歎曰衰病殘喘尸居餘氣如此藐孤何狐伏於肘蜮潜在淵言之為先事不言情不達可若何客譬余曰無稽之言弗聽無徴之事弗信子其安之主人蹶然而起曰豺狼嘷矣何為無稽機穽成矣何為無徵請為子誦之故副憲胡㓜泉公者吾先君世好也副憲子士本死無嗣其弟士美收兄財産以己子繼之此天理人情也諸胡羣起而争以書告國人牽帥吾家為比曰郝仲輿二子死不為嗣以有父在自有待也此言何為者耶夫余之不為吾子置後久矣吾誰待乎吾待人乎人待吾乎爾家託繼争産與余風馬牛不相及而妄相株累誰為此謀聞諸道路吾家有不才子從臾之也諺所謂打鴨驚鴛鴦今日之包藏甚巧依樣畫葫蘆他日之隂謀已兆余未之信也雖然唯其有之是以似之果若人言吾事烏可與胡事比論也爾既曰郝氏有父在也夫有父在則子之後皆父後也父之後父自定之吾之家事吾自主之吾不為二子置後者吾二子可以勿後也盖子者嗣也子先父死不能後父即不成為子既不成為人子又焉成為人父故子不能後父者父可勿問之矣兩子雖死予季在也有季在是吾後也吾既有後其不成為吾後者可勿問之矣他日季多子欲為兄後後之可也無多子兄之祀弟主之可也但使吾祀不乏殤子之無後者可無問之矣此吾本意告諸先祖禰曉諸家衆鄉黨朋友國人皆知吾意今已八年矣一旦引他人事曰自有待也不知所謂自者何自乎家有父猶國有君也父不能令而待誰令乎彼所謂待待吾死也吾死將引胡事為成案以圖簒立心險而謀深是可忍也孰不可忍客曰兩子之不置後聞其㫖矣説者比之胡事其情形事理將無同與可否願聞其詳主人曰立後之説古人謂有國有天下有人民社稷宗廟者委曲付託計耳若士庶人尚未有宗廟而衰世一切借為争利口實故曰禮之失也煩不達禮意而妄援之適足為豺虎鴟鴞毁巢取子者充先導耳今其辭曰大宗無絶祀之禮獨子無出繼之條夫副憲子士本庶長也非宗也即副憲亦胡氏仲也非宗也士本以庶長繼襧何得比大宗士本死無後即士本同産之弟收其神主香火之士本之資産皆副憲之遺業也亦惟副憲之親子得受之即欲置後亦惟同産之弟主之亦惟同産弟之子繼之今謂士美之子不當繼而求他人子簒入為後不惟士美不肯即士本之靈亦必不饗謂副憲之子不得獨有副憲之資使衆人分之不惟士美不甘即副憲之靈亦必不樂夫後其人而使其鬼不饗不樂神怨神恫災害立至焉能保之凡人家父子兄弟天合也自非大逆子弟不與父兄離今士美非弑父也非謀兄也胡為離之使子不得承其父之業弟不得守其兄之有而奪以與他人乎他人何功德於副憲與士本而必欲攜副憲士本之有以濫予之乎甚無謂也如謂士美一子不可出繼夫一子雖不可以兩父香火自無妨於多主今以姪子而香火其伯父正所謂諸父也諸子也此禮之常也何待出而後繼何必獨而後子乎且士美年方壯安知他日不蕃衍而今以獨子奪之他日多子必更求復之是率天下而路也此胡氏之事是非了然可見者也若以吾家事較之相似而大不同所謂相似者副憲父子非大宗吾父子亦非大宗同也副憲之子繼襧吾子亦繼吾為襧非繼大宗同也所謂大不同者副憲死士美無制命之父故諸胡得而間之今吾尚在吾之子吾之後也其繼也惟吾其不繼也亦惟吾此大不同也副憲死士美兄弟析居十餘年而後士本死未亡人居守數年而後未亡人死若吾之子析居纔逾月而長子千秋遽死寡媳不能一日安其室吾以千秋房産均給千石洪範命治其兄葬香火其神主而汛埽其丘墓是千秋無子而有祀也無何次男千石又死居一年寡媳亦死其貲藏什器蕩費罄盡無復一絲一枲之存唯餘房産吾命洪範收之子承父業兄終弟及天理人情也又誰待乎葬祭香火即洪範奉之洪範之子孫世世勿替引之此吾裁酌已定生有成命死有家乗吾之家事吾不處分而更待誰乎此吾與胡事之尤不同者也使吾欲為置後必吾親子之子然後可使吾無親子然後可别議今吾自有子在也其他非吾子者焉得無故而黯干之如謂千秋長子不可以無繼夫子無少長成其為父後者成其為子子先父死雖長不成為後子不後父父反求為之後是亦不可以己乎生不吾養死不吾喪既不能恢𢎞吾業又不能顯揚吾生中道而棄予雖子猶非子也雖吾育之猶吾未育之也不孝有三無後為大又無功德可表又無爵廕可襲但令神主有託不至為餒鬼焉斯亦可矣如謂小宗不可遽絶夫我在即我為繼别之小宗且未須繼也我死則洪範即繼小宗之後今舍現在繼祖之父不宗而講先死不為父後之宗舍現在繼父之子不使祀兄而别求他人子以為之後此偏曲不通之論也禮唯繼太祖者百世不遷是為大宗自髙祖以下五世遞遷即宗亦不稱大矣曽祖以下至於禰如我同父則伯兄為繼禰之小宗而我尚為庶我之子宗我我又小矣向使我先父死繼亦可不繼亦可為其無闗於宗也有親兄弟為其無闕於繼也况我之子又不能後我者絶與不絶繼與不繼我初不介意而他人為我竊竊然呶呶然何為者哉亦可笑矣此吾事與胡事之是非可以類推而互見者也客曰若是則子不為父後者勿繼可也而禮云無子為置後又何也曰此為大夫世官無喪主者言也禮子喪則父為主吾在吾可主之兩子皆諸生未為大夫即無我而弟在亦可主之雖不置後未嘗無主也總之父在則子之兄若弟並統於父兄弟皆父之子也兄終弟繼皆父之業也有國有天下者毎用此道而况士庶人乎弟奉其祖襧則無後之兄即可附食於祖襧之廟何必更置後而始祀哉盖禮者人情耳非由人强也故有欲繼而不得者矣未有不欲繼而人迫之使繼者也亦有有志之士不肯為人後人强之後者矣未有其人不納而乞哀於國人求簒入者也此於人情不甚相遠乎盖其貪人之財則不得不冒認他人以為父利人之産則不得不甘居人後以為子此執鞭之士所羞為也故今争繼之子多矣而無繼之嗣亦多其争繼者必其有財有産者也其無繼者必其財産俱無者也為人後而不得所後者之財必不肯為人後則後人者後其産也非後其人也先王制禮本為仁厚之意時俗引禮專為争利之媒司世敎者焉可不力為主持也客曰欲主持將奈何曰貪夫為産而争繼則主議者不當與之論繼而但當與之論産彼心本欲産而借口於繼我不論産而論繼則貪夫之計售矣今且不必問死者之後為彼當繼與不當繼但先問死者之産為彼當得與不當得當得則與之不當得必不與彼明知不當得而託於繼我不論繼則貪夫之望絶矣客曰何産謂當得何産謂不當得曰如死者之産是死者生平刼奪其族人不義而有之今死則諸族人得而攜之此謂之當得如死者之産死者生平拮据經營昏作勞苦而置之今死則惟死者親父兄子弟得收之他人安得而覬之此謂之不當得今吾家之産非吾刼奪人而取之也又非吾兩子自置也又非先世逓傳也皆吾孜孜汲汲修禮以耕之陳藝以種之也以分三子而二長死其産猶吾之有也吾自收之命吾季併而守之誰曰不宜彼何人斯焉得視為道旁之稆而採之視為無主之鹿而逐之既交搆他人之兄弟因包藏門庭之隠禍立心奸險為鬼為蜮一至於此故自古國家之害莫大於争利而争利之害莫慘於謀繼援禮以飾奸而假仁以濟惡操戈入室禦人取貨凡謀為人後者皆天下之貪夫忍人也得利則舍其親父兄而甘為他人之子弟不得利則雖同産之子不肯祀無後之兄弟同父之子不肯祀無後之伯叔語云天下穰穰皆為利往故凡為人後者皆君子所不齒也在記有之孔子射於矍相之圃觀者如堵墻使子路出延射曰敗軍之將亡國之大夫與為人後者皆不得入盖去者半矣夫為人後而與敗軍之將亡國之大夫比是比於亡命與俘擄也與亡命之俘擄比士君子豈屑為之故士為人後必不得已而有父兄之命有師保之言國人推戴之宗族鄉黨無間言而後可然而季札子臧亦不屑就矣又况隂謀䧟穽殺人以求之者乎是見惡於孔子者矣於是客起竦然怵惕斂容拜手而颺言曰洋洋聖訓昭昭簡編不䝉耳提誰惕斯言凡百君子佩此韋弦勿搏黄口自矜我鸇勿欺衰老自謂我賢誰無父母甘作螟蛉如彼饕餮見利争先如彼窮竒長惡不悛死灰可溺孤犢可憐不愧於人不畏於天客遂退主人次第其語為客問明文海巻一百三十五
