body:
  text: 明文海卷一百三十七餘姚黃宗羲編問答四雜體黠鼠對雷禮雷子遊精舍之西隅見童子捕黠鼠以鐵刺木甚慘愀然曰噫毒哉不亦太甚乎童子曰是穴囷充餐粟幾罄矣然鼠亦唧唧聲若將訴然雷子曰鼠有言乎因命覔鼠音者鞠之鼠俯首伏地對曰公其生我也夫天施地成啖函萬穢穴者嚅棲者噣潛者吸植者慨皆君子所到心也今造物假我成形與粟食者彚是將以我為此拘拘耳主人不列之樊籠哀食食焉雖欲守介不得坐而待斃也如此種可泯則造物為虛孰若勿生者哉且豫晝伏不動畏主法惕惕伺夕竊之亦太倉一粒耳乃重罪不良毁首碎胸豈天地桎梏我耶夫駢於拇者決之則泣枝於手者齕之則啼公名仁人何其不相恤也况於知鼠行矣不知世有甚焉者決性命之情公行掊竊其浮於鼠行多矣而公不譴之信遭哉觸木而斃雷子曰惜也夫鼠患天刑為世詬厲矧又為鼠所斥耶名園對雷禮京師自昔多名園惟含春園最著居都城外西郊地闢爽通濠泉亭榭森列貯名卉竒石非民間所常有者要人貴客及仕於朝者時引類遊賞烹鮮擊肥舉杯酒相勸酬絲竹金革之音與童歌相雜無虛日豫自嘉靖十一年釋褐嘗至其地至今三十八年同萬錦衣相城池隨訪其地已為空畦惟蒼松數株僅存居旁有一白髮老叟因詢其顛末則對曰此園湮廢幾二十年矣初主人操熱柄力可亢此園貴客慕而遊之以故轂交蹄劇不絶及主人失勢子復驕侈不自殖轉盼間已為他人所據今又三易主矣某聞而歎曰浮雲易化冬葉晨霜彼競一生心力為他人置此園不亦愚乎老叟曰噫公知其一不知其二豫髮且種種矣見名園不下數百區今皆鞠為蓁蕪然前人失之後人又從而效之不能袪却塵纒非舉世皆愚而無一人省悟者乎豈惟是哉蓋達官皆名園也治劫以來席寵矜華非筆牘所能盡方其居髙握重力能禍福人舉一世而奔走之使趨其熱者有如趨市望塵掃門忍恥受侮顔色少有不在愧畏如鼠或耽逸謝客閣人守間則必多方賄蒼頭以求一面輒自慶幸固不徒名園麗景為人欣慕而已一旦上干國法失其所據而齚舌鉗口巧為親媚者反為仇敵并第宅己屬之他人獨非名園類耶惟孤介挺立之士如此松然不與春華爭妍一時及歷艱難險阻勵堅貞樹不朽事業不猶嚴冬大雪中百卉皆萎獨挺秀於其中者乎公既知所以戒名園亦知所以勵於操矣豫聞而愕然流汗浹背退歸宦邸書其對語志自省焉聽秋答陸之箕西門陸子汝瞻自號聽秋居士客有過而疑之者曰竊聞五官既具維耳思聰四時有聲奚秋可聽既非八音之克諧徒爾四顧之蕭瑟亦何舍置其他而獨有取於是也豈南磳之縣水或即竇缺於庭前抑廬阜之藥石每於醉後而揚扇蓋性各有在而自不能以忘於念耶吾固不能以知子矣居士管爾而笑既乃仰而答之曰客知秋之不可聽而不知我之獨聽乎秋也彼其激楚嚴節流徵變商聆之者中悅繹之者倦忘誠有如吾子之所云者矣然而律吕雖曰自至必假器而後成聲世無伶倫之竹人乏伯牙之琴則固未能易得而恆聞也孰若悟至聲於物外會天籟於無心取之在我用不由人乃為自得而樂極其真也耶爾乃神司蓐收律中清商其氣則肅其風斯涼觸萬竅而可聽何金玉之琳琅所謂越韶夏與咸池不徒取異於鄭衛者亦可以比方矣吾之於此或徘徊梧竹或徙倚軒楹或對月以杯酌或臨池以丹青或發孤詠於泉石或舒長嘯於山林蓋吾心無時而不秋而秋聲亦無適而不會乎吾心也天壤之間復有何樂可以奪吾之至情也耶客又不聞滿堂燕笑有向隅之泣聞樂而悲由將亡之政蓋憂喜實在人心而物固不得而移我之聽也是故草木搖落山川寂寥履霜露之凄慘驚鴻雁之哀號時既云宴我心實勞蓋不獨歐陽子乃有慨於斯矣宋玉深悲於在遠潘嶽感興於歲遒杜老墮淚於叢菊曹瞞酹酒於江流子瞻夢鶴於赤壁仲宣作賦於登樓禹錫戀月於楚望李白愴猿於扁舟走誠不能堪數子之遭遇獨爾間聽吾之清秋長白山人聞而喜之乃為其言如右名之曰聽秋答云爾山村問答黃卿松居子西遊太行迂徑厯覽至華詞嶠少倦憩閭門題扁下嗟羡曰標之異書之遒其有良乎一學究曰爰有長者克昌於辭譾焉我衆朴將師之松居子曰稱賢不先辭説殆有大於是乎學究欣然對曰長吾村之賢人也他日灌叢有鴟梟啄鳥適鶻西來奮距振喙攻梟長則引袖麾鶻厲色震聲曰鶻何悖何忍耶兩鳥嗝嗝向之嗚咽如訴則叱之曰梟必之食汝欲立俟斃乎馳不視他日之市遇鄰以粟易貓嗤之曰夙惡是肉食之為暴也曰吾宇舊燕巢乳雛翐習飛鼠狡夜緣器攀桷破壘害雛燕雌雄哀鳴急吾取火視之鼠捷下施施歸穴吾無若何故欲畜是武除惡者耳長村者艴然曰惡有是已乃嘻然曰吾得其術矣將令有燕之家夜慎防勿渴寐其免夫吾黨悅若兹率將更村曰仁可乎松居子竦然詰曰汝與渠為德乎為怨乎為譽乎為哂乎人性不相逺也孰有稱厥拂人之性耶學究曰否吾見其仁不可及也松居子曰爾誤名仁不幾乎祻不可言乎以吾擬倫殆慈氏之流乎學究喜曰慈氏之宗福田之寓夫人之求之也甚於食飲吾得從矣松居子曰吾聞福之理玄矣子未之思乎言之易也夫澤布於人力庇於人不失其正而無謀期之者可也譬之恕於鸇而謂有德於爵恕於獺而謂有德於魚乎感者怨者孰多少無已則鳥或效鸇獸或效獺非教之乎非危道乎詩曰誠不以富亦秖以異其斯之謂乎學究色阻緬思復曰長吾村者非此之安也量廣性靜厭喧祛煩且將以頤夀也松居子曰是則可矣葆真息慮弗搖弗猾一氣專其宇百感慎於外俯於水則深者澄仰於山則髙者靜吾慕修錬之説而未之從事若斯人其殆不逺乎然欲充其靜則滄海長谷羣於耕漁可也夫長一村尚亦云勞何使人夜夜為燕防鼠乎其不幸不仕耳學究奮然曰從吾長村者之道於從政乎何有政以靜成者也觀諸從政或汲汲湧湧嘵嘵厖厖上下如譁吾每少之松居子曰若褒爾之長似矣非以言政也夫仕也有録有任有法如子之説也任重可但已乎司法可姑避乎食祿可負乎言未既其長村者過服從甚都有睟其容松居子心計曰若斯偉然其人必不如若淺之乎譽之也因請為介將見之學究曰長固樂客劇談兹及曛矣逮曙將謁公府焉其改卜日以來遂别山水問顧治主人遊於惠泉之上甚樂也客曰山水其亦有古今哉曰有古者公而不私也則山水常客而我常主今者私而不公也則我常客而山水常主客曰何以知之曰我知之泉上也古之人有黃公歇者有陸子羽者兩人非私山水而有之徒以飲馬於澗品第於泉云耳至今人稱之曰黃公澗陸子泉也山水信有待人而名者豈非山水常為客而我常為主乎今之人則不然矣有一丘之勝從而據之有一壑之幽又從而據之有一亭從而榜之曰某書也有一石從而刻之曰某立也彼固以為我有耳然更數十百年來不知凡幾易主幾易榜幾易刻矣而若丘若壑若亭若石雖嘗屢因其主以屢易其名而其本名卒未嘗易也過陸子泉則曰是某泉也不曰他子泉也涉黃公澗則曰是某澗也不曰他公澗也非不欲名茍非其人不以名也豈非山水常為主而我常為客乎無他故矣古人公之而今人私之也公則以我觀山水我有主道焉主能勝客故山水不得而主之而為我之客私則以山水觀我我有客道焉客不能勝主故山水反得而客之而為我之主若黃公陸子兩主人者去矣今我與子遊於斯飲於斯客也彼主山水者亦客耳今時某有者異時某有矣又異時又某有矣是彼我皆客也當誰主哉夫山水古有主而今無主雖謂其有古今可也彼之主有限而我之客無窮雖謂我為主亦可也客唯唯願有紀也主人遂執筆紀之紀客語趙玉客有懷科舉程度之文見者豫難之曰安事此為士生熙世達則贊皇猷敷治化代天工立人紀商説周望窮則樹清節敦素履扇高風述聖典為仲武子陵烏在抽黃對白駢四儷六割裂經史剪截傳注殫英俊壯鋭之精鑠知仁聖義之性上之所求下之所舉舉天下士子於此焉出使之無真儒以經國無名將以定亂無巧工以創物無明醫以療疾無良史以紀事職此故也且糊名易書孰與玄纁聘幣棘闈鎖院孰與安車蒲輪版屋席舍孰與臨軒前席是以儒日絀而經日晦矣奚庸詭隨世好事此為哉客曰子真暗於經典不達變通夫三五尚矣自周官賔興之舉不行而有漢之方正孝廉法久滋弊而有魏晉之九品中正推舉冗濫而有隋之秀才唐之詞賦至宋始全用經義取士我朝因之黜詞賦之浮靡用策論之質實糊名則取唐之武瞾程式則取宋之安石惟采所長不嫌猥陋非此而出謂之幸進非此而習謂之異途傳之萬世斯無弊矣如薛敬軒章楓山羅整菴之理學穆玄菴崔後渠之經學何柏齋馬溪田之清節于肅愍王陽明之武略李空同何大復之文詞此數公皆發身科甲事業文章凌跨百代誠不可誣必欲從古子何遠茹毛飲血而嗜八珍五味耶豫自知失言乃謝客退而掇托其言以志吾過且舉贈今之習舉子業者詰儒一方𢎞靜儒服者曰夫二氏之教未始異於儒也而泥者異之非道之異也道一而已矣詰之曰吾以子之溺於二氏也將亦有異聞也而曰固與儒同乎儒之所不同於二氏者儒者言之詳矣子固所厭聞也無論焉吾聞之也服其服者誦其言誦其言者行其行子服儒之服也而誦二氏之言奚為而不二氏之服也君臣也父子也夫婦也昆弟也子以為可去耶不可去者耶如果可去耶子奚不二氏之從也老子言上士聞道勤而行之子固所謂上士者矣子之服膺於二氏之道可謂勤矣金剛經言五百年後善男子信誦其經者如來悉見是人若子者必為如來所見矣且二氏所謂勤而行之者將以生羽翰也將以注淨土也自有二氏以來彼羽翰而長生者安在耶曾有善男子從淨土來者耶如來且見子子見如來耶如來所為來迎者舍子孰迎耶夫七寶蓮苞三山瓊宇少有知者亦知其亡是耳設有之不難脫屣無豫云逆猶可也乃若齋醮布施罔利幸福親見姦黠為羣誑誘癡愚不啻盜竊曾不以為非又從而為之嚆矢耶使子而愚也吾弗知之矣子而智者也而何忍於異端之攻以誣斯世以天下惑也詰儒二方𢎞靜儒者曰夫莊子非不知仁義禮樂之美也以為仁義禮樂者孔孟既丁寧言之復言之則贅矣有是哉其辭之遁也夫仁義禮樂之於人猶菽粟之不可去也夫既莫不飲食矣而朝饔焉夕飱焉不亦贅乎孔子曰志於道據於德未嘗不言道德也則道德亦贅矣儒者之左袒於二氏也則曰形而上者謂之道形而下者謂之器道器者易之言也而老氏第易之為有無釋氏第易之為色空耳是未始不同也噫二氏者果於儒無異乎則舍已之田而耘人之田者何也既以仁義禮樂之言為贅矣則道器之云者亦既言之矣易之為有無又易之為色空何其不厭贅也且夫二氏之説何可同也君子之道費而隱造端乎夫婦察乎天地至誠無息一言而盡皆實理也乃二氏之説歸於無歸於空云爾其為説足以簧鼓索隱好異之流而不足以濟天下且胥而溺者也何可同也詰儒三方𢎞靜儒者曰老莊孔孟同時也孔孟未嘗攻之而何世之學者誻誻然沸不少置也其憤世切矣夫君子之知言也惟其言之是非耳言而當也則邇言猶察之况往古之作世所好尚者乎言而非當也則速貧速朽猶以為非夫子之言武成取二三䇿而已豈以未嘗非之而遂不知其為非乎孔子曰索隱行怪後世有述焉吾弗為之攻乎異端斯害也已當時聖王之道猶同倫同文足徵而信也可無言也孟子以為我無君比之禽獸楊氏者固老氏之流歟若莊生者寓言離辭適已自恣王公大人不能器之太史公論之者蓋實録矣其書未若楊墨之盈天下可無辨也安可以孔孟所未攻者為不可議也決疑樊鵬樊子辭家遊仕至於西秦竭忠陳力日無留事然心與迹違居常不樂乃往見長安有道季禮先生曰余有隱疑願先生決之先生曰子非汝南樊大夫與曰然曰吾聞賢者隨世以樹名知者乘時而建績今君自致青雲並升治朝遭逢仁聖手握金印身珮玉珂束地千里職專按察忿怒則風雷生喜澤則陽春至萬夫遵令列郡受命上下孚信頌聲滿道夫快心展步立業成功此其時也夫亦何惑何疑何思何慮何有所不足乃色鬱鬱而不宣意夷猶而不忬無乃悖謬乎哉樊子曰夫虎豹麋鹿去山林則蹶騷而反走驊騮緑耳羈釡竈則蹼地而悲號其性異也故蘇張口舌致顯貴鄼平刀筆居相位蕭朱結綬王貢彈冠不可説以山林之幽邃長沮桀溺偶而耕楚狂接輿歌鳳衰梅生挂冠嚴陵守釣不可語以廟堂之富貴是皆守有定執趨有定方鑿不可短續不可長規不可員矩不可方故亹亹然各畢志而成名也今僕則不然居無獨見之明行無一藝之成離群索居之不敢喔咿嚅唲之不能行藏隱顯莫吾知迷前路而遐征喜怒哀樂攖吾情心搖搖而懸旌悅謇謇之為忠又悅煌煌之保躬悅琴瑟爼豆之為懿又悅文繡與簮纓願如白鷗之泛泛又如龍駒之昻昻如鳳凰翔千仭又如鳳鳥鳴高岡願江籬以為衣秋蘭以為服又願海棠之爭春園葵之向陽心在江湖又在廟堂神遊八極不舍故鄉鑿之則短不鑿則長矩之則員規之則方此數者孰去孰從孰止孰行孰為大道孰為小徑孰可以定吾志孰可以堅吾性季禮先生再拜而謝且作歌曰潛淵為龍兮從雲以之千仭為鳳兮鳴岡固是千蹊萬徑兮期於必至與時偕行兮與道卷舒任君之意行君之事吾固不能為君而決疑明文海卷一百三十七
