body:
  text: 明文海巻一百三十八餘姚黄宗羲編問答五雜體客問來知徳僕以先父病末疾母患目疾晨昏定省侍養於家不樂仕進友人致書多疑之因作此代答雖文其辭然實有是問非如客難賔戲之假設其説也瞿唐來子隠於釜山書堂客有過而問之者曰某聞子乆矣聞子冠道徳履仁義衣百家佩六藝知子已棲君子之林矣衆人慕之某竊為子不取也吾聞鳥能鳴陽葵知傾日物且如此况於人乎是以哲士乗時達人駴世方今皇猷丕赫王表煇昭羣衿獻瑋諸乂圜橋采蕙􅉅而兼蓄乎蕭艾選干將而不遺乎鉛刀非倰僜而抱瑟豈濟渡而無舠茍可以存心於利物奚必於執璧而垂貂子廼懸車城市擊壤蘅臯賸􅀈飛於鸞漢羌紲迹於鷃嵩洵拗鰩而戢翼必滯惠而屯膏杴雕龍而削草怢荼薺於䜮䜰吾將冀子兮參軌伊呂胡知今子兮駕言許巢來子曰子以我為隠矣夫隠者必有所為今生值明時以不見用為恥吾不為也客曰人之酬世非處則出榮春者蘭華秋者菊我知子之心矣方其采秀雲莊燔枯霧築刻羽引商吹金鼓玉髙價蜺巔咇聲蟬谷狎花鳥傲墳素恁遠引於青岑非纓情於朱轂豈知闇者斯章微之必著乃若巖廊訪仄荃宰羅竒旭日翯夫乾鵲條風轉於枯荑書將鶴載旌以鸞持束帛投園結軫填茨慶吾道之大行感人世之我知子廼整筋揮翮仰首伸眉披䓮岫出崟逵盼鳷衢而揚䄃排鳳闕以論思知子有南山之徑慮子有北山之移來子咥而笑曰非徑也是迂也夫欲仕無路者故以山為路耳予濫科名仕則仕矣不求可期之榮於見在而徼未必之寵於方來歲遒齒臷謂之何哉騃亦絶矣吾不為也客曰子知夫古人乎漆園之放叔夜之簡王衍之談阮籍之懶酖竹林嘯山阪税冠履觧襟衴幕天席地操觚挈醆爾其齊舜豕比周猿逢糟荷鍤遻麯生涎俗士稱為六逸詩人名為八仙坐俟夫九疇之斁叙罔顧乎兩曜之虧圓恭敬消於脣吻名節劋於􅨏􅨵子之不仕復不沽於世者意者其在此乎來子曰此自放而忘世者也予欲救世吾不為也客曰若有人焉遺情棄世絶坾脱屣紫籍通名青𡨕輕舉爾其垂琳綬佩珵玦驂滕六驅列缺調世外之𤣥靈彈壺中之白雪青鳥縈音紅鸞擊節已而明月初升雲璈方歇瞻桑海之幾遷囘歲序於一瞥悲荒丘慉古血乃若芝宫䎂屼桂館龍驤吹氷成醴叱石飛漿真妃摻饋姹女抆􅜠招王喬以容與拉蕭史以相羊既沈湎以言别指流水以成章歌曰流水兮東注美人兮何處囘首兮三素浮世兮朝暮乃若䕃慈雲滅甘露謝四流𢎞六度秘授柰苑之㫖洞開葱嶺之路爾其不生作囿無象為家天地蘧廬形體蟲蝦見理即障篤學愈差乃吼桐峯之虎垂長慶之蛇種雲門之樹澆南泉之花㸃洛浦之金衣洞山之麻烹明昭之銚飲趙州之茶早聞者難登彼岸􅱅醉者未窺津涯彼傾海入毛不撓魚鮪若施藤倚樹必㾁㝞􅀢子之勃窣不出户庭不面官長孜孜而惟日不足者必居於此矣來子曰子愈言而愈遠矣此方外之術出於名教之外者也世皆若此三綱絶矣吾不為也客曰我真不知子矣遂避席而起拂衣而去來子曰居吾語女夫大德者不官中立者戒倚是以君子無終日違仁大人以萬物為體不怦怦於必行不硜硜於必止盖澡浴存乎吾身顯晦安於所遇立德之基有常樹功之途不一茍入而可以事吾親兮則啜水承歡茍出而可以事吾君兮則捐軀弗計見輪出圓因桷施直遭坎則停乗流斯逝大行兮何所欣窮居兮何所戚故移忠於家則敬同移孝於國則愛同使人皆以不仕為是兮則龍逢非孝使人皆以仕為是兮則會參非忠彚征者何以誦其駿業嘉遯者何以高其清風盖駿業者扶顛持危有匡世之績清風者起頑立懦有垂世之功是皆有禆於國家之教化者也可見事無定體惟義是適行無定轍惟道是崇故可以仕亦可以止仕止之間存乎修已子謂子夏不云乎無為小人女為君子若為小人何取青紫若為君子出亦可矣處亦可矣末學興而功利熾此言不聞於人之耳也久矣吾將尋孔顔之所樂析繭絲於此理愧榛楛之無成空勔勉而不已茍友于可以為政空言足以善俗則塵霧之微忱或可以為山海之小補也獨非鳴陽向日之心乎子何過疑至此客曰我過矣我過矣而今而後始知江湖廊廟原為一體明道行道皆將淑人我過矣來子援筆作客問隍災對徐渭萬厯十二年甲申九月甲戌十六日己丑霜降前二日夜漏且子府隍祠火火從東北耳卑舍仰射殿角諸顛遂并焰以入舁神者百數十徙不克徙俄而神首殞及宴殿宴殿首亦殞或曰諸徒哀而掬落之果爾則不應棄不取宴有兩夫人夾神座外有廊宇小神以十數侍從毬馬斧㦸幢旌等以百數一無及一庖子亦預徙值崩燼而埋顧忽出宴殿後僅破腦衆駭問之曰吾不知所從出幸免者多如此獨神所寓殿兩衡一從獲尺寸免觀者近萬人恠且怛之明日踵相質未有以復夜臥而思得周公借撻伯禽抗世子事復焉質者曰如子言豈以神當伯禽耶則必有當世子者當世子宜必以牧吾土者當而禮所稱世子固未有過也特以伯禽有小過周公借撻以預警世子耳今牧吾土者無一過之可舉也猶世子也帝亦何用借於神以儆夫牧如公之借撻於伯禽耶即神有小過帝小罰之如公之撻伯禽亦足矣而罰又何至於是曰人有等西施之髪於鄭旦者非莖數而寸量之也其𤣥與豐不相遠而已矣牧之受命而寄責於身也亦夥矣即小不慊於心豈必盡出其身之為哉人為之而牧也當之心知其不當為而勢與力不可奪於是不得不委之於勢與力而終亦未免自謂有負於其心而終有所不安若此者百豈無一二哉帝若曰彼能知此而顧且為之非罪也畏也吾助之以神為伯禽以牧為世子以火為撻以决其不肯自負之初心使得藉口於神以感動勢力者之堅持而勢力者萬一聽之又得藉口於神以轉相告語其黨而一悔其初相倡和之誤吾故曰帝之斯舉大槩有似於公之撻伯禽也非按髪而數且量之謂也曰然則神何辜也而罰酷也如是曰土木神之托也賤也靈爽神之真也貴也宇可復建也故二氏往往言凡神成之日莫不土苴其軀之舍而遺之而後去况土木舍乎又况舍土木之舍者乎帝之示罰今不過奪其賤者也不奪其貴者也且帝果罰也而罰之酷而果奪其貴者則我與子又安得而知若此又安在其為借撻以啓牧者而助之决也故罰之酷否不足校噫是帝天之微權也盖嘗謂天之微權不可以人凖可以人凖則常而無變無變則人得以試而熟之而僥倖於趨與避之間故僇東海之婦者過在吏宜罰在吏而帝不罰吏而罰農若曰使衆可用是以咎吏也以一吏可勝一於决曹不可勝衆農也又若曰吏遠婦寃之可也衆邇婦易知易知而不衆諍之可乎初稍罰衆以旱矣而衆猶不省故罰至三年必直而後已而農之損多矣此初亦撻伯禽於農也而衆人蚩蚩徒諉曰吏至今數千年猶不省又帝凡降諸大災能及大衆者意若使諸大衆尋其致災之首而尤之而首者亦多不之省及其敢也乃多敗於諸大衆之尤亦與東海之旱罰農而農不省其罰謂罰吏也同噫非諸大衆則不能勝此也非災諸大衆則諸大衆亦不怨此也則帝天之權不使人常而凖之恒若此質者曰子何據曰據董子質者曰陳亢有言問一得三吾今近之矣幸也然而不能為也非我不能為也彼亦不能為也我亦農也彼亦一農也彼亦一婦也爾亦一婦也通喪問答郭造卿郭卿曰今人尠讀禮讀者又喪諱也雖喪亦讀者寡矣盖多於通喪之制疑矣林生問曰三年月三十有六矣乃喪二十七而裁之或以緦也功也期也而積之然猶逾二十七月者二矣其云大功減於期者月三小功減於大功者月四緦麻減於小功者月二三年亦為宜之殺也二十七月者乃因緦功之殺之者與曰服之各為其制也經也義也弗可損益者也既因緦功之殺而殺之胡置期之於三年者或曰夫禮為可傳可繼也故品節之謂禮或云古二十五月而禫者以月而易歲也謂二十七月而禫者亦以時而易歲也何如曰噫嘻其然吾於禮未之聞矣且再期者喪之中庸也有為而損之不亦薄乎其為道也哉然為禮之言者盖尚有二家焉或云檀弓祥而縞是月禫徙月樂言乎大祥之月而禫也復徙月而又月則樂是其禫也月三矣曰禮中月而禫者祥月之中禫也故禫曰是月徙月而禫云乎哉夫魯人朝祥暮歌孔子謂其踰月則善者徙月而樂之謂也言越此則二十六月而非禫矣故卜遠日以祥而有旬則月踰者孔子五日彈琴不成聲十日成笙歌之謂也經曰三年之喪二十五月而畢若加之月而禫是未之畢矣且樂之月也而可謂禫乎哉曰或云雜記期之喪十一月而練十二月而祥十五月而禫二十有七月者或因此而加之期與曰父在為母者故有練焉故有祥焉故有禫焉月加乎常之期而禫加於大祥者二為不得再期示乎其𠂻之未盡者然也彼父期而再有加矣禫而三月也何居且父没則母喪亦如之又三月而禫也何居兹言十五月禫而止則二十五月禫而畢也明矣曰二十五月何謂之三年也曰禮云期之喪二年也再期之喪三年也二年謂之期矣再期其不三年乎哉曰十有二月而成歲如元日喪除夕而除及再期如之斯可矣而曰二年三年者何耶曰期者周也復其時也今歲某日喪矣嗣歲是日今歲之期也初期則再年矣三年亦若是也已曰期必後於始䘮之日者何也曰孝子之情無窮而限之以制三年之内前親死之日而祥焉則翌日其安忍之禮云君子有終身之喪忌日之謂也再期而以年名之則三年矣曰何謂不實三年終也曰禮非天降地出人情而已矣易云古之喪服無數至書云考妣三載其服尚無制也三代始為之制然父在於母豈無三年之愛乎哉而以期斷者禮曰天地易四時變在天地之中莫不更始焉以是象之也其主於加隆者而倍之以再期盖痛甚者其愈遲三年所以為至痛極也若再期而又一期數其年之名四矣且母而期也於父之期也三父卒而母亦如之則父在母屈為己甚矣故禮曰聖人為之立中制節祥之日鼓素琴告民有終也是日而吉孝子其忍之哉故纎無不佩矣尚踰月則歌徙月則樂也然遂之則無窮是以禮必以為之防焉爾曰為父母而再期也引而之三月之五月之九月不亦可乎曰而言之何易也夫禮期之内哀之所發容體也聲音也言語也飲食也居處也衣服也盖與死為鄰焉故禮曰期而練毁不滅性三年之喪哀痛未盡思慕未忘以是斷之者豈不以上而闕祖先之祭也下而止嗣續之傳也士則禮樂之廢也仕則國政之曠也夫今有不足於再期者豈皆賢者過之哉雖命之以三期盖未有如古之三月者焉曰今之二十七月何也曰鄭𤣥之説始之也自漢至宋之天聖始從而定焉者今曲説合其數則違乎古也逺矣古二期謂之三年者如今之除夕而生踰年於元旦而終亦孰謂之非三年乎哉䘮之三年其凡也義則兩期盡之焉耳矣曾謂子亦終三年之月而後免於父母之懐也耶曰然則今者何適矣曰小子識之吾則言先王之禮而已矣寤言顧憲成七月一日之晡方隠几卧有東里塾叟過訪予問曰聞婁江王相國有新命信乎予曰信曰君謂應出否予曰出而大展平生旋乾轉坤上局也出而循守故常如入寳山空手而回下局也堅卧不出無咎無譽中局也衆揣相國意大半就中局耳叟曰相國而庸人也則巳相國而大豪傑也殆不其然予曰何叟曰竊窺當今執政後先相承總一心訣順之則安即天下交口而譁之逆之則危即天下引領而屬之是故趙蘭溪至于叢羣垢以死而後已猶得厚䝉恩恤沈四明至于十分狼狽而後去猶得特䝉温諭乃王山隂晨請罷而夕報可矣沈歸徳夕講罷而晨報可矣果直道難容枉道易合耶抑一時氣運爾爾耶不然或有密操其線索者耶吾願相國出而轉移於其間也余黙然叟曰猶未也惟吏部亦然久莫如海豐順也促莫如平湖餘姚逆也説者謂宰相以知人用人為職故吏部與閣臣斟酌天下賢不肖以俟朝廷處分而近世閣臣懼威福之名不復問吏部吏部懼權貴之名不復問閣臣遂至互相氷炭而滿朝亦不復信閣部矣似也請得而質之吏部不問内閣正矣内閣不問吏部公矣何以致相氷炭揆厥所由將内閣欲進賢退不肖而吏部尼之耶抑吏部欲進賢退不肖而内閣尼之耶而朝之不復信部閣也將吏部碍内閣從而媒糵内閣致之耶抑内閣碍吏部從而媒糵吏部致之耶夫如是得無吏部之不問是真内閣之不問是假耶此不可不詳察也更請得而推本言之吏部與内閣信應共相斟酌難為異同矣要之亦須為吏部者有不問閣臣之心而後其斟酌也始出於正不出於阿奉權貴為閣臣者有不問吏部之心而後其斟酌也始出於公不出於播弄威福此所以一德一心渾無異同之跡也否則分宜江陵殷鑒不遠尚不如不問之為愈耳况至今日平湖餘姚一綫之脉依希欲絶曽何氷炭之慮而慮内閣權輕吏部權重耶委如所慮何不見吏部之逐内閣而但見内閣之逐吏部耶吾願相國出而為之一表正於其間也余又黙然叟曰猶未也近者竊又有以窺執政之微指矣若曰吳趙鄒沈等之君子太勁而苦用之不便胡王陳曽等之小人太靡而穢用之不雅莫若擇謹厚一路人而用之此一路人既不喜為危言危行輕於風波以梗我亦不恣為蕩言蕩行重潰隄防以濺我人皆曰君子宜親此不可疵其非君子人皆曰小人宜遠此不可疵其為小人執兩端而用中其庶幾矣足以息阿比之端絶喧囂之竇平偏黨之論杜好事之口而天下且帖然馴服無所施其紛紛矣曽不思此一路人據其跡則然徐而按其實正孔子所謂德之賊孟子所謂非之無舉刺之無刺同乎流俗合乎汚世居之似忠信行之似㢘潔衆皆悦之自以為是而不可與入堯舜之道者也三代而下髙官大祿大率此一路人居多即遏之猶恐不能絶而况樹之幟而導之趨將見上好之下必甚之一倡之衆必和之人人以模稜為工事事以調停為便遇賢否不欲兩下分明别白混而納之於平等而曰吾能剖破藩籬遇是非不肯一下直截擔當漫而付之於含糊而曰吾能脱落意見久之正氣日消清議日微士習日巧宦機日猾卒乃知有身不知有國家知有私交不知有君父本欲懲東京之矯激而反弄成西京之頑鈍其釀禍流毒殆有不可勝言者矣而獨若軰外不失名内不失利安富尊榮優游坐享漠然不介於理亂安危之故如張禹胡廣比比而是豈不恨哉吾願相國出而為之一挽回於其間也於是予復隠几而卧客不悦曰老人失言矣遂拂衣去寐言顧憲成叟既去予繹其三言殊不草草出歩中庭徘徊往來展轉至數百次不能已已迨夕就寢猶耿耿方寸間良久始成寐忽夢相國過錫予遇之於芙蓉湖上相國一見遽曰君必有以助我予曰憲何知只是當今有一大寃須先生昭雪耳相國愕然問曰寃何在予曰在皇上相國益駭異予曰先生勿詫也請以憲所親歴對當憲之待罪考功也適鄒南臯具疏謝病歸左堂見麓蔡公時掌部篆謂予曰此疏宜如何覆予曰惟老先生主張蔡公曰昨晤王相國言皇上遣一中貴持鄒疏至閣著放他去予曰此却更宜斟酌試思皇上此念從何而來是耶宜將而順之非耶宜匡而救之若不問所以皇上曰如是相國遂亦曰如是皇上且謂可以惟其言而莫之違也非所以光君德也相國曰如是部中遂亦曰如是相國且謂可以惟其言而莫之違也非所以光相道也惟老先生再加斟酌蔡公曰姑徐之數日見蔡公又問予對如前又數日蔡公召不肖謂曰近思之南臯委宜擬留君所執良是予遂如諭題覆皇上竟報可不責也及予待罪文選請於堂翁心谷陳公擬升江念所光祿寺少卿念所故受知於皇上中因山陵事罷歸數年矣疏上皇上御筆親書江東之升光祿寺少卿九字吏垣許少微見而異之持攜示予曰故事惟大九卿親書此特筆也自是稍遷至大理出鎮雲南已而為言官所摘復聽歸由前而觀皇上胸中固自有念所也由後而觀皇上胸中又未嘗有念所也推類具言之不可勝數盖皇上之無成心如此今大僚不補歸之皇上科道不選歸之皇上廢遺不起歸之皇上豈非一大寃耶且閭閻匹夫匹婦之寃則有司為之昭雪有司不能則監司為之昭雪監司不能則兩臺為之昭雪兩臺不能則有擊登聞鼓轉而聞諸皇上者矣於是皇上下公卿為之昭雪其控愬之途甚寛而其主持之人亦所在不乏無憂覆盆也乃皇上之寃獨有内閣能為之昭雪耳願先生留神焉相國曰善則稱君過則稱已古之道也公言甚當予曰先生所言猶體面語也憲所言則腹心語也竊嘗計之事英明之主寧不易於開導然或挾才自用喜怒不測則調停難以其不足於寛大也事寛大之主寧不易於調停然或牽制情欲語不可了則開導難以其不足於英明也我皇上英明寛大合而為一豈非千載一君乎而令受此大寃也凡為臣子孰無動心何况先生一人之下百僚之上謝政以來且十有四年尚簡在帝𠂻煌煌天使儼然造門而延請焉豈非千載一時乎而坐視皇上受此大寃也幸先生念之語訖微察相國亦愴然改容予復進曰有君如此何忍負之誦之至再至三不覺放聲大哭一室大驚共起而呼予頃之乃覺淚猶淋漓滿面羣就而問故予曰此非兒女軰所知也徐而稍述其大都則皆曰異哉異哉遂起燒燭記之先生身江湖而心魏闕當有先得此中之同然者今兹之行其必以我皇上登三咸五也庶幾此一重公案不作白日説夢矣明文海巻一百三十八
