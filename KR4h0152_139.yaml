body:
  text: 明文海卷一百三十九餘姚黃宗羲編文一雜體毁曹操廟文唐肅操之不臣於漢天下後世莫不知也而夷陵獨有廟夷陵之民皆愚邪夷陵自有廟來國不一姓官不一人而未有毁之者凡仕於夷陵者皆愚邪非也夷陵之民不皆愚或知毁而不能毁者力不逮也仕於夷陵者亦不皆愚或可毁而不能毁者勇不勝私也雖然知毁而不能毁非愚也可毁而不毁者誠愚也申屠公以一介吏獨有事於此視之民則力足以為視之官則勇足以勝私不流於俗不惑於禍使愚者駭不愚者悅也得非偉歟嗚呼操之鬼逺矣雖毁之不足以誅之然公之為亦非以誅操也欲後世不臣如操者有所懼也却巧文王達歲惟壬辰七月之七王子潛居訌訌弗懌適冷風颯然月綻雲析桐籟薦秋露花凝夕有一嬋娟歘蒞吾席折折步搖灔灔繁飾睨王子而言曰吾天女之孫也職司天以式利下民禱吾者泰背吾者屯趨吾者富違吾者貧吾久聞子多戇少文吾實恤子來濟子身汝或不憚吾悉汝陳王子竦肩斂踵覷覷忞忞似夢非夢謂神非神蒲伏而言曰臣固拙矣敢不願聞天孫整裾端坐憮然曰噫人生兩間孰不兾通今子弗克巧進自貽醜窮不師詭遇祗業專攻朱塗噂􅊱龎言滋豐技夸鬼蜮計逞狙公鳥翼蛇驤蜂聚蟻同託根巍柯名曰宛童憚不曲合焉致斯崇路欺握雉祝天袪蟲陽縱隂戢內傾外融憎陋欣嫭人心攸同聾俗簧世譎行迂蹤季子由是而貴曲逆由是而封子亦聞歟矧乎妙奪工倕紆行曲施能若是者庸無不宜前邀後障左繩右規笑涴薇露戲焚玉㽔錦心繡腹侮書嫚詩啓喙成訟轉趾徴疵豫豫奪奪是是非非顛倒縱橫起滅提捶荷天拔地斷蛇剸犀藻葩綴縟陟降馳驅氣劘屈子目短相如諸侯見搆豪族爭儲臺譽可喜臺毁可悲致顯若彼汝奚不為今子􅟌吃赭顔沈吟搘頤窮鄉僻地運日以竒吾今告汝汝應諦思汝不改轍焉能救而夫騏驥捕鼠弗速狂狸吾將錫子語穽巧子嘲機納子之黠驅子之癡詎不偉哉王子曰臣聞駑馬安步麒麟局躅各有攸得奚慰奚懪良玉渾然烏事刻琢馬安善宦倪寬朴學寧為拙傷毋為巧諑技殊術異彼此相角沾沾求容栩栩強語手擎足旋神辱志沮我嗟其人汩此靈府命栖險竿躬罣遊弩嵩目蓬心臣實不取天孫噱然笑曰井蛙不見東海蟪蛄不知春秋弗識宜樞弗察往猷方枘圓鑿事恆弗投毁方瓦合懵不知謀耳與目敵心與身仇么麼之技自矜寡儔胡不思變吾實汝羞汝今絳宫弗懲玉堂弗憂攻若敷淡尫如楚囚匪徒恥之吾實悲之也匪徒悲之吾實悼之也王子又蒲伏而謝曰天孫之心固仁矣啓臣之智固偹矣然強哭者雖疾不哀強歡者雖笑不妍生龜脫筒顧非自然危鶴斷脛乃違厥天機械藏心神德不全夫巧者言拙者默巧者勞拙者逸巧者賊拙者德巧者凶拙者吉此先正之格言敢弗服膺而警惕於是天孫超然冥遊茫無所得出門視之但見繁星麗天萬里一碧達自敘曰昔栁儀曹曽製乞巧文千載之下有鐡瓦亦嘗擬之矣豫讀二先生之文感而作却巧文井窺管見豈敢追踵前賢哉姑自釋其抱耳竊觀末世傷於巧亦甚矣何又示人以乞巧豫今反其作而却之或於世道稍有禆歟瘞筆文陸樹聲豫自南雍謝病將歸理其裝敗筆盈篋童子啓豫盍畀水火豫曰是豫靡廪粟以朝夕指使從事焉者其忍諸發策而筮之得坤之六五乃擇地西南隅坎而埋焉為文以告之曰維爾初覯肆豫髫童爾資鋒頴以發豫蒙豫嘗下帷覃思隱几研窮呻吟占畢語鍛詞鎔爾職輸寫豫意乃通暨豫翺翔黌舍試藝澤宫孰使豫揚眉吐臆轉腕生風磨鉛出利刓朴抽工爾於是與有庸焉豫既陸沈世路濫迹章縫離竒偃蹇闒茸疏慵不靦豫辱周旋始終爾雖緘默竊隱豫衷進不能使爾載直圖書之府簮侍蓬萊之宫鋪張聖制黼黻皇躬庶幾馳竹帛以勒鼎鐘退不能縱橫六藝之場搜羅百氏之藂書窮八法學贍三冬上規莊屈旁軋張鍾使爾驅雲霧而走蛇龍徒使爾顛剝形秃挫頴銷鋒交踈几格迹謝磨礲浮湛故紙顛倒篋中孰令爾勞大而不收功若乃雕文破義伐異黨同漁獵管測邀譽市容脂言簧鼓賈進希逢使爾含毫茹羞濡首低傭此數者豫曽不以是溷爾爾亦能諒豫之幽悰惟是紬經繹史泝流尋宗摛辭摘句組繪雕蟲蘭堂桂館嘯月吟風徘徊景物陶寫心胸使爾疲於應命靡適不從是爾嘗力於豫而豫亦自信無負於管城公也筮告孔嘉含章有終月日維良往即爾封稽無咎以無譽豫亦將括囊於山中足責吳子文吳鼎強圉大淵獻之嵗嘉平之月除夕前二日吳子墜舷折足晝夜仰號七旬痛乃定定後五閲月乃離榻又五閲月乃杖藜自遭患至是期矣尚不良於行吳子拊膝嘆曰異哉余此足也古之人跣揭陶魚繭胝躬耕穿履踐雪躡蹻擔簦若是者吾足未經也今之人髙門懸薄日往趦趄造請逢迎健步風趍若是者吾足未能也改歲多暇祥琴既聲避喧集野聊爾曵行欲一跌而弗振匪三爵之沉冥彼險巇而弗踣此優逸而災生意者多行非禮刻肌椎髓天降大罰以懲淫宄邪抑斷腕決蹯全豫首領塞馬非妖支離獲幸邪胡為宜瘳而久不瘳也足忽應聲責吳子曰足不負子子則負足多矣昔也仕不擇祿詘體小邑驅置風塵之下跪伏庸豎之側汚吾足一也既乃觸天網墜危機嬰金木受榜笞汚吾足二也朝祥暮歌聖門所譏臨深履薄百世之師子皆弗念以及熸夷汚吾足三也子有三大負於足詬莫甚焉尚何讓我以奔趨而怖我以險艱嘲前軌之永飾忘已迹之多愆且吾為子足多歷年矣進弗使升華陟要乘堅跨肥委蛇玉階侍從黼扆退弗使却影離塵高蹈遐放息響空虛流憩間曠徒匍匐以學步昧筋力之日喪履坦途而未邁追逸駕其奚望縱此足之無玷亦何禆於貞亮孽匪神作禍不知創稱天引命詭情譎狂安得無咎哉安得無咎哉若夫步及奔馬而不免為僇者非關足也珠玉無脛而含耀華櫝者世所矚也故夏后偏枯而稱聖樂正因傷而訓垂申徒遺形於子産無趾務學於仲尼跛卿霸晉臏子師齊相中山者臏腳之司馬代穰侯者折骼之范睢咸以俶儻光揚乎下體豈緣陋足借譽於豐軀顧慙嫓美於數子何患見哂於跛夫擬嘲孟嘉落帽文吳鼎九月九日令節時良大司馬戎機稍暇宴會斯張集於龍山旗斾央央賔從如雲材彥翺翔稱詩展志合歡舉觴登降有節獻酬縱橫孟君既醉弗以德將落帽不知儀度失常衆賔騰笑請舉罰觴先王創禮敬為大綱賔主百拜終日無荒冠維首服服乃身章夏收殷冔典制攸詳是以尼父有正其衣冠之訓詩人有攝以威儀之方相鼠垂譏賔筵示防側辨屢舞是曰不臧郤犨敖享寧惠徴亡冀缺慎恭臼季登揚蘧瑗敬上過闕趨蹡褻衣無陳右稱敬薑鍾儀南冠操土弗忘管寧皂帽終嵗有常君今越禮甘酒僛狂請出童羖飲以兕觥放雀文趙時春僕有以生絲紡網承之以木籧􅀢加一􅀈螻於機端而反屬之於木上曲而覆諸獲其生雀余哀夫察往而迷來貪賄以喪生者將不止於雀也故釋之而慰之以辭曰充二儀之間荒者纎者翔者潛者蠕而動者沖而休者踝而植者最含隂陽之類奚什百巨萬於汝乎視汝而巨巨之至者能吐納宇宙韜羅萬象而不窮也視汝而細細之極者能破秋毫匿飛塵而莫覺也故以大形役小形無形役大形大智役小智無智役大智計汝處其中奚啻鳴沙之噓埃哉是其役汝者多矣而汝又將有所役計汝之所役者無幾而汝役役矣宜其及乎此也汝以其當役者役物而吾又以所當役者役汝不獨大小之相形有役吾者夫吾之心固為汝所役矣吾知悲汝以彈丸之飫而忘其軀不知吾又以羽毛之觀而忘其萬物之鏡也吾之可悲不大於汝乎昔者桀紂以其威力役天下而不知返也故湯武役之秦皇以其富強役天下而不知返也故楚漢役之齊湣楚槐以其國受役智伯范中行以其家受役是皆役之大者其餘有勢者役勢有財者役財乏則以其身役舉天下莫能免者是以胥亂於下而不奠其所也悲夫天下之相役久矣而孰與濟之而今釋汝非為汝德姑免於役而己汝其識之勿復相役以相斃祭蝦蟇石文于謙曰汝以頑然之石棄於道傍固無以異於凡物也故老相傳以謂昔人有欲取汝以為用者重不能致遂以為神且因其形狀之似而命以蝦蟇之名固不雅矣然物不自靈因人而靈自是遂能作雲雨以利一方出影響以受祭祀物有神以憑之能為禍福理或然也且舁舉必待於婦人感應必俟乎血食未免喜好淫褻邀求祭祀神之聰明正直者固如是乎况今天久不雨汝享人血食受人祈禱或雖近而不及遠或冥然而無所感徒有害於生命徒狎近於婦人是則為物之妖而非謂神矣今遣本境牧民官再遺汝一祭仍曉以此義享祀以後如甘雨施降逺近沾足則汝得以安居故處永享血食如一晝夜不雨將積薪以焚汝使汝之形滅體碎以絶妖妄吾言不虗汝宜聽受瘞古志石文鄒觀光去先塋數百武而近工人掘地得古甓焉縱橫尺有竒余拭而讀之則唐人墓志銘字尚未剝落可讀古色黯然其葬以大中元年十月癸亥其先世皆貴盛三世父子兄弟簮纓相望而獨葬者志者其姓名蝕不可辨其地則安鳳鄉其人志稱其聰明仁孝然文甚簡質不作近代諛墓語嗟乎葬者藏也骨肉歸於土無不壞也志以志之銘以名之庶幾陵谷變遷而名不朽而唐大中距今千有六百年羡門潛闥玉匣珠襦一切亡有是志落他人手供纍塊耳張籍詩千金立碑髙百尺終作他人柱下石今既不幸而見發又幸而遘豫而又不幸終不能舉其名世之人役役百年之內復規規百年之外敝精竭神以蘄不朽亦何益哉晏平仲所言焚之亦可沈之亦可其衮衣繡裳而納諸石椁亦可其衣薪而棄諸溝壑亦可達哉其言之矣雖然余既以耳而目之矣安知爾之神氣不傅抔土以存哉子命童子瘞之故處而仍以觴酒豆肉為文以告之曰千百年之前貴耶賤耶賢耶愚耶吾不爾知千百年之後存耶滅耶顯耶晦耶爾不自知又更後此而千百年爾銘無恙耶吾言存耶吾與爾皆不能知而向為爾也者惻怛悲哀而志之今為爾也者歔欷太息而瘞之是造化小兒之愚吾與爾而吾與爾又不知也悲夫明文海卷一百三十九
