body:
  text: 明文海巻一百四十餘姚黄宗羲編文二雜體轅騾文王文禄旃䝉恊洽之歳貞於孟陬之八日至止彭城登車攬轡見衆騾精神一騾憔悴問之執御曰駕轅之騾也其始也擇之精其既也養之厚其任也當其艱其價也重其貿月夕星霄雪晨風晝其勞勩也亦己乆矣予曰何不易其駕轅乎曰轅車之主也駕轅騾之主也易以他騾不敢服轅此騾蹄齧不肯棄轅寧待其斃而後已焉予以日暮止宿罔扣厥情明發駕轅而起程也升髙阜之壠力後足以躡撑下低側之坂先前足而縱横曲徑紆其軌直途正其膺水坎齊其偶河梁細其行輈衡壓其脊箱收頼其寧鐵輪奮擊其勢鸞鈴雜沓其聲亦甚疲而渙汗若太息而長鳴予實憐之同車者顧而笑曰子知轅騾之勞而不知夫人之勞亦有似於轅騾者乎且天地一車也參贊一轅也夫人一騾也是故惟渾惟元無車無轅騾曷從産駕安用旃逮及開闢知識火煎車乎既造轅乎既堅騾乎既壯致逺周旋迢迢古道蕩蕩平原荒荒野店落落井㕓南北之經數萬東西之緯㡬千欲頻年之徃返必是騾之駕轅子如憐之焉能負任於仔肩耶予曰否不然也轅必騾駕騾必駕轅特逸者可代而勞者可憐也客曰非駕騾之罪也騾之駕轅性也不棄於他騾者分也寧斃而後己者志也予曰騾亦有妬心乎亦欲出死力以盡心乎亦寧為其尊而不為其卑乎客曰騾之性猶人之性人之性即天之性天之性至靜也而生動以故天心好生生人咸抱用世之心若神禹之歴乘四載宣尼之環轍九州惟子之初生志在六合顧老之將至時無一休彼其駕轅之騾亦何足以為尤況兹引重致逺同乎乘馬服牛沂川生於是憮然曰予與子也三年一㑹春試千里方䇿梁輈毎沿途而跋涉恒去家而幽憂嘆騄駬駑駘之無别奈王良造父之未收志雖篤而莫展道不同而奚謀抱泛駕跅地之才豈懸金圖畫之求垂耳困鹽車而自慨俛首觸羈靮以増羞徒憑軾而大笑走飛塵以遐遊辰陽廢五顯靈官牌祭土地文萬士和維嘉靖庚申時當歳除於天時人事有除舊更新之象具官某謹以羊豕酒醴敢昭告於土地之神曰今天下百司庶府必有土地之祠盖以食土之毛治土之民官享和平人罔災害秋毫皆土神之力保祐隂隲於其間故后土社稷山川之祭莫非報土之徳然各有分限惟土之功愈分愈細故土之祭無大無小皆得對越世俗有五顯靈官者義不經見意者此舉之始亦起於報土之徳土之徳無乎不在故合四方中央之五位而求之其無不顯且靈也此於義取報本未嘗不善愚夫陋俗訛以傳訛不曰靈官則曰五通凡人家有一草一木之怪淫邪鬼祟之妖悉誣神之所司遂使聰眀正直之用為巫覡誑惑之資其䙝凟神明雖智者猶或承襲其弊職忝分守湖北初謁土祠見有五顯牌列正面土地牌列座隅不勝驚恐以謂后土社稷山川之祭其大而有爵土者得盡其誠百司庶府之祠其小而有職事者得致其敬人之報土亦己竭矣乃復借名五顯此非所以報神之大功而適以滋世之侮慢細民惑此不勝其愚守臣而然誰執其咎職不敢凟神明而大懼風俗之壊謹以此文用申䖍告乃徹舊牌一袪宿弊而專奉土祠亦所以奉神也其有淫邪鬼祟假神位號誑惑民間者神其速為發譴以保祐斯民神正其幽余正其明如書之所謂絶地天通㒺有降格則所以助成我皇眀之治神之功其又可報耶盥耳文凌翰婺女之野長山之隂有翁昻然投朝簮而甘心乎一壑也既遁甘盤之荒迺由伯夷之隘屏玩好以不娛與聲色而長謝榮名是辭寵利大戒爰有儔人肆言無忌低聲密謀髙談逞志口語津津垂涎竊視不貴勢之熏灼則文學之夤縁不婚媾之貨財則羣居之宴樂夫威福者張大之本名位者富貴之趨處之宜有道也今也悖入致貨染指怡怡寶藏溢室赭堊獻竒原田毎毎沃爾膏腴盖廬老佛之居而歸其業收兩爭之利而黨其偏豪吏由其役使弱子困於笞鞭禍既延於桑梓殀乃降於衣冠此汙吾耳之一也夫作於前者榮以利則承於後者步其風辭章啓寵之階庠序千名之府役之以耳目所親投之以家庭所欲求之既重舎之必輕所慕者名所捐者金有釁可入其市盈庭授者不以為慙受者不以為徳楊於衆不掩其非聞於上則云其實盖句讀未之有聞而冠衣偉然扇赫此汙吾耳之二也夫婚娶論財其道非古忘古逐今疇曰不可今也百金酬媒千金歸女勢如炙手爭趨競取傾家謀聘百拜百啟爾乃黄金鈒花補胸縁裔雲繒霧縠如擲如棄笄珥纍纍胡然天帝壻乃下邑之蒸庶婦則上國之太君矧后飾所未有亦王制所未聞是故男不及齓先問桃夭瓊筵是肆珠履孔昭工無遺巧賁其一室僮僕舉之則百其役此汙吾耳之三也夫矩彠正則大業修邉幅隳則惰行出爾乃終日靡靡所事杜康枯棊三百中夜未央歌兒舞女娥媌而靡曼者笑樂且狂苞苴之富帷薄之慙悖德慝禮乃徤爾談習於積毁以從欲恥於引咎而省愆盖嘉言不啓其齒而謔浪歡呼懸河霏雪而至者皆吉士之所不堪此汙吾耳之四也嗟哉乎此流俗之大頽也談經侶希營道無術諸相與謀匪甲則乙吾生初年如有楓山整潔峻厲槖無剩錢故激之以清而衆以清應堂又孔庭五七十人言不及利清議大行故聚之以寡而業以寡修禽獸肥腯修聘有規朱提是易以簡為師此吾耳目之所覩記而胡若是乎之貿貿也人之賢不肖自古而然故業之修墜情之招也鄉有高山峩峩在瞻倏平爾陵毁而成川夫天之生才囏矣使斯人羣而聚謔以從淫必不然矣閩嶺十年故鄉改色聞儔人言慨焉於邑瀫之下流百尺其淵滙為清波萬壑其源汲以盥吾耳而詈之曰耳哉耳哉爾胡然而聞是哉水哉水哉其能滌吾兹穢哉於是盥之而祝之曰富貴豈一家物哉哲士有覺毋即慆淫田廬瓦礫金玉灰塵爾忍聞此盍聞爾以詩書之聲清哉咨爾水又盥而又祝之曰君子不患不能進而患進之不以道以利而入以害而出雖然不出他年口實爾忍聞此盍聞爾以道德之積清哉咨爾水又盥而祝之曰夫婦人倫之大綱婚約未終先啓其隙反目以居舅姑鮮得男老以鰥女殀以溺豈惟秦俗寔隳匪僻爾忍聞此盍聞爾以禮教之碩清哉咨爾水又盥而又祝之曰業荒於嬉行毁於隨蠢然天地之一蠧所患乎飽食而逸居大耋之嗟日昃之離知乎不知爾忍聞此盍聞爾以無逸之書小宛之詩清哉咨爾水讓陸大夫文屠應峻天子熈寧海内晏然無非意之儆興禮飭樂綏和神人乃肇建七廟紹隆古之上儀垂範罔極復繕治諸宫室臺苑示後世無所加也惟時詔二三文武大臣經理諸務司空紀財百工恊叙於是武大臣侯勛論奏工曹主事瑞杖工官某死下詔獄雜治陸大夫幼淳時為繕部郎中上疏曰臣時雍言臣聞為人臣者毋曲言毋遂事宣和恊誠靖共厥位否則有刑所以杜不軌懲壅蔽也乃主事瑞素未與工官某接何得輒杖以死武定侯勛習怨瑞輒誣按且弗集諸經理臣擅署名進御所欺㒺誑上大不敬請逮治臣時雍病瞶不任事請罷謹昧死言詔下御史臺御史臺奏郎中時雍先事規禍宜併案乃謫陸大夫提舉廣東鹽司諸公卿以下覯大夫者率咄咄為大夫頌柱史應峻見讓之曰嗟乎陸大夫來若有罪吾數以責爾若聴毋怠夫有國家者厚府藏儲錢穀豈有他哉將以建事而快意也今天子創立鴻業鳩營駿功是故其用財宜若建瓴之下焉民趨之若涌泉之赴焉雷震響馳猋舉雲集而後不日之程可稽也廼大夫􅐅􅐅細亷底勤夙夜計徒經物出納辨等其視公府之積也若私資焉𤨏慮繁度而弗忍釋也衆庶懐怨豪强切齒下不以為恩而上不以為便是大夫輕重易揆罪一宫室迤邐輪宇炳奕金壁之光垂垂燭地聞者愉耳觀者逸目其幸就而見之以為神仙之宅帝天之庭莫不大喜崩角恱怡而歸而大夫稱首功乃獨俯而戚曰是國用之所鱗集民力之所輻輳也是大夫欣戚佚情罪二諸工肇殷大賚駢及上自徹矦公卿下逮攻工胥史無不䝉被渥澤命筵授几左持醴肴右擁金綺横視揚揚以為受恩逾量萬世無極而大夫中坐悒悒復呲呲曰臣等以奔走㣲勞引繩督墨因力就技歳廩大官日厪勞問終始一工而旬日䝉恩者以十數彼邉塞之士披堅秉鋭身暴露於野幸尺寸之功以希旦夕之賞文吏簿稽軍庸弗録賞之弗洽臣實恥之是大夫矯節以抗衆罪三臣子之於君父見其愛亦愛焉惡亦惡焉是故莅官者遇下則視遇等則議遇上則俯遇君之所幸則傴僂而走耳武定侯勛天子之所尊重海内所共知也其寵靈之所憑藉勲伐之所鎮撼將何有於大夫而大夫違君之愛渝士之分干國之紀以議宗臣捋虎鬚而侮之靡不及矣是大夫不量力而干上罪四夫人臣勤勞終其身冒一罪猶足以死而大夫叢諐積釁䝉誤恩遷海外竊以為大夫何幸也大夫往矣其急改行易操無蹈於初非無斤斤以鬻亷無􅛺􅛺以貿直曠惠以逮下戢節以媚上巽恭以悅衆浮沈以就俗則大夫之謫自是且進矣不然予未知大夫之所稅駕也於是陸大夫起曰謹謝子予行矣吾聞之嚆矢之絲不可以紉衣蓬纍之士不可以駕車人固各有志也予往矣子無嘵嘵以汚我遂登車不顧而去募刻大藏唱導文瞿汝稷世之誕佛者皆比於范縝之神滅者也而神滅非聖人所立教也夫神也者妙萬物而為言者也即心也即道也範圍天地曲成萬物聖人所以參贊化育者也是豈形之所及也惟聖人為能窮神而庸愚固未嘗亡特不知其即道耳故曰百姓日用而不知不知則一狥於形於是遺範圍天地之廣大而自狹棄曲成萬物之㣲妙而自穢終日役役不過耳目口腹聖人愍焉故諭之曰形而上者謂之道形而下者謂之器復慮人之自畫而高遠之謂非己所及也故曰終身由之而不知其道堯之所以堯窮此神也桀之所以桀昧此神也是神者溯之無始推之無終豈形生而始生形滅而隨滅哉形有盡而神無窮故曰原始反終故知死生之説精氣為物游魂為變是故知鬼神之情狀而縝之言曰形即神也神即形也形生而神生形滅而神滅藉如縝言操則存者形存歟舎則亡者形亡歟出入無時莫知其鄉百骸九竅六臟誰為然歟心不在焉視而不見夢説築巖豈目所矚處今而憶昔在吳而知越何形之能然縝亦不思甚矣履帝武敏而生棄杜伯闗弓伯有為厲墳典所載未易悉舉是皆迦文之所倡乎故縝之言形即神也形滅神滅非聖人所立教也君子之所棄也是使人重形而遺神淪胥以溺者也何以言之謂形即神則舎形無我舎形無我則凡形之所欲皆我之所欲而以禮義維之是强也是外鑠也神不滅而謂滅則堯桀均盡顔跖均生均生則縱佚者自適均盡則好修者徒勞於是示之以餘慶戒之以百殃則見以為茫昧而難徵也掲之以仁義則以為仁義攖人心掲之以性善則以為性惡則以為善惡混幾何其能信之於是聿皇得喪徽纆貪毒惡積而不可掩罪大而不可解沉淪昏衢莫能自出旋復流浪為苦無已如來智入三世圓應衆機五時説法海墨不可勝紀其流入震旦者纔海墨之一滴是為今一大藏其語報則徴之三世其語性則盡之妙覺知三世之報則堯桀不均盡知性覺之妙則性善無所疑故下焉者得其説如惕於三世之報惡不俟懲而革善不俟勸而行矣上焉者得其説則妙契性善之真居仁由義若耳聴目視何有攖吾心哉是以聖賢之教得如來而大暢惜哉縝之不講謂形滅神滅而誕佛也惟如來之教能窮此神之廣大㣲妙語其大則天地者無盡大海之一漚耳元㑹運世者無盡時刼之一瞬耳語其妙則無聲無臭此之空諦也精一執中此之尸波羅蜜也一言演為無量義竟古今而推之莫能竟也儒墨之是非黄老之秘密與百姓之雄辯一言蔽之而有餘也佐堯而堯佐舜而舜父以之而慈子以之而孝護世以之而護諸衆生帝釋以之而離愛梵天以之而勝慧二乗以之而迴向真乗菩薩以之而證入妙覺四聖六凡無根不被故其言必至於海墨也河沙妙徳㒺越窮神故其要必歸於一乘也世出世法莫不竭盡而無餘矣是以世之興王莫不尊尚三藏之備備於貞觀五宗之盛炳燿於開寶興國於時傅經之僧徃返西域至勑王公百辟送迎宿衲出世示寂宸蹕時臨焉而語唐宋之治莫盛於此時乃若三武宣和之䃣法則亦自䃣其祚理亂之階實有深繫故我太祖太宗彌極紹隆太祖既刻大藏於留都太宗復刻大藏於京師列聖纂緒底今無替至於列代名卿宿儒或行峻一世或文雄百代龍翰鳯雛之彦蘭薰雪白之賢歸命法流頥真靈筏者數之更僕未易終也考其人之操履事業皆彪炳史册故未嘗以嗜此而壊世間法也或者謂當如淫聲美色以逺之惟恐入於其中夫飽梁肉者必無求於粢糲服縞紵者必無取於裋褐以裋褐而棄縞紵以粢糲而棄粱肉雖愚者不為也使道徳之藴不出於六藝性命之微無過於諸儒則彼固皆含六藝之腴入諸儒之室何肻悦詖辭而釋㣲言就僻行而盭大道乎是棄縞紵而求裋褐之類也非人情矣嗟乎四大假合也百年旦暮也神之未窮茫茫安託適百里而不得其所託則皇皇焉浩刼之適何翅百里七趣紛遝所託靡定狃百年之得喪而輕浩刼之流浪可不謂大哀耶故濟我於一時者不及濟我於一世者也俾我一世得所安者不如使我浩刼得所安者也求濟我於浩刼者非如來之教而何姑未敢論受果登地苐能泛瀾覺海少溉餘潤則契根根塵塵靡不周徧法界不獨可以窮神亦可以窮形色之原矣於是纒盖不能縻隂陽不能控翛兮其翔泊兮其集得固如也喪亦如也未游焉者不獨喪之為喪既游焉者不獨得之為得念念滅盡而非斷古今不異而非常畢化沙界而壹無事黙然宴坐而萬行嚴往來生死未嘗生死出入淨穢初無淨穢豈將來而後證審於今而不誣是以究曠刼於刹那拔九類於半偈莫尚如來之教矣密藏幼于二上人以南北二藏皆梵䇿流通不易思刻方冊廣其流通拯溺之慈甚盛諸龍象敷美其事盡矣予特恐世之誕佛者或沮之遂書此以輔韋䭾氏之跋折羅杵云荆州天皇䕶國寺募接待檀文瞿汝稷唐初荆南有二寺一名天皇寺一名天王寺其住持二人皆名道悟居城西天王寺者嗣馬祖其法嗣為龍潭信信後為徳山鑒自徳山一棒如雲如雨至今鼎州香火之盛甲於天下而不知瓣香尚當屬之今西城天王寺也其居城東天皇寺者嗣石頭其法嗣為慧真文賁幽閒即今城東䕶國寺是也傳燈録不深考乃以天王天皇合為一寺二道悟合為一人而以龍潭徳山為天皇道悟之脈謬矣今城西天王寺乆矣不存而屹然獨峙惟天皇寺耳昔盛今衰可慨也哉袁子曰人知釋之福儒而不知儒之能庇釋也兹寺之在梁也張僧繇畫十哲於壁人頗疑之及魏人滅法毁教江南諸刹無得免者寺竟以先哲免難此儒能庇釋之明驗也今寺漸荒落法堂前草深一丈去天皇道悟時光景逺矣夫近時之士大夫皆誦法孔氏者也所望創僧廬市僧田以招致撥草瞻風諸龍象者亦惟誦法孔子諸賢是賴則儒之能庇釋也不信然哉若夫佛之庇儒與庇一切有情大恩難報鴻毛丘山予不復言之矣告除錢文通公生祠文羅虞臣公邑之大夫而先朝之重臣也某後生不能為公諱短乂説有司撤公祠毁公像某罪也雖然昔朱元晦移文除秦檜之祠君子以為義舉蓋痛奸臣之盜名而愍士論之理鬱也某著公佞行自效於為公忠臣之義然後請謝階下聴待公誅某嘗讀祭法有曰法施於民祠之以死勤事祠之以勞定國祠之能禦大災捍大患祠之先王之制所以繫民思也故未有無功而民思民不思而祠也是故古之祠定以民今之祠定以官古之民直今之民諛公於五者有一於是乎祠公者定於官乎抑定於民乎其民而諛者乎何者公在正統時為翰林檢討媚事閹者王振振敗公以善佞得免及景皇帝立廢皇太子為沂王而立已子公為東宫官嘿嘿未能正言從而慫惥之由是得留事愍太子後睿皇帝復辟首以易儲之怨欲罪公黨公雅為權臣石亨所喜遂得不治於是改公尚寶少卿亡何公以夤縁復轉侍讀學士是時大臣互植私黨以相傾公又附事高少保穀求薦入閣以茍邀一時之富貴後為陳廬陵循所阻遂銜之終身公又與閹者玉忱舒良相結納甚厚初景皇帝欲詔取兩翰林官教諸小閹黄賜等讀書王舒共謀引公先示公以意公不悟曰幸無見属王舒乃命内閣舉吕倪二侍講不逾月二侍講俱陞學士被賞賚甚饒公始大悔則語人曰業我得之乃為兩人所奪天順初公又用石亨薦為㑹試同考官公所取中進士許起石浚皆用事大臣子弟物議沸騰故京師謠曰錢溥春秋欠主張又曰閣老賢郎真慷慨總兵令姪獨軒昻榜上有名誰不羨至公堂作至私堂是謠今京師人猶能傳誦此則公之立朝大畧也公坐法謫吾邑吾少時猶及聞父老道公政指皆曰公天子近臣為諸司優禮是時民風尚厚獄訟簡鮮公以此取名吏治公故與韓巡撫雍善韓推轂於上公又倚用鄉豪通闗説鄉豪鼓煽於下轉相稱譽雨米之頌猛虎渡河之謠皆諸豪以獻諛公故公生祠建於在邑之日其祭田捨自一家之私此則公之政事大略也公好交逰雖擯處下邑歳輒通書賄京師故人由是被詔徴還復為學士尋陞南京吏部侍郎言官張海劾公謂今天變頻仍皆溥貪穢所致劾公繼續公不得已始乞休致公又私屬權閹汪直求璽書縣傳而歸於是詔晉公階吏部尚書致仕而勅書中多美語人謂皆直之力此則公之出處大略也公鄉所出紅雲布極縠曼而人未有知也公益市以賄遺諸權貴自是宫閹輩爭貴重之遂為織造歳例郡縣吏至京師持為餽信斂求日蹙民用益乏而莫不嗟怨公作俑公家又饒富大治田園第宅令其子為權利横於華亭華亭人語及公爭唾罵不休此則公之居鄉大略也公學術無所於見獨與安南王諸書為世士大夫傳誦今觀書中所論不過爭宴坐之位次著辭郤之微節非有闗於國家之大計而變消其簒奪之邪心此則公之文章大略也然則公之為人豈孔子所謂鄙夫非耶夫鄙夫以事君固位挾宫宦之助以蒞下行貪結上官之譽此古今奸臣之智也公未見任用獨賴先皇之眀而縣論尚有父老遂使上不能播惡於朝下不能盜名於邑此豈非國家之福而吾縣士大夫之利哉然而為公亦幸矣再告李朱二先生文黄道周壬午冬十一月周以解網得乞骸還山道出臨安欲再入大滌從諸友講論數日而先是夏五盤桓講舎己三十餘日䇿訪歸雲杖折墜崕髀為重創又從九江瘧作移疾過西林秋深氣涼血枯脈滯不復能臨眺如常時而朝命甦蘇敦趣就道業自京口拜疏兾得仁覆假之首丘溝壑餘年無朋友麗澤之求有墓木攀號之願向平損益業悟死生次公車帷奚殊朝夕而猶未謝嚶鳴逺呼邪許亦夏甫所以屏居申屠因之興嘆也人生㡬何安栖靡定叔子魂魄滯於龍山當陽名勲刋於峴首幸遺正則絶媵於蛟龍幷謝長沙遣臆於鵩鳥即當歸設特羊誓誠先隴還酬里鼓以報鄉人示膚髮之不傷告兆域之未絶若建炎之事李公再召於朝中紹熈餘年朱翁重趨於講席非衰德所敢祈亦遜謝所未逮也嗚呼知足不辱柱下所稱力少任鉅元夫致誡集鷙之林潰鳥逸棲輸載之轅蹇犢泣䇿毛羽之倫猶尚如此而況於人乎周筋骨疎脆既無忠定干櫓之能學業迂荒又少文公博約之致過江着脚八字不張剖臟見肝三言就服舉幡太學非必萬人掛劍馬前僅差信宿當堯舜之世倖免共驩值巢許之倫不堪臣僕使有陳東諸輩厲其血章元定諸賢畱其臯比雖欲旋吉建西徘徊劔水瀹茗丹竈之旁息魂黯淡之上豈可得乎張季鷹有言有虚名於海内者以求退固為難王輔嗣亦云躡剛明之後者雖當位而有咎以難退之名乗不當之位欲飾病顙以躋天閑雕夏蟇而祈霖雨不待識者知其不倫雖使蒙求揣其難任矣嗚呼以兩先生之才之徳而時遇差池業不上於説盤功不齊於伊吕況無兩先生之徳之才而夜行不休踰淵求涉固譙鼓所以鳴辜小狐之所竊笑也於時冰腹己堅隂晷且絀遙思松菊惄如調饑願想懸霤邈如河漢諸友之公車已動故山之丙舎仍荒何繇再親灑掃考此景鐘信宿山阿聞兹黙誨乎何羲兆送不肖至桐君山謹附數行告兩先生并不使桐老嚴陵訾吾濡滯也載龍渦剪石往寒河文譚元春崇禎五年十月鵠灣人譚子元春過襄之宜城縣門人輩擁高肩輿至漣泗洪尋石於所謂龍渦者得一石髙可五尺掘其根又得一尺烟雨既深歳月無聊空中多竅獨秀沙隈且巖壑四周竒非一面青白雜出色非一碧予所見太湖靈璧諸石竒勝猶將兄之也因思致之寒河人皆難之曰吾冝城人愛是石者多矣咸力致之而義不出山君何為獨能於是屈氏兩門人奮然出僮指千許為牽挽移上歸航舁石行十五里犯朔風越嶺度墟如趙景興之往歸嵇公也石重航不任乂具一舟載之予既飛書報襄太守唐公司理江公令尹李公將以是月晦日載至園居而予復貰酒脯楮香出漢津古河渡口先送之歸因為詞曰丈幸歸我與羣石别羣石不知安其頑劣我有林園萬竹百花丈姑先徃逺赴汝家家有雙鶴見丈必舞鳴於峰巒丈為鶴主我有萬巻與酒逢迎攜讀丈側丈為同盟丈往登㟁暫蹲門裡待我西歸位置遷徙靜察神思淵淵有在敢混草木以致嗔怪主人可依老當不俗寧似米顛袍笏相辱丈生渦中素有竒名爭輦致之丈終不行有大力人怒而致子十牛千夫汗憊欲死胡我來兹宛如舊識舁人騰踴有趾無力愧我精誠格不至此既謝山靈又托江水慎汝前途冬河欲涸庶幾歸來金置丘壑明文海巻一百四十
