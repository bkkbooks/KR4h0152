body:
  text: 明文海卷一百四十一餘姚黃宗羲編諸體文一疏引募建青門菴疏袁宏道凡山川要會處俗華好義則剎宇必多故今京都吳越精藍棊置夫衣紈繡而過者入村落則老稚聚而駭過下邑則士竊議至通都則常其習固也往余與諸巾冠者遊見圓頂而緇者則羣指曰楊墨既讀子史書旁及二氏笑曰此何與子輿氏舌而是時士競操觚業以諛時目故亦習子史及釋老之淺易者士之入伽藍者揖必至踝見僧乃不怒逮先伯修既以中祕里旋首倡性命之説函蓋儒釋時出其精語一二示人人人以為大道可學三聖人之大旨如出一家見行腳之稍能談者揖而坐上座事二氏先師有禮而所謂精藍禪室者遂亦數數修飾浸循有大國風沈生從余講業及熏聞貝典熟世為瓜渚里人渚中人士習為修雅將闢禪舍以客桑門余顔其楣曰青門志里也且以識下邑之文漸埒上國也夫不知有秋之穫者見人投種則怪曰奈何以可食之物棄之淤泥不知福田之道者亦然渚中人士業知之已慎無惜種語曰臨淵羡魚不若結網募造準提閣疏萬時華萬厯初敕改廬山黃龍庵為黃龍寺賜金佛像寺僧敬虛募閣以覆之時大中丞王公斗溟吏部余公映微先後倡而新之此上人之勤也今上人死矣廟旁有隙地數武其徒幻修復為豫言師在嘗用形家之説謀祀準提而閣於此今將踵而成焉豫曰形家之言若何曰章門之水由此達于湖放于江萬里之流百折以至堤其委浪蜿蟺紆徐而後去之此鍾美之説也豫曰此又子之勤也今子將以終中丞吏部之明德踵師之志福邦之人人之聞而赴之者必衆而疾矣何以言之夫聖王之制祭祀黜淫祠秩常典能禦大災捍大患者然後祀之此霈澤王所以蒸嘗於兹土也祀典嚴於王者學士之所講眀有司之所慎重閭閻萬户據有形勢以辨災祥此皆非浮屠者之所有事也子之師一則成之不倦一則志之而若有待於其後人若夫凖提佛母之號遍兹國土此誠浮屠者之所頂禮而事爾菩薩示方便法現大神咒經稱苾芻人等若有持誦讀此咒能滿九十萬遍所有資具種種具足若十萬遍得見聲聞緣覺菩薩諸佛夫福田利益雖非世尊如來密諦深微菩薩普度衆生功德𢎞深將在於是然則子持前説而告之邦之宰官居士樂於形勢之利者聞而赴之己十之五矣持後説而告之邦之老稚男女樂於福田利益者聞而赴之當十之九矣況豫日徘徊廟下見履舄之外蒼崖白浪宿鷺浮鷗明霞薄靄變化袵席倘閣成而滕王之棟歌舞西來隔岸江天鼓鐘在下此又騷人墨士所命侶嘯儔而不能去者吾知聞而赴之者之又廣而疾也嗟乎子之師能集浮屠之所不能事者以福邦人子能集浮屠之所必事者以終兩先生之明德踵師志而克成之吾知霈澤之靈抑亦有以相子矣明文海卷一百四十一
