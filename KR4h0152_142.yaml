body:
  text: 明文海卷一百四十二餘姚黃宗羲編諸體文二雜著啞娼志楊維禎啞娼者錢塘娼家女也生無啼聲三閲嵗不能言至十嵗終不言笑則谺喙露齗怒則嗌嗌云父母決其啞無疑因呼為木哥且唶曰豫門籍娼娼以音為伎今乃啞若是何待乎欲棄之其父曰女雖啞於口弗啞於耳目手足也年及笄天質秀麗中益警穎工針線能教以琶箏箜篌及七盤舞蹈之伎靡不精審貴富家諱所病而求其長輒與他名伎並進既笄貌益揚藝益工京師有大木賈過錢塘聞啞娼名求見即大喜倍凡價聘之左右曰娼以聲取恱啞而倍價以聘何過愚賈笑曰非若所知也婦類以長舌敗人之家內讒寢而後家可長豫聘無長舌不聘工歌且笑遂挾之歸京師賈侍姬百十人聞啞娼至皆掩口胡盧之未幾啞娼寵顓門賈一飲食非啞娼不甘且私賀曰吾今而後知婦言之不入吾耳啞娼亦心自語曰不聾啞不婀娜侈然自隆重宴享非尊右不居服飾非珠珍不御諸姬雖心忌又咸得其不能言皂白於主故又心幸之賈元婦既缺諸姬遂迎主意推啞婦為繼內數年為賈誕子者三長曰傳默次曰傳訥傳忍後傳默以隂重不泄得出入禁中且得美官啞娼受封號族至今推為婦師云抱遺子曰豫聞道家書有緑霞女以塵心墮世為啞啞娼者亦隂仙之質非歟然娼以啞病亦以啞遇誠使啞娼才色工之以語言文章則所遇未必爾借遇亦犯娼求其終榮者寡矣嗚呼士以語言文章遇主而訖以語言文章為身之讐孰愈啞娼耶龍墳志史明古成化二十一年冬十有一月望巡撫都御史廣東李公臨縣詣學宫謁先師孔子禮畢進諸生問曰昔大禹治水至震澤斬黑龍以祭天本朝永樂間此土大獲龍骨爾諸生有知之者乎可詳考其事以為告僉以諉豫豫乃為之志曰龍墳在今秀水縣伏禮鄉小律原北距太湖可有六七十里初有村氓耕田往往得龍骨而未識也永樂間有一漁者始識之因潛持出以售於蘇州南濠徐氏藥肆中嵗以為常一日徐問有龍角否其人曰有乃以一枝遺徐有朱永年過徐肆中見之驚問何所得曰適有人來售朱問其人去逺近曰未遠因急追及之蓋是時有左璫琥李黃子者方受命求采珍異朱以買辦户出入璫所欲以為竒貨也遂偕其人告於璫璫檄郡縣調夫船具畚鍤躬往掘之初入深見有狀如浮屠氏所謂金剛神者數輩初尚儼然及見風隨化盡惟餘骨爾遂得龍骨角齒牙凡數十艦獻於朝竊取者不與焉時方貴龍角帶自非諸王勳戚不能得一銙直十餘金及是價為之頓賤秀水在當時猶為嘉興宣德間分為秀水今其田可六十畝許不可糞治而收穫倍於他田嵗每大風雨則拔木發屋而禾稼反無損耕者猶時時得龍骨田中意當時己取盡不應有遺豈其地為龍窟所而潛蛻其中歟然台諭有大禹治水至震澤斬黑龍以祭天之文不知出於何書厯考吳越春秋吳郡志蘇州志無所經見不敢強為之説項脊軒志歸有光項脊軒舊南閣子也室僅方丈可容一人居百年老屋塵泥滲漉雨澤下注每移案顧視無可置者又北向不能得日日過午已昏余稍為修葺使不上漏前闢四忩垣牆周庭以當南日日影返照室始洞然又雜植蘭桂竹木於庭舊時欄楯亦遂增勝措書滿架偃仰嘯歌冥然兀坐萬籟有聲而庭階寂寂小鳥時來啄食人至不去三五之夜明月半牆桂影斑駁風移景動珊珊可愛然豫居於此多可喜亦多可悲先是庭中通南北為一逮諸父異㸑內外多置小門牆往往而是東犬西吠客踰庖而宴雞棲於廳庭中始為籬已為牆凡再變矣家有老嫗嘗居於此嫗先大母婢也乳二世先妣撫之甚厚室西連於中閨先妣嘗一至嫗每謂豫曰某所而母立於兹嫗又曰汝姊在吾懷呱呱而泣娘以指扣門扉曰兒寒乎欲食乎吾從板外相為應答語未畢余泣嫗亦泣余自束髮讀書軒中一日大母過余曰吾兒久不見若影何竟日默默在此大類女郎也比去以手闔門自語曰吾家讀書久不效兒之成則可待乎頃之持一象笏至曰此吾祖太常公宣德間執此以朝他日汝當用之瞻顧遺迹如在昨日令人長號不自禁軒東故常為厨人往從軒前過余扄牖而居久之能以足音辨人軒凡四遭火得不焚殆有神護者項脊生曰蜀清守丹穴利甲天下其後秦皇帝築女懷清臺劉玄德與曹操爭天下諸葛孔明起隴中方二人之昧昧於一隅也世何足以知之余區區處敗屋中方揚眉瞬目謂有竒景人知之者其謂與坎井之蛙何異余既為此志後五年吾妻來歸時至軒中從余問古事或憑几學書吾妻歸寧述諸小妹語曰聞姊家有閣子且何謂閣子也其後六年吾妻死室壞不修其後二年余久卧病無聊乃使人復葺南閣子其制稍異於前然自後余多在外不常居庭有枇杷樹吾妻死之年所手植也今已亭亭如蓋矣吳越行窩志薛章憲湖南之衡山在洞庭上其岡巒之軒翔聳拔者凡為峯七十二金陵之大江在鍾山下其川隩之停蓄演漾者凡為陂三十六皆古之竒觀蓋山與水交相贊者也故厯代侈之以誇於四方恆自恨生長遐僻動越數百千里徒心馳目想而已乃者揮手囂煩放情丘壑於吳越之區得勝處二焉在吳曰聚塢去城一舍而逺却負疊嶂前臨太湖與杭潁爭雄地産楊梅特佳形色味皆敻絶他所傾筐入市人望而知之爭售立盡輒得重資湖中有山計其數與衡等昔人謂七十二朵青芙蓉是以作草閣臨之馮崖架廣髙出木末可隱几而指數也因命七十二峯閣在越曰橫裏去城一舍而近衡六里有竒縱二十里有竒綿亘迤邐多陂澤渠塘平陸才十之二居氓植藕芡為生收其入反出禾麥上直亦再倍於平壤夏秋之交彌望皆織文繡段人人刺艇子出入其間扣舷鼓枻歌呼相答不自意為人間世也築室三楹茨以生草塈之塗泥命為三十六陂館陂則當不止是而云然志舊好也嵗之日居以課子姓出以事登陟大率略相半焉所謂七十二峯與三十六陂者則又平分之矣蘇長公嘗言山翁不出山溪翁長在溪不如野翁來往溪山間吾其得而兼之遂自稱浮休野人則自詫曰吾幸生太平之世身無病心無憂有菽粟以具饔飱有雞豚以供伏臘韋布陋矣聊以禦燠寒室廬隘矣聊以庇風雨行無所牽止無所尼任情率意委順逍遙貴歟賤歟壽歟夭歟付之造物者一不置肝膈間也各丐太僕李公先生題字揭之棟上以告來者使知盛世之民沐浴膏澤涵煦至化雖野人之愚亦能順時知命處困而亨鳥雲飛而魚川泳無不遂其生也衡門之木則咸署曰浮休野人家信有侈心如登龍斷者無以自解云翰墨林七更金實有序翰墨林者永嘉謝君廷循圖書之府也君以和粹謹飭被眷遇得美名於縉紳間籍甚性嗜清玩蓄之頗富嘗名其齋曰米家船少傳東里楊先生士竒易以今名而記之豫乃為作七更極其辨以進於道意劣辭庸視古之作者固未免有捧心之誚要之發乎情止乎禮義庶幾而不差者也覺非先生久客闤闠心厭喧囂惟忪堙鬱思若無聊安得絶境於焉逍遙滌濯煩襟以永今朝聞永嘉主人有翰墨之林曵杖彳亍若履空谷足音跫然主人出速不言心喻眄睞以目升自賔階少敘寒燠主人曰噫走也是林不資於地匪穹於岑無松之盛非柏之森駢羅圖書錯置瑟琴棐几萬籖上下古今文房百玩觸手可尋少安無躁願陳至音於是拂几正席焚沈爇蕙緩宫急羽髙卑以序巍巍洋洋無不如意長清短清猗蘭飛佩五曲九引纚纚可繼先生曰美矣哉太古之聲也然鍾期既亡伯牙絶響箏笛之耳未能得其惝恍毋勞爾為也主人曰唐虞至聖子不得與托物設教啓其聾瞽以局必方象地之則以道必正神明其德有白有黑曰隂與陽互陳錯舉雲漢其章防危補罅料敵審已負不可僨勝不可恃兩雄相值乃見勍敵龍蛇成陳虎豹堅壁雖曰小數有至理焉無所用心為之亦賢先生曰君子不操勝心毋作機事此孤山處士所以鄙之也願聞其他主人曰書契初成鳥迹茫昧科蚪再變乃有分隸斯邈之下鍾王軼出唐臨晉帖如蹈一律狂僧顛史草聖入神蘇黃米蔡各自絶倫真迹間存初刻咸在點畫便轉折旋向背明忩淨几目玩心醉誠一快也先生曰儒者於書固最近事然一好著亦能喪志吾未暇焉主人曰五色作繢肇自姚姒後世因之畫事由始晉唐以降好尚蜂起顧吳荆關董郭王李入神造妙區别品第耽嗜成癖千金莫以芳播清流貴動丹扆適情遊藝動合玄理宣和纂録寶鑑有史似不可少也先生曰君子寓意於物而不可留意於物此先賢所以恐其泥也敢請大之主人曰陶寫性靈妙在得句物情人境動合天趣模擬之精推敲之至晝或忘食宵恆失寐窮極彌工思苦愈異神驚鬼泣造物所忌我思古人髙不可企先生曰風雅遼濶正聲微茫競趨靡麗太朴日亡安得擊壤以反渾龎主人曰經緯天地轇轕後先用與政通體隨世遷秦漢雄深齊梁骩骳韓公倡唐衰敝特起歐蘇曾王鳴宋之盛及今賴之矩矱由正今之作者秀出如雲昭回河漢炳耀星辰鈞天合奏鸞鳯和鳴山輝玉蘊淵媚珠呈走將漱其芳潤咀其華英寤寐於兹林之下不知嵗月之虛盈也若是如何先生曰近之矣而猶未也文以載道匪惟辭工上師聖人吾將子從主人憮然曰命之矣聖人之言世謂之經囊括宇宙含煦生靈未暇細論略陳其名易備隂陽造化以明書言政事治功乃成感發懲創詩本性情無序不和禮樂由興春秋撥亂王法權衡學庸論孟規矩凖繩猶如菽粟布帛之征一息不繼民不得生浮文勝質奚利攸行走將膏吾車秣吾馬由伊洛以遡洙泗而履吾夫子之庭不知其不可也先生離席而立降階俯首請先羣經旁藝居後以翰墨林為道淵藪九攻孫七政有序嵗乙酉之九日自金陵抵家才三日即與君鎔浦子為婁東之行訪王長公午刻過克正許君家談少選苦以酒餉我恨莫留至舟雨甚白衣不來徒詠悠然見南山矣更許燭滅共被談詩寢不能寐去因為雌黃今古九辨攻詩君鎔快之強著此語命曰九攻以九辨且九日作也他日詠黃花籬下插茱萸登髙持杯時當思此落莫不忘雅淡即可共蟹螯侑酒大是樂事雖然詩之為道無論動天地感鬼神彬彬乎雅頌之音即閭巷歌謠莫非先王之澤之遺也僕於此道未窺一斑乃敢放言若斯蓋攻之云者將以攻己之攻而非攻人之攻雖名託輸梯而實意存墨守者也夫是以剩舉瑕疵謝言精髓其詞曰嘗謂人心不同有如其面詩道亦然自三百篇以來猶一息耳獨資神理何俟多言而昧者莫覺遂至多歧故或有不根風旨剩獵聲華者則徒取壯麗為工莫窮玄適為勝雖貫珠聨璧窮山淵於紙上而龍飛劔去韜星斗於毫端是謂炫詩聲實俱病而工逸兩妨者也或有安排聲偶敷陳事實情性絶無意調俱泯者則惟以形體為似不知了悟為先此尤詩道之膏肓庸醫之無疾而俞扁之驚去也世之作者皓首迷途間有悟者則年光已去少壯莫追生平盡非大痛難割是謂形詩禍詩尤篤知音可悟世諦難言其他則有機深狐白而實才慙豹變故惟借美於江篇獵工於沈句而玄珠未得神彩索然此與目擊而道存神來而暗合者不可同日而語是謂借詩又有雅詞古調非不燦然雜陳而以神韻本乏了不關情譬猶靚妝袨服雖同工於西子冶容逸態竟殊妍於捧心可炫瞽工難逃具眼是謂妝詩曰借曰妝津梁最淺亦有為疾最微可取效於呼吸宜資神於養道者厥有漏詩亦名羸作何謂漏詩神理俱來風骨兼駿徒以沈照少埋漏情於句字之間耳此則微之又微可取效於呼吸者也何謂羸詩流派本端思致尤苦祇以足劣神駒學虧半豹亦有才窮孔廟夢還錦江則遂乏丰茸鮮媚之度故攻之則無疾療之則無方特資神於養道而已矣又有神情亦來彩艷具足非不稱佳顧入門一别雅道遂乖則或亢而為肆或散而為野或似工而實巧或似駿而實佻或過竒而入於詭或騁博而陷於繁而若為澀為晦為瘦為寒諸家者不與焉蓋彼體也而局於才者也此才也而恣於體者也故曰非獨才之罪也體裁之莫究而愈工愈失者也毫釐之差千里之謬是謂縱詩任其一偏而莫知取正求之今日此道方興又有好名而寡識者不思魏文不朽之名言徒憐惠子五車之快意千年萬世決於倚馬片時插架盈囊盡是雕蟲餘蠧譽來庸目喪去良圖是謂騖詩好名而名日非者也不知東方與之問孰工一言與五車孰得詩有各體疾亦多方微之則哲匠寧免甚之則下里恥言凡兹八者未能盡詩盡詩疾矣又有非疾可喻流毒詞林則以本非此中強作解事盡乖雅道尚謂名家是謂業詩雖性靈之難染恐佳氣之易干深有愧於著作之林諒不興於哲王之世矣嗟夫僕也童嵗習詩窮年靡得格律未協聲病實多覩兹九疾敢綴一辭哉重陽後一日書讀絳州園池記戲為判徐渭絳記何由為人炙口昌黎偶爾夢鬼籠睛壯夫不為愧雕蟲小伎之逞文公所誚合書門大吉之諧正好試官軋茁刺刷枉誣盤誥詰曲聱牙靺鞨非真空青是假難逃賈蕃眼雙鷂子精明芒硝八兩大黃半斤且瀉夜義泥一馬桶齷齪辟如丹砂磊塊宜用畫鬼書符煮服必且殺人亦似假山巖強要興雲出雨細看總無活物束之髙閣毋乃大苛弄向孤琴庶幾别調判同賓戲傳之萟林擬蕩平妖賊露布鄭之玄天啓二年十月某日具官臣某等謹已糾集諸將尅復鄒縣蕩平妖賊者臣竊以詩書德澤本足銷萬世之妖氛戈戟攙槍亦或關上天之殺運以中國之民而叛中國斯罪不容誅用二東之力以畢二東斯田乃利熟魚不免於遊釜草無取於逆風恭惟皇帝陛下仁孝儀邦聰明亶后日昃無逸之沖主河清有道之聖人屬國家內寧之憂是祖宗維難之緒彼肅愼之矢已貢行清緑海之波縱藺西之焰猶狂終殄箐林之怪何圖內地之反側妄因多事而覬覦妖賊徐鴻儒者么麼匹夫窮竒異醜自紅羅女倡亂之後為白蓮教中興之圖夜聚曉散之蹤因緣而詭圖詭讖生天成佛之説浸假而為帝為王居然有混天掃地之名頓爾為改元署吏之舉蓋其徒已連於四五省而其謀且蓄於三十年豈徒富者捐金錢以厚其資抑且愚者致性命而為之死初發難於鄆巨繼披猖於嶧鄒滕剡之間率無堅壘豐沛之地盡屬震鄰白骨如山郵騎驚而裹足青磷作火墟落燼而無熒盤踞誰何荼毒不恤猶復災我夏鎮扼我河漕粲粲天儲橫果梟獍之腹煌煌龍衮攫被豺狼之軀舳艫之尾相銜幾欲空之以野火陵京之喉何地併欲塞之以丸泥在昔青齊洊當飢饉神祖念其殺妻食子之慘活之填溝卧壑之餘斯豈非其遺生顧卒甘於反噬豈及秋之刺宜爾曽久豢之犬不如臣等乃奉徼國靈恭致天討登壇以誓熊旗之將倚劍而鳩鶴膝之羣示以妖黨之無能戒以賊鋒之已大鸛鵝成陳共懷破竹之心蛇豕驚魂俄當壓卵之勢一蹙於二夏店再敗之紀王城大都轉戰一百餘馘斬六七萬遂使峯山之石無恙闕里之門不驚陛下猶以蠢兹潢池誰非赤子彼愚而被誘鷹眼何有於尚存倘窮而來歸梟音豈終於勿革申命招撫曲示生全而怒螳之臂已窮困獸之思猶鬭當其始也力攻兖城禍幾危於魯王之邸及其終也死據鄒邑毒尤慘於孟子之鄉結死士五千餘人殺願降三百餘衆惡更盈貫孽尤滔天臣等乃復鼓舞同仇激揚後勍築長圍以固其逸穴地道而墮其隍尅日進攻分地堵截衆皆晝號而請命賊乃夜縋而乞降臣謂負固而觸共工之山本王法不赦渠魁倘致轅門之下則諸從可生於是十八元凶一時生得三萬餘衆並就撫安宣陛下如雨之慈致朝廷凝霜之典蓋湯網開前禽之路禹鼎攝神姦之形者矣臣叨分節鉞屬守封疆綢繆不先銷弭無術令之肆九頭而張雄噬然後枯萬骨以成戰功夫獨何心安所逃罪顧捐縻者五閲月收復者數巖城境內徴丘羽書不騷於數省師中措餉天帑敢乞乎一錢道路廓清鴻鴈集而至止井廬蕩盡鼪􅀈靜而無嘷業獻俘於闕庭行傳首於邉徼使塞上之馬為之不嘶而溪洞之蠻因而折醜亦差足以紓神人之憤而鬯廟社之靈者也此皆上藉兩階仰憑一怒故使鬼神效順防風立解於專車草木皆兵蚩尤能稽於涿鹿橫草之功何有徒欲賡飲至之歌補牢之計未遲何敢無善後之策臣不勝踴躍惶仄之至謹奉露布以聞明文海卷一百四十二
