body:
  text: 明文海巻一百四十四餘姚黄宗羲編諸體文四優喻示兒姪耿定向余往遊京國于燕㑹中見優人之扮古王公大人為戲者其謦欬色笑揖讓周旋多儼然似之且其謳音清越優柔所以形寫古昔之悲歡慨慕以為忠節孝義狀者亦足興矣縁彼多出大方居都㑹之日乆其于朝貴薦紳習耳而目之者稔也比見吾里河口栁港之優亦甞被冠服飾鬚髯東塗西抹扮古王公大人狀也者乃其啟口舉止動露村俗令人厭觀而謳聲之叫噪囂喧既厲且麤殆若村婦詛雞者然余甚不欲耳之乃甿𨽻市兒環擁而聚觀者如堵嘖嘖賞欣焉葢荒陬僻邑局于所見然耳余因重大息焉惟輓近業舉為時義大都託為孔孟口語摸演為文字視優之扮古王公大人狀貌為戲以取世歡笑者何異耶顧前輩之為時義也類本據傳註紬繹儒先之奥論粹言抒而為文雖于孔孟精藴未必能發乃其緒言意指庶不甚悖繆而詞亦雅馴不刺人目擬之優殆亦京國大方之優與近里中後生視先儒傳註易通西銘正䝉諸書為腐陳而芻狗之逓相承傳一種陋習或戕賊史漢之文剽抉其單辭隻字以為古或漁獵貝葉之梵語以為新義不相䝉意不能解弗論也又或剿襲先正之語録綴拾俗士之俚談使用助字不辨疑决漫用哉字以為雄壯者可訝矣試與論之彼為詩者效唐音而引用宋事擬古選而㕘和律什斯為無當齊居而楚語蜀産而吳音自難相通陳君前臨民上而恣為方言可乎不可今以遷固之口頰代為孔孟出話人品殊調神情自是不倫以西竺侏􅍣宣語孟之彞訓非重譯其何能解且非聖之書制禁孔嚴向人談話與臨文修詞原自不侔漫然無别何舛哉余取譬之河口栁港優葢悲其見趣之不廣也然往往如此見售者不少是則幸遇山林之甿隷下邑之市兒也彼其見趣亦可知也嗟嗟人材之盛衰世道之隆汙實係之此識者能無于邑乎哉昔昌黎起八代之衰廬陵滌六朝之陋葢寜受人非唾而不屑徼時好矣振古豪傑士故如此噫嘻孔孟亦人耳吾黨遭逢明盛服習功令誦法孔孟矣第令能言其言以取世資而不能實明其學心其心非夫也乃隨世妍􅑦以為趨尚是則矮人觀塲隨人悲笑者豈不重可恥哉而曹省諸喻詖耿定向經初機乍解侈譚要𦕈里中宋人之矜穫麥也躬行醇徳言述孔教方叔子之籍承世業也不省微言斥為異教西吳母之詫青衿也誦法孔孟晚羨禪宗東吳生逰而猖狂也離形歸寂漫曰上乗朱堪輿之卜宅兆也顓䝉未啟自負得悟王學究之談地理也身墮欲境浮慕𤣥㫖萬庠士之手披傳習録也色厲内荏抗顔師人某之見易于季子也經傳里中宋人者微而驟饒方叔子則富厚累世矣宋人一嵗穫麥數十斛偶侍叔子飲叔子曰聞子夏穫多然乎宋人蹶起揚揚曰得天幸甚時倉廂頗盈也叔子為一筦爾傳一方叔子家田半邑陌嵗穫視宋人不啻幾倍蓰乃叔子故席承世業按籍而收享之其播種收穫之辛叔子未之知也傳二西吳族世豐於財不事詩書其母有弟補博士弟子員衣青衿來謁母大詫曰而何服此異服哉嗟而貧縑不足於藍故綴以青歟奈何不凂吾取足耶葢不識青衿為時制服也傳三東吳氏名家也國初膴仕雲仍簮纓世濟其後凌替衣冠乏絶者屢世頃督學使者推念名世之孕假生以衿佩令奉祠祀生一旦倘然得衿佩喜溢而癲服其衿佩徧謁諸神祠閭閈姻隣望望然家到而户造焉里人僉為姗笑識者為嗟嘆云傳四堪輿朱者卜兆執泥天星山川之形勢勿論也自卜一兆塟其親謂於天星叶吉後當興盛既葬而妻殞子殤或説之朱曰是故然據圖䜟此兆先凶後吉拚亡七命乃發也朱不思身并所屬僅僅六人耳兆後即吉庇廕者疇其當之朱氏今竟殱云傳五學究王子博雅篤行人也甞自恨生平博學俱無所入惟是形家言賴天所啟而大得悟云其實未窺一斑也進士周元孚旁通此家言蓋加王君數等者夙甚自負聞王子言􅋏然自失曰吾往謂于此有悟矣今王君亦云有悟乃若此若吾之悟亦如王君之悟不大悞耶傳六庠士萬姓者往樂與同志逰甞受陽明傳習録沾沾誦不輟一日往下里督取子母錢課筭之暇猶時時手披誦焉同志相嘲謂清中濁云傳七季子自㓜失明而性挑達先中憲令就傅傅初以威嚴臨之季子敬憚而肅然雅飭坐立如禮傅内故多慾倐有逺方人至服貴陽襪者傅見而垂涎之攘臂爭取焉季子忽大噱曰嘻師乎師乎如是人爾後即數施夏楚勿率也傳八盲喻耿定向昔有孺子自襁褓盲者隨人嬉曝于春園中聞人言天有日亟歸問諸父兄曰日何形其父兄曰圓也又問曰圓何似父兄無以應第取鏡示之孺子執而旋揣焉乃解復問曰日何色父兄謂之曰赤也又問曰赤何似父兄無以應孺子顧問不已其父兄展轉念慮百計求所以譬曉之而不得也孺子竟惘然夫余學夙主修行云云者猶辨日之形也雖心無所見而古先聖哲遺有成規猶得模擬而冥行爾矣若所謂道猶辨日之色也斯心之盲也乆矣即有道者披裂腸腹多方曉告顧安能頓開錮迷而令即覩天日也余自束髪與朋友矢志以盡倫修行為學既壯逰四方聞先生長者言學貴聞道始爽然自失矣乃作盲喻以自省云浦喻陸深陸子生於海瀕而家於黄浦之上浦故松江别流江湮而浦代志曰楚時春申君黄歇所鑿因姓其氏壯逰四方適吳覩五湖具區北渡大江逾于河達于吕梁然後知水之為理也海水際天浦水朝潮夕汐盈縮吞吐滙為汀洲帶以百里湖水汪洋渟泓萬頃一色漫流四溢而不見其涘也江水夾以連山源逺流盛蛟龍黿鼉變恠百出而獨力東注河與江埒而源益逺流益盛濁悍若怒吕梁水搏山而行崖石鎖囓濺沬崩湱鍧蕩出聲是故海至大也湖至澄也江至深也河至長也吕梁至竒也彼曰浦者大不能海澄不能湖深不能江長不能河竒不能吕梁奚取焉雖然被之以長風則驚濤雲奔亦似海天開浪恬其出無窮又似湖獨流勇赴似江與河至於潮頭秋壯排空倒嶽雖吕梁或不能及嗚呼水之觀盡於是矣余性好水常慕逺者大者竒者深且長者及東出海自北而歸復返浦上之舊廬歎曰天下有本同而末異者兹物是也又聞龍門砥柱瞿塘灔澦洞庭皆極天下之偉觀皆未及到今而後知到焉亦一覽而已也是故忽於近者非知逺者也易於小者非圖大者也作浦喻蜂蝶喻客潘塤世有為炎凉之説者予竊怪之聞之古或書門謝客或作詩問客或有白髪公道之譏或有春風不世情之誚何其淺也昔田甞之客喻以市肆矣曰事固然也亷頗之客曉以市道矣曰勢使然也而人猶不悟何曰二客亦淺之乎其為言也請以蜂蝶喻時當春夏逰蜂舞蝶管領百花慕色香而趨赴視開落為聚散葢時之所驅氣之所使情之所動性之所為天也而非我也乃若桃杏既敗嗔其赴牡丹之家酴䕷菡蓞已當令矣而芍藥委地猶數其叛揆之於理殊為不近人情又若當此花時孤松挺秀脩篁標節佳則佳矣然而無香可餐有色可辟政不免取百花之笑而乃敢反唇於蜂蝶乎至若秋菊冬梅色香殊絶逺紛華甘寂寞蜂蝶不知也如或知爾則又霜嵓雪嶺清氣逼人恐亦不能近此陶元亮所以慕素心之人而林逋獨棲遲于孤山下也然則君子將與百花爭榮乎將於松竹比迹乎抑將含貞抱璞與梅蘜共嵗寒為三友乎是故知蜂蝶則知天道矣知天道則知自處矣惡用是紛紛為也永慶宫偶書凈業堂壁何遷庚戌三月吉陽子逰於永慶之宫有墩隆然在宫之右吉陽子顧而樂之僧曰此謝公墩也吉陽子曰彼臨川公所謂不應謝姓者其殆斯墩也乎哉方公之有意乎斯墩也而為此詩特一嘲謔之豪談耳然以其玩情之深徘徊焉與山川風物相引發而不可去故其攬而有之也若有繫恡往來相為無窮之意至不能禁而發之詩雖使數百載後好事者得以忿奪之嫌窺其中而不以為䘏若曰斯吾貪而非欲也豈以造物者本無盡藏而其所攬而有也非其有主者耶今也山川風物乃予又將有取焉以托予翛然一日之適然則公所欲攬而有以之必為王而不為謝者烏在其無盡藏而用之不可竭也已而僧請次其詩且曰公樂矣請以是紀之吉陽子乃嘆而作曰噫嘻余何以詩為哉夫以臨川公之賢既不能攬而有之於爾我名稱之際而予乃復欲取而托之於詩歌紀載之餘汝且謂無盡藏者果可以耳目遇而得也乎夫天地之化無聲無色茍與之翛然而適則雖吾耳目之常吾且不知其為吾而何有於斯墩也汝休矣且予不能詩矣予既覆於僧乃取公詩戯易一字授之僧使誦之我名公字偶相同我屋公墩在眼中公去我來墩屬我不妨墩姓尚隨公誦已揭之凈業堂中三歎而後去庭語何遷禮云孝子有深愛者必有逺慕至哉慕之不可已也而五十而慕者惟舜葢難之矣無他人之情有所移則有㤀也㤀則奚慕由五十而上至於期頥愈逺則愈㤀乃有誦劬勞之詩生日不能為樂者此其情之至有感焉于心而不可已者哉擴而充之人可舜矣于是知孟氏之稱堯舜不我欺也夫子言父母之年不可不知其喜也盖其懼也此與人子言者也夫既有懼心矣而暇為樂乎子養志者也親之志于樂也而盡客之觴其顔有酡子順焉以娛其親喜可知也禮之所許也親有劬勞之感而子不知懼乃務競其紛華以觀美於俗閭巷之曲謹者稱之曰禮是以其親市也孟子曰聲聞過情君子恥之君子所恥莫甚於今之夀文矣巵言滿壁蔓而無當亦奚以為而且曰是足以榮吾親匪誣則惑也憶昔西越龍溪子以新建之學鳴者也余新安人篤信其鄉者也乃龍谿子不余鄙余自浙歸杜扉西郊而龍谿子儼然扣焉余驚焉曰先生年高矣奚為逺逰乃幸見臨龍谿子曰初度之辰無如長者轍何俗云避生非狥俗也以避客也當是時龍谿子為客余主人也主人知敬客而已而心竊疑曰大耋之年客可謝也何客也而避之千里越二十年余乃如其年矣聞宗黨好我者相與議曰七十古稀鮮不稱夀公在鄖陽道阻且長越境而慶公則有命今又十年林泉之逰物外之懽公必不拒矣余心念之無論劬勞之感不可已也即賓至且有頌有祝其辭洋洋余惡敢當惡能黙揖而升者三讓而坐者再周旋有儀廼可觀也余瞠乎後惡能偕夫儼然冕衣裳而臨我者非所事則所友也一出一入入有迎出有送繹如也雖勿亟拜身惡能不􅉵于時日南至北户墐矣柯葉知風瓶水知寒而余以衰白當之惡可云智于是知龍谿子之避非過也余不能如龍谿子之逺也南山之南北山之北藜杖所之惡從跡我乃命兒輩謹應門焉毋役而翁矣昔茅氏以牲奉親而蔬對客有道者稱賢焉此貧士之禮也余從大夫後乆矣過我者惡敢慢上客在堂所以奉客者如所以奉我者再倍之乃及真率之約如約而止母或踰也使我不信于我友也僕痡馬瘏青芻白飯必勤察之毋使有飢色于吾廡間東郭氏所謂貽口實于吾邑里也不可以不戒里之俗慶有日日之旬者再賓且稀矣青陽近矣二三君子從我者且有意乎蔣氏之徑杜子之航山之曲江之汜一觴一詠幘可岸几可隱也何主何賓可醉可醒此余之得意時也嚮者之避非避客也避喧也兒輩其往敬謝庶無予讁哉責志懴蔣徳璟萬厯四十三年月日某某謹以清酒名香獻懴心神之前璟少也知學科第而已不知有聖賢之學也即知之以為聖賢去人自邇不待學而反以學者為偽嗟乎乆矣其身之不肖也禀弱性浮易誘難專讀蘇子見其天韻生動因欲學蘇子讀韓子又欲學韓子以為氣勁而節峻雄竒獨出誠能至于是焉亦足矣及再讀陽明子而始知我性命之所在也聖人之可學也愆累之多悲恨之至而求一出脱之也嗟乎余之志不亦雜乎余之學不亦晚乎陽明子往矣學無明師其誰相予予竟得為聖人乎陽明子初以立志教繼以立誠教最後以致良知為教夫待陽明子而興者凡民也而遂不興者愚不肖也陽明子之言具在非明師乎過時之學非人一己百未之敢望而猶作輟焉可不大哀乎猶恐見其言而慕不見而㤀靜追而憤且訟也交事接人而其宿業鈍根不呼復出故剖盡腸胃以誓於明神之前而使之不敢自欺且以欺神其辭曰道晦學誤人放其心有言性命目為腐憨及至阿鼻既慄且慙始知賢聖立教淑人亦以自淑證位高真余幼癖顛恃才妄作狂躁狷刻剛直自若師友不非多疢寡藥業障萬端以罪為樂氣退心慈愁悔激怍拔根不猛沈迷如昨推鞫釁芽由志墮落所以良知明滅相搏既雜復惰心徒焚灼禀告神明自今以始盡洗瘡瘢祼浴慧水醫狂以謙梏躁以止逐狷以寛囚刻以恥功行黙施勿干福祉父有詔言長在心耳徳逺龍山皆有哲子勿負所學二子是似責重愧深非鳯則豕何以希聖俾親見喜百拜明神隂牖其勇日進一日志力精聳湔除蟊賊助成根種天觀地察心誠誓重有負神期伏聽誅恐明文海巻一百四十四
