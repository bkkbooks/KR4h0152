body:
  text: 明文海巻一百四十五餘姚黄宗羲編諸體文五齊大夫之諼王𦙍東齊有大夫擯退而耕于野者數年矣一日謀仕進賄王之左右使譽之於王左右曰今王議伐楚吾將言子太公閑於六韜風后握奇經及天時地利取威定霸出奇制勝之書欲使子為將以伐楚何如大夫曰諾於是齊王信之遣使者賜大夫環大夫懼伐楚之難也入朝王乃言牛山之事曰牛山齊之鎮也此牛羊斤斧相尋材木盡矣臣聞居之一嵗樹之以榖十嵗樹之以木為故國必有喬木而牛羊濯濯若是臣竊恥之臣葢少而好植種之術臣願使臣為司藝之官為王圖而後伐楚何如於是舉為司藝之官俾成牛山之喬木同列竊議之曰大夫以伐楚進乃首陳種木之説且喬木必百年成也何其圖所難耶何大夫之愚也北谷老人聞而笑曰夫喬木難矣猶無患於伐楚牛山之木未成而伐楚之役息矣彼徒以種木博司藝之官耳木之成弗成何計也且子謂大夫愚耶彼直以喬木避伐楚也甚矣大夫之諼也嗚呼使桓公管仲而尚在大夫之諼何行乎然世猶有以人命為喬木以自便其圖者齊大夫猶善諼哉觀真顧彦夫有趙生者善冩真以予知彼之善於真也冩予貌以贈予初不知其為予也問曰斯貌也陋甚矣吾未知其為誰也生笑而不言復取他人之真以示予曰此某也此某也生曰他人之貌則識之已之貌則不識子之目亦難乎其為目矣予因取鑑以鑑且與斯真比焉眉目予也面色予也精神體態亦予也然後知已之不明而為生謝焉繼而嘆曰古之君子每以知人為難以予觀之亦知己之難乎故曹操自以為文王殷浩自以為張良入闗十六子自以為伊周管葛卒無所忌憚為天下後世笑彼或大言以欺人其心未必誠然也今之人平居議論某也賢某也不肖不啻若辨蒼素至於已則皆若予之觀真也予懼焉遂書此以自警又以表予之不明也字約楊循吉古者男子之生名而已矣夏殷之時雖王公大人亦以名稱於天下迨周文蕃始制字與諡字以尊其生諡以尊其死也當朋友相謂則以字君則名父母則名師則名其長者則名不名者則必稱字凡名之者則以臣僕子弟弟子待之也下之非臣僕子弟弟子上之非君父母師長者生於其間適等齒肩而輩儕然後有字行焉然則字之稱也亦不卑矣天下之卑者莫若臣僕子弟弟子然也臣僕子弟弟子之呼於其上者名也與我等者不待吾以臣僕子弟弟子之禮則已足矣而更何求焉為人兄則人呼以兄矣為人師則人呼以師矣為人長則人呼以長矣不為兄與師長者而又責人無待以臣僕子弟弟子之禮則將奚呼然則舍字無呼焉字者葢同輩之所為相尊者也非泛泛焉直加名一等而已也自漢以來士大夫皆稱字猶近古至近代始不敢稱字不敢稱於前輩長者猶有説也加之四五年不敢呼其字少之四五年亦不敢呼其字與之同年者亦兩皆不呼字字遂廢矣少者呼於長者曰尊兄長者答之亦曰尊兄或相呼曰先生不知先生尊兄之不可以漫呼也夫非所呼而呼之豈非有意於尊之歟夫尊之是則受者安尊之非則受者不安舉不安之稱而加諸非可受之人此謂尊之者如此耶是之謂以無禮待人以無禮待人者君子不受也故君子之欲尊其人則莫若揆諸禮而已矣禮有可尊有可卑有可以相敵者惟視禮而行之其人尊待以卑則怨其人卑待以尊則䙝其人相敵雜待以尊卑之禮不為謟則為傲故君子不敢取怨冒䙝而為謟與傲也吾今為此約願吾之友自相稱字留尊兄先生以稱長者勿以稱吾輩有不然者請勿罪庶幾乎其近禮也哉人耕趙統稼穡艱難非惟士大夫不知雖鄙夫婦亦不自知周公豳風盖亦知其大概矣成王何足以知之知之何益雖后稷亦不盡知也老農主耕耕必以牛想當時亦必或有驢耕馬耕後世乃有駝耕駝韵書犎也邊畜也史無名傳今邊地始多有之驢古傳無文不知何自後又有划車耕機也後又有人耕其法用三人一杠杠中依於犁一人柄後一人掲前又一人别繩牽牛轅大抵窮而通牛之變平生讀書所未見聞不知他小説前人詩文集有及之者乎故特别為人耕詩以見鄙夫婦之不自知其不牛也子柄而母拽婦牽而翁把以相尋於一耒耜之上而吏隸守令之因其愚也者而日尋鞭朴以使若肩穿胸胝臀背指踝之創折日夜流血也以營一日之富貴以日巧行旁刺以過掩其終身之功名人人得而知之夫士大夫固亦人子也市井草莽不外四民故獨望於士人焉君門萬里咫尺耳易達也貴人不言驅賤丈夫而入鬼門噫蠱矣夫後人或有見此人耕之説者幸勿誚我之鄙夫不識大體嗟乎天下之大體根於小節擊壤亭請記狀吳廷翰席老師者本陶唐擊壤野人堯尊而為老師也史逸其姓今襄陵之東名席村距縣二十五里相傳為所居地而云其姓席則不可考但擊壤而歌云云實其處也夫帝道廣大莫可名言觀老師所詠雖孔孟賛堯無以加心㳺帝宇胸次無涯粹含天真神與道脗宜堯聞而亟尊禮之而不知其出于田野之口也夫以田野數言而能盡上古聖人神化之妙則亦聖人之儔也某甞齋心寤寐莫覩其盛而思一見其遺跡乃訪而得舊祠則已蕪沒僅存斷礎然亦為風雨剥蝕漫不可辨而詢其里人則尚有垂白數人稱為遺孫雖其世代邈不可遡而其事則賴以存故因祠而拓之以明厥里然風聲所樹匪名弗彰故又特搆一亭名為擊壤使後世知先民之事並立石以紀星嵗耳若夫逺詣皇世以探邃古之秘上窺帝徳以燭神化之情非有大人立言不可敢請執事一抽𤣥思爰述至文載之斯亭與歌不朽則老師之心尚有可想而堯徳之盛益不可名矣斯民幸甚斯世幸甚市愚王格有稱無懷氏之世業愚而盡其術者號于市而求售焉王子聞之使弟子騃生往觀之且召焉其人與俱來攜其黨蚩蚩丈人以從俾與平價王子睨其貌樸然悃愊信類有得者與之言喑焉俱無酬其交易高下之目亦不得而覘也竊恠焉然心貪其名弗能捨已則悉其家之貨錢布米鹽之屬程以無權之衡概以既剖之斗撡籌而起進愚者而與之從事焉其人喜發橐倒囊出所有畢陳於王子之前輪輪囷囷態别狀分王子雖素號知愚駭弗能名也姑録其淺淺者則有若抱甕而灌若折腰而遁若負石而沉若集木而槁若避盥而移犢若疾響而捐瓢若伐檀于河干若洩尾於塗中若奮鍤于大行之巔若委羽於滄海之津例是以往皆世之所謂顓䝉寡䇿而一切機變之巧無以溷乎其中王子啞然以為竒貨也唯恐失之而其人又能亷取予齊贏絀其與王子互一聽蚩蚩丈人所議略計直而已殊不似市井日中者之為既罷王子將巻而懷之矣而王子有戅子數人倉皇從舍中出若驚若怒競前而譁曰大人誤矣夫凡所謂市易者為其有補於不足也今斯人之物皆䝉輩之所素諳與愚谷之所素蓄而又有出乎下者大人不愛重貲以取之于大人之身無所加益直贅焉耳其弗亦甚左歟王子曰嘻汝來夫余以不知稱於世而其欿然未至也方集衆長以成其能則凡有意於我者雖什得一焉猶將不吝千金以購之况班班若是邪而汝顧為之角其有無評其良否拒人于千里之外而無以入乎至徳之閫不足為愚者子矣叱使速去寶其技而日與之周旋于是王子之愚益進明文海巻一百四十五
