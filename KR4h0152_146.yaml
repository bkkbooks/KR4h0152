body:
  text: 明文海巻一百四十六餘姚黄宗羲編諸體文六五死篇闕名人有五死唯是程嬰公孫杵臼之死紀信欒布之死聶政之死屈平之死乃為天下第一等好死其次臨陣而死其次不屈而死臨陣而死勇也未免有不量敵之進同乎季路不屈而死義也未免有制于人之恨同乎睢陽雖曰次之其實亦皆烈丈夫之死也非凡流也又其次則為盡忠被䜛而死如楚之伍子胥漢之鼂錯是也是為不知其君其名曰不智又其次則為功成名遂而死如秦之商君楚之吳起越之大夫種是矣是為不知止足其名亦曰不智雖又次于前兩者然既忠于君矣雖死有榮也既成天下之大功矣立萬世之榮名矣雖死何傷乎故智者欲審處死不可不選擇于五者之間也縱有優劣均為善死若夫病卧床榻之間徘徊妻孥之側滔滔者天下皆是也此庸夫俗子之所習慣非死所矣豈丈夫之所甘死乎雖然猶勝于臨終扶病歌詩杖䇿辭别自以謂不怖死無顧戀者葢在世俗觀之未免誇之為美談呼之為考終然其好名説謊反不如庸夫俗子之為順受其正自然而死也等死於牖下耳何以見其節又何以見其烈而徒務此虚聲為耶丈夫之生原非無故而生則其死也又豈容無故而死乎其生也有由則其死也必有所為未有岑岑寂寂卧病床褥間扶柩推輦埋于北邙之下然後為得所死矣蒼梧殯虞㑹稽尸夏聖帝明王亦必由之何况人士歟第予老矣欲如以前五者又不可得矣夫如此而死既已不可得如彼而死又非英雄漢子之所為然則將何以死乎計惟有做些小買賣耳大買賣如公孫杵臼聶政者既不見買主來到則豈可徒死而死于床褥之間乎且吾已離鄉井捐童僕直來求買主於此耳夫此間既無知己無知己又何死也大買賣我知其做不成也英雄漢子無所洩怒既無知己可死吾將死於不知己者以洩怒也謹書此以告諸貌稱相知者提琴潘景升雲間馮大行使周府王餽樂器一具攜以歸詫客未見中有二絃而龍其角絲自口中出魚皮腹木背榦則花梨而象飾之麗以弓而鬃其絃若為之挾者衆眯其名馮笑曰此名提琴顧無能撡耳因延楊仲修賞焉仲修者婁之審音者也抑按沉思手弓若有㑹然苦其音弗亮也曰吾將亮之足令入細矣於是易龍角以檀為之軫易魚腹以桐榦以篠而直其絃絃半緡顧無為之背案有飲瓢椰也合之中式製遂成而試操之音中宫商乃律以小令度曲其聲鏘鏘璆璆若戛金玉仲修喜曰亮矣吾循其細聽微而弗熒指㨗而弗滯理于棼而弗紊也持以協管管調以引簫簫昵以和肉則融融然邀魏梁甫之徒相與合奏於洞庭之波風泠泠生縹緲而雲冉冉繞四飛之間一郡之人皆醉三月而不能醒也洞庭君聞之而嘆曰是音也非人間之所習聞盍以饗帝而樂神乎新安之上𤣥帝棲真之所而軒轅氏之所乗㳺也盍往質之既至浹旬而咸池之樂始備西震於靈巖披及鸞生生􅀈然長嘯莫知其解斯為帝之縣解與三絃潘景升周樂器設播鼗職業所及制用絲結為繩如貫珠垂雙耳搖之還擊其面以成音協於鼉鼓之莭自周失職武入於漢至秦末改此器引絲而長之以為絃加一以象川義棅出其上如繭之吐絲去鼗革代以蛇腹象仰盂承概名曰絃鞉絃取諸乾軫取諸坤紀之三以行宫音之主也至漢世邊部習之廣其月體增一絃以象四時則絃鞉之窕以咸用和而嘉成揚子雲之著太𤣥因之琵琶是已今之稱三絃者左曰老中曰中右曰子合易卦隂陽三索得長中少之次其性柔用宜剛其調緩用宜張在泉石之間則清流雲霞之際則煜參艷冶之場則畼近市居者濁處暗室者窒溷湫隘者鄙失其撡矣故珮瑱浣女去軫而能調清溪幽居三弄而成曲廣陵之伎委調於流波惠明之靈宛轉而垂露哀絲悲韵在指繁而不亂撥滑而不滯斷而復續抑而忽昻驟而若止伏而若浮高臺欲傾曲池漸平就體而心憐孤嘯而響合雙璅風韶惟清逺可尚一絃獨奏况金玉其相此千古之直音一代之勁莭也若乃吳俗和緩其音靡慢其人柔脆其徳沉酣和緩以振之易以豪靡漫以激之易以襄柔脆以越之易以靭沈酣以湛之易以揚此奏曲之微以之移情動衆者也故非世職則不專非心感則不憐不學撡縵不能安絃綸以緒終琰以拍傳余與吳門張聘夫交其父子于三代之間每以醉心焉祖野塘以琵琶標特父小塘以提琴擅譽今聘夫遂以三絃鳴而後絶技歸焉其技在漢之先吾於是而聞秦音矣獨音潘景升夫受氣于地惟竹也清受音于天惟肉也獨古云竹不如肉謂乏自然然二者胡可淆也故竹音勁者可以裂石可以斷腸肉音微者可以魂銷可以情死肉奏而情不為死者未足以盡肉之情不盡肉之情其去曲之微逺矣比之琴箏咸以音自冩而末世始合以歌簫管本以音自和而末世始合以曲音各有主曲各有真從音中聽曲為不識曲從曲中審音為不知音余每持是論而衆人安于習殊不謂然姑以是為耳娛非為曲證也晉陵李紉之每奏曲一坐悄然傾聽輒戒簫管勿和其清潤宛轉之致始得悉陳而性靈朗徹不為㳺聲牽引龔應民賞余以為獨鑑明日國中之屬和者不至四坐穆如惟竹音波流蕭然遞響和之天倪乃為不繁故知協和為吳兒偏技可以艷場不足以標竒可以悦俗不足以熒智譜曰獨音而善曲以自振者始無惰情矣口戲潘景升蘇瞽北京東院人雙目無見而舌根之慧無所不通長安貴人延請無虛日其技面陳者十一而背騁者十九一所能也九所絶也彈弦奏肉曲盡其情此面陳之一也閉之室倚壁而聽之忽若㳺茂林而百鳥哢音也忽若閲大苑而牛馬嘶風也忽若臨市廛而雞鳴犬吠兒女啼號猾豪爭閧輪蹄夾擊雜㳫奔馳囂起氛上若震一方而驚四座此背騁之九也客曰子技至此乎子將以舌視乎吾視子舌知為秦之苗裔矣蘇瞽曰吾之坐一室也茫乎若無四隅俯仰縱横莫不以身傳而象之浸假而鳴羣飛而翔忽生萬翼浸假而嘶羣逸而奔忽驟萬蹄為官長為邏卒為踐更為晝為夜襍而成聲吾聽之若一吾執一而合喙衆之聽之遂以一而為萬矣彼吹萬也孰萬使之哉吾所以用舌者四體舌也五官舌也一毛一竅皆舌也吾不知有吾舌亦不知有吾身而後能成此技也成之以想者也吾以舌養吾生耳秦之舌存適足以戕其生吾不為也且吾甚樂乎其無視也令予有目且得進乎技哉客曰善遂易瞽稱為舌師云十反潘景升馬道士居虎疁之神祠倣郡城之戲樂用竹木金革之小器而莭其音其音斷續不齊襍如風雨亂如蓬麻名曰十錦間錯成韵各不相沿亦曰十反馬之言曰樂奚以器為哉形語之國奚必殊音自吾舒雙臂有掌有拳有背有面有指有莭有骨有肉有抑有按有屈有伸而輕重疾徐間之所觸亦有厚薄柔脆堅韌之異數之至百且溢豈惟十哉於是為一奏而莭之以舌惟唇齒頰輔咸和焉聽者莫能盡其變亘史曰吾今而知一音之統衆音也何絲之不可竹竹之不可肉也宫之不可商商之不可羽哉吕覽曰心非臂也臂非椎非石也心之所通而木石應之况能運臂者乎故曰吾於手樂而知錦之細反之微也孰能形語者而與之手語哉箏潘景升麻城丘大語余乙巳春在京師有老樂工過其寓云張媪者嫁而歸先太守舊人也曽記君總角時侍太守通州為水嬉今願一見君也丘大聞而心喜急上馬造之媪為陳前事歴歴可聽皆丘大童稚所記憶者相與歔欷飲泣為出酒饌佐譚因言有姊大歸且老矣故傳父箏擅場教坊君不願聞乎丘大曰幸甚其姊出見慷慨擎破箏理敝甲而彈歌以合莭丘大始未審至二三句方悟為春闈催赴盡四闋丘問曰此南詞安得入絃索姊曰妾夫張禾甞供奉武宗推樂部第一人口授數百套如琵琶記盡入檀槽習之皆合調今㤀矣惟四朝元鴈魚錦尚可彈也丘再􅈤欣為再彈則思量那日離故鄉也音畢擲地曰此亦廣陵散矣幸一遇君而彈如隔世事妾將捶指安能更撫哉丘徑大醉而别亘史曰世知拜月亭可合絃索而不知琵琶記亦然元人猶鄙而少之何也豈非以其尚綺麗而少蒼莽色乎得張禾振其聲幸一吐氣矣又云余己丑嵗至燕京聞陳大捨搊箏有聲而無曲後嫁衛氏稱衛媪其技絶世此後教坊多工南曲胥失之矣明文海巻一百四十六
