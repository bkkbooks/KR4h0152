body:
  text: 明文海卷一百四十七餘姚黃宗羲編書一經學答徐大年書趙汸鄭村良遇後每恨相見之晚簮盍孔艱慨思晤言惟重瞻繫當卧疾敝鄉時適有鄭氏便人匆匆不能具書急取黃先生行狀封寄左右凡書所欲言者何以加此不作書非有意也庚子春夏留星源山中友朋自歙至者言嘗見足下所寄書而忘却取來自是凡屬數輩求之至今年春乃始得見三復不能去手莊生曰逃空谷者聞人足音跫然而喜矣况於稽經考禮如面論者乎幸甚幸甚鄭康成三禘五帝六天緯書之説豈特足下疑之自王肅以來莫不疑之而近代如陳陸葉林諸公其攻擊亦不遺餘力矣竊嘗究觀諸名家論著於經旨似猶有未盡者於禮意似猶有弗類者此先生所以不能已於言也雖然去古遠矣豈易言哉汸嘗歎王子雍有髙才好著書又與典午氏為婚姻勢望赫然茍非髙明博洽真有據依安能議其所短而孫仲然獨取聖證論駁而釋之其所辨證必有可觀陳史既復不作志其書復不傳千載而下無所鏡考可惜哉是以先生行狀中凡諸經疑義皆略存梗概良以此也其於歷代聚訟之説雖千百一二而本源制作悉已包涵懼觀者忽而弗思爾今足下乃能反求經傳具示所疑豈非區區所望於同志者乎幸甚幸甚揚子雲曰衆言淆亂折諸聖禮家異同之説其來遠矣茍不反求於經將安所折衷乎謹按周禮述舊聞以答來貺足下其察焉經曰祀天曰祀天神曰祀昊天上帝曰禋祀昊天上帝曰旅上帝曰大旅上帝曰享上帝曰類上帝曰類造上帝曰祀五帝曰禋祀五帝皆因官屬職掌器物司存言之然其間尊卑遠近親疏隆殺異同分合有序有倫聖經簡奧無費辭非後世文字比也蓋典瑞言祀天旅上帝祀地旅四望旅四望别言既非祀地則旅上帝别言非祀天明矣大宗伯國有大故則旅上帝及四望亦以上帝對四望言而小宗伯兆五帝於四郊四望四類亦如之始以五帝對四望言帝即上帝明矣旅者會而祭之之名上帝非一帝也猶四望非一方矣大宗伯禮天地四方皆有牲幣各倣其器之色而詩曰來方禋祀以其騂牡四方之神即五帝也故曰禋祀而得與天地通稱六器日月星辰四望不與焉大宗伯以禋祀實柴槱燎祀神之在天者以血祭霾沉疈辜祀神之在地者禋者升煙以祭之名三祀皆積柴實牲體玉帛燎而升煙以報陽也自非天神之尊者不得言禋祀明矣大司樂祀四望祭山川各有樂而五帝樂無文以其皆天神同六變之樂也又豈但與昊天上帝同禋祀同祭服而已哉雖然五帝之非人帝可無疑矣其總言上帝與専言祀天者豈無别乎其祭曰旅曰享曰類曰類造其事曰天子將出曰帥旬曰國有大故以及曰祈穀與大司樂冬日至祀天神於圜丘夏日至祭地祇於方澤孔子謂之大郊者其於尊卑遠近親踈隆殺之節亦辨而詳矣若來書所謂天與帝為一惟兼言分言有異則經中神號祭名禮物徒異同而已矣先王制為一代大典豈為是辭費以來後世之紛紛乎大宗伯禮四方主作六玉言小宗伯兆五帝主建神位言足下謂大小各從其類決五帝為人帝非經旨也夫五行之神為五帝而太皥之屬配焉亦云帝此孔子問諸老聃而告季康子者也公羊子曰自內出者無匹不行自外至者無主不止此郊之所以尚配也今將迎氣於郊而廢其所配者主其配者太皥以降雖有功德亦人鬼也人鬼豈能司天時而布五氣者乎陳祥道楊復齋之言曰天有五行四時則有五帝帝者氣之主也果以五人帝為五帝則人帝之前其無司四時者乎朱子又謂凡説上帝者總昊天上帝與五帝言之意與陳氏同諸公雖不主康成至此亦不能異也足下豈弗考乎王制祭天地之牛角繭栗宗廟之牛角握此天神人鬼之别也國語曰郊禘之牛角繭栗謂郊為禘而牲無異文此所謂禘非人鬼之祭矣又曰凡禘郊祖宗報五者國之祀典也加之以社稷山川三辰五行而别不言祭天地則常昭注禘為圜丘不誣也祭法以禘郊祖宗對舉言之與國語同則四者皆大祭而事體相似可知其四代配食之帝一以先後為次則四大祭者輕重必有差矣王氏謂禘者宗廟之殷祭而郊為圜丘祀天以其序言則先廟而後郊廟言人鬼而郊不及天神以其實言是重祖以配天而輕所自出之帝惟廟享也又謂祖宗乃二廟不遷之名是禘郊以祭言祖宗以廟言也太廟之不遷又非世室比顓頊之於夏契之於商其廟視周文武世室亦可同倫乎二世室一曰祖一曰宗可乎此毋論禮意如何古人制言有序名物以類必不如是之舛駁弗倫也六天之神隂主化育著為星象下應人事北辰中居御極而五帝隨天運轉以散精布氣於四時與開闢之初五天之精感為帝王之祖皆非有得於化原有見於古初者信不足以及之然中垣太微昭布森列不可誣也况周人立閟宫以祭薑嫄大司樂享先妣序於先祖之上則南郊祀感生帝何必異乎緯書焚於隋河圖洛書至宋始大顯使無陳邵二公亦妖妄之類耳學者初不見全書往往望風詆排先生嘗謂恐尚有如圖書蓍䇿之數在其中可謂惡而知其善者矣孫仲然遠矣安得起陳林諸君子而質之然先生論宗廟之禘與鄭氏三禘亦不茍同行狀中可見其謂成王以殷禮祀周公因詩言白牡以辨明堂位之誣也足下乃取何休氏周公生有王禮之云誣斯甚矣魯郊非禮春秋所書非一端但非成王賜之耳其謂魯禘文王於周廟者因魯有文王廟而辨於周公廟禘文王之僣也嚳無廟主藏於稷廟也魯既有文王廟安可虛而不祭但為藏主之所乎明堂位又考典不至矣上言祀帝於郊配以后稷下言以禘禮祀周公於太廟自車服旌旗以至樂舞廟飾皆天子也而獨不敢言上及文王吾家伯循欲推王禮以説魯禘其論起於唐末而不兼羣廟之説子程子蘇子由陳祥道諸公皆無取焉足下謂之古今通論可乎向來嘗感楊信齋譏鄭康成讀祭法不熟杜佑讀大傳不熟杜氏主康成而兼存王肅未知讀書生熟如何然康成所得有在祭法外者雖信齋未可忽也王肅親注家語而自廢五天帝之説茍無卓然之見讀書雖熟猶不足恃而况不熟者乎學乎後世而傲視古人如此每為讀儀禮通解君子惜之此先生教人所以貴乎致思也足下如有意斯事則聖經賢傳與諸名家成書歷代史志具在區區廢忘久矣何足辱下問乎春秋二百四十二年內外傳之説注腳已具右方六經補注為人借去一時無他本可奉寄當俟後便圖然此書頗難看汸逰江湖間嘗出以示人鮮有好者金華黃公與夏先生尤不悅以其多引而不發也其論五經大旨皆已櫽括入行狀頗以平日耳聞綴而輯之庶幾將來君子得以考觀其尚有能成先生之志者乎自遭亂離此事姑置而又以蚤衰久病雖嘗竊有撰録未能脫藁其尚克廣先生之學使有傳乎雖然所謂學足以明聖人之心志在以六經明晦為已任者先生所望於當世君子學者而未見其人也惟足下勉之則所以大肆其力於遺經者必有上逹日新之功非俗學所敢知矣書辭已繁不復他及又未知何時可逹左右臨楮馳神不宣與宋景濓趙汸初夏已熱伏惟講授優暇尊候動止多福前月中承王總制處傳至所與陶伯仁書捧領欣懌汸今春準擬一訪陶公屢傷風寒腠理不實恐途中又增外證纍其本病一向畏怯竟未曽往謹藏襲尊翰以為後期也春秋屬辭鋟梓近畢工敬奉一部求校正前輩文字板行後刋修者多矣幸勿謂已刻之書而吝於指托也不肖自少即患體羸心弱拙於記且不耐勞説是書每舉一例必干涉全經全傳而近年以來厄於疾病既倦檢閲尤憚思索是以因循嵗月未能脫藁所望於鄉先生以校正之助者有二人汪德輔妙年以此經發解嘗著胡傳纂疏出入五十餘家老於春秋者也朱允升素留意經學且嘗同見黃先生得其著書大意亦嘗集諸家為春秋傳近者汪公學者抄屬辭諸小序去乃略無所可否比相見索觀盡數葉置書笑云義例交錯易使人昏蓋平日不作如此討論也朱先生初見舊作集傳序文即云春秋之説定於此矣然辭從主人及日月之法始皆未能信後見屬辭乃手抄一部點抹甚精脫誤處亦時竄定然而所慮者明經之士未必人人吻合如此公則不但無可否而已也是以深有望於先生焉其纂述大意别幅求教印可一言辨於書首雖荷不拒然必詳賜考證視其書果足以酬其意志然後可以著筆或有未是且容證定耳昔止齋作後傳自謂身後之書今汸乃親見刻梓蓋有其説劉道源通鑑外紀成時病眼病瘡不寐不食因思李𢎞基用心過苦積年疾病而藥石不繼盧升之手足攣廢著五悲而沉潁水述其説篇末以自哀今僕寢瘵與昔人同而負債則異何則黃先生壯年合得郡文學輒棄去之一家飢寒不恤而自任以經學復古之功於六經多自得之説而書未及成小子之幼也父兄亦以科第期之既而自知孱弱如此定非應世之具甫冠則舍時文如九江繼以多病故血氣當剛而反弱摧頽疲薾食少心煩未嘗有一日之歡惟於春秋疑義忽有所悟則胸中暫若豁然而已今者謝天之靈幸成其書而衰瘁益甚萬一散逸不傳則是師生兩世虛用苦心徒廢人事方來學者以之為戒無復有堅困窮而盡力於遺經者矣先生其尚鑒之劉公伯溫先生不敢别拜書恐煩省鑒得一言同賜是正幸甚王庸道還過敝縣知子充有書而山中鮮人出入不曽得候領書却奉字然意不此殊矣曷勝有罪不宣通劉仲愚先生啓鄭真伏以一鄉髙月旦之評式尊儀範三傳著春秋之學肅就師模仰造丈函俯陳尺牘切惟諸侯之行事見諸魯史之舊文正次王王次春綱常為正事繫時時繫日凡例滋多道上合於唐虞贊不待於遊夏粵自漢晉之降及至唐宋以來羣儒狐疑諸説角立據事直書者膠於一見隨文立義者弊至多端充棟汗牛黨枯護朽非躬受聖人之訓孰能知作者之心眷我四明思皇多士樓宣獻序止齋之傳髙祭酒為國子之師困學名書深寧撮其要趣日抄有注東發緝以成編程先生接趙太社之源流袁內翰備髙舜元之答問蓋以發明其旨匪徒専事夫言厥今明經用以取士巧於新説晦菴嘗指其文妖泥彼陳言元凱空成夫傳癖仰止前修永遠孰為後進依歸論規矩之方圓必資良匠稱權衡之輕重盍同此心非就有道而正焉終亦無聞其已矣伏惟先生屬辭比事微顯闡幽謹人事於三餘審天時於五始正其誼明其道大明筆削之公褒有善録有功克審勸懲之正嘗論晉楚終始以見春秋盛衰蜚王國之聲名登虎榜掌天門之教位正臯比既勇退以來歸遂從容而息偃發蒙蔀擊待問鐘撞謂萬二千五百家為鄉誰其學者而二百四十餘年所載吾將語之文通得啖趙之微安國踵洛伊之𣲖門深夜雪席上春風伏念某久剔蠧編深嗟麟獲飢貧所迫僅為糊口之圖疾病相攻盡廢傳心之典顧私衷之欲奮諒習氣以難除仰瞻道德之光足遂聲容之覩小子成章狂簡不知所裁長者大度寬容庶幾豫進所願掃門而授業固當敷衽以陳辭致南豐之瓣香慨云其晚傳和凝之衣鉢請繼自今屬當陽和幸調節適早正儒臺之擢以承翰苑之榮傾向之私敷宣罔既答梁孟敬書劉永之僕自屛居山谷絶罕人事乃得留心於經籍而獨學之寡陋講貫之無徒日乃以所為春秋本旨序呈之左右冀有以警䇿而正諸及奉還示大獲所望詞纍數百言若將有取於愚瞽之作而教以其所弗逮者謹受賜矣然蒙固之見有未盡暴白而明諭之旨有不可不復者敢略布之以終大貺焉執事之言曰諸如或日或不日稱爵稱人名之字之王之稱天與否諸侯之列序與否大夫之登名與否皆因史之舊非聖人之意之所存三傳之要諸説之鑿朱子之駁之為善又曰信公穀之過求褒貶之詳未免蹈先儒之謬此胡康侯之失也凡此所論度越老生宿師萬萬弗疑又曰夫子言知我惟春秋罪我惟春秋知之者知其明王者之法也罪之者罪其彰亂逆之迹也夫春秋之為春秋明王法彰亂逆誠聖人之旨也然謂因魯史之文而筆之傳之其小有乖訛則修之完之使觀者有所勸沮而王法由諸而明亂逆由諸而彰則可也若謂損益乎魯史而明之彰之則弗可也夫聖人者豈盡異於人哉其德則聖人也其不幸而不得其位則猶夫人之子也時無明王誰其宗豫待之者曰季孟之間則猶夫人之臣也而所事之君則荒君也其君之卿大夫則僣室也以猶夫人之臣子而立乎荒君僣室之朝而私損益其國之信史而明王法而彰亂逆無乃弗可乎夫今之與古逺矣而其理弗異也設使有一孔子生乎今之世立乎今之朝非君之命與其職守而取今之國史而損益焉豫奪焉褒譏焉而公示之人其乃不為僇民者鮮矣聖人對陽貨則謹諾之過宋而微服焉居其邦不非其大夫其自稱曰述而不作信而好古夫豈以其聖而傲當世乎哉蓋方是時各國之史亦莫不有人焉其立辭亦莫不有法焉趙穿之弒逆也而書曰趙盾弒其君則晉史之良也崔杼之弒逆也太史死者三人而卒書曰崔杼弒其君則齊史之良也之二國者有二良焉而况於魯有周公之遺制與秉禮之臣者乎是故法之謹嚴莫過於魯史其屬辭比事可以為訓莫過於魯史具當世之治亂盛衰可以上接乎詩書之迹莫過乎魯史是以聖人有取焉謹録而傳焉以寓其傷周之志焉其知者曰是不得已焉耳其不知者曰是匹夫也而暴其君大夫之惡於天下後世故曰知我者將在是罪我者將在是亦聖人之謙辭云耳夫豈曰改周制寓王法而托二百四十二年南面之權之謂哉僕故曰謂因乎魯史而筆之傳之而王法由諸而明亂逆由諸而彰可也謂損益乎魯史而明之彰之則弗可也言之重辭之復必有大美惡焉此先儒之説也執事取之故曰首止之會盟葵丘之會盟皆再書焉是美之大而詳其辭也稷之會曰成宋亂劉單以王猛居于皇尹氏立子朝而先之以王室亂皆復言焉是惡之大而詳其辭也抑嘗考之蓋史䇿之實録而其紀載之體異焉耳其凡有五有據其事之離合而書之者有重其終而録其始者有重其始而録其終者有承赴告之辭而書之者有非承赴告之辭聞而知之而書之者此五者其凡也而皆所以紀實也或會而盟盟而同日是會之與盟合而為一事矣或會而盟盟而異日是會之與盟離而為二事矣合而一事則同書離而二事則異書固當然也夫首止之與葵丘也皆夏之會而秋之盟是離而為二事矣故再書焉此據其事之離合而書之者也踐土之會美矣而盟不異書同日也平丘之會無美矣而盟則異書異日也皆實之紀也非美之大而詳其辭也將書其取鼎也於稷之會則始之以成宋亂此重其終而録其始也既書曰宋災伯姬卒也於澶淵之會則終之以宋災故此重其始而録其終也會未有言其故者於之二者而言之特以明其所重也他如書實來則先言州公如曹書齊侯伐北燕則遂書及齊平皆是物也子朝之亂叔鞅至自京師而言之未知其孰是焉故曰王室亂此非承赴告之辭聞而知之而書之者也劉單以王猛居於皇則來告矣敬王居翟泉而尹氏立子朝則來告矣此承赴告之辭而書之者也他如程子之傳例有曰將卑師少例書人此承赴告者也不知將師名氏多寡亦書人此聞而知之者也皆實之紀也非惡之而詳其辭也曰言之重辭之復必有大美惡者焉先儒之過也且夫其名也著乎簡䇿其迹也昭乎萬世不必言之重也而皆知夫首止之為美矣不必辭之復也而皆知夫稷之為惡矣故曰因乎魯史而筆之傳之而王法由諸而明亂逆由諸而彰也程子曰春秋大義數十炳如日星乃易見也其微辭隱義時措從宜者為難知也夫所謂炳如易見則然矣其曰隱微而難知果何謂哉聖人將昭大辨於萬世顧乃有隱微難知之義是未免蹈前儒之失也杜預曰言髙則旨逺辭約則義微程子韙之則所謂隱微者猶是矣然則易之彖繫將非聖人之制作乎論語之答問將非聖人之言詞乎何彼之平易顯白而此微隱難喻僕之愚不敢以為然也雖然程子之傳有舍乎褒貶豫奪而立言者則非先儒之所及也若胡康侯之學術正矣其議論辨而嚴矣其失則承乎先儒而甚之者也朱子嘗曰有程子之易又曰可自為一書謂雖言理之精而非經之本旨也若胡氏之春秋其自為一書焉可也夫時有遠近則史有詳略史有詳略則辭有同異此甚易曉也若自文以上日食有不書日者文以下悉書日焉自文以前君行八十書至者十七文以後君行九十書至者六十四是也執事所謂隨時而觀經此誠善也而公羊子曰所見異詞所聞異詞所傳聞異詞何休曰所見之世思其君父尤厚故多微詞焉所聞之世思王父少殺故諱亦少殺焉所傳聞之世思髙曽又少殺故弗之諱焉甚乎其陋矣陳傅良曰隱桓莊閔一書法也僖文宣成一書法也昭襄定哀一書法也夫不曰史之有詳略而曰聖人隨其時而異其書焉其賢於公羊者幾希大較説者之失有三尊經之過也信傳之篤也不以詩書視春秋也其尊之也過則曰聖人之作也其信之也篤則曰其必有所受也其視之異乎詩書也則曰此見諸行事也此刑書也夫以為聖人之作而傳者有所受則宜其求之益詳而傅會之益鑿也以為見諸行事以為刑書則宜其言之益刻而煆鍊之益深也以為美則強求諸辭曰此豫也此褒也聖人之微辭也或曰聖人之變文也一説弗通焉又為一説以護之一論少窒焉又為一論以飾之使聖人者若後世之法吏深文而巧詆蔑乎寬厚之意此其失非細故也今僕之愚曰其文則魯史其義則彰善而疸惡冀述而傳於後則以刪詩定書贊易同其狂僭而為傳也則直釋其義其善者曰如是而善其惡者曰如是而惡無褒譏豫奪之説其區别凡例則主程子其綱領大意則主朱子其三傳則主左氏以杜預説而時核其繆妄其諸家則無適主取其合者去其弗合者如是而已竊以謂使聖人因乎魯史焉則愚之説固已得矣使聖人而自作焉亦當據事而直筆之必不如先儒之云則愚之説亦蔑甚乖剌焉其自信者如此然猶以其考之也未浹洽焉其講之也未貫通焉姑優柔之而姑反覆之寬之以嵗月而後可就也日序之言不足以盡意而明諭之勤懇不敢不復而辭不可殫也輒言其大都如此於戲舍執事其亦曷言之而曷聽之乎超卓之識特逹之見尚克示之幸甚明文海卷一百四十七
