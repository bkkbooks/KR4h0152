body:
  text: 明文海巻一百五十餘姚黄宗羲編書四經學答張廷璧方孝孺辱寄詩五篇且誘之使决其可否足下之意良厚矣然僕昧陋無識豈足知可否之所在邪意之厚而不答則人將以為隠答而不能稱見屬之心則人將以為妄妄過也而隠過之尤也足下吾友也固將有以正吾過試妄言焉而求正之可乎足下之詩刻削森秀為世俗異味其辭信奇矣茍得此於世俗之士方推譽之不暇而僕安敢言今足下眇然有志乎古凛乎其非世俗之人也倘不以古人之所至者為準則為卑足下矣而僕安敢不言盖古人之道雖不専主乎為詩而其發之於言未嘗不當乎道是以雅頌之辭烜赫若日月雄厲若雷霆變化若鬼神涵蓄同覆載誦其詩也不見其辭而惟見其理不知其言之可喜而惟覺其味之無窮此其為奇也不亦大乎而作之者初非求為如是之奇也本之乎禮義之充養之乎性情之正風足以昌其言言足以致其志如斯而已耳後世之作者較奇麗之辭於毫末自謂超乎形器之表矣而淺陋浮薄非果能為奇也稚子刻雪以為娛目之具當其前陳非不可喜徐而察之蕩而無遺尚焉取其為奇也哉足下之為奇固非此類然旨近味漓乏和平温厚之韻得非所質之本未甚充而從事於奇麗之末故邪不本之務而求攻於末是猶棄木之根而蟠其枝以為美欲其華澤茂遂弗可得矣故聖賢君子之文發乎自然成乎無為不求工奇而至美自足達而不肆也嚴而不拘也質而不淺也奥而不晦也正而不窒也變而不詭也辯而理澹而章秩乎其有儀燁乎其不枯而文之奇至矣然聖賢君子曷嘗容私於其間哉盈而流激而發不求而自得者也足下於此固已知之矣而出言命意未免有艱苦澁滯之態者求於言而不求於言之所從出無惑乎其難也今天下學者靡靡焉惟習之所同潛竊陽剽無所顧忌以為能詩不可勝數欲其知所趨向由大路而不失驅馳之節者舍足下莫先焉而僕猶僭有所言多見其妄也雖然不知而妄言僕誠過矣使妄言而偶有益於人豈非好古者之所樂聞乎昔有貴人之子病蠱而求藥於醫醫偶出其妻以毒鼠之藥付之貴人之子服而且泄既而疾良愈自醫者言之其藥信妄矣自愈者言之孰知其妄與否乎僕嘗怪風俗頽巧相師為佞至於朋友亦以諛悦為忠近得陳元采書殊有箴教之益切中吾病為之喜而忘食如吾子所戲粉飾繪畫以為古人復生令人慚闕歸乎庸衆人之域今得元采而後知之所望闕之兄愛也無以為報適有近詩十章及勵志詩十章今以寄元采足下幸一閲之以僕之懐元采闕闕以為教而不怪其為妄發也五詩中哭許士脩詩最闕之他詩用韻多有與古人異者行辭有未妥帖者考之漢魏諸作必自得之此特末失耳茍得其本當知鄙言果非妄也與友人論井田方孝孺僕向者僣不自量竊傷三代聖人公天下之大典墜地已久見今國家法立令行寔足以乗勢有為舉而措之無所難者故著論井田之事可復不疑僕雖不才亦嘗三思之而熟究之非偶為是夸談也然毎患有志者寡無與討論講明者始見吾子行淳貌古心獨慕焉以為可語斯事故出而示之意吾子異於流俗人今吾子乃不察其道而横為異辭以非之謂不可行於今此流俗人之常言僕耳聴之而幾聵者也吾子安取而陳之哉且人之言曰古法有不可行於今者若井田是也斯言甚惑也古之時席地而食手掬而飲㰱血而啗毛衣皮而寢革為巢為窟以相居拍手鼔腹以為樂此其不得已也固不若後世宫室鐘鼓服食器用之美且適也若此者非惟不可行亦不必行以其非中制也若井田者更三四聖人而始大備酌古今之中盡裁成之理生民之鉅方禮義之所由立也古者之世富庶勝於今風俗美於今上下親洽過於今國之盛强且久過於今曷為而不可行哉人又言曰禹之洪水桀紂之暴虐人民稀少故田可均夫古之時人民之衆後世莫及井田雖未行而人安其業其端已見矣桀紂之暴非若秦隋之糜爛其民也湯武誅其君而已非若戰國秦漢之際殺人盈城野民何為而少哉今天下喪亂之餘不及承平十分之一故均田之行莫便於此時而吾子乃援王莽嘗行證之以為不可益謬矣且王莽之亂非為井田也欺漢家之老母而奪其璽稱制於海内海内之人憤怒思剖其心而食之故因變奮起使莽不行井田海内亦亂莽亦誅死於井田何有哉吾子又謂漢唐不行今欲行之難矣尤非知本之論也漢唐不行者非不可行也未嘗行也漢髙祖之世可行也而時無其人導之唐太宗有志於三代之盛而魏徴之流未知先後不能輔之以成大業孰謂不可行也流俗之謂不可行之者以吳越言之山溪險絶而人民稠也夫山溪之地雖成周之世亦用貢法而豈强欲煙卑夷髙以盡井哉但使人人有田田各有公田通力趨事相救相恤不失先王之意則可矣而江漢以北平壤千里畫而井之甚易為力也東海有魚曰鯤身如丘山動則雷震逰則濤湧橋井之蛙未嘗識也伸其股而自詫曰東海寧大於井乎鯤魚之大孰若吾股乎今未知天下之故而曰井田不可行者是橋井之蛙之類也且僕鄙固之意以為不行井田不足以行仁義者非虛語也仁義之行貴人得其所今富貴不同富者之威上足以持公府之柄下足以鉗小民之財公家有散於小民小民未必得也有取於富家者則小民已代之輸矣富者益富貧者益貧二者皆亂之本也或難僕以為陳涉韓信非有陶朱之富而豈富者為亂哉以此論井田疎矣是殆不然井田之行則四海無閒民而又有政令以申之徳禮以化之鄉胥里師之教不絶乎耳苛取暴征之法不及乎身何苦而亂乎使陳涉韓信有一㕓之宅一區之田不仰於人則且終身為南畆之民何暇反乎僕故曰井田之廢亂之所生也欲行仁義者必自井田始吾子欲舎井田而行仁義猶無釡而炊也决不得食矣夫不以釡炊雖愚婦知其不可不以井田為治士大夫安之豈智顧不如愚者哉抑習俗之移人也俗之降衰日趨而日下特立而不變者惟豪傑之士能之吾子儼然在縉紳之列不務明聖人之道以淑來者而非先王之制甚為吾子不取也僕訥不善為辯性頗質又不喜為媚故直以故告吾子孟子不云乎不直則道不見然則僕亦非過也將以明道也吾子倘有疑於心當以見教僕尚能終其説答閿鄉葉教諭方孝孺郡守王公至辱示以劉翰林黄伯生所為詩集序且俾有述焉物之美者無所待於外有待於外者皆持不足之心者也照乗之珠盈尺之璧不幸而寘諸泥塗瓦礫之中其光氣之晶瑩朗潔者固在及識者得而有之雖棲之於故篋襲之以敗絮連數十城之價自若也若夫藉之以良錦韜之以文匱盡飾乎其外而彰其美以示人則其中之所存者可知矣執事之詩僕雖未獲見而伏讀之然因二君子之言而求之盖可以無待於外者也茍無待於外雖二君之言已為過而况復有待於無能之辭乎且古之所謂序云者盖以明作者之意如詩書篇端皆有小序而復有大序加其首者是也小序或出於史臣或出於後之賢士大夫序之作者皆古之聞人然其中得其言而遺其意執其意而失其事往往為經文之累者亦不為少則序之無益亦已明矣賢士聞人之為序猶不能有益於經况今之為序者能有益於執事之詩哉自詩書以下作者莫不有序或同志者指其徳業之所至或門人故交發其所藴而歎惜其遭逢初非有求於人而司馬遷班固揚雄之儔又直自述已意以抒其奇偉之才固未嘗有待於外也唐人之能詩者莫如李白杜甫甫詩當時無序者白詩李陽氷於其既沒嘗為作序然其有無不足為二子輕重而序者反託之以傳惟韓退之偶然一言推尊二子至今人誦退之之文而知李杜之不可及夫執事之詩信美而可傳則不求於人可也或自序其意可也以待後之是非可信萬世如退之者之一言亦可也何其擾擾於世俗之求哉且僕少而不専於學長而奔走於虛譽無暇以學及今粗聞先聖人之道而欲從事焉其所學既不在乎文而於文復厭棄不省故陋於文者舉世莫僕若也加之闇昧庸劣無適時之資掛名庠序食斗禄以活養妻子言不足取信於天下執事過聴而求之何為計之疏也雖然今之儒衣冠者不為乏人以文辭自任者麻列於周秦之疆不彼之求而於拙訥無勢者有望焉執事之心殆非偶然者僕雖不能言烏敢卒愛於吾言乎哉第執事之詩足以自信而僕又未之見且劉黄既序之矣是以未能承命倘未即見絶或以草本相示使得窺賦咏之大端庶幾可發舒所欲言譬猶故篋敗絮以藉重寳而増榮則區區之願也太守志行甚美可為湖學薦紳賀屬患眼無聊不能一一答許廷慎方孝孺往在京師士人從濠上來者多能誦足下歌詩固已窺見胸中之一二去年在臨海遇林左民張廷璧二子問足下言行滋詳二子自負為奇才至説足下輙弛然自愧以為莫及也然後益信所窺之不妄近在王脩徳所得所録文章數篇及手書深欲讀之㑹㒒家難作未果寓目輙引去重入京師道塗所行千餘里恒徃來於懐及到此獲嵗寒事記於友人家覽數行而大驚喜命意持論卓卓不茍非流俗人所敢望也何足下取於天之厚至是耶斯文世以為細事然最似為天所靳惜其賦於人也銖施兩較不肯多與得之稍多者便若為所記憶時時迫蹙督責不使有斯須佚樂意此理絶不可曉豈其可重者果在此耶不然何獨忘此而悦彼邪如僕自揣百無所有以粗識數字大為所困當危憂兢悚時自誓欲以所能歸諸造物甘為庸人而不可得足下幸安適無所苦而駸駸焉欲抉發奇秘以與造化爭也然其取忌亦太甚矣得微亦蹈其所忌乎僕雖為斯文喜然竊以為非計之得也雖然君子顧於道何如耳寧論利害哉自古奇人偉士不屈折於憂患則不足成其學載籍所該大半皆不得意之辭也然後世卒光明崇大又安知忌之於一時者非所以為無窮之幸而恱之於俄頃者非甚棄之耶此可為足下道聊以發笑且自解耳左民多稱王微仲之賢恨無由見之適見其弟晃仲亦雅士當是吾輩之秀大不凡也僕侍祖母故来此其詳有所難言答胡懐秀才方孝孺往年在浙東獲交才俊間其最善者眉山蘇太史平仲臨海葉刑部夷仲浦陽鄭楷叔度天台林右左民趙象伯欽陳叔英元采王琦脩徳日夕相與周旋論議倡酬往復沉潛乎天人之奥博觀乎興廢之理追琢乎行業而浸灌乎文章意氣孚洽無所覬慕體不待梁肉而肥心不待絲竹而暢十餘年來亡落者數人餘多散處他所然猶時得以書疏相講切當憂而遇笑方思而暫釋未甚於窮獨也及居山南木石之與徒猿猱之與儔心欲言而口莫與談足欲行而物莫與娛諸生講授經義畢輙冥目危坐或取古書緩讀徐吟間有所得無從告語惟仰觀霄漢黙黙悟遣郡府以朝命燕集不可拒往就末座官僚强飲以酒譁詞盈耳優戲在前未嘗為之啓齒一笑頗自意無復追曩者之歡矣去冬之長安見唐愚士為之欣喜又於愚士舍見足下文章益覺胸中慰悦然未知足下之深也今乃辱恵書千餘言陳述反覆筆勢流動上思古人下慨當世偉然有奇丈夫之風自入秦且三年未曽有一人以文相貺豈意乃得之於足下乎撫巻熟覽出入懐袖數日不能舍儼若重見往時諸君而接其聲容也文章於士子最為末事然非有得於古聖賢之意者不能世之學者衆矣其用志不専探索不精聞見不博攻習不久而能得聖賢之意者無有也是以吾少而好觀人文非止以其文盖將因其文而察其所存與之共進於斯道也覽足下之文於道信有志矣然而屢稱古之文人則是所向慕猶有所偏也賈生韓退之年三十餘已卓卓然樹立信如足下之云然使斯二公者得聞聖人之道而進於曽冉之列則其賢當何如哉僕鄙陋自度不足班古人而年來長閉口不復及天下事於政教舉措得失漫不復解而篤信六經有所為也以之為權衡有所疑也以之為蓍龜惟愚不足達世之機變甘以鈍拙自守人見其如此亦多竊笑之又素伉直不耐與富貴人俯仰有勢位者或欲招致聞其不善謟屈亦往往不合欲如賈生之亟談世事固不能如韓子之汲汲於得位尤不暇也而足下乃以賈韓相儗烏可當哉然賈生之勸漢文以寛大韓子之酷排異教尊孔孟竊有志焉使天或將康斯人明斯道他日倘萬一有成未可知也而不敢望也凡人當少壯時志意才氣百倍及年益増力益衰則沮謝隕穫有悔往歎今之心如賈之長沙韓之潮陽其英銳之姿亦少減矣聖人大賢志氣隨日以强徳業與時而加故有進而無衰既老而彌明僕之得乎天者未可知已之可勉者則猶有可進之地安知果不若足下之所期哉僕今三十六固為未衰足下少三嵗使三嵗之中日有所得其於追僕而出其前猶騁駃騠蒲梢而逐伏櫪之駑馬特易易耳所願者先乎道而後乎文脩飭其身心而無預蘄乎聲譽則僕之所見將有大過於今者矣喜慰其可量邪比懶作書尤不敢論古人於足下有言不能黙黙然世俗之難言也乆矣足下其勿以示人恐衆人之竊笑也答王秀才方孝孺前辱見臨且徴僕文以觀僕嘗閔世人不務學道而喜言文故有所論述恥為人出之以吾子不憚重山鉅海來造吾廬意氣愿欵非世俗輩可及特出舊作以答雅意且冀指列其疵失以相發明今乃恵書猥有所稱美而以學文之説為問僕豈能文者邪何吾子問之異也今天下雖乏奇才異能之士操筆執牘自負以為文人者不可勝計吾子有問焉彼將有以告吾子不彼之即而此之求所謂學稼於工求魚於獵者也使效其所得豈足副見問之意乎雖然世俗之文僕雖未之學若古人之文僕嘗學之矣試為吾子言其所知凡文之為用明道立政二端而已道以淑斯民政以養斯民民非養不能羣居以生非教不能别於衆物故聖人者出作為禮樂教化刑罰以治之脩其五倫六紀天衷人極以正之而一寓之於文堯舜禹湯周公孔子之心見於詩書易禮春秋之文者皆以文乎此而已舍此以為文者聖賢無之後世務焉其弊始於晉宋齊梁之間盛於唐甚於宋流至於今未知其所止也唐之士最以文為法於後世者惟韓退之而退之之文言聖人之道者舍原道無稱焉言先王之政而得其要者求其片簡之記無有焉舉唐人之不及退之者可知也舉後世之不及唐者又可知也漢儒之文有益於世得聖人之意者惟董仲舒賈誼攻浮靡綺麗之辭不根據於道理者莫陋於司馬相如退之屢稱古之聖賢文章之盛相如必在其中而董賈不一與焉其去取之謬如此吾不識其何説也茍以其文未粹耶則艱險之元結俳諧之李觀且在所取矣如之何其去二子也茍以其所述者王霸之道不敢列之於文人之後邪則孔子孟子固與荀卿屈原李斯並稱矣安在其能尊二子也退之以知道自居而於董賈獨抑之相如獨進之則其所知者果何道乎然相如雖陋其辭賦猶皆有為而作非虚語也近世則不然一室之㣲號之以美名輙從而文之視其名紛然雜出皆古之所未聞考其辭輕俳巧薄皆古人之所未有而求者以是望於人作者以是夸於時似有所為使相如之奴隸見之且將棄去而今之士莫知其為非此又退之之時所無有者也僕竊悲其陋故斷自漢以下至宋取文之闗乎道徳政教者為書謂之文統使學者習焉違乎此者雖工不録近乎此者雖質不違庶幾人人得見古人文章之正不眩惑於佹常可喜之論祛千載之積蠧為六經之羽翼作仁義之氣擯浮華之習以自進於聖人俾世俗易心改目以勉其逺且大者窮居少暇未有所成吾子誠有志乎古人之文則願勿溺於世俗勿為一時毁譽所變勿以道徳為虗器勿以政教為空言則文可得而學矣不然則世之能文者孰不可問僕之昧昧豈足副所求耶答錢羅二秀才方孝孺二君足下某年少謬招士大夫口舌騰譽心甚不喜得二兄書大有所稱儗滋不欲當茍遂黙受恐鄙陋之指不足以曉左右故不免復有所云古之言禮者曰儗人必於其倫若南宫适以禹稷儗孔子孟子以子思比曽子皆絜功量徳名與情稱而無疑者也或肆然而謬稱之是猶子禽以子貢比孔子揚雄以韋𤣥成比顔淵司馬君實以揚雄比孟子陸希聲以闕比韓愈不見信於當時則取譏於後世其不可較然也然之數子者雖不足儗聖賢而其聲光之著於天下猶鈞之於石尋之於常非猶山阜之於蟻垤河渭之於溝澮也儗之一不當且若是况某何如者而以儗李翺蘇軾曽鞏以下七八君子奚為其可哉指鈞而謂人曰此石也指尋而謂人曰此常也驟而聞之疑者尚少也指蟻垤曰此山阜也指溝澮曰此河渭也不駭以為過言則笑以為無目人矣彼七八君子者皆博特而雄達才髙而文炳使其身不託於名人位不顯於當世猶有以聞於世而傳於後也况又得人焉而依之其卒能有立也豈不宜哉若某者才能不及其百之一恣意放言不善刻削任理所之欲盡即止未嘗専攻於是望以之而立名豈能追作者之體要而庶㡬乎古之人哉而二兄乃云然竊恐識者以為過言矣然世俗可與語古不可與語今自昔而然孟子大賢淳于髠且詆之揚雄韓愈皆傑然儒者當世談笑之此皆士之所不能免者也今某無古人之實而過得時譽豈今之俗異於昔哉何其不宜然而然也所貴乎美俗者以其毁譽公而是非當也宜然而不然者非也不宜然而然者亦非也二兄以英敏之資抗然以直道自許而過於譽也如此豈固有說乎抑期其至於此乎如期其至於此尤不敢處也世之稱七八君子者以文某於文雖嘗學焉然志不好也少之時學作文自度其不可竊獨慕乎聖賢之道以為斯道非文則無以傳故又於文發之既而復以道之不至者不足以言文故嘗用心於三代秦漢之書考其氣運之髙下㕘其言語之醇疵以觀其世之盛衰得失要其歸於道與否而準繩之以聖賢之規矩盖將習之以冀其熟焉行之以望其至焉考之於身以見其成施之於世以驗其功服之於身而傳之来世上以不愧乎天中以不怍於心下以有益於人而後止此某之志也若二兄之所譽而儗者非某之敢望也二兄其謂誠然否乎急於自釋不覺狂僭二兄諒之所須二文在沈君處已乆想已得也答俞敬徳方孝孺某鄙樸戅訥言行不能及古人器識不足以達時務然守其愚孑然莫與徒望望然髙顧遐視而不合於時此固流俗之所笑且訕士君子之所不敢自是者也今足下猥加禮貌枉書賜問某察書中之言意欲望之以聖賢之道慇懃甚至某闕矣雖少然握筆伸紙工為文辭闕好豐頤長髭言如轉丸步闕為當世所喜者不可闕學彼皆自以為出羣之材經世之具使聖賢可至則斯人是已而足下顧以歸之僕奚可哉自他人而言且不敢居况足下秉深達之識讜直之論可否於殿陛間其志信古忠正之士懇懇焉以愛君報國為心者自宜藐視一世不入眼睫而有取於某此某之所未解也足下茍取其文乎則華言而少實者古多有矣未足以信某之為人茍取其貌乎自孔子不能無失宰予况於某哉雖然足下殆取其志也取其志則某嘗妄有不遜之論矣某六七嵗時初入學讀書見書冊中載聖賢名字或聖賢良將相形貌即有願學之心毎竊寸紙署其名與同輩諸學子闕而指麾之父兄雖加呵禁不止也既而年十嵗餘漸省事見闕仕宦者不足道以為聖賢之學可以自立外至者不足為吾輕重也遂有慕乎道徳之心又四五年侍先人北逰濟上歴鄒魯之故墟覽周公孔子廟宅求七十子之遺跡問陋巷舞雩所在潛心靜慮驗其所得慨然以為彼七十子者縱顏閔未可幾及其餘若樊遲冉求輩使學之同時豈皆讓之乎但今世無聖人出不得所依歸故不若爾迨今又五六年閱理兹多約心愈乆始知古人未易卒至盖其信道之心篤自治之法嚴故其所成近求之無遺行實用之有成功非近代虗寂者比也某誠信其然故不自放於俗每興傷今崇古之思積之既多發為言語道政事必曰伊尹周公論道徳必曰孔孟顏閔寢而思者此數君子也坐而誦者此數君子也用心一入於此猶恐流於過髙如古狂人而不適於用是以深自制抑若中無丝毫學者見庸衆人猶且畏而却避之况大賢魁儒如曾子子思孟子亘千載而特立者焉敢覬其萬一哉足下乃以某為可庶㡬而至此言一出惟恐流俗將以笑某者笑足下矣然足下無或怪其笑也孟子曰君子之所為衆人固不識屈原曰非俊疑傑庸態然也近有人聞某狂言輒頓足撫掌如聞怪聲且欲来瞷形貌果類古人否所親者以告某笑應之曰形貌與今人不異但心似古人耳所親者亦大笑要之此事不必與流俗爭但汲汲力求千載以上之人為師以俟諸百世之下知不知不暇問也聞有無識者見足下應召爭論輒笑足下為愚此殆與兒輩之見無異聖天子下詔達郡縣有志者上疏以論天下利病唐宋以来常有之但今人不見便以為怪此可歎也有志者行事當洞達如日月所持既定以此而始以此而終以此而富貴以此而貧賤憂喜禍福付之於天何必校哉某頗有見於此故對衆人不敢發齒如癡人然又恐虗名無立乆不敢與人往復感足下之愛且知受書沈思有觸於中不能自遏聊攄意一言五經之說實領至誨雪甚不可出餘侯相見盡談答兪景文方孝孺恵書以先大人遺徳未傳於世而以銘文見属辭氣懇惻厚甚此固孝子仁人不忍死其親之美意然某之言豈足傳信後世哉古之傳世者雖不可勝舉而其大校皆豪傑之士道徳充溢於中事功見於當時為天下所仰服故其餘言緒論之所及無意於傳而後世自傳之以其抑揚予奪為人之賢否輕重有獲著其名於文章之籍者輒相夸賀以為榮耀至於子孫猶倚藉為口實此皆以其人誠有可傳而然非特以其文也如范希文韓忠獻公程伯淳諸子其文辭固與人等耳後世傳而誦之而凡為其所稱者因以炳著章明於天下豈非以其人之賢故耶使徒有文章而大者或不足若栁子厚劉禹錫及王介甫輩其身且不免為世所詆議其所稱引贊譽之人欲望世人之盡信不亦難乎故善為親圖者不在乎得可傳之文而在乎可傳之人其人傳文雖未至無害乎其傳也其文美矣而其人不掩焉縱美而不傳雖傳而不信秪足病其親夫奚補哉今足下慮親之名未著而欲傳之茍以其文則某非能文者苟以其人則某之無能别於衆人也審矣而望其信於今垂於後世何為計之過而求聞之疎乎且世之風俗漓薄視人之文未論其工拙先舒紙尾覽官位爵秩故求文章者必於穹位隆爵之人幸而得假其名輒拜受以去不復問其中作何語盖習使然也足下不於彼焉求而以某使誠美可傳亦將為人所輕訕冀在俗之信且不能致而何望後世之傳乎使後世之人好尚與人異某他日於道或有所成文或有傳未可知也使亦類今人之為見某素賤士其身且不能自傳而安能傳乎人耶雖然以位而傳者猶器以丹漆而美也杞梓之器固有待於丹漆之飾其飾既亡而其美亦亡矣若夫金玉之器則不然其美天美也其貴天貴也人欲丹漆之且無所施而況有待於飾乎足下行義文學為士子師於人不妄有所取而獨有取於某意者其相求於丹漆之外也歟此之謂以古人之道見處而非汲汲於流俗之信也然則某亦安敢猥謂見棄於流俗而不勉乎銘墓之文謹如足下之命其可傳耶其無足傳耶其信於今耶其傳之後世而信耶足下有以取之其必有以識之矣某何敢知焉與樓希仁方孝孺得西行書勝接面談逺甚信乎足下之辯於辭也文章雖小事人謂之能言僕初不知識及出道歴呉楚至齊魯與梁趙秦晉之人交聞人談論能言者聲和而音雅詞切而義明理約而不亂端多而不複聴之使人灑然不倦不能言者終日口吃吃不能達意雜亂滯澁如醉夢中語或故以蠻音俚說嘲哦噢噫使人意悶不樂然後悟文之美惡正類此讀司馬遷史記終日數巻不倦及覽禇少孫日者龜策等傳未終紙已欲棄去文豈易為耶詞之美惡人之好惡繋焉人之好惡世之傳否繋焉而人以易為之甚可笑也近見他人文數篇讀之漫不成句得其句意不能属得其意辭不能馴正與楚粤間人僻處山谷不入中國者與之言果何人耶足下之文譬如趙人與梁人語聲音已不大相逺雖時或失口尚有趙音然終是能言者非吃吃不暢者比也然僕有一說能言與否固為人之好惡又在審乎所言者何事韓非商鞅書正無與比然所言皆刑罰督責之術君子羞聴之揚雄文中子書雖儗古人不甚暢而所言多近道世猶有取焉豈非能言為難而合乎道者尤難也耶僕固楚粤語者然頗嘗與中國人談喜足下相知聊一出口與郭士淵論文方孝孺吾郡之文闕有間矣僕行四方每見郡人詞令可觀者即喜況能文者乎是以自見吾兄心洋洋如有所得寢為加安而食為加㫖非勉强而然也樂善之誠天性然也繼而又承寄以林君公輔之文且教僕曰試評其可否焉僕昔聞吾兄言固知林君之賢及展而讀之黙而味之其思淵以長其辭辯以達不覺叩几三歎反復玩繹遂至夜深乖離旅寓之思為之頓消而沈伏抑鬱之氣勃然奮起信乎斯文之可以恱人而吾郡之秀不可及也僕不才自居金華太史公之門當世士大夫多獲見之矣凡能文有名者皆得而觀之矣至誦其文而使僕喜愜無所遺恨者不數人豈僕識見鄙劣使然哉亦作者鮮臻其極故也太史公嘗與僕言而以為嗟歎盖斯文之在人如造化之於物嵗異而日新多態而善變使人觀之而不厭用之而無窮不失榮悴消長之常理乃足為文而世之人多不與此樂蹇澁者以艱言短語為奇好平易者以腐熟冗長為美或採摭異書怪説以為多聞或蹈襲庸談俚論以為易曉而不知文之美初不在是也古之名世者具可見矣以僕言之秦漢以下多紀載講論之文耳求如古之立言者未之多有也聖人之言不可及上足以發天地之心次足以道性命之源陳治亂之理而可法於天下後世垂之愈乆而無弊是故謂之經立言者必如經而後可而秦漢以下無有焉然而猶足以名世者其道雖未至而其言文人好其文故傳其言雖不文而於道有明焉人以其明道故亦傳二者俱至者其傳無疑也二者俱不至者其不傳亦無疑也以僕觀於今之人求其成文而可誦者且不易得況望其明道乎僕所以見吾兄與林君之文而喜者良以此也自古國家之興功崇而績偉政舉而教行天恐其或失墜也必生博特英達之士執筆而書之所望於將來者非兄與公輔輩而誰乎此非僕私於同郡而言雖太史公亦深望焉更為謝林君加意學問以法六經為務倘有所得即以見教僕之几當不一叩而已也與舒君方孝孺舒君足下某在鄉黨時嘗接奉川朋友輒知足下名斯時新自京師歸湖海間人物可數慨然發不得見之歎雖未一識足下然已乆存乎心而著乎目矣昔有闕人在京師以足下文見示且道足下材質甚美撫誦彌日恍然如聨席交辭神㑹意領不知相隔千里而限以二江也僕自十五六從先君學經讀古人文頗思究其端緒然竊病今人與古不類自宋中世以下文未嘗敢觀時有所得私述而隂蔵之恥以示人及逰京師始出謁太史公公一見輒曰子吾徒人也遂送至弟子籍中由是日獲聞所未聞然後知斯道如此而今人之得者果非也盖文與道相表裏不可勉而為道者氣之君氣者文之帥也道明則氣昌氣昌則辭達文者辭達而已矣然辭豈易達哉六經孔孟道明而辭達者也自漢而来二千年中作者雖有之求其辭達盖已少見況知道乎夫所謂達者如决江河而注之海不勞餘力順流直趨終焉萬里勢之所觸裂山轉石襄陵盪壑鼔之如雷霆蒸之如煙雲登之如太空攅之如綺縠迴旋曲折抑揚噴伏而不見艱難辛苦之態必至於極而後已此其所以為達也而豈易哉漢之司馬遷賈誼其辭似可謂之達矣若揚雄則未也唐之韓愈栁子厚宋之歐陽修蘇軾曾鞏其辭似可謂之達矣若李觀樊宗師黄廷堅之徒則未也於道則又難言也嗟乎此豈可與昧者語哉今之世不幸斯事廢缺賴太史公起而振之一代之文燦然始完人以為公一儒者於世何所預而不知公之有功於斯世者至大也譬猶星辰之於天鬚眉之於人初無所預然而有之則天象修而人形妍無則晝夜乖舛而容儀陋劣矣盖公之文一本乎道徳而氣足以暢之當其發難辨折紆餘反覆雄毅𢎞博雅而不深質而不淺撃刺交前弧弩皆發觀者駭眩失色徐而察之則固從容閒暇如無事時而不失揖讓進退之禮此公之所以服四方之士而有誘民導俗之功者也某之獲見知於公者又何幸哉足下太學一諸生能自拔於千人之中以得公之稱譽可謂有過人之材矣公未嘗易稱人也公待人雖極恭和茍非其材一言不加許僕不肖猥蒙公之奬引以為教雖自知不足以當之而心亦私自幸非幸公之稱以為足也幸不棄於大賢君子庶㡬可勉以入於道耳每患喪亂之餘英俊寡鮮求其人友之以俱而不可遇故属心於足下也亦欲相講說以同進於道耳僕性愚憨竊以為古人之言有是有非是其是而非其非乃為得之若以古人為皆然則不可也識者殊少未免為俗人所笑今足下乃病陸士衡文賦淺狹而有作竊窺叙述大意甚美士衡於道未有知所賦者特當時相尚之文固有志者所不讓足下病之誠宜第其中有不易之論如曰謝朝華於已披啓夕秀於未振又曰怵他人之我先彼未為無見但立志有非前人之意乃不然耳然其言之善者亦不可不取世人或不察其立辭之說而徒取其所謂襲凡蹈故綴緝成篇者使論誦之盡氣而不得其句則不知士衡之論故也故繼以為告足下幸有以教僕僕亦不敢虗辱雖然吾儕之於文辭當法六經區區士衡又惡足置齒牙間哉明文海巻一百五十
