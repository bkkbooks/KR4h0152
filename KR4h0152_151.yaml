body:
  text: 明文海巻一百五十一餘姚黄宗羲編書五論文答程伯大論文朱夏古今能言之士孰不欲雄峙百代之上而垂聲乎百世之下哉然而卒抱竒志而不見泯泯以老死者何其多也豈非才識之不逮故不能成一家之言以至此耶三代之後卓然成一家之言者纔十數人而止其餘皆磨滅澌盡則信乎得之於天者非超然而不羣則難乎其以文章自命矣比辱賜書大扺未能達夫雄深雅健之作而務為浮薄靡麗之文而已此甚不可也僕聞古之為文者必本於經而根於道其紀志表傳記序銘贊則各有其體而不可以淆焉而莫之辨也至其發言遣辭又奚以剽賊為工哉今不本於經不根於道而雜出於百家傳記之説則其立論不自其大而自其細固已自小矣尚何能與古人齊驅並駕哉老蘓之文頓挫曲折蒼然鬱然巉刻峭厲幾不可與爭鋒然而有識之士猶有譏焉者良以其立論之駁而不能盡合乎聖人之道也今無蘇公之才而立論又下蘇公甚逺則何望其言之立而不仆焉古之用兵其合散進退出竒制勝固神速變化而不可測也至其部伍行陣之法則繩繩乎其弗可以亂為文而不法是猶用師而不以律矣古之論文必先體製而後工緻譬諸梓人之作室也其棟梁榱桷之任雖不能以大相逺也而王公大人之居與浮屠老子之廬官司之署庶民之室其制度固懸絶而不相侔也使記也而與序無異焉則庶民之室將同於浮屠老子之祠亦可乎鑄劒而肖於刀且猶不可斲車而肖於舟不尤以為迂且拘乎韓子之於文也惟陳言之務去今雖全未能如韓子亦宜少刋落矣乃悉古書竒字而馴集鱗次焉不幾於天吳紫鳯顛倒裋褐也耶蘇子謂錦綉綺縠服之美者也然尺寸而割之錯而紉之以為服則綈繒之不若今先生乃欲集羣英以為華為好其亦異於作者之見矣世有寠人為覩其鄰之富也日夜攻鑽而剽之幸而得其貨寳財賄以為得計矣一日徼者獲之則薾然盜也而至死不悟且役役焉割裂而綴緝之則其氣固已薾然矣又何能渾浩如江河而有排奡之力哉故夫蘭苕翡翠又烏覩夫掣鯨也且古之為文非有心於文也若風之於水適相遭而文生也故鼔之而為濤含之而為漪蹙之而為縠澄之而為練激之而為珠璣非水也風也二者適相遭而文生也天之於物也獨不然乎纎者穠者丹者堊者莫不極其美麗而造物者豈物物而雕之哉物各付物而天下之巧莫加焉彼有昧於此者三年而刻葉已且文猶樂也太古之音和平雅淡而風俗以淳人心以正桑間濮上淫哇煩趣而人心風俗蕩而忘返使先生而與聞制作將安取乎則何獨疑於文也先生教之曰茍無毛嬙西施之美質則不能不借夫粉黛之假以掩其陋是朽木可得而雕糞土之牆可得而圬矣無鹽天下知其惡也被珠璣曳羅綺不足以欺天下之目使天下而皆瞽也則可奈之何天下之不皆瞽也先生殆未覩夫正色也先生又謂吾五常論其猶𤣥耶太𤣥擬易而作然易出於造化之自然而𤣥也者出於智慮之私而已故不能免夫牽合艱難之態先儒固已譏其勞且拙矣故今去雄千餘年而卒無好之者今先生乃欲著書以擬𤣥吾恐其不堪為覆瓿用矣先生又謂吾嘗作詩命其集曰胡盧且魯論詩序言詩之用若彼其博也而先生直以資人之笑視古詩之風亦少貶矣此亦好怪之過也先生卒教之曰其觀吾文也還以一言庶有以知君子之是是非非也宋之季年文章敗壊極矣遺風餘習入人之深若黑之不可以白當此之時非返之則不足追乎古先生之心自以為過之矣而烏知其異於彼也先生之文始欲其竒也而卒以拙始欲其麗也而卒以惡始欲其雄也而卒以弱其風格言論莫不叛於古矣則亦難乎摭而言之矣且先生既與吾異則僕雖言之而無當於其心矣僕欲挽先生於迷途則願悉吐出其中之藴取韓孟文日夜誦之覺已之見與向者異焉然後一吐其辭庶有合乎僕於學廢棄之日常多加以怠惰不力然於作者之風致竊有見焉故敢畧陳其説答孟左司書劉迪簡余年二十餘慕為古文即悟其人有古道本能為古文所謂古文狀其人平生所好之古道耳及年愈大益悟文乗氣而有也是故紬繹心思乗氣以綴文而註之簡册之上猶如人騎善行馬援轡在手盤辟往復於羊腸蟻封之間也年少時志不足以勝氣為氣所驅使未免用壯其勢突兀後乃取舊所為文視之甚可羞赧因又悟氣充滿一身倘或縱其所之如龍驤虎躍能排軋萬物必也持志内牧施銜勒為控御然後歴都過闕步驟中節鏗鏘乎和鸞之聲容與乎曲水之側於斯際也發而形諸語言則為節制之文仁義之學矣然人生稟氣其清明入髙品者最不易得而文人御氣無促數之患周旋折旋中規矩者又不易得是故三代以後漢唐宋之文人稟氣秀出於藝文之科御氣無前於天下之士者如司馬子長神情散逸最喜明姦利又善為人寫生諸王子王妃將軍文吏情態兼窺求猥褻隂私蘄不失其神類言常人所不欲言者班孟堅似懲司馬氏微傷蕩佚乃本左氏謹忍不放庶幾冠佩長者氣象而其創體張布廣逺如深山大澤龍蛇生焉韓退之稱物肖形斤斤撙節不妄許與如霍大將軍出入禁闥進退有尺寸望之衣冠儼然視瞻不凡信其為古之立言君子歐陽永叔蔓延宛轉蘭筋栁骨如神於縫者滅盡針線之跡但覺織成一片蘇子瞻用其天生自然之材置身九仞之髙下視城中烟火雞犬啾啾舉皆凡近無足道者此數君子稟氣間生御氣合度固已長鳴於百世矣又不知未来天下百千萬年所生文士其情狀設施與前文人又何若也夫氣最善變者也故萬有不齊難得駕馭凡文人御氣以作則者可貴乗氣以加人者不足貴古今稱文人無行正謂乗氣以加人號呼跳躑有狂蕩之態也若夫調伏之氣始由一縷馴致綢紼屈曲縈連或為東西或為南北其為人也必然尊尚道徳樂於政事虛已而下人薰心而憂世志常帥氣百行其旋則可脩辭以立誠垂文以作則載道以傳後之人矣此慕乎古之道者所為文也余所見太原孟左司其氣蓄方剛其行躬懿美其文績古雅間以書見貽謂僕實好文而真識文者也余嗜古文幾三十年中間一二朋徒喪落未嘗敢以語諸人及来金陵一見左司公酷喜其嘗用力於讀古文而考其然不然又嘗工於爲古文其文必放古至於命意遣辭沛乎其氣而不為氣所使况歴官行事四五十年所在稱亷平文之有本也固如是矣凡此皆古文人第一流余焉得不從之游然而孤詣愈深而人從之者愈少徒多為時所憎惡以取窮耳間有好事者則以為業是工專可圖不朽間者之言然矣然朽不朽繫乎天若圖之則幾於侈心生是又不可以不辯也與徐景琛書柯暹六月二十八日執事褻服来訪以慰間闊在他人莫不以為簡而某則以為愛其相知不深矣乎少焉别去於道間教以勿事文而工於字始聴之以為愛我退思之又疑其為薄我欲黙不堪敢以為請執事之意豈以文為難言非區區之所能學耶以字之工足以深於道有不待於文耶以文與字為兩途如公私善惡不容並進欲其專於一有成耶抑以文非君子之所尚耶以某為輕俊不當作文以自壊耶云爾則薄我孰甚且先正立法以文或溺習字或喪志故憂之執事不禁其字而獨禁其文非先正立法之意矣文者載道之器聖賢之明乎斯道者必深乎斯文也為聖賢之徒舍文無以謂非君子之所尚可乎文謂之文字謂之字固不可以相通名然學文者不害其工於字學字者不害其工於文可以交致其力而並進不若公私善惡判然為兩途而不可以並進也雖不可判為兩途亦不可視為一律如仁義二字三尺童子可識可書仁義之理非聖人不能盡而謂字之工足以深於道不待於文者豈理也哉文固難言也固難學也然不悖於理則可謂之文非必聖賢其意淵源其理髙古其詞而後謂之文也自孔孟至於程朱六經傳記之文凡幾類皆聽其傳於世其不得傳者必與孔孟程朱六經傳記之文大相謬戾茍有於此惓惓焉惟孔孟程朱六經傳記之文是法焉窮耳目心思之力以圖之雖區區庸愚亦或可學學有不得不能傳於世亦可稱於人曰文何可以不能學而不學也或曰文必工而後可否則莫為然今之論文者率宗於韓曰識見博議論正地步髙章法句法字法不茍然其言亦未必能六經也韓子學聖人未六經其言而亦言之則今之學韓者必俟其至於韓而後敢言也俟其至而後敢言則韓之後文寡矣今之時又寡矣執事常為文自以為與韓何如何其於已則輕以約於人則重以周與或又曰與其文不工而不傳不若字之工而可傳某則曰寧學而不工不可懼其不工而不學學冀乎成志也不成者才之罪也某寧為此而不為彼也且文雖無孔孟之善更千萬世千萬人傳之皆可見其真也字雖善如鍾王勒之金石一更其摹已不復見其真矣是故今之誦蘭亭之文者皆是識蘭亭之墨者曽幾何人哉况古之善書如逸少歐陽詢虞世南顔真卿趙子昂之數君子未嘗不能文不但模寫成書與人為謄録而已今之名公鉅儒見某未嘗有以不可而不勉使學文者獨執事不欲某學文而多索其書是以匠視某也果愛耶果薄耶幸明教我無使惑於歧則庶乎稱於人曰執事與某為知已也商確之言涉於不敬幸恕答丁鳯儀童軒某再拜鳯儀賢友兄足下僕性迂鄙於世事無所通曉惟嗜讀書以識理道為務故於衆人之所甚好者僕反視以為後衆所忽易者僕則先之惟恐或失以是率常寡合於人矧今居閒處獨宜足下棄去而不友者顧乃貶損道徳貺以雄文藻句又欲推而置諸盧扁大匠之列何足下之用心殊於人人而有以同於僕也莊周氏云逃空虚者聞人足音亦跫然以喜况若足下者奚苐足慰孤寂者耶然足下既欲置僕於盧扁大匠之列又欲自處以病夫棄材之地志峻而辭卑學優而心下古之有徳必有言者其若是乎然僕聞之時不用之謂棄道不行之謂病以僕迂鄙承乏東臺侍從固不可謂時之不用矣然碌碌庸庸無所建明以自表暴於世則是道之不能行也道之不行所謂病者正在於僕未聞已病而能起人之病者也尚敢以盧扁大匠居乎雖然厚徳不可虚辱請以盧扁大匠之事喻之且人之病有瘵者有盲者有痿痺不仁者有結閡者不一類而足也茍使不善醫者治焉則瘵必艾之盲必鍼之痿痺必按摩之結閡必疎利之病去而人無全矣盧扁則不然治人之病必以理元氣為主滋調補養日累月増閔閔然若望嬰兒之長由是瘵者肥盲者瞭痿痺者起結閡者通非善醫乎至若才之生有㰁椏者有橜株者有大合抱者有小拱把者亦不一而足也茍使不善匠者用焉則椏必熨之橜必刓之大必斲之小必􅱅之而木無全材矣大匠則不然於是因木之材椏者為櫨橜者為梓抱者為棟楹拱把者為榱桷非善匠乎嗟乎為文亦若是而已矣故文必以養氣為主氣盛則理充向使不言則已言則蔚然而成章犂然而中度綱目相因首尾相應不猶善醫者必主元氣善匠者必因其材以適諸用乎彼有號文章家者務剽賊以為竒工斲削以為巧元氣日傷材性日失曰吾之文孟軻揚雄之文也吾之道孟軻揚雄之道也噫不亦優孟之似孫叔敖乎是殆病於心而不知朽於根而弗悟也雖有盧扁大匠其能奈之何哉足下有見於此故發言必要諸理吐詞必據諸經猶鍼砭不施而榮衛自周斲削不加而繩墨自具庶幾無是病而有是材也雖然不知足下欲蘄勝於今之人耶抑欲蘄至於古之人耶茍欲蘄勝於今則凡今之後生新進才讀數十巻書者皆能簸弄筆墨操觚引繩以誑耀於聾瞽之俗所謂能若是是亦足矣如欲蘄至於古之人僕則以為必養其氣必畜其材闕天下之闕盡格天下之物盡識天下之闕然後始闕則氣不餒而材不匱雖不蘄至於古之人而已至於古之人矣孔子曰後生可畏今之奮然起於孟軻揚雄之後者安知不在足下乎述懐原學答宗誼三篇比舊尤佳鼓行而前此其戈矛也足下勉之答丁鳯儀書童軒軒白鳯儀秀才足下伏辱牋教有以知足下志古學薄仕進恥科舉之文以為類諸徘優而不足為此皆賢人君子之所宜存非特足下之自志如此而軒之所以望於足下者亦以此也足下之言曰自六經而下越兩漢唐宋諸子百史與天文地志厯數兵畧諸書咸欲一闖其門户沿流溯源欲俾區區道其入海之地豈以軒為粗知理道亦嘗從事於文藝之末者耶夫以學文之人而欲導以入海之地譬猶適九折之坂而驅盲者先登固將擿埴索塗終日而不得其所向也是故其志則髙其學則勤惜乎所驅以向道者非其人也雖然以足下向道之心汲汲於知茍有知者亦將稇載以進况軒辱在知愛敢不聊誦所聞以少答来教乎軒聞之古今之為文者不一言人人殊有滄海之文有江漢之文有川澤之文有溪壑之文不可一律齊也是故六經之為書載堯舜禹湯文武周公孔子之道昭如日星所以扶綱常闡倫理繼天立極垂憲萬世而無弊所謂文章之滄海也下及西漢司馬遷之史記劉向之説苑賈誼之新書所以述時事敷王道以明治化之本實文章之江漢也唐韓愈之原道原人等篇栁宗元之守官四維等論所以正人心救時弊以推治道之迹實文章之川澤也宋有歐陽修之本論曽子固之洪範傳三蘇父子之雜著章疏所以陳鑒戒明得失以備為治之具又非文章之溪壑乎他若莊周列禦㓂韓非鄧析之書雖時時有合於道其視六經之文殆猶滄海之於蹄涔爾烏足以語道哉然學者要必藴六經以立其本貫諸子以資其用蒐百氏以充其才旁及天文地志律厯兵制之書又所以博其趣也嚮使棄其本而不求則亦潢潦無根盈朝涸夕雖有器用之良才識之富其能免於蠡測之患乎故軒以為向道者必以六經為之本也六經皆古聖賢之言也所謂文章之滄海也舍六經而惟子氏之求其殆韓子所謂航斷港絶潢以望入於海其不可也足下所謂自六經以下諸子百氏皆欲一闖其門户則庶幾知所先後矣嗟夫學莫先於立志足下信有志不羣者也志之不已豈徒闖其門户而已固將升其堂而又將入其室也既入其室由是藴之為徳行發之為文章建之為事業固非今之所謂科舉之學可槩論也然科舉之學同本於六經同出於子史百氏而其所以不同者非直以其文有古今之殊蓋以業其文者率多陋儒小夫惟欲記誦口耳之學竊科名以階顯榮逐利禄以活妻子故耳使其誠能以道徳事業為髙則今之學即古之學又何科舉之足恥哉龜山楊氏所謂科舉非所以得人豪傑之士由之而進者此也足下固不能無惑於此而其志不欲以利達為急亦灼灼明矣軒於足下為同門而於所學忝同道故因足下之請自不知其喋喋如此辭鄙義拙惟足下亮擇焉幸甚軒再拜與文宗儒書李東陽承手書知滄洲集已録出將就梓足見惓惓故舊之意亨父有靈當憮然於地下矣但所示様本每巻前一頁有撰述刪定校正刋行等名號似為不典此集為滄洲作何必言撰舊藳去取乃諸同年更議互訂何以獨歸一人校正之職乃後生晚進施於前輩者尤為非當而刋行名氏則宜執事著一跋語殿諸巻後亦未有標於巻首之例四者之中無一可者且今韓栁李杜諸大家集本具在其有無事例不辨可知至於栝蒼乃處州郡名施於亨父又不知何以為據向所奉託止云録藳重訂乃可入梓正恐有失而不意其失之至於此也今望亟以録藁見寄如已入梓亦須除此四行各以巻後五言律一首以補其闕庶免貽笑好事為盛徳美事之累惟深諒此情不吝改作為幸不然則不若不刻之為愈也辱示近什尚稽攀和正坐此事惶惑故未暇及耳不罪不罪上楊先生鏡川公章鎰近承先生不鄙節以所著文稾見授命鎰訂正亥豕魯魚且俾差其優劣顧惟樸騃之資烏足以當昭明之任然而身處寂寞困頓之郷日無轇轕倥偬之務安敢虚辱尊命而不用其心也哉連日莊誦始得以究知萬一蓋先生之文氣燄似韓駢儷似栁要之皆雄健奥衍而無艱澁枯槁之病若走輕車於熟路也若長江大河滾滾東注而不竭也若蒲捎駃騠不施控勒而馳驟於康莊大道也反覆而涵泳目悦心醉恍然深入寳藏珊瑚琥珀精金大貝照乗之珠連城之璧充牣於前則固已識其為希世之珍皆欲把玩而不忍釋手第愧非石崇王愷素有而富畜之者夫豈能妄議其價耶縱使勉强一置其喙必將以好為惡以稱意為怪豈不重貽識者之誚哉雖然願竊有告也粤自西漢文章家若司馬相如董子揚雄劉向之徒卓卓乎不可及其所以傳後者皆不見其多僅僅有數唐之韓栁並駕齊驅其集除詩賦外諸體之文韓三百餘篇栁四百餘篇而已其他不能徧舉今先生文集鎰所見者計自天順戊寅以至成化癸已十餘年間篇數已兼韓栁二家戊寅以前癸已以後未及見者尚多合而計之無慮千有餘篇可謂富矣鎰不敢更以前賢瀆聽如我朝楊文貞為文亦負重名正統間有東里集行世人皆願見而樂得之近者其子導刋其全集人厭其煩未及展巻而先已欠伸矣文果以多為尚哉先生著述不特文耳外又有諸體詩有私抄等書幾至充棟若一一刋行為費甚大莫若斂博而約之迺為精當事在先生親自裁擇以定去取行世者詩歌為類文具諸體各不過三四十篇亦已多矣餘為别録以藏於家可也鎰又惟諸家文集以年所為類者不若以體製為類便於觀覽他日定稾以體類如何愚不自量狂僣之甚望矜恕而允聽之萬幸與李空同論詩書何景明敬奉華牘省誦連日初憮然若遺既渙然若有釋也發迷徹蔽愛助激成空同子功徳我者厚矣僕自念離析以来單處寡類格人逖徳程闕元龜去道符爽是故述作靡式而進退失步也空同子曰子必有諤諤之評夫空同子何有於僕諤諤也然僕所自志者何可弗一質之追昔為詩空同子刻意古範鑄形宿鏌而獨守尺寸僕則欲富於材積領㑹神情臨景構結不倣形迹詩曰惟其有之是以似之以有求似僕之愚也近詩以盛唐為尚宋人似蒼老而實疎鹵元人似秀峻而實淺俗今僕詩不免元習而空同近作間入於宋僕固蹇拙薄劣何敢自列於古人空同方雄視數代立振古之作乃亦至此何也凡物有則弗及者及而退者與過焉者均謂之不至譬之為詩僕則可謂弗及者若空同求之則過矣夫意象應曰合意象乖曰離是故乾坤之卦體天地之撰意象盡矣空同丙寅間詩為合江西以後詩為離譬之樂衆響赴㑹條理乃貫一音獨奏成章則難故絲竹之音要眇木革之音殺直若獨取殺直而并棄要眇之聲何以窮極至妙感情飾聽也試取丙寅間作叩其音尚中金石而江西以後之作辭艱者意反近意苦者辭反常色淡黯而中理披漫讀之若搖鞞鐸耳空同貶清俊響亮而明柔澹沈著含蓄典厚之義此詩家要旨大體也然究之作者命意敷辭兼於諸義不設自具若閒緩寂寞以為柔澹重濁剜切以為沈著艱詰晦塞以為含蓄野俚輳積以為典厚豈惟繆於諸義亦併其俊語亮節悉失之矣鴻荒邈矣書契以来人文漸朗孔子斯為折中之聖自餘諸子悉成一家之言體物雜撰言辭各殊君子不例而同之也取其善焉已爾故曹劉阮陸下及李杜異曲同工各擅其時並稱能言何也詞有髙下皆能擬議以成其變化也若必例其同曲夫然後取則既主曹劉阮陸矣李杜即不得更登詩壇何以謂千載獨步也僕嘗謂詩文有不可易之法者辭斷而意屬聨類而比物也上考古聖立言中徴秦漢緒論下采魏晉聲詩莫之有易也夫文靡於隋韓力振之然古文之法亡於韓詩弱於陶謝力振之然古詩之法亦亡於謝比空同嘗稱陸謝僕參詳其作陸詩語徘體不徘也謝則體語俱徘矣未可以其語似遂得並例也故法同則語不必同矣僕觀堯舜周孔子思孟氏之書皆不相沿襲而相發明是故徳日新而道廣此實聖聖傳授之心也後世俗儒專守訓詁執其一説終身弗解相傳之意背矣今為詩不推類極變開其未發泯其擬議之迹以成神聖之功徒叙其已陳修飾成文稍離舊本便自杌􅑾如小兒倚物能行獨趨顛仆雖由此即曹劉即阮陸即李杜且何以益於道化也佛有筏喻言捨筏則達岸矣達岸則捨筏矣今空同之才足以命世其志金石可斷又有超代軼俗之見自僕遊從獲覩作述今且十餘年来矣其髙者不能外前人也下焉者已踐近代矣自創一堂室開一户牖成一家之言以傳不朽者非空同撰焉誰也易大傳曰神而明之存乎徳行成性存存道義之門是故可以通古今可以攝衆妙可以出萬有是故殊途百慮而一致同歸夫聲以竅生色以質麗虚其竅不假聲矣實其質不假色矣茍實其竅虚其質而求之聲色之末則終於無有矣北風便冀反復鄙説幸甚駁何氏論文書李夢陽某再拜大復先生足下前屢覽君作頗疑有乖於先法於是為書敢再拜獻足下冀足下改玉趨也乃足下不改玉趨也而即擿僕文之乖者以復我其言辯以肆其氣傲以豪其旨軒翕而􅝧嵺僕始而讀之謂君我詼也已而思之我規也猶我君規也夫規人者非謂其人卑也人之見有同不同僕之才不髙於君天下所共聞也乃一旦不量而慮子乖於先法兹其情無他也子擿我文曰子髙處是古人影子耳其下者已落近代之口又曰未見子自築一堂奥突開一户牖而以何急於不朽此非仲黙之言短僕而諛仲黙者之言也短僕者必曰李某豈善文者但能守古而尺尺寸寸之耳必如仲黙出入由已乃為舍筏以登岸斯言也禍子者也古之工如倕如班堂非不殊户非同也至其為方也圓也弗能舍規矩何也規矩者法也僕之尺尺而寸寸之者固法也假令僕竊古之意盜古形剪截古辭以為文謂之影子誠可若以我之情述今之事尺寸古法罔襲其辭猶班圓倕之圓倕方班之方而倕之木非班之木也此奚不可也夫筏我二也猶兔之蹄魚之筌舍之可也規矩者方圓之至也即欲舍之烏乎舍子試築一堂開一户措規矩而能之乎措規矩而能之必并方圓而遺之可矣何有於法何有於規矩故為斯言者禍子者也禍子者禍文之道也不知其言禍已與禍文之道而反規之於法者是攻子亦謂操戈入室者矣子又曰孔曽思孟不同言而同至誠如尺寸古人則詩主曹劉阮陸足矣李杜即不得更登於詩壇詩云人知其一莫知其他予之同法也堯舜之道不以仁政不能平治天下者也子以我之尺寸者言也覽子之作於法焉蔑矣宜其惑之靡解也阿房之巨靈光之巋臨春結綺之侈麗楊亭葛廬之幽之寂未必皆倕與班為之也乃其為之也大小鮮不中方圓也何也有必同者也獲所必同寂可也幽可也侈以麗可也巋可也巨可也守之不易乆而推移因質順勢融鎔而不自知於是為曹為劉為阮為陸為李為杜即今為何大復何不可哉此變化之要也故不泥法而法嘗由不求異而其言人人殊易曰同歸而殊途一致而百慮謂此也非自築一堂奥自開一户牖而後為道也故予嘗曰作文如作字歐虞顔栁字不同而同筆筆不同非字矣不同者何也肥也瘦也長也短也疏也密也故六者勢也字之體也非筆之精也精者何也應諸心而本諸法者也不窺其精不足以為字而矧文之能為文猶不能為而矧能道之為仲黙曰夫為文有不可易之法辭斷而意屬聮物而比類以兹為法宜其惑之難解而諛之者易搖也假令僕即今為文一通能使辭不屬意不斷物聮而類比矣然於中情思澁促語嶮而硬音生節抝質直而麄淺謭露骨爰癡爰枯則子取之乎故辭斷而意屬者其體也文之勢也聮而比之者事也柔澹者思含蓄者意也典厚者義也髙古者格宛亮者調沈著雄麗清峻閒雅者才之類也而發於辭辭之暢者其氣也中和者氣之最也夫然又華之以色永之以味溢之以香是以古之文者一揮而衆善具也然其翕闢頓挫尺尺而寸寸之未始無法也所謂圓規而方矩者也且士之文也猶醫之脈脈之濡弱緊數遲緩相似而實不同前予以柔澹沈著含蓄典厚諸義進規於子而救俊亮之偏而子則曰必閒寂以為柔澹濁切以為沈著艱窒以為含蓄俚輳以為典厚豈惟謬於詩義并俊語亮節悉失之矣吾子於是乎失言矣子以為濡可為弱緊可為數遲可為緩耶濡弱緊數遲緩不可相為則閒寂獨可為柔澹濁切可為沈著艱窒可為含蓄俚輳可為典厚耶吁吾子於是乎失言矣以是而論文子於文乎病矣蓋子徒以僕規子者過言靡量而遂肆為􅝧嵺之談擿僕之乖以攻我而不知僕之心無他也僕之文千瘡百孔者何敢以加於子也誠使僕妄自以閒寂濁切艱窒俚輳為柔澹沈著含蓄典厚而為言黯慘有如搖鞞擊鐸子何不求柔澹沈著含蓄典厚之真為之而遽以俊語亮節自安耶此尤惑之甚者也僕聰明衰矣恒念子負振世之才而僕叨通家肉骨之列於是規之以進其極而復極論以冀其自反實非自髙以加於子傳曰改玉改行子誠持堅白不相下願再書以復我再與何氏書李夢陽前書與子論文備矣然僕猶謂不證諸事則空言不切不切不信夫子近作乖於先法者何也蓋其詩讀之若搏沙弄泥散而不瑩又麄者弗雅也如月蝕詩妖遮赤道行是耳然闊大者鮮把持又無鍼線古人之作其法雖多端大抵前疎者後必密半濶者半必細一實者必一虚疊景者意必二此予之所謂法圓規而方矩者也沈約亦云若前有浮聲則後須切響一簡之内音韻盡殊兩句之中輕重悉異即如人身以魄載魂生有此體即有此法也詩云有物有則故曹劉阮陸李杜能用之而不能異能異之而不能不同今人止見其異而不見其同宜其謂守法者為影子而支離失真者以舍筏登岸自寛也夫文與字一也今人模臨古帖即太似不嫌反曰能書何獨至於文而欲自立一門户耶自立一門户必如陶之不冶冶之不匠如孔之不墨墨之不楊耶此亦足以類推矣且仲黙神女賦帝妃篇南遊日北上年四句接用古有此法乎水亭菡萏風殿薜蘿意不一乎蓋君詩徒知神情㑹處下筆成章為髙而不知髙而不法其勢如搏巨蛇駕風螭步驟即竒不足訓也君詩結語太拙易七言律與絶句等更不成篇亦寡音節百年萬里何其層見而疊出也七言若剪得上二字言何必七也僕非知詩者劇談偏見幸君自裁之耳君必苦讀子昂必簡詩庶獲不逺之復亦知予言之不佞不然終身野狐外道耳狂悖弗自覺縷縷至此悚懼悚懼明文海巻一百五十一
