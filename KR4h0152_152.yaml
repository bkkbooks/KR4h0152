body:
  text: 明文海巻一百五十二餘姚黄宗羲編書六論文復李生書趙貞吉足下兩書暨文二篇問予曰可以名世否嘻此特舉業體式之稍變耳然筆鋒亦未甚振也以此逐取青紫則易矣欲駕於作者之門則未也夫世之取青紫者何限得此又奚足泰哉由生之言充其意豈止於薄青紫而不取將不作希文已上人物直欲追古之聖哲而求得其所為道其志大矣乃徐察其量則似以虚為實得少為足而已安於卑近矣此又何説也夫步象蹠者不由兔徑恢大業者必宏逺圖昔古公欲大周之業必遷於岐山之下居焉陶朱欲富其積必處於定陶天下舟車財貨輻輳之處然則士之欲追古聖哲而求得其所謂道其取材畜徳當何如耶乃若足不出於百里目不接一勝友抱兔園寒陋十數册故書操舉子活套亹亹不休之管以雄長於目不識一丁腹無一滴墨汁之輩之中偃然自大曰吾以斯文自任前無古人後無来者有識在側奚啻笑河伯之汨於秋水又迺嘆溝澮之盈於屋霤人以為愧矣生謂之然乎其不然乎雅聞生年甚少頃嘗習靜山寺奉母養志文史自娛俯仰今古蓋吾鄰郡丹山之雛也豈不愛念嗟嗟人亦有言年近三十憂老將至世事易纒糺光隂易懡㦬忽忽淹留壯老逼人打入凡俗隊中亦不難矣可不省哉可不畏哉蓋士學道而無師承祗以文字相誑誘者畢竟墮此耳某老矣嘗思得一佳士而寄意焉所以珍生者甚至生毋索髙價於吾之門哉韓退之又將三沐而三薫於子須謹避之耳聊發一笑與王翰林槐野論文書劉繪弟繪不佞多兄愛納為知已且不猥以卑俗謂弟為知文以是相見竟日不為别談商論文字不置每一論起雖列瓊漿不注也披𤣥圖不睨也兄以天才絶調而嗜文若斯則惡得不宏覽研奥而振名一代也前夕所議未能畢陳今出省休沐敢為通記幸鑒鄙畧弟睹羲軒以下文字咸發天地隂陽之秘人事之要家國天下之務其理著明矣文不切所用則聖賢且渾爾噩爾安所尚文哉故主須以理充須以氣其説尚矣弟謂辭者文之質也理匪辭不達氣匪辭不鬯三者不可闕一焉而體格在其中矣是以文之體格無定眡三者所究耳古今之辭盡於六經理相統一韓子曰易竒而法詩正而葩春秋謹嚴左氏浮誇正道氣與辭也天地之理中正焉已矣其氣深厚和平其辭大雅宏暢則聖人之文也六經是已孔子刪述自謂文王既没文不在兹乎善學孔氏者惟孟軻一人其後諸子理不足而任於氣故其辭醇疵相襍荀卿以下莊騷太史董仲舒賈誼劉向揚雄諸人窮理盡性雖不能如聖人而纂辭摹像則標凖六經故旨趣各隨所見而篇章音欵莫有踰焉東京煜煜猶能相匹延及魏晉以後而雅道漸以陵夷至唐獨得韓愈敏悟自言見時文忸怩不寧今讀其辭出入孟荀而風骨類馬遷劉向夐然其品也藝苑英少亦有輕訾詆者蓋未深究耳其後才桀之儔各殊其辭以求勝欲自勒一家騖髙者𤣥亢而無據崇實者質塞而無華令六經之辭邈乎莫追求賈馬匡劉不可復得矣仲尼曰文質彬彬然後君子蓋謂文焉弟又思漢以下至趙宋能文者雖各異辭要皆變於六經且如董仲舒京房焦延壽揚雄變於易也賈誼鼂錯司馬遷變於書也匡衡劉向下逮班固崔駰馬融蔡邕變於詩也臨諸子所著體而察之當自見矣蓋六經文之海嶽具焉後之士雖稱瓌竒而極駿雄莫能出其軌矣故惟狂蕩之辭洸洋淫靡之辭纎細峭刻之辭慘礉短長之辭是其理蔽其氣衰非聖人之書不可讀也弟又思建安諸子雖號靡麗然典峻不可少當稱為小雅之變二應以後六朝如二陸三謝至任彦升顔延年沈休文薛道衡輩世人往往俱以纎綺眡之然鑄景凝華隠隠十二國風之變也宋儒詳於理學而辭則又落一格乃有古文今文之遼絶吁殆難語矣周茂叔通書程伯子定性書張子厚西銘正䝉則亦變於易者也歐陽永叔本論程叔子漢州䇿問數篇朱文公學庸二序疏明純正則亦變於書者也是以古今明文咸托辭以傳若雕藻剪綵爓然者斯可美也周子曰美則愛愛則傳詩曰追琢其章金玉其相謂錯采修辭也兄謂見偶語多者輒不喜此信然矣専攻偶對令氣不疏非文之佳矣但弟思天地之數竒偶而已八卦九章皆相對待是以乾坤日月星辰霜露江海之支派山嶽之峰巒男女形像耳目鼻兩孔口齒上下四肢百骸種種相對不爽蓋自然理數也豈於聲音之道獨散漫而無合是以聖賢之文雖不專工偶對而屬辭比義有不得不然者晦菴謂鄒陽書是作對字彼方陳愬梁王欲自發穎慧鬱思求動其王而解於難也乃謂西京之文衰自陽始誚之過焉嘗翫典謨宵中星虛日短星昴五典克從百揆時叙惠迪吉從逆凶無稽之言弗聽弗詢之謀勿庸詩參差荇菜窈窕淑女五月斯螽動股六月莎雞振羽日升月恒竹苞松茂朱英緑縢貝胄朱綅則鏘鏘艷艷聲色備焉後之文士揮筆含輝敭采發撝理道豈不蔚哉但勿令若宋齊藻野縟川以應詔令杏花菖葉宣於制䇿一時好尚致論卑氣弱大損於治運儒道則文之厄矣至宋儒語録深可疑怪齊梁才士逸人偽為佛氏度化庸俗多為此語故釋子有東林語録盤山語録此類且多宋人蓋因之也是以宋儒之學多襍二氏翫其辭而不自覺蘇黄二家才髙學襍益難語矣弟於十八九時鋭志效古文而乏師友其藝業多不合於有司今幸得綴行於交㳺之中時參金閨之彦承蚤晚雅論乃復得理舊緒承不棄又深相善因吐管窺之見不勝慙恧前所示論序其列事摛辭瑩瑩乎兩漢遺史也其外襍著記説間有曼羨泳沫似喜鄒衍環淵之談矣弟繪固陋言缺首尾幸終令音更宜細論如何答祠郎熊南沙論文書劉繪叔仁兄足下都城外與傅觀遂同餞後音問遂杳見南来士人即訪起居七月四日得手書情雅宛若弟亡文辱虚推過實知嘉意引誨令人慚阻靡寧昨年冬弟赴渝聞兄取道荆州喜甚急趨一㑹至則又相參差循江訪之夷陵乃知先下武昌矣湘水蒹葭𣺌不可及悵然入峽有懐若蘋守渝州甫一年新學吏道與百姓親悦素寡材術無能施為獨幸風土去洛不逺鄙性恢恢多可無甚不快之狀也此間州縣閡越穪多事簿書堆積經史雖不敢離但不能専究心此矣數年憶兄閎覽益肆常州職業清散所著必有大快心者一時士夫力興古文兄可謂傑出矣来教云文字尚未可作劉敞謂歐九未讀書弟慮元城頗涉誇矣今元城文字俱在與永叔何如耶孔子曰辭達而已矣文縁理道疏其性情其有述陳引喻或散或偶襍撰不同要之抽思就班累數千百言期於明已意使信諸人也藻麗研深實盛華茂自不能無使已意既達不必繁辭勦説務為馳騁若理性不明而搜索異籍反為文之瘴也且如序闕最為難闕贈送序記晉魏以前皆無韓蘇叙眼前事用秦漢風骨筆力隨人變化然每篇達一意也今作者往往一篇説三四端緒或文勢方行從中突起一二意使讀者不識立論所歸至篇末彼作者亦自迷究竟潏漫齟齬難乎収拾恐即所謂不能達也今有謂達者但曰直陳去雕飾甚非旨也夫文章雕飾自不可少深厚爾雅乃其要焉詩曰追琢其章金玉其相言文質也若夫艱深詰澁不可句讀又文之僻也殷盤周誥書多脱簡間有後人參入劉子駿謂朽折散絶博士集而讚之是也弟又疑世之慧靈竒士詞雖不僻然過學韓蘇紆徐太多沈辭鈎思營魄游心令人讀之少不體察則景滅響伏而不得其意趣此雖天機逮意其綿邈寂寞終非示我周行之義馬遷微婉處最稱𤣥澹然省文超徑非人所及也今學士大夫與人談文有謂必購集異書多少至列書目示人曰某與某未能見惡能為文哉弟䝉陋謂此為以虚聲哃喝人可也謂此為心有闇蝕亦可也弟誠非自委庸媠仰思先哲有可據焉古今文士大者如莊周太史韓退之栁子厚其自叙所學皆止六籍而下逮諸子蘇子瞻在海上以抄得漢書為樂當時漢書士夫見者且少彼謂搜購異書収藏備學者格物一事可也假令必謂盡見世所藏書而後下筆為文取異籍所載資以粧飾侈麗則世有英妙弱齡之士無能錯采凝𤣥先飛聲藝籍之林者矣仙釋二氏弟愚益不喜讀蓋以非聖之書吾既不從其道却欲借彼之言為吾文資不知所為文者將何為乎秦漢以前佛書未入中國文士辭采煜煜後莫倫比石渠白虎諸儒各抱一經皆能垂光百世故知為文夾二氏語者此唐宋間襍學之弊也昌黎不道二家語其與二家言亦舉六經之言告之子厚謂某秀才作文多引莊列頗奪正氣此論凜凜至與二家言便盛稱其教而襍諸戒律毗尼之説此却不自覺也蘇氏記大悲勝相諸作盡入纂言復為偈語準楞嚴法華張皇博譬此子瞻潏曼乃不宜傳曽子固亦以此謝荆公也弟愚謂今之英哲鴻儔但抱殘經究其宏緒而屬文列事能準荀孟以下若賈誼董仲舒馬遷劉向則文可逼古人也若弟區區不肖何足為道庚子嵗别唐應徳丁寧祝我早晩必與叔仁相論謂兄思深而學博也今兄移官適就應徳之居彼此又各暇豫此天欲成其二美矣有書寄應徳當為弟轉致江州閴寂秋興滿懐襍詩二十首極知鄙俚萬里見意便中賜報幸甚與從姪桂芳秀才論記書劉繪書示桂芳姪昨議記尾數字未得與姪細論正為汝未習古文耳名為古非但與舉業不同將與今文不同矣直以舉業言之舉業貴淺淡平順著一刺眼贅牙字句不可若古文正欲不與舉業同猶舉業正欲不與古文同且如釋家梵語道家清詞法家招議曲家腔韻其命意用字各有不同若今法家參一舉業語舉業參一辭賦語便可笑爾近世古文法不傳世人亂作任意漢參入唐唐參入宋乃如以釋入道以道入法以法入曲以曲入時文作文其誰辨之即能辨之其誰信之也昨均田記平平叙去未敢盡用古人法却恐艱澁難讀不便觀覽者至末二行畧為蟠挐頓挫見文字性氣不然只如食肥肉一噉可盡不知髙賓乃取雞助是為足低徊咀嚼矣記尾謂太守獲上有知已者所以將前役盡付託之不拘以文法太守乃得出胸中之竒克襄此大役也為咏歎褒奬之意須知橄欖味方可語此亡竒張敞傳胷臆結約固無竒也徽字是用易坎象上六係用徽纆文墨即文法可報公不必更易為妙他日遇知者許兹文當在此數語可耳東曹紫峰侯一元伏誦還教文采絢爛上下馳騁數千百載若運指掌即此尺牘亦足使人愛玩文之至也自孟軻七篇非門人所述漢唐以来崛起雄鳴於世者比比然也宋玉遭毁乃賦陽春揚雄慕古悔其少作英雄玩世類非誠語由今觀之悲秋之調不離楚聲太𤣥之撰特變音節雕蟲篆刻故步猶存惡在其悔之也昌黎云已所大慚人以大好豈謂光範三書等乎太白陋其大鵬賦至欲燒焚何不更作而直並存於世貽其慙陋也故僕以為盡英雄玩世之語雖然吾文也有涯吾意也無涯諸賢之不自慊豈不亦有誠然者乎至如吾兄専事靳固從人索毁撝謙之美固絶百代雖至寳不容韜襲亦恐異時石鼔不完竹書相亂將貽後賢之歎息也何以明其然耶始僕於鹿城見兄贈雪牕道士詩奇之竊歎兄以長吉之才發盛唐之調富而不靡奇而不怪可謂傑作客又言某壁蜃江行者亟往索之主人則亡之久矣今不識此草兄尚能存否也夫人壽幾何而俟河清嵗月逝矣猶冀来日斯不亦過遜左計矣乎弟之於兄無能為役徒以臭味不敢自外竊附建安諸子之區區存其敝帚耳如秋至寒蟬疲曳嗚咽斯亦情之至悲也語云誰為為之孰令聽之惟兄知我恐一日解綬不復嗣音惟亮察柬晁春陵侯一元某東海顓䝉之鄙人也濩落無用而有嗜古之癖自五六嵗知書迄今四十餘年矣中嵗則嘗妄意於道屏諸所嗜自以一切可引却至古文歌詩則如饑之食寒之褐意固䕶不能去嘗竊以物有天性古文其非吾之性耶獨何以篤至若是因妄謂文道一致耳言不文即其道腐道而畔即其言也窽以是雖齒腐髮落而嗜不衰然而未嘗出以示人雖先達如漁石唐公古沖李公枉見知賞誘引諄諄而未嘗一獻其所作若此者於鄙意蓋有三焉敝帚自貴古今通弊他人業書愈進則愈益僕業書愈進愈損當其得意未始不欣然也信宿視之則已厭去是以篋中之藳每欲燒焚而又以精力所成濡遲未忍冀以来日悉加芟潤或可以示子孫至於他人固不敢出恐以僕自多河東之美貴其白豕也此一事也又僕竊見古今之士類多相襲步步趨趨以為肖似顧索之毛物則是矣神駿蔑如其不然者即又肆筆矢口同波末世僕於蔡白石文序中具道之僕平生古文所最好者莊老遷固雖才拙不能效其一語然至於末世之文則觀之惟恐卧也誠思一遇其人相與議於牝牡驪黄之外而行求天下數十年而未有得僕即有所成亦安敢以豳人土鼓揚摻桑濮之堂乎此又一事也夫文者何也人之言也言者何也人之志也故有不得已而言善者鳯律不善者梟噭其皆有不得已焉而聞者自得其美惡言者蓋不知也故言有不能不聞而不可以求聞言而求聞者其惟俳優乎呈能鬻技蘄以入人而不知其言之所自出可哀也僕幸無饑寒之累又蚤知身名輕重不忍以隋珠求雀故每黙然退處於無事而無恨色此又一事也僕懐此三者將終身焉誠冀餘生有下中之壽掛冠解組勑斷家事獨攜床頭老易遍遊名山以伸其志然後陶情鑄意俾平生臭腐一化神竒非敢望髙揖千古亦庶幾不并腐草木儻得如伯牙暫遇鍾子郢人一對匠石無復恨者矣否則揚雄期後世子雲莊生齊萬世旦暮此僕之心也乃近者蒲栁之質日變以衰牙齒全豁鬚髮漸白追存平生親愛多為異物身非金石必且銷毁而僕進則方嬰簿領退則未畢婚嫁恐一日楊生於肘神乗於馬則素懐長負終不得抒憤懣以酬天地則私恨無窮迺遂以暇日命子弟悉蒐舊草為十四帙詩六文八間有觸時妄發存而勿闕以竢論定春蚓秋蟲非不知其猥雜亦各其韻也櫝而藏之以示子孫焉雖然僕聞之風雲龍虎以性感水火燥濕以類應僕於當世鉅公酷肖遷甫者不能好也乃獨心醉於大賢時時窺見一斑歎其蔚跂以為妙絶比觀聚樂堂編不拘拘遷固牡驪既已相隨絶塵矣此僕所謂其人也越人有言心悦君兮君不知敢獻所撰拙帙十四隨滌器以見於堂下惟少垂覽焉答熊元直檢討薛應旂昨都下之聚過承念舊依依不舍然亦各有人事往復總不能劇談細論如豫章時矣南還又承逺餞委曲雅誼何以當之留都事簡易於習懶京師一切書問將作復止雖知已如元直亦遂疎濶抱歉何可言既辱書惠并示諸製啟函讀之如對元直甚慰逺懐鄙人無似百無所成惟從事於文頗專且乆兹雖屏去尚知一二敢獻愚衷古昔先王未嘗有意於為文六經之作所以闡天地之藏發心性之藴紀綱人事維持世道真如生人之飲食裘葛不可一日闕焉者皆不得已而有言非無用之空言也孔孟繼作亦若是焉而已戰國秦漢之文人始各逞其辭説以馳騖於天下中間雖不無可觀而要之至理率多悖繆蓋皆無得於心而有意於為文徒以華世鼓譽而無益於民生日用是豈先聖賢之所謂文哉唐宋數家雖其風容色澤畧貶於秦漢而意義所存則或有庶幾於道者奈何今之為文者動稱秦漢而修詞造語依傍影響如小兒之學舌優孟之作叔敖而自已之肺腸心膂得之於稟受者反若為其刳而噤不能自出一語可笑也其有稍知此義者則又髙自標致務為杜撰而於古人之成法一切抹摋自謂成一家言擺脱習氣乃顧為支辭蔓説反有晦於明白簡切之理則又幾於因噎廢食者矣然則必何如而後可孔子曰辭達而已此千古為文之凖則也故為文者若胷中真有一段意思直是見得透徹不得不發者惟據吾所見而直書之意盡言止不較工拙自是有用文字使本無可言或言而必欲隠伏避忌則固當涵泳停蓄正不必綴緝支吾而虚費精力為此無益之事元直以文為職者固未免有應酬之作但中間亦自有隨機發明道理處不有益於人必有益於已庶不為無用之空言矣易曰修辭立誠韓子曰仁義之言藹如元直但立誠學仁義則不患文之不如古人也恃在知愛不覺狂露惟采擇之駁喬三石論文書王維楨鄙人所撰述竊自知陋以視他人率皆面謾故以投公誠謂能指迷發昧令不乖所適也乃今所稱予我者一非我所有不副本初就正之意與他諸面謾者未之或殊即公自以為業已命之然不能令僕信也何也今海内翰卿墨士彬彬然興矣其擬則史遷之作者不可勝數往往藉格襲詞猶之畫臨粉本書摹法帖求一毛之似幸半體之同以為竒絶固未有蜕棄陳骸自標形神者也劄稱僕云苐取其指不襲其跡此神化之道僕安能及之而謾以相加也文章之體有二序事議論各不相淆蓋人人能言矣然此乃宋人創為之宋真徳秀讀古人之文自列所見歧為二途夫文體區别古誠有之然固有不可歧而别者如老子伯夷屈原管仲公孫𢎞鄭莊等傳及儒林等序此皆既述其事又發其義觀詞之辨者以為議論可也觀實之具者以為序事可也變化離合不可名物龍騰虎躍不可韁鎖文而至此即遷史不皆其然乃公亦取之加僕何言之易也晉人劉勰論文備矣條中有鎔裁者正謂此耳夫金錫不和不成器事詞不㑹不成文其致一也文之不易言也若是僕安能及之日来誦覽大撰數篇總之整雅宛密厥初營搆布置費心力矣因取遷史較之則遷乃疎鹵矯健門塗雖殊而要妙均也自僕繹思遷史累年禩矣然或由本以之末或操末以續顛或繁條而約言或一傳而數事或從中發或自傍入意到筆隨思餘語止凡若此類不可毛舉竟不得其要領乃今觀公之撰如此則作者自命可也何必古同哉且公少時即好習古文詞到今猶辭云未能也而僕習之又最晚重以性資學識並謝上才豈克有造哉嗟乎已矣初計出城得乗間一語比山游復以賞眺妨焉然中曲念之幸承劄諭聊此佈復自游歸便爾多俗不能更往為别倘軫教懐無恡嗣音與聶雙江張岳錢令過敝邑辱賜今年鄉書洋洋乎其言之也披巻疾讀心豁目開然其中有可疑者不能黙黙太抵今之論文章者必曰秦漢蓋以近時之軟熟餖飣為可厭也講讀者必曰自得亦以傳註之拘滯支離學之未必有得也夫真能以秦漢之文發其胷臆獨得之見洋洋乎通篇累牘而於根本淵源之地未必實有得焉君子未敢以作者歸之也况所謂秦漢者乃不出晩宋之尖新稍有異於今之軟熟者爾實亦無以異也暗鬱而不章煩複而無體奔走學者於譎誕險薄之域反不若淺近平易猶得全其未盡之巧之為愈也秦漢之文見於班馬氏所載多矣其深厚醇雅之氣明白正大之體曽有一言一字譎誕乎哉今之自詫為秦漢者恐未必於班馬之書有得也有得於中則其發也必不掩矣乃欲厚自與而疑學者其亦可悲也夫自得之言出於孟子其意亦曰漸漬積累自然有得爾夫豈必於排擯舊説直任胷臆所裁而謂之自得哉三代而下數聖人之經秦火之後人自為説至程朱始明矣雖其言或淺或深或詳或畧然聖人遺意往往而在學者不讀之則已如其讀之也豈可不深造而致其詳詳讀古人之書而有得其淺深詳畧之所存意有未安姑出已見為之説期於明是理以養一心而已矣不在創意立説以駭人耳目也有是心而言又未或當其自蔽也甚矣嗚呼學之不講乆矣文章議論古人講學不以為先也今也窮日力以從事於此猶不得其要領况其逺且大者乎此類得失本無足辨然塲屋去取學者趨向繫焉新學小生心目謭薄一旦驟見此等議論必以為京師好尚皆如此其弊將至詭經叛聖大為心術之害有不可不深憂而豫防者伏枕無聊故一伸其拳拳之喙伏惟裁教明文海巻一百五十二
