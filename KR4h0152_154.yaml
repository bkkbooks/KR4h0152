body:
  text: 明文海巻一百五十四餘姚黄宗羲編書八論文答陳魯南太史論唐人詩文馬一龍古之作者文若六經孔孟詩若三百篇離騷又何如其次也漢魏以下韓昌黎栁栁州之文辯博雄肆李謫仙杜少陵之詩豪邁雋逸唐人粗可傳誦使天下後世不敢美惡置喙者惟是四子而已然栁已不及韓杜不及李其間幾微之相去千載無人招四子精爽於几案間與之論折其衷余每見古人製作妙在意與趣耳意趣之妙復所得有最次若栁州意在文而昌黎無文文以達意而意不留少陵趣在詩而謫仙無詩詩以發趣而趣自成故凡意趣自然之適若決河防橫潰四出而其縱横曲直廣狹淺深無所往而不洋溢瀠洄以為湍瀦以為澤凝澄為淵沚衝激為淙決之殊西東搏之而使上下變不一而體各足此無他其本裕而其出無窮其用不竭其幾不息其勢不可遏有如此者故古人之不可及在意趣意趣所至而充其才以張弛造化出入古今貴其在我者有本也本之不裕則吾奔走受役於章句聲韻之末牽引附合勞攘百倍而筋力憊矣蓋吾身與衆物等而心統衆理為天地萬物所同出之原其體至虛包涵受納無物不備宇宙之大日月星辰山川草木鳥獸蟲魚昭著於上下者皆吾身之所有取其所有以為適感者應則感無常而應常裕本之在我為意為趣而物與我自相參焉然意發於内其機觸於有感趣得於外其妙通於罔覺故有感之機動於天罔覺之妙入於神惟神惟天斯可以言作者否則文焉詩焉或狃於意而不化或徇於趣而自苦其下相禪以為能家所竊不過古人糟粕無復有自其心出者此猶借西江之水汲以盈轍而引之使流其進不能踰井繘所緒出者不能蔽牛跡方寸之葦汨刺其中則徃過者不能續何也非其所自有也所得幾何哉四子以下相襲為世痼乆矣公能脱去病根入栁杜之門而庶幾可登韓李之堂猶惜少時束縛就舉子業雖得知本之學而其充實發越處或未盡此心之量僅與唐人比之亦是限於命者與達時明余子南等論文馬一龍来諭時文古文某不諒諸兄何見也豈以科舉中式者為時而以碑銘叙記詩賦者為古耶殊非知道之語前輩論文章以理為主以氣為輔而作文者必先立意然後定格然後命詞意為上格次之辭為下時文古文一也其中式則時文有排比對待之病但意在格中何憂不式格髙意病雖式不文若排比對待必有意義不害其為時亦不害其為古耳立意淺近雖三墳五典之體繫傳檀弓之言無裨於道無闗於世教安在時與古之間吾未能時古益莫之知矣竢他日面隲與季朗書劉鳳與兄從事最乆情無不相悉然僕多忽忘願請者數復不訖憶去嵗淮北遊時繫念况從此浩不可期中夜思之驚嘆不寐所共厲者文兄才雄倬衍麗非僕所望若其精理覈詣僕嘗得質疑焉不可一日離舍此逺去此私所悵怏慨惋不自適者也所欲有謁且摭一二夫經傳周秦間書此詮言之軌然意所向何古之法萌動於中茫昧未顯非所思存譬水之浸淫因導之流故辭假之手少復綜緝而已使坎未盈豈能强決意未蓄手能為之辭乎故肆意而作縁手而奮者善文也規似揣裁合變赴㑹融絡構冶連類錯繪者文之牽泥未光也所以力去陳襲剷削雕鑿必直致飇舉雲駭霆疾而含混悠逺英嘅靜摯未嘗有意而法度在焉若莊氏綜辭直無所謂而縱横數萬言無不燦亮瑩潔秦儀睢澤立談頃刻竒辨藻辭勁氣逸彩豈思構組撰哉皆自然得之故敏速倉猝應機蠭涌其斯之貴若其淹緩研唫采摭按覆則雖肆麗而典峭越以譎尚不足難而况彼弛解穉淡散亂拙弱若今之所為者何算也且兄與僕力開新體首闢莽翳何有所藉寄假待而小人大言過不自愧翻謂穿綴又謂多故實夫不能解而妄詆猶之可也謂之易而不為抑何罔之甚哉且假能為何不為僕輩竒恣佚宕而乃守彼區區不足一笑而自謂能將誰欺哉故實者據事陳義固必及之初非藉此而工彼自不學而患其奥僻則必如彼而後善歟僕往為詩頗咨淳父未嘗忘彼小人者僕輩誨導之多矣每操戈彎弓何鄙之甚兄自今冀共閟之勿輕語人也今天下半為王氏學豈王氏才勝兄與僕哉故藉勢位耳兄邇者立致青雲之上海内當復為魏氏學不乆矣魏氏學行亦何異僕哉竊所憤悒不平欲一洩胷抱以寄之無窮者不惜重言之夫涉世取位隨時屈伸兄之篤密亦似太甚雖鑒僕疎誕遭尤招嫉是矣事有固然無足深慮機變權畧辨識籌計神鬼隠幽世豈有能出僕輩度内者哉然不能兼得斯亦非慮之所及矣侃侃正議莊色峻嚴敦重風望不少假徇彼終何所為蝎螫哉得失有分非人能為煦煦和謹徒使渫惡恣嫚悔耳幸無為鑒之過茍未然者願有所復無惜與陸芝秀才書黄省曽省曽白紫芝秀才足下近承枉趾間金生用出吾子贈頌王君仲回之歌推其文章直曰竒於天下夫友朋相酬固亦貴於吹榜然不宜如此之太甚也夫文之欲竒於天下也亦難矣前哲姑置勿論國初宋王誠意伯諸公博洽聰穎倫絶一世然又倥偬兵馬煎熬籌濟卒皆不能大暢以並於古人逮於東里徒持渾厚閒淡之體以主張後進而委靡不振之風亦由此而開矣至𢎞治間有羅公玘者好為竒古而率多怪險餖飣之辭居金陵時每有所造必棲踞於喬樹之巔霞思天想以搆脈意或時閉坐一室客有於隙間窺者見其容色灰槁有死人氣皆緩屨以出吾蘇都公少卿與伊乞厥考墓銘銘成告少卿曰吾為此銘瞑去四五度矣今其所傳圭峰稿者大抵皆樹巔死去之所得也宜其超曠今古而中契昌黎栁州者亦甚鮮矣至有不可讀句而誦者是乃好竒之膏肓也夫羅公好竒終其身而且不得以擅竒名於天下仲回者年始三十其為文僅有數首亦不過談笑觴俎率意為之而已予嘗見之生澀偏苦間似釋氏之言然去俗趨幽是其長也竒且未得而安能遂擅乎天下之竒哉此吾子不思之過也又嘗見人稱頌之作稷契加於汚吏李杜獻於兒曹肺肝沈昏不可救藥吾子非其流也幸勿效之幸勿效之子若欲知當世能文之士愚雖不能了而所遘接者亦不下數十家各有門户各有短長待吾暇日悉當抵掌而論省曽再拜答戴岳書黄省曽吾姑壻定逺公之卒也數年矣吾子不以省曽為陋而銘書之曠於數年者一旦而諉之於僕僕固非其人也敢不執筆以報吾子之盛心然竊觀今之世自王公而下其淫惡滔天孱細屠販之輩不為少矣其死莫不有銘其銘莫不稱述其善蓋淫惡滔天孱細屠販之家其藏篋嘗牣而不匱不過少為金帛之捐而稱達官通儒者乃甘心俯氣贊贊揚揚而不已此無他天下人心同趨於利而善惡不明故也子試觀於今之人家孰無銘銘孰無善是何堯舜之世尚有四凶人而兹時何時乃比屋而可封也大人習之而不以為非君子安之而不以為陋朝廷縱之而不以為禁所以齷齪之臣逆悖之子無良之婦皆不妨乎令名而死而春秋不可復作矣愚嘗痛以為恥誓不為此文以陷於譽墓之譏今子乃欲予以銘子之先人葭莩親誼固不可辭但當實録吾子先人之行瑕瑜具存勿誇虚欺誕明白而告予也然後為子書之精神面貌庶幾不失其故而吾子先人之心亦不得有愧於泉下矣子其圖之子其圖之開國勲伐併行畧詳来其無忽省曽白答陳兩湖羅洪先僕少有文字癖稍長竊漫為之而蹊徑繆誤肆筆所書陳言熟語參雜無擇固知絶不類文而血氣日衰又不能淘洗煅煉則已自分棄擲於人必矣兄本以文名家乃時時相向虚心借問如不及者可笑也當其肆筆時亦竊以為文有源委非人所能強為也夫子不云乎辭達而已是辭其後也將以達意意實先之故有蓄意而不盡形之辭者矣未有辭至而意不足者也意不足辭無所於至譬之於水混混有源以出之矣然後舂擊而為濤渟涵而為淵迅駛而為遄縈迴而為瀾衍迤而為波光浮紋蹙沫濺洑射隨其所遇各効奇巧以盡變態而又晶熒澄澈不入滓穢至其經流之連絡又且詰屈宛復自源達委靡有斷絶使人迫而觀之心神昭曠徘徊而不能舍夫文不可以強為也何以異於是古之人有能之者必其中有自得實見此道之流行横斜曲直小大清濁無所不在於是觸幾發微或縁彼而歸此或即古以顯今細則取巨巨則取細常藏於變變藏於常紛紜轇轕不可終窮欲不為波濤湍瀾之類不可得也辭盡其變而意始融意融而後辭乃益至雖欲文之無傳亦不可得也不見丹訣禪偈乎辭若鄙俚然而終必傳者其中誠有之也僕則安能為若兄之文脱去往日蹊徑正與僕同而造辭之工則沈穠敷腴句殱字刮使讀者茫然停思而後能悟其措意如送范東明文立論正大無復可議獨欠專欠斷時復野戰雖多淵瀾却於經流不免分殺其勢此僕一隅之見非所語於大方不識以為疵蔽否兄往日論遵巖文亦云肥皮厚肉然此但據其辭云耳眼前人若遵巖於文忒殺有見雖辭甚豐厚然意之所起皆出入變化不甚拘常而就卑故其辭皆能究其意之所極而後止不徒為應酬而已惜其頗費探索非盡胷臆流出視荆川不免讓步然斷斷必傳無疑也冬至後因病黙坐不復對客承遣使多遺又有重委不敢虚辱輒破戒草此惟教之與王元美先生屠長卿隆髪未燥即知有呉㑹王元美先生蹉跎三十年犬馬之齒長矣日手大篇耳榮名夢寐𤣥圃終屬隔塵言念哲人臨風悵結隆海以東豎儒耳行能無所比數而好古有之每讀古人文章則馳神徃哲恨不得與此人同時時過其故里經其墳墓考其陳迹或故物存古人之遺或片語出人間之秘輒囅然大喜且披且詫想見其人神惝怳乎迴翔寥廓之外而馳騖太上之前此何也又如先朝李夢陽先生近世李攀龍先生業已恨余生之晚不得奏薄技挾櫜鞬以一當兩公徒負髙山之懐抱下泉之戚矣隆賦材故卑抗志頗逺不能建標藝壇而徃徃願北面大雅匪云同志亦其性然矣昔然明傾心於國僑甯越委身於晏子荀爽御車於李君廷尉結襪於王生君山歎息於子雲中郎折節於王粲精之所嚮九原可以執鞭神之所潛虎賁可以隕涕誠以緇衣之好篤好爵之情縻也嗟乎徃者不可作矣不圖隆乃得與元美先生同時又吳越相去近也世無先生因羨異代世有先生何羨異代而乃空懐佳人竟違良晤河清難俟日月易徂隆支離涉世已見二毛而先生亦垂老倦遊將圖五嶽恐一朝長畢卒負平生令徃者諸公笑我泉下同天壤者承睫不見慕古何為乎且隆束髮為諸生厭薄制義中艷古雅讀廣成素問則霄雿欲僊覽竹書元苞則形骸遂徃近探禹穴抽秘金書遙望岱宗覃思玉簡又鄒魯悦孔孟之仁義濠梁慕莊老之𤣥虚之罘誦李斯之古文湘漢懐屈原之詞賦龍門仰太史之跌宕成都愛相如之麗藻大梁艷鄒枚之浮華淮南羨八公之鴻烈幽薊喜鄒衍之談天青齊驚淳于之炙轂稷下服田巴之雄辯靈光覩文考之俊才天台髙興公之逸韻諸圖書秘記古文竒字頗嘗泛其洪波収其鉅麗可謂窮老不厭專精靡他顧生也貧賤僻處東海青山拄屋寒潮在門波臣竊窺黿鼉相弔客無大雅座鮮髙言識比夏蟲見同河伯僴然自奓髙步濶視謂於世無雙譬如夜郎王之倔强於南徼扶餘國之自雄於海中亦可笑矣既而自拔幽囚稍窺𤣥朗奮然決起欲出而與海内豪俊論文譚藝而天刑不解人事多違始困諸生繼束官守𤣥冬躡雪倉皇涉淮不屈首苦簿書則折腰趨公府促訾咿􅀈扶伏婉孌丈夫工為蛾眉百鍊化為繞指𤣥髩儵為朝霜雅志都喪俗情轉深吏事日嬰舊業盡廢終棄大雅寤寐永歎命之不淑安用生為每望吳㑹雲亭亭起如車蓋耿耿余懐恨不得即解印綬從先生散步長洲之苑爾近世七子砰􅗟有聲並驅方軌横行中原茍有遭之人馬辟易數十里矣然愚竊謂先生最勝譬諸七雄當為秦楚先生富材勁力靁􅏒飇馳包絡千古吸蕩六合固已赤幟徃哲寧獨白眉數子乎即如李于鱗雄深竒古非不驚動一世標異將来詩無論論其文信竒矣先王推轂濟南亦至而愚以為無當先生何也今夫天有揚沙走石則有和風惠日今夫地有危峰峭壁則有平原曠野今夫江海有濁浪崩雲則有平波展鏡今夫人物有戈矛叱咤則有俎豆晏笑斯物之固然也藉使天一於揚沙走石地一於危峰峭壁江海一於濁浪崩雲人物一於戈矛叱咤好竒不太過乎將習見者厭矣文章大觀竒正離合瑰麗爾雅險壯温夷何所不有嘗試取先民鴻製大作讀之書如盤庚禮如檀弓周禮如考工記亦云竒古近險矣而不過偶一為之其平曠瑩徹掲日月而臨大道者固多他如穆天子傳左國莊騷秦碑吕覽諸篇雖云魁壘多竒而其平易者亦徃徃不少惟揚子雲好竒言言艱棘後世而下論者為何平生辛苦蟲魚自况出竒間道終屬偏師固未聞獨模後人盡掩前哲也先生嘗謂李王孫竒過則凡老過則穉嗟嗟獨王孫哉于鱗之竒驅騁周漢固非子雲敢望然言言若此終墮好竒譬如終南懸崖竒矣然使終日而在目則厭不如日月之光也江上裂石奇矣然使終日而在耳則厭不如雲􅛱之奏也信如于鱗標異凌厲千古吞掩前後則六籍之粹白漢詔誥之温厚賈長沙之浩蕩司馬子長之疏朗長卿之詞藻王子淵之才俊六朝之語麗不盡廢乎即天又奚以􅛱風惠日為也故愚竊不自量謂于鱗雖竒而無當先生先生何所不有也有于鱗有獻吉又兼有徃哲而又自有元美廣大變化斯其所以極𤣥也讀萟苑巵言辯博哉如涉太湖雲夢焉讀弇州集魁瑰鉅麗和暢雄俊哉如泛大海焉又如觀𤣥造焉其為文包羅左國吐納莊騷出入楊馬鞭箠褒雄其為詩鍊格漢魏借材六朝同工沈宋登壇李杜誠天府之髙華人文之鴻鉅作者之極盛矣觀止矣然小子隆又竊有疑焉雋永之中不嫌雜俎閎麗之極間出麄豪又撰著太多篇章太富宇宙羣品題咏靡遺古今萬狀蒐羅畧盡無乃傷於雜乎豈𤣥造之中本無所不有耶竊意無所不有亦必有所無矣遊目羣玉之巔失足閬風之上精眩魂搖迷不知所適何時摳衣登堂面受大教也隆自知小技不合大方區區之心欲自進門下亦無鹽之所以見齊王也然先生廣心逺識延攬四方豪俊惟恐失之豈可使門下不知有東海屠生哉吾鄉沈嘉則先生聲律雄大與龍伯爭長東海鄙數千年無大雅其他瑣尾者又不足道賴嘉則出一浣之耳先生以為何如友人沈懋學者其人英雄善談萟談兵談堪輿家言體貌不甚偉能運鐵矛手馘百夫疇昔嘗散千金走九邊觀戍壘結交豪傑將帥藻思超逸落筆萬言雖不甚深古而雄快可喜又忼慨忠義重然諾篤交遊多情稱丈夫哉先生不可不識其人馮夢禎者素心人好古博雅尤深𤣥理每遭事意氣有之不則瞑目趺坐竟日若枯槁觀其人亦自不凡京師今多竒士此兩生者尤與隆交驩敬而愛之敢以聞於門下先生髙才為尊官下邑小吏不當輒以尺一通又不當輒奓口狂言罪僇是愳然隆私度扶伏州郡長吏車下至屏息不敢出聲而揚眉先生之前斯其故可知也先生豈以髙才尊官傲天下士者哉謹以所為鄙言請教門下明文海巻一百五十四
