body:
  text: 明文海巻一百五十七餘姚黄宗羲編書十一論文與方思道論文書吾謹寄示贈劉子文實深刻竒峭三讀而味之信吾兄之才之美也而且因之感而悲焉近世嗜作文者率模習春秋内外傳辭句以為竒古卒至牽綴餖飣短促澀滯不但辭之不足以舒其志意而且并與其所謂理者失之可不悲耶三代之季能文者莫若左丘明彼其於虞夏之書非不能誦習而髣髴之也而卒自為左氏之語由丘明而下則莫若司馬遷彼亦非不能依步左氏之語也而卒自為司馬氏之書由遷而下持文柄雄視海内者多不下十餘家然皆人自為書而不相師蹈沿習故亦能矜重一時而流百代之譽至後之評者乃曰或似内外傳或似史記要亦其機括圓精有不煩刻削而自脗契之者彼固曷嘗規規於左氏史遷之詞之句哉今舍其意而師其詞棄其詞而摹其句是繪真者不得其人之神俊而徒貌其體膚又不得其體膚之完而徒貌其肢節其於肖也終不得矣兄才冨氣鋭而且佐之以學之贍也其於文章固當憂其駃驟之過而或至於不檢非憂其氣勢之短促而不足以拓之也乃顧不免此病者豈自慮其將過於洶湧洪汗而先為約束以制之耶抑亦徒見近時士人之競為酸澀苦辛之味足以爽口馳譽姑徇所好而逐之耶夫近世士人必務為此類之語皆惑之深者彼其於古人所就之妙實未嘗得諸心而應之手也故以飲食至味為不足乃旁取其間出之竒者咀之以為常卒亦何免夫以艱辛之辭文淺易之説之誚哉且文章固宜考其原本求古人制作之始意特在述事理布旨趣而已而飾之以辭者欲其潤暢焉耳過此而有所謂竒者皆後世文之勝也而况乎益之艱澀不可句之語不亦薄乎返薄而歸淳棄巧而趨樸正望吾兄之相與力之也而兄才兼竒邁益之數年雖古之善著書者不能過也顧可不自貴與嘗謂文章之極致當如元氣之於萬類隨地授形咸有氣色聲貌而各不能相同窮其巧而非若雕鏤者之可殫以技也此謹之自謂獨得之妙心蓄之有年矣每不輕於告人而獨於兄發焉幸惜其意而相與進之也辱兄以文付童子且嘱謹之有言也遂漫道此纍纍厭人望兄弗以為怪與李空同論文書吾謹童子歸能道執事峻行清徳聽之毛骨颯然増凉兼覩大作雄峻簡勁淳潔澹泊教廸者甚多論文訛見猥辱疵摘尤竊喜焉古之師友互相辨質弗明弗措今則惟譽言是好法言是忌欲業成如古人也難矣而謹獨於執事有聞是謹之得也顧其志鬱而未明兹敢復以書問謹之始論特以今之為文者固著書遺意夫著書者蓄而有得而後洩而為言故必自創而成一家之説茍師蹈沿襲他人烏在其為立言哉而執事以書法喻之類例甚明顧謹之所謂弗同者正謂其象耳肥瘦長扁流整疎宻勁温十者書之象也古之善書者精無不同而十者之象則異惟精無不同也故同謂之善書惟象無不異也故各謂之名家精茍同矣而象亦無不同是亦臣僕於人而已矣奚其善夫文亦何異於是理道旨趣猶書之精也辭致體格猶書之象也古之善文者理道旨趣無不同而辭致體格則異惟理道旨趣無不同也故同謂之善文惟辭致體格無不異也故亦各謂之名家理道旨趣茍同矣而辭致體格亦無不同是亦臣僕於人而已矣奚其善今槩論其本之同而不察其末之異是猶論天地萬物之理同而不論其形氣之異也無乃或幾於惠施公孫龍之説乎譬之人焉精神運諸中者同矣耳目形諸外者同矣而貌各弗同夫精神耳目之不同固不足謂之人而貌皆一人焉又可謂造物之深功巧妙哉史遷弗同於左氏左氏弗同於古經殆亦人貌之不同乎而學之過者直欲貌之同而中之弗同弗計也夫中與貌兼同且未為善化矧得其貌而遺其中或并其貌而失之者哉故篇中曰舎其意而師其詞棄其詞而摹其句是繪真者不得其人之神俊而徒貌其體膚乂不得其體膚之完而徒貌其肢節其於肖也終不得矣謹意言師其意固無不可而徒模習其詞句是亦止得肢節之細而遺其全體之真非善肖人者也豈其文之晦而弗足以達厥意歟將執事偶一觀而未嘗深考其意歟執事别有㫁見而非謹之所能測識歟願更誨焉多言曲辯者非敢抗耆哲之議逞技爭高也謂執事行古人之道者而謹且獲師友於其間故亦不敢以脂韋詭誇者自居而直以正辭質焉惟執事竟其緒言而卒相之幸甚與鄭繼之地官書吾謹近見執事於呉中辱弗鄙而友之甚感高誼此後嘗以拙詩文屬思道獻左右弗知果否先君子南歸領觀執事所製詩數十篇輒沉吟不忍置釋今之為詩者僕嘗推李獻吉何仲黙孫太初為善追逐古昔下之更得數人焉今且未能悉舉雖不逮孫李要亦超脱不腐顧猶憾其刻意於竒䴡閎俊譬諸髙士偉人雅自矜飾雖甚異於庸衆而方之淡漠無為望而見之自知其為至人者則有間矣獨執事之詩清而不浮閎而不肆淡而不枯竒而不耀若性諸天而非墨工心力之可擬至是僕所以深好之也僕雅非譽人求悦而獨稱執事之盛如此或將謂其弗情乃其志見固有適至亦無遑人之是非之恤也夫天下之難者知已為最今之世未嘗無道僕譽僕者而僕終弗以為有知已焉者謂未有深知其志之所尚與其才之所就也故嘗謂茍有知之者雖死之可也若執事之志之才僕固能深知之而亦無計執事之知否也拙著數篇逺以為獻幸賜細觀雖其剸劌搜剔深刻簡峭有弗逮人至渾浩流轉揺蕩恣睢冩其自得之致而削絶封畛片幅之㣲則自謂有尺寸長耳夫古列家之著書以其所自得形諸言説非必巧麗其詞為後世美觀而後人就其説求之旨趣亦且完然可取今之為文者非古著書之遺意哉乃獨料想搜摭規畫補綴非中所自得而師襲諸人至所極造亦止言句之工而意象無完旨矣故僕嘗謂如是者弗作可也然惟執事可以此吿聲諸他人必且以為狂酲惑亂深訾而罪之矣黄公應期者於執事為鄉人舊嘗可僕文而何公仲黙少嘗接於京師亦謂僕文非世俗落套數者倫比此二公者或朝夕聚論幸一出示之必有評品外此勿多示人以重僕過是所至望執事近詩必且富侈如惜其爲知已而廣惠之亦足以成其志也不宣與方寒溪書吾謹僕罪逆不夭先君子奄棄諸孤哀哀呌號惟存餘息兹敢以書奉問左右者以寒溪有契家之義而辭之弗能已也僕取四方之士久而彌勤而性復孤甚徃徃未見有合者矣世之才且賢不爲寡今求之千百之中卒不及一二人焉乃號之人曰吾尚當世士孰從而信之然爲知已者道亦未嘗不信而然之也寒溪吾浙之俊賢地甚相近而家世又甚相聞獨未得握手慷慨領高論故歉諸中每不懌也聞外弟偉夫歸自閩中獲見寒溪與僕父子手墨并其他文咸氣格高壯巖巖畏人審其文章可謂毅然不汨於流俗者也而其爲人安肯脂韋伈俔逐聲律之文與羣兒直角一旦小技夸耀於閭里婦穉間耶僕自許知寒溪之深者如此不知寒溪亦許其為知己否文章者天地之聲氣有生者假以紀述事類而已中古乃資之言理道聖人猶嗟為衰世之意其㣲志可見矣暨末世飾智之士乃取以模像品物咏歌議論鏘鏘煜煜綺䴡百出而其徒又益以制式法度名品森列謂必合之而後曰詩曰文要其歸直與角觝者等耳然更世習染既久皆爭為嘔心裂肝以取榮譽後生無知動以讀書作文為學道謂生民之理止是矣今欲變流習而進後生於道正在吾輩顧猶不能自免殊可痛歎僕少嗜作文若癥瘕在中不可卒化自知道以來始不甚置心於此然時一出之猶逸不可制正坐餘習未竟埽耳莊周曰由天地之道觀惠施之能是猶一蚊一虻之勞也每誦斯言未嘗不黯然自傷日望友朋以是規我而寒溪獨以是稱我無乃寒溪亦病癥瘕之深者耶今便欲吾舎此與世絶交際亦是難事要當日損之以息天君役役之苦耳僕齒増長矣庸庸不立甚無以自慰憶前十年時尚高朗有竒趣而六七年來娶妻生子遂與世人為伍懷抱逺不及少時將來流堕尤為可懼傾望懋建徳業以撑持宇宙者在公輩數人而嵗月易矣精神易耗恐悠悠越過後雖致悔而百倍其功亦無能及可不危耶僕今亦無他企想但得捐妻子顧慮深入名山結廬端坐數年完養精神攝定情性保合凝聚以顯厥明命將來舒巻之柄尚在於我而冲和純粹之真庻幾不隨物而化此其志也顧勢難遽脱家累恒念及之輒廢寢食若寒溪則有可為之資而且有可爲之機茍棄之弗足為是誠辜造物生生之意而僕之望慕卒未有慰也言不盡意惟心察之與同年諸翰林論文書徐禎卿碧雲蘭若坐聽泉聲淙淙西山秋色間與公等譚及千秋殊快僕與公等幸際盛世職在詞曹其慎毋牽泥於朝㑹應制諸什阿徇耳目為昨苦不盡兹削牘竟其説葢有諗於僕者曰詩必三百十九建安黄初文必先秦兩漢故北郡讀書㫁自漢魏以上作而合合而傳傳而可法之難如此子慎毋作近時人語其幾乎僕曰非也凡猝然出於田畯紅女漁樵牧子擔夫之口者皆詩也商賈經年去家萬里居者備述其家事覼縷并勞其風波險阻在外勞苦安否行者度贏息幾倍忖歸期久近嘱家人謹視門葢各題平安以相貽皆天下之至文也何者詩不必叶韻文不必成章道其性情肝膈之要而止也僕故近時人那不作近時人語而三代兩漢為於是客有率然進曰近時某某詩人也某某能文某某兼能僕又曰非也僕謂那不作近時人語非謂他人謂身乃近時人耳嘗試論之自少陵而後無詩矣自昌黎而後無文矣入大明𢎞治間李獻吉始一振之當是時信陽何子心競李力不敵也故名並李實不埒也昌榖偏師也薛鄭老師費財者也邉靡靡熊其瑣瑣者也其在詞曹則王穉卿王允寜其最傑乎故僅工五律尺牘語耳又寥寥不數篇楊用修其學與著述至富而才則稚此外無論窮達顯晦凡其生存者其軒輊吾不敢論大都自古迄今代不數人又多阮公廣武之歎而子稱某某詩某某文何也客於是大駭曰子之言何矛盾也子前所言太叔之弛也子後所言商君之酷也子為政民奚所措手足乎且李杜韓栁而後其撰述積案充棟者何物也近時之能詩文者豈盡出耕牧漁樵紅女下也子之言何矛盾也僕曰不也若亦知人巧之不敵化工乎譬之草木地之所植雨露所濡堅勁為松柏楩柟豫章艶為桃李芬馥為蘭蕙自典謨風雅以逮本朝李獻吉是也其山茨野芳蔓草則耕牧漁樵負販委巷婦孺之猝然出口賈豎之家書寒暄語語實際若夫剪綴繒綵成花為牡丹為芍藥固不若蔓草之出化工則今之詩若文是也故曰畫西施之面美而不可説規孟賁之目大而不可畏曾不若醜女之能娠怯夫之作力也是故僕於三代兩漢且不欲為而况近世時流之詩若文乎古人為古人今人為今人人自為人吾自為吾世人不曉事漫曰吟詩屬文嘻其陋也即詩不吟即吟不詩即文不屬即屬不文若亦知化工乎於是客無以難也僕不佞輒復就公等印可又徐禎卿醉中草論文書作字復漫漶不辨公等以為然否昌榖譚秇無闗性情談何容易弇州巵言亦有白筆然揚之青雲之上抑之濁木之下大都率意信筆不無太過不佞獨喜滄浪語語上乗唐應徳與洪芳州一書更卓有見然而嚴詩固元人耳豈識見造詣殊途乃爾呉起書不如孫武子然而孫之用兵不如呉諸兄勉之以嚴氏之識弇州之大力庶不堕小家仲黙之談逺過獻吉乃獻吉大力十倍仲黙大智大力兼到殊非易事再答仲達論二李顧冶王君至自松陵方與葉君過秦氏飲而陸使手足下書及詩從湖而西也則爲之嚼一仲雅令僕若仙病游之態渙然以觧至曰僕與獻吉為難僕非敢云爾也夫能為獻吉不為獻吉者莫如于鱗今其集具在有如獻吉上書族譜及初唐散篇者乎未也僕直以獻吉葢大而未化然所謂驅除者第不得作漢唐髙文耳若于鱗則大不然其文信於有古詘於無古其詩境窮於象事局於情至如換漢魏隻字以為漢魏樂府且欲為獻吉而不能也亦多矣嚮何言之易易也孔公號至聖乃其易繋魯論了無聱牙處揚子雲少作觧嘲校獵諸篇自是妙語老不曉事始悔雕蟲末技壯夫不爲規易以太𤣥規論以法言斤斤孔公咳唾若編韋再絶而壇杏再花也者太𤣥僕不觧為何等書自其時人已覆瓿視之法言持論豈不最善恐效顰里婦祗益醜西家無爲也彼不爲獻吉者何異此矣僕不揆槩爲此議足下謂是耶非耶僕諸不朽知見刋落殆盡庶幾乎仙我而凡人人獨事理觸而成障未得自蜕㣲足下發吾之覆猶願謁之况縷縷乃爾秋盟亦何敢寒哉其貯壺中好月數十夕以俟答華仲達論文顧冶鵝湖以西華氏有二達者僕盖聞之王生云而葉生頗以孟達詩眎僕即不竟乃知王生言不虚也王生間而及仲達媾仙事時心怪之一日陸生過僕語仲達爲人甚具稍出便面索僕詩僕所謂鷇音耳未嘗鳴于人仲達安所取於僕豈聊借此當數部鼓吹耶盖僕不識仲達仲達謬以陸生故信僕而㑹二達城也陸生再過燈下手尺書兼寄二絶重以佳箑即譽僕太溢覺載揚清風令人習習欲舉於是許陸生旦日訪二達及面之則又色温如言穆如也向徒得其心今得其貌矣視諸互郎子營營一世老筭甕中者真足醜死㣲陸生幾失二達哉已讀仲達洎郁人文徃復書乃知二達外復有人文者在也其首論文上陳左氏下逮獻吉詳乎其言已夫尼父作春秋即稱聖然非左氏翼而傳之殆隠語已耳記曰作之謂聖述之謂明又曰孔素王左素臣無明不聖無臣不王後之君子才不左將以效左也亦難矣故太史公嗣左不盡左班孟堅嗣史不盡史何哉彼固欲成一家言也政如詩漢而魏魏而六代六代而唐人自爲體者誠惡相襲也至獻吉乃曰文必左史詩必漢魏唐豈不韙者譬之商周彛鼎跡其土花紺碧古色渾成固是百千年致之呉兒者强而折一足截一耳僅僅以旬月人力勝而紿諸市曰我彛我鼎也其不爲賞識者所笑幾希矣獻吉者斯言誠不廢毋乃類是乎近世獨王元美氏文不一左史然亦左亦史可得十七詩不一漢魏唐然亦漢亦魏亦唐可得十三盖自有成其為元美者要之不必其顓顓似也故僕妄謂文即主左史當班與魏晉佐之樂府五言即主漢魏當六代佐之歌行即主李杜當岑高盧駱佐之律絶即主唐盛當初中佐之而又以我法參焉或即或離勿拘勿肆夫然後斌斌大備雄視終古非盡如獻吉之云也仲達謂否乎然耶僕已矣學舉不成習為仙學仙不成習為文章學文不成習為狂㳺㳺且病也長風千里是在足下二三輩策之而已五日適飲昌陽醉占一詩寄足下因恣筆淋漓及此湖西秋月能載君家釀十石尚期作五禽戯仙㳺世外與沈朗倩書楊兆京薄遊白下一身如海鷗日放舸秦淮弄秋水而已聞足下尚翺翔沅湘見歸鴻起蘆荻間能不回首瞻東路耶然自此三閭無騷賈生無賦矣僕之固陋初非有得乎風雅而持論輒與世好相背心儀佩服惟有足下又復千里遼絶抑抑誰語今非敢逞其狂言聊陳一二不能終滅沒於胷中者以請質焉竊以為天下之至文大抵生於意而已意之所至而法生焉其於古人自為合度世之論者或泥古而拙或師心而鄙所以無兩得而有兩失也即以三百篇言之賦隨意敷文不必言矣興者感時觸物意之動於無端而不自知者也比者意之形乎此而寓乎彼甚或有所不忍言不敢言假象於物以使後人尋繹聽其知與不知而不問者也此何一非意之所為哉而為詩之法未有外於此矣靈均自是至性人憂䜛畏譏忠君愛國别有一腔悲憤故離騷九歌遂成千古絶調十九首高情逸態洵乎夐絶風流因詩而可見其人矣樂府時兼數代體亦萬殊燕皇天而陳郊祀感從軍而奏横吹或讌㑹以志喜或怨思以自傷情之變無方也山林人物惟靖節為領䄂故得其一語勝讀逸民高士傳百篇黄初建安之間人自為格家自為調惟彼胸臆中各有雲山千疊煙霞百態故至今逸氣如生鮮華未落至唐人而旨趣益難言矣彼其運意在虚無縹緲之中故其取格在有神無象之際其為體既非一然體異則格因體而生變格定則意隨格而運竒此皆創前人之所無師心匠之獨得以成一代之風氣者也至若少陵氏以間世之才身遭離亂觸目傷心憂思不下屈平故發而為詩世所稱才奪蘇李氣吞曹劉掩顔謝之孤高雜徐庾之流麗者彼目中豈復有古人然古人之妙盡是矣大厯而下余何復詳論哉愚所以上觀徃哲迄於今兹以為躭於古者其人必有深情發乎情者其言自堪作古意之與法如鳥之雙翼車之兩輪二而未始非一也今騷壇之士罔論溯厥源流與之言七子輒笑為膚與之言獻吉輒譏為腐尚何知漢魏三唐也哉井底之蛙自以為觀止矣不免莊生海若之嘲耳其有涉獵羣言畧知聲律又復僅襲衣冠全遺神理叔孫優孟而已嗟乎嗟乎大雅不作吾衰誰陳可勝歎哉當今海内豪傑痛絶調之凌夷開後學之荆棘使人不迷其所向又不敢自是其一得則非足下其誰與歸僕從此將遨遊齊魯浪迹燕趙弔逐客於江干訪神仙於海上不遇子期終不撫弦不逢伯樂自甘伏櫪悲歌忼慨之懐惟足下知之耳晨風無翼握手難期有楚客從都下歸聊附此以布區區之意明文海巻一百五十七
