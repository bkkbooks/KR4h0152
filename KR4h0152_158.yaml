body:
  text: 明文海巻一百五十八餘姚黄宗羲編書十二論文與郭青螺叅政論文書許孚逺伏承不鄙以大製序言見委敬撰如别幅呈上深慚俚拙尚藉郢正幸毋存彼已形迹徒取皮弁而加衮黼令不快人意也二編之文披誦一過仰窺藴藉淵博學識醇正琢磨鎔鑄渾然大雅成一家言列於唐宋作者之林未可軒輊而鄙意獨羡門下學有淵源宦遊粤蜀有政有教有實有文孚逺自媿萬萬不能及如門下送耿子健督學入閩謬引鄙人相為勸勵則賢者與善之寛同心之誼有如此耳編中諸作可以傳逺者十二八九愚意所不惬者略在論説三篇其一為婦寺論巖廊禁闥亷逺堂髙體統固爾豈謂世有匪人槩不可近乎且謂大臣親戚父子兄弟賔客佞幸無一可近而獨婦寺差為可近此慮之過者也是説一出將以滋人主逺仁賢昵閨闥之情甚不可為訓也其一為管蔡論武王周公之徳不及文王古今仁人君子每竊少之似亦非過但管蔡在當時恐未必有忠於武庚如文王以服事殷之心何者管蔡而有文王之心夷齊之節則當武周之取天下家庭兄弟必有規諫之詞不然其意氣亦必有㣲露處周公何得茫然不知而反使之監殷也天下已定武王既沒成王在襁褓之中周公居攝而臨百官管蔡乃興流言挾武庚以叛則疑且貪使之也盖歆艶武周所為而不知其時勢之不可者也門下惜管蔡不能善處殷周之際謂當如泰伯箕子之為泰伯遜國而逃於荆蠻超然無迹箕子既傳洪範遂之朝鮮此萬古卓越之事而望之貪昧之夫可乎孔子稱泰伯文王為至徳稱箕子為仁人而未嘗一言及於管蔡千載之下固不得而輕與矣其一為寛嚴論古之君子禔身以嚴御衆以寛於家言齊於國言治於天下言平法行必自近柔逺而能邇此親疎詳畧之用皆天則也然謂嚴者専以治國之物而寛者専以治天下之物又謂嚴必不可用於天下而寛必不可用於身與家旁引曲證則立言過當矣陽舒隂慘天道之常仁義並行聖王之治故鋤强遏惡禁暴戢亂則治天下固有利用嚴之時而有國有家者皆必本於忠厚慈仁培養元氣則寛亦未嘗不可施之家與國奈何直釐而二之也門下諸作或一時有感云然然議論稍偏慮不足以垂訓來學愚意稍加刪潤毋令為白璧之㣲瑕可乎昔日尊師廬山先生衡齋篇中辨駁宋儒物理之説涉於太嚴孚逺猶且疑之而不得一面證以為憾古今文章之士動為高論不純於義理者多矣顧在有道儒者言出而為天下法程則不可不慎也惟門下其裁之倘有未然不妨徃復以開固陋為荷答鄒爾瞻鄒觀光大集謬加丹鉛然無能賛一辭自理學先生土苴文詞修詞之士亦反唇譏之則理學文林判而為二而文章中曰議論曰叙事其體又若相岐而不能相兼爾瞻之文根極理道原本性命葢載道之文而非文人之文也然其開閤抑揚縱横變化不囿於法而無一語不合於法即劘琢其詞者蔑以加焉丈必欲以纎埃助高泰岱願於周秦以上渾渾灝灝之氣一加之意耳弟嘗謂本朝自𢎞正而後有三大文章以理學為文章則王文成破洪荒而超坱圠而河津開其先以氣節為文章則李獻吉凛秋霜而勁烈日而仲黙為之翼以文章為文章則王司冦成經緯而沛江河而毗陵為之翼司冦毗陵分道而馳若敵國然而乃推而佐之司冦自喜其文於意無所不達夫能達其意而亦不廢法則毗陵能耳若乃鑱心刻腎雕鏤於字句而見為竒如世所尸祝僕不敢耳視也睹日月而知衆星之蔑况剪采為花豈不炫目生色蔑矣以爾瞻之學識何所不詣願益努力以集三君子之大成明文海巻一百五十八
