body:
  text: 明文海卷一百六十餘姚黃宗羲編書十四論詩答章秀才宋濓濓白秀才足下承書知學詩弗倦且疑歷代詩人皆不相師旁引曲證亹亹數百言自以為確乎弗拔之論濂竊以謂世之善論詩者其能出於足下乎然不敢從也濂非能詩者自漢魏以至乎今諸家之什不可謂不攻習也薦紳先生之前亦不可謂不磨切也揆於足下之論容或有未盡者請以所聞質之可乎三百篇勿論已姑以漢言之蘇子卿李少卿非作者之首乎觀二子之所著紆曲凄惋實宗國風與楚人之辭二子既沒繼者絶少下逮建安黃初曹子建父子起而振之劉公幹王仲宣力從而輔翼之正始之間嵇阮又疊作詩道於是乎大盛然皆師少卿而馳騁於風雅者也自時厥後正音衰微至太康復中興陸士衡兄弟則倣子建潘安仁張茂先張景陽則學仲宣左太沖張季鷹則法公幹獨陶元亮天分之髙其先雖出於太沖景陽究其所自得直超建安而上之髙情逺韻殆猶太羮充鉶不假鹽醯而至味自存者也元嘉以還三謝顔鮑為之首三謝亦本子建而雜參於郭景純延之則祖士衡明逺則效景陽而氣骨淵然駸駸有西漢風餘或傷於刻鏤而乏雄渾之氣較之太康則有間矣永明而下抑又甚焉沈休文拘於聲韻王元長局於褊迫江文通過於摹擬陰子堅涉於淺易何仲言流於瑣碎至於徐孝穆庾子山一以婉麗為宗詩之變極矣然而諸人雖或逺式子建太沖近宗靈運元暉方之元嘉則又有不逮者焉唐初承陳隋之弊多宗徐庾遂致頽靡不振張子夀蘇廷碩張道濟相繼而興各以風雅為師而盧升之王子安務欲凌跨三謝劉希夷王昌齡沈雲卿宋少連亦欲蹴駕江薛固無不可者奈何溺於久習終不能改其舊甚至以律法相髙益有四聲八病之嫌矣惟陳伯玉痛懲其弊專師漢魏而友景純淵明可謂挺然不羣之士復古之功於是為大開元天寶中杜子美復繼出上薄風雅下該沈宋才奪蘇李氣吞曹劉掩顔謝之孤髙雜徐庾之流麗真所謂集大成者而諸作皆廢矣並時而作有李太白宗風騷及建安七子其格極髙其變化若神龍之不可羇有王摩詰依倣淵明雖運詞清雅而萎弱少風骨有韋應物祖襲靈運能一寄穠鮮於簡淡之中淵明以來蓋一人而已他如岑參髙達夫劉長卿孟浩然元次山之屬咸以興寄相髙取法建安至於大厯之際錢郎逺師沈宋而苗崔盧耿吉李諸家亦皆本伯玉而宗黃初詩道於是為最盛韓柳起於元和之間韓初效建安晚自成家勢若掀雷抉電撑決於天地之垠柳斟酌陶謝之中而措辭窈眇清妍應物而下亦一人而已元白近於輕俗王張過於浮麗要皆同師於古樂府賈浪仙獨變入僻以矯豔於元白劉夢得步驟少陵而氣韻不足杜牧之沉涵靈運而句意尚奇孟東野陰祖沈謝而流於蹇澀盧同則又自出新意而涉於怪詭至於李長吉溫飛卿李商隱段成式專誇靡曼雖人人各有所師而詩之變又極矣比之大厯尚有所不逮况厠之開元哉過此以往若朱慶餘項子遷李文山鄭守愚杜彥之吳子華輩則又駁乎不足議也宋初襲晚唐五季之弊天聖以來晏同叔錢希聖劉子儀楊大年數人亦思有以革之第皆師於義山全乖古雅之風王元之以邁世之豪俯就繩尺以樂天為法歐陽永叔痛矯西崑以退之為宗蘇子美梅聖俞介乎其間梅之覃思精微學孟東野蘇之筆力橫絶宗杜子美亦頗號為詩道中興至若王禹玉之踵微之盛公量之祖應物石延年之效牧之王介甫之原三謝雖不絶似皆嘗得其髣佛者元祐之間蘇黃挺出雖曰共師李杜競以已意相髙而諸作又廢矣自此以後詩人迭起或波瀾富而句律疏或煅煉精而性情逺大抵不出於二家觀於蘇門四學士及江西宗派諸詩蓋可見矣陳去非雖晚出乃能因崔德符而歸宿於少陵有不為流俗之所移易馴至隆興乾道之時尤延之之清婉楊廷秀之深刻范至能之宏麗陸務觀之敷腴亦皆有可觀者然皆不離天聖元祐之故步去盛唐為益逺下至蕭趙二氏氣局荒頽而音節促迫則其變又極矣由此觀之詩之格力崇卑固若隨世而變遷然謂其皆不相師可乎第謂相師者或有異焉其上焉者師其意辭固不似而氣象無不同其下焉者師其辭辭則似矣求其精神之所寓固未嘗近也然惟深於比興者乃能察知之爾雖然為詩當自名家然後可傳於不朽若體規畫圓準方作矩終為人之臣僕尚烏得謂之詩哉是何者詩乃吟咏性情之具而所謂風雅頌者皆出於吾之一心特因事感觸而成非智力之所能增損也古之人其初雖有所沿襲末復自成一家言又豈規規然必於相師者哉嗚呼此未易為初學道也近來學者類多自髙操觚未能成章輒濶視前古為無物且揚言曰曹劉李杜蘇黃諸作雖佳不必師吾即師師吾心耳故其所作往往猖狂無倫以揚沙走石為豪而不復知有純和沖粹之意可勝嘆哉濂非能詩者因足下之言姑略誦所聞如此惟足下裁擇焉不宣濂白批答張廷實詩箋十首陳獻章首章似胡文定解春秋以義理穿鑿二章發揮得道理極致非所敢當然此心亦自不能已願與公共勉之三章仙術多門姑置勿論然興致髙逺者非此無以托古有留意於參同契而為詩則斥以盜竊四章箋得之余清老唱道歌云世間煙火煎熬可厭亦在其中五章要看第二句與第四句相應親切六章醉以溷俗醒以行獨醒易於醉醉非深於易者不能也漢郭林宗晉陶淵明唐郭令公宋邵堯夫善醉矣夫七章其失與首章同黃涪翁大雅堂記似為此箋發者正詩家大體所關處不可不理會大抵詩貴平易洞達自然含蓄不露不以用意裝綴藏形伏影如世間一種商度隱語使人不可摸索為工欲學古人詩先理會古人性情是何如有此性情方有此聲口只看程明道邵康節詩真天生溫厚和樂一種好性情也至於謝枋得雖氣節凌厲好説詩而不識大雅觀其注唐絶句諸詩事事比喻是多少牽強多少穿鑿也詩固有比體然專務為之則心已隔於一偏將來未免此弊不可不知八章不知馬其失在人不在馬少知進退去就而已者亦未以馬稱也平湖之進吾惜之九章珠珮用鄭交甫事十章箋得之詩從後定本統論好但非拙作所能當持以論詩可矣槩觀所論多只從意上求語句聲調體格尚欠工夫在若論詩家一齊要到莊定山所以不可及者用句用字用律極費工夫初須倣古久而成家也今且選取唐宋名家詩數十來首諷誦上下效其體格音律句句字字一毫不自滿莫容易放過若於此悟入方有蹊徑可尋與郭價夫學士論詩書王廷相廷相稽首杏東學士先生門下比者蒙佳稿見教捧讀旬朔若有得於言意之外者見其變化自然如秋雲揚空倐成物象渾然天造不煩雕刻見其體質都雅如貴豪公子翠苑春逰冠蓋軒揮金相玉潤其氣韻清絶如石室道人餐霞茹芝滋味沖淡精神獨爽嗟呼詩之旨義備矣哉發我情志示我龜式不啻多矣僕不肖猥於是藝亦嘗究心蓄材會調飾章命意求合往古之度用騖大雅之塗時省一斑匪云冥契敢因執事陳之祈為裁教夫詩貴意象透瑩不喜事實黏著古謂水中之月鏡中之影可以目覩難以實求是也三百篇比興雜出意在辭表離騷引喻借論不露本情東國困於賦役不曰天之不恤也曰維南有箕不可以簸揚維北有斗不可以挹酒漿則天之不恤自見齊俗婚禮廢壞不曰壻不親迎也曰俟我於著乎而充耳以素乎而尚之以瓊華乎而則壻不親迎可測不曰已德之修也曰余既滋蘭之九畹兮又樹蕙之百畝畦留夷與揭車兮雜杜蘅與芳芷則已德之美不言而章不曰已之守道也曰固時俗之工巧兮偭規矩而改錯背繩墨以追曲兮競周容以為度則已之守道緣情以灼斯皆包韞本根標顯色相鴻才之妙擬哲匠之冥造也若夫子美北征之篇昌黎南山之作玉川月蝕之詞微之陽城之什漫敷繁敘填事委實言多趂帖情出附輳此則詩人之變體騷壇之旁軌也淺學曲士志乏尚友性寡神識心驚目駭遂區畛不能辨矣嗟乎言徵實則寡餘味也情直致而難動物也故示以意象使人思而咀之感而契之邈哉深矣此詩之大致也然措手施斤以法而入者有四務真積力久以養而充者有三會謂之務者庸其力者也謂之會者待其自至者也何謂四務運意定格結篇鍊句也意者詩之神氣貴圓融而忌暗滯格者詩之志向貴髙古而忌蕪亂篇者詩之體質貴貫通而忌支離句者詩之肢骸貴委曲而忌直率是故超詣變化隨模肖形與造化同工者精於意者也搆情古始侵風匹雅不涉凡近者精於格者也比類攝故辭斷意屬如貫珠纍纍者精於篇者也機理混含辭鮮意多不犯輕佻者精於句者也夫是四務者藝匠之節度也一有不精則不足以軒翥翰塗馳迹古苑終隨代汩沒爾何謂三會博學以養才廣著以養氣經事以養道也才不贍則寡陋而無文氣不充則思短而不屬事不歷則理舛而犯義三者所以彌綸四務之本也要之名家大成罔不具此然非一趨可至也力之久而後得者也故曰會如不期而遇也此工詩之大凡也譬醫之治例三焦五臟風寒暑濕藥有定品方有定擬工醫者能循持而守之雖無大益保無大繆矣雖然工師之巧不離規矩畫手邁倫必先擬摹風騷樂府各具體裁蘇李曹劉辭分界域欲擅文囿之撰須參極古之遺調其步武約其尺度以為我則所不能已也久焉純熟自爾悟入神情昭於肺腑靈境徹於視聽開闔起伏出入變化古師妙擬悉歸我闥由是搦翰以抽思則逺古即今髙天下地凡具形象之屬生動之物靡不綜攝為我材品敷辭以命意則凡九代之英三百之章及夫仙聖之靈山川之精靡不會協為我神助此非取自外者也習而化於我者也故能擺脫形模凌虛搆結春育天成不犯舊迹矣乃若諸家所謂雄渾沖淡典雅沉著綺麗含蓄飄逸清俊髙古曠逸等類則由夫資性學力好尚致然所謂萬流宗海異調同工者也究其六轡在手城門之軌則一而已嗟乎擇善而廣道者賢智之術業也一道以成化者聖神之功用也執事之作固已洞其幾微優入閫奧矣而僕鄙陋之見猶拳拳焉陳之或者道化之妙不無有助於萬一爾惟執事教之答喬學憲三石論詩書劉繪前旌車按渝州因得拜下塵抒積承髙風之愫乃辱寬下吏禮節欵迎愈如儀待若賓情洽比故既領緒論又屬詩式髙敷皇墳旁參風雅真藉恂恂之德也違後假樂注膺懸遲未已重辱投以惠翰貺以金玉之音亹亹數百言將謂繪可以密招談座矣營思奉答浹旬弗搆蓋懼言詩罔能起豫辨事無以塞詰也爰就清誨所及試略陳之來諭云今學士大夫有謂作文尚益世用詩則徒虛糜歲月荒職業耳其信然乎嗟哉富叟指圜錢為阿堵達官目冕韍為徽纆門下奧學豐辭固特飫而謙之不然豈隨流俗人語邪僕愚思文章與詩皆同一義也文誠有用無庸為疣而詩獨無益者乎融融乎文之精琅琅乎響之神也君子動天地徹幽明昔鄒子吹竹而寒谷回春孫登發嘯而木葉皆振秦簫下鳳曠琴翔鵠聲音玄感莫可盡録矧嗟嘆詠諷辭昭六義者乎昔舜帝歌股肱卿雲之詩而羣臣和之令四方風動時雍百姓妖厲不興災疹不作故曰不識不知帝力於我何有蓋至和也近世傳杜少陵之詩可以愈瘧此雖俗説喁喁要可信其至理焉若世所謂無益於用者則有之蓋情無所因義無所著道不關於諷諭旨不達於比興事不究於變正音不分於小大格不判於古今體不察於逺近莊豔乖宜雅俗失班理不鬱氣氣不協聲聲不諧律律不應候鳴不藉於天籟語不抉於丹誠返此十六義其鹵敏者駕言倚馬纎細者假口射雕此所以來伊優類誹之誚矣下者蕪蕪靡靡率意隨嘲則又不若戞戞檻竹喓喓草蟲可以激情而惋思又何况於杞女之哭巴童之歌邪竊謂古樂不興詩之教失傳也詩者樂之體也樂者詩之靈也樂不藉於詩章者則音空而不實詩不比於管弦者則神懘而不鬯由是論之詩必考音聲審律吕詳清濁髙下之變後可以窮隂陽之奧宣宇宙之和孔子曰致中和天地位焉萬物育焉詩者中和之發也來諭又云七言律起於唐沈杜為宗而律體尤難工説者以崔皓黃鶴樓為唐律第一公獨取蘇頲望春以為格律完粹冠於諸子此僕之惑益欲求解於髙明也唐以詩選士故詩盛於唐開元間工七言律以便行幸應制號為近體今且直以七言律相質大槩察其律格莊嚴氣韻雄渾為最其餘審其音或如金或如石或絲或匏但成調動物者咸可入選或一集有數首一首有一二句如格者即名家矣若必欲完全求美如媖姝備選駿馬入圖次其先後摘其瑜瑕恐非所以論一代名音之神趣矣是以二南無分音列國無辨體兩雅可小大而不可差等三頌可今古而不可選列同歸要妙經孔氏刪定矣唐家三百餘年詩人成集者起貞觀虞禇歷元和迄開成李許溫杜至崔塗韓偓止五百餘人耳攻詩者搜攟羣集浸玄咀腴睹其斑斑離離異調同聲異聲同趣遐哉旨矣惡可謂瑟愈於琴琴愈於磬磬愈於柷敔哉故世分一代初盛中晚而妄錯髙下即如楊伯謙嚴儀卿髙廷禮諸君之論恐皆不足以服英靈國秀之魂也觀木芍之艷山桃之夭芙蓉之淡寒菊之秀天然意態各隨鑒者愛之重之宗之習之爾若五季以下作者殆難論矣且唐人之集皆不多帙而近體益少意作者必多其合律盛傳者一家才數篇耳若少陵獨多者天匠絶藝又為詩史不宜盡以唐調規之近代作者憂時匪杜達仙匪李資無透髓之慧功無磨杵之苦而近體且數百篇欲其通靈入奧有益世用豈不難哉僕童心瞀視資與功無秋毫之近而敢於嘈嘈無慚者恃公汪濊之度能並包容也憶昨晤對時曾道諸部使多言僕傲倨難近公獨目為雄雅兼才公恩德藏之窽腑矣示詩八首末三首則從軍行俠客篇紫騮馬僕栗栗疑為劉生邪嗟哉揚鬛之驥人憚䇿之豪眉之夫人憚揖之繪不幸類是也每思陳遵以府掾廢事而馬叟優重趙一以計吏抗禮而袁公下堂繪今忝列郡守明公復以儒雅相推率爾漫答必多恤厚如何與友人論詩彭輅頃丈與僕一再論詩慮其師心自用不肯追逐時好故懸之大觀範以宫徴誨益甚深顧有一二未盡敢略言之夫詩者人之性情也人能無詩其能無性情乎然而巧拙視其才汚隆乘乎運異同隨其識興廢緣之遇均是言也而巧者常豐拙者常澀澀者不足豐者有餘昔之傑然名家卓犖瑰異每一篇出令人頥解神怡者盡天所篤也譬則騕裊騄駬生而自有千里之姿彼駑蹇下駟縱欲騰驤蹀躞卒於疲汗顛蹶却而不前則才固限之也詩發於謳吟文之韻而成聲者也聲之動在人而噓之吹之拊之蕩之槖籥於天地天地之氣噫而為風其聲春溫而秋厲天地不自知也故曹劉王粲之藻蔚不能為枚乘李陵之渾璞二陸顔謝之雕縟不能為建安黃初之藴藉齊梁陳魏土宇偏安其氣崩裂而不完其詞剪割而纎碎若有使之者而作者不自知也唐自安史之變干戈雲擾而正聲以漓己而方鎮逆命皇靈匪赫而音節以靡其鼓籥運槖隱隱宇宙之間司其機軸非作者所能強所謂世隆道隆世汚道汚也評藝事為雕蟲小技誚王楊盧駱為浮躁不任爵祿者皆恥其不能而肆其喙以相媢嫉夫何足以溷牙曠之耳至於元稹優杜劣李而韓愈氏非之李雍厭崔皓之輕佻而太白嘖嘖不容口劉長卿褎然中唐之冠而秦系欲攻以偏師殷璠譏其思鋭而才窄白居易不見重於時輩而雞林宰相賞購千金若此類爾矛我盾甲可乙否紛綸而莫之一乃由其智識之懸殊非知音而故嫉之也夫識者一人之鑒裁遇者當時之好尚初唐之變而為開元天寶也盛唐之降而為大厯也中唐之又降而為建中開成也遡其初必有名公巨卿揭標樹鵠於其上而學士大夫位在下風者翕然欽挹而樂為之驅或髙才盛名之士援朋締黨以同己者為是而後生覓門庭問蹊徑莫不附多背寡捐故就新又或南宫主司柄文衡以低昂羣彥而覬進干祿之徒率掇其中選之篇用為矩矱所以唐之詩格寖卑寖弱而日流於下職此也夫六朝雖曰綺麗而陰何庾薛十數公傳而彌永者其風神髙俊不專雕鏤句字之末故古法廢而古意存猶良金躍冶而出曰我必為鏌鋣者虞世南魏徵楊師道等之在唐引而漸入蒼古半為子昂之先驅彼以青黃黼黻為六朝金玉珠翠為初唐者誤矣盛唐渾脫變化不相沿襲賦其所見物無遁形意未到而詞已屬不暇鑿元始之竅也雖風神稍刊而興象攸寄中唐有弗逮焉大厯諸賢清新雅飭意趣傾吐而漸涉色相不得與語上乘矣况晚葉之季流派岐雜剜精鏟采其繪景也不勝逼切其抽辭也得於鍛鍊既乏空曠之觀復昧天然之解力欲增前人之所未備而不知愈精工則愈凡近也乎夫此四唐者詳其軌轍則然而要非所以論於詩之外也總之本於性情而能融洽以宣之與詞條相映發其冥然淵詣而快心自得者百世不能掩也故曰子雲相如同工異曲而以代置論非知言者也今之為詩者鑱宋之謬洗元之濁而確然以唐為歸嘉隆以來一何先鳴擅場者之衆也第謂之與唐比鄰則可其能入彼之室而與之綰帶共席者幾何人哉何者唐人之為詩也真以已之工拙為愛憎不以他人之愛憎為工拙而今人驚愚震俗急人之我知故唐索之淺今索之深惟深也以淺而妙者為敝帚矣唐取諸平而今取其竒惟竒也真詩湧於吾前忽而弗覩矣故知術業有專攻而跬步之差頓成燕粵也且擬不似為似其説出於仲默而實非仲默以有求似之指夫以有求似為優孟之效孫叔而已若不似之似則超象而入於神離力而躋諸聖言之至者也今之不似者其果似也耶吾丈慕李于鱗而尊向之夫于鱗之撰誠雄矣峭矣瓌矣偉矣其才萬人敵其體勢近代未有其樂府古選既上薄漢魏而病於襲若七言律每於髙華絶響之中不免著運竒之迹逮宦浙以後其詩已將化而溘焉逝矣英雄滿前遂許獨據中原尸牛耳之盟乎哉蘇子瞻云地之美者同於生物不同於所生惟荒斥之區彌望黃茅白葦介甫文非不善病在喜人同已故蘇之與黃大非臭味而子瞻亟稱山谷與少陵同者髙岑與之異者王孟而子美並褒焉無淄澠荼薺之分故皎然倣應物之體贄捧以謁而韋不謂善明目録故藁呈之而韋乃大賞許蓋才分異稟人不能以兼長儻規規強襲其言而神魄抵牾不相中即抱萬鎰之珍終非已物故得不似之似則必以不同為同矣仲默朗語亮節凡搦管揮毫者往往羡其為美而惜年之不遐美而未至今也拔粗豪沉著步趨少陵之獻吉壓於其上天下其誰信之今之為詩者大較江南尚色澤有佳人曼冶之風致齊秦主氣骨有壯夫慷慨之襟度其囿於土風一也自仲尼復生不能強而求其同而赤幟其間一豫一奪要以氣骨之遒上為勝於是聞者譁曰音樂之感人而娛耳在絲竹之要眇不在金石之鏗鍧兩相持不相下也僕所貴知我雖希而故我自在生平有采真之思每自喜去詩不甚逺與其躑躅而邯鄲無寧安於夀陵之鄙態乎丈宜紬摘瞽言而詳教之與王遵巖參政唐順之不會兄於武夷終是此生不了心事三年之間定當發興耳近來有一僻見以為三代以下之文未有如南豐三代以下之詩未有如康節者然文莫如南豐則兄知之矣詩莫如康節則雖兄亦且大笑此非迂頭巾論道之説蓋以為詩思精妙語竒格髙誠未有如康節者知康節詩者莫如白沙翁其言曰子美詩之聖堯夫更别傳後來操翰者二妙罕能兼此猶是二影子之見康節以煆煉入平淡亦可謂語不驚人死不休者矣何待兼子美而後為工哉古今詩庶幾康節者獨寒山靖節二老翁耳亦未見如康節之工也兄如以此言為癡迂則吾近來事事癡迂大率類此耳兄嘗謂非兄不能序吾之文非吾不能序兄之文誠然誠然仙道逼人筆墨久廢然於兄終當果此約勿以久近拘之也答友人論詩書張治道僕自垂髫即有文藝之好而謂古道不興俗鳴爭唱見世之作者專門探奧終詭風人馳心慕古者有蹈襲之弊自立標格者墮元宋之網雖盈笥纍櫝皆不足觀僕才雖不逮功則倍之粗倣古人妙契前代年嵗既久篇簡成集詞旨雖乖精神備具漢魏六朝齊驅李杜初唐雜用至於探騷雅之源求風人之旨户牖齊開羣體畢歸中間間有出入前輩自掣繩墨者規矩雖離方圓靡謬比之古人亦不多讓僕非好大言以欺世厚誣以邀名見世之握燕石而議懷寶者迷不知返或謂前不可追後將日下以李杜為至難况漢魏而益逺見小忽大却不忘攀志不率氣謬為論説亦可笑也豈知夫造化之在人心隂陽之統情性性以定氣情以命思思氣成詞自不可遏安而為常激而為變抽應遇感千古如契故婦人之語取編於常經童子之謡見録於明聖而謂後不如古前不可追者不亦謬哉今以李杜視漢魏漢魏視騷雅等第之遼不啻倍蓰今不法騷雅而法漢魏不法漢魏而法李杜趨向既卑蹈厯斯下鞭策雖勤圍範難逃况不至李杜者哉所以求古人於後代責瓦缶以黃鍾益見其難也嗚呼鼓至聰於衆聾而聽不可示擊黃鍾於太和而音有可宣故沿襲之弊衆人迷焉超悟之幾智者能焉今溺於衆人之見寡乎智者之明為此卑下之説世道日降詞藝靡振後之笑今責將安究始開終繼一唱百隨第恐聰明才辨之士亦蹈覆轍甚可哀也僕昔為髙明所取故著此言以見標的答陳昌積解元詩文書陳沂詩格貴正調貴髙意貴微逺詞貴婉而平實氣貴昌脈絡貴聨屬風致貴疏散古詩以子建淵明為法則辭古而意縱律詩以錢劉為發軔則辭俊而情達文字以西漢為法則平正濶大久當求之蘇李求之沈宋李杜諸家求之左莊太史則腳步皆正至其驟逸跳踔隨所欲而鮮不中法矣若夫研精惟一覽其形容即下手立奇思為驚語終是無據不免牽合壘垜之病誦讀者無饜飫之味惟令驚顧遙望而已足下詩文皆格調尚髙脫去凡近但其中有不快人意處以先意於奇之故也足下幸不以老謬尚思改絃而鼓之未有不得也承不鄙見詢聊復以此明文海卷一百六十
