body:
  text: 明文海卷一百六十一餘姚黄宗羲編書十五論詩論詩書顧璘與足下一見即出郊居野人歳計牽繫不能不然無足為髙明道者念所論詩說衷臆耿耿未盡畧為一談國朝自𢎞治間詩學始盛其間名家可指而數今亡去有集傳世者三人李獻吉何仲黙徐昌穀三人各有所長李氣雄何才逸徐情深皆準則古人鍛琢成體純駁優劣可畧而言大抵皆作家也今雖後賢翹起孰不同聲歸許哉然三賢皆余友嘗共講習而商訂之者知其淵源所自未嘗不擇法於古人李主杜何主李徐主盛唐王岑諸公皆因質就長各勤陶鑄是以立體成家咸歸偉麗夫豈茍然而已哉詩之為道貴於文質得中過質則野過文則靡無氣弗壯無才弗華無情弗藴杜宗雅頌而實其實其蔽也樸韓昌黎以及陳後山諸君是也李尚國風而虚其虚其蔽也浮温庭筠以及馬子才諸君是也王岑諸公依稀風雅而以魏晉為歸冲然有餘韻矣其蔽也易而俚王建白樂天以及梅聖俞諸君是也嗚呼諸君並立名代之才而學詩之蔽猶至於此詩可易言乎哉余又有說今世論詩者言風雅則妄耳上漢魏次李杜王岑諸賢今賢雖衆疇能訾議則詞林之規矩在是的矣舉六朝則曰靡弱舉唐初則曰變體未純雖承先生之常談其實確論乎外是謬矣奈何臨楮灑翰率就其所非而棄其所是綴疊雙聲比合五色雖呈燦爛實昧性情豈中道難從而偏長易勉乎抑新竒易以驚世乃違心以騰名乎杜子曰文章千古事得失寸心知此當要諸後世不可茍恱於目前也或者謂揚雄太𤣥可覆醤瓿桓譚以為必傳顧吾與子不及見耳斯謂良工獨苦者乎余老衰不能復振幸皇運之休明慨英賢之太過抑遏莫語安得不盡於足下哉載觀前代之文弊萌於所勝變生於所窮盛衰相因闗繫非細漢承亡秦縱横之餘建武一變文章爾雅其季乃至委靡不振唐變六朝開元之音幾復正聲宋變五代元祐諸賢遂倡道學及其季也各有纖瑣繁蕪之陋文盛則運盛文衰則運衰莊生曰世喪道也世與道交相喪也可謂洞見幾微者矣國家今日之文不知一變而盛乎再變而衰乎不可不深長慮也足下示教新編雅志髙邈將以揚風雅之墜緒故詞㫖氣格直追李杜而上之特其間六朝唐初之語時亦有之余竊疑焉豈風俗之變賢者不免或衆耳難諧茍為同聲歟是二者皆非足下所宜有也間禀獨見必有定說千萬開教以袪茅塞幸甚與莫中江書朱曰藩舍弟歸辱手誨諸貺展奉惶悚不肖十一月來即謀襄先祖妣葬事百念冗廹懐抱可知幸今反虞之後始獲稍稍安妥新春伏惟行署有相台候動止萬福别後承頻有過從旅况喜不落寞新作想益加富詩末技也以吾中江曠世之識超凡之才奚屑語此顧乃卑遜如處女使人人若得以開户焉者何邪且以古人之詩言之其為調之髙雅措詞之藻麗立意之𤣥妙中江豈不知也顧乃一有所作於已之調之辭之意反遲疑而不能決遷延而不敢出豈古人所有中江獨無哉意者躭嗜太銳謙虚太過是以自信不專求全太速反有傷於淵雅之致耳誠欲獵古人之精華傳一已之體格不蘄勝於人不茍同於俗博採以聚之𤣥覽以一之未契不強求已契勿固執若有若無必俟其優柔自得與已為一盖自得則自信自信則無古今無人我合嘉會之緒成衆妙之門不貴黼黻而貴簡要不貴糟粕而貴神奇渾融無迹自不待較之於銖銖兩兩之間矣方其求之之初千蹊萬徑我或不免為古人所使至此則通於一而我反使動古人也是故自信由於自得必自得始可以言詩也是故詩不可徒寄好惡於人也恃中江愛放言至此行矣中江以子之心行子之事勿悔歳月之無多勿憂聰明之不逮勿患著述之不早我能為蘇李則贈答之數首足以見蘇李矣我能為阮步兵則詠懷之八十首足以見步兵矣靡薄無實之言雖多奚益向見中江言唐荆川作詩亦不甚多似荆川意亦如此不知中江以為何如匆匆卒歳扁舟之約不能踐矣聞新號鳳阿定否舍弟傳諭索鄙作昔周王之吉士非召康公不能遂歌區區謭陋豈易供此役容後圖之不具又答友人書車大任辱丈再惠書若津津乎深有羨於藝文然者且欲僕吐其千慮之一得僕何敢不竭其愚忠雖然雕蟲小技壯夫不為此道非吾人所甚急也僕何言哉盖衿佩之家而應舉者不以此為去取也簮組之夫而治事者不以此為殿最也故曰非所宜急也豈惟不急亦有大損夫士而越爼治庖則妨工奪志其人必在孫山之外矣官而尸位操觚則力窮事廢其人必掛彈章之中矣信乎其非急也今僕固閒居奉母可以縱談之日姑緩頰陳其梗槩竊謂詩文之道其體最嚴其用最大然博古必窮於丘索積累必深於歳時而後可以成一家言藏之名山傳於後世何也詩文各有體不辨體而能有得者未之前聞也夫文貴顯也不顯不足以敷暢其事情詩貴隠也不隠不足以見深長之味設若以文為詩堕議論之窟矣以詩為文乏經緯之章矣故說者以為詩祖盛唐文宗兩漢豈不謂其氣格骨力足以追三百篇之遺響紹六經之廢緒哉曰盛唐則中晚非其至矣况宋元乎謂其句之費雕鏤也然不鑒弊於宋元不足以造盛唐之奥也曰兩漢則晉魏非其至矣况四大家乎謂其格之失髙古也然不妙運於四家不能以入兩漢之室也僕以為博雅二字缺一不可徒博而不能雅則餖飣滿筵昧斲輪之㫖矣徒雅而不能博則空拳應敵如孤陋之譏何第由博以造於雅則可未博而先求雅則不可今夫人家未睹鄴侯之架身不下董生之帷而遽欲雌黄千古網羅百家譬如貧人借富人之衣貧家效富家之宴傍觀者祗有揜口笑耳焉用文之僕自幼閱文選一書乃昭明太子開博望以招賢酌前修之筆海自兩漢三國六朝代不數人人不數首而為之分門别類種種快心雲蒸霧涌玉振金相故其自序有云陶匏異器娱耳則同黼黻殊章悅目則一良不虚耳然其篇帙浩繁典故錯出今人既不能作亦不能讀非不能讀也不能作雖讀如未讀也左思之三都賦十年始成司馬相如子虚賦百日始成故又曰事出於沉思義歸於翰藻今人讀未終篇而倦焉思卧者比比是已乃欲以旦夕奏功其作必不佳其傳必不逺辟之望洋大海縱有如椽之筆終傍人籬壁下作生活其能自開一堂奥哉嗟呼此道難矣多錢善賈長袖善舞自古記之盖可與深思好古者言難與淺見寡聞者道耳故僕以為必熟讀文選一書更歴寒暑晝夜之勤積之數年方可下筆今請勿輕置喙焉即僕自審素無立言之才竊有效顰之志且生平不善藏即連篇累牘朝而脫稿夕布國門欲求一言之幾於道不可得矣何者不專心致志則不得也僕請自今了心世累家食之久無他事關心或可墮體黜聰研朱滴露畢餘生以究心此道不求言而言出焉一吐其胸中之奇其亦庶乎其可也嗟嗟僕過矣僕乃今亦輕置喙矣吾人固自有一段上乗功夫調攝身心皈依性命毋重敝帚而輕千金毋采春華而忘秋實惟求之琅圅芝檢以潛通乎灝氣頓解夫天弢不立言語文字為宗者此乃安身立命之方恐區區詩文非其至也且徒以弊耗精神博名髙而垂不朽抑何益哉古人云千秋萬歳名寂寞身後事名成且爾况未必名乎故曰此道終非吾人之所急也就丈所及而試言之丈亦試聼之姑不一一與楊抑所論詞學王溯元詞雖小道綽有體裁用調必分南北長短北調合絲絃要雄渾南調叶板眼要婉麗長調曼聲舒嘯要腰腹飽滿短調度字下刻要綿密節凑反一於此不稱當家矣用韻必識陰陽輕重如北詞重務頭南詞重閉音務必陰陽分明輕重合宜始稱作者一失較量見笑大方矣作者才情雖不同要不出此三者曰情至語曰典麗語曰口頭語學情至不成流為隔靴搔癢學典麗語不成流為學究填經學口頭語不成流為張打油套子此皆作詞之大忌學者所宜究心也且傳奇猶可藏拙套數最難用短即如新水令一套原屬雙調必欲南北不溷腔板不雜始終勻稱轉折周密方可入選在先作者張斗如論之詳矣近若張子𤣥龍子猶王伯良沈伯英祁虎子輩頗稱當行今得抑所諸君從而後矣再與趙淮獻書徐師曾近承枉過南湖之上并示佳集且委評選豈謂僕粗有知識能永其傳耶悚息悚息夫詩不易作亦不易選故受命以來繙閱數過而後措手乃就諸體若干篇中選取止此非敢謂足下之詩不佳盖求精耳且詩之傳在精不在多杜審言工部之祖也集止數幅歴千餘年不泯非以其精乎唐人選唐詩若國秀極𤣥河嶽英靈諸編均非巨帙所謂代不數人人不數篇者誠至論也足下所著富至千篇而諸體各有短長故入選者或什五六或什二三所取不多無足怪也僕誠不能窺詩人門户然竊妄意以為詩有格調有神采有字法句法格調見於神采之外神采藏於格調之中若字法句法所以經緯二者而動人膾炙非謂纖穠藻麗綴緝滿紙而以徒多為勝也故有一句不佳即棄一聫一聫不佳即棄一章者此選詩之法也今欲因一句一聫而存一章將無魚目混珠之誚乎即如草𤣥翻墨汁擊劍落霜花隠几時看髙士傳閉門嘗謝故人車剪取白雲為帔服斸來黄獨當餱糧頽壁雨深蝸自篆小檐泥落燕空巢心同逝水歸滄海興逐孤雲渺太虚寄情欲折江邊栁問訊遥憐隴上梅坐臨流水心如洗卧對孤雲意更閒又如惟有天中月應憐白髪愁張翰不歸秋寂寞西風吹老紫蓴絲何時縮地一相訪掃榻與君秋卧雲不知濁世紅塵裏消受清風有幾人忽有蓴鱸動髙興夢隨烟雨落松江空山雪後月初霽折得梅花寄逺人並是佳句第恨全章不相稱耳必欲因此而盡存之恐為後世所嗤笑也若加改竄使前後相稱則入選何疑嘗見勝國時月泉吟社集中有摘句圖盖取人所長不忍輕棄之意足下倣而存之不必全載可也足下如以僕言為然則當承命作序刻此二百三十餘首至足至足矣毋事姑息令後人窺其淺深也伏惟裁示以為進止幸幸與謝四溟論詩書朱安􅧔不覿睟顔聆清誨已數年矣跡雖違逺而景慕之私盖每食未嘗不在鉅鹿下也門下以英邁之才洪博之學馳騁騷壇主張風雅為我朝隠逸之冠孟襄陽不得専美於前矣此海内操觚者之通論非僕之佞也僕竊自念㓜而垂髫始就外傅即聞汴中諺云宗室讀書徒費精力耳其言行不得齒於士君子其詩文不得附之作者盖以紈袴之可鄙也僕以為信然及稍長讀古人之書得見往事乃知其為謬論也三百篇多閭閻婦女之詩而聖人著之以為經巷伯刑人也而仲尼不刪而况於宗人乎若漢之向歆魏之丕植梁之統與大圜唐之適之太白宋之汝愚子固輩皆屬籍天府而制作傳之後世載之簡策者固不少也於是矢心自勵乃取漢魏盛唐諸詩讀之亦時時擬作一二篇如瞽行無相遂廢而不為也徐思其故恍然悟之以為百工技藝皆有師傳習舉業者必得名師指授詩道之大而今人皆欲自能之豈不可笑也哉李少泉先生者空同李公之門人也及其謝政僕得從逰授以詩法始知詩有格有調有聲律第才識庸謭駑駘難策是以雖知之而未能也後門下逰梁得覩代卷録亦知其非純粹之作也庚戌以後門下北逰京師觀光利見詩道大備矣逰燕集一出藝林增重焉人皆傳誦始知有謝四溟也戊午再至僕得伏下塵聆緒論受益多矣别來時覽教札啟廸勤懇非素交心賞能如是哉僕觀近日佳製有可議者不敢隠黙以負知遇昔人有願為子美之忠臣者亦此意也今適晉稿似不如逰燕集而中州行稿又不如適晉稿矣至於寄兩京之名宦以詩做人情失古吟咏性情之㫖和李杜之長篇如合婚之用月老牽張家而配李家也格雖是而無復逰燕集之音響矣何大復之摶沙振皮鐸之喻是也此無他多作之故也倘門下不遺葑菲兼採芻蕘翻然改轍惟端居養氣而已使浩然充滿然後落筆如煉金琢玉作一篇則可傳一篇勿貪多而務廣使後人有所去取也此雖愚者之一得未知髙明以為何如劇談而無忌者恃惠子之知我也奉師季先生書徐渭前日承夫子賜書之後即有長啟奉獻付尊門云待錢信去便故尚未得達函丈其中有不盡者則以詩之興體起句絶無意味自古樂府亦已然樂府盖取民俗之謡正與古國風一類今之南北東西雖殊方而婦女兒童耕夫舟子塞曲征吟市歌巷引若所謂竹枝詞無不皆然此真天機自動觸物發聲以啓其下段欲寫之情黙會亦自有妙處決不可以意義説者不知夫子以為何如渭極欲恭詣函丈以聞新解兼得進其㣲愚家事草草遂絆此行俟函文脱稿後或可得卒業也不一答王孟肅徐應雷老親病體不時陡甚僕不能復赴館陽羡六月初遷南韓宗伯宅後北園有髙岡老樹一望緑疇野橋流水不謂入城翻得山林之致親疾小間便於大樹下宴坐念何日與足下談對竟日忽得手書甚慰新詩清貴可敵右丞以足下之才華與心境必能作極平淡詩詩之平淡者此詩之最上乘也葛氏謂從組麗中來落其紛華可造平淡蘇子謂為文當五色絢爛漸老漸熟乃造平淡然則䝞國夫人必老而淡掃蛾睂以朝至尊乎淡者質任自然不施粉黛而面白唇紅翠睂緑髪皓齒素手其色澤光華可鑑故足貴耳乃至飛燕后飾太真宫粧與淡粧等何者其后妃之分固然其國色固在耳絢爛即是平淡豈有漸造之理若五色絢爛與平淡為兩截則無貴平淡矣故葛氏云今人多作拙易詩而自以為平淡識者未嘗不絶倒也似也然又云到平淡處甚難夫曰平淡甚難則可曰到平淡處甚難則不可平淡之境豈鑪錘雕琢之功所到哉秋水出芙蓉天然去雕飾桃紅李白薔薇紫問著東風總不知大都詩與文出乎天然未嘗不平淡未嘗不絢爛桃李薔薇芙蓉是也出乎天然雖絳桃紅藥未嘗不平淡不出乎天然則剪白紵為花素綃為葉不名為平淡故陶詩平淡非必飲酒閒適即荆軻詠故是平淡秋風蕭颯自天地間所有耳右丞詩平淡非必輞川田家即九天閶闔萬國衣冠雲裏帝城雨中春樹等語是極平淡語是極清空境界何者寫帝居氣象毫不損益耳淡者非若粉地可施五色又非若繪畫不復可為粉地也明珠白璧不可施五色而其光采焜燿若備五色日月光被非青非黄非紅非白而天下無一色不在其光中自非凝神而照萬境其可與語淡乎吾嘗天下味多矣天下百物珍羞必五味調和唯蠏也生而有至味可淡食文章之極淡者蠏也明文海巻一百六十一
