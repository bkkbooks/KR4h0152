body:
  text: 明文海卷一百六十二餘姚黃宗羲編書十六論詩答髙洪父何偉然詩中更削真為一字之師從此充悟受益良沃然小子固有繆思未敢質之大方之門而軒鏡在懸雖自知邪魅安得不呈肝膽竊意詩之作也不踰情景二字五方風土之異百代遷變之情或有古人所不及厯而今人厯之則今人自宜隨今之所厯而發今人之語用今人之字既不能強古人之所未厯者豫用之以合我又何必強置今日必用者以投古人今人既可以發古人之未發又安得不用古人之所未用如必但取古人所用之字而用之轉換湊泊便成大家靈心巧運又焉用之况古人亦自有用有不用也彼長吉之奇誕生澀何嘗依樣葫蘆而長吉卒以敢用重若劉夢得不敢用糕字宋子京云空負詩中一世豪如必以一字求合古人則所以負於古人者多矣然而先生之所教亦見今人不知情景為何物惟取新於一二古人未用字使不能用一二未用字者見之輒驚如蝦荒蟹兵竟不知其非利甲也則先生之所教者宏矣辱以小友見收故不揣愚昧唐突先生能宥其罪而進之否答楊蠖菴銓部楊鏘臨卭水山槩佳吾兄又得佳中之佳者觀來書摸寫點綴幽秀淒清開朗醖釀無所不有已堪神往乃筆端婉雅則又不減柳河東手也此等清福弟何敢望然弟亦頗有快活處省會紛囂莊語為諱任取眼前之景領略到來之人調笑詼謔放浪鄙靡與之為嬰兒寄之乎詬厲嗟嗟蠖菴足下我用我法謂是足以逃焉否耶所云近日詩派的有可異但求新脫絶無性情才短而故為倔強意淺而更有痕迹固不若弟之不能而能不能也人面之不同極百千萬億之人以至百千萬億世之人雖極相肖似而必有不同者此化工之妙也然未始少易其耳目口鼻也詩亦宜然意相景會各有所領但能直抒已懷自不拾人餘唾總有真才則有真詩矣若必欲避熟徑標新思不顧意象之離合則胸中先自決裂偏拗而沖夷雋永之天趣亡矣一時習尚如此後之遡源而公評者當何如哉向嘗質之曹能始先生曰近派詩新脫可喜第覺反著色象何如先生曰然新而有痕吾兄聰悟過人當有契於斯語也與友人尹民興不肖五十五年於今二三年中始成詩歌內乏雅德體骨飢寒亦安能為雲霄海嶽之吟者顧孤憤酸辛之情狼子豹孫跳走不住溢而成聲切而成韻當斯時也豈復計其和平溫厚起承轉合遵古詩君子之憲章者昔華州杞梁之妻哀至不欄衝為痛響遂至感動地軸墮陷城隅令兩女子自圖其哭之善營度口吻以與十七八女娘競其咽咽嗚鳴則且不足以感魯國之郊人而况動搖天地哉膚肉聲鳴之外夫亦别有存焉者矣豈專柔潤藻巧而後始為天下之詩人乎懷抱斯言非足下不可以吐此故略陳固愚幸惟裁察明文海卷一百六十二
