body:
  text: 明文海巻一百六十三餘姚黄宗羲編書十七講學與顧東橋王守仁所喻楊墨鄉愿堯舜子之湯武楚項周公莽操之辨與前舜武之論大畧可以類推古今事變之疑前扵良知之説已有規矩尺度之喻當亦無俟多贅矣至扵明堂辟雍諸事似尚未容扵無言者然其説甚長姑就吾子之言而取正焉則吾子之惑將亦可以少釋矣夫明堂辟雍之制始見扵吕氏之月令漢儒之訓䟽六經四書之中未嘗詳及也豈吕氏漢儒之知乃賢扵三代之賢聖乎齊宣之時明堂尚有未毁則幽厲之世周之明堂皆無恙也堯舜茅茨土階明堂之制未必備而不害其為治幽厲之明堂固猶文武成康之舊而無救扵其亂何耶豈非以不忍人之心而行不忍人之政則雖茅茨土階固亦明堂也以幽厲之心而行幽厲之政則雖明堂亦暴政所自出之地耶武帝肇講扵漢而武后盛作扵唐其治亂何如耶天子之學曰辟雍諸侯之學曰泮宫皆象地形而為之名耳然三代之學其要皆所以明人倫非以辟不辟泮不泮為重輕也孔子云人而不仁如禮何人而不仁如樂何制禮作樂必具中和之徳聲為律而身為度者然後可以語此若夫器數之末特樂工之事祝史之守故曾子曰君子所貴乎道者三籩豆之事則有司存也堯命羲和欽若昊天厯象日月星辰其重在扵敬授人時也舜在璿璣玉衡其重在扵以齊七政也是皆汲汲然以仁民之心而行其養民之政治厯明時之本固在扵此羲和厯數之學臯契未必能之也禹稷未必能之也堯舜之知而不徧物雖堯舜亦未必能之也然至扵今循羲和之法而世修之雖曲知小慧之人星術淺陋之士亦能推步占候而無所忒則是後世曲知小慧之人反賢扵禹稷堯舜者耶封禪之説尤為不經是乃後世佞人諛士所以求媚扵其上倡為誇侈以蕩君心而靡國費盖欺天罔人無耻之大者君子之所不道司馬相如之所以見譏扵天下後世也吾子乃以是為儒者所宜學殆亦未之思耶夫聖人之所以為聖者以其生而知之也而釋論語者曰生而知之者義理耳若夫禮樂名物古今事變亦必待學而後有以騐其行事之實夫禮樂名物之類果有闗扵作聖之功也而聖人亦必待學而後能知焉則是聖人亦不可以謂之生知矣謂聖人為生知者專指義理而言而不以禮樂名物之類則是禮樂名物之類無闗於作聖之功矣聖人之所以謂之生知者專指義理而不以禮樂名物之類則是學而知之者亦惟當學知此義理而已困而知之者亦惟當困知此義理而已今學者之學聖人扵聖人之所能知者未能學而知之而顧汲汲焉求知聖人之所不能知者以為學無乃失其所以希聖之方歟凡此皆就吾子之所惑者而稍為之分釋未及乎㧞本塞源之論也夫㧞本塞源之論不明扵天下則天下之學聖人者將日繁日難斯人入扵禽獸之域而猶自以為聖人之學吾之説雖或暫明扵一時終將凍觧扵西而氷堅扵東霧釋扵前而雲滃扵後呶呶焉危困以死而卒無救扵天下之分毫也夫聖人之心以天地萬物為一體其視天下之人無外内逺近凡有血氣皆其昆弟赤子之親莫不欲安全而教養之以遂其萬物一體之念天下之人心其始亦非有異扵聖人也特其間扵有我之私隔扵物欲之蔽大者以小通者以塞人各有心至有視其父子兄弟如仇讐者聖人有憂之是以推其天地萬物一體之仁以教天下使之皆有以克其私去其蔽以復其心體之同然其教之大端則堯舜禹之相授受所謂道心惟㣲惟精惟一允執厥中而其節目則舜之命契所謂父子有親君臣有義夫婦有别長㓜有序朋友有信五者而已唐虞三代之世教者惟以此為教而學者惟以此為學當是之時人無異見家無異習安此者謂之聖勉此者謂之賢而背此者雖其啟明如朱亦謂之不肖下至閭井田野農工商賈之賤莫不皆有是學而惟以成其徳行為務何者無有聞見之雜記誦之煩辭章之靡濫功利之馳逐而但使之孝其親弟其長信其朋友以復其心體之同然是盖性分之所固有而非有假扵外者則人亦孰不能之乎學校之中惟以成徳為事而才能之異或有長扵禮樂長扵政教長扵水土播植者則就其成徳而因使益精其能扵學校之中迨夫舉徳而任則使之終身居其職而不易用之者惟知同心一徳以共安天下之民視才之稱否而不以崇卑為輕重勞逸為美惡效用者亦惟知同心一徳以共安天下之民茍當其能則終身處扵煩劇而不以為勞安扵卑𤨏而不以為賤當是之時天下之人熙熙皥皥皆相視如一家之親其才質之下者則安其農工商賈之分各勤其業以相生相養而無有乎希髙慕外之心其才能之異若臯䕫稷契者則出而各効其能若一家之務或營其衣食或通其有無或備其器用集謀併力以求遂其仰事俯育之願惟恐當其事者之或怠而重已之累也故稷勤其稼而不耻其不知教視契之善教即已之善教也䕫司其樂而不耻扵不明禮視夷之通禮即已之通禮也盖其心學純明而有以全其萬物一體之仁故其精神流貫志氣通逹而無有乎人已之分物我之間譬之一人之身目視耳聽手持足行以濟一身之用目不耻其無聰而耳之所涉目必營焉足不耻其無執而手之所探足必前焉盖其元氣充周血脉條暢是以痒疴呼吸感觸神應有不言而喻之妙此聖人之學所以至易至簡易知易從學易能而才易成者正以大端惟在復心體之同然而知識技能非所與論也三代之衰王道熄而覇術猖孔孟既沒聖學晦而邪説横教者不復以此為教而學者不復以此為學覇者之徒竊取先王之近似者假之扵外以内濟其私已之欲天下靡然宗之聖人之道遂以蕪塞相倣相效日求所以富強之説傾詐之謀攻伐之計一切欺天罔人茍一時之得以獵取聲利之術若管商蘇張之屬者至不可名數既其乆也鬭爭刼奪不勝其禍斯人淪扵禽獸而覇術亦有所不能行矣世之儒者慨然悲傷蒐獵先聖王之典章法制而掇拾修補扵煨燼之餘盖其為心良亦欲以挽囬先王之道聖學既逺覇術之傳積漬已深雖在賢智皆不免扵習染其所以講明修飾以求宣暢光復扵世者僅可以增覇者之藩籬而聖學之門墻遂不復可覩扵是乎有訓詁之學而傳之以為名有記誦之學而言之以為博有詞章之學而侈之以為麗若是者紛紛籍籍羣起角立扵天下不知其㡬家萬徑千蹊莫知所適世之學者如入百戲之塲讙謔跳踉騁竒鬭巧獻笑争妍者四面而競出前瞻後盼應接不遑而耳目眩瞀精神恍惑日夜遨逰淹息其間如病狂䘮心之人莫自知其家業之所歸時君世主亦皆昏迷顛倒扵其説而終身從事扵無用之虛文莫自知其所謂間有覺其空踈謬妄支離牽滯而卓然自奮欲以見諸行事之實者極其所抵亦不過為富強功利五覇之事業而止聖人之學日逺日晦而功利之習愈趨愈下其間雖嘗瞽惑扵佛老而佛老之説卒亦未能有以勝其功利之心雖又嘗折𠂻扵羣儒而羣儒之論終亦未能有以破其功利之見盖至扵今功利之毒淪浹扵人之心髓而習以成性也㡬千年矣相矜以知相軋以勢相争以利相髙以技能相取以聲譽其出而仕也理錢榖者則欲兼夫兵刑典禮樂者又欲與扵銓軸處郡縣則思藩臬之髙居臺諌則望宰執之要故不能其事則不得以兼其官不通其説則不可以要其譽記誦之廣適以長其傲也知識之多適以行其惡也聞見之博適以肆其辯也辭章之富適以飾其偽也是以臯䕫稷契所不能兼之事而今之初學小生皆欲通其説䆒其術其稱名借號未嘗不曰吾欲以共成天下之務而其誠心實意之所在以為不如是則無以濟其私而滿其欲也嗚呼以若是之積染以若是之心志而又講之以若是之學術宜其聞吾聖人之教而視之以為贅疣枘鑿則其以良知為未足而謂聖人之學為無所用亦其勢有所必至矣嗚呼士生斯世而尚何以求聖人之學乎尚何以論聖人之學乎士生斯世而欲以為學者不亦勞苦而繁難乎不亦拘滯而險艱乎嗚呼可悲也已所幸天理之在人心終有所不可冺而良知之明萬古一日則其聞吾㧞本塞源之論必有惻然而悲戚然而痛憤然而起沛然若決江河而有所不可禦者矣非夫豪傑之士無所待而興者吾誰望乎答羅整菴少宰王守仁某頓首啓昨承教及大學發舟匆匆未能奉答曉來江行稍暇復取手教而讀之恐至贛後人事復紛沓先具其畧以請來教云見道固難而體道尢難道誠未易明而學誠不可不講恐未可安扵所見而遂以為極則也幸甚幸甚何以得聞斯言乎其敢自以為極則而安之乎正思就天下之有道以講明之耳而數年以來聞其説而非笑之者有矣詬訾之者有矣置之不足較量辨議之者有矣其肯遂以教我乎其肯遂以教我而反覆曉諭惻然惟恐不及救正之乎然則天下之愛我者固莫有如執事之心深且至矣感激當何如哉夫徳之不修學之不講孔子以為憂而世之學者稍能傳習訓詁即皆自以為知學不復有所謂講學之求可悲矣夫道必體而後見非已見道而後加體道之功也道必學而後明非外講學而復有所謂明道之事也然世之論學者有二有講之以身心者有講之以口耳者講之以口耳揣摸測度求之影響者也講之以身心行著習察實有諸已者也知此則知孔門之學矣來教謂某大學古本之復以人之為學但當求之扵内而程朱格物之説不免求之扵外遂去朱子之分章而削其所補之傳非敢然也學豈有内外乎大學古本乃孔門相傳舊本耳朱子疑其有所脱誤而改正補緝之在某則謂其本無脱誤悉從其舊而已矣失在扵過信孔子則有之非故去朱子之分章而削其傳也夫學貴得之心求之扵心而非也雖其言之出扵孔子不敢以為是也而况其未及孔子者乎求之扵心而是也雖其言之出扵庸常不敢以為非也而况其出扵孔子者乎且舊本之傳數千載矣今讀其文辭既明白而可通論其功夫又易簡而可入亦何所按據而斷其此段之必在扵彼彼段之必在扵此與此之如何而闕彼之如何而誤而遂改正補緝之無乃重扵背朱而輕扵叛孔已乎來教謂如必以學不資扵外求但當反觀内省以為務則正心誠意四字亦何不盡之有何必扵入門之際便困以格物一段工夫也誠然誠然若語其要則修身二字亦足矣何必又言正心正心二字亦足矣何必又言誠意誠意二字亦足矣何必又言致知又言格物惟其工夫之詳宻而要之只是一事此所以為精一之學此正不可不思者也夫理無内外性無内外故學無内外講習討論未嘗非内也反觀内省未嘗遺外也夫為學必資扵外求是以已性為有外也是義外也用智者也謂反觀内省為求之扵内是以已性為有内也是有我也自私者也是皆不知性之無内外也故曰精義入神以致用也利用安身以崇徳也性之徳也合内外之道也此可以知格物之學矣格物者大學之實下手處徹首徹尾自始學至聖人只此功夫而已非但入門之際有此一段也夫正心誠意致知格物皆所以修身而格物者其所以用力日可見之地故格物者格其心之物也格其意之物也格其知之物也正心者正其物之心也誠意者誠其物之意也致知者致其物之知也此豈有内外彼此之分哉理一而已以其理之凝聚而言則謂之性以其凝聚之主宰而言則謂之心以其主宰之發動而言則謂之意以其發動之明覺而言則謂之知以其明覺之感應而言則謂之物故就物而言謂之格就知而言謂之致就意而言謂之誠就心而言謂之正正者正此也誠者誠此也致者致此也格者格此也皆所謂窮理以盡性也天下無性外之理無性外之物學之不明皆由世之儒者認理為外認物為外而不知義外之説孟子盖嘗闢之乃至襲䧟其内而不覺豈非亦有似是而難明者歟不可以不察也凡執事所以致疑扵格物之説者必謂其是内而非外也必謂其專事於反觀内省之為而遺棄其講習討論之功也必謂其一意扵綱領本原之約而脱畧扵支條節目之詳也必謂其沉溺扵枯槁虛寂之偏而不盡扵物理人事之變也審如是豈但獲罪扵聖門獲罪扵朱子是邪説誣民叛道亂正人得而誅之也而况扵執事之正直哉審如是世之稍明訓詁聞先哲之緒綸者皆知其非也而况執事之髙明哉况某之所謂格物其扵朱子九條之説皆包羅統括扵其中但為之有要作用不同正所謂毫釐之差耳然毫釐之差而千里之謬實起扵此不可不辨孟子闢楊墨至扵無父無君二子亦當時之賢者使與孟子並世而生未必不以之為賢墨子兼愛行仁而過耳楊子為我行義而過耳此其為説亦豈滅理亂常之甚而足以眩天下哉而其流之弊孟子至比扵禽獸所為以學術殺天下後世也今世學術之弊其謂之學仁而過者乎謂之學義而過者乎抑謂之學不仁不義而過者乎吾不知其扵洪水猛獸何如也孟子云予豈好辯哉予不得已也楊墨之道塞天下孟子之時天下之尊信楊墨當不下扵今日之崇尚朱説而孟子獨以一人呶呶扵其間噫可哀矣韓氏云佛老之害甚扵楊墨韓愈之賢不及孟子孟子不能救之扵未壊之先而韓愈乃欲全之扵已壊之後其亦不量其力且見其身之危莫之救以死也嗚呼若某者其尤不量其力果見其身之危莫之救以死也夫衆方嘻嘻之中而獨出涕嗟若舉世恬然以趨而獨疾首蹙額以為憂此其非病狂䘮心殆必誠有大苦者隠扵其中而非天下之至仁其孰能察之其為朱子晚年定論盖亦不得已而然中間年嵗早晚誠有所未考雖不必盡出扵晚年固多出扵晚年者矣然大意在委曲調停以明此學為重平生于朱子之説如神明蓍龜一旦與之背馳心誠有所未忍故不得已而為此知我者謂我心憂不知我者謂我何求盖不忍牴牾朱子者其本心也不得已而與之牴牾者道固如是不直則道不見也執事所謂决與朱子異者僕敢自欺其心哉夫道天下之公道也學天下之公學也非朱子可得而私也非孔子可得而私也天下之公也公言之而已矣故言之而是雖異扵已乃益扵已也言之而非雖同扵已適損扵已也益扵已者已必喜之損扵已者已必惡之然則某今日之論雖或與朱子異未必非其所喜也君子之過如日月之食其更也人皆仰之而小人之過也必文某雖不肖固不敢以小人之心事朱子也執事所以教反覆數百言皆以未悉鄙人格物之説若鄙説一明則此數百言皆可以不待辯説而釋然無滯故今不敢縷縷以滋𤨏屑之凟然鄙説非面陳口析斷亦未能了了扵紙筆間也嗟乎執事所以開導啟廸扵我者可謂懇到詳切矣人之愛我寜有如執事者乎僕雖甚愚下寜不知所感刻佩服然而不敢遽舍其中心之誠然而姑以聽受云者正不敢有負扵深愛亦思有以報之耳秋盡東還必求一面以卒所請千萬終教答徐成之論朱陸書王守仁昨所奉答適有逺客酬對紛紜不暇細論姑願二兄息未定之争各反究其所是者必已所是巳無絲髪之憾而後可以及人之非早來承教乃謂僕漫為含糊两解之説而細繹辭㫖若有以隂助輿庵而為之地者讀之不覺失笑曾謂吾兄而亦有是言耶僕嘗以為君子論事當先去其有我之私一動扵有我則此心已䧟扵邪僻雖所論盡合扵理既已亡其本矣嘗以是言扵朋友之間今吾兄乃云爾敢不自反其殆䧟扵邪僻而弗覺也求之反覆而昨者所論實未有是則斯言也無乃吾兄之過歟雖然無是心而言之未盡扵理未得為無過也僕敢自謂其言之已盡扵理乎請舉二兄之所是者以求正輿庵是象山而謂其專以尊徳性為主今觀象山文集所載未嘗不教其徒讀書窮理而自謂理㑹文字頗與人異者則其意實欲體之於身其亟所稱述以誨人者曰居處恭執事敬與人忠曰克己復禮曰萬物皆備扵我反身而誠樂莫大焉曰學問之道無他求其放心而已曰先立乎大者而小者不能奪是數言者孔子孟軻之言也烏在其為空虛者乎獨其易簡覺悟之説頗為當時所疑然易簡之説出扵繫辭覺悟之説雖有同扵釋氏然釋氏之説亦自有同扵吾儒而不害其為異者惟在扵㡬㣲毫忽之間而已亦何必諱扵其同而遂不敢以言狃扵其異而遂不以察之乎是輿庵之是象山固有未盡其所以是也吾兄是晦庵而謂其專以道問學為事然晦庵之言曰居敬窮理曰非存心無以致知曰君子之心常存敬畏雖不見聞亦不敢忽所以存天理之本然而不使離扵須叟之頃也是其為言雖未盡瑩亦何嘗不以尊徳性為事而又烏在其為支離者乎獨其平日汲汲扵訓解雖韓文楚辭隂符參同之屬亦必與之註釋考辨而論者遂疑其玩物又其心慮恐學者之蠟等而或失之扵妄作使必先之以格致而無不明然後有以實之扵誠正而無所謬世之學者掛一漏萬求之愈繁而失之愈逺至有敝力終身苦其難而卒無所入而遂議其支離不知此乃後世學者之弊而當時晦庵之自為則亦豈至是乎是吾兄之是晦庵固猶未盡其所以是也夫二兄之所信而是者既未盡其所以是則其所疑而非者亦豈必盡其所以非乎然而二兄往復之辯不能一反焉此僕之所以疑其或出扵求勝也一有求勝之心則已亡其學問之本而又何以論學為哉此僕之所以惟願二兄之自反也安有所謂含糊两解而隂為輿庵之地者哉夫君子之論學要在得之扵心衆皆以為是茍求之心而未會焉未敢以為是也衆皆以為非茍求之心而有契焉未敢以為非也心也者吾所得扵天之理也無間扵天人無分扵古今茍盡吾心以求焉則不中不逺矣學也者求以盡吾心也是故尊徳性而道問學尊者尊此者也道者道此者也不得扵心而惟外信扵人以為學烏在其為學也已僕嘗以為晦庵之與象山雖其所為學者若有不同而要皆不失為聖人之徒今晦庵之學天下之人童而習之既已入人之深有不容扵論辯者而獨惟象山之學則以其嘗與晦庵之有言而遂藩籬之使若由賜之殊科焉則可矣而遂擯放廢斥若碔砆之與美玉則豈不過甚已乎夫晦庵折𠂻羣儒之説以發明六經語孟之㫖扵天下其嘉恵後學之心真有不可得而議者而象山辨義利之分立大本求放心以示後學篤實為已之道其功亦寜可得而盡誣之而世之儒者附和雷同不䆒其實而槩目之以禪學則誠可寃也已故僕嘗欲冒天下之譏以為象山一暴其說雖以此得罪無恨僕扵晦庵亦有罔極之恩豈欲操戈而入室者顧晦庵之學既已若日星之章明扵天下而象山獨蒙無實之誣扵今且四百年莫有為之一洗者使晦庵有知將亦不能一日而安享扵廟廡之間矣此僕之至情終亦必為吾兄一吐者亦何肯漫為兩解之說以隂助扵輿庵輿庵之說僕猶恨其有未盡也夫學術者今古聖賢之學術天下之所公共非吾三人者所私有也天下之學術當為天下公言之而豈獨為輿庵地哉兄又舉太極之辯以為象山扵文義且有所未能通曉而其強辯自信曾何有扵所養夫謂其文義之有未詳不害其為有未詳也謂其所養之未至不害其為未至也學未至扵聖人寜免太過不及之差乎而論者遂欲以是而盖之則吾恐晦菴禪學之譏亦未免有激扵不平也夫一則不審扵文義一則有激扵不平是皆所養之未至昔孔子大聖也而猶曰假我數年以學易可以無大過仲虺之賛成湯亦惟曰改過不吝而已所養之未至亦何傷扵二先生之為賢乎此正晦庵象山之氣象所以未及扵顔子明道者在此吾儕正當仰其所以不可及而黙識其所未至者以為涵養規切之方不當置偏私扵其間而有所附㑹増損之也夫君子之過也如日之食人皆見之更也人皆仰之而小人之過也必文世之學者以晦庵大儒不宜復有所謂過者而必曲為隠飾增加務詆象山扵禪學以求伸其説且自以為有助扵晦庵而更相倡引謂之扶持正論不知晦庵乃君子之過而吾反以小人之見而文之晦庵有聞過則喜之美而吾乃非徒順之又從而為之辭也晦庵之心以聖賢君子之學期後代而世之儒者事之以事小人之禮是何誣象山之厚而待晦庵之薄耶僕今者之論非獨為象山惜實為晦庵惜也兄視僕平日扵晦庵何如哉而乃有是論是亦可以諒其為心矣惟吾兄去世俗之見宏虛受之誠勿求其必同而察其所以異勿以無過為聖賢之髙而以改過為聖賢之學勿以其有所未至者為聖賢之諱而以其常懐不滿者為聖賢之心則兄與輿庵之論將有不待辯說而釋然以自解者孟子云君子亦仁而已何必同惟吾兄審擇而正之答儲柴墟王守仁盛价來適人事紛紜不及細詢北來事既還却殊怏怏承示劉生墓誌此實友義所闗文亦縝宻獨叙乃父側室事頗傷忠厚未刻石刪去之為佳子扵父過諌而過激不可以為㡬稱子之美而發其父之隂私不可以為訓宜更詳之喻及交際之難此殆繆扵私意君子與人惟義所在厚薄輕重已無所私焉此所以為簡易之道世人之心雜扵計較毁譽得䘮交扵中而眩其當然之則是以處之愈周計之愈悉而行之愈難夫大賢吾師次賢吾友此天理自然之則豈以是為炎凉之嫌哉吾兄以僕扵今之公卿若某之賢者則稱謂以友生若某與某之賢不及扵某者則稱謂以侍生豈以矯時俗炎凉之弊非也夫彼可以為吾友而吾可以友之彼又吾友也吾安得而弗友之彼不可以為吾友而吾不可以友之彼又不吾友也吾安得而友之夫友也者以道也以徳也天下莫大扵道莫貴扵徳道徳之所在齒與位不得而干焉僕扵某之謂矣彼其無道與徳而徒有其貴與齒也則亦貴齒之而已然若此者與之見亦寡矣非以事相臨不往見也若此者與凡交㳺之隨俗以侍生而來者亦隨俗而侍生之所謂事之無害扵義者從俗可也千乘之君求與之友而不可得非在我有所不屑乎嗟乎友未易言也今之所謂友或以藝同或以事合狥名逐勢非吾所謂輔仁之友矣仁者心之徳人而不仁不可以為人輔仁求以全心徳也如是而後友今特以技藝文辭之工地勢聲翼之重而驁然欲以友乎賢者賢者弗與也吾兄技藝炎凉之説貴賤少長之論殆皆有未盡歟孟子曰友也者不可以有挾孟獻子之友五人無獻子之家者也曾以貴賤乎仲由少顔路三嵗囬由之相處盖友也囬與曾㸃同時参曰昔者吾友曽以少長乎將矯時俗之炎凉而自畔扵禮其間不能以寸矣吾兄又以僕扵後進之來其質美而才者多以先後軰相處其庸下者反待以客禮疑僕别有一道是道也奚有扵别凡後進之來其才者皆有意扵斯道者也吾安得不以斯道處之其庸下者不過世俗泛然一接吾亦世俗泛然待之如鄉人而已昔伊川初與吕希哲為同舍友待之友也既而希哲師事伊川待之弟子也謂敬扵同舍而慢扵弟子可乎孔子待陽貨以大夫待囬賜以弟子謂待囬賜不若陽貨可乎師友道廢乆後進之中有聰明特逹者頗知求道往往又為先軰待之不誠不諒其心而務假以虛禮以取悦扵後進干待士之譽此正所謂病扵夏畦者也以是師友之道日益淪沒無由復明僕常以為世有周程諸君子則吾固得而執弟子之役乃大幸矣其次有周程之髙弟焉吾猶得而私淑也不幸世乂無是人有志之士倀倀其將焉求乎然則何能無憂也憂之而不以責之已責之已而不以求輔扵人求輔扵人而待之不以誠終亦必無所成而已耳凡僕扵今之後進非敢以師道自處也將求其聰明特逹者與之講明因以自輔也彼自以後進求正扵我雖不師事我固有先後軰之道焉伊川瞑目而坐㳺楊侍立不敢去重道也今世習扵曠肆憚於檢飭不復知有此事幸而有一二後進畧知求道為事是有復明之機又不誠心直道與之發明而徒奄然媚世茍且阿俗僕誠痛之惜之傳曰師嚴然後道尊道尊然後民知敬學夫人必有所嚴憚然後言之而聴之也審施之而承之也肅凡若此者皆求以明道皆循理而行非有容私於其間也伊尹曰天之生斯民也使先知覺後知使先覺覺後覺予天民之先覺也非予覺之而誰也是故大知覺扵小知小知覺於無知大覺覺於小覺小覺覺扵無覺夫已大知大覺矣而後以覺於天下不亦善乎然而未能也遂自以小知小覺而不敢以覺於人則終亦莫之覺矣仁者固如是乎夫仁者已欲立而立人已欲逹而逹人僕之意以為已有分寸之知即欲同此分寸之知於人已有分寸之覺即欲同此分寸之覺於人人之小知小覺者益衆則其相與為知覺也益易以明如是而後大知大覺可期也僕於今之後進尚不敢以小知小覺自處譬之凍餒之人知耕桑之可以足衣食而又偶聞藝禾樹桑之法將試為之而遂以告其凡凍餒者使之共為之也亦何嫌於已之未嘗樹藝而遂不以告之乎雖然君子有諸已而後求諸人僕盖未嘗有諸已也而可以求諸人乎夫亦謂其有意於僕而來者耳承相問輒縷縷至此有未當者不惜往復又答儲柴墟王守仁昨者草率奉報意在求正不覺蕪冗承長箋批答推許過盛殊増悚汗也來喻責僕不以師道自處恐亦未為誠心直道顧僕何人而敢以師道自處哉前書所謂以前後軰處之者亦謂僕有一日之長而彼又有求道之心者耳若其年齒相若而無意於求道者自當如常待以客禮安得例以前後軰處之是亦妄人矣乂况不揆其來意之如何而抗顔以師道自居世寜有是理耶夫師云者非可以自處得也彼以是求我而我以是應之耳嗟乎今之時孰有所謂師云乎哉今之習技藝者則有師習舉業求聲利者則有師彼誠知技藝之可以得衣食舉業之可以得聲利而希美官爵也自非誠知已之性分有急於衣食官爵者孰肯從而求師哉夫技藝之不習不過乏衣食舉業之不習不過無官爵已之性分有所蔽悖是不得為人矣人顧明彼而暗此也可不大哀乎往時僕與王寅之劉景素同逰太學每季考寅之恒居景素前列然寅之自以為講貫不及景素一旦執弟子禮師之僕每嘆服以為如寅之者真可為豪傑之士使寅之易此心以求道亦何聖賢之不可及然而寅之能於彼不能於此也曾子病革而易簀子路臨絶而結纓横渠撤虎皮而使其子弟從講於二程惟天下之大勇無我者能之今天下波頽風靡為日已乆何異於病革臨絶之時然又人是已見莫肯相下求正故居今之世非有豪傑獨立之士的見性分之不容己毅然以聖賢之道自任者莫知從而求師也吾兄又疑後進之來其資禀意向雖不足以承教若其齒之相逺者恐亦不當槩以客禮相待僕前書所及盖與有意於斯道者相屬而言亦謂其可以客可以勿客者耳若其齒數邈絶則名分具存有不待言矣孔子使闕黨童子將命曰吾見其居於位也見其與先生並行也非求益者也欲速成者也亦未嘗無誨焉雖然此皆以不若已者言也若其徳器之夙成識見之超詣者雖生於吾後數十年其大者吾師次者吾友也得以齒序論之哉人歸遽劇極潦草便間批復可否不一與陸元静書王守仁某不孝不忠延禍先人酷罰未敷致兹多口亦其宜然乃勞賢者觸冒忌諱為之辯雪雅承道誼之愛深切懇至甚非不肖孤之所敢望也無辯止謗嘗聞昔人之教矣况今何止於是四方英傑以講學異同之故議論方興吾儕可勝辯乎惟當反求諸已茍其言而是歟吾斯尚有所未信歟則當務求其是不得輒是已而非人也使其言而非歟吾斯既已自信歟則當益致其踐履之實以務求於自慊所謂黙而成之不言而信者也然則今日之多口孰非吾儕動心忍性砥礪切磋之地乎且彼議論之興非必有所私怨於我彼其為説亦將自以為衛夫道也况其説本自出於先儒之緒論固各有所憑據而吾儕之言驟異於昔反若鑿空杜撰者乃不知聖人之學本來如是而流傳失真先儒之論所以日益支離則亦由後學沿習乖謬積漸所致彼既先横不信之念莫肯虛心講究加以吾儕議論之間或為勝心浮氣所乘未免過為矯激則固宜其非笑而駭惑矣此吾儕之責未可專以罪彼為也嗟乎吾儕今日之講學將求異其說於人耶亦求同其學於人耶將求以善而勝人耶亦求以善而養人耶知行合一之學吾儕但口說耳何嘗知行合一耶推尋所自則如不肖者為罪尤重盖在平時徒以口舌講解而未嘗體諸其身名浮於實行不掩言己未嘗實致其知而謂昔人致知之説有未盡如貧子之説金乃未免從人乞食諸君病於相信相愛之過好而不知其惡遂乃共成今日紛紛之議皆不肖之罪也雖然昔之君子盖有舉世非之而不顧千百世非之而不顧者亦求其是而已矣豈以一時毁譽而動其心耶惟其在我者有未盡則亦安可遂以人言為盡非伊川晦庵之在當時尚不免於詆毁斥逐况在吾軰行有未至則夫人之詆毁斥逐正其宜耳凡今争辯學術之士亦必有志於學者也未可以其異已而遂有所踈外是非之心人皆有之彼其但蔽於積習故於吾説卒未易解就如諸君初聞鄙説時其間寜無非笑詆毁之者乆而釋然以悟甚至反有激為過當之論者矣又安知今日相詆之力不為異時相信之深者乎衰絰哀苦中非論學時而道之興廢乃有不容扵冺黙者不覺叨叨至此言無倫次幸諒其心也致知之説向與惟濬及崇一諸友極論於江西近日楊仕鳴來過亦嘗一及頗為詳悉今原忠宗賢二君復往諸君更相細心體究一畨當無餘藴矣孟子云是非之心知也是非之心人皆有之即所謂良知也孰無是良知乎但不能致之耳易謂知至至之知至者知也至之者致知也此知行之所以一也近世格物致知之説只一知字尚未有下落若致字工夫全不曾道著矣此知行之所以二也明文海巻一百六十三
