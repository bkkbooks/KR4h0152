body:
  text: 明文海卷一百六十四餘姚黃宗羲編書十八講學答胡廬山督學趙貞吉相思甚苦不數奉書問者以公關防之地且煩于酬答耳向陳蒙山取道內江已聞公有欲去之意及接讀翰教始知二公皆為伊人所動欲録諸生講後劄記頗近似者以奉覽久而未就故令答遲遲也頃孫淮海見教公去意已聞兩臺則志已決矣奈何奈何深恨援留苦勸之不早不力也抱歉抱歉如何來諭云道通天地萬物無古今人我誠然誠然但云欲卷而藏之以已立處未充不能了天地萬物也斯言似有未瑩徹處耳愚意謂當云已力未充故時有滯執處時有礙塞處于此但假漸習薰修久之不息徐徐當徹去矣即徹處謂之先天而天弗違即未徹謂之後天而奉天時也作如是功者日用間種種色色剎剎塵塵皆在此大圎鏡智中卷舒自在不見有出入往來之相陵奪换轉之境矣故曰不離日用常行內直造先天未畫前也豈可以為沾帶難于解脫耶又渠云欲于後天中幹先天事此妄作分别語以駭人聽耳且此大圎鏡智即不落有無之竅也更欲求何竅耶中庸曰天命之謂性言其不假人為無善無不善也喜怒哀樂之未發謂之中也發而皆中節謂之和也指其率性而不假人為之處也周子曰和也者中也中節也天下之逹道也指其已發即未發之體也老子觀竅與觀妙同出同玄之旨與此同也佛氏不思善不思惡見本來面目之義與此同也豈可以中庸之言謂墮于情緣難免生死耶公所引情順萬事而無情者即圎覺經隨順覺性之謂也于此了了則世法與出世法一齊徹去無餘矣豈可非之謂于有無中取辨耶吾觀渠書中覬望有待之多自負張皇之甚輕侮前訓以表已能墮於業罪而不自覺嗟嗟雲水瓢笠之中何為作乞墦登壠之態耶宜見笑于大方之家矣姑置勿論鄙見再為公誦之且公謂之了天地萬物古今人我者愚意度之當如李異人合論謂自他不隔一毫端始終不離于當念云爾如公云責任之重有不容已欲為已任又立處未充則不免于攬厭之病矣何則天地萬物古今與我一體也而欲取為已任則二之矣是攬之纍也謂迎之也我與天地萬物古今一用也而患已立未充則二之矣是厭之纍也謂將之也均之非謂隨順覺性也且隨順覺性之句有三焉其一函蓋乾坤句周容遍攝之謂也其二截斷衆流句獨一無侣之謂也其三隨波逐浪句即隨順覺性之謂也三句一義也一義三句也夫能周容遍攝則一體矣能獨一無侣則一用矣能隨順覺性則即體即用即用即體體用一如矣夫學至于體用一如則逹乎大覺圓頓之門矣古人不貴踐履只貴眼明若能于此具眼歷落分明雖于日用之中官私之事情有滯執處念有礙塞處一歸于習氣之纍漸資薰修方便而徹之耳如是則青城峨眉之中即衡山廬阜之境也衣冠師表之地即御風雲逰之處也逸莫逸于與衆同知也勞莫勞于違衆獨棲也古歌云如今休去便休去非謂休官休世休事也謂休其不了之心也又云若覔了時無了時不了之心在官去官任事謝事俱不了也惟智者當下了即當下休矣當下休即當下徹矣雖然其至爾力也其中爾巧也聞公昔學射于唐荆川矣自今觀之巧其可學乎然荆川之講射法皆巧也當其初巧不在我而在荆川之言故曰不可學至其久而力充矣力充則巧至矣然後荆川之巧始在我雖謂荆川教我巧亦可矣聊以發公笑惟撥冗賜答望望與趙浚谷中丞書趙貞吉慕公踰二十年僅為趙州風雪道上倚馬數語既已不堪其渴思矣别後復踰一紀始得連榻信宿于涇源之上為慰如何然而中心欲講説并其躡蹻登臨之興非信宿可能盡也竟以此際别去若恝然者鄙人識淺實有顧後之防耳惟公能鑒之公以其為怯耶頃領順慶人賫到華翰并佳集書旨皆戒僕之留意禪宗者夫僕之為禪自弱冠以來矣敢欺人哉公試觀僕之行事立身于名教有悖謬者乎則禪之不足以害人明矣僕蓋以身證之非世儒徒以口説諍論比也吾性中所謂虛靈不昧乃統指性而言非僅指知覺之用也夫具衆理應萬事非渾然之心不足以當之即所謂天命明德也故至虛而有至靈者即程子所謂靜中有物者也可謂虛非性乎但可言心不可以言性也公常以此意攘袂談説于海內之人矣背去則鮮不以公為狂也而僕則向風賞音知公壯志有兼濟天下之氣故願一見公如渴如飢今僕亦欲以明智定力破此一身伐性隂賊雖不能徹底一澄照睿聖聰明如古至人而莊孟以下欲庶幾也向來嘗以此意微露于公前而公遂疑之僕何不幸而不遇公之賞音哉夫古之君子得志則兼愛天下不得志則康濟一身耳且一身亦不小也是天地之心也隂陽之會也鬼神之交也五行之秀氣也未有不被此根塵識念所壞者今自顧其身與凡夫等而欲造神聖之業豈不難哉公幸勿因忌其名遂不求其實也且宋儒拘拘而舉業之士乂不足以語于盡性之門彼若肆其胸臆出不遜則豫將奈之何故嘗自托于不省以免其喋喋唯于公之前則不敢復遜也夫公之戒僕意甚厚謂僕之才似可偹世任使者若向空寂之途則灰其有為之志窳墮散棄不可鞭策而損于名教故可惜也頃京師有友人亦以此意相責僕欲發揮此道其説甚長頃刻未易傾倒今第與公約倘聖主異時任用公以廓清斯世僕雖老猶能為公執殳惟所用之功成便當角中東道視去榮利若脫屣耳有一不如兹言公然後食之階下亦無懟焉此書若逢羅逹夫可出之以致鬨堂不必示他人以啓爭端復廣西督學王敬所書趙貞吉自祁陽領翰諭于是僕病且兩月矣是日始取道永州入粵期以趨侍台嚴以受戒束顧先獲捧華章以重羈旅雖身在糞土而榮如雲錦之被體也惟先生才器夙成不煩磨琢以駕于時徑翮髙騫俯觀萬類衮衮餘子無足當意顧劣如僕乃枉拳拳往在隨行通籍雖數仰南州之譽未一納西階之刺至奉使無狀棄之逺裔辱當時而羞列士進無容身之哲退乏立名之業徒具華髮而令妻孥顛露道左已身以禦魑魅受世之訾詬未已若此可謂劣矣昨飛雄嶺中瘴止存皮骨耳孱妻弱子相向而泣是時可謂狼狽智勇俱困之際矣乃以宿無先容之資而君子眷然顧之蓋投手而置之全安之域破世俗之拘攣而陋炎涼之錮習雖僕亦不知斯愛之所從也若此者豈非意氣相期屬于豪傑非衆人所同者哉嗟乎此事雖不足以盡門下之特逹在僕則感激重矣奚翅僕哉雖使魯連髙蹈太白不羈猶當折體酬恩亹亹報知已也何則易感者戚結之情難忘者無媒之惠故也自患難衰病以來血氣頓改神志亦弱誦習章句無一存記聞欲解其持牘之役以修鼓篋之業則旦夕惴惴懼為輿土龍而施雨恐驅策不前以傷門下之明自祁移永僅百里即精神昏蔽困頓數日猶未招復嗟嗟復安所藉以自效耶所以撫躬俯俯以思仰答惕中而無時休也俟至全依醫調攝稍定嗣布蒯菅請裁狂叟耳其二承示髙文讀之芒寒正色其指同于王伯安氏其文丰容峻整班孟堅荀仲豫之流也至其中所稱士變豈不益可慨哉楊墨佛老縱橫諸家姑勿論論其後所稱者世之士為毅為節為才術為事功諸種種其于性皆逺矣其為途何多也夫在孔氏之門才之異者其總為品也有三其棄不與者一狂也狷也中行也此三人者孔子之所與語也鄉願者孔子自謂不願使入門是直棄不與者也今掩然媚世之侣似少肆而人不知覺矣乎忠孝之道日薄而天常人紀識者憂其負荷之難也辨言澤貌忮中強啄以鼓于世而便其私圖紛紛何時已乎安得孔子之所欲與語者不少槩見而棄不與者乃纍生于世乎欲與共反經敦彛之學率性依中之旨其誰為歸乎宜分之憂之也夫古之君子以道之不明已之罪也人之不動已之過也宜公之不能恝然也然而流風浩浩人懷其心欲變今之術與習而大同之其何始乎不曰大人者正已而物正矣乎其義淵深其任最重者乎夫吾之身天下之人之一人也一人唱之百人和之其類安得不衆乎若是則庶民安得不興邪慝安得不變乎夫君子者衆人之表也其所則而效焉者也以言唱之以言和之而言有枝葉以行唱之以行和之而行有枝葉公欲變今之習俗而大同之必使天下之行有枝葉而後可也今天下以言唱多矣而風靡然日下何也公其知之矣一洗小儒之學非公其誰望哉僕流離疾病之中幸遇髙賢接引故強為轉語如此非有知也其三趙貞吉領來諭示以真之訓其説曰茍其意真矣雖從入之途稍異彼顧無害于聖人之中道雖萬舉千差吾猶信之而况其不至于差乎確哉其言之矣非公仁為已任擔荷之重誰能的然為斯語哉夫真未易言也黜妄而後歸真公謂狂狷皆有生意而願者之根芽則焦爛不復入土此最真偽之别也至以訟事喻尤切于三人者之情僕亦紬繹為數喻以酬來教可乎夫黜妄者如蕉之喻真種者如蓮之喻偽作者如姚黃之喻今夫剝蕉身者無蕉然不有蕉之根乎故黜妄者重重汰之則根本露而真體見矣蓮生淤泥而無所染非君子履世行已之則乎然蓮之為花非啻揚采質已耳為蓬為殼為仁仁之中復為薏焉則又一蓮矣此天機最真之處也君子力學履世而自得有似于此夫姚黃非不美觀與蓮奚以異然其爛然露者徒以供王孫俄頃之玩則委諸泥沙耳竟何成哉今之論者欲胥率其徒同出一途則千萬一喙而真妄茫然無别遂令剽竊緣飾之儔得窠臼其中此不剝蕉之故也夫觀蕉之外非不蒿然大也而不知中實無有今持此術以履于世則剽竊緣飾之情亦易以見蓋利害得失毁譽幾微之際而肝膽盡章矣此其不能如蓮之潔也明矣公謂斯人得志則益足以驅市人夥而從之非僕謂之俄頃把玩之際乎而不實之心虛浮之質徒慚負神明而幻其生平寶山空手可慨也哉故君子之學必若薏之為蓮而後謂真得夫如此則可以隱可以顯可以默可以訓可以接前人之緒可以開後人之智可以格物經世而行教化天下之善行美名皆歸焉而不得辭自與世作則而世自戴之若尊親焉雖沒世而不能已此謂之至善大人之學非耶以其始之真故也僕方有志于此而未之力學聞公髙論不自禁持縷縷如此然辭未逹意為之歉然語云心之精微口不能宣殆謂是哉先生其何以教之其四二月初至家六月有量移之報忽臨粵使乂枉尺書及所編定朱文幸甚幸甚僕昔在館中櫝蓄此書每讀之未嘗不惜我晦翁之不嗇于言而勇于爭論也或曰不直則道不明然則翁直也非爭也答曰嗟乎是殆難與人言也往豫讀荀卿之譏孟子略法先王而不知其統未嘗不駭也及探道日久心稍有知回視孟子之禽獸楊墨則竊謂持論之過嚴矣夫二子之學要有所本也墨子本于禹楊子本于黃帝老子二子皆當世髙賢其學本以救世至其徒之失真則非二子之罪也遽極其討伐而擬諸禽獸焉非不深究先王之學術亦各有在之過乎謂之略法者以言不深考云耳夫孟子法孔子者嘗謂孔子自生民以來未之有則于孔子之前上聖至人誠亦有所不暇考乃荀氏之言亦未為過至謂不知其統則雖豫亦不以荀言為然矣何則統者道之宗也言之所由出也立言而無其宗如瞽在途觸處成窒豈宜以論孟氏也孟氏之宗持志養氣是也是孟氏之三昧也義即子思之中和也夫晦翁法孔孟法堯舜堯之授舜曰執中而子思訓中謂喜怒哀樂之未發翁則以為人自嬰兒以及老死無一息非已發其未發者特未嘗發耳其非子思之旨明矣至其末年乃嘆師門嘗以為教顧已狃于訓詁文義而未及求至老年尚起望洋之嘆不知翁之將姑為是謙退耶抑所造實若此耳夫使翁之所造實如此則翁所法孔子之統者何在夫晉鄙之未遇魏公子也猶三軍之主也及公子一旦奪符而鄙休矣故三軍從符而不從將者也夫千聖之統一符也千古之聖賢人一公子也千古智愚之心靈一三軍也翁之統一諸子者不能合符孔氏則雖評騭之工説彈之盡椎擊之便剝剔之精但服其口而不能服其心後之人尤依望諸子有搴旗擊空之能而不遽去也嗟乎是殆難與人言也蓋孔子既沒大義已乖而微言將絶于是紛紛好飲食而勘亷耻以詩書發冡者塞路矣故荀卿斥之為賤而莊生欲齊物論也夫物論者謂人各是其是而非其非故曰大言炎炎小言詹詹如衆竅之號而各據其翏翏刁刁以相爭于靡然之途者也夫莊子之雅意欲息諸子之爭論以相忘于道術之中云耳顧雖程邵大儒亦不之察乃去其論字直以莊生為欲齊物如孟子稱物之不齊之物乃曰莊生欲齊物而物終不可齊嗟乎文義尚未知解况肯會其意乎後之善談道術若莊生又莫過太史公也太史公嘗論六家指要矣曰吾于道家取其長焉耳吾于儒家取其長焉耳吾于墨家名家法家隂陽家皆取其長焉已耳其短者吾將棄之已耳所貴于折羣言之𠂻者不當若此乎今觀晦翁之書其所評騭千古説彈百家椎擊名士剝剔羣言不遺餘力矣有曰吾于某而取其某長者乎有曰古之學術有在于是者某聞其風而興者乎各以其術鳴而同于一吹目為天籟者乎或曰晦翁自任之重故闢邪距詖不得不嚴本孟子也烏得以莊生史談之論道術比豫曰嗟乎此所謂殆難與人言者矣且學術之歷古今譬之有國者三代以前如玉帛俱會之日通天下之物濟天下之用而不必以地限也孟荀以後如加關譏焉稍察阻矣至宋南北之儒殆遏糴曲防獨守溪域而不令相往來矣陳公甫嘗嘆宋儒之太嚴惟其嚴也是成其陋者也夫物不通方則國窮學不通方則見陋且諸子如董楊以下蘇陸以上姑不論翁法程張矣而不信程張尊楊謝矣而力闢楊謝凡諸靈覺明悟通解妙逹之論盡以委于禪目為異端而懼其一言之汚也顧自處于日看案上六經論孟及程氏文字于一切事物理會以為極致至太極無極隂陽仁義動靜神化之訓必破碎支離之為善稍涉易簡踈暢則動色不忍言恐墮異端矣夫如此學道烏得不陋昔項氏父子起江東以其尊號與楚心劉伯升兄弟起南陽以尊號與更始皆謂授人以柄而後爭則久已出其下矣晦翁之論以為闢禪而不知其實尊禪矣夫均一人也其始可以學禪亦可以學儒也謂靈覺明妙禪者所有而儒者所無何耶非靈覺明妙則滯窒昏愚豈謂儒者必滯窒昏愚而後為正學耶子思曰惟天下聰明睿知足以有臨大傳曰古之聰明睿知神武而不殺是豈塵埃濁物昏沉鑽故紙而已耶雖然翁固未易測也豫嘗考其世設處翁之地而論翁之心其拒禪甚力惡蘇尤深詆陸太露其意亦略可觀矣蓋南渡之後髙孝二帝極愛蘇氏文章所謂家藏蘇氏之書人講眉山之學也二帝又皆好禪故皆內禪以畢其功豫嘗見佛照禪師奏對録而知朱仲晦之不遇孝宗決矣况于光寧之朝耶翁忠孝天性剛奮有餘欲復二帝之讐而無一旅之託其文章議論至于國勢安危之幾君子小人升降之際則芒寒正色恢拓竒崛使人凛凛聽之不倦視其講學訓解如出二手誠有以激之也陸氏之異則出不相下所謂明其為賊乃可服之意耳夫僕往之讀朱子大全之日其論如此乂欲以暇日披覽抉摘取其合者為一編别為一書以表白諸子凡經朱氏掊擊者明其學之各有宗也附于莊氏道術篇之後以繼鄒魯縉紳之論以關涉頗大力未必得遽為而止也今讀公所抄若有意焉故肆發其狂愚不知有合于公之意否便中幸一批教焉夫我輩之于斯世出諸老之後以論學知言為任者也又遇良友烏得不盡勿外其狂而踈絶是幸適抱采薪之憂詞不發越不得逹此𠂻曲兾鑒其略云耳答大理寺李中溪書趙貞吉會短别長不見公已三十年矣士夫與釋子逰士談公行事不知其幾千百俱倣佛耳未若南都遇貞所馮公見公手翰深説道妙知遇異人又得真悟故自度度人亹亹不竭如此其説如探物懷中不假搜索又如食蜜中邉皆甜贊嘆竒特終嵗不盡以遭大憂與貞所别今二年矣忽枉手札又領所著心性圖説可謂奇特中奇特元聖祕密大事因緣滿口道之傾囊出之惟恐人人之未及知何其慈悲之大也且宗門中自少林單傳以來皆言語道斷一路不知何事六祖下南陽忠公出一清源道者有許多圓相宗旨付與仰山而西方神僧與小釋迦相見亦以圓相相示故五家宗門獨溈仰一𣲖入門便打圎相其説至數傳遂絶矣嘗推原其自豈非伊家三點卍字輪相先佛一脈之流傳乎五代時陳圖南不知何處傳有太極圗而濓溪得之著為説以傳于世故道家者流如白玉蟾李和清紙舟沖素輩皆畫圓相以為鼎器而文始經性心情識意諸説實相符契與禪宗雖不無一線之隔而源流傳播信祕藏之未嘗絶響也觀公所著真遇異人而得真悟無疑矣苐援孔顔樂處以為首楞嚴定此自生諍端也白沙云千古聖賢如過影何必援以為重耶得無有美名之慕乎願先生自信自悟不必求世之知我而欲普度衆生亦非意識著述所能辦也如何如何近日友人問僕以心性之别僕答之曰心如水如鏡性是其涵光之處心又如劔性是其利斷處故聖凡同居世而不同生同沒世而不同死也似與先生之論頗合如何去人倚馬促書不能萬一又久荒筆墨不能自書俱希鑒亮便風乞再賜教當竭其愚今聊發其端耳與聶雙江司馬書趙貞吉馳神公所者幾二十年矣然未嘗修問通殷勤左右此足明僕之不敏也乃過蒙不棄以為可教前年領訓言示以乾乾免咎之旨蓋讀之犁然有當于心惕然有警于中無何即及于罪譴誠服先生之先覺矣兹僕之事譬之盲子被髮號走以救鄰火出門跬步即入坎窞誠足耻矣過者棄去不復顧視獨有長者見盲子哀其以救火故不惜千金之藥大賜盲子令其復明此長者之恩寧有既乎嗟嗟僕往事念之誠可愧耻若此盲子三年來親識舊逰無復一字相問乃乂過蒙長者不棄絶猶以為可教兩度寄問今領後番周二守所賫到誠欲僕之心復明也已視此長者憐彼盲子恩不百倍耶三年謫宦瘴癘疾病不啻其心苦耳乃其不肖之身亦已敝矣然未嘗敢以一字聞于親識舊遊亦士之體當爾非以為名髙也兹則不敢自外于左右者誠又服先生之先覺作人長厚慈義之重矣嗟嗟僕生二十年方知學道初以苫次三年見哀而不傷之體後復閉户習靜久之雖未凝寂而正念不失又三數年可自娛樂稍以家貧故出求仕遂荏苒名妄粗狂暴害十六年始及于禍三年中悔艾念此則魂魄動而病亦作矣乃其初念旋以暗濁嗟嗟僕之行履二十五年之間又若彼田舍郎之積少資以自殖忽出大都羡其巨麗歸以少資往日南朔北朝夕馳騖資盡窮歸無所于託栖惶在道復念少資有如隔世乂若夢中今先生之憐僕墮盲子之困而不知由僕動狂賈之妄念始乂如此乃昨讀所惠三書驚嘆奇作入一悟之門抉百氏之髓前無古人後無來者依此修行可以出世可以經世無復疑阻矣僕悔艾離索之中得此如前貧田舍郎依戴長者寶車圗營復少資雖為客作常得沾丐喜慶無既如此雖欲拘小諒自外于門下得乎恭惟有道應期以解世紛吾君得忠靖之臣公卿獲直諒之助士大夫有持論依歸之地顧僕懷犬馬之心者其於國禎寧不戀企他日稍得慰倚閭返初服倘不即先朝露當手寫是寶書藏之眉山中以諗千古以報知巳未由瞻接肆此緬縷惟賴庇覆愆罪不以示人萬萬寄洗少汾書趙貞吉别久矣尚憶兄向在都下坐敝舍中論白沙詩法英特爽拔人猶在目昨寓胄監廣南諸生携示兄所論辨不覺喜敬造詣之深修為之實雖從此坐陳子釣臺稱湛門宗嫡誰得禦之健羡健羡弟以粗浮之過至勞恩譴入粵以來每翹思君子翼之寡過山川修阻惄如見之近以學不得力猛自省改翻思向者少壯入仕之初天心初復光景稍露始入靜安之門頗輕諸纍之繫當斯時也祇宜退步知非檢過畜德以俟實得而根力輕微不自禁持嘐嘐多言自蹈淺薄遂生一念欲速之心乃有凌跨古人旁睨一世之祟令入心腑而諸障種種因之竊入復樵舂綯汲與祟作家而祟益得志矣蔽以屑末之雲令不見眉睫之過塞以芥豆之黈令不聞雷霆之聲祟之能如此昨涉憂患始悟道力輕微又牽疾病血氣頓減而祟之情狀遂盡露矣何則古人剛柔彰微之論不震不動安身知本之説身心澄契無一吻合乃知昔者光景虛浮強陽氣耳烏在其為學哉兄之髙明敏逹百倍於弟而師友發明日新月煉學問過患似易察識矣然前所稱祟者每瞰髙明之家而藏於膏肓之地遇為所蔽者譬如中魔之人自為護魔之説人孰得而指之耶故不可不精察母若弟之久為所弄而嘆自覺之之晚可也復歐陽柏菴掌科海瑞承諭聖人無近功速化今日行之明日見效皆伯者詐術之私而已此説似矣實非孔子言必世後仁至三十年遲矣然為魯司寇男女别途豚羔不飾價子貢謂立之斯立道之斯行綏之斯來動之斯和又未有若此速者是則何為聖人即此道法即此至誠惻怛之心為之可以見效於數十年之後亦可以收效於俄頃之前必世後仁之中自有綏來動和之妙不言其速而自無不速猶之男耕女織數月而後得衣食遲矣然自此以後陳陳相因有餘粟有餘布無速無遲而不得徒以其初言法制未備聖人亦必有以處之非坐而待至數月也縱商賈傭功場圃夫腳嗣往興來莫非王道亦莫非孔門事業今人每鄙書生迂腐無用勇猛能操切吏書仕宦盛氣於世正以書生知王道之遲不知王道之速也假如於今賊臨城臨村破滅呼吸乃曰候我去做務農講武之法來其可乎醫家急則治其標治標亦醫家正道而非旁門邪術也治標與綏來動和作用不同姑就速化一端言之富國強兵陋為伯術儒者不屑聖人不富國強兵耶什一而徹田獵講武富國強兵天下之於聖人莫是過也謂聖人言義不言利兵非得已天下寧有這等癡聖人死地聖人耶自謂我為天德為王道一謀畫一施行大大小小求之而不可得説為矣而又不見其出手為之茍且因循日挨一日止是以一件有待不可速做藉口答人此天下所以厭儒人迂腐無用而尊孫吳管晏也伯以速道悮天下儒以遲道悮天下其害一而已矣詐術猶可支持目前腐儒目前日久俱無用之世主樂就功利厭仁義之談厭腐儒也無所倚仗不得不然也今日有真聖人出焉逺過孫吳千百世主無不樂之樂之非真知德義可尊而貴也樂其逺在孫吳之上富國強兵見目前也許魯齋謂學以養生為本或者以為不知道譏之借口養生為富積計則謬矣朝聞道夕死可矣天下之人死矣亡矣而後可以聞道耶賜不受命貨殖顏子庶乎屢空未聞顏子聽其餓死不為生道計也儒者迂逺而濶於事情無所用之有賊臨城行冠禮者有一籌不展抱守忠義俯首就戮者聖人原無此等道理原無此等忠義也吕祖謙謂莫速於聖人莫遲於申韓莫利於聖人莫鈍於申韓此道此意知道君子自可得之於其速不於其遲伯道也為其遲亦為其速王道也天德也公區區之説不免毫釐之差謬以千里敬布所見求正非敢為辨也與王伯安先生書吾謹往嵗獲見執事於杭城欵領道論深覺灑然自得以為執事德器溫粹言議精密今世之君子論道義者無如執事惜再往欲竟其緒言而執事行矣悵然而歸至今且以為恨謹少時嗜釋老之術索其書讀之竟日不厭悅其清虛髙廣之論見其同而不察其所以異灰心死形幾至無救自知夫體用一原之學而僻側固陋之習已漸掃矣恐厭酣糟粕之餘或未能盡滌其渣瀝時時發言猶不免踵故習執事於其每言而疵之曰此禪家語謹亦安敢自文也哉然以為認虛靈之識而昧天理之真淫於虛寂之教而終身不知返者則實非謹之所甘為也執事述程子之意謂才説性時便已不是性孟子所謂性善是繼之者非本然之性也是誠足以破釋氏知覺是性之説而吾儒天理自然之妙有不容辨議而明者但謹之所謂虛靈不昧乃指統性情之心而言而非指虗靈之識也夫具衆理應萬事非渾然之心不足以當之即所謂天命明德也故至虛而有至靈者存即程子所謂靜中有物者也可謂虛非性乎合虛與氣有性之名釋氏徒取其氣之知覺運動以名夫本然之性而程子所謂性乃太虛之名也謹之所謂虛靈是性亦取張子之合虛與氣者而言也茍以虛靈不昧輒為釋氏知覺之説則謹之所未及知也若又以虛靈不昧為但可以言心不可以言性則朱子固以是訓明德矣明德可謂非性乎况心可以兼性故程子以未發之心為性虛靈不昧固不可謂之已發也幸執事為謹剖之竊謂世之欲排釋老者大率當如歐陽氏所謂修其本以勝之不宜呫呫動喙與之角勝負也周濓溪無多言説讀其書者亦足以知邪正之辨至程子始别之然亦云不若從迹上看故攻其迹則猶可屈之為城下之盟及朱子乃謂其源頭已與吾儒有别夫辨其源則彼固有説以扺我矣此朱子不及程子處且楊氏所謂其慟其喜中固自若而引莊周出怒不怒之言以明之其形容聖人之心似亦不為害理朱子以為誠如其説則是聖人當喜怒哀樂之時此心漠然同於木石而姑外示如此之形凡所云為皆不復出於中心之誠矣此尤可疑也夫程子固曰聖人之心如明鏡止水矣蓋謂隨物應之如水鏡之照物因物而見水鏡固漠然無所動也今以聖人當喜怒之時猶不免動其心以應物無乃異於明鏡止水之義乎若以漠然不動為不出於中心之誠竊乂以為不然夫渾然在中即天道之誠因其可喜怒而喜怒之特其心不逐之而動耳尚安得謂之不誠乎况程子答蘇季明之東亦曰以事言之則有時而不中以道言之則何時而不中喜怒哀樂之迹所謂事也而聖人之心渾然全體即所謂道也若徒見其事有時而不中遂謂其心之應事亦隨之而有所偏倚無乃異乎此其所謂離於釋老者何耶若楊氏所謂顔子雖夭而有不亡者存朱子疵之是矣其言曰若曰天命之性則是古今聖愚公共之物而非顔子所能專若曰氣散而精神魂魄猶有存者則是物而不化之意猶有滯於冥漠之間尤非所以語顔子也是所謂任消息屈伸之往來而廓然與化為徒其髙於釋老之守靈爽知覺者奚止一等然而人心不死之説與夫圓融無際之語尚不免掇其緒餘幾何足以服其心而使之帖然不敢辨是非哉夫聖人不得已而有言言之多非聖人意也後之儒者往往得已而不已故時有出入之弊徒足以起爭端耳往嘗觀橫渠之言曰道德性命是常在不死之物也已身則死此則常在竊笑以為立言正不當如此孔子未嘗無言不過曰窮理盡性至命而已今欲攻釋氏而立為此論不幾於助之乎謹亦誠知夫聖賢立法之嚴衛道之至時時猶不免異端襲擊潰圍之弊况敢身自蹈之以滋天下後世之擾乎徒以為不必與之多辨明吾儒體用一源顯微一致之妙篤於力行以自致於髙明則勍敵可不攻而破矣執事以為何如由敬而靜由靜而虛虛則性矣此謹之思自力者也不知尚有墮空顛仆之患否幸示教焉若精微之論非面究不可兹且未及覼縷惟執事心察之明文海卷一百六十四
