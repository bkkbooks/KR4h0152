body:
  text: 明文海卷一百六十五餘姚黃宗羲編書十七講學與方西樵王漸逵向者夜間造謝門下辱不鄙與進教愛彌至得聞所未聞虛而往實而歸夙昔之望深為慰幸伏惟尊丈髙蹈於樵涵養日久造詣蓋精濯去舊見以來新意所解經義皆發前賢之所未發者然向來蒙所指教尚有疑難欲即質正以深夜不敢勞於長者遂爾拜别回鄉後捧誦明訓靜而思之終覺未灑然脫悟故不揣謹此奉逹非有所致辨也學求明諸心而已質之先覺所以求明乎心也承諭致曲之訓而以夷惠之清和明之曰致其一偏之清一偏之和而造之各臻其極以至於能化又曰所謂化者乃一偏之化非大而化也某以為聖賢學問皆從心性中流出性之未發曰中中者天下之大本是故聖賢之學具於心原於性藴於中故致其中則天下之大本立於是一以貫之而萬殊統矣溥博淵泉而時出之矣未有學得其偏而能致於聖且化者亦未有聖人心性之學而反流于一偏者如尊丈之訓則心學且有二而聖人之所為聖人者其本根節目亦可不同矣竊謂清和者氣質也夷惠之學雖至于心無一毫之私可以言仁然氣質未盡丕變渣滓未盡融液蓋亦以其所學之未全夫中所造之未得其大是以未免墮於一偏而不能全故發見未當其可耳觀孔子之於二子皆稱之以賢可見而孟子遽以聖目之則過矣故致曲之説只作賢人君子希聖之學為是雖曰其次然由教而入者皆可謂之次不必以此而專論聖人之次也至於論性而謂性有善惡并舉告子及荀揚韓子及周子之説證之尤某所未喻也夫以性為有善惡修其善者為善人修其惡者為惡人則孟子性善之訓為誣而孔子相近之教不通矣此告子仁義杯棬荀子禮偽之論之所由起可不必攻也某於宋儒惟取信於明道諸説若以天地氣質分之則誠於善惡未能判截反墮於善惡混之中而與荀揚無異矣明道曰性生道也惻隱之心人之生道也又曰心如穀種仁則其生之性是也此數言者萬世言性之標的也蓋某之所謂性者乃一隂一陽之謂道道之流行曰命命之著物曰性故性者人物得之以有生即所謂天地之大德曰生又曰生生之謂易故曰人之生道夫人之生也其稟質雖有昏明強弱之不齊而無與於性非可以善惡論也惟其感於物則物交物而引之習類生而善惡始判矣故人誠能從事於學則其為明而強者可以為聖為賢其昏而弱者薰陶切磨之下雖未能造其全亦不失為敦篤之士若其習於流俗而不知學也則所謂明而強者適足以為姦雄滑黠之資其昏而弱者則甘於自暴自棄而流為下愚之歸矣故孔子曰性相近也習相逺也曰相近亦以其質之昏明強弱其初稍有不同耳曰相逺則習於善則善習於惡則惡如南北其轅不可復得而合一矣豈不大相逺哉某之管見如此有不合處希不吝再賜教愛庶山居得以紬繹其義務求必明諸心一洗羣疑而會歸之此平生之願望也某頓首再拜又與方西樵王漸逵始初天以道命凝為人物則此軀殼亦是性但以既凝為體質則塊然為器為物不靈矣其輕清流行主宰於其中而靈者此真性也故道家亦以為大化流殊常欲去人為神為性釋氏之不愛四大者亦以其精靈不在此故耳由此觀之則性為人生生之道猶天之乾元地之坤元者也軀殼豈得以論性哉程子云人不可從軀殼上起念夫耳目之欲聲色口之欲味四肢之欲安逸此軀殼上起念也人當從心性上起念不可從軀殼上起念然此念頭起處即是已發因有所感而動非是人生而靜性之本然者矣故程子謂才思即是已發夫人動此念頭或因物而感或未因物而內自感者蓋此心前時曾因所感留滯不化是以久而復萌故軀殼之欲或無因而起者此內欲之萌中庸所謂慎其獨是也或因物之感而起者是外欲汩之孟子所謂物交物則引之是也故念頭起即是感物而動百孔千瘡皆從此出乃性之欲非復未發之真矣惟聖人心性常虛明凡物之感所過者化更無留滯是以內欲不萌外欲不汩真性常著故於未發則足以立天下之大本已發而念頭一動即無乖戾撓亂而為中節之和矣然則軀殼之欲巳是動處乃情之流非性之本也諸家即其情之流而為性是以善惡之論紛紛卒無合一又曰真性未嘗不發露但其發露乃自然而然非由意慮所得如入宗廟生敬墟墓生哀見孺子入井而有怵惕乃真性發露時也其餘心逐物而動乃軀殼起念非真性也佛氏謂人性本善直下便是其説又太髙蓋竊見其一二而欲誘吾髙明之士也此所謂黠胡也若直下便是即是天生自然的聖人然聖人之所教人必在克己復禮者蓋古今間世乃有聖人自大賢以下心之感物未免理欲交戰真妄相雜茍非敬以間之鮮有不逐物而妄者若循佛氏之説卒流於狂妄未有一人成於賢人君子者蓋無踐履克治之功故也僕曾讀象山之門人楊簡已有此議論謂此心廣大髙明不用察識不入思慮順其自然往往舉佛為况其流弊至此今陽明之徒又從而衍之曰克己非功夫無欲是功夫又云此真體一得不用操持常常照管便是僕自抵都下其説盛行然大抵皆事講説無一誠篤者以其徒識其光景而下手功夫全然不著如登髙山未曾跬步而虛望其巔崖之氣象何益此程子於介甫有平地説相輪之喻也我朝薛敬軒吳康齋二先生曾觀其書真以踐履為實地一步一步做去故卒成名儒於此可以見儒釋之異可見釋氏誘人之深可以見吾性雖虛靈汨於人欲不可無澄治之功也因論性并以近代之學上聞於左右乞不以多言為狂妄則幸甚再與方西樵王漸逵某自讀書識訓義以來便參究此性遍求之古訓近考之宋儒皆未有所得又沉潛者凡數年復驗之天地推之萬物反而求之吾心審其動靜測其寂感乂數年而後豁然始有會通處蓋嘗妄以巳意論之天地之道除生人物則無所見一隂一陽以生人物者則謂之道指其道之流行不息則謂之命人物所受以生則謂之性人在其中乂稟得斯道中正之全故人為萬物之靈是以人之有生其心性即道也道有統會有散殊具於心則其統會發於四支百骸則其散殊也然天地之道至中至正全體兼備到其散殊萬變而不可測識則乂不同故人雖得其全而於稟之清濁強弱之分又不能無異是清濁強弱者道之變化為之也道之變化為之故人之稟是道亦如之蓋中正者乃其常變化而不可測識者乃其流動處雖聖神亦不可得而知之非惟聖神不得而知雖道亦莫知其所以然也故曰雖聖人不知不能天地之大也人猶有所憾是也某之鄙見如此乂以此意而復推之則以為性者人之生道生道至善而稟質有清濁強弱之稍分所謂相近也何嘗有善惡善惡者習後乃見指清濁強弱而為善惡則不是若以清濁強弱而遂為善惡之分者益非也不揣謹此請教惟吾丈不棄再賜教愛幸甚某再拜再答方西樵王漸逵前日小價回接得手教論性之旨可謂明盡無餘僕之鄙見亦是如此乃觀尊丈來諭反求諸心益見明暢通逹此論一出則天下後世語性者不能外矣但僕於此少有贅焉天道命之性人得之以生然既落在軀殼則其渣滓之凝結者也渣滓凝結是以不能無清濁強弱如地之初亦是此道之渣滓凝結故有四方水土各各不同然即夫坤元之道流行於其間則無不同也人之稟於軀殼雖其有清濁強弱不同然天以此道付於人而為性其精靈一點統具於心貫屬於四肢百骸者則無不同也其昏濁者但為軀殼混汩掩蔽不得露其精靈之體耳非惡也若人從事於身心之學靜而有以養之動而有以察之不蔽於外物以逐其軀殼之欲則心志安間神氣凝定躁妄之思以息嗜欲之火不燃而復其真靜之本故精靈內照者不汨不撓其統會也既有以存乎一心其散殊也又有以攝乎百體由是而存之不息則道義出而可以為聖為賢矣故曰性者人之生道而無與於善惡也若張子謂氣質之性是指其軀殼而言非性也故孟子所謂性善指其精靈統貫者言之也孔子之所謂相近指其所受之多寡言之也此多寡是人始受於天所得五行之性之多寡故有多於仁多於知之别若不能事於學則人欲蔽之於先習類染之於後軀殼之欲無涯莫之止極其不流於大惡之歸不已矣僕謂以此訓於天下後世使人皆知人生而靜乃天之性但物感之後始生軀殼之念性之欲乃流耳茍能反躬則惡可克咎可補不至以人化物也書曰人心惟危道心惟微曰人心以其感於人者而言感於人則有軀殼之欲故在精而一之則中性著矣諸説皆以善惡論者蓋泥此渣滓軀殼而不知吾身至精至靈之性統會散殊常與天地相流通而為人生生之道初非軀殼之謂亦無與於善惡也僕請不以氣質軀殼為性而從本於道命生生不已之間言之則既有合孔孟之旨而有功於由教而入者不既多乎未審尊文以為何如尚容侍教面正不具答王龍溪書王漸逵别後兩辱手教逺及足見吾丈與人為善之心不以時忘不以逺遺蓋恐此道之或晦於天下故與天下共倡而明之衛道之功切矣諷誦之餘感激當何如某僻居山中與城市邈隔今嵗春間出省下得會郡侯胡公始接來札又會推府駱公乃知吾丈復解官東歸時事如此可嘆可嘆雖然賢者出處關乎世運盛衰固非偶然安以俟之而已來教所謂致良知之説以僕之質性魯鈍學力粗淺固未能窺其微奧然以是稽之孔門反之吾心殆尚有可疑處夫今之學者多主於白沙陽明二先生之教白沙之學在於求孔顔樂處陽明之學在於致良知二者固聖賢法門但以此為教恐學者流於漭蕩無實下手得力處夫孔顔之樂大矣必有躬踐實際而後可以契其樂之真良知之體明矣必有涵養操持而後可以得其明之用不然則所謂樂亦虛談其光景之可愛而於獨知之地但凝之於靜而不能不汨之於動融之於心而不能不滯之於事者多矣某嘗以論語一部真千古聖賢入手之要訣何也其旨在乎心與事合一而已矣以心而貫於事物隨處致力隨處照管故心事合一煆錬純熟打成一片然後謂之真境實際方無走作乃有受用處茍或玄想於胸臆致測於景象徒抱夫虛靈之體而昧夫流行之用以之資講説則可以是而求聖賢之實學則未也故某亦以孟子先立其大者之語為立言太寬然必以集義為事乃見入手脈路處今之學者往往流于孟浪無依皆以其守心太過而略于事為是以心事岐而為二支離渙散而不能相合失孔門隨事致察之訓以至於此此其所以髙者流於禪定之歸而下者則混於理欲之無辨而認賊作子者多矣故丹書之戒以敬怠言之盡矣而又以義對欲言易大傳敬以直內可矣而乂必以義以方外德始大而不孤皆隨事致察之明驗也夫平地而説相輪與由階級而直造其頂者其所見何如也某逺處遐陬無明師友講習之益其所得所聞如此吾丈以為何如人便不惜再示教愛尤為望幸答洗少汾書王漸逵鳶魚一章言其上下察也云察字無昭著之義須以心察之某謂講書先要文義通若文義不通徒率以立已説恐不是若謂以心察之則於文義不通矣蓋見鳶魚之上下又却以心察之乃見天理流行則反贅矣此鳶魚即是此心此理而流動著見於天地間者彼此相觸何等灑落何等活潑潑地此時乂一心以體察之則抑而滯矣母乃贅乎故程子謂活潑潑地正指此以喚省人意不作兩項看冼白沙之學以自然為宗僕終有疑焉其所謂自然者全欠下手功夫漭漭蕩蕩無所捉摸使學者空為臆度其不流為老莊之自然者幾希矣雖程子云勿助勿忘不用絲毫人力然既曰勿助勿忘便是下手緊切功夫始有頭腦下落若只説一箇自然何所指乎明道以明覺為自然蓋謂吾心虛靈之本體如是也與此所謂自然者又異矣請更詳之天地之性落在氣質中恐未然夫一隂一陽之謂道繼之者善成之者性一也何嘗有二只因男女搆精萬物化生後乃有此稟質此所謂形體也此稟質乃是渣滓非可言性若夫隂陽之道落在人心所謂生生之理則是性也此性何嘗有善惡夾雜自漢唐宋諸儒不深於性學乃有指稟質為性者是以善惡之論紛紛可嘆可嘆明道云心如榖種仁則其生生之性以此言性聖人復起不易其言矣孟子云先立乎其大者則小者勿能奪也孟子不以稟質為性甚明張子亦曰氣稟之性君子有弗性者焉亦略見得但乂以天地之性分之却乂錯矣學莫貴于真知固也然知後又要常常照管得到如云戒慎恐懼此照管之事也此心之良知如主人翁當其逐物于外如主人翁在外不能照管遂生許多弊節然主人翁雖在內不能一一照管使家內不嚴肅齊整是習於懶慣而忘亦是失于照管亦生弊節也故主人翁在家乂能照管方得是以古人於真知後復有誠意一關誠意一關即是慎獨即是照管功夫若夫真知便了如知毒物之不可食則今人食河豚而不顧其死者夫豈不真知而不能戒懼照管是以失之耳古人下一敬字最是蓋敬者即此心之惺惺主宰時能照管者也幸為思之何如何如只整齊衣冠尊嚴威儀便生敬亦是倒説蓋心有主時始能有所收斂如此若待衣冠威儀時乃生敬則不知要作整齊尊嚴時誰為主宰也若斷家事即至親到但令子侄待之覺得此心無擾亦甚快活此亦偏于靜處易云言天下之至賾而不可惡也應事接物一有厭惡便是病根便未見得動靜合一處故動亦定靜亦定乃見所養陸子靜亦云在人情事變上用功此正心事合一處須著如此做去吾道至大至博無所不有無所不該皆本于隂陽中來儒與釋皆囿于吾道中則釋之道亦道也但所見有偏處失其大全中正之體耳陽明云道一而已仁者見之謂之仁知者見之謂之知釋氏之所以為釋老氏之所以為老百姓日用而不知皆是道也説得甚周遍圓活道惟聖賢乃見得中正全體其餘非聖賢則不能無偏如仁知釋老皆所見之偏處觀于中庸所謂賢知即此仁知釋老者也所謂愚不肖即此百姓日用而不知者也又何怪其同與不同為人後者所以後大宗非宗恐不宜置後此言良是良是蓋禮云為人後者孰後後大宗也乂云支子不祭殤與無後者殤與無後者祭於宗子之家既曰後大宗則小宗亦不置後矣况其非小宗乎既曰祭宗子之家則不為之立後矣禮文如此明白不知後儒何故乃有此支離議論蓋大宗若絶無人統理衆族人故只得于族中取一人以聨屬之如府縣長官缺則當銓一人以補之餘皆祭于宗子之家則立後出繼之禮古所無也自此出繼之説行使人子舍其親而事他人之親天理人情必不安矣自此禮不明陷了古今天下多少人於不孝不仁不知泉翁又為此説何也天地萬物皆有自然之理任其自然則胸中自有樂地故白沙之學以自然為宗蓋本諸此張子亦云如太和中容萬物任其自然亦此意然必先知箇入手門徑然後可以語此白沙亦云若不從事于孟子勿助勿忘而驟語以曾點之樂一似説夢則白沙下手門路亦不以此為先矣只因後人誤認白沙之學為自然功夫乃有此議論使白沙之學不明于世而天下咸以老莊目之可嘆可嘆又曰君子素位而行不願乎外不怨天不尤人無入而不自得此即白沙所謂自然之意然必戒慎之功到乃有此戒慎之功即敬也程子云勿助勿忘中間便是敬古人只説一敬字便是功夫簡易明白後儒自立門户又别求一箇入手脈路以教人皆失其真切之𣲖使天下學者漭然不知入手而卒流于玄虛髙逺之歸無一人克履其實境者此皆後儒支離之説誤之也答項甌東論陳白沙王漸逵向在李三洲處得見來書以陳白沙為禪學摘其數條而論之所舉雖是然白沙非禪者也白沙學于吳康齋康齋深得孔顔之樂白沙求而未得歸卧陽春臺靜後數年然後得之其學則求諸心其功則得于靜似禪而非禪者也夫所謂禪者棄君臣父子夫婦之倫絶中國禮義衣冠之教者也故謂之禪白沙事母甚孝出處甚明教人甚切理義甚精問學甚苦多得于靜處有之故每以靜中養出端倪教人又云去耳目支離之用非去耳目也去其支離之用爾其不事著述而欲歸于無言蓋見宋儒議論太多故矯之云爾其用心亦誠為過當也至于禪之一字吾嘗論之蓋禪之説亦吾道中之所有也夫吾道之大也知者見之謂之知仁者見之謂之仁佛者見之謂之佛老者見之謂之老百姓日用而不知聖人之道大矣故暗為禪之説者吾亦且恕之至其附于佛之教則不可不深斥之也今有人于此盡倫理施政治明出處慎取豫則雖終日談禪吾不忌也何者其道蓋吾之道也但窒而礙終于不通使其知而反之變而正之則善矣今夫天下之物其草木禽獸之相類者甚多或一物而至三四至六七者有之然自造化之道視之則皆物也今夫異端老佛莊列之書類亦多矣然各一其見則各一其説自費隱之道視之則皆道也但聖賢之道中正而大全諸説之道皆一偏而有泥故君子之于異端惟明吾道以勝之不必闢焉可也至如白沙之學求之宋儒如此類者甚多司馬文正吕晦叔劉元城謝上蔡陳瑩中張子韶楊龜山陸子靜往往得于禪學改頭換面處有之然于身心國家皆無愧歉天下後世皆尊仰之此禪學之變正而非禪矣何可怪乎白沙之學多著于靜固有偏處而其本根節目則同豈謂之禪乎雖然禪而歸于正則可恕禪而附于佛謂佛為西方聖人欲隂附其教則有大害於中國宜在所痛斥而不少假借焉可也蓋佛者西域之人其法西域之法是故西域之法毁綱常滅人道遏化生之機傷天地之和其風聲氣習一入于中國中國受之則生變亂如厲逆之氣行于一鄉一鄉受之則生瘴疫驗之古今皆然觀晉之名流卒歸於老佛而以師禮事之遂有劉石之擾唐之文人宰執皆寫誦經典崇尚齋醮遂有五代之亂宋之諸賢皆譯佛偈談真空而亦明尚齋醮暗師頭陀迄於金元之代今之士夫乂宗之矣棄聖賢之言而事禪佛之説隱義謎辭互相倡和以無為為上乘以了悟為宗旨其風聲氣習漸染將半矣是故天下之亂又可憂也故吾不憂夫禪之附正而憂夫佛教之害世名人逹士從而和之大亂之兆也又將有闕公亦嘗思及此乎容異日圗會面領教愛不具上霍兀崖宗伯孫存日蒙手翰以所與涇野先生寅清之暇商𣙜古今之正論諄諄訓誘某何人斯與聞斯教夫涇野醇乎醇者也夫子強哉矯者也以涇野之醇與夫子之矯陶鎔變化于大聖之域發之而為論議措之而為事業其必灼知乎善惡之機而擇守乎時措之宜自不至于賢智者之過矣而豈愚不肖如某者所能贊一辭哉頃以門下辭受之嚴僅市婺之朋酒以獻而適得敗者遂使夫子有感于以名取人之難焉嗟乎某獨不類是耶若以言獻安知非婺之敗酒乎然是酒之初市于蘭也價甚廉其不市偽明矣而顧若此則中途所與同處者薰蒸之氣敗之也嗟乎士修于家而獻于天子之庭其所與同處者可不慎乎是酒也必一敗一不敗今偶酌其敗者遂并其不敗者棄之毋乃未盡酒之情乎果然則天下多棄物而瑜皆得以瑕掩矣縱使二酒俱敗而蘭産之正味則未敗也他日更取其味之正者不敗以氣之惡者而酌之則可以薦神明酢賔客而奚遽以一敗遂擯不使前乎使當其方敗而改作之否則别用之或以為酸醯或以滌藥物或以濟道暍未甘委之溝壑也存不幸實類于是夫道之中也猶酒之有正味也賢智之過則酒之釅而過于正味者也愚不肖之不及則酒之漓而失其正味者也書曰若作酒醴爾為麴糵糵多則甘好善之深者似之麴多則苦惡惡之嚴者似之以某觀于夫子其酒之苦者乎苦口者利于病惟量之大者能受之涇野其酒之旨者乎式燕而醉于心則量之小者皆受之矣若以涇野之糵與夫子之麴損益適中以釀之則甘苦調而人皆知酒之正味矣古人有體道之言有知道之言某不能釀酒而知酒之正味伏惟舍其前日之敗許今所市之真取而酌之則酷暑之氣可敵嚴寒之天可溫而和氣可致無妄之疾勿藥有喜矣若夫投之江以醉三軍賜之食馬者可以化暴而為忠良助又其餘事耳寄陽明先生黃綰初春鄉人歸辱手劄并祭徐曰仁文令人悽然益念斯世之孤不知何日得從陽明之麓以畢此生也綰領教入山頗知砥礪邇來乂覺向者所謂靜坐所謂主敬所謂靜中看喜怒哀樂未發作何氣象皆非古人極則工夫所謂極則工夫但知本心原具至善與道吻合不假外求只要篤志于道反求諸已而已夫篤志于道即所謂允執厥中是也于凡平日習染塵情痛抉勇去弗使纎毫溷于胸臆日擇日瑩隨其事物之來無動靜無內外無小大無精粗無清濁一皆此理應用故無時而非入德之地無事而非造道之工昔者孔子自十五志學至七十從心不踰矩進退無已只此志之日篤也故語顔子使之欲罷不能既竭吾才至于卓爾此乃聖門極則之學與極則之傳也若徒知靜坐主敬觀玩光景而不先之以立志不免動靜交違滅東而生西也夫才説靜便有不靜者在才説敬便有不敬者在才説和樂便有不和樂者在如此用工雖至沒世無稅駕乃知篤志一語真萬世為學之要訣也近世如白沙諸公之學恐皆非聖門宗旨宋儒自濂溪明道之外惟象山之言明白痛快直抉根原世反目之為禪而不信真可恨也伊川曰罪己責躬之意不可無亦不可留胸中為悔象山則不然曰舊過不妨追責益追責益見不好又曰千古聖賢何嘗增損得道只為人去得病今若真見得不好真以為病必然去之去之則天理自在道自流行所謂一日克己復禮天下歸仁者也往年見甘泉頗疑先生拔病根之説凡遇朋友責過及聞人非議輒恐亂志只以靜默為事殊不知無欲方是真靜若欲無欲茍非勇猛煆錬直前擔當何能便得私欲盡淨天理純全此處若不極論恐終為病綰近一書略論靜坐無益亦不敢便盡言及此向見友生送甘泉序云孔子傳之顔子顔子歿而不傳惟曾子以一貫之旨傳之今日恐亦未然夫一貫之要只在反已篤志而已顔曾資稟雖或不同其為一貫之傳則必無二鄙見如斯不審日來尊見如何山亭改搆相知至者皆有賦詠敢録間覽更望不惜一言以慰山靈幸甚復李遜菴黃綰邂逅京旅獲聞髙論至今不忘邇聞擢憲敝省喜慰無量數年之間法立仁流誰不瞻仰益知君子之學有本而師友之教深矣昨蒙惓惓豈勝感激但綰方在告公居當路非趨見之時故敢以書求益久不回示豈以綰不肖不足領耶抑有難言而置之度外耶近者京師朋友書來頗論學術同異乃以王伯安魏子才為是非是伯安者則以子才為謬是子才者則以伯安為非若是異物不可以同子才舊于公處見其數書其人可知伯安綰不敢阿所好其學雖云髙明而實篤實每以去心疚變氣質為本精密不雜殊非世俗謗議所言者但未有所試而人或未信向者公嘗語綰曰凡遇事須將已身放開一邉則當灑然自得其理綰每誦以為數字符及讀易艮卦云艮其背不獲其身行其庭不見其人然後知公言之有自實與伯安之旨無二子才素講於公學問根本宜無不同蓋皆朋友用功未力好起爭端添駕為疑以致有此誠可慨也昔者二程之學似不同于濓溪伊川之言若有異于明道邵張之緒若不同于二程但其大本之同相觀相長卒以同歸而皆不失為善學他如司馬吕文韓冨諸公雖功名道德各有其志然皆為深交篤契為國家共濟豈如今日動輒分離也至于晦翁象山始有異辨然亦未嘗不相為重至晦翁門人專事簡册舍巳逐物以爭門户流傳至今盡經纂緝為舉業之資遂滿天下三尺童子皆能誦習騰諸頰舌或及德性即目為禪乃以德性為外物聖學為粗迹道之晦蝕一至此矣殊不知古人所謂問學者學此而已學不由德性其為何學賢如子才豈宜有此綰知必不然矣况為學此時不啻曉天微星併力共圖猶患寥落磨泯頺而不振况志之未篤功之未力各相排擯銷沮阻喪實乃自壞此事關繫非細區區朱陸之辨姑置之可也朱果有益于此則求之于朱陸果有益于此則求之于陸要皆自成其身而已辱深愛敢併及此倘得一言子才只以天地為度各通其志各盡其力斯道之幸何如答邵思抑黃綰近承手翰足見進學之功僕屢致問左右俱不卜沈浮書中微旨似于吾人有不察者且吾人學問惟求自得以成其身故曰誠者自成也而道自道也實無門户可立名聲可炫功能可矜與朱陸之同異有如俗學者也茍求之能成吾身而有益于得雖百家衆説皆可取也况朱陸哉茍求之不能變吾氣質而無益于得雖聖言不敢輕信况其他哉故曰君子之道本諸身徴諸庶民考諸三王而不謬建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑吾何求哉求得于此而已矣若朱有益于此則求之于朱陸有益于此則求之于陸何彼我之間朱陸之得親踈哉且僕于朱書曾極力探討幾已十年雖隻字之微必咀嚼數四至今批抹之本編纂之册皆可驗也請兄于陸書姑讀之久看所得比之于朱何如乂比之濓溪明道何如則可知矣世皆以陸學專尊德性而不及道問學故疑之曰禪凡其有言槩置之不考有誦其言者輒命之曰禪不復與論是以德性為外物聖學有二道哉殊不知象山每以善之未明知之未至為心疚何不道問學之有又其言曰束書不觀遊談無根何不教人讀書也但其所明所知與所讀有異于人者學者類未之思耳僕于武陵一會吾兄即知吾兄心懷條暢識見髙明甚不易得區區畏愛不淺故敢肆言至此然門户之分斷非僕所敢望于吾兄又聞魏君子才學行絶出僕極傾仰但與陽明時有門户之馳淺陋念此不堪憂悵惟恨無由一訊其故然求吾道于此時真所謂不絶如線海內有志如吾徒能有幾人只此幾人而又分裂如此不肯合併切磋深求至當往往自髙自止轉相譏刺如世俗斯道一脈豈不自吾徒壞也陽明素知其心如白日決無此事魏君雖未接嘗得之李遜菴及見其數書虛已平恕可知亦必無此竊意為其徒者各持勝心或私有所懷巧添密勦推附開合如昔朱陸門人以自快一時却不知此道塞天地亘古今無物不該無人不同可獨為陽明子才之私象山考亭之有也吾兄明燭幾微身居其間何不據理一言以使共學吾兄之賢何如也惟兾始終教誨敢不誠心領益不既復王汝中黃綰辱書諭諸事俱悉但云大學古本注至善之旨有所忿懥之説細體會終未能盡契于𠂻僕不敢佞于此不得不盡言以告此蓋諸兄習聞禪學之深一時未能頓舍且從來未暇致思聖學故也夫聖學者所以經世故有體則必有用有工夫則必有功效此所以齊家而治國平天下也禪學者所以出世故有體而無用有工夫而無功效此所以虛寂無所住著而涅槃也故為禪學者略涉作用稍論功效則為作念而四果皆非謂之有漏其道不可成矣聖學工夫則在體上做事業則在用與功效上見故大學首章言大人為學之道提出三在字以見道之所在在于盡性在于盡倫在止於至善盡性盡倫必止於至善故曰在格物物格而后知至蓋盡倫所以盡性工夫必在體上用體何在在于人心獨知之中既有知覺必有思慮思慮略動則必憧憧往來其體亂矣不奈其亂故髙者不得不于上乘討虛靜下者不得不于下乘求止息此説流傳既久雖髙材明智有所不免往往互相譏闢而不知皆墮其中凡既涉此雖是妙説巧持只是禪宗落空于聖學何與縱使道盡躬行妙悟雖或七八分倣佛亦決不是動容周旋中禮而合聖人知止時措之宜也傳之他人決是差誤下稍頭決是不同此等所在其實似是而非毫釐之差千里之謬胡安國所謂禪與儒學句句似字字同若于此識得許汝具隻眼僕非敢便謂識得只是自少妄立此志亦嘗聽諸公講論誤入禪學數十年辛勤磨礪久之始覺其非偶爾有見故見得止字親切方知詩書所云止字及大易所示艮卦之義皆深契于心而有不可以言語形容者故向因諸兄所論而敢云止字足包至善至善不可包止字蓋心知所止則至善在其中徒云至善而不知所止則憧憧雜亂而無所寓惡在其為至善也此僕所以將二止字看得明白上止字雖兼體用而工夫全在體上用下止字專指體而言而貫定靜安三字定者心不憧憧而能止也靜者心如止水而能明也安者心隨所寓而能安所謂動亦定靜亦定也此正對憧憧往來者言所以灼然為聖學之心訣也其云忿懥恐懼憂患好樂即所謂喜怒懼憂之情者細求人心七情必不可無今欲無之乃是禪學宗旨但于此致精一依天則使發皆中節方為聖人經世之學是非明賢否别賞罰當逹道之行通于天地矣不然空無適莫及至臨事意從境起不為莊周田子方之猖狂自恣則為墨氏之兼愛否則為楊氏之為我否則是非不明賢否無别賞罰不當而天下解體矣將何與于經世哉此僕血忱之言惟諸兄其諒之勿徒以虛言相髙而謂僕之好異也明文海卷一百六十五
