body:
  text: 明文海巻一百六十六餘姚黄宗羲編書十九講學答王端溪薛蕙久企下風未由奉見逺承貽教大慰夙心蕙之解老子固意得罪扵世之君子而世之君子果以蕙為狂為愚而不屑教也不圗有如先生者廼肯賜之話言諄諄然而誘喻之天下之愛蕙者孰有過扵先生乎然先生非私扵不肖也盖將明辨聖人之道而為天下後世之賜也如蕙之愚不足以答盛意然亦不敢黙黙也先生之言曰老子之道疑即仲尼之道也然以其先無而後有先虛而後實先道徳而後仁義是無怪天下之多口也不然仁亦道也義亦道也而何可絶仁而棄義也豈非所謂毫釐而千里者與嗟乎舉世以異端斥老子而先生擬之扵仲尼舉世以虛無為不可而先生特病其先後為不然凡先生之意徒恐老子談仁義而差不免有毫釐千里之弊爾先生析義精而持論平視彼不知要領而黨同伐異者不可同日而語矣故蕙敢誦所聞俟髙明之再思焉竊謂老子之道即仲尼之道也性一而已則老子仲尼之道不得不同特性與天道之説孔門所罕言故老子之書雖同扵仲尼而後世不知其同也非知性知天者孰知千聖之果無異道耶夫仁亦道也義亦道也此吾儒之言也道者性也仁義性之用也此老子之指也私恩小恵之仁小㢘曲謹之義此老子之所棄也上仁下義又老子之所取也或抑或揚亦不專扵棄絶矣仁有精粗義有大小雖孔門之言亦非一端而已易曰寂然不動感而遂通天下之故樂記曰人生而静天之性也感扵物而動性之欲也子思曰喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之逹道也此數言者雖有精粗詳畧之不同然與老子之言皆所謂殊塗而同歸也夫寂然不動居先乎感而遂通居先乎察夫先後之間可以見静為天性之本矣退藏扵宻其常乎見扵事業其常乎察夫乆頃之間可以見主静為復性之學矣然則先無而後有先虛而後實先道徳而後仁義彼固自有先後非老子先之後之也老子後儒之得失其原正在扵此盖毫釐千里之闗鍵仲尼老子之同道其大端實繫扵此盖前聖後聖之符節也又嘗謂易之所云本指卜筮而言樂記之論卒亦詳扵動而畧扵静故孔門傳授心法獨子思為能識之耳自子思之外能明性静之道者舍老子而誰也昔子思之言性也以為天下之大本則性情之辨學問之序子思已發其端矣斯義也惟程子聞而知之惜乎自延平之後此學復失其傳後之儒者明扵庻物則有之知未發之中者則鮮矣盖情易見而性難知信乎性與天道之難聞也是故眩扵事物而莫知統紀迷其本心而無所歸宿古人曰正其本萬事理差以毫釐謬以千里正謂此大本之差而非謂小小節目之差也且聖人之道所以不明扵後世者正以性學之不明耳茍徒以仁義而已則宋之儒者何以大過扵漢唐而周程之學亦何優扵横渠涑水耶以此觀之老子之道真所謂猶龍者乎莊曰道隐扵小成夫絶仁義而害斯道此先王之所憂也語仁義而遺大道此亦區區之憂也奉覆卒卒兼之書不盡言他日倘獲親炙庻㡬盡吐所懐耳往嵗僭著一書因輙呈覧更乞如觧老之教我也再答浚川薛蕙頃承答教論二氏指歸吾師所得已極髙逺然扵愚見畧有同異輙復商㩁兾或有毫髪之助傳所謂狂夫之言聖人擇焉者也來教云仙佛之説起自末代竊惟仙佛之説其所從來逺矣盖古聖人盡性之學如所謂死而不亡者非盡性則不能然非盡性之外復别有不亡之術也藉曰不然則古之神聖其道反不逮仙佛而仙佛創起季世反獨得不亡之術可乎叅同契中無念以為常此言與禪學無異頋特一言之偶合耳譬猶諸子百家間亦言及仁義而其大體則非也鄉使伯陽果知以無念為宗豈復談乾坤水火如彼之支離乎又謂楞伽彼此因縁不專一體金剛法相空色同歸扵無乃唐宋髙僧大士敷演心經而作者二經義理宏博殊非一二言所能盡心經標舉大端殆非二經之比唐宋髙僧尚未能盡知其説况能作耶來教謂吾儒之教以修心治世為事夫古之聖神内聖以修心外王以治世二者之外誠無餘事但後世去聖逾逺而其傳寖差寖陋治世之法儒者僅得其粗而不究其本至扵修心之學則講之不明乆矣夫不能自保其神明雖道濟天下抑末也又謂佛氏之學與學仙者原出一途專扵為已無復為人䆒其所趨不過使原性常在雖滅不昧而已故非有術不能即得且如人心虗靈不觸亦動故學無心必須心息相依而後可無欲使神住必須廻風混合而後可住捨此二術則心必無不動而神必無不馳此條得失似相等矣仙佛一途誠是也專扵為已無復為人殆有未然自古聖賢不越教化斯人使之為善耳為人之利孰大扵此二氏之言大率如是至其切實而精㣲則反身為巳之學也使夫人知為巳之學其為人不既多乎原性常在雖滅不昧此固然矣特至人明扵性命則了生滅之常一衆人不知其性則見生滅之有二此猶淺言之耳自餘差别之義不可勝舉非累幅之書可究也未知生焉知死葢吾聖門之㣲言邵子曰若未通天地焉能了死生周子太極圗末亦援易及死生之説非無為言之也心息相依繫心之一術耳二氏之書往往有之然其術非盡扵此也如吾儒中之聖人所謂至誠至中退藏扵宻即無心也彼其所以能然者固自有道矣豈亦出扵心息相依之術耶程子曰知道者思慮自無又曰未有不能體道而能無思者乂曰未嘗致纎毫之力此其存之之道此言皆畧開其端然亦有所自來矣神住即無心也似不當二言之廻風混合指何術而言更望垂諭俟别請益乂謂學仙不成亦不失為禪覺夫老莊所謂仙與佛所謂禪誠非二道但如後之方士其術誠陋曾不逮小乘之禪也昔者程子每以佛與仲尼並之其論莊周猶有何敢比佛之語况後之仙者乎夫禪學者不惟賢扵後世之仙學雖吾後儒之學亦非其倫矣何者後儒雖言無我而不知無我之實雖言無思而不知無思之指雖言無欲而不知思欲之本無雖言性善而不知性善之極致雖言人皆可以為聖人而不知性即聖人非由修為而得也以此觀之禪之為道可知矣雖然使其道騐諸人心而不然考諸聖人而不合庸非無稽之言乎今騐諸人心則其所謂空寂者即吾未發之本心考諸聖人則其所謂定慧者即古聖人之誠明推此類而言之其道不可悉數故程子有釋氏知性知天極乎髙逺之説彼誠有所見而言之非茍相許可也來教謂若是無術大是頑空夫仙佛者得乎最上之術實無術也順乎真性之空亦無空也金剛經曰知我説法如筏喻者法尚應捨何况非法又曰如來在然燈佛所扵法實無所得又曰若言如來有所説法即為謗佛凡此類者其義云何望吾師更精思之他日深有悟入始知佛與吾聖人之道本同一性而佛之有功斯人不在孔子之下也縱言及此大類狂夫之言矣與髙蘓門薛蕙承詩教并獲老子序可量欣慰老子之書僕誠見其有益扵世故妄為之説然使説焉而世不信又奚益哉則思得賢者序之庶世之信者衆也執事復言與李君同讀其書而愛之凡古今人為書未有舉世悉好之者惟賢知者好之斯傳已昔人云天下英雄所見畧同今二君之見既爾天下俶儻知言之士可如二君者其見能無同乎然則鄙説之傳也可㡬矣復承問談禪近實有之然其始彷彿則已洒然知異之矣未知後來所見終何如耳所云穆伯潜周用賔王純父皆嘗試之顧是時僕尚未讀佛書故未能請問以窺其所造之淺深也純父欲合三氏而一之其言偉矣而其詳未得聞也三氏之説出扵世久矣如斯言者中人之所疑而駭而下士之所笑而姗也然二氏之説行扵世尚未逺安知千萬世之後不有如純父之言乎嘗妄論之三氏之學皆心學也夫心一而已矣彼三氏者皆聖人也學至扵聖且弗自知其心乎茍知其心其理有不一乎其理茍一其言豈有二乎今夫水有流有源心則亦然其流也三氏皆言之其原獨佛氏詳言之老子次之而孔子則罕言也盖人上智寡而中人多中人雖言而不逹此其所以罕言也若乃上智知罕言之意自能求之扵言語之外復知其所已言者非所罕言者也如是則罕言亦言矣至扵二氏雖亟言之亦終不能言也故曰言語道斷不可言言而非也嗚呼此扵易之所謂宻中庸之所謂隐豈異指乎後之儒者大抵見心之流而未見心之源其論學也不專求之扵心而泛求之扵博學力行之間其極論道徳終規規扵事為之末與夫大道無名上徳不徳者異矣孔子之言雖嘗云爾然孔子之道非盡扵如是而已使盡扵如是而已豈其所謂罕言者乎夫儒者扵心之本原果未徹見則與彼二氏之見不同亦惡得不以二氏之言為異端之言乎凡儒者之絀老子者集解中稍辯之然世俗之人必有非之者矣若佛氏之説則尤見詆扵俗未可卒與之辨也昔伊川有言佛氏之道非不上下一貫至其用處便作兩截程子此言其許之也不為不至矣盖上下一貫非聖人之學不及此然則佛氏之道從可知矣今世俗之學其所見果有及此者乎奈何持矇瞍之目而譏離婁之不察也因下問之及率然如此然終非筆墨之可究也想執事更當有卓絶之見幸畧垂示答崔後渠薛蕙去嵗辱書兼示中庸凡以無便久不奉報生之蔽扵佛老而好其説吾兄不棄絶而教之誠愛我欲有益扵我也顧生好其説者以其合扵聖人之道而好之也使其不合扵聖人之道生雖不足以望知言者然亦不至為其蔽惑也書辭有宜辯者念雖辯之必不能奪兄之所執故不敢復為煩凟俟他日奉訪相與極論數日倘髙明之説能使生之論絀而惑解敢不承教凡所為講學者務去非以求是耳茍是非既心喻矣何為是之不從而顧自安扵非耶伏讀中庸凡其文典則閎深可方古人今人不能為也然其指義頗有不合扵聖人者試以愚見商畧之以請教竊聞中和之說乃中庸第一義盖千聖心學之淵源也故程子以為孔門傳授心法而他載籍不與焉正謂此耳延平先生復推明未發之中其説最詳而朱子以為象山門下相傳指訣自延平之說傳而後中庸之道益明程子之言益信鄉微延平則程子之㣲言世或莫知其所指而中庸之大義隐矣抑延平之說雖自程子發之其實中庸之書固已特異其辭以見意故曰中也者天下之大本也其意斷可識矣然則未發之中實中庸一篇之綱領豈中庸為然凡六經之言豈復有加扵此哉今吾兄之書扵前標註既不喫𦂳言之至扵十論亦復遺之何耶夫說中庸而遺中不猶說論語而遺仁乎其曰凡事可者謂之中中之名義取此生之所未喻也道論曰非别有物而綱紀乎此則是易有太極之說非而天地萬物無本也理論曰後之言理者括萬有包四端則是萬理不統㑹扵一理也性論曰安得獨咎扵氣則是理有駁雜之理人之善者乃逆天理也謂孟子性善為踈謂韓子三品為能發聖藴生之尤所未喻也竊觀兄之名理雖考信扵六經之說而實主之以六書之文兄之言論往往過者此其病源也字說足以明道孔門當為説文矣六經說理之辭非不時有合扵字說其如不合者之多耶小道可觀致逺恐泥正此之謂也夫謂古人制字假物以命名不猶作易者假象以名理乎象之不足以盡理不猶物之不足以盡名義乎六書有轉注假借一字而數物用之不以一物專一字也至扵訓詁則又隨字釋義一字而數說訓之不以一說蔽一字也文字訓詁猶不可執一而言也而况施扵文辭其取義也可執一而言哉必曰道為大路之道則夫形而上者謂之道不可通也必曰理為玉膚之條理則夫窮理盡性以至扵命者條理云乎哉易曰書不盡言言不盡意言之多變且不足以盡意一字之文豈足以貫衆理哉執泥言語而不得扵言意之表君子猶譏之况執泥文字而可乎忠恕之論甚異然非忠恕之本意中庸曰忠恕違道不逺施諸已而不願亦勿施扵人下言者正覆解忠恕之意也論語曰已所不欲勿施於人二書之言一也善乎古人之立言也其言甚簡其義甚明不増加覆說也益之以多言而反晦塞其正義此文士之蔽非賢人明經之指也誠論言誠何其小與中庸之言如斯而已乎尊徳性論徳性問學等而無辨矣不若註中君子之學云云者語意乃為完全也象山曰不知尊徳性焉有道問學此誠至當之論不可因其與朱子相難挾私心而輕重之也今兄復下一轉語曰不知道問學何以尊徳性此難以絀象山之論也象山之意以尊徳性而道問學為一事兄之意以為兩事正象山之所譏也篇中評品諸儒似非確論司馬公信偉人也然考其性與王覇之說其亦擇之不精矣程子謂之不知道非茍相訾也學不知性豈所謂尊徳性之學乎西山元城似亦當别論耳又曰周子精而疑扵老邵子逹而疑扵隐如周子者兄猶不滿之耶謂兄不潜心周子之書殆有不可然猶不免云云而况扵老子乎邵子之隐也槩諸聖人之道未見其不合也安得以是而病之龜山上蔡觀其遺言恐亦不可輕議象山非踈也自雜愽者觀之類踈矣慈湖非險也習聞故常之說而乍聞其言類險矣序曰章分則文斷而意離今綴數言扵每行之外聫其相承之義殆亦不可古書以篇名簡策之謂也一篇之内盖有章或數言者則不滿一二策而已必合若干章聫而成篇如老子荀子皆然不特戴記可騐戴記四十九篇其不可分章者僅數篇耳朱子中庸分章特離合之間尚有未盡亦無大害其失乃在扵牽合接續或失古人之意故南軒東萊皆非之今兄既言相承復不分章失愈甚矣嘗惟吾兄精專之學奥潔之文當今之世可謂絶倫然亦竊妄意吾兄其學不用心扵内而又志分扵為文故扵本原處未有的實之見差之扵此而欲折𠂻羣言能無差乎其論道論性將以求勝扵宋儒而不知愈出宋儒之下恐扵宋儒之書亦未嘗熟考而精思也區區管穴之見恃兄之知己故妄發而不隐想兄樂聞直諒之言亦必不以為罪也卒有便草草具此不及三思中間踈謬更兾垂喻不備蕙近年扵古人之學實有所見若夫持養之功則全未也此言非敢不遜取笑吾兄甚思合并得一訂正絶遇而後思遯斯言實獲我心也常惟後世决非可為之時吾人只有隠居講學一節為可努力出而行志不如其已也志之不行吾何求哉將囬面汙行以求富貴乎何時與兄築室南華山中誦詩讀書悦心怡神其樂何如也但世事不可必兄與生行各衰老此欲豈易遂乎書終談此不覺惘惘與王浚川薛蕙近聞留都司馬之命不任慶慰今者計當還第謹具狀馳候前承誨劄未能上覆周貢士來又蒙賜教并示丁亥集有警扵昏昧多矣但扵太極隂陽諸論思之未通此殆為先入之説所蔽尚欲問難兾煩重喻然非筆墨之可究也比年誦先儒之書稍見得一處頗為切要敢因下問之及而就正焉昔延平先生嘗語中庸曰聖門之傳是書其所以開悟後學無遺策矣然所謂喜怒哀樂未發之謂中者乂一篇之體要也若徒記誦而已則亦奚以為哉必也體之扵身實見是理然後擴充而往無所不通則庶乎可以言中庸矣晦翁亦曰李先生教人大抵令扵静中體認大本未發時氣象分明則處事應物自然中節此乃龜山門下相傳指訣因二先生之說而推測子思之言既乂考之羣聖之學六經之㣲言往往若合符節扵是竊以為此誠義理之本原學問之綱領外乎此者不足謂之善學也故凡學者必先從事扵此體之扵黙識養之扵主静及其道之成也内欲不能留外物不能亂天下之事無不各得其當特一以貫之而已不然内有毫釐之偏則外有尋丈之謬欲其中節不亦難乎夫性情一物也動静一理也何言中和而抑揚其説也葢有體用先後之分焉物有有體而用弗利者未有無體而有用者也是故學者不先患情之不得其正而先患性之不得其養盖未發而中發而乃和若失之扵静俟至既發而圗之雖有隨事精察之勤矯情強制之力亦將救過之不暇古人心學之妙豈如斯而已乎程子所謂孔門傳授心法盖止此耳生非知言者循行數墨僅有一見乎此雖然直説之而已未能學也獨念先儒之說固為詳至第雜扵衆言之中而未及特書屢書以詔後學亦怪近嵗講道之君子為説頗多而頋不及此兹以質諸左右萬一所擇不謬先生其益推明前人之說庶使後生小子聞大賢之言而信從者衆此學其有興乎踈嬾不能三思辭不逮意此外所欲言者亦不能詳布希惟照察寄劉叔正薛蕙又云必欲強而同之其源末毫釐之間皆混而無别某之所未安也夫未發之中聖人不得不同也此大本也扵此茍同是謂大同事有小異不害其為同也世儒無未發之中其源頭既受病其行事從可知矣此其扵聖人之學同耶異耶固不難知也且明者之未安僕往年何獨不然乎大抵由習聞儒者之言耳夫所謂真如不滅者實有是事而世莫之求也生死亦大矣視文章名譽富貴之屬不有間乎子路問死程子以為切問是也若死而斷滅有何道理可說則夫子不當以知死為答矣朱子躬行博學今人萬萬不及至其晚年非不知生順死安也由未曽實透得此闗故理㑹叅同契平生扵性命之學死生之說註解得盛水不漏晚節末路胷中畧無得力處却索之扵方士之術不亦惜乎夫不知性命之說豈知聖人之道乎此翁卑佛之說矣豈知方士之術乃佛氏所甚卑者乎以此觀之則朱子者非獨不知佛老之書想是莊列之言亦討不着把鼻此可以為鍳矣然使吾人茍無一毫悦生惡死之心則二氏之書政可束之髙閣頋恐未知佛氏本無生死之道終不能不為生死所動借使不動強作主宰耳豈其情乎又當知超脱生死在佛老之心學特餘事耳非以生死脅持人也與陳兩湖書唐順之兄自少才名已滿海内六家九流之書㡬乎無所不誦莊騷太史之文亦無所不摹畫而操縱之矣即使海内竒才偉士欲傲兄以所不知而亦不能也况如僕者才至駑下向在京邸每同平凉趙景仁過兄論文乆之兄慨然曰二子之言是也遂欲盡棄其舊學而更張之然當時猶謂兄之急扵奬善而以口語相推云耳已而視兄之文則果脱然盡變扵舊矣夫文人相傾在古則然景仁扵兄未知何如也至扵僕之讀書豈能若兄之博而其為文也亦安能望如兄之古哉然兄不憚降心屈已而從之推兄是心也設使不徒用之扵文而用之扵返躬為已之間即古人所謂勇撤臯比一變至道者在兄亦何讓乎僕未始不嘆兄之髙明不可及而亦每每惜兄有可以一變至道之資力而僅用之扵文也雖然此亦未有人焉以反躬為巳之說而謦欬扵吾兄之側耳設使有人焉以反躬為巳之説而謦欬扵吾兄之側如吾二子之論文也又安知兄之不降心而從而翻然變扵其舊之為尤速也乎又未始不罪吾二子者不能為古人反躬為已之説以告兄而徒以文士雕蟲篆刻之論投兄之好也兄今之所謂狂者也而豁豁磊磊率情而言率情而貎言也寜觸乎人而不肯違乎心貎也寜野扵文而不色乎莊其直以肆則亦古之所謂狂者也是兄有可以一變至道之力而又有狂以進道之資也兄其能無意乎然兄之意必曰吾平生好適吾性而已矣吾不能為拘儒迂儒苦身縛體如尸如齋言貌如土木人不得動揺云爾夫古之所謂儒者豈盡律以苦身縛體如尸如齋言貌如土木人不得動揺而後可謂之為學也哉天機儘是圎活性地儘是灑落頋人情樂率易而惡拘束然人知縱恣睢者之為率易矣而不知見天機者之尤為率易也人知任佚宕者之為無拘束矣而不知造性地者之尤為無拘束也人之病兄亦或以其樂率易苦拘束而僕則以為惟恐兄之不樂率易不苦拘束也如使果樂率易苦拘束也則必真求率易與無拘束之所在矣真求率易與無拘束之所在也則舍天機性地將何所求哉使兄不以僕為迂也願繼此而更進其説也僕自少亦頗不忍自埋沒浸尋四十更無長進惟近來山中閒居體念此心扵日用間覺意味比舊來頗深長耳以應酬之故亦時不免扵為文每一抽思了了如見古人為文之意乃知千古作家别自有正法眼藏在盖其首尾節奏天然之度自不可差而得意扵筆墨蹊徑之外則惟神解者而後可以語此近時文人説秦説漢説説馬多是䆿語耳莊定山之論文曰得乎心應乎手若輪扁之斵輪不疾不徐若伯樂之相馬非牡非牝庶足以形容其妙乎頋自以精神短少不欲更敝之扵此故不能窮其妙也何時得與吾兄一面談之答何善山羅洪先日昨曾往一東兾此後别有見教然後方敢以言句相答不然縱兄積疑不敢輕有所言非不為言實非言可及也夫能自信者乃能取諸人以為善執一説者必見善而不能遷此二句亦姑據來章言之耳猶未足以盡弟意也弟之取諸人者但能扵自性自命喫𦂳用力有稍傷損即如眼中釘時刻無可停留無可替換自朝至暮如絲過扣斬釘截鐵放過不得此纔是有求為聖人之志為吾益友不知向此用工即在話頭上拈弄至扵自性自命既已傷損尚不能知當下動氣處自以為發強剛毅纒粘處自以為文理宻察加意奉陪却謂恭敬明白依阿却謂寛仁如此之類千言萬語莫能狀其情變總之以一言只是鶻突到了雖自稱為學而扵自身邈不相干却又説精説一説感説應如此者豈特騎驢覔驢已哉吾輩如今但可自謂挨傍度日非真知痛癢與所謂能知言也往昔舟中所論亦實有見扵當下痛癢然猶寛鬆未是狠手猶被道理作障容易遮瞞弟雖不才却有隻眼自照不肯將就冒認若是猛健漢直窮到底尋根究源斷不容時刻粘帯纔粘帯即非此物既非此物何為性命此等處非是各人自悟縱終日爭辯未有出頭時也佛與吾儒之辨須是自身已有下落方可開口然此亦是閒話辨若明白亦扵吾身何干吾身若既了時縱不開口誰不取證老兄此言豈不將此等作大事件以為講論不明將至悞世弟則以為伊川講明後又出㡬個聖人濓溪未曾講明又何曾誤了㫪陵夫子無生之説門面終是不同何須深論今縱談禪决未見有人削髪棄妻薄視死生抛却名位此數事乃吾儒詆毁佛氏大節目處既不相犯自可無憂老兄吾為此懼一言似可稍解矣然此亦姑據來章言之乂渉分析吾輩一個性命千瘡百孔醫治不暇何得有許多為人説長道短耶弟願老兄將精一還堯舜感應還孔子良知還陽明無生還佛直將當下胸中粘帯設計斷除眼前紛紜設計平妥原來性命設計恢復益扵我者取之而非狥其言也害扵我者違之而非徒以言也弟有附㑹包褁之病即直言攻之非以相勝欲同歸扵是也兄有執泥糊塗之病即誠心攻之非以自卑欲各歸其極也如是尚何説之不同而懼之不早已乎舍弟促促言别信口直言以復向者之來章如不責其不遜欣然覽之豈特弟之幸將嗣後友朋言廣受善者必自老兄始矣中未有得故發巳意不瑩惟不妨再四經目指其瑕而救正之答李孟誠萬廷言久失遣候辱來教感甚所引延平尤悔之㫖足徴反已之嚴三復尤深悚息弟謂今時朋友只知論學不知論品不知湏先定品而後學之同異得失可論也夷齊與孔子同品然後可論同異朱陸與周邵二程同品然後可商得失佛老之學千古動人其品髙也若不論品而只以言論蹤跡比較得失則似是之非掩襲之巧反在狂狷者之上矣今海内論學者甚多其中不無樹立然試考其品能一一不愧古人誠不敢厚誣也以弟所處者言之如三五知己則資禀雖殊本根皆實其品似無可議所當論者在學其餘篤論飭行不無所長而究極根源且難論品濓溪晦翁即不講學亦斷斷同是千古人品不然即同言堯言同行堯行學問大同無可非刺亦終是蹈襲君子恥之此豈可聲音笑貌為哉兄品自髙又誠自反如來教云日消所尤悔者與求延平所謂融洽脱落灑然處証詣精專如此則身範物先何愧古昔即稍異同無妨也且朋友切磋何必盡同以水濟水古人以為弗可食矣盖自有大同者在也弟品下學荒兹且衰暮念教誠欲以古人自㧞然不知終能無負否也湖峯結廬此意頗决盖賤體終薄只得隨縁自養亦古人量力之意然果能振衣千仭濯足萬里而洗滌心源有灑然融液處則品學俱到與朝夕從兄法堂之上何異顧媿萬萬未能耳佳刻謹拜領餘惟心炤明文海巻一百六十六
