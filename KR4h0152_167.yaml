body:
  text: 明文海卷一百六十七餘姚黃宗羲編書二十一講學與唐仁卿胡直去冬承寄白沙先生文編因思足下素不喜言心學今一旦取白沙文表章之豈非學漸歸原不欲以一善名其志力不大且逺哉不穀昔常相期至再三之瀆者固知有今日也甚慰甚賀苐令其間不共相究竟則徒負平日蓋先此有覩見是編者謂此書題評雖揚白沙其實抑陽明即語不干處心宛轉詆及陽明近於文致不穀不肯信已而得來編讀之良然如云近儒疑先生引進後學頗不惓惓嘗遍觀陽明語意並無是説不知足下何從得之夫陽明不語及白沙亦猶白沙不語及薛敬軒此在二先生自知之而吾輩未臻其地未可代為之説又代為之爭勝負則鑿矣厯觀題評中似不免為白沙立赤幟恐非白沙之心也古人之學皆求以復性非欲以習聞虛見立言相雄長故必從自身磨鍊虛心參究由壯逮老不知用多少功力實有諸已然後敢自信以號於人是之謂言行相顧而道可明若周子則從無欲以入明道則從識仁以入既咸有得而後出之孟子亦在不動心後乃筆之書白沙先生一坐碧玉樓十二年久之有得始主張致虛立本之學一毫不徇於聞見彼豈謾而言哉陽明先生抱命世之才挺致身之節亦可以自樹矣然不肯己亦其天性嚮道故也過嶽麓時謁紫陽祠賦詩景仰豈有意於異同及至龍場處困動忍刮磨己乃豁然悟道原本不在外物而在吾心始與紫陽傳注稍異及居滁陽多教學者靜坐要在存天理去人欲至虔臺始提致良知一體為訓其意以大學致知致吾良知非窮索諸物也良知者乃吾性靈之出於天者有天然之條理焉是即明德即天理蓋其學三變而教亦三變則其平日良工心苦從可知矣亦豈謾而云哉不穀輩非私陽明也亦嘗平心較之矣曽聞陽明居龍場時厯試諸艱惟死生心未了遂製石棺卧以自鍊既歸遭謗則以其語置諸中庸中和章並觀以克化之今之學者非不有美行也其處困亨毁譽之間有是乎不穀有一族祖贑歸者每歸語陽明事頗悉今不細述但言渠童子時赴孰學見軍門輿從至咸奔避軍門即令吏呼無奔教俱義手傍立有酒徒唱於市肆則貸其朴令從教讀者習歌詩卒為善士又有啞子叩之則書字為訓亦令有省今之學者非不有美政也其都尊位能勤勤於童子於市人於啞子有是乎夜分方與諸士講論少入噓吸間即遣將出征己行復講氣色如常坐者不知其發兵也方督征宸濠也日坐中堂開門延士友講學無異平時有言伍公焚鬚小却暫如側席遣牌取伍首座中惴惴而先生略不見顔色後聞濠就擒詢實給賞還坐徐曰聞濠已擒當不偽苐傷死者多爾已而武皇遣威武大將軍牌追取濠先生不肯出迎且曰此父母亂命忍從之乎其後江彬等讒以大逆事叵測先生特為老親加念其他迄不動心異時又與張忠輩爭席卒不為屈未嘗一動氣臨終家人問後事不答門人周積問遺言微哂曰此心光明亦復何言今之學者平居非不侃侃其臨艱大之境處非常之變能不動心有是乎若非真能致其良知而有萬物一體之實者未易臻也先師羅文恭至晚年始歎服謂先生雖未聖而其學聖學也然則陽明不為充實光輝之大賢矣乎獨當時桂文襄以私憾謗之又有以紫陽異同且不襲後儒硬格故致多口迄無證據識者寃之昔在大舜尚有臣父之譏伊尹亦有要君之誚李泰伯詆孟子之欲為佐命大聖賢則有大謗議蓋自古已然矣足下豈亦緣是遂詆之耶抑未以身體而參究之故耶夫吾黨虛心求道則雖一畸士未忍以無影相加而况於大賢乎恐明眼者不議陽明而反議議者也編中云良知醒而蕩夫醒則無蕩蕩則非醒謂醒而蕩恐未見良知真面目也又詆其張皇一體吾人分也今觀學者只見爾我籓籬一語不合輒起戈矛幾曾有真見一體而肯張皇示人者哉雖然足下今之髙明者也昔不喜心學今表章之安知異日不并契陽明將如文公之晚年篤信耶近百年內海內得此學表表禆於世者不鮮屢當權姦亦惟知此學者能自屹立今居然可數矣其間雖有靜言庸違者此在孔門程門亦有之於斯學何貶焉不穀辱公提攜斯道如疇昔小有過誤相咎不言今關學術不小曷忍默默因知希舜者舍己從人又安知不如往昔不假言而自易耶且知足下必從事致虛立本是有新得仍冀指示益隆久要豈謂唐突耶東朱太守吕懷懷感激道義之愛竊有所聞不敢不為吾丈道之夫維揚天下之巨區也其俗多文而少實比來與聞甘泉先生之教勃然振刷而興者無慮十百是雖其秉彛好德之心所發然亦豈其俗固近之也聞比來當道至此鼓舞作興者固多間有一二豪傑負氣使智以講學為不足信往往故為裁抑此懷以為過也夫其振刷而興也以為盡出聖賢為已之心不敢必耳然謂以講學為名則縱不得為聖賢之學比之尋常亦必有所顧藉而自惜者不猶愈於羣居終日言不及義習為放僻邪侈肆然而無忌憚者耶由是言之當道所以待維揚之人亦既薄矣豈其待維揚之人之薄反諸其身此其所以自待又何如也邵子曰名者治世修身之具夫當道也苟無治世之心則己若或有之謂當乘其振起之心道以敦本之實是或因性牖民之一道也維揚之俗興起之多薰陶之久醖釀之深循名責實由粗入精又焉知一二豪傑不起於千百萬人之中以上追三代之盛也耶孔子曰舜有臣五人而天下治夫茍得一二豪傑振起其中上追三代之盛則維揚之人固不必責其人人盡為聖賢而後足也昔人謂三代以下之士惟恐其不好名斯言雖未必盡出中正然而今方睊睊朝夕物色講學之士而裁抑之謂之何哉吾丈以躬行實得之學操範世為民之志其所以察此之心撫此之俗必有道矣與章楓山舒芬芬自成童之時即知景仰道德兹二十年矣昨者始得拜門牆又值謫限促迫不得留旬日侍左右聼謦咳豈芬之分固如是哉芬嘗私論先生在今日其進德之功老而益篤則衛武公也白首憂國家則畢公其人也然論學究極義理之歸論治酌見理亂之緒論制作洞達禮樂之本統會斯文卓乎有畢公武公之不可及者又善於作人天下之士受答問私淑艾之教者不勝屈指則先生真古聖賢之徒其諸執事論以一窮達樂貧賤蓋淺淺乎其論也是則先生果何如人哉少有志於道德者其向慕服從之心當何如哉芬神思無一朝夕不往來蘭溪山水間也惟歎世之求富貴利達者往往如意而芬欲依道德之光難固若是則造物者亦可問矣雖然有孔以啓之必有顔曽有周以啓之必有程朱皆貞元之會不偶然者若先生之啓芬雖不獲海內之士必有能受之者矣我朝理學自薛侍郎吳聘士倡二公皆精察力行在孔門可謂庶幾矣然薛學自薛而止吳學傳者雖衆可稱具體而微者亦惟胡敬齋一人而己然則先生之學雖天所啓授受告戒關於貞元之會者亦有不可必哉是後有晉江蔡虛齋先生執事必嘗與之上下議論蓋亦今日所無之學也芬雖得厠其門牆恨當時無憤悱之地徒苦先生之擊蒙也陳白沙任資性而忽義理至今慕其道者參以舉業利達之心遂成鄉願此風既久則才識髙者為王莽其次為胡廣其次為馮道生人必受其禍矣近日王陽明一派門人頗覺張皇以王之學重涵養而輕講究不知陽明學聚之功在前雖老釋之書亦討論之既乃斂華就實見涵養把固之力耳若初學未有義理磨礱前言往行以開其智慮則氣質之昏愚者涵養雖久未必能變也故此教在陽明自為則可施之初學小生恐未可也芬於斯文之際不敢妄議竊以論語君子不重一章求所入門户以為易簡而所云主忠信者內欲存赤子之心而外全君子重厚之質不知然否惟先生閔而命之恭惟中和合序不欲詢時起居惟附上警心詩數章以為承教之地伏楮不勝戰栗答鄒文徵薛應旗不肖洊遭憂患困伏草土反已省愆莫知所措追惟曩昔與君講道白下而四方朋輩亦時有相啓發者今皆不可得矣此學不講今世通弊自吾鄉觀之更覺寂寞不溺於勢利之相髙則安於舉業之自足糾結纒縛牢不可破求如執事知我之深信我之篤者真不易得也非執事之知我信我也執事之心即我心也即千萬人之心也即古今天下人之心也其感應孚契之情有難以語人者二千里外連得手書稔知逺念殊荷殊荷所示日修記一册見執事志學精專工夫無間自此尋向上去便是作聖之功非徒欲以一善而成名者僕雖頽墮振起多矣所論孟子大體小體實未嘗離儘是痛快發明但引樂記人生而靜一段中間如以感物為性之欲及好惡無節等語意節次終是未純此蓋多是後儒撰擬非聖人之言也執事又謂先立之功須是平日瞬存息養戒慎恐懼保守得此心然後物交能思物至能反躬此亦未免於揣摩想像之説終非根極理要之言蓋人之一心萬物皆備立則便有主宰便不能奪非是懸空立著此心待物至然後從而思之方不能奪也況動靜無端寂感無常隨物順應所過即化若是豫定於中則是有心應物而非虛靈之本體不免蹈世儒求中於未發之前之説其流弊將逆億潛生不為物引必為理障毫釐千里正在此處其曰先立云者正是指出頭腦以為學者最初用力之地工夫莫先於此之謂也大體既立便是小體不能奪便是思則得之非謂先立了大體待物至然後思之又有一層意見且思之云者即是感而遂通不是苦求力索只緣人不能立大體感之不能通便為小體所奪便是不思則不得也孔子所謂慎思再思九思即是先立大體工夫世間亦有一等未能立大體待逐事逐物至面前方才致思者便做得好時亦只是季文子之類耳終非聖學執事髙明融會當自得之執事又將周濓溪聖學一章務與繫辭易簡等語相配雖是道理一般其實不消如此輳合蓋聖賢言語亦多有隨事應機處若必欲一一輳合到得窒礙時便有生吞活剝割裂裝綴之病此亦是習根未除不可不察若果能於本體工夫著實下手做去則自融釋脫落六經皆我注腳何必牽制文義以自陷於固必將迎之窠臼也執事愛我信我敢獻愚衷倘有異同望頻頻示教長清齊之大邑寄百里之命正謂此任本非細事以執事為之必當為昔之武城單父矣慈谷略承命附去亦當年一時意見不足觀也量時與地幸自裁之惟敬教勸學一節近時號為能事者最所不屑量必以為首務不待愚言之贅也千萬留意暑中草草不盡答顧叔時鄒觀光幾當菀結不任懷人室是逺而愾我寤歎音問差不落莫足慰藉耳周太守者向弟從闈中讀其文所劑量稱引皆切於事情使河汾持衡不能不品其為君子弟固已逆知其有餘於品解棘聞為講學中人相見卻無一語及學弟益異之今繇丈諭以觀信言可以知人也丈不輕許可言必足信殊為此君一解頤願丈益教之俾竟成佳士耳渠札中亦甚能皈依丈可覘其不俗弟近所事事頗具一小刻中寄丈覽教昨偶得孫文融書若謂弟不宜移文章之好而登理學之航想是見弟衡言稍涉論理語虞我兩墮而兩無所成愛我甚忠弟不謂然學與文豈可岐而二哉理學不入於文章以多葛藤語而又故為淺俚以示易文章不入於理學以多浮佻語而又多軼檢匭以取訾夫是二者合之則雙美離之則兩傷文無事理則所謂文者必盡汰六經語孟道德仁義之言而後可而理必不文則曽子之所謂出辭氣似亦無用逺鄙倍為也弟本一椎拙木訥人耳雖嘗謬意觚翰然實不能窺文章之藩而近時稍知所為禔身立命又不能食理學先生之餘蓋不能為文人又不能為道學我為我而已矣文融虞我兩失之而我故未嘗兩得之也今夫文章之為文也其油然而意森然而法斐然而藻鏗然而聲蒼然而色此必不可易者也若乃翼經垂教徵事取材談苦空慧定世不曰文人而釋子矣談參同悟真世不曰文人而道流矣方且侈竒而競博以相髙也若談六經語孟道德仁義之語獨避其涉道學先生而虞不得為文人哉至弟所拈出躬行二字又講學先生所斥以為藩籬外語而弟自信以為聖人復起不易吾言由今之道無變今之俗談悟談宗其實能反而求諸本心良知者幾人吾懼其祗恣而為蕩為虛而必無益於世教也吾丈將斥弟為藩籬外語耶抑亦訝徙業而無成如文融所慮耶弟固未嘗徙也因來諭云欲與弟究此一段大事弟恐不即縮地胸中耿耿為丈一吐幸即尋雁距而惠教我於以導迷醒寤幸甚明文海卷一百六十七
