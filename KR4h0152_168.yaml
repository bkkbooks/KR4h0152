body:
  text: 明文海卷一百六十八餘姚黃宗羲編書二十二講學上王龍溪先生沈懋學不幸學繇先子得聞道教嗣且負牆言益沾濡化雨披拂春風即駑駘之資亦知策勵顧怙恃並失無志馳驅冬暮殯二親正初倥偬北上擬謁選勉職三載圖冠帔報北堂私願足矣乃者幸博一第荷聖明知遇俾厠詞林責重恩深懼難報稱又二親不待榮益增悲兩世交歡情關休戚知門下為不佞喜亦為不佞憂也頃接手書肫肫教愛佩切肺衷所云月會之規責以始終信志自信自修自命自立豈敢隨人避忌顧時當橫議藉此文姦亦甚不少必分淑慝始懲勸有機混處無權豈堪辨析雲萍聚散總屬虛文消息從事轉移有道形聲互異歸在相維邇已題復舊制共諸吉士開館讀書朝入暮歸不暇舉約同館三十人觀摩規勸即此是朋即此是會亦即此是學一分門户便覺心私夫學之於朋如魚之於水不可一日離相嚅相詬不若相忘於江湖之為愈誠哉是言己師相舉動難必其旋至倡實學一端真良工苦心愚也竊識其意矣蓋文成王夫子當訓詁章句溺心之時舉致良知三字提醒人心挽回世運傳流漸玄造詣漸疏宗旨漸失以知識為真際而不察其所以為良以本體即工夫而不思其所以為致髙者借鋒於禪幻卑者射影於利名而取義洪爐不分真偽姦雄亡命歸斯受之一入交逰遂稱同志假途託迹妄擬清談甚有恣已猖狂率人悖亂幾成黨禍大壞師門不思易之後將何極然則今日之事或猶忠於文成非有心相反不立町畦共成實德殆有見於嚅詬者之為私而江湖之為大乎竊聞古之立教者孔曰為仁孟曰集義宋儒崇禮文成致知言各不同而旨歸則一五行綜之以土五常成之以信倡道於今不曰立誠為要哉吾師透悟入微出言為訓顔氏而後語聰明穎達者不必南北嚮虛讓矣惓惓普化老且不衰至謂有心救人不嫌拖泥帶水甚盛心也苐愚意尚有欲請於門下者惟吾師俯垂聽焉夫君子維持世道幾定於意而俗成於風意運而人從風行而化達不問隱顯率此倡明吾師繫天下之望即今髙卧抱道自守神機默握宇內從風而靡矣易曰鴻漸於逵其羽可用為儀吉正此謂也嗟夫聞伯夷之風者頑夫亷懦夫有立志聞栁下惠之風者鄙夫寬薄夫敦況吾師以道樞風天下其振勵而自新者又當何如吾師計不出此而和光同塵日與人辨説恐天下竊言而畔道因迹而疑心即所謂從井而以救人矣察意之端知風之自幸更留神以收桑榆之效不勝大願受翁師仙逰哲人其萎哀悼莫勝昨得家兄寄來柬知蒙往弔且勤諭不佞家人以斂飭清約為務感德感德兹以敝鄉臧丞之任便布腹心語擇芻蕘知師不罪璅璅天風良便蘄惠德音學不勝主臣悚仄復王龍溪先生沈懋學前者辱賜先君墓文兼示易繫大義感刻感刻卧病數月蒙恩放歸當即叩首師門致謝而沈疴未愈政從事方書服藥杜門尚難逺出俟賤恙少愈或能一候於金波園也承手諭誘以盡言深服吾師𢎞度夫致良知自能知語知默知進知退道在隨時無成心可執誠哉斯語顧今人自反語默進退孰通知乎夫已與人原無二理外與內原無二機二之則不能通天下之感矣子張問達孔子以質直好義察言觀色慮以下人語之夫子張務外人也孔子不獨以質直好義自信而必欲其審言色以下人豈更益之務外哉竊謂言色在人而察且觀焉慮以下焉良知之妙應本如是其合外內而通人已也不然則語默進退愧隨時之義矣吾師自信稍過而人且未必直言效忠任己以應物而不顧其安卒之滯於應迹而又或漫焉放過未嘗因人反已酌已維時豈良知尚有所未致耶時海內誠不無私議吾師者議者固皆捕風捉影未足深求乃斂德辟難倘亦學問中之一事乎今人之言固有謂人之口如幻泡如浮雲惟自信其心無待於外而不知行有不得皆反求諸已信已而忽人非學也又有謂吾之學如天之覆如地之載不必拘拘細微檢點而不知天地間一草一木莫非精神流貫圖大而忽微非學也又有謂狂士志大言大行不掩焉可接聖門真脈而不知庸言之信庸行之謹行顧其言不敢不勉以無所掩飾之心造篤實光輝之極方為性命真修言有餘而行不足非學也良知自能反求良知自能入微良知自能顧行而有不然者顧得為致良知乎君子當橫逆之來必三自反所謂自反正自已腳跟下究竟著落非徒於世法從違討安頓也不肖服父師之訓有年何敢諱學從氣魄上承當從知解上湊泊以調停為知幾以計算為經世是誠有之顧不肖竊謂專一調停計算而遺却本原固不可茍學有本原則調停亦知幾之所不昧計算亦經世之所不遺而槩以為外而棄之反覺分外內岐人已而視干聖經綸無倚之學尚隔一塵耳羅近溪先生賫捧至京張次君約不肖同曽直卿訪之淨業固宜提要領示準的勵精神使知嚮往鼓舞春風正曲成後學之術挽回氣運之機而顧與二僧逞機鋒謔談竟日次君失望大起厭心而相公召責之命至矣夫範圍曲成即係良知妙用而先生不知也倘亦以調停計算為徇外耶先生此行非惟自取侮辱而善類沮抑之端亦從兹著聖學果如是乎能致良知者果如是乎不肖嘗觀今之髙明豁大者皆種禪根而假聖學為訓學聖則學學禪則學不嫌明白擔當而援聖入禪推禪附聖則本原先已不清何以成已成物君子取善貴廣受善貴虛即芻蕘工瞽動植飛潛皆有可取何分於禪苐倡道率人立言垂訓要不可不正耳夫天道消息盈虛循環倚伏盛明必有大晦異巧必有竒窮今此學可謂極明談此學可謂極巧而晦與窮似不能免惟身任斯道者動心忍性實證實修不事浮談不立門户潛扶善類默轉化機始有益身心有禆世道不然人厭語而我不能默人厭進而我不能退人厭玄虛而我不能實非惟疏於察言觀色慮以下人不足以經綸天下而良知亦未必如是昏昧也且即默而語存即退而進存即實而玄虛存體用一原顯微無間成已成物自有真機機慎則學審機藏則學深機密則學不疏機圓則學不滯而良知則天之機學之則也不審不深而疏且滯焉可以驗其機之未必當知之未必良矣況今之學不患其不明而患其不真不患其不微而患其不達不患其不自信而患其不能隨處反躬因時以風天下不真則明者晦之機也不達則微者粗淺之機也不反躬不足以風天下則自信者自誤之機也老師聰明頴悟間世之英而此或不能無失意者成心未盡忘而隨時之義未盡察與藥石之言不肖謹終身銘勒而不肖所陳狂瞽之見亦願老師俯聽曲從以全善類老師齒德俱尊經厯甚練何俟不肖蟬鳴乃及門之徒率以言為諱老師即懷武公交警之念議孰從而聞之不肖從先君侍教師門有骨肉之誼又未可與他及門者同日語故凡四呈肝膽言多直率自知干冒鈞嚴而心則效忠之至也伏惟略抵忤之詞諒相成之志維進退語默之義一外內人已之觀識消息盈虛之運使風動四方忌消多口以千百世道脈開千百世太平斯文幸甚不肖幸甚若謂門生小子不宜直言觸忌學也罪則何辭與春臺蔡兵備書薛甲甲無似於知道者無能為役然管窺其間亦有年矣不意晚年得遇知己謬蒙收録且為推行既梓諸東南惠我多士而公又轉教西北并將推而行之此乃天意非人力也其斯道大明之一機乎夫致知格物之説夫子傳之曽子曽子傳之子思而有明善誠身之論所謂明善即致知也所謂誠身即誠意也雖不言感物然獲上治民悅親信友乃其驗處即格物也至子思傳之孟子則述師傳而備言之而曰至誠而不動者未之有也則格物之為感物彰彰明矣朱子解此章亦曰乃子思所聞於曽子而孟子所受於子思者何獨於經文而以格物為窮究物理捨吾之心知而求諸口耳之知不求諸內而求諸外乎孟子當時亦為告子學術求義於外故以良知良能别之此如虞廷以道心别人心千古而下更動不得陽明獨得此意故以致良知釋致知亦虞廷之意孟子之意也管見無他獨有得乎此而己夫論道與時尚不同論道者求通於千古千聖傳心之意也從俗者遵制於一時為下不倍之意也迹若相反而理之所在實相通今日科場之文漸漸返古日趨於理非陽明之功而誰之功乎道待人而行漢儒章句之習至宋周程而變然而格物之解尚未明也至我陽明以致良知發明之而口耳之説遂不得行此又一變也今公奮然以斯道為己任安知非旋乾轉坤之機乎老眼昏花謹拭目以俟知台駕將行甚欲操舟一送但暑天不能動履懷仰方深返辱賜儀逺加益增感愧然古人所貴相諒以心若僕之於公雖謂之朝夕侍教可也敢以形迹自外哉使者行促據案草草情不能盡聊附數言奉謝伏惟台照前途有便得賜平安二字足矣與陸五臺少卿書薛甲昨者邂逅倉卒甚愜素懷苐晷刻有限不得終教為此歉歉次日行速又不及一拜負愧良深方今海內同志如晨星之落落如吾丈者豈不為時重耶僕少有志於學中年以來始得聞陽明之説不覺恍然有悟然猶未敢自信也歸田後幾三十年矣日與諸友講習於菴院中則六經四子之旨與陽明所謂致良知與知行合一古今大學之説無一不相合者乃知聖門嫡傳真確在此雖欲膠固守舊而不可得也不意諸友抄録駸以成帙而吾郡别駕冉公又取而刻諸邑中至於前嵗巡撫念堂林公與今兵憲春臺蔡公又刻之於姑蘇雖未敢自謂有得然由此而尋陽明之蹊徑亦庶幾有端緒矣昔者韓子云軻之死不得其傳而又謂荀揚之書擇不精語不詳僕深服其語以為論道者須精且詳精則理透詳則意完如惟精惟一之語更建中建極一貫性善數聖賢發明而理始徹豈非精耶又本之以六經輔之以四子而意始完豈非詳耶然則精與詳信乎不可闕一也若孟氏以後更厯千年而有明道有象山有陽明可謂精矣而享年不永不獲有所著述以示後人雖欲詳不可得也至於朱子字字而議句句而論可謂詳矣然改易孔門大學而以格物為窮物之理集義為事事求合於義則與義襲而取者何以異耶循此而求之雖欲精亦不可得也故僕斷然以韓子之言為不可易而於陽明之言理析條分以求至當者意蓋在此此書板今在蘇州府中吾丈試取而閲之以為何如又二氏之書僕亦嘗致力於此蓋吾人之身於氣質上受病極多人身有病須用藥攻之而後五穀可進二氏之書應病之藥也氣質受病之人而讀之譬如病者而得甘露豈不快耶然病去自當進五穀藥又無所用矣若病去藥不除又成藥病故愚不敢為吾丈道者不敢以藥進諸無病之人也若有病之人用之自無所害此僕所以敢類進於左右冀吾丈覽之轉為有病者告也偶便草草奉聞伏惟台鑒幸甚寄聶雙江大司馬毛愷某不佞自分鄙人無可以仰承當世之君子荷明公不棄顧垂情於風塵冥晦之中此其恩遇藏之中心非一二言語所能盡述謝也昨請教公署及伏讀幽居困辨二録竊有以窺公先天之學矣夫良知者吾心之本體也致知者復吾心之本體也人患本體不復耳本體誠復則縱橫曲直無非妙用潛見飛躍盡是真機陽明公所謂中立而和生焉意正如此故吾人之學譬如種樹然栽培灌溉止一味從事本根至於枝葉花實自是本根生意不容己處更著力不得矣惜今之人漸失本宗指明覺為良知緣應感而致力夫以明覺名良知是宋人以愛名仁也愛非不足以名仁而仁非愛之所能盡明覺非不足以名良知而良知亦非明覺之所能盡蓋良知猶之日月也明覺猶之日月之容光必照也奈何遽以容光之照為日月之本體即孔門之曽隨事隨物精察力行可謂勤且專矣然非夫子示之以一貫終未可以續聖道之嫡統故曰識得一萬事畢嗣後惟濓溪明道象山諸公知此周之主靜立極程之動靜皆定陸之先立乎大是皆口口真傳心心密證者矣邇來我白沙公習靜陽春養出端倪實提出生平公案以示世之希聖者凖也明公之學歸寂立本直與數公同符共券簡易而絶支離的確而無差謬自始至終自壯至老戒慎恐懼惟有此耳所謂集義所謂由仁義行先天而弗違者也蓋必如是而學始有主宰始有歸宿矣若不知涵養於其靜而徒擬議於其動舍本而趨末離體而索用是陷於義襲助長而不自知也然愚復有請焉易曰敬以直內義以方外竊謂靜養固其主本及其動也照察似亦不可偏廢非截然判而二之也蓋能以靜養為主本則種種照察自是靜養中之必有事焉而不容己者蓋良知無間於動靜故其致之之功於動靜亦無間焉不然涵養未深而遽於應感者任之焉將恐近於苗之失耘而坐待有秋者矣稍抱兹疑乞明公批示以拯迷溺幸甚奉違漸逺北望斗山實切瞻企伏惟珍攝以膺天眷以福蒼生不宣答曹紀山御史毛愷前辱手諭示以聖學宗旨捧誦之餘過獲拱璧自念何幸得遇至人聞至言一至是乎此生真不虛矣反覆熟思頗有悟入謹用披獻上塵電覽伏乞裁正承諭曰諸君子一時會萃相與發明雖其言人人殊無非直指本原提破關鍵即禪家所謂最上乘也某伏思之夫曰本原曰關鍵豈非天命之性矣乎夫吾人所以鼎立於宇宙之間者非以具是血肉之軀也為其有是真性焉耳後先聖賢所以迭相發明諄諄不倦者非以強聒夫斯世也欲其復是真性焉耳是真性也者即所謂最上乘也舍是皆下乘矣皆聲聞緣覺之支果矣夫性雖無賢無愚而復性則有漸有頓某固嘗舉白沙由積纍不由積纍之言上請矣然非白沙子創言之也質美者明得盡渣滓便渾化其次惟莊敬以持養之程子嘗言之矣是故明盡渾化不由積纍云者則南宗本來無物何處沾染之謂即頓門也莊敬持養由乎積纍云者則北宗時時拂拭不使塵埃之謂即漸門也頓者不由階級徑超直入非上智者不能其餘實多以漸入耳及其成功則何頓非漸何漸非頓頓漸兩忘本無二致然而聖人見夫頓者恆十一而其漸者恆十九也則其立教特為十而九者設耳若謂人人可頓則仲尼當無言六經皆剩語矣前於少初數言不能不以致疑焉謂其一味説頓似與聖門循循善誘因物曲成宗旨稍異非敢謂其非是也承諭曰鳶飛魚躍上下昭著者何莫非性太極自然而然者哉固知日用之間莫非天理流行能察識而體認之則即所謂四時行百物生而禮儀威儀皆在其中至哉言乎某何幸得與聞此某性蒙固始以四時百物無與於禮儀威儀而禮儀威儀亦於四時百物無與意見支離未能打成一片以故天道自天道人事自人事也今拜至言恍若有悟果然瓦礫皆金原來燈即是火乃知天道人事本同一理三千三百常生常行烏可以差殊觀哉誠會乎此則盈天壤間物皆鳶魚理盡飛躍頭頭觸著無不是這個面目蓋在四時則曰常行在百物則曰常生在鳶魚則曰飛躍在吾人則曰禮儀威儀隨在異名實則一個譬如人焉對父謂之子對君謂之臣對兄謂之弟對朋儕謂之友名雖種種其實只一人耳雖則一人却義不可混亂雖則一理却自有條分縷析處此吾儒之學所以析之極其精合之盡其大也由是觀之則凡大而禮樂刑政微而食息起居精而窮神知化粗而灑掃應對一刻一步皆離不得是雖敷教明農許大事業亦只是日用常事夏葛冬裘飢食渴飲一般故曰道也者不可須臾離也非不可離也不能離也因悟東廓翁四時百物皆太極禮儀威儀皆真性之説非因顯知微離體求用也蓋顯即是微用即是體耳又悟伊川放之則彌卷之則密之説亦多却放卷二字蓋此性本無所放而未嘗不彌本無所卷而未嘗不密常密常彌常彌常密無時不彌無時不密彌者自彌何待於放密者自密何待於卷一邊密一邊彌道密又不得道彌又不得亦禪家所謂無有中邊能所者也管窺如此然非蒙諭開示明白何遽至是伏乞更進教之承諭曰大抵於言語中見道不若於身心上求道茍有得焉則會通曠覽無不融徹千言萬語總求放心此則在人妙悟所謂大匠不能與人巧者耶此真提綱挈要痛快語也古聖賢只為這身心兩個字費盡千言萬語欲夫人由之以不失這個身與心耳茍得茍悟則一箇字亦用不著後之學者却一向只於言語上偏勝其失彌逺雖以聖門子貢之賢亦不免此故夫子示以無言若一味暗然在身心上用功如顔回也者則夫子固與言之終日而未嘗以為多矣是故善學者脫去言詮直求心學則自日異而嵗不同然心學一著功夫不外中庸戒慎恐懼二言戒慎云者又非矜持把捉之謂也孟子曰勿忘勿助此指出真面目與人著些意不得不著些意不得蓋稍著意便失之助稍不著意便失之忘於此意間調習得正當即此是本體即此是工夫更無言語可著矣仲尼從心不踰亦只是這個本體工夫到極熟處所謂巧所謂妙俱從熟處出耳晦菴感興詩云由余昧前訓坐此枝葉繁發憤永刋落竒功收一原某願終月佩之固所以報明公與進之盛心也狂妄縷縷未知是否伏乞終教之幸甚幸甚復斗城子王健纍辱手札仰悉不自滿足下問盛意愧歎愧歎以能問於不能以多問於寡兄其有顔氏之子之風乎乃今何幸得見之也夫造詣未熟言之未瑩先哲猶是之懼而況淺陋如健者兄何所取哉尤愧歎愧歎雖然盛意不敢虛也聊以平昔所聞者為兄一言之健聞君子之學只是毋自欺毋自欺只是致良知故致良知者千古聖賢相傳之祕而陽明公特揭以示人者也大學之言毋自欺曰如惡惡臭如好好色蓋以人生大界限惟有二者舍是亦别無著力處矣夫人心之靈莫不有知本自知善本自知惡知其善而不能致其知以好之知其惡而不能致其知以惡之是自欺其本心之明而卒流於小人之歸者也使知其善惡而能致其知以好惡則吾心本體常自慊足意誠心正而身修而家國天下之能事畢矣君子之學孰要於是是故聞一善言見一善行舜之知善與人一也若決江河沛然莫禦是舜能致其知以好善而吾人未之能也有不善未嘗不知顔子之知惡與人一也知之未嘗復行是顔子能致其知以惡惡而吾人之未能也故有志於舜顔者學致吾心之良知焉爾矣健數年以來見同志中類能發明此學間有不同者則以為天下之理無窮一已之知有限求之不博講之不熟察之不精舍置簡編漫無考識而徒抱其區區之良知則無以究極於善惡之歸而推廣其好惡之事終未見其能豁然貫通也蓋其論雖多而大都不過若此若此者非獨其疑畏不敢自信而然亦由不從身心體認不下近裏工夫沿襲於記誦沒溺於口耳揣摩於影響本無志意而泛言之也試自反而一一點檢平生已知之善豈嘗行之盡乎如已知之善尚有未行即日究極得未知之善恐亦如前之不行已矣於吾身之君子何所加益也平生已知之惡豈嘗去之盡乎如已知之惡尚有未去即日究極得未知之惡恐亦如前之不去已矣於吾身之小人何所加損也故學者必能學致吾心之良知則真實之學無有虛假完全之學無有欠缺不待增益不必攙合而自足矣比有一友聞健曽有此説則謂健此可與悟後者道耳假設未悟之人用子之説於明明而善明明而惡者固未見有礙處其或似善而惡似惡而善將不免認子為賊認賊為子則此殆未可為通論也健尤謂不然今所患者吾人不能實致其良知能致其良知又不能無間斷爾誠能常常致其良知於善之易知者既知而盡行之惡之易知者既知而盡去之推此真實一念即有難知自將聰明日啓而無不知矣其或有疑似而未知則凡所以求之講之察之者又莫非良知之運用也凡健所論非謂全不求不講不察也謂求之講之察之者求此致良知講此致良知察此致良知也求之講之察之於此致良知者又非謂待善惡疑似而未明然後從而求之講之察之也凡平日所求所講所察者無非是致此良知也所求所講所察無非是致良知者又非謂於古之經書一置之於不求不講不察也謂求之講之察之於經書者當知經書所載不過是求致良知講致良知察致良知之印正也茍求之講之察之於經書而不知為致良知之印正則亦徒求徒講徒察徒費精神於故紙爾於吾身何益哉於吾身之善惡何所關與哉昔者夫子之教嘗以不講學為憂而所謂講學者無他講其修德之學也下文所指聞義而徙不善而改是乃所以講學以修德夫修德者修其明德即此致良知之别名知善而徙知惡而改亦即此好惡之實事也而聖門之學蓋可知己豈有如後世以記誦口耳為學者乎故明道嘗謂録五經語為玩物喪志紫陽亦謂讀書為學問一事健每每覽此未嘗不歎二子者真得聖門傳授之要而奈之何學者未之省悟也夫録經也而猶以為玩喪也豈謂無事於經哉蓋學固有要於録經者矣讀書也而猶以為一事也豈謂無事於書哉蓋學固有全於讀書者矣不知其要何取於録經不知其全何取於讀書故其他日之言有曰自家本是天然自足之物若無所汚壞即當直而行之若有少汚壞即敬以治之使復如舊所以能使如舊者蓋為自家本質原是完足若合修治而修治若不消修治而不修治故常簡易明白而易行日去人欲存天理且據所見去之存之功夫既深則所謂似天理而實人欲者次第可見今大體未正而便及精微恐有放飯流啜而問無齒決之譏用是而推豈非即健所謂致好善惡惡之良知而無慮於難知者耶其視憑伏簡編以究極善惡與預恐善惡疑似而錯認者所見不大異耶而為是之見者乃猶謂得宋儒之正傳何耶本之以大學之道證之以論語之章稽之於舜顔之事參之於程朱之旨蓋良知之説爛然可見無復可疑然但就事上點檢則有起有滅終非本體之流行是猶落在第二義矣必也戒慎恐懼常精常明一有障蔽便與掃除則即此是善更何所好即此非惡更何所惡然後可以語正本清源之學而程朱之旨固已具此惟在學者善觀之耳健性質庸下本非法器加以志氣不立未嘗一下致良知工夫凡有所言皆是渴舌飢腸談飲説食獨以為得聞君子之緒論而信其舍是終非進道門路故輒詳述以告亦見兄明睿十倍過人且近來一掃詞章之習而反之身心喜慶之極不得不效其愚衷耳往聞野夫間行得海上仙方不敢藏之私篋乃薰沭卜日獻之國醫夫同一仙方也在野夫則為篋中長物在國醫則可以施活人手段能用與不能用故也蓋今日之事則有類此者矣幸兄無哂其狂也明文海卷一百六十八
