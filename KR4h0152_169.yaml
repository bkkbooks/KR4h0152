body:
  text: 明文海卷一百六十九餘姚黃宗羲編書二十三講學與楊天遊馬森兩辱來教知先生不鄙有眷眷切磋之意但某抱病乞身親知謝絶是以不敢出訪而徒悵然於空谷耳日靜頤嗇神閉目獨坐未有看書承惠佳刻因閲困學録內有云學者心最怕雜要精明氣最怕弱要強毅不精明不能大受不強毅不能逺到此語本講得好似與曽子士不可以不𢎞毅之意同但云寡欲以養心集義以養氣以此二者為工課固亦是從敬以直內義以方外二句體貼出為究竟根著恐未有合一之見未免亦是逐影而不知形也僕嘗味孔子敬義之説乃演坤卦六二爻詞直方大之旨敬以直內言直也義以方外言方也敬義立而德不孤言大也夫敬義本是一樣工夫只是就內言為敬就外言為義若正心修身一般未有持敬於內而外常放縱未有外能肅恭而不本於內之持敬者也此敬義只是內外無息的工夫蓋吾輩今日之學所以不専定者只是箇不𢎞所以不長進者只是箇不毅惟心不𢎞故見人善屬詩文要學善知音律要學善工六書要學凡若此類種種於中至心之本體生意處反不知理會尋箇種子下落何能上達惟志不毅故小小利害便亦動念或遷就依違或恕己欺人或半塗而廢便不能夭夀不二以至遁世不見知而不悔何能不息故曽子終之以仁為己任死而後己便見其尋得種子端的而栽培灌溉自無息肩處此孔門自顔子以下惟曽子獨得其宗也孟子曰仁人心也又曰求放心程子曰心如穀種皆示學者端的處即如今人於果核皆言仁如桃仁杏仁之類最善名狀謂只此一些兒入土便能發生長大開花結實桃得桃之全體杏得杏之全體更不須增益只要栽培灌溉使不戕其生意便然耳擴而充之雖天地之大德曰生亦不過此心之生理也理寓於氣故曰心本浩然浩然之氣吾心之生理也未有養氣是一箇工夫養心又是一箇工夫觀孟子言養氣必有事焉等語便可見集義注云積善是念念皆求合於義方是若止事事求合於義即與告子義外無異夫無欲者吾心之體也寡之又寡以至於無即事心之學求仁之功也故寡一欲即是集一義持志正所以養氣也不則何以曰內省不疚夫何憂何懼耶與萬思默年兄論易書許孚逺承寄學易齋集伏讀數四窺兄密旨窮三教之精藴闡性命之根源灼然燭見自作主張本非淺學可及但中間一二之疑久蓄於中不為吐露求釋非弟所以事兄之誠亦非吾儒所為學問思辨弗明弗措之道也集中首明未發之中為易之源為生生之大本此千聖以來相傳心法又何加焉但以坎卦為未發之中謂以至隂含陽有淵然退藏之象者是則有説未發之中不隨方體不落聲臭天地萬物性命根源固在於此若以擬諸易象謂之乾體可也謂之太極可也謂為坎離之中可也雖謂諸卦爻象之中無所不在亦可也而獨以屬之坎卦然則乾之資始坤之資生非歟易有太極豈得指坎而言歟夫坎離為天地之用易著之矣以畫言之坎得乾之中離得坤之中於乾坤為正體以象言之在天為日月在地為水火又坎於天地間為雲雨以義言之坎為險而離為麗以德言之坎中實為忠信而離中虛為虛明稽諸坎離二卦彖象爻辭諸所取義可證也惟以人身觀之心藏神屬火象離腎藏精屬水象坎火欲降而水欲升神欲斂而精欲固養生家是以有取坎填離坎離交姤之説有水為道樞玄含黃芽之説有凝神入氣穴真人潛深淵之説其於攝生鍊形術固有之然非吾儒窮理盡性至命之道大易所不語也魏伯陽諸人特借易以神其説耳若謂圖書一六居下而天一生水坎為水故以當未發之中然中也者中也上下四方皆從中出圖書不曰五十居中乎十含五五含一象未發之體乎易之源生生之大本當在中明甚堯夫詩云天向一中分造化人從心上起經綸是也故堯舜禹之授受曰允執厥中易言黃中通理劉子稱人受天地之中以生未有舍中而可以為天下之大本者是中也惟其無可覩聞故曰微惟其不逐物而遷故曰喜怒哀樂之未發凡曰密曰深曰止曰誠曰神曰易曰精皆此理也學者真能戒慎不覩恐懼不聞洗心以退藏於密則一身之中天自清而地自寧水火之用自為既濟豈必專以神氣為事如養生家所指哉兄論坤復之際謂靈根深而後至精化遊氣息而後淑氣生不深則不化不息則不生此至理之言也然謂子輿氏稱平旦之息謂莫善於息莫不善於為為則牿而息則存者似亦未盡孟氏七篇之中僅有日夜之所息一言而非直以息為性命之宗也善養浩然之氣此其平生所獨得而其言止曰是集義所生行有不慊於心則餒而已曰必有事焉而勿正心勿忘勿助長而已其息深深自是老莊學術孔孟何嘗有是耶人心固有無思無為寂然不動之真體然而靜專動直時止時行乃天理自然之則今曰莫善於息莫不善於為為則牿而息則存然則將一無所為可乎易所謂自強不息者又何以説也説卦傳天地定位一章繼之以數往者順知來者逆數語先儒之説本所未安今謂往者由中之外之辭來者田外反中之辭自震至乾為由中而之外也謂之往於生生之機為順自巽至坤為由外而反中也謂之來於生生之機為逆造化之理非逆則無順聖人作易參贊之深旨全在於逆故曰易逆數也然則天地之道謂之半順半逆可乎陽為順而隂為逆易之逆數果在隂乎且順逆既半矣聖人參贊化育安得又從而盡逆之耶至謂羲文創易畫卦重卦所以曲成其性而使人道盡孔子贊易遡於太極退藏乃是精研逆數於心而使天道明以天道人道判屬三聖然乎不然乎蓋繫辭言往者屈也來者信也曰知來藏往曰彰往察來往來之義可以互證其曰數往者順知來者逆理亦易明易為逆數蓋重知來若所謂至誠之道可以前知者也但以此數語合於先天卦圖原無攸當所以起儒者紛紛之疑愚以為説卦傳之文未必非脫簡錯簡也求其説而不得寧闕之而己兄謂心目之間有物焉能潛能見能惕能躍能飛能悔日隱隱與我周旋焉而不可離者殆所謂乾體在我者也非過也至謂夫子語忠信篤敬而示之參前倚衡及引乾文言忠信所以進德之語而曰蔽乾以忠信蔽忠信以參倚此正近在心目之間然則心目之間參前倚衡者果何物耶又曰彼自隱隱心目間故曰見彼自潛見惕躍飛悔故曰思彼自思自見也自思則吾無所措其思故無思吾思焉妄矣自見則吾無所容其睹故無睹吾睹焉妄矣無睹無思淵然睹思誠是也所謂乾也存所無睹不敢妄睹存所無思不敢妄思忠信是也所謂乾乾也然則忠信篤敬之云只在空空見箇無睹無思底物事而且曰彼自思自見吾無所容其睹思所謂彼與自者却為誰氏吾夫子之教子張恐不若是之深竒而玄渺也至於原圖原象易原諸篇無非發揮明中之旨微言至論難以殫述窅冥恍惚時亦有之如論乾為純然生物之精又謂精為神之體君子之學凝精而神在其中厯引中庸之慎獨大學之致知乾之剛健中正純粹精以明君子貴精之學夫精之在人固可貴也而乾之為乾獨精而己耶曰獨曰知可以謂之精不可以謂之神耶且純粹精之精與精神之精其旨稍别恐不得混而同之也竊窺吾兄平生用力在於反觀靜養收斂退藏嵗月己久獨於身心之間有所自得故不覺其親切有味而為之言經傳之語一以神會闡發祕密宛若自然其視他人沿襲舊見無得於心而漫為談論著述者不啻霄壤矣然此理在宇宙間關涉至大吾兄之學將以信天下而傳將來一絲未融終纍全體一語未至恐礙同然知兄於此必猶有所不快得無採於一得之愚更為深思而詳訂之乎弟受兄至教有年於兹種種病根老而難拔未發之中猶在想像望兄深誼何啻千里然而辨難云然者道之所在不得不然情之所在誠不忍默默而己也海內談學者多明道者少其有二三真實同志趣向所存堅執自是兄固病之矣若云各是其是而不必有歸一之説則孔孟以來正法眼藏誰其領之天下後世人心學術其又何所倚賴於吾黨也伏惟裁察風便更望細為指誨以發狂愚是禱與胡廬山先生論心性書許孚逺間中披誦明公與李見羅所論心性兩書見我公誠心直道無少迂曲而見羅丈雄才卓見確有主張此皆斯文之所倚賴書中大意公則謂靈覺即是恆性不可殄滅見羅則謂靈覺是心性非靈覺從古以來知性者少識心者多二公論旨不合只在於此夫心性之難言久矣混而一之則其義不明離而二之則其體難析譬諸燈然心猶火也性則是火之光明又譬之江河然心猶水也性則是水之濕潤然火有體而光明無體水有質而濕潤無質火有體故有柔猛而光明無柔猛水有質故有清濁而濕潤無清濁火之明水之濕非一非二此心性之喻也大率性之為名自天之降衷不雜乎形氣者而言而心之為名合靈與氣而言之者也性只是一箇天命之本體故為帝則為明命為明德為至善為中為仁種種皆性之别名也此未嘗有外於心之靈覺而靈覺似不足以盡之心者至虛而靈天性存焉然而不免有形氣之雜故虞廷别之曰人心道心後儒亦每稱曰真心妄心公心私心其曰道心真心公心則順性而動者也心即性也其曰人心妄心私心則雜乎形氣而出者也心不可謂之性也君子之學能存其心便能復其性蓋心而歸道是人而還天也即靈覺即天則豈有二耶夫性之在人原來是不識不知亦原來是常明常覺即寂而照即照而寂初非有內外先後之可言若以虛寂為性體而明覺為心用是判心性為二物斷知其有不然也見羅兄又謂虞廷之相傳者在中道心人心總皆屬用大學之歸宗者在善心意與知總非指體此等立言俱不免主張太過中固是性之至德舍道心之微更從何處覓中善固是道之止宿離心意與知却從何處明善性無內外心亦無內外體用何從而分乎尊教有云指體而言則不識不知指用而言則常明常覺此語猶似未瑩蓋常明常覺即是不識不知本然明覺不落識知一有識知即非明覺有明覺之體斯有明覺之用恐又不得以不識不知為體而以常明常覺為用也萬古此心萬古此性理有固然不可增減經傳之中或言性而不言心或言心而不言性或心與性並舉而言究其指歸各有攸當混之則兩字不立析之則本體不二要在學者善自反求知所用力能存其心能復其性而己矣斯道無人我無先後輒因二公所論一究言之惟願髙明更賜裁正若尊刻衡齋所辨宋儒物理之説其説頗長姑俟他日面教盡所欲請也論學揭髙攀龍近者黃門朱五吉老先生有憲臣議開講學之壇國家慮啓門户之漸一疏指意歸重東林至欲以東林為戒而不復講學此説一倡吾道之禍大矣天下國家之禍大矣職東林人也即不言及於職何忍坐受東林之誣正欲具疏旋奉明旨如日中天不復瀆奏以啓爭端故謹具揭夫黃門所言東林非東林也乃攻東林者之言也所言東林之禍非東林能禍人乃攻東林者欲禍東林也數年來職每自詫理義人心同然何以言理義者輒目為朋黨而不容於世乎一日憬然曰正惟其同然也故以為黨也國家用一當用行一當行去一當去必曰是東林之脈也或有人言一當用言一當行言一當去必曰是東林之人也不論東西南北風馬牛不相及之人茍出於正目為一黨東林何幸而合天下之衆正何不幸而受天下之羣猜弓蛇石虎塗豕鬼車皆非實事也即如郭明龍正域生平未嘗講學生平不識東林黃門謂與顧憲成開講東林即此而觀他可例推無亦黃門師生姻婭之間涵濡浸灌之久於時局之説不自覺其入之之深乎不然何以二三年來門户去於人口依然還作當年口吻耶夫時局何為而攻東林耶方中涵相國未入相之前首參之者吳嚴所亮也既入相之後首參之者錢梅谷春也故一時承迎相國者皆以攻東林為職業摧殘善人戕害國脈率繇於此此果東林所為乎抑攻東林者所為乎以為東林所為東林能制其鄉里言官不參論人乎昔程伊川先生講學於熙豐而為蔡京諸人所攻朱晦菴先生講學於慶元而為韓托胄諸人所攻不以蔡京韓托胄諸人為戒而以伊川晦菴為戒可乎東林非程朱而習程朱之教者也不幸類是矣夫學者何也人之性也性者何也天之道也知道則刑名錢穀皆實事也不知道則禮樂刑政皆虛文也在此心迷悟間耳諸老從迷得悟不忍人之覿面而迷故講以明之正使之即事為學非以學廢事也黃門曰孰是仕優者乎乃可學不然勿言學職亦曰孰是學優者乎乃可仕不然勿言仕審如是可仕者寡矣宇宙甚大不可以一見相礙釋老且不能廢況可廢儒儒者以明道者也非儒生帖括之謂也非督學膠黌之事也收拾精神而非消耗精神者也人不知學世道交喪於是朋黨禍起相安則交安相危則交危故黨類之黨不能無是羣分之品也偏黨之黨不可有是亂亡之本也知黨類之不能無使之各得其所而勿相猜忌知偏黨之不可有使之各懲其禍而勿為已甚但得人人自反勿專尤人則無不可融異為同化小為大故有教則無類并黨類之黨亦可融之者其必繇學乎惟學可消門户顧以學為立門户職未見立門户者而可以謂之曰學也謹揭明文海卷一百六十九
