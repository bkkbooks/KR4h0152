body:
  text: 明文海卷一百七十餘姚黃宗羲編書二十四議禮上東里楊先生書劉球球學踈識淺生四十餘年於世故猶未甚鍊獨於事先一事不敢不盡心竊念先世有合族之祠於邑西湯村經兵燹喪之先祖遂徙邑北葛洲先君思復舊祠不可將營于徙居之東球以進士去家時先君指謂之曰得吉即成之成則記必請之東里楊先生先生德行足以表當時文章足以名後世祠不記于先生不足以傳久也又曰同郡諸先正以忠節聞天下者吾家籍中皆有其文楊先生令名盛業當不在諸先正下必求得其記然後終吾志不幸球行未逹京而先君訃至歸服喪既祥與諸父昆弟謀如先君成之祠成已七年球之叨祿禮部亦四年而記尚未之請是固球兄弟不恭先命之辜然亦未為無所待也今先君荷朝廷推恩將有贈命之及家兄復走戒球無易先君命必求記於先生者數矣故敢踵門來請先生幸無卻焉若祠堂中小大禮節則惟朱子家禮是凖其間亦有宜於古而不宜於今者勢固不能必其皆合又不可不就有道而正之惟先生博古今之學逹時勢之宜球又辱以鄉郡之故承賜教誨為多欲求正乎禮而不即先生門則無可適矣先生幸無塞其欲求正之意蓋家禮緣古道尚右故次髙曾祖禰神位皆自右而逹左今世以中為尚以左為尊故祠堂神位之列皆尚中而尊左其不合者一也家禮祭始祖於冬祭先祖於春祭禰於秋已謂冬至之祭似僭矣况今國家無此三祭而居下者有之非禮也因皆罷之而所致者惟時祭焉其不合者二也家禮時祭皆於先月下旬卜用祭月三旬吉日今國家時享定於孟月朔故四時有事於祠堂亦欲用仲月朔以省卜日之繁其不合者三也凡祠堂所祀之主惟忌日焚黃等祭羣主所不當與則獨遷本祭主於正寢若四時羣主皆與之祭則不遷止於祠堂行事家禮則凡祭皆遷主於寢其不合者四也在昔舊祠通一族共之今逺不能宗惟自一世而下至五大房始開之祖及其後有德望爵位顯聞於人有光於族者各以昭穆合為一圗藏之祠堂歲正月初約宗族展而祭之上以存舊規下以親族屬而家禮未有是祭其不合者五也凡此五不合者乞定其可不可而去取之其可取者願附之記庶後之人永永守之後有識者終不得指摘其非則先生於寒門大有德其或有觀感而起者猶將利其澤潤於無窮焉若其世家居里則别狀以呈乞採撰焉奉答太守叔父論祠祭書謝鐸昨拜領祠堂記一篇令鐸仔細商量者鐸愚暗無似尊命下臨豈勝惶懼之至然切有窺測而不以告則又終非此心之所安者敢用粗陳其一二以俟教焉如所謂右室以居庶母之主者則固當從今命所引祔于妾祖姑女君之禮而程子亦有其子祀於私室之説是此一室輒當除去無疑矣但左室以奉祧主亦似恐未穩當藏於墓所禮家之説有明文矣夾室之藏則天子諸侯之制蓋為祫祭而設今安得遽擬諸此且既曰祧主又安得有服未盡之親而得以於此祭之乎借曰宗子尊行旁支有如祖父行者在所當祭則所重在此彼亦不得而私之也矣且如今日此祠以叔父主祭則斷自道三府君為髙祖八叔祖亦在與祭之列又安以此之故乃上及福五府君而不祧乎又四龕以西為上雖非盡合古禮要之祖堂之制朱子以義而起定為四代之祭且曰而今四代已為僭若是始基之祖亦只得存墓祭如是則五龕之設雖有賈疏五廟可據恐亦未免嫌逼已甚况六世遞遷之祭彼五者一世是為一廟昭不見穆穆不見昭各有以全其尊而無所厭其大祫而會于一室也則祧主畢陳而尊卑之序又各自為偶而無所紊今也同堂並列如曰左龕髙祖盡而祧則次左龕祖之主合升而為曽以居於此而以親祔之禰補之彼中右次右二龕固亦遞改而為祖矣則所謂子者乃皆並坐一堂偃然而居於父之左於禮安乎是亦恐不得與彼五廟各自為尊者比也又昔之四龕而遞虛其西之一二三者以所繼之數世宗未滿而不敢祭耳若及五龕則是倣佛五廟之制則必自一世二世以至於五世至六世之後乃遞遷之而所為一世者則以其為始封之君而不遷似亦未嘗虛其一世之廟以徐有所待也就如文武之廟始列昭穆終則百世不遷亦必至親盡之日然後别立一廟以宗之初亦未聞預有所待而虛其廟也若是者揆之於禮竊恐未合不若直如朱子止為四龕以西為上視所繼之宗而遞虛其上者之為簡易而無礙也若乃桃溪始祖則自有所謂墓亭者在似亦不必更設此一龕也又末一龕禰之祖居之是謂定論今而曰諸父之主亦皆會祀此堂居於禰之龕而以齒為序鐸又未識此龕之內伯婦嫂叔之間何以並列若曰各自為龕則此祠之禰昆弟盡入是其為龕又何止於五而己凡若此者於禮亦恐似未有據蓋此祠之初立也叔父本以尊祖行睦族之誼故合諸叔父而共為之則今日於勢於情似有不可得而異者特恐禮所未安則其勢亦自難行而於情亦反有戾此則久乃可見聖人因人心以制禮一本萬殊之義似不可以毫釐易也誠欲逺取宗法近不失乎朱子創祠之義則似莫若特存此祠為繼祖之宗而叔父復以身自倡為繼禰之祠然後俾諸叔父之有力者各自創立否則以其私室從事歲時則先從宗子與祭祖祠然後各以其情祭於其禰庶其可也茍宗子不堪承重則當别遵橫渠張子之説擇次賢者以易之此叔父今日權以承祀之義是已稱之祠獨在諸叔父而叔父無與焉今方為睦族之始而遽申此説習之久以迹而不以義鐸固以知其決不可行矣要不可不知耳凡鐸前所考據稱説誠大有未當者惟叔父先生一一剖判明白詳以示下此非一時一世之事可以暫行而中輟也茍有未慊萬乞不吝頻於往復至幸至幸鐸喋喋不勝恐懼俟命之至不具偹明文海卷一百七十
