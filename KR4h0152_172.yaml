body:
  text: 明文海巻一百七十二餘姚黄宗羲編書二十六議禮與蕭子雍書霍韜黎訓導行草次付上陋議生也自知背時違衆且犯宋人不韙之罪固嘗緘口以俟世之君子講訂焉既而舉朝士大夫皆極力争辯謂上既富有天下必不得復有父母然後可生竊痛之曰使我不有父母然後與我官爵我寧不有官爵而不肯舍父母也孰謂父子天性諸君子獨與人殊也是故不得已著陋議已而毛先生下教復誤以為人後者為之子為出諸禮經生乃據儀禮禮記與之考訂論辯然後頗覺其誤而伊川之言則莫辯其果出於伊川否也或洛黨假伊川之説以求勝歐曾亦未可知也今則知富有天下者不得有父母之為非矣故我皇上稱興獻王曰本生父惟考孝宗之失則諱䕶而不肯改生竊議之曰本生父之詞可用之手勅也祀事祝詞亦曰本生父之云也乎若祝曰皇考則於孝宗不亦有兩考之嫌也乎是故不得已上陋疏今諸君子復嘵然共争皇字之増減生竊議之曰俾我皇上得正父子之名以不絶天性之恩則姑緩尊之典以安其親之分禮之正也今不能守禮極論惟争一字之増減是猶或紾其兄之臂子謂之姑徐徐云爾不亦可惜乎蓋諸君子始也謂皇上宜為孝宗嗣别擇崇仁王為興獻王嗣亦猶哀帝為成帝嗣别以孝王子為定陶嗣也今皇上帝后其父母亦猶哀帝追帝后其父母也是誤皇上以非禮之失全襲漢帝之非誰之尤乃上自内閣下至諫垣至百執事各嗷一説以著直諌之節惟皇上孤立獨䝉拒諫之名生竊謂宋之濮議主之者宰輔也議之者學士也争之者諫臣也是故英宗得恭已以聴不失為盛徳之君韓歐猶得直任其事以甘心奸邪之斥所謂善則歸君過則歸已古道猶有存也今則大小臣工俱著直諫之譽惟皇王獨䝉拒諌之名則今日宰相欲如韓歐之奸邪不可得也皇上雖欲如英宗之恭已亦不可得也世變不猶可慨惜也乎是故不得已著或問凡此皆一已淺見諒不足以示百世垂無窮方自首悔而執事奬借太過吾恐人亦謂執事為邪説中人也何如何如近日南畿諸君子亦各具疏以共揚直氣可羡也惜乎不能端本極論亦惟一字之競無補於人倫天理之是非也且其説有所謂春秋之義有所謂考禮據經不知諸君所讀者何春秋所據者何典禮而云爾也今之利祿昏心者謂有天下必不得有父母生且不暇與辯獨惜伯固黄先生為世間人侍御方先生志道林年兄家學淵源亦深弗考也亦徒云云也或者不諒諸君之心直㫁之曰王鳯柄國上書者專攻後宫王莾柄國頌功徳者四十八萬七千人自今觀之豈四十八萬衆洎諸賢良則盡䘮心也乎寜忤天子以有直名勿忤權臣以觸竒禍古今人心豈相異也嗚呼此豈諸賢之情也哉又謂秦王車裂假父嚢撲二弟諫而死者二十七人茅焦繼之危言厲氣感悟秦王由今觀之則二十七人之死諫茅焦之善諫是非何如也永樂間遷都北京舉朝之士争言不便至斬蕭儀然後定自昔視之太宗真拒諫也由今觀之是非何如也習見䝉人豪傑不免况於庸人俗士以口舌取官爵如茅焦二十七人軰又烏足責其知父子夫婦兄弟之倫也嗚呼豈諸賢忠且智亦猶夫茅焦二十七人者之忠智也乎是未可知也不然則春秋之義禮記儀禮之説想講之熟矣而猶不知為人後者為之子之説之非乎如其不知也而道聼杜撰是自欺也如其有知也而猶曰禮云禮云形諸奏牘是敢於欺君也自欺以欺君豈諸賢之心哉或者道䘮千載世昧正途前軰君子或不得不任其咎也故稽古如君實不識光武祖元帝之非吾朝博學如劉定之亦模稜蝉噪其後况蔽於伊川有無莫辨之説以踵千古之謬則諸君偶醉謬叢而發一䆿亦其宜也不然其亦躍出千古而更一深思也乎諸君生不敢與辨黄方林三先生俱世所謂賢者生不敢不請教古之君子合異為同必更相詰難然後可非曰唯唯諾諾便謂之同也執事幸為轉申此悃於三先生俾髙明尚牖教我以不終底於迷謬則我執事之賜惠也與朱貳守論稱謂書霍韜家人回謂執事怪生於拜帖不書治生而書侍生疑若傲慢不敬者此盖執事未諒生之心而區區之情亦有未徹於執事故也生於衣冠士類未嘗敢慢况於當路君子乃敢傲慢之乎且傲㓙徳也君子不加諸身况敢加諸人乎况敢加諸當路君子乎執事宜諒區區之心矣生於拜帖惟廵撫則稱晚生或稱職方主事若廵按兩司列位則稱侍生於江老先生則稱門生同年則稱年生未嘗有稱治生者是豈傲慢列位君子鄙見盖以近世謟瀆成風士氣卑陋勢之所在則望風拜塵心有所求則俛首䘮魄下以此事上上以此責下上下交相凌謟而士風䘮矣夫天下之治亂係士風士風淪䘮望天下之治可以復古不亦難乎故不自揣力量之不足竊欲以諸君子共敦古道云爾不稱治生故稱侍生禮也非敢慢也夫治之云者馭而馴伏之云也可以施諸百姓而不可以加諸士夫侍之云者交相敬事之云也可以施之同儔而不可加諸降等生與列位執事同為帝室公臣可以交相敬而不可以交相馭也故稱侍生禮也非敢慢也或云士夫於父母衙門稱治生例也生謂古者封建法行故列國各君其土士夫生其土壤雖聖如孔子亦敬其國之侯伯如父母禮也今則封建變而郡縣侯伯變而守令輿圗萬萬里有齒有髪有血有毛共仰皇極孰敢有二故我皇上天下父母也天下臣庶共宗共戴孰敢有二若鄉邦士夫又稱鄉邦之守令為父母是天下有二也非别嫌明微之道也晚唐之季節度使擁兵專地貢賦不入禆將悍卒知有鎮將而已不知有唐室也爾時豪傑生於域中雖欲勿謂節度使為父母不可得也今天下一統全盛非唐季比也若吾軰衣冠士類而又私相為父母以渉二尊之嫌是乃所不敢也非敢慢也且謂之治者我得而服属之者也謂之侍者我得而交游之者也執事為政設遇孔子有得人之問則將以所得服属者而對乎抑將以所得交游者而對乎孟子曰齊人莫如我敬王盖以古道敬齊王也生自謂不敢慢當路盖以古道相敦非所以為慢也若執事便道晝錦遇鄉邦守令亦以是禮處之是乃執事所以敬當路士夫相遇一以禮而不茍豈復有辟之干也乎此實士夫居鄉之逹禮也非一人之私也昔者生之在部也見百官謁吏部則曲躬鼠拱投刺用摺帖見科道則屏氣生毎喻之曰官爵之與死生孰輕重焉雖死猶不可如是况於保官爵又語吏部之相厚者曰若軰受人躬曲奔走受人非禮謟媚皆非人也若能居千年吏部乎豈可偶握熱柄遂使人盡䘮良心也當時雖有嫉生之言者亦有謂生言是者凡若此者生豈傲慢吏部亦欲以古道相期也執事心古而行淳正生所欲與偕行古道者敢布其腹心惟髙明察焉無以為慢兼告貴寅列位先生勿訝生為慢極荷極荷答霍尚書書田汝成来諭以為鄉士大夫與撫按藩臬府縣交際往来率當由中門不當走傍門趨偏階若小吏之見上官者仰見執事之操履端嚴言論和諍方今風俗披靡勢利反覆上下之交率唯唯諾諾以相誇諛誰能抗節秉禮自珍其身以違忤當路者走嘗傍觀而竊嘆之微執事無所於聞微走亦不足以諒執事之志三代之時國有定土民有定君士大夫出而仕於其鄉父兄宗族混然閭里非若今之時棄墳墓逺桑梓去父母之壃也當其時固有為之連帥卒正方伯者然相見之禮無聞焉鹿鳴伐木之詩畧見梗概稱其士之賢者曰我之嘉賔也而鄉三物之典亦曰賔興夫賔之言尊也賔之者尊之也故禮賔至門主人三辭明不敢先屈也賔稱摯主人三辭明不敢當養也尊之亦已至矣而何敢簡其禮以屈其身故古之君子亦莫不自重其身以立節於世非其君不仕非其大夫不見聞有徃聘矣未聞有来見也聞有求而不至者未聞有不求而先之也故雖有南面之貴千乗之富士之所以交者禮而已矣晋平公之於亥唐也不謂之入不敢入宓子賤之治單父也父事者三人兄事者五人至如監門漿博之徒茍有以自衒亦得以布韋驕貴公子之門秦漢而下雖復靡蕩然丞相公孫𢎞開東閣以延名人鄭莊為大司農戒門下客至無貴賤無留執賔主禮何進為大將軍設几杖以待鄭𤣥跡其一二猶有三代之遺風當是時所以尊賢者何所不至而敢簡其禮以屈其身夫尊賢之禮莫重者賔升階之禮以西為上夫既曰賔之矣又何靳焉故古者出入大門拂棖臬而已非如今之有三門也升降從兩階而已非如今之有中道也故君適其臣升自阼階明不敢君其室也中道之制殆起於秦漢之交所以尊君而抑臣者而公府之建亦遂因之猶言專道而行莫敢敵禮也故專道之制以之臨下則可以之尊賢則不可古之尊西階也亦猶今之尊中道也古不靳西階以尊賢今何靳中道以簡士也故茍以其人之可尊也而賔之豈惟三公九卿雖布衣之士吾猶為執鞭焉茍其人不待上之尊而屈身以求見也則彼固失己矣又何足與議禮昔者子游之論澹䑓滅明也曰非公事未嘗至室也古之室今之公廨也古之所謂公事飲射讀法之類也今之所謂公事則請寄而已矣使澹䑓滅明以請寄見子游固已謝絶之矣今之君子昧於尊賢之義而其交也率以名分為重輕故相見之禮頗皆䟽畧不講聞執事之論固已驚心而駭目矣然執事之論以為尊賢之典則可槩以語市道之交則未可執古西階之制以例今中道則可即以士大夫請寄者皆得由中道則未可何也以尊賢之義有未明也然謙厚者集福之基驕盈者趨禍之府故詩曰惟桑與梓必忝敬止而石慶入里門必下車則今之士大夫走傍門趨偏階亦未為失禮也走學術淺薄不能測義理精微以定權則方將與諸生商確儀度著為一編以附士相見之末簡先此布指尚容質疑答同志問族譜書馮從吾承問族譜僕至寡劣何以復命雖然竊奉教於君子矣敢無説而處於此夫族之有譜猶國之史尚矣苐史之為道備載善惡用昭勸戒要之以義為主譜之為道揚善隠惡有勸無懲要之以恩為主不可一概論也乃今之作譜者則不然縱筆訐發略無顧忌自以為不虚羙不隠惡自負曰直人亦從而直之居然史遷復出矣不知其直正有不在此者惟是家世寒微不諱可也事行細小不忌可也有可稱則傳無可稱則闕可也微顕闡幽㩀事實録不至溢羙可也則此便是直又何必縱筆訐發略無顧忌而後為直哉無論族譜即郡邑修誌其載善惡昭勸戒此固毫髪不可諱者尚且於職官一類但寓褒貶於三十年之前於三十年之後者則闕之一則有自已曽相與之嫌恐是非涉於愛憎一則公論必乆而後定故姑以俟之異日夫修誌且然况修譜者可輕肆褒貶乎李獻吉謂子孫而不録其先人是悖亂之行也若録其先人而又訐其過是為悖亂孰甚焉古人不又云乎作法於凉其弊猶貪作法於貪弊將何極今之作譜者雖似過訐不過一時講究未明誤以訐為直耳猶屬無心倘後世子孫一有小嫌不能捐釋借此族譜洩彼忿心則是以古人敦仁廣孝之書為後人報復恩讐之具也又誰為之作俑哉綱常風化闗係不小奈何不慎之於始而猶沾沾以訐為直也嗚呼不虛羙不隠惡此在作史則可若譜不但不虛羙則可耳禮諱尊親不隠可乎哉先是作者誇其門閥多失於虛羙近日作者懲其虛羙又失於揚惡虛羙則以恩掩義固不可揚惡則以義傷恩尤不可此作譜之所以難也鄙見如斯惟足下教之幸甚答廟災儀注二書熊過宗廟災驚懼之心率土所同矧在僚服自有官人肅給之義若不肖乃又以司存昨承示逖稱古初欲使人心警畏以開懲創之端讀之恍然如有失倘藉宗儒足為條貫傳諸来學亦不朽之盛事也一昨大禘届期執事觀變欲因廢而不舉此與不肖原擬懸合過愚以為祭固以廟存也廟火矣雖接祭有所不能又安論殺不殺哉然孔子乃謂牲至而不殺則廢今以情理揆之其文當是後人所纂入盖原文以日食太廟火疑為當祭本無可疑夫廟火固不可預期而日食則疇人子弟皆知之不待巧算也司厯何在奈何不以告而行祭曽子奈何以為問而孔子之答又若迂緩何哉夫諸侯旅見天子與諸侯相見尚以太廟火不得終禮况被災之地勢近剥膚救焚不暇尚何論殺不殺哉禮曰人有焚其先人之室則三日哭故新宫火亦三日哭公榖以為禮獨胡子以主人未入也嫌涕無從出是則哭藏主之廟胡子亦以為當禮也然不肖亦有所疑按僖二十年西宫災西宫者何公羊子曰魯公稱世室羣公稱宫今詳仲子桓宫武宫煬宫之例則宫當為廟其言不妄故榖梁子曰西宫西者何宣公之廟然其災也不聞哭經亦無譏哀三年桓僖宫災時南宫敬叔懿伯文伯之徒皆孔氏從逰之舊而敬叔者從孔子適周問禮之人也止命周人出御書不聞以哭為請孔子在陳聞之亦不譏其哭何哉盖成三年所稱新宫者以祀宣公父廟也是時言亮闇初闋而遇天災故感而哭之以致哀異於餘廟此非予之私言釋例所言皦如也彼其發義揆情視公榖二家不更精詳乎哀三年桓僖之災傳者以為親盡而廟不毁則當時之不哭其所縁起或是酌情為之茍燬於諒闇之後與夫次之逺者皆本不哭檀弓之言恐是附㑹春秋而不察當時事情耶凡禮記附春秋如諸侯不生名之類尚多不獨此條也今此所陳止是國君處變之時來教云哭位當是在都宫之外是以臣工處變言之放今時哀哭臨之義上下一體取義至精也但國哀國災禮當少别而從天子救太廟之火者孔子止云不以方色與兵不言及哭泣蒞位不知於此當何㩀乎想君既不哭故臣不獨哭孔子遂不著其禮乎来教又曰服雖無考然衰服則已重青服則已輕烏帽冠帶縞服其可也但晋太興二年國子祭酒杜夷修墓云春秋新宫之災哭而不服博士江淵議墓毁以為毁不應比廟災而不行服又梁天監元年禮官何修之議蕭子晋傳重改𦵏之服亦曰可依新宫火災三日哭不服而已則是雖繼體承祧者亦不服也况臣子不過重服者乎昔晦菴朱子謂六朝禮樂最精觀此三賢之言是聖人原不可制哭廟之服今之修首令典往往青衣從事是不為輕也過西南之人闇於逺覽執事先覺博綜墳典過欲執經從周乆矣願因下風得聞餘論幸甚答童宫諭廟災儀注第二書熊過昨奉書已旋於壇所省讀華牘宏博淵深開導備至得所未聞加於提耳之教矣過何幸何幸當時士人共仰折衷轉相傳誦幾失原本數日方得遂未裁答今尚有疑者願終惠教它時有聞不敢忘所師資来教辭引燕泉陽明所酧對欲以定世之疑不肖非敢别出臆度也顧以古人尊祖之義視敬天常少詘故祀天地則越紼而行事不敢以卑者之事而忘尊者之禮也其敢以卑者之祭而忘尊者之變乎即使失世職如左氏所言則當是之時謫見乎天祖宗神靈固己震疊為子孫者正當體祖宗之意以災為告而廢之所謂先王克謹天戒臣人克有常憲者也而以接祭為言是忘天而昵祖聖人致辨於天神人鬼之際者果如此否乎西宫之言公羊杜氏之説此亦常求三傳之異同而粗習其讀但今之稱宫者多指廟為言惟傳乃有小異爾雅曰宫謂之室室謂之宫則西宫者為之小寢别宫如公羊杜氏亦可也例之火踰公宫之説亦可也其如春秋之所稱宫者皆以廟言何哉春秋經凡居室皆不稱宫故王姬之舘人居也稱舘不稱宫謂凡室皆可稱宫經無是法也西宫書於經者也以經之例觀之是不可証其為廟乎此不獨春秋耳詩定之方中作于楚宫鄭箋曰居室也又如采蘋公侯之宫毛氏曰宫廟也豳上入執宫功所謂营居室宗廟為先故稱宫功也至魯頌閟宫之地亦是魯人安靈之所是宫之必為廟而室之不得以淆其辭古人正名百物未嘗假借後世乃通之耳桓僖公宫災来教云親盡而不毁者杜征南之説也季氏出於桓立於僖以是為悦而不毁故孔子言之康侯之説也然成公六年嘗立武宫定公元年嘗立煬宫矣是三公者皆春秋以前之君也其親盡當毁視之桓尤甚孔子言當毁何不及武煬而何言僖乎桓僖之不毁誠以季氏當時武煬之立又誰主之乎則征南康侯之二説愚皆有不逹矣来教又謂即哭矣亦例不得書今將以何為例而知其不當書乎春秋之法其有事如哭廟而不書者乎假使實有其事經以例不書矣而傳亦遂冺其迹者乎是大可疑也新宫之哭胡子獨棄諸家之説而又為辭曰於遷主其言無㩀杜鄭之徒以為當哭夫杜鄭注疏也皆定於頴逹諸儒之手過特有所從違非敢棄經而信傳也其謂哭廟而當禮者以其情則知矣而終若無㩀世之言哭廟者往往以梁山為例盖梁山之崩左氏國語兩皆載之左氏止以降服乗縵徹樂出次祝幣史辭為言獨國語有國三日哭之語先正常謂國語者左氏刪定之棄餘信斯言也將從左氏而不哭乎將從國語而哭乎將從其所刪定者乎亦將不計其所棄餘而從之乎今以西宫桓僖之不哭而定之所謂情則同而終若無㩀者不將近之乎禮曰人有焚其先人之室則三日哭信如公羊杜氏遂以西宫為小寢則固不得為廟矣亦豈不為先人之室乎為先人之室矣而經不書哭傳無有文者亦豈例不得書乎將實無其禮乎至於易服之儀不肖當時㩀舊聞為言及後思之猶有所未盡縁周官司服有大烖素服之文康成乃云素服縞冠素服也来教云易服深得禮意不肖初所不及也但云欲略如居䘮之儀當烏帽角帶縞衣遍考古喪服無縞衣者盖䘮則必衰故斬齊衰之外錫衰細衰皆衰也無縞衣以處䘮者禮除成䘮用朝服朝服者緇衣素裳非素衣也詩素冠之二章曰庶見素衣康成㩀禮之䘮服之無素衣也遂轉衣為裳以求合之吕伯恭譏其牽合矣然則縞衣似非居䘮之服也司服有云其齊服有𤣥端素端變服言端者自袂言之大夫以上侈袂故也然則素者乃是齋居將有所禱諸上下之通服也不得言為䘮服吳白紵歌曰質如輕雲色如銀制以為袍餘作巾此雖不足以明禮然亦可見素是古人常服今周宻癸辛雜志程大昌演繁露及劉績霏雪録皆同斯志其言恐是不謬乃知杜夷等不服者謂不䘮服非不素服其義自精確耳過欲如来教自大夫以上定為縞冠素侈袂服自五品以下其袂止可比之元士等定為縞冠素端祭畢則已不知可不可也或侈袂不便則上下通服素團領耳執事髙賢宇内宗仰又有發䝉之意不肖所陳必不以為凟而不告也恃愛多言恐懼恐懼過頓首頓首明文海巻一百七十二
