body:
  text: 明文海巻一百七十三餘姚黄宗羲編書二十七議樂與范以載論樂書王廷相承示校定兩山李氏律吕元聲感謝感謝且以聲音之道下詢鄙陋吁僕何足以知之雖然亦駭然有疑矣夫古人制為五音非徒然無所本者宫本喉商本舌牙角本舌徴本舌齒羽本唇故凡人呼而出聲不論歌唱言説必自宫而徴而商而羽而角角者氣平之聲音之終者也故宫音始而濁羽音極而清落而収於角清濁平焉此聲氣自然之妙非人力强而能為者今曰黄鍾宫為清越之音不知其音出喉乎出於唇乎意者閩人無喉中之音故遂以唇舌不正之音而杜撰以定之也不然當何所依據而變之惟其以宫為清則黄鍾之管九寸重濁而不合故有黄鍾三寸九分之説嗚呼其大謬甚矣夫上古鍾律之調簡矣而不求備也故周禮三宫十二律可足考擊若必欲盡五音之調非加以十二子聲不可何也清之分數少也故古之編鍾編磬有一架二十四板之説盖通正聲子聲並擊之也晋宋以來十二律之外止加四清以補不及故作徴調終不能成何也夫鍾聲之道順而易逆而難者也故濁之役清也常有餘清之役濁也常不足故備清調非子律不可今曰取聲不用半律是不用子律矣恐徴羽之調終不可成平公欲聼清角雖師曠亦難乎其為擊矣子律謂可廢乎哉夫正變二十四律則五音各五之調亦庶乎其備必如京房六十調之説則清律極短其聲焦殺亦不成調雖有其名而無實用蔡氏不深致思亦信其説而衍之况後學哉或曰十二律還相為宫然乎曰此亦非六十調之説也凡調以一律為主其餘律皆比而和之始終出入不離首律者也故曰旋相為宫言各律皆可作首也如黄鍾為主律則必以林鍾為徴太簇為商南吕為羽姑洗為角其音以次而和若以他律雜之元非相次之管必至清濁凌犯而音調不協由是言之一律主一調合正與子而二十四律生焉五五例之而猶缺其一焉雖然樂之調亦足矣故自周至漢至唐至宋以雅樂俗樂流傳於世者考之大抵宫調獨多而商角多稍次之其徴羽二調止三之一而己此足以見聲音之道濁者常有餘而清者常不足京房氏所謂六十調者論説雖羙而實用則無後學不察而傳衍之謬矣細讀兩山之論牽合傅㑹十居八九既不逹五音之清濁又不及作樂之節度雖言元聲其實無當其律音職樂樂噐聲容之考証皆長樂陳氏樂書之緒餘也傳之代中恐累執事髙見不如再加詳辯求海内知樂君子相與考訂焉是所禱切答李太常中麓書劉繪仁兄中麓去年夏五月因虞鍊師得奉雅翰喜聞動履亨嘉著書談𤣥性分内真樂無限仰髙明靈粹道術宏逺平生摧顔皺眉事懸知一毫不揣也每寄来詞曲弟雖未諳律學但少隨里中歌謡得之天性者頗中貫珠髙𤣥之妙對善謳客或辰景快意不覺放歌按拍聼者忻忭今宛洛博逹之士往往稱弟多能鄙事亦推及此嘗静念之得忘形髙人少借微酡之力妙不可述變音轉節雲璈霜條之響若神噭之也不得其人情景不應強為一焉黯然欵頓若濕鞞澁籊然由此觀之樂也者懽動流通而作也昔謝繹稱永叔善俚調尹洙善談怪一出聞者絶倒弟甚慕焉覧兄諸作邇多南音當屬商意弟略轉之宫徴令髙者宏鬯而流塵下者清越而激颸飄飄泠泠絶無南音嚅唲戚苦之氣客皆傾耳竦肩駐息栗臂有扶雲騎鳯之想蝉蜕溷濁又豈知世有圭組軒馬之耀榮也乎恨不能奏於兄側歡更何似也悲夫悲夫此戯論歌曲耳因憶郢人易調而寡陽春之和鍾牙發弦以定生死之感然則吾二人之交非可通以世情也嗟歎永言謳歌哇艶咸具神理矣是以放勲察於康衢國風采於里巷寗戚叩角以伯齊馮驩弹鋏以顯薛下及秦青薛譚孫登阮籍之事可漫語乎哉兩次承手翰都稱閩中王道思古之成家道思篤志沿采標景飭軌誠不可輕嘗睹刻集見其纉摹蟠搆紆折太多慮少奔决自逹之勢氣稍不振耳孟荀而下至劉向揚雄韓退之歐陽永叔疏通古勁不專盤挐幽渺也弟謂文章興衰披靡不有雄哲充養其氣如蘇子所謂卒然遇之王公失其貴晋楚失其富者文章殆難言矣弟鹵進無斐然之裁何足以知奉去拙稿中有答雪咏藏書歌二篇藏書歌弟狂念音調意趣與唐荆川當年藏書歌頗亦相敵也嗟哉歌曲文章咸出一理也暇中詳覧再惟批擲何如上魯峪孟明府請文廟八佾舞書孟思竊惟宇宙間𤣥奥而難知浩博而難定雜沓而難議者莫如樂焉聲音與政通律卦相經緯風候相流通非至聖上智之明莫能觧故曰知之難文之中有詩有噐有人有節序有變度一事紕繆不可謂備而盡羙善故曰定之難聖人者履禮樂樂乃能制作聖人者去而後世無聖人之徳又厯諸儒勦説臆見補綴搜剔殘缺失次而欲釐正而整齊莫有依據故曰議之難為後人者正宜精思以究其理問學以博其文考索以存其物未可輕為去取而有所定而議也矧先聖為禮樂之宗文廟為禮樂之地又可易易議耶在昔吾濬大祀未能備軒縣之樂八佾之舞也有賢尹劉侯者乃制噐備儀燦然可觀用之既乆噐物殘缺人事怠緩頃有議者乃舉八佾而刪去之而獨存夫聲夫樂者聲音之謂也聲以頌之容以彰之而後聖徳可以彷彿而知故樂之中而舞為多樂師掌六舞舞師為教小舞帗舞羽舞皇舞旄舞内則十三學樂舞勺書有𦙍之舞衣大胥春入學釋菜合舞月令仲春上丁習舞春秋考仲子之宫始舞六羽古人於大祭祀有備樂必有備舞非獨以榆揚聖徳亦所以顕儀文而風教化也然則舉祀而備樂備樂而去舞有大不可者三不成禮者二何也夫舞之廢學雖乆然八佾能存則入孔庭而執事㳺泮宫而助祭雖未能動蕩血脉流通精神而亦得之八佾之形容乃爾惟舞之不存也故雖晋世大儒以武庫名者而謬以六律為六人一列必服䖍之辯傅崇之議而後知為六人也况於後進士類又安知八佾為何物哉不可者一也素王之庭得用八佾者亦以見後代崇聖重道萬世無窮王祀之意舉而廢之獨拜之奠之獻之而已亦何異於釋老之祀百神之禮者非所以昭異典殊大祀不可者二也周官大胥正舞位小胥廵舞盖位則鄼也所以為綴列則佾也所以為行治民勞者鄼逺而佾寡治民逸者鄼短而佾多故曰觀舞足以知徳今八佾盡去行綴冺絶是大聖無徳可舞而士類莫可觀矣不可者三也議者必以人冗而亂近於戯物敝而缺近於䙝是猶見賛導者口吃而麾去陪祀者不齋而謝絶之其殘其缺不已甚乎將孰與為祀不成禮一也夫舞之不飭而去舞茍追蠡而遂去禹鍾害金而遂去周鎛石不和而去石絲不調而去絲空庭對越而獨奏夫竹匏土革與木亦何以為樂亦何用君子而有正樂功也不成禮二也若以徒用殘缺無益感格不如勿用然則奏之者宫必可以動君商必可以召臣角必可以為民徴必可以理事羽必可以感物必素女之瑟可以召風雨必䕫之石可以舞百獸来鳯凰瓠巴之絲可以仰六馬伯牙之桐可以出㳺魚鄒子之管可以變陽和生谷黍而聼之者必師曠必州鳩必季札以是律之而後舉樂則宇宙之樂不數作而已寜可終行哉故樂者和也聲和形和氣亦和矣仲春丁届願如漢制召成童者而理樂以備濬邑文物之缺使後来者知存羊之意斯正樂功也語曰如其禮樂以俟君子俟執事也思不通大體輙露蚩鄙上之憙事小吏俟進止與康徳涵修撰論樂陸深何栢齋曰今世詞曲與古樂同此言有理頋曲折細微古今湏别爾何者古樂主聲詞所以譜其聲也孔子所删刪其不合於管弦者如素絢不錄是已謂之為逸詩者非也惟聲最易亡三百篇之聲未及漢己亡今特傳其詞耳漢樂府名新聲故詞難詮次新聲又亡至魏晋之詞難通觧而聲又亡後周得江左樂工至隋唐聲又亡唐詞多今律詩而聲又亡宋歌詩而餘聲又亡至金元時曲子盛行今所傳者南北調二聲在耳謂即此是古樂深未敢信也大抵古人審聲以選字然後鍊字以摛文後世先結文字乃損益律吕以和之去元聲逺矣恐非古也即今詞曲論之亦有聲意二端聲一定而意無窮凡聲急處是欲趕板意緩處是欲合索盖有限以度腔調絲在指撥遲速惟意若明皇遲玉笛以合霓裳是已是故聲傳節拍意傳義理此感通之妙古今無二謂即此是古樂深亦未敢信也舊傳黄粲章蜚等作傳竒俱合錬鍜人才意所以鼔舞人精神不倦此却與詩之正變合不屬義理宋儒所釋正風變風大雅小雅是剰語也深行旅疲憊兼老病廢忘漫浪及此何當面質為樂願承教明文海巻一百七十三
