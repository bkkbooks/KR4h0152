body:
  text: 明文海卷一百七十四餘姚黃宗羲編書二十八論史與王待制書徐一夔前年冬執事自漳州被召纂修元史去年二月道過錢塘時僕亦自天台襄事而還天遂良覿邂逅於候潮門憧憧往來之地握手道間闊乃執事以使者催促之亟僕亦不得從容聼教不勝怏怏分手之後僕以連歲奔播之餘生事寥落且有寒濕腳疾之苦還適海隅覔一館榖之地聊用養疴旋聞文佩至京擢居次對之職與金華宋公同領總裁之命歆艷歆艷今上甫革元命即取十四帝一百六十三年之事修成一代不刋之書所謂國可滅史不可滅者於今見之甚盛典也而執事拔自常調用稱其材然亦不可不謂之千載一遇去冬有一人來自京云置局以來未滿一歲自元太祖至寧宗一十三朝一百二十七年之事悉已本據實録修成上進局中秉筆之士或已授官或已還山去矣獨順帝一朝三十六年之事以無實録可據今遣使者搜訪故都圗籍列郡文移有關於三十六年之政體者俱收並録以備採擇足成一代之書邇者縣吏踵門傳致浙省官僚之命云朝廷以史事見徴蓋以此也且以執事以僕為善敘事薦之當路夫為總裁薦人以預纂修此固其職向者道語之時執事不以僕為不材已欲引而置之纂修之列僕固嘗敷露情實以辭之矣今執事又何為而有意於區區不材且病之人也竊嘗思之近世之論史者以為莫切於日厯日厯史之根柢也自唐長夀中史官姚璹奏請撰時政記元和中韋執誼又奏史官撰日厯日厯之設雖曰權幸用事姑以是為創藳之具其法以事繫日以日繫月以月繫時以時繫年猶有春秋之遺法而起居注之設亦專以甲子起例蓋記事之法無踰此也往宋極重史事日厯之修必諸司關白如詔誥政令則三省必録如兵機邉事樞庭必報百官之拜罷刑賞之與奪臺諫之論列給舍之繳駁經筵之論答臣僚之轉對侍從之直前故事中外之囊封匭奏下至錢榖兵甲獄訟造作凡關於政體者必隨日以録此日厯之所以不可忽也然又慮其出於吏牘未免訛繆或一日之差則後難考定一事之失則後難增補此歐陽公所以猶慮日厯或至遺失奏請歲終監修宰相點檢修撰官日所録事有隳官失職者罰之其於日厯慎重如此日厯不至遺失則後日會要之修取於此此宋氏之史所以為精確也僕之所陳因執事之所熟知有不待於贅説者而僕自有知頗識元朝制度文為務從簡便且聞史事尤甚踈略不置日厯不置起居注獨中書置時政科以一文學掾掌之以事付史館及一帝崩則國史院據所付實録而己尚幸天厯間詔修經世大典虞公集依六典為之一代之典章文物稍備其書止於天厯而其事則可備十三朝之未備前局之史既有十三朝實録可據又有經世大典可以參稽一時預於纂修之士凡若干人餘人雖不盡識如胡仲申陶中立趙伯友趙子常徐大年輩又皆有史學其成此十三朝之史不難矣今元順帝一朝三十六年之事既無實録可據又無參稽之書惟憑採訪以足成之竊恐其事未必核也其言未必馴也其首尾未必貫串也雖執事髙材卓識提綱挈領有條而不紊有如向之諸公或受官或還山既各散去而欲不材且病如僕者承之於後誠恐不能化臭腐為神竒以副執事之意有司不容見辭逼迫上道舟至嘉興驛賤疾大作行步不前謹令侍者奉狀上逹左右乞賜矜察言之當路别求有史材者成此盛典不備與李西涯論厯代通鑑纂要謝鐸夫法古求治固聖王望道未見之盛心稽古陳謨亦人臣納約自牖之素志而諸老先生乃以編纂之任分委某等此又古者大臣以人事君之義某雖駑下敢不黽勉從事竊嘗聞之朱子之言曰古史之義可見者書與春秋而己春秋編年通紀以見事之先後書則每事别記以具事之首尾蓋當時史官既以編年紀事於事之大者則又采合而别記之若二典所記上下百有餘年而武成金縢諸篇其所記載或更數月或厯數年故左氏之於春秋既依經作傳而又别為國語以記其事亦此類也某愚竊謂今之纂要曷勿先為編年略如春秋左傳之例而又每事别記以倣佛書與國語之例庶幾統緒可正事體不遺蓋統緒莫大於創業守成而事體莫要於知人立政一覽之餘誠知厯代創業之艱難與夫守成之不易凡其統緒所在孰為正而可法孰為不正而可戒某君以用某人行某政而治某君以用某人行某政而亂邪正治亂之間惕若覆車之在前儼乎髙山之可仰則所謂宏綱要義足為鑒戒可以俾益宸聰恢𢎞治化者端在是矣若乃編年之書蓋必以皇極經世為例而統之分合則又不能不取例於綱目也蓋綱目於吕后新莽之年皆冠以甲子而分書之當其時天下之統未嘗不合於一特賊后篡臣不可比於正統故不得不分書之耳他如帝在房州分書武后紀年之下而統系所在皎若日星此史家所宜奉以為圭臬者也昔人嘗推亡秦以為閏位以其強暴并吞非若漢唐宋諸君之猶有志於救民者也秦既不得為統之正而司馬晉楊隋之篡竊弒逆亦新莽之流亞耳又可以上階諸君而例以正統豫之哉此雖綱目之所已書而義理無窮參之後賢之論恐亦未必無可議也又孔子刪書斷自唐虞蓋以洪荒世逺不可考信而伏羲神農黃帝繼天立極開物成務之功澤流萬世凡有血氣者所不可忘故於易繫下傳又推言之是皆聖經之所紀載孔子之所嘗言者也孔子萬代帝王師孔子不言誰復敢言之哉茍於孔子所不言而復言之以是而求治以是而陳謨亦多見其惑矣某愚以為今日之纂要欲與三皇五帝始合亦斷自伏羲炎黃庶幾上不失易書之指而近亦經世稽古録之遺意也論修正宋史書周敘某再拜廬陵建安臨江江陵列位大人先生台座前敘聞史書之作有司馬子長班孟堅之學識世業而後紀載之體備有司馬溫公朱文公之道德位望而後去取之義精蓋史籍不因紀載則無以知一代始終政事因革自非其人學識優世業專豈能書事竒偉成一家之言義例不審去取則無以存綱常扶世教此非其人道德隆位望尊豈能合天理人心之公祛千載蔽錮之惑此誠不易之至論也然自漢以來史學相承不啻數十人惟此三四君子足以當之者豈無由然哉子長孟堅所作得三代前漢盛明之代足以馳騁其詞鋒溫公文公所作得厯代全史之文中或書事失當足以褒貶其是非班馬雖非溫公比文公又非諸公所可並稱但以作史而論實本於其學識世業道德位望能各有之故於其身有無窮之譽於史有不刋之功焉敘竊觀宋遼金三史前元至正初始修當時修史諸臣學識未裕道德未隆既鮮世業之垂復無位望之重其書義例多舛又不以正史歸宋而分為三且列宋於遼金之下揭文安公歐陽文公時司總裁之寄不得不任其責但在當時局於勢有不能耳惟史臣王理輩首議統紀不合諸儒有識之士莫不相與上書爭之而不能得理復著三史正統論推明修端之言欲以遼金為北史宋自太祖至靖康為宋史建炎以後為南宋史不過遷就時議曲加折𠂻非盡至論然亦未之從三史遂流傳至今元季四明陳子桱修通鑑續編遂效文公綱目之義一以宋為正統而附見遼金之事故雖元滅金夏奄有中國而亦繫於宋下以明天命之未絶周伯溫序之曰地有偏全而統無偏全勢有強弱而分無強弱誠哉斯言可謂得去取之公矣但其為書乃編年之體而一代紀載全書未有釐正之者且遼金二史板帙簡省書坊尚存宋史繁多板本復毁散在四方甚少至有號稱為儒沒世不及見者不亦重可嗟惜哉夫有大一統文明之盛世必有千載相遇之君臣而後制度文為可以折𠂻至當一定之論祛除天下百世之惑殆亦天啓之而待乎其時畀乎其人非偶然之故也洪惟我聖朝混一疆理振古未有文明聲教比隆唐虞四聖相承六十餘年其間制度文為多矣而宋史一書獨未刪定豈非天之有待於今日乎方今皇上緝熙聖學崇尚文治即位以來屢有述作左右元老大臣咸盡贊襄經綸之美誠所謂君明臣良曠千古而一遇之時也敘願於此時上啓聖聼以三史書因其舊文重加編纂以宋為正史附遼金於其後定名而正統别嫌而明微伸前代未愜之論垂萬世史筆之公如沉霾積隂一旦青天白日為之開豁而八方仰照萬物吐氣孰不鼓舞歡忭哉遂俾板刻流傳播於四海人人得覩宋朝一代之全書其為世惠又何如哉且世之作史者患其朝代事迹不足暴其善惡動人耳目以垂勸戒并無可折𠂻之事以寓筆削故其文或鬱而不彰又患秉筆者才氣卑弱言意淺陋無髙簡竒傑之文足以啓人誦習故其史遂泯而不傳敘觀宋有天下三百年明君賢臣偉烈俊功前後相望禮樂教化之盛衣冠文物之隆上追三代逺過漢唐其中昏庸憸佞禍根罪首載在編簡亦不能無其朝代事迹誠足以垂勸戒又因元世列於三史不協公論宜折𠂻而寓筆削此不患無可編録之事也伏惟列位大人先生俱以儒術發身遭逄盛世厯事三朝眷遇隆厚位躋台衡望重山斗秉筆論思閲三十年有子長孟堅之學識世業而顯榮則過有司馬溫公之道德位望而知遇則優其文章髙簡竒傑皆足傳世而垂後此不患無刪定之資也若因顧問之暇從容建白以此史重修且遴選文學宏博之士共加校理用班馬紀載之體倣文公去取之例刪成信史垂示萬世非特知宋一代始終政事因革其為存綱常扶世教豈小補云哉則夫無窮之譽不刋之功又豈昔人所得專美哉敘拙訥不能面既敬用奉書敷露鄙見惟髙明恕其狂妄之罪特賜采納幸甚不宣答吳克復論宋史柬柯維騏昨承手札見示拙著儒林傳吕東萊林艾軒真西山胡文定陸象山宜入道學不可與孫復楊萬里陳傅良范沖朱震鄭夾漈同列反覆讀之知吾子尚論古人良有獨得非如世俗隨場談好醜者敢不欽服顧僕之愚見蓋亦有説僕於宋舊史雖多增損然有當於理何必改更道學之目前史所無創自宋史重道統也吾子謂其以道為學竊恐不足以盡之自文武周公以來傳斯道者曰孔曽思孟豈不以六經學庸七篇仁義有繼往開來之功乎有宋周子太極圗説通書張子西銘正蒙邵子皇極經世程明道定性書異端辨伊川顔子好學論易春秋二傳悉發前聖所未發可以上接孟氏之緒至南渡朱考亭集厥大成張南軒為朱同道友故並列道學他不得而濫與也程朱諸門人各附其末非謂人人得其傳蓋徴程朱諸源之所漸耳禮記仲尼所稱儒行非聖哲何以與此後世學者雖希之而未至亦儒之徒也然則儒林豈亞道學直以吕東萊諸儒之講明著述較之周程張邵朱子稍不逮况陸朱之學不可強而同乎孫復以下數君子亦卓為世表靡容輕議止齋不幸以文章知名即其出處交逰文定或有慚色閩中廖世昭撰一統志略序我莆人物只鄭夾漈一人而不及艾軒斯固非定論要之夾漈與艾軒伍不為非倫劉彥翀劉致中並朱子及門西山似當讓地道學不列二劉則不得及西山矣大抵舍道而為學弗可以語儒舍仲尼所為儒弗可以語道僕所謂道學者兼傳道而言若謂以道為學則宋之名臣名儒何限設所學不以道胡能成名耶道學儒林循吏文苑相次擬孔門四科而首道學抑循吏則正舊史之謬者也世之變然後有烈婦有忠臣德之薄然後有孝義有卓行道之隱然後有隱逸故居列傳之後且文苑諸人一切文行相副若苐取其文則吾子所謂行實文虛何説之能解林巽峰僑居相邇想得頻晤出此一商如何不宣與華修撰子潛論修史書陸粲得手書知奉明詔將重修宋元二史甚盛舉也粲也聞之君子曰班固死天下不復有良史矣魏晉而下古意寖微然其辭之鄙近猥冗則莫有甚於宋元之為史者夫自孔子修春秋猶援據百二十國寶書馬遷為史記既紬金匱石室之祕又旁采羣籍以就之故凡有事於史不先泛觀博取而能成一家言者未之有也今二代之史乃獨據其當時所謂實録者云爾而實録所據又不過諸家行狀碑志之屬行狀碑志之辭能盡善乎是非善惡能盡公乎乃至全篇載入不復刋削如元史趙孟俯傳曽祖某宋某官國朝贈某官父某贈某官直當時志文中語耳此類頗多姑舉其一又不問其人何如凡階級稍崇者輒為立傳其間直敘官職遷轉而事迹寂寥如一由狀然故其書卷帙雖數倍於前史而文辭乃無一篇可與陳夀以下諸人爭衡非但筆力不逮亦以紀載過繁難於撿括故也其他紕繆又不暇悉數今必痛掃去之自立機軸先廣開獻書之路求諸野史小説雜傳記詳核其異同之故凖司馬公通鑑考異例為一書使統體既定然後下筆大抵以正史訂雜書之繆以雜書禆正史之闕凡其人之碌碌不足傳者事之瑣屑者奏疏之冗長而空言無實者皆略去之期於繁簡適中是非不謬而已若祗用舊本竄易首尾姑以了事竊恐後之議今猶今之議昔曽不若姑仍其舊之為愈耳然二書體大自非在上者優假嵗月無求速成而諸君子當事者能任為己責不肯虛過日時則未易為矣至其文體且當以平正通逹為主不必如今之為古文者務為艱深詭異之辭反使事迹鬱而弗明此最大忌也當聖明在上垂情述作諸君子遭不世之竒會豈徒受大官酒食藉此為升轉之計茍且塞責而已哉兄何不與文升輩二三同志以此意昌言於朝使二史之成追蹤班馬為千載之一快也時難得而易失竊重為諸君子願之惟弗以為迂而俯聽之受賜多矣與魏古渠學博論史書許孚逺去冬臘月忽枉長者之車出思默定宇二丈書見示屬為足下商訂史書謬承重託不敢遽為遜避僕謂儒者著作當以孔子為法孔子刪書斷自唐虞存其大經大法以垂訓萬世其他事固不能詳已獨春秋一書因魯史而修之衰周二百四十二年之間王政不行刑賞失當人欲肆而天理滅故孔子特為著其是非得失以正人心左氏一傳則春秋之事實存焉孔子沒而史法亡矣漢司馬遷有良史之才無孔子春秋之志獨以其博覽多聞兼之幽囚發憤作為史記其文詞竒邁膾炙古今然是非頗謬於聖人至其析為帝紀年表八書世家列傳諸體亦不敢過為組繪粉飾其間時有缺漏矛盾亦後人所見若帝紀起自五帝但以家語戴記所稱五帝德為據五帝以前不復逺引遷可謂灼然有見者也其不學孔子書法何也為紀傳之文猶易為春秋書法甚難一字豫奪嚴於命討非聖人不能為也故愚以為遷史非有春秋之志也然亦不敢僭擬於聖人也班固而下史家類祖述馬遷不復有春秋之體至宋司馬溫公勒為資治通鑑體近春秋之編年然亦未嘗有書法朱文公先生復取其書釐為綱目有春秋書法矣乃因通鑑起周威烈二十三年春秋以後威烈以前尚缺七十餘年不知溫公文公二先生何不直繼春秋而作也其後金仁山先生作通鑑前編又起自陶唐氏蓋博採詩書以來唐虞三代之事暨於春秋戰國槩銓年嵗繫之書法以上附春秋下冠綱目宜可以補朱先生之所未備然唐虞嵗月自書傳之外逺不可考而以他書證定殊有未安春秋舊文仁山併為裁削其間又似文公之所遜讓而不敢者若夫唐司馬貞作三皇外紀以補馬遷之帝紀髙安劉恕作通鑑外紀起盤古至髙辛以冠仁山之前編則皆漁獵諸子百家之談信為上古希濶之事以孔子之神聖馬遷之多聞且在千載之上者有所不能知而今皆一一筆以傳之恐其不得為信史矣伏讀足下所編史書起自伏羲終於勝國書法倣於春秋綱目而敘事取於遷固諸家既詳編年復兼紀傳旁搜逺覽釐枉訂訛竭精勞神十五六年於此可謂宇宙間曠舉之事僕平生竊有志焉而未逮者也但觀帝紀所書羲農事迹傳之外紀别有增加恐非的確堯舜紀年同於前編似亦過信仁山之見史記列傳托始伯夷近代儒者猶謂叩馬而諫之事經傳無稽不足垂信今自女媧氏共工以及唐虞三代諸臣無不立傳博則博矣恐未核也孔孟聖賢特為道學傳當矣而秦漢六朝唐五代千有餘年之間並無一人列於道學至宋而始傳道學復傳儒林宋固多賢矣豈從前儒者在儒林亦無足齒耶封建司天輿地職官四者誠為國家大務别為論次以並於帝紀列傳似矣而四者之外如井田學校兵賦刑法河渠諸務不為編纂反疑闕略管窺之見不若以前數者總附見於帝紀之為妙也全史之體止於勝國未及當代此未見國史亦有所諱避而然及輿地職官二司詳載本朝制度恐於體式亦有所未安也如此數端據足下首二三論評論其大都若此至於秦漢而後所書君臣政事豫奪取舍權度得失未嘗遍閲不敢輕議竊以為足下此編尚屬大醇而小疵將遂繕寫成帙奏獻明主使付史館垂鑒將來則不可不加校正之力且夫編年紀傳自是史家二體若編年而兼紀傳是以春秋綱目之筆合左氏馬遷二長為力更難成書非易妄意編年既在帝紀所載事迹不妨更加詳核以該括其餘若乃古今聖賢豪傑忠臣孝子貞節隱逸之流其最顯著足為百代鑒法者不過數百人而盡雖帝紀之外别有列傳似亦無妨然不須每代如此之夥也願足下更思而裁之何如孚逺力不能任贊襄之役漫為疑難辨駁以緩成功懼且得罪然足下不逺千里而來虛心咨訪誠不敢虛且亦萬鄧二兄同心見托之意足下學本淵博用力已深一覺悟之間略為竄定不過數月之功而可矣亦非如來諭劉子玄五難成之説也僕向在荒迷近入墓間小樓專事靜攝足下何時北征尚能假棹清溪之上一面談乎臨楮不勝惓惓明文海卷一百七十四
