body:
  text: 明文海卷一百七十五餘姚黃宗羲編書二十九字韻與徐大章先生書趙撝謙竊謂西漢以上著書者皆不藉序文蓋其自信有可必傳者更不待他人贊奬而後取信於人也三國以來既不能自信而無疑而人又不足是非於其間必待有名位在上者倡之也其或不布於名位在上而後為人竊為已物者亦有之如郭象之莊子注宋齊丘之化書是以其書雖無足傳因序文而名於後者亦或有之某之六書本義雖未敢自信其必傳然厯覽前人自許祭酒以來欲明之者不啻數百十家紛紛藉藉非不各自以為盡美盡善然卒無攸主者蓋皆未明乎六義而未得其真凡例也鄉上金陵得以此書見知於執事即許序之及東還復見而執事尚抱不豫遂弗敢固請兹因所親詣杭敢以復請成人之美循循善誘君子之道某欲執事必一序者以執事一代文章之砥柱斯文之宗表而某又生於東南故也顧字書雖一小藝然用之甚大該理甚博嘗謂水火之生人不可一日無者而人不汲汲然者以其隨取隨足而衆人昧焉惟聖人於易坎離始終明之字書之於世用亦若水火顧不察耳夫以沈約所謂韻書綴於世間草創略無次第猶至今用於人人而况實有通之者乎蓋聲音之在造化有一定自然之序如祖父伯叔兄弟子孫生生之道居處運用略不可紊約未之知世習弗疑況痼不容針砭實可慨也某甚有志於此而未暇也以執事見知故間及之答顧希武書趙撝謙某白草廬吾兄足下月來得廷慎書自鍾離數日來得季則書自西陵今又得吾兄書三四十日內連得三故人書喜何可言近時朋友之道缺絶何有以規戒講習為久逺計者聚則團坐嘲謔散則煙飛雲斂走於此而亦不免相與逐逐不然自謂迂腐而不合今得書言欲修韻書此不刋之盛舉也勉成之詳審之嘗謂韻之一書如鹽醯稻梁人所不可缺者經史外餘書如魚肉脯醢羊鹿狗鱉有嗜者有不嗜者至如鹽醯稻梁凡圎顱方趾者莫不賴焉雖然其書始於晉之江式成於梁之沈約以厯陸法言孫愐丁度蘇軾兄弟毛晃歐陽德隆劉孟容秦昌朝黃公紹至本朝諸老或修或注或增或減或分或合或次第之或譜音之人人自謂光前絶後然率多疵厲瑕垢吾兄此舉亦無乃踵其武乎詳審之蓋此書非精六書之義逹四聲七音之妙知造化之本原了訛俗之變易者未易與之言也走每讀經史力倦神疲則偃卧於床手執韻書仰而觀之見其疵瑕百出則拂然起坐噫嘻罵前人者亦實有之雖自知暴讀蓋發憤情至自不能不然耳亦欲更正次第刪繁却誤一歸本義以掃古今之謬所恨力隻工浩兼之家纍病攻而未能也何幸得吾兄亦有志於斯焉詳審之勉成之又安知千百年後無暴讀發憤如趙古則者勉成之詳審之韻補附去易林為微仲所假未還走之篆書藝不志此欲之何為婚事始畢乃蔣尚之先生之姪也頗淑慧未知能繼其往否伻回勒此不具偹又答顧希武書趙撝謙某奉復草廬先生執事莊周云逃空寂者聞人足音跫然而喜况古則憂困牢落荒林窮谷之間而得執事所遺長書及所注八卦三復纍日若飢渴三日而得膏粱酥酪非但喜之而已實有得於心腹肺腸也執事尚奚自抑之過而奬我之厚耶夫自抑寧過而奬人寧厚雖君子謙恭之道在執事之於不肖宜面命之耳提之猶有未至則踣擊之可也何奬我也若是古則不揣妄自矜大六書作本義已訖然出以示人皆不能貫首尾力看數紙以規辨其是非否則但見譽而已何有如執事髙明妙逹心誠意專者哉然猶奬我若是終益我之過云爾有便幸易以教我祝囑執事言易注有與傳義異而恐取罵於人者是何傷哉且天地造化其變無窮道理亦如鳶天魚淵各有所得言其所得而已尚何拘之哉嘗泛觀諸家著述雖瑩白如程朱亦未必無少礙雖疏誕如楊陸亦未必無一長况執事沉潛有年覃思既久博參諸家發揮本義又何謙抑之有而畏人之妄議也哉雖然以不肖觀之文王之彖周公之爻孔子之翼片言隻字皆從宓戲六畫流出蓋六畫之卦旨理明微奧惟象最著故假象之著者以明理之微奧者耳是以大傳曰易者象也可以一言蔽之矣朱子雖疾取象太鑿者然亦曰看易若靠定象看便滋味長若只懸空看也沒甚意思執事見示八卦旨理則已明顯矣恐於説象處略有不足可憾幸見教餘容傾蓋以罄不莊與吳鼎儀論韻學書彭華辱同館從事偶及韻學足下退而以書見諭破區區之愚誠懇懇勤勤非愛深者其克爾耶朋友講論切磨之道缺絶久矣不意復見足下也然所諭終與僕私指謬異請略陳固陋夫有聲而後有字合字與聲而後有韻書韻也者類其聲之叶者也使古韻盡存則古人字音固可盡得矣古韻至魏晉時尚多知之宋齊而下浸以湮滅然有博雅好古之士若唐韓退之栁宗元白居易宋歐陽永叔蘇子瞻子由猶能深考古韻而用之矣夫謂之古韻則古人字音與後人有不同明矣詩三百篇強半出於閨門里巷其所韻非當時語而何且一字而有兩音者如左右之類三音者如樂惡之類四音者如行與澤之類古今人皆然何獨謂明鳴二字古人未必讀為芒特釋韻時強轉其聲耶足下謂明鳴等字今人未嘗讀芒古人之音不應大相絶如此夫沈約距今才幾時而今之韻于支與微之類合其二而為一麻與遮之類分其一而為二其不同已如此而况數千百年欲其一一若自一口出得乎如今人讀服為房六切而服見之於詩者皆當為蒲北無與房六釋者古人未嘗讀為房六也今讀慶為丘正切而慶之見於易詩者皆當為驅羊無與丘正釋者古人未嘗讀為丘正也左傳以皮叶多坡以皮得聲則皮初讀為蒲波切轉而為蒲麋耳顔延年以霾釋施霾以貍得聲則霾初讀為陵之切轉而為亡皆耳莫之取義日在草中也後人乃妄加以日字臺之取義築土堅髙能自勝持也後人乃訛轉為苔音若此者未可遽以一二數姑就足下所及者而言之夫古今人不同多矣試以文韻語觀之字自倉頡古文變而為籀篆又變而為小篆又變而為𨽻又變而為楷為草以今之草律石鼓之古文吾不知同耶異耶詩自三百篇變而為離騷又變而為五言又變而為七言又變而為近體為小詞以今之詞律雅頌之古句吾不知同邪異邪凡古之禮樂制度後世廢易殆盡所幸存而未泯者賴有載籍之傳焉字之音韻亦猶是也於今可見古人音考者獨賴經傳中韻語耳足下因古人之釋韻非今人之所讀遂謂古人強轉其聲何溺於今而誣古人也以意見而遂譏僕之張喙何自信之篤而謬僕也僕每觀足下默默自處誠以為無可語者若僕環視其中蔑如也故每有所疑輒以質於髙明夫豈好辨哉誠惡夫坐井觀天穴牖窺日者之自小也惟足下不卻棄以僕之言稽之古察之四方訊之一二博古之士求其至當歸一之論以賜教益則幸甚幸甚答李仁夫論轉注書楊慎逺枉書札下問假借之字有限轉注之法亦有限耶凡字皆可轉邪走近注轉注古音一書悉之矣然逺近諸君子觀省者皆以尋常韻書視之未有琢磨陶冶洗髓伐毛至此者執事其有意於啓誨之乎敢無以復蓋轉注六書之變自沈約之韻一出作詩者據以為定若法家之玉條金科而古學遂失傳矣故凡見於經傳子集與今韻殊者悉謂之古者轉注也古音也一也非有二也韓昌黎多用之方樊諸家注之曰古音也至宋吳才老深究其本原作韻補一書程可久又為之説曰才老之説雖多不過四聲互用切響通用而已朱子又因可久而衍其説云明乎此古音雖不盡見而可以類推愚謂可久互用通用之説近之類推之説可疑也凡字皆有四聲皆有切響如皆可通也皆可互也則為字為音不勝其繁矣原古人轉注之法義可互則互可通則通未必皆互皆通也如天之字天忝舔鐵是其四聲也他年切之外有鐵因切是其切響也其音忝舔鐵三音皆無義而不可轉鐵因之切則與方言叶故止有切響可通而四聲不互也日之為字有人忍任日是其四聲其音若音熱是其切響音若者日出於若木故毛詩之音叶之音熱者日本陽精而景炎故楚辭之音叶之今楚南方言猶呼日頭為熱頭是其證也四聲之平上去皆無義故不互也又如應之字應影映役有平去二互而無上入中之為字中腫仲竹亦如之此類皆推之則窒矣詩之叶音如易之卦變六十四卦可變為九千四十六卦而孔子彖傳取卦之義者不過訟隨以下十餘卦蓋變而有義則取之無義則弗之取也考之易之彖象皆韻而其所叶無異於詩詩十五國不同言語而叶音無異也楚逺在江漢數千里外而叶音無異於詩也漢人賦頌史漢敘傳揚雄太玄焦貢易林其取韻又何嘗異於易詩楚辭哉至於宋人則不然歐陽二蘇王介甫皆深於音韻而賢者過之自信謂四聲皆可轉切韻皆可通其所推衍枝葉出於易詩楚辭賦頌玄林之外不啻十之五六如其説也則盡南山之竹不足為其書窮萬籟之音不足為其韻矣所謂博而寡要勞而少功亦何取於古音哉大抵宋人之學失於主張太過而欲盡廢古人説理則曰漢唐諸人如説夢説字則曰自漢以下無人識解經盡廢毛鄭服杜之訓而自謂得聖人之心為詩文則弗踐韓栁李杜之蹊脛而自謂性情之真義理自然也至於音韻之間亦不屑蹈古人之成迹而自出一喉吻焉今舉其略如園之音云鴨之音鷁貧之音便直之音竹求之於古則易詩楚辭所無也求之於今則方言謡俗不叶也如其類而推之則當以呼天為鐵名日為忍矣可乎不可乎故豫作古音略宋人之叶音咸無取焉為是故爾近日宋學王相古學休囚程文之士一經之家尊宋人比於聖人習語録謂之本領一聞有言議及宋人弱者掩耳強者攘臂以旁搜逺紹為玩物喪志以束書不觀為用心於內聼豫此言能無夏蟲語冰乎尚賴一二汲古之士如執事輩此道尚不墜也執事又謂欲作一序見執事之得才老之失慎也末學豈敢望古人而亦豈敢與古人較得失哉但私心竊病才老之書多雜宋人之作而於經典注疏子史雜字尚多遺逸其顯而易見者如左傳之鞠音芎毛詩之嘻音戲古昔且然其它書之遺漏可知矣譬則縑縠之未裁麴糵之未釀也謂尺刀之餘為綺麗而遺機杼杯勺之餘為酒醴而遺甕盎可乎豫之所注詳於經典亦猶通鑑之前編其汰宋人者猶文章正宗韓栁而下無取也一得之愚蓋在於是亦使好古者勿惑於類推之説而自取不類也其才老所取己備者不復載間有復者或因其謬音誤解改而正之單聞孤證補而廣之故非勦説雷同也或曰子之古音遽之合昭韻嘗取王岐公銘詩矣下是猶一二曷嘗不取宋人也豫曰昭遽合韻祖於楚辭是以取之用是見豫非不取宋人也不取夫宋人之不師古也凡著書之大凡如此近接月塢張子尤數數是書豫語以近世知崇古文而不知崇古韻猶清廟之祀去簋爵而用杯盤洞庭張樂廢葦籥塊桴而進琵琶筝􅌙也亦必不稱矣或時於賦頌用韻止以意轉小注一叶字問其音解瞪然不能答也是不以為鉤深致逺之淵而以為御窮劑急之府也豈非宋人之説誤之哉張子欣然擊節謂子此言惟中溪可與晤語惜也間以山川阻以雲泥何日明燭散帙如對點蒼坐鶴亭時乎臨書於邑與楊用修太史書陸粲粲自羈貫時誦公文章已深嚮往及壯登仕與令弟用德為同年又同入館每從詢公動定之詳以不獲侍教為恨其後自諫省謫都勻間於一二士友家覩公手書滇中諸作良用歎服歸田以來始得轉注古音略讀之為不忍去手竊謂此義自漢迄今學者皆尊信許氏之説莫覺其非雖趙撝謙嘗言之而未盡惟公卓然有見於千載之下獨持偉論成此巨編其曰中夾漈之膏肓而起叔仲之廢疾者雖自謂可也甚盛甚盛苐其間猶頗有足疑者粲也過不自量嘗欲書之以請質焉顧先逹如公以命世豪傑之才而濟以精詣博洽之學論議所及前無古人其著述豈晚末所當置喙是以遲回未敢遽出其説既而思之此書關係至大茍纎微不盡便成千載之憾所謂不欲以疑網墮來晢固公之盛心也不勝愛莫助之之願用敢忘其固陋而卒陳之惟公察焉夫此書既為轉注而作則當依許氏説文之例以字之偏傍為主凡其轉聲皆疏於本字之下庶幾綱舉目張一覽可盡乃今置偏傍而用韻則有難言者矣蓋一字而每韻皆見則不勝其煩獨於一處説之又未能曲暢如後語所稱再轉三轉以至八九轉者今此書能盡之乎令後來者討尋而莫得其源流恐不免有遺議矣此愚之不能無疑者一也謂傍音叶音皆轉注之極此至論也傍音姑弗論若叶音則吳棫韻補具矣其有訛謬闕遺不妨拈出或附見於後如古音餘之比可也今摘取其一二以羣入諸韻則未知其義為轉注乎為叶音乎其他不録者豈盡無足采乎去取之間當必有意此愚之不能無疑者二也古文竒字如東韻之㔮支韻之􅣺虞韻之蓲園者諸篇中往往見之此等蓋不勝紀載誠欲扶微廣異自可搜輯别為一書而以雜之轉注之列則恐非其倫類也與序文所謂匪徒逞棼博纍卷帙者其指得無少異乎此愚之不能無疑者三也其他援證字義或千慮一失尚有可商確者間亦隨文箋注别録以備省覽敬託時川公為之先容然粲猶竊愧懼不敢自安深惟著述之功創始者難而求備之論後出者易矧以粲之譾薄寡聞而輒議及此誠亦僭妄之極矣所敢自同季緒以犯公家德祖璅璅之譏亦恃公曠度髙識不翅能為丁敬禮也如或恕其狂愚貶示可否使積年之疑一旦氷釋則鄙人之幸大矣非所敢望也惟公實重圖之滇載記方謀校刻俟完即寓上舍甥姚某之官重慶便冒牀布此臨書悚側不知所云明文海卷一百七十五
