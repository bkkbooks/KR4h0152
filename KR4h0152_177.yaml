body:
  text: 明文海巻一百七十七餘姚黄宗羲編書三十一技術與星士曾克新談命書馬一龍星士談命反覆其子平五星之説以為人之窮通夀夭皆一定而不移者某詰之曰若所以為人立命者何據曰嵗月日時八字也前此無命乎兩儀既搆五行交併倐忽之間渾為一氣受氣布形萬象森羅雜糅成質體裁各足雖其元苞未脱呼吸在母而造化己成運動由已矣謂此有生焉未也嵗月日時乃不推此而徒求之脱胎之後則渾天貞一之氣反不若破天散淆之精乎星士從古庵先生以来不能對反問古庵古庵教之復先天後天本来一氣生時八字後天氣也父母受精先天氣也由後可以推前得此可以識彼其言誠是但人知桎梏而死不能知桎梏而生者也溟涬兆形十月始足一如珠露再如桃花乾元黙運於内而坤鼎乗於外一呼吸之殊一情欲之感一寒暑之侵一飲食之失其間耗氣奪胎傷損乎三百日之久不知其幾故嬰生而病疾長而夭折皆先天之氣有所不完固耳其脱胎也又安得歳月日時支干生剋與受氣之初無少差殊乎非有太任胎教如文王者其不桎梏而生也或寡矣大抵太虛之中絪緼充塞神寓虚中虚寓氣中萬物得一虚則生盡一虛則滅然神不可測思虚不可捉摸隂陽闔闢剛柔摩盪絪緼中生氣氣中生虚虛中生神造化自然之妙也氣之所聚有厚薄則虛之所涵有大小虚之所涵有大小則神之所得有多寡一實萬分絪緼中原無破綻欠缺雖纎悉覼縷而得之者無不全體充足此一天星斗倒從支干入宫孤虚旺相從其属取之是執噐以索理循象而覊神術之小數耳而况窮其術者又未盡得也何以言命其人持其説復古庵古庵報謝與進士陶希文論葬書童軒承示郭景純論𦵏書一冊凡八篇予讀之其言簡而要其理順而明視他𦵏書膠於禍福利害者大有徑庭矣然有可疑者三有不信者一盖景純之在江左號為博學髙才多識竒字所著江賦史稱其詞氣雄偉以今觀之信然使此書果為景純所著其間必多證事據理而先王𦵏埋制度與夫藝文志宫宅地形亦考求所自未應鑿空架虛而為是無稽之言也矧其文字有不類乎此其有可疑者一也夫列傳所載景純妙於隂陽厯筭五行天文卜筮之術為人禳災轉禍通致無方無慮數千言其末止載景純以母憂去職卜𦵏地於暨陽及為人𦵏龍耳二事而所著有洞林卜韻音義圗譜三蒼方言穆天子傳山海經數書亦無𦵏書八篇世次乆逺口耳相傳其間如蕭吉所撰大抵與景純不殊不知草廬何據以為景純書也此其有可疑者二也且景純為人所葬必背㓙而趨吉必向福而避禍其厯世必欲其乆其門户必欲其昌此固無俟於言也然則何為卜𦵏暨陽卒致雙栢之禍豈謀於人者宻而圗於已者踈耶此其有可疑者三也商書有曰作善降之百祥作不善降之百殃盖以善惡係於已禍福聼諸天不可以探取而或得不可以智計而茍免所為莫之致而至者是也今此書所載本體得氣遺體受䕃乗其所来則貴富而吉昌犯其所害則貧賤而㓙厄使其言果信則禍福不係於天而係於地勢之羙惡也善惡不證於人而證於山形之向背也豈理也哉夫死者之𦵏於地猶生者之宅於家府第者王侯之所宅也廨宇者官吏之所宅也村舍者民庶之所宅也營壘者軍旅之所宅也脱民徙於營壘果能易而為軍乎軍徙於廨宇果能為官吏乎官吏徙於府第果能為王侯乎何也富貴貧賤初非壘舍府第所能移易故也今以庸賤之人欲穴富貴之山以利其福是何異於徙壘舍府第而欲移易其富貴者耶其有不可信者此也故諺有之曰屋下人無福山頭土不靈此言雖鄙實可以破千載之惑属有目疾不能詳書不知足下以為何如𦵏書奉上希檢納萬萬軒再拜明文海巻一百七十七
