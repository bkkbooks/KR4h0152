body:
  text: 明文海卷一百七十九餘姚黃宗羲編書三十三國是答耿楚侗王霸之辨張居正辱華翰并所梓論簡彚編惓惓以奉行德意安民生飭軍政為急仰見公之高明深達治體識時務者也憶昔僕初入政府欲舉行一二事吳旺湖與人言曰吾輩謂張公柄用當行帝王之道今觀議論不過富國強兵而已殊使人失望僕聞而笑曰旺湖過譽我矣我安能使國富兵強哉孔子論政開口便説足食足兵舜十二牧曰食哉惟時周公立政其克詰爾戎兵何嘗不欲國之富且強哉後世學術不明高談無實剽竊仁義謂之王道才涉富強便云霸術不知王霸之辨義利之間在心不在迹奚必仁義之為王富強之為霸也僕自秉政以來除密勿敷陳培養沖德外其播之命令者實不外此二事今已七八年矣而閭里愁嘆之聲尚猶未息倉卒意外之變尚或難支焉在其為富且強哉公今不以僕為卑陋而留心於此誠生民之福也苐須一一核實考成乃可有效若徒騰之文告而已實意且化為虛文矣何如議留入覲正官及澄汰縣令二疏俱屬所司覆行丈田一事揆之人情必云不便但此中未聞有阻議者或有之亦不敢聞於僕之耳茍利社稷死生以之僕比來唯守此二言雖以此蒙垢致怨而於國家實為少禆願公之自信而無畏於浮言也答耿楚侗致理安民張居正丈田賑飢驛傳諸議讀之再三心快然如有獲蓋治理之道莫要於安民究觀前代孰不以百姓安樂而阜康閭閻愁苦而危亂者當嘉靖中年商賈在位貨財上流百姓嗷嗷莫必其命比時景象曾有異於漢唐之末世乎幸賴祖宗德澤深厚民心愛戴已久僅免危亡耳隆慶間仕路稍清民始帖席而紀綱不振弊習尚存虛文日繁實惠益寡天啓聖明雖在幼沖留心理治僕每思本朝立國規模章程法度盡善盡美逺過漢唐至於宋之懦弱牽制尤難並語今不必復有紛更惟仰法我高皇帝懷保小民一念用以對越上帝奠安國本耳故自受事以來凡朝夕之所入告教令之所敷布惓惓以是為務鋤強戮凶剔姦釐弊有不得已而用威者惟欲以安民而已姦人不便於已猥言時政苛猛以搖惑衆聽而迂濶虛談之士動引晚宋衰亂之政以抑損上德矯捍文網不知我祖宗神威聖德元與宋不同哺糟拾餘無禆實用徒以惠姦宄賊良民耳世儒達治者鮮雖勉遵上令而實未得於心所以宣上達下者茍以文具規免罪責而已比見公諸所條布訓辭雖若嚴整而肫肫愛民之意藹然於言外以是服公之高識宏抱非世儒所能及也願益自信而堅持之監軍道裁革為便彭湖賊未必即是真倭但嚴備以待之不必勤於逺也人旋附復拙稿末卷有歸政本末謹附一覽答奉常陸五臺論治體用剛書張居正往丈起山中不一嵗而躋九列僕日夜引領望丈之一至者以丈素有超世之識知僕所以肩巨承艱之心為能疏附後先以共濟艱危也乃讀前後手翰所以教僕者則亦未越於衆人之見而與僕之孤耿大謬也丈前書謂僕處余懋學傅應禎為太過恐失士心後書謂救劉臺為盛德至引文潞公之事以相比今海內簪紳之侣投柬於僕者十九為此言也然皆衆人也豈意有超世之識又知僕所以肩巨承危之心而所見乃亦止此乎古之賢聖所遇之時不同而處之之道亦異易大過棟撓彖曰剛過乎中當大過之時為大過之事未免有剛過之病然不如是不足以定傾而安國棟撓而本末弱矣伊周當大過之時為大過之事而商周之業賴之以存雖剛而不失為中也僕以一豎儒擁十餘齡幼主而立於天下臣民之上威德未建人有玩心况自隆慶以來議論雖多國是靡定紀綱倒置名實混淆自僕當事始布大公彰大信修明祖宗法度開衆正之路杜羣枉之門一切以尊主庇民振舉頽廢為務天下始知有君也而疾之者乃倡為異説欲以抑損主威搖亂朝政故不得不重處一二人以定國是以一人心蓋所謂剛過乎中處大過之時者也而丈乃以為失士心誤矣吾但欲安國家定社稷耳怨仇何足惜乎至於潞公之事亦復不倫蓋潞公所事者長君而其出處去就未必係宋室之安危子方狂妄後生獨持饋錦一事以議論前輩此其失在於不知賢耳故潞公得以包容之僕今所處何時也主上舉艱巨之任付之於眇然之身今權璫貴戚奉法遵令俯首貼耳而不敢肆遐方外裔獻琛修貢崩角稽首而惟恐後者獨以僕攝持之耳其出處去就所係豈淺淺哉彼讒人者不畏不愧職為亂階且其蓄意甚深為謀甚狡上不及主上旁不及中貴而獨剸刃於僕之身又無所汚衊而獨曰專擅專擅云云欲以竦動幼主隂間左右而疑我於上耳賴天地宗廟之靈默啓宸衷益堅信任不然天下之事豈不為之寒心哉自有此譖主上食不甘味寢不安席以痛恨於忌者蓋大舜堲讒説之殄行孔子惡利口之覆邦故去此人以安僕也以安社稷也離明允斷誠理法之正而僕所以懇懇救之者蓋以仰答聖恩下明臣節耳非欲為沽名之事也而丈乃以潞公見諷誤矣僕一念為國家為士大夫之心自省肫誠專一其作用處或有不合於流俗者要之欲成吾為國家為士大夫之心耳僕嘗有言使我為劊子手吾亦不離法場而證菩提又一偈云高岡虎方怒深林蠎正嗔世無迷路客終是不傷人丈深於佛學者豈不知此機乎夫士屈於不知已而伸於知已今海內縉紳之侣為此言者甚衆僕皆遜而謝之乃於丈嘵嘵不已者以丈有超世之見知僕所以肩巨承艱之心者也倘再會有緣尚當刮目相待答李中溪唐順之兄之使閩也一年矣辱以書下問者數四矣屢問而屢無一言焉是亦不免有負相知乃展轉思之竟無所得惟有一事可以少效悃而塞下問之勤者則言之適在此時然亦自度非迂則戅也惟兄亮之而已且夫撫按之權舉劾最重百官之所以勸懲公道之所以開塞其繫於撫按舉劾亦最重然而今世所謂舉劾者僕竊異焉僕嘗備員郎署矣嘗得日聞邸報矣或曰今日某巡撫舉劾奏至矣僕不問而知之矣或曰今日某巡按舉劾奏至矣僕不問而知之矣何也其所舉者可不問而知其必藩臬方面大官也其所劾者可不問而知其必通判縣丞小官也其所舉者可不問而知其必牽朋聯伍不數十人不止也其所劾者可不問而知其必寂乎寥乎才三兩人也如此則是賢者盡大官而不賢者盡小官也則是賢者甚多而不賢者甚少也夫使賢者盡大官又使賢者甚多而不賢者甚少則宜其政平而訟理苞苴不行於上怨毒不結於下天下可以卧而帖帖矣而顧不能然則是大官不能盡賢與賢者不必甚多而不賢者不必甚少也大官不必盡賢而賢者不必甚多不賢者不必甚少則彼舉大而劾小者毋乃大官則足以樹恩而小官無傷於任怨也歟又無乃勢弱者易凌而根固者難拔也歟而其所舉所劾之多與少又毋乃厚市恩而薄引怨也歟如此則人奚得而勸懲公道奚得而不塞也雖然固亦有藩臬方面大官而不舉或反見劾者矣嘗駭而問其人焉則是非能劾藩臬方面大官也亦非其人之果不賢也或負氣倔強不善曲媚者也不然則受人指唆為之快忿者也亦有通判縣丞小官而不劾或反見舉矣嘗駭而問其人焉則非能舉通判縣丞小官也亦非其人之果賢也或多援善鑽最有力者也不然則其親與故也如此則所劾者縱非小官則必負氣倔強與人快忿者也所舉者縱非大官則必多援善鑽與親且故也然則人心又奚得勸懲公道乂奚得而不塞也由此言之為撫按者固不得以能舉人能劾人為榮而必舉劾之不稱為可懼矣今兄之所屬其為方面大官者誰乎其為州縣小官者誰乎僕山澤之人耳其姓名且不知也大官賢乎不賢乎小官實乎不賢乎僕固不知也賢者多乎少乎不賢者多乎少乎僕固不知也而為是多口者亦據素所疑於人人者言之耳然以兄之志剛而識明秉正而嫉邪固必不同於人人矣必能示勸懲而彰公道矣又何藉於僕之言乎然僕之為是言於兄亦非欲兄之不舉大官不劾小官也非欲兄之所舉必少而所劾必多也大官果賢矣或矯而不舉亦私也賢者果多矣或避收恩之名而欲矯之以少舉不賢果少矣或沽澄清之譽而欲矯之以多劾者亦私也雖然竊以為莫如精舉而慎劾則劾者固少而舉者固不得多矣或曰舉劾皆少則是善有隱而不彰惡有微而不屏也是不然矣夫天下中人多而最賢最不賢者少也舉劾所以出於常格以待最賢最不賢之人耳若夫小善小惡則固有考語矣又何慮善有不彰而惡有不屏也故僕以為莫如精舉而慎劾兄意何如一言之獻如是而已惟兄亮之明文海卷一百七十九
