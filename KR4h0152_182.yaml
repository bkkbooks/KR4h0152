body:
  text: 明文海卷一百八十二餘姚黃宗羲編書三十六籌逺上巡撫陳公書田汝成下官無狀承乏兹土吏治民風粗粗涉獵竊抱隱憂欲獻過計言之則似迂愚不言則失智者未明之覩蹇且病訥孤憤之懷誰與抒者顧明公往矣用是忘疏謬而論記也下官所憂非為二三小吏幾微墨守負課程慢期會也乃所憂則長慮一方積弱之弊為梗難支爾今之為貴州者類曰羈縻而治此非高明識治體長者言也乃今所患正坐此爾夫羈縻之令先王所以待異域也貢賦不徴其國朝聘不列其君是以來則修委積之餼去則申疆圉之守視若賔客然禮節弗疏而已若夫要荒之服時享而嵗貢者已有文告之辭征伐之典治之加異域一等矣况不為要荒者乎貴州雖絶逺給繇入稅與內地無異青褐之使交轂而馳非要荒之服也奈何欲以異域之法待之哉善乎諸葛亮之治蜀也曰南中反覆非振法不可其時若馬忠之守牂牁李恢之參帷幄皆以威稜誅鋤豪猾故夜郎終孔明之世不敢稱叛近事若馬煜顧晟亦以殺伐震懾異域異域之民祠而頌德至今不廢未嘗以嚴讎二公也豈非真高明識治體長者哉今夫御馴駟者埀其鞿靮騠駻之騎則重勒而復靷中州之民譬則馴駟也邊陲則騠駻之騎也埀鞿以控騠駻之騎鮮不摧轅而覆軏矣夫貴州右引巴岷左屬象郡南扼昆明之吭以蔽湖襄四面阻險百人盤據官吏出入非兵衛不敢輒行鳥道崛鬱溪谷間之毒草蒙密炎蒸歊臭曽無尋丈之地可以逺眺卒有椎埋胠篋之姦呼嘯跋扈非可走尺檄而械致也又多縵土灌以流泉沃而敏樹故四方流宄亡賴匿命此焉逋藪慮不為土著而胥宇者故其心易動緩之則烏集急之則麖駭非有邑里名數按比伍而尋躡也宣慰安撫長官諸司列壤而守各私其家豪舉鼎立幽明之課不登天府故婪暴者無懲非若中州之吏憚繩墨兢業檢束也夫以孔棘之地雜以易動之民統以無嚴黜陟之官而部刺長吏猶欲一切寬假冀其茍安胡可得也是以魋結之酋睢盱自恣加以逋逃黠桀嗾弄其間箝制官府一有按驗輒揚幟而號曰吏激我變其倒行逆施之事胡可長也國初戍卒二十萬今物故去者十八九矣其一二存者又直以給負擔干掫僥巡之役供行李往來非能彀甲而馳擊刺素練也指揮使而下又率選耎雜伍庸𨽻曽無諳韜略緩急可倚者也夫以緩急無益之將帥不練之兵強而使之雖五尺之童知其難矣是以一有征剿必藉土兵我軍既單土兵益橫始非厚賞不足以賈其行幸而凱旋雖鹵獲載途莫敢詰問何也我固無以加之也其積弱之形非旦夕矣蘇洵有言近之可憂未若逺之可憂也故先王慎擇逺方之吏乃今藩臬郡守主上賴以宣威德而靖逺人者也其所推用大半以失職左遷之人取具名數若下官者固已擯而量移者也彼其處心積慮寧復有永圖哉計日而居遷延得代幸頃刻脫去而已休明之世豈乏人而使之獨於一方靳惜何也將以惡地難治乎則不當以不齒掄擇之人據盤錯之任若以為易也則廟謨已舛甚非所以戢外而寧內也土官之家率詬淫虐無亷恥顧愛威之則帖服優之則傲慢上侵譬諸小人未可以慈仁導化也今法令曰上官非徒以上不得參提長吏奉行憚於條奏雖受賕枉法者亦以笞杖出之益以驕玩今縱不能禠爵削地與流官比獨不能假律令以屈辱當衆薄責消其桀驁之心乎釋此不行而姑息因仍是隳法而惠惡也人亦有言覆宗萌於睚眥奪璽起於穿窬言治盜不可不蚤也往者阿黑變於尾灑阿旁蹶於清平也富陸梁於平浪當其初直眇小鼠竊爾失而弗治遂至煩師數年而克故欲地方無變莫若重購盜之令懸百金而購一盜貪利忘死者孰不趨之捐不出萬金而諸寨名捕之賊次第可磔矣若發覺而逮鞫者勿令亟配姑禁錮考掠以詰黨與縱未能盡除亦且屏迹他所今之治盜者無論殺傷第隨俗講解以牛馬為償百一致法重不過充徒而已彼亦何憚而不為也夫上之所用既非其人下之所以制馭者又復失體是以法度日弛威稜弗張姦宄公行逆節比起大扺皆羈縻之説壞之也故曰仁者不廢法而施恩智者不遺逺而察近勇者不牽議而愒日蓋法廢則長姦恩不可得而普也遺逺則憂迫內不可得而敉也牽議則生疑事不可得而舉也失斯三者里胥不可以治五家之市而况於逺方易亂之民乎夫貴州之患最大而可憂者莫如水西頃有為水西之謠者曰貴州區區揮沫可濡其悖謾不道一至於此尚可高拱而羈縻哉若其比周之雄聲勢相倚者則西有芒部南有播州北有酉陽此三四酋帥慮無不欲屠剪頡頏厚自封殖者乃者安氏擁兵不調播州不服節制芒部烏蒙仇殺不可居解酉陽侵烏羅奪麻兔之地幸而國家全盛猶以文移服屬脫一方有鋒鏑之警此輩尚肯帖然俯首而已哉積弱如此而議者猶欲以羈縻臨之此下官所以日夕疚心強聒而不舍者也夫法當飭始禍貴塞源今者始已蠱而源已潰矣非卓犖明達之才不可責以善後之治也明公立節慷慨時論所歸誠能采不諱之言畫永安之䇿剗積弱之弊折不軌之萌即使下官永滯炎徼十年不調所以報主恩而酬壯志者亦不虛矣伏乞裁察無任拳拳答贊畫諸公何良傅昨承俯臨卧榻欲令開陳海上事宜某本愚陋無識况已乞身休退豈得有所陳列不肖生長海上今日偶得家信云前賊去後又一起約四五百人五月二十一日至敝居海上泊舟登岸即在敝地屯住而地方無賴者為之嚮道四出剽掠先人丘壠百年之木盡為砍伐公然造船今已一月而官軍若不知者剝膚之禍至此極矣且昔竊聞長老之言敢因埀問而私論之今日之事似不必多言勦説惟能復祖宗備倭之舊制一言而功過半矣某少時嘗竊怪高皇帝時未嘗有倭夷犯界也何其備之周且密如此今而後乃知大聖人明照萬里至誠前知百世無弊也某松人也即以松江一郡沿海岸而計之西南扺浙江乍浦千户所界東北扺蘇州吳淞千户所界中間二百五十里而遙耳由乍浦而東五十里為金山衛內有四所而設總督揚州等處備倭都指揮治其中自衛迄東百餘里有守禦南滙嘴千户所又迄東七十里而為吳淞千户所其二所之中相去逺者如金山起至青村中間又有胡家港堡有蔡廟港堡每堡額設官軍六十員名而乂每嵗於腹裏衛所調撥官軍三百員名二月來九月去謂之貼守每衛所各有戰船教習水戰沿海每六里築一墩撥一軍朝夕瞭望每見外洋船隻往來即舉火相屬互相傳報如果係倭夷犯界即整軍駕艫出與迎敵一倭登岸即以失機論罪紀律既明官軍莫不用命雖無事之時每嵗將領率兵於近岸各山島間巡邏一二畨謂之搜山亡命者不得以為巢穴是以百八十年來島夷絶覬覦之念各沙無嘯聚之徒東南晏然得盡力於耕織以供國家太平之賦者皆祖宗精神命脈之所貫通也後有淺識者見海上無事而官軍日惟坐食以為此備皆虛設而此等皆冗食也冗兵也冗費也由是各衛所之船皆賣而買馬矣沿海衛所之軍撥令運糧矣各堡貼守之軍徹去不用矣各衛所官軍倉糧任從糧長侵欺而軍士有一二年無糧者矣士氣既消武備盡弛雖存衛所之空名糊紙為盔削木為刀近同兒戲數十年來猶幸島夷未知此中之虛實厝火積薪向以為安邇年匹夫無賴嘯聚海島糾引倭夷以為先聲潛圖叛亂初犯浙江至嘉靖三十一年偶一船至四十餘人隨風飄至上海縣寶山地方登岸士人不知猶以為漁船也意欲逐其人而取其貨賊即手刃百户一人土民數十人燒劫近船民居數十家徜徉而去不見有禦之者去年既犯上海嘉定然亦不過四五百人而受禍即已慘矣今年浙中之備漸修而賊知此間虛甚遂大舉入冦衆不下萬人三吳之地盡遭荼毒屠戮之慘淫汚之辱田不得耕而國稅將隳姦宄乘機竊發響應其憂有不可言者今皇上赫然奮其神武命將出師大司馬公以命世之才登壇翊運乃知此寇不足平矣而大司馬公又虛心延訪愚以為今日之事宜莫先於查訪祖宗備倭之制盡復其舊而於各衛所慎選將領調補精兵於要害處添置把總各堡復貼守之卒沿海練水戰之船墩臺嚴烽燧之警如瞭望外洋有船將至某處則某處官軍出與迎敵某處䇿應諸將領官各有分地必不使賊人得以登岸如賊從某處逸入者所在官軍即以軍法從事如此則衛所墩堡如身之使臂臂之使指血脈聮絡我軍之氣百倍而賊無所容其足矣俟其退回沙島然後徐圖𠞰撫之計或用反間離其黨與或以賞格誘其相圖其良民而或為讐家所激或為飢寒所驅或犯罪脫逃或家奴亡命者皆許以優恤之典召令復業其或怙終不悛然後合三省之兵力搗其巢穴必使鯨鯢盡去海島肅清然後蘇松之地可得為方輿版籍所有而又須以數十年培養庶幾元氣可復耳執事倘以此言為然於大司馬公議政之餘試一舉其説以備採擇之一端何如力疾草草與王槐野先生書何良俊良俊自不奉省覲倐忽二載陟岵瞻望維日為勞古人云去德滋逺懷德滋深以今觀之蓋不虛耳前徐道長人回得拜順天試録之賜且緘至尊教發函伸紙如奉慈顔喜劇喜劇但中間奬訓過情不任惶恐良俊委瑣之迹世所共棄先生獨憐而進之然區區之情不能自見於世茍遇知已不一披露後將誰托乎故敢一二為先生陳之良俊東海之鄙人也爰自髫年即遊心藝文之末嘗取李空同康對山文讀之以為當代文章盡在是矣思一見其人不可得後稍有知則又以為儒者之事蓋不止弄筆札抽黃對白為瑣屑之辭佞悅人而已則喜觀戰國䇿韓非説難儲説及孫武子諸篇又喜論當世之事後聞寧藩首難隂遣人邀致陽明先生先生脫身走下縣徴兵討賊不踰月而元凶就擒江漢底定武皇帝南巡時喬白岩先生分守留都武皇帝有隨駕總兵江彬隂欲圖逆方貴幸用事變在肘腋先生隨事折之中其隱曲故姦宄寢謀又思一見其人未幾白岩先生轉北太宰去乃杖䇿渡浙江欲走見陽明先生值陽明方有廣東之命已就道又不克見乃探禹穴覽會稽之勝以歸時乙酉之冬良俊年二十矣良俊方為學官弟子貟每府試臺試皆在高等郡太守與監司亦每以甲科望之然非其願也性不喜為舉業文臺試畢即棄去間取十一代史讀之必欲得前代興衰得失之故且遍覽諸子九流旁及釋氏雖魄弱善忘不能上口然於王霸之餘略倚伏之要害亦已略得其槩矣蓋下帷發憤者二十餘年至丙午春而病作皆緣久坐忘食專精過苦志業不遂困抑無聊脾胃受傷中氣逆理每一食下咽少頃即惡氣上攻刺擊於喉吻之間其痛如割其熱如焚復臭穢不可忍每日飲少酒食米不能二三合遍訪名醫療之卒無尺寸之效遂棄去墳籍日徜徉於泉石之間家有園池數畝時與魚鳥狎玩又教童子以新聲積習既久漸知聲調時時撫掌按節低昻至暮如此者又二年始得稍進飲食至壬子春舍弟良傅以祠部郎考滿至都歸語良俊曰三宰相皆念兄不忘兄能一出否良俊笑曰造物者嘗戲豫豫亦一戲造物可乎蓋造物者欲困豫以甲科然豫素不欲階此以叨富貴是甲科烏能以苦豫造物者欲困豫以病然豫能自為歡竟脫去不戚促以死是病烏能以苦豫造物者欲困豫以官然豫聞君相能造命豫今出縱不敢望為臺諫郎署僥幸叨一冗從得待詔金馬門日享大官梁肉以厠厮役之末則東方生郭舍人皆吾師也是官亦何能以苦豫遂徒步至京師宰相果憐念良俊處以南翰林孔目時掌院者華州槐野王先生也良俊憶自頃嵗嘗謁西元馬先生先生蓋亟稱曰今海內善為古人文者惟我關中槐野王先生及授官來凡在朝諸公良俊之以文字見與者乂皆交賀良俊曰行且得見槐野王先生蓋良俊不喜得孔目喜得為先生屬吏且得侍教於先生也及來南拜先生於庭見先生言辭爽朗儀狀軒舉蓋所謂千人亦見萬人亦見者也讀先生之文則典贍雄渾方駕馬遷自東漢以後不屑也何論對山空同諸公哉及先生進良俊於坐則聞先生之論其言西北與東南事甚悉蓋西北自青神余公鈞陽馬公邃菴楊公晉溪王公以來其經略之迹凡邊城要害與道里近逺以至言動食息雖細小猶能記憶之若陽明南昌之捷白岩留都之事雖南人有不能盡知者先生蓋屈指計之若道前日事則良俊昔以不及見四公常恨恨不能去心者今幸取償於一日矣其為慶幸當何如哉則始怪西玄之所以語良俊者不詳近日諸公所以知先生者不盡也以為苟得奉先生周旋數年死且無恨甫半嵗天子召先生入直清禁良俊蓋翹首北望日偵先生動止則聞先生以太夫人年高不可缺養依棲於華山石室後乂聞先生再上書乞終養不報後又聞宰相重先生之去纍促駕勸先生行後聞先生至天子命主順天試事則日夜北望兾得一見順天録遍走士大夫家覔不可得至九月盡從朱司成處讀之始開册讀先生之序則歎曰文章竒偉固不待論至以微言動人深於告戒逺矣讀諸經義則歎曰其辭爾雅渾含刋去枝條直根理性乃孝廟時程文也讀至第三策則又歎曰卓哉異乎自周秦以降人不惟不能有是見亦不敢為是言夫天混混在上耳雨暘燥濕日月照臨星辰布列各得其職而天不與也蓋靜者躁之君拙者巧之宗無者有之門其體本如是也世競為昭昭察察亦孰知悶悶忞忞之為道耶至讀第五策其所論四隱又何辨哉夫自魏𨽻嵇康皇甫謐以下至袁宏阮孝緒諸人其所述隱者之事甚備然徒記其迹莫能得其心蓋自四隱之目立而隱者舉無遁情矣先生二策頓挫似馬遷辨博如韓非子閎放如莊周嗚呼文章嚴整者窘於邊幅閎肆者流於奔放欲兼綜並美難矣蓋自秦漢而降能盡文字之變若神龍飛行麟甲爪鬛皆中程度者非先生而誰耶此亦難與不知者道俟之百世殆必有謂良俊為知言者矣自先生行後南中之事漸不可聞夫去年之夏冦之在柘林者才八十人耳不以此時勦滅玩敵養冦以至今日者將孰任其咎耶今賊人恣肆又年半餘矣諸公尚未聞有廟勝之算而事體乖違有不可以枚舉者夫統三軍援桴鼓使士卒樂死者將帥也今將帥領士卒臨敵而斗米尺帛皆取給於有司有司每每節縮財費不稱功賞夫李廣之為帥朝廷賜豫悉陳之廡下使士卒裁取為用以李廣名將其待士如此尚不能以得志今將帥欲用士卒之命而有司每失士卒之心雖使李廣復生欲其制勝得乎夫古之善將者必欲得素撫循之士用之何也蓋素出撫循則恩既素結信亦素孚威又素足相脅服如手足腹心有不待告喻而自相捍衛若出一體故亷頗在燕思用趙卒者是也今敵人壓境始差某將官提某處兵若干赴敵將與士卒不但素不識面亦且不知姓名若此雖使亷頗復生欲其制勝得乎夫桓文之略蓋不世出然其所以勤王定霸者猶賴節制之兵今之坐而談兵者每言陳法夫南中溝港鱗次屋廬櫛比陳法固不可用然獨可無紀律乎夫古之用兵者曰竒曰正曰犄角曰形格曰勢禁曰三疊曰魚麗曰長蛇曰九宫八卦蓋變幻莫測而終不失故穰苴孫武韓信李靖之所以取勝者此也今合數萬之衆總為一隊驅之赴敵一人失利萬人奔潰則雖穰苴孫武韓信李靖復生欲其制勝得乎夫敵人為鬼為蜮詭譎萬端前有賊從嚴浙由歙州歷寧國太平扺南京止五十七人耳已至安德門外而探細者猶言五百人或言千人蓋緣賊人六七為羣竄伏草莽一去一來一起一伏如循環然莫測其端此正所謂以寡為衆以弱為強蓋得兵法之祕矣較之我軍或千人或萬人總為大隊一敗則不可復之者相去何如哉古之用兵言天時言地利言人和夫天時彼與我共之者也然察其性辨其俗因是以乖之者其變不可勝窮也若以地利言之則彼已久處內地出入慣習且祼形疏理不畏暴露去來剽疾有若飄風而我一時調至之兵茫無所知且進退持重難與爭鋒地利之不如彼也明矣若以人和言之則彼犯波濤越瀛海出萬死一生之中以處我土此正所謂同舟以濟雖吳越可使相救者此也若我軍之爭功競利雖當事諸公猶不能不為異同今以無知之將卒但營目前者若羊之在羣可望其無相抵觸乎則人和之不如彼也明矣今之主征𠞰者則詘招撫主招撫者則詘征𠞰欲用鄉兵者則以調兵為無策欲調客兵者則以鄉兵為失計皆非也蓋征𠞰者𠞰海外之冦也招撫者招中土脅從之人也陸祠祭嘗言未有不知賊情而可以會戰未有不搖敵心而可以取勝者此二言最為切要今當大張曉諭明著賞格有能斬敵人酋首級來降者爵以幾品軍職斬賊衆一人首來降者賞以幾十金縱不能致其必來但此諭一布敵人攜二必不深信內地之人而內地之人心一動搖亦必不為敵人盡用乘時征進或可為𠞰滅之一機會也况敵中總統者何人其分領頭目有幾人今皆不能詳知夫羣犬分布於庭方戢戢而卧投之以骨則衆起而爭之自相搏噬此勢所必然者也或更募萬金死士得數人者投入賊中就中取事又一機會也今不知出此而但欲與之角力良俊恐賊人佻狡剽悍此亦難以得志矣今之所以欲召募客兵者正欲為訓練鄉兵之地耳蓋三吳之人素不知兵今賊已壓境則猝難應敵故暫借客兵禦之於外而內修戎政此正其時不然則逺募之兵豈有經年纍嵗久客而不去者哉今客兵屢至而鄉兵未聞訓練不知客兵一去竟作何計也南都諸公嘗問良俊曰三吳之兵果足用乎良俊應之曰夫吳王夫差嘗伐越定楚與晉爭長於黃池其所用固三吳之人也項籍起兵吳會率三千子弟兵渡江而西卒之滅秦與漢角立其所用固三吳之人也晉謝玄以五萬人破苻堅三十萬之衆者其所用亦江東之人也豈其時嘗借兵於他國哉但史稱吳之入越用教士七千孔子曰以不教民戰是謂棄之夫所謂教之云者當徙木懸賞以明其信涕泣誓告以作其義投醪舐癰以結其心耀兵揚威以鼓其氣斬駙自刑以申其罰仆表立約以致其決至於坐作擊刺射逺中微之事則又其本務而日夕所當究習者也不然則募客兵而徒費饋餉養鄉兵而坐糜廩餼終何益於成敗之數哉今當事諸公不知出此而日以募兵請糧為言夫山東之兵已一敗矣狼兵土兵已再敗矣今苗兵已集而成敗尚不可豫料倘不得志不知更何以為善後之計也竊計從去嵗以至今年各府調至錢糧無下數十萬各府之錢糧有限而軍門之費用無窮若兵連禍結更一二年乂不知將何以處之也去嵗良俊送孫東榖文中間有曰今天下方欲用財茍無他端出之其勢將困今乂一年餘矣而司國計者略不之講何耶良俊嘗竊計之當今為理財之計者惟錢法門攤二者可講耳夫天子所以開利源而不竭者惟錢耳何也蓋財之所出不過天之所生地之所長皆有限極惟錢之用不窮者以能權其輕重而伸縮之數在我制之耳竊考神農始通商貨已用錢幣至成周作九府圜法而其制大備夫上古之時事少而用省然錢幣有九品猶懼不足今之所費數百倍於古而僅存者獨錢耳又廢而不行所行者但白金一品而公私之費交取給焉則民安得不貧國安得不匱哉又觀漢三國時因軍興錢不足用鑄鐵錢以濟之至宋慶厯元豐之間嵗鑄銅鐵錢三百萬貫猶不足用後又制交子會子以濟之今鈔法是也今皆廢格不行是天子所以權財貨之柄廢則是與齊民等耳然而白金者又非從天降非從地出皆取之於民者也獨不顧民之膏血蓋亦有盡者耶今之司國計者特以為錢之用不償鑄錢之費故不敢倡為此議殊不知天子不言得失諸侯不言有無大夫不言多寡茍國家雖有鑄錢之費而民間每嵗增數百萬錢之用民用不亦少舒乎民用既舒而天子當計有利與無利哉况行之有法又未必盡無利耶嘗考宋之鑄錢有二十四監今該於兩京十三省及六鹽運司共計二十一處開局鼓鑄兩京以一户部副郎主之各省以一參議主之各鹽運司以一運判或運副主之而巡按御史每加覺察又先著為令禁民間不得以銅為器皿市中工匠不得打造銅器限三月之內並首告入官官給其直按宋真宗咸平四年之令舊制犯銅禁七斤以上並奏裁處死詔自今滿五十斤以上取裁餘遞減之則知宋之銅禁蓋嚴矣又按周顯德二年以縣官久不鑄錢民間多銷錢為器皿及佛像故錢益少立監采銅鑄錢自非縣官法物軍器及寺觀鐘磬鈸鐸之類聽留外自餘民間銅器佛像五十日內悉聽輸官官給其直過期隱匿不輸五斤以上罪死不及者論罪則知五代之銅禁亦嚴矣蓋必嚴立銅禁然後各處之銅盡歸錢局且良俊又考之古今之錢惟五銖輕重最為適中古以二十四銖為一兩若以古今度量較之今之一兩比古之八錢稍劣則每錢重一錢四分稍贏通計每銅一斤除消鎔磨洗之外當得錢一百五十有畸大約一局每日有銅二百斤當得錢三萬有畸矣又當著為令甲大凡拘刷銅器皆責之府縣明造册籍送局管鑄官不得擅自拘刷以致紛擾其軍民有罪者府縣許酌量贖銅送局更或不足然後有司以無礙錢糧買充其合用工役人等除番沙掌鈐高手出直僦雇其餘熾炭鎔銅磨洗之類有司並以有罪人充則於鼓鑄之費不亦少省耶近聞有人建議於雲南鑄錢錢成則遞至湖廣由湖廣遞至南京南京轉解京師可謂失策之甚即郵驛之費己不可紀極矣夫郵驛支應皆百姓之脂血國家之命脈也夫已知鼓鑄之無利况可又增不經之費以益之耶大凡事貴於因能知因之為利則事省而功倍今二十一局所鑄之錢但當督令有司立法就於所在行使所易之銀著令進表官順帶進京此所謂因之為利者非耶或又以盜鑄為言者是不足深慮夫所鑄之錢必令盡數管解所在巡按御史給與鋪户給散之日須令當堂選揀如有攙和鉛錫或輕薄濫惡者管鑄官許令參奏送京處以重罪其錢務要肉好周正輪郭分明則其工費已不資矣夫官局所用者官銅所役者公徒猶惜其重費則民間亦何利而為之耶蓋不待禁而自息矣良俊嘗竊計之一局每日鑄錢三萬易銀可得五十兩則終嵗可得銀一萬八千兩總計二十一局每嵗幾有五十餘萬矣若銅少有贏工役少勤嵗或加羡則於國計不無少禆耶若門攤一節則祖宗已有成法至今行之但其法未密利不歸於朝廷耳祖宗之法止稅店面今當并及房室每房一間一年止可稅銀一分然此法之行必自貴近始譬如勳舊大臣之家有房千間每年止該出銀十兩夫勳舊大臣久享朝廷尊爵重祿每年出銀十兩以禆國計以為齊民倡豈非其所踴躍而樂輸者耶至於民間大率以中户論之有房二十間嵗輸銀二錢耳亦不為病但恐有司不體上心不知民隱差委在官貪殘之徒查勘房屋懼有隱匿再三核實而無賴小人乘機漁獵必有數次呌號隳突轇轕於里巷之間四出紛然民必大駭此則深為可慮者耳良俊再三思之以為行之有法蓋不煩官府而定者也當稍仿古保甲之法里巷之中每十家編作一甲其中推一富實之家定為甲長房屋之數即令甲長勘實報官如有隱漏十家之中互相查覆若更不實房産入官十家一體治罪亦不必官府造册但須立定册式編定字號著令甲長領出十張將十家之房從實填注一并送官攢造其有拆毁倒塌或有添造亦要甲長率領原户到官扣改册籍其徴收稅銀亦不必差公人下鄉但與定立期限甲長豫先取足送官交納如此則百姓免虛費而朝廷收實利良俊嘗私計之每一嵗之中幾百萬有贏矣是何可以不講哉然此本非聖世之所宜言但良俊以朝廷經國大計大半取之東南今東南被寇已三年矣賴朝廷曠蕩之恩已蠲一年之稅然兵連禍結恐猝未得解縱倭寇即解而焚劫之餘尚須數十年休養不知朝廷大計將安取給哉故早暮思之以為惟此二者可行耳然良俊小臣也處疏逺之地不得言而受先生之知遇最深偶有所見不以告於先生則所以事先生者不盡也先生處清切之地亦漸有天下之責知有益於國計而不以告於朝廷則所以事聖明者不盡也良俊事先生者半年餘見先生所論皆國家大事不從俗為里巷委瑣之言故敢冒昧陳之恭聞太夫人壽康熊羆叶兆皆慶門多祜亦屬吏之所願幸者也參奉末由臨楮不勝悵結燕地朔風多厲千萬為國珍嗇以茂逺猷不宣明文海卷一百八十二
