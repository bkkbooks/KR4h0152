body:
  text: 明文海卷一百八十三餘姚黃宗羲編書三十七士習上蘇參政趙汸汸生窮山下邑賦性愚拙自其修於身者猶扞格不勝是懼於四方事蓋不待言是以當科詔屢頒羣材彚進之秋而終不敢持不足之資以僥幸於一得蓋羽短者蜚近足蹇者步遲理勢則然非由矯飾而閣下一見乃獨憫其沉淪欲進諸俊選之場以增益其所未至噫閣下之心豈徒為汸發哉計天下之賢者閣下莫不皆欲其出為世用不賢者閣下莫不皆欲進而教之顧小子不當厚意推閣下之用心收效於天下可也是以姑蘇舟中侍坐時嘗以郡邑學校廢弛為言而使命亟來言不及究故敢申其説以書閣下幸一覽焉竊聞天下之患莫大乎士大夫廢學而民不知義使士大夫皆知學而民知義則學道愛人之政舉而尊君親上之俗成政舉則漁奪椎剝之風息俗成則倍畔崩離之禍無自而生其得失蓋甚明也三代盛時教民養士之法達於天下皆由內及外相為終始涖官從政悉取其成材而用之其或上下不相應和聽其散漫四出而欲一旦收其人以充任使恃其心以為垣墉者蓋未之有也國家混一天下許文正公首開成均之教以輔成治世之隆列聖責成具有明法故雖小有廢墜易為興舉郡邑無逺近大小廟學具修先賢故址民間義孰列為學宫者不可勝計亦云盛矣乃獨教養無法師弟子去留不常其甚者大抵與市井聚徒相類材德之成否何由可見田租廩粟蠧蝕於庸人鄙夫之手往往傅會生員姓名連簡纍牘以待稽考姦民更相劫持所在金穀狼籍殊甚前代欲聚士而教者嘗患無以食之我世祖皇帝定制郡邑長吏不得擅用一錢獨在學校者捐以與士無所愛惜其恩德甚厚而士終不被其惠真可為長太息者哉其失在生員無定額選補考察升貢無通法為教官者又皆循資而來故長吏得以好惡為緩急風紀之司亦無從而察其實矣大扺下之於上不從其令而從其意今貨物粟米之政督責嚴密間不容隧而育材興化之方謾不知省西方祕密之教行乎王公大人之上禱祈􅓙祝朋呼膜拜家自為俗人自為法者又紛然於卿大夫之間道宫佛宇所在增益支流旁出與居民雜處不可勝言而所謂先王之道人倫之教者天下郡邑之間湮微泯廢如此欲士大夫皆知學而民知義難矣竊謂為今之計當從朝廷定為條畫使郡邑長吏擇民間子弟之可教者大學小學隨所在參酌為額其流官子孫皆補郡學生員鄉貢罷歸願入學者聽之數多則均諸書院及廩食有餘之處大小學職由科目入官更采前代優崇之意升其品秩均賜印章使得以成官府嚴簿籍治田糧行賞罰其專任訓迪則士大夫之老於其鄉者有官而需次者山林奧學者皆得為之然必使諸生求其道德經藝可為一鄉一邑師表者長吏卑詞厚禮以延致之身率學者而敬事之以盡古者公卿大夫隆師取友之誼田租寡少者許於官田添給或從義民捐助其所以為教者則以國學成規為準又取前代法本經外益以吉凶二禮律令書算皆許兼習其敏學修行恬靜有守者則長吏加禮貌以表異之縣間嵗較其優者貢於郡其不與者得推擇為縣吏甚不率教者屏之郡三嵗試其中等者與鄉貢之士偕行赴省不與者得擇為郡吏自行省罷歸者即郡學肄業以俟再貢自鄉舉者亦須試於郡而後遣以革凡庸輕妄玩擾場屋之弊凡郡邑較試只以經義對策合為一場長吏親臨糊名謄録而後考諸經各取一句為題則非通全經者不敢幸中經題臨試各擬十數以上使一人射而取之揭以示衆則請托不行凡部使者至學諸生皆得贊名祇謁間取一二觀其所業以勉勵之假託占籍者去之如此則為士者蒙教養之實在官者獲師友之益然後可以塞債吏冒儒之路廣賢才進身之途回斯民向道之心一四海未同之俗而又必察之於幾微持之以悠久使善人日多而世鮮乏材之歎民風漸美而人懷尊上之心庶幾學校之設不終於具文者乎夫先王恐斯民之易散而難聚易分而難合也故養以井田教以學校而因其法以維持之收其賢者而共理之使中外逺近均齊方正精神遍攝喘息貫通天地之間共為一體卜年雖近終必過之今土宇廣大亘古莫儔蓋有前代帝王之所願見而不得者既以畫地為限揭其品彚之名以分異之而親疏貴賤崇卑勞佚之殊益懸絶矣惟教民育士無間邇遐茍以闊於事情不為修舉則所以一道德同風俗起斯民之視聽而結其心者果何在乎今聖天子求治如不及既選賢守令以嘉惠疲民則興學育材移風易俗此其時也閣下以人材世道為己任志念所存見乎詞色故敢忘其僣妄竊述是説以獻焉法先王鄉校之實成許公未究之心以贊國朝治教之美於無窮非閣下尚誰望哉京學之盛必有成法亦可推之天下否汸居家養親讀書兾有少進以無負於門牆惟靜修先生曹學士虞先生碑文無由一見爾干冒清崇不勝悚息答樞判汪公同請主商山義學啓趙汸伏以學由義建興文右武之時士以禮羅折簡捐書之日靖惟寡陋過欲稱揚恭惟某官雅望人歸雄資天賦持節有光於晝繡鎮重三吳過家無間於春暉堂髙四友拯鄉邦於既溺慨學校之久隳當傷痍汩亂思重敘於彛倫况板蕩劻勷既克全於我里事有至難而濟之若易時非所急而斷以弗疑招學士於駭散之餘爰中國而受室求亡書於煨燼之末雖一卷而立師謂晦菴夫子之述作幸存而紫源先生之風猷不逺當及典刑之未墜庶幾文獻之足徴茍至德要言能恪遵於先正則良才善俗庶可見於清時豈期束帛之將不棄遺簪之舊自非高誼孰念陳人某朴學無成半生多難疾病空餘於皮骨亂離久廢於簡編慚始隗以何堪念依劉之有自受飱反璧敢逃越雪之譏充棟汗牛奚取郢書之謬尚圖良晤以究欲言與胡憲副書楊守陳僕自與尊師會川先生同年因交閣下久矣故昨蒙枉顧輒敢進規冀少禆教化而兩浙諸生均被賜耳傳聞見譴知過而悔故奉書以釋輒承埀諭捧之欣然逮誦味之則知過益深而悔愈甚矣僕位望未隆雅能自重交友既久義當忠告雖被譴何恤特以一郡諸生之故而為是甚不得已之辭耳閣下不亮其意乃謂僕信讒邪之言又為讒者忖度其心云云忿惡之情溢於言表則奉書不足以釋譴而反足以激怒俾閣下以吾郡諸生為讒邪而惡之能不重責於是悔過不勝既矣然見譴之言實得之道路非由諸生之讒而來諭忖度云云者諸生實未嘗萌此心也何閣下逆之億之一至此哉來諭以僕為故交知已乂謂吾黨稱堯舜而宗孔孟自謂所職即唐虞司徒之屬所蒞即孔孟及門之徒信斯言也則知閣下必若堯之稽衆舜之舍已孔子之無失故曾子之不遺舊矣僕何疑於見譴又必若契之敷教在寬臯陶之刑期無刑孔子之不倦教顔子之不遷怒孟子之必自反矣諸生何憂乎見責故僕復敢進其愚直之説焉來諭謂今日士俗知務名而不知務實知從欲而不知從理知求人而不知求已實天下之通患此固切中今士之弊然此三患者士非不知也直不能耳抑豈獨士之罪耶雲之所蔽洞無不冥水之所衝堤無不壞有惡洞之冥堤之壞而不咎雲與水也可乎今此患天下皆然而吾浙一方不能獨否閣下不為一方慮而為天下慮志則大矣然天下之患尚可責之他人吾浙一方之患非閣下誰實任之往吾遊校今致仕布政使熊公鍊僉憲方提學政剛方正大人莫敢干以私士但知讀書修行以應舉耳故風俗美而材賢昌至今仰公若山斗僕仕既久而重設提學之官吾浙或匪其人致庠校之士奔競若流仕宦之家請托成市風俗人才日以反壞故論者至謂提學之官不如不設之為愈近嵗僉憲張侯悅蒞任亦庶幾乎熊公故奔競者化而恬退請托者變而靜廉風止波寧羶除蟻去有不得不然者未久陟去人嗟慕之閣下之來也吾固望其軼張侯以肩熊公雖閣下亦自以為窮理守義而撲撻匡直抑揚進退動皆聖賢成法無敢妄有作為宜乎士習之滋美矣然猶不免乎三患而奔競請托蜂飛蚋鳴反不逮張侯時者豈適遇人心世道之驟變一至此哉是有説矣昔宋人有謁韓大資求薦者程叔子謂大資居位不能求人乃使人倒來求已是何道理范夷叟以為士求薦常事耳而程子乃曰只為有不求者不與來求者與之遂致人如此然則今之奔競請托非有以致之而然乎昔閣下枉顧之日一頃而得數書每書各囑數生皆怡然收之後聞在他郡囑者亦復不少皆未始一拒閣下自言彼雖請囑而吾實循公道不徇其私情何必矯激以拒之此固聖賢不避嫌之道然見色而人不疑其亂者萬古惟一展禽孔子欲應公山佛肸之召子路猶有不悅閣下焉得人人能亮其心哉所囑者雖非徇焉而自然見與暗者猶疑於心姦者尚得以藉口而况賞或僣施於故人顯宦之子罰或濫及於善良英俊之生而抑揚進退亦有果徇其私情而不由聖賢成法者此奔競所以滋衆請托所以益繁也薦紳君子譽盛德而稱善教者必多矣非僕之愚直誰敢以此告耶由是觀之忿惡讒者而忖度其心亦求人耳不拒囑而或徇之亦從欲耳若是而稱堯舜宗孔孟亦務名耳士之三患固其所也又奚責焉詩曰爾之逺矣民胥然矣爾之教矣民胥效矣論語曰其身正不令而行其身不正雖令不從大學曰其所令反其所好而民不從戴記曰下之事上也不從其所令從其所行漢書曰以身教者從以言教者訟聖賢之論無不若此僕前言不獨士之罪者豈無謂哉閣下誠欲稱唐虞司徒之職以淑孔孟及門之徒則惟舉士之三患而一反之其何患之不弭然此實未易能醫者之療病也急則治其標緩則治其本今士之患急矣請獻方治其標凡官皆不可徇請托然或關一人一事耳諸生百官之坯教化萬事之本提學者固將陶冶百官之坯植立萬事之本也一徇請托則諸生皆奔競而先壞其心術教化隳而人無禮與義矣諸生既奔競而壞其心術則其入官何往不爾教化不明而人無禮義則政莫能道刑莫能齊故百官以之而邪萬事由之而弊非一人一事之失而已閣下往在東廣鄉宦頗稀請謁易聽今浙中仕宦如雨一郡凡幾人一人凡幾事十人而聽其九四事而從其三未能慊也焉得事事徇之而人人悅之故吾計以為莫若一切閉拒所至勿受書未考勿容謁或不獲拒而見請則召其所請之生對衆戒諭且厲其餘考則屏門子出入以防其覘題取試卷私記以防其潛換禁皂𨽻往來以防其遞文躬坐堂上聽察以防其朋講命屬官封卷以防其私議嚴視吏牘以防其改案既然矣於是較閲之必慎而勤品第之必明而公當進者必進之而無轉移當退者必退之而無姑息賞必當功弗以私恩而僣且費罰必當罪勿以暴怒而濫且重若是則無情如造化至公如權衡奔競請托有不弭乎彼奔競者豈樂於走逺道尋高門而降心卑首委傾貨資以乞憐於人哉一皆事勢迫之不得不爾彼請托者豈盡包羞而圖利者哉實多情義迫之不能不爾茍如前計則諸生必曰公考較公而黜陟當矣又焉用夫私雖驅之俾奔競亦不從矣時貴必曰彼憎書問而惡干謁矣何必取其辱雖召之俾請謁亦不至矣風俗於是乎丕變賢材於是乎勃興尚焉有如前所謂三患者而勞閣下之慮哉但恐閣下以其近於矯激而不屑耳夫矯激固非中道然亦未可槩非之第五倫官二千石而躬自斬芻養馬前史議其矯激然不害為賢臣今世道日敝若衆皆奢也而獨儉衆皆圓也而獨方衆皆放也而獨約衆皆貪也而獨亷世必以矯激目之茍避矯激之嫌則必為流汙之行而後可閣下將奚擇焉抑前計乃所謂治標之一方耳若其本亦無他但如閣下所謂窮理守義而且反士之三患可矣閣下其精察乎危微之心而毋認危作微明辨乎善惡之幾而毋認惡作善詳審乎義利之行而毋認利作義凡所行惟從理而不從欲惟務實而不務名惟求已而不求人必使口與心同行與言顧則道明德立而容色言動皆足為士之楷模孰不化而賢耶孔子曰吾無行而不與二三子者是丘也又曰豫欲無言天何言哉四時行焉百物生焉言且不用况用撲撻此則非僕所敢贊矣僕少之時亦頗有志於天下閣下所問素明豫定之見亦頗有之但其見非腐則迂安足為閣下道之今且老矣尚安能調元贊化而作新天下之士整齊天下之民如閣下望哉隨世功名付之弟子行且謀去耳然狂奴故態未改故為閣下僣言之閣下尚取其告之忠而毋尤其道之未善是冀上執政論士習書田一俊竊聞作室者厚其棟制醫者先其脈作室而不厚其棟雖崇臺百仭易圮也制醫而不先其脈雖軀幹豐大易弱也相天下者何以異也經營之也猶作室扶理之也猶制醫而正士習一節則相天下之棟梁命脈也使士習而誠正也雖天下未就理吾不謂之危矣何也彼固足以維之也使士習而誠頗也雖天下皆寧謐吾不謂之安矣何也彼固足以釁之也今士習之在天下相公以為正耶頗耶趦趄囁嚅者以謹願見稱而言涉剛方則動有乖忤之議首鼠模稜者以和厚見容而事涉慷慨則輒有喜功生事之謗以之劇論世故則不足而高談虛空則有餘以之營辦國是則不足而封殖家務則有餘以之折衝禦侮則不足而請求幸進則有餘士習如此此固公輸之憂其將壓越人之所望而走焉者也相公以為然也否耶日者相公亦嘗有意於是矣夫懸牛首於門而欲人之買馬肉不可得也立曲木為臬而求影之無枉不可得也今有人行千里之途者力竭而色飢羣就蕉葦榛莽之中以求食矣有人持壺漿出而號之曰彼非正途也不如由此途不枉且可以得食也則其趨之也必倍矣又有父兄出而號之則其趨之也必百倍矣何也壺漿其資而父兄其親而信之者也今相公之足以親信人也猶父兄而又有榮辱豫奪之權其能資賴人也猶壺漿誠一出而號之天下士不至於背戾之甚者必不忍離父兄棄壺漿而甘心冥行於蕉葦榛莽之中也故愚願相公之亟號之也夫今士習之弊有三一失之弱一失之躁一失之鄙弱者可以氣鼓之躁者可以靜鎮之鄙者可以恥格之誠寬任怨之條則首事者無惴心矣伸戅直之節則抗論者無縮志矣如是而弱有不振者未之有也恬退者雖賤必伸則衡門有真隱矣奔競者雖勢必抑則相門無足迹矣如是而躁有不靜者未之有也貪墨者鋤之必嚴則錢神之徒無所容其姦象恭者拒之必力則孔壬之事無所飾其詐毋以科目限其進毋以浮偽溷其真毋以小瑕遺其長毋以資格拘其例使部薦其監又薦其守守令各薦其屬嚴其進核其退而士習庶乎可正矣愚乂聞之合抱之木生於豫章遲之以嵗月然後可以棟明堂梁清廟而供大厦之用何者植之者豫也千里之駒産於中野正之以衡軛然後可以追迅風逐疾電而勝厯塊之用何者教之者素也今天下士朝寧之所顯庸者皆昔庠序之所教習者也而學校不聞敷教之具師儒不聞淬勵之典郡縣之所責成者月書季考焉耳憲臣之所専督者考課文藝焉耳貢舉之所登進者糊名易書焉耳此外未嘗有一道德之意仁義之具如古之先明試而後敷奏先德行而後文藝則士惟有尋章摘句以幸一第之榮及其既第而生平事業畢在是矣又何怪其為弱為躁為鄙而甘心於波流風靡之中也愚生不識大體竊窺天下之勢莫急於此不此之務而日復一日以底於偷薄之歸則萬一有桑孔典籌韓白登壇而朝廷之經營始大矣惟留神省察不勝大願與馮鄴仙書陸符符誠鄉人也鄉國間知有兩馮君日誦述其文旨風義未嘗一進承緒論符誠鄉人也乃今始稱得御矣昔杜祁國嘗謂門人曰天下惟浙人褊急易動柔懦少立至欲其人善自植立勿為時上下以顯於鄉曲信乎古人用心不以自立為足必有望於後來有志者之承稟而天下豪傑思出其鄉皎皎植立又無不奉先達前輩以為典型詩不云乎德音孔昭視民不恌君子是則是效若門下者誠吾黨之則效矣今月之朔得識蕪湖沈青嶼先生之子名士柱者其人素與宣城沈夀民字眉生者相善有客蔡將軍名三䇿閩漳竒男子也往在海僥有豪客名眉生世父沈有容時為樓船將軍副招撫用之解散餘黨海僥以靖有容以大將軍開鎮青齊蔡亦受事為牙門將領大將軍薨逝蔡即家於登州受事如故已而復為島帥總運事以熟海道朝使兩册髙麗輒稱與俱督師以夙嫌奪其職當孔賊殘破家室焚掠脫身訪大將軍諸公子至金陵因得交眉生時麻城周乃武將以總哨治水兵於浙適在座一見結為死友蔡轉歸山東孔賊勢益熾督撫聞其名募與討賊屢建竒䇿不果用周乃武者方受檄拒賊昌國馳書走數千里請蔡將軍為辦賊蔡即解職挈壯士十九人俱前將以未獲青齊者試之海上未至而周為賊所殺徘徊無可歸遂謝遣壯士獨身從眉生來東甬望海慟哭視其母妻眉生先護之以歸金陵蔡因留沈君士柱所符過沈君遂與劇談其最中利弊者莫如造船掌舵製銃用梃數䇿蔡言海中戰船材料工作都不為對敵計炮炮所中無不立碎又不解防禦故臨敵必敗無可支者柁工非生長海中出沒徼外不識風色逆順向背不能隨風張帆進退如意故賊得以邀截堵殺逞其所長若夫銃炮之製造有訣其力之大小逺近有法藥彈之增減虛實有數欲𠞰賊不可不交舟而戰交舟而戰銃炮施放有所不及長戟運動輒不得利短刃一割更無所用操擊格鬭披突無前白棓之利銛於鋒刃且言練卒撫士恩威結服動如臂指皆合兵法特其人粗直不事矯飾又口多閩舌音吐格格不能暢盡其説又未嘗讀書不解筆墨不能徑率胸懷見之書疏故其膺抱尚多抑鬱雖復見用未盡其竒今海上賊披猖創甚鎮撫大臣瞪視無策逡巡罷斥即閉關斷旅杜絶接濟遂謂計得而豪宦姦奴隂營蒲柵漿米出入非復官府所能禁止即禁止矣彼海賊醜類不下數什百千未必肯駢首稿項飢渴以死邊海窮民倚魚鹽樵採為利富商大賈雖遭邀截質贖特其羡耳一行禁海相視不敢出窮民方轉思為盜此數什百千飢渴欲噬者又日益怨憤於不得當富商大賈之餘羡憤而一借與鋌而走險邊腹響應批亢搗虛當事者作何驅除以無恐乎蔡將軍曰今日之事當途之人有能開誠布公脫略勢分解文法之韜黜喬野之目斷旁掣之肘結猜忌之舌假以戰艘三十隻勇士千餘人募柁工於漳州教冶匠以銃式精藥選棓演練服習糧取應給誓不經涉使各遊徼協力策應然後駕柁操舟排風旋浪丸擲龍駭炮梃交接用其所長掩出其上當使鯨無縱鱗波有恬日若仍以折箠驅使令文墨議論者譸張其後而貪功妬能者陰陽其間雖湯廖復生俞戚繼出終無濟海上事也符既深壯其言且痛雄才武略不得顯白當世率為庸俗牽制而才性有挾之士又多崖岸不屑屈曲低眉向人以此動與世背功業鮮就天下事日尋於敗壞而不可隄決今海上誠不堪再壞矣鎮撫新任咨訪地方事當首及門下門下為桑梓計能一言蔡將軍始末令假便宜如其所言否乎夫以蔡將軍之棄職就義沈眉生之急難存母皆所謂豪士之壁然自立於天下者也既不可不聞之門下乃門下尤諸君所仰止者亦以門下高自樹立不為時上下懷先輩之用心非復鄉國所能有耳夫局促鄉人如符門下尚欲掖之文章節義之列未有天下士自出其鄉挾其文章節義之氣欲得一當門下門下肯覿面失之者是故文章節義明於上則縉紳大夫表章領袖以為後生小子之師稟文章節義明於下襟帶韋布切磋砥礪以為世道人心之秉持符願隨天下豪傑之後以思其為秉持者而以門下為之師稟抑之詩曰惠於朋友庶民小子子孫繩繩萬民靡不承竊欲為門下誦之矣明文海卷一百八十三
