body:
  text: 明文海巻一百八十四餘姚黄宗羲編書三十八持正與葛侍御陳獻章古岡病夫陳某頓首奉書侍御葛大人先生執事頃者亷憲陶公惠書稱執事之命以平後山碑文委僕為之既辭以不能矣恐執事者不察僕之心而以為恨别簡托于東山劉先生白之今者趙知縣自省還過白沙復申前命竊計區區之私非但執事與當道諸公雖東山亦未之悉也僕請畧言之僕每讀宋史至曹彬克金陵一事未嘗不對巻斂袵而嘆趙太祖之仁與曹武惠之不伐也盖自出師以至凱旋士衆畏服無敢輕肆克城之日兵不血刃凡所得一十九州三軍一百八十縣可謂有功矣武惠視之若無有也㨗至羣臣稱賀太祖泣曰宇縣分割民受其禍攻城之際必有横罹鋒刃者實可哀也命出米十萬賑䘏之當是時君不知以得地為喜將不知以克敵為功一念好生之仁洋溢上下自秦漢以來未及見也史臣稱武惠位兼將相不以等威自異遇大夫士于塗必引車避之不名下士噫何其謙之至也易曰勞謙君子有終吉武惠有之今後山之役信有功于民矣諸公豈自與耶此賊近至省城民遭其毒者幾年于兹前此有司固有任其咎者矣夫以今日平盜之功補前禦侮之不及正相乗除在于仁人君子之心視民如傷豈容有彼此先後之間哉夫上之治民當休戚同之夫久病者不以得一日之安而棄補羸之劑久饑者不以得一飯之飽而忘終嵗之憂執事試求之百姓憂樂之情而忘其在已必能以趙太祖之所存者處民以曹武惠之所存者處功則光明者益光明矣以僕觀于一時開誠布公未有如執事舍已從人未有如執事樂善忘勢未有如執事以執事之才應天下之務何所不可僕所望于執事者非直以曹武惠輩人為法姑舉其一事之近似者為執事言之耳惟亮之裁之復保寜李太守書羅倫辱書惠以懐賢事屬倫記之甚盛舉也僕敢不祗命獨其中有可辨者不得而黙焉夫古者國祀賢于西學鄉先生歿祭于社皆以勸也此為治之大本也舍是而求治猶倒植而求茂矣後世此意不講上之責于下下之應乎上者簿書期㑹之間而已欲求善治得乎廼君獨有此舉必非從事虚文以邀一時之譽者也其志可尚矣獨所謂賢者則有可疑焉君殆未之考也夫古之賢而列于祀者必其道德之尊名節之著事功之隆足以為後世之勸者也徒有名位者不得而與焉此聖人之法也按堯叟堯咨並舉進士第一堯佐亦登甲榜堯叟仕宋真宗位至宰輔契丹入冦請幸成都當時若非冦準社稷危矣其後又傳經義附㑹天書致天下爭言祥瑞卒壊一代治體而宋以此亡其為人如此而可以為賢乎堯咨雖無可考然入為學士出補名藩功不㮣見乃精于弧矢自號小由基致母擊之金魚墜地則其不賢亦可見矣獨堯佐治郡所至有聞雖韓魏公言其非輔弼才相業無大可觀然朱子録其言行列宋之名臣則兄弟中之賢者此殆庶幾也三公之賢否章章如是今乃槩以為賢而懐之又從而祀之可乎若以其爵位科名足為是邦之重也則如堯叟堯咨者皆不忠不孝之人丁謂王欽若之流也其一世之富貴泯滅澌盡適足以貽不令之名而重為是邦之辱也何取以為勸哉若以為修前人之廢典則彼吳昭夫者獨以將相名其堂而閻蒼舒之記其語詞輕重之間亦未嘗槩以為賢也惜其不能辯而正之耳自今日觀之則彼二子者亦見人富貴而動念垂涎者也惡可重踵其失乎三公之子孫傳在潁汝間未知是邦有否也若以為廢而去之或傷孝子慈孫之心則禮有之先祖無是善而子孫譔之是誣其祖也所以百世不能改也子孫且不可誣其祖況為守土之官而誣其邦之先臣乎且太守舉事以大公至正定後世之勸懲子孫固不得而與也余嘗過吕惠卿蔡京之邦矣問其子孫無一認以為祖者至其邦人亦羞道之堯叟之邦人與為其子孫者獨無是心哉質之禮義無一可者君能從吾計乎當撤二公之像沉之于江專祀文惠更三陳為文惠書院其懐賢者祗以懐文惠之賢也二公雖不能從父母之教而其父母固以忠孝教之矣别于文惠祠後為正堂像秦公燕國而祀之使是邦之人為子者知必從父母之教而為父母者亦知所以教其子也則善矣昔鼻亭祀象千有餘嵗薛伯髙由刑部出刺道州即撤其屋墟其地柳子厚稱其得化人之理楚俗尚鬼且久伯髙一旦去之明者稱快至今況此事自君起之自君廢之固易易也新一代之耳目定百世之是非在此舉也君其無疑僕尚當執筆為君記之與安宣慰王守仁減驛事非罪人所敢與聞承使君厚愛因使者至偶問及之不謂其遂達諸左右也悚息悚息然已承見詢則又不可黙凡朝廷制度定自祖宗後世守之不敢以擅改改在朝廷且謂之變亂況諸侯乎縱朝廷不見罪有司者將執法以繩之使君必且無益縱遂幸免於一時或五六年或八九年雖逺至二三十年矣當事者猶得持典章而議其後若是則使君何利焉使君之先自漢唐以來千幾百年土地人民未之或改所以長久若此者以能世守天子禮法竭忠盡力不敢分寸有所違越故天子亦不得踰禮法無故而加諸忠良之臣不然使君之土地人民富且盛矣朝廷悉取而郡縣之其誰以為不可夫驛可減也亦可増也驛可改也宣慰司亦可革也由此言之殆甚有害使君其未之思耶所云奏功陞職事意亦如此夫剗除寇盜以撫綏良民亦守土之常職今縷舉以要賞則朝廷平日之恩寵禄位顧將欲以何為使君為參政亦已非設官之舊今又干進不已是無厎極也衆必不堪夫宣慰守土之官故得以世有其土地人民若參政則流官矣東西南北惟天子所使朝廷下方尺之檄委使君以一職或閩或蜀其敢弗行否則方命之誅不旋踵而至捧檄從事千百年之土地人民非復使君有矣由此言之雖今日之參政使君將恐辭去之不速其又可再乎凡此以利害言揆之於義反之於心使君必自有不安者夫拂心違義而行衆所不與鬼神所不嘉也承問及不敢不以正對答毛憲副王守仁昨承遣人喻以禍福利害且令勉赴太府請謝此非道誼深情决不至此感激之至言無所容但差人至龍場陵侮此自差人挟勢擅威非太府使之也龍場諸獠與之爭鬬此自諸獠憤愠不平亦非某使之也然則太府固未嘗辱某某亦未嘗傲太府何所得罪而遽請謝乎跪拜之禮亦小官常分不足以為辱然亦不當無故而行之不當行而行與當行而不行其為取辱一也廢逐小臣所守以待死者忠信禮義而已又棄此而不守禍莫大焉凡禍福利害之説某亦嘗講之君子以忠信為利禮義為福茍忠信禮義之不存雖禄之萬鍾爵以侯王之貴君子猶謂之禍與害如其忠信禮義之所在雖剖心碎首君子利而行之自以為福也況于流離竄逐之㣲乎某之居此盖瘴癘蠱毒之與處魑魅魍魎之與遊日有三死焉然而居之泰然未嘗以動其中者誠知生死之有命不以一朝之患而忘其終身之憂也太府茍欲加害而在我誠有以取之則不可謂無憾使吾無有以取之而横罹焉則亦瘴癘而已爾蠱毒而已爾魑魅魍魎而已爾吾豈以是而動吾心哉執事之諭雖有所不敢承然因是而益知所以自勵不敢茍有所頽墮則某也受教多矣明文海巻一百八十四
