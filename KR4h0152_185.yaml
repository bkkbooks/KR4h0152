body:
  text: 明文海卷一百八十五餘姚黃宗羲編書三十九持正與趙甬江司空唐順之承欲為鄙人修葺先墓且感且愧有深不自安者不敢不徑情達于左右也先墓之葬久矣茍有崩齧圮毁在所必葺子孫非有貧乏不能自存也乃不能自葺而至重煩上官葺之其為忘本而不孝甚矣子孫非甚貧乏而不為先人葺墓則是先墓可不必葺也可不必葺而至重煩上官葺之其為瀆尊而妄費亦甚矣夫葬者藏也期于人之不見而已上古不封不樹非以為薄也其用意深且逺矣中古封之樹之已寖失此意矣今先人之墓問其封則既穹如矣問其樹則既拱如矣若欲過為之制繚以石垣崇以巨屋儼然象生人之居明于始終之義者猶以為踰禮示侈而莫之為也漢劉更生氏言之詳矣彼特為王侯言之也況匹夫乎然則子孫自為之猶病其踰禮而示侈乃以重煩上官其謂之何且公之勞苦兵間傾公庫竭私財以激賞戰士常苦不給蓋一壺醪足以廣恩則一敝袴足以為惜也今為先人葺墓其費豈特一壺醪一敝袴哉乃至使公輟賞戰士之財為故人葺私墓在公謂之過厚可也鄙人乃以先人私墓之故至叨餮公之所以賞戰士之財其又謂之何然則有費于公而有益于僕猶不可為也今有費于公而顧以彰僕不孝妄費示侈之三罪亦安用之然而公之為此則有説矣不過以鄙人辱交于公之故必欲捐金以厚之然畀之以金則鄙人素不敢受惟以葺先墓為説則鄙人義不可辭而已此公之用意至厚也夫人之相知貴相知心故曰或與人以千金而人未必感或與人以一飯而人終身德之此知心與不知心之説也僕之與公竊敢附于心相知也久矣豈待于外物為厚薄者哉向已託龍溪懇切轉辭尚恐公之不信我也故復喋喋萬望即賜停罷庶使僕異日尚可以奉教耳不然是公非以厚之乃絶之也與劉一丈書宗臣數千里外得長者時賜一書以慰長想即亦甚幸矣何至更辱饋遺則不才益將何以報焉書中情意甚殷即長者之不忘老父知老父之念長者深也至以上下相孚才德稱位語不才則不才有深感焉夫才德不稱固自知之矣至于不孚之病則尤不才為甚且今世之所謂孚者何哉日夕策馬候權者之門門者拒不入則甘言媚詞作婦人狀袖金以私之即門者持刺入而主者又不即出見立廏中僕馬之間惡氣襲衣裾即飢寒毒熱不可忍不去也抵暮則前所受贈金者出報客曰相公倦謝客矣客請明日來即明日又不敢不來夜披衣坐聞雞鳴即起盥櫛走馬抵門門者怒曰為誰則曰昨日之客來則又怒曰何客之勤也豈有相公此時出見客乎客心恥之強忍而與言曰亡奈何矣姑容我入門者又得所贈金則起而入之又立向所立廄中幸主者出南面台見則驚走匍匐階下主者曰進則再拜故遲不起起則上所上夀金主者故不受則固請主者故固不受則又固請然後命吏內之則又再拜又故遲不起起則五六揖始出出揖門者曰官人幸顧我他日來幸亡我阻也門者答揖大喜奔出馬上遇所交識即揚鞭語曰適自相公家來相公厚我厚我且虛言狀即所交識亦心畏相公厚之矣相公又稍稍語人曰某也賢某也賢聞者亦心計交贊之此世所謂上下相孚也長者謂僕能之乎前所謂權門者自嵗時伏臘一刺之外即經年不往也間道經其門則亦掩耳閉目躍馬疾走過之若有所追逐者斯則僕之褊哉以此常不見悅于長吏僕則愈益不顧也每大言曰人生有命吾惟守分爾矣長者聞此得毋厭其為迂乎鄉園多故不能不動客子之愁至于長者之抱才而困則又令我愴然有感天之與先生者甚厚亡論長者不欲輕棄之即天意亦不欲長者之輕棄之也幸寧心哉明文海卷一百八十五
