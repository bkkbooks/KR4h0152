body:
  text: 明文海卷一百八十六餘姚黄宗羲編書四十持正與林汝桓書霍韜傳聞執事凡僧田盡用公帑贖囘給僧果否此事于令兄方伯先生所議不無欠當而執事又復承行過勇故流弊遂至費官銀以庇髠者頗為名教之累耳方伯原意盖憤寺田盡歸權要又慮僧田既為權要之利則糧差必重為平民之殃又曰官府廢寺斥僧本以闢邪崇正豈曰反為權要而已乎夫抑權要以扶公法可也因抑權要而出官錢贖以給髠僧是衣冠士族反秃子不如也僧有一人而兼腴田數頃者矣有兼管數縣田業而至數十頃如光孝崇報者矣有司不問其游手坐食削小民以自肥乃于士夫之家則屑屑然較其錙銖之入是待吾類不如異端禽獸也是于禽獸反厚視士大夫反薄也僧田糧差視民田倍重非士大夫之愚者不取此為利以自貽子孫無窮之憂也不然則為家族之窮迫無聊者出不得已之下計耳當路君子曽不為之設身思曰承僧田果利乎害乎與其取此錙銖之利孰與不顧行檢或郡或邑漁獵數年以自肥乎士夫而利僧田可惡也不有奸贓汙墨者乎不尤可惡也乎京官全免差役十年而止爾承僧田而脱十數年之差役曽幾何時或陞外任或休致或物故則亦平人之家耳為利害曽幾何耶設曰惡其權要奪細民之利也則嚴為禁曰凡官户勿承田可也舉而屬之軍餉善為區畫以弭後弊可也或每都建一社倉嵗終出納巡檢守之縣官領之亦可也今既無善處之䇿乃逼迫皇皇奪既賣之田出官銀贖回以資髠僧者是此舉也始則戾魏公所以斥僧道以扶名教之意中則戾户部所以議處軍餉之意終則結果成就其抑奪士夫以取不畏强豪之譽而已自是而異類益横凌辱士夫誣奏風憲皆不可禁矣自是惟民田得舍與僧僧田不可斷給民家矣幾何其不驅平民而樂為僧也幾何其不驅禽獸以奪平民之食也幾何其不掩民田而屬之僧籍也盡力以抑士夫僅足以庇僧徒而已吾黨君子其忍不思及此乎且曰寺田自正管甲首以上盡數給僧惟畸零小戸乃充軍餉夫寺觀田土必十數頃非編里長則正管甲首雖三尺童子所能知也今曰畸零乃充軍餉則僧無復有充軍餉者矣棄置僧田以資異類乃曰淫祠田土盡數查出以充軍餉夫棄僧田數十百頃而不取乃屑屑算夫淫祠之數畝是猶棄岱岳而取塵埃也所較不亦舛矣乎僧田發賣雖曰賤其直適足以資權豪也猶可取銀數千百兩為國家之利今盡數給僧則不惟軍餉無措而銖兩之利亦歸之僧官司無所頼矣況復出官銀買田以給之耶僧田為權要所利猶吾人也今給之僧則舉而與禽獸矣豈曰厚禽獸而薄吾人耶夫權要承田固曰可惡然人豈有十數百年不死者茍死矣則子孫有求為平民不得者矣其為利為害可指日計也若舉而貲僧焉遂為異端禽獸千百年無涯之利遺吾道千百年無涯之害君子何不大吾眼界以長觀久慮之耶且當路君子若不廢僧寺則僧田之在寺所以豢養此犬豕髠人者猶夫昔也誰得而計算軍餉誰得而計算學租誰得而計算價直今廢而奪之人其人田其田盖因天地之利而利之也昔失之異端今復之吾人雖價直多寡固勿屑計可也雖軍貲多寡固勿屑屑計可也惟能放淫拒詖而奪其資生之源俾之日消日盡斯可矣何必屑屑于計小利之錙銖耶始也計小利以抑權豪終則舉全利以資異類為國家計者如是耶為吾道計者如是耶欲樹節槩以取不畏强禦之譽者計固如是其左耶此固令兄方伯憤激之過當而亦執事承行之過勇也生聞惟善人能受盡言生諒執事決能受此言亦決諒令兄方伯能受此言幸轉致此悃情于令兄俾其尚可達當路改議而執事亦宜盡心謀畫為令兄改過此大賢以上事非世路煦煦者能知也切勿重于改悔多為異説以自文為異端淵藪貽他年名教不可解説之累也辭建亭張居正承示欲為不穀作三詔亭以彰天眷垂有永意義甚厚但數年以來建坊營作損上儲勞鄉民日夜念之寢食弗寜今幸諸務已就庶幾疲民少得休息乃無端又興此大役是重困鄉人益吾不德也且古之所稱不朽者三若夫恩寵之隆閥閲之盛乃流俗之所艷非不朽之大業也吾平生學在師心不蘄人知不但一時之毁譽不關於慮即萬世之是非亦所弗計也況欲侈恩席寵以誇耀流俗乎張文忠近時所稱賢相然其聲施于後世者亦不因三詔亭而後顯也不穀雖不德然其自許似不在文忠之列使後世誠有知我者則所為不朽固自有在豈藉建亭而後傳乎露臺百金之費中人十家之産漢帝猶且惜之況千金百家之産乎當此嵗饑民貧之時計一金可活一人千金當活千人矣何為舉百家之産千人之命棄之道旁為官使徃來游憩之所乎且盛衰榮瘁理之常也時異勢殊陵谷遷變髙臺傾曲池平雖吾宅第且不能守何有于亭數十年後此不過十里舖前一接官亭耳烏覩所謂三詔者乎此舉比之建坊表宅尤為無益已寄書敬遣兒達意府官即檄已行工作已興亦必罷之萬望俯諒辭趙司馬留參軍務書陳鶴日來深辱欵曲廿年一日古道至矣感激何言兹者邊事孔棘足下坐制大兵江南震揺凡有世志者孰不欲結綬從事仰賛勲猷建業于青雲之路況足下惓惓于故舊哉屢承見留託以軍中重務當此良期慶幸無已然蚤夜思之但力有所不能强者三足下之勢有不可為者二而鶴之行有不可止者三也年來幽卧漸便習懶成性今復着衣騎馬趨侍軍門有急便行寒暑皆是此不能强者一也鶴素志獨立籌事寡同今謀士滿前言各自譽倘若利害係國未免舌戰目奪智愚混淆甚為惶恐此不能强者二也向以母妻連變哀痛過情近覺精神昏弱寢食異常起居癯癯逺不逮昔性耽瓦缶木笻不堪軍旅之事此不能强者三也足下天才神算所至竹解功成凱旋已在旦夕縱鶴通籍在軍無所事事功名難定徒増路人之訾此足下之勢一不可為者近苦家計落落若涸魚在車非勺泉可活今足下察視百僚威權玉潔雖周急之仁勢難處置況聞門下賔客多懷苞苴之私他日壞事辱名累連儔伍此足下之勢二不可為者且足下為院臺索坊書本欲揚譽以重鶴耳今各處從吏上計催迫過于官租簡帖迭傳急如露檄徃來道途日復數四使童僕外訝友類内疑半世逃名之人當此實為煩惱故鶴之行有不可止也荆藩遼王多才好事邇來逺書三及鶴感其殷懃許以秋間必至自分草莽安可失言于藩殿故鶴之行有不可止也袁使君在荆州一聞去音即寄書期遣人至臨江迎候今若少滯彼又當入覲北上負此逺情後逢何面故鶴之行有不可止也以是數者遂孤足下不世之德刀斧莫逃今將漂蓬荆楚心同雲水跡混漁樵甘饑寒而樂勞役是足下寛仁所賜也昨欲詣門告去又恐雅情相戀衣難遽分故忍心背義潜身上道回睇吴山悵焉淚下所望足下擴謀易制力督司府羣公簡節詞訟専心練兵先行陣竒伏而後膂力急各地鄉兵而緩義勇求賢士放常談信賞罰積財糧取交廣之兵為之爪牙屯閩浙之卒為之手足抑下人之驕悍舉軍官之才能今倭冦雖退尚當防其後謀土地雖安益須増其備具如此江南之民近或可以復業逺或可以安堵鶴妻子在越亦得賴其存活此勝霑恩于幕中多也鶴不勝幸甚與時元書符錫錫再拜白時元契兄執事間者數日缺然不面羈旅懐抱思欲一展布無由何者都城衣冠林立之地僕雖寡昧陋劣僻處委巷亦時枉軒車未嘗絶交于人而何執事思之切誠以世之泛然徃来固不足道或同鄉同志一時相與親暱如弟兄間亦有之必如僕與執事考德論文心孚意契自以為金石莫間者則或不可多得耳是故於漆生之行也執事徃示之贈章既而索和再辭弗允而且貽之咎僕連日苦塵事假宿于西岌不自安良以此諾未償懼得罪于執事滋深耳比承發軸兼示漆生欲令借一顯者名第竊謂此非漆生所以處僕者僕固未嘗識漆生漆生既受業於執事之門則年固未至也道固未幾也僕固執事友也固長者也漆生未嘗一扣僕僕之作當為執事非為漆生漆生安用使予為哉昔者昌黎韓子嘗代人求薦作書代張籍與李浙東書東坡亦嘗代張方平作諫書是詩文代人有何不可今有知己間命僕曰某欲有作偶爾未暇願假子一日之手僕雖不敏其何説之辭特謂居弟子之列求長者之作既而曰子無官不必得子之名請書一顯者之名則或未之可耳僕雖陋劣寡昧才不逮今人而志則妄意古人以是落落徃無所合然執事視僕豈深以得喪介于懐者富貴誠儻來物耳茍非其人而欲强予一言一字妄自取與為之容悦甚於衣冠坐於泥塗誠有所未屑者至如蘇韓二子彼固一時豪傑之士求之懇至而所以代為之者或欲振發其貧推揚其學與關涉利病於天下之故匪徒播弄文翰今雖不可一二追步推漆生之意實不過欲假此以夸耀其鄉之人人既欲夸耀其鄉之人宜乎亟造達官貴人之門而求之而何有於僕既為不然則執事抱韓子之技推漆生之愛為之代為何所不可僕固非汲汲於作詩以干譽者而每作一詩亦必㝠搜枯索未易卒成日來拙作既未脱稿隨亦忘之原軸謹用還納而復云云不能囊括者誠與執事相知之深執事且將為詞林宗匠計他日亦有以處僕者處執事雖仁度優容無所較計而文字當自珍重不宜因此反取輕時人為識者戮笑況無受爾汝又大雅充義之一端也尚惟亮察無謂僕老而益狂幸甚幸甚雨晴便期相見書辭不悉錫再白答錢象先徐應雷病懶杜門為常不能一造聆教欬耿耿百花菴僧持手翰至索詩以徐少宰出名令人甚訝何仁兄猶未知我一至此邪代作之事雖韓蘇亦不免載在集中可據況不佞乎然必其人以自已不能之故親自求濟于我則應之若旁人令我作詩而以進士出名則置不佞于何地此雖家中絶糧三日内人死盛暑三日不歛有人致千金索一詩以徐少宰出名決不可得此弟未冠時褊性如此五年前曽大書署壁甚嚴此一項請索久已絶矣不謂今早重煩一畨應答世人憒憒不足論仁兄不應通融至此明文海卷一百八十六
