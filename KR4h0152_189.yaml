body:
  text: 明文海巻一百八十九餘姚黄宗羲編書四十三忠告上張太岳彭輅丁未榜出三宰相而天更靳於李殷兩公獨畀閣下以天下之重意可知也既而受玉几遺命輔艾冲聖主巍然冠列孤卿之上無論天下之所注仰不訾即同榜後塵若僕亦幸太平丘壑置此衰殘誠不願如昔者諸君之以三年喪望閣下使一日離君去其位者惟是三年之喪為天下之所共有而獨五君言之主上以社稷計而怒拒之大臣臺省不惜異同而保留之於是閣下幡然以安社稷利生民為已任不三年服之苫次而服之官邸以權宜之術酌經常之制賢者作為固不可測但一時主臣上下若共去三年之禮而獨歸之五君然者則閣下於此計必有大旋轉大張弛足以厭服五君之心而與之持衡並重不使獨擅其名于天下至今未見也閣下誠有意乎則所稱旋轉而張弛者無過自五君始當彼譁然上章稱引古禮過為髙論非必出于邀名特泥于綱常二字若先朝羅倫之望李文達耳然文達之待羅倫僅以提舉處之天下以是不深咎李公乃昨嵗諸君杖之幾斃而削籍猶然丘里若諸逺戍則北去窮邊南投瘴海蠻貊羅鬼之使與居處之固為過當不知此即唐宋遷人藉以振聲名而到今者是閣下名處已以威權而實與人以地分也頃已改嵗踰時曷若召之田間釋其殳㦸或處之閒散或投之雜職若解縉之吏目河州陽明之丞貴竹稍稍引還所謂恩以絶日為厚而休休有容閣下度越千古矣更當知罰不嚴則名不震過不容則賢不顯故推轂光弼者汾陽之度量也引援希文者夷簡之智計也正譎不同而人並稱之儻諸君者一旦不幸䝉冐瘴癘不勝苦寒而捐骨遐裔則國史野記誠不忍以衡保之賢而有殺士之累也僕素以戇名敢藉鴈行故誼一致忠告不敢效望塵掃門之客日貢甘諛營趨晝日之市所欲者在其中也與周以言皇甫涍涍載拜致書以言周君足下僕不佞才有定源識無圓照外傳甫就從事翰墨沉酣經史俯仰自繩古之英豪博達僅有所得萬分一耳未足云巧也况乎人情世變曽未營營于念慮間能與拙者異談哉是以擯削日尋塊處無友獨于以言表裏相契若僕固無所取意者以言之多情乎僕誠何人敢負知已竊自惟度錢財不足以恤君之急聲稱不足以發君之光輒欲披情素吐憤懣長鳴于前以言誠為僕聽之憐其意察其説辭未畢而投屨激昻是僕仰酬知已之日也夫天以寛洪與人而以嗇薄與僕僕之自明必非王公人也安居鼎食必其異乎僕者也或不免一䇿名于朝亦未可謂必然耳僕之嗇薄于彼者固有所居而僕亦非昧昧不自摩揣悠悠久于妄庸者操弄筆硯旁羅搜剔苦心焦吻至忘寢食者十有餘年于兹以言視僕以為有所得乎其視古之英豪博達有與之相匹者乎使僕之未有得也古之英豪博達猶甚去之逺也而况齒髮漸改人事迫身雖有成就未極所懐每一思之神魂震蕩譬如委轡之臨深淵也好學如僕苦心如僕衆皆以為然而且未免過慮百思疚心未如僕者又將若之何哉今以言有聰明之資有浩曠之才僕嘗伏觀其三問原孝雜文友人書虎阜維揚逰京師諸篇琅琅可誦度其横騖䇿其雄力纔當展其驥足耳其用心深處又見于内經解鈎致𤣥㫖獨見超朗不蹈前人父子積習神明若扶而落魄不覉時復委散篇翰寥落收䘏莫顧惜此竒寶棄諸泥塵鏌鋣補履良工痛之以言之齒長矣忽爾浮沉筋力異昔雖欲驅䇿末路無從僕知以言後世不知萬年長恨誰任其悔乎後世不知猶有可説茍有知者重以言之才考以言之友僕不能移易其心成就其德匪人之誚亦將不免以言聞此能無惻然夫駑鈍者不前索居者寡聞天之與我者弗可逺時之處我者弗可挽以言既委于嗇薄之天而處其時矣有其才矣又有僕以為之友矣留滯偃仰自同時人以言罪過可勝解哉伏願專心極慮勉卒所業以僕書之至日為始刻厲逺期貧乏勿以加其好尚妻子勿以累其胸襟要其所之僕且瞠乎後矣是使以言不獲罪過彰垂無窮僕非匪人異代瞻仰盡此一言而已年序遷流握筆慷慨以言裁覽動色幸甚涍再拜與黄泰泉王漸逵不㑹將兩月餘欲常常一㑹冀有所講明彼此求益但邇來見吾丈應接太狹非復如昔時京都西甌初向之時常在越山講堂相過欵聚得以從容盡領教愛為慰也今之廣城士庶不知者則曰泰泉官髙望重勢則致然然而我知其非也其稍知者則曰泰泉自負問學勢則致然然而我知其非也盖吾丈賦稟翕歛泊無所好于事物之來若不干涉雖然此固美質也然而偏矣君子之學也求以變化氣質而已矣是故柔者養之于剛暴者養之于和翕者養之于豁隘者養之于𢎞駁者養之于純輕者養之于重蕩者養之于約盈者養之于歉使囿于氣禀者渾然融化如此乃謂之涵養謂之學問謂之聖賢真切之訣舎氣質而言學所學何事乎故程子曰得後須放開不然只是守盖為有所局者而言也吾聞管幼安兀坐一榻二十年當膝處皆穿可謂遵矩矣然避地遼東興禮樂設爼豆與衆行之而從之者數百家未嘗不開豁也邵堯夫三十年冬不爐夏不扇可謂簡靜矣然而與司馬二程相講論於洛者三四年故有花下小車之句未嘗不開豁也明道終日端坐如泥塑人可謂敦重矣乃其接物渾是一團和氣故有傍花隨柳之詠未嘗不開豁也朱子自守剛方動拘禮法可謂嚴厲矣然遊玩山水白鹿南嶽多有紀述未嘗不開豁也白沙之不見當道重于取予可謂狷介矣然豪吟於黄雲紫水之間寄興于五臺江門之下未嘗不開豁也是五君子者其植立可謂盛矣求其致此得吾心之樂而已矣得吾心之樂則欛柄在手而天地宇宙皆在吾度内夫何窮通得喪富貴貧賤多寡有無之足論此心之樂乃千聖相傳之秘訣也是故尋孔顔樂處尋此者也有天下而不與與此者也吾丈近日篤志于心身之學而于此猶有礙焉何也求身心之學而于此猶有礙焉則氣質未能純變而此心之樂終未能執其柄而超然于天地宇宙之外則官髙負學之議吾固不能解于士庶之言矣恃在平時過愛故敢于規諷自附于交道之末惟吾丈其圖之上陸五臺沈懋學不佞兒時即聞明公山斗髙名先大夫且辱莫逆交竊自附通家子矣顧曩困經生樊籠俛首幸兹通籍明公且為晝錦游無從摳謁願左識荆傾仰丰標大逾饑惄頃者聖明眷注晉陟崇階謂趨順風望光霽有期矣乃不佞病甚疏乞青山五湖返櫂即道逄仙舟北上莫能强起向牙檣再拜通慇勤也黯矣消魂可勝延結江陵相公遭逄才識千載一時宗社賴之真不可舍朝廷休居終制至奔喪僅違數月固人子迫切深衷自不容己者豪傑非常書生譚之變色且眷留既切相公既不忍辭而臺省交章幾于上言德政故二三子生死爭焉見雖蔽影心實持衡虚已優容益徴雅量昔者吕尚鷹揚而夷齊叩馬君子兩是之今日之事猶是也何過罪乎二三子即二三子罪謫自甘如天下人心何相公故豪傑而衆人不皆豪傑也詎能置百喙辨哉君子亦貴乎握機運化黙安人心爾矣邇者懇祈請歸視葬預定浮言潛培國體雖惜其稍失先後着而較之不行固不啻什百千萬矣人傳明公貽書諤諤稱大臣風節即相公至情定算擬有此行而明公之功自不可掩然不佞尤謂從兹以徃為相公計安社稷猶尚多勞尊慮耳夫詢謀貴博受善貴虚義取相成道羞偏黨故日月互藏其宅舟車各效其長鹽梅異味而和羮水火殊性而濟用功𢎞並育妙在同歸若伐異而黨同是升沉同景水陸淆途㸑夫執一物以烹飪庖人挾一味以調鼎而參苓薑桂不得同劑相佐使也必同已者而後與則協贊之庭無吁咈和氣之侣無虎爭麗澤之交無規切犯顔强諫不為忠直諒多聞不為益而朱雲魏徴唐介韓琦之儔不立于英誼之朝也豈獨才賢以取阿附斥哉又將有假豪傑非常之説以伺其意而售其奸者而讒謟面諛之人至矣語曰千金之裘非一狐之腋言用人也士君子操修盡由此道而相臣任天下重尤在所先上古諸名公所以顯鴻業垂休光並可考鏡而三代而下軌轍非殊是故户牖竒計智矣而交驩之策啟之陸賈曲江直道賢矣而軟美之諷取之長源姚之敏宋之毅才矣而知古今典厥政資之髙仲舒齊澣至懿侯擇術于盖公懐英儲藥于行冲新豐受召于子夀自昔相臣未嘗任已也如必同而後與則一已足矣何以人為昭代不設丞相而入閣辦事職在論思漸至擬㫖進呈受命稱政府盖權無所統勢必歸之入贊萬機出揆百職儻非翕受何以兼知仁宣以還居政府者若干人類皆以用人而裕用已而敗若嚴嵩之自用皆相公所目擊其敗者况才如相公識如相公老成諳練如相公寜獨不辨于此哉昔者徐相公𢎞度過信人言而持問諸君漫不相體參之私薦襍之曲説相公旁觀起厭預有所懲且主少國疑執持當定多言亂聽恐滋紛更以懲弊之心際鎮靜之時操凝成之柄而已之才識足辦經綸人之謀猷或迷肯綮是以不惑人而信已也詎知懲心每易至于過而用人在我道貴趨時尤未可執而不化今四方寜謐事有成規較之定鼎之初稍有不同似宜博訪深思相資為用曰私薦曰曲説吾置之不聽已矣何遽至併廢人謀也信己則聰明不克周知尚同則小人得以投其所好相公固未必迺爾而風聲氣象漸有可憂不可不為相公預計也且天下之事機決于意俗成于風意運而形從風行而化達今使天下聞風者皆曰相公不用人言而人更得以窺其意之所向此豈可以令之當世哉夫大臣以天下為一身原無異同原無恩怨頃者二三子之疏多常人語固未足與探相公心議天下事而意之端風之自相公獨不能超然逺覽穆然深思而遽以異已懐忿心僕竊為相公不取也杖謫言官處之誠為過重而片言不捄人或心非在相公固將謂二三子以我要名肺肝未淨不知二三子由此立名渺乎小矣而相公倘一優容便同覆載明珠照夜螢火無光太陽東昇繁星自失譬之波横江海蕩乎無聲而大浸稽天洪濤浴日固無競于溪澗之急流也彼急流者順之則潺潺耳湲湲耳扼之則震蕩相公不忘二三子反以堅書生之説資孺子之名是所謂擇細流而扼其急奔之勢也何取于善䇿哉相公才如此識如此遭逄如此願附青雲樹勛業者誠惓惓不能舍而相公亦自謂能留心天下士嘗手記而心存之獨無敢言于左右者即欲有建明而英風獨智位絶百僚疎且卑者言未易達達之亦未易詳不佞辱年家子意最渥知最深思效一得之愚數矣而近名是懼出位是慚又竊見疏中語一則曰狂童二則曰奸黨三則曰憸邪若終未忘二三子也者不言則慮在國家欲言則恐招尤悔而彷徨過計抑欝深愁竟成心病偃卧百日餘遂乞骸骨此意故未伸也第念明公德望才名素為相公推重非明公不能詳言亦非明公不致深信故敢吐膽下執事夏五相公當奉命還朝計得與明公參宻議伏惟擇可言之㑹收罕譬之功釋諸子以安人心集衆思以廣忠益使相公為全人建全業聖世屈全䇿得全昌國家臻全盛享全福天下幸甚萬世幸甚病中謹陳崖畧未罄鄙衷伏帷崇照明文海卷一百八十九
