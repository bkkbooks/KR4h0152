body:
  text: 明文海卷一百九十二餘姚黃宗羲編書四十六考古上侯城先生第二書王紳向者不揣愚惑輒獻瞽言於左右蓋祈執事立言著書以振天下之聾盲情激於中不覺覼縷執事以為然耶談笑納之俾副其望可也以為非耶訶叱而麾斥之不為過也今既不遂其請顧乃賜答以千數百言若有所論辨者尤見執事之德之𢎞不以言之不善而遺之獨固守其謙撝而不變又且道之使盡其言者是豈紳之所敢望哉然而有不可已於言者故不得不終其説也執事懲揚雄王通之徒未明道而著書為無益於世遂欲躬顔子黃憲之行俾默默無片簡之可傳而後已是猶懲人之病風而惡出畏人之溺水而却遊也不已矯之太深而過情也哉且天之生聖人也豈特獨厚其身耶亦將用其有餘以補其不足耳觀乎堯舜禹臯陶益之典謨髙宗湯武成康伊傅周召之訓誥若孔子之所以刪述曾子思孟之所以繼繩其大要皆所以成已而成物也以是聖人雖不世出而斯道不終泯者以有斯文之足徴也今執事又謂斯道近世大儒剖析刮磨具已明白縱著書不能加於孔孟故辭讓不為是尤不可也且所謂成已成物之道六經已具載矣孔子無言可也而猶不忘於弟子之問答孔子大聖也其言該博無遺宜若無以加矣而曾子猶用心於大學子思親承曽子之授且聖人之澤未逺可以忘言矣亦汲汲於中庸孟子時異端雖起茍舉聖人之説而闢之亦可矣乃反覆乎七篇之言至周元公道絶千數百載文獻昭昭尚在也亦必以心得之妙筆而為書其後若二程子若張子若朱子若吕子輩莫不各以著書為事其餘紛然作者不暇論彼諸聖賢者豈不知天下之道一揆也聖賢之至不可等也然且鰓鰓焉若此者所謂畏天命而悲人窮至仁之心也今執事言行皆取則於賢哲顧獨於斯而避之此紳之所以未曉也且執事之所以修於已者美矣而士之所以望於執事者亦至矣正宜寢不安席食不下咽拳拳夜以繼日而圖副人之望尚何暇恬居安處而俯與紳論辨去取乎哉唯執事深思而毋忽與徐仲章書凌翰春仲舍姪歸匆促殊甚乃不能折一東纍辱存問何以報之一向風翮不到六月水災乃爾太酷蒼奴八月始得其悉窮山杳杳可知也某自去冬辦得邵武府志在手俯仰出人下甚不如意論欲公而撓於前筆欲直而掣其後且恨此地乏才遍郡中無一人與語者某竊計之府志之作昉於晚宋而盛於我朝今之作者類例取法於一統志固無不可但馬遷史記後世史學之宗也郡志既一郡之史則取法於遷可矣故為六表二十四書十二列傳以盡括一郡之事而每事必致之意焉其格既非今之郡志比而直書公論於人或有所不堪故上下交以為病又區區鄙意一毫不逹於上且或從中止之今且廢閣矣半載辛勤雖成虛話然亦不可不謂之幸也大抵此事必位尊名重者為之其在於某正所謂力小而謀大者此書一出郡人不免大譁或者偏見自是不得良朋一商之播之四方安得無議既無以厭服郡人又無以解嘲天下廢閣之幸豈非誠然幸哉幸哉地僻無可與言友朋暌違隔絶千里不能時接髙論家奴還鄉亦漫及之婺野淡泉子巽輩日與周旋樂甚某欲各奉一狀多致寒暄亦贅辭耳請一叱之名焉則盡在此書矣不盡與沈吉士書姚翼古之儒者其為學也精而專其談經也雖其於聖人之大指或中或否而要之各能成一家之言以授其及門之士使轉相誦述以不改其説是以其師或終身焉無所遇而困於草野厄於下位則其門人弟子之得時而行道者往往歸讓其師曰此某氏易也某氏書也某氏詩某氏禮若春秋也是故其師之説得以著於人人而或因以顯其身載之兩漢儒林傳者班班可考也今之世號稱經師者其所授受不過分章截句之間又皆互相剽竊於陳編舊簡之中而非有出於胸中之定見不足以稱某氏之説是以其徒之所習亦未嘗專門而無改而其間豪傑之士以明經登兩試踐華履要者皆其自得於研窮討論之餘而非其少所傳習之故雖或間有一二耳聞亦雜焉而不復知其何所從受如是而為師者欲因及門之士以顯其身名其亦難矣是豈學於人者之不如古哉僕於虹臺僣有一日之長僕困厄無遇而幸虹臺兩試高第為天子侍從之臣深愧昔之談經不能精專如漢儒使虹臺今日得謬為推讓以存古道獨生平所為古文辭數首雖不足以齒於立言之士而播諸人人或亦見其少出流輩向辱虹臺序次而表章之此即古之遺意也特附往二種共十二册遇有部使者督學及他當路諸公自京師出豫章者幸即以此為先談則僕之賴藉於虹臺者多矣所從附者門友談子以恩貢上春官乃淦庠佳士虹臺肻推薄分亦通家兄弟也古之愛是人者猶及其屋上之烏而况其友乎惟虹臺念之餘容嗣布不悉與少司馬曾確菴論統部書趙貞吉頃為著録事邂逅之間率爾以書史相凂託又承分惠廪餘對之含愧然録書事不中止則此助不可辭也夫僕少日已有此意矣鄰老復圖之知日已暮故走欲速耳恭惟我公進輔聖明平寧四海使元元樂生而他山有遺老焉垂白把筆日孜孜揩拭簡蠧時求新意以答來學豈非粧點太平之一事乎嗟夫道之不明久矣世無正眼史失其職道術分裂紀述無辨後生不見古人之全因仍俗學老不知有向上事豈不悲哉嘗謂世無至治因無真才世無真才因昧正學世昧正學因無正眼夫具正眼者紀述擇法之人而史官之職也昔夫子之作六典也春秋其統也書詩其制行也禮樂其藝志也傳具體於統而術藏用於易此聖筆也舉其宏綱而百王之道同經世之法備此之謂正眼司馬子長氏世守史官欲繼仲尼之業敘六家指要以見己制作之義卓矣惜其擇之未精也夫周衰天生三聖以勞世仲尼也伯陽也子羽也謂之天𨽻生以經世者也其任判其歸合者也其徒紛紛而道亦流靡夫刑名儒家者流也隂陽道家者流也縱橫墨家者流也今以其業之流靡者與其人並列而為六可乎于是班生增為九流自後經分專門業有百師法承千訣離而不合散而不牧以至於今矣此僕謂前人法眼未具之大略也茫茫宇內逝者如斯誰念之哉嗚呼小子何敢讓焉欲為我明增一斯文赤幟以摩前史之壘而奪其竈敢對敵而稱無勇乎往者聖水寺中奉晤夜談語之粗具今復舉略而言之已於此際掃室落筆欲先造統部夫統者子長以為表鄭漁仲以為譜朱仲晦書甲子于每年上以為繫屬於天丘仲深畫圓相書代號於中而黑白之以進退其人諸史於此注意者鮮矣某以為統者君道也天命之所在也厯數之所歸也九州之所往也正朔之所自出也夫子書王正月大一統也統不先正何以經世故其書先統夫統者圍而無外之義合而為一之名也有天統焉厯數是也有地統焉九州禹迹是也有人統焉九州共主民所歸往之一人是也夫天統無變更也地統有分合也人統有正劣也自今年乙亥逆推而上至秦平齊始皇帝即位之嵗皆書其每年之大餘小餘而定氣朔之度與交食之刻於簡端焉謂之長厯雖赤蕞焚臍青衣行酒大壞極亂之代而沖漠之運未有一息之停故曰天統無變更也堯命舜曰天之厯數在爾躬是數也氣歸於一人焉則代天而承統而天必與之以九圍之地是其證也故合九州而圖一圓相以著於甲子之下每代之上為地統焉夫地統本無分合因人統有正劣而後有分合也何謂人統有正劣圓圈之中著一畫焉即一人也一德也天命人心所歸而正朔之所自出秦漢唐宋創業之君七制三宗守成之主皆是正也然正不可常繼必有劣故繼之以孛一變而為孛孛者太陽之戾氣人君失度之象也孛必有逼而蝕者起故繼之以蝕蝕有四義焉上者母后之逼也下者妃后宦官之逼也左者強臣異域之逼也右者權姦柄盜之逼也逼蝕而不己必既故繼之以既既則書統亡矣夫亡者人事之未定耳天道穆穆可得亡哉既而繼以彗以彗即孛之戾氣流毒而四溢也四海土崩羣雄戟立而九州無主有雲擾草昧之憂有掃舊布新之兆天命若定則復為一如其未定焉則勢必分故彗後繼之以分自分而上至於孛皆稱為劣夫均一統也正者一而劣者五天人去留之際世運否泰之機皆係於一人焉經世之主觀之可不畏哉可不念哉又按有蝕未既而即復一者漢文帝是也以有臣也蝕既而能復一者東漢是也以有君也有食既不可復合者故蜀魏吳為分於戲九圍不綱民將安仰昭烈雖賢史臣不敢先天而與人以統蝕既而勢大合故元滅金取宋而定一於戲九有己式民將安逝元雖外徑史臣不敢後天而奪人之統所謂因人統有正劣而後地統有分合者此也乃豫作統部之大凡也此段本不當重書以擾清凝而始事之際技癢不少舟中取而觀之以發一笑惟冀寧養愛時赴闕遄發功成而言讓標秀而容恭朝乾夕惕為名臣之冠以慰老叟逺道知己之思滿懷滿望與胡掌科論隂符書徐霈承諭隂符經乃戰國隂謀之書朱晦菴注釋之過矣余以為不然昔揚雄作太玄法言以艱深之詞文淺近之説好之者以謂過於六經若隂符之書極有至言未可以詭異而忽之也吾固表而出之其曰人知神之神不知不神之所以神也人有思慮知識神矣然有所住則有方有方則限於一隅而不能神天下之神無思無為似不神矣然而通天下之故盡萬物之變者此也非不神之所以神乎此理易中具言之非隂符杜撰也又曰性有巧拙可以伏藏九竅之邪在於三要三要者何耳目口也人開眼便逐於色聞於聲神馳形散何能作主惟於三者而制之則外無所攖內無所著神定而形完可以變鈍拙而為巧智矣又曰瞽者善聼聾者善視絶利一源用師十倍即莊子所謂用志不分凝于神瞽者聼聾者視志不分也故能善天下之視聼絶其一而專於一則其功十倍矣神之所以神非以此哉又曰天發殺機移星易宿地發殺機龍蛇起陸人發殺機天地反覆其盜機也不可見莫能知似戰國隂祕之書也不知殺機者只是變化運用之機如弩之發而其機在牙毫釐不可爽也得其牙而制之捭闔在我張弛在我百發百中而天下莫能違也又曰君子得之固躬小人得之輕命如漢唐諸名臣得其機而善用之故轉移君心樞紐時事以成天下之大功所謂君子得之固躬固躬者安其身以安乎國家此機不可無也儀秦之徒亦窺見此機故揣摩人情曲盡時變縱橫六國世主無一不售其説但其用之不善以濟其貪欲之私故至殺身所謂小人得之輕命此機不可有也又曰自然之道靜故天地萬物生天地之道浸故隂陽勝隂陽相推而變化順矣余謂天地萬物之道靜故生隂生陽而萬物化生亦翕聚發散理自然也然天地之道浸故隂陽相推而變化順浸之一字最好玩味隂陽漸漸消長故能運化寒暑之極至於折膠流金而物不以為病者其變者漸也使此二極者相尋而狎至則人之死久矣聖人之化如寒暑晝夜亹亹而不能自己者亦漸也故雖變革之際亦必已日乃孚革而信之不駭民以強其所不欲天地聖人不以浸哉細詳隂符前後三段一論用功貴乎專二論施為在乎機三論成功在乎漸而總之以不神之所以神也中庸論至誠能經綸大經立大本知化育而歸之以無所倚易論範圍天地曲成萬物通乎晝夜之道而知而括之以神無方而易無體相符合也惟誠則不倚惟神則無方無體兹其成經綸範圍之大業也聖人豈欺我哉隂符經出於鬼谷鬼谷宗乎老氏皆古之格言大順不可以詭異之書而擯之也故從而表章之惟髙明折衷焉不盡明文海卷一百九十二
