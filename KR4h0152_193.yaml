body:
  text: 明文海巻一百九十三餘姚黄宗羲編書四十七考古答張天賦秀才書祝允明汝徳秀才足下寅簿范君來接手書辭義藹然僕恒歎今時俗寖窳古風閴寞士大夫相臨以位當其時翕翕如鐵磁一分㩦頃便邈若山河寧復望肻一勞手筆寫心以相浣也忽乃遭此慰悦何量故頗為細條足下諸端而更以平生所得一二繼之以極所望不負心契夫足下之旨盖以僕為有徳為有學為能文為能教育為能進顯位嘻僕何所有而敢當是羣美夫徳則多目矣自聖人全之賢人失得叅有觀古人蜚光來葉或以忠節孝睦若政術勲華循良剛鯁博厚狷介文藻髙逸伎術等類不可枚數如僕者乃誠于徳多好好而弗能得也髙明沉潛猶弗能就其一况克而中乎中則全矣雖弗得實深切刻其心謂未有果無毛髮之善而猶人者故平生摩厲若自得銖分不敢以謂人也獨惟弗能且已以為將口持之以進夫人或因而信之遂由以成德我雖不肖令天地出一善事成一善人不既美且樂歟所以每事輙徴古今人可以長人者以類舉而諄勤焉足下所謂教育者亦殆此類耳然而其力幾何夫所謂成德建名乃不一塗豈於今而不然是故忠孝大節百行細目患不果為無患果而弗成患不果成無患成而弗名吾願足下之為善由是而益果也果而大就也凡在此日為善者尤以勤勇二道為難更願足下之果益加䇿功在二者也勤校分隂勇先萬夫齊賢作聖誰恡誰沮吾料足下接愚此言應犂然首肯心協而頟頟矣乎世人為事類欲先立門户幸足下務其實毋尸其名凡人好夫指一而期之指一而譽之且咈爾不怡然從䆒之口身而身一者亦庻㡬矣其口最以所謂道學者為髙然由僕論之最非美者道學也道學豈不美乎為之非誠其病不勝故為不美之冠斯習嶺粤特昌深喜足下慎思明辨之也德之可為足下言者如此足下以僕為猶或常仕此中此特足下愛我獨欲之愚恐足下外無一人欲之也而况於僕而自欲之乎僕誠不善仕其故大率不能克己不能拘人不能作偽不能忍心視時之仕者若神人然安能企及之哉幸足下尤勿以此相俟又况末所謂擢且重寄之云乎夫以是三者待我我皆末之承矣唯若所謂學與文者可為足下深言之因稍舉其梗槩引而就足下之所有所切者會融而陳焉足下之質頴矣才邁矣功勤矣學厚矣文美矣頴乃求求勿茍於細邁乃徃徃勿岐於側勤乃投投勿虚於邇厚乃積積勿累於粗美乃善善勿機於凡學者士之食也質者學之田也才者學之稷也功者學之耒也文者學之饎也凡人之質千科百倫然而人之生斯世也古今一也其支骸口目膚髮無不同奚有於質而獨以後先異然至要其歸每從世而下矣何哉斯非質故也氣易滿盈惰悠日時誤其一也志念不卓狥世逐俗誤其二也碎尺璧以作光耳翦匹錦而為履綦可勝惜乎惟才亦然古今之禀既同或同髙而効不同等者其病猶質之自誤也縶駃騠于漕車艤風檣于磯杙如之何而達歟故足下之質如完璧匹錦才如駃騠風檣吾願足下有以成之達之毋碎琢寸翦縶而艤之為也至所以成與達之者其方并列諸後即學與功而一其事者也夫學成以勤疇其不知然而古之為勤何如哉葢將役分隂如窮年用寸跬若千里語其至者殆千萬於今士矣僕嘗聞鄰院童子僧旦旦起誦其書無一朝廢或時見之問所記未㡬己易一編稍久已數十其書視儒家言尤難成誦予因笑曰彼為此者上欲作佛下欲成為僧以自飬一生爾今為士學者上欲為聖賢君子下欲不失為儒生取官禄爾即不為上為下且不與彼庸孺子欲為一僧者同力是斯童也勤於不勤之士也知成在於勤智於不智之士也知而克之勇於無勇之士也今士動輙非僧佛此一學力己弗若之矣則今之勤學者抑亦有若古之勤者乎雖然葢有之我未之見也古之為學者何也至於今葢亦多變矣其在於初將明理修身以成己用于時以立政安人建之為志行之為行施之為功業宣之為文章充充如也己而日以壊且浮大較以為人士以為人期其身世以為人期夫士由是徴辟舉聘之制作于上徵辟舉聘之身起于下其道乃是而其實多非自夫子之日已病之矣逮乎唐宋以迄于今寧獨為人而己乎其間不能以縷計波衝飈顛馳汩繆迷日不可支而壊焉一壊於對䇿又壊於科舉終大壊於近時之科舉矣且科舉者豈所謂學耶今姑即以論其業從隋唐以至乎杪宋則極靡矣今觀晩宋所謂科舉之文者雖至為獧譊亦且獵渉繁廣腐綺偽珍紉綴釦鏤眩曜滿眼以視近時亦不侔矣其不侔者愈益空歉至於憔悴萎槁如不衣之男不飾之女甚若紙花土獸而更索之無復氣骨彩毛豈壯夫語哉而况古之文章本體哉而又况乎聖賢才哲為己之學之云哉今為士髙則詭談性理妄標道學以為㧞類卑則絶意古學執夸舉業謂之本等就使自成語録富及百卷精能程文試奪千魁竟亦何用嗚呼以是為學誠所不觧吾犯衆而非之然而非有知己有所為如足下之問焉則何必語乎是亦招尤之術也今為足下則盡之意以足下於此業己精詣其於時取不取非業之咎勿徒止乎是以為學萬分一慮足下以此質才與功學者專止乎此則是前所云誤用者之類也既語至是因即請道其方凡治經者先誦其文且未思其義言言不遺矣乃取漢賢註傳而窮之次取漢後及唐賢䟽義而窮之又次取宋賢所傳者而叅窮之決擇自得於己斯一也己今士從㓜便讀宋人之傳少長從舉業師一繫足後更無還期薶首泥目甘意睫下與聖門遥遥傳胄漢至于唐諸師永不識面悲矣昔觀皇祖開科詔㫖士治五經皆先以漢唐注疏叅以宋傳不知今日何為而不從聖訓也或者槩諉以朝廷以五經四書性理大全書為準的是矣又不知太宗亦有詔㫖必令禁斷古註疏否歟先後聖人然則果有異同是非耶故僕勸足下宜尋十三經註疏窮之當自有得乃自有謂非可一旦强聒聒云也若患嶺外無此篇籍幸力致之或他日仕達得之猶且加一畨力亦不至如前所云也此治經也其于史也先取春秋内外傳乃至漢史以降及宋元十九正史治之君紀臣傳以繫事者爾爾志以繫制度時變者爾爾得失分矣㡬業彰矣勸戒辨矣於是他籍係史而今不恒綴之十九編者如後漢㡬家三國㡬家之類求得而通治之他如通鑑之屬史通之屬少有簡輯議評之力者繼之野錄覇書私史小說之徒又繼之斯可己今人自㓜則以近人所類故事等迨為舉業便事勦㨗畢工於短簡挾策若所謂少微鑑史畧之類而歴世本根國書罔聞知倘逢一疑覔一徴茫無可尋若固應爾吾又不知此何學也請足下取十九正史者治之漸以及他若上所刻節本摘編一閲而去精評謬斷收擲剛察決擇自得要于有用大畧與治經同也經史以外百家子類然也勤求決擇自得致用與治經史同也毋曰台惟知漢董隋王唐韓可尋也猶未歉也而餘不知也又毋曰台惟知周程張朱可師也無可議也而餘不知也此非萬世之論也僕斯云云者亦春秋知我罪我之㫖非可一語為足下立盡之足下倘從之自知之也凡治經史子極於問思辨者皆學也至夫篤行之則為己者得矣凡典冊不越經史子集集亦學也或以為為文爾集固獨文其間用有與經史同焉又烏可以不博此與為文之說一道故遂言及之夫物必有則亦必有容有則者必定乆而小有變移趨時其定者不可議而更正應屢救以回舊貫文章者物之至精必有則必有容有則有定由時小變正應屢救以歸舊貫要知若縫人為衣舉綺紈布毳精疏殊寛縮益損制度殊及其成衣一也奈何論文者狥今并反乎古要自宋後繆極於斯嗚呼豈有古今相承千載而下數口翻覆遷易乃欲為定辭耶今人㓜小輙依閭閻童兒師教以書市所賣號為古文者一踏舉業間即遥置度外矣又欲自進亦錮蔽於宋後陋談問文曰祖韓又曰韓柳歐蘇耳問詩曰宗杜又曰宋猶唐耳噫闇矣哉黙而知韓杜等者貴矣知韓杜等未足擅衆而止焉者㡬人焉知韓杜等未足擅衆而止焉者又貴矣知而自信以自遂又㡬人焉斯其誤寜小小然嘗使平列今昔文家吾為第差之一決若陳算無或凝塞如將聨及近來則吾不能矣每遐覽先英以逮後來便將狂哭九京亦不知斯文何厄何振當即返正乎歸而還乎以為今是昨非一成而勿議之乎何為同人於野者寂寂也然此猶不可與羣語與足下而不語又不可故畧為云爾復不自己啟一要術為足下贈大都欲務為文者先勿以耳目奴心守人餲語偎人脚汗不能自得得而不佳者心奴于耳目者也請告汝德自以吾目累察而上之觀宋人文無若觀唐文觀唐無若觀六朝晋魏大致每如斯以上之以極乎六籍審能爾是心奴耳目非耳目奴心為文弗髙者未之有也至乎元與本朝之文雖佳者亦無必多視其否者請與絶迹毋令厠我靣側終日跨蹇駑不越數堠一乗飛黄便自千里安可忽諸足下以為吾為有學為能文吾豈有一能者哉能言之如此爾大略足下淵淳虛白大似黄叔度英秀朗察復如楊德祖誠具羙之器超時之珍也僕所以欽愛而不忍舍既己成而猶求進也大發而猶祝也夫古之學如彼其䆒如彼今之學如此其䆒如此是何遼絶也成否而己矣成否何也勤惰而己矣勤趣好而己矣成也存乎勤勤也存乎好好也存乎識真不真真而以好則必勤焉勤則必成焉一黍之食一黍之力烏有絲毫事茍不勤得之又烏有都不勤極恐勤之不當勤不當最切誤事凡具上諸語吾以為吾汝德語秪是耳載願汝德省之為可用力與不可汝德意置之承邑志之訂甚善比僕自校有三五誤處劄出改本付殷生脩刻亦未知停當否乙亥字誤亦己告之今仍發諸誤處去煩足下更一取版觀如未改盡煩就以此書示諭殷令即改定序文之作尤承厚雅請即速為之以慰懸懸但書無前後序之說在後者當書作䟦尾或只為序不用後字亦庻也僕乆以家事未行不幸殘臘添一丁數日而夭老懷方此作惡以足下至愛漫及之此月念八日前後決行矣髙文早寄一觀然後請逕自入書但刻工之費未辦倘可成刻千萬印寄一本某頓首正月某日書發復沈啓南史明古書張寧承來諭文斐之作甚美事非二公其孰能輕任此責無忝無忝寜聞舉大任者無餘力當衆議者無全名海内百二十餘年英華氣節盡萃呉郡必遺稿充棟極數十年之精力乃可言備幸毋以述而不作為易易序首引孔子文獻不足徴之語極是博雅則所謂文者實自學行中來不在於文章末技之班班者其義例所關必當有大規模大綱領此古人所謂大義數十炳如日星取舍刪定斷自至公不必恤於好惡而微詞假托以為自防之具一舉所謂無間窮達惟文是取善矣而乃昌言僧道異端悉録前孔子所謂文獻固若是耶附㑹牽强猶不足取而墨行儒言則偽語也乃反取之若不可為訓茍有甚不得已亦湏附作别録不可自公為格例也二舉生於元季卒於本朝其間出處終始仍防關渉不宜止以生死為準三舉生者不收固自有為非欲盡録其全集不必言著作未終而亦難比史遷立傳之例也近世堂名别號文字濫溢誠如四舉所言設若有如待漏院記政事堂記者可例棄邪官盛而文不彰自應無預何必復言况立功立德立言本一原也豈可謂自是兩途此言大誤若自是兩途者即所謂文獻矣大抵聖賢之文不得己而作若有之無益無之不為損何取於此文古人謂無關世教雖工不録此編集之大閑不必復生節目也寜老病荒惑識見淺薄承來諭枉及茍有所見不敢不盡所以盡朋友之意耳若執經議禮肆為贅詞不敢也不敢也明文海卷一百九十三
