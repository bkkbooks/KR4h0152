body:
  text: 明文海卷一百九十四餘姚黄宗羲編書四十八考古上徐少湖閣老書陸楫㳟聞玉堂教士模範寰區將來館閣之英盡屬門牆桃李邇者龍湖公南擢我公特奉温綸得以專教而視篆台垣伊邇聖眷曰隆野人籲天曷勝遥祝楫無似生平見先文裕公最留心典故每論吉士之選本出祖宗深思欲令讀中秘書以備他日樞機顧問非欲其誇靡逞竒作風流學士也今明公柄鈞鑄之任小子不自量偶欲以經生之見一塵清聼譬之採芹狂夫率獻技于禁園花下雖迂陋可笑而一得之誠恐亦為上林虞人所不棄葢是選昉於永樂之甲申其後名賢碩輔多從此出至天順甲申科人以為竒運故吉士自西涯李文正公而下皆出英廟之親擢號稱得人時張簡肅公劉忠宣公與焉二公每館試輙嘆曰吉士儲養止此乎遂乞補外曹意圖以功業自見時李文達公為元輔嘉其志而從之後簡肅忠宣並以勲節表著為一代名臣我公自弱冠及第儲望詞林楫自髫丱時見先公與公握手論朝典意氣無間不啻所謂㤀年之雅而我公生平大學問徃徃于國典朝章刻意考索未嘗屑屑于詞賦綺靡之學今董習諸生必能以身教崇雅黜浮敦本抑末俾得搜訂百家上下千古而尤最且要者莫先于䆒述朝章及前輩風烈以為他日敷張實用若止於某日試一詩某日試一賦其士輩之相切劘也亦止曰某人一詩優某人一賦優而於經史之實學典章之沿革漫不深求則雖軒輊王楊馳騁屈宋亦不過嘲㺯風雲流連風景以為粉餙太平之具何足以深副國家養士之初意故劉文靖公嘗謂學詩到李杜亦只是兩個醉漢先公外集曾載此言謂雖抑揚太過然其意則逺矣文靖經世之見其言有不可廢者我公以為何如楫無似辱公國士之遇㤀形㤀分葢有年矣故數敢以芻蕘狂談謬獻於清光之下猶之籧篨戚施千醜並露而父兄骨肉憐之念之卒未嘗舉手而推諸溝壑倘或使聞之諸士則惡疾在前人將掩鼻而過之矣惶恐如何惶恐如何上季彭山師徐渭昨恭承夫子書教知解詩已至桑扈渭亦甚欲一趨侍函丈以受面誨今且未能然愚意竊有所獻大約謂先儒若文公者著釋速成兼欲盡窺諸子百氏之奥是以氷解理順之妙固多而生吞活剥之弊亦有此正後儒之所宜深戒者不宜駁先儒而復蹈其弊乃復為後人弄文墨之地也觧書惟有虛者活者可以吾心體度而發明之至于有事迹而事迹已亡有典故而典故無考則彼之註既為臆說我之訓亦豈身經彼此詆譏後先翻異辟如疑獄徒費搒掠考訊之繁終無指證歸結之日不若一切赦放尚有農桑勸課之典休養生息之政可以與民更始者也夫子道明而意見歸一才敏而決斷精果其于某氏决知其不可同日而語至於渭所妄意於文公者亦或夫子之所欲聞而不深棄者乎渭始以曠蕩失學已成廢人夫子幸哀而収教之徒以志氣卑弱數年以來僅辨菽麥自分如此豈敢以測夫子之深微而夫子過不棄絶有所得輙與談論今者賜書復有相與斟酌之語渭鄙見所到如此遂敢一僣言之然渭之見亦非若今世人止夫子以絶不著書也姑以著書而言亦正欲夫子涵泳其所為活者虚者而事迹已亡典故無考彼為臆説而我亦未嘗身經者則姑闕其疑耳若謂恐臆説之足以惑天下便以數語立斷案而該之足矣不煩一一自為一説詩書無口寃直難明惟夫子試少思而再示之以開拓渭見之所未到吕公防海事宜謹収覽其得主良慰所論趙事誠有之真可慮也入秋酷熱伏冀節勞寡思加食多睡千萬千萬奉葉龍潭邑侯論志畧郭造卿嗟夫志而無文則行不逺况并其事而失之尚何志為哉邑之秩官舊未有碑即國初濶略多矣况宋元乎生嘗為補之稍易為表視志加詳志選舉尤舛且陋生為考頗詳于唐宋以人所渺知也因嘆邑之為陋日乆先世有顯者子孫至㒺聞知間有妄榮先世而贋入其科亦無能辨之者文獻之失故也但其先世若此必非鄭俠者流矣至官兹土者則按徃籍欲考其遺愛之迹什不得一也且併其炳烺者而湮之嗚乎甘棠猶思况其人乎今試枚舉之有五六人焉在宋或為理學名儒在元或為封疆死守竟軼之彼爼豆者何人邪古志載令有時淇朱元慶者皆有生祠而不為傳故今人莫之知鄙生知之亦不能無疑焉以其他無所聞苐巧于取名己爾邑宋人物章章者如林栗之風節立論宋史亦多之志為其異于朱氏削其事而加詬病何其不廣也夫道大矣何必同哉蘇氏異于程朱未聞蜀不齒之也若林仝劉仝祖之一家死宋載之史并忠義集矣志乃失之今有指其故墟目之為叛可慨已周頑殷忠自古記之乃尚習異域言而使忠節昭爍金石者反䧟于叛逆之科非秉志之罪邪若夫名宦卿賢二祠則又秩官人物于此乎考鏡所以褒徃勸來甚盛舉也顧前輩之綜覈傷嚴而後進之請乞太濫其濫者以俟論定嚴者雖曰齗齗不無可議矣郡志載祠三人宋劉詵林槩林希逸也希逸乃宋儒熊禾所議而詵槩又成化間名督學周孟中所增邑祠遺之豈有祠于郡尚不足祠于邑者歟官而有功兹土當血食于千年者祥符陂宜祀郎簡天寶陂宜祀莊正柔陂水所及之地未嘗無淫祠既釐正而祀之俾後之修陂者配焉豈非祀大功于民之義耶元鎮州事陳瑞孫與妻子同死甚烈此封疆死也志既失表之祀遂無聞則昔之守封疆者不死乃嘆邑無死難之臣也可不為沈痛哉謂宜即社學或改淫祠為堂為寢堂以祀瑞孫寢以祀其妻女舉廢典而表忠懿不亦可乎至於烈女不為朝廷所旌有司所奬者獨頼有賢人君子為之志以補旌奬之所不及而聞于後世若志失紀則無傳矣乃以陳瑞孫妻女同死王事在通志及福寜志可考也而邑志獨闕以其昭爍如此則他之泯没者何限哉邇復有感於一二葢逕江林侹夫婦之以節孝死足以揭日月而行天當道顧喜察而過疑之吏即沉其牘而不為之再請抵今且將十載過此誰復知之者海口韓氏婦之沉江可謂烈矣能明其所以死豈但烈哉其處變葢幾于聖矣薛給舎廷寵之繼室衞不獨以節顯且成其女若婦之節當其毅然捐母兄萬里間關扶櫬歸而面壁洴䌟絖也詎非烈丈夫所難哉比倭難興則化北里民林應科妻余氏永賔里士張季臨妻林氏皆以姑為所執挺身代之義不受辱赴水死兹皆耳目覩記抵今談之猶令人骨竦乃不獲一旌或奬於有司以慰其靈為風化勸是誰之過歟他若志地理則當分里而圖之如峽江羅先生所叙者庻幾當職可按圖而理也不則産其土者尚不能達于心目况來宦者能一一而瞭然乎故必聨屬其原委而表其發源如言某山而南某水屬之某山而北某水屬之可以知土産可以知水利可以知險要可以知風俗按其强弱堅瑕而治之如指掌矣倘以里圖為煩亦當以鄉而别不則宜圖之為四若以崇嶺岡阜為圖則自化北而止若以平原墳衍為圖則自化南而始葢二里中僅一路且各旁江水為界耳自此而左一圖則海壇斷嶼諸山也自此而右一圖則江隂斷嶼諸山也今志統而為一不復别為之圖矣其叙山川尤不足觀焉至於分野之說郡志己為可畧邑志亦勦而取之何謂也志物産其同他方者宜不載今乃濫取成説雜記而悉其名義益亾當矣故五榖六畜則當詢之土宜鳥獸草木則當云某土專有之或土多産則當别某土為良及種之方孰優用之節孰宜家挾一策則烹飪之度療治之劑售鬻之準藏取之法畢具于目中庶志為便民之策也不然祗文己矣邑之名山瑞巖以巖石竺以夢靈石以石人皆知其勝惟黄蘖之勝江淹曾咏之為名僧之窟自唐至今方廢以其深阻目為鬼區嘗獨攬其十二峰而戀戀之數日不歸也古龍福唐二山列嶂尤多巖洞竒石惜無物色之者海壇諸山則海上竒觀且産龍馬而田粤區畫之可阜國用不但如石竺諸山徒為名區也覽之而有飛渡之想矣闕而不詳是耶非耶志有藝術仙釋或以小道可觀用資解脫云爾然以陳平叔者國初卓行士也遡宋之張宏圖皆當卓行之科邑今志其藝也而列之方技外矣何居釋氏邑自唐黄蘖開宗其流名僧甚盛見於傳燈諸録采之可三五帙足為叅禪者覽焉今志失之矣江隂古多産名僧今則以僧為業間問以鄉之名僧懵然無對者亦可笑也邑志詞翰僅流民一疏耳尚有二疏載歴代名臣奏議者志失采之矣國初僅林浚四門記鄭善夫祥符陂記差强人意若梁江淹㳺黄蘖詩具集中今志其數句而已唐宣宗觀黄蘖瀑布元結㳺靈石詩見詩史三山志翁承賛林簡言王棨皆唐名流也其詩文載文粹諸傳記皆足立邑之標幟宋雖無竒亦有曽子固王安石二詩文天祥一書劉克莊一記皆他方之良者可為邑之文繡矣邑則林簡肅奏議林希逸雜著亦多可采今悉亡之國初林子羽為海内詩人第一而詩多不載馬德華惟題蜀山圖詩為海内名流所選而志乃録其他作則其最下者耳宋敖陶孫通衢之詩第其事足傳也乃讀其評詩一萹洋洋巨麗而不知載何也他皆類此矣斯其為邑乗哉則後之傳信者何術焉鄙生每展之未嘗不廢書而嘆也幸因先比部之論著及外祖盧公雲鶴之面命稍加叅訂釐為玉融古史若干巻多舊志之所未偹今志未之卒業然其梗槩具是矣伏承下問敢不請裁苐恐舛謬尚多猶今之視昔故未傳之同好姑以付之青山請以異日再煩掌故何如開州名宦郷賢書二潘塤承教名宦鄉賢之祀欲入何承矩鼂以道杜宗㑹三公按後山談叢云承矩於澶淵北築愛景臺植蓼花人以謂何六宅愛蓼花不知經始塘泊也謹考諸史宋太宗淳化間承矩知雄州建屯田之議乃以承矩為河北屯田制置使發河北諸州戍兵開塘泊種稻田民頼其利曰河北諸州則澶亦在制置中矣至道二年契丹冦雄州何承矩禦卻之帝聞敵入冦之由謂承矩輕脫生事失守禦體罷之則其知澶州當在知雄州之後觀談叢真宗遣陳堯叟問承矩當駐江陵當駐澶州其時可考矣今曰於澶淵經始塘泊是不㤀前日屯田之餘績而嘗修頓之非至澶而始經營觀其名臺曰愛景其為己成之績可知矣意此功德既遍于河北諸州而事蹟又始於雄州不專惠我澶民也豈澶民所得專祀而報之者哉談叢又云塞雁門關以備西羌塘始于何承矩事在紀前今考雁門關在山西西羌在陜西則所謂備西羌塘又非在澶經始塘泊之事矣其在於澶惟具劄迎駕一事助冦公拂堯叟為可重但澶淵之議已決於朝而帝至陳橋則幸澶之先聲亦聞之乆矣承矩之迎實成冦準之意爾其為力當不在髙瓊上也豈得與㓂凖班欲分㓂準功而與之同祀哉至若鼂以道乃嵩山隠士其申戒弟子一節為朱子所取收入小學宜若可祀者然平生經說盡為洪容齋所闢略不少貸談經既僻則其學問之功尚有未至氣質之化尚有未純雖當時申戒子弟嚴于尊卑稱謂之間亦治家之一端而朱子因事摭實亦但取其一節豈足以槩其終身之全體耶只此一節即欲收祀則澶州古今人物當祀者多矣此二公姑俟再考何得其功德實在澶民者鼂得其行蹟實具全體者異時入祀未晚若杜宗會談叢中雖未備載行事然曰自國初迄今有四令而杜公在其中則其治行必有過人者陳師道神宗時人上遡國初止稱四令其必有所見矣今奉杜公入祀又潘塤僕匆匆行不及造别昨過清豐訪鼂以道果祀于其鄉賢祠而題其主曰宋徴士亦有名宗慤者題曰宋少保名逈者題曰宋學士今其子孫亦蕃衍有為士為農者但行急不暇延問不知其先果澶淵人抑古頓丘今割𨽻清豐縣也己託彼縣幕求譜牒録寄再考僕初䝉王玉溪先生舉鼂公為朱子小學所取為可祀并與洪容齋闢其經說者以示僕疑其為叛經之人然而好學守禮之功亦不可少但史脫其傳無以考其為仕為隐而名號難題因考氏族大全以道與陳叔易俱隠嵩山後叔易出而仕以道作詩送之處士何人為說牙盡攜猿鶴到京華故山巖壑空惆悵六六峰前只一家至宣和間乃乾坤何等時節以道亦出領郡人亦以其詩嘲之則其出處之際亦可謂先貞而後黷者若果有救濟之功不害其與禹稷同道今史家畧而不書竟亦不知其果領何郡然既曰領郡則清豐所題恐亦非也俟得其譜而考之而後祀之庻㡬無失夫僕為此舉無他所以維持風教激勸士心州官雖卑亦天子命吏乃低頭拜其民父若祖者而豈徒哉徃見舊鄉賢祠祗為民間公共一家廟死則不問其何如人必奉主以入充滿祠内旁無古先坐令州官為父母者春秋代其奉祀其悖理傷化孰甚哉今遍閱世史並考郡志得行實顯著為天下古今所共知者十六人以祀而國初四前輩亦與焉公移徃復僉謀於衆本州本學皆曰賢而後決撫按羣公皆曰可而後祀固非行一人之私持一已之見而遽然為之者宜其士林騰歡上下欽祀也而或者若有不滿焉其故何哉以為前代收之不盡則散見羣書一時失考者誠或有之固不害其次第查入以為今代取之不備則查據郡志卓有顯跡者不過四人而止縱有所遺無徴不信不信民弗從固有如一二前輩原在議收之間者紛然不理之口反為身後之玷匪榮伊辱則何益矣百年後公論自定安知異日不有仰髙山而續祀事者乎以為變置祠宇毁其公共家廟為不近人情僕誠不可辭其始也此心亦有不安者後於書囊中檢得潞州鄉賢議一帙諦觀之乃知昔人亦有行之者而非過也且愧擇之不精議之不審為馬潞州所鄙多矣潞州舊祀鄉賢三十有二人反復考訂合一州六縣僅取豫讓等十人而我朝僅一杜斆忠義如豫讓尚為阮侍書所疑經學如杜斆尚為楊憲僉所駁如今日所祀者止於一州數且過半不為不多矣止據史籍所載未参綱目所書不為不恕矣而况復有無窮之望於將來耶僕非馬潞州今太守即其人也僕不遇劉郡博今掌教即其人也是舉亦俱䝉報可所恨諸先生其賢過於阮侍書萬萬而僕不能一請教焉僕謂史籍中自有公評從昔人之定論亦頗得來哲之同然而可以不俟請教矣至於名宦之祀舊亦未及僕推廣行之亦惟取其有異政及功德顯然在民者而報祀之其他盡職分之常為人人所可及者固不暇縷數此輩欲祀則可祀者多矣請觀國史所載郡乗所錄治行在潭公之右不得與爼豆者何限哉僕恐名宦祠再增數楹尚不能展禮客窗不寐備書奉啓併以潞州鄉賢議封上乞賜傳覽此舉重鄉賢當就鄉賢是正倘有教言不吝逺示行邉不盡拳拳與朱太僕書陸容昨來拜謁所謂䨇廟者見張許二公像與南霽雲雷萬春姚誾諸像並列心已不然及至後寢又見五夫人之像在焉心甚醜之夫海寜逺之故鄉故鄉人重其節義而祠之非若睢陽為諸公仗節之地可羣祀也當時以張廵並祠號曰䨇廟己為謬矣而張子韶輩又益以南雷姚三部將擬於睢陽是又重其謬者也大抵子韶之學雜於佛氏而不純於聖人之道其為是舉固無足怪所惜者國初正名之詔初下有司己遵詔㫖革去後世溢美之稱定議為唐睢陽太守許公之廟則張中丞而下皆在所不與可知矣使當時在位有賢令在鄉有識者應詔而正之最為合禮奈何俗吏惑於禍福安於故常因襲至今遂使典禮之地混同村野叢祠可勝笑哉張汀洲作協忠録序乃云國朝賜祀如睢陽故典而以南霽雲雷萬春姚誾合祭似又以祭為張許二公而設殊不察祭文專祭許公末後以四國公配祭乃後人附㑹也若係禮部頒降全文豈應所祭者止稱生前位號而配祭者反得仍其舊封而不正之耶今欲正之當一切革去只存許公一像如或以為忠義之士天下人心之所願戴不忍遽廢則當舁五夫人及諸鬼物之像而水火之然後遷張中丞以下四像于後寢從其生前統屬尊卑而位置之前殿以許公為主牌位俱題唐時官位後代所封爵號一切革除易雙廟扁以許公廟三字庶足使人知明有禮樂幽有鬼神之義且使生斯邑入斯廟者興起其忠君親上之心其有補於風教殆不淺也上楊邃庵書霍韜先生碩徳重望天下注仰起佐聖天子所以慰荅海内來蘇之望者可盡見諸實事非如世之仕者徒抱負懇欝才猷不及竟諸勛業者比又非如世之仕者徒負髙位雖欲䇿勵勛業而才力不及者比是天將以太平事業遺先生之身而我祖宗鴻謨舊章所以奠安元元綱維萬世者殆將振舉修復而莫有遺恨是韜所以聳踴喜躍而竊幸也宋朝士夫動擁虚名動多浮議其未見用人多以大用期之及其見用亦只如此而已嘗謂宋儒學問動師三代而致君圖治之效不及漢唐漢唐宰輔雖不知學猶能相其君以安中國宋人則髙拱浮談屈事異域竭民産以納嵗幣卒覆中夏若此者可諉之天數可徒責徽欽而嘉祐康定以迄元祐之諸君子可獨逃責乎夫所貴乎命世豪傑為能見兆未形以制未易測識之虞也况於事勢顯白有必至之危猶瞑乎莫覺謂國有人也可乎宋朝士夫浮議甚於戰國之横議而流禍之烈甚於晉之清談顧未有命世大儒起而掃之今之士夫動多掇拾其唾去之説以噍嚼之此士習所以益卑政治所以益弛舊章所以日廢民困財匱大勢日有不測之虞而當事君子莫之或省憂也先生際遇聖明言無不聼謨無不達時㡬若此諒不輕易失之世傳三楊入閣極一時勛名之盛不知三楊壊我太祖之法已多矣上下宴安苟且度日卒貽正統之亂昔李林甫死然後禄山反明皇卒鞭林甫屍謂其釀亂也三楊肉未寒即有土木之阨律以林甫之刑尚可辯說乎今欲圖治非痛洗三楊以後之弊而上復祖宗之舊不可也老臣出處社稷是荷區區潔身一隅之小節則卑官下士之事而非慕以為榮也韜褊心多病魂夢無復燕薊之想矣惟念先生必有仰賛聖明者故敢附獻其狂愚舊進三劄録貢倘可采一二亦芹人之忱也照恕狂鄙為幸與查近川太常書茅坤林卧既乆遂成懶癖春來讀嵗書始知浮生己四十九因憶解印綬五六年别兄京朝來則又八九年僕束髪來所深交如兄者能㡬荏苒離愁倐若羽馳如此間攬鏡對之髯雖未全白漸索矣顔亦漸黝且槁矣嚮之所欲附兄輩馳驅四方數按古名賢傳記所載當時功業輙自謂未必不相及氣何盛也而今安在哉頃者候董甥之使自京邑還得兄與施騐封書大略並嗟僕日月之如流林壑之乆滯謂一切書問不當與中朝之士遂絶非肉骨心腎之愛何以及此甚且一二知己或如漢之人所以嘲子雲者面嗔僕曰某今之賢者也彼方位肘腋中外之士所藉以引擢者若流水若獨留滯中林者殆以世皆尚黒而我獨白耳僕笑而不應而使自兄所來辱兄口諭之亦且云云嗟乎兄愛矣而未之深思也僕嘗讀韓退之所誌柳子厚墓銘痛子厚一斥不復以其中朝之士無援之者今之人或以是罪子厚氣岸過峻故人不為援以予思之他鉅人名卿以子厚不能為脂韋滑澤遂踈而置之理固然耳獨怪退之於子厚以文章相頡頏於時其相知之誼不為不深觀其所叙子厚以柳易播其於友朋間若欲為欷歔而流涕者退之由考功晋列卿抑嘗光顯於朝矣當是時退之稍肯出氣力謁公卿間如三上宰相書十之一二焉子厚未必窮且死於粤也退之不能援之於綰帯而交之時而顧弔之於墓草且宿之後抑過矣然而子厚以彼之材且美使如今之市人攖千金之利者鳬唼蒲伏以自媚於當世雖無深交如退之文章之知如退之當亦未必終擯且零落以至於此而今卒若爾者寸有所獨長尺有所獨短子厚寕飲瘴於鈷鉧之潭而不能遣一使於執政者之側寜以文章與椎髻卉服之夷相牛馬而不能奴請於二三故知如退之輩者彼亦中有所自將故也後之人寜能盡笑而非之耶吾故於退之所誌子厚墓未嘗不欲移其所以弔子厚者而唁且詰乎退之也然子厚在當時其所同劉夢得附王叔文輩葢已䧟於世之公議然而後世有士其文章之盛雖或不逮而平生所從吏州郡及佩印千里之間文武將吏未嘗不憐其能而悲其罷官之無罪者假令有當世之交如退之官不特考功顕不特列卿其所他引擢天下之士踵相接也其特嗔子厚所不能而為之耳無聞目無見乎抑亦憐其文章不遽在子厚下故所並聲而馳者其宦業所奮猶烱然有在世之耳目或不當終擯而萎蘙之也將矜其愚引其不能而移其所引擢他者而為之力乎噫僕至此亦可以投筆而自嘲矣又何必人之嘲我為也適遣使䕶少弟某謁選京邑當過兄所問起居且思有以復兄之口諭云云也不覺嘔吐至此幸兄共一二知己度僕生平之交其文章之深氣力之厚有如子厚之於退之者乎脫或過焉幸以其勿獨嗔子厚者而少為之巽言而請也退之茍有知未必不悔恨於九原也己何如何如與李縣尹書張汝弼過辱提誨感仰罔既委抄鐵崖傳附刻史義拾遺後謹録一本奉上及考得評史義拾遺而稱木曰者乃桐廬章木鐵崖門人也然史義拾遺之稱竊有疑焉觀鐵崖傳及墓誌及大全集皆無稱史義拾遺者但稱史鉞耳章木評語亦云此鉞之可畏可見此即史鉞矣豈初嘗名以史義拾遺而後定名為史鉞乎况今所録詠史詩別本亦稱史鉞葢以同一斧鉞諸史中事故也意者今版行史義拾遺當從其定名曰史鉞而繼以詠史詩甚得其倫類更附鐵崖傳於後尤當葢鐵崖之著述固多而自以為得意者亦惟曰吾正統辯吾史鉞耳今傳之所述乃正統辯之全文以之而附刻於史鉞之後則一舉而盡得鐵崖得意之作猶狐之腋麝之臍既得其所貴重何必全體哉故弼竊以閣下之所指揮皆當而無疑也撫字之暇留意觚墨梓行此書俾先哲之遺文弗冺後學之見聞益廣盛德何可云喻耶恐命工已促未及靣禀故敢布區區伏冀垂察幸甚明文海巻一百九十四
