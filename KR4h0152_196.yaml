body:
  text: 明文海卷一百九十六餘姚黃宗羲編書五十自敘復趙提學陳獻章來教摘諸聖賢垂世之言與僕之事參而辨之大抵愛我深而告我盡也僕用是知執事之心一峯明白不欺之心也一峰死僕哭之慟以為自今而後不復有如一峰者今乃有執事幸甚幸甚執事為説本之經訓與僕所以為學所以語人者同歸而殊途但僕前簡失之太略執事見之太明故疑僕之意異于執事而實不異也執事謂浙人以胡先生不教人習四禮為疑僕因謂禮文雖不可不講然非所急正指四禮言耳非統論禮也禮無所不統有不可須臾離者克已復禮是也若橫渠以禮教人蓋亦由是推之教事事入途轍去使有所據守耳若四禮則行之有時故其説可誦而知之學者進德修業以造于聖人緊要却不在此也程子曰且省外事但明乎善惟進誠心外事與誠心對言正指文為度數若以其至論之文為度數亦道之形見非可少者但求道者有先後緩急之序故以且省為辭省之言略也謂姑略去之不為害耳此蓋為初學未知立心者言之非初學不云且也若以外物纍已而非此之謂則當絶去豈直省之云乎不規規于往迹以干譽目前僕之此言亦有為而發嘗與胡先生言之矣非諷執事也此不欲形于筆札俟面告執事于僕謂無間者也茍事有未當僕得盡言之豈假諷哉僕才不逮人年二十七始發憤從吳聘君學其于古聖賢垂訓之書蓋無所不講然未知入處比歸白沙杜門不出専求所以用力之方既無師友指引惟日靠書册尋之忘寢忘食如是者亦纍年而卒未得焉所謂未得謂吾此心與此理未有湊泊吻合處也于是舍彼之繁求吾之約惟在靜坐久之然後見吾此心之體隱然呈露常若有物日用間種種應酬隨吾所欲如馬之御銜勒也體認物理稽諸聖訓各有頭緒來厯如水之有源委也于是渙然自信曰作聖之功其在兹乎有學于僕者輒教之靜坐蓋以吾所經厯粗有實效者告之非務為高虛以誤人也執事知我過胡先生而獨不察此僕是以盡言之希少留意餘不屑屑又陳獻章古岡病夫陳某再拜書復僉憲趙大人先生執事伏讀來諭執事所以進僕者至矣所以教僕者亦至矣僕一顓愚人耳凡百無所通曉惟知自守而已曩者至京師與諸賢士大夫遊日聽其議論天下之事亦頗有益惟是愚懵終不能少變以同乎俗是以信已者少疑已者多也僕之所深與者皆執事同年而獨執事之名未聞也奉附到董給事書其中稱道盛德不少置僕私心喜甚以為此來當得一見非子仁僕無以知執事然以子仁之言又未嘗不追恨于京遊之日也承喻有為毀僕者有曰自立門戶者是流于禪學者甚者則曰妄人率人于偽者凡于數者之詆執事皆不信之以為毀人者無所不至自古聖賢未免見毀于人甚矣執事之心異于時人之心也僕又安敢與之強辨姑以迹之近似者為執事陳之孔子教人文行忠信後之學孔子者則曰一為要一者無欲也無欲則靜虛而動直然後聖可學而至吾所謂自立門戶者非此類歟佛氏教人曰靜坐吾亦曰靜坐佛氏曰惺惺吾亦曰惺惺調息近于數息定力有似禪定所謂流于禪學非此類歟僕在京師適當應魁養病之初前此克恭亦以病去二公皆能審于進退者也其行止初無與于僕亦非僕所能與也不幸其迹偶與之同出京之時又同是以天下之責不仕者輒涉于僕其責取證于二公而僕自己丑得病五六年間自汗時發母氏加老是以不能出門耳則凡責僕以不仕者遂不可解所謂妄人率人于偽者又非此類歟僕嘗讀程子之書有曰學者當審已何如不可恤浮議僕服膺斯言有年矣安敢爭天下之口而浪為憂喜耶其晦也不久則其光也不大其詘也不甚則其信也不長物理固亦有然者矣僕或不為此戚戚也且僕聞投規于矩雖工師不能使之合雜宫于羽雖師曠不能使之一何則方圓之體不同緩急之聲異也尚何言哉尚何言哉惟執事矜其志而略其迹取之羣咻之中置之多士之列則天下之知僕者無如執事矣幸甚幸甚都憲公雖未見顔色然仰之十餘年矣比聞下車以來德政之布沛若時雨上自士大夫下至閭閻小民莫不欣躍鼓舞僕固願一見況始者嘗辱一言之譽僕又豈敢自為疏放比于固執者乎使回謹此以復冒瀆威尊惶恐無已與高中玄閣老書趙貞吉僕抵家閉戶追思往咎慨然嘆曰今之世惟高公能知我惟公能護我惟公能恕我往者合聚歡若骨肉一旦乖隔即成參商是某之罪過薄德甚矣然細思之雖人謀之未工亦似天命之已定奈之何哉其與公比肩出入者十月未有一言之郤某雖不肖然自謂惟我為能翼助于公嘗語公曰大有之世惟匪過于盛可以免咎夫子曰善處此者可謂明辨晳矣夫哲人知幾知柔知剛知微知彰遜處雍容上信下從身安而天下國家可保矣又何必極其意之所之而後為快哉又嘗語公曰數十年來人臣黨比成風共欺罔君上賄賂公行綱紀蕩壞以致府庫空虛邉防廢潰人才風俗陋弊已甚公稟扶輿清淑之氣剛毅爽朗文章藴藉具八面應敵之才居皇上賔友親臣之任振而新之在此時矣不可讓也僕雖庸劣願效鉛刀之割自列于散宜南宫之儔以佇觀公勳庸之焯茂夫此二語者僕常常而言之公亦常常而聽之今猶在耳也嗟嗟僕欲以此義佐公安知竟以此得罪耶命定故也豈盡由不肖之過乎哉然僕自謝事别來終不敢以纎芥有憾于公其拳拳一念猶慮公舉錯萬一或過則社稷奚賴焉故兹再述前言以獻于公前其用意區區迂而可笑又如此韓子曰人臣尚同非國家之利古之君子不盡以同為貴也嘗觀宋相韓范富三君子在位議政未嘗盡合韓范于西事大相矛盾富議高郵守事有異范公因漸解去韓富議濮事終身不合富公老猶介介焉故知古之君子不以一切扶同為正也僕身已老行將逃禪寂以消餘景耳駟馬高蓋其憂甚大又豈至借此獻諛希他望哉惟念公高明慈恕必能終始知我又惟善人能受善言惟賢者所當責偹故敢援筆不休唐突記室以自附于事君子之義未審公果能亮之否答東郭生書楊循吉生作書來稱道僕好述作必以能文詞名于時謂生知僕不然也僕吳中一庸夫耳自少來從舉業師治經俯首埸屋操筆撰墨義色難之而人恆取以為輕重茍工矣必譁傳朋友間騰敬聳羡曰斯人且必顯此則我不貴而人貴者也及竊窺經書用古法以讀味其詞玩其義又倣效前人作文字一二篇宣述己意輒甚快而人則訾之曰是不急務何庸為此則我貴而人不貴者也向也當年少時不閲世故每不信時俗之所去取直非病世人謂為失輕重之分及豫果用是登科而向者舉業之貴遂一驗即仕以後則有人間簿書聲援之事所謂筆劄絶無用而向者何庸為之譏又一驗僕既罷官家居久益知人情曲折又視操觚秉翰直如巫祝輩將謂為世之不能生存而假是以鼻息者也既索之忽侮之得其意不過一點首咈之則誚怒橫生謗罵而無忌然後乃知所謂效古以為文詞信乎不急之務其貴不貴又益大驗也然僕之好尊榮而惡侮慢固與人同顧早退而不疑者羸疾之交擾勢不能耳夫聞居之法以恬淡為要若欲以鉛槧宣志孰快于號令以筆硯釣名孰易于事功夫在彼既不為矣又何假是瑣瑣者以重困其精神哉且仕則為仕業簿書聲援是也今僕之歸既已無勢力可動人矣如是而木訥質愚塊然以與人接熙熙然以終其天年人視之尚不失為一前進士而欲以文字名視之者不惟其官惟其技技又不若人則呼笑而誚其前每問近日之有何著作寒暄之不敘今古之不談而専及乎是以若僕之矇不知世事而遂若巫祝輩以為假食者然則欲貴而返賤豈不誠可羞耶且九流百家其所執莫不有名彼古文者何名耶非舉業非簿書吾誠惑之殆類遊手無歸而取憎于世之尤者生乃以望于我乎夫所貴乎士者以其讀書通理道能達乎政也故用之則光于功業不用則寄之言論以是視士則士不限用不用而其人恆貴而今也不然不過如僕向所云者則無怪乎僕之不樂有是名也生為人倜儻好竒乃區區若是豈知已乎哉故具以其意往白於生生其亮之無責僕以世所不貴之事答鄭河源敬道書祝允明得侍儀誨僅三歲其間會晤數十荷愛慕德如自平生然使許時僅一二接顔面為荷興慕固亦當如是如異執事者雖一日三接不能強合也如是者區區𠂻素無假頰舌矣比承汗簡已略答報亦必既辱洞亮之已而肺膈翻復絫日弗自休故復欲申敷焉而勢須以書大凡世人莫不有志志正邪慝良殊而皆自願遂之其為邪慝者無論即為正而良其負性布行每恆難乎中庸或務恢拓至軒馳跌蕩其究聖人謂之狂或顓收斂至刻峭孤絶其究聖人謂之狷此皆自由其性知務從道而不得大中然必將務達焉以至于遂有若僕者狂乎狷乎每自揆量亦每自疑且笑焉夫中固不能凡臨事志未始不在開達當是時自信甚篤脫落防檢誠能等萬于有一吷乃遂敏厲于已酌而應乎人要之不逆吾道與反吾志其間小小移柱趨調亦無必校期為之而猶為成章云耳或不吾亮吾巽忍至乎八九焉而彼此且遂事焉終將并其志而遷之焉於是則蒙頑之姿必至于大校其事可捐者捐去不復望于同不可捐則以死期之不敢誣也由前之必為近乎狂後之捐與期近乎狷鄀夫之執蓋若是寵辱禍福誠不能計然用是以賈禍特多焉夫今之世何世哉以是執也行乎族且難況仕乎州閭且難況數千里外華尾蠻頭之域乎哉然而以遲莫之景當百萃之役冒焉往為之烏有倓焉無故焉者抑雖得眚不驚焉何也由先識之矣然而必為之者何也以為人生窮通升沉福與禍雖出乎人無不樞管于天於命也已且若是者固宜失之細人而得之君子獨求不逆我道不反我志不羞我心不負我天故冒焉往為之如使君子且不容則吾末如之何也已矣即今使大戾賈禍如前云云即死無愓容夫何懼之有哉然自蹈陷危塗既蒙當世公卿貴賢大人煦溫而援上之霽暘之光甘露之潤喬柯之休實謂至知殊遭矣至于今之知與遭也猶然而恨夫不肖者之不能順奉之也奈何哉奈何哉獠獷之俗咸陽之鑑發其蔀羚羊之角摧其頑猶未革也載可導而牽之乎今日不肖固無事凡所以回吾道錮吾志淹溷塗炭者非上也非下也非天也非人也已也非已之它也不即去而已矣然其為不即去也正以去不洞朗更是逆道反志故爾有如昨嵗事有纍道若志者既告去數數矣其後事既散落無統乃徑還已此非謾讕為罔人也嗟乎鄭君今之世大人君子滿前吾豈敢以已誣人哉苐古之待士也因其材而篤焉其志在成物今之待士也律萬品而一之握吾之律示盡吾之心成否非所必也吾蒙知焉遭焉待而欲成之焉感慕而已矣曷其忘乎且夫人之材品不齊其亡乎此而獲乎彼也多不完故有為者不可律于一不可望于人從吾所獲而自成之若是者古之人皆爾矣又何況于今乎某之于仕得不得未可知也于文章間不敢言得期厲力少少勉就則亦可知也今衆賢諸友謬見録取者亦以其所為言語可見者采之耳然是物乃日常酬答賔友諸覔今雖謂有數十百卷非某之至也愚者之少分頗得自至者未之呈著也合為執事呈之故夫探理德之真尋道器之祕極人世之務上引聖神中準時憲下愜蒸人以可立與為者有子通五十五篇括而韻之者有大遊賦一首索賾隱貫異同抽篋取寶指掌向人窈邃纎忽必有物焉者有子微闕篇衡鋪昔今直訂是非觸意而語隨手而述天人蟲草廣大碎瑣索之而每得者有子雜闕十卷其它言理載事尚有數種類唯厯世良史二三大家其餘雖瑕纇不無要與近代暗澀局陋者大殊最異是趙宋之牒益甚膚鄙其一作者豫奪取棄見道大同其二畏守太過多筆寡削通數百家之猥穰而首尾畫一宛然公移其三成于遼金之際勢固有知之而不敢盡符孔氏之道者此則尤切介介于愚衷大不自量而輒欲裁定之頃已造端中輟復久今若遂置刀筆長還山林畢志史業斯文茍就亦不謂千年無知已也此外英山秀水幽坰祕壑壺觴絲竹誰其奪之伏惟執事高朗傑立古人為徒才志德學皆非蹇蹶者所望昨日同役于潮雖非共事大率略同此獨坐時然耳譬之玉石同焚蕭蘭並霜塵世常態何足挂言然執事薾雲之駕理豈有可柅者超然遐驤為知者吐氣毋為似鈍者不能力為所為以諧人所望而更汲汲乎人不望者而勞力困瘁煩以自苦焉以為時羣嗤允明再拜與劉羅川刑部書姚翼僕生平無他長惟束髮以來即耽好古文辭誤不自量跛足村嫗妄希邯鄲之步以為非博極諸家不能折𠂻其旨而得其深遂自春秋左氏以下及戰國策士之談漢則馬班劉向唐則韓愈柳宗元宋則歐陽曽王蘇氏父子與其同時附麗而興者凡所述作莫不縱心而屬目焉于諸家之中馬遷昌黎尤為篤好顧才弱思澀每一秉筆卑瑣猥陋求古人之唾遺而不可得繼又以為太史公之文初亦蹇澀其後南上會稽探禹穴浮沅湘北涉汶泗過鄒魯之墟足迹幾半天下乃得收攬海內名山大壑扶輿磅礴之氣而發之為文然後其辭宏深而怪特恍惚變幻莫可蹤迹輒欣慕之自謂其不善為文蓋由二十年困于庠序不能脫身漫遊如子長故寡聞鮮見而然或非其才之罪也幸中歲以來偶以行役水道走天雄軍由陸以歸既又以貢偕計吏上春官近復謁選銓部兩走京師觀帝王宫闕之壯麗及金城石郭之險涉江淮絶河而濟仰觀岱嶽徘徊闕里之間庶幾若見先進之禮樂兹又捧檄來豫章渡錢唐望海門之潮陟富春泛彭蠡其所經行雖未及子長而較之閉門褁足之夫則亦有間矣然自讀其所為文猶頺然故吾未能稍變豈天之所限人力之所不能浮耶乃今則既老矣竊伏愧咎丈夫處世戴天履地既遭時不偶厄于下位不得附當世名公巨人者顯揚功名垂之竹帛而又不能自效其愚勒一家之言以遺于世亦烏用此生哉乃追思既往既以限于天賦而博綜往古遊攬山川皆無益于其文矣惟方壯時嘗得遊荆川唐中丞之門而與之上下其論且自少與鹿門茅憲副為綰帶交而得其砥礪切磋之益中丞公本朝文章宗匠而論當世文壇之士若憲副君亦可屈指而數僕雖未能得二家之肯綮而稍稍窺見為文之槩多出于二公之力每妄有撰述友朋間識者亦往往謂得于二氏者為多始知庸魯如僕其于文章機括之妙固非由天地間山川靈淑之氣可以觸目而悟雖授受之際茍非面相指示亦不易得之于神交向非兩公師友之助則好之雖勤終無補矣然則為今之計惟盡交一世名公以廣師資乃為至術而嘗聞閩中有王遵巖大參者與荆川師相為伯仲髙不可及欲踵其門而遵巖業已物故宦轍至兹土乃知羅川劉公古馬韓之徒而江右文章巨擘也始至一候于門牆而不可遽得既數月乃竊從他所獲見著作一二尤信所聞之不謬始知匡廬彭蠡之秀初發于歐陽半山再發于東里而今于我公又盛露其竒信山川之有益于人文而益自誚其庸魯之甚也昔之面相授受如荆川公者既已辭今世之士而與馬韓諸公者倡和于九京不可復聞其緒論矣復得馬韓之徒如公者幸相去百里而遙則其私心之所向往欲以昔之所以事荆川公者事之而庶幾由此以得遂其生平篤好馬韓之私其意専而願切何可勝道也顧以拘于職守不容解脫且自淦達喻必從陸走而儒官無車騎之便又不欲以私務借力于有司以故悠悠期月所懷未展偶與龍城朱丈一道及之朱丈自言于門下為莫逆交遂敢敬具尺素假之先談以陳于記室併獻舊所為文二卷乞憐而裁教之稍為指迷以免岐途之泣蓋乘僕向往之勤而有一言之及則其幾之感應或亦不異面談而可以啓僕之愚未可知也參對終當有期不盡萬一奉霍相公書羅虞臣虞臣不肖不能委曲隨時悻直成性遂爾墮迹昭憲名編獄録重貽父師寤寐之憂虞臣誠死罪死罪被繫以來每見獄吏咆哮心魂惕悸羣與諸囚括髮交手足關械帶索坐饒蟣蝨一月之內僅能再櫛耳念自逺違杖履音墨載踈輒欲作書遺報然薄命之災幾成狼戾氣體虛羸不任執筆又服醫家息慮存神收精還吐之言誤為過信竟爾遲疑乃今削骨稍能倚憑而眠食據褥尚類嬰兒嗟乎嗟乎今日之事故未敢一二談也虞臣少藉矩範稍知章句徒以盜竊文史之間非有杜偉廊廟之氣阮放清簡之識謬膺薦拔得列清曹然長竊慕稽生之為人自以剛腸疾惡遇事直言乃辭舉吏部絶交山濤斯固哲士之高趣而雅人之逺圖者也覩其遺書昭若發矇或咄恚時事便學挂冠但十口之𨽻未去飢寒所以俯首縮眉求寄衣食重慙君子之恩竟離黨構之禍命也如此敢復云云一自罷官之後吏持逐禁來相熬趣遂命僕夫理奔策仗孤劍出都門望指河西當此時晨登征途則受訶關吏夕托馬首則諱言逐客自非識時知命誰不吁嗟行路之難隕涕狹斜之曲者哉然而非吾心所懼仲尼素位之訓莊生齊物之篇作者雅志似吾不少之也乃若玄英徂節青陽協候始挂長帆出清淵渡淮海望金陵伏謁我公都下侍領言笑然後遡長江入彭蠡訪匡廬弔白鹿之遺迹遂循東村上天池求高皇帝所為周顛碑讀焉斯固行道之勞而實積心之所希豔者也若夫歸而誅茅結屋墳索置前圖牒陳後爾乃總括百家馳騁千載雖仲舒覃思下帷嚴平不窺城市自謂猶似過之何則誠以虛生不如營名而羡古不如自立也但竊有懷惟恐聰明易衰重負我公訓旨點玷門牆興言及此夜不成寐獄録一首附獻左右諺曰厚者不毀人以益名知者不揚默以危身每服斯言良增赧愧然斯獄之成本自鈎織亦我公世道之憂也故首尾具論疏鹵不文何勝悚息復翁東涯書羅虞臣與子信次京國忽復參商念言蒼梧轉多勞緒人至猥惠德音故人天涯倐若面談來教敘陳邊郡之勞且勸僕以進賢退不肖之指嘉命隕辱鄙曷能當吾子振翰天衢高視上京塊爾雄心難可比量已而出吏邊郵式監蠻長夫君子不易俗而治民志士不異操而居險吾子陋膠東之無竒卑子康之積憤是故荒瘴不足為子惡繩墨不足為子拘僕視之豈薄志于梧哉顧僕愧無鄉里之行又寡交遊之譽曩者曹員詔辟鄉賢翹俟當此時人人自謂清通之裴楷更生簡約之阮放尚在譬若爭餅羣兒惟相競口除書忽下首被非任夫徐生願辭道子之舉叔夜求絶山濤之交昔人雅志良有以也一入省署懶受羈束舊有惡悶心疾遇囂輒發即鎮日之內呻喚不止每見揖坐委折齷齪不能學且令喉嚨中時抑抑也良故厭之夫善宦之巧進慙司馬高舉之智退謝長公方欲咏招隱之詩擬間居之賦然華耀中戰俗纍外纒用方寸之情喪不訾之德而子責我以涇渭薦紳抑揚庶品之道無乃與僕初心謬乎且夫白骨疑象魚目類珠言似之能亂真也茍非賢哲孰能參驗若僕則非其比矣且子又欲聞僕所定交嗟乎未易言也憶在沖齠靡知檢括自謂高談可以娛心綴言可以抗志玩索可以抑情單居可以流譽遂爾閉門學鈍破偶成竒視入幕之賔則咄恚望延賢之閣而屏迹晚步世途更勞宦轍追念生平裁深痛抑然性有所短心有所暗終非可以絃韋移也屬邇以來時體逼煎志局難改出門無􅉨處室獨娛固足下所深悲而鄙人之用兢兢者也聲氣之同無以遺報不敢懷隱故略述其梗槩嵗月不停山原復隔子非茂齒我亦凋容無緣把臂願兾努力山中答張子九溪書沈愷自江上執手暮雲煙樹隱隱如昨日事兩承至教不減聞韶真黃鐘在懸而瓦缶難乎為音誤辱推奬若欲以著作表見趨而納諸古人之域且諭以子才莫為子知又若惻惻重為愛惜愷乃呼天嘆曰愷雖木石豈不自諒敢忘子之言哉嘗謂丈夫生世上之不能總統百氏敘述十經藏之深山傳之好事以成一家之言即當剖質相明亦足以彰偉觀流薄曜使後世有知者甘鮑魚之腥而忘其臭萬一有亮其心亦不殞于蓬蒿而弗聞也奈之何有大繆不然者嗟乎非子誰則知者愷本海濵下材無足齒録兼之知昏力劣讀書修文弗克樹立雖愷亦不自知奚暇望人之知自愷總髮以來連不第于有司晚脫泥塗亦已後時一為俗吏百事具廢待罪西曹早出夜歸樊維檻束日與罪囚相問答而敲朴呼號之聲窮日不徹即欲操弄筆硯昻首伸睂論列古人其心已奄然靡矣重以家門不造變故相尋先人己先棄不肖去山妻弱子接踵而沒西風鳴枯瀟然獨處慘毒萬狀痛苦莫喻言念及此不覺心腸沸熱如撩湯火食苦噎夢若驚寢若愕忽忽若不欲生有此惡況猶復強顔濡毫以成文章必不然矣苐恨壯盛時無所自見恐青陽不再老態將至人命飛霜詎同金石竊懼後者之不如今嗟無及矣雖事與願暌時不相值然戀好成癖終不能割去或情事稍伸愁苦不甚纒心乃舉架上遺書讀之片言意會至手足不自禁惟孤陋罔聞無所進裁譬之燕人適越且南且北若冒霧然茫茫莫知適從良用自苦幾欲取裁于有道者之門則又自分醜婦出門舉止言笑動不若人愧容滿靣輒復中止今之為士握寸管挾方牘往往延譽公卿流光四國豈其力能自致于青雲之上而一無所附麗哉要亦有先容之客隋珠卞璧無故而暗投于人未有不按劍而起者愷非不欲握寸管挾方牘以取裁于人又恐按劍而起為天下戮笑人謂我何且愷平生不善俯仰所向輒值牆谷與人交非慶唁緩急不復往來無事率閉門掃軌弛置自便都不識靦伺人即有以文名家者見其揚揚誇詡言笑他顧詞色不及則又不肯低下取容作翕翕熱籧篨戚施已退縮不前重以旁觀者從而狎侮之詎肯向人作效顰態耶此愚所以寧甘心孤陋益增蠢愚而不悔也士嘗伸于知已屈于不知已人惟識玉卞氏或免于三泣人惟知音㸑下之桐可登之清廟故管仲知于鮑子世始知有管仲伯牙知于子期世始知有伯牙天地如此其大古今如此其逺肝膽相照知者有幾人故騏驥常有伯樂不常有莫邪干將常有歐冶不常有世之知不知不暇計子于不才不可謂無情至早夜惟懼負子之知恐終泯泯無以自别于木石此腸一日而九回一飯而三嘆且繼之呼天而泣也愷雖不敏敢不鞭策思奮以標趨古人今塵緣未斷是非榮辱猶懸于人世路險巇孤蹤蹇迹尚未知稅駕之所嗟乎人生貴自立爾雖富貴何為行將歸老于九山之野若東方生所謂築土為室編蓬為戶讀書其中將窮幽剔微以盡其平生不自揆測茍有一得倘自麗于作者之域庶幾大雅可興尚得免為鄉人而不與木石伍亦不為非幸也恃愛及此長歌當哭譬言成哀不覺為狂為僻為迂惟子亮之不然是馬遷之志不達于任侯少卿之心不信于蘇季也惟子亮之報彭海鶴江以東郵致翰教幾何時矣客鮮宛陵之便竟未得報費書至自里中再承芳訊蓋悠然有停雲之感焉嘗讀太史公書每言未嘗不嗟嗟太息而後之文人者輒效之篇出則淫淫簌簌咨嗟涕泗纍幅不一減也謂何至若是文家者流故作態耳今誦來翰則襟袂不覺沾濕豈非情有所必至雖欲禁之而不能也異哉造物之于人也謂兄為不困乎則以兄之苞併該綜淵邃閎碩上之不得翔徊禁闥次之不得優遊蘭省而顧沉淪于蔬圃之間厚之才而不優之位至如某者乃幸每過當即以既通籍論錢榖工虞吾可辦也吾將安之性故巽懦即小事猶豫逗遛不能決何以察官邪而明黜陟幼荷祖父督之章句俳偶數言僅僅知如是巳耳固無所謂玄詣淵造也稟質素弱目見日則神眩奪心善驚夜每寢則忡忡達旦故既入籍而穎石則仇讐視之不獨辨髦也而乃使之司校士人于人文最盛處其于才不才亦例置甚矣然兄仕雖不達而抱其所蘊出入超然自有餘裕矧望實蔚著憐才者每改容禮之則固未始困也弟兩仕皆強之所不堪而今益狼狽若有不可支狀欲強學則口不復能伊吾占畢而病目侵凌據案則頭苦痛而魂惘惘不自知其為人世如此而仕謂亨乎謂困乎且孤形孑立笑語惟親而猙獰烋于塵端魍魎驕于晝接向非持老僧之法以不見不聞處之其不滅沒于伎倆也無幾矣去嵗由九江至省道匡廬山下東林寺恍聞三嘯聲足輒趦趄不能進折腰何足辱乃元亮不肯一折故千載仰其高風今當復由斯道愧矣何顔然不能不含愧而過者桑梓事兄所知也歷宦十年餘而無數畝之産太母九十有二幸飲食無恙例外官引致便是長往向子平所以猶不遽絶念于婚嫁也若考槃寤言何嘗一忘獨寐哉已矣惟兄可語此心故不厭繁聒而寄言于千里之外亦以虞卿之欲比而竊有感也且時自饒泛湖望潯陽風雨四來煙雲漠漠上窮下際泊然孤舟因思鴟夷浣沙一何智也載酒持螯一何放也蓑笠橫釣一何適也而流星犯座龍衮淵沉岌岌乎殆矣帝王有真天命固在人知淮甸飛龍金陵定鼎而不知皇圖億萬年之基實定于洪濤浩渺不測之中昔僅睹之紀録而今得奉簡書雖不有三子之達而泝遊其間寅恭對越如親矢石而側虎賁環衛之末者凡斯蓋欲協之聲韻而意固散而不屬也遂于復言一發其幽愁憤鬱無憀不平之素所藴積而未獲一申者如所云吾椒當開國則有樂公為名臣初為中書省郎為侍郎今南吏部也而碑不紀名景泰初則有黃公為江西學憲而空同遺之人耶地耶嘗竊憤之承教亟留念苐增入原碑則促窄不稱觀另立碑則嫌于前人之棄又恐後來者之並棄之也尚此持兩端表揚係風教有呈請者無一不即行而題請則近有例且尚未暇類總也諸所便宜及聞缺失鴈無南征流有逆泝也幸便督教之太老夫人朝夕侍甚歡知益健餘惟若甚自怡近作希併教毋曰何足與聞大雅明文海卷一百九十六
