body:
  text: 明文海卷一百九十七餘姚黄宗羲編書五十一自叙與凌藻泉書宋鑒去冬辱逺貽先大夫刻集并尊稿又承珍惠感謝無量僕至京㑹趙濟泉年兄備道兄佳政雅譽健羡健羡追惟南都僕幸厠兄及白灣龍川年末今呉萬二兄已懸車矣而兄展驥環滁行且臺諫柄用獨弟今春又復敗北南還奈何奈何且庚戌之春别兄以來寒暑數易不能一面昔三年不見東山猶嘆其逺況今過之惓戀之情如何可言僅生長闤闠無閥閲門祚之䕃又早失母氏鞠于大父母憐恤見驕且性多抝匍匐艱苦以故懵于世務即弱冠之年猶襁褓之日也乃欲責之終軍奏對賈誼登朝之事斯亦難矣齊王融年二十四而未侯乃嘆曰鄧禹落漠笑人嗟乎人苦不自知顧僕何人敢懐斯處潦倒垂及壮年始獲鄉薦與兄同榜榮踰分外遂萌僥倖之心謂青雲之上可以立至乃今五上南宫徃返數萬里年過不惑髪已種種猶爾落落人後上之不能範身樹徳以挾曽史之情其次不能委質策名以紹䕫龍之業其次不能巖栖穴處以振巢由之風隨時俯仰無所短長無惑乎師友見絶親戚寡助時俗所斥而士林不列也亦由不矜細行老不曉事懶慢相成年力俱逝草木同腐可預知矣凡今之人惟錢而已而僕素貧薄家無置錐又以庸惰之質不善治生陶朱公屢散復集既鮮其術石季倫百道營生復迷其方往年繼母背棄繼以祖母祖母傾逝又繼以所天力營三喪先君尚在淺殯兆域簡陋烝嘗缺失葢不特妻妾號寒于燠嵗子女啼饑于豐年也人每勸之長官達吏闗白通事竊宵燭之末光兾玉斚之餘潤奈何僕之狂憨類正平輕佻同徳祖山禽野鹿不受覊紲非獨不可馴狎抑且動輒抵觸故屏迹公門謝絶利途非能之而不欲乃欲之而不能也又性喜詩歌見古人之四聲八韻妄肆譏評謬言體要寓目含毫即事吮墨忘其醜惡直冩胸臆意興所到輙廢寝食亦猶反舌鳴春蟋蟀吟秋各言其志匪曰異撰豈敢以辭翰為勲績著述成君子哉夫所尚在此則所棄在彼聲歌既習則帖括必踈操瑟齊門投璞楚國是宜孟明之三戰三北若此也僑居徙屋不出郡城郡城昔稱清逺今乃殊俗險情贅行之徒額瞬目語之態以僕之行處之譬諸語凝氷于夏蟲納方枘于圓鑿其不倫明矣間有一二友生又落落散處出無與逰入無與俱良時美景誰與酬酢濁酒一壺殘書數卷破屋冷氊凝坐終日或水邊林下散髪行吟愧花柳之芳妍羡魚鳥之潜躍形滯神飛獨往忘返天賜懸解偏喜鼾睡首方就枕鼻息鍧鍧潜天潜地之時百憂不能攻萬慮不足營矣妻子見僕若此目為痴狂亦不甚惜今嵗滿擬以資格謁選或令長或貳倅以竊升斗之禄江荆石何春泉謂僕老于年不老于事未可臨民僕亦自分迂僻之性施之官方所謂􅋵刀而割傷人必多數年之後傲與嵗俱衰懟與氣共弱從事簡綬之末庶幾銷譴省咎不貽深辱大詬于先人也或者見僕不選妄相忖度以僕覬覦制科嗟乎僕之業術既如彼僕之年嵗又如此馮唐老而顔駟醜乃欲策勲天府馳譽皇家其諸齊駑駘之步于騏驥之駿等嫫姆之態于南威之妍者矣聊因通問敢肆扞格時因風便毋吝金玉答楊升菴修撰書孫宜楊伯亨來敬奉華翰兼睹奥篇沉楚之音該洽之蘊胥見之矣發迷撤蔽益寡腴枯僕之得之何幸何幸竊毎究開國之文考累葉之撰而論之洪武初元迄于敬皇其人雖顯達各臻輝光未冺然皆膚近之恒才卑庸之俗技耳律以超羣㧞類無足觀者壬戌之嵗則有對山康子創新竒綺麗之詞韶鳴當道雖道與時違材増衆黜而彬彬特盛鮮有或加嗣兹以降若公者又獨非其人乎公之著述篇章較之對山子殊驟逸響良能妙致僕固不敢妄相品躋乃其脫流俗企古昔明偹體之工而繹變態之㫖則過于往輩信什伯矣前賢靡捄後進繼作由公而下如某如某厥文愈昭試取而讀之未論古人即于今人當復為何等家也吁嗟悲乎人才之難得名第之多倖若此而世之論者顧繆無定裁乃直以其倖概之兹豪傑之士所以恒不獲伸而闒茸者之恒耀也兹僕之所以憤惋扼息為夫人不平為己自悼而莫能已也僕南方韋布儒也荷天地之夙成賴父師之至教往者十四五時嘗欲揚青霄凌白日翺翔鵷鸞之末而焜耀于螭豹之叢矣志廣技疎遇乖時頗驅馳以來百無所遂退而修班揚之業效漢晉之傳聞李杜之規洩徐何之祕期在集大成于數代㑹衆流于諸君努力數年遂成卷帙竊不自料敢謂粗有一得之愚者然而世之人顧不以為然尋章摘句往往羣詆而競棄私摭而曲排之僕于是仰天欷歔每自嘆其遇之益乖而時之益不我值也又每自咎其投之暗昧而示之泛常宜其文之不為人取也于是韜歛晦藏益欲以待知者聞有某氏子焉衆之所謂能文士也當乙未計偕之歲遂以文謁于燕京之邸某氏子於僕之謁也故乆不出出也高視而濶步淺揖而大言若欲無我者僕于是唯而退莞而笑己而告人曰甚矣某氏子之淺也夫某氏子之位崇已所接人亦衆已豈不聞世有一孫子乎且某氏子嘗卑列于校藝之場而抑扼不信于時俗之眼矣力爭廣譽深薦誠奨孫氏之父子不無知已力焉而今顧高視濶步也揖之淺言之巨若欲無我也此無他自侈其位之崇遇之竒囊槖之富意氣聲利之洶溢而不知天下有道義有文章有可畏之才有窮達靡易之士而有草野間可以是非軒輊我之夫也于是愈益自嘆其遇之乖時之匪值愈益咎其投之暗昧而示之泛常葢其心且終焉已矣乃孰知遐荒之外未面之交忘年之契欣賞羡慕有如執事者乎執事曰製作追古人斯言也僕之所苦心而黙期者也曰投荒之作初唐未有斯言也僕之所妄擬而獨信者也執事何從得之何由而别之此無他才有相過則知有獨深識之逺則品之數真故也古之豪傑英俊抱能蓄伎固有舉世非之不以為屈而一人信之遽謂足以黜千萬人之見者矣況僕之膚文鄙藻獲可于世匪一人而公之所取真所謂足以黜千萬人者乎雖然悉其美不若洞其惡遺其短由於溺其長今夫文章之道大矣譬諸垂輸之造器干竒百思尚有遺巧西施南威取媚人主之前意態横出彼固自以為未足也兹昔之士所以一賦十年而小媸大怪不以中怍誠有見于是者向僕所致命筆倉卒而率情任意有得焉耳公顧云然豈所謂愛而溺溺而遺者乎抑舉其可而不可者将俾之自擇乎不然是公終以我誤也是今之人棄僕也棄所長而公之取僕也併其短而濫之不可之大者也惟公其教焉實公企望遐荒萬里願見靡由瘴癘之鄉魑魅之國伏惟自愛鄙律五章率焉奉寄宜抱病清湘隠憂交集華篇巨什愧不能為亦以闡懐述事前所謂投荒者盡之宜再拜報謝洪甫書孫宜辱賜書過督且示所以絶交意僕非敢不受也僕雖疲駑亦嘗側聞古人之訓矣昔樂毅有言忠臣去國恥潔其名君子交絶忌出惡聲誠義意綢繆不忍自致於薄也今足下乃若望僕為慕世俗之矯激而忘忱慤善道之義者情實不解且怪足下誤鄙人之愚而過以興怨嗟乎嗟乎事豈可以一言白哉往者僕卒相被即欲為足下辨之又迫賤役相見日寡㑹一二知識數以鄙文為索促促無須臾間懐復不已請略陳固陋僕聞之修身者士之首也蓄材者養之素也樹功者業之成也葢實用並致斯為全美若偏守一隅非嗇即馳故巢由遁迹臯稷著稱隨光逺藏伊摰格帝仲尼亦云我無可無不可彼皆以内外之辨為至而賤末俗之拘攣者也然或有屏淵藪棄簮舄而聖賢謂之潔身信道者誠非貴其名也要之才高而世不知行篤而人不察徘徊眷戀而無可為真心自保足以忘世故遂已爾豈其欲哉豈其欲哉自漢魏來修詞立名之士往往操弄觚翰摛篇組韻自謂能事末流不振音節胥靡夫揣合聲律窮極浮暢一藝之工有道者弗為也直以積學覽物博古籌今自致實效為可爾今不此事顧獨曰詞賦詞賦云假令文埒屈賈藝絶班楊詩追曹謝而立談樽俎不能置詞事故紏紛奉首畏縮亦奚事乎故僕毎自念上之不能信道㑹材明識時務以待主知次之不能歛躬植厚立為敦篤以規實蓄乃亦沉流俗拘世見繪藻飾辭徒以自病可愧甚矣身雖己迷滯不復而往往論說及之誠不自料欲以望于人也往者足下初相過即以文章隠逸為慕僕輒微直其對以為足下今壮齡夙志當講明經略若僕前所陳者已非所宜問足下不深惟其本心而猥隨衆之見謂僕為輕僕未測足下復累以此自暴足下對人言輒有怨聲嗟乎嗟乎僕于足下尚何言哉且僕非不能效王昶之止謗而乃逞辨㑹宗之側為工也盖昔者巨源強薦叔夜絶交王允失行袁隗棄之吳起薄母曽參疎之冉求以聚歛附惡季氏仲尼欲使弟子鳴鼓數君子者誠覩行義之乖謬識意之相離而然也若僕所為告乃始以為有分毫之益而思見内于左右非有巨源允起之失冉求附益之行也足下之說誰從授耶夫朋友之際人所難全言語規誨急切峻峭則誠有之持情恃愛以至此云何可深過也昔者伍員忠言而吳棄屈平直諫而楚疎僕嘗不信以為君之于臣腹心相照終始相庇奚有如所謂者述作之士逞浮飾虚以彰二子之名爾以足下今日例之不愈信乎且足下幸無他分而援朋友之勢相怨也令足下操吳王楚靈死生之柄而僕秉伍員屈平強梗之忠豈不殆哉豈不殆哉今足下不審思僕之忠言直諫善自磨礪求臻乎實用之學乃猶欲悦詞人之麗藻步曹晉之高風執筆摹倣少得其糟粕即沾沾自喜謂成名家是舍瑟琴而摶箜篌之器又復不閑其挑攏拊拍之法則奚益哉然僕已見疑無可陳者竊慕足下昔日之情而欲附古忠厚不出惡聲之訓翻然長悟僕即負袒執荆兾一望清揚白前咎是以腸一日而九迴屏居靜坐常忽忽若有所失今聞足下乃益肆謗議無所復容是僕終已不得攄憤懣以曉足下也古人有云投我以桃報之以李言相稱也足下舍桃李之芬郁而握􅀢菉以相擲僕豈得黙黙而已乎吁乃今與足下判矣謹再拜與王徳仁侍御許應元旬日再奉教札開誨勤至及諭遭䜛被謗因縁所自雖遭顛躓而猶惓惓不忘夙昔兄之用心可謂厚矣幸甚僕樹立無素不能取鄉曲之譽又禀賦愚闇率情任真不能哫訾伊喔與兒女子爭巧慧外為自憙而蒐慝隠賊以相誑紿此誠世人之常度而僕之所不足也兄之有取于僕豈不以斯哉僕承先人緒餘束髪受書竊窺古人之跡今三十年矣血氣就衰志意頽墮混混與庸衆人處固未嘗有卓特詭異之稱也兄過取之以為可與耳而僕内之則徳義虛薄無中孚盈缶之素外之則操行庸鄙無允顯昭灼之觀故使惡聲流聞謗毀叢集修之實難隳之甚易尚何言哉然計未得己夫志義不立故名譽不聞志義立而名不聞乃可責之朋友是以謗議歸于下流諐尤起于増積蹤跡之間僕實忽之又豈可尤人耶夫正色出辭則悖嫚斯逺勤而葺之耕而穫之沃本而求實増膏而希光自顯庸也即不能懐仁輔義建瓌偉非常之業以流惠當世垂休方來猶将托志儒雅附于介士扣角商歌若出金石思原憲季次之所履求仲舒揚雄之所以澹泊無營盡精墳典苟不厭死而已矣兄視僕生平豈嘗遊聲好勢利求竒贏與世人同所甘樂者哉又豈能睢盱舔舕詘曲王公之門幾無端功名者耶僕之鄙素兄既察之矣僕本貧家上有老母素無耕桑之業家乏紀綱之僕不能脫屣微禄以挂世網昔聶政狗屠也猶幸日有甘膬以奉朝夕黄叔度牛醫之子茅容田野之甿耳咸能砥節修行竭力養母見重于當世取異于名友而僕力耕不可積貯無貲兄弟二人皆為士人而使堂上恒憂朝夕僕寧可復為人耶所不能唾去者徒有此爾而事又有不得盡然者僕既不可無禄先人之服既闋赴部謁選不幸而擢冗曹承乏祗役非可辭免黽勉從事遂在于此薄命所遭安所歸咎兄以為僕之心事如何哉上之不能發奮踔厲越庸俗之末議蹈令哲之高軌以勉樹聲實下之不能依阿傅㑹取當世之所謂休顯以炫耀里中之兒小人之所訕笑君子之所不與僕復何心尚忝禄仕兄雖履困不知僕之前後䟦躓也此事既竣則将拂衣東歸以求初志舍弟漸知事庶幾干禄以養母耳布衣疏食聊以卒嵗種樹灌園可以永日苟有餘暇亦将方羊翰墨之林游心道術窺抉微眇高可希游夏下不失退之此亦僕夙昔之永懐也不敢遂以絶于世苟其無知則終焉而己爾鬱鬱葢乆寡與尠歡聊復一發以當對談幸勿訝其不遜來教謂俗眼視人無足計較惟知自省此道願與兄共之不敢不勉僕年三十有五竊不量力未衰嚮往極吾生之所之死則已耳若乃時世之所低昻讒夫之所閧構此亦螡蟁之過耳要之公論乆乃定爾邸報乆不得見北方試録所見者山東順天耳僕此月望間皆在信州若兄可到安仁僕當輕舟趨謁得盡披露如何如何倘以為可幸差人一示十三日無使者到則遂東耳諸不一一復李驗封伯華書袁􅐆鵬鷃異適小大之情分涇渭殊流清濁之塗判是以巢父恥唐堯之聘子陵卑漢祖之官何則性之所安固不可強合也僕于執事曽無一日之素猥辱簡書殷勤将收孟明于三敗雪曹劌之積恥復欲以朽株枯木薦之清廟廣厦之間意良厚也敢不罄竭愚悃一陳其憤懣乎僕賤宗也五齡而誦詩書九齡而作辭賦上自墳典下逮稗虞亦嘗涉其藩域掇其菁華矣顧以家無擔石室如懸罄有相如之病而重以原思之貧餬口無謀勉習經義晝誦帖括夕覽古文啜菽飲水簞瓢自娛幸得録名于有司接迹乎多士自謂扶揺赤霄一日千里纂言則欲窮天人之奥立業則欲攄覇王之畧高談濶視無復諱忌又以性本疎迂加以簡嬾深衣廣袖弗合時製虚名無益謗忌横肆故大學士張公孚敬桂公蕚咸欲締交絶弗與通逺希長孺之蔑衞青近鑒李彖之逺國忠觸怒蓄憾切齒仄目而僕屹然自是九死不悔迨乎武庫之災讒言先入械繫請室卒校束縛呼聲動地搒掠百數自夏歴秋黑索纍纍坐卧圜土隂霾晝晦不見日星命危草露籲天無門而聖上垂恩曠蕩宥其大戾投之于越既而雷雨肆赦獲遂首丘杜門謝客屏居荒野蕭然環堵有同仲蔚薄田百畆足具饘粥躬操錢鏄忘其作苦媿乏井丹之高潔而竊慕徐穉之食力桔橰當戸蓑笠在堂於陵雖陋無求于人暇則臨流濯足抱甕灌圍釣輕鯉于芳藻弋文雉于叢藪濁酒一壺兀然就醉誦季倫思歸之引繹仲生樂志之論蓬首箕踞從吾所好不自知其不可也昔東方生有言築土為室編蓬為户彈琴其中詠先王之遺風亦可以樂而忘死矣㫖哉斯言予復何望嗟乎士安往而不得貧賤哉世不我知則己矣又焉能隨時浮沉取容當世局促效轅下駒規規如褌中虱哉寄劉雪臺陳昌積昌積啟盖聞欃檀女貞轅櫟所嫉苕華璸㻞魚目思混故殊才適召訾之具大道非容身之資也今道圃冠冕文苑宗工南北蜚英不啻數人大江之西夏羅劉嚴然皆雲和離角異聲同調大雅皇墳左揮右霍是皆女貞璸㻞也誰則容之況公春秋列傳偉矣著述誠識究鴻蒙纂集汗漫言自成于一家才實邁乎三長積也愚侗嘗想丘明鼎著此傳是非衮鉞未嘗不私詫獨見之確要嘆知已之希闊也詎知身化數千載獲此良朋為之布陣展局恊例比律使其心神不損幸如之何何者氣同相求聲比則應豐山嗚鐘雨師灑道姬旦立文𤣥聖現夢誰謂古今不相及哉故達人思寐乎古昔君子俟知于異代虞敦商彛更世禩乃竒其模範海桑靈椿厯風霜而神其枝榦太𤣥表于桓譚尚書習于夏侯品物文章顯晦有時傳之萬世諷誦列賢亦猶今日仰止左榖尊嗣劉楊矣達者自信何假僕不肖一二說也夫多文之士不厭糲粱飛之駿長蒙轡䇿葢乗除之自然界限之不爽也故仲尼墨翟乏季孟尹氏之貴也子夏韓非無倚頓卓氏之富也馬遷困頽于漢昌黎偃蹇于唐近世空同大復官止副使後渠少谷職下大夫皆不能翕翕為熱盡其龍睇鸞舉之能也乃今翁則為上執法矣為大司冦矣旬宣擅召虎方叔之譽哀矜推咎繇忿生之明雖位不償其父章而業成徽就已度越諸子也頃者返駕南安道經庾嶺才賢難容豈獨今日然樂天盡性正惟其境于是堂布夷䕫之武階設湼槃之梯走枚乗于帷幕稱言偃于几杖賦題鷹隼聊以塞禍檢尋古方旁事衞生園丁得吕直之亷門庭集好事之客賢者之退豈不韙歟記不云乎一張一弛文武之道也昌積往戴塵容恃好鄉曲操奏鍾儀之楚音得入張禹之後室天壤殊遇感何可既又家君耄夀逺承雅製巴里下邑忽來縁水之調聾俗顓氏偶聞韶武之盛豈不思藏為世寳流傳雲仍耶去秋八月聞解赤舄即同郭汝才者謀市安道之箬船逺迓元禮之仙舟不幸家君忽而棄世痛哭家廟諸用割裂邇來守殯孤山杖苴寂寞太陽職曜劬夕愓矣髻嶺雜礫響谽谺矣湖波澎湃駕鵞號矣空谷無人閴隂火矣野狐鼹鼯啼叢薄矣哀物悼故云誰之思矣上念先人年踰渭叟賤在蓬藋生乏素封死不紀于太史非先人之不韙也但不幸遭豚犬如昌積者耳九天重淵愚罪莫贖毎誦陳鴻臚石内使之傳輙悲不自止一二朋好又以毀禮非孝之言來相解免以故蓄忿成疾癰疽發項邪循胍絡寖變竒症幾同山跗之消瘴誰錫淳于之鍼砭賴友人郭濟投之藥劑叨存支骸淹滯七月尚爾孱脫目眵不堪縱瞚氣短不能廣語應鍾之月幸即勿藥荆婦又忽天化至使井臼無主坐吟荘舄一身百毒痛也如何所以更生藜閣乆缺刺謁而李邕贄儀未申尺寸也罪矣罪矣鄙𠂻揺揺尚冀起文潞于閒居召富鄭于散地庶幾永快登仙之望不負攀龍之願也郭汝才便冒貢短状更奏鄙技乃各言爾志之義以紙為贄之意也函丈廣大尚計親造不備上漁石先生書趙時春威讋遐裔强敵駾逋旋旌振旅保大定功吉甫來鎬行儉入朝歡洽萬夫休問宣暢況居涵濡之中側聞道徳之風誠忭誠幸苐恨癯乎山澤不獲執掃除之役頭目卒中迅風眩瞀艱于揮翰未遂竭五内之私亟颺于下執事㑹劉生自陽和至式詢吾師起居雖小不適寒燠信順之佑何憂不已及誦教言誨以藏修之宜并及過當之咎語曰知弟子者莫若師知之至故憂之甚切抑吾師之所以憂僕敢不自以為憂乎自知其憂而靳一云云以解之恐悖孔門四子侍側以樂夫子之義故不自忖已聊復一言譬之蟬噪蛙鳴雖不惬里耳而大雅君子庶幾尚之嘗聞恥辱者勢利之士所羞也勢利者功名之士所羞也功名者道義之士所羞也故道莫毀于詬􅀢名亦喪于流訕勢或隳于刑辟昔宣聖逐于魯而叔孫毀之孟子遁于齊而國人詛之子華違于晉而燭過阨之此皆大聖名賢之所為卒被庸夫俗子之侮尚不能解于當時而䝉雪于後世何則勢逼情乖則離異起羨長獲短則媒囮生物異代殊則枉直明故君子疾沒世無名而不病人之不已知志士有殺身以成仁而不避患以傷義葢夷齊甘為餒鬼恥食周室之粟顔子樂于屢空恥從貨殖之士下逮萇𢎞屈平馮參李膺之徒皆以身為君國之幹卒嬰慘夷之禍近世于少保劉學士俱被極刑此豈非當世之所深嫉而從來之所企慕者哉僕雖不佞負累于休明之時然㓜藉箕裘之業頗聞詩禮之術長習百家之言馳心于聖賢君子之事矣大都道行名成而不辱身者上也名成而道不得行因之以辱其身者次也道無可行名無所成而身受其辱者宜也無其道而竊其名以享其利者盜也此則少知自好者之所羞而趨勢利者之所競也吾師度僕於三者何居乎言乎道則為世禁錮道已毀矣言乎名則身被大戮名已爽矣言乎身則毀體受刑身已隳矣三者無一可而欲使之奔走于臺皁之間伺候于形勢之門強顔悚體自厠于士大夫之列計亦左矣身為刑戮之餘詬􅀢之所萃流訕之所浸世之爭名嗜利者猶欲為賈貨分功之計其慮至深其蓄彌毒加以此地磐石之宗牙張弦彀誠恐不測其身已不自救而況敢與知人之長短哉假令受欺蒙侮此自其分報復循環天下通理訐直隠禍隂譴最烈浮屠老子之徒尚以為戒況僕學于孔氏身雖被廢其心豈直悻悻然小丈夫哉孟子有云天降大任者動心忍性増益其所不能中人者困心衡慮而後作安知其所以陵僕者非所以益之也而遽為是囂囂耶今夫田傭賈豎稍有擔石之積什一之利己能自愛雖有攘臂詬詈之加猶且閉戸而避之其自視者重而外視者輕也較僕所負豈直田傭賈豎之比哉乃與爭名嗜利之徒蹴長而發機祇見其惑也然則僕之必不為此也審矣且僕之不為此其由來業已乆自髫齔時已不量已分誦書及彛倫綱常之際便慨然自許每覽忠臣烈士哲人義夫之行則流涕交頥思得其人而往從之此固吾師所嘗許可僕所言豈不然哉洎服官政果用性成目覩時變于鬱腷臆激膺填胸藉令緘口可以免外禍而内患已結于心腹矣自放廢以來加以㓂攘屋壁四立風雨不除家徒凍餒動值舛戾見為愆尤嬰童天札嗣續未立身素剛強而今更多疾病患發意表罕所嗜欲雅好飲酒屬入騎騶觝射因此盡損便兀然坐閨閣中如婦人孺子他人為僕慘怛而僕偃蹇棲遲未嘗少貶身之榮辱不暇自恤人之長短于僕何有哉設僕幸䝉洗録任百職之末猶當明目張膽以禆萬一至于快心易怨之舉必有所不為夫僕之有所不為殆天之所與也非人也所以深匿潜伏自絶于交際之間者直欲如前所云以逺害自全耳況卑下未易居貧賤衆所侮位微而名高乃譏笑之府故舒修撰之節茹於折運夏太常之囚釀于胥吏李崆峒之釁結于既廢彼豈非世之所指目者哉不早自逺引果犯羣猜明者睹未萌況其章徹人耳目者耶此僕之所以離羣絶俗而不悔者也天之所以與我者不敢以自棄人之所以加我者不敢以自沮又安知終無可行之道無可成之名而身之恥辱不䝉後時之雪也又安知不足以稱吾師之知而解今日之憂也憤固可啓悱固可發猖狂之言尤望吾師折𠂻焉不勝怖悸之至明文海卷一百九十七
