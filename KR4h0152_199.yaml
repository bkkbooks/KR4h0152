body:
  text: 明文海卷一百九十九餘姚黃宗羲編書五十三憂讒答郭慶守劉楚僕聞之古之所謂知己者惟管子鮑叔而己矣夫管子之所為舉朝之人不能知之而惟鮑叔知之非惟舉朝之人不能知之雖舉齊國之人亦不能知之則當時之知管仲者何少而不知管仲者何多也夫共賈而分利自多非誠貪乎謀事而窮困非誠愚乎三戰而三走非誠怯乎此人之知管仲者也然而為貧也為時也為有老母也非鮑叔其孰能知之哉管仲既未嘗自言所以然鮑叔獨探其情而言之在當時之人其不以鮑叔為佞而阿附於仲者鮮矣及其後策魚鹽之利修農工之政而國無不富也九合諸侯不以兵車而謀無不得也進兵楚陘仗義執言而勇無不勝也然後鮑叔之言為正而有信而管仲卒為齊霸功臣使非鮑叔有以知之則管仲毁於貧敗於不利而喪於怯也久矣豈復能少見一日之長于後來也哉故古人之知己必論其逺者大者類如此今則不然棄置大端習玩細娛睢盱淟涊互相推上以同其好者為知己其不同者非之亦異乎古之知巳矣况足下所以稱道而歎惋於僕者固又非古人之所先急者哉夫書以記姓名詩以咏情性文以道古今凡具手口習簡翰而稍知義理者孰不能為亦孰不能言也而各有其道焉其道固未嘗不同而亦焉能盡同哉譬之人之面焉其橫目竪鼻皆然也其笑語飲食亦皆然也今不取其同然者乃遽欲以己之肥而廢彼之瘠又欲以已之黔而譏夫人之晳也不亦難哉此不足較也在我固不當以彼之毁譽為憂喜矣况又欲因之以重足下之憤怒哉昔人有飲而醉于室者行道之人過而見之以為已之醒也羣聚而罵之其受罵者弗覺也而傍聞者恕焉亦何以異于此哉甚荷足下愛助之至僕非敢以此少足下也誠恐足下好善嫉惡之心過重或反為其所動而不能以堅所守也故敢以言焉抑君子知己之辱將有大于是者又不直若管仲之于財之于謀之于戰而己也自今以往其進退可否則誠有望于足下矣足下其將為鮑叔乎楚也敢不知所勉哉足下明敏周愼早得明師又善與人交其學日進如草木敷枿之滋長而人莫之覺也其德日修如江河波瀾之方漲而人莫之知也乃猶慊慊焉以四十未聞道而見惡于人為可愧可感且又欲以僕為師法此不自滿足而過為謙抑以推夫人者也豈楚之所能當哉僕今年四十有九矣而行不見信于人學無成于己徒有以來讒謗之口若足下所云云者其感與愧又豈不浮于足下哉抑聞之文中子云止謗莫如自修又曰何以止謗曰勿辨此古人處巳之成法也既以自勉仍不敢辨惟足下其少安而圖之若所喻髙文則不及見恐不逮將來尚冀終示也答杜銀臺研岡辨毁書劉繪前日兩次奉候值溽暑不敢久勞執事僕亟請退及別執手謂僕曰此來見之宜謙慎謙慎僕低回不省所謂昨會留精舍中對局醉僕以酒僕不覺放論時事執事復教如前更道士夫有毁足下于同鄉松臯許公浚川王公處云云余亟為足下論辨翰林廖學士户曹張正郎皆謂足下髙視亢言不近人情恐于宦途不利彼時乘醉且有同年友一人在坐僕應之曰丈夫生世不得揚眉亢步巖廊之上即拂袖曳履去山谷以肆其志不然欲免羣輩之猜忌也難矣韓子曰人有所能有所不能抑而行之必發狂疾蓋謂此爾今晨乃勞手翰枉教諄諄以謙益相勉而進以君子長厚之道雖父兄之愛子弟不逾此矣僕思人之才性多本天成仲尼曰不得中行而與之必也狂狷乎若古之所謂狂狷其能利於今之世也乎求包容而無忌足矣安望其引拔而顯用之邪嘗見今之公卿待朝士不惜才藝不問臧否但分曹較銜驗趨立之尺寸競祇候之杪細遂執以為喜怒進退悲夫悲夫長松回棘材有度也端觡鋭牙性有類也士顧操獨行於己爾何可以毁譽而數易其志耶三代之朝濟濟相讓固無待論矣春秋以下若平仲絶禮于石父范宣矯顔于孫僑衛青亢勢于長孺龔遂不答于王生其始憑陵夸詡自挾侈重而竟以嚴辭疏節詘敗困悔彼平仲以下四君皆所謂豪俊也至于石父諸子亦顯名于世乃知古之大賢相成如此而何今時之不然也僕三復來教忽覺融透古人遭際坎壈皆失常懷屈平疑于雞鶩之卜馮子淆于龍蛇之喻未免憤憤不平也及上規揚氏黑白之守下覽蕭逺玄同之辨遷就譎竒非吾身世之正術嗟嗟言忠信行篤敬雖之蠻貊可行此所以動天地而感鬼神也詩曰我思古人俾無訧兮僕將佩服孔訓敬服來教容閉門省察旬日後再俟面請如何與李中麓書呂髙李生捧華札至披而讀之知足下有愍世之盛感惜賢之重悲且以激烈之懷便欲振蕩時事僕以為過矣夫讒諂蔽明邪曲妬正自昔有然何必至今乃大異也昔子胥抱憤于鴟夷申徒糾寃于負石直生被名于盜金第公荷讒于絶義以彼其賢信而見疑忠而被謗獨王潘二子然哉足下抱髙世之宏才履絶人之上智譽望日隆朋豪雲附少縱其才掀揭一世將何施不可語曰雖有鎡基不如待時足下睇視今日為何如耶且足下相與締結恆久孰與少海情志顓篤孰與質夫然皆反面毁心戈起不測又安知今左右無復數子者哉人心不同有如其面願少自韜約毋輕漏言犯尼父不密之戒僕以文學不如道思通達不如子抑二子罷去我輩安祿天網恢張有禽獨遂可不謂幸乎自華札至疑懼交集秉燭達旦眠食報罷反躬求省不知作何惡狀曩日見仇于惡寮僕自以為鄭聲之亂雅耳不意羣疑相蒙珉玉莫辨任子遂借此以為覆兄之計而玉溪張公者又信讒而莫之察也夫讐人之言不足異矣獨恨任子以斷金之交張公有座主之義乃亦忍心為下石之計乎嗟哉嗟哉世路多艱宦海叵測此孝標所以廣論于絶交而陶公欲閉門以杜迹也僕自揆有何稔釁法當罷斥今流言交讒不過居督學之官耳初若不領此任更作何説然此來實出足下之意而僕亦悔之晚矣易曰負且乘致冦至冦之交戕致之我也又誰咎僕自去秋便萌歸志顧以二親在堂弱息滿膝長兄物故俯仰在豫而回視退計上無覆身之瓦下無立錐之地牽制隱忍義不能決今時事至此尚可靦顔就列為流俗人所疑乎君子見幾不如早去足下視僕豈蒙垢之士而茍祿之人哉從此入江鄉下帷受徒圖升斗之粟以供二親饘粥之食使弟得他日與黔婁原憲同類而共盡也何不可今督學之任不可一朝居矣然計年則未可遷于義又不可調惟有一去而己矣以足下有鮑叔之知故敢披瀝衷素走使奉告統惟足下亮之上御史王公書歸有光都臺相公閣下有光聞天下之人材其為君子小人皆有一定之性古之所謂知人者非苟知之而己也始知其如此則其終身不能易也伯樂之于馬卞和之于玉如令馬非絶塵玉非連城二人者必不顧如令二人者顧之馬與玉豈有變哉馬與玉而有變則天下亦不號為伯樂卞和矣故以為人之賢不肖有定分而古之知人者決于一見而終身不易彼有改節易操者必其始非真性有矯而為之者特其號為知人者之不至焉耳故孔子曰舉爾所知蓋謂己知之矣則其舉之而不疑也故大臣之相其君其平日常有意于天下之人材一旦而任事權舉平日之所知蓋優然而有餘是以佐國家成光明之業而其聲名永與天地無窮若夫取辦于臨時處極貴之地而欲以周知天下之人材不如其取于素之為裕也今閣下為天子執法操天下士進退之權其能辨君子小人賢不肖必明矣有光不材不敢自附于當世之賢者獨以少荷國家作養蚤嵗掄選太學尋薦京府初辱閣下為縣當此時相知最深蓋不以有光為不肖也閣下清明直亮少所許可而獨于有光而加顧自此閣下為郡二千石及敡厯外省升中丞治河漕濟州淮揚間有光往還京師道之所厯閣下未嘗不垂顧念閣下非有私于有光以為為國家急于當世之人材如此前嵗舉進士閣下方召入為少司徒有光時與諸進士旅見閣下獨加禮遇異于常今嵗入覲閣下府第深嚴有光一再至然亦不拒逆而進之退而私念以有光之受知于閣下與閣下之知有光者至今未嘗變也自以諸生文學不辦治縣事多泥古與世乖忤監郡及臺省大吏無相知者其考宜殿而尤荷閣下之知使免于過謫然而鑠金銷骨之毁其積于閣下之前矣悲夫以三十餘年潔身修行一旦遭讒罹垢乃不能自辨于三十餘年之素知使閣下疑所見而信所聞夫豈閣下前日之知為非歟將亦有如古人所謂的然昭晰自斷于內能了了于冥𡨕之中而暫不能勝衆多之口而姑為謝之也然則士之所恃于知已者危矣閣下何不考有光之為吏者夫豈若人之言否乎昨在京師今萬宗伯乃同年鄉舉也萬公楊羡人家與有光所治連界有光私竊問萬公云公以我治縣何如萬公曰君治縣無他獨小民無不愛君耳有光謝曰得公一言可以無愧萬公當世賢者非相欺也則有光之為縣果盡如讒者之言乎今銓部所取信者監郡監郡之賢不肖果盡出于公與明乎漢人有言陛下以使者為腹心使者以從事為耳目尚書之平決于百石之吏其不足盡取信明矣且今監郡所薦舉無不極其褒美語其治行雖古之龔黃卓魯不能有加然古之吏皆積久而成功今並布衣諸生少年逺者僅逾二載何治之卓卓如此夫果能如此則其縣治矣何遷代之後其凋殘猶故也所舉如此則所刺可知其不為謾欺者鮮矣夫與愚人論智則智反為愚與不肖論賢則賢反為不肖故智者決策于愚人賢士呈行于不肖此道之難行而賢材之所以多闕也今于監郡之外復有采取流言飛語唐虞之世所以疾讒説殄行者寺人傷于讒而有巷伯之刺今不能禁而又行之如此則奉法循理之吏豈能見容于世耶閣下清德重望凛然風裁宜監郡者不敢為欺謾其刺舉必明其讒説亦無自至于臺省然唐虞之世猶有讒説以周之盛而寺人畏讒則雖登明選公舉世咸仰寧獨無如有光前之所論者計今世人才之衆多皆進退于閣下閣下寧以失一人為重輕但自古一士之不遇至微而後之人追論其世乃歸咎于當世之公卿大臣者且多矣况平生恃閣下之知自謂俟百世而不易者不謂其有所變也獨以閣下不勝衆多之口而姑為謝之云耳然有光自以今日有閣下之知己而不獲自伸如此則亦己矣官雖微而出處進退宜明是以竊緣閣下之素以求自放于田里不使墮落于讒人之口閣下姑憐而使之得全其身名以去不勝幸甚上儀封公論事書栗應宏語曰才難不其然乎然能盡其才之用者為尤難古之時政習淳厚無甚回邪欺詐之變人惟求濟于公而無急于私故上無蒼蠅之懷下無白駒之嘆若田野園市之實山林川澤之珍咸貢于天子而收之官師工匠者皆有以察其質而致其用不以逆己而有所枉不以料量區別為勞而易棄擲不以指擇矯異為嫌而自顧避是以無才則己不患其不盡用也今之時則不然矣才之用固多也然以逢迎奔走為賢以緘默足恭為敬以循非襲枉為便以無所可否為謹庸者見鄙能者被嫉自處若山嶽視人若奴僕少不如意則從而媒蘖其短以糢糊成其罪雖有賢者守古信道之士少不自知用今之道則當間散寂寞山林長往而已爾雖有聖天子賢公卿在上亦安從責此情也夫九井之穀百夫之力也置之塗泥則良農為之撫膺荆山之璞天下之寶也委之道左則隨和為之流涕楩楠豫章合抱之木干青雲而茂邦域質偹髙選用中大任不幸為賤工之所短將胥起而裁截之比幸有大匠者于其側不一轉手顧目而賜之便非人情也今者某以壯年魁南宫此固時未易有也其才之難得亦可知矣為政不二年屢被旌舉聲譽大溢其為才于政亦速矣獨以奔走不足辭氣不遜之故與司府不相能率懷私煆鍊以構成其罪將以決其案于臺下蒙等誠切悲之夫才髙則果于自用望重則易于招尤招尤易則責叢于己自用果則無恤于人以是之道則以今之習尚殊矣語曰衆喣漂山聚蚊成雷三人成虎十夫撓椎嗟乎是安能知其然也夫惟大人為能濟物義士能急人之難賢者惜才于時猶工師大匠惜材于其業也夫以鹽車之驥柯亭之材方其時無知者則將委之于水火喪之于焦沒然得孫陽蔡雍之徒一顧而適值其會是珍竒出于水火芳譽騰于焦沒矣是故管仲拔于囚虜公冶昭于縲絏范雎起于逋逃李白雪于黨獄荀卿滯于蘭陵韓子困于説難范滂之徒沒于禁錮陳子昻殺于縣邑是數君子者豈德有賢不賢哉顧其遇與不遇之勢異也嗟乎非有長者君子以古道自命安能望于斯時也伏惟左右大德重望居今守古抱經濟之才藴皇王之略履樞要之重天下所望入備絲綸以籌天下之賢才與之共治可待也蒙等竊謂今日之事殆不可不白于臺下即知賢者之于材固有無所顧避而不易棄擲者矣然事出于公輿論所在故輒敢竭其朽腐奉尺寸于左右惟賜覽焉蒙等死罪死罪頓首頓首答張通政鄒觀光頃始得門下六月書扼腕世道義形于詞不佞抵里杜門自廢視一榻之外便若天涯不復以尺素及長安近聞吳氏之子猶復狺狺彼豈疑不佞復出故下之石而不知不佞己絶意仕進矣山中僻不得全疏乃聞部中覆疏竟借王洪陽公及門下為重而儕丈貽書云諸君子之譽乃足為譽鴻功等之毁亦足為譽顧不佞何幸有鴻功之毁以博諸君子之譽也夢白又云冥司揑鬼胎或以人為禽獸或以禽獸為人信手拈成都無分別人見其紛紛披衣戴帽而出遂皆望之為人而我乃因之動無明火焉豈不為鬼所揶揄嗟乎夢白乃以鴻功非人哉吾安能必鴻功之非而諸君子之是吾不能自必夢白安能必吾與諸君子為賢而鴻功為不肖息緣屏慮都無人我都無得喪毁邪譽邪僕平等視之矣與唐凝菴少卿吳中行不佞冥行扞罔抗言罹尤四乞歸休六移伏臘蜉蝣暫寄牛馬可呼負芒刺于蒿萊久矣然于門下同里同年至親至厚束髮把臂初無小郤奉令承指嘗效微勞今門下策足要津不佞待罪下里猶庶幾察之衆惡憫其羣攻曲賜帡幪是所願望乃得于傳説者藉藉謂門下有意督過之也詆訶橫加點綴巧構投石下井呼以順風朝紳里黨人人能言之且惟幸未以來草年所偶叨驥尾遂捋虎鬚念念吹毛時時剚腹朝紳里黨亦人人能言之嗟哉嗟哉不佞雖有推心之寸腸實無容足之尺地匪一日矣然出口入耳莫可蹤迹門下固不難曲掩不佞亦何忍重疑而閉目塞聰若罔聞見門下固不惜逆施不佞亦何妨順受己矣復何言至于頃者門下偶挂彈文止因晉秩躐等別無訾議而大疏雄辨自敘賢勞自表正直自證考察之非辜自明遷轉之不驟洋洋纚纚亦足以伸己屈人矣又無端而忽有指也借人形己曰一藉建白之名可覆百行之醜不佞讀之慙沮思之悚惶不覺汗下踵也夫論建白不佞其罪之首也論行誼不佞其醜之尤也珥筆之初因言父子之倫常而幾斃杖下賜環之後復言君臣之權義而遄返田間是他人之建白一而不佞之建白二也言尤行悔垢積愆叢寡過未能內省多疚是他人之醜行百而不佞之醜行千也同里同年至親至厚朝夕所稔妍媸莫逃兹由門下之鄙夷遂為海內所證信是他人之醜可覆而不佞之醜不可覆也雖然門下意本獨發言則槩加無論四方君子即同郡之建白者若而人皆接踵去國矣無論一時即當年之建白者若而人如尊公荆川先生亦抗章編户矣門下縱不為同郡諱獨不為尊公念乎豈門下嚴于嫉惡急于攻瑕不暇旁顧不暇追思乎片語隻詞威于鈇鉞因一人之醜而遷怒諸賢因今日之醜而貽羞先哲嗟哉嗟哉其乂不佞之咎矣門下倘或云覆醜者什九不覆醜者什一則猶可舍其九居其一因之趨避己屬冒昧乃門下既無解網之仁不佞安得立錐之所乎反己自憐何施面目門下必且云吾言在此吾意在彼或甲或乙無所主名安見其為爾也者夫共傳者言也不可掩也中藏者意也不可據也使不佞舍其不可掩者居其不可據者而委其醜于人是益其醜于己况門下既無推烏之愛不佞豈免死兔之悲乎同類相殘亦何施面目門下皇華晝錦里父老負弩矢前驅不佞舊厠門牆無煩介紹詎不願奔走于車塵馬足間哉第匿怨而友其人左丘明恥之負醜而友其人左丘明當益恥之不佞踈節直腸淺衷褊識苟有怨怒素無蓄藏未聞背面夷跖心口秦越而可稱友者不佞既知為門下所醜矣而強求攀附寧無顔厚門下既視不佞為醜矣而陽賜接納奚取貌交夫友之倫亦重矣同聲則應異氣則離貴賤死生交情乃見門下與稽別駕應科臭味莫逆終始不攜既死矣焉用文之且也假絶友之峻節賈忤相之髙名今則借負譴之畸人充逢世之竒貨門下之自為計誠得矣不佞之為門下用亦足矣死者為地中寃鬼未死者為門下功臣不佞其何辭之與有拊膺扼腕局地蹐天三四躊蹰千萬不得己傾心披瀝沒齒引避爰稽載籍若魏應瑒晉嵇康梁劉孝標漢朱穆義疏交絶自古然矣白日青天丈夫男子亦安用塗飾于聲音笑貌而為此罔兩以相謾哉蓋于是乎賢者之庭削醜人之迹矣此不惟不佞之處己宜爾即門下之處人亦宜爾倘門下謂其無足與比數遂賜麾斥而置之于胸臆頥頦之外幸也惟命倘門下忘其直率因滋釁疵而重之怒如蹈水火益熱益深以門下才力智謀直摧拉枯朽耳不佞為魚肉以俟刀俎宜也亦惟命門下其裁擇之奉楊太宰書屠長卿隆之居長安也禔身頗慎待物太疏屋漏知防廣庭不飾砥節持廉居官良苦廣交泛愛好客似奢窮交賤士樂與玄同當路要津顧存崕異玄同近汙崕異近亢名為拙宦亦曰畸人三事大老九列巨公家望龍門人樂蠅附隆獨介焉自守曾不問有識無識有因無因斂迹滅刺未嘗一求容接聆謦咳即如明公朝野羽儀人物權衡祥麟威鳯舉世快覩凡在銓曹要地者莫不嚴重孤髙峻其風采內若啙窳外益威稜明公清德孚鬼神內行信妻子而接物坦夷溫然長者脫町畦之形絶溪刻之行而人自不敢干以私世無所疑其迹以故衆口交贊物情樂親婦豎頌德厮養知賢而隆則何嘗一及明公之門乎蓋一二大老亦有願交于不肖者而隆終不往也夫出領邑符甘心貧窶入叨郎署絶迹當途隆雖至不肖亦稍知自愛耳然若寡廉鮮恥何所不至錢穀之吏稍自潤不難虛名之人即結納亦易以明公觀隆詎誠至不肖而無恥者耶彼夫以疇昔私憾謡諑攟托一旦以至不肖之名加于隆隆不能受亦不能怒夫裂眥濺血髮上指冠黃沙倏走白日陡黑繁霜夏零長虹晝見隆之意氣自小能之而今顧不爾則隆蓋近頗己聞道也夫平情忍辱忘境齊物猝而能鎮撼而不驚者真道所貴也以故隆聞謗之日恬然安之以無怒為養性以不辨為忘言雖舉國不平交遊扼􅒆而隆未嘗以一芥蒂于胸懷未嘗芥蒂者不肖希達人之蹤而扼􅒆不平者友朋抗同仇之義也夫友朋髙義事固宜然而隆始未敢輒以此望明公則以與明公無生平之素也乃向者含沙事起明公召隆而與之語曰聞子髙才能詩文奈何輒以為罪讒夫狺狺譬之噀血徒自涴其口無論世無是事亦無是理子休矣勿辨昔王元美李于鱗諸公在世廟朝自以辭賦雄一代賦詩飲酒日閧長安市上每退朝解鞍歇馬便呼盧浮白睥睨跌宕此真詞人太豪哉今法嚴網密人惴自保即有一二擅辭賦縉紳率知檢飭不敢豪且聖明之世不當以詩酒罪人子休矣蓋隆至是始登明公之堂一承顔接辭也隆既非明公素所親厚一旦遭讒受枉召而勞苦若平生此豈有所私于不肖隆哉誠為朝廷惜大體為士夫持公論大臣之用心固如此逮夫黃冠賜歸青衫去國蹇驢風雪襆被泥沙身未離春明門外而心已在江南之丹山碧水間雖祖道凄涼河橋黯淡而不肖方且掉頭不顧揮手長辭又未嘗一登明公堂為別道其感激而去蓋明公之念不肖為無因而不肖之事明公為太簡夫人情疏則薄日逺則忘忽其人而不知則易棄厚其施而不報則易嗔不肖之去明公胸中久矣乃不知何故而時勤明公之念士夫從燕京來者無不道明公拳拳見念至今為稱屈不已寄聲存問六年于兹吾鄉沈少宰還亦云不肖無日不在明公之口夫不有諸懷何以有諸口日懷之而口之則隆誠不知其何因也以為念故乎而隆未嘗與明公有平生歡以為憐才乎而隆為人實至不肖以為恤枉乎而隆所坐不過詩酒詩酒之罪隆實有之不為枉六年之間寄聲日至而不肖恬然安之了無半札一言為謝隆無半札一言為謝而明公之拳拳猶未己隆之六年不將一字其故有四昔叔向不見祁奚范滂不謝霍諝當時髙之隆雖不肖願竊附于古人此其一也摧廢之人屏居無聊書空咄咄或自通政府攀援當途以求進用隆若輕通尺一心雖感恩迹涉希望隆竊恥之此其二也當不肖闔門待罪縉紳之連騎過唁者如雲及不肖落籍去都友朋之解裝出祖者無算比抵里中而長安故人書問絡繹隆若稍修報謝便非林下人之體以故京邑遊好中心念之豈不勞豫而絶不以一語相加遺夫不報謝諸故人而獨修寒暄一當路大老豈復足比于人數乎此其三也不肖之東歸負郭雖無百畝居家尚存四壁母有賢明之行能甘清苦妻通寒儉之德不怨貧窮半畝之宅矮屋小樓頽垣敗壁伊威在户葶藶盈階忩前雜樹梧槐梅竹紅藥紫蓼春夏之交黃鳥鳴于枕上緑隂映入房櫳零露涼風秋意颯颯碧雲黃葉飛滿貧家野人風味足以投老而隆又好仙奉佛觀空悟真一登蒲圑之上外忘塵世內遺形骸煉我神明葆我虛白當其嗒然以遊乎混沌息乎天倪不復知有山河大地又安問長安貴人大老哉簡以忘我疏與懶俱即偶欲濡毫信紙輒復罷起此其四也夫六年不將一字一吐而輒幾萬言者何也偶意興所到欲因知己而一寫其胸中所自得也夫有求于人者其辭卑無求于人者其辭直今隆辭卑乎直乎此明公所一見易辨也夫無求于明公而直寫其胸中所自得若而人者不將一字不為簡一吐萬言不為多譬之候蟲時未至而喑喑無聲時至而嘒嘒不己彼蓋無求無營而自鳴其天籟者也雖然隆蓋又別有説焉隆聞明公之居鄉也朴而醇清而曠其事親也躬萊氏之孝其習隱也有龎公之風白茅為屋黃土為垣青精為糧夫耕婦饁沖夷淡泊宛如上皇時蓋大臣蕭然不異寒畯彈琴賦詩而咏先王之風此豈有意于世用者哉及其強而後起迫而後應秉衡當軸清德彌峻和風益暢蕩滌深刻削去煩苛事存長厚人懷愷悌然且邁髙迹于霞表寄沖情于物外泡影軒冕浮雲三事日日促裝時時接淅而廟堂牽挽鴻飛不得逺焉得意而欲回首急流而思勇退明公垂戒于日昃覽分于止足未為不是然而此時世道所仰賴明公不小明公不可亟求去也世道自江陵以鷙猛束濕之政釀為厲階刻削元氣急弦絞繩有識憂之至今日水旱沓仍疫癘繼作去年元元大被其毒今嵗益甚吳越之間赤地千里喪車四出巷哭不絶隆竊念主上英明總攬大臣寬仁愛人明良在朝政刑修舉不應致眚而災眚若此或前人鷙猛束濕之餘烈也夫太和元氣人物得之以生育國家得之以隆昌若明公之寬仁長厚國家方倚賴之篤慶祜而消災沴奈何求去乎人之得位徒以自取榮肥而公則榮肥天下人之當路惟恐一旦去己而公則求去不能功及天下無心于天下事者為之整齊天下非超于萬物之上者不足辦也以公德望老而束縛三事不得去此謝安所謂捉鼻正恐不免者也若隆之不肖則免矣人不以不肖目我則既己委棄我以不肖自處則可以偷安凡夫而希為仙佛雖亦屬妄心猶差勝其他持此妄心以日從事苦行借妄求真借苦求樂上則漸臻清靜下猶足以寡過愆履寂寞而怡愈處飢寒而不悶善自排遣而強名安樂法門以芝术為糧肉以薜荔為衮衣以蒲圑為安車以修煉為經濟拜佛禮斗逸于朝參誦咒翻經妙于簿牘猿啼虎嘯清于鳴騶鶴駕鸞驂疾於騎馬山人野客貴于公卿石室丹臺榮于竹帛非強作佳話理則固然明公間世偉人其識豈不及此耶明公康濟天下功德厜㕒名書上清良亦不惡而山野之人平分風月坐領煙霞亦當不以此羡彼乖崖先生垂勳救火華山處士一意栖真古人得時則駕不得則蓬蔂而行卷舒其時龍蛇其德要各有為非欲茍同若明公以在事為桎梏不肖以竄伏為凄涼是使宋室無鵲起之勳雲臺絶蟬蛻之迹也當今之世士誠多賢賢誠多品公孤黃髮德氣凝深鎮定朝野幕府疆吏才諝踔偉經略邊圉雕龍之士摛藻擷華文麗天漢骨鯁之臣披鱗折檻氣薄煙霞凡此多賢鍾英靈而表上瑞詎不彬彬㻞㻞者哉乃惟迂僻曠逸玄超之夫進不得依光日月畢志匡時退而閟影雲霞希心度世斯亦備士之一種雖似無益明時差存標韻粧點光景亦不可缺也譬之天道雷動風散雨潤日暄天各有用綺霞彩虹無用于天而天自不乏譬之地道蔬穀頥養芝术服餌人並有益山花野草無益于人而人亦愛玩今天下獨少迂僻曠逸之士四明自賀監請黃冠領鑑湖以來幾及千年虛無人而不肖不自揆度妄欲繼之夫賀監遺榮辭祿請休去而龍驤不肖蒙垢負罪被竄逐而狼跋所處逺矣有如嫫母敦洽靦顔不怍妄附夷光乃其中翛然無悶一耳本同末異不可謂便逺也且賀監昔時之為翛然易不肖今日之為翛然難何以故賀監得意于美官夢遊帝鄉一旦請去天子賦詩百官祖餞賜鑑湖以供漁釣捨大宅以為千秋觀士林艷仰鄉里榮羡此時而為翛然不差易乎不肖身負大詬倉皇落籍一驢蹩􅍷風沙雨雪而出都門青衫布帽憔悴還里親知慰唁鄉人揶揄原憲無因介推有母甘毳難給餔糜不充此時而為翛然不亦難乎而不肖天性故自落落出覽風日入而忘其舉火宵坐蒲團明而忘其晨炊二六時中常自娛恱徐而尋之了不得其所以娛恱故以不肖所難仰而配賀監所易似足相當不怍也頃王胤昌太史書來欲得隆憤悶不平言吐寃人之氣激壯士之懷長留天壤山川生色夫憤悶不平事世上所有隆胸中所無隆雖至不肖不敢為世上所有事不能作胸中所無語而直以寂寥幽適之辭答之耳士大夫以尺牘遺其交知抒心寫懷垂名流照者在古昔則有史遷李陵楊惲鄒陽江淹在近世則有唐寅陳昌積盧柟吾鄉陳束皆以髙才發為雄文沈痛悽惋掩抑頓挫有足悲者並不聞道胸次鬱紆滿紙侘傺豪俊之徒賞其悲壯清逺之士陋其煩競才雖髙矣量不足取也隆幼雖貧賤閲厯多艱誦習先民究心世務亦思有以自見于當世三十通籍兩綰邑符戴星視事櫛雨省民諸凡可以佐黔首之急者毛髮不愛有所擘畫上下咸以為能又頗研討象緯韜鈐邊務戎略若世有知者鉛刀未必無一割之用不幸身多雕蟲之技譟其虛聲蟻慕蠁集多士奔之招尤誨妬逺聽不察並目不肖為平原俠徒扶風豪士不知隆迹類洸洋行實檢飭寄情物外蕭瑟有之跌宕未也即如隆所坐詩酒罪業己向明公面承然而韻語號嗄己無遜辭醉鄉酕醄尚有愧色麴君不能盡椰子大一杓即面赤頭眩上下四方易位令畢茂世劉伯倫遇之何物傖父唾去不顧即此一節他可知己嗟乎是所謂隨聲附和者也明公之所為扼􅒆寃屠生亦以此古今稱大寃者以屈平伍胥武穆為極真足積人神之憤傷天地之和若隆寃可謂最小小者中茍跳勃捩撥之雖小必搖性若安凝撼頓之雖巨不動隆少有志建立幸而精神筋力足以副之假手讒者早遂息肩毫芒莫吐端倪未見夫狺狺何論總之隆山林之骨也天下之事若身當為之摩頂放踵若一脫其手便須超然道固應爾事在心神散緩事去而情態嬰纒之二者皆非也隆今可以超脫櫟社之木全以不才矣又安能竊竊焉日抱其己破之甑而號之也古之失意者多投之沙蟲山鬼瘴癘蠻荒而隆獨蒙放之清溪白石之鄉還之祖父丘壠之土臣罰己薄主恩不淺從此而勤修度世之業力講性命之宗皆君相所貺也匪維罰之又為貺之天地髙厚捐糜曷報乎又古之擯落齟齬于時者􅉨􅉨託名山著書以規不朽此較之一不得志猖狂淫逸從日暮途窮之計者固云勝之然隆以為猶非上策也士君子貴從性地上磨煉一番性地不煉其中無主而徒役精馳神思垂空文于世菁華漫焉浮漂而靈光顧無栖插忽而物態外煬欲火內煎即垂千萬言毫不得力姓名留于青編形骨敝于黃壤亦何益矣是以上士棄蜉蝣之晷尊龜鶴之期舍熠耀之光攬陽烏之轡遊神于淡合氣于漠收視反聽以培性根凝韻葆真以固命蒂息心忘形而求大道焉及其道成而文從之太上道德蒙莊南華禦冦沖虛關尹文始葛洪抱朴子年拾遺景升化書華陽真誥彼皆以其所得精華而筆之竹素何嘗不藏之名山副在京師者哉隆不肖竊慕此道凡夫妄冀知其無成苐試為之譬之苦煩渴而飲涼漿無論多寡入口冷然熱病漸除神明漸朗是隆之所寶也嗟嗟夫是言也亦近洸洋矣明公得無訝之乎明公方以盛德鴻業都要津享大位海內人士望若天神隆後來末學鯫生輕通尺一則宜修朴遫卑瑣曝鰓搖尾語而進庶幾入則足以為容不入猶免譴怒而洸洋自恣若此則以朴遫卑瑣實亦不肖胸中所無也亦以恃明公之知我也夫知我者豈誠以其人朴遫卑瑣善曝鰓搖尾而哀憐之哉越石父伏在械繫則垂頭不語及晏子解驂脫之則仰首髙談故曰士屈于不知己而信于知己明公龍德大人顯榮貴倨目中不乏朴遫卑瑣語我知明公何取焉使隆洸洋而有一語合則言與聽者俱榮使隆洸洋而無一語合徒為嘈嘈而己則吾儕小人之罪于明公大人長者度固無損也隆免矣天下之事方大集于公隆竊見此時國本未定朝議多端宗室失所邊防懈弛吏治粉飾官守貪汚人情傾仄俗尚浮夸費用太繁征求頗急閭閻空虛黔首凋瘵又加以災眚事大有可虞夫天下仳離則治平繼之治平之後所繼非復治平也曲突衣袽明公不可不熟慮而詳計也明公憂民體國動出萬全泰階永平釁沴消殄隆等竄伏林莽恃以宴息野人請得禮壇醮謝日祈天子之萬年祝相公之百福隆北向舉首曷任虔注每思當今大臣若明公者何必逺慕古人桃李不言下自成蹊閭閻道路之口月旦不爽物情所歸天心必祐是真社稷生靈之柱石也勉矣君侯努力霄漢姬公稚圭㩦手同車敬謝德音勿復以野人為念寓書者為明州楊別駕別駕尊公以庚戌勤王遭讒死事烈烈忠臣哉明公所知也別駕由任子出倅明州愛民若己子潔身如處女吏道循良七年一日尚未可以遷乎漢庭積薪之嘆有以也明公長者無所不覆露無所不煦育請稍垂情明州倅無論循良忠臣之後可念也明文海卷一百九十九
