body:
  text: 明文海卷二百餘姚黃宗羲編書五十四悽惋與彭濟物康海數年不覩光範偶辱過問即甚慰甚慰然又倐爾而別此情如何明日逢德光道及雅愛云云此誠斯文骨肉之至他人誰肯然者感念纍日然竊有所未安者因公知我厚故不避過責輒布上左右惟公察之聼之僕自庚午蒙詔之後即放蕩形志雖飲不多而日與酩酊為伍人間百事一切置之此不但信于鄉人妻子奴僕也蓋素性疏懶偶因官秩羈係數年若招豚擘鷹而一旦得此中心之快實有人所不知而已獨知之者自東方多事以來聞其驍傲無狀如彼即或奮然有攘臂之意隨後自笑自詈以為狂奴猶爾不量即又飲酒散髮箕踞林麓此其習性之己成激之不返雖三公之貴刀鋸之辱不可奪也况數鍾之粟半副之紙乎僕自幼支謾無狀性好是古而非今始仕時望見先皇帝寬仁大度即自私擬以為臯夔稷契之業可以復見于今而狂放易言略不修飾至皇帝嗣位之後又見其英毅果斷益喜益負以為鄙志當究于此一時交與之士反覆輕易不檢惟僕言是是故謾論譏説略無忌畏日就月將幾踵竒禍幸免殺身而歸而二三者又補砌所無以為真有使僕含垢于有罪者之籍與不肖之人同被驅放上辱兩朝作養之恩下纍先人狷介之業生平微志付之穢途情苦心局不復自愛暇日偶讀皇甫規避梁冀之事與蔡雍九錫之書喟然嘆曰彼何獨不得含垢冒汚而成致美節如此也又偶讀栁宗元傳曰即宗元有不同于叔文然親與之交而受其職任矣夫身有規雍之操而迹厠宗元于九鍚之間仁人志士宜于此何如也今僕之所憂者在忽有犬馬之疾死丘壑之下不得伸其宿心原悰耳而區區官秩之事非所念慮也瑾之用事也蓋嘗數以崇秩誘我矣當是時持數千金夀瑾者不能得一級而彼白區區于我我固能談笑而却之使叨餮嶮巇之人卒不敢加于我此其心與事亦雄且甚矣當朝大臣蓋皆耳聞目見而熟知其然方臺諫論列之際出于一時倉卒未暇差別而今則又數年矣夫伊尹之輔商也一夫之不獲則曰時豫之辜僕即非賢者然豈少于商之一夫哉大臣者乃忍使之雜于孫聰曹元與云云之間邪故鄙人之心至此益放益已披髮嘯歌至于終身而不敢悔此非甘心為長沮桀溺之徒也公之義有曰古人內舉不避親時之可舉不可舉非僕所知也而僕之不才汚穢亦非公應舉之人觀近臣者以其所為主于此使識者苟為之言則所係于公者豈細哉今僕之不可于當世者有五而甚不宜出就官職者有二性喜嫉惡而不能加詳聞人之惡輒大罵不已今諸公者皆喜明遜而隂譏此一不可翰林雖皆北面事君而勤渠閣老門下者以為賢能僕懶放畏出嵗不能一造其户此二不可人皆好修飾文詐偽恭假直而僕喜面訐人未有不怒者此三不可士大夫不務修身事君之業而但呻吟詩文以為髙致見其詩若文不能不怒故見輒有言而彼方望我以為美也我以言加之此四不可與相好者接必因其職事加勉戒之詞多忤其所好彼或未從即拒而絶之以此親疏多怨茍復見其所愛者又不忍不告或又告之彼即又不從而僕又絶之此五不可執德不𢎞不能信之于人雖頗自好而當世談論之士多加詆謗自入有罪者之籍汚穢終身莫能自潔使平日所立之志扃閉淪落智髙萬物之上而名陷九淵之下于中夜竊自嘆悔不當輕易效慕世俗科舉徇外搆此凶逆今又不警而欲仕乎此甚不宜出者一當時同黜之人固有不幸而被汚者然罪大惡極羞談于婦人女子之口尚十之九彼豈不覬幸僕出以為先容之地而當時宰執又率崇私愛而乏分別茍欲引其私人必援僕為喻是所以用僕者非必實知其為人而真明其有誣也如此則是以賢者之身而為不肖者之資矣語有曰君子非其招不往以不賢人之招招賢人如之何其可往哉今衆人雖以不肖謂僕而僕未嘗一日不以君子自謂已如此自謂而人以彼謂已蓋所謂呼爾而與乞人不屑者也此甚不宜出者二明公之意特出于一時愛念之篤偶未詳究及此然言出乎口通乎心明有日月幽有鬼神此區區平素之悃可一鑒而盡者公如覺之必信其為肝膈之實慨然臨我體我矣會公甚難既會又復匆匆不得請益而又不能迎候敝邑此甚負公也諒公有以恕之乎臨紙惘然春和伏惟保順幸甚與文徴明書唐寅寅白徴明君卿竊嘗聞之纍吁可以當泣痛言可以譬哀故薑氏嘆于室而堅城為之隳堞荆軻議于朝而壯士為之伏劒良以情之所感木石動容而事之所激生有不顧也昔每論此廢書而嘆不意今者事集于僕哀哉哀哉此亦命矣俯首自分死喪無日括囊泣血羣于鳥獸而君卿猶以英雄期僕忘其罪纍殷勤教督罄竭懷素缺然不報是馬遷之志不達于任侯少卿之心不信于蘇季也計僕少年居身屠酤鼓刀滌血獲奉君卿周旋頡頏婆娑皆欲以功名命世不幸多故衰亂相尋父母妻子躡踵而沒喪車屢駕黃口嗷嗷加僕之佚蕩無羈不問生産何有何亡付之談笑鳴琴在室坐客長滿而亦能慷慨然諾周人之急嘗自謂布衣之俠私甚厚魯連先生與朱家二人為其言足以抗世而惠足以庇人願儕門下一卒而悼世之不常有此士也蕪穢日積門户衰廢柴車索帶遂及藍縷猶幸藉朋友之資鄉曲之譽公卿吹噓援枯就生起骨加肉猥以微名冒東南多士之上方斯時也薦紳交遊舉手相慶將謂僕濫文筆之縱橫執談論之户轍岐舌而贊并口而稱墻髙基下遂為禍的側目在旁而僕不知從容晏笑已在虎口庭無繁桑貝錦百匹讒舌萬丈飛章交加至乎天子震赫召捕詔獄身貫三木卒吏如虎舉頭搶地洟泗橫集而後崑山焚如玉石皆燬下流難處衆惡所歸績絲成網羅狼衆乃食人馬氂切白玉三言變慈母海內遂以寅為不齒之士揮拳張膽若赴仇敵知與不知畢指而唾辱亦甚矣整冠李下掇墨甑中僕雖聾盲亦知罪也當衡者哀憐其窮點檢舊章責為部郵將使積勞補過循資干祿而蘧篨戚施俯仰異態士也可殺不能再辱嗟乎君卿僕幸同心于執事者于兹十五年矣縞帶紵衣逮于今日瀝膽濯肝明何嘗負朋友幽何嘗畏鬼神兹所經由慘毒萬狀眉目改觀愧色滿面衣焦不可伸履決不可納僮奴據案夫妻反目舊有獰狗當門而噬反視室中甂甌破缺衣履之外靡有長物西風鳴枯蕭然羈客嗟嗟咄咄計無所出將春掇桑椹秋有橡實餘者不逮則寄口浮屠日願一餐蓋不謀其夕也欷歔乎哉如此而不自引決抱石就木者良自怨恨筋骨柔脆不能挽強執鋭攬荆吳之士劒客大俠獨當一隊為國家出死命使功勞可以紀録乃徒以區區研摩刻削之材而欲周濟世間又遭不幸原田無嵗禍與命期抱毁負謗罪大罰小不勝其賀矣竊窺古人墨翟拘囚乃有薄喪孫子失足爰著兵法馬遷腐戮史記百篇賈生流放文辭卓落不自揆測願慮其後以合孔氏不以人廢言之志亦將櫽括舊聞總滙百氏敘述十經翺翔藴奧以成一家之言傳之好事託之髙山沒身而後有甘鮑魚之腥而忘其臭者傳誦其言探察其心必將為之撫缶命酒擊節而歌嗚嗚也嗟哉君卿男子闔棺事始定視吾舌存否也僕素軼俠不能及德欲振謀策操低昻功且廢矣若不託筆札以自見將何成哉譬若蜉蝣衣裳楚楚身雖不久為人所憐僕一日得完首領就柏下見先君子使後世亦知有唐生者嵗月不久人命飛霜何能自戮塵中屈身低眉以竊衣食使朋友謂僕何使後世謂唐生何素自輕富貴猶飛毛今而若此是不信于朋友也寒暑代遷裘葛可繼飽則夷猶飢乃乞食豈不偉哉黃鵠舉矣華騶奮矣君卿豈愛戀棧豆嚇腐鼠耶此外無他談但吾弟弱不任門户傍無叔伯衣食空絶必為流莩僕素論交者皆負節義幸捐狗馬餘食使不絶唐氏之祀則區區之懷安矣樂矣尚復何言惟君卿察之寄舒子王廷陳辱書教以矜飾名行意甚勤懇僕惟少負性氣自視無前遭事直往不知其可復見近世州郡之吏務為諂承故于逢迎節數稍為損減不意遂犯當世之怒又以一二宰執舊怨于僕內外搆扇中僕惟恐不深耳曩時交逰見僕身忤要津虞禍及已莫敢張口伸舌一為論列明其不然者當是時也吏無振滯之議友無急難之仁幽于圜牆之中日與徒𨽻為伍身非木石其何以堪以故俯首震惕卒從重比嗟乎百犬吠聲積羽折輪十夫撓椎三人成虎此墨翟有素絲之悲阮籍有窮途之哭也身愧蛾眉敢云見妬行乖完璧而欲免于瑕摘也難矣然猶茍全要領生還鄉縣奉二親之晨昏上先世之丘墓撫今悼往憂喜駢集因念河清難俟人事靡常南山之歌恨長夜之莫旦竹林之侣假麴糵以紓悰斯達生所以放言幽人因之長往者也自分身纍百垢長為世棄乃稍稍脫拘攣之文逸瑣尾之忌弛煩多之縶然亦不敢踰大間冒隱惡滅先王之禮觸當世之禁務敦窮居之尚絶希進之心而執事乃欲責暖于寒灰俟完于墮甑幾翔于鎩羽望僕以回景曜之末照而收桑榆之晚績也無乃與僕之私指謬乎夫豢鹿頓纓志在豐草羈鳥奮翮棲慕一枝即有惡殺之國過仁之主腴飼之厮寵之以髙軒享之以玉饌娛之以雕檻啖之以棗脯彼且駭顧驚鳴奔逸之惟逺耳僕聞古之聖賢心有所鬱結不能通其意則著一家之言思垂不朽僕誠欲效之用舒憤悶庶幾償前辱之萬一流文采于無窮然才劣左馬而欲自附于作者畫虎之誚其能免乎方將修農圃之業給公家之輸賴其羡餘以贍妻子長為太平之民雖至老死不覿兵革志願畢矣風便再錫教旨寄屠漸山書陳束屏棄以來久不欲通問貴遊每懷足下疇曩之誼擬作一書輒猶豫數日何者形迹既舛情素殊別恐冒周爻浚恆之戒將蒙谷風棄豫之慙是以搦管操觚隨又捐棄亦冀遙忖愚心知其非嫚也錢黃門入楚伏承惠書惓惓詞文藻繢情致專篤陳昔時嬿樂之悰歎數子飄零之迹奉讀周旋祇增惋憾耳方今龍軒側席鶴禁繼明宇內欣欣襟帶之士揚鬐仰沫足下秉髙世之志體絶人之才抗迹紫宫策竒清漢英聲懋實為士品規夫順風而彈雲和之絲乘埤而建辰旒之節不待明知而見聞廣矣幸甚幸甚僕不佞才質紕繆無所比數以因緣階第得侍內庭終非其人果遭罷斥爾來湖上已三見朱明矣磷緇塵鞅玄髮變衰跋涉川途壯心潰裂是以過黃陵而嘆息泛赤壁以欷噓悽目九派之流傷心一柱之觀哭屈平于湘水弔賈誼于長沙北上荆州更懷王粲西還夏浦再泣禰生彼數子並以命世之才窮愁鬱抑用不究于當年俯仰古今異代同嘆東上更入辰沅謝溪則蠻夷之所都也青山萬疊巑岏插天黑霧千尋黯黲蔽日哀猿夜響鬼谷晝隂暴獸窺形螫蟲射影斯實涉厯之艱辛然非愚心之所悲也若乃羈縛汙塗婆娑行列積憤誰平懷竒不泄期會結束則朝夕遄征案牘嬰纒則寢食俱輟二物用而赤子唬百事滿而吏曹謁當其悾愡且不知人生之樂况其他乎是以陳子康積恨于京城汲長孺存情乎禁闥張膠東自嘆其無竒陶彭澤挂冠而歸潔古今人情略同其揆矣五十為夀僕行年己過大半數時以來疾疢作苦神明不舍形氣支離以手約圍腰腹率計一月小一二分矣人命難保富貴何期親故不量往往以詭詞相慰蓋孝標懷舊則絶交之論廣張敏恤窮而頭責之文作此皆不達義命逺于情實者也夫十圍之材文以為梁棟其斷在于溝中同畝之稷上則饗神而其餘委于鴈鶩非其材質不同所遇之時命異也故曰安時安命超玄之乘知彰知微保命之幾足下乃取徴于合劒論竒于效璞來書之云信不由𠂻乎僕早嵗束髮頗有𢎞志中年蹭蹬竟戾微情君子見幾不如舍去不然則匹夫效志炳耀丹青况僕為専命之使猶得參下大夫之列如使吾道遂廢斯文在兹足下視僕豈後于常人哉家世貧素不事作業粳豆之奉雖不常飽母性髙明生能容介子之隱妻賢女也死不沒黔婁之行己矣哉金門何期石室能待髙軒無分名山可藏句章之曲倘容適志乎謹題尺疏使人北干明主因告足下拜述前忱負疾未平力論不悉辰州與田叔禾書陳束鄉渡蘭江知執事留滯樠溪欣然甚期一會迫雨潦溪漲全行日少才及下雋軺車己先日北發慙灼如何昔人重追朋故或輕千里解組紱相從僕今不能不如古人逺矣煩暑跋涉伏惟無恙此邦故夷蠻之都自昔遐矣西去更有崇山茂林停嵐慘霼晝日不開谼硐潨澓懸崖崒石馬瘏不敢前鳶飛跕跕不能渡栗心兹時睇夜郎之修坂感昔賢之遺欷豫陽何心能不悲乎尚念在郎署時與君席地持蟹螯倒瓻浮白張目大噱何期不朝夕乃今步武間不遂對晤固信詩人所以重一日之別也三度枉教札并以雅什荷殷勤意甚厚捧諭知愧夫人捐棄不忖何以為情昨計轍迹當道楚中時與阿婦言幸且會而女兄以為歡悰今乃已矣當還白婦共為酸洟耳僕入楚來即有辰沅之役數數羈旅所不可為具陳居北地日久朅至南中暑濕之鄉氣體大不佳家人各各嬰疾妻子癯然羸苦鄉園之情見此不能無動僕故農家也世乏炯迹門榭中薄囷鮮擔石之蓄畎無一牛之蹊晨不殖作莫廢炊淅而稚年寡伎能釋擔負笈師受墳索母太夫人垂及髙年有馮衍負困之纍懷毛廬江喜檄之情幸藉祿奉將八厯星嵗金門銅柱具所繇厯稍識宦情便嗒然可罷夫榮華之門徐亟異運同管于廢歇惟彼蚤哲為能無吝幾圖剨劈此緣而親故中闌不仕無養油油然止瓠拙之才世大不宜亦時學就人周旋輒都又忘卻語不云乎亦已焉哉逝將返舊林散髮掉臂為明時樂萌海內同志亦有毗陵唐子或言其抱疴食不能暫甘便欲挂冠躡屣相依荆水之上此中倘有富人可以貸債買僮遂什一之息量粟米牧雞豕庶幾足母氏饘糜之養遨逰名山沒齒無憾比得友人李中溪書云江南富人祇敬官人罷則無所于貸誠然誠然眉睫之間何情不爾又望之賈豎乎就令餓餒當荷鍤抱甕茹澗溪之毛啜無營之水尚一澆悾愡積懷貧非為病黔婁原憲彼亦何人倘得與此輩同歸爾首秋計遣人疏闕下天網三驅何禽不遂區區之忱先已自喜見説執事亦有斯度故以相告人心不同亦未敢告之他衆引姍笑也山院毒熱百務報罷忽復懷君慕王生一夕命舟之誼遣一力函書馳候附以短章久濶情慉言何能悉與劉坦翁書朱曰藩曰藩別公數十年昨獲造真廬覿晬顔聆教盡日稍慰積仰坦林辨壑卧逰久矣一日措身其間不必畫也藩常讀謝靈運山居賦劉孝標金華山棲志每疑古人過于標致未必如此乃今信其有也夕陽出山留連溪上公不忍別曰藩不忍發判袂之後因成絶句一首夕陽野艇語從容籃輿歸途田燭紅小辨山前津吏報五林昨夜相舟東題曰別南坦丈歸後作蓋紀兹遇云爾繪樓之什欲勉強奉教中夜引枕思不能就大抵達人曠世之度超于埃壒之表應酬伎倆自不容投必得陶韋之輩情往興來蕭灑數言始與兹樓相映帶也如何如何比者嘉禾水涸官舟皆取道湖洑曰藩疲于應接痰火大作早起復冒風寒嗽不止遂卧病邑齋暫謝人事遙夜獨坐童僕靜默驚風動樹寒霰集庭顧景徘徊不覺霣涕身在湖南家在江北七十老人獨留堂上孤羈逺道夙寡弟昆之助兼之湖田失嵗里閈蕭條雖朝夕足謀而緩急誰恃文勝厚衣安仁嘗膳人之情也到官以來五十餘日氣變如此而起居不聞公謂曰藩何如其為情哉曰藩不肖藉父祖餘庇兩執郡縣之役雖無卓異可紀率克守官針不誣考課少年之日習于見聞嘗念異時倘叨一命亦庶幾無忝前修固不敢視為徒勞妄自菲薄奈何職業不勤致身已晚始願雖獲于事主即境終苦于違親昔楊朱臨路而長號墨翟睹絲而歔欷良有以也重念先人平日雅好購書家藏殆數千卷皆手自校讐識以印記藏之邗上別業嘗指示曰藩曰我平生辛苦有此汝能繼我之志否曰藩時尚少也自省事來即感先人斯語閉門不出出其書遍觀之卧以薦寤食以當飴偶至會心處輒欣然永日矢以自終二十年來習氣遂成甚至田園日蕪慶弔都絶亦不暇顧也近時一二有道君子見曰藩如此憐其愚而為教甚殷曰藩自揣人品卑劣不克負荷嘗謔之曰君素羞貧子説金無乃以黃葉止啼耶若曰藩意則不然必欲辛勤如程子所謂迤邐直至十三級以求其輪不敢對塔而説也古人云吾何信信乎我而已孤明厯厯天不可欺使我中無所得徒受人寄載黨同伐異曰藩死不願為之也初心自許荏苒至今生命不諧當此劇縣初至承前百冗交集自朝至夕卒卒無須臾之間異時微向抹殺盡矣前偶作家書澘然之澘誤作􅀈字竟不知塗注友人強題芙蓉障子訛用竹間水際之語蓋牡丹事檢史記敘白圭貨殖偶探得商君傳至無功者雖富無芬華遂目白圭嗇于居積如此精神荒耗殆類健忘自來臨文不如此之謬揆厥本原實由驟去鄉土所思隔越雖微古人嚙指之誠自不覺心馳神往耳嗟乎嗟乎生今之時古道難矣相刃相靡行盡如馳回思二十年黽勉家食求以繼先人之志者何如荷諸君子之教雖不敢茍同蘄無負于嵗晏者朝歌絆足之嫌中散頓纓之喻固非至訓然徒使竹素之功收于錢穀丹鉛之力銷于簿領亦非曰藩多病之所堪也蓋乘田委吏必達節者能之吾斯未信他更何言仰惟我公天夀平格保乂王家碩望鎮巖廊清節肅海宇後來之士伏在下風欲丐一言以為終身旌鏡卬首而不可得曰藩何幸山公謂嵇紹曰為君思之久矣天地四時猶有消息而況于人乎此所以不容不咨于我公在公之誼亦不容不為之思而忘其瀆也雖然知我者謂我心憂不知我者謂我何求臨書不勝悚栗與懷沈二弟書沈愷追惟往事余方茂齒子亦妙齡俱值雍熙並歡衡泌時時執手陳説平生興至把酒持蟹螯或擁壺矢張目大噱風雨無聊據胡牀相對刺刺語少小事不休雪夜擁爐促坐至煨芋栗供母母子煦煦笑相語歡如也胡期不爾乃今嵗月易邁動間山川引領西顧悵矣心飛追惟舊歡往不可復未嘗不傷心泫涕焉余性佚宕不耐齷齪少年屏居湖上頗耽古墳挾書册琅琅誦讀適與意會則莞然獨笑或與二三子談古人功伐照耀名節慷慨輒耳熱面赤自奮勵矢曰無相負也他日果得脫穎而去當效尺寸以標趨古人無虛皓首使泯沒弗章言猶記憶隱隱如昨日事豈竟忘邪第時勢無常寡合難偶碌碌二十年不克自效年踰三十始竊一第盛華變衰壯心潰裂上之不能昵顯人下之不能援英少意氣瞶眊已非湖上時矣其視二三執事則皆飛騰閶闔振翼紫微華名已飛照四裔顧視區區心勞而迹下志鬱而道窮俯首抑氣抑復誰語一為郡吏便落塵網期會結束則朝夕靡寧簿書纒擾至寢夢俱愕當其忽忽且不知有生人之樂况其他乎久與筆硯為仇間或勉強拈弄率又濡毫染翰終日閣筆不能以句是可以覽覩矣余不自量酷愛山泉常扳窮岩棲古寺托形崇阜息影長林每見人談四明天台之勝輒津津喜恨不獨往乃今剖竹明州分符千里若天假之緣也自入越以來果見積山萬疊出竒獻異參差代雄表裏紫霄信美且竒豈不欲駕葉舟鳴榔上下少假一日之逰哉第境緣人勝樂隨意適一行作吏豈復賞心佳境滿前徒增悲惻是以過錢塘而嘆息陟吳嶺以唏噓悽目清風之嶺傷心越望之臺哭武穆于西湖弔坡翁于堤上朝步蘭亭更懷羲獻暮探禹窟尤憶子長此數子皆以髙才名世窮愁抑鬱用匪其時弔古懷人耿耿不寐西上桐江則又嚴陵之所釣逰也名山竒水天下獨絶弭楫臺下夕景凄惻又聞孤猿寒嘯離鴻逺吟樵蘇一嘆舟子再泫余益愴然悲矣然斯亦觸景之幽懷終非豫心之所懼也但以此邦之民難以托根投人夜光鮮不按劒欲強自表見恐方鑿圓枘齟齬難從跋前疐後差池不狎自非樂天知命誰能不憤悒者哉是以馮子彈鋏而行歌莊周臨流而浩嘆平子自賦其無成賈生亦悲其不偶古今人情略同其概矣昔讀嵇中散有七不堪或謂出于矯強以為無之乃今信其真有爾不謂余也身當其事且有不快者有九焉老母今年六十有五矣即康強無恙人子之心詎敢恃邪往嵗迎致官邸母子朝夕煦煦無何以覲事西歸竟以渡江涉險艱于跋涉猶未即至動定謦咳咫尺天涯倚門極目能不依依此不快一也余生而懦弱年近三十受氣始足性不奈勞苦今髮就種種老態將至不以此時休養性靈少延嵗月更復碌碌其何以堪此不快二也待罪兹土邊檄報漳冦通番舶可不日至可忽至而飛檣利楫絡繹海上舟山居民日被侵掠今已不能葺田廬供賦役矣癰疽結于腹心猶不自知更復坐糜廩祿何以自立此不快三也寧民好訟習囂入骨結構窮年牢不可解稍以法繩之控訴上官顛倒黑白即刺心無以自明德不孚人難以格化此不快四也習俗喜同厭于創見即有一二興革好事者橫生口語囂然議起此不快五也海上積蠧弊彌山海一旦摘發隂奪而計反之招尤任怨有不能免此不快六也又性曠逸雅好恬寂一陟堂階千態萬狀具在目前有所感觸情焦心裂此不快七也性不善藏蓄見人輒吐肺肝人有過差好為面折有不當意色辭俱厲至狂發不顧先後人道以為怪此不快八也年踰四十山妻棄去二嬰夭亡撫影煢煢日抱隱痛此不快九也以此數端永念平生難為胸臆揚子雲云得志則大行不得志則龍蛇遇不遇命也而今而後當稍知自遣排愁破涕人生須自適爾憂戚何為佛氏不云乎苦海無邊回頭是岸行當別圖去就拂袖東歸重理舊業與子尋繹往事家貧雖不能給嵗得汚邪之利亦可供母饘粥茍非凶嵗能自力作尚足伏臘幽期可托得全素履山南水北惟意所適煙雲花鳥孰非吾事嗟乎富貴人所欲也古之髙士不肯掃門覓仕顧専一丘一壑之美者豈不身重于宇宙而恬貴于芬華哉已矣乎石室有緣名山可待圖書左右樂有餘歡琴瑟靜好此外何務庶擁腫之木得以不才免而頑鈍之石可自保其天年不為非幸也又奚必栖栖空勞鼓缶向人作屈曲態邪百年逆旅迅駒過隙時移事定孰醜孰妍必有能辨之者此但可為吾子道不敢對他人言也明文海卷二百
