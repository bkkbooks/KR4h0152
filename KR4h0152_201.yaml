body:
  text: 明文海卷二百一餘姚黄宗羲編書五十五悽惋寄向永修書顧慤白門之別半在病鄉雲樹茫茫遊心千里頗以久不得教藥為恨鄉人来問候之餘首喜徴輸告集亦林下士清曠之一便也秋來聞乾乾齋事亟徬徨躑躅莫置念間扵是自始至終序次私恩仰閽縷陳上覬歸許孰知梏扵吾窮跋前疐後顛倒錯亂安排扵造物之囿而莫知所以如是者其究信不越乎僻習之累然求其所漸或未能無遺扵此而齒頰之勤曾謂足下而不可以語此乎士之宅身處事憂喜之端不能相恃以為終窮者若是其無常也僕之出處豈有心扵時邪非也吾不得而知也雖然銜命上道樂趨利進之機譬孺子之甘豢焉有未暇齒牙其餘者矣已而覲金門侍東壁就事之初絆扵虚名勞則有加暇逸無間鞭駑策疲奉職惟勤屈情應物莫識所謂方諸偃蹇林下無拘扵時者自始而不侔矣矧宸衛森嚴動有繩尺揺唇擬歩靡敢或戾兢兢然恐恐然于朝于夕為之膽落退處僑寓四壁蕭條早作暮歸僅如逆旅上沮晨昏之候下無妻子之奉寒暑互迫顛倒裘葛燕豆疏惡庖丁謂誰矻矻沮氣茫然若失僚友如蝟知己安在出門四顧莫知所向方斯時也樂趨利進之心貶扵兹者過半矣一激扵義牙機斯張以為或者因此而内可以歸見吾母外可以圖報私恩幸而在彼有勿藥之喜然後退與足下抵掌道故優㳺涵泳尋墜緒扵詠春之餘以靖吾志暇則攜良師友陶情觴豆小酌微醉互酧互酢賓主俱忘彼歌此續隱耳互發眞樂所寓悠然成聲却藪澤之羅以事湖上之屐或親稼圃或耕六籍使堂上無戚戚之容而股掌有弄兒之樂神融意㑹或庶幾扵此也事與心違一至扵是斥逐以來羨慕之私既沮一旦之得髙飛深泳至此始有計得之悟要其所終亦僥倖羅鉗者之常耳遭一蹶者得一便歴一禍者長一識然則兩曜之下仰而笑俯而歎思勤慮密進退之判慨然得之扵困折摧敗之餘者有人焉而非焦鵬寥廓之謂也雖然掉首却顧則乃翁之事已去擾擾逐逐何見事之晩耶或曰不然人不涉難則知不明此君子之定論而夫人至此實始有定見焉噫嘻今是昨非已既萌扵兹即是而樹之土以固其根溉之水以澤其葉剪其繁蕪以作其氣暢達其枝使盤根錯節帖然無恐扵疾風暴雨之厲則培養之勤固未免胼胝扵此而自兹以往安知夫不花實扵彼也信可恃乎吾不能無惑矣夫倚天下之事以必集者固有識之所甚諱也所謂憂喜之端卒不能相恃以為終窮如此豈古人所謂損之而益敗之而成虐之而樂邪非也吾又不得而知也人有恒言泰山秋毫各安其所受矣乃若僕之受直以傭扵時者計宜安出而自取顛倒以墮先子之光貽倚門之思安在其多慮也吁失脚畏途猥與胥靡之屬十百為伍浮舟載橐呼嘘毒癘奔走扵蠻烟瘴雨之外自我亦何足惜哉所顧可念者老母而己此平生交之一詩所不容不作而汗背泚顙痛悼不孝之罪不可贖也先哲有言天地萬物自有形求之何往而非數也夫血氣之體叅兩間而寓者直不過數中一靈物耳矧僕之𡨕陋屈伸榮辱無闗扵時者正太史公所謂九牛之亡一毛耳一折挫何害扵重輕也而俯仰唱嘆纍纍不忘扵喙如此雖所發未必一蔽扵離憂而淵深之士将據此而議我矣哲人遭之亦有以處此乎亦曰委吾身扵大化混萬物以無跡視變化如浮雲等一世扵無有隨寓而安處困而亨以道理為始終而與物俱化從容扵元氣之表不知其孰得而孰失也然而學力未淳有不易强焉而至吾姑即其所就而因知己者以雪其隱焉亦何恤扵人言僕少椎朴用名曰慤長移扵習足下實始以存誠鍼之提警之勤亦既辱命奈何乎梏亡反覆卒底荒悖反觀内究隨得隨失理欲相乗大抵多芸人之田事人之事至扵胼胝於彼困極思歸則方寸茅塞且日趨扵蕪矣風雨晝晦大明未嘗不麗扵天尚賴是理為之主人焉向非足下攜持匡救之力幾何不至扵流蕩而忘返也於戲寳峰先覺嗣續斯盡同門之士有見扵似是實非之源如足下者能不軫其窮乎比見時僉憲扵京師劇念諸老凋喪湖山無主道舊論交頗隱然以楊門領袖屬意扵足下且有所望焉曰大浸砥柱不移風雨如晦雞鳴不已唯有以勉其純且誠也僕觀夢墨翁雖所謂文章之士而知人之明至此而無可議吾弟甚冥足下幸念先人之舊推僕之所以相尚相合之誠而一轉其憤悱之機唯留意母忽若兩地相望共此明月之情請付之忘言明文海卷二百一
