body:
  text: 明文海卷二百四餘姚黃宗羲編書五十八頌寃上楊邃菴書何景明僕聞聖人哲士取人於衆惡明主顯相識賢於集毁夫徇同情則獨行見遺實多口則廉節被黜何也獨行者同情之所繆而廉節者衆口之所黜也昔匡章棄於通國而獲與於孟軻即墨汚於左右而受封於威王孔子明公冶之非罪晏嬰脫石父於縲絏是故衆惡之中聖哲之所必詳集毁之下明顯之所弗蔽也今有操獨行秉廉節而干衆惡負集毁若李夢陽者明公在上何可弗少加察而一援之也夫僕於陽非敢謂其無過也自崇而弗下人太任而弗識時多憤激之氣乏兼容之量昧致柔之訓犯必折之戒此其過也若其飭身好修矜名投義見善必取見惡必擊不附炎門不趨利徑處逺懷不招之耻處近執莫麾之勇在野有兔置之武在公著素絲之直立志抗行秉心陳力咸可尚也前與御史相忤同黨交搆恃其貞介不服文法邅延無已固其自取而尊逹至為不恱縉紳靡然誹笑言官亟詆於朝法吏深鞫於獄惟恐摧之弗披而辱之弗窘也嗟哉亦已甚矣謂深懲以全之乃底其壞厯責以備之實求其缺謂其為高好勝多事越位不即攻之將為患害則陽之為害弗猶愈於賣法成賄汚行喪守玩公詭避行私煽虐甘心附媚役志富勢者乎凡此一切置之不問而獨於陽而較焉何也大槩習於茍同而畏異已溺於混濁而非獨清便於相容而憚弗羣務為蔽暗而忌太白故當事謂之橫伐姦謂之訐建樹謂之標已振起謂之輕事問民隱曰市名而出位持國法曰寡情而立威是以詭俗諧衆之人相倚為譽而直節獨行之士疾之若讐由此觀之仕宦之徒不貶損以就時遊滑以希世何能免於今之人哉明公在上秉進退之權司統均之任奬拔廉直沮抑邪枉而陽為門下相知之士其困於人若此况門墻之外萬里之逺者乎夫讒言屢至慈母投杼浸漬之灌可解膠漆僕於陽有肝膽之交聞於人言猶弗能無疑明公之門陽不敢徑逹雖有鬱抑何由少白然陽之事在江西者亦甚彰彰匪有隱惡難見也僕嘗究之衆議士民頗公學校之徒曰陽敦古崇禮志在澄清閭閻之下曰陽不為撫按官爾可使盜賊息權勢不害我也夫學校之徒陽之黨也其言不徵閭閻之下無知之衆何以黨於陽哉今京師之士其弗知者則已流言傳訛昧形議影羣猜共怒一吠百聲持辨風起發言雷同矣間有知者則亦恐異同於威要之吏以遭口舌之禍視為秦越隨其軒輊夫反同情以伸人格衆口以明物此其弗利也必矣孰肯樂弗利而為之哉昔孔融鶚薦乎禰衡汾陽解爵於李白揚善登俊閔才舒困昭昭人代矣今陽之文藻敷贍才辨捷給誠二子之流匹而拘檢行止間於禮義可以用世賁治二子弗若也乃窘辱摧靡卒無一為之地者僕甚傷之伏惟明公秉道服人積望鎮衆力可以移易範可以表正於陽少加援察采士民之議捐比附之論使邪枉無順遂之私廉直無不容之嘆非獨陽之幸也國家斯文幸甚與司官書楊爵竊惟執事名臣後裔儒林節行自理北司事以來獄中人盛德之贊青天之謡走二人得於耳聞者亦久且熟矣往年曽寺丞子如獄中具道二執事於爵其垂念曲全之心甚為切至以二人事喻東人云幹國之臣當為調解此皆二執事痛隱時政懸切國民而為世道深長之慮之心也豈特區區為二人惜哉在二人未嘗不銘刻肺腑感激思奮益自砥礪而求不負賢人君子之許可焉屢欲修書啓謝以罪難中多所不便而止其敢忘此厚德而忍於自薄也十月初爵以事出窮迫以死自誓又不欲茍且泯沒使死無聞焉思欲具書以獻主上以盡垂歿忠藎之識其書始終千餘言大抵援古證今剖析於義利邪正之幾懇切於安危存亡之戒欲主上納諌容直以成君德以廣君道與唐虞三代兼美比隆中間有云臣以罪處獄中四十五月有餘矣延此一息尚未死滅此實陛下好生之德覆載之恩之所及而陶某等於臣飲食一節曲為區處不欲置臣於死使朝廷有殺諌臣之名其心未必不為忠於陛下者也此數語者實以古人之作用望為執事之能事焉諺云以所重加於所好爵以人臣以道事君者而望二執事是以天下古今所同重之道而加之矣其待之可謂至厚期之可謂至逺矣時以楮筆不便未能具藁君門萬里亦無由為九重獻而徒能以口誦耳故嘗數語邏者云我有心事願告朝廷汝為我逹之所以為此言者以兾主上賜紙筆則頃刻可成稽首以上雖死不恨天啓聖𠂻萬一感悟不惟國家大政有所禆益而二執事之髙義美名亦因得以示天下傳後世矣近日獄中嚴戒之故走二人亦頗聞其詳矣顧事至於此莫非天命上則朝廷之法下則人臣之罪在二人敢不修身以俟而順受之乎但身居言路職任諌諍中奮感激不無觸犯而雷霆赫然之下既以微示戒笞而全此生矣以一時言語文字之狂妄而數年坎穽禁錮之凶危則所犯之罪與所服之法亦足以相稱矣今復困以匣鎖加之以非常之法而置之於必死之地焉在二人一時之存亡雖甚微而關於天下國家者為甚大故憂憤感悲盡誠號呼而慨吾遭際之不淑此心此情實不能自已矣每夜初上鎖腰縶足曰羣捆曰生根一人立而唱之數人縛而為之以此治元惡盜寇之峻法舉而加之於出百死為宗廟社稷慮之諫官焉時事至此真可為痛哭流涕者矣况二人家貧路逺官淺罪深窮乏已極於守獄校卒無毫末德意推以相及則舉手之際有何情分非有二執事在上將誰倚以存此生乎即今幽室窵杳門扉晝鎖漫漫然與長夜無以異下地冷木之上肌膚凛烈一苫一席之藉皆事屬觸法而并為人所徹去坐卧起立展轉關禁一飲一啄率至窮詰其萬辛萬苦萬窘萬迫之情狀視獄中諸犯其嚴急之過不啻十倍聽其言語察其意向似欲二人速死以畢事焉耳竊以為凡此毒苦之甚二執事或未能以盡知焉若曰知之則往年仁愛所及固切切焉欲全此殘生矣而今復不以生處之豈肯以數年至厚之德轉而為一日之甚薄乎故二人直慮以為二執事決不知其如此之甚也或者以一分謹慎分付而下之人奉承之者過於十分焉此則事勢至此容或有之今日切近災禍二人已身久罹之天地鬼神照此𠂻曲而志窮慮極亦已甚矣故不恤冒瀆之罪敢以迫切悃素仰告而無所匿欲望此等毒罰仍賜寬恕但不時預備若事出不測則倉卒即可處辦決不敢以餘罪有纍於二執事焉如此則情法庶幾兩盡囚繫顛危之歲月或可以再延矣雖東人覘視日在於此而彼皆二執事屬下舊人天理之在人心者未嘗亡而見其知好惡曉事理者十常八九更煩以一言欵喻則若輩未有不信從者矣若二執事不為顧念而一聽下人之所為則寒風凜烈之際羸瘠弱孱之質實難克堪而二人相繼死者有日矣天地間無不死之人無不化之物誠使二人一旦命先朝露倐忽殞滅為死於諌職之下求仁得仁志固未嘗不自慊矣豈以一死為惜哉但念天王聖明堂堂天下不能容此致身報主之直臣使竟死獄中於二執事數年保全之德愛亦未得終始領之人臣之禍朝政之損主上盛德之纍為天地間留一無窮之悲恨矣故昨嘗有詩云九天風色夜蕭蕭此日君門萬里遙不是諌臣愛一死殺身恐纍聖明朝此實二人惻怛悲感惓惓不已之心也古人願為良臣不願為忠臣二人今日之事其是非得失固不容以自喙矣但慮天下後世有志士焉其慷慨殺身而存視死如歸之節者實有鑒於此焉天下後世有仁人焉其見幾而作得明哲保身之宜者亦實有鑒於此焉所見不同而好尚斯異一時心事固為人之所取而亦為人之所戒焉若二執事身當今日之事上不使朝廷有殺諌臣之名下不使忠臣義士吞泣飲恨鬱抑於九地之下則經權迭用有善處之道存焉耳有祁大夫則叔向得以不死黨錮之禍非霍諝不能遽解而郭楫之語范滂事雖未就而高名千古不朽也二執事有賢者之節介有能者之作為故二人敢以古豪傑之事業望之而欲其成廟社之逺圖焉富貴福澤一日之榮寵名節道德萬世之瞻仰於事變難處之際而綽有處之之道非吾二執事之高出俗輩將誰望焉辨寃書盧柟古者大夫士志行不通於上則盡於書以列其情要其最顯者則李斯盡秦蘇秦鄒衍田需張儀盡六國司馬相如卜式鼂錯徐樂枚乘主父偃盡漢韓愈柳子厚張籍李翺盡唐司馬光王安石蘇洵軾轍歐陽修盡宋雜遊説兼道藝窮於布衣側微之辭而後下之人得以抒其慮上之人感切於諷直之説於以納其忠而弗之罪焉則夫書之宜上下通貴賤也於古有是夫雖然幸而處常徵諸言載之書可以逹天子不幸而值變身桎梏之刑待鈇鉞之誅徒嘔心血筆而書之不足以逹士庶人何者彼其天壤之相違居養之相異囊首赭衣之徒固不足以動人之耳目也今天下公卿士大夫自宰相而下與天子持議論相可否乘朱輪而插貂蟬紆金紫而懷珠玉執天地之符而力侔造化者固不為少也而柟含寃幽室關鍵口舌不敢延頸而一鳴者何也伏枷鎖罹重法厠穢弗潔之囚誠不敢輒以書通竊又懼夫上之人不肯戢威解顔傾耳一聽死亡者之論徒速血肉糜骨之禍耳夫鳥極則厲鳴獸極則走鋌人窮則歸本呼天命之衰也於柟已甚安得不頓足狂呼祈霖雨救塗炭冒死一言於執事哉夫柟世家業農幼而讀書循章句以諸生受胡氏春秋餟屈宋之糟遊司馬氏之濵窺迹於揚雄諸子之垣然志行狂簡言多激越時時取釁厲為世人譏誚庚子歲二月中柟傭工人王隆左手病瘡甚柟謂隆曰汝之病殆不可事事給汝直復若業何如隆曰諾請以張杲強幹而多力者代僕柟曰然汝行遂厯試張杲為傭奴六月二十一日杲盜場麥柟聞之以畀司里杲遁宿孫潔場中食守場人李現場一缶明日柟赴訴縣伊家乘大雨排房塌撲死旦日杲母魏氏駕訟邑侯蔣公曰盧柟毆伊男卒七月初五日蔣公發閲杲尸則上齒闕者六左脛裂凡可以致死者無不毒傷夫齒闕則食難脛裂則行委自柟場至孫潔場逴一里逺而彼走且食此其齒與脛果得有恙否也齒脛俱無恙而闕而折果孰為之耶當是時柟具大刑對思不知所出蔣公亦不測杲體遍傷故相栲掠數百自朝至日昃與法具伍嗚呼柟以柔脆之膚而犯堅虐之刑具彼何情而不嚙豫骨肉而柟非金石之固亦安能久於抗對也茍疾痛有間雖赤族之禍然且不恤矣是月二十七日柟先母哭柟於野有婦人前持母曰毋哀我張杲姊也我父杲叔實知杲死雨頽房壁壓焉杲叔張升又謂柟父曰杲之死也甚微而難言父窮之曰吳章者杲外叔魏氏與章淫禁章不得娶而居其室杲之死夫二人者圖之房壁頽厭非特霖雨使然也鄉昔齒闕脛裂者遍身毒傷於兹可徵焉先人以姦慝之迹隱而具房撲之情於巡按樊公準辨飭大名勘問未及而按臨會審樊公謂在庭諸公曰王隆者盧柟雇工人也按文附緻張杲作王隆傭人隆且為人傭張杲為傭人之傭耶夫王隆無恆産為盧柟業農即令張杲為若傭當業誰之農乎使杲果為隆傭則杲當在王隆場安得來盧柟場盜若麥耶且杲所撲麥盧柟之麥所飲食盧柟之饋獨傭為王隆之傭名實眩矣法宜開蔣公不然樊公曰凡士師可以生殺人有天子律令在律可殺吾不敢生律可生吾不敢死我所議盧柟同諸君奉天子律令爾我何敢私且魏氏原告詞謂盧柟令雇工人王隆覔張杲郭勇與柟傭工矣夫王隆一人爾果覔工自代即當傭一人又安得雇張杲郭勇二人代一人耶况盧柟當時嘗給郭勇雇值錢勇既為王隆兼雇盧柟又安得給無謂錢與王隆所傭人耶今不幸事變杲死遂作王隆傭人設使勇亦死則勇即作王隆雇工而盧柟不得謂勇為雇工矣法宜開蔣公語塞少間進曰盧柟既逭死請罰榖一千石破若家何如樊公默然蔣公趨翼進將言憲副張公目蔣公退同知崔公履推府朱公之跗朱公肘真定理刑趙公謂蔣公曰是不可死先生何苦厄人蔣公稍就位樊公指柟原法曰彼罪案既若是而蔣令置之死豫當奈法何僉曰稱律令於是下柟大名守張公飭滑縣劉公覆勘劉公者又蔣之同年生最舊執也相持同議定而後出謂房撲為妄告擬柟以家長毆雇工人至死應徒律量罰榖千石其傍引鯨鯢凶噬之惡無損於蔣公焉以呈察院二十年正月內詳允發諸犯的決贖罪既柟各寧業所議榖千石直以為非法令免惟皂𨽻李祿未詣官照出亦擬不應詳代樊公巡按殷公允其詳而獄由是勦矣柟居家末踰旬而先人終距六十日而先母卒踰年而兩子死一女亡夫柟出獄瘡痍未灑即繼之以天崩地隤之變而動其心膂之慘奈何天命窘極若是哉先是蔣公董獄當死刑者五人曰盧柟曰袁濟曰馬氏曰吕敖曰侯宗儒然皆寃誣而無實以故獄詞雖偹而率不服是故樊公首貸柟薄其罪暨殷公按郡則四人者咸稱寃蔣公懼諸公救之以柟為口實解殷公問蔣公曰盧柟何如蔣公具疏進復組織柟死若昔之語樊公者益誣由是殷公釋袁濟馬氏而復問吕敖侯宗儒尋亦開去獨執柟於喪械送大名守張公公知柟之寃哀隱悼惜之不足而議柟抵死此固因察院之成命非張公好殺之本心也明年柟奏辨復行張公問得其情供張杲實柟傭人而仍以原擬若曰仍原擬則法不病作傭人則不沒其實而典刑緩且歸柄於察院也是年翁公按臨弗原明年柟復奏辨行張公時巡按胡公會審而張公前吏部郎中通判吳公前吏科都給事中推府李公悉直柟為誣胡公執先定之辭據紙獨與柟對若仇佐證卒不及一詞及柟稱寃出憲副喬公作而言曰是情實可矜胡公曰此卒不可殺終當與某囚同例減死爾姑待仍擬張公退而歎曰諸公哀枉非不力救然所能者人也其所不能者天也於是悉取諸逮事者徵問前卷旁引鯨鯢凶噬之惡嘗笞某六十七十者皆虛偽無驗證去之獨張杲案如胡公議於戲柟內省由齠齔之年以及今繫獄之日柟始讀書不過為狂瞽之文瀆君子視聽未嘗附會官府行無賴作掊克又素惡商賈行坐之事於市井挾劍酗酒豪俠之徒固未嘗銜杯酒接殷勤同濟凶淫之惡慢長老而忤王法也獨好倜儻恢曠之行嗜殊調好觀古人竒節然未敢踰大間為名教罪人府縣無告訐之辭而六曹無文劵之驗夫所謂恃豪放恣險惡憑陵暴橫於一時彼濬人固寬厚有容者亦安能甘蹈患害上下無一詞發擲必待張杲之獄而後暴白哉且張公決獄明公而少貸使柟果負大惡如前卷云云則亦安肯薄正而去之俾文案不符於察院會審又何為汲汲解暴令柟無死若是哉夫前卷錮獄扄之以紙若鎔金鐵之精貫重關之鍵而牢不可破幸而巡按樊公開示覼縷動引天子律令平反是非一人之私恩得以紊典刑掩日月也且柟應擬徒罪贖榖四十五石而倉有收也魏氏領葬杲尸有狀也柟領杲原貯庫所盜麥并袋有案也夫李祿詳所載皆柟已開原迹二十年四月內殷公允之有徵也是皆藏諸司吏有考也柟寧業居喪一年是亦齊民矣固非逸刑掣鎖之徒越有司而警方牧之人也讐家無告佐見無告公正之民無告劫發隂私狡猾悁悍之徒俱無告夫執柟時去允李祿詳日期然且八月逺矣然而察院至是復悔其允曰盧柟招詳朦朧收置之死夫招詳果朦朧耶前李祿招詳何不駁勘果非朦朧耶顧復執柟抵法由是言之前後翻擾多失其據而柟安得無寃誣於其中哉始柟為諸公原宥前已厯陳惡有察院之嚴諸公之明而為是朦朧招詳哉惡有市井輿情之地而柟敢以招詳朦朧居之哉惡有三代直道之民容是招詳朦朧之人油油然處之而無異哉昔有好生者贖狐兔麋鹿而放諸郊獵者邀之則急走狂呼以救其死嗟夫人放禽獸則不忍邀今樊公既放柟於野人又從而招之是非愛物之心重且長而仁民之心輕且短與夫張杲一人也在前卷為王隆雇工樊公為盧柟雇工殷公復作王隆雇工及柟奏辨張公詢得其情仍作盧柟雇工而翁公復改作王隆雇工夫古天吏殺人也左右皆曰可殺勿聽諸大夫皆曰可殺勿聽國人皆曰可殺信矣而未敢也然猶察之見可殺焉而後殺之今柟之獄朝一人曰可殺暮一人曰否暮一人曰可殺朝一人曰否夫所謂可否者才一人之辭耳設使執政舍己之見平其心氣推而問諸左右諸大夫國人則其可否豈特一人朝暮所謂哉雖然可否無定者謂之疑獄王制曰疑獄汜詢衆議赦之又曰附從輕赦從重書曰與其殺不辜寧失不經吕刑曰五刑之疑有赦五罰之疑有赦周官司刺掌赦宥之法夫古之聖人思其心未嘗殺人因民逺善而近惡故著為法令以馭之夫刑凶器也擅意決殺者入人易深而聖人有憂焉於是垂法於經若易之解曰雷雨作解君子以赦過宥罪臯陶之戒舜曰欽哉欽哉惟刑之恤哉我明太祖創制立刑於律首為橫圗薄刑具著大誥減等又五年敕刑部恤刑於疑而可矜者察小大之比以宥之此其仁民好生之意與王制易書周官之法相流通今柟無辜之獄非止於疑而已也何獨不被聖主赦宥欽恤之仁罹此網羅繩鉗之厲哉夫察院諸公堅不原問是非不知柟為寃抑直以為可死而殺之也蓋譛禍既成每執政出都仇者從而攻之而柟名曰監生訊者謂柟非豪右則守錢奴子爾蓋不知柟以中民之産積獄數年悉貿費無餘而先人二柩暴於人野場中寡妻無嗣託食於親厚故人已閲二載矣艱苦萬倍不能一宣上卒以虞涉之嫌而下無解縣之日此大道之公不行於一夫而柟飲恨待斃所以積淹於獄也夫孰肯正明王之法忘小嫌之私挺已抗救於汩沒無報之人哉昔者柟厯大名府獄濬獄元城獄會諸解繫徒録逺六七百里近比各府州縣獄其弊無大相逺而莫以明是故敝訟之政荒圜土之教衰雖使蘇公召伯日詢於庭於國家基本萬一無所裨益矣請詳言之夫三代而下禮樂教化之不行凡可以驅天下之勢者畏而已矣是故上而畏天子下而畏方伯連帥其次畏府州縣牧之諸侯其次畏皂役羣小夫畏天子則天下治畏方伯連帥則方獄平畏府州縣牧之諸侯則丘井安畏皂役羣小則民無所措手足而寃苦病夫獄物之深密者也周禮大司寇用獄聚教罷民凡害人者置之獄各施執事以明刑恥之今之治獄則不然晝則聫紲而居拲桎而食呻吟悲號相靡於棘垣之下入夜則足連縶項重鉗肢脅受縛三麋髮引層間之半筋脈急張血肉反攻而疾痛不勝呼守者撫之弗聽則搒楚又加矣將死一人預以病嘗之有司有司曰可從而殺之曰某官殺汝也非我也夫死者未病而嘗有司以病者何也曰殺之慘也召慘之故有五凡無賄而通者殺多餉不分者殺記守者之過殺為富者復仇殺見利弗豫者殺夫官有察吏有稽彼恣殺而弗顧然且不覺者有故也未殺譛溢惡之言於吏既殺示顓柄之威於囚囚懼無露言吏忌無貰政是故恣殺之計行有司弗覺矣由是待罪之民輕天子而弗畏輕方伯連帥而弗畏輕府州縣牧之諸侯而弗畏惟皂役羣小是畏嗟乎天子方伯連帥府州縣牧之諸侯所以治皂役羣小也於其治皂役羣小而弗之畏顧畏其所治者則是驅天下之勢不在乎上在於皂役羣小也由是百姓無所措手足而寃苦病府州縣牧諸侯之政盩而丘井危方伯連帥之令壅而方嶽蔽天子擁虛器於上而禮樂征伐不行於下則天下壞亂不可救矣雖然柟聞之君子曰有治人無治法孔子曰君子之德風小人之德草草上之風必偃是故商君治酷而民尚急文帝好寬而諸吏多長者今執事治濬兩河雞犬之民不下十萬戶而囹圄無人執事好生之德可知矣是故吏禁之屬無夙弊如前所陳者是非彼能無私心人讀書而體臯陶之德也良由執事寬仁之政流通於濬彼自不敢為酷民爾或曰獄重地宜謹嚴汝負大罪而云云若是將有以自解與夫柟聞古之賢者不幸而居獄而速死之弊有三君子不由焉忘盜賊之分雜卑汚之行喪其所有而日與囚化者命之曰淆獄乘隙竊免忘其身以及其親命之曰遁獄劫天典墮王法拿挺決出自分必死鬬城守而殺禁戒命之曰叛獄嗟乎善人不入獄夫獄所以待小人也吾惟不知務而輕用吾身吾是以久獄不知命焉乃今不能控訴自明復為淆獄遁獄叛獄蹈速死之弊悲哉甚矣吾之自惑也古君子黃霸在獄授經曰朝聞道夕死可矣以故李固杜喬孔文舉蔡雍皆世之大儒卒以獄死然君子之名縣於霄漢矣柟志疏而才狹視古人若丘垤之目龜螭鼉龍者也乃竊嗜好為文賦數百篇詩幾千數十百首雖不足傳茍得逺脫桎梏而好事者或取焉奈何不以古人自附而同流俗於淆獄遁獄叛獄速死之輩哉昔先人治土地若干畝自柟下理後悉賣之豪家而約劑者又竊與之通弊減畝數私價直凡先人諸故物無不私市於人甚則拆房室伐樹木鄉人無賴效之一切施其不法又徭役甚煩柟以貧窶得羣里長窘辱夫柟待死罪無兄弟子嗣之續即有井臼婦彼獨宴處閨闥不過一書生妻爾又焉能知庶務應外事與豪傑崛強之徒相抗唇哉往年執事均賦柟以中上裒下下又諸差役悉憫痛省覆此非執事知柟貧苦如上所云又安得霖雨之澤霈然若是哉噫嘻柟事已矣惟獄中無他事舍勞思愁苦之外則讀書日明於道少延旦夕之命為得死所爾若為柟申寃枉之情解塗炭之災覆柟之妻女毋為鄉里暴客之資為版籍窮民此執事之恩也當道之責也柟何敢預焉伏惟執事裁察上郝南峰吏部書盧柟柟聞昔者荆軻入秦而白虹貫日白起滅趙師而太白食昴鄒衍繫燕王之肆而五月飛霜夫精誠變天地姦氣拂星辰此皆越等彛之幹造盛衰之變關命運之會殆非人人可與揆咎而取徵也夫德消朝菌形類蟪蛄生如植稿梧亡若覆死灰然嚮靡延長頸極號呼以求託化育之意弛負擔之憊夫誰有蹈赴湯火舉手投足拯死亡者哉柟聞荆楚連城之璧隋侯明月之珠於越湛盧之劍屈産齧膝之乘此四者天下之至寶使出自齊秦吳楚大國必將狹重期之觀崇華廄以養之纍踵曳跗購千金而視矣發迹於三家之市則人之躡景昻首而觀者才百之二三何則語曰犀象無位出自驕貴蕢莩草履無然下伍積居襲之漸也今柟本蓬澤枯稿之士奕世編氓業不出丘壑綺縞不曳體梁肉不適唇繩樞瓦缶長大子孫閭巷不聞金玉之聲勳業之貴擁貂貐乘魚軒揚眉濶論視猶土梗草苴斯亦士之至賤者矣爾乃負固陋之質效矯世之志遐思逺舉立於百世之下以竊慕於千萬世之上詩書飾小愚禮樂誘言志依附處士乖忤權貴雕蟲綺篆於辭賦之間衒玉不售置吾家體用不適焉於是乎上不能伏巖穴之側考泉石之迹以重明主之顧次不能發經射策效納忠信以拾取緋紫之榮下不能揆卜齮之計逐什一之利致富千金為宗族光寵夫然後張目而劍戟森企足而梁父峙市井都遂之中一陷穽網羅之設矣昔客有鼓瑟於齊王之門者能使鬼神上下縣竽不合則人將掩耳而不聽宋人資章甫適越雖端凝冕裘斷髮文身則人將駭碭頓走反目而不觀諺有之曰衆口鑠金重毁銷骨而柟負違俗之難抱獨任之釁挾撮壤而障江河則人有惜狗馬之弊痛狐狸之掩靡不愛柟一死者矣况夫潢汙瀆於鬼神鄭聲淫於師曠社櫟棄於匠石燕礫笑於周觀誇渚崖而東面視惡知其不長笑惡於大方也夫柟罪戾如此其大適遭傭奴之變而其家益無賴圗致之死要取不訾之賄厚誣抵法之刑尚賴天地日月得以自明稱貰一年乃復皇網掩其翮周網繚其膚甲索縶其足垣鼠不避嚙其髮髭柟聞市㕓之音商販歌嘆愈於鈞天之樂薄解束縳稍至散地跔躑僂俯愈於帝庭之美出檻域寢苫塊愈於匡床之安藜藿之飯晨至而晡進試以挺杖後食愈於紫駝之羹赭衣短褲不掩脛骭略備燥濕愈於魯縞之繒吏至喜則屈膝怒則頭搶地雖太史公詬辱蠶室王嘉惕於法伍李固斃身箠缺塗毒金鐡俯首垂涎呼天椎心而流之以血何以踰此柟聞蛟龍失雲雨則覂鱗波濤殞骨泥沙士嬰禍難則毁身亡名折節徇死今柟形辱志降長謝洙泗則聖賢之逐客覽清聖之鑒則鴟鳶之餘肉何地而不可委乎而柟含垢忍恥延一夕之命茍活溷壤溺血之中不能蚤自裁決貽先祖之羞徼鄉里之惡者是非禍覬徼幸而利大於偷生耳竊懷蓄恨之積固有不瞑目之行故敢冒死上陳願執事憫裁聽察其情柟聞古人有言曰人固有一死或重於泰山或輕於鴻毛用之趨舍異也何則孝莫大於復讐統莫先於傳子士莫重於廣業昔者尚子行仁勇之事長驅赴難不能弭伍奢之怨穆公屬國於宋殤搆戚黨之禍結怨諸侯不能定子馮之居子推汙世主之量高不賞之節燔炙介山不能樹管仲之功也故夫事涉過計於前駟馬不能捷追於其後矧死生之際得失之大機柟固熟思而詳議之矣惟執事推心加聽焉曩者柟置身圜土出歸謁先人於淇門敝廬未幾而潢池之孽作黑山之賊舉抉垣破屋戕先人而火其室先毋垂白髮號哭不逾時而逝者豈非悼痛先人不首牖之故哉夫柟孤立無兄弟犬稚甫九歲即亡次子三歲亦夭死寡妻孤女煢然在室族人攘利變易不測竊恐柏舟不可為誓陳人之媵或加於我盧處子矣柟聞墨翟棄室而説諸侯百里奚自鬻而相秦寧戚飯牛以干桓公此三人者豈竊世主權利富貴取聲譽天下哉要之各乘時奮智行義逹道樹勳業為不朽爾夫柟自稚齒學章句長而被儒服誦法周公孔子之道思欲附會古人效駑鈍之資蹇步鉛割粗有所建明於斯世也然瓦礫之才璞匠所棄制科之不收縉紳士大夫之弗齒中風狂癎觸昭憲之網弗出者三年矣奈何遽死而不急聲噍呼於執事左右哉由是觀之舉子推之隘者則士不宏迹宋穆之謬者則統失緒持尚子之操者則徇近名不寬孝昔曺沫將魯不死三敗之辱於柯之盟則挾匕首劫桓公歸魯之侵地以雪衄師之恥今柟欲包曹沫之羞以反三子者之見而後伏斧鑕之刑尸藁街之觀歘然長逝少謝造物之私執事胡不少垂憐惜宏天下恢廓之量忘其出身之微越於世俗之惡拯袂水火雪淹滯之寃以成憤抑之志柟即白骨復生戴覆盆而被日月之光者果誰之賜哉上李東岡推府書盧柟柟不佞不能奉先王之教違孔子之訓以姦時王之典逮繫濬獄三年迷惑頓踣殊苦萬狀寃頸縮喙不敢長鳴而自陳此非堯舜兼濟之病天地之大遺於果螺螟蛉之細也抑柟自察材質卑微撲抶囊木之間恐不能盡白柟之所以待罪之理又不足感執事推亮憫裁之化賈山曰雷霆之所擊無不摧折者執事之威甚於雷霆震悚惕厲萬不獲已略抒固陋沒死上干幸加惠憐聽垂察焉柟聞春秋之義自誅討亂賊禁吳楚猾夏之階特以復讎為重復讎之義非尋常世俗簞食豆羹之怒詈罵睚眥之怨瞋目按劍曼胡血纓命氣相高也孔子曰父母之讎寢苫枕戈弗與共天地也遇諸市朝不反兵而鬭檀弓曰喪不慮居毁不危身曰毁不危身為無後也非謂衣錦食美察音樂之比長大子孫樂妻孥以供宴安也公儀仲子之喪舍其孫而立其子孔子曰否立孫重嫡子之建延宗廟血食之祀綿本始之義爾孝經曰立身行道揚名於後世以顯父母孝之終也夫仁者踐誼勇者不必死節智者不汩名若徒效小廉死小耻快一劍之奮行弗顧後令聞廣譽不加於天下滅父母之稱此匹夫自縊於溝壑之事少有逺慮圗大者不為矣詩曰哀我填寡宜岸宜獄握粟出卜自何能榖夫置身犴狴之中狹聖鑑之卜從一死不返之諒孝子不為也曩者柟犬豕之質寡聞道之資觸司寇之刑囚幽圜室之內先人赴訴御史臺下聽之問諸監司曰免問諸守令曰免問諸讎正曰免夫然後稱律令出柟於死沒之編氓之籍越明結獄始歸侍先人寢食几杖先人又不留家居適淇門别業入暮夜而盜賊興矣鉏耰登之大屋干戈擾於坳塘白刃之虐砉於平樓先人縣繩及堞隊則賊藉之戟鋋伺之鉤鎩一夫內呼羣響沸應絶雞犬振簷瓦先人以七十之年降而蘇登者三杪乃氣力疲􅉵謂庶母曰孤兒始脫患難我有長苦積恨於異日者不得與之語乃今父子不相見天乎命也賊薄滋益甚請幣不可請貨不可請降自分裁不可賊突登戕先人沒悲夫誰能無父而死何先人令其子不忍言之若是也時告諸縣邑賊已出境有懷慶為之穴陽武為之墟封丘延津大河之曲為之堂隩烏合蟻聚之衆斬木揭竿大呼於淇衛之郊時蔣公蒞政不肯發一夫掣白梃以逐之柟家貧新禍又無財賄雇熊貙之士誰肯不待教命為柟出死力窮誅越人之寇哉即有鄉曲之民哀柟無告者捕之才得蜂蠆于積閏竒扐之間封豕虺蛇凶噬之惡固已投迹草木依山澤肆然無忌而誰何郡縣矣柟輿求父尸歸之寢則官府有憎惡之不祥城守有捍拒之嚴陳哀暴棺于郭門之垤猶及今未成葬也當是時夫豈不能告諸天子請諸連帥也然多狼顧之患懼滅門之禍其事本末未易明此所以沒齒關口而不敢言惟我執事明睿逺照深察而悉之者也願執事熟思加痛少裁焉是年先毋悼先人之故垂白髮哭泣不飲食距父凶六十日亦殞柟奉二柩袒括愠哀皇皇焉如有求望望焉如有從而弗得也杜門啜粥守先王之制嘗膽謨謀雪先人之耻不知察院復按前事移檄復收柟矣由是司理授鎖城旦詰門戶二縶其妻義勇朅夫圍其宫執柟苫塊之上械送大名張公勘問不即置之死刑之若不能舉也哀隱嗟嘆之不足三月而後成獄竊窺造化之私少欲得其當以處柟爾卒乃不得執政旨趣擬之大辟柟信知非張公本意雖九死猶不足報張公深恩也柟有二小弱子托宗祀之寄未及而長子殤越數旬而次子為無服之殤夫下殤葬以夏后之堲周無服葬以有虞氏之瓦棺也柟囚繫不能與二子永訣覆用蘆藁孔子曰敝幃不棄為埋馬也敝蓋不棄為埋狗也由是言之二子之葬視不如狗馬矣昔者延陵季子適齊反長子死葬於嬴博之間還其封號之者三曰骨肉復歸于土命也若魂氣則無不之也夫聖賢值事變猶不能忘情骨肉兾其魂之隨已以終父子顯幽無間之義悲夫古之君子皆然何柟獨于其子生死不相知若是哉書曰迪惟前人光施于我沖子柟承先人之光無沖子之繼又何施焉詩曰貽厥孫謀以燕翼子子且長沒何孫之能貽也夫柟受木索嬰金鐡坐幽室之內無日月之明忘晦朔之變腥臭觸九竅死尸參肢體稍解縲紲伏棘巖之下蟣虱如流結髮如約肌理不和胼胝紛紜之皮搔之如雪下夜則檻柵交軋枕股之會鼠嘯於顱蝎螫於承顴百足岐翹之蟲歡愈遊戲於肘腋之間少有關便則守禦者禁之曰噭叱而榜楚交施於骹脛之上矣昔絳侯下廷尉曰吾嘗從楚軍百萬而心未能動殊不若見獄吏之已甚條侯坐收不食嘔血數日死顧柟鄉里委巷之陋繩樞之士而氓細之人也視此安得不寒心哉柟聞太史公曰砥行立名之士太上不辱先其次不辱理色其次關三木被箠楚受辱昔湯讓天下於涓子涓子弗之潔也負石入水死伯夷思與鄉人處其冠不正去之若將凂於塗炭夫視天下不以為潔視傾冠細故若恐汚其身也設使二子視辱其先祖理色關三木箠楚受辱者思將何如哉夫柟行汚名賤即死若九牛亡一毛無所輕重於世然自忍耻湛溺茍活溷穢之中無恤涓子伯夷之誚者竊惟私恨有所未圖赧天地之大義有所未經列如前所云云也昔越王勾踐禦吳於檇李戕其王闔廬殺之夫差使人立於庭茍出入必曰夫差而忘越人之殺而父乎則對曰不敢忘三年乃報卒敗越於夫椒向使夫差懷君父之讎卒有不諱則越無會稽之耻大夫泄庸種蠡必不匍匐屈膝於岩峪之間其子女臣妾文馬珠玉珍寶之器必不陳於姑蘇之臺闔廬之耻必不雪於九原之下楚之滅越椒也針尹使齊反自拘於司敗楚人釋之曰存子文之祀若楚子忍於針尹之禍若敖氏之鬼久矣其餒矣孟明視為秦伐晉再戰再北喪師百萬為晉俘虜逃之釁鼓之下可為辱矣孟明以衄師禽將非勇也身死名滅為天下笑非智也退而與秦伯圖䇿汧雍之間君臣合謀開關出兵東取王官及郊濟茅津封殽尸還霸西戎威震天下再敗之耻一鼓而灑之使秦伯不悟過之可使以立功誅孟明以見法孟明不蚤見主之不留罪引節以自裁夫孟明髮膚與人同骨肉非有異衆之飾徒偕草木比糞瓖死矣安得強秦之國功並五伯名與天壤俱哉夫柟抱不測之罪非有公輸墨翟之智陶朱猗頓之富孟嘗賔客解難脫死之救也生産貿易孑無餘燼蔑父子兄弟之親寡妻孤女棲食畦蔬紡績之間柟恐就刑之後父母骸骨長棄暴露逺無收恤之主牧豎戲為踏鞠牛羊礪之角獵夫鞭其朽過者泚顙睨視曰盧柟不肖抵法使其親陳列天地如此可哀也夫柟誠無面目見先人地下俾夫差得専美於其前也竊又恐墜姓隕氏絶太公之後祖宗墳墓歲時伏臘無一人陳菜羹奠酒漿者不得如楚子存若敖之祀也夫柟固有一死特以臧奴矯誣坐滅卻顯業廢事功口無食人之粟足無立人之朝一旦與螻蟻同斃飲恨忍恥長跪逺謝於孟明視奈何不拊膺捶髀流涕泣盡而繼之以血也柟伏覩執事為治大名農易其業女不忘機杼南鄙郊墟之民父老扶杖謳歌思化是召公之治也博物多識窮天地之文密緻理之極是子産之智也忠信明斷民愛不忍悖無姦伏之心是仲由之義也執事被三盛德柟猶卧烈熖之中甘焦爛之禍不能極聲號呼以速霖雨之澤智之所不足論也柟聞古之君子聽獄致其忠愛以盡之疑獄汜詢有赦無殺柟雖不佞竊覬覦於君子矣夫先王觀風盡民情之變有奏獻賦詩之體柟不揆昧死述鄙俚隨書進聞惟執事之採察焉柟頓首頓首再上李東岡書盧柟柟聞魯使人於宋踰梁父之險捫纎葛陟鴻崕俄而力屈失足墜大壑中三年飢茹松柏之葉而渴飲霜露吸夜氣風雨之所激射虺蛇之所吮齧山精魑魅之所揉捽艱苦殊狀其濵於死者數四矣然其人極聲號呼求救於途旅往來者然皆聞之去而弗顧也間有顧者不過攀危木踐滑苔側身俯首矉視默然駭栗輒引去不救然卒未知其人死與否也明年魯人伐宋攻其城公輸子載修具轒輼器械往過之而其人猶存活力疾呼之不已公輸子垂長綆千仭下飛櫓雲梯以致之其不及崖岸而康居者尋常尺寸之間耳然微纏中絶愈益墮其人幾死夫然後知命之窮極理數之未至終自恚憤至死而無所仰矣柟嚮昔不遵師訓陋寡聞道瞑行徑趨傾跌殞仆沉居圜墻之中食惡糗糒飲蜇毒之水金鐡鉗其脛蟲蚤蠧其膚寃厲嘯呼之鬼振於夢寐蓋嘷哭而望救於世者於兹五年矣然亦有聞之弗顧者有顧之默然駭栗引去者竟未見有能披髮纓冠而往救之者也往年執事自諌垣臨治大名柟竊私心喜之曰李公仁隆德盛道光而化普行獨而思淵浩然之氣塞乎天地執造化之契而施再育之恩者此其人矣於是仰首長鳴極其聲而號呼之時御史胡公行郡執事惠然與張公吳公明其寃而抗救之益力雖公輸之救魯使不過若是恩也向使胡公少有察篤天隱之意出柟幽谷隮之崖畔以抒執事一夫不獲之憂抑亦何損於政而乃隳柟淵壑踣躓彌年雖興哀望至竊恐公輸厭聞而長往弗顧令柟陳尸坑谷喂野鼠鴟鴉宗祀滅絶妻妾改醮則先人之柩誰能泚顙睨視覆以一抔之土哉夫柟罪文始末執事已悉今不敢贅但張杲實柟傭人彼家排牆撲死遍體傷痕夫豈柟一人一手所致佐見俱悉茍訊及之其情立見矣今刑部駁章覆勘坐此齟齬乃張公復令濬縣勘問夫積獄既久若使下官奉承刑部風旨羅織成獄是猶重關金墉而固之以鍵又安知死所哉伏惟執事闡公輸之仁哀墜壑之難接之長綆飛櫓雲梯以慰柟極聲嘷呼之望庶使墜者不死葬二親之柩全妻妾之節長育胤嗣以成我執事興滅繼絶之惠柟少長一日畢盡志願執事所賜豈有涯涘哉與陳一泉外翰書盧柟柟聞往年執事受職走馬來濬縣時縣主尊重廉隅甚峻高其才不輕與物接明日始乘轎邸見執事之任既數日始戒官寮從事屬典禮進賀踰年柟或因執事春秋祭享會食入公門於圜墻窺視則縣主肅而入恭而出周旋委蛇賔主輕重之儀罔敢墜逸與前所聞者大異竊獨不知何為而然也既而濬士大夫有所存問於柟者私道執事盛德恭愛仁賢道隆而思謙行端而體備宏外而惠中有所叩則因為之鳴以盡其節溫乎如玉縝乎若金秀乎如芙蓉淡乎如秋水泛於塘澄霽而無所淆濁也曩昔縣主之所以盡禮於執事者謂非由是乎哉暨柟詣御史臺對發內黃見執事􅉨來每伏謁道左執事忘其為囚以鞭揮之曰毋執事之聲音顔色始得接見尤進乎圜墻之所窺識者而前士大夫所稱譽果足以得其似也當是時有能脫去桎梏加我冠履法服令之得為人其體使能詘伸坐立其手足使能持行其耳目使能視聽其禮貌使能揖遜退避其口使能道古今事變明仁義陳帝王之迹而無已也執事憑軒而聽之則必有可觀者今以刑僇之民為世擯斥雖欲自進已見逐於君子門牆矣柟又焉敢振金鐡亢明刑揚其惡臭塵觸於執事之庭哉雖然嘗聞聖人樂天而知命賢者守義以徇死智士不廢時以立功所謂樂天而知命者道德備於已險夷之來非我所致凡利害升沈通塞之故舉勿問焉則周公居東孔子圍陳其人也所謂守義以徇死者不幸而禍變加我者或是與雖死以定分可也加我者或非是與雖死以順受亦可也然則奚死哉死於義則止爾若荀息之死節叔孫豹之守難彼誠深乎是也所謂不廢時以立功者略小嫌以自汚藏器以待時而用其道於天下者也略小嫌以自汙者所失者一節而所全者大分也藏器以待時者權也而用其道於天下者垂大名於天地洪濟萬物而大行斯世者也昔子犯之負戈管仲囚檻而顯齊者非與夫柟以盲眛入死刑誠見黜於周公孔子者若荀息叔孫豹則為其君引節今柟緣讎坐誣而罹之極刑即徇死其所守者何義哉獨柟罪章所載一見釋於御史樊公再見疑於太守張公使有解倒懸者淂沒其齒終其愚則柟願為伯臣執鞭夫豈無膚寸之功以謝天下哉今特囚拘牢狴去冠飾而聨紲之其體非復能詘伸坐立其手足非復能持行其耳目非復能視聽其禮貌非復揖遜退避其口非復能道古今事變明仁義陳帝王之迹假令執事致之堂陛賜之跪拜使出話言不過頽然一囚而已又安能決胸臆開口一辭為君子應對哉夫柟淹獄數年心思轇轕每傳鐘鼓及獄卒喧呼警報則便悸怖久之始能定日間與囚徒雜處或勉強一笑不過亂愁苦忘兒女思爾非有可謂樂然後笑者也使憂能傷人則吾豈可以延嵗月不死哉比年來桎梏無晝夜或為文賦腹稿成則請於司圜氏解刑而後書已則復刑以故多鄙俗無足觀然猶不以為恥而獻之官府亦欲司命者知柟頗從事於斯免搒笞云爾夫虎豹惡獸君子忘其凶穢而寢之皮取其文也今柟凶穢異於虎豹而有其文或者為君子之所寢邪謹録舊所為文五首賦二首雜體詩二十首託諸生錢子萬選李子應宿敬上執事倘忘其凶腐之質而寢其皮毛之文燭日月之光而賜之以不死之惠俾柟求士大夫所稱與親炙盛德而叩其鴻音則夫圜牆之所見內黃之所得者愧然而失矣與耿忠菴進士書盧柟孟冬十六日臺人某來揖司圜氏曰汝為我語盧柟屬者進士耿公過濬諏訪而寃狀曲垂愍痛諸所云要旨謂斯世縉紳元老諸公憐而狗馬文辭早晚消息得原報柟愚聞此伏地叩頭泣血下曰柟不肖勿遵師訓蹈履乖妄鬼神恫怒橫被譴厲疾首圜門抱不測之誅為名教所不齒者於兹八年今耿公乘驛傳未遑稅鞅遽賜問一囚抑不知柟以何因緣得見幸如此然柟知有所感矣請敬陳之夫天地萬物交錯水火相薄精氣感通象類流動各以召應故易曰寂然不動感而遂通天下之故樂記曰感於物而動故形於聲夫感通固神化之能妙用符契之機也獨不觀於會稽之山夏后氏之穴焉爾乎豅谾㟏岈寥乎其深虛也不知天地氣至則泄靈祲出雲霧變化虬蟉盤旋如車蓋旗幟盡幻怪於山谷之間向之靜淵者轉而劃然軼蕩也夫夏后氏之穴其感之微者也因是知豐山有九鐘焉邈綿曠漠偊乎其塊獨也不知夫霜降氣凝轟闐雷觸天然自鳴於大荒之野朝遊乎瓦礫夕諧音乎玉磬轉移之間比於師曠之耳夫山之鐘其感之微者也因是知沙丘有鳦鳥焉秋深蟄籋口向宿不知春社既臨倏然竊罘罳入華屋少出於珍竒花木之間泠然而乘清風飄搖乎太清雖有碆盧矰繳之施弋人將弗加乎其上矣夫沙丘鳦鳥其感之微者也因是知燕臣鄒衍緤頸繫獄頽乎其刀鋸之胔鼎鑊之胾也不知夫昭王感吁霜之事按劍解顔尊為上客卒之推運五德談天地四海九州之藴吹隂谷之律使五榖繁殖夜為虜晝為賔夫燕臣鄒衍其感之最著然尚迂逺而難言也因是知今日之事柟常受誣大辟伏金索貫三木與盜賊妃伍惘乎自分為天下大僇也不知夫耿公方受命南還揭旌黎侯之國而威馳乎燕趙之外觸臭類存寃儽令柟違去塗炭存先祖祀畢少壯之志雪一劍之耻然後復儒衣冠以見士夫即柟瞑目而耿公之德已塞乎天壤矣夫柟囚居九幽之地有內死之心無外望圖生之意臺人云云蓋耿公感之以天也而僕長跪逺謝動之以人也夫積誠弗竭則著之言辭言辭之不足則攄之以為文孔子曰言之無文行之不逺謹以荒疏并舊作四賦十册敬上伏惟高明垂覽焉上朝舂陵書盧柟前五月內節判馮公來署濬事之三日臨獄閲囚出明公所示手書文采巨麗懇惻過甚皎乎如春陽溫乎如挾纊既枯之骨勃然復興此誠造化生育萬物之私非世俗偶然一得之效也柟愚不勝愴恨伏念五六日抵于旬月精爽淪喪惝恍如失東望稽顙渺無涯涘竊唯自古在昔賢豪之士顯於側陋若侯生見顧於夷門馮諼蒙任於薛邸毛遂脫頴於趙庭薛公納眷於旅次是皆感會風雲遭際世遇適見龍之時而受知於大人者也繼兹以往世道交喪玄纁蒼璧之儀加於世胄丹書赤訓之章不出侯門陳平之巷絶長者之車韓康之廬乏束帛之戔過此而言取士於管庫魚鹽之間者吾未之見也矧夫弗潔之囚三木囊頭長錮犴獄者哉夫虎豹之皮人取其文而或畏其凶犀象之骨人愛其材而或惡其穢是非虎豹之罪皮與骨固足以厚人之疑也柟以傭奴故致晉師三豕之疑涉樂正夔一足之誤陷法象之地偹搒楚之辱殫周勃之金嘔條侯之血蟣蝨生於肘腋胼垢長於肌膚縣衣如鶉結髮如繭節屆暮秋獄草委歇仰視鴻雁嗈嗈南翔思欲振羲和之轡頓六龍之首折若華於陽渚躎倒景於崦嵫天路永遐喟言莫升神往形留我勞如何昔嵇康以忤權而臨刑蔡雍以浩歎而當僇陸機以膺譛而致命禰衡以抗俗而膏鉞此數君子者功成行著生則懸名於霄漢死則垂芳於竹帛長逝瞑目夫復何恨哉若柟讀書幾三十年叨光於禮樂之域獵芳於詞翰之林上不能效駑蹇之力於當代下不能立清修之譽於鄉閭徒以曽參殺人之謬與盜跖聨頸而死嗟乎人生至此能不悲哉顧念形影實知凶穢柟竊自分當為世所棄又安敢蓄不資之懷望大君子收恤明公道塞二儀光照四表奎壁之章格於上下鸞龍之文奮乎逺邇將使徐陳奉轡應劉扶轂屈平擁篲於前子雲擔簦於後此足以徴明公天挺之聰顯昭代人文之盛矣今上注意翰藻明公制作實為聖眷雖漢儒白虎石渠之遇蔑以踰此夫盛德顯位巍巍如彼今聞廣譽赫赫如此然猶投入夜光徼福囚虜慰寃魂於梧丘解二負於石室垂大恩於幽垣示昭曠於天下孟嘗平原信陵諸君號稱下士未易幾此柟感恩無地敬敷委曲臨紙抆涕痛深心骨唯不惜帷蓋終惠犬馬益幸與孟龍川書盧柟龍川執事莊周稱膏以明自銷漆以用而割樗櫟之材以擁腫不適用而夀慈嘗笑此語為不關世故墮四體偶稿木土石能言誤斯世而已及觀夏商末主殺龍逢囚箕子刳王子比干此三賢者視死如􅉨明惟恐其不銷也用惟恐其不割也未嘗假以擁腫不適用而夀則信乎周言果為過論也夫龍逢箕子王子比干欣然而死者其道誠有所重故生而有所不用耳曩使茍於殺身無關綱常倫理之道此與匹夫匹婦自縊於溝壑同彼三賢者尚肯銷其明割其用潰其擁腫徒適用而弗夀耶然則周之言或有可取與今有人薦高第職在司諌或監察御史給事中官犯顔直諌膏身鈇鉞與龍逢箕子王子比干遊則亦何恨於死也若乃讀書行道身未荷人之祿手未析人之圭徒以讎者文致矯誣銜寃抑負明刑與一切盜賊姦宄無賴之徒同斃抑安得不有感於莊周云僕繫獄本末執事悉偹而我盧氏在濬世世業農無公卿朝士大夫顯貴故僕得罪後無一人肯援手者而僕亦不敢出私怨言分定故也假若趙盾受械狐偃當僇柳下惠城旦子臧季札充匠作子産季良叔孫豹石碏擬流竄有力者坐笑而觀之彼數君子者能無怨乎哉夫其怨者戚之也不怨者疏之也戚之故民無所不致其愛也疏之故怨而有所不屑也奚若是分定故而已矣今世大人君子有能興哀於不報之地僕得末減逺徙邊塞汙射生血刃死為國殤雖未能從龍逢箕子王子比干逰比之徒死圜牆無分毫效力當代者不亦逺乎哉私念至是前莊周所謂愛其明惜其用守擁腫無用而竊夀者僕誠無取焉執事以為何如屬者聞執事於王四府耿進士前極稱僕見誣狀乂出所作四賦塵上此造化生物之妙也銘刻銘刻報盧次楩書孟思年時以來辱賜教書望僕以拯死伸寃語明事核文從詞順援古證今灑然以辨凄然以泣鬱然憤然以恨而不敢怒嗚嗚然以長號文采巨麗蓋出自𠂻腑有理之文也足下在深幽囹圄之中而出語猶如此果理直者壯而窮愁者能文也乎哉手之不置汪淚濡睫值僕連有大喪衰斬廢業不能為書慰答以白𠂻私再辱教書縷縷若責僕以交誼情淺問慰疏闊語悲而哀似有怨意者又值僕有大病痛楚危迫幾於不救復不能為書慰答以白𠂻私今者左手猶未甚痊而右指頗能執筆恐足下終以為怪也聊復裁書敘心以曉足下足下試少聽之前書纍數萬言而意在於救之也後書言簡於前而意深於昔者意在責之也僕雖孱濁下愚然讀載籍所紀英傑義烈豪雄敢決之士雖知其過乎中庸聖賢之道然每每私心喜之足下視僕為何如人哉友道之絶於今也久矣英傑義烈豪雄剛決之士人以為非中庸聖賢之道而不為也亦久矣獨僕不以為然也然而不如足下之意前書所云云者足下不見禮乎禮三年之喪公事不過其門居喪不上書僕雖欲如古英傑者流其如禮何即外禮以自縱欲如足下意上之人未信而先見尤矣况僕英傑心也守禮士也安能如足下之心而遂僕救之之道哉自己丑下第至於甲辰喪服病體足不迹京師者十有五年僕之身世亦可謂抑且鬱矣淬礪鈍鋒鞭䇿老足將為丁未之戰而瘍發於體幾死都下而又不獲南宫之試也悲夫親存不能奉光榮之養親殁不能受一命之贈歲月冉冉已無聞而不足畏矣僕之身世何如哉夫今之所謂脫人之死伸人之寃者則有謂矣其上權四海宰天下勢熖氣赫頥指可以脫桎梧氣使可以釋纍囚如武安平原者其次金玉走閨闥寶賄通權豪朝納珍賂夕出重獄如衛青魯朱家者又其次奴服以從主殺身以明寃經上官動天聽如貫髙之從張敖石忠孝之仆韓碑者至此極矣僕也有三年之喪行未可以踰禮無百金之産貧不足以取勢讀書積學將以忠君而報親身又未可以許人其不能如武安平原衛青魯朱家貫髙石忠孝亦己明矣悲夫何以為救之道哉何以遂英傑之氣哉何以如足下之所云云者哉去年之秋瘍病小愈蓋嘗輿疾以至都下止十有二日卧舟南還亦嘗見數大人君子而懇救之之言矣又嘗偹述足下之寃濫酷枉矣或有耳之若罔聞者或有聞之而長太息者曰非其職也權不在也職矣權在矣而曰前案已定也勘官者不可違也悲夫百工亮天工者也食祿而理若事者也不知矣知而太息其非職無權矣猶之可也當職持權明知寃酷而以前案已定勘官懼違而止焉將不以言者之人微且輕耶悲夫以卑卑一舉人來之乎都下九牛之一毛也其輕且微審矣矧無勢與賄即如貫髙之欲死以明寃其如前案勘官何外此唯有代為之言矣而足下又不見今制乎凡軍民利病諸人許言唯生員不許監規俱在也僕繫名於監久矣又非得言者也悲夫周子有言殺人以媚人吾不為也今之官多殺人媚人者夫禮不可出勢不能行貧不能具賄分不得上言則僕之計窮而足下望救於僕之心亦且孤矣然天下豈盡殺人媚人者耶足下幸遇一大人君子之不衆人見者則寃之伸亦有日也昔僕嘗有志於叨一第己即上一疏於朝而不畏上之官平反前之案是僕之所能而今且未之能也尚何言哉虞卿者戰國遊説士耳棄相印與故人逃去足下知僕非碌碌者視僕於虞卿如何哉即有相印且能棄之如糞土然而不救之者孟子曰挾泰山超北海非不為也誠不能也足下其靜以守罪即不能待吾得言之日或能待有大人君子之賢若夫問慰之殷勤書翰之往復誠為濶略至於讓以棄捐誚以忘我則是未逹鄙心不知事勢誚讓雖切則不敢受不敢受何也問慰通情書劄傳命平居偲切之義也今足下幽圄深邃關禁嚴急長鬚赤腳不敢出入書郵詩筒未能徑逹勤勤懇懇徒勞心忉忉而敢日貢意於左右耶即使僕冒國法通禁獄或有司戒焉將以咎足下雖僕不畏得罪亦恐非足下之利爾且足下獨不見義縱之治定襄陳子昻之斃射洪乎心邇而情遙迹踈而義密交情乃見不在憧憧幸勿為過羑里幽囚周王演易廷尉久繫漢儒受書易曰困亨生於憂患理也幸勉旃崇養文懿以俟好音邑邑遣字不獲悉心毒暑自愛思再拜明文海卷二百四
