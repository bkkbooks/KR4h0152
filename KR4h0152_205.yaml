body:
  text: 明文海卷二百五餘姚黃宗羲編書五十九頌寃代白衛使辨書徐渭濬前以海寇抱不測之罪冝就湯鑊然心未蒙原而一方之病將以濬而日深故甘犯鈇鉞之誅再效愚忠於前濬不佞不敢過有所援願借范雎以明意雎曰死者人之所必不免也處必然之勢可以少補於國此臣之所大願也夫范雎偷生之人至有少補於國猶不惜死况於濬者以臺下曲全仁恩罪尚不至死者乎假令死而有補於國則濬何憚而不為范雎也苐恐罪濬之後地方之事日不可為耳濬聞之兵家非戰則守然其勢猶兩虎相搏負嵎坐險各據地瞋目而不動守猶可也今日之海賊非負嵎之虎矣舍舳艫登陸道白晝大都之中殺人而焚其室劫婦女而携之吏卒逺遁而不敢側目非一日而然也當其寇石浦也濬非敢好輕動也炮石四集即傅城者已無一人壯者棄家走老幼對哭於郊牧之間而况厰房水寨戰艦在外與賊均之濬受國家纍世之恩見海上赤子荼毒之苦不得已而披甲跨馬率枵腹之士而身先之三戰水陸斬賊過當額冒飛刃創瘢尚存家僮助正同日俱死且兵不素練舊習使然見賊舉銃辟易駭散夫兩脛十趾濬亦具全設肯先奔軍孰不避路而讓之也顧將制旗鼓死則死耳豈可曰走遂便復戰故濬不免耳而今罪濬者徒曰云云且古語有之佐饔者嘗佐鬭者傷今兵刃交加水陸異技重以卒不習戰糧芻過時雖黃石坐謀蚩尤對面猶不能保百夫而全之而况於濬者豈易為力哉欲不損一士不災一廬又烏可得也今當道往往移檄展而讀之必曰不許逡巡畏縮又曰不許輕率寡謀此故事也請觀比年以來海上把總孰不以是二者被罪哉先有陳瑶崔鼎後有劉文今又有濬矣至他指揮千户百户箝謫誅貶不可勝計夫海上之寇欲其自盡決不可得總帥官兵非戰則守而戰無萬全守決不保前後顧忌人何所持是國家懸設兩穽而俾官居其中必有一遇不為崔鼎陳瑶則為劉文與濬如此則先加以罪後令之官何不可哉然在崔鼎陳瑶猶有可諉者曰其當事怯失律多五色無主保七尺之軀而鼠抱狐蹲焉正移文之所謂畏縮者也至論濬為輕率似矣然斬馘之功不亦可驗乎孤身挺戰不亦可矜乎後援不繼不亦可分任其咎乎其最先則又有馮恩以不救主將亦免為介士然恩之時所被殺者總督也其所當事乂倭夷也濬之所臨海寇也非夷情比也其所傷者介士也非主將也其區區當轍之勇又非若崔鼎陳瑶之畏縮也夫論失則恩大而濬小論戰則瑶鼎避而濬當論功則濬雖細而三人者則寂然也至論罪則又駕陳瑶而軼崔鼎埒劉文而追馮恩此濬之所以泣血橫戈雖死而目猶瞬也夫自有寇以來居是職者無慮十百十百之中非皆不畏罪也非皆無智計勇力之人也然而未有不敗者其故可知也曰立法太嚴耳馮唐於漢文不云陛下法太明賞太輕罰太重且雲中守魏尚坐上功首虜差六級陛下下之吏削其爵罰作之由此言之陛下雖得廉頗李牧弗能用也卓茂之讓民曰律設大法禮順人情今我以禮教汝汝必無怨惡以律論汝汝何所措其手足乎一門之內小者可論大者可殺也嗟乎使當事諸公皆馮唐卓茂之流則何寇而不可除也使皆用文帝之法皆以律治人則何時而可以除寇也何則損介士亡寸土必罰無赦此祖宗之成法也然而有不可以盡然者今之保首領顧身家者聞警報而束手已掠城剽貨殺官軍如刈麻圍不解則輸金椎牛而乞之他境被殺者欲告則科財而賂其家使不告者皆是也然此幸何不施之敢戰之將哉殺賊首比損軍過當者薄賞之相當者薄罰之而所死之家則厚恤而優糧損軍比殺賊首過當與不殺賊首然後施程法何不可也夫賊之敢侵犯者以有利而無害也設今日斬幾首明日斬幾首今日抵某界戰明日抵某界又戰而又不可虜掠則何所利而犯我也今乃使賊不輕害而貫習利將不畏賊而內畏法古之為將不畏敵而勝今不畏敵而反敗此不可令衆庶習聞也夫兵者不祥之器作其事而重其賞猶人不得奮故又為誅刑以驅之今則不然戰亦失事不戰亦失事戰亦受罪不戰亦受罪則人何苦前冒死亡而退又罹憲網也亦且坐而待罪耳夫祖宗舊法恐後世狡黠好功之臣生事於四邉至深逺也然假令高皇帝尚在親臨海隅而覽其事知逡巡亦必失保則必教之戰戰則必小傷折小傷折而又欲罪與逡巡同濬又以知其決不然也故濬之愚所以為不寬假損軍之法調停其事而便宜之則朝廷雖令衣繡仗鉞之使日斬一把總之頭懸諸海上濬恐官有盡而賊益不可止諺曰前車覆後車鑒罪濬之後今相繼者宜如何也即寧死不就職者有之矣檄未下而稱病者有之矣齒不滿五十而襲替者有之矣甚者買人訐其贓而速去耳夫甘發其贓計亦云困極矣至襲替而脫其任於子假令子之海上焉則亦與己危禍同何父不能顧其子至此也嗟乎此特患一家耳至一方之患又有大者也彼賊亦兩耳目具者也聞某官迎敵我挫衄問某罪矣某官束手為我寇問某罪矣某官懲二者重賄我幸安全一時矣必將曰人孰樂甘罪譴而不願安全也喜冒死亡而退不蒙原宥也我舟之所泊縱令不得盡賄戰可決免矣其職守者聞某同寮親出戰少挫衄問某罪矣某同寮懲二者重賄賊得安全一時矣又將曰吾何好前冒死亡而退罹罪也何不效束手自保者或行賄而僥幸於罪否之間也故賊之所至縱不敢便賄戰決不為矣夫戰必死不戰必生今使賊知必不死而官又可以求生二者何苦而不樂為也今日且日甚矣法愈急則官愈怯官愈怯則賊愈輕忽而易肆其凶即有一人徒手而呼於周行曰我賊也我賊也則戴甲之士且荷戈而立視矣非畏一人也覽往事而恐蹈拘文也故欲賊畏我而我不畏賊莫若寬法而薄敢出之罪黜此不用海上之烽燧不知何日而息矣李左車曰敗軍之將不足以言勇抑不知秦穆公之用孟明視乎一拘於殽再敗於彭衙使穆公聽人言而殺之則孟明不免辱身賤行矣穆公刑戮不加而任之孟明不為恥辱而當之於是濟茅津而封殽函卒霸西戎於是知穆公與人為善而稱孟明之有懼思濬今不敢與孟明比而臺下之明恕何啻穆公也即如左車之言濬固為無勇之將矣假令得勇者而任之果能不遺一矢而坐收全功乎前乎濬者既皆不免矣濬不知鑒而犯其罟後乎濬者宜知鑒矣又將復犯其罟此負戟之士所以欷歔而解體者也昔濬亦嘗身親斬獲矣亦躬率擒勦矣今皆棄去不録而失一士亡一矢則加濬身恐海島之間望風駭聽謂為賊報讎也濬願臺下思海島之艱難顧一方之大計順人情而施國法超積習而越拘文一作士氣請從濬始如此而有不挂席涉海取鯨鯢而梟之藁街則取濬之血以釁鼓孰曰不可惟臺下念之毋忽為瞿睿夫訟寃書屠長卿夫風蟬雨蚓得其候則鳴過時則世指之曰不祥今某之為黃梅人瞿九思訟寃者此某之候也非以為不祥也某居東海九思居南海惟風馬牛之不相及也平生非有期功之親杯酒接殷勤之歡即問以其人之修短白黑茫然耳古者蓋有緹縈朱勃郭亮寒朗劉向其人者能以其言白人沉寃至義聲傾動千古彼皆於父師交遊之間言其至情情至則言切交親則易阿猶有説也豈某與九思之謂哉風蟬雨蚓彼鳴其候爾無所為無所求也今者某之言瞿九思者亦無所為無所求也故曰此某之候也蓋昔者舜為帝禹為司空臯陶為理當其時斷獄天下則無一夫稱寃者詩書所稱蓋誠無之非其有之而文之也如使萬物沐清和之化而一夫獨抱向隅之嗟則大聖賢之所必問何者不欲以一夫而傷清和之化一夫至細而傷清和之化至巨也今夫瞿九思者渺一夫耳束髮以才名耿亮聞江漢之上一旦從吏議罷孝廉徙塞外而非其罪也則天下之人寃之何故豈非舜禹臯陶之世而有此一夫者寃也豈非以一夫者之才名耿亮天下所知也某不敢泛陳今古即以楚往事言之當楚懷王時王聽不明讒夫鬭口民之沉於覆盆者或不少矣獨一屈子之事不白則天下後世寃焉往日回風諸作千秋而下讀之則凄其酸心又何説也則屈子之麗藻絶代放在江潭令其抱憤悶之氣而以雄雋深秀峭絶之語吐之而其徒有宋生者又為之附麗鴻響以砰訇後來故其寃最著也然屈子之所以寃者以其當楚懷王時若生舜禹臯陶之世則無此寃屈子而當楚王則江潭之纍也而生舜禹臯陶之世則記尚書著典謨之史官也今聖明在位大臣忠良九州萬物欣欣向榮清和之治逺駕上古而猶有懷才抱潔如九思沉寃如九思者是聖善所隱也九思之罪蓋坐以士民狙擊其邑令長禠乃衣冠長流塞下夫狙擊令長非一手一足之力也令長為天子牧養元元視元元若子則令其慈母也居則戴去則戀久則思何狙擊之有即一夫倡難萬姓捍焉難何繇興令之不才炮烋其民民不能堪即邑中羣起而仇之豈一夫之以也九思所造其果出一夫狙擊如古朱亥博浪之為乎果以一人自作不道乎如出一夫發難則九思之罪何辭以邑人亂則此一令者或者邑人之所同仇也邑人同仇而以一夫獨坐可乎某雅聞九思以才名為令所禮平生固了無睚眥之傷何至相仇如此即如杯酒失歡非有深怨又何至遂鼓不好亂之衆而一夫奮臂持梃如雲也九思所坐無亦才名為禍蛾眉取憎爾固天下所共寃聖君賢相所必察也某與九思何為哉方漁釣海上不過聞滔滔江漢有年少負竒才之瞿九思文掩中州名在南國又未幾聞其詿誤受惡為塞下遷民心傷其寃而已比以公車之役薄遊長安聞九思方擊登聞鼓奏書自訟於聖天子丹陛之下有子甲年十三博聞強記落筆如駛才視其父為書纍千言厯抵公卿大臣稱父寃願附緹縈之義禁聞而壯之相過逆旅勞苦如平生歡見九思溫焉醇謹子甲髮才覆額短衣楚楚可憐試以文章倚馬立辦的然先秦兩漢間某此時慷慨而泣數行即欲為之作一箋投當世之明公大人以大白其事如弦上之矢矣某亦何所為亦何所求哉賤臣隕霜庶女感風匹夫匹婦足關天道皇皇上帝固不以其微細而遺之也况九思大楚美才包洞庭雲夢之秀擷蘼蕪蘭芷之芳上可石渠東觀下猶不失牧伯庶司今陛下夢寐賢哲以興治理有才若思誠廟廊所急若以無罪見枉卒從吏議而令文藻清譽之士貫木荷殳逺投窮邉以飼豺虎悲吟於黃沙白骨之場蹢躅乎酸風烈日之下則孤憤之篇且與龍堆馬邑同其不朽又令十三童子牽衣卧路吐其少年英詞秀句長謡孤兒吟為行道嗟傷見聞扼腕早違嚴父必至淪落草間文采銷滅而無所成此甚非所以愛惜人才培養國脈也區區之愚蓋為人才國脈寧詎止為思一夫乎古語云相馬失之瘦相士失之貧司馬子長之下蠶室亦興嘆於家無貨財交遊莫救乃若大俠郭解之徒至使大將軍為之言世之常態古今所同方九思為文學有聲家席先人之舊業足具饘粥此時交遊賔客動引青松指白日執手而稱相知今一旦無罪而下於理聲名摧損家業蕩破父子垢首囚服倉皇北走裋褐蕭蕭泥沙滿面平生交親掉臂不顧某竊痛之伏惟明公秀甲河嶽德侔造化神明之智燭彼蔀屋陽春之澤下及昆蟲宇縣戴仰華夷咸頌今九思父子不特一昆蟲也其含寃不止一蔀屋也明公調和四海萬物欣欣協氣流鬯而猶然使一夫向隅明公不忍也特無為明公言之者某海濵一介布衣韋帶之士躡屩登朝踈愚罔知忌諱直吐胸臆以進於下執事明公誠亮其無他俯聽芻蕘湔雪誣枉起九思父子之白骨而肉之則天下懷才抱義之士有不肝腦塗地而向明公者非人也惟下執事圖之某惶恐死罪先夫子曰屠隆字長卿鄞人禮部郎中赤水之文才情舒卷忽而波瀾浩渺有一段好處但未經剪裁耳而隨逐時尚持論荒謬幸其工夫未深不掩本色私記赤水萬厯丁丑進士以縱情聲妓中白簡罷官自序其所作以為姿敏而意踈姿敏故多捷給意踈故少精堅常戲命兩人對案分拈二題各賦百韻咄嗟之間二章並就雖復苦心搆思亦只如是答撫臺龎惺菴揭支大綸蒙檄發洪朝選不道欵目命職廉之比者諏諸故老質諸閭閻悉無影響而怨家姓氏皆烏有子虛尤無足據過承重委展轉思惟彌日亘夜謬謂兹舉必不可為亦必不能成請借前箸籌之彼獻計者類云分宜之貴也竟以反坐迄無後詞奚有於卿二蓋分宜柄國亂政中外側目僕御充多資産狼藉故喑死無詞今洪家不過中人門可設雀羅性不近聲色左右圖史口談性命亦濁世之矯矯著聲者也比淫於色附盜以賕爰書則然乃倚政府結臺司譸張變幻爐鍾所錬摧方為窳抵金為礫坐反唇以大逆目莞笑為謗訕人命至重鬼神難欺明法幽罰善福惡禍如火就燥如水流濕氣類相投而理數有必相值者特善惡之分數有大小故禍福之參會有久近俗士狃旦夕而不究終始覩眉睫而不參要領若謂茫茫而徼幸於不必然耳愚聞在昔武安侯以酒過殺灌夫詞連魏其俄而武安病呼服謝罪以死車吕希時宰旨誣其帥胡舜陟死不數日胡乃白晝執吕殺之羅汝楫附秦檜誣武穆未幾楫以遄死而其子願亦擊死於嶽祠王士驪希蔡京旨殺一無辜婦士驪暴卒而京及攸翛皆伏誅載在汗竹讀之凛凛胡可罔也即邇來路楷趙文華阿黨分宜以白蓮教殺沈錬以失律殺張經以謗訕殺李默時遷事改身伏殺人之法而分宜亦以叛誅此耳目之所睹記亦不足信乎彼蚩蚩者又妄謂分宜事敗乃爾今兹且有無涯之望不次之榮奚呫呫於陳迹為也夫王如之隙於王敦也敦欲殺之而無名乃以意隂授王稜稜即酒中舞劍擊如反命王敦其希榮丐遇謂交手可得而敦乃陽驚曰如吾懿戚也而稜殺之因殺稜以謝姦雄欺人背面矛盾彼二心者出死力為姦雄資徒召禍而敗名耳何榮之可冀哉故守貞蹈義志遂命立即有不偶天日可明若前數子者當其得志含穢資噱奄奄茍全論定禍叢百醜羣湊唁妻孥而拙詞對僮役而赧汗矣彼其之子面承風旨力為從臾蓋其心不附仁義目不知古今逐金帛而魂迷競朱紫而神炫如蠅逐臭如蜣弄丸終身憒憒然聲利是憑且不識禍福安問名義此宣尼所為歎鄙夫不可與事君也浮雲易散駒隙易馳膏粱文繡終饜螻蟻肌骨毛爪卒歸糞壤獨三寸簡册皎皎耳目千古不磨奈何汚之又聞諸司忿職倔強議且移牒外郡以竟斯獄則又舛矣祖宗設推官非若近日之隨巡承委爾也念黎庶非法用乂故設法司以平天下之刑設臬司以平一省之刑設推官以平一郡之刑今之推官溺其職矣臺司既視推官為私役而奔走之以快一已之喜怒推官亦奔走唯諾以身為臺司之私人而罔敢抵牾然非設官意也身對大廷銜皇命持平一郡辟辟宥宥惟三尺是繩即主上有令義且以死爭之豈臺司所能他委豈外郡所敢擅行哉天下方廣萬世方逺天命民彛終當顯露安能盡塗其耳目也事係紀綱不敢依違附和以傷雅化唯卒全之勿致紛紛答夏于中書羅虞臣人至辱逺書詞指殷勤謬蒙嘉奬竊計某奔走下吏卒無一日之間不能千里致問愧汗流趾顧抱咫尺之義過為足下所誦然聞君子不責報而廢施志士不矜能而伐德故悲歡隨場者衆人也振難赴急亦海內交遊之通義耳奚足多焉曩僕在旴時會足下奏當已成閲獄狀狀多鉤織悲夫寃哉寃哉未􅀢推案流涕也君子負義於下流賢士繩行於不肖今世之愆訾足下煦者倡曰刻薄妬者目曰賣重怨者斥曰姦邪貪者誣曰婪利論列曰飾虛名薦引曰植黨援幽黜曰排善類鄉人不比曰好詭異進士外補曰破選格凡以責足下者此而已雖然足下何謂無過比如風之生也穴焉空積豫末信於衆人而徑直不虞其後何謂足下無過但願足下才負儻蕩行懷孤獨靡能循智保位卑論儕俗致身顯耀獨扞當世之文輒乃豫觀往古詞人才士輒悲其動遭轗軻仰天墮涕况今親遘見之如東洲者耶僕素喜讀今世士大夫文字而得其人物武功則康對山北地則李崆洞信陽則何大復大江以西有足下然武功北地俱以誣坐廢信陽雖不廢終亦早死名位大不顯而足下乃抱不測之罪眠戈萬里磧沙塞草瀟涼異俗昔人所悲諺曰蛾眉胎妬才美秧祲今足下得無類是乎無論北地且評武功當逆瑾之時朝為張綵夕履要位武功以十年修撰不得一調可謂持正君子矣徒纍髙名汚迹同鄉然終不詭於大雅保身之義孔子居衛見南子居魯見陽貨赴佛肸之召此何為者其道非可與拘儒曲士語也故子雲留莽梁公事周箕子明夷異世所符曷磨而磷曷涅而緇然後之詆毁子雲轉深訛舛每訟斯寃心孔發熱嗟夫嗟夫此固未易與俗人道也日者問足下於渭崖渭崖曰是在我在我我其有待乎姑徐徐僕且喜且難之曰今夫煦者妬者怨者貪者行其説而是非顛倒公道不明矣先生曰徐徐他宰執亦曰徐徐今宰執不愛時體有如先生者乎即有如先生則亦曰徐徐已耳民負寃則直之恐其不早也乃士大夫之寃則顧曰徐徐爾如此而煦者妬者貪者怨者之説卒有能忌憚之者耶既又退語人曰寃哉東洲若卒有能白之者然命也夫逹人不以夷險易操毁譽殊志足下試觀義命之説精矣敢附以聞亦欲足下之由然而雍雍若無與然以待也則命在我矣念言有懷侍坐無緣北望塞塵何勝慷慨寄趙大洲閣老薛應旗某自退休以來杜門丘壑不復一涉人間事今且七十有一老矣委骨九原計亦旦夕間耳特因我公在上敢進一言以圖首丘之安竊謂江南諸郡財賦所出我國家根本之地也邇年民力告竭田舍流亡而風俗薄惡更有不可言者説者謂自倭夷入寇所在兵興而增徭加賦以至於斯然而吾黨放肆日甚一日顧上下相蒙依回遷就其所擊搏者不過假賣萊之傭以塞責耳民生之疾苦士風之汚下誰則恤之凡若此者皆其瞻前顧後之念重而患得患失之心勝也時事日非將不知其所終矣昨歲海中丞巡撫兹地觸目激中直前向往凡所舉措皆智巧之士所深避而不肯為者此其人豈易得哉特以一二事矯枉過正遂譁羣議致弗克終以去此固世道升降之機而秉陶鈞者恐亦不可以不加之意也請即其一二事為公言之如貪汚官吏貨盈囊槖而誅求無已尊貴公卿田連阡陌而交易不明遊花棍徒白役府縣以漁民利者一官動至百人無賴姦猾營充孤老以冒官糧者每縣幾及千數士風瀾倒民俗侈靡囑託動致千金燕會必具百味諸如此類皆其所欲深究而痛懲者未及施行而端倪已露其諸不便者莫不惴惴然疑且懼矣特以驛傳之夫凡涉勢要之官者必革致使舟之難行告訐之詞凡牽鄉官之名者必準致刁風之競起乃竟以此而徙其官俾其設施之不究此正所謂以尺寸之朽而棄其合抱之材也良匠之用木恐不若是而有以人事君之責為民擇官之任者可無深長之思乎鄙人是以不揣出位而敢為公一及之也公如少留意焉俾繼于後者因其所長而損其所偏則江南之民庶有更生之望而為世道慮者要亦非眇小矣垂盡老人越分奉書亦恃公之高誼素欲為生民立命也為李見羅上當塗諸老書許孚逺應天府府丞許孚逺謹按今奉旨拏問原任金騰兵備按察使李材被巡按御史蘇鄼劾奏欺罔罪狀事情虛實逺在萬里職之迂昧何敢輕置喙其間顧材為人職所素知立心制行匪習偽邪蒞官行政夙有風采職嘗與同時備兵嶺海見其於軍旅之事似有専長適會地方寇盜充斥指揮將吏防禦截殺頗中機宜甚則身履行陳之間如監督總兵張元勳追勦倭奴於雷州三次戰捷斬馘獻俘多材調度所致此職所目擊故當時一方倚以為重朝論推以為能而獨其氣格昂藏作用迂濶不獲於上勇退投間棲遲十載臺省交薦復蒙聖明召用以是有金騰之役然而人即其人官即其官也且狼狽失據敢行欺罔如御史所云何為者哉凡邉塞之臣掩罪冒功往往而有然不宜出於忠信之士至於殺略平人詐為俘囚戮割死尸以當斬馘此忍心害理之極豺狼之為也材之平生似不應狂悖至此藉令有之必將領巧飾以欺材而材誤信以報撫臣撫臣因以奏聞闕下者也春秋之法責備賢者則材之罪誠所不能辭然而律有知情與不知情如此詐罔之極材萬萬無知情之理又聞滇南一二薦紳公論謂蠻莫迤西二酋之攻緬夷其調度䇿應實出於材以夷攻夷頗得勝算今御史以其掠冒首功併削而不録夫有臣於此能宣昭聖德制禦逺夷即功不盡核略而存之以示激勸未為不可乃重持文法蔽罪邉臣且歸功夷黨其於大體謂何職觀御史彈章之詞尤多軒輕在遊擊劉天俸以為武辨也而稍寬之在同知宋儒等以為屬官也而又恕之在撫臣劉世曾以為事出不料也而特原之獨劾材欺罔不遺餘力則亦過矣御史素不聞有私憾於材大都材以虛名取忌時俗而又踈於世故每為僚友屬吏之所不滿或以是流謗御史御史遂深惡之耶抑别有説耶今主上以御史言欲核諸臣功罪之實逮而訊之於法至當竊亦聞之罪疑惟輕功疑惟重此盛世事也若材之罪與功似皆有可疑者其在今日熙朝隆盛不讓唐虞聖度寬容同符堯舜固知賞罰輕重自有權衡所以處材與諸臣者必不失其道苐材本弱質兼際衰年千里拘囚法庭拷訊儻淹禁囹圄遷延歲月卒就殞滅情極可憐即材一人不足深惜而使邊臣解體志士興悲恐非朝廷所以鼓舞人材托寄邉閫之意恭遇大賢在位以道事君進退豫奪參酌謨謀無施不當此事關係亦或匪細伏願垂神御史以執法為能縱苛求而不為刻宰輔以調贊為事雖曲全而不為私回天之力伏仗慈仁用拔孤危以存國體此固職為材平生知已哀鳴之私而亦逺近士大夫同然之議也職臨書不勝冒昧懇惻之至上宗伯書金繼輝朝鮮國差來陪臣刑曹判書金繼輝等薰沭再拜謹上書於大宗伯相公閣下兹者寡君之遣鄙人等來也非修乎事之常而事固有得已不得已之疑焉故與國人謀矣其小人者曰國祖蒙被詬誣蓋纍葉籲雪承列聖之垂永不一不再而足獨所稽者新會典之纂完頒示有期耳期至則行李往來相屬不必於專也專而期或未至則遲以年時不得留而俟也事宜得已其君子者曰冒以他人之系為詬何如也陷於弒四君之惡為誣何如也詬誣攸集典訓是載而流布於天下之耳目為寃何如也惟寃屢號有降兹監訖至今日無遺情矣然典之未新積二百年以有待典之適新將朝暮如不及獲亦既竊聞其垂完矣不亟專使以請明示而諉曰往來相屬是尚可忍乎况事有關於父子君臣之故者其在中國非禮政所不及則聞之不容於恝為之辨之不容但已肆天朝之動念於我久矣藉令專使以俟完典果有年時之留必不拘於故常而莫許也事奚啻不得已寡君於是却小人者而君子之聽曰此固寡人之志也蓋乏使以命鄙人等而宴賜特厚至於解衣推食遣之日復親執爵以飲西向拜奏而授之且泣且語曰我祖我考實皆奉有先朝恩敕惟覬新典之快覩無復餘憾而溘焉泉壤目且不瞑寡人之得聖旨又丁寧矣而獨可保其究乎又曰汝等必待事完而還鄙人等泣而辭曰不待事完毋還也小邦雖極區區君使臣以禮臣事君以義惟不欺負以為恆物今寡君既以事完屬鄙人等鄙人等亦以許寡君豈容有二哉顧以新典之完乃我事完之日惟早晚爽於始聞之為慮亦不敢以私情迫切而有所欲速於其間惟不得留俟之為懼耳寡君之衣在身絲縷之命足與同弊寡君之食在腹沒齒足以為飽雖十易寒暑無難留也惟難留者在天朝接逺人之故常而不可寬焉即鄙人等有死而已雖欲勿死如毋還何鄙人等既以寡君之咨抵執事者而奏下亦到部伏惟閣下高明仁恕宜無不察其詳鄙人等庸敢以贅獨恐執事者於鄙人等所以不得不專來不得不留俟者察之或泛而容易於稟覆之際以致萬分有一缺誤也用是不免披訴惟其專專於無所事言涉猥屑而不能自已伏望閣下兼容而曲遂之毋使小邦小人者言售君子者言不售而鄙人等有以還報於寡君則千萬之幸也明文海卷二百五
