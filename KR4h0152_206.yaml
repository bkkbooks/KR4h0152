body:
  text: 明文海卷二百六餘姚黃宗羲編書吏治上王太守警齋書劉繪僕聞之長者言士垂纓佩綏而不揚行宜若女處室中目不睹異物口無短長可否喜以矜潔居貞貴爾愚謂士未可盡然可內可外可短可長可否在眂時與已或知不知論篤無妄爾竊仰明公英識蚤發弱冠取上第分符大郡可謂少而得竒矣舉蹈敻常步辭語飛光焰士或偉駿于前皆掇辨議公且可自侈崇矣乃若斯謙素禮重儒紳懇懇咨詢如長厚者至與不肖推引諸生中又特加意清暇晤對延坐彤闈溫情昭於色笑真懷出其肺腑每相追論公儀子産為吏而慨作郡者之難昨手札又切切問息訟弭盜古今談者鮮有要術欲有以議之僕自思不肖多癡亡識媠於修進每憶前衢惻然靡寧辱公偶以文字相愛而禮次賔友至稱為通儒庶幾他日有施用云是雖臨邛繆敬於馬卿勃海引懷於王子不是踰也僕雖不竒尚可為隱邪夫言治者亡有不謂守令難其人為守令亡有不自謂為難者惟未思其要爾要者何曰去利心而已矣宣聖罕言利非謂絶其利也為利難言也難言者存不可絶不可蓋在人可存在已可絶在公可存在私可絶故明人已公私則利存絶可得而言矣大易曰何以聚人曰財故財者人之心也能通心之精則可言利與命與仁矣且謂絶利者非謂卻暮夜之來斷橫索之酷也謂公其利與百姓而不忍傷奪之也若公其利則可廣惠而樹恩名位備臻焉何謂公其利而不忍傷奪大者莫如𣲖斂夫百姓繇稅之辦以供公家既已竭血力矣若重以有司非時之科非法之𣲖欲筋髓不脫露豈可得也夫往來迎送祗候雜用業有十甲輪流之出矣而非時非法或一役一錢一役五錢或月一輪或月二三輪不論見年冷欠概索而頭會之無識者于此尚為乾沒計不知官攘什二吏書攘什三甲長攘什五民乃出什什焉其虐害招災眚荒田農何可勝道此科斂之弊也其甚者與市細爭攘利初言者皆驚詫吏亦愧談之終乃稱當然若倚市門者淫笑懷金帛以為巧能矣馬遷貨殖編户節駔會駔會估儈行也其人微賤興貨者與通或魚鹽布榖而要轉亦杪鮮今吏轉于此輩苦之或公衙用米鹽葛纑枲布往往窘索不知具何章理而此輩多傾産鬻兒女倍償下至闤闠雜物鉛鐡器皿之屬屠酤羊豕蔬茹之屬公衙欲用輿皂攖而去如拾諸野貧者所以呌寃咆勃而欲散走焉小民亡本業任其巧力為百工藝若木鐵紡磚繢畫綵繒公但考用而餼廩工值大半損減俾妻子啼飢人具菜色力役將安忍之夫科斂則農廢業市獵則商不通役使則工呰窳無營計及見士則與虛談德義而無賚豫之澤即此雖善牧如黃卓神理如趙張居則使人怨去則遺恨讟無已亦安所謂利哉夫尚志者滌涅以滅迹崇實者薄名以纍行鑒逺者慎始以著微公新政能省蠲非公務一切派斂罷取各行貨物使利在蒸細勿占役工匠三者事雖小而為害最大俗吏所不能去也公能除之不與庸俗同利周則百姓安業百姓安業則藏富於下歡欣至歌頌興訟獄不息息也寇盜不弭弭也上官不信信也士庶不懷懷也雖太平可致矣然欲公利心最先袪者吏猾也吏猾者善迎官之欲而導之官聽其計則心昧霿吏亦共其汚而取快焉官於視事之初此心清濁未定利害未審吏迎之曰某征派有舊例也不派且廢事某市物宜取者某工宜官用也官不強毅而隂曖相通彼此遂其無忌是謂兩合之兩合者兩害之也是以良有司必嚴吏猾有吏猾而迎我者必僇矣僇吏猾如撻駔媪也駔媪謂老娼為姦語誘良女良女一聽其言而終身賤汚故良女負烈者值駔媪語出必撻之此必有士行者矣或曰居官即大家大家於往來出入賔旅交際必有經費所不能少如不一取諸民豈能神運耶夫此在勤于理訟多贖而薄罰之訟者多姦民姦富者於此處之或輕其罪令出金興其事利不在官而登掌者分明此有司才通權宜何不可孔子責子貢贖人不受金蓋此意也雖聖人不能廢或曰無政事則財用不足誠使民興作地利山澤陂塘皆有導法積貯百姓足君孰與不足凡言利無處不能神運者皆有司汚聽吏猾也自古今未有才吏居郡縣而至屢空者也故吏能清吏心又出於天性之好分之所當非可矯焉持此恆語以誇諸人則無偽而真矣無偽而真則舉事灑然無染纍矯然青霄之上所謂仙吏矣不然雖才與能不出泥滓也僕狂愚略為奏記奉公以為知已者之報自謂其言鄙淺而可施諸天下唯公采擇勿卑之為書生之談與吳太守歡除酒禁書劉繪伏惟君侯英達和粹萬節解應握符連城化行黃澤政未期月威動千里上下相和商農率利童子不狎野無垂白令之若風烈禁之儼霜凝雖子産與賈之革西門投巫之化未足踰也近以民風不淳漸入奢靡遊徒嗜飲喪其本業且致酗德日富鬪殺為姦使俗尚淫瀆科令汜濫為害殷矣臺下盛心悼風化之澆秕憫農賈之失緒乃下令禁市人不得賣酒欲開黎氓彼昏之志崇君子令德之懿使哺糟啜醨者復醒倒冠卧甕者知悔蓋至美之清政也以故百姓斂德廬井肅然爭捲旌簾匿瓶罍覆䴷醹貨麴糵竭青田之水空雲安之春壚無遺樽巷乏行榼不惟攘除酒禍且令百姓省錢寡費各思其職勤纎嗇之務薄荒穢之樂里中士人雖久不相見無問新識故好揖遜顧笑一語而退禮節森森交際恬淡如登太皥盧英之世可謂遐哉返淳矣但于不肖輩則甚有不便者焉今且未言其不便而以大槩酒德論之古今於酒其言美惡勸戒不一雖六經亦無定焉易垂濡首之戒而衎衎之樂見於漸爻書明彛酒之訓而菁茅之物通於禹貢詩刺反恥之醜而言舞之樂侈於駜頌禮切訟繁之規而酒材之辨著以式令至若禮淫分析嚴於左氏之辭而隂陽釀法詳於春秋之緯由是觀之六經於酒德果無定論也辨者猶曰此言酒耳未及市酒也然周禮三酒之物通於天下小雅無酒酤我歌於朝廷是朝廷未嘗廢沽酒也然則沽酒市脯不食古今惟仲尼一人而已其曰不食不自食耳亦未嘗曰天下可無沽酒市脯也談者又稱孔子百觚季路百榼見於其孫孔叢子之語而其孫孔北海又舉以對孟德此不可謂為虛語也自是而後言酒者各持其説以為是非而旁引曲證以務相勝漢魏以下賢豪之論紛紛盈帙迄無統宗蓋自世本載少康始造酒經曰空桑烏梅之精嗣是論者大都發於性之嗜與不嗜而未裁之以禮或發之歌頌或勒之鑒戒摛文炫藻騰標緗帙歡呶爾雅各任其性嗜者以為太和不嗜者以為狂藥嗜者以為聖賢不嗜者以為凶慝嗜者以為明珠之照海不嗜者以為穢石之卧泥嗜者以為玉鏡之清魂不嗜者以為糟漿之逆鼻故從嗜者之論則以為任真率性逍遙放達於物外也從不嗜者之論則以為守禮修義恭慎嚴恪於度內也然則酒之是非美惡與夫名味之實功德之真尚未爽著於人矣豫嘗觀漢書曰酒者天之美祿帝王之所以頥養天下享祀祈福扶衰飬疾百福之會也斯言其得之矣雖然此特著其美也而未及其所以不美者也蓋其不美者非酒也飲之者之過也夫膏粱正味也而貪叨者以之傷生男女大倫也而瀆亂者以之滋淫是故先王制為飲食之節而不以貪叨者禁庖宰之設定為匹配之儀而不以瀆亂者廢嫁娶之好故酒美祿也其名遠其味正其德和其功大昔人謂天列酒星地湧酒泉酒星者見於象也酒泉者氣烈而味甘成於天也故人之釀者特擬其氣味而作之故春秋緯曰二氣動而成酒蓋法天之精也是以玉泉之樽海樹之花玄丘之香鳥鄉之水皆天酒也醉天酒者可以通仙醉凡酒者可以通道特患飲之者不得其理耳故夏王五子之歌周誥沉湎之戒楚人邯鄲之圍漢儀長樂之失凡此言有國者不善飲耳降是若孫朝積麴以疏兄慶封遷蒲以易內楊氏之覆楚軍曹參之狎漢吏朱虛起釁於行觴季布無功於作郡甚至文舉以答問而蒙忌禰衡以奮筆而取戮次公醒狂而致丞相之嗔伯仁覔對而腐上客之脅彼於毁生滅性傷理背道者不啻千百非酒纍人實人纍酒也若乃蒲坂賜歡而諸侯仰德鎬京燕喜而四荒歸心流霞溢於天醑湛露厭於夜醉齊桓納遺冠之説以輟飲而名尊五伯楚莊因滅燭之宴以樂賔而戰勝強秦伯主投醪於飲河赤帝斷蛇於當道此皆因酒設用恩威並加振文武之業髙帝霸之名比德較功酒之時義大矣哉其他文人莊士武健豪雋以酒顯名業者如穆生幾神於置醴定國折獄於數石康成一斛而六籍朗照巨源八斗而吏治清敘張竦與孟公而齊名曹丕得徐邈而來譽是以達人解五花之騎以覔醉詞客脫鷫鸘之裘而易歡陶侃留客孝節乃彰孫顗多醉能名益表皇甫亮日飲而純和不失劉公榮杯酌而雅量自重溯而言之人負酒邪酒負人邪僕於古人論酒者得其三説是為千古不易之談雖六經未有及焉其一江咨議曰酒猶兵也可以千日不用不可以一日不偹此言酒貴節也千日不用恐亦迂焉其二陳暄曰酒猶水也水可以濟舟亦可以覆舟是謂酒有險德義亦未精也善乎許氏説文曰酒就也所以就人性之善惡也是謂善者飲之則成其善惡者飲之則成其惡耿介淫邪之所由分而吉凶之所由起也然則酒之善惡果在人非由酒也是以雨露之所滋蕙芷茂而薋菉亦茂江河之所潤龜龍聚而虺鱷亦聚彼雨露主於滋物而不知有蕙芷薋菉之異也江河主於潤物而不知有龜龍虺鱷之異也故酒也者主於和合萬民而不知世人有剛正淫慝君子小人之異也今若以酗酒而罷市因以廢酒則是因薋菉而欲斷雨露之施而忘其所以茂蕙芷者之澤因虺鱷而欲截江河之流而忘其所以蓄龜龍者之功是以先王知酒者係百姓之大欲洽百物之大禮而成天下之亹亹乃頒六物之政令設酒正氏掌之又通天下之燕禮立之監作之史勞以百拜節以三爵使天下歡欣流通人神胥慶鼓之以歌舞震之以金革祈之以賔射侑之以壺矢承之以筐篚幣帛惟懼不醉以宣其情傳曰興於詩立於禮成於樂此之謂也且古今英俊有身綰銅墨行載朱輪為刺史守令寄命千里而亦有以酒顯州郡位躋將相者如龔遂用王生而稱主上之旨王𢎞託淵明而著豪賢之節習池藉山簡以流風白楊假袁公以傳盛率能有章風化無妨民和其餘蜚聲逸册慕青州從事之名飫建康醇旨之化者何限也僕仰君侯醖藉道腴金和玉節百姓歌揚德化陶陶遂遂惠甚渥也僕願君侯出政令懲酗虐謹無良察飲者之善惡而誅賞之如羣飲日夜造為姦妖與譟詈相毆淫瀆賊殺者悉執拘置律令勿少寬假惟除前日酒禁使百姓修洗腆之用舉德馨之祀仍整壚停壺列樽置觚開河陽之桃花披神州之竹葉使士和農交商通賈惠利和而生衆本末以相資熙熙而往攘攘而來煙連於六街氣蒸於三市或睹周京之臺笠或聽武城之弦歌散春聲於樓館飄酒旗以麗天兹非太平之盛事邪伏惟君侯裁之其所謂不便於不肖輩者可談於君侯之前何以言之史傳稱縱酒自適者盛於魏晉間諸賢如劉伶阮籍輩皆有所託而逃之也然其蕭散不羈則又不喜坐牀牖對妻孥持炙擎杯兀兀如騃以自飽飫每每挂杖驅車看竹西舍對花别苑故以負債酒家典衣春館為快意以故阮孚解貂以留客陶公得錢以寄肆至唐人少陵岸幘於曲江之濵謫仙醉卧於長安之市蓋謂此也若不肖才非豪俊量復汙陋既不能辨鄒陽之清濁又不能效揚雄之滑稽賔筵載接愧王瞻三術之竒微禮若具乏陸納二升之器誠未足與議酒也但年方強仕自墮丘壑入孫吳已無術逃黃老而匪晚故玩周易大耋之嗟效風人今樂之趣賞情東園聽歌北里或逐童冠之風味而寄興壺觴或追父老之杖履而尋味醉鄉將謂偷間以學少非敢惡醉而強酒也今適酒禁方嚴則玉碗塵封牙籌土暗錦筝金斚幽於東序枉矢哨壺束之高閣且使歌童嘯侣潛蹤於曲巷燕姬蜀女不見於當壚於是門無方來之朋坐乏不速之客好事懸車絶屐齒於苔階稚子候門取飛蟲於蛛户使僕輩對蘭菊而切佳人之懷持蟹螯而發生事之歎固君侯之所宜動心也夫食馬賜巵秦軍有赴難之義持觴回酒隂鏗有獲報之仁倘君侯納僕之言以除酒禁則不惟萬姓稱便而又下及幽仄樗櫟之夫是恩多於賜巵而赴之者不止於秦軍仁重於回酒而報之者何但於持觴者而已惟君侯俯賜莞爾以見施行幸甚與杜尹論量田事宜書薛甲小寓人回道及下問知為量田下收葑菲仰重仰重此事始於崑山遍於蘇州及於無錫更厯數十明公旁收曲議至精至密雖有未盡者寡矣加以執事誠信素孚可以坐收成功愚所謂百年香火之情在此舉也所願從容以處之盡人之情意到而已蓋敝邑田土不比無錫無錫地平坦太湖之水灌溉一邑少旱潦之憂敝邑濵江傍山極高之田十居其七而青暘一帶墟垣又為極低若丈量之法比之無錫少或峻深遂成謗怨惟弓口廣狹及田地高低則數可以照得彼處中間處置須略寬一分則藉口無由而人知感德矣至於高田池埄必須聽出蓋沿河田畝有官河可仰高田無水必開溝池灌溉池泥所積遂成墩埄長者幾及數里皆唐宋以來故迹故高田之有溝池即近河田之有官河也溝池之原無糧即官河之原無糧也設欲查照山灘派糧合勺所得甚少而百家所聚原無定主稅將誰歸此一項不知無錫如何處之愚見必須聽出勿量可也墳墓之類除無主者聽外其有主若滿三四十冢者亦宜聽出蓋子孫多必逃絶衆糧何所歸此亦甚少但理須如此耳聞無錫弓口俱用頒降銅尺必須依之不可用鈔蓋鈔口長短雖用銅尺製造然鈔紙俱乘濕用印取其硃墨易滲比及乾則縮而短矣今匠人所用營造尺比民間丈尺定短則鈔口所準故也無錫弓口既用銅尺製造今但依之則無辭矣又此事須寬假旬月方可下手蓋事理有不得欲速者如常熟無錫武進三鄰縣必先與定疆界方免得後日之爭亦可息豪猾隱避影射之端然四縣官府安得遽集須約日以需之乃可縣界既定則各鄉各村亦須定其疆界而縣中之疆其最難定者莫如濵江定之無法不及一年坍江之説又起矣愚見須從沿江一帶或山坡或港口去處擇其不可動者刻石為記約三四里一處每處從石量至江口約長幾百丈今後有坍者照坍過丈數與之除豁或坍至刻石處官與驗視將石再移內地有漲灘應升科者亦如之則妄告之患永絶而他可無患也至如差委之人尤須慎擇不然擾民為甚愚見如此倘有可採幸加審擇不罪狂瞽荷甚明文海卷二百六
