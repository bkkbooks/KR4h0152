body:
  text: 明文海卷二百七餘姚黃宗羲編書吏治與張吳縣書皇甫濓某無似韜迹山壑未嘗輕詣有司昨還自京師伏聞道體違和偃卧齋閣吳民負持稿禾無所控欣樵悴顛頓哀號道路公不強起何以慰之况今嵗之旱異於往時赤魃為災熒惑見象河乾不激井泥無禽七十老人目所未見竊念公自下車刋除苛法布以仁恩照徹庶情澤濡萬物而災祥不時何耶昔夏桀之虐禍延有商劉英之寃憂在楚相天之積沴既久而民之怨毒已深矣然幸其及公之身而降之是天之不即棄民於死亡也蓋公之德在民心民之所與天必享之公能強起為民請禱又何感之不通請之不得也大雩之説有為神農之書者備言之矣參于穀梁之著論仲舒之已行恐無不驗也吳有白龍之神載在祀典凡祭守令必親至其祠後乃遣攝以往至用吏胥不已褻乎王淯南時旱甚躬往請之見其祠宇傾圯祝曰雨降而新之旋車而龍見入郛而雨沛淯南擢去祠猶昔也人則不信於神何有胡可泉下車適旱令有司略放神農之法為龍形祠而呼之躬帥吏民徒步壇社一時户設几筵􅎆水置蜥蜴兒童幡幢燈香歌呼闐溢應時而雨比之隨車今一屠宰而不能斷吏則不虔於神何有某又聞郡守有閔雨之誠按公講救災之政某妄意今日所急莫大於釋繫緩刑次之蠲逋次之弛禁次之勸分次之防盜次之六者皆舉庶乎其能鎮撫之矣蓋吳自南岷公為郡訟牒紛積兩造攝至抶而囚之踰時厯嵗不復訊鞫囹圄之中縲絏成羣府治之前桎梏如市氣鬱而不泄疫延而不已京房曰歸獄不解兹謂追非南岷雖去其弊猶在故曰莫大乎釋繫理官持法不平恆徇上意以為輕重故情偽不得出入在心非辜而服上刑不道而獲平反者有之矣邇乃赤日之下執囚而刑之雖罪在不赦亦足上干天和傳曰刑罰妄加羣隂不附則陽氣勝而恆暘者非耶故曰緩刑次之往令催科無狀遺逋積負十有餘年肅齋在郡荒歉所停一切畝算籍登司徒為害莫甚一旦徵之民力竭矣值此災沴朝夕不給何暇治桔橰哉怨謗之氣發於歌謡所謂蜩螳沸羮虛譁積亂失在過差者也故曰蠲逋次之吳人好貸富者利在得息故多賴而不吝貧者利在周給故倍償而不難負擔之子百錢之資可給其饔餐鋤犁之夫三時之賴若取諸外府邇者私責之罪重於姦贓償納之令嚴於禁錮民趨一時之法而不知今日之嗷嗷無所顧望者是誰之過與傳曰號令不順人心其罰恆暘此其一耳故曰弛禁次之米價騰踴居賈持贏以射利外郡遏糴以自儲三寶不通泉布不流亦以致旱吳郡八州居粟之家紅腐於廪積金之室貫朽於囊誠能懷之以仁示之以信十出三四散粟於牙儈平糶鄉井而納其價責金於耆艾通商遠邇而反其金吏籍收之復歸其人使富者之有不失錙銖而貧者之益奚啻千萬故曰勸分次之旱傷百穀則有寇盜上下俱憂其極憂也今白晝之中撻小兒而奪之食薄暮之時逢婦女而取其粧盜徵見矣星星不撲必燎於原涓涓不塞將成滔天此又有司之責也故曰防盜次之某無徐孺之賢以下陳蕃之榻乏樊英之德能救成都之災所以為公喋喋者以公為知言故也公聞某言奮然強起吳民幸甚吳民辛甚與李龍岡邑令唐順之嵗凶民莩賢矦為之心惻而百方圖之者深矣輕齎一説向已面白兹復具之於書以為可以佐百姓之急而禆萬一於賢侯百方之圖則不敢以出位為嫌也竊惟國家之賦其水旱可得而減免者兌運以外之數也雖水旱必不可得而減免者兌運以內之數也水旱不可以不恤而兌運又必不可減免於是有輕齎之法蓋米自江南而輸於京師率二三石而致一石則是國有一石之入而民有二三石之輸若是以銀折米則是民止須一石之輸而國已不失一石之入其在國也以米而易銀一石猶一石也於故額一無所損其在民也以輕而易重今之輸一石者昔之輸二三石者也於故額則大有所減矣國家立為此法蓋於不可減免之中而寓可以通融之意不必制其正賦之盈縮而但制其腳價之有無不必裁之以豐凶之斂散而但裁之以本折之低昂一無損於國而萬有利於民此其法之盡善而可久者也以武進一縣言之嵗該儧運米五萬四千五百八十一石三斗四合此其入於國之正額也本色正耗水腳平米七萬九千六百八十三石七斗三合八勺四抄折色銀九千一百五十一兩四錢六分五釐五毫二絲此其費於民之羡數也若以銀而權米石以值五錢為率米七萬九千六百八十三石有竒為銀四萬九千八百四十兩有竒與折色銀共五萬八千九百兩有竒若得從輕齎之例石折銀五錢計銀二萬七千二百兩有竒而足縱使加折至於六錢七錢計三萬七千八百兩有竒而足則是民每嵗出五萬八千九百兩有竒之中而今出其三萬七千餘兩之數以不失國家之定額而實私其二萬餘之羡以自潤也夫五錢者江南之平價也七錢者折色之極則也若使江南米貴自五錢以上而蒙恩折色或減至七錢以下則其所私之羡固當倍之且蓰矣倍之為四萬則是十萬人凶年一月之食也則是國家不出一粟不費一錢而為凶年十萬人續一月之命也為民父母者何憚而不以告乎司國計者亦何靳而不為乎且夫國家漕運四百萬石之中固嘗定有輕齎四十萬石以待四方之以水旱來告者矣蓋其嵗之凶與否與嵗凶所在之地不可知而所謂輕齎嵗四十萬之額以待四方之以水旱來告者將安用之况自古經費其本折之權率視緩急而為之操縱今國家所以遠輸於江南不憚二三石而致一石者正以江南米賤而京師米貴耳近聞京師之米直自七錢而減至四錢而江南米值自七錢而增至九錢其為貴賤特異常時則是江南以二三石致一石而又不當一石之用也今若取銀於江南而用銀以給京軍之當給米者江南無遠輸之費京軍無賤糶之困此正今日之便宜耳然則非惟無損於國蓋深有利於國而得乎操縱緩急之權者也夫損國以益民猶且為之國家發內帑以賑災者往往有收矣又况無損於國而有利於民而又况國與民並受其利者乎此事在不疑而必可行者也為民父母者何憚而不以告乎司國計者何所靳而不為乎嘉靖十數年間江南屢告災國家亦屢嘗以輕齎與之此其近例試求之故籍可覆案也查得嘉靖十四年蘇松等處災傷巡撫侯都御史等奏户部覆準除蠲免外兌運四百萬石內準折銀糧一百五十萬石兌運米每石折銀七錢改兌米每石折銀六錢其被災尤重者量準十萬石於臨德二倉支運每石止徵腳價銀一錢五分自此而上嘉靖十二年折兌一百萬石十年折兌二百一十萬石八年折兌一百七十萬八千石無嵗不有災傷則無嵗不有折兌此其因災傷而折兌者常例也又伏讀嘉靖九年詔書兌運米以十分為率量準五分是時常州一府該得折兌八萬一千石此其不因災傷而折兌者例外之恩也由此言之蓋有因災傷而行支運以大寬民力者矣未有災傷而不行折兌以重困吾民者也蓋有不因災傷而折兌以廣例外之恩者矣未有災傷而不行折兌以嗇於例外之恩者也此祖宗之良法美政聖天子之深恩厚澤於豐時足國之中而寓救災恤患之至意雖旱乾水溢而民免為溝中瘠者誠戴聖澤之厚於無窮也與郡守劉沂東何良傅昨因來使附聞計已徹矣明公下車以來化行令肅所以仰副聖明愓勵政令一新此誠治安一大機也孤遠之臣聞之不勝喜慰兹因鄉人來議及論糧加耗事例云近有海濵窮民訴於撫公得行臺下議處竊有芻蕘之愚敢質於左右夫松江加耗論糧實出文襄周公獨得之見今人言其不便者有二説焉蓋謂田額本有輕重若論糧加耗則重者益重輕者益輕此一説也又謂輕糧多在大户重糧多在小户今欲議復論糧加耗之例者皆出大户之意此又一説也然其中實有不盡然者且如蘇郡吳江則其田皆美其糧皆重嘉定則其田皆瘠其糧皆輕一縣之中相去不遠至於吾松如華亭一縣其附郭與在黃浦左右謂之中鄉其田與稅皆均平似無容議其西傍湖泖者則極其膏腴每嵗收米可得三石之外取租者每畝可得一石五六斗又便於灌溉一夫可種田二十五畝計其所入即每畝出稅數斗而自有餘故其額重其東鄉濵海塘者則地勢高亢而土脈瘠鹵民皆於田內鑿溝以求灌溉竭一夫之力所種不過五畝收米常不及一石或棉花四五十斤或黃豆幾斗而已取租者又半之計其所入其能有幾故其額輕一縣之中美惡利弊相去懸絶如此文襄公昔日巡撫江南前後二十餘年每乘小艇循行籬落間或遇鄉之父老可與言者即與抵足共卧討求利弊其用心亦已勤矣誠知吾松事體與他郡不同故定為論糧加耗之例而又以銀布輕齎專歸重稅以禆之良法美意至矣盡矣行之百年法久不能無弊亦止須就其法而為補偏救弊之方非其法之不善也𢎞治正德之間亦有好事者欲變移之行之不一二年即以不便仍復其舊至嘉靖乙未丙申之間歐陽石江乃盡舉其法而變之其人素獵虛名號稱經濟其説遂行而沿不敢廢遂使文襄平生精力委棄無餘而松之民其膏腴之地則粒米狼戾奢侈蕩費而瘠鹵之區終嵗嗷嗷一遇凶荒則填委溝壑良可悲也且富豪之家多膏腴之地而窮海之濵多顛連無告之徒郡中士夫之家收置産業多在沃壤而巾靴浮談之士乃借大户多輕糧小户多重額以文其説以致牢不可破鄉先正東江顧文僖公郡之老成文獻也汙不至阿其所好其修郡志謂文襄加耗之法盡美無遺算守之則治紊之則亂至嘉靖六年復刻文襄年譜於家孰而以復舊規革弊便民案附於後顧公西鄉産也豈有私於濵海之民哉誠以郡中生靈所係不得不著典章為司國計者告耳竊查未經文襄巡撫之先蘇松逋負嵗計百萬文襄既定加耗之後蘇松起運顆粒無欠又得餘剩以賑貧乏兩鄉之民亦各饒足自歐陽石江一變文襄之法郡中逋負堆積至不可算而民日凋耗此其明效大驗也且近例正糧五斗以外已免加耗矣其二斗者大率每斗加六亦抵今日論畝之數惟三斗四斗者似為加重可以輕齎法通融補之且膏腴之地多而斥鹵之地惟糧長八九區以衆之有餘濟寡之不足在明公必有轉移之道若不為之處分竊恐數區之民不死則徙他日又勞召募開墾是又增一青浦矣海濵窮民得遭遇明公為之父母憐其陷溺而拯援之此千載一時也僕産於東鄉目覩其窮苦之狀不敢避嫌謹以所聞奉告左右并以東江公所刻文襄年譜注揭奉覽不敢謂以為必然惟髙明洞覽而照徹之中有異同亦望賜教幸甚幸甚明文海卷二百七
