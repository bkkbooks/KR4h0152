body:
  text: 明文海卷二百八餘姚黃宗羲編書適情答郡守聘五經師書宋濓十一月二十七日承遣使者來山中賜以書幣強濓為五經之師聞命驚愕不知所云雖然執事之意則甚善也昔舒人文翁為蜀郡守招下縣年少者為學官弟子每行縣盡從學官諸生明經飭行者與俱蜀地大化比齊魯焉執事亦舒産是宜汲汲孜孜欲追躅於文翁也然而興學在乎明經明經在乎選傅得良傅則止鵠設而射志定土笵齊而鑄器良聲流教溢俗轉風移反是則政墮矣此則執事不可不慎者也濓也不敏幼即多病若藝黍稷與肇牽車牛遠服商賈之事皆力所不任靜自念之吾將何執以閲世乎適家藏古書數千卷因取翻閲習久成性遂不欲棄去然亦藉是以自遣耳非有所能也是故家庭之間未嘗以知經稱之豈直家庭哉至於鄉黨州閭亦未嘗謂其通經也執事者不之察一旦強儒之使服深衣大帶張拱徐趨於講堂之上吾恐人無不笑之而所笑者又恐不止於區區也執事何為欲強之乎况五經自孟氏後無兼通之者如施讎之易大小夏侯之書轅固韓嬰之詩尹更始之春秋慶普鄭興之禮各僅僅成家而已濓視數子之間曽不足負羈絏以從執事采浮華而忘本實但見耳目具者輒聘以為師執事倡之曰某可師也左右畏威莫敢諫白又從而和之曰某實可師也所以濫及於濓濓縱不顧清議曲徇執事意而匍匐從之襟佩森如立竹執經問難欲屏之邪則所職何事欲應之邪則環視其中枵然無所有其於窘迫實有不堪執事何為欲強之乎古之通經者非思騰簸口舌以聾瞽時俗實欲學為忠孝而孝者又百行之冠冕茍於孝道有闕則雖分析經義如蠶絲牛毛徒召辱耳陽城為學官時謂諸生曰凡學者學為忠與孝也諸生有不省親者乎其有不省親者即斥去之此古人龜鑑也濓有嚴父年垂八十旦莫弄雛親側以盡愛日之誠猶懼不足乃使棄之以臨諸生諸生將何以取法乎諸生尚不欲久去膝下况為師者乃可爾乎世豈無陽城將何面目以見之也執事何為欲強之乎師嚴然後道尊理勢然也濓以輕浮淺躁之資習懶成癖近益之以踈頑不耐修飭亂髮被肩纍日不冠時同二三友徒跣梅花之下轟笑竟日不然則解衣偃卧看雲出巖扉中有類麋鹿然見人至輒驚遁欲危坐一刻亦不可得自知獲罪名教痛思懲艾卒不可變此執事素所知非今日造此飾詞如此之人不棄絶則已安可使儀刑後進執事何為欲強之乎濓雖不能造文性樂之甚當操觚沉思時闔扉凝坐不欲聞步履聲雖犬貓不使之近即近輒拊几大呼人咸指為狂易傳以為笑儻章不能就擊磬繞室中行或使小蒼頭簡髮如捕蝨狀或摩搔膺腹使氣隆隆然降升乃已若一入城市衆人叢居又無邃房曲閣可下關鍵未書半行狙伺猿視大鳴小噪敗人興趣寧失萬金之産乃不怨茍廢此樂不如無生執事何為欲強之乎平生朴戇視人世百為顛倒變幻動如神鬼或握手視肺肝乃宿刀劍之慘或鬭爭紛不可解則暗敦玉帛之好如此之類不一而足明以告我尚不能通曉况啓之以端欲使其揣摩測度邪自料決不能與此輩周旋茍與之相周旋寧免其見賣乎况兼目有短視疾雖月下可讀蠅頭之字距尋尺間白晝則不見人不相知者必以我為簡非挾人以濟如水母之目蝦必有禍我者素無所仰於人不知奚故而自求苦乃如此執事何為欲強之乎又自嬰禍患以來得怔忡疾見一夫負戟而趨心輒驚怖若杵擊上下面無色澤口噤不能對人近年衰孱日甚酬答稍煩則肩髀頽墮重如壓石急呼枕熟寐一二時然後漸復其舊自度亦不久在人世者所居之北有一峰峻甚俗以其如馮翊夏陽之山因號曰小龍門其間多間曠之地思誅茅架草室三間以奉老親則志願畢矣此足一出衆事皆棄嘗日夜計之與執事相契亦歡甚初無不共戴天之讐執事何為欲強之乎昔者衛人有西乞牟問禇師睔曰世傳五鳯信祥徵乎曰有東方則發明南方則焦明西方則肅爽北方則幽昌其見或有孽焉唯中央號鳯凰乃至瑞耳曰可獲之乎曰否有德則見爾非可以力致也禇師弗之信出千金號諸岐山之陽岐山民疑之羅彩鷮售焉禇師持歸誇諸人人皆笑之執事之所為無乃有類於是乎吾婺為東萊倡道之邦而龜山考亭之正宗又往往傳諸學者故閥閲之家多尊道德而薄功利據案談經比比皆是執事不彼之即而獨此是強豈棄瑞鳯而愛彩鷮乎古人有云經師易得人師難遇執事於易得者尚不鑒其偽真况所為難遇者耶竊為執事不取也雖然執事孜孜汲汲以興學為意何讓乎蜀之文翁但未能選良師傅其術為少疏耳今之為守牧者不為不多也而溺冠跨項亦有之矣如執事者又何可少哉又何可少哉濓非明經者愧不能成執事之意化吾邦如齊魯故厯疏鄙衷之不可強者如此惟執事采擇焉儻嬲之不置則黃冠野服負親而逃東海之上豈能悖性徇物亹亹隨人作上下邪禮幣隨使者還千萬情辭筆不可盡與孔元夫書胡翰僕自去年於公署之側有以見閣下之用僕鄙人耳何足以知君子竊於易而得之焉蓋陽為君子隂為小人陽剛而隂柔陽舒而隂慘其氣相反其在人也似之嘗以是博求天下之士其人正大剛明者也公平易直者也則其為君子必矣其人深險柔佞者也回邪狡戾者也則其為小人也必矣隂陽之類也故小人難知而君子易見閣下在省為端人按部為賢使者其謀猷言旨經緯獻替所以簡在帷幄措之中外者僕固不能悉聞之悉見之則謂之不知閣下可也今遽以古君子為言者豈茍相慕悅哉閣下見人不修邊幅握黜陟之柄下視諸生猶故等夷與人言不存形迹曰是而是耳曰非而非耳開心見誠譬之青天白日雖庸人竪子皆以為磊落明白則僕之與閣下有不待悉聞悉見而知其用心者蓋以此也以閣下之剛明正大公平易直有古君子之風則凡有懷而不能喻喻而不能逹者又安得自隱於左右僕委巷之人也非有高蹈遠引之意以偃蹇傲俗又非有良田廣宅優遊卒嵗以自足而嘗從問學豈不知君臣之義無所逃於天地之間邪顧惟孱弱多病中年屢更憂患頥頷發一癰疽潰血數斗卧而呻吟者數月親友不忍其即死力拯之始愈少延視息已近廢人口輔偏哆齒牙搖落出言謇澀舉食久乃下咽如是者十餘年矣比罹兵火竄身山谷憂懼迫於內淫邪襲於外自腰至髀遂成重膇倉卒弗治馴至足疾幸其不發則周旋進退接武少壯間若無異然或發而不制則痛楚通夕莫識有生之樂如是者又數年矣平生迂拙百事墮人後今五十有九矣形影相顧子女無一息慰左右先世敝廬焚蕩不存薄田嵗入奉租稅不暇自治每上先人墳墓則痛心疾首不知涕泣之所從閣下視僕如此以為于世何如也往嵗朝廷急於求才過聽人言移文見徵有司敦迫就道及至金陵入覲主上退謁今相國李公於中書一省之屬見之始知僕誠羸疾人也留省署兩月察其學與才益又知其迂濶不及事者也遂以學校之職授之特不欲以儒見棄耳承乏既久虛糜廪食無補名教時取故書讀之目眵視短未能終卷即已遺忘將敘次一二文字擬諸作者而酬答纍之亦莫能就學業愒弛莫此為甚今年士人家見録至公文仕宦及賢良人才殘疾老病者容其乞身不覺喜形於色及聞閣下持節再蒞東浙則又益喜庶其陳列自明有投策之日矣今乃有非所料者一旦欲以不肖之名舉而進之夫亦過聽人言不探其煢獨衰病有大不可者乎此雖得之傳聞萬有一焉則僕之身與家將俱廢矣恐纍閣下知人之明且今賢才輩出慷慨倜儻之士一切出其所長馳就功名豈少如僕者乎幸察其慺慺之心非有險詖狙詐如世所謂小人者則亦可哀之甚也韓子云天地鬼神臨之在旁僕豈欺閣下者哉天地鬼神實監臨之閣下為時求才宜亦為時保飬人才可也夫幼而學壯而行老而休者士之常也與傅民部邢侗張文凡三寓言三致隆指也主臣何以當先生肺腑哉新釀才離糟床敬上二器此麴真用白蓮花漿合成清芬頗饒舌鼻間先生大賞東秦酒汁弟尚未降服滄酒亦在品下似不去菊花市肆氣菊固佳然入酒殊滯酒香乃濁如都城黑龍挂爾廣川近法漢酎或兩重三重清如玉髓此以酌苧蘿浣女雅足相當登黃金沓砌璧帶金缸間回視苧蘿不無寒乞廣川酌其不免鴟夷委地乎弟前向省下諸公言刁家趙家兩樽俱不堪大嚼及大釂諸老極相頷賞座有青州從事僅勝歷下露不甚醇醲耳小酌微醺插花半殘寧馨兒不足隤吾玉山也往在吳聆弇州公妙論酒具有才德才分十八德分十二乃著風采廣川新樣其無乃清勝擬伯夷乎伊尹將於何處生活非犂丘生過任請問諸舌畣王胤昌太史屠隆道民屏居江壖蓬蔂當路蠨蛸翳門白㲲黃縧遁影方外軍持木患棲神化書緯真寶氣萬纍悉捐悟寂觀空一絲不罣即海內舊遊車轍杳然竿牘久罷雅如隔世亦如避秦二六時自審胸懷空洞都無生滅都無起伏偶一念興不出道民蒲團生活䨥跏絶瞑遊乎混沌息乎鴻濛外不復知山河大地內不復知四大形骸又何論人間世變幻閃爍駴電聚沫事哉放廢以來五易裘葛無一字抵長安諸故人非欲引抗自高誠穆穆憒憒念不及此頃趙奉常歸忽以足下手書見遺纍纍百千言掩抑沉頓情寄深遐向無生平何遽有此猶憶曩出國門祖帳如雲傾都扼􅒆逮返初服遂絶寒暄今日數千里緘題申章相念乃屬胤昌足下陳義一何高乎書辭謂僕蒙詬受誣抱此憤悶宜如子長之報任少卿李陵之與蘇屬國刳腹腸於紙上寫涕淚於毫端黃河砰湃五嶽隱起磊塊心迹千載猶新使胤昌讀之無雲而震不寒而栗風瀟瀟從易水來詎不雄豪颯爽快人哉乃不知道民年壯心盡矣夫大憤觸虹大寃感天湘纍悲風靈胥怒濤長沙凄其夜郎摧惋壯夫烈士意氣則然殷中軍名理玄詣形神超越信安之徙窮愁咄咄坐而書空則妄稱大小品道民嘗私心陋之道民重以宿業招彼毒喙伯嚭塜旁實生彼夫子蘭讒屈登徒毁宋傳之逺近驚怪異事然而古來瓌竒倜儻之士多不免於惡口含沙之蟲何代無之如必以遭讒被譏為賢則彼皭然者當何指摘如必以蒙詬負恥為不肖則古大聖賢亦嘗被流言此披裘所以畏皮相管鮑所以貴心知也道民方且立霄窕之圃翔廣莫之鄉飲恬愈之津咀窅眺之腴􅀈而忘言漠乎無諍業感足下相念之雅誠欲衝冠投袂作憤激不平之談則學道降心之謂何欲塞兌杜機遵老氏沉默之旨則又胡以仰副知已之萬一故敢以生平梗概崖略言之往者彼夫以仇故攟托中傷非復人理維時當寧洞燭誣罔顯絀其人羣情憤然咸持公議道民仰天一笑而挂冠脫我今日之紅塵還我舊時之白雲竹徑松關不減蘭省鹿驂鶴駕安事馬蹄猘犬猶狺𡨕鴻已遠顧何用復置呶呶則為知已耳道民生而蚤慧天性坦直未嘗學少年蒿目俊佻凌蹈欲以雕蟲華於當世亦不解開門置驛樹黨廣交遊大人以成名家貧少藏書耳目儉狹操管吾伊其於藝也涉之甚淺每顧影自照鄙哉么髍何所比數時吐一辭縱心矢口本無意專精取妍語出而時人好之誠不自知其所以好也而海內賢豪漸以昵就面被影貌語被撏扯性復柔和開朗絶去町畦無賢愚貴賤雅俗至則推心置之亦將借以磨鍊身心陶鎔習氣安見明鏡之疲於纍照安見源泉之憚於數汲又好稱人之長護人之短德人之恩忘人之仇恤人之窮急人之難悔吝繇起性不善麴君不解佻達居恆讀晉書見當時名流散情蔑禮害義傷教心甚非之體無惰容口無媟語宴樂欵洽絶不為盤礴歡呼而遠聽不察徒見王何任誕嵇阮通偉古文士並爾今何獨不然而道民齊物輕外忘機坦中頗與曠士同趣又吳越間人好刻畫粧點闡揚風流道民交遊既多不無稍通酒人豪客溷嬲浸漬迹疑同浴事類褰裳謂屠生必是天之放民仇家將挾其私動指曠逸好事欲快其口遞傳風神談者易行聞者易信吸訿喧囂百不得一不知道民實拘拘翦翦者手杯杓則攢眉對歌舞則閉目時而發興大劇不過清言解頥瀟瀟泠泠為畼而已令東臯接膝供奉連肩未免撒手唾去夫夫裹青布巾行朴遬俗禮者何足與語達而海內誤傳屠生俠如朱家狂如鼓吏癡人前何可説夢往僕當出國門一忌者倡説曰人言長卿狂傲亡之蓋大都以名與客敗名者美好器物忌多取多取不祥長卿居都客無賢愚貴賤雅俗咸及其門不及其門至不比人數士何至使人若此能無及乎知我者解之曰子謬矣長卿不附名名附長卿客實好之而趨之長卿者胡嘗日開門挈鈴而呼客乎人皆自愛其精神其樂喧聒耗磨而以自敝也彼蓋迫之而應直無用遁逃而假以了緣應迹者也客實就之又舉以為罪乎嗟嗟其知我矣今者道民名敗而世之趨名者不前官敗而世之趨官人者不前家徒四壁立而世之趨利者不前播越江介而故人之在遠道者不前天去其疾矣盡日而庭無履綦門可羅雀時翻貝葉時誦蘃珠時討玄宗時耽禪悅收視返聽葆頥霛光金木交并虛室生白亦既沖和融液故聽妙處自知起而散步微吟魚跳藻上鳥鳴花間身遊上皇趣在濠濮豈不亦翛憀幽寂有致哉世之人當其處喧嬰物則作煩躁想當其逃虛屏幽則作落莫想夫其煩躁所以落莫道民於此兩者之觀齊矣繄豈惟世緣即所稱藝文少嘗好之今亦剗除不甚留意傖父椎鄙往往攻掊文人摽其無行舛哉王子猷之言曰井丹高潔不如相如慢世是使後世以為口實者也世亦有無行文人豈謂文人必無行耶文章家談性命稱先王宣麗藻揚鴻巨廣覽衡鑑多聞善敗高者通徹靈竅下者顧惜皮毛何為而必無行乎務華絶根厥有涼德言高於青天行卑於黃泉文園竊妻執戟附莽路粹傾險潘嶽諂佞延清躁競崔湜淹汙世亦有之乃聖門自遊夏而下屈大夫左丘明賈長沙董江都鄭康成服子慎孔安國班叔皮張平子孔文舉皇甫元晏張茂先陸平原束廣微夏侯孝若陶靖節蕭統子雲任彥升徐孝穆張曲江蘇許公杜少陵韓昌黎白香山孟襄陽司空文明歐陽文忠蘇端明諸公行義踔絶粹美無瑕者上下數千載莫可縷指而謂文士悉皆無行如烏之必黔鵠之必白亦敢於厚誣古人矣然則世之操履純備者斷屬之閭閻鄙民而古今明德大賢豈皆椎魯不識一丁者邪即尼父𢎞訓於六籍猶龍垂文於五千要亦不可為不文矣夫要結人譽者恆飾行而祗畏神理者多謹而慎獨惟淫凶恣肆無忌者忽焉道民佩仁義於姬孔修性命於老釋二六時中一念錯忤神聽罔私一事乖違帝鑒有赫伐毛洗髓蕩纍滌滓惟恐不盡夫克己亦大難矣輒自謂無過則吾豈敢而或乃扼而下等之恣肆無忌者又何能受而甘心耶足下謂道民孝友純篤亷介刻厲潁上青浦古稱循吏何以加諸豈有如此人而頽然自放大間也乎道民竊愧此言歎息知我矣道民為令六年上報朝廷下惠黔首毛髮無愛嚬笑不茍即今削籍歸來四壁蕭然八口恆餒而猶怡娛自得嚮道彌虔士勤身苦行若是而猥必加以惡名竊恐違人道之正傷天地之和也道民學道者委命於宿業降心難堪怡然不屑耳若遭遇於未聞道之先以其壯心乘彼寃氣即抉目刎頭擊風飛霜何難焉嗟乎屠某越國男子進不得樹休烈於雲臺退猶可踐大道於霛寶生不得享令聞於竹素死猶可書嘉名於上清大海以東則有梅岑山梅尉隱處阜鄉亭馬秦桃花諸嶺安期脫玉舄東去可問蓬萊紫霞洞近在几席洛伽小白華山磐陀石則大士道場在焉紅蓮開十丈垂海面白足踏之香冉冉生於布襪內地則有四明洞天劉綱丹竈尚在樊榭無恙是皆道民結局處夫含垢忍辱和光埋照學人所保此之不保而尚爾錚鍧闛鞳擊鼓以求亡羊不亦左乎第恐世人不察大聲傳訛令愳罪者憚於修辭不文者藉以藏拙良可惜矣是道民之所為不能已於呶呶者也君不見乎黑雲上升雷雨晦冥過而太空朗如狂颷下擊洪濤洶起過而平波若鏡道民偶為知巳發辭吐氣若此投筆而登蒲團何物不遣何念不空矣若足下執而以荆軻篇疑柴桑翁雄心未盡無乃猶屬皮相乎道民頃以凝神之久實遇異人餌上藥度世大事稍有欛柄眼前得失聚散蠛蠓果螺無足為知已稱説者馮開之散朗是我輩人生平分義皎日靡渝往道民新得罪廟堂不欲以不祥之身為故人纍東歸稍稍引避吾自疏之銷聲滅影開之不得前其蹤迹則爾乃吾兩人金石之義豈有間焉而世人遂疑開之二三取谷風警有位詎不又大寃乎蓋好事之不察往往如此嗟嗟多言數窮以急知已余過矣余行向神明懴之矣答劉子威侍御屠長卿陸表姪至自金昌奉先生尺牘來纍纍千言瑰麗閎肆籠罩百氏提挈隂陽抽關啓鑰椎破神理夫世不可與莊語不佞何幸而得莊語於先生矣又歸美不佞齊物輕外洞覽超然則何敢當雖然亦竊嘗刳心觀化小覷一切虛幻夫溟涬一理混乎真常因形有妄因妄有結大地山河依妄而立胎卵濕化依妄而生於是有生滅起伏得失榮枯是非人我怨親仇恩妄結中之最小者桃蟲食桃壤蟲據壤蛀穿蠧蝕蟻奪蝸爭蜋勇蛙怒蜣摶蛛網朝生暮死營營何為不佞登乎丘墓曠覽平野煙黃日淡牛羊散牧其上蓋嘗有朱門大第歌鐘粉黛焉不佞臨大海望白波連山彌天無岸其下隱隱猶見城郭街衢俯仰而歎剖判以來古人無一人在者令古人而有一人在即吾庶幾有望焉今何望矣古之人自許豪傑負虛憍之氣騁閃之姿殫智畢力規其所圖囊括席卷氣揚意得方且建萬年之策極無窮之歡一朝徂霣稿葉斷蓬雖復取人魚為膏金銀為殉設樂置伎銅臺上食彼白骨何知悲哉愚鬼推而論之玉階金埒茅茨席門金張豪華揚雄寂莫王謝鼎盛任昉凋零淮隂王亞父死陸生貴酈生烹錯也東市袁絲紆朱田蚡開第灌夫伏誅路粹傾融絳灌讒賈孟玖陷陸孫秀仇潘當其時舉皆鋒刃其口轆轤其腸先發者雄後時者凶得則愈快失則悲嗟榮而汰盈瘁而慘沮勝則軒眉吐氣敗則俯首淒涼轉盼之間悉為陳迹東土託意於浮雲西方示教於露電旨哉嗟乎糞蛆之甘糞人則穢之忩蠅之觸紙人則愚之蛆乎蠅乎固不自知知之則勿復為爾而人劻劻勷勷於百年之內力恆恐其不竭而機恆恐其不深所營幾何當其迷時不自知苦瞥焉而悟則向日種種之憂勞焦迫者皆可笑也夢者之得寶也或有所苦也殆不勝其喜懼覺而咄之夢也當其夢時人雖告之夢不信一覺而後知覺舉非實境人生百年亦何以異於未覺之夢乎彼夫呶呶分人我修恩怨欲以快其心意豐其口腹榮其妻孥彼方熟在夢鄉雖呼之其能醒乎嗟余覺矣又安能與彼夫同夢也不佞少有大志慨然欲以文章功業自表見於世文章視其材力不佞材力淺薄既無當作者方出為吏輒捐身忘家冀勉竪尺寸命不其然乃有物敗之夫殷中軍謝太傅其先皆晉室名士繫望蒼生逮其既起一則勳垂竹帛一則名沒蒿萊相距萬里夫較長潔短此兩人之才伯仲耳謝乘驕敝卒立功名殷當徑雄遂取摧廢世人皮相右謝左殷實命不同僕則知之故太公興周伯夷採薇子房佐劉四皓茹芝元侯綰印狂奴垂竿孔明龍驤龎公豹隱法和助梁通明避世乖崕救火圖南栖真丈夫失時則藏得時則駕為龍為蛇各有其時人見列星起版築昴宿奮功曹應侯本亡命平津登牧豕晉公自餓儒狄青始黥徒咸謂其材能自取之不知是亦有命焉古今躬絶代之姿負蓋世之略而時無根柢白首窮巷者豈鮮哉夫神界可探靈蹤可躡素書可讀丹檢可尋故五湖不必霸越赤松不必封矦華陽不必東都九仙不必一品功名富貴二物時來則為之必待二物而後回首回首無時矣不佞勳業為彼夫所敗便當立灰世念撒手煙霞遇境乘流又何顧焉孔明卧龍人亭亭物表彼豈不講於尊生之道者哉乃為先主三顧竭精盡瘁卒夭天年是老父之所以哭龔生也使其不遭三顧終卧隆中含神葆光以了性命度世何難而以彼易此達者惜之即今日以僕為不幸者衆庶之見耳先生玄朗踔絶故宜以賀不以唁僕天性踈淡寡嗜少營然聞之剗物淨根一絲不斷猶屬牽滯僕百慮盡灰能保無一絲不斷乎有不斷則非所以了道而歸真也是僕之所以日夜疚心也若身外空花泡沫何暇計哉先生愛我教我至矣故敢披露裏言請正有道何以規之敬俟後命與董宗伯屠長卿某客嵗薄遊吳興得因伯念令孫通賤姓名門下辱明公開顔推誠與之抵掌談千秋業津津宏奬若以不佞某可與於斯文某自知甚明結髮操不律拈弄家貧少藏書鮮窺岣嶁二酉之祕腹枵如也為文不欲字摹句勦優孟古人好臨鏡寫態隨物布形脫落皮毛鍊養神骨而才不逮心學不充力以故速則傷易長則傷冗鬪藻則浮騁氣則掉鋪文則麗印格則疏流暢之意多沉鬱之思少一時或駕千秋實難近頗自知斯病可得改圖而復以年來壯心頓銷世味行盡形纍既遣名根亦空大道可希清都不遠安事白首雕蟲作王弼墓下生活以斯欲燒筆研兀矣枯禪即名山不收文苑不列何害東阿之不如左元放也右軍之不如許遠遊也休文之不如陶通明也太白之不如司馬子微也亦章章明矣某自潯上一别歸便閉門竿牘不通交遊盡絶環堵蕭冷釡鬵纍虛麥飯菜羮甘心窮約不敢以八口干人自惟上不能努力文章立名身後下不能拾取富貴快意目前第修身寡過以還造化舊物夫石户披裘於斯兩者皆不用也先生以為何如令孫北行掩關人坐不聞不及作一語贈行兹王季夏編修人去便附此為訊長者春秋高矣加餐自愛相望為馳論受戒尹民興弟頃從西林古和尚受少分戒竊以不得於心空為虎鞟耳昔齊桓束牛會盟一時大諸侯逡巡牛耳之下或曰強哉牛也然弦髙用牛十二莫怵秦穆之師桓束一牛何以恇怯諸大國則曰威出於桓無關牛事其後桓公死尸蟲橫縱其肌肉豈鄒魯晉衛之君不如斯蟲之雄強也今以無得之戒伏滔天之情是以弦高之賈牛希葵丘之牲烈中乾之小白攝貪叨之多蟲何為生桓成吾戒霸闕明文海卷二百八
