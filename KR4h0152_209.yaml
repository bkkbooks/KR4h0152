body:
  text: 明文海卷二百九餘姚黃宗羲編書遊覽答王參政論遊覽山水書皇甫濓濓頓首道思足下憶昔公參藩於汴政事之暇時辱枉顧敝廬劇談清話教益良多自辛丑春郭園之别嵗序荐更忽復十載仰念高風可勝嚮往今年春三月始得公去冬書札情篤意勤如奉顔色乃謬以鄙人為可與言者而商及遊覽之事大意謂古人遊迹傳諸後世者多羈旅寄寓之士而仕宦者恆無聞焉惓惓以阮公之蓬池杜髙李之吹臺為説吾竊以為不然古人杖履所臨其迹不泯者亦惟其人之可重言之可傳云爾而顯榮之與漂泊固在所弗論也昔謝靈運為永嘉太守每遇佳山水輒留詠如宵濟漁浦潭旦及富春郭揚帆采石華挂席拾海月人至今誦之嗣為臨川內史初發石頭城而曰遊當羅浮行息必廬霍期入華子岡而曰且申獨往意乘月弄潺湲遂為古今佳話謝玄暉為宣城太守出新林浦向阪橋而曰天際識歸舟雲中辨江樹晚登三山述望京縣而有澄江靜如練之句迄今膾炙人口夫二子分閫專城隼旟熊軾豈羈旅寄寓者而杖履所臨其迹不滅如此矧尤有不為二子者乎公行誼醇雅詞翰兩絶茍振衣一出海內名流望風迎候治具以從願侍几席者當隨地有之不知幾何人公顧憂其被侮見譏糧不繼而樹遭伐何過計之甚也吾自丙戍免歸杜門不出者逾二十年乙已之春遊興偶發漫有河北看山之行聿入王屋陟天壇濯纓濟池造李願之盤谷還經寧邑過山陽訊竹林遺迹迤邐至六真山尋列仙丹竈弭駕共城登蘇門山酌酒嘯臺之巔循嶺而下憩孫登土窟酹邵子安樂窩盤桓旬日興盡而返凡得雜詩暨文若干首吾方自愧荒陋人不足重言不足傳欲毁棄其稿而前巡撫池陽柯公見之乃驚歎以為竒遂鋟梓以相傳吾欲掩其醜而不可得矣屬者復擬出遊將東登泰山躡日觀坐待雞鳴眺日出之景下上山阪觀秦松漢柏及古帝王封禪處停驂曲阜謁闕里廟覽夫子所植檜問陋巷舞雩所在西遊嵩山跨盧鴻巖逍遙箕山之陽因弔許由冢云乂欲南遊武當諸宫觀玉芝瑶草行或見之便道趨隆中訪諸葛氏草廬舊址而後歸此區區之夙志也束裝戒發客有沮吾遊者曰古之高賢真逸如陶淵明尚矣然其興之所寄不越乎曰園籬落之間松菊桑麻之畔而已曾未聞其離家而遠遊子足迹半天下名山秀水探歷已多勝覽竒遊篇章已富今以遲暮之年而行役靡息似非逸老攝生之道也吾聞其言異之諦觀其意亦愛我者也乃詰之曰泛覽周王傳流觀山海圖非柴桑翁之詩乎其遠遊之志已略見於此既窈窕以尋壑亦﨑嶇而經丘非柴桑翁之詩乎而以遨以遊亦翁之所不廢也想其遭時多故日抱隱憂故托諸酒以自晦夫何暇於遠遊吾生際昌期心無他慮得以肆志遊覽焉能匏繫一室以自稿乎吾既以是答客而併以告公懼或有沮公之行者而以是曉之耳遠遊之事公請勿疑門庭一出景星是瞻題詠一留紙價踴貴夫何羡於蓬池之阮吹臺之杜髙李乎抑聞武夷九曲為天下第六洞天飛泉疊嶂澄徹心骨實昔賢栖遁之地公家溫陵去此為甚邇安得偕公往遊其間聨榻紫陽書院夷猶數日面訂昨所諭聖門狂簡之學不特覽山水之竒變縱目於風塵埃壒之表而已公寧無意於兹遊乎於乎人生斯世合志者希講學論文天壤至樂如朱張南嶽之遊伯恭寒泉之會較諸蓬池吹臺之迹其遠近大小何如也伏冀俯鑒同心裁度期約則千里盍簮之朋百年麗澤之益不在古人而在吾輩矣豈非逸民之孤蹤斯文之雅集哉飛鴻南來佇聽嗣音附王參政書昔年汴上宦遊無他所得惟幸與公相見因屢欵高論揚榷於風騷之場此為有得耳嶺外中州相去甚遠無由與公相聞惓惓之意想彼此不異也居間或追數舊厯事迹輒有感歎蓬池之上阮公長嘯杜甫與高適李白同登吹臺悲歌酣謔皆傳為後人美談久而不泯吾雖遊汴豈復能使其迹有記於其後耶然諸君子之在當時皆羈旅寄寓之士其迹為竒吾方擁旄傳從事於文法體勢之間勢固不能為竒如高適持節彭門今人亦不復道説而瀼西夔門獨言杜甫顯榮之與漂泊其得失固如此吾今已廢宜可以為竒方圖自計已悔少日所作而仰希聖門狂簡之學果其遠出又不能為竒且將被逐見譏糧不繼而樹遭伐矣以此疑而未決敢舉以似公夫往者既失之而今又度未可得幸有以釋其疑而決其計也數年不通書今始通音問又不作寒溫語而獨質以吾所疑者蓋望公之至請勿忘見答也願言之懷殊不一一遊記二篇聊往請教嘉靖戊申冬十一月朔日慎中頓首拜與荆川太史約修蘭亭舊社書陳鶴鶴不學繫趾戎伍間飛馳五載形既凋悴心亦忡悶血氣不周病就床褥手足拘攣進退失節綿延數嵗漸成廢徒官司知其故以為不復可用遂容休放鶴固狼類野心尚存少得頃刻蘇縱即便跳梁自得情志既舒疾患遂解自此結茆於寶林山中買書三千卷旦夕玩誦考德於周孔取學於顔孟綜莊韓之辨論究馬班之文辭以詩賦為陶性以摹寫為適情奮力三年藐無寸取是固聰明虧蔽而亦窮陬寡見所致也故乃拂衣西渡厯覽周遊弔吳楚之故墟訪齊晉之遺霸聆絃歌於東魯觀兵仗於北燕中躡泰嶽南陟衡山廣泛洞庭之舟幽引武夷之杖於是賢豪接履通人締交石室之徒立門而問道竹林之士攀車以贈言凡入於耳者則得之於心遇於目者則感之於思乃自摛文賦詩陋東漢之萎謝黜南齊之妖妍始知昔之所學猶觀天井中未能識星漢之文今若駕雲驂鸞翺翔於扶桑之上窮太陽之窟豈不快哉昔嘗入毗陵覔故籍城郭依然宗族星散千里孤蹤泫焉出涕既乃採風俗問人物則知有足下然足下之才固李何之同驅其所著作實鄭孫之逆轡求其承聲合調一口同心之侣則惟王道思陳約之三四君子而已初振雄麗近就平雅諌惡必抽其性元養情必引其道本題物則比贈人以興鮮意外之詭辭無語中之方習誠為片言萬乘一字千金者也文運既還豪傑應響而起者百有餘人皆能承六藝之旨萃一家之言但務廣者則遺其玄建格者則忘其意擇精者則陷於微取音者則近於激然四者皆過焉至有甚者綴綺言以奉其名張怪詞以惑其俗附青雲以假其能恃黃金以貨其學是皆近世之陋弊誠上古之衰音也人皆重之鶴獨恥焉然鶴之文詞亦不甚佳不敢望四子之高風叶王陳之雅調和足下之希聲者但句字之中僅惟可以免四者之過格至甚者之恥耳今四子已奄忽地下約之近死於官惟足下與道思又皆遭朝嫉罷免田里造化忌物不言可知也日月易邁人生若浮精華漸衰歡娛難永文章固身後之名杯酒實眼前之樂吾越蘭亭諸賢惟明此理乃能高蹈一時風流百世惜乎咏歌左右而亭宇榛蕪足下才冠漢魏興翼晉唐何惜片帆渡海僑趾於蘭渚之上與鶴訂事圖起頽敗重濬曲水之流再栽茂林之竹繼風雅於上代盡逍遙於此生也他復何求哉誠能停觴一呼而吳越良類則和聲而至止者可得數十人次者亦可得百餘千年竒會一旦復新且以山川孕靈人物世出盛時佳賞恐亦無遜於晉耳鶴性清虛好道足下簡靜知時臭味一揆出處同理千里相求豈容他適望足下默窺性命之關通今昔之故究毁譽之情達欣戚之變惟求樗散為遂性不以江河之遠限其蹤惟審取尚為合德不以菲薄之儔怠其心早駕仙驂速謀勝果是足下之高事鶴之所甚幸也外小集近作呈侍者可否已未秋日與鄉中知舊書胡松僕四月入關匆匆履任從人歸遽草草報謝每念闕如比來分守關西理在涇滸涇平涼屬也平涼之外為鳯翔皆𨽻斯道前此分守大夫多駐隴隴則鳯翔屬也然多是少參已乃定著大參云鳯翔府故駐有分巡僉憲而隴又僻阻一隅矧鳯一府而駐兩使者於官便矣如地方何於是撫察大吏議令守道駐平涼藩參臬使兩地相望便彈壓甚當然平涼有親王一郡王一十七將軍中尉而下無慮數百十城中除府衛縣諸治所若行太僕苑馬一寺洎察院藩臬諸行臺館舍則盡皆朱門紅壁寡居民又多不法難盡詰每使者行部出入將軍而下輒羣來見或載榼郊迓便須駐車酬答甚出牒袖中紛來請祿祿又難即繼或告詰他事率多誣又不出聽理法當捕其從人則往往保藏避匿法常為骫前守慮損威重議徙涇涇介豳涼間崎嶇小郡地瘠而民貧本非守臣駐地為避平涼徙而理之此則甲寅嵗春事也涇雖荒落陋瘠然所過而安所部平涼鳯翔則皆古賢聖豪傑誕育經營之地固平生之所寤寐快覩者遇行部必迂途往觀用以激昂砥礪試為諸君誦焉方自靈寶出函谷望潼關見黃河迢迢從西北來切抱關麓而太華三峰高矗東南厯厯如畫乃賈生所謂踐華為城因河為池者今猶宛然真稱天地之險使秦漢唐隋稍能布張政教用維其人豈有踣與亡哉自關行六十里至華隂縣縣正直太華西嶽廟在縣中宏壯不可言會任期已迫未及登少須乘間當為留數日賦以寄覽乂六十里至華州遙睇驪山諸阜信若培塿兒孫然又五十里至渭南渭源出鞏昌之鳥鼠同穴山迤邐而東行可千餘里合汧湋鎬戲漆沮滻灞灃潏涇汭諸水西至於華入河而斯邑適在其南故邑因以名又八十里至臨潼所謂華清繡嶺僅存其名茫茫惟土至驪山亦不甚髙惟溫泉如昨然當年繁華侈盛俱隨浮雲流水散矣為題古今殷鑒四大字於驪阜而去自是正西而行則新豐鴻門灞橋皆在所厯過橋不三十里入長安履任經長樂里登西南城望終南諸山高入雲表張屏列障儼如罨畫橫帶會城周際而山之下周方數百里多秦漢故渠膏塍沃壤古所稱天府陸海殆謂斯域外此則或相倍蓰什伯甚至無算凡昔所習稱未央長樂諸宫上林樂遊諸苑與昆明曲江棘門細栁雲陽豐鎬杜陵韋曲樊川御宿歷歷皆在目睫指顧之前憶唐人所云宫中下見南山盡者真實語也非躬歷不知其妙四月念日出長樂赴涇原路當西出咸陽為欲至終南遊所謂祖菴樓觀者乃東出長安門遙望鄠縣行可七十里鄠古崇侯虎國也後文王奉天伐之作豐邑路皆廣原平陸中有渠通長安渠上垂楊夾峙參天合抱長亦五六十里不斷人行樹底殆不知有夏出鄠縣里許為渼陂上為紫閣峰峰下陂水澄湛環抱山麓方廣可數里中有芙蕖鳬雁之勝而魚更美杜子美所云半陂以南純浸山者也恨不得岑參王維少陵其人載酒從之遊又四十里至祖菴元王重陽道場也有石刻遺像與其手書書亦飛動竒譎又一十里至樓觀觀蓋老子與關令尹喜傳道處也上有説經臺臺在終南山腰松阡石徑迤邐而上最上有洞可容數十百人非惟西北所無殆非人境又二十里至盩厔盩厔形勝膏沃與鄠埒而長楊五柞舊宫皆在其境乂七十里至武功武功古邰國后稷舊封禹貢所載惇物若秦嶺藍關與子午谷諸勝皆在東南睇望中又數里輿人遙指馬嵬坡會日欲暮不能往然問俗所傳土皆成粉非實事憶哲婦傾城之詠為歎息久之又七十里至乾州乾於唐稱奉天從此地漸高寒有邊鄙意出乾西北數里經乾陵則天葬處也所遺石翁仲人物雜卧土石草樹間甚巨且衆則當其盛時雄麗可想然行道之人語及盜掘亦多詢而羞之真稱遺臭豈若昭陵壞土漫然九嵕山下之有耿光耶從此過永壽縣至邠州邠本稱豳玄宗開元間因恤岐周府兵幸其地以豳近幽字改今名稱至今入其境則陶穴纍纍如見公劉時人而所云凌隂室履迹埤與其隘巷種種故在北望甘泉林光諸故址炯焉未滅而甘泉則黃帝祭天雍畤萬靈明廷處也西行百八十里至涇州涇以涇得名水切城麓詩大雅所謂密人不共侵阮徂共者皆其境內共即土人所稱共池是也回中山在其城北一里許其下為涇河汭水從西來屬經城東南流數百里東至於華隂合渭而汭之源則出隴州城北弦蒲藪詩言芮鞠之即是也蓋關中山最多而水亦無慮數十其最大者為黃河次則涇若渭其旁諸水數十則皆隨在入涇渭從涇西行百四十里至平涼平涼於春秋為朝那漢析置安定郡故又稱安定渾瑊會盟壇在其城西北五里今惟名存西行可三十里至崆洞山問道宫在焉志稱黃帝問道廣成子於斯山而山尚際天峰巒聳拔信是仙靈之宅又西七十里而羡過蕭關漢文帝時胸奴入蕭關燒回中宫即其處然宫址莽不可辨矣又八十里至固原原即詩所云薄伐玁狁至於太原者本是侯服然地近北邊風氣高冽八月中雨雪者再秦文王所為詛楚於朝那湫者在焉然有二一在州東二十里一在州西三十里水各方數十里深不可測傳有蛟龍藏其中人莫之敢狎然厯世滋邈忘其本名土人但稱東西海子云而西海子水流百數十里經隆德靜寧兩界即好水川也宋與夏人大戰場在焉東望環慶延安境相銜接追憶韓范經營殫勞心力然卒罔底績豈自古豪傑功業之成亦藉天幸與國運耶乃若平涼東北百六十里則為鎮原縣漢潛夫王符之鄉也符才足用世而限於衰季嬖幸塞塗弗克行其志今讀其書甚可痛金大定間州守种某嘗作思潛亭於其書臺舊址然久廢而土人莫之知余為立石其處章表之此皆平涼東西北境也率以防秋之役行視焉又夏日出按鳯翔則由涇東南行百餘里至靈臺靈臺之名雖古然非詩所歌詠特以文王為西伯征密須嘗過其境後人神明其地築臺以識遂名至今古左丘明晉皇甫謐隋牛𢎞唐牛僧孺實生其壤今其祠墓宅墅巍然而存又東南百里至麟遊縣縣南五里九成宮故址在焉祗存歐陽詢書記一石而字多剝落不可讀所謂十二層樓閬苑西者惟翠巘丹梯尚無恙爾然古木丫槎半無枝葉欹斜偃側巖壑無光矣又南八十里至鳯翔鳯翔秦故都也秦雖起西戎有非子者為周孝王主馬於汧渭之間馬大蕃息封為附庸邑之秦使續嬴氏之祀故今城中有穆公與三良墓余行過之則嗤彼繆之謬而重興黃鳥之哀焉登城以望見岐及梁山奠其東北岍與吳山亘其西南襟帶環合居然一大都會雖其雄偉廣博差謝長安而聲音禮樂殆踰他郡又城東門外有東湖即大旱不涸花木水竹之勝舟楫壺觴之適無讓江鄉而凌虛臺喜雨亭址在其北陬今則復為荒煙野草如蘇長公之臺記語矣從鳯翔西行七十里為汧陽汧於漢屬隃麋縣耿況嘗封於其邑又有唐人段太尉秀實祠汧蓋其鄉也又西七十里為隴州而吳山在其東南七十里號西鎮然在周職方則稱嶽李義山所稱吳嶽曉光連翠巘者是也巖石聳峭林木秀阻九峰離立如笋拔地而舊志第稱為五峰余為數之實有九數已刻其説於巖壁豈帝命巨靈雕刻鑿削特示工巧其勝乃若是耶又東南百餘里為寶雞大散關在其西南數十里路通褒斜宋與金人百戰爭得之而石鼓山在縣南二十里陳倉山距縣東南祗十餘里志載山上有石類山雞晨鳴山頭則聲聞數十里而縣因以名縣南十五里有曰蓋門山者所從入蜀道也棧閣蓋實自兹始縣東南八十里為磻溪溪流注渭旁有石室傳為太公所為避紂地東坡為鳯翔僉書判官時夜遊焉詩言夜入磻溪如入硤照人炬火落驚猿蓋實録也而穆公女弄玉鳯女臺元真人丘處機清鳯臺皆在縣東南六十里外至張三丰菴則在縣東三里焉志稱三丰洪武癸酉秋七月念日自言當逝留頌以别邑人楊軌山等為置棺斂比葬發視之三丰復生後入蜀見蜀王入武當山或遊襄鄧間永樂中嘗遣使尋訪竟不遇為宫以待之余他日遊武當親見成祖所為招三丰手書當不妄去寶雞東南行數十里為岐山縣縣西北十五里為岐山中有周公召公太公三廟巍然並峙而岐山之南數里而近則為郿太白山峙其東所謂和尚原五丈原斜谷關者則分峙其西誦出師未捷身先死之句為之淚下若東南五十里則有橫渠先生祠其北二十里為郿塢漢董卓所為貯金積穀徼覬富貴無窮者夫張祠董塢地相距甚邇而使人貴賤愛惡至與天地懸隔若此然則吾人百年易盡之身其惡可不遹修厥德也歟又東為扶風漢畿輔地其人則馬援傅毅馬融諸子望於其鄉又東則醴泉咸陽雖非余所守然往來會城必道焉咸陽故阿房宫址褰帷四顧但見蒼蒼雲木離離禾黍滮滮泉流彌漫遠近爾又北行以望周文武諸陵若漢高長陵祗遺數大阜近道側其餘環長陵者以百數纍纍錯落率如屋如鍾如釡如囷如廪如積不知其為后歟王歟將歟相歟公歟侯歟祗增歎息彼貪且懵者可以悟而省矣凡此特就僕經見與世所習聞史傳載籍著明可證據者言之爾其不經見若僻隱散漫不大聞於世者要之不可勝數遠道垂囊無可持贈贈君斯紀奉供卧遊若夫飄泊離索之懷世故人情之賾與風謡習俗嗜尚之異齊欲一而紀之則須伐南山之竹矣言不盡意亮之幸甚重與獻吉書徐禎卿僕以攝提格之嵗仲春南徂出齊魯之郊經淮沛之墟直視平原蕭條千里於時雉雊於野麥秀油油瞻日月之勤感東山之歎雖窅眇傷神未足以振心而惕慮也既而道指東吳倣徨故都棲棲焉若仲尼之去魯也乃遵錢唐薄眺會稽控湖山以為郭環江海以為池昔日神宫嶢闕椒房綺榭之餘或巋然於魯甸徒髣佛於丘夷顧瞻周道不能不為之興哀也傍引桐江之溪遡洄富春之渚豈惟望風而思其人抑可以樂焉而終其身矣又西南行渡縠水陟常山越餘干沿弋陽山溪澗沚之濵玉水澄徹則有參差之毛丹碧之石遊鯈翔泳白鳥棲止可以瑩神而悅心也橫涉彭蠡仰瞻廬嶽其波濤則騰涌奔伏噴薄日月其峰崿則盤回峭絶亘接霄漢香爐五老之形瀑布青峽之觀特為卓詭靈芝異草彌山布谷金符玉册窮幽極玄信赤霄之神都老氏之玄宫也又西遡九江南望全楚夫其扼巴蜀之喉舌據吳會之上流通五嶺之門户接雍梁之要樞此其大勢也若乃鎮以衡陽之阜表以武當之山五峰森拔三門凌啓雲霞絢繪紫氣燭耀其中四候蚤暮七曜運行往往與人間殊别爰有黃金之堂白玉之戺琉璃為鋪檀桂為柱制侔天居勢轢海嶽目所希見窈窕難説乂有江漢之波沅湘之流洞庭之湖雲夢之澤千條萬𣲖混原同塗縱貫脈理經帶其間極望浩漫際天薄海陽春獻而百草芳涼風至而蒹葭落猿子噭嘯鴻雁成羣魚龍倐忽暘晦互分可以觀天地之變化驗時序之榮悴也故徵水族之饒萃材木之珍論舟楫之利及畋漁之樂九州之內未有踰於此者也然其民俗苦瘠尚利薄義户無囷廪之食人無相固之心雜以山夷輕躁易動非久安長治之國也又其山川包絡四要固用武之場聚爭之地也故東望樊口則慕周瑜之雄西顧峴山則感叔子之惠載觀荆門則悲昭烈之績極眺中原則痛武穆之忠山河昔是人物已非心傷歎矣悽其漣如嗟乎死生命也理亂時也命有涘而志無涯時可遘而身不逮此屈原所以流亡於江夏賈誼所以憂傷於長沙者也所賴賢豪發憤映帶礪以垂名章縫樂道假竹帛以昭志生人之業庶為不朽耳僕自維無卓犖之材寡礪鍔之用進不能揚眉於天下退不能甘心於一壑徒放情於江海之間抗志於宇宙之表將以搜竒獵祕咀華納靈則水土而函藴法景曜以摛文聊希子長之風庶幾虞卿之志乃知于役之云豫兹遊之豈徒哉惟是足下與吾同懷遭時齟齬良圖弗遂抱膝空林之中棲神窮迹之境雖搶榆之為樂固知大鵬之逍遙也故聊述其略以當抵掌方有簿牒不盡所言滇雲紀勝書顧養謙足下書來問滇中竒勝知足下興復不淺僕自去年七月入滇迄今未有寧日它道乏人輒以僕攝之以故得從兩御史行縣頗歷其勝大都峯巒巖洞湖海林泉寺宇樓觀不可勝數而省會則有滇海滇海者昆池也在吾鄉直一湖耳可當八寶射陽滇人稱水所滙無論大小皆曰海而地稍下即無水亦曰乾海長草即曰草海滇之西曰太華山山有太華寺黔寧王祠堂在焉富麗可當京師西山之一樓曰一碧萬頃者面海以為勝當不遜治平石湖太華之北可七里即所謂碧雞山者上有碧雞關則自省而西適威楚之要路也自太華稍西南行山腰鳥道五里許得羅漢寺寺在絶壁下其上有石似羅漢倚縣崖故以名寺舊有南北庵玉皇閣據山險絶攀危磴而上者凡九層層可十丈輒有殿宇石欄可憩息焉自玉皇閣而下至第六層經北庵庵廢今為彌勒殿新搆三大字則顧生筆也又為大書白雲深處扁兩楹間從彌勒取道經大殿稍西南上數層是為南庵南庵者正德間趙道人修道處也道人殁之日而安寧張中丞生中丞生時其父蓋嘗見道人直入其內云中丞名素亦當時人傑也又南有廳有亭並下臨滇海若登惠山絶頂望太湖其背皆削壁削壁上則所謂玉皇九層者也玉皇閣而上不可登矣其上有龍湫一黑龍居之每欲雨雲屬其巔若爐煙燭天經日不散土人嘗見其往來而僕亦曽見其一挂滇海云彌勒殿者其上蓋直龍湫偶二月中與華文為太華之遊凡兩日故能談其概其明日謀泛滇海乃假沭氏舟放乎中流集魚舟十數隨行而漁俄而風急不可前易漁舟而前復不可乃聼其漂搖而還海勢不足畏而風力勝差足當揚子渡耳乃若花事之勝此中原所未有山茶花在會城者以沭氏西園為最西園有樓名簇錦茶花四面簇之凡數十樹樹可三丈花簇其上樹以萬計紫者朱者紅者紅白兼者映日如錦落英鋪地如坐錦裀此一竒也僕嘗以花時登簇錦酌之有十丈錦屏開緑野兩行紅粉擁朱樓之句及登太華則山茶數十樹羅殿前樹愈髙花愈繁色色可念不數西園矣梨花則處處有之或擁山巔或列山腳或滿山村望之如濤如雪僕自曲靖還省時有乍疑洱海濤初起忽憶蒼山雪未消之句其它若海源洞黑龍潭進耳寺諸處各有所長然尚未遍不可懸談而諸花之勝率非中原所有惟不覩玉蘭耳自省會東南行四十里曰呈貢縣又八十里曰晉寧州皆在滇海東畔行者山光海色或有或無又九十里至江川縣縣無城四山環列一水繞而南南則大湖曰江川海江川海出大頭魚魚頭大如鰱而鯉身以白酒煮之肥美不數槎頭鯿也自江川而南緣山腳並海行五里許得海門橋橋當兩山間兩山豁而江川水流其中可數里達澄江海澄江海視江川益深遠綿眇矣小舟自江川達澄江可百數十里而造舟者拙舟人亦拙春夏又西風急甚不可渡僕業命縣官艤舟而從行者愳遂不果然私念二海可名聨珠湖耳自海門橋而南七十里有竒至通海縣半緣山並海行嘗有喜見海之詩曰滇南好行役五月雨蕭蕭不道千峰裡仍看一水遙波喧石崖鋪山豁海門橋忽動乘槎意輕帆向泬寥通海縣隔一大山别有通海海通海海亦出大頭魚而差小味亦不逮江川海在縣北南則秀山山視諸山獨秀故名登秀山可三里許路寬平曲折而上至巔有寺寺視太華北向望海亦一竒觀也自通海南行七十里至曲江驛並度大嶺滇人謂之坡殊險仄不安將至曲江穿石洞可半里出則又走石巖下三四里而後落平沙沙地平曠可數里輿人大步行良快一水屈曲流沙中則所謂曲江者也而水漲時所行沙地者皆江度以方舟深不可測矣曲江南七十里至臨安府路稍平衍而無水人民殷富人文亦盛自省會而下稱第一然地熱熱不減中原視滇中若别一宇宙其南行二日抵河下河下熱愈甚甚於閩廣有荔枝四月熟熟輒傳市臨安易海巴甚賤臨安亦有荔枝五月熟然無多亦賤其色不殊閩廣其味差足當閩廣最下品若在閩廣不之食矣而諸公其心以為竒僕亦以為竒今古人情何可與談真假哉臨安城東三十里曰巖洞洞凡三一曰萬象洞一曰乾洞巖洞其一而總名之也洞中形狀竒幻以千萬倉卒不可名狀讀足下所為金陵諸遊及張公善卷諸記大都可想耳它日當别有記河下渡河謂之交岡武嚴威據其地自為國其南則交趾矣自臨安還厯諸處抵江川以從者憚舟行取道萬山間時時並海走百二十里抵澄江府府在平地萬山四合一水繞田田甚沃其南則澄江海也海魚大者青鯉小者蜣蜋並佳城東北各數里許鳯翔華臧兩寺皆勝自澄江而西百二十里抵省會矣當攝兵臨安時所厯蓋如此然特其槩也由省會適威楚經碧雞關七十里至安寧州州正北可十里有溫泉泉深沒人胸清徹不留一滓其下皆碧石或五采磷磷可拾也泉所出處有巨石如車輪碧色可愛相傳蓋碧玉也一巨屋蓋之名曰官塘塘可半畝碧玉居其中水沒其上尺許浴者輒浮水坐碧玉上以為快僕亦曾乘興浮水坐碧玉浴移時而起起覺百病去體矣若所謂點蒼洱海者尚西在大理大理屬瀾滄道即華文所轄也去威楚四日以非所部不得往昨華丈行而瀾滄道又以屬僕僕又且行遊洱海點蒼之間一拾其竒矣俟别有述以報大都南滇中四時皆春冬不綿而夏可夾六月雨則夜輒擁綿以故遨遊山水間較和暢快意在花木有生而無殺培養厚而氣淫故時異耳足下以為然否寄去酒資可為我沽吳家三白讀去書遇勝即浮大白賞之賞之不可無原荆諸丈又不可不念顧生顧生當登臨快意時蓋未嘗不念兩生矣明文海卷二百九
