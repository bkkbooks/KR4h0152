body:
  text: 明文海卷二百十餘姚黄宗羲編序一小四書序朱升上章困敦愚赴紫陽書會與朋友商確為齊生定讀書次序首蛟峯䝉求凡將者急就之傳也名物者小學之先也次勿齋字訓性理學問天人之道治教之原也次陳先生歴代䝉求使知古今朝代之略次黃成性之學提要使知傳統事迹之詳此四書者四字成言童幼所便精熟融會宇宙在胸中矣然後循序乎六經之學歸趣乎孔孟之教究極乎濂洛之説休日則事筆札而考蒼雅餘力則記名數而誦詩文庶幾入門適道有序有條本末兼備終始相成者矣夫讀書不可無註解然註解與本文相離學者若不能以意相附則非徒無益而適滋其惑故愚於諸經書往往與之旁註使學者但讀本文而覽其旁註一過則了然無繁複之勞也今此小四書者語約而事意多故旁註不足則又表註於闌上使教者有所據依而學者易於記憶此區區之至意也既脱稿刻之齋會題曰小四書以别晦菴四書云刑統賦解序朱升魏文侯師李悝者法經六篇曰盜法曰賊法曰囚法曰捕法曰雜法曰具法衛鞅受之以相秦改法為律漢相蕭何增户興廏三篇為九章之律叔孫通益所不及為十八篇武帝作見縱監臨部主之法魏命陳羣等增損漢制為十八篇晉命賈充等增損漢魏為二十篇南北兩朝沿革不一唐因隋制令房𤣥齡等斟酌損益為十二篇髙宗永徽中長孫無忌等復增疏義名例第一魏因漢舊改其律為刑名第一晉賈充等於刑名中分為法例律宋齊梁及後魏因之北齊并刑名法例為名例後周復為刑名隋因北齊復為名例唐因之衛禁第二秦漢及魏未有此名賈充等酌漢魏之律隨事增損創制此篇名宫禁律宋至北齊以闗𦂳律附之更名禁衛隋開皇改為衛禁唐因之職制第三起自晉名違制律隋開皇改為職制唐因之户婚第四漢承魏秦之後創加户律北齊以婚事附之名婚户律隋以户在婚前改為户婚唐因之廐庫第五漢制九章創加廐事晉以牧事合之名廐牧律隋開皇以庫事附之更名廐庫唐因之擅興第六漢制興律魏以擅事附之名為擅興賊盜第七李悝法經有賊法盜法自秦漢至後魏皆名盜律賊律北齊合為賊盜律隋唐因之鬬訟第八自秦至晉未有此名後魏分前魏繫訊律為鬬律至北齊以訟事附之名鬬訟律後世因之詐偽第九魏分賊盜為之歴代因之雜律第十李悝法經有雜法後世祖襲為雜律捕亡十一李悝法經有捕法後魏更名捕亡迄唐因之斷獄十二起自曹魏分李悝法經囚法而出此篇後世因之以上唐律十二篇周世宗時詔詳定之號大周刑統二十二卷宋太祖朝竇儀等修定刑統為三十卷至時律學博士傅林取其綱要撰刑統賦後世註解此賦雖多或贅或略未免疎謬今訂定之至元後三年嵗在丁丑二月上澣新安朱升題墨莊率意録序朱升墨莊主人朱升平日事師交友讀書聽語下至里巷山野樵漁婦女一言一事於人有補者莫不謹服而愽取之既又虞積之多時之久聰明退而忘之也遂筆録之其為録也不起藁不擇詞不先經後史不外子内儒得於尊者不敢攘其説聞於賤者不敢匿其名不務簡古他日可以刪不厭煩碎他日可以考故名其録曰率意是録也下及庖饌工巧之瑣末髙人所不屑觀上及道徳性命之緒餘俗士所不得與下於我者既不敢預此上於我者又不屑此則是録也直以率吾意而已雖然知我意者以為備遺忘不知者曰腐儒之陋也人之所通擯也至治二年龍集壬戌三月望日序類選五言小詩序朱升𤣥黓攝提格夏暑異甚僕居山閣目益昏不得徧讀素習乃取五言四句古詩迄於晚唐得三百餘首類推之以授羣童為類凡三十有八一曰直致詩以此為忌而亦以此為難序情冩景而無事乎排比紐捻盤摺組繪之工所謂浄洗脚面而鬬好者也二曰情義倫紀者民之彛也三曰工緻詩老所獨繼響寡聞焉四曰清新則亦不易得者也自是而下曰髙逺曰富麗曰豔冶曰凄凉曰衰暮由所接不同曰曠逺曰豪放曰俊逸曰清潤曰沉着則又繫乎其人矣邊塞也宫閨也客旅也發乎其情有非常者是以離别悲愁思鄉感舊之作出焉至於懐想寄贈則盡乎人慨歎消遣則盡乎已諷諫而不訐頌美而不諛嘲戯而不謔皆所謂民之性而先王之澤者此外有懐古詠史之吟景物風土之述時事之紀與夫樂府之舊章風人之古體或有設為問答者或以一句兩句之佳而傳者以至女流靈異之作亦附見焉先儒謂人聲之精者為言言之精者為文而又有曰文之精者為詩夫自三百篇之後變而為詞賦又變而為歌行長律流衍極矣則五言絶句者詩之尤精者乎才多者斂束於此固汗血千里之折旋蟻封也始學者之從事於此非江源之濫觴乎鄉先生曹公教人下筆之初以字少語直為事其言曰直説則意易見字少則病不多僕編小詩以直致之體先之實本乎此夫泉之始逹直流而已其出漸逺衆流合焉磯而激風而波盛大流行而千態萬狀非泉之固欲如是也始學者識之楓林病叟朱升題於齊明閣讀貨殖傳趙汸貨殖傳當與平準書㕘看平準書是譏人臣横斂以佐人主之欲貨殖傳是譏人主好貨使四方皆變其舊俗趨利書首言漢興接秦之弊髙祖重本抑末輕徭薄賦故文景之世國家無事百姓給足府庫充實人人自愛而重犯法後面序武帝事節節與前相反至賛論始推唐虞三代以來而舉戰國秦皇功利之禍為證則武帝不能法祖宗之仁厚而蹈始皇之覆轍不待譏議而可見學者先讀此賛而後讀其書使先後相承則太史公之意瞭然矣若貨殖傳乃書之注脚而未有察其意者盖傳中所謂當世賢人即書中所斥不軌逐利之民也傳中所序陶朱公白圭輩妙於治生即書中三人言利事析秋毫之比也傳言鄙人牧長窮鄉寡婦禮抗萬乗名顯天下宣曲任氏以田畜髙而人主重之即書中言卜式以家財助縣官天子尊顯之以風百姓意尤著矣盖見始皇武帝皆以好大喜功國用不足而後眷眷於此等人也傳中歴舉四方百貨所出行賈所在甚詳即書中置大農諸官盡籠天下之利貴賣賤買所以天子無筭之用皆出於此傳中言千乗之侯尚猶患貧即書中屢言税賦竭縣官大空是也傳中言廊廟巖穴軍士任俠攻剽女姬游間吏士等皆為財利所以深誚當世好貨之俗無貴賤也末言富者必以竒勝而乂歴數奸事惡業賤行辱處之能致富即書中所謂不益賦而天下用饒亦此類矣循此傳之意深陋為天下國家者不當下行商賈之事盖是當時親覩言利之人悞國害民如封禪書中所謂究觀方士祠官之意云者故言之深切至此後人但謂子長䧟於刑法無財可贖故發憤作貨殖傳豈為知太史哉雖然遷之言亦激矣予獨謂其書明白諄復如是千百年來讀者猶未能深悉其意况夫六藝之古逺淵奥而傳注家自謂盡得經㫖可乎題羅鄂州小集目録後趙汸右鄉先逹宋朝奉郎權發遣鄂州軍州事羅公文五卷權通判鄂州軍州事臨江劉公清之所編次公與劉公同官于鄂公既卒官劉公因以是編刻置郡齋於公平生所著不能十一故題曰小集其蔵於家者餘五十卷不幸一再傳而中絶遂俱亡矣惟新安志爾雅翼二書吾郡嘗刻諸梓此小集者郡人亦嘗再刻之故家有其書兵火後板本既弗存三書皆不易得矣汸避地還蔵書多散失求小集於友人又得鄉先生陳公櫟所傳本而正其疑謬顧二家本皆前缺篇目乃為録如上宋南渡後士大夫經術政理無愧東都惟文辭若與世俱降者雖能言之士㕘立角出各名一家髙文大册照耀先後而慶厯元祐之風軌邈不可追矣公之為學自三代制作名物帝王經世之迹古今治忽之變下逮草木蟲魚之隐賾博考精思靡不淹貫起歐陽王曾氏上接秦漢求其合作而斟酌劑量之故其為文質厚中正而節度謹嚴本人倫該物理闗世教而未有無所為而為者使天假之年恢廓光大見諸設施議論風㫖自本朝而逹天下則韓歐諸子所以彌綸昭代者赫然復見於當時夫豈至於散落僅存如今所傳而已然則劉公既深哀之而朱子每見其文輙推讓之比聞其即世而歎惜之者其不以斯歟公早嵗嘗以蔭授京官矣考滿歸即請祠既第進士得縣矣復請祠越五載廼起倅贑州既滿歸又七年乃得郡其於進退取舍之際如此志之所存何可量也而天固嗇之則當世君子所以重為公惜者豈惟以其文哉雖然公之於文則有道矣公嘗論儒者之學去已之私以盡其所受之分以施於上下親踈之際前聖有作大經大法皆具今之學者亦求合於彼而已其有不合者積思以通之汰去浮游散越之念而日就親切忽不自知其合矣嗚呼昔之以文名家者盖未及此也以公學於古人而反求諸已者類得其要如此於文辭其有不合乎讀公之文者試以此言思之公諱願字端良號存齋劉公字子澄後鄂州卒一百八十一年甲午嵗十一月日南至趙汸書跋謝翶冬青樹引後趙汸予為兒童時嘗見文字一篇記嘉木揚喇勒智發宋陵將建塔錢塘舊大内越中有義士夜募諸少年别求遺骸盡易其所暴露者後雖取去與牛馬骨雜瘞塔中意非真龍所蜕矣其義士與作傳人皆不著名氏自馬相而下題其後者十數公亦隐其名所叙述却甚詳且言是夕事幾覺有踰垣折足者然予後遊錢塘問於父老乃無人能言其事或云是塔凡三經雷震最後乃焚其金裹浮圖央之若瓠壺者使皆無名氏遺骼何以能動天如此予無以應之張孟兼所注謝臯羽為唐珏玉潜作冬青樹引盖是暗記此事向所聞義士者豈即珏耶然注中或言是玉修竹又何人也此大竒事非季布劇孟之徒不能辦數十年間豈無族人子孫能言其事者乎孟兼更博訪好事君子儻得其實宜詳注謝詩以傳儻能一過越中訪問南山陲求得植冬青故處封域而表掲之且記其事於郡乗又一大竒事也毋徒曰疑以傳疑而已跋東坡尺牘後趙汸宋禮部尚書贈太師東坡蘇公忠義貫日月名聲塞宇宙盖千載一人也妙齡登髙科思以文學經濟如賈太傅陸宣公中嵗偃蹇不偶留心佛乗交友禪伯如白樂天柳子厚晚節播遷嶺海遂欲陰學長年超然遐舉如安期生梅子真此公平生學術三變見於手筆書疏者具有本末也若夫文章妙天下特其餘事傳周易尚書解論語亦愽洽之及耳要非志氣所存然公嘗有曰膠西多古君子使蓋公直往來其間軾何足以見之與答陸子厚書所論黃髙人之意適同噫内聖外王之道不明而豪傑之士不能忘情於方外者如此然則世人所求於公者殆其粃糠土苴耳至正己丑秋過倪氏黟川寓居敬書此於其所觀東坡尺牘後書所編李文公集篇目後趙汸李文公集十有八卷凡四百篇江浙行省㕘政趙郡蘇公所蔵本某既從公傳冩復總其篇目於上始汸見歐陽公論文每稱韓李其讀幽懐賦恨不得與之同時上下其議論而老泉蘇公亦謂李文其味黯然以深其光油然以幽自是每欲求其集觀之不可得所得者文苑英華中數篇而已既又見豫章黃公謂皇祖實録文如女有正色又子朱子論復性書雖病滅情之㫖出於釋氏而亦善其有如此思慮益以不覩全集為憾至是廼請於公而得之甚慰也公名翺字習之中進士第元和間為史館脩撰疏言既以武功定海内當革弊事復髙祖太宗舊制用文徳興太平不然恐大功之後逸欲易生因條上正本六事憲宗不能用後遷禮部郎中靣折宰相李逄吉過失移病去雅好推轂賢士韓文公嘗書與之云于賢者汲汲惟公與不材爾其復書以為韓公雖好士惟有文章兼附已者無所愛惜或不能然則不肯薦拔與已不同又嘗以書責裴晉公居相位道不行忍恥内愧不能引退其於師友及知已厚者骨鯁無諱忌如此則視逄吉輩何所憚而唐史乃言由不得顯仕怫鬱無所發靣斥逄吉既斥之又自懼而去其言牴牾非事實甚明昔人謂韓公於學莫如文章於徳莫如好直而習之文行庶幾似焉則以韓謚名而韓李並稱可無愧矣㕘政公將刻梓以廣其傳於學者故汸竊著其為人大略且非排史氏之妄以明歐陽公為知言云八詠樓詩紀序宋濂八詠樓在婺之城上西南隅其建立也實昉於武康沈休文齊隆昌初休文以吏部郎出守是邦刑清訟簡號稱無事既創樓名之曰𤣥暢復為詩八詠以冩其山川景物之情宋至道中馮伉來知州事以為永明之體實本於休文而祖於徐庾心尤篤好之勒其辭於石置之樓下且更𤣥暢為八詠期以傳示於無窮於是薦紳之家相繼有作舂容乎長篇鏗鏘乎短韻粉版𤣥書光溢於四壁矣好事者嘗輯為一編鍥諸文梓兵燹之餘漫弗復存南峰楊尊師竊病之乃與其徒胡君𤣥範旁搜逺采筆以成書上自休文下迄近代凡有所作麄及於樓者靡有所遺濂頗讀而疑之休文固知名之士其在齊梁之間立朝大節不能無所憾夫不能無所憾則人將棄之奈何其詩獨傳於今也豈解佩被褐果有慕君戀闕之意歟抑髙才博洽名亞董遷或可以驚世而駭俗歟濂之愚皆不足以知之意者婺為禮義之邦士君子世惇詩書心存忠信往往勇於自治而不暇責人稍有寸善揚之惟恐不亟况休文嘗為民上者歟古所謂居是邦不非其大夫者獨吾婺之為然歟然而休文至今近九百載來守婺者不知其幾人泯泯而無聞者固多矣三尺童子過斯樓之下者亦能指曰是休文之遺跡也此無他誠以葩藻之辭好者既衆故傳之者久耳浮文艶句有識者之所不道尚能烜著震耀之若此則夫道明徳立其言足以繫世教之重輕者又將何如歟學道之士益思有以自朂焉可也紀中賦凡若干首古詩若干首絶句若干首分為三卷卷後各有其竹素有續得者輙補入焉南峰名道可字某南峰其號恂恂有賢行望而知為好古之士今主領寳婺觀事觀與樓盖聮峙云水經序王禕水經漢桑欽所作藝文志缺弗録而隋經籍志有兩水經一本三卷郭璞注一本四十卷酈善長注善長道元字也然皆不著撰人氏名舊唐志乃云郭璞作宋崇文總目亦不言撰人為誰但云酈注四十卷亡其五至新唐志始謂桑欽作又言一云郭璞作盖疑之也按前漢書儒林傳古文尚書塗惲授河南桑欽君長晁氏讀書志謂欽成帝時人也今以其書考之濟水過夀張即前漢夀良縣光武所更名又東北過臨濟即狄縣安帝所更名菏水過湖陸即湖陵縣章帝所更名汾水過永安即彘縣順帝所更名則其書非出成帝時若順帝以後人所為矣又其書言武侯壘又云魏興安陽縣注謂武侯所居魏分漢中立魏興郡又云江水東逕永安宫南則昭烈托孤于武侯之地也又其言北縣名多曹氏時置南縣名多孫氏時置是又若三國以後人所為也又云改信都從長樂則晉太康五年也又河水北薄骨律鎮城注云赫連果城則後魏所置也此其書又若晉後魏人所為也意者欽本成帝時人實為此書及郭酈二氏為傳注咸附益之而璞晉人道元後魏人也是故山海經禹益所記而有長沙零陵桂陽諸暨之名本草神農所述也而有豫章朱厓趙國常山奉髙真定臨淄馮翊之稱爾雅作於周公而云張仲孝友蒼頡篇造於李斯而云漢兼天下要皆後人所附益非復其本文然則水經為欽作無疑盖久而經傳相淆而欽之本文亡矣本文雖亡可不謂為欽所作哉通典謂郭注多踈略迂恠而已不傳今酈注四十卷固完而舊本往往失於遷就有錯簡金蔡正甫氏嘗作補正三卷而亦不傳今唯酈注舊本猶行而已夫天地之間唯水為多故水者地之脉絡也大川相間小川相屬而凡郡縣州道𤓰列棊布皆因水以别焉地理之書始於禹貢而禹貢之分九州必主山川以定經界誠以山川之形緜亘無易州縣之設更革不常故兖州可移而濟河之兖不能移也梁州可遷而華陽黑水之梁不能遷也此禹貢所以為萬世不易之書也後世史家主於州縣以為書州縣更革其書亦遂以廢而不傳以彼之易於不傳則水經之書其果得而廢之與大抵此書所引天下之水百三十有七江河在焉而酈氏注引枝流一千二百五十二其源委之吐納沿路之所經纒絡枝煩條貫類皆搜渠訪瀆靡或漏遺總其槩而攬之天下可運於掌矣故自禹貢以後此書最為近古而不可廢豈亦所謂萬世不易者歟顧世之為地理學者莫不即邇而昧逺就簡而憚煩而卒亦紛紜而無所據桑氏之學廢不復講久矣不亦惑哉故予因為序論以致予意抑予之力豈能重其書覽者考其迹求其故而觀其會通必有能識其要者風水問答序胡翰烏傷朱君彦修故文懿先生之髙第弟子也少讀書從先生游最久嘗有志當世充賦有司不合退而學醫猶幸其濡沬及人也著書數萬言曰格致論人多傳之而君之醫遂名海右又以陰陽家多忌諱不知稽諸古也復著書數千言曰風水問答書成示予雙谿之上推其用心可謂至矣易曰仰以觀于天文俯以察于地理天確然在上其文著矣地隤然在下其理㣲矣著者觀之㣲者察之知乎此者知乎幽明之故非聖人孰與焉而漢魏以來言地理者往往溺於形法之末則既失矣至其為書若宅經葬經之屬又多秘而亡逸不傳則失之愈逺矣朱君力辯之以為人之生也合宗族以居為宫室以處審曲面勢得則吉不得則㓙其理較然及其死也祖宗之神上㕘于天舉而葬者枯骨耳積嵗之久骨已朽矣安知禍福於人貴賤於人夀夭於人哉故葬不擇地而居必度室據往事以明方今出入詩書之間固儒者之言也昔者先王辨方正位體國經野土宜之法用之以相民宅土圭之法用之以求地中皆為都邑宫室設也而冢人墓大夫之職公墓以昭穆邦墓以族葬借欲擇之其兆域禁令孰得而犯之以是知君之言為得也惜其書不見於二百年之前紹興山陵改卜之議晦菴朱子以忠賈禍夫以一世豪傑之才千古聖賢之學萃乎其人觀於天下之義理多矣而篤惟蔡元定之説是信者果何也哉吾邦自何文定公得朱子之學於勉齋四傳而為文懿君受業先生之門計其平日之所討論亦嘗有及於斯乎不然則是書成於先生未易簀之日必能是正其説傳信於人而顧使翰得而讀之豈知言哉且翰先人之葬今十年矣襄事之初匍匐將命而不暇擇嘗惕然於先儒土厚水深之言於是得君之書欣然如獲拱璧昔里有余禎者以是術游江湖間邵菴虞公深敬信之其著書曰地理十凖虞公稱其有得於管輅王吉之傳力詆曾楊之非而不悟指䝉非輅所作則與翰同一惑也書之於篇朱君其幸終有以教之古樂府詩類編序王禕太原郭茂倩裒次樂府詩一百卷余采其可傳者更定為集若干卷復論之曰周衰禮樂崩壊而樂為尤甚自制氏為時樂官能紀其鏗鏘鼓舞而不能言其意則天下之知者鮮矣况先王之聲音度數不止其所謂鏗鏘鼓舞其人固不能盡紀也以是言之豈不難哉若聲詩者古之樂章也雅鄭得失存乎其辭辨其辭而意可見非若聲音度數之難知而國家之制作民俗之歌謡詩人之諷詠至於後世遂無復雅頌之音雖用之郊廟朝廷被之鄉人邦國者猶世俗之樂耳獨何歟盖詩之為用猶史也史言一代之事直而無隐詩繫一代之政婉而成章辭義不同由世而異中古之盛政善民安化成俗美人情舒而不廹風氣淳而不散其言莊以簡和以平用而不匱廣而不宣直而有曲體順成而和動是謂徳音及其衰也列國之言各殊儉者多嗇强者多悍淫亂者忘反憂深者思蹙其或好樂而無主因敝而思治亦隨其俗之所尚政之所本人情風氣之所感故古詩之體有美有刺有正有變聖人並存而不廢唯所以用之郊廟朝廷非清廟我將之頌不得奏於升歌宗祀非鹿鳴四牡大明文王之雅不得陳於會朝燕享内之為閨門外之為鄉黨非闗雎麟趾則鵲巢騶虞之風情深而文明氣盛而化神故可以感鬼神和上下美教化移風俗今茂倩之所次有是哉以其所謂郊祀安世黃門鼓吹鐃歌橫吹相和琴操雜曲攷之漢辭質而近古其降也為魏魏辭温厚而益趨於文其降也為晉晉之東其辭麗遂變而為南北南音多豔曲北俗雜邉聲而隋唐受之故唐初之辭婉麗詳整其中宏偉精竒其末纎巧而不振雖人竭其才家尚其學追琢襞積曾不能希列國之風而况欲反於雅頌之正滋不易矣是以郊廟祭祀則非有祖宗之美事盛徳告成功之實會朝燕享君臣之間則非有齋莊和悦之意以發先王之徳盡羣下之情哇聲俚曲若秦楚之謳巴渝之舞凉伊之按莫不雜出以為中國朝廷之用慆心盈耳不復知其為教化風俗之蠧夫民不幸不見先王之禮樂考其聲詩盖有足言者然以唐虞之盛不能無憾吾於此見其風氣之淳人情之泰政治俗尚之美皆非古矣其治亂得失是非邪正雖去之千數百載不待其言之著而今皆可見者則詩之為用豈不猶史之事哉故合而論之以寓吾去取之意將望於後之作者焉郁離子序徐一䕫郁離子者誠意伯劉公在元季時所著之書也公學足以探三才之奥識足以逹萬物之情氣足以奪三軍之帥以是自許卓然立於天地之間不知自視與古之豪傑何如也年二十已登進士第有志於尊主庇民當是時其君不以天下繫念慮官不擇人例以常格處之噤不能有為已而南北繹騷公慨然有澄清之志藩閫方務治兵辟公㕘賛而公鋭欲以功業自見累建大議皆匡時之長䇿而當國者樂因循而悦茍且抑而不行公遂棄官去屏居青田山中發憤著書此郁離子之所以作也郁離者何離為火文明之象用之其文郁郁然為盛世文明之治故曰郁離子其書總為十卷分為十八章散為一百九十五條多或千言少或百字其言詳於正已慎㣲修紀逺利尚誠量敵審勢用賢治民本乎仁義道徳之懿明乎吉㐫禍福之幾審乎古今成敗得失之跡大槩矯元室之弊有激而言也牢籠萬彚洞釋羣疑辯博竒瑰工于比喻而不失乎正驟而讀之其鋒凛然若太阿出匣若不可玩徐而思之其言確然鑿鑿乎如藥石之必治病斷斷乎如五穀之必療饑而不可無者也豈若管商之功利申韓之刑名儀秦之捭闔孫呉之陰謀其說詭於聖人務以智數相髙而不自以為非者哉見是書者皆以公不大用為憾詎知天意有在挈而畀之維新之朝乎皇上龍興卒以宏謨偉略輔翼興運及定功行賞疏土分封遂膺五等之爵與元勲大臣丹書鐵篆聮休共美於無窮不其盛哉傳有之曰維楚有材晉實用之公之謂也初公著書本有望於天下後世詎意身親用之雖然公之事業具於書此元之所以亡也公之書見於事業此皇明之所以興也嗚呼一人之用舍有闗於天下國家之故則是書也豈區區一家言哉一䕫蚤嘗受教於公後謁公金陵官邸出是書以見教一䕫駭所未見愧未能悉其要領今公已薨其子仲璟懼其散佚以一䕫於公有相從之好俾為之序顧一䕫何敢序公之書苐得繫名於簡編之末亦為榮幸因不讓而序之公諱基字伯温括蒼人若其言行之詳官勛之次則具在國史兹不著六書本義序徐一䕫古者六書之法皆掌於官成周保氏之職以六書教國子而書之設以同文為盛故又有外史掌逹書名行人掌論書名漢循其法太史試學童諷書九千字者得為史吏民上書字有不正者則糾率之其掌於官可知已夫書非曲藝也大而二帝三王周公孔子之道次而古今成敗得失之迹九流百氏雜家之説又次而官牘家乗錢穀獄訟米鹽碎務之記注莫不有賴於書盖不容於一日廢者也而所書之法六曰象形曰指事曰諧聲曰會意曰假借曰轉注其為法也有子母相生之類形聲清濁之别五方言語之異用之者易流於譌舛自夫官失其守大夫士務趨簡便以指事為象形者有之以㑹意為指事者有之至有以轉注為假借會意為轉注其失滋甚於是六書之義不明而義理之精㣲有失其本真者已越人趙君撝謙深以為病取許叔重而下諸家論著之書攷其得失推子母之相生俾各歸其類正五方之言語律以四聲而以子母相生之例統之為凡例以總其綱為圖説以括其要分為十類著為十二篇釐為三百六十部於是六書之義明而六書之用無譌舛之患矣嗟乎大夫士之於六書譬之麻縷絲絮莫不以為衣也而或不知其出於蒔育稻粱魚肉莫不以為食也而或不知其出於佃牧習而不察此固人情之大較偽謙非有官守如古者外史行人之所掌而能用力於衆人所略之地何其用心之専也哉撝謙系出宋宗室志慤而守恬其學邃於經術諸子百氏莫不記覽著為文辭抑揚反覆能沛然盡其所欲言而不畔於道觀其所著六書論可見已至於六書本義則尤其盡心者也方國家較正韻譜徴至京師稍試其所學擢中京國子監典簿旋以疾引退遂克畢力於此書書成徵余序之雖然余固習而不察者也安能發其藴以撝謙請之力始著其用心之専云爾古詩選唐序蘓伯衡詩之有風雅頌賦比興也猶樂之有八音六律六吕也八音六律六吕樂之具也風雅頌賦比興詩之具也是故樂工之作樂也以六律六吕而定八音詩人之作詩也以賦比興而該風雅頌但詩人作詩之初因事而發於言不若樂工作樂之初先事而為之制焉耳嗚呼韶簫也大夏也大武也以至於秦魏齊諸國其樂之作也陳之以八音和之以律吕未嘗不同也而其音則未嘗同也商也周也魯也以至於弼鄘衛諸國其詩之作也經之以風雅頌緯之以賦比興未嘗不同也而其音則未嘗同也樂之有治有忽不繫八音六律六吕而繫世變詩音之有正有變繫風雅頌賦比興而不繫世變哉夫惟詩之音繫乎世變也是以大小雅十三國風出於文武成康之時者則謂之正雅正風出於夷王以下者則謂之變雅變風風雅變而為騷些騷些變而為樂府為選為律愈變而愈下不論其世而論其體裁可乎李唐有天下三百餘年其世盖屢變矣有盛唐焉有中唐焉有晚唐焉晚唐之詩其體裁非不猶中唐之詩也中唐之詩其體裁非不猶盛唐之詩也然盛唐之詩其音豈中唐之詩可同日語哉中唐之詩其音豈晚唐之詩可同日語哉昔襄城楊伯謙選唐詩為唐音録蜀郡虞文靖公序之慨夫聲文之成繫於世道之升降而申之以一言曰吾於伯謙之録安得不歎夫知言之難也盖不能無憾焉無他文之日降譬如水之日下有莫之能禦者故唐不漢漢不秦秦不戰國戰國不春秋春秋不三代三代不唐虞自李唐一代之詩觀之晚不及中中不及盛伯謙以盛唐中唐晚唐别之其豈不以此乎然而盛時之詩不謂之正音而謂之始音衰世之詩不謂之變音而謂之正音又以盛唐中唐晚唐並謂之遺響是以體裁論而不以世變論也其亦異乎大小雅十三國風之所以為正為變者矣詩與樂同一道也不審音不足以知樂不審音則何以知詩伯謙之於音如此則其於詩也可見矣此文靖之所以不能無憾也歟平陽林敬伯蚤嵗謂文靖之序深有概乎其衷及遊國學質諸博士貝廷琚劉子憲而知唐音去取出其嗜好也其主䝉陰縣簿暇日乃更選焉非有風雅騷此之遺韻者不取也得七百六首隨其世次釐為六卷以所選皆五七言古詩故目為古詩選唐敬伯之言曰竊聞詩縁情而作者也其部則有風雅頌其義則有賦比興其言或三或四或五或六或七其篇或長或短初曷嘗拘拘於其間哉又曷嘗曰我為風為雅為頌也因事而作出於國人者則曰風出於朝廷者則曰雅用之宗廟郊社者則曰頌又曷嘗曰我為賦為比為興也成章之後直陳其事則曰賦取彼譬此則曰比托物起意則曰興如斯而已矣奈何律詩出而聲律對偶章句拘拘之甚也詩之所以為詩者至是盡廢矣故後世之詩不失古意惟有古詩而今於唐詩亦惟選古律以下則置之而况唐之詩近古而尤渾噩莫若李太白杜子美至於韓退之雖材髙欲自成家然其吐辭暗與古合者可勝道哉而唐音乃皆不之録今則不敢不録焉余偉其論之確識之夐而選之精也是以備著之嗚呼此詩選勝於唐音甚逺使文靖復生而見之寧不快於其意必有以發揮敬伯之用心者矣惜乎九原莫作顧使余序其篇端也六經師律序吴沉嗚呼兵者國之大事也聖人之所罕言而不敢輕用者也古之時文武為一途士之途未嘗不知兵也後世析文武為二途而兵之學寡矣有能言者下之人不以為狂則上之人必以為諱幸四方之無虞宜無事乎此也茍或有警將求若人而用之不亦遲乎古之兵謀戰䇿多矣歴代以來散亡略盡今之存而顯著者七書而已七書者司馬法六韜孫子呉子尉繚子三略唐太宗李衛公問對也前代嘗以之頒布武學令天下誦習之謂之武經世之談兵者尊之仰之真猶儒者之於六經也夫行師不法聖人則是為暴曾謂彼七書而可以為萬世不刋之典乎何當時之襲陋而不悟也以七書考之三略尉繚子已有可疑漢志雜家尉繚子二十九篇兵形勢家乂有三十一篇今書有二十三篇則不知果其本真否三略三卷經籍志云下邳神人所撰其亦信然乎若太公六韜與李衛公問對則灼然依托者也其為古書而可信者司馬法及孫呉乎太史公稱司馬法閎廓深逺雖三代征伐未能究其義漢時存者百五十五篇班固入之於禮今之存者僅五篇而已盖昔者齊威王使其大夫追論古司馬兵法附以先齊大夫田穰苴之説號曰司馬穰苴兵法五篇之傳其穰苴之遺乎然亦非齊之全書矣吁先王之兵制盡在古司馬而今不可得見矣宜孫呉之巋然而獨髙也班固志藝文時兵家者流總五十三家七百九十篇而孫子冠其首觀夫十三篇之書備竒正用機權量彼度已先計後戰變化開闔其用不窮亦深妙矣哉雖然謂武之書為秦漢兵學之祖則可謂三代之兵學亦若此則不可聖人之兵昭文徳而威不軌者也所以生人也非殺人也禦亂也非為亂也尚義也非尚詐也孫子曰兵者詭道也吾恐其非聖人意也世道日貶民論日卑論將帥則以勇壯擊刺為賢能語行陣則以竒譎設伏為巧妙若曰我將動之以仁義行之以禮讓雖三尺之童亦指以為迂濶而不切矣昔者荀卿子之非孫呉有曰彼孫呉也尚勢利而商變詐者也又曰齊之技擊不可以遇魏之武卒魏之武卒不可以值秦之銳士秦之鋭士不可以當桓文之節制桓文之節制不可以敵湯武之仁義伊吕之將子孫有國與商周並孫呉之徒皆身戮於前而國滅亡於後報應之勢各以類至其説可謂當哉至揚子雲亦復不喜孫呉而曰不有司馬法乎子雲之不喜孫呉其意美矣然不知子雲當時所見司馬法乃古之書耶抑穰苴所述之遺耶聖人於師中之事雖未嘗一一悉言而其宏綱大用則豈不可得而窺哉盖兵之始作也非聖人之私意也天地之所造設聖人觀法之而已掌之有其官定之有其制教之有其時備之有其素歌詩以勞之誓戒以齊之上順乎天下應乎人廓然大公至正之心炳然神武不殺之徳豈孫呉之所可得而測識哉間嘗不自揆度以易詩書禮論孟諸經其言其義有涉於師征者輯録而類聚之定為五篇一曰兵象二曰兵用三曰兵禮四曰兵詩五曰兵訓縂而題之曰六經師律竊取子朱子儀禮集傳師田篇之意而不自知其不可也若乃春秋二百四十二年之間諸侯之强大僣侈兵法軍制俱非先王之舊曰侵曰伐曰圍曰入曰追曰擊曰襲曰取曰敗曰滅聖人不厭其書於簡册者誠誅黷武之罪以示萬世之防學者當自其全經而講焉不得而盡録也至於夾谷之會則以吾夫子之文徳武備於是可見故特取之以繫於兵用之篇嗚呼有國家者於平居暇豫之日能謹夫修齊治平之道兵無由而作矣如其萬一猶當按聖人之遺經法聖人之運量豈不足處天下之大事平天下之大艱而又奚假於孫呉乎此是篇之所以一本於經而不容附以他書之説也天下之事固有以新竒而為世所好者亦有以陳常而為世所厭者有人於此曰我善為孫呉則必肅然聴之矣如曰六經之中未嘗無兵法存焉則必譁然難之矣習俗之移人至此乎方當四方合一文治聿興之時草茅之士得以餘力及此極知牽綴聖人之經犯非所當言之戒其罪無所逃之然有備可以無患考古所以制今世之君子當有採焉讀戰國䇿方孝孺文武之道至於春秋之世委地矣孔子之作春秋傷周道之衰也夫豈知春秋之法復委地於戰國之世乎嗚呼朝覲會同之禮不修於天子之庭禮樂征伐之柄或輕易於諸侯之雄君臣上下之紀隳而簒弑争奪之事起此孔子之所甚痛也然其時天下諸侯猶知以尊周為義狼攫狐顧而不敢肆其無厭之欲盖道之在人心者尚有未冺耳及乎戰國則不然諸侯或遣一介之使而讓周或興師臨之而徴其鼎或責王入朝一旦而遂滅其宗廟其所由來者久矣功利熾而仁義銷矣游説行而㢘恥衰矣譎詐盛而忠厚之風息矣觀乎十二國之所載繁辭瑰辯爛然盈目及求其指意非謀以奪人之國則以揺人之位非間人之骨肉則皆眩惑人之事或大言倨禮以激之或佯疑曲問以入之或卑聲屈體以冀其哀或正貌詐心以釣其名或揣其志而施其計非不博且富也欲一簡之合乎道而不可得豈惟不合乎道欲一簡如左氏所傳公卿大夫之言亦不可得矣先王之遺澤餘化漫盡而國家繼之以亡豈不哀哉然其待士之禮猶有存者故得以廣聽兼知匡扶其國久而後俱并於秦至秦之始皇則自任其智棄天下之士而不用燔三代之言而不法巍然獨伸其尊以為可恃而其危亂不旋踵而即見於是戰國之遺法復委地矣悲夫讀吕氏春秋方孝孺吕氏春秋十二紀八覽六論凡百六十篇吕不韋為秦相時使其賓客所著者也太史公以為不韋徙蜀乃作吕覽夫不韋以見疑去國嵗餘即飲酖死何有賓客何暇著書哉史又稱不韋書成懸之咸陽市置千金其上有易一字者輙與之不韋已徙蜀安得懸書於咸陽由此而言必為相時所著太史公之言誤也不韋以大賈乗勢市竒貨致富貴而行不謹其功業無足道者特以賓客之書顯其名於後世况乎人君任賢以致治者乎然其書誠有足取者其節䘮安死篇譏厚葬之弊其勿躬篇言人君之要在任人用民篇言刑罰不如徳禮逹鬱公職篇皆盡君人之道切中始皇之病其後秦卒以是數者僨敗亡國非知幾之士豈足以為之哉苐其時去聖人稍逺論道徳皆本黃老書出於諸人之所傳聞事多舛謬如以桑穀共生為成湯以魯莊與顔闔論為與齊桓伐魯魯請比闗内侯皆非其事而其時竟無敢易一字者豈畏不韋勢而然耶然予獨有感焉世之謂嚴酷者必曰秦法而為相者乃廣致賓客以著書書皆詆訾時君為俗主至數秦先王之過無所憚若是者皆後世之所甚諱而秦不以罪嗚呼然則秦法猶寛也明文海卷二百十
