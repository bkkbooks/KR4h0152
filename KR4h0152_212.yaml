body:
  text: 明文海卷二百十二餘姚黃宗羲編序三文山詩史序劉定之豫少時得宋丞相信國文公指南集讀之慨然聞公在幽囚中有集杜句詩未見也及官翰林始得見而録之詩皆古體五言四句凡二百首分為四卷首述其國次述其身次述其友次述其家而終以寫本心歎世道者莫如何於人勝天邪害正而有待於天勝人正化邪之必有日也卷目皆公所自定其先公而後私盡已以聽天於此亦可以見而俗本或混之今皆為復其初集首有總序又有小序散於章首其後又有跋尾序跋中有缺文者指元之君臣宋之叛逆缺而不書使知者以意屬讀今皆補之而為白字者不沒公初意也不書紀年者陶靖節削永初之意也姓某履善甫者指南集中所謂范雎變張祿越蠡改陶朱之意也而其事之難有甚於指南之時焉者矣小序之末多曰哀哉者公所以傷其國之亡憫其忠臣義士之同盡慟其家族之殉國而自處期於死豈待南向再拜引頸受刃之際而後有決志哉嗚呼孔子不以仁許人獨以許殷之三臣孤竹之二子余以為若公者文山之隱京口之脫去而不汙矣巴延拘於江艦𢎞範縶於海舟世祖維於燕獄囚而不屈矣仰藥於庾嶺絶粒於鄉郡已而殞身於燕市死而不悔矣兼微箕比干之心而為心者其在公乎若乃是詩之作而豈徒哉麥秀黍離之歌作於其國已亡之後而其身可以不死也懷沙抱石之辭作於其身臨絶之際而其國猶未至於亡也身且死矣國已亡矣於是乎有首陽采薇之歌燕獄集杜之作所謂求仁得仁而奚怨者也合伯夷叔齊之言而為言者其不在是詩乎以是心也為是詩也公其可謂仁矣仁者天地之元氣古今之人極其在上為日月之明風雷之壯其在下為江河之所以長流山嶽之所以常鎮其混然在中為君臣民物之所賴以長治久安而在宋之末世為公之本心在公之死也為盡心有讀而不䀌傷者余以為非仁人也公同時有曰吳郡張子善者亦嘗集杜句述公始末大概而疏其事於下方以證之今內相安成彭公純道得其本以示豫遂録以附公詩之後合而題之曰文山詩史取公序中語也公之宗孫廷珮欲鋟梓以廣其傳乃序以歸之廷珮又嘗承其父志修祠堂以祀公可謂賢後裔云本草綱目序商輅舊本草三卷藥分上中下三品凡三百六十五種蓋炎黃時所著實不刋之書也梁陶𢎞景增藥為七百三十種書為七卷唐蘇恭又增藥為八百五十四種書為二十卷世謂之唐本草宋開寶中詔取醫家嘗用得效藥凡一百三十三種附益之命李昉扈蒙等重加刋正乃有詳定重定之目蜀孟昶亦嘗命其臣韓保升等以唐本圖經參比為書稍或增廣世謂之蜀本草他如徐之才之藥對陳藏器之拾遺與夫楊振之杜善方陳士良日華子寇宗奭諸人遞相增附互有注釋於是刪繁性事食性衍義諸書出焉蜀唐慎微又於本草圖經之外增藥六百餘種益以諸家方書及經子傳記佛書道藏凡該明乎物而效用者各附於本藥之左為書三十餘卷名曰經史證本草至為明備舊有解人龎氏得其善本中更兵燹所存無幾後平陽張存惠因龎氏本附以宗奭衍義增多藥品為之板行惜傳之未廣今山東按察僉事茂君彪曩以御史出按平陽購求得之珍重有年適副都御史原君傑奉命巡撫山東見而善之謀諸左右布政使雷君復葉君冕按察使李君裕副使劉君敬命工重鋟諸梓以廣其傳都憲因提學僉事周君濠來京以序見屬豫惟疾之所恃者醫醫之所恃者藥或君臣佐使之不明甘苦寒溫之莫辨雖欲療人之疾其可得乎上古聖人開物成務制為醫藥以救無妄其功不可尚矣後世明智之士遊心方技率先注意本草蓋人於藥之性味既明斯於疾之治療弗誤用能成功當日垂聲後來此本草之書所為有補於世也歟今兹板刻既新傳之必廣庶幾起死回生之術有賴焉噫都憲之用心仁矣哉敬為序諸首簡題革象新書後嶽正占天之學本聖賢大事業載於堯典蓋有由也自慎竈之説行而儒者始術之矣其氛祲祥眚周官雖具至甘石星座其曰騎官羽林丞尉之類襲用秦漢名稱愈疑後學者不屑用力焉殊不知經緯天地首務明時時茍不明終不能撫五辰以播四政矣革象談異十無一二皆為厯設學者所當究心者也苐以邵子之書不堪作厯致可疑焉皇極經世天厯數用宋人雖有此談西山蔡氏以為書不盡言者藏諸用也又曰以當時日月五星推而上之得堯即位之日是即逆推法而不著其法者豈非藏諸用乎且數家以毫釐絲忽積而十百千萬如因影求形無具可隱况康節數學直繼孔子程子嘗言厯法主于日月其他皆可推洛下閎作厯言數百年後當差一日何承天因立差法攤其差於所厯之年以驗分數竟亦不審獨堯夫於日月交感之際以陰陽虧盈求之差法遂定可謂冠絶古今此非虛語也又按邵學伯溫不與而傳王豫豫歿書殉蜀道士杜可大購得於發冢之盜以授廖應淮由是邵學復出近世祝祕傅立齊琦皆傳邵學者本朝宋學士先正最號博洽其序此書曰傅立極敬畏緣督謂其能發前人所未言不知立時曾見此説否也又論耶律西征庚午厯精妙絶出及元許王郭陳鄧諸公相與訂定授時厯可法萬代曾無一言及邵近舜江人余誠者為豫言邵學內外篇已見傳書而祕傳書又有內外集具天地人三元之學其天元所論厯數極為精簡意必具逆推法或伊川所謂冠絶古今者耳惜乎吾不得而時讀焉因併書之以為有志聖賢大事業者告六書音義序張詡六書音義一書致政郡守豐城芝軒塗先生所輯其冡嗣憲副卿儀刻之以傳者也其為卷十有八其為門十有三其為部五百十有四其為字總若干萬其真楷主洪武正韻而附之以古文篆文籕文其音切亦主正韻而兼取玉篇其釋義雖本説文凡涉穿鑿者悉刪去而兼采他説文字正而無玉篇之雜音義正而無説文之鑿可以左右正韻而備一代書學之製與昔之玉篇廣韻韻府統諸書並行於世無疑也先生自登仕版以來四十餘年無所好獨好儲書將踵鄴侯之富政暇手不釋卷暨歸老於劍江之上也日惟從事於著述此其一焉憲副公擕之入廣刻已屬走也一言以引諸端嗟乎結繩廢而書契生書契之初作也依類象形謂之文形聲相益謂之字而著於竹帛則謂之書也周禮小學保氏教國子先以六書六書者象形會意指事轉注諧聲假借是也書必有音宫商角徵羽是也音必有義訓詁是也音失則陷江左之偏義失則蹈荆國之妄而六書於是乎失真矣此六書音義之所由以輯也皇明大一統文字無寄象鞮譯之殊然惟章奏用正韻公移劵課程碑板之類往往尚沿舊俗習豈非由昧文字體用源流與失音義之所在故與是書一出啓初學醒羣蒙其有功於書學也不少矣若夫含性情於顧盼蓄血氣於典策沐之以虛圓不測之神浴之以浩然剛大之氣去睢盱側媚之態回熙熙穆穆之風使閲之者神和而氣融此則又音義之外有别傳焉所謂神而明之存乎其人者也抑聞之穆叔立言不朽之説詩孝思維則之訓先生之立言固足以為不朽圖矣而憲副公思章親美其孝思必足以為錫類之勸也走也故於序末表而出之周禮重言重意互注序張詡先儒謂周禮一書自周公廣大心中流出大包宇宙細析毫芒成一代之治體為萬世之準繩故當時治效至於囹圄空虛天下太平海不揚波四裔賓服嗚呼盛矣後世之為君臣者心學既失徒敝精神於儀文度數之末若類稚子弄影之為者不幾于戲乎故迹其治效髙者或僅致小康下者視桓文為不及又焉有所謂郁郁乎文者也何也心非廣大則於天地之心為不合矣於天地之心為不合則於天地之用為不肖矣况乎明良相逢尤不易也唐太宗深信矣而無其輔王通篤好矣而無其時劉歆有志矣而昧於所事宋神宗刻意矣而失於所任彼宇文之於蘇綽似矣而又以智力篡魏若是者雖其人品髙下相與敻絶然所謂心學或不能知或知而不能擴充以至於周公之廣大無怪乎三代之治寂寥數千載而莫有繼之者非三代之治卒不可復也無三代之君臣故也非不可以為三代之君臣也無三代之心學故也中庸曰文武之政布在方䇿其人存則其政舉其人亡則其政息程子曰必有關雎麟趾之意然後可以行周官之法度此之謂也詡少時閲書目有所謂周禮句解者集傳者注疏者又有所謂纂圖釋文或問講義詳解要義解義考工總義訂義會元復古者其句解集傳注疏則見之所謂纂圖以下則聞其名至於重言重意互注則其名亦未之聞也侍御上虞尹公德容蚤嵗留心禮學遂以是經取髙第厯顯官持重而居寬蓋有得於禮意者以奉命清兩廣戎政偶得是書於西藩士人家喜其考究之精援引之當於聖經有所裨也擕至東藩出視廣郡守袁君景輝俾刻而傳焉屬詡為之序方今聖治百二十餘年正符魯兩生所謂積德之説傳心學而契周公之廣大世豈無其人於焉光輔聖人制禮作樂以追繼成周之盛斯時也公當攄其平日所得禮意者逐諸賢贊至化而是書蓋可復矣詡也卧病丘園深愧無可為世用者儻天錫以犬馬餘年雖無似尚能擊壤以歌太平之盛白沙遺言纂要序張詡儒有真偽故言有純駁六經四書以真聖賢而演至道所謂言之純莫有尚焉者矣繼此若濂洛諸書有純者有近純者亦皆足以羽翼乎經書而啓萬世之蒙世誠不可一日而缺也至於聖絶言湮著述家起類多春秋吳楚之君僣稱王者耳齊桓晉文假名義以濟其私者耳匪徒言之駁而無足取也其蓁蕪大道晦蝕性天莫甚焉非蕩之以江海驅之以長風不可以入道也故我白沙先生起於東南倡道四十餘年多示人以無言之教所以救僣偽之弊而長養夫真風也其恆言曰孔子大聖人也而欲無言後儒弗及聖人逺矣而汲汲乎著述亦獨何哉雖然無言二字亦著述也有能超悟自得則於斯道思過半矣然則六經四書亦剩語耳矧其他乎而世方往往勸先生以著述為事而以缺著述為先生少之者蓋未之思耳今則詩集出焉而人輒以詩求之文集出焉而人輒以文求之自非具九方臯之目而能得神駿於驪黃牝牡之外者或寡矣詡誠懼夫進修者復溺於無言以為道也因托先生文集中語倣南軒先生傳道粹言例分為十類而散入之其間性命天道之微文章功業之著修為持治之方經綸幹運之機靡不燦然畢具輯成名曰白沙先生遺言纂要凡十卷云庶觀者知先生雖尋常應酬文字中無非至道之所寓至於一動一靜一語一默亦無非至教蓋可觸類而長焉由是觀之先生雖以無言示教而卒未嘗無言是以言焉而言無不中有純而無駁其本真故也是可以佐聖經而補賢傳矣論孟或問序張詡論孟或問世多聞其名而未獲覩其書乃今出於數百年之後與大學中庸或問並行於世使學者有所考據得以益廣其知識開其聰明而為斯道之碑也是書之出也詡固竊為天下後世喜也雖然豫欲無言孔子嘗以是為子貢啓也故曰天何言哉四時行焉百物生焉天何言哉盡信書不如無書孟子嘗有所感故曰吾於武成取二三册而巳矣夫誨人不倦聖人之心而欲無言六經萬世所尊而孟子猶有所擇自古聖賢指之的擇之精不徇迹而任真不貴耳而賤目也如是使學者深悟而自得焉則論孟本具胸中雖無論孟可也况或問乎不然溺意筌蹄留神糟粕吾恐認浮雲而迷太虛知識多而大智昏聰明作而太朴散卒為斯道之障也是書之出也詡又竊為天下後世憂也先儒著述之富未有如文公先生者蓋當時欲矯陸學之偏故耳在文公則然在我學者不可以不之覺也御史君某近得善本將刻而傳之夫流布賢傳以上翼六經下惠來學甚盛舉也間屬詡一言且語之曰是書得尹楊諸老全書撮其語分注於辨欵之下尤為明備耳今姑刻之以俟後之成人之美者補焉嗚呼聖賢隱沒正道將沉凡聲利得喪足以敗道而喪心者其為迷也顯人猶知之至於溺意旨逐影響其為迷也微而覺者鮮矣詡誠無似因御史君間屬僣一言之不敢不置不腆之辭於先賢著述之末而因之以聲其一得之愚焉蓋足音之喜固不勝其杞人之憂也崖山新志序張詡崖山在廣之新會邑南八十里與竒石山對峙如門故又名曰崖門山環以大海潮汐升降吞吐由之在昔樵蘇登眺者絶至恣蛇虺麋鹿所宫者蓋不知其幾千百年矣自宋祥興幼帝浮海始創行宫其上而楊太后與文天祥諸臣鏖戰死節之始末皆在焉慨夫六飛赴海大風覆舟之後貞烈忠憤之氣鬱而弗伸者又二百餘年於此矣至我國朝始表章焉成化丙申邑人白沙陳公甫先生與僉事鬱林陶君自強議上請創大忠祠以祀文天祥陸秀夫張世傑三公又十有六年為𢎞治辛亥同今兵部尚書華容劉公時雍時為右布政使泛舟崖門議創慈元廟以祀楊太后又九年為庚申與僉事晉陵徐君朝文議請入祀典制曰可特賜廟額為全節祭品視古先聖帝王而祀之之期則先大忠一日也於是乎兩崖巨浸之間英魂義魄貞烈忠憤之氣勃然與雲崖爭髙鯨波爭濬海月山日爭耀於無窮而香火四時弗絶有司嵗仲春率一祭牲牢酒醴俎豆玉帛雜然前陳往來部使暨騷人墨客登臨弔酹播諸篇章不一而足徐君一日顧謂詡曰崖山宜志而未有志之者蓋闕典也盍留意焉詡謝不敏而君意益固伏枕之餘因與門徒博采羣載次第編輯首沿革次形勝次里域次景致次帝紀次詔敕次事迹次列傳次祠宇次祀典次碑文次題詠次紀異次雜著次題名悉筆之所以寓褒也其前元張𢎞範李恆之徒列傳及刻石紀功之作悉削之所以寓貶也編輯既成名曰崖山新志凡十有八卷云嗟乎世之治亂國之興亡雖曰有數然未嘗不由於人事之修廢有以兆之也姑以有宋一代論之使當時君臣有古帝王之學以修其身則出治有本決不至於議論多而成功少矣有古帝王政教以新天下則治具畢張決不至於聲容盛而武備衰矣何播遷之有不幸而至於南渡茍斷斷乎以興復為務而勸講和者必誅忠藎如李如嶽必任之而勿二姦佞如秦如賈必去之而勿疑則中原決可復而大讐決可雪矣何敗亡之有詩云逮天之未陰雨徹彼桑土綢繆牖户今此下民或敢侮豫則宋之失於南渡之先者既可慨矣孟子曰七年之病求三年之艾茍為不蓄終身不得則宋之失於南渡之後者尤可痛也嗚呼此志之所以作也夫豈但為為人臣妾者忠節之勸而已哉玩畫齋藏書目録序姚翼天下之物莫難於聚而其聚也莫貴於不散余嘗觀世之貴遊公子往往馳心於金玉珠璣珊瑚翡翠之好而竭其力以致之間或厭苦世俗而稍務為清虛者則或竒花怪石或古器圖畫終其身淋漓燕嬉於其中而不出雖以蘇文安之賢逹長公猶稱其篤於好畫而韓昌黎畫記亦且自謂得趙侍御小畫一卷百金不願易也余自少無他好不惟於世俗之所沈酣如金玉珠璣之類略不以淄乎其心雖花石畫品為清虛之士所崇尚者亦所欲不存而其私心之所癖而不舍者乃獨在古今之簡册然好之雖切而力又不能多致六籍而下九流諸子旁逮外家雜説僅得二千餘卷嘗自誇其所好之勝以為世人諸好惟畫稍為近之然以吾卷帖之美陳之几上已足與其丹青之艷彼此相角而其中上下古今數千萬年興衰治亂之迹及其義理之精歌咏敘述之妙雖野史偏記亦可以資多識而廣見聞皆畫中之所絶無也故雖昌黎文安皆博極羣書而所好旁及於畫吾猶病其適以玩目而雜心矣况専好於畫者乎而况所好又出其下者乎雖然吾之好書不特勝於世之諸好而已也而其聚也又獨難於散何者蓋金玉珠璣珊瑚翡翠之好舉世衆人之所同也而竒花怪石古器圖畫之好亦清虛之士之所同也好之也同則其物之聚於吾也垂涎者必衆而况其人所好既終身於此則為其子若孫者率皆溺於紈綺膏粱鬬雞走狗之事作業竭而財日匱其末也必不能自給於衣食之需又無義理以養其心而孝敬之念既衰則於其父祖精神之萃手澤之遺渺然曾不為之介慮舉而棄之於人以求免夫一旦之飢寒也如視敝屣以子孫視如敝屣之心而乘之以舉世垂涎之欲吾見聚之以數十年之力者不終朝而澌滅無遺矣乃若書之好千萬人而無一二焉方吾之好而聚之也世之人皆等之土梗辨髦將羣嗤之不暇焉能更有同好者一人睥睨其旁哉而况為其子若孫者縱非世世皆能讀父書之人而目染耳濡之餘或稍稍習其儉素之風以自保且生於詩書禮義之家非甚病狂不肖當不忍死其親而捐其所甚好雖欲捐之又或苦於售之不易而中阻然則吾之好書雖限於力而不能以多致使汗牛充棟以與世之聚他玩者比隆竊獨喜其可久據以為吾有也故於此二千餘卷者特齋而藏之又籍而録之使由吾之子若孫以傳於世世不但賢而能讀吾書者知所寶愛而或附益之雖中才以下茍非甚病狂不肖者因此知吾所好之甚雖不幸而偶不免於飢寒或姑存之而不強售於非所同好云耳題如此江山亭詩卷姚綬吳山故有如此江山亭初不知作於何嵗名於何人末得廬陵張光弼清集詩遺卷紫芝老人俞和首作籕文碧巖周氏寫圖清絶可愛足以光斯亭於既堙開後來之賡和也是卷今為旌德史玄隱所藏嘗求諸大夫士題詠多以光弼詩中感慨遂為宋元興亡處致意諄諄乎如此江山不在江山如此上立論無乃過求矣乎且古今江山之趣恆得之林下人其於亭館臺榭興之所到輒以命名就斯亭論之有如此江山可亭矣論亦為通彼豈以一亭一名之微即係以古今興亡之大故哉但登亭而飲者顧瞻徘徊撫景興感以人非而物在慨今昔之異同發之性情亦理之自然也則今使有如光弼輩與客復擕飲斯地求昔之亭已摧沒於荒茆蒼竹之間久矣又將何如其感慨耶豫輩生逢如此盛世歸田之餘得以優遊林下與諸幽人貞士詠歌太平又獲紹續昔賢之作之後亦幸矣間於一飯之頃亦不敢忘江湖之憂於如此江山奚足深論哉至若王公貴人志在行道樹勳業昭聲光於宇宙有弗暇於此或暫得之亦惟一登眺一賦詠之耳求如林下人之趣不可得也玄隱藏之尚伺有暇於此而或一登眺賦詠者出而諗之何如豫和詩贅末唐詩分類精選後序桑悅右唐詩分類精選二十卷凡五千餘首四明吕侯尹吉水時所選將繡梓以廣其傳其子尚清過豫西昌之栖雲軒求一言於後豫嘗注意三百篇而知其意古人之詩運意而已辭略點綴而意自明往往餘意出於句字之外如愛召伯則云勿翦其甘棠則見其子孫臣庶其愛可知如作樂以合祖則曰我客戾止永觀厥成先代之後有聞樂而感泣則和洽神人又何待言説耶且興起無情而難接比雖有影而斟酌難類所易作者直賦而已而其言之厚薄又直關於氣化之盛衰如正風正雅皆作於周之盛時是時詩人皆飲天地之和以發聲故其辭盎然太虛摹畫無迹九罭伐柯諸詩略申情志其風遂變矧風雅變之之極安得不憤激風雲而氣撼山嶽哉就以周公所作論之大明東山之間又自不能無升降矣况其下者乎繼而離騷之作比興略備真有三百篇遺意蓋原之詞本為愛國畏讒鬱抑不平而作又安得不馳騖於變風雅之末流哉如九歌中心不同兮媒勞恩不甚兮輕絶最為善語而使原當文武之世兹言何為而發就使文武之世之詩人當原之世吁嗟騶虞人之好我示我周行等語又豈可鑿空而妄出哉風雅變中之變又不可専委之人也自秦而漢去古未逺五言之作古意猶存如唐山夫人樂章鳴漢之盛與頌倣佛而靈芝搖蕩等語漢之風雅又日變矣降至魏晉亂日多而治日少則能詩如曹子建阮嗣宗張茂先陶淵明輩將何所飲以發和平之音耶大抵三百篇以後取其詩之上薄風雅當味其意之淺深何如不可専論其辭之平不平也曾南豐曰自文武而後又千餘年而有太宗之治唐詩之和順清適太宗之治釀之其盛中晚之外又唐業隨之可考也就其中傑出者四家曰陳子昻氏曰李太白氏曰杜少陵氏曰韓昌黎氏間有數詩略存漢魏比興而頗解古人用意彀率然一篇數十言中其意不如風雅中之數言則又似唐之制度文為足以凌駕三代而先王之真德實意僅存絲髮也詩可以易觀耶然後世學詩之士多舍四家而他師豈不以王摩詰劉長卿韋應物之流皆意隨句絶而平順易見哉詩猶海也三百篇為其蓬島漢魏晉為其弱流而唐則猶其中之亶夷諸洲學操舟之士至海門而震疊茍望洲之畔岸心意俱飽更何有希冀者乎吕侯之選此詩蓋翦其荆棘去其旁岐誘人至止是洲而豫申以是言又欲過此而往直遡弱流而至蓬島也况我朝治隆唐虞尚何古之不可復哉侯名炯字文昭以名進士出為今職政通人和歌謡載道拯物之餘留心文事不易得云韻學集成序桑悅練川章先生名黼字道常别號守道平生隱居教授不求聞逹著韻學集成十二卷凡收四萬三千餘字每舉一聲而四聲具者自為帙二聲三聲絶者如之乃别為直音篇總考其字之所出前此未有也先生沒後十餘年其子冕將鋟諸梓時閭陽吳公克明適以名進士為兹邑令一時大夫士咸祈其成吳公難之曰洪武正韻一書革江左之偏音美矣盡矣萬世所當遵守者也奚他贅為僉曰是韻正所以羽翼聖制也古今以韻名家者不一廣韻梁棟也韻會榱桷也我朝正韻一書擇衆材而修正之廣居成矣兹又益之以龍龕諸韻外衛之以城郭內實之以竒貨覆庇後學之功不淺淺也且正韻之修太祖髙皇帝運其成規授之宋濂輩以竟其事觀大聖人之制作誠度越千古而無間然矣帝王以萬世之才為才有臣於數十年後以濂自擬克遵成規少加張皇亦何尤哉吳公曰然遂募好事者經營其費適欽差提督水利浙江按察司僉事吳公廷玉案臨兹邑又力贊之人樂於助不數月訖工僉求豫言辨諸首先儒有云為文宜略識難字南山詩三都甘泉等賦誦之多箝人舌弗克屈伸果字有異哉人異其字也是韻一出向之商敦周彞化為竹根康瓠入耳不嵬入目不懾何其快哉雖然字何從起乎起於聲韻也厥初天地未生聲韻具於太極天地既判聲韻寓於天地一陽之復聲韻萌也四陽之豫聲出地也聲韻既生形象亦著蒼頡之制字不過因其迹耳然制其一遺其十理之必然也千古而後惟邵子有獨詣之識其著皇極經世書以天聲唱而地音和之天聲平上去入地音開發收閉如多可個舌是有其聲而有其字者也古甲九癸是有其音而有其字者也開宰愛下之為入聲吉向仰下之為閉音其其有其聲有其音有其字哉而無其字吾不得而悉字之邵子不得而悉字之蒼頡亦不得而悉字之也而其聲與音終不亡也寄之喙焉喙相禺寄之竅焉竅相于或可辨或不可辨孰非全露未成之字者乎極而至於於然後去天地之體并聲音與字俱無而復歸於太極矣執其圜則律吕之原在我由是精神通造化智識侔鬼神實易易也嗚呼非知道君子孰能識之學者能盡識先生已韻之字而復求夫韻書於天地間則有得矣先生得於天者厚獲上夀乃終其著是韻也苦心焦思積三十餘年始克成編不得吳公為令以傳之又將付之烏有豈不深可惜耶天之暫屈吳公所以永伸先生也吳公文章學行俱懸羣衆小試為令恆以六事自責以公生明以廉生威邑用大治此特其一舉手投足者云跋唐詩品彚桑悅唐人好吟咏傳凡三百餘家真有盛中晚之殊唐業隨之可考也楊仲𢎞等所選俱得其柔熟之一體唐人詩技要不止此國朝閩人髙廷禮有唐詩品彚五千餘首雖分編定目有正始正宗大家名家羽翼接武正變餘響旁流之殊要其見亦仲𢎞之見是詩盛行學者終身鑽研吐語相協不過得唐人之一支耳欲為全唐者當於三百家全集觀之重刋舊唐書序文徴眀嘉靖已亥吳郡重刋唐書成書凡二百卷本紀二十卷志三十列傳百有五十石晉宰相涿人劉昫撰初御史紹興聞人公詮視學南畿以是書世無梓本他日按吳遂命郡學訓導沈桐刋置學宫工未竟而公以憂去及是書成以書來屬徴明為序按唐令狐德棻等撰武德貞觀兩朝國史至吳競始合前後為書百卷而柳芳韋述嗣緝之起義寧訖開元僅百餘年而于休烈令狐峘以次增緝之起建中而止於大厯元和以後則成於崔龜從厥後韋澳諸人又增緝之凡為書百四十有六卷而芳等又有唐厯四十卷續厯二十二篇皆當時紀載之言非成書也晉革唐命昫等始因舊史續成此書然五代史昫傳不載此事豈其書出一時史館而昫特以宰相領其事耶然不可考也或謂五代搶攘文氣卑弱而是書紀次無法詳略失中不足傳逺宋慶厯中詔翰林儒臣刋修之自慶厯甲申至庚子歷十有七年成新書二百二十五卷視舊史削六十一傳而增傳三百三十有一别撰宰相方鎮及宗室世系宰相世系四表續撰儀衛及選舉及兵及藝文四志所謂其事則增於前其文則省於舊實當時表奏之語而第賞制詞亦謂閎博精核度越諸子良以宋景文歐陽文忠皆當時大手筆而是書實更二公之手故朝野尊信而舊書遂廢不行然議者則以用竒澀為失體刋削詔令為大略固不若舊書之為愈也司馬氏修通鑑悉據舊史而於新書無取焉惟周益公稱其刪繁為簡變今以古有合於所謂文省於舊之論而劉元城謂其事增文省正新書之失唐庚氏尤深斥之乃極言舊書之佳其所引決海救焚引鳩止渴之語豈直工儷而已自是一代名言也然則是書也其可以無傳乎雖然不能無可議者段秀實請辭郭晞有吾戴吾頭之語新書省一吾字議者以為失實是矣而舊史秀實傳乃都不書夫秀實大節固不以此而此事亦卓偉可喜栁宗元敘事尤號竒警且鄭重致詞上於史館若是不得登載則其所遺亦多矣甚者詆韓愈文章為紕繆謂順宗實録繁簡不當拙於取舍異哉豈朝氏所謂多所遺漏是非失實者耶甚矣作史之難也心術有邪正詞理有工拙識見有淺深而史隨以異要在傳信傳著不失其實而已今二書具在其工拙繁簡是非得失莫之有掩焉彼斥新書為亂道誠為過論而或緣此遂廢舊史又豈可哉此聞人公所為梓行之意也是書舊嘗刻於越州卷後有教授朱倬名倬忤秦檜出為越州教授當是紹興初年抵今四百年矣其書復行而公又出於越其事豈偶然哉先是書久不行世無善本沈君僅得舊刻數十册較全書才十之六七於是遍訪藏書之家雖殘編斷簡悉取以從事校閲惟審一字或數易厯三寒暑乃克就緒其勤誠有可嘉者因附著之何氏語林序文徴明何氏語林三十卷吾友何元朗氏之所編類倣劉氏世説而作也初劉義慶氏採擷漢晉以來理言遺事論次為書標表揚榷奕奕玄勝自兹以還稗官小説無慮百數而此書特為雋永精深竒麗莫或繼之元朗雅好其書研尋演繹積有嵗年搜覽篇籍思企芳躅昉自兩漢迄於前元上下千餘年正史所列傳記所存竒蹤勝迹漁獵靡遺凡三千七百餘事總十餘萬言類列義例一惟劉氏之舊而凡劉所已見則不復書品目臚分維三十有八而原情執要實惟語言為宗單詞隻句往往令人意消思致簡逺足深唱歎誠亦至理攸寓文學行義之淵也而或者以為托裂委瑣無所取裁骩骳偏駁獨能發藻飾詞於道德性命無所發明嗚呼事理無窮學奚底極理或不明固不足以窮性命之藴而詞有不逹道何從見是故博學詳説聖訓攸先修辭立誠畜德之源也宋之末季學者習於性命之説深中厚貌端居無為謂足以涵養性真變化氣質而究厥所存多可議者是雖師授淵源惑於所見亦惟簡便日趨偷薄自畫假美言以護所不足甘於面牆而不自知其墮於庸劣焉爾嗚呼玩物喪志之一言遂為後學深痼君子蓋嘗惜之元朗於此真能不為所惑哉元朗貫綜深博文詞粹精見諸論撰偉麗淵宏足自名世此書特其緒餘耳輔談式藝要亦不可以無傳也是為序嶺南耆舊遺傳序王漸逵豫嘗讀管幼安王彥方傳乃知漢末猶有斯人使生於孔子之前必不居於三仁之後矣而或者猶以未嘗立言短之夫言者文也道以文顯亦以文散是故豫懼夫道之在於人而文之耗之也夫天地未闢而日月星辰河海山嶽之文固在也而謂無文可乎君子之道本諸身徵諸人雖無事於文而文固在也而謂少文可乎君子之道譬諸木則根焉行則枝幹焉文譬則萌甲花蕊焉故木之生意至萌甲則盛花蕊則衰矣故花蕊也其盛之極而衰之始乎三皇者道之根也五帝者道之幹也夏商者道之枝也周道之萌甲花蕊也故文至周而盛道至周而衰於是言詞興而太朴散矣豫鄉先輩生居海濱龎氣未漓淳德懿行間出於世而近者後生聰慧彬彬迭興崇飾詞藻咸致疵焉此世之所以漓也豫用是懼乃以幼所傳聞於耆舊者裒為實録以示後學俾知道為本文為末而鄉之先輩懿行之昭乃文之至而非後進之所為文也嗟夫天地淳龎之道有漓有復其在於時與人乎是故道嘗漓於春秋戰國矣至西漢而復漓於南北朝之亂矣至李唐而復漓於五代矣至趙宋而復漓於元季矣至我朝而復故國初之耆舊其遺風流俗猶有存者吾尚及見之也今天下之漓亦甚矣能反其朴而革其漓其惟賢者乎若猶以文言是則豫之所滋懼也七雄䇿纂序穆文熙余生長趙魏之間乃蘇秦氏約從六國於洹水上謀仰關而攻秦者也北首燕路東指齊疆西南臨黃榆馬陵為韓地七國五當其衝四豪有其過半今其人與事雖往而遺迹尚存故余於耕壠之暇間取國䇿讀之參驗合否久之淹貫其事抵掌可悉乃隨意所至輒櫽括數語捭闔從衡判其得失總約之以正道而又取縉雲鮑氏西山真氏元人吳氏諸評國䇿語綴集其上析為八卷名為七雄䇿纂於是開府嶧山賈公見而檄梓澶淵而吳郡金君新至乃竣其事余序之憮然曰文之顯晦蓋亦有時云夫以國䇿所載皆䇿士傾危之術漢惟子長孟堅劉向氏治之而唐以下至宋元士皆諱言之故有談蘇張之説者則人皆視之為魍魎魑魅而不食其餘故其書歷千百載皆秦灰遺燼豕亥魯魚半居其間而無善本晦斯極矣逮至我明𢎞正間乃刻於大梁而李獻吉序之為始顯近刻於金陵為再顯今賈公復刻兹集於澶淵則其書愈益顯矣夫國䇿自秦至今如故也何始之晦而今之顯也夫其晦之也以人習從衡之名而不知隨時變化之道者也其顯之也則以從衡之術貴在善用故為儀秦而儀秦反覆詐偽黃金相印逐逐然日役於利兹孟軻氏之所謂妾婦也為仲連而仲連却秦帝下聊城辭千金而蹈東海則太史公之所謂天下士也又使當其時有明王在上取一時䇿士而隨材器使之以無忌樂毅為大帥以聶政荆軻朱亥為偏禆以甘羅樗里子張孟談為奉使以觸龍虞卿知果郗疵為輔導則固不必借才異代而治道可登於上理矣夫遺刃亡鏃戰鬬之具皆良材也斑鑑紋琴塜中之物皆珍器也而何必戰國之士不可用哉矧其文詞變化無微不入事有難言一語立斷而其色蒼然其氣沛然又猶虎豹之皮可以為君子之容而蛇珠犀角象齒翠羽足以華服御而助觀美者也而摛詞之士又何可不手一編乎善乎蘇洵氏有曰比干有心而無術蘇秦有術而無心使有其心而兼有其術而又以其緒餘為文顧不大善也耶自洵為此説而人遂謂蘇洵從衡者也今余纂其書而又為諸䇿士解嘲人之謂我其又如何為人序宋論楊循吉治亂興衰之際君子不可以不深識之也自漢以來得天下者多矣其興也必有自其亡也必有為其間起滅代謝不勝多故而考以人事則可以即初而知其後用起而知其成而不難見也蓋天下之大勢有緩有促有大有狹而其為勢也不出乎在上者之仁暴在下者之賢否也蓋天下之勢或成乎上則其在下者不能奪也或成乎下則其在上者亦不能奪也蓋嘗就其勢之所成者而隨之以為輕重故明君在上則民俗於變佞人留朝則主權下移此其勢之所必至也故讀史者必深識天下之大勢而後可以與論興衰治亂之間也宋有天下三百年其間凡三大變其始也君明臣賢故興而趨治其中也賢不肖雜用故治而趨衰其末也純任不肖故衰而趨亡而其大勢之在下而不可奪者則以成於王蔡秦賈之流而分於遼夏諸國也考宋所以至此者蓋其立國也本用仁厚而其削弱亦率由之國勢然也而其當時進退廢舉幸不幸之事則有不勝其可喜可歎可悲可痛者焉春秋輔傳序劉繪國子助教陳道夫著春秋輔傳自言辛苦所得示豫請序之豫睹其辭乃多合豫之謬見者嘗作春秋論因略語道夫論曰古之注經者務簡後之注經者務煩古之注經者務簡而經益明後之注經者務煩而經益晦六經之注莫不皆然而春秋為甚夫聖人之經廣大無垠能會其趣引以旁通何所不逹然私者恣意以戾旨鑿者深求以倍義冗者纎文以尚苛誣者托辭以崇惑古今傳春秋者於四病往往蹈之近世胡安國潛心二十年學士無不謂之専邃其傳盡本程頥程頥傳不槩見於世大抵程氏兄弟著書於晚年多不自滿或藏匿甚至焚棄此望道未見之心是以學者於所著多不得睹其全自胡氏之説行天下皆宗之不求經而求傳故攻經文之意略攻傳文之意詳於經文則不能舉其辭於傳文則日夜苦誦之猶慮其不能堅是孔氏之經以簡而人故略之胡氏之傳以煩而人故詳之詳者愈熾而盛略者愈微而衰信傳之弊乃至於此蓋科目以之取士士不得不奔之也昔孔子西觀周室論史記舊文興於魯而次春秋特據諸國赴告之辭筆削從其簡便其不赴告者不復徵之列國無干褒貶之義多直書其事而義自見其有書國書字書人者皆事關大義明示其文無所隱祕然於進退豫奪好惡是非咸合乎人情之公彼列國赴告一時善惡或出嘉歎或出懷憤已燦然在人聖人因一時喜惡隨其赴告之辭約其文著其義以見賞罰此七十子所不能贊一辭者孔子揭其綱左氏列其目其纎細無關世道彞倫綱紀略而不敘故丘明常於經文之下别有附録皆此類也經之作大都發憤於五霸為其假尊王以遂私圖挾雄詐以愚天下後世乃明著其功罪如王者在上示其法誅其意才有無王之心即皆亂臣賊子不得飾文諱姦以逃筆下之刑戮天下茍有賢人君子聞孔子之筆必興慨歎以為王者不作幸有孔氏使姦雄之意戚不得肆莫不拊心嚙吻自快於岩穴之下故曰斯民也三代之所以直道而行也今世殊事易萬世誦其文追其事猶悵恨於當時况其目睹者乎豫讀五霸之文至葵丘城濮當周東徙之後秦襄公作西畤臚於郊祀諸侯蔑視洛邑久矣及桓文糾合列國責楚大義平日諸侯懷不軌暴戾窺伺於鄭衛之墟者莫不折心寒骨以赴盟趨會王綱可得而理矣孰知葵丘因侵蔡而始事城濮為釋宋以興師皆橫有私意所謂轉禍而為福因敗以成功者也聖人惡楚流毒中國乃大書以彰其功經於葵丘因侵蔡而書遂於城濮因救宋而書及若曰皆私意及其事而遂有功也至於不請命與正義明道五霸皆犯此義則又於書法見之焉仲尼自言曰其事則齊桓晉文其文則史其義則丘竊取之矣是以書法多在五霸然皆直書而無隱文使無五霸春秋可不必作邵堯夫謂皇帝王霸繫於天數理或然哉其他則本國重事諸小國赴告繫於勸懲所謂一字褒貶而為榮辱則皆從直書而義自見聖人豈如後世經生曲士刻削於一文一意為竒哉鄭伯克假于鄢玩經文則莊公失孝友之義自著何必以克為必勝必勝者襲公羊殺之則曷為言克穀梁曰能殺也皆有意也經義本明正此恣意戾旨類也春秋為含説曲刺矣楚殺其大夫得臣得臣違君之命以喪師楚子明法誅之書官與名所以深明子玉之罪左氏存子西孫伯二臣謂楚殺得臣晉侯將喜其莫豫毒此敵國常語耳聖人曷嘗惜子玉而責楚子之與六卒又何暇論晉再克楚再敗此深求倍義類也春秋為逆臣懷憤矣莒去疾自齊入于莒莒展輿出奔吳此展輿為弒君者立無所容于中國其罪明矣齊納去疾順羣公子之情納而無求大國之禮也經於小國事之大者乃書然皆直文以見功罪今於展輿繫國氏為責諸侯與立者則煩文飾苛類也春秋刮垢索瘢矣僖公十年冬大雨雪十一年秋八月大雩皆順時以紀災見有國者當知畏爾許翰以為先後陽穀之應若此則天于列國降鑒出政亦勞矣至文公星孛入於北斗天之應逺遂據內史叔服之言則托辭崇惑類也春秋假天設畏矣故曰四者之病胡氏仍襲諸家而攘除廓清之功猶有缺焉自科目取士亦爭取諸近而不及逺探前蹤而逺者為近所掩蔽故何邵公曰講誦師言猶加詆嘲又曰賈逵緣隙奮筆以為公羊可奪左氏可興悲夫悲夫後之議前亦誠易矣然經之義當廣而旁求取決於一夫之見則陋甚矣豫以為科目宜隨士人之意或取諸各家或發自已見於經有所著明而文辭鬯逹者即為通經之士使聖人闢乾闔坤之論不拘拘於老生曲士之手非千古之快哉今庠孰少年有中明經科於古傳注俱未及覽嗟哉魯春秋自三傳之後惟鄒氏鐸氏出最先其後董仲舒石渠論與劉向京房書多不見於世自何休賈逵逮晉杜元凱范武子唐啖助趙匡則卓卓有可考者程正叔作傳儒紳多歸之故有胡氏安國當宋南渡學士懷發憤而言若劉敞孫復皆不信傳而自注嗚者紛紛著文焉書金石例後張汝弼孫子曰聲不過五五聲之變不可勝聽也色不過五五色之變不可勝觀也味不過五五味之變不可勝嘗也而文章亦然其常可言其變可勝言乎蒼崖先生金石例舉其常而該其變誠有功於學者然其意欲使人以類推未必例盡於此外此皆非也蓋以諸家嘗有者為例偶未及者則弗備也如碑志無書子婦例設有以子尚主而受封錫者子婦可不書乎凡書不書視所宜爾然又有有例而不可為例者如栁子厚馬女雷玉李卿外婦志不足垂戒徒以長惡可為例乎醇儒莊士當有擇矣是故例雖有常變而其變也亦惟不戾其常而已不戾其常者義之當而已茍義之當何屑屑於例耶噫天下之事蓋莫不然豈獨文章云乎因書卷末以諗觀者明文海卷二百十二
