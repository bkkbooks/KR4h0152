body:
  text: 明文海卷二百十三餘姚黃宗羲編序四著述大學私抄序楊守陳蒙少受大學輒併其章句而味之佐以或問參以諸説已自謂通矣及誦之久味之詳乃反有疑焉其後誦益久味益詳疑亦從而益繁積數十載雖與天下友反覆講之疑終不釋也今家居無事日誦味之而疑如故乃取所疑經傳易而置之各録章句于其下而章句有與今易置之文義不同者亦僭用已説以蒙謂别之而其所以易置之故則詳具于各章之末既而誦且味之怡然理順乃淨抄成帙閟之篋中不敢以示人一日客或翻篋見之閲未半輒嘻且怒罵曰吾不意子之叛儒先而紊聖經至此也夫大學者孔聖之經曽賢之傳而朱先生之章句或問後學惟誦集之莫敢違也何物么麼乃敢僭易而妄解之其叛儒先而紊聖經一何甚哉疾毁亟焚毋貽是書纍也愚應之曰非敢爾也頗欲佐儒訓明聖經而患于不能耳王魯齋曰天下所不易者理也二程不以漢儒不疑而不敢更定朱子不以二程己定而不敢復改亦各求其義之至善而全其心之所安非強為異而苟為同也今蒙所抄縱未得乎義之至善亦足全吾之所安若其謬説只自謬耳是書豈被其纍譬如蜀之八陳石一時或亂之而千載如故也虞之五瑞玉一臣或失之而萬國自如也子安庸怒哉客頩頰而去余甚慚且悔然業已抄之不忍毁也用識之篇末跋大事記續編何喬新大事記續編凡七十七卷翰林待制金華王公子充所著公與宋學士景濂皆以文章學術顯于國初同典制誥後奉使南詔諭元宗室梁王把都不屈死之蓋公與宋公皆黃文獻公晉卿之門人齊驅藝苑世無異論然常考之宋公之文雄渾贍麗自蘇長公後鮮能及之公之文好模擬甚者剽前人之成説如贈郭士中序用馬子才子長遊蕭然堂記用曾南豐記學舍之類非宋公自成一家言者比至其學術亦有不同金李純甫著明道集説以孔孟老莊並稱宋公譏其偏駁是矣公序其書乃以豪傑之士稱之又何所見耶其著此書蓋以續東萊呂公所未就者也然東萊作大事記在朱子通鑑綱目未作之先綱目盛行于時此書可不作也其間豫奪褒貶又與綱目大不合者綱目以昭烈紹漢統章武紀年直接建安此萬世不易之論也此書顧謂抑揚太過乃用無統之類例以漢與魏吳並從分注不從朱子而取陳壽裴松之之説可乎不可乎綱目黜武后之號紀中宗之年每嵗書帝之所在蓋春秋書公在乾侯之例也此書乃以武后紀年則所謂秉筆迷至公者豈獨歐陽子哉李克用父子在唐雖未為純臣然唐亡猶稱天祐年號以討賊為辭名義甚正故綱目紀年先晉而後梁是乃春秋存紀存陳之義也此書乃先梁而後晉不幾于奬篡乎夫學如朱子著述如綱目亦可以止矣而公此書乃故為異同豈好竒之過耶公在建文間以近臣言其死節特贈翰林學士諡文節永樂初凡建文所設施悉皆革去無敢復稱其贈諡者正統六年義烏丞廬陵劉傑以公死節請加恤典乃贈翰林學士諡忠文云天台詩集敘夏鍭前輩及同時有一詩循循帖帖可舉口誦就使不足傳永遠而勤一世以有事于此亦自可念後輩及同時要當多方且存不可使自我泯絶去我為我後之人吾無如之何也已况餘善亦可厚民風革士習不可不用吾邑前輩詩亦多傳布在外增刻則前輩某人同時某人凡若干首將就梓賈詩范盤請豫言敘集竊嘗怪敘人之文之詩而狀寫過實無有限極高者議青天深者訿厚地不量廣狹而為奔放瀰漫亹亹不足之辭紫色不辨别門不察摸榻不校語意常近紀律不飭凡皆得為粹精竒作一無所慊恨以是相人之文之詩是亦足以誇後世矣則不忖後世亦有耳目言而弗應將不斥為欺罔為淺識有損于已無益于人殆未可用不翅然也夫操觚翰以出于述作之途誰不願文如韓詩如杜志存堂室而不及望其戶庭者尚多有焉今兹稱人之文之詩若是易易人見以為是不難吾殆嘗已至是矣于是人得自恕曰粹精是在我何所欠缺而須更力是稱人之詩之文之溢專以止人之進噫近世一切之文之詩厭厭不起為昭代之恥是雖世運使然吾見淺識溢稱不能無助由是言之序集而溢斷斷不可用然則宜何如不曰後世自有耳目後世自有耳目則莫若直書某代某郡某人作者以遺後世使自得之或遂及他善某功某德以明言必有實如此而止已書元張伯成杜詩演義後蔣冕楊文貞公序虞文靖公所注杜少陵七言律詩所謂杜律虞注者刻本在江隂行于天下久矣序不書年月惟書榮祿大夫少傅兵部尚書華蓋殿大學士官銜蓋在宣德正統間而宣德初年已有金溪進士元人張伯成所注杜詩演義梓行于世二書篇目次序雖微有不同而皆用文公傳詩與楚辭例先明訓詁次述作者意旨而以一圈别之其同者蓋十之八九演義篇首有曾子白之子昂夫所撰伯成傳稱伯成之文務在追古作者嘗以所著尚書補傳杜詩演義雜文若干手抄成編謂門人宋季子曰吾志在斯惟求吾師曽先生正之而已先生指子白也傳後附録獨足翁吳伯慶哭伯成詩亦有箋疏空令傳杜律之句則注杜律者乃張伯成非虞文靖明矣竊意文靖家臨川去金溪百里而近伯成所注杜律文靖豈嘗見而愛之其不同者豈文靖嘗筆削之歟未可知也文貞序有云或疑此編非出于虞蓋當時亦未嘗不致疑也暇日曝舊書偶見演義漫筆識之以諗知者題劉生性書李默豫年三十時頗悟世儒理氣之説之誤竊嘆士當以孔孟為師微文隱義舍是何所折衷焉易傳曰天地之大德曰生仁是也故孔氏亹亹言之子思得之曰仁者人也孟子又傳而得之曰仁人心也言何若是之精也故知理氣然後可與言心知心然後可與言仁知仁然後可與言學夫繼之者善也成之者性也孟子之言性善自繼之者言也雖然性善不若性相近之確也程子不得于五欲而無以解于性善之旨于是謂有義理之性有氣質之性悲夫人一軀殼也性豈有二哉朱子之言理氣闡程子者也至以費隱體用精粗先後明之玄乎玄矣然其説不能通于鬼神之德川上之喻與養氣夜氣之言何也故知心則知仁矣心者氣之管也氣無所于管則奔逸冥妄莫知底止雖有耳目手足將安用諸故仁者生理也合天人之道也頃遊海上得歸善劉子梧所著書讀之怪其言論與豫如同日而語所未協者十才一二然已竒文夫矣劉子強豫條訂其可否豫又何知知不詭于孔孟焉耳嗚呼世必有譏豫之妄作者况能信劉子之言乎劉子勉之百川學海敘錢福福聞孔子曰小子何莫學夫詩可以興觀羣怨事父事君多識於鳥獸草木之名此聖人之所為教也故善説詩者箋爾雅自草木鳥獸訓詁之間而以意逆之則興觀羣怨事父事君者得矣豈惟詩哉凡讀書者皆然後世教者趨於簡便學者競于躐等名物不分而髙談性理制度莫識而任作禮樂噫是何異于未見本草而用藥未别旗鼓而主兵者哉故知學不可不專而書不可少也顧所入何如耳然自尋章摘句之學興而類書出遂使經史子集之全篇有思而不閲者故援引雖侈而甚者或不知所出有識者往往病之然不猶愈於屏棄其緒餘鼎臠而未之知味耶宋人左禹錫裒雜説數十種為百川學海自謂醇疵相半而大要足以識言行理見聞似矣豫尤愛其所録者全書皆無破碎割裂之患輒欲效之而合諸家類書分門别類刪繁去復自經史子集録全篇外其餘稗官小説卓見祕論章分卷斷者輒録其全庶乎便而不略備而不煩得紀録之法云爾然而未之能焉頃者尚古先生華汝德購得古本百川學海喜甚曰近時刻本無有好古博雅者展轉假借疲于謄録訛舛相踵至不能讀而况欲求其文藝事迹義理哉人之患猶吾之患也既以所得本付梓擇良工刋之與天下後世共無吝惜且不計所費資福聞之以為難而往觀之則垂成矣先生請曰左録每書各釐為册凡百每聚數種成一帙以十千第之甚妙但其所分帙未能盡合豫意乃敢仍其舊帙而妄改分之皆以類屬而先後亦有説焉何如福閲既嘆曰此豫所欲為而未能者也昔鄭樵欲駕出司馬遷班固之上作通志略其論校讐則謂校書如統兵不患其多而患無綱紀條理耳福雅信之先生其有見于是哉前輩嘗語福以學者當先識義理次考制度次法德行服嘉言而後次之詞章字書博物搜異以窮其變先生之編次適有合焉其亦善論學者哉能以聖人興觀羣怨之法而讀之醇疵皆有益也正不必泥耳安得盡若先生者各出所祕以與之為福所欲為哉先生其有意焉福尚能佐之慕李鄴侯之藏發蔡中郎之祕而上請天祿之儲以成一編以左右今日聖君賢相所修之會典使考古通今者一覽而無遺憾不亦天下古今之大快哉文明之盛禮樂之興斯其時矣敢書諸其首以俟先生名珵汝德其字任光祿署丞世為錫山名族博物洽聞敦朴好禮而此則所可見者云重刋陸宣公奏議序錢福唐陸宣公之文權德輿序之甚詳而其奏議宋蘇軾所進劄子評之甚當因論其世宋儒雖有成説福則敢謂自漢以來惟諸葛武侯一人作配而已公之後未論也蓋武侯躬耕南陽不求聞逹若泊然無意于世者及感昭烈三顧之勤則立談之頃天下大勢舉在目中英雄角逐卒莫能逃其妙算公以少年文學感德宗之知遇奉天草詔動中事機內署獻納纎悉畢具遂使跋扈革心姦諛側目慨然以天下為已任者及遭讒南竄則閉門惟著方書五十卷又若退然無與于當世之故者然考其用行舍藏孰得而下上之哉且卧龍之望已重于草廬之下而簿尉之調僅拔乎書判之科然提全蜀之衆不能誅姦雄于大義昌明之日而操數寸之管乃克討叛逆于乘輿播遷之餘顧剛明信任之至吳魏挾一代之雄萬䇿撓之而不足精察猜忌之萌裴竇任匹夫之術一言間之而有餘故知山溪之豺虎易禦而城社之狐鼠難防逆順之大分易明而邪正之並進難别是以漢帝苦厄于勍敵唐宗自壞于腹心卒之營中之星既隕永貞之詔不起皆天也非人所能為也惟鞠躬盡瘁死而後已之言與上不負天子下不負所學之論至于今皎然與日月爭光是則福之所以亮二公之心者餘豈得而盡知哉至于立言之士惟知就事論事行之當時而有功垂之後代而無弊如是而已足以立天下萬世之常規則謂之經足以合天下萬世所共由則謂之道夫豈道自道事自事議自議經自經哉他若魏相條朝董之作而軾上公之奏自是臣子事君之妙術漢文帝思頗牧而卒得之魏尚宋仁宗相韓琦而謂賢于夢卜夫為帝王師友於彼先賢曷有損益而世乃以當代之不用為惜以後人之見知為幸甚或假時命以致怨尤焉者徒知涕泣之䇿殞生于賦鵩覆醅之玄俟知于掘地而不知聖人之言曰求仁而得仁又何怨不患人之莫已知求為可知是又福之所以亮公之心者也公為嘉興華亭人福為鄉後進少讀其文慕其為人每憶朱晦翁稱子遊列于文學謂吳人得聖道之英華而多文士乃敢謂自漢以來吳中文士惟宣公一人而已公之後未論也故雖濫竊文科論事未獲試于機會語道不敢托諸空言而終身景行之志則莫之敢或替焉者適萊陽于君世和以刑部郎中來守嘉興三年巨細張明上下熙洽稽邦文獻重梓是集屬記嵗月以著公之文又一幸也觸會初心論列鄙見以就正有道焉方今聖天子在上崇良黜邪求言如渴正軾所謂必善贄議論者而方雖在于古人才不假于異代則經筵講幄當熟陳是集制草章奏亦豈少若人哉福誠所謂野人負暄而遼東獻豕也已于君名鳳喈世和其字云杜律詹言序謝杰注杜律者衆矣而莫盛于虞以伯生聞人且東里學士為之敘也然是惡足以注杜乎哉説者謂為元人張性伯成所為而托之虞以顯理或然者歐陽原功撰虞墓碑不及注杜東里業已疑之則此之為贋書可必也余使琉球見彼國所讀書獨無經而以杜律虞注當之亦唐雞林賈之儔與苐賈能辨白傅之贋彼直以燕石寶少陵竊謂白傅幸而少陵不幸也今其書具存試諦視之若鶯啼修竹不知為梁孝之園犬吠白雲不知為淮南之宅宗臣之贊不知為蕭何頻繁之表不知為庾亮如意不知為王戎下韝不知為桓虞仗鉞不知為宗資褰帷不知為賈琮斷石不知為峽長流不知為江胡語不知有老子自寬不知有榮期息機不知有馬援如泥不知有周澤高門不知有鮑宣郫筒不知有李商隱行路難不知有袁山松烏皮几不知有謝玄暉與夫窮愁之本於四離獨夜之本於七哀糾紛之本于賈誼幽側之本于沈約真源之本于昭明青龍之本于葛陂朱栱之本於西樓伯仲之本於典論指揮之本於漢書莫打鴉之本於古曲欲教鋤之夲於卜居芰荷衣之本于離騷蕙葉之本於孔雀賦悲壯之本于漁陽撾奉引之本于聖公傳袈裟之本于四分律亦咸未之考焉甚者金碗泥於玉碗步簷訛為步蟾軍儲自供未稽府兵之制洞門對雪莫察掖垣之規高葉忽雲石之光打鼓昧發船之節芋栗忘其橡實諸天遺乎內典柑黃三寸莫憶義康之豪鵬礙九天弗紀楚文之異彩筆氣象謂以才而千人江漢垂綸恐因老而不録則其涉於蕪陋謬悠也滋甚曾謂聞人之注有是乎故以此解杜是為誣杜以此名虞是為誣虞宜毗陵氏擯而黜之者自毗陵説行世稍知其為贋不可謂無功于虞惜所釋寥寥無足深明作者之軌謂之有功于杜或未也用是不揣姑會其意而為之詞取材諸家發以膚見竊附古者以意逆志之誼期于備而約鬯而圓雖杜之全豹未之能窺而十管一斑亦時有見書成命之曰詹言園吏不云乎大言間間小言唐詹余之詹詹余言亦識小之義也若因間間而發皇荂之奧謹俟諸大方之家濯纓亭筆記序陸粲故紹興郡學訓導戴先生著書一編曰濯纓亭筆記余為緒正訛闕除其復重離為十卷華學士子濳取而刻之戴先生名冠字章甫吳之長州人也少穎敏篤學始遊鄉校已刻意為古詩文博覽無所不通而伉爽負氣髙自許與不能詘折徇物八舉不中以貢上禮部入試內廷奏名第一然例止得學官王三原自巡撫江南時則愛重先生及是方掌銓先生貽之書條列十事皆經國大務語不及私三原為斂容降歎李長沙為學士亦竒其文皆不及薦也在紹興久之與貴人語不相下棄官歸年七十一終于家瀕終猶歌吟不輟既而歎曰天夢夢乎世掝掝乎仳倠擁楹娵奢斥乎矯虔駟駕隨夷踣乎已乎已乎豪傑者廢死乎聞者悲之先生早有志用世自兵農水利之説靡不論究既連蹇弗試益泄其感憤于文辭廉峭精確多所風切平生未嘗一日廢書不觀得竒文奧義為抵掌自喜輒命筆識之是編所存僅什二三蓋非其至者然其扶樹教道繩枉黜邪之指亦略可睹矣君子曰夫士茍有以信于千載雖長隕溝壑不為辱也太史遷有言俶儻非常之人意有所鬱結則退論書䇿以抒其憤思垂空文以自見若戴先生幾是耶余少則知慕先生感風流之日遐懼遺文之泯墜爰敘列大校令後來者得考覽焉先生嘗作禮記集説辨疑未竟今掇其存者若干章附之編末他所纂述若詩文集尚數十卷藏其家內外二篇都序趙貞吉或問曰子曷編古今書為內外篇也曰豫意在備經世之法俾願治之主有所採擇耳經曰域中有四大而王居一焉王即經世之主也其位為統其臣為傅其令為制其事為志其道為典其德為行其才為藝其枝為術譬之於車輪轅輹轂軸蓋廂一不備非完車也能知七部之書皆以贊治而固其統也則於經世之法如探果於囊走丸於坂亦易知而易行矣或曰若此善矣曷為贅以出世通無乃悖乎答曰出世通西方化人之書也先秦之代聞化人之名未睹其書也一云周史奕曽一見其書後沒不傳至漢明帝世書入中國漸多漸竒英辟哲臣譯而保之于今六千餘卷矣閎深辨奧與儒墨之倫分光而並壘既云普拾遺文可獨棄此而不録乎烏得為贅且子亦聞出世義乎化人之法以浮生鼎鼎百年勞藴為世也往者為過去世續者為未來世三世流轉未有涯際而至人常住之心不與之流轉也此謂之橫出三世也乂此世者五濁混混名為欲界升之為色界再升為無色界然升者復墜墜者復升無已時也而至人常住之心不與之升沉也此謂之竪出三界也界即世也夫俾經世者得此常住真心而用之於化理其益豈小哉烏得為悖或曰然則曷為外之也曰內外者主客之謂也經世為主出世為客化人之道旅泊三界身世如寄其於世也非客義乎譬之家居為主人遊為客子內為主而外為客也此一人之喻也又譬之家有二子焉一耕而一釣則耕者名農而釣者名漁農在鄉而漁則在疆矣其地與業固在外也非有意於外之也史業二門都序趙貞吉客問曰經世通分史業二門何也答曰經世通者史氏掌故之書也統傳制志史之綱而紀事之方也典行藝術業之常而記言之章也史有綱而業有常則體有宗而宗有眼故化理可稽而道術不裂是謂史之良也經世之王其能舍諸客曰子學道者曷以史自居噫是烏知六經之皆史乎乂烏知仲尼為史之聖乎六經羣言之宗也仲尼萬世之眼也班固陳壽以下不足與於斯言也司馬子長自謂百代史官亦有意于尊孔氏明道術矣惜也統典未建傳行不彰制志鬱而不明藝術漏而不張務多而不要其宗好竒而未具夫眼夫多而無宗者必散也竒而無眼者必亂也烏能原化理而究道術哉豫謂此篇臚以八部攝以二門求免此散亂之咎已耳是故臚以八者常歸諸二也攝以二者常求諸一也客未逹請詳示之答曰今夫經世之位為統輔統之功為傅上所出令曰制下所建事曰志攝于史者其體恆異而同歸于記事之宗命世之訓為典翼典之德為行久習而工曰藝得訣而妙曰術攝于業者其體恆異而同歸于記言之宗是謂臚以八者常歸諸二也故知茍得其宗雖愈多而不散若夫史所攝體雖異而眼在于統統逹而天下之治出于一治一則外王之法行而傳制志皆隨之一矣業所攝體雖異而眼在于典典建而天下之道出于一道一則內聖之學明而行藝術皆隨之一矣是謂攝以二者常求諸一也故知苟得其眼雖愈竒而不亂客曰何以明之曰子亦知用師乎善將者虎鈐數明則兵益多而益善此不散之喻也乂知博奕乎善奕者馬目穴成則棊愈劫而愈活此不亂之喻也客曰唯唯重刻中原音韻序祝允明有文韻有詩韻有詞韻曲韻有古韻今韻古韻出於六經作文者用之古選詩用之今韻出於沈氏近體詩用之詞始于唐盛于宋迄于今其用韻猶詩也惟金元北曲乃用所謂中原之韻蓋因其國都在幽燕之區河洛相去不遙其方言如是也故為其言者每詆詩韻之偏而為詩者則至今猶不從之我洪武聖人亦既命儒碩定正韻如其説矣詩韻姑未論若北調之製可不嚴于此耶余也好樂故嘗自負知音謂四十年接賔友無一人至此者頗有言樂之書兹未遑示諸人每浩歎今日事惟樂為大壞未論雅部秪日用十七宮調識其美劣是非者幾士數十年前尚有之今殆絶矣不幸又有南宋溫浙戲文之調殆禽噪爾其調果在何處噫嘻陋哉大河王將軍廷瑞俊邁士也既刻詩韻復欲取周德清中原韻入板以示豫豫為之喜甚凡正音之説德清全書言之甚詳因稍為括取要旨數節授之令列諸前庶覽者可得其槩也繕畢就梓稍引之云爾煙雨樓志後序彭輅煙雨樓志既成或曰斯樓也藉土一壞結屋數楹耳奚以志為夫嘉江南名都雖物力殫詘而金繒粳稻之賦走司農供王府者浩穰踰他方頃者經術道藝之彥雲蒸豹變致身卿孤載筆石渠天祿者彬彬鴈行海內以文獻歸之嘉顧其地則乏靈山上遊之竒瓌瑋峻逈之觀獨鴛鴦馬場二湖枕郭縈帶洋洋澤國故昔人以煙雨名樓置之湖心地肺爰備壯觀談者謂嘉之有斯樓是為子都毛嬙潤眉髮而華衣履陳帷帳而置琴築也奈為前元所燬至嘉靖已酉始有訪厥遺址纍土成一洲嶼復建樓于上而仍其故名者曾未幾會海寇震蕩矛槊瘡痍不暇議樽爼覽眺樓用漸圮而洲莽滋蔓無能副名勝而騁遐矚也萬厯癸未郡守龔公為捐俸葺新之重階朱闌室稍丹艧剪蕪剃榛環植桃柳而召僧秉其鑰樓隂復營一磯長數武廣半倍之手作釣鰲磯三大書勒石置磯下蓋以任公子幾郡文彥也已郡得大魁適叶期讖于是青簾白舫翠袖黃衫醉壺觴而鬭笙管者紛紛纚纚踵趾不絶一遊一娛盡入騷咏好事者遂裒以為志付其籍於掌故俾共守而傳借使闕逸而弗載載而匪文不幾泯由拳語兒間一勝槩而隱賢大夫惠我人之德美也乎夫金焦之臺觀俯慿天塹武昌之黃鶴望極晴川巴陵之嶽陽吞吐洞庭雲夢以斯樓擬之誠不敢抗顏爭雄長然在水中央嵂屼南浦勢入冥漠縹眇虛無方其春水盛滿不見兩涯煙樹周遭雲霞蔚起綺縠千頃羲景倒懸島笛悠揚菱歌嘽緩文魚踊于波際高鳥鶱于層旻闤闠匹乎五陵吳越析為兩戒亦足以縱寥廓之觀而舒翛然之思矣况北有胥山乃子胥秣馬膠弓圖越之地也此二湖者范蠡功成遠引扁舟往來浮泛者也真如塔影即裴休悟後所捨之宅也瀕湖市橋曰宣公者陸敬輿風猷聲烈令人至今景企者也俯仰宇宙有流波陳迹蕭條千古之慨微斯樓孰與發之且地繇人勝景與襟期故同搆異迹同賞異情吾嘉當孔道京省衣冠軺傳雲擁公間與其賢豪契好觴咏樓中因之采謡問俗而謀諸野則斯樓之得公猶西湖之子瞻虎丘之應物豐樂醉翁之永叔其為斯樓重永永也輅歸田以樓而詩者幾且成帙然無崔皓杜甫語內愧之兹序志之末簡異邦有閲志者將諒彭生非侈言哉而猶然菰菼中見解也史記初覽序彭輅太史公生於西京盛時承庭授之學挾良史之才其作記也當得意處點綴模寫跌宕揮霍如秋隼乘風鶱薄髙雲而一不措力驊騮驟峻坂而下蹀躞奮迅不可控阻然五帝三代本紀則局趨窘束一似有苦而弗舒者何哉大約子長之文全倣戰國䇿又善作天然短長語風搖波蹴而生淪漣陳列情事煥然丹青圖畫之在目勒成一家此其所長也至于左氏傳句無冗字篇無懈句意括而辭省寓礱琢于規繩而上兼書之古質疏通易之恢竒淨潔則子長即欲效之不能也蓋均之能言之士而其才質亦各有所限云今人為文多欲效子長者余意子長受性本諒直慨慷其為敘傳盡發人之肝肺底裏無少顧忌諱匿即不遭蠶室之禍儕輩見其文必隂擠中傷之矣後之君子耽寵榮畏置罟左瞻右盼躊躇徘徊平居發一語每囁嚅模稜不肯洞襟直吐此其效子長僅獲色澤終鮮神髓雖似猶不似也惟大梁李獻吉者其人悻悻自好多所凌轢關中王槐野簡伉豁逹竒正苞舉兩公之文大類子長他或未之見也爾來慶厯間三尺童孺才搦管製場屋排比藝踽踽焉壽陵之步耳而開口無不曰史漢史漢然皆剽竊句字未鏡厥旨余因取史記一書擷其腴腯略削繁蕪名之曰初覽蓋為幼學挂一漏萬者設於以志芙容赤精爐錘初發可也編既就誡兒曰苐置之家孰勿外傳恐不我諒者紛起而誚讓焉其何説以解唐詩衍調序彭輅客問於豫曰詩至晚唐齷齪囁嚅無復飛揚奮厲之思奚以衍調之緝為子既有初唐祖調與盛之雅中之新不啻足矣衍而續之其贅疣也哉輅曰晚唐諸作視往撰誠漸凡下猶然詩也惟宋人造意發論不以興趣為宗而天下始無詩故宋可廢也晚唐胡可廢也夫文異于詩者何詩摹繪景也託之興寄而歡娛悲悒之情態隱隱寓其中不待顯露直言也直而言之則失玄虗藴藉之指而為有韻之文矣晚唐之于玄虛藴藉不尚存十之四五乎姑蘇黃姬水曰詩貴真而惡偽故如其真雖降而為元和開成猶之薦紳而效委巷之談俚亦雅也非其真雖進而為天寶開元神龍武德貞觀猶之市井而擬巖廊之度雅亦俚也此知詩矣昔壽陵之學行於邯鄲也邯鄲不能成而併失故步卒匍匐以返今之山澤野老與閭孰學究輩賦質駑下令之為錢劉皇甫已難之况王孟髙李楊盧沈宋耶豫之是編殆為若人設也且寰海之內學詩者不可勝數葛棗異嗜秦粵殊音安能人人而一之即髙明英偉之士亦有不以世代先後橫于胸臆而惟擇其言之善者矣貞元以下諸君子其翹然著稱者無論也他吟者率雕鏤艱苦童習而白顛其間豈無一篇半簡足愛而傳者豫憫其用心故寧過而存之明文海卷二百十三
