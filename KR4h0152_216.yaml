body:
  text: 明文海卷二百十六餘姚黃宗羲編序七著述山西碑刻目略序李濂夫山西堯舜禹之故都也秦漢以來碑刻繁于天下乃嘉靖癸未秋余赴官晉陽竊自念曰兹行也必得縱觀古金石之文如圖志之所載者比入絳州而絳帖及東庫本亡矣至介休謁郭有道之墓而蔡雍之𨽻碑亡矣渡滎河訪后土之祠而漢武之秋風辭碣亡矣上黨泐馮勍之碑榆次失荀藐之刻顧所存者皆宋金元近代之物可觀覽者絶少而漢魏兩晉諸名刻無一存者然則堅珉玄石果足恃耶昔歐陽永叔集古之遺刻謂物之終敝雖金石不能自久其感慨咨嗟之意溢于言表君子當知所以自立者矣余按部所見悉輯録其目以備考訂仍各疏其槩于本刻之下而題之曰山西碑刻目略貽我同志聊資博識云爾嗚呼好古君子豈無先得我心之同然者乎嘉靖乙酉冬十一月朔日浚義李濂川父書于鴈門行臺河南碑刻目略序李濂余少讀歐陽公集古録趙明誠金石録洪適𨽻釋鄭樵金石略竊愛其紀載三代秦漢以來金石遺文甚夥濓雖間見一二恨不獲遍閲其真迹而為之一快云或難之曰古人之文方册具載之矣何必覩其真迹而後快于心乎曰漁仲蓋嘗言之矣方册者古人之言辭欵識者古人之面貌以後學企慕古人之心使得親見其面而聞其言何患不與之俱化耶洙泗三千皆為賢哲而後世罕聞焉由弗得親見聖人之儀型爾金石質堅可垂永久以兹稽古庶不失真是故觀晉人之筆法可想見晉人之風猷觀唐人之字畫可坐得唐人之典則博雅好古之士舍是其何以哉抑古人之真迹傳世有久與不久者視石之堅脆而已矣今天下之石惟齊魯為最堅故秦漢以來碑刻僅存于世者莫盛于山東如泰山孔林濟寧州之所存者可考也其次莫若河南而河南古碑之最善者莫如酸棗蕩隂受禪尊號諸碑耳濂聞見隘狹未能盡見天下古刻以償夙願繄古里河南實古中原之地其間豐碑巨碣殘章斷畫幸存於風雨剝蝕之餘樵牧毁傷之後者尚有之矣蓋嘗訪造其下摹拓而歸墨本瓌竒照映几席每一展玩心志豁然始信漁仲所謂見古人面貌之説良不我誣也復念深山窮谷之中土壤埋沒荆棘隱翳未見于世者不敢謂無也然則余之斯録詎能盡河南境內之所有而無遺乎姑據所見裒輯成編且各綴以數語效顰歐趙萃玉河嵩聊以為一方碑刻目略俟後有所得則續録于左焉是為序夏周正辨疑會通序李濂濂聞之師曰春秋昭明如日月簡易如天地垂訓命辭直書無隱顧世之學者每求之於深奧而聖人筆削之旨荒矣按春秋隱公元年首書曰春王正月左傳曰王周正月謂建子之月也伊川程子乃為之説曰周正月非春也假天時以立義耳夫以程子之賢豈懵于此蓋泥於論語行夏之時之一言今夫論語者聖人論道之書也春秋者魯國紀事之史也其為書固不同而可以例觀耶胡文定作春秋傳乃曰以夏時冠周月龜山之在當時已不能無疑答書辨駁冀其改正而文定卒未之從此所以啓後儒紛紛之議也自是而後衆論蜂起或以為改月不改時或以為時月皆不改或以為時月皆改甲可乙否各持堅白不相下于是春王正月之旨遂為千古不決之疑矣嗚呼生今之世而反古之道仲尼以為災及其身矧春秋之作將以誅僭亂尊周室正一王之大法乃首改周之正朔其何以服亂臣賊子之心而使之悚然以懼耶斯理甚明無可疑者今不復深思熟講以窮至當之歸而固執意見之偏輒欲盡廢衆説曷若姑守闕疑之訓虛心研究以徐求其得失之為善乎屬者嘉靖丁酉北畿鄉試主司嘗以此為䇿問而力主葉時戴良周洪謨之説刋刻程文貽譏當世逾三科丙午南畿鄉試主司鑒北畿之誤復以此為䇿問大意謂孔子周人也嘗曰吾從周苟無其位而改周之正朔其何以訓天下哉試録一出海內有識之士咸是之孰謂人心無真見天下無公論哉濂屏處山林日長無事凡六經疑義竊嘗究心而于春王正月之旨尤數數焉乃參考羣言就正有道反覆思繹久之有得爰輯舊聞釐為四卷題之曰夏周正辨疑會通其前二卷所載雖於經旨有乖聊復存之欲使學者先覽庸知其誤後二卷所載庶幾弗悖經旨謹備録之以為讀春秋者之指南所謂昭明如日月簡易如天地者始曉然於天下而莫之能惑亦古今之大快事也區區自惟寡陋夫何所知詎敢仰測聖筆之萬一博稽衆論漫爾折衷如曰不然請俟來哲汴京遺迹志序李濂余未第時讀書吹臺嘗輯宋藝祖而下九帝起庚申至丁未凡一百六十有七年之事為汴宋春秋垂完而輟既叨甲科遂服官政固無暇及此丙戌免歸始得肆力纂述乃于篋笥中檢尋故稿散逸罔存于是追憶舊聞著汴京遺迹志二十餘卷冠之序曰粵惟秦漢以來天子建都之地曰關中曰洛陽曰建業曰汴梁曰臨安其間遺迹往事非藉圖籍以傳則迹與代湮事隨人滅陵谷變易城闕丘墟雖都人遺老有不能道其遺址之所在者矣然則圖籍之在寰宇豈可少哉今關中有三輔黃圖吕伋公長安圖記程文簡公雍録葛稚川關中記洛陽有楊佺期洛陽圖韋述西京記李格非洛陽名園記王正倫洛陽類事建業有史正志建康志朱舜庸建康續志陳魯南金陵圖考臨安有武林舊事周淙臨安志李心傳朝野雜記皆行于世學士大夫一展閲間故都遺迹宛聚目前不必履壤觀風訊宫問沼躡荒臺矚廢殿而感時懷古之情自不容己於卧遊之頃矣獨吾汴自五代以迄於宋久為帝都而紀載之書無聞焉幸微有孟元老夢華録一帙蕪穢猥瑣無足觀者余丱角時聞先生長者咸稱宋敏求東京記王權夷門記頗為明悉而未之見間嘗遍叩城中藏書之家暨海內博雅之士皆亡有也丙午之夏余避暑于南坰别墅幽居寡營神慮淡爽乃稍親筆研創輯汴京遺迹志成所愧聞見褊陋搜羅疏略櫽括靡周詮次無法詎敢曰與吕汲公程文簡諸君子之編並行于世哉聊亦托故實備考索舒慨惋資談噱補鄉國之闕文消山林之長日而已乃若區區刪訂取舍之意備見凡例所謂一代興衰治亂之故亦略寓于其中讀是編者當自得之事類賦序李濓宋博士渤海吳淑著事類賦百篇奉詔而為之注搜羅百家貫穿古今可謂博洽也已余覽是書未嘗不嘉其考核之精敘述之美而三歎其用心之勞也雖然余竊有論焉載述日多世鮮自得之學以得之之易也七十子之徒目不見載籍而斐然成章以得之之難也古之人有老而後見完本論語聘上國而始見詩之風雅頌適魯而始見易象春秋其得之之難如此故其濳心覃思強探力索一旦豁然貫通則為自得之學矣近代雕印實繁汗牛充棟故學者徹悟寡而剽竊多訓愈明而功愈懈如道德性命之説則有陳北溪字義程若庸字訓而真西山讀書記為尤精如車冕器服之辨則有朱晦菴儀禮經傳通解楊復三禮圖而陳祥道禮書為尤備如草木鳥獸蟲魚之類則有司馬公名苑陸農師埤雅而羅鄂州爾雅翼為尤悉是故古之人有終身不能通者今開卷了然而可曉然無體驗精察之功其于此心之自得何如也吳氏此書聚博為約最便近學且櫽括成賦諧以音韻誠類書之優者也展而閲之亦窮理格物之一助惜乎賦體皆徘匪古之軌蓋遵當時取士之制云爾開封守南宮白侯刻置郡齋請余序之余僭書所見於卷端如此甲午冬十一月朔嵩渚李濂書救荒本草序李濂淮南子曰神農嘗百草之滋味一日而七十毒由是本草興焉陶隱居徐之才陳藏器日華子唐慎微之徒代有演述皆為療病也嗣後孟詵有食療本草陳士良有食性本草皆因飲饌以調攝人非為救荒也救荒本草二卷乃永樂間周藩集録而刻之者今亡其板濓家食時訪求善本自汴携來晉臺按察使石岡蔡公見而嘉之以告於巡撫都御史蒙齋畢公公曰是有禆荒政者乃下令刋布屬濂序之按周禮大司徒以荒政十二聚萬民五曰舍禁夫舍禁者謂舍其虞澤之厲禁縱民采取以濟飢也若沿江瀕湖諸郡邑皆有魚蝦螺蜆菱芡茭藻之饒飢者猶有賴焉齊梁秦晉之墟平原坦野彌望千里一遇大侵而鵠形鳩面之殍枕藉道路吁可悲已後漢永興二年詔令郡國種蕪菁以助食然五方之風氣異宜而物産之形質異狀名彚既繁真贋難别使不圖列而詳説之鮮有不以虺床當蘼蕪薺苨亂人參者其弊至於殺人此救荒本草之所以作也是書有圖説圖以肖其形説以著其用首言産生之壤同異之名次言寒熱之性甘苦之味終言淘浸烹煮蒸曬調和之法草木野菜凡四百一十四種見舊本草者一百三十八種新增者二百七十六種云或遇荒嵗按圖而求之隨地皆有無艱得者苟如法采食可以活命是書也有功于生民大矣昔李文靖為相每奏對常以四方水旱為言范文正為江淮宣撫使見民以野草煮食即奏而獻之畢蔡二公刋布之盛心其類是也夫六朝詩序沈愷敘曰詩以微言風諭緣之性情三百篇尚矣風逸而不蕩雅麗而有則頌簡而統要義例不同體裁自别漢之蘇李因心師古獨超玄乘故其為詩辭質而腴興近而遠雖慷慨激烈猶有三百篇之遺魏則直舉胸臆間曠清適雖存之隱冥而風神猶振晉緣情述景機祕大露且縟靡未刋而格致漸衰下逮六朝去古寖遠風流日下倡為聲律靡靡然同風蓋偶麗排巧之習勝而溫柔和厚之體微矣大雅君子若在所棄而猶取焉者何夫作非神解詩以感興攻尚各殊好賞互異亦其勢也故騷者古之變選者騷之變律乂選之變其習愈勝其變愈竒今夫論詩者往往祖尚唐人片辭隻句流布海內爭起濯磨屏棄前好至白首吟哦務追並軌其容聲音響稍落凡調不類唐語輒為廢詩棄去弗録嗟乎唐固足尚矣然緣裔窮宗要有所自遡流逹支豈無本源故唐律者後人之軌範也而六朝者尤唐之所自出也直以六朝用文以掩質故始茁而未全唐人由質以成文故體備而並美唐太宗雖以英發蓋世一時賡倡窮靡極麗要之不出隋陳之習而凡其獵祕搜竒洋洋可聼者齊梁人又皆先為之矣衍而極于少陵太白風格體裁曲盡其變而詩至是彬彬然盛矣毋亦六朝者乃武德之先驅開元天寶之濫觴乎楚人有欲知海者不即指海示之曰黃河砥柱此海之源也溢而雲夢蕩而震澤雖其洪濤巨流變怪百出則固黃河砥柱之支也知唐詩之為盛不知唐之所自出殆泛雲夢震澤而忘其為黃河砥柱者矣惡乎可哉長谷徐子素善詩悟漢精祕契魏本宗而猶屬意斯集者夫豈漫有所及也將以偹天下之大觀因以章唐律固有所祖云書國風鄭衛篇後薛應旗季子觀周樂為之歌衛鄭皆曰美哉且謂康叔武公之德如是鄭雖譏其細亦不及於淫也及春秋列國大夫會盟多賦鄭衛詩以見志使皆淫詞豈肯引以自况夫子雖謂鄭聲淫亦未必淫奔之淫説者據此遂以風雨雞鳴丘中有麻木瓜采葛扶蘇子襟之類悉改序説恐非夫子刪述本指序説固未必盡是然漢時去春秋尚近經師傳授猶有影響至宋則愈遠矣此皆未敢盡信者也雖然詩亦稽實待虛之作未必專指一人一事而言必如孔孟説詩乃為得之如素以為絢憂心悄悄之類今皆可見下此則韓嬰外傳雖未盡能以意逆志而變動不居猶有古之遺焉吾思學者讀經但當以爾雅辨釋字義屏去訓詁虛心潛玩當有得矣皇明百家詩序薛應旗昔人謂文章關乎氣運而聲音與政相通豈不信然哉乃若詩以言志固文章之英華而聲音之橐籥也先王陳之以觀風諸侯貢之以獻俗實以寓慶讓黜陟之典而扶世立教之義蓋莫大焉使其末藝細故而無益於理亂則古昔盛時之君相方設官立政體國經野之不遑何乃為此不急之務耶周室東遷政教號令不及於天下行人不采風樂官不逹雅而各國卿大夫交鄰聘問猶以微言相感揖讓之間必稱詩以諭志蓋以别賢不肖而盛衰隆替亦將於是乎徵焉春秋之後聘問歌詠不列於侯國學詩之士逸在布衣而閭巷之辭無復上逹漢武立樂府而采歌謠于是有趙代之謳秦楚之風亦可以觀風驗俗而知厚薄延至晉魏六朝多緩弱綺靡之詞沒風諭興感之義唐人以詩取士作者輩出風流習尚大雅日漓而藝林詞客顧皆極口推尚模擬誦法嘗自以為不及蓋七八百年于兹無有異議直謂宋人無詩元以來雖學唐總不能得其肯綮此其言若出一口而於身心性情世教民彛關係與否置弗論也嗚呼亦甚乎其惑且誕也久矣吾友是堂俞君謝憲長家居杜門溫繹舊所讀書間乃盡索我明諸名人詩彚次成編凡數百家家為刪定綴以小序題曰皇明百家詩以彰昭代人文之盛刻成屬余序之余謂俞君平生規為經略欲有為於時而弗克究其志以歸掩目淵濳於世若無涉凡所以維持世風警切時事者有不能以但巳也其為是者蓋自附於古人陳詩采風之義而豈為騷人墨士立赤幟哉夫苟取其所編而遍觀之則我明自開國以至於今氣隨運復文與時遷而人品士類汚隆高下一諷詠之間可以知其大都矣秉陶鈞以斡旋元化一匡皇極者將不有徵於是耶余故歷述詩之為教以明俞君之所以集是編者匪直藝焉而已也六朝詩集序薛應旗今天下論詩者謂不關理論理者多病詩一及六朝不遑究觀而襲聞傳聼已槩擬其侈靡矣嗚呼詩本性情衰正汙隆理無不在不有獨見率同耳食未可與論詩可與論理也乎哉故曰商賜始可與言詩也或謂六朝詩惡得與三百篇比不知先民所詢聖人所擇狂夫采薪咸為陳列故仲尼歸衛而正季札聘魯而觀蓋未嘗遺乎列國之風也齊梁間人士獨非閭巷歌謡棄妻思婦類耶昔王通氏聖之修者也其所續詩今不槩見然觀其稱士衡之文以及靈運之傲休文之冶鮑照江淹之急以怨吳筠孔圭之怪以怒謝莊王融之纎碎徐陵庾信之夸誕孝綽兄弟之淫湘東諸王之繁謝眺之捷江總之虛顏延之王儉任昉之約以則是其所續者大都皆夫人之詩耳四名五志意義所繫豈微乎哉然則斯集也固不特漢魏之餘波初唐之濫觴也矧夫諸侯不貢詩行人不采風樂官不逹雅國史不明變而列代之風泯焉久矣論世以徵化者于斯可勿之觀耶苑洛先生志樂序楊繼盛世之談經學者必稱六經然五經各有專業而樂則滅絶無傳論治法者必對舉禮樂然議禮者于天然不易之外猶深求立異可喜之説至于樂則廢棄不講全德之微風俗之弊恆必由之良可悲夫然律呂與天地相為終始方其隱而未彰也天既生哲人以作之則于其既晦也天忍任其湮沒已乎闡明之責蓋必有所寄者先生自做秀才時便抱古樂散亡之憂當其嵗試藩司聞諸督學虎谷王公云律吕之學今雖失傳然作之者既出于吾人則在人亦無不可知之理特未有好古者究心焉耳先生于是惕然省悟退而博極羣書凡涉于樂者無不參考其好之之專雖發疽尋愈不知也既而得其説矣于是有直解之作然作用之實未之悉也自是苦心精思或脫悟于載籍之舊或神會于心得之精或見是于羣非之中若天有以啓其衷者終而觀其深矣于是有志樂之作曰志云者先生自謙之辭也非徒志而已也是故律生聲鍾生律馬遷著之矣而律經聲緯之遞變體十用九之明示則未之及也圍九分積八百一十分班固著之矣而管圓分方旋宫環轉乘除規圓之圖則未之及也六十調八十四聲蔡子著之矣而起調則例及正變全半子倍之交用調均首末長短相生之互見則未之及也六變八變九變之用周禮載之矣而以黃鍾祀天神以㽔賔祀地祗以太簇享人鬼一造化之自然以黃鍾一均之備布之于朝廷宫闈實古今之絶唱則又有出乎周禮之外者也宏綱細目一節萬變信手拈來觸處皆合樂之為道盡于是矣志云乎哉其于先儒世儒之圖論備録不遺者是固先生與善之心然亦欲學者考見得失焉耳方其始刻之日九鶴飛舞先生之庭者久之識者以為是書感通所至觀仰秣出聼之説則鶴之來舞也固宜而其得樂之正也此非其明驗矣乎昔人謂黃帝制律吕與伏羲畫卦大禹敘疇同功然卦疇得程朱數子而始著律吕得先生是書而始明則其功當不在數子下豈曰小補云乎嗚呼太和在成化宇宙間故先生所由生太和在𢎞治宇宙間故是書所由始太和在嘉靖宇宙間故是書所由成則其作誠不偶然也後之有志于樂者苟能講求而舉行之則太和將在萬世之宇宙而先生之功至是為益大矣然不苦心以求之何以知是書之正不得其説而精之乂何以知盛之言不為阿私也哉噫盛不敏雖學之而未能也講求之責深有望于同志君子云水利全書序周祚嘉靖甲午僉憲西蜀朱君子和按水利兩浙顧昔失常典民不可守俾各郡列利害總其綱紀成一家之言名水利全書余讀而序之紹興海水北跨數百里害之大者也古者立國居民疆理為上川澤為下四海之水常弱中國之土浮焉是天地之統會經理之攸宜也故四海祀常尊受璧沉祭出于川澤紹興東海支流也東望扶桑南瞻溟渤其所抵極埒焉民廬舍聚落肥淤之田橫亘屬縣亦數百里去海岸不百步隄防潰決湛溺立見俟退排水澤而後居之民不堪矣大率隄防治否水害之深繫也其治之法與治河異河水行地中海水出城外大禹治天下之水不及海也司馬遷河渠一書止于河患是無治之也往五六十嵗海水從漁浦入阡陌中經百里包白馬諸山後入于海民雖為陂障膏腴決裂矣前太守謀塞之魚鱉之地桑麻相望其利百倍民今食之無窮已也夫海水善下引而歸之土中不幾相漂乎賈讓治河之説治土而防其川猶止兒啼而塞其口彼之所為兒口此則所為牛後矣治海而不塞日見其難矣繕完隄防勞費無已雖聖人作用罔能越是圖書較明彰彰可覩也若夫陂塘江湖民逐水草轉而衣食之則在所簡焉漢書云會稽東接于海南近諸越北枕大江是會稽即今紹興也余嘗登禹陵之山而深有慨焉神禹治水畢功于會稽夫難者先之易者後之聖人行事本末之序也觀其會百王朝萬國曷嘗他務哉則會稽之水其略可知矣朱君不遺巨細俾皆書之其知今昔之異宜不忘于隆盛也耶重刻文選序田汝成周衰先王仁義禮樂之教其實不布于治功而其華散于文墨縉紳之流操觚引翰者各以有所得恢張緒餘垂聲藝苑蓋起自嬴秦盛于漢魏襲于六朝靡漫極矣傳曰文武之道未墜于地賢者識其大者不賢者識其小者先進識者托其實後進識者獵其華吾因是而知先王教澤涵濡波及後世者至深遠也梁太子蕭統監撫之餘招徠才彥玄覽前載芟穢披珍存什一于千百分門萃類為書三十卷題曰文選自唐以來文章者家視為標凖鴻儒碩學罔不取材可謂總七代之英靈流萬古之膏馥矣宋時學者不解文銓妄加參駁謂統拙文陋識去取違宜若董仲舒之對制劉向之敘戰國䇿王羲之之記蘭亭陶淵明之賦間情則遺而不録相如賦上林引盧橘夏熟揚雄賦甘泉敘玉樹菁蔥則槩收之而不辨其謬以此譙統暴瑕掩瑜不原作述之旨統不云乎若以立意為宗不以能文為本者今之所撰抑又略諸蓋能文固先于立意而立意者未必專于為文故議關國是事載史官雖董賈之言亦所不採若體屬詞章思歸藻翰即揚雄符命乂何擇焉大抵選例崇葩華而略簡淡執規觚而齊體裁是以考辭按部璨若連珠大篇短章咸歸穠郁詩如淵明文如蘭亭非不皎然清逸也苐使掇入集中揆之諸家覽非一色矣若夫間情一賦明為白璧微瑕蓋處士興寄沖寂不當學步艷詞勸百諷一自舛平生若以淵明之故槩奬為佳是寶夏氏之璜而忘其考也上林甘泉宗工傑構乃直以片謬致捐是憎蟻鼻之缺而棄純鈎也况統集衆見以取裁可否于甲乙者必且審矣而一以譙統不亦固哉邇來更有文選增定廣文選諸篇自附于統彌縫其闕而匡救其謬殆為末學膚受不知而作較之宋儒抑又甚焉故愚嘗謂文選一書譬之園林也怪石蟠松竒花異卉以延賞適而已楩楠豫章非所植也乂譬則散樂焉吳趨楚舞擫管彈絲以娛眺聼而已而一唱三嘆以雅以南非所陳也述作之旨機軸存焉執是而求羣疑可釋矣唐時李善始為箋釋吕延祚病其未備乃集吕延濟劉良張銑吕向李周翰五人重加疏解後人併善注而傳之名曰六臣注凡六十卷蓋皆奏進于玄宗者故稱臣焉錢塘洪君子美得宋刋本重鋟梓校讐精緻逾于他刻且子美之文雅有足稱者豫為敘其首簡而并著所以解笑于統者以平章選例云先夫子曰田汝成字叔禾錢唐人廣西參議所著炎徼紀聞人稱其有司馬之致然以文成之撫為處置失宜豈必如韓雍之斬刈如犬豕乃為得乎私記叔禾嘉靖丙戌進士西湖遊覽志亦叔禾所著西湖遊覽志序田汝成海上之士往往談蓬萊三島之勝恍惚渺茫莫可蹤迹豈若西湖重青淺碧抱麗城闉陸走水浮咸可涉覽况帝都之餘藻飾華富即海上之士所稱珠宮貝闕琪樹瓊花當不過此宜乎勝甲寰中聲聞遐服也然海內名山率皆有志而西湖獨無詎非闕典曩嵗五嶽山人黃勉之嘗謂余曰西湖無志猶西子不寫照霓裳不按譜也子盍圖之時豫敬諾而五六年前宦遊無暇逮乎宅憂除服聊寓目焉風景不殊良朋就世言猶在耳負約已長因念古人踰祥援琴將以舒其菀結聞笛作賦用以感於幽冥豫不敏竊比山水于笙歌擬呫嗶以酬諾一物二義爰契我心于是紬集見聞再證履討輯撰此書敘列山川附以勝迹揭綱統目為卷者二十有四題曰西湖遊覽志裁剪之遺兼收並蓄分門彚種為卷者二十有六題曰西湖遊覽志餘客有病豫此書多述遊冶之事歌舞之談導欲宣奢非以長化也豫則以為志者史家之一體也史不實録則觀者何稽焉故太華終南守國者恃為金湯之固武夷鴈蕩棲真者隱為解化之區嶽麓鵝湖講學者闢為都授之所西湖三者無一居焉而欲諱遊冶之事歌舞之談假借雄觀祗益浮偽爾史家不為也客又病豫此書名繫西湖而傍及城市核實不符豫則以為西湖者南北兩山之秀液也南北兩山者西湖之護沙也滋靈釀淑條貫同之若非探本山川因原别委則西湖之全體不章故旁及城市正以為摹寫西湖也學使文谷孔公嘗覽而嘉之曰殆郡史也美刺並陳欲為鋟傳而以憂去侍御紀山曹公亦欲鋟傳而復以憂去至是侍御劍泉鄢公按部兩浙政肅風清博雅崇文垂情藝苑布憲之暇訪及此書覽而嘉之謂郡守嚴公曰是誠郡史可以傳矣嚴公敬諾屬二守丘公綜理之而民部秋軒薛公水部洪宇王公咸榷稅于杭聞兹盛舉亦捐資焉未浹四旬勒梓已竟竊愧才綿識昧筆削無方符篆詅癡虛上官之雅意楮宜覆瓿貽大方之哂言若肯苴其闕略弼其訛謬裒為别集被我寵光是大願也明文海卷二百十六
