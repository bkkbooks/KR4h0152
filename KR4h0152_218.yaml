body:
  text: 明文海卷二百十八餘姚黃宗羲編序九著述唐詩品彚選釋斷序屠長卿夫詩由性情生者也詩自三百篇而降作者多矣乃世人往往好稱唐人何也則其所託興者深也非獨其所託興者深也謂其猶有風人之遺也則其生乎性情者也夫性情有悲有喜要之乎可喜矣五音有哀有樂樂和聲能使人歡然而忘愁哀聲能使人悽愴惻怛而不寧然人不􅍦好和聲亦好哀聲哀聲至于今不廢也其所不廢者可喜也唐人之言繁華綺麗優遊清曠盛矣其言邉塞征戍離别窮愁率感慨沈抑頓挫深長足動人者即悲壯可喜也讀朱而下詩則悶矣其調俗其味短無論哀思即其言愈快讀之則不快何也三百篇博大博大則詩漢魏詩雄渾雄渾則詩唐人詩婉壯婉壯則詩彼宋而下何為詩道其亡乎廷禮髙氏選唐詩品彚其所取博則博矣精未也乃黃觀察公選之加精焉而又為之釋斷然後唐人河嶽之精靈歷百千載如在乎則觀察公之勤奈何可渺小也宗忠簡公遺草序張維樞華川蓋忠簡公故里也樞待匱兹土拜公祠下者逾六春秋每凜然神肅日閲邑乘讀公勸回鑾疏表白日寒而悲風蕭也輒慨然憤憊不能句因從汝文君索藏草倡梓汝文曰宗煥自六世祖蓄于金未復舊姓乃每世無念敢忘宗相與抱遺書而泣愧煥無能光宗祝幸大夫有意圖之也敢不共役樞既卒業謹序曰自昔豪傑之禎人國也竪而為功與甲胄異不得已宣之而為言與紳襟異是其始也莫不冥觀昭曠酌究天人淵然於玄淡之養而洞然於道德性命之奧故一秉羽能開能格能攘能平一投羽猶能以其匡定經緯之猷為訓為誥為雅頌夫誰非天子之力臣而兼詣如是良由元本邃也三代斌斌質有文武嗣後登將壇者鮮不慙德斯文而獨南陽之梁父不減有莘之耕南陽之二表不減有莘之訓彼其處則寧靜淡泊出則鞠躬盡瘁鼎足雖分三立何愧嗟乎公之雅意南陽也公自知之婺諸先進若宋文憲之題公誥王忠公之弔峴山丘壠也亦雷然南陽許公矣今觀夫留守經略犖犖節制勸駕表疏烈烈義膽靜居記題超超玄悟甚矣公之似南陽也樞謂豪傑不出世不能擔世不淡養不能盡瘁蜀道不玄悟不能盡瘁汴京有本者言如是武功亦如是苐公之捍汴京也比南陽更瘁當南陽居茅廬時上結魚水下駕熊羆及末勢始鬱於仲達之甘受巾幗若公所事何主也建炎狃偏安而忍淵聖北轅雖纍表二十四疏猶左徒之問天此一瘁也南陽鼓即出糧盡即還宫府中誰敢營窟公外有尼雅滿烏珠輩百戰之徑敵而內有汪黃二豎之鼠狐一手獨拍疇為喁和瘁二南陽之許驅馳也日在晹谷神王氣舒揮戈尚退三舍公頭顱種種始提孱卒摩堅壘䇿夸父步而馳􅛇嵫雖心之長何及於髮天肯以尚父鷹揚之年假公不瘁三以是三瘁也淚安得不枯而背安得不疽嗚呼方事之猶可為也其君相沈湎於花石聲色公﨑嶇一倅車耳逮二主蒙塵肉食者羣拜敵不暇公獨能壯汴為金湯而撫揚進王善契丹兒輩為爪翼臣有白首備百瘁不愛肝腦以衛社稷君相忍掣之肘乎雖然磁州之駕公實挽之武穆之命公實活之誰挈天下半還宋者公耶公呼雖苦公目可瞑今遺草具在樞不遽訓誥雅頌公直拊心而指之曰是猶龍之吟而氣吞金人之餘魄也華川自不乏文武夫亦知所本乎其人手此編然後可習俎豆而行軍旅矣周易參同契解後序張維樞參同契一篇後世談玄家多宗之然淺者至不知其爐鼎鉛汞龍虎丹候為何物而其詭而褻者復迂術于彼鄰如道光致虛輩明犯輕敵喪寶之戒至于侮聖而侮經是且不足供祖龍一炬胡言解也自宋儒朱紫陽更為之注讀契者始知魏師寓言借事隱顯異文其説似解周易其實假借爻象論作丹之意此于解契正矣顧猶以儒家證契以非契證契也夫契者虛無安靜之功而宓羲黃老之旨易不言黃中乎言艮背行庭密藏逆數乎符不言隂陽相推乎言至靜性亷天地反覆乎老不言有無竅妙乎言橐籥守中深根固蒂乎是魏師所契而諸注所未盡發者也維樞埋迹案牘何知道而喜問道間閲玄門諸家言有云人身一小天地也天地從混沌既位無心無為一任日月漸營如鈞冶焉天地冶大故生萬物人人身冶小只結一嬰今學丹者不知吾身中有一種日月火候即天地日月火候而妄謂須取彼家成丹是謂此天不能生物復籍彼天以生之也其可乎維樞讀而信之已蚉負霅上屢過玄栖山中訪道于朱大復先生得所謂靜有二功其靜功與三寶章合而有功則在調停文武之火令精氣神盡歸土府水土交維性情還元無生有有入無為大周天復而又復維樞心記手録而益信之謂以玄契契以不解解參證之魏師自當首肯近西秦鹺臺張公委刻西河太翁契注及大復先生箋維樞獲卒業而謬用管窺也先生閉關青山十五年謝浮榮而捐雜藝于性命雙修易符老三宗從杳冥恍惚中昏默悟透宜其超超玄著乃太翁理南平時簿案之所總集驚江絶棧之所驅馳尚能割棄塵纍出度世維世之見而手為注非胸具真契不及此公方奉璽書按鹺吳越懲貪植良清沙飭蠧為商民請命尤獨發笥中祕質正先生而以度世維世之遺書布之國門非仁心為質至孝錫類不及此因是知太翁貽慶之逺與公昌厥弓冶之未有艾也昔曹平陽為齊相聞膠西蓋公善黃老言避正堂以請得其清淨之教以治齊而寧一海宇李子堅用忠直顯名陽嘉間而其翁孟節善風星占二使星向益州分部知使者入益隱德不耀人莫知之者而報乃在子堅今太翁度世維世之德且𢎞于孟節而公之以繼志錫類一念印證大復先生也不減于蓋公之堂精治身而緒及天下悟三宗而補紫陽所未盡然後歎公家庭間淵源玄逺而益見道光致虛輩之陋也憶素遺孤跋周思兼薛敬軒有言聖賢之言簡易而明白異端之語﨑嶇而茫昧余謂儒家語亦有不易曉者如主一之謂敬是也余與王以仁交遊二年適將别去偶論主一之義忽有所契平生不決之疑一旦遂釋然朋友之有益于人如此或問主一之義云何余默然無以為對良久因以此册為喻此册或大書其前或詠歌其後或敷諸議論而為文或托諸丹青而為圖紛然不齊要之不出於孝思無第二義也此之謂主一余他日以問以仁以仁曰然性理抄跋周思兼余少時與前輩論議至性理之學大率能成誦余每自愧以為弗及後遊南北或與諸生較藝每有問罕能舉其要領蓋近世學者與前輩相逺如此今年秋中條李子以向時所抄性理節語見示為之歎服今人誦習帖括往往取髙第至於本領學問視之若第二義然中條乃能肆力於此辟之問水必窮其源登山必陟其巔可不謂知本之學哉唐人常言文選爛秀才半當時習尚與今相似然韓栁一出而陳言一切盡棄捐勿用天下事未可逆料要之用力於根本者猶可救藥也詩紀序張四維右詩紀前集十卷詩紀百三十卷外集四卷詩話及識遺為别集又十卷北海少洲馮先生所纂輯也光生以雋才大雅髙步一時見世之為詩者多根柢于唐鮮能窮本知變以窺風雅之始乃溯隋而上極于黃軒凡三百篇之外逸文斷簡片辭隻韻無不具焉秦漢而下詞客墨卿孤章浩帙樂府聲歌童謡里諺無不括焉七略四部之所鳩藏齊詢虞初之所志述無不搜焉始事于甲辰之冬集成于丁巳之夏嵗凡十四稔先生宦迹且遍四方矣遇通儒博士無不出而訂焉驟見之編郡邑之載金石之刻無不致而核焉嗚呼先生之加意斯編其可謂勤且篤矣方甲辰始事先生時守河中維與分讐之列兹當告成敢續言于末簡曰詩之道尚矣夫人哀樂之心感而歌詠之聲發永言嗟歎成文諧音蓋自結繩之代已固然矣然情以人生文由代變古詩自宣尼刪後罕有存者其軼文略僃于斯是以質文之變莫得而詳焉漢風所宗造端蘇李東京揚其流波建安僃其氣質逮于江左托意虛玄繼以齊梁綺縟陳隋輕艷而詩之變極矣中間作者若張蔡曹劉潘陸顔謝江沈徐庾莫不虎視蛟騰抗心特異思以駕前賢之逸軌障當世之頽瀾然而繁音曲節每變益工品格風標沿時遞下豈所謂聲音之道關于世運者耶代歷既遐流風寖微後之學者莫得涉其津涯先生于是會萃遺失裒為成書詩以人系人以代分代以時次火齊明月的皪錯陳鏞磬柷敔翕如並奏使藝林之士因詩考人因人論世得以繹祖述之淵源第古今之優劣獵皇王之菁華而窮性術之變化也豈不偉哉明興詩人承宋元餘習頗乏逺調𢎞治間北地李先生獻吉始以唐風為天下倡一時人士宗之文體一振焉及其敝也株守名家矜其學步千金享帚斯不逺覽之過爾余故謂先生是編之集大有功于雅道云書宋紀受終考後謝復宋紀受終之事諸老先生辨之詳矣而僕竊猶有疑焉授受大事也太祖臨崩之際顧命大臣無一人在旁而又散遣宫人使致疑于斧聲燭影之間此其可疑者一也君薨大事也史官宜大書特書以詔示天下後世太祖臨崩之後正史實録皆不載若為尊親諱然而見于簡䇿者徒出于雜説之紛紛迄今卒無定論此其可疑者二也或者以為太宗篡弒之禍實太祖有以啓之彼不傳于子而傳于弟豈誠心與直道哉特一時迫于母后之私命勉強從之逮其晚年亦有悔心不然授受之際文武大臣胡不使一人知之卒致宋后有召德芳之舉此其可疑者三也其崩也或以為壬于或以為癸丑或以為夕或以為夜之四鼓况宋后母子託命之言其辭甚哀其志甚懾而太宗怒猶未怠至于不成后服此其可疑者四也若改元一事開國之初一時人才理會不得誠有如吾朱夫子之所言者而秦王德昭俱不得其死雖非太宗手刃蓋以知其無傳位之志故相繼滅亡此其可疑者五也嗚呼因其迹可以得其心推其顯可以知其隱太宗至是幾五百年何議者之不一耶為胡陳楊貝之説者皆以太宗為弒石門梁氏略書之保齋劉氏力主之若黃文憲公之筆記宋學士之敘略則明其非辜至吾篁墩程先生篇為之論句為之辨視諸公益加詳焉其所以明太宗無篡弒之迹可謂詳且審矣然愚嘗聞之師曰夜思宋太宗燭影之事深為太宗惜之人須有行一不義殺一不辜而得天下不為之心方做得堯舜事業不然鮮不為外物所移者愚恐太宗不能無愧於此有不待其迹之顯而知其心之隱矣春秋書許世子止弒其君買原其心本非弒逆特以其不謹君父之疾而示履霜之戒爾宋太宗之事其有無俱不必論當太祖大漸之時所謂危在頃刻為嗣君者宜旦夕環侍而不可須臾離也顧乃退而安寢一聞王繼恩之召不俟駕而步雪入宫不待請而排闥直入其志蓋在貪位而不在君也是誠何心哉以許世子律之其能免春秋之誅乎此則僕之妄意而諸公所未及也極知狂率無似不足取信于當世大人先生姑筆之以俟後之君子楊鐵崖詠史古樂府序章懋昔者元氏之有天下也治率自用而不師古禮樂刑政無足稱述獨文章一脈代有作者未嘗絶響若虞伯生范德機楊仲宏揭曼碩歐陽原功馬伯庸薩天錫暨吾鄉黃晉卿栁道傳諸人各以其詩文鳴於時莫不涵淳茹和出入漢唐郁乎彬彬何其盛也然其時衆作悉備惟古樂府未有能繼之者于是會稽楊鐵崖先生與五峯李季和始相倡和為漢魏樂府辭崛強自許直欲度越齊梁而上薄騷雅偉乎其志哉至是詠史則季和每推服鐵崖為上手鐵崖亦自謂余用三體詠史用七言絶句體者三百首古樂府體者二百首古樂府小絶句體者四十首絶句人易到古樂府不易到至小樂府則他人不能惟吾能之若此編所録者特其一體耳成化癸已御史中丞江浦張公巡撫閩中涖政之暇出示某而語之曰鐵崖先生平日所為樂府詩最多今僅有存者天官少宰葉公與中曩為僉都御史出撫廣東嘗得其門人吳復所編若干首已鋟諸木矣近得此帙于前江西提學黃先生純之子知州􅚇喜其詞古意古可興可觀讀之使人懲創感發隱然有三百篇之遺風特未得其全集耳兹將刻而傳之子盍為序某辭不獲命乃復於公曰自王迹熄而詩亡一鑾而騷再變而選而樂府而歌行諸作至三變而為律作者徒知從事聲偶之間而不能馳騁以極夫人情物理之妙其去古也逺矣獨先生之作逸于思而豪于才抑揚開闔有美有刺陳義論事婉而微章上下二千年間理亂興亡之故若指諸掌而其命辭皆即史傳故實櫽括而成叶諸金石若出自然昌黎所謂橫空盤硬語妥貼力排奡者先生有之是宜公之甚好而欲永其傳也雖然鐵崖法乎漢魏者也公且好尚之若是如有國風雅頌之音則其好之宜何如哉公之于文辭且欲復古而况為政豈不欲行古道而使今之天下復于唐虞三代也耶斯則某也深有望焉乃若先生名系爵里與其文行之詳見於宋太史景濓所為墓志者已暴于世矣兹不著云六書精藴序魏校嗟周之衰天王之弗考文也久矣秦以凶德閠位強取文字而同之乃後世惟李斯是師先秦古文則既闕有間矣其别出者多列國未同之書然則文終不可考與曰文者非他也心之畫也所以體天地萬物之撰也古文先得我心之所同然耳心之所同然者何也天然而然也心學而明也貫若一矣古人之心學大以密倉頡之作六書也猶之伏羲之作八卦也若剖混沌而開之其道易簡愚夫愚婦可使與知不知不足以言道乃其精藴則有學士大夫不及盡知者是故傳久則易以訛有王者作議禮制度而考文心法同也昔者周宣嘗考文矣古文之變而為大篆也史籀所述也文字寖以備矣開闢而後與有功焉者也心法之微傳與否與今固弗能知矧秦之斯彼何人兮而其心乃敢曰古亦莫豫若矣兹其萬惡之根矣大篆之變而為小篆也斯實紛更之文字則大備矣混沌之鑿也亦多矣秦以吏道易君道天下日擾擾焉程邈因是以𨽻書代篆書六書亦墜地矣要之二人者同于輔桀者也校嘗曰三代而上一宇宙也自秦限之矣秦弗稽古師先王而歷代師秦以為故詎惟六書也哉校生千載之後悼斯文之久湮欲請于上因古文是正小篆之訛擇于小篆可者尚補古文之闕多病未遑則為之贊發大義以闡心法學者毋滯于書而博之天地萬物毋徒求之天地萬物而反求諸心天機之不器于物也古猶今也噫天而欲興斯文也兹其濫觴也已或曰斯無道秦百代羞也請廢斯篆一灑空之無寧慊于志乎曰斯篆亦詎能盡廢古文今亦何必盡廢斯篆天王而考文也亦惟祖頡而參諸籀若盤盂書定而一之斯篆可者取之其不可者釐正之惡而知其美曠若天地之無容心焉邈𨽻亦必修之與俗宜之翻篆而楷俾無失六書掃官府之繁苛灰書籍之叛經離道者復歸民于朴毋或雕琢其天或曰噫信斯言也古道可還也六書云乎哉明文海卷二百十八
