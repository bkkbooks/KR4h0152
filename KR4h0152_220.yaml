body:
  text: 明文海卷二百二十餘姚黃宗羲編序十一著述類編唐詩絶句序敖英唐初詩變選而律而絶句者又律之變視律尤難焉蓋其韻約而句鮮序綴無法則冗轉換無力則散易之則格卑深之則氣鬱直致之則味短局而執之則落色相不抑揚不開闔則寡音響不足以感動千古則不可以風故曰視律尤難焉昔在宋季章泉澗泉二老相與選唐詩絶句一百一十疊山翁從而注之可謂異代賞音然詩家尤病其決擇過嚴而於李杜大家而或遺豫暇日忘其謭陋復取諸家絶句分類選之得三百一十首而謬加批點每遇花月良宵風雨芳晝佳客不來悠然獨酌則命兒輩高歌數首以暢幽懷豫倚微酣擊節和之不覺形神俱爽陶陶融融其美有不可以語人者矣少陵志序趙時春杜陵之名舊矣少陵子生不能有其地死不占一隴歷唐開元至有明嘉靖幾千載有恱少陵子之道者長安太微張子乃以説御史吉君即其地祠少陵子以實所謂杜少陵者太微子又輯志以傳其考涉者詳矣想其雄都偉觀王公巨人一時第舍池囿服玩遊樂之盛聲華氣焰之雄耀山川而賁草木者可勝道哉少陵子薄遊寒士操觚吟咏立其旁渴得餘瀝飢得饜肉固足矣彼皆殫志竭力而後有此地享此樂然樂之未久而其地已丘墟陵谷已變遷姓氏已磨滅矣安知千載之下以虛名享實祠者乃昔日孑然旅食之少陵子也世之得失利害安足道士之榮辱成敗何可量哉或曰少陵子工為詩詩人祠之然孔子定詩三百唐詩人亦數百家無獨受祠者或曰少陵詩不忘君忠足祠焉然唐有安史之亂享祠忠臣甚衆今其存者無幾何矧有特志其地而追為之祠者乎抑杜子一居朝班而自比稷卨備嘗艱阻而雅操不渝屯遭亂離之極而能順適委和其志有足稱者士尚志而詩言志此少陵子之所以祠而張子之志有足比而同之也歟張子名治道太微其號正德癸未進士為刑部主事以不得其志棄官歸尤以歌詩名少陵子之旁有虛位焉後有作者必將奉太微子于此矣易學紀成序王慎中古之得罪于君已失其位而猶不絶其官以摧苦戮辱之者必得險惡冞邈之地如韓退之陽山栁子厚柳州歐陽永叔夷陵是已其地如彼其人亦皆顓昧椎魯鳥􅀈而獸獝莫可與語者如對木石之居而從毛羽之羣退之在陽山僅一區册文彩材質未有以動人者而數與之遊不忍舍去子厚永叔得吳武陵狂生田畫秀才皆客遊之士其拘陋寡獨若此宜乎人之不樂而謫居之所以為困也方其時誠得地不惡其人有可與語者又當負慝含瑕畏譏防患晦其迹惟恐不幽閉其聲惟恐人之聞也安能與其人相講以樂以廣其學而昌其説耶以三君子之所處有以知吾三洲章君之樂也君以名御史在職過直不為有勢者所容奪其職責授推官蓋所以摧苦而戮辱之也而君所得郡乃在莆陽莆陽文獻為嶺外最盛處視中州不啻加之其人皆可與語者其秀者尤好學而多文而君所以出非有罪過獲譴于上不待深畏謹防以自閉匿君于經無所不學而獨深于易莆陽之士於經無所不習而獨缺于易君乃樂以其所得為莆士講以補其缺君既與有勢者相失特困之嚴久不為徙於是所以為莆士講者得專以熟士之聞其講者亦洽以固其旨趣融通而文理成就非獨茍補其缺以具全經方與其素習而舊有聞者頡頏而起而未知其先後也方有勢者以事出君意君且不得其官有不安之心而無以自樂其愛君者方且為君有失而孰知其率有以明其學以廣誦訓而成材美而收士作人之效從容于文法體勢之表若斯其盛焉君于是所得多矣夫豈有所失哉三君子于所貶地皆未有以教其人其地之人又以逺陋不足以知君子而陽山栁州夷陵至今猶道三君子者其風聲氣槩久而不泯也今君既有以教莆之士士皆好學而多文能言其君子而兹經之明日伸月引君之所道説于莆者其有已哉江隂縣新志序唐順之有家者隨其家之所有而籍記之其常也凡其田畝租甔錢貫絲縷豉合醬􅎆僮指之數此纎勤治生者之所詳而遊間華飾者之所略也凡其池館花樹狗馬圖畫古物珍器之數此遊間華飾者之所詳而纎勤治生者之所略也二者則更相笑矣而家之所以為家者則固在此而不在彼也與郡國州邑之有志自古而已然亦所謂隨其郡國州邑之所有而籍記之其常也禹貢周職方豈非志國邑者之所權輿也哉然自後世觀之則見其有瑣細而俚俗者矣夫其田賦髙下之異等墳壚黎赤之異壤五鎮九澤之異名而五戎八蠻之異服其列而載之可也至於篠簜箘簵淮蠙江龜海錯之纎細則類于草木蟲魚之書而多男少女多女少男之紀則近于閭井村俗之談古人何若是之瑣瑣也蓋有切于利器用而阜民生辨隂陽而蕃孳息則固不得以其穢雜而略之而况其大且重者乎其所載而詳者固然則其所不載者亦可知矣後之所謂地志者則異是矣其敘山川也既無關于險夷瀦泄之用而其載風俗也亦無與於觀民省方之實至于壤則賦額民數一切不紀而仙佛之廬臺榭之廢址達官貴人之墟墓詞人流連光景之作滿紙而是嗚呼此何異于家之籍專記圖畫狗馬玩具為粧綴而租甔錢貫所以需衣食之急者漫不足徴也其亦何取于為家也與知家之有籍本以治生而非以觀美國邑之有志本以經世而非以博物則得之矣竊聞國朝集諸儒臣修一統志時兩人相誚其一人欲載科目之數則曰此非進士録也其一人欲載戶口田賦之數則曰此非黃白册也科目則别有録矣不載宜也户口田畝固天下之大命而經國者皆必稽也且若彼之説則禹貢周職方其亦黃白册也哉彼固以是為瑣細俚俗焉而不載也江隂于常州為屬邑而枕江之衝為蘇常諸郡北門以故視他邑獨重舊雖有志而宜書不書不宜書而書大率如所論諸志之弊無足徴者至今令餘姚趙君始更修之趙君為政潔已愛民才敏而慮周凡志中所載田賦徭役户口食貨謡俗水利防江治盜之源委本末節錯絲棼蓋皆君之所嘗蚤夜盡心焉者其于浮文羡費則盡屏去不事譬如辛苦起家之人斥絶耳目之玩而早力于家人生事之間一錢粟之盈縮一臧獲之姦良與夫鐍鑰閭户之守雖其錙銖隱賾而聰明知算舉無遺者于是一切以其精神思慮之所及而登之于籍至其纂輯成編則以屬之學士張先生先生以其國史之餘才而推之以成一邑之史故其所載繁簡刪存能得趙君之用心而著之以為後來治邑者之所據準又如計然任公之徒精于治生而太史公萃之為傳凡其仰俯拾取廢居棄與之法與夫巵茜狄漆之細莫不具載能得諸人之所用心而著之以為治生家者所必資蓋為邑之與治生意嚮或異家籍之與邑志體裁亦殊至其的然當于實用而不取辦于具文焉則一也夫前人以其所用心而著之籍記後人因其所籍記而得前人所用心而守之是以家道能常興而不墜豫欲使後之為江隂者因趙君之所志而知其所用心而守之也為之書其端戰國䇿談棷序王世貞戰國䇿不知何人所述其地則自兩周而終宋其人則自周安王而終秦始皇其事與文則雜出諸名卿遊士之屬太史公因其成資以編史記之十二而其書故𨽻漢祕閣劉向稍較定為三十三篇鮑彪合之為十卷彪復與髙誘各為之訓詁而吳師道纂焉其文至于今而猶未晢者仁和張子文氏治鉛槧之業者三世矣于它書自謂雞肋而獨此䇿不減杜征南注必證之古而反之心有一字不安不已也蓋書成而諸揚扢之精者皆傳之名之曰戰國䇿談棷問序于不佞嘗聞諸儒先言天下之亂至于戰國極矣王畿之大蠶食之使不能當一小郡而千八百之君併而為七其民日尋于干戈其俗有壯而無老有喪而無葬者十餘世矣朝而六從暮而秦衡小則市官大乃市國力用于陽智用于隂巧之極至于易姓而人不知鷙毒之所發身滅而猶能快其恨即小有可稱述者不過市魁盜俠之駔為仁義者耳今天下稱極治至安斂手而承一帝者凡十餘代闤闠詩書襟裾禮樂稱唐虞服周孔蓋不獨齊魯為然使老子居之尚猶以不獲睹古為恨而安用此捭闔揣摩之書為子文氏治之繇皇考而上逮王父三世益精將無好其文辭而已夫文辭之益于時至淺鮮也然而未可概論且諸儒先之所推談理而雄者孰有過于孟子輿者哉其次則孫卿第令儀秦代厲犀首之徒鼓頰而談天德王道苟其自衷發之其快口當心將必有甚焉者幸而利害之工深入于中主之耳以顯于一時不幸而與中主合出其恣睢簧鼓之技而貽譏于天下後世則非其才之罪也且夫敘事之有戰國䇿其于太史公昆季也左氏則匹敵也是三君子者而産于殷周之際當左右史之職興衰治亂之所以然與皇王心迹之微必能委曲貌擬使人躍然而興感何至寥寥逮今嗟乎此非諸儒先所與之晚也諸收談棷者左袒于兹䇿者也子文氏三世則又左袒于談棷者也是故不辭而敘之知我罪我我安與哉編初唐詩敘樊鵬南溟樊鵬曰豫嘉靖癸巳督儲濠梁得關中李子西相與評古今詩李固豪杰士識鑒精敏動以初唐為稱適與豫契退而編成敘曰詩自刪後漢魏古詩為近漢魏後六朝滋盛然風斯靡矣至初唐無古詩而律詩興律詩興古詩勢不得不廢精梓匠則粗輪輿巧陶冶則拙函矢何况于達玄機神變化者哉惟古閭里咸習歌詠是以其教不肅而成唐興三宗上倡科目取士天下枕籍于詞章今傳者百中一二爾然已不下百家故後世必曰唐詩唐詩云豫嘗有言初唐詩如池塘春草又如未放之花含蓄渾厚生意勃勃大厯以後鋤而治之矣乃于披閲之餘專取貞觀至開元間詩編為三册凡若干人題曰初唐詩而古詩不與焉誠以律詩當于初唐求之古詩當于漢魏求之此則編詩意也昔人論初唐曰使曹劉降體未知孰勝斯其知言者乎嘉靖十二年春敘粵大記自序郭棐謹按昔雲陽氏肇都沙丘逮軒轅分野厥維荆揚吾廣介焉是為揚粵古有九丘志河內司馬彪有九州志然皆略于嶺服髙固相楚始傳鐸氏微蓋鐸椒作也漢楊孚撰南裔志晉王範著交廣春秋而粵之聲名文物彬彬緗素後祀有考焉唐宋以來紀載多闕自曲江武溪菊坡文溪數公外史佚其傳迄我皇明德化醇洽肆于嘉隆文治宣昭於是泰泉黃氏者出鏗鏘炳蔚大豔厥詞極意搜羅爰成通志探古懸其藻鑑摛辭綴其菁華洵宏博之鴻裁而稗乘之駿藝也然浩適等仗節不書非所以勸忠也漢晉間年號有誤非所以紀實也丘陳湛霍諸傳多含貶詞非所以傳信也盧循么麼小醜而列於刺史題名中非所以懼亂臣賊子也諸如此類不一而足昔賢云史者萬世是非之權衡也志者郡國是非之權衡也其所是者必天下之公是而不敢誑以為是其所非者必天下之公非而不敢誣以為非有似是而非者則亦不得梔蠟而飾以為是也有似非而是者則亦不得羅織而詆以為非也昔司馬遷稱良史論者猶譏其是非頗謬於聖人况未望遷眉睫者乎是故必公是公非不虛不隱而後可無愧于月旦之評也豫家粵白先大夫素有志於百粵典故爰以命棐向來浮遊齊楚蜀僰間未展初心頃得乞休南還訂盟泉石思以酬先大夫未了之志乃取黃戴二氏通志參訂之旁搜瓊臺白沙甘泉渭崖西樵東所青蘿白山諸集凡數十百家標其所可書補其所未備各類分為三十二卷幸際制府如岡陳公耀德宣威經文緯武直指望海劉公敷治綏猷肅綱振紀而藩臬暨郡邑諸大夫咸鋭意撫綏殫精安攘士民賴有寧宇棐得樂田里操鉛槧勒成兹編孰非諸名公賜哉題靖陽沈生禹碑辨顧璘余登衡山陟祝融之巔下尋方廣經岣嶁之麓未上訪從行道士云山無禹碑雖巖間或有古刻皆以磨滅不可識矣沈生所得碑本乃嘉靖初長沙太守新安潘君鑑得于嶽麓書院後小山草莽間剜苔剔土榻傳人間蓋宋人所模刻也生誤傳以為禹本刻甘泉亦未之考蓋禹去今數千年衡山石質踈厲當時無碑碣必刻之巖間風雨氷雪之所剝落泯沒久矣計宋時亦已無迹故歐陽諸公集古録等編皆無載此又貴于宣王石鼓使有之豈皆或遺之哉度宋人此刻亦前古流傳榻本余初見亦疑禹稱王不宜稱帝今乃知帝禹刻三字即宋人所題偶誤耳余昨經寧逺榻九疑山蔡伯喈𨽻銘亦出宋人所補幸有題識可考則誤刻山巖者在宋已滅况三代之初乎泰山石堅故秦刻猶存昨觀衡山前代題名唐惟李義山三字在祝融尖六朝以前無存者大抵山石易損故耳豈前此無一題識耶然上古書迹自是異寶雖傳刻固可貴也古者書法之具皆取象山川蟲魚草木之類禹精于水今篆體皆有流水形出禹無疑獨幸沈生精思妙契釋文見義謂非神授不可也楊殿元用修在滇南釋之僅數字不同尤可見人心之靈聖迹之妙天然符合有莫知其所以然者否則千截之下萬里之外安得不約而同若是乎嘉靖戊戌既望東橋居士顧璘書于靖陽行臺西洋朝貢典録序祝允明西洋朝貢典録者所以敘海表列國之事辨方域列山川計道里陳土風紀産育述朝貢以闡王化録建設以美使才備國典之實録寄通覽之遐志者也若昔先王乘龍守寶則莫不重于輿乘夏貢周方涉筆聖作史漢志地粲在指掌後史繼起損益可知大槩成于革代之士掇當時之聞見以附前典之同異至于前元統一區夏號稱廣拓然此西溟南漲挺而不賓我髙皇帝出震行乾威德邁古率土來王不貴逺物太宗修文爰務通道始有剖符之命包茅之徴中人鄭和等飛星舶于天池耀皇華于鼇極然後章亥舊步載纒縢鞟張騫異種倍收筐匭前後輶軒互形方䇿雖稱實録猶未會通言而不文行之豈逺黃子勉之生于華文之區而遙攬恢詭之觀隱乎一尺之几而慮經六宇之闊遊乎熙安之代而慕馳奔走之辰間氣龎博時而出之握槧隨襟是有此作其為書也法班馬敘國境所在風俗所殊法周官敘田畜法山海經敘山水鳥獸草木法禹貢敘貢物每一島末復著論以該未盡事事有徴綱綱有條信乎逐南左之良匠追卿雲而我儀者矣嗟夫斯今之世作者寂寥或辨性較禮附禮經師或獵瑣浮尖依稀文苑以子之器何不髙談五經富眩千軸豈其喜役于裔荒醜雜之形而甘似于下喬入幽之見也哉吾又悲夫得黃子之心者寡也將其明發有懷思輔明王宏際天蟠地之治也思效使能以達尊華馭狄之䇿也思豁耳目以抒籠山絡海之氣也而重慨夫橫絶英雄徽纆于三場二試腐章屑句之條律曾不若奄尹儓臣御天言蹈地維行志吐氣以琭琭珞珞如也故去彼取此褁糧躡屩孤蹤千里訪鞮人于海澨諏黎老于蔀廬閲七龍易七稿而編始成前史異今置而弗溷或涉疑舛時議及之以於西洋特詳故題目云爾其間演論數右張旌能無隱憂豈徒騁藝曩時太傅太原文恪公嘗謂黃子中祕亦無諸國風土之書春官所掌不過朝聘表章方物聞有此撰愛賞良深而未矚其就黃子不妄比人上唯王公下猥及我今王公既沒我當敘之是故望英主豔偉工愛才猷乘桴非願放海皆凖進繹宣尼之麟管退揚子長之轡絲則典録之用是黃子之志也皇甫持正集序王鏊昔孫可之自稱為文得昌黎心法而其傳實則皇甫持正今觀持正可之集皆自鑄偉詞槎牙突兀或不能句其快語若天心月脅鯨鏗春麗至是歸于抉經執聖皆前人所不能道後人所不能至也亦竒甚矣昌黎嘗言惟古于詞必已出又論文貴自樹立不蹈襲不取悅今世此固持正之所從授與他日乃謂李翺張籍從余學文頗有得從吾遊者李翺張籍其尤也而不及持正何與余謂昌黎文變化不可端倪持正得其竒翺與籍得其正而翶又得其態合三子一之庶幾其具體乎則持正可之之文亦豈可少哉豫既刻可之文而持正未遑今世庸乃能嗣吾志而梓之豫嘉其仕優而不忘學又不忘其世裔所從出也為序其端續髙士傳編目序皇甫涍髙士傳者晉玄晏先生之所作也史稱嵇康亦為之傳贊而玄晏之書獨顯至齊宗測嘗續其書梁阮孝緒著髙隱傳區列三品雖號詳核而與玄晏之意異矣然四家之言今皆不傳豈偶散逸而無存耶抑好之者鮮鬱而不彰耶往年涍考求宗系旁覽缺文慨然慕之遂續其書十卷自晉迄宋凡九十九人學既疏脫鑒亦乖迷竟無以卒業故又别為編目書之一册朝夕覽焉以示素風之不忘雖然玄晏尚矣宗阮遐躅照映巖壑皆志之有徴而非托諸空言者也涍淟涊干祿營迹抱關體冒穢俗而私攀古賢情逺幽淪而揚論千載是書也所謂雖不能至心嚮往之景行維殷躬不克逮其能無自恧乎重刻唐文苑英華敘鄧宗齡在昔帝王所以鋪藻鴻業奮煽景炎者亦惟睇瞱秀發之士摛詞染翰鬱為國華相與闡揚之雖純駁異致然覽者不遺焉亦以文詞幽而弗章則搜古無繇綜述闕而弗備則典籍奚稽不若併存之令世可考而鏡耳有唐文苑英華成于宋學士李昉宋白輩奉詔輯次成書羅網百代籠罩數百年間總質文而分其流摛倫類而異其指藻思綺合足以恢張國音詞旨霞布足以宣述風美纚纚乎一代之詞文亦燦然畢著矣乃談者曰自六代以綺靡相髙士爭騖于駢麗濃思縟采六藝若濫觴然安可以規來世垂不刋之鴻教哉不知道有夷隆學有粗密故彈射臧否品隲得失者示則也廣授博採瑕瑜並收者志備也况唐以風雅主盟百代庶幾三百篇遺意而所稱文起八代屹然詞宗者又直接孔孟蹍蹈秦漢而上之奈何以獨廢焉今其書具在無暇他論論其彰彰最著者如讀房杜王魏裴陸之疏議則獻納之軌在其中矣覽王楊沈宋崔李之賦頌則凌雲之製揚其聲矣誦盧駱沈栁髙岑李杜諸篇則雅道之旨于斯暢矣他如王孟韋白數十名家並結藻清英比麗卿雲烺烺乎永世之業令千古作者若奉功令而趨又烏得而廢之昔夫子論次詩書修起禮樂而十五國之風謡併存之以示來許彼雖不盡軌于大道然其述媺惡記讃一代之迹不可遺也而况雄文巨篇昭著臚列若是書者乎雖以世代邈逺而由其書按當時行事若數一二較黑白又豈徒僅僅以文傳也哉故為重梓之令稽古者得以觀覽焉明文海卷二百二十
