body:
  text: 明文海巻二百二十三餘姚黄宗羲編序十四著述重刻懐師録題辭顧憲成予讀楊夷思先生所輯懐師録為之出涕作而歎曰異哉梁永豐落落布衣也其生也不能富人不能貧人不能貴人不能賤人樵兒牧稚可狎而睨焉比其死也人皆寃之為之徒者且相與捐身以赴之至冒鼎鑊蹈白刃而不恤張江陵堂堂相君也其生也能以人貧能以人富能以人賤能以人貴公卿百執事侈口頌功徳焉比其死也人皆快之為之黨者且相與戢身以避之惟恐影響之不懸以蒙其累是何兩人之處勢微顯判然而得失之效更自相反何也此以心服彼以力服也嗚呼昔一時也為江陵獻媚者殺永豐如殺雞豕蓋若斯之藐也布衣固無如宰相何也今一時也為永豐雪憤者疾江陵如疾豺狼盖若斯之凛也相君亦無如布衣何也然則重梓是録也一足以示屈於勢者究必伸一足以示伸於勢者䆒必屈一足以發明三代之直道即欲磨滅之而不能也其於世教寧曰小補而已哉學易齋易序鄧元錫學易齋者萬子曰忠齋名也著易原易説凡二篇盖準宋易通云夫易天體也天體萬物而無體故命之易人受之為心故心常感於物發而未發故命之中而天地之心存焉首原中明即心即天唯常發而未能自反故心動炎上日與物搆失其所歸唯未發故火反藏之水潤而下天地之心復焉次原圖圖書一六皆下坎位也火下旋而伏則金從金流不耗而彌精介乎其貞復之乎坎中為天根冬日至専凝於黄鐘之宫藏焉藏之以發而木道乃行渾乎天德而仁歸坎為之源易象乾龍乾初象潛龍陽潛藏而下於下也則淵乎心象而天人致一也已綆有盡何可以汲深毛有倫胡可以語微波尚之風不能以自平木鼓之風不能以自止殆矣心危以動而坎為重險矣人道之患始此矣曰忠甫憂之闡未發以指中杓易圖以發中而約之退反反而藏之乎宻微深乎微矣而攝之於平夷冲質忠信篤敬自下將之學之的也不動於意不起於智於黄中乎正位奠體而思不出乎是也則發未發之中一體無體之易坤從乾而道徳之樞歸焉噫嘻此入聖之機也舉是機洩之乎聖人不能也故四科六學各資以達材成徳以施於人官隠此機秘之乎聖人不忍也故圖書三易天府寳之三公守焉以論道而格心學易齋易入於機出於機欲人即之天達天之天不二其體不離於宗無秘於此機而已矣古老曰有徳司契無徳司徹是篇也者其司契矣乎曰忠甫少高邁於人鮮挹下已學於羅文恭公中夜於石蓮渙然悟先天之㫖就文恭質焉文恭深賞服之自是收攝保聚日嚴用功益密沈心抑氣夙習銷汰亹亹以退藏日深舉以其三十年専致所自得者為之言别而圖深而通𤣥而質指約而致博讀之深心守契盎如溢言表也乃或以言證求之以言詮圖象間焉易曰書不盡言言不盡意古有以微言達意者有稽古言發意者有一言而函意多者有多言而寓意一者又乃有意在言外無可尋迹者言何必同易立象盡意圖何不具各指所之而為言何不可也蓋易通通其意而不注於辭錫也固從曰忠甫遊以遇合稍濶晩入蕭曲造膝武夷堂聆其言時而渙然時而冷然又時而淵然曠然已中自失而窅然也彼其感人者詎以言哉讀是編者其毋以言求之也夫其毋以言象間之也夫三禮編繹序鄧元錫三禮本古曲禮儀禮周禮而名古經必有記記今所未備若異由者今世所傳周禮儀禮禮記稱三禮則相沿誤也蓋曲禮本經予聞之李大經云南豐李經論經先曲禮曲禮禮之本也禮天體也天體物不遺故物必有則自内心外貌思慮視聽食飲裳衣之有其節苦語黙進退取舍生死之有其介與凡親疏貴賤交際事使之有其體各品節之以立教蓋賾不厭動不亂而幾微畢察委旋時中也命之曰曲禮槩其目曰三千所謂三千言微乎微耳蓋徳性之精微中庸畢具察而高明廣大都焉時著時察之謂知隆此由此之謂行故致曲者知微者也是教之本也儀禮者先王以訓齊天下經人義之大端也為之冠以重成人為之婚以合二姓為之鄉飲射以教徳讓為之喪旣夕虞喪服以哀死亡為之郊社饗餽以儐鬼神其親邦國之交秩上下之體又為朝㑹聘覲焉以將之此其行有時其用有地比時豫物將事也有體是儀法之大者命之曰儀禮譬天儀象乎則二十八舍以經天而治要在論官故周禮經官建冢宰之官以儀天建司徒之官以象地建宗伯春官以廣仁建司馬夏官以成聖建司冦秋官以立義建司空冬官以幹事而六官三百六十屬上法乎天行蓋周禮制而儀曲有官儀禮制而人義有紀曲禮制而人道有理三禮者周公明天道察民故以興王治之大順也仁者人也禮者體也隆禮者尊仁由禮者體仁禮無體則復於禮而仁全蓋仁全而天全矣周衰禮廢迨春秋晉韓起適魯猶及見舊典禮經歎之曰吾乃今知周公之徳與周之所以王蓋其感也孔子欲觀周道適周學禮焉歎之曰大哉聖人之道洋洋乎發育萬物峻極於天優優大哉禮儀三百威儀三千歎道盡於禮也又贊之曰郁郁乎文哉夢寐志之世莫能遵明於是乎作春秋以維周禮蓋重禮如此至戰國諸侯惡其害已經用燔絶自孟氏未之及見斯亡久矣漢興河間獻王篤好古始博購得周禮五官而亡其冬官得考工記附經後備冬官之記高堂生實始傳儀禮經僅十有七篇大小戴次曲禮僅上下二篇又雜諸記中而儀禮冠昏喪旣夕虞皆士禮自大夫而上無冠禮也至諸侯大夫昏喪旣夕虞皆亡惟饋食有少牢有司徹則太牢亡也特牲少牢惟饋食則饗禮亡也饋饗皆廟事則郊社禮亡也禮大門曰聘聘使大夫則間於事相朝禮亡也聘有公食大夫則公再饗大夫禮亡也至王覲止覲則春朝夏宗冬遇殷見衆頫禮亡也推斯而言禮闕逸甚矣豈孔子存周禮於魯而王朝禮業不得展於邦國諸侯憚行禮又自去其籍惟士鄉禮以習行而存與嗚呼周禮亡而朝無守官儀禮亡而國有失俗曲禮亡而人道或幾乎息矣何異乎九容不修九思不慎六官不建五禮不秩而三綱九法從淪斁也予讀禮手録曲禮少儀内則玉藻諸篇敦本實致微眇約身理家可服存者為曲禮經上篇其非日用習行若古今異宜難施行者為下篇經紀缺録表記坊記緇衣語精實於經通者附焉其儀禮本古經為經經有義見戴記者類附經為傳傳錯見他記中者摭取之為外記凡經十七篇傳七篇記各附其篇終周禮故五篇近儒取五官聯近冬官者迴互更定以為冬官未嘗亡也然何從質正之也經所存終逺也故周禮經仍五篇二記中與五官相發明者與工記附焉其科條見禮記編繹序中匪敢詮訂庸便誦服云禮記編繹小序鄧元錫禮記蓋古經師轉相與撰次所聞或録舊禮或記變禮或兼記體履之務翼經者也豈七十子之徒若高堂生孟卿后蒼之倫所記與漢初湮滅有間已漸出至元成而備傳者至二百餘篇信都戴徳刪為八十五篇曰大戴禮九江守聖刪四十九篇曰小戴禮彌約近奥而於經不倫今取諸記儀曲禮者各附本經後如編矣漢興文皇帝感上世列爵分土建官任職之道略不槪見也命博士諸生各論次所聞為書曰王制制雜出夏殷與周禮不盡合而義相出入以近經又自有記故首王制列周禮六官後它二記中記古治天下國家之制度器數錯出者為王制下附焉孔子語為邦曰行夏之時說者曰夏小正之屬不必然也然而近之矣吕覽十二月各有令時有秦令焉而古制以存蓋秦令建亥而月令主夏時得孔子之意以其時秦未創制天下自恣睢也不韋獨令諸儒生獵取前聞成書亦猶古制哉故次夏小正月令學記王世子記國家建學作人之法略具與周官司徒學正相表裏記武王踐阼若經解古學制在焉又次之樂經亡久矣河間獻王所上古雅樂又廢獨劉子政所得二十三篇中十有一篇具存今樂記是也記通論禮樂之事又禮先樂後又次之百工之事至微末而道存考工記非冬官而固冬官屬也則或冬官記也事理爛然精矣附焉他諸聖門與君大夫若門弟子縱言及於禮若統論三禮之事者類深奥有微言間乃紕繆記之者失之也然亦眇矣故首哀公問仲尼燕居閒居次之觀上之歎本隂陽造化帝王因革之變鼎鼎輪輪矣曰禮運禮器即物有宜稱言之也運行而無迹器成而有方運其㑹之通乎器其典常也故禮運禮器次之大戴盛徳篇他工記中語三禮錯出者類附焉夫禮得之者昌失之者亡於觀戒至逺也而莫亟於春秋檀弓諸記得禮之事失禮之禍與春秋互發又次之夫禮無不體也洋洋大哉乎聖門通論道徳仁孝政學之語何非禮也出二戴者博矣孝經經也孔曾之宗傳在焉記之冠冕原本也故首孝經大戴記主言入官小戴儒行次之喪記緇衣中粹者入曲禮記餘與五儀小辨用兵疵纇雜矣然古書今及見者甚眇何忍棄也與本命附焉家語故自為編以其記孔門答問及弟子行事與禮記相出入又附焉子曾子傳大學古文最粹宋儒表章之而道尊其出檀弓曾子問者顧往往雜矣其粹者乃在大戴篇慤而深微而粹存之闇闇持之勿勿進之慥慥靡有息也又一言一藥即龎義贅辭要無傷其大都故受之曾子終焉嗚呼詩書禮經而下莫近於戴記類為編而三禮書大具失倫者咸各歸其官世之君子得其所謂慤而深微而粹存之闇闇持之勿勿進之慥慥而靡有息者講明而切究之則義之龎者㒺弗為精辭之贅者㒺弗為要禮教之明於天下也豈不昭於日星哉余不揣弇陋攄所見而序之願以俟明哲者考鏡得失而釐定焉重刻伊洛淵源序張元忭伊洛淵源前後二編蓋考亭朱子與黄巖謝氏之所輯有宋諸大儒先生及其門人之嘉言善行畧備矣今太宰海豐楊公朝省而暮讀之旣已獨㑹於心又將重梓之以公諸四方之學者而屬序於忭小子夫何知蓋嘗竊聞長者之餘教矣夫道猶水也水必有源源未嘗不一而其流之所之支分派别至不可究詰要之晝夜不舍而至於海則一而已矣何者源深而流長也儒者之於道有不原於心者非學也而禀有高下見有大小入有頓漸則亦安可彊而同哉要之不二其心而皆足以至於道亦一而已矣是編所載無論其門人即以諸大儒先生言之濂溪開其源者也二程得之於濂溪旣已衍而大之而伊川終不同於明道伊川之論横渠謂其得之考索非明睿所照其於康節則以為聖門之别派豫章延平並得之於龜山為程氏之適傳明矣而考亭集諸儒之大成顧於師門主靜求中之㫖自以為有所未契是諸先生所不同有如此者然此特其所稟所見所入之小有差别焉耳乃其精神心術之微本之以誠而守之以敬慥慥兢兢務去人欲而還天理則諸先生者其心同其道同寧有毫髮之異乎是以表裏洞然可以動天地質鬼神前乎千百世而無疑後乎千百世而不墜所謂源深而流長者非歟若夫俗學與異端者流非不可矯飾眩惑於一時而要其心旣有愧於周孔則何怪乎其術易窮而其傳易冺此亦潢汙行潦之水乍盈而易涸者也然則學諸先生之學者可徒循其流而不遡其源哉抑忭又聞之大臣以道事君而冢宰埒於三公與有論道經邦之責夫道未有不須學以至者今太宰公孜孜問學潛心伊洛之奥且將率天下而誦法之是宜上贊一人下進退百官一出於道而無遺議也豈非斯世之幸斯道之幸歟忭何敢為佞焉朱子摘編序張元忭考亭朱子之學蓋得之延年豫章以遡龜山而上接周程之緒其統系之相承若此其正也乃世之號為朱學者往往得其膚而未窺其髓是以馳騖於考索而不知吾心有不慮之知拘泥於格式而不知吾心有天然之則斯豈善學考亭者哉陽明先生首掲致良知之㫖以捄其弊而當時驟聞之者輒以其畔於考亭而攻之夫惟陽明亦有不自安者乃取考亭之書而檢求之咀其華鈎其𤣥輯為晩年定論自定論出而後考亭之學其精髓始透露於此其拳拳於培本原收放心居然延平之家法也而後考亭之學始為質之濂洛而無疑是陽明不惟不畔於考亭抑亦有功於考亭者也忭少也讀大學格致章補則掩巻而思曰何哉無乃倒言之也乎無亦曰吾心之全體大用無不明而後庶物之表裏精粗無不到乎果若所言何以為知本也稍長得大學古本讀之而後知聖人之學固如是乎易簡而無難也已又得定論讀之而後知考亭之學其究竟固若此而傳註所云乃其論之未定者也已又毎誦性理所載考亭詩則躍然曰此非定論之餘響乎如曰識東風面聞夜半雷春水生而蒙衝自在風浪息而山樹依然此非以神遇不以言解者乎頃邸舍多暇復取集中諸詩偕一二朋友徧閱之得其調之同者凡若干首類而録之曰悟後詩蓋定論雖曰晩年猶有未必晚年之疑而是詩見於平時則皆到岸棄舟之句合書與詩觀之而考亭之學益見其博大圓融洞朗無礙前陸後王氣求聲應無復異同之紛紛矣於是合二編而刻之曰朱子摘編而叙其始末如此嗚呼道一而已矣學不㑹於一非學也是編也豈獨三先生之學可㑹於一乎千古聖學之正傳吾知其無三徑矣雖謂之儒宗參同契可也重刻諸儒語要序高攀龍唐荆川先生輯諸儒語要十巻其六巻皆諸先生所自得語四巻則辨析同異而考亭之語為多吾友黄雲翼讀之而奮然起曰道在兹乎重刻於浙中而徵言於不佞夫不佞烏知道竊以善觀聖人之道者觀其學善觀聖人之學者觀其教善觀聖人之所言者觀其所不言觀聖人而後乃知諸先生也夫聖人之憂患天下後世逺矣故不難於自盡其心而難於盡衆人之心不難於開一世人之心而難於稽萬世人之心聖人知不學之害小而學術之害尢大不學之害害其身而學術之害害萬世故能言而有所不敢言欲言而有所不敢盡欽欽然守先王之法文則先王之文禮則先王之禮聖人特示之博特示之約使萬世之賢且智者有所裁而不敢恣其意愚不肖者有所循而得以殫其力如是而已矣夫道人所自道也譬之適長安者聖人第示以至之之途示以至之之具爾途不辨不可得而至用不具不可得而至及其至則長安自見不以言而見也後之教者不然每侈言長安而學者亦婉若身親其地然而心遊千里身不越跬步也彼其侈言長安者夫豈非身至之者乎以為言途與具非長安也乃不知徒言長安者之非真長安也夫然後知聖人之憂患天下後世之逺故於其所不言而知其所言也斯義也由孔子而來惟周程張朱五先生得之自五先生外諸先生各有獨至而學聖人者必以五先生為其辨途之正其用之備也吾觀聖人之教而知諸先生觀諸先生之教而益知聖人甚哉教之闗萬世生人命脉也是以聖人視如河堤蟻穴知其必決而慎之闡幽録序高攀龍我神祖御極四十八年而譴謫諸臣自萬歴五年始於時江陵相不喪父喪諸臣以綱常大義諍杖者戍者編民者纍纍矣是後以國本以鑛稅以去奸者發奸者以救言者薦言者推用言者相繼譴幾三百人迨遺詔録用無禄即世者且半即存者以酌量裁以冒濫厄不能十而二三何况沒者忠魂烱烱浩氣揚揚吾不知鬱而為苦雨淒風抑激而為冬雷夏雪兩間醇和剥之萬端此固其一矣幸聖天子穆穆無奏不下賢宰相休休無善不庸南臯先生為闡幽疏者再太宰乃奏勳司案以廷杖獄死者為一等贈官予廕餘為一等止贈官先以七十五人請將益搜其未盡者旋得俞㫖布海内使知為人臣抒忠誠於國屈於一時伸於萬世彌久而光諸為奸利者赫奕旦夕耳嗚呼此闡幽所以為人心慮至深逺以為無須汲汲者其度量相越何如哉夫鄒先生固最先譴召用而復錮幾四十年者吳趙沈艾諸君子相繼沒而先生巋然為魯靈光天子用為御史大夫諸君子卒以先生闡天豈無意乎天之未定疾風迅霆日月晦㝠天之旣定水緑山青蜎蠕以寧昔屈子賦逺遊欲長年以觀旣定之天而忠臣義士顑頷沒世者常以年嵗之不延悲夫然猶被三朝寵錫際一時明良而及兹典未為不幸也元相前則南昌劉公名一燝今則福清葉公名向高太宰則涇陽張公名問達少宰則定逺盛公名以𢎞㑹稽王公名舜鼎勳司則奉化戴公名澳後之覽者考鏡焉無錫縣學筆記序高攀龍何以使天下治曰人才何以育才曰庠序之教何以使庠序之教天下奉之若蓍蔡循循焉嚮於道也曰在是非著而勸懲者深古者令民五家為比其教始於比長閭胥聚衆讀法書其敬敏任恤而掌其比􅀈撻罰之事蓋已昭然導之向矣至於州長以嵗時考其徳行道藝而勸之糾其過惡而戒之行成而後卿大夫以登於王蓋勸戒森嚴故民聽不惑其必為善也如水之寒而火之熱必不為惡也如騶虞之不殺竊脂之不穀豈獨其性然哉所由來者豫矣夫有善惡而後有是非有是非而後有賞罰有賞罰而後有勸懲上之人躬明徳以示之又嚴勸懲以一之若之何士不務於道而天下不安治且久也今也不然士幼而誦聖賢之言十倍於古乃其父兄所責成師友之勸勉止於一第而已入官之後俯仰以隨俗積金拓産以裕其子孫而已簿書期㑹之餘計俸待遷歎老嗟卑而已上之則詩文酒奕以自娛仙𤣥釋空以休老而已天下滔滔不復知禮義為何物也鄉飲酒以尚齒而崇徳也祠鄉賢以褒往而勸來也或非其人而人不以為榮士之以行黜也卿大夫以墨敗也恬焉安之而人不以為辱閭巷之間是其同已不必出於善非其殊已不必出於惡恕於責小人而苛於求君子庶民瞀惑而人不以為信至號為儒者禮義之心不能勝其嗜慾恐天下叢而議其後則皆習為無善無惡之說以自便以含糊為長厚以退避為明哲言行不足訓於天下於是道徳滅裂而人不以為貴幾何不胥而亂也然則如之何曰救今之弊則復古之法而止也徳行廢而任詞章旣失其本矣昔之詞章猶不敢叛經而亂傳也今則傳註廢而士之說經以意矣說經以意無不可行意也意以亂指指以從邪浸淫潰決將六籍之正皆為姦言之文是非益謬背而不知所底矣復之如何有高皇帝之卧碑兩朝之敕諭在學必以孔孟程朱為宗士必以孝弟忠廉為貴如此之謂是不如此之謂非徳行由是詞章由是比閭之論議達於朝廷之舉錯由是賞罰明而勸懲著耳目一而志慮専學如是而止也嗚呼所以行之者難言矣吾邑思永談公為學宫筆記旣成以示予予卒業而歎曰教典具矣科目具矣哲範具矣富貴如蜉蝣淑慝如蒼素毁譽行於一時是非昭於萬世其亦可揜也夫兹記行也上之人考而思焉以復古之制下之人考而思焉以復古之學往者之不湮來者之有述公之錫類也逺矣於是不辭而為之序且以志其平居之慨毘陵人品記序高攀龍士無定品要在不失其人之本色而已夫子曰人之生也直此本色也以其本色也而易如火之炎上水之就下也故無鉅細皆足以成品以其本色也而難如火之不熄水之不汚也故無鉅細之品皆見其可貴品士者核其人必脉理真而後無贋品論人者必羣品備而後無失人毘陵為泰伯端委之地山川平衍習尚得文質之中由周而來風氣日開至宋而益著天下有事毘陵人必有則古昔稱先王不忍自決其防者如慶元端平間天下岌岌矣毘陵人硜硜守其所學逐而去之者至以道學解散為慶而迄於亂亡毘陵猶孤城死守不下及羽人釋子亦知與城俱亡之為義寧獨天性亦其習見習聞然也毛右菴先生記毘陵人品顧涇陽先生志桑梓人物侍御嚴所吳公更雅馴其文辭續入其後死合為書十巻謂某不可無一言某曰侍御之功偉哉夫人心之所趨必有所定以為的而期中焉故以富貴利達為的者取諸昏夜乞哀之巧力矣以聖賢豪傑為的者取諸平旦虚明之巧力矣二者如霄壤不可同日而語稍錯襍焉人莫知所趨侍御之厚於取善而嚴於别類其示之的乎人固有與生俱生不與死俱死塞兩間亘千古不可得而滅沒者非富貴利達之謂也世人畢其巧力昏夜乞哀以求之而與此曽不相涉矣夫以百年易盡之身營此身不相涉之物譬之冠冕金玉被飾土木偶人至於死之日了無餘味而後知其向之所為㒺也大可哀矣其有感於斯編而興起者乎侍御之功偉哉明文海巻二百二十三
