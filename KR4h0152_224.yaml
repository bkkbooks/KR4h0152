body:
  text: 明文海巻二百二十四餘姚黄宗羲編序十五著述記論文孫慎行江右四山鄒公工文章辨别邪正以為自古及今實有正氣一脈真傳自史漢及唐宋八大家雖調格不同其得是訣竅一也自昭明有選此脈遂大壊及真西山有正宗稍為一清然世反有艶選薄正宗者至出入選宗間漫無白黒如紛紛諸選下己他姑為酬應無所禀裁者則又勿論然世之名能文者半係姑為酬應輩嘗細總古今為文彚分别各體以為文章一脈在是又從中間抽出一二篇謂竒特予初為諸生弗甚曉迨後十餘年殫力工琢又數年搜義理又數年涉世事勃抒所欲吐然復閲前所抽出一二篇覺𢎞深老大去世猶百數武盖文之難知如此因思史漢及八大家昔人見謂文辭客耳今細探之其胸中道術良有深見浩蕩無涯矣而徐發其一二故足傳也史遷曰春秋推見至隠易本隠以之顯大雅言王公大人而徳逮黎庶小雅譏王政之得失其流及上其經術深湛如是老泉云天之與我豈偶然哉千金之子天子之宰相求一言之幾乎道而不可得今文中曾不知所謂幾道者何指聖門道術首言學文雖非世文辭之文而文辭未必非其流緒焉今世俗講學家不及文章文章家畏言理學兩失之矣公夙以學問鳴宜於直處特有見也然亦未暇以是繩今古祇以為文章全要一氣呼吸自始至終提掇得起若世俗鬬凑極力做來不過六朝粉靡態格其説尤徤吾嘗心識之為人嘗誦云耳惜所謂彚者今無從卒業所謂一二篇者昌黎科斗書後記永叔樊侯廟災記找竹記也以示之人恐都未解了㑹其孫某屢屬傳表予以久謝不能應第書此以見公一斑公嘗詩云文章還大雅經術潤羣生盱江多俊彦應念鳥鳴嚶公之精神殊可念云讀北門詩孫慎行蓋嘗讀北門詩而深歎古人之知天也夫身為大夫少肯營取何不得而至以終貧窶委之天非也居身悃幅立朝法度天實有制不可違也故曰天實為之即艱亦非貧窶之謂也國家有盛世之人材有季世之人材盛世人材不沾沾以廉節見而於世無所不可為季世人材即軒軒以廉節見而於事尚有所不可為茍有懐瑾之志必多獨秀之摧而䜛毁多途幹畧一無伸於天下其為艱也不亦甚乎而又安望世之我知乎若徒以終貧窶為莫知艱是則陋而已矣至王事政事悉加之身室人摧謫亦不復顧比之任與不任似宜可以自主而又曰天實為之蓋賢者處治則為雍容博大為協恭和衷處亂則為慷慨激烈為獨勞盡瘁予嘗以漢之君臣即古之元凱宋之儒學即古之臯䕫人才未必大相逺勢所摧激不得不然真天之為也君子出身殉職矯情違利困於身必益於國縱不益於國未必不大益於名教正所以順天不違北門慇憂聖人録之蓋萬世處衰季者之極則不然當季世而以盛世之人才自託欲令坦易不見艱難欲令浮沈可免負擔則將容容厚福如胡廣輩所為君子謂之逆天而已矣胡子衡齊序許孚逺衡齊何為而作也胡正甫先生憂世之儒者論說多端而持衡以齊之也夫言惡乎齊道惡乎衡揚子有云衆言淆亂折諸聖存則人亡則書聖人者固後學之所折衷也先儒有云存文王則知天載之神乂云識得未濟道便是文王吾心者又斯道之所取則也蓋自仲尼沒而微言絶諸子百家議論繁興漢溺於訓詁唐濫於詞章心性之傳不絶如綫迨於宋室真儒輩出理學始明朱紫陽先生力攻著述以開來學其精神力量可謂收儒者之大全然而議論訓釋稍有矛盾於孔氏我朝王文成先生掲致良知三字直透本心厥㫖𢎞暢矣乃其末流侈虚談而尠實行世之君子猶惑焉嗟夫道之不明則胡不折衷於聖人又胡不求端於吾心也昔者堯舜禹更相授受惟曰允執厥中孔子明大學之道必曰止於至善此曷以故哉嘗試觀之人生於天地之間視而不明聽而不聰動作進退而不得其理則威儀亂有父子而不相親有君臣而不相事有夫婦長幼朋友而不相别相序相信則人紀滅養其身不以為天下則私役於物反以遺其身則悖探索於刑名度數禮樂名物之煩而日亦不足則支馳騖於高虚𤣥逺簡曠自便之域而實之不存則罔亂也滅也私也悖也支也罔也有一於此皆心之所不能自安者也心之所不能自安者非性之本然故也亂而治之滅而修之私而擴之悖而反之支而約之罔而誠之則性順而心安天生蒸民有物有則過之不可不及不可堯舜之所謂執中孔子之所謂止至善由此其選也嗚呼豈非萬世學者之準的也哉先生衡齊九篇其大要闡人心之靈明辨物理之非外而折衷於孔子之訓反覆辨證可謂深切著明其論釋氏本心未嘗非是而特不能盡心之過一言足以訂千古之是非學者茍知此意雖以釋氏之明心見性其究至於出離生死猶於此心此理未盡而况其揣摩測度視大道猶逕庭者乎傳曰祭川者先河而後海貴知其本也又曰升東嶽而知衆山之峛崺浮滄海而知江河之惡沱貴覩其全也又曰道若塗若川車航混混不舍晝夜貴乎自彊而不息也學者茍知其本又覩其全而能自彊不息則道在我而可以權衡乎天下之言矣其齊也其不齊也無所加損於道也先生不逺千里緘書遺孚逺屬之以序遂不辭固陋而敬識其大端云明文海巻二百二十四
