body:
  text: 明文海卷二百二十八餘姚黄宗羲編序十九著述劉子威雜爼序江盈科柱史劉子威先生岀所輯一書示余題曰雜爼大概以天地竒偉絶特文武彚分為四而燕語吴都考附焉讀其書多耳目不經竒偉絶特之事間或揣理必無渉事偶有者余因喟然歎曰甚矣道之無窮而子威先生宏覧博雅之非人所及也乃子威自敘曰此書以示始學者若余所該渉則不可勝述味其言跡于謙又跡于自詫其包彚之廣而皆不然夫道無窮知有窮惟能以有窮窮無窮而後知有窮者之固不能窮無窮也要于所蓄有多寡即所見之小大因之盖昔籛􅀢西逰遇姜子牙於道知其将徃仕周摩其頂曰爾年尚童盍且學焉而早仕夫子牙年八十老矣籛􅀢且童之而戒其求仕之早盖籛方以八百歳春秋則其童八十之子牙而早其仕也非􅀢不能有此見也惟賈亦然負擔之夫得一金以為致富陽翟大賈累萬為家不至竊嬴秦之鹿盗著述之名不止彼知天下之利不盡扵鉅萬已也愈貪則愈富愈富則愈見為不足人之貪嗜扵學也亦猶是也余覩傳載所記若中壘廣覧茂先博聞邉笥善簏之類代不數人至我明二百餘年號稱博洽者惟蜀楊用修吳王元美最著與子威先生而三稱鼎足焉先生所著詩文若干巻所輯他書凡若干種至不可勝讀即今雜爼一書中所采述不知其㡬百家驟而觀之譬如入石季倫室中觀十尺紅珊瑚便知其富敵國豈必盡發其藏為耶而先生欿然曰吾以示始學者吾所該渉不可勝述噫此非謙也非自詫其包彚之廣也縂之以他人觀子威則子威為極博以無窮之道觀子威即子威所博極于道為僅僅夫識商羊察萍實辨肅慎之矢防風之骨稱博無如孔子而莊生笑之曰丘之於道其猶醯雞歟夫莊生非狂言也盖以道窮孔子則孔子窮今天下而無莊生則已假令有荘生者安知不笑先生為醯雞歟先生之自敘意固若斯耳抑余聞之古柱下史掌藏書故老耼稱博大真人然則若子威者謂之柱下史可也重刻唐文粹引江盈科昔人列德與功與言為三不朽此三不朽者校其虛實則德功為實論其用之逺近則德與功之用在一時言之用由一時及於萬世而德也功也反託以為不朽言之所關者大矣哉言之精者為文六經之文尚矣六經以外論者率推秦漢以其去古未遠有未雕未琢之意降而唐見謂不逮漢矣降而宋又見謂不逮唐矣此自世運升降使然莫可誰何要之代各有文文各有至可互存不可偏廢盍觀百世乎春則桃李夏則芙蕖秋則菊冬則梅或以豔勝或以清澹勝縂之造化精氣按時比節洩于草木各有自然之華人心之精洩而為文無代無之故嘐嘐然尊古卑今者有所獨推有所獨抑亦未逹于四時之序與草木之變之理矣烏可與論文唐有天下三百年其詩最著其文惟韓栁列扵大家其他不甚著然而三百年間名流駿碩各殫其思各窮其致抽錦繡於肺腸吐烟霞扵唇吻盖人不可數計篇亦難以枚舉則二公之外其文皆可無傳亦大謬妄哉矧夫李氏一代朝政興替國俗媺惡與夫禮樂名物沿革舉廢忠孝節烈勲猷勞伐正史所不盡載者或偶見于叙述記誌可以僃史之缺所謂二不朽託以不朽正謂是耳然則唐文何可不傳耶有宋吳興姚寳臣自謂用力十年取有唐一代之文㧞其尤者得百巻題曰文粹刻而傳之其有功李氏甚大閱數百年板浸浸湮沒嘉靖間姑蘇國子生徐焴捐貲重刻至于今又漸歸散佚矣永思金子後來之雋有志斯文者也為校正其訛補刻焉藏諸家塾夫文而曰粹譬如看花名園羣芳衆姿争竒鬬勝吾就中摘其最者窴諸瓶間其為賞心娱目當復何如而吾以為終不如百世並存之為大茍世有有力者盡取古今文自唐宋而外若三國若晋若隋若南北朝五代與元併而刻之豈不成天地之大觀千秋之勝事哉彼識不能周覧力不能遍舉而直曰秦漢秦漢云爾此何異守瓶花一枝而忘千紅萬紫之無盡藏也是漆園生之所笑為醯雞者也來氏易註圖説略序鄭之惠毛肖寰先生偶寓湖南與不佞談易因出梁山來徵君圖說一冊授不佞為吾師青螺先生叙刻而毛公重録者大都以錯綜變互推聖人立象之意因明後儒掃象與臆度牽合之非真談易家一種竒書也不佞十齒學易不知易妄意易道之大不可思議而舉目之間徃徃遇之舉目之間又不容思議處也聖人正以不容思議者象其不可思議者則岐理與象不可掃象尤不可㣲獨不可抑且不能天始地成時行物生耳聪目明手持足行盡象也則盡易也羲皇以六畫摹冩宇宙之變文周易詞就六畫下一註脚指㸃出宇宙内名象示人使人即其舉目可見者由之而不知耳必果掃象則宇宙事物可盡掃耶象固無恙反病理矣徵君絶鮮臆說吾家康成肇明象𢾗錯綜著倪于康伯變互考占于堯夫各推本孔子十翼之意徵君表章而全收之非有神悟何以篤信乃爾因節取圖序十六篇付剞劂公海内談易者亦毛公意也六十四卦啟䝉圖舉一為例十翼圖以乾坤二卦彖辭别為一意意尚未安集註文多縂以發明圖說俱且闕焉顧不佞猶有二疑一疑在象内一疑在象外既有錯綜變互又錯綜變互自相錯綜則一爻已賅八卦八卦已賅宇宙諸象矣何以辭獨舉一二象繄惟此象此爻更不可易抑知詩有比興舉一以待觸類也如徵君言自孔子至今二千餘年間能了此者寥寥何以曰百姓與能又何以曰民咸用之豈所云與能者别有鼓舞之妙使人不知其所以然而不容不然者立于象先耶易以不可思議故大以不容思議故神如不佞者正病思議何繇知易梁山萬里道安得過從徵君盡發我覆也明文海巻二百二十八
