body:
  text: 明文海巻二百三十三餘姚黄宗羲編序二十四文集徐教授文集序宋濓曹丕有言文章者不朽之盛事其故何哉夫山之巍然有時而崩也川之泓然有時而竭也金與石至固且堅亦有時而銷泐也文辭所寄不越乎竹素之間而謂其能不朽者蓋天地之間有形則弊文者道之所寓也道無形也其能致不朽也宜哉是故天地未判道在天地天地旣分道在聖賢聖賢之殁道在六經凡存心養性之理窮神知化之方天人應感之機治忽存亡之候莫不畢書之皇極賴之以建彛倫賴之以叙人心賴之以正此豈細故也哉後之立言者必期無背于經始可以言文不然不足以與此也是故揚沙走石飄忽奔放者非文也牛鬼蛇神佹誕不經而弗能宣通者非文也桑間濮上危絃促管徒使五音繁㑹而淫靡過度者非文也情縁憤怒辭専譏訕怨尢勃興和順不足者非文也縱橫押闔飾非助邪而務以欺人者非文也枯瘠苦澁棘喉滯吻讀之不復可句者非文也廋辭隱語雜以詼諧者非文也事類失倫序例弗謹黄鐘與瓦釜並陳春穠與秋枯並出雜亂無章刺眯人目者非文也臭腐闒茸厭厭不振如下里衣裝不中程度者非文也如斯之類不能徧舉也必也旋轉如乾坤輝映如日月闔闢如陰陽變化如風霆妙用同乎鬼神大之用天下國家小而爲天下國家用始可以言文不然不足以與此也故所貴乎文者前乎千萬世而不見其始後乎千萬世而不知其終有不可一刻而離去者其能致不朽也宜哉丕也惡足以知之徒以魯國孔融等七子學無所遺辭無所假足以令聲名傳後而已安知其文哉傳有之言以足志文以足言言之無文行之不遠此則文之至者也文之至者文外無道道外無文粲然載于道德仁義之言者即道也秩然見諸禮樂刑政之具者即文也道積于厥躬文不期工而自工不務明道縱若蠧魚出入于方册間雖至老死無片言可以返道也夫自孟氏旣没世不復有文賈長沙董江都太史遷得其皮膚韓吏部歐陽少師得其骨骼舂陵河南橫渠考亭五夫子得其心髓觀五夫子之所著妙斡造化而弗違百世以俟聖人而不惑斯文也非宋之文也唐虞三代之文也非唐虞三代之文也六經之文也文至于六經至矣盡矣其始無愧于文矣乎世之立言者奈何背而去之吾友天台徐君大章賦資絶倫自少學文即期以載道非六經所存不復輕寘念慮于其間含積旣久赫然以文名江南洪武中嘗召入史館修大明日厯遂出教授武林日以橫經講道爲事逺近生徒莫不趨之猶水之赴壑當修日厯時予適爲之總裁每與大章論文竊嘆今之作者何其與古異也大章深以予之言為然去歲過武林獲觀其文集若干巻今山居多暇因狥大章門人之請漫爲序其篇端嗚呼世有豪傑之士知文與道非二致者必以余說爲不謬茍非其人則以好高尚誇尤之矣予一聽焉無事乎辨也葉夷仲文集序宋濓臨海葉君夷仲宋丞相西澗先生族諸孫也夷仲生有異資其文辭之進如榮木升而春濤長日新月盛蓋未已也頃由茂才舉于鄕奉使安南不辱君命以功擢高唐州判官轉知睢寧縣爲學猶孳孳不懈其弟廣武衛知事恵仲類集成編釐爲若干巻來徵予序請至六七而不倦予齒加長志氣摧懾操觚所云云皆無精魄頗類寐語者讀夷仲文方畏敬之弗暇尚奚敢序之哉雖然不敢無一言也昔者先師黃文獻公嘗有言曰作文之法以羣經爲本根遷固二史爲波瀾本根不蕃則無以造道之原波瀾不廣則無以盡事之變舍此二者而爲文則槁木死灰而已予竊識之不敢忘於是取一經而次第窮之有不得者終夜以思思之不通或至達旦如此者有年始粗曉大㫖然猶不敢以爲是也復聚羣經於左右循環而溫繹之如此者亦有年始知聖人之不死其所以代天出治範世扶俗者數千載猶一日也然猶不敢以爲足也朝夕諷咏之沉潛之益見片言之間可以包羅數百言者文愈簡而義愈無窮也由是去讀遷固之書則勢若破竹無留礙矣權衡旣懸而百物輕重無遁情矣然猶不敢以爲易也稽本末以覈其凡嚴褒貶以求其斷探幽隱以究其㣲析章句以辨其體事固粲然明白而其制作之意亦皦然不誣也由是以定諸子百家之異同若别白黒而絶無難矣及夫物有所觸心有所向則沛然發之於文翩翩乎其萃也衮衮乎其不餒也渢渢乎大無不包小無所遺也嗚呼予以五十年之功僅僅若此今年曰逾邁慨兹舊業反成荒落將何以爲夷仲言哉夷仲諸作溫醇而有典則飄逸而有思致其辭簡古而不龎其神豐腴而不瘠可謂能言之士矣求諸軰行之中未見其敵也進進不已何古人之不可至哉予因忘其固陋以平日所自得者序諸篇首夷仲宜有取焉雖然文辭道之末也夷仲方與有民社之寄當務爲政以德而昌其道哉朱葵山文集序宋濓文不貴乎能言而貴於不能不言日月之昭然星辰之煒然非故爲是明也不能不明也江河之流草木之茂非欲其流且茂也不能不流且茂也此天地之至文所以不可及也惟聖賢亦然三代之書詩四聖人之易孔子之春秋曷嘗求其文哉道充於中事觸於外而形乎言不能不成文爾故四經之文垂百世而無謬天下則而準之自夫斯道不明學者覩聖賢之文而悦其不朽於是始摹傚其語言以爲工而文愈削矣夫天之生此人也則有是道也有是道也則有此文也茍能明道而發乎文則將孰禦乎而能者寡矣斯後世之文所以不逮古也後世之文加之以百言而不知其有餘損其十言而不見其不足以不本於道故爾此非發于不能不言而強言之弊也聖賢之經其所不言也益以片辭則多矣其所言也刪其一言則略矣以其不志于文此文所以卒莫能過也故志於文者非能文者也惟志于道者能之元之末莆田有朱先生文霆以治經取顯官有政事人皆知之而其所爲文世則鮮知之其孫進士潚近以示余其言醇而理彰于理不合雖强之言不言其所言者未嘗不本諸道惟其志於道而不以文名故言文者失之嗚呼人能因余言以求先生之文庶幾得其所存先生字原道以泉州路總管致仕其厯官政事見予所撰墓銘故不著白雲藁序宋濓劉勰論文有云論說辭序則易綂其首詔策章奏則書發其源賦頌歌讚則詩立其本銘誄箴祝則禮總其端紀傳文檄則春秋爲之根嗚呼爲此說者固知文本乎經而濓猶謂其有未盡焉何也易之彖象有韻者即詩之屬周頌敷陳而不協音者非近于書歟書之禹貢顧命即序紀之宗禮之檀弓樂記非論説之極精者歟况春秋謹嚴諸經之體又無所不兼之歟錯綜而推則五經各備文之衆法非可以一事而指名也蓋蒼然在上者天也天不能言而聖人代之經乃聖人所定實猶天然日月星辰之昭布山川草木之森列莫不繫焉覆焉皆一氣周流而融通之茍欲强索而分配非愚則惑矣夫經之所包廣大如斯世之學文者其可不尊之以爲法乎吾友朱先生伯賢以純篤之資而留意于辭章先秦兩漢以至近代諸文無不周覽用功之久灼見其是非之眞復取近正無疵者聚而爲書蠅頭細字動至數十大冊時出而諷咏之已而嘆曰學文不本諸經其猶玩培塿之卑而忽嵩華之高乎乃復致力於經功益倍於前時越數歲胸中浩然若有所得操觚書之凡陰陽盈虚之運民物倫品之理萬彚屈伸之變皆隨事而著源源乎罔知其所窮且其爲體多而不冗簡而有度神氣流動而精魄蒼勁誠可謂粲然藻火之章矣濓之有志爲文不下于伯賢古今諸文章大家亦多究心及游黃文獻公門公誨之曰學文以六經爲根本遷固二史爲波瀾二史姑遲遲盍先從事于經乎濓取而溫繹之不知有寒暑晝夜今已四十春秋矣用心之苦雖與伯賢同而伯賢之所造詣濓固不能窺見其髣髴也然而太上立德其次即立言立言甚非易也自孟子以來致力於是者非不多求其可與經並傳者舂陵周元公一人而已元公之言曰文所以載道也輪轅飾而人弗庸徒飾也况虚車乎是則文者非道不立非道不充非道不行由其心與道一道與天一故出言無非經也元公豈嘗拘拘學爲文哉濓與伯賢又當共朂之可也伯賢以白雲藁若干巻請余序濓故具論之使知伯賢之文一以經爲本而蹈襲近代以爲美者其尚有所發也哉伯賢名右天台人著書甚多所謂春秋類編三史鉤𤣥秦漢文衡深衣考邾子世家傳皆别行樗散雜言序宋濓樗散雜言者金華許君存禮所賦之詩也予嘗獲而讀之愛其取法比興有近于古作者謂存禮曰當今之詩予頗得縱覽求其如君者百十之中僅一二見焉非三十年磨濯光精而宣鬯靈龢烏能如芙蕖出水弗霑纎塵有如此者世俗葷腸溺胃饜飫肥醲未必能知君然而至寳不可使埋光而韜采也予當爲君序之以傳已而存禮俾侍史録其全集示予于龍門山中因爲之言曰詩至於三百篇而止爾然其爲體有三經焉有三緯焉所謂三經者風雅頌也聲樂部分由是而建所爲三緯者賦比興也制作法裁由是而定故周官太師之教國子必使之以是六者三經而三緯之所以聆其音節之詳玩其義理之純養其情性之正詩之爲用其深且大者蓋若此嗚呼學詩者其可不取之以爲法乎學詩者固不可不取之以爲法若夫出品裁之正合物我之公高不過激悲不傷陋則論詩者又可不倚之以爲權度乎夫詩一變而爲楚騷雖其爲體有不同至於縁情托物以憂戀懇惻之意而寓尊君親上之情猶夫詩也冄變而爲漢魏之什其古固不逮夫騷而能辨而不華質而不俚亦有古之遺美焉三變而爲晉宋諸詩則去古漸遠有得有失而非言辭之所能盡也嗚呼三變之後天下寧復有詩乎非無詩也詩之合于古者鮮也何以言之大風揚沙天地晝晦雨雹交下萬彚失色不知孔子所刪之者其有若斯否乎組織事實矜悅葩藻僻澁難知强謂𤣥秘不知孔子所刪之者又有若斯否乎牛鬼蛇神騁姦眩技龎雜誕幻不可致詰不知孔子所刪之者又有若斯否乎如是者殆不可勝數孔子吾徒之所願學者也孔子之所取如彼而後之作者乃如此尚得謂之詩矣乎唐宋諸名家其如此者固不可絶謂無之而不及乎此者抑何其多也今世之以詩鳴者蠭起而泉涌其視唐宋又似有所未逮姑置之勿論間有倡爲江南體者輕儇淺躁殆類閭閻小人驟習雅談而雜以䙝語每一見之輙閉目弗之視詩而至于使人弗之視則其世道之甚下也爲何如哉此予於存禮之詩不覺深爲之喜而繼之以嘆也嗚呼使自一鄉逹之于一邑自一邑逹之于一州自一州逹之于四方咸有如存禮者焉則詩之道庶幾其復古乎予雖不能詩而論詩頗謂有一日之長因愛存禮之作不待請而自爲序之非深于詩學者殆未有以知予意之所存也剡源集序宋濓濓嘗學文於黃文獻公公於宋季辭章之士樂道之而弗已者惟剡源戴先生爲然濓因日購先生之文絕不能以多致㑹有詔纂修元史命濓總裁其事事有闕遺者遂以上聞遣使訪于郡國竊以爲先生著作有闗于勝國宜多乃屬使者入鄞徧求之鄞先生鄕國庶幾有得之者曾未幾何有司果以剡源集二十八巻來上濓始獲而盡覽焉因作而曰辭章至于宋季其敝甚久公卿大夫視應用爲急俳諧以爲體偶儷以爲竒靦然自負其名高稍上之則穿鑿經義櫽括聲律孳孳爲譁世取寵之具又稍上之剽掠前修語録佐以方言累十百而弗休且曰我將以明道奚文之爲又稍上之騁宏博則精麄雜揉而略繩墨慕古奥則刪去語助之辭而不可以句順欲矯弊而其弊尤滋私自念辭章在世如日月之麗乎天雖疾風暴雨動作無時亦不能蔽蝕其精明獨怪夫當時之士奚爲乏一人障其狂瀾邪復念豪傑之士何代云無第區區所見孤陋故鮮能知之非誠然也及覽先生之文新而不刻清而不露如晴巒出雲姿態橫逸而連翩弗斷如通川縈紆十歩九折而無直瀉怒犇之失嗚呼此非近於所謂豪傑之士也哉盖先生七歲即知攻文咸淳中入太學以三舍法陞内舍生旣而試禮部第十人登進士乙科調教授建寧府及遷臨安教授行户部掌故皆不就㑹宋亡爲元執政者薦之起爲信州教授先生年已六十一矣尋遷婺州以疾辭後六年終初先生旣擢第慨宋季辭章之陋即矯然自異久之四方人士爭相師法故至元大德間東南文章大家皆歸之先生無異辭先生之殁僅六十年已罕有知其名若字者殊可哀也濓在史局旣命彚入儒學傳中及司業成均復將錄其剡源集者歸以示諸人而先生之鄉有夏君闗來為國子正方與先生之孫資先謀刻於梓夏君遂以題辭為請且謂知先生之深者唯黃文獻公公旣不可作子幸無讓於是忘其僭踰而為序之如此嗚呼豐城之劍荆山之玉總埋没泉壤為已久神光上貫於霄漢者終弗能掩也其先生之謂乎先生名表元字帥初一字曾伯慶元奉化州人朱悅道文藁後題宋濓右烏傷朱君悦道所為文一巻予讀已愛其理明文順顧謂二三子曰辭章弊久矣挹蠟為葩以逞妖艷非不眩人目睛比之元氣流行千紅萬紫徧發洛陽名園固自弗侔何也生意動蕩與死色之不澤者其可以並論也哉蓋古人之于文以躬行心得者著爲言言有醇疵但繫乎學之淺深爾後世則不然以文學文皆億度想像而為之知道君子未嘗不一笑擲之也今悦道之文論議必本諸經而翼以濓洛闗閩之說旣履康衢矣長安雖遠惡有不至者哉其視顚連榛莾之蹊而虎豹蛇虺縱横交于前者奚啻萬萬悦道非惟見諸空言又思踐履以騐之此尤度越於人人予雖留意於文造道不深而出言多疵深有愧於悦道雖欲痛自懲刷而秋髪繽紛被肩矣惜哉予期悦道甚遠悦道器宇清粹誠足以副予所期他日道明德立而文益昌予當在知言之列無疑故録與二三子言者題其巻後云題永新縣令烏繼善文集後宋濓世之學者必有師雖百工伎藝之㣲亦必有以相授然後能造其閫奥况爲文者發造化之袐貫古今之統茍無以管攝而闔闢之則何以盡其變化不測之妙其不傳之於師奚可哉吾鄕修道先生胡公以光明正大之學發於精深嚴簡之文訓迪學子篇章句字皆有法往往從之者多得文之旨趣其所造固有淺深高下之殊而體裁終不失古四明夣堂噩師雖居浮屠中能久與先生游先生爲文之法實與聞之烏君繼善自㓜學文於夣堂凡先生所指授者悉以語烏君故烏君之為文峻潔如明月珠起伏如春江濤因語二三子曰必如烏君然後可以言文也若無師授其可易致是哉予嘗譬之有美錦焉使朝市縫人製之則能中度而適體委於巖穴之粗工則左低而右昻上侈而下歛錦固錦矣其如不合何文之無師授者亦若斯而已予老且多病文字一切謝去不作縱有一二多仰手於人獨喜烏君之文親題而後歸之嗚呼予生也雖居先生之鄕而不能傳先生之學其于烏君文豈能無慊於中哉烏君名斯道繼善字也明之慈溪人嘗知化之石龍縣令調吉之永新其爲人溫然如玉蓋與相稱云書鄭子美文集序王禕鄭子美先生所為文予十年前嘗得其漢唐諸論頗病其辭不皆精純而其體制往往或戾于法度心未之好也今年秋復獲其師山集盡讀之觀其操議持論務辨道理談名義蓋汲汲焉以扶植世教自見心嘆服之於是乃愧向之知先生之不能深也雖然以文求先生非知先生者欲論先生者當自其平生大節而觀之初先生隠居於鄕教人接物一體於名義至正中宰臣以名聞詔拜翰林待制兼有上尊名幣之賜先生疾當世方奔競成習將有以抑之則抗疏控辭其言曰臣聞學之淺深他人不能知臣實自知之所謂吾斯之未能信豈敢貪冐恩榮以自欺其心酒與幣天下所以奉陛下陛下得以私與人臣不敢不受名與器祖宗所以遺陛下使與天下賢者共之者陛下不得私與人臣不敢不辭疏聞朝廷不之强也居無何而干戈起徽城䧟焉城守者將要致之使為用先生厲色拒之曰吾豈事二姓者耶因被拘囚郡中詘辱者久而忠不少變親戚朋友擕具餉之則從容為之盡歡且告以必死狀其妻使語之曰君茍死吾其相從地下矣先生謂曰若果從吾死吾其無憾矣乎明日衣冠北向再拜自縊而卒嗚呼先生於出處死生之際其大節表表如此則世之以文求先生者豈足以盡先生乎况求之以文者不觀其所以自見而徒狥夫言辭之末其尤淺知先生矣唐司空表聖韓致元所為辭章凡近纎靡無足多者而其處進退存亡能不失其正節義所在君子蓋深許之其所為不朽者宜在彼而不在此也予懼夫人讀先生之文者如予向者之所病故竊志之以為告世有知言者其必謂予能知人也哉先生名玉字子美徽州人潛谿後集序趙汸潛谿前集凡十卷冠以陳公衆仲序文浦陽義塾旣刻而傳之後集筆藁日新而巻帙未有終也宋公以書來俾汸序其意顧久病廢學閱歲無以復命又念與公相知有自蓋嘗徧觀前集而惜乎陳公有未及盡是者然則後集固不可無序汸旣不敢讓知其又奚辭迺為序曰修辭以為文非古也其起於漢之西京乎太史公傳司馬相如吾丘夀王東方朔枚臯王褒之屬以善屬文見知人主然皆不得列於儒林而孔子弟子别為傳謂辭章為文而不本於經蓋昉於此至唐韓子宋歐陽公曾子固相繼而出始考諸經以立言其器識之大學問之博志節之固又足振而興之文辭之用於是為貴雖子朱子纘周程之緒猶且誦法表章而不敢忽焉葉正則顯於東南當道學復明之世刻意脩辭不踐故迹而乖離侵畔自窒其源其視韓歐特起於千載之下而知所宗尚者為何如也是以君子尚論浙東先逹必以東萊呂公為歸豈非以其博而知要能自得師雖儗諸孔門游夏之倫而無愧也乎若夫辭逹理明不徼繞於陳言而固與之合則百餘年間莫善於侍講黃公者矣景濓父生呂公之鄕而久游於黃公之門其學以經為師而尤長於周禮其出入百家鈎深索隱蓋將以自致也而不但資以為文其於為文直以才高思敏舒之歛之無適不宜而未嘗有意於為作當其發憤擇術直詆辭章為淫言葩藻為宿穢期於剗削刋落以徑趨乎道德之塗而於呂公尤惓惓咏思歎慕若不能自己於言者則其於輕重之類得失之幾察之明矣别集之行豈徒欲以文辭名世者哉蓋汸所知於景濓父者如此若夫陳公謂為文必傳諸師而後可者景濓父旣不以自多而汸又不足以言之顧嘗聞之袁公伯長嘗問於先師虞公伯生曰為文當何如虞公曰子浙人也子欲知為文當問諸浙中庖者予川人也何足以知之袁公曰庖者何用知文乎虞公曰川人之為庖也粗塊而大臠濃醯而厚醬非不果然屬饜也而飲食之味微矣浙中之庖者則不然凡水陸之産皆擇取柔甘調其湆齊澄之有方而潔之不已視之泠然水也而五味之和各得所求羽毛鱗介之珍不易其性故予謂為文之妙惟浙中庖者知之袁公蓋矍然稱善也自虞公為是言學者竊論以為非黃公之文不足以當之衆仲嘗學於虞公而景濓父黃公之徒也二公之所指授信乎有異於他門者哉善觀斯集者則得之矣鄭士亨東游集序劉基予始與豫章鄭士亨遇於杭察其人玩其文遂與為忘年交日相過談文章劇晝夜如不及有所得意各相為慶慰呼酒共飲至辨近世之為文非逹官貴人及善諛不諧於時士亨不能諛又不仕故不敢以文示於人而自以為賢于博弈書而藏之或獲傳於後世則亦可以懲創感發不為無益而不悖乎古聖賢之意雖不望其必傳而亦未嘗不欲其傳也其年冬十月有牛諒者見鄭子之文大喜率其友聞正集而刻之於梓求予為序予甚異之夫縣黎之處璞中雖不自售而不能閟其璟謂卞和之不恒有可也而謂世之無卞和也可乎哉余嘗謂鄭子之文獨予識之而不意復有二子彼二子者好為文則不取諸時人之所趨而獨慕於居下位之鄭子何耶予旣喜鄭子之文獲傳於世而又喜有二子能識世人之所不識而自拔於流俗以為之傳也於是乎序明文海巻二百三十三
