body:
  text: 明文海巻二百三十五餘姚黄宗羲編序二十六文集馬石田文集序李東陽天地氣化流行而不息故凡運乎上者非獨和風麗日之為美而隂晨曀夕風雲之變態雷電之光烈亦時有之列乎下者高山大川之流峙固也雖窮崖絶谷亦必有草樹之為竒羽毛鱗介之為瑞欲冺之而不可得惟人亦然雖其時與地有治亂美惡之殊而文章功業随所寓以自見是果曷為其然哉氣化為之也當其機緘之操縱槖籥之啟閉鳴而為聲絢而為色凝聚而為實揚播而為芬彼所謂物皆囿乎其間亦不自知其所以然者惟人之靈小者變氣質而大者斡化機其所以立身垂訓揚聲光於不朽者固亦有道矣而代不數見地不多産其澌盡而冺滅者何限故論者卒以歸之氣化之間豈得已哉於其冺滅之易而不朽之難隨時與地必取其文章功業之著者表而傳之使之不溷於物固君子之所有事也元之入主中國蓋有氣化以來所未見八九十年涵養生息以旃裘為冠履以干楯為鉛槧以詩書為吟誦製為文章播為歌咏鳴一代而傳四方者亦不誣蓋不獨生中原出南國代傳而世習者然後為能也于以見人之良能無有不具而文章功業之在天下者無所不可教而入也馬文貞公出西裔居光州所著有石田集若干巻公没之後淮東亷訪使蘓伯修請於朝刻梓以傳元季散佚不行於世久矣今山西按察使熊君騰霄光人也嘗為監察御史出按甘肅有鄕先生以錄本屬之謂已闕漏無所質聞公有裔孫在肅請往訪之君徧厯諸郡久乃得馬鐵牛者遣人詢之果于壁上得公所撰母夫人墓銘石刻一紙他無所得也旣為按察久政事之暇手自編校重刻以傳而伯修及陳編修衆仲之舊序皆在焉其稱公甚備考諸元史又稱其文章精贍尤致力於詩圓宻清麗無不可傳者信一代之傑作也若其議典禮興政事摧姦劾惡屢黜而不悔蓋亦有風節焉識者因其文以求之可見矣公名祖常字伯庸官至樞宻副使歸遷陜西行臺中丞不赴卒贈河南行省右丞上䕶軍魏郡公謚文貞石田其别號集是以名今因其舊云倪文禧公集序李東陽文一也而所施異地故體裁亦隨之館閣之文鋪典章禆道化其體蓋典則正大明而不晦達而不滯而惟適於用山林之文尚志節遠聲利其體則清聳竒峻滌陳薙冗以成一家之論二者固皆天下所不無而要其極有不能合者故君子觀人之文不必識其面聞其論議親見其所施為而其器識材用之稱乎此或宜乎彼斷斷乎其可别矣是雖殊世異代操吾説以求之無所不得矧耳目所接風聲義槩在天下方盛而不可冺者哉東陽辱青谿倪先生舜咨為同年交最深獲見其先文禧公樂與天下士誦公所為文舊矣公居南京有火厄手掇舊藁數帙以出青谿復力檢得之惜乎散佚尚多不能盡錄公旣没青谿乃取公所自編訂者為三十二巻刻梓以傳東陽始得而備見之作而嘆曰我國朝肇基淮右奄有六合光嶽之氣全得于天自高皇時宋學士景濂諸公首任制作而猶未得位文皇更化楊文貞諸公亟起而振之天下之休養涵育以曁英廟之初富庶之效可謂極盛矣而劉文安諸公出焉逮於憲廟其用猶未已也時則有若文僖公相與先後揚厲其名大著其在景泰間應制賦詩中官常立俟以進自餘碑板金石之文雲涌川溢沛不可禦嘗奉使朝鮮即席命筆略不搆思國人皆縮頸吐舌駭嘆不能已及歸梓其作為編至於今存焉蓋公之雄才絶識學充其身而形之乎言典正明逹卓然館閣之體非巖棲穴處者所能到也故雖中立巇險晩登通要不得盡見於用而其於典章道化闕一代之盛以為後觀者如此豈非不朽之事哉昔孫盛作晉春秋傳之外國後有購者於遼東得之宋孫甫作唐書甚自珍惜嘗火後歸其書他不復顧斯文出處與此正同然二氏之書卒不見於世者謂其子孫不足以繼之也公修英廟實錄未及終青谿繼入翰林以成事告校諸前代其班馬氏之風乎且青谿為學士為禮部侍郎尚書趾美承閥當代所僅見行業之著其於公益有光焉後世稱江東倪氏之盛者殆不獨文之為重而文其徵也是固不可以不傳已公諱謙字克讓學者稱為靜存先生已未進士及第官至南京禮部尚書致仕卒贈太子少保文僖其賜謚也文有玉堂稿百巻上谷稿八巻歸田稿十二巻南宫稿二十巻通為巻百七十則裒為家集青谿與其弟工部主事阜軰共藏之而遼海編别行於世云呆齋先生文集序李東陽我文安呆齋先生遺文若干巻皆所自擇或以類析或以歲次自舉業程試講章奏疏應制代言以至著述賦詠應答之作皆備焉東陽少竊科第入翰林為庶吉士奉詔受業獲聆緒論謂為文必博先而約後譬之山焉必出雲雨産寳玉生材木禽獸而朽株糞壤亦雜乎其間斯足以為嶽為鎭譬之水焉必吞吐日月藏畜魚龍變現蛟蜃而汚泥濁潦來而不辭受之而無所不容斯足以為河為江為海古之所謂大家者皆然也若句鍜字煉探之而有窮取之而復餘者不過為孤峯絶澗而止惡足以成其大哉至其伸紙運思揮毫對客正書旁竄晷不移日稿不易幅而典册金石施諸朝廷播於四方者往往而是徐而求之則見其渟峙演迤頓挫奔放竒正並用變化而不常者皆相與駭愕歎羡以為不可及及登秘閣析疑義稽古訓或日詠百詩或一揮九制嘗有質宋人名氏者援筆就案列其世次若譜系然乃定為某人之子某人之姪詞臣學士恒侈言之蓋先生之父石潭封君嘗教其徧讀經史而戒勿作文及見所私著始有八靣受敵之譽於是縱其所為比得鄕試怪不在優等謂不魁春選無相見也果以禮部第一人及第是其厚積而後售持盈而後發溢乎心胷而著之藻翰者無惑乎其大如此也古稱文章與氣運相高下即其人論之則其情志行業亦可考而知也國朝洪武初肇啟文運宋潛溪諸公遠不可見永樂以後至於正統楊文貞公實主文柄鄕郡之彦每以屬諸先生文貞之文亦所自擇世服其精而後人乃有刻為續集至數十巻者先生餘稿嘗裒而焚之於衆所傳誦或未之錄今存者不過十之四五而已蓋雖以博教人而自律之約乃如此豈所謂小慙大好猶有非末學淺見所能測識者耶若漢劉向宋劉敞皆博極羣籍以文章名而未見於用先生純確樸厚之心夐出流俗優游翰林晚始大用用亦不久雖其功業未竟而其文偉然大鳴於時固一代之盛哉先生嘗閲東陽閣試炎暑賦進而謂曰吾老矣縱不死亦當去矣子必勉之東陽雖知嗜學無所底就目熟遺文耳存善誘不知涕淚之交頥也是集先生之子府通判稼刻於廬州本鉅字細弗便繙閱其仲子南京太常少卿稱重刻之時先生門下士皆散去東陽獨謝政居京邑謹為序其編之首先生官至禮部左侍郎兼翰林學士贈尚書諡文安學者稱為呆齋先生集以齋名者仍其舊也若其名字邑里天下共知之而狀志可互見云倪文毅公集序李東陽有紀載之文有講讀之文有敷奏之文有著述賦詠之文紀載尚嚴講讀尚切敷奏尚直著述賦詠尚富惟所尚而各適其用然後可以為文然前數者皆用於朝廷臺閣部署館局之間禆政益令以及於天下惟所謂著述賦詠者則通乎隱顯蓋人情物理風俗名教無處無之雖非其所得為而亦所得言其所言者又窮深極博而無所不得盡若兩用而兼能者則一代而不數見也茍不得其所尚而徒以為文則不過枝辭蔓説雖施之天下亦無實用而况不見於用者哉青谿倪先生弱冠舉進士厯翰林編修侍讀以至學士嘗修英廟實錄及憲宗文華大訓紀載之文秘在史局世莫得而見也講讀經幄根據書史傳以時事明爽暢逹有竦天聼而囘聖心者然此功猶隱而難知及出為禮部侍郎進尚書加太子少保改南京吏兵二部参贊留務入掌吏部如黜淫祠却異物謹天戒守舊章諸疏亦嘗考古義稽故典極陳利害辭嚴理正得古人告君之體是其文見於敷奏間天下皆傾耳注目顯然知勲業之所由建非茍具書簿循條格之為者誠可謂有用之文也至其詞賦碑表序記著述賦詠之作長篇大章泉涌山出聲應響答情興逸發事理兼備游刄於全牛之内安行於逐水之曲固其天資所得素業所就以鳴一時傳四方者自先生觀之亦其餘力所及視彼旬鍜月鍊章追而句琢者固其所不暇為亦其所不屑為也先生之父文僖公在正統間以文名有集行於世東陽嘗得而序之先生之文手自編訂以所號名為青谿漫稿知府熊君桂刻於徽州其嗣子中書舍人霦請予序予與先生同舉進士入翰林志業契分極親且厚旣銘其事行之大獨於文有未盡發者故為序諸簡端先生諱岳字舜咨贈榮禄大夫少保文毅其賜諡也國朝父子入翰林為學士並諡為文實自倪氏始且以文集繼世梓行者金華王忠文公之外不一再見亦於此著一代之盛云張東海集序李東陽東海之濱有張汝弼先生者嘗觀於海而有得焉因以東海自號少善草書雄偉俊逸自成一家同時能名書者皆莫能及碑板巻帙流布邇遠至於外國東海之名遂徧天下其為詩清錬脱俗力追古作意興所到信手縱筆多不屬藁即有所屬以草書故輙為人持去先生亦自謂刻集太多欲矯時弊不復置意其間清詞警句時或傳誦而見其全集者蓋鮮其為文隨事觸物必根理義不為華藻枝葉之辭特自愼重不茍作又以無藁故益加少焉故以書掩其詩詩掩其文説者乃謂藝之至者不兩能非知先生之深也先生歿且二十年其子廣西按察副使𢎞宜亦卒家又遭囬禄之變兵科給事中𢎞至檢諸舊篋不能十一又訪諸婣友所藏及胥史所私錄者得其二三為一巻而時所傳誦者尚未之備以續錄未已隨所得為先後將刻梓以傳以先生之詩之文而止此甚可惜也昔之論書者必先人品豈惟書哉人之品必先道德所為道德者非必禹行舜趨服堯之服而後為至惟義利邪正不汩於中涵養旣久則英華自發於外如珠藏玉韞有不可掩者先生晩得科第為兵部郎官最久志操耿耿不為汙合開口論議無所顧忌未嘗謟媚以干進取中所自負往往於詞章發之及知南安律已愛物政宜其人未久而致仕以去故其政事又為文章所掩而其文之存亦止此豈不重可惜哉然空青丹砂金膏水碧顆入而塊玩之亦知其為至寳固不必堆盤積笥然後為富而况於文哉况其人之可重者哉使後世知其人之重則其文益重矣先生諱弼汝弼其字松之華亭人其舉進士在成化丙戌卒於𢎞治丁已年六十闕子𢎞宜𢎞至皆繼舉進士𢎞至為翰林庶吉士世其家𢎞正𢎞玉𢎞金𢎞圭皆不失矩範諸孫之繼而起者相望張氏之文獻固於是乎徵集旣成𢎞至以書上京師介翰林侍讀學士顧君士亷請予序嗚呼予言豈足為先生重哉匏翁家藏集序李東陽匏翁家藏集七十巻吳文定公所著而手自編輯者也為詩三十巻不分體制以年月先後為序文四十巻則分體彚載而先後亦隱然寓乎其間蓋惟輯其所可識而散佚於世者弗與也公旣返葬其子中書舍人奭刻梓於家未畢也比闋服上京師以屬公從子奕數月報詩巻成又數月報文巻成奭持以告予請序首簡予覽之悵然嘆曰言之成章者為文文之成聲者則為詩詩與文同謂之言亦各有體而不相亂若典謨訓誥誓命爻彖之為文風雅頌賦比興之為詩變於後世則凡序記書疏箴銘贊頌之屬皆文也辭賦歌行吟謡之屬皆詩也是其去古雖遠而為體固存彼才之弗逮者麄淺跼滯欲進而不能彊其或過之不失之竒巧則失之佶屈不失之夸誕則汗漫而無所歸於是作者雖多而文之體益㣲矣然言發於心而為行之表必其中有所養而後能言蓋文之有體猶行之有節也若徒為文字之美而行不掩焉則其言不過偶合合而幸中文以古名者固若是乎哉公少以經學為程試旣而徧讀左傳遷史韓栁歐蘇諸家之文欲盡棄其舊業及為部使所廹取甲科官史局文名滿天下老居臺閣弗究厥施而終始於所謂文者故其為詩深厚醲郁脱去凡近而古意獨存其為文典而不俗鬯而不汎約諸理義以成一家之言由是觀之則其識見之眞正行履之端恪情趣之冲泊無累者不特挹其容儀聆其論議而後可知也其文之傳世固不可少哉昔人謂一代數人一人數篇其澌盡冺滅者弗論今求之成帙之間非世所選者亦難乎其為觀矣知言君子執體裁而求之公之文其有取之無窮而讀之不厭者乎然則其散佚者尚博而求之以盡白於天下無徒曰家藏云爾葉文莊公集序李東陽葉文莊公集若干巻帙同而名異其曰水東藁者為諸生及為給事中參政為都御史廵撫宣府而作曰開封紀行藁者為給事奉使河南而作曰菉竹堂藁者在廣東西廵撫而作曰涇東藁者為禮吏二部侍郎而作詩則以次彚錄文則計體而分皆公手自編定而總之曰文莊集者則其子貢士晨所名蓋將為天下道而不敢以私集視也予嘗讀而論之曰公之文博取深詣而得諸歐陽文忠公者為多公雖未嘗自言然觀其紆餘委備詳而不厭要知為歐學也夫歐之學蘇文忠公謂其學者皆知以通經學古為高救時行道為賢犯顔敢諌為忠蓋其在天下不徒以文重也後之為歐文者未得其紆餘而先䧟於緩弱未得其委備而已失之覼縷以為恒患文之難亦如此茍得其文而不得所以重天下且猶輕之而况乎兩失之者哉公學勤好古而志切濟時其在朝廷敷陳獻替多見采納在藩鎭威惠並行在部曹清鑒雅操始終不貳其或違志咈意不克自盡則欷歔頻顣若有已而不能已者然則得於歐學也顧不已多而况文哉今論者無問可不可文必歸之翰林政必推之法家執議如此則其勢不容以不判若持法守律又能以經籍為根柢以文章為藻飾為天下重者獨非人之所難哉國朝文臣得諡為文者翰林之外近時惟吳文恪公訥魏文靖公驥姚文敏公䕫及公要諸當世誠不可易得予生也晚所接見者不過一二人公於我䝉翁岳公為知己故雖不敢知公而獲接言論得其大者凡所以為公計不止為當世道也因以貢士之請為序公諱盛字與中别號及菴所著有奏議錄及水東日記則其家所藏故不載云野古集序龔詡世之罵躁俗粗鄙者類曰野而目方直亷介者類曰古予生草野間所交與者黃童白叟而已是故蹤跡罕渉乎勢利之途談論不越乎耕牧之事衣冠不隨乎時禮貌不徇乎俗與夫一言一動舉不能諧人耳悦人目而適人意也或者以野罵之或者以古目之予聞而竊自揣焉罵我野者誠得我實不足深過而目我古者虚譽過情非予所敢知也於是兼取二字以命其齋庶幾為晨夕接目警心之助以求去其野而馴致其古已耳然余平生好吟所成就僅百餘篇其鄙俚迂誕直所謂呉歈巴唱也他日不耻貽騷壇作家之笑錄以成編因齋名而題之曰野古集區區之心非敢以自擬也傳有之曰詩言志予之命意措辭之拙固懸絶千古人而野人惓惓之意或可少見矣天順癸酉八月中秋日逸老龔詡大章自序重刻雲陽李先生文集序謝鐸士有不為俗變而又能随世自立以必盡其心之為慊是固古之所為豪傑而君子不以謂過者也嗚呼若雲陽先生李公眞其人哉當其時元有天下幾百年海内既平數十載而後行科舉其教化及人者未深先生起進士高第官翰林駸駸嚮用顧以親故就養江南曁其國之將亡也則又慨然欲效一障以畢事君之義不已則竟辭新命沈晦悲惋終其身而不悟焉嗚呼陳良楚産也楚不純南蠻良一旦拔自流俗君子猶以能出谷遷鶯為豪傑之士况生長其世無所逃於天地之間而卒能以古道自勝者哉或謂豪傑若先生者旣非元所得而有則當起佐我國家維新之治殆不為過噫王彦章以鐵槍雄耳事梁以死梁之惡天下之惡一也君子猶有取於其忠若先生者又惡可以其世論之哉若曰生非其時其出其處有不得不爾者則固先生之所深悲而不幸之歎亦君子所不敢後焉者也先生諱祁字一初長沙茶陵人與翰林院學士賓之公實同出西平王之後文章行業輝映後先蓋李氏之澤積之久而發之遠有如此者抑天之所以塞先生者將大昌於今日乎初先生自茶陵避地吉安之永新旣没因葬焉學士公嘗表其墓今顧君天錫守吉安又以為鄕邦典刑之思文之在先生者誠不可缺而舊本日以放失抑亦先生不能不致意於後人者將重刻之以圖不朽鐸託交學士公最深且久知先生履厯為詳因叙論之以歸諸顧君或者先生處變之志得以少白於天下後世若乃其文之傳不傳則豈㣲言所得而輕重之哉見素集序張詡文章以救時為貴中古來文若韓退之之佛骨表歐陽永叔之朋黨論胡澹菴之乞斬秦檜疏詩若杜少陵之八哀石守道之慶厯聖德之作之類排異端崇正道斥奸諛百世之下讀之猶使人毛髪森竦恨不生並時而願為之執鞭也下此則鬭富誇巧雖極其工緻第取悦人耳目而於綱常世道無所闗繋焉果爾亦奚貴於文章而必以是傳世為哉始予計偕至京師於士友家獲覩莆田見素先生林公為秋官員外郎時抗憲宗皇帝疏草三復流涕見其劾匪人糾權倖凛然鈇鉞之嚴而血誠骨鯁溢乎言表殆掲日星而聳山嶽也公雖坐是遠謫而一時國是士氣賴之議者謂與澹菴一疏相伯仲文章若是豈非所謂救時者邪未幾還公留都薦厯外臺長一旦拂衣去朝抗章夕就道未始待報也越數載先帝以言者起公為僉都御史持風裁於大江之左右貪墨吏多望風解印綬去雖當路左璫素號桀黠者亦為之歛跡潛避公出而救時其事功之偉又在在如是蓋不啻見諸文章而已也使公在朝廷則必有以寢淮南之謀在邊陲則必有以寒西人之膽而在山林則天必有以一絲而重於九鼎者矣蓋公精神心術之所寓有未易以尋常窺測者故發而為文為詩或贈送或酬答或寄託雖體製異科風格殊指要之其歸與曩疏救時之意異者幾希矣然則公之文章雖欲靳不傳於世弗可得已而公方退然以為此特醬瓿上意思耳夫豈以是為自足者哉間手編成集凡五十餘巻而以其别號見素者名焉不遠數千里緘書遺予曰子其為我序之得書時薄暮矣亟篝燈快讀次日即捉筆於以見予仰公之至方以託名是集為幸遽忘其謭陋且讓云漱石軒詩文巻後語張寧士不可以好竒竒者正之反不得已而渉於竒尤有惡於正况加之意乎古言太上立德其次立功其次立言夫旣居其次已非極致而又非正可乎哉孫子荆對王武子之言實與蘇長公著飯喫衣之謔為對語世之好竒者遂同然稱詡至於今甚復為之穿鑿附㑹以求通其説大雅云亡何人心之不古如此也夫古之所謂雅言至言善言格言皆敦實周洽切理稱情通逹而無弊由之不知習之不察類皆視為常語而獨甘心於談笑之資奈之何詼諧滑稽之不日相盛也况子荆本始於誤而一時辨給偶渉於竒猶見重乃爾則彼之縱橫合變應機就事真有可竒如戰國時士尚何怪其能自振於當世也嗟夫刻鏤者前陳則純樸者退聽言之不臧求行之淑也難矣雖然人文與世運相高下列國之文異於三代唐宋之文異於秦漢正變為竒竒者必將變而為誕誕不可為正不能為則三代以下惟恐不好竒好竒之士其過於常人也遠矣鄉長者孫公學勤以是名軒意必有見於此不然則以其為同姓之聞人而取以示其子孫豈常人之所好哉瑞石山房集序張寧紫陽羽士范棲雲錄瑞石山房諸作成集將刻板以傳求予序予嘗徧厯吳山周覽鰲峯巖穴論渾成博大當少亞飛來峯而清華竒絶過之固天所以括攬羣秀㑹萃於一隅也當作杭城中山景第一夫天地之文形於兩間上下惟星辰山澤最著所以闡發幽秘而成三才之功者必有言以先之然不逹其妙則不能至於其言至言之士自古無幾後世登高能賦一時意語超拔播揚人口往往與風雅並存蓋其言雖未至亦足以備見人文自不容不存者兹山登遊眺覽歲無虚日題咏著作當倍於常今合所作自元薩天錫而下僅百五十餘章是何無言者之多也嗟夫人之生世才命常相左憂樂常相循豐功偉望旣不可自致又不能因事適情樂於所遇以言論自表泛然過從聲迹隨冺殆不如落英墜葉之猶須叟存也不亦可惜哉君子耻後世無聞茍非聖哲而以名言為緒餘其孰能與之也是編勝事實始流傳感㑹必有至言之士不隨人後者至矣若復以韻語相高不如且放教薩翁獨歩明文海巻二百三十五
