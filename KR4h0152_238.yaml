body:
  text: 明文海卷二百三十八餘姚黃宗羲編序二十九文集備志稿引海瑞許文正嘗語人有書也須焚一遭之説夫坑儒焚書秦之所以為暴無道也而文正之言若秦之與文正非與秦也自炎漢以迄於元紀録之繁文籍之盛汗牛充棟災木費紙不足咎也其聲實不中乖違正道為古先聖賢纍為六經語孟蠧誠若莠之亂苗鄭聲之亂雅樂鄉願之亂德君子不容不深惡之自元迄今殆有甚焉使文正見之又不知當何如其為言也然文正與秦至文正之身則又有魯齋文集行於世夫文正之與秦不得己也文正之不免於為文亦文正之不得已也瑞平昔妄有所作濫稱文章者欲效近代唐山人置瓢棄之江流之中以還造化而又私念以為出之吾心夲諸性命造化賦豫於我而我為泄之或於六經語孟有輔翼焉且今時俗議論自以為是牢不可改亦或有以破之暴秦有作不居可焚之列歟夫吾人有言莫非造化置江流以還造化不可謂無見也然天下之人賦豫稟受出之造化猶之我也或惑焉而踐之有未盡或反焉而行之有不中操造化之豫於我者相與覺焉且同志之士得有所執凡我言之未當議之未詳取為我規焉我也人也互相砥切均得以還夫賦豫稟受之故較之唐山人所為有大焉不猶為可耶近時文人有作必求名人君子一言置簡首謂蠅附驥尾亦一日千里而借其言以信之天下後世也夫使吾言無當雖聖人吾與焉天下之人其心其性原之造化是非有公不能飾也使吾言於道亦有合焉聖人不吾與天下後世不吾與吾心其一造化自有的見不可轉也夫人有言亦求之吾心質之先聖以參考焉而己矣不信之人心而信之人言非信也用是不自嫌忌取平昔所作自編敘自為一語識之以告同志云西村集序周用莊周有言曰刻意尚行離世異俗髙論怨誹為亢而已矣此山谷之士非世之人枯稿赴淵者之所好也語大功立大名體君臣正上下為治而已矣此朝廷之士尊主強國致功兼并者之所好也夫仁義忠信以為學出則朝廷處則山谷人徒以為為亢也以為為治也而不知亢之未始不為治治之未始不為亢也故曰夫人幼而學之壯而欲行之行則君子欲之然能必其行乎哉欲之而不可得則其學猶是也是故亢而不為倍治而不為矜則固世之所謂通儒者已西村先生自少好學於書無所不讀卓然舉大義不掇拾以為文離而尤攻於史學於古今治亂之端官府故事名物數紀縱橫上下指掌論説莫不有肯綮歸宿以為學者宜如是而不屑以求一試聲名隱然起東南成化中三原王公巡撫江南以百姓之利病坐先生而問焉則歷歷語所以退復疏其事以道諸所宜更置公歎曰子之才可以當一面乃今得先生所著述自詩歌文辭之外其與旬宜大臣臺部諸使郡縣長吏往復論白及於政事者居其三之一焉莫不適常變盡利害里閭韋布之所推遜而無有選擇縉紳大夫之所以嚮用致理而不能舍去者皆是也則所謂通儒者非先生歟吾吳中經生學士講求時務水利莫先焉決塞變遷大要委諸海而已殆難按迹而求復其舊也職方禹貢以來互為援據夫人而能之舉而加諸水則悖矣不然則乂吏於兹土者大發在官之蓋藏而以畚鍤從事壞廬舍敝腓脛掘地數千里利旁流內其中而曰水去矣明年不幸而恆雨曽不能損水之分寸其如浮而不實費而無功何哉至讀先生論水利書首以謹堤防其大法有司者使田者因地勢豫為防以擬水於是立之表以程其功課之藝以益其厚貸之粟以傅其力夫民水也大為之坊民猶踰之况不為之坊乎裕民成賦之道未有能行之者此其有用之學可以畫一而論也余生也晚不獲操几杖以從讀其書而每有感焉先生既沒其曽孫太學壁裒其稿為集余曰是集也約而逹勤而節謀而有徴不獨論水利若是矣可以傳也余所嘗欲見先生所著禮纂若干卷者尚不在集中先生史氏諱鑑字明古吳江人學者稱西村先生吳文定公表其墓家世行實具可考也豐南禺摘集小序張時徹南禺公沒墓且宿草矣余讀其遺文蓋䀌然傷之焉公質稟靈竒才彰卓詭論事則談鋒橫出摛詞則藻撰立成蓋九流百家罔不涉其津涯七步八義未足誇其捷麗是以士林擬之鳳毛蓻苑方諸逸駟芳譽而希下風者皆是也然而性不諧俗行或盩中片語合意輒出肺肝相啖睚眥蒙嗔即援矛戟交刺亦或譽嫫毋為嬋娟斥蘭荃為薋菉旁若無人罕所顧忌知者以為激詭而不知者以為誕罔也繇是雌黃間作轉相詆譏出有爭席之夫居無式閭之敬鶉衣藍縷甘原憲之守貧濕突不炊同子桑之閉户童奴絶粒而逋亡賔客過門而不入竟顑頷以終其身悲夫以彼其才逄時遘會進當翺翔金馬標表詞林坐食大官之餼退而談道講蓻主盟騷壇猶將響附景從如楊雄之問字列子之饋漿何至青蠅叢集不復少加封殖耶乃知喻四傑於江河誚輕薄之妄哂推李杜之光焰等浪議為蚍蜉不獨於公慨之矣公平生著述甚富其大者有五經傳有世統博洽精詣覽者當自得之自餘詩文充於篋笥未經編次率多散佚其孫應大稍為搜輯余得取而觀之采其詩之雅馴者刻以傳之同好其如全集則以俟夫知言者蠛蠓集序萬恭諺曰相馬失之瘦相士失之貧余讀浮丘生所為蠛蠓集蓋為之懭恨凄楚云夫生馳心元邈玩情典墳直入先秦漢天厨咀其膾而囁其胾假令校天祿石渠其所制作豈不爝然流光直追古昔而乃幽愁促迫身且不容桎梏拘囚白日不照幾與盜賊臧獲駢首而戮悲夫及觀獄中諸所上書所為諸賦激烈悲愴乂有古先秦漢䇿士之風何其雋也何其雋也昔卞和氏得璞獻之楚武王以示玉人曰石也刖其左足復以獻成王玉人曰石也刖其右足和抱璞泣王都門繼之以血乃剖之果良玉也君子謂卞和氏也智毁其足而存玉生置極刑入之復出之既又出之視卞和之刖何啻乃忘朝夕之命方且笙簧屈宋馳驟班馬此非所謂毁足存玉者耶然聞易牙初干齊桓公也飯土鉶調太羹齊君怒而唾之為之臑熊蹯炙薄耆薦山梁之餐割豢豹之胎齊君甘焉為封萬家之邑晉平公始御師曠章英迭奏韶濩齊鳴晉侯左右視弗能竟也變為激流羽商綴宣鄭衛揚北里紹陽阿晉侯按節歎曰天下之良工也夫易牙師曠非暗於前而智於後也性投於所隨而技變於所嗜也今天下之為齊桓晉平也者豈鮮少哉生幸見天日余讀生所為蠛蠓集益為之懭恨悽楚竊恐生終其身幽愁促迫殆又甚也然君子寧齊桓之不中不能為易牙之變味寧晉平之不諧不能為師曠之變聲何則情志通於寥廓不可以世俗移也生向不遇陸五臺先生吾恐生之胸不足以當伏鑕而生之頸不足以膏白刃也乃幸得遇陸五臺先生出之拘囚之中登之詞藝之林老且白首獲與屈宋班馬捉刀而立荷戈而趨即為齊桓晉平所笑而獲固已多矣終其身幽愁促迫夫又何傷也余性特好古而未之能見浮丘生所為如是既悲之則復喜而著之刻瞿存齋先生文集張瀚存齋瞿宗吉者吾杭郡知名鄉先生也先生至正間修行績文誦習詩書百家之言避世潛身晦迹海上入明應聘出兩為邑學博士以功能升太學終周王府相當是時天下初定中國所喜好弓矢搏擊薄文墨不為已而縱馬放牛漸修文教乃徴巖穴之士凡負一技能有禆政治大者登三事其次備侍從領方嶽皆表見一時流聲著績固不朽盛事已先生抱輔世之才挾華國之䇿獨不見用即用又不盡其長竟沉鬱下僚使天人治安經略僅僅與膠西長沙同途轍信文章顯晦有時命途通塞有定抑居卑自斂别有意見不可測識也先生著作甚富所著若綱目重編花影集剪燈集皆梓行流傳膾炙人口曽孫亷輦復旁搜遺逸得文與詩合若干篇將併刻之有曰晴者雅善余間示所輯屬敘其事余讀之大抵根極理奧不忝醇儒篇中言必稱孔孟詞必做經傳固其不希世就功明甚然以任間局故得專意文學若去彼取此所謂不朽盛事豈特志功名者擅其美哉歷世滋逺搜括靡遺則知儒術相仍代有人已為序而歸之西玄集序孫應鼇余自入關中訪關中學士大夫近代所撰述徴文獻乃鑑川子示余西玄集讀之犂然有當於心集為天水胡氏所敘凡二百首大略己具鑑川子又求得全稿付三石子選選之總得七百四十八首三石子因付余鍥以畢鑑川子表揚之意始余自延州歲試旋轅道耀州三石子觴余尊經閣相與論詩余曰世所談詩詳哉其言之矣然總之則才情兩端凡曰體格曰采色曰聲律曰事類皆才所經緯也曰思致曰比興曰風調曰神理皆情所緣飾也才所經緯醖釀於情情所緣飾薦藉於才總文精慮妙在心悟斯懸解之真機密附之要詮也三石子曰韙哉又問詩之世代余曰近體歌行擅美於唐五言古體軼塵於漢魏乃六朝者則漢魏之委流而唐之濫觴也代既殊製人亦異軌但逐才之篇易求體情之製難得雖莫不有傳折𠂻無戾見亦罕矣三石子頷之曰韙哉因與論近代諸詩關中諸詩而及西玄集三石子曰西玄子近體歌行法唐古體法漢魏於才情無戾焉其可傳已余曰韙哉三石子又曰西玄子為翰林編修諫武皇南巡被杖不屈謫知澤州親藩束手斂迹貪墨吏解綬去莫不以嚴見憚所自樹竒特若是顧終其官秩宗未嘗有振矜色讀其詩率溫厚和平無亢逸者斯又何也余曰世所謂才情者可矯致否耶西玄子出其磨礪裁其骯髒委心素定總術不迷斯集之所繇可傳也使懷自樹竒特心其養薄其才情移矣詩烏乎傳三石子又頷之曰韙哉乃轉旋遂風雨滿樓閣余亟於行乃罷觴而别集既鍥成三石子先卒不獲見矣是日相與論辨頗多皆莫逆於心以不關是集故不著西玄子姓馬名汝驥諡文簡綏德人三石子姓喬名世寧即耀州人鑑川子姓王名崇古蒲州人東麓遺稿序李默昔人謂大音必光嶽氣完而後大振豈不信然哉當其隂陽易位雷雨滿盈精魅百出烏睹所謂昌明盎融之盛哉及其三辰反正卑髙奠序灑然而萬物在宥翕然而八風咸秩然後繆幽出其宣朗呻吟轉為謳歌嶮巇砥為平康鴟鳶化而鸑鷟當是時也以恢駿業而矢德音將必有冠冕佩玉之容焉賔主終日百拜之節焉川明嶽麗以為其姿卿雲瑞日以為其祥金聲玉振以為其度雖代各殊軌條貫靡同而敦厚和平之氣渢渢乎亦足以究一王創治述作之旨矣本朝肇造區夏功德加於百代蒸淫炳煜施於人文至憲孝之間極矣然而風流既靡隄防漸決為文幾同訓詁聲律惟求括帖異時學士大夫始喟然有痛今懷古之志爭相刻意力毁故轍以為起衰拯溺功存矯正不知然犀探驪復尋委流涉漢津者今江左矣摹開元者今永徽矣何亟反而昧本末也夫道有升降文由盛衰知言之士謂今為盛耶衰耶大江以南兄弟並居詞苑著聲聞者有汪氏汪氏其長公曰石潭宗伯次公曰間齋吏部其季東麓先生則默庚辰主司也先生成進士讀書館閣青年已強仁與二兄故相師友二兄居翰林蓋𢎞化極盛時也文章師承大抵得之先輩先生又從二兄授家法豈以時好輒廢繩墨也然自知言之士考鏡得失猶以醴玄並設鸞割同操反夲修古之意宛有存者則知先生之文者不亦難哉先生方二兄居位不徙官自編修積資為殿讀復以骯髒見斥去為通判同知僉事餘十年始有位於陪京階不過少卿乃數日竟卒視二兄地望鮮同同以剛正見廢豈不悲夫默之為封部也亦以忤時謫倅當先生故處其後先生用常調再遷默亦逡巡起為藩臬長吏備位學者師而先生先已下世先生子絅乃以遺文屬默於浙嗚呼傳先生之文者非默其誰因命汪令克用刻之海寧明年默在南雍絅復貽書責序昔蘇文忠敘次歐陽子之文至推尊其道上繼韓愈自謂非一人之私言非信慕至篤豈能定是哉默惟先生與伯仲代居史局以文學道術自命其不忍媕阿下貴人以取轗軻如此至為文詞詩歌率推之於敦厚和平庶幾大音復振與王宋諸公異世同逰以彰明興之盛而卒止此命也夫故欲考先生之文者當論其世默於先生受知頗深敢希蘇公揚榷之誼乃論近世亟反之繇於先生有私慨焉盛衰之際後世必有知之者詩文各五卷皆同年徐符卿江山甫所定亦先生門下士也書玩齋集後李默豫在宣州諸生貢安國時時為豫談説其先世所謂禮部公者當元至正末為漕臣嘗泛海出閩徼﨑嶇島嶼間為國轉餉卒以客死又聞公寓海寧時自名其里為小桃源元命既革宋學士景濓嘗邀之公為置酒飲夜分乃起就卧仰藥而斃豫所聞貢生者如此豫按國史載公文章行迹甚備乃至屬纊不詳其事又門人朱鐩作紀年録但稱病篤豈史氏與其賔客皆諱之邪最後讀玩齋集始知公嘗與青陽余左丞金華王待制友善其所見稱引皆忠孝大節闕死於皖禕死於滇豈負人家國者推公志槩將非其儔匹否歟豫竊傷公流離憂憤老且死有如生言顧不令隱泯堙鬱無以彰於後世邪悲乎是集板逸者十之三四豫亟言於郡丞徐君補刻之并收夲傳神道碑銘使究公平生以昭宣之人士云爾胡莊肅公東逰稿序失名道為形聲之聚形聲為道之散握其聚散之管則在乎君子方三代之衰百氏諸家並起孔子是定之而道聚聚而復散天也故得其形聲各以自名聚而觀之十百其群散諸宇宙考諸其世蓋亦希闊而難見云今大參滁陽拍泉胡君乃有志於斯君少舉進士踐清要其於經史世傳之言固已閲歷又滁産也夲育聖肇基之鄉自伏羲孔子成湯之傳道劉項光武魏宋二梁趙宋之教興咸不越是千里之間道之所散形聲之聚於是尤巨君又參楚湖更晉代南三苗而北玁狁咸得治之固足以鷙其形而訇其聲矣已而中廢間居十六七年靜而聚之宜無不可至君方坎然不是足復估舟渡江歷浙三江五湖壯其懷天台鴈蕩恢其目廷議再起君關西其於關河形勝古帝都會天下甲馬徑處又躬歷之計君之所得於道之所聚蓋不啻十之五六其散諸形聲郁乎文詩宜有所聚於其中而後合也以孔子大聖周覽不過中原未嘗見燕秦越也司馬子長之文自謂得於逰者多獨未至燕今君之仕於天都舊矣子長弗若是也詩文之多而可傳勢固當然雖然余之有望於君不獨善是也盍亦觀於宇宙之間以求道之所聚乎夫道大於宇宙而宇宙非盡道也散於形聲形聲可以徴道而道無形聲也攝弓而求羿奚不引臂而彀率循鑿而捫形莫如內照於靈府徜徉原野歆居獲之阜曷亦春植而夏耔乎君子辭之必咸有意於斯蓋引而不發深會所聚而不以形聲滯也由是而充之無所如而不可矣孔氏之望於後學者其在斯乎若夫程文詞之今古而誇其工豔君固非居也而余亦胡以相君哉平涼尹蕭子世登將梓之以示後人蓋亦有志於是學者遂敘其所以云胡莊肅公遺稿序霍與瑕語有之天生一代之才自足一代之用此信言也國家承平二百餘年天下無大變故近世宗皇帝朝南倭北敵時時為患乃不及漢之冒頓晉之盧循而海內洶洶震動用人者屢發無才之歎余甚惑焉胡莊肅公之事可睹其大略矣公以通材粹學卓識宏猷登進士歷官山西提學實嘉靖二十一年也北兵入太原塞殺僇慘甚公慨然上疏陳備邊十一事天子覽之稱其忠慮進職參政就令協守三關自軍門下及兵備諸司咸愠曰提學司尊俎者亦預包丁之酸鹹耶姑俟之居三月計不聼畫不用北兵大至不與一卒公束手無措被論落職矣公既退處乃讀秦漢古書究濓洛精義逰會稽探禹穴歷覽雁蕩廬阜以發舒其瀟灑寥廓之况遍訪世之聞人與上下其議論以要諸中措而為文駸駸然方駕古之作者矣尤留心當世之務凡所報書知舊道及民間利弊時事艱難指摘痛切規畫周盡了然可見之行事天下士大夫咸推重之每有一方小警必屈指曰非柏泉公不辦此視公不啻洛下司馬東山謝安也嘉靖三十八年以屢薦起歷遷江西巡撫有巨功升兵部尚書轉吏部南京兵部尚書南北驅馳所至坐席未暖又趨新命凡數年遂入為天官冡宰嗟夫此可謂士之極榮然以為非常遭遇則可以為盡公之用則未也我朝言以儒用武設竒謀而收偉績者莫如陽明先生余考先生在贑凡五六年然後士始練山寇始平上流控制之勢始成而寧濠固在股掌中矣先生自奏疏云人但知多獲之績而不知善御之功言專久也近世則不然用人者無以自主惟浮言是聼朝簡而夕替之用於人者無以自效如防秋之士曽不再時代者告至矣授任若此雖諸葛不能成其算有志之士所以撫膺而扼腕也假令公自協守三關時即得展布手足需以歲月以經理邊事則其所以長城西北者決不出古人下而後來河套古北等處亦當承籍休庇決不狼狽已甚乃受知聖主僅三月羣妬叢而擯之至十七年間廢故里也比其再用雖日不暇給而茂烈炳然凡地方震疊之處皆賴妥貼由此言之豪傑之士果何負於世哉且以公在江西而論入境越月兵即振將即奮寇即奔逃不周歲而蕩滌廓清無留毒種此其氣熖力量視陽明何慊而任職久暫又未可同年語也頃刻樹立乃足以光前而耀後如此故曰天下無無才之世亦有不世之才惟任之久而後才者得以盡其用公才不世出然惟其用之未盡而處山林之日多是以養益深蓄益浩文益竒諸所製作咸可以垂示永久蓋天之所以成公者固不止一世人物而已也公文集刻於家者曰胡氏集曰東遊稿刻於楚者曰南浮集刻於秦者曰西征集曰愚忠疏草刻於江浙者曰浙垣稿曰督撫奏議等書迭出互見未會大全而其他散逸者尤多王侍御復齋公按滁訪尋得遺文古風近體詩三百六十九首敘六十四首記一十五首雜著一十七志銘表傳一十八祭文六書一百八十八付李州守刋行勉𠂻子曰吾讀莊肅寄奠甘泉先生之文而知公學術之自來也表桂見山之墓豪傑曠世之感也記正學書院序念菴文集等篇其有憂道之心乎後之人欲不陷於蕩狂空踈之弊者必於此乎取𠂻是則侍御嘉惠來哲之盛心於是以得而併序之也巖居稿序黃佐同寮無錫華鴻山先生棲遲碧山積學日富作為詩歌命曰巖居稿托門人尤氏持以示豫豫誦之歎曰嗟乎天下之學所分也久矣談道學者訾詩文工詩文者嫉伊洛鴻山之詩追蹤陶杜卓然大雅卒澤於道醇如也昔孔子誦鴟梟之詩曰為此詩者其知道乎及誦蒸民亦如之夫盈天地間物物皆道民彛物則非精也草木鳥獸非粗也漢魏以後詩變極矣陶曰娟娟雲間月灼灼林中花杜曰風鴦藏近渚雨燕集深條猶有三百篇比興之義焉如作詩必言乾坤太極為知道則蒸民是而鴟梟非矣謝方石選集伊洛遺音而謂近世道學詩為識者所姍笑殊不知程朱佳什正合唐人也可謂知言矣陶之不喜亦不懼即正心也杜之安為動主理信然即定性也則宋人所謂道學者先已得之矣斯集也情因乎景性出乎情謂非知道者與於是乎書明文海卷二百三十八
