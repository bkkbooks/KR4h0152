body:
  text: 明文海卷二百三十九餘姚黃宗羲編序三十文集鬱洲遺稿序黃佐唐宋間詩文宗匠世所繩譽者不曰秋水芙蓉則曰流泉灑落蒼翠擬諸形容若極其美矣佐竊嗛焉蓋雕飾雖去而景象則弗𢎞音響雖清而膏馥則弗逺大人豈如是哉今夫黃河之出崑崙也窮而探之則源星宿切搏桑涵蓬島而入霓羅其瀾涣如也然後洪流混混從天而來入海而滙迤延八裔不能致其淺潛泄百川不能增其深蒸雲液雨不能盡其仁含垢納汙不能傷其潔吾度如之發為詩文斯天下之大觀也已故少師梁文康公鬱湖遺稿佐不敢律以唐宋詩文而惟以海觀焉何也昭其度也於乎大人以天下為度居相位者孰不以自許哉然臨利害僅毫髮輒惴惴焉思為之所矧又較計毁譽喜諛惡直福威之下夫誰忤之韓魏公曰不以同異為喜怒不以喜怒為用舍賈似道曰我不知孰為好人但順我即為好耳度之不同乃如是哉治亂之源槩可占已當毅皇帝時公首百揆石齋楊公宅憂甫闋亟起之俾位於已上敬所蔣公方在庶寮則延譽宫府力拔為輔比南巡狩公欲奉天子行寶以往楊公不可蔣公益不可且嘖有煩言公無少見於顔色亦未嘗輒語人也及佐督學兩粵蔣公始語其詳服公盛德不特同升之感而已先是西安張御史璉者論列詆毁人不能堪而公引慝薦揚竟至大用璉終身感之夫東里南陽皆賢相也然逺抑庵不使入閣斥一峰不得立朝視公之度何如也神道志銘公之德業詳矣而佐獨舉二事補其遺闕以見公之所以為大者初不係於詩文也於乎人性猶之水也發而為情過往來續澄停於中猶之淵也自非敦養其性以時出之則所以紀天地綱民物者荒矣天下亦殆矣哉是故一語不合睚眥隨之甚至怒室而色市不可磯者也覆水坳堂之上而芥為之舟置杯焉則膠淺中者也公家順德實分自南海始號厚齋晚取鬱水靈洲為號其亦鎮定之義與佐生也晚辱公之知夙夜自虞天性惟磯且淺焉是懼故三致意於斯云眉軒存藁序黃佐有明之文百餘年來鑠乎超於盛矣成化以前道術尚一而天下無異習學士大夫視周程朱子之説如四體然惟恐傷之以故詞雖往往弗華而每根於理質惟亡大斫而氣亦霈然以昌其風俗朴茂可想見也佐童時未有知思效先秦而宋之棄其修詞駁如也先考粵洲府君見之語曰嗟汝佐誰以是命汝來居吾語女夫文也者文也由中而見之外者也其法欲顯不欲晦欲典不欲詭欲淺不欲邃天垂日星地形河嶽夫誰能蔑視之而以詰曲嵬瑣為哉是故前之三代歷夏殷而文成於周後之三代歷漢唐而文成於宋觀諸通書定性易詩諸詁六藝而後所未有也非宋也則將孰配周者而舍弗宗佐乎吾見女之日叛於道也佐謹識之不敢以告人嘉靖甲申始獲交新安汪子恆以是相切劘焉又三年以謁告歸汪子出厥考眉軒先生存藁俾為敘既受以卒業則作而歎曰新安故朱子闕里也流風餘韻其猶有存者乎觀先生詩格得諸陶韋而文字尺度循韓歐是朱子之教也典質爾雅絶不為嶮巇語然而溫粹之光若天球不琢而自可挹大抵如先考昔所言夫佐佩先訓至於今未能脫習又安能知先生獨惜先考生長成化間正與先生同時而山川悠邈不得一相遇以上下其議論也既為敘以歸汪子因惘然者久之梓溪文集序黃佐宋歐陽公文章經濟天下翕然宗之荆舒繼起摛辭雖工掩於相業愛而傳者罕矣方是時二程在朝忠言入告上每俯躬嘉納風及用舍亦勤首肯然典禮法度一變雖巽誘諄切莫之能繹也臣從善則可以善君吁難矣哉毅皇帝豫逰時史官敢諫者惟梓溪舒先生一人罹杖後病卧院中掌院者懼禍使人摽出之先生屹不為動曰吾官於此當死於此既謪閩裹瘡就道或勸俟痊先生曰死吾分也敢少留耶宅憂扶柩自江而湖忽雲垂波立舟楫危甚為文籲祭風濤頓息人服其精誠於時再杖抵家則沒矣年四十有四爾謂之烈丈夫者非耶平生清苦家無立壁儲御史良材為卜築會城居其妻孥佐曩歲過之二子奏奉出其文相示於乎先生勵志聖賢之學氣節文章蓋餘事也江右大魁惟一峰以道鳴世先生實繼之其策名清時同令德榮問同官止修撰道而終又同雖儕之伊洛諸賢可也夫豈徒以文傳者哉憶歲丙子偕陵陽梅君百一北上偶論武王代殷歲在鶉火通考象緯弗載因推步之歲在鳥帑旅於龍首我聖祖殄平偽漢丁未改元星紀吳分也壬午靖難析木燕分也福德所在其應如響可弗詳乎梅歎曰向見國裳亦論到此佐自是知先生比入史館先生復官造朝相見握手謂曰吾識君於百一久矣自是過從歡甚嘗曰心術與學術相符者也懷居與懷利相因者也怠勝敬欲勝義則其心死其學偽吾儕格君其豫在此佐恆衣其德言每察先生端居終日讀書治事之暇未嘗晝寢夜必計過自訟晤即相告蓋乾乾惕若其真積深矣嘗謝貤恩騎入吏部堂屬嘖有煩言先生將奏其作威佐謂曰曽記定性書乎人於怒時遽忘其怒先生謝曰吾子督責是也即焚其草每言厯象古太史職也中星以日為主七政以歲為主占則必應佐弗能及也其論西山變律謂擴前哲所未發佐謂此乃京房執始受變虞之屬耳始謂不然居二日來曰吾過矣檢漢志果京房律也因言鍾律度量所以治厯明時康節粗得大意而不能建律運厯將舉禮樂必也周官乎觀大司樂則律厯備矣佐深韙之惜其著述散逸兹集特十一爾吾廣方伯張公鏊學憲張公希舉皆先生鄉人也聞而欲刻之先一夕佐夢先生來顧語笑如昔懇曰吾文欲刻盍慎擇諸明發而二公果至於是手自校選定為五卷於乎先生信神明矣哉蓋其為人也其死忠勇其孝感誠其從善敏其自治嚴其禔身潔其處貧樂故能合內外貫天人名理如程朱詩文如韓歐而多所自得使若荆舒之逄時則率典迪而媢嫉者消矣然則先生進退存亡其為天下國家所關係豈細故哉佐於是重有感焉宿少卿奏草序張邦竒嗚呼此嘉州宿少卿奏草也天下傳之國史載之侍御衡陽劉公按蜀之暇為之校正而翻刋之既又命邦竒序之宿君始官户曹以是奏也至擯廢以死可謂辱矣而人情顧榮之若此豈非天也與蓋古者上以天御其下下以天事其上是故喜怒有所不任而寵辱有所不恤喜怒有所不任則慶刑施焉而天下以勸以懲寵辱有所不恤則身名立焉而天下以動以變否則爵賞之加辱於梏拲擯斥之及榮於登崇吾其如民何宿君是奏所謂六患三夲者當時果能用之則豈獨朝廷幸哉雖一時狐鼠之徒其禍亦不至若是烈也然不敢必其少試於上而顧能使之盛行於天下以及於無窮故曰豈非天也與是故榮辱人主之柄也而君子之於榮辱有時乎不在君而在我夫不在君而在我者非違君也必以天事吾君而不敢易也夫惟以天事君吾身雖辱朝廷猶受其榮焉而况遭時行道者乎豫不佞誤官兩蜀有疸彰之責敢因宿公奏草也發侍御公之志以為今日告明文海卷二百三十九
