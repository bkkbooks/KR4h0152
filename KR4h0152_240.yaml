body:
  text: 明文海卷二百四十餘姚黃宗羲編序三十一文集改齋文集序鄒守益改齋文集吾友王宜學之遺文也吾獲友於改齋見其學凡三改改而日進於道故其文亦三改改而日幾於道始宜學從朴齋大夫宦學南都習聞文端公世業博聞強記以豪爽自許所與逰率四方英俊稠人廣座軒然指切是非成敗莫能攖其鋒至面折人過惡頸發赤弗止既而悔曰柔克之戒古有良方若藴內熱復投以剛劑將入於狂因以改名其齋自是斂華為實約辨以訥擇直諒而後交求信國文公遺像出入奉以偕行及自翰林謫三河驛怡然就道舟過瀧水為巨石所破緣石趺坐浩歌以自適家人驚求之聞歌聲乃艤以濟然時或被酒譙罵露其舊習復自悔曰病根未拔稍懈將復萌益務鞭辟近裏查滓而消融之既講學虔州深求致知格物之要復寓書煙霞洞以辨所謂動靜兩忘者弗明弗措其後被召入史館步無妄趨目無妄視同館迓其至曰觀白生來矣蓋靳之也而改齋持不變嘗曰深潛純一之味豫恆愧此四時使得永年以充其學其進於道也孰能禦之夫學所以治心也心所以宣言也言也者心之聲而可偽乎故觀改齋之言始也閎而肆中也慤而介終也溫厚舒徐而有典則信乎不可偽為也鳬氏之為鍾一也而其制異則其聲隨之是故鐘之厚也其聲石薄也其聲播侈也其聲柞弇也其聲鬱長甬也其聲震夫是之謂誠中形外之學改齋沒無子文頗散逸其子壻劉敬署泰興教事始搜輯之凡為詩三卷文六卷語録一卷兩崖朱柱史子禮延而詢之曰嘻吾知己也乃與義城黃子忠議刻之以傳往歲兩崖之試禮闈也文頗不諧時好議將黜之改力薦之曰是卷也不蹈襲而充然自得必竒士也遂入式兩崖宦業日章徹果收改齋知人之明夫言以知人在改齋子驗之矣後之君子讀斯集而求之當必有以知吾改齋子者朱氏寄翁遺文序黃省曾昔元之季吳中耆舊曰朱生應辰氏德閎而家單履清而時濁耕靡負郭之壟爨有飛塵之甑當時姑胥之俗以奢翊相雄生也髙蹇伐輪骯髒灌園恥與金錢為友分及張氏開土旌弓廣羅束帛丘壑庶宜從祿矣生也瞻言百里恐為苕華固成踰鑿之遁入於國初薦庸可飽然麋鹿便曠鯤鵬樂逺乃竟甘心皓首於無遇故自沸羮之年暨於放馬十有七載西僑東僦山依澗止嵗無寧棲嘗三復人生如寄之詠又慨其身之畢老於寄也自命寄翁興文志懷使人讀之愴然以傷如臨凄風而坐蕭林也雖然生寄死歸聖賢莫度茍知寓形之皆旅也則凡所逢富貧適也貴賤分也聃殤齊也悲歡夢也舉不足以撓乎天扃無所往而非得其貪人虺儒鷦鼠勞勞晨攘夕攫刃圖噬奪損物盈已逮泉壤而方息殊不知人各有涯卒亦不踰其枝腹之量亦謂深愚也矣自今觀之吳之都宇峨宫甲觀金鋪雲構自夫差至於近代固所謂霸業之雄圖東南之巨麗也而今問其殘壤舊幹煙銷影絶則不能寄片迹於故墟之上而朱生一卷之撰乃得燦傳於儒翰之苑是知榮華之果如蜉蝣而道德之常為帡幪也然則昏冥芻豢之子臭腐之軀何庸拱之以雕堂而蠅狗之才安得享之以王侯乎徒為狼籍造化而瀆逆鬼神積釁取亡其災弗逭是故哲人君子不亟亟於富貴不戚戚於貧賤其道髙其識逺故履氷於當年尚志於終身寓心腑於天日託聲名於寰宇垂文章於萬年處簞陋而無憂也豫故拾其遺文而併寄之於後之賢者爾王臨川集後集陳九川邑侯應君雲鸑刻荆國集成余適東探禹穴窺石梁鴈蕩而歸屬序其後嗚呼是文獻之所存也夙志繫焉雖不敏其何敢辭惟公文章發於經術雄偉精深長雄一代然其未嘗刻意殆亦天授視昌黎所志子厚者逺矣乃顧寥落不得與歐蘇諸集並流天下撫雖公桑梓之區而亦無梓焉豈非世儒疵公相業橫議不明使然邪夫公之相業明道象山之論公矣精矣或疑明道不非新法而訾陸黨焉此與兒童之見何異然竊嘗怪之公以間世之英氣魄蓋世負伊周之志宗孔孟之學其不邇聲色不殖貨利難進易退之介固己信於天下遇大有為之君而師行先王之法意雖其條理弛張或未盡善彼其志蓋昭然可睹也然而新法一行群議鼎沸一時攻許成風至詆為姦邪其故何哉聖道絶而學術裂也夫聖人是非之凖也春秋賢卿大夫其見稱於孔子者不少矣而獨多管仲之功曰民到於今受其賜微管仲吾其被髮左袵矣及其攝相未幾而誅亂政大夫勤師郈費豈群情之所趨哉彼亦睿聖獨見治亂之原耳况夷狄之逼中國豈魯三都比邪乃有洞見亂原以先王之道匡天下而不為管仲者非夫子之所深與哉自道喪千有餘年非實得其墜緒如濓溪明道者固難優於春秋賢卿大夫至其束私見而攣故習雖賢者不免焉則是非之謬於聖人久矣何者見有所囿則蔽於覩逺意有所詫則樂於黨同其勢然也昔充國平羌之策裴度伐蔡之議此特一事耳自其成而觀之雖庸人無疑也而其始舉朝異之况夫取天下之弊法而更張之者哉宋之中葉國勢寖弱民志不振東西交侵遼夏為急猶之癰疽並發於肩臂而神力俱疲咸以其無甚作楚因謂之安公既洞見天下之勢逆知搶攘之禍而獨深憂之故每啓昭陵以至誠惻怛憂天下之心而拳拳以晉武梁武趍過目前為戒蓋欲早為之所也其相裕陵以更化蓋將通壅滯實臟腑而攻潰之洗瘡痍而登之泰和也諸賢為國或齊公之見怪其作用而乘客氣勝心以逞者又復攘臂其間訐以為直不遜為勇天子之所惡也而世以為賢甚攖人心挾天變以要其上不幾於亂政者哉元祐盡罷新法則雖幽厲之政宜可反而中興復文武之竟土矣乃顧因循坐致靖康之禍卒使中國疲於戰鬬一如公所憂者果孰執其咎而顧橫加詈議是尚為有是非之心乎使繼相者有若明道以大公之學善其後則於公有光矣豈至淪胥以敗哉當時問相之對博舉而不一及明道者亦以其素不排公故耳雖然公自謂用志精則知人明乃亦不知薦以自代何也一時英望之去豈公素心公意為天下忍之欲俟法行還之與樂成耳知者行之仁者守之明道已不可其説而公不從卒昭後悔非亦有所蔽與公謂未有不得先王之道而能行先王之法者是也其憂斯民之左袵不以身家二其志豈非自任以至誠惻怛得先王之道乎而不知其激於群言果於行法者已不免意必偏黨之私其心之於哀矜而有所忿懥矣烏能得其正而不辟哉是公之所以為蔽不精於聖賢之過也於諸賢何獨尤哉至其洞見幽逺圖患於未形雖聖人不易也其後忠定因水災而憂事變蓋公之餘明也而天下服其忠知欽髙相之不下裕陵之倚公者以此然其禦擊恢復諸䇿亦卒奪於讒議而幾危其身况公圖之於未形乎於乎有宋兵革之禍極矣使公不能制之於未亂之前而忠定不能救之於既變之後則橫議之流禍也夫學術不明使下無公論上無信史蔽人心而奪國是卒亡宋於元豈獨使公負重毁於後世哉此余所以重為千古發慨而不能己也若夫新法之未始皆不善也介庵子序之詳至後世亦多祖而用之故余略焉特取其大而隱者著之耳昔陳申公述鄭亞之言以序李集謂其藴開物致君之才居丞弼上公之位建靖難平戎之策垂經天緯地之文公雖未盡得先王之道也將不優於斯語乎善讀公集者當自得之矣應侯寧波人公嘗令鄞邑稱循吏而廟食焉民至今神之其法施於民也侯習聞之故梓其集於吾臨川云龍岡摘稿序何遷廬陵龍岡賀君蚤歲以學自成其言類可傳而賀君志念逡逡視若未至年踰耋日皇皇焉不以勤倦也故其稿多棄不收其子少龍君懼其逸也乃稍稍裒次之頃至楚授豫是編屬為序往豫至南中南中士人比數道術輒誦其師故所持蹈蓋皭然名德君子焉賀君初令某邑恥以職近時名改為此官教且行尋即棄去士人故思之而少龍君之官南中也又適與豫同至豫因得盡其家學竊慨然心慕之比豫祇役江西問訊道術江西士人又輒以賀君聞豫以是知賀君既悉乃今又得於其言盡焉夫道之可見必於言行賀君之學豫繇言行焉以觀有謂矣聖人之學先夲在行業言非所尚也然其言廢則其學不著而學如聖人未有不善言德行者夫萬古不息之謂心萬物必照之謂知靈晰圓神不慮無不燭孔門所謂良知也言語行業燭中之隙明耳悟其不息之體而致其必燭之幾由是見於言行雖聖人不能易此賀君之所以學歟致知之旨發於孔門近時陽明先生指其義獨析陽明之學要於心悟而取撰於致知將以探言行所夲闢夫滯見聞而習度數者之非而究其知出於自然亦以信其所不息而擴其所必燭彼舍言行而别求一心與夫外功力而任夲體皆非其旨也而一時從逰之士得於乍聞驟見而出其真切願學之志以踐其所明逮今有成類在大江以西盡其故時提戈論學處也嗣後一傳百訛漸移其舊其最守其師説不必當於心次則峙立門户以競於世其流也師心即聖不假學力內馳見於玄莫而外逃失於躬行又其甚漭蕩勦説委身譸張侈然博碩蓋不殊於聖科假令詖淫之徒生同其時猶將辭而拒之而後生不察遂謂言行不必根心而聖人之學不足逹於用由是繼之以畔嗟乎使致知之旨而出於是雖聖人不能以𨗳天下而何陽明之説之憂也夫良知曰致蓋必舉其靈晰圓神出於自然者恍然澄定於廓清凝聚之餘而日見其參立於前非有所涉於講説意象之末而後養以長裕漸以銷融使其精微中庸皆將畢於竭才以幾渾合如是則所謂心悟者非百倍其功不可入而至於長裕銷融固未嘗忘所有事夫庖丁逰刃官知止而神欲行而齊扁得心應手老於斫輪不能舍去此豈無假於學哉無假於學者未嘗知學者也夫或濫觴焉以病於學説者謂晚宋支離之弊基於説之詳夫使由今之談而不反而歸其疑於指之析於責雖謬抑或有由也當是時賀君崛起其間固大江以西人也未及由其門而致知之意獨深契焉因與從逰諸子下上切劘不茍以同而卒以自得古稱聞而知之其道不廢於賀君何間哉賀君是編所載文變化峻深不可涯涘詩律嚴意逺繹其趨和平鬱紆大校取裁古人發以獨契非徒言者賀君之於學竅於知止汰於寡欲而極於致虛蓋信天則之必良而詣之必至則夫言必可傳而行足則宜非流輩所能有也是編出先生之學既可考見且使孔門夲指益明而後來者之疑熄豫固謂陽明而後是編不可少於世豈過哉豫庸虛讀是編知其必傳於豫言可無俟乃其明孔門夲指免於後來者之疑則豫所願聞也故詳著其義而序之甲子中秋日唐一菴先生集序何遷聖人以道命學而語道之言則略焉而不敢盡其志念所存抑何深逺也學必有術聖人詳説之而略於道然中立而躍如道未嘗不在焉乃語道而或至於盡則求道於見而遺其心固自聖人命之矣聖人有所命復有所不敢盡故性命之旨學者必悟以心而不得求見於言其或邪説橫行大義侵蝕當是時性命之旨不明則其害不熄聖人蓋憂之而後有舉而授諸其言者而道因以不蝕今繹其旨夲天載以著人彛極於幽深者歸於精實固非玄莫謬悠議於無形者也然由載藉以觀苦後世所稱微辭奧義亦不可數數覩焉夫以聖人為道而有言而卒略於此斯其所存可以深長思也已古者聖人有言莫備於孔子亦莫備於論語一書其間命學不於詩書則於執禮不於文行則於忠信門人所謂雅言皆其所以為教也而性與天道則不得聞惟所自撰易繫中庸其以闢邪説而間大義不能不一言焉而易繫不列雅言中庸既具至子思而後出其亦罕矣聖人以其雅言命學而學之所夲則言之必罕以此互見並行於世將使馳見遺心不得為學者病兹所以為聖人之言歟孔子而後由孟子至宋周子程子楊墨佛老之憂甚於亂賊其憂大則其語愈詳易繫中庸之旨發之殆盡雖於其時則然而罕言之意亦未嘗不戚戚焉我朝海南浙東大儒崛起先後發明救人心於聞見其憂深而語詳視宋二子又過之而性與天道之藴由是途人後生習聞其説蓋去聖人既逺而六經宗夲不至侵蝕要非知言者不能然使未見遺心之害加於周程之後則亦知言者之憂也某不學於道無所窺竊謂言不可為典要惟其時而已將蝕而無撰其蔽閟既明而復贅其蔽支假令海浙之間由今之習固將易術而語矣故性命之旨可以自悟不可以瀆人可與能者期於從而不可與未得其門者益其見學者以是求其庶乎歸安一菴唐君繼浙東而有言者也其學深詣其教直討真心其為言宏邃而切禮元剩語景行館論三一測諸編一時學子莫不願聞之往年與豫遇於白下尋策海事去豫思以所嘗槩於心請焉未能也踰數年豫再至白下唐君函諸編屬之序顧豫昔有所槩既無由一印可雖欲有言焉亦未能也今年走書吉陽山中責序益亟復得其門人所述語録讀之豫乃喟然起曰微哉唐君憂不在斯乎乃其言無前諸編則憂於道者不直無後一編則憂於學者不逹不以其罕言掩其所雅言唐君之謂哉夫豫所欲請君既先發之則取諸印可以為諸編覆豫惡得無言然君之學以悟幾道者也造益精則言益粹苕霅之間豫尚有請焉其必有進我者而斯言蓋其質矣乙丑夏日重刻蠛蠓集引穆文熙吾郡盧山人者以詩文雄一世而當其時則人少有能重之者今沒去二十餘載而所撰蠛蠓集始出崌崍張公手自校讐之刻之太倉署中集傳至吾郡見者以為琬琰竒珍轉相抄録殆若平子賦出而紙價為髙者矣余邑竇侯雅好詩文因謀於余將重刻以應求者且計省價於筆楮之費者當什倍也乃刻之兩月而完竇侯欲紀其重刻之意復屬余為序余惟山人詩祖六朝文賦法秦漢評之者已有定價而其人豪宕不羈扞當世之文網自罹大辟幾瀕於死故其詩文多成於三木金索之間見於自敘又如此俱不必述也獨感夫昔人之言曰詩文必窮而後工乃今於山人復見之故史稱丘明失目厥有國語孫子臏腳兵法修列屈原放逐乃賦離騷不韋遷蜀遂作吕覽詩三百篇大抵皆詩人發憤之所作則山人之集可以觀矣豈獨於人物亦有之松柏必生於巖澗之間遍歷氷雪之慘而後木理之堅不等於群材寶劍不埋於獄中嚙蝕於數千年之塵土則亦無以衝斗氣而發光華也向使山人以職務縈其身或安居無事日徜徉於沙麓衡伾之間則雖未必無所撰述以成一家之言然必不能如斯集之工也閲山人之集者可以哀其志矣崌崍公乂述山人逰太學歸痛哭於申考功之第謁太學為空曠無人有孤於國家養士之意且飲且泣涕酒併吞而醉賦紫驑馬篇纍纍數百言有飛黃萬里之思又其待訊滑臺公延入坐之旁則却立抗禮引越石父對晏子之辭以對命茶則唯唯再四徒以臂運視其手械乃尚未脫公為大慙即此兩事則山人超軼之見磊落之懷出塵埃遠甚故宜其發為文詞淵深閎肆力追古人即顚撲備至而略不涉寒酸語也兹又可以壯山人矣刻張太常文集序穆文熙穆子曰余讀張太常集至大禮諸疏而知君臣之感悟蓋有數焉其君之賢聖與否説之懇切與否莫與也昔者毛焦解衣進諫則秦帝立悟左師以趙后愛子不如愛女而長安君遂出質焉此其聽言者乃暴戾恣睢之主與夫閨閣柔脆之女流耳而二臣之解衣危論愛女微辭又非甚有絶人之見者也然俱能感動其心翻然從之則二臣者亦幸而會逢其適而巴耳獨非數與太常公在世宗時為禮垣都諫夫以世宗英資睿斷超軼今古豈秦帝趙后之所敢望而公之議大禮也則持正論排衆吻開陳引諭纍篇至千萬言其引漢宣帝光武宋濮園之議極為詳悉至於雷震奮發貶斥相繼箠笞滿前見者沮喪而公持説益堅其氣益壯願以其身試之鼎鑊斧鑕而無所震懾則其諫説之懇奚啻為毛焦左師而己乎卒之無所挽回而瞿塘之戍遂謫焉此亦豈非其數與今其大禮諸疏俱在集中覽之則見氣揚彩飛志暢文盡筆吐星漢之華而詞有秋霜之烈令人勃勃然髮上指冠而足以想見公之生氣其他所論奏亦多憂深慮遠批逆鱗而為人所不敢道者使公而能盡其議論焉則汲長孺魏鄭公之忠鯁豈足多哉然而竟無如數何矣善乎太史公有曰力田不如逢年善仕不如遇合殆公之謂乎説者乃謂公大禮之疏既不行於當時即傳之何益焉余又以為大臣進諫於君要在據吾所見以盡吾心焉耳而説之行與不行亦勿計也譬之醫然醫之因病投劑起人於尫羸者良醫也其法信可傳也然秦越人者則始而謂桓侯之疾在腠理繼而在血脈而桓不悟終則望之而走而桓卒以斃焉此其於桓侯曾未有投劑之力起死之功也然而秦越人之名則從兹益起而其所著方盡醫家人人宗之何也誠謂其所言之中而病之愈與不愈則係於用與不用者耳如此則又何疑於公之疏乎公之説雖不行所幸有公之疏在焉使後世議禮之家舉而行之則雖謂為秦越人之方書亦可也故宋臣蘇軾吕希哲等進讀陸宣公劄子云人臣之納忠譬如醫家之用藥藥雖進於醫手方多傳於古人知斯言者乃可以知公疏矣公又有詩文二卷其在瞿塘者居多文宏深典麗得歐曾體詩爾雅沖淡酷似韋蘇州而聞捷諸篇又與少陵洗兵行諭諸將同調槩其旨則皆江湖戀主惓惓不忘君之意也可與諸疏並觀矣刻成而繫以贈官所以表公之忠諫終得顯於今日而亦未為不遇云東崖文集序陳琛物之美者不可以見知於人松柏生於山林千尋百圍美之至也其或工師者知之必斫以大斧挽以萬牛而材之於叢臺阿房長樂未央之中俾之頂重負大撑東支西與瓦礫土石爭勳較久孰若老於無聞得以嘯風飲露而全其天者之為安且樂哉傳曰君子疾沒世而名不稱焉夫名不朽器也造物者之所靳固有求之而不能得者矣然而秦漢以來士之畏名外播而故為韜晦掩抑以逃之者亦何限如黃憲管寧孫登輩之在當時收閉聲響若愚若訥絶不聞有片句隻字之流落人間是豈不足於文者哉彼蓋亦慮夫文一傳則名不可掩而穹爵重祿之欲以餌我而使我酣溺勞苦者必與名俱集而偕來也不然則賢者之必有文章猶名山大川之必興雲雨隨珠和璞之必露光輝也安能枯稿寂寥以自混於田夫野叟間哉括蒼東崖潘先生匡善掌教吾泉宦職中之最逸者也泉之諸生求得其平日所為詩與文凡若干彚集而梓行之余得縱觀熟讀因仰而歎曰美哉集也夲不厚而用不利者能有此乎必載其令名而四馳之天下吾懼東崖之不得終逸也奪其所素逸而與之以勞東崖樂乎哉雖然有道者心常逸處逸固逸也處勞亦未嘗不逸也蓋無入而不自得焉乃若惡勞而惟逸之耽畏名之我纍而故欲逃之此皆賢者過之之為而謂中庸之士為之乎東崖賢者也吾恐其賢之流於過故書此為之防焉三五劉先生洞藁序鄧元錫元錫次劉三五公諸所為洞藁蓋屢復而歎也曰王夫子見之矣始公逮事王夫子也王夫子時開府虔學徒日遠近至語心質學者衆矣公負笈冒風雪造焉王夫子一見異之語諸學徒曰是子享豫清福者今讀公詩次其所為之若洞語繹其志嚴察其辭懼約其行儉質其操亷栗栗乎懼泥滓之汚得毫毛入其心昭昭乎志揭日月而行之也嚴險阻之幾故辭危而懼窒易從之欲故行節而儉秉不磷之堅故操貞而一於物也蛻故寓言也遠於道也進故指言者深讀之者如采薇首陽茹芝商谷服菖陽九節而聆幽泉之活活也汚者可以澡其行頑者可以改其操易者可以肅其辭懦者可以立其志懷忠敬慈孝之素者讀之不知涕泗之無從下也記有之曰清明在躬傳有之曰風之者遠若斯藁者義兼之矣夫柔木興溫恭之詠蟋蟀謹太康之防伐檀歌食力之勤洋泌暢樂飢之懷固詩之所以教也或曰公於詩文也亦意之乎今之言道者易其辭而可矣其意之何也曰理精者旨遠氣渾者辭朴心平者音舒道要者語約誠易其辭而可則典訓雅頌爻彖文言果如今之人言否耶是故公近體諸作蓋猶有蹊徑存焉古針銘詩則商敦周罍古潤黯積矣今洞語則上尊黃目清明中通矣固雅俗同和所以異也曰首陽聖之清也而隘隘何聖也曰難言哉難言哉同塵而和光德者一之混者汚焉公樂善如已出語人善將推而進之也惟懼其不昭曰遺世之行逹人尚之公其逹也夫吁不志蕩者馳而識逹者曠耶乃遠逰天問之篇凌雲子虛之賦其辨矣公於天嘗至篤其官芒碭也稱循吏焉嗟夫蓋太上有中行者作焉吾未之逮也若公者可謂靖矣可謂靖矣鄧元錫曰余西遊安成歷青原白鷺之丘宿南山梅源興遐思焉既得見諸縉紳先生及采里俗童稚耳語也數數稱侍御公之為人及陟三峰聞所謂雲霞洞者棲焉接欵語連日夜蓋心誠厭服之公於生亦戚戚乎相然信以心也己屬校其詩文凡六日而竟凡若干卷復為之題其端如此二妙集序萬士和天地與人一精神也天地不言而人代之言傳天地之精神者人傳人之精神者言言有條理脈絡謂之文韻其文而中於音響謂之詩詩者文之變其條理脈絡傳精神於不朽一也精神在內不可不同文詞在外不必盡同雖其不同而條理脈絡不失分毫乃所以為同也自有文字以來凡專門名家未嘗一一摹擬古人豈徒不摹擬而已乃曰汲汲乎陳言之務去曰文章最忌隨人後其於古人已言辟之芻狗弗陳也然而文之條理脈絡髙古典雅視古人如出一轍良以精神作用千變萬化不可捉摸靈光發露照曜古今蓋其機神矣不得於此者雖依憑假借之工然而終不近也造化之生人面目毛髮無一相似其生草木也枝枝葉葉千態萬狀然不害其同刻畫以像人剪綵以為花其有同乎否也詩自三百篇後變為離騷又變為五言古選其體不一而縱橫變化條理脈絡未之有改故載其精神以傳唐人承六朝風雲月露之習變而為律其中卓絶自得者固不乏人然浸淫花栁流連景致於自家性情漸不干涉故其義淺其體方觀者不待終篇而命詞遣意可以揣而知矣獨老杜出讀書萬卷下筆有神變化不測詞格髙古足以軼漢魏而追騷雅後之談詩者不此之求猶憑藉於花栁光景之間而曰此唐句也甚者倡為詩有别趣而非關理之説夫天地間不過一理理益邃則趣益深若不關理則精神既少意味索然趣何從生説者謬妄如是而世踵焉惑矣吾師荆川先生學貫天人博及今古早歲入翰林時其詩文猶事摹擬及其投間林下二十餘年收攝精神涵濡停蓄道器融液是雖無意為詩而神通聖解超玄入妙不煩繩墨追步作者嘗曰詩文俱有丹頭又曰作詩文者要得圓機又曰學者須先辨雅俗一入俗語最不可轉但得丹頭圓機在手則不患其不雅不然雖極力依倣愈近愈差終不免委靡而俗又曰文字俱有一脈相傳韓歐蘇曾輩之傳班馬山谷荆公輩之傳老杜真親受業弟子如禪家之正法眼印證不差余時進曰所謂丹頭者精神也圓機者精神之用也一脈相傳者傳其精神骨髓也先生首肯之曰精神骨髓固同須知其詞語古雅亦無分毫差却乃為盡之余因謂天地間只有一精神充滿仙佛之徒全挾此誇世雖一技一藝如解牛斫輪非此則不竒絶下至妖狐山鬼能作怪幻者亦是盜此一隙靈光簸弄不然則泯泯焉爾先生曰得之矣先生嘗選漢魏以來古選歌行絶句律詩各若干首龍溪王氏名之曰二妙集蓋用白沙語謂其理法俱妙然要之無二也集成而世無好者余嘗過武林遇上虞徐龍川子曰盍刻之以廣其傳余曰如人之不好何徐子曰雖然姑刻之先生於七言律絶㨂選尤嚴余因刻此一種併增入先生所作分十二卷而識昔所聞以題其首每卷復以鄙見綴一轉語於後使世之觀者反諸性情之正以求其所以自得且一掃談詩者之障礙庶幾古雅復見於今矣若曰刻畫為人剪綵為花以為自得非余之敢知也宋方文語引薛應旗古之以文名家者多矣其論文之語載於類書者更僕不能悉數我明啓運文教聿興潛溪宋公實擅其宗而遜志方公乃其髙第弟子故一時文章方軌並駕號稱獨盛邁古作者自是迄今二百年來名能文者無慮什百余嘗究而觀之唯陽明王公會文切理庶幾近之其他斷未有如二公者邇或髙自標致競相誇詡儕類雲滃議論風生俯視國朝前輩皆所不屑動曰左國史漢莊騷蘇李曹劉摩其篇章轉折長短舒抑而肖其音聲於唇吻之間又或詰曲鉤棘聱牙咋舌而不能句讀不啻優孟抵掌於叔敖東婦效顰於西子祗獻笑增醜曷能類之就使逼真亦何益於理道也奈何清才英質之士轉相倣效而文體日壞余竊憫焉蓋文也者以時而論關氣運之盛衰以人而論關心術之邪正此豈細故也哉余不暇遠引特采宋方二公論文之語表而出之學者倘降心展玩而有得焉庶旋復我國初文教之舊而陋習少革矣無徒逐時好趨末尚而鄙之曰昔之人無聞知也遵巖文粹序薛應旗遵巖王子文集近多刻本龍岡施君謂其卷帙浩繁乃約而刻之題曰遵巖文粹問序於薛子薛子追惟遵巖少持頴異總丱舉進士髙第人固己竒之既而荆川唐子與之遇於京師相見大悅謂其文類南豐曾子固亟稱於人士前自是遵巖之名日聞四方乞言者屨集户外而文遂傳播海內矣夫我明一代之文實自宋潛溪方遜志倡之二公精詣絶識根極理要其為文度越前古不啻商彛周鼎匪直一代之冠冕而已逮至𢎞德間習尚旋流識趣日溺於是李獻吉何仲默各以文自負一時人士鮮有定見亦遂翁然歸之何之言猶或近於理道李則動曰史漢史漢一涉於六經諸儒之言輒斥為頭巾酸饀目不一瞬也夫史漢誠文矣而六經諸儒之言則文之至者舍六經諸儒不學而唯學馬遷班固文類史漢亦末技焉耳何關於理道何益於政教哉邇數年來其識日益熾摹擬者日益衆而文日益陋矣乃思荆川子往稱遵巖之文類於固者豈直以子固之文為極致哉蓋以昔人謂子固文章本原六經要之非誣而遵巖髙才殊質豈不能凌跨西京掩迹東都其文乃獨與子固相類者蓋不溺於習尚不逐於時好而卓有定見於道也幾矣唯是以唐子亟稱之也所謂可與知者道也循是以入而國初文運之盛可紹復矣龍岡君之刻是也無乃亦唐子之意也乎余固樂為之序臨川王氏文粹序徐師曽古今以文章名家者其學術才能髙出於世世亦共推讓焉而識者論之則曰彼能道其中之所欲言者而已夫惟中之所藏有邪正故言之所發有醇疵至於其言之或暢而不閼或鬱而不宣則才之有工拙也工於文者立意命辭咸有法度故有開閣抑揚縱橫起伏淺深竒正曲折反覆之變凡以道其中之所欲言而非苦人以不可入之法也世之知其法者既鮮或知矣而未能入則夫能道其中之所欲言而傑然自名其家者豈易得哉三代盛時教隆俗美人才衆多上自學士大夫下至農夫獵竪旁及婦人女子矢口吐辭莫不夲乎學術通乎道德中乎法度而人人能道其中之所欲言詩書所稱不可尚矣周衰教失道術不明士各以其所見為學故其發為文章類多疵駁之言然讀其文者猶能因其言之疵而知其學之蔽則意雖去古而於所謂能道其中之所欲言者固未嘗異也由漢迄今乃有離夲真之實而掠藻飾之辭假艱深之言以文淺易之意者世之人徒見其組織繢繡怪竒瑰麗以為無異於古文而不知其背畔剽竊古意澌以盡矣千餘年間工文章者僅數家若漢之賈誼董仲舒司馬遷劉向唐之韓愈桞宗元宋之歐陽修蘇軾父子曾鞏王安石是已數家之文或蔽而不醇或醇而不該然能道其中之所欲言而免於剽竊文飾之弊則一也宋之四家並生於世互相推奬獨蘇氏父子與王公不合遂詆其文以為今日文字之衰其源出於王氏噫其亦過矣今世尊歐蘇者甚衆而於曾氏之文鮮有好者近日知言之士始能崇尚而表章之然後其書盛行至若王公之文雖與曽氏並傳而好者尤鮮豈因其相業與夫蘇氏之論而遂廢其言與余以謂公之相業雖多訾議然其盛遇思奮欲行其學以致主於三代之隆而不自知其任用之偏其志斯以竒矣視世之媌婀怙寵浮沉逐利靡然無所建立而足以隂亂天下者大有間矣及論其文又皆疏鬯剴切紆徐委備夲乎已之學術而疵駁之病亦不以自掩焉信乎能道其中之所欲言而揆之古文其不合者寡矣顧可以其人而廢之邪余不自量輒撰其尤工者得六十七篇付之梓人以自附於表章曾集之後使人知宋四大家之文譬若門奧而因以識作者之法度庶幾有好之者嘉靖庚申二月丁未姑蘇徐師曽序明文海卷二百四十
