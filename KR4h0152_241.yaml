body:
  text: 明文海巻二百四十一餘姚黄宗羲編序三十二文集趙梅峯文集序許孚逺昔者孔顔授受在於克己復禮而學庸下手一重愼獨此聖學淵源可考而知也秦漢而降學脉寖微至於宋室名儒輩出闡發聖眞厥㫖不異蓋雖聞道有蚤暮分量有大小而皆夲於身體力行深造自得之學故其人品光明磊落並如泰山北斗之可仰而其言論平正切實有如布帛菽粟之不厭世以濓洛關閩上接洙泗非茍然矣我明先正自河汾以前確遵舊軌其後江門姚江各以所得提醒人心不無補偏救弊之說然大端大夲要質諸孔氏而不悖乃近世言學者可異焉崇妙悟而忽眞修喜超脫而病拘檢以無善無惡為宗以圓通廣大自命甚則謂無已可克有言即塵出空入𤣥一倡百和此學之一變也余不量思挽其狂瀾而莫之及因門人宛陵趙生選得乃祖梅峯先生遺稿讀之悚然神動怡然心惬蓋先生之學粹乎一出於正將踵濓洛關閩諸賢芳躅而闖孔氏之門墻者也録中所言克己愼獨功夫最為詳切有味其平生立身剛正介特有不移不滛不屈之意而訓子刑家凛然一儒者矩矱此何可以潜德未見而輕視之乃其言曰心之有善如日之有火觸之即見心之有不善如鏡之有塵拂之即明此尤善言心者也足與孟氏性善之㫖千古相發明矣又曰道莫大於經常言而經常言之大者也行而經常行之大者也今之人獨不然其取士也言人之所不必言行人之所不必行則取之至於孝弟忠信禮義亷恥經常之道皆在所忽略其為士也亦翕然而惟髙異是趨孰有肯聞經常之言而行經常之道者乎嗟乎玩庸德庸言而索隱行怪孔子當時猶憂之無惑乎晚近世之迷而不悟也此先生之所以重為感歎者也先生冡君行吾方伯知子選在余門又知余有契於先生之學特遺書屬之以序余竊惟先生言行俱可考鏡其人品風格當與胡敬齋陳布衣二先生相為伯仲有著與未著耳今方伯公父子方且砥礪儒者之行衍先生之學於無窮其傳將益遠雖然著不著遠不遠奚足為先生重輕苐令士知正學而修實行則於世道人心補益不淺余日望之觀我堂摘稿序許孚逺余同年李孟誠父著觀我堂摘稿屬孚遠為序者三年而未有以應蓋言而寡誠行而不逮孚遠深懼之夫孟誠所著以明孔曾大學之傳也是故不敢輕易著語也今趙德仲中丞將梓摘稿於閩遣使來促序孚遠誼不能辭謹為之言曰大學孔氏之遺書也三綱八目犂然分明脩身為本垂訓萬世無容後人贅一詞已近世學者恒以朱王兩先生致知格物之說爭衡聚訟其流之弊至於身心割裂知行離畔為斯道病孟誠憂之故掲修身為夲一言以明孔曾宗傳所在使天下皆知反求諸身即吾彛倫日用動靜出處之間實修實踐精神收斂心志凝一更無恍惚支離則其道乃有補於天下國家孟誠之苦心蓋如此其曰知止即知夲知修身為夲而止之乃為止於至善此其獨得之秘余尚領畧而未深余竊謂止之一言發於虞廷闡於大易稱於文王其道至微而止於至善四字則孔子立敎蓋己包括殆盡是為聖學不二法門是故由吾身而推之家國天下一有遺漏非其全體由天下國家而反之吾身一有倒置非其真機究夲言之無聲無臭渾然同源推用言之有物有則毫髪不爽故格致誠正修齊治平皆所以止於至善之實事夲末終始一以貫之者也於此參究分明合下知得止於至善則大學之道樞紐在我故曰知止而後有定喫𦂳乎其言之矣夫知止乃所以修身而修身必在於知止神而明之豈不存乎其人也哉孟誠録中有云止為入竅脩為工夫常止則常脩常脩則常止此身體而有味之言蓋確乎其自信者也余嘗與孟誠同事嶺海見其於軍旅倥偬之中神閑氣定裁應如流乃知立夲之深厚邇年晦養山中倡明此學四方人士從之如歸去秋相見於江滸晬面盎背充然儒者也則孟誠所造髙遠矣議者類病吾儒空談無禆世用而孟誠力學砥行一夲諸身方將見於經綸匡濟行事之實所謂障百川而東之迴狂瀾於既倒者其在脩身乎其在脩身乎趙文肅先生文集序許孚逺司馬遷有言曰假令晏子而在雖為之執鞭所忻慕焉李白亦云生不用封萬户侯但願一識韓荆州二子之言人情恒有之良未為過也今且有竒偉卓斚非常之人幸與之生同當世然竟不獲一識其面徒後時而興慨慕之懐此其情有甚於司馬遷李白者矣若不佞孚遠之於趙文肅先生非耶先生登庸之年孚遠始生世為人吴蜀又相去數千里不易遇憶在穆廟初基召先生入宫詹不二三年晉鼎輔兼總憲中臺鳳鳴龍躍顒顒昻昻一時同朝俊彦靡不以炙有道之光輝而消其鄙吝發其憤悱為快時孚遠獨以銓郎休冰旋備兵嶺海間邈乎其不相及也十年而後孚遠再入都門則先生去位已久且脫跡人間欲執鞭而無從矣嗟乎賢者之遇不遇豈非命哉三代而下真儒之道不得大行於時其間輔弼大臣尠有純軌如諸葛孔明陸宣公范希文之流寥寥千載數人而己何者貴不期驕禄不期侈寵譽已盛繫籍聖賢則天下之善言有所不能入持禄固寵為子孫謀則天下國家之大計有所不暇顧或者志潔矣而病於才之疎才逹矣而苦於識之閽此純臣之道之所以難也以吾所聞於先生者則異於是先生少掇巍科官居館閣而衣疏茹淡絶遠聲色終其身有簞瓢陋巷之風品格孤髙一塵不染而忠君孝親濟世利物出於天性皇皇焉有畏天命而悲人窮之意天資敏異於學無所不窺而好善如饑渇天下有才慧好脩之士雖在韋布後生靡不樂取之以為友平生言無矯飾行無依違進退綽如也是故釋褐之初讀書中秘受異知於世廟中遭權奸傾陷竟不可得後事穆廟經筵日講箴誨既切先帝為之改容至幸太學賜坐葢先生心志光明丰神磊落以能感悟聖主風動海内嗚呼此豈尋常之所可及也哉先生當在庚戌北兵迫京城而以宫坊挺身宣諭將帥及已己北兵入大同而以内閣劾奏督撫之欺罔正氣凛凛迄今猶有生色議復禁軍𨽻五府舊制使分營操練以强兵杜釁有桑土之先謀諌止非例考察以愛惜言官培養國脉權宰隂為之奪氣此立朝數事皆可為後世法至諳達乞貢市於朝廷議下政府群公相顧躊躇賴先生立斷以去就爭之然後决其所為贊大謀而定國是有如此世莫能盡知也然而世之君子咸謂先生意氣慷慨激烈不足於温和是以不能究其用愚竊謂先生之才之節之學之識使周伊在列必有同心斷金之利假令獻可替否於一堂之上謇謇諤諤乃其所深取而忍於排擯之耶吾是以悲先生之不遇也正直之道不諧於流俗久矣非盡先生之過也先生學夲葱嶺性地空濶機神圓明吾未能窺其至然要之不詭於正無一事有乖於彛倫文章俱自胸襟流出追風逐電不可捉摸非史非漢非韓非蘓而超然遠覽睥睨古今自成一家之文也詩格韻大似李白其得諸無意信口拈成又絶類寒山拾得語曩者趙德仲中丞刻先生文集於閩寄示旰江孚遠得而遍閲之客歲徑棧道讀先生柴關詩因為感歎數語龔進甫侍御過而聞之以為孚遠於先生庶幾隔世神交也遺書託之以序其文進甫為先生髙第弟子適同僚余善先副憲亦出先生之門誦述頗核遂論其世而序之如此以道其所以仰慕先生而不得見之意而猶幸得以葭莩之名竊附於斯文云誠意新建二先生文選序胡直文章當自我命令之上焉者無意為之而不能不為行乎其天而不與乎其人自孟子而下若莊騷太史韓愈蘓子瞻之徒近之也其次若揮三軍金鼓作止雖深谿曠原部勒由已則賈董班楊栁歐曾王數公當之其下模擬追逐若優孟之學叔敖不欲一失其態然而優孟猶有主也又其下效顰學步而已國家𢎞治間文章號中興然苦模擬為累至近日毘温間部勒伸縮卓然有得其間亦有作而致辭欲休不止不免有意其亦盛矣余暇讀誠意新建二公文則所謂得乎其天而不與乎其人殆其流也二公皆命世才誠意志功業不暇為文新建志在道不欲為文以其不暇不欲不得已而應宜其有勝者夫蓋嘗反覆其言昭若掲日恂若吐肝深若涵淵逸若龍驥之步不以隨人浩若江河之勢隨物賦形大小各得以漸漬於溟海向使二公尃意為之則韓蘓乎而二公不屑也余友耿在倫亦篤志於道者去年自留京貽書占文於予予質不能文而少嘗沒溺乃摘二公集中稍專為文者彚成帙應之附以所見俾世之為文者不必乎有意而語文者當知所辨則於道亦思過半矣古愚集序羅洪先語云人之不朽者三而立言其一其意以為君子疾沒世而名不稱功徳無可據矣表見於辭庶幾愛者傳之不愈於草木腐燼無聞乎余嘗不謂然凡言藉以立者謂其發聖靈之藴立中和之則逹民物之宜而埀久大之業者也不有之身莫能顯其微不精於用莫能述其故將使迷者悟而審於行明者擇而繼其志固非可以億中偽為矣亡徳與功烏有所謂言者自此議興於是工繁文逐浮藝刮截章句剽竊義意䝉賢哲之㫖奥而籠罩出入於異端百家之流真贗雜陳得失並紀知言者宜無所於逃矣世鮮斯人則雷同徼舉豈可勝道哉此君子所以托刑於秦火也堯之徳禹之功典謨之言皆可謂至矣自今考之其足誦說者即其身有之而致之於用者也是故其常為典其謀為謨其敎戒播告為訓誓誥命其嗟歎稱述美刺為風雅一也下此所就有小大則所及有遠近皆可以廣天聰神世道故里巷之謠五際所采矇瞽之陳三代不廢言之不朽也蓋若此廬陵古愚周先生起家進士自兵部郎兩為郡守余嘗從其季子肇慶君以介讀其遺集所載封事剖析弊源敷逹國是惟恐積滯日久振刷不易其與人語諄諄授理道規儆而要約之至於托興引譬又皆忠愛惻怛之寓不肯少自貶損以狥末俗卒之不遇而去布素閭里恂恂無怨懟色其模範不必工其步驟不必古不皦皦於聲稱不刻刻於綜察豈不足徴其實溥其惠哉余以是知言不可偽又因以知言無可畧則吾之取諸人者要不可以例視也近世公卿大臣多好文其為書動數萬言私以名家甚則託文人筆其行事連帙盈巻如綴文繡揉葩卉然非不紛麗觀視適於用或鮮矣豈亦惑於立言之謬歟余幼從先大夫識先生既長與其諸子友善故為之述叙於乎知言者以此求之可無異於先生也已先生名䕫字甫敬水厓集序羅洪先自聖人之道不明學者往往溺於神僊之說大要握固守氣可以遺世而久視故貪生於廢務者必趨之彼方守氣其於向人出一語以為損漏矧肯與世酧應役役文字間哉惟吕純陽白瓊則各多所著述然皆縱逸不範法度又出入變幻於怪異之事不過借以自適而溺者傳焉如以質於聖人之道同不同奚足辨也然聞其說而不動於心者甚鮮彼蓋確乎有遺而此失所主吾嘗即是以測人之淺深未有不騐者也𢎞治間京師多傳尹蓬頭尹善絶粒毎食輙又數升不畏寒暑或雜乞丐宿閭閻下人無異者而士大夫爭邀致之不去顧時時假館於水厓彭公公是時為南京刑部尹來必索食食已相對危坐間出幻術相調復試以隱語後公出守兖州尹涕泣别去於是人皆疑公得仙比為布政使去位無以為家年八十餘氣甚壯盛日飲水數碗人益疑之余往見公公好議論張髯傲視語琅琅終日不休公既卒讀所遺詩文數百首皆據理道闗風俗其意欲追作者之軌度是豈有所溺者哉當公守官時侃侃持法律多忤人人遂以是尼之故其官止於方伯不大顯而公於去就無少恡尹之戀戀葢知其中有可主而世之視公者真若羽化獨立無復塵埃垢穢之跡然公固不以是自多也余獨悲世之溺仙者其涉世既深私念愈熾其遺世反不若公而愛才者之搜訪遺逸期盡其用取材於世者其識公反不若尹余又以悲世之溺者固不在仙而仙之於世當亦恒悲其鮮所遇也夫以神仙之説人所易溺者猶且如此又况為聖人之道者耶余幸生公之鄉而先大夫復在莫逆既得見公又得論次公之行事於墓石兹復集其詩文若干巻藏之家因敘其所存且以悟人之疑者六大家文略序顧憲成二懐蔡伯子敦行嗜古予雅重焉一日擕六大家文略示予曰此吾先孝亷受之荆川先生者也今將梓而行之敢乞子題其端予曰荆川先生之為斯編也何以哉伯子曰以諷世也世之操觚者甲曰秦乙曰漢相與模擬以為工工則工矣徐而求之果秦乎漢乎否也果秦乎漢乎業已非吾本來面目如其未也優孟且掩口而笑之矣先生目擊而有慨焉故以諷也曰然則將使人轉而為韓為柳為歐為蘇為王為曾乎曰使人轉而為韓為栁為歐為蘇為王為曾是亦優孟之屬也曰然則云何曰夫善為文者惟以寫其中之所自得而已矣是故韓之前不聞有韓至昌黎作而後有韓栁之前不聞有栁至栁州作而後有栁眉山蘇氏父子兄弟自為知已亦各成一家臨川南豐皆學有本源才不世出故翩翩雙美不相假也不相掩也夫善為文者惟以寫其中之所自得而已矣故以諷也曰大家云何曰以我役物之謂大以物役我之謂小以我役物是故操縱闔闢靡不在手天之髙地之深萬象之往来千載之上千載之下一切紛馳於寸管惟其指使以物役我是故甲曰秦吾亦曰秦乙曰漢吾亦曰漢規規焉咀左馬諸人之粃糠而冀肖其萬一譬之剪綵為花驟而即之非不燦然可觀徐而玩之風神色澤索然無有也奚其文余曰美哉言乎深於文矣不可不表之以詔於世伯子曰不佞何知葢聞諸先孝亷先孝亷聞諸荆川先生荆川先生聞諸六大家予曰若是即以序斯編也不亦可乎遂次而歸諸伯子孝亷諱瀛字沙登有潜徳門人稱為少山先生李見羅先生集序顧憲成自近世之學者沉於訓詁沒於辭章謭謭焉守咫尺之義不覩於大道儒者慨然發憤欲起而救其敝於是乎招而来之曰爾其歸而求諸心斯其意亦美矣及此說既行學者又惟日以尋索本體為務播揚騰弄了無實際至於土苴六經浮㳺萬物而猶曰吾猶得於心甚者恣情肆慾惟其意之所便有從而難之輙曰吾無愧於心而已跡非所論也愚竊傷之徒自恨其力之莫以救也於今乃得見羅李先生先生始亦嘗習其說已讀大學超然有得磨勘累年自信益確遂斷以修身為夲一部大學又其註脚此孔子既老經綸徹有悟於性命也嗟乎深矣且夫家國天下之不得為夲固也雖正心誠意致知聖人亦概置之而獨夲修身何也彼其無形而虚此其有形而實虚則髙明之徒入於中而有以自騁其究渺悠荒唐不可端倪卑陋之徒入於中而有以自蓋其究巧秘詭宻不可致詰是可得而欺也實則一切無所容矣是不可得而欺也夫然後知孔子之立言其指甚精其為慮甚遠而先生所為啓瞶發矇其為吾道計者甚不小也或曰周程張朱四夫子大儒也其於繼往開來最汲汲矣顧不掲此為宗何也曰當是時斯道方明知學之士大率謹於自守雖以㳺楊之雜於佛老亦意見之偶偏耳未嘗不尊奉其師説也雖以陸氏之公然敢與朱子抗其規矩凖繩未嘗不嚴固也以是談心之害尚隠而未彰雖有而未甚至於今始不勝其可慨耳故夫先生之揭修身有激之言也一時救弊之急務也假令四夫子而生於今其説當亦出此矣先生非能有加也余邑李侯元沖先生之髙第弟子也數為余言先生因出其書示予受而卒業焉私心不勝向往已從羅君止菴㳺彌信於是將裒而付諸梓予不量稍為銓次并著其概如此以為聖學之復明於世其必自先生始不虚也明文海巻二百四十一
