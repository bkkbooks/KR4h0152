body:
  text: 眀文海卷二百四十三餘姚黃宗羲編序三十四文集蔡白石郎署集序侯一元白石蔡子郎署集十二卷為詩五百五十餘首文一百八十餘首合若干萬言蔡子十七登朝為行人數使方域遍覽名山川行求古文竒帙慿軾讀之學靡所不窺文聲蔚然然其時蔡子方尚偶儷為六朝詩抉竒之士咸自以不逮大雅君子或不好也既而蔡子持服歸家數年益厭故所習更為平易然其漸漬深不能盡變其盡變而趨於古則自今為南署郎始也故題曰郎署集云集中為南署郎作者什九以前什一甚者别之其餘則蔡子棄之矣敘曰淳備哉古文不在茲乎詩諸體皆合五言類陸機沈約易者擬子昂七言近體與盛唐諸公相軋而七言多似髙岑近體多似王維古文雅典則尤長碑傳以雜置漢人書中眀者不能辨也書疏上書論議亹亹終童之婉賈生之核其歸在於平易曉人不終於為末世枝葉自余所見近代今世諸名家體力逺到風格大備未有過也余嘗與蔡子論文蔡子曰余究觀古今之變迹其所以同異竊怪世之學者鄙夷唐宋髙睨秦漢而卒無所之也猶傲然自以好古其所為文有至有不至其至者古人之所嘗言也其不至者如優孟抵掌為孫叔敖愈似則愈可笑矣且昔韓蘇諸公何嘗不研精墳典搜羅百氏其瑰才好古當倍蓰今人卒乃自為一家擅名後世故學古者未有善於韓蘇諸公者也今五尺之童斯以唐宋為詬病悲夫悲夫余嘗三歎其言蓋今之文士鮮能免此者然謂韓蘇之文即古文固不可也古文渾朴雅厚繁簡各適語盡而有餘聲後人不然以斯為異故曰韓昌黎振六代之衰衰已振而文亦變蓋其不可得變者規矩繩削爾其方圓之美豈得嫓漢氏哉間者名士刻意古文句摩字揣久之無所得稍稍厭去則更為末世枝葉其人多與蔡子善者然蔡子弗謂是也茲集所載皆效法漢氏無一語相襲而渾朴雅厚初無少愧毛物間異神駿不别然後知蔡子所用心矣其稱述韓蘇諸公以為善學而非當世亦猶曽子畏子路曽西薄管仲惡其似而非者乃所願學固不止是誠得古人至精肆為文辭渾朴雅厚而勿守其糟粕則管仲之功何必見棄於仲尼而當捐匡合之隆取治賦之小哉故蔡子之微意可覩已斯集之成蔡子年適三十爾而其人深厚神守於內光不外諜有長年之貌意嗛嗛常下人其學日益未艾也且漢氏絶響久矣如蔡子所謂後世子雲非邪或曰集詩别有效唐初體何也論者多言蔡子優入盛唐以其故業六朝六朝之視唐下矣用上下下陵夷之勢易也是又不然今固有為六朝者皆得其似而遺其真吾知其不能為唐矣六朝其初亦皆追迹前世俯於漸漬以成其習故不若唐人之雅正而或者見其靡麗以為唐所不能為因固守甕盎膠不可解是以終身不覩乎大全也楊子曰先病而後瘳蔡子存此所謂不忘蓍簮者歟夫源水經於汙瀆合於清淵以有源必至潦而清不若其汙也蔡子之存斯也以觀惑者其庸有瘳乎王鶴泉集序侯一元語云不知其人視其友詎不信哉或乃曠嵗齊軌異地合符神者尸之而不知其所以然嘉靖丙辰余受官之梁道謁侍御斗城孫公而見鶴泉王先生之集感而欷歔者久之曰嗟乎志士哉夫事未有不竟於志者也故曰志燕而燕志越而越自余髫時從先大人留都已聞宗伯甌濱翁有令子其季即鶴泉子果以易學冠畿甸士又十年試春官對大廷咸上第而余末學亦獲茹連為同年小友時從通方丈人縱談六藝揚榷古今上下周秦漢魏江左李唐之際間請王子所安乃王子則􅍦愛好梁人空同先生之撰每為余言史遷杜甫而下最髙者空同子空同子今之遷甫也其意津津然嚮慕範硎之然鶴泉子故清癯日疲精於揣摩步趨之間靡間寒暑晝夜其為人潔亷好修期為無詬訾人士無賢愚雅俗汲汲與交歡一時被容接者咸稱鶴泉子當今金玉追琢君子也故名日益起身亦日益瘁無何竟感羸疾以卒余竊嗟傷之夫士絶甘忍嗜內支柴柵怵心焦思一志墳典豈不欲附離青雲厠足藝文之囿聲施不朽哉而令轉盻之間影滅響絶不亦痛乎如鶴泉子崛起海澨不安一曲慨然思企中州之豪乃其述造溫醇整潔矩矱自命亦既入室空同胥如其志矣今沒則未有表著傳述之者也余念欲振之而未有路蓋後七年而直侍御公按梁集卒刻於梁敘傳之者又梁人賢豪縉紳也斯殆亦有神感哉令逝者有知吾知其地下得逰空同相樂矣雖然鶴泉子非獨文也觀其與侍御公書交相朂以良知之學將師陽眀遡象山以希周程之緒使天假之年克見其止則庶幾哉大人之業夫雕蟲篆刻又曷足稱於聖儒之門哉尋其言以求其志斯重可悲也已蓋延州心許帶千金於丘墓巨卿寐感駐丹旐於素車死生之際可以觀人矣斯集之刻也以敦故存友興厲世風不其劭乎因卒業三歎而為之序書陳白沙集後王世貞陳公甫先生詩不入法文不入體又皆不入題而其妙處有超乎法與體與題之外者豫少年學問為古文辭殊不能相契晚節始自會心偶然讀之或倦而躍然以醒不飲而陶然以甘不自知所以然也若邵堯夫非不有會心處而沓拖䟤跋種種可厭譬之剝荔枝薦江瑶以佐蒲萄之醒而餒魚敗肉梟羹蛙炙雜然而前進將掩鼻抉喉嘔噦之不暇而暇辨其味乎然公甫乃極推重莊孔暘又堯夫靡也而公甫亦自沾沾則不能盡出無意以此小讓陶先生宗子相集序王世貞嗚呼此廣陵宗臣子相之詩若文武昌吳國遍傳之而吳郡王世貞為之序曰昔在建安二曹龍奮公幹角立爰至潘陸衍藻太沖修質沈宋麗爾必簡嶽嶽李杜並驅龍標脫銜古之豪傑于辭者往往志有所相合而不相下氣有所不相入而相為用則豈盡人力哉蓋亦有造物微旨矣日余與李攀龍于鱗燕中遊也子相實挾吳生暨天目徐生來子相才髙而氣雄自喜甚嘗從吳一再論詩不勝覆酒盂嚙之裂歸而淫思竟日夕至喀喀嘔血也當其所極意神與才傳天竅自發叩之冷然中五聲而誦之爽然風露襲于腋而投于咽然當其所極意而尤不已則理不必天地有而語不必千古道者亦間離得之夫以于鱗之才然不敢盡斥矩矱而創其好即何論世貞哉子相獨時時不屑也曰寧瑕無碔又曰歅良在御精鏐在篚可以嚙決而廢千里余則無以難子相也諸善子相者謂子相超津筏而上之少年間是非子相者謂子相欲逾津而棄其筏然雅非子相指也充吾結撰之思際吾才之界以與物境會境合則吾收其全瑜不合則吾姑取其瑜而任瑕字不得纍句句不得纍篇吾時持上駟以次馳天下之中下者有一不勝而無再不勝如是耳今其篇章具在即使公幹太沖必簡龍標小自貶損而附于諸賢之驥子相甘之哉子相于文筆尤奇第其力足以破冗腐成一家言奪今之耳觀者而大趣乃在北地李先生以子相之詩足無憾于法乃往往屈法而伸其才其文足盡于才乃往往屈才而就法而又不假年以沒悲夫悲夫然具是不朽矣世之立功名尚通顯者日譏薄文士無毛髮之用子相獨不然為考功郎有聲以不能附會非人出參閩藩屬有島冦事袵席吏民調兵食規摹為一方冠既又佐其臬為儒生師帥比死家祀而人哭之則子相居恆不懌謂麒麟鳳凰寧能並雞犬用乎不得志不能為聖世吾厭吾雞犬行去矣于鱗大賞之為詩曰一為麟鳯言三歎加飱食其曹偶持論若此王氏存笥稿跋李攀龍余觀大宗伯孫公所稱祭酒文章法司馬子長氏其然哉今之不能子長文章者曰法自已立矣安在引於繩墨即所用心非不濯濯唯新是圖不知其言終日卒未嘗一語不出於古人而誠無他自異也徒以子長所逡巡不為者彼方且得意為之若是其自異爾奈何欲自掩於博物君子也關中故多文章家即祭酒在著作之庭且三十年為文章其用心寧屬辭比事未成而不敢不引於繩墨也且三十年為文章其用心寧屬辭比事未成而不敢不引於繩墨原夫法有所必至天且弗違者乎巧者有餘拙者不足假令祭酒為文章其微辭美事一不得其所置豈楊雄劉向所稱實録者也大宗伯又言祭酒與北地李獻吉氏接迹而起以為祭酒重則是稿也海內學士大夫受而讀之者將益重子長之為文章而引於繩墨宗伯有力矣乃御史鄭公按陜以西諸郡稱采風使者還日奏之則又謂攀龍在左輔有祭酒於文章往往紀列國家大典而抵掌談四方疾苦九邊要害奉胡言胡奉倭言倭即欲聞時政不亦輶軒所載者哉乃若其詩則大宗伯所稱李獻吉得其具體矣吾重傷作者之志因并録焉攀龍得以具論二公所取祭酒者如此也康對山集序王世懋王子曰夫文至𢎞正間盛矣於是關中稱十才子而康先生德涵為最然獨最偃蹇至削籍以死余至關中首索先生集讀之怪其盛名之下所著僅此而時亦有蔓衍亡當於情實者馬伯循傳先生首舉其張氏族譜乃集亦不載以為疑亡何先生之子鄉進士梣來盡以先生遺集見付乃稍卒業而歎其巨麗然其為蔓衍亡當於情實者亦益以衆則何也先生當長沙柄文時天下文孊弱矣關中故多秦聲而先生又以太史公質直之氣倡之一時學士風移先生卒用此得罪廢而先使秦兩漢之風至於今復振則先生功也既已放廢無聊稍托之聲妓以自耗其磈磊之氣不能作下帷腐毫生活而家居久名益重海內丏文者無虛日先生間以絲竹麯蘖之暇應之而門生子弟亦時有為代筆者以故不無蕪訛至其為詩樂府蔚跂故是風雅所寄而五七言古律間多率意之作又慕少陵直攄胸臆或用時人名號爵里或韻至便押不必麗於雅故此自先生志雄一世由我作則或以為不當併削然余謂梣也爾其為康氏志也者則可留為千載之下重康先生也者則不可留夫使利吻後生執一瑕以廢先生之瑜毋寧使獲罪於先生之子孫謂廢其家志哉凡二集中鋪敘亡關係者必削率直亡藴藉風者必削命意就時離於大雅者必削總之舊集之削者十之二三而遺集之入者十之三四彬彬乎足成一家言矣於乎獸畏網羅人思俊異命不諧俗死猶煩人先生少負俊聲為廷對第一人意將兼舉經濟潤色之鴻業不幸被惡名以廢其志事既無所表見而放浪形骸之外又為禮法之士所繩獨所不可磨者有斯集在乃又以碔砆溷良璧叢篠穢美箭是先生之窮且併其文為異趣者揶揄此寧獨康氏子孫之羞亦斯文後死者之責也是編也出即不敢謂盡得先生之心抑或風雅備焉覽者循是以求先生未白之心庶幾哉千載人豪思過半矣鷦鷯集後序王世懋鷦鷯集者黃州守鄒君彥吉以自名其集也托於卑而名盛德也墻東王子讀其言而斂袵曰詩道盛哉洋洋乎其隆萬之間乎夫唐之人主以詩登士士之工乎此無惑也士業由此登吾以謂髙者當在帝左右任密勿顧問之司次者乃以試州郡諸散秩及屈指而計其人乃多不然開元以前人主當命侍臣應制蘇李燕許之流猶執文柄厥後實寥寥焉若權武諸公未當作者而詩家所推李杜顧在下僚即髙岑劉白韋栁之徒大率多為刺史郡守若韋蘇州栁栁州千載後以其州名不易也詩道之廣不必臺閣在唐已然矣我國家用經術䇿士選入史館者始以詩其用於世彌狹然士之好之者浸淫日廣角竒競秀巋然踵立即開元天寶間亡以踰之若吾彥吉其一也彥吉成進士年甚富為膳部郎不六載選為黃州守黃號難治彥吉卧閣而治之聲籍甚天下以為任職吏彥吉始刻其詩於郡齋天下又以黃州守詩人也其詩縱橫入手靡所不愜為古詩古色黯然下視韋栁為近體秀色可飱駸駸逼髙岑而上也讀之使撡觚老生目逃舌咋而避三舍彥吉位且益髙詩日益有名所成一家言當不可涯量顧其使人口膾炙始自黃州天下士爭道鄒黃州矣夫黃州故彥吉之一枝也不必上林安知一枝之為小而九萬里之為大乎吾又安知一郡之為一枝而臺閣之為九萬里乎若吾彥吉其可謂妙於自託也已胡祭酒集序吳國倫司成胡若思先生豫章人起家文學薦陟青宫歷事髙文二廟學術聞望冠冕南州其所自著頥菴集諸學士名公序而傳之矣今先生即世垂二百年海內後進生慕其鴻筆罕從購睹往往懷遺憾焉頃司馬中丞李公鎮靖兩粵讋服諸夷業已建櫜修文幕府清宴乃手先生舊集一帙屬吳子曰茲豫先世所為十襲珍也古人尚友先自其鄉有如杞宋文獻齊魯經師非藉表章能無湮缺先生熙朝大儒故當不朽子雅好藝文又嘗一日逰豫章也於先生獨無意乎吳子唯唯退而稍為銓次得詩之精者六卷文八卷殺青以復司馬公因序曰知言難哉宣父至聖辭命未遑蓋難之也况遊聖人之門者乎粵自結繩以還竹書韋編以及二南十五國風其詞醇龎溫厚蓋上世之大音也逮夫三傳八書離騷十九首紀述既嫺諷詠合度蓋去古未逺詞旨廓閎其後二京寖盛言成一家六代仳􅍣末流不競近體變自唐人音節稍振然貞觀大厯以後無采焉良由風運遞遷才品殊致雖瑕瑜不掩而復古為難其惟能者從之乎語云不逢師涓勿與審音不遇季札勿與觀樂豈涓札之外人皆聾瞶彼有所深慨矣夫學以益才文以足言皆眀訓也中人承學鮮究斯義大較有三疾焉師心者非往古而捐體裁負竒者縱才情而蔑禮法論道講業者則又譏薄藝文以為無當於世嗟乎茲不學之過也藉令體裁可捐則方員何取於規矩禮法可踰則華實不必由本根謂藝文無當於世猶之責騶麟之不耕而以司晨病鸞鳯也不已誣乎夫師心負竒其詞骫骳曼衍勿談矣乃論道講業名為聖人之徒也何至叛體要之訓蹈鄙倍之戒侏􅍣大雅糟粕微言以自掩其孤陋猶曰我具體聖人足矣焉用文之其誰欺乎乃先生以學名世多所窺覽祕閣書博綜外家旁貫職典故其為文若詩上緣聖則下擲儒玄沈思重淵綴采繁露縱之若隘八紘操之曾不下帶蓋發抒性靈宣暢風教庶幾禔衡衆氏鼓吹六經矣若其侍從密勿容與髙華而猶棲志洪崖寄悰玉笥恬漠之度至今猶可想而挹之其視因窮愁而著書遭幽廢而述史者又不啻徑庭矣夫抵掌非敖非其似也捧心非施非其不似也先生諸體不煩繩削而步趨音節伯仲漢唐蓋未嘗求似而又未嘗不似其猶郢斤庖刃乎才益於學而言足於文若先生者庶幾聖人之徒哉而司馬公則先生之涓札也可以並不朽矣蘇門集序吳國倫髙子業仕為按察使卒於楚其友陳約之嘗梓其蘇門集以遺楚人后二十年門人亢子益重梓於梁顧在楚者楚人人傳之在梁者即薦紳大夫不多見蓋亢以梓歸其家屬其家屢匱不能守至為子錢家所籍匿不傳者幾二十年豫再至梁始謀諸陸道函贖之得復傳嗟乎子業庶幾不朽哉中州談藝之士率謂子業興七先生後然自獻吉仲默而下難乎雁行子業者乃他日子鍾稱詩而求多於文獻吉評文而求多於詩即二説並持而瑕瑜固不相掩矣吾友徐子與卿為汝南太守時蓋嘗登平臺謁唐三賢祠慨然興嗟曰髙常侍與李杜齊名一時之遇也獻吉仲默並䇿上駟而馳中原髙子業雖驂駕第緩轡後至耳且皆中州名産於三賢豈有古今乎業已上記蔡中丞請得增祀三子為六賢從之而卒隂阻於里中人罷子業而入李何為五賢祠云豫觀李川父所為五賢祠記自中州七先生外猶有不勝其耽耽者而獨置子業勿談嗟乎子業之不遇身后且爾士之相知難矣而又奚責於子錢者流哉道函曰茲集再傳子業不必以爼豆重也微子則玄珠沈矣誰可使為象罔得之枯桐既爨當索諸棄灰之衢耳願序其事以為后徴序成則灌甫宗正又為李氏留意焉豫將嗣圖之矣劉子威禪悅三草序徐顯卿古人稱曰幼而學者如日出之光老而學者如秉燭夜行其然乎老劉大夫子威者年垂八十耄矣而力學不衰彼其得於少壯者既多而采閟摉竒湛淹綜貫玄詮內典罔不繹非至老而始學不可言秉燭矣其猶日在若英其光逾烈哉杜門著撰其書滿家即未及惠子之五車亦不啻如曼倩所奏者余方構草堂於罨畫之傍聊謝紛榼以自適而大夫以近草曰禪悅曰雜稿曰别稿者寄示且為索一言評隲之夫神以御形而神超乎形外故曰齒髮無關於神明大夫晚而喜佛佛氏之言曰汝面雖皺而見恆河沙性不皺其衰其皺者大夫形耳故日薄虞淵而猛志常在今觀其草猶若裴旻之舞劍縱筆所至無可汰也大抵以淵涵邃奧雄徑奮踔為主寧浚譎而人不能尋無淺坦而句易以乙正如蛟龍之吹􅐟潰裂橫迸震蕩狂決不肯作嶰谷之簫平和淡泊者也當今作者雲涌詩文之道中興矣鸞者鵠者鶴者鵬者吐綬雞者孔翠者鸚鵡者皆上厲乎天而獨角鷹者側瓜橫睨搏擊飄逝傲然欲俯衆羽而不為之羣嗟乎斯其為大夫哉故有擬大夫為樊宗師李長吉者而不知大夫好求之古自國語管子三劉三謝中來其任意而自為之格自為之語則其所獨創也庸俚鄙夫見子虛上林曰詞賦必爾而不知自我作古奚以馬揚為以故讀大夫賦不能諳解輒謂僻澀夫孰知離而合合而離之故哉余卒業三草而書此以復大夫其有當於心否乎明文海卷二百四十三
