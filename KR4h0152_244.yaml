body:
  text: 眀文海巻二百四十四餘姚黄宗羲編序三十五文集太白山人漫稿序鄭善夫太白山人漫藁者吾友孫一元太初所為詩也夫曰漫者觸而成聲無謂有謂之云也太初闗西豪杰也束髮入太白山為山人繼入終南汎觀恒岱遵龜蒙慕宣聖遺韵止於鄒魯之郊久之踰江淮下吳越鶡冠布袍獨立於萬象之表志孑如也夫髙蹤逺影者顧以世為不足為乎及讀其詩皆悲壯竒崛感激奮發而卒澤以沖和如神龍在淵變化不測得時而興乗雲雷以雨天下噫是豈忘情遁性為犁輿來祀者倫乎或曰太初離親戚去墳墓逺㳺於方之外與名教或不相蒙者是何言哉孔子曰丘也東西南北人也復欲居九夷嚴子陵去齊適越管㓜安徙於遼東孫明復隠居於太山之陽邵康節去家入洛四十而後娶古之賢達流寓於外要必有所為而安焉者獨太初爾耶或曰吳越之人古文人易致名譽太初操觚飾智掲掲然為髙意有終南之捷者夫以太初之才稍自抑以應今之世何往弗達顧甘心寂寥卒其世以餂無端功名耶吾嘗與太初乗月汎洞庭浩歌漁父傲睨一世似無少芥蒂於其懐又嘗與卧西湖之上見其息深深時乎天壤時乎地文要固有道者吾聞無欲而後可應世今之應世者可勝議哉漫稿凡若干余為之序以傳藁而曰漫則固傳也太初不與也袁永之集序朱曰藩書有之辭尚體要不惟好異我太祖髙皇帝即位之初詔翰林為文通道理明世務毋事浮藻及為深怪險僻之語綸苑相承確為定式自金華廬陵以來諸公之文其合作者不但文從字順各識其職而中間懇欵宻緻之處讀之藹然使人足以得祖宗致治之盛厥亦氣數之一㑹哉𢎞徳間海内數君子者出讀書為文斷自韓歐以上稍變前習一時學士大夫歙然趨焉而柄文者顧不之喜目其文曰字子股乃數君子亦抗顔不之恤各以其志勒成一家之言行於世然以天下公器趨捨相誚識者非之他日讀胥臺先生投大梁公書盖爽然自失矣書中云吾能總統包容則無可無不可斯言也其中和之經乎夫趨時久則不免於規摩之偏信古過則亦䧟於陸沉之弊君子所養茍有定極則和𠂻之下交相為用奚以誚為先生人品雋上度越一世童子之日即洞大文流傳過江以北人士爭録之曰此吳下袁五郎之作弱冠中南京解元連舉進士髙第被選為庶吉士讀中祕書已授刑部主事改兵部上官之日適兵部火上怒下之獄謫戍湖州㑹赦歸以薦起補南職方員外郎官止廣西提學僉事夫以先生之才之識入館後即使得専其職以至今日國家鴻業經所潤色者宜何如哉然先生性骯髒不解俯仰維時一二新貴人方在要路稔知先生之名欲招致先生以為羽翼先生謝不往因擠先生出使不得在近侍而武庫之酷焰乗之矣謂之氣數之阨非耶先生斥既久始有起廢之命即又處非其地使其平生辛苦卒無所試上之不能振皇朝同文之風下之不能食昔人稽古之力而流光荏苒世短情長蘋老惲州鵩集誼舎矣悲夫先生此中戀戀將誰寄耶乃知前日數君子者其感激發憤雖稍盭正則要之各有不得已之情而其本心非敢一於求異也悲夫悲夫嗣子進士魯望刻先生集成使來問序因述予所欲論說者如此集凡二十巻先生手自選校題曰袁永之集序因之霞石小稿序朱曰藩詩以道性情故曰可以觀然貴有其才有其才又貴有其學有其才有其學又貴養之養之久發諸性情之真自有婉雅藴藉悲壯怨譎之妙溢於言表使讀之者愀然得其志之所之而泣為之下是詩也求之於放臣怨女懐沙恤緯之口為得其真故聖人采焉後之人不達聖人為敎之所本才入雅道便渉藝門浮雲白日摛為古選青枝黄鳥拈為六朝曽不知古人賞其一字幾千金流轉如彈丸者為何物卒使讀之者祗覺中間餖飣剪截千篇一律而竟莫得其志之所之是詩也為詩耶韓子曰氣水也言浮物也氣盛則言之短長與聲之髙下皆宜乃知古之大才與六義相左右一有所發不可刋置别處有本故耳霞石小稿者新安江叔子民瑩之作也民瑩讀書篁南山中又稱篁南山人山人弟禮部荆石子與余同年友善壬子春荆石起復北上過八寳見訪致山人書徴余序其稿久未之復也越今夏丙辰荆石再起復乞南補車駕邂逅首徴及稿序且曰昨與家兄書云此來無别事為兄索射陂處冷債耳已而山人亦自新安來相見歡甚秋齋美月把酒論文余因謔曰昔人謂帶二江今有之矣山人笑曰少陵言見一珠非耶雖然子奏績近矣何以教我於是退而出其稿及近日所投諸作讀之愀然曰有道之言哉可謂發諸性情之真矣詩麗以則文核而雅足以一洗近日剽襲之陋方采山謂山人持論和厚有吉士之度汪穎谷謂山人用志不分獲誠一之效可以得著述之本矣余復何言山人少為舉子時有志於用世已而病棄去講軒岐之學間從方外者遊皆得其秘訣以其餘力洩於詩文故有精有氣有神如此而猶不恥不肖拳拳下問因復之曰僕病矣五技窮矣不足以奉眀問矣公之神方王而僕之技就窮第恐僕之急於問公更急於公之問僕也靈樞八十火記六百有真傳乎䟦空同先生集後朱曰藩君子之學無所倚之謂聖是故中正和平言出為經尼父不可尚已孟氏而下吾未見其無所倚也倚者何徳未及化必藉於氣以揮霍其言大其事功耳軻之言曰我善養吾浩然之氣七篇之中大抵皆是氣之揮霍也其視中正和平者有間矣先友空同李公以竒才卓識在𢎞治正徳間倡為古文力追秦漢一掃近代㳂襲委靡之弊有集若干巻傳布宇内讀者謂若有物馮藉其間景駭響振使人不敢以䙝玩何也盖由公平日毅然以節義自任特立抗䟽詆外家迕巨鐺三入狴犴瀕死卒不死以其孤憤洩為文章結體包宇宙捶字入秋毫遒麗爾雅動髙前式當其自信時雖宋蘓軾唐韓愈薄不為也公之文謂有所倚非耶公固一代間氣哉公没新學聿起病公者曰節義血氣耳文自韓歐蘓氏以來已有定式何必摹擬秦漢惜哉李氏子不聞吾聖人之道而死噫嗟嗟無所倚之謂聖空同之文有所倚者也子所謂不聞道者也即摹擬宜也子聖人也亦規規于韓歐蘓氏操其闗鍵尋其節奏獵其精采每一篇出曰此韓文此歐陽文此東坡海外文無乃亦有所倚哉推是心與摹擬秦漢者何以異石亭陳公曰當此末法之日出世者便要據獅子呵阿難罵迦葉做一程佛子奈之何予曰佛固好做但恐只是魔得其便飛精附人假汝說法汝終不是到地釋迦耳相與一笑或曰到地釋迦如何曰無所倚之謂聖仙華集後序陸粲仙華集者吾吳趙與哲先生所著也吳自昔以文學擅天下盖不獨名卿材大夫之述作烜赫流著而布衣韋帶之徒篤學脩詞者亦累世未嘗乏絶其在本朝憲孝之間世運熙洽海内日興於藝文而是邦尤稱多士于時若杜用嘉陳孟賢二公以髙年為諸儒倡率最先有名繼則先生與賀美之都維明樓仲彛沈啓南史眀古輩相踵而起數君子者雖其造詣或殊然大扺愽雅有文行義脩潔出入則古衣冠人望而起敬部使者若郡縣大夫側行襒席將迎恐後縉紳東西行過郡中者輒造其廬而禮焉髙標逺韻照映一時鄉人盖至于今稱之不衰而先生尤意度倜儻喜論當世事嘗受知于廵撫三原王公值歉嵗三上書請蠲賦言極剴切御史理尺籍誣執民為軍先生貽書力陳利害民賴以免其他事往往類此至於文辭亦伉健質實不肯骫骳以諧世好古所謂直諒多聞者非斯人歟自先生與數君子者没吳中耆舊略盡後進之士琱琢曼辭日入於佻巧而前輩朴雅誠直之意㣲矣粲生晚竊獨嚮徃之而不獲覩其流風遺烈以為恨乃今讀先生之文寔重有感焉或者顧疑其言渉時事非處士所宜是殆不然夫人各有志劉勝雖清髙未必賢於杜宻使李膺為鍾瑾亦非所安也彼隐情惜已自同寒蟬者直拘士一隅之見豈所以論夫𢎞逹君子者哉是集為詩文通若干首盖先生之子處州教授磬所自輯録將刻而傳焉屬粲為校定因附所欲言者於後先生名同魯與哲其字其先出宋宗室所居有仙華山因以名其集云悔言序許相卿夫辭尚體要簡尺之體惟真而盡達吾意焉止爾否雖文非體矣夫羅獵理亂稽證古始而以辨博悟上上書陳事之忠也鋪比蔚贍賦之則也白發事理往復究盡論議之制也語熖談鋒張皇撼動說士捭闔之術也擷葩萃英采錯爛如詞人之習也頌徳賛功誇諛浮實佞人利口容悅之態也摉隠窮奥哳吻棘喉務異求勝敦銘冡簡之竒也警意麗詞逞新衒巧經生誇藝攫雋之餌也至如㫖易辭艱以深飾淺壯夫羞稱焉然以之投世耳目亦多快意動容藏去為玩然皆非其體何也去真逺耳餖飣支離尚奚簡為予生野性朴資任真信古或妄一言面頳背汗若不自容所著薶文肝膈可見使得師資有道即未妄希上達萬分一歟進以論篤君子意亦可乎而同塵流俗罔所適從閱宋季佞人手尺遂沾沾自喜漸習於浮淺矯誕而不自知鄉有正學端人見之能不鄙予為尚口不情者幾希晩適有知亟將抹摋駟莫之追矣嗟夫吾自賊其資而自安於佞也久矣乎愧憤懊悔奈何哉予為此序正以為戒欲後之人勿復墮此蹊徑以再蹈予之後悔焉爾吾嘗觀歐陽蘓黄發口吐辭和雅暢潔良非淺夫矜飾者可同日語又觀江左以還章逢辭氣記載尺牘類皆直而簡恬而曠暢達而逺即方言而和易見于俚近著家人語而䁥睨懇欵慰愛藹如言在帶下目前意自悠𤣥雋永斯簡之得已矣後來工言者盡意摹襲了不能似盖難乎真焉耳蘓子瞻曰有意而言意盡而止天下之至言也豈非真之謂耶是故簡尺以真不以文然而真未嘗不文也故曰晉人言語用以為文當妙絶今古何耶真故耳其然乎其然乎吾弗及已序悔言汰礫集序莫如忠霍山洪山人以采詩為五岳逰凡三過雲間余因識山人久比余從洛藩奉表如京師山人遇余燕邸數存之甚懃令余忘覊旅之役而山人所善諸布衣能詩家跡山人所至而就余者凡十數輩别之日亦莫不慷慨悲歌導余都門之外則山人倡也而余既解官里居與山人音耗絶有間矣乃山人復為雲間逰余得以九峰主逆之握手道故欵欵問訊山人常所善諸布衣則各往往播遷凋謝或以悔終余甚慨之夫以士稱隠淪躬獨行之節不獲世之淄垢宜其免矣而猶令名之難若斯何故彼各有所長而所以居之者善不善異也譬握瑜而處弗慎葆笥而辱諸途則幾無數矣而山人乃獨約節謹度韜光履謙擇言而道動遵矩矱纔如儒生無隨俗浮湛比周忮求之態亦不似彼恣睢自放以任達為名髙此其所長有過人者茲以訪舊來則山人之名益起當途貴逰並推重客而山人殊不自喜晩節兢兢御必麤糲行必蓬累僦居𤣥宫僻在郊鄙門無雜賓出不妄謁余觀其志念深矣而山人之以義㮣終始稱於天下賢士大夫不衰者有以哉有以哉山人為詩渾厚晶瑩櫽括六義取裁於盛唐諸名家不詭轍迹以趨時好詞林之雄也是刻也首從崌崍張中丞公同遊諸篇而因裒近著附焉署曰汰礫集然則集所遺者多矣中丞公既為評而序之余不知詩而能知山人本其平生所繇成山人名者如此云何翰林集序莫如忠何翰林集凡二十八巻予友何元朗著也君名良俊與弟良傅世所稱兩何君者集刻于今嵗嘉靖乙丑冬工既竣予得而覽焉嘆曰何君之文至是可不謂宏朗博雅褎然古名家與夫文章髙下觀氣之盛衰氣之盛衰係世之升降所從來久矣魏文典論曰文章以氣為主誠哉是言盖六經息而作者稱秦漢宗之至今豈不去古近而變相襲醇龎沕穆之氣猶有存者耶降而六朝風斯靡矣自晉之機雲才擅江左而士衡文賦以述先王之盛藻至云㑹意尚巧遣辭貴妍西京風骨闕然弗講此何以訓哉及若唐宋諸賢造述彌衍斯義大眀非不務譏訶六朝斥妍巧本仁祖義刻意修辭一裁於矩矱乃其氣不無異於古所云而彼以遒勁之力險膚之辭馳騖其間如峻峯激湍之喻者豈不曰氣良在是哉第弗深究古作者之意乃獨以踈鹵椎樸欵欵儃儃為竒其淵泓渟滀㵼若江湖之浸盎若大和之薫而重踰九鼎大吕則氣之完也夫世變風移士尚互異非篤信好古學識其大心知其義者孰能與於斯乎予從何君逰每見輒語合至是讀所著集即鑿鑿不謬其指云君于文法劉向司馬遷氏詩本蘓李近體出髙岑間至其醖釀羣籍勒成一家意匠縱横不假繩削或直陳事理陶冩胸臆累數百言要歸於質厚倘所謂醇龎沕穆之氣其在治古者不自是可想見哉君嘗自言平生於文學性獨近之少從經師授書輒覆古文其上私諷誦之師弗是也亦不能變比長樓居憤發垂二十年或挾冊行逰忘墮蹊坎盖其用志之勤類此宜澤於文而自予所覩以君雋爽之資夷曠之度蕭然物表薄視榮名至好惡取與然諾之可否耿耿不阿有達士之槩則所以養其直義而昌其氣於言者甚裕君之大過人者乂寧獨文辭焉已哉君或以予能知言又知君也俾序其集故得備論之而本國家氣運之隆有闗於作者與同志共揚𣙜焉蒹葭堂集序莫如忠東吳文獻率祖機雲更千百年絶有間矣而少宗伯陸文裕公崛起瀕海入緯國華放辭瓊琚雄視一世時論以方平原至其子楫思豫甫蜚英穉齡嫻於藻繢揮毫驚坐綽有父風載辟州里業冠棘闈而以忌者阻抑遂終轗軻鬱鬱以死纔三十有八齡所存笥草詩文若干首輯自其子臺幕君梓焉命曰蒹葭堂集零落殘編不能十一讀者以遡家學之自知文裕公盖有子云嗟夫美好不祥修名賈忌意長晷促哲士興悲若思豫君兼斯悼矣余觀自古以才而厄千年如賈長沙之治安上書過秦著論雄篇巨帙動闗國體施名不朽固無復疑及若王文考禰正平酈文勝之流寥寥短章僅一斑見而垂芳來䙫亦具稱竒何哉夫片石韞琦均資珪瓉寸株中墨不廢工倕古之總攬百氏定價於懸衡者惟工拙之問他尚奚擇哉讀蒹葭堂集詩不滿百而命詞遒逸屬思冲融務嚴體裁弗矜色澤文不數篇而議論慨懐率依名節深切世務薄視浮榮總厥撰著非茍而已且君以彼其才藉令早致青雲得専治古則文詞之傳於世者宜不啻是否則或假之年以須追琢而優其成亦當深闖作者之堂矣乃造物咸靳之而姑有托焉以見於世所謂不能盡其才者與余慨平原之後迄無聞家而文裕公歿其文獻之存乃有足徴如是故論叙之以眀古今家聲隆替所繇俾後有考焉吳山人後集序何良俊河嶽山人刻後集一巻成出以示余俾序之余讀山人之詩喜其近於性情則歎曰嗟乎凡物不兩大造化無兼美孔翠之肉不登於爼澤其羽也桃李之材不中題楱繁其華也故文質偏勝雖孔子猶病之我眀當敬皇帝朝治化隆洽文教大興學士大夫始厭薄相沿之習一切有志於古文章自漢以來詩自黄初以下率不置於口一時李空同何大復徐昌榖諸人相與倡始南北競爽而古人之風幾遍域中矣至於今日可謂極盛然學者僅能操觚即詆訶韓栁為不知文李杜元白為不知詩及究其中之所存則文章徒鉤棘其辭初不根於理道詩徒組繢其句亦無闗於性情由是識者病之以為反不如祖宗時削文就質直陳胸臆者是也嗚呼是豈文之病哉則過於文者之病也故仲尼之用禮樂欲從先進莊子曰文㓕質愽溺心民始惑亂無以反其性情夫文猶足以㓕質而况鉤棘組繢之辭其於理道情性何如哉况山人之詩本欲舒其間曠清適之思茍以纎穠巧麗之辭出之無乃不似乎余獨喜孟浩然之詩曰泊舟鄩陽郭始見香爐峯常徴君曰出浦見千里曠然諧逺尋是皆如芙蓉出氷天然妙麗亦何嘗假組繢為工耶今山人之詩獨能彷彿乎此其亦㮣嘗有聞者乎或者又以山人之詩多與荐紳酧倡失其本色余曰不然山人魁梧廣顙善音吐少年仗劍走塞上以䇿干當事者不用遂徒歩南歸適海上冦至過建康弛擔居焉故南都士大夫樂與之逰夫郡縣不請士卿相不俛眉之日久矣今幸有山人與諸公㳺使聖世猶存王公下士之風此正告朔之餼羊也顧當以是少之也哉刻山人集者桐城錢實夫也錢君不以金幣走貴勢而與山人刻集皆近時盛事余樂書者因序山人之集及之山人姓吳名櫎字子充蘓州太倉人剪綵集序何良俊徐昌榖有云詩理宏淵談何容易追尋厥㫖信而有徴盖西京創制大闡五言厥後辭人遞相祖襲爰逮魏晉迄於開皇上下九百餘年使代有百人則作者亦幾於萬矣方其含毫伸紙杼思構篇孰不欲翶翔藝林虎歩辭苑者耶然而苦志窮年誰能破的研精白首鮮克升堂是以序録之家校核精審詮綜詳宻稍渉蓁蕪何得塵茲簡册略存考類終不㸃彼縹緗今稽之鍾嶸所品才一百十有五人即王微鴻寳任昉縁起諸篇縱或稍有異同要不大相河漢觀其識同别玉鑒等揀珠總羣藝而芟除存十一於千百固亦嚴矣然三品之中惟子建一人獨盡褒美自王劉以降互有譏評則知詩之為道可不謂難哉予嘗括而論之其大端有二夫鋪張篇什全在體裁潤色辭條其先菁藻譬之衮冕實繁典章茍欲擅美一時必待兼資二者是故張施采色著在夏謨差第等威詳於禮籍所謂合之則雙美棄之則兩乖者也今試以菅蒯踈惡縱被之絺繡終何能以辨章軌物茍白地眀光錦裁為負版袴亦曹毘所以取譏於孫綽者也嗚呼是既然矣究其疵累抑有數條夫神宰難馭寄在絶㝠意匠無方潜於冲漠探之愈窒索之更深是以對客談諧俱能暇豫臨文議擬鮮不譸張况乎雖假名言而必欲言尋象外固非詮理而實須理契環中至於選勢定篇既方圓莫準鑄辭練句又𤣥素無别専事浮華則流於輕艷偏崇簡質則失在淺俗茍取優㳺之致終以闡緩為尤若慿迅舉之力遂以揚厲貽誚纒緜情欵將同委巷之謠精研要𦕈復似老莊之䟽翬翟備色終愧力沉鷹隼翰飛更慚乏采或象數繁列而神有遁思或興致偶屬而物有隠貌或一篇之内魚目與夜光雜陳或數句之中圭璧同碔砆駢集加以平頭上尾所闗最要四聲八病其例亦多懿彼靈均未窺斯秘蠢茲懵昧曷究其詳是以世之作者自言人握靈珠終是家藏敝帚至有唐貞觀開元間世推極盛然自是詩道之一變也下逮宋元風雅幾絶我眀列聖纂服大肆陶鎔羣宰持衡更加領袖上播𤣥籥下傳正聲才情雄健者咸取模於漢魏思致清綺者復降意于齊梁由是建安永眀之風洋洋乎遍於域中矣維我華亭地偏江左自機雲入洛繼踵曹劉希馮仕梁此肩徐庾今雖世代緜越風氣遷殊所頼崑丘岝㠋猶著爽靈谷水澄泓尚流芳潤故荐紳諸公與逢掖數輩時相屬綴富有篇章幾能方駕天閑遂欲争馳王路若我張子𤣥超則又英英挺㧞者也間持剪綵集一編以示余曰此之象近作總若干首苦於朋逰假索將加于木以代傳冩子尚為我序之何子曰夫言剪者託意體裁曰綵者取喻菁藻觀張子名集已備詩家㫖要矣及讀之終巻則皆清麗婉約綺錯流便羣疵畢去衆美竝臻嗚呼使鍾叅軍復起品裁近代諸家則張子之作將非首為銓録者耶或以為此作誠為美麗使能稍刋蹊徑當不更為盡美乎何子曰夫藝家沿襲自昔為然即李空同序昌榖之集譏其守而未化蹊徑存焉今觀李公蹊徑更甚徐生則知大復捨筏之言亦欺人耳嗟乎駿骨猶存寧無伯樂雅音獨奏豈乏鍾期悠悠之談孰是知者廻環吟諷輒為序之入閩稿序何良俊西谷先生入閩稿一巻刻成寄余南都余讀之歎曰嗟乎傷哉先生有當世之用迺其官於閩而顧欲托是以傳也先生少以専經為愽士弟子員凡郡中之讀尚書者皆授經於先生先生學有依據得其指授皆取科第去先生又盡讀諸經與二十一代史人初見先生謇然若言不能出口即扣之如探淵海即數十人在列各得其所問而去先生善為古文辭然皆典重不喜為浮艷語先生敦欵質直且練達識大體人有事就先生謀先生曲為計盡即其人如先生指罔不得理先生雖居貧人有以緩急告就其力之所至振之無徳色先生身若不勝衣然好義喜出人于難先生不為皦皦之行而家門雍穆外至州里未嘗有失口失色於人先生言議持平不為過髙余少時論事好慷慨激烈常取古人之竒節獨行㮣人先生不然之今閲世既久迺知余誠太過先生所持者是先生與余屢試不録退處里巷今大學士存翁相公留心當世之士不喜浮競欲求懿實有用之人獨知先生與余先生與余不數徃來於相公之門相公益以是賢之及先生謁選至都相公與言事懇懇欵欵益知其懿實可用夫今之仕官其有志而可施於用者獨縣令耳盖國脉繫民民命繫於令夫天子以數百里民命委之縣令故令之一念所及榮枯頓殊一言所加生死立判茍天子欲施恩海内縱曠蕩如天使縣令稍或壅閼即分毫不及民民有寃誣縣令不為申達至死終不得上聞故縣令官雖小然所闗於天下甚重相公欲用先生為縣令然祖宗時縣令科貢人常相叅其遷擢至郎署監司以至卿貳者科貢人亦相叅故其勢常相平今世偏重甲科其遷擢至郎署監司以至卿相者獨甲科人故甲科人為縣令即其人貪殘無賴猶曲為愛䕶保全之或貢舉人為縣令雖其奉法循理必加譙呵且摧折恐不勝由是其人皆絶意升進徃徃茍且不自好罷去遂使由甲科者敢於自私由貢舉者甘於自棄而天下無良縣令矣是豈祖宗意哉相公曰使張子為縣令百姓之利奈不利於張子何當處以外臺一幕職夫外臺持憲與内臺埒且幕職嚴重古之賢者在府中必辟舉名士為屬而一時卿貳亦多以此職起家試以處張子冀稍轉以收後效可乎先生到官不一嵗監司至慢先生先生曰吾􅍩上有田可耕篋中有故書可讀古稱避色余未可以去乎即投劾去先生歸移書南都以報良俊曰余歸矣余不負此官獨負相公奈何良俊曰嘗有以種蘭之說聞於先生者乎昔有一大賢拜相虚已接物誠心愛人不朞月而政化行四海盡樂業又思為國家種樹為數十年計迺遍植栝栢梧檟桃李以為梧檟栝栢可材桃李秋可得其實也又以為蘭者雖至㣲物然生在深谷中不以無人而不芳似有徳而隠者故古賢佩御之誠美其芳潔也吾不忍其老於深谷中吾逺思致之乃使善識蘭者裹粮荷鍤陟峻嶺渡深澗遂躋窮谷果得真蘭以歸相公喜布列庭下恒手自灌溉親重之然相公門多客客至日數百輩相公不能遍語客客亦不㑹相公意過者蔑視蘭以為猶茅也􅞂踐之越旬日蘭則萎死矣相公豈為不愛蘭哉無奈其根荄淺而枝葉㣲何也今先生類之矣迺良俊亦相公庭下蘭也誠不忍衆客之視為茅􅞂踐之得以其半萎之身請命相公返之深谷今已漸有生理矣然客但能使蘭萎不能使蘭化為茅余與先生既返深谷幸不即萎吐其芳以報所知不然人將曰相公誤甚此茅也乃謬以為蘭耶則蘭真負相公矣先生曰余歸甫一年日夜思所以報相公者不能得今子之言誠得我心矣可不思共勉哉良俊遂以其言書於先生入閩稿之巻端王履吉集序袁袠王履吉者名寵吳人也少負逸才愽渉墳籍沉精篇翰下筆綺辭壯思滔滔不休補郡學弟子員督學最其文試必首列然非其好也試於鄊輒弗利乃貢入太學北㳺燕趙魏觀廟朝制度與四方薦紳先生㳺上下其議論而文益竒歸而嘆曰夫神龍升于赤霄尺蠖伏于泥淖黄鵠一息千里而斥鷃終日不過蓬蒿此其志大小懸絶何如哉且夫屈伸者時也利鈍者命也夫儒者握寸管挾方牘而揚聲名於億載彼得志者曵紱垂朱髙爵豐禄以焜燿一時不知駒馳電㓕雲浮草腐後世無稱焉此與蠖鷃何異哉由是買田石湖之旁築室其上臨流賦詩盖窺古作者之奥而病作矣乃養痾於虞山之白雀寺洩其精於聲詩而病乃大作歸不逾月竟卒卒之前一日夢兩蝴蝶入袖寤而歎曰吾殆已矣夫莊叟之言殆謂吾也嗟乎亦異矣履吉詩初宗李白既乃宗杜故其詩才力雄闊辭篇麗贍去輕靡而就沉著畧鋪綴而尚陶鎔及白雀集諸篇則又興寄冲𤣥思調清逸遂窺陶謝之堂幾入王孟之室矣惜乎天抑其進有志未就故所著僅此然亦足傳矣憶與履吉啣杯論文窮夜達旦謂古人之庶幾大雅可作而竟已矣獨恨夫天之忌才不少假也昔魏之文考唐之勃賀咸以才天近代如姑蘇徐禎卿信陽何景眀沁水常倫閩鄭善夫亦不享年何天之忌才若斯邪豈天既畀之才乃奪之年邪嗟乎履吉古之稱不朽者不以年也又何憾焉唐伯虎集序袁袠唐伯虎集二巻樂府詩總三十二首賦二首雜文一十五首内金粉福地賦闕不傳唐伯虎者名寅初字伯虎後乃更字子畏吳人也少有雋材性豪宕不羈家貧不問産業好古文辭與京兆祝公允眀愽士徐公禎卿内翰文公徴眀相友善而尤工四六藻思麗逸翩翩有竒氣然行實放曠人未之竒也嘗上書吳文定公寛覽書曰吳安得有此人邪頗為延譽公卿間而提學御史方誌惡其不檢將黜之比試大學士梁公儲讀其文驚嘆以為異材遂薦第一由是聲稱籍甚㑹試禮部衆擬伯虎復當首選伯虎亦自負江隂徐經者通賄考官程公敏政家人得其節目以示伯虎且倩代草文字事露逮錦衣衛獄掠問亡狀先是梁公奉使外夷伯虎嘗持束帛乞程公文送之竟以此論發為吏恥不就免歸文徴眀以書慰之伯虎答書自眀文多載集中乃後益自放廢縱酒落魄所著多不經思語殊俚淺人或規之伯虎曰夫太上立徳其次立功其次立言寅遭青蠅之口而䝉白璧之玷為世所棄雖有顔冉之行終無以取信於人而䕫龍之業亦何以自致徒欲垂空言傳不朽吾恐子雲劇秦蔡邕附卓李白永王之累子厚叔文之譏徒資嗤辱而已且人生貴適志何用劌心鏤骨以空言自苦乎宸濠之謀逆欲招致四方材名之士乃遣人以厚幣招伯虎堅辭不可至則隂知將有淮南之謀遂佯狂以酒自汙宸濠曰唐生妄庸人耳乃放歸得免於難過富春渚想子陵之風慷慨悲歌徘徊者久之築室桃花塢中讀書灌園家無擔石而客長滿坐風流文采照映江左外若奢汰而中慕沉𤣥勤究内典旁精繪事袠童時嘗獲侍髙論接杯酒之歡哲人已逺九原不作撫誦遺文慨仰遐烈爰加蒐摭庻存梗㮣云爾附復大中丞顧公書袁袠辱寄題列岫樓詩駭心震目如聆鈞天廣奏茅簷草屋何以堪此烟霞増妍山水動色茲樓之名天壤不敝矣所云唐伯虎集序欲為賢者諱仰見吾丈忠厚之至但叙事之體必須核實尼父以來未之敢違也假令吾文欲為伯虎諱千載而下誰其信之昔文皇觀史叙隠大子事云史官何諱焉即命削去浮詞直書其事千古以為美談伯虎誠過亦未有喋血推刃得罪倫教者也吾丈髙眀何乃爾邪前示伯虎有連珠廣志賦實未見當續梓之僕頃亦作連珠三十首請教冀評削無庸虚美也袠再拜敬復明文海巻二百四十四
