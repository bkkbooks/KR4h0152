body:
  text: 明文海卷二百四十五餘姚黃宗羲編序三十六文集東溪遺稿序陳昌積東溪陳公既沒之二十年其子少府瀚始迹其遺稿得奏疏詩賦論説記序若干篇裒輯為三卷公第𢎞治丙辰進士由翰林庶吉士授吏科給事中連上疏言事首發士風頺靡儲畜空虛職務怠弛武備踈略之四弊而次及於四方之災異三邉之警報塞幸源以存大體皆若有助於去繳繞而起因循之政亦幸得其言矣蓋是時孝皇恭儉惠下而容藎言大臣修亷守法而畏清議一時司言責之士往往科條所知以獻而俟其廢置寧為抗鯁以報職弗欲循默而自養非獨公為然也然其時號為小康學士仁人恆舉農功不擾歲時登邊將無功吏不能之詩為孝皇頌蓋比之慶厯之盛焉公之疏乃指漸釀罔容之敝倪撮漂影未熾之咎涯形在列靡隨之隱尚即人主之慌忽而乏明徵者以恐喜其耳目其不滋惑而搖其據循乎疑公者率謂其有所挾恃眩曜并塞職事而然豫也生晚而未見公實未知公當時置議之心果何如也然竊觀往昔深謀廊廟之純臣慮逺望奢每忘其可恃之明主與其一身之利害欲國家長利而無害是以言乎其身之所及而遂觀其身之所未及擲乎其事之所已兆而豫陳其事之有朕而未兆蓋其覩也非侊佯儻蕩以見謂明而其鯁諤豫陳也亦非快其論説氣勢之所及直行其心之所不容已而已賈生發流涕太息痛哭之諌於文帝之朝宋儒譏其徒使文帝私檢省其身無是過咎推而察於時故又無左驗遂迂生之言而不用至踈斥齟齬終其身生自貽之戚也然詎知去生不再世而諸侯強大發難於七國幾莫之支又不再世盡天下之輜重兵賦以事丐奴覆車掃輪者凡幾僅得名王大人劉屈氂公孫賀之相踵腰戮趙蓋楊韓之不得其死生之料其所未及而豫陳其未朕兆之事竟若持舊劵而合逺符其禍比可痛哭者為熾生之言可不謂深且長乎嗟夫言而不中任言責者之幸也今不幸而中者多矣善則稱君人臣之心也彼得其言而蒙賞與不得其言而罹譴者又豈臣之願有於身哉生之後賈嘉以生故得侯向令生有知吾知其必洶洶焉更太息而痛哭何者非其心也東溪公立諌風采余實未知固不敢以臆説為序然豫每喜談孝皇朝事曩在壬午得侍中丞石峯陳公語及其丙辰同年之為庶吉士者獨舉陶南川先生與公兩人能攻苦力文及任諌垣抵掌蒿目而談天下之利病務盡發其腎腸惟恐一之媕妸而自負遭逢南川竟以忤權璫謪戍東溪尋亦捐館矣豫知石峯素不為浮諾者以是知公之奏議雖不禆益當時要之非盡出於挾恃塞職而然而我孝皇作人之盛則天下同長養也公序記賦詞論説皆當時體故略而不敘云杜少陵集序王雲鳳晦翁論君子光明正大踈暢洞達磊磊落落無纖芥可疑以杜子美與諸葛顔韓范公并稱四君子者皆有功業覩記在當時誦説在後世真如青天白日如髙山大川如雷霆雨露龍虎鸞鳳者而子美不過一窮餓人耳稱之者曰詩史而已曰文章光焰萬丈而已曰詩人以來未有如子美而已曰詩至子美天下之能事畢而已安在其並於四君子也曰安在其不並於四君子也富貴不能淫貧賤不能移威武不能屈此君子立身之本謂之大節大節不立萬事皆頽縱有功業為世倚賴不過權謀術數塞漏補罅於一時者耳非君子體用之學也子美為拾遺以救房琯失官為嚴武參謀又棄官寓鄜而嬰孺餓死客秦而採拾自給奔陷賊中挺然不汚嚴武欲殺泰然不懼是豈以富貴貧賤威武動其心者哉是豈有一毫之疑者哉此五君子之所同也大節既同則其事業之顯與不顯在所遇之亨屯時之用與不用耳何病於子美哉况子美以稷契自許而憂國憂民之意十詩而九使得行其志其功業豈下四君子哉但論者謂子美文不如詩夔州以後詩不如前以豫觀之子美其氣厚故其文簡奧渾健不事藻飾唐人一二大家外皆鮮能及夔州後詩則晦翁所謂晚年橫逸不可當者或以為勝於前則又不敢信也若封西嶽賦未免惑於封禪之説則司馬氏以來諸賢之通弊非可獨誚子美也廣平太守張侯用昭以子美集刻者雖多然或以所至之地為類或以所命之題為類觀者卒難得其各體之全其釋事釋文補遺補注諸書則收載紛哤未易尋省乃以詩體分為八為子美作者附録詩後文又附其後盡去其注為卷十每卷各著其目於首判府宋君孟清實訂訛焉子美集斯明白矣用昭求序於余余以子美之詩不待贊也故獨舉其大節使世知子美詩之傳愈久而愈為人所寶愛殆將與天壤俱弊者有由然也用昭名潛岷州人英爽精敏作郡有餘力以及文事孟清名灝則吾邦之博能士也抄代集小序徐渭古人為文章鮮有代人者蓋能文者非顯則隱顯者貴求之不得况令其代隱者髙得之無由亦安能使之代渭於文不幸若馬耕耳而處於不顯不隱之間故人得而代之在渭亦不能避其代又今制用時義以故業舉得官者類不為古文詞即有為之者而其所送贈賀啓之禮乃百倍於古其勢不得不取諸代而代者必士之微而非隱者也故於代可以觀人可以考世抄小集自序失名山雞自愛其羽每臨水照影甚至眩溺死弗顧孔雀亦自愛其尾每棲必先擇置尾處人取其尾者挾刃匿叢篁伺其過急斷之少遲忽一回視則金翠光色盡殞此豈其靳惜之意專致通於神故人不能奪其所愛而必還之於既去耶此其於麝抉臍蛇剖珠又稍殊異矣余夙學為古文詞晚被少保胡公檄作鹿表已乃百辭而百縻往來幕中者五年卒以此無聊變起閨閣遂下獄諸所戀悉捐矣而猶購録其餘稿於散亡并所嘗代公若代人者詩若文為篇者若干蓋所謂死且勿顧奪其所愛而還之於既去於孔雀山雞何異耶昌黎為時宰作賀白龜表詞近讇附及諌佛骨則直處地然耳人其可以概視哉故余不掩其所代於公於人者雖然自妄羽之而復自妄尾之安能保人之必羽之而必尾之耶誠如是則吾之購之録之也其不見笑於山雞孔雀也幾希矣孫山甫集序任瀚嘉靖初五星聚東壁明德中興海內文章道術至是隆盛閲四十年來摛菁掞藻之家朝野相望淮海孫山甫以辭翰起家黔中入史館遷諌議大夫上命督學關西善作士與邃菴漁石齊名甲子春移鎮劍南始按部訪余江門釣臺余逃空谷久見君􅈺雅藴藉栩栩若平生歡明日從事來齎所得南遊以後諸體詩五百餘相印可余掃石披雲一再讀歎曰吳大帝之後散亡列國若淮海者其詩蔚然有江左風流其雋永閎鬯自鮑謝諸人不能過也始吾讀李獻吉詩謂如媧皇搗錬補天石奔走百靈雷電日月星辰並躔爐冶讀何仲默詩如黃鍾在縣金石發作伶坊供奉之官莫不按宫商謹節奏其橫放處如項羽提三尺劍出江東不必斬將搴旗而登壇嘯吒千人皆廢讀張愈光詩如巨靈擘太華黃魔太翳決瞿唐其險怪詰屈雖不中繩墨定知出鬼神手而無斧鑿痕今吾讀山甫詩則如七十二君封泰山望見滄海有無中蜃氣樓閣盤薄煙霏景光萬狀便翛然起仙靈霞外之思如君兹選當與髙子業顧華玉格力相埒誠足銼建安鋒劘六朝壘惜二君已宿草不及見也吾聞龍噓氣成雲雲之靈龍馮之然龍非雲之所能使為神物也人噓氣成聲聲之精者為詩人豈詩所能使為聖賢君子者哉語曰明珠彈於飛肉其得不復周鼎鑄倕而齕其指明大巧之不可常也淮海固欲為聖賢君子者其神明內藴思若懸河吾􅘨其或嘗試於大巧也故以是節之禺山文敘任瀚張愈光聲華籍籍在海內四十年今老矣猶窮竒極詭傲睨一世其言六籍已後無文章檀弓柏梁之間惜時代晚莫爾於壯士哉吾觀其道在空洞箕山志在湘纍其憂患離罪衰白而近於死其事在江夏然猶其所述稱多閎烈曠逺不為怨憤悽惋之辭而能使吾讀之如據松梧臨萬壑聽哀瀑奔溜虎豹狷狖百怪之音冷然也將韓愈所謂鳴乎其善鳴者與人言宋不唐唐不漢漢不春秋戰國猶之江河之不可挽而之山也傷時代爾爾乃吾見愈光呻其文辭不敢問其人豈暇信其生乎東西京之後也文章無古今安有時代孔子孟軻衰周老儒生也不聞其所為文降於夏商而願出伊尹仲虺伯夷栁下惠諸君子之上此何以明焉其人聖則其文為經其人賢則其文為史不賢且聖則其文野凡古之落莫而不顯於今與今之勤苦而不傳於後者直野人語耳安罪時代哉吾觀愈光為文似程子華詩似李白其學古而進於賢聖即吾不知其所似其不為野人焉勤苦而不傳於後也決矣何曰歸昆明見新都太史為吊其窮而以吾言問之東泉文集敘張嶽東泉先生姚公𢎞治正德中文章為一時所推而不以文士自命乙亥冬某侍公於閩藩講問之暇頗及文字公曰文非專不工然學者所當為事尚多奚必専於其文哉語既又顧某曰子他日當别有所就亦不必滯心於此某戄然不敢卒請退而私記於心者三十餘年矣中間蹤迹浮沉無由再侍公教而尺書臨示敦勉每加庚子秋參政浙江公墓木已拱嗣子學士惟東繼喪家遭回祿索遺稿於仲氏汲散逸無完編蓋為䀌然霣涕焉乃屬公壻吾同年湖廣憲副王君時化收拾彚次越六年丙午寄至蒼梧又閲督撫故牘得其總制時奏疏文移數篇合為巨帙請戶部郎桂山馮君世立讎校得可傳者一百五十餘篇分為八卷公雖不以是自命其閎傑正大之氣練達綜核之才鬱然溢於筆墨間如洪鍾大吕竲竑震亮徐而觀之其紓疾開闔抑揚俯仰又莫不中乎節奏所謂實大而聲自宏者歟非苟言也古之君子自丙魏姚宋至韓富諸公非無文章也功烈懋盛故不以文章稱然其奏篇之流傳至今者舂容深切亦非一時能言之士所及公蚤負經濟大略視古人為何如中頗偃蹇晚乃遭際由中臺出握邊符屢奏膚功工堯之捷崑崙關後僅一再見而媢嫉朋比震驚聽聞賴天子明聖察孤忠於群誣之中始終保全最後起臨三邊駸駸大用而鑿枘齟齬竟不能盡合而歸功烈既不能如古人之盛其文章可傳者又止此有志之士所以為公感歎發憤而不能自已也雖然中世卿大夫於其去就之際能完粹無議者鮮矣不合而去不足為病所病或合不以道至無以潔其去為可愧耳則公之用盡與不盡亦安能為公損益耶某少以文字受知於公而公所以知之又有出於文字之外者老大無似未能副公拳拳期豫之意往叨廣西提學及今督撫皆繼公舊迹於公條章約束又未能一一有以推行俯仰深恩大懼墜失惟有論次學術事業及所遺文字以時傳布庶後之尚論公者有以髣佛其閎傑正大練達綜核之實不肖於感慕之餘時取以自厲則亦不為無補焉嗚呼是亦可慨也夫集後附桂林南寧生祠二記記中已有者兹不復出云項思堯文集序歸有光永嘉項思堯與余遇京師出所為詩文若干卷使余序之思堯懷竒未試而志於古之文其為書可傳誦也蓋今世之所謂文者難言矣未始為古人之學而茍得一二妄庸人為之巨子爭附和之以詆排前人韓文公云李杜文章在光焰萬丈長不知羣兒愚那用故謗傷蚍蜉撼大樹可笑不自量文章至於宋元諸名家其力足以追數千載之上而與之頡頏而世直以蚍蜉撼之可悲也無乃一二妄庸人為之巨子以倡道之歟思堯之文固無俟於余言顧今之為思堯者少而知思堯者尤少余謂文章天地之元氣得之者直與天地同流雖彼之權足以榮辱毁譽於人而不能以與於吾文章之事而為文章者亦不能自制其榮辱毁譽之機於已兩者背戾而不一也久矣故人知之過於吾所自知者不能自得也已知之過於人之所知其為自得也方且追古人於數千載之上矣太音之聲何期於折揚皇華之一笑吾與思堯言自得之道如此思堯果以為然其造於古也必逺矣戴楚望集序歸有光世宗皇帝自郢入繼大統戴楚望以王家從來授錦衣衛千户其後稍遷至衛僉事嘗典詔獄當是時廷臣以言事忤旨鞫繫者先後十數人楚望親視食飲湯藥衣被常保護之故少瘦死者其後往往更赦得出如聶文蔚以兵書被係楚望更從受書獄中以故中朝士大夫籍籍稱其賢嘉靖四十四年豫中第居京師楚望數見過示以所為詩其論欲逺追漢魏以近代不足為豫益異之豫既調官浙西遂與楚望别隆慶二年春朝京師楚望之子樞裒其平生所為文百卷謁余為序蓋楚望之於道勤矣始楚望先識增城湛元明是時年甚少已有志於求道既而師事泰和歐陽崇一聶文蔚至如安城鄒謙之吉水羅逹夫未嘗識面而以書相答問及其所交親者則毗陵唐應德太平周順之富平楊子備並一時海內有道髙明之士豫讀其所往來書大抵從陽明之學至於往復論難必期於自得非茍為名者噫道之難言久矣有如前楚望所為師友皆以卓然自立於世而楚望更與往來上下其議論則楚望之自立者可知矣豫之初識楚望特謂其典詔獄為國家保護善人以為武臣之慕義者也及稍與之親觀其論詩欲上追古作者乂以為學士大夫之好文者也蓋不知楚望之於道如此昔魏舒為將軍鍾育長史育每與參佐射舒常為畫籌一日令舒備偶育初不知其善射而舒容止間雅發無不中育歎曰吾之不足以盡君才如此射矣楚望之初不以語豫者豈其不欲以自見歟何豫知之之晚歟抑以豫之不及於此歟豫與諸公生同時間亦頗相聞顧平日不知所以自信嘗誦易曰神而明之存乎其人默而成之不言而信存乎德行老子曰多言數窮不如守中故黯黯以居未敢列於當世儒者之林以親就而求正之又怪孟子與荀卿同時而終身不相遇今而楚望之所與遊一時零謝盡矣此豫之所為恨而羡楚望之獲交於諸公間也因讀其集慨然太息而歸之唐荆川文集序王慎中吳之有文學舊矣諸樊為國斷髮之治未變蓋方甚陋而公子札已能盡通易詩書禮樂六藝之文以觀於中國則名卿碩士有愧於其所知恱其説之博雅而慕之如不及孔子教於洙泗來四方之學者則言偃踰江蹈淮而往遊焉卒以文學列於大賢之科南方之精華為之盡發而孔氏之道資其言之有文以行於逺至於今為烈蓋其盛如此畫長江大湖以為國方地千餘里林麓川澤之美殆不可數而光英沖粹之所漸涵磅礴於其間二人而已雖其甚盛而亦豈非難哉吾於二人讀其書觀其言尚而友之而庶幾知其人於今所見而及與之為友又得一人焉毗陵唐應德也君於學蓋所謂得其精華其於言可謂有文而必行於逺者也其文具在學者茍讀焉而思思焉而有以得之則知其心之所通於季札孰為淺深言之所成於子遊孰為先後有不可得而辨者矣君仕為翰林編修復為太子司諌皆以守道直已之志棄去不啻敝蓰有吳公子輕千乘之國之節其文之以禮樂得言氏之傳而亷隅操行必謹於一介之取豫剛果自斷不可以威武利祿誘屈也尤足以闢夫偷懦憚事無亷恥而嗜飲食之誚上下二千有餘歲之間吾謂吳有文學三人焉不為過也季札之生其國雖尚陋然先君端季之遺教猶存而子遊得仲尼為之依歸其成此非難也唐君獨起於千載之後追二人者而與之並豈不為尤難哉君行年四十其學將進而不止其為文將日益富而且精豫之所見如此已可傳也無錫安生如石子介慕君之學得其所為詩文彚而刻之以與同好者共安生之趣尚如此豈凡人之所及哉曽南豐文集序王愼中無錫安生如石刻南豐曽氏文粹成屬愼中為序而重以武進唐太史順之同安洪郎中朝選二君之書以勉焉豫惟曽氏之文至矣當其時王震序之已無能有益於發明晚宋及元序者頗多而其言愈下豫何敢任焉唐君以文名世洪君與之上下其學文亦日有名而二君見勉之勤如此豈有他哉亦慨斯文既墜而欲明其説於世也故不揆而序之曰極盛之世學術明於人人風俗一出乎道德而文行於其間自銘器賦物聘好贈處答問辨説之所撰述與夫陳謨矢訓作命敷誥施於君臣政事之際自閨詠巷謡託興蟲鳥極命草木之詩與夫作為雅頌奏之郊廟朝廷薦告盛美諷諭監戒以為右神明動民物之用其小大雖殊其本於學術而足以發揮乎道德其意未嘗異也士生其時蓋未有不能為言其才或不能有以言而於人之能言固未嘗不能知其意文之行於其時為通志成務賢不肖愚知共有之能而不為專長一人獨名一家之具噫何其盛也周衰學廢能言之士始出於才由其言以考於道德則有所不至故或駁焉而不醇或典焉而不該其背而違之者又多有焉以彼生於衰世各以其所見為學蔽於其所尚溺於其所習不能正反而旁通然發而為文皆以道其中之所欲言非掠取於外藻飾而離其本者故其蔽溺之情亦不能掩於詞而不醇不該之病所由以見而蕩然無所可尚未有所習者徒以其魁博誕縱之力攘竊於外其文亦且怪竒瑰美足以誇駭世之耳目道德之意不能入焉而果於叛去以其非出於中之所欲言則亦無可見之情而何足以議於醇駁該曲之際由三代以降士之能為文莫盛於西漢徒取之於外而足以悅世之耳目者枚乘公孫𢎞嚴助朱買臣谷永司馬相如之屬而相如為之尤能道其中之所欲言而不免於蔽者賈誼董仲舒司焉遷劉向揚雄之屬而雄其最也於是之時豈獨學失其統而不能一哉文之不一其患若此其不能為言者既莫之能知由其不知之衆則為之而能者又益以鮮矣四海之廣千載之久生人之多而專其所長以自名其家者於其間數人而已道德之意猶因以載焉而傳於不泯雖其專長而獨名為有愧於盛世既衰之後士之能此豈不難哉由西漢而下莫盛於有宋慶厯嘉祐之間而傑然自名其家者南豐曽氏也觀其書知其於為文良有意乎折衷諸子之同異會通於聖人之旨以反溺去蔽而思出於道德信乎能道其中之所欲言而不醇不該之弊亦已少矣視古之能言庶幾無愧非徒賢於後世之士而巳推其所行之逺宜與詩書之作者並天地無窮而與之俱久然至於今日知好之者已鮮是可慨也蓋此道不明士之才庶可以有言矣而病於法之難入困於義之難精決焉而放於妄以苟自便而幸人之相與為惑其才不足以有言則愧其不能矯為之説誣焉以自髙而掩其不能之愧以為是不足為也其弊於今為甚則是書尤不可不章顯於時顧豫之陋安能使人人知好之而序之云然蓋以致豫之所感焉耳書水西集唐順之華師魯刻其父水西君所為詩文凡八卷曩余與君同在兵曹而君為職方郎是時西北邊數被寇職方頗號多事君據案草奏或一日四五上莫不切中機宜每赤囊才入尚書立召問君君口對甚辨無留滯者於是遂以才稱頃之君坐言者所中免官家居而余時亦罷歸每嘗候君則見君悄然獨閉一室盡取古儒先所疏注箋纂六經文字凡百餘家精髓糟粕咸在所謂纍世不能殫其説者君獨悉力標駁參伍毫釐同異要於融而聨之以上究六經之旨而成一家之説若小戴書則既有端緒矣未幾而遂卒自君居劇曹與家居治經亦時以餘力作為詩文蓋君為人徑挺有精力其志甚鋭而用心最苦其試於世則欲以才具功名自振即使枯稿山澤亦欲自託於經術以蘄於後世有知我者詩文雖贍切可喜然要非君志之所存也顧其才既遭抑塞而經術所著述亦未克就是以其所志者若或靳之而泯焉無傳其非志之所存者獨尚足以傳於世若此余恐讀是編者以為是足以盡君也故為發君之平生雖然昔人謂容貌祿位不能動人人安肯傳其書然則書之傳者亦往往祿位能動人者也即如世所傳經注百餘家者雖其山澤之儒祿位不顯則以附於六經與之並行而人不能廢之舍是而傳焉者寡矣君既不得顯於功名而又不及託於經術彼其泯焉無傳者則既已矣其所謂足傳於世者亦焉可知其何如也哉此余所以重悲君之志而為之言者冀後世有因余言而知君者也董中峯文集序唐順之喉中以轉氣管中以轉聲氣有湮而復暢聲有歇而復宣闔之以助開尾之以引首此皆發於天機之自然而凡為樂者莫不能然也最善為樂者則不然其妙常在於喉管之交而其用常潛乎聲氣之表氣轉於氣之未湮是以湮暢百變而常若一氣聲轉於聲之未歇是以歇宣萬殊而常若一聲使喉管聲氣融而為一而莫可以窺蓋其機微矣然而其聲與氣之必有所轉而所謂開闔首尾之節凡為樂者莫不皆然者則不容異也使不轉氣與聲則何以為樂使其轉氣與聲而可以窺也則樂何以為神有賤工者見夫善為樂者之若無所轉而以為果無所轉也於是直其氣與聲而出之戞戞然一往而不復是擊腐木濕鼓之音也言文者何以異此漢以前之文未嘗無法而未嘗有法法寓於無法之中故其為法也密而不可窺唐與近代之文不能無法而能毫釐不失乎法以有法為法故其為法也嚴而不可犯密則疑於無所謂法嚴則疑於有法而可窺然而文之必有法出乎自然而不可易者則不容異也且夫不能有法而何以議於無法有人焉見夫漢以前之文疑於無法而以為果無法也於是率然而出之決裂以為體餖飣以為詞盡去自古以來開闔首尾經緯錯綜之法而一種臃腫侰澀浮蕩之文其氣離而不屬其聲離而不節其意卑其語澀以為秦與漢之文如是也豈不猶腐木濕鼓之音而且詫曰吾之樂合乎神嗚呼今之言秦與漢者紛紛是矣知其果秦乎漢乎否也中峯先生之文未嘗言秦與漢而能盡其才之所近其守繩墨謹而不肆時出新意於繩墨之餘蓋其所自得而未嘗離乎法其記與序文章家所謂法之甚嚴者先生尤長先生在翰林三十餘年嘗有聞於𢎞治以前諸先輩老儒而潛思以至之故其所為若此然今之為先生之文者蓋少其知先生之文而好之者又少矣先生之子近思將刻集以傳而請序於余近思豈亦以為世之言秦與漢者未必能知先生之文而余之愚陋稍知之也晉江王道思平涼趙景仁其文在一時文人中最有法皆先生丙戌為考官時所取士近思試以先生之文與吾言質之其必有合乎否也前後入蜀稿序唐順之山澤好竒之士往往以極幽遐詭譎之觀博搜山川草木鳥獸變化之情狀為快然其耳目有所滯而不能遍於是有側身四望之思宦遊羈旅之士其力足以窮懸車束馬之徑凌跕鳶挂猱之阻然其情志有所纍而不能遣於是有懷鄉去國之憂情志與耳目常相違而山川之與人常不相值惟蜀僻在西垂古所謂别為乾坤者也雪嶺大江之雄渾峩巫青城之窈麗仙靈之所窟宅其勝甲於天下然陸則拒以飛崖斷棧水則陋以驚江急峽鬭雷霆而翳日月其險且逺亦甲於天下自古好竒之士慕其勝而以其險逺不能至於是有夢而遊寤而嘆焉者自非宦遊與羈旅終其身無因而一至焉其至者怵於險而忘其為勝於是羈臣遷客之思深而輕舉冥搜之好移變衰搖落之感生而雄渾窈麗之觀改蓋昔人所賦側身西望阻岷峨者既足以著山澤好竒繾綣顧慕不能自遂之情而其所記峽州至喜堂者亦足以盡宦遊羈旅憔悴無聊不能自遣之狀夫雖幸為耳目之所接而奪於情志之所不快與雖幸為情志之所快而限於耳目之所不接其耳目所不接者既不能使景就乎情而工為鑿空揣懸之言其情志之所不快者又不能使情就乎景而泄其和平要眇之音於是大夫缺於登髙能賦之義而騷人竒士縱欲原本山川極命草木亦無所慿焉以聚其精而發其辨博噫嘻此春山公前後入蜀稿所以為可諷也公自郎官出為郡守自郡守遷按察副使先後皆在蜀其為郡守也於重慶蓋陸走棧水浮峽而後至中州之人所謂險且逺其為副使也於建昌則在靈關大渡瘴雨蠻煙之外雖蜀人亦素憚以為險且逺者而公皆恬然安之政事之暇方且披巉巖踐霜雪穿猩鼯豺虎之窟俯江妃水仙之宫以窮其勝而猶若未足故其險無所不涉則其勝無所不窮其所歷與所窮一切可愕可喜則無不見之乎詩蓋其大者關政理謡俗之故其細者足以牢籠百物山川草木鳥獸變化之情狀其敘險也既可以使人欷歔慘栗而如墮其敘勝也又可以使人颯爽飛動而如躋向非公以其宦遊旅寓之迹而兼乎山澤竒士之好情志之所快與耳目之所接適然遇合固不能摹而寫之若是公詩既刻為二卷其子於德請序於余余以謂使好竒之士讀公之詩可以不俟涉險而坐窮其勝於庭户燕間之間宦遊羈旅之士讀公之詩且將悅乎其勝而忘乎其險頓然釋志於驚江絶棧之上也然則不能自遂與不能自遣者皆將於公之詩乎有得也余山澤人也蓋慕蜀而不能至者亦將於公之詩乎有得也遂不辭而序之明文海卷二百四十五
