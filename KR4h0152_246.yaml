body:
  text: 明文海卷二百四十六餘姚黃宗羲編序三十七文集成仁遺稿序舒芬豫行篋有文山指南集二册集杜句一册吟嘯集一册又有疊山詩文集二册歲久壞爛亦多磨滅病中敬補綴之以是集皆行乎患難臨大節而不可奪者乃復訂其訛脫而宋史本傳與夫祠記銘狀祭文挽詩則取而合附于後總題曰成仁遺稿付書林余氏刻之嗚呼仁之難成久矣孔子曰朝聞道夕死可矣自非果聞道者烏能殺身以成仁哉二先生之所成仁夫人能言之矣然有繫于救敗存亡興滅繼絶世或未之知也乙亥文山以勤王兵入衛即議建四鎮以却大敵執政者不從明年知臨安請徙封二王鎮閩廣以圗興復執政者又不從及元兵壓境始行其言則宋之亡而未絶者有二王也故雖國事既去猶足以延宋祀三載向使從其四鎮之議而舉國以聽命焉則所救敗存亡必有以大過孔明而嫓休臣靡者矣疊山得守信州大結民兵捍庇饒撫隱然一長城也比敵退執政者欲假軍費罪之何邪明年敵下安仁攻信州人遂不守則先生變姓名以去之宜矣雖其才略有非文山比者然十年之久猶拳拳以武王太公之興滅繼絶望仕元之故臣是其一念不能釋宋之仁豈有異于文山哉嗚呼使文山之忠信于前則宋之祚未必移也使疊山之志伸于後則宋之祀未必廢也然則二先生所得於道者不其有以勝天乎哉一死以成仁固不足為先生多雖然宋亡而文山幽于燕者三年元人感其忠誠將釋之留夢炎曰天祥出復號召江南豪傑置吾十人于何地夫天祥毁家以紓國難身九死而不顧若十人者安知其終不死邪疊山匿于建寧者十年元人亦屢詔釋江南有罪人矣留夢炎程文海力薦而執之至燕夫枋得一也前日共擯之于宋而今日交薦之于元何邪是亡宋者固宋之宰相也非元也殺二先生者亦宋之宰相也非元也不知宋之諸君亦何負于宰相也哉錢臨江集序彭輅余髫髮辭劍負即知海上有東畬錢先生者則起家開先人也先生以閎學邃源傳其子永州守芹儀部郎萱暨從子給事中薇並輝曄為時聞人而少子蘥蓘相繼舒翹吐頴載世美而起均所謂鳯毛也先生以戊辰進士宰旴𣅿當劇盜劉七擬驅衆度淮先生畫䇿效死守後為南曹郎事武宗上回鑾之疏天下欽其剴直已而守臨江惠政貽迹甚夥民到于今思之夫何以功能召嫉則思南之命下而懸車請老矣先生有意于風騷述作之業在郎署蔚然著稱晚而遵晦家園益鬯其藴於觚槧所著寖富積以成帙一日蘥手遺草見示語余曰蘥懼先君子之盛懿湮泯無傳子盍為我序而傳之余自解褐得交于永州君且誦法先生之所結撰甚深乃不謝而引其盲瞶云竊窺先生之文溫潤而栗概類韓歐而體莊意讜中苞時用闡學權政依孝凖忠昌黎子所稱藹如者幾是乎乃其詩舂容馴雅句每天成彬彬乎入唐人閫奧而上窺魏晉之間矣然文之規裁粲粲披之易曉兹可無眇論第論其詩詩固虛虛玄玄物也意興託之乎言而風翩影閃言不能罄又音殊節異人自為家頃者詩學充衍瀰匝宇內逖陳鄙社競述唐與六代各耀已之長而訾其所不學堅白矛盾孰知烏之雌雄余恐知先生者之希也老子曰知我希則貴矣先生既以唐為歸宿大致得之少陵彼膚學淺目一泥百廢不知作者用心自有門庭杼軸不涉孟浪也矧詩之道浩浩淵哉譬之溟渤無窮羣而飲者才取其涓勺惡得以同乎已者為是而異已者之遽非耶仰而遡之國風小雅古瑟之音莖露之味漢所遺也漢樂府鐃歌遒詞壯節古選不琢而文顯易而逺晉宋所乏也晉宋之淡冷齊梁所捐也齊梁之婉逸唐初所亡也麟德神龍風神之俊天寶大厯易以飛動而凡開元天寶意象之渾建中元和移以傾露而弱大厯建中思致之徹會昌咸通更以煆削而靡大都後之視前技巧日益前之視後渾沌漸銷夀陵之步非復邯鄲故迹而醇疵髙下諸種亦各有之登壇之士安所置取舍其間鄙意則謂詩之原昉於喜之歌咢悲之呻號怨之訴憤思之寄愴故惟出諸性情而剖瀝肝腑使人聞之而渢渢融融感動者為真不爾即橫厲髙騁為唐初為盛唐為六朝猶然無益也而况乎其不果肖也先生之詩多由性情之發志存之而後言言永之而比節其固近真也已夫以性情入景色則景色皆性情以蕤彩輔氣骨則氣骨皆蕤彩故修辭之矩難朴而易華賤巧而貴拙以愚所明參先生當日之指何敢必之懸符要不至為郢人之譯燕書焉耳蘇門集序陳束嘉靖甲午冬束在史館時蘇門髙子業由晉陽入朝京師會都庭下明年束罷史職出簽湖湘憲事又明年丁酉子業由晉陽轉湖湘為觀察使從遊省署中纍兩月而束去行湖北子業乃病十餘日死矣嗟哉悲夫子業蓋嘗謂束曰余生平所嚮慕兩人後渠崔子謂余文不如詩崆洞李子謂余書不如詩詩乃不如文矣宇內知交非子誰定吾言悲夫已矣子業既死之三月束乃收其遺言而敘之文有知者弗論論其詩序曰夫詩以微言通諷諭其教溫柔敦厚為主本不通于微不底于溫厚不可以言詩由三百篇迄于唐其指一也國朝以經義設科生詩道闕焉洪武初沿襲頗多纎詞時則髙楊為之冠成化以來海內和豫縉紳之聲喜為流易時則李謝為之宗及乎𢎞治文教大起學士輩出力振古風盡削凡調一變而為杜時則有李何為之倡嘉靖改元後生英秀稍稍厭棄更為初唐之體家相凌競斌斌盛矣夫意製各殊好賞互異亦其勢也然而作非神解傳同耳食得失之致亦略可言何則子美有振古之才故雜陳漢晉之詞而出入正變初唐襲隋梁之後是以風神初振而縟靡未刋今無其才而習其變則其聲粗厲而畔規不得其神而舉其詞則其聲闡緩而無當彼我異觀豈不更相笑也蘇門髙先生子業夙稟降嵩之精早契藏山之旨性鄰其庶學匪待興束髮就傅受知北郡李先生弱冠登朝亳州薛考功一見歎服五言示志遂忘形焉挹其𢎞麗之益異乎求聞通解之妙曽無先覺矣既雅見推重益自貴珍謝絶品流因心師古涉周秦之委源酌二京之精祕會晉餘潤契唐本宗每有屬綴佇興而就寧復罷閣不為淺易之談故其篇什往往直舉胸情刮抉浮華存之隱冥獨妙間曠合于風騷有應物之沖淡兼曲江之沉雅體孟王之清適具岑髙之悲壯詞質而腴興近而逺洋洋乎斯可謂之詩也其言滿萬其年三十有八悲夫先生雅性亢潔不喜凡庸雖迹在周行而情歡在野故其在讀書園諸作特超玄乘雖屢仕通顯非其素衷是以即事賦懷每有憂生之歎夫志士惜日達生玩世古今人情諒同斯揆矣詩凡三百一十首文五十一首共為八卷成一家之言刻之山堂傳諸其人重刻寓沅稿序蔡汝楠間嘗詫空同李公自敘與漢中張光世同榜事先是翰林西涯李公遺提學石淙楊公書曰今榜張濳冠乎楊答曰微夢陽光世濳豈在後哉三公果聨名魁秦省當時鑒材精諗若是主司竟得其人不其賢乎及汝楠備官楚郡得接提學三石喬公語及楚材公曰以詩冠楚省者必崇陽胡子也嘉靖己酉汝楠以鄉試職事充掌卷官因知內簾閲詩初擬第一後不果用又三年先御史今總督侍郎梅林胡公監臨楚試汝楠仍掌卷簾內外閲頗有次公謂汝楠曰薦士得如三石所舉始不負兹役因授內外所上詩卷俾翻閲之汝楠以第一卷進賀監臨公曰兹非其人哉公色喜且曰焉知非謾寧能于數千人中決一士為所素望後拆得之公益自慶不巳汝楠謂三石公先期梅林公臨事知我二溪胡公得非與空同所敘後先相符哉夫二溪爛然之文昭耀三楚按楚名公一時得之不啻味甘露而賞卿雲者汝楠得窺其微蓋由其神理然爾業文之士靡不以時好相徇見售為師比對起伏窮年綴襲幾于海內同風而東南為甚作者既異真材鑒者焉知得人第如宋學士所云精魄淪亡氣局荒靡澌焉弱卉汛乎緒風吁其敝已而猶或許為必售之文何哉二溪崛起楚中因其為文想見所韞殆力排陳言會其命脈師諸經以濬其根源裁史子以揚其波流浸培既久暢于所發神理先别而詞氣隨之者荆衡之間秀西南之真材也其遇名公庸有弗知乎抑又聞之荆楚之域名璧所鍾善辨璧者不于其形惟其色澤液滋津津焉徵其神藴然後裁為圭璋薦于明神鏤刻之巧模擬之似何重于璧也今文之善為比對起伏者玉之形也其用之彌章光輝莫遏者玉之神也以神之所為遇善用其神者鑒之斯謂神遇不然取士充額而兩不相值焉烏足以語奇覯而嫓盛傳也二溪薦魁又明年總督侍郎貞所馮公檄聘至沅辰沅間人爭誦其文欲令人挾一編刻其文沅中丙辰舉進士知我德清除音方至而汝楠即述故事以諷庠生及來未幾諸庠士以墩中弟子為介告豫曰二溪公文行之沅中何獨不使吾清溪同沅流乎將屬梓人盍敘之汝楠應之曰即非此舉雅欲敘楚事附之空同況公此來實為異數諸君既愛其文當為并道其文之所由願取則于真材勿售碔砆而崇刻畫是大有禆于吾庠也讀劉靜修文集浚谷經曰國有道其言足以興興者興起于位也以行道也國無道其默足以容容其身也非持祿茍容也楊雄美新文劉因渡江賦不可謂之默楊時許衡吳澄之貴顯不可謂之容孔子進以禮退以義于公山佛肸之召其欲往者救時之仁也其所以存心也既而卒不往者律已之嚴也其所衛道者也聖人度其仁之勢終莫可以致天下而其律已之嚴猶足以垂範于天下來世使天下後世之人仁雖不獲以濟時而義猶足以周身亦不害其為仁也是數子者不先嚴于律已而茍徇于濟時又以其既行不售之學而擬諸聖人欲往不往之心此其所以陷于不韙而不自知也與夫是數子者所謂學為聖人之道而荖焉者也世徒見其學聖人之道遂從而學之而不知其荖則其于聖人之道又益逺矣姦人知其有隙之可乘也遂以富貴利逹之實附之乎急于濟時之虛名以欺乎世而濟其私是乃治亂安危之所係非一人之進退是非而已也故辨之不可以不早五先生文粹序趙時春世之稱述傳記子史之家至博矣未有不以名號其書者不以名號其書而直稱之曰先生者惟濓溪周子洛程伯仲子秦張子閩朱子為然世以其學同歸于聖人後之學聖人者必由之而後入故並稱之曰五先生先生云者弟子尊師之稱也五先生亡矣天下之願為弟子者將無以致其力故必求之五先生之文文非所以學五先生也以為學五先生而未得故姑求五先生之文爾五先生之文其于世者博則世之不能為五先生而徒為五先生之文者必大亂真矣故五先生之文未有不粹者也而曰文粹者以别其亂真者耳夫聖人之道天道也學者未能合天道故求諸聖人未能得其所以為五先生故求之五先生之文夫自五先生之文以至天道安在其千萬而存一二哉求千萬于一二而又亂真者焉則其亡所得可知矣故始于學道終于無所得世乃譏之曰儒者博而寡要陋哉斯言惡知所以為儒哉孔子曰吾道一以貫之博學于文約之于禮孟子曰博學而詳説之將以反説約也故求五先生之道于其文者得其粹然者乃為約矣茍得其粹然者以為約則雖在斯文猶為衍也嗚呼欲求五先生之道者得斯義而推之庶幾其不為世俗之陋儒矣康太史集序趙時春武功康太史聲名滿宇宙間竟為人所排擠其猷為無由自見世特傳其詩文爾其人本豪邁不羈雄文巨作世稱所長云至于詩篇爾雅本質去雕世多未及異乎吾所聞矣嗚呼知其人誠未易也知其言亦豈易哉公以嘉靖庚子殘歲卒適時春免編修校書官辛丑二月初行抵武功以文哭之曰公之生也將以發關河閟祕之清輝其逝也于以還太華終南之元氣彼世之紛擾者曽何足為深計嗚呼文何足以知公而公之文亦豈易知哉三復公之集與哭公之文而又重悲之初公憤世不已知滋欲自放不為章句著作以求知于世然世之乞公文以求顯者益衆與人畢輒棄去故存者頗少賴太微張子盡裒諸交友乃克成集都御史東涯翁子始畀西安守六泉吳子鋟諸木夫世不能致公于顯位反欲因公之文以求顯其身已不試乃更取其所棄之空言而尊崇之人情賢不肖固相逺而士之遇不遇固自有命也乙巳冬吳子以刻本貽余讀其中則先子之墓志固已放失余既托吳子以附諸集因序以歸之使例求公之遺文世固有能藏公之文者而或不及乎梓或及乎梓矣而或非公立言之旨然則托空言以自見業有所難而因人之言以求顯者要亦不足恃也君子恃其自立者何如耳公之不修飾以求名而名自隨不為文以傳世而世自傳者其意或在于是歟嗚呼公其人傑也哉胡永之集序趙時春蒙溪丈人釋典謁之班遁于五陵之墟將謝紳纓以畎以漁力休而歌歌而成章歷閲滋久裒輯成集以示顓蒙野人野人駭而問焉曰此豈終南沃野倜儻淑瓌之英長河巨關蓄祕潏曠之氣假之于子子無所庸庸為歌章以暢其聲而有是與曰然曰子何不賡明良矢卷阿陳車攻賦柏梁等比于雲咸章韶之音以鴻皇猷而宣大雅乎曰唯唯否否曰夫華祝楚狂擊壤擊磬其情之歡悲相懸而其音寥然希也子曷以兼而有之而復若是之密且富與將運數之升降難窮物理之長短弗齊子亦莫知其所以然而然與野人昔者追欽丈人之風仰探逹者之閾矣夫雷砰電激雲霧暝迷而戞然不已者司晨之節也大風鍧于萬仞而斥鷃歡呼于蒿下偃之不畏揠搖之不可奪已霜霰坌集萬植摧落羣動歸藏蛟龍蟄于重淵而蟋蟀為牀下之鳴以夜繼晝弗休也王公閣幃薰灼擲撲弗避也雖或尼之必或續之雖能却之必固生之是非莫知其所以然而然與夫莫知其所以然而然者雖天亦莫為之所也而況于人能為之乎洪鍾璈絃金聲玉振孤竹之管宇文之鐸劍閣之鈴山陽之笛師涓之清角蒙古之襄陽炮雖妍􅑦殊途其響調震越絶世驚人至矣而今安在哉將人成之人廢之有不足恃者與若然則不因人而成不因人而廢者此其道或可久而吾與子之所共保者其有在于是與丈人輾然而作曰有是哉遂書之為蒙溪集序玉芝樓稿序陳堯唐以詩選士世謂之唐詩士大夫以為詩不唐不工也相與鎔章繢句證體諧音畢其志力以庶幾乎作者之林乃後世寂寥無唐詩即有之亦僅僅數人焉何其難也今天下罷詞賦之科以經術選士然今之經術非若載籍所紀詩書六藝百家之文也里師之緒言莊生所謂駢拇而枝贅者耳士有誦習其説形之楮墨之間一當有司即取髙第而去何其易也夫唐人之詩沿流漢魏上薄風騷非髙材絶識之士不闖其籓籬故能者益少今人之文特鄙猥耳又不足以傳世故髙材絶識之士不欲為之以晞世而遇合吾鄉于野曹君雅操清修蔚有士望自為諸生時工古文辭不欲為今人之辭以就有司幅尺往往失解而陸沉于明時獨喜為詩詩學唐其清才藻思絶類唐人雜之唐人諸大家中無能上下之者第今時選士以文不以詩今之選士以文君既以文不合故不售矣今之選士不以詩君之詩乃人人稱之無讓于唐人余常抱君詩而欷歔流涕焉惜其不生于唐也假使君生開元長慶之間當與沈王杜元白之徒供奉人主豈不能摛毫玉堂奏牘金馬而身饗其榮名乎即使君之文少就幅尺以晞合于有司又豈不能如今人取髙第躡足青雲之上乎然君皆不值焉此昔人所以絶琴韜劍而慨知遇之難也頃議者欲更選士法稍益之辭賦以收博雅之才如行其言君當褎然首舉無難也已君有詩若干篇題曰玉芝樓稿蓋君有樓在城中可以升髙而眺逺余嘗從賓客逰焉竹牀棐几圗書滿架飄然有塵外之思君詩多得于此遂以名稿余為作序傳之其人西塘王先生春煦軒集序周宏禴世人有志見欲樹立者輒薄文章曰是技雕蟲耳惡能於時為重輕而文章家則沾沾喜傲翹翹標指日卒此為大業彼揚子雲云雕蟲之技壯夫弗為壯夫弗為而聖賢而豪傑可知子雲豈不稱文章家而何自貶損也抑太玄諸書非雕蟲耶此其故吾得而縷數之矣蓋文章之道與心通也與行俱也心通而言謂之妙解行俱而言謂之實際上索典謨風雅與夫伊訓魯論以及思孟之徒類有創作何不通之心俱之行乎第解有深淺際有逺近要之解不可謂之不妙際不可謂之不實子雲之書縱未能窺究深微敷陳平易管之所見豈無一斑斑無全豹而要亦見之見之則語真語真則言立言立則不朽嗣是玉通之著述杜甫之篇叶類能歆多衆而垂永世者亦以于心自有所通于行自有所俱耳馬遷之雄未解其領要太白之敏未際其真誠惟以健筆綜核于存亡興衰之會仙材縱橫于煙霞雪月之間故讀馬遷之史記則道往昔于聞覩誦太白之諸詩則生風雲于几席而後之論文者止馬遷論詩者止太白不復知有典謨風雅矣是文章之一變也顧馬遷太白之文章豈茍作哉融以神運以意貫以事繪以章定以格承以調響以聲錯以句潤以字而其神也意也事也章也格也聲也調也字也句也文復與詩異蓋酌所不得已而各出之以當如和五味焉然馬遷曉其文而于詩有不徹太白曉于詩而于文有弗工技之制也亦見名家之難也唐昌黎氏起而兼之自謂直接羲皇周孔而實只能繼馬遷太白耳能繼馬遷太白而且兼之亦異矣顧昌黎間能泄全祕逹時宜庶幾所謂心通行俱者則昌黎氏未可少也宋元來名詩文者吾惑甚焉掠馬遷及諸漢人所為文而補砌組織羅太白及諸唐人所為詩而裁割綴縫驟目之則字句漢也唐也聲調漢也唐也彼自謂馬遷太白人亦從而馬遷太白之彼其字句其聲調真漢真唐矣真太白馬遷矣何也固漢唐人所已語者也其粳粕也萃薈其字之奇頴句之險異者而為字句摹擬其調之飛揚聲之警動者而為聲調固字句則信無弗類聲調得千百之一二耳所謂格以條章章以授事事以逹意意以出神吾誠不知若何或者得億萬之一二則已傲視唐昌黎而下之矣謂昌黎無足與語是豈知昌黎亦心通行俱者擬上古作者實弗逮何至讓馬遷太白第各有所入不相盜襲耳人惟心所不通行所不俱更面貌而語固弗逹此嘉隆間大士羣起畢力求所未至一時稱盛甚少司徒王先生時之宗盟也然先生不嘵嘵然向人人談詩文如所謂沾沾翹翹者且先為柱下史日有建白非只空談耳已而先生固不輕以示人也久之盈盈成帙矣帙多更逸亡而門生故吏懼焉裒而緝之得所不逸亡者文凡若干篇詩凡若干篇奏疏又若干篇總而托之木禴兹郎版曹得給事先生獲所新梓而讀之讀未竟慨然歎曰嗟嗟胡云古今人不相及也文以和平通正根極理要點據事情也為上詩以沖融涵蓄發舒性靈聯絡景物也為最奏疏則異是言弗直則弗動言弗省則弗覽言弗大則弗當言弗犯難則弗費先生之文和平通正矣根極理要而點據事情矣先生之詩沖融涵蓄發舒性靈而聯絡景物矣先生之奏議言直言省言大言犯難矣于先生見古人所為文章者顧先生之文非不漢先生之詩非不唐蓋本吾之神運吾之意貫吾之事意之所指事之所值而格定焉格定而章就規章就規而調協度調協度而聲諧律聲諧律而句足聲句足聲而字成句則字句吾所自為字句聲調吾所自為聲調章與格吾所自為章與格無論唐漢即上而典謨而風雅亦只如是何也古今人之神同也其意同也事或異耳事異而意緣事異意異而神由意異神意完而事所欲言則而格而章而調而聲而句而字如化工造物千態萬狀如大海潤物隨取隨足奈何強字句入所不類之聲調而又強聲調章格以就所不類之事哉先生淡飬性體虛育英靈而心通于道故心通而語所自解介絶流俗和容物我而行俱于道故行俱而語所自際先生于詩文也以無意得之矣逼昌黎而躋揚雄氏矣雖然無稽之語何貴于金玉無用之言何俾于飢寒甚哉立言之難也禴讀逐客則悲世之淟涊讀法吏則悲世之深求讀心誓則悲世之趨改讀一政疏則悲世之紛更讀肅政新疏則悲世之容隱讀邊事疏則悲世之茍安讀肅戎政疏則悲世之避寵讀幽居詩則悲世之自擾讀長至等詩則悲世之急名至發諭療鶴長信諸作先生其有憂乎其有思乎嗟嗟當事者重切用者珍卷中數萬語何不如金玉何不俾飢寒者禴則欲廣心誓而號之衆緝肅戎政疏而更轉聞于朝兹蓋時所尤重而用所尤珍也固知僅可與先生言耳先生多自得揚歷中外樹䇿勳猷文章實不盡先生而豫言又惡能盡先生之文章玄晏齋選稿序姚世華文各適其適任乎天倪以各至其至遊于燦然之途而已覆視曩古簡復相望華質相調相為用而不相欣厭蓋子休洸洋自恣之數十萬言豈能如伯陽之五千文而子長之博奧宏肆必不低眉于孟堅之整率下而稱詩而七子二陸諸謝之沈麗何渠勝王栁之間淡韋蘇州孟襄陽抵掌五栁第令櫛比而與王右丞李供奉程試侔工又未知誰屬亞旅也故夫之簡淡而簡淡而謂奇豔非者履康衢而忘嶙峋嶭嶪之觀者也之奇艷而奇豔而謂簡淡非者襲狐白而忘布縷襏襫之用者也最下而今義則成𢎞為盛先此太朴後此太雕于時華實等耳而吾獨有羡乎今日能文家之盛非必逺謝成𢎞何故彼其意不窮幽渺勿令淡楮間一涉前輩臆愧怩弗敢染也語不極鏗訇勿令災頴偶一沾曩人吻囁嚅弗敢吐也比于成𢎞有其型而增以沈奧損其質而潤以陸離可謂綦成固難索解亦不易而僕所覩記里中諸君子與一時宇內推轂諸賢逹皆有焉噓之而來吸之而往簡必赴藻華不離真鉶發于象先而神逰乎思表以僕耳食即未易窺其所適所至緣而語于各適各至以遊燦然之途幾是乎僕與卜戩父同役自念何能為腹笥聊用公諸同好嗟乎更千年餘而七子陸謝五栁韋孟右丞供奉諸集更二千年餘而子長孟堅之史更三千年餘而伯陽之經子休之文至今人艷談之也此固各適其適各至其至夫寧以短長較也若乃文成而修橫金纍綬之業自昔伯陽諸人業已不能幾得之玄宴吾何論矣明文海卷二百四十六
