body:
  text: 明文海卷二百四十九餘姚黃宗羲編序四十文集王百榖謀野集序邢侗夫冥冥翥空尺一假其羽毛圉圉在淵八行鼓其鱗鬛飛沉匪郵傳之使禽魚鮮含靈之性而能暢懷天末傳響絶徼羈臣由之返國良朋因而加飯斯之託寄顧不重哉若乃好緣於肺腑誼重於修講勢出於蒼黃事關於釁郤呼吸判乎嗔喜占授次於言面非夫東里之博雅茂先之總稡鮮不錯雜其旨猥庳其説啓友邦之反面動鄰士之掩唇矣吾友王百榖先生含貞蹈和苞素揚采去延陵之舊居僦伯通之故廡􅌢豐儉之榖玉耽洗礪之枕潄茆茨非貴而卿相造門縫掖本賤而鍾鼎佇席下帷方廣川之仲舒著書類君家之節信逰道侔於太丘朋簮洽於蘇李竿牘靡挾日之間交酬盡四垂之逹矣竊見夫情至禮答裂素伸紙吐章陳文霞蔚河瀉學義冠於人倫言語妙於天下其或宰執方焰露調笑於矜莊寒畯失職寓煦沫於嫚罵其或朱邸陽慕羅羅見其清疏熊轓委誠嶽嶽表其耿介其或閭門接壤賀弔别區生芻一束羊酒兩家沉痛極歡造微筆下其或疏屬密戚頭岑腹痛量水稱藥分甘餉鮮一鬱三歎寄心行間其或良晨佳夕藉草染炬檢校鶯花指揮盧采倚馬霑醉覼縷願言其或方外名流域中巨賈彈指疏蘭閣之字橫書走迦葉之文其或蘭閨少婦桃葉小姬濡毫代金剪之怨含辛報薛濤之錦大乃巨幅小則掌蹄聲振金玉規矩騷雅槭若嚴霜之材婉如流風之雪磊砢無節目之纍浩汗撒藩溷之障古則陳孟公今則王次公可謂異代絶軌書場文府均被談談之許者矣嗟夫在昔世廟楊用修氏纂輯清裁遂至洛陽長價雞林懸購彼猶衆羽之裘此乃一狐之腋古謂蜀得其龍吳得其虎借兹為喻未為評允也百榖友人韓君道亨廷尉世家代結王生之襪桓談玄賞獨信揚雄之草爰命􅕻剞副於郁氏道亨辭辨清發風氣遒上余略得於其先大人兹特侈厥嚶鳴未槩及其鴻匠云爾謝在杭居東集序邢侗今夫海內雞壇錯峙則掩甸光郊牛耳狎執則連鞲接幕麗璞溷夫臘鼠薺苨亂乎人參是以葉公之龍非應蟠之物木寓之驥鮮麒麟之材匪夫極妍窮討益以申晰則朱紫恆至易處真贋卒之兩殽以余所得閩在杭謝君則未易言也在杭冕黼冠族緗橐世緒幼而清令寖長英特書乃誦可等身人謂公是卿座蚤成進士頗厭時學屈首司李遁業董帷乃抉微靈祖淹函雅故褎褎懙懙為世巨儒爰自吳興量移東郡倚類託寓一意著書發軔射書之闉駐車厯山之麓厭次弔乎方朔災里感乎次卿任城憶太白之舊阿曲尋陳思之迹雪宫留墟乎齊境蜃市亦幻於海澨不其之書帶佹存成山之瑑文垂滅觸時撫景其能舍旃抑或訟庭讞慮積有餘間寮佐周旋間成曲宴山郵攬空館之蘂鬼廡借青磷之炬字勞編絶而欣以會心膚粟手創而悽然寄慨凡於此際文筆乃遒君喜為詩詩分科品靡不􅒸宅風騷枕席魏晉祖初彌盛沿及厥中蕞會諸長極之融液富滋明秀則曲渚之芙蓉適怨清和則無端之錦瑟至於出言天拔絶玄人匠森然骨部眉嫵下拜視夫耽耽飾其孩嗄歘歘矜其齲楚良以徑庭矣若夫文章大業君更破的長篇鴻製步履左班法度章裁出諸愜素平大祛重舌之譯雄成免碎金之誚時乎登髙授簡則君家希逸之蹤也時乎遊戲泚筆則休文甘焦之致也時乎雜爼會萃則義慶新語之嗣也時乎方言貯録則子雲油素之例也竊又窺夫餘勇所賈代斫更僕英氣露於捉刀靈襟標乎答板致能洽華簮於上座聨風政於逺陬總之資稟軼羣才情開敏投之所向無不中倫以斯校條流於吾黨論真贋之所别求之中壤在杭其神龍天馬與哉在杭一官拓落茹菜飯粗虎犢殊其所如傖奴絶於常𨽻報友輸一端之疏縞娛內足四種之好香寫論將付之官奴營壁竊比於宗氏風期美矣官何負乎在杭為余言一昨之日保旅鸞潯耳溢者廣陵之簫目盡者蒜山之雪曽何計乎身之在逺官之復踦也今來簉羽太守後飛轡直指前草年老明經三日新子婦耳何日解腰下綬還頭上冠挲婆安昌之野追逐蜚走之促大蒼出櫳黃棘下兔芼以乾葵厭之濁酒真足以樂而忘死矣余曰在杭在杭曠志如許是能自作文字田僧超結撰那得不佳在杭大噱集署居東記地也亦有人風人之託也夫四林全集序俞安期明興以來詩凡幾變諸不暇論論嘉隆之間七子並興而歷下琅琊雙建標幟於時凡操管者陋江左之卑靡業中原之髙華競習大言而吐洪響空疏其中強奮其調虗喝相賞謂之今體其如無情之顰笑何余友安茂卿獨不追逐時好搦管抒思一以清婉為主阿堵中未嘗又有惡道含識中未嘗見有惡趣遣辭發旨著為詩篇皆俊朗清超之致不知有漫罕狼戾之辭余後八子詠中列茂卿云茂卿洵嫺雅而負俊潔才幡然營大業遣言暢中懷處身等璠嶼磝礫列無階斯實録也今讀遺稿篇篇清整語語雋永綺歲為劉大司馬所愛流連花月揮霍酒杯其篇牘非不連纍容為刪選往往以片字之纍棄連城之珍所存亡幾壯年以後悉無瑕之玉為有用之器顧分力公車之業篇什逮少所輯僅僅如此叔小范嘗對余笑曰吾家阿咸生有二反少年當悉力公車竟以流連詞賦誤致身之事強年以後正當寄興酒杯寓意篇什而乃攻苦公車以誤大業之垂余亦為之絶倒茍或不然則其所就應不止此而篇什之多又去幾幾也茂卿又善繪事生時固不易購求易簀以來片楮之貴不啻祕寶此詩剞闕成集不知洛陽之楮騰價又何如也讀李于鱗集劉鳳李生自謂命世才即子長不啻過之橫驅千古以崛徑自喜其文連類廣肆要不出左語國䇿太史書屬辭緝綴奇隩靡靡不絶敘一事數百言未究而其意不過爾斯則一語可了故為棘澀岨峿然且使皆自己出何不可者必剿襲古語聨貫絡繹以攟托矜衒為纍百篇如一機構或援左國以入於史牽經義以附於傳鎔鑄以巧冶若泯合無有釁兆者幾十二載可以為難矣而未可為至也夫文者必引繩墨隨短長效之即左語即國䇿即太史無不各自為家譬美好者其骨法相近而精彩神色則不可同也御者軌䇿雖同而輪轍馳驟豈必盡掩前迹哉今連類為之固不可即可矣如牽附何孔子蓋述而不作然易詩書則犂然辨矣豈必混為一塗哉至其所自為者又奚必曰古語有之乎且李生自以無一語不範於鉶可也而無所取裁因其凋幾假其成器必將至襲纍陳厭拾棄餘以為新異即韓愈氏抑且不為而能免於後來者誚乎使李生之才獨以意切劘之盡去其舊而新是圖剗除子史刋落傳記掊撇往者不本事不援迹不宿搆體不預設變有謂無謂有待無待出意慮之外遊埃溘之表奚患李生不能哉顧使論者推髙一代猶有軌鞅之疑奇氣軼發而當其無有則機用可窺也謂北地始開草昧本窮情盡勢極溔渺之觀關中湔滌雕飾而傷直致率意無宏邃淵蔚之色且今使蒙莊削牘則必盡舍逍遙而待議子長當著記之任未必謂無世本國語遂絶簡不載筆也若之何謂神用而有所藉患雄才不能自恣也哉葵陽先生文集序王衡穆皇帝御極之元年以文體靡濫有詔釐正而吾師葵陽先生以精馴爾雅之文冠其鄉旋魁南宫入中祕載筆侍從者二十年出而執圭秉節宣國家寵靈於洱海萬里外入而登貢玉之堂綴金華之席奏書天子膝前行且大用矣竟中讒歸歸無何而卒子弟門人相與裒其遺稿讀之其所為潤色大業不過應制視草與夫削牘碑板之詞共卷二十有五而已甚矣先生之用之不盡於文而文不盡於是集也翰林號稱內相禮遇最寵自唐始他不暇論如公之鄉先逹陸敬輿者當其為人主眷倚即宰相不敢望而官不過翰林學士耳暨昭代禮遇詞臣比唐宋加隆如三楊及彭嶽諸公皆以史官參與大議猷業顯赫故當時館閣之文重而體統不得不尊其後宫府日隔內者漸外文學侍從諸臣往往腐毫需次無鹽梅霖雨之用而徒欲提空名以踞諸曹之上難矣當先生時時已大緼然迹其講席所敷陳咨咨本支嫡庶間猶能使明主降心公卿動色而今何如哉一切重言格論跪而進之當御寢門不啓凝塵寂然欲如先生之不用其又可得邪蓋館閣之輕也有自來矣衡生也晚步禁林之末塵未能識其大者抑聞其所為文大抵有所稟程要以簡栗深重應規入矩為天下模楷自嘉隆以還二三踔厲跳蕩之文出先輩所守布帛菽粟之繩墨與之角而不勝則并館閣之文亦輕蓋世之好文甚矣世而好文甚則有甚者焉曷觀先生之文其綴詞結響樅金考玉得文之華其比事傳情衡今榷古得文之實華實相宣彬彬乎旨而深麗而不冶多變而整采錯而有章蓋清廟明堂之上宫商諧雅頌備矣而窮陬下里之歌歈山鬼蛇神之吟嘯騷人病客之怨思尚敢與之分曹而奏乎哉惜矣是集之晚出也如文必鹽梅霖雨而後謂之用即陸敬輿之為用亦不過十之一二耳第使是集出而摛藻者遜其工績學者讓其博向之踔厲跳蕩沾沾自命者捫舌相戒曰彼中有人則天下文章之體尚有所統一而史局之是非與人主之詔今且藉以俱重吾未敢謂文之果無用也明文海卷二百四十九
