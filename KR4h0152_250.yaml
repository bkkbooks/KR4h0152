body:
  text: 明文海卷二百五十餘姚黃宗羲編序四十一文集曾太史集序袁宏道嘗怪退之論文其觀於人也笑之則以為喜譽之則以為病夫文道之貌也唯恐不式奚取人之嬉笑呵怒以為快及讀公所著毛頴傳無甚僻者當時以為譏戲不近人情雖至相習如張文昌猶有遺訾其嘆服以為絶奇不可及者獨栁栁州及李肇耳夫人情譽因而惡創其所習觀羣然好之耳目稍易驚詫頓作安在譽之不為病也余才力不逮古人而妄意述作一時諸君子所膾炙者謬以為非遂欲去同取獨世爭笑之而退如曾太史獨以為近古過相印許余與退如非素昵也豈别有氣味耶余之稱與毁不足道而使退如有譽無鹽之癖世之笑之當有甚於余者也退如詩清新微婉不以俊傷其氣不以法撓其才而余詩多刻露之病其為文髙古秀逸力追作者館閣之體主嚴退如則為刁斗為樓閣敘記之作主放退如則為江海為雲煙余文信腕直寄而已以余詩文視退如百未當一而退如過引若以為同調者此其氣味必有合也昔人謂茶與墨有三反而德實同余與退如所同者真而已其為詩異甘苦其直寫性情則一其為文異雅朴其不為浮詞濫語則一此余與退如之氣類也退如善名理一時同志如雷何思蘇潛夫函蓋合而水乳契是其中有真臭味非文字相與也雖然此猶龍氏所稱下士聞而笑者其於文一機軸也昔有禪人為老衲所姍笑羞澀不能出一語次日請益老衲曰汝見登場傀儡乎曰見曰汝不及也禪者悚然問故曰渠愛人笑汝畏人笑耳此語與退之互相發退如欲見性命於文章乎抑即文章見性命也俱當於笑中求之睡菴文集序湯顯祖欲殺衆何意千秋某在斯此非霍林前時過江之句乎去豫數千里不見其人而壯其心時有所不怡亦復吟此自壯故嵗則其門人旌德劉生敦復崇仁王生士烺先後從豫逰間霍林容貌言笑在長安安否皆言吾師青顔美髭與諸生談常極夜旦逰日益廣而貌故加肥豫喟然而止之曰以豫所聞霍林道心人也道心之人必具智骨具智骨者必有深情所與子墨流連相為綽約耳雖然亦非世人之所欲得也已而以南祭酒出書謂豫題其睡菴文咏豫為拊几回翔慨然有東下意蓋前聞李公本寧以有所不嗛留寓東間霍林復爾皆豫所未見莫由夢寐者逾年春而霍林復為世人所疑罷官矣於是天下有識之士起為不平而豫特甚何也霍林者道心人也孝友亷貞足世師表而尚何疑于世乎雖然吾有以語此豫前在長安嘗謂詞林袁董二君曰君等苦道心不善堅固文趣不過奇拔黃閣有何重慕哉世之疑霍林者吝其黃閣耳亦太早計豫以霍林文家推之其福德常在乎彼人者何以明之見其初第時數作攸如也至為其里人作難脫刺客于枯廬破衲之中幽思顯詞迸然而通瀩沓揵疾厯礫暗忽可啼可笑若出若沒大非前館閣中常設者矣豫猶意其翩連而貴世樂所誘或忘其智骨焉已乃讀其文咏種種異之篤於功名世法之外有以秀鬱而蒼發或千餘言斾如其舒或數十語棁如其詘如霧流煙如雲漏月如洗峰嶽如抉坱北雖其蓄積衍按尚未極其曉世之情其必不為世人而為道人文人也決矣至於韻語短長率意受律氣力沉厚斑駁蕭瑟成其家言方前過江時復已度越矣大致羞富貴而尊貧賤悅臯壤而愁觀闕此其人胸懷喉吻中殊有巨物豈區區待一黃閣而後能與世吐爓者與至其沉冥病中詩猶有可舉似者平生事倉卒黑白不成校一死終無辭安得朝聞道夫以欲聞道而傷其平生此豫所謂有深情又非世人所能得者也嗟夫霍林之於道於文何如也發端未識得其里人與之患難而迫之功力未竟得朝貴者與以賤貧而恣之彼人者無乃過為福德與是睡菴可以恢然􅓉然以山川為氣質以煙霞為想似以元釋為飲食以笑嘆為事業縱橫俯仰概不由人道與文新文隨道真情智所發旁薄獨絶肆入微妙有永廢而常存者然則所謂千秋某在斯者彼人何與耶然彼人者必曰子何以知其必千秋也又曰即其饒為千秋吾且困以今日之事嗟夫以此相難者往往而然又非豫所得而言也姑言之以為睡菴文字序范文正公集補遺跋李維楨范文正公嘗監泰州西溪鹽倉時海堰久廢鹵浸浮田中不可耕公上書發運使張綸綸奏公為興化令修之通泰海三州民祠祀公其後江淮旱蝗命公安撫奏蠲江東丁口鹽錢以故今巡鹽使者行公集於維揚蓋髙山景行之思云集造次取辦多脫誤侍御史彭公屬顧所建小侯小侯就家藏書相參伍自嫌未備且不欲掩前人别為補遺一卷以復公余謂校書猶掃落葉隨掃隨有昔人固已難之夫書公物也吾補其所知以俟後之君子補吾所未知何足為嫌張南軒稱范公本朝第一人其表章中庸實開濓洛關閩諸儒之先文學政事卓爾不羣然其時已有言行拾遺録今去公六百年寧無脫誤余嘗見稗官家謂公知慶州作人碑銘諱一貴人隂事夜夢貴人吐實苐請更之公謝曰隱君此事則某受惡名貴人怒曰不更當奪公子公笑曰死生有天命卒不更子亦無恙又公謫饒州時於州圃北創慶朔堂手植花卉欄為二壇既移潤州題詩其上有年年憶得成離恨只託春風勾管來之句後人和者數十家亦云主人當日留真賞魂夢還應屢到來所指皆所植花卉耳而誣公於樂籍有所屬意不根甚矣凡書人事實校人遺集當鑒此兩則彭公按揚州日復書院修鹽志持論正大光明不愧希文因識補遺之故而併及之俞羡長集序李維楨徐偉長曰勤逺以自旌託之乎疾固廣求以合衆託之乎仁愛多識流俗之語粗誦詩書之文託之乎博文飾非而言好無倫而辭察託之乎通理居必人才遊必帝都託之乎觀風變易姓名求之難獲託之乎能靜是説也似若為今山人詩人而設大江以南山人詩人如雲鮮不病此者獨余友俞羡長出乎倫類矣羡長弱年即以善詩名弇州大函兩先生竒其才以為江南獨步序而傳之羡長益潛思博覽自古初迄唐一代詩若馮氏之紀張氏之苑自唐歐虞杜白宋李昉諸家類書若四六之文悉為集其大成訂其訛誤補其闕佚已搜二代之編罕傳者版行之所遊覽兩京兩河齊魯燕趙三秦三晉三楚三吳七閩百粵西北九塞山川人物風俗政治探討籌度談兵説劔恢然有用世大略所至王公大人折節下交少年場鬪雞走馬浮白呼盧徴歌選伎窮生人之樂抵掌評隲四座皆傾若所謂語寒風則翠柯零葉談芳節則稿木舒華者人有造詣交歡或纍千金帽慿而為義棄之若芥晚節歸依西方持齋誦經放生度鬼鉢笠蕭寂不殊老衲獨於書校讐丹鉛無一日釋手一洗晚近世山人詩人之習令偉長而在豈不悔其失相天下士耶羡長庀材日富搆思日深撰語日工年且七十總輯其平生所著以示余曰弇州大函惜不見吾今日子及見矣年長我數歲事復不可知盍為我敘之余惟今作者苦不學故初則境易窮末則氣易索羡長博學孳孳如不及取之無盡用之有餘情之所蓄無不可吐出景之所觸無不可寫入五七言長篇纍百韻外句字妥適年雖耆酒酣耳熱揮翰千言律晚入細兵多益善賦與他文體裁興致各撮其勝昔人評張協風流調逹曠大髙手詞采蔥蒨音韻鏗鏘使人味之亹亹忘倦孟浩然遇景入韻不拘竒挾異令齷齪束人口者涵涵乎有平泰之典求才於今吾以羡長敵之矣是編也傳當有知余言不妄者苐其人生平容或不悉因序集而粗述大都如此逍遙園集序李維楨穆公為郎時司馬石公為給事中上疏斥指乘輿及貴人貴人磯上怒杖之闕下穆公身擁護之解官與俱歸天下莫不髙公之義以為朱家季布之流已爾不知其能文章也後公稍遷吏部郎中於讒口投諸瓊管又削其籍不復用天下即無有能名公之義者而公益肆力於學六經史子百氏之書無不研精竹素碑版流播江南北而海內所宗文章家至王元美先生推許特至於是公文名大振居無何卒矣同邑崔侍御集公詩若文行之而公之子內史仲裕請敘於余余在史館識公體氣髙亮襟度恢廓推誠不疑假令知管時任雲蒸龍變以就功名之會何有不虞公賫志以沒徒以空文垂見後世也今集詩與文諸體畢備定格而後有篇故格不卑積學而後有句故句不薄極思而後有字故字不凡三百篇十九首黃初建安六朝三唐兩宋勝國悉所考鏡而自成機杼情事配合意象適均博不猥雜新不險僻則公之所為詩也以孟莊騁其辨以檀左工其法以短長雄其氣以龍門窮其態以唐宋四大家暢其指持論正而不激敘事贍而能潔師心匠意不求效顰抵掌之似而斫輪削鐻有神理焉則公之所為文也蓋東晉後中原文獻遷居江左帝王更都之地為劉石所辱而江左文章家日新冨有乃至鄙夷北朝如韓陵片石語於今益甚而李子田李伯承魏懋權諸君子攘臂爭之余以為此不足辨無論逺者即近代之開先而為北地信陽中興而為歷下新蔡皆灼灼人耳目其羽翼接武者不可勝數弇州先生何嘗不尸祝師友之哉彼以其衆此以其寡則衆者勝彼衆而汰此寡而精則精者勝穆公魏人也史稱魏南有鴻溝東有淮潁西有長城北有河外守白馬之津示諸侯形制之勢其俗近梁魯微重而矜節剛武尚氣力穆公所論著得之土風為多氣完而骨徑磊落伉爽汗血之足不受羈􅎗洛浦之容不加香澤連城之璧不掩寸瑕而世所寶重愛慕必歸焉寧與夫江左花鳥泉石之課閨襜粉黛之豔梔蠟鞶恱之飾一覽而盡再索而無餘致者比也明興二百餘年魏人盧次楩以賦名家而公始具體為魏北地信陽是集行中原文獻以公樹幟升壇弇州先生之推許特至也有以也公家居好賑人之急千里誦義無窮髙才盛年沉淪抑鬱而無一切憂讒畏譏牢騷不平之感署其園曰逍遙惟以翰墨自娛丹鉛雌黃朝夕不輟有春秋戰國評苑左傳國語抄評七雄策纂史記節略四史鴻裁百將提衡文浦玄珠諸家俊語閲古隨筆明詩七言律凡若干卷尤於文刳心故集文勝其詩云明文海卷二百五十
