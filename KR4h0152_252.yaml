body:
  text: 明文海卷二百五十二餘姚黃宗羲編序四十三文集趙忠毅公集序周鳳翔昔孟子闢邪距淫而先於正人心人心者天下之所以一治而一亂也生於心害於事作於事害於政子雲曰楊墨塞路孟子辭而闢之廓如也廓如之云有味乎其言之也我國家當神廟英嵗篤敘正父無斁康事鳬鷖既醉之風卷阿天保之樂有過無不及焉而二三憸人窺牀第之微生動搖之計紫芝之歌難招黃臺之蔓幾摘於是一時君子起而爭之而枋國者陰陽捭闔以剪鴻鵠之羽今夫刑人殺人之不可得於明主也無曰刑人殺人乃以軟持而巧錮之朝去一人暮去一人積漸以往如易地形人心之司南者不在朝寧而在草野矣於是鄗上則夢白趙先生江右則爾瞻鄒先生三吳則顧叔時先生昆弟高存之先生領衷正人如衣裳之有冠冕山川之有河嶽若高則趙先生所舉士也諸君子言性命言氣節言文章要皆以正人心固宗社萬年之本為主諸小人之詬厲者不曰彼直寄焉而曰是好為黨引繩而批根吾以東岡之陂困之耳困剛掩也諸君子以忠義憤發之故掩而不得出不能無所發舒於是以講學之禍明禁之邢恕胡紘林栗之徒羣陰翩翩矣諸君子之言有物而行有恆也皆能脫屣富貴塵芥功名彼翩翩者豈知諸人之不可以厲鼠嚇哉俾諸君子之道窮桎不行則天下之人心皆眯而入於邪懷山襄陵千變百出惟吾所為耳諸君子之為言與學或以廣大或以和平或以精簡而趙先生一以剛毅發之養其浩然之氣配道義而出闢仁義之途使之廓如其為人如麒麟之不可羈紲其為才如干將莫邪刜鐘立斷其出辭不問大章小言尺牘務出於直截痛快如日月之光華如盧扁之針石又如霆鬬電走百邪坐碎間或蜇吻裂唇乂雜以微辭巵言使人愈懌其文辭具在有心者可攬而得也先生駕虬驂螭不可一世鴆毒鳩佻不敢睨其門墻即蕭艾易臭龍蠖行權一經先生之目黑白炳如寧以瑕瑜不掩為忠而以浮沉挫鋭為大惡其慷慨自矢者蘭枯玉碎之志至老不衰蓋自斥於考功及神廟末年立起田間驟登三事而切雲之冠明月之被嶄如也輝如也卒於荷戈荒塞溘從彭咸正人之禍極於北寺雅儒之嘆悲於南操矰弋機於上罻羅橫於下先生殂而其巨子至於自沉嗟乎非聖明登極天宇重開返旅櫬於雷州招忠魂於汨水贈以孤卿諡以美號天下人誰知為善之福與顯遂之典哉然生為國柱死為世砥五十年之內安危是非之極先生身行之者以言紀之身不能行者以言昌之其文可以嫓經墳其詩歌足以昭信史若止以籬驗天問少陵太白誦其詩以兩司馬班范讀其文猶之乎買櫝而還珠矣丹陽薑抱宏以大司馬范公之命發其師門之藏盡以付之劂氏先生之靈藉以不朽不佞翔承命序之爰告同志曰昔吾鄉先正其言明且清即以為孟子復出非私於所好矣合刻楊南峯先生全集序錢府吾郡南濠楊南峯先生舉成化甲辰進士為禮部主事俄而致仕嘗讀書支硎山之南峯寺故以南峯自命資性警敏若有宿習於書無所不好無所不窺博覽冥搜飲食都廢自經史而外稗官小説佛老方志星家厯數罔不羅列胸中咀菁獵華潄芳浥潤貫串融通徐而出之自運機軸務去陳言故其文簡潔嚴整意盡而止詩清婉爽亮自成一家四方請乞者踵至而先生性僻好侮弄世人不一一應之雖應之亦不曲徇其情故人亦畏而不敢近雅不喜宋儒議論而於考亭尤多掊擊又最惡近世學術不然其説然援證端確不茍是非筆之於書皆琅琅可誦其他雜著如松籌堂集攢眉集燈􅙘末藝雲峯廣要奚囊手鏡等書不下二十餘種惟手鏡卷帙頗多亦頗散逸郡中好事者互有收藏先生殁後子孫日微類為鄰家取去姪可略有梓行然存十一於千百非全書也劉侍御子威亦居南濠曾拜先生稱弟子多有藏本然尚不及見遼金二小史况其他乎姪可之彌甥史辰伯雅好先生書辛勤博採次第付梓乃問序於豫曰嗟乎詩文之傳有幸有不幸今坊間所鬻汗牛充棟非鈎棘之舉業則繆悠之道學非荒唐之小説則空寂之異端九經三史付之茫然若吾南峯先生殁僅六十三年遂爾湮沒况漢唐宋以前之人物乎又嘗披覽范盧二志所載名公巨卿文集章疏不下數十百種今非獨子孫不存試問其書曽有一留者乎所傳者如此所不傳者如彼非幸不幸而何哉豫每過南濠南峯之間及經先生之墓穹碑巍然松楸濯濯未嘗不徘徊不忍去想見其人今二子殷勤傳刻之心甚盛雖先生久遊道山九京有知寧不喜千載而下有識子雲者耶老生不識忌諱縱言及此覽者幸諒之姬命文集序舒曰敬豫嘗評舉子業至今日而壞亂極也則以時事多艱為據蓋主持世道之人皆奮迹舉業者也世危不持猶謂有舉業乎乃論古文與詩則反是古文與詩之足傳也嘆國家之盛者固多因亂而見者不少也故春秋成於亂賊之季仁義揭於縱橫之秋濟溺起衰丁李唐之中葉紫陽絶學豈趙宋之盛時論世者皆躋之乎一治即世不必治而治在萬世矣此非神理不謬於聖賢擬議折𠂻乎今古抑揚幽贊乎鬼神孰能當此顯懿而曰文在兹乎豫老而服膺惟吕新吾先生一人先生真氣淋漓綜藝林儒林之華實而樹其幟獨其書晚出海內不盡傳誦然天壤間布濩瀰漫無非真氣取以成文則凡昭明有融議論無頗者豫必目之為吕先生之徒羅浮韓姬命師豫十數年而豫不敢私姬命也姬命竒博自弱齡著稱其業富有豈必盡肖吕先生苐從一真發脈雖變化百端而馳驅自範必不宣驕恣吻顚倒賢姦如李秃必不程秦矩漢肖貌遺神如濟南序記諸體據事緯情亦鬯亦古論説與辨尤擅勝場蓋窮原委參經史公是非粹然一軌於正矣極其才致韻語可以舍筏而婉婉合度則洽見該聞之力也嶺南文獻開自張曲江憶杜少陵頌曲江句云仙鶴下人間獨立霜毛整又云自成一家則未闕隻字警持此可贈韓姬命蓋少年而侈千古之業斯已難矣矧狂瀾􅐓洞之日屹然不波於書無乎不讀於天下士無乎不友而作想作合逈與世之所讀所友者異將陳文恭之解悟丘文莊之經濟海忠介之風裁合鑄成體而世道實嘉賴之豫安能窮其所詣也請循其本尊人嵩少先生為今日上萬壽賦於神廟巨麗有聞預料一疏令吾友沈何山有深於謀國之嘆而引為同心良弓良冶則所謂開之者矣歐蘇選集序遊居敬豫讀歐陽永叔之文溫純而婉委如百川之紆回百折而竟滙於海也又讀蘇眉山父子之文老泉雄而竒東坡爽而健潁濵典而實皆蔚乎其有文鏗然其相宣如觀涿鹿之鏖戰而竦然忘倦如聽簫韶九成之奏律吕調適而神怡而心懌不自知其身之生於千百世之後也嗚呼盛矣故嘗竊謂為文至於歐蘇亦可以止矣而何必秦漢云哉雖然文以秦漢為上謂其近於古也然古之文不可以強至非況浸於歐蘇之文而有得焉而遽欲效於秦漢諸人之作則不過剽竊其字句之竒而模擬其篇章之似耳求其至焉則未也其能逃於羊質虎皮之誚耶況歐公自謂其文得於韓愈氏與斷之六經蘇老泉亦云孟韓之溫醇東坡昆仲大抵守老泉之教而自得於班固馬遷莊騷左氏戰國策之間故其隨遇而施方圓短長竒崛衍迤無不如意使歐蘇而不出於孟韓六經與夫秦漢諸人之言論則亦何以能使其文之醇穠而至足古雅而雋永浩浩無涯涘若此其盛與知乎此則學秦漢而不先於歐蘇者舛也既學歐蘇而不進於秦漢者畫也學文者其無蹈於舛與畫之弊焉則庶乎其至爾豫因選集二家之文而僣為之説如此以俟知言者倘有所取云明文海卷二百五十二
