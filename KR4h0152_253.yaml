body:
  text: 明文海卷二百五十三餘姚黃宗羲編序四十四文集李翰林集徐熥李太白姑孰十詠東坡怪其語淺不類太白孫邈子思以為李赤之詩且謂赤詩止此而以太白自比則其心疾已久矣豈厠鬼之罪哉今觀十詠體格聲調無可指摘且中多佳句如波翻曉霞影岸疊春山色又小女棹輕舟歌聲逐流水又竹裏無人聲地中虛月白又石甃冷蒼苔寒泉湛孤月又翠色落波深虛聲帶寒早又岸映松色寒石分浪花碎此非太白不能辨也藉令果出赤手亦自可傳何至詆為病狂喪心之語俗儒吠聲一至於此愚又謂唐人譏諷時事多託為寓言如李赤河間婦亦烏有先生之類耳以為實有其人似亦憒憒蘇東坡謂李太白集中笑矣乎悲來乎及贈懷素草書𢾗詩決非太白作為唐宋五代貫休齊已輩詩此蘇公望太白過高非真知太白者太白豪宕歌行中率易之句時見筆端不獨此𢾗詩也又謂太白或有妄庸假託子美斷無偽撰此亦尊杜之過非確論也後世學杜者衆矣豈無一篇相肖雜於集中而莫辨者耶讀弇州山人集徐應雷所謂山人者必有名山不朽之業若弇州山人是真山人先朝孫一元自號太白山人其標韻高絶是真山人其有位無位勿論也嘗聞有布衣投詩於弇州公自稱山人弇州公批其詩尾曰此曹何所長而稱山人耶山人之不易稱如此今人大憒憒以軒冕為青雲之士以布衣為山人於是公卿録録不能望齊景公魯季氏之萬一並曰青雲之士布衣挾詩文奔走公卿之門並曰山人庸知巢由固青雲之士而弇州公尚書可稱山人哉今之稱山人者大都號能詩文若書若畫當試語之曰本朝為山人者曰李山人夢陽何山人景明徐山人禎卿李山人攀龍宗山人臣王山人世貞祝山人允明王山人龍文山人徵明沈山人周唐山人寅如是而已俞仲蔚先生集序顧紹芳仲蔚俞先生卒之三年而其友歙人程于行氏情篤舊雨為捐橐梓其集以行於世而廷尉王先生序之廷尉名文章大家而習俞先生故其所揚扢文義及稱引俞先生隱德至詳核矣世或謂俞先生附青雲而益顯意若推功於廷尉以為其推轂之力居多要之廷尉公初以詩定交俞先生而又生平好播揚人善其推轂於諸名公間固當假令廷尉公阿私俞先生以為名高無論非廷尉公意指即俞先生亦岸然弗屑也今俞先生言及當世布衣之業具在可考鏡已蓋明興詞人之業蜂起漂涌然大抵皆出於搢紳之徒而布衣窮巷之士往往十不得一此無異故士方窮時咀藜䄈褐不厭死而已者曾幾何人是故飢寒憔悴俯首而從干謁其於詞特椎剽希合以自附於風騷之致以成其遊道而其著者僅亦馮婦小材陵轢頓挫爭為名髙以鯖五侯而已此於不朽之業奚當焉而耳觀者猶傳之然而士不虛得名不虛附當其身或勢激相重以誇詡得聲而百年之後形影銷滅同腐草木計無復之矣乃俞先生迹不能一廛之外遊不能千里之外蓬蒿自擁婆娑乎圖史即逹官貴人郡國守相傳響而求先生先生聊一應之泊如也豈與夫儇巧機辨趨時混俗遊大人以成名者同乎哉然俞先生顧以是得專精覃思成一家言語不必規時好聲不必諧里耳若詭若匿以自致於不朽之域驟而讀其集泓渟奧衍蒼然其色非今世人也其素所蓄積豈偶然也哉昔永叔論聖俞之詩以為窮而後工聖俞窮矣然嘗仕於朝至七品官有祿秩以贍其妻子方諸永叔窮矣以視俞先生不猶泰乎俞先生以窮故工以固窮故比老而其窮不衰而其工亦日以益甚廷尉公盛稱俞先生之文詞而推夲其隱德夫俞先生之隱德固其所以昌於詞者也其褎然為當世布衣之傑復何疑俞先生有子伯安以瞽廢然能亟圖其親不朽而屬豫嗣廷尉公言諸末簡豫縱有所論述亦安能出廷尉公意表念當俞先生時家大夫最厚善惟紹芳亦得以通家子數過從先生折行而進之不可以謂不知先生於是卒由廷尉公之指為序其所以俾閭巷之士欲砥行立名者庶有興焉兵部集跋吳國琦琦少自趨庭聞豫先大夫之德之功莫可殫述長每去白楊里其中有名山如浮丘白雲豫懷亦不戀獨喜尋故老談豫先世事如先大夫其遺事之最巨者亦不能殫述惟聞一二細行似聞鄉黨曲禮及文公小學諸篇覺豫一飲食一冠裳舉趾都若與古人相似斯時放心能不頓斂曾聞為部郎省親一村鄰見招其人倚門望車馬日午不至遂呼諸戚友往請至中途遙望一人著唐巾葛衫坐小松下側耳似聞田水活活聲而手持一帙傍一小青衣持雨具侍立視聽不敢茍即而視之乃先大夫持家才老韻經索句也曾聞補弟子員奠先人墓歸夜值雷雨大作無可趨避見茂林有棲居甚近就之為某故人家是夜直危坐其門外達旦策蹇驢去侍兒問之厲聲曰奈何暮夜以祀事煩知已起居耶曾聞里先逹某砥礪好修適有訟田一細事乃恐為盛德纍遂上書規之自署為首陽山人走一癡僕授其門郎去其先逹笑曰首陽山人非吳某其誰耶不意今日再見古人事乃寢大凡此等細行真非筆墨所能縷記故相人謠曰吳某何唐張處士安貧樂道不求人何唐者與先大夫同舉進士張處士逸其名夫以縉紳先生與田夫樵牧分安貧樂道之座異矣異矣嘗記先君子執是集手訂之訓豫曰是所以大過人者汝知之乎詩人自有本色以其本色為陶潛杜甫一流人也汝輩養心寡欲深思熟味之事父事君何患不登三百篇堂奧也因重梓一過令兒子兼熟讀深求之及取筆墨記豫所聞一二遺事於末簡並以備志之未及云何文毅公全集序張愼言當代名相之業莫著於楚石首楊文定值締建之初補天浴日策勳亡兩於時文章尚宋廬陵氏號臺閣體舉世嚮風其後權散而不收學士大夫各挾所長奔命辭苑至長沙李文正出倡明其學權復歸於臺閣蓋起衰救弊之功往往百餘年而僅遇其人不戞戞乎難之哉江陵張文忠又變博大為遒鍊吞雲夢而撼嶽陽則經濟實相因也文人矜習於言詞事乃亡當漢東之國隨為大何文毅公應運而興受神祖知遇承明著作之庭摛藻如林公代言補牘㫪容剴切歷佐宗伯寢謀淮南神祖留公以貽光廟類先朝之貽楊文定逮正揆席煬竈伏莾又李文正之厄會也批大郤導大寲識機歸潔尋有鈎黨甘露之變疇能凂之嗟乎公之所就大矣名相以納諫進賢為第一格天之德彚茹之征皇皇偉偉正正堂堂惟公有焉雕蟲小技楊子雲猶羞之矧名相如我公詎僅僅潔長較大於操染之間乎雖然日月經天光彩常鮮文猶日也謨訓以之三代而下標體乂繁宏裁巨製如燕許之稱於唐范富之名於宋固自不乏如公崛起南服經國之大業不朽之盛事倍光曩哲恢度如文定而加其亮達變如文正而高其潔鎮重如文忠而善其藏蓋合楚相之賢凡數家亡以逾公即合楚相之文凡數變誰則邁斯而往哉楚人善怨屈大夫以騷聖今讀公集非六藝之言不道間獵酉藏汲冡東西京而下一裁之以灝氣玄識波恬味腴終歸醇雅則臺閣之文實我公再造也昔人有言君以此始必以此終雅文始於楚得公而終之誠冠冕寰宇凌壓來祀而豫猶沾沾焉稱楚不置奈何夫文章經國大業公楚人也而為楚重如唐之昌黎宋之眉山各崇地望爾公孫一公來贊部事手梓是集問序於豫豫亦言其才之所從著者而已王文肅公文草序何宗彥夫館閣文章之府也其職顓故其體裁辨其制嚴故不敢自放於規矩繩墨之外以炫其竒國初以來鴻篇傑搆映帶簡册間猗與盛矣嘉靖末季操觚之士嘐嘐慕古高視濶步以詞林為易與然間讀其著述大都取酉藏汲冡先秦兩漢之唾餘句摹而字斆之色澤雖肖神理亡矣而況交相剽竊類已陳之芻狗乎夫古之作者豈其置酉藏汲冡先秦兩漢之書不讀而行文之時不襲前人一語者理本日新秀當夕啓規規然為文苑之優孟哲匠恥之以故二十年來前此標榜為詞人者率為後進窺破詞林中又多卓然自立於是文章之價復歸館閣而王文肅先生實其司南也先生負逸才書無不讀其心淡然無營其氣浩然於功名生死塵埃之外無所屈故其發為文也紓其中所獨得暢其意所欲言紆徐莊重未嘗不酉藏汲冡先秦兩漢也而又未嘗有意於酉藏汲冡先秦兩漢也蓋居然古之大家不可及其視哀艷以為工恢誕以為竒攟托餖飣以為富者孰優千秋以下必有能定其品者矣嗟乎先生生平所重者忠孝大節其所營念而繫心者宗社安危大計豈屑與文士量長潔大顧兹集括殊吞有歸之大雅精光灼灼天地為昭亦非鉛槧家所能幾萬一者古稱文章事業患不能兼若先生者可謂兼之矣某總角慕先生如天人及通籍先生歸矣無繇執贄稱弟子頃先生孫璽承君命序先生文章某何能為役苐憶蘇子瞻甫八歲知敬愛范文正公以不得從遊為恨以獲挂名文字中托於門下士之末為喜某糟粕生不宜繆附子瞻而先生德業與文正公後先輝映則兹集之序某之大幸也而又何敢多讓焉明文海卷二百五十三
