body:
  text: 明文海卷二百五十六餘姚黃宗羲編序四十七詩集林伯恭詩集序宋濓詩心之聲也聲因於氣皆隨其人而著形焉是故凝重之人其詩典以則俊逸之人其詩藻而麗躁易之人其詩浮以靡苛刻之人其詩峭厲而不平嚴莊溫雅之人其詩自然從容而超乎事物之表如斯者蓋不能盡數之也嗚呼風霆流形而神化運行於上河嶽融峙而物變滋殖於下千態萬狀沉冥發舒皆一氣貫通使然必有頴悟絶特之資而濟以該博宏偉之學察乎古今天人之變而通其洪纖動植之情然後足以慿藉是氣之靈彼局乎一才滯乎一藝雖欲絶騁橫騖以追於古人前之而愈却培之而愈低幾何不墮於鄙陋之歸此濓於伯恭之詩不能無感焉伯恭博極羣經而尤長於春秋嘗應書鄉闈實冠多士伯恭年始二十餘一旦名動海內自時厥後學益加修遂擢至正甲午進士第歷佐省憲二府正色直言百壬畏懾時出竒計剪三逆豎如烹狐兔則其所養之充是氣浩然弗撓弗屈故其發於詩也沉鬱頓挫渾厚超越大雅奏而黃鐘獨鳴也武庫開而五兵森列也洪濤怒張而魚龍出沒也一展卷間呈珍獻異可欣可愕精神為之震眩濓前所謂聲因於氣皆隨其人而著其形者豈非然耶世之學詩者衆矣不知氣充言雄之旨往往局於蟲魚草木之微求工於一聨隻字間真若蒼蠅之聲出於蚯蚓之竅而已詩云乎哉永嘉舊傳四靈詩識趣凡近而音調卑促近代或以為清新者競摹倣之濓每謂人曰誤江南學子者此詩也聞者且疑而且信焉今吾伯恭之詩出一洗習俗之陋信知豪杰之士自有其人也故敢執筆直題於首簡世有知言者必深有取焉伯恭名溫姓林氏溫之永嘉人劉兵部詩集序宋濓詩緣情而托物者也其亦易易乎然非易也非天賦超逸之才不能有以稱其器才稱矣非加稽古之功審諸家之音節體製不能有以究其施功加矣非良師友示之以軌度約之以範圍不能有以擇其精師友良矣非雕肝琢腎宵咏朝吟不能有以驗其所至之淺深吟咏侈矣非得夫江山之助則塵土之思膠擾蔽固不能有以發揮其性靈五美云偹然後可以言詩矣蓋不得助於清暉者其情沉而鬱業之不專者其辭蕪以厖無所授受者其制澀而乖師心自髙者其識卑以陋受質蹇鈍者其發滯而拘古之人所以擅一世之名雖其格律有不同聲調有弗齊未嘗有出於五者之外也濓於職方郎中劉君之詩其殆無所愧矣夫劉君名嵩字子髙故為西昌大族前代以科第發身者三十七人劉君亦以明經舉進士而其志之所嗜尤在於詩况劉君天分甚髙自為童子時輒有驚人之句比長益淬礪弗懈上自詩騷下從魏晉以來迄於唐宋凡數百十家皆鑽研考核窮其所以言用功既深精神參會絶無古今之間已而曰此固可矣然猶未也乃束書走豫章與辛敬萬石周湞楊士𢎞鄭大同遊而此五人者負能詩名見劉君皆驚異之揚確風雅夙夜孜孜或忘寢食及徴之於古瞭然黑白分矣已而又曰此固善矣然猶未也復痛自策督日賦一篇雖沍寒之折膠熾暑之流金劉君擁鼻鼓膝時作嗚嗚聲不成章不止也數年之間卷軸盈几已而又曰此固若有得矣然猶未也復具布襪行纒臨釣臺上三顧山陟虎鼻峰眺龍門或竟日冥搜或終月忘返然以州里之近未足以窮耳目之遐觀環江右之境有竒山川不論道途之逺必一至焉襟宇向廣終若未能舒暢厥志復度庾嶺勺曲江玩韶石過清逺峽登越王之臺㪺蒲間泉遊石室歷觀海北名山再涉鯨波覽瓊臺雙泉之勝而還劉君之詩於是乎大昌矣濓幸獲讀之凌厲頓迅鼓行無前所謂緩急豐約隱顯出沒皆中乎繩尺至其所自得則能隨物賦形髙下洪纖變化有不可測置之古人篇章中幾無可辨者嗚呼前千年而往者吾已知其人矣後千年而興者孰敢謂無其人乎苟謂有其人非劉君之作將能行之於逺乎世無劉君五美之具而徒諉詩為易易者其果可信乎濓也以繆悠之資玩時愒日不能成一章性雅好登臨又無濟勝之具雖於諸家詩無所不讀終不及窺其藩籬有負師友多矣其視劉君不亦重可愧乎雖然濓雖不善為詩其知詩決不在諸賢後故因作序而相與言之使郊愈復生當不易吾言矣劉君之詩十九歲以前皆焚去二十至四十九之所存亦十之七八耳今其門人蕭翀所編者凡若干卷翀字鵬舉亦嗜於詩蓋得劉君之傳者也汪右丞詩集序宋濓昔人之論文者曰有山林之文有臺閣之文山林之文其氣枯以稿臺閣之文其氣麗以雄豈非天之降才爾珠也亦以所居之地不同故其發於言詞之或異耳濓嘗以此而求諸家之詩其見於山林者無非風雲月露之形花木蟲魚之玩山川原隰之勝而已然其情也曲以暢故其音也渺以幽若夫處臺閣則不然覽乎城觀宫闕之壯典章文物之懿甲兵卒乘之雄華夏會同之盛所以恢廓其心胸踔厲其志氣者無不厚也無不碩也故不發則已發則音淳龎而雍容鏗鍧而鏜鞳甚矣哉所居之移人乎今觀中書右丞汪公之詩益信其説為必然者矣公以絶人之資博極羣書素善屬文而尤喜攻詩當皇上龍飛之時杖劍相從東征西伐多以戎行故其詩震蕩超越如鐵騎馳突而旗纛翩翩與之後先及其治定功成海宇敉寧公則出持節鉞鎮安藩方入坐廟堂弼宣政化故其詩典雅尊嚴類喬嶽雄峙而羣峰左右如揖如趨此無他氣與時植化隨心移亦其世之所冝也然而興王之運至音始完有如公者受丞弼之寄竭彌綸之道贊化育之任吟咏所及無非可以美教化而移風俗此有關物則民彛甚大非止昔人所謂臺閣雄麗之作而山林之下誦公詩者且將被其霑溉之澤化枯稿而為豐腴矣雖然詩之體有三曰風曰雅曰頌而已風則里巷歌謡之辭多出於氓𨽻女婦之手倣佛有似乎山林雅頌之製則施之於朝會施之燕享非公卿大夫或不足以為其亦近於臺閣矣乎輶軒之使弗設而托之於國風者若無所用之皇上方垂意禮樂之事豈不有撰為雅頌以成一代之盛典乎濓蓋有望於公他日與鹿鳴清廟諸什並傳者非公之詩而誰哉濓也不敏受公之知十有一年故竊序其作者之意於篇首蕪纇之詞要不足為公詩之重輕也公名廣洋乃皇上之所賜其字則朝宗也淮南人洪武三年四月二十一日金華宋某序跋葛慶龍九日詩宋濓江乘沈玄督道士持草書九日登髙古詩一卷謁余詩後不著氏名但題越臺洞主四字道士悵然曰吾愛此卷甚見當世巨儒多叩之鮮有知之聞公素稱該洽願有以識焉豫惡足以語此頗記謝先生言越臺洞主名慶龍姓葛氏廬山人久居越中能為詩詩務出不經人道語甚者鈎棘不可句每客諸公貴人諸公貴人燕饗方樂或為具紙無問生熟連幅十餘慶龍睥睨其間酒酣筆落颯颯不自止皆鵬鶱海怒歘起無際然為人簡躁喜面道人過一有所忤即發泄無留隱非知其磊落無他腸多疏之惟嗜聞音樂又不甚解居一室雜懸藥玉磬鈴醉後自揚扇撼之閉目坐聼殷殷有聲至睡熟乃罷晚尤落魄依王主簿居初越臺有石洞樵獵過者必祝以為有神慶龍恱之刻巳像洞前自稱為飛筆仙人越臺洞主死之日遺言王主簿我死當葬我葬我必於是洞且用儀衛鼓吹為導使樵獵祝我如祝山神慶龍初為浮屠中更衣道士服晚又入儒人莫測其意出語頗涉玄怪恍惚不可辨君子謂其為詩之仙鬼云今觀其此卷所作雖雜於幽澀而其竒氣橫發真欲騎日月薄太清視爭工於組織紉綴間者不啻猿鶴之於蟲沙如慶龍何可少也何可少也余故備道謝語書而歸之使知慶龍非躚躚媚學輩可及則其不為慶龍者又可得耶項伯髙詩序劉基言生於心而發為聲詩則其聲之成章者也故世有治亂而聲有安樂相隨以變皆出乎自然非有能強之者是故春禽之音悅以豫秋蟲之音悽以切物之無情者然也而况於人哉豫少時讀杜少陵詩頗怪其多憂愁怨抑之氣而説者謂其遭時之亂而以其怨恨悲愁發為言辭烏得和而且樂也然而聞見異情猶未能盡喻焉比五六年來兵戈迭起民物凋耗傷心滿目每一形言則不自覺其悽愴憤惋雖欲止之而不可然後知少陵之發於性情真不得已而豫所怪者不異夏蟲之疑冰矣故今觀項君之集而深有感焉項君與豫生同郡而年少長觀其詩則沖淡而和平逍遙而間暇似有樂而無憂者何耶嗚呼當項君作詩時王澤旁流海嶽奠乂項君雖不用於世而得以放意林泉耕田釣水無所維係於此時也發為言辭又烏得而不和且樂也夫以項君之文學而不得丕揚歷臺閣黼黻太平此人情之所不足也而君不然抱志處幽甘寂寞而無怨項君亦賢矣哉賢不獲用世而亦不果於忘世吾又不知近日項君所作復能不悽愴憤惋而長為和平間暇乎否也感極而思故序而問之王原章詩集序劉基豫在杭時聞會稽王原章善為詩士大夫之工詩者多稱道之恨不能識也至正甲午盜起甌括間豫辟地之會稽始得盡觀原章所為詩蓋直而不絞質而不俚豪而不誕竒而不怪博而不濫有忠君愛民之情去惡拔邪之志懇懇悃悃見於詞意之表非徒作也因大敬焉或語豫曰詩貴自適而好為論刺無乃不可乎豫應之曰詩何為而作邪虞書詩言志卜子夏曰詩者志之所之也上以風化下下以風刺上主文而譎諌言之者無罪聞之者足以戒詩果何為而作邪固天子五年一巡守命太師陳詩以觀國風使為詩者俱為清虛浮靡以吟鶯花詠月露而無關於世事王者當何所取以觀之哉曰聖人惡居下流而訕上者今王子在下位而挾其詩以弄是非之權不幾于訕乎曰吁是何言哉詩三百篇惟頌為宗廟樂章故有美而無刺二雅為公卿大夫之言而國風多出於草茅閭巷賤夫怨女之口咸采録而不遺也變風變雅大抵多於論刺至有直指其事斥其人而明言之者節南山十月之交之類是也使其有訕上之嫌仲尼不當存之以為訓後世之論去取乃不以聖人為軌範而自私以為好惡難可與言詩矣曰書曰惟口起羞昔蘇公以謗詩速獄播斥海外不可以不戎也曰孔子曰邦有道危言危行邦無道危行言孫故堯有誹謗之木而秦有偶語之僇亂世之忌治世之所與也得言而不言是土瓦木石之徒也王子生聖明之時而敢違孔子之訓而自比於土瓦木石也耶黃子雍詩集序王禕旴江黃子雍氏善為詩其詩有曰醉夢藁者皆古樂府歌行五言古體總若干卷其辭簡質平實一本於漢魏而絶去近代聲律之弊殆幾於古矣嗟乎若子雍者豈非其意欲追古之作者以為並然可不謂為今世之能言者歟豫嘗論之三百篇之詩其作者非一人亦非一時之所作而其為言大抵指事立義明而易知引物連類近而易見未嘗有艱深矯飾之語而天道之顯晦人事之治否世變之隆汚物理之盛衰無不著焉此詩之體所以為有繫也後世之言詩者不知出此往往惟炫其才藻而漫衍華縟竒詭浮靡之是尚較妍蚩工拙於辭語間而不顧其大體之所繫江左以來迄於唐宋其習皆然是其為弊固亦非一日矣今子雍乃能斥漫衍以為簡屏華縟以為質黜竒詭以為平易浮靡以為實讀其辭知其於天道人事世變物理之際詳矣等而上之詎止於漢魏而已哉故豫以謂子雍之詩殆幾於古今世能言之士如子雍者蓋不可多得也子雍嘗北逰遭世叔季其言不見用其志鬱鬱不得遂賴今天子明聖盡收前代遺才而甄録之故子雍遂擢官於禮部會朝廷方務稽古禮文之事討論潤色出於子雍者居多蓋子雍之學不特善於詩而已豫故論其詩并及其平生之槩使讀之者因得以悉其人而又以見豫於子雍之詩能知其意之所在與其學之所至非苟焉相好而已也黃巖戴氏合族詩敘胡翰黃巖戴志道稱資為益山大家分給諸子且二十年會有警志道父子辟亂山中各自亡匿不相見者久之事平始歸如故於是其子曰祜曰祚曰禧曰祖曰禮五人者奉其父相與謀曰吾骨肉幸脫虎狼之口而田廬貨賄幸不為強有力者之資追念山中日夜悲望恐無復平生歡則今何忍遽自携二而不共此有乎乃合族數十人同居共㸑而志道年六十餘髮不白精力不衰率其子姓習為孝友事朝夕不倦鄉人稱之余聞其事於永嘉李君得其篇什觀之乃為之言曰天地之間有生者以類而聚火之為物也陽之屬也故炎而上水之為物也隂之屬也故潤而下上火下澤其性不同故其卦為睽水在地上其勢必合故其卦為比物皆然鳥獸魚鱉之生也其翔而集者必其羣而後止其躍而潛者必其隊而後趨其或觸搏噬囓而去者蓋必有異焉者矣至于人亦然人之相與處者天秩也非物比也國之君臣鄉之長幼家之父子夫婦昆弟自有生以來未之能易也而家為最親今天下不幸多故民苦兵革恆側足危懼即有倉卒扶老携幼流離顛踣於道窘甚輒棄去不暇顧男女剪為俘囚殺戮相食吾恐生人之類且糜爛澌盡也於是而得戴氏之事以見天理之在人心如青天皎日而人類不至糜爛澌盡者蓋有以也夫猰㺄天下之猛獸也其性嗜食人獨不聞麒麟騶虞為其所殘善人君子天實相之張公藝李自倫之流歷隋氏五代之亂而卒有家族數世不替計其人在當時智不加於楊素勇不侔於賀若弼善宦不賢於馮道積資不冨於張筠其所積習不過尋常匹夫之行篤於孝敬友愛而己耳今戴氏父子兄弟既析而復合焉是以孝友開迹之始也登登之築基之不固則積之不厚涓涓之流浚之不深則引之不長尚殫厥心哉國家之制五世同居者旌表其門異時寵渥所加不在其身必在其子孫矣屠先生詩集序胡翰屠先生彥德越之諸暨人也先生少處里閈習為吏黃文獻公判州事見而才之趣令就學遂折節謝其故等夷覃思於六藝之文百家之言久之學乃大進監書博士柯敬仲自京師歸延致吳中率吳中諸生師事之吳為東南都會而敬仲放逹喜通賔客至者非中朝賢貴人則四方之遊士斆學相長凡國家之故實前代之儀注咸與有聞方是時天下之知先生者非直黃公當朝公卿大夫著聲譽者往往是也元有國自至元承平之後人尚彌文而器能多不足於用先生雖儒者所負魁然而嵬指畫天下事出入古今成敗利害瞭乎若燭照而枚計近在目中貴人與之遊者聼其言莫不厭於心然訖不引手援之以為國家用低徊不偶僅以春秋試有司取一教官反出白晳少年下則其平生之情歡愈怫悱憂思慷慨觸於物者冝有以昌其詩而發焉余始識先生於吳中先生長余數嵗及再見於婺俱且老矣間相與言詩先生雅不自多乃曰子於詩可謂力扼虎射命中矣余聞之恧甚先生其詠我也先生既沒余與其二子亦久不見前年伯勤自越來言先生之詩已彚次成帙徴為之敘今敬仲又來復徴余言後死者烏得辭之古詩變而為選選變而為律雖有作者恆窘於聲偶研揣之間患不足馳騁以極乎人情物理之妙觀於先生㫪容密栗得之自然時涉恢竒不失乎當能發古之所未言而悉吾意之所欲言乃知先生昔者巧力之喻於今見之矣夫詩者所以言乎其志也先生之志不伸於當代豈遂泯而不白於後世乎是用語其二子姑慎藏之天下當有采而傳之者矣上虞孝女朱娥詩序唐肅豫昔過曺娥廟著論云娥未事人而死漢稱孝女禮也今廟祀乃以夫人諡夫有君子而後為夫人生而女死而夫人可乎娥之孝不以女薄不以夫人厚也及至吳見海濵有廟祀天妃某夫人者云本閩中處女死為海神則又歎曰妃配也天之主宰曰帝天妃者豈帝之配耶處女死為神稱夫人謬矣而又謂之天妃可乎歷代祀典掌之宗伯議之朝廷凡非禮若此者孰能革而正之哉今年來上虞邑人魏士逹謂豫曰吾邑有朱娥者在宋治平三年以十嵗女子死於大母之難當時里人為立祠邑南記之者郡從事虞太寧也政和三年邑令席彥稷主簿孫衍尉向泳重修之記之者新定江亮也今祠宇碑碣燬於兵火久矣里長老猶能言其故處往往悲悼歎惋以不得復舊為恨宋熙寧間會稽邑令董偕嘗以娥配享曹娥廟蓋二娥俱吾邑人曹娥廟在江之西地屬會稽朱娥廟既廢不得專祠而僅享他邑他廟之祔食雖娥之神無間於此疆爾界娥之孝不以專祠為重祔食為輕而吾長老子弟所以悲悼慕嚮者則以為非專祠於吾境不可也且舊廟實作於民官於此者未嘗請封請額於上得若曹娥者尤邑人之憾也故吾黨之士咸追詠其事而求豫序之持以為有司告庶幾有所感動得轉聞之上而遂其請焉嗚呼盛哉邑人之心也夫孝風俗之本茍以孝名者千載猶一日也朱娥之死二三百年人猶思而悲之不忍廢其祭而懇懇以為急務蓋娥純孝有以感人心於二三百年之後而其人亦可謂之知夫敦勸風俗之本者有司聞之寧不奮然而與義舉乎不然則亦無異於向之官此者矣娥之未得封諡雖若憾然向使得之而加以非禮之稱若曹娥天妃者猶不得也今國制一新居宗伯者必有知禮之君子於異代之失庶幾革而正之寧肯踵其失乎敢因序是詩而及之以識吾昔者之感且有俟於今之在上者云蒼雲軒燕集詩後序唐肅肅與嚴君宗道别去二載一日馳書來京師示以蒼雲軒燕集諸詩并宋庸菴先生所為詩序且徴肅題其末簡肅讀之再四而興嘆曰夫觀天下之盛衰者不觀諸朝而觀諸野朝廷之間賢舉政修教化下暨六合之內薰然太和則窮山荒澤逸人雅士始得以被澤承休鼓舞歌詠焉以適其寬間安肆之志故逰康衢而聞童謡者不待入冀都之境聆大章之樂而陶唐氏之盛有足徴焉然則諸子所以獲是樂者謂非亂極還治否窮復泰之時而有之乎肅也縻於官守相去千餘里想像一時之勝集猶能以之興懷而况藻繪之文爛然在目金玉之什洋洋盈耳哉且采民風紀國俗史官職也肅不敏固與聞之矣敢書此以復宗道且用質諸庸菴云劉職方詩集序烏斯道天下藝之工者雖出於性聰亦歷嵗滋久然也何獨藝哉至于詩亦然詩之工非直體裁聲律開闔起伏無可疵焉而已年益高功益深則蒼蒼如喬松徑柏老雕健鶻使萎籋披靡之氣屏絶於萬里之外人讀之神自張而氣自王也豈惟然哉意速而詞暢趣深而景融神變化而莫之測識向之工人見其工至是而工之迹泯焉如扁氏之斫輪郢人之斫堊服錬之仙骨蛻而形化然後為詩之工也詩之工固矣然非味道腴而薄世紛亦未足以言詩必理不使情勝道不為物溺天地萬象皆吾之妙焉者也故吐精萃華自無不美矣如三百篇皆思無邪豈流於情欲之私翦翦焉狀物寫情者所可比哉余遊豫章偶會晤太和蕭翀字鵬舉者逆旅間聽其誦所為詩皆清新典麗問其師則職方郎中劉先生子髙也先生行修學充未冠時即有能詩名至四十有九詩粲焉成卷鵬舉刻梓以傳金華宋翰林序諸首以五美備稱焉固已膾炙人口然五十以後之詩則不在所刋卷中鵬舉又裒集若干卷示余余諷詠之使人神清骨爽疲忘憂釋不能去手儼孚余前所商𣙜無毫髮遺恨者也先生之詩不刻削而工不峭峻而蒼不隱晦而深不險怪而神不平淡而化不乖俗而道蓋先生自科第進官職方郎中轉北平按察副使南遍雷瓊北極燕冀閲嵗餘三十載視否泰變遷通塞得喪山川俗尚人情物理舉足以興慨惟道是悟一發之於詩也若是則豈非年益髙功益深以致其然哉昔王子安李長吉弱齡之詩非不鳴於時苐王子安傷於弱李長吉傷於怪又豈不足徴歟余亦好為詩今老矣而詩不及年尚當造先生之門求其不逮先為序諸首簡俾鵬舉再刋以淑諸人人見之又將舍魚而取熊掌矣王敏功詩集序烏斯道世之論詩者孰不曰凡工詩必擬諸古人古人之中孰長於某詩某詩必擇而擬之則庶幾乎音節體裁有倣佛焉者余曰不然今之人信可以擬諸古古之創於詩者又擬諸何哉夫心欲有言則形之於詩詩者代言之音也人之不能已其言而白於人者必有倫有理有開有闔不勞焉而自若爾也否則狂惑而已矣詩之作亦然奚必翦翦焉以擬諸古哉昔優孟學孫叔敖抵掌談笑無不似者及審而觀之終非孫叔敖也魯男子以已之不可學栁下惠之可誰不仰焉孔子稱其善學栁下惠者也詩之欲擬諸古與否者豈不亦猶是耶郡之王敏功氏性聰好學凡賦詩隨意之所至􅋵紙筆立就積若干卷余讀之雄壯雕鏤直致者咸具皆出於性之自然雖未嘗擬諸古人而未嘗不古人也敏功蚤習舉子業至正末朝廷罷科舉即棄去遨遊燕冀所見者益廓而所蓄者益深及歸隱桃源山中尤得夫雲霞泉石之趣一發故變化倐忽不可以一律觀也譬地道之化生草木草木之花葉枝幹大小濃淡豈一刻雕而倣之者哉亦自然而已明文海卷二百五十六
