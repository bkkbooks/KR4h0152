body:
  text: 明文海卷二百五十八餘姚黃宗羲編序四十九詩集釣魚軒詩集序張志道詩於唐贏五百家獨李杜氏崒然為之冠近代諸名人類宗杜氏而學焉學李者何其甚鮮也嘗竊論杜繇學而至精義入神故賦多於比與以追二雅李繇才而入妙悟天出故比多於賦與以繼國風闖其藩籬者秪見其不同而窺其閫奧則謂其氣格渾完骨肉勻稱浩浩乎若元氣坱北充兩問周萬彚而厚且重者適兩相埒也學杜者固誠未易及而間學李者率喜於飄逸弊於輕浮蓋知李之傑於材髙於趣而於學之卓者猶未悉之識也昔者考亭朱夫子疑孔壁後出書序不類西漢文蓋以格致輕故也豫於學李者亦云廬陵龍子髙氏來京師出其詩示豫豫多其學於李而獨得其不輕而重者有異於人人子髙自言為樂府甚多惜豫未盡見也噫詩至於李幾於聖而不可知者豈若有意雕飾涉於筆墨蹊徑者之為哉觀其詩所謂清水出芙蓉者可想見也已豫妄意學焉未闖二氏之藩籬者也子高其有會於斯言乎子髙之詩題曰釣魚軒集於其歸語之曰子之於詩蓋將掣鯨鯢於碧海者矣尚其繼見益有以發豫望洋之歎也夫題黃東谷詩後方孝孺昔人謂詩能窮人諱窮者因不復學詩夫困折屈鬱之謂窮遂志適意之謂逹人之窮有一而貧賤不與焉心不通道德之要謂之心窮身不循禮義之塗謂之身窮口不道聖賢法度之言謂之口窮三者有一焉雖處乎崇臺廣厦出總將相之權入享備物之奉車馬服食非不足以夸耀市井然口欲言而無其辭心欲樂而有其纍其窮自若也無三者之患心無愧而身無尤當其志得氣滿發而為言語文章上之宣倫理政教之原次之述風俗江山之美下之探草木蟲魚之情性狀婦人稚子之歌謡以豁其胸中之所藴沛然而江河流爛然而日星著怨思喜樂好惡慕歎無不畢見造化鬼神且將避之而何慊於區區之富貴者哉此謂之逹可也雖飢寒流離夫孰可以為窮世之人不之察幸斯須之勢者多挾其所有以驕士而不知士之非果窮已之非果逹也象山之東谷有士黃君思銘過余侯城山中其身甚約而其言甚侈形容甚臞而其詩甚麗出其所作數十百篇為余誦之金鏘玉戞宫鳴徴和有瓌竒纎妙之觀而無枯淡寒陋之態余雅為之喜而君復將自此而西歷覽天台諸山以盡岩壑之勝嗟夫近時詩人如君之可貴者鮮矣君行乎世有知君詩之可貴者其亦世之所鮮哉許廷慎詩後序林右廷慎在鳯陽時嘗讀杜詩忽然悟曰古人之髙乃在是矣遂斂其平日所作向火焚之自是歷半年不作一詩惟晝夜誦想幾至忘食寖人或以事問之皆不知所以答駸駸似偶人一日呼童子研墨甚急大書所作感興諸詩極其閎壯時江西劉先生子憲以詩自負見之嘆曰是子且來逼人矣余因取觀之誠非近代人語言也問其得何法而然廷慎曰法可言也意不可言也上士用法得法之意中士守法得法之句似吾詩幾用法矣如是而起如是而終如是而為開閣如是而為抑揚頓挫如是而為輕重高下意之所至詞必至之固未嘗囿乎法亦未嘗廢乎法也古之藝人如庖丁輩千變萬化皆隨其心手所出無他焉亦惟善用其法耳由是而觀天下之術未有不能用法而神者也余雖知其言之美而不能用其言者矣會别歸廷慎詩日有名及去年相見秦淮上探敝囊中得錢二伯酤市中酒相飲寓舍廷慎執酒誦夢豫詩其首數語曰少時結交友悵悵長憶君何期夜來夢復傍平生親握手步藝閣示吾髙世文渾雄脫凡近要妙幾通真豫嘆曰吾豈文士也耶廷慎曰子非文士豈有經濟才如古豪傑者乎豫曰吾雖非豪傑亦不願為文士也廷慎笑曰吾别林生久不意其狂態復發已而又曰子雖狂大丈夫立志當如是也拘拘文字之末抑可悲夫時夜已二鼓各擁衾而卧明日散去俱迫於所職雖時時會竟不能如此時之欵接矣未期月廷慎得疾將死曰吾以稿纍子余謹藏諸篋中未嘗敢易出也出則必大哭失聲思少時與廷慎同在邑庠廷慎頴悟絶行輩獨竒余可交交抵其死時十有四年中别去者惟二年爾然有以書相問也語相通也豈如今竟不復見乎是以思其居處思其笑語猶足以起人哀慕况其手澤之所存者乎嗚呼廷慎已矣間雖恍惚見於夢寐覺視四枕惟月露凄然而已豈不可哀也夫豈不可感也夫金華城川十詠詩序童冀金華漢長山邑也連山環抱郡城其西中斷如玦浙水出焉浙源發東白山繇烏傷西下經郡城南合華溪水為雙溪又北折東騖而入于江其山則北走嚴陵南極閩嶠東逾天台委羽以逹海上之諸峯焉故自六朝以來號為水名郡余生長是邦足迹所逮者北之羣山若金盆紫巖者以十數金盆蓋晉黃初平牧羊地也紫巖則齊劉峻讀書石室存焉又其西為金華洞天南上名山所歷亦以十數唯永康諸峯尤為峻峭而岩靈石室則心所願遊而未遂者也洪武丙辰冬忝徴至京明年而職教全湘泝大江西上五千里凡吳楚名勝若九華匡廬之勝秀彭蠡洞庭之險與夫嶽陽黃鶴之偉觀可以動蕩心目者固亦多矣而猶以未屬厭也蓋全湘距舂陵不三百里舜之九疑在焉雖旦夕心所鄉往迄弗如志及再道衡陽距南嶽一舍而近亦弗獲寓目焉將造物者靳而不畀人乎良由是身匏繫故也暨來霅川覽天目之竒峭覩震澤之浩汙及鄉所經歷者視吾故山若有加焉雖美而非吾土昔人所以興歎也今同郡朱世庸不逺數百里走介吳中持其所居城川十詠徴余序引城川去豫居才數舍密邇石室固平昔所願遊者也所謂十詠若華釡之峯捿霞之洞已多歷年所其他若亭若軒若齊居若樓觀則創自朱氏也使徒有是境而乏軒亭之勝或淪於間曠有是室而非其境亦烏足以辱髙人名士之篇詠哉聞朱氏之居其地今數世矣其所以克專其勝者必有其道矣昔之金谷華林午橋平泉其樓觀之偉花石之夥視朱氏奚翅什伯倍蓰也然而數十年間鞠為茂草雖欲仿像其遺迹而不可得惟唐王摩詰輞川别業逮今猶可想見誠以篇詠猶傳故也朱氏之志其在斯乎雖然是境之勝固藉人言以傳其所以克世有其勝者則賴乎後之人有以持守之也朱氏之處此其必有道矣余髮種種旦夕得告東還或杖策一來克攬竒勝償其目力所未逮者亦足以酬素志矣嗟乎故山百里猶荏苒半世弗克一造其境則夫數千里外所謂九疑衡嶽計終不可得而見矣然獲歸老故山逍遙林壑以優遊卒嵗所得不既厚乎失之東隅收之桑榆尚幾焉舒嘯軒序解縉聲之動也未始不由所感也雷霆之砰訇風水之震蕩聲之出於自然也鐘鼓鏗鏘瓠匏之激越笙磬之擊發聲之出于使然也皆假於器以出是聲也人之歌呼悲號笑嬉哭咷噫嚶呻吟咏呀喜咢慨然而太息劃然而長笑者假於口吻喉舌開閉吸呼轉運動定以出是聲也聲有萬不齊感有萬不齊齊以不齊而自然者出於器器虛而感生焉虛實相形動靜相摩也孰為有形孰為無形孰為有心孰為無心理為之主彼有無虛實動靜皆賔來而子從此之謂齊之以不齊也淦人毛仲鼎兄弟即山林之靖逸無朝市之拏紛主於靜也以舒嘯名其軒豈七聲體備乃獨有適於嘯乎登高而望逺感物而興懷雷電風水自然之聲日變其前而不能動其嘯之靜也舉足而近涉觀物而匱煩感人而匱應浩然思安而劃然之意塊然其中不實其虛也然則其主也固無時而非恬淡沖安之地其感也固無往而非清和會適之天雖得於嘯不泥於嘯非若成公之賦蓋拘拘也歌呼悲號笑嬉哭咷噫嚶呻吟咏呀喜咢亦未嘗不嘯亦未嘗嘯也嘯以舒其志意所觸所傷亦必舒而後能嘯也何也山鳴谷應風起水湧此何如其感也仲鼎知使然之聲不異于自然之聲也天地萬物固一體也則一軒一嘯也心齋坐忘無以異也不然則春蚓秋蛩嚶嗄灌莽之中皆有聲也彼且何所感也仲鼎兄弟與吾友子寧善既已求其記則聲感動靜虛實之妙他日以余言告之非知道者不足辨焉諸士大夫願為舒嘯詩更以此辨之北齋詩序解縉玄氏與赤氏為友周流南北赤氏之居南交也詫之曰天光赫曦萬物潔齊向景而夷明燭無蔽不栗斯以寒拘每熙夷而傲睨振衣千仞濯足滄涯其人不為噢咻疏通易知渴飲不厭清飢食不畏凝飲氷茹蘖無所僵抑子之居殆不如是矣玄氏瞿然而笑戚然而悲曰吾與子行日中子曰暍而清冷之求也求之于外不居於內吾雖與子身南交而心豫所居也玄冥敏寂清氷堅雪凝不以日熱不以火盛不隨焰以馳守吾玄而自怡不覺暑之切肌而莊生所謂入水不濡入火不熱者非幾歟然吾未嘗專其固而居之懷也吾可以南而子不可以北也子且之吾北齋而觀焉於是赤氏奮目舉頥頳吻亢眉勃然曰我且適之玄氏不之拒也未至乎朔漠之野而已愁於燕易之方盱衡於凌層墮指而栗脛曰豫不能為此行也心服玄氏獨與道俱不栗不熱猶不磷緇也豫聞此久矣前年西昌尚仁蕭先生與觀夫羅氏孟昭之北齋豫舉以詰焉先生喔然笑曰有是哉孟昭從豫遊今其子又從豫遊豫嘗謂道無不在也北齋之景與諸士君子能言者歌之詠之無所不至矣不知他日孟昭與其子出是北齋而南也東西行也能不忘其日與蕭公遊而讀書談道如在北齋時否乎如常以是為心不炎之附而寒之栗也則先生之道無不在之言審矣今年先生沒孟昭出此詩凡若干首敘以辨之吉水莊宴集詩序解縉蕭侍御楊忠襄文節之里至本朝之初有十老者道存先生為之倡和而隨之者蕭之良曰從字與善衎字樂善楊氏則思忠思文道濟廷璋彥璋彥敬劉氏子通合而命之曰莊溪十老相與月為一會會必飲飲必賦詩循環然亦時有嘉客若歐陽先生師尹孫廷望廷璧聿修家季父原祿雞魚蔬笋取具隨時而文字之歡樂近所未有也且孰無老者田農草坐未足與此樂也孰無宴者羶圍妓狎未足與此樂也孰無詩者孤嚶寂詠未足與此樂也陶淵明而得十人者其必不為虎溪之逰也矣若此十人者偶聚一堂偶為一會猶足為後來者之談而况皆文皆賢皆夀連會而連嵗也哉蘭亭數篇猶或以傳而况此盈帙也哉然豫平生亦嘗敘論天下是編也僅於吾吉水見之且十老者今皆有後能文樂善令子仲素求豫序則十老者又前顯後賢也難矣哉仲素諸賢勉焉老而繼焉豫時謝事則將繼豫季父為嘉客也送楊修撰詩序楊士竒仁宗皇帝臨御之初下詔求賢山東按察司首舉仲舉明年徴至吏部尚書屢試文章奏授翰林檢討預修永樂洪熙實録升編修又修宣德實録升修撰士竒交仲舉五十年仲舉淳厚而坦夷貞靜而直諒非聖賢之書不讀非合禮之文不窺言行雍容未嘗有過粹然如玉也余嘗升其堂拜太安人髙年懿行言有師法退而交其兄伯升惇實恭謙簡靜坦易一家之間慈孝友悌溫然如春也余交友多矣求其人如仲舉固鮮求其家之母子兄弟如楊氏加鮮故余初别仲舉也恆思之不置及出而仕同在翰林又各牽職務不能如往年之散逸而適也仲舉今謁告歸展先墓武昌少師少保兩楊公禮部侍郎兩王公以同史館故賦詩送之余最故當序簡首蓋豫因之有感焉水木本源之心人人同也今之仕者大率三四年五六年逺者十餘年皆得省桑梓拜丘墓以伸追逺之情士竒之寡昧叨祿三十有八年訖無寸補徒以寵恩之厚而不能一日少伸其私于别伸舉云何為情又念少壯遊武昌往還幾十年於時同輩六七人皆志合道契相好相益篤交誼于金石抗志尚於浮雲殆不知有人間冨貴憂患事若將終身焉者既不能如志相繼多出或仕或處今亦多謝世獨仲舉士竒兩人存故余於兹别亦難為情嗟夫山川不改古人之遺迹故在仲舉展省之餘鼓蘭枻絶長江登禹書之大别俯屈騷之江夏南望曹孟德周公瑾之赤壁東睇蘇子瞻之樊山雪堂因舊遊興懷舊交而有存沒之異仲舉亦豈能忘情也哉動於情形於言嗟嘆詠歌必有不容已者明年北上必將倒囊以慰我若夫勵之為臣之義而戒滯於私者君子之心何俟於余言賜遊西苑詩序楊士竒宣德八年四月二十有六日上以在廷文武之臣日勤職事不遑暇逸特敕公侯伯師傳六卿文學侍從遊觀西苑以息勞暢倦於是成國公臣勇豐城侯臣賢新建伯臣玉少師臣義少傅臣士竒臣榮尚書臣璡臣濙臣中侍郎臣驥少詹事臣英臣直侍讀學士臣時勉臣習禮拜命以行時少保臣淮來自退休承命偕行凡十有五人又敕中官導自西安門入聽乘輿焉及太液池而步太監臣誠奉宣聖旨令遍歷周覽從容弗亟於是誠導之循太液之東而南行觀新作之圓殿返而觀改作之清暑殿臣誠為臣勇等言二殿皆皇上奉侍皇太后宴遊之所也臣勇等仰瞻殿廷周廡規制髙明繕作精密凡所以供奉之具潔清鮮好靡不悉備俯而思惟皇上之聖孝皇太后之盛福皆古今鮮有遂拜稽歡呼萬嵗乃降而登萬嵗山至廣寒殿而仁智介福延和三殿及瀛州方壺玉虹金露之亭咸得遍造是日天宇澄明纎塵不作引而四望山川之壯麗卉木之芳華飛走潛躍之各適其性萬象畢陳胸次豁然心曠神怡百慮皆淨信天造之佳境而人生之甚適也巳而中官傳奉上命賜黃封之酒御厨之珍令咸醉而歸又拜受命方爵數行時久未雨忽雲隂東來微雨霑席倉庚如簧和鳴不已衆益以喜相與引滿勸酬盡醉而出臣聞一張一弛文武之道皇上統四海之廣撫兆姓之衆一日二日萬幾則以間暇遊焉息焉且奉天倫之樂於兹誠冝又俯矜左右執事之勤亦俾之預有今日之適恩甚盛也於是羣臣欣幸遭遇賦詩者若干人詩總若干首臣士竒預侍宴間於兹屢矣是以謹序於卷端云東郭草亭宴集詩序楊士竒聖天子嗣大寶之明年改元正統仁義之施洽被邇遐稿者以蘇仆者以植萬彚咸暢而凡中外小大之臣咸洗濯修飭祗奉法度天子恆昧爽朝百官親萬幾既即御經筵文學從臣執經左右講説堯舜禹湯文武周公孔子之道日恭日勵不敢怠逸乃三月之望有賜假于是講臣九人豫約郊逰以娛一日之暇是日早朝退聫騎出文明門禮部尚書胡公適邂逅焉遂偕東行二里所鴻臚卿楊君思敬望而欣然出迓指顧道左而言曰此中可以少憩也皆下馬徑而入折稍北曠地可百數十畝環以葦樊樊之內皆蔬畦麥壠溝塍秩秩如畫中置井作轆轤引泉灌注凡種藝具有條理蓋思敬别業也衆從容周覽還坐井傍栁下共歆豔思敬之樂思敬飲客嘉茗遂治具延入坐小亭亭覆以茅儉質而清雅幽邃而闓爽亭之外雜植名卉異果周垣以護之垣之外樹桃李杏時花盛開翛然有塵外之趣思敬舉酒樂客一叟絃歌佐之爵行無算客亦歡然傾寫皆賦詩留亭中已而夕陽冉冉薄西山思敬送客出曰願嵗以是日候從者於斯又謂士竒曰願序詩俾後之人知衆君子之嘗樂於斯也夫君子之樂豈茍焉者哉何也生民之失寧非樂也處非其地弗樂也與非其人弗樂也今聖明在上百職舉而民生遂海內無事可樂旦暮劬於職務而得適意於曠間蕭散之濵以坐玩夫時物之發育可樂斯集又皆卿大夫之賢藴道德而服詩書志合而言契靡不可樂矧思敬好客有鄭當時陳孟公之風若之何不樂哉樂而形諸詩歌樂之至也後之讀詩者尚考其樂之所自詩凡十首皆近體是月某日敘沙村江樓詩序楊士竒沙村江樓者鄉先輩劉伯川之所作也沙村在吾邑之南山水深邃幽僻之處四方往還之迹所不及而劉氏世居之伯川劉之秀而文者樓據沙村之勝傑然而特出鄉名卿巨老皆有賦詠紀述歷世變故伯川沒無子簡牘散逸無存而樓亦久仆其從弟伯塤今即故址復作之伯塤能記憶劉尚書子髙故所題樓中長句及所寄伯川近體之詩間於翰林諸公誦之諸公聞尚書江樓詩皆喜而繼作者曽學士而下若干人伯塤併梓之以求豫序樓始作於伯川余雖不及見然觀伯川可以知之伯川先公同門友嘗聞邑老言其家甚冨於崇儒禮士汲汲恐有所未盡元季兵亂攻剽充斥民奔竄深山窮谷不能保一時率視沙村為王官谷而邑之士大夫挈妻子走依伯川伯川傾倒迓迎館榖之不使有幾微羈旅之意益久不厭凡依伯川者皆如家焉尚書所寄近體蓋謂此也伯川平生輕財如糞圡年四十尚有田數千畝一日悉散豫其親戚閭里又散遣臧獲獨與其妻處敝廬數楹僅蔽風雨而旦暮饘粥休休自得也平居不與俗人接然善觀人且喜奬掖後進士竒年十四五與陳孟潔往拜之皆以故人子見愛是日雪霽酒酣以豫兩人循溪行詠命各賦小詩言志孟潔對曰十年勤苦事雞忩有志青雲白玉堂會待香風楊栁陌紅樓爭看緑衣郎豫即一時景趣塞責曰飛雪初停酒未消溪山深處踏瓊瑶不嫌寒氣清人骨貪看梅花過野橋伯川顧孟潔笑曰十年勤苦只博紅樓一看耶又曰不失一風流進士顧豫笑曰雖寒士當耐又曰人有不為而後可以有為其勉之後伯川卒二十餘年孟潔登第為翰林庶吉士而卒今又二十年余幸存餘喘皆如伯川言然豫未能有副其所望恆用內愧伯塤自刑部主事再升郎中相與同朝每共論往事追念前輩髙風逺韻不可復得今喜伯塤能繼其作樓之意也故因敘諸公之詩併及伯川為人大略云送翰林侍講陳德遵詩序楊士竒余與德遵家居里巷相比幼而學也孤苦相類仕而官也職業相聫於論議趨向亦靡不相契余去鄉二十有五年德遵亦十有餘年水木本源之念皆未嘗斯須忽忘也幸遇明天子推恩官其先世又俾得以展省歸顧余之菲薄辱在公卿後不敢先其私而德遵奉命書還登先人之丘壠拜俯薦告以昭寵貺而申其孝思退則會其族姻鄉閭以寫夫久别契濶之懷何其榮且樂也於是士大夫相與賦詩贈之而委首簡於余余因之有感夫族姻鄉閭之素厚於吾徒多矣始來而餞之也愛之祝之冀速其逹聞其霑一命進一職則居者交慶於家行者樂告於途曰吾邦之華也又聞克慎厥行修厥職則老者興嘆少者興慕曰吾邦之華也而聞有弗率於道則閔焉以戚而猶幾其改之以不忝吾邦也嗚呼其忠且厚於吾徒如此吾何以報之哉古之禮君子雖貴且冨不可以加於其宗其鄉而吾鄉前輩尤致謹於斯百年之間耳目所及舉其大者一二人元盛時先少傅吟忩先生以翰林待制朝列大夫歸恂恂謙溫不改其布衣時而嵗時宴聚閭巷間無貴賤貧富一以序齒而傾寫無間洪武中劉槎翁先生以吏部尚書歸尤謹謹下鄉里於親戚鄰曲雖至貧賤恆相歡洽雖童丱接之不見有惰容雖畜一騎未嘗以行城郭中君子於族姻鄉閭其道無不然也前輩逺矣後生寡昧無聞挾其貴冨忘其桑梓之恭敬忽父兄之交遊矜傲淟涊其為薄如此夫安知冨貴之不可終恃也哉幸吾鄉之未見斯人也而吾道路所見蓋不少矣每與德遵道論及此未嘗不共駭異愧汗而何幸德遵之歸以繼前輩君子之行以答鄉人長老愛厚之意蓋君子之行必信於鄉人而後可以信於天下德遵尚以吾言歸諗諸來者其毋俾胥淪於薄也西巡扈從詩序楊士竒宣德甲寅秋居庸之外懷來保安宣府萬全皆大熟上慮邉人安于足給而忽警備也乃九月甲申車駕親巡飭之詞林從者士竒勉仁宏濟德遵士竒年七十特給輿卒二十人而道中氣候清和動息舒徐號令嚴肅行者不勞居者無擾間駐蹕平曠命將士飛放馳射用閲武也是月丁酉至洗馬林蓋去宣府西百八十里洗馬林者舊名蕁麻林語襲訛也時蒙古阿嚕台之衆為衛拉特摧敗狼狽假息塞下左右從臾希寵迎合之臣多請掩捕之者上曰朕知飭備耳困人於厄非王者事不聽從臣中士竒為最不習兵事間以文事承顧問而寵過恆均一夕召問士竒卿數日馬上亦賦詩否士竒惶恐叩首上慰勞再三既班師十月甲辰至北京扈從往復裁二十日其間情之所至亦時見諸賦詠凡得小詩若干首記憶前五年從巡邉至宣府往復二十日在道未嘗不寓興于詩而以今視昔年益邁氣力益衰詞意益鄙陋無足采特以其發於一時之扈從而將來亦可考見嵗月故遂録之而不棄云重逰東郭草亭詩序楊文敏正統紀元三月望日余與諸君子逰集于鴻臚卿楊君思敬東郭之草亭其宴樂之盛皆形諸詞章思敬亦甚以為難得願相與為嗣嵗之期少傅廬陵楊公著其語於序矣去年以公務弗果行乃以今年兹日尋舊約其景物暄妍園林幽勝俯仰如昨而酬唱欵洽詠歌雍熙文明之化有加而無替惟朋簮之盍視初會少二人焉因相與慨嘆以為斯須之樂有不偶然得也詩既成屬余序首簡洪惟聖天子在上治道日隆輔弼侍從之臣仰峻德承宏休得以優遊暇豫登臨玩賞而嵗復嵗誠可謂幸矣意之所適言之不足而詠歌之皆發乎性情之正足以使後之人識盛世之氣象者顧不在是歟昔王右軍修禊事風流瀟灑然當典午偏安之際文潞公耆英會志趣髙邁又多出於衣冠謝事之餘今余與諸君子慶遇難而聲氣同使東郭草亭不減蘭亭洛社之勝是又可嘉也雖然斯一日之歡爾而尚拳拳思有以纘之則夫所以續其聲光於百世不朽者當何如也余又願與諸君子加勉焉明文海卷二百五十八
