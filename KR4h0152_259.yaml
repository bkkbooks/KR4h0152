body:
  text: 明文海卷二百五十九餘姚黃宗羲編序五十詩集南郭子詩序劉定之南郭子者萬安東溪郭君季銶之别號也余少時常一訪焉君方弱冠而尊府即溫翁尚無恙間出所為賦數首示客豫從旁讀之鏗然金石之鏘鳴粲然珠玉之磊落私心起敬以為若君者異日不逺到不止也其後豫叨竊科目日碌碌世務君則留心古學囂然養髙泉石間或勸之仕輒搖首逺去蓋彼此契濶者四十年于今雖常音問相及獨時時往來于懷恨不獲一見以敦夙好也嵗冬十月忽寓書以所作南郭集一帙遺豫屬序豫受而閲之纍日其五七古體出入李杜律絶則倣盛唐諸賢為之大篇短章舂容間肆察其志蓋欲上追古作以與之並非獨徇世俗之好而已也豫因為之嘆以謂向日所見以起敬者既以為難得不意今之造詣一至于此也則又嘆國朝列聖相承網羅豪傑天下之材自毫髮絲粟以上靡不出為時用以謂文章當止於館閣而已山林之下無復有之乃今得見有如君者因又疑世或有之蓋豫未之知也雖然設果有之而豫偶未之知亦必有能知而道之者而不少概見何哉然則如君者果然不多得也君年未六十不幸以疾廢然君素髙尚就使不廢於疾豫知其不肯局促於祿位也審矣豈非其負於已者重故其視於外者輕邪將自得於言語文字之工而以為功名不足懷邪惜也君不求知於人人亦莫之知者豫雖知之無益于君也雖然若是集者自足以傳於世知不知何患哉敬序以歸之浙水較文詩序嶽正文士之末也不深於道者不足以知之知文亦難矣莫如古者之文易詩書春秋禮樂皆載道之器語曰學者守一經皓首不能窮不能窮者不深於其道也道不深而強自誣曰我知文我知文何異乎審音以聵鑒色以盲其不白黑而清濁者亦幸中而偶得耳夫何恃而可信哉試嘗論之世之能文者孰加於周公孔子周公傳易孔子繫之孔子作春秋遊夏不能為一辭之贊則知雖賢者猶不足以知聖人况以不賢而知賢者乎是故皓首不能窮之談非誣人者也雖然周公孔子不可尚矣漢以還作者甡然而獨名揚雄韓退之為能文雄作太玄法言張伯松不肯一觀劉歆觀之詆為廢物雄之名蓋終漢世而後顯退之凡三黜於禮部而自訟曰為文而為舉世之所不好好退之之書自宋歐陽永叔始以雄退之之作者尚暗於當時而有俟於後來又况其下者乎其或見推致與於流輩時俗者非借重於髙譽托筆於時名如左思之賦張華之詩則亦下里巴人之唱和非如體道者真有所見聞而黑白清濁於去取之間也嗟夫作者代有而具目者不多見知文之難其亦信矣哉郭明郁彥文蜀之長夀人也以春秋發解嘗分教於晉寧古鄭二邑涉學録為今駙馬都尉薛桓賔師授徒京師京師子弟各以其所習經求指授者未嘗辭之其處而稱逹才出而掇巍科躋膴仕者問其所從遊則曰郭先生吾師也豫用是聞其名熟願見而未暇也景泰庚午之嵗明郁將校文於浙議者謂山之東西中原之巨藩也而江南文物浙水為盛明郁乃能歷持文柄其延譽於天下也又何博哉于是相與咏嘆其盛形而為詩詩成授豫以卜氏之任嗟乎易之竒書之古詩之婉春秋之簡嚴禮樂之辨博其義奧其辭微其文未易以通也而明郁能指授諸生使之有成非明於道者哉夫既明於道而用以觀人之文是非美惡之辨有不能逃於洞矚鑑照之下者矣今天下之大不可謂無所謂揚韓之徒者明郁自蜀來京師嘗遍觀全晉放於齊魯今又南遊兩浙其亦有所謂其人者乎使其果有而亦願見之否乎豫嘗怪時俗流輩以知文自負者大歸是古而非今貴耳而賤目乃今得明郁明郁其亦有意於是言乎則吾求償宿昔之所願見者而與之雄辨天下之文於揚韓之後矣姑書此以為先容永感詩序嶽正登科之制録及三代雖存沒有間而皆書書之之法雖立義不一而皆以為榮其父母祖父母存者曰具慶曰重慶慶幸也具與重又大其幸為之幸也父存者曰嚴侍母存者曰慈侍侍奉也一親僅存既非具非重者可擬故變其例而各以所存者書之曰侍幸其猶有可侍者為之幸也乃若祖父母父母俱不存焉者雖有祿位其誰與侍是不幸也不幸而為之幸故不得已而婉其辭曰永感感者傷也永者無極之稱也使人傷而至於無極其為不幸也亦大矣嗚呼永感之詩義其然乎景泰初科是為辛未與榮録者殆二百人前監察御史今福建按察僉事巴蜀牟公實用永感書幸而公則弗自幸焉每抱録泣曰登科者先志也先志遂而先人逝將誰榮乎於是與公同升而稱同年者多得公志形為歌詩所以褒公之賢慰公之懷抱而悼公先世之不幸者悉矣公既帙而為書乃述其故以俾其屬燕山嶽正者序之正聞公於書無所不讀于古今上下事變無所不究知而通習自職內憲至僉外臺以得體聞於天下也久矣願得與公論之孟子曰君子有三樂固道德事無容議矣乃若王陵者從漢去楚楚得其母以招陵陵母乃伏劒以固陵志有若溫嶠者勇為越石通使江左其母不聽嶠乃斷裾而往母死阻歸竟違本志此二子者勳業忠誠暉閎漢晉流播今古君子曰未若徐庶者遺名以全親之為是也大都志節之士多遜情飲氣於功名之會豈非纍於親之存未免有所顧慮忌避乎哉且如正者雖曰不敢擬公亦嘗忝冒科目承恩之日頗以慈侍自慰及乎得罪播遷禍延老母退而申慕已嗟無及矣靜言思之縱令得似二子成功業尚不足以贖其終天之憾况區區者烏足道耶又如公者當為便為無所顧忌所以道行於一時他日功名之就足以班二子而無二子之遺恨焉嗚呼君子觀之政不必以仕而逮親不逮親者為幸不幸可也甘谷堂詩序張寧風俗通載南陽甘谷有菊大滋液浸漬谷中千餘家飲者皆髙夀邑士徐君公舉早學醫讀東垣丹溪書得中和治法環境之人仰其藥少者安老者康疾者良愈用相與號所居為甘谷堂其名未著也去年冬友人張用宏患重疾幾危始延致公舉公舉至視大驚曰幾枉君命然非死病用藥反耳投數劑而復察公舉始無吝情終無德色諸所交用宏者甚難之乃即故號為詩以謝求余序首簡余聞神農書以菊為養生上藥能輕身延年水録以乳泉石池源深靜活為佳品甘谷合二物之美冝飲者多夀然所以能致夀者取便而用常也公舉誠能虛懷有容絶去畦畛使人不難於求不為物間則環境之地皆甘谷自是可户致夀於愈疾也何有吾因是有感夫天之厚於入非獨南陽古者山澤之利未窮土地之力未盡君民有相足之義公私有相須之功上無甲兵土木禱祠征斂催科借募之煩下無道釋逰冗技術聲妓竒麗淫巧之耗凡民所資以養生佚世者皆得便取而足於用燮理承化者又為之撙節道制修和相協以安全之所謂生之不傷扶之不危節其力不盡故其民多夀後世法制漸密休戚相懸無古人之所有而有古人之所無向之所資以養生佚世者取之有禁用之不給而飢寒勞困之病生矣為是故也農迫於耕商迫於貨工迫於藝士迫於業及其從仕又反以所病病夫所治之民雖萬有甘谷亦將蘇汲盡矣奈之何不相尋於顛連也古人謂逹為良相不逹為良醫民病甚矣愈之者其惟良相乎方今明良相逄四海仁夀公舉方將教其子永泰向學從士仕其道進矣因序詩也聊發吾之所感學詩齋卷跋張寧孔子謂伯魚不學詩無以言所謂學與言通逹志意體切事理而自有以善於言非欲誦習其文以資辨説也自觀興羣怨之教衰而三百篇勸戒大義盡湮於聲律文詞之末雖盛唐諸家亦不出此但視漢魏以降稍能和平雅淡庶幾溫柔敦厚之遺意猶有存者耳先輩謂刪後無詩蓋自有見或者遂洞視近古至謂宋儒之詩為無物幾欲一掃而空焉者棄本逐末弊一至此夫文章固各有體聲韻亦自不同然未有外理趣舍經典而可以言詩者詩有清新者亦有優逸者有沉著者有痛快流麗者有豪宏放蕩不可拘者有摸擬想像捕風捉影竒怪百變者有淺薄掇拾隨口滑稽不經蹈履者偏長彼善自昔有之使不切理逹情不根藝實則淫哇巧豔荒唐汗漫之言過耳輒了無復遺意於宋詩也逺甚况三百篇乎故善詩者必有定志髙識周知博覽本始於聖賢之言師意變文涵融渾化寓理趣於聲律之內托著述於比興之餘如八音協樂五味和羮充然有成不見其迹斯能兼總百家超絶羣作古之人有如此者杜子美是也余嘗記前輩有恕齋詩一聨云庭前生意留芳草林下歸心放白鷴道德經典之文於詩何礙而薄之至此是故欲學詩非有得於學問之力雖近古疏節猶不可及况六義大要哉余適與人論詩其言以金針集所載大病宋作語方往復適武林劉生景清以學詩卷求題因舉切要為生告且以質諸尊君竹東俟生他日過我徐與之極論題鍊雪齋詩文册張寧陸羽茶經所載原法具備其品第烹瀹節候有似神仙家煆錬之法至所辨用水必地之幽曠乳石漫流逺隔渟浸者是尚與陶榖烹雪意類雪本和氣嚴凝不由地方宛有真味逮醫所謂上池之水於茶絶冝合羽法與榖事而風致益髙此鍊雪名齋之本意也册中作者皆鉤深道逺脫略故常有雕炙之論甚哉鄉先輩之竒於文也因竊歎漢唐之時文猶爾雅公府而下士大夫居室妄自標榜者絶少為之文者亦惟紀敘其實而華之以論議耳不専以名言相夸也繇宋及元人不古若凡里居林屋山園池館甚者置一器物繪一樹石皆巧有名稱以相矜侈為之文者一切依題並號固已淺近况有立異以為説鑿空以為髙徇俗以為好爭竒競妍擬非其倫以相遷就其上者不過莊惠之流而下焉者益蔑如也於紀載之實何有噫淳朴既散巧偽日滋民之居處飲食亦不能不眩於名實况文與行哉此册有圖有記有説有題詠皆為崇德陸景宣作為海昌沈景暉所得噫距洪武至於今僅百年迹其詞翰又非今日可及矣顧瞻遺文益增浩歎也夕惕齋詩集後序陳獻章受朴於天弗鑿以人稟和於生弗淫以習故七情之發發而為詩雖匹夫匹婦胸中自有全經此風雅之淵源也而詩家者流矜竒炫能迷失本真乃至旬煆月煉以求知於世尚可謂之詩乎晉魏以降古詩變為近體作者莫盛於唐然已恨其拘聲律工對偶窮年卒嵗為江山草木雲煙魚鳥粉飾文貌蓋亦無補於世焉若李杜者雄峙其間號稱大家然語其至則未也儒先君子類以小技目之然非詩之病也彼用之而小此用之而大存乎人天道不言四時行百物生焉往而非詩之妙用會而通之一真自如故能樞機造化開闔萬象不離乎人倫日用而見鳶飛魚躍之機若是者可以輔相皇極可以左右六經而教無窮小技云乎哉今之名能詩者如吹竹彈絲敲金擊石調其宫商髙者為霓裳羽衣白雪陽春稱寡和雖非韶濩之正亦足動人之聽聞是亦詩也吾敢置不足於人哉少參任君蒞吾省間過白沙携其先公詩集求言於卷末豫故以詩道略陳之若夫先公吟咏之情具在集中覽者當自得云認真子詩集序陳獻章詩之工詩之衰也言心之聲也形交乎物動乎中喜怒生焉於是乎形之聲或疾或徐或洪或微或為雲飛或為川馳聲之不一情之變也率吾情盎然出之無適不可有意乎人之贊毁則子虛長楊飾巧夸富媚人耳目若俳優然非詩之教也甚矣詩之難言也李伯藥見王通而論詩上陳應劉下述沈謝四聲八病剛柔清濁靡不畢究而王通不答薛收曰吾嘗聞夫子之論詩矣上明三綱下逹五常於是徴存亡辨得失小人歌之以貢其俗君子賦之以見其志聖人采之以觀其變今子之言詩是夫子之所痛也南朝姑置勿論自唐以下幾千年於兹唐莫若李社宋莫若黃陳其餘作者固多率不是過嗚呼工則工矣其皆三百篇之遺意歟率吾情盎然出之不以贊毁歟發乎天和不求合於世歟明三綱逹五常徴存亡辨得失不為河汾子所痛者殆希矣故曰詩之工詩之衰也夫道以天為至言詣乎天曰至言人詣乎天曰至人必有至人能立至言堯舜周孔至矣下此其顔孟大儒歟宋儒之大者曰周曰程曰張曰朱其言具存其發之而為詩亦多矣世之能詩者近則黃陳逺則李杜未聞舍彼而取此也學者非歟將其所謂大儒者工於道不工於詩歟將未至於詣乎天其言固有不至歟將其所謂聲口弗類歟言而至者固不必其類於世或者又謂詩有别材非關書也詩有别趣非關理也則古之可與言詩者果誰歟夫詩小用之則小大用之則大可以動天地可以感鬼神可以和上下可以格鳥獸四時行焉百物生焉皇帝王霸之褒貶雪月風花之品題一而已矣小技云乎哉都憲朱公以其所為詩編次成帙題曰認真子集授簡於白沙陳獻章曰為我序之公昔語我於蒼梧曰詩非吾所長公豪於辭矣而未始以為足認真子名集公意有所屬顧覽者未必知而吾以是覘公之晚節也詩雖工不足以盡詩而况於盡人乎謂吾不能於詩而好為大言不知言者也公名英字時傑郴陽人由進士歷官中外節用而愛人定山先生詩集序李承箕箕聞定山先生之於詩嘗求之往古以三代之餘波流至於纎穠偶麗而穆穆熙熙之風衰矣近體莫盛於唐而唐莫盛於天寶於是求之少陵以其大而肆憂愁而流離自以為未足於是又求之宋元之間破簡齋的契劉因三昧餘則決其長垣啓其扄鑰親見其人而下上一堂之上風踔乎宇宙電跳乎岩谷濤舂乎髙天氷僵乎厚地乘之以盛氣將一掃而空之夫以驚風震雷一鼓而雨物固有生者矣茍不伺夫三日之甘而欲求速化之術未見其能濟也孟子曰君子深造之以道欲其自得之也自得之則居之安居之安則資之深資之深則取之左右逄其原故君子欲其自得之也蓋有不援天道而忽人事之切當不涉虛詭而悟情性之自然不言鳶飛魚躍不必隨栁傍花天機默契乎無聲真樂何關於外物是故定山之詩非魏晉詩非唐非宋非元諸名家詩定山之詩四方學者爭讀之每以不得其全為恨獻臣賣馬鏤板行之俾豫繫一言於首同年倡和詩引張詡成化甲辰放進士榜豫省與者凡十有五人迄今存者僅七人耳七人者為楊君景昌吳君美中羅君公旦盧君克濬馬君廷進葉君子冕其一人豫也正德丁卯同年侯官林公粹夫以憲副督學于豫省亟欲為同年一會也久矣往往奪于公事今嵗暮秋公走書并詩約十月朔假豫第為會蓋公以豫杜門幾二十年假豫第所以就豫也是日適豫以弱息病阻因次韻答公意欲公改會於崇報寺而姑舍豫公弗諾苐改日如舊約焉未幾公以太夫人憂解官不日去矣僉謂公之盛舉雖弗成而公之盛意與夫佳製固在也因率衆和聨書成卷以為公行贈俾豫引諸端嗟乎人生兩間事事有數至於離合戚喜之小小亦莫不有數存乎其間如一會易事耳方公既刻日舉矣而阻於豫復改日矣而公以憂去竟不之果焉矧乎出處顯晦之大者可逆料邪由是以觀吾人不能安分聽命而屑屑焉運知謀事為之末亦多見其惑矣且公詩有云相逄不久還相别遂成詩讖豈非數邪豫既僭引附以和詩二首繼之公詩以見倡之之端而四君之和以齒次書于後時克濬在香山廷進在河源公雖有詩寄之其和與否未之見故弗獲入焉竹巖詩集序張詡詩之為體也甚微而其為用也甚大是故蓄深養厚者其氣充然而其為辭也沉婉以粹其次雄渾以博其次平易以直焉不然則急躁以雜矣膚淺以俚矣艱澀以晦矣良由發之性情胸次卒弗能掩如是而夫人所藴所立恆於詩焉可考見與夫觀人臧否得失亦恆於詩焉不差尺寸也苐目力大小具否何如存乎人耳三百篇後詩人類以功力深造力至功完而法具矣詩不能不為之傳也蓋以詩而重其人焉其間氣節功業之著其人自不能不白於天下後世者則其平生所著作亦不容以弗傳也蓋以人而重其詩焉若竹巖詩集其一也竹巖詩乃前輩河南方伯程公所作其子今知肇慶府事時昭所收録時昭之僚友别駕白君騰霄力請刻之郡齋以傳焉者也刻已二君專使具簡書禮幣徴走文為之序走嘗讀篁墩文集中有為公墓銘稱器宇學問行檢才識在一時負公輔之望如公者不可多得則公之為人蓋新安之傑然者也至論其為學不事辭藻雖時賦詩而緘其稿諱其名終不以自見也迹是以觀公不惟不專以詩名而其詩雖作當時人已不可得而盡見也况蓋棺之後乎兹集特賴時昭克肖而能收録云爾然亦存十百於一二也公揚歷中外幾三十年會計之積甘棠之愛赫然照當時而篁墩猶以為世亦未盡知之則公卓然為新安之傑蓋不誣矣故其為詩也雖不拘拘焉資於功力而性情之悃愊辭意之和平無急躁膚淺艱澀之病亦不愧乎古之作者矣矧其人之可重乎時昭允濟公美其治肇慶也藹然子惠之風騰霄仰髙先哲尤篤同僚兄弟之誼俱足以成郡治而樹民彛是皆可筆也走因序公詩故併及之公名泰字用元竹巖其别號也由景泰甲戌進士起家為大司徒屬出參廣右政至左轄云書白沙先生詩藁後謝復先生之詩或豪或縱或險或戲大肆情於風花雪月之間不拘法律自成一家其氣象頗類邵子而詞或古奧有非淺近所能窺者景泰甲戌嘗遊先師康齋吳先生之門甚見推許遂以所學倡東南後十年復始至小陂聞其名渴欲見之而未能也𢎞治辛酉與方進士純吉評詩及接先生石翁近藁心竊疑之適小兒歸自嶺南復得先生所為詩讀之晚年所得專主於靜似有戾乎先師之説蓋其所與遊者定山太虛諸人日積月纍與之俱化故其形於篇什者多空寂長生之術而君子有不屑焉世之髙明遞相祖述以為吾道之宗僕惑滋甚噫安得起先生於九原而解此惑耶諷誦之餘竊附鄙説於後以俟知者敬菴詩集序羅倫莫論其髙深莫論其淺近通乎性情止乎禮義而已夫竒髙深而卑淺近論詩之通病也以性情禮義為主而不論其髙深淺近焉逹於論詩者也三百篇之為詩國風淺近雅頌髙深然本之性情止乎禮義風雅無異也聖人皆録而不棄焉後世之為詩若李太白黃山谷非不髙深也陶淵明白樂天非不涉於淺近也然君子皆録而不棄焉何也夫性情猶水也禮義猶防也水止於防性情止於禮義則不流而淫不流而淫則其為詩也固風雅之遺意矣然則髙深者吾取之非取其髙深也取其禮義也淺近者吾取之非取其淺近也取其禮義也故曰論詩以禮義為主者逹於論詩者也髙深而過於詭刻淺近而流於鄙俚君子無取焉若敬菴先生之詩其禮義之發於性情者乎吾固未暇論其深淺也倫自弱冠則聞先生之名以為卓然長者之風欲一見而不可得也後二十年得與先生之子逰故家遺俗猶有在者故為敘先生之詩而傳之使知先生之可傳者不獨其詩也先生諱某字常恱姓丘氏鰲溪人蕭冰崖詩集序羅倫詩非為傳世作也本乎情性止乎禮義詩不能以不傳也若三百五篇是已當周之盛國風之詩多出於田夫閨婦之口而其辭義之奧音節之正皆可以被於弦歌而為法於天下夫豈學而能哉蓋先王仁義禮樂之教自閨門而逹於邦國由朝廷而下於閭巷所以漸其心志而形諸四體和其聲音而發於文章有不自知其如此之盛也王迹既熄風雅道喪宏材碩士句攻字琢用意非不精用力非不勤卒無異空花眩目好音過耳夫豈才之相逺哉所以教而化之者無其本也然太極之運不息則人心之天不喪是故豪傑之士間生其中亦無愧於古者若靈均之憂憤杜陵之忠愾陶彭澤之沖淡皆本乎性情之真庶乎禮義之正關於民彛物則之大視風雅不知何如惡可以後世之詩例視之哉宋氏有國三百餘年治教之美逺過漢唐道德之懿上承孔孟南渡以後國土日蹙文氣日卑而道德忠義之士接踵於東南其間以詩詞鳴者格律之工雖未及唐而周規折矩不越乎禮義之大間又非流連光景者可同日語也若冰崖蕭公亦其一人矣公諱立之寧都蕭田人登進士科仕至通守遭世搶攘未及上乃自放於詩當其意到駿若觀嶽馬矯若凌雲鶴媚若春園之桃李蒼若冬嶺之松筠視三君子者不知何如亦南渡以後之髙品也公詩宗江西𣲖澗泉趙公章泉韓公雅愛澗谷羅公公為澗谷所知則其詩可知矣同時以道德鳴者草廬吳公以忠義著者疊山謝公公納交於草廬又見知於疊山則其人可知矣公子士贇注李太白詩今行於世公集舊板燬於兵嗣孫儀鳯繼顯前聞欲重夀諸梓屬其序於豫豫嘗病科舉之業詞賦之工害天下之學術欲變之而未能乃為公序而傳之何也喜其近於本不為無益之空言也明文海卷二百五十九
