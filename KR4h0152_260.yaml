body:
  text: 明文海巻二百六十餘姚黄宗羲編序五十一詩集鏡川先生詩集序李東陽詩與諸經同名而異體葢兼比興恊音律言志厲俗乃其所尚後之文皆出諸經而所謂詩者其名固未改也但限以聲韵例以格式名雖同而體尚亦各異漢唐及宋代與格殊逮乎元季則愈雜矣今之為詩者能軼宋窺唐已為極致兩漢之體已不復講而或者又曰必為唐必為宋規規焉俛首蹜歩至不敢易一辭出一語縱使似之亦不足貴矣况未必似乎説者謂詩有别才非關乎書詩有别趣非關乎理然非讀書之多識理之至則不能作必博學以聚乎理取物以廣夫才而比之以聲韻和之以節奏則其為辭髙可諷長可詠近可以播而逺亦可以傳矣豈必模某家效某代然後謂之詩哉顧惟其異於文也故雖以文章名者或有憾焉兼之者葢間世而始一見韓昌黎之詩或譏其為文蘓東坡之詩或亦有不逮古人之歎今觀其宏才逺趣拔時代而超人羣也惡可與不知者道哉鏡川楊先生夙抱古學以文名一世而復深於詩自入翰林三十餘年積晉菴東觀桂坊金坡諸稿若干巻某得而觀之竊以為先生之詩博采深詣典則渾厚成一家言當意所得雜體及七言古似宋五七言律似唐五言古似漢然於其時猶擇以為對非茍同時代稱名字者比而愛君憂國感事冩物則得諸三百篇之為深元之盛時稱范徳機善作劉㑹孟善評聖世稱大家殆於范有所不屑某之愚不知於㑹孟何如也獨是髫丱蒙奬識至於今不改評且益加厚某雖愚不敢以是私於先生葢其名在天下不待知詩者然後知其為重也先生歴編修洗馬侍講學士少詹事以至吏部侍郎天下之望方隆未艾於是疑少達多窮之説為未必然又以見先生之學非於詩焉止也稿以文類者若干視詩尤多則别為巻云王城山人詩序李東陽王城山人詩者黄巖謝君世懋之所作也君居於王城山遂以其山自名君為縣學生七試於有司不得薦客死於武林之邸其從子翰林編修鳴治輯其遺詩得若干篇予讀而悲之其詩始規倣盛唐諸人得宛轉流麗之妙晩獨愛杜少陵乃盡變其故格益為清激悲壯之調思極其所欲言者其死也葢有遺力焉然其序事引物感時傷古憂思笑樂往復開闔未嘗不出乎正觀此亦可以知其人矣夫詩者人之志興存焉故觀俗之美與人之賢者必於詩今之為詩者亦或縴綴刻削反有失其志之正信乎有徳必有言有言者之不必有徳也君之志興不啻乎詩不幸而不見於世非其詩孰可與傳者此輯詩者之志也古稱詩人少達而多窮其固然者與適然固未暇論然其窮也人莫不悲之其悲之者亦不皆賢也而徒以其詩况非獨詩人哉予恒謂天下之士必有負竒抱傑老死於巖穴之下者有士如謝君非詩則莫之知也天下之士不幸而不見於世者何限於此葢重予之悲而益感夫輯詩者之志也君之兄世修為寶慶知府及鳴治皆賢而能詩其所倡和者尤多不在巻中赤城詩集序李東陽詩之為物也大則關氣運小則因土俗而實本乎人之心古者道同化洽天下之為詩者皆無所與議既其變也世殊地異而人不同故曹豳鄭衛各自為風漢唐宋之作代不相若而亦自為盛衰逮至於元其變愈極而其間賢人義士徃徃奮發振迅為感物言志之音者葢隨所得而成焉然亦鮮矣夫自樂官不以詩為教使者不以採詩為職是物也若未始為天下之重輕而所關者固在也然則不得於天下者因其所得為而可求之亦固非君子之心哉浙之東有州曰台古赤城郡地其人固多能詩吏部郎中黄君世顯翰林侍講謝君鳴治誦其遺篇而胥歎曰此吾鄉文獻之懿其不可以廢乃輯宋宣和至我朝洪武永樂間得數十人人若干篇為六巻名之曰赤城詩集初宋理宗時有林咏道者嘗輯為天台集今刻本不傳天順初國子學錄張存粹輯黄巖英氣集而不及旁縣至是始粹然成篇予得而觀之其音多感慨激烈而不失乎正葢宋元李世甲兵饑饉迄無寜居國初一統甫定而其君子猶有感時悼昔之意風標義概或出乎憂患疢疾之餘者皆可得而見也若唐項斯宋楊蟠之徒皆以詩名而世逺不可究故存者左經臣而下不過數十人使數百年之間如二君者時輯而代錄焉當不止是以其止於數十人也則及時而為之其容以後乎哉二君將以是詩屬其鄉按察副使應公志欽鋟梓廣東復懼其未備將益蒐輯以為續集今文教日隆作者彚出方大鳴太平之盛其或有繼二君之志者雖百世可也滄州詩序李東陽詩之體與文異故有長於紀述短於吟諷終其身而不能變者其難如此而或庸言諺語老婦穉子之所通解以為絶妙又若異然何哉若詩之才復有遲速精粗之異者而亦無所與繫杜子美以死狥癖語必驚人斗酒百篇者方嘲其太苦而秦少㳺之揮毫對客乃不若閉門覔句者之為工也是又將以為易耶以為難耶葢其所謂異於文者以其有聲律風韻能使人反復諷詠以暢達情思感發志氣取類於鳥獸草木之微而有益乎名教政事之大必其識足以知其奥窔而才足以發之然後為得乃天機物理之相感觸則有不煩繩墨而合者謂非難作而亦不易作也滄州張先生於文無所不能而尤工詩縱手迅筆衆莫能及及其凝神注思窮深騖逺一字一句寜闕焉而不苟用晩乃益為沈著髙簡之辭而盡斂其峭拔奔洶之勢葢將極於古人而不意其遽止也蘓之詩在國朝必稱高太史季迪合天下而言亦未見决然有以過之者使先生生同時居同地與相馳逐殆未知其稅駕之所而皆不壽以死寜不為天下惜之哉先生尚論古人雖唐以上猶有所擇予以一時一郡論之殆非其志亦姑就其所至者云爾若其恬澹寡欲之心端居自守之操官雖乆而不究於用天下之所為惜者豈知止是哉予先生同年進士义同官甚厚先生之卒其孤璉尚在襁褓求其遺詩不可得後静逸陸先生取諸其從子瓛以留予家而静逸亦卒因與謝方石呉匏菴二先生錄其若干篇為十巻文太僕宗儒以付其所部成府判桂刻於淮安書成屬予序因為題其編之首先生名秦字亨父别號滄州累官翰林修撰卒時年四十有五瓊臺吟稿序李東陽昔人謂必行萬里道讀萬巻書乃能讀杜詩葢杜之為詩者悉人情該物理以極乎政事風俗之大無所不備故能成一代之制作以傳後世非惟不易學亦不易讀也禮部尚書瓊臺先生丘公早能詩信口縱筆若不經意而思味雋永援據該博平生所得近萬篇徃徃好事者取去晩乃掇其存者分類為編殆二十之一而已東陽在翰林從公久近見其所編者如探寶藏入武庫心悸目眩應接不暇葢於此得大觀焉公自嶺海踰江淮以入京師其逺則萬里也自稗官野錄以至金縢玉局縹囊汗簡之書未始不讀其多殆不下萬巻也故出其所得為劇談高論如繅絲炙轂竟日不竭議古今成敗天下之地理風俗平險美惡如畫圖指掌歴歴可概見著而為文如鼇負山鵬運海氣勢軒掲莫之與抗而不獨詩也然公之學亦於詩焉見之夫去古既逺至唐以詩賦取士専門而久業旬煆而月鍊乃有一句合格篇未成而傳誦人口者此詩之盛亦詩之弊也公之學於詩固有所不屑專而實專門者所不逮彼膚見淺識管窺蠡測豈復能盡其妙哉論詩者以氣運為主亦或以江山為助國朝熙平百年禮樂方作氣運之盛固有攸徴而嶺海之秀又水銀丹砂靈芝赤箭所不能當者是詩之成固公學力所就抑豈偶然之故哉公雖欲辭一代制作之名以靳於後世有不可得者矣公所著有大學衍義補已上進世史正綱朱子學的諸書多梓行於世而雜文尤多則别刻以傳兹特其詩集云書沈石田詩稿後李東陽右石田沈君啟南詩若干巻呉文定公序之詳矣初文定以冩本一帙視予欲有所序述嘗觀擬古諸歌曲愛其醇雅有則忽忽三十餘年聞石田年益髙詩日益富至若干巻總之為若干首間始刻於蘓州而文定已捐館舍翰林呉編修南夫來自蘓則以石田之意速予予憮然感之夫形聲之在天下皆出於自然然亦有詩歌以為聲藻㑹以為形者其大用之朝廷邦國固未暇論而閭巻山林之下或不能無若論其至亦可以通神鬼奪造化降於後世乃流為技藝之末而造其妙者猶以為難說者謂詩為有聲之畫畫為無聲之詩二者葢相為用而不兩能若詩之為聲尤其重且難者也石田寄意林壑博渉古今圖籍以毫素自名筆勢横絶夐出蹊徑片楮疋練流傳遍天下情興所到或形為歌詩題諸巻端互以相發若是者不過千百之十一故多以畫掩其詩及其撫事觸物感時懷古連篇累牘則藏於其家非遇知者斂不自售今既梓行而人誦則詩掩其畫亦未可知而惜予之不盡見也姑以是復南夫且終文定之諾云石田名周蘓之長洲人石田其所自號年八十有一叙錄王城先生詩後謝鐸成化七年辛卯秋九月某日鐸叔父王城先生卒於杭訃達於京師鐸南望踊哭既而黄吏部世顯來㑹哭明日吾鄉大夫士來弔又明日大夫士知先生於鐸於吏部者皆來弔又明日吏部與予謀所以塞哀者不得從故篋得先生諸嘗徃來詩四十九篇去年錄自家者九十五篇又二十七篇則廣東鄺尹載道所得也總之百六十九篇為三巻以告於太史氏賔之李先生先生曰悲哉窮也此可以知其人矣獨詩人哉非其詩固莫可與傳者乃遂為之序鐸再拜泣以為質而以徴銘於䝉泉先生岳公公曰不誣其可傳也哉嗚呼先生之行之材之學鬱不得施者餘二十年而其在家庭在鄉黨在朋友在師弟子者可信也詩則一端耳予初錄是詩以藏也謂以念暌離代教益而豈知其至今日而天下大夫士之知先生者止是哉嗚呼先生所立以不朽者止是哉鐸忍讀先生之詩耶太守叔父先生伯兄皆鐸之所從以受業者也命鐸叙所以錄先生之詩者遂泣而志諸其末先生之詩多不存稿此葢其十之一云重刻石屏詩序謝鐸宋之南渡吾台文獻實稱東南上郡而詩人亦多有聲江湖間若石屏先生戴公式之其一也然當其時台之人以科第發身致顯榮者何限而石屏獨工於詩以窮豈詩固能窮人哉葢天之於富貴徃徃在所不惜而於斯文之權恒若有所靳而不易以予人何也斯文天地精華之氣必間世而後得富貴則倘來之物趙孟之所能賤者也故一代之興起而為將相者比肩接跡而文章之士或不能以一二數幸而得之必困折其身拂鬱其志俾之窮極而後已若漢之蘓李唐之李杜宋之蘓黄其於詩也皆出於顚沛放逐之餘而後得以享大名於後世夫豈易而與之哉雖然其視當時富貴之極而冺冺無聞者則不啻霄壤矣是以古之君子寜為麟踣無為鴟鳴寜為玉碎無為瓦全實亦有見乎天之意其所重固在此而不在彼也嗚呼豈獨石屏一詩人哉三代以降以道致窮雖上聖大賢如孔孟者亦有所不免然則石屏之以詩窮亦何足怪哉石屏之詩當宋紹定中樓攻愧鑰呉荆溪子良嘗叙之以行於世矣𢎞治初其裔孫廣東叅政豪慨念散逸將重刻之未就而卒今日之六安學正鏞叅政宗人也將畢叅政之志而未能以告於其守宋君克明克明素重斯文而樂於義舉者乃不閲月而功以告竣焉嗚呼石屏之殁幾三百年而詩又大行於世石屏若是乎不窮矣彼以當時富貴為達者誠烏足以知之杏園重㑹詩序謝一䕫皇上即位之十有三年朝廷肅清四裔賔服而百司庶事亦用簡康搢紳士夫得以暇日少遂燕樂之私乃三月一日武庫郎中鎭南陽君宗嗣置酒元寜觀㑹同年於朝者凡三十有幾人目曰杏園重㑹坐席之序以齒而甲第先後官職崇卑不與也是日天氣晴明惠風和暢罇罍既陳衣冠駢集諧笑以暢其懐勸酬以盡其情伶人歌舞以助其歡酒半修撰鄭瑤夫首為七言詩二律以紀述其事於是在席諸君皆倚韻和之明日宗嗣書各所作屬予言序之用垂久逺予惟自古名賢達士因時撫景未嘗不宴㑹以肆其樂形諸言以紀其實昌黎韓子所謂飲酒而樂所以宣其和感其志而成其文者是已然遡自徃古以迄於今其為文字宴㑹者不可勝紀求其彰彰聞當時名後世者惟蘭亭眞率數宴葢蘭亭以有右軍眞率以有富歐諸公故也然則諸君欲為斯㑹逺圖可不思所勉樹功徳而徒侈諸詩文可乎抑予於是因有感焉昔在庚辰同與廷對入仕者一百有五十距今十八年而與兹宴者財三十人中間或職南畿或遷外服或以故去官遭貶黜與壽年不永者已五之四人生聚散不常升沈罔測如此苟不乗時勉修職業以建立事功不重虚此生哉書曰詩言志歴觀諸君之詩皆渢渢乎治世之音而忠君愛國之心朋友規勉之誼藹然溢於言表繼今以徃尚期各隨所任而夙夜匪懈以弼成聖天子億萬年雍熙之化使職業之修功烈之著炳炳烺烺光映簡册斯上不負天子下不負所學而無忝今日之㑹其或静言庸違與世之碌碌者無異則奚足道哉三十人襄陽艾天鍚仁和鄭瑤夫某某也楊文定公詩集序彭時詩自三百篇而下其體屢變其音節髙下世異而人不同然其和平雅正無彫刻險怪之弊者大抵皆盛世之音也觀漢魏六朝以及隋唐宋元諸家篇什槩可見矣惟我皇明混一區宇右文興治超軼前代至宣徳正統間治教休明民物康阜可謂熙洽之時矣當是時以文學顯用者有三楊公焉而文定楊公湖廣石首人也湖廣古荆楚地今天下大藩其山有衡岳之秀拔水有洞庭江漢之清激山川竒氣世鍾於人而公獨得是氣之異力學充養益宏以深登名進士列官翰苑在宣徳中入侍禁廷備顧問者十載名徳駸駸乎彰聞迨正統初遂與泰和楊文貞建安楊文敏二公同居内閣恊心匡輔並列三孤之位一時功名事業烜赫盛大屹然為朝廷之表儀搢紳之冠冕天下人望咸歸重焉其後二楊公殁公巋然獨存年益髙而望益重士大夫有得其詩文者莫不藏弆以為榮公亦樂於應人之求肆筆成章皆和平雅正之言其視務工巧以恱人者逺矣何也葢資稟之異涵養之深所處者高位所際者盛時心和而志樂氣充而才贍宜其發於言者温厚疏暢而不彫刻平易正大而不險怪雍雍乎足以鳴國家之盛豈偶然哉語曰有徳者必有言記曰治世之音安以樂其公之謂歟公殁三十餘年姑蘓項君來為湖廣憲使以公是邦之望乃取其詩刻梓以傳介禮部員外大冶周宗智屬予序嗚呼公之徳業固不待詩以顯而其詩有不可不傳者葢公心志學術之所存也誠使後學即此而觀得其所存之實有所感慕興起嗣聲續於方來豈不益為湖廣山川之重哉是固項君嘉徳尚賢啟廸邦人之美意然使天下後世咸知治世之音如此則於風教亦未為無補云予故推本其意序諸篇端庶讀者興焉顧全州七詩序蔡羽辭無因因乎情情無異感乎遇遇有不同情狀形焉是故達人之情紓以縱其辭喜窮士之情隘以戚其辭結羇旅之情怨以孤其辭慕逺㳺之情荒以懼其辭亂去國喪家者思以深其辭曲此無他遇而已矣予讀顧子全州之詩知其遇也全州曩時詩格和平讀之令人喜豁自謫全寄詩七章皆感慨愁抑夫感慨愁抑必有所不足也顧子平日視富貴若浮雲豈為是哉於是乎窺見忠臣烈士之操素也疇昔哲人執人之政思其居有故而去憂其終不信於當時信於來世故居東斷爻返魯削史去魯歌蘭即沅為騷以宣暢其話言道其志慮至於憑髙望逺撫時而動殊方異域靈山秘水丘墟臺榭一凑於目言為之變時有適然以為非遇乎夫王粲之江陵庾信之關中子美之成都其地至今為天下勝非山水之間固有情而弗釋也乃三子者之發為文章憂愁鬱結一慨千載讀之者未嘗不流涕是去國懐鄉之情也夫處興廢而無所寓其情與有情而莫能言凡庸也揚子雲曰君子得時則大行不得時則龍蛇予以為君子進則憂其民退則憂其君若夫取貴一時權脅萬乗去而邈邈拉齒折脅者之所為也豈忠臣志士之情哉華玉忠義奮發慷慨有大節自開封府尹左遷全州全為國家南夏之鄙山川秀深華玉有深思惻怛之情其遇也詩之鬱結固宜鳯峯子詩序文徴明有鳯峯集若干巻四明郡守華亭沈鳯峯公之所著也公早負儁才明經績學侈聲三呉既舉進士為司冦屬詳刑析律深於吏治及是補郡輙上課最踐歴中外名實並敷余家呉門去公不數舍而聲光弈弈實所稔聞今歲汪君鏜孫自四明來示予此集予受而卒業焉鑄詞命意莫不合作而圓融藻麗綽有唐人之風信今作者莫有加也我國家以明經取士士之有志飭名者莫不刺經括帖剽獵舊聞求有以合有司之尺度而詩非所急也既仕有官則米鹽法比各有攸司簿領勾稽每多困塞自非閒曹散秩在道山清峻之地鮮復言詩而實亦有不暇言者而近時適道之士逰心髙逺標示𤣥樸謂文章小技足為道病絶口不復言詩髙視誕言持其所謂性命之説號諸人人謂道有至要守是足矣而奚以詩為夫文所以載道詩固文之精也皆所以學也學道者既謂不足為而守官者又有所不暇為詩之道日以不競良以是夫昔周原伯魯不説學閔子馬曰周其亂乎又曰可以無學無學不害不害而不學則苟而可於是下陵上替能無亂乎謂無學雖無害於為政而政皆苟且必及於亂如此沈公文尚西京志意勤劇雖關决緒政日不暇給而手披口吟不以時廢然則公之所為獨詩也哉於是乎有以知其政矣明文海巻二百六十
