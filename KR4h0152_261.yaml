body:
  text: 明文海巻二百六十一餘姚黄宗羲編序五十二詩集松蘿山逰詩序程敏政松蘿山在吾休寜縣北十五里號幽勝予十年前嘗一逰焉每以為未愜暨南還値抱病連嵗不克徃𢎞治壬子春鋭作一行而雨連月亦不敢必也暮春廿一日忽霽天氣清和人意甚適乃以詩約縣庠司訓黄倫汝彛鄉進士張旭廷曙而同逰者五人陳榮天爵詹貴存中胡昭静夫及族人正思用禮天錫敬之侍行者三人弟敏亨及子壎姪塏也或馬或輿聯翩出松蘿門而東折北過石羊干崇岡複壠麥香襲人桐花盛開如雪而紅紫則不可得見矣行七八里松蘿水一脈演迤南出兩山夾峙盤迴斗折入益深境益竒每一折即古松蘿踞怪石錯立飛泉淙淙水禽交蔚有殊意疑所謂蘭亭武夷者正復如此而已行又七八里抵山麓古佛菴在焉與客小憇解衣登山引矚四望聯峯屬巘杳莫知其所窮苐聞樵斧聲丁丁與磵谷相應而耕者漁者隱顯出没於煙雲虚落間相顧恍然疑與世隔乃據松下盤石而坐呼童子掘筍作茶供聯句一章還飲小閣心暢神洽如有所得而忘其登渉之勞酒半限韻各一章興發而别有所出者不禁已而夕陽冉冉過山背汪氏亭子適當路中復邀飲數行日益下乃出山途中有作或和或否亦各取適而已惟汝彛逰最勇詩最工予輩不及也昔羊太傅鎭襄陽病不得謝毎至峴山至於泣下然有所如徃徃賔佐皆從笳鼓載道貴而好㳺者也柳柳州在謫籍搜抉巖藪幾無遺勝其序所㑹者謂皆大半不遇之人困而好㳺者也予不佞挾册入官所典者冷局得早休自適無羊公之顯且絀吏議荷天子恩不加竄殛而㳺不出其鄉所與游多一時寓公里族之賢者子弟相從為樂孔嘉無柳州之困則斯游也亦不可不自幸也雖然子朱子平生好佳山水嘗請納官於朝願為白鹿洞主領泉石是豈直逰而已哉逺眺望以玩心於髙明法仁智以適情於壽樂皆自山水發之則吾之遊也方自此始觀者無誚其荒於嬉而不足與進於聖門也哉游之明日書唱和詩為一巻序而藏之嚴滄浪詩序林俊詩冩物窮情慨時而系事寄曠達托幽憤三經三緯備矣降而離騷一變也而古詩樂府蘓李張酈一變也曹劉張陸又一變也若宋若齊若梁氣格漸異而盡變於神龍之近體至開元天寶而盛極矣而又變於元和於開成迨宋以文為詩氣格愈異而唐響幾絶山谷詞尚刻深又一大變者也最後吾閩邵陽嚴丹羽滄浪力祖盛唐追逸縱而還風響借禪宗以立詩辨别詩體詩法詩評詩証而折𠂻之决擇精嚴新寜髙漫士唐詩品彚引為斷案以詔進來哲夫滄浪之見獨定故詩究指歸音節停匀詞調清逺與族人少魯次山號三嚴同時台人戴石屏深加奬重其子姓鳯山子野半山邑人上官閬風呉潛夫朱力菴呉半山黄則山盛傳宗𣲖殆與山谷之江右詩𣲖為近要亦唐之赤幟有摧堅扼險號召鼓翊之功者矣宋季避地江楚詩散逸為多吾閩憲淮陽胡君重器搆存稿僅百三十有餘篇與詩辨等作並鋟之梓至寶終出知寶要未誠乏為兆爾矣憲伯雋特有英槩寓懐寄興清麗悲婉與滄浪意氣相感發二百五七十年之下上是集行世為滄浪賀亦為得滄浪賀也淮南法席將無嗣正眼以傳者乎集故有黄公紹序憲伯君重以為諉盡讀之正坐滄浪禁例奚取序滄浪序自創也黄鶴樓贈别詩序林俊黄鶴樓名天下山延袤數百里趣鄂城距大江名曰黄鶴山山盡處石窿然崛起石之上樓也傑棟峥嶸層甍飛舞偉然湖南一竒觀岳陽滕王不及也予嘗評斯樓有君子之道焉屹立天南下瞷八極俯岷峨倚星漢而不知其高納洞庭吞雲夢而不知其大洪濤弗驚疾風無靡寒期暑候與時偕行隂慘陽舒憂樂同態喧而能寂特立而不隘斯大凡也登斯樓者其亦將無取乎有是江山有是樓無是人其不孤乎登斯樓者其將能無負乎進士金沙馮君時濟杓直沈晦好問學善紀古今事頽然儒者奉使岐藩道經武昌憲副沈先生思古暨諸君子飲餞之黄鶴樓繪圖賦詩為别俊序其勝與其所以登者如此君固取斯樓哉樓不孤哉君固能無負哉異時翹楚士夫洸爀閭井振耀古與今如斯樓擅名湖南等而上之其必君也若曰憑髙眺逺把酒臨風旅烟霞親魚鳥藥斯樂矣殆非諸君子之意亦非所以贈君子也中園四興詩集序呉寛古詩人之作凡以冩其志之所之者耳或有所感遇或有所觸發或有所懐思或有所憂喜或有所美刺類此始作之故詩大序曰詩者志之所之在心為志發言為詩後世固有擬古作者然徃徃以應人之求而已嗟乎詩可以求而作哉吾志未嘗有所之也何有於言吾未嘗有所發也何有於詩於是其詩之出一如醫室所謂狂惑譫語莫知其所之所發者也予自官於京師承乏太史氏四方之人以京師為士林而又以館閣為詞林争有所求然卒不過慶賀哀輓之作而已幸其或為貞孝節義事正吾所當歌咏者又何從覈其事之有無漫出數語應之至於中之所欲言者反為所妨而未暇於作常欲峻絶求者以力追古人而未能也費君昭霽家貧好學博聞强記而尤工於詩平居凡有所感遇有所觸發有所懐思有所憂喜有所美刺一於詩發之待成不復篇為之題總名中園四興四興者葢倣杜子美之秋興推而廣之而曰中園則系以其號也手抄成編請予評而序之予讀未及數篇已得其心志之大畧葢昭霽惟隱居不仕得不亂其所學然耳若其造語雖若近師乎宋然方之今人空疏卑弱熟軟枯淡輙以盛唐自詫者殊科此又不暇論也昭霽少時嘗習程文欲取科第以見於世已而棄去賣藥城東一意古學其學之所至獨予與閭門周庚知之庚既校正其詩非予誰為之序者跋謝山人詩稿呉寛嗚呼山人已矣予得其遺稿於其從子翰林編修鳴治而讀之惜其無年無位無子而獨有此詩也悲夫雖然山人之所無者乃衆人之所常有其所有者乃衆人之所常無則予於山人亦何惜其不得為衆人也哉送周仲瞻應舉詩序呉寛今之世號為時文者拘之以格律限之以對偶率腐爛淺陋可厭之言甚者指摘一字一句以立説謂之主意其説穿鑿牽綴若隱語然使人殆不可測識苟不出此則羣笑以為不工葢學者之所習如此宜為人所棄也而司其文者其目之所屬意之所注亦惟曰主意者而已故得其意雖甚可厭之言一不問其失意雖工輙棄不省其言曰吾知操吾法以便吾之取而已惡暇計其他葢有司之所取又如此夫國家今日之用人莫急於科第其事亦可謂至重矣重之至則宜慎之至慎之至則宜精之至然而上下之所為如此吾不知其何説也夫既以科第為重則士不欲用世則已如欲用世雖有豪傑出羣之才不得不此之習顧其所以習之者無若前之所云則可矣上之人不欲薦揚人才則已如欲薦揚人才雖有休休有容之量不得不此之取顧其所以取之者無若前之所云則可矣所以若前之云者豈下之人所習在是而上之人姑取之耶抑亦上之人所倡在是而下之人靡然從之也嗚呼文之敝既極極必變變必自上之人始吾安知今日無若宋之歐陽永叔者而一振其陋習哉吾又安知無若蘓曾輩出於其下而還文於古哉太原周君仲瞻侍其尊人大司冦游於南都有年矣其為人清慎而雅明爽而達葢予所謂出羣之才也平居脱去驕貴氣習獨喜與太學畸寒之士相講學其學長於春秋而尤好古文詞以予之同其好也相好日厚㑹今年當大比告於司㓂公將就試於其鄉諸友者惜其去而不可留也則相率作詩贈之詩成其所厚胡彦超葉昌伯輩過予俾序諸首簡噫仲瞻之行决矣以其學之長而少狥乎流俗其取科第也必矣然或使其確守所學不從風而隨波焉世亦未必無歐陽子者取之葢文之體有不定也而學之志有定所以有不定者時之尚所以有定者吾之守時之尚自尚而吾之守自守此眞所謂特立之士非流俗之所知而惟仲瞻為可以語此也仲瞻之兄伯常先生官於翰林固常有意於歐陽子者仲瞻道經北都試即而騐焉予之年先於仲瞻而學視仲瞻為後葢天下之困於場屋而拙於科第之尤者以是頗知其説而以為告若夫有科第以登仕版所以致君澤民之道仲瞻之得於家庭者有素矣予奚以言為成化七年三月望日和杜詩序童軒詩自三百篇而降世以詩鳴者莫盛於有唐唐之以詩名家者莫聖於杜子美葢子美學愽而才髙氣豪而識逺故其為詩薄風騷而該屈宋掩顔謝而吞曹劉雖當時山東李白者能以光燄相髙然於鋪陳時事陶冩景物排比聲韻多或千有餘言霈若江漢奔流千派萬折起伏澎湃而莫極其所窮當是時白亦瞠乎其後矣况其忠君憂國仁民愛物之心溢於抽詞之外者惡可以他詩例論哉故元稹有曰詩人已來未有如杜子美者信知言也嗣是而後歴五季沿至有宋凡與盟詩壇者鮮不以杜為宗徃徃則其體裁模其興象狀其風格務力求其似然而才不足者則體裁靡間識不高者則興象莫辨氣不充者則風格尠存愈似而愈不似愈工而愈不工是故宗杜為難也迨有元以能詩稱者則有若虞趙楊范掲諸公亦皆以宗杜名家評者謂各得杜之一偏葢必有所見也嗚呼宗杜固難况欲冥思其事追和其韻者豈不尤難矣乎南京兵部侍郎萬公毖之少承今太子太傅吏部尚書謹身殿大學士竹坡先生家庭之訓授以三百篇之詩用登丁丑進士拜户部主事四轉而有今官學博才敏雅好吟事當其酒酣興發徤筆縱横雖一日數十韻而無難者間於退食之暇常取宋人周伯㢸所選唐詩三體元人楊士𢎞所選唐詩正音歴次其韻而和之業已梓行於世矣兹復取伯生虞公所註杜律暨韋布士董益所註杜選排律五七言絶句總若干首不數月間盡和其韻殆若出其時履其地親聆其謦欬而熟覩其眉宇者其體裁其興象其風格雖不盡求其似而其豪邁渾雄者自無不似雖不力求其工而其清淡閒雅者又自無有不工故不必龍文虎脊也其如過都歴塊何不必蘭苕翡翠也其如天然秀出何斯亦善於宗杜者矣豈直和其韻哉雖然飯顆山前苦吟生瘦白嘗有詩以贈甫也子美自謂曰為人性僻耽佳句語不驚人死不休由是而言是知子美之詩亦且苦吟力索殆不可以易而為之者今毖之不數月間乃能追和其詩數百餘首至於公牒游從舉無廢事雖其天才踔絶豈亦有神以助之與不然何子美之不易而毖之之易也河南方伯呉公行儉雅愛毖之詩欲壽諸梓乃介書徴予以序其端然予之為詩固嘗見笑於大方奚能序毖之詩乎辭勿獲因論前人宗杜之所以難毖之和杜之所以易如此云楊學士詩序童軒詩不易作也作而無補於世教雖工猶不作也古詩三百篇孔子取之善惡可備鑒戒二南正雅周頌之音用之鄉人邦國可以厚人倫美風俗奏之郊廟可以動天地感鬼神其有補於世教大矣漢魏兩晉之詩大抵多主風刺於世教之補亦不可少者齊梁而下詞氣寖靡音律寖㣲校之正聲概無足取李唐作者相繼楊王盧駱首開唐音之端餘若陳伯玉之髙古岑補闕之工緻王摩詰之清純栁子厚之平淡蕭洒亦各有以其所長名家其稱首則有李太白杜子美兩雄争鳴光燄萬丈今觀李詩古風五十九首及逺别雜蜀道難諸作大抵得於變風之體居多以譬而言殆猶太山出雲頃刻之間彌布寰宇隨以雷車電砲歘霍砰􅗟及其颷輪一停則冺乎無迹此誠神於詩者也杜詩北征詠懐苦戰冬狩等作要之得於變雅之體居多以譬而言殆猶滄溟巨浸涵雲天浴日月時或颶風一噓則黿鼉蛟龍百怪呈露觀者毎有望洋之歎此誠聖於詩者也然二子之詩類多主文譎諫忠君憂國憤事憫時之情不釋諸口謂無補於世教可乎嗣是而後又有若韓退之者以閎中肆外之才發而為詩竒崛演迤髙者可薄漢魏兩晉下者亦不汩於齊梁譬而言之殆猶河源出於崑崙合流積石三千里至龍門而下波濤奔放百折盤迴而卒歸於海此誠一代之詩家也矧其志存匡輔憂民憂國屢形於詞謂無補於世教可乎宋元而下以詩名家者固非一人求其能接響於三子者誰歟皇明天啟文運聿興作者輩出若今四明楊先生維新葢其人也先生生而天稟異常在孩提時或授以書一二過輙成誦吻間常作吟詩聲家人詰之先生笑而不答甫六齡入家塾學為對句九齡學詩逮年十五六已有所作詩歌五六百篇崒為一帙題曰晉菴稿既而業舉子庚午大比先生首冠鄉解浙中明年遂登進士髙第入翰林歴官詹事府少詹事兼翰林侍讀學士嚮用未已文名大震一時四方人士求其詩文者履塡於户歲月既久復有詩二千餘篇又集為鏡川桂芳東觀等稿若干巻頃者寄自京師邀余為之評并序其首慨予自謝病歸老懶日甚學殖荒落惡能知先生之詩評而序之哉然予辱在先生同年之後義有不可得而辭者於是莊誦累日毎於意㑹處輙以數語箋之仍統而論之曰先生之詩其清竒不腐則李太白之詞調也老健不卑則杜子美之氣格也浩瀚不竭則韓昌黎之才思也矧其詩於君臣父子夫婦兄弟朋友之間恩誼篤而倫理明忠愛孝友交契之情諄諄悃愊其於世教之補抑豈出於三子者之下哉譬猶甫田之稼薿薿有秋艾而納之則如坻如京上足以羨公賦下足以給私室非但於寡婦之利而已此誠詩壇中之名家也嗟乎關雎以鳥興而君子美之取其夫婦之有别也鹿鳴以獸興而君子大之取其賔朋之有禮也今先生之詩篤恩義厚倫理其補於世教如此藉使推而行之與民共由則人倫可厚而風俗可美也而李杜韓三子者亦豈得專美於有唐哉是則先生之詩不可以無作也審矣遂序之禾齋詩集序童軒異時予聞滇陽撫軍陳君以遜掌史居君志𢎞文學郭君仲彬俱以工詩名家鎭守雲南征南將軍都督繼軒沐公雅好文事而三人者公皆幕而賔之暇則更迭倡和藻句清詞金玉舂應一時意氣風生自謂當並鞅於唐人韋栁之間而姚雍諸子不足論也予少時有詩癖亦時時喜從墨卿騷客者㳺暨官滇陽臬司而繼軒公之墓木拱矣陳郭二君亦物故不可作矣獨志𢎞以皓首休致於家然且杜門謝客予亦以不能識面為恨也嗟乎知音相遇之難有如是耶無何以遜之門人居誼張嵩奉其師禾齋詩稿數百篇將梓行於世詣予請言以弁諸巻端予愛而誦之見其體裁音韻態度思致興象俱有足觀者葢其用功也專其琢句也巧其匠意也婉故其鍊字也新雖時闖於温李之門而語無險怪雖間雜於宋元之習而詞不鈎棘於是竊評之曰以遜之詩其體裁之富如東風著物紅紫滿眸其音韻之清如鶴背秋高篴聲驚月態度之麗如霞綃雲錦機杼自然其思致之嚴如洞庭微霜木葉乍脱其興象之逺如江天瞑雪孤雁呌羣信乎以遜之工於詩也嚮使少加吟䇿而優柔於蕭散之趣雖謂今之韋栁夫豈過論雖然予聞之昔淮南好客而八公之徒實皆㳺於其門所著詞賦有曰大山小山謂猶詩之大雅小雅聞者至今以為美談夫繼軒公之好文固不下於淮南之好客而以遜之儔固無讓於八公之徒吾知禾齋之詩將與二山詞賦並傳於後無疑也若夫以遜忠君愛國之情慕親交友之道好古希賢之學亦皆於此可以考見又非八公之徒可同日道也志𢎞聞而韙之曰孰謂世無揚子雲乎以遜為不朽矣以遜諱謙禾齋葢其别號云朱先生詩序楊循吉丁觀詩不以格律體裁為論惟求能直吐胷懐實叙景象讀之可以諭婦人小子皆曉所謂者斯定為好詩其他餖飣攅簇拘拘拾古人涕唾以欺新學生者雖千篇百巻粉飾備至亦木偶之假線索以舉動者耳吾無取焉大抵景物不窮人事隨變位置遷易在在成狀古人豈能道盡不復可置語清篇新句目中競列特患吟哦不到耳朱先生文奎諱應辰呉人也生洪武中仕終江隂訓導嘗從楊鐵厓游其詩至多予近為之選得佳者僅百首行焉視其舊雖删去十七八然吾自謂無負先生也葢吾平生觀詩率如此自知鄙性偏僻不合於大雅然自謂好詩到手亦自易見惟有失取固無失不取也若今詩所存者皆可傳也其餘諸作非不清麗富贍可歌可詠然一學詩人則可以為而類之既曰欲傳之則將使天下後世人讀之豈可先自恕也汝能自恕人誰恕汝人亦何嗜於可學之詩焉故我不以是累先生也遂皆去之惟知詩深者然後知予之為先生謀者厚也君之外孫都穆實圖行先生詩穆亦好學有才能世其母家業焉游虎丘寺詩序楊循吉虎丘寺者呉人所恒游者也有雙石絶澗之佳勝於郡中之山為最名者也呉人承前代風流之餘故嘗知來游於此具酒餚載管絃各自以其輩至呌呼歡笑曠達而豪放者則有之矣鮮有以文字為樂者也故今日游而明日遂忘之夫何故無傳之者如此也惟騷人墨士所至則必有語言之留而其游也得與其文字久近之勢相為不朽即使不能流布百世以成故事而經歲厯紀就其人生之間亦可考離合而騐悲樂焉則與衆人之游者異矣夫何故有傳之者如此也葢天下之事所以假焉以久者文字而已矣雖古豪傑之士其所就功業竒偉經世未有不借焉者也葢有之則所謂竒且偉者不忘也而山林之間相與游從以為樂者其意眞其言肆無獻諛避諱之咎而有輸冩傾倒之樂故其言尤為易傳而游者不敢不圖也今吾輩既得適意於山水而又能托興於文字則是日也亦有事焉雖固有他人之游者同於無傳而已矣亦庶乎非飲啜之徒也感樓集序楊循吉詩在精不在多在專不在備誠以其道之難盡故也有唐氏之世詩莫盛焉然自數大家外其餘諸公之集編或局於一體簡或止於數篇此豈其力之不能乎亦知詩之難為不必多與備也故其時詩人量力盡智各能自成一家言竟以取名於千載之下者以此大抵詩在天地間實藝之至精者其工可為其妙不可為也妙在觸則情感故其句美雖善詩者莫能自知之是以求好詩必有所俟俟於事之觸境之觸無故之觸也不觸則不可以舉筆就題而浪為然則雖欲其多且備又烏能多且備也先生呉中之耆舊剛明人特有通變之才素不業進遂隠於時其正則不惑鬼神其達則不諱貧乏勤儉自持以清儒致産千金黙持鄉人風俗之柄者數十年其為人豈特詩而已哉既殁之明歲其子慈息抱稿見命定其次初漫録殆千篇三選三减止於闕十闕首或以咎我曰太少哉余曰詩有片紙而存者有累箱而亡者其傳否不在乎多與少也詩人之詩非以迫成非必盡其胸中語也予用是逆推先生之意以為此編所謂有觸妙作其在焉豈必其多且備哉觀者自知之矣先生姓賀諱甫字美之其仲子恩中戊子解元有學行不第而殁孫放今亦未冠游場屋其將益顯大先生之隠行而及其詩乎朱性父詩序楊循吉世以位為詩輕重小人哉里巷之見也人嗜榮利至於朝市而止矣乃詩亦然雅道䝉厄評賞不公與世態俱作可嘆哉然隠士晦處丘樊之中跡不及天下無豐餼大勢以招啖賔客使稱已則其詩何怪不振悲夫惜哉彼市人者斯亦已矣同為騷友心知其詩不肯出一語褒賞至又為指摘排棄者皆然此則又可歎息者也嗚呼惟女子則妬惟小人則忌掩能蔽才獨何人歟性父居呉葑門之外早歲力學左圖右書殆於忘寒暑一吟一咏用以自適率皆簡淡髙古有味有法不落穠麗枯澁二境非深入妙悟能然耶然性父詩未嘗自匿毎亦流布在人家而知其詩者葢鮮性父作詩豈徒仰屋自賞而已哉推敲指㸃務盡情景亦誠欲求鑒於知已之士也苟使其終身弗遇有碧山雙淚之歎則朋友奚辭咎焉今呉中詩家不少何不共扶雅道少借公論於齒牙間乎性父老矣諸公推轂騷壇幸甚明文海巻二百六十一
