body:
  text: 明文海卷二百六十三餘姚黃宗羲編序五十四詩集李三洲詩集序王漸逵昔司馬遷以布衣客齊梁南遊江湘東適會稽探禹穴反而歸乃作史記杜甫以天寶之亂流落巴蜀徘徊於荆襄間日與赤甲白鹽灧澦洞庭崖谷波濤之幽險勝絶為伍其飲食夢想悉歸之詩以發其孤憤之懷蘇子瞻之貶也浪迹於湖黃江浙閩越儋萬瘴癘之鄉瀕死百折至於豺虎之穴鼉鱷之窟皆有姓字石刻傳焉故司馬氏之文渾雄而炳鬱杜子美之詩兼備衆體古今稱盛而子瞻之詩文浩浩如奔江決河一㵼數百里而莫之禦而其波瀾翻覆窮極變態可觀可愕其竒壯有如此者説者謂三子皆得江山之助其信然乎豫友三洲少敏而力學博極羣書識其體要未達而詩文籍籍在人口中及觀光於京師官於兩浙山之東西河之南北屢遷於川蜀湖湘甌貴閩越諸省間殆將歷天下之半而過之故其於山川之形勝風土之習尚古今之迹仙佛之居聖賢過化之地登眺之懷一一拾而歸之詩故其詩之變態不常靜者如崖幽者如谷淡者如霏煙麗者如巧卉竒者如巘怪者如壁浩而迅若驚湍廣而平若夷岸其無所不有也若入洞庭之墟雲夢之澤心亂目眩而不能遍焉所謂得江山之助者非耶三洲子當明盛之時履顯達其視三子之煢煢然於逆旅間徒寫其悲些之情舒不平之鳴者逈異矣三洲子歸復篤志於聖賢之學凡世儒之髙談心性浸淫禪覺者力辨而深闢之以歸於中庸言行之際適與豫意合他日與三洲子纍百仭之基登髙明之臺去耳目於支離掃蒨夭之花蕊尋孔顔樂處不於江山而於人間嗒然與太虛為徒而超於萬物之表斯時也謂之得天地之助可也三洲子以為何如序三洲之詩因歎三洲志之鋭學之正不可多見也故併及之越山社送李三洲詩序王漸逵自越山詩社成入社者凡十有二人天遊陳子約中余子樗亭黃子丹山方子鶴臺招子虛谷江子三洲李子泰泉黃子右溪倫子雪崖程子石倫子與豫也未十數年間離而合合而離者復屢焉約中子歸於浙天遊樗亭鶴臺已物故所存於社者惟八人既而三洲子自楚蜀而歸泰泉二倫子自留都而歸雪崖子自西甌而歸喜得一欵敘相與飲宴哦咏今年春泰泉子復以召趨夏三洲子復政於閩秋又聞二倫子告别而北上獨豫老守於社然已衰憊齒豁顔悴皤然一老翁矣因歎人之生百歲間其得失順逆可喜可愕之事倐焉而至者不知其幾也夫人之生得失順逆可喜可愕之事倐焉而至者不知其幾則夫吾社之會散離合屢更於十數年之間者又何芥耶豫幸老於社得與諸子會别時或送迎㩦酒食談笑賦詩遙附斥鷃於槍榆之末斯亦足慰矣昔人有數為其朋舊送迎者山鬼見而揶揄之豫以蹇拙弗能儕同於諸子其不為山鬼之所揶揄者幾希矣然而猶能屹坐壇樹乘風笑咏以待諸子吾知社公亦或愛而憐之則豫之蹇拙不能追從諸子雖不免於山鬼之所揶揄其將不為社公之所憐憫耶三洲子行諸同社猶舉故事祖餞以詩屬其序於豫豫三别於三洲子不能不重有所感也為述其事而書之使山鬼見焉殆為之憮然也已刻沈石田詩序祝允明唐人以詩為學為仕風聲大同性情略近其間李杜數子傑出然而格有髙下音非遼絶猶十五國各為一風可按辭而知地唐亦然爾斯其美也宋劣於唐居然已其有傑出若楊劉歐梅錢惟演王元之林君復魏仲先蘇子美晏同叔王介甫惠崇之流猶唐聲也無已刻志少陵蘇黃亦爾雖門行若别而堂室暗符故能豪擅自任然使孔子復生則有若瞪乎避席矣流及國南曾戴去非數子猶師道也洎至能務觀廷秀又自蘇黃而變然轉奧宛而趨暢愜或傷率易而鄰訟辨矣或以宋可與唐同科至有謂過之者吾不知其何謂也猶不能服區區之一得何以服天下後世哉國朝詩人其如劉嵩林鳴輩以至四傑十才而來班班然可知也有不以宗唐而勝與沈公獨釃涓流橫放四海一時風騷讓以右席嘗試觀之唐歟宋歟衆或未知我獨知之蓋其家法固主放翁而神度所寄唯浣花耳是以興觀羣怨君父動植已發之而自愜人推之而莫辭號為我朝詩人謂其音異唐而猶挾其骨也不然徒以其語將不足以望前輩諸子况其上者乎公始愛豫深其子雲鴻又豫表姊之家也辱公置年而友昔命雲鴻持詩八編倩為簡次皆公壯歲之作純唐格也後更自不足卒老於宋悉索舊編毁去後學者皆不知此豫猶為惜之不已今人重公詩亦多震於聲耳公學練左氏傳平生語言義理皆左與杜也其集稿甚富稍有華氏沈氏二刻本淮隂王揮使廷瑞又以所得百數篇成刻請序聊為一言之廷瑞好作義惠事觀沈集中所贈詩可以得其人盛明百家序皇甫汸錫山俞君嶽率輯我明之詩上自洪武下迄嘉靖二百年內自宗室相府以至隱淪閨淑釋氏羽流凡一百五十四人得詩若干首勒為四十九帙題曰盛明百家詩若髙廷禮品彚計敏夫紀事特未標立正始大家諸目及載述作者之源耳每集各為小序紀其籍履非有甲乙如殷璠仲武也自起家以至謝秩還山幾三十年而書始成尚思購而續焉其用心亦勞且密矣豫兄弟濫厠集中嘗貽之詩曰愧非河嶽藻猶得纍殷璠蓋竊比冉曾云夫詩自三百篇而下代有作者漢魏去古未逺猶有詩人之遺風焉晉宋而下齊梁麗矣陳隋靡唐以詩賦取士其教盛行然聲音之道既與政通而文章之興又關氣運政有汚隆氣有醇駁而詩係之矣當時君上咸典學能文楚襄詡宋玉之辭漢武慕相如之作曹家父子蕭氏諸晜由此其選也運革六代唐數三宗上好而下從亦風起之也况宰相房魏在前燕許在後皆藝苑之英耶明初猶沿宋元之習詩無足採新安程氏所編文衡止及樂府意亦微矣逮髙楊張徐四傑崛起浙東宋王二學士倡之椎輪於輅增氷於水貞觀永徽此殆萌芽𢎞治正德之間何李二俊力挽頽風復還古雅長沙李文正誘奬羣乂摛藻天庭世宗嗣位之初己丑而後文運益昌海內作者彬彬響臻披華振秀江右相君亦厪吐握開元天寶庶乎在兹庚戌而後操軌於大厯防漸於元和矣嶺南類選蜀郡詩鈔繁簡雖殊芟掇未當是編備矣其他祕在私篋藏諸名山未及流布者猶倍蓰於此然要之不能􅞅出集中所存也吾明之詩豫所著新語與昌榖談藝元美巵言略示掎托互相詆訶大都體格法乎漢魏聲調凖乎三唐所未盡合者寄興之間性靈異秉才情頓乖耳觀者由似而求其異即盛而慮其衰則思過半矣自後賔館丘墟至為馬廄婢室惡聞詩書指為雕蟲小技於是乎有以言承譴者即使供奉流於夜郎襄陽終於韋布亦何憾焉嶽率君蒙謗左遷竟爾棄置乃不忘初好可謂深於詩矣夫釋氏嗜佛雖罹八難而一念恆在菩提郢人抱璞雖至則足猶三獻以明其為寶是編豈徒果於自信而羣玉將為照焉足以鳴國家之盛傳諸後世不朽矣奚避哉兄因是子還山詩序皇甫涍在昔詩與樂相為用孔子自衛反魯未暇正樂而先次序雅頌樂之亡以詩故也樂記云治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困聲音之道與政通矣上以政感下以化應故詩有六義而首之以風蓋曰民之從上猶物之從風恆鼓者風而易偃者草也是以先王以之在治忽而所係則大矣感之以中和應之亦以中和順氣以浹和樂以興王者之風也列國之風隨其土俗而天子採焉正變殊而治忽所以分有其政則俗從之有其俗則聲從之有其聲則樂從之有其樂則治忽從之上之可以政感道之有常而不易也下之必以化應世之易趨而不隱也譬如順流莫止先王慎所以感之者惟反其道之出乎上而不強其勢之成於下者也然泉水與新臺並列牆茨與柏舟同什齊有太公之化而還刺從禽著刺親迎者何為也衛有康叔之烈而氓狐之音何其多也鄭之音聖人所逺以嚴為治之防者而羔裘風雨溫乎君子之心也魏之儉嗇唐之殺禮秦之氣槩殆與風人始終焉而風氣與時升降則又未必其盡同而不變也以謂上以政感亦有政之所不能感者下以化應亦有化之所不必應者是必其人之傑出逈異見之高而養之厚不以外接之慮而移易恆性之懿此又自守篤志者之辭也余壬午下第由江而返作為詩歌率多慷慨之氣遺世絶俗之説固自勉於自守篤志雖困踣頓悴而親老食貧亦不以置之懷中乙酉之秋豫與兄又下第由江而返兄於是七上而咸不得志舟中作還山詩若干篇其辭壯而不卑清而不苦當卞和捧玉之辰有謝客登遊之思豫時病痁弊裘敗衾喘息尫廢而間一讀之不覺灑然出塵飄飄乎將乘桴滄海而舉手謝時人乘鶴緱山之頂也如吾兄非見之髙而養之厚自守篤志不受變於俗者乎非所謂政之所不必感化之所不必應者乎豫與兄幼同寢幃長同師友兄既四屈場屋而豫始與之從事於有司或以兄之蹇滯鬱匿將俟豫而偕奮也今擯辱相依嘗䇿蹇並驅於關門之外而流離大江之波者亦既再矣弱季隨試都下亦一舉而振矣兄蓋俟豫而偕踣者也豈不謂之天乎雖然子瞻子由嘗欲偕老於山林而不可得雨牀之歎至今凄惻而豫二人固已得之矣可以老矣無志於簮笏而甘心布素優遊故山之廬矣故能自守篤志雖以政感之而有不應貧賤憂戚則亦不為無助也既越歲豫始為之序其詩因憶去秋之事如隔夢寐冷然有懷然亦不以是而移其志使後世有觀詩者出焉亦知豫二人之所成初不異於古之傑特逈異者也聽鶴亭敘别詩引錢福𢎞治癸丑四月既望太史東萊毛惟之先生得賜歸省其二親過别豫於聽鶴亭遂循故事為設筵以祖招而至者喬考功希大沈貢士𢎞濟於時羲馭淪虞太白導宿尊爼陳臺辭亭露坐蓋有待月之意焉而東按蔽虧清輝遲疑欲前且却若有所俟於是命燭繼輝下簾蔽風輝射簾隙自亭達臺若篩金碾珀遙連緯芒雖雜蒔未鬱而蔽隂扶疏與人影錯小鶴睨趾引領未唳鼓翼漫舞若和而答乃遞起入簾抽毫發思得聨句一首先生和之客繼和之復若干首而景物離懷大約盡之矣嗚呼良辰嘉會有偶然之數哉事不盡出於天而人不知其然乃委之於天而不知天亦不自知其然而然矣文章勳業垂休命世在我者惜隂悼時不敢自後而究其所成有幸不幸存焉則亦何以異此彼以有盡之年而區區徇不朽之名者殆不知偶然之數哉且出處去就離合反覆相尋而吾生以終亦人所不免或嬰情感懷以為大故然不知偶然者也若先生撫景放歌開口酌别蓋得之矣九日登高詩序李默漢桓景以九日登髙釋於厄後世遂成故事秋髙氣清亦登眺之極節也是日偕館中諸君子薄集西山碧雲寺采菊泛酒雅歌宴談俯仰之際以欣以慕以怨以懼隨其所得賦之於詩豫惟古今同情也悲樂同感也右軍之於蘭亭李白之於金谷皆能述一時之抱極興感之由每攬斯文用加艷賞以今視昔其庸有異者哉豫嘗寤寐厥理矩矱人情凡感極則思悟樂窮而後悲作方在市朝朵頥染指如夢如醉及夫觸物生懷索情反本則必有輕富貴於土苴羡身命於朝露以求自肆於形骸之外是皆役於物而不能折之於智謂非惑哉故自其不盡者而觀之已非松喬之所能窮自其盡者而觀之雖天地有時而毁而况於蜉蝣其間者乎故數者造化範圍之術也安其所終而弗為變者達之道也不貪物不喪已守吾正以待之豈不偉歟聊敘羣賢述其所作品以斯意用自列於切磋非以概於前賢云沈青門詩序王慎中往豫聞沈青門於顧東橋公談之不置以江湖詩人第一流也出其詩卷觀之卷中既多佳句又工為行草書相與覽賞嘉歎久之而罷知公不妄譽人也是時青門詩名已盛士大夫折節下之或忘形迹與締交盟且滿海內豫始從顧公所知之豫則陋矣轉徙宦迹數年斥歸閩海上無由一見其人今年冬君裹糧南行踰嶺遊武彛度三山入清源訪豫草堂彼此如舊相識豫所以歡然於傾蓋之頃以在金陵顧公所閲詩卷也君顧謂斯行獨有意於豫再見則出其集曰吾詩非得尊巖一言未敢以示人人嗟乎豫喜覯君方窺其笈冀見一二而恐不可得乃辱不請而盡得之駢珠編玉奪目駭視酬接之不暇連數旦夜不廢而後帙窮何其快也夫江湖之人羈窮自放出於無聊不繫之迹抉斥物彚忤觸光景舂撞其鈎棘之腑腸擅極工苦驚人口頰而施於廟朝則見為瑣迫傷劌而不可居觀君樂府古詞雜咏遊適之作近於工者之詞其所處固然也至於覽觀京都恭睹今上制度禮樂之巨盛擬為應制之篇形容功德頌美托華麗而有則誇而不浮與學士達官雍容司存蹈巍要而毗清切者競其體况豈材之兼者固不以所處自為限局與錢塘繁富明麗江南一都會也君生其土而故少司冦省菴公之季子也習其家學資聞廣益窺國家之光而講中外政俗之變亹亹有倫非生於窘窶崛側者比也則其長於彼而且兼乎此有不足異也豫獨有異焉君恂恂恭敕風致藹然其所為邊關諸詩意氣激發溢於聲律之外如彈鋏欲邀公子之車欵户必得美人之首攝衣從虛左之迎猶餘矜色持槃招他人以歃徐出謾言又如睨柱秦庭不辭碎首燕市擊築髮上衝冠使人讀之馮軾而有擊轂之爭隱几而有按劍之怒抑又何也豈其濩落無用雖托以為佚而雄心俠氣猶不能自釋時時見於此耶窮者之於詩雖腑腸鈎棘以艱拂攻苦擅能亦資磊砢骯髒之氣以昌其詞一日有引而置之在位投筆而起不難立當世之竒功君知已盈海內徒以為詩人而已無復有意引君者而君亦且病矣斯落落磊砢者將何所泄越其亦日磨歲鑠歸於澌化已矣豫序君詩既論其所長以啓衆人之好又慨其昔壯而今憊也碧梧軒詩序王慎中不得志於時而寄於詩以宣其怨忿而道其不平之思蓋多有其人矣所謂不得志者豈以貧賤之故也材不足以用於世而沮於貧賤冝也又何怨焉才足以用於世貧且賤焉其怨也冝也言之所寄出於不平煙雲水石蠱魚鳥獸草木之見者皆可怨之物寫而為詩皆不樂之旨是其人於中雖未宏而亦其情之所不免與淮府儀賔上海李君士達蓋士之不得志者豫從其子博士榕得請其詩讀之所謂碧梧軒集者也君於詩獨沖融寬暇而有和平之想豈其狎於王門之貴富漸染華靡玩習宴偷忘其所欲用於世者而魁傑崛宕之氣揉磨鑠革至於化盡無所復存其怨也將其安於時之不可冀命之無所復為放其志於事物之外以自釋而平其心也不得志於世者於有可冀之中猶萬有一焉終不以為不可復為輟其冀之之心而渙然以釋也今之昏於宗室之屬者則絶其入仕之途而欲有為於世者非入仕則無所用其才君所遇既若此矣雖欲不放焉以自釋又可得乎不得志而賤且貧焉其迹足以自髙隱約枯稿偃蹇以見竒齟齬忤觸而泄越其芒角其怨宜未甚今見謂不得志而亦為名寵命數之所羈絡入與庸庸者伍而出無以自别於繁奢附倚之徒其為鬱鬱而不可居殆有甚於貧且賤焉之所處君亦何以自釋而能平也嗟乎今之托婚於宗室之家者相娛以佚樂競為綺艷膴腆而患於不足狗馬子女之養畢給而喜爾君獨深沈寂寞畜其氣苦其思以托於煙雲水石蟲魚鳥獸草木之間極其陶冶雕鏤之力與寒士爭其尺寸如恐不及是其心必大有所不釋於貴富之養憤悶鬱積決焉而肆於此也孰謂君之心果能渙然以平而其詩詞雖不怒蓋其怨之所存者尤深矣豫既觀其詩卒編因序以發之而以授博士君博士以醇學篤行為鄉國善士而困於有司竟以一經教授尤所謂不得志者其天性獨至得吾之文必將泫然出涕不能自勝以為知其父之志者莫豫若也讀碧梧軒詩者觀於吾文庶有以得李氏父子云陳少華詩序王慎中由漢而下為詩者多矣其人大抵陵夸恣傲睥睨倨虐挾能盛氣遌衆物而犯一世或放浪詼譎剽輕不根喜自佚肆脫去繩束而為慢侮世皆可狎而於人無足嚴其憂愁狹迫悶憤無聊天地若無所容而人不可與偶好為不平誚刺多怨而善悲故能設竒託怪鈎深抉隱窮四時之變而引萬物之類作為語言以道人情之所欲寫而不能本有而不得以已者其詩之工往往極其至焉雖其詩之工然亦以傲虐慢侮怨悲誚刺負世之纍有其材者固不免有其病與豫少而喜為詩以為文之窮情極變引物連類指近而寓逺陳顯而寄微足以感人動物咏其所志者莫善於詩其好之甚專治之甚勤自顧其睢盱齷齪謹繩墨而蹈規矩於詩人之病不一似之宜其不能工也人各有所受不能相襲勉而為之卑氣駑質間心緩性震掉而排擊之非其所習終不似也故亦卒莫能工之乃吾讀陳少君之詩心有異焉君簡重修潔禔肅寬穆步趨衣冠頎然成德君子也於人無所不愛敬發慮出政以臨其民尤恐傷之有仁人之風於詩人之病非惟不似之乃薄不為也其詩之工蓋豫所謂窮情極變引物聨類善言其志而足以感人動物者也如豫之愚苟無其病則於為詩不能副其勤而足其所好猶復貪慕強勉幾幸似之終以不習而自止非能薄不為也豫誠愚不足論然觀昔之為詩者皆雄偉恢閎絶倫特出之才猶不免有其病而僅能名其詩以見於世陳君獨兩得之豈非難哉豫既盡讀陳君之詩因論而序之以志吾愧且使學者知世之為詩者固有無病而成其材如陳君者也朱碧潭詩序王慎中詩人朱碧潭君汶以名家子少從父薄遊往來荆湖豫章泛洞庭彭蠡九江之間衝簸波濤以為壯也登匡廬山遊赤壁覽古名賢栖遁嘯咏之迹有發其志遂學為詩耽酒自放當其酣嬉顛倒笑呼歡適以詩為娛顧謂人莫能知我人亦皆易之無以為意者其詩不行於時屋壁户牖題墨皆滿塗汚淋漓以詫家人婦子而已貧不自謀家人誚之曰何物可憎徒涴墻户曾不可食其為畫餅耶取筆研擲之欲以怒君冀其他有所為君不為怒亦不變也一日郡守出教訪所謂朱詩人碧潭者吏人持教喧問市中莫識為誰久乃知其為君也吏人至門強君入謁君衣褐衣窄袖長裾濶步趨府守下與為禮君無所不敢當長揖上坐君所居西郊僻處田坳林麓之交終日無人迹守獨出訪之老亭數椽欹傾植竹撑柱坐守其下突煙晝濕旋拾櫧葉煨火燒筍煮茗以飲守皂𨽻忍飢詬罵門外君若不聞於是朱詩人之名譁於郡中其詩稍稍傳於人口然坐以匹夫交邦君指目者衆訕疾蜂起而守所以禮君如彼其降又不為能詩故守父故與君之父有道路之雅以講好而報舊德耳君詩雖由此聞於人人猶不知重其詩覆用為謗嗚呼可謂窮矣凡世之有好於物者必有深中其欲而大愜於心其求之而得得之而樂雖生死不能易而豈有所計於外詩之不足賈於時以售資而取寵君誠知之矣苦為閉關吟諷凍餓衰沮而不厭其好在此也人之不知重其詩烏足以撓其氣而變其所業哉君嘗謁豫懷詩數十首為贄色卑而詞欵大指自喜所長不病人之不知而惟欲得豫一言以為信也豈其刻腸鏤肺酷於所嗜雖無所計於外而猶不能忘區區之名耶嗟乎此固君之所以為好也君既死豫故特序其詩而行之庶不孤其意豈以豫文為足重君之詩於身後哉陸龍津詩序王慎中維揚陸君龍津少以異質有文名每出語輒驚其先生長老治舉子業譁然著於一時有司試士君即收其最等人謂陸君俯拾場屋俊選如地芥耳君顧不樂為舉子業曰是拘曲繳繞者不足為獨好為詩陸氏世有詩人以其學傳於家君與諸父昆弟相唱和長篇短什易詞險語更往迭來江左諸謝羣阮風流不足多也君詩益工文日益不著有司至試者鮮復録君同輩見其如此亦易視之君獨自得視衆人以舉業浮詞躐取聲利者泊然如無也不少摧其意其好詩益酷晚乃從一官捧檄書行數千里為人之佐頽然處羣幕中上官大吏皆所謂以舉子業得據尊踐嚴君方當趨走伏謁跪拜逡巡手板顚倒色沮氣屏得無悔前之為乎昔唐以詩賦取士士既以詩賦收其科發身乃有增治經術者方今號為黜詩賦尊經術士亦必以經術收其科發身然後習為詩賦其輕重不同亦制使之然也然必收其科發身後習為詩賦者乃可以釣譽射聲為世所述其不能收其科者雖善為詩賦世亦莫賞也君之為幕職不以卑冗逆自貶薄修飭振迅趨功急事鋭而不躁上官大吏所以接遇任使之者異於他職彼所以待之異者誠為君能官而已豈知其善為詩若此哉君既不悔其前之好自喜其詩益甚雖在卑冗煩苦簿牒之頃行役之次濡毫伸紙脰引吻決鳴聲嗚嗚從吏走卒為之驚顧不曉為何篇斷句落輒復自喜一日持其稿抵豫曰先生其為我評之觀君之意豈非有感於世之莫知而獨有望於豫乎豫早歲溺於文詞氣盛志強勇於自信往往為倫輩言詩妄肆雌黃旁視他人皆若無有今方自創氣銷志弛見人所作輒茫然却顧知不能及况如君詩之善者哉身廢名辱雖能知君之詩胡能為輕重君顧獨深望豫也豫既嘉其好又愧其意也讀其詩卒編遂序而歸之巖居稿序王慎中巖居稿者吾同年無錫鴻山華君子潛罷翰林家居所著詩也丙戌賜第當今上圖治之始方招延茂異思與翊贊鴻猷黼黻大業之意甚盛於是選其俊彥養之館中得二十人蓋其慎也子潛與姑蘇陸浚明袁永之欈李屠文升在選中尤以才名最於同館皆吳人也會大臣異意正邪相軋之機未決朝議靡所定館中所養並除他官無復留在翰林者浚明永之又以譴謫久廢而子潛與文升最後乃由郎中改授修撰陸袁二君廢既久著書益多君與屠君以文學進用清顯為上左右顧問講讀之臣復善為詩歌而吳中之材雖或廢或用要為有盛名於時然文升竟以疾自免君亦繼以讒貶自疏乞休詞學之士反錮於右文之朝良有不可知者昔之以才困者往往挾持所能之過憑恃傲睨以干世怨而犯神之所忌故不有忤於人則必有畸於天而諸無是也君尤沖雅惠良不以才智先物厚自處而薄責人有君子長者之風而亦以不容嗚呼其尤不可知也夫永之文升既長逝惟君與陸君在耳國論方明論思潤色之託宜無踰君當有圖及此者而君所為詩顧灑然自立於塵壒情纍之表意象之超越音奏之凄清不受垢氛而獨契溟涬若木居草茹服食導鍊淪隱聲迹者之所為言非世人語也豈其果於自廢不難與世絶無復有意於世用昔日急君上憂民物之志悔其非計而翊贊黼黻之盛如浮漚噩夢永棄而不顧耶嗚呼人方有意於君而君乃自絶於人其皭潔肥遁而不汚乎其亦懷竒抱珍足已自好怨而不怒也豫知是詩之妙含藻發擅長而成名其所以自悅者固其所以自窮歟雖然士之得志於仕顯融尊貴者未嘗一日無於世而半語片言合乎古而可傳於人者不輕使有之也君雖以詩自窮其又何憾民物之事功惟其無意於為之迫之而後起為之而必成逃世自足者人將求之而有意於干世者不得也君豈終窮者哉豫既為此序遂書一通以貽陸君共評之當以豫為知言也顧洞陽詩序王慎中剛柔舒促淫濫泰約之變人之性術情好動於其中而美惡之形成矣因形以有聲而得失邪正之言所由以出人之居處有養而踐歷有習拘焉而不備則於物之變有所未嘗性情之動亦曲而不中羮藜含糗者固不可語膏梁之豐旨而飫於珍滋之豢者亦豈知蔬茹之有甘櫛風沭雨勞筋憊骨之夫孰知廣厦細氊安坐徐行之為適而雍容都雅墮弛其四體者與之談郊野道塗勤動之故則不省其為何佚樂憂勤之境士大夫居養踐習之所閲蓋有終身由於此而不適乎彼者矣故人之為言其出於剛悍苛促困濫苦約而無聊者必其閲於憂勤之所為而狎於佚樂之習養常柔駑舒漫泰肆淫靡而不知節如是者莫審於詩久矣夫和平之聲不聞於時而士大夫之能美其言者少也毗陵無錫顧洞陽公好為詩其學於古無所不窺而皆以資為詩詩日益工好日益篤雖晚而不倦積日之多其詩至千餘篇可為富矣約乎禮而不迫優於興而不放文質相宣華實各得誦其詩不知其用意立法之至者亦悅其有和平之聲洋洋乎其可愛玩而咏歎也公所居天下所稱華潤膴厚處也故宦家而先世獨贏於財士之起粳糲奮蓬藋思陋鄙朴而崛興者非公儔也仕為行人為郎為郡守以至外臺副使彌尊顯矣其為行人以諫忤康陵繫詔獄杖之闕下僅而不死為郡始為泉州起復為虔州皆限帶嶺海荒阻險側崎嶇而詰曲又儉窳鹵確仕所不樂往為副使乃在珠崖大海島上往者侵犯驚濤而後至其境毒霧盲風炎厲怪棼之聚故漢所棄地也身外迹逺有蠻夷雜俗之治事機合遝而禍變反覆畏讒慮患焦仡造次而不得休其嘗乎憂勤之變熟矣生於佚樂而行乎憂勤所養不以勝其所習而所習有以充其所養宜其為言之美如此蓋性情之效而非鎔鑄意義雕琢句律之所及也世履憂勤而悴瘠都佚樂而宴偷其性情不中甚矣顧妄意於公之為言又烏可以為美乎公守泉時豫新以迎婚乞歸及侍公公詔以詩豫方讀李杜詩未熟也公數數談建安正始之風豫退而購魏晉人詩讀之然以尚少不能解其旨未敢有所請今乃得閲其集而序之信乎公詩之美蓋有得於魏晉也豫序公詩獨論其性情之效以著其所以能為美者非茍然也然豫固所謂履憂勤而悴瘠者雖能知公之詩而尤愧恨於不可及也明文海卷二百六十三
