body:
  text: 明文海巻二百六十五餘姚黄宗羲編序五十六詩集適適稿序黄姬水余父少綜墳典設料於晦墨之館嘗㑹諸門生言志時余方髫㓜父試之曰亦言汝志余即應曰棲丘蹈畝採藥飲泉父因指余笑曰此眞山人兒也及長游郡校而執志山水後母亡因遘心疾每在泉穴則神情怡暢危攀邃討積日忘疲輒有裹糧長往之意若歸㕓舍即心怔體攣不能一日歡怛且春明控景則思飛花滿屋蔓草連蕪青女司辰則思紅樹巖隈蒼葭水曲霞月之夕則思石斝臺琴雨雪之晨則思洲蓑江櫂雖至玩圖披壁往往心熱於攜家夢寐丘壑者二十年於兹矣嗚呼物性不齊人心各有譬之鷄鶩雖驅置疇甸其黍啄塒棲終來依人若夫山鸞野鶴雖樊之縳之其意未嘗忘振翮於青冥也噫性不可矯矯性者偽心不可違違心者勞莊生有言曰不自得而得彼者是得人之得而不自得其得者也適人之適而不自適其適者也嗟乎流光不駐人壽幾何今之赴衰即昔之趨壯也世之殉榮希進兀兀老死牖下者莫可紀算矣余獨何心果無感於莊生之談乎然而尋嶽未及買山無貲南國故墟坂田之畔有屋數椽泮溪四繞城山半開雖赤門之隅宛然僻島長林間也丁酉之歲潦倒南還十月初吉乃就居焉素心既酬性宇斯泰游澹合漠將運麥曠垠而畢影濳寂矣偃仰二晷輒抒十詠社中諸君遂和成帙因名之曰適適稿友生某謂梓以行其金陵客思以下若干首附諸編末者以皆一時之述也昔伯牙志在山水託諸琴唯鍾子識之予志在山水託諸詩世獨無鍾子乎覽是稿者識予志焉可也項子瞻詩選序彭輅項山人子瞻者以八十老死其所刻詩雖有他名公序余謂序詩如寫照必與其人久處熟其顰笑喜愠眉髪面龎神在我手然後付之筆端自有不似之似假令貌人於半面即巧繪乎所謂似形而神則遠矣余習子瞻頗知其詩暇日别選而梓之為之序曰子瞻集中自六朝初盛唐逮錢劉之調無不叅具晚唐之爛然著聲者間或有焉要之自為子瞻詩成一家言矣余嘗憶與子瞻共題余率矢口自娛吟訖付覆瓿而子瞻撚髭苦心洗琢期於藻瑩始出相示余每歎以為不及也且余知子瞻詩不獨以詩蓋以諳子瞻之平生子瞻於經史羣籍稗家梵典無所不讀而文選徐庾諸俊之什尤所酣濡者少以帖括擅塲似可唾手一第比試輒不收置弗更業日召客豪飲家用益落晚赴公車官上林非其好也棄去歸結茒南湖之涘數往來僧寺間惟韻人之落魄寄食藥嚢坐隱者與偕故其為詩榮爵之俗狀寡山林之幽趣多也况詩者人為之人之貴賤泰約各有其遇端邪清穢各居其品性質既殊音節自異操管握槧之間其肝腸肺腑寓焉假令曵組紱而語欲渉乎江湖彼敝緼而體欲標乎臺閣是之謂矯顧眞者流形盎然自吐卒亦不能矯也夫爽語擊目宻掞刺精愁苦易工歡愉難好草木震蕩衆庶領之而悅絲竹要眇惟邃於音者賞之故自奇視平者忽以拙度工者昧郢人之書待郢人而說燕人雖𤣥鑒曷盡焉且詩昉於謡采於風範於雅恢恢乎博哉難以拘方而議即如二南之巻耳喬木江沱多露摽梅草蟲其節舂以雍弼鄘之柏舟終風城漕采菲其衷怨以憶秦之小戎無衣蒹葭黃鳥其氣悍以直衛之定中淇澳其義閎以微邠之七月東山其緒繁以委仲尼不能强之而一也二雅之變者其人遭讒念亂賦役覊旅大都發幽憤惋抑之詞而騷之哀愴由此而興仲尼不以正雅律之也然則子瞻之詩當就子瞻而論豈必世代品式一一李杜高岑之哉近時能詩者雄偉奇崛稱高調矣而黃金白雪大陸風塵滿紙而是且挾齊秦之勁亢乏江南之柔婉不過藝家一體耳乃遽櫜鞬中原持其技赤幟天下以率寰區文墨之衆則過矣錢起首變開元天寳之格俾後之作者日趨卑下而摩詰愛之王楊盧駱未脫梁陳輕艷而杜甫尊之黃魯直佶屈澁晦較蘇之流暢迥别而文忠譽之使後有右丞子美長公其人必於子瞻有愛而尊之譽之者矣有慕子瞻者曰某不及子瞻之貌幸求之於神余語之曰乃子瞻之神則詩焉在耳今為子一叙列其為人將髣髴見之蒼雪樓詩小引楊師孔歲丙寅仲夏余較士葉榆闈中有危樓三楹據蒼洱之勝即余開西忩讀書處也夫㸃蒼為西南雄勝高出漢表十九峯叠翠競爽與白雲古雪相摩盪炎敲赤日不知驅在何處覺雪影雲緖時時襲衣裾耳蓋春山妍暮山紫夏山翠秋山青奇山巧佳山媚險山怪總可以名相形色求之曰蒼山者壹如天之蒼蒼然總青紫妍巧奇媚險怪不可名狀處而歸之曰蒼至不可名狀而山之廣大浩渺見矣况浸以千年古雪經歲不化濬入山骨崚崢峻整發為雲霞草木俱奇古淡漠之態夫蒼古近俚莽蕩近淡寒肅近苦孤潔近瘦余以寡陋腸吐淺僻之句寧俚寧淡寧苦寧瘦聊以自娛未敢妄為胭脂驚世目此余名篇意也金碧衡文使者冷然楊師孔題昆池草小引楊師孔昆海一水盪天太華羅漢碧雞玉案諸峰隱隱如蒼玉浮杯橫帶晉陽諸州縣三百餘里朝霞夕霏晴嵐隂靄靈幻萬狀信天外奇觀也漢武帝雄風壓千古至摹形鑿禁院以習水軍石鯨灰刼流落人間至今頌之氣奮余衡文滇海橫經㸃筆日日坐池頭為伏案生涯興逸情生敲對無侣每挹池上剰馥殘霞便成小句掬海為杯朗吟一過覺波光烟景勃勃生動不忍棄去即以池名篇用紀投荒享受耳因嘆余識奇不及吾家子雲然天予墨池較玉壘一杯不知孰為大小至篇中嘯咏淺淡無色蓋取昆池靈幻為奇非謂腹中有字也錄戊辰詩稿自序趙統戊辰冬十月榆林張叅將逮至西安得同寓越今已春二月方自擬出吾於張也蓋可以觀獄矣夫張别號榆中夫素好讀書多文事有用世才時相聚論文論時事己而㑹榆中生日為詩以相壽則新知也㑹歲終倭子為求詩稿則相與手錄戊辰一歲者稿中凡得賦一首古風五言三十八首七言六首近體五言律一百一十六首七言律一百二十九首五七言排律各一首五言絶句一十二首六言絶句三首七言絶句七十二首共三百七十九首為一通將授二子因别錄一通請於榆中曰教我詩哀乎怨乎亦冀巻而北歸得遥求教於上谷北地之賢士大夫也云嗟乎榆中夫人生命也夫往余在省署好為詩贈送慶弔往往得罪於人後亦幸被黜時白下尚往往詩題旅壁㑹後胡可泉以詩罪逮詔獄相知者多予小子懲曹子似泉嘗言每見小子詩則就壁為之改塗王公三渠則言輒命水盡洗去之而今且罹此獄毒以不免於死也况兹獄言乎榆中尚幸勿示匪人哉昔者唐陳子昂枉死俗吏李太白幾死獄中而宋蘇子瞻顧得免詠檜之𤯝以與我可泉皆考終無咎焉聖明在上吾何愛死榆中固知言之士也夫夫古詩之三百篇尚矣然彼固皆出於山川之文人也嘗時先師孔子刪者且三百餘篇非以其淫或怨也與而當時以怨罪者或亦多矣夫然而風雅之怨聲先師固不盡刪也其後遞變而為騷為詞賦古風漢魏而下浸成律體蓋至唐而律嚴矣人士皆相尚律非一朝一夕之可挽而古者而且不免於罪怨余多律稿固亦趨時者哉茍免哀怨足矣古詩及他古經傳多叶韻或曰合聲大叚所謂假借以成歌也至宋人始刋叶韻然所稽古尚不該遂令人溺古病不敢以天聲自為叶合余古風稿中亦嘗有所叶者榆中幸他日與好詩者相是正之乎且余再請之榆中余律稿中凡言拗體者古無是也律成於唐唐初律法尚粗漸趨漸細而嚴以趨晚唐拘律害意所以謂之氣格卑弱夫盛唐詩人率推李杜為大家太白律不聖於其古風子美集中間多拗於律後人不敢非也因宗而效之别謂拗體非拗於時也特别拗於宋以來詩人所守之敝律爾余非好為拗也志不忘古爾他有初學相病倒字倒韻者幸而告之亦願以其前一通者東寄二子也他日或能錄他歲稿者亦願寄領終教焉若夫詩教開風俗和神人以奠邦家而尚論古人之世固非余罪人之所及知也當情集序安紹芳昔王武子讀孫子荆詩曰不知情生於文文生於情余每誦其言輒淒斷者久之余友朗生顧氏譽擅雕龍才同繡虎夙耽逸致尤遂幽情間於一編示余曰當情集余三復之片語單詞咸申膠漆悲歌歡笑盡指河山字字肝腸言言涕涙固非宋玉高唐秪誇夢寐陳王洛浦徒託空言已也嗟乎文生於情在朗生猶能笙簧其語情生於文在觀者寧容金石其腸耶客曰樂戒過淫詞傷太綺如兹集何余曰固哉客之言是殆文章之彥借是以寄高韻寥廓之士託之以耗壯心耳奈何遂欲桑間濮上之哉王濬冲不云乎情之所鍾正在我輩請以是為朗生解嘲矣李北山詩序朱衡自余釋負從學士談時己厭薄李杜喜初唐一二抉竒之士不己則効齊梁諸人語補綴凑泊性靈豐蔀譬諸割錦不可衣塗澤朱鉛形狀離焉蓋詩至此弊矣而棟文者憂之怯刷炫冶崇冲澹直吐胸臆懲吹之過又至捐景遺物率易直截乏温厚之㫖夫詩有六義感物而興其感非外其興非内情由物觸物以情融綜盪萬有包并三才以言以諷而後為詩之教若夫語心指性則文焉爾而烏取於詩於以救弊而不覺其流之弊至斯也李北山所睹記與余同獨不變於習守先民之訓今讀其詩情物互縈文質有所底匪覊而止匪迫而流詞林一巨楨也古人言無足而至物之藉隨踵而立士之薄若君者豈不賢乎哉夢劒緒言後序朱浙思不苦詩不工夫詩固於思乎出也隨其思之所極盎然出之何莫非詩而至於苦思焉為之則驅率性情追逐時好己失詩之本㫖而天然自得之趣又豈鍜錬脂蠟以求工者所可得而同耶夢劒緒言一集乃我邦伯三峰朱公所作首尾兩年間己得詩百六十有竒首掉鞅騷壇追躡古作公亦何嘗刻意為此哉間嘗辱顧山中相與登文峰凌絶頂以覽於凉煙漲海之外徘徊久之乃返次於觀瀾湜沚之濵當時紀興三思詩載之集中者嘗試評之雲宿竒崛孤眺髙虚而觀瀾閒適體裁不同各極其趣是皆特於登臨倚徙杯酒談笑間偶然得之槩之他作固可知矣盖公之為此邦致勤於民而不廢嘯咏之樂不屑屑於為詩而其詩可傳殆昔人所謂性能而好之而神固不勞也公詩既梓傳於時淛因受而遍讀因綴數言於琬琰之左方以為公之詩不難於趣之自得也明文海巻二百六十五
