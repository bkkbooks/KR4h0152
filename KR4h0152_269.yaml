body:
  text: 明文海卷二百六十九餘姚黃宗羲編序六十詩集二盧先生詩集序徐學謨蓋余觀於吳中二盧先生之詩而知採詩之係於觀風者大也夫詩何以謂之風也詩非風也而當其所感觸出之以天倪猶大塊之有噫氣也蓬蓬乎動於物而不自知而亦無所不至東西南北善行而數變故謂之風也仲尼刪詩三百篇始風於二南尚矣其他列國之詩各因其謠俗之變而互為之聲若鄭之靡唐之嗇豳之忠厚陳以巫覡著秦以駟鐡雄又何嘗以一律概之也乃聖人所以各存其故而不廢者何哉取其出之於天倪而無事於假借不務詭飾矜勝以快志意炫耳目為也如必相假借務詭飾矜勝以快志意炫耳目如今人之所為則列國之謠俗混為一風巳則不能以自辨而採詩者將奚據而觀之乎余是以知古今人之詩未嘗不同而所以為詩者則異也夫大江南北其謠俗之不相為用豈不稱較然哉其發之為聲詩大都北主迅爽而南人則誚其粗南主婉麗而北人則短其弱而要之不詭於率然應感之情即仲尼而在均有取焉南北人亦何相笑之有余吳人也故知吳人之詩自國初高陽諸公以婉麗倡之稍祖唐調二百年來作者輩出即其人才力殊稟然皆以吳人作吳語務極其所偏至各自能名家雖間以弱詘要不至浣其質而漓之也蓋余猶及見其人焉逮嘉隆之際而北風日競矣一旦坐奪南人之氣而少年爭附離之決臆掉吻馳逐叫號於是和平雅淡之調希而傲睨浮薄之音熾率詞揆方不知是遵何風也哉乃若剪綴綺語錯落篇章情景無窮而轉換有限始驚艷冶終於數見不鮮耳此所謂欲逃乎吳而彌逺於唐者也故余嘗持論謂詩莫盛於今日而亦莫衰於今日適盧中翰仲諤示余以先世遺稿一編蓋伊祖伯仲師陳師召二先生所著余為卒業焉見其詩雅以質勝能會情切景而出之於天倪絶無今時詭飾矜勝之習庶幾哉余所謂及見其人焉者蓋二先生皆仕於肅皇帝在位之初年當是時海內承纍朝熙洽之後人俗近朴而搢紳士大夫率重本實而薄假借其為言皆自言其所能言即不能言必不肯勦襲他人之言以為言矧二盧先生又皆能言之士宜其詩表裏洞然如是藉令今少年讀之直野人語耳嗟乎是誠野人語也則孔子所謂從先進者舍二先生何適哉余故樂序其詩歸之中翰君刻而傳焉俾觀風者可以論吳之世也陽明先生重遊九華詩卷後序萬廷言孟子曰誦其詩讀其書不知其人可乎是以論其世也廷言誦陽明先生重遊九華諸詩而論其世其毅皇南巡金陵召見之時乎是時先生既擒濠逆凶豎攘功隂搆陽擠入在左腹召至采石而咫尺不奉至尊禍且莫測蓋亦危矣彼怵於死生禍福之交者垂首喪氣伈伈睍睍不能自存而世稱敏略之士又投機乘便僥幸於須臾固皆不足道其豪傑君子善處患難不忘其忠亦不過悚息待罪達旦不寐繞牀歎息而己固未有捐得失之分齊死生之故洞然忘懷詠歎夷猶於山川草木之間樂而不忘其憂油油然不失其恭如先生者也嗚呼此九華之詩所為作而誦之者之當論其世也歟蓋其良知之體虛明瑩徹朗如太虛洞視寰宇死生利害禍福之變真隂陽晝夜慘舒消長相代乎吾前遇之而安觸之而應適昭吾良知變見圓通之用曽不足動其纎芥也其或感觸微存凝滯念慮差有未融則太虛無際隂翳間生蕩以清風照以日月息以平旦煦以太和忽不覺轉為輕雲化為瑞靄鬱𡋯之漸消泰宇之澄霽人反樂其為慶為祥而不知變化消鎔之妙實在詠歌夷猶之間脫然以釋融然以解上下與天地同流矣故觀此詩而論其世然後知先生之自樂乃所以深致其力伊川所謂學者學處患難其旨信為有在益知先生千古人豪後世所當尚論而取法者也茍徒詞而巳騷人墨士工為語言者耳何足知先生哉嗚呼先生所處死生利害之大猶若此况富貴貧賤失得毁譽之小吾人可自隕穫乎隆慶丁卯豫在汀州幕僚周君子顯持是卷示余因有感先生之學而論其世敢敬識其末云子顯先大夫交於先生子顯少亦有志三復先生之詩而思其家學子顯雖未遇當亦有詠歌夷猶以自適而貧賤窮達非所戚戚然則庶乎尚論先生之實而不徒誦先生之詩也巳許孟中壬申所寄和詩後序萬廷言初嘉靖壬戌豫以應試來京與孟誠李君識許君孟中於衆人之中因定交於兵部主事南離錢君邸舍未數日三人同舉進士李君早得家學豫不肖從念菴羅先生聞主靜之説兩人常相議論君為一菴唐先生門人謂豫兩人言甚當日喜聞豫兩人言李君英爽超特豫固滯自守人見謂高簡君中剛外和溫然可愛故豫兩人尤喜就君以自潤蓋自初識及君授官南部時中間十餘月無日不相聚豫兩人為西曹郎每出署馬首所指兩家僕𨽻不問而知為訪君君有出僕𨽻亦不問而知其之豫兩人也三人之交如此頃之君赴留都視𣙜真州李君告病歸南山各不相見者兩年後豫奉使過真州與君泛長江登金山徘徊枕江樓者數日各有得而别又明年豫為禮部君改吏部再聚京師吏部故事鎖門避嫌而豫與君日講學如在西曹時人遂以為忌丁卯隆慶改元春豫出為雲南督學尋謫去君亦以病乞歸自是君臥苕水之上豫竟以罪斥屛居桑林不相見者乂四年矣庚午冬君兵備雷廉過桑林時李君巳先起復亦官廣中豫念與君再聚京師李君以病及憂居家今二君方良晤未巳而豫則己矣故豫為詩寄李君有想君論到同心處回首應憐少一人之句蓋深有所感不徒在離合窮通之際云又明年壬申秋君移官入閩自虔遣詩來問豫時有祖母之喪又次兒建明病夭悲痛相仍不暇讀無何君竟以前吏部講學之故謫官淮揚今年春豫卧病桑林靜追往事取前詩讀之見次豫之作云可憐萬里同心者猶是當年鼎足人三復不能去手甚矣豫三人者之不能相忘也自初識君至今十有二年中間蹤迹不一何嘗一日不在念耶離合之懷則有之又何嘗一念在窮達之間耶豫三人之心逺矣世方提貴賤之柄伸縮而榮辱之亦左矣雖然此心未易言也因記往年與君夜坐枕江樓時石瘦水落驚湍若雷喧然在耳少焉聲響頓歇四際幽寂如洗囂垢而遊物初與君異之開窗俯視潮漲石沒水平若鏡月在海際光隨潮滿獨聞曉鳥於是與君浩然四顧振衣千仭之巔思反身而誠踐過化存神上下同流之實事遂各為詩而别嗟夫今乂十年矣撫今追昔心體宛如皓皓之精洋溢江漢能終無蔽矣乎讀所寄詩超邁精徹往往見此意於言表則二君今所商切可知矣顧豫深歷艱難固滯猶昨三復益增愧歎因敘而書之納於二君一藏於家見豫三人所同心者有在又志豫之愧而冀二君之終不忘也萬厯改元五月午日泛舟詩序萬廷言余世家東溪之上溪北為太湖縱五里橫里之半縈抱溪上如玦兩岸多老樹最異者大松千餘株屛舒壁竦森秀深鬱夏秋月出當兩岸空處天空水清松林納影其中幽光邃碧下上一色棹舟溯波涼風徐來如大圓智鏡不知身在何世溪南為小港上抵三江口注東西兩大河委流下通會城約二百里其可遊者自溪之側左灣楓樹潭始委蛇瑩徹明沙淺渚小舟與白鳥浮沈自此抵石岡十五里港水北流而岡逆折南向孤拔數十仭羣松冠巔月夜望之鸞停虎峙有禪師菴在焉登高撫檻良疇萬頃星在平野朱羅閣皂西山萬壽之勝隱隱皆在几席萬厯乙亥仲夏望後之夕湖水初平明月如晝家君命豫小子棹舟舉觴邀族父太常君吳子維興攜二三子玩月湖上明日夜太常移艇由潭抵石岡而吳子暗卿實卿偕來振衣登高飲酒樂甚海白星殘乃醉而别又明日各為詩以賦其事暗卿謂豫曰自有湖山未有此樂是詩不可以無傳子其一言於簡端豫曰此秦風蒹葭之詩之所為作也蓋其所謂伊人者名姓本不可考必高視逺舉抗精神於物表而翛然塵垢之外者當時秦之風俗外則悍鷙於馳驅獫之雄內則俯首於寺人媚子之令急夸詐而尚首功巳不待商鞅之教為然其時高人逸士苦溷濁之難居思奮羽翮以自灑濯於清波浩渺之上而四顧無儔則騁盻蒹葭之逺託興溯洄之從庶幾一寓焉而未必實有伊人之可即也然自今誦其詩感其志蒹葭泜渚真若有伊人在焉將褰裳以從之而忘其為寓言矣詩可以興不亦信然歟矧學道君子凝神明遺耳目挹平旦之氣以滌其邪淫穢積之私冥太虛之精以暴濯於江漢秋陽之潔躬清明而遊物初亷頑立懦起弊維風雖一詠歌夷猶之頃將山川為之凝秀而日月注其光華百世之下際霄窮壤昭昭乎在人視聽之常久而彌著也奚必極目於蒹葭之縹眇乎其感人又可知也今固未能也然幸當明時無簮組之纍姓名混於鹿豕得自放於溪山泉石之幽漱道德之芳潤餐蒹葭之零露心境相融奚啻寓言則是詩信不可以無傳也吾子識之豫嘗謂史有不可信而論貴當情謝太傅在東山若無意於天下及輔晉視桓溫符堅如搏小兒於掌股之中卒成大業此其畜量以含世乘物以御情有非人所易測者而史以折屐譏之謬矣子瞻自謫齊安清高自居傲睨一世固未免知者之過然渡海以後所造日邃庶幾所謂齊得喪一生死者高風大節獨不當比於秦之所謂伊人者耶而世儒誚之太刻不亦過乎詩中有及二君子者因并書以傳俟學道君子鑒焉秋泛使君湖詩序宋儀望余自春按河東踰夏涉秋乃巡行支郡過臨晉聞有稱五姓湖者湖上有寺多深林古木余乃迂途往觀之因喟然太息曰嗟乎晉地土厚水深掘地數十尺乃得泉泉多鹹滷意殊苦之惟是湖周回數十里瀠洄衍溢不異吳之橫塘越之鑑湖乃徒以土人捕魚為利湖以故遂冒名五姓吁亦可異也昔子厚謫桂陽以愚名溪自謂溪且見辱然賴其文卒流聞至今獨怪其作晉問未嘗一述茲湖俾與愚溪並聞於時豈地之顯晦固有數耶余既坐湖上遂操舟泛遊移時徜徉賦詩扣舷而歌之蓋宛然江南佳境也巳感李白郎官之遊遂更其名曰使君湖焉嗟乎茲地自虞夏以來皆為畿內近壤當時君臣兢兢相戒惟以平水土教稼穡為務至於宴好遊佚蓋邈乎未之聞也夏后氏既衰太康始遊于畋盤戲無度於時羣臣咸怨五子之歌讀之使人悽惋流涕未幾遂有后羿之事乃知自古君臣栗栗危懼若墜深淵而不敢以一日自逸其躬良有以哉良有以哉自虞夏至於今且數千年以豫所見茲土習俗咸盡力於商賈稼穡絶無所謂亭館臺榭之觀殆有先王之遺風焉然至於嗜利務積貪鄙無厭則又非虞夏舊俗矣余不暇逺引即如湖水本以利民往往爭水灌田聚殺讕詞株染動以百十數彼其始徒以利心相隙險衷相傾遂至親戚為仇鄉黨成敵若是者豈獨小人為然哉由是言之則是湖雖幸見賞於余恐終不免辱於土人後人且益誚余愚也詩凡三首并刻於湖上寺中選詩序孫慎行詩所謂興觀羣怨者要以事父事君而餘乃及多識若後世人言詩專以多識先而君父則缺矣即於興觀羣怨茫無歸著竹林諸賢不可興者也其興者清言寄傲逃禍之藪也建安才人不可羣者也其羣者飛文馳議私門之植也胡笳獨造不可哀者也其哀者偷生忘義胡婦之音也六朝綺富不可觀者也其觀者哇靡沿習優曲之觴也是於君父大義直毁垣揖盜不己而乂何贊流教化之為是道也太宗既弗搜之正之髙中益煽而揚之子昂名為復古一振乃振於調格非振於義理也為周作賦甚巳古今所宗獨李杜人第知才高百代衣被詞人而不知其君父大義焯如也子美一飯不忘君人猶知之而太白以詩為諫烏棲曲清平調蘇臺越中作真所謂詠歌之不足則長言之長言之不足則嗟歎之者也自是繼起者無不以宗大約一身之窮通其關涉其興味猶淺渺而世道之衰離厄會追古悼今者波瀾橫于江漢節概挺于峰劍聲韻凄於金石點綴窮於繡錯此不蹈彼今不借昔皆要於極態而止焉非是道也不在其選夫千古此君父則千古此義理若激之弗動便如無孔之錐安用䂳之况有邈焉胡越不恤宗周又烏取夫嘷音梟喙者也蓋自武韋之朝大泄越之而諸季益凌夷即如維如光曦才美者尚拓落不齒非傑者不能自拔已嘗以四種衷裁之如太白歌曲七言古風有迫狹一世之心是之為可興樂天新樂府極鋪陳百年之變是之為可觀子美北征秋興收京歷艱難而無訿誹是之為可怨太白宫中行樂詞閨情詩寫深致而無艷泆是之為可羣諸類是者若谷藏山峙不可量也第為之舉其凡又嘗以人格衷裁之曲江昌黎東野次山達夫襄陽大義為可興隨州賓客栁州浪仙玉川清聲為可怨襲美微之義山仲初文昌樊川鋪陳為可觀其可羣者集中多有之即諸類是者亦明珠翠羽間雜不可域也第為之舉其凡他一二篇見竒見録者不可窮也所謂海錯山珍適口而止其凡為可舉焉北海睢陽魯公表聖大節肩一代人倫恨不多見其詩也夫論詩之作多識本興觀羣怨資也覩其名便深維其性情與品類而此興隨生作者所最用力也楚騷極命椒蘭桂芷虬螭鸞皇比興要念念在君國而無他之故為風雅之遺若諸家從風雅起義不第以楚騷起格自李杜而外則昌黎次山今未見也諸家故未有楚騷之才而未嘗不有楚騷之心其聲冽其志潔其致雅其思沈並彬彬善用于多識之資于君父間者大都楚騷流派無治世之風昌黎所謂和平之音淡泊愁思之聲要渺歡愈之辭難工愁苦之言易好也世觀者將病我不貴彼之華美而貴此之黯淡也豫蓋安我初服而不以易焉尹于皇詩序李維楨自詩能窮人之説興而無巖穴處士之行長貧賤者託焉以為詩必窮而後工則唐虞之喜起商周之雅頌寧窮士作耶蓋才有待以興亦有助以長稿項衡門耳目所覩記胸懷所營綜期不越旦暮地不越尋丈幽仄枯寂糾約一鬱即有結撰不勝寒儉之態豈其才不若人其居使之然也余所雅遊尹于皇氏者為中丞公冢子自舞象之嵗而詞鋒穎鋭後先督學使者無不置髙等所至王侯卿相分庭抗禮授簡乞言謂于皇窮士不可然年逾壯矣名不登賢能書黃口小兒能誦村學究語田舍翁不識一丁行金錢貴人曵青襟遊鄉校于皇乃與比肩為伍天步多艱國是淆亂中丞公切靡盬之憂即于皇詎能晏然無介於懷謂于皇非窮士亦不可于皇屏紈綺之好而薄公車之技遊思竹素準則先民嘗從中丞公事四方異書必購異人必造異境必詣異事必核聞聲思附同方合志故其詩祖三百宗漢魏奧廡六朝三唐博於庀蓄而嚴於師匠景有所值事有所感情有所會必寓之詩觀其所為栴檀齋稿者體有九卷有十言殆近萬京都宫闕之巨麗大地河山之靈秀衣冠玉帛之雍容邊塞兵戎之悲壯鴻生學士之間雅逸民獨行之修潔忠臣貞女之徑挺俠客酒人之慷慨羇旅棄婦之悽惻無不具足無不肖像藻綺者不墮浮誇淡泊者不窘邊幅軒豁者不失粗豪竒崛者不乖典則神與境合氣從意暢彼其外至之物絡繹輻輳使人應接不暇而皆受命於寸管操縱陶冶出之如一手可以採太史可以歌太師以稱大方矣設于皇而窮仰面看屋梁腐毫斷髭蛙蚓之聲不離泥滓安所益其知慧發其興况得此佳言如玉屑乎余故於于皇而信詩之不必以窮工也于皇不以其所窮自隘不以其所不窮自侈詘於一時而伸于千秋顧未有才如于皇而終人下者尹氏之先有吉甫其風肆好其詩孔碩而後裔不克紹以世卿取譏春秋于皇勉之哉他日嗣中丞起家顯庸清風穆如濟美吉甫詩能窮人乎令衆人歎服一雪此言耳徐文長詩選題辭李維楨余與朱少欽邵世忠羅一甫同館數稱其郡人徐文長才時己坐大辟錮獄中沔人蕭君遍為比部郎恤刑兩浙屬豫解之三君誦其四六書疏及二三詩篇率有致後全集出殊不然而袁中郎晚好之盛為題品天下方宗鄉中郎羣然推許大雅之士謂中郎逐嗅嗜痂不可為訓夫詩文自有正法自有至境情理事物孰有不經古人道而取古人所不屑道高自標幟多見其不知量也昔顔延年薄湯惠休詩委巷間歌謠耳方當誤後生如文長集中疵句纍字誤人不少甬東薛千仭奮曰文長佳者自有奈何以瑕掩瑜遂作笑柄選其瑜者以傳在文長為忠臣在中郎為益友矣文長曽居李文定先生幕下不合而去獄中有謝文定啓云三自反而以忠又何難於禽獸七縱擒而必獲終信服乎蠻邦今集不載嫌其太詘諱之也千仭用意忠厚類此且欲以此例選沈句章詩詩道交道庶其中興乎唐叔達詩序王衡嘉定唐叔達少以異才名未三十輟去舉子業人問子今何好曰好讀書讀書何事曰無所事也浮沈里閈中舌不能戰筆不能耕人多以為迂惟同里二三博雅君子盛相推服以為叔達當今無輩余時頗有亦黨之疑癸己余從家君至京邸叔達偕焉爾時士氣猶發舒投匭言利病者紛然叔達為私議某得某失具言其始終沿革之故胸中若有成案者時東西搆兵萬里外羽書情形不可測叔達獨逆斷此當是某喜事某害成或兵失將意或兩將不相得已而果然余怪問子何以知之叔達曰吾觀古人某時某事類此吾竊意之耳居常笑張空拳開橫口者如木騮泥龍不適於用酒酣氣振往往捋鬚大言曰使吾而得志其為李文饒乎余默不應他人則啞然笑而己其與人交未再面輒欲吐肝膽與之倘遇紛難隂為控解甚力而面揭其短使痛自懲人多不堪至有復見怨者家葑田百畝與寡姪寡妹共有好貸與居京邸兩年盡修脯濟貧交遂洗手歸鋤舍後數畦地剪韭種菘茍自給而巳余嘗規之君子為人為巳當亦有緩急交淺言深取約與泰皆非其宜叔達默然然終不能改也叔達作世俗酬應文恥為腴詞每不能當人意乃其論利害寫情景名言繽紛老法淡宕今人不能及也間以方寸覆瓿紙寫雜體詩如墨鴉余見而擊節多以他語亂之不竟讀逮再索觀則己薦几上塵矣頃余友王冏伯拉與北來搜其遺詩刻成帙余始得而讀之五言古高間逺淡以方儲韋不啻過之七言古步驟老杜乃專肖其精神五七言律出入王右丞劉隨州間其才情橫溢無如落花詩雖不束縛格律要之無粉澤酸氣嗟乎今天下詞壇書棟百倍往昔大能市勢小亦逐貧頗有清真絶俗倣佛此隻語者不吾乃知今天下文章氣節未必遂無古人要以古人生今時必不能挑取世名亦必不肯自為名即以此相天下士皆如此矣部成余謂叔達子誠落落雖然名譽不彰朋友之過也為之敘述梗概於卷尾李長蘅檀園近詩序程嘉燧余與長蘅皆好以詩畫自娛長蘅虛巳泛愛才力敏給往往不自貴重余呰力篤志類於矜慎而中不能無意於名頃長蘅屢躓而智益恬貌益腴若能囂然遺世以遊故不自知其所得日以臻妙嘗造雲樓留連湖上其繪畫為好事所藏去動皆盈箱纍篋余偶見於他所如觀古名畫心若不能得之至於詩歌率然而成尤不能盡見如夜遊皋亭龍居詩巳刻石山中始一傳諷雖同時老成皆以為不逮也昔人云後世誰相知定吾文者耶余嘗歎息斯言曩歲閩中宋瑴比玉見余詩於客坐遂相求於數千里外歷數年而始相識其囏如是因每與長蘅兄弟及正叔輩相對竊歎以為吾儕雖不逮古人亦非有諷切美刺宜傳於時顧其緣情擬物曠時日而役心神亦以多矣及今略不相示使生同時居同里所為同聲同好之人邈若異域徒令後人有不同時之歎不其惜歟余又觀古人流傳之文多收拾於零落散亡之餘而其為標序皆數言而定蓋物之美者不掩而論以久而自合物理固然達人之意方以愛詩愛畫為一病其傳與不傳皆無足論也余自楚歸舟行無聊追記生平舊詩八百篇絶不以示人雖長蘅丐録一通余猶縮朒不肯出然當酒酣淋漓新知在前則又不覺手舞口諷纚纚中夜不能己蓋其事惟可與知者道可一笑也甲寅孟夏將遊廣陵宿長蘅家因夜論詩約為黃山之遊且令豫序其近詩是嵗中秋比玉由白下來同觀月金焦信宿江寺鼓琴嘯樹或過夜分偶憶長蘅臨分之言姑不暇序其詩而聊序豫兩人之意如此唐叔達詠物詩序程嘉燧壬子冬叔達戲為雁字詩二十餘篇一時皆歎以為絶倫未幾又成和韻落花三十篇凡經數押而語益豪叔達為人志大而論髙平居意思豁然獨好古人竒節偉行與夫古今謀臣策士之略當其討論成敗興亡之故神氣揚揚若身在其間至於詞人綺靡之作讀未終篇輒掩卷棄去蓋其意不欲以詩人自名者也頃嵗嘗寓書武昌聞豫好讀荀卿之書遙相謂曰吾與君老矣無所用於世不若味莊周列禦寇之微言以養生以全其天年及歸見君容髮郁然時閉門止酒東城南陌足迹罕至蓋貿貿然一野人矣雖相對竟日而偃仰靜默蕭然萬物無以攖其慮至於偶然遊戲之作一何其健而富率而工也詩皆放筆而成語不加點故風神跌宕思致飈涌勢不可禦乃其體物多變用事無迹窈眇浩汗雖苦吟腐毫之士終其世有不逮此詎非雄俊竒崛之氣老無所用而偶溢為詼竒譬之金玉之伏藏蛟龍之深潛而山海光怪靈氣時一泄露有不可測者歟君自少所為詩文皆氣骨高妙似其為人然無意傳於時獨前後詠物七言近體詩幾於徘諧滑稽之作為好事所傳寫刻成總一百有四篇斯亦可謂盛矣余姑敘其大略俾後之覽者知其無意為文非特詞人之雄也松寥詩引程嘉燧李太白有望松寥山詩山在大江中焦山湛公以名其閣云余乙亥夏尋洞庭潤公不遇留閣中與湛公談詩品茶至通夕不寐臨行握手謂豫江山九月最佳子能一來是後凡兩到山而皆不相遇壬寅十月大風夜留詩於壁云寺外風江斷去津峰頭木脫月相親僧齋歸處窗如燭始覺寒風是主人又十餘年嵗甲寅余復過江時潤公演法華於金山而湛公亦來招余中秋同宋比玉放舟至松寥因值等慈等公少為諸生時客閩喜琴善詩素善比玉視余一見如平昔皆夙契也留草日至重陽始别方期結夏山中為書圓覺經明春湛公逝矣丁已卧病虞山則等公在焉與余時有警策語戊午别之西行偶一登焦山是日風隂蕭蕭堂宇閴寂低回西廊階除間啞啞如聞老湛吟諷聲心為悽然舊年刻詩二卷取凡自丙午者曰雪浪自甲寅者曰松寥志余晚遇禪老皈心空寂其所存詩皆唾棄結習之餘耳頃錢太史書云等公亦化去拂水草深一丈矣不覺投書失聲因追述此引於卷端辛酉清明日偈菴書李宋倡和詩序程嘉燧去年秋余至南都訪比玉李翁沮修一見歡于平生因邀余遊龍泉山余時不能從九日遂作詩見懷及讀其山居諸詩令人翛然有拔俗之想今年秋沮修將合刻其前後和韻往復五七言雜體若干篇名曰李宋倡和詩而屬余為序方余在上黨客有敘程宋倡和集板行於南都數年矣比玉少以才名豪於閩中其胸次恢疏廓落飲酒終夕不醉當興酣耳熱落筆如風雨至數千言不能休嘗在客坐見豫詩輒相求於數千里外比薄遊吳越及留南雍十餘年其名章秀句醉瀋殘墨流散人間往往遍於僧窗邸壁雖時為髙人巨公所賞歎而一再試皆擯於主司淪落不偶故其詩洸洋淋漓多山巔水涯蕭散娛嬉之詞以余蹇拙而憔悴寒餓間為漻泬之音大抵發於羇旅草野其為窮人倡和之詩宜也今李翁家世鼎貴子姓皆巳後先成進士身膺簮紱之貴而家有封邑之奉所謂王公大人志得意滿者乃能字櫛句比尋聲赴節以與寒士角至於層次疊發連篇纍牘此又何也沮修嘗師事至人以希長生久視之道方遺斥萬物以養神思與造物者遊而比玉頃年益恬然浮湛儕俗忘懷得失其心無毫髮坎壈不遇之歎此其氣浩然皆出於勢利酣豢潦倒窮厄之外故其文章聲氣不俟均節而自合譬則出塵之鶴在隂之和琅然高徹雲漢後之誦其詩想見其人恍如揖司馬子微李太白之流於千載之上必有倣徨欣慕而尚友之者夫豈徒尋常文士唱酬之什若候蟲時鳥之所能髣佛哉近世朋友道缺士氣不振比玉才氣空海內與人交出肺肝雖處窮厄而未嘗以詞色徇人在吳獨善余與李長蘅其居南都唯沮修尤善遇之雖少為先太守公門下所取士有通家之故而二子之交契非以此也丙寅冬比玉還閩展墓吳中訛傳宋病且死沮修倉皇寤寐形至誠矢將經紀其家相與收其遺文庶幾猶有古人生死不相負之意崇禎戊辰冬吳下友人程嘉燧書沈雨若詩草序李流芳去年中秋待月於西湖因流連兩山間至紅葉落而還雨若後余至而先余去在湖上不數日又初病起扶杖蹩􅍷而行然兩髙三竺諸名勝無幽不探無竒不詠日得詩數十篇余遊迹所至不能道一字僅題畫走筆數篇而己見雨若之詩畏其多而服其工不敢出而示之雨若乃欲余序其詩余又何敢哉猶憶與雨若看潮六和塔下酒後並肩輿而行於虎跑山間相與論詩甚洽雨若似以余為知詩者雖然余不知詩而能知詩人之情夫詩人之情憂悲喜樂無異於俗而去俗甚逺何也俗人之情固未有能及之者也雨若居然羸形兼有傲骨孤懷獨往耿耿向常人若不盡吾知雨若之於情深矣夫詩者無可奈何之物也長言之不足從而咏歌嗟歎之知其所之而不可既也故調御而出之而音節生焉若導之使言而實制之使不得盡言也非不欲盡不能盡也故曰無可奈何也然則人之於詩而必求其盡亦非知詩者也余嘗愛昔人鍾情吾輩之語以為不及情之於忘情似之而非者也必極其情之所之窮而反焉而後可以至於忘則非不及情者能近之而惟鍾情者能近之也由此言之雨若其將有進于詩者乎請以此質之蔬齋詩序李流芳愚公蔬齋詩凡三刻矣余嘗為序其二集别二年而愚公之詩復滿篋中出以示余其格益工益能達其所欲言者余曰子之為此將以為名乎抑有不得巳於是者乎杜子美云語不驚人死不休而白樂天詩成欲使老婢讀之皆能通其意兩人用心不同其於以求工一也然余嘗有疑焉以為詩之為道本於性情不得巳而詠歌嗟歎以出之非以求喻於人也激而亢之而使人驚抑而平之而使人通豈復有性情乎曰非然也夫人之性情與人人之性情非有二也人人之所欲達而達之則必通人人之所欲達而不能達者而達之則必驚亦非有二也然則求工於詩者固求達其性情而巳矣詩之傳也久而且多凡為詩者不求之性情而求諸紙上之詩掇拾餖飣而為之而詩之亡也久矣愚公有詩之性情者也生於山水之鄉有園廬僕妾舟車琴酒書畫玩好之具可以為樂而終日袖手而哦其樂之殆似有過於他好者此必以為性情之物不得己而出之而非徒求工以為名髙者也其可以語於此乎愚公有所幸姬人好畫能詩愚公自序其集行之夫愚公又能以其所好者喻諸其人斯亦性情之效也己明文海卷二百六十九
