body:
  text: 明文海巻二百七十餘姚黄宗羲編序六十一詩集操縵草譚元春予年十六時即學為詩初無師承亦不知聲病但有文選本利其無四聲韻可出入竊取而擬之殆徧其法止如其詩題與其長短之數起止之節而易其辭亦自以為擬古之大相似也越三年始有教之為近體者是時亦粗知詩意有問予擬古詩十九首及韋蘇州襄陽孟以下諸詩者則面發赤後數年又稍進并陸士衡之擬古江文通之代擬諸作私心亦有所不愜則遂泛泛焉回翔博覽於古詩近體之間蓋未嘗専精其力至於今愧之而要其猶知此中升降執筆運思輒有一二字近古者則亦十六時刻畫殆徧暗暗為我根株也然而力不専者過也予入豫章萬子茂先陳子士業皆言熊子伯甘長於樂府五言古巳而伯甘來把其詩則樂府五言古十之六合諸體十之四帙中分數多寡己可喜觀其樂府樂府以被管絃為功今未知何如也不如取其離者如五祀牧童敲蓮子夜之屬則離者也離而竒者也觀其五言古蒼以澹深以淳比興猶存胎骨渾然吾知其用心吸其氣而上不揺其波而使下古詩手也無不合也吾尤喜其合而離合而離豈貎為合者乎觀其諸體離即之間也而其離亦從其樂府五言古而来者也庸何病乎予因而問伯甘伯甘曰書無不閲者也惟不愛閲近代文集耳嗚呼得之矣詩之衰也衰於讀近代之集苦多而作古體之詩苦少也近代之集勢處於必降而吾以心目受其沐浴寧有升者子之不閲誠是也予嘗恨古今為詩之限何以不訖古體而止有律焉雕之繡之又從而减其句之半以絶之甚矣其不古也人生竭嵗時忘昏旦以求之精力銷隕於是而反以古詩為餘其不知甚者乃反以古詩為易大郊廟小田野將無真聲之可存吾雖衰尚願從伯甘而究之不敢忘讀文選時也謝于楚歴由草引袁宏道古云詩能窮人又云詩非能窮窮者而後工也夫使窮而後工曹氏父子當為傖夫而謝客無芙蓉之什昭明兄弟要以紈綺終也惟云詩能窮人大似有之管城親而牙籌疎一不合也氣高語率令人自逺二不合也富者惡其厲緡仇之若敵貴者忌其厲官避之若祟三不合也有一于此皆足以窮而况併之故云一日執管三朝廢饔妻子之所羞而宗黨之所怒也是物者何益人秋毫事而余輩酷嗜之余與于楚交有年初於歙再於白下于廣陵于燕市每見必以詩相質力追作者今春忽見于栁浪衣上塵寸許是則夢想不及者也問别來何所遇嘿無語試解其裝但見其詩益富語益奇而他無有余歎曰謝郎窮若此而詩不止是中殆有鬼非命也善乎坡公之謂王子立也有致窮之具而與子瞻為親又欲求魯直其窮殆未易瘳也余才不逮古人而窮不啻過之世人之見余者皆唾畏其氣相沾染也于楚訪予深山是予大幸然兩人者其氣味適足以相増益甚非趨避之道也于楚不能忍窮幸且焚筆硯余亦從此改業焉陶孝若枕中囈引袁宏道夫迫而呼者不擇聲非不擇也鬱與口相觸卒然而聲有加於擇者也古之為風者多出於勞人思婦夫非勞人思婦為藻於學士大夫鬱不至而文勝焉故吐之者不誠聴之者不躍也余同門友陶孝若工為詩病中信口腕率成律度夫鬱莫甚於病者其忽然而鳴如瓶中之焦聲水與火暴相激也忽而展轉詰曲如灌木之縈風悲來吟徃不知其所受也要以情真而語直故勞人思婦有愈于學士大夫而呻吟之所得徃徃快於平時夫非病之能為文而病之情足以文亦非病之情皆文而病之文不假飾也是故通人貴之解脱集二序江盈科中郎還自武林示余解脱集凡二巻皆諸體詩也余為序而傳之無何君渡江僑寓真州郵致後二巻示余則其浪逰時所撰山水記與夫朋儕往復諸尺牘云余每讀一章未嘗不欣然頥解甚或跳躍叫嘯不自持噫甚矣中郎言語玅天下也夫近代文人紀逰之作無論千數大抵敘述山川雲水亭榭草木古蹟而己若志乘然中郎所敘佳山水并其喜怒動静之性無不描畫如生譬之寫照他人貎皮膚君貌神情若夫尺牘一言一字皆心所欲言信筆直書種種入玅余觀李陵答蘇武一書悲憤激烈千載而下讀之尚為扼腕嵇中散絶交書寫成懶慢箕踞之態至今如見其人蓋其情真而境實掲肺肝示人人之見之無不感動中郎諸牘多者數百言少者數十言總之自真情實境流出與嵇李下筆異世同符就中間有往復交駁之牘機鋒迅疾議論朗徹排擊當世能言之士即號為辨博者一當其鋒無不披靡斯己竒矣要之有中郎之膽有中郎之識又有中郎之才而後能為此超世絶塵之文不然傍他人門户拾其唾餘擬古愈肖去古愈逺其視中郎何啻千里解脱集引江盈科中郎以病解官官解而病亦解于是浪跡兩淛新安諸山水間凡數月還過姑蘇余晤君江上奚囊所貯詩凡若干首自題曰解脱集余愛之不忍去目因為序而傳之序曰夫人受才不同故形諸題詠亦各自别譬彼蠶絲黄白抽於腹而繭象焉若乃㑹稽野繭從江淹集壁魚化出繅而為絲輒成異錦此造化偶然靈幻所致豈出自桑婦之手可同日道者余觀古工詩之家其大較三有正有竒有竒之竒唐杜工部詩該博典核包彚萬有而鍜鍊之極往往吐語驚人譬如石季倫觴客爼饈餚核水陸備陳而麟脯鳯炙間出天下所未嘗之味此夫正而兼竒者也李青蓮使事不必如杜之核用書不必如杜之富而超脱玅絶飄飄欲仙冷然如列子御風而行此夫専以竒勝者也至於長吉則事不必古人有語不必世人解嘔心造句突兀怪特如海天蜃市瓊樓玉宇人物飛走之狀若有若無若滅若没莫可端倪此夫不名為正不名為竒直竒之竒者乎盖有唐三百年異才一人而己中郎為詩最恥臨摹其于長吉非必有心學之第余觀其突兀怪特之處不可謂非今之長吉自君詩出而善悟者乃知才子肝腸各有真詩亦如春蠶腹中各各有絲無待假借要之君才畢竟若㑹稽之繭從造化靈幻變出是謂世間一種最竒之竒而習於詩套者或不盡厭君作以為非古嗚呼牛鬼蛇神長吉不免後世之口何况君焉然而長吉終不失為唐三百年一人知我者希則我者貴此論詩之概也錦帆集序江盈科錦帆涇者呉王當日所載樓舡簫鼓與其美人西施行樂歌舞之地也閲今千百年霸業烟消美人黄土而錦帆之水宛然如舊姑蘇呉治實踞其上此水抱邑治如環乙未之嵗余友中郎袁君來宰呉殫力圗民昕夕拮据顦顇之衆賴以頓蘇踰明年君以過勞成疾上書乞歸凡七請乃得解政去君性超悟深於名理才敏妙嫺於詞賦第一行作吏都成廢閣間或觸景起興感事攄辭有所題詠撰著越二年亦遂成帙其行也友人方子公稍稍裒次付諸梓問題於君君自標曰錦帆集盖不佞嘗詣呉署謁君君指此水驕予曰是錦帆涇也呉王霸業之餘我乃得撫而有之不亦快哉而其實君鞅掌簿書飡沐幾廢勞與余等余因嘆曰同一錦帆涇耳當呉王之時滿舡簫鼓及呉令之身兩部鞭箠呉王用之紅姝緑娥左歌右絃呉令御之疲民瘵黎朝拊暮煦昔何以樂今何以苦丈夫七尺相肖胡所遭之苦樂頓異乃爾雖然人生有涯苦樂有窮惟山水為無盡操有窮之具遊無盡之間而能與之俱不朽者其惟文章乎君詩詞暨襍著載在兹編者大端機自己出思從底抽摭景眼前運精象外取而讀之言言字字無不欲飛真令人手舞足蹈而不覺者嗟嗟後霸業而無盡者此水乎與此水而俱無盡者兹集乎夫君齒最少異日名山之業未涯涘乃錦帆獨托兹集以傳倘亦呉王有知乞靈中郎之筆不靳西施為君捧硯而令掞藻見竒有如是耶余所蒞治百花洲在其前而余日沾沾焉刑名簿書不能有所題詠撰著俾此洲托以傳也則百花洲之遭不逮兹涇逺矣假使西施有靈問江郎夢中之筆迄今安在不佞無辭置對矣敝篋集引江盈科世之稱詩者必曰唐稱唐者必曰初曰盛惟中郎不然曰詩何必唐又何必初與盛要以出自性靈者為真詩爾夫性靈竅於心偶於境境所偶觸心能攝之心所欲吐腕能運之心能攝境即螻螘蜂蠆皆足寄興不必雎鳩騶虞矣腕能運心即諧詞謔語皆足觀感不必法言莊什矣以心攝境以腕運心則性靈無不畢達是之謂真詩而何必唐又何必初與盛之為沾沾蓋中郎嘗與余方舟汎蠡澤適案上有唐詩一帙指謂余曰唐人之詩無論工不工第取而讀之其色鮮妍如旦晩脫筆研者今人之詩即工乎然句句字字拾人飣餖纔離筆研巳似舊詩矣夫唐人千嵗而新今人脫手而舊豈非流自性靈與出自摸擬者所從來異乎夫茄瓜梨棗之初登於市也一錢一顆人爭食焉而可於口越嵗之熏豚腊兔十錢一簋坐客投筯而不肯下蓋新者見嗜舊者見厭物之恒理惟詩亦然新則人爭嗜之舊則人爭厭之流自性靈者不期新而新出自摸擬者力求脫舊而轉得舊由斯以觀詩期於自性靈出爾又何必唐何必初與盛之為沾沾哉中郎論詩之概若此君丱角時巳能詩下筆數百言無不肖唐君乃自嗤曰奈何不自為詩而唐之為故居恒題咏輒廢置不録及其令吳二年移病乞歸友人方子公為檢其圖書付行李從敝篋中得君詩一編讀而㫖於口曰異哉有物若是而以供蠧魚其不盡充蠧魚腹也其猶有物䕶之與於是稍稍裒次付諸梓題曰敝篋集夫爨下之桐至音出焉則中郎茲集之謂矣桃花洞天草引江盈科桃花洞天圖經所稱第三十六洞天外别一洞天也不佞家於洞天蓋淡然無慕於世而偶與世搆在囂繁之中則時時憶洞天之景可縷述云方夫春風煽和溪水乍緑仙葩爛漫蒸為紅霞流為落英而不佞與蘇王諸君泛輕舠白馬浪光之間庶幾遇所謂問津漁郎者與問答焉逮夏而梅溪之濱渌蘿之滸青莎千頃翠竹萬竿文禽戲而上下黃鳥鳴而徃來則相與披薰風坐緑隂陶陶然㤀其日之如年也至秋而漳江潯陽兩寺相映皎月東出澄波含璧俯仰乾坤湛然玉壺而吾儕乃拍肩執手坐月中調瑤琴吹洞簫徃徃興發丙夜不寐未幾朔風告寒萬卉凋謝而或黄雲黯淡瓊花四飛此中諸山玲瓏一水凝碧則又相與著綈袍扶笻杖出郭遨遊問酒家所在而買醉壓寒浩歌歸來然則洞天之景四序流易吾人乗而行樂與景俱適何非逍遙婆娑時歟顧自分屈首受書不能如瞿黃諸君遊於無言之境時以其天趣所㑹發為文辭誠不自知工與不工而就今筐笥所貯要不可謂非洞天中來也夫抉洞天之祕直將遺世獨立羽化登仙而乃以戔戔者當之得無令瞿黄諸君掩口笑乎然要於各適其適則不佞與諸君甘之矣蘇王别有集茲概及之以著一時相聚之雅云爾明文海卷二百七十
