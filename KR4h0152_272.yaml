body:
  text: 明文海卷二百七十二餘姚黃宗羲編序六十三詩集劉上甫詩序周詩雅語云詩能窮人非詩之能窮人而窮乃詩境也又云愁苦之辭易工非愁苦之偏饒於辭而辭之以凄清逼出者愁苦乃工境也是故楚臣去國漢女辭宫以真情而造真語雪害朝吟霜笳夜拍以真語而貌真情字字涕淚字字名通無古今一也如我昭代盧次楩以楚囚而噴礴其犖落難降之氣徐文長以羈栖而綿邈乎寥空髙寄之思讀二君之詩者入口若棘入喉若刺入心脾若耿耿素不相呷之味拗尋嘗之菽粟而别自戛然噫此二君之所以不泐也亦窮愁寂寞之所以存名士于千古驕才人之三寸而無致玄其亭咄其書于動便得礙之處而獨豫之以堪不可謂非造化者之寵窮愁寂寞者也劉上甫胸抱異姿落筆如摛會稽之神繭而自成天藻其詩初艷王李尋目囁之茲鼠肝而蟲臂之矣意必日真調必日創格必日古字必日新若深若淺若逺若近有天機焉以行于其間蓋原其髙貴之骨氣而坎壈練其神色嶮巇深其閲歷上甫每酒次耳後生風鼻尖出火以白眼向人人無不歎其神逺者向顔齋以頌酒而茲署以逸醉知上甫之傀儡有澆不盡者在豫願上甫無替襟期百篇斗酒良足不泐何必煦煦家人生産是問耶社中為伯始師慕生兄曩久以韻語相訂上甫不憶庚戌嵗春甸之咏我輩四三兄弟滌腸鏤肺為之今豫以鹿鹿紅塵有孤白社上甫其將有猿鶴之誚矣哦醉逸之詩而以愧吾勞敬為醉鄉拈一瓣香以庶幾於昔人薔薇露水盥手啓讀者上甫又將目囁盧徐而漂之矣官子詩引杜詔先天下言詩之家固人人殊哉清新博麗之異途獨創準古之異術力索自然之異尚豫以為皆是也惜乎皆後半截語耳其説在治玉矣今有良玉於此或欲琢以為叉或欲鏤以為環或欲剖以為玦或欲礱以為珥又或欲仍以為璞然而所以可貴者必其質先是玉也玉則無不可也不然而石然即琢之鏤之剖之礱之仍之均無當也今世所言清新博麗獨創準古力索自然諸目則琢之鏤之剖之礱之仍之之説也而皆不先問其是玉與否是故各操一石而坐於五達之衢講求時樣摹倣古欵矜詡獨見蓋不啻目力既竭彼此相譏而不知其究與瓦礫同棄而巳何也彼質非玉也多端何益哉吾友官凝之為詩不然匠心細意亦有時粗枝大葉渾渾噩噩亦有時巧極工錯而要其可貴者則以其璠璵結緑之質時隱隱見於筆墨之先篇章之外乃所謂玉焉耳諸餘非凝之所屑也嗟乎今天下戎馬生郊中原喪氣嘗中夜拊枕念吾髙帝之豐功大烈欲竊比唐栁宗元宋謝皋羽排比其櫛風沐雨以至於制禮作樂之迹為國雅若干篇以備采擇而才分不髙見聞孤陋未克就緒雖然此大事也郊壇琮璧非玉曷以將與官子交勉之明文海卷二百七十二
