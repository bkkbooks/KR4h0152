body:
  text: 明文海卷二百七十三餘姚黃宗羲編序六十四詩集香雪山房敘稿鄭之玄仲聲來桃源有香雪齋詩清冷竟體姿韻欲絶居然正始之音王孟之室矣久之仲聲受詩禁於林職方先生示勿復為且約其家人自今以文代詩但成一文持酒肴醉噉我若成一詩齎大田縣百錢納罰秦比部先生聞而揶揄之復更貽以四句請君吟詩禁莫堅勸君戒君俱同年如何聽戒不聽勸只愛一百大田錢仲聲為之絶倒而於是詩禁復弛余謂勸詩戒詩禁詩作詩數者皆大快事留之帙中便是他日桃源嘉話不可以不記夫以仲聲之才負八面之鋒盡四聲之長厹矛作使鼓鐘皆應何有於詩文之相格且不逢敵國則巳茍逢敵國其於此道治之如鞅起用之如桓文勢必沾沾而後巳而其詩又真可以正始可以王孟彼滅裂風雅以贋宋代全唐以公安代厯下仲聲必不為也夫仲聲如之何不聽戒又復聽勸也郭暗生詩序鄭之玄詩者性情之文也性之所至情之所之一往而深而韻生焉不可以強索也贈别之詩不如蘇李酬答之詩不如元白遊山詩不如謝飲酒詩不如陶憂悲詩不如杜間適詩不如李蓋各有其性情而己矣詩之苦人者莫甚於應酬本非其志而強為之韻其塞白應付之語自己猶為嘔噦况能使人興乎吾郡稱詩之士至今日而多求其至指未多屈以今讀暗生詩則流連把玩竟讀之惟恐其盡暗生筆無點塵於應酬之篇絶少諸山川之留詠花竹之品題非漫然強索有一種獨歌獨解之意衝於口而了於手韻新而叶骨抗而夷所謂性情也若其吐納風流徘徊香艷尤為擅場一家之言宜何愧焉豫少而稱詩長不入室塵嬰所觸風雅索然間有所作不敢出以示人暗生年少方茂其刪而僅存者尚得三百餘首可以示人豫所以歎暗生之才而服其勇也嗟夫夫不性情而詩者無有哉熊公逺詩序鄭之玄豫章人士之言曰江右詩派肇自淵明而世競指黃太史山谷為江右詩派是不可解豫謂即以山谷張江右何不可也淵明間淡自然其優孟於和陶諸人之什者性情不可得而肖也且如飲酒乞食之篇踵而為之則無味矣山谷蒼涼孤峭自成一家其於此道足稱狂狷東坡常稱其行配古人文絶當世並時遊蘇公之門者皆未之及蓋自前輩先生好以開元大厯之格厚繩天下之為詩者而詩道反不振近日海內之士始能好晚唐宋元之作而山谷諸詩乃為詞壇之雞跖矣熊君公逺江右産也其人其文既以玉立霞舉矣讀其詩則體氣清華格力髙踔肇墨之外别有深情雖開元大厯不與易也豈其有所派而然者歟世之習為詩者其人皆未必不得之山川之周眺今曩之俯仰公逺年少即渡江涉澧先金陵後巴蜀窮搜不暇至於陳拾遺之草堂劉梓州之文冡彰明而想青蓮浣花而懷工部又近代則楊用修袁中郎諸君子者莫不徘徊㑶歎想見其人發之於詩是其胸中豈徒哉其於此道所志者深矣竟公逺之才使其盡發未見之書鼓吹盛世風雅人又孰得而及之陳古白詩序鄭之玄蓋余夢寐十年而得古白也一見稱杵臼交古白惡喧闐甚鍵戶讀書而余適抵山中中秋前後僧寮妓席酒坊花肆余皆𨽻焉古白顧以為壯許之既與論詩合既互讀兩人詩皆相善余乃言曰唐宋人詩可相有不可相無尊唐甚者詘宋尊宋甚者詘唐二者非是唐力取其聲韻宋力取其才情聲韻不足而才情之古今人不相及己可知也獨空腹之夫食唐餘吐競詫唐音蓋病馬腐鼠不堪之極於是一舍之宋而有科頭亂髮之過有觀者猶得新其耳目是趨宋者以唐人難學而厭唐者非厭唐厭今人之為唐者也古白曰吾但能為性情之詩吾但喜人之能為性情詩者他所弗問今古白之詩縱橫而韻清穎而才境取其真意取其快誠所謂性情之詩而非有意趣舍唐宋者之所能及也古白於國朝詩人指不多屈所善李空同徐文長宗子相蓋古白之詩可見於此明文海卷二百七十三
