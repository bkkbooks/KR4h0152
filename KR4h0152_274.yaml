body:
  text: 明文海卷二百七十四餘姚黃宗羲編序六十五詩集自言序鄭之玄偃卧齋中自念精神朽蠧乃書流水不腐四字以自洴澼而稍取先正制文字讀之齋頭梅甚晚與留連逼嵗不忍歸歸則攜一枝以去閉一室中日效先正所為家人告炊盡就門縫與語曰方作文未暇知也家人以為囈凡五日徑得九首題曰守嵗豫惟古詩人之窮者無如孟郊賈島輩想亦癡心如豫不解出謁天寒嵗暮生事寂然不過除夜作一兩首詩記年月而己豫逐貧而所得殊侈如此便作過嵗佳備也卜以除日脫稿命酒脯祭之然後出示同志焉石桃詩草自序蔣德璟先觀察以易起家璟八嵗亦習易苦不能了了比從之江山署中先君退食手課諸子雒誦而心怪璟以為兒聰悟乃爾顧若易何也試使之誦詩瞥開卷即躍然喜若與三百篇有宿因者自此每奏一篇未嘗不稱善間浮白賞之曰子紫垣小星也因令兄弟各占一經璟既幸以詩舉而弟瑗舉春秋伯兄子鳴雷舉書餘亦亹亹逼人然璟於詩則終有未解者少無詩師第以意為之間取毛鄭魯韓家參以詩紀詩緝及吾鄉黃恭肅蠡測私謂小序距詩近傳信必多而宋人距毛公復逺千餘年顧盡掃而奪其位疑一也子産叔向輩皆春秋賢卿相所賦詩多鄭風今誤認鄭風為鄭聲盡以桑中目之疑二也詩為樂作與它經異即風雅頌又復自異凡房中之歌朝會征伐燕饗郊廟方社之什體裁既别音節便殊此即使漢魏樂府盛唐名家分路専門未易髣佛而今腐之八比又多出不詩不賦之人於唐詩宋語不解安能解三百篇疑三也夫子謂詩可以言可興可觀可羣可怨事父事君授政専對挹之有餘今學詩比他經獨衆而絶不得其用舉一世之學士大夫心研手追積有年所而不能窺古人征夫思女之一班疑四也四疑者余即今未了了亦與讀易何異余也愧趨庭之教多矣石桃在先贈公丙舍余丙辰戊午讀書其中詩稿多殘落不足存門人與兒輩再刻之而書吾愧以示兒且以望諸君子之善學詩者旗亭問咏序唐俞今世操觚家類能稱詩詩與文將無同乎人亦有言論詩如論禪取其妙悟也既妙悟矣文章之道何獨不然吾觀雲霞絢綵泉石吹籟此形聲之至也然無風則不行動於青蘋而瀰於六合有含必吐無觸不興詩人之思文人之致也其如功令束人有竒自抑使行空之馬勉就銜橛燭地之龍反資膋燧風塵未偶品目難齊子昂善價於碎琴摩詰呈身於貴主倚門賣笑殊自汲汲觥飯壺飱之論識者有同慨焉唯是大雅不作正恐知希濮水自珍寒山誰語所謂索解人良復不易唐三詩人旗亭貰酒以最自矜惜之句聽諸伶人某甲某乙亦與今士子待命主司情景頗埒嗟嗟唐制以詩取士不能得少陵而羌笛春風獨操左券於雙鬟之詠然則生平浪説過眼還迷反不如彼姝者子猶能作上官昭儀明月夜光之鑒也不亦異哉吾儕落落負竒既不能為鹵莽之獲亦復感甄寄思弔湘寫怨梁甫幽吟新婚别歎遊歷有年嘯歌自放一切風煙草樹山川愈愠之情無不收入寸管借八股中聊作生活聲光難掩冷暖自知惟有標新送難品白論黃友生之樂差勝一第昨嵗會稽余公遜赤城陳木叔與余讀書戍上唱酬往復篝火雪楞選言相賞雉壇有盟於今而再兹公遜己翔霄漢而吾曺猶視藪澤杏園百舌誰醉花傍片語千秋一吟雙淚豈風人所謂窮而工者耶憶昔京邸余與公遜定交杵臼間關門異人望氣可卜德操水鑑小以自慰未敢輕擲新渠之瓢木叔才華復可頡頏公遜東南竹箭宛委雙圭橫溢三洲竒爭五泄一酬鑑水一憻龍山明年渴睡漢但恐捫心于不免捉鼻于如何耳木叔再來與沈彥方諸兄集苕上其居停朱閬仙邀諸名勝有社藝之刻閬仙故雅遊聲氣所至自吾郡而外白門檇李之英無不鱗集劎合各吐祕思抽妍詞播芳發條粲風鬱雲麗藻芊眠􅋂﨑歷落猗歟快哉然而遊處略同嵗晏蕭然未免借世人色目稍足增價涼州一詞不必與少伯達夫爭衡角勝而避席擁爐歡笑以俟正恐當時名部艷曳奢華未必能竒賞者也竊嘗疑近世才士之病如昔人譏子雲不能竒而好竒稗虞象胥讀者有味謂海錯足饜梁肉毳罽可差文錦而媛媛妹妹之習體似香奩裙裾脂粉素妝雅步舉止大家雖復曺劉沈謝翻似奄奄曺李妄意名山巨川而外另有神丘火穴履之不能思之欲往噫嘻文至今日贋鼎子書操戈傳注幾成劫運遂變繁聲吾黨各具素心不作誑語其亦相視莫逆有諧暢無揶揄庶幾少陵所稱交有道焉視彼揣摩世宙自命漢隂之橰傾軋文壇相尋曠林之戰若人風氣如此己有下劣詩魔入其肺腑雖七步八叉不足多也此又我輩自譽自嘲不向儔人問渡儻異日者天子采新聲被樂府社中兄弟當自信文章中有國色部曲外知音聲滿人間光生几案必且有如達夫之達者又不獨以白雪之調箜篌之謡自相祕重還念今日小窗凍雨抱膝長吟斗酒自勞懷珍待價聽隔座品題賞固欣然棄亦可喜旗亭之問即屬新詩雅堪譜入得毋曰正復索爾時不可得耶明文海卷二百七十四
