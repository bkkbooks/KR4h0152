body:
  text: 明文海巻二百七十七餘姚黄宗羲編序六十八詩集詩存自序陸符小序曰詩者志之所之又曰情動乎中而形於言陸士衡曰詩縁情以綺靡沈休文曰賞好異情意製相詭由是言之離情與志莫可名詩志極情生景斯以叩三百篇而降騷賦樂府五七言歌行律絶意製詭譎雲委波屬要之多情語也無情之語不可久視襲古人尖句短律媚勢佞主市交遊而作聲色豈情也哉余之詩始於薌澤乍聞襦袂解酒潮初上粉痕知盖兒時情鍾之句自此率多斷章往来胸臆間然皆遭於情而跲於辭至壬戌而始多積紙有酬答者有贈寄者有詠物者有鳴志者有孤憤而牢騷者有一往而旖旎者有登山臨水逌然以遇者有偃户倚牀泬然而得者要不足以當古人特非其志意之所寄則躑躅燥吻終日不能以濡一翰凡余之得自有其情可伸眉於古人者獨此市交遊作聲色灑然爾己矣雖然時人方貴科第尊制義詩賦不取以進身而榮名不出於市交作聲無以飾不材之容擅謀食之勝余故決然自此謝遣庶幾少酬時人之望而終竟古人之志因取積紙刪半存之自壬戌迄丙寅得詩賦九十六首名其編曰壬丙詩存藏之笥中姚天逋詩叙尹民興艾軒曰詩芽茁自楚國盖以風始江漢騷肇三閭也楚人以直大激昂之氣洩諸詩歌故能内貢丹心外儀峻表靜言哦之穆然懐矣而或曰和平温厚詩之範也浸以漂柔為和無統為厚卑僬為温熟於昆弟親戚之謦欬而駭詆四域之言者為平又且取暢閒情抗聲雅致緬鏤脂黛銳競風流啁嘲法言優戯逺論使人蕩然不知是非治亂之所存生心發政將工和同綦盗誕以飾邪文奸為上策誹直言正色為迂勞相漸相漬其不足以持國理民矣惕乎吾黨之憂也春秋一書繼詩而作也使二百四十年之臣子如蹈肅霜皚雪之中豈温厚和平四字足以涵盖斯書者而詩可知焉詩之體嚴所以遏駑散貪戾之氣刦之端慤也其為聲也壯震動斯民之聾瞽而泄諸聰明之庭也芭其義叩銅盤者指在日也象之鼻告以杵也使人如臨蟠龍之淵而不敢䙝測也夫然後並峙四經始洗天下是亦天下之最尊尚矣天逋莊士也其為詩也用巨闕不用琚佩用隂平不用蕪皋用狂狷於無妄之世不用無非無刺側塞堯舜之門誠為楚國之英談而達春秋仳詩之逺㫖矣或曰天逋工杜詩故能制造華妙博應無方予譏焉昔子胥文種生不相比也種死胥從海上取種去並駕濤輪激揚先後故曰同者不親親者不同吾有以知天逋之詩矣昔者吾友嘗有大絯也衆焚和天逋沃之介然不變是固天逋之詩庫也夫人有具剛大明挺之氣洩諸文章流諸事業安往而不善美乎譬諸神母飛乳五百道俱墮千子口中豈有計量於其間精一而通固其所哉余盱天逋渀盪此氣於下上之間綏靜黎物何但取暢詩情也某小吏學詩序之尹民興士苟挾寸長如蟄蟲始振蠢然欲出汝歌詩滿箧十載楚游寡有知者何也某曰固不願人知也詩迫以求知則必役我心靈媚人眼孔譬如燈光能耀四逺限以垣隙的然一綫耳世人之眼大不及隙而我之光日縮於近不至火盡薪滅不止矣彼三百篇一時淫女情夫孤臣孼子以自洩其狂惑之情而亦不知某句和平某句温厚使知數百年後有一魯國男子刪定其詩以為千萬世之經恐將瑟瑟雕飾而出亦不能廣心肆志以自造於不可思議之域矣余守此志二十年自酣自暢自顚自狂不喜世人譏彈惱亂此心也予曰大哉汝言推此心以治世孫武之用兵衞鞅之行法李牧之守邊而子産之治鄭也詩云乎哉此數子者皆置心於毁譽得喪之外故能堅守其術以及於成世間小儒不足以謀大事者好名之心重而瞻顧之念多也夫子穆然而思寗武子之愚愚者不知毁譽得喪如彼數子者也嗟乎吾安得斯人而與共事天下乎叙翼子弟詩尹民興予與昭弟自吳越旋往往胷中有剛激氣相搏為詩語取快意㒺遵先典一日各出若干首以示邑之詩先生先生軒渠曰二子之詩若以鼻職食以口職嗅也五官錯亂予蔑觀子之詩矣於是嗒然自廢者閱月久之剛激之氣愈多無所傾瀉復抽前吟益破器局兄唱弟和左歌右舞始以鼻職食今有竅者皆鼻矣始以口職嗅今有聲者皆口矣頃之翼子告予曰遂忘詩先生之言哉予曰人之為詩若造化之生人也但令精氣滿足其口耳闊狹骨肉窳隆氣機率焉而天亦莫之限矣夫魯國聖人身横五畆腰大十圍執為聖人之榜式彼短小者遂絶階聖之基乎此猶小大長短之說也龜骨外出蝦腸隠腦蟲翼鳴蜇口腹之細及草樹有先花後實先實而花或不花而實或根天而枝地竒竒變變然後造化莫之窮若使腐儒司隂陽朝範一人夕型一物瑟瑟而求之規規而度之造化之息焉久矣翼子曰詩何始乎曰談詩如談兵善夫運用之妙存乎心此古將所以取百勝而亦虞夏之詩歌遂為三百篇之曽祖父也譬諸山水泰山髙故能吐竒雲溟海深故能作壯波若以臊穢不潔之胷營度髙超淵邈之響是猶索波于澮期雲於垤也憶弟始歩時日禮大士千母疾將革禱佛百日光充于閨疾以瘳曽受某所金審顧未義迴舟百里以還之多如此類此正弟之詩母也夫有姜嫄必産聖稷有太姒必毓寕王内充外章詩亦有然者不聞后稷肖跡於大人康霍求形於西伯也敘洞庭秋詩尹民興四政迭霸秋底圓盈固天地休豫之會而記曰秋者愁也管氏亦曰秋徳憂哀何也盖嘗諦諟斯言矣穉童之物衆所不材髙其柯者拔其本矣毛羽之滿来網羅獸肥澤火焚和天下之害伏於盛好之府者不可一端而竟也以此知履成之難甚於履虎保終之味苦於飲藥故聖人致其翼翼焉以聖人之才暨智跨天下而何靳乃伯禹拜昌言姬旦輟飯沐夫亦曰堂上之糞不除則郊草不瞻其芸也橋泄之氣不拔則百鬼欲毁其成千人共指其仆也倐倐兮貫日而治詳終身之如曲列矣何惑乎天地之憂愁當百寶鄰成之際哉今試盱衡夫秋也菶菶谷明澤鼓疎果羽毛之屬煙海獸介剸車此天地之阜積哉然而凄凄之風其愾歎矣肅霜皚皚其恂慄矣氣摽以烈穆然幽思矣故曰秋者嵗金𦂳斂之氣以勁切百物者也些菴乃哦洞庭之秋章三十是義何居洞庭者水之都居也龍魚百怪之所昌也砰天浮山宜觀夏大舒氣敷和當逐春蠢秋則將韄其櫜矣些菴曰吾於馮閎之壑而存聚斂之神處竒矞之區而作清夷之覛善夫此目也夫逐廣大者志蕩憍而不收迷魁竒者反彝常而戾類處至大而軥于至的臨極險而㡳於至平非憂愁莫逮此些菴因階麗於盛差夏而戒抑古人翼翼之心歟憶與些菴舫度岳陽雷雨大作余曰可為洞庭雷雨詩不果今則秋之雷雨者以贊陽秀宣養嘉材者也秋以黜退散越修潔庶類者也有黜退之下意而後宣養下驕持修潔之奥苑而後退藏入密公握其本予守其剽予游于瀾而公己綦萬業之能始矣其於天下若工倕旋而靈臺不桎則今之詩鏤瑕琢玕而刀刃不傷者其亦得此意焉否也既倡此目會同詩壇以殷翼逝于丘以為勤行者寡跂矣同姓而發新籟者些菴叔子野臣也異姓而鳴鐘頌者岑嵐袁子也袁子襄陽人豐意氣善家仲又曰秋趨蹌也進而不舍之象也惟憂而後能進進則駸駸焉自不能舍矣故晉重耳之進曺衞生之越勾踐之進會稽生之其處齊秦之艷與夫差前馬而不動其靈臺者真有一湖寒水波澄葉下之意強哉憂乎矯哉秋乎叙程禹開香雪詩尹民興余來琴水見程禹開迫而儀之祺然羣玉之山阿平不險而又中繩四徹也巳出香雪諸新詩眉髯巳茂鞶帨妍整以其天度合併其文章亦似沈浸聖賢之精氣而深宿於徳禮之廬者攷其先夫子鉉吉氏骨挺天表危步堂皇之上而又程二先生之勝裔宜乎禹開氣發於清明詞範於方正也古者舉士必於世卿之家為其積美而流光也五臣之祖皆以淳耀惇大𢎞顯天地之功宜乎苖裔績豐諸夏師望鼓刀於肆伯昌載焉可為選舉不類矣然而姜姓伯翳之後也儀百物而輔虞廷後世始開茂材異等之科不稽祖徳窮陋童昏之輩始試有位吏道雜而淳正不敷難以比隆古代矣禹開順遵先徳固巳洩露於文章使升諸名職用徳輔時聲歌之細不足言程二夫子之博施何云不在今日者予方盱衡以徯之序熊耳臣詩畧尹民興吾於武成取二三策而己武成聖天子之命書以自白其燮伐之顯績也子輿氏未至牧野何縁登下其詞乎蓋曰理有獨至不聽於古木有强植不順於天耳臣之詩尚古矣或戾諸或大戰于古甲裳弓矢取諸靈臺之宫而不借餉餽于他國此為萬勝之轂足其腹乃能用之耳臣之戰古當視其腹夫擅丹沙之穴王公可賓致魚鹽之利東海成霸焉有窮寒而得百振者哉是為角古我分至於堯禪舜古文章矣孟子直曰否天子不能以天下與人忽然易古之有成我之無忽然變古之無為我之有融古我而納之一型苞天之府囊也三年之後再讀耳臣之詩吾將徜然迷其涯也矣明文海巻二百七十七
