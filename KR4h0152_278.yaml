body:
  text: 明文海卷二百七十八餘姚黃宗羲編序六十九贈序跋唐子華畫贈邵思善詩卷後朱升至正五年吳興唐公子華宰吾邑余客其門相與處甚善也公時時出古今名畫及其所自畫者示余且讚賞其趣豫懵於此道故不知嗜好若無聞無見者公不悅其心曰豈其明於他而獨暗于此耶是殆薄吾畫也豫察之稍以留意一日與公同訪提茗亷父壁間有公所筆畫四幅豫觀而喜之公曰此吾二十年前筆也是殆不佳豫心計若從公求指其不佳者在某處某筆冝若得其槩然不欲亟以瀆之及再往則捲而藏之矣余素與縣東門邵桂堂翁友善其孫孜思善時從豫讀書見公畫輒悅慕之不瞬目不釋手若豫之有味于天地之化聖賢之學也公大喜進而教之宦滿挾之歸邵生盡棄餘事用能得公之意趣四方聞人稱能鑒識者贈之詩文許與交至信乎生之妙於畫矣畫之為道冝求其似也今曰似則不超冝以巧為精也今以拙為古殆必自有其説豫藏思善舊所為畫數幅假我數年得畢婚嫁盡除書生氣習然後袖而出之好山水佳風日中請思善指其昔非今是在某處某筆使昔之不得於唐公者得之思善亦大好事故苐書之卷帙之末以識焉嵗辛卯秋九月既望朱升拜手跋贈陳伯柔序王禕有元以來大江之西有二大儒焉曰吳文正公虞文靖公文正之學主於為經其於羣經悉釐正其錯簡折𠂻其疑義以發前儒所未發而集其成討論該洽封殖深固視漢儒之顓門名家者有間矣文靖之學主于修辭其於文辭養氣以培其本知言以極其用凡以載斯道而傳之世故其羽翼聖教黼黻人文卓然為一代之所宗而自成一家之言者也二公之學雖其徑庭有若異向然要皆聖賢之為道其趨一而已矣後學之士烏可妄議乎哉方二公之講學也天下學者翕然師之從而遊者衆矣而以里中子受業其門者有陳君伯柔焉伯柔之學為經則推本于文正修辭則取法于文靖淵源之所自誠有不可誣者以余所交二公之門如伯柔者何其不多見也於是二公不可作矣故余獲交于伯柔不異聆緒論揖聲光于二公之門不知生世之晚也伯柔識見髙明而篤於自信操志秉節不務諧于流俗遭世多故益將韜晦不茍事仕進蓋庶幾立言以踵二公之軌躅而今年幾六十亦既老矣昔者伯柔之遊江東也文靖嘗贈之文其言以謂伯柔有志于聖賢之學而二程子之學初無同異且極其歸于天德王道之論蓋其望于伯柔者甚至也於今巳三十年余嘗讀其文而深慨焉前哲日逺斯文之墜緒猶千鈞之一髮纘而承之不其在於人乎伯柔用辟舉而起再調官于越之諸暨夫今之官州縣者第從事于簿書期會此胡足以盡人之所長余故于伯柔復舉虞公之論以為言是則伯柔之所任者其亦重矣而余何足以知之書以識别以見余之知伯柔者固非茍焉而巳也贈嶽德清序蘇伯衡往嵗金華同知潘侯叔聞病目延周漢臣者治之漢臣出入叔聞所余數數見之其徒有嶽生者未嘗不與之俱漢臣治叔聞之疾凡砭針湯尉與夫劑之和煮加損一以屬嶽生比叔聞病愈漢臣辭歸余亦徵赴京師余之叨祿于京師也八年然後得請歸養及歸後人問漢臣則且死矣而嶽生者余固忘之去年冬有持胡先生遺嶽德清詩示余者言德清余嘗識之余亦不記其為漢臣之徒也嵗之六月德清過余相與問勞乃知其為往嵗與漢臣俱出入叔聞所者固舊相識也而忘之則余見德清安得不喜且愧哉德清故鄂忠武王之裔家于嚴陵採藥浙水東名山奧區往往有其足迹而雅愛金華之長山至輒眷焉不能去其所至人莫不虛館以俟為人治目比有竒驗則德清能傳漢臣之業可知矣余因問德清人目病凡幾證狀何若也德清引古方書言目之病甚悉大都十七八證而名狀各異又問治之皆有術無術對曰唯瞽不治餘皆有治之之術也然則天下無不可治之目也對曰然余拊髀曰嗟乎德清生亦知余之病乎余目與人同而余獨視不及尋丈尋丈之林黧黃牝牡不辨此吾友也熟視而勿與揖彼非吾友也拱手而迎之以此動輒速愆招刺不知此果類古方書何等證也生將何以治之乎然余固能決别黔晳美惡真贋於尋丈之內焉生縱不吾治猶可也嗟乎德清生亦知人之病有甚於余而余之所甚患者乎乃者雨不時降吾婺以旱溪流斷絶車無所用由是方地千里不問髙田下田鞠為稿壤黍稷重稑無弗黃而殞矣而肉食者若不見而莫之省且督吏若胥日夜取常租之盈其視民之少壯者之有菜色老弱者之胥為殍也與瞀者矇者眇者無以異觀其目則非瞀非矇非眇者不知此果類古方書何等證也生將何以治之乎之人也固朝廷使之舉錯民之枉直者也生不有以治之其於賢否是非利害曲直廢置取舍從違顛倒錯謬每事類夫此則斯民將奈之何德清謝曰此非目病也茍非目病則何病也對曰此所謂盲于心者也夫人之所病病疾多而醫之所病病道少况乎以心盲之盲責醫目者醫哉則賤工亦安能治之雖然凡人之病必有由來得其所由治之斯愈此不易之道也之人之盲也亦必有由然矣故竊以為茍治之以治阿大夫即墨大夫之術何患其不治哉又焉用吾醫目者為余嘉其辨遂次第其語以告􅋵黜陟之柄者且以見余之識德清有素云贈蔡山人序宋玄僖自知其命者而後可以言人之命命豈易言哉富貴貧賤命也夀夭禍福命也命懸乎天天之所為深逺莫測而人欲言其將然無有不驗難矣哉是故非自知其命者不可以言人之命也蓋知命為君子君子之心不蔽于物而理無不燭理既燭矣于富貴貧賤夀夭禍福一聽乎天之所為而無不樂焉既以樂乎己又以語乎人曰富貴命也知命者不溢不危斯可以長守富貴也貧賤命也知命者不諂不濫斯可以久處貧賤也夀夭禍福命也知命者不偷活不傷生則夀惟其夀而夭非其夭也不足欲不蹈險則福惟其福而禍非其禍也斯言也人茍聽之于世教不有助乎夫以匹夫之言而有助于世教非君子其孰能之術數之學云何哉上虞蔡某山人蚤嘗習進士業試不利即委分田野而無競于時非自知其命者歟中年難于生事乃以五行書推人生年月日所值日辰而有以勸之于其富貴者勸其不溢不危于其貧賤者勸其不諂不濫于其夀夭禍福勸之以不偷活不傷生不足欲不蹈險為人言命而所勸若是非以君子之道處巳處人者歟不然何其不専尚乎術數之學也余久處貧賤者也今年春遇山人田野間聞其言知其有志乎君子之道而心竊喜焉因其徵余言故有以贈之贈錢文則序髙啓韓文公詩有曰我生之初月宿南斗蘇文忠公謂公身坐磨蠍宫也而已命亦居是宫故平生毁譽頗相似焉夫磨蠍即星紀之次而斗宿所躔也星家者説身命舍是者多以文顯以二公觀之其信然乎余後生晚學景仰二公于數百載之上蓋無能為役而命亦舍磨蠍又與文忠皆生丙子是幸而偶與之同也二公之名雖重當世而遭逢排擯謗毁幾不自容仕雖嘗顯于朝而貶陽山謫潮州竄逐于羅浮儋耳之間踰嶺渡海冒氛霧而伍蠻蜃其窮亦甚矣顧余庸庸雖不能致盛譽亦不為排謗者所及况遭逢聖明忝職禁署蒙恩賜還無投荒之憂是幸而不與之同也然二公之文章德業赫然照映千古而余早罹艱虞中事奔走學不加修文無可采將泯焉為衆人之歸是不幸而不能與之同也噫命之所舍既同則宜無不同而何相去若是之遼哉蓋窮達得喪由乎命智慮賢否存乎人存乎人者可為由乎命者不可必世之人常以不可必者責于命而不以可為者責諸巳所以多自恕而幸得也若二公者其道同其文學同故毁譽窮達有不必其同而自同則余之不能與之同者蓋有在也而豈命之罪哉山陽錢文則能推星以言人之禍福無不竒中士大夫多稱道之將遊湖海徵余言為贈因書所以自警者貽之且使遇夫自恕而幸得者告焉文則讀書好修善鼓琴斯直其餘事云贈鄭顯則序方孝孺天下之論文者嗜簡澀則主于竒怪樂敷暢則主于平易二者皆非也文不可以不工而惡乎好竒文不可以不達而惡乎淺易淺易以為達好竒以為工幾何不至於怪且俗哉善為文者貴乎竒其意而易其詞驟而覽之亹亹覺其易也徐思而繹之雖極意工巧者莫加焉若是者其為至文乎聖賢之文與後世之詞純駁工拙多寡不大相逺也而世人望之若天然不敢指擬之者以其不務竒其詞而竒其意故舉天下好竒者莫及也使其意不能過于衆人而惟詞之修安在其為竒也哉日月之在天隮于東而行于西昏明于晝夜盈虧于晦朔自有天地以來未之有易也天固不規規然求異以駭人之視聽然愈久而彌新愈廣而無窮則為竒也大矣尚何以異為哉至于鬼磷之變滅不可以理推其迹雖似乎竒而其為明也微矣近代文士有好竒者以誕澀之詞飾其淺易之意攻訐當世之文昧者羣和而從之而三吳諸郡為尤甚此皆挾鬼磷而訾日月者也其力雖不足為斯文害然不除滅而禁斥之何由復古之盛乎今天子憫斯世之不逮古擇太學之士而教之吾郡鄭君顯則與焉顯則為文不好為竒而亦不流于易蓋學而得其正者也豫竊有志于變天下之文而患不得友天下之賢誠得如顯則者數十輩其趨古人之道以自見于世其崇且大者可期也况于文乎今猶未之遇也烏得無慨然矣乎吾聞文與教化相上下安知今之文果不古類耶顯則誠以吾言求之有合于吾言者吾不謂之今之士也贈王仲縉序方孝孺飢而食飽而嬉營私而騖利生無聞而死無述者衆人也食焉而思思焉而行不憂其身之窮而憂道之不修不懼其家之無財而懼乎名之弗揚也君子也衆人之所為切于身而見效近故人之趨事者夥君子之所務事既緩而功亦遲故衆人多笑之而不知衆人之所為又君子之所悲也吾昔年舟還自金陵泊姑蘇城下舟人指城中大第謂余曰此元偽吳張氏宫也余問今其家安在則己無噍類矣問其人名字則已莫有知者矣及至錢塘道西湖舟人數謂余言林處士事曰此處士故宅也此處士墳墓也此處士曾遊之地也余未嘗不為之太息方張氏盛時據數州之富擅王侯之貴驅百萬之人以給其所欲其車服宫室妾媵珍寶騶從師徒僭擬乘輿而自謂一時之雄矣而今未下十年乃若此處士在宋時破廬敝褐羸童野鶴出入于煙霞水石間其窮困莫比今越二三百載姓名猶灼然在人耳目則區區之富貴者何足道而士之貧賤又何足憾哉且處士特一詩人其自立者非能如聖賢之宏大深逺有以明斯道而淑來世猶能如是况夫君子之希聖賢者乎吾友烏傷王仲縉年少好學其所志甚美而其鄉人竊笑之以為迂仲縉告余余恐其沮于衆人之笑也故告以斯説使仲縉知為學之足恃而益思自勉使衆人知所有者之不足道不暇笑人而自悲也贈金溪吳仲實序方孝孺道本于人心非幽深玄逺不可知也而人鮮知之邪説惑之耳古之為邪説者其言異其術異其名亦異其心亦自以為異於聖人之道故其説易攻而智者不之信後世之為邪説者其言與術皆異至于問其名則自以為儒問其所宗則以為得聖人之傳故智與愚者皆溺焉聖人之道載于經可知矣未嘗使人求道于博文約禮之外聖人沒明道者莫過于子思孟子而二子之所言近而身逺而天下要其原則本之天命語其事則愚夫愚婦皆可知之亦未嘗為窈𡨕渺邈之説使人不可致詰也後世邪説者則曰文不必博也禮不必約也道之妙不可以言傳也嗚呼是果道邪以聖人之智睿七十子之偉傑其過于人亦逺矣然而必學于詩書禮樂六藝之文至于終身而不厭彼邪説者則曰六經不必學也必求于吾心俟其頓明忽悟而後可嗚呼是果何道耶且經之作何為也聖人思巳之身不能常存以淑來世故載其所言所行者使人取法焉耳今人必謂無所用乎經而可以為聖賢則邪説者果勝于聖人也耶棄書語絶念慮錮其耳目而不任而僥幸于一旦之悟者此西域之異説愚其身而不可用于世之術也而學之謬自附于聖人而曰聖人之道固如是不特誣其身而乂誣後之學者何其甚惑耶自斯道之不明其欲惑斯民者亦衆矣然墨者不諱其名為墨楊者不諱其名為楊申韓老佛之徒各不諱稱其名故放言而驅之則人隨以定其為害可息也天下之大害莫甚于名是而實非異端其實而聖賢其名此士所以從之者衆也然非彼之過也從之者愚也今有人焉棄稻黍而噉橡栗雖無識者亦知其為愚矣棄孔子子思孟子而不師而求異端之似者師之孰為其智耶金溪吳君仲實儒者也學孔子子思孟子之道而不變于流俗者也其為學其富其為文辭甚達是皆彼之所棄者而吳君獨盡心焉余慕其善為學也其自京師將歸故論邪説之害以贈之俾告其鄉人嗚呼斯道之不明久矣謂余言為然者其有志于道者乎贈順慶太守章𢎞載序汪偉今縣州府官之長皆知名而别以所理知之為言主也蓋謂一府一州一縣之主耳家之長俗亦曰家主謂之主一家之責萃焉老弱僮奴有供養衣食鄰里姻戚有吊慶公上有賦役祭祀賔客嫁娶死喪有需至于備旱災禦外侮訓子弟皆主責也果蔬雞豚之細一失其理則為家之道有缺而他人不任其憂主之道其難如此積家為鄉積鄉為縣積縣而為州為府勢雖殊其為道一也所主愈大則責愈難一物不得其所願惟主是望不能為之主則彼將自為矣夫使人自為主此天下之所以亂也飢寒莫之恤于是劫奪之計行焉爭訟莫之理于是狼戾仇賊之惡成焉強莫之制而弱莫之植于是任俠武斷之俗興焉是皆無主之弊也嘉靖二年冬南京勳部郎中餘干章君𢎞載陟四川順慶府順領二州七縣地蓋千餘里户以萬計者不知其幾而一旦為之主儼然位其上而任其憂豈小寄哉章君以名進士任郎署清慎之操樂易之行積有名聲且博學而文以儒術飾吏事古之稱循良者皆然為主之道固不外是君優為之矣瀕行其同寅司務暨子部諸賢合辭來請贈言且曰故事也不可辭作主説以貽之贈太學生石大用序陳敬宗太學生石大用薊州豐順縣人自邑庠生登太學有年處六館諸生間恂恂謹飭惟強力植志務學不少自衒故自祭酒司業以下皆不甚知其為人正統甲子夏祭酒李先生困首木于太學三日不解炎暑蒸鬱先生耄昏弗能勝大用戚然號于衆曰師猶父也師父罹艱而弟子奚忍坐視大用察衆志不與已合乃退去閉户疏奏懇請自代先生亟遣人止之弗聽同輩亦沮之弗聽大用奮然作色言朋友急難詩歌脊令况師乎亦弗聽竟挾所奏走謁銀臺銀臺難之且懼之以法大用曰生以義死亦以義何懼之有銀臺知其不可抑遏遂以其請聞于上蒙並釋之于是在廷文武搢紳莫不嘆息曰此前代之所僅有而今世之所絶無者也爭欲求識其面豫聞唐德宗貞元十四年國子司業陽城坐送薛約貶道州刺史太學何蕃季償王魯卿李讜等二百人頓首闕下請留城守闕數日為吏遮抑不得上蕃等皆涕泣餞送立石紀德集賢正字柳宗元致書蕃等賀之以為昔李膺嵇康時太學諸生叩闕執訴僕謂訖千百年不可復見乃在今日今大用卓卓如此豫亦謂自蕃後訖千百年不可復見乃在今日也以蕃等伏闕數日卒不得通與大用誠意悃愊能感動天聼排釋艱困於時刻之間則其賢似有過於古之人也夫師固不與五倫而五倫弗得弗明故于三事之道均焉凡天下之為師為弟子者莫不知有是道也而謂訖千百年不可復見者蓋以師之為教無實德弟子之為學無實心上下名分依稀典故而巳而于三事之道視之為虛器焉固無怪其不可復見也先生秉仁迪義凡所以施教于太學者無非實德太學生恆二千人而陶鑄醇懿涵煦粹美者甚衆大用至是發其所積奮勇不顧利害惟義是蹈此固出於大用之素稟然亦先生導訓漸漬之極致然也先生之於陽公大用之於蕃等皆可無愧而凡天下之為師弟子者豈不亦有聞風而興起者哉是嵗大用以書經顯擢京闈鄉試髙等説者咸以為積善之報理或然矣是用播諸歌詠以為後世名教勸詩曰有偉石生義激于衷陳厥悃愊徹聼宸聰帝曰釋兹復厥章服用顯名教維新化育簪纓貂璫爰及儒紳合詞贊頌卓哉斯人棫朴菁莪多士攸同翹楚錯薪穎脫奏功維初倡義衆且望望爰播頌聲能弗泚顙三事道均云胡弗尊兹焉不篤慙負聖門師道岌圮延平植之陶煦醇懿明效在兹左右髙徒前後國士衆人之中大用崛起山有巨材羣木蔽之貢珍明堂公輸忸怩天祐善類靡德弗報顯擢髙科斯文有耀昌黎紀傳集賢致書我作歌詩永揚令譽贈梁先生助教國子序嶽正君臣主義父子主恩恩義兼主者師生也先王不作大道就晦君臣之際輔以典刑而或者罹刑以傷義父子之間本乎天性而或者違性以賊恩彎弓而向羿操戈而叛何者又烏足怪哉以今言之在上者提符信執教條臯比而坐以名先生於堂上在下者服章縫挾書册雁序而立以稱弟子於階下此天下學校之師生也徒以勢力假合而強為之號耳夫選一郡一邑之賢俊而聚之一宫有勇者有智者有巧者有能言者有尚氣而無所撓者其才氣之美固有不同者也臨之以勢齊之以法可以使其面從而不能得其心從可以使其貌服而不能得其誠服為之師者不其難乎順天府學學之宗也而設于京師京師之大賢才之淵藪士之遊其地者得於耳濡目染之餘所謂智者勇者巧者能言而尚氣者蓋有不問而知不習而能者也毗陵梁先生惟介轉自武學教授來司厥政談者率謂凡為京學當從事于精練勤敏之間茍約束不嚴教條不密則貴遊貨瀆有以間之未見其可也先生方一切去之旦暮坐堂上而操其要領任真率意淡若無所猷為者然而智者忘其謀勇者失其強巧者閉其能能言者收其辨尚氣者更其徑直而為和順彼此不忌而上下交好歡然其恩截然其義何其盛也今年先生升助教國子京學諸君不忍先生捨已以去相率以情諗之于余余故述其所由以為先生贈云明文海卷二百七十八
