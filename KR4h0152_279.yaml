body:
  text: 明文海卷二百七十九餘姚黃宗羲編序七十贈序贈段可久序丘濬今之縣令古百里侯也於民有父子之道焉於吏有君臣之道焉於學校有師弟子之道焉士之筮仕即得百里之地有數千户之民以君之父之師之亦可以行其志矣然世之仕者往往重內而輕外一登科目即視州縣如陷阱然惟恐已之不幸而或墮焉之人也豈慮其職之未易稱耶民之未易化耶吏之未易馭耶政事之未易修舉耶曰皆非也政以其胸中之勃勃然未易平耳雖然領郡輒無色之官皆有詞豈獨今日然哉唐府帥見大府必戎服左握刀右屬弓矢帕首袴鞾郊迎令狐峘刺吉州謁見齊映從容步進不帓首戎器即以得譴夫府帥之見大府刺史之見觀察使尚爾則縣令可知矣宋使者行部所部郊迎數十里外或遇霖潦瞻馬首倐至跪拜泥淖中移時不敢興既就館拱手立座下三跪進酒其卑辱也甚矣然是時韓昌黎以名世大儒謫令陽山朱紫陽以命世大才首簿同安未聞其以驕蹇得譴于時及考其所以致譴者乃以闢異端忤權貴之故所以然者豈非以上下之分所當盡是非之公不容昧可以理詘而不可以勢詘耶豫友段可久少負竒氣好讀史傳而慕古豪傑士之為人不肯媕阿隨人後舉進士即以病得告家居其於富貴利達蓋漠如也今不得己始起拜命得知登之福山縣嗟乎可久豈百里之才哉雖然以大才試小邑如以千里馬馳數十里之地不患其不至也以百石弓射數十步之侯不患其不中也可久行矣其尚明理以御氣毋若小丈夫然積勃勃者于胸中見悻悻者于顔面于上下之分則不肯安臨勢利之際則厥角稽首之惟恐後其為科目纍也大矣豫托交可久相知最深于其行慕古人贈處之義方將有所規焉適地官主事劉世英率諸交遊屬豫文以華其行遂文以贈之可久得無異吾言乎贈書菴劉先生序柯暹凡有形于天地間皆物也在天之明而有常者日星在地之大而莫測者海嶽若風雲雷電之變動雨露霜雪之降布草木鳥獸之蕃育蛟龍魚鱉之潛藏于其間不可勝計使一人窮一物而盡之曰不能况衆物乎使一人窮衆物于一隅曰不能况際天極地之廣乎使一人窮天下之物于一時曰不能况自今而古千萬載之既往乎舉天下之人皆曰不能無敢誚也吾儒以典籍貫古今以知識窮造化聖經賢傳粲如日星三綱五常重逾海嶽事事物物不止于有形有色變動降布蕃育潛藏之可以名言者皆所當知當行其為道大矣其學也難矣天下以儒名者多求其能知之盡而行之至者寡吾夫子以一貫之律天時襲水土心古今考三王而不謬建天地而不悖質鬼神而無疑信乎其道之至大而學之至難也入其門者孰不欲造其極既出則或岐而二之如徒見日之明星之繁山之髙海之浩瀚而無津莫知適從在當時者且不免况愈久而愈逺乎今之學者有見于斯昭昭之多一撮土之多一卷石之多一勺之多而謂天下之大足以盡之不求其至焉者自大也有見于覆載之間所以明所以變化所以降布所以莫測而蕃育而潛藏而謂天地之所以大古今之所以更非可厯可終而亦不求其至焉者自小也然不知懸象難知而樞極有定疆域難知而道路攸通萬事萬物本乎一理由方寸而彌六合其有形如髙下淺深厚薄多寡輕重大小長短之可定名其無形如枉直順逆張弛通塞是非當否之不可淆雜者坐而求其至皆可得也顔子孟子善學聖人而至于卓爾躍如之地宜有見焉世無顔孟為之弟子無孔子為之師其先得夫大者逺者加于衆人衆人之師也示其極使知天之所以為天示其道路使知地之所以為地嶻嶪而汗漫者為之梯航使從其遊者亦馴至夫逺大之域夫豈易得哉文陽為海內名邑三尺童子莫不有師一時之稱為師者衆矣獨書菴劉先生以家傳詩書兩經窮極底奧進則得售于有司退則見師于鄉邑凡造其門必充充有得出而掇科躋顯者項背相接宣德甲寅余因中書許公得延于公署擇搢紳子弟之可教者從之先生嚴規矩正梯航以成就後學為已任小大井井問無不知惑無不解其為師誠不易得也若長若幼樂於相從不欲須臾去左右兹以嵗暮將有事于先祠告歸余子蔓薰偕二三子恐遂棄也請余告留余因記宦途三十年乘載江湖間操舟得其人則風濤不驚津涯可指不得其人則行不安食泊不安寢覆中流而幾喪思向之能安吾乘者猶切切不己矧諸生方鋭志于學正遊汗漫迷寰區之時得示以道路指其津涯胡不思所依歸而崇重也哉先生以孔門成人之善為心知諸生之可教必不待余言而後不棄也先生曰然諸生欣然拜送之葛山乃别贈太史羅先生序邵寶太史南城羅公以疾在告既愈而將北上也豫適視學自建昌之宜黃道于其里因預為公餞公二從子城里以諸生侍公起如內豫問二生公道所由城曰由浙浙之道坦然而迂迂不勝坦其將由之里曰由江江之道疾然而險險不當疾其將由之既而公出豫以問公公曰彼意之耳斯二道者吾皆不由也夫浙之道坦矣而迂吾嘗由之迂非吾所惡也江之道疾矣而險吾嘗由之險非吾所惡也然而今之行顧皆不由焉吾將由鄱陽出安慶渡江而北道楚陳宋魯齊趙以至于京師蓋為道者三千餘里計其所經濟淮河沁吾將濟焉嵩行恆岱吾將望焉其厯代帝王之都聖賢之里神靈英傑之祠墓吾將謁焉其殘碑斷碣倚壁而卧庭者吾將讀焉其平原沃野為古井田吾將考焉其名城望邑為古封建吾將覽焉其髙巖絶壁為古關隘吾將徵焉其大陵崇丘為古會盟之壇其長坂廣谷為古戰鬬之場吾乂將弔焉賦焉聞者采之覩者圖之可獻則獻可録則録行焉而觀觀焉而學學焉而資吾用不徒然也昔者吳季札之聘漢司馬子長之遊于今為勝稱之不衰吾嘗壯之頃雖西走關陜東涉瀛博南經婺越北抵并冀足迹半天下而獨遺中原譬之語道者遺孔孟談功者遺禹臯論世者遺唐虞三代君子不謂之知也吾于是憾焉故雖迂于浙險于江吾必由之吾且老矣舍是不由其將焉待哉豫聞而笑曰公之于世誠熟矣竒以為文危以為行四十始仕仕十有六年尚未徙官吾固知公之不畏夫迂與險也雖然中原之道天下之達道也其所經誠有如公言者公歸天子所進備顧問退而代言且執筆書天下事君之職也有所不對對必以大有所不制制必以正有所不紀紀必以直直也正也大也天下之達道也其為公之中原也大矣而是行不能無資焉雖迂且險公亦何慊哉因問道而得贈公之説二生者識之吾將徵公矣贈教諭林以永序張詡道之弗明他岐害之也他岐云者凡影響附會創為臆説以亂聖人之道似同而實異使初學靡知所從止者皆是也今夫釋老申韓楊墨之為他岐也人人知而逺之至于以儒名世而學之之差弗自覺其言之盩此其為他岐而人匪徒漶乎弗之知也因而惑于其言遂併以聖道為然終身倀倀然不為冥迷之歸者或寡矣昔人以孟軻之功配禹豈不曰救人心甚于救人命也於戲茲豈細故也哉姑舉昔儒所謂道學體統者例之其言曰所謂道學者非有至幽難窮之理甚髙難行之事噫然則然矣易曰過此以往未之或知中庸曰肫肫其仁淵淵其淵浩浩其天茍不固聰明聖知達天德者其孰能知之孟子曰行矣而不著習矣而不察終身由之而不知其道者衆矣孔門三千之徒而德行一科惟顔閔數子可以當之由是觀之理果易窮道果易行耶又曰行不力則雖精義入神亦徒為空言夫精義入神非聖人弗能也學造乎聖域矣安事行與力為邪若是所謂影響附會創為臆説以亂聖人之道似同而實異者也而又何必釋老申韓楊墨然後謂之他岐哉莆田林有年以永清修好古有志好學者也家貧母老以鄉貢進士起家領教蕭山嗣補豫廣之東莞來從豫遊者數年矣豫未始一言以及古人造道之妙非靳之也誠懼夫學非自得則徒益口耳亦姑待其徐徐悟入耳今以九載秩滿北上其學徒林子逢陸宗政輩干文以贈先是以永以新刻正學楷梯遺豫豫深懼其自畫弗等而上之以求之六籍四子以契之吾心探淵源修大業而惟區區他岐之是惑也聊以一言破之贈吳獻臣赴成都序李承箕無憧憧無將迎渾然端且恪其存心有如此者惟正之從不合故迹不同流俗其事事有如此者矯矯暨暨不畏萬強不欺一孱其合世有如此者此治世之大人也斯人而居治世位必髙祿必厚人皆以為儀刑而瞻依者也崢嶸以為髙辨察以為明其存心有如此者仁焉而煦煦義焉而孑孑其事事有如此者熙熙而來攘攘而往其合世有如此者此濁世之大人也斯人而居濁世位必髙祿必厚人皆以為儀刑而瞻依者也吾嘗以為不主彌子而得衛而不與射者比而得禽獸古之聖賢如此而始如此而終如此而富貴如此而貧賤吾將與之醉飽乎仁義光明乎聞譽遨遊乎霄漢出入乎古今舍此則無所用其力矣吳君獻臣以成化丁未進士為順德八年升四川成都府同知成都領州三十有一其為人所景從宜亦多矣况今治世也獻臣將不為治世之大人乎僚簿武寧張如玘請文贈之豫忝知獻臣舊故以為言贈尚寶司丞沈廷美序張弼中書舍人東吳沈廷美遷尚寶司丞有議者曰廷美才猷器局可任劇曺可執邦憲可牧大郡可幹大藩可參大政昔者以其藝文俾典中書用一而遺八九論才者猶惜之今以之守夫天子璽符重固重矣無乃枉其所抱負蓄其所設施乎駕部郎張弼聞之曰過矣過矣昔東阜子申齊金父皆槖千金周行西北以購良馬逾年遇一駿于甘涼間競欲得之反面不相能東阜子申曰吾欲得馬以利戰威敵國之大事也是馬力充膽雄足無岡陵淖澤目無矢石殳矛視千里猶舍堠負金甲猶縑舍是殆無馬矣子欲何為而攘我也齊金父曰吾之用馬也入則駐鑾坡押仙仗出則駕玉輅騁天衢必銜不妄振吻不妄噴蹄不妄投折旋中度罄控有儀豈徒以其色純其德良其力充不駭不擾而己哉吾閲馬孔多舍是無馬矣東阜子申曰唏是觀美之具奚以競我乃共質于伊文子子曰仗衛之儀擇其精行陳之間用其粗具其粗者百一具其精者千一精粗具者萬一選萬而得一不以歸乘輿之奉乎無以易矣由是齊金父奉馬以獻咸服伊文子之善論馬也不以廷美幹名藩牧大郡執邦憲理劇曺參大政者亦猶是耶議者帖然下意夫天子左右必才具衆長緩急有濟與當一面領一事者殊科此廷美之遷用人者沉思却慮而然膚見噪議能知之乎雖然人之才也勉而修日宏滿而弛日削廷美其容自滿乎嚮用駸駸何所不至也是為贈贈鑄印局副使陳啓易序張弼昔秦使九方臯相馬報曰牝而黃往視之牡而驪馬至天下之良馬也蓋得其精忘其粗耳流俗論人者徒以地望言豈知人者哉是故髙官大爵輒謂其賢且能否輒愚之其惑甚矣農畝之秀山澤之癯屠沽之傑其才智豈果盡出髙官大爵之下耶如京師百職所萃豈果皆當才也耶以此論人失之逺矣金臺陳啓易在禮部為鑄印局副使固卑官也吾與之交不計其何官但知其于書深六義于畫入妙品于詩清縟耳于接人恭而弗諂和而弗隨耳守其職確勤耳亷公耳事上官順而不屈臨下威而有容耳雖然吾與啓易亦得其粗得其精者中書舍人李應禎乎蓋啓易自少隨伯父通政公于南京又嘗從師于姑蘇應禎與交久嘗許其孝友端諒有仕才局副使非其志也蓋有待也此吾未足以知之然而啓易嘗以墨妙遇好友輒與寫神將悉得其精乎遊戲事不得其精固未大失然啓易亦嘗觀人于粗乎否也其同局盧大用輩欲豫有言以表其長宣其鬱噫安得九方臯之術以相天下之士哉不勝為啓易發大行鹽車之歎贈餘干章幹卿西還詩序謝復今年春餘庠士章君幹卿偕同志葉君本深侍其師胡君耒臣以春秋遊祁門求益充其所學既有得將告歸祁人遊餘干者若豫從弟宣輩辱諸君愛且厚臨别求能詩者送之行且索豫詩并徵言引諸首豫惟春秋魯史舊名吾夫子修之以垂憲萬世者也漢興始以三傳置學官逮厄于王氏新説庠序不以設官貢舉不以取士後世學者遂以春秋為疑書而不之講北方學者尤加鮮焉在江南惟吉之安成蘄之麻城廣之東莞併徽之祁門凡四處獨擅名豫祁人也請得以其源流言之祁本下邑未始以春秋鳴勝國時先正環谷汪先生始得聞吾紫陽朱夫子之學於其大父東山居士紫陽夫子一傳為勉齋黃氏再傳為雙峰饒氏東山嘗學于雙峰而先生實嗣其傳故其學為有源委既而以春秋領鄉薦明年會試與主司論議不合退而纂輯諸家疏義以詔後世及先生沒而其傳泯焉後五十年當皇明永樂之季復得豫先外祖居易周先生為能推明是書以教學者繼以是經中禮闈而祁之春秋始復振舉又三年為宣德丁未適劔江孫曰讓以其外父右崖吳公所傳中山季氏之春秋來掌學事而中山蓋得于朱子門人張主一之再傳與吾環谷之所傳者同出一源自是業是經者擢巍科躋膴仕後先相踵而祁之春秋遂顯名于天下與安成諸處相頡頏矣逺近來遊之士日衆以文行事功著名者亦往往有之而掇科筮仕特其餘事耳諸君才智過人俊遊日富且不自滿假泝流而上厯三百六十灘忘其險阻以所學來就正焉可謂好學也已第未審其所學者將踵環谷之貴躅潄紫陽之餘潤上遡洙泗探夫子筆削之旨以經世乎抑從時師之説兼傳帶比絺章繪句以取科第而己乎吾不得而知也今以所聞歸而求諸方䇿之間與餘庠多士互相磋磨日益求其所未至其必得其説矣安知餘干之春秋不由此而盛與江南専是經者相望而起乎此僕之所私而諸君之所當勉也若夫惜别留連之意則詩人言之備矣豫奚贅贈周瑩歸省序王守仁永康周瑩德純嘗學於應子元忠既乃復見陽明子而請益陽明子曰子從應子之所來乎曰然應子則何以教子曰無他言也惟日誨之以希聖希賢之學毋溺于流俗且曰斯吾所嘗就正于陽明子者也子而不吾信則盍親往焉瑩是以不逺千里而來謁曰子之來也猶有所未信乎曰信之曰信之而又來何也曰未得其方也陽明子曰子既得其方矣無所事于吾周生悚然有間曰先生以應子之故望卒賜之教陽明子曰子既得之矣無所事于吾周生悚然而起茫然有間曰瑩愚不得其方先生毋乃以瑩為戲望卒賜之教陽明子曰子之自永康而來也程幾何曰千里而遙曰逺矣從舟乎曰從舟而乂登陸也曰勞矣當兹六月亦暑乎曰途之暑特甚也曰難矣且資糧從童僕乎曰中途而僕病乃舍貸而行曰兹益難矣曰子之來既逺且勞其難若此也何不遂返而必來乎將亦無有強子者乎曰瑩至于夫子之門勞苦艱難誠樂之寧以是而遂返又俟乎人之強之也乎曰斯吾之所謂子之既得其方也子之志欲至于吾門也則遂至于吾門無假于人子而志于聖賢之學有不至于聖賢者乎而假于人乎子之舍舟從陸捐僕貸糧冒毒暑而來也則又安所從受之方也生躍然起拜曰兹乃命之方也己抑瑩由於其方而迷于其説必俟夫子之言而後躍如也則何居陽明子曰子未覩乎爇石以求灰者乎火力具足矣乃得水而遂化子歸就應子而足其火力焉吾將儲擔石之水以俟子之再見贈鄭德夫歸省序王守仁西安鄭德夫將學于陽明子聞士大夫之議者以為禪學也復巳之則與江山周以善者姑就陽明子之門人而考其説若非禪者也則又姑與就陽明子親聼其説焉蓋旬有九日而後釋然於陽明子之學非禪也始具弟子之禮師事之問于陽明子曰釋與儒孰異乎陽明子曰子無求其異同于儒釋求其是者而學焉可矣曰是與非孰辨乎曰子無求其是非于講説求諸心而安焉者是矣曰心又何以能定是非乎曰無是非之心非人也口之于甘苦也與易牙同目之于妍媸也與離婁同心之于是非也與聖人同其有昧焉者其心之于道不能如口之于味目之于色之誠切也然後私得而蔽之子務立其誠而己子惟慮夫心之于道不能如口之于味目之于色之誠切也而何慮夫甘苦妍媸之無辨也乎曰然則五經之所載四書之所傳其皆無所用乎曰孰為而無所用乎是甘苦妍媸之所在也使無誠心以求之是談味論色而己也又孰從而得甘苦妍媸之真乎既而告歸請陽明子為書其説遂書之贈陸原靜序黃綰夫世所謂豪傑之士者道淑于真見行髙于獨成其于人也可以從可以無從從之為茍同可以違可以無違違之為立異蓋此歸者道焉耳夫奚求其他此君子所以見道而成行也陸君原靜其庶幾乎陽明先生如景星鳯皇夫人能知之也乃為當路所忌言官承風旨交論其西江軍功為冒又以其學術為偽異説喧騰人莫敢論君獨抗章上言自引為門人而弗辭人或尤之曰吾求天下之理安而已毁譽得喪吾安能知至吾皇上典禮之説如日月行天夫人能知之也而當路力主異議欲考孝宗人爭附之雖平素號為君子皆歉然風靡道路以目莫之敢異君乃本公羊氏説上言欲考武宗既而悔曰吾過矣吾過矣欲請改之尋以艱去迄釋服來京適修明倫大典書成君恥其言揚于册而弗韙也乃上章自訟人或尤之曰吾求天下之理安而己毁譽得喪吾安能知若君者真可謂違衆獨立有過能改歸于道而不流于俗非豪傑之士能與此乎夫自世教弗明人以誦説為學而弗知因心推孝即性求理狃世儒之蔽陋失變通之時宜迷繆乎心非一日矣且人之秉彛極天罔墜悔悟之機自君啓之天下之失其性者孰不戚戚然而曰吾過矣吾過矣於乎童而習焉長而信之非信之罪也習也始而非今而覺覺而悔悔而改盛德也此君子所以見道為有功矣嵗六月吏部以君補南刑曺副郎將行過豫言别書以贈之且將白君義于人人云贈王汝中序黃綰王汝中選南京職方主事將行同志之士請豫贈言豫來汝中而謂之曰子學于吾陽明先生有年矣聞先生之言亦熟矣亦聞西方之學有顯宗者乎即其宗而顯之斯無弊吾學豈西方比哉迹有可比者不得不為吾子言之夫良知者固吾先生之教也然亦知獨知即良知亦吾先生之教乎昔者堯之授舜初無别語但曰允執厥中而已舜之授禹則加數語曰人心惟危道心惟微惟精惟一允執厥中中即道也道何在哉在人獨知一念幾希故曰道心惟微道而用之則有過有不及此惡之所由生也故指其用力之方曰惟精惟一精者思也一者道也思得其道則無過無不及矣故曰人心惟危所以戒而謹之夫道心人心一也以一心而精之一之此萬古道統之真傳也孔門致知格物之訓克已復禮之教曽子子思慎獨之旨孟子乃若其情之説皆本諸此至于宋儒學之始皆假禪為入門髙者由其上乘下者由其下乘夫禪乃出世寂滅之事視吾聖人經世之道不啻天淵之懸絶蓋聖人之道皆凖天地之生生自然不爽者為之建立故其言本體也則曰易有太極皇建其有極天生蒸民有物有則其言用功也則曰必有事焉學有緝熙人必有不為而後可以有為然禪皆以空為本故其言本體也則曰四大非有五藴俱空其言用功也則曰應無所住而生其心無無所無無無亦無其分二乘但有自然勉然之不同其自然者知其空而空之其勉然者必持公案而後使空之故由二乘而來者豈能頓然舍空無哉所謂語焉不精擇焉不詳者也故其論戒慎不睹恐懼不聞也則曰心體之虛原無朕兆雖在諸己亦有不得而睹不得而聞者是為無極太極之妙此學問之所由繆也殊不知君子之所不可及者其唯人之所不見人所不見乃已所獨見獨見之中有天則焉由之而行所謂暗然而日彰者是也反之所謂的然而日亡者是也又其論無聲無臭也則曰心若起意則為有聲有臭心不起意則為無聲無臭則為無思無為無意無必無固無我殊不知聲臭即云聲色皆指其外者而言意必固我皆指其邪者而言心之官則思思則得之不思不得得者得其中得其道而己既得其中得其道即己止于至善過此乂何思何為何意何必何固何我哉于此而復有思有為則皆外而邪矣所謂差之毫釐繆以千里不可以不辨者也夫獨知之有知覺乃為良知知之而思乃為聖功之本此乃聖學宗旨之至要在今日之當速顯者于此不顯則學非其學卒皆無成駸駸乎入于邪罔蕩不可救其為弊可勝言哉汝中茍于此不爽則吾人之學真足以傳天下百世以俟聖人而不惑其于先王之道豈不有光哉豫于是以贈之明文海卷二百七十九
