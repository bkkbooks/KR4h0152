body:
  text: 明文海巻二百八十餘姚黄宗羲編序七十一贈序贈南潯人丁叟序楊循吉士所以學者將以為天下用也無以自見而又恐人之弗信故以其所有著之為文盖志之曰吾之用也必若是此乃士之所以為文者而非虚言也及後世求士不以文好士之文者甚少而士之文益賤抱其文無所于售公卿之視之者以為潤色粉采之具不以此重于士之文可以無作矣幸而有無勢之人不得志之友間復好之而士聊亦以此自慰藉相與出其心志之所得者一共讀之以為樂然豈士之願也哉予少為士切有志于學學未至而莫敢以文謁人不知今天下之好文與否也南潯人丁叟未嘗讀書而勤勤來乞予之文此固得于誰乎而亦何用哉然余以為士之文茍不為天下所好則茍有來欲之者雖不知皆可與也而士至于使叟好其文而無所用于士則亦可嘆息矣而豈余之願也哉贈李典籍序崔銑髙陵李先生守典籍三年考績得上考將還南監司諌吕道夫偕銑往餞之李先生吾友吕太史仲木之外舅也吾友之賢天下莫不聞先生恬雅沈篤見容者消其吝接言者去其躁昔孔子稱子賤謂魯有君子焉夫君子者教立則變宋有石介者直講也太學自介興故道有可尊不計乎其官人有可師不頼乎其勢先生之職典籍也自經而下咸在焉凡數十萬巻矣當年不能誦其辭累世不能究其學太史公巳病之夫先生之道存乎經耳學者倦于行於是乎深性命之談亡其本于是乎長鞶革之餙始也以經進而中也與經戾是故習詞賦曰屈曹而已矣不曰風雅習文章曰遷固而已矣不曰典誥習訓詁曰王鄭而已矣不曰伋軻習事功曰律例而己矣不曰經術習𤣥理曰虛静而己矣不曰孝弟習通變曰謀術而已矣不曰仁義甚者勦古義而易其文卑已就而髙其論代増人沿假以名世學者皆眩迷而不知要銑聞之古詩三千篇孔子刪為三百而後始可誦法夫慕父母者孝子之行履六經者醇士之學是故經行而習同習同而徳立徳立而化行化行而後天下國家可従而理也贈吉安張太守序馬中錫六曹皆官也世獨多刑官六經皆學也士獨好精法律學謂其一官刑曹百務皆諳一精法律終身取辦視他官若不足為矣故人恒多刑曹官而刑曹官亦以此自多予未敢為盡然而亦未敢昌其説成化甲辰春秋官員外郎張君抑之以年勞遷吉安守抑之先君子嘗贊太平郡幕有遺愛民至今懐之侍御鄒君公輔郡人也因謁予文以贈予往未敢昌言者今可以言矣夫大江之西固多劇郡然十三郡中吉安號為尤劇邇年俗漸于澆民健于訟非得長者坐而鎮之不可黙挽其馳突而潛消其桀驁豈専刑名法律家所能諳且辦哉予官諌垣八年于茲校閲刑書封駁舛誤習見所謂刑名法律矣奸者舞文以規利亷者彌文以近名刻者深文以示威不一再轉輙䘮所有負所學惡在其為諳而取辦哉亦嘗習聞抑之矣其為人務為長者其立心恕其决獄平其為文無一切深刻巧詆之辭其貌謙其氣冲虛不自多精于律學不自謂為精以是為守易易耳豈必取藉于彼哉若刑名可以取辦法律可以諳務則商鞅韓非軰駕伊吕而失孔孟久矣夫六經檢心之書也法律刑人之書也學者明經致用尚藉之資奸偽以壊心術况法家流乎窺抑之之風度而上泝其先人之流澤抑之之賢固有自來而牧民異政有孚恵心果非一刑名之可例論也譬之役狙者然豢之者固得其用扑之亦可得其用相與角于市無異也至縦之林木之間而招之豢之者狙見且來而扑之者狙見即走矣法家扑狙者也抑之豢狙者也豢與扑其為道殊其致效亦異吉之民其亦知所審焉則可矣贈李明府汝弼序馬中錫進士李君汝弼補襄陵令人見其風範壁立制行斬然正人君子之氣可掬遂逆其為政有可觀也一意勉以入為臺郎至形諸筆舌率皆䛕詞而少䂓諷中錫獨謂其不然夫天下事未有慕乎彼而不妨乎此者也必若而人之言是欲天下為令者動輙以臺郎自許而後不敢怠其政吾見天下之令従兹弊矣譬之食與獵然一下箸之頃志在太牢則其飯脱粟也必無味一發軔之初志在逐麋則其顧兔毋怪乎其不審也今期人美政誘人美官何以異于是政恐其致力于彼者專則用意于此者雜而規圓殆未免乎毁方矣且今之為令者天子何以知其賢而擢用之也其必先獲乎守又獲乎臺然後獲乎銓曺而聞其賢于上乃召為臺郎也否則雖賢不能自達而欲為令者憧憧以求之可乎哉其弊必將使人背以従麋唾粒以嘬肉巧其政以求售矣此心一萌設機萬種新譽日歸舊學盡負君子忽焉下流正人漸為曲士為斯言者導之也守有司也徵科者有司之所事也臺憲臣也䋲人以法者也銓曹黜陟官也責名檢以進退人者也然惟巧者能中其嗜尚以獲其懽心焉故以徵科中守則取諸民也川漁原狩罟舉無逸鱗網合無亡蹄而守之心獲矣以守法中臺憲則法茍㭱存不顧政之虎逝而臺憲之心獲矣以名檢中銓曺則布被食餌者櫛比以欺世而銓曺之心獲矣大中之有大獲小中之有小獲不中則無獲也誰復抱拙而不為巧中哉其䆒必至天下之邑無一賢今而天下之令無一善政然後已吾故甚不滿于以官勉汝弼者也雖然涎鼎不可以誨烏獲而舉鼎者必烏獲學謳不可以責韓娥而善謳者必韓娥窺驄睨豸固不可以喋喋獻喙于正人君子而隼鶻鵰鶚之羣詎能舍正人君子哉是則私有望乎汝弼贈張巡司序馬中錫蓧人張汝誠以精深吏事従事公府數年得官為即墨右倉氏又數年以出納底績晋秩為武進奔牛鎮巡司以姻戚謁予宦邸視茫茫而髪種種矣予進而告之曰若知巡司官之道乎夫官以巡檢名則其職在弭盗而百務貴檢察然今之盗未易弭而盗之情未易察也昔之盗以貧今則殷富者亦或為之矣昔之盗以愚今則號為士人亦竄身其中矣昔之盗畏法今則玩而易矣夫搜捉之官巡徼之卒詗其所如而掩其不備所持者法爾盗玩而易則法不足以制吾法不足以制而吾弭盗之術始窮檢察雖極于精明而無所于用且巡司卑官也髙位大寮發蹤指示者也司督理者以多賕而通音問主案牘者以稔熟而竄姓名勢家為之居停主人不敢物色貴幸為之保庇恩主不能盡法卑官何所用其力耶是必端廟堂之本以清于源㧞介特之撡以勵于節倡輿論之公以正于俗源清則盗無所庇節立則盗知所恥俗正則盗無所容不煩刑誅而盗可漸平然此非汝誠事而亦非立談晷刻之所能盡也禦盗則譏察非常得情則哀矜勿喜汝誠之所當自盡者如是而巳危言髙論其於汝誠何哉于其行姑與之飲酒而己汝誠嚬蹙言曰是誠難矣誠非吾所敢任矣書斯言以畀我值清節敏才者將以告之或藉以集事遂書之贈黄子省曽序霍韜昔年讀文恪公哀榮録知文恪有門人曰省曽黄子者公門髙第弟子也善文辭繼讀空同集見空同與黄子往復札書又見黄子所為空同集序又知黄子篤好古文詞所自作逼真六朝嘗曰江南才士如黄子者可以文辭表樹于世矣惜不得聚語庶幾共進古道而黄子尚助予之蹇也乃今秋仲黄子來自姑蘇過予見古樓聚語累日復見所序水經見所叙西京雜記諸書則曰黄子博雅之士也又見所叙髙士傳見所叙洙泗本㫖乃又曰讀髙士叙論可知吾子志之所希矣若洙泗本㫖予殆未之知也亦有以發我也乎乃今黄子告歸曰何以教我渭厓子曰予何能有益于子也予之荒陋何能又益于子也若曰學以博古也子則既博矣若古文辭子亦成家矣皆予所無能復益于子也嘗聞之學以洞見大原為要而戒于小道之溺譬之萬井之邑邑中之衢徑什伍比聯亦萬其棼也有蟻焉曰吾將由徑循衢次究什伍黙識之焉雖積月累年所由以識也不能數徑有鳥曰鸛鸛鶴之屬也振翮而過萬井之徑一盻瞭如學亦若是而己黄子于道務見大意其必為鸛也無俟于予之言也予之陋亦何能有益于子也究竟大成惟黄子也贈王躍之還建昌序夏良勝文武一也後世而二焉今欲其一難矣兵農一也後世而二焉今欲其一難矣此經世者之恒言也然有易而一之者何哉毎聞章縫談兵法指畫勍敵如在目中譽之者曰文武才也介胄之士稍稍事筆墨約束衣帯類寒士人亦異視之兵制襲壊坐食以困農尺籍半虛調發不足按籍刺丁壯威貨廼訖猝有警備又驅以先之冀傷敗可以避法求其故則曰是以賦出兵之意嗚呼若是而為文武兵農一也是何其易易也歐陽子謂困天下以養亂者虛矣而武士征行若棄于市書生制敵一試而敗獨劉秩也哉是古之文也以資武今之武也以冐文古之農也以寓兵今之兵也以厲農故今之文武之一也余欲為昔之二不可得己今之兵農之一也余欲為昔之二不可得已然而習尚非可以旦夕移規制非可以草率議變而通之存乎其人則懐天下之憂者於一方君長寜無有厚望者乎千户侯王君躍之余少以文字友者也兹歸守禦吾邦其於武事固當深講者而邦伯韓君又將家子躍之夫亦有所遇矣志相成而類有所感則樹兵以衛吾農者可幾也且為謝曰余亦談兵者而今則已矣然亦豈但已乎盖思所以一之者而未得其説也贈鄭子榮還曲江序張岳鄭君子榮將歸曲江詣予别予飲之酒而問道所由曰有二西出新林浦泝采石入湖口泛彭蠡抵豫章城下以歸易矣而有彭蠡風濤之險東迂道千餘里以避彭蠡歴呉㑹横絶兩浙繞衢信而亦㑹于豫章然迂迴緩曲不如西之㨗也予曰行也期至爾無速于險道途所次山川之迂徑疾遲固將道之以至者也茍不止無不至焉夫彭蠡風濤晦冥變化頃刻殊狀使人心掉神慄及俄而就定波平如掌一駛千里豈不足以快所適哉然有幸㑹焉則整裝東出緩轡徐掉其于至也誠的而安矣嗟夫天下未嘗無久逺不可至之道特巧于渉世者不勝于好徑冀幸之心學飭于私見而名之信否幸乎人事决于小數而功之成否幸乎天夫豈無所至焉以自信其心由君子觀之則有逡廵退避不敢一投足于其間者多矣是故難易者勢也近久者時也裁而處之者義也化而忘之者道也道義所安命則立焉故曰不知命無以為君子獨歸也乎哉子榮再拜曰守仁也問行而得持身之方敢不敬夙夜于是復酌飲之而與之别贈郡丞春江李侯序張岳余昔居京師頗久幸官閒事鮮喜與恢廓辯博之士譚論古今制度得失盖至于兵制末流未嘗不慨然三嘆也人心之靈可使百世四海而相通至于血氣之剛柔强弱雖父母兄弟不能相授今使従戎者世及違其水土風氣履行陣于數千里之外往焉未必足用也民之以世及従戎者徵調騷動困且極矣而戎衛之符檄交下嵗月未己識者咸知憂之特委諸莫可奈何曰法則使然噫法固然也行法之意將不在人乎餘干李侯佐治吾郡于郡事無所不與亦無所不善而清戎尤其顓職嘗嘆曰今天下兵弛民困飬兵之費既竭民膏血贍之復驅彫瘁之民以充其無益之數吾勢與位不能及逺泉吾赤子也吾敢慢視乎哉故佐衛五年四方戎衛之符至辨其真偽量其逺近審夫家衆寡蘇瘁之數以權其當行與不當行者茍可以免吾民悉留不遣盖侯勢與位之所能及盡心力而為之如此若夫位守有限非侯所能及者則與余同一憂嘆而亦莫如之何也天下之治非法制明備不足以攝人心而防世變及其既也法有時而弊不知所以變通之復為之申令宻禁而法之弊者愈深固而不可解則當今之可嘆者豈止一事噫安得千百李侯者布滿列郡以蘇吾民哉御史簡公采侯善政而旌奬之盖亦有以知侯者故叙贈王與喬南歸序張岳嘉靖乙酉冬予北上京師仙谿王君與喬將赴選銓曺實與偕行予嘗入武夷上幔亭峰浮江達淮泝泗㳊歴齊魯舊墟遇景物㑹心或古今賢達遺跡輙徘徊瞻眺不能遽去與喬儒家子往往能舉史冊所書者與余叅評其是非可否及予至京師幸職事稍暇抱疴寡出與喬亦能以其暇日數相過従談故鄉桑麻節候以暢豁幽懐如是者又三閲月則與喬既領選檄將歸矣余告之曰士不逺游不足以知宇宙之大而宇宙内事與其深思博攷于一室也孰若足跡四達心目之力俱逺然後能盡無窮之變乎方余與與喬北上也寒漲初縮舟滯于江臯河渚氷雪交沍嚴寒薄人而不甚覺者豪氣勝之也今炎暑鬱蒸行者以為病余欲留與喬渉秋以行而不可得豈非浩然歸思亦有以勝之與夫隂陽寒暑之變大矣人心有所向也尚能勝其變况有義理為主于中則夫貧富貴賤榮辱死生之擾擾者真如飄風浮雲安能以有芥蔕耶與喬之官曰隂陽訓術夫隂陽之理未易窮詰若夫氣與數則所謂寒暑之變其大者然非理明不足以識之子歸矣伯氏與竒讀書窮理必有得于是試以吾言問之贈年友陳士特司教新泰序張岳昔人謂司馬子長文得山川之助予嘗攷其足跡所及自龍門南徙江淮而㑹稽而禹穴乂折而九疑沅湘既已挹其精華秀麗矣乃循汶泗北放乎齊魯之都則巍然崛起者岱山詭然怪特者鄒嶧之刻石宛乎周旋揖遜之迹若與神接者夫子所講之射圃故子長之文渾深雄壯而紆徐曲折又不失法度可謂至矣予愛其文辭想其舊遊處又恨無子長竒氣不能迹而遊之今年夏吾年友陳君士特拜新泰學博新泰岱山麓邑而魯之故都夫子遺風存焉所謂巍然崛起詭然怪特宛乎其迹若與神接者皆逺近錯望可按迹而知矧士特起南荒北遊京師又東而至于是也信乎追子長之大觀矣然子長之所得特以雄其文焉已耳夫子之道在六經其行事之實在春秋而尤詳于魯其當時㑹盟戰伐歸取之地荒城頽址不與人代俱往猶往往散見魯之東西郊想其人與事攷其是非成敗亦有使人咨嗟感創不能自已其有助士特専門之學亦豈在子長之文之下哉古之學者既有義理以養其心矣及他所以輔養之具不一而足其在庠序則有釋奠釋菜之禮釋奠有樂釋菜合舞樂有徳有語而舞有位又習之于射以觀其徳而皆以禮樂為之節如此其詳也而今皆廢不講其僅存者亦皆茍且滅裂不足以為法魯有聖人之風焉豈無聞而知者士特相與講而行之以教其人所以養心成徳又豈但取諸足迹所及而己哉士特將赴新泰吿别于余余故為亟道其所以樂仕于魯者有若是云贈大叅孫公毅庵序張岳昔人論士行得失深致謹於方圓之辨自靈均已有是言其曰何方圓之能周兮夫孰異道而相安盖不以圓為善也栁子厚反之曰人當方其内而圓其外方所以能守圓所以能行余以為内外一理既有意于圓其外矣則夫方諸中者安能固守而不變哉孟子曰規矩方圓之至也是皆有天則存焉聖賢之道天則具于心而時措従宜以適於用未嘗不方也而亦未嘗不圓故學者之所以持身應變豈必于其方圓之迹云乎哉亦反諸心以嚴其天則而已矣某年二十三始識毅庵孫公于浦城其後六年復見于南都又十一年乃今復見于廣右而公之蹤跡則自縣令而給舍少叅憲副得罪當道落職典史稍起今官其于得䘮禍福去就升沈之變備嘗之矣而未嘗以易于初豈非剛方自信之士哉夫方圓皆天則也非圓無以濟方非方無以用其圓然或不得己而至于過也則寜于方焉過之無寜于圓故曰行己有恥乂曰人有不為也而後可以有為皆欲人以方自厲也方中其節無抗之為激狹之為隘執之為滯是亦圓而己矣况夫無是病而備其則如公者于以適天下之用焉往不宜哉公以廣西叅政改江西諸嘗同官者宜有贈言謂某受知于公者命之使言故敢竊推公制行之實以告之亦不肖之所願學者焉贈冐玉華遊南雍序林春冐玉華先生以選貢來京師上春官試大廷制也將遊南雍東城予雅在鄉曲寜無言以贈其行乎盖天之生才不甚相逺人之自逺毎失其初故才者自見其才抑或為才所使竟成技藝之小而能自養者則乂就其才之所近者従而禆益補綴以文其才以發其粹若將曰本吾心之所有者従而直攄之因載籍之所傳吾惟精進焉耳庸何傷况美愛可傳言文行逺在大賢亦所不免何在其為非學乎噫古人立言與今人之用心可窺矣昔孔子論文曰辭達而已矣非臨文脩詞以緝其事而寫其情也盖事在言前意因文顯故有孝親之心者言自藹然有忠君之心者言自愷切言發于心意足于養不求其達意足而文自流不求其文言文而道自載如水之來其源不竭其流自長其流既長其積必大汪洋充溢風過文生天光雲影相為照媚而生色變態隨感順應有不可以盡藏者矣是孰使之然哉氣聚而不散力振而不裒神顯而不藏渢乎穆如莫知其妙故曰逝者如斯夫不舍晝夜此文之則也若徒摘前人之言以發在我之藴意不融而辭不達中無主而氣不攄殆不免于牽合比擬力索强探精神之感發㫖意之紓徐不能使人聼之心融見之色受也豈其降才之殊哉養之不同耳玉華先生㓜負雋才長而能文及其養而有成也父兄多賢詩禮奕世故才成有本養必以道不徒文而足以顯其身大其遇者有可必矣今而南也豈無所自見以大其養乎予嘗游南雍矣見其分甚嚴其禮甚肅謁國子先生于堂下而莫敢接詞其道甚尊然後知髙才多下盛徳若愚氣槩一世者亦將自歉而且藏矣盖東南之賢咸聚于此人文之化實始于南君子親師取友以大其養者不容不卑以受也故名世之賢軰出君子之游亦竒玉華之往也得無撫時慶幸少同于予乎况才而且美于此益粹其和養而能成于此益增其大行將望重鄉閭而子弟従待用銓司而上下服豫養之文于是大顯若夫一第之榮則係遇不遇者數也何計乎况又將來科第不靳玉華之游而夙成遲發又造化之厚待吾人者也而君子之自養則又不盡囿于天者是惡足為玉華勉乎贈少府呉竺原述職事薛甲事有合于法而睽于情者君子或是焉而未必其是也亦有合于情而睽于法者君子或非焉而未必其非也南蠻不恭朝廷斂天下之精兵猛將屯聚東南而使元老董之廷臣視之于聲罪致討之宜得矣然而所屯之地皆耕稼之地也所役之人皆耕稼之民也必以為是則東南財賦于何而出西北饋餉于何而供以是為是焉而未可也廼若開關塞通市易使邊鄙民庶得自縦于法度之外則必有犯禁而于法有所不合者然而内地之民得耕桑矣海外之貨得流通矣其利又有在焉可以其不合于法而遂非之乎君子為國家長逺慮則必量輕重度緩急故法有所不必拘而名有所不必徇昔者魯人獵較孔子従之子貢贖人不受金又従而非之夫不受金潔名也獵較争端也舍潔名而就争端聖人之慮豈不及此而必為之者誠知拘于法徇于名非所以安人情而適治道也人情之所不安大亂之道也皇明包宇宙以為國盡宇宙之所有以為財而財之所産其最多且鉅者莫如海既煮為鹽以供軍國之用矣而其利之所不能盡取者盡以歸諸其民其所不可必取者盡以歸諸其四逺雖其間市舶有司提舉有官防閑之具未嘗不設然而樵漁者不禁互易者不禁大抵皆網漏吞舟者也夫王者聚人以財而顧疎濶若此者此孔子不拘法不狥名之㣲㫖也且夫殊方異域之人挾其百千萬鎰之重貨泛拍天巨浪之中不俟開舶以與中國之人交謂之曰番人犯禁可矣然非取諸中國者也中國之人取其家之所有不俟開舶以與殊方異域之人交謂之曰中國之人犯禁可矣然非越人于貨者也中國之人與殊方異域之人犯天子之禁欣然各足其所欲而無擾于内地之人内地之人亦無患于殊方異域之擾以寜其幹止安其稼穡而無貽朝廷與公卿百執事之憂則是不拘于法者乃所以深拘之不徇于名者乃所以深徇之故曰不治遐荒深治之道也或者不察顧謂法之不足以盡奸而益詳其法謂名之不足以盡實而益潔其名卒之法愈詳而奸愈不勝名愈潔而實愈不足凡今日番人所以敢于操小艇而出入于三江五湖不假向導歴兩浙犯留都如蹈無人之境而無所嚴憚焉者皆昔日毁䨇桅戮通番之人之説啟之也昔也寛之而不來今也嚴之而愈犯此其是其非其利其害其輕重緩急較然明矣夫由昔之道觀之至易也由今之道觀之至難也舍所難就所易夫人能為而莫之為者無有以是非利害輕重緩急之詳入告天子與雖有能言之人而無可言之期也虞廷述職敷奏以言謂凡事當言者皆于述職言之也乃今嘉靖丙辰當述職之期天子憂東南多事免其郡邑之長而俾其貳行竺原呉君吾郡之貳也敷奏之道無分于長貳則竺原其當言者也吾邑尹金侯某以君之將行也與君之嘗有恵于吾邑也而徵言于予予惟今日之務其最先者莫如治夷之政與其是非利害輕重緩急之詳遂書復侯俾藉手于君焉且曰是可以言矣明文海巻二百八十
