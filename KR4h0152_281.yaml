body:
  text: 明文海巻二百八十一餘姚黄宗羲編序七十二贈序贈徐子容序王鏊兩洞庭山並峙太湖中諺稱東貴而西富盖自國初迄今髙科顯仕皆東之出西無聞焉西之人未嘗不學也非無才且秀也於是人僉曰其地則為之倡一和萬以為是固無疑者父兄以是絶其子弟不復使學子弟以是絶其身不復學有徐氏以同者山之世家獨不然其子縉依予學者五年矣其質秀而文可與進者也始予開以讀書之法而惶然繼予授以修詞之法而悚然而豁然而沛然縉非昔日之縉矣戊午順天解試名在髙等人皆曰西山之天荒至是破矣夫昔之荒也果天乎人耶今之破也果天乎人耶事難在先蜀之陋也相如先之閩之陋也歐陽詹先之遂各以文顯兩洞庭並峙競秀西特寛衍有山泉禽魚之樂橘苞竹箭之饒金庭玉柱為東南福地扶輿蜿蟺閟于古始發于今其發也必大獨一第也乎哉其亦自一第者始也天下有大荒焉非科第之謂也其不穫久矣漢有仲舒焉始一破唐有退之焉始一破宋有濓溪諸公焉又一破餘未之覩也子有意乎升堂拜親北轅言邁無或遲遲而來也贈謝給諌序趙貞吉謝右溪子入為諌官慕學甚至曰吾従事于學則不疑于言矣既引疾歸曰吾不能不疑于言尚其専事于學矣雖然朋友益逺㣲言難析吾其困乎於是諸君子謀為定志明學之論遂以委于某應曰唯唯夫至尊者道也至樂者學也學以聞道志以成學也然而學不信心久矣惟其不信自心是以志無由立盖此心不失即名為志此志不失即臻道域也今先不信心而志従何生志隳而學宜其展轉外求而自蔽益深矣某以為必先討去其蔽而後可與共學是以古之朋友旦夕聚處先王教化亦必羣處校列而後成有由然也夫學者之蔽有測窺前聖模度後賢摘服佳言飾行善事身心互持徒相窒礙而此念既熟自諉曰志者其蔽在不信自心而依倣妄念逡巡襲取也亦有取自胸臆懸立標準即以標準為師而别起意念常受法焉隠㣲牽絆未有止息抱此情識自諉曰志者其蔽在不信自心而依憑妄念虛恍意見也亦有醉心陳編馳騖文學研究糾賾増長聞見剽竊空談支離著述身心漂泊至老無聞而言語之㣲矜持影響及淹浸既久家具頗成矣遂自諉曰志者其蔽在不信自心而枉肆妄念紛紜玩物也又有頗知向學而厭靜喜動厭動喜靜者在静無主則雜念輪轉而苦眩不寜在動逐物則境移心變而煩惱復作或滯靜而沈昏是宅或徇動而神守離軀或照管馳求以為近取檢㸃科列以為自治惟此枝條最為煩多而終歸于廢學矣其蔽在不信自心而妄生支離也又有志非真切託意矜名依傍仁義之途而自以為是日作心勞之偽而不覺其非止于補塞脱漏惟知脩飾觀聴故多欲之根日深而智慧之種將盡矣然而性無滅息本知獨良或因考古而發憤或聴人言而忸怩或因順境而真見忽開緬思有為或因欲極而天心復見即期解脱或惜嵗月之不可留或嘆古人之不易及或光風霽月之下而暢然自由或迅雨烈風之前而暢然追悔皆其本心忽明之端不可昧也但舊念既熟而新知尚生熟者有欲可依而舉目見前生者無本可據而掉臂遺失是以卒歸于不學無志而已矣其蔽在不信自心而立基無地也夫五蔽者言其略矣五者交錯互相生養而蔽無窮矣今欲直得本心而確然自信惟當廓摧諸蔽洞然無疑則本心自明不假修習本性自足不俟旁求天地萬物惟一無二在在具足浩浩充周矣雖然非有師友淵源之論砥礪切磨之功奮起塵俗超然物表者誰與領此某濡迹宦途而學稍歸一則以京師豪傑所聚而誨我無涯矣謝子離索之憂其誠然乎哉雖然謝子本知與天地萬物同其良也與百姓日用同其能也與千古萬古巳去未來之聖哲同其妙悟也疑此者謝子之真疑也信此者謝子之真信也真疑之體即信體也真信之用即疑用也求去其疑非信也求臻其信愈疑也是謂不假修習之心不俟旁求之性也謝子能信予言乎鳥啼花落皆是師資行道之人示我妙用而孰為離索之困哉雖然五蔽中人如惑予之言則予又將復為蔽人矣諸君以為何如為我告西川志士以為何如贈楊朋石陞祠祭副郎序趙貞吉嘉靖甲寅之夏某釋罪南服起抱牘留都文選司為郎坎壈𤨏偻無復之耳奚有往者脩名立事之氣哉盖浸浸衰矣至睹世之著名立節才諝楨表之士又時時喜勃于中而機衡于外躡屩之與交抵掌而談行事所謂不自知其何心也人見予若此以為猶故吾焉不知予將掩其聲光藏其狂愚以逃直旦夕去之與履豨者比耳吾友華亭楊子㓜殷者予至南都時所好交之一人也忘其身之坎壈𤨏僂數與談當世之務述往古之迹者也談之時復憤之述之時復擊之往者脩名立事勁挺抗厲之意氣時倏震而衡焉即楊子亦以予為猶故吾在者也夫楊子博學洽聞脩名砥行蹈道而擇塗要異日為世之楨表予重之好之誠其心知之也顧楊君乃若不知予志意之衰何耶夫以楊君之明何可謂不及知予哉予内懐若此而外著若彼宜楊君之信予杜徳機耳居無何陞楊子禮部祠祭員外郎属將去比撰舟矣考功萬子楊子騐封黄子稽勲塗子者皆楊子之舊僚友也以予與楊子知新而好深宜授簡而撰辭嗟乎予之好楊子亦奚過哉夫士不務學則陋不尚節則罷彼陋與罷剗見聞薄名檢刓方旁合于世耻貧賤而貴顯榮乾没世利三倍而揚揚談仁義下幾發冡之辱哉君矯矯然蹶蹶然誠慕古之大雅與今世之卓爾者其擇之審矣詩曰邂逅相遇適我願兮殆若人之儔與雖然楊君方嚮世而予志在避去始之邂逅逝將背馳向之適願尋當相思四君子皆用世之才與楊君同其相知而不必與予同其相思則别君又予之所難也古之君子進不隠君退不忘世士者世之幹也予不敢忘世烏敢忘士哉嗟乎吾徬徨無所庸于世得遇士之足以益世者身雖坎壈𤨏僂庶幾乎獲亦多矣代贈司馬曽確菴平戎入覲序趙貞吉皇上即位命都御史曽公討治西戎之不靖三年乃克平定之天子異其才擢為兵部右侍郎戒行有日于是成都守徐君授約束服師旅煩劇之任于公所者二年餘矣夫兩賢相臨相知必深而兩知相别相慕必切亦人之情也乃與其屬内江令陳子謀曰吾何以荅我撫臺公相知之義哉安得能言又為公所知者道予意俾不敏之身宛如隨其言以侍公行哉即以陳子為介而託諸野老乃予謂陳子曰予非能言者然公實知予言誠不可已也初予與公書曰公知道又知兵也然未既其説也今再盡一言之藴俾太守藉手以壯公行色可乎陳子曰若此實徐守之光雖諌亦頼有榮幸焉予遂言曰夫道者通于物之名也通于物者必通于巳也未有不通于巳而能通物者也上下四方而身處其中謂之物也矩者通于物之體也累者通于矩之用也噫亦難矣要有本也傳曰君子有大道必忠信以得之夫至忠者通于物之性而忘其己之身也至信者通于人之情而忘其巳之意也故至忠者之事其所大也忘其百骸而一念存焉耳孤忠所發金石可化而天下其孰能當之故成務而妙用不窮至信者之臨其所御也忘其羣疑而一真寄焉耳至信所符豚魚可孚而天下其孰能離之故握機而智用不測至若兵者又道中之一事耳以為詭道而非至忠不能行也以為詐事而非至信不能克也夫吾蜀坤輿之地古來賢哲所共經營也而深于兹道者其惟孔明乎南中之役孤忠懸于主而至信寄於敵去之千年猶有生氣乃今曽公之平戎節大類之猗乎休哉豈非睿聖臨御道術將興而士氣與世運之交盛公為之先乎夫十年之前方隅之勩不敢望以忠信風之頽也久矣今主上以冲哲凝命吾相蒿目而憂人才之寡助盖以西南隅事試公于難非以為便也公于時視其所天之事猶曽閔之視其親之身也覩于無形也聼于無聲也秉心顧履一跬歩而不忘也故忠達而信之者至矣將帥信之矣士卒信之矣百僚士農信之矣蠻忽而平倐而滅矣窅爾不知其由矣此之謂至忠非與夫孔明之平南中欲生之以廣輿宇故信以寄於敵也公之平都蠻也欲滅之以靖華民故信以寄於敵之敵也此又法之變也陳子曰何謂敵之敵曰兵法曰攻城為下攻心為上夫能破敵之心者是謂敵之敵也以信為羅而致之是得破敵術之上也淮蔡之李祐也淮肥之朱序也遼東之田疇也得之皆能使敵自解體而忘者也此之謂攻心而曽公平戎之劵也予故曰公知道又知兵也夫知道者公之學之正也知兵者公博學而通于術也古之賢哲未有不臻於道術之域以待世之用者夫使世之患常少而才術常多則不患于不治矣如使世之患常多而才術不足于用則君父家國之責奚託哉古之儒者不得用而老則以道術傳諸人焉為後世人才計也以此為訓猶有陋儒擁敗絮以自髙啗薇藿而傲世曰吾脩儒行也問以世事則曰未暇此曷稱哉昔冉有之與季孫布車陣甚精也季孫問曰子之于兵精矣其性然耶夫亦有所授乎冉有曰噫皆夫子之所教也此又何行何暇也哉且予聞之廣道術于一身以備世之用者才士也通乎人巳者而後能也廣道術于天下而俾一世之才足一世之用者仁人也則通乎人己而達諸天者然後能之公之兹行豈徒然乎予之所望于公者非仁人之事乎斯言也俾太守以壯公行可乎陳子曰先生之言其義大矣謹授簡而書之以諗吾守使以達于公不敢後也贈申陽鄒太守序劉繪儒有脩行効功致位業顯盛著久逺聲名惟抗才與節施于當世當世亦服之而已然才達論易縦節約論易狹孔子曰狂者進取狷者有所不為得非謂此與故士負才性多不羞小節而喜功名耀于春秋或因時取卿相至極富貴不厭節士懐孤行亢論軌正義空室桑樞含水䟽食為快然進用常不合而亦取榮名于時是二者古人事業各有著見後之評品亦異揆以中執之論必大賢君子有推移化裁之妙云往予濫諌垣與翰林荆川唐公論事荆川持論重節義曰節勝于才猶為得己才而失節又奚云才故闚士人取與如恪恪亷潔静嘿才雖無所見必歸之清流因謂士之亷猶女之潔為名言也予謂近代文山公正氣貫日月素喜豪奢縦聲妓何也荆川曰古人徳業自有可學與不可學如文山吾但學其正氣其豪奢聲妓吾絶弗學可也異日江西羅念庵遺書于予中有云士大夫立事務求本心若任才性而不求之本心則事雖極竒偉終歸變詐念庵雅善荆川二公之學方繋時望而其識略相符也予自諌垣觸罪出守渝州三年服自論懔懔常注心目期不敢負交游焉家居十年静觀州郡守令亷垢因以為百姓禍福詒一方利害小大二公之言又若針砭劵契不可舛也聞信陽守鄒君政和操嚴清素自持與吏民毫絲弗染堦無請寄之私館乏食客之費百姓歌頌傳播諸守令墨者聞咸愧省予懐其名而私慕焉乙夘秋鄒君赴省試校文録予長子為首巻遂託文字與予父子善厚予長子往謝留廨宇數日歸語鄒君少従荆川先生游性躭澹泊飲食服御一如寒士信吾師也予喜與所聞合嘆曰荆川公倡古學于東南其門人弟子相傳舉業射科目達者顓志詩文以逼前代孰如鄒君篤信行其所學利澤及民物其得荆川之精者乎今年夏六月撫按交章論薦冠于諸郡節判賈君率僚属吏民賀焉迺徵言于予予不能文申去光且三百里治行施設賁采郡務莫能原察所聞清徳自珍逺邇同附是能介然守其師之訓大者足述矣夫冉求聚斂公綽不欲孔子論成人而兼用焉豈聖賢自處欲嚴以範世而其用人又取其隨時成就以立功名當時未與荆川極論之今不知鄒君以為何如也嗟哉嗟哉靈氷耀淵香玉秀谷士以潔而寳世也古人懸魚寵節留瓜表介物㣲而志貞芳烈千載人心同艶矣今廟廊之上有聞鄒君者豈不以為銅章墨綬之華也哉贈上元簿何君懐珍序徐階凡天下之能有所樹立垂聲不朽者其果在人耶位耶有其人矣無位則不可成有其位矣無人則不能自成然則二者之中孰為要曰人為要天下之事有有其位而無成者矣未有無其人而成者也吾于上元簿何君懐珍有感焉君始為廣之白沙巡檢白沙負山濵海冦出没無常君時能捕其酋佛朗國人以蜈蚣船入冦船制上廣下鋭環植以木百夫鼓枻倐忽去來矢石不能破又為銃大小相貫着鐵丸其中每發可二百步殺常十許人吏卒莫能禦君間行誘其黨盡得其法以歸因以其技攻之賊不敢近廣人用寜嗚呼君巡檢耳其于位非有藩臬牧守之尊其于資格非有公孤卿輔之望而廣之冦盗上之人所不能制者君獨能捕且却之其誠有不繋于位者耶自有廣以來冦盗之患非一日吏于其土非一人而卓然有所樹立使後之人歌其功而不墜者至于君始一見吾不能無少望于在位諸君子也廣之有山海小寇未足為重輕佛朗之禍可謂亟矣使其時非君出死力以圖之其能遽就寜乎吾是以幸廣之人獲受君之庇而又惜其不幸而不得置君藩臬牧守之位使盡其才以衛其民也今天子明聖治安之念日久不忘于懐自廣之史以及天下間君之風其亦惕然于中乎夫茍惕于中則必思以名于世果如是吾見治安之功不難致矣請為天下賀之君名儒懐珍字江西寜都人其將赴上元柱鴻臚軰若干人謂予曰子素知柯君不可無言以贈予曰諾為之序風于縉紳焉贈黄孟偉南歸序陳琛南京刑部廣東司郎中黄孟偉弱冠時習為舉業或曰是質實者不能為華藻之詞取科第必遲而乃以二十三之年領鄉薦二十七登進士第既而主事刑部或乂有曰是剛且方者剛則用猛方則寡諧于仕途必不利而乃以清慎明恕著聲合逺近士夫無異詞焉余用是知夫質之美者有華剛之善者迫仁而方于行者亦未嘗不圓于智也然則人物深淺實未易知而余亦安敢自謂能盡知吾孟偉者哉兹以六年考績援例得乞歸省將行大理林君茂貞吾閩諸大夫携酒贈别謂余于孟偉有一日之長不可以無言且曰仕宦晝錦之榮春風彩衣之樂皆不必贅願進孟偉于古人中而期之以逺且大者余曰君與孟偉皆同安人也同安先軰蘇丞湘子審在熙寜中以不附王介甫罷歸君以其人為何如茂貞曰不附介甫則正人也乂何議余曰釣磯丘先生葵亦同安人也處衰世而巻懐不出何如茂貞曰斯固正人也以其隠而無所建明耳然此二公皆千載人也吾與孟偉願學之而未及余乃作而嘆曰介甫抱負經濟以周禮為必可行蘇公未嘗有一言稱其行之是而釣磯則確然謂周禮之當遵是二公意見自有不同而茂貞孟偉乃皆學之而自以為不可及然則義理固自無窮而所見亦不必皆合惟其人之正而巳耳正則自古非必事事歩古人之故轍也蘇公不附介甫固未必謂周禮盡不可行而使釣磯得行其志亦未必謂周禮一一皆宜于今也居今之世服今之服司馬衣裳之古伊川㡌桷之髙亦或有訝之者噫古道之難行也久矣慕古而能深知其道者亦豈易哉余于孟偉既不敢自謂知之盡則于古道固有不能盡知者矣而又何言以贈哉于其行也姑隨諸大夫與飲酒贈邢秀才歸掲陽序陳琛東廣掲陽秀才邢生照之千里裹糧來予館中問余詩余不能詩問余文余不能文問余疑義余不能章句講解嵗暮告歸以逺來未有所聞為歉余告之曰吾饑焉當食即食渇焉當飲即飲困倦焉當睡即撫枕而睡睡足焉當起即整衣而起徐徐焉而行安安焉而坐不能詩亦取古人之詩如陶靖節之平淡邵堯夫之閑適而時歌詠之而不暇及于李杜黄陳之髙吟絶唱不能文亦取古人之文如周濓溪之太極張横渠之西銘而時讀誦之而不暇及于韓栁歐蘇之雄文大筆不能章句講解亦取程朱之四書五經傳疏而時覽觀之以㑹聖賢之大經大意所在而不暇及于陳北溪饒䨇峰諸先生之叠床架屋至簡至易自暇自逸值風則與之俱清值月則與之俱明值菊花之黄梅花之白則餐英索笑而與之同其臭味學士大夫田父野叟亦或有時焉相值則與之談論古今談及太平則欣然而笑談及衰否則戚然以吁談及大賢君子之經綸設施英雄豪傑之叱咤馳騁則感慨發憤踴躍若狂直欲盡吸西江之水而時吐之于壁立萬仞之崕初不自知其愚訥迂拙而不適于時世之取用也吾之所以為吾者如此吾告吾子亦止于此書此贈歸藏之箧中三年然後出而觀之又三年覺其言之太繁然後巻而棄之贈胡思巗山人序翁萬達山人異人也故浙東天台産負氣多竒術云往者南海郡為吾友鄒一山氏勅政勤務戒門者謝游客客至不得見山人來獨請見又長揖不拜一山驚迓山人居與語大悦且贈之文文極都麗傳誦閩粤間于是閩粤人咸知山人異人云山人後持一山書走蒼梧見余如初見一山余亦如一山欵山人敬重之㑹有交州之役余軍于龍憑營于念涯挈山人往同起居坐卧即土漢人望山人欲物色之不可得山人時時讀軍志説法朗然相助余有搆畫間以詰山人山人能甲乙其説一日督府蔡半洲公檄予若諸文武寮以兵討叛酋者暨其黨數百人先以偽降諸營所動息必偵知余慮事泄禍且起肘腋㑹諸寮持督府檄詣余言余故焚檄諸寮恚怒余稱病呼其酋若黨咸以首搶地出血謝因遣之他所苐留魁惡黨磔死不可原者數十人領以故所昵漢官使譏視關壘伏勁兵擒之而山人不知也數十人者驍雄矯徤無不一當百又行不解甲雨乃解伏兵利其解也不且改圖以獵為援而山人又不知也明日當獵余以問山人雨山人曰觀星卜不雨余曰不雨可獵邪山人曰獵必大獲且異獸也及明余約諸僚若山人獵于營之東二十里刲牲饗士肆筵為歡或擊壺弹棋頃之見一騎遥遥來余目山人曰得非獲異獸者邪山人不悟諸僚苐相顧亦不悟㑹報數十人者悉就縛諸僚若山人始大悟焚檄出獵計咸起謝余余亦謝諸僚若山人且曰山人山人山人之言中矣山人狂叫索大杯鯨飲乂婆娑舞擊鼔而歌諸僚亦有歌且舞者爛醉而罷踰旬交州平山人以余欲改厝先慈故復東走潮州為相擇利地余歸不得穴大泣下山人亦泣下後得利穴余沾沾喜山人亦沾沾喜既畢厝事余使人奉金謝山人山人怒不受曰山人利而金邪而何小山人余曰苐以為贐耳乃一笑别去山人遂于南海家焉嗣是四五年余念念山人㑹山人詣闕下上書請纓書凡數百餘言可否伯王出入韓白譏切當時見者大驚異司馬職方氏亟索山人語刺刺不窮乃檄使山人詣余朔方軍余喜謂山人曰山人欲復従獵于浚稽五原之間而以羯奴天驕為異獸邪趙晉雄鎮可一遊也山人遂遊覽趙晉間于是趙晉人亦咸知山人異人云夫趙晉閩粤南北之極陬也而其人顧盡知山人名即中外賢公卿士夫亦罔不争先敬重山人如一山若余者豈不誠異人異人哉然余方圖返初服買山種藥為安生養命之計又擬與一山氏結廬金石談學著書抗志浮雲轍跡九有暇時登隂羅望鳯凰徐察地理求所謂青烏牛眠者將籠有山人竒秘而山人乃反效故吾談劍攘袂事邪山人好為之垂名竹帛傳耀來代是不難山人今且歸𦵏其母于天台再來時即余巳海上然必留故所佩弓劍及圖書一箧畀山人贈憲使莓厓周公入粤序宗臣鄞周公往以上命來督閩儲無何謁上上以公當返閩而粤于閩最近㑹粤憲使奏缺上遂以公為粤憲使命至閩而方伯楊公嘆曰公何復出即出何粤也以謂宗子宗子曰斯上意哉楊公曰上意何者宗子曰余讀秦漢之際而知粤之難治也乃無逾今者昔之難在有其粤者也當漢盛時吕嘉背王太后之議恃粤之強不内鄉一夫耳而天子至命伏波樓船戈船三將軍統數十萬下蒼梧牂牁往討然而君臣上下之畫毅然毋撓者則以吕之故而無與于粤也今島夷者何為者也乃能以其一朝異域之人而與我粤人驩粤人日釀美酒烹大肉以待其至即不至且操大艇載酒肉及絮繒遺之有司稍稍詰問輙走夷中令其持刀大呼攻城野掠率格殺數百人而去有司上書言狀上非不欲命大將軍統百萬盡捕殺諸所昵夷者顧念此皆吾赤子也與其亟而兵也不若且飭而憲故以三尺付公上意深矣楊曰公之奉上命以往則嚴乎宗子曰余知公之不欲嚴也夫三尺者法也天下未有法而不嚴者也公獨奈何不嚴也嗟乎粤人之昵夷也豈真其父子兄弟哉毋亦夷持其所以生之之具而招之而治粤者輙又嚴刑酷罰以趣之死夫好生而惡死者情也生之而不趨死之而不避天下無之為今之計不若緩其所以死之之具而漸示其所以生之之路寜使之稍肆于其内以玩吾之法而不使之法密而不勝以求快于其外而至于絶吾之法則其視吾之所以生之者不殊于彼也彼又安得而奪之斯弭亂之術也若朝論殺一人焉暮論殺一人焉則其心愈駭駭則疑疑則亂即遣使大將軍統數百萬盡捕殺之何忍哉故曰公者不嚴者也其亦上之意也公念之矣故事同采諸公遷去輙有贈言是時公徑趨粤而書來問所以贈者楊公因命宗子言宗子于是以其與楊公言者報公公上首所擢士為御史忤貴臣斥去巳又為縣官為藩臬臣今四十年矣非上念粤甚豈復令公南哉今且召公矣贈蕭文彧序何景明蕭文彧先生與余父兄游者數十載與余游者六七年博雅志慤凡世之詰媸侮衆方閧然文彧獨漠然不知也余益愛焉語多合意嘗謂曰君其澄之不清撓之不濁者乎余第進士猥來見訪至再乃徵余言請為别號余知文彧者將安辭遂號曰古峰嗚呼鑿破混沌一派世道萬偽日兹吾嘗髙卧北牕之風想無懐葛天之民慨身世之既逺也及道西華玉井覽其峯髙寒竦人由是又南望匡廬五老巢入空㝠氣含鴻濛雪落太古乃登羅浮七十二峯于飛雲之上别來嘗夢想斯境梯石磴披蒼翠浩歌煙霞深處與華胥氏往來不知有人間也則文彧之古峯亦此類也耶然文彧世族江西漢唐聲華今益顯家地之古矣標枝野鹿貌之古矣太羮𤣥酒文之古矣余所謂澄之不清撓之不濁其心之古然則文彧之古峯將凌太虛入廣漠而求之無何有之鄉奚俟吾言明文海巻二百八十一
