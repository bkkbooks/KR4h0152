body:
  text: 明文海卷二百八十二餘姚黃宗羲編序七十三贈序贈李司訓序唐順之古今之變其可怪也歟古者任官以才雖無所不擇然自一藝而上皆可以器而使也至於學校之師則規規而謀之曰彼有道者乎彼有德者乎彼道隆而德純者乎何其求備之至也古者或委之以卿相而不懾投之以盤錯而不避至於命之為師則逡巡而若驚焉曰吾不堪也雖亞聖大賢猶不敢輕也而曰人之患在好為人師何其遜避之至也今則不然不量其人之能與不能也率然而授之為師曰彼無不可焉不自量其身之能與不能也傲然而當乎為師曰吾無不可焉嗚呼古之所靳而不以與有道而未隆有德而未純者今不問其人而可以與者也古亞聖大賢之所遜者今人人之所不遜也其亦可怪也歟或者曰今學校之師誠無難焉勾稽廪食督促升散如是而己耳其髙者講章句課文字如是而己耳夫使師之為師如是而己也則誰不可也如曰不如是而巳耳則必修教化興禮樂而後可以無愧然則有志之士居是官者能不畏且懼歟又安得傲然而己乎且夫不量其人而率然授之者是謂失人不自量其身而傲然當之者是謂失已失人者則既失於人矣不可以有補也失巳者則所失者己耳可以勉而補也説命曰惟斆學半古人之於教未嘗不學而其學未嘗不資乎教此所謂可勉而補焉者也嘉靖丁酉余始識司訓李君於宜興會君調臨安教諭於是諸生愛君不忍其去也因相與求余文以贈余知君為忠實長者氣溫而語確能自異乎時之為師者可謂有志之士也司訓與教諭雖同為學官然司訓於官為二其勢不可以專不專則其責猶輕教諭於官為長而一學之事皆專焉專則其責益以重矣君固且傲然當之而己歟其亦畏且懼歟吁君其自勉而務學以有補焉可也曰如是而己耳如是而己耳則余又奚説以贈君哉贈訓導丘君序唐順之古之職於學者皆其鄉與國之老其體貌也甚尊而其廪餼也甚豐其在國學天子至為之饋醬酳爵而鄉學則鄉之大夫嚴而事之如師其子弟之不心服而安其教者少矣今之職於學者則異矣饋醬酳爵之禮其廢於國也既久而其職於郡邑之學者日數溢之廪月朔而望抑首促步揖且伏於守與令之庭候顔色怒喜為欣戚雖其子弟有不貌而師背而嘲者少矣故古之職於學者常易而今之職於學者常難雖然古者非苟隆其禮而己固責之以德行道藝之備乎其身軌物化導之善乎其俗弟子執經而雜問以觀吾之所應郡邑之卿大夫有大事從而乞言焉以決其所疑苟一之不副則其責不可以諉而今也課書升散之外一無所於責矣于于然飽且卧而己矣故今之職於學者常易而古之職於學者常難然則今之所謂難者顧待之者則為薄耳而居其職者未嘗不自以為便也古之所謂易者顧待之者則為厚矣而居其職者未嘗不自以為懼也古之易者果易耶今之難者果難耶雖然抑今有所甚難者古之道不以責於今之人而今之官古之官也人雖不以古之道責之而吾古之官也則亦安得不以古之道自責乎以古之道自責則是食今之食而任古之事其勢將益齟齬而不行且夫古者據至隆重之勢以御其心服之子弟其教之行也豈不易然然猶有一再三不變而移之郊與遂而屏之逺者是其責尚有所不盡而况據至卑褻之勢以御其面而師背而嘲之子弟欲驅之帖帖以就吾教以冀於育才善俗如古人而無負乎其所自責其必能乎否耶然則古之所謂難者猶或有所易而今之所謂易者終有所甚難也雖然亦在乎自盡而己苟德行道藝之在我者備則雖勢有所不行而吾固已無愧於古之人矣自余為諸生所見不啻幾何人矣求一二人焉幾於自盡者而不可得也及往來仕途則以詢於天下不啻幾何人矣求一二人焉幾於自盡者而不可得也豈古今人不相及往往如此耶抑其待之者薄則亦不能自為才耶若丘君者其幾於自盡而為吾之所求者乎丘君卑而無所屈於身貧而無所緇於利於今之䔩䔩齪齪之態丘君一無有焉其德與藝不知於古何如耳夫因乎待者之厚薄以為其人之隆汙者有之矣因乎其人之隆汙以為待者之厚薄者有之矣向使齪齪者而出乎古古亦未必不以薄待之向使德行道藝者而出於今亦安知不以隆且厚者待之耶余嘗問丘君於學之諸弟子羣然曰丘先生吾師也則既異乎貌而師背而嘲焉者矣古不云乎教學相長也自今以往丘君德益成藝益進而譽日益流也然則所謂嚴而事之與就而乞言焉者安知不在丘君余既有感於古今之難與易而喜於丘君為余之所求又冀於古道之復自丘君始也因諸弟子之請遂書之以為贈丘君序時嘉靖丙午秋七月也遂不辭而序之贈竹嶼吕通判序唐順之今之為蠲災之説者余知之矣有司以災上之計府主計者量其所災而上下其所蠲之數宜乎所災與所蠲必相當也然主計者疑於有司之不信也而必裁其數於三分之內有司者亦逆知主計者之不吾信也而必溢其數于三分之外大率主計者之蠲災也十裁而為七有司之上災也七溢而為十然後有司之所溢與主計之所裁較足相補而所蠲與所災適得如其分數而無盈乏若使據實而上焉則是所蠲常不能如其分數也然災自七分以下皆中飢小飢也猶得溢其虛分以求不失乎實分之蠲若夫大飢則其實分巳盈乎十而十之外有司固不得復溢其虛分之三以待主計者之所裁矣其所蠲亦不得過七而止則是大飢之所蠲常不能如其分數也夫所蠲既己不能當其所災矣況所蠲之分數云者乂非通而計之也其法曰留者蠲解者不蠲大率一州邑之稅解者十居七八而留者十不能二三也顓計留者二三分之中而蠲其十之七乃通計留者解者十分之中僅得蠲其十之一二耳則是十蠲其七者虛也而十蠲其一二者實也若使其所虛蠲者未及乎七則其所實蠲又當遞少於一二也夫災之數溢於十而蠲之數裁於一二此如遍體殘矣而益之以一毛然尚有一毛之益也而況所謂一毛者又未必在民也其或有司不能皆賢也胥吏實操其散斂之柄蠲詔下矣匿而不布也鞭笞競行程期轉迫至於一無所負而後出詔而揭之壁則固無用于蠲矣是蠲之公囷者虛也注之私囷者實也有十分之災而卒至於無一毛之蠲嘻其亦可嘆矣章丘吕君判于吾常以督稅為司者也君操履修潔饋遺一無所受可謂皭然不涅於緇其才精於勾稽胥吏不能欺也而窺其志蓋若不欲以繭絲為功者豈古所謂撫字於催科者非耶己亥之嵗將入京師既成事將返郡求余言以贈是時東南諸郡大災斗米百錢而羡中家以上不能具饘食其野人或剝樹而啖之余不知主計者得如其分數而蠲之耶抑猶不免乎裁其三分如曩時耶將通其留者解者之算而蠲耶抑猶不免乎不蠲解者如曩時耶吕君以督稅為司則固曰知受成主計者而已矣知盈算而轉輸之而已矣主計者之所裁也解者之所不可蠲也此吕君之所不得專焉者也若夫裁補乎官私贏朒而操縱乎貧富豫奪疏其鞭笞而緩與之期使所蠲者雖一毛必達於民而所不蠲者不至乎棘以厲民此吕君之所得專焉者也君為其所得專者而已矣君之所得專焉者余既以告於君而君且信而行之矣則君之所不得專焉者又安知不有以吾説而告之主計者耶安知主計者不且信而行之耶然則東南之民其亦庶幾乎飢而不害也歟贈蔡道卿序唐順之嘉靖己丑余始識道卿於同年中己而同事於吏部後數年道卿為刑部郎余見之京師又數年道卿謫為廣德同知余遊金陵而道卿適任焉於是又見之於金陵自始見道卿則貌朴而氣溫如良金之藴於礦也再見之其貌煒然其氣充然問之以古人之書無所不通間或作為文辭率能與一時文士相馳騁上下如虎豹之不肯自晦其章而蔚炳時見乎外也又再見之則貌之煒然者以凝氣之充然者以虛與之語非六經之藴不以言從而叩之非君子之儒不以存諸胸中如草木之將落其華斂其元氣而歸乎其根也道卿年未三十而余三見道卿亦不過四五年間耳既己屢變不可涯涘而且卓然有志於道借使過此數十年余不知幾見道卿不知道卿容貌辭氣又何如而其於道何如也其所謂速化者歟夫學者非其才之足貴而聞道之難聖賢之道易以簡而學者每病其難聞何也其毋乃多岐誤之歟故學者必一其所志而後精乎其進百家衆藝莫不皆有可喜可慕而皆可以附託於聖賢之道後生耳目好竒而不擇方其力蓄而氣鋭力蓄則必有所湧泄非泛濫不足以肆氣鋭則恥於一藝之不及又安能奪其可喜可好而專事於淡乎無味之至道哉其習之也惟恐其不博而不知博之適足以溺心其羅而張之也惟恐其不文而不知文之適足以喪質及其力刓於無所不搜氣竭於無所不恢于是向之可喜可慕者或如摶影而不可得或得之乂不足以理身而養性而適以溺乎其心喪乎其質於是始欲反之於道則力己刓而不能果氣己竭而不可鼓大率少年剛鋭之士不患乎進之難精而常患乎志之不一至於力刓而氣竭則雖或不患乎志之不一而常患乎進之難精道卿既己落其華歸其根以一乎其志矣夫聚其全氣與力無所滲泄而一以輸之於道至於久而未有聞焉者吾不信也在道卿精進之而己於是道卿遷官廬州將行廣德諸生彭某輩來求豫文以贈豫欲堅道卿之志而勵乎其進也故聊為之言以俟異日更見道卿云爾贈宜興尹林君序唐順之宜興環山為邑所産多竹木名材熊狶異獸柿栗茶荈之饒其民人工織屨治絲葛善獵射自食其土不為遊賈於四方而四方賈人亦以僻絶罕至其地其民終身不見都會之綺麗與竒邪之人而自老於岩壑之間是以其俗儉陋而木戅畏吏而簡訟山澤之稅不待督而入為吏者既樂其土風之醇而又無賔客送迎得以優遊而養尊又有回溪峻嶺飛泉石竇皆帶郭數十里內以其暇時遊娛其間以極幽人逸士之所玩好而忘其身之為吏也蓋凡宦於東南者莫不以宜興為善地豈不然哉其後敦龎之風漸泯而機利之習稍興其民之巧於捭闔既無以異於大都喧市之人而豪家富人競為浮侈與吳會爭勝山谷之氓往往憑險以逃稅或擊鑼聚羣持木挺格捕者急則竄入鄰境不可禁甚者或與長吏相詬訟獨其山溪泉石之勝不改於曩時而為吏者亦苦於簿書之煩且勞而不暇以娛也其風俗之變遷不同者如此余嘗登銅棺泛荆溪歷二洞周覽其山川之故庶幾復見古者敦龎之風而不可得為之慨然太息其老人為余言往時吏多長者善拊循其民後為吏者見民之饒給又蠢蠢易籠也則多張網絡侵漁之故民生日以殫蹙而姦偽萌起由此言之風俗之趨大率在長吏矣於今乃見林侯林侯蓋所謂長者也侯本以經術取髙第其恂恂儒雅不類於法吏為政潔已而恕人未嘗取辦於敲撲鉤擲以為能然而其期月之間民己四嚮而慕之其政平訟理尤出於法吏之所不及豈邑之古風其尚有存者乎何侯之致理之速也夫民之於吏如金鐵之在爐冶惟其所鑄南陽好商賈而召信臣富以本業潁川好告訐而韓延夀教以禮讓南陽頴川非素善俗也被二君之化翕然為之改觀易聽而況宜興舊稱醇風者乎在侯之所潛轉而默𨗳之者而己若是余知宜興之民復於敦龎而余得以與觀其盛也可幾矣余於俟有同年之誼又與宜興鄰邑也故不徒頌侯之政而有所深望於侯焉贈趙千户序王慎中異時武人之容冠豭冠佩魚服短後之衣撫劍而語難飲酒呶號視直而不能側聲髙而不能下手足之力有餘健而不可制則蹴踘蹶張投石超距以泄其悁急而宣其氣卑躬俯首靦顔笑而柔聲音飄紳襜袂與人為俯仰非其事也永寧衛右所千户趙君伯齡世武人宜有其容以吾所見皆反之何也異時武人其容如彼其所為亦且暴戾恣睢忿忮所至輒批搏人以自快嗜財悅色則攫取挾狎而無所憚時平久而文法行往往見為背惡上之人輒操文法以困苦戮辱之於是武人之容為世大詬不思其為則非而其容則是彼其懲之之過而蘄以自免輒改其容以趨媚於世而求容乎上雖其進退蹈舞不驚人之耳目而強果奮之氣無復異時之效不亦可患也歟且其容非矣而其所為亦卒不能大變於其舊是兩失之也伯齡細謹自飭以恩意拊士卒如恐有傷尤亷於財貧而不侵乎下其所為是矣豫獨怪其容之反也豈非思自表見以趨世而冀上之用乎然竟落落在羣伍中無以自異事任不及而材勇無所試飲酒不得醉醉亦不敢狂語徒飄紳襜袂與人為俯仰以銷沮其氣良可悲也文法之盛背惡者不得肆而斂飭者亦無以自異將使武人何所視哉吾甚患之故有以贈趙君贈督府胡公進秩宫保序周詩惟我國家聖祖神宗建極統天文經武緯方內安乂垂二百􅑤於兹我皇上龍飛五位一德合天百靈效順六合之內侏離卉毳之屬靡不喁喁翹首內嚮中興之烈照耀千古莫之與嫓頃者東夷弗靖於我王度揆厥攸自則我中國叛逆之黠曰王直者實倡而煽之初直之生也母夢弧矢星墮懷中已天大雨雪直隂以自負長乃結諸無賴亡命越入海中始以貿易稱船主繼乃以威信懾伏諸島夷諸島夷即無不帖服受指者久遂僭號徽王橫行海上適我邊陲久寧武備稍弛直乃據薩摩洲為巢穴而時遣諸島夷分道入寇肆行劫掠甚乃墮城邑殺將吏吳越閩粵之間千里騷然殆無寧嵗於時非無帷幄授鉞之臣爪牙折衝之士相與竭謀戮力而要領罔得績效罕覩適公以名御史奉上簡命巡按兩浙值兹多難惕然主憂乃躬擐甲胄親冒夫石䇿勵將士纍收殊捷靡以職在激揚而後剪除靡以任專風紀而玩寇孽上廉知公忠誠可屬大事一再陟為少司馬右都御史總制浙直軍務便宜行事若曰東南之事一以委公云公感激知遇思隆報效益竭訏謨誓淸海甸開府以來大小數十戰誅戮俘獲不可勝紀然尤深惟禍源洞茲亂始謂渠魁未殄枝蔓曷除而直方雄據險逺非可爭旦夕利於風濤舟楫間也乃密疏以聞上知公方略有據賊在掌中屢降溫旨期成大功方是時公籌畫淵祕非直凡衆所未喻即將校部曲薦紳大夫鮮有能窺其際者先是常係直母妻子金華獄中公釋而優厚之乃遣謀士詣直所宣布朝廷威德及公曲成意甚厚俾其乘時立功保全母妻陰以携其島夷之交直素謂中國易與勢成犄角然而來蓋其意上之將有所逞下之亦不失謀官封要開市云公逆知其計闔闢中會徐執而禁之始顯列其罪狀於上得請乃肆諸市朝而傳首海上由是邊陲息警將士解甲振天子之明威奪島夷之標幟正叛逆之罪典泄神人之憤怒遂令畎畝載寧閭閻安堵化妖氛為祥光易呻吟為歌舞在昔吉甫奏功于玁狁方叔壯猷于荆蠻條侯定傾于七國晉公底績于淮蔡然猶假之聲色積以歲年兵血其刃敵膏於野未有計定于一旦功收於萬全殱積久跋扈之雄無片甲隻矢之費若斯之奇者上嘉乃丕績爰採部議進秩宫保蔭一子錦衣千户公承命瞿然曰茲賴主上神聖明見萬里廟謨宸斷艾此元凶顧臣何功之有懇疏以辭不能遑安而論者方謂公爵未酬勞功浮於賞夫宋祖惜樞相於武惠姬公遜碩膚於東征聖主靡吝於爵忠臣罔居其功豈非千載之符合歟公新命既下於是邑大夫李君走使白下徴言贈公余惟公勳庸巍巍煌煌行銘太常被聲詩與主上神武光明共垂罔極顧述功德揚盛美以詔方來則史氏職也爰為之序以為公贈贈嚴宗源序徐渭楚鍾儀繫晉軍景公見而問之知其為楚伶使鼓琴樂之余固能琴今以內難縶樂往悲來往往思一鼓而琴不可得日所與伍者十數邏伺卒與數十罪夫漆面卬鼻如義剎然所對者拲桎絏捶諸械所見者白日走羣鼠爭人食所苦者蟣虱移家館吾破緼而已無一琴以娛而有諸苦以助窘是以非甚故舊足無履斯地者而葑之村有嚴君宗源者於余非有平生也乃偕吾故友任君之叔子某始持一豚蹄飣酒脯食飲吾於其地差不苦而且樂之不欲遽去余異之乃數問某某為余道宗源少時極聰明書一目不更讀而悉記中直父喪始罷去營家事然其為人眇錢財重意氣孝母而慈子急人患難可紀者凡數事施豫不責負者其人為誰與誰以彼之履若此固宜其慰我於囚而不去我也豫聞而思有以紀其人稍章其行故於其再至也書數言以歸之噫魚相喣以沫不若相忘於江湖今不能江湖也苟相煦以沫不猶愈於已乎贈郡守張白齋公致仕序方良永士君子之出處無常惟其是而已實見得是者蓋寡矣嗜進者溺於出非也恬退者甘於處亦非也何品藻人物者恆退是豫而司銓衡者亦每注念於若人而奬以示勸庸非以出之非是者徒為失已而反是猶足以勵俗故耶於戲此可為世道慨矣若吾郡守白齋張公之出與處其皆庶幾于實見得是乎抑直為今所奬豫而徒收勵俗之譽乎公少有奇節厭俗學為文辭必上躐晉魏為五言詩必出入陶謝櫽陳黃或時出新句奇崛變化如龍行天蛟出壑雷電杳冥風雨交作人莫之測公既邁往即無意進取有勸公舉進士輒掉首弗答至尊翁先生督責之嚴乃不得巳為科舉業既成進士復棄去故於詩若文造詣益專擅名者反後焉由進士為大理為吾郡馭衆惟寬蒞事惟簡不屑屑取能吏名亦不求速化公庭晝寂則託興寫懷時與素翁右臺相酬和間灑茅龍作草書遒徑有體石翁內翰殆不能過公于富貴泊如故在郡六年乞歸者再今年春歸心益急公牒屢上而巡按藩臬諸公咸慰留不可公乃自上疏情迫詞懇若不能一日留者其視緋衣象簡曾不若角巾野服之便雙旌五馬曾不若扁舟短棹之適黃堂畫戟曾不若茅齋几研之幽以淨莆山水雖奇勝曾不得一逰亦孰若四明之湖光嵐翠為公所有可以朝夕至之為樂宜公之決有歸志也巡按胡公知公不可留乃援恬退例為乞轉官致仕上亦嘉公志下吏部議擢公福建參政俾得遂所請以去報至公欣然戒行李就道若公者其始終完名而無玷缺者歟泰之初九曰拔茅茹以其彚征公之出無以是乎遁之九五曰嘉遁貞吉公之處亦何負焉故謂公為出處皆是可也謂為今所奬豫而收有勵俗之譽亦可也何也勇于退者難乎其人也兩庠諸文學感公之德相率請豫文以贈豫亦辱公知者又忍以不文辭故敘公出處之正以壯公行且以復諸文學之請公琦名君玉字鄞望族也贈郡博蔡我齋致仕序方良永士君子禔身之大節有二明義理也決去就也然未易能也溺於利者忘義急於就者恆依依不忍去有如我齋其庶乎我齋少承庭訓長從陽明王先生逰有志節不為俗學丁卯舉於鄉試禮部不第意教官可就陽明先生止之曰子以教官為易為乎其俯卬於人一也自是歸卧不出者十年丁丑成進士仍初意疏乞得教授吾郡上官未浹旬日即欲辭去曰陽明先生不我欺也鄉縉紳懇留之乃與諸生約端趨向篤踐履毋傲以亢毋諂以卑毋脂韋突梯以媚世諧俗於是贄節餽遺皆不受養母之外泊如也於是祭必禋潔鄉飲必慎選擇弗襲其故也於是司教以憂去者有助諸生之貧者有助弗量其出入之豐約也甫六閲月士風翕然丕變而去志復作矣十月望日具冠服辭聖廟郡别諸生曰吾無緣師汝矣諸生咸咨嗟垂涕跽而請曰弟子之郡庠也逺者二十有餘年近者十年七八年又近者三四年乃今始得吾師何來之暮而去之亟耶我齋曰吾之去也猶吾之來也陶靖節彭澤八十日而吾倍之矣二三子何患乎無師諸生知其決不可留乃奔於鄉縉紳又羣留之不可乃召命畫史肖其像將祠之而乞言以頌其美豫聞有道者重內喪已於物謂之倒置之民我齋明於義利之辨決於去就之幾如此不謂有道之士邪豫知其去而歸其鄉也不徒放浪江湖自適其間雲野鶴之性而已將以鄉先生自處以所得於父師者陶鎔後進考德問業者不虛其來異日出而仕焉皆將自樹立以無為我齋愧則其去猶就也顧不偉哉而諸生戀戀不忍之意猶鬱鬱乎弗紓豫辭也拙無能遽解之明文海卷二百八十二
