body:
  text: 明文海卷二百八十四餘姚黄宗羲編序七十五贈序贈錢懐白驛宰序陳有年余讀春秋外傳單襄公過賔於陳以候不在疆為蔑官齊桓㑹葵丘陳王政亦曰無㤀賔旅未嘗不歎先王秩官之宻而立政之周也我國家疆宇海濵天下交逵都㑹軫旋檣集之所率為置驛驛有丞即古賔候意曩嵗余以使事道燕魯厯楚越見負弩者驅授館者飭簡書不壅旁午皆給以為盛世當如此然其流蠧宿弊亦且不可勝較何也夫往者之風固淳矣邑無三逰人無侈觀居則勤植出則裹糧傳舎之間無事而食者十不得一風㑹漸流詐偽萌起故有餙其都從舞其利巧以捷出不意然猶有還忌也傳舎之間無事而食者十不得三既而幟立景從百詐總至或稱權家或假兵檄或暨無賴者為市狐掩狼脅以與王官公馳若為固然也傳舎之間無事而食者盖十過半矣且世必有上下之辨而後可定民志故公不給私負不乗器韋藩過洛則故不渝寜獨為財用惜抑有深教也今交逵都㑹軫旋檣集之所使小人與君子伍決上下之防不之辨何以定民志示天下觀此余所為太息也驛冗丞微説者謂丞亟𨗳送視徒役畢矣然國制往来詐冐丞得訊察之饔廪應否得操約之載在令甲可按也夫分所不得為而欲為者曰侵分所得為而不為者曰曠惟時以冗微視丞丞亦以冗微不自立是以朝趨夕避坐使小人與君子伍若㒺聞知曠孰甚焉此余所為太息也吾邑錢子授荆之潘溪驛為丞将行以余有鄉戚之雅過辭而乞言余故得以曩所感嘆者具論如此客有聞而歎者曰君奚異於丞夫紆青結紫而曠焉者皆以官為傳舎者也君又奚異於丞余聞之又爽然失也此其言雖激要未為無見然余於錢子之乞言義不容舎所得為者而他吿云贈柱國大都督東湖陸公序董份明興設武進士之科試步騎射革而復命儒臣策之取其文辭以進及其為督率大臣則又尊寵以柱國保傅侍宴間備機宻而贊謨謀所以並用文武兼攬股肱而佐成治化也自承平既乆間者諸邊警而吿急将帥之人或言武科專步騎射革足也欲坐籌當大将之任秉麾授令策全而制百勝者非有文者不能欲秉忠義大節内持國家之重而外繫安危履廟堂之上不戰而坐勝者則非深於文武而有得於道者尤不能也使專以步騎射革則如斯人者何從見之以予所見今都督東湖陸公實其人也公嘗由武科進稍見擢用方上南廵以展大孝駕衛輝蹕公扈心動徬徨瞻星象依斗杓而趨繞庭而不輟夜過半行宫火作驟及寢殿公望見遽走負上衝火光出而是時親扈貴近之臣以行道困或寐或驚起或駕出而不知倉皇相亂而公躬捧赤日懸於九天盖舜烈風雷雨弗迷武王火流王舟而不動固大聖人之度遥想其百神擁臨恍惚閃爍其間若有使之者公以精忠適與神謀翊戴扶衛其功烈亦奇巳而貴近恥其不與忌其形已功遂不録然上亦由是知其才且忠而益用之俾掌錦衣衛事錦衣者領諸校詰隠伏而察非常其事甚秘受詔獄而親復於上其委甚專其專且秘有司不敢難而一切文法不得繩也故諸校有所緣而為奸民亦得賈校以售利公曰是不可不痛懲艾乃立取大豪多交通倚有勢根株堅而難治者一日收論發奸賍巨萬黜賈校立盡上下股慄審條法之不便者立更之衛中肅淸其所受詔獄壓如太山震如雷霆公皆以身當之得不靡碎摧折諸所苦心為地而用保全者不可勝數也其振飭綱紀勇於屏惡衛善類如此當是時勢家側目以視公而公持節淸白絶嫌遠㣲人無投隙抵釁之便竟以服公上益知公任事不避難委身無二慮愈益用公天下知不知皆以公之自持有素絲氷玉之操其事上有斷金匪石之節故内外推服上下嘉慕其誠信於人者素也去嵗北兵内犯京師戒嚴盖禍在肘腋而城中蹂藉慮且為心膂之患獨公坐而鎭之驕軍不敢攘臂而人無動搖遂贊幃幄以資平定之業非公威名夙著忠義有本者何克堪此故小人之徼幸有事而乗非心者賴公沮厭其邪雖不待露聲色而知其難奪也君子之感歎王室而懐隠憂者賴公壯厲其志雖不待臨事變而知其有恃也公其卓然許國而為社稷之衛者與盖天下稱公者必以為武科得人之選而其言武科者必以為公之法嗟乎盛己然予竊以公所樹立如此士宜不敢復望下風而公數造請賢公卿大夫間多所引賔客悛悛若有以自下者專就問天下大計經傳奥指析其疑義方簿書交委應酬不遑而考德論道心常晏如及客退掃堂廡間下簾據几左右圗史好為深湛之思必究極其精㣲而上當其有得陶然也夫内為沉思而外多下士遡其學術之所發明其淵源逺矣人知公功名之盛而不知其所得實由於學也然則予所謂忠義大節内持國家之重而外繫安危深於文武而有得於道者非公也歟昔絳侯入北軍一呼而安劉綰天子璽而授之帝可謂忠勲之冠而史譏其少文衛将軍立朝淮南蓄謀至懼而不敢發可謂為國倚重而人責其無所知士盖少文而不好士古之将帥之失也多矣惟不學也公其度越古人者哉且以二子所就卓卓如是而猶不可以無學為人所譏責孰謂武科得人可不拘以文學非謬論者歟今年十月為公誕辰西河霍君専閫於浙數来乞予言為夀懇甚予惟古人年至而後為夀今公强仕且壮而予聞古之相見其起而贈言以祝者亦皆曰為夀不獨以年也予與公厚善服公德而知深欲一發其藴寫其行事以贈公者乆矣而不得其便適當西河之懇西河與公舉武進士為同榜予因序公之賢使天下知武科得人之盛實自公始用以為祝贈王按察伯和序俞允文夫古之取士必欲盡天下之才而設科不局於一塗天子仍有徴召之命而諸幕州郡又得自辟或從事能髙則貢之天子使之受署其於網羅可謂至宻然其時懐才負志之士猶有齟齬不遇之嘆方今國家之所專任而最重者唯止甲科而徴召絶不復行其所遺佚難以比數徃徃至於齒危髪秃偃蹇摧折蓬茨堀堁之下罕寄一命以攄其所長故士有一隙可以蘄通将無弗為者此豈士之過哉王君伯和秉沉敏之姿持端雅之度研幾典籍含咀道腴卓為英詞以希世榮者有日而與之齟齬改𨽻太學争雄六館之士而卒亦未有合焉㑹屬者詔下太學生有能以貲贍國即無論年資輒為破格受職咸以為士之不遇於此而遇誠不世之典也伯和乃屈已應詔得按察知事其姻梁太學汝掄将往賀焉而問詞於予予曰漢之文學莫若司馬相如其始不遇也亦以貲為郎孝友莫若卜式亦以餉邊得至相夫士之乆困而乍逄其時不當復泥於一途有若伯和之賢宜以科發而此典特為非常雖非其志殆所謂不遇而遇矣王大理元美自稱其族之盛登甲科紓組綬者十有一人而伯和之嚴考光州公固其一也伯和襲其家聲之大且年志甚壯挾其才以施於政必能亟起名蹟紹其休聲自出繩墨之外端在於此伯掄執子詞以徃其誰曰不然己而曰然遂為序而書之贈汪生序萬廷言葢聞君子之學在空其心心不空未有與道相當者也予慨夫世之君子弗思焉而繆言道也紹興汪生問學而能詩不逺數千里以詩謁予羅原因求一言以别生譚詩者也昔者子夏因論詩而知學今姑以詩論昔晦菴先生早年閉門學陶旬鍜月錬句擬聲求宜其似矣然猶未盡彷彿何也先生顧瞻理道之心勝而立言之志太早也東坡先生晩年海外學陶洗刷鉛華歛抑豪邁亦幾似矣然置之陶集猶非一手何也先生和擬之心未㤀而刻意沖澹之志横於中也二先生學問筆力精詣妙思豈在靖節之下而詩竟未能過之靖節初未嘗有顧瞻理道刻意冲淡之心二先生多此一念故也彼空而此不空也空則靈竅虚瑩機出自然不空則意見横窒靈機思多强合詩之品殊乎此矣是詩固不可以不空矣子曰回也其庶乎屢空明道先生釋之曰空中受道則道之貴空豈啻詩而已哉有志者可以深長思也雖然吾見其難矣彼詩一技耳視道之大小難易何如也二先生又千古英賢德意風節與太山長河争雄並盛視世之蠅蝸蠛蠓曾不足介其一瞬徒以顧瞻理道刻意冲淡一善念之横未能卒克遂使咏歌之間少虧天籟視陶差讓焉矧道本至㣲而世之君子又當紛華靡蕩之際積習薫蒸之乆浹肌膚而淪骨髓靈竅所窒與一善念之横盖不可同世語矣自非濯以長江盪以淸風銷頑去穢日汰月鎔盡萬死一生之力其能令胷次瑩潔光明超躋解脱空其中以受道乎吾未之聞矣二先生不能空一善念以能其所易吾儕乃欲以鹵莽之功去薫蒸淪浃之積穢而受其所難亦多見其不知量哉故惟囬而後庶幾謂其能不遷不貳故也不亦難乎然猶有難者傳曰心無天逰六鑿相攘是道即空也未有不悟空而能空其心者空将安悟哉自一身摩頂放踵皆形質也自兩間際天蟠地皆物象也自一萬嵗至一息往古来今念念遷流皆實事也君子歛心俯仰静觀其間空當於何處求之予不能詩而嘗苦心於學白沙先生有言三十年来學煉空凡身猶在有無中每誦斯言拊心歎息生其思以起予乎生之鄉先進龍溪王先生悟空者也幸出此致予請焉庻其終顔氏之學贈薛生南歸敘郭萬程郭子曰余常讀史見司馬子長之文渾浩雄傑若萬宇之周羅百物無漏缺然迺驚怪之既而讀其所自敘云少生龍門二十而南逰江淮上㑹稽探禹穴闚九疑浮於沅湘北涉汶泗齊魯故都孔子之遺風咸周覽焉始釋然歎曰文在茲乎夫五土殊異風氣偏宜即工技之徒組纂剖劂雖精緻不殊其物色神采南北之貨頓不可齊矣秦粤之人生而同聲長而成俗累數譯而不能相通者其居然也况種藝習文之士非有上聖大賢之資其聲律風雅能不為居方積習所拘滯者哉吾友薛生舜選從其尊人司諫先生㳺京師就余治經業三閱載矣其謹禮嗜道擇地而履雖其素然至於習學文藝視前𢎞益曰愈不同予乃進而告之曰生知通方之學多朋之益乎凡生仝業者數十輩交備天下矣山東田生考祥王生師舜邢生子儀皆吾夫子之鄉人也傳稱齊魯之俗淳雅敦禮故其發之文依稀乎太和之音陕西吕生時見豐鎬之故墟文武之遺化也觀其文之氣槩剛方若逹官大老然人不敢犯之足以興矣湖廣劉生子鑒子宣其節度慷慨聲文飄灑屈平杜甫之餘風也安慶之郭生德卿九江之蔡生思善居吳楚之交其俗勤惕淬厲其文隠約平澹陶氏之化也至於京師之曾生良錫殷生仁甫吾閩建浦之張生君美雖南北之風習不可槩言然文物之畿㑹先儒之闕里其品格風致自不可以偏方之士視矣予與生皆閩落之壤濵海之習也得多方多士而聚㑹之漸漬化𨗳合備中和之氣猶長日加益但不自知耳嘻吁幸哉生可㤀所自哉薛生再拜而作曰方舉之涉江而北也惟見風景士習判不相為雖日説以眇論有不能速化者比其乆也洋洋乎渢渢乎備厯廣觀大方體羙得之心終莫逆之者迺知天下一致而百慮同歸而殊途直所從習之異其初耳其敢忘數君子之功耶且将别數君子而去我土得無失所處乎郭子曰夫殊途同歸百慮一致易道也孔門之訓也生能言此奚但習文藝耶生可以歸矣明文海巻二百八十四
