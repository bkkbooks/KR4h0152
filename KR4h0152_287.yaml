body:
  text: 明文海卷二百八十七餘姚黃宗羲編序七十八送序送王修德序郭濬樂於樂之日不知樂之為樂而悲於悲之日亦不知悲之為悲惟既悲而樂既樂而悲然後知悲樂之真也吾於朋友離合之際得之矣曩而鄉里以氣義相傾許者僅十數人兄事者四人葉居升許自修葉士期黃逺迪也弟畜者五人盧希魯李季行張懷佐趙東彛也肩視者則王君進德張君原望楊君文遇楊君汝器及吾修德為五人也方十數人晤敘之頃剖析聖賢義理精微之藴古今成敗得失禍福之原人物賢否出處是非邪正之辨以至於鬼神之幽禮樂之著莫不更相切磋以求至當暇則觴酒賦詩於清風朗月之下談笑逹旦浩歌發金石激烈動雲漢直以天地為蘧廬萬物為芻狗古人為不足為功名為不難致其為樂也蓋亦云至矣一旦星離而散南北存亡或遲棲於窮間寂寞之濵或沒溺於車塵馬足之下使膠漆之盟飈逝電滅則其悲也亦豈淺哉然久合者以樂為常久離者以悲為素故皆不知悲之為悲樂之為樂也今豫羇孤旅邸而與修德有適然之會倒囊沽酒刻燭夜分氣酣耳熱嗚嗚而歌襟抱肺肝無少凝滯豫之歡暢鼓舞方自謂龍門躍化之思未足以喻其適而離悲又復繼之執手長路相顧泣數行下人情至此謂非悲樂之真可乎修德歸諸友必相勞苦願以豫言訊之其嘗與豫相歡於既悲之餘相離於既樂之後者必以豫言為然矣送卓景髙序王叔英吾友卓景髙以行業修著有譽於人久矣今年夏嘉興之海鹽縣學以浙江參議公之命遣二生走數百里致幣於景髙之廬請訓經於其學弟子戒行有日矣豫與景髙交最深乃贈之以言曰韓子有云弟子未必不如師師不必賢於弟子世俗淺儒不知是道茍居師位輒不自下務以博聞多識篤服其徒然而聞未必博也識未必多也故於傳授答問之間往往蔽其所短而見其所長隱其不知而罔為己知內以欺於心外以欺於人其為害也甚矣余昔與吾友同學於仙居張先生又同侍黃巖陳先生二先生皆吾鄉名師宿儒張先生者強記多聞諸經兼治然其為文常以示其徒習文者使言是非言之而是未嘗不從是不蔽其所短也陳先生者雖聞記有限然專精於尚書弟子請問有所不知未嘗強詞以對不曰忘之則曰我未之稽是不隱其不知也故當時門人輕劣無知者或議其短而敦厚有識者咸服其賢余數年來亦僭為師嘗念二先生所為故未嘗敢有欺於其徒嗟乎彼欺其徒者夫豈其所好哉蓋亦有所恥而然也殊不知天下古今之事變無窮雖賢聖不能盡知况學者乎傳曰知之則曰知之不知則曰不知是知之之道也亦何恥哉孔子以大聖之才為七十子之師且以助我望於顔子以能起豫稱於子夏由是言之為師者豈盡賢於弟子乎景髙以敦實厚重之資通潔盡精微之學其教人之術固恢恢乎有餘者又豈待於余言哉送陳克彬歸臨江序王叔英余自兒童時則聞江西多博學髙才之士衣冠文物之盛甲於天下然其民性率多輕悍忌黠為俗喜爭而善訟故最為難治而南昌贛吉為甚而臨江為尤甚觀其諺語之傳於四方者可知矣是以天下之仕者莫不憚官於其地而其人之官於四方者亦莫不見憚於人至於旅寓於江湖道途之間者或遇其人亦莫不憚之而不敢驟與之交然余自弱冠以來往往見其人之來官於吾邦者或以亷稱或以能顯或以謹厚見推其愚劣不稱任者固鮮而其以非道御物者豫不多見余固知江西之多才而疑人言不可以盡信矣今年余來金華之永康永康之令劉公某南昌人也丞謝公某吉安人也二公皆以亷謹得民余至永康二公皆先以事去雖不及識其為人而聞諸邑人之言可以知其為君子固亦猶見之矣邑之稅使陳志善者臨江人也數過余邑庠其人溫謹樂易與物無競而其子克彬適自臨江來省為人亦如其父而其才氣又自有出人者余於是益知江西之多才而益疑人言之不可以盡信矣豈其風俗與化移易而其人今非昔比也邪將余之所見皆適值其出於衣冠文物之胄者故有以拔乎其流俗邪是固未可知也使其人皆如余所見固云美矣使其俗果如豫所聞則居其鄉而為其民之秀者豈不宜思所以變之之道乎余聞古之以匹夫而化鄉人者信有之矣顧其身之所立何如爾今克彬之歸也其尚益修其身以余前所聞之俗為鄉人戒以去其惡以余後所見之人為鄉人勸以進於善自一鄉而及於一邑自一邑而及於一郡以及於一方使天下之仕者樂官於其地而其人之官於四方者亦見樂於人而旅寓於江湖道途者亦莫不樂其人而願與之交如是則天下之人言江西者不特稱其學士大夫之賢矣豈不盛歟不然而或終使天下之人憚之如余所聞者固非四方君子之所願聞又豈不為彼方君子之所恥哉雖然豫浙東人也浙之民俗視江西伯仲之間耳又安知天下不視之猶江西之人乎余之言蓋非徒以勉克彬也亦因以自勉焉送章輝逺之永州序王叔英昔蘇子由稱太史公行天下周覽四海名山大川與燕趙間豪傑交遊故其文踈宕頗有竒氣人或病之以為世之行天下者其足迹之所及固有多於太史公者矣其身之所接亦有賢於燕趙豪傑者矣然而鮮有能變其氣質而發為文章者遂以子由之言為浮誇之説豫嘗驗之尋常出入於鄉里之間遇汙渠穢壤與夫凶人俗子則胸中為之愠悶湮鬱而不舒時登髙丘臨清壑及見可與言論之人則心目為之開朗意氣為之激揚然後信子由之言為不妄而知彼遊天下而無增益者特世之庸人耳故嘗竊自嘆以為使得周流四方以覽觀天下之形勝而博交天下之豪傑其有以發舒吾之心目意氣者必有以大異於今日然以身有所寓而願莫之遂故循循至今年及強仕而尚未有以多過於庸衆人是以每遇朋友之有逺行者必為心馳神往且望其行必有得庶幾返而會合之際有以相發亦得以償其所願之一二焉今吾友生章輝逺將自臨海走六千里往永州省侍其舅氏通守陳公人多義輝逺之能為是行在他人不知篤於親戚之義者固可以為難若輝逺之務學知道者特常事耳故余於輝逺是行不以為難而獨深有望於其因是行以覽江山之竒勝交賢能之人物而取益於已并望其他日還歸而有益於余蓋輝逺今是行道途之所經由括蒼而有金華循三衢經廣信以下鄱陽轉豫章而泝清江厯宜春浮三德登衡陽以造於零陵其間名山大川竒才偉人冝未可以一二數其有開暢心目激昻志氣必有異於尋常萬萬者有不美質者亦將於是行變而為美况如吾輝逺之有美質者其變化宜何如兹行也吾知其所得必將有大過於人至於發為文章者乃餘事耳古人謂士别三日便須刮目相待余他日於輝逺歸必當大為之刮目焉輝逺其尚思有以副吾望而果有以發吾羇滯之懷可也送周判官詩文序周是修聖天子即位改元之初政令一新厲精文治凡天下側陋遺逸懷竒抱珍之士莫不搜羅登進列於庶位厥明年復勑儒臣取古今君道臣道人事之載於典籍者櫽括類聚分嘉言善行懲戒以為各類之綱上自唐虞下逮元季采輯纂次用便觀覽因以成一代之制作亦將以為永世之龜鑑舉中外士流博見洽聞者會於翰林開館武殿之南廊以從事而草創之於時俊髦若天台陳好義徐好古葉仲汜延平鄭孟宣姑熟章謹建寧蘇伯厚李鐸吳中王汝玉張拱髙可大溧水王真邵武劉仲美大興李敏金華方叔衡朱子建寧波史維時金陵陸伯瞻浦江趙友同臨江周思吉郡顔子明蕭用道楊士竒暨豫二十三人皆與是選於是天子喜其得人之盛命文學博士天台方孝孺總裁之命侍讀紹興唐愚士金華婁璉修撰吉郡胡靖三人者副之命修撰吉郡王艮編修荆州楊溥二人董督而討論之實建文庚辰十月十二日也詰旦錫宴館中既而大官給酒膳中使供筆札事非輕也居無何愚士艮鐸敏相繼物故友同以丁外艱去伯瞻以朝使去子明以辭老去好義仲汜子建可真士竒叔衡維時升擢國子王府翰林官可大領扶溝令思領判湖廣安陸州未幾叔衡仲美又以疾卒於官思字存誠性古淡夷曠樂放林野且年逾耳順上疏力以衰絶不任事辭得旨賜本官致仕朝之名士咸稱異嘖嘖曰賢哉存誠趨舍之有道而進退之合宜也於其南還輒相與詠歌以孜孜德業於家庭十載間一旦而際文明之運遇有為之君當可出之時勃然如風雲之從龍虎水火之就燥濕比之漢之東觀唐之𢎞文殆不是過余也與諸君子何其幸歟不二年餘而存者沒者動者止者去者就者有若是之不齊吁良可感也雖然沒者已矣而存者誠不可以不敬其身也動者升矣而止者亦不可以不安其命也去者得矣而就者尤不可以不勉其職也聖天子在上量同天廣其所以能從懸車之請而重賜賚之榮者一皆本之因心之仁無待勉強自然泛應而不覺其有契於古先哲王之令範如是也更後十年賢材並興德化周被四方底平余知聖天子之從請而重榮者又未必不如今日待存誠之廓然也余與諸君子又何其幸歟因詩文敘而槩述其巔末以為存誠贈亦以為當時斯文慶北京重遊序解縉北京地形天下之雄傑險要士君子壯遊竒偉絶特之觀而名能文章抱負慷慨者常終其身而不能一至焉且以孔孟汲汲於濟世幽薊之國欲行仁政豈不能賢於滕費中牟絶長補短戛乎其難者哉不幸當大一統之時已無孔孟之迹降及晉宋好竒之士若謝安王逸少之流宋南渡諸儒務為格物致知之學者僻處一隅皆無因而至焉及元氏入主中夏佐以姚劉耶律諸君子雖因其邇於隂山以定都而地形之強實天下之雄傑險要撫據全盛幾將百年一時文章亦頗有竒氣未必非山川形勝風氣之觀感或有以助之也至於元季四方鼎沸而國都固猶晏然自若也蓋其東連滄海西接晉冀南有瀰瀦太陸之利北有重關天險之固茍非天命有歸其主自遜於荒而以勢利相持雖引百萬之兵頓之堅城之下嵗月之間成敗利鈍未知其勢孰為得失也天朝太平三十餘年士君子壯遊於北京者多矣若吾友龍虎張氏崇顯蓋嘗往來而不一者也而豫乃不能一遂其遊觀之樂每側聞天語退而稽諸簡册所載信古人之不我欺當孔孟之時地之不幸而不得遇賢聖之人當晉宋之時人之不幸而不得混一之世及元之世時之不幸有賢智之士在形勝之地而不獲明聖之主雖有文章其所稱道黼黻豈可與六經並傳哉故曰其皆不幸也吾友張崇顯今又將往焉其為我訪灤河居庸與其豪傑俊人而謝之吾君無為而致垂拱吾民無事而樂雍熙一遊一豫將無不宜吾將酌直沽之水磨碣石之顛作為文章詠歌盛世自慶其竒遇固千載一時也某行旅多暇先為詩歌以俟送劉君孝章序解縉學必有師傳朋友講習而後有所成不然雖至白首猶為僻學也豈惟成德文藝亦然余少時先君子教以書輒舉所聞於太朴危先生伯琦周先生而泝其源於趙吳興以上未嘗自為臆説也及教以為文輒舉黃文獻公歐陽文公之説而泝其源於曾王歐蘇栁韓班馬董賈先秦以上極於六經之奧未嘗自為臆説也及進而語諸道德輒舉所聞於大父竹梧翁而泝其源於劉靜修楊伯子以逹於關閩濓洛又未嘗為之臆説也是以一得之愚間有所見者實先君子師友之傳講習之餘所及也繼而登朝以所為文求正於平仲蘇先生先生與先君子受業於黃歐為同門於是傾竭所藴為豫言余始益有所見焉詹君孟舉在元常及子山巙公之門又常聽教於危周二公於先君子又同門而豫與詹君同官為中書舍人忘心咨問又盡得其説與先君子之言無二不舍晝夜思維至於今僅若有一髮之見至於道德則自先君子既沒世無復有講論及此者是以碌碌將為庸人之歸方慨然而自嘆也廬陵劉君孝章家世忠厚父兄宗族各以道相朂及授徒環川常與豫友胡君光大遊豫亦聞之甚熟也去年光大延致來教其子豫亦遣子從之遊孝章甚勤於學嗜為文與書而其此來也其尊君惇信先生欲其講於京師亦若先君子之望於豫也惜乎為文為書吾黨有大愧於危詹諸君子而道德之懿則又茫如捕風雖談論且不能得其髣佛矣何以副吾孝章之意而承其尊公之志於是孝章將歸懼無以復其尊公也姑序豫之所就者以相解歸而求之家庭涵濡簡編之講論將必有大過人者倚需童晤孝章又必有以副吾之所望廬陵螺江二程之從周子實始於此則廬陵固濓洛之淵源也俯山川之餘輝寧不有超然而獨晤者歟孝章毋若豫之徒自嘆也送蕭善本序楊士竒自余來京師十有五年於文溪武山之域父兄之鄉吾少壯出入嬉遊之處未嘗不在余懷也而遭逢聖明叨職近侍恩眷隆厚然材薄識陋不能效纖芥報稱日懷愧惕之不暇顧敢言其私哉而比年鄉人親交有至京師而過余者昔之壯者皆已蒼顔而華顛矣昔之童丱者皆已翹然楚楚矣而敬問吾父之執焉蓋淪謝既盡不能不慨焉怊悵也前三十年余所往還講學今存者不三四人幸皆仕京師時得聚處討論相益以寬鄉邑之思善本亦當時所與還往者近嵗始來為太學生無幾輒以使命出再嵗而還還數日又以展省歸未嘗一得從容盡意也臨别能無情乎雖然子歸而過縣門之南徘徊龍州嘆嘉應之不爽而觀於其人復有繼今而起者乎又過髙漚而試聽焉將有鏗然噌吰而出者哉又南望三顧之山而物色焉復有繼蕭清節髙風逺躅者乎有之而賢者將出其門乎其必有以慰余之思送徐僉憲致仕序楊士竒仁宗皇帝臨御制詔吏部居官年七十聽致仕去有疾而年未及亦聽去申著令典蓋於今四年仕者老病不任咸得所欲而士君子進退從容無所羇係有以見太平盛致矣四方出仕者之衆莫盛江西江西為縣六十有九莫盛吉水今致其事去者始見於徐君崇威崇威雖病其年未七十蓋自洪武中起家為巡徼為征商永樂初入掌外制又出司讞陜西廣西二大藩知宿州僉山西憲事其為人持已愛民而平心易氣歷仕三十年未嘗有一日顛蹶之憂然弊弊焉所以汩乎中應乎外者亦劬且倦矣今之決去固人情也崇威吉水故家吾亡友胡君光大女兄之夫也其在京師恆主胡氏故於余還往甚厚光大嘗約余他日幸遂乞身相與具扁舟載壺觴書册泝沿贛江蕭峽之間潄芙蓉之丹泉酣澄江之明月歌咏聖澤逍遙以終餘年足矣時崇威聞之亦津津出喜色光大竟卒於官己十年余猶縻寵祿不能去也兩人夙昔所歆慕者今屬之崇威獨未知崇威入故鄉臨清蔭茂萬慮不興翛然自適之際北望京華數千里外尚有停雲之思者乎故於别也歌白駒之四章以為贈送熊自誠序梁潛北京據幽薊之會偉大壯麗之觀古所謂形勝之都也士生於南服者常以不得往遊其中為恨大理評事熊仲彛以扈從居於是其尊府自誠君來視之君時年七十餘矣鬚髮皓然而能輕萬里之逺自其家吉水汛大江涉淮道徐踰吕梁之險以至於此既至不以其冒涉險逺者為難且以其逺遊快覽為足喜其志可謂壯矣哉豫於君同郡而子之去家者三年矣故聞君之來而喜君為人藹然溫厚既老嗜欲不足動其中而獨喜奕雖風雪苦寒之夕猶不廢豫不善奕心竊好之每與君奕輒敗北亦未嘗厭也時侍講鄒君仲熙曾君子棨亦喜奕鄒君少劣於豫獨子棨精出過人纍與豫奕輒纍勝自君之來子棨數與君對君稍難之而其勝與負常均君又常佐豫以一勝子棨因大笑以為樂夫古人適情於物於夫六藝之外又有所為投壺之戲而傳之於禮文以為平居間暇之雅戲也奕之為戲亦平居所以役其心智者也孔子曰不有博奕者乎然或者其心之不專審之不固則皆不能精如豫之與鄒君者是也雖然豫之與熊君好也豈直以此而己哉顧惟逺去其鄉而忽然得以歡娛而嬉戲以遂忘其旅寓之思如在乎里閭鄉黨之近其為樂可勝道耶夫樂之既深則於其去有别離不忍之態亦人之常情也於是子棨相率賦詩送之豫因道其平居相與之樂以為序若夫君之享有祿養於既耄之年以得周覽夫兩都之勝其所得亦豈在此而已乎送楊𢎞璧序梁潛楊君𢎞璧家故西昌巨族也當其盛時一門父兄席纍世之豪臺池花木金珠犀璧之富與封君徹侯相埒及遭亂離家事日非君亦﨑嶇江淮之間而遂家焉蓋其時君年四十六壯志鋭氣輕離别而易之及其老也思見其親戚墳墓日夜南向而悲蓋己五十年於外矣而後歸則蒼顔白髮頺然衰老見者駭愕不知為楊君也過其閭問道而後入道其姓名老者驚而少者疑焉問其祖之昆弟無知之者其父之昆弟無幾人焉已之昆季間有存者焉非老則病杖而後來而窮奴老傖之尚在者皆當年雄力自視無前者君猶僅識其狀貌也故居遺址荒煙蔓草塜墓纍然而牛羊鳥獸之迹交乎其間者皆當時賓客歌舞而歡樂之所也君於是愴然悲之念往事如在夢中惜其去之久而還之不早也既而君之從子益智拜君而勞苦之置酒會故人賓客留君毋去此故土然君占籍鳯陽已久為留數月乃去歸時攜其中子某與偕行因謂之曰吾老矣先人墳墓在此者汝謹識之無忘於乎君生於富貴未壯而困於羇旅老猶不忘其鄉非其心拳拳篤厚能如是哉夫人事變故不常而人之一身榮辱升沈跬步有不能保者而况數千里之外數十年之久能守其身而不墜其先又豈非其心篤厚之報哉君少從豫先大父心易先生受業與先君有筆硯之好故衆為詩餞君之去而豫為之序所以備道夫人事變故之際者有以見君之不忝其先為難能也送周如陵序梁潛子往年教於蜀之滄溪泝夷陵而入三峽仰視羣山如萬仞壁立岷江東下束於兩崕其勢若不得放抑遏之極驚跳怒躍逆而為回湍激而為飛瀑觸而為奔瀾其尤險者則為虎頭鹿角盤渦百尺旋轉若車輪轟然萬壑皆應觀者莫不目眩不禁也過夔萬而上三巴稍稍見平波緩流然巴郡據三江之險因石為城懸溜飛㵼雲霧中益可愛也自是西走千三百餘里始入成都平曠坦夷疏江為渠散注平疇幾千里其西有雪山縞皓明潔與辰暾爛然相照蓋天地間之竒觀獨偏方遐國擅而有之使遨遊隱逸之士得時時臨望以蕩滌其志意何其快也又其地有諸葛武侯之遺教關張之忠節徑氣至今不衰又蘇氏父子文詞壯健數百年來無有過之者故蜀之勝又不獨山川然也豫去之十年至今念之不己今年夏忽廬陵周君如陵歸自成都訪豫京師之旅邸極道往時之遊且樂豫不覺解心適神焉今如陵又將西遊惜不能與之俱翺翔其間也雖然人之情因事而感固不繫山川之遭杜少陵窮愁悲慨終身不釋豈蜀之山川獨有以戚其中耶彼所遭之時為然也然則吾與如陵壯年遊樂何可不知所自哉凡與如陵交者皆為詩以餞之而中書舍人吳君平仲為書西川壯遊四大字於卷首以豫故嘗遊於蜀也屬為序之明文海卷二百八十七
