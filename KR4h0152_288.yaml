body:
  text: 明文海巻二百八十八餘姚黄宗羲編序七十九送序送司訓徐君序呉溥都城之西都城隍廟在焉每月朔既朢則商賈畢集大者車載小者擔負又其小者挾持而徃海内外所産物咸集焉至則畫地為限界張肆以售持金帛相貿易者縱横旁午於其中至不能行相排擠而入非但摩肩接踵而已遐方窮邑之人偶一觀之則驚嘆彌日向人嘖嘖誇詫不已至其夢寐亦然蓋平生之所未見意人皆己若雖欲不誇其心固不能自己也而凡人之至是者孰不欲一徃哉今年吾友徐東之以貢至其隙也適其期也亦吿予以徃日且晡未歸既而歸則暮矣予怪其乆也而叩之乃蹙額而言曰予之至也其羣集者己先據其衝閉其途矣而後之候其隙而入者猶若貫魚然而予也不能從立於門而望之見肆之所列焉而猶恐其未也坐於道隅橐焉而充篚焉而盈䭾焉而上隆若川流之過乎前也予得盡觀焉而猶恐其未也乆而其過者益衆其羣乃解予於是乃即而觀焉而駔猶謷謷且召且鬻也予見夫文士之圖籍槧鉛武士之弓矢農之錢鏄鉏釤工之斧鑿力欽貴富者之明珠大貝貧夫之弊衣敗屨兒童之弄具婦女之粉黛脂澤以至道釋家之魚螺鐃鼓徘優家之筝琶簫管物物具焉而於古之所謂簠簋瑚璉彛鼎樽罍敦弁巵匜之屬獨一無所見何哉是豈售之各有其地邪予曰古之器不鬻於今猶今之器不鬻於古也豈惟所售之人將怪而駭之且毁之矣雖然不售於今無害其為古也世有好古君子則什襲而藏之矣人将求見而不可得而况於求售乎東之黙識予言唯唯典視今不甚殊而宴饗饋餼之禮尤數未聞有匱乏者今天下之廣倍於成周其物之蕃從可知矣物不加少而貢具不加多然猶恒以匱乏為憂無乃㑹之不以其道乎是固官司之所宜憂也吾季丈沈公拜官三月亟以疾去其亦有隠歟雖然公一署丞也丞之上有正也而一寺之長則有卿焉有為之佐者焉又有為之丞者焉其憂當有大於公者彼不以為憂而公乃以為憂乎雖然食人之食者憂人之事公之所憂固非分外事也夫知所以憂之則必圖所以㑹之矣為一署之丞者能圖所以㑹之其他為丞者又圖所以㑹之其大於丞者又圖所以㑹之尚何匱之之足憂而成周之不可並乎公之歸吾於是乎有感送光祿寺丞沈公赴南京序岳正丹陽沈公與純先戸部尚書伯威公之世孫也景泰間拜陜西省幕左副都御史吾郡芮公時為方伯器公之才實用䟽薦既登朝籍典大光禄之簿比一考遽進寺丞尚書公之告終也以承重去位乃今服闋以來仍用故職莅事於南京從時格也戒行有日祖而送者皆同官同朝卿大夫士之賢者邀予以辭且曰南京根本所在大光禄地近職親固曰重矣公所惜者捨劇就閒用違其利焉耳嗟夫士之修也其志類同其出以用世也功名之際乃有升沈大小成敗之殊者豈無其故乎哉長沙之傅江都之相此兩生者設以蕭曹勃噲倫而擬之豈但推而不居也邪彼将頳頸裂眥且恥且怒艴然而拒之矣夷考厥就所謂縢金鐫玉開國傳祚之業曾不及刀筆屠販者之什一焉豈非格於時乎雖然時之為義盖亦博矣推遷不常之謂時景運逓禪之謂時偶㑹適遇之謂時乃若今日之時格者暫立條例以公進退不過權一時之制詎可乆恃以待天下之士哉古今用賢自有常典顧主之者未暇思耳就如公等所陳公既以時格而去安知他日不以時格而升乎或者徒見董賈所就遂為時病非識時者也送陳緝熈使朝鮮詩序岳正昔唐殷侑使囘鶻韓子稱其適萬里外國畧無惘惘離别可憐之色豈不真知輕重大丈夫哉考之於史吐蕃作厲與唐終始囘鶻有國實界厥塲既曰於唐最親曾不能結隣服貳以輸畏天之悃顧彼無人或昧所從所貴乎行人者宣倡大義以開道之俾之陳力就列云耳故曰大夫出境茍利社稷專之可也侑之知既不及此而退之贈言又無以諷之者徒以區區辭色遂漫焉以大丈夫許之大丈夫之所為也固如是而止乎哉孔子曰不可與言而與之言失言退之固不失言矣然而謂之非溢美吾弗信之矣天順改元天子以復辟詔天下特於朝鮮寵以侍從於是翰林修譔陳君緝熈載命以行時凡餞者各伸以詩詩成宜序正乃作曰方今内外罔不臣妾瓦刺餘孽尚勤王師豈與唐之吐蕃者類歟若乃朝鮮為國外藩衣冠禮義非囘鶻比而勢據右臂犄角是宜投誠報効亦其時也如吾陳子士之通經知輕重盖無忝於大丈夫之稱者嗟夫出境專利必有所處正安敢茍有溢美而阿其所好哉送我齋歸山隂序林俊子逹來省問所友天下士以蔡我齋希淵對時我齋方以養母乞教授吾莆孤風逺韻隠隠來雲莊詳叩之曰是固陽明先生髙弟中有餘養而秪見夫外者之輕以壁立千仭上者将其至羣儒依歸焉家甚貧非其道義雖與之以晉魏之富不欲茍焉處也鄉書十年不欲取進士既取進士辭庶吉士兹固為母而出亦未知其果來來亦未知其果乆以處否也予喜為莆得師逹至崇安書語諸弟曰蔡先生來矣吾家子弟無問學籍未學籍時徃叅候我齋務去沿襲自立風格賢者篤其已至不賢者勉其未至道風翕然方成一學校乆其位何如耶我齋厓壁若不可攀即之而冲永平粹立孤而禮恒下守雖固而其量未嘗不洪興寄髙逺嘗思自放乎山風水月之間筲斗之禄其無足留也來訪雲莊神遊意徃如蟬脱埃壒輕鴻遡乎寥廓予笑曰髙則髙矣秪恐無福我齋數數思去予數數留一日太夫人亦思去我齋辭夫子廟退而語諸生别諸生哭留不可羣走鄉大夫語留予偕山齋造焉我齋嬉笑自如則已方巾野服飄飄然遺世神仙山齋曰是可留耶於是松厓至士夫繼至耆舊亦繼至來進知方之士連履而入或語留或求識面以去市居童孺販鬻松檟者流刺刺私相語亦惟其留之幸彼固誠知我齋哉嗚呼風之動人有似舉幡足信矣古今人其未相逺也有八十日之元亮有百五十日之我齋獨意夫依中庸者為難易進退無恒非離羣也吾人有斯世之責焉持禄固為可愧亦盍思果哉而未之難容有執其幾者抑東漢竒節歸數尺之羊裘殆有托始今日者矣序我齋去送鄉友林茂才訓導序丘濬吾友林茂才以上舍生應校官選與天下舉子羣試於奉天門翰林考其文在優等得贑州府學訓導戒行有日時郡人士在京者比常年為多相與醵錢具酒殽飲食之於東門佛舍酒酣有起而歌者曰湛盧之利兮以艾苕華鐃歌鼓吹兮協以枯楊皇荂千狐之腋兮當暑以代麻時命則然矣吁其奈何繼有歌者曰章貢交流兮屹以鬱孤有新朝貌兮髙渠渠峩峩其冠兮講唐虞詵詵髦士兮來趨其隅尊有酒兮饌有魚鄉人徃來兮通簡書安居而飽食兮徐徐于于彼擁盖以前訶兮方且奔趨歌竟杯行無等談笑讙謔以罄一日之樂竊相語曰方吾儕與茂才同游學校時年少而氣豪顧天下士無一當其意者於世所謂功名富貴視之若囊中物謂試探手即可得也其後累應秋試至則罷去最後為有司勸駕可以起矣猶且遲遲其行至五六年之乆豈意老之遽至邪今不得己俯就儒官翻然收歛檢束就䂓矩中始終若二人然豈閲世既乆而覺前事之為非耶抑嵗月斯邁而志氣銷輭邪明日舉以告予予曰不然子不見夫秋水時至耶方其百川暴漲衆流交灌兩涘渚涯之間不辨牛馬漫山平谷一望無際觸木而折衝岸而崩泛石而浮巨峽不能扼髙埠不能防一有排迫則怒號哮吼聲震逺邇及夫霜降水落之後奔放者注之海泛濫者歸故道疏而成川瀦而成湖渟而為淵平鋪漫流可以浣濯可以鑑面目可以供飲食其他潤澤之功沾溉之利無所不有夫今之水即昔之水也何前後相懸絶如此哉時則然也然此乃大川大陸所有之形勢彼夫沼沚汙池烏有是哉若是者可以喻吾茂才矣夫人至於歛華就實之時是惟不用用之而無不可惜其官拘地冷不足以盡其用耳雖然己不自用而授之人俾其代以用吾之用是亦吾之用也奚必自已出哉衆聞予言咸以為然遂次第其語以送茂才之行送楊太僕序石珤始予讀魯駉及衛定中之詩以為正心誠意之學可以貫通萬事及草木鳥獸而並育之故雖孳息之臧好而美大亦無有能外之者及觀毛仲之主厩也色殊羣别雲錦蔽野則又幡然疑之曰牧養之職貴得其法耳彼毛氏者亦何嘗有塞淵之德不邪之念而蕃庶至是哉比予周遊兩都得竊觀今天下之馬政則任法之説抑又有未足據者盖自我太祖髙皇帝投戈講藝以綏邦家未嘗一日而忘武備未嘗一日而忘馬也既有大司馬以總天下之兵騎於是有太僕寺太僕又有苑馬以至署有正圉有長畜馬之官不可謂不備矣百畆牧一馬再嵗徴一駒四戸有馬備用有馬其畜馬之民不可謂不衆矣牧有塲芻豆有家馬損有罰駒不中程有罰其畜馬之令不可謂不詳且嚴矣今兩畿之民曰吾病矣吾散財以給馬芻破産以資馬直亦無餘矣今再急吾且逋以逸吾子女西北之邊民曰吾將何以為生哉吾恃馬以為存亡然馬力數不足以當敵馬食有常給或弗能飽不幸而斃家貲無所傾吾且抵馬夫以國家設官如是之備著令如是之詳而公私之告急如此何哉問其故則曰馬政之不易行乆矣則曰馬之難畜甚矣徐而䆒之則法之所在弊必生焉民馬之弗用而商賈售豪右取甚至食禄之家坐而兼利焉孰非思慮之邪而秉心之偽哉以此見聖賢之言果不欺我而詩之所稱亘萬世而不可易者也豐城楊君方震自舉進士績學翰苑歴諫院未嘗一日不講求誠意正心之學其著書立言及為文章與論諫亦未嘗須臾不以六經之道為用乃今年自光祿擢陞太僕少卿其於馬政固無難於舉措矣抑吾猶有告焉今天下之士好髙騖逺一知講求聖賢之學率以吏治為俗務徃徃不屑為之甚至司錢榖寄民社職刑名皆一切不以為意方且謀唐虞論道德離臣言忠逺子言孝下視一世無足當意者豈知堯舜之治亦不過於博施濟衆為心孔孟之道亦不離乎日用修臣之常職即所以盡忠修子之常職即所以盡孝又何必蒐竒索隠趨周文而貌尼父然後謂之道德也耶噫嘻其亦自誣之甚矣楊君雅碩士其必不以民事為俗哉㑹光禄張君廷賔李君宗岳將設祖以餞聞予言而是之曰方震明德士也秉心致思之論其誠可以為太僕式矣予曰何止於太僕由而卿而相茍用是道鮮有不益於是事者楊君姑再試於太僕請後而徐觀之送李世卿還嘉魚序陳獻章𢎞治元年戊申夏四月湖廣嘉魚李承箕世卿自其鄉裹糧南望大庾嶺沿道歌吟入南海訪予白沙一見語合意先是五六年予㑹都憲公之子承恩於北京承恩世卿從弟也示予以世卿之文出入經史跌宕縱横筆端衮衮不竭來數千言沛然出之若不為勢利所拘者予時未識世卿而知世卿抱負有大於人既不忘於心亦時於詩焉發之或聞論當世士有文章必問曰如李世卿否然又意世卿少年凌邁髙逺則有之優游自足無外慕嗒乎若忘在身忘身在事忘事在家忘家在天下忘天下世卿未必能與我合孰知世卿有意於來耶自首夏至白沙至今凡七越月中間受長官聘修邑志於大雲山五十餘日餘皆在白沙朝夕與論名理凡天地間耳目所聞見古今上下載籍所存無所不語所未語者此心通塞徃來之機生生化化之妙非見聞所及將以待世卿深思而自得之非敢有愛於言也時時呼酒與世卿投壺共飲必期於醉醉則賦詩或世卿唱予和之或予唱而世卿和之積凡百餘篇其言皆本於性情之真非有意於世俗之賛毁至是世卿以太夫人在堂辭去欲留不可為古詩十三首别之諸友相繼有言世卿歸以所聞於予者質諸伯氏茂卿登大崖山吟弄赤壁之風月予所未言者終當自得之世卿之或出或處顯晦用舍則繫於所遇非予所能知也予老且病行將采藥於羅浮四百三十二峰以畢吾願世卿能復索我於飛雲之上否耶序以送之送張進士廷實還京序陳獻章鄉後進吾與之游者五羊張詡廷實始舉進士觀政吏部稽勲尋以疾請歸五羊五羊大省地廷實所居戸外如市漠然莫知也自始歸至今六年間嵗一至白沙吾與之語終日而忘疲城中人非造廷實家不得見廷實而疑其簡實不然也盖廷實之學以自然為宗以志已為大以無欲為至即心觀妙以揆聖人之用其觀於天地日月晦明山川流峙四時所以運行萬物所以化生無非在我之極而思握其樞機端其銜綏行乎日用事物之中以與之無窮然則廷實固有甚異於人也非簡於人以為異也若廷實清虚髙邁不茍同於世也又何憂其不能審於仕止進退語黙之槩乎道也兹當聖天子登寳位之明年思得天下之賢而用之而廷實之病適愈太守公命之仕廷實不得以未信辭於家廷於是卜日告行於白沙留二十餘日去嵗之冬李世卿别予還嘉魚贈以古詩十三首其卒章曰上上崑崙峰諸山髙幾重望望滄溟波百川大幾何卑髙入揣料小大窮多少不如兩置之直於了處了世卿豪於文者也予猶望其深於道以為之本廷實至京師見世卿重為我告之廷實所以自期廷實其自信自養以逹諸用他人莫能與也送戴元之序李承芳戴元之名乾浙江臨海人少年以英敏學識登庚戌進士兹受江西冝春令予與元之同榜而年稍長於元之同榜於元之先為知深夫同榜也有兄弟之誼以長也有師友之誼知深也無彼此之間予以甲在元之之前授官大理評事元之則為令也此乃時例也天官卿從時例也夫以同榜也以長也以知深也以評事則無所行以令則有所行者也韓子曰知之而不以告人者不仁也元之之任予可無一言邪夫宜春古袁州也李太伯袁州學記當時及後世多稱之太伯謂秦之速失天下也以廢詩書漢之乆有天下也以宗學術太伯之言僅是也夫詩書者吾道之跡而已必得知道者以為之師帥於是而授人以詩書則詩書於人庶乎其有益也使徒事詩書亦末焉耳夫太伯非知道者故語人以粗跡當時知袁州者祖無擇也無擇何如人耶則袁之學終寥寥焉未見其有一人也嗚呼古之時此學校也後世亦此學校也古之學者為己今之學者為人古之學者為君子今之學者為小人是豈學校之罪哉盖師帥者未得其人也予觀近代以來害天下之人心者莫甚於學宫害天下之士習者莫甚於科舉之文率天下士類為惡而無所紀極者莫甚於學官此有識者之所以痛哭而長嘆息也以予處之必將天下學宫學官一切而廢去之惟天下之守令擇天下有道德之人以為之守令則於郡邑之内求老師宿儒尊禮而為之師一鄉之善士則師其一鄉一國之善士則師其一國凡士子之所習者一遵成周之制所謂六德六行六藝以立其本經書以擴其用而經書則惟原文而己至於力田畆及錢榖兵甲律令之屬而皆一一䆒極之而可施之實用焉守令各詣其所㑹之地卑躬盡禮而訪問之其道成德就者則舉之夫舉而用不用則在執天下之政者之責也然士之道成德就者用則行之不用則藏之亦不以在外者為欣戚也有司惟知舉賢才士惟知守道實惟兩得之他非所計也由郡邑而逹之國由國而逹之天下而唐虞三代之治詎有不可復者哉嗚呼天下風俗之權輿是在守令也元之為政其盍求之大本者哉若時世之政務元之之所優者矣予復何言送同年彭鳯來知巴縣序李承芳程叔子在宋出居於涪著易於涪之北巖其心固安於涪也自古聖賢樂天知命安土而敦乎仁盖無入而不自得焉順逆非所計矣叔子末年盖有所得也蘇子瞻安置黄州時放思於詩賦取樂於山水之間而善政亦多所成焉其流風餘韻足有動於後世者矣二程舊云河南人而地實今黄陂也黄陂見有跡記存焉夫叔子以齊安人而興於蜀子瞻以蜀人而興齊安二子者皆可為百世師也程蘇在當時常不合而後人論其跡至若氷炭者焉以予觀之二人之不合皆中年時事其心不必深論也程伯子謂王介甫青苖助法實吾黨激成之耳夫天下之事如水然順之則順逆之則逆也子瞻髙曠非介甫執礙者比使明道與子瞻同立於朝必有相得以成其美者有宋之治其殆庶幾乎叔子子瞻之事古人所謂可與知者道難與俗人言類邪彭君鳯來同予庚戌進士也鳯來黄陂人黄陂去予武昌嘉魚不二百里土俗民情素相近且為通家則予與鳯來故知深焉鳯來聞道者也夫道之大源闡幽於易人之性情正始於詩夫道與隂陽剛柔之理屈伸消長之幾一而己詩有列國凡天下之風俗性情而盛衰得失皆可考見焉夫程著易於涪蘇放詩賦於齊安皆有得者也鳯來治詩兼通於易故予以二子之迹語之而所望於鳯來者尚矣夫道也者海之謂也政教之源也守令者政教所寄道於是乎流之者也鳯來得於程蘇焉則知海矣韓子曰望海焉知沿而不止其可量也哉仕與道偕進不復為鳯來言也送王敬夫僉事福建序李承芳福建古閩越之地也方今天下文事人材福建為盛於他邦韓昌黎謂閩越地肥衍有山泉魚鳥之樂雖有長材秀民通文書吏事與上國齒者未嘗肯出仕惟常衮有文辭名於當時為福建諸州觀察使以是大官治其地臨蒞其民鄉縣小民有能誦書作文辭者衮親與之為賔客禮觀游宴享必合與之於是風俗丕變人才與中州等當時作之先者歐陽詹一人而己於乎若衮者以文辭名尚足以肇古先未有之俗况有道者於世之文字閑肆之餘顧不足開起其迷溺闢除其荒亂使從之其正也哉夫古今文體不同也文固可以善俗亦足以壊俗觀之唐及今時是矣王公敬夫以成化辛丑進士拜官大理評事進寺副兹𢎞治壬子擢福建按察司僉事敬夫智識髙逺養其剛大之氣而持屹立之操故難同也雖寮宷嘗以方圓不相入在大理乆之方有是命也承芳尤大違於時者而吾敬夫獨辱厚焉是或一道也敬夫為退之同鄉人古今人無謂不相及予嘗與有識者論敬夫曰時有激而合則可為漢李杜之流有為於時其當不下唐之宋璟也元之劉静修亦為同鄉固盡聖賢之徒也其知識氣節何如者哉當時所與者許魯齋也後之人拘於著述之説而不與昌黎魯齋並進於孔廟焉予嘗謂註釋為古聖賢經書之害有不可勝言者矣不以為罪而反以為功何哉此有識者所以為後世痛哭流涕者也敬夫所得其故有所自者矣敬夫之官昌黎所謂大官者而今之化俗當何以哉昔在有宋閩之名宦人物著於傳載甚衆而其尤者若陳襄趙抃張浚辛以膺趙汝愚蔡襄王鼎劉珙陳師孟以政事名羅從彦楊時李侗曾鞏游酢真德秀胡氏蔡氏父子以文學名陳瓘尹洙林之竒以氣節名劉韐李綱以忠義名而朱元晦者世目為大儒而所名道學也承芳大以為非承芳非之之極正猶衆人是之之極也嘗與敬夫論之敬夫雖未為是而亦不為衆之甚怒而欲加之酷罰也近有二三人者頗以為是閩越文獻之淵藪安知不有如斯見者耶事之始地之所出也而極則復吾敬夫倡正之幾其或在於兹乎若夫蒞官治民之政敬夫所裕如進退之道敬夫必有成算者矣予皆在所略送鄭温卿序李承芳孟子曰待文王而興者凡民也豪傑之士雖無文王猶興孟子之時何時哉其所以自興而且望待於人深且厚矣而固不以時也予讀周禮至於教民興學選賢命士之法而見其周至焉士民生於時冝其周于為善也雖欲不為善而為惡不自得也揚子曰周之士也貴秦之士也賤周之士也肆秦之士也拘世益降則俗益薄而士習益下矣士至於漢固不足為士而三代之遺風尚未盡冺滅也凌夷者數百年及漢末時氣節屹興士習爭自刮磨雖非古道而猶可觀下此均未足論宋元之儒若周濓溪邵康節張横渠程明道司馬公李延平韓魏公范文正許魯齋許白雲劉靜修數人而己其訓詁章句者不必言也𢎞治庚戌取進士三百人鄭君温卿浙江蘭溪人以福建閩縣訓導考滿來京師冡宰王公因其言而知其人也禮之就㑹試而取進士焉温卿之志固不屑於此者葢欲因此而得所行焉耳温卿訓閩時其徒應科目而出者甚衆且屢典文衡焉凡士之出其門者皆著有時名是雖時制文字中人物亦足以觀其作人之效矣𢎞治壬子山東鄒平令缺員冢宰曰鄭某者其可徃哉斯人也好古力學崇師養氣者也鄒平為孔孟之鄉千數百年而欲興之古安得不仗之豪傑之士也哉於乎温卿之令亦重矣一時六卿士大夫而望於温卿者尚矣周禮之教民興學選賢命士之法温卿素有所考而志欲行之者吾見斯道而可復於兹歟夫守令者政教之本風化之權輿也一邑者天下之積也有志於道者不惑於古不畫於今者也若夫當世居官澤民之事温卿沛然有餘者矣予盖不屑於温卿言也送王承吉序李承箕徃年壬子予再謁白沙先生先生曰三楚人物得之襄樊今御史曹公嘗詩之曰御史前身或姓錢急流勇退者也且稱其主夫王承吉從善者當是時予胸中己著承吉而未㑹面盖知其玉潤者也今辛酉承吉挾二僕夫徒歩徃予山中不交一言而彼此心醉但相與於丘壑林薄田畆飦粥粗糲瓦盆之間而已依據聖賢講説經説以立門戸以僥聲譽以干非分以損靈元非予所以心醉於承吉者也亦非承吉所以心醉於予者也予嘗於林壑丘薄田畆飦粥粗糲瓦盆之餘曰古先賢聖之學不傳也乆予三見白沙先生不敢考問為學之方先生甚怪之曰世卿三見白沙不考問為學之方豈相從意耶予曰聞見口耳之學非其自得者非真學盖所以存其無竟其説之意先生聞斯言甚然之今五十年凡在宇内物物與之皆真頗覺己之所以自存者無待見聞口耳而其所以自存不敢瀆告人也他日訪承吉卧龍山中觀耆舊之遺風使江漢變於鄒魯者吾於承吉豈别有言哉送許生還上虞序李承箕戊午之辰正月初吉有生白袍草履通予門謂浙之上虞許璋生挾一衾風雨寒暑不顧言若不出口而所言皆根據在昔可與共學者乎予坐之大崖山中餘三時有問疑則復至門予嘗語之曰拘拘陳編曰居敬窮理者予不然嘐嘐虚跡曰傍花隨栁者予不然罔象無形永長生不死之根者予不然生欲徃白沙謁吾陳先生夫自生之鄉去彼五千有餘里囊無粟衾裏裂錢掛杖頭者有幾生又有老親雙垂白於堂隻子可再逺遊乎吾於此未嘗不嘉其志而又未嘗不恨其窮也不然吾自有樂地夫何恨其将反而求尋乎予贈詩二章予兄大理復和之生既歸歌數詩上巵酒於堂上暇則請坐以觀心且讀聖賢書其樂何如也時𢎞治己未春正月序明文海巻二百八十八
