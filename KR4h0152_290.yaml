body:
  text: 明文海卷二百九十餘姚黃宗羲編序八十一送序鄭啓範北上序舒芬鄭君將赴闕來别豫坐移日歷舉其鄉先哲人忠孝廉節剛健直方之德曰吾之師亦於是乎在且曰近日名士大夫或黨陸而伐朱使吾不知所是言若駴者豫以鄭君既學古而師道復近取師於鄉先哲人其識趣可尚矣而朱陸之辨學術之大者乃告之曰今之才智之士欲飾虛聲鼓後進則惟尊德性之説可掩覆也若謂道問學則必窮天地之髙厚參百王之顯章極禮樂之中和語鬼神之情狀與夫萬變之所以應萬物之所以名蓋有不可偽為者矣故黨陸者非為道也竊其一節以欺人也異朱者非為道也未見朱之大全也啓範曰信哉言雖然自二家門人巳不相能必有所同異也曰其稟賦異其入道不能以不異其識趣同其至道不能以不同朱不容議矣觀陸與趙生論講明踐履之書是豈偏於尊德性而不知道問學者哉然則二子班乎曰濂溪立德可繼乎聖其立言可列乎經陸子以為穆陳之徒而詆無極為老莊之説則知德知言兩失之矣或者謂其髙明過於晦翁豈其然哉啓範欣起曰然遂别明日廖君師賢郭君徴卿曰亦有所别鄭子哉豫曰識趣者學術偏正之本也學術者人材純駁之本也人材者治道隆汚之本也豫見其識趣之髙與豫論學術亦切時弊俾守一官於國家庶其無負哉廖君曰仁哉言其書以堅鄭子蔡希淵致仕序舒芬道非豫樟也豫樟生亦必百年而後出地道之興喪豈易易哉是故其興也非一朝必數千百年其喪也非一朝必數千百年自伏羲至於孔子其間非無亂道者要之皆道興之日也觀之十五國風則婦人女子之言至今為經而左傳國語所記雖僕𨽻厮役莫不能説先王禮義以自守此非道興之實哉自戰國至於宋其間亦非無明道者要之皆道喪之日也觀之十七史所載上無禮下無學彛倫攸斁篡竊橫恣其間稱英君為名臣者治心檢身律人或不逮於二代胥史此非道喪之實哉濂溪之聖足以繼羲孔然不能興道何耶不在王公之位也是故五百年而聖人出則道有繼也未必興也道之興也百姓日用而不知也非聖人迭居天子之位不可也况有其期耶故自伏羲至於孔子則道將喪也雖孔子不能興自孔子至於周子道方喪也周子又烏能興哉今道之興尚未有期也吾同年蔡君希淵欲以一教授興之則亦未之思耳雖然有契之位之時有益稷臯陶之師之讓則人未始不可為天道亦未始不可興也今無一焉而果心信志是以其去幾於不能潔也蔡君去同年陳君揚劉實夫廖師賢郭澄卿同遊林貞孚咸不能别而贈之言蓋有意乎斯道也芬曰無寧使道在世而不在我希淵曰然遂别送僉事陳君序羅玘書紀禹之徂征有苖易稱髙宗之伐鬼方而商詩殷武亦歌之周宣采芑南征之詩春秋桓文陘濮之役皇帝王霸之相承若將不能一日忘乎衡巫江漢之間者古之人亦何急於得楚哉以為都則僻以其地則田下中而泥塗多沮澤以貢賦包篚則羽毛齒革惟金三品出於他州尚多有之兵者聖人所不得己而用之者也然則古人亦有得己之兵耶於戲此古之人所以動於此而其幾應於彼發於一時而其憂及於千萬世者歟詩有之嵩髙維嶽駿極于天維嶽降神生甫及申維申及甫維周之翰言嵩之為嶽邇於王都疏甸之既久望秩之必通而其神之歆之宜其降而生賢焉若以為答也夫衡亦嶽也江漢大瀆也其尊豈亞於嵩髙哉顧其僻在南陬况不順者馮焉皇路為之不通巡狩秩望之禮曠焉其神氣安能與中國相為流通而尚望其有他乎哉故其所以不能一日忘者疾不順者梗之也討不順者將引其嶽瀆之尊而匹諸嵩者也匹諸嵩者固將以生申與甫者望之也然不必其身親見之者公之後之有天下者耳然而更千百年世非其世而巡狩望秩之禮移為封禪禱祠之儀雖嵩焉且不免為神羞而况於衡乎故唐韓愈氏僅意其有魁竒忠信之民生其間而猶有未及見之嘆夫申與甫豈特魁竒忠信而巳哉則其未生而有待於今日之盛也可覘巳有之亦未必不出於黨庠術序之間使其董學政者果洞古而照今歟宜可坐而得之而為天下賀矣泰和陳君文鳴由刑部員外郎簡當兹任君前為庶吉士於豫為同館且同鄉也信其洞古照今而於是乎有遭焉因同官之請贈行也而獨以是告送尹君歸厯城序羅玘厯城尹君以𢎞治八年夏四月至京師太師英國公迓之入館之洞門谺然冰簟妥榻白飯飯僕青芻秣駒晨進盥頮瀋液宵爇蘭薰秉燎炬如晝日一筵其享篚班如自五督府帥都尉侯暨伯戚畹之豪爭速宴會樂公有重客也時公爵上公為天子師臣參機務總元戎屹然長城為邦家重而君又以太守子太子太保太宰公之弟翰林侍講君之季父也兹以太宰之命歸侍講之女于公之嗣子鋭卺合禮成求易水之涯而風之登黃金臺以望居庸延睇于漁陽上谷雲中嗟中外之大防於是乎在而後撫髙閣建瓴之勢俯而瞰之飛芻挽粟番賈蠻商蹄踵交道市列萬肆珍貨盈溢儈駔紛如在焉騎者輦者舁者任者負者介胄而馳者戈鋋而趨者聚而語者絃而佇且歌者呵而軒者厥聲如雷塵飛蔽天而亦目眩心搖就館而休則優伶盈庭絲竹競作魚龍角抵之技更進互出於金碗玉壺之側至其少飫則又丹檻斜入瑤臺俯臨翠竹朱華梟砌冒池清颸送涼濃蔭生寂清神豁襟如在洞府或忘其素髮之盈簮而身之在客也嗟夫天下之人顧瞻京師如在天上有不願如往者乎然而轉輸者勞於力獄訟者勞於形朝覲考課者勞於心懋遷有無者勞於計畫是雖於可樂之地卒無可樂之時而欲遂其所願樂者蓋亦莫之能也惟君婚姻之貴亞天子一等耳而又當豐亨豫大之時無一旅之出以勞元戎故得以其餘間娛姻賓而侈夫上之祿賜之盛而君亦世貴富是來也所謂勞心力形骸計畫者舉無焉宜其老而不失其樂可謂兩際其盛也五月初吉告歸于公公曰吾講幄之下能無宣是美者乃屬豫豫謹序送劉君知豐城序羅玘𢎞治壬子之冬十有一月豫至京之又明日進士劉君出令豐城縣縣之仕於朝者萃飲餞之屬豫為觴正酒半合辭言曰吾縣瀕江以縣江合虔吉諸郡之水流至縣西無髙山巨磯以障之遂汪洋演迤而紓徐縣若受江呀而銜之者每北風駕濤則囓其涯涯遂甕空其底嵗善崩而暴漲時集又繞其背而出之縣又若浮桴然民洶洶無策以生今天幸惠令君以緩兹禍乎君笑而不言蓋君以三傳魁南宮奕世顯榮有不難於政理者意豈不以縣之所當治者獨江乎哉雖然君楚人也楚有九澤澤國也豫亦不能外江以申縣人之意夫此江舟之浮者諸蕃之貢交廣之賦中州之商日且千艘而其亂者漁者釣者泳者泅者嬉遊者土之人蓋半有事於江焉當其日晶風恬水波不興朝帆暮櫓鳴聲上下各飽其欲而歸平途安車不是快也孰不幸而有此江也哉其或萬竅齊吹雷電俱至稽天之浪簸蕩陵谷而蛟鰐鼉鯢乘而伺之雖其素以水事自任者方且神褫股掉無以措躬於其間而其葬魚腹者何可勝數奚翅囓涯之禍而已則不幸而有此江亦人之情也今君日臨此江而其不幸者一觸目焉其戚君心宜何如於是試思之縣人亦容有不幸者乎夫自有天地來則有此江而人之幸不幸于其間日相尋於無窮雖天地之大亦無如之何而况人將何尤耶而縣之人一有幸不幸則曰令實我為也今將何諉乎然則君之名其得於江者必多也而况治之而巳乎然江亦將坻而草樹焉以蕘以牧瀦而陂池焉以灌以溉以利渥縣之人自君始而其東之之勢合岷江以朝宗于海蓋與君同其大也衆咸觴君命觴正書以贈君之行送郭君知上海序羅玘進士盧龍郭君出知上海縣縣人在闕下者合而送之郊且重縣之得君也屬豫言之人皆曰上海東海地也盧龍地瀕北海同一海也鹵㵼鹹鹻其水土同潮汐颶風以時發作其氣同魚鹽蒲葦其産同在畿輔比赤縣其所𨽻同無宣使監司之轄其官之得行其志也又同以其生而習見者之同而治其所臨者之同行見郭君政之成也豫又將何言君耶雖然君亦遽謂其信同耶君自是而往三千之程舟是用也至之日掀蓬而四矚焉離離芃芃者稻也無謂其艾蒿也煙之濛濛者墟聚之爨也無謂其野之燒也聞其㩧然閧然者市囂也無謂其逐駭鹿而噭譟也帆之翩翩而織乎中流者糶舟也布舸也無謂其氊輈之幡也入其市而歷録然者文茵紈綺之肆也無謂其致供張而迎令也坐其堂而訴牒倥偬者膚受之訴也無謂其真椎埋而剽攻也是蓋不俟終日而己較然矣其果同乎哉晨而六百二十里胥集焉吏以漕目告則三十餘萬石也君思之盧龍其亦有是乎君思盧龍之所無則知上之所以用君者非以其同也上非以其同而用君君顧以其同而治上海哉豫始欲不言兹亦不得不言也請君擇焉送李君知華亭序羅玘陽曲晉分冀土也潼關秦分雍土也華亭吳分揚土也春秋之時晉鄰於秦婚姻之國且唇齒也然而亦各私其才量而官之客卿蓋亦無幾焉秦晉局其人而仕也亦舊矣矧吳擅其雄於海隅邈乎風馬牛之不及於晉也晉人且不仕於秦又焉從仕於吳哉言偃之宰武城吳人之仕於中國則有之矣彼亦就其師而學之因而仕焉耳中國之人固未聞仕於吳者也秦漢一再更天下非春秋之天下也吳非春秋之吳也循至于今其勢之倒置亦相懸矣盡中國之賦不能當江南之半盡江南之賦不能當吳諸縣之半古稱秦雍為陸海言陸地物産之富如海然吳海涯也其真海耶故朝廷官人之法可以治晉者未可以治秦不使以治可以治秦者未可以治吳不使以治而縣之長吏尤難宜得通經學古辨博之士為之我陽曲李君前以進士出知秦之潼關潼關大治而以憂去會華亭方虛其位而君適至遂承命以往且以旌其前功且以俟其後效有日進之象焉不待智者而後知也吾獨以為世各有所遭不獨於其人之賢不肖而己春秋之時管夷吾晏嬰子産狐偃趙衰之徒亦一時之雄傑也而皆沒齒局仕於其國其列國之山川道里未必周厯而遍觀也其民俗土風未必交互而試嘗也其才之所施豈僅足充一國之卿而顧不足齒於王朝耶由世之局之之過也今之仕者果盡賢於數子耶將亦比肩而己也如君之仕未五年既西而秦雍忽東而吳揚更數十年不知其超忽凡乂幾其進而赫爾具瞻固不必論也而周遊壯觀亦過於數子逺矣然更秦漢以來其當世赫爾真若可慕者而皆與物湮沒於無聞而數子者尚如有識其面然則人茍賢矣其身可局其善名固不可得而局也矧今非局人之世而君又有志於古而不局者乎君前治潼關主以涼法而濟以溫和蓋晉冀秦雍治體大約宜爾及是命縣之有名位者以豫之知君也欲以聞其政君笑曰涼之溫之與時宜之於是皆知君之果不局於政也相與合而餞之而屬豫為序送錦衣張侯序羅玘嵗聿云莫燕趙之間惡子弟食飲博奕費且盡思為冦偷益急每伺朔風塵起躍馬突出周道上矢聲颼然雖有賁育千夫而手龜足瘃飢虛困悴之餘亦不免戰掉失色伏而獻囊免患於瞬息間誠畏之也况南人素綿道逺而疲三尺童子可以制之其所攜者固其物也亦何擇於公私哉當是時懸人之命於手壯哉翼虎也而國門南出三途視他域尤多蓋河氷不舟天下貢道出焉故令甲三途嵗遣錦衣支帥三人握符提衛士分出以邏其出必以子月望日又出三御史並臨之凡兵民之司皆受檄指麾從事期以靖冦寧民足國阜財而巳今年中途屬張侯養直侯余友也少為武學生戰藝場不如志而抑就右階時尚為百戶也嘗屢戰邉庭諸部得今官廉毅為其大帥所知以其名請乃有是命非常數也今日建纛出郊乘虎皮韉弓韔魚服僕姑在冰衛士屏息俯首不敢唾嚏不敢仰視就而子趨離而鵠立整若斧兀若尸人皆壯侯能戢士謂冦固在其掌中余獨知其疇昔之戰夜半斬多級獻軍門如殺狐鼠耳今兹禦人之冦固健且趫也亦豈遂甚於邉患哉其出沒騰蹂必輕騎遊韁無所止舍亦豈旃車窮廬區脫而悉衆以為重乎以豫觀之蓋出穿窬胠篋之徒一籌耳使道上之旅去其畏心并力支撑而生死以之則形格勢禁彼固無能為也尚勞天子爪士之出哉况侯斬馘之餘勇視此輩蚤虱不啻也無著手處矣戢士亦其末事别筵有詩余總其意為之序送黎文淵序羅玘建昌為郡屬縣四其治南城縣縣有城在於黎盱二水交鳯凰山之陽城南出通會門百二十里為南豐縣又百二十里為廣昌縣東出武勝門踰黎盱百里為新城縣而南城北下未三十里巳為撫之臨川金溪二縣蓋郡之委也亦要會也故置戍衛以鎮遏不虞今去衛猶為守禦所元季偽平章擅割據之雄為偽都僣王號宣德中荆又國焉其雉堞樓櫓門社之傑麗臺池苑囿之髙深芻牧廩廄之富鐘竽笳角漏柝之喧羽旌纛幢之樹嬉遊歌舞之娛騎射弋獵之便殊有京國之態豈王都相仍於其處而然邪然觀其竒花異卉珍果嘉蔬酒醴之味直爭雄於洛陽姑蘇錢塘之盛要其土地之美山川之勝容有以召之也廣昌居上遊林箐蒙密瘴毒殺人新城差沃衍南豐多磽確地皆不能與南城齒而其民亦多老死農圃固不能如南城民尚通而善賈樂為逺遊薄海內外有之也吾嘗遊天下茍十室之邑三家之市吾可以張口飲醪闢囊受餼醉飽而嬉矣蓋吾里閭之人多也最後之京師南郭之南市有吾里人偶語者以為適然耳既而隔牆而呼吾里人也髙門華堂坐而談吾里人也吾驚曰噫何里人之多也吾舉順天旁午來賀且百人則南郭之人半焉丁仕隆擁重資而好文黎文淵扈輦蹕而多技皆於吾如平生歡吾職史事於今八年文淵老矣請於其長得與其子益國護校秉羽幢下歸歸則猶食官餉曵裾玉門榮矣哉然浴盱水射遊魚登鳳凰山放紙鳶倚通會武勝門笑指負擔而入者曰三縣山氓來矣此則少時事也今虎旅司門無敢譁無敢闌入山川禁厲鳥獸魚鱉咸內物也寧復得爾為邪惟飲醇酒慶餘年得歸老以享鄉園之全盛招士隆輩亦歸使人謂南城人好遊遊而非忘返者於風俗不亦有助乎八月初吉偕仕隆來告别吾無以為贐也以此贐之送蔡君之任序羅玘豫既第進士顧視同年皆天下之英也而時方競師唐人以為詩詩日相角而品日髙中書舍人蔡從善又獨為衆所竒一時父母耉老慶索之父母耉老戚索之逺出遊者索之園林勝賞者索之山水草木蟲魚圖畫者索之不則人不以為絶卷不貴焉及今為員外郎於南也得刑部人有竊議法吏非詩人所宜居者豫獨恐法吏不盡皆詩人也詩之狀物髙至於日月列星之繫而其入深也達於淵泉散於風之吹噓雲之浮遊雷霆之剝擊雨露雪霜氷霰之降墜昆蟲草木之生生無窮大之為海為嶽為山為川微而入於秋毫纎塵之不可見變而為日月之薄食為颶風為鬼飈為祲為雷之砧斧星之墜也為石為肉為狗為老人或雨而為血滄海之堙為桑田為息壤為飛來峯其為祥也在天為慶雲為甘露在地為醴泉在物為芝為麟為鳳而於人也宮焉以居器焉以用冠裳焉以章其身符璽權衡焉以信羣而相害也則城郭焉以守兵甲焉以一暴亂祭於廟以報習於學以漸陶而又病其拘也有壺矢博奕蹴踘之具魚龍曼衍角抵之幻至於惟而為神仙服食吐納之術放而為孤雲野水之觀水巢石穴之居樵之斧魚之歌農之鼛鼓巫醫百工踏黃之流烏蠻白翟之髽辮紛如也然必皆羅致之為詩之囊中物隨取而用焉而後可以言詩又必和以五味使可咀也調以五聲使可聽也施以五采使可觀也嗚呼詩豈易為哉使其移是心以臨天下之政乎何有而况法吏政之一事耳烏足以盡之豫故恐法吏不盡皆詩人也從善行歸過其家省其二親而同官以贈言見屬從善毋遲遲於庭而遄即其所有事使為法吏如發蒙然天下終必信之而重詩人望以為政自吾同年始不亦可乎送華君之任序羅玘杭州府推官無錫華君前吾建昌府推官也吾免喪入闕時錫人士皆來問君吾曰君方瘠如臘黯如土炭眉髭垂欲髠念而飲食之乎室如懸罄囊委於地人遇之蹴而不顧也念而賙之乎吾皆為若謹致焉皆愕且笑以吾誕謾亦滋甚或以為謗吾遂言吾邦兹有益國之役大閹突以暑來邦人漫不知也且集吏出詔詔見入匭則巳麾旗竪表升屋引蕝百人雷呼若翼飛若蹄躪瓦裂破竹塵飛蔽天屋下婦走兒顫墮井溺竇尫痎在床喘息待盡雖雞狗亦辟易無所遁處也卜祝令曰皇命垣於東脅東人賄垣於西脅西人賄都科曰吾欲赭彼林吾欲陶彼壤何以奠吾冶何以伐吾礎或曰潔吾館或曰具吾饔飱或曰馬幾騎或曰皂幾人或撲吾里胥里胥匿或詈吾令簿令簿匿吾邦君亦惴惴自懾一委于君君請自持蕝戒東西人毋入賄賄有常誅蕝定度林相壤館傳騎乘皆以制正無恀無不充具有常供於是民不苦役工徒不偏勞庖人廩人不告匱乏閹始少戢其欲削其威矣而踰月不寢食斥所有以佐官費者君一人而巳此吾以君之實告顧誕且謗哉君治不止是也皆釋然韙君為錫增重以為當受上賞得殊擢也而君兹免內艱竟仍是官於杭州以去又皆屬君宗弟濟之來需吾言以慰噫賞罰陟黜吾賤不得而預知也或者吾邦僻而下君雖力於治主者未必知即如吾者雖言君又誰聽哉而杭兹為天下最上之人所注意耳目也况其為士也彚出而多聲鳴言必人信焉君無變吾建昌者以臨之名譽通顯之機錫人可安安焉無為君戚戚矣送虞部王君詩序羅玘虞部郎中王君以病請于上歸仲子叔子侍豫曰子侍父舁有腋舟有碇藥有常嘗膳有常視無阽無虞永豐其可歸也人曰子過矣君未甚病也君前以行人司副使淮又使蜀便歸拜其二親使節不可稽于家而驅追上道今雖位郎署而私心鬱鬱寐若寤咽若吐步若趨思若忘怔忡上下醫至以病診君亦曰吾病也吾見吾親解矣噫君豈真病夫哉豫曰髙哉君之獨病也余嘗閲東西閨之籍矣某也咳某也疽某也頭之痺某也目之眵某也齒之疰某也痰之衝常十二三矣然而騎于道以納刺飲于室以娛賓坐於署以叱吒以鞭笞嬉於郊之亭池館墅以竟日纍纍也此無病也自以為病者也若黃馘而俯行躬乃磬折跛曵而越閾病于踰垣喘呻以趨班實爾匍匐此實病也自以為未病者也自以為病者安知及其既病也不自以為未病乎自以為未病者安知方其未病也不自以為病乎以是二者日循環於胸中則於其身日且不暇又暇思其親而病乎哉豫故髙君之獨病也人又曰君雖以病行而又嫌貽戚於其親諉曰以二子歸而學於學且冠且婚以為親歡不欲以病為名歸也豫於是益髙君夫仕逺違其親而思情也而未必病病矣藥之乎則已矣而未必輒以請請而歸矣而未必不曰吾病歸也則其親有不戚戚者乎而親且病矣然則思其親而以病歸者其難乎哉而能以病歸者豫見君也而其人亦可知矣豫是以益髙君也衆皆翕然評豫言曰諸贈言意率類是遂録以為序明文海卷二百九十
