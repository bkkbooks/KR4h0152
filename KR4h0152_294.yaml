body:
  text: 明文海卷二百九十四餘姚黃宗羲編序八十五送序送唐虞佐序董玘玘幼時過蘭溪謁聽菴鄭先生先生家君之同年而虞佐之外祖也因以識虞佐别七年而同舉於鄉再同試于禮部玘愧先升焉後三年虞佐亦成進士胥處于京師時時相過從劇談甚歡也未幾虞佐出宰山東之郯城間過言别玘既惜其去察其意若甚有憂者竊怪而問之曰吾有所難思之而不得其説也夫當官廉慎吾志也是所能勉也簿書之煩綜理之勞吾職也是所不辭進退俯仰於人亦分也所不敢恤吾所謂難而甚憂者以勢之不可行也夫受命為令政令之下不成於我乎民之豐約不懸於我乎吾所得為吾可為也所不得為其若之何然吾雖不得為固亦吾之責也往嵗旱災遍四方山東尤甚民之相率去而為盜者衆矣而稅例如故無名之征日有增焉吾忍視其雕盡而不言乎言之且不見聽寧獨不聽而巳必且以為罪以令之微臨其上者皆達官也吾能抗乎順之吾不忍民之重困也且吾詢郯之遊寓于此者謂邑久廢敝民又健訟兹之往也舊一弗更大事殆乎弛小事殆乎遂將更焉民未吾信必閧然以為厲己吾其何從乎嘻吾家食時縣之吏厲民者怠若職者心竊非之謂使吾當其任雖不敢望古之循吏亦能使一邑之蒙其澤也今自為之其難又如是竊憂將負其平生而慚令之名也故就若籌之圮曰子第往吾知郯之民其有瘳矣圮居京師數嵗見出而為令者多矣其所憧憧于慮者非趨走承奉之事則旌奬求薦之圖也有憂及于民者乎子乃不然郯之民其有瘳矣夫旱乾苗稿桔橰必有所濟浮乎江湖一壺有力焉令之於民豈特桔橰一壺比哉且子不見夫御者乎馳驟不巳銜敝橛脫馬力盡矣如是而易以造父猶不免於敗必休馬更轡而後進嗟乎今之民其亦銜敝橛脫之時也子往篤其忱毖申其辭諭有所征於上必思所以爭之爭之而不從將不以為罪知其固為民也有所需於下必思所以寬之寬之而不免將不以為厲知其非為己也事事而爭之雖不必皆從然而從焉者有矣事事而寬之不必皆免然而免焉者有矣夫陽城囚而部使去今在上者豈無若人哉夫兒寬免而輸租者繦屬不絶今在下者豈無若人哉惟奉公之意不勝其進取之心則懼有所拂乎上豈弟之心不勝其自營之私則病無以濟乎民子既無是也而何憂難行也哉夫以己因乎時者中人皆然也惟不以時易己如陽城兒寬者斯見稱耳彼二子之所處夫亦豈易歟吾子勉之張弛之道因革之宜是則在豫微子無以瘳若民而任令矣虞佐起謝曰君言得之矣吾將行焉且將以質于外祖遂呼筆書之而去送少司寇張公致政序董玘豫瀕海人也蓋嘗登山而望下臨海門見賈舟張帆自逺而至俄頃趠數百里抵岸竒貨山委市者鱗集慨焉樂之乃下從舟子而問曰爾獲利不既多乎舟子呀然笑曰子覩其利惡知其害之倍也夫天時遹逢舟楫無害出無入有駔驓纍資豈不誠利也歟乃若蕩泊淺渚四顧無侶風撞濤齧靡月靡日子知之乎洪濤瀾汗上下嶢嵲蝤涎鰐齴存亡瞬息子知之乎牟大載盈馳帆角迅衣袽不戒為魚龍獲子知之乎自吾同往于海者多矣蓋有一往而覆焉者矣有一往而迷其利再往而覆焉者矣若此者利之倍于害耶害之倍于利耶吾幸而先登于岸不覆厥載子適見之而謂皆然乎豫於是憮然嘆曰嗟乎仕宦之道亦若是矣往而不知止溺而不知返其亦殆哉厥後豫入仕途逮今三十餘年以所聞見徵之或滯於一官偃蹇數十年而不振遂以淪沒或乘時奮庸而嵗九遷一蹶以仆或宣力畢知逢禍不虞或祿位已極功成名遂終陷險難其遲速得失沉顛靡摧亦何異於舟子之云而先登于岸不覆厥載者何其鮮也蓋吾乃今於張公應祥之去見之公奮自諸生以擢進士兩宰大邑遂拜監察御史久之擢吾浙按察副使召入為大理右少卿尋進左轉左僉都御史再進右副巳復為大理卿遷刑部左侍郎出入中外者二十九年位秩之崇聲名之榮疇能逮之兹以目眚年甫六十四遂乞致仕以去蕭然長遁節完而名全仕宦若此可不謂誕先登岸不覆厥載者邪而或者猶以公位未極為歉以公操履堅綜練久年未至而為大理為侍郎皆席不暇暖案事于外其勤且勞又如此使其干進務入何階不陟然而不自止則入海迷其利而數往者是也公何居焉況兹之歸葛巾野服自肆于沮漆之野與夫波濤嶢嵲之危雲門芒谷荷亭竹榭孰與夫舟居海宿之愁苦姻戚故舊聚處而談笑心怡神愈孰與夫蝤涎鰐齴濡袽終日之虞不迷其利固無其害不居其榮豈有患乎其辱哉夫居易香山之約日知臺池之飾皆昔之同官而能止者也祖疏傅而嘆息送李尉而盈途情之所不容巳者也招賈之文望海之詩寓言以達志者也豫與公為布衣交再會于蜀而同官於此念始者傾蓋海濵後公來為憲副實理海道固熟觀于海者於其歸輒以是為説送徐子仁南歸序陳沂吾友徐君子仁少負才藝為科舉之學名譽日彰而毁亦俱至乃退處裹足不復仕進然君才俊而逸藝精而神發之毫楮不可自遏驅走搢紳驚歎時輩挾策而登門者至是益聞矣少傅徐文靖公嘗荐君至京師忌者沮之太師李文正公愛惜不置而亦不果於用先皇南巡舊京召見御所又兩幸其居朝夕得備供事每製青詞釋贊慶揚致語必屬之以進方欲授之官而龍馭上賔矣夫造命者君相也宰相知之而不能荐天子愛之而不能用豈非天乎余每見夫厮走駔儈之徒好從事而多智人笑之曰何用爾為也他日見於朝盛冕裳而走避豪右出諸途則武夫騎卒擁導後先視之即前所笑者之若人也髙爵厚祿反手而至奈之何君之獨難如此哉嗟夫富貴名壽四者天下之所同欲而尊尚焉者然貴可賤富可貧人得之而人失之惟夫名也抑之而揚毁之而彰雖不見用而公侯大夫以至武夫庸卒莫不以得其楮墨者為光榮視彼髙爵厚祿授之以相易孰為多乎君年巳六十氣發神越不異少壯登之上夀可徵也古人所謂身名俱泰又焉知其他哉詩云庶幾夙夜以永終譽請以得夫天之二者為君祝之留别沈紫江序翁萬達夫負竒者不忌毁而下人善徇者不匿中而替好故有傾蓋一時而意氣沒齒嬿婉生平而情如邂逅者言以其類爾彼我相形異同殊軌智相伯仲則駢志而降心詣有淺深則縵衷而居亢降則敦故亢則匪存較亦人情安可強也紫江沈將軍粵西之傑英而當世之名將也健敏多竒敦篤操誼然不屑瑣尾文吏刀錐什伍齟齬間於貴官達人又怠折節故或疑其亢而棄禮訐而為其薄也乃余觀將軍詳矣昔有人云知人未易人未易知又云女為知己者悅士為知已者死信斯言也余昔作牧蒼梧良覯伊始聽其言論斬斬動人意幹風猷度越諸將私心慕之嗣是得時接音塵因緣存記比叨藩臬式監南潯將軍謝事家居相過頻數促膝更僕披腹談心久之邊機幕議必相參聞畢事報成無爽銖忽用是益敬重將軍矣將軍亦然諾余言動必稱善有聲求之應而無朋比之非蓋利重於斷金而情擬諸同氣不愆終始良豈偶然乃若袍澤相通疾難相慰此特海內交遊之通義耳固未暇以一二談也暌違在期知己難再追念往昔喟然長懷何者昔嘗見將軍性不甚喜飲飲余輒歡酒情中酣仰而賦詩彈劒相和其音欵欵時或慷慨激昂瞪目攘臂叱吒時事意若平南疆安北邊標銅柱登燕然樹竒勳於當時勒鴻聲於異代斯固丈夫之雄心亦鄙人之所希冀者然用舍遇也顯晦時也君子不昧時而詭智達士不要遇而損衷余方悟山澤之輝榮譬朝市於桎梏抑情魏闕旋踵舊棲賦潘生之間居詠左氏之招隱將軍幽況夫豈同之如將軍言異日固當棄鵲印斂龍韜拓落紛囂簡棄煩促慨然命駕賁我潮陽仰遺風於昌黎濯清流於東浦鄙人多幸趿履以從相與陟羅浮浮南海探靈竒於玄嶺窮灝漾於扶桑然後薄言行邁踰大庾泝長江訪匡廬弔白鹿厯覽天台雁宕之勝出錢塘泛西湖問津於豫陽田氏子之宅而宿焉當有悠然冥合而豁然相通者田子往嘗與我約矣將軍亦聞之抗志浮雲轍迹九有將軍有興婉豫二人顧遠齋復河南僉事别序茅坤公徙大名同知三月復河南僉事以去公於豫衆所稱鄉先生者也屬邑長吏九人盛供張祖道衛水上請豫文紀其事豫遂屬草三易稿纍數百千言不能盡取而扣之其旨嗚嗚然寥栗恍徉然若不能成聲者也則燬去之有從事者觴而前曰公之鄉誼子大夫所溉于心者舊矣其來大名雖未幾吾屬醉之者若南風之絃也子大夫亦適徙廣平至于此所謂東西州然言甚易者何朝命童子操縑與墨侍左右暮不能報也豈兩君者均以罪徙至此又離且去故悲者不可以纍欷呻者不可以太息耶豫笑曰曾是之謂哉嘗讀傳記詳古賢人志士出處之際自屈原賈誼以下何可勝道也其間或復或不復或既復而放或再放踰時而復不暇論故士之于此譬若江海之漚顯晦離合唯其所之焉耳豫于公亦何適乎哉獨吾今從諸君導送公兹水之上延眺數千百年間遷臣逐客之轍徙而渡者不知其幾入國家來以郡饒而僻繇罪徙而至者軫相接也然其間著功德于土與其暫至而去無所謂功德著于土而特採其名以傳書之簡册祠之伏臘所遺燕遊歌賞之址山氓野父指而語赫赫若昨者獨文潞公彥博韓魏公琦歐陽文忠公修蘇侍郎轍以及韓絳劉摯陳執中之屬五七公者歷歷可數也餘皆巳零落于煙波霧澤之間而不可求矣由此言之古賢人志士所以徙而暫寄者迹也其離而既去而獨有所常留者道德與勳名也其所謂顯晦離合可喜可悲者吾不知惡乎在也吾屬相與指顧河山草莽而一以盼焉能無悲歌感慨倣佛古所謂爽然自失者乎豫知公非區區于世之顯晦離合者故於公之去有所口噤而不能言蓋在乎此而不在乎彼也公頷而大笑欣然噱飲以為别送王汝中序薛應旗王子汝中將奏績京師問贈言于薛子薛子曰汝中陽明髙足弟子也豈待余言者哉雖然亦嘗竊觀之周未孔子始生會羲農堯舜禹湯文武周公之道敘易書詩禮樂春秋以教天下而天下問德請業之士相率而歸之者一時蓋三千焉雖畏匡厄陳干七十餘君不用歷經險難皆絃歌鼓瑟無忍擕二其嗜師門之道譬之羣飲江河各足其量成德達材靡有棄物然仲尼方且似不能言語其門人則曰豫欲無言蓋默而成之不言而信所以聖人之道卒大昌明于天下及仲尼既沒其徒離散分處諸侯之國各以其學教弟子本源既逺末流益分誕章乖離飾虛鼓衆於是莊周列禦寇荀卿李斯之徒往往附會仲尼以恣其無忌憚之説而道術日益紛裂卒至釀成坑焚之慘而先王懿訓幾至煨燼謂為多言之禍非邪賴道原于天天不息道亦不息漢董仲舒隋王仲淹唐韓退之皆稍稍倡絶學于其間延及宋之周程遂建圖著論而斯道大為發明厥後門戶競起分徒角立議論愈多黨禁旋作噫此豈天實為之要亦人事然也逮我明興髙皇帝闡明正學崇尚真儒其時佐命元勳暨侍從諸臣百工庶士咸敦本尚實悃愊無華學術習俗駸駸與三代同風自後人文日靡學者頗事竒勝於是矜文辭者綴緝秦漢晉唐之糟粕而身心性命漫不知究此固無足道其諸髙談理學者輒又致詳於德性易簡之説而氣誼文章政事一切卑之而不論専主無適無莫不信不果而唯義所在多從濶略言語者什九躬行者什一唯是無以允協衆心遂譁群議未見至誠動物而忽巳成江河相激之勢吾蓋不知其所終也噫此豈祖宗養士之貽謀與今天子敬一傳心風範宇內之初意哉汝中懇懇論學不安淺近其所以成己成物者將何如以究竟乎憶往余宰慈溪唐應德謂余曰山隂王汝中可特訪之及余改教江西羅達夫又每問汝中議論起居及今同官留都士夫自鄒謙之以下多與王子相習夫一時志學好修之士其勤惓企慕汝中者若此而豈徒哉汝中蓋必有以研其幾而慎所趨矣若其官兵部為車駕為武選固王子餘事不道道王子之所從事而世道之尤繫者因贈其行而請所以處我送陸思南序薛應旗晉川陸子為南臺御史之又明年奉命巡視江上激揚修舉旋巳風動區域銓曹以思南逺在徼外部落雜居動輒有警匪有才望者鮮克率服議簡才御史守之遂擢晉川子去去之日鄉之學士大夫仕于南者咸稱其才而惜其去屬薛子贈之言薛子曰古之才也一今之才也二古之才也為定名今之才也為虛位是故髙陽八才臯陶九德其究一也逮後敬仲以仗義興齊國僑以修辭扞鄭君子于其才尚不能無擬議焉矧夫辦事簿籍呈能要約儇習儀文出入機數者其果能以致逺乎哉故曰忠信篤敬蠻貊可行斯古之所謂才也又曰啓明象恭靜言庸違斯古之所謂匪才也且今之俗習去古逺甚破觚斫雕而渾朴以散繁章縟節而敦龎以漓輸衷懇欵胥飲以和而戈矛森列揚眉激昂倡言以正而綱維具亡大都中土蓋以什九而今之所謂才者可知矣遐荒部落雖號冥頑而戅直朴略猶有古之遺風焉率之以誠鮮不孚者病文從野仲尼所以惓惓而浮海居夷識者知其非設辭也昔成都雜部文翁至而人皆興學渤海弄兵龔遂至而盜皆為農二子夫人所知也曷嘗矜技能炫智術而鼓舞更張以易其視聽圉其利害哉夫亦悃愊無華不墮乎忠信篤敬之訓而庶幾乎古之所謂才爾始晉川子筮仕宰玉山吾嘗一入其境見其居者有息肩之樂行者有出途之願而玉山之民謳歌之及徵為南御史則又見其慷慨明達憲度以貞而南之士人罔勿宜焉是又豈飾情修容襲取矯強之所能哉夫今之思南固逺于成都渤海間也其人之戅直朴略較諸江之左右更易孚也晉川子率其素履以往則漢良二千石之治行將復見而忠信篤敬之才于兹乎再試矣他日舉漢世故事俾公卿選諸所表晉川子亦又奚讓焉送張子行之僉憲陜西序姚淶今西北諸鎮地當邊衝朝廷備之甚嚴而承命以臨者有大將有中官有總憲重臣列戍數百里屯兵數萬衆事既有統矣猶懼其劇而弛也則又設外臺之佐二人以分蒞其地而贊其功凡百戎務乃咨乃謀總憲者裁而行之所以飭武備重邊防也嵗在執徐家君視師榆林余以覲省至焉其地固要防也余進諸老將而問之凡敵之虛實將之勇怯地理之險易逺近卒伍之強弱聚散倉廩之出納贏縮余頗識其槩然未暇議也比者吾同年張手行之拜陜西僉憲治榆林之西索余言以贈夫張子所治者邊事也余請以所聞告焉夫中國所恃以安者邊圉固也今吾不能有其固敵大入則瘡痍千里小入則剽剠數城即或以數十騎至吾擁全軍而不敢輕與之角戰非中國之利亦巳久矣議者或欲植榆柳以陀其馳或欲列劒戟以防其突或欲髙塞垣以限其入若可坐而策也校諸余所聞則皆所謂晝餅之談也天以五材濟民用而邊鄙之所闕者三平沙浩漫淙沒馬足雖樹弗茂弗孶則木之為用寡矣短兵相接鎧仗窳楛所謂鐵者必求之逺方而後足則金之為用寡矣民多窟處以就耕牧變猝至則立為魚肉相與築壁壘以自固而救土在百里之外則土之為用寡矣又其甚者逺戍無水而卜諸雨近郊無草而刈諸塞邊民冒死以為生而為之上者顧欲以書生之説施之不己疏乎凡所謂空言常談實不應聲者皆張子所宜審也雖然在天者猶可諉也若今所謂人謀者則吾又惑之甚矣夫論世則外急而內緩用材則內重而外輕士大夫自便其身而恥當劇任率以為莫勞於董徒役莫繁於司會計莫難於讞訟獄莫危於治軍旅一有所寄輒縮朒不肯任夫責之以一事之長而其言猶若此至於邊鄙之任則一人而四責備焉者也其難易不啻倍蓰而議者曾不之察何也張子之所治于四事之責尤重且専誠有非內地可比也軍吏不得其良輕于犯禁一切繩之以法則詐與貪皆不可使而跅弛之士誰其用之廩無終嵗蓄吾常節其所施士恆不得飽天或奪之嵗則變且不測而庚癸之呼誰其禁之公私困矣敵復時壞亭障吾日圖所以補其廢苦役之民至有甘心降敵而不知歸者民不堪于役而舉烽燔燧之所誰其修之一鎮之兵僅滿二萬而騎卒則什之三四私財無以養其力賞格無以作其氣不戰而力巳疲何以使之樂于赴鬬而控弦鳴鏑之患誰其禦之刑難于獨任食難于遙請役難于頻仍兵難于訓養而食之不給其患尤甚執刀筆者得以破勳勞持議論者得以輕事功此今邊鄙之深憂而余之所謂惑者也張子以方壯之年才與識俱贍于四者之任若不足以盡其用者然豫未敢以為張子賀也夫因俗以建事因時以就功雖豪傑之士樂之而時與俗之難為力則有志者恆致慨焉張子宜何如處力之所及則盡謀時之所撓則盡議必使在內者知在外之重而後邊事可漸理也不然慎巳免咎上下相蒙冀其無事以幸為常而邊事日趨于敝矣張子豈得以寧處哉張子聽吾言而思之其是與非必有犁然于心者矣余于張子深交也不敢淺其言故過而道之以為今籌邊之助云送袁莪溪泉州府節推序傅夏器年友袁莪溪授泉郡節推維泉介在海隅去京師八千里而遙其去藩城亦無慮三百里故下民之困抑不得其平者上不能直之於輦轂次不能直之於臺省皆求諸府而直焉又其地阻山跨海姦宄剽盜出沒濵海航漁之民習見擊刺武勇鷙悍動以忿悁相刃相靡殺傷不避誅其於獄訟為繁節推司刑繡衣使者行部輒以節推隨凡民間獄訟皆先以節推訊服而後上之臺故節推代兩臺蒞事其斷獄又為繁夫典刑者民之司命也君非泉之司命而泉民之所為生死耶言刑則律令具矣豈其所以具哉昔者聖人議事以制不為刑辟世之偽也滋甚堤防不能也乃徵於書而律令定非聖人之得巳也故得其好生之意即法令具備而不為苛不得其意而惟法是徇執盈尺之紙鍛鍊囹圄中罪狀某也當某律令某也當某律例格式具備不過費一朝檢閲而足也如此則一吏可矣果菜之饋集之可以成贓言笑之微摘之可以為罪誠所謂大可論而小可斬者而民始無所措手足老子曰天地不仁以萬物為芻狗聖人不仁以萬民為芻狗其言則過然自用刑者之不得其意也而民始搖首觸目輒扞法網桁楊桎梏相望不幾盡天下而芻狗之耶世常酷趙禹張湯夫見知腹誹之法自湯作始深文巧詆得酷名宜矣禹常據法守正亦不免焉者夫不得其意而惟文法是繩雖以蕭何之律案劾民之不聊生者巳過半矣雖比之湯亦可也莪溪君明經髙第其立心常以龔黃卓魯自期豈以申韓刑名為君過計哉君董刑法而於敝邑之萌𨽻是董故為敝邑昌言之也送小峯子序宋鑒豫夙昔負竒氣嘗從異人與之詠歌情誼洽甚始信駘蕩性靈感通造物惟詩而巳他何足道哉他何足道哉乃編蓬鼓琴扣石長吟遊心塵鞅之外然所居地在苕霅之間為江南寥廓間奧之區非若通都大衢可以納交四方易致聲問又素不熟公府無所延譽於上官長者顧所為詩絶與世俗體格不類移書與人論難人盡詫其言遂相為詬病而目以怪誕迂僻亦不甚惜數年間得歙之九野孫子及里姻庚陽王子與之同遊而雋聲清劭稍自振矣乙已春贛之小峯黃先生偶寓吾玉先是小峰宰吾郡之長城豫曾未講相見禮乃今因孫王二子締其交及覯見捉襟步武雍雍几席神鋒秀拔開朗心目亦自咎其詩之不可相沿時弊與豫言若大相夙契焉於是結䄜訂盟聨珠唱玉纍日為月遂有積素纍舊之歡今以事遄歸發邁在近毣毣之思旦復須留感今追迋以敘分隔且夫髙會密坐情盤景遽觴豆雜沓履舄交加排積慘以暫歡寄殷勤於杯酒此豫之所與小峰者也以至周禊鄭祓令氣淑節桂道蘭術月帳風帷或班荆籍卉於菀柳之下或俯窺傍眺於樊圃之中康娛盤遊樂而不淫此又豫之所與小峰者也逮夫悅山樂水嘉遊未斁陰林巨樹曲澗清池籃輿晨出帛舫夕歸登高作賦以展其才臨流賦詩以寄其興賞心樂意欲界之仙都此又豫之所與小峰者也若乃神經怪牒之竒瓊敷瑞藻之麗摩研編削耽讀精誦淹貫劉向古今之書旁通馬融天下之學刋枝葉而究根本略形膚以抵神髓此實豫之所與小峯而人或未之知也夫創巨者其痛必深交固者其别必慘豫落魄窮愁與世無聞知兹因二三子厚見周稱而於小峰又多所彌覆以就其聲價而今則有離索之懷即會晤有程旋復光塵而暌擕之後逺思長想何日之有昔子髙去魏鄒文涕泗交頥蘇卿入漢李陵握手於河梁之上彼皆戀戀於去就榮辱之途孰與夫豫之所與小峰惜嗣音之既逺論報之未遑也哉送沈君叔成序徐渭叔成父仗劒出塞垣拾其先公蛻以歸乃復抱書號闕下取所銜兩虎數狐以甘心始拂衣歸鄉閭駐馬野棠灑涕報事於先公墓道於是鄉閭稱叔成竒男子無忝先公既罷復短劒跨一驢將渡江淮而北復有事京師也來别余於理見余抱梏就攣與鼠爭殘炙蟣虱瑟瑟然宫吾顛館吾破絮成父忽雙涕大叫曰叔憊至此乎袖吾搏虎手何為余壯之體貌雖孱囚矣而氣少振也於是作歌以為别送太守鑑濵金公入覲序林應麒人皆曰今郡守官即古諸侯也考之周蓋千八百國計其國之封域不當今一縣是今郡守官兼周十數諸侯地其屬不為不廣矣今制六部尚書郎非兩考不得輒拜郡御史臺行省擬于王者自稱代巡奔走方面二三品尊貴大臣若庠校博士令其弟子員然可謂曰榮亦必近兩考乃授其職不為不重矣然識者謂古易而今難何也蓋古者郡守拜授無常官其治行卓著者往往即召補三公於上無所攝也故其志易伸得自辟吏斬二百石以下于下無所柅也故其令易行祿二千石足以仁其三族及所識窮乏于內無所顧也故其操易廉今時則異然矣自撫按方伯連帥而下諸道官各得遞相巡厯以簿書期會之間督責郡長吏雖非公務或東西南北行過其疆者守必出迎四三舍屏徒從俯首拱立道左送之出疆乃返至坐公署門者唱然後敢入趨謁庭下四拜蒲伏有問輒簌簌捫膝仰對與輿臺吏承人雁行立眂其堂上顔色為憂喜如是而必望其志之伸得乎縣令宰丞尉而下稍有與當路權勢人相習故或其境內豪右負竒資遊貴介公子門者皆得制挾其守守顧日夕惴惴慮或忤焉如是而必望其令之行得乎嵗定祿二百五十石實支者十之一耳而以其貨財為禮交相覬望殆無虛日如是而必望其操之廉得乎甚矣今之郡守之難為也某以不能韋脂挫折自容流擯州縣間垂二十年持是以較列郡之守何止百十非守之盡難難乎其為君子者也今年夏某始奉命來二惠郡值山陰鑑濵金公為守獲日炙焉然後知為公之上者與列郡同而公之所以事其上者則異不徇人以非禮也為公之下者與列郡同而公之所以御其下者則異剛亦不吐也為公之祿者與列郡同而公之所以守其祿者則異以儉助廉也故絶餽獻羞奔走惡承順而人不以公為傲風厲屬吏裁抑豪強毫髮無所假貸而人不以公為苛革橋稅杜兊耗清紙贖申明屠宰凡迹涉疑嫌者避之若蹈機阱而人不以公為矯公兹厯任未及三年而薦剡五上志孰有伸于公者乎民安其業士率其訓和平之寇騷動江右公至輒空巢出謁羅拜歡呼其令孰有行于公者乎金玉氷蘖之謠萬口一詞三年若一日廉孰有彰于公者乎是古之人為其易而公為其難碩果不食非公其難哉方今聖天子旁燭無外公是行也以最課矣超擢固不俟卜然君子非徒成其身之難也所以使天下回心而向化者當必有道耳公能因而敷奏之否耶公在臺諫時巳為真御史今更涉益久為世道慮者宜益深矣某敢傾耳以聽是亦我二三僚友之意也遂同書以識别云明文海卷二百九十四
