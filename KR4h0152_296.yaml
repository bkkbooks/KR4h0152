body:
  text: 明文海巻二百九十六餘姚黄宗羲編序八十七送序送王孝廉序許孚逺曩余守建武得一賢焉曰鄧汝極孝㢘禮而致之為盱人士矜式及余督學關中得一賢焉曰王欲立孝廉禮而致之為秦人士矜式汝極博學髙蹈述作之富擬昔大儒欲立篤信好學素行狷潔可質神明皆余所心服海以内固多賢如二子殆不易得也頃趙汝師司成疏薦天下士三人於朝二子與焉其一人為安福劉元卿劉子余聞之乆矣客嵗金陵一晤於耿中丞座間精爽端介有用世才三人者品調各異而其足以繫天下之望同也嗚呼賢哉余初識欲立於都門之蕭寺欲立嘗病足且病肺體羸弱不勝衣業巳謝計偕置功名於度外而獨以訪道求友輕千里適四方余是有都門之㑹當余去關中時欲立年巳六十矣枉籃輿送余新豐道中依依不忍别為後㑹期余曰難之各自愛甫逾年欲立聞余謫居山中竟自其家扶病衝寒出武關浮江漢而下迂道江之右入黎州㑹鄧汝極居兩月東渡浙水抵山廬葢己丑五月也汝極遣子儀從欲立行欲立伯子宗亦以追尋其翁先期至此余聞欲立之來如從天而降喜不能言留之月餘與子弟朋友相晨夕見欲立儼然端肅泊然恬淡目擊而道存薰陶觀感巳在言辭之外其子宗侍飯侍寢純孝之情種種可掬鄧生儀視欲立如父欲立視儀如子絶無世俗形迹皆古人事欲立之出門也挾朋儕二人僮僕二人俱未幾則三人者畏長途之艱相繼辭去止擕一僕曰彭道相與涉歴險難備甞辛苦而不辭道未嘗識字隨欲立數月亦化之知問語為詩句亦竒矣詩曰螟蛉有子蜾蠃負之教誨爾子式穀似之其斯之謂乎夫為善苟誠無親疎賢不肖皆可化而入也吾不於欲立之行乎徵之哉欲立將辭歸秦猶歉然不自足睠睠以古人贈言之義望余余媿無以應余獨念欲立之質與造使在孔門當原憲子夏之間夐不可及然皇皇問學如渴如飢其所未了者何在吾聞執中安止之義啟自虞廷孔子掲之為止至善子思衍之為喜怒哀樂未發之中千古聖賢學脉端在於此今試反之吾心中耶止耶夫憧憧往來朋從爾思心可以斷絶朋從而中與止者將終不可得而求若乃無思無為感而遂通惟至誠為然吾黨固未可以易及然而不合體於此非聖學也以欲立之精誠一旦豁然得其所止更有何事願交朂焉欲立之歸也能終以聖學為秦人士宗法而與横渠張子吕與叔兄弟涇野吕先生炳燿後先則此行真為不孤非特以慰答朝野之望而巳也爰命欲立子宗受而藏之以為别送祁侯入覲序髙攀龍己酉冬長洲令山陰祁矦入覲其門人王生瑞琦欲不佞為語贈行不佞某曰夫祁矦所謂豪傑之士而學聖人之學者也其文章政事緒餘耳余不敢以祁矦之緒餘請敢誦所聞吾聞善學者仕而性地愈明善仕者學而物理愈徹何則天地之道為物不貳者也貳之者妄也今夫天地之為物則吾喜怒哀樂未發之謂而巳矣視聽言動一如其本色之謂允執厥中聖人之道何其至易至簡而人自難之何也則以萬起萬滅之感觸之外萬起萬滅之私鬬之中也夫士出而仕宦仕宦而為邑宰邑宰而為通都赤縣其萬起萬滅者無極而有不失其本來者鮮矣夫應酬之煩簿書之冗雖足以疲吾之形神不足以奪吾之心志足以奪吾之心志者一官之得失而巳于此一徹則為物格而知至于是好惡自正是非自明賞罰自當而於執中幾矣今矦入朝上計正起滅之中而格致之地也倘于其本色者不令一念揷入豈不浩浩乎為天之徒其還而治吳民又何萬起萬滅者足攖其慮哉不佞誦其所聞而未能者如此矦曰然然否否吾之所為萬起萬滅者異于是吾方懼夫政之不時民之不和而夙夜以思豈其計于一官不佞則謂王生曰識之矦之所為萬起萬滅者斯為物不貳者矣送蔡公之任南都序歸子慕向者子慕布衣也布衣不得借交上官而子慕又崑山籍也于公所治越境也辛卯之嵗縣宰校士子慕與焉當是時知有宰不知有公知有宰無求于宰矧求于公不自意知子慕者乃公也公之知子慕則從宰所見子慕試文而心賞之特過褒焉縣上之府府上之督學推轂皆公力也子慕于是嵗即舉于鄉得與計偕夫貴賤命也行止義也進取為輕而知已為重子慕不獨喜以所輕者見知而公則終欲以所重者相勉用愛以徳不以姑息批引以正誼不詭道相曲從葢子慕非能不干人者而公則能使人不干也不干人易能使人不干難子慕行其易猶不得公則能行其難用之于一州人莫之敢撓何謂行其易猶不得夫呉俗士沾一命者輙庇其宗黨田園乆蠧而俗不非因謂之厚豈惟宗黨又將庇它人焉公方下令覈出之而子慕以親兄之子壻故干公以此負公公移書先太僕同年友周公以大義相糾惟恐失墜不數見見則從容燕語退而輙自念所言亡有所私與否也今而後五六年知己之遇可謂善始終矣或謂王相國至貴也而公無所詘其親黨于法無敢犯犯輙案之此則為難子慕曰不然夫人義之所可裁者情或有所不能割也于相國則裁以義髙明者之所必出于此也于子慕則出之布衣卒然不意之知必相喜相喜必相比且不復自覺矣而公獨不然是則可謂難重則相國厚則子慕而猶若此它可知矣不旁引它事頌公引他事頌公于公事該而子慕之情掩且規諫人者常恐其不盡也稱譽人者常恐其盡也古之道也公之教也近公遺書子慕曰行矣白雲在望南都非乆棲遲適漳南山水不費一錢思吾故鄉耳公行矣願公常持此心何所不可為自古能任天下事者皆其輕富貴者也則又子慕之所勉於公者也送黄竹石序袁宏道黄竹石從江陵負敝笈訪余長安余方視選曹曹故樹籬插棘地也不時見見輙為杯壘所奪無他語草草暄寒而己未幾辭余去乞一言為别余曰子亦徧觀三衢九陌乎穢塵張天腥風逆鼻行者溺于道居者糞于市椎埋屠狗之軰敝衣百結之子髙鬟衩襠棗面厯齒之婦肩駢踵接此亦天下之至惡也而顧瞻雲中則鳳闕銅龍在焉百官宗廟萃焉引而之貫城之市則夏之璜周之天球若日之璧若月之珠東海南粤之珍異陳焉已而入雲韶之院過鳴珂之里則南之威西之施越之狡童吳之弄兒公孫大娘之劍僚之丸賀懷智之琵琶念奴之歌㗋霓裳羽衣之舞呼盧博簺之戲種種聚焉今夫山郡水郭巷陌未始不清楚衣冠未始不都雅然一人衣茜而過則已叢觀駭指出漢唐之舊物一二則張目不能指名夫然後知京師之大慎勿以穢塵腥風遂謂都市之觀止此也夫古之聖賢豪傑鉅公哲匠其亦猶京都之三衢九陌耳文耶道耶至此乃極子歸而求之有餘師送都察院左副都御史東里王公歸里序蔣德璟御史中丞閩東里王公以宣府監視璫王坤疏詆揆地因抗言内臣越職輔臣失職者再上特召對文華面賜詰問公心誠氣和應對詳朗無懾容無愞色内閣九卿臺省同入對者人人遜不如也震怒為霽翼曰遂得鐫籍以歸於是史臣蔣徳璟拜手颺言曰媺哉君仁臣直葢兼有之而因慨舉廷之無人也寧繄舉廷即璟具疏捄逡巡不敢入璟媿死矣夫上固聰斷明辨不世出之主也其遣内臣明知違髙皇帝預政典兵之禁而援成祖而成祖實不然按永樂中有内臣李興齎勅出勞䢰羅王王琮出封真臘王鄭和賞賜西洋古里滿刺加諸王皆遣往要荒如髙皇帝遣而聶慶童往諭西番以茶易馬之事未嘗預政典兵也海外叵測不忍逺煩廷臣而以内臣供海外馳驅之役是體群臣而賤丙臣莫如成祖而可據以為例乎間惟令馬靖往甘肅廵視却來囘話則亦緝事傳命之類事竣即回非監軍也李進往山西採天花為民害即勅御史鞠問械送京師而諭都察院以自昔閹官弄權傾覆宗社一尊髙皇帝遺誡當時繩御之嚴如此惟鎮守始於洪熙監軍始於正統神機火器之有監督法司之同審錄皆始正統京營之同整理始於景泰子姪之有封拜始於天順至正徳中八虎而極然皆旋踵誅削獨劉永誠姪聚尚世伯寧晉耳而魏忠賢遂援以封公忠賢不足言即寧晉恐亦當議鐫也東厰不知起何時西厰始於成化内教塲之設及邊功冐叙皆始正徳大抵洪熙濫觴二正滋蔓與成祖無與也所惜者上與肅皇帝皆從藩邸入躋大寳盡撤各璫再號中興而今顧舉忠賢之覆轍而踵行之而廷臣亦無力爭者至累煩諄諭費許筆舌亦心知此遣之非而猶恃威福在手别有操縱此則隱憂之大耳漢宣帝用恭顯其後以殺蕭望之唐𤣥宗用髙力士其後廼有李輔國馴致中平甘露之禍不可挽救皆英主開端後世效尤以至此也細綜開闢底今有用内臣而亂未有用内臣而治者二正以來司禮漸重喉舌之地業翕張不可問而復假以兵馬錢糧之權布列要害其所抨糺又立為之逮繫芟斥以快其志揚於大庭明示堅信以張其焰而外臣之氣日靡且相與擣蒜燒葱以保富貴天下事尚忍言乎夫外臣之不肖固自有之然必謂海内豪傑盡不如一刑餘亮皇上必不忍也皇上既嚴譴王公而明以好題目歸之知題目之美則不美安在茍内臣用不效而不撤歸亮皇上亦必不為也公行矣當噤蟬喑馬之世為鳴鳳飛鴻之舉雖不求名名自千秋公無得辭而内臣既撤之後皇上必思公召公幸更思所以報皇上者可也璟友黄宫允石齋魏給諫倩石皆公里人三君子相繼去國中外惜之而璟獨知皇上真堯舜必有召三君子之日因撮小疏之指贈公且以志媿璟亦且尾公而歸矣湖山田畆之間行且宏公之風而矢公之志也明文海卷二百九十六
