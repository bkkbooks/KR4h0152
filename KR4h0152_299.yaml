body:
  text: 明文海巻二百九十九餘姚黄宗羲編序九十雜序蘇子由告身跋李東陽右宋蘇文定公轍告身一通乃大觀二年徽宗造八寳成肆赦加授中奉大夫者藏於霍山裔孫文斌景㤗元年文斌卒妻仵氏守節不嫁撫其三嵗孤虎底於成成化四年以舊業為隣人所侵攜虎持誥愬於巡撫都御史王公竑王公見其巻軸斷裂惟故綾誥詞及三省官名尚書省全印尚存謂仵曰此爾家世澤不可棄也仵以疋絹屬六安衛張千户為之裝飾張誣為質物貸金若干兩有所赴愬輒遣人遮止之後仵死虎孱不能直張亦貧甚以誥予范千户易穀六斛指揮使張時頗涉書史掩而得之𢎞治十三年過廬州為知府馬君金道其事遂以遺馬馬攜至南京裝飾復完訪蘇氏後無所得至十八年始得虎乃取而歸之嗟夫故家文獻惟制誥為重盖國之典命在焉然唐之中世巳有以告身易一醉者若宋之盛時此詔方下不數年所為八寳者㡬為俘物至於嵗久代易子孫墳墓皆失其故里是物之存乃屢經於喪亂之變累脱於攘竊之手而後得可不謂難哉然則物之存亡得喪固有數焉而馬君之希古好徳公天下之物而不為私者亦不可冺也故既紀所建三蘇祠又為題其巻尾蘇之後人其自今永寳之哉書陸中所藏巻後李東陽嗚呼吾友静逸陸先生之卒二十餘年矣其子中書舍人爰輯予嘗所還往簡札數十紙為巻盖自筮仕以來㡬五十年者皆在焉予展巻諦視猝不知為何人筆也因撫而嘆曰人之老少其異一至於此哉當弱齡驟進之時粗率簡畧莫知所裁固不可與静逸並駕第意氣之周洽志趣之符合倉卒造次亦不相逺而箴規磋切予得之静逸尤多據時考事誠亦有不可棄者况巻尾一紙静逸己不及見其於存没聚散之際可勝道邪吾家私稿所識不過一二而中書君乃能俱藏並録無所遺失同趨庭授簡之餘事而篤念舊故嗜文好學之誼亦於是存焉予之始觀不覺有宋景文欲焚少作之意徐而思之知其志之不可咈且自懼老耄之年所得與所進無㡬為不足校也乃為之標首䟦尾憮然而歸之書東萊先生手稿後李東陽右東萊先生送張孟序稿一通舊藏於孟逺外孫潘日敏氏元季金華諸名士如胡汲仲栁道傳吴正傳皆有題識知為先生手筆無疑但紙墨磨滅前一行巳不可句每行下一字皆横截以去以意屬讀僅可成篇而汲仲乃稱孟逺為孟陽不知何據按孟逺名杰於義為近意者有别字邪抑其誤也其前有朱崈者自稱為宋遺民幸生於三四十年之前得以講明諸老之學因嘆後生者視咸淳又隔一宇宙且與日敏所識皆不書年號而書甲申元世祖二十一年也是時宋既改物宿儒故老猶有感於文軌之遷革衣冠之塗炭而不忍自附於膚敏祼將之列先生之遺風善俗於此尚未泯也及其既久而并此失之乃徒以前朝故物相夸耀何哉艾都憲徳潤所藏古書畫甚富近得此帖獨寳重之間以視予予於此亦有感焉若先生之文章道徳天下後世所共知兹不敢贅也交遊别録序黄孔昭景㤗中予在邑庠所與交者陳君儒珍張君存茂王君希文應君志順髙君廷美謝君世懋世懋之從子鳴治林君克憲克憲之從弟一中凢十人皆於予為益友既而予與一中領景泰丙子鄉解鳴治領天順巳卯鄉解庚辰予第進士官工部甲申鳴治第進士官翰林丙戌一中亦第進士官刑部則成化三年也於是三人者幸相與同朝蹤跡日益密誼分日益深居同志行同道門墻同里巷公退無事則或引壺觴唱酬以自舒如是者無間旬日時或以事相違逺則惟離羣索居之懼凢所請益所勸勉所規戒卒皆於往來詩牘焉發之如是者先後餘十年如一日雖家人婦子亦皆知通有無急患難曽未嘗以彼此爾汝而相纎芥也予雖凉薄而厯工部以至今日前後無顯過亦惟多二君之助故吾鄉稱一時布衣交遊之盛必歸予數人者自前輩稱宦途契好之真亦必歸予數人者今年春一中以推選得僉憲福建予固喜吾道益有為而得専其施於一方也而不能不眷眷焉者豈私情哉昔人謂江湖之憂一中以之而其在朝廷者吾二人盖未嘗無焉雖然予所與交兹十人者世懋巳即世儒珍存茂克憲尚淹庠序希文志順以上舍生鄉進士相與家居而廷美方入南雍曽未數十年而皆散落不常若是而一中復奪於王命以去予何能無介然於懐邪因與鳴治取嘗徃來詩於一中者凡若干首序録之以遺一中用識久要之誼噫後數十年試取而讀之吾十人又安知散者之不復聚聚者之不復散惟親不比疎不忘窮不屈達不驕庶不忝於前聞人而子孫亦得以世講之不忤不然亦奚貴於斯録哉五同㑹序吴寛自有人類以來其世茫然而無窮人生其間大率百年生乎我前者瞻之不可得而接生乎吾後者顧之不可得而待乃於無窮之世相值而同時其亦難得也哉夫既生同其時矣或居有南北之隔居同其鄉矣或仕有内外之分使又居同其鄉仕同其朝不益難得也哉雖然三者既同或不同志而同道猶夫古今南北内外而己亦何難得之有吴人出而仕者率盛於天下今之顯於時者僅得五人曰都御史長洲陳玉汝禮部侍郎常熟李賢世太僕寺卿吴江吴禹疇吏部侍郎古吴王濟之及予為五人去嵗五人者公暇人輒具酒饌為㑹坐以齒定談以音諧以正道相責望以疑相辨析興之所至即形於詠歌事之所感每發於議論庶㡬古所謂莫逆者同時也同鄉也同朝也而又同志也同道也因名之曰五同㑹亦曰同㑹者五人耳禹疇以越人丁君綵妙繪事俾冩為圖飾為長巻推予序其首圖中坐於左者為予並坐者世賢前行者為玉汝次濟之又次禹疇皆容貌惟肖氣運奕奕獨予白髪蒼顔頽然以老可嘆也五人者初期相續為㑹不巳未㡬玉汝擢副都御史赴南京濟之以外艱去自是㑹者惟三人予年既髙又將引退雖後之來者當復盛予固不可得而待也書先忠壯公封王宣命後程敏政按舊譜忠壯公宣命封忠烈顯惠靈順善應王近於琴川壺溪譜得其全文乃封忠烈王漢字及䝉古字分行書之考宋元制凡封贈諸神祠五等之爵以次而進其封號自二字加至八字而止忠壯初累封至八字侯遂累加封至八字公至元始封二字王而舊譜云即封八字者盖因宋封八字公而牽連誤書也又按勅牒與宣命所施不同此本勅牒而謂之宣命疑當時可以並行亦有宋制拜使相者或降麻或止用制之意云同年劉君易字序曽鶴齡父名友字古之道也字弗當於義弗稽於韻友之過也知其過而不與之正則吾徒之過與嚮者之友均矣一日公退之暇脩撰尹君鳳岐陳君叔剛孫君曰恭主事洪君宗器坐予家閲文字中有謂禮部主事劉球求樂者尹君笑曰求樂之樂當讀為音樂之樂乎抑益者三樂之樂乎樂而不淫之樂乎將安所適從予曰音樂之樂耳尹君又奮袂箕踞曰名既謂球則球何求於樂樂當求球是於義弗當矣且三聲皆可讀是於韻弗諧矣不為易之何待陳洪二君相顧曰試商之易之當何以以咨孫君孫君退遜乆之乃曰球音屬石石之精華者為玉故或以玉代石鄒孟氏曰玉振之也者終條理之事是也今九成之樂奏於天廷而以玉振之且有顯㣲冝易以廷振庶與其名相成焉尹君曰然坐客皆曰然明日以言於館閣遽有應聲者曰劉君年㡬知命矣亦丈人行矣惡用易為巳而衆共籌之皆曰人生上夀百嵗計劉君未及其半誠易之則後進起敬於稱謂之際為日甚長何可因循哉易有之不逺復無祗悔易之為冝以告劉君君曰竊懼未稱耳誠以見呼敢不唯唯予退復思之劉君策上第列職春官又舉入經筵兼太史所厯皆禮樂之地非球之廷振而何夫豈吾徒得願望之而然邪從而易焉則天下之士不謂吾徒為䛕因序而請劉君易之謂凡相稱謂者悉之獨樹軒圖記跋張寧王瑞之所居芝松里外戸少西有大椿本専前墉未出重屋枝葉旁達下覆輪囷蓊鬱望於里社不知其㡬十祀矣成化初其姑之夫陳秋鴻過而樂之因以舊藏徐大章手書獨樹軒記及徐益配製圖為贈所以欣文物之㑹合而成美於瑞之也瑞之什襲聮屬求予題詞夫天下之物間見則貴貴則必取羣見則凢凢則易捨貴凡得喪盖嘗相半今杭州諸山多故宋遺植方大章記柞時芝松之椿計巳成木彼獨此衆故柞見賞而椿蔑聞今相去㡬何春波空無宿蘖而芝松之樹至今猶蒼翠自若生意未涯予所謂貴凢得喪相半非耶盖物之存亡久近固自有數至於久久近近亦不可謂都不由人彼春波徒為大章僦居則去住不一主家儂既無姓名可傳一聞工師之求之言黙無惜語惟㦸手稱謝則其人可知矣柞之必取其可後乎瑞之讀書好古博雅不羣誅茒卜居信有杜子美之意其於翰墨流傳稍涉形似如記如圖者亦復愛重若此况其家植乎迴視春波萬不侔矣故物之貴凢久近必待人而定非特植物也事皆如此而盡諉之數非扶世之論也抑聞古有椿春秋皆以八千嵗為候今芝松之植人物事數相遇若此得非其遺種乎請因以為瑞之夀題錬雪齋詩文冊張寧陸羽茶經所載原法具偹其品第烹瀹節候有似神仙家鍛鍊之法至所辨用水必地之幽曠乳石漫流逺隔渟浸者是尚與陶穀烹雪意類雪本和氣嚴凝不由地方宛有真味迨醫所謂上池之水於茶絶冝合羽法與榖事而風致益髙此鍊雪名齋之本意也冊中作者皆鈎深道逺脱略故常有雕炙之論甚哉鄉先輩之竒於文也因竊歎漢唐之時文猶爾雅公府而下士大夫居室妄自標榜者絶少為之文者亦惟紀敘其實而華之以論議耳不専以名言相夸也由宋及元人不古若凡里居林屋山園池館甚者置一器物繪一樹石皆巧有名稱以相矜侈為之文者一切依題並號固巳淺近况有立異以為説鑿空以為髙徇俗以為好争竒競妍擬非其倫以相遷就其上者不過莊惠之流而下焉者盖蔑如也於紀載之實何有噫淳樸既敗巧偽日滋民之居處飲食亦不能不眩於名實况文與行哉此册有圖有記有説有題詠皆為崇徳陸景宣作為海昌沈景暉所得噫距洪武至於今僅百年跡其詞翰又非今日可及也顧瞻遺文益増浩歎也陳廷采水竹巻跋張寧水竹居記序皆作於至正二十四年則元末也記言六十年前猶有故老能言水竹院落之勝且及孝廟金字御書則故宋時也因兵革擾杭而佳境莽廢事干本朝鄭元祐何得都不省顧直言感今悲昔意無窮盡推其隠曲必有深慮獨見大惜天下重器失於其御故因小寓大而形諸言非特為風景也自入聖朝今百有餘年非特東南山水發祥獻瑞而普天率土衣冠禮樂彛倫風化盡復中華之舊使元祐尚在則向記中之悲感將轉為頌中之欣戴而可嗣書於此巻矣第念巻中作者自元祐下如楊孟載楊鐵崖錢曲江諸公皆繼述無聞而充溪水竹之居乃遷止錢塘西溪密切故院落之地此記殆為之先兆也清虚處士從孫廷采以遺巻求題因書數語復之書徐汝佩巻王守仁壬午之冬汝佩别予北上赴南宫試巳而門下士有自京來者告予以汝佩因南宫䇿問若隂詆夫子之學者不對而出遂浩然東歸行且至矣予聞之黯然不樂者久之士曰汝佩斯舉有志之士莫不欽仰歆服以為自尹彦明之後至今而始再見者也夫人離去其骨肉之愛齎粮束裝走數千里以赴三日之試將竭精弊力惟有司之好是投以蘄一日之得希終身之榮斯人人之同情也而汝佩於此獨能不為其所不為不欲其所不欲斯非其有見得思義見危授命之勇其孰能聲音笑貌而為此乎是心也固冨貴不能淫貧賤不能移威武不能屈者矣將夫子聞之躍然而喜顯然而嘉與之也而顧黯然而不樂也何居乎予曰非是之謂也士曰然則汝佩之為是舉也尚亦有未至歟豈以汝佩骨肉之養且旦暮所不給無亦隨時順應以少蘇其貧困也乎若是則汝佩之志荒矣予曰非是之謂也士曰然則何居乎予黙黙不應士不得問而退他日汝佩既歸士往問於汝佩曰向吾以子之事問於夫子矣夫子黯然而不樂予云云而夫子云云也子以為奚居汝佩曰始吾見發䇿者之隂詆吾夫子之學也盖怫然而怒憤然而不平以為吾夫子之學則若是其簡易廣大也吾夫子之言則若是其真切著明也吾夫子之心則若是其仁恕公普也夫子憫人心之陷溺若己之墮於淵壑也冒天下之非笑詆詈而日諄諄焉亦豈何求於世乎而世之人曽不覺其為心相嫉媢詆毁之若是若是而吾尚可與之並立乎己矣吾將從夫子而長往於深山窮谷耳不與之相聞而目不與之相見斯己矣故遂浩然而歸歸途無所事事始復専心致志沈潛於吾夫子致知之訓心平氣和而良知自發然後黯然而不樂曰嘻吁乎吾過矣士曰然則子之為是也果尚有所不可歟汝佩曰非是之謂也吾之為是也亦未為不可而所以為是者則有所不可也吾語子始吾未見夫子也則聞夫子之學而亦嘗非笑之矣詆毁之矣及見夫子親聞良知之誨恍然而大寤醒油然而生意融始自痛悔切責吾不及夫子之門則㡬死矣今雖知之甚深而未能實諸巳也信之甚篤而未能孚諸人也則猶未免於身謗者也而遽爾責人若是之峻且彼盖未嘗親承吾夫子之訓也使得親承焉又焉知今之非笑詆毁者異日不如我之痛悔切責乎不如我之深知而篤信乎何忘巳之困而責人之速也夫子冒天下之非笑詆毁而日諄諄然惟恐人之不入於善而我則反之其間不能以寸矣夫子之黯然而不樂也盖所以愛珊之至而憂珊之深也雖然夫子之心則廣矣大矣㣲矣㡬矣不睹不聞之中吾豈能盡以語子也汝佩見偹以其所以告於士者為問予頷之而弗答黙然者久之汝佩悚然若有省也明日以此巻入請曰昨承夫子不言之教珊傾耳而聴若震驚百里粗心浮氣一時俱喪矣請遂書之書東齋風雨巻後王守仁悲喜憂快之形於前初亦何常之有哉向之以為愁苦凄鬱之鄉而今以為樂事者有矣向之歌舞歡愉之地今過之而歎息咨嗟泫然而泣下者有矣二者之相尋於無窮亦何異於不能崇朝之風雨而顧執而留之於胸中無乃非達者之心歟吾觀東齋風雨之作固亦冩其一時之所感遇風止雨息而感遇之懐亦不知其所如矣而猶諷咏嗟嘆於十年之後得非類於夢為僕役覺而涕泣者歟夫其隱几於蓬忩之下聴芹波之春響而味夜簷之寒聲自今言之但覺其有幽閒自得之趣殊不見其有所苦也借使東齋主人得時居顯要一旦失勢退處寂寞其感念疇昔之懐當與今日何如哉然則録而追味之無亦將有灑然而樂廓然而忘言者哉而和者以為真有所苦而類為箠楚不任之辭是又不可與言夢者而於東齋主人之意失之逺矣題方孝聞先生手簡黄綰先祖舊藏遜志先生墨蹟若干幅有一柬與禮齋者乃遜志之兄孝聞先生手筆名字下剜去一半存者一半視之乃聞字之半戸及讀之有漢中舍弟小舍弟之語漢中乃遜志為漢中教授時所稱小舍弟乃季弟孝友也則知為孝聞先生者無疑盖人但知其弟之可重而不知其兄之可重也昔遜志有云某所以粗通斯道為薦紳之後者非特父師之教亦吾兄訓飭誘掖之功也按脩史私録云先生字希學濟寧太守愚菴先生長子少有至性年十三喪母輒稽典禮疏食水飲彌越三年及父卒斷酒肉居宿於外祖母亡亦如之每一號慟聲盡氣極嘔噦出血扶而後起於是寖成羸疾行步傴僂然守禮益確親戚鄉閭莫不稱為孝子家素貧窶一錢寸帛不私妻子奉尊撫幼衣食賓祭喪𦵏昏嫁費用百出經理補葺以身任之曲中儀節儉而不陋平居未嘗去書徧學五經而邃於易精求聖賢㫖趣由致知而誠身由親睦而愛物務篤踐履不為空言發文為詞理深意逺存心仁厚接物和恕里中有争訟者不至郡縣而相率以質是非開以一言莫不悦服徳器完精才具優長通達世務論議甚偉由此觀之則知世之知其弟者果未知其兄歟故并著之以俟論世者之有徴也三山紀㑹録序舒芬古仁人立言之逺曠百世而不受知者屈子之離騷是也離騷自淮南而下説者數十家奚為而不知邪屈子者知道者也離騷者訣絶而思傳道者也説者以為怨誹憂憤類以楚聲湘纍悲哀之辭視之豈知離騷者耶夫傳道之言在今日豈信於子思孟子耶屈子曰道可受兮不可傳其小無内兮其大無垠與子思所論費隱同邪異邪又曰一氣孔神兮於中夜存虚以待之兮無為之先與孟子所論夜氣同邪異邪且孟子而下士孰知王霸之辨者屈子乃言曰昔三后之純粹兮是非真知王道之純粹邪又曰湯禹嚴而祗敬兮周論道而不差於乎器嚴敬而不忽大中不差此兼内外該本未之言也非三后所謂純粹者邪存社稷哀民囏躋王道等伊吕屈子之心也而不得遂焉亦樂天而安夫命矣雖離騷見志亦豈必其道於來世邪或者見其有邑鬱太息流涕之字則謂其憤怨見其有麾蛟駕龍發東津至西極之辭則謂其嫉世逃虚是豈知屈子未嘗不豫之誠邪嵗正徳巳夘予以言事調司番舶偶九日登烏石髙處長嘯孤咏若將騁宇宙之寥廓也同年平嵩知之攜酒至俄而東岡越坡浴陽皆攜酒至且眺且詠若將觴我樂我也竟此日十日再此四君則有各為詩數首屬予和且屬通録所聮句為一巻以紀清遊予以斯遊於四君信樂矣若芬者方處孤逺慮患之地人豈以為樂耶昔者屈子之樂人以為憂并與其道廢之也非四君孰知予嘯詠之樂耶雖然道茍在我則無往而不可樂位茍在我則無往而不可憂一遊奚待哉詩録去懼覽者視之騷也因敘屈子之仁先之謝四君能知巳也明文海巻二百九十九
