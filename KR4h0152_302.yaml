body:
  text: 明文海卷三百二餘姚黃宗羲編序九十三雜序椒山楊公手書跋鄭履準别後一路日食奏稿成日夜奔趨至京師十八日到任日食次日賫本至端門聞拏內靈臺打一百知題目不合即趨出連日快怏至十八日故又有此奏二王事本後原有一段大意謂賊臣之得專權皆原於皇上父子之不相見後俱削去止存此二句猶有此禍打後兩腿出血膿四五十碗肉潰幾見骨今幸將平復逐日心亦坦然略無怇懆意南都之事主張贊成專望老先生言不盡意統惟鑒諒二月十一日繼盛頓首豫少習章句每從簡帙誦古忠諫事未嘗不撫卷長噫思得一神遇之壬子夏侍父白下見椒山楊公左顧修髯偉貌音如洪鐘望而知其非常人也心竊儀焉不數月椒山應召北上豫父囑之曰俟時而動無蹈前車椒山頷之及抵京值日食之變朝蒞任夕上書指斥姦佞致干上怒杖闕繫獄至癸丑二月從獄中出片紙托林吏間關數千里傳至金陵上述抗疏之由中敘被刑之毒末言順受之正復以金陵根本重地凡事皆仗主持為托吾父環誦數番彈指飲泣真所謂雖死不忘君者乎乙卯孟秋豫隨父入京而公以是冬受刑西市人皆灑泣公自怡然唯誦平生未了事留與後人補而己戊午四月三殿災人皆見公青巾素服雙眸炯炯憑午門西角檻若指揮撲滅狀逾時方隱因憶天順丁丑承天門災于肅愍公見形烈焰上感帝心還其妻子而公之見形也人皆緘口結舌莫敢一言即憐公者亦竊竊私嘆而已嗟嗟公之精忠徑氣伯仲肅愍即一時摧折而百世下安知無弔湘哀郢者乎甲子仲春偶披敝匣覩公手澤並豫父之跋追念疇昔濡穎而記其顛末如此云跋王右丞霽雪卷馮夢禎吳崑麓夫人與豫外族有葭莩之親偶擕此卷見示述其先得之管後載門小火者火者家有鐵櫟門閂或云漆布竹筒搖之有聲一日為物所觸遂破墮三卷此其一也豫初未深信翻閲再三不覺神王因便覺神峯吐溜閉户焚香屏絶他事春圃生煙真若蠶之吐絲蟲之蝕木至是粉縷曲折毫膩淺深皆有意致信摩詰精神與水墨相和蒸成至寶數月以來每一念及輒狂走入丈室飽閲無聲出户見俗中紛紜殊令人捉鼻也真實居士記於南翰林院之寄樂亭先友尺牘題辭李維楨國家迪哲重光二百餘年惟敬皇帝朝號稱綦隆人多長者之行光進之風文章爾雅訓辭深厚即士大夫書疏往返直質無長語稱謂無諛詞是非無隱情交際無厚賄至於今言甘而心苦貌盛而實衰駢四儷六繁縟過於表箋匪直下以事上上不以報下則曰是簡我也然而牛頭馬脯全不相涉矣尺牘之外復有副啓其初或以請託或以指譏不可雜他説具姓名如宋疏之貼黃然今則以此為示欵曲通殷勤纍至三四葛藤不斷殊無當也顧所建小侯家有髙祖王文襄恪公鎮守湖廣所得諸公尺牘若干首皆其時名流八行道意千里如面絶無雕飾冗雜諂諛卑鄙之態想見當時人心風俗醇朴真懇與今天壤懸殊非𢎞治之代惡覩此乎昔嚴子陵口授人書使者嫌少可更足子陵曰買菜乎求益也杜工部詩云久客多枉友朋書素書一月凡一東虛名但蒙寒暄問泛愛不救溝壑辱從來彌文之可憎如此去奢去泰去甚以轉移俗尚則吾輩當任其責所建藏弆為榮而又鋟之梓以行於世其意念深矣匪直重先世之遺巳也書山林經濟籍後嚴澄經濟廟堂之事山林奚以稱焉語云士不可以徒貧賤則山林必有所事事即其事與廟堂異而以言乎各營厥務均之經濟焉耳試觀籍中隱逸諸君子髙風雅操與日月爭光豈徒然者苐未有分列品目彚成全書如兹籍者而田叔創為之適得我心譬廟堂之有周禮乎提而衡之殆未可以輕重論也嗟乎周禮王莽安石不善用之致亂天下兹籍苟隱逸之士竊得一二便足千古無復擾亂之害殆其重於周禮歟余尚欲以臨池之筆硯揮手之絲桐補籍所未備用方周官之考工記田叔亦許吾否闕曩在京師以無用莫逆者元立田叔共豫三人元立與豫日事禪恱而田叔詼諧多野趣野趣實助禪恱禪恱固無所不恱何況野趣宜其莫逆也自元立遷化後豫獨往獨來於山中恆憶田叔不知作何狀偶一日見山林經濟籍猶然笑曰老子於此興復不淺而泉石之膏肓深矣然其膏肓易瘳如維摩卧疾示迹覺頑耳覽是籍者若謂田叔性命在是便在癡人前説夢須從逐款下索一轉語始得同善會序髙攀龍錢啓新先生倡同善會於毗陵其會嵗以季舉會者人有所捐聚而儲之見有隱於中者施之於是無告之人寒者得衣飢者得食病者得藥死者得槥同會者人人得為善吾邑陳子志行聞之欣然曰夫學豈託之空言將見之行事此其為行事之實乎而問於攀龍曰吾知如是之謂為善也子為吾言善所從來余曰噫大哉子之問也夫善仁而已夫仁愛人而已夫人合天下言之也合天下言人猶之乎合四體言身吾於身有尺寸之膚刀斧刲割而木然不知者乎吾於天下有一人顛連困苦見之而木然不動於中者乎故善者仁而已矣仁者愛人而巳矣志行曰君子欲萬物各得其所而不能使萬物必得其所博施濟衆堯舜猶病如力之不及何曰務博者求諸人仁者取諸己取諸已者力所及也吾取諸力之所及天下人各取諸力之所及何人何我何大何小何窮何達施不亦博乎濟不亦衆乎志行曰聞善者必福有不然者何也曰凡吾為德于人非期人之報也又非施於人所不報而期天之報也求福為善故為善無福志行曰人知善之必福猶弗為善必欲其無為而為執途之人責以聖賢之道乎曰噫是不知不為善之不可爾於吾之身刀斧刲割而木然者必死人也於天下顛連困苦而木然者其死一也然則吾之為善如渴而飲飢而食飲食亦望報耶志行曰善者固無福與曰道二仁不仁而已仁生道也不仁死道也天下之禍萬有不同皆死道也天下之福萬有不同皆生道也仁則生善則福猶形影然有為之心非仁無為之善即福也志行曰善吾今乃知大身是謂同善吕氏合譜序髙攀龍吕氏之族最貴盛自昔多賢者所稱有虞封薑姓於莒後省草從吕為太公望以來者遐哉邈矣其居吳中則自東萊公好問扈駕而南有欽咨者居常熟之沙溪號沙溪吕氏有師顔者元末避兵無錫之奚山號奚山吕氏兩地各譜其所從來子孫亦各世守之萬厯間奚山之老與沙溪之老遇逆旅中相問皆曰吕也問所從皆曰某某於是皆拜曰噫嘻族也歸而各持其譜劵皆拜曰信族也奚山之老乃合兩譜一之曰吕氏合譜而問序於余余曰不亦善乎當其在逆旅中一途之人耳問而知其為族樂可知也况於五服之親散而之四方一旦交臂得之樂當何如乎於同氣之親無故而戾氣相加遺悻悻若仇讐然一旦革心相交樂當何如乎夫天之生物也一本人物之生久矣方以地殊地以氏别遂各為城府為町畦為戈矛設遡於百世絶代之上其為吾之宗耶非耶不可知也是故譜不可以已也博而求之非吾譜者且不可知况麗於吾之譜敢弗愛歟約而求之麗吾譜者去途之人逺矣況於吾同服同宫同氣之親敢弗愛與是故譜不可已也雖然於吾之身亦有譜吾之所以為吾放而之四方久矣其為奚山也沙溪也不可知矣學焉而求之一旦遇於逆旅相視而笑曰噫嘻我也樂又當何如哉夫吾之譜明則天壤之間民吾胞物吾與無弗愛也況於譜者乎書趙夢白尺牘卷後鄒觀光趙夢白磊落振奇人也豪邁跌宕髙視一世為吏部郎以上書忤當路謝病歸再起司內計以執法忤當路罷為民其人一絶所為詩古文詞不主故常間出警語竒峭險峻有峨眉天半之致其文二絶書法出入元常逸少間而姿態橫溢其臨池之業三絶屠長卿嘗貽書問余夢白眼中小須彌震旦好詆訶先輩文字李何王李至無容足處其餘么麼數子無足煩齒牙今復爾否此長卿云然今尺牘盈帙可略得其概又牘中有云得夢白等之譽乃足為譽得某子甲之毁亦足為譽蓋其髙自標置如此明文海卷三百二
