body:
  text: 明文海巻三百三餘姚黄宗羲編序九十四雜序書太行山語示陳山人袁宏道陳山人嗜山水者也或曰山人非能嗜者也古之嗜山水者煙嵐與居鹿豕與逰衣女蘿而啖芝术今山人之跡什九市㕓其於名勝寓目而巳非真能嗜者也余曰不然善琴者不絃善飲者不醉善知山水者不巖棲而谷飲孔子曰知者樂水必溪澗而後知是鳬鷗皆哲士也又曰仁者樂山必巒壑而後仁是猿猱皆至德也唯於胸中之浩浩與其至氣之突兀足與山水敵故相遇則深相得縱終身不遇而精神未嘗不徃来也是之謂真嗜也若山人是巳昔有書生擕一僕入太行山僕見道上碑字誤讀曰太形山書生笑曰杭也非形也僕固争乆之因曰前途遇識者請質之負者罰一貫錢行數里見一學究授童子書書生因進問且告以故學究曰太形是僕大叫笑乞所負錢書生不得己與之然終不釋既别去數十步復返謂學究曰向為公解事者何錯謬如是學究曰寜可負使公失一貫錢教他俗子終身不識太行山此語極有㑹想山人讀至此當捧腹一笑也題峴山逸老㑹張維樞峴山者舊顯山也郡之諸山三而迤委赴城其城南則峴山三里而近由郡前具樓船挈數擢即可直艤山下升視四望南列道塲北盤弁蒼東北見雉堞之象如齒萬家之竈如炊煙山故枕碧浪湖餘不前溪二水從西南來瀠洄數百里當山而渟滙為一區練光可鑒有石類小舟獨砥中流石頂一塔巍然若文筆髙騫直標浮玉之致盖一躡屐升視而山光水色樹響漁歌直可不離襟帶而得之亦勝地也余以庚戌孟夏之月拜吳興符適鄭直指駐部冠盖往来若織峴山一席地幾成郵傳而僅為庖夫輿人鼔刀息趼之所俗哉太守不能増山靈重顧反混之垢耶及閲楊升菴集見所跋劉南坦峴山圖云地則秔稻交疇里實桑榆䕃道春逰秋豫潮往汐来山堂仍襲峴首叔子之名畫圖工摹天目王孫之舊環誦數語不覺心開而目明也因稽近事原有春秋二集其供費出自郡例延薦紳之中耆碩者一人為主而往往被公冗所奪時舉時廢余念秋期届矣即送社簿及供費請姚承菴主社及期余率五僚二令郡縣詣學博應社時在里諸先生若李臨川朱海瀛錢繼脩沈太垣章衡陽費臺簡沈何山唐存憶温員嶠朱襟江王洪崖蔡沈諸封翁操輕舸至者計得二十餘位分賓主東西坐定茗數杯肴蔬數盤酒數行帷幔不施絲竹不奏翛然於雲烟杳靄巖樹隂翳之下不酣醉而適己徙倚空亭中訪政賦所急孝子貞婦髙士寒生所宜揚宜賑筆之簿筆既竟因隨意散行揖數名守祠下咏栁惲之白蘋摩左相之石尊想蘇東坡孫莘老之題墨妙觀荷花遺韻又不覺爽然自失翩翩然而思景行也夫峴山以前數守而重峴山逸老之圖以南坦六七公春秋逰記而著是寜獨若叔子之登峴悲傷與王孫之空憶芳草者今山水清淡秔稻桑榆之交䕃依然也諸先生功業文藻出而經國入而映帶壇社比南坦六七公時氣象固益王也余輩愧未能踵前賢後塵然使百年後知余輩得與諸先生登臨於此則兹㑹亦安可少耶於是臨涯相别而漫題數言於舟中題桃源索隠冊六則蔣徳璟今人未必不勝古也善巻辭舜天下逃之枉山至今武陵人知有枉山與善巻漁郎逢桃源林林盡水源便得一山至今不知山何名漁郎何姓也漁郎賢於善巻矣或曰漁郎黄道真也然乎山再尋迷不得路則以桃源名山又非也此索隠之所為作也倘必以緑蘿為門花源為庭穿石為堂奥沙蘿新湘為亭榭而水心為後户則安知髙靈金鶴焦林大蠟諸洞之非漁郎之所入而為此斤斤也袁石公花源注自是一幅輞川廼褐公又重開生面矣山水之隠顯皆時為之而仙與人各争其半仙欲使之隠人不能顯人欲使之顯仙亦不能隠也以謝永嘉伐山搜勝力無所不窮顧咫尺不知有雁蕩而張邋遢扇笠小憩乃能知武當之必顯何哉桃源前得漁郎後得褐公自是山候當顯苐未知葉少藴所稱山無雜禽惟二鳥來往尚似晋宋時否真誥言諸洞天各有日月忽然起滅不由六竇虚空之内石堦曲出髙卑上下亦不由五門然自余所至武夷羅浮匡廬麻姑支硎句曲嶧山諸勝曩稱翳宻近多展露将貞白所謂時移事異不復可准耶肉人喁喁耳有異人者以雲海為胸以芝术為糧以排閶闔抉鴻濛為氣而其足目與手又皆足以赴之即神仙亦引讓焉於是天地之奇始畢吐武陵有桃源余温陵亦有清源兩源差可耦然褐公能於桃花源深處得許竒異其言語妙天下而余不能於清源西洞天外更有開闢余愧矣二酉為穆王藏書處亦曰秦人藏書處意秦焚書時避秦者挾書偕隠且為藏之名山勝孔壁汲冡逺矣褐公曰秦焚書楚救焚人知罪秦不知功楚此誠篤論而相傳昔有樵入石室取書出皆應手灰滅然則孔壁汲冡又何以能獨存也禹登宛委得金簡玉字知水泉之脉仲尼登泰山見七十二家字各不同又能識龍威丈人洞庭禹書兩聖人有書癖亦有書緣惜樵夫非其人耳王烈得抱犢山石室書兩巻僅諳數十字以示嵇叔夜盡知之及将叔夜往顧失其處叔夜無書緣樵夫無書癖恨不使褐公與余見之趙季仁三願一願識盡世間好人二願讀盡世間好書三願看盡世間好山水鶴林曰盡則安能苐身到處莫放過耳大約觀山水亦如讀書隨其識趣之髙下而吳立夫則謂胸中無三萬巻書眼中無竒山水未必能文則夫世之讀盡書看盡山水而不能文者比比也惟有褐公之文始有桃源之山水始可讀秦人二酉之書八公山樵蒋德璟題明文海巻三百三
