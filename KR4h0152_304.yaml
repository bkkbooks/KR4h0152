body:
  text: 明文海巻三百四餘姚黄宗羲編序九十五雜序跋梅江與姊夫書當肅皇帝初蒞宸極㑹稽沈黄門束上十八事規帝帝大震怒廷杖下獄垂十八年莫有救之者迨海忠介疏上即舉朝譁然救之帝曰沈束上疏無人申救何救瑞疏之夥特旨赦沈公出之公出而土木形骸傫然囚也己感疾其妾毛氏未曾識公適當詔獄事故也毛獨守二十年公屢於獄中傳諭改適而毛不然之公出始侍巾櫛年己四十矣公疾捐館毛哭泣過多病卒以死殉公此書乃公與姊丈張君者中間委曲不異少壯而毫素有法得蘭亭筆意又公在獄中搏土為博山為銅鼓摩拊如銅有聲亦竒且異矣㑹稽陳右將軍好古博雅惜公翰墨後人不謹付之脂燭獨此一紙尚存正論毛妾之事也豈造物愛䕶之歟裝潢成巻擕以示余且丐題其後敬書所聞如此明文海巻三百四
  hash: sha256:52d4d5666432d5f02fd596073b6b32cadbf4c0ec9cbd672f43ea340efef64490
