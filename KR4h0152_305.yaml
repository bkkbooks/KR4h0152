body:
  text: 朋文海巻三百五餘姚黄宗羲編序九十六序事叙侍御劉公愍災史鑑江南在禹貢為揚州之域厥土塗泥厥田惟下下自唐以来生聚漸蕃人功既施地利斯盡司國計者惟取辦目前不究其本而操其末故其稅嵗益月增固巳不勝其多矣浸淫至於元季上弛下縱兼并之家占田多者數千頃少者千餘頃皆𨽻役齊民僭侈不道本朝任法為治而其徒猶蹈前轍不知自檢往往罹罪則戮其孥籍其家没入其田令民佃之皆驗私租以為税之多寡在當時惟患其不足不復計其為民之害也且嵗漕粟百數十萬石以給兩京又有加耗船傭車值之費一切取辦於民率常賦外横増至相倍蓰然而地之所産不加於舊吳民竭力以耕盡地而取猶不能供而談者盛推財賦以相髙為淵為藪之言不一而足殊不知吳民無窮之患正在此也宣宗章皇帝愍民之不堪詔減其什二三民乃稍得蘇息然較之舊額殊為重矣往時水旱有司猶知矜恤隨以上聞請免其税斯固明治體者之所當然盖亦恤其根本不忍重傷之也成化十有七年春不雨夏又不雨地坼川涸垡燥而疏膏液盡竭後稍得雨苖之植者勃然以興芃然以茂識者固巳憂其将衰也亡幾何時則向之勃然者萎梵然者槁及撥其根視之則已腐矣興之大者則大壞興之小者則小壞甚至盈坵徧隴蕩無根株人力糞治皆不能救也秋七月丙戌雨颶風大作㧞木發屋八月戊午以往連大雨常州陽山崩蘇州洞庭東山崩太湖水溢平地深數丈蕩民廬居九月壬申朔大風雨晝夜如注自此至冬十二月亡日不雨向之禾稼僅存於腐爛之餘者悉漂没亡遺矣而有司之欲厲民覬寵者建議以水不為災既有以足稅餘尚可充民食也由是交相掩覆諱言災矣百姓陳乞萬端不見聴盖是時吳江丞有王瑾者倡為此談而蘇州劉知府瑀信之故人言不獲入也儒生趙同魯上書言状則目為辨士以為人㳺説斥之於是監察御史劉公魁慨然上疏論之其略曰今天災流行害禾稼年不順成江南之民大小咸病日瀕於死今不原其税而使有司督責以重困之臣懼其死亡略盡將来之税從何而出也且國家之財賦莫盛於江南雖由天生地長然必資人力始能有成是則人者本也財者末也夫欲取其末而先絶其本假令盡得以快目前然後日之計固已索然矣又況未必得乎今民窮財匱相聚為盗在在而有此亦理勢之必然萬一有狡焉竊發其間興兵征討為費必多恐不止所逋之税而已臣待罪御史為天子耳目之官民之疾苦耳所聞而目所見也臣若黙而不言是為壅蔽聰明曠廢職司罪孰大焉伏望陛下上順天道下從人心憫斯民之顛連無告特詔有司騐其被災之税而釋之更加賑恤以全其生則他日父而子子而孫相率供賦税應徭役以奉聖朝於億萬年也豈取足於一時者所可擬倫哉疏上天子韙之詔户部從其請戸部下郡縣覈實而劉公以任滿去矣繼公為治者娖娖自守不復留意民隠由是一時羣有司堅守前說不變遂欲迫取以實之乃持其奏不上征求轉急民不堪命至賣田宅鬻子女不能償民死於杖下或自殺者不可勝計府猶以為未足嘗攝一縣令與丞至責其慢令曰非敢慢也民有被某杖至死者丞曰此是某杖死令不與也兩人争者乆之令屈府大以丞為能數稱之自是吏益務刑尚酷矣民謳吟思劉公不能忘輒相驚曰天子遣劉公来活百姓今至矣則皆走往視之轉相告語道路成羣至寂不見乃還居數日復然東人而西其望南人而北其望曰庸撫我来明年大饑人相食米斗數百錢草根樹膚俱盡乆之不復有人色餓死者滿道路或浮蔽河而下縊林木間者纍纍然也是時秀水有楊姓者一日忽在家治湯餅里長来適見之謂曰年饑此饌不易得也今日當與我共飽此矣楊曰爾不可食我自度不能幾食此故賣家具為之爾不可食里長不悟堅欲食之食竟楊舉家死里長亦死衆始知其先置毒餅中也長洲一人鬻其妻臨别妻脫所服衫衣其姑姑曰爾去當須此婦曰彼既妻當衣我矣姑服此勿辭也其姑服之悲咽投水死婦大慟亦溺死水中買者與其夫索價夫又自沉死又有鬻妻者索錢五十文買者疑其少曰吾妻事我二十年今遭此㐫年不忍見其饑且死也故不須多錢爾其善遇之毋虐也其人如數與之内二文惡将易之曰不須也足矣乃往酒家取醉逕赴水中死餘可槩見矣郡縣雖行賑濟之法或煮粥寺觀中聴人就食然饑者多又為吏人所侵牟所得亡幾死者猶然是年田不能辟蕪穢彌望税不入有司復迫稔者代為之輸於是民愈困矣父老泣曰劉御史若在吾屬當不至此極也天乎天乎劉御史今何處也劉御史今何處也淚下不能己者乆之松陵野史曰嗚呼凶年常有也第有甚不甚焉又在當時為民父母者能援救之爾近世江南之災甚者無如景泰之甲戌成化之壬辰及今之辛丑甲戌慘矣當是時楊御史貢力請於朝原其税壬辰則知蘇州府丘霽實任之得從末減故雖災不害民至於今思之辛丑之災過於壬辰而不減甲戌然民死之多八九十嵗老人以為百年間未嘗有者何也特係乎劉公之言用不用爾盖彼二公者方在位力能行其志而劉公適丁其将去之時言而不及行也嗚呼公之心豈有異乎觀其所陳本末之言又何其詳且明也然民心之思劉公反有甚於二公譬諸赤子之去慈母罹飢寒者其情必切於飽煖者也嗚呼仁哉是以究其災害始終之變與夫公之所以為民民之所以思公者著於篇誅巫序史鑑吳江之俗信鬼神人病率不飲藥惟巫言是聴祀神禮巫之費殆不可勝計富者倒囷囊貧者鬻田屋弗惜也故其巫日肥而民日瘠雖以衣冠之家亦習以為常莫有悟其非者成化戊戌馮侯朝京師歸知巫之病民也以為不治則日深乃赫然下令名捕其魁得若干人悉置於法餘皆逃走出境由是邑中之誑民者戢矣嗚呼自異端妖妄之説興蚩蚩之氓狃於耳目之習利害交戰乎其中膠膠擾擾其惑也固宜而髙明宏博之士乃亦溺而信之又有口議其非躬蹈其迹甘心而不悔良由不達乎死生之理不明乎禍福之機而天理卒為人欲所勝故耳間有守道不惑者羣邪反從而姍笑之致父不得以慈稱子不得以孝名夫婦不得以義而與也其在乎民上者或昧而不能知知而不能䘏䘏而不能行者有矣宜乎其肆行而無所忌憚也斯正孟軻氏所謂作於其心害於其事作於其事害於其政者矣侯之是舉盖欲息邪説正人心哀民窮而憫天命其於死生禍福之説一不經諸心豈不真大丈夫哉諸凡長民者聞侯之風苟能推而行之則天下生民之困庶幾瘳矣某成童時嘗聞諸長老言國朝将置衛太倉大為屋以貯軍儲守期率民財有林推官者獨建議毁郡中淫祠足之嗣後數十年間惟陳侍御能去學宫之祠非以禮者此外無聞焉然則豪傑非常之人世何其少也昔覀門豹令鄴能投巫於河以破河伯娶婦之説鄴民至今受其賜而褚先生記之亦得附太史公之後以傳今侯之視豹其有異乎其無異乎安知吳江之民受賜不自今日始也但無為記而傳之者耳某故敘其事以俟有如太史公者焉陶宅戰歸序徐渭往昔松江之冦載道歳所擄掠航海而歸其留者尚千人據陶宅繞水十數折阻狭橋懸岸伏深葦以為險㑹浙福與南畿兩開府合吏士二萬人約諸道並入時㑹稽尉吳君言道險而逺須間道察虚實指地形令人各各曉暢乃始逐程逼以進主者不然之兵刻期入果敗越十日再入又敗然戰時君獨能令兩健足裸走視賊巢中望見擁諸兵仗坐屋角上二絳衣者知其草人也始縱擊賊殺六十人斬十二級復以身殿他道之敗兵以出其所部七百人無一死者若其再戰之日則以百餘散走之卒搏勝冦於險以已所乗馬脱兵備副使悉驅其敗卒使前獨瞋目斷後側頸顧而走引虚弓射却其所追賊於是兩府始賞君以百金而恨不早用君之言嗟夫世獨憂無善言耳然或有言而不能用或能用而不察言之是非大抵能言者多在下不能察而用者多在上在上者冒虚位在下者無實權此事之所以日敝也予嘗追憶季夏時君獨驅遁賊百人陷臯埠澤中其後府中諸公與之持乆余短衣混戰士舟中觀形勢知其必敗乃䇿戰守二事草既具復投諸匣中嘆曰儒哉儒哉獨無耳目人耶往冬王山人挾策叩轅門論柯亭之勝負如指掌無一聴之者其所聴者類皆兒童騃子之見而至瑣極陋之談乃卒取敗而悔矣今事且急府中數召山人與語其不聴山人者固如前而其所聴於他人者又亦如前也於是每拊髀而嘆乃今得聞君之事又拊而嘆曰吳君固縣尉然官也又數搏戰有明效言且不見用王山人未嘗試戰且一布衣耳其見棄復何怪吳君新安之巨家也以吏入粟尉㑹稽其為政慈愛敏斷臨財一毫無苟取至其提兵時乃反出其有以與士卒故士樂為之死而又多馳射劒槊占星校閱之技數出竒詭之計舎死為士卒先士又益恃之戰遂有功然雅好結名士居常䇿馬馳袜首十數過山人家論時事故山人於其戰歸也謀余言以贈之嗟夫使有善用君者以盡展君之才即封侯何足道哉白知序蔡羽士屈於不知已而伸於知已知已而不白非情也白之奈何曰表其虚德也豈弟也邂逅而憐恤也君子之愛不之其常親而之其所可親有由焉是故上之人不忘己則愛士之心恒不廣下之情不上達則伸於所知恒不易是故下之患每在於分踈上之患常失於自滿夫九卿之貴視下士階相逺甚然必揀金於沙者謂得天下之材不難於所顯而難於所忽也夫千里馬非王者之常御也然伯樂必請收之者以為良駿不至天廐之所羞也和氏璧非社稷存亡之要也然厯世寶之者以為玉石不辨廟堂之所恥也是故千金之使不發則千里馬不至寶玉犀香之貢不通則大駕明堂之功不成人品之銓衡不定則天下之材豈易各得其用哉古之君子用是虚心忘已再三致意也嘉靖丙申濟陽蔡羽守南翰孔目之明年少司馬闗右一峰蘇先生至聞其憐重人材不難於下士也通之以業先生進焉以為士不止業也每每旁詢之必欲得其為人或曰何蘇先生之留意於子有位者固應若是耶予曰不廣詢焉得其人彼将有考焉耳侯生云人固不易知知人亦未易也夫以帝堯之聖與四岳共舉一人不免失之試鯀故書曰惟帝其難之以周公之明且在至親不免過用管叔秦穆稱知孟明尤以三敗獲顯其賢吾得奉先生一載而見知亦已幸矣明年丁酉冬仲晦前一日蘇先生車入於孔目之舎左右牽蓬蓽負頽垣據繩榻坐定問曰子與長洲文徵明齊名文之薦由李梧山以林見素為之徵也何不至子羽曰林公訪士於蘇正以余二人並舉也或告曰蔡精於舉子業方圗来秋發科耳林公遂輟不言即其春與徴明同貢文為翰林待詔天下之士貢於廷者千二百人有奇羽得試居首用𨽻於南國子曰南司成何人也博陵浚渠崔公繼者甘泉公耳浚渠云吾方友子祭酒無薦人責其昉諸子乎疏不及上亟去位甘泉曰子近道講席子為長乎春試諸國子獲首舉曰舉子業真精其聴子畢志先生曰得今官何時羽曰前年甲午今渭崖霍先生在天官與冡宰汪公同掌選方秋比部試居首汪大揚諸老曰是固宜發解圍徹不利明年集選於部得預者三百人再試再居首其次得為知州府判五府都事推官知縣光禄寺丞下逮州縣之佐盡三百人獨虚首曰處以京職於是羽得南京翰林孔目先生曰吾嘗司選矣不如是也如子之應得其司㕔乎孔目雖清不得階邇年士得竒逢恩詔一嵗再至一階之士咸獲貽封子之不預非職是乎予初不自知但見紛紛之徒巧於承奉善結歡諸有力自忖已性拙乎是時復自慰及聞貽封之説歎曰人子孰無榮親之心顧紛紛之徒一叨至是孔目寂寂豈獨無親乎哉於是乎益信遭逢之有命也然古今是非得失惟借重名人一論足以伸其鬰結詔乎萬世孔目處寒不自知其寒猶魚相忘於水也得名卿撫而論之不足自慰乎春秋之榮辱人繫乎片言伯夷栁下惠不得與當時之大夫肩得孔孟之論馨香萬世太史公曰顔淵雖好學得孔子而名益彰故有蒼蠅驥尾之喻孔目蒙被喜言終身馨香矣公告以来月望日将考績羽既辱知遂白於下吏作白知序潞州貞烈倡和序王雲鳳我國家百四五十年矣治化浹洽民物繁富海宇熙熙干戈不用然文驕武惰上慢下頽㒺念人窮惟事貪黷閭閻之下怨咨相聞於是梟黠之徒呼朋嘯羣竊弄弓矢自知釡魚延喘糜爛必至大肆淫兇以快目前所過之地公私一空而尤以擄掠婦女為急庸将怯卒迂途避之凡再踰年厥勢益熾正德六年五月六日自青兖彰德西上太行至潞州之西火鎮居民走匿山林賊散兵搜索驅其婦女數百人有趙氏女賊擁致馬上女曰我良家子死則死誓不受辱則投地如是者三賊見其美不肯殺脅之以刃女舉止自若罵賊求死賊怒矢落其一目罵愈厲斷其左臂而死程氏者焦相妻賊牽之曰從我則生否則死程曰吾有夫寜就死不汝從也遂仆地不起賊强曵之程仰面背著地曳半里許膚肉綻裂血流滿道罵賊不從賊殺之袁氏女年十六歳與程同為賊獲見程死亦不肯行賊好言慰誘之罵而不從被殺平氏者王川妻賊迫之行見路傍一井謂同行婦女曰吾志得以遂矣抱㓜女投井而死嗟乎近世士大夫習於阿䛕軟熟以詭隨汚合為通才一遇秉正守介之士指為怪異不祥之物靡焉成風莫或自振虧閑爽操㢘耻衰微豈意窮鄉下邑閨閣弱質乃有知節義為美而挺然各行其志不與衆同若四女者哉是時賊中從来婦女不啻四五百人皆金珠錯落羅綺熒煌揚鞭語笑略無靦顔所驅數百人者亦俛首莫敢出一語四女平日非有姆傅教訓之素世家薫染之風一旦事起倉卒獨能却走於羣趨共赴之時塞耳於飴言甘語之誘閉目於腥刀血鍔之威必求一死之為安非其天資髙潔確有定守安能偶爾而為之或以慷慨從容之難易為議而不察所遇之事勢緩急不同則若王蠋嵇紹諸賢卒然捐生者皆将可貶必如豫讓之屢求殺襄文山之三載留燕然後為貴凡史傳所載拒賊遇害婦女皆不得與年老守節之婺比矣豈理也哉賊自西火南抵趙城北旋至遼州厯縣十餘自五月六日至六月四日出境未及一月四女之外不從賊而死者尚有二十八人自賊起山東已二年往來三四千里之地全節婦女耳中寥寥何三晉婦女之多賢也西火百家之鄉乃有四女之死何潞州婦女之多賢四女之死皆卓卓可書而趙女程氏其事尤偉袁女年㓜亦能處於死生之際嗟乎雖大丈夫臨難又何以加之初賊既去州人致仕宿州吏目仇時濟書其事以授其弟瀋藩儀賔時茂商於儀賓牛廷瑞宿以德栗廷珮郗宗魯白於部使者而疏聞焉吾觀今戚畹之家惟以撞鐘伐鼓沉酣歌舞為務而時茂五君者乃留意於扶名教勵風俗之事其志趣髙逺矣時濟去官家居實倡首焉潞之士風如此則其多賢婦女豈無自哉旌命既下五君作詩詠其事聞者和之積為巨帙将捐俸刻以傳而徵序於予嗟乎四女之死有闗於綱常之大五君之舉實為國家風化之助故為書之以待他日史氏之採録時茂名森廷瑞名麟以德名政廷珮名瑢宗魯名賢時濟名楫題柴望義士傳後張輔吾鄉郡有義士曰柴宗禮世為錢唐義溪人好修而尚義與前鄉貢進士括蒼金觀用賔相友善觀因父宦㳺於杭就僑寓焉安貧養母母死未克葬而以哀毁終其妻又繼殁子㓜三䘮不能舉宗禮毅然以為已責捐家貲治葬事其力不逮則告助於觀平昔交舊舉三䘮𦵏於觀之先塋時人咸髙其誼前滕縣尹嚴陵吳子立太史括蒼蘇平仲郡博士始豐徐大章咸為傳記以嘉美之其事盖與蘇長公合衆賻葬進士董傅父子二䘮相類而宗禮以一介布衣為之尤難也世俗恒謂今人不逮古人不亦厚誣天下哉世固有砥行好義之士特以人微事不甚顯又不得立言君子表著之率泯泯無聞予近閱太史公宋先生集得義士三人焉其一元都水少監豫章劉彬卿其友國史掾萬生客死於大興妻子貧不能歸葬彬卿予錢二千緡俾奉柩還南昌以葬其一國初諮議參軍諸暨王冕北㳺燕山時方南還聞友人武林盧生客死灤陽唯二女一僮倀倀無所依冕不逺千里走灤陽取生遺骨挈諸孤還生家其一太常贊禮郎廬陵杜環其父友兵部主事常允恭死於九江家破其母張氏年老走金陵尋子之親友求依無遇環聞知迎歸家以母事之養十餘年而殁具棺歛殯如禮買地城南鍾家山𦵏之時歳祭其墓凡此三人綽有古人風義向㣲太史公作傳世人亦無自而知之今宗禮之義事既得諸先達紀載而又有子益求諸當代聞人鉅公之紀述所以發潛德之幽光者連篇累牘他日秉史筆者必有采焉嗚呼為善無不報不在其身則在其子孫今其子車以文學𧺫家嘗參議藩政今為職方郎中駸駸通顯盖未艾也然則天之報施於義士者盖有在矣因其徵言并述砥行立名者得附青雲之士必有聞於後以為世之觀云至孝獲親詩敘王格修竹范子運吉既獲其父之遺骸於武當山中矣於是我京山人士竒其事相與為歌詩揄道之而題其帙曰至孝獲親王子乃為造敘曰范子者其先合肥人也髙皇帝初起有曰成者從之積功賜爵百户傳子興進千戸遣征雲南再進指揮遂屯䝉化子孫家焉自興至范子六世范子父寅字思敬自稱葫蘆山人少偉茂以能誦春秋屬文著稱既長補博士弟子員人謂青紫可芥拾而竟困躓弗偶嘉靖十六年以貢上於典學使者典學使者髙其第有不相能者以吏給事使者持其短譖之使者弗察褫士服候肄山人素剛負其能既遭斥辱不勝邑邑遂棄妻子拂衣㳺楚蜀間數年歸妻趙巳悲傷發病死山人益恚恨不樂家居徑去不返矣時范子為諸生牽裾止弗獲将棄其業行求之㑹當道惜其才留竣試事遂以已酉領雲南鄉薦第九人榜既揭范子與一子一僕號呼徒跣迹父所經至荆州乃滅更前到闕下初范子未舉也今致仕大司冦容菴應公撫滇所以奬㧞之甚厚及相見京師館之别室因其失妻許以女嫁之范子以父故諾而未赴癸丑春范子益悲思不自勝乃刻木述事本末摹紙且數萬仍剪尺帛書如刻語背揭之南下所至輒以刻紙張衢要見者鮮不酸鼻爰抵我承天從父東泉先生適以乙科署我京山諭范子因覲焉我京山人士素慕范子風節持刺謁門下者踵相接也范子與交禮語及父事輒潸然噤不能出聲於是京山士大夫尤痛憫之居頃范子将東訪父於黄鶴岳陽二樓之間㑹東泉先生以職事入承承人陳生者方外士也為言山人之事極悉盖山人初去荆則經承舎於陳者旬餘因敎陳以鍊氣術已而别去登武當剪髪習静於榔梅樹底與鍊師數輩相狎后陳以禮神至其地猶見之舉手相問勞比再往訊之則卒矣藁葬樹側范子聞之大慟冒溽暑走承連日夜不休遂與陳偕發細踪之良是至其處啓遺骨范子鑱膚血瀝之殊滲於是發䘮成禮而亞司空石涇陸公方有事其地聞而哀之為營祠碣范子則負其父歸葬䝉化有日矣嗚呼人之情孰有切於父子者乎宋朱夀昌我明唐士明之事古今所憐而蘇子瞻宋景濂咸慎許可者道之嘖嘖不置范子其奈何不幸而復有此遭耶夫山人本以豪士横被口語發憤遁走數萬里視棄其家如脫屣豈誠徉狂違乖龍蛇之義者彼其所取必有超絶衆庶而欲與周殍湘纍並迹耳斯不謂蟬蛻囂埃能遂其髙逸者哉然宇宙之大音耗隔絶范子哀訪積嵗乆而彌切精誠之極遂有此遇非至孝足以動天地感鬼神何緣致之余又觀山人之迹得自我承有如東泉先生不宦兹土則范子縱道偶出亦不過信宿旅寓如他闗城耳烏能從容纎悉若是乎故余謂范子之獲此也盖東泉之力多而東泉之能為北道主人其陰有相之者矣至乃陳生實郢産與東泉叔姪素無分誼亦能周旋旬月卒成厥美較世之淺薄秦越目人者焉可並論哉即是而山人之能涇渭人物不苟交識又足稽矣余不佞輒書其㮣為諸君倡其辭雖蕪其事則核范子固彦俊行且躋甲科都膴仕所以顯揚其親者未涯則是事在國史将亦特書而余之説庸詎知不為傳信之一助乎贈劉初泉覈田平賦何遷初泉劉公治寜國數月下覈田平賦之令又逾月而六邑之民各以其令還而報公焉其時嘉靖癸未春也始劉公来治寜國也田賦政不均官田賦重又價𣺌也民田大異是巳而民者利避官輒以為售而入於民諸所遺賦則官而貧者籍之而脫漏代輸之弊起焉於是貧富益異等訟獄繁興流亡日增睦讓之俗不行於鄉閭吏其土者盖蒸蒸然極矣劉公至問民所疾苦輒慼然慨嘆之焉當是時覈田平賦之令下在諸郡且轇轇議也於是劉公諭六邑各以其父老来曰吾欲為爾起百世之利吾欲使爾貧者興徙者還姦者不得逞為爾復其俗使睦讓也則如何衆匍伏前應曰諾劉公於是上其事諸臺諸臺咸是之乃下令曰吾欲爾民若士夫擇其人任之都耆里幾人司年司書司弓司計凡幾人吾又欲爾自實其田記之木年者書者弓者計者第覈而歸之事相稽衆不相謀也則如何衆皆應曰諾又下令曰山汙異壤湮闢異勢吾欲縮山之盈齊汙之常取闢之餘足湮之舊田增而賦不益則如何衆皆應曰諾又下令曰覈田不平賦曩其脱漏代輸而遺之来非計也彼稱官賦重是巳然民有徭也賦不稱是乎且賦定而徭方殷也吾固謂祛弊而興俗莫如一賦則如何衆皆應曰諾公曰雖然無徵則弗信兹役也吾且舉之宣城劉公語未畢自涇而下凡六邑民矍然走泣且泫泫下也相率造公之庭而請焉且首觸地呼曰公奈何後我劉公於是以其事並下六邑六邑之民既得劉公令於是分邑而趨析里而程計日而競傴僂徬徨各以其任相戒而舉焉於是實者記者達於任者知其至不知其人任者以記使校於弓者書者入其地不入其家年者計者歸而圗之見其數不見其状乃劉公時時出而慰勉之皇皇然瞿瞿然懼令之或亟民之不逮也居頃之六邑之民具以其事又走而造公之庭而報命焉公按之令盖甫踰月云楚中人吉陽何子曰古稱不令而行余竊心異之以為此至治之極也後世何及焉由今劉公觀之正身之義儒者之學豈不信然哉且均一之法乃自古而記之此法之至利者也田不均則貧者斃輸富者且斃訟矣賦不一則官者傷賦民者且傷徭矣此又情之共明者也夫以至利之法投共明之情彼諸郡者獨奈何轇轇而議也此豈民不可使哉古盖有之信而後勞夫信者非其令之謂也其誠至則其感深其仁形則其志附其觀豫則其望不回故曰其身正而天下歸之此所謂信可與硜硜沾沾者道耶是故風施而民喻色指而民從詞未畢而民争赴之神之應也彼所信於心者不可得而奪也不然硜硜而執沾沾而語民起而悖之吾見亦多矣況其行乎哉予嘗覽古今之變民不信上者類有患四焉務名飾功實則不繼益以毒民而無益此患一也志以才用任使失人即有惠利民無由被之此患二也情溺而勢撓更化之端適以階厲此患三也揆事未竟沮於異議使民怏怏而視坐失時幾此患四也後世之士托名賢豪之林非少矣乃正身之義於斯四者不能無幾焉及其後民既不可信而儒者之學亦因以病豈不謬哉若劉公者庶其得之矣諸臺中方泉趙公者雅知劉公者也予具是語語趙公趙公亦以為然已而曰劉公信儒者乃寧國之民明於從上而不可惑亦其不可少者云然予聞寧國之間其以講於儒者之學且津津久矣是故劉公至而民信之趙公謂寜國之俗善已乃予則以為彼所明於信上者非信劉公信其學也由是觀之儒者之學寧國之間盖可道而往焉予且聞劉公方以此學力行於上而又闢舎延師明其敎以道之予固謂寜國之間其俗必益善而治必益行雖古至治之極苐且於劉公見之豈只明於信上之義如趙公所稱者巳哉當劉公之令行也六邑中惟涇倡始之而涇嗜修而慕義視他邑為尤著乃劉公所為闢舎延師而教者乂適在涇也於是涇士趙某張某輩索予文贈劉公予雖未至涇乃儒者之學得明於寜國之間予盖樂助之也而又且知劉公故於諸士之請也不得辭軺弟倭變紀略題辭彭輅徃者倭夷變作蹂躪我吳㑹其焚燒擄掠之慘淫垢汚凟之辱予難言之矣言之則眥裂髪竪不勝忿且悲而涕蘇蘇下也痛哉吾民之遘斯辰乎冦名曰倭實則中國海濵奸豪習商販為業逰舶諸島嶼本以牟什一無他念有樸遫小丈夫建議塞海口拒弗與貿易彼既底滯折閱不得還其故鄉計甚無聊乃㩦倭之不逞工劒射者與偕憑潮駕風帆檣内犯傍海唇齒諸郡積嵗嬉佚猝然無以禦之武弁廕胄平居華衣躍馬耳不聞鉦鼓聲一旦望賊壘奉頭鼠竄惟全軀保首領是謀占募烏合之旅不慣擊刺汹汹然攘臂而往納豶羊於豺虎之口直趨死無一生急傳檄召處州山東之兵以客就主昧乎阻厄之地宜出入之孔道遇伏輒覆救死扶傷不給乃逺調麻陽栁州田寧各宣慰引兵来所過捲蕩凋殘而河朔各将無如宗禮霍貫道驍雄者呼而至如獲重寳乃不審機量敵皂林之役奮突而前孤㷀無後繼為賊所乗兩将戰死東南之事魚爛不可支督府胡公宗憲徬徨四顧無一倚仗不得己出下計以貨金誘賊遣人入其營説之而賊徐海號明山者果貪我餌宛轉縈縶帖息不得動解桐鄉圍以去海與其黨麻葉陳東異心因獻計督府誘而縛之為己功二人既擒其部下卒伍譁與海仇鬬海不能制督府於是乗其間餌益富和益堅海乃就降移巢沈家荘水繞四絶之地頃之我兵大集厚結其陣鼓噪而攻之海度不免沉水死餘衆殱焉實由天心厭亂窮刼漸復故海酣於餌蠱於翠翹碧桃二娼昏其智而奪之魄墮罟阱弗悟也督府因襲用誘海故策轉而誘大渠魁王直號五峯者㧞其藪窟根底直亦果貪我餌輕身束甲歸撫徐執而戮之鯨鯢殄而海波平皆督府胡公力也而抗疏薦胡者則視師兵侍趙文華微趙何以得胡微胡何以制賊厥後茂勲不賞一𤯝見猜萋菲妬嫉者噏訿起胡以憂隕趙追償軍前犒用費十餘萬籍其家而布衣士蒋州輩掉口舌入海探龍珠於不測之淵説王直以来者泯其功鬰鬱潦倒江湖間夫前事者後之師覆轍者来之誡恐他日任閫幕者遲徊顧望不肯畫一竒於繩墨外以取謗訕也故吾民患苦不在山海之冦苐願當塗諸大臣包荒有容忘恩怨選賢殉國天下事無不可為者家弟軺嗜問學訓里中兒躬被風塵擔書鳥徙無寜日深憤當事之憒憒也屯戍城邑委郭以外棄之捐吾民置刀爼上弗恤者為撰倭變紀略併賦詩以褒効死之爪牙障捍之儒宦暨甘心九死義不受汚之女婦語云傷於虎者談虎色遽變傷於弋者抨虚弦怖之墜而下此勒次之指也編既訖示余讀一過喜吾弟以草莽藜藿卑賤能景廟堂之烈軫閭井之憂所紀覈而諷戒隠焉與金匱並傳逺余之夷猶空食任時事闕遺散失弗述殊愧焉孔子稱匹夫不可奪志信夫敘燒餅兒萬廷言舟過磚河五十里有飢兒挽舟瘠苦涕泣不自勝予憐焉問之囬種也趙姓名四兒家京城宣武門賣燒餅父母殁依舅因獨身賣餅為磚河杠頭王龍以藥迷致當夫苦且懼死無由歸見諸舅語吃吃甚哀予曰何故不逃曰迷所向即逐得箠死矣詢之衆曰信乎衆懼王龍不敢言以意示不平状獨其中白㡌者曰我種類人即不識一見即親厚昨是兒語我故我亦迷来今老不知家所因感歎泣下予曰令女送兒至京何如曰不敢我不當夫即餓死且乆熟此若送兒大人去我亦箠死矣予聞而益憐之予初官西曹論獄多稱藥迷予謂藥豈能迷人不之信今果然亦異矣先是天津兵憲黄公遣人護予至德州予因與飲食費令致兒黄公所為書懇黄公轉送京師予父侍郎邸第中召其舅還之使業燒餅自活而更言王龍状於黄公因有為予言者曰此事傳遞中最多凡官募夫必有直杠頭者利其直嘗以藥迷致人子弟閉幽室中稍與脱粟飯剪髪垢面祼身令形體盡變易惑所向計即親父兄相遇不相識然後出牽舟已冒募夫之直逃輒箠死以威欲逃者謂之攔人江南北皆有焉夫此輩皆冒百姓不得已浚剝之膏血又塗毒人至不忍棄捐孤阨之子弟誠不容一日赦然士大夫往来利有夫則舟行速又非所司無與焉因置不問有司值地方繁劇簿檄日旁午下又不暇問故逋惡不特王龍受苦毒不自伸亦不特燒餅兒也予聞而心益悲雖然非予所能及也及吾所見者盡心焉耳矣顧其言有足廣予因敘次之如左孤憤集序汪道昆胡司馬有社稷功中憾者卒死請室今上畢録先帝故臣功状置司馬不以聞司馬藁葬山中諸門下士若故人無一至者沈山人為司馬誄則自四明走墓下哭之初胡虎臣及余二仲氏郊勞山人山人馬首東矣問曰司馬猶被此名以死山人哭者何山人慷慨言曰司馬功盖東南非臣一人已也往臣竊觀司馬多大度憎喜自如當意輒予千金不當輙嫚罵臣非禮弗食故千金不及臣然坐客多賢豪貴人司馬目攝之不為禮比臣在坐意獨屬臣臣居與居臣起與起其所嚴事者宜莫如臣乃今身殞而名不傳臣固未得死司馬所耳臣病三年矣孤憤上通於天天且為臣隕泣又明日諸君東望百里外雨霏霏自大鄣来此臣哭司馬時也厥明日出無光頃之雨至與語合於是山人過不佞相與登舎後山出司馬誄讀之四坐憤發不佞曰我國家倚辦東南不啻外府天祚司馬幸不蔑東南此所謂社稷功也髙皇帝以八議釋有罪必先議功先帝故嘗多司馬功死司馬非先帝意也即司馬亡論已奈何傷先帝之朋虎臣曰孤不肖嘗遇司馬前茅孤方引諸少年挾吳姬楚女履舄遮道呵者至曰客何為孤叱曰毋多言客髙陽酒徒吳守淮也司馬嘆曰嗟乎此吾故人子引車避之往島夷起吳越率以澤量人司馬提三尺劍全活之何論億兆及司馬不辜死卒無能發一辭非山人則皆喑者矣二仲氏曰凡諸功罪有主者兩生不敢知當司馬時彼人士莫不藉寵靈被恩澤司馬一旦受法則羣起而誹訿之顧嘗嫚罵我然今嗛嫚罵則昔抵千金者也幸山人出且為都人士一洗之是時也白雲起東海亘青天而西於是相與東鄉酧曰司馬有靈擐甲皚皚至矣二三子屬不佞揚扢其事則以山人所自賦若為山人賦者附之大司空南坦神樓序董份神樓者司空南坦劉公名其所繪之樓者也始公嘗語客身退且老欲遂經營一樓閉闗其中者乆矣而力不能於是翰林待詔文衡山告之曰吾能為公遂成此樓乃繪以貽公而公因命之曰神樓云或言公授神仙御虛乗氣之術而神樓者即海上神州仙仗宫闕之屬在雲氣有無之間此公所以志於神仙之道者也而予嘗觀公弱冠登朝歴郎署二千石以躋六卿所至治行卓異皆顯樹名迹持髙節正色以匡翼國家勲勞著於當世此皆廟堂彞鼎之事也及其謝休而居坦上方益與鄉搢紳諸老歳時結社從冠裳車騎歌呼宴飲登逰山川自郡邑牧守令長得以造請躬問所不及學者從而考德質疑鄉閭田野父老子弟得以伏臘往来揖讓就見欣然無絶之者此又非離逺於世不欲與之接而思海上者也然予獨疑所謂神樓者盖嘗謁公於坦上矣入其庭而蓬蒿映堂至榻次方丈之室户牖不啓其間忞如也予竊以公既不肯為他樓榭即稍治一畝之園列一亭灌名花雜卉彈琴歌詠其中亦有以自樂者而公曰吾非惡而不存也以吾慮營於物則是皆足以為吾累也予聞言而恍然及與之坐通夜達曙則言益𤣥指益徹淵然深潛四坐皆静俯仰顧視察其意皆不足存也予乃起而歎曰嗟乎公之神樓吾已得之坐間矣夫神者經所希載學者所不敢道而至人達士卓詭玩世所以震耳目而開人心使之誕謾恍惚失其常守反而約於正未必非教也故神州之説起自鄒衍莫不以為誣矣然衍當七國龍争之時縱横戰鬬之術勝國君以土地而魚肉其民士以功利而馳騖於世衍以為其習俗深而識陋未易以正説也故先極閎大之論作怪迂之變使人入其中窈冥不可考而原也而後所争土地功利之小不覺爽然自失於心此衍之所以為教也及神仙家謂海上神州宫闕雖後世附而益之然予竊意其初必有逺引髙蹈之士睹世益陋務紛華勢利以矜顯榮膠不得解故一切委之於虛以為别有天宫貝闕壮麗可悦之地非人俗所有而人必遺棄世味所好以清虛得之斯亦所以廣大世俗之心而化其見聞者也故其為教本同而其所從入之途人有省不省耳而學者一切屏之不敢道此與以耳食者何異公以世漸漬於末流與古益逺人方浮湛於俗益以卑下思得樓居以處髙明而與世相曠其實不在樓也故托之於繪以稱神焉昔漢武帝以仙人好樓居故用采五城十二樓之制築通天延壽諸臺觀以象仙人所居而秦亦起咸陽離宫屬複道以象天極冀以招徠仙人勞費煩矣而仙終不可得也今公以繪得之不伐材不聚工不待日月而其成若神可望而不可至可見而不可居可以意象得而不可以實求彼之役宫室而以為真者亦自失矣此亦公之所以為教之意也夫溷濁於俗與世為端者其心營於物也深藏固距築室而避人者猶有待於物也故遺世離俗棄物而自全凌雲御風以為訓者神仙之術也㳺物而不營超物而無待身處人間而其神在雲霄之上軼寰宇之表者聖人之道也公學聖人者也故方其早樹勲業而翩翩於進退之際功成而不有者此公之神樓也及其退居而與世親人得而親之而莫得而及之也此亦公之神樓也故人之見公也愷悌惠和雜以笑謔而其中所不可易者卓然巖立冠絶海内此亦公之神樓也其望公也𦕈然儒者而讀公文章聞公行事誦公道德或以為天人或以為泰山梁棟此亦公之神樓也合則雲從不合則龍蟠行不小拘言不蹈故與時委蛇無有轍迹此又公之神樓也故公之於兹皆聖學而有得者其事實可據如此而其托之於神以為教者又其餘也故曰公之神樓吾已得之坐間矣而或乃求之海上不已踈乎明文海巻三百五
