body:
  text: 明文海卷三百七餘姚黃宗羲編序九十八時文醒泉忩稿序劉繪學士大夫有謂今舉業無禆於吏道蔽矣夫吏倚法則難近以俗尚通則巧宦以能二者世指為賢吏道其居是邪考秦漢之後史傳循良自叔敖氏公孫子産不下數十人大抵贇贇多經學儒雅也今舉業首經書義固藝文之精奧焉括綜經旨浸漬聖術搜體遺緒撝衍微響非若辭賦歌詩猶可以騁浮艷侈枝葉也其業淳正沉淡不詭聖賢之訓則經世理物其機何所不逹哉醒泉黃君令息政本敦願以與良民親編户極貧卑皆不令畏憚而擾恭儉任恤導民疏清澮稼穡蓄蹄革筋角薪藁榻布欲百姓殷給而公衙待收貴穀重糈泊如也踰年氓力本業供上興作吏治不勞條貫燦然日引諸生論討經籍燕笑在泮息諸生以君起姚江振迹明經爭摳衣願從遊不去君以吏事辭乃出忩稿經義數百篇是時謝生謹段生中選孟生養浩皆君夙所拔雋與諸生誦習咸喜得大家鉶冶而樂其陶鑄丞程莊史田大禮感君德化捐俸偕邑文學廣德楊萬仞平山梁盡忠松滋謝燧鋟以廣其傳焉黃君且好文指授童冠不倦怡神翰藻騷雅書畫追逼前哲醖藉曠逸非所謂博物君子邪故舉業有真贋得其真者良矣彼法吏俗能吏巧世得文吏而裁以經術非綰組佩印之英也哉王季重小題文字序湯顯祖時文字能於筆墨之外言所欲言者三人而己歸太僕之長句諸君燮之緒音胡天一之竒想各有其病天下莫敢望焉以今觀王季重文字殆其四之而季重以能為古文詞詩歌故多風人之致光色猶若可異焉大致天之生才雖有能衆亦不獨絶至為文詞有成有不成者三兒時多慧裁識書名父師述之以傳注帖括不得見古人縱橫浩渺之書一食其塵不復可解一也乃幸為諸生困未敏逹蹭蹬出沒於校試之場久之氣色漸落何暇議尺幅之外哉二也人雖有才亦視其所生生於隱屏山川人物居室逰御鴻顯髙壯幽竒怪俠之事未有覩焉神明無所練濯胸腹無所厭飫耳目既吝手足必蹇三也凡此三者皆能使人才力不己也才力頓盡而可為悲傷者往往如是也若季重者五嵗遍受五經十嵗恣為文章二十而成進士蓋一代之才也而天亦若有以異之者大越之墟古今冠帶之國也固巳受靈氣於斯而世籍都下往來燕越間起禹穴吳山江海淮沂東上岱宗西迤太行歸乎神都所逰目天下之股脊喉腮處也英雄之所躔美好之所鋪咸在矣於以豁心神紆眺聽者必將鬱結乎文章而又少無專門承學之間靈心洞脫孤逰浩杳蚤為貴公巨人所賞聞所未聞出見少年裘馬弓劍旗亭陌道之間顧而樂之此亦文心之所貽佇也身復蚤逹曽無諸生一日之憂名字所至贊嘆盈矚故其為文字也髙廣其心神亮瀏其音莭精華甚充顔色甚悅眇焉者如嶺雲之媚天霄絢焉者如紅霞之蕩林樾乍翕乍辟如崩如興不可迫視莫或殫形大有傳疏之所曽遺著録之所未經者矣嗟夫以一代之才而絶三者之纍若此不亦宜乎其為古文詞詩歌又何如也雖然才士而宦業流通亦無以周世物之容而既以當塗令髙第為郎矣復抑而命青浦青浦故屠長卿所治縣也長卿既以此出大越名天下而季重書來乃更以歸休讀書為懷夫季重固己讀書矣凡為若談者當亦有未盡其才之嘆耶然則天之于季重誠若有以異之無巳也夫汪明府制義跋黃道周天下城郭居廬通率在於平阜制柵巷塗軌使車馬雞犬無異也至其王氣所導奔會絡繹萬人所都必有千出之峰登舸遡瀾疲車頓走而市㕓稚子畫其步隅以為函蓋居處如是者此髙人長者之所大笑也往為孝亷得從計車循漕道走京師見江北平陸如行袵席羣頭巾相告謂江北率無巃嵸者既稍走諸旁輔凡諸山川盤欎舒吐甚於江南乃大悔以為蚤瞶今士子見先輩作文章方圎平直謂是無竒者蚤瞶然以為萬家之郡無一出之峰遙望巃嵸詆為山野則是萬里沙陀與砥矢爭道也甲乙之間僕在詞林項水心先生文譽譟海內僕得共往反數日間談諸文章奇正利病如岡阜都邑之有結作起伏跬目所限不得相非先生略不道但云通都大郡無巨儒名公介夫貞婦此猶之三家之市耳僕唯唯心然其言今又十年水心始自得士僕困於叢棘無所見知但從田野讀邑父母制義勸誡子弟因得復誦水心之言水心以為至性之人熱血欲灑託大當重必有可觀由是而思言無至性雖嶔崎歷落冥摉窮縋猶從鬼穴捉鳥道見光僅喜而己况遵鴨畔立雞棲以為動靜晦明不爽咫尺者乎汪父母世家新都新都山川竒奧壓宇內人多巨儒名公介夫貞婦之所簇舉余嘗一至白嶽食頃輒去作數日思再登黃山窮數日不得首尾乃慨然興嘆以為是徽國所以挺出鍾陵所以逶遞也而市㕓稚子顧畫其步隅以為是神明之所卜度髙人長者之所大聚則雖日聆水心之言誦彥輔之書尋行數墨仲規屈矩以求當於函蓋重大之務則亦罕矣豫廢久不談文事又素以愚著無所解于世之論服強復談之知其無當也明文海卷三百七
