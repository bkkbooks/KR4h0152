body:
  text: 明文海卷三百八餘姚黃宗羲編序九十九時文詩藝存玄選序胡胤嘉余觀仲魯之名詩而歎其深於詩也夫詩異於文也味之躍然於胸歌之欲溢於口而解之卒不易解水中之月鏡中之花嚴儀氏倣佛言之矣今夫懷人者矚于其目致於其心感而落涕勞而咳呻久之而時物之變遷夢寐之恍忽皆仿佛焉躑蠋焉何無己也及見而感者忽散勞者忽暢而意己盡矣不見之妙於見如是也詩之為道所最忌者長言咏嘆而意先盡也故理窮於易情窮於詩法窮於春秋非以能盡為窮而正以其不必盡為窮伏羲氏畫卦有象而無文故苞理極風雅頌有言而無説故懷情深聖人作麟史亦有案而無斷故用法曲此三者所以為聖人精微之書也詩莫善於唐即一代而具初盛中晚之變三變而益下豈後之才減於初而造意之不工惟其才愈拓意愈工而附才與意以俱盡初之渾渾盛之莽莽至此無餘矣皮陸之幽險李溫之怪艷幾欲破天荒翻地軸軼正始而上之而詩以是晚故余嘗語朱原信曰中晚之無詩不以其靡而以其盡也今以詩為文且為今制藝之文其能無盡乎然余所為不盡非韻短音微之謂也含情於無窮雖極之百千萬言而其不盡者自不可盡老氏以玄為衆妙之門玄非不妙而不盡於妙故曰玄者暗也默也所為藏之於不見者也仲魯刪詩而名之以玄是得夫不盡之旨而寄焉者豫故曰仲魯深於詩也自序鄭之玄陸放翁於自巳詩文動云娛憂紓悲放翁一生自家受用巳極古人實歷所到往往不能自己觀放翁詩文不但豪氣縱橫使人拍案而起有真情有至性一種快心之談在筆外墨外當拂鬱煩悶時讀之真有消釋解散之功故開放翁之帙亦遂流連一覽而不容不盡此文字之快境也制義之業戔戔無當但有此物即有此物之聲價有此物之嫡𣲖逢時之儒髯枯腸嘔至於皓首一生惡趣幾為苦海快亦自難余於此道初不甚理理不求深思不求奧不宗大家不談元脈茍出口取適而己是故膚淺合離之病一一自知然或於無人處自諷之則亦時囅然而開口蓋惟不求深不求奧所以不至於攢眉自苦而惟不宗大家不談元脈所以一意不為深奧少年才情頗活得文之候多于微醺於獨步于偶閲他書于將寢或夢覺索筆急書微有可觀而入社拈題對壘靣壁則決不得一快語往在京師與諸同舍談文各為一評而余自評謂如人家尋失貓子平日覔不得有時還自來其來亦可喜諸同舍莫不笑之公車數載筆墨愈狂至親相念者勉之以入時之文勿令淺癖徒逢已意毋論豫必不能即能之巫師禹步自憎靣目真性情都無復有卑竟我自作我矣凡豫前後所刻有科頭亂髮求巳一快者而亦有俯首受八比之令茍且拂巳而事人者文章之道不以自快而從遇合立想豈不悲哉因遣人重録一過盡芟其巳意之不堪者非謂娛憂紓悲足盡于此舉十年來不能快人之業付之一焚或遂如劉蛻盡封之梓州未忍也塗瞻生制義小序鄭之玄豫與瞻生同時得雋一十八年于兹矣其時壬子之才蒸蒸甚盛瞻生白晳茂美其人特妙制舉言清灑絶塵其文尤妙中原旌鼓未知與瞻生孰先後也俯仰之間遂成往事曩歲見瞻生於長安衣染京塵白晳如故今日復見瞻生寄至之文則緻堅理密入之不膚出之不棘造詣渾成將大有所償為吾黨之後徑無疑矣武夷之茶妙于天下渾陽之酒妙于七郡幔亭往來乏絶茶既不可常得而海氛為梗酒舶俱斷豈非懊事今瞻生之文乃能自逺而致是何當摘茶洞之旗槍出春瓶之玊帶相與口嘗而舌別之不能無望于瞻生矣明文海卷三百八
