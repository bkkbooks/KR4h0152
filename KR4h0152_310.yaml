body:
  text: 明文海巻三百十餘姚黄宗羲編序一百一時文刻因是編序甲子四月馮元颺天下之紛紛也以是非之多予欲一之則固不能一之不能一之而必欲予一之則請無言非而專言是盖以予盱衡天下少有不是者也豎者是人横者是獸上者是鳥下者是魚專言人則豎者是鼻横者是眼上者是頂下者是趾倒生者是髪順生者是髯吐於口即是言語寫于手即是文章有韻即是詩比于絃板即是曲傳于經譯于書具一承破起結即是時義中式進呈即是墨巻程文付之人即是二十房即是詩六房無分于施嬙嫫母麗姬敦洽毛曽夏𤣥安仁孟陽也無分于殷盤周誥秦碑漢疏八代衰而宗元腐冗也無分于漢魏六朝初盛中晩陽五張尤李赤也無分于秦青韓娥漢卿實甫絜傀儡歌踏踏也無分于瞿唐向顧三家村把筆冩倣學究也彼亦一是也此亦一是也因其是而是之少有不是者也然則今之詩六房真是矣其一百三十六人自是之其主司交是之其天下人目論耳食羣然是之而予烏得不是之則命之曰因是不可乎或有非之者曰是則是矣曷為文有中不中中又有選不選選又有行不行耶予黙良久曰如君言亦是也陳昌基時文叙馮元颺蘓子瞻論酒自云不能飲而好飲天下皆無在其上者僕之于文亦有云然天下之好論文者而不得論文皆無如予者也毎見時人或治詩古文與一行作吏率厭棄嘔吐時文不復道僕每不然之詩古文正與同原一致即吏事何所相妨彼厭棄嘔吐之者亦所謂明公未得酒中趣耳予浮湛諸生孝亷中二十年頗極研筆勞苦既釋褐為工部日夜散籌計土木功乂不暇及此于時庚午粤西當有分較之役當時將以命予予以僚友有李愚公先達在不敢先之而辭尋乞假歸久之還朝補春官當事者以例當出初擬使視學他郡國不果使備兵東吳逾年改視八閩學政于是解胄束圖書就道矣以兩臺謬許請久任遂奉俞㫖中留已聞閩中士多有喜予往而恨其不果者又明年以復社事被謫遷而去閩中益以不蚤得己為恨盖予平生好論文而所遇往往不得論文其蹤跡畧如此憶前在禮曹時予所司故郡國學政較閲天下諸學臣試巻獨見山右袁臨侯憲副衡隲精昭即位置次第一一有意髙下無爽心竊嗟服以白府主請遂考為天下最因退自思得為試官當如此矣己奉閩學之命不覺十年見獵心喜謂此行也閩雖士之淵藪乎要當竭澤取之所不杜絶一切孤立行巳意者非夫也忽被停奪真有鳯凰池之歎至以復社故謫遷乃差自慰曰不得以人文人士為功又幸以人文人士獲罪足不負平生懐来爾閩中陳子昌基予二十年論文之素交也寄書與詩譏予予報之詩非闗有意貪鱸鱠只是無縁吃茘枝昌基又報書曰公不来閩是為浮丘公不使相鶴九方臯不使相駿也此見譽良過矣彼二賢者予則安敢然以予之好論文而不得論文直是楊妃不使吃茘支耳昌基有時文一軸走三千里函寄使予論之八閩人文人士之美故不獨茘支既得吾昌基盡在斯矣茘支以君著作紫為第一品如昌基鮮新雋腴竒怪之文大小紫不足為其味也巻軸却還眞乃三日手香一生快飽予行雖不至閩每見昌基信至得其書與詩與文輒當紅塵百十騎來也時文易題辭陸符厯律䜟緯壬遁方技皆易也不可謂易之至然精數妙術類足盡易之神而明其道于不廢傳註義疏則所謂傳道而授業者紫陽本義其一家耳後世有集大成之言而吾國家遂定以試士然兩祖明詔勅舉子得雜用程傳註疏載在令典於四書五經又各纂修大全列之學宫聖明度越誠不欲專私家學以成經術之陋也後之攻易者狎其捷徑便于取世資而工于投拙目章句櫛比附會而縁飾之䕶其所短文致其所未備父課子受師傳弟習旦夕簡練以需其一日本義之學濫于時文易之神明至此而遂窮則常為之昌言曰厯律䜟緯壬遁方技有易耳時文直足以亡易夫易安可亡哉黄楚望以經學著稱勝國嘗欲取近代理明義精之學用漢儒博物考古之功加之精思非盡悟傳註之失雖欲投契其道無由至舉二經則曰易欲明象春秋欲明書法吳臨川喟歎以為前無古後無今今之索解為時文者不然蹄筌之説痼于輔嗣互體之學黜之馬鄭易象神明若以詩之興體蓋之迨乎孔翼則簡陋因仍割裂猥瑣吾師五十所學神明一生而果如今言年可無假編可無絕亦安所謂妙㫖不傳戛戛乎欲其精思而投契也哉易不可亡而從此索解吾必以為啽囈而不可信矣余家世受易少好殫思率有孤明人驚匪制常取諸家義疏離合折衷及考之朱子晩年絶不滿其易義而著述于語録大全者每多自髙其常説至余所謂孤明匪制者叅之前儒其所引觸十常八九兩載以來俯讀仰思常得百十數條因欲取制義崖畧勒著家言題之曰時文易藏之家墊閒時開看不以示人極知無當世法而特為之者將以伸時文亡易之言庶幾一日懸之通都大邑使有識者廓然于一代𢎞文萬心的射明經用世之業斷無不得與偏門技術旁魄而上下之事理則又退而思之傳註義疏人人自謂盡易而易之神明卒不得盡朱藍樸斵鼓吹羽翼與天俱生與人俱出百十數條何得便以盡易茍足盡易何必百十數條因簡所録得五十六首曰可以為時文易或謂之曰所號為時文者將以與時浮沈衆歎以為必識也彼父課子受師傳弟習旦夕簡練以需一日者豈知所謂經學傳㫖精思不傳也哉余曰厯律䜟緯壬遁方技世豈必數數知之其精數妙術可傳而不可廢夫固有在此不在彼者矣時文易書後陸符蘇子瞻嘗言三代之衰學校廢闕其所猶賢乎後世者士未知有科舉之利其言語文章雖不必皆通聖人而卓然可用無不出于意之所謂誠然者故于廷試策士見舉人阿諛順旨率得上第憤懣因擬進士對策上之表云科場之文風俗所繫且曰上將推廣聖言庶補萬一下將開示四方少救風俗子瞻豈不知擬對之策必無補登録哉茍于聖言風俗毫髮禆益尚不憚冒諱以為之科舉之濫至于時文利之所在靡然成化時文易之于經學世風何如也可以其無利于科舉滅没而不作乎王儉曰易體精㣲實貫羣籍豈可專據小王便為該備虞集亦言聖經深逺非一人之見可盡試藝之文不得先立成意推其髙者取之通人之言誠非好異矣文者載道之器也修辭立誠則易固言之晁董公孫之流漢之所謂儒術也其文辭皆不能無科舉之累揚子雲著𤣥擬經可謂亡其累而稱載道矣然好以艱深之辭文其淺陋誠然者果若是耶顧以此語今日時文則舉不足望涯際而一以逢時一以矯俗非其器而往往有其弊焉子瞻之易傳未必皆易之至也註疏百家卒無以前之者其文妙耳其文妙者言語文章不必皆通聖人而卓然有用于當世夫易固開天之書而佑聖之學也其體精㣲實貫羣籍則固非文不闡非妙不傳而非誠然者則無以卓絶乎前後余之為時文易也嘗從其誠然者求之矣茍有能讀者即驚其理詫其意以為决無當于試藝而不得不迴翔于文情章法頓挫唱歎之間蘇子竄海外因先志成易傳常幷所撰書論語挾以渡海阨于合浦夜起徬徨撫之喟然而曰天未欲使從是也今日必濟子瞻亦安能信其終必濟哉誠然者其必不可沒耳誠然者必不可沒時文易之于經學世風何如也可以其無利科舉滅沒而不作乎哉董筆公文稿叙陸符余從去秋輒自詛行當此身眼不識一古文奇字手不更操一雜作惟日取逢世帖括彊記便讀使心口手從此脱換以酬舉肥之目乃吾友筆公方刻其一二藏稿質之當世以序見屬遂不能終守其戒蓋筆公之文與人于當世識者吾固願其出與共鑒之也則亦言其為筆公者而巳筆公為人豪舉通俠夷脱世數心厭塵雜常獨居僧寮購茀地葺為精廬竹忩蕉几蒨深窈窕偃息其中刪誦不輟舉業之餘間以詩酒自娛散髪箕踞白眼長嘯凡伏謁迎塵邀作聲譽即深自引匿惟恐若凂其人本末大都率行巳意故其為文亦皆蕭散跌宕超出纒縛洗滌名理吐𠻳靈心所為文如其人天機最深茟公之為茟公余所能道之者此矣今國門行稿大帙懸布讀其題叙人人皆當命世固非失時從事者所宜言至一時輩流狂惑失性鞅掌名士負販聲價社刻忩稿刋布闤闠竄取海内名勝人物姓氏張大交遊未嘗識面把手撰造評跋若最親暱每一文出比擬題唱左氏公穀韓非吕覧管子淮南莊騷荀列司馬班揚以至唐宋大家非曰逼眞輒謂過之且不問左氏而下作者之業凡得著見今世其經營成就代不數人人不數作莫不涵負天地研極性靈以得斷無繇今之世盡槩代操觚之家人起而兼擅之且起而兼擅者乂不必如著書論纂所謂古文辭其業而直欲備見之于制舉義之理即此矜躁誕妄横據胸中巳不足復語文心變化矣尚何暇與之議論長短失得哉董公仁當西漢之季曹魏之初竊歎年少不以學問為本國士不以清修為業合黨連羣褒􅏺賞戮附已則歎不容口不附則偽作瑕釁歐陽子之稱尹師魯文章曰簡而有法以為六經惟春秋足以當之又舉其學問曰通知古今此語必求其可亦曰當惟孔孟今黨所附而讐所不附者其滿口讚歎使許終身所作曰簡而法而不許其學問通知古今必以為輕薄之甚而不知隂以孔孟六經纂亦非當世有識所肯許也余誦法歐公而茟公亦緬懷先民心誹流輩之所為故余之叙茟公也亦言其為茟公者正欲當世有識知狂惑失性之時尚有孤心髙寄如其人而余之毁戒操作稱道同心亦不至盈口黨附以為觀聽者欺飾庶幾無愧歐公而且勿貽公仁所歎然則人與文必如茟公然後刋布稿草贄投當世乃無不可也甲戌立春後三日書于環堵之齋閣且就編序陸符西安余式如癸酉之秋余相見于南屏出手業見示頵然未易才也落落別去今年至武林又以近作投余名其編曰且就余曰何居嘗聞諸曽子曰且就業夕而自省役身以守業君子之志事也余避席而歎曰此士職乎昔者先王使有司令于官府曰各修乃職其修此耳式如以為今天下尚有知日夕焉者哉不知有日夕寧復知此日夕所有又安肯役役于問學徳行若官守者之各效一職以是為守業也吾見連帷接席然膏繼晷者有矣飽豢時物以弋獲世資目方眩于訓詁之駕説心重搖于紙冊之鈴言一旦通仕籍號王臣胸臆間時物酋老朽頓于無可復理之地其所據為業者非天下之故性命之理也纎趨黨譽誷上陳功營求尊便封殖田舍鞠躬負墻以交貴勢軒睂吐氣以傲同人旦晝昏于醉飽漏夜困于姬孌望榻而寢不知夕何省見曉而起不知旦何就學士大夫之失職至今時岌乎亦曰殆也矣顧欲與之談古君子盡職守業之志事日掖羣矇而號日月之升恒也亦何益哉古之君子朝而受業晝而講貫夕而習復夜而計過其役役于省其身而不敢即安者凡以守業盡職無玩愒此日夕耳從是為卿大夫其考職謀政序績庇家供其所職取諸家修而巳裕便閑習利雖極鞅掌不以賾動厭亂相揉挫天下始皆尊仰士職而天子亦得收其贊佐宣導以暨及乎農商百工輯敉乎州閭族黨師師惟時理道淳備而福祚隆阜豈非大業之所就歟而要皆無當于今之時物也守不時物之業吾幾幾為式如慮之矣式如質性淬敏經史百家記問淹洽凡輿地氏族兵刑醫卜之書人所庋置不復觀道者式如不特流覽率能條理始末考究研討蓋博而約守古人修舉職業之方大畧兼備且好修自立髙視人物之表是克就者業内省者身斯其人豈日夕貿遷化居而去吾知其視隂惜晷計過即安懷古人之用心與晦明風雨相將于不自巳者非今人所能企而就也即其搖筆落紙雖一時命世之業備古人立誠之脩以是名編可謂能尊行所聞以克舉厥職式如之成就又豈飽豢時物者可測量而項背焉者哉今上旁求經明行修之士相與解蹇極渙而學士家率以虛聲浮氣矜許相應意主于居業而不知其失職巳甚至有意氣激昂名節砥礪而大閑一虧文德鮮懿率為側目者盱睢之待為當世有志行者切齒而怨讐因之以恣譏笑此亦未嘗聞曽子日夕就省之訓而以身徇物者耳昔孔學之傳顔以黙識曽以唯聞盛徳大業未墜一支此不特斯文之任抑亦吾道之責也舍式如何修而得一拭目也哉二江山中草叙失名横山在武林極西溪山隈隩氣象邃古吾友江道闇築室移家讀書其中從弟道禹隨而比業焉余絶慨慕之因怪今時人士疾走聲價喘汗交屬魂魄寤寐幾不自有而二江幽居坦步畔散人表浩然以養同心而言抱持深心吞吐毫素所謂塵垢糠粃猶足陶鑄者也况以之參發聖賢而抒冩其性情也哉凡今人人稿草家家剞劂結社列門戸談文如訐訟學士撫揣應制之資至挾為招搖排擊之局觸目睚眦迕之輒裂横胸機穽蹈之立陷譸張科讀傅㑹功令大言濶論以撼當路矜躁為名因而漁利直欲撓執天綱鼓煽流俗昔東漢之季氣節文章相奬成風志髙維世昌俊顧及之林始以標目清剛繼且逋逃隠匿清議簒乎官方士論軒于王憲巳啓羣奸分裂目無朝廷之漸信乎士風匪細世運所出茍懷同舟遇風之心稍知覆巢壓卵之勢當必不忍以天下大事供一巳恣睢者夫訟者師之始也故曰作事謀始又曰訟不可長今天下盜賊横流蔓延不治國家宵旰多事盱眙安攘方且申勅制科鼓舞人士思得一道同心出相倚庇乃兵心時見于文事鬬氣日長于同人巳事之鑒徒資虚語顧安得人人如二江保有此空山以收招魂魄休息寤寐逍遙六藝吐𠻳百家而和平其音以要神聽乎如是而天下友朋不膠漆獄訟不衰息干戈不偃戢者其理道皆虚誕而載記為妄作也其然也耶夫庠序為風教之首人士乃民庶之望心術則文章之本舉世之士狂惑披猖忠孝節義經術事功口不絶談手不絶書徒知起而校其術不思退而考其心亦可謂浮偽之淫濫矣反浮以沈黜偽以眞則山中之人始足重于當世也夫士登廊廟者猶不可無蓑笠山林之志吾豈定山中必佳士特當今人士所少者正此志耳士而徒以養交宿名乘風張羽不極塗面汩心不得底止心所變相必至狡而駔儈靦而優倀隂鷙忍詢而婢妾圉𨽻甚而距踊冠幘齽齘刼人以潛肆其為莽為簒其為師始兵徴有不可知者于世復何倚庇識者竊鑒前事惟恐其殆或甚焉此豈盛明所得而宜有哉且夫國家而果肝眙安攘思以風厲庠序則傚民庶正心術而一文章也舍山中之人亦何賴乎因是以為二江山中草叙明文海巻三百十
