body:
  text: 明文海卷三百十一餘姚黃宗羲編序一百二時文徐廷葵燕中草序李流芳余與廷葵稱同籍者十年虞山疁水相去二百里會晤頗疏丙辰之役同寓顯靈道院比鄰往還無間朝夕始習廷葵之人與其文廷葵外渾而中朗其文之清堅沉厚亦如其為人冬寒夜長時與廷葵擁罏篝火相對論文旁及身世之事刺刺不休或至申旦所居宫中有兩傑閣每雪後朝曦輒携酒登眺攬西山之秀色及大內宮闕之壯麗偶有名酒必相呼對飲不醉無歸蓋余得廷葵不覺身之在逺而廷葵亦謂比來幽憂之疾得余始為豁然遂能日進一斗斯言不虛也無何兩人俱被放廷葵先出都余棲遲邸中舊歡都盡每出見新貴人雜沓長安道中輒自念生平好尚迂闊於公車之業不肯細意入夢青山便當終以自保廷葵草年苦心其人與文清堅沉厚皆合福德相而作此寂寂人事無定豈復可論乎方今世人眼孔如豆附羶逐臭賢者不免友人方孟旋嘗與余相顧感憤今年孟旋既得雋且盡收氣類中下第者得數十人之文刻之都門而句曲張賔王每下第後輒定為元魁名家索新貴人文竿牘遍長安紙為增價兩人意致相反如此嗟乎余與廷葵之文欲以何向耶余不能定廷葵之文回環再過但覺往時寒風密雪擁罏髙飲光景颯沓紙上是不可以無序遂序而歸之丙辰六月立秋日明文海卷三百十一
  hash: sha256:5fb393e968fb37b3aeff2a2d4e68cc50fae5dd0fe3e5df42939daf3d258f1898
