body:
  text: 明文海巻三百十二餘姚黄宗羲編序一百三時文半舫齋稿序章世純吾友劉士雲既刻其近藝若干首巳序而傳之大約謂文有至分而世之以䋲墨相稽者固不知吾深㣲之所在也雖然彼且以䋲墨規我矣而吾所以應之者未嘗衷於道而徒以文相譏則世之相笑豈有既哉故予再為之序曰治古之世道德一風俗同其人自朝廷邦國守土食采師臣素王與夫山林巖穴農夫婦孺其人無不學而其學無不本于道於是乎文行於其間自陳謨矢訓作命敷告銘器命物與夫聘好問答討論講説閨詠巷謡之撰述其學既本於道而其才又足以見乎其詞雖無意於為文而髙深典麗終非後世能言之士所能及士生其間者雖或其才未必能見乎其詞而以其有得於道則亦有以知本末内外之分而不惑於偏曲駁雜之說則先王之教有以使之然也周衰學廢老耼莊周楊朱墨翟之言盈天下一時聰明才力之士中無所得而外刼於敵莫不喪其所守以去然吾嘗讀其書其人率沉勇精悍能成一家之言士卒然遇之而喪其所守無足怪也制舉業之在今日其堯舜禹湯周公孔子之書代之而為言則必皆堯舜禹湯周公孔子之言其學必本於道而其才之著乎其詞者必使人恍然見三代之遺而後為無愧隆萬以來一變而為老莊之虚誕再變而為秦漢之駁雜則吾猶無譏也有小文夫焉欲去老莊之虚誕而併無其精㣲欲去秦漢之駁雜而併無其雄深其所以代聖賢之言者率皆委巷之中講師腐儒之譚論卑而氣弱不能窺聖賢之萬一而以其說之近與夫為之易也則亦能鼓舞一時之士而使之從雖然彼不過靦然而為人師以營其衣食則無與吾事焉巳矣所可怪者有大人君子反其所為其幽取諸易其渾厚取諸書其風雅取諸詩其總核取諸三禮其比事屬辭取諸春秋而又能本濓洛闗閩之㫖御諸百家之才以暢其所欲言其髙深典麗雖不能與三代比隆而要非秦漢之士能言者之所及則雖先賢復起不能易也而是小丈夫者又從而咻之夫取通經學古之言與委巷之腐儒較其取捨亦易明矣而士茫然喪其所守者又非若晩周先秦之士遇老莊楊墨之雄而刼奪之也計其人無深逺以自存無文彩以動衆而聰明才力之士亦羣而趨之何也意者其偷懦庸穢之說便於淺𠂻薄植者而不覺其附和之衆與不然則其人氣力足以動上官能毁人能譽人而聰明才智與夫急於功名之士違其心之所明俛首而事之雖知其非而無可奈何也嗚呼以委巷腐儒之說而欲盡廢通經學古之言此堯舜禹湯周公孔子之罪人歟劉士雲本世家子生綺襦紈袴之間能盡屏聲色狗馬之好而從事聖人之道其於聖人之精㣲既已得其本末源流之自而其才足以發之其為舉子業原本詩書禮樂以御諸子百家之變者可考而知也其髙深典麗既非後世能言之士之所及而其卓然有以自守則雖晩周先秦偏曲駁雜之言所不能動而况於委巷講師腐儒之譚欲以繩墨相稽亦巳過矣夫士雲所守者堯舜禹湯周公孔子之繩墨而非委巷講師之繩墨也彼既巳為堯舜禹湯周公孔子之罪人矣而吾友大士徒以文章離合進退之小技與之相爭於繩墨則是捨其大而諍其小也盖昔者宋之先有五季而唐之先有六朝其文於聲律句字離合進退其繩墨可謂嚴而文之卑陋亦已極矣韓子歐陽子始盡削六朝五季之習而以六經之文為諸儒倡天下後世翕然宗之夫韓子歐陽子之文豈以無法教天下後世哉盖韓子歐陽子之法非六朝五季之所謂法也今而後有借古文辭之說為舉業之說者不言六朝五季之䋲墨而言韓子歐陽子之繩墨其必自吾士雲始也太行程生文序章世純天下有無與于兵而情相召者二文章太盛兆於兵端富侈已極兆於兵端今科甲莫多於三吳而刻核為文章則幾為舉世之事向見房選盛行邉方慮非佳事不幸億而中遂愈信所見今讀程生文猶是慮也程生所處邉諸侯之地用武之地所矜一飯斗粟強鎗勁箭一冲一撞之人而此以文著矯厲壯浪倩動飄滑其色也天而其質也地一住視之驚為吾黨之尤秀余固為程生一人喜矣然不能不為天下憂也喜則必其取功名如寄而憂則有如前所云者如太行以北别有武幹雄俊之人而此為别調與夫程生胸中别有兵才而此為外篇可以無論不然文秀之尤力且舉俗一人之文將為一國至以國舉而可懼者至矣舉問程君自君而外尚多有如是者乎抑有一無二者吾以論世也明文海巻三百十二
