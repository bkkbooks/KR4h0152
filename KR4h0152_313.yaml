body:
  text: 明文海卷三百十三餘姚黃宗羲編序一百四時文王子雲制藝序羅萬藻豫與子雲臭味三十年矣於是乎僅再見見復但作氣槩語絶少寒溫或彼此不能具一飯竟别兩人交道於古人何等也庚辰之役豫罷試道金陵子雲乃以乏絶不能赴公車困於此不能歸子雲之材何減鄭莊千里不齎糧乃為絶事何古今人不相及也十年前子雲吐氣成火為豫言與友人爭文字不合欲持俱赴水死豫雄之近同飲大司馬范公坐中述神宗時與陳大士茅祉生費無學諸君聚金陵每日髙會賦詩談文睚眥相摩拂服者解頥競者折角多豫所未聞今子雲雖豪邁不改而豫悲其情變矣資世家之分擅名士之氣生平忠孝自許好艱難其情以自見難亦逢之水西之變其先太僕以瘁死軍中子雲求其棺不得伏闕上書哀慟瀕絶此生人不常有之故也久之舉孝亷贈太僕之詔亦下差用自寬而邇者黃蘄之間蹂以流冦女暉元復以叱賊死至今﨑嶇轉徙無家人之樂一青袍歲歲如草至無以歸此固忠義之風名人之致也然豪如子雲此豈所樂得者哉故豫悲子雲之情之苦也嘗見章溢先生苦齋記云其室在匡山之顛下惟白雲上多北風風自北來者大率不能甘而善苦故植物中之味皆苦而物性之苦者亦樂生焉夫甘苦以性相從是固然矣然山之髙者不一風風之自北者不必苦不然何物之生其山者不以苦聞也則苦豈匡山之性哉豪傑之負忠義者不少而遇不皆如子雲則苦亦子雲之性也贈子雲歸當助為豪宕之談以益其意然昔人稱薑桂之性老而愈辣辣與苦皆清警之味使人氣蘇子雲著書數十種其益於人者必非豪邁自喜之年而窮愁自見之日也匡山之蜜令人口螫久之巳熱除煩其小魚可以清酒苦之效也書此以附於由回贈答之義孫碩膚制藝小序羅萬藻下第歸遇句餘碩膚於廣陵兼旬之聚落魄相偶無言不同然碩膚年方壯修幹雄姿不減其傲邁未知豫喑寂之别有存也豫且離廣陵念碩膚初相見即以文序相屬久無以報數十年業在是一旦不能自強其筆墨此其情寧堪盡語碩膚乎今天下文字亦無可更措一語耳碩膚負博古之業體兼人之氣而筆髙情特字字有氣象其必為用世之人何疑顧以此相碩膚此法宜蚤效於今日而其事已大謬不然矣則碩膚他日必為用世之人亦未必斷斷以碩膚之文古人文字之靈遇人以必可知今人文字而倘有靈也將遇人於昏昏默默不得自知之境為可幸耳嗟乎今天下文字寧可更措一語乎易曰同聲相應同氣相求豫與碩膚所謂無言不同也斯可知不可知之外者也李小有制藝序羅萬藻小有三十年名士既不第以賢良髙等補為令夫小有之才用之皆賢良卿守令之具漢所謂五府俱辟四司並命之流或鮮其人而當時不知此文字之所掩也邇以中外多故天子鋭意求才小有一旦得伸於所知且薦辟漢也國初行之非漢也既得舉則並按武班聨或意為卿相未嘗一日臣而役於舉者如古書記曹掾之倫故小有遭逄不可謂不盛二三知巳頗心榮其行而小有顧以生平制藝屬為之言勤勤焉嗟乎此意復令人悲爾當其束髮為文取兩榜入富貴功名之路不知其他久之不得意則漸出精神悟詣附之求異乎他人富貴功名之文以自寄所得抑亦苦矣然當其時皆昔人所謂情炎鬬進之𠂻非遽同窮愁著書自見於後世者之所為也既卒不得志而以薦辟起知小有者謂巳無憾而小有所欲知於人者則從此巳將置之不必知能無悲乎人生莫親于心莫戀于心所經苦之處生平裂筋絶脈獨出性命之物萃於八股雖巳知已效于人猶不能遽釋以去况時將置之不復知而卒應功名以起念當覔名山大川之靈酬此耿耿耳以少年情炎鬬進之氣為之而晚以窮愁自見之意傳之此一時也本不自意謂亡恨者強顔矣豫以薦亦應得一州不果就但平從舉人監滿例謁選日盛名難副獨小有一出可爾然下第時廣陵鄭超宗悲豫志欲合刻豫與張元祐稿别寄其文字之論豫感之亦小有意也附此自見亦志所以為小有言者其志最親讀者當並為之念也庚辰房書衡序羅萬藻六經語孟之書通於論文者往往而有而莫著於孟子其自任曰我知言他日又曰我亦欲正人心息邪説其意蓋欲以知言正人心也今日制藝之家可謂大盛豫自束髮寢處此中頭顱至是不為不久而今乃始欲見其是非去取於當世或疑焉嗟乎戰國談士之盛無踰雕龍炙轂稷下諸人之時也孟子七篇﨑嶇齊梁滕宋之郊至於不得已而有作托於聖人之徒豈好辨哉今日海內一家操觚掞文之士倍官吏而半農夫尚未敢偃然樹幟異端爭名道術獨偷取逄世之語靦顔自恣展轉相師漫漶無巳耳豫之為是選也上之性情學術交融互析沐浴古義附以倫脊為可垂之文一也次之才格岸然俯諸一切或姿致清韶佳言如屑不失為可用一也又次之理明致白狷于自存浣諸囂溷寧瑕無偽以為可寡過一也兹三格者持以盡吾正告天下之意可以救矣豫猶不免於懼蓋往者豫章為戒目之曰幽渺邇者雲間則又以昌明博大之文倡天下矣今年來復聞天下以雲間為戒目之曰膚漫夫幽渺豈豫章之始而膚漫豈雲間之初哉使豫房書衡今日脫稿不失為房書衡之初更逾年倘相傳讀抄襲不巳轉日成陳厭其陳也亦復依傍别出詭幻百端攢蹙不屬之字杜撰生拗之章螫口棘心弊已見於前事矣當此之時雖六經聖賢之語無一字不狼藉人間磔裂可歎而况於其餘則雖有苦心自力之文亦安望其保全之世久傳無恙者哉若此者所謂祿利之路然也漢武時立五經博士開弟子員設科射䇿勸以利祿訖元始音有餘年傳業者寖盛枝葉繁滋一經説至百餘萬言大師衆至千餘人古今人心由盛而變未有不由此者變而至於無所入則蔽陷離窮之禍中於言語終於政事此孟子所灼見而深懼也故其正人心之端在息邪説息邪説之本在知言今知言正人心之學獨當在上耳在上者為天子求人以佐當時之治者也其任既重一日操衡尺蒞諸士苐使庸昧者斥勦説雷同者斥杜撰不經離理失類者斥則天下之人將以上為知言懲於不庸而諱於自見其心庶當有救不然下之所非上之所是下之所去上之所取雖百孟子生於今日何能有救然則豫是選何為者也豫亦能為是選而巳矣使天下見豫選無欺昧不本心性之旨反覆疊見腐爛可穢之文此豫今日是非去取之所止也敘任雪柯青鳯軒藝尹民興神皇帝之季年嘉魚文章曠不達於春官矣其時廉亷頰頰者悉皆僎土為珠抱砃指璧娶質而嫁光宜乎不縮於寶母也雪柯任公特表危獨表其所嗜則擯粱肉而啖松芝攘湯液而飲沆瀣巳得壽而人得疝也表其所跖則卑輶軒項領之逸繂牽﨑崛氊裹隂平己取天下而人壞髙骨也表其所宅則厭重屈深宫長廊豐廄規槩平易户牖雷同結晶城於天下蘇迷盧之半以恣孤竒而臨睨瞻部也一國之人竭眼之才隅隈莫究窮耳之力宫羽不昭始胎然疑終發詬笑即余輩三四人支領其味者諟諦深密僅底募源而亦勿罔於機關之室轉輸之府也則一日諗豫曰夜夢虎蹲在庭斯何祥與余曰大人虎變公莞爾曰不然虎與牛其力均虎卒騰躍而喋牛之膏肉者虎膽厚牛膽薄也今夫膽及於目達於爪出決斷以營衛心王名曰恆竒之府焉豫極爪目之用二十年心王不一慆慆遺遺削傾竒府者為豫膽汁豐滿有以守之也豫憬服其言公沒十年又一夜夢謇豫曰君宜多讀書問讀誰者書曰能讀本經四書都成極竒極妙之文章乃善讀書矣覺而憚蕩者鼻滿五寸息紬繹膽説豈斯文之陫奧哉且夫膽剛直之氣也專剛不明如醉而乘駊騀矣專直不𠂻如盲而競蹻亢矣毛腠淫歸之外必有物焉湛於幽昏之域相遭於耳目與非耳目者故其見也以不見見下上淵天之間即變化視聽之用公之文端在斯乎端在斯乎天度既樹孕育諸氏任者産顴澤者産華挺者産絡傍者髙而不下産於孤府一時緝陟春官者若干氏詬笑者酋其誶也明文海卷三百十三
