body:
  text: 明文海卷三百十四餘姚黃宗羲編序一百五圖畫題米氏山水圖後方孝孺自古極盛之世天下之間和同無間粹美秀傑之氣充盈洋溢是以賢才之生多駢發遞見父子兄弟俱以所長稱於時者衆矣而宋東都為尤甚相業功烈則吕氏范氏道德之純則程氏文章則蘇氏曾氏王氏孔氏劉氏其他至不可勝數而米氏父子各以畫名家亦皆擅一時之妙豈人力所及哉天欲固人之國家必生才以植本使之扶而立之輔而翼之或從而藻繪潤飾之不如此不足以見盛大之美也元暉此圖乃避地新昌時作山川林麓吐吞闔闢有排斡元氣之勢實可與古作抗衡不特追配先人而己當人物凋謝之餘洞視今昔慨歎久之暮雲春樹圖王褒友居五倫之一人生而五倫具焉雖賢愚貴賤之不齊皆莫得而廢也方其相聚而遊相違而思其思與遊也皆形於言而後巳夫言者固為不少特無文以將之則出諸口而隨滅惟托於文者則垂諸後而不朽噫唐興三百餘年富貴權利之相友者不可勝數皆湮滅而無聞獨杜少陵李太白之為友片言細行傳誦至今孰謂文之不可恃也哉豫嘗讀書及唐文集知太白齒長於少陵故李之於杜也若沙丘城之寄堯祠亭之宴飯顆山之逢其辭皆若略於少陵焉而杜之於李也則推重其詩若隂鏗若庾信若鮑照則傾慕其人乃贈之懷之夢之不一而足觀夫少陵﨑嶇戎馬之場艱難川陜之地白髮捨遺自許稷契君子豫之太白雖天才卓犖應奉翰林遭時弗偶以酒自放君子或少焉以太白之視少陵稷契輩人宜若瞪乎其後矣少陵推重傾慕若此夫然後知少陵之交友可謂能久能敬者歟豫與有謙甫弱冠相善義雖友朋恩猶弟昆自豫遊京師入成均教授湖湘之間往返歸省復相遇於京師垂二十年其視有謙之為人得甘脆以事其親愈愈然而歡至如往來以處其友偲偲然而樂自始及今猶一日也前年春有謙以才諝舉於朝其友馬自牧取少陵之詩繪為暮雲春樹之圖以贈有謙且徵豫言不休噫醉眠共被攜手同行相失萬里茫茫爾思則吾二人之情趣當不減於少陵太白也寂寞書齋遊子不至吾知其彼此皆然匡山之歸鹿門之期吾誓相從於他日耳有謙能書而文者也能久而敬者也顧徵豫言是以蠅而附驥也豫知子之不我忘惟子之不我信則江東之雲渭北之樹在彼焉有謙張其姓長豫一歲云娥江送别圖序謝肅溧陽達公貫道丞越之上虞秩既滿將朝京師邑人士相與送之娥江之滸公欲登舟輒挽止之咸咨嗟感歎不忍為别於是公起指江以語於衆曰昔吾絶江而東懼弗能佐理以忝朝廷寵命賴是父兄能教子弟能率三年無一事纍我我得西渡江趣道千里以覲於天子何幸之深毋為不忍余别也衆闔辭以復於公曰自本朝有天下以來官於吾邑者不猛以厲民則寬以怠事不激以為廉則察以為智是皆不知從政往往不免故未有一人得赴中書以考厥績者考績中書當自公始公無彼數者之失有古遺愛之風哉吾等是以於公之别不忍也乃再拜别公公登舟送者佇立水濱舟既行猶注目不少瞬而公亦憑柁樓顧望踟蹰於時天霽潮平四山如洗木葉飛摵摵涼颷舉之與翔鳥泳魚相下上於中流使人别情紛擾益不能自忍也好事繪焉題曰娥江送别圖將以寄公屬序於余余謂送公之别不於他所而於娥江也何故蓋娥者曹氏女也其父盱善水以迎伍君為濤所溺娥也死援出父尸事載漢史後世慕之故以名其江然伍君之忠曹女之孝臣子大節也公嘗以教邑人士今公之去邑人士必臨江以送者非徒不忘公教亦以願公克全大節也若乃區區不忍為别烏足重為公道哉姑併書於圖末而能言者又繫以詩庶乎公之有以觀省也杏園雅集圖後序楊榮正統二年丁已春三月朔適休暇之晨館閣諸公過豫因延於所居之杏園永嘉謝君庭循旅寓伊邇亦適來會時春景澄明惠風和暢花卉競秀芳香襲人觴酌序行琴咏間作羣情蕭散衎然以樂謝君精繪事遂用著色寫同會諸公及當時景物倚石屏而坐者三人其左少傅廬陵楊公其右為榮左之次少詹事泰和王公傍杏花而坐者三人其中大宗伯南郡楊公左少詹事臨川王公右侍讀學士文江錢公徐行後至者四人前左庶子吉水周公次侍讀學士安成李公又次侍講學士泰和陳公最後至者謝君其官錦衣衛千戶而十人者皆衣冠偉然華髮交映又有執事及傍侍童子九人治飲饌傔從五人而景物趣韻曲臻於妙廬陵公喜題曰杏園雅集既序其端復與諸公賦詠成什乃屬豫識其後仰惟國家列聖相承圖惟治化以貽永久吾輩忝與侍從涵濡深恩蓋有年矣今聖天子嗣位海內宴安民物康阜而近職朔望休沐聿循舊章豫數人者得遂其所適是皆皇上之賜圖其事以紀太平之盛蓋亦宜也昔唐之香山九老宋之洛社十二耆英俱以年德髙邁致政間居得優遊詩酒之樂後世圖之以為美談彼固成於退休之餘此則出於任職之暇其適同而其迹異也然考其實爵位履歷非同出一時聨事一司今豫輩年望雖未敢擬昔人而膺密勿之寄同官禁署意氣相孚追視昔人殆不讓矣後人安知不又有羡於今日者哉雖然感上恩而圖報稱因宴樂而戒怠荒豫雖老尚願從諸公之後而加勉焉王孟端山水畫跋張寧九龍山人王友石所畫山水一卷橫廣四丈崇僅及尺畫法假逺以見近務小以形大髙深上下得乘除之妙非特能平逺而己山川林木疏密合宜勢斷脈續人物幽眇幾不可視生氣自完雖生紙淡墨皴染淹爛非世工所能到凡山之峯巒嶠岫岡阜林麓巔陘磝礐嶂嶺壑谷巖洞砠埒鋭而衍欹而峭瞰而懸躍而駐降而陟髙卑隱顯回環曲折坦險竒厲厜㕒而不見其始屈突而不知其中盤旋而不測其際觀者動心駭目睇注不暇而不能究極其所止足以盡山之形氣是不亦神逸矣夫林居田舍山樓野閣屋相望於上下遊者漁者行者居者步者騎者偶相語聚相語者人相接於水陸獨不一作佛塔僧人其間古人謂圖畫有關風教其信然耶松江黃翰署卷首為江山萬里圖翰未必深知畫也畫家以應物隨類為六法之一若稱萬里封鎮屢更則川原里道舟車宅舍人物事為皆當隨地以變風雲晴晦難以意定而一瀉千里水豈無平衍衝激曲折之殊友石平生逺涉江湖浮黃河踰太行出雁門歷覽晉代之區胸中丘壑許大豈不解事如此顧其所畫妍滋間曠水木清華陂塘廬舍映帶左右山登水次物類相侔其天機呈露當是吳中一筆景耳安在其為萬里圖也鄉友陳君廷用家藏圖畫甚多謂此卷為上品宜寶重之遇鑒賞者時一出焉慎勿令俗士妄以浮言易此竒物也觀潮圖跋張寧四海惟浙江潮最險雖勇悍強厲如秦始皇帝猶畏從狹中渡宋自慶厯以來杭海屢溢嘉定中潮衝鹽官平野二十餘里外論皆以畿甸切近為憂當時每遇潮盛之候傾宫出觀顧反以為太平樂事獨不思建炎之初苗傅劉正彥因觀潮起釁幾危宗社而復甘心於此嗟夫晏安鴆毒雖利害切身一不暇自為謀况有興復逺大之計哉張思廉與二楊所題皆載本集謂李嵩之畫嵩本錢塘人歷光寧理三朝畫院待詔出於目激丹青藻繪宜有浮於世景者今所畫略無內家人物儀衛供帳與吳俗文身戲水之流惟空垣虛榭煙樹凄迷平波逺山上下與帆檣相映而己披閲中使人心目遲回有感慨弔惜之懷無追攀壯浪之想嵩意匠經營情留象外豈亦逆見將來預存後監耶杜子美詩曰江頭宫殿鎖千門細柳新蒲為誰緑殆為此圖題詠也倉頡圖題語張寧伏羲畫八卦造書契至黃帝史倉頡更定古文以啓六書之原非結繩之治至頡書代也淮南子記作書時天粟晝零鬼妖夜哭或作龍潛兔哭皆怪誕可疑又頡時衣冠創設禮宜從制今圖紀皆蓬跣四目身被草卉豈其生近人首蛇身之世異稟野俗猶或有在耶大抵事不具於六籍言不經於仲尼雖方䇿亦不足徵况淮南書出於附會叢雜本以多聞廣異為工者哉獨其字書於今可見者疑許氏十五篇是也自制作有定凡天地之文古今之事人物之宜天下之治亂風俗之盛衰莫不關繫挽而上之可以緒系丘索推而下之可以櫽括百代得其傳者周有史籀秦有李斯漢有蔡雍唐有李淖斯皆神契妙解入室升堂而近世周伯琦陳思孝諸君子亦皆循蹈軌範庶幾成名回視晉唐以來真行草書非不研精筆墨超越鉛槧至論其源流禮義求無悖於正書者兹亦鮮矣昔人謂大篆為倉頡之嗣小篆之祖又謂自𨽻以下吾不欲觀誠知言也夫所貴於文字者以其能載道宣化克濟斯民而己宣化莫重於教命載道莫先於經典經降而史史散而有子集集流為百家異説佛老之書邪正混淆神人瀆擾也久矣聖教舉為試藝試藝分為吏牘吏牘濫為胥徒輿皂朱墨批攝之私其棄本徇末媒祿網利民之煩於文也亦久矣文勝之弊浹於明幽魯聖人已有欲從先進之語况今日乎是則鬼哭粟零雖曰必無而言者之托戒可謂明且逺矣此豈創物者之過哉述焉而枉於用者之罪也姨甥衛使劉時泰武而達文孜學不倦間持此圖求題因書其額甲申十同年圖詩序李東陽甲申十同年圖一卷蓋我同年進士之在朝者九人與南京來朝者一人而十會於太子太保刑部尚書吳興閔公朝瑛之第而圖焉者也圖分為三曹自卷首而觀其髙顴多髯髯強半白袖手右嚮而側坐者為南京户部尚書公安王公用敬微鬚髮頒白鳶肩髙聳背若有負而中坐者為吏部左侍郎泌陽焦公孟陽微鬚多鬢白毿毿不受櫛面骨稜層起左嚮坐右手持一册册半啓閉者為禮部右侍郎掌國子祭酒事黃巖謝公鳴治又一曹微鬚頳面笑齒欲露左手握帶右嚮而坐者工部尚書郴州曾公克明虎頭方面大目豐凖鬚髯微白而長左手攜牙牌右握帶中左坐者閔公也白鬚黎面面老皺兩手握帶中右坐者工部右侍郎泰和張公時達無鬚頳面聳肩袖手而危坐且左顧者都察院左都御史浮梁戴公廷珍又一曹為户部右侍郎益都陳公廉夫者面微長且頳眉濃鬚半白稍右嚮而坐為兵部尚書華容劉公時雍者面微方而長鬚鬢皓白左手握帶右手按膝而中坐豫則面微長而臞髭數莖白且盡中若有隱憂右手持一卷如授簡狀坐而嚮左居卷最後者是也十人者皆畫工面對手貌槩得其形模意態惟焦公奉使南國弗及會預留其舊所圖者而取之故得其半而己是日謝公倡為詩吾八人者皆和焦公歸亦和焉傳有之物之不齊物之情也十者數之成而亦數之漸以吾十人者得之於四十年之餘良不為少然以二百五十人者而不能二十之一則謂之多亦不可也以年論之閔公年七十有四張公少二歲曾公又少二歲謝焦二公又少一歲劉戴陳王四公又遞少一歲豫於同年為最少今年五十有七亦已就衰追憶曩時之少者壯者使猝然而逢之若不相識也且以地以姓論之無一同者以官則六部之與都察院其署與職亦莫能以皆同蓋所謂不齊者如此然攄志效力各執其事以贊揚政化其弼天下於熙平之域則未始不同語有之人心不同有如其面今固不可以貌論也又何爵齒族里之足云乎孔子論成人以久要不忘為次而廉智勇藝文之禮樂者為至兹九人者之才之行彚征類聚建功業於天下固將以大有成惟豫蹇劣無似方懼名實之不副而是心也不敢以相負然則今日之會豈徒為聚散離合時考而世講之具哉唐九老之在香山宋五老之在睢陽歌詩宴會皆出於休退之後今吾十人者皆有國事吏責故其詩於和平優裕之間猶有思職勤事之意他日功成身退各歸其鄉顧不得交倡迭和鳴太平之樂以續前朝故事則是詩也未必非寄情寓義之地也因稡而序之以各藏於其家閔公名圭張公名達曾公名鑑謝公名鐸焦公名芳劉公名大夏戴公名珊王公名軾陳公名清今各以字舉而豫則太子太保戶部尚書謹身殿大學士長沙李東陽賔之也進士舉於天順之八年會則於𢎞治十六年癸亥三月二十五日越翼日乃序書雞壇清話卷後李東陽今年豫作止詩特以自戒鼎儀以詩來約曰止詩亦欲止今春欲止今春止未真乞取止詩來止我止詩合寄止詩人豫請援張汝弼故事以隻雞斗酒為罰竊計數日後必有縛雞載酒而至者鼎儀固未嘗止亦不承盟越兩月豫病起遊大德觀為鳴治師召所督得聨句四章鼎儀聞之折簡告罰豫謂罰我固當不宜獨先若君本不承盟豫亦無獨盟之理鼎儀執不置乃以雞酒往受罰焉初鳴治之見督也曰苐為之即有議君後者吾二人實任其事至是果以豕肉三斤蛤蜊數十相助明仲聞之曰此佳會也盡却他故赴之而亨父亦為鼎儀所致凡六人鼎儀乃盛為席以樂客於是分韻賦詩劇飲盡醉所謂勝負賞罰者皆不能辨亦不必辨也越數日明仲夜歸乘醉作序其文雖工事或未合豫掇其顛末以書於後俾好事者有考焉書杏園雅集圖卷後李東陽杏園雅集圖一卷乃正統初館閣諸老西楊公而下九人會於東楊公之第各賦一詩二公為前後序圖則謝庭循所作也當時此本蓋家有之豫始見於西楊之子太常少卿道术再見於西王之孫順天府訓導綸三見於南楊之孫尚寶卿秦其規置意象皆出一軌蓋當笑談偃仰之餘倉猝摹寫宜有得乎筆墨之外若太常尚寶二君及東楊之孫吏部員外郎旦東王之孫兵部司務仁皆豫所與識其鬚髮眉宇固然莫殊也庭循非文士而獲託於樽俎圖畫之間寧非以其苦心好藝兹會所不可無者而然與且自洪武之開創永樂之休養生息以至於正統之時天下富庶民安而吏稱廟堂臺閣之臣各得其職乃能從容張弛而不陷於流連怠敖之地何其盛也夫惟君有以信任乎臣臣有以憂勤乎君然後德業成而各饗其盛此固人事之不容不盡者而要其極有氣數存焉然則斯會也亦豈非千載一時之際哉今越六十年而諸家子孫猶能什襲珍視不失其舊尤足以見功澤之深文獻之相傳未泯也時稱文貞為西楊文敏為東楊文定為南楊皆以居第為别其稱文端為東王文安為西王亦然今尚寶所居賜第尚在東安門外舊與西為相近而東第所謂杏園者己易主聞其家亦有此圖不及見也姑識於此卷之末以復尚寶之請云題雪景圖楊守陳千山鳥飛絶萬徑人蹤滅孤舟蓑笠翁獨釣寒江雪此柳子厚詩也會稽俞仁本寫此詩之景吾鄞鄭君光俊得而藏之求余題其上憶蘇子瞻嘗譏鄭咎詩有云江上晚來堪畫處漁翁披得一蓑歸者乃村學中語而謂子厚前詩有格殆天所賦不可及然他日又謂漁蓑句好真堪畫何哉會一日退朝初雪顧同行者絳袍繡補綴以琪華瑶英而翺翔容與於金坡玉堂間清麗絶倫亦人間一時勝景也因口占絶句云白雪點紅袍人出金門下詩翁殊未觀漁蓑獨堪畫同僚為之一噱余不能詩雖詩亦不能子厚若故為書子厚詩跋以子瞻詩評而區區一時口占一絶亦附於末者蓋欲啓觀者亦如吾當時同僚之噱云跋衛靈公觀馬圖蔣冕衛靈公觀馬圖一幅上有子昂二字又有趙氏子昂印識鑒别者謂為魏公真迹其一人烏巾素服蔭於長楊之下者為靈公五美姬從一未笄一士人巾服疑即後世女侍中之類二圉人控轡嚮馬首而立身皆佩劎又一人持馬尻而疏其尾馬色黃御勒皆金飾摹寫工緻天機流動信非魏公不能獨其事不經見豫於古傳記未遑深考不敢臆決其有無然竊意兹事在靈公或者其有之昭公二十年靈公值齊豹之變越在草莽適齊公孫青來聘以其良馬見公受之以為乘越九年為昭公草又九年昭公在乾侯季平子不歸馬靈公獻其所乘馬曰啓服靈公以昭公七年入春秋至哀公二年始有于戚之變首尾四十三年同時為諸侯者非不多其以馬見於左氏傳者或有或無獨靈公之馬二見焉其畜馬以為玩具者當不少史逸而不書者尚多也此所圖馬吾不知其主名顧其事足為世鑒有不可不知者前此百年為靈公七世祖曰文公嘗留意於馬矣鄘風詩人詠之曰秉心塞淵騋牝三千文公非以馬為玩具也以誠心而行善政故其效至於國家殷富而致馬之蕃息如此靈公不能仰繩祖武其治國也曾不知凛乎若朽索之馭六馬顧乃般樂怠敖惟馬是觀不于搜狩之時而于遊豫之日不從以賢人君子而從以左右嬖眤觀於此圖尚可想見其禽荒態度無乃與乃祖懿公之好鶴同歟然則魏公圖此未為無意也書先聖先賢圖贊吳訥右宣聖及七十二弟子贊宋髙宗製并書其像則龍眠李公麟所畫也髙宗南渡建行宫於杭紹興十四年正月始即嶽飛第作太學三月臨幸首著宣聖贊後自顔淵而下亦皆撰詞以致褒崇之意二十六年二月刻石於學附以太師尚書左僕射同中書門下平章事兼樞密使秦檜記檜之言有曰孔聖以儒學設教弟子皆無邪雜背違於儒道者今縉紳之習或未純乎儒術顧馳狙詐權譎之説以僥幸於功利其意蓋為當時言恢復者發也嗚呼靖康之禍徽欽蒙塵汴都淪覆當時臣子正宜枕戈嘗膽以圖恢復而檜力主和議攘斥衆謀盡指一時忠義之言為徂詐權譎之論先儒朱熹謂其倡和説以誤國挾敵勢以要君其罪上通于天萬死不足以贖者是也昔龜山楊先生時嘗建議罷王安石孔廟配享識者韙之訥一介書生幸際聖明備員風紀兹於仁和縣學得觀石刻見檜之記尚與圖贊並存遂命磨去其文庶使邪詖之説姦穢之名不得厠於聖賢圖像之後然念流傳已久謹用備識使後覽者得所考云萍會圖序李夢陽萍會圖圖王官十有五人紀善一教授十二典膳二十五人者所謂東西南北之人也生不同同王官官不同同地也于是十五人者約曰始吾儕生東西南北也固不謂同王官即知有王官知同地乎夫勢無常形止無定蹤吾儕知自是不復散而東西南北乎夫萍之未水也萍知水乎水知萍乎及飄風過焉縈花絮於漣漪之曲於是萍者布清而根深泛精以化神綽約娉婷嬉波上下始與水一矣故有寤寐其求而終身無邂逅之遇而傾蓋於途路者非素相聞也斯所謂偶然之合也夫合未有不散者故君子同也必聚而酒食相樂于是乎有會會者所以繫情防散者也有類乎萍故稱萍會焉散而思必及其貌又子孫所世講焉世講必曰吾祖吾父昔與某同王官同地蓋同會云於是會不可不圖圖者所以示永而存義之道也李子先人亦嘗為王官兹地覽其圖而歎曰嘉哉會也然亦時使之焉夫叔世寡安枕危邦鮮甘食設境內有緑林銅馬之驚國中無河間東平之譽輔之以端而拒之不信導之以良而專恣者自遂也諸君方背刺以憂責荷擔以謀遷非穆生逃則張衡去即有繫情防散示永存義之心勿暇為心矣而奚會之有圖故曰寧淵無焦鱗時使之耳此之謂也明文海卷三百十四
