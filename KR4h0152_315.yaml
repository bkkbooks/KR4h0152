body:
  text: 明文海卷三百十五餘姚黃宗羲編序一百六圖畫書所觀蘇漢臣瑞應圖陳沂南京內庫有漆毬守者相踘戲久而中虛有聲成化間豎子從拆璺剖之錦凡數十襲內有三畫卷一閻立本王會圖一王維溪山積雪圖一蘇漢臣髙宗瑞應圖並為中貴留守者取之後積雪瑞應並藏於黃琳之富文堂𢎞治壬戌豫往觀焉王會圖見于一玉工家琳走京師二卷皆逋質正德戊寅觀瑞應卷於王舍人宅嘉靖壬午甲申兩從張光祿家見之總十二幅其一顯仁皇后初誕康王之異其二顯仁有神人戒語之夢其三學射以二囊貯斛粟兩臂舉之而行其四康王欲金講好張邦昌副之其五將使金顯仁送之有小女抱四神擁出衆不能見其六王雲率民謁崔廟請使金衆殺雲其七康王引兵河北以寬二聖顯仁卜碁占入九宫其八康王駐磁金衆大集路旁老婦云巳過山東乃返其九次鄆州卜射飛仙臺其十遇白兔二射皆獲十一渡大河及岸氷解十二兵拔京城夢欽宗脫袍衣之盡宫室園池山河沙塞城市人馬之妙綃地若浮埃而青緑朱粉如新尚記王會圖人物長五寸具貌種種皆精絶夷名以八分書積雪綃長二尺餘色青緑頗失神矣二卷不知所在跋王右丞畫真迹祝允明嗟乎魏晉六朝之迹豫不得而見之矣入唐固當以輞川為宗祖山西有摩詰四景山水石本四方方尺有咫薛尚功輩題識遍其上繪事豈金石所能辨亦存其骨肉大都耳可見在當時己稀濶珍貴之至故謀及琢磨而况於數百年之後乎倘能于礲石斷裂榻本糢糊之後而忽得覩真迹非人生大慶快耶邇來聞有一軸在親軍黃君所昨者乃得捧閲大內後宰門有丹漆巨梃一不知幾何年矣成化間梃墮地破乃髹竹也中藏卷三其一即此事聞進御明日左右請所歸掌時親軍伯父司禮侍側上遂以賜之親軍云圖用細練髙尺二寸長四尺竒前後周完末下正書三言曰王維製跋師子林圖陸深此卷師子林圖徐幼文作凡十二段段有題名以古篆𨽻寫之獨損其一按圖當是雪堂云各係以五言詩凡十二首不書名氏後有少師姚榮公跋尾想見一時之文雅可補後來之郡乘榮公稱余友幼文洪武間為師林如海作十二景余嘗題其上頗有稱譽卷中之詩當出榮公無疑而詞翰畫皆簡捷按幼文名賁仕至河南左布政工詩能畫吳門四傑其一也師子林在吳城東北隅本元僧維則之道場最號竒勝則好聚竒石類狻猊故取佛語名菴首圖一石題獅子峯者是巳或云則得法於本中峯本時住天目之師子巖蓋以識授受之原也姑蘇新志維則字天如姓談氏至正初人而跋尾稱如海師豈即其人與但榮公跋於永樂丁酉似為其徒搆至京師而作故有四十餘年之歎而興感於幼文如海之謝世矣嘗聞榮公以少師還吳訪其師於師子林為所拒至夜漏深以微服往叩後門求見有僧瞑目端坐止以手捫其頂曰和尚留得此在蓋榮公功成貴顯猶本僧服故不曾蓄髮徐云和尚撇下自己事却去管别人家事恁麼榮公憮然而去可謂本教中之渴棒手乃大善知識豈即維則與又聞榮公法名道衍嘗學於相城之靈應觀道士席應真者盡得其兵法機事執弟子禮豈還吳所見乃應真耶顧風旨嚴峻粃粳事功異學中自有之不必深求其人亦可也暇日偶閲此卷因重裝之聊記於此若師子林之題詠尚多而幼文亦自有作天如詩尤可誦併録於後以資間中之一覽跋陽關圖陸深右唐王右丞詩世所傳陽關三疊詞也調存而疊法廢往在京師日與王陽明都南濠論此或以為每句作三疊歌或以為止歌落句三疊迄無定論而紀載亦各不同意當時必有譜而今無所於考也或以為每句一歌每歌一疊輒減二字至三疊則歌三言矣言皆成文頗有紆徐婉曲之調似盡離别繾綣之情殊為有理而亦未知卒合於本詞否也此圖余所藏李嵩舊本思齋子命工摹之西土景物藹藹有思致可備覽觀非徒以工為也因録本詞於左方并識是説以審於思齋子巫山圖序習善言巫山圖為金川名族子周敷典之所寶愛何也圖後識以私印字巳莫辨惟吳逺二墨字尚如故且圖之氣韻骨力各臻精妙今人所難到為古畫無疑是宜寶愛於敷典也巫山在夔府有十二峯曰望霞翠屏朝雲松巒集仙聚鶴淨壇上升起雲棲鳳登龍聖泉是巳如圭立筆卓森列霄漢間下臨大江誠西蜀之竒觀故為逺所極意者歟敷典讀書好竒志存四方自少於荆吳之區齊魯之境上及南北二京皆躬歷而目覽其勝充然于懷所歉者西蜀未至耳乃於巫山未嘗一覩也日者寓北京偶得此圖遂謂足以副平生所望而為之寶愛也如是豫惟山川者地所以設險也有土者或憑藉為之保障巫山固蜀之險矣昔在三國與五代之季雖欲為之一覽奚可得哉方今聖德逺播守在四夷好遊之士不限所之一無不可者敷典果有意乎異日溯洄三峽目擊所謂十二峯載披兹圖以較形似於錙銖呼山靈而叩之歸悉其勝於豫為一賦之一洗陽臺雲雨之荒唐未晚也周南留著圖録序趙貞吉嘉靖辛酉嘉平之月貞吉以賜休還山道經周南時友人德清蔡君子木領鎮撫節鉞駐此相見甚歡頃之即示豫以任君少海近日薄遊函崤間留著四圖並贊詩豫亟讀一過歎曰逸哉其老氏之流風乎蔡君曰觀子殆將從此隱矣可不為我稍著書若任君耶豫即欣然諾之既而悔其嫌於掠名也遜辭避去乃蔡君使人索諸尉氏曰不得書不可空還矣豫感其勤意為述七圖略加序説命兒曹録寄蔡君如左夫豫是七圖者雖有所授然徒抱空文未踐實事心知意義而口不能言聊為蔡君傾囊似與任君鬬博誠不知其為可第余意則有説矣豫西極鄙人行將掩其聲光與竈兒田畯為伍愈與世落落中原有道何以知豫名姓而一開度之哉萬一因此淺陋之迹附任君之掞藻藉蔡君之延聲俾具眼老作家人稍喜豫之亦能窺取一斑庶飄然御風而西為豫啓重關之鑰決剖瓜之疑則豫之此舉也偶因蝕木之文遂種投針之芥矣豈非因緣幸事也哉蔡君處東溟豫還西海萬里雲山從此别矣是書也其為豫置之笥中遇擇法之人試為一展乎豫日望之俟之勿謂豫開眼作寱語也李光祿使大同圖序趙時春大同據雲朔華夷之會雖聲華四暨宇內鼓動於華胥鈞部之中而大同之士喋肉刺血以與鹵搏前擲鹵顱後繼歌舞縱金革角抵延曼之樂動費千萬金司計者決不與之校貨貝軋轂而奉使鈎袂蓋所以養豪偉梟雄之氣以竦鬼魅獍蜮之心固不可以尋常繩尺校嘉靖戊戌歲復豫犒軍金數萬於是同郡光祿署署事李麟持符載綱以往宣布明聖優渥之至意士咸歡呼醉飽稽首稱萬夀而退具軍樂列麾旄以送使臣李君之僚以為榮耀繪圖其本末而屬余次語其端云唯士之所以效祝於上而致敬於使者豈非以為報哉雖然此庸人感恩之常非上之所以望於豪偉梟雄之士也吾聞古有豪偉梟雄之士者其上不以名義辱於逺人其次不以理色辱於卿士其下不以形勢辱於疆宇匹夫為義而大呼決計風雲為變慘而姦宄為喪志况乎合三軍萬隊之力稱為天子之比户者邪間者鹵數犯塞為疆宇憂此于古豪偉梟雄之士以為最下辱致死之不旋踵夫合三單萬隊之力而效死於讐敵鹵酋之頸寧足繫而鹵之膏血寧足汙輪蹄也何獨聞於古之人而不見於今之大同之士也呼之以其名則應奉之以其資則受責之以其事則哆然縮懦是寧豪偉梟雄之足言乎以庸人之感恩而為豪偉梟雄之報奉使者如之何而不有以開喻之也抑吾聞之言深者其形密而感極者其報甚則夫人之所以云云而使大同之士爭為豪偉梟雄之事以致報乎君上者將必有以自暴於疆宇而非所當先言也姑俟之跋蕭竒士宣平勸農圖羅洪先詩有之蔽芾甘棠勿翦勿伐召伯所茇古者自天子達於諸侯卿大夫非農事無郊行也然即其茇舍觀之輿馬僕從之不繁供億饋勞之不備雖無所考可逆而知矣宋之守令署御必書觀農則猶餼羊之意而今制大誥諸篇所為規警何其親且切也余自知事以來接諸大夫甚多問及土俗者則鮮矣况肯以身勞阡陌哉或以他事漫行越俗則里正沿門户歡呼集器什謹候積夜達旦不休至則鉦鼓旌旗舟車若蝟田野人素不識官府咸驚走奔竄懼衝突為罪所過禾黍蹂敗雞犬蕭然以不速去為憾於乎無變今俗雖鄉置田畯月歌豳頌何益乎嘗聞周文襄巡蘇州攜一老𨽻裹數日糧乘羸馬往來田間相水道餓則就饁者易食日且暮投古寺宿明旦令老𨽻自炊旦食食巳徑乘馬去以是盡得民隱而治行稱最今去文襄固非三代之遼邈也而俗巳頓異如此可怪也吾邑蕭君竒士令宣平嘗春行勸農人即異之至有繪圖以頌者夫天下事習則忘異則傳蕭君特稍舉其職耳而宣平遂有所傳又可怪也使天下皆文襄則蕭君必無此圖使天下皆召伯則文襄之事應不復傳傳者衆則行者益寡吾是以邑邑矣雖然稍舉職而民頌之則知不能舉而加戕焉者民之怨咨未嘗忘也知頌已矣又為之圖極其聲容之盛以張大其事而懷怨嗟者不過誹於腹議於巷而巳矣未有數犯訕上之誅以白其狀者是何治民者之處其薄而民之自處其厚也蕭文襄里人其存此圗蓋將以自警云周憲王所模蘭亭序俞允文周憲王所模蘭亭凡四種而豐君以為此五種皆王所摹不知何也今所謂唐模賜本即太宗所得辨才本令歐陽詢禇遂良等臨摹者于時詢摹特為逼真即勒置禁中石晉時為契丹攜往定武慶厯中韓忠獻公壻李以石瘞之地中後其子負官緡宋景文時守定武以石代輸匣置藏于庫熙寧間薛師正之子紹彭又摹之他石劖損古刻湍流帶左右五字以别而定武蓋有三本矣且古刻字微帶肉今所傳有肥瘦二種尤延之謂瘦者真定武王順伯以肥者為真定武而肥者今亦無劖損紛紛似無可據禇遂良臨本則一在同州一在歸德同州本後有延陵之印而此則歸德本也偶為休寧金君述其始末云書羅浮圖許炯羅浮南海之望也環三百餘里其髙十二倍之峯以百數飛雲玉鵝麻姑仙女會真會仙錦繡玳瑁最著洞以十數金沙石臼朱明朱陵黃龍黃猿水簾蝴蝶最著石之竒者二曰跳魚曰伏虎池之竒者二曰阿耨曰夜樂泉之竒者一曰卓錫石門可以容几席石樓可以望滄海鐵橋鐵柱其絶幽者也山有龍篵竹其大數圍有五色雀貴客至則先集山下多梅花幻惑變化不一而足昔傳有山浮海而來與羅山合鐵橋其斷處也其説不經按道書十大洞天羅浮其一也自佛老之教行其徒欲廣大其道則盡取天下之名山勝地而籍之以為己有故凡一壑之幽一丘之邃則必有浮屠之宫老氏之觀在焉而吾儒養靜之區反無所得吁亦可慨矣是山在晉時有抱朴子王野人者因採藥居之相傳仙去故言是山者必歸二人焉余以為非也既有天地即有此山非二人之所能據而山之名天下則亦豫章羅氏有重焉豫章習靜羅浮以其學傳李延平延平傳之朱考亭氏實為斯文之山嶽則是山也非儲精發祥之所自與余嘗論天下之山有八皆聖賢之所基也非浮屠老氏之所能輕重其一曰歷山舜之所耕也底豫之化成焉其二曰會稽禹之所探也受命之符出焉其三曰岐山文王之所都也麟趾之政行焉其四曰首陽夷齊之所避也君臣之義明焉其五曰嵩嶽申甫之所降也中興之迹賴焉其六曰尼山仲尼之所禱也大成之聖鍾焉其七曰羅浮豫章之所習也道統之傅始焉其八曰武夷考亭之所修也著述之功就焉或為君或為師故所過者化而其地賴以不朽下是則東山之妓女終南之捷徑且以為山靈羞矣山之遇不遇亦有數哉在易艮為山其辭曰艮其止止其所也故必如數聖賢之得其所止而後可以為山之配浮屠之寂滅老氏之清淨皆不得其所止者也又烏足以為山之重乎客有遊羅浮者繪其圖以歸間以示余余覽之有感焉識於其端以告乎好遊者毋徒曰抱朴子王野人者云趙子昂畫邢侗榮祿公膚如瑩玉神比秋泓以故點筆窗間率多幽致此卷疏木叢篁􅗒褷獻態與片石相為掩映風流楚楚政不在多無亦魏國仙姬衣紫半臂呼茗對啜巳復倚水晶宫檻納罨畫涼颷於時徼榮祿作此耶榮祿他幅類多重巒厚嶂采翠爛然此乃獨標神秀西子未嫁吳王時都謝鉛華衣白苧衣江頭浣紗則庶乎近之矣跋錢塘夜潮圖丁養浩右錢塘夜潮圖一卷新安王君甫用賢得之杭僧某僧藏自先世蓋杭人之所作也其絹素筆意悉出前元而題者乃紀宋之年號豈其不忘故主故追録之歟嘗觀元人入杭之日駐師江津潮三日不至今此圖月夜潮生奔騰振迅使棲鴻宿鶩無不驚飛於煙霧蒼茫之濵其怒氣若可畏矣然不以愾敵人於昭昭之際而以駭羽族於冥冥之中豈子胥之氣有時而消歇耶吾不得而知之矣噫綱鑑甲子圖序劉應期王介甫讀蘇子瞻表忠觀碑語坐客曰子長諸侯王年表也余韙之太史公撰史記百三十卷五十萬餘言諸表蓋衆文之特者近衡家多軼之不載豈云識其大者哉夫文至者聖人不易春秋因於周禮漢書改書為志餘皆凖子長子瞻以文章狎侮先輩自謂無不如意碑文述趙清獻奏不增損一字何耶余嘗手溫公目録謀昉表例作一紀年徑圖繁袤難就後從閩友林守一得綱鑑甲子圖一幅修四尺廣二尺有竒中書甲子六十每偏十八行右縮數五十二起周威烈王丙辰左訖今崇禎某年贏其餘共三十五甲子上以朱額厯代中每眼籍元某改元某厯年永短統之分合終始數悉具懸壁觀之二千餘百年間若列眉此必閩先民所授受殆傑搆也余受而學之以示同學黃太沖太沖復為溯堯甲辰補之倍前圖不及二甲子藁成余則以紫陽因治鑑著綱目斷自威烈與孔子書始堯春秋始平隱同今仍閩圗之舊劈幅為三每幅右加甲子一行首辨序伸三圖於後而卧之變為手幀覽乃縱焉有所記憶可探袖得也置序於巔以次移三圖縱為橫綴之紋如亓字囱其上猶舊圖矣亦易卦方員圖之法與後有作者當不復易之併載舊題云厯代紀年貫繫甲子無遺矣雖正統之義未明昭代之紀未備姑俟稽古者考證焉明文海卷三百十五
