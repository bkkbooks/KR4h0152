body:
  text: 明文海巻三百十六餘姚黄宗羲編序一百七技術贈地師詹仲芳序朱升葬書之道二形勢也方位也形勢如相人之許負方位如推命之李虚中二者各精其一己足為術合而一之人焉庾哉自楊救貧以前皆合而為一釐為閩贛不能合者蓋四百餘年中間宏博碩大如王朴之孫伋趙卿著指蒙書撥砂詩心經等文出入經史幾於得乎形勢之綱維方位之領袖達者尚有憾焉况其餘乎里人詹仲芳世傳閩術也而學於贛自以為盡贛術矣而猶講學於閩足力到目力熟人皆信之方將進焉而不已里之治此而能行者未有或之先也青出於藍氷寒於水其吾仲芳乎余故喜斯道之將昌而閩贛四百餘年之判而不合者其將合於吾歙矣故書而贈之書徐進善三命辨後蘇伯衡以五十一萬八千四百之四柱包括天下古今生人之命蓋昉於虚中夫造化之妙其變莫測雖聖人有所不能知而欲以有限之數推無窮之命誠難乎矣雖然天地之寒暑日月之晦明昆侖磅礴於三十八萬四千里之外而厯家測候以三尺之箭五斗之瓶而不能逃此與人之生於兩間十二紀萬有一千七百八十載之内往者過來者續而星翁包括之以五十一萬八千四百之四柱而不能外則何以異殆亦未可遽以二者多寡之懸絶而詆之也其四柱同其賢愚異者有之其四柱同其貴賤異者有之其四柱同其脩短異者有之其四柱同其休咎異者有之存乎世運焉爾存乎地域焉爾存乎氣候焉爾存乎禀賦焉爾否泰理亂升降消長此之謂世運五方九州山川限隔此之謂地域一時離為八刻一刻離為初中末此之謂氣候受形之初胎氣所鍾此之謂禀賦禀賦有厚薄氣候有早晚地域有南北世運有盛衰明盛衰之機别南北之辨審早晚之節權厚薄之等以斷賢愚貴賤脩短休咎之故此談命者之所以徵也豈惟四柱哉豈惟四柱哉原性讀書而邃于方技進善之論如彼余之說如此原性其亦能折衷之也夫贈筆生張蒙序孫作昌黎韓子傳毛頴為中山人中山非晉乃唐宣州中山也宣州自唐來多擅名筆而諸葛氏尤精諸葛嘗遣其子授筆柳誠懸且語其子曰柳學士善書當留此筆不爾即以常筆與之既而柳果以不入用别求他筆其子不能知諸葛語之曰前所進者非二王不能用也栁為一代法書而不知諸葛之用意諸葛之藝乃能過誠懸之書信乎千里馬常有而伯樂不常有也國初此法流吳興自馮應科陸頴輩首被趙文敏賞識而宣州之筆殆無聞焉余嘗以筆何勝於宣湖筆工有不能言此蓋未見韋續論筆之過其法取崇山絶仞中兔毛八九月收之毫長一寸管長五寸鋒齊腰強為善大抵巖石斗絶其兔下上犇突舉身之力皆聚於毛至八九月霜降竹枯聳身曲脊以耐寒栗則其毛愈勁宣湖又山郡兔材易集故家有其葉業有其人至於用意之妙鋒齊不難而腰強為難鋒齊者類不能強腰強者有不能齊雖趙文敏用馮陸筆亦僅得其齊而罕得其強余雖不善書然知識其故而有以知韋說之不謬吳興陸用之精於為筆不在馮陸之下徙居婁江授其甥顧秀巖秀巖又授其甥張䝉世傳筆法如出一手自漳泉廣海賈舶來吳艤舟岸下百金易之殆無虚歲雖淞之士大夫求筆有不待逺走百里而取之几席之下矣生論筆之利病辨析至到始余識之吳郡學宫數求余言時方次羣書未暇也後余還淞其請益堅故序以廣士君子之知而歎識者之稀也送畫史李約禮序劉崧世稱善畫者曰畫史畫工也史官也畫者安得與史官並稱而謂之史哉及觀古之秉史筆者其傳是人也非徒紀載其徳性行事官職功業而巳乃并其狀貌顔色言之如曰美鬚髯長大也曰短小精悍也曰晳曰黔也曰黑而精狠也其傳寫精妙千載之下如在目睫故吾嘗謂史官為不丹青之畫而畫工乃不文字之史則其謂之史也亦宜然史官為書或徇愛挾忿為美惡髙下又其書常後時而出有不核不備人莫得而議之而彼或因之以欺世而後世卒亦罕有能辨其非者獨畫者之於傳神其人恒相視於咫尺其部位形采肥瘠長短廣狹之際分毫爽戾則三尺童子指而議之矣繇是觀之天下後世之公而直者宜莫如畫史之筆而余之所見者亦寡矣廬陵李約禮者為人傳神極精妙方立談過目如不經意而落筆施采無不宛然能使見者即知其為某某而約禮固未嘗自言也其或盈縮于其間則約禮又能因夫人之言輙為之更定而不厭及其成也人莫有能得而議之者是約禮非徒能信其技而又能信夫人之言者也嗚呼世蔑公論久矣安得如約禮者使之秉筆以公天下之疑信哉林月鑑江湖勝覽巻䟦程敏政泉南林君論精相術薦為其邑之隂陽官凡三入京師矣每至而名益竒或以月鑑號之者間因武進陸君廉伯以見予袖出一巻詩曰江湖勝覽皆朝之名公卿投君之好而予之者也予觀世之達官貴人類能為君以自重雖賢者以公務見至累日終以事辭者有之幸一見或不交一語以退蓋雖負天下之志者亦無自而吐其尺寸焉惟挾風鑒禄命諸術者不獨走門下即見至折節傾倒惟恐不盡焉或聞其名而物色之不獲則悵然以為失士予於此蓋竊羡夫負竒挾藝者之遇而亦不能不慨夫為人上者其下之盡言不在彼而在此也若林君之見遇於公卿豈不以其言之多中哉顧其相予乃獨以為異日當大顯夫人豈不自知予以此又竊懼其言之不中將自予始矣昔嚴君平賣卜各因其勢道之以善而言之中不中弗計焉今出入公卿間得行其言者蓋莫如術士林君往來江海之上巖穴之下與夫邊州僻郡目所經者將無有遺才隠處守道履貞之士而力不能自通者乎如見上之人語及之使天下之賢者或因君而有聞焉則予又將重慨夫月鑑之名在此而不在彼也雪心賦句解序胡翰相地之書蓋無出郭氏葬經者矣然班固藝文志已有形法家相地與相人並列疑葬經雖出郭氏而郭氏實不足以與此豈先秦之緒餘乎今考其文精深雅奥誠有至理而不出於乘生氣之一言唐曾楊諸君子蓋得其說而行之驗矣後之陋於術者心目不逮古人乃相與鬬合為天星卦例諸說舍形勢而論方位其義淺其詞俚故其學之易入而其行之易售也夫執羅經而以卦例格地以天星論水合則吉否則凶如是則人可以為曾楊而何取於生氣之乘使孝子慈孫陷其親之遺體於水泉蟲蟻之患而不自覺甚可憫也孔子曰人而無恒不可以作巫醫甚矣術之不可不慎而擇之不可不審也聽於庸醫而閼其親之生年與聽於陋術而危其親之遺體其為不慈不孝均也先少保襄毅公之䘮朝廷特遣使者賜葬南山之原四方術者川滃雲集言人人殊大約多以天星卦例為說其誦葬經者蓋不能以句而何望其踵曾楊之故步哉獨吾郡謝昌子期專以葬經為主旁通儒書尤究心於文公及蔡西山父子之說於天星卦例則深絶之其為人扦穴率有證佐非出於揣摩臆度之為庶幾如妙於醫者之用鍼巧於射者之中鵠也然陋於術者反從其後訾且壊之孝子慈孫亦從而惑之蓋世之真贋不分往往類此非至明者不能用其人非至健者不能聽其決也子期以唐卜則巍雪心賦專祖郭氏註者亂其彚次而失其肯綮因句為之解譌者以正晦者以明誠足以袪積習之謬說而大有益於世之慈孝者矣予竊因之有感焉世之號儒者舍聖經賢傳而從事乎詞章比之庸醫舍素難而執方書陋於術者舍葬經而濫例乎天星卦例之說其失道一也然則使子期而服儒之服專致力乎儒者之學吾黨之士或當愧之此予所以三復其書而不能己於言也重刻劉河間保命集序章拯沙河姜居安自謂江右世醫國初有官院判者故蓄古方書頗多予嘗取而閱之兹且梓願以次刋布河間保命諸集予惟金源立國於時衰亂極矣而天地好生之徳乃於醫發之河間東垣劉李繼出以闡素問之祕以續生人之命而皆處士髙尚不汙於世其術之妙豈惟南宋有所不逮自元迄今蓋未有或之先者吾鄉朱丹溪固河間三傳弟子兼法東垣而時出之然俗師之論則以東垣之學專主持守乃王道之醫河間之學專事攻擊乃霸道之醫不得其門妄生分别而河間之書隠矣殊不知審察病機無失氣宜河間固醫中王也若夫一於持守則諸邪填塞長病而速禍一於攻擊則正氣與邪氣奄忽而俱盡此學之者之過也於二公何尤抑予又觀傷寒直格而得其所以為說大約謂輕微之症可以正治若病重危則當從反治之法其反治者亦名從治蓋藥氣從順於病氣也正治之法猶君刑臣過逆其臣性而刑之故病熱不甚治之以寒逆其病氣而病自愈矣反治之法猶臣諫君非順其君性而恱之其始雖從其終則逆可以去其邪而歸於正又謂救人火與龍火異人火得草則炳得木則燔得水而滅龍火得濕而炳得水而燔以人火而繞逐之則其火自滅耳推此言也匪直醫人固可醫國矣偶因時論之異而深有感於斯言故為表而出之醫史序李濂醫史者余輯前史所載方技列傳以為學醫者之正宗也前史無傳而諸名家文集有為之撰傳者亦採録之都無可攷而醫術顯著者則僭為之補傳蒐羅訪索凡得七十有二人而古今之名醫畧備矣或曰醫小道也子孳孳焉輯之何居嵩渚子曰醫道淵微非言可盡非通乎天地之化明乎隂陽之理達乎運氣之㫖察乎事物之賾者弗足以語此儒者以是為小道謂其但周乎一身之用而不足以該乎經世之學耳若推其極究天人原性命洞經絡晰表裏幽贊神明功奪造化天下之道蓋莫有大焉者矣顧可謂之小道乎哉醫史之輯所以植凖的示龜鏡存軌轍將使天下後世學醫者以是為師庶弗迷於向往云爾較之輯書史畫史者兹不切于用乎曰何為其切于用也曰人之有生也養身事親慈幼之所當講者有急於醫者乎吾儒致知格物之目亦多矣其間最關於軀命者有踰于醫者乎孔子之所慎者三而疾居其一程伊川曰事親者不可以不知醫是故古之君子修己治經之餘鮮有不致力於醫者今之君子學業法律之外顧於辭章字畫殫精敝神為之而於父母之弗安也巳身之失攝也昆弟妻子之遘疾也則諉之庸醫以試其術其不能無憾者弗少吁可謂不知務之甚矣故諺有之曰攻碁不若攻詩攻詩不若攻醫其有見於此耶曰攻醫之要上遡靈樞中探金匱下研金元數子之書可矣而奚事往蹟之求曰往者來之鑒也古者今之式也歴代之有名醫猶歴代之有名臣也名臣行道濟時所謂達則為良相也名醫活人利物所謂窮則為良醫也抑歴代名臣各有史傳近代又有言行録傳世唐甘伯宗始纂名醫傳七巻紀邃古以迄於唐之醫而世無傳本宋許慎齋紀五季以來之醫有圖而無傳近時豐城楊文恪公廉嘗著名醫録又畧而不詳讀者少之然則醫史之輯可容己哉曰與其輯醫史孰若輯方書之尤切於用乎曰古之上醫要在視脉脉理既明病乃可識脉之𤣥妙難以言傳意之所解口不能宣也執古方以療今病不惟不能起病而反增劇昔人嘗有是論矣故曰不知方者之輯方猶不知詩者之輯詩一詩未工何損於事一方未善為害曷窮甄權許𦙍宗李杲皆古之哲醫也而並有輯方之戒惡可孟浪為之以誤人耶曰方劑弗可輕輯則吾既得聞命矣而醫史之輯也果益於斯世乎曰益哉人能常閱是編可以窺醫術源流之正可以諳入門造奥之階可以識攻擊滋補之機可以得未病先防之道可以養身可以事親可以慈幼裕乎己而周乎人實為有益之實學而詞章字畫之藝舉非所當先矣曰子之言良是也請備録之以為醫史序送日者丁鳳序劉繪支干相重窮於五十一萬八千四百此有盡之數人生所值遂可以言命乎予謂此乃人生所感之氣然也元命變化之神超然在形上恐未可執而求焉天地之氣陽變隂合而生五行五行各有隂陽則十干十二支所生也氤氲雜揉流行晝夜而人生遇之其間刑合盛衰可以積算以生尅制化為官印禄馬亦自然之配中為福偏為禍成格為福非格為禍乃論氣之純駁爾故星家之談多驗蓋察於氣機之際其說不可廢也人之生與萬物同物生於七十二候非其候生者不存活其由人力薰蒸灌溉非其時存活則意味俱逆而不暢達非所得之正氣然爾今支干之重有數天下之生無數其八字全同者千萬中不一二見比其布散分列條貫森然弗亂雜非有神物司之乎夫可推者氣也命不可推也若紂為王西伯為囚顔淵天盜跖夀其謂長平坑卒南陽貴士者命也唯上智能察也丁生善談五星迺與之語言醫贈葛君汝敬祝允明世遷道裂人習茍陋口以耳言足以目行胥四海而一其能廓𤣥見以躅古積功力以給用者無幾由小大之務人皆若人習皆若習萬事如何而治哉又甚者以偽襲之昧自曰解卑自曰髙繆自曰是噫若之何哉余將評隲今古因不勝慨因葛君療疾將贈之言而觸於懐由醫而發也姑寄辭於醫醫之道大歟細歟醫之道非大古之為醫者其人大也炎農軒后而下作之述之飛聲千載者皆大聖神仁智英傑賢人也以斯人用醫烏獲之振羽也烏乎而不大故醫之用與耕者植者並濟養人生其道畧等非甚髙大而其人皆大也病乎後世之言醫者良百一而庸十九是人病醫非醫病人矣余少讀經史子傳期為用世學固不遑暇於是間時或獵觀樞素難脈明堂内照千金本草書意中有一種言也又觀諸醫師治效扁鵲倉公華陀褚澄徐秋夫輩以底於孫氏則多契前㫖又後稍觀張劉書而因驗其人又有一種意也又下及李明之言與朱彦修并得其人又有一種意也又下及勝國國初名家如吾郡葛氏張氏盛氏韓氏王氏猶然也今天下稱良醫師紛紛以余不習其法所不敢知然其以名者則以能持李說也持李者謂之王持張劉者謂之伯况孫以上哉邇年始得千金翼讀之益契舊聞大發蒙塞或以其㫖索諸今人為之駭然亦不敢言也今人家子弟為科舉之術必持程朱不持漢儒為醫師必持李不持前人何昔之大儒上醫甚艱有今正叔元晦明之盈天下閭巷也今稱良醫師多江南余舊有戲語謂北人乏醫試以户曹版籍校計何生死者之畧相當歟噫嘻堯舜以揖讓湯武以干戈茍合道濟世何必曰禪道不同不相為謀有語則吐亦焉知其為是為妄耶知我罪我皆所不辭微葛君也吾其鬼矣葛君生我我知報之申吾感因述吾志而己葛君字汝敬其為道吾能識其超抜髙妙所謂廓𤣥見以躅古積功力以給用者而不能指言之因稱以語人曰仁哉汝敬乎活今人之心智哉汝敬乎得先聖之道蓋汝敬可久𤣥孫也知可久知汝敬矣送地理黄生歸劍江序蔣冕相地之說豈獨堪輿家有之我乃卜澗水東瀍水西書固嘗有之矣卜云其吉終焉允臧詩亦嘗言之矣然此猶為居室言非為宅兆言也孔曾相與問答極論夫孝子生事葬祭之道顓顓然著之於書以詔天下後世至其終篇舉送終之大節而特掲之曰卜其宅兆而安厝之使所在之地而皆可葬則何事於卜正以地有美惡不得不卜以決之葬焉而不卜卜焉而不吉則雖𦵏而未必能盡善吾親之體魄容有不安焉者此孔子所以有安之之說也自是以來鄒孟氏以及司馬氏程氏朱氏始有無使土親膚之說又有土厚水深之說又有土色光潤草木茂盛以為地美之驗之說又有避五患之說又有擇主勢強弱風氣聚散之說皆不過推廣孔子之言而益致其謹重周慎之意特後來者言愈詳而意愈密耳此正天下後世凡為人子者所當尊信服行以為蓍蔡指南者也堪輿家謂凡人之賢愚夀夭富貧賤貴一切皆琢中枯骨之所為雖天道福善禍淫之理世主賞善伐惡之權皆可以置而不論甚則至謂神功可奪天命可改而禍福之應速不旋日則與此甚相矛盾有不可同年而語者矣然彼之業是術者但見其師資相授大率皆然遂益鼓其說以誤世人矜張誇詡飾偽以為真以愚誑愚先後一轍雖號為讀儒書者亦毎甘其愚而不之悟且自謂吾之禍福予奪皆不出其術中由是舉吾親之體魄一聽其所為以自陷於水泉螻蟻之地而不自覺曾不知彼之言固有與吾儒合者其曰乘生氣者是也曰上聚曰風曰水曰土欲堅潤云者皆生氣所以乘之由亦豈得謂為無理哉在人子者亦宜參互考究之為所得為以自盡夫必誠必信之道特不當以禍福言耳予年十二而孤先君窀穸事惟吾伯兄今湖廣憲副梅軒先生是賴於堪輿家之說懵無所知頃自先母棄背朝夕皇皇焉圖營宅兆業是術者往往踵接於吾門最後鄉貢士楊仁夫以書自衡山來亟稱劍江黄生璿既而生至與之語郭景純葬書甚習間與之陟岡阜探討源委其於山川性情務求其隠顯向背之未易測識者其於夀夭貧富之説未嘗一出諸其口其人又謙而好學在吾家一聞丁副憲時雍言永豐吳慎儀之術有過人者即辭予往從之得其肯綮為多予家居二年生凡三來吾全每一見之輙喜其問學日新而未己庶乎可與論吾儒慎終之道而不拘拘然泥於彼所傳禍福之談者故因其佐予葬先母而歸也書此以張之且使人知予所以與進乎生者意蓋在此而不在彼也跋陸翁所藏石田畫後吳寛人言石田公好異聞有欲得其圖畫者輙談鬼怪之事以動之事窮或凑而成故失之誣者頗多閶門陸汝器以所得圖畫示予不啻百十幅凡山水草木禽獸果蓏蔬菜無不備然汝器淳實人也於鬼怪事非惟不能談亦不欲談而得畫之多如此則人言其可盡信也哉明文海巻三百十六
