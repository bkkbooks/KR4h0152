body:
  text: 明文海巻三百十七餘姚黄宗羲編序一百八技術贈饒太醫序萬恭余幸得視篆醫院而好讀諸外家方書其言連類洸洋若神府海藏變怪百具視其上方皆可游心駭目若鼓之攻跗之滌長桑君之方緩之為和之視豹之慰安期之神樓太倉公之診無慮數千百家是皆誠壹所致故足述也然悉局於一體假令從逺邈則其効可覩矣通方之士無取焉余甲寅春彌月病膈以上氣冲冲觸不得定膈以下即如空囊歉歉不得實也燠之則燥涼之則憊補之則氣溢㵼之則氣耗余甚厭苦之間以語光禄吉陽先生應聲曰幸適有方士杏山山人者過我請為子視疾須㬰杏山山人果至余望見杏山山人呼曰即以何方藥令己疾君曰請脉之良久曰是謂事勞其形思滑其精血耗丹宅氣騖黄庭非九竅所入五味所生是宜劑以清化膏以五經於是三四投蓋油油然不覺病之解以去也余歡甚招山人謂曰善醫也夫善醫也夫即外方家諸所稱何以加焉山人好弈余亦時時招山人弈日有持海檄告倭盜者甚急山人輟奕索讀之既攘臂大言曰安得善擊賊如吾應城尹者為海邦擊賊余曰而尹何狀而能擊賊山人曰吾尹葉震亨氏者廣右人也尹應城時礦賊從中洲來匿城南巨麓中尹躍馬挾弓矢出從者三人抵賊所羣賊據麓自若以其兇獷者五人絶澗奮臂持弰來銳不可當吾從城上觀之賊及百步尹不為動五十步不為動三十步不為動比短兵接尹令從者一發一斃再發再斃盡得五首懸馬腹而還盜自是不敢入境今安所得如吾尹為海邦擊賊余拊臂曰嗟乎此海邦獨奈何不得震亨氏而用之山人揺手曰海邦者莫須得如吾尹者不能用也蓋聞醫竘者秦之良醫也張子背腫命竘治之張子曰非吾背也任子制焉治之遂愈夫有所委而後有所愈賊勢然也今通泰間多鹺賈四方貨物並至其民任俠地邊海倭奴亟趨其利彼民人剽悍並起逐之故倭不能得所欲是疾在膚膜者也南跨江為蘇松地下宜稻為天下饒民俗靡繁丈夫謳歌游戲女子被錦綺如恐不勝故其俗日以麗而日以脆善誨盗倭之來也如颷風而民之竄也如流水富民入郭貧民遂矙其室良盜莫分業無所是疾在心腹者也南為兩浙浙以北大較如蘓松而未甚浙以南多海利浮海者千艘走死地如駛既又愚夷賈奪之利倭是用怒肆毒尤烈然累起而累逐之是疾在腠理者也故愈通泰疾易愈兩浙疾難愈兩浙疾易愈蘇松疾難審標本明緩急安得海邦大吏以其事委擊賊者如張子之委背乎洞陽生躍然曰杏山山人善醫也夫善醫也夫去外方家諸所稱逺矣夫効則上都其功不効則下䝉其罪醫竘者有反袂而走耳語治疾得治盜山人豈所謂通方者非耶叢桂莊牡丹譜序朱安􅧔牡丹乃造物之鍾秀者哲人豪士往往稱賞焉然時平則縟葩麗藻油幕朱欄香輪競逐管絃叠奏以樂之繁華焉世艱則芟於芻牧毁於兵燹寒煙荒草之中敗屋頽垣之内人亦莫之顧矣以牡丹之盛衰不可以觀世道乎惟唐開元中始盛於長安太白清平調巳品題之樂天詩云一叢深色花十户中人賦是也宋天聖中復盛于洛陽邵康節韓范司馬諸名家皆歌詠而愛重之歐陽公為之作記凡三十品汴為宋皇邑去洛陽四百里花開每以充貢汴花之不逮洛陽明矣我明宣徳間周憲祖于府中開天香圃以植之府乃宋大内泉甘土沃花榮茂不減洛陽每花時召府僚張筵㑹文儒託乘俊彦盈席飛鸞觴錯綺肴製牡丹仙傳竒流傳以為盛事昔髙唐菟苑皆賓從之能賦者而楚襄梁孝不過尊貴之人耳豈如憲祖之操觚染翰為當世之作者哉然譜所載止二十餘品蓋所收者汴之牡丹耳未暇取之異地也汴之城中土鹵而水鹹百卉不宜士庶之家罕有焉嘉靖改元數載宗人始出郊坰闢園圃藝花木為遊息之所於是諸邸競以牡丹相尚珍求四方西至關陜南涉江淮得其絶異之品以誇竒角勝焉今皆萃之於汴矣一園所植者數萬本其品多至五十餘色自古未有如此之盛不知洛陽為何如也予棄人也芻狗天地之間雌伏蓬茅之下拓落而約身懶慢以相成無所事乃於城東七里之邊村購得空同李公之故墅其松竹間有存者臺榭餘址稍加修葺以為佚老之處錢塘沈青門過而樂之取淮南小山之義題其扁曰叢桂莊客有王猷之興者毎過訪焉留春軒前植牡丹數百本非敢嫓美名園然嘉月柔風芬馥妖冶怡性情之真觀化工之妙則一也若乃四皓之採芝七賢之醉竹淵明之賞菊和靖之詠梅皆肥遯山林取其凌霜傲雪以自勵其清操耳予之所好蓋未能脫畧綺紈之故態也暇日乃辨其色香之美惡考其名品之髙下參以歐譜之同異作牡丹譜六十二品每品詠以一詩雖詞㫖蕪陋不能宣冩佳麗欲使後之覽者知余為盛世間人無所用其心也詳述歐譜栽接澆治之法復益以今法使不遺其巧可以奪天工矣宋迂愚叟所著牡丹榮辱志亦加損益附之巻末俾宴賞者審其宜忌庶不負花神而國色天香花王尊貴不與凡卉同也信矣哉酒籌序朱安􅧔夫修禮敦好協義洽情匪酒莫之歡也弁側山頽昏湎戕生匪令莫之約也陶然醺然游衍酣暢匪閒莫之適也是文雅佚豫實造物之固靳生人之厚享也不有儁偉之士難攄磊落之懐嘗試揆之通顯者有大饗大射送往勞來之宴皆執法在前三爵是矩爾乃尊卑匪齊南北異地鮮有同心兼愛以和樂也隠遯者避處山林田家作苦歲時伏臘斗酒自勞既翕兄弟復聚比隣醉後耳熱仰天嗚嗚然而茅茨土苴鼓腹擊壤非有衣冠文談之美觀也雖竹林之飲違逺世故放情方外乃以道汚時艱托此而逃焉惟我先君南山公以宗親而值唐虞之盛禄贍豐腆而無簿書之鞅掌法禁疎濶得遂詩酒以夷猶性樂名飲嘗書醉鄉記酒徳頌於壁謂人曰此雖荒唐玩世之言然其㫖趣𤣥逺千載而下其流風餘韻猶足以袪蓬慮而息塵機也因扁其亭曰俯觀取俯觀萬物擾擾焉如江漢之載浮萍之義仍書一聨云夢裏游三島酣中失二豪其胸次曠達如此喜與林下諸君子遊欵洽言蘭交諧伐木易曰由豫大有得公其有焉如梁之通人水南田公杏山谷公之謝政歸也與公風期宿協意氣相栩𤣥解冥筌惜隂行樂時稱為飲中三達而西原薛考功自亳寄以將進酒之作樂三公之志也公復彚韻人佳士結怡情社登髙作賦述宴興懐杯斝纔傾雲烟落紙其樂何如也嘗見昔人以名士姝姜製為酒牌之令者公曰昔賢豈可唱名驅使哉不如用詩有一觴一詠之義乃取唐宋詩人七言絶句五十篇有關於飲宴者復闡系其㫖為飲酒之目以淇園之竹為五十籌書之注於一筒命賓探取而飲能使觴酌不淆進止有序卓哉觴政之佳令也逮公暮齒商訂耆宿為老景㑹蓋公自少及老每酒䦨宴罷頽然醉歸丰儀爽朗虬髯竟尺飃飃颺颺鄉人歆羡而指之曰此太平人物也未有浹辰不飲者垂五十餘年嘉靖癸亥我公謝世未幾而章程漸嚴凡元宵燈火賓筵伎樂皆有禁防宗人禄入又復裁抑皆嗟咨無復曩之優游矣梁臺雪月宋苑鶯花亦寥落而減容色矣吁可勝歎哉兹將酒籌彚為一帙付梓以傳倘林泉髙士江湖散人有志於名飲者亦製此籌用佐罇豆之歡可以想見公之為人必興同懐之感焉書董杏莊巻陳九川後峯既為董生仁題杏莊巻東洲子詳其事以示余余謂董生行其術於京者十數年及已卯之事乃大章其業豈非天鑒明君不殺之徳故畀之以活諸臣耶余固甚異董生也余當杖時年少體羸衆獨危之既而庸醫者又強余下之湯液入而嘔而益病矣繼同年馬子伯循為余治膏傅之瘡亦漸愈而攻抜之劑痛不可勝不絶呻吟者凡七日夜乃從東洲子逆董生入而視之與安易之膏徐而痛定越數日起拜之而生不言功余固甚異董生也今天下之民百孔千瘡待拯甚急者何可言邪涖之者不重嘔下之亦鮮矣而况於膏之邪而况於調其元而治其本邪縱有稍致驩虞而不動聲色不自矜能者蓋寡矣余重有感於董生也夫仁人心也於時為春木華於春者江北莫先於杏疾也者仁術所先施也字董生以心甫而稱之以杏莊後峯之期之也逺矣生其思盡厥義乎余固重有望於董生也觀物雜詠序萬廷言畫者作秋山平逺往往極其巧於微煙暮鳥風雨滅沒之間而傳神寫照亦灑然快覩於丰儀毛骨之表以肖乎其人可謂工矣然竟不能傳聲音於楮筆之所及詩以窮山川草木鳥獸蟲魚風雲月露之變悲歡愉戚絶抱孤踪久幽華剥之情與物之不齊咸著於篇可謂博矣然亦不能超然獨詠於無物豈兩者技止有形而己耶雖然昔人有言以有形而象無形斯至矣妙於山水者使人覽之悄然坐天姥而聞清猿飛鳥不還緘情天未說者謂其有枯淡欲無之趣則亦非淪無聲而滯有物者蓋用志不分乃凝於神夫茍至於凝神則形聲皆可意造形聲皆可意造則其接見聞之外者亦惟可意㑹而不可形致也顧良工苦心覽者未必盡識安知筆墨之徑非寫希聲而詠無物者乎憲使青陽施君以所作觀物雜詠八十一章示予予愛其機竅深敏音節華暢因物造意故其意員因意造詞故其詞透蓋君英敏博洽根究理要敭歴中外多熟世故與人不為岸府洞中而濶表故其詩似其為人讀之灑灑釋膠起慮當所欲言至於首詠乾坤所謂來往不停轍誰是將車者則又使人當下聲容俱歇逈若有獨見獨聞者發希聲於幽渺寄妙意於象數而非徒詠於物者矣君其誠有得於觀物者乎夫能觀無物於有物之中然後可以因應而妙乎物反觀其觀未嘗有觀者然後可以忘見而大其觀外無物象内無觀者則心冥寂然詠安從生乎是謂莫知其然而然之神此三百篇風雅所由出也嗚呼深矣君家九華而近廬嶽今功名方起青鞋布襪非所有事予山人也亦非所敢問異時俟君倦遊歸第當相與遊九華坐匡廬絶頂反觀吾能觀者為有乎為無乎與乾坤將車者果伊誰乎為一乎為二乎請從事於斯詠矣題何主臣符章冊馮夢禎何主臣歙人名某字雪漁以善符章奔走天下昔年在白下余召之入官署授之玉石銅成數十面俱竒古有致寳用至今主臣去嵗滿七十客死承恩寺搜其槖惟竒石一座存焉友人醵金斂之歸其柩今遂無祝瓣香於主臣者余聞之丁南羽主臣之學符章也破産遊吳中事文休承許髙陽最久兼得其長老而益精遂縱横一時嗚呼符章雖一藝而用筆用刀硃文白文俱有妙解非得師不能精不精不能久傳况其上者乎丁貞白藏主臣符章二冊凡千餘面得之於其子真可寳也其俟而廣之萬厯乙已夏日遊黄山雨中題書地理况鶴岡巻唐順之叩巫卜星相堪輿之家而問焉曰吉乎志未然也而聞者驟然喜叩巫卜星相堪輿之家而問焉曰凶乎未必然也而聞者驟然悲則是巫卜星相堪輿常操吉人凶人悲人喜人之權以奔走乎其人而其人之吉凶悲喜一繫於巫卜星相堪輿之口而聽焉若是何也人情常喜希覬乎其所不可必而常揣摩乎其所不可知而術家憑鬼神以自神故多言而惑信巧發而竒中操希覬之心與揣摩之見而叩之憑鬼神之人而投之巧發竒中之說宜其入之深也諸家之中其尤熾者曰堪輿其指畫天地支離五行八卦竒中之說尤多而人尤尊之堪輿家吾不知其所始吾意其初本以候土驗氣測量水脉以寧死者而贊慈孝如是而已蓋未始有鬼䕃之說也自兹說之行至使子孫露其先人不葬以待吉地與吉日致其人而不免於水火者有矣或取土中數十年之陳胔非有山崩水齧而好數徙之甚者豫章饒歙之間盜地以葬往往至於殺人而不止然則堪輿家之說吾懼其不為祥而為孽也夫儒者之論殃慶歸之積善與惡其說至精猶或半驗半不驗則天道之逺也而謂既朽之骨叢禍叢福若呼谷而響答焉其亦未必然歟鶴岡况君精於術而能竒中者也曩余葬母實藉於君然余之藉君非其吉凶禍福之謂也君間嘗請文於余嗚呼挾君之術以游於世其有不能奔走乎其人而其人之悲喜有不惟君之為聽者歟然則余言何能輕重君耶君如有意乎余言也則君其務為候土驗氣以寧死者毋務為吉凶禍福以邀生者而孝子慈孫有溺於吉凶之說其亦以余言解之而已書筆譜冊子李維禎蔣孝廉公鳴貽余書亟稱吳興朱苕元製筆精良東南第一己見其筆譜則王百榖先生朱元介宗伯范長伯學憲品題推許甚至余不能書生平未嘗有手墨留人間每聽臨池家談筆美惡不知云何苕元為鴻筆之士所鑒賞定自不凡用憶古人善書者或運帚或削荆或染袖無所不佳余笑謂拙書人亦無所不可以苕元筆授余猶以烏號巨闕委諸偏枯指掌也昔吳入晉王秉枹鳴鐘鼓丁寧錞于振鐸勇怯皆應三軍譁釦聲動天地余怯者竊附同聲相應之義安足為苕元長聲價哉書吳生巻後李維禎古器法書名畫之屬有鑒賞好事二家其人今莫盛於吳越而江右自歐陽文正以後絶響矣余先世故江右性椎魯一無所知於博古迷特甚竊自附昔人聲伎之說恐好故不解爾吳生江右金谿人也以博古名往來汝潁荆郢間從者如市足為江右吐氣竊怪其何所經承一日生持巻乞余書言自少病目雙瞽矣得國醫治之而愈余因失笑生之目能識别古物乃以此故使余從張湛受東門伯左丘明西河夫子古方當亦作生伎倆也或曰曹孟徳豈有四目兩口但多知耳何乃借資於既盲之視笑道論曰若乘頭入者兩眼俱來乗一眼而入便成偏見大道乎余復無以自解笑不能巳明文海巻三百十七
