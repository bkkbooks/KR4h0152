body:
  text: 眀文海巻三百十九餘姚黄宗羲編序一百十壽序賀葉孟純壽八十序楊守陳呉庠生葉伯珵来京師就余學去其鄉四千餘里而安處豐食無覉旅之熊者盖有族叔祖孟純翁為其倚也既而伯珵之叔父志宏来謁自言以鄉選入國學恒依翁家居十數載翁念敦叙之誼乆而不衰余心識之去年冬伯珵之尊人自呉至即翁家為具招余余因太常少卿劉叔温工科給事中姚景昭督府經歴朱道隆應其招騎出崇文門外數百歩轉而東三里所有樓翼然下臨閭闠者翁之家也登樓少選翁出揖客華顛龎眉服疏布寛博之服蕭然有林下風度坐而問之乃曰老夫自永樂初徙居於茲時地寒人鮮土産甚稀居者率皆茅簷荆扉土林陶釜一切生活之計甚薄故亦寡求而易足自後數十年四方之人物雲卒居者如櫛其屋皆覆以瓦而朱綠其棟楹牕戸無昔之茅簷荆扉者矣其器皆用髹漆金銀象玉有若昔之土床陶釡者鮮矣與凡衣食百用之需矜奢鬬靡視昔奚啻百之蓋列聖覆露煦噓休養之澤既深且乆故至於此可謂太平全盛之世矣然人侈用而不知節貪求而不知止徃徃因以累其生是可歎者而吾緼袍疏食無改扵初屋室噐皿百用不甚侈於舊視彼差若愈之始與吾居富且貴幾人少且壯若干人今皆無在者矣而吾幸乆生獨存齒巳七十有九矣其言質而有理余四人者皆嘉歎之巳而獻酬禮畢别翁以歸至今年翁巳八十搢紳有為詩以賀之者伯珵請余為序乃為書余所見聞者如此引伸觸類則翁之所以享髙壽者豈偶然之故哉姜翁夫婦八十序李夢陽人有言曰富壽康寧然論者必歸諸三王之世非謂其太和雍熈無愁苦夭折之民耶雖然八十者於其時亦罕矣故其制曰八十拜君命一坐再至又曰八十曰耄此非謂其筋力智慮衰耶是故有罪不刑食則常珍扵朝則杖夫使八十者誠易得也古之人豈宜優禮若此哉然此亦謂其耄者耳非夫婦偕也假如八十而夫婦偕乂弗耄也老今長安姜翁者古之人又若何而優禮焉嗚呼亦罕矣余讀載記上下數千年間夫婦齊徳而隠者吾獲三人焉冀缺梁鴻龎公是巳然三人者史皆不著其年設其年與姜翁比然未必皆弗耄也即弗耄矣未必與其婦偕也嗚呼若姜翁者不誠罕邪不誠罕邪且壽者氣昌而娯樂者之為也今天下民窮而歛急輸不息肩徴弗停催亦甚矣姜翁顧奚所娯於心而使其氣昌也余竊甞觀翁夫婦矣並生扵宣徳初年是太和雍熈之際也一宜壽齊徳而隠二宜壽所謂栽者培之也其子判名郡能不辱其身養志率訓珍綺備矣三宜壽夫三者一係之天二係之人是氣之機而娯之要也故曰得機者昌知要者康夫若是乃其壽焉得而不偕也又安所得耄矣余徃年道秦晋之境見山谷田野間多龎眉皓髪之民乃其年故不亞姜翁然徴輸比急愁歎病貧相與轉而之溝壑者殆半矣幸而存矣氣昌而娯樂者幾焉於乎亦罕矣余於姜翁夫婦有深慕焉有深敬焉又有深感焉作斯序學古劉先生壽詩序羅玘學古劉先生吾始不知其何如人或曰敬齋之子也敬齋之潔巳近世來一人而己其判金華時體無完衣而寒之劇也温足以氄爇蒿加手於其上至不可忍則貸民之毳舄以行厯數置而霽褁而識之郵以畀其民而其守雄也輒與過閹相抗至閹怒而互搏無少遜閹以聞逮至闕皇帝赫然南面清問之逆鱗之下無爽其初而亦自是不復歸鄉井先是母喪不能舉女之不能歸者三人身後有遺悲矣頼先生勤身節縮授徒取直日就補苴而喪之𦵏妹之歸田廬之可生者亦旣鞠育矣今鄉進士御史君二人者嶷嶷然以長也而又自能起名鄉書教武昌武進有成擢至翰林孔目年未六十而歸又二十年乃以御史之貴為封君與王孺人偕榮扵燕閒歸宿之境眀年年八十矣尚無恙也日猶課諸孫以燕翼劉氏於無窮嗚呼敬齋之盛盛矣然於劉氏若無預也而劉氏㣲先生將不為編氓乎不可得也御史同予丁未進士入翰林為庶吉士先生自家以十詠抵御史屬予和予覽其體裁類杜甚愛之又聞其深自秘重不輕以畀人意氣嚴毅不減父風其不蹈父之軌者蓋其所遭之時不同而然邪抑亦天之所以福劉氏也劉世籍安成湖之最西境扵京師為僻逺先生未封時御史按雲南甞一便省之茲而再閱數月是為眀年暮春之初又御史思歸省慶時也先生雪髪繡衣晚榮而壽御史歸乎樂也然其自所抱負終身局於支撐劉宗若斵而小之今己無及矣誰無追惟而鬱鬱者則其所倚重扵御史獨飽於其一歸而己邪予知御史最深故不避而發此序之以為先生壽言而不文則珠璣爛然以掩我亦固非以文為競也汪君七十壽序羅玘歙之老汪敦實九月二十五日七十壽予始不知之也武選黄君曰吾歙令人也越公之胄於是為最其始也萍梗之迹半天下而其采拾也無險無艱若沒人之入於淵泉無所底止而其既獲也若裒金之復於冶鐘鼎之器由是成焉今老矣若碇之棲於岸而以子文昭嗣為之若舟也李子文暐繼焉亦若舟也謹紼維之無不如志於是而食厥素封若實封然雖然不以厲人驕人而以利人吾孔慕焉然茲去歙三千里也敢割籍乎而歸為之壽乎抑二子也其亦無徯吾之歸而惟徯吾言之歸噫吾言奚足取也吾㓜見吾室之覆瓿者矣取視之鄉先生之文半焉又見吾室之棄帙矣䑕餘也或風雨之所蝕也取視之以質吾長老焉則盡近世之名能文者也以其無為吾之重輕故棄之或曰以其非若古賢人之作也故棄之以吾室之棄之也如汪氏之將棄吾也奈何以其今日之取吾也而取其它日之棄吾乎予曰嘻世豈有盡棄者乎歙新安郡也不見篁墩之志乎固有可棄而未棄者也黄君曰篁墩恕然則予為試序之安知後不有恕如篁墩者邪則予文與敦實之名固將壽於天地間不獨今日之壽而巳其可尚也黄君喜曰然黄君甞宰吾金谿有舊愛而喜為之役云陳勁齋六十序羅玘分寧縣學入國朝幾兩圮發帑金新之皆陳氏而勁齋翁嗣為之縣之民罹飢年亦不知其幾矣發廪捐金賑之多陳氏翁又嗣之縣語孝友行誼稱鄉先生可爼豆於社者亦多陳氏人今又皆仰翁焉兩造幾發陳之先為之落機牙而寢者無算也翁尤騞騞然若剖竹破節無留鋒芒今雖六十也其應尚無倦縣庭掃除甚適也故縣人皆曰此翁勁名之曰勁齋翁吾未深識翁方伯周公為駕部時道之公之弟刑部君朝夕與吾居又極道之翁之從子吾昔與之識省下亦甞譽其仲父勁齋者吾時狷騃甚不意其果若此也夫人持一瓣香入寺門其口之析其心之望吾不知其何如也富者供佛以宫以為佛能錫以福也飯僧以田以為僧與佛居能使佛福我也天下之不能禍且福至扵吾孔氏之徒亦極矣而陳氏世為學以居之至於嗷嗷待餔之民其於身之弗能恤况於所謂禍且福者而陳氏世賑之畢竟與世之人背而馳也何求哉豈其世愚而莫之覺邪又吾嘗見世之為富者矣鄉隣之詈者使之鬬也鬬者使之訟也訟者使之貨也然後左右觀望乗其急而市其田宅以自廣焉而陳氏又世為之寢皆世俗指為愚者然而陳之富日以益它縣莫不聞陳之被冠服比貴人者森若壽考稱鄉先生者亦踵出若翁是也詩曰求福不回世人蓋未之思耳陳氏為近之然吾獨以頌翁者歳二月壬申翁壽在是来徴為序以賀也賀湛翁九十一序王漸逵吾廣之山自崐崘而東而南而盡於南海其東為五嶺又其東為羅浮其水盡五嶺之南西溯牂牁又其西合滇南潯梧之水而㑹於峽山其東為軒轅之洲虎頭之門潮惠之流歸焉是祝融之㑹墟文眀之隩宅也重嶂巨浸甲扵天下靈秘瑰竒充沃播盪物怪神奸不足以當之時復鍾而為人故名世豪傑之士間生於其中大鑒師惠皆新州人也以不識字之夫崛起遐荒受法黄梅降壓夫八百之僧奪其衣鉢以歸非豪傑之士其能之乎甘泉先生增城人也以一介之儒北過燕趙屈天下之女而魁之居司城之位為四方之師非豪傑之士其能之乎方大鑒之南歸也神秀演法扵䨇林號為北宗大鑒卓錫扵南華號為南宗然而䨇林之傳日冺而曹溪之派獨行至今天下翕然信之禪慧普照光於震旦斯則大鑒之道盛也方甘泉先生之在燕京也與王陽眀講聖賢之學遡周程之脉一洗時俗而更張之於是天下之學者始識性命之懿靡然以從故陽明之派曰浙宗先生之派曰廣宗然而陽眀早世而先生獨以髙壽作人後之學者慕先生之風莫不逺自四方褁糧而来得以及門為幸斯則先生之道盛也夫大鑒先生皆吾廣人其山川之所孕毓固不負扵靈異之鍾而二公之所建立亦可為不負扵山川之所産出者矣雖其門户各入儒釋殊機其為名世豪傑之士一也今夫太山喬岳雖奠立各異而其為人之瞻仰則同焉珊瑚琅玕雖瑞寶各異而其為人之珍愛則均焉夏之鼎商之彜人將以不世出之古物視之而尚論其他乎先生於是月小陽之春十有三日為九十一降誕之辰吾廣之大夫士及諸門生皆慶先生之重於吾廣之得先生為賀逵先生通家子也乂得日承謦欬幸莫大焉昔孟子以弗得親孔子為憾陳瑩中以弗識程眀道為憾逵之遇方自慶且幸固無復所為憾也巳則吾扵先生之夀其能巳於祝壽丁君仕玉七十序夏良勝山谷之民壽城市之民夭非其受氣爾殊也山谷之俗野野則樸樸則不鑿生氣日完而壽然未必皆夀而壽者恒多於夭城市之俗澆澆則離離則浸薄生氣日索而夭亦未必皆大而夭者亦恒多扵壽今予所見則又異是京師天下之城市也丁君仕玉居之其伯也仕隆享年七十有竒仲也仕元享年八十仕玉今又七十而貌也腴歩也㨗鬚髪澤膩䨇瞳碧光烱烱頥和茹實强徤欲下壯夫而伏之見者識者咸背指靣卜以成數之壽其及也嗚呼丁氏居京師獨非城市民乎而兄弟克享有夀予固知其非城市民也丁氏吾南城人其故廬在水南南城南條之盡脉天下之山谷也水南又南城之山谷也巖崕岑巇原野夷曠湍瀑廉利林居土屋之下童叟循循垢靣跣行尚有不能通越境人言者仕玉兄弟或生扵斯或長於斯亦甞耕扵斯採於斯饘粥扵斯友族屬扵斯連姻婭扵斯雖伍寓京師數十年而以雄貲商販不絶道路無三歲不展廬焉父母死亦歸𦵏焉子女之好尚求鄉人焉而鄉大夫宦游京師者招致而主焉仕玉乂徃来燕冀齊魯吴越以及交廣閩粤之幽竒勝絶皆致逰思焉其心未嘗不在山谷也可以城市之居累之哉是故有仕玉之心焉徃而不壽也不然吾南城之民固有夭者矣京師寧無壽民巳乎固知有山谷之心無山谷之民有城市之心無城市之民若壽與夭初不限於所居居亦移其氣也仕玉且老有定力矣保無移也哉壽座主李龍洲先生序胡直今之主司操較士之權其欲為古之得人也其亦以難矣雖然尤莫難於有得人之心古者鄉老鄉大夫以所知賢能薦於王漢晉舉賢良孝廉唯恐非知名士故當時得人稱盛至唐獨取文藝反糊其名氏抉裂其字號唯恐一知其名茍知則與之罪而不敢辭方其較藝也又獨取中有司之尺度一累黍不中則雖有希竒命世之才亦斥之乆矣何則希竒命世之才必不敢𤨏𤨏然就有司之尺度彼有司者方自挾其尺度而欲求希竒於名氏字號之外是猶掩鏡以求明也不可幾矣終唐之世唯陸贄取士冠當時贄固能先知其良而不尺度求也後之主司非不欲先知要不敢以身試於罪僇其事公也其心私也為贄之徒欲為國祈得人不敢避先知之罪其事私也其心公也然贄當時幸免於罪今也必不免於罪是故有贄之心則誠難矣嘉靖癸卯荆之龍洲李公以名御史監江西試事獨畧去尺度兼收剞劂虚衷信人不以己專故良藩臬才郡邑間得以知名士進是嵗所薦士果稱得人而公竟不免謫去公曰茍誠得人吾罪宜也而癸卯士登甲乙科躋厯崇顯宏猷循政奥學貞行番番然列中外者獨衆當路始追誦公功起為蜀臬僉以歸而年且七十矣直在羣士中最晚出時方被命佐楚臬羣士仕京師者顧謂某曰子行為吾黨致觴祝祝辭子善為之某曰若公則可與致辭矣今人以身名為寳其澤不流則名為虚副而身終無見重之端公之監江西也曾不恤乎身之被罪毅然以得人為己任斯其心非一人之心固天下人之心也公既晚起未究厥施使及門士果皆出其所學上以報朝廷下以報知己攄猷彈志聲應氣求以公之澤施及世世斯其功徳非一人之功徳固百世之功徳也古今之共艶修齡其孰有如此者某以此夀可乎己而某至楚道荆謁公時年七十又三某因致諸君之命奉觴避席輸前之辭介幣以晉公喜而興曰吾數十年之心蔵於中而不欲告人者子一旦暴之吾可以樂而忘老矣某於是書而叙之且以復諸君曰唯公所自夀者其思深其㫖逺矣乃若攄猷殫志聲應氣求將其濊澤以夀公於百世者其不在吾黨乎其不在吾黨乎夀襄王序張居正今祝人主夀者曰萬嵗祝侯王曰千嵗其説何自昉乎夫人夀之不可幾以萬千嵗稔矣而祝者致其愛敬之忱一若理固有之不可以常數計則世主侯王之與衆庻異也夫物有便於己則願其長有之無便於己即一日不能相守日之中天也有目者待以眎有足者待以行雞三號延頸企踵東靣而睎無不願萬年有日者非愛之也特頼焉故也五岳四瀆之居於方隅也興雲雨胎寳蔵以給人之求人莫不禱祀而求福焉利在焉故也人主者日也侯王者岳瀆也人主兼利天下天下莫不願以為君侯王澤逮一國一國無不願以為君故人主萬嵗則天下之人以萬歲䝉其利矣侯王千嵗則一國之人以千嵗䝉其利矣故世之祝人主侯王者莫不願其千秋萬歳何者便於己故也非然者且為厲為孽將誹讟之是承何千萬之有襄之建國百年矣世濟其徳以屏翊帝室至今王益有聲江漢間居正自家食時聞王之賢未見也及過㐮陽竊從下風望見顔色王天下之賢王也夫賢者使人愛而戴之便而安之居正竊聞太守汪大夫言言王雖處崇鉅其自約結恒如處子士大夫過封内者無論知不知必降接禮遇下客己甚其惠民也渥而馭左右也甚嚴事渉有司即有司人百曲不罪也左右雖百直猶不貸務在屈己檢下以伸有司之法故自太守以下至於編戸之民咸曰王有大惠於襄之吏民吏民靡有秋毫可以報塞者獨願王千嵗有國以重惠襄之人此之為德不特一手一足便之而己夫淵深而魚聚之林鬱而鳥獸歸焉詩曰投我以桃報之以李王所以投於襄之史民者厚矣非夀考析福將安用報乎雖然竊有願焉王亦知夫敖氏之積粟者乎周人有敖氏者積粟盈困足支數十年未足也而問貯積於嗇夫嗇夫曰子之積厚矣吾無以益子子而計子之所有者慎用之而巳夫圭撮之不慎鐘筥洩之鐘筥之不慎尾閭洩之江海雖大也以奉漏巵則沒世不能取盈焉我嗇夫也吾告之以嗇而巳夫神不可以騖用嗇之則凝福不可以驟享嗇之則永疆不可以厚恃嗇之則堅故聖人之言曰事天治人莫如嗇王今年三十春秋矣計三十於千歲也不猶積貯盈囷而始去其圭撮者乎王誠能少垂意於嗇夫之論無輕用其年力之富以頥神而思永則所謂千歳云者猶近言之也六月八日為王誕辰汪大夫走入京師使居正為祝詞焉居正荆人也荆之去襄僅數百里楚山漢水庇潤者廣矣茲其所以願之者豈異於襄之人為孝廉顧道通追壽父母序王世貞凡人之情不假飾而發於性賢者恒任其過而不肖者恒任其不及自先王之禮教行不及者恒苦其勉企而過者恒苦於抑而不得伸然是先王之禮教雖本於裁成而就中而其意若在伸而不在抑故夫人子之事親生則致其養病則致其治歿則致其哀以為是無以加矣養而不巳而至於鬻子治而不己而至於割股哀而不巳而至於廬墓先王猶以為近於厚也而旌之鬻子而無後割股而傷生廬墓而終身至犯於生人之大訓然先王猶以為過而不以為罪陳於陵之不食其母許世子之不嘗藥原壤之歌而宰予之欲短喪彼固幸而免於一時之法然聖賢之所以抉其㣲而刑之萬世者何嚴也故夫律此而語彼而人子之於親寧任其過可也友人孝廉顧道通一日冠裳而謁予再拜肅容而有請曰吾二親之棄不肖也賔在壯先子北山篤行君子顧其名施逺不能出里閈母何淑懿今人其教近不能出檐闥而是時不肖方稚不敢以徼鉅公長者而為之銘若表蓋三十年如一日也計吾父母而在今嵗當七十吾父母而七十不肖誠貧則必謁四方之醴齊酲盎以實吾觴則必謁四方之殽胾羶薌以實吾爼則必謁四方之賢士大夫歌頌序記以實吾堂而今悉巳矣其所致而實觴爼者度無以起吾父而薦之而至於歌頌序記其文義之儁足以時寄吾思其美而傳足以嘘枯而肉骨而使之不朽即先生其人也不肖願有請於先生予怪而語之夫所謂壽者黄耉台背𤣥髪兒齒之年而所以壽之者崇岡茂陵川升日至之語今舉堂上之祝而致之冡中之陳毋乃非當乎道通拜不巳曰先生義正吾無以奪先生雖然其必有以慰吾逝者於地下而寓吾思余固謝不許道通之友曹生從旁説曰吾呉之俗薄者懸弧之宴子輒避亡肉脯酒漿責直以償易簀而呼去檢槖裝送葬之子哭徃笑歸墓木如拱博進是資孰與顧君之老而慕其父母乎即厚者多作佛事號爲㝠施浮屠黄冠是依是師斥其貝璣以馳京師搆銜而旋冠其豐碑孰與顧君之知乞先生文以寄其慕者乎曹生之説云爾嗟夫顧君之所為請誠不經而吾之許誠濫顧有感於曹生之說似猶得夫先王之所厚而竊附扵鬻子割股而廬墓者因為序而歸之壽羅達夫序趙時春羅氏自豫章先生以来世有聞人而吉水之族近世得一峯先生而益著一峯之澤未冺得吾友念庵羅君達夫而又著吉水自文相信公以迄今冠廷對者得十九人天下甲科之盛莫先焉而公議獨重两羅一峯既以完節終歸扵孔氏之域天下無二論獨達夫年巳六十其所持者益堅内自養者益光大其與一峰相始終以無愧前聞蓋無可疑議世俗之禮舉不足以壽逹夫而其有大可畏者唯在於惑世俗之禮焉雖然吾逹夫其可以俗禮惑然朋友之義主於輔仁而貴忠信忠信所以進於仁也仁者天之道人之心也自宋儒以来世守其説自以為越跨漢唐由今觀之今不及宋宋不及唐唐不及漢漢固無望於三代矣豈後之才異於古哉忠信日薄故也中人之情要近利而急取名名利之趨捐軀以赴之自發義帝喪捐金六萬以及今日凡其奔走羣動賁藻汗簡者自獨行忠節隠逸之外無非是焉蓋以是物而待是人則固有然矣而何疑於忠信之薄哉其来固乆逺矣蓋老氏遂厭絶之而孔子惟以忠信為仁為教其最髙弟子勇如仲路智如端貢謀如宰予皆以過咎顯責毋諱挫礪備至迄用有成忠信故也後之君子寧復有是事哉日相導諛為偽故虚名多而實效寡雖有忠信之士反相哂訕牢固前染乂豈不大可畏哉相違二十餘年度吾逹夫天予忠厚可望而知後復有二十餘年乎守忠不渝光大變化非予之所能懸度也而有厚望焉其端則在於忠信然此豈余之私言也哉述孔氏之言也因歸於孔氏逹夫與余之所以交也願終老而卒業焉明文海巻三百十九
