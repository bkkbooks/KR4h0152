body:
  text: 眀文海巻三百二十餘姚黄宗羲編序一百十一壽序張曾庵七十序歸有光世之論人壽以百年為限然脩短之數得之於天不可以齊得數之長者百歲為老矣彭祖之百歳豈非其嬰稚之時耶得數之短者嵗月為稚矣殤子之嵗月豈非其垂老之時邪予畸窮於世故常居閭里間從鄉先生長者逰自少識張曾庵先生白晳豐頥美鬚髯盖先生是時年巳五十容甚少也乂十年先生六十其氣完其容無異扵初見之時不知十年之加也今年先生七十亦無耉老之色其美鬚髯髪漆黑自若也先生未甞知世所謂服食煉形之法而得數之長如此則今之七十者其亦猶嬰稚之時邪吾吴中之俗尤重生辰自五十以上當其生辰即為壽前年先生猶為博士弟子激昻踔厲諸少年莫敢摧其鋒雖諸少年亦以為先生少故無為先生夀者今先生忽自謝其博士而老於家其髙第弟子乃徃為先生壽壽巳則相與求予之一言以序其事噫子之先生未可以夀也子之先生讀聖人之書自以為得其藴每酒酣輒為人説書意掀髯指畫左右顧視傍若無人當世宿學莫能難也與人交洞見底裏規人之過至於泣下豈非所謂直道君子者哉徃予至京師見有衣玉帯乗白馬黄金絡前後呵擁者其人白晳豐頥美鬚髯儼然子之先生也而歎曰何其類吾鄉之張子也張子六舉於鄉而今猶布褐而趨扵博士之庭雖然今十年矣其人不知果安在而子之先生所自得者何如也吾又安能舎子之先生而羡彼為哉皆曰善請遂書之繼自今嵗為先生夀必誦子之言矣魏濬甫五十序歸有光余始為魏氏諸倩而濬甫年小於予時尚垂髫見余握手甚親及濬甫自真義逰學城中時時来過其女兄即留飲相歡也當是時㳟簡公家居講道四方學者多聚星溪之上公於其家子弟尤所屬意而吾舅光祿公闢家塾延致名儒濬甫遵矩矱無所失而於進士之業皆能工習濬甫升太學一再試秋闈見罷遂不復徃而獨顓教其子今二子學皆己成庶幾可以紹恭簡公之業濬甫年未至而輙巳余嘗歎惜之眀年為嘉靖四十一年濬甫年五十以正月二日為初度之辰其子壻沈堯俞以余計偕北上先期請余文為壽至期張設之蓋以余最親又知之深也然余見濬甫之少又見其子之成立又老而為壽而吾舅姑與濬甫之女兄巳隔異世則余之所感多矣度濬甫華堂燕坐子倩奉觴賔朋襍沓笙歌滿耳則余方孤舟栖泊於江淮之間自此蒙霧露凌霜雪乂三千里持空然無有之軀欲以獻吾君豈不愧濬甫而欲為濬甫可得邪古者五十曰艾服官政又十年始爵命為大夫則士之效用於世任天下之事者適濬甫之年而濬甫茍自安逸非恭簡公之教漢李固薦樊英黄瓊云一日朝㑹見諸侍中並年少無一宿儒可備顧問則老成之人實國家之所須重年少而忽耉老豈世道之福邪余以是惜濬甫之自止而又以歎余之無所用而不知止也是為序陸思軒夀序歸有光予友季子昇與陸君思軒同學相善君於是年六十子昇屬予為文壽之東吴之俗號為淫侈然於養生之禮未能具也獨隆於為壽人自五十以上每旬而加必於其誕之辰召其鄉里親戚為盛㑹乂有壽之文多至數十首張之壁間而来㑹者飲酒而巳亦少睇其壁間之文故文不必其佳凡横目二足之徒皆可為也予居是邑亦若列禦冦之在鄭之鄙衆庶而巳故凡来求文為壽者常不拒逆其意以與之並馳於横目二足之徒之間亦以見予之潦倒也雖然子昇之為陸君豈泛而求之予亦豈泛而應之邪陸君居縣之華翔村徃年太僕桐城趙子舉来崐山嘗至其地見其土田肥美江流環繞問知予家舊業而後失之子舉力勸予復其故而未能也蓋吴淞江水灌溉之利爲大華翔居江之要宋置新江驛於此新江即吴淞江古所謂婁江也雖然同學而異造同賈而異售同工而異巧同稼而異穫將存其人耳君居華翔獨以善穡稱歳不失其公家之奉而以其贏自給雖當師旅飢饉之年而寛然其有餘古所謂孝弟力田者也所謂善良敦朴者也所謂周於利凶年不能害者也子昇其以是取之與先是君之子豫卿謁選京師求嚴學士敏卿之文以為壽煌煌乎玉堂金馬之制作鄉里有榮焉然嚴公之文所聞異辭欲道君之實者宜有待於予言矣雖然予視君之貌尚少也則君今之為壽太早子昇之請亦太早姑以是倍之為百二十於是子昇来屬予文予可無辭而予與子昇陸君相與嘯歌田里以效華封人之祝壽蔡鶴峰序王慎中年之所以貴於人者何哉為其得以彌所受之性進修之功日有底以考見不病於年數之不足而無以自充也蓋孔子欲加五十以學易茍不至於五十則未得以無過矣蘧伯玉行年六十而化茍不至於六十則不至於化矣常存其身而功得以常用故尺寸之隂如珍萬鎰之璧而為君子之所以貴年者也而人之所以貴君子之年者亦以此故五十而無大過孔子之五十也六十而化蘧伯玉之六十也别聲被色分味辨臭以盡耳目口鼻之能而充天地所委之形不怍於志而浩然有以塞於两間名之曰君子之年而晝夜日月之所見伏寒暑四時之所來徃載之於躬曉然其若昏旦之作息動靜之舒惨年數彌髙而益以為可貴蓋道德不一學問不眀之後人之能永年以厚生者常不絶於世而不出於學問以進其道徳則亦無可貴之年故眉龎顛白隤然其脩齡者徒可以享子弟之養而不足以為朋友之嚴事勤服於是稱壽致祝僅為家人父子閭里孝愛之末儀而無所用之於道德問學交為愛敬之際其可以有感也夫吾所為文以壽者龍溪蔡鶴峰先生友朋之所嚴事勤服唯恐不得為其子弟而聲慕氣接於千里之外猶知講承懋勉以自奮扵下風蓋先生之學粹然一出於道其學既眀其徳既成而年亦巳髙矣所謂充其天地之形而稱其為君子之年先生蓋庶幾焉是歳十月八日為先生誕辰蓋年七十有一矣門人弟子與夫交逰慕接之在於聲氣之餘者舉以為先生祝而慎中尤奮在下風思為弟子而不可得也故獨見於文蓋君子之自貴其年者為其加以年數則可以化可以無過學者之得事是君子也由其無過則可以内省其非也由其能化則可以思齊其益也故樂是人之長有年也而願之非徒知貴之焉而巳爾故慎中為此文以道諸君之意而致祝於先生蓋異乎閭里子弟姻賔之為鄉之長老者壽此所謂交為愛敬之行於道徳學問之間者也先生其尚益自貴焉而乆為友朋之所嚴事祗服也哉壽了凡先生七十序馮夢禎今天下疇不知了凡先生哉先生窮年兀兀手一編研討不休自青齡至皓首無他嗜好人有問者倒囊引繩必令心開意解手足舞蹈而後巳故載酒問字者屨滿户外則伊吾之士知有先生先生自少留心用世凡兵戎水利安危大計考古証今逢人則問有得則記嘗見先生掌大赫蹏積之囊箱者無算咨詢偶及抽檢指畫懸河不窮故挾䇿請纓者趾錯庭下則經濟之士知有先生先生於九流諸家無所不窺尤邃扵醫即㸃化黄白枕中石函之秘世儒所云捕風捉影不可希兾萬分之一者而先生以為必有即試之而敗不校故挾數負術者入幕頗多則方外之士如有先生先生早習洙泗晚歸竺乾惟是三藏顯宻之㫖五宗棒喝之秘一一精探之禪觀持誦日有定課雖服官臨民百冗交集未嘗廢也雖稻麻竹葦世所指目以為秃民投刺即入未嘗忽也故巢林入㕓者分坐頗衆則緇黄之士知有先生然此猶方内耳先生嘗乗傳佐兵事於朝鮮韜略信義為所服雖中道罷歸其功不顯而至今故部曲猶能亹亹談之即中山之國亦知有先生所嘅天下皆知有先生而先生仁心恵政僅試於寶坻一邑而已徒以搢紳大夫間有不齊之口先生竟以此窮於遇儒稱定命佛語宿緣先生且奈之何哉然能窮先生於時不能窮先生於道著書䜿義為後學所宗葢天將嗇其用以就無用之用則不用於人而用於天疇謂先生不大用哉先生家不富而喜施飯僧居其七而族屬親友居其三先生曰飯僧以續佛慧命吾故急焉或謂是不當後族屬親友耶先生不知也今年先生春秋滿七十矣而十二月之十一日其懸弧之辰也余自庚午附籍先生三十餘年受教為多余初未盡許竺乾氏醯雞之覆先生實發之䄂中一瓣香宜為先生祝顧以嵗暮不及稱觴幸因先生族子熙祚輩逺來乞文遂叙其終始以請正於四方之來者壽李孟誠年丈七袠序許孚逺憶在肅皇帝臨御之四十一載余同榜兄弟凡三百人其定交於未第之先相契以心相期以道合并則喜離索則憂至於事變屡遷休戚相念白首而不渝者則劍江李孟誠洪都萬曰忠與余不肖蓋三人焉孟誠髙眀以斯道自肩有泰山喬岳之氣象曰忠沉毅雖遯世不悔有秋空野鶴之丰姿並余所敬事而余又虛𠂻好善追隨二兄庶幾若水之能下渾忘彼我形迹則二兄亦非余莫友也孟誠齒差長曰忠少孟誠一歳余少曰忠五歳今俱老矣孟誠於是七十稱古稀矣孟誠當六十時以滇南軍功遭讒毁被逮下獄者五年中外搢紳及滇人粤人鳴寃之疏凡數十上㑹同榜王元馭少師方晉首揆宻為營救幸聖眀一旦悟而釋之猶戍瘴海六年於茲其門下士呉生自誠寗生祖光翟生繩祖柯生紹臯軰憐其師之老而因處也偕来留都乞余言為壽余惟人生宇宙間如駟駒過隙光百年瞬息耳何脩何短何得何失何樂何憂以吾黨平生耳目之所覩記翻雲覆雨千態萬狀真不啻夢幻泡影然亦何足介於達人之胸次也雖然古之聖哲奮乎千百世之上而垂範於千百世之下精爽恒存不可磨滅非以形骸之内計得喪而定趨舎甚眀而又非若異學者流等天地於浮漚置萬緣於度外者比故上悲天命下憫人窮汲汲皇皇一息不容少懈其中誠有所不得巳焉耳余與孟誠曰忠共抱此志而孟誠提揭修身為本一語以示學的其㫖甚微當在軍旅倥偬之際患難顛沛之鄉無日不與二三子講於修身為本之學余頃歳與孟誠一晤於都門之羑里再晤於三山之禪舎見其處幽而不怨逺戍而能安萬里之外儼天威於咫尺而離家十年不敢一歩越戍所顧恤其私海濵寥落百事荒凉而處之怡然若將終身其有闡道之語酬應之文眀快舂容其神益王此非致命遂志無入而不自得者不能修身為本之學斯其實體眀騐也朝紳諸君子推孟誠有應變才可當邊閫之寄以滇粤两地所著軍功徴之信然然孟誠於今為國之老臣其學術在於正己正物弼主徳而匡民生非偏才專於軍旅而巳古有㧞行伍起耕釣而授之將相之任者廣厦匪隆棟弗勝洪濤匪巨艦弗渉艱危匪大人弗濟安知孟誠不終遇於當今之世哉余因與二三子遥拜而祝曰願先生旦夕離瘴海大展經綸以報荅眀主之恩以慰天下蒼生之仰又再拜而祝曰願先生即修身為本之學獨詣淵㣲盡忘言説而與古聖賢精爽並存扵天壤之間是余三人者終始相期之志二三子或未能盡知也段幻然六十序髙攀龍於今之世求天下奇才者吾必曰段幻然公何以言之曰公之才有本者也其寂也渟泓無朕時出也變化無方控御六合鞭笞四夷無所施而不可蓋公自見其一斑矣初令常熟常熟幸安無事公以廉平治之無所見竒無何以憂去服闋令輝縣是時河臣方治决河令各郡縣供埽以萬計所費金不貲民方飢不堪當事督之急公漫不應乆之至檄令對簿公挾一二蒼頭囊百金去决河所治埽不旬日具入見曰如令具埽當事者怪曰何神也公為言埽編柳束土且幸被檄来辦河上省道里費十九乂督供椿木公曰木非地産陸輸費百倍木以市便輸以水便自此至某所達河鑿所不達者較各郡縣輸木費不及十三當事者大喜曰以此借筯天下可矣縣歳祲逋賦山積至某年大熟未穫公以征科不及格當降級輝民恐失公貸米商金輸官約以償米時石减金一銖公聞召父老謂曰父老苦惡歳乆矣幸有年奈何以賦故石損銖金逐米商境外令民至冬勿易金盡輸米蓋輝米旁郡縣所仰給也公曰當路令旁郡縣仰給輝米者以金及脚直来輝代為輸省傍郡縣得輕齎輝得厚直民以大懽輝盗藪公廉得其大首不誅令舉所部盗所部盗亦不誅令逓舉所部盡得輝盗籍之官分攝各鄉盗輝無敢為盗者他縣有貴客出其途盗掠之當路捕盗急公召問諸盗一人曰必某某也公曰何以知之盗出小冊䄂中指曰某近某地某日某夜不歸必為盗也立捕得盗歸貴客槖某縣有訟數年無能判者直指使以公神眀檄公鞫勒七日報其案盈牘公曰七日不能竟案奈何竟獄第取初牘繹之曰易耳令吏數十軰分伏郵舍中人給紙筆筆囚語公訊獄未服令人稱使者至當迎公擕囚至郵亭再訊未服復稱使者至公出迓兩造公梏置庭草中不相望見髙戸閴如也其被罪者人人號寃未被罪者相語曰固知事乆必敗今果然矣舎中吏人人筆囚語公歸啟之囚立服蓋民有鬭者暗中椎殺兄誣鬬者殺其兄也果七日報獄公間出其竒如此及入諫垣公一切持要以人才為先耨其稂莠不肖者惴惴白簡之將及已共起中公大臣調羣情不念國家治亂而公不容於世公於書無所不讀尤好釋氏人謂公豪傑奈何好釋氏余曰不然若以釋氏别有道即此道也道者人人本色人自迷之釋氏曲醒之即吾聖人亦然公苐為釋氏竒耳公蓋入不二之門具不測之用吾故曰公之才有本者也豈世之馳騁浮氣漫嘗事者邪昔者徐文貞當國松坡畢公在言路舉朝嚴畢公甚於文貞議且出畢公於外文貞曰諸公畏之耶皆踧踖曰豈謂畏之黄門切直慮其府禍耳文貞曰不然吾亦畏之顧念人孰無私私必害公有若人在不敢自縱可寡過也聞者歎服嗟乎安得文貞與之言幻然公哉宜乎有公之竒才當國家之急而不収纎芥之用也今年公六十吾邑孝亷蔣君介如公所識㧞士以一觴觴公徵侑言於某某何以壽公苐謂公曰人之精神至寳也用之則輝煌宇宙不用則退藏於宻在宇宙則壽天下藏於宻則自壽公其自壽以壽天明文海巻三百二十
