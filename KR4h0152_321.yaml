body:
  text: 明文海巻三百二十一餘姚黄宗羲編序一百十二壽序繆仲淳六十序髙攀龍余年二十五而友於丁子長孺一日長孺謂予曰今海内有竒士繆仲淳者子知之乎余曰未也曰其人孝於親信於朋友塵芥視利丘山視義苟義所在即水火鷙赴之余歎曰世有斯人乎越三年忽遇於内弟王興甫所歡相持曰此為仲淳矣當是時興甫得異疾勺水不下嗌諸醫望而走一息未絶耳仲淳為去其胸膈中滯如鐡石如拳者二興甫立起肅衣冠陳酒殽拜仲淳余驚曰聞君髙義不聞君良於醫如是仲淳笑曰吾少也病而習之頗得古人㣲處語世人世人不解也是日與仲淳酒間談説古今事絶不及醫仲淳無所不妙解而後益信辰孺言知仲淳果天下奇士也又三年余以使事至家得仲兒日抱㺯之兒忽得異疾殆矣一日夜半余夫婦淚簌簌相語曰是兒非仲淳不活顧安所旦夕得仲淳坐而旦門者報長孺至余妄念曰得無仲淳偕来乎倒屣出見長孺果偕仲淳来果一藥而活是後余婦余長兒余壻余孫逓遘危疾皆以仲淳活於是余邑中不能知仲淳能知仲淳醫每仲淳過余客武相接也余不厭晉接仲淳不厭聒人以方寸紙授方治之無弗活而一時同志家所活無不如余家者今天子明聖輔政皆出東南士以為千古奇會率獻其所學於廷冀吾君於堯舜吾相於臯䕫皆以迂不入後先落職歸而東南士與西北異士歸田間甘泉香稻皆有以自樂可以誦詩讀書養心繕性無富貴之慕然不能無疾病之苦兒女之憂得仲淳并免於二者余常手額祝曰天生仲淳為吾輩也仲淳又精形家凡山川隱見向背察之㣲茫渺忽無失又能詩能大字熟於古今治亂邪正消長之機熟於兩兵相臨勝敗之算吾嘗謂仲淳立廟堂為一官之長未能或之先即佐邊陲隱然長城也顧不與一第天必有所用之誠得深山大谷二三同心聚書萬巻蠧魚其中相樂以老仲淳必有千秋之業而又不可得天之所以用之者豈僅如吾前所云者而止耶奉壽外舅念東翁六十序歸子慕事有不可知而以得之為幸故其喜也亟事有所可知而以得之為常故其樂也長吾鄉之先達屈指稱髙年者必曰金氏東濱公蓋東濱公年幾百歳云而吾舅念東翁即東濱公之仲子也今牛六十矣方東濱公之七十也先子太僕實為之文追論二十年前寓京師時公為中城兵馬指揮一時同邑諸公登朝者數人其貴顯者多矣而二十年間惟公無恙餘無一人在者於是深有感於衰榮顯晦之際與夫人世光景之廹䠞不勝咨嗟歎息以七十為古之稀年人所深願而不可必得者惟公得之而安知其後公之年殆得百嵗邪豈惟東濵公而東濱公之夫人今者亦年踰九十神氣精爽行且度百歳而過之先子又安知東濱公之夫人行過百嵗邪事有不可知則先子以東濱公七十嵗為人世之稀有事有所可知則子慕方以念東翁百嵗為金氏之恒事然則今之六十其猶在少壯之年未可以賀也其喜也亟故亟稱之先子之於東濱也其樂也長故樂道之子慕之於翁也當東濱公之七十與先子執筆為文之時子慕之生甫踰年先子亦安知其季子後為公家壻亦安知東濱公之仲子即吾季子之婦翁後三十年復執筆為文而為其婦翁壽此其事之不可知者也不可知彼一時也所可知此一時也百嵗之壽萃於金氏之門上下三十年歸氏之文再掲於金氏之堂吾子奉世今能負薪矣其母不幸早世頼天之靈得存此孤也以能無失詩書之澤後三十年子慕將為七十歳人令是子以外孫復執筆為文為其外祖壽斯不亦人事之奇太平之一瑞乎子慕不文不敢自附於先子而其事則有相符㑹者聊書其概以為左劵云明文海巻三百二十一
