body:
  text: 明文海巻三百二十三餘姚黄宗羲編序一百十四方外送别燈和尚還鄉序并詩劉基有浮屠氏踵門而求見予方以事出不得見明日復來問其鄉則世為括人與予為同州故其心尤惓惓焉將歸求言以贈其行夫浮屠以離世絶俗為教父母兄弟且不得為其親也而獨惓惓於鄉人焉何哉今之人同里巷以居而有不相接者及其遇於他方不啻如見骨肉所適愈逺則其情愈切是乃人心之所同非待乎矯揉勉强為也浮屠氏割慈忍愛以為髙宜殊乎人而師獨不然是盖有見於道者也則其為浮屠也豈果惑於其術之說而為之哉世治不古為民者日困農疲於耕而終日不飽其食工疲於作而終身不休息士不識於時而纍纍無所即追呼徭役之可憐誅求徵斂之無厭皆足以累其身愁其心求全軀而茍安舍是其何之乎若師者其迹於是而心則有所寓乎余既重其敏慧又嘉其敦鄉人之誼故為之言且繼以詩師名復祖别燈其號也詩曰閒居寡塵務遂與嬾惰親扣門報有客喜見同里人相知豈必素鄉語情自真北風吹大江寒水波龍鱗話别一何速令我生苦辛故山到何時溪梅照新春親朋或見問為道長清貧照𤣥上人詩集序劉基予初來杭時求士於鄭希道先生先生為余言照𤣥上人之為詩雄俊峭拔近世之以能詩名者莫之先也余素知鄭君善鑒而言不過心常懷之及訪於杭人無能言上人之能詩者心竊怪之及余徙居白塔之下而上人乃住持萬松嶺之壽寧寺於是始得徧觀其所為詩盖浩如奔濤森如武庫峭如蒼松之棲縣崖凛乎其不可攀也而憂世感時之情則每見於言外嗚呼是宜不以詩聞於杭之人矣夫詩何為而作哉情發於中而形於言國風二雅列於六經美刺風戒莫不有禆於世教是故先王以之騐風俗察治忽以達窮而在下者之情詞章云乎哉後世太師職廢於是夸毗戚施之徒悉以詩將其諛故溢美多而風刺少流而至於宋於是誹謗之獄興焉然後風雅之道掃地而無遺矣今天下不聞有禁言之律而目見耳聞之習未變故為詩者莫不以哦風月弄花鳥為能事取則於達官貴人而不師古定輕重於衆人而不辨其為玉為石惽惽怓怓此倡彼和更相朋附轉相詆訾而詩之道無有能知者矣然則上人之不以詩稱於今之人不亦宜哉嗚呼有伯樂而後識馬有匠石而後識梧檟自古以及於今伯樂幾人匠石幾人耶抱奇材而不遇以泯死者不少矣予既重上人之詩而又悲夫人之不知鄭先生之為伯樂匠石也故為序其端焉書劉禹疇行孝傳後劉基世之所謂浮屠者果何道而能使人信奉之若是哉人情莫不好安樂而惡憂患故惴之必於其所恒懼誘之必於其所恒願然後不待驅而自赴浮屠設為禍福之說其亦巧於致人與夫四海之衆林林也而無不為其所致何哉彼固非止惑愚昧而己也人情無不愛其親親殁矣哀痛之情未寘而謂㝠㝠之中欲加以罪孰不惕然而動於其心哉間有疑焉則羣咻之若目見其死者拘於囹圄受箠撻而望救者故中材之人莫不波馳而蟻附雖有篤行守道之親則亦文致其罪以告哀於土偶木俑之前彼固自以為孝而不知其為大不孝豈不哀哉且彼謂戕物者必償其死故有牛馬羊豕蛇虺之獄謂天下之蠢動者舉不可殺也今夫虎豹鷹鸇搏擊蜚走以食日不知其幾何而獨無罪也哉人之殺物有獄矣虎豹食人而無獄何其重禽獸而輕人也彼又謂婦人之育子者必有大罪故兒女子尤篤信其說以致恩於母我不知司是獄者誰歟人各有母將舍其母而獄人之母歟將并其母而獄之歟獄其母不孝舍其母而獄人之母不公不孝不公俱不可以令二者必居其一焉將見羣起而攻之矣雖有獄誰與治之宰天地者帝也彼則謂有佛焉至論佛之所為呴呴嫗嫗若老婦然有呼而求救不論是非雖窮凶極惡無不引手援之使有罪者弗恒刑是以情破法也夫法出於帝而佛破之是自獲罪於天也吾知其無是事也昭昭矣以劉子之賢其不為所惑無足怪者吾獨悲夫天下之為劉子者不多也故又為之言以悟夫知愛其親而不知道者送乘大車住持乾明禅寺序王縉佛法之初入中國本出於一其後去古而源逺遂析為三曰教曰禪曰律教學之盛有南山之宗有瑜珈之宗有慈恩之宗有天台之宗有賢首之宗禪學之盛則有臨濟溈仰雲門法眼曹洞諸宗律學則有㑹正之宗資持之宗其𣲖既分於是互相矛盾禪則譏教之滯於名相教則譏禪之溺於空寂至於律學雖為禪教之所共持而趨向取舍亦各不同為其學者師異㫖殊各立門戸不相出入有若楚瘠之視秦肥邈乎其枘鑿之不合也嗚呼世之圓頂方袍者何限孰能㑹於一而歸其本哉余居京師既久一日大車乘上人相過於橋門覿其容冲冲焉聆其語犖犖焉與之談其道確乎其有源也沛乎其知所委也詢其所自出則晦堂進禪師之上首而余里中子也其至金陵為善世首座宗門諸老皆愛而與進之近膺叢林薦剡而捧檄出住西安乾明禪寺將行求言以為别余自束髪志慕家學即潛心於聖賢之道刓精竭思鞠明究曛以至於顛髪種種而不得其涯涘尚何能知佛法之閫域哉然念大車年方壯而志銳譬猶平地任載之器其輪圓其箱方其杼澤其轅輗軸轂之材既良而馬牛服駕之力又盛使去偏蹊曲逕而由乎九通八達之衢雖千里不難到也顧在大車力行何如耳吾兾大車勵其鞭辟儆䇿之志而環轍於二乘三𣲖之間然後合衆說而底一㑹殊途以同歸俟他日倦逰而返方當舉吾儒之說以告之盖有所待也大車行矣余日望之送浮屠景曄序方孝孺周公孔子之道衰而異端出稍盛之後其說尤熾人趨而信之最深久而遂同稱於孔子曰儒釋世主惡其然欲斥之者有矣然既撲而愈焰既滅而復興惡者之五六不勝喜者之千百延至於今塔廟多於儒宫僧徒半於黎庶西域之書與經籍並用吾嘗求其故以為楊墨名法之流其說與釋氏雖殊其違聖人之道則一然皆不數傳輙不復續釋氏更千載而不廢獨何哉盖楊墨名法淺而易知不足以動人釋氏之術其深若足以知死生之變其幽若可以運禍福之權惟其深也故過於智者悅焉惟其幽也故昏愚之氓咸畏而謹事之而其徒又多能苦身勩行固執而不為外物所移飾儒言以自文援名士以自助故其根本滋固柯條蔓延纒乎海内無怪其與孔子同稱也然孔子之道猶天然豈以其同稱而損哉有一善可取孔子且猶進之聖人之容物固如是也況釋氏設教一本乎善能充其說雖不足用於世而使其身不為邪僻不猶愈於愚而妄行者乎故儒之於釋縱不能使歸之於正姑容之恕之誘之以道傳之以文然後可使慕入焉四明景曄年甚少從烏傷龍門海公為弟子性慕儒學頗至其來京師而將還也海公屬予有以吿之余非釋氏徒固無所告也然曄師之居烏傷視土田之沃室廬之稠市㕓之富亦以為盛矣人告之以京師為尤盛而觀之然後知其不誣也夫人學於釋氏己久驟而語之以儒道之大不猶昔之疑京師者乎在乎造之而己曄師其歸而求焉茍有得於吾之言則去孔子周公之道不逺矣送怡上人序張寧自佛法入中國歴漢唐宋元及我皇明上下千餘年根株既深枝蔓益衍排之者雖屢而歸之者愈衆造之者甚鮮而求之者愈力其為教髙固難能也如此彼歸而求之者固宜與之盤旋其不歸而求者乃亦與之逰不舍則釋氏接於人者必有可愛將不以其道而得之其所居清雅可憇也其言語和悅可聽也其行止愿慤可近也其往來無子男婢御若禮之有内外其交際無矛盾劍珮若小人之以勢利是可愛者也是不歸而求者之所以與逰也邑有大刹曰天寧古稱多聞僧有號印庵者始繼其舊而増修之寺益崇顯今年冬所司以其徒怡庵主之所與逰者徵文以賀予嘗讀韓子之送文暢者矣又嘗讀栁子之送文暢者矣韓子告之以道也栁子贈之以文也文固道之顯也若栁子則不歸不求而與之逰者也怡庵當入座之暇徐取二儒書觀之則知諸君所與逰之意而吾所以贈子者亦在是矣若夫祕密圓通有可以警覺㝠途者自有不立文字者知之吾固弗能道也叢林一覽序楊守陣局一隅而欲覽四方之竒勝攻一術而欲交九圍之俊英此在門墻者猶罕也況在四裔者可得而麾之歟客部郎中孫君廷蘭素與余友善一日謂曰吾蜀浮屠子珙號璧溪貌枯松而心皎月行玉雪也兹以薦來京師拜命為松潘綱副既獲覩神畿天闕之壯偉退而謁諸碩儒髦士拾其珠咳玉唾於行巻中自以為慶而其中猶未厭也行將去燕適齊溯九江而南訪金精於虎丘睇小朶於天竺蘆浮鯨波拜神現於小白華山下然後轉金陵出荆楚而歸在在必求儒林之作以實其巻而於兹題其巻曰叢林一覽祈先生言弁之嗟乎蜀之山水名天下而學浮屠者自以其術百家莫能先也珙生於蜀而馳萬里以覽四方學於浮屠而能内交吾儒博求其言議此與夫安甕天而矜坎井者何其異哉昔者司馬子長足跡半天下則以壯其文辭陳良北㳺中國則以學周公仲尼之道珙其有是哉請有以語之爾未出蜀時意蜀之山川至矣今覽之嶽鎮海瀆則向之所見者何如也周孔之道豈直若海嶽而己哉聞而慕之不若目覩而足蹈之也珙其以是推之倘有志於吾道也請更日而竟其說贈禪老清上人授僧録左覺義序莊㫤釋清上人以相術居京師京師之人欲求知所謂富貴窮達者未嘗不之上人相也而上人之相亦輙應以故上人之善相名滿天下雖余之騃魯退處深山窮谷無所事於此者亦知上人之善相人也和陽尚廷臣曰上人豈特能相人哉上人自祝髪居京師四十年衣未嘗識華食未嘗識飽顧嘗閉閣静坐脇不及席足不及戸外尋尺之地以求佛之道所謂明心見性者亘五六十年不倦寂寞苦空無所不至人皆謂上人與富貴人交可以富貴自處而乃如是何也豈所謂惡逸而好煩者哉上人曰不然農執耒耜出粟以供賦工作貨器以供國家用兵執干戈以衛社稷皆亦人耳吾亦何以異於人哉吾得世之所謂淡修者去其勞而取其逸盖亦幸也茍於吾業有未能精吾道有未能勤夫豈不愧於彼哉上人以為道雖勤而其心則又甚公以恕非若他之學佛者膠固而不通也故每語其徒曰道一也天下之為道者曰老曰釋曰儒儒者常非釋老而釋老二氏又常自以為是不少屈每與之相抗相詆訾自不相容此不知何也吾嘗讀儒者之書有曰無極而太極與吾之所謂萬法歸一一歸何處者似矣讀書不如静坐與吾之所謂不立文字直指明心見性成佛者似矣毋意毋必毋固毋我與吾之所謂真空色相事事無礙者似矣夫既似矣然又有所謂似是而非一毫千里者豈將儒者之説謬哉不然必有所見也人之道惟其中以為是而已吾之道果是也吾則以為是而從吾之道吾之道果非也吾則以為非而從儒之道非從吾與儒也從道也吾知從道而己夫庸知其吾與儒哉茍曰吾業專矣吾道勤矣而執之者非所以為道也至於與王公貴人交也則亦不徒與之貧賤富貴其面目而已而若今之某亷某忠某貪某佞某君子某小人上人又未嘗不洞見其肺肝也上人豈特能相人哉余曰古之人謂静能照物而上人所以能若是者有静以為之主也使或不然而上人之相僧繇之畫也髙閑懷素之草書也夫豈所謂道哉而今也謂上人為僧繇髙閑懷素者吾不信也上人今年以髙行得領天下僧録左覺義事廷臣與上人為方外交偕其戚曹某者求言以贈夫一覺義豈足以輕重上人哉釋之道嘗以天地萬物為空而視吾身為假借而吾亦不敢以是重煩上人聽也而乃述廷臣之語余者如此且質諸上人嘗有是言否哉遂為之序贈禮師序徐渭昌黎之文余夙誦好之至其論道則稍疵及攻佛又攻其麤者也余觀其送文暢者謂暢欲聞浮屠之說當就其師而問之不當從吾徒而請從吾徒而請乃羡吾君臣父子之懿文物事為之盛而然耳此豈足以攻佛哉大約佛之精有學佛者所不知而吾儒知之吾儒之麤有吾儒自不能全而學佛者反全之者夫所謂君臣父子之懿文物事為之盛非吾儒之麤者耶不然將學佛者始祝髪而髠之以為絶父子蔑君臣矣既畜髪而冠之擁笄垂珥忽焉長兒女干禄而饕將無所不至謂足以全父子而完君臣踐文物而履事為之盛耶某師自幼去俗為僧大善寺中臘若干年衣衣食飯付應以給初無事於禅講盖所謂不求佛之精者而心行直平絶去勢利祖其祖而父其父子其子而孫其孫真若俗之倫理然盖所謂得吾儒之麤者未可以其髠而少之也計臘若干今總之得六十某月日其生也其徒名浩者與余夙為詩酒交來乞余言以壽余惟佛氏論心諸所證悟即壽命相者悉掃抹之而其告波斯匿王又引見恒河性以覺之云此身變滅之後乃有不變不滅者存此皆彼教中精微之㫖師既無所事事矣而何庸於吾說至吾儒之麤若所謂君臣父子云者則師既以事事矣而又何庸於吾說哉於是合掌作禮而持偈以頌之云爾贈無盡上人丘雲霄丘子講學於雲山僧舍浮屠氏無盡者年六十其徒請言以紀其壽丘子許之時相與逰者不悅曰孔墨楹立而道幢判宣父以攻子軻以辯彞訓聿彰開我後人今夫子之與之言也言而上之潰其坊言而下之棄其忠無乃不可乎丘子曰咈子蔽於時哉昔者周德衰而左道熾將以瞶眊於天下孔孟憂之其攻而辯之也恐恐然弗縝弗嚴是懼故歴越千載吾道丕明賴厥弼也肆惟我祖爰敷文德抵於海隅明體而視之禮書式而視之規俾服膺於佛老者成執從於禮樂祀祭朝慶之辰俾得締瞻君臣上下幽明之節化久而孚故今問釋於釋釋曰不知問老於老老曰不知則今之謂釋者守其冠服宗其稱謂焉耳其服征輸税奔走王政致愛饋親執喪三年皆相忘乎堯舜之習辟之鱗泳於水而忘於水也君子曰歸斯受之矧入之久而顧欲言以出之邪且無盡慧而能謹敬賢如弗及慕禮如調飢珍文如䕶貝毖行如執盈其必深探吾道之中正直畫於其教而潛以赴之矣吾將與其進也而奚病二三子喜曰夙聞末世之教有三知聖人之化繼一爾因述以贈無盡無盡笑曰丘能愛人送廖道士序劉繪吾登太和山睹其竒秀嶮巇歴代所建瑶城金屋層䑓列觀不可盡述花木水石交映夐然仙都非人世也及觀羽客清流往來於雲居芝室笙簫鐘磬之音發於松峰桂殿之間乃知天之所産靈域而人物居列必欲其相宜若首分布而可錯然故金城玉塞虎將擁旄建宏勲也王城帝都文士鳴珂飛華聲也逰閑公子連車騎於五陵雄商健賈馳㠶檣於江漢各從所奔爾今觀異境所居非有雲裳鶴馭之士絶坌守素不於地靈有負哉若吾所與廖虛白者則又翩翩雲壤之外者矣送浮屠性嘉序王嶼金陵之山其最秀拔者曰鍾山浮屠氏之廬之據有兹山之勝者曰靈谷寺寺住僧煥師用章三衢人其為人持律嚴其言有文其心泊焉無所累乂其徒之傑然者也予往在南京嘗與逰焉為别且三年矣毎思之不置今年夏其徒曰性嘉本初者來逰毘陵寓天寧寺首謁予道其師所以不忘於予者寺有樓曰塵外樓在茂林修竹間本初居之雖盛暑中有蕭颯意間出小并寺問劍井禎應觀太平寺水壁即楊萬里嘗稱其絶妙一時者登君山憇浮逺堂堂在光孝寺瞰江凭䦨四顧千里一矚歴嵩山訪膠山寺僧延坐一室有峯當戸焦千之刻詩其上其半揷雲霧中隱隱可辨識者僅得雲擁秀峯來戸外三數語爾過華藏褒忠寺上雲海亭亭前臨太湖一檻之外波濤洶洶望七十二峯近可攬取如盤盂中物因誦僧法尚詩其卒章云明日慧山曽有約又携茶鼎汲清泠遂去尋陸子品第二泉飲之自是艤舟罨畫溪披荆棘行二十里至善巻洞與寺僧戒航秉燧深入窮天然精巧處出就航語留止信宿遄歸過予言曰性嘉既飽玩名郡山水且得諸搢紳詩甚富詩皆指閲厯處為題視之囊中獨少公一言幸不鄙而賜之言持歸以見吾師信不虚此行矣世嘗稱吾儒者之與浮屠氏逰常不於其迹而於其人必其人有道其所愛慕而服習者多與吾儒者事同吾是以畧其異而取其同而與之逰如唐文暢宋聞復之流求之於今則本初其人也本初工書作詩間亦有竒語如聞復喜文詞有行必請諸搢紳以詠歌其志如文暢是宜其得此於人之多也蘇長公不云輪扁斵輪痀瘻承蜩茍可以發其智巧則神而明之物皆有可寓者矧文詞之正詩書之雅乎本初幸以予斯言歸告而師毋徒曰華嚴法界盡屬籧廬而己也保安寺建養老堂疏引髙攀龍昔者聖王之養老也杖鄉杖國異其典祝哽祝噎隆其文所以尊髙年者至周且備以故老耆以夀終而有引養引恬之效自王政不行於天下天下之民自生迄死不能有恃而無恐於是乎幼而無養老而無歸者皆遁入于二氏以茍安其身今浮屠氏之徒遍天下能得其空虚寂滅之道者百千萬人不可見一二而入焉者三時課誦一日清修特資以為養而己昔韓昌黎有曰人其人火其書廬其居明先王之道以道之鰥寡孤獨者有養也則庶乎其可也夫曰鰥寡孤獨者有養也是矣而未盡也自十六授田六十歸田之政廢而民無恒産無恒産則仰事俯育無其資豈惟鰥寡孤獨云爾哉無鍚有保安寺在邑之南郭西方僧徒過於此者多駐錫焉寺僧某欲建養老堂以處其老且病者欲余為引其疏余既悲夫養老之典不行而鳩形鵠狀白首無歸者得保餘年於浮屠氏而復憮然曰乾吾父也坤吾母也以天地視之皆人也以老者言之皆養也以浮屠之兼愛而有與仁民之道並行不悖者是宜亟與之而亟勸之且勸四方之賢者以吾儒仁民之心知天下無告者推恩必自養老始亟助而成之古之聖人曰一夫不獲時余之辜吾儕當曰一夫而獲亦予之幸斯可謂仁之方也己華藏寺重修佛像引髙攀龍華藏為宋張俊賜葬之地寺為俊建也俊佐檜賊殺岳武穆王千古而下仁人志士争欲斬屍揚灰猶恐為大地之穢今俊墓巳在荒烟敗草中為野狐牧羝之穴而寺尚存寺之存非為俊也為地勝也湖山浩渺之致禪房花竹之幽選勝者所必之故寺屢圮而復修寺之修非為俊也為地勝也寺僧某修寺既竣役募都人士整三寳之像而欲余為引語余謂夫湖山依寺寺依佛像信當修而因為大衆説佛佛者覺也檜乎俊乎一何覺乎佛之空教也檜乎俊乎千古臭穢佛能空乎知不能空千古之臭穢則當自覺其是非之本心送閒寂上人序王慎中佛氏見距於儒非以其好廣大宫室珍美服食聚不耕之身而為放恣如近世所名學佛之徒也殚力於性地㑹精於心源謂之髙大微眇而毫髪千里之間此所以為吾儒距者也近世名徒於佛者何如哉惟其宫室服食之知而猥下惰窳無復小慧他能以為放恣矣士之各儒者猶睢睢盱盱詞費氣盛以距佛為功是佛之得距於儒既非其所以取距而儒之力距乎佛尤失其所以為距矣不亦謬而可笑哉其間固有屏絶聲色禁耳目之邪淡節臭味裁口腹之慾約身勞體以自苦刻居無尋丈之安而行有山䟦谷涉之勤屬屬然奉其教之所謂戒者以求别於其徒士者且以為世所難得交禮而多譽之彼亦以此自賢沾然内勝謂足以抗吾道而存其教如吾所見漳州開元閒寂上人智海殆庶幾其人矣佛之為言固存於其經以大小分教乘而明聖賢之差别則守戒不失蹈人之所極難猶不足語於下乘之數葢自東土所傳離祖而為宗者未可望其門牆視彼迦葉以下二十七人一鐙之照西土相續如其經所稱云者又未知羊牛之車相去如何耳充吾儒之所距則摩掲掩室片詞具冺之㫖乃足以深攻細折而與之較同異於毫髪之間如上人所守非獨其教之末亦吾道之所不足致距也上人於佛氏之經該誦而精講良亦勤且博矣其言固在茍求之而思思之而得究其所至將必有以抗吾道而特存吾方距之不暇而暇與之㳺哉上人勉之然吾亦懼夫所以自為者不至他日復見上人無所操以為息邪放淫之本力不足以有距而卒為上人之道所抗也吾與上人交當勉之送第上人謁大士序唐順之自三十二相至於種種恒河沙相謂之曰皆觀音大士焉可也徧㣲塵國土謂之曰皆補陀焉可也昔諸菩薩未見多寶佛時多寶佛乃在寳净國諸菩薩既見多寶佛時多寶佛即不離娑婆世界多寳佛無在無不在而人有見不見耳由此言之求觀音大士者不必補陀求補陀者不必海然而大士見身獨補陀為著而為其徒者往往必跨海以求而後得焉何也吾聞佛家之說以塵勞為苦海以解脫為彼岸非離苦海不能到彼岸如非跨海不能見補陀或者大士假此以度世而其徒又假此以自度也第之意其出於此乎然則世豈真有補陀者耶其亦化城火聚之寓言耳補陀之事其誕與信無足深究吾特有激於第之行也以補陀之𦕈然大洋之外絶不見蹤影至使其徒莫不翕然醉心焉不憚驚波之險颶母蛟魚之毒兾一至焉而後為快盖其信之篤而趨之果如此今儒者學於孔氏孔氏之宫巋然可目量而趾援也其醉心焉與兾一至焉而後為快者何其少歟嗚呼孔氏之與佛不待較而知也然彼能奔走人於窮海不可蹤影之境而此不能奔走人於可以目量趾援之間彼不憚措身於蛟魚之窟而此畫地於坦坦之途是何詭之易溺而正之難歸耶豈吾儒言義利乃不如佛氏言死生足以闗斯人而鍵之耶藉令第始者不為彼而為此其能必至於孔氏之宮如今之必至補陀見大士否耶諺曰崔翼不能伏鵠卵吾才薄不能熾吾儒以泥第之行而逥其轅於孔氏也第兹行過山陰見吾友王君汝中者其必有以語第矣讀釋氏論羅洪先考亭作釋氏論謂釋經皆出唐人手取莊列書推衍而成引宋景文所譔李蔚傳為證比攷其傳有云鞮譯差殊不可研詰華人之譎誕者又攘莊周列禦冦之說佐其髙層累架騰直出其表以言上不可加為勝妄相夸脇而倡其風其意不過述當時士大夫崇信假飾太過而已非盡以其華人之所改竄與某人之為某經歴厯可據如治訟之贓伏然似亦未為確論也嘗讀楞嚴出房融受筆今房融文字可考有能獨出己見如經中所言否融不足言自莊列來更相摸寫勦說者何限獨未有一文一論與釋氏抗衡抑又何也故謂華人於諸經典言句有所増損則可謂代立議論則不可釋氏何足相庇不知言無以知人考亭百世之師也而於言豈茍哉書以質之知者明文海巻三百二十三
