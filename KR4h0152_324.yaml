body:
  text: 明文海卷三百二十四餘姚黃宗羲編序一百十五方外水月齋指月録序瞿汝稷嵇叔夜好鍛阮遙集好蠟屐當其意之所適視世之他好雜陳於前無足移也此不必明哲第無二子之癖者皆能喻鍛與屐無足尚交嗤其失所好己而以二子之才之美方其跌宕爐鞴婆娑火蠟之間雖窮極要眇以開之使勿好有嗑然而笑耳終不為之移已及其既喻則天地此爐鞴也萬有此火蠟也孰足控摶孰足容與程伯子浮雲堯舜之業以玩物喪志目輯録五經者意不如是乎人之好不齊乃或尊鍛而卑屐君屐而𨽻鍛不亦過乎豫埀髫則好讀竺墳而尤好宗門家言及乙亥夏侍管師東溟先生於郡之竹堂寺幸以焦芽預霑甘露開蔽良多既而師則朗徹蟬蛻五宗掩耳不復欲聞豫則沉酣於是恆語同輩聖人六藝之精藴諸所訓詁非讀竺墳不能得其真生於萬物之中而得為人人而男男而知讀書於書知竺墳於竺墳知宗門是猶飲乳而得雪山之牛復能得酪於乳得生酥於酪而熟酥而醍醐哉雖有他好吾不移矣此正豫跌宕爐鞴婆娑火蠟時語也於是在架之書率多宗門家言每讀之如一瓶一鉢從諸耆宿於長林深壑雖人間世波濤際天埃壒蔽日豫枕席此如握靈犀得辟塵分流之妙彼浡潏堀堁莫能我侵矣意適處輒手録之當點筆意適雖圭組見逼必謝之兒稚牽挽必謝之寒暑之薄肌骨飢渴之迫臟腑有不暇顧肯復移意他好之雜陳耶癖而至是奚必人嗤豫固自嗤矣至乙未積録有三十二卷適友人陳孟起見而誤賞焉孟起遂為録二本會有黃州之役過故里延道徹至齋中亦誤賞焉遂以孟起本遺之道徹遽欲授梓豫笑曰此豫嵇氏之鍛阮氏之屐也凡所云意適者皆鴆毒也道之所以塞也豫即己喻其癖矣子乃欲使有目者嗤其癖耶堅止之逮辛丑豫自昭武乞骸骨歸道徹欲梓此意益堅且曰子謂此為癖子則謂然然可以已衆癖古之人不云乎惟楔出楔至為發願倡率其弟姪若子梓行之豫既不能止遂不敢藏其癖為次第緣起於其端題之曰水月齋指月録水月幻也而亦指月果有如盤山所謂心月孤懸光吞萬象者乎吾不可得而知也其質之爐鞴火蠟紀夢為心光書册袁宏道壬寅秋余夢入一菴有釡十五白粲如丘積問之曰玉路庵也一碑上載祝枝山為此庵伽藍夢中了了識其文醒不記也夫世間恍惚不可據者莫如夢而余又最不信夢者然此夢實無因乂非余臆中事是則奇矣枝山書法為當代第一文彩風流輝映一世至其一詼一笑有晉人風騷壇之士傳為口實米顛而後一人而己余嘗論古人如東方曼倩阮步兵白香山蘇子瞻輩皆實實知道而畫苑書法下至薄技能之入妙者若其資非近道技與神卒不相遇夫畫如吳如顧書如王如旭輩豈可以技能之士目哉夫世人之耳目手足同也心神同也皆同故其技不相逺同者既不能相逺則其逺而不可以人力至者其耳目手足心神必有大異乎人者矣是以謂之異人也異人之趣去凡民逺甚故其生也分身入流於諸人之中而其沒也又分身入流於諸神鬼之中於是人見之曰人神見之曰神技見之曰技道見之曰道而所以為異者未嘗變也辟如投毒於乳變而為酪變而為醍醐變而為餅而毒未始變也余於世之名儒大僧偽以性命自標幟者視之與屠估傭保等曰是其中有未變者在而一種豪爽雋俠及技能入妙之士神與道遇者敬之若先賢古佛曰是其中有未變者在玉路庵心光所創立者也夫枝山名士豈齷齪衲子所能招致者則心光亦異人也適鳩材僧還持卷索書因為之識其事以寄庵主他日庵中當為一段佳話也為寒灰書册寄鄖陽陳玄朗袁宏道郢諸生張明教者從沙門寒灰逰過余栁浪謬謂余知道者以一大事為訊余告之曰夫二君子皆儒而禪者也佛氏以生死為一大事而先師云朝聞道夕死可是亦一大事之旨也今儒者溺於章句縱有傑出者不過謂士生斯世第能孝能忠廉信節即此是道然則使一世之人朝聞孝弟之説而夕焉蓋棺可乎且七十子之徒其中豈有不忠不弟其人者而殆庶止於子淵一貫僅及曽氏是何説也逮程朱氏出的知有孝弟外源本矣而又不信生死事大夫聞道而無益於死則又不若不聞道者之直捷也何也死而等為灰塵何若貪榮競利作世間酒色場中大快活人乎又何必局局然以有盡之生事此冷淡不近人情之事也是有宋諸賢又未盡暢朝聞夕死之旨也至近代王文成羅旴江輩出始能抉古聖精髓入孔氏室揭唐虞竿擊文武鐸以號叫一時之聾瞶而世之儒者疑信相參其疑者固無足言所謂信者亦只信其皮貌以自文其陋而己故余嘗謂唐宋以來孔氏之學脈絶而其脈遂在馬大師諸人及於近代宗門之嫡𣲖絶而其𣲖乃在諸儒至於今所謂螟蛉者亦絶儒禪之統緒不惟不見其人兼亦不聞其語矣今寒灰子儒心而緇服明教禪心而儒服是其中必有得也願有以益我寒灰又言鄖有佳士陳玄朗者迹逰躔內而心托方外是亦可語儒禪之旨者也乞君一言以詔之余曰無他説因書以付去衲識雪照澄卷末卷中小修有夢中遇老僧謂豫為坡公後身故末段云袁宏道東坡戒公後身也戒倚柱談笑而化當時以為異而其得法上首某者初時以戒行藏落人疑似遂不復執弟子禮是其人豈知戒老者耶然坡公答參寥以為諸佛知其難化故以萬里之行相調伏則戒公因地似亦有招之矣坡公作文如舞女走竿如市兒弄丸橫心所出腕無不受者公嘗評道子畫謂如以燈取影橫見側出逆來順往各相乘除余謂公文亦然其至者如當空鳥迹如水面風痕有天地來一人而己而其説禪説道理處往往以作意失之所謂吳興小兒語語便態出他文無是也明教愕然起曰世謂坡公談理明徹極矣公何忽有此論適逰山記在案澄公方讀兩赤壁賦余曰前賦為禪法道理所障如老學究著深衣通體是板後賦直平敘去有無量光景只似人家小集偶爾飣餖歡笑自發比特地排當者其樂十倍至末一段即子瞻亦不知其所以妙語言道絶默契而已故余嘗謂坡公一切雜文活祖師也其説禪説道理世諦流布而己明教曰然則老僧謂公為坡後身云何余曰有之嘗聞教典云前因富奢極者今生得貧困身坡公奢於慧極矣今來報得魯鈍憨滯固其宜也明教目雪照照撫几久之巖棲集序王衡松上人受具足戒修婆塞行刺指血寫華嚴經若干卷泊然深居於世味了無嗜也而獨嗜詩其詩清新雅秀皎然清晝之流而鑱刻過之集凡若干卷其遊越中詩曰巖棲集而屬余為之序曰子巖中人宜序我巖中書余曰余有所不解於子者三夫詩緣情情緣愛以子之法忍至於棄口腹刻肌膚不以為苦而獨不忍棄此無用之香艷一不解也闍梨自有本色禪亦有本色詩如寒山子輩不歌不律鳥鳴泉流而己而子字必綺聲必諧襲寶珠瓔珞以為莊嚴衲子而奪詞人之藻二不解也且子既己入不二門矣山林丘壑與林㕓厠溷一也奚取於巖棲其有取於巖棲吾未見枯稿幽香之好與穠臭紛華之好異也三不解也子先為我解我為子序上人逌爾而笑曰夫子以天下無無情之文耶夫日雨感而成虹煙雲感而成嵐風谷感而成韻是何情乎所感不同而設色比韻濃淡纎宏繫之矣且夫空中華燈上暈病不在空與燈也子姑旋汝目而觀之余肯其言識之簡首明文海卷三百二十四
