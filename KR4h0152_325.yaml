body:
  text: 明文海巻三百二十五餘姚黄宗羲編序一百十六列女序王節婦汪氏趙東山漢世復除之令盖本於周官鄉師辨其可任與施捨者孝悌力田者復其身則又由閭師書其敬敏任恤者而推廣之唐之盛時乃命旌表孝子順孫義夫節婦終身勿事則感諷之道備矣由是以來數百年間雖田里山谷之民莫不知有綱常之重豈可不思其故歟吾邑有汪氏者邑人王天民之妻也年二十七而喪其夫辛勤刻勵鞠二男一女至於成立雖遭艱難涉憂患未嘗少動其心閭里賢之逺近稱之凡三十年如一日於是有司援著令復其家表其門誠斯時之曠典矣嗟乎吾聞孝悌力田之科唐人以為無益而罷之刲股廬墓論者謂非中道不取獨節婦之貞古今表顯無異義豈非以父子天性茍能感慨矯勉於一時而無服勞敬養之實與閨門秉志一節終天者不可同日語歟況自喪亂以來父子兄弟不能相保氏俗為之一變視秦人德色於耰鋤誶語於箕帚又有甚焉則天理幾乎滅矣而孤嫠老媪獨以女婦之微係民彞之重不亦可尚也哉表其門復其家使之享恩榮於桑榆非徒以報其終身勞瘁亦所以厲節婦於無窮也雖然豈惟妾婦哉感明時優異之渥竭甘㫖奉養之誠下以報慈母顧復之恩上以答國家化民成俗之意則為人子者尤宜知所勸矣王氏二子長曰有則次曰得奴皆有男女子而汪氏康强未艾天之所以報貞節者未可量也故為推本厯代復除感諷之微意而學士君子有感於彞倫之重歌詩以係之以下闕吳烈婦詩序章懋自關雎之化熄而閭巷之間無復漢廣行露之風自彤史之職廢而閨門之内不聞婦訓母儀之懿於是乎天理日微人欲日熾桑中濮上之音延於天下幸而天理之在人心有不冺焉者故裙襦之中亦有能閑禮義守貞操不降其志不辱其身臨大節而莫奪赴水火而如歸若吾鄉吳烈婦者豈世道所得而變耶葢烈婦為里人某妻遭亂與其夫倉皇避難去家西行一里許聞鼓噪聲足弱勿能步度不可免乃謂其夫曰君宜自脱禍弗以妾為累夫曰子將若何烈婦曰妾義不受汚惟有死耳夫號泣不得巳而舎去既而遊兵四集將追及焉適道旁有池曰梅塘水潔且深遂投其身以没後數日兵盡夫踪跡至其處見烈婦屍浮池面雖盛暑而顔貌如生乃舉而葬焉時嵗戊戌之夏六月也其後好事者聞之為傳其事而薦紳能言之士又從而歌詠焉葢亦秉彞好徳之良心有不能已者今某之孫以其文若詩彚為一帙謁予而告曰先人有美而弗知不明也知而弗傳不仁也吾將以是傳之子孫俾無忘烈婦之訓願丐先生一言以張之噫吾於是有以見世道升降之機矣皇明啟運禮教維新而閭閻一二女婦已能自拔流俗而趨夫禮義豈非天意將興文明之治於今日而有開必先者乎異時國家采民風被管絃以比隆於二南之盛者不有取於是耶是又不但為一人一家之美而巳故為序而不辭李母太夫人八十夀序劉繪吾鄉李一元少以藝業投予遂相從遊情好甚篤未幾聯鄉薦以次登第中間利鈍驚喜顯晦大都相同乃知人生交遊有數非偶然也其後予侍左掖忤論窣執一元亦自戸曹上書極言朝廷大務憤發邊防指切無顧計及予出補巴郡銜者竟得修怨一元乃以稽勲郎在告適亦有異己者含沙焉再上封事閽者遏之從此振衣歸田與予復以道義切磋於暮年予喜燕逰不能去紛華一元澹嗇絶軌城府昕夕以書規直欲不罣温飽乃為不詘又每嚴凝其論著書談道善化鄉井今年太夫人夀登八十鄉井父老偕諸生感一元德化皆賢其母願稱觴為賀一時榮樂可謂盛矣夫一元奮跡韋布超厯華要受玉書紫誥以榮其父母父母勤耕桑蠶織見其子顯貴受繡服象翟以耀其身此固人生竒遇鄉人其不曰慶矣乎慶矣乎自予觀李氏母子廼出蛟龍鬬怒風濤萬里之中而忽坐廣厦細旃之上方當其子飛疏逆鱗排叫閶闔己不知己之有子而遑恤計其養其子慷慨亢節以身任天下欲酬其願於炎海氷塞之外己不知己之有母而遑恤奉其歡故曰成敗之轉譬若糾墨危哉昔王母能成陵之功而不能全其身范母能成滂之節而不能全其子古今類是者不少一元以身許國而自振其名業又全其身以事夀母鄉人其能盡知之耶今時望猶藉一元不知其用世之意尚在念否予以為志不可竭福不可侈若一元之才雖繫名王東海之上西驅天驕箠北闕下亦丈夫所常若率其子弟公孫纓緌濟濟酳爵饋漿於夀母之前天性嘉樂鄉里内外稱慶者以千數而節孝之名足勒金石彼即有佩印擁旄標名沙塞者吾不以此易彼也許母張太孺人敘李攀龍予弱冠時吾黨士盖多從殿卿逰矣則殿卿乃三顧予廬中信宿與言天下事握手不置也吾黨士至相謂曰久不見殿卿何至與李生友哉李生狂生也余與殿卿讀書負郭窮巷不能視家生産落落羈身鄉校内佔畢業為之俊傑相命以好古多所傳外家之語慕左氏司馬子長文辭與世枘鑿不相入日月省試有司伎不能稱既禀室家嗷嗷視一弟子員如匏𤓰矣予復每過殿卿即縱酒談笑上嘉版築屠釣之遇下及射鈎贖驂之役苟富貴無相忘也仰屋竊嘆重悲昔人盛年功名扼腕之間無不志在千里計未使吾黨知也太孺人從旁觀之乃亟為殿卿言向從兒逰者無豪易髙也此人亦孤貧泥淖中意若颺去才乃大常兒急之勿失此人哉彼不知李生奚為知若也殿卿亦言陸沉於俗使無皭皭之行遘㑹崛起澤大流施而人莫知我所為生不及兒明精淵識矯矯逸氣巍如泰山不可動浩如百川不可禦兒不及生也太孺人中嵗寡居日夜竢一子有建立時儼無愉色即從逰士數來殿卿又往往輟牘迎之終日不得下帷誦太孺人始猶對客佯為呵責殿卿者久之從逰士復不謝絶太孺人則扄鑰持門戸盛氣厲辭鞅鞅去諸子矣以故殿卿無擇交向令窮困時有所失私昵乃今何能不憊精神降體貌以事未嘗知己者對坐以目無可與語彼我扞蔽動及賄食田舍瑣尾鄙倍盈耳黾勉答問一言不相應即忸怩作塵狀以恫𠂻疑我稍厭復謂無故人情引衣起走惡聲載路是不以憂太孺人乎余往過殿卿則鞅鞅去者瞰余又相謂太孺人顧奈何内狂生也余尚記憶殿卿自肥子來持進不滿千錢太孺人命給余夜讀值膏數升遺之余至今耿耿東壁餘光念哀王孫而進食意無已時又殿卿於我無論沫濕相呴濡即上書張中丞府中相推第身自賤士乃手援我殿卿豈自知後時乃至今也太孺人雖年八十乎然殿卿己著國士名大錫母矣即有憂生之嗟懼不先鼎食爾太孺人於余有知興之感在殿卿顧久下人哉時又何可為也余猶及復兒孩提時薛家婦抱子矣襁褓相藉太孺人撫育三世而處其慈又皆秀發孺慕悦人志意斯稱吉祥善事乎夀史母序徐渭予嘗與客論水孰難易客曰溪澗難河海易何居客曰溪澗之水束以兩厓齒以白石廣不踰丈深不滿尺鮒不得掉跋者惟蛭河海則不然際天極地出日入月萬寳瓌瑰虬蛟等蠛取者無窮用亦不竭由斯言之寧不溪澗難而河海易耶予曰是則然矣當夫震風鼓天秋潦不止一蟻穿穴百隄為毁汎泥汩沙旬晝未泚馮夷陽侯袖手莫計而溪與澗也澄湛細流朗昭𤣥晳規矩尺寸易為小飭即有微揺旋起旋息當此之時水之難也屬之溪澗乎屬之河海乎其在人也亦然故卜子夏田子方魯仲連諸人取於世也少其自守也恒有餘故鮮所疵纇孟嘗春申平原信陵用於物也𢎞故其於檢也常若有所不及茍及焉則非情矣故人得而指其瑕其於女子婦人也亦然故陶侃之母貧約無他營也截髪剉藁以易其供以給其秣茹蘖食荼事非有多於訓其子也故曰易巴寡婦清之以一嫠也而馭萬鑑奴千指乃無有溢德致禮萬乘故曰難其在今也亦然史恭人之偶少卿公也少卿之績比隆四君宜其溢且瑕也而恭人居其内天下之賢少卿自存至亡無或異口其朂孤之遺久而後司𨽻於朝也恭人居其上天下之賢司𨽻自髫至胄無或異口故史氏之先貞女稱烈猶澗之有沚也故曰易也恭人檢約而無溢德猶海之絶瀾也故曰難也其於夀也亦然他人寡應而慮省皓首也而耳與目猶聰明手足無所苦易也恭人日酬百月酬千嵗酬者千而十今年若干矣而猶耳目聰明手足無所苦難也難固足賀也亦因是以知其長也張母八十序徐渭始吾與子鍚子文輩居相近也子鍚伯兄將軍曰子儀者暨兩弟並來就予家塾稍後而子鍚子文乃與予同挾䇿而翔並髫也兩家兄弟無一日不三四至竹馬裲襠一趨而到門盖自屋畔庵左扺衛署右衢數百步間風塵縷縷昏一巷皆吾數童子所蹴踏也而予與二張即髫占對屬文稍稍驚座客名一時誤起郡中而太君者與其太公並拊而憐愛之至則啖以粔籹餦餭或出果餌入袖中戲劇而蓬垢則為櫛沐綻則為針紉澣熨不憚細瑣而閥固將軍也備戎物或弄劍槊拾而引弓相與牽櫪馬不轡而馳且射衛墀道中超臺級至墮跌損壞而母終愛之不色愠亦不甚禁詬兩兒子意若期以濶逺不屑屑事兒女束箝者數十年來二張者薄俗學為詩人四方知之賔至盈座吟嘯酒盞間無虚夜而予顧逡廵庠序中庶幾一飛而屢墜既乃觸網罟謝去其巾衫益一意於頺放時時復從二張㳺而太君益為治爼脯釀黍秫教飭諸婦毋違夫子意人或問之太君曰顧人家於人倫天理中毋大虧欠耳至富貴㑹有盡時兩兒子若其交儕輩中所馳宜不與彼校短長也噫鳲鳩稱君子之夀不以其用心專一耶太君數十年中視其子與吾輩如一日予與吾輩所履有不同而太君者自小時啖果餌以來至今為治爼脯之日無不同故太君者當其被戴笄珥則女婦儔也及問其中則鳲鳩之君子意者其莫過矣此不可以卜太君之不短耶及是太君年八十矣交太君之子輩令渭操筆以頌某唯唯己則頌曰某誠自棄不能如淮陰釣徒持千金以報漂母飯天如有意於吾輩其令吾輩更頌太君如今日者四十年以少報太君啖果餌治爼脯與釀之德也夀沈母張太夫人九十序趙貞吉始乙未予同為庶吉士者三十餘人而奉母就養京邸者數人耳於時泰州沈吉士德夫之母張太夫人七十設帨之辰館中推尹吉士暨予為文合歌詩具粢羮栗棗以慶之明日主人稍備酒食宴諸賔於堂而饋其母氏於宫賔致辭曰敬夀太夫人矣有子讀中秘書必為名世士以光太夫人於無疆母氏使人答曰為謝諸君兹吾兒得友天下士其庶幾有成未亡人亦藉手以見先子盖張太夫人義明志㓗而通於文事有古烈女風一時稱名母矣此館中一勝事也無何諸君皆散列於職不復有此暇踰二紀昔之為文章詩歌人己艾然稱老而況於所祝頌之老人哉然聞張太夫人拜九十矣明㓗康寧無改於昔豈不異哉德夫時亦乞少司馬身以致養於家而太夫人甚安之夫以仙然不老之親而有翩然勇退之子以事之也豈不尠哉此又海陵近一勝事也於是少司馬公之同舉進士而仕於留都者有九人焉而六人者出於館中予待罪光禄以從諸君之後欲修館中舊事以諗於海陵而諸君復以文事諉予予豈可讓也哉因憶往者予述太夫人事太夫人讀之愴然以命德夫曰汝毋忘趙子之規也盖太夫人抱志克家於艱以砥礪德夫之業而日有睇目之望予安得不以守身事親之義告之今則器業己成非予可及矣予觀少司馬公涉世有法而始愧予之坎壈矣忠不違親孝不疚義知險知阻一健一順風雨蕭蕭而鷄鳴不已以成其令名以得其親懽心矣雖古之君子亦率用是道焉耳豈子可易及者哉故始予之規之也稱義納誨而兹予之為詞直頌焉耳咦予盖涉世而後知此道之誠難也夫太夫人難於其始而德夫難於其終者也何則始之難者母道也亦妻道也母道得而妻道始盡太夫人稱名母宜矣終之難者子道也亦臣道也臣道得而子道始盡則少司馬稱名士奚為不然哉夫以名士奉名母奚翅海陵之勝事而館中勝事越二紀而復舉則司馬公為不負夙昔所期而予亦得逭於私頌之責決矣顧孺人六十序歸有光孔子曰斯民也三代之所以直道而行也孔子之居鄉自以為無所毁譽於人獨其所以是是而非非者不可得而廢不惟當世之名公卿大夫至於莒人之妻泰山之婦人亦與其門人私論而志之以為三代之民所以是是非非者如此夫豈獨春秋之義為然予少好觀古事嘗有意於考論其世而廢置草野無史官之任然時有慕於古之作者得因事立言以著其是是非非之跡是斯民之所以直道而行者庶幾他日有裨於史官顧孺人者太保文康公之女上舍朱君子求之配也上舍早世孺人守節垂四十年今年六十里中士大夫徵予文為夀孺人以幼艾兢兢未亡人能保其身至於六十而為夀其亦可稱也己自予為童子讀書盧兖州家盧氏子弟數稱上舍之才俊不幸短折而趾美於其弟少宗伯而予之從祖母實孺人之姊故知文康公夫人之事為詳公起諸生官禁近三十餘年迨入内閣推封一品夫人未嘗見其喜愠之色凝然獨處言笑不聞文康公是以敬之如賔而孺人之資性髣髴如其母云由是言之女子以才智自見者要非其德之美若夫沉黙簡重居適意之地如夫人之受多祉及所遭之不幸如孺人之葆真全節其於坤道之順一也當文康在館閣孺人實依母氏居京師邸第親見夫人朝兩宫佐皇后親蠶宴錫繁縟備極榮寵宗伯方為黄門家勢隆貴而能以紛華盛麗之間獨全純白縞素之質於桃李艶陽之時凛然松栢嵗寒之操視夫寒女窘婦生長淡泊之中無所見而能不亂者為尤難矣豈非予之所欲得而論之者哉孺人之嗣子某以孝謹稱能成孺人之志者因併書之吳母陸碩人夀序歸有光澱山吳先生少與吾祖逰予嘗識之先生以易學教授鄉里邑中名士多有出其門者望之氣貌冲然不問知其為君子晚年生五子甚愛之而進誠君最長從亡友吳秀甫逰予又識之其為人淳篤似其父而翁又髙年君殆不類短折者一旦遘疾時秀甫有園地在邑薦嚴寺之北偏君養疴其中予又時時候之不意遂至大病而遺其孤寡是時碩人年始二十有二諸孤小者二三嵗予始憂其不能以立也君家相去幾百里予又日閉門不與世接久之絶不復相聞獨予友李亷夫為其子延植娶君之女而碩人又以次女與馮夢龍故登州太守君美之季子也亷夫舉進士為大官延植入胄監而夢龍有聲縣學予嘗歎進誠二女子皆與官族其倩又才良亦君父子厚德之報也嵗之十一月夢龍過予云碩人今年五十有一乞為其夀之文問其子皆成立矣其田廬奴僕有増於舊也翁詩書之澤不墮如髪今子壻詵詵進誠可謂不亡矣以田里之女子介然持其門戸至於三十年以遺其子可不謂之賢哉君家澱山湖旁在吳淞江之南田地肥美而民俗朴茂每嵗稻田熟有黄雀紫蠏為吳中美味君又種柑橘諸木秋盡早霜黄金滿樹而湖水沉浸數百頃真隱居之勝地也予始與君言欲訪之不果何意俛仰間而君家己更三世矣能不為之憮然也若夫頌禱之語夢龍自為之予獨序其所以云張母周夫人六十再序歸子慕天下之物其多寡有無之數一也而惟能用物者不為多寡有無所制不為多寡有無所制者非謂其以無為有以寡為多也能盡物之用也能盡物之用可以為有可以為多矣易曰無攸遂在中饋詩曰無非無儀惟酒食是議由其道安其常如是可謂女子之正矣雖有明達髙世之資無所可用而於用物之間亦有以自見者子慕自結髪即與夫人之季子游居閒時時過從季子至則夫人必飲食之酒清饌美使人不醉飽不得自已諸所從季子游者其待之盡然夫其家之窶也幾不具饘粥而能使其子必得朋友之懽心夫人之能用物也王陽父子衣裘鮮麗以為吏若此其亷也以衣裘若此其麗也故世傳王陽能造黄金王陽非能造黄金也能用物也能用物則陶侃之母剪髪剉薦設精食為其子延譽不能用物則劉季之嫂客至而轑釡其子後貴被以羹頡名周南后妃輔佐君子求賢審官朝夕思念憂勤之至矣而其詩則曰采采巻耳則后妃之能用物也后妃之能用物巻耳是也召南夫人之能用物采蘩采蘋是也夫人以此相其君子則有二南之風以愛其子則有陶母之行也葢夫人之性情勤儉慈惠尊尚天産惟是一蔬一茹之不敢不愛不敢庸越而必以善用之以故於屢空蕭然之日而能用其豐美見者不無王陽迨金之疑而不知夫人之設處方畧能變惡草為異味酸鹹濃淡百試之而不爽其中賔朋交退掩扉扄戸不忘經營臨時而晏如品精鑿貯器滿少勝多一當十擊一鮮佐以蔬三簋而充然四簋而甚設五簋而當大牢方丈之食無以易此賔主皆樂而財不傷故天下之能用物者吾以為莫如夫人夫人之費所以為嗇夫人之勞所以為逸夫人處其無而愈有夫人處其寡而愈多得其所以用之者矣今兹夫人年六十季子之友君虞君謨謀所以祝夫人者而私屬余曰夫人春秋髙宜自逸不得重以酒漿之事為勞夀之日二三子盡請間規之子慕曰不然户樞不蠧流水不腐是乃夫人之所以夀者也王孟夙母魏孺人六十序歸子慕禮之行也必本於情情至而文生文生而禮成不本於情驅一世之人以虚文為不得己君子傷之夫人之於子慕表姊也然而子慕之生也三十有五年矣未嘗一見姊姊之夫子為先達厯郎署為郡守歸於鄉里比其謝世也猶未知其鬚眉狀貌之何似然則與行道之人奚以異雖然子慕之得交於夫人之子孟夙則有年矣久而益親子慕終不以姊為問而孟夙之執甥禮愈恭子慕意常踧踖不自安夫與人為甥舅至欲以舅自處而踧踖不自安知有友不知有姊其於友誼為無失矣而於姊不免薄昆弟也朋友之交也舉其一廢其一豈所以並行而不悖者哉嵗之丁酉夫人春秋六十子慕始得舉觴為夫人夀厯階逡廵却立者再私念曰今日之為夀也而以姊之故也於情微今日之為夀也而以朋友之母也於情篤從姊乎從朋友之母乎曰從朋友之母又念曰今日之為夀也而徒以朋友之母也夫人未必引而進之今日之為夀也而以姊之故也因得以覿夫人之貌從姊乎從朋友之母乎曰從姊於是以兄弟之禮見君子謂是舉也賢賢而親親本於情合於禮異乎世之為夀者矣明文海巻三百二十五
