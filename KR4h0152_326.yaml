body:
  text: 明文海卷三百二十六餘姚黃宗羲編序一百十七列女夀誥封何太安人序黃道周吾鄉何玄于先生興其家學兼總諸經生值興時與道俱泰欲以其博通敦説者上佐天子下誘來彥方今搜討異才紹衣世廟鼓舞通變與天下盡神先生遂從郎署特擢為給事中宣綸之日人以為書呈圖見鱗羽所宗不是過也太夫人值覽揆之辰鄉里長者進黃生而問之曰子觀往昔橫經之儒有被寵命如此者乎曰有之梁丘賀治田氏易著於地節匡衡治詩禮著於永光皆起郎署為給事中與天子密邇延問得失使微言大義不絶於天下今士大夫持論錯於申韓甚者以為朝賈喜剽説爭一時之急未有窮本探要如何先生者也長者曰梁匡章句何敢方先生然漢給事中皆領尚書少府安昌博山皆以侯侍中繫印綬盤礴石渠出入溫室故能發抒布其藴藉今給事秩下郎中徒以封駁持國是安所得橫經帝前進粵若而稱之黃生曰然子不觀貢禹王良孫寶盧植皆為議郎遷諫大夫朝發一論暮播九室親不如安昌密不如博山而令聞施於今日况今先生原古昔諳時務格當寧以應化柄使天下搏心戢志敦庸反經何必偃息虎觀之旁棲遲逢掖之下乎方宣德時始制巡撫一日擢四曹郎為亞卿分命節鉞今其傳者獨于謙周忱耳他以薦舉改授得翰林者纍纍皆不甚著士致用固在覃精非貌為髙尊也孔北海曰雋不疑引經而定北闕之前夏侯勝當車而辨常陰之驗與夫巨骨出吳黃熊入夢隼來尺砮亥有六身非洽聞周覽者易識其端乎何先生以通敏之才逖稽善斷俯收衆議遐本載籍任城之世業平陵之家緒於是益昌矣溫室石渠何足多也長者又進曰然有宋名賢湛尚道德如鄒志完劉器之皆以母在堂且不任諫官今天下庶政萃於六垣羲照之下不遑啓處先生方以志色兼養而為天下觿杓醯醬日不暫舍何以得晨夕穆色嬉志者黃生曰是則在先生矣曽誕有言君子知道而神立志而清鄒志完立志矣未可謂知道也先生聲振條貫穿徹要妙六爻所以伸屈顯義所以終始先生體備之矣吾儕小人昧於天時不勝人事則又何稱焉於是長者奉觴而進曰吾今而知希有之賀旌表盧母節孝序黃道周孝子曰天救慈衛何謂也國養於其母家食於其母髙䦘之門內無慈良其實不讓故天下極豐百榮憤張衡宰不慈橋臂自雄瘈狗相伺其轄必亡家道將理厥有士女以似以續以為徽主故為慈以救孝孝以救義救孝則天下歸德救義則天下歸制為慈以救節節以救儉救節則天下歸信救儉則天下歸利焉故禮以衛貞則以衛清至衛歸慈乃與天所天道之所尚慈者以為露雷風雨皆出於地地皆不任而獨自以為牝韌韌然使生者得以養死者得以葬如此而己易曰先迷後得無成有終救迷而衛終生樂以人名而名之於反故曰含章以余所觀盧母張孺人天衛之矣所謂天衛之者孺人之嬪於盧甫可逾載祖德不殄而孺人有子蓼荼叢集垂四十年內有喪祭之任外有睥睨之釁天救盧氏則必以慈衛孺人天衛孺人則孺人始得以慈衛盧氏故盧氏之有孺人所謂天救孺人之撫有盧氏所謂慈衛也子産者鄭國之相也而國稱之曰母夫豈以子産無烈火之焰竹書之劵也乎為人臣子心創而著其忠孝為婦女心創而獲其節義各以救人則不獲自救以衛人則不獲自衛所獲其救之衛之者天也孺人之為閫相有十載之姑十五載之翁二十載之凶孽戾宗以孝則牖下之庀莫之敢尸以義則蕭墻之慝莫之敢作以節則自甘而安以儉則不過乎物是非一慈也而謂慈領之者猶夫墳衍之生露雷嶽瀆之起風雨墳衍嶽瀆不别於地而包舉之譬於國僑則慈道含章矣故持人家國不明慈衛之義者以救國則無以衛其家以救家則無以衛其身孺人之翁司徒公方為銓郎時江陵初柄國用威楚束濕海內既濡首不自終制海內章奏道孝義者率格不下司徒公當時心非之也今海內又明法上下逡逡以文貌相羇然小有劇賊燻勢力劫士大夫則士大夫俯首汙面從之當寧不得己亷諸海內孝義之行用章闡風示之則是天下士夫率自救瞑眩籍是笄髽者以為發藥也堂內即甚慈用筐篋盛其喜怒諸姊授管鑰投地鏘然則櫛縱有銼疽之痛安在嚴家之無格鹵乎士大夫固自嚴以當寧視之則猶孺子也姚安太守張先生曰吾女幼而知書識道理遇大事有擔當不為浮議所動天下固多男子識道理通詩書值大事委擔相視道逢傭奴談禍福吉凶目瞪然不知所謀遇金炭輕重崩角攀昻者不可勝數此其故豈可僅操箠拔作之乎天下無事不講救衛之術驟有事又不得志操婦人冠紱而前則是使雄貌雌聲者相謾為笑也故謂天下失德救以孝天下無制救以義天下寡信救以節天下失利救以儉四方未得吾慈不失以張孺人之慈立於􅑶臲四顧之際抽緒如線以至於未被方幅使夫賢俊長者望其胤子如吉光威鳳冀為儕輩恐不可得以是而衛天下猶操井上繘瓶而舉之也巾櫛而有國僑則是在斯矣於是八月曲周路直指述諸風誦以孺人之行達宸聽既有命逺邇翕然姚安諸昆從謂余實知之余謂是天下之慈衛也故因為解老而又舉之以當頌於此吳門范趙兩大家集敘潘之恆詩首國風風首二南自后妃諸侯夫人大夫妻庶媵姬妾莫不有詩大抵皆出婦人女子而風實係之漢魏晉唐而下始屬之士君子以代閨閣之詠乃謂婦人工詩為非宜而傳流者或倩之男子目為贋作其謬益甚漢書續自班昭合宫師事稱曹大家東征列於文選女誡載之內則亘古推為良史至如婕妤團扇蔡琰胡笳雪詠謝庭詩謔鄭婢徐淑寄椽羅敷有夫燕子樓浣花溪之什即冠紳名家猶避其鋒而昭代彤管之編何其多瓌瑋琳琅也蜀之楊信之費會稽之孫此三夫人者皆以藻麗名世許景樊夷女尚擅譽朝鮮誇於華夏而況我明文章辭翰炳耀於前者乎緗帙瑶編三吳為盛不慧居吳最久與范長倩趙凡夫兩公定盟二十餘年傳壺懿而奉徽音絡緯考槃之集久為欽服未敢增損甲乙而贊一辭彼將模楷聖經伉儷詞宗孰能窺其閫奧每為之嘆賞嗟誦而己嵗戊午館於宣城過王君玉汝齋頭偶見披閲二集至韋絶笈敝且多蠅頭蟲書標於鉛槧間雌黃采掇務取淺近警句余乃大驚此吾十年來未得定而定於誰氏耶王顔頳發猶豫未吐其友詹曰至代言此王君閨淑賈氏朝夕所諷詠者也夫卑梁之女致師於采桑僖負羈之妻宥愆於加璧即參二隗蕩蔡姬曽足當齊晉之賦然衛女謝伐國之謀薑氏任反戈之戮皆自女子發之安知盡出管晏二君下也故余一從賈氏所定同曰至詮次而傳之都門以假溢於彤管彼齊之雞鳴唐之蟋蟀其喈喈瞿瞿者尚欲發明王之夢惕良士之懷試觀列國遺風亦將有感而興矣陳小韞詩序鄭之玄陳小韞者豫友陳宗九之令女也宗九博學多聞善諸體詩小韞年八嵗竊學宗九為詩得語云素手挽琵琶清聲明月中宗九見之驚曰此吾家道韞於是小韞能熟讀綱鑑世説二書益為詩宗九稍出以示余余始駭嘆我輩不如也古今所傳樂府諸題其事之關於閨閣者率男子作女人語雖工不必肖若夫以女子作女人語則渾身都似矣此小韞之所以為詩也鍾記室詩品言自李都尉迄班倢妤將百年間有婦人焉一人而己又曰為五言者不過數家而婦人居二徐淑敘别之作亞於團扇何戞戞其難之也他如蘇伯玉盤中之妻竇連波廽文之婦莫不曲折溫柔纒綿深妙讀其詩者使人有仳離悽怨之感豈男子所能為哉小韞之詩體物甚微溫婉而靜無傷怨之遭雖不必方之於古要自成其為閨閣之本色矣其詩之嘉者咏蓮云輕舟忽逢三數女手撥荷花隔舟語片片花英隨波流隔水爭拋青蓮子籹樓美人云宛轉秋波自點點緑鬢梳成春雲黑纎腰無力罷曉籹風飄翠袖動簾箔搗衣云須臾月落青天曉空庭惟集雙啼鳥織將錦字寄秦川爭奈深居行人少玩月云月容何事帶雲紅却被風來雲已東為愛入簾分碎璧忽看掬水若浮空將過三五俱堪玩半失圓明自不同信死信生誰會得好將底事問天工皆體物緣情語也豫故録而記之恐其久而失之又系之以詩詩曰樓頭題得美人籹素手琵琶學句嘗錦字烏絲闌欲滿玉臺艷曲體誰長間情欲共流蘇語詩氣渾如噴雪香恨事世間常不少可能天壤嫁王郎鸝吹集序沈自徵嗚呼余安忍序吾姊哉姊長余一嵗分梨簸錢之景儼然在目俄成隔世石火電光恍如夢幻故姊氏歿後余家業都捐無意人世臨風追念惟有涕淚盈把寧復堪詮次其斷腸也且余又何能序吾姊哉姊淑德麗才掩嫮風人擅徽來哲克為女範之宗寧僅如世之閨秀稍能弄柔翰者比余襪線短才生平期許彈鋏無成行將以頭陀老又安能以玄晏重吾姊也乃仲韶再以書趣余必欲一言辨首豈非以女子行不出閨閣昭詠絮之才必將於封胡羯末徵信也於是為之牧淚言曰語云詩能窮人詎不信歟豈直龍門湘水侘傺畢世即團扇流黃女子不免蓋靈根慧業造化所靳惜而窮鬼所揶揄有由來矣姊氏夙具至性四五齡即過目成誦瞻對如成人憲副先子甚鍾愛之恆抱弄於膝不肖弟幼頑劣爭棗栗輒鳥獸抵姊姊弗恚以好言解之先大人相顧詫為不凡顧恭人樹萱不永先子棲心禪悅以兒女纍多為蘋飄散去心獨憐姊遣姑氏張孺人撫之葦簾藥室宛似蓽門之楣所謂綺閣金鋪者無有也幼無師承從女輩問字得一知十遍通書史將及笄遂手不釋卷每念顧恭人蚤棄琉璃硯匣之旁鳬鷖繡牀之暇時有涕汍瀾也十六而歸仲韶苦貧女稱有室矣襆囊木櫝而往贄脯不具無以籍稱官門送女者姊恬然自適也姑馮太夫人年髙姊矜嚴事之針管觿燧與芼羮佐餕每下氣柔聲猶恐逆姑心逮夫兒女林立姑少有不懌姊長跪請罪如此終身馮太夫人久而益怡雖古稱孝行如崔逺之母者奚以加兹仲韶鵲起時髦珠瑩玉秀克稱王謝風儀姊靜琴既翕益肆力於縹緗或作頌春椒或儷銘秋菊中閨倡和業日以富然仲韶纍屈秋闈偃蹇詩書間家殊瓠落姊從牛衣中互相勉勵未嘗作踐面羞郎之詞也逮仲韶登南宫受鸞誥稱命婦矣姊處之淡然略不色喜屬仲韶數竒落拓一官浮沉金馬産逾益削上世莵裘良畬盡折入子母家姊簮珥纈繡悉以佐不贍篋無餘飾剩襦而姊諱言貧上事下育勉力拮據融融泄泄不以動馮太夫人心然米鹽漿酒之暇不廢吟詠故其從政白門爰有楊栁藏鴉之句聞警甘泉不無寒砧木葉之思生平鍾情兒女皆自為訓詁豈第和膽斷機亦且援經課藝當夫明月登臺則蕭史共賦飛霰集戶則謝女呈篇飲醪則誇北海之兩男辨絃共佳伯喈之幼女既蘭芳而蕙茂亦瓊映而玉暉花萼相鮮人倫盛事洵為寡儔矣無何而少女瓊章玉樓先召長女次兒相繼夭折禍且延於馮太夫人逾年之間不祥駢集既滋喪明之傷復加殞妣之慟血盡骨立竟以身殉嗚呼痛哉吾姊之為人天資髙明真有林下風氣古來女史桓孟不聞文藻甄蔡未嫺禮法惟姊兼而有之生平不妄言笑而和煦之意藹於顔面風度夷逺不喜作時世裝束然一旋折一啓粲娣姒中明慧者爭相效之終身莫及人情機警者鮮忠厚姊於人情曲折悉若列眉終不盡言以翹人徐以片語應酬則談言微中盡為解頥而行己每𠂻於古人報施必從其厚道處郗家之冷暖介阮氏之貧富意泊如也獨賦性多愁洞明禪理不能自解免雖一生境遇坎壈為多亦良繇稟情特甚山花開落隴月盈虧光陰往來榮瘁互代而臺前鏡裏偏多躑躅之懷緑水芳叢恆如搖落之感當夫博山煙定竹戶風來階除移半甓之影燭花垂一寸之炧觸緒興思動成悲惋香箋盈淚彩筆餘辛奚必廽軫隕涕聞笛傷心今閲其遺編如怨鶴空山離鴻朝引令人恍恍殆不欲生所謂沉悲生疢積痛傷年竟以憔悴一生齊志玉殞嗚呼痛哉則詩能窮人之語不其然乎不其然乎當余仗劍塞上徴逐黃沙白草金戈鐵馬之中世味咀蠟誓不復歸以緘書寄姊訂無生大業姊報章言從夫既貴兒女盈前若言無福似乎作踐但日坐愁中未知福是何物此生業重惟有皈向空王以銷之耳其生平情況大都若此雖然使仲韶綰綬峥嶸家擁金穴姊珩璜節步暉曜中閨亦不過所稱副笄六珈享世之癡福己耳又安所得金石之録與采葛織錦共垂不朽所得孰與仲多詩未必能窮人姊又可一笑於寒原矣集若干卷聊贅數言用質震旦閨秀非第為玉臺嗣詠巳也明文海卷三百二十六
