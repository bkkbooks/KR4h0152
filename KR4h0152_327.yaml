body:
  text: 明文海卷三百二十七餘姚黃宗羲編記一居室櫟軒記趙汸鄭之恆僑居黟水之南烏聊之北題其隙宇曰櫟軒其言曰櫟不材木也無所可用是以能終其天年吾聞之莊生云居無何大夫士為詩文以釋其名軒之義者甚衆言人人殊鄭之恆不懌以其間日之黎陽山中見支離無謂而問焉曰吾以櫟名軒而人鮮能喻吾志者言之輒異何也支離無謂曰子無惑乎人言之異也世之所重者材也而子獨以不材稱材之所貴者用也而子獨以無用全子無惑乎人言之異也雖然生之有壽夭豈材不材之謂哉深山之楩柟豫章閲千百年未有過而問者道旁之樗櫟未拱把而伐於斧斤其所託者不同也夫櫟之不材猶樗也櫟以社而存猶樗之以神也然社有變置而舉或廢之則樗與櫟豈能自全邪謂不材之木獨能終其天年非莊氏意也彼莊子者悲夫世俗之士以軒為纍不若不材者之無用也故為是不得巳之言又悲夫不材者亦有時而不免也將自處於材不材之間然材不材之間似是而非猶未免乎纍也則夫可以害生者豈惟材哉邦君之於國也聖哲之於名也皆纍也彼且欲魯侯灑心去欲而遊於無人之野使仲尼辭交遊去弟子而逃於大澤其憂患乎一世者豈有涯哉嗟夫亂世多害智愚賢不肖俱困而莫知除其憂此夫人所深悲而非為一己之私也子之以不材自處豈其意耶曰然則莊氏昔所謂者非耶支離無謂曰莊子固嘗言之矣其所保者與衆異也且子亦嘗聞所謂物之初者乎遊於物之初則不物於物不物於物者益之而不加益損之而不加損天地蘧廬也古今一息也死生旦夜也虎兕無所措其爪角兵戈無所容其刃無傷于物而物亦莫能傷也是豈材不材之論哉雖然為櫟有道即子之居行子之志使董梧無所用其助而舍者爭席則材與不材皆不足為子纍矣又何恤乎人之言鄭之恆矍然而起釋然而悟曰善哉進於道矣雖然吾於櫟有取焉請書是説於軒中以為記華川書舍記趙汸婺州義烏縣有澤曰華川王君子充書舍在其上同門友宋君景濂厯敘上世以來為文者之失得而卒歸於聖人以為記辨博精詣殆不可加矣邇者汸與子充相見於錢塘子充又俾汸申其説既不得終辭則以復曰聖人之文非一家之言也昔者成周盛時帝王制作大備其載諸方册以垂軌當世者謂之經若韓宣子適魯所見其類矣詩采諸民間策書辭命職在史氏未嘗使學者執筆習為之也吾夫子順先王詩書六藝以設教而學文之訓門人識之亦曰考觀聖賢成法以盡其職分所當為者而巳蓋自一身以達天下彌綸益著而非外求由小學以底大成品節愈嚴而無二本成德達材之衆率由於斯而徒以文學稱者非聖人意也是故夫子嘗刪詩定書贊易修春秋以為萬世明法而必曰述而不作曰吾從周則豈以言出於口者謂之文哉戰國爭強道術分裂則一家之言興而異端起矣自兹以來吏治不足繼以武功而為國者始思息民以黃老經義未明流為箋疏而反身者唯知洗心於釋梵由是馬班崔蔡之倫以文名家凌厲縱橫浩不可遏而先王經世之術微矣賈誼董仲舒掇拾於殘闕而莫之行諸葛孔明范希文鞠躬盡力而未足以有明也舂陵河南大儒繼作然後二帝三王所相傳授者始煥然於時關中張子因之崇執禮之教精思以致道修辭而斷事以一鄉而凖天下考三代以示方來卓哉學者之楷模矣逮新安朱子繼周程之緒大明經訓以覺斯人而浙河以東若吕薛二鄭氏取周公舊章離析錯綜如示諸掌學者於斯得窺見聖人制作之盛焉然當是時陸子靜氏起於臨川以其得於心者行乎家邦充然自足而諸君子之志荒矣薛鄭會歸於朱子而吕氏則無間然陳君舉薛之徒也乃自以書請益於陸氏此又論先哲於鄉土者所宜慎思而明辨也况夫有志於斯文者乎子充早受業於同郡學士黃公黃公之見於文章者嶽靜淵澄不大聲色固非欲以言語文字名世而子充明經潔行卓越不羣因鄉先生精神念慮所存以端述作之本原極古人之能事必有徴矣則雖俯仰一室而所以系吾徒之望者何可量哉浙東多文獻故家他邦莫及昔豫嘗欲往遊而未能異時考德會文之樂舍華川奚適乎共學齋記趙汸后王降德之道不明士君子能反諸身以為學者千百年來大略三變以復于古而異端不與焉處汙濁之世不忍自同於凡民而又患夫資之不足也於是乃有佩韋弦以矯偏運甓枕圓以警惰晝有所為夜必焚香質於神明念慮善惡之萌必察焉而各以其物識之以觀其消長蓋動心忍性不如是不足以有立於時則自知也亦明矣於是有君子者出主忠孝以飭其躬以匹夫而主師道使在三之義赫然白於天下後有作者不敢忘焉其視專一善名一行則又逺矣於是又有君子者出以其得於天而成諸己者本經訓以淑斯人使先傳後倦之教下學上達之旨復明於世蓋秦漢以來學術多矣至是始歸於大中可謂罔極之恩矣自其教行髙明特達之士翕然歸之然其間善學者乃復因其性之所近端居默識以極夫反己致曲之功而後傳之無弊則君子之學夫豈易言也哉汸學於古人而未之能進竊懼夫氣昏力薄不足以底于成乃題山居讀書精舍之西室曰共學與同志者居而勉焉噫人固與庶物並生者也苟無以反之則情熾利害之間將無以自别矧學不至於知至而意誠其氣機之竊發者每起於芒忽而天理之存焉者寡矣彼憤悱堅制髙邁卓絶以自拔於凡行者亦何可少乎易曰智崇禮卑智崇效天禮卑法地聖賢之言無二致也羣居終日而義有不出於此者何足道哉乃書之以為共學齋記見山樓記宋濂見山樓者上虞魏君仲逺之所建也仲逺居縣西四十里所龍山委蛇走其南將升而復翔其旁支斜迤而西則為福祈諸峯若車若旌若奔馬若渴鹿飲泉不一而足勢之下降為隂阜為連坡為平林一奮一止復襟帶乎後先東則遙岑隱現青雲之端宛類娥眉向羣山相嫵媚為妍其下有巨湖廣袤百里汪肆浩渺環浸乎三方晦明吐吞朝夕萬變方屏插起湖濵曰夏蓋山去天若尺五巖峙谷張尤可玩愛誠越中勝絶之境也仲逺心樂之以為非髙明之居不足延攬精華而領納爽氣於是搆斯樓日與賢士大夫同登鼎俎既備殽核維旅壺觴更酬吟篇疊咏及至神酣意適褰簾而望逺近之山爭獻竒秀晴容含青雨色擁翠不俟指呼儼若次第排闥而入使人涵茹太清空澄中素直欲勝鸞翳鳳招偓佺韓終翩然被髮而下大荒其視起滅埃氛弗能自拔者為何如也伻來俾濂記之夫自辛卯兵興闔廬所在往往蕩為灰燼狐狸晝舞鬼磷宵發悲風翛然襲人君子每為之永慨自非真人龍興撥亂世而反之正含齒戴髮之氓孰不在枯魚之肆哉縱有佳山日在眉睫間將不暇見之矣今仲逺雍容於觀眺之際亦曰帝力難名而吾民恆獲遂其生爾昔太常博士施侯作見山閣於臨川而荆國王文公為記其事且謂吾人脫於兵火洗沐仁聖之膏澤餘百年而施侯始得以樓觀自娛仲逺之去亂離僅四三載爾乃能抗志物表修厥故事如承平時此無他皇化神速有非前代所可及雍熙之治將見覃及於海內是樓之作其殆兆之先見者歟雖欲不為之記不可得也第所愧者濂之學識繆悠立言無精魄難以傳逺仲逺尚求荆國其人而為之庶幾樓之勝槩與雄文雅製同為不朽耳仲逺名壽延鄭國文貞公二十四世孫羣從子姓皆彬彬嗜學文章巨公多集其門而仲逺尤號翹楚且工於詩有和平沖淡之趣濂蓋聞之丹崖先生云栖雲室記宋濓中峯本禪師結廬姑蘇城西以為禪定之室翰林學士趙文敏公書其扁曰栖雲逮今數十年中峰卒而廬亦頽壞中峯之孫用菴照師作新室於故址復取故名揭之而屬豫以記余笑曰師其欺豫乎哉今之廬非昔時之所築也今之人又非中峰也而猶曰栖雲何哉室廬之壽以百年計人之壽以數十歲計禦燥濕閲寒暑屹乎有不傾之勢毅然有不亡之意今欲求其見之且不可得矣彼雲者起滅萬狀不可斯須審視奚為而久棲此室哉文敏公取以為名固異矣師取而重揭之又異也余復以言文之不亦甚異乎雖然自其易化者觀之則天地曾無殊於水中之漚自其可久者觀之流電之光可使比於嵗月自其有形者觀之泰山可以齊於毫芒自其無形者觀之一髮可以擬於嵩華久速巨細者迹也有迹者固不足恃以不壞不可以巨細久速論者道也斯道也何間於古今新故之分哉然則安知今之廬異於昔時之所築今之人異於昔之人哉而雲也安往而不在乎嘗試與師登姑蘇之臺而覽古今之變三吳之間崇臺廣榭涼亭燠館敷金碧而炫丹瑶極人力而窮物狀者何可勝數蓋有歌舞未畢而號泣繼之車馬陳於庭而狐兔己遊於寢者矣彼之富麗竒瑰茍與栖雲之室潔量大小何啻岡阜之於沙塵今彼皆不復得守而此猶能新其棟宇而不廢何耶蓋無道以保身者雖富麗不能久存而有道之士身亡而名立固不隨世以為變遷也吾坐乎斯瞑目而思之充乎室皆雲也皆中峯也入吾耳而接吾目者皆道也中峯之徒茍有志於道孰不可為中峯哉尚何取於區區之故名也乎師近道者盍以吾言求之苦齋記劉基苦齋者章溢先生隱居之室也室十有二楹覆之以茒在匡山之巔匡山在處之龍泉縣西南二百里劍溪之水出焉山四面峭壁拔起巖崿皆蒼石岸外而臼中其下惟白雲其上多北風風從北來者大率不能甘而善苦故植物中之其味皆苦而物性之苦者亦樂生焉於是鮮支黃蘖苦棟側柏之木黃連苦杕亭厯苦參鉤夭之草地黃遊冬葴芑之菜櫧櫟皂斗之實楛竹之筍莫不族布而羅生焉野蜂巢其間采花髓作蜜味亦苦山中方言謂之黃杜初食頗難久則彌覺其甘能己積熱除煩渴之疾所産荼亦苦於常荼其泄水皆齧石出其源沸沸汩汩瀄滵曲折注入大谷其中多斑文小魚狀如吹沙味苦而微辛食之可以清酒山去人稍逺惟先生樂遊而從者多艱其昏晨之往來故遂擇其窊而室焉攜童兒數人啓隕籜以藝粟菽茹啖其草木之荑實間則躡屐登崖倚修木而嘯或降而臨清泠樵歌出林則拊石而和之人莫知其樂也先生之言曰樂與苦相為倚伏者也人知樂之為樂而不知苦之為樂人知樂其樂而不知苦生於樂則樂與苦相去能幾何哉今夫膏粱之子燕坐于華堂之上口不嘗荼蓼之味身不歷農畝之勞寢必重褥食必珍美出入必輿𨽻是人之所謂樂也一旦運窮福艾顛沛生於不測而不知醉醇飫肥之腸不可以實疏糲藉柔覆溫之軀不可以御蓬藋雖欲效野夫賤𨽻局跳竄伏偷性命于榛莽而不可得庸非昔日之樂為今日之苦也耶故孟子曰天之將降大任於是人也必先苦其心志勞其筋骨餓其體膚趙子曰良藥苦口利於病忠言逆耳利於行彼之苦吾之樂而彼之樂吾之苦也吾聞井以甘竭李以苦存夫差以酣酒亡而勾踐以嘗膽興吾亦猶是也夫劉子聞而悟之名其室曰苦齋作苦齋記滄江書舍記王禕滄江書舍徐君方舟之所居以讀書者也桐廬江濵為縣君居在縣北距江不百武而近蓋唐比部方公勛之别業而宋名臣方公慤之故居君問來屬豫為文記其舍壁夫書之在天下可謂博且廣矣聖人之經儒者之傳諸子百家之著述厯代太史之紀録以及天文地理隂陽律厯兵謀術數字學族譜之雜出敷落旁行虞初稗官燕談朏語之並興其為説不同為教亦異而其為書類皆學者所當讀而通之者也雖然學問無窮嵗月有限誠有不能遍觀而盡識者而惟聖人之經則弗可以莫之究也是故易以明隂陽之理書以紀帝王之政詩以道人之性情春秋以示世之賞罰禮以謹上下之節文樂以通天地之氣運凡先王之道所以立天下之大本先王之制所以成天下之大業者皆於是乎在然自厄於秦訓詁于漢聖逺言堙愈傳而愈失時異事易愈變而愈非其流弊遂有不可勝言者矣且仁義性命中誠太極鬼神皆所謂道也妙極乎無聲無臭而不離乎匹夫匹婦之所知皆講學之樞要而乃以善柔為仁果敢為義氣質以為性六物以為命依違以為中鈍魯以為誠玄虛以為太極冥漠以為鬼神或至以佞為忠以詐為信以察為智以蕩為情以貪為欲以反經為權捷給以為才譎詭以為術而世皆謬迷於聞見之陋莫之或省若夫法制之道其弊尤甚井牧以居民而丘乘卒伍之不合則參以管仲穰苴之法封建以經國而百里五百里之不同則託諸歷代之異郊丘禘祫大事也或以郊丘為二或以禘祫為一焉廟堂明堂大典也或以為異所而殊制或以為一廟而八名焉帝號官儀悉承秦舛郊兆廟室雜踵漢誤以及貢賦選舉之設皆不過一切之法而己嗚呼六經之書先王道學治具之所在而後世所取法也然其為説之弊乃至於是蓋千數百年宋河南程子關中張子者出始克實踐精討而聖賢明德之要帝王經世之規所以垂憲後世者乃大有所發明其後朱文公張宣公吕成公一時並興而當其時如永嘉薛氏鄭氏陳氏葉氏閩中林氏永康陳氏後先迭出各以所學自成其家大抵均以先王之道為巳任以先王之制為必行而所以立天下之大本成天下之大業者咸粲然方册間矣然及于今學者顧遂因儒先君子講習既明之餘因循茍簡承前襲舊習矣而不察行矣而不著甚者以先王之道為莫之可行以先王之制為無所於用夫然故書自為書人自為人而學為空言矣嗚呼此其為弊不有甚於前日歟是故學者之於經不可徒誦其文而己也必將求其道以淑諸身明其法以用於世蓋惟誠求而實見篤信而力行然後知人之貴果可以為聖賢果可以位天地育萬物而所學不徒為空言也豫夙有聞於此竊嘗有志而願學焉比與君定交錢唐辱遣其子膺從豫遊會豫亟東歸不得與之相講習故因道豫所聞者書以授膺以復於君并請揭諸舍壁以為記蜀山書舍記髙啓蜀山書舍者友人徐君幼文肄學之所也幼文嘗自吳興以書抵豫曰吾山在城東若干里吾居在山若干楹吾書在屋若干卷山雖小而甚美屋雖朴而粗完書雖不多而足以備閲吾將於是卒業焉子幸為我記之豫惟古之君子所取以成其學者無常物所居以致其學者無常地也故辨裳之於容珩瑀之於步豆籩之於陳琴瑟之於樂弓矢車馬之於服度量權衡之於用凡於物皆學也豈專於六籍之內哉往于田入于市處于戶庭覽于山川立于宗廟朝廷遊於庠序軍旅凡履之地皆學也豈限於一室之間哉後世講學之道既廢而人之不能然也有志者始各占山水之勝築廬聚書而讀之雖其所以學之者異乎古然凡事物之理舉夫羣聖賢修己治人之要實皆不出於書况安僻阻之區絶紛囂之役得一肆其力於是則其至於成就豈不反有易者哉今幼文以方壯之齒有可用之材而不急進取益務於學以求其所未至豈非有志之士哉而豫也北郭之野有土東里之第有書皆先人之遺也遭時多艱茀穢於榛蕪殘壞於塵蠧倀倀焉日事奔走而不知返則其荒陋宜有愧於幼文矣尚能為是記乎然而書此而不辭者蓋姑復幼文之請亦因以自厲焉仰髙樓記朱善洪武已未正月善自遼東歸南昌秀士羅德厚館于書樓之上開窗而望之西山屹然于其前其卓絶若中軍大將部伍旗幟整齊嚴肅而不可犯也其靚潔若普陀觀音冠帶瓔珞尊嚴端正而不可狎也其飛動則矯然龍驤翩然鳳翥雄健俊快而不可羈也其變化則霞飛雲斂陽舒隂慘一日之間倐忽晦明而不可測也德厚曰自吾創是樓也旦而笑語焉夕而寢處焉間居而宴息賔至而觴詠焉無往而不於斯固將托是以終吾身而奚外物之足慕哉請子命之名而遂為之記庶將賴以不朽豫曰諾吾將有以成子之志按圖志是山之髙與廬阜等而諸峯競秀環三百餘里其巖洞之幽深良石之清美竹箭之茂密草木之靈異琳宫梵宇之相望良田名圃之相屬所蓄之富足以衣被城中十萬之衆其利澤之所及者逺矣抑吾因是有感焉是山之大能與廬阜同其髙則斯人之居是邦者獨無與是山同其悠久者乎稽之古人忠節如梅子真髙風如徐孺子孝友如黃太史固皆足以敦薄立懦若乃華然道德之光粹然言行之懿奮乎百世之上而百世之下靡不師法而宗仰之者其惟濂溪周子乎詩曰髙山仰止景行行止髙山之可仰也以喻盛德之可懷也景行之可行也以喻大道之可由也夫以是邦城池之壯麗第宅之雄偉人物之富庶挹清光而分爽氣者豈特兹樓為勝而連山壘嶂延屬三百餘里又豈兹樓所能獨專也惟能知盛德之可懷知大道之可由則專兹山之勝者其必在斯人矣吾子其不可務乎德厚曰然某雖不敏請終身服膺焉遂名斯樓曰仰髙而為記以遺之樗舍記謝肅上虞管起逺氏之避地于北山也山有大樗因作舍以蔭于其下而名之曰樗蓋自比焉且屬豫記之時豫有四方之遊不果為及歸則樗舍者己徙構城中餘十年矣而其名不易則又謂豫曰曩屬子記吾樗舍不意文之久不出也何故余復之曰起逺固美才而有用者也樗固散材而無用者也以無用之散材比有用之美才余何言以記哉乃愕然曰子以吾為有用之才則誠不知我矣獨不見夫元之季世乎朝綱解紐中原板蕩羣雄並爭以為敵國故中外急於用才而無所擇凡其才之可以宰一邑者或守一郡才之可以守一郡者或鎮藩維或以將帥之才而屈伏行伍或以經綸之才而湮沒簿書或位都卿相爵列王矦而非匡濟之才雖才有小大用不適宜固未為不見用也及皇明聿興天戈一麾四海讋栗向之所謂才者莫不低頭束手以就戮辱焉唯吾幸免豈不以其才之無用也耶天下巳定上乃更張治化深懲前代之失合羣才而聚于京師親為簡拔以用之有朝食虀鹽而莫調鼎鼐者矣有莫居逆旅而朝上巖廊者矣兹非有用之才乎然左承薦擢而右賜徒流右懷章綬而左伏鈇鉞者亦云夥矣是豈宸衷之不愛才也哉亦其才不勝任而冒焉者之故也以吾才無用而獲免又何其幸歟此吾所以甘比於樗焉夫樗無用之散材故匠石不加斤斧得以全乎其天而莊生嘗述其言以為求無所可用而為余大用者也子但以是而記之何謂無言乎余又復之曰嘻有是哉夫求無所可用者莊生所以忘天下也為余大用者莊生所以自私也自私而忘天下豈聖賢之所安乎然吾知起逺讀聖賢書而志將有為者也道出處言必稱伊吕道問學言必稱孔孟伊吕孔孟未嘗自私而忘天下也故伊尹之未見用也耕於有莘固耕者耳而能樂夫堯舜之道及既見用也則相其君而覺斯民惟吕望亦然方其未見用也釣於渭濵固漁者耳而能謹夫丹書之戒及既見用也則尊主而庇民是伊吕未嘗自私而忘天下也孔子謂如有用我吾為東周而行夏時乘啓輅服周冕樂韶舞此欲見諸行事者未嘗自私而忘天下也孟子謂平治天下舍我其誰雖不得位然其談王道道性善論養氣所以立言垂訓者未嘗自私而忘天下也且夫天者降聖賢以其才非但使其自足於已而己必將欲其大有為於天下以濟乎斯人也而莊生之才既不足以濟斯人又不肯下於聖賢乃託樗焉以肆其荒唐之説欲髙出於天地萬物之表其亦不知視乎聖賢也而益卑矣孔子曰嵗寒然後知松柏之後凋也蓋以喻夫君子所守處亂世而後可見然非周于德者不能焉孟子曰牛山之木嘗美矣斧斤伐之以為未嘗有材焉此豈山之性也哉蓋以喻夫人之良心乃固有耳若然則吾聞孔子嘗取松柏以喻君子之周于德者矣未聞有取於樗也吾聞孟子嘗取美木以喻人之良心者矣未聞有取於散材也今起逺亦養其良心而周于德則用世之才全於我矣又何必自比於無用之樗樗乎樗乎其莊生之徒歟起逺有志於聖賢者也苐以未之見用若無用然乃強名其舍曰樗耳夫豈其情也哉於是幡然喜曰是足以記吾樗舍矣敢不自勉遂為書之崖廬記趙撝謙李隆平氏遁迹四明山谷中因崖為廬而居洪武十年春正月庚辰之夕夢異人皓首龎眉岸幘曳杖而造其廬謂隆平曰人生兩間或出或處或顯或晦舉命也夫其可強而至哉古昔先人有顯而居朝承順為悅者曰承明廬有於南陽卧草萊者曰草廬有洗心於道義之域而致其潔者曰精廬有棄榮味而呻吟者曰蝸廬有仙於山中者後以其地稱廬山今而因崖為廬曷不亦名之謂崖廬寤而異之興坐待旦發策而筮遇遁之漸其辭曰好遁君子吉隆平喜納策於匱遂題其居曰崖廬間來謂豫而徵記余曰子以實而名其廬既善矣或符諸夢是又善也卜而吉善孰大焉斯干詩曰乃占我夢吉夢維何綿詩曰爰始爰謀爰契我龜周書曰夢協卜子其有矣且遁之為卦也貞艮悔乾為天下有山之象互變為坎為山中有崖之象艮為門闕坎為隱伏為有廬可遁之象所居符夢所夢符卜所卜又符乎所居吉又何加焉夫所謂承明廬者隆平不欲之矣所謂草廬精廬者不可尚己隆平倘能養心寡欲居觀乾天之象優遊艮山之趣則所謂廬山蝸廬者不得專美於前矣是為序記稽古齋記趙撝謙孔子曰吾猶及史之闕文也今亡矣夫史不闕文於理未甚損也聖人歎之者蓋歎古道之漸廢也然古道之廢于今者豈獨史哉禮樂射御之習舉掃蕩之所存者惟書耳書又皆上乎點畫波折之間務竒巧逞姿媚以夸乎人至於六義則茫乎其未聞知也吾嘗謂書所以載道者也夫欲知道必先窮理茍欲窮理必由識書欲識書則當研究乎六義此古者包犧氏之教然也嗚呼書自三代以下六義不明也久矣雖漢許慎之博著説文于義止得象形諧聲二類而己指事會意間得一二假借轉注則未之取也鄭夾漈研精竭慮拳拳乎此著述雖多然又不過為慎之駕説也觀其假借頗明則轉注昧矣若徐鍇戴同輩識見平庸循迹蹈轍雖取重於世較於超然特起者則劣也如沈約韻書野王玉篇世家藏人用究其不失於鱗次者鮮矣子母相生音韻相諧造化之自然也而野王或以子為母者有之沈約則聲音混然一塗去取之際雖諸公之用心猶有所失他何議焉余近在山中博古之暇作書曰本義定三百三十字為字母八百七十為字子以象形為首原文字之本也次二曰指事加乎象形者也次三曰會意次四曰諧聲合夫象形指事者也次五曰假借次六曰轉注托夫四者之中者也博考衆氏明辨正俗祛妄馘惑斷以區區之見雖未敢自躋于古人其於君子玩考之際竊謂少有助焉夫世之知者亦鮮矣求同志而相與講明之則未之見也及來鍾離聞汀之吳君以莊慨然有志于古以稽古名齋未暇往見而鳳陽郡祭酒吳先生且俾余為以莊言之余謂古莫先於書而書莫先於六義而以莊稽古之際豈有過於是哉余故因吳先生之請遂發之也若夫所不可言者今固不能盡言也他日握手相遇與吳君談宓戲一畫未判之前則庶乎其有所進視今日所發直筌蹄耳明文海卷三百二十七
