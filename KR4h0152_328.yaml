body:
  text: 明文海卷三百二十八餘姚黃宗羲編記二居室正學齋記王紳漢中府教授天台方公希直備純明之資負正大之學慨然有志於聖賢者也蜀王殿下素加禮敬間嘗聘置左右以諏咨正道公見必以仁義道德之言陳於前王方大肆力於緝熙之學日以誠意正心躬修體驗為務與公論辨若律吕之諧肯綮之中無不吻合王愈加斂容納之與臣下言必曰方公今之賢者也遂賜名其讀書之齋曰正學期其底聖賢也公退以告豫紳紳聞三代之隆大道昭著風俗淳厚人倫明於上教化行於下故人之學焉者多出於正周衰列國紛爭人尚詭異各以智能自立門戶而異端之術競起矣若楊墨之為我兼愛老聃莊列之虛無張儀蘇秦之縱橫韓非申不害之刑名管仲晏嬰之事功有不能枚舉者逮至漢唐世愈降而道愈漓著書立言者動以百計其為説必曰我著書所以明斯道也而道卒不加明我立言所以開人心也而人心終不如古非徒無益於人其所以壅塞正途聾盲耳目者為甚大天下之士莫不隨波逐流而相上下其如聖賢之道遂若岐徑之異趨矣比之三代之學其邪正為何如哉尚幸間有豪傑之士出於其間足以回人心破邪説挽頽波而振餘風然亦不能多見若漢之董仲舒其言明白坦易為得聖賢之心唐之韓愈卓乎特立於百世之下皆間世之竒才也至宋周茂叔以河洛之懷得理奧於默契心融之妙及其門者若二程子之主敬行恕窮神知化而道益宏逺矣其後新安朱子出又能推明周程之旨而集羣賢之大成於是世之先後雖不同道皆羽翼斯道而所學純乎其正者也故自三代之下論者莫先於宋有元之時若許衡氏若吳澄氏若許謙氏輩彬彬和附于下者蓋莫非朱子之傳嗚呼上下千數百年求其人僅僅如此而邪説之惑人反有過之則夫凌髙駕虛勵志鼓勇而跌足於異途者可勝道哉此志士仁人所為扼腕而深悲也今公才足以振俗德足以服人生逢聖明之世而又遭遇賢王之眷顧則所以追諸子而遡三代者公其可無意乎紳也志識卑淺於公之學無能為役竊幸辱知於公最久故敢竊公之餘論以繹智念之萬一茍以為然則繼今以往益圖執鞭以為御焉練溪間居記朱同中菴余公信卿承世胄之貴秉鈞要之權亦既有年洪武六年以老得請奉旨居新安新安練溪大源即楊之水也出績溪縣大尖山澎湃湍激曲折東流繞郡城西會四水南流以入新安江郡城之立跨山依水以為固公之居在城之西偏南面水隂之山曰陽城唐方外許宣平隱所也逺望喬松數本在山巔之凹遺址存焉重岡疊嶂枝聮秀拔踴躍後先以列乎前古寺樓觀林隂塔影嵐光翠靄入戶侵簷不知有城郭之隔市㕓之囂也公平居無事則圖書在几披吟抽繹以養性情而消永日客至則整冠對坐談今古論人物道典故鏘金戞玉足以廣見聞聳觀聽令人傾耳不倦每風日佳好則幅中野服杖履逍遙與二三友士俯練溪之清流登西水之梵剎探城陽故址以求方外之遺蹤陟紫陽髙巔以訪考亭之餘藴或據怪石或坐長林唱和吟嘯日暮忘返人逺而望之但見其形超興逸若寫神仙於圖畫而其中所存之灑然者固不得而知之也僕間嘗造其居公輒接納談笑或置酒雖不自嗜飲而酬酢不厭其寬和接物類如此殆忘軒冕之貴而尚道義之髙者歟時劉時中素慕公髙風因令邑士邵某圖其間居之趣與文士歌咏之而公又俾僕記其槩僕惟襄陽公舊鎮也峴山髙陽池昔人遊觀之勝豈特倍蓰於練溪而公獨眷戀於是者何哉蓋襄陽形勢之地英雄之所必爭是以南北有事則往往為名藩重鎮實扼巴蜀之門戶控江漢之領袖而規中原之咽喉也昔關公乘勝據有而孟德幾欲遷避羊祜卧鼓不戰而吳人巳為寒心此豪傑之士割據覬覦之雄圖騷人墨士感今懷古之壯觀而非端居嘉遁之所也徽之為郡介乎萬山僻在一隅豪傑之所不屑而山秀水環泉清石潔足以清心娛目全身避世是以黃山之嵯峨紫陽問政之宏衍多為仙逸棲遊之地公見先斷果勇退急流在易所謂見幾而作不俟終日者視功名富貴何如也然則孰使其盤桓眷戀於斯而忘故土之勝者其必以是也夫既為記巳又從而歌之歌曰練之溪揚之水源淙淙流瀰瀰結茅屋臨清泚泛余舟兮漁梁振余袂兮城之陽望峴首兮慎無懷乎故鄉志古齋記貝瓊志古齋者天台王藴德氏藏修之所也藴德嘗受詩舒可立先生科舉廢遂一意于古文求進于先秦兩漢故取昌黎韓文公之語自厲云鄱陽周伯溫為書三大字復求豫記之乃為説曰射莫善乎羿而天下不能皆羿也工莫巧于般而天下不能皆般也唐宋諸家通習六經出入諸子亦皆志于古而恆苦其難者時既不同才復懸絶惡得強之以力哉蘇黃門曰文不可學而能氣可以養而至是氣也塞乎上下騰而為河漢旋而為風雨薄而為雷電列而為五嶽激而為海濤人得之發於文章所謂氣盛則言與之俱盛也諸家惟能善養吾氣所著不期于古而古雖有髙下輕重遂與六經諸子並行不朽豈非一代之豪傑乎往往取其書熟讀詳玩大抵立言不在於嶄絶刻峭而平衍為可觀不在於荒唐險怪而豐腴為可樂此古人不可至也古之人不可至而有至焉亦猶射之必為羿工之必為般庶乎其不逺矣若藴德者其志如此宜將髙視無前而不足于今歟雖然髙臺邃宇孰與古之橧巢齊紈楚練孰與古之羽皮玉杯象筯孰與古之汙尊壞飲哀絲豪竹孰與古之土鼓奈何浮華之習崇敦朴之風壞或有語伊耆之茒茨則陋而不合於制尚有虞之瓦器則朴而不適于時悅周文之卑服則儉而不盡乎飾奏軒轅之雲門則淡而不諧于音矧文之變而下也使班馬馳騁其間則必驚且駭矣非班馬之罪也所見者異也若奚志于古耶懼其合於古而病於時也嗚呼初豫坐是藴德復蹈而為之不以舉世非之而變斯能古矣因其請而極論之苐愧于古人者海之一螺未及盡夫道之無窮也其尚擇之黃山書舍記貝瓊江隂舊為常屬邑大江自岷導之東流萬里至江隂達于海岸江之山曰君山君山迤而東嶄然與由里秦望秀拔天半者曰黃山蓋江隂以楚封春申君黃歇之地山繇是得名而君山則歇之墓實在焉若敔若啓若定若華向背起伏戟列屏峙皆境內之勝惟黃山其尊且大者也邑之津南張先生仕元至江浙行樞密院都事去之十有五年始歸而省其先隴于黃山乃剪蓬藋藝松柏築别墅于山之陽以居朝嵐夕紫接于忩戶江濤海雨撼乎几席此尤據其最勝處遂老而不復出矣先生之子宣率其弟完嵗治田為事上給滫瀡之奉暇則取羣聖賢書讀之世之紛華不接于耳目也因題其居曰黃山書舍且求文以記之豫惟黃山在吳越諸山不啻邾莒之於齊魯特以春申而名天下嗚呼春申亦七國之雄也方其明也説昭王出身徇主遂相楚二十五年而與齊之孟嘗趙之平原魏之信陵以賔客相傾至躡珠履者三千人可謂盛矣及考烈之薨猶欲保江東之封而不聽朱英之言卒制于李園身死族赤為天下笑又何耄耶上下千嵗之久黃山如故而一時之風流安在哉豈其徒知徼無望之福不知戒無望之禍也今宣智非不周也才非不優也衆方依乘風雲以取髙位而退謀一丘一壑與幽人逸士之流甘于枯稿寂寞每天髙氣晶覽席帽之飛雲延石室之秋月考槃長歌超然放神埃壒之外視淮北十二縣之利殆不足以易此樂也使春申而知此則引身功成之後孟嘗諸君何可及哉惜豫羈于世故汩汩東西南北未能相從卜居以耕學自娛為憾他日尚當放舟過宣父子於黃山舉樽酒弔古人援筆賦之未晚也姑書為記水雲深處記貝瓊青林在華亭東南六十里地平衍無大山惟叢篠灌木薈鬱蔽虧蓋亦海隅之斗絶幽邃所也其民田牧于中者雖早夜作苦足生胝脛無毛然皆樂其俗而安其業熙然如太古時三吳之變兵亦不及豫嘗徑竹岡絶黃浦邪迤而南由橫溪至青林盤回百折如帶舟礙石不可行抵暮候海潮而上四顧徘徊念可築室讀書以佚吾老規欲留而未能也一日曹君士璜遣介持圖示豫其號水雲深處者即璜之所居實據青林之勝且求文以記之豫惟淵之深魚之適也林之深鳥之歸也山之深虎豹之所伏也魚不深則鈎餌得以出之鳥不深則矰繳得以加之虎豹不深則陷阱得以掩而斃之故士之辟地恆苦其不深而鈎餌也矰繳也陷阱也又有甚焉今青林有衆水之會可釣而遊也雲氣之出納可玩而悅也而璜之託於是亦既深而莫得縱迹也巳世所謂秦人桃花源者又何以過之哉大抵天壤之間百年之頃至樂莫大於適意能適其意者不在章綬而在於一丘一壑昧者方且奔走通都大邑急於自售以繳利劫祿為事趨死地如歸者不亦悲夫璜能果於忘世蚤棄內外務日擢孤舟與海父往來暮色蒼蒼星月上升則放乎中流舉酒相屬家童取鐵笛作龍吟三弄以和巴歈之歌則其寄興豈非髙且逺邪余將去此而從之遊共相忘於水雲之外矣是為記蘆軒記貝瓊天台李廷鉉之謫潁上也日讀書一室中泰然自足復題之曰蘆軒客有過而詰之者則曰吾所居無嘉木異卉出門四顧際天連海悉彌亘以蘆而不可限也故以名吾室客又何怪乎客曰噫江圖紀蘆洲至樊口三十里大抵緣沙之地宜蘆未聞潁産之饒也且河南諸郡素稱汝隂而西湖在其境內宋歐陽文忠公誠樂其勝槩即老于潁而不復時蘇黃門嘗從公遊銀缸畫燭之詩至于今人能誦之則當時人物富庶甲第相望連檣巨艦與波上下者槩可想己今既刳于兵千里蕭條一蘆洲而己欲求如公擅西湖之風月惡乎而可邪嗚呼東西都之壯麗計相萬於潁也紫煙丹水奄為狐兔之區而金城五千步與連昌繡嶺之相蔽虧亦墮而不存此古今盛衰之變奚獨興嘆於潁之蘆也哉然蘆為物之微者薪之而不惜伐之而不禁使有嘉木異卉如向之可玩又孰取之表其陋乎其取之者以時之所見特此耳抑觀夫既苞既體至霜乾雨折之餘散花如雪陳紛糅交錯沙鷗落鴈莫辨其所止固有無窮秋思不翅在瀟湘洞庭間也視彼爭榮於春騰芳交蔭曾不及乎一瞬何以過吾之所謂蘆與廷鉉必有得諸心矣因以其説來告余深善客之知道遂書以為蘆軒記尊聞齋記劉夏詩三百昔余攻之以遊場屋彼時尊尚時王之制日夕孜孜訓傳是故紀録傳言者見取於有司遺傳者則見黜考官全藉是以決取舍其間雖有才優而文富學博而識髙所見稍出訓傳外天下人必指目之曰是失經旨也為專門名家大謬矣以此籠絡禁制天下髙材明知之士槩不出乎彼之格律一旦試中京師列於有官君子翻然棄其舊步如脫敝屣則學賦詩為文以藻飾厥躬後進之士倘又來叩求前日射中之術必曰余忘之久矣余忘之久矣嗚呼聖人刪詩宋大儒先生傳詩豈謂科舉之敝其叛去至於如此之速也雖然此豈人之情也哉由學經之士拘於王者創法父師課試勤苦局蹐以執業雖嘗號讀聖人之經其實無得於心心之所樂不在是也窮經之士或者樂乎其心飫焉而忘飢樂焉而忘憂可以與之共涉患難而不悔可以與之共處貧賤而不愠抱與俱處終身不厭安有叛去之理哉余始至金陵郭士中為余設榻於其家尊聞齋要余共讀詩三百余乃為之導行前驅其法先經後傳至或執經證傳日可粗通十許篇稍稍純熟其勢洋洋焉翼翼焉如鷙鳥乘涼風如巨魚縱廣淵卒也合三百篇天秩有序如親姻族姓三百人同堂共席左右列坐昭穆相從尊卑為位血脈灌注聮絡流通天下大法天地經緯無旁蹊無多岐驅車四達煌煌周道闢如也士中曰樂哉斯言乎余曰未也良農為土田橫縱其畝鋤治七八往返然後墳壤糜爛而植物滋生焉嗟乎讀書之道亦如此矣而况於窮經乎每夜二鼓盡余己就睡士中挑燈吟諷尚未巳士中樂矣庶幾尊其所聞矣乃語士中就書此言以記尊聞齋不亦宜乎野航記林公輔范子俊雲間人也厭其居之陋近遂擇材於山求匠於野作小舟廣幾丈而長加倍之中置古今聖賢圖書與夫秦漢以下鍾鼎彛器日泛漾沙洲淺渚際逢山翁野子必呼飲於其間扣舷而歌若不可以事羈者人皆曰其遊方之外乎余自經揚子至松澤適與之遇見其神氣內藴而微充於眉目於是並舟而進揖其人曰子何居而至是乎子俊曰吾居於是以是為室以水為基以岸曲為藩墻以魚鱉為鄰戚也采芹藻而煮之挹波瀾而飲之豫曰異哉子之為人也且古聖人樹宫室以居其安造舟楫以濟其危安可常處危不可頻涉也天下之廣深山大野豈無措足之地可以藏子而棄安以就危乎亦可謂不善擇矣子俊曰子知室安也吾請為子危之且所樹之室不在千家之市必在千家之村其相與鄰者抑皆夷惠之徒歟抑亦非夷惠之徒歟乘之以貨通之以賄標之以是非之檣設之以有機之柂張之以冒利之帆而鼓之以勢力之槳泛於溟溟之海驚風怒濤駭觸前後百怪雜遝而進則吾之身不為所溺者幾希矣不然室雖安居乎室者何在也後之人指吾室而過焉徒見墻傾柱側鼯鼠亂走而己且吾今當風波不興鮫鱷逺遁漫流千里水花發而獻秀清颷至而效涼月色一頃霜雪浩然目變神融尚知所謂危乎以是而觀則子所謂安者未必皆安所謂危者未必皆危也吾去子矣遂刺舟而去余歎曰此學道之士也哉吾聞得道之人常不與人近渤海之東瀛洲之上是其居也賢者遇之可飛化霄漢下者遇之亦可得久視之術若子俊其有所遇乎不然何其言之類夫道也清風樓記胡翰赤松寶積觀之西廡有曰沖和道院者道士倪天申趙子安居之其先師曰竹林王君王君之師曰石泉趙君皆以詩名方外元貞初石泉與其徒嘗構閣曰松花逮今六十餘年天申子安又即松花之後為樓髙三丈有竒橫濶與深皆五丈有竒工既訖事取竹林所謂清風集者因以名之而藉吳君德基屬余記焉古稱金華山一名長山袤延數十里至赤松而風氣融會丹崖翠壁環合為一澗水汩㶁並山曲折若左右顧而去晉黃初平牧羊山中即其地也今靈迹故存觀之廬舍聮絡錯峙各擅其勝而是樓冠之吾嘗與德基登覽其上見山之諸峯髙者竦而側者跂前者伏而後者赴矯若鴻驚快若猊怒拱若人立而植圭璧欲遽數之不暇晨霞夕靄晦明吐納大松數千百章柯葉彌布如車蓋它竒木異草往往非人世間物可服餌也山雨日出爽朗芬烈之氣襲人其北修竹萬個如碧雲蒼雪厯寒暑而不變望之有太古之色不敢狎也禽鳥嚶鳴薈蔚中鸛鶴決起清風颯然每徐徐而來不暴不曀翏翏刁刁而草木動澗谷應雜若琴瑟笙築引金石而考之乍鳴乍止余乃顧謂子安曰美哉風乎往來升降于兩間而浮遊回薄乎四時之序可以鼓大化舉大物而卒遇之可喜可愕可悲可慨其變不窮而孰吹噓是孰槖籥是吾與子皆不得而知也臨爽塏之地處壙垠之野臺焉而觀川焉而遊鼓南薰挹焉而疏瀹世之汙濁由是以快一時之懷則人得取而樂之也天下之物人得而取之故吾取之也莫與之爭人得而樂之故吾樂之也無有不足今登子之樓俯仰山水之間披襟而坐飄若蟬蛻而撫有宇宙者恆以是也故人皆物乎物而吾獨與造物者遊世言神仙好樓居將不有冷然寥廓而至者乎吾慕其人久矣不及見之而偶獲與二子相從于方之外天申願而朴子安敏而好修皆能成其師之美者余每遇之子安輒留就飲舉大白引滿劇談大笑視其鬚髯墨如也或疑其為神仙云悅親堂記胡翰越國胡公之鎮金華也其內弟馬克敏實𨽻麾下間請于公願輟行伍迎母以致養焉公聽之今十餘年矣將治裝歸淮南告于媯仲子曰含山吾土也罹兵革之變吾兄弟三人者舁母避亂廣陵未幾兄弟俱殁煢焉罔知攸濟天不棄吾母子渡江而南惟越國是依以至于今日復值海宇混一朝廷詔凡臣庶播遷者悉歸其鄉土復故版籍吾將入籍為含山之民矣奉吾母行且有日願先生教之則吾雖不復與諸將驅馳出死力以取功名如世所謂豪傑退而沾被聖化不失孝友之稱于鄉人是亦先生之賜也媯仲子曰夫士之去其鄉猶大夫之去宗廟諸侯之去社稷也豈其所欲哉不得于君則去之國有故則去之未有若今天下之亂父子兄弟不得聚廬而處者皆是也殊鄉無斧資濡沫以全形不為人俘係則幸矣欲保有其家孝養厥母甘旨輕暖之奉適于口體優遊朝夕之間不知安土之既久而陟岵之可悲此千不冀一也况大兵之後復覩太平之盛遄歸舊鄉終復其先世之業親戚故人相賀于閭拜母于堂舉酒為壽何啻骨而肉之以獲更生此萬不冀一也而吾于克敏見之克敏歸矣吾聞含山故龍亢縣有鼓山之勝東關之阻風氣去中土不逺魏晉以來南北豪傑之戰爭往往皆在其地而今莫不鞠為丘墟榛茀所生鳥獸所萃霜露蒙翳四顧蒼莽欲求其故漫不可識則凡富貴功名人生待之以為榮恃之以自寄于天壤者果何如哉故君子之道不以天下之重易吾性之所貴生而有知則知愛其親矣不幸而遇變幸而不失其常皆天也天以是厚子而子弗盡其道不可也盡其道者誠身而悅乎親也吾何加乎哉請徵諸孟軻氏之言以悅親名其堂而歌之云輪乎奐乎吾何美乎願以致吾養乎母壽且康樂有孫子乎明文海卷三百二十八
