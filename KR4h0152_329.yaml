body:
  text: 明文海卷三百二十九餘姚黃宗羲編記三居室學士亭記方孝孺賢哲之處世烏可以迹論哉當草昧之時世衰道鬱抱經綸之志而不得施安能舒暢其心神流浹其情志乎故或放迹於江海或養操於山林求遺世忘纍之士而與之遊其意非求其道也蓋寓迹於物耳茍徇迹而論之豈足以知賢哲之用心哉當元至正中有大儒先生太史公出於金華以道德性命濟世之略為學學成而四方兵起天下大亂公知莫可如何往來山水間著書以自娛時烏傷聖壽寺有千岩大師者磊落善談論喜與吾儒遊公時時過與之語輒連日夜不休當其適意時或擕笻陟崇嶺看雲起卧石牀聽泉瀑聲久則大笑而别别己復會人見其然以為公樂聞其道豈知公者哉及乎真人御極區宇寧而四海定公應聘而起居朝廷者十有九年纍官至翰林學士承旨年六十有八致其政而歸於是大師亦圓寂己久矣而龍門海禪師復主聖壽以為斯寺公之所嘗遊也乃以洪武八年某月作學士亭於寺之南名以公官亭為公而作也海師以某從公學俾記其事某惟昔之賢者與方外交若陶彭澤之於惠逺周元公之於常總歐陽文忠公之於居訥者有矣彭澤惟虎溪一笑元公以鸞名溪以青松名社然不聞有所創造也文忠既去而寺僧某作亭其寺以公别號名之曰六一亭矣然亭作於身後文忠不及見也今海師時公之還而作亭亭成而公氣強體康肩輿觀覽乎其中此固古之所無而今之所僅有者也其安可無述然六一亭之作文忠之門人蘇長公實記其事其文傳故其事著某賤且騃何敢僣冒以汙偉迹哉雖然公之迹後必有知不待斯文文以道公之志某固不得而辭也巾山草堂記方孝孺踰浙江以東多大山東南極海上尤秀絶其最著者天台四明鴈蕩天姥皆穹窿嵁峻為天下竒觀迹擬乎蓬閬名播乎區極士之選幽探勝者宜其樂趨之然而居其旁者往往終身未嘗一至豈以其崇髙不易援企而遺之歟台城中有小山特立圓秀蒼潤逺望之如人之辨冠人因語之曰巾山其上有樓閣室廬之美凡人至郡者無不往遊凡宅于左右者必構危架迥以挹取朝嵐夕霏之異態蓋其勢邇且卑其所藴易見至而窮之不難也是以衆樂觀焉盧處士定谷家正與山相面因名其堂曰巾山草堂定谷知讀書識義理其才知可用而恬靜不競非安於卑近者豈其心有所得巨小崇卑固不足較乎夫天下之至崇大者莫過於道而卑且近者道亦未嘗不在也憚其難而安於淺陋固不可忽細微而慕夫髙且大者亦烏可哉故順親弟長事非逺也而性與天道不外焉堯舜之道與天準而謹言慎行可以馴致焉巾山巖壑之盛視天台四明固有間焉其有會於人心而人樂之不厭者果有異乎否耶定谷必有以識此矣往者壬戌七月之望豫偕葉君夷仲張君廷璧林君公輔陳君元采夜登絶頂飲酒望月縱談千古竟夕不眠豫謂葉君曰昔蘇子瞻夜登黃樓觀王定國諸公登桓山吹笛飲酒乘月而歸以為太白死三百年無此樂矣斯樂也又子瞻死三百年後所無也諸君皆大笑追計其時忽十五年今存者獨豫與張陳耳二君亦將老矣豫繫職業數千里未得歸然則於記定谷之草堂能無慨然乎定谷有子曰信慎敏而好文其尚語山靈待我東歸尚當約同志重遊因厯覽海上諸山以盡宇宙之大觀其樂蓋未艾也適意齋記方孝孺貴極乎將相富纍乎萬金喜怒可以榮辱一時去就繫天下之輕重紛華珍麗之物不求而自至快心快己之奉奔走競效于其前此衆人自謂適意者而隱居慕義之士以為何取乎此樹藝樵釣以養生彈琴讀書以養心徜徉恣肆於山泉丘壑之間咏歌論辨以發其趣棄祿利而不顧遺萬物而獨立其於適意亦巳至矣然而聖人君子猶病其隘也天之授我者養之致其全知之致其明行之致其篤用於世則使隂陽寒暑得其時日月星辰循其度九州四海老癃單弱之民無不得其欲鳥獸魚鱉草木有生之類無不遂其性不有用於當時則著之於書傳之天下後世使倫紀正而禮義行姦宄消而禍亂止勞神苦形不暇自適而以衆人之安危為喜戚以區宇寧風俗美為適意若斯人者其於富貴之樂固不忍處而亦焉忍樂其一身以自足哉此聖賢所以有功於世而非有志者不能學也浦陽黃君仲昭才美而甚文有司屢辟之辭不就作燕休之齋與士友講學名之曰適意人以仲昭為隱者也而余竊疑之人情非甚相逺也操瓢而呼者立於門雖御八珍不能知其旨毛褐不完者行於途雖錦衣狐裘不能知其溫人之不獲適其願者多矣仲昭寧能獨適意乎天下之不治非特政教不修法禁不密也仕者茍富貴以忘民隱者私安佚以保身茍且鄙冒而不知聖賢之道者害之也余才不敢望乎聖賢然不敢不勉聖賢之事數十年間庶幾或見兵革不試黎民樂業無飢寒勞苦之歎豈非余與仲昭適意之時乎浦陽余遊學之所故舊賔客之在者甚衆於是時也享承平之樂單車往來相與講説唐虞三代之道以為天下慶蓋必始於此矣全樂齋記方孝孺心無愧戚慕怨而樂者樂乎天資於物而後樂者樂乎人天下之物未嘗無可樂也以無可樂而徒資於外物則其樂也有時而窮而吾樂之也有時而厭崇華侈泰妖姱珍怪之於目繁聲逺調之於耳肥堅安養之於身可以樂亦可以悲衆人樂之而君子笑之君子之所樂全其受於天者而不以人偽參之索之極其明踐之極其誠持而行之至於久而不息則天地之運寒暑之迹萬物之情皆吾樂也豈若資於外者之淺乎彼快然適意自以為樂者可樂之具接於前則以為舉世之樂莫能敵及靜思而熟念之凡其所樂者皆可慚恧悔恨也庸有一息之樂哉古之聖賢窮日之力常若不及者求其固有之樂而已不以窮達動其中也不以窮達變其樂斯樂之至者乎浦陽黃君資安修潔而知義處一室布衣蔬食若無以自適而心獨樂之名其所居曰全樂而屬余以記凡人心有所樂口未必能言也况君之樂而余能言之乎然天下之道同也古今之性同也余探乎千載之上而求之舜之鼓琴顔子之簞瓢曾晳之遊詠會乎吾心者如出於吾心也况於君乎余試與君登浦汭之髙丘而望之榮且悴者何為也感乎吾耳者何聲也晦明燠寒行乎兩間而無窮者何氣也流而逝峙而列者孰使之然也蒼乎其退倐乎其變化者誰為之宰也君請為余言之余當援琴而鼓之君之樂即吾之樂也吾之樂與舜顔子曾晳之樂將有同乎無同乎人之樂乎天之樂乎君必知之矣余烏足與聞之棠溪書舍記方孝孺浦江之東有地曰棠溪吾友烏傷劉君養浩築室講學其上養浩學于太史善為文有名于四方年四十餘志不稍懈而益篤焉養浩謂余嘗從事乎學俾余記之嗟乎學豈易為而易知者哉非誠為學者不足以知非誠知之不足以言言之而不至知之而不明皆未盡為學之道者也古之為學者可見矣其幽深奧渺者雖不可以言傳未有道不足以周萬理才不足以用天下而可為聖賢者也孔子之門若子羔者迹其行可謂有道君子矣而孔子鄙之為愚若仲由者可以治千乘之邑而斥之為野蓋子羔之信道而才不足以行之仲由優於才而未能以聞道皆偏滯於一隅者也後世學聖賢者既不足以得其大全髙明宏達之士務事功而過於疏略純恪謹飭之士攻義理而局於卑懦疏略之流必至於詐卑懦之流必至於木自漢以下未有不入於二途者也往者大賢病其若此於是著其説於羣經大窮乎天地而微析乎毫髮精之於性命粗之於事為莫不揭而示人使學者可以按書而蹈聖賢之域宜乎其易矣而卒未有至焉者有志者寡而安於小成者衆慎言篤行學之一事耳古之恆民皆由之而不以為異今之能若是人望之如聖賢而彼亦以得聖賢之道自望文辭言語道之餘器耳古之人未嘗以此為學而後之大儒君子舍是無以名此學之所以墜地而莫救也吾嘗以為當今之世非傑然雄才出而修孔孟之道不足以起俗學之弊而使生民見三代之盛以太史公之賢豈無望於為學之士哉此吾與養浩之所宜勉也夫人有美才難矣以美才而得師又難也茍不以聖賢為準則豈不可惜乎故吾以大者為養浩告若文辭之事固養浩之所知者余不敢以告也時敏齋記解縉怠荒學者之賊也時敏學者之方也不敏未有能學者也聖人猶然也孔子好古敏以求之是也弓矢機張非敏不發輪輿斫削非敏不成攫獵馳驟非敏不獲分爭辨訟非敏不勝文章政事非敏不妙不凝雖曲藝凡事猶然也矧夫學聖人者豈不然也堯兢兢舜業業皋贊贊禹孜孜湯日新文王乾乾雖聖帝王猶然也説命曰遜志務時敏是也有如不及之心與力而或有間之怠與荒中道之畫也山蹊之塞也前功廢而徒敏也可不戒哉世之明察勇健之士一旦為功名文章之雄歆艷其中忽焉企而赴之效之則之介然之頃初心之發火焰焰水漾漾未嘗不甚鋭且敏也取卷書手閲目透若將吞噬大聲琅然未數紙若三軍之敗卷甲荷戈顧後而奔靡也猶脅於威而忍也竟數紙然心力俱困昏然喟舍水火而息者甚多也其他肆筆點青黃當筵論禮樂忽然雷鳴忽然電馳忽蛙然息者雖外慕猶然也矧夫聖人之道非能有歆艷其人者哉則一飯思堯舜置匕筯而莊蹻一觴慕孔子酒下咽而陽貨者何限也烏在其為學哉故學在敏敏在時無道不敏無事不敏無時無處而不敏斯為學者之方也可以一息怠荒賊之哉余平生無不敏之時以力敏事則事就以心敏志則志成心與力俱敏也知道以來十餘年聖人之所志洋洋焉未窺其際也勉勉未能罷其力也此豈一朝夕之敏求可志哉郭君某以時敏名其齋也固將以求聖人自勵也豫喜與俱從事也請因是説記於壁兾如朝夕相講切也齋在居之西僅完葺仰有山俯有泉左右琴瑟詩書畫器皆粗足玩適而己家自宋居東梅後𨽻吉之吉陽門系出汾陽忠武王三十六世孫云豫莊記吳溥豫莊去城南僅十五里舟行道迂則倍之其地皆山而面流田繞四周饁餉者不出百步僻幽而靚深最宜隱者居然山卑而樵牧不輟其上常濯濯水清且寒無大魚土磽瘠不甚宜稼穡力勤而收薄富人多不欲之棄而不售者數十年矣豫始得之陳氏問其所以名曰其地宜榆晉有古榆數株今不存矣或曰勝國時有俞氏居之故名豫曰安知非天之遺豫者乎夫天下之物茍非其有終身望之而不可得是莊也隱者不得居富者不欲居售之數十年而卒歸于豫他日菟裘之計將于是乎托焉是天之所以遺豫者無疑也宜名曰豫莊凡溪山泉石澗壑田野徑路橋梁臺榭悉從而豫之昔者栁子厚居冉溪之傍汚以惡名曰愚溪元次山愛祁陽之水據而獨得曰浯溪易號而改稱嘵嘵焉曲為詞説當時土著之民聞之口雖不能言安知其心不有忿且怨之者乎豫之名莊意雖有在而名仍其舊居傍之民朴魯多不識字義聞之必不甚駭他日謝政而歸豫知執耒耜者喜而從豫耕執網罟者喜而從豫漁執斧斤者喜而從豫薪與夫時節伏臘祭喜宴會笑語謳歌者皆喜而惟豫之從求其忿豫怨豫者必鮮矣是則莊之名豫也不賢於愚與浯乎或曰自有莊以來地未始改也而地之主屢易知而可數者數人而不知者不可以縷數也百世之後安知斯名之不改歟豫曰子何不達之甚也栁子之愚元子之浯一旦易萬古之名而猶不可改今豫仍舊而名不加惡且與鄉人共之孰為而改之哉若夫土地溪山之所有豫尚不敢保而况豫子孫乎人得之而人豫之是莊固猶豫也遂為之記杞鞠軒記孫作趙郡蘇先生避地中吳士大夫爭走其門因闢軒以延客環藝杞菊既字其楣又屬為之文按杞與菊二類杞即今之枸杞菊則今之甘菊菊尤多種他如馬藺之為紫菊瞿麥之為大菊旋覆華之為愛菊俗皆以菊而雜餌之其害至有殺人之慘説者謂惟真菊延年效與枸杞不殊則真菊正甘菊耳世以其荑作羮其華入藥而本草亦謂服之輕身延年自天隨子掇以供杯桉而二物始貴然其味猶在肉食之亞至東坡翁守膠西齋厨索然不堪其憂日循廢圃求杞菊食之捫腹而笑則其用殆與穀粟比矣凡物益於人適於口不幸而不見賞於賢士君子即猩唇豹胎味同臘毒而椒蘭桂蕙下比茨棘又况杞菊而巳哉故士論之難犯雖鄭子産之賢曹孟德之姦卒不敢以人望廢清議甚者布衣之士操其豫奪定為國是以配安危是則物之貴賤詎不以人之廢舉為重輕與先生於人物無貴賤大小採攬成就出其口者視天隨東坡之藻識雖一草一木是非之公無過舉焉今復推其嗜好厠於兩賢之門然後知向之所同益信不謬余居秀之南湖日與二三子誦杞菊賦以忘肉味久矣而比嵗下田不登方春農食麥葉或者天發其珍以相斯民而神靈之效將不在洗髓伐毛之後也乃重為之記書畫船記黃淮陸乘車輿牛馬水乘舟古之制也余自筮仕以來承乏兩制四十餘年旦入禁垣侍帷幄薄暮還署間嘗一使齊魯以故乘輿馬之日多而乘舟之日蓋少也頃因謝病還故里頻年入覲泝江入淮以達于會通非舟不可行居鄉屏處先隴往來湖山間必以舟從事與在職時事多相左亦其勢然也吾鄉湖中之舟甚逼仄緼竹為篷且易損竊嘗病之今年棐槃二子以余齒髙力衰舟輕劣不足以濟願更造新舟頗寬廣板上覆以蔽風雨牖兩傍以便觀覽與客同泛可布十餘席中設小榻獨往可以備燕息後闢行厨可以供茗飲為余慮甚周亦人子之至情也昔米元章名其行舸曰書畫船至今以為美談余與元章無能為役然儒者出入必以書畫俱假名自况無所不可也嘗讀歐陽文忠畫舫齋記始則追思謫宦逺涉觸蛟鼉冒波濤寢驚而夢愕終則羡夫逃世江湖之上者順風恬波傲然枕席一日千里自顧有所未暇余也既免蛟鼉波濤之危又無順風千里之逺天宇澄妍徜徉乎近境岸草汀花前迎後擁足以悅吾目漁唱棹歌交響互答足以充吾耳耳目各有所適氣舒神暢其樂陶然於是絃琴賦詩以發其趣或與賔朋布奕傳觴賡酬笑謔視彼傲然枕席孰優孰劣向非得請而歸乘輿策馬追逐公卿之後榮則榮矣然非病夫所宜何有於樂哉是皆上之所賜也上之恩猶天然言語文字豈能盡述姑記所及用以自慶云爾皆山軒記胡廣國家建太僕寺於滁陽以總江淮羣牧之政聖天子蒞祚尤重其事乃遴選賢能授以是職吳侯鑑以將家子魁傑負才氣擢為太僕寺丞治事有法率以古之君子期待不肯為茍且之政比年馬大蕃息公私優裕侯尤好學於公退之暇即賦詩寫畫自娛嘗於公署之偏築室數楹為宴休之所引釀泉為渠紆流于外舉目而望則豐山琅琊諸峯環列逺近發竒吐秀隱見於煙雲杳靄間而朝暮之間變化無窮乃取歐陽公之言名之曰皆山軒徵豫言為記滁之山水名大著於天下者蓋自歐陽公始也公為守於滁築亭於山水之間日與滁人遊而樂之顧望清流之關思宋太祖嘗破李景兵十五萬擒其將皇甫暉姚鳳於滁東門外求其迹蓋百年之間故老己盡漠然徒見山髙而水清而當時得以樂其樂者伊疇之力也滁人蓋未必知之而公與之言忠厚之至也豫惟今之滁非可同於昔日我太祖皇帝龍飛淮甸由滁陽而基帝業呼吸雷動羣策響應英雄蕩滅滌除近年蒙昧之風振起典章文物之盛神聖功德與開天闢地而同其盛豈但平一城擒一二將之足擬哉昔者滁當干戈之際為用武之鄉今為邦畿千里之地而凡得以居其間者顧瞻山川仰思太祖開拓平治之功而當時故老猶有存者皆能道其盛也况草木雲霞蔚蔥炫爛五色之氣凝為龍文結為鳳彩霓旌翠華儼乎在目而向之徒見山髙而水清者漠乎其微矣又烏知有待於今日之盛也哉昔有覩山河而思禹迹者禹之功盛大故人莫能忘我太祖功德卓冠萬世天下之所仰賴而人心有所不忘矧侯居官是邦優遊無事以樂乎雍熙太平之盛其所以感慕之者宜何如也豫知侯之修其德而勤其職思以報夫國家生育之深仁庶幾侯之心矧侯之父兄皆攀鱗附翼以取功名侯又當思振其家聲異時忠孝之名有所聞焉則是軒與滁陽山水競光華於久逺矣豫竊幸與侯同其遭逢之盛是以惓惓焉為侯道之也明文海卷三百二十九
