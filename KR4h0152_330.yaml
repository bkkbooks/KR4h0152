body:
  text: 明文海卷三百三十餘姚黃宗羲編記四居室楮窩記梁濳永樂七年秋豫與翰林編修朱公文冕偕被召來北京既至于五雲坊之東得屋以居然迫乎車馬塵坌之中寢處之外無尺寸地空又壚酤之與鄰歌姬舞妓之嘈雜乎朝夕也文冕病之不得巳乃背衢反置其戶别為道出入以稍絶市喧又惡其勿飾也束葦梗架上座為承塵而冪以楮墻壁左右以楮墁之又嚮明為楮窗楮瑩潔而窗甚疏達于是通一室皎然晨曦所徹隅奧皆白入乎其中者視其貌亦濯濯然衆駭而異之鄙僕頑童旁睨而不敢入清賔雅士日至而忘歸焉無可憎之儔無拂情之務又甚溫而密故雖隆冬沍寒醉卧而起握筆而吟不知折膠裂指之凛能侵乎其肌也雖無髙山喬木以休而息然時取古人之賦詠竒聞異見之紀載披而玩之恍乎若即幽而入深出洪濛而遊汗漫也談論天地物理之要歸以窮辨其是非則雖外之囂不得聞乎其內雖四壁之彈筝擊築歌呼怒叶無所干而能聒也惟如是故文冕居而樂之因名之曰楮窩其友檢討王君希範為書二大字又屬豫為記嗟夫文冕與豫均所居獨巧飾之如此使其平時瀟灑自得之趣一旦出乎卑隘喧迫之表信乎其不逺求而獲甚竒者矣夫文冕處一榻之小如此其得也事有大于是者使文冕處之其材志思慮之精又烏可及哉故為記之詳焉文冕茍去此而南也失楮窩必於吾記得之也洪崖山房記胡儼西山在章水西洪崖又在西山之西峯巒秀拔林壑深窅嵐光染空髙二千丈屬連三百餘里西山所以專豫章之勝也巖岫四出雲霞卷舒幽泉怪石流峙澗谷丹碧照耀樹林隂森竒偉敻絶洪崖又專西山之勝也余家寓城中闤闠浩嚷人事往來喧囂塵土無虛日而余幼從事詩書日與物接不得專力肆志以窺聖賢之閫奧每臨南浦之清波挹西山之白雲未嘗不慨想洪崖幽勝欲結廬其間以勤所事然卒牽塵務不得遂其志也年二十有四領鄉薦自是宦遊南北者十有五年聖天子即位始得仕於朝侍從兩京又十有四年于兹徒以竊祿自厚無分寸報稱以及於人方將刮劘洗濯以求其本根而自視欿然不知老之至也間嘗休暇挾書册以讀目力昏倦輒枵然欲睡而又加以多疾善忘益竊自嘆雖使居洪崖之間不與物接專志於學而神疲意耗亦無如之何矣古之君子朝夕從事不厭不倦老死而後已彼豈惡夫間適而好為是孜孜也哉誠以士生於世不為農工商賈之事所務者學而已學之法豈有止邪他日茍得歸老故鄉買田築室於山間益勵餘齒課子孫耕桑讀書為太平之民日從鄉人父老擊壤於山林以詠歌聖天子德化於無窮不亦美哉然非所敢必姑記此以俟望昕亭記胡儼大江之西章貢居上遊安逺章貢屬邑僻在山溪之間編戶不滿四百賦稅之入僅足當其吏俸與師生之廪餼每郡有役民以逺不召雖部使者至不過移文書期會於郡而已地犬牙閩廣瘴癘時發物産寡而行旅稀故仕於其土者雖有髙材異能亦莫展其用焉且其民伉健一或失撫循即引去召不復至故事雖簡而治實難華亭李處仁之宰斯邑也一切破崖岸而為之暇日坐學宫召父老率其子弟與之講説古先聖賢之道因其俗而化𨗳之於是山溪之民聞風而嚮化田野滋闢戶口益加乃即廨宇東偏作亭以資眺望亭之前直昕山峯巒列秀每旦日出光彩先見官府視事邑人興作率以為候名亭之義蓋以此也處仁居山溪之間徒以區區不得展布其材登斯亭也覽觀賦詠寧無髙居逺遊之思乎雖然食祿者不敢怠其事善治者不敢鄙其民隨遇而施惟適之安窮理樂天者之所為也處仁儒者達理道既能因俗以為政則凡燕休于兹者將無入而不自得焉獨善山房記劉永之古之學者為巳而已及其至也則思推其有諸己者以及乎民焉將推其有諸己者以及乎民則非得其位而施之政不可故仕而達者君子之所甚欲也非欲其仕而達也欲其有諸已者及乎民也然學而有諸已者必自貴而不徇於外故其交也有禮其進也有義必人即之而不即乎人也必世求之而不求乎世也交之以禮矣進之以義矣人即之而世求之矣又必度其時之可為道之可行然後起而從之是數者一或不然則三公之貴千駟之富視之猶敝屨焉曷足以動其心哉其難進寡合如此然而有天下國家者方懸其爵祿以招天下之士有司者敖然持其權衡尺寸稱度而進退之幸而合其程式然後授之以職臨之以賞罰使之促促然唯上令之是聽其取士用人之法如此然而自公卿以下至於百執事之位未嘗乏人焉於是上之人自以為其術果足以籠天下之士馭天下之才而為天下之政矣又何必弊弊然求彼之難進寡合者為哉蓋自三代而下山林巖穴之士懷其道德才藝深藏不售而沒齒貧賤者衆矣然其人皆浩然有以自樂未嘗或之悔也而論者以為孟氏所謂達則兼善天下窮則獨善其身而異端叛逃之民果於遺世者不可同日而語焉友人柯同德儒者也世居屏山之下自其祖父隱德不耀數世矣其家之所傳以為學者皆內而弗外為己者也而同德之為人善論議有氣節尤能應變吾嘗與之共處憂患知其學之有守而才之足以有為也惟其自貴而不徇於外也故不為時之所知﨑嶇連蹇至於窮且老矣終不肯少變其操而其心浩然有以自樂而無悔於是取孟氏之言名其室曰獨善山房而屬余為文以記之余既惜其才之可用而莫用又喜其能自貴而不徇於外幾於古之學者而合乎孟氏之所云遂述其所聞以為之記肋菴記嶽正肋生既三黜於禮部始大知懼巳之未至乃謀所以增益之者作為小菴聚經史圖籍於中因以所自號肋者名之客有稱知己者過而問曰子之所號其諸取之曹孟德所云雞肋乎哉何謂也生戚然曰蓋亦近取諸身而己矣客稱為知己曾不諗吾處事以為行殖學以為文者乎以吾自視雖無過于古人亦無甚愧於今人也奈何柔者謂吾強和者謂吾戾願者謂吾狂通者謂吾執庸者謂吾深巧者謂吾拙智者謂吾戅同者謂吾别一言或唱和者盈百是以動輒致挫言斯召慝其為窘且辱也亦甚矣乃不知飲恨發憤屏舊圖新以否易泰免詘求信方且據菴危坐玩圖味書口是心然略不嗟咨豈神靈鬼怪左執隂迷顛倒揉亂役役于斯不然何好何樂而甘為之不辭歟抑嘗思之吾之窘辱也實肋之無得吾之好樂也實肋之可惜故既以自喻而又以辱吾之室客乃撫掌大噱曰有是哉南思堂記劉球豫家食時族人希敏為言交址之叛也其婦翁彭友直以古費典史持郡牒撫諭叛寇著職升新安主簿未數月病殁殁時歸道巳梗其子威因費民之懷之也藁葬費之杜社寺後意及寇平發以歸未幾交址境土悉為冦陷威伏圍城中久之賴朝廷𢎞天地之德宥冦罪冦亦懼誅悉遣中國人之留其境者歸威在遣中逼迫就道顧勢不得歸親喪以屬其親所取交址婦使俟所生子丑奴長而告之遂行抵家言于其兄誠誠慟其親體魄寄葬萬里外竟遭兵塵流離斬然限為異域不得復通道路往而收以附先塋哀號攀慕之情弗克勝乃名堂於所居之西十里曰南思兄弟五人朝夕引領南向必窮神於海濵天涯而後已託希敏來請記值豫赴京期迫未復之其後誠數至京每至輒三四詣豫請不倦豫念其悲深而意篤不可以不記夫交址壤地逺在禹服之外其得與失固不足為中國重輕然先朝既平其亂而郡縣之矣使為牧守者能訓耕桑寬賦徭漸以禮義之教如錫光之勵於政理彼將率蠻歸華必不樂于叛既而四野多壘使為元帥者能出竒設備仗天威以討逆如馬伏波之良於用兵彼將授首不暇亦不難于平其叛皆不能然以致中國冠帶之士委骨荒徼不得歸葬故土故豫于友直不能為之不悲也况其子乎雖然當時吾邑仕交址者三人有歐陽興史堅者與友直俱授撫冦為冦所執死炎火中有謝縣丞子方者與威同道歸威親見其舟碎海中舉家八人皆溺死不得葬獨友直葬得地且有所託視彼二人猶為愈也誠兄弟之悲於此其亦可少慰乎車忩記薛瑄河東薛德溫官御史近五年始買小屋兩間於京師僅容几榻床席又苦其東壁暗甚力不能辦一忩小子淳乃取廢鹿車上轅卸去兩傍長木以中方穿櫺類若忩者穴壁而安置之余歸自外來因嘆曰以御史之顯曾不能辦一忩致以此物為之使富者見焉必睨目而哂掩口而走矣御史之拙於生事乃至乎此既而取古書讀其下則旭日漏彩清風度涼心神通融四體迢爽忽不知天之迥地之廣而屋之陋也復從而自解曰吾之屋如是可謂陋矣然安之而忘其陋是居雖小而心則大也彼貪民侈士巍堂綺戶可謂廣且麗矣彼方褊躁汲汲若不足以自容日夜勞神憊精思益以擴大之是其居雖大而心則小也小大之説君子必能辨之於是作車忩記益菴記羅倫南海陳公夢祥僉憲江西結菴於公署之偏名之曰益公退居之思內有以益巳外有以益人也屬余記之夫益求之而後至求益於利者之市求益於名者之朝求益於道者將何之哉求諸巳而已矣孟子曰求則得之舍則失之是求有益於得也求在我者也求之有道得之有命是求無益於得也求在外者也珠璣犀象求利者皆知其為寶圭組軒冕求名者皆知其為榮盡其知力以求之若郿塢之金西園之銅何益於得乎若夫仁義道德天之與我者求則得之四海之富天下之尊不能敵也象曰風雷益君子以見善則遷有過則改風烈而雷迅遷善猶風改過猶雷則其益於巳者大矣彖曰損上益下民説無疆天施地生其益無方損己之有益人之無如天地之育萬物則其益於人者大矣益有要乎曰有子見夫水乎水出於山山不得而有所居者髙也水非出於海天下之水莫大於海出沒日月浸灌天地水出於山而海得其益以為大所居者下也海之受益於水大者小者清者濁者黃者黑者海無所擇焉君子之受益於人猶海之於水也毁者詈者沮者斥者皆反求諸己而已於人也何尤夫然則天下之益萃於我凡富貴貧賤死生禍福若浮漚之起滅於大海一無所動其中者况匹夫之毁譽乎吾嘗與公言君子之學在得於己而已吾有所得天下吾譽萬世吾同不足以為加天下吾毁萬世吾異不足以為損公不以為不然公求益於內非求益於外者試以吾言觀之恤民亭記楊守陳翰林院之堂之西南隅有亭焉黃屋峙後翠林擁前蕪庭沍沼嘗藝卉蓮蓋前人所建以備遊燕之娛者近歲院政久敝垣宇多隳余既視篆則自廳堂廂廡外及三朝房下至庖庫廏湢稍稍繕葺惟亭尚完未之及也俄而吳民之輸廪米者麇至余為之慮之蓋恆嵗輸者奴儈胥𨽻率附勢而邀其賄以米晝暴之衢途為輿馬所踐或雨潦漂之夕斂之門廡復為奴𨽻所竊無算朝夕憂勞纍月不克入廪其苦甚矣而莫之恤也於是余揭榜禁奴儈胥𨽻嚴甚莫敢犯暴米於亭前之小庭與院後之大庭夕覆以葦席而不斂晨卷席而又暴之栖民於庭後之齋廡閈間深嚴輿馬奴𨽻莫敢至又幸無雨潦不踰月而廪完民苦乃小紓焉嗟乎民之苦不可勝道也余家本農備諳民苦姑舉其田賦一事略言之春而耕種時猶凍寒手足皴痛不可忍夏而糞耘野日如火田水若湯忍熱與濕傴僂爬梳腰折而指損或水蝗噬之棘與礫刺之流血不止旱則率婦子灌溉踏車胝足竟夕不寐秋而刈穫必廬於田以防盜盜或刃之死負擔登場流汗浹體疲極而不能休其服田之苦若是攙青刈禾未及一飽而催租之吏巳至呌囂隳突摧忩敗扉為之獻酒肴奉錢帛獲少寬假後至者益悍遂詈箠執縛以見官官又箠之流血或見骨必罄資破産以輸之嵗凶則雖鬻子女猶不能給其納稅之苦若是若夫輸稅於京者則買舟越江淮踰河泗以抵潞逺數千里帆風雨纜月星晨夕不得寧閘阻灘膠進寸退尺勢豪者又鞭撻驅逐而先之或被盜劫其資或罹風惡水險而臭厥載計雖破家莫能償徒號啼于川澨甚或遂葬之魚腹其水漕之苦若是及川路既窮又價車自郊而奔城丑興亥息馳數百里枕土飯沙冒塵坌風雨面黧骨柴雖故舊莫能識或為盜所劫或驢仆車翻委米於泥塗不可拾其陸挽之苦若是幸而入城宜可慶矣而輸廪之苦又有如前之所云者甚哉其可憐也痛哉其足恤也吾力不能恤其諸苦隨所值而稍恤之亦庶幾古人所謂寬之一分而巳嗚呼天樹君而建官惟以為民也今官荷君恩幸不與民偕苦而坐享飽暖之樂其所飽粒米莫非民之膏脂也胡不少憐其民而稍恤之且縱奴儈胥𨽻椎剝之何其忍耶民易虐天難欺吾未知其終免否也嗚呼民乎民乎可無恤乎官乎官乎可自娛乎余欲以前所慮而行者為常法也故名亭曰恤民而為記以自省且以告後之人半村記李東陽半村湯原靜居于蘇之楓橋橋東距州城數里許㕓闠相比至是而極極則為平田方湖曼衍映帶彌望無際而其居適當其交因自號曰半村半村昔嘗遊尚書晞顔楊公之門工琴解詩旁及醫術用是往來江湖淮泗間而極于京師雅好文事凡名大夫士鮮不識者豫曩見于奚進士元啓家其於元啓蓋中表之䣊也元啓卒其孤不能舉半村為治後事殫財與力豫謂其好義者心愛重之既又因刑部主事顧天錫來詣豫請記其所謂半村者去年豫南經蘇夜泊橋下憶張繼題詩處徘徊久之時半村又客于外求其居不可得也既還京師宿負未釋半村以詩來者再足及門者多至不可數豫甚愧之癸巳之夏持卷告别豫不得置也笑而問曰夫仕與隱殊塗而異尚二者不惟不能合或據其地以相訾謷故擊磬之音昔人所惑招隱之詩後世反之其勢然也又有在吏為隱居山中以宰相稱者是將安所取衷哉子之居村郭之交也出則為士為官處則為農為圃有所慕斯進之矣有所斂斯晦之矣今子以半村自名而不著其志將為河內之老自處于可否之間乎將為漆園之吏置其身于才不才之間乎不然則將用則行舍則藏所謂學顔氏之所學如吾徒者乎半村憮然作曰噫澄將去矣書豫言以遺之明文海卷三百三十
