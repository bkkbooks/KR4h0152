body:
  text: 明文海卷三百三十二餘姚黃宗羲編記六居室東讀書園記髙叔嗣出仁和門由宋曹門厯邊村隄逹獨樂岡北至園出麗景門由揚州門右轉厯蘇村後走陳留道隄逹岡南左轉厯白塔隄相國寺瘞僧所逹岡中出麗景門北徑走白塔李氏墳後厯隄如上至園凡路四初髙子止西園西園垣廬新成然近念欲東東者大父所耕處自髙子他時未嘗一再至甚僻逺是時坐論文堂心獨豫召僕問東路宋衡指地對出仁和門三五里出麗景門右減三里出白塔減五出李氏墳後減七然李氏墳道狹不容車利走者又問一日往來如何冬後涉首春凌晨往食黃昏歸正夏秋初日出往食遊息日斜歸秋春杪晨往食遊息黃昏歸于是以囊盛書以缶盛糒以柴車載夏五月望髙子遂東父老聞皆過斑白相向簔笠交於户起與揖讓問所以歸狀遊仕孰與吾農樂多少髙子具以得事皇帝六年兄弟結佩趨金門之下幸遭知遇前後凡五踐省闥父母被封澤小人分過災生身受久病朝廷加恩不絶其官還耕於野謝父老遊宦無狀安敢望公等樂父老人人則大喜咸手操雞黍為勞髙子與之飲人人益説始西郭人見髙子自引避非衣冠潔楚固不肯見梁肉皆具書拜函為禮髙子大厭之及是雖袒跣人與語禮文益衰乃大喜謂可居也恨來之晚髙子曰世以莊周所録古巢許之徒譏堯禹薄孔公其辭不馴雅學士大夫棄不信謂其人無有然孔氏書載接輿沮溺諸公其非笑仲尼巳甚惡可言無其人顧其風淳至不可用詩書禮樂之際責者余始至於野受父老之詰乃無以應悵然久之固知周言世有斯人不虗哉髙子既自讀書園徙而東猶蒙前號加東作記定非亭記髙叔嗣髙氏之先蓋自洧川徙云厥初漁陶於鄭門之野鄭門者宋之順天門也明興天下久既治邑中賢豪殆以百數而鄭門處其半咸敦誼相尚有古遺風俗髙氏又號為雄長家為門屋特大聚族其間人乃謂大門髙其後衆稍分徙髙子之仕於朝白家封君曰鄭門吾祖宗發蹤今吾宗族處之且墳近祖宗魂靈不無樂遊其中今故廬或聞乃為他人有叔嗣願因今求為室歲時伏臘上冢過留會親戚故人飲以長歡敬甚便於是家封君求修如之田於其陽所謂讀書園也會作園亭今上賜髙子告居之時從父老問先世事曩之賢豪之子孫之存亡其流風滅如也異時之俗無有盛衰在百年之際何移之易也豈其地有異乎髙子曰豫登鄭門之首循故城以西望其閭里遂直如人身首足不具父老為豫言往者盛時有老父過其下指謂人是有非字之象焉其後多是非之興其書云然夫古先王養民必匡其俗鄉遂各樹之長時書其人善不善獻狀於君君乃賞罰及之其所以防民甚備逮教化陵夷猶有長者能使鄉之人羞為不善不敢使聞之何者其行淳備感於人深也叔嗣觀於上世嘗里人死問其無以葬時顧妻耳脫金珥畀之夫婦猶歎終無恨色其鄰里每食相率之先熟之家不責賔主至少年乃直懷器轢諸其釜去今人聞所大笑之者即其風足感動於人心今復有是乎亡久矣俗之非奈何謂地形罪乎孔子曰文莫吾猶人也躬行君子則吾未之有得矜文之末聖人不喜豫患夫流俗之言不惟其本所以定之故號亭曰定非侈往世之風烈儻後有其人庶幾遇之觀瀑亭記秦夔當麻姑絶頂有泉自丹霞觀西北來蛇行斗折伏流篁竹間數十里經仙壇下與神功泉會其流㶁㶁不疾不徐至三峽橋崖谷忽破裂其下亂石森立泉自上墮坑谷中下與石鬬不勝怒則洶湧作秋濤出峽聲奔放衝突不數百步至石梁忽作兩白龍下垂飛雪灑灑濺人其聲清越而天風引之乍髙乍細若士女裂帛明珠落盤又若鐵騎突出而刀鎗戞擊響振林谷誠山中之一偉觀也成化辛丑余承乏是邦又明年適禋祀麻姑始獲觀是泉而愛焉因命道士曰洞淵者作亭其旁扁曰觀瀑或謂豫曰子身為二千石蒞旴甫數月教逆未宣澤壅不流不思握髮吐哺以盡厥職而惟瀑是觀殆非政之所宜豫曰不然子之所謂非宜乃豫之所謂冝者也豫素憒憒昧於臨民之術曩自尚書庫部郎中出守武昌當西南劇郡不勝簿書期會之勞兀兀窮晝夜不息而氣煩志亂政愈以龎豫懼夫志之煩而政之龎也則施施焉登樊山臨夏口眺大江之流以蕩滌其胸臆既而灑然而歸若醉而醒病而蘇壅者以決滯者以通而於政或庶幾焉今旴為江右僻郡其政之繁減武昌之三之二而兹瀑之勝又有足觀者清而不汙直而不撓體柔而用剛可以激貪起懦類皆有益於吾之政夫所臨者既簡而所觀者益勝則兹瀑者真攻豫病之萬金良劑庸可廢觀乎哉人唯而退遂書以為觀瀑亭記來雨軒記顧璘知山君有軒居叢竹之間曰來雨東橋子遊而息仰天而嘯曰事有同行而異情知山君於杜子果若是同乎抑亦何校於客也昔杜子四十無位卧病長安賔客棄遺青苔及榻故閉門竊嘆其客曰舊雨來今雨不來誠有感於貴賤之際也知山君二十賔興三十登庸入金閨司衮職日月獻納功加上下丈夫康濟之願庶幾焉盡之一拂其𠂻解帶脫綬退歸故鄉家本公族兼素侯之奉崇禮範飾藻業傳之雲仍及其暇日則旁究彭籛之學期與大化終始由斯言之進亦樂退亦樂非所語於盛衰者非唯客莫擇君君且將擇客矣故客唯其人則命駕以訪置驛以迎唯所施報無乎不可茍非其人雖閉户以拒可也又何校于其來若杜子之嘆非所以嘆君也昔翟公罷官書門人多挾其語余請署君軒扉曰嘉客雨來幽軒洞開惡客來雨吾莫爾主一闔一開乃適余懷一納一拒道固其所君愕然曰有是哉相顧大笑記壁而别屏山小隱記顧璘凡居恆藉山水為勝山以屏水以鑑非徒爾也屏於山則端凝尚體峭厲尚節而吾有得于實鑑於水則量以容廣智以澄别而吾有得於虗若無日月煙雲之麗草木禽魚之生晦明慘舒之變以逹其用以成其文一皆有助於德此真知山水之情者然也吾南山之居逺水而獨近山故唯屏焉是賴山北環而南正北如駝如象勢若奔湊者為小石大石迤東伏而忽起曰戴山特髙且竒者曰牛頭花巖祖堂三大峰逶邐南回其上佛宇紺碧可覩正南與吉山對獨立不倚形凹突如筆格諸山旦暮異采紫翠交映雨作則吐雲蒸風因風蔽虧或有或無不可辨過是岡巒連延弗斷然不甚髙而亦無名西南蒼林鬱然而近曰廟山西山髙者在江北卓青橫黛隱隱來赴如人知心夢寐潛逹吾廬處其間藐焉回丘之麓顧左左見顧右右至前瞻後矚皆莫避去或角巾杖履出户四望山所露見悉為我有使我舍城市而婆娑於此凡以屏故故取以名吾居有笑者曰牛頭花巖名阜也遊者沓至至則得之諸山則此方之人所環居也子獨屏之何耶余諭之曰凡言得者以心不以目余強盛時志在四方每欲抉雲漢攀日月垂光旗常之上時一至山率目寓心往弗能有之而山亦不吾與乃今動躓神恧度無所用其愚然後一篤于泉石始駸駸入今無間矣儻諸人猶吾少心則固有勝者在也雖家山中殆天壤哉亦遽曰屏焉屏焉吾不之信孤樹堂記方豪嘉靖六年冬十月初六日豫蒙恩起廢復除廣東按察司僉事職鹽法屯田明年四月朔視事前堂曰明慎後堂曰持亷秉公後堂之後有堂三間左為豫室右為胥吏所居中與後堂稱自堂後經室後而東有亭在竹間曰清節前堂之西自小廊入折而南渡橋臨池有臺曰濯纓臺後有亭曰喜有皆前人所名豫不敢更唯最後堂未名見堂後一嘉樹根蟠於牡蠣之墻裊裊若龍枝拂於市舶之舍童童如蓋廣可三間而髙過之初不知為何木詢之土人但曰梡樹梡樹至詢其字或曰東管之管或曰草菅之菅豫皆疑之蓋樹之名必從木豈從竹從草也初官甚冗未暇考閲意將制一字於木旁貼一完字曰梡有木如此可謂完矣比考古書果為此字公退對之繁陰滿簷清風自生炎方得此殊覺肅爽因憶西曹之槐故山之松小浣之桹皆可珍賞故忩曰見樹軒曰松卧泉曰青蓋異地同情扁曰孤樹夫嶺南之樹不為少矣若鐵梨花梨之為美材若荔枝龍眼之稱佳果若松柏槐榕之足清蔭何地弗植何人弗識梡也人且昧其名則植之者罕矣堂前後有梅數株竹數百竿芙蓉芭蕉芰荷之類若干本其大而喬者唯梡舉無與並焉樹謂之孤冝也堂謂孤樹亦宜也錢穀刑名之猥瑣嫌疑謗怨之由生必有特立獨行之士不避怨嫌法期於必行不受汙涅守期於必不可奪乃可以共是職居是堂也夫受汚涅而移所守者誠不足道矣有守而避怨嫌不敢盡法者斯亦為名之流耳何有於特立獨行也乎何補于是職也乎何取于是堂己乎故以孤樹名吾堂庶朝夕居之見樹而生警比之盤几紳韋之器嚴師益友之人也客有過之者愛賞不忍去每曰孤哉樹乎美哉堂乎強哉堂之人乎敢問其所以孤主人對曰衆無與伍之謂耳客曰此孤之名耳非孤之本也本立則支茂支茂則蔭廣蔭廣則觀竒觀竒則愛鍾而無與伍矣於是主人乃悟立本之道信芳亭記張嶽雷州西湖之勝聞於海北然搢紳南遊過雷州若不知有是湖者蓋凡湖山以勝名則必帶林麓窮巖壑有宫室亭榭之觀而前世又有髙人逸士留故事以傳如杭之西湖越之鑑湖然後其名始盛而遊者踵至兹湖皆不能挾而有之獨其渾涵瀲淡吞吐萬象與海上雲日相澄輝於遐荒杳靄之表則非意趣悠逺不以竒麗𢎞富求山川者亦不能屢至而自得也嘉靖己亥石盟孟子雷謫二雷州始即湖心小島纍土增髙作亭以臨湖亭成未及名而孟子遷去又三年為壬寅春僉憲夢山翁子溥巡厯至雷遊斯亭而愛之榱桷瓴甓巳有壞者為繕葺開拓加煥飾焉而余與參戎鳳山劉子經適以事至雷翁子以其暇日觴余二人於亭上酒酣憑欄四望慨然歎曰賀知章林和靖死天下湖山無真主人久矣其不幸據都會之盛日酣於笙歌羅綺又不幸則為勢家之所據奪欲如兹湖之淪於遐逺而全其真胡可得哉試自亭而望東阻城闉西蘸寇祠其南則走朱崖之路也昔之君子蓋有抱忠懷潔走朱崖萬里至於僦屋躬耕九死而不悔當其時豈有待於後世之名哉卒其所以名者諸君子蓋不與也士患不學無以自信爾既學矣而有以自信雖無以盡知於人必有以獨知於天者周公之聖而不悅於召公七十二子於夫子亦不能盡知也故曰知我者其天乎夫以聖賢之徒同堂合席猶且若是况於以逺外之身逡巡末俗而欲俯仰脂韋以求聲光於上下不亦重愧斯亭而可悲哉余與劉子矍然竦聽復命酒酣飲因取離騷所謂余情信芳者以名斯亭既名而去猶覺湖光之入夢寐也勸農亭記熊過繇嘉靖元二以來蜀歲飢丙申冬湖南阮君以使者奉命來視水利事至合江則部署羅令按水利修舊貫或相逢隰依律稱無倦欲總七鄉手實瀦水者大氏三十所而多於是合江人將有賴者云乃建亭明使者之意審其方由北郭門出絶江行里所明家壩亭在焉記曰合江豫往過之即未暇察其水土或聞諸長老習農事者蓋中上之壤也而豫觀牒記乃刀耕火種殆異乎今所聞云夫蜀故謂之陸海天下有事時乃言下巴蜀之粟矣今褁腹低首殆不樂生有如黜行誼而首剽殘此夫廪廪者獨謂民之憂何哉蓋江以下負海之國常患水秦中及四戰之國農人用毋倉生氣首種者少有稻則藉水者少其為渠有賴以否即不可知蜀通井絡猥曰漏天者乃非虛也今成都上下數萬頃地平衍有秦李氷所鑿離堆則固事水矣由成都逹之他境本戒首髙亢水皆夾行兩山間流而不居非治陂池率有旱令長率其民舉神行禱或號召方士築垣為宫醵錢治神事方士拔劍升壇禹步作大梵隱語不可了號呼風雨或乃集僧徒琅琅誦大雲經巫師舞婆祖令長僕僕然拜下民遙處思息假而萬分一雨則費已屢終捐瘠而巳此何為哉然則謂合江火種不事水殆妄也始國家勸農省臣議置司農其後司農屬户曹今置參政參議官然都水之使內外有司存也又長吏六條令甲以田疇為亟不修職業以佐民憂卿二違本以矯之遷延避課繇役昧前相師為欺國家何賴焉豫讀古河渠書乃深發憤曰吏乃今有成事故如阮君羅令要為奉職始與所頌無幾異此令萌生樂業本農甚大惠也吏不如是者皆不足聽何况乃其更甚乎然竊謂農不待勸彼夫非木石而能飢者幾何民雖至愚樂飢餒就死而自暇逸非人情也第在勿擾之俾自趨利夫輸將更過役戌徵斂讞報五者不徴諸隙而與民爭時民困之久矣又有出於此者而徒以勸所謂埋之搰之者乎然非阮君羅令所得與矣書之告來者阮君名朝東今提督學校副使羅令名應元記在落成之歲五月嵯峩精舍記唐虞佐三原馬子伯循誦先生之法希聖賢之軌典刑所昭風聲斯被其諸弟子員振衣承響喁喁以從其集如雲其立如林馬子敝廬不葺環堵蕭然而弟子多至無所棲止是故來逺而居弗寧也教勤而習弗專也僉事周子宗化行縣而知之憮然用惻乃議搆精舍以尊其教前令王成章曰此實下吏之闕也西有浮屠氏之宫叢穢伏姦大隳世典誠易置之豈惟正之用昌即邪亦於是乎黜矣而况民俗罔不釐乎宗化曰善乃亟命毁之變地以為基徙材以為宇命之曰嵯峩精舍夫嵯峩山之勝地之靈也舍實當其勝而會其靈弟子鴈行以居馬子儼然而臨之發疑待問率以躬行納於禮法龍常再至焉弟子進顒顒爾立肅肅爾退襜襜爾志而確然文而蔚然美矣哉馬子之為教也乃作而言曰化以教善德以學成是故上古之世家置一孰焉黨置一庠焉選民之秀者而升之宣之以容節訓之以德義申之以戒令齊之以讀法上植其教功令布矣下修其學明德成矣夫然後鄉舉之里選之庶幾博聞孝弟聰慧賢仁之士油然興彬彬乎其盛而可勝用邪逮夫王制湮而道化塞博士闕而學徒散家不建孰黨不立庠鄉不舉賢里不選士古今不同而美惡之風異也弊矣竊聞覿簫者思樂覩羊者思禮昔宋郿伯有意井田之制乃買田一方經畫疆理曰庶幾可興乎今夫浮屠氏之宫連甍接棟盤絡中土視諸學宫實百倍之茍悉為易置以廣賢林以增化本孰謂家孰黨庠之制鄉舉里選之法而不可復邪夫精舍誠足以基之矣而吾馬子則有郿伯之心者哉天巢記馬一龍皖山别出天柱三台壁立千仭絶壁下突然起為覆釜靖圉幕升㢋恰數楹四懸無憑拔躡可棲故曰天巢迤東門户掩設中竅布几席可數人坐頂開層閣穿一竇梯挽以上丹竈玄床搗藥臼圍棋枰仙迹儼然在焉山右折溪而斷之支阜擺踔忽壙垠砥平大畦棊次髙便播種窪引泉注行者才欲展足當額之際愕視屏息怪石竒峯錯出前後其勢逼人懸者絶而下投險若可畏傾者欹而將覆邪若必仆端重者若坐以常靜峭削者若立而不倚植若拱而客鞠若揖為禮偃屈者卧龍踴躍者舞馬若冠而柱者傳仲由之結纓若履而棄者遺巢父之蹩屣過復續離而參尊或仰卑則俯有龜蛇者若盤辟以顯象有虎豹者若炳蔚以著文鳥翼而飛若待人以色舉者虬蟄而蟠若困時以藏身者千態萬狀觸目警心皆巨靈手擘與洪冶范成耳所入漸深則所遇漸異紫翠入雲杳然而去嵯峩天永嶅挂斗杓幽壑茅團隱隱有村底雞犬聲西南去白鶴泉卓錫泉左慈臺不逺矣上下回阪之間路盡處逢溪溪流處抱石更環曲旋轉傍溪引為池沼結駟亭榭松風蘿月鶴竹鶯花助以人為掩映成趣令邑大夫徐公居之夫玄房洞府多隱髙間之士睨睥一世賢豪傲然不屑公嘗廷䇿入甲第乃亦樂此豈韓子所謂托而逃焉者乎古人動息有存進退惟命進則發山河於漁樵退則收丹青於一握柱史盛古泉謂公其然也安能坐天巢中相與一考證撫松軒記夏鍭張文成佐漢為韓功成乞退慮不旋踵諸葛武侯審起佐漢大功未就以死為退陶靖節自以家世晉室宰輔有子房為韓之心宋初賦歸去來辭有孔明不仕孫曹之節三子志義才權俱百代人物之曠見陶翁但未用耳豫嘗寤寐焉尚友焉面目千古情至而若私焉執鞭之役殆未足以喻吾欵也噫豈曰慕之云爾乎恕己量人可無古今竊又常自誦之未暇引楮墨以實筐篋今年余入城絅菴任先生方築室四楹於正寢之北刺取陶翁之辭以為榜目曰撫松暇日以紀事為言噫若絅菴亦常慕陶翁之為人因事以見意者耶請為絅菴卒業焉夫陶翁之罷彭澤賦歸來夫人所知而共羡也既歸而行事撫松盤桓亦固其所至遇田夫野老輒相與草酺泥飲慢廢不束殆無雅人之度此則衆人之所未厭而豫也亦常少槩於中於乎其殆有由然也夫人於此負才傑遇時艱是其閔世審己豈不願贊大䇿立大功以展見於時不徒己既而一不獲逞則韜機略解方嚴舉胸中之礧砢盡於平易紆隨闒茸焉出之勢也譬水之行地滔滔活活亦欲搗龍門撼底柱踔鼇海以出其竒施其壯窮逺而後止既而一不獲逞則滙為平瀾溢為安流漾㵝淡濘逡沓邐迤汀去聲然自隘泊然無競亦勢也夫以陶翁之賢生晉宋之交重以家世晉臣意豈不願入而謨惟出而踐閫梟寄奴壽典午與子房孔明所樹立後先相望既而大事且去無所更望張弛轉移之勢自不得不為是慢廢不束也紆隨闒茸也不然必發狂疾觀其述史詠荆軻諸詩拒道濟餽遺等事翁之鬱鬱不逞奚翅可想絅菴為之何如絅菴起家文學博士雲間以至分教南雍所在養士外又有斷塞姦敝寬民等疏居南雍三年外憂服除引疾卧家甚決可謂有所為者爾視陶翁亦可無愧但所遇之時不同耳絅菴生長清朝從容進退疏堂宴樂不願泥飲吟風太平不願詠軻夫絅菴遇時康獲順適如此又以見陶翁生世之不幸豈惟陶翁子房孔明無不皆然遭遇時艱不得己出而委身受役雖曰功立名顯殆亦非其所願也絅菴曰然遂書以為撫松軒記擬沂亭記符錫擬沂亭作於乳源邑西二里溫泉之旁志樂境也嘉靖甲申夏余始蒞兹郡適奉提督學歐陽公檄去六邑淫祠且屬之務禍本之斯絶庶風教之可興乃六月適英德訪諸不在祀典祠寺凡百六十五區立命毁之師生請改建舊學宰劉議弗合遂去之翁源如英德去諸祠寺之當毁者七十七區李尹請曰寺有翁山僧會在焉院有耽石余襄公碑刻在焉惟一二僧寮毁諸己乎曰僧會制也宋碑刻也不在毁列遂去之仁化如翁源毁諸祠寺百十三區作會貞社學乃之樂昌訪諸祠之當毁與學之當建者龍令皆為之矣遂去之乳源有挾而作姦者亷得其實先置於法乃盡去所蔽祠寺八十九區師生請復社學歲久浸為民所侵據得古杉一株命典史林柯職其事事詳太守唐鐵峯記改崇林廢觀為仰止書院祀昌黎濓溪二先生瀧口廟者街民為之請余詰曰何神曰鄒尚書曰鄉賢乎名宦乎曰不知曰淫祠也邑有義士鄧可賢父子死賊有保障功盍祀焉明日率諸生詣祠火淫神奉可賢主既語諸生此地當有佳境諸生曰去不百武有石浮於溪面方廣丈餘溫泉混混平湧出石竇中不識可當佳境否余欣然往觀之徜徉竟日弗忍去諸生曰請以廢廟之材亭之可乎曰可遂以屬旁寺僧戒濬且告曰吾亭若成當名之擬沂志斯樂也明年乙酉二月亭成余適有軍旅之役弗克往未幾毁于夏潦又明年丁亥余始還自軍門教諭王君世澤每見輒以為請偶得民壯之曠役者錢千緡乃相亢爽乃復葺之俾邑之人士與宦逰而過於是者慕斯泉而觀焉憩斯亭而問焉則告之以曽點之所陳與夫子之所歎曽不越乎沂水之濵而有以適夫天常之趣誠若是耳雖然龜蒙之泉乳之泉也鄒魯之士韶之士也彼則為聖為賢而我猶未免為鄉人也性豈若是霄壤懸殊哉且吾聞之上以風化下謂之風下以習應上謂之俗傳曰經正則庶民興庶民興斯無邪慝矣若是則前所毁之若干區者殆見正道既明而淫邪日逺矣否則烏頭力去而病且復故毁將曷勝君子曰邪正不兩立斯言近之遂并記於石時嘉靖七年戊子孟夏二十有一日潁江居士符錫記明文海卷三百三十二
