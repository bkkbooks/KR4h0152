body:
  text: 明文海巻三百三十四餘姚黄宗羲編記八居室四樓記王漸逵予嘗讀韓昌黎送李愿歸盤谷序謂大丈夫得志則富貴烜赫凌駕一時取以盡快其所欲戀戀於兒女子爭妍取憐之間予竊隘而悲之夫大丈夫之生於宇宙也求吾性之生意而己求吾性之生意則無往而非自得之樂又焉有志之得與不得之異哉且顯晦者時也無不得者志也是故大丈夫之逹而顯也其道在於出斯時也将與萬物共之廓無我之公全一體之念以吾之道致之君臣布之上下放之四海貫於夷夏逮至禽獸草木魚鱉昆蟲罔不咸若與帝王神聖脗合乎千百世之前後而無忒焉惟求不負於吾性之所有者而孰知其志之為得乎大丈夫之窮而晦也其道在於處斯時也将與天地共之契𤣥冥之機搜陰陽之髓上薄墳典旁及丘索枕六籍而噓之山川鬼神之奥古今往來之通萬有不測之變莫不研其精秘居髙明探幽深俾耳目之所寓心胸之所括罔或滯焉惟求不負於吾性之生意而孰知其志之不得乎且夫人之生此性此樂而巳人之學而為人亦此樂此性而已其逹也吾惟推之致之與時行之固無與於志也其窮也吾惟修之蓄之與造物㳺之固無與於時也此所謂大丈夫之道合天人而一之者也予同年凃東潭先生其有得於是乎是故其達也為令尹為廵察為郡判為僉憲或撫字循良或洗寃澤物或恵愛洽行或正已端範其逹之道何如也其處也則創建四樓為覽勝為鑑湖為水月為綠野往來其中欲與廬阜彭蠡西山閣皂之勝相與為伍凡飲食坐卧思索誦讀吞吐宇宙剖析毫芒時或與客携壺浮白大醉長篇短韻罔不於斯樓得之其處之道何如也以是觀之則固超出於退之之所言巳逺而於李愿盤谷之居㓗志於一水一石者抑又多矣東潭逺走書於青蘿山索予為文以紀之予非能文而竊有志於斯樂是以不揣而贅焉雖然猶未盡予之意也他日北逰九華東過㑹稽天台道經西江與東潭一晤登樓眺望四顧空寂始與東潭言之東潭其遲我於南浦之濱可也一川記王漸逵天下之山皆自崑崙其南而入於中國分為四支其北一支自賀蘭而東漫為太原王屋諸山黄河經其南又漫而為平陽蒲坂之間即古帝王之都也又其北之東漫而為大行及燕薊諸山即今之京師也其中一支自隴右逶迤而南而東為太華嵩髙又迄於岱伊洛淮濟出於其間自周秦而下之所都焉其南一支自漢中漫為終南大别外方桐柏諸山至淮揚而止又其南一支自蜀笻而南而東為湖湘為滇南郴桂五嶺過為八閩又北而為豫章又北而為兩浙至於金陵而止江漢之水㑹焉此天下山川之大凡也吾廣自五嶺而來亦分為四支其中一支汀贑龍門而西而南為白雲粤秀諸山即今之藩省也其東一支則自羅浮漫而為恵潮暨東莞黄嶺諸山其西一支自郴桂而東漫為英韶至端州峽山而止又其西一支則自滇南思恩髙亷而東為陽江髙明新㑹諸山而盡於海西江北江扶胥之水皆出焉此吾廣山川之大凡也夫天下之山萬焉皆原於崑崙天下之川萬焉皆㑹於海故崑崙者山之一也海者川之一也一不能不散而為萬萬不能不歸而為一者道之故也匪惟山川天地之道亦然太極者其一也五行陰陽者其萬也匪惟天地聖人之道亦然吾心其一也發於萬事其萬也是故一者其造化之樞紐乎一者虗而神也萬者實而化也握其一則天下之能事畢矣髙明楊君築圃於邑城之南向川而亭號曰一川蓋因其名曰萬山故取之楊君世業儒為國子上舎生其知所以萬一之道者乎吾聞白沙陳公自見吳康齋而歸抱靜陽春臺者十餘年始識吾心種種凑泊皆在於此若白沙者其得吾道之一者乎楊君好靜處獨居一室廿年足未嘗至令庭又能好義而守禮是能靜學者也其於白沙種種凑泊而歸於一之説必有以深契於此異時得欛柄在手則造化之機握矣是故萬一之道楊君之所願聞白沙之造楊君之所願學者也故書其扁而并言之作一川記草堂讀書記一鄒觀光不佞廬居之再踰期舊業㡬萎約不治一日觀園中生植葱鬰慨然嘆曰夫學猶是矣謂不植将落非邪園故有草堂蓋先君子所栖息云茅屋三間背城面沼後為小蓬閣閣下引三面水為渠窮巷掘門無泉石亭榭之觀顧稍逺於市不聞闤闠聲不佞乃新闢逕逕為扃鍵之則户以外無至者不佞因記童子時授書目能下數行㑹雨甚諸所誦肄藏里塾先君子檢宋萬言筴一通以試不佞櫛未竟而成誦復為陳説當否先君子大竒謂是兒敏顧其質孱弱無令苦之然不佞嘗丙夜私篝燈帷中以為常蓋廿年于兹今先君子往矣思其居處思其笑語書可廢也豈獨蓼莪顧深自惟念先人挈書以授不佞不佞所圗繼先人之業吾舎書何適矣夫吾之於書二十年於兹若饑之於食寒之於衣時寢與寢時息與息以其身為蠧魚落落無所成名何也鄒子曰古之豪賢志士曷嘗不思垂聲譽昭施不朽然名字雜汗棟中或遂堙㓕而不稱者不可勝數毋亦有天奉焉荘周所稱梓慶之削鐻十年而不敢懷是非毁譽痀瘻文人之承蜩雖天地之大萬物之多而不以易蜩之翼一技猶然况進於技者乎不佞自守諸生八年而舉於鄉又八年而仕於朝即伏首功令其心不能不橋而思進既進矣淵寂之釋而吏是營其心不能不悒而思退比退矣又以大故奪斯堂所事事歳月計耳将且復進而為吏夫不能忘進退安能忘是非毁譽是非毁譽之不能忘而安能忘天地萬物語有之時有所不及不佞蓋孜孜焉識其語於堂之右方庶㡬惜分陰以自勵也草堂讀書記二鄒觀光壬辰余還自京師而草堂蕪不治乃割㕔事三之一坐卧其中而無若客舄履相聞何久之徙草堂而東然湫隘又與兒師及四方醫士共之而書仍庋㕔事隅按劉歆七畧曰輯畧曰六藝曰諸子曰詩賦曰兵書曰術數曰方技班固微有増省為藝文志王儉七志前六志咸本劉氏畧而益以圗譜及佛道二家阮孝緒七録又本王氏而加紀傳并諸子兵書為子并陰陽術藝為技術亦益以佛道二家蓋詳畧代殊故繁簡人異至魏荀朂分四部而馬端臨經籍考列為經史子集亦庶㡬乎綱挈而目隨後之詮次者莫能違之矣間從參伍微亦未安諸儒子也而翼經維世之書僅等於卜筭方技兵書子也而軍國安攘之資并列于謬悠荒唐刑法既列於史而後列於子小説不可為子而附於子類書不可為集而附於集綜厥名實蓋原於馬之六家班之九流遂轉相因襲耳余乃置庋四而分為類一曰學術其目曰經學史學字學而凡諸儒之言足以佐聖明道咸附之一日治道其目曰養民曰教民曰治民而昭代典章名臣奏議朝署政事咸從之若農桑醫藥皆繫之養刑法兵書皆繫之治一曰綺林其目曰騷曰賦曰詩曰序記碑誌之屬而凡文人學子麗詞藻語咸附之一曰博録其目曰類書曰術技曰雜説凡𤣥宗内典叢談怪牒悉附之歐陽永叔有言力莫如好好莫如一好之巳篤則力雖未足猶能取辦予好書之癖不下永叔而生篳路藍縷之鄉鮮縹囊緗帙之舊薄㳺京師勉抑吾好而不敢以力致姑即吾所有而分而識之云耳乃復與兒泰約曰自今以往請若古人夏課然治經則若無史治史則若無子與集倘甲未竟而輙徙業於乙藉渉獵而寡精詣此學者之大弊一宜戒論道則一書而同異具論事則一代而終始具故足稽也利㨗憚難删煩舉要縱拾菁華殊乖博雅此學者之大弊二宜戒凡讀書者将以明理耳非為文詞而設也即欲吐之為言必胸中苞羅千古而後汪洋閎肆陶冶變化無所不宜今淺見狹聞而輙勦襲為文辭此學者大弊三宜戒余併書其語於堂之右方草堂讀書記三鄒觀光歳乙未自墻東徙先人之舊址即所居徙而西乃有屋三楹專藏書其中而讀之仍草堂之名志舊也余宿有蠧魚之癖天與暇日得以肆力夙好而兒泰見背家難頻仍使憂能傷人當無生理竊比於古人之意食以飴口怠以為枕孤寂而當友朋幽憂而當琴瑟則書之為用宏乎雖然余竊嘆古今人之不相及也古漆書竹簡無論即唐以前諸好書者皆手自抄錄蘇子瞻猶謂少時求史記漢書而不可得今剞􅩻盛行二酉匪秘五車匪奢矣古之士力不足供鉛藻至鑿壁寄廡掌鈔舌學良亦甚苦今不佞幸而有詔於朝即食貧不至拮据勞苦若諸君子所為矣古人或當亂離兵火干戈擾攘猶掇拾殘編揚㩁遺帙今幸而際世承平千古方䇿大者海受精者星曙其醇駁瑕纇較然可睹矣古人處其難其學常充然而有餘今人處其易其學常歉然而不足此其故何也古人好學至不就徴辟不窺天子今士自束髪而治經術廪廪然惟懼不遇合矣古人好學目不窺園手不釋巻今士即稱博雅志千古而耳目心思分而從其所好多矣古人好學至盥櫛不御慶弔不行今世人若嵇叔夜所言以慶弔為大故一行廢絶詆訶隨之矣不佞自㓜學以來以十五年困科舉之藝而以十五年奉奔走之役今謝病歸上幸而知臣不奪丘壑之守無所事於僕僕而若屏㳺觀絶賔客性躭於寂寞今者而後吾乃得我也吾将終身焉雖然吾乃有二愧也仲尼不云乎文莫吾猶人也躬行君子則吾未之有得夫讀書破萬巻而不能措之踐履則其實舛也又曰誦詩三百授之以政不逹雖多亦奚以為余亦嘗備任使上不以為不肖使之佐藻衡之地而靡有短長之效則其用疎也今乃欲托枯竹而守空言學古無成希今不合姑以娛性靈而畢未老之日則可矣掩巻之暇偶志歳月以次前記一粟軒記戴士琳史稱范少伯既覇越泛舟五湖後乃為陶於齊相距㡬千里度其扁舟時當自三江入海經維揚迤邐而北今崇明在三江委流亘維揚而南則少伯所經道也考諸舊志崇之有沙始于唐開元間是少伯時猶為廣洋大濤假令已有此沙則何必齊地哉迨靖康䝉塵道經海外舶舟南沙君臣觴咏移日乃去有花隨流水即桃源語斯不亦避世隩區耶顧少伯以名成避則可靖康以敵避難則可不佞故家東海上聞篙師長年譚説波濤險苦即平地心怖少負迂踈之癖思一振䇿中原曽不自意為海中博士也衙舎三楹方廣不滿丈檐去地不滿六尺傴衣而出岸幘而入頭上進賢觸籓時破雨則産蛙暑則張蓋風則翻書扇檠雪則映幌侵幕老稚數十指巢居穴處襍坐容膝思欲再整敝帚澄懷片晷奈此呱呱交謫何乃捐三月糧自搆一椽命曰一粟志小也規製不逾故齋而髙敞虗白軒牕玲瓏納薫就曝種種如意士不可吾意者不得入其可吾意者譚𤣥問字潄以龍團薦以沉水竟日不得去庭蒔花草種葵蔬休沐講藝之暇散髪箕踞其中蓋不復辨為官舎也寄旅也亦不復辨為中原也海外也或嘲余曰然則海中博士何負於先生而先生何不適於海中博士脱先生既以覇越泛五湖來當飽此一粟不去而使中原多故爭地爭城安知先生不桃源此沙哉今先生尚有中原志非久於齊者此一粟當有嗣先生而箕踞於中者矣余無以應之五可軒記駱文盛駱子之山居有軒扁曰五可客有過而問其義者駱子曰予居逺城郭邇山林有田數畝有桑數畦市譁不聞賔客鮮至是故可以避棼可以養疾可以治生可以讀書可以省費斯之謂五可蓋自以為可者也顧可之中有不可者存焉治生則一饘一粥朝夕㡬不能謀讀書則竒字竒文精力有所不逮養疾則參术無資調攝未得其訣避棼則俗縁未斷忽攖於心省費則應酬難免又未能如太上之忘情古所謂可者僅可而有未盡之辭以今騐之詎不信夫雖然又嘗奉教於前人矣造物忌盈人道惡滿是故至人無為恒甘於澹泊君子無營不厭乎敝陋智士勿耗其聰明所以全其天也大隱不立於峻絶所以導其和也意願無可足知足斯足矣營為無可止知止斯止矣天下之不知足者溺於中而不以為可天下之不知止者鋭於往而不以為可其不致於辱且殆焉不止誠知乎此則五可者真可以為可外此真無望於可矣又何未盡之辭云乎於是與客相對而笑復命童子執筆書之亦可供覽者之一噱然則雖謂之可可也逍遥園記程瑶予弱冠入官旅進旅退履危蹈險凡三十有七年而歸歸則創治斯園脩飾完㓗以舊所集典籍古書帖充置其中日玩而樂之若将終焉故扁曰逍遥取莊子之語云亦慕其冲曠之趣也或有過予者熟視而問之曰子之取是名也豈非脱危困而就安佚前有所懲而今有所適故以逍遥為幸耶予應之曰子非知我者也昔吾之困也迹若偃蹇而其心未嘗不樂也今吾之適也迹若逍遥而其心未嘗樂也或駭然曰於處憂而樂處樂而憂此豈近於人情哉可無為我言之予則曰吾當强壮之年進鋭氣盛不肯降顔屈意以其愚直之性抗於羣小之間叢謗而交攻之雖日與酣飲奕碁握手相歡者背則造言巧搆擠而下石焉復有權貴人方竊天子之柄進退天下士如反手然予獨睥睨而平交之彼集怒既深遂中以他事奪吾符卿貶為度支郎而怒亦泄矣既以郎吏趨走堂下日抱文案受成於大吏之几前俯仰曲折狀類胥吏遇事不可不肯阿奉輙面叱曰此郎何戅也摧凌歳餘大吏乃以罪去當其時雖他人為予不堪而予優㳺於其間進則趨蹡朝著退則偃仰一榻吟詩誦書終日不輟彼其謗也若不聞其怒也若不見其黜也若晉秩焉惟安於義命而已矣既而奉璽書乗郵傳携妻孥走西南數千里外山有棧閣千仭之阻行者汗流喘急日纔數十里夜宿荒山陋舎其土人又恐之以虎豹盡室惴惴至明發乃安水有岷沱之暴三峽之險雖一日千里頗有順快而舟人少懈一與石遇輙破敗覆沒為魚鱉食予方危坐舟中吟誦如平時幸而登岸始有更生之慶迨其再貶而南也踰梅嶺渉炎海出入蒼梧羅浮之間山嵐霧露之時侵凌鳥言夷面之所交接世俗目為鬼闗乃宋㓂萊公等所以亡其身者也予方鞭撻掾史嚴督簿書暇則吟誦如平時畧無瘴厲之加疥癬之患凡此皆迹若偃蹇而其心未嘗不樂者也及䝉恩致其事而歸始治斯園為堂為樓為殘山剰水日課童僕栽松植竹環以花卉無者増之枉者正之密者踈之旁出者直而上之數載間森然鬱然可稱茂林矣予脱山海之險就清華之地去舟騎之危即林野之安離羣小而對子姓逺權貴而狎親知誦聖言閲古詩旁及諸子百家凡古今興亡之故賢佞邪正之迹四夷九州之逺山澤鬼怪之幽莫不覽之目而得之心如建安開元之什昌黎六一之作奥如典謨正如詩禮精深如周易徐讀玩味豁然有悟恍如聖賢之陟降而授受於一堂之上也若鍾王顔栁之帖時一展玩則見壮者如武庫劍㦸媚者如美女嬌艷端者如荘人正士竒者變者如鸞鳳翔而龍蛇走也時或徴妓樂燕嘉賔投壺奕碁流觴藉草舉大斗縱歡呼忽不知玉山之頽夕陽之下也此其逍遥曷可勝道而顧以為未樂何哉蓋是時年己老矣夫子云四十五十而無聞焉斯亦不足畏也己况七十之餘血氣日衰聰明日退上之不能進徳修業超出庸衆人次之不能樹恵建功竊比一良吏閉門覔句竟日不成一章而荒謬之文僅可覆瓿是皆無以稱今而傳後晚景漸廹歸於泯㓕澌盡與草木同腐而已靜言思之慘然傷惕然恐方有終身之憂此其迹若逍遥而其心未嘗樂者也易云樂天知命予安能至此但前之未嘗不樂者恃有此耳詩云無已太康職思其居好樂無荒良士瞿瞿予今之未嘗樂者蓋為此懼也或作而謝曰子之憂樂如此固㡬於道者某其何足以知之既得聞斯言也昭然若發矇矣瑶之薄陋何敢當有道而其自述也詳因為之記廣當無室記王一鳴王子灌園漢陰時故有當無室嘗記之頃之試為令居皖太湖其所居室三楹前榮之至女墻不三尺所室北設一竹榻左右各竹笥一以藏衣屨之屬左一几置國朝律令㑹典集禮職掌諸書及諸當轄功令右一几置易論語老荘子楞嚴圎覺金剛素問難經各一巻盡寅而出盡已而入盡午而出盡酉而入蘧蘧然也往在漢上性好客巾車短棹十日而九崢嶸柯山之間猶之豆也斯拾之矣不能飲然見客牛飲則肉奮亦舉一觴觴舉而頺唐不自禁又頗以食客為佳家不具饘粥則稱子錢而益之披咏之外見人談治生䇿則攢眉家人生産經年不知其甲乙謾可否從輔車閒計畫無復之矣今皆改絃而鼓之䨇舉肘鄉歩武間山色在尋丈之外者若阿閦國一見不再見病肺以來望見日頰赤如赭日飲一刀圭無巳時邑當子午道為楚外户畏炙輠如爰居聞鐘鼓且自以受縣官一命何敢以媠嫚為要領憂盡遷其平日所手一編三緘之與之誓曰所不以深藏而什襲其以談説古昔奮簿書之晷敗乃公事者有如此日又握算習勾股法參伍進退毎案如牛腰惟恐其畢畢而睥睨思之幸有所絓而再進以求絲毫之有所縮損悉取若先邑令有聲受上賞者爰書及天下所成讞訊之文不啻馬骨搆之為篇求句為句求字蓋夕解衣而慮朝禠發郵筒則懼謗書一年所於此矣目瞯則謀心睫交則憐心自莫知其所以為是者也夫王子之居是室則與漢上之居相去如風馬牛然而王子毎正襟坐室中則恍然不懌彼六合九州之外無始之先無終之後以至毁譽之隙成敗之間與王子勞心而焦思欠伸而偃仰此其中能與室親者巨萬萬無一也嘗借箸自䇿之矣不閲消長者不足以闚世不通異同者不足以禔理有無之間㡬希藉以自存不穀安敢自謂有蓬之心求税駕所哉采詩樓記沈愷余少小時即愛慕人論詩毎侍長者見酒酣擊缶豪吟朗咏即不意㑹輙沾沾喜及長為諸生日困於業既而學為吏日又困於簿書輙復棄去不果學吾聞善詩者往往得於所感昔者司馬子長行天下故其文多竒少陵華詞藻句多得於峨嵋錦江之助吾松鮮佳山水又無名寺院及物外竒觀可資逸興毎以為欠事余家城東草堂之北去可百歩皆修坰曠野嘗與客對坐雲氣冉冉堕几席而物外竒觀騰英吐藻悉來獻狀乃喟然曰明珠在懷而顧索之途異矣乎乃搆一小樓樓東西相距無踰二丈南北稱是其髙倍之四面不設屏障八牕洞開而觸景皆詩矣遂名之曰采詩余於是乎得大觀焉時恵風晨至靈雨既零倚樓北顧春水瀰漫穡夫始服田事耕犁相屬江村農務隱隱可想見薄暮天宇晶明九山最髙峯頂可一二縹緲出雲外離立聳翠環以芳洲洲旁多蘭芷雜英春深翠色欲滴客有好事者舉酒酧水浮觴其上樵童牧䜿爭以為異洲稍北有方池植荷蕖數莖六月暑退樓居晏坐清風徐來荷香襲襲可掬東望煙霞薄林木行人時時躡足蒼苔水石間遺影在地彷彿如畫月出清光射牖皎然如練間聞吳歌嫋嫋宛轉凄切覉人孤子倚欄而聽感極生悲或繼之以泣時維九月白露為霜凉風颯至楓林落葉蒼碧如染雅宜逺眺秋髙景肅天空水碧横塘在左葉舟放流帆影隱見迅駒過隙不可窮狀冬夜過長竹牕易寒沉沉數漏箭不易曉西去古寺咫尺聽鐘聲厯厯嚮晨即披襟起坐宿酲睡思洒然去矣歳晏作風樓外積素凝白客至呼童握雪烹茗晚霽開軒園林珠璣相錯落又若水晶屋宇羅列上下疑是中别有一天地若不知塵外之有瀛海也嗟乎是其為樓也甚隘而四時之景天地之逹觀咸於是乎在是故其為詩也日益富采而詩之也日益無窮余嘗怪天地間雲嵐木石崇丘絶壁足以發竒潛然往往人跡所不至即人跡可至或風雨晦冥至為塵襟俗駕所苦亦有遇有不遇吾采而詩之也有時而窮吾獨取夫兹樓境與意㑹詩以感興譬之取材荆楚楩楠豫章皆可堂構而材無留良矣余自顧薄劣越在兹樓興至輙浩歌長嘯聲答崖谷然性質天限空切戀好至濡毫染墨竟日不能句率又慚悚曰吾負詩耶詩負樓耶明文海巻三百三十四
