body:
  text: 明文海巻三百三十八餘姚黄宗羲編記十二居室事賢堂記丁自申郡治有賔舘之設古未之有也其以義起而為之與予以所見論之為夫牧郡者之與鄉先生學士相揖譲也有所隆其道必有所以養其尊而鄉先生學士之為彼齒讓也將以謂牧吾郡也是嘗出政令蒞人民闔郡而父母之矣彼為所蒞者非為其父兄子弟則為其親戚故舊泥於父兄子弟親戚故舊治使之義而過為名刺以相題也則未及門而免車將歴階而左上于道誠隆於體誠降於節文誠拘澁而未安主賔習以為固然而恬莫之怪何哉且非獨此也其箠扑之具雖弛而据杖者尚蹐立焉其簿書之務雖閣而刻木者尚伺顔焉請間而入傳茶而出足未上堂而讙呼又擁然至矣然則將何以嚴其敬事之分而湛其咨詢之衷也盖觀之孔門從政以子賤鳴琴而治單父猶所與事者㡬人而子游為武城得澹䑓氏則嘗以公事至其室者雖今昔之體勢文貎固自差别然先民尚徳之風猶可曠代想見度為子賤之所事者非北面而承教焉必無有以安其身若乃行不由徑之士而溷於吏胥側足之塗則有望望然去亦難責以武城之得人矣以今所為築舘而事之也將使賢者養其尊焉賢賢者致其隆焉事固有比禮而度義夫雖非古之遺亦猶行古之道也予拙無他長獨喜嗜賢自蚤逰術黨以至獲交海内負其賢而不屑與吾衆矣未有賢而不樂親者既領郡而得古人則又産多賢之地乃其鄉之先生學士彬彬然翼翼然時不鄙予而傳介通命則應門者肅入於東之㕔事焉庭茀治無雜植有栢森然其中左右芭蕉可數行立如張盖動如懸旌如拱如導余倒屣而迎則恍乎若釋獄中之囂而逰於盖公之舍耳飽仁義之言心飫道徳之範黙以禆政學而匡不逮因思宓子之所事與言子之所得當亦有若人乎遂更扁其堂曰事賢盖竊取孔門居是邦之訓以庻㡬夫古之從政者而記以俟朝夕省觀焉記成於易扁之明年而舘則仍寅賔之舊云希鄴堂記丁自申予少也弱而放父師課以小學孝經及四書大義不甚解也家兄故業易則取易授一遍茫然了不曉所謂然好觀雜書無由得也時於笥中竊贏錢從故宦家易亂書數種其可意義通者夜篝燈宻觀睡以束書代枕人莫能窺之一日家大人搜笥求錢不得從床頭得無名書非日所授者詰予狀跪而鞭之余以購書受鞭寃不止毋安人恚而勸曰是兒吾豈意其若斯哉往吾之劬兒也以膝下移置地中然呱呱泣也試取故紙敗帙玩於前若朗然能為誦聲者移時而忘其啼吾以兒當若何竟為故紙敗帙之癖也家大人怒霽解曰吾始謂妨故業耳雖然兒所易者書也即以錢費不愈於他費乎盍姑任之是後予以就傅辭出外雖冗書推案家大人亦莫知誰之所授矣既行年十七八猶童心也忽經書本㫖而躭玩好若左傳國語史漢三書若戰國䇿韓非六子與夫遜志空同等集皆手抄彚輯以資誦識坐此經義艱澁屢困有司稍返本黜華三十而始竊一第追憶少年馳騖之勞亦悔日力之虛擲矣然自顧渉獵梗槩誠不自度以為千金敝箒也逰宦金陵無紛華冗沓之煩得以盡發南雍書庫取紙輕價亷者必具本焉而呉中客以貨書至間投所好俸寡不能售然不忍拒也捐綈繒以償所直客笑而受之其同志有聞予好者亦稍稍益予以所無焉盖積數車而歸以重累一介之行李會故園燬於寇家大人他無所保也驅數僕浮海負入城中母佯為戯曰兒何貧兒有富書出半屋特貧無棲書處耳予乃籍篋數并筦鑰以寄於姻有力者之家既乆而頗為蟲所侵薄逰歸暇理篋整蠧自悼其初之不審且懼其終之就敝也因思謝顯道讀史多識程子尚有玩物䘮志之譏余徒取以充巻也自蚤嵗渉獵之外不能有加玩物不已甚乎然母安人從㓜以此玩之使余因以墮是癖嘗一受鞭猶莫懲也矧是家大人出諸厄中固以䕶予之所用心者予何敢忘焉遂僦屋而選堂以藏仍其初之題曰希鄴盖鄴之家藏三萬軸雖未敢㡬而繁之能開父巻則有待焉為吾之兒曹者無貿易之費無負重之累得以醒心寓目而慰其不貧但不至如汝父之馳騖可矣不然俟後之子孫有如予之癖者留取故紙敝帙以止啼聲猶賢於敗子之嚙書而犯其一蠧也已記此以示長兒造并遷近遵甕竇記周鼎乙亥夏六月閏寓戸部劉静勉員外郎第里中人為校官於綦江者郡人送之予為作序借水為喻卒章用井九二之繇曰予甕敝漏者也亦偶見及之翌日乃雨積旬壊東西家墻聲相聞碎􅗟怒呼家人婦子環擁毳荷箔立而食屋漏下衣垢不履如行塗淖中可鄙所寓旁小屋壊相露及無爾我然拾斷墼甃塞之兩童疲不克事予方飡恚而起張盖督事静勉子繼能方録書輙來觀曰先生止即捲袂扱裳代兩童事下欲作水竇無材予顧簷下棄巨甕腹既裂厥口完好可材衆笑謂不可予竟可之置如卧床狀水汩汩圓出他竇外視之隘厥中擴然以容其納也若谷其毖也若泉隣媪稚逓相告語曰劉地官家甕竇成不勞費又固不滯宜習為也愈於吾甓為矣或諾之或耻陋之或患其腹不實膚脆為垣屋累媪曰汝石竇垣且壓將孰累乎俄徼卒督人潔街衢散歸不言噫甕敝矣瓦礫等耳孰望其為作竇材也厥亦幸哉竇在垣屋中位至卑事至輕量至褊甕而屑為之材厥亦匪幸也哉甕之用於酒漿葅醢醯醝井汲其常也人不以為幸言之乃今竇而幸之亦悖矣哉惟其不幸而敝而且材於竇則幸也雖然完而用者甕之常敝而棄者亦甕之常棄而用其餘者未必非其常也士大夫能不以用為幸棄為不幸斯過人逺矣訪𤣥棲山房記張維樞余閲趙子昻所記山水清逺圖謂天目之水至城南三里而近滙為玉湖車盖道塲毘峴諸山奔騰相屬列峯環周如翠玉琢削空浮水上湖中巨石磊落類浮玉此其最清逺處耶余至杭見峯巒起伏蒼翠欲滴微風吹波玉紋可愛近石頂豎一小浮屠象玉印意必有頥真握𤣥之士枕平臯而構道室娯神其間舟子指山間數楹為是符道人𤣥栖山房也問道人為誰即大復先生也余舞象時誦先生制義知其用志專及通籍薄逰中外覩所結撰知其儲才溥而經濟宏近與沈叔敷唐美承談易得先生之修數吸靈益悉是役也不喜拜呉興符喜獲拜先生山房庶幾聆衆妙之緒耶遂移舟往謁覩先生骨竒神清角巾布袍蕭然也入門數株扶疎随風動籟簌簌如也陟木橋十許步輒見湖水内注數十頭蓮荷離披水上也從橋横進十許步結茅屋三間虚室生白友生所從叅𤣥問竒也再進十許步列東西二樓其一祀猶龍老子其一則先生修教吸靈處也旁或搆小亭或翼數椽幽然野意真可與風行而可與水浮也余時徙倚數刻已有仰白雲汰塵土之想是後毎春朝秋夕風輕雨餘便棹輕舠徑逹同先生躡屣縱目樓中覺風奔泉響雲罩舟飛逰翔相忘鏜㗳互應而印玉對立中央余笑謂山川贈此一片玉為先生道符五湖長不足挂也先生為頥解已訪所謂静有二功其静功要在閉三于希夷昏黙之間函一於安静虚無之際守之浮游旋曲之中同之閤闢寤寐之候坤徳之章已含天地之復随見與三寳篇合而有功則在調停文武之火令精氣神盡歸土府水土交結情性還元無生有有入無為大周天間先生嘗對余言道人之學全發於叅同契箋矣道人用功八年而學二十七年而辟榖五年而不寒暑九年而斷房而應節十年而候晦十二年而行符而今乃箋是契余私歎先生巖栖川觀若許年始證函三為一與道合真其苦樂相循如此余軰欲以塵刼息餘片念回光拘拘於糟粕筏筌間而尋逆法去𤣥不益逺耶且世亦安能盡如先生昔苕諸髙士若陸鴻漸張𤣥真俱以一茗一釣混光塵於緇素烟波之徒韻致誠超矣然識者微窺其有體而無用未有若先生内行渟内觀朗内心虚虚極而静篤致逺而匡危於收翕寂寞中卓然具經世出世之局者列之李長源陳希夷二公可謂具體而微盖余於契箋得其體於管𣙜得其用於𤣥棲山房得其平生而世徒以先生因病習生托意問𤣥等之於一茗一釣之侣亦淺之乎知先生矣王右丞曰非子天機清妙安能以此不急之務相邀趙子昻曰非夫悠然獨往有會於心不以為知言是𤣥栖也請與清妙會心者相證可也遂援筆而記之致逺樓記張維樞丁未之秋余與喻中卿吕爾搏唐羙承六七弟兄談易蕭寺已沈叔敷後至間發一二證觧多濓洛微言余為洒然心開及余于役入里叔敷有行省吾閩之命忽慨及時事移疾謝璽書同羙承丈後先歸卧霅中余益心壯之庚戌春余再抵京南息研即推呉興長余甚難呉興間念茲行得證道問業於朱大復翁與叔敷羙承二丈稍自寛遂以孟夏拜郡符數日後刺輕舠訪大復翁𤣥栖山房而二丈所居地離郡城二舍而遥自初謁會後非峴山春秋二社與訪道𤣥栖及議均役諸公事外不輕得見也余復值鄭直指乆駐苕監司往來刺促酬應而時有喧啾攖拂之遭廹刼意外不得與二丈頻相請益間因艤舟之便一再到烏鎮慰承羙丈於禪終以讀禮未竟談不得劇至壬子秋季獄訟頗簡塲穡告登余亦將拮据覲計矣偶與同事諸君有檇李之行歸後乃獲移舟訪叔敷丈恨式廬造膝晩因縱歩逍遥觀郊野之空曠田疇之縱横桑榆之露立堂廡亭榭之清幽不覺對諸君喟歎也謂吾黨埋首案牘氣煩志滯倘然夷猶於閒曠寂寞之鄉何至塵垢塞膺若是昔人所稱謀野而獲逰山睹墅而勝有逺神者固應爾因離旁舍二百餘武同登所謂致逺樓見山之奔者蹲者鬬者踴者連岫蜿蟺而磅礴致攫者交映四旁而太湖三萬六千頃之勝亦若澄涵晻靄媚雲氣而帯烟霏於几席外余益爽然而起粲然而笑躍然而悟斯樓之所名致逺也夫動静近逺之境何常之有茍外有所借而中有所縛僂伏於閻竇之門而眉揚趾髙於奢豪賈客之侣試與之徘徊一丘一壑彼固等如嚼蠟之無味而惟恐躧去之不速也何逺之能致若心曠而神行山立而水止脱塵中而據物上又何動静之不偕適逺近之不齊對寂寞百尺樓之不足居高明騁眺望作五嶽五湖觀也君家兩世七仕同産三秀尊公仲若並著卿才即八龍五常不啻君方且澹乎其若虚泊乎其一無所嗜閒閒乎十畆之間而瀟瀟乎山水鳥魚之趣動耶静耶逺耶近耶此與南陽之崗上一鋤抱膝長嘯者何異且余嘗思之寧不極則忙不理静不篤則動不安君盖㫖於易而有味于潜龍之義矣當龍之深潜淵蟄寂然無跡及至乗雲氣凌薄景光膏潤乎千郊萬彚而於潜之體仍纎毫不動也君誠微察㡬先見田躍淵是將不乆寧直以十畆百尺樓吞吐雲烟而已名致逺所以志也叔敷退然曰不佞且願為荷蕢丈人修農田舍間時登樓息足矣何知逺幸公與諸大夫之臨寵也請書為致逺樓記廣養魚池記張維樞余閲志中平凉趙景伯有養魚池記大約以尺池當巨浸謂窮天下之大觀未始知觀者也其説似辨方予直圜土日律中太簇為凍將觧獺祭魚之候時則一甃既涸寸鱗亦無容或戲余曰當此無魚能為廣養魚池記乎余曰何為不可夫窮大觀者未始知觀者也善養魚者未始知魚者也今夫溟海之鯤逰天池而撃千里尚莫知其修而東海波臣止求活於斗升之潤魚之鰌若鮒者下上尺池自以為從容至海大魚之奮鬐也震蕩海水山立白波其聲侔鬼神反見腊於任公子之巨餌始知命固有所制時固有所適見制雖吞舟苦於螻螘得適雖鰌鮒等於巨鯤夫養魚者將制之耶抑適之將以已養養魚抑以魚養魚耶果云以魚養魚是必縱之於大壑適之以重淵使大小之性齊安而魚水之情相得奚局局焉尺池寸鱗之觀為噫余又非侈巨浸而儉尺池也茍觀而未始知觀養魚而未始知魚會其淵然悠然於心目隱現間則魚㤀水我忘魚何必不養魚何必養魚有尺池寸鱗固樂無此亦樂何則是淵然悠然者固不在外也余故謂懸魚不如僑大夫之畜魚畜魚不如漆園生濠上之樂魚懸魚有意畜魚有待惟此濠上無意無待夫知之濠上者未始知魚者也客復進曰辯矣斯言第僕見諸纍纍者之為遊釡為枯魚肆曽未敢一日望圉圉此中固不乏校人乎魚不畏網而畏鵜鶘願君以養魚之説風之海内名山園記李維楨廷尉陳玉叔少有向禽之好自署五嶽山人其足跡所至有三猶未慊於志而晚以廷尉免歸也使石工為山玉沙故城上以象五嶽沔故水鄉漭沆無涯玉沙矯若游龍因其勢而附益之南嶽則有天柱兠率回鴈紫盖青岑彌勒喜陽岣嶁金簡碧岫石廪潜聖雲隱翠鷲赤帝集賢聽琴春草諸峯北岳則有飛石大茂望仙元天龍角虎風紫芝靈山琴棋通元淩雲諸峯東岳則有日觀越觀秦觀丈人乾封登卦静望諸峯中岳則有錦屏太室五乳浮丘少室黄盖諸峯有洗耳巖有文魚池西岳則有髙静太華明星䨇鳳朝來松檜玉女大羅少華玉秀毛女玉井玉柱白雲落鴈天然神秀諸峯而白羊城蒼龍嶺咸具焉石往往出平泉履道艮岳蘓子瞻米元章家物及唐宋以來名賢所賞鑒題識與近代太湖錦川之竒絶貴重者環五岳而錯峙樓曰皇經曰天尺曰望筠曰仙掌山房曰大酉堂曰御風問月曰講經曰世羙曰世徳曰世恩曰世忠曰讀書曰晩香閣曰朱陵曰鉤元曰藏經曰中天曰水閣亭曰翛然曰狎鷗曰翠雨曰日觀曰觀蓮曰觀魚園曰文藥草堂曰獨耕曰王沙菴曰緑天曰無垢中有殿曰大雄精舍曰如如洞曰盧巖曰希夷曰宛委橋曰彩虹曰平政名洞天者一曰華妙為祠若廟以祀伏波碧霞元君若水神若向子平禽子夏者各一天尺樓以藏儒書與玉叔所自論著無垢菴以藏佛書泰山廟以藏道書而先世之冢域玉叔之夀藏俱在其中其東西表以兩綽楔其延袤若干里其取義取象或以五岳或自為名而總名之曰海内名山園園成屬其友李生少白使不佞為之記盖騶衍稱中國於天下八十一分居其一分耳中國名曰赤縣神州中國外如赤縣神州者九有禆海環之乃有大瀛海環其外而道經因言海外五岳為廣乗為長離為麗農為廣野為崑崙騶衍薄中國之五岳而求之禆海之外玉叔自侈其園之五岳而舉以盡海内之大觀兩者皆寓言也莊周稱莫大於秋毫而泰山為小列禦冦為江浦之焦螟羣飛集於蚊睫黄帝與容成子視若嵩山之阿維摩詰長者居丈室而容九百萬菩薩并獅子座至以一芥子納湏彌玉叔之以海内名山名其園亦二氏寓言之指也雖然非二氏之言也吾儒固有之易之為書其稱名也小其取類也大泰山之於丘垤河海之於行潦類也園石之於五岳類有異乎子思言地撮土山拳石而其廣大不測極於振河海載華岳興寳藏殖貨財故君子語大天下莫能載焉語小天下莫能破焉除日無嵗除小無大名園石以五岳無大無小之指也小知不及大知小年不及大年惟孔子登東山而小魯登泰山而小天下大其心體天下之物宇宙在手萬化生身而何有於五岳夫以形用者物而不化以神用者無方無體風之蓬蓬然起北海而入南海也指者勝之鰌者亦勝之然而折大木蜚大屋能以衆小不勝為大勝何以故神也孔子見老子退而歎曰其猶龍乎龍神物也能大能小以小大非小以大小則大玉叔能園石五嶽者乃其能五嶽園石者乎雖然吾竊有虞於玉叔大林丘山之善於人也亦神者不勝人神好清而心擾之人心好静而欲牽之不得於中禀授於外而以自適玉叔仕宦垂三十年其於紛華靡麗將無有所厭薄而後逃之乎閒曠之野若夫見舊國舊都者雖山林草木之緡十九猶然樂耶地非不廣大也人所用容足耳側足而掘之至於黄泉尚有用乎以為無用而廢之便容足於無餘地㡬何不躓無用之為用大矣社之櫟以無用故大使其有用且得有此大耶然而為社直寄跡也治園石而為之五岳其有用乎其無用乎意者其神足以勝之而聊以是寄迹者耶大瓠浮之江湖不憂其無容大樹樹之廣莫不憂其無用不然者玉叔將安用之余又聞之藏山于澤藏舟于壑夜半有力者負之而走成住壊空四種相刼其誰免此不佞無能為髙論第願玉叔以其身所不得乆有者付之園以園所不得乆有者付之名山以名山所不得乆有者付之海内以海内所不得乆有者付之造化斯善用大者也李生曰此又二氏之言也不佞曰不然易曰無平不陂無往不復日中則昃月盈則食聖人設象以詔天下後世或水在火上或澤中有火或木上有水或澤上於天或天在山中刼灰滄桑寧足怪乎佛以色空老以無名故能以小為大以大為小本易之説而曲暢旁通之者也二氏之寓言吾道之實際也吾儒之道大矣無所不有奚啻二氏即二氏無不可為用小二氏者小吾道者也李生曰善請歸以語玉叔而勒之他山之石玩畫齋記姚翼余少從先髙郵公流寓石門治小齋於所居之殿北臨細流流之北竹樹珊然在望雖非家之所有而可供清興余藏書千巻朝夕偃仰其中非疾不入内寢非傳經於人未嘗出逰外境余所學問雖稍稍傍及百家然私心所耽好而癖焉者乃獨在羲文之畫因以玩畫名其齋有越人陳海樵鶴者與余善善大書頗怪偉遂索題三字扁於齋壁於是玩畫齋之稱頗傳於逺近同志後十餘年倭夷起海島間督撫大臣提兵鵰剿石門當東西孔道介胄之士荷戈往來者如織居民多騷動余亦卜築蘆溪里中故址冀䕶先人丘墓未㡬土冦往往乗間竊發不二年罹禍者再乃復携百口入郡郭余家郭中故無廬舍又苦貧不能創置東西僦居及今六七年輙三徙然余跡雖屢遷而所耽好則無改於其素家之故業故噐雖以兵燹不能一一盡存而昔所藏之千巻則幸稍稍倍益藏書之室雖先後爽塏愀隘不同而自以所好之如故也其稱名不易盖所謂玩畫齋者自石門以及蘆溪之里及郡郭之所僦居凡歴五處矣客有難余者曰子之齋以藏書而讀之也吾嘗共子鈎簾而檢閲之齋之中類而積者不下十餘篋其間六經之文箋疏傳注之説諸子之述作歴代左右史之紀録以至天文地理歴律權謀兵畧字學藝譜之傳星官藥工山農野圃浮屠老氏之㫖虞初禆官之遺與夫論羙刺非感微托逺山鑱家刻浮侈詭異之辭章無不收攬非直畫也而間嘗叩子之衷雖於天地剖判以來結䋲之代微言隱語或未能種種博極而上下古今娓娓談説庻㡬皆得其大都盖亦非止畫之玩而已也乃必欲以是名齋雖造物者屢奪之而不變何居余應之曰子謂余所藏之載籍有出於畫而余之所學有出於玩畫乎哉非直余也雖藏書之富有如金匱石室讀書之博有如古之耆儒碩彦余亦謂其無能出此而益之纎毫矣盖天下之書冐於六籍自今䆒而觀之易固無容論矣乃若乾坤之畫垂裳之治出焉是畫中有書也家人之畫闗雎之義備焉是畫中有詩也履之畫可以定上下之志焉是畫中有禮也豫之畫可以徴崇徳之象焉是畫中有樂也夫子之論畫有曰辨是與非非其中爻不備畫之中不具春秋之褒貶乎其他九流雜説其中者皆六籍之支流餘裔固已曲盡於五百七十六畫之中而其所背而馳者則為外道邪魔不謂之書可也而况即畫之凶且吝者反而觀之皆可傍証而互發乎故余嘗謂有志於學古者玩文王之畫則周孔之繫猶為贅辭玩庖犧之畫則文王之卦猶為贅象等而上之畫前有易固已盡天地古今之變而以玩畫為學因以名齋猶懼其病於枝矣何子之難我顧不於此而於彼哉今行且有四方之役繼此而所居之齋尚不知其㡬也或天誘其衷而獲遂竊窺夫畫前之學固余之深幸矣儻猶滯於象也余何敢不從吾所好而舍已以狥人哉因書為記將随寓而縣之齋畔云吐握軒記姚翼史記家稱周公好士至一食而三吐一沐而三握昌黎韓退之謂公有聖人之徳天下士皆在其下風而獨好之如此其急假令徳非聖人則食與沐且將不暇後世學士書生祖其説以周公負成王朝諸侯以臨天下天下宴然如武王時其功悉由於此余竊以昌黎之説為未然公輔理成化之功所以兼三王而冠後世者盖夲其有聖人之徳而吐握於食沐殆其餘也子輿氏不云乎一鄉之善士斯友一鄉之善士進而一國天下皆然自古及今相天下者亦多矣豈皆傲然於萬民之上絶人以自用故公獨以好士稱哉士之所親就而歸之者各於其黨如雲龍風虎然不可假合惟公身為天下之善士是以相應相求莫非思皇譽髦之賢各獻其學以共成正大光明之治而公好士之聲為益顯乃若晚周列國平原則毛遂孟嘗則鷄鳴狗盜之客春申則珠履三千信陵則夷門侯生及毛公薛公者流自漢而下又若季布之於長君張廷尉之於結襪者王生盖莫不得士以為用而計此數君之於士也亦類能剖心析肝以相信慕其接引延納之勤載之傳記者可取而覆也豈盡出吐握下哉顧徳非周公則應之者皆俠客憸人雖表表儔軰亦不過慷慨於一死曽不足以成仁取義此周公之吐握所以獨稱於萬世耳向令退之云周公惟有聖人之徳故能得士以成功茍非聖人則雖不暇食沐猶為無補如此庻㡬古今定論而其説之長當與道之行者並羙矣惜其以一代儒宗而猶未逹乎此此知言之所以為難也今海内外百司俱有賔舘以交接士大夫茲邑獨缺余視事既踰年始相隙地得一區於儀門外之右偏喜其合古賔階之義也遂取贖金之餘易材鳩工建五楹南向中三楹為禮賔之所東西各一楹聼賔之燕息外建門一楹東向因扁其門曰延賔舘中三楹曰吐握軒愧徳之不競恐不足以致一方之賢者而士止於百里之外則雖好士如周公而一邑之小猶不足以效子賤鳴琴之治也乃伐石為文以記之兼以自警云軒之役始於萬歴甲戌之六月其成在八月勒文於石在乙亥之正月明文海巻三百三十八
