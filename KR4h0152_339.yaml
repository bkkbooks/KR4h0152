body:
  text: 明文海卷三百三十九餘姚黃宗羲編記十三居室半舫齋記邢侗余家東土率皆平原廣衍無衣裳濠濮之觀而自余宦逰吳楚數數涉江湖樓船彩鷁響金奏而撾廽帆庶幾乎平生大觀矣越自得謝家食為園東城之隅大則為犂丘亭古臺髙揭巨麗甲一方而亦有茅茨短築委檻曲廊依稀吳越間菟裘中敞一齋仰施藻井俯則裁文杏為枰左嵌綺疏者六才與棐几齊緑沉為飾宛若楹忩右則徒壁立東西通弄對啓雙扉直北為中扄南向穴壁甕如也主人有味乎歐陽畫舫之旨而額之似舫之半曰半舫齋云縱僅為尺者八橫殺八之一可吟可揮可酒可碁可與羲皇逰可與頭陀居傍睨逺想居然三老長年之在御而烏軋欵乃之聲互相喧答也已乃推忩延眺萬栁回環若度秦郵之浦隋氏之隄俄而皓魄初升煙雲合匝隱隱百雉三數樓櫓爭出較竒則又若放溜懸水棲帆彭城黃樓亘其前而坡翁月中遊也若夫隔林洞簫深巷寒犬家童晚炊鄰媪相杵又何減水籬吠豹逺天長笛前村漁火野泊夜舂者哉余風濤中人也比雖漸逺舟楫曷敢一日而易波臣兒曹第誦斯言尚亦無忘陸海吾鄉信美其永永勿見嘲於河伯也投轄館記邢侗榆塞杜日章氏三千里走訾黃之足以投轄館屬記於余余為濡筆記之曰漢陳遵嗜酒每大飲賔客滿堂輒關門取客車轄投井中雖有急終不得去千載而下遂歸遵大度好客爭艷為口實日章生長榆塞日所坐卧便習非犀渠之甲則勃盧之矛非訇雷之鼓則藺石之且身手撇旋若驚鳥捷猿卞武擊技佽飛射聲之與伍而牛酒椎釃之為政爾胡取於投轄而顔之楣日章大度好客類陳遵襲其大人大將軍之業略一染指壇坫間即謝冠軍安家食所讀盡七略四部之書所湛漬咸黃虞秦漢六季李唐之故筆花墨瀋揮霍鉤托長篇短韻若大黃之弩一發破的又若八蠶在簇網絡纒綿良工獨苦而後絲縷秩如也縹緗黃素在左幡旄旍葆在右長靿短鞢在前烏欙蠻畫在後客而折簡客而不速客而四逺客而比鄰客而冠蓋客而布衣客而粲粲門子客而桓桓將林無不羮素綦之味沾湒丘之漿抑又庶羞千族方圓屢進蹙融格五激矢博驍戲車立騎弄彘鬬虎方丈之地蔚為勝觀已而合樂大作呿陀婆門硠硠嗑嗑突厥阿鵲二鹽並陳聽雨聽風透空碎逺涼州大徹颯然四筵已而修簻餘簫合蟬滴溜瑣忩兒女掩抑羞澀已而陽羲就頽銀缸嗣暉挏馬蒲桃移尊改席瑟徽紋軫始奏雅琴客主洽於丙夜遞夀暢於百齡即有刺史大窮尚書期對孰為假之後閣者循井之湄車皆脫轄日章於客技亦單矣客過吾廬輒言日章不第聰明才藻士其於敦朴檢柙精嫺治辦蓋天性然視遵放縱不拘廢曹甘適者不可同年語則日章於遵投轄事取節焉可耳若日章者第飾紈素輕稱過賔客以為娛而遂忘尊大將軍建威䇿勳之業令楊玉輩非落他人手日章宜何如者及乎三城未築韓公耻之日章亦耻之矣駱駝一鎮如馨地寧不足日章父子起家所而沾沾乾餱以愆之為託其何以得名朔方義烈慷慨為雕幰駕而飛鞚驟其勿徒以稱過賔客也而以厲兵秣馬為封侯畫像圖則投轄之館余且用武都丸泥為日章封之矣日章日章其頷之否抱甕亭記袁宏道伯修寓近西長安門有小亭曰抱甕伯修所自名也亭外多花木正西有大柏六株五六月時涼蔭滿階暑氣不得入每夕陽佳月透光如水風枝搖曵有若浪紋衣裳床几之類皆動梨花二株甚繁盛開時香雪滿一庭隙地皆種蔬瓜棚藤架菘路韭畦宛似山莊小奴青泉負甕白石注水日夜澆灌不休面貌若鐵稍暇則相與宴息樹下觀其意殊樂之無所苦凡客之至斯亭者覩夫枝葉之蓊鬱乳雀之哺子野蛾之變化胥蝶之遺粉未嘗不以為真老圃也而是時伯修方在講筵先雞而入每下直之時眼中芒生稍一假寐而中書催講章者又已在門頭膠枕上欲起不得兒童以熱水拭面乃得醒看書如在霧中嘗自笑以為不若青泉白石者之能有此圃也宏初入亭甚適既見兄勞頓心竊苦已而愀然曰此余師焦先生之舊居也當余初第時攝衣屏息傴僂門屏下與諸弟子問業於此者不知其幾屐齒之迹猶在門限卷硃未燥而先生已為遷客羊腸路險吾末如何若宏反覆於此而知伯修之寄意深詞旨逺也伯修殆將歸矣文漪堂記袁宏道余既僦居東直之房潔其廳右小室讀書而以徐文長所書文漪堂三字扁其上或曰會稽水鄉也今京師囂塵張天白日茫昧而此堂中無尺波寸沼之積何取於漣漪而目之居士笑曰是未既水之實者也夫天下之物莫文於水突然而趨忽然而折天回雲昏頃刻不知其幾千里細則為羅縠旋則為虎眼注則為天紳立則為嶽玉矯而為龍噴而為霧吸而為風怒而為霆疾徐舒蹙奔躍萬狀故天下之至竒至變者水也夫余水國人也少焉習於水猶水之也已而涉洞庭渡淮海絶震澤放舟嚴灘探竒五泄極江海之竒觀盡大小之變態而後見天下之水無非文者既官京師閉門搆思胸中浩浩若有所觸前日所見澎湃之勢淵洄淪漣之象忽然現前然後取遷固甫白愈修洵軾諸公之編而讀之而水之變怪無不畢陳於前者或束而為峽或洄而為瀾或鳴而為泉或放而為海或狂而為瀑或滙而為澤蜿蜒曲折無之非水故余所見之文皆水也今夫山高低秀冶非不文也而髙者不能為卑頑者不能為媚是為死物水則不然故文心與水機一種而異形者也夫余之堂中所見無非水者江海日交於睫前而子不知子則陋矣余堂何病焉青蓮閣記湯顯祖李青蓮居士為謫仙人金粟如來後身良是海風吹不斷江月照還空心神如在按其本末窺峨嵋張洞庭卧潯陽醉青山孤蹤掩映止此長江一帶耳風流遂逺八百年而後乃始有廣陵李季宣焉季宣之尊人樂翁先生有道之士也處嚻而神清休然穆然夢若有持清都廣樂徘徊江庭以祝將之曰以為汝子覺而生季宣因以名生有竒質就傳之齡騷雅千篇殆欲上口弱冠能為文章雲霞風霆藻神逸氣遂拜賢書名在河嶽公車數上尊人惜之曰古昔聞人雅好鳴琴之理子無意乎季宣奉命筮任授山以東濟陽長三年大著良聲雅歌徒咏然而雄心未弇俠氣猶厲慨然出神武門歸而乃牢騷夷猶乎江臯夷堂發㚇層樓其上望逺可以賦詩居清可以讀書書非仙釋通隱麗娟之音皆所不取季宣喜賔客而蕪城真州故天下之軸也四方逰人車蓋帆影無絶通江不見季宣即色消而神懊以是季宣日與天下逰士通從相與浮拍跳踉淋漓頓挫以極其致時時挾金焦而臨北固為褰裳蹈海之談故常與逰者莫不眙􅌓視嘆曰季宣殆青蓮後身也相與顔其閣曰青蓮季宣嘆曰未敢然也吾有友江以西清逺道人試嘗問之道人聞而嘻曰有是哉古今人不相及亦其時耳世有有情之天下有有法之天下唐人愛陳隋風流君臣逰幸率以才情自勝則可以共浴華清從階升娭廣寒令白也生今之世滔蕩零落尚不能得一中縣而治彼誠遇有情之天下也今天下大致滅才情而尊吏法故季宣低眉而在此假生白時其才氣凌厲一世倒騎驢就巾拭面豈足道哉海風江月千古如斯吾以為青蓮閣記剪四宜堂竹樹記俞琬綸舊堂前多竹樹鄣蔽湖山伐去過半守者懼罪乞豫聞於主人芬月逹夏携所同志幽尋僻訪清壑詠地乃得此堂堂在鄧尉余十年先餌芝于是山光依依如戀夙契席連臯比夢沉經笥禁目幃外焚膏繼晷余則不能逺睨髙睇苦光難來嵫景易至埋首而度既將曷悔日與淨持快逰美睡講修生理問震旦事此堂之內竹木為祟碧虛鏡湖蒙以蓊蘙絳霄緗嵐驅逺側避余誄以文設漿以祭芟其叢莽利乃斧鑕時則黅然而生朗氣紫磨素雯雜來貢異曙影張屏飛湍浥翠近堂諸山漁洋為最在堂左偏為堊痣堂左􅓁簩姑且勿刈以籠漁洋使堊破碎守此堂者瞋目而視曰吾主人屬吾掌寄一葉一枝皆有數計君悉翦除我將獲戾余曰勿恐爾且寬慰所伐無多所得億倍頃三萬二峯七十二齊入此堂皆吾所賜僕曰雖然非主人意請君數言榜此堂內主人見之白我之罪豫應曰可乃為是記海亭記觀察大夫吳公之先故雲間上洋人徙長安上洋去郡九十里東瀕海郡中諸水由青龍江南折入浦而東流注海公之先家焉公雖居長安心思故鄉不忘京兆舉明經對䇿擢第顯名意終不自得上書曰臣聞人之有宗猶水有源木有本也臣蒙陛下收録臣幸顯榮矣顧自念臣先人墳墓宗族在上洋未嘗得以春秋掃除會父兄長老臣甚自愧惟陛下幸察書奏天子嘉其意賜告歸會同郡林子范子亦以洗沐至公謂二大夫曰僕家長安中未嘗見海今幸得賜告至此夫玄虛所賦誠侈靡過其實乃諸子百家所載莊生列禦冦歸虛尾閭之論海信廣大竒怪私心慕之甚願觀焉二大夫曰善相從至海上海上多亭障置酒亭上憑髙延望數十里天末深碧與天同色而差異瀲灔不定問津吏津吏曰海也公顧二大夫曰彼其蒼蒼者何曰張華所謂滄海許氏謂黑而晦者是也頃之有聲如風如沸湯曰潮候也有呼而奔者曰漁子避潮也未幾水平岸蕩漭千里極目不可斷乍進乍退有物出入倣佛難迫視曰海獸也潮至故戲潮夫陸之所有海亦盡有之少南有山若沉若浮潮汐無異曰浮山也浮山南有山多林木曰金山也二山旁則秦山柘山或立海中或半入海頃之諸山漸隱不見曰海霧也占有大風風果作濤益怒上沃天日倐忽萬變不可狀公與二大夫恍然相視而歎因論天地之大隂陽之盈虛消息蓬萊方壺之屬誕謾無有秦皇漢武皆英主恨迷不悟與夫鄒衍所稱之謬是日三大夫亭上辨難意最歡日昃乃罷其後公補尚書郎郎中數年以功次遷觀察大夫將厯下軍屯安德以備邊患是時公開府尊重猶時時思海上樂欲一往終不可得故自號海亭明其志時周子奉使清源周子與公同郡厚善告以故周子曰公既已貴乃幸思故國也甚厚昔歐陽子徙潁川蘇子徙陽羡二公所謂有道仁人也猶然輕去其土卒蒙誚讓公徙長安久不忘其世公所謂長者耶過二公逺矣然四海方一家北盡遼海南至珠崖皆內屬為臣揚帆一月可至公今握重兵屯要害御史察亷舉奏公治狀可任天子方大用公出以重臣經營四方所至即家何必滬瀆吳淞乎公謝曰先生教甚善願先生志之使四方觀先生所稱猶至海上也薔薇壁記孫慎行薔薇無處不有乃於吾園爛開若錦屏玩之真所謂敝帚千金者也然非花之謂也自海內髙賢士所名松筠其幹蘭茝其心一旦捶辱囹圄中雖光采沖天而形質沉埋九地者何可勝痛吾竟荷聖天子赦詔以免吾得與園日相守不至流離窮邊又所謂直木多伐而支離得全者也不亦榮哉雖然亦非吾與花之謂也丙寅春吾嘗植兩玉蘭于庭方春盛開逮六七月又開吾以病卧數月不至園僕持歸盻之覺了無况味爾時威政日亟而禍亂足憂也今聖天子撫御一年來蟊賊以翦瑾瑜以章吾即老病不復冠帶而忽逢聖天子特知排恟議慨還官誥得以從容徘徊屏下然則花之足喜悅豈直在吾昔也縱竒花異産徒增萇楚之悲今也即蔓花凡花足歌黍苗之蔭夫聖天子隆興景運嘉惠宇內宏恩不可以無記因為薔薇壁記崇禎元年七月也又憶丙寅夏有蓮一株髙四尺五寸穿葉心而出如佛幡蓋早晚舒放開幾十餘日素知花者嘆未有然吾不此之記而記薔薇蓮偶一見而薔薇嵗嵗見其歌明盛於無窮者將在是東溪草堂記蔣鐄余既築東溪蘭若復廬其左方丈地曰東溪草堂環草堂為茂林長溪為竹韻為松濤為九疑黛色余間休沭焉則皤皤黃髮杖而從余為三章約法毋工綿蕞毋用俗樂毋戕生命則皆願如約已復矍然自念凡豫所與諸公約皆以雅道相成顧豫則俗吏也吏以俗自程功令亦以俗程吏一切刀筆筐篋錢榖委輸司空城旦惟吏職之間一入法酒則委蛇罄折一獻百拜稍稍商及幽人韻事輒詫為踰檢間蕩官守譙訶四起甚而操吏議隨之故吏道之俗不寧更趨之課吏者又為之繩約令迫而就之夫以俗吏而談雅道毋乃不倫而逹者謂不爾爾夫單父之琴漆園之曵尾彭澤之糟牀獨非吏耶姑無論其至者若栁司馬之為永州幽泉怪石無逺不到到則披草而坐傾壺而醉若坡公宦轍所至名勝買田卜宅若營菟裘錢思公守西都歐謝諸公在幕下一夕抵龍門香山雪大集忽煙靄中車馬渡伊水則公遣厨傳歌妓來傳語曰山行良佳少留龍門賞雪毋遽歸也彼其時工針吏議豈視今日遂疏濶而雅韻襲人千秋可想乃人推真品吏議循聲方之今日尾瑣齷齪寧直霄壤由斯言之古者以雅韻兼牧吏而治蒸蒸起今以俗務專程吏而習轉靡靡豈古今人遂不相逮也夫人情莫便於真相與莫不便於矯相蒙今矯為不便以籠天下士大夫其士大夫強捐其所便以就所不自便至於精神象貌舉不自用而為吏用又不實為吏用而貌為操功令者用彼一身之內不能自主又何所挾以對吏民而奏操刀製錦之技蓋自俗病中於吏則人品偽人品偽則吏治偽而世幾不可為矣余幸不敏不習為吏故不習為俗又居荒僻之邑得自跳於俗又得長林豐草之地以便宜蠲俗禁而驕語雅道以夸都人士或謂余坐堂皇則為邑長宜從俗坐草堂則為山澤長宜從雅夫雅俗不並陳豈其宜於山澤者不宜於都邑今余為治三年矣筐篋錢榖諸務靡刻不拮據而絶去町畦掃除煩苛以雅道與民遊羲皇而企懷葛民之便吾約不減草堂三章吾安吾吏之拙以追古人之雅漆園彭澤諸君子吾師乎吾師乎自余有草堂而邑之父兄子弟始知俗吏竟有雅遊余安可以無紀命識諸石時為天啓壬戌之孟冬既望明文海卷三百三十九
