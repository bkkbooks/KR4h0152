body:
  text: 明文海卷三百四十餘姚黃宗羲編記十四居室浙江按察司獄記王猷定浙江按察司故宋嶽忠武第宅也獄在司左相傳万俟卨承秦檜意旨置此以禁忠武者旁有井蓋忠武女持銀瓶投升死後人謂之銀瓶井云丁亥余友朱士稚以事繫獄久之得釋為余言天下之獄未有慘于此者始入獄卒導罪人至獄司前索金故事罪人入見獄吏無重輕皆輸金卒如之又推罪人有資為牢頭者主進焉而後掠其私謂之常例錢金多者雖重罪處淨室或自搆精舍以居否置一獄名套監周遭樹木柵地穢濕覆以腐草鬱蒸之氣是生惡蟲罪人械而入卒持其兩手縶柵上使不得便須臾蟲觸人氣百千攢集人體自耳鼻緣入衣祴凡屬有竅蟲滿其中經畫夜雖壯夫後生什不得一二折而下一徑黝黑盤曲深坳突有石門犴狴司之門堅重啓之聲似吼隂風颯颯從內出炎暑當之股栗中多積尸狊逹門以外罪人既入獄卒閉兩門邏者僅存一竇通勺麋白晝鬼嗚嗚狰狰立人前強有力者與之角衆鬼來人力不勝則立斃庚子萊陽宋公荔裳分守浙東余適逰會稽以此告之公曰明天順間吾先世御史公諱黻者裳臬是邦矣廨旁有廟祀銀瓶女祀之日例拜女一日自念我朝廷執法吏乃屈膝女子耶命擇日改廟他所甫鳩工忽空中見女子持弓矢射中背頃之疽發余聞之作而嘆曰有是哉以一女子死四百年而英爽赫奕如是况忠武乎夫忠武嬰賊臣之害亡宋社稷迄今過其墓者見賊檜之像樵夫牧豎猶爭擊之胡至陵谷屢遷而以幽陷忠武之穽為獄卒賈利之場為之吏者若之何仍其地而不思所以廢之去嵗除夕前一日士稚沒余感良友之不可作而有感乎其言也今年春宋公將之任按察司公仁者既嘗道其先世事於其行也為之記以貽之辛丑元旦書明文海卷三百四十
