body:
  text: 明文海巻三百四十一餘姚黄宗羲編記十五紀事書閩中死事王禕嗚呼元末天下亂大都小邑棄君叛父而賣降者何其衆也於是綱常幾斁矣然其間以節義自見者亦時時有焉豈天衷民彜固不可泯耶嵗戊申國兵取閩以歩騎由杉闗擣邵武遂克建寜以舟師由海道破福州遂取汀劍而興化漳泉皆望風納欵閩八州不兩月悉平當是時大小守吏亡慮數千百而能死者僅得兩人焉曰拜特穆爾曰徳哩黙色此兩人者從習於仕宦未必明乎聖賢道徳之教及其從容就義雖古烈丈夫何以加焉故特采其事著於篇拜特穆爾者字君夀䝉古人也歴仕素著廉能名至正中以選為福建行中書省左右司郎中行省治福州我師至城下城將䧟引其妻妾五人至樓上慷慨謂之曰丈夫死國婦人死夫義也今城不守吾且死若等能吾從乎皆泣謝曰無他志也有死而已即皆引繩自縊死有十嵗女度其不能自殺呼諸佛龕前紿之曰汝稽顙拜佛可保爹娘無恙也甫拜挈米囊壓其背囊米重女即死囊下獨念宗嗣不可絶而有男始三嵗命乳媪抱匿旁近民居中仍俾賫金銀自隨謂之曰萬一事不測以此贖性命或可全也未幾兵入城乃引燈然屋四圍牕有頃火四面發遂焚死徳哩黙色者字子初回回人也性剛狠敏於吏事事母孝年四十猶不仕曰吾不忍舍吾母也由宿衞用年勞授行軍政院崇教三遷為漳州路達嚕噶齊居官三年民安之時陳有定據閩中諸郡甲兵錢糓之政用其私人總制之朝廷命官皆不得有所與王師比及境總制者即以城納降勢已不可為仰天嘆曰吾不才不數年致位三品國恩厚矣無可以報國恩者惟有死居無何吏報新朝詔諭使者至禮當出城迓從容語吏曰爾苐往吾行出矣乃被公服詣㕔事北面再拜畢取印斫其文又取手版書曰大元臣子置案上据其坐以坐即引佩刀剸喉中斷喉以死既死手執刀按膝坐儼然如生時郡民相聚哭庭下歛其屍葬城東門嗚呼昔宋季李芾守潭州有元阿爾哈雅之師至潭州䧟芾舉室殺身自焚死趙卯發守池州巴延軍南下郡佐舉城降卯發與其妻同縊死死節之烈近世希與為比者去今百年人稱道之歴歴如前日事抑豈特百年間人稱道之不置雖千萬世不泯可也嗚呼以余觀此兩人視芾卯發何媿焉溪山讀書記解縉吉水縣東行七里永豐江上鳳凰山勢翔動有釣臺瀑布與嚴陵君隠居無以異也其隔岸陂陀平衍風氣迴合於人居尤宜先曾祖姑令子巽湖胡隠君為别墅焉有溪山風月樓在元盛時大夫士之詠歌至矣隠君令子仲芳為余娣妹婿少時嘗往顧瞻徘徊以為使有書數巻臨清流䕃佳樹登山而望俯潭而漁雖酌清水食脱粟擷園蔬而雜之亦曰樂哉千駟萬鍾何足道哉此予之夙志也予甥宗訓少從予逰聞予言甚熟於是優㳺奉親讀書二十餘年予之所願慕而不可得者宗訓厭飫而深得之也豈若予之勤勞鞅掌哉雖然書不可不讀有不必讀者有不可讀者方外異端之書不必讀妄誕迂怪之書不必讀駁雜之書不必讀滛泆之書不必讀刻薄之書不可讀余少時無所不讀是以舍溪山之樂而從事於外至今欲為山林之樂不可得也而後知昔之所讀有不必有不可而今始欲取六經正文端誦而求之也宗訓廼以溪山讀書請為記前已為之銘又以此語復之焦氏廬墓記劉夏甲辰三年江西道提刑按察分司行部至進賢縣舉儒士二人焉其一人雷逸清其一人焦致中雷氏堅苦澹泊在家務耕稼焦氏教授里中有孝行嵗當壬辰癸已之時江南兵火大作焦之父母亡流離轉徙之中乃能不飲酒不食肉與人言輒流涕執親之喪三年及亂定還鄉又廬墓側三年嗚呼當此之際世道之大變何如也父子不相顧兄弟離散君臣之義暌夫婦之道缺儒者多衣短衣帶長刀踐獵戎行一朝依附權勢假名為公卿郎將即可以得志斬艾人如草菅區區守行義出門有誰可相告語也而焦氏獨能力行孝弟於此時邪夫孝弟也者士大夫百行之常亦無足多上人乃能於三綱淪没九法斁壞之際此為難能耳人者仁也仁人之生徳也孝弟生徳之本根也本根植立則枝葉之條達鬯茂可計日而冀矣每念彼同時之人馳騖於形勢之途而不知返膠固於刼奪之域而不能拔此皆蹈夫死之道也夫有死之道者今而澌盡泯滅化為冷灰微塵不復有聞於時有生之徳者今皆領薦於上大夫將有人民社稷之任進為當時聞人故今特為雷氏作逸清堂序又為焦氏作廬墓記者見我國家收拾天下人才未嘗專事藝文之末而遺於孝弟力田之本也吾黨之士亦可以為之儆懼矣虎咥木偶人記劉楚嵗乙已饑而多虎夜則盜相迹於道莫敢捕逐之者是秋安成山氓有忿人盜已蔬者以里祠之神類能威殛人也則迎致而露禱焉與相約曰必得盜見厲乃歸否則終露暴焉其神固木偶也長短大小畧與人等又衣眞絳衣冠大冠儀狀儼赫過者不敢正視既數日矣方夜半月朗朗在地門外勃窣若聞行地聲其人以為盜且復至也亟起從壁間覘之見一虎逐逐然來至神所以為人也為之曵尾睢盱傍徨左右欲却欲前者數四偶人不動乃稍近對踞注視久之忽有風揚其襟若將起而動者虎直前奮攫之囓其首始知偶人刻桐為之桐木柔脆嵗久且腐牽掛虎牙至膠其兩頥不得吐嗑虎為之揺首振胸跳擲以求解不可益駭怒卒踐蹙頓掉左右揮拉始得脱乃去見者大驚且奔告其里人咸來聚觀見偶人軀幹手足狼籍道上無有完者因私悼神之無辜怪虎之暴而又笑其眩睛不知以至於此也其家故畜豕他日虎復來伺知之夜躍入垣内有虎阱伏牢側弗之覺也竟失足䧟阱中咆哮騰躍窮蹙不得出衆急聚挺刃相擊死因叩首謝神曰吾神固聰也今虎死於是其譴怒之所致歟乃相率舁死虎祭而食之更刻木為神軀益製美衣衣之歸神於祠盜亦遂絶嗟乎虎之毒人甚矣乃有乘以肆奸者彼寜復知有天道哉方虎之咥木偶人誤也然冐冠衣而據非其所者卒能致禍偶人其假冐而失所據者歟乃虎之隕於阱也若有使然者然貪得不已自足以䘮其身不必神之所為而偶人以毁䘮之餘邂逅虎斃遂食厚報亦過倖矣彼悻悻然不勝於得䘮之末而反覆繆迷以逞媚於鬼神者豈非愚且惑哉卒之虎斃於阱盗息於野天道之應微矣而儆戒之機不亦妙乎漁記烏斯道郡北出城咫尺許有大陂元至正間予客處陂上日見人以智巧致陂中之魚最稔方其水之盈也人則羅坐以釣顧其魚有得有不得人乃置一器狀若仰盂實膳膏薌其中置水底泥沙上魚聞其薌則叢至及下釣則無不得也或坐舟中手持一綸以其緡貫竿杪緡之末懸一大珠珠之下有一小鈎魚見珠狎而戲焉口數著鈎則不可遁矣或以叉或以射或設罾而起伏之或約十餘舟圍繞以進一人擊楫則齊力旋網否則以細絲結數罟以絶其流先戒一人以楫扣舷上或拍擊水面使魚跳躍而入否則以一網繫百罭其上人左右掣其大綱人曳而前趨則魚亦皆得有搤鸕鷀之吭而奪之魚乂有潛行水底以手摭魚以出有投擲葉中觸魚使魚困而上浮有左手持小網若翻車然者仰承大防下右手持短木通防之槎内有棹一舟淺而長者側其舟著水面並沙際而往舟激水魚驚而躍入舟中有作梁水上竅其下納笥竅中有穴其水中若大甕以箔其上俟水殺而取焉水既上則罩迨夜則以火燭水魚見火而出水面亦罩而得焉水涸可尺許乃以網設水魚上手按而取之或以蜃灰洒石罅以橛入罅内及逐魚以出者水竭盡人以竹丈餘織其半若覆簣下繫一小囊卻行而爬搔凡泥上魚𤨏碎長不滿寸者皆入囊中嗚呼忍哉古者山澤皆有厲禁今也民得以盡取惟恐智巧之不足也魚雖欲自蔽可乎孔子曰竭澤而魚則蛟龍不戲其淵豈非此之謂歟滇南慟哭記王紳先公以洪武五年正月奉使雲南招諭元梁王六月抵其境六年遇害至二十五年不肖孤紳竊禄西川屢請於蜀王殿下二十八年冬得㫖十二月朔日戒行次年二月二十三日到滇次日叅見岷府退謁藩閫文武大臣及士人庶友至以情事為告聞者憫之競為咨訪二十五日有僰人畫工何仁可年七十餘來言親炙先公於佑聖宫甚久至繪素之事亦多經指授且云初來時梁王甚加禮敬府僚大臣若司徒達爾瑪恭政喻金閭高撫慰軰尤所尊重凡見梁王必以天命所歸人心所屬之理為之開説退諭其臣僚尤加委曲梁之君臣亦知元社已屋皆有降意時元之故主出奔朔漠者遣侍郎托克托自西蕃來通耗索援且刼以危言必欲殺我使以固梁王意梁王不忍遽絶於我朝迺匿先公於民間托克托聞之謂曰國家顚覆而不能救反欲逺附他人邪躍馬而起梁王不得已遂出先公以見之托克托欲加屈辱先公慷慨罵曰天訖汝元命我朝實代之汝如皭火餘燼尚欲假息以與日月争光耶我將命逺來豈為汝屈今惟有死而已或解曰兩國交争不罪來使不從則遣之彼何罪焉况王公才器天下無雙宜有以全之托克托曰今日雖孔子在義不可留梁王不能救先公復顧梁王謂曰汝朝殺我大兵夕至矣亦不聽遂遇害時為臘日未申時葢棘人以此日為節日故久不忘也諱日城中父老士女莫不垂淚達爾瑪既陳奠祭左右具衣冠斂之以禮即日舁至地藏寺北漏澤園化之以火諱所即今之觀音寺前三市街言訖引至漏澤園躃踊設奠是夕宿地藏寺自此連日至彼展哀至二十七日紳别訪南闗董金剛保以合其説葢以先公嘗主其家故也金剛保亦引至觀音寺前指以諱所號慟間市人競來致問中有蘇奴者前言棺木實其家所備葢其兄慶時為元帥故達爾瑪一以後事委之其言遺事略與仁可同但奴則云火化在小南門城壕邉復引至歴指其處哀未止有僧從西來自言年百嵗口述遺事甚悉紳拱問化後遺殖何在僧言彼時上下恟懼誰復道及此者三人之言遺殖並同自是士民僧道多來稱述先公容貌言行嗜好製作動静僕從皆可稽但無能知夫葬所者因姑設次為位於地藏寺之東夾室越明日漏四下陳設於寺門外告祭於雲南府城隍里社寺伽藍等神備述事情之由禮畢奉新製木主就觀音寺諱所盡哀題主禮畢迎回地藏寺位次昧爽行正祭禮先是布政張公紞叅議范公祖嘗訪先公節行於臨安儒士賈寛寛達爾瑪門客也故獲待先公最宻因言曾有詩見寄可考暨紳至張公即命迎寛三月十日寛至所言與前頗同乃云化後達爾瑪已使藏於地藏寺之旁後十許日寛往哭之止見平土而不結丘壠自國兵來陵谷變遷已不可認迄今犁鋤洊臻屋廬相望想像亦不能得其彷彿也寛又云先公前館於報國寺後因托克托至遂移館於春登楊氏家平日杜門不接人事惟讀書著述有文集二大冊達爾瑪録本藏於家後併原稿不知何在寛年高質重所言似非虚妄者又杭士劉有年近見宜梁民李鈜鈜自言其父起宗為樞宻院都事好士而知書曾延先公於家甚久後事皆其經理今葬所惟鈜知之有年前任沅庠時常接見先公故聞之甚留意越半月紳至滇有年即來告且為書招鈜十一日鈜至口述遺事亦悉又舉先公題其竹軒三絶句遂導紳至於東門外之百歩指羣塚千百而言曰大畧記在此處而羣塜盡遭發掘無遺者紳見其年少不敢盡信又見頗能記憶亦不敢不信遂於其處仰天大慟次日於羣塜旁擇曠地仍設此為位迎神主陳祭祭畢復奉歸寺之元次越十日奉神主而返鳴呼哀哉紳之初志鋭欲訪求遺殖歸葬先壠以襄大事不幸嵗久事殊以至此極雖粉身碎骨亦不足以贖其辜他日尚何靣目見先公於九原者哉擗踊之餘因忍死備記於簡以志不忘終天之恨且使後世子孫有以知其荼毒嗚呼痛哉觀捕魚記貝瓊松江産魚非一取魚者或以罩或以叉或以笱或以罾巨家則斫大樹置水中為魚叢魚大小畢赴之縱横盤互人亦無敢輒捕者故萃而不去天始寒大合漁者編竹斷東西津口以防其軼乃輒樹兩涯鼓而敺之魚失其所依或駭而躍或怒而突戢戢然已在釡中矣於是駕百斛之舟沉九囊之網掩其左右遮其前後而盈車之族如針之屬脱此掛彼損鱗折尾無一縱者予觀而嘆曰魚之托於水也非無九州四海之歸也而歸於數畝之陂朽株之下以為至安無患若登龍門焉惡知誘之者將以制之養之者將以殺之人之機亦巧且深矣予又傷其盡而無遺何其不仁之甚耶嗚呼天下之死於盡取者豈獨魚已乎豈獨魚已乎故書為記舵師記林誌舟之載舵主之舵操縱疾舒得失而舟之安危繫焉故凡傭於舟者皆以力而舵師兼智力長焉其受直也恒倍或參伍其載而取之然非素諳是者非惟人之不任而亦不敢輕任於人其責葢甚重也哉嵗戊戌予奉使北還買舟以載得寜波舵師某甲予見其醉而使酒曰夫夫也詎能舵舟同載者曰子以傭役人而乃貌取之乎且其直廉又易與毋慮為也予固疑之比渡淮及湖中流而衝風作狼狽失勢者幾旁舟皆笑之曰是特其小小者耳使之乎大江則將奚為予問同載者曰嚮吾言之何如則皆愀然曰今之舵舟者皆是已此特其甚者奚暇渠之笑哉予曰然則是吾任者之過矣彼敢輕以任人何耶應者曰子以彼為工其技而利濟人與其將以舟利而冒其名者與夫利濟人者必世業於舟其捐費博其資利逺凡舟之須皆工且良故傭必擇人况於舵師乎其以身任載也毁譽不顧夷險在已視其載之輕重與其舟之輕重侔焉是或足任者矣若夫以舟利者則不然其於舟也朝僦之夕業之無湏博費不期逺利乘人之載而弋取之不得則下上而求合焉毁譽夷險汩然於中也使欲載者樂其易與且利其廉儌倖以無事往往以渉大江猶安流也而况於淮與湖哉予曰安危同勢也喜患同情也彼豈異於人者歟應者曰良師先勢而違情庸師情廹而情見故曰前車覆後車戒審如是天下惡有僨事者哉予曰嘻此名言也顧命童子濡毫記之記會稽周士翔先生遺語四絶句并序龔詡余憶十載前假館常熟南野陳氏頻年與㑹稽周士翔先生往來聨榻士翔常語余記其先翁有言當元末閩中某城遭陳友定之亂兵圍久之有城主忘其姓名固守不下城䧟被執友定謂曰汝不知有天數耶其人曰我但知為臣死忠為子死孝固不知天命為何等物也遂被害又有一人亦忘其姓氏殺父仇於既赦之後憲司執之問曰汝不知國家有赦耶答曰殺人賊國家之法有赦人子之心不赦也竟致於理嗚呼士翔當日之言歴歴在耳今士翔仙去久矣昨夜忽夢見之既覺因憶舊言為賦此以記之非惟先哲之忠且孝得以不泯抑亦足以為名教之一助云時甲戌二月七日也不知天數為何物忠孝惟求死即休只此一言才出口遂令亂賊永含羞父仇不報活何為樂府曾聞太白詞李太白瀆鹿篇人子不從天子赦片言千載有餘師宋香荔枝記林環莆中名産為異品荔枝之尤者惟陳紫宋香為絶勝其見諸譜謂陳紫種出宋氏則宋香較之陳紫又其尤也樹距作譜時已三百載迄今又不知其幾易主在宋之先主之者已非唐之舊洪武初相繼奪於戎衛之官宋子孫困於勢力不克復者凡幾年迄永樂年間始歸於宋其賢雲仍有文用者慨念先業恐嗣時厥後者不知寶而守之特徵記於余余慨然嘆曰是樹舊屬王氏黄巢之亂兵過欲斧之得王氏媪擔死與俱遂得不失後已為宋所有今宋之子孫雖奪於勢力而終克復之則宋之子孫過於王逺矣宋之子孫不知若而人獨文用惓惓心乎圖記以貽後之人他所未覩則文用賢於宋氏他子孫又逺矣然則為文用之後宜何如為心亦曰寜為王氏媪無效王氏之孫子云遂書為之記擊壤㑹記劉鴻國家覆冐海宇垂百餘年風噓日薰人物熈熈興國贑之屬邑山盤谷網風氣完固既庶且富民樂其生而多夀考廼𢎞治壬子時平嵗登公私衎衎有垂白之老踰六七而望八九者二十二人含和履祥蹈舞皇風相與謀曰遭逢清明生理麤植仰無叫呼之擾俯有伏臘之需抱子弄孫不及時為樂以詠歌堯仁以終餘年亦負矣哉於是月以二㑹㑹以朔望鱗次而周户而不醵是嵗九月甲子舉事牲肥酒香籩豆有楚乃其初筵諸老深衣大冠魚貫而進前設几格俯伏其下北面稽首焚香籲天曰願明天子萬嵗萬萬嵗宰執惟隣藩臬惟良郡有賢守邑有賢大夫用康保我民亦云休哉願雨暘時若百榖滋植公私羡餘閭閻笑語野無横民鄰有善俗俾我老人永有今日之娯亦云休哉已乃舉盞更籌就坐以齒為倫其一為胡晦菴克訓次劉潔菴雅清次吕直方興大次蕭正菴悦賛次鍾軒韶鐸次陳隠軒子顯次吕春谷仁發次蕭擴齋崇廣次李晴忠春昱次秋潭仁徹次蕭貧樂雲端次劉敬齋恭徽次胡博齋克祥次王叙菴秉倫次蕭繹齋悦華次王時菴成景次羅直菴守正次鍾成菴鑑次李復亨春雷次李省菴彦睿次蔡瑩菴彦瓛次謝梅軒旭魁坐定諸少年班立而揖有引巵酒跪而進之曰孺子不敏幸兹良㑹躬侍杖履先生長者無寜有以教我乎諸老人推其年高者詔之曰若知今日之樂耶高皇帝列聖今天子之賜也誥有之臣民之福皇錫之極汝則保極逆極者殃保極者昌吾軰老矣得為保極之民汝則念㫋景徳懐刑毋瀆於宻毋梗於鄉毋突冐於有司毋貽罹我父母汝則念㫋後之視汝者猶之今也衆皆唯唯酒行五七諸老人起而酬酢有誦淇澳以相規者有歌豳風以相樂者有咏嘆考槃之遺音者而未嘗不歸德於上也遂名其㑹曰擊壤壤不必擊而與擊壤之樂同也少酣有倡之者顧執事曰把筆來不有所作曷伸本懐又賦近體詩二首平淡古雅有太平之音章成懽甚且酌且哦既夕乃罷明文海巻三百四十一
