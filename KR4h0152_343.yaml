body:
  text: 明文海卷三百四十三餘姚黃宗羲編記十七紀事記中丞俞公孝感文徴明大中丞桐江俞公文章政業卓然名臣而有至行公之父鄒陽公仕成化間為名御史以直言謫判澧州沉浮下寮數年再起守鄖陽致仕治任且歸俄遘疾宿留數月鄖睦隔千里聞問不相及而公方以諸生𨽻學官法又不得輒去昕夕憂懸一日以事宿所親家夜聞鳴金起坐呼從者曰大人得無有異乎何為惕息不能眠也比至果然蓋鄉人在太學者傳鄖陽死矣公投地大慟絶而復蘇百方譬止不從曰吾居此以日為嵗其能安乎詰朝遂行是嵗申辰五月十有三日也及渡鄱湖瀰望皆水公私舟蟻泊莫可致詰迤邐至九江九江舟楫往來之衝官於此𣙜舟焉公遵陸問訊冀萬一邂逅也時公憂惶困瘁蓬垢無人色兩僮掖之踉蹌行道上人問得其故莫不憐之或言官舟不受榷非有故不泊公仰天竊嘆方不知所出一人前拜曰郎君何以至此視之則其家老蒼頭也問其來乃鄖陽夫人道中思鱠泊舟求魚方次湖口耳公聞言驚絶掖至舟見鄖陽方無恙也相持大慟又絶蓋自上道至此驚潰百出顚仆欲絶者屢矣既定敘所歷則公離家之辰正鄖陽解任之日而艤舟之頃即公倉皇問道之時也長江渺瀰帆檣下上日以萬數風駛水疾一逝千里使其時非以鱠故則不泊或泊焉後先差池欲邂逅一見得乎公父子相去數千里非有期集徒一念之誠而求諸去來瞬息之頃如投劵取物不爽晷刻殆有神出於其間非公孝誠純至何以臻此既而鄖陽道卒嘗藥視斂公得盡心焉不然公且抱無涯之悲而向者鄉人妄傳豈亦天有啓之耶嘗讀宋史丹稜唐伯虎者其父逰瀘南伯虎夢收父書有亟來字夜蹴其弟庚曰父得無他乎吾心動矣即日裹糧趨瀘南黎明走洪州將僦舟而江水盛怒聲搖數十里客舟布岸不動伯虎倣徨堤上得漁艇跳入叱僕夫解維抵瀘而其父果病遂迎侍以歸居數日而卒伯虎仕不顯無他政業可書獨以兹一事得列史官作史者殆有意也公之事與伯虎類而公投足於渺茫無據之地以取必於去來瞬息之頃其事視伯虎又有不偶然者顧公方向顯於時竒功雋烈將彪炳簡䇿此特其一節耳雖然君子論人必於其微觀公為是其卓絶之行已概見於平居未仕之時而况孝經云資於事父以事君蓋言中於立身終於事君未有不孝而能終者也世之人率以功名勳業相烜赫而求所謂孝悌之至通於神明者不可概見公獨以一心之惕息果於行行而言者妄莫不疑公公卒得嘗湯藥視含斂非誠而曷能是公名諫字良佐其父名藎水嬉記汪道昆新都什九山也水幾一焉逰者浮慕江湖輒病其山贏而水絀余家食且久校四時以為常暑雨祁寒視四方同矣春淫為患則南服同維時為秋萬物咸説及其杪也天地時察草木成章新都丘閭相因林莽相望天風既濟時聞于喁其燦若霞其錯若繡其隂若紺其陽若朱其流若黃其凝若紫五章大采莫不具陳且也三天子都經所謂南岷也其下源源時出為江濫觴涼風始波潦水降矣淺則膚寸深則九淵無不可以察溪毛占水族流沙積石皚皚磷磷遇風為湍遇石為瀨望之如練如璧如瀑布如長虹即而就之直中弦平中準其聲緩者中鳴玉急者中哀絃余嘗扈上林遵太液巡海嶽周遊名山大川要以巨麗閎深則誠有之矣乃若紆錯采鏡空明小人有懷不忘故土即山之贏猶以為儉即水之絀無用其奢矣五年九月余從諸弟登金竺山金竺中邑而名其下則豐樂水也是日以登臨絶勝戴星始歸虎臣以疾失期嗛甚其兄子仲實期余就里中為水嬉適風雨害遊旬有五日乃如約豐樂水趨斂浦是為中流浦以上不可舟僅編竹為泭耳主人具泭十有六蓋竒者半耦其半而四之耦差廣近方舟始足帳具於時屋其一若樓船以坐賔主羃其一若步幄以貯歌人其一若幔亭襜如也歌舞出焉其一庀行厨則宰夫事竒者以其二繼樽簋其二載簫鼓為前驅其二載諸豎子若僕夫其二介紹而傳事既余從仲嘉至徐孝廉俞山人在焉日幾中乃就筏主人誓泭者畢班前後若舟師於是鼓之以鵝鸛進居人未之前覩也聚而堵觀主人方供菊數枝焚香啜茗而已少進聚觀者躡而從豈其於此乎觀禮樂哉蓋幔亭招之耳主人出歌者為黃竹之歌歌三終觀者益集更進而就美蔭為越吟躡者蓋前不能屏主人笑曰公等亦染指耳安能饜耳目乎於是驅而退之楫並舉既泝上遊望中野羣木林林總總如濯蜀錦出西南西則金竺倒影中流如奉員嶠西北則羣山高峙如列仙擁羽蓋相迎靈山迤西如役羣龍劈積石其日秋陽不厲魚鳥依人即沿石瀨躐風湍其行不逺石梁在目觀者業已逆之水濱歌人乃廢水調作鐃歌自度不容驅馳則舍筏而登岸乃為朱鷺為君馬黃為臨高臺為將進酒觀者疑張樂洞庭之野固不知其所從來比及橋泭者淖矣主人夙已聚徒五百指疏前塗日下舂隕如萍實短墻長薄如良史槃礴所為歌人為房中則以媚觀者於斯時也任耳則廢觀縱目則奪聽即敏者不給矣日既納乃薄南臯召韓娥為緩聲為淫哇者一洗之矣幔亭出二燎懸若火齊客請樂而母連乃班泭者既乘流下歌人迭出如初頃之艤故干觀者倍昔主人修無算爵歌人亦競新聲余節飲者十年是日釂者纍百徑醉矣仲嘉謂士不得志故悲秋伯兄逺得君而邇得親蓋亦自適其適矣故及秋為樂乃今賔主相得宜盡歡故醉虎臣雅有酒過要亦骯髒者之為兹既多主人能幸而佐客歡甚虎臣適矣故獨醒時而醉時而醒其適均也客以為然併以授侍史斫冰記劉鳳嵗甲戌月之塗時乃大寒北風扶搖陵震川陸冰皚皚塞塗自洫遂以達彌望皆凝沍林木凄其色凛凛􅞝䨴飈䬍欲墮景候慘洌甚日暣霏霏薄之霒靄淡淡霨起相映發回中人愴不勝凚豫與二三子居隩室重衾自擁猶溧若露之冷析骨驚相謂頃嵗來寒未有也乃余顧躍然喜自昔之從燕中役霄雪霑浥霃霃千里積至牛目丘陵為崩陀騰涌風橫扶之怒號天地若搖兀者久不遊今復睹此恍然懷往且方少壯精強冒犯霋寒朝夜衢路騎行無蓋執䇿驅之耳不自覺今雖衰奈何都無意氣學兒女子縮朒乃強命楫欲有所之榜人諫不聽始自岸側鑿冰沖沖開不尋丈益督之前霵霵漸裂離析之聲硼􅗟磅硠落若礱斫之礫硌碎若玉礛之磊砢潾潾流澌左右蕩激舟渒然進劌劌若割層磊磽嚳觸擊其棘役者休勞之酒復行傍艤者觀者倚艫欲並出者咸怪之謂何所急厲意不避橫軼中流擉摘抶抵如期赴迫切者咸噪以助之勢揮蹸突攘蜂起波沸翼而蹙之磕磕然者已而迫午霽和澤氣稍融液所隕破解散者所蹍跐副䟹者所撑捂搌拓者則已委積涯涘粲若雪綺矣數里間闢為通道夫或捧痛而謳或呼以作氣遂抵湖上乃䇿而登四顧颾飉蕭屑逺郊若霧霾之若洶洶動雖肅厲而不爽徹孔子云天寒吐珠於澤睹若澔溔不辨語所謂天白灝灝寒凝凝者與矧石氣磢擊與􅮠􅮠相雜而受之如射沙石粟膚龜手不足言戰戰不可任語笑皆為凍咽竹樹飋飋柯葉盡零望乃不蔽湖山逺來在前豫雖意益舒二三子無復色遽欲歸夫時者不可常即嵗如此嚴亦幾何遇之景氣無論四時當其極豈不佳哉何以暄涼間也人養適過竅理皆踈顔澤不堅故不可犯霜露豫四方之人也久此悒悒豈能忘故時忽睹此遂動驅馳想彼北鄙寒絶手足皆瘃墮沉身沒命思䇿功名獨何壯與隂室以贊陽氣故無冰則書以紀異東南地氣稍偏然纍嵗冬燠則藏乃不固今幸水澤腹堅嵗其阜與玄冥者能奪其令與豫雖山澤逸安得時穰嵗登乃能無他慮又因其寒暑之暇極意所之縱覽觀焉而慨寓之矣涇野逸事記耿定向先生官南符卿時以進賀北上取道懷慶訪中丞伯齋何公公故清貞高蹈人也與先生雅厚善先生比至公館則屏騶從徒步往候焉何公家居無一應門者先生自扣其閽何公躬自出啓門相見歡甚為雞黍延欵竟日話平生各扣所新得先生曰非我所知也何公曰方以外實亦有此吾試為之以諗子何如乃起入內發笥取藥一丸如粟噙口中出夫人為供爐具於屏後公授持置堂中取黃銅一鍰置爐內自舉箑然火相視銅液則從口中取藥點之藥入忽如蟬鳴聲已用灰蓋之少頃發視果成白金矣先生異之何公曰吾以術授子以成子廉可乎公辭曰吾方受祿於朝安用此惟兄在山林可藉是朝夕耳歸以語姻友子弟側聞之喜甚因竊先生圖記作書懇何公授術何公授之子弟如其術煉藥竟不成嗣先生至南中間以語霍文敏文敏北上時特迂道訪何公求術何公大噱曰吾素以吕子木比君實為平生無妄語也乃今亦復為妄語耶紀怪耿定向閩泰寧人蕭姓者余友近溪惑之謂其術能役鬼近溪二子之亡也嘗致之令弱孫見焉此其事類唐玄宗之於貴妃矣又其術謂能為人接命近溪曾授之魏中承敬吾云其術用雄雞一剪其羽毛别用五色線繫之如鳳形致令沖舉空中頃之自空而下則口銜丹書中言人年數修短祈永年者為擇大樹一株取其人平生意所獨鍾器物一件鑿樹空納其中令其人面樹默坐七日其樹自枯死代為接命云敬吾聆之恚曰是何言與近溪瞪目搖手曰噫子不信然雷即擊汝矣此説有類晉書郭璞傳中事璞嘗為王導參軍導令作卦璞為言某日時有震厄可命駕西出數十里得一柏木截如軀長置常寢處災當可消導如其言至期果雷震柏木碎之世傳王導加災於木免災於身云今石司馬東泉苦艱嗣息曾有士紳薦一形家葉姓者金華人為司馬言安宅失宜故令艱嗣息如此如其言改作則得子息蕃衍云司馬故清貧憚改作其人即銜之乃詭言能星命司馬以諸妾年命推算宜子否其人既得此則為妖術令司馬宅中忽祟眚滿屋日鬨鬨有撫掌聲常撾人面苦不可忍但不敢撾司馬司馬撫劍擊之有血淋淋隨有紙片墜地家洶洶不得安枕各持利刃其人亦披髮仗劍為禳不得息司馬詢諸原侍術士者侍者云術士曾取一瓶今不見何在又覘其常在某廟後池邉佇立若有所為者司馬涸其池其瓶果在瓶以油紙封口其中用黃紙書妾生年月以針刺之而書符其上司馬取碎之其祟乃息而妾有挾孕者竟死焉此其事亦類郭璞傳語傳言璞客江淮時愛主人婢艷無由而得因取小豆三斗繞主人宅散之主人晨見赤衣人數千圍其家就視則滅主人患之請璞卦占璞曰婢為祟也須出其婢於東南二十里賣之愼勿爭值則此妖可除主人如其言出婢郭璞令人賤買此婢後為作符投於井中數千赤衣人皆反縛一一自投於井中主人大悅璞竟得其婢去耿子曰子不語怪此類怪事余素惡言之乃豫謂近溪志道久矣亦惑於此若石司馬故端人不為妄語者既考覽晉書亦有類是豈人間世亦有理外事耶抑晉時異教盛行正道蓁蕪故多此幻妄術耳經斯世者念哉豫兒時聞唐僧三藏往西天取經其輔僧行者猿精也一翻身便越八千里至西方如來令登渠掌上此何以故如來見心無外矣從前怪事皆人不明心故爾茍實明心千鬼百怪安能出吾心範圍哉又傳燈云有高僧在座倐有一羽衣人從空中步雲冉冉而下高僧問曰子從何方來曰來自峨眉又問曰何時發足自今晨也僧曰何遲羽衣人禮謝此何以故吾心瞬息即萬里也又一高僧説法間有一來聽法者倐見菩薩象倏見阿羅漢相倏見夜乂惡鬼相高僧任之不為異亦不動越數日其人不見其徒問之僧曰彼伎倆有限吾之不見不聞者無窮云嗚呼此言亦可深味大抵吾人苐恨不識心耳茍從不見不聞處一領會得世間千妖萬怪其如我何寄語柳塘諸丈試於此參會之也雪假山記靳學顔仲冬癸亥夜天大雨雪庭積盈尺焉越三日豫聚而為山弗就也負墻而聚之又慮弗隆隆輒撓且弗肖也乃除基批蹈其上而楨幹於外寸寸築焉其高可隱是夕寒甚厥明視之堅矣色蒼矣揮斤飲刃刻鏤具體矣然乏自然又弗真山若也乃又析為數十槎丫林立錯署而磊積之簮合輻輳不雕不削象其攸宜惟其所植妍􅑦舒怒無弗肖山者豫固山癖也而又諳於山即弗肖可但已哉遂導客以觀客又慨焉羡也曰巧乎有道哉豫於是作山記記曰揚子雲斷木為棋捖革為鞠亦皆有法以今觀之是山何需於世也三集謀而後美視焉則凡技有巨於此者可責效於率爾耶惟文也亦然鎔情於中和而質具焉故堅以澤鏤精於意匠而文敷焉故協以縟然不有質也其何以文故曰無其情男子樹蘭而不芳有其實桃李不言而成蹊故虛以搆實實以呈材材以結情情以會神神動而天隨虛中而機應緣乎天真放乎天趣任乎天姿即品有鈍銛而作無苦窳何哉其法具也吁吾於斯乎有省臘九日書示需兒大魚記仇俊卿嘉靖丁亥九月一日海中有大魚乘夜潮而來直至海岸俄而潮退魚大水淺不能逰泳偃卧沙濵其處在城外教場之北鄉民蚤作者望見之驚訝為山移至此抑屋舍漂流也近視乃知大魚傍海之人指之曰鰌長十八丈高可二丈餘皮繡青苔鬐鬛如戟腮同漆工之帚大而無鱗或者是海鰌也始而農夫以耒耜斫之咆哮作怒聲腥氣噴射人驚撲地繼而羣執器繞刺爭臠其肉有入魚腹者盈車接道人畏其異多不敢食有烹而啖之者味如牛肉脂厚熬油照夜最宜艌船之用人取其脊骨每節可以為臼舂米鼻骨長丈許崑山方諭德來海上觀乃取去作假山主峯開元遺事載南方有魚多脂照紡績則暗照燕樂則明謂之饞燈此魚猶不饞也噫吞舟之魚碭而失水蒙莊惜焉若此魚者方其在巨海洪濤鼓浪掀風將與蛟螭鬪勇上下溟渤可使晝日隂蒙自謂形逃網罟視小江河者也比其失勢於水乃與尺蚓同困跛鱉齊刳物大而不能自保昧於機可怪也使當時有推愛物之仁者護持之俟汐至而去免屬厭於饞口亦可也昔毛寶放白龜卒賴以躡之以渡江而免於難況此魚大於龜者什百是又豈蠢然者耶或曰亦有關於人治者昔紹興十四年秀州海鹽縣有巨魚羣蝦從之聲如謳歌抵岸偃沙上猶揚鬛撥剌其高齊縣門樓長百丈縣民臠肉轉鬛壓死者數十人頷骨二丈五尺京房易傳曰海數見巨魚邪人進賢人疏又嘉定十七年海壞鹽官地數十里先是有巨魚橫海岸民臠食之海患凡六年乃平即今聖哲在上固無容邪人幸進雖進應不能久於其位且逺在天下或無勞過計者切近之虞捍海塘工頽剝已甚恐風濤大作衝駕而逼將何以支吁不知此魚作何孽多隱憂哉紀聞贈袁子溥盧虞臣當毅武帝末年水村陸公居冡宰而吳人袁子溥給事陸公門下是時溥無所顯名公視之亦未嘗過庸駑也初公與嬖臣江彬有隙方彬未貴錢寧先用佞幸進薦引彬並侍中後彬益親幸與帝卧起寧獨稍疏無寵也以此數銜彬兩人遂相傾會宸濠反彬劾寧縱反者購知陸公故善寧又乘間讒公曰夫陸完昔主兵柄受寧濠金復衛兵故易為反有詔徴公下吏籍其家公母在會逮中溥適除掾中尉乃見陸公泣曰溥義不忍使公以誣受戮以是上謁掌詔獄者韓端而説之曰昔劉賊倡亂震危北郡陸公騎馳千里戮其鯨鯢有社稷之功比居冡宰未聞海內以失德譏一旦搆會青蠅乃使抱痛圜門含憤獄户誠非陽秋以功除罪之義也然上將蒙耻文臣受辱所恨從古何疑今日但念公有老母埀年八十即公被誅在律不過奴給萬一暴死獄中奈何主君有殺人母之名溥念以身請釋其母繫以保殘喘庶幾無重陸公萬世之恨如此則主君之行義高天下而人人誦説主君無窮也韓壯其言乃許頌繫陸公之母華夫人華夫人出二日竟死溥為經治衣棺下至飯含之物賔客來弔者溥主哭焉既又代陸公獄中上書言覆奏草具在案無與護衛兵也由是亦得減死謫戍而江彬亦坐罪棄市盧子曰陸公之不及於難也溥與有力焉余往年曾繫詔獄有老守卒能道江彬錢寧諸人事甚詳且曰吾常守陸公者乃從守卒問陸公遺事守卒曰當征劉六劉七時陸公為大將軍彬以逰擊見屬會彬軍失道當斬彬美鬚髯陸公偉其狀貌遂赦勿斬卒之禍幾宗社陸公亦且身不免焉方其備罹叢棘之下言官閻閬者疑獄中書有黨人代之上請下令急捕代上獄中書者陸公之困窘甚矣當江彬時權移主上貴幸無極遷賞則使餓𨽻富於季孫呼吸則令曾史化為盜跖陸公身陷大辟夫人孰敢為左右者則溥之不為利圖曉矣昔楊尹伶俜於臨賀長孺致溺於然灰余以溥事觀之何陸公所際乃有異平古人恆情之外耶且溥尉吾邑以幹敏聞今升為鎮南州司録前尉何啻十百率以罪去而得遷實自溥始是皆可書也余重有感於陸公之事以語好事者觀覽焉明文海卷三百四十三
