body:
  text: 明文海卷三百四十四餘姚黃宗羲編記十八紀事村落嫁娶圖記顧彥夫某嵗春二月豫從事京師錦衣周君出所謂村落圖示豫觀其色甚愛者請曰君必為我記之申請再三遂置巾笥以歸歸之嵗向盡矣尚未知是圖之委曲也有華生者世家江北備諳村落者也工丹青造豫豫以此圖質之曰子之知畫猶吾之知書敢問婦女而跨牛何也曰此農家所嫁女也不能具肩輿以牛代行也一蒼頭牽牛而行重其女不使自控也跨牛質矣乃復有一蒼頭持蓋以護之何也曰昏禮宜昏於昏矣農家苦燈燭之費送迎以旦晝用蓋以蔽日也亦重之也一嫗逼牛耳以行一翁牛後徐徐隨之父母送其女者也一老翁杖而立一老嫗門而望置幼兒於地肘其裳一童子稍長携其幼指而語之凡容色皆若欷歔灑泣者傷離别也牛之前四人以鼓吹從事迎而導之者也道旁二驢次第行騎之者村妓也尾其驢以掖筝琶者村妓之二僕也又其股坐於小車之傍者車人也一皆邂逅而回眄者也去其林少許將復經一林二童子踴躍以報一婦人自籬而出臂一兒又一兒牽其裳以行一老嫗抵其手招之畎畝間有二農夫既鋤且止是皆見其事而談笑者也去既逺又有林鬱然竹籬茆茨亦倣佛如女家門之外有男子衣冠而鬚罄折而立誰也曰此其壻也古者三十而娶近世惟農家或然故壯而鬚也立而俟者將導婦入門也二婦人咨諏向前妯娌輩也將勞其女子之父母且迎之也二人挈榼迎勞之需也一女僕繼之備使令也二童子參差以從其大者指而語之若曰新人近矣一老嫗門立以望察風聲以為禮之緩急者也豫聞之戲曰子真村落人也知村落之狀為真豫不飽文遂以子之言為圖為記以償我久逋之文債可乎生笑曰此所謂一莖草化丈六金月者也何不可之有時天寒語從逰者呵筆書之石犀記王允東天之生才率與氣運元精會協而成而才之生世每以周一代之用焉蓋造化之流行恆若有所待而斯人之拯屯亨否亦各自有其時非誣也若吾郡伯印江張公之治台也立石犀西江之步以障水怪而郡以獲寧亦其事也吾郡在白雲山之麓層巒擁其後長江走其前上納天台仙居兩縣之水下接巨海百里之潮灌之以諸溪束之以隴峽地故﨑嶮促狹而流復奔駛怒狂一值積雨經日則衆水畢漲然其盈甚速而其涸甚難蓋下流壅塞而海潮又乘之秋深雨多驕蛟妖蜃往往陸梁其間如隆慶戊辰之嵗滿城之民不為魚者幾矣衆恆憂之既而公以部署宿望簡自上心出守於兹蓋當災沴之後而吾民蕩析然一值纍雨江水輒溢若有所憑恃而為之者公乃即西江之步鑿石為犀一置之水澨用厭勝之衆始以為公固用神道以安衆心未之信也然自石犀既立之後江水安流即有數日之雨不復泛溢連一二年水不至城下廬舍以完田疇以穫頌聲以興而人始知公之拯亨有道以此豫聞蜀江善溢往時太守李冰者琢三石犀置之長衢而錦江灌江遂以無患至今賴之與吾台今日頗合即豫固不知其説意者六經之中固無所謂厭勝之術抑聖人殆有所不得而言不然則大禹之鎖支祁旌陽之弭妖孽又往往有可考者此又何也然則公之功固與古之聖賢神人嫓美於無窮以惠澤於台又非冰比也誠不可無記以示後世也於是改西江曰犀江而困為之記今古竒聞記沈愷鄭孟良不知其所自出在漢隱於勾漏龍門之間為交南人積高資纍致巨萬有子曰茂卿少負英氣學儒弗成去學劍又弗成乃棄去學賈一日喟然曰嗟乎男子生而志四方奚必塊坐一室如病手足耶孟良與之金千斤西逰蜀時年才茂齡未室曰兒去不得重息歸終不為汝娶茂卿前跪曰敬唯入成都見錦城妍麗即靡靡不自禁日與他少年逰他少年轉相結納節裘馬貯歌舞燕會絲絃鼎沸金泉隨手輒盡納婦曰李氏日煦煦戀好遂無意較什一取息利以故資日落謀南歸李請與俱茂卿曰父言在耳奈何時李妊且三月茂卿曰萬一生男無委溝壑足矣無以我為念李執其手泣曰妾既以身委君一惟命得若君言將百嵗是賴何敢以妾所愛後夫君所愛乃出紫玉簮為識歸至瞿塘舟薄於石俄而中溺漁者憐而出之歸見其父乃其氣索然父舉其囊訝曰稿葉若是乎蜀川其敗汝哉子無川行越一年又與金千斤東逰齊齊故饒裕又時時與豪俠鬬雞走馬獵狐兔為樂性亦慷慨樂濟人急有告急者倒囊以應無不滿意去又娶一婦曰胡氏煦煦戀好如初客久金盡謀歸謂胡曰吾欲汝俱奈父命何吾歸三年不來汝必更適然善待後人矣時胡且妊指其懷泣曰吾負汝吾負汝曰妾既辱奉君子巾櫛君死妾死此言何入吾耳行矣善自保愛乃出水犀合為别及次荆門遇盜僅以身免歸則鶉縷百結非復勾漏時鄭生矣父見而驚曰吾兒憔悴至此乎即資積山丘吾終不願汝賈也父坐是怏怏死茂卿幾不欲生曰兒不孝重傷吾父心至有今日自是斷魚肉絶腥葷絶口不道陶白事且矢不再室或勸之曰汝年茂未嗣不於此時為令圖恐日就衰暮鄭氏宗祧謂君若何茂卿喟然曰吾父以不肖之故不以天年終此身亦已多矣敢妄生他念乃作離鸞引以見志然追惟胡李别時狀及檢故所遺多記憶不忘言至泣數行下曰吾魂魄終相結也聞李在蜀日就貧茹荼履葛猶烈烈不隨時有少年者竊慕之託姑挑之曰芳蘭早凋信有時乎汝不於繁華時取妍一旦西風枯落人其謂何若不為動侮訌日至度不能免竊詣密室自經鄰嫗索之復蘇嫗慰之曰汝生方十有九年奈何輕死曰嗟乎爾謂百年永乎嬰孩白首均死爾終不為動既而生子曰繼芳惻然嘆曰百年賴此一息萬一蹉跌何以為解乃拮據匍匐日望底立及長夜燈侍膝數數道往古陳鑒戒曰題柱棄繻何人邪繼芳用是勵志烈烈輒以古人功代自期譽彰彰聞矣胡在齊雖形影相將履潔無他女子習屏飾謝華蕭然縞裳俗故好逰嵗時華美列行胡又終日闔扉坐足不越閾有王姓者豪於財聞其賢美以張氏為先容曰得果所願珠寶珍竒惟所欲顧以百金為聘張善狡自匿其金徉謂王曰胡見金色動意有所受期至彼迎胡氏不知其先所為乃唾而罵之曰人而獸邪聞者嘖嘖吐舌去居無何有子曰餘美餘美生而慧胡氏居常含熊丸鑿鑿道孤苦事且曰兒無父矣何弗自立餘美用是亦蚤夜兢兢砥名行風動齊魯間當是時漢徴賢良共七人繼芳餘美一時並與繼芳為城陽內史餘美亦佐交州一時同赴郡國城堞臺觀人物闐咽輪轂交輝草木動色母李氏見之獨忽忽不樂食飲不下咽繼芳跪問故李泣曰天下有無父兒耶李泣繼芳亦泣又請故曰汝父故交産客逰蜀耳與余不通問死生三十餘年矣子官兹土不念所從顧馳高車䇿駟馬樂耶繼芳聞言蘇蘇隕涕時夕陽西下指而拊心嘆曰不見吾父有若此日輒繪所似遍索巖谷間浹旬乃見若父至則形容枯稿髮毿毿皤矣李且信且疑令繼芳延至郡閣大張供燕列燭置膳酒半具問顚末縷縷無一事爽先是李留門屏間聽甚悉出玉簮合焉契之乃相持哭餘美同官舍母胡氏聞之亦瞿然心惻謂餘美曰汝父若交産我心更切也無乃即其人耶令餘美具問如胡皆縷縷合及出水犀合果然率又相持哭於是合兩家為一而繼芳餘美率又肫肫相砥礪勸忠繩孝引義納軌並起為漢名臣云野史氏云嗟乎今之言暌合者夫豈少也未有一朝而獲二子不出户庭而通二妻自有史册以來蓋未前聞其事甚竒茂卿始雖無良卒能悔悟而果於不娶向使茂卿歸而娶或不能有感於二婦二婦去而矢志勵節不若是其果或不能振育其二子天經人紀舉萃於家雖造物有不可曉者余益灑然異矣焦隱士易服制記王華甲午嵗余以簡命按視江南四郡某月某日筮蒞事鎮江見大江西來東門東豁灝氣吞吐與乾坤相摩軋余曰都江南形勢其在兹矣見中流二山秀蔚拱峙與江上下真若巨靈驅擘使豁江流之衝以關節中原之氣也余曰都一郡形勢其在兹矣既飭郡事某日風日爽槩命輿出定波門迤邐陸行數里循象山之崖升舟江行三里許往焦山觀焉將省江山險要與野土所宜民生腴瘁風俗美鍥而為之經紀焉詢竒茂搜靈逸而樹之風聲焉非徒以遨嬉為也時從行者有某官某官因問山之所以名則曰東漢末造焦先生光隱兹山三詔不起弗廬弗食弗衣自如也後人高之山名因姓之自宋迄我朝咸祀之余遂造祠下致廟見褒然袞冕者則所肖先生之像也余曰詫哉崇而祀之可袞冕之不可高潔沉靜付形自然先生且弗廬弗食弗衣死而袞冕被焉華質弗倫乖先生之志且天下有有德者有功者足以康濟生靈以永永建乂邦家於是乎天子以玄袞及甫榮之以為報死亦袞冕祀焉今加諸草野稿寂之人名實匪稱瀆朝廷之典乖先生之志無以勵貞行而天下之俗囂囂爾瀆朝廷之典無以敦懋勳而天下之人心泄泄爾兹不可其易以隱者服俾先生之神獲妥於兹山翛然與山雲水月相與窮焉庶山之得以夀兹名也雖然山之英爽勝概其襟帶江南凝育王氣為我國家無窮之佑吾猶不欲先生之專之也僉曰允哉人心弗同因革非常自郡守林鶚以後未餘百祀而先生冠服之制已四易矣今幸就正不可無辭以詔後遂伐山石書其顚次某月某日某郡某記牛相乳記薛應旗薛子歸耕於晉陵五木之野畜牸牛二嘉靖辛酉春莫其一産犢時時舐而乳之其一懷胎而未産逮夏閏月二十五日牧於隴上産犢者食草遇毒倐忽死犢號呼仆地仰卧顚滾尋復含死乳悲鳴不已其懷胎之牸悽慘倣徨若有不忍之狀隨去而舐其犢既牧人擁犢歸犢時時回顧其母明日乃復奔至母死所號呼顚頓農人咸異之踰旬日懷胎之牸亦産一犢乃并前犢而乳之若其子然閭巷老稚相傳而趨視者罔不感嘆云因憶韓昌黎貓相乳説司徒北平王牧人以康罰罪以平國事既畢家道乃行協氣感召致貓相乳且謂貓非性於仁義者也其感於所畜若此詩曰爾牛來思其角濈濈朱子謂牛善觸故詩人以濈濈咏之則牛之性又不貓若也今顧有此哉不知何以致之余重有感焉為之記浮山遺竈記陸深平定之山以浮名者二故稱東西浮山云東浮山在城東五十里餘即女媧氏補天之處也其煉石竈尚存山多産石灰勝他産而所産諸色石亦可燒云豫嘗荒唐補天之説今適其地睹其迹於是召其土人問之土人曰然又問之土人之耆宿耆宿曰然已又問之學士大夫士大夫又曰然豫曰何謂也時僉憲白君實之曰是遺俗焉可徵已凡吾定之人環而家者以千萬計而附州者尤密今州居之家復以百千計嵗上元之夕無論小大家家置一罏焉當户高五六尺許實以雜石附以石灰至夜煉之達旦火熖熖然光氣上屬天為之赤至於今不廢也是之謂補天豫聞之始悟而未有以發也遂過樂平與太宰白巖先生喬公談浮山及此豫以為此蓋史氏之微詞也要之實理固亦有然按媧皇之興繼太昊而誅共工是時火德中微生民甚朴想夫茹毛飲血之外日出而作爾日入而息爾固未能盡火之用也况洪荒初開林木鮮少樵薪之利漸微而附麗之機猶隱媧皇乃察物宜前民用是故制此以通昏黑之變補烹飪之宜所以開物而成務蓋曰補天之所不及爾後世所謂焚膏繼晷爝火代明亦斯義也此誠贊化育之一端聖人繼作舟車宫室之制安往而非補天也哉補助也贊也未必盡寓彌縫修綴之義固因其罅漏而補塞之讀者不以辭害可也後世方士家本列子之言以為燒丹接氣之術故神其事世遂惑焉公大以為然云此可破千古之疑豫許為作辨而未有以復也聊記於此焦義士存廟記王璜炎漢前將軍忠義關侯廟在濬縣李家道口鎮東不知建自何年代其神靈異於他廟鎮人凡有禱者應如響赴以故鎮人敬事之久之不替益隆嘉靖辛卯嵗例毁天下淫祠侯廟在焉鎮人咸恐恐然奔走號呼於祠下而罔知所處有焦義士兄弟者慨然言於衆曰母憂也我兄弟當為存之忽報有臺檄至檄云侯以名將為神實與他淫祠者不同廟其勿毁鎮人於此益神夫侯之神而高義士之義也義士懼有後虞請於大伾子曰廟幸存者寧知後日不復以為淫祠乎願一記之使永永其存可也大伾子曰存廟是矣而知廟之所以當存者乎蓋嘗讀史至白馬之役而知之矣當顔良攻劉延於白馬也侯能刺良於萬衆之中遂解白馬圍以報效曹操及其既刺顔良也又能封還曹賜拜書告辭而奔先主夫解圍者仁刺良者勇報效而後去者義不背先主者忠忠義仁勇俱著於白馬一役白馬今之滑也廟去滑僅三里許安知侯當日之刺顔良者不在此地耶又安知侯之英靈不感舊懷昔而嘗往來於此耶宜其神靈異於他所矣此其所以當存也若夫在他所者愚則以為解良涿郡平原荆州章鄉五廟義當與此並存而餘者皆當毁也蓋侯生於解良得主於涿郡起義於平原昭大勳於荆州死於章鄉而餘則不免於淫矣因附辨於此以示夫後之毁淫祠而無别者義士名世英弟世傑關中三原人父子兄弟世商於鎮行義多類此云書方嶽徐公事周復俊或問方嶽徐公樾之殲於玩江也與二忠嫓烈垂休歟將或有遺論也豫曰唯唯否否鄙人何足以知之然竊聞此地之長老大夫士言莫不以那鑑賊其猶子圖謀為後此直一家之難耳未聞其攻劫城堡殺戮居民有叛逆之迹也聲其罪而理之可矣奚必赫然興師哉徐公力不能止則當調度餱糧集於境上以贍逺近之兵職斯稱矣兵戎非其任也脫有精謀祕䇿鬱鬱於胸覽時不平義不容默則密陳當路以補戎事之闕吾言獲聽國之福也生民之休也萬一不用吾心斯盡矣非若二忠奉上之命撫諭蒙古被執之辱也脅之不從則二忠惟致死之之為當也且當是時六月興戎山川煩蒸霧露毒發帶甲荷戈之士屬死道路枕藉巖谷是天時未順也用兵之道無利深入鄉導為先沅江高山絶坂林菁隂翳道途險巇其城背山阻江一夫當關萬卒莫進而客兵之信地不分土人之鄉導莫遣是地利弗察也於時將帥未調人懷二心心持一見議論叢生雜然如蝟是人和未審也此三者皆用兵大忌也犯此三忌是兵未交而先敗矣公又不俟羣師之集無煩逰士之説孤忠獨持戴賈胡之帽披夷玀之服慨然據鞍揮刃徑進前書大字即日屠城欲何為也致使醜國逺觀咸慟曰那鑑信有罪爾一城之民奚罪焉於是衆怒莫遏矢刃交膺而公遂告亡假令公當時褐蓋緋袍建大將旗鼓而進彼酋雖驁必不敢加兵既殲之後始知軍中有徐方嶽也今雖梟張經之首剖趙完之尸亦奚益耶豫聞其言而悲之未嘗不為涕下沾纓也豫與公為同年知深信篤天日皎然其文章德行無俟贊揚而喪師隳體痛孰甚焉嗟乎秦師之敗於殽函間也非獨一孟明視之過也公獨不幸而罹閔凶殊可悼爾書張御史事周思兼張御史春真定人商𢎞載榜二甲第五人初試南宫主司欲首薦以北卷為疑既拆封知為真定人以問宰相曹公曹與張同邑張不往見但謝不知遂置第六廷對復得第一甲第三人曹又易之初授南京廣東道監察御史國朝進士釋褐為御史自張始時中官王振用事齊韶附之得南京刑部尚書倚托縱恣人莫敢言有指揮某者與徽商友善往來無間結為昆弟指揮富而無子有三女一嫁儀真民一嫁鎮江一嫁武臣指揮既卒徽商遂詭襲其官媚指揮之妻甚至妻信之遂許為嗣商既得官併欲奪其産沉指揮之妻於江既事漸彰聞指揮女在儀真者訟之刑曹齊韶受賄竟右商人而詘指揮女女徘徊都市商殺之血汚女衣以石沉之井指揮妻有侍兒為商所奪心傷故主有怨言商又殺之又一奴欲訟寃商又殺之都下無論貴賤皆痛憤然畏韶七年無敢問張初至官見婦人泣而呼寃蓋指揮女在鎮江者也都御史過之若不聞張心疑其事問之同官同官搖手諭之曰此非君所當問也張奮然曰朝廷設耳目之官何事不可問有事不敢問號稱御史不亦辱乎今日吾固當問之同官掩口笑南京京城事皆屬廣東道張遂按之白中丞中丞怒曰汝書生不諳時務躁妄如是汝登第幾日蒞官幾日遽欲預事乎韶聞之大怒曰吾不識張春何狀豈喪心病狂乞死者耶不然何以反吾獄既而窮按不已事大暴著井中血衣尚在獄詞皆張手筆韶見之大驚曰彼書生何精練至此始有懼色因求都御史勸止之都御史曰吾前叱之今日何面目與之言乃令同官言之張遂列齊韶見阻之意都御史轉托之言併同官三四人連獄詞具疏呈都御史求印都御史固不肯印月餘都御史去御史曹姓者署印強使印之乃得聞上而齊韶之疏先在矣時北京都察院都御史冦莊愍公見之曰此疏何得先上都察院本堂亦即至宜徐待之三日張疏果至下錦衣衛提問韶與張連逮至京錦衣衛金指揮者亦無子問其事悽然泣下故齊韶無所措辭時張疏言韶放縱數事其一言史事史氏初與后妃之選英廟欲立為后既而疑其姓謂朱與史婚非雅遂賞表裏還之齊韶竟納為側室張又上書王振幾千餘言首論其事王振讀至此驚曰韶他事吾尚可為此事吾豈能左右乎由是商始伏辜以殺死一家三人論而齊戍邉刑部原問官死於獄御史轉托俱為編氓惟張復官於是韶上疏申辨上怒敕再辨者斬韶怨王振不右已以為是獄皆振所為也上疏言振罪上怒竟論棄市時張一疏殺一尚書杖殺刑官數人罷三四御史直聲雖震動天下而舉朝不能安之矣歷御史俸年餘即遷山西按察使僉事時遇土木之難人不自保蓋中傷之也後英廟復辟忠國公石亨用事亨子彪以逰擊巡邉所在積聚皆沒入已謬奏北敵虜掠無遺朝廷信之張上疏論彪誣妄舉朝吐舌亨怒曰何物狂子吾將赤其族殺齊尚書非此耶此朝廷之佞臣留之何益上命給事中一人刑部侍郎一人郎官二人至所在勘驗給事中以憂死衆依違其辭以復上頗知之彪與張俱召還兩置之不問亨屢遣人刺張張不為備待命二年不授官遂棄去然公論惜之左遷鎮江府同知時宰相徐有貞亦謫鎮江與張同為石亨所擯相得歡甚有詩云雙親路隔三千里五品官縻二十年徐見之曰吾心事君已盡言之矣遂以此聯一字為一詩以相怨嘆後以憂去官起復至京復待二年不得官時商𢎞載入相矣張亦不往見竟得應天府治中俄而亨敗凡嘗論亨者皆復官賞賚增秩張遂擢順天府丞時張已疾甚未至任而卒張之孫可知與余言如此余時卧病旅邸恐久而遺忘力疾詳書之乃其世次不無抵牾以俟後之君子時嘉靖丁未冬十月明文海卷三百四十四
