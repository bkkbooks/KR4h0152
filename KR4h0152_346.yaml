body:
  text: 明文海巻三百四十六餘姚黄宗羲編記二十紀事趙氏客逰述茅坤客有趙廷瑞者雲南大理府太和縣人也字子龍别號中嶽少讀書能文章補博士弟子員數省試不第輙棄去然故嘗習青囊所歴名山水必按青囊以指畫風氣融結聚散向背之畧或驗或不驗將客逰中州且訪異人也於是囊一瓢浮家而出由貴陽入蜀久之泝江流下荆州謁武當北轉許鄧渡河洛涉漳洺以次於燕又久之無所遇所過帝王陵寢及古今將相名賢學士家墓兆必仰而眺俯而步哦吟規度驗或六七復柬逰泰山過闕里南窺鳳陽以達於金陵而高皇帝及武寜中山以下至諸侯王百戰之處稍稍徧矣已而過浙訪天台石梁及錢塘西湖之間獲從予同年侯二谷陳敬亭兩方伯逰兩方伯公夀藏並君所卜築也於是挾陳方伯贈文及侯方伯所為書以抵予時萬厯乙亥也君年六十而所當江湖間亦十有三禩矣予頗竒之前問君家君曰吾離家時兒重華僅七齡所從母與姊妹及蒼頭軰殆六七口存亡不可知稍出陳方伯所贈文讀之大較悲君之衰且老而亟為束其裝以歸者也予亦投之以詩曰近獲陳琳江上檄知君家世傍昆明丁年數巻青囊出白首一瓢滄海情萬里關山花外夢王孫芳草客中程夜依南斗看天象已卜使星馬首迎座上客互起而歌歡飲且醉並督促君君亦唯唯豈謂君别去五載矣猶棲遲東海并匿錫山道中君所遺妻已没重華壯且冠年二十一而君客逰萬里外杳不得君遺之以音也於是日夜欷歔而號不自己葬其母嫁其姊與妹請路郵於郡太守而出當是時族子姻黨及閭里間并危言沮之華哭而題之壁曰少小違親十五年思親不見日凄然從今即與家人訣不覩親顔誓不還於是族子以下共為之太息以去華復謀曰吾少不諳父貌即道逢之不識也榜其背曰萬里尋親又恐父東西南北之蹤無所從也别為繕冩里系及父年與貌數千紙所歴州郡都㑹之次輙遍為榜之宫觀街市間已而又曰聞武當之山名天下吾父好名山當或過之且聞山之神故靈於是踰漢沔而西禱之武當葢萬厯戊寅十二月二十有二日也紫霄宫道士間攜之過太子巖巖之隂有字曰嘉靖四十四年十二月二十二日雲南大理府人趙廷瑞朝山至此葢君所故嘗逰而書之者華讀之哭且慟道士謂曰若父曩逰年以十二月二十二日駐此若今過之復同月日可以卜逢若父者之兆矣於是華亦尾而書之曰萬厯六年十二月二十二日雲南大理府趙廷瑞之子重華蹤父至此由南陽頴夀東涉淮泗以泝金陵又卒無所遇謀曰今且渡江矣聞三茅峰冠江以南吾再禱之禱訖宿觀音寺夢𤣥帝鈎簾而坐華哭而前訴云云帝呼謂曰汝父猶未死如是者三覺而爽然從丹陽過毘陵前復被盜攫其貲以去所遺者獨前所請郡太守路郵耳當是時華窘甚且行且乞次横林觀音寺忽一老僧杖錫而前雙眉覆面殆浮百年者也前謂曰孺子何從來華曰吾雲南人吾父出訪中州諸名山不歸者十有七載矣吾是以萬里裹糧蹤父至此而猶未獲也不幸為盜所窘且奈何僧曰汝胷所囊者何曰路郵輙出以示僧僧笑曰汝父猶未死客無錫南禪寺中汝苐往又顧囑他道人導之老僧忽不見明日偕道人過南禪寺俄而遇君君鬚髮皤然白矣華心疑屬父而又未敢請也伏地曰吾雲南人吾雲南人君亦絶不識華貌且以為故鄉人也於是擕之同道士南嚮坐華泫然曰吾父離家逰中州故萬里蹤訪以至於此君得無即吾父已乎君笑曰吾離家已十七載所遺兒比僅七齡存亡不可知焉能到此華於是前擕君而哭并出所囊路郵以示君君讀之始驚且前問母及姊妹以下華隨一一口畫始末父子廼相擕哭而慟所與俱道人及寺中他客逰者亦相嚮助泣俄而寺逺近及城以内外諸搢紳先生明日轉相告為之過寺而刺本末共為嘖嘖太息不能已鹿門山人聞而異之次其事如左系之以言曰中嶽山人者特澹宕不收古之夷曠之士也若華者嗟父之客逰於外也不憚萬里陸則穿瘴癘冰雪之棧水則犯魚龍波濤之宫間關踣頓殆且百死卒之天矜其困假之神夢及異人者以遇嗟乎抑亦竒矣吾故哀而録之附古者蓼莪之詩庶幾乎異日者不致露零草莾也已紀剿徐海本末茅坤嘉靖丙辰徐海之擁諸倭奴而冦也一枝由海門入畧維揚東控京口一枝由淞江入掠上海一枝由定海關入略慈谿等縣衆各數千人而海自擁部下萬餘人直逼乍浦而岸岸則破諸舟悉焚之令人人各為死戰又導故窟柘林者陳東所部數千人與俱併兵攻乍浦城葢四月十九日也當是時朝廷方奪故總督而新總督胡公自提督代之甫八日問幕府麾下募卒僅三千人俱孱弱不可用故總督所徴四川湖廣山東河南諸兵俱罷去所為緩急者特容美土兵共千人及叅將宗禮所籍河朔之兵八百人耳南北諸倭酋不下數萬諜者聲言他酋分掠江淮於越諸州郡間以扼援兵而海等當窟乍浦下杭州席捲蘇湖以脇金陵氣恣甚總督胡公方召諸司畫計無何故提學阮公代胡公為提督檄未至夜半聞乍浦圍巻甲趨之胡公亦分遣兵澉浦海鹽之間為聲援而自引兵壁塘西相犄角居頃之海頗聞新總督胡公即故御史所嘗提兵督戰於鶯湖王涇之間而覆之者氣稍沮㝷罷乍浦圍聞兩公方擁兵壁近郊不復敢窺杭於是徑路峽石越皂林出烏鎭以北烏鎭者即海故所犯蘇湖舊路也當是時胡公既獲諜度蘇湖之間惟鶯湖為四戰地於是檄河朔兵自嘉興入駐勝墩陣而待因以呉江水兵遮其前湖州水兵尾其後而公自引麾下募兵及容美土兵衡擊之提督阮公自石門聞賊且出烏鎭也即道挾河朔之兵騎而馳及之於皂林令善射者且躡且射賊稍稍引去賊縱數百人嘗之輙又敗去賊怒甚鼓噪而前提督阮公勢皇急於是走輕舸入桐鄉城而叅將宗禮與禆將霍貫道等廼自張左右翼厚集其陣以待戰數合擊殺數千人㑹日暮賊且引去時賊氣頗窘而宗禮霍貫道等亦已絶嚮道不得擇善地便水草以自休止明日餓而戰賊遣候者樹而望葢孤壘以塹無他援者也大喜復縱兵以半擊其前以半繞其背而霍貫道河朔故驍將也大呼衆力戰矢砲如雨下無不人人一當十復擊殺數十百人而貫道亦手自刃十餘人賊益怖海且中砲欲馳去㑹火藥盡霍貫道面宗禮仰天呼曰吾兩人再得藥數斗可以了此賊矣未幾貫道與宗禮俱陷衆大敗賊遂乘勝圍桐鄉時總督胡公已引兵躡石門聞之澘然流涕曰河朔之兵既敗我兵皆氣奪莫敢戰東南之事無復可支矣賊已困桐鄉假令復分兵困石門以刼我我兩人譬之枹而自沉也國家且柰何於是還省城檄諸路兵為戰守計先是胡公始為提督時嘗與監督尚書趙公謀曰國家困海上之寇數年於兹矣諸酋奴乘潮出没將士所不得斥堠而戍者人言王直以威信雄海上無他罪狀苟得誘而使之或可隂擕其黨也於是遣辯士蔣洲陳可願及故嘗與王直友善者數輩入海諭直直果感悦願如約遣其養子茅海峯欵定海關謝過間以諭海海已散他島勾島人入刼故不相及而海峯者云云彼固未之聞也公策曰直與海雖順逆不同其勢固唇齒也直既悔悟海獨不可以大義説之乎不然彼貧人也誘之以利或可扭其心聞桐鄉城小而堅緩之數十日則永保戍兵至固可破之矣於是疾走人諭海峯因厚遺諜者隂過海所曰直已遣子欵定海關朝廷固且赦之矣若獨無意乎新總督威名非曩時比且仰體朝廷徳意推心置人腹若不乘此時解甲自謝他日必為虜矣海頗然其計於是亦遣酋自謝約罷圍去因以要公稍出中國貨物遺他倭酋而疏釋其罪公佯諾輙以銀牌綺幣厚遺來謝酋而隂令營中盛兵容私諜者故縱酋瞰之酋既徳公遺又内怖公之兵威也歸以報於海明日復遣他酋來謝公視之如初凡數復海於是始歸心於公願為公死之矣然陳東獨心竊疑海私公遺猶怏怏未之從也海間遣酋次桐鄉城下私語城上兵曰某已聽總督胡公約解去矣城東門故柘林賊陳東黨也鴛悍不吾從若謹備之是夕海果道石門而西且乞他兵於公以夾擊東公猶心訝未之許而東獨盛為樓櫓撞竿以撞城而桐鄉令金燕者疆幹吏也城中一切兵仗火藥諸已繕備提督阮公復躬厲矢石狥城上人令合散千金募敢死之士督戰益亟所殺傷賊亦數十人方撞竿自樓櫓中躍而撞城城壞一男子為緡索圜撞竿所擊故窟處竿至即緡挽以上斬之又募冶者煮鐵汁灌城下酋城下酋不敢逼東既無何聞海等解去道逺勢且孤亦相與稍稍引去圍始解而提督阮公出矣時五月二十三日也方阮公困桐鄉時固日夜望總督胡公援兵之至而胡亦重念東南之安危身之禍福與阮公相旦暮情固急業已遣兵備劉公督同留守王倫宣撫田九霄勒兵自嘉興入壁斗門分守汪公督同知縣張冕勒兵自湖州入壁烏鎭叅將丁瑾勒兵自海鹽入壁王家店指揮樂塤督同千户羅天與勒兵自石門入壁石門鎭又令石門令崔近思收河朔之散卒入城為聲援兵四面環賊逺者二三十里近者十餘里而陣然各以狃皂林之敗逡廵惶怖不敢逼而公業遣諜羈説賊亦日夜遲永保戍兵之至以决一戰也計無可柰何而胡公與阮公兩人者為同年故深相結也及援兵不合阮公自圍中頗急於是兩相猜而他謗者與為飛語撼兩公者盈道路矣當是時朝廷聞東南之冦即日出尚書趙公督山東河朔諸兵援之又兩公所私相猜者語頗聞於趙公趙公亦故與兩公者為肺腑交所嘗兩推轂中朝以鎭東南者念兩公卒有郤則東南之事牴牾不可圖於是日夜引兵而南至揚州則阮公業已出桐鄉圍東渡錢塘狥㑹稽諸下邑擊他賊胡公亦聞尚書趙公之至且戰且南淮陽毘陵之間無足慮獨海為巨孽間雖狃而内附中固不可測而上海之賊萬餘人由呉淞江西引方急廼日遣諜者啗海以金帛而説之東出海上擊他賊海亦果收諸倭酋出乍浦道平湖時諜報呉淞江之賊已鼓行入嘉善界欲西合海公念海萬一卒他變兩相合柰何因䇿海始已焚舟為深入今不得舟必急於是遣諜詗海謂海既得内附何不如故約勒兵擊呉淞江賊且簒奪其輜掠舟以歸海果然其計即日引諸酋逆之朱涇道上斬首若干級餘賊遂夜走以故海不及簒奪其舟而還及他酋脱而出海也公又别遣總兵俞大猷伏飛艦海上遮擊之溺且盡於是海既徳公不敢背又聞呉淞江賊之出為海兵所遮擊益内怖日輸欵於公遂輦故所戴飛魚冠及他堅甲名劍數十種並以輸公而且遣其弟洪入質於公公固佯納之公又諜聞海麾下獨書記葉麻為長酋其為人頗黠而悍近與海争一女子有微郤非用間急縛之則無以死彼之内附之心於是遣諜就海帳中諷海縛葉麻出葉麻出而諸酋中故𨽻葉麻部曲者稍稍怨且懼矣怨且懼恐生他釁則又以他罪縛縛幾百餘人公又策陳東於諸部曲中與葉麻聲相倚頃以桐鄉之役兩相睚眦者也數遣諜持簪珥璣翠遺海兩侍女令兩侍女日夜説海并縛東海既諾而陳東者薩摩王弟故帳下書記酋海固未之能也於是出葉麻囚中令其詐為書於東反兵賊殺海其書故不以遺東隂泄之於海激怒之使并縛東海讀其書涕雙下益徳公之不忍為東所賊殺之也日夜謀縛東以報公居無何尚書趙公移兵渡江來所過州縣數舉兵向賊賊輙敗走俘斬若干級兵威大布當是時公已知海之甘心於東不忍疾擊海疾擊之兩人廹而深相結則東南之事未易圖而尚書趙公之至也私約公共部署兵擊海日急且召公故所遣諜面詰之曰若為吾諭海海連兵以來罪不容死非縛陳東及斬千餘級以獻恐無以謝朝廷若能則吾黨同督府諸公疏釋之不然若且虀粉矣是時阮公亦至於是海益怖出所故掠中國貨物千餘金賂王弟詐請東代署書記海因夜得東即縛以故約復於胡公葉麻與陳東相繼縛而諸酋長汹汹内亂矣是時諸酋長既疑且怨海無鬬心故其氣日窘海亦自度縱令反故島當亦必為諸酋長所賊殺故為内附日固而公與趙公簿責海益急海既急因念欲掠舟出海恐為海上兵所刼欲列壘拒官兵又業已内附不忍背且陳東黨固日夜襲殺之也公䇿曰彼既亂吾可乘之矣因遣諜私海曰吾固欲寛若趙尚書爺以若罪孽大何不聽吾艤數十艘海上若且誘之逐海上艘令俘斬千餘級以謝趙公而若因得以自完乎海不得已且疑且諾因約兵備副司劉公引兵伏乍浦城中而某日時某當引衆出海岸去乍浦城半里而陣佯令衆酋逐海上艘某手旗麾之城中官兵即舉燧為號從城中出亟擊勿失諸官兵卒如故約乘之諸倭酋逐海上艘如蟻不及還兵鬬於是諸官兵得乘勢蹂而前不傷一卒所俘斬數十百人没海者無算於是海自以數有功於朝廷願與部下諸酋長入欵具庭謁胡公與尚書趙公提督阮公及廵按趙公並許之諜往復期以八月初二日然海猶恐隂設甲士刼之先期一日卒擁酋數百人胄而陣平湖城外自帥酋長百餘人胄而入平湖城中求欵四公者計不許恐他變遂許之海與諸酋長北嚮面四公按次稽首呼天星爺死罪死罪海欲再為欵胡公而未之識因顧諜諜目示之海復面胡公稽首呼天星爺死罪死罪胡公亦下堂手摩海頂謂之曰若苦東南久矣今既内附朝廷且赦若愼勿再為孽海復稽首呼天星爺死罪死罪於是四公厚犒遺之而出是日城中人無不洒然色變者海既出諸公者固已忿恚海之列欵獨胄而入屬彊脇無禮又不及如諜故所期月日而先日卒至也其習行黠若此於是闔謀不勒兵誅之他日必為患計部下尚千餘人猛鷙難即破永保兵猶迤邐逺道未至也於是佯令海自擇便地居之海果自擇便地得沈家庄即僦沈家庄與居之是為八月八日當是時衆復諠然譁諸公輩何不撲滅海不然且縱之出海上令自解去顧豢虎以自禍也不知諸公者固有待於是胡公與尚書趙公提督阮公私自部署兵又日夜遣使趣永保兵來㑹兵未集恐海驚禍且肘腋間胡公日遣諜言海且啗海如曩時因謀以請於趙公曰吾聞善兵者乖其所止海與陳東黨業已深相仇今合而兩附者廹故耳聞沈家庄故東西兩處而中綰河為塹何不説海以西沈家庄居陳東黨而自擇東沈家庄以居部下酋乎諜以諭海海果如其言頃之永保兵至㑹海輸二百金於公市酒米公復與趙公謀以藥毒其中而歸之又令陳東詐為書夜遺其黨曰海已約官兵夾剿汝軰矣陳東黨果疑而夜伏邏卒東沈家庄道上瞰之適海惶急因令酋竊兩侍女出道上而急則因間道走幕府以自托邏卒瞰知之歸以報於陳東黨陳東黨聞之大驚即勒兵簒兩侍女過海所罵曰吾死若俱死耳遂私相矟而鬬海中矟衆大亂明日官兵四靣合牆立而進保靖兵先嘗之稍卻河朔兵乘之又却俄而胡公擐甲厲聲叱永保兵左右列大呼而入瞰壘下擊㑹風烈公麾衆束千餘炬人各持炬縱火焚之海窘甚遂沉河死甫食頃人人鷙而攫千餘酋蒐斬殆盡矣中所故飲毒首虜黑色者凡三百餘人於是永保兵俘兩侍女而前問海何在兩侍女者王姓一名翠翹一名緑妹故歌妓也兩侍泣而指海所自沉河處永保兵遂蹈河斬海級以歸江上丈人曰海以一緇衣起島上五年之間百戰百勝朝廷遍徴海内諸名將與之蹀血呉越諸州郡間未聞有俘其偏卒者方其擁兵數萬人分五道入湛舟以戰示無復還意當是時其氣飄忽奮迅固已欲吞江南而下咽矣何其猛也已而困於胡公區區之餌卒之糾纒狼狽以自翦而死若刲羊豕然豈非所謂人固屈於慾也乎善哉友人唐司諫嘗曰始賊盛兵圍桐鄉時假令胡公持􅔵􅔵不量彼已而鼔兵以戰一蹶而僨東南事去矣今且堅忍舒徐以收之兵法曰利而誘之亂而取之若胡公者可謂合兵變者也雖然公開襟多自喜嘗欲倣諸葛武侯縱孟獲故事且生縛海獻之天子䟽請海與王直兩人者為戈媒於海上而因以纓繫海上酋嗟乎公之心固雄虎檻而逸亦危矣幸而趙公與公沉謀捥公手曰不殺海吾兩人無以仗劍報天子公意遂决不然彼讒口之所以交吻於公者豈其小哉明文海巻三百四十六
