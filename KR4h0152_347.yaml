body:
  text: 明文海巻三百四十七餘姚黄宗羲編記二十一紀事魚異記張瀚數年來吾郡人多畜魚盂中其種鯽也大抵多赤俗呼為火魚其間有若鶴頂破玉紅頰白喙朱鬛素尾陽背隂腹稱名不一皆號為竒品尤加意焉水伺其清渾食喂以鮮好時時察其饑飫審其凉燠盈寸以上便可盛以金玉登諸几案客至出相夸視以為娯甚者一頭千錢不獨里閈少年好事為之縉紳士亦往往而有吾宗問渠兄母陳畜魚二十餘玩弄既久母殁哀毁不忍視三月皆變為白聞者争往觀之訝其異也比及去䘮又皆變為赤異復異矣相訝滋甚余謂魚善變物若火魚變尤多方其始生黧然不異諸魚畜者羅小頳蟲飼之於是漸紅稍長變為白為淺紅或紅白相半或白勝於紅或紅勝於白無慮數十變始定稱名然人於萃盎緑藻中自朝至夕以觀其變變者自變而人不知其變也不知其變而徐而察之若有稍變焉者則相與訝之且以為班駁不齊若是今一變皆白再變皆赤白豈有棘人素冠之意乎赤豈有孤子純采之感乎無知若靈人動物合豈所養之食固異抑所變之色偶同卧氷冬躍聞樂出聴中孚能及豚魚理固有之余兄率祖宗義方孝友之言無間誠感於魚志一動氣不可謂偶相值也余既以一時俗尚為異重以所聞吾宗事尤異也是為記云紀龍溪先生終事查鐸先生革於萬厯十一年六月初七日未時非吐故納新得養生訣者日與其徒講聖賢事不輟先生亦自不以委形委蜕介於懐然先生無大疾痛未嘗一日不衣冠不飲食不逰坐革前四五日微疾食粥不餌飯革之日晨盥櫛冠唐巾食粥從容出寢室端坐於琴堂之卧榻而逝先初六日趙麟陽公詣舍問疾先生曰吾今欲化矣無多言麟陽公尚以能生語慰之先生嘆曰人好生而畏死畏死之心勝吾直以為其生也枉爾謂我畏死乎我無畏也但此回與爾永訣不妨再留坐話耳前二三日忽出家堂與嗣子應吉曰汝有事但説毋謂我能食望我乆存我心了了已無罣礙無恐怖此便與吾儒知生知死道理無二即今可去我即去矣聞之吾宛施生道來視先生先生病且革當坦然未物化時嗣子書其名於先生之手先生相視首肯且拱手致意者再葢平時嘗謂我一生精力在講學而尤屬望於寜國者深也徃嵗丁丑先生來水西嘗謂予曰我每乘月夜起坐自試問心人世中有許多玩好珍美妻子僮僕可割捨而去否但亦無甚眷戀可以逝即長逝矣今觀臨革之際先生氣息奄奄心神了了如此自非能超脱死生者孰能與於斯夫子謂朝聞道夕死可矣惟先生云云故記之瞿冏卿元立逸事嚴澂公諱汝稷字元立瞿文懿公長子元配李夫人出李夫人娠公時善病誤服庸醫藥幾墮及娩身公徧體作青色公王母見之曰先生有兩兄俱寜馨且亡矣此何望焉及舉公又善病藥餌不絶數齡外忽患足疔勢危矣公目中若見羣仙降授以良方公手書呈文懿文懿亟治藥塗之立抜出疔長寸許文懿持疔手焚於爐觸其氣背即發腫隠若疔狀急用餘藥塗之遂愈是後公每若覯羣仙者久之病良已仙跡亦隠弗見公自㓜讀書輙過目成誦以病故不習愽士藝其用任子入成均纔十餘嵗耳大司成姜公寶試以賦援筆立就詞格璀璨端雅宻若製錦姜公大為賞異公孝行純篤即問安小節一一無缺而愉婉之色可掬文懿間嘗不安公慮其袵席弗愼也者而難於言第長跪而泣文懿笑曰兒慮我深我知之矣公於是怡然起夜輙伴文懿寢相與商確古今以消永夜文懿亦為之忘倦迨文懿殁毁瘠逾制蔬糲三年足不入私室未幾而家難作矣難之作也厄公者一時貴人阿附在彼則傾陷在此公㷀㷀孤弱守死不易貴人之門生屬吏仕兹土而望風者若而人貴人之族戚故舊效計承志者若而人貴人之門脅肩謟笑雞鳴狗盗者若而人陷害百端多出意外甚至一時是非淆亂且目公為狂為惑為病而公幾無立錐矣當是時文懿之首取士據膴位若某者而右貴人督學使冥狠若謝某者而右貴人公之舅氏若志齋李茂才者而右貴人至持挺突入公室遽欲格殺公藉救免一日者貴人之族計誘公夜行欲殺諸途賴予同行而免一日者貴人之族從牆上下巨石壓公幸不中而免如此者不可枚舉然舍趨附軰亦有持議者若王元美趙汝師陳錫𤣥邵畊夫李伯樗蔡無辱及予數軰知公而交道不替時為翼䕶其時公作松聲賦以自寓作美人賦以寓諸君子詞與日月争光視貴人不啻醯雞蠛蠓即貴人亦氣懾公莫奪也嗟乎公之難由通問無别脱難作時公度勢不敵貴人飲婦一杯鴆酒而後患杜矣然公不為公以為聖有訓國有制循之而無過不及焉而心始愜坐是毒厯諸艱徼天幸僅僅身免衆人嗤其迂械士笑其拙君子諒其𠂻而末世君子道鮮難乎其為公矣公之勵行抗節自是天植而志欲為純儒居恒以程伯子為模範厯難後益䆒心性命曰吾取吾愼吾何擇於教於是徧探六經百氏暨竺墳𤣥典仰思俯索晝夜不休忽一日大暢曰道一而已語上而不遺下者其禪宗乎於是手輯宗書不輟二十年如一日有指月録行世公之仕也所至廉能稱輙冠一時人曰公之政予曰公之學葢至是而喫飰從肚裏過眞不愧程伯子矣公世系經術宦蹟著在家乘炳在國史予弗論論其逸事王主簿子記陸垹蘇常熟有主簿王姓兗之曹縣人至官甫越月㑹御史行部按常熟以事怒長吏則主簿入謁貌頗類老御史心賤之乃遷怒捶主簿主簿子侍父於官聞之大呼躍入門者止之主簿子愈益大呼御史怒令捽入主簿子見其父伏地被撻遽抱持起抑之不跪固立持御史大怒令疾擊數十百梃交下主簿子大呼不止曰寃乎我父何辜受刑我父何辜受刑又曰吾家雖貧兒為人推車計日得錢猶足給父饘粥而今若是御史亦異之曰若敢大言耶吾今即令若父回主簿子應聲曰諾於是主簿子業已被重掠血淋漓至踝手足皆攣猶匍匐起負其父以出則又以首觸地號泣請曰大人㓜讀書志世用初非望為主簿也然而不遇矣乃更日暮奔走微禄豈以兒不肖不能備養故耶今事若此命也願大人深思無終自苦遭辱主簿意不决則以手扣心曰嗟乎孰使予至此因泣數行下良久曰兒言是也微兒吾幾不能有面目翊日持狀抵御史不待報而行惟故空囊敝裘毿如有憐而與之金者謝弗受主簿子名字今逸予聞其事於南京刑部員外郎鄒君鄒君常熟人也言主簿亦質行士其兄糓城先生守兗葢識之云嗚呼難哉方主簿子不忍父捶大呼躍入此誠天性觸發視御史尊嚴其衛列之盛直無覩耳然遂能慷慨激烈婉曲以成其父之高不使其甘心下吏茍朝夕之禄而受上官擊辱回視流俗反資親仕為養䧟之不義者逺矣顧不得為孝子之倫哉語稱匹夫不可奪志若主簿子耿介絶俗斯亦雅操之難詘足以立身揚名顯其父母者歟蘄水朱康侯行義記湯顯祖天下有意義之事非庸庶人所得與也何也庸庶人不足以受此名不足以食此報葢必存乎其人雖然以為名而張之報而収之則亦庸庶人之事非有人其中也人之大致惟俠與儒而人生大患莫急於有生而無食尤莫急於有士才而䝉世難庸庶人視之曰此皆無與吾事也天下皆若人之見則人盡可以餓死而我獨飽天下才士皆可辱可殺而我獨頑然以生推類以盡天下寜復有兄弟宗黨朋友相拯絶寄妻子之事耶此俠者之所不欲聞而亦非儒者之所欲見也以予所聞亡友河内太守蘄朱子得之弟康侯有足記者其從兄子貞破千金之産豪浪結客産盡去而為漁大澤中不得魚殊泣自傷康侯曰如此天下聞之必以俠為悔嵗與之田百斛曰吾非為子貞八口者也初子得病且劇自度不可起割田其宗人為公私費康侯益為廣之得四百斛曰先嶽伯太守之遺也施予必稱父兄可謂儒者其最著在急難友人姜䕫一事䕫黄岡諸生與王子聲一鳴康侯等為十二友子聲嘗為我語䕫於長安以為才坐逰大吏貴人所口語捕逮急對子聲已前死莫為言䕫跳身亡去北至代所在十年矣獨其母夫人與婦居丁零訟係至求死不可得康侯常居間存活之又時時上書理䕫後稍有哀䕫者得白䕫乃出曰我不可復為郡縣諸生矣取貲所逰而逰太學以交於賢豪長者公卿間豁吾意康侯曰子行而嫂饑柰何吾有田數十畝近齊昌嵗可粟六百斛他豪枲物稱是以給嫂幸無内顧憂䕫曰可矣起别去擇日治文書行此所為康侯之義也或曰異日䕫必有以報康侯非也康侯何以必知異日耶或又曰康侯拓落自喜一時聞人如郭美命瞿睿夫焦弱侯皆艷之記以傳康侯亦有名之意耶予觀康侯非為名者天下有力不能致而心喜之口道之喜極而致固人情也如予於康侯未有聞也而獨聞之偶愚偶愚曰非惟如是而已康侯固留意内學者文字之外别有所窺若此者亦非予所知也獨怪江楚之間不少學者江多儒俠而楚多挾儒以所聞見其於兄弟宗黨朋友之急好以其身與焉而不出於庸人庶人之見者亦幾何人也彼誠無所窺者耶康侯祖江居黄能世其家學必有出文字之外者姑記其行義以風云龍江沈先生泰交始末記髙攀龍今上在東朝時先生以贊善侍講讀壬申四月十日講讀畢上出檀扇二命先生與編修張帙各書詩句張書唐人早朝詩先生書魏卞蘭太子頌既呈有㫖命解説大義先生倉卒敷陳大發頌中親賢逺奸窮經致用之要上改容拱聽命書講章以進明年登極後先生毎在講筵上見先生舉止與他講官不同退輙與侍璫言某事某事沈講官行的是先生輪對日亦輙與侍璫言沈講官講的好先生以外艱歸又接内艱上時問沈講官何久不見内侍以居艱告久之又問内侍云服未闋上曰令先補沈講官官待其服闋即來先生服闋於講筵見上上甚喜曰沈講官還是舊日模様江陵秉政久以先生志誠無他齮齕及江陵病舉朝官為禱祀先生獨不與㑹江陵故先生得不被禍及先生晉宗伯有某縣産麒麟旋斃上聞欲觀之政府曰此禮部事欲先生行文至彼省先生曰此端不可開果爾天下言祥瑞者紛紛矣執奏不可上曰此小事沈尚書看得大了還要取看先生仍執奏云麒麟已斃腐穢不祥之物臣不敢進至尊上乃止先生掌禮每事與呉縣相枘鑿相左呉縣又忌先生得上眷急欲去之乗先生請告遂票㫖放歸上見即曰沈尚書是好官何處得這人來替他温㫖留用呉縣益忌給事陳與郊承其意疏詆先生先生求去益力上曰沈尚書不曉我意苦苦要去時有老宫人名銀杏者聞上言令其姪一小内監宻告先生先生正色曰此宫禁語若柰何輕洩内監恚而去司禮張誠亦知之令先生同鄉廖太監以告先生先生曰此等語張公公不宜語若若不宜語我廖監恚曰佳信報公公乃為此語耶先生曰翰林官入内閣乃其本分事須要以正進譬如人家女子其嫁夫乃本分事忽有人語之曰某人悦汝要聘汝其女子喜而延接之者必滛女子也即黙而不言者其心喜之矣必罵而斥之者為正何以異於是廖去先生又對中書高務實述之曰昨以此語廖廖必不語司禮幸為我直致之張誠聞之恚甚而先生亦竟歸後推閣臣吏部首列先生名上見即欣然首㸃四明無能過也然四明為呉縣太倉的傳衣鉢素忌先生又素知上眷先生大懼即貽書淮中丞李修吾曰歸徳公來必奪吾位將何以備之此明知先生難進易退欲中丞傳此語於先生先生必趦趄不前也中丞乃力言先生忠實無他腸勸其同心輔政於是四明大憾中丞先生與山隂同召而山隂乃四明腹心隨事媒孽先生先生初入閣即以沿途所見鑛税之害為上陳之越數日山隂語先生曰鑛税吾兩人宜再上先生曰告君有體有幾數日而兩疏無乃非體非幾乎山隂曰敝邑人口語不好便以伴食相加先生不上某當上先生不得已乃復上疏上頗不悦曰我正向他他却不向我四明山隂聞之大喜中計久之先生乃謂四明山隂曰鑛税疏此時宜上矣四明曰雖上恐亦不看先生曰第具疏進當以時一日大雨如注先生謂兩臣曰今日乃是上疏之時兩臣曰何謂先生曰今日大雨吾輩宜素服躬到文華殿上之上必動心兩臣不得已同先生往内臣驚問故先生曰有要事苐對上言三閣臣皆素服冐雨在文華殿進疏上見疏果曰必有急事啟閲知為鑛税亦頗頷之不怒也長至日四明被論注籍先生與山隂詣宫門外叩首上賜飯小閣中命陳矩陪席先生見小内史往來竊聽無何又見持紙筆竊記者知是上意心念曰此時語勝奏多矣乃謂陳矩曰某一路來見鑛税害百姓所不忍見再三疏請皇上未見允行陳矩蹙額曰誠然先生曰若説害百姓還是第二義矩曰百姓受害何謂第二義先生曰皇上受虧多了矩曰何謂也先生曰如今人家也要風水興旺今國家把名山大川都鑿破靈氣發洩盡了將來聖躬豈不受虧矩曰此利害眞不小時山隂一語不發飯畢各謝恩而出陳矩復命上曰兩閣老有何語陳矩備述先生言上曰這話説得是關係我身上的你去與沈先生説有甚培補法子替我補一補先生曰名山大川靈氣發洩如何補得但急停了鑛安静久了靈氣自復便是培補的法子矩以復上㸃頭四明聞之恐先生獨收其功急令李九我代草一疏上之上怒又止久之始有停鑛分税之㫖上有乳母號翼聖夫人者其夫為都督同知非世襲官且姪不祔姑亦無姪襲之理票㫖兵部查例兵部覆無此例上謂夫人曰這個人情他們内閣不肯我也難做遂止又有眞人張國祥自言皇孫誕生有祝禱功乞三代誥命且乞世襲詹事府主簿上亦傳㫖内閣准他先生具揭言皇孫誕生自是祖宗與皇上深仁厚澤結於天心故天降休美一道流何功之有皇上若念其祝禱微勤止可金帛酬賞國家名器豈宜濫與上曰也罷止賞二十兩幾表裏雲南税監揚榮為諸武弁所殺上震怒立命緹騎逮諸武臣先生即具揭首言祖宗取雲南艱難及其地方反側難定次開楊榮罪惡諸欵次言榮今被殺雖非國家法紀亦見聖徳入人之深其地不忍謀叛但殺首惡以一兩人正法即定矣若不速下處分漫遣官逮是速其反也上見揭怒解即罷遣逮沈四明以妖書謀危先生者百方幸上見素定屹不為動先生在閣以一木屏書天啟聖聰撥亂反治一望謹天戒二望恤民窮三望開言路四望發章奏五望補部院大僚六望補中外庶官七望起用廢棄八望照例考選九望釋放寃獄十望撤回税監每晨列屏焚香祝天四明即買内監讚先生咒詛上一日忽遣人取冩的不是他口裏咒的已又令讚先生穿大紅蠎衣潜往邉上看牆上令陳矩訪問矩明其誣而止嗟乎皇上天聰天明使無申王沈朱亂之早用先生當何如哉夫天未欲平治天下也明文海巻三百四十七
