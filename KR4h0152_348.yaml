body:
  text: 明文海卷三百四十八餘姚黃宗羲編記二十二紀事異豬記張仲華張子虞侯將之雲陽之邑見御史大夫見繡衣直指聲華亭項侯之善政為百萬黎借冦君道經吳之滸墅艤筏關西有孺子行逰河梁歌而過張子曰彼其之子有豕若牛欲報之德瘞衾與禱張子訝問故孺子不能對有丈人傴僂而告張子曰是河以南有王姓者業市廛嘗畜豬於家一日走出町疃銜金一鏹歸授主人主人盛驚喜又銜主人衣引至其處喙掘地得金若干緡主人因是遄富致土木潤厥屋而高廣其礎至於今操竒贏經營子母家殷殷肥深德豬也欲渥馭之盛以夏廡茹以鑿梁藉以細薪疾病則宰卷婁而禱務延其天年殆一紀有餘於此矣肢體曼胡重十數百鈞主人蚤以治棺槨襯具都人士稔知顛末爰天下里歈豎子習歌之已爾野人之音何足煩大雅之聽張子耳其言滋怪甚請以目覩時偕張子而來者有友五人焉郁子成叔陸子君從陶子伯昌王子仁仲董子仲明連袂前趨訪所稱畜豬者家巡河之南北折而巷果有王姓者踵其門則主人念觀豬者日駢闐而不勝應也乃屋豬中門之外聽人縱觀弗迓御交口末從知主人名張子親睹豬之異也已不任俯仰特以側卧命侍兒䇿起之則劃然長鳴矍然怒步兩牙夾唇四股垂地高擬於黃犢而肉倍之訊所繇於鄰父與丈人言若合符劵張子因感愴太息曰豬於六畜最蠢而此事實最異且一事也具二美焉夫豬所食糟餕耳乃知竭心報主忠也得財不私亷也世人享萬鍾割茅土猶不皭勵清白人弗豬若哉王德豬之財豢老其齒兼恤其後世有荆棘甫平誅夷輒逮兔死狗烹者於王何如畜良於組圭市井賢於輦纛是不可鏡哉嗟嗟吾尚有以敕豬而規王也豬以身事人當作鼎中臠爾今且食人食葬人葬何甚幸耶異時毋襲烏將軍故事一遇郭相國恐腕落於鹿臘也財視其所守是故管寧鋤地捐金艷稱宇內即吳之先賢被裘公甘負薪苦作不拾路遺於季子矣滸墅去延陵咫尺王不聞古人風乎乃晏然寶此靉靆非必天倪如介何諸子抵掌曰張子不言言必可諷張子歸姑蘇見百穀王子張子以諸子之言告王子王子曰彘有靈人有義虞侯之言有脊盍命墨卿用補稗官張子唯唯返於篷艫之間扣舷作異豬記他日華亭侯徴是記覽之哂曰莊書王種寓言十九巵哉記也事微而寓洪張子進言曰君侯之政成矣民安之士頌之矣今而後惟無倦乎臣願君侯之牧黎也嘗似吳人之牧豕也惟恐其傷之也不飢不寒不天札養生送死不憾也將使蝗出境虎渡河鳯集屋記在太史一豕之異何足以存竹帛書盜殺周皇親事徐學謨周皇親世臣孝肅皇后家慶雲侯夀之裔孫也以疏屬食皇親指揮俸居東城小巷晚年喪妻婢荷花與同卧起家無餘指蒼頭王奎輩屏守户外隆慶六年九月十一日晡時世臣擕荷花出視扃鍵盜數人斬關入世臣不及避手格盜盜一人仆衆盜怒共攻世臣一盜戳其脅不死又一盜剚其胸洞內死荷花蛇伏不敢仰視盜發世臣篋掠百五十金去盜去荷花始起檢地下有遺金少許拾置之懷急奔王奎所告變方是時京師戒嚴兵部檄指揮張國維邏而盜猝發於皇親家國維恐得罪乃馳詣世臣家索盜無所得盜則轉馳王奎所見荷花向王奎手懷金而啼而屠人盧錦者適坐王奎家責肉價而邏者至因走匿牀下張國維摉牀下得盧錦又知其為屠人也遂執荷花與王奎稔姦而藉屠人刃謀殺其主人訊之誣服而周氏之宗老某亦聞盜來見荷花等就縛漫罵之曰主人何負汝乃反耶當斬汝萬段矣張國維聞宗老言益自喜得真盜即托詞上兵部轉奏之詔下刑部鞫擬荷花等始極口稱寃而問官就按之頗亡左驗然心持兩端復請於署部事左侍郎翁公大立願移他署會讞翁已心忿荷花等所為而又業主先入恨不速磔之也顧難問官之請不得已判他署約勘之已他署約勘仍猶豫不敢書獄翁趣之甚諸郎揣堂官意堅爭之無益尋奏當成荷花王奎盧錦俱棄市一市人盡稱快而諸盜亦雜稠人中相與竊笑其事幸終無泄矣而流劫愈益無忌嵗所流劫金銀珠寶玉帛之屬不可勝算日鮮衣怒馬酣飲屠肆間其後三年盜有朱國臣者故宰夫也家蓄瞽妓兩人教之彈詞日沿街鬻唱博金錢夜歸則置酒奉國臣歡國臣被酒輒時笞罵兩瞽妓兩瞽妓已不能堪乃謀泄其殺世臣及流劫富人家諸隂事事泄而邏者竟偵得之以密告兵部兵部即遣人收朱國臣與其夥劉伍劉汝成等七人於京師閧傳荷花王奎等之寃其語頗聞之內庭而刑科諸給事中亦論奏劾往時刑部失刑之罪上意為之惻然兵部械朱國臣等赴刑部對簿朱國臣等無一言苐頓首曰死晚矣逮細訊之朱國臣曰吾往以宰夫留世臣家治庖業知其藏金處又其家無備易乘也故引領諸盜劫其金初無意殺之比入門而世臣從燎下稍目屬國臣國臣度機露恐不免而諸盜遂攻世臣殺之以滅口戳其脅者劉伍也剚其胸者劉汝成也而劉伍明年生女脅下有肉痂類創口國臣以為周皇親復生索命矣奈何今日之敗誠非人力也為吾屬死者死矣吾屬不死何待願就斧鑕郎中以其語具獄獄成將奏之而部尚書嚴公顧謂兩侍郎曰盜已得情無絲髮疑矣今之得者往之失也失得相形傷體實多獨不為故侍郎地耶乃詣政府議所以處問官者政府曰刑有故入有失入前殺荷花等第失耳非有故也坐本條足矣所不可逭者其始事者乎蓋指張國維也嚴尚書退而如指論奏乃內庭意以事關戚畹終不能釋然政府不得已擬旨削翁侍郎籍三郎中調外張國維謫戍竟從輕譴云而朱國臣等旋梟斬於市余按荷花等之死去朱國臣事敗僅兩年耳嘉靖間死囚非觸犯乘輿者常數十年不決藉令荷花等遲二年不決即無死矣是其死不死於寃而死於速也漢人稱刑書為爰書爰者緩也取議獄緩死之義也或曰不留獄之指謂何夫亦用之以明慎也不明不慎而又不緩死今海內如荷花等之死豈少哉苐非輦轂下則匿不以聞耳而甚者或戕民之命以遂非文過此又無天道之極者也因書盜殺周皇親事始末如左明文海卷三百四十八
