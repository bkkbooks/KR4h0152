body:
  text: 明文海卷三百五十餘姚黃宗羲編記二十四紀事冰山記異錢允治萬厯戊寅十二月十九日夜澱山湖金宅港口居民張錫夜半忽聞聲響異常初聞尚逺傾聽漸近密偵之見湖中大光燭天聲從火邊出其火移動愈近張恐延燒其居夫婦二人攝衣向空叩首祈哀火遂移東北而去時東方漸明矣詰旦聚衆視之則湖干湧出三冰山一山主峰髙二丈餘二小峰差短有若太湖石者有若武康石者有若景川石者岩巒洞壑雕刻如神一山盡處則為一嶺襟帶之伏而又起峙為鼎足其峰石之下各有石盤相接之處又如今人家假山用糯米粘帖之迹而大山中間矗一石版其濶大餘平可鋪席似有人在其上燕飲者時方寒沍水合冰堅湖中之冰截平不動不知是何處移來觀者數萬人淑女紀何偉然天啓皇帝登極下詔選人間淑女充椒掖詔止鳳陽曽未及於江南風聞所遞訛言輒布三吳有女之家咸栗如霜色市井亡賴乘機搖鼓為詐姻地俄而曰某家皇封封矣某家聞之郡邑矣自潤州而金昌而苕霅無不思所以畢婚嫁者吾杭為甚才聞井里忽徹鄉曲父母之命媒妁之言一時僉舉不特及時破瓜作緣成偶即髮未覆額口尚乳氣者亦指童子為盟或議歸或議贅冰人竭蹶應千門之命市上盡作定婚店矣朝議暮舉不待決擇惟恐無當人意無知者固明珠暗投即知者亦以乘機可省粧資因人唯諾至媸若無鹽者假為遷就猶可免其皮相者耳是以寒素之家多受焉吉不必星期照之日采軒不必魚飾巾之絳裙筐篚填街香奩委路僕夫翻地燈火燭雲金鼓聲喧飛鳥為亂一畢所事如釋重負如排大難相為委詫而後即安正不顧青鳥翡翠之婉孌也婚牘紅箋錢昻五百和合神馬價勒三銖物情騰踊販夫驕色雞不得談於窗鵝不得陳於水魚不得樂于國豕不得化為石牛羊不得日夕下山橘柚楂梨貴于交梨火棗蔥韭薤蒜珍于江芷杜蘅花燭燕喜十家而九庖人儼然上客禮屈之不至至亦青鳥之即返也有恐人知者暗為迎送復恐人不知且揚言吾女已有夫矣縱有司嚴為告戒且曰是寬我故留以答天使者也假合錯配何異流離命富貴者得佳人并得金珠璧馬無算命貧賤者徒多一醜婦人纍馬醫騶導之子全徼龍翔鳳翥之靈蘭臯蕙畝之香半落傭保伹儈之手不顧牛驥同皂何有氷玉齊稱王謝家風朱陳夙好俱毋論又安所謂雜佩贈之琴瑟友之耶匝月之間繫鴛鴦之足者不知費仙人幾許赤繩也夫以一言之訛令人間忽闢一夫婦世界童男姹女破性裂道可勝道哉吾聞之不願生男願生女戚畹之寵昔人所希即修儀貴嬪婕妤之輩無甚大不可為之事何以甘委珠玉於草莽若曰不足當典選則存之便而况陶癭宿瘤猶得見幸乎感而紀此明文海卷三百五十
