body:
  text: 明文海卷三百五十二餘姚黃宗羲編記二十六記事十月十九日記事郭造卿戚令公班事自建昌營至唐家莊有九十老叟帥聚落人伏謁道左公問何言對曰邊境昔罹患甚而我人無寧居幸自令公至享太平一紀矣今秋大舉我人實岌岌藉令公安堵敢叩馬而謝蓋深幸老得見此而喜不自勝也令公過之命起某不起而瞑矣余自後車至妻孥聚哭輿歸而彼衣冠儼然莫不深憐之夫夫也不知其何如人但是死道左不必牖下矣自薦至縉紳蒙首就戮何限無如司命何籛殤不免一也昔之老羸願少須臾毋死思見太平之盛其見而瞑可知己今夫夫也知令公保障之德而帥鄉人從之謝必懷忠而倡義者豈謂蚩蚩之氓也耶然令公振旅造次使人沒齒而甘心焉則當鼓舞出師孰不願為之死者宜乎其居十三年而邊境享太平如此余讀元人紀事灤陽驛東北有雙塜世傳久戍而不歸者其父求焉遇之大笑極喜而死遂葬于此名以喜逢今謂喜峰口矣或以為傳聞之偽何邪然則今無久戍之苦它關喜逢而死其誰夫夫當葬于死所而為孤墳以表之焉庶乎人傳大明盛事季世視之何如哉書時大彬事徐應雷犀象金牛之器非不貴重商周彛鼎非不甚古余性不能好也自余來陽羡有客示以時大彬罍甚小而其價甚貴余心惡之曰必擊碎之為快而所謂時大彬者必屏諸四夷為快一日遇諸楊純父齋中其人朴野黧面垢衣余問純父渠何以淫巧索高價若此純父曰是渠世業渠偶然能精之耳初無他淫巧渠故不索價性嗜酒所得錢輒付酒家與所善村夫野老劇飲費盡乃已又懶甚必空乏久又無從稱貸始閉門竟日摶埴始成一器所得錢輒復沽酒盡當其柴米贍雖以重價投之不應且購者甚衆四方縉紳往往寓書縣令必取之彼雖窮晝夜疲精神力不給故其勢自然重價如此渠但嗜酒焉知其他余近遇雲間康季修談之更詳余于是欲盡擊碎其壼而足其酒終身焉嗟乎吾吳中祝希哲草書唐伯虎畫並稱神品為本朝第一又並有文章盛名然其人皆日坐松竹間散髮祼飲其胸中翛然無一事當盛暑雖以臺使者之重造門迫之不屑也今觀時大彬一藝至微似不足言然以專嗜酒故能精而以成其名况于書與畫而况于文章而况于學聖人學佛者也義虎記王猷定辛丑春余客會稽集宋公荔裳之署齋有客談虎公因言其同鄉明經孫某嘉靖時為山西孝義知縣見義虎甚竒屬余作記縣郭外髙唐孤岐諸山多虎一樵者朝行叢箐中忽失足墮虎穴兩小虎卧穴內穴如覆釡三面石齒廉利前壁稍平高丈許蘚落如溜為虎徑樵踴而蹶者數倣徨繞壁泣待死日落風生虎嘯踰壁入口銜生麋分飼兩小虎見樵蹲伏張爪奮摶俄巡視若有思者反以殘肉食樵入抱小虎卧樵私度虎飽朝必及昧爽虎躍而出停午復銜一麂來飼其子仍投餕與樵樵餒甚取啖渴自飲其溺如此者彌月漫與虎狎一日小虎漸壯虎負之出樵急仰天大號大王救我須臾虎復入拳雙足俯首就樵樵騎虎騰壁上虎置樵擕子行隂崖灌莽禽鳥聲絶風獵獵從黑林生樵益急呼大王虎却顧樵跽告曰蒙大王活我今相失愳不免他患幸終活我導我中衢我死不忘報也虎頷之遂前至中衢反立視樵樵復告曰小人西關窮民也今去將不復見歸當畜一豚候大王西關三里外郵亭之下某日時過饗無忘吾言虎點頭樵泣虎亦泣逮歸家人驚訊樵語故共喜至期具豚方事宰割虎先期至不見樵竟入西關居民見之呼獵者閉關柵矛梃銃弩畢集約生禽以獻邑宰樵奔救告衆曰虎與我有大恩願公等毋傷衆竟擒詣縣樵擊鼓大呼官怒詰樵具告前事不信樵曰請驗之如誑願受笞官命至虎所樵抱虎痛哭曰救我者大王耶虎點頭大王以赴約入關耶復點頭我為大王請命若不得願以死從大王言未訖虎淚墮地如雨觀者數千人莫不歎息官大駭趣釋之驅至亭下投以豚矯尾大嚼顧樵而去後名其亭曰義虎亭王子曰豫聞唐時有邑人鄭興者以孝義聞遂以名其縣今亭復以虎名然則山川之氣固獨鍾於此邑歟世往往以殺人之事歸獄猛獸聞義虎之説其亦知所愧哉明文海卷三百五十二
