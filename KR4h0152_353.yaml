body:
  text: 明文海卷三百五十三餘姚黃宗羲編記二十七遊覽活水源記劉基靈峰之山其上曰金雞之峰其草多竹其木多楓櫧多松其鳥多竹雞其狀如雞而小有文采善鳴寺居山中山四靣環之其前山曰陶山華陽外史𢎞景之所隱居其東南山曰日鑄之峰歐冶子之所鑄劍也寺之後薄崖石有閣曰松風閣奎上人居之有泉焉其始出石罅涓涓然冬溫夏寒浸為小渠冬夏不枯乃溢而西南流乃伏行沙土中旁出為四小池東至山麓瀦為大池又東注于若耶之溪又東北入于湖其初為渠時深不踰尺而澄徹可鑒俯視則崖上松竹華木皆在水底故祕書卿白野公恆來遊終日坐水傍名之曰活水源其中有石蟹大如錢有小鰿魚色正黑居石穴中有水鼠常來食之其草多水松菖蒲有鳥大如鸜鵒黑色而赤嘴恆鳴其上其音如竹雞而滑有二脊令恆從竹中下立石上浴飲畢鳴而去豫早春來時方甚寒諸水族皆隱不出至是悉出又有蟲四五枚皆大如小指狀如半蓮子終日旋轉行水靣日照其背色若紫水晶不知其何蟲也豫既愛兹水之清又愛其出之不窮而能使羣動咸來依有君子之德焉上人又曰屬歲旱時水所出能溉田數十畝則其澤又能及物宜乎白野公之深愛之也遊天平山記高啓至正二十二年九月九日積霖既霽灝氣澄肅豫與同志之友以登高之盟不可寒也乃治饌載醪相與指天平山而遊焉山距城西南水行三十里至則捨舟就輿經平林淺塢間道傍竹石濛翳有泉伏不見作冷冷琴築聲豫欣然停輿聽久之而去至白雲寺謁魏公祠憩逺公菴然後由其麓循狙杙以上山多怪石若卧若立其轉若噬蟠拏撑拄不可名狀復有泉出亂石間曰白雲泉線脈縈絡下墜于沼舉瓢酌嘗味極甘冷泉上有亭名與泉同草木秀潤可蔭可息過此則峰回磴盤十步一折委曲而上至於龍門兩崖並峙若合而通窄險深黑過者側足又其上有石屋二大可坐十人小可坐六七人皆石穴空洞廣石覆之如屋既入則栗然若將壓者遂相引以去至此蓋始及山之半矣乃復離朋散伍競逐幽勝登者止者哦者嘯者憊而喘者恐而咷者怡然若有樂者悵然俯仰感慨若有悲者豫居前益上覺石益怪徑益狹山之景益竒而人之力亦益以憊矣顧後者不豫繼乃獨蹇裳奮武窮山之高而止焉其上始平曠坦石為地拂石以坐則見山之雲浮浮天之風飂飂太湖之水渺乎其悠悠豫超乎若舉泊乎若休然後知山之不負於兹遊也既而欲下失其故路樹隱石蔽愈索愈迷遂困于荒茅叢篠之間時日欲暮大風忽來洞谷唅呀鳥獸鳴吼豫心恐俯下疾呼有樵者聞之遂相導以出至白雲亭復與同遊者會衆莫不尤豫好竒之過而豫亦笑其恇怯頽敗不能得兹山之絶勝也於是采菊泛酒樂飲將半豫起言於衆曰今天下板蕩十年之間諸侯不能保其國大夫士不能保其家奔走離散於四方者多矣而我與諸君蒙在上者之力得安於田地撫佳節之來臨登名山以眺望舉觴一醉豈易得哉然恐盛衰之不常離合之難保也請書之於石明年將復來始得有所考焉衆曰諾遂書以為記逰東山記楊士竒洪武乙亥余客武昌武昌蔣隱溪先生始吾廬陵人年巳八十餘好道家書其子立恭兼治儒術能詩皆意度濶略然深自晦匿不妄交遊獨與余相得也是嵗三月朔余三人者攜童子四五人載酒殽出遊隱溪乘小肩輿余與立恭徒步天未明東行過洪山寺二里許折北穿小徑可十里度松林涉澗澗水澄徹深處可浮小舟傍有盤石容坐十數人松柏竹樹之陰森布蒙密時風日和暢草木之葩爛然香氣拂拂襲衣禽鳥之聲不一類遂掃石而坐坐久聞雞犬聲余招立恭起東行數十步過小岡田疇平衍彌望有茅屋十數家遂造焉一叟可七十餘歲素髮如雪被兩肩容色腴澤類飲酒者手一卷坐庭中蓋齊丘化書延余兩人坐一媪捧茗碗飲客牖下有書數帙立恭探得列子余得白虎通皆欲取而難於言叟識其意曰老夫無用也各懷之而出還坐石上指顧童子摘芋葉為盤載肉立恭舉匏壺注酒傳觴數行立恭賦七言近體詩一章余和之酒半有騎而過者余故人武昌左護衛李千戶也駭而笑不下馬徑馳去須臾具盛饌及一道士偕來道士嶽州人劉氏遂共酌道士出太乙真人圖求詩余賦五言古體一章書之立恭不作但酌酒飲道士不已道士不能勝降跪謝過衆皆大笑李出琵琶彈數曲立恭折竹竅而吹之作洞簫聲隱溪歌費無隱蘇武慢道士起舞蹁蹮兩童子拍手跳躍隨其後己而道士復揖立恭曰奈何不與道士詩立恭援筆書數絶句語益竒遂復酌余與立恭飲少皆醉起緣澗觀魚大者三四寸小者如指余糝餅餌投之翕然聚已而往來相忘也立恭戲以小石擲之輒盡散不復因共慨嘆海鷗之事各賦七言絶詩一首道士出茶一餅衆析而嚼之餘半餅遣童子遺余兩人已而夕陽距西峰僅丈許隱溪呼豫還曰樂其無已乎遂與李及道士别李以卒從二騎送立恭及余時恐晚不能入城度澗折北而西取捷徑望草埠門以歸中道隱溪指道旁岡麓顧余曰是吾所營樂丘處也又指道旁桃花語余曰明年看花時索我於此既歸立恭曰是遊宜有記屬未暇也是冬隱溪卒余哭之明年寒食與立恭豫約詣墓下及期余病不果行未幾豫歸廬陵過立恭宿别始命筆追記之未畢立恭取讀慟哭余亦泣下遂罷然念蔣氏父子交好之厚且在武昌山水之遊屢矣而樂無加乎此故勉而終記之手録一通遺立恭嗚呼人生聚散靡常異時或相望千里之外一展讀此文存沒離合之感其能已於中邪既遊之明年八月戊子記遊梁氏園記劉定之梁氏園在今京師西南五六里其外有舊城舊城者唐藩鎮遼金别都之城也元遷都稍東於是舊城東半遂入于朝市間全無迹可見而西半猶存號為蕭太后城即梁氏園所在也蕭太后者遼后皆以蕭為姓有子為帝則太后别居宫城繞部屬故其亡也末帝淳之妻猶得獨存稱太后以至其國踰年乃滅也或謂此雖遼金都城而非唐藩鎮城不然也唐時此為范陽藩鎮安史反後改名盧龍而所治幽州薊縣不改今移薊以名州移盧龍以名衛各去此數百里其實唐之盧龍與薊在此也惡得非唐藩鎮舊城乎遼金不因藩鎮以為都而曷因乎稽諸史志遼金又曷常創建都城乎其城僅存土爾甓皆為人取去今取猶未己其土皆真黃土人取之和煤炭以燒亦有即之作墓者以其猶髙堅也豫往遊之日去清明節未久插棘挂紙近逺在目嗟乎昔之在此地者珠囊失理金鏡頻移自唐中葉迄元季世七百年矣始而鵝出鵑啼繼而虎吞龍亢孰得窺之哉天旋地轉時移事改而懦夫豎子持畚插以斸甓掘土焉就其構樓櫓立甓蓋喑嗚叱吒之故處而葬埋哭泣引紼掩袂焉因其頽垣隳墉而增髙補缺以障朔風延夕暉藝羣芳於是吾儕得以息朝署之迹攄林野之興焉俯仰古今感慨多矣可以自幸夫聖明之不易遭也是日園中牡丹皆半謝蓋京師氣候牡丹開於榖雨後於候為鳲鳩拂其羽戴勝降于桑之間豫往乃立夏初故已過也同遊者柯學士孟時相約攜具皆甚儉園有龍槐共酌其下而歸去時微風埃中道憩一寺正統中太監僧寶所建非數萬金不能成僧寶沒于土木有像在寺歸時風止過太宗潛龍時所建天王寺其規制視前寺僅三之一云五湖記王鏊吳郡之西南有巨浸焉廣三萬六千頃中有山七十二襟帶三州東南諸水皆歸焉其最大者二一自寧國建康等處入溧陽迤邐至長塘湖并潤州金壇延陵丹陽諸水會于宜興以入一自宣歙天目諸山下杭之臨安餘杭湖之安吉武康長興以入而皆由吳江分流以入海一名震澤書所謂震澤底定是也一名具區周禮職方楊州之藪曰具區山海經浮玉之山北望具區是也一名笠澤左傳越伐吳吳子禦之笠澤是也一名五湖范蠡乘舟出五湖口太史公登姑蘇望五湖是也五湖者張勃吳録云周行五百里故名虞仲翔云太湖東通長洲松江南通烏程霅溪西通義興荆溪北通晉陵滆湖東連嘉興韭溪水凡五道故謂之五湖陸魯望云太湖上稟咸池五車之氣故一水五名然今湖中亦自有五湖曰菱湖莫湖遊湖貢湖胥湖莫釐之東周三十餘里曰菱湖其西北周五十里曰莫湖長山之東周五十里曰遊湖沿無錫老岸周一百九十里曰貢湖胥山之西南周六十里曰胥湖五湖之外又有三小湖夫椒山東曰梅梁湖杜圻之西魚查之東曰金鼎湖林屋之東曰東皋里湖而吳人稱謂則惟曰太湖云七十二峰記王鏊太湖之山發自天目邐迤至宜興入太湖融為諸山湖之西北為山十有四馬迹最大又東為山四十有一西洞庭最大又東為山十有七東洞庭最大馬迹兩洞庭望之渺然如世外即之茂林平野閭巷井舍仙宫梵宇星布棊列馬迹之北津里夫椒為大夫差敗越處也西洞庭之東北渡渚黿山橫山陰山葉余長沙山為大長沙之西衝山漫山為大東洞庭之東武山北則餘山西南三山厥山澤山為大此其上亦有居人數百家或數十家馬迹兩洞庭分峙湖中其餘諸山或逺或近若浮若沉隱見出沒於波濤之間馬迹之西北有若積錢者曰錢堆稍東曰大㞦小㞦與錫山若連而斷舟行其中曰獨山有若二鳬相向者曰東鴨西鴨中為三峰稍南大嶞小嶞與夫椒相對而差小為小椒為杜圻范蠡所嘗止也西洞庭之北貢湖中有兩山相近曰大貢小貢有若五星聚曰五石浮曰茆浮曰思夫山有若兩鳥飛且止者曰南烏北烏其西兩山南北相對而不相見見即有風雷之異曰大雷小雷橫山之東曰干山紹山曰疃浮曰東獄西獄世傳吳王於此置男女二獄也其前為粥山云吳王飼囚者也有若琴者曰琴山若杵杵山曰大竹小竹與衝山近若物浮水靣可見者曰長浮癩頭浮殿前浮與黿山相對而差小者為龜山有若二女娟好相對者曰謝姑有若立柱嶻嶭玉柱稍却金庭其南為峐山為歷耳中髙而旁下者筆格驤首若逝者石蛇有若老人立石公石蛇石公石最竒與黿山龜山南北相對曰鼉山旁曰小鼉若螺者青浮二鼉之間若隱若見曰驚籃東洞庭之南首鋭而末岐者曰箭浮若屋欹者曰王舍浮苧浮又南為白浮澤厥之間有若笠浮水靣者曰蒻帽有逸於前後追而及之者曰貓鼠有若碑碣橫者曰石牌是為七十二然其最大而名者兩洞庭也重遊琅琊山記文徴明成化乙已大人官於滁徴明隨侍纍年𢎞治戊申始歸乙酉復至又居纍年自念平生於滁豈有宿分數年來所謂醉翁亭者遊歷無虛嵗别來幾何時矣每有人自滁來輒問訊諸山無恙否則未始一日忘也辛亥秋豫有事過南京距滁才百里念欲一往而故人適以書招豫於是重遊之興不能自阻乃九月十有四日至滁止東門魏氏故人家也明日諸故人來會者數人相見道舊外謂山中之行不宜廢又明日遂往是日赴酌者李君秉彛盧君英于君鏊及主人魏珂與豫五人並轡行二里未至山觀道傍怪石溪溪前人所未嘗竒者磅礴甚喜遂登醉翁亭亭已圮一角東西壁盡塌蕭然幾於草墟矣相顧歎息而去至琅琊敗壞更甚唯山上下宋元人遊厯石記剝落之餘尚隱隱數百處念此亦久逺物遂謀遍拓之扺暮歸期詰朝再至則宿具楮墨凌晨與魏君徒步往至始早食遂手拓三十餘種多名人字畫亦多竒麗可喜且拓且閲及午而李于兩君來出所攜餅果相與咀啖又拓數十而歸再明日而風雨作連十有二日不止愧豫不能好竒而歸念又甚急遍榻之事遂墮渺茫矣豫生長江南於滁雖竊慕樂而南北絶迹非可以徒至故雖一著腳猶不謂易能也而數年之間乃至屢遊不已去而復來豈偶然哉雖不能盡厯而覽之亦自謂於滁不薄矣而獨有慨然於此者徒以琅琊為淮以南名山而所謂醉翁亭又古人茂迹不應落寞如是至於一時題識其修辭命翰比極精緻至勒之堅珉自謂可垂不朽而後世或有見而賞之者逮今數百年曽幾人之一顧哉幸而有知而好之者而又多所阻滯況吾與諸君聚散不常後是而談笑於斯所未可期也即萬一再至尚能保其存不存乎此豫不能不為之重念也遂敘一時之事以歸同遊者若景物勝概與夫遊觀之樂前人記之屢矣豫不能文亦不暇述也所發怪石溪則别有志銷夏灣記蔡羽山以水襲為竒水以山襲尤竒也再襲之以水又襲之以山中涵池沼寬周二十里舉天下之所無竒之竒銷夏灣是也灣去郡城且百二十里春秋時吳子嘗從避暑因名銷夏自吳迄今垂二千年遊而顯者不過三五輩不為凡俗所有可知已湖之峰莫大於包山山之峰莫大於縹眇峰髙不知其幾里足袤五十里有畸峰之南水道三十里為苕溪其弗能與苕溪參者諸巒抱其外也苕之舟北行三十里以求縹眇峰其弗能與縹眇峰直者亦諸巒為之拒也四靣峰巒交萃獨以一靣受太湖中虛如抱甕其南列門闕焉由門闕東西盼西為龍頭山其次為小洞庭為石蛇為舍為燕為鼠鬬之石不得而名焉東則大小明月灣為石公為澤為蕨為三山不得而名焉明月之灣其背為梭山厥土墳壚厥産林檎鴨腳櫻桃柚柿梨棗龍頭之背為圻村厥土白礫厥産玉石盧橘中消夏之腹印浮其上乍有乍無為衆安之洲帆落洲上則四面環合為屏為翰聳妍效譎以與縹眇相拱峰之巔有草無木其麓多木無草丹宫梵室蒙蔽林靄鐘鳴鼓應然後知仙釋之廬魚行鳥過形影交徹帆翔其上而莫之知避也夫地既異而處甚僻信乎遊者之難至矣向使移而置之附郭則撰壺觴秣車馬者日不暇給豈獨為吾灣哉人將僬僬乎劍負以趨萬物失所矣夫造化無意者也設是灣如有意鬼神之能不得而與非冥契其事孰能樂之嗚呼非惟世之人不得而樂灣之人亦莫得而樂也余世居灣上有所獨得私志之林屋洞記蔡羽丁丑五月十一日通府盩厔焦公備孝豐之警事寧且暇聞林屋洞之勝期與三四士往觀而羽與時林未斂客各求道取疾有頃咸會于洞門天亦霽有小亭與門峙從解冠履釋方袍為山行裝南行繞丙門出于陽谷之上趺于石壁壁髙盡見太湖之境從者曰前有曲巖復下壁攀木行里許次于巖畔自亭逮丙門逮陽谷逮曲巖皆五步一石十步一潭巉巉焉獸蹲淵淵焉龍伏泉㶁㶁行樹根攬朽翳去豐草然後得一伸足靈祐道士曰此毛公壇水也壇距洞且十里而南流出于洞門大者成川小者為潭為澗用是兹山之樹青䓤堅翠少花而多根焦公有山水之趨與客嵌名巖中還至亭下從者已在洞半坂矣靈祐道士習于乘橇橇以先驅洞口微隘稍前得夏屋穹然黑風颯然竪毛髮左右請火公命列炬壁間下燭瀦滷上照銀屋石鍾倒懸無慮數十夾屋為石床丹竈道士曰此所謂金庭玉柱者也然距石樓神鉦尚逺道士內鳴鉦外奏樂客各據床屑石鍾仰舐乳穴暑月如盛寒如是者凡幾室室不同乃縱左右各為向道或之丙門或之暘谷屏處忽若斷絶而無不穿漏惟之隔凡者許久方有人聲還報火屢滅不能進羽怪兹山大不踰他峰而中包空洞莫知攸際靈威丈人有言有無不可知求之隔凡以外亦巳異矣果幽明之境殊豈造化者設是巧不得而窺耶出洞門日己暝煮石乳飲訖各謝去石蛇山記蔡羽龜黿龍蛇之山大抵皆花石之村者空竅灂者亷利然皆不于山之腹特出於波濤龜黿龍頭皆負林麓走飲于湖惟蛇山為不然當太湖之西北背龍頭而迎風濤截乎大洋故境愈險而愈竒世少得而觀焉正德己巳清明日與客放舟龍頭西踰小洞庭還見聚落十餘家為烏砂井厥名萬狀恍恍焉洞洞焉緣於巑岏不敢搖動然去蛇山尚十里客請乘東南風之便乃從烏砂解舟薄石蛇之東遙見大石劃劃下若有門關而無人蹤顧其勢尚陡水尚急舟不能停緣壁里許則山之陽也岸始舒水始緩若有里墟而無人煙鳥嬰獸窟以竄其間者大抵皆採石之人厥崖惟廬厥坎惟炊厥寢惟磯以漬以飲惟石之宜始舟人與岸人見獲通語言而沙詰潭未可卒進投竿測之視岸人指指止行焉始獲登其丘山空地虛舉足有聲躡其巔梯斷石滑不獲前復舉帆去則山之西麓壁愈髙石愈竒若芙蓉開花魚龍脫甲上者屏列下者橋卧隱隱波底者不可窮狀所見既異而境復迂僻由是鎖舟壁下環卧涯滸客皆引滿載歌晨徂而暮返夫蛇山卷石耳其勝顧出龜黿龍頭之上余與山相去甚邇而平生不聞其勝一日跨波濤觸煙霧獲覩其竒則古之不言石蛇而言龜黿者有以也噫物愈竒則遇愈難余志蛇山之竒俾好竒者覽焉明文海卷三百五十三
