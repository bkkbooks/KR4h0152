body:
  text: 明文海卷三百五十四餘姚黃宗羲編記二十八逰覽重遊石室記李承箕大崖周遭皆山山陰可二十餘步有石室焉東西北闕上竅如立甕引風氣通日色夏洌而冬溫可布席有餘非神堅志定者不可居又非愛便捷喜左右趍走承奉挽華紱坐重裀以塵埃面為香粉據髙堂大室勢能使存者亡殺者生富貴者貧賤憂戚翕聚者發散而薰灼者之所欲居也而使其勉強於一時其心巳馳逐於彼虎豹鹿豕孰能間之以衣冠視之以干羽而聽之以管籥之樂哉往年豫讀書大崖每因時一遊焉髙林低薄無行人路望山而行遇石而憩俯泉而飲倚杖而歌或寄之於長吟或寄之於遊觀或寄之於偃仰或寄之於徙倚隨其所適嗒然於山水之外從豫遊者立卿弟也今年子卿弟讀書大崖而立卿成進士請告而歸顧豫以未老得間舉武無塵纍者時春暮矣又相與一遊焉向之髙者巳為人之棟低者已為人之薪左右前後旁通多歧路惟巉岩老石暖雲氤氲豫之坐䀶猶若在也徽州程氏實山人孫氏亮皆載酒助豫兄弟之遊而其從間取適之義皆可記也崖門吊古記方良永𢎞治甲子春二月丙午豫出按海北取道新會縣舟次東亭驛縣官屬謁既豫進知縣羅僑語之曰崖山之事千古痛憤辦香敬吊行與子偕乃具牲帛僦民舟習海行者以行夜二鼓乘汐出港口前後數十舸齊發風靜波平豫卧舟中不知其為泛海也天未明抵岸豫急起盥櫛啓篷窗東視崖門甚邇景色濛濛未辨登岸肩輿由松徑縈紆而進典祠者率其子恩平庠生迎于道左問之勤王義士伍隆起七世孫也豫以松間且去祠伊邇戒毋喝道少頃至祠下舍輿步入先詣全節次詣大忠達觀二祠殿宇碑亭考其營建顛末大忠則創于故方伯陶公自強中祀文天祥陸秀夫張世傑三公兩廡皆祀同時死節諸臣東廡又特設伍隆起配享之位全節則創于今僉司徐公朝文特祀慈元楊太后其額與祭則皆上請于朝得旨俞允者也觀禮畢易便服穿叢薄間從西上直至山椒轉顧後山蒼翠亭嵷如扆環視左右山逶迤盤踞如虎伏龍行當建祠處隆然突起稍前又突出一阜朝北如拱水繞其勢如彎弓隔岸諸峰層疊秀麗如畫無巉巖嶔穿之態較以形勝此亦足恃而顧不能救國之亡豈地勢無與于人事抑天命已去非此所能勝歟悄然而退遂從東下尋慈元殿舊址去今所創祠可百步許已鞠為榛莾復謁國母墳墳在舊殿之南稍東牡蠣為垣半己就頺國母即楊太后也夫志不載楊太后葬處而端宗陵寢見于志者已漫不可尋今國母有墳巋然獨存其好事者為之抑中原遺民憫后之節收其遺骸或具衣冠瘞之以示哀思歟時微雨霏霏馳還具服行禮始就位天色晴朗三獻既畢日已正中縣官請隨祭大忠豫謂祭吉禮非日昃所冝行乃約戊申日五鼓即事豫回舟次佇立岸上見水鳥飛鳴上下漁歌互答于兩涯追思往事䀌然傷懷徘徊間典祠者曰前有竒石可往觀豫遂乘小舟徑詣石處躡磴仰觀巨石如屏前二石如人立頂趾皆巨中約如腰狀屏石有刻已磨滅不可讀云在舊有大刻元柱國將軍張𢎞範滅宋于此近巡按廣平徐公瑁易刻曰宋丞相陸秀夫與張世傑死事于此今石長字沒矣豫竊論𢎞範宜不足責宋之執政以國與人如棄遺然恬不知恤非得二公振起其間天理民彛或幾乎息二三公之名實昭然史册間當與日月爭光區區磨崖胡能輕重而必與之較爭哉典祠者又云昔有磨刀石自海門飛來至今尚在豫令覓之潮沒不可得乃返因與羅尹論崖山事謂當宋室播遷之時楊后非正位中宫三公非顧命大臣皆無與國休戚存亡之義即使不死亦無敢非之者今其孤忠大節乃出於尋常之所不料此所以尤使後人追思景慕不容己巳也祠有田三頃餘乃知縣丁積割廢寺遺業所充又山故無虎豹居民素不為盜巡司雖設頻年無捕獲功近稍不逞者密誘他盜來掠其村然猶畏不敢肆天既薄莫豫獨坐舟中感今念昔屢就枕而不成寐未五鼓即起與大忠之祭既竣事咸曰自有崖山之行天日無此晴霽風波無此平妥也遂回舟由故道過昨所觀竒石值潮落趾出牡蠣棲其四旁男婦持器狀如斧長二寸許爭敲取之又有荷鋤掘取蚌蛤于泥中者鷺從旁爭啄其餘無驚懼態無何入港舟行至蜆岡漫書是行所見與所論議者作崖山記行録似朝文為豫易題曰崖門吊古記遊皖山記李元陽皖山在潛山縣世傳漢以皖為南嶽其麓有漢祠壇嘉靖戊戌夏匡廬山前與陳內翰後岡别渡江漫逰遙見三峰插天遂問路至皖嶽之下登麓五里投三祖寺宿平旦謁殿禮塔因避雨塔腹僧曰每嵗夏仲有龍水洗塔今尚未也豫疑其言以為有雨則洗奚必龍乎殆僧神其説耳頃之忽雷電交作豫欲趨塔腹避雨僧遽挽袖曰不可觀此景象當是龍來也雨頓翻盆豫愀然立廊下候之則見大水從塔腹而出鏜鞳之聲如江濤然頃之頓止驗其流注之地皆雀蝠餘穢起視塔腹纎塵不存矣嘗聞浮屠所在神龍訶護信哉既晴由寺後入石澗觀黃山谷題石中之迹僧曰往年潦漲一澗怪石俱被沙埋獨石牛巋然豈有神乎徴諸士人皆曰不誣遂升髙履危仰望三天柱令人悚然起敬中峰之頂其平如盤自度不能至乃呼曽至者問之有一樵者來曰盤上有異物十數朱髮人面長喙而肉翅如畫雷公之狀晴天仰卧頂盤如人曬腹樵者遇之雷雹隨至故其頂莫得而登云豫方坐酌錢塘邵公經濟適來蓋赴城都守取道於此公有雅懷聞豫在山因迂途相尋遂握手更酌秉燭聨詩明日有士人數輩來因道古迹始末豫曰三祖得道之士聖者也山谷才節之士賢者也其身在當時寂寥偃蹇而百世之下匪直人師尊之鬼神亦護之彼漢襌壇壝鞠為灌莾想當時千乘萬騎雜遝山麓如飛鳥一過耳然則人世之足恃者果安在哉後湖記謝杰湖漢以前未之聞吳赤烏四年鑿青溪泄後湖水寶鼎二年開城北渠引後湖水入新宫厥名姑著尋更練湖晉元帝肄舟師於此名北湖宋文帝元嘉中名習武湖後二年黑龍見改玄武湖立廟祠焉孝武大明中大閲水軍號昆明池或明飲馬塘齊梁以來仍名玄武齊永明二年車駕幸湖梁太清中侯景引湖水灌臺城陳後主燕羣臣於湖閲武賦詩唐置放生池宋建青溪閣至熙寧八年王安石請廢湖為田趙善湘因之增收後湖田租元大德下鍾山鄉開後湖河道自後惟有一池餘皆災畬之所至國朝復開為湖貯黃册其中在京城直北太平門外周迥四十里其上名山大川掩映如畫正東曰鍾山下有太平堤堤設水洞俗稱蓮花洞中有小閘以時啓閉蓄泄湖水北有秣陵尉蔣子文廟子文存日自言骨青當為神後逐盜死于鍾山土人憐而祠之代著靈響正南曰覆舟山象形也一名真武山時有渡杯僧不知姓氏常乘木杯渡水往來不測死葬此山山之南為樂逰苑為臺城城在中阜側據髙林下東環平岡西控石城北帶玄武南擁秦淮青溪梁武帝居之西南有雞鳴山宋雷次宗齊竟陵王子良開館録書之所今建十廟山有寺寺有寶公塔寶公為齊梁間神僧寶志孝陵玄宫實據其穴因遷之靈谷而祠有像于雞鳴葬以金棺銀槨志趺坐其中不僵也為一比丘營二堵窣亦殊典哉正西有盧龍山本名獅子山晉元帝渡江以比北之盧龍故名髙皇帝曽此督開平王破偽漢南為石頭城其山曰馬鞍曰四望北為湖頭塔其山曰直瀆曰大壯觀曰幕府即石灰山開平伏兵處晉王導開府其上大壯本觀名陳宣帝所營帝幸觀大閲武命任忠陳於湖後並以名其山外有坡山梅花水西北為大江沿江諸山競獻秀麗增湖之勝焉湖有五洲相向中隔十字河疑宋所開洲有郭璞墓璞忤王敦意為所害世皆以為墓在荆山識者疑其非今云在湖中差近之又劉宋於湖得甄邯墓初張永開湖遇古冢冢外一銅斗有柄文帝以訪朝士著作郎何承天曰此名新嵗斗三公亡則賜之一在冢外一在冢內王莽時江左惟甄邯為大司徒必邯墓無疑啓冢果復得一斗石銘曰大司徒甄邯之墓若承天者可謂博物君子矣西北曰舊洲今為黃册庫西南曰新洲上有大墩即郭璞墓𢎞治十五年始建庫貯册其上言新者别於舊也前抱一洲正德七年移厨房於此不令煬近二洲也東洲二號荒洲未建庫也近西小洲號别島視諸洲為勝西南之水獨深而澄所謂黑龍潭洪武間册貯其中者省直共五萬三千三百九十三本𢎞治間共六萬七千四百六十八本嘉靖間共六萬五千八百五十九本洪武得户一千六十五萬二千七百八十九得口六千五十四萬五千八百一十二𢎞治得戶九百六十九萬一千五百四十八得口六千一百四十一萬六千三百七十五嘉靖得户九百九十七萬二千二百二十得口六千二百五十三萬一百九十五田土洪武時計八百八十萬四千六百二十三頃六十八畝𢎞治時計四百二十九萬二千三百一十頃七十五畝嘉靖時計四百三十六萬五百六十二頃六十畝此國家全盛之民數事産也考之往牘若西漢自髙祖迄平帝約戶千二百二十三萬三千餘約口五千九百五十九萬四千餘約田八百二十七萬五百三十六頃餘東漢自光武迄桓帝約戶千六百七萬九百餘約口五千六萬六千八百五十餘約田六百九十三萬一百二十三頃餘晉平吳之後天下一統户僅一百四十五萬九千八百餘口僅千一百一十六萬三千八百六十餘隋混一之後戶凡八百九十萬七千餘田凡五千五百八十五萬四千四十餘頃戶未及兩漢而田逺過之唐自太宗至玄宗戶凡九百六萬九千一百五十餘田凡一千四百三十萬三千八百六十二頃餘宋元豐間田凡四百六十一萬六千五百五十六頃餘大觀初主客戶共二千九十一萬有竒雖以禹平水土周公致太平其時人口止千三百數十萬上下地之定墾者亦止九百一十萬八千二十頃是夏周迄今上下三千載間戶之多莫過於宋之大觀及二千餘萬口之多莫過於嘉靖及六千二百餘萬田之多莫過於隋及五千五百餘萬所可訝者晉武去東漢無百年户頓減什之九唐去隋無百年田頓減五之四𢎞治去洪武亦堇堇百餘年田頓減什之伍晉武猶曰大亂之後唐號太平隋雖富而田在天地間止有此數不應頓增至此非唐之減乃隋之增有可疑者宋區宇甚狹而戶及二千萬皆所未解若國初田八百餘萬頃今遽止四百餘萬頃非頓加少或豪強兼并侵沒之故耳夫國家以武取天下初年戶口之盛猶如此視晉之頓減什九者奚翅天淵乃知三國戰爭其民塗炭曹操攻徐州所過雞犬不留八十萬衆下江南歸者無幾則他又可知已祖宗之有天下真神武不殺至仁而無敵也哉兹湖迹之大略可考者於戲湖於六季為閲武樂遊之所無日不干戈而歌舞一入皇明遂成禁地堤之北湖之東復三法司建焉縉紳非公事無敢一寓目其間矧於冶逰兒五洲宛在水中央有同蓬萊方丈惟省臣臺臣部臣五日更直宿湖者抵其所人視之且如登瀛洲而吾白雲曹執法廷尉諸寮日循堤入署者所在湖山亦輒供吟眺春而碧萼朱英相錯如繡夏而菱荷旖旎十里飄香秋而卿月流光玻璃千頃冬而瑤華玉筍倒影凌波雖無水嬉紅妝之可娛綽有真水真山之可玩亦仕路一清況也淑問之暇不揣為之辭庶明吾吏之非俗云遊浯溪記桑悅豫至衡山即以家口浮湘而上自以肩輿山行登回雁峰上下熊羆嶺以發千古之竒既至祁陽邑之諸士子來訪告豫曰浯溪山靈侯先生久矣不可不一往久陰忽天開日晴豫易古衣冠與諸士子步至溪滸以舟亂流而渡溪有巨石插淵髙六十餘丈崷崒可愛次山定居之趾南崖壁立中通大道崖嵌鏡石濶二尺許長減四之一以水清之瑩如墨玉近景畢照磨崖碑勒于崖之西北字畫完好歐陽永叔與王惲云碑打殘缺其完好者永之再勒今則不知其幾勒矣顔元之名則不刋也崖北勒宋中興頌趙不息撰趙公碩書名不甚傳石勒古今名人詩録可成數帙不能悉記豫匆匆逰覽畢衆翼豫上浯臺凌絶頂觀窊尊尊可容酒數斗亦人為鑿成循山而東為顔元書院西建浯亭浯溪環繞其下僧寺面溪地頗開曠或云即次山故宅豫遊覽既倦坐僧寺中堂諸士子設殽核酒數行豫揖諸士子而告之曰浯溪素無名以次山名之而顯且自古名賢所過之地則專其地之名如賈長沙栁栁州之類離亂不能爭劫數莫能壞一代生賢不能數人而多弗究其用名山大川必有主宰之者夫乃陰杌之使其流落奔走因藉其言以傳名於後世是山川之神默竊世用賢之柄而不自知也推而至於以萬世為士者謂非天欲用之以代言設教於無極者乎有為之朝神不靈有道之世天在下是以賢無不用而世底雍熙也時無與乎已學不由乎人諸士子其勉乎哉修德以建功明道以立言使浯溪為濓洛以引洙泗之流亦吾儒分內事也其可不加之意耶同遊者鄉進士曽鼐叔和庠友鄧溥文瀚李紀大倫楊時熙永和劉廷珊朝貴程幹廷幹王溥汝霖蔣暉啓暘李昕景曙文鳯天瑞盧益齡天厚談翔汝鳯蔣冔首陽理宜牽聨書其名字以詔無窮亦以使後之人可指其名稽其所成以寓景仰庶兹遊為不負也盍相與勉之𢎞治六年十月八日九真山記董榖山在漢沔其最著者曰大别蓋禹迹所及嶓源所窮紀于虞書人皆知之余之初授漢陽也仰之與龍門砥柱等以為其必有異者也既見之乃平岡橫亘江漢之滸猶堵然余每過焉必心羡之曰是猶及見菲衣惡食之盛德步武于雲根水涯茫乎數千年矣既而侍御朱别山授余郡志考之又有所謂九真山者實維一郡之鎮去縣百里能作雲雨禱輒應余曰安得一往其間乎是年入夏不雨畝田告災民以雩事白爰吉蠲齋宿以五月既望乙丑有事于九真舟行暮抵蔡店乘月明肩輿登陸行過半從者戒虎乃益鳴金吹角持炬報呼以進又二十餘里至麓夜色微茫樹影參錯攀援扶掖良久至絶頂得古祠焉即九仙之殿如郡志所載云者雞且鳴假寐以旦俯首四顧群峰羅立乃進典祠之老詢之曰此為龍衣山此為朝冠山此為走馬山此為黃鷹山此為陳湖山此為稽功山此為崇陽山此為同山皆瘦削若雕刻蜿蜒如蛇龍逺若趨拱近若侍衛而九真巍然居所安而受之蓋體有崇卑則勢因俯仰可以觀物理得人情矣薄暮祀竣乃下山倒舁之僕夫順行余得逆觀危崖長壑萬卉盛長草木之氣紛馥著人左右皆成一色殆類蔚藍之天自空而降碧霞之宫從地而湧巒光欲滴應接不暇又良久乃即平地行三里許始出山焉鴻荒之初余不識真宰之意使漢水泛濫經乎九真之下或九真突屹立乎溪水之上則有夏之后金簡玉文之書未必不告成于兹山之顛與岣嶁同垂無疑矣乃今如是泯沒千古兹余是之憾也豈九真之靈不欲炫露自甘寂寞之鄉抑神禹之偶遺不以漢決於此將大塊賦形出於無意妍媸好惡自生于人心而水土者不與也是皆未可知也昔九華晦于漢知于唐雁蕩晦于唐知于宋又安知九真山也不知于今乎是又未可知者也三彥士皆曰信因以為九真山記土橋溪記熊過由葛家鋪益北三分里之一折而東降嶺絶田則謝氏務農堂由堂稍北轉而益東并山行少折西下則土橋溪在焉溪首受土橋田間諸水其源可望見而指也鍾祥曽侯至富順之明年為嘉靖丁已嵗計得啇算無十徴為火祥司空須材亟民困省山之役棄其廬舍相扇而逃曽侯為之猷念阻於異議侯憂之戚既乃得請於撫臺民得憩焉侯心始寧僉事謝君謀飲侯相慰勞曰是先憂而後樂也以十一月朔出拱極門達堂所堂上為三筵西下丞卜君學官博士殷君為侯翼下為六筵分兩曹皆東向過位北第一次北一筵僉事黃君又最北刑部郎中謝君南一筵户部員外王君次行人范君主人居其最南獻酬既畢就溪飲焉擁土上源斂其旁流刳三木黑外而朱中皆為標徽中受杯焉夾岸而坐注而浮之舟倐而泊惟其所值録酒者舉以灌夕陽滿川映為紅流蹤談所及情感各異田燭具舉舉酒相屬過述無俗念以誦之於是充然自適各得其本真夫士先志官先事由來尚矣然資深逢源者亦多術焉遊習以時勞逸以節所以廣譬而喻志者詎豈異哉古語曰聖人化世其解在水故下令欲如流水之源學者亦必成章乃達也然豫所聞酈氏枝水蓋千二百五十二豫行天下且半曲溪回澗索絡荒逺僻礙鮮能自通者豈上世濬畎距川之教廢不講耶經所不載如土橋溪至雙橋不半舍入中水東趨蓋朝夕耳輒能達於江由此言之學有頓漸政有久近亦在所資而世莫知省耶有隱君子言此去六七年所俗亦淳朴士多知學學多通志志多大政吾誠指其言悟於水因因以樂水之同情先卜之也侯屬為記欲際其成而觀焉者蓋侯志也因遂歌系焉遡彼北風鴻鳴嗷嗷豈不憚逺眷此樂郊民既勞止恤彼簡書我是用康侯心匪舒退食自公無以寫憂因是謝人駕言出遊自堂徂溪洽比孔時泛舟流觴昏以為期百爾君子鑒於兹水坎坎洊至匪源伊委流之既逺潦或汚之逮有清源援歸於墟常德習事古先民是師太華山記李攀龍經曰太華山削成而四方其高五千仞其廣十里蓋指華中削成而四方者爾四方之外宫之盡華山也自縣南十里入谷逶迤上二十里抵大霤中霤中一峽裁容人左右穿受不滿足穿受手如決吻人上出如自井中者千尺曰千尺峽北不至十步復得一峽百尺人上出如前峽曰百尺峽則東南行崖往往如覆敦出人穿其穹中行穹中穿如仄輪牙也崖絶為橋者二所東北徑雲臺峰東南得大阪可千尺人從其罅中躡銜上阪窮為棧五步顧見罅中如一耦之畎新發諸耜矣罅中穿如峽中峽中銜如罅中峽中之繘垂罅中之繘倚皆自汲也棧北得崖徑丈人仄行於穿手在決吻中左右代相受踵二分垂在外足已茹則齧膝也足已吐是以趾任身也北不至十步崖乃東折得路尺許於崖剡中入並崖南行耳如屬垣者二里剡窮復西出崖上行則積穿三丈有崖從北來踆此崖上復高三丈自踆首南行崖如前剡中屬耳甐耳矣三里而近為蒼龍嶺嶺廣尺有咫長五百丈崖東西深數千仞人莫敢睨視是酈生所稱搦領須騎行者矣雖今得拾級行哉足欲置之置先嘗一足于級上置也然後更置一足其所置足猶若置入石中者猶人人不自顧匍匐進也級窮得崖踆焉高二丈一隅西北出人從其隅上南一里得崖又盡磝不可以穿繘自汲也是皆所謂懸度矣不至百步西北冒大石出崖下西南上二里得松林五樹稱五將軍崖上者不見稍崖下者不見本從縣中望見松如樹菼也西一里有大石如百斛囷不知何來客於此橫道而處踰之為穿徑二十所西南百步得巨靈掌在削成東北方壁上不盡壁五丈許人不得至掌二丈許掌形覆其牳北引如三尋之戟從縣中望見掌即五指參差出壁上也又西百步詣削成四方上矣西南望削成四方中東北望所從上削成道前從東北隅出二十里是錞于雲臺峰猶杓之在斗矣削成上四方顧其中汙也上宫在汙中西北玉井在上宫前五尺許水出於其上潛於其下東北淫大坎中凡二十八所北注壁下壁下注道中一穴北出水從上冪之也四壁之穴各在一摶上宫東南上三里許得明星玉女祠含神霧稱明星玉女持玉漿乃祠在大石上大石長十丈許祠前輒拆拆下有穴穴有石如馬折南五丈坎如盆者五所如臼者一所水方淡淡也下從祠東南峽中行二里得池二所大如輪東南行三里望見衛叔卿之博臺在别顛為埒不盡崖尺中如砥可坐十人崖南北繘纚纚也欲度者先握繘自懸崖中乃跖崖自汰令就繘不得繘還跖崖自汰得而後釋所自懸繘也此即秦昭王使人施鉤梯處也西南上三里許得一峽如括曰天門門西出為棧而銅柱狹不能尺長二十丈棧窮穿井下三丈竅旁出復西行為棧而銅柱一池在石室中不可涸也天門旁有臺如叔卿之臺南望三公山三峰如食前之豆是白帝之所觴百神也從上望壁下大溪溪肆無景即日中窈窈爾久之一山出其末若鏃矢頃即失之矣是為南峰南峰前出南壁上東峰出東南隅壁上西峰出西北隅從下望之五千仞一壁矣攀龍曰余既達削成四方中不復知天不可升矣余夫善載腐肉朽骨者乎及俯三峰望中原見黃河從塞外來下窺大壑精氣之所出入又未嘗不爽然自失也登堯峰記劉鳯記云堯嶺者記堯時水所至也其高踰千仞蓋洪水汩原東南下卑其勢必滔墊古有所識也豫嘗三至乃昭陽嵗冬日自滬瀆水行二十里折從一小嶺曰夏隩迤而登徑石仄若刃屩不能數十武即劌選足所任乃置如此百尋抵石橫道若囷積出五尋蘚被之其闕有樹榆緣撞上至其半跖石斷復攬株枸足乃得駐若釋循坂則滑而墮傴僂若齸行僅進至巔復牽枳擇石罅徐下阽尤視升倍至稍夷草生茸茸坐而墜者再尋有澗從西南來巨石嶙陙交積若水阞之激勢雷轉而實枯硯磳離置又若纍棋礫碎且䃗不知其幾何時矣下視窅深上猶不見其極並磝碻躋橋足曲踊隃磊隗又踦踞沙中屢蹶乃絶澗去崖如覆鍾甬長不及圍下有隧倨句轉穿其篆間石若旋蟲竇之不可圜之阻無不隕也入隙中若霤仰視蒼黑黝不睹躤地無耜廣若布􅍻而密傳人乃舉足踰前撲墜石猝不可踆旁忽決若口呿然得棧廣可尺如畎新伐轉從之且拒巖突搌不能直拓之危度股搖不禁矣厯棧可百武遂曠且夷如環塗容二轍少憩磐石望所涉迷不復辨本非行道強與客進遇拾薪者怪何以達也已遵塗至巖曰斜坪石如板構深壑平視準焉可十丈所前望則窪者為太湖摧者倚者偃者嶕㟹者為湖上諸山其在近則矗如帳列如牙節或伏而興或拱而立其間隴畝錯焉蓋踰險厄而得曠夷是遁甲開山圖所云沙土之堛雲陽之墟可以長生可以隱居者非耶彼得至焉者神廩魄悸孰敢睨視矣顧能廬是間哉又進崖巏㟽􅦾不崷崱而齟齬則甚般躄從其隅不百尋又得一坪曰少坪視斜坪加狹焉而高出之所見如之加闔顯湖始半出至是愈茫茫沉沉浩溔矣或云是可以望月之出河圖緯象云邠之隘上為扶桑日所升宣陸之阻上為吳泉月所登於此夕焉山靜閴下視蕩無止觀當有異特氣厲高噤不任納其爽凄日昳之景亦且自快去之可二里所有臺岠空岋立至者必巨縻縋而升孰汲之哉時道茀未除跋履既竭興猶能一取焉上穹阪隃十尋坼裂如幅於其坼中拾級上又轉而南至院周壘以石被其岨蜿蜒而長樹連抱者雲杪者拱者杙者樠液者中材者千章院傳自唐名免水近裒墓得斷碣乃鐫蕭梁年及唐人詩夫隳燬雖在荒僻非有害於物於人無與也而災仍焉人莫躓於山而躓於垤是非所及矣昔者有軒清輝東之齋與西隱者猶之礫䃸磹燼矣遺與衆草荒曀沼曰碧玉則澄澄湛焉縱廣不足五尋中汚也如釡旁蓋如簦笠仰焉水淫之雖甚淺遇暵不涸樹羃焉窨若室宇瑤碧瑟以栗則玉之在璞矣井尤寒沁而甘題以寶雲泄自宋泉可甲乙天下四摶以巨石瀹之久不曀飪松偃蓋者失向所指院下石甐紩波文若水浸漬䀶焉礛入之豈琢礱為崖側陀陊螔蝓雜螺蚌迹隱隱若洪水方濫岸翼之引可十尋是豈異説哉峰在院左者妙髙雲常衣之霽乃徹崖剡行者耳屬恐抵之仄相貫探前測後目上則與磷謀下則與墜謀餘二十丈許左入不數武有穴窈窈爾投以石鞫然下有穿人或從穿入內崆籠多怪石穴穿不可達又旁穿詰屈出不復從故所下視中如硠磕有聲前復罄拆踰一竇石棧欹偏置之而裏則撥爾而觸置之而外則兀爾不安去之百武有巖深三筵而上穹然乳下垂若出其瓜睅其目作其鱗奮驤欲從風雨玃其縿纚覆者荔屬成羽簿汩越幽隩決蕩沉氣又舍而前則回障鐡倚勢陵崇嵐曀纓帶之林壑振蕩鍤畜豐植冬無散陽夏無燀炎柳栁松㮨生其隂麓嶢崅則雚萑艻槱燎資焉五里達於塗山猶覆原上有峰上橫置石支以三足如釡鬲去之者則石婦闖焉東嶺曰鴨跖如鈴甋綴之蹍皆碎黝若墨鳥迹所不及也夫傳所稱高山廣川大藪也地道之徹於上民神之所依而生之良材者也其記堯水事誠誕則院何以名且洪荒之迹湮不復睹巔曷以有蝸蜱穴焉是尤駭視者且山者徹也巖者嚴也氣嚴而徹是殆蒸化百物不可名狀者也余觀於天下兹山特小爾然於吳差顯奠壤東南震澤為巨壑出其前光屑常陰陰震於怪物登之四望雲霧不知所自出憮然若與精氣接而山川者薄為風雨矣明文海卷三百五十四
