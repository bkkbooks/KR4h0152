body:
  text: 明文海卷三百五十六餘姚黃宗羲編記三十遊覽遊峩眉山記胡直豫以乙丑仲春之念六日晨發峩眉縣西城從了寶樓陟華嚴寺過楚狂接輿隱處潄玉液泉徘徊懷之西上為中峰牛心二寺為雙飛橋雙飛者以二水從山巔懸溜百千丈始合流於谷底震蕩林木間聲轟如也南為後牛心寺為孫仙洞寺僧出視孫思邈丹竈藥爐製甚古西為白水寺寺後羣峰林林若笋然是夜宿寺閣詰朝卸去車從乘小籃輿上頂心坡坡漸峭行若躡壁衆戒下窺余下窺自若也又上為九嶺岡長老坪猢孫梯咸斗絶又上至峰名初歡喜雪皚皚封崖壑猿鳥盡絶以為至矣巳而歷蛇到退至梅子坡最險雪益塞道不能以輿乃與從者魚貫縋牽一丁傴僂互管而上一休一升仰視峰腰咸雪白一色絶頂蒼鬱髣佛倒出漢表雖自顧疲殆而神從景王不羽欲飛乂上至雷動坪坪上巨木凡幾千章皆金鐵幹被緑髮苔雜氷雪磔格聲琤琤然中通一徑可七八尺許左右深陷倒視窈黑雲霧茫沆相逐不知幾千百丈也相傳雷雨居其下一聞人語鼓吹聲則雷大作過者毛骨灑然非人世矣豈所謂倒景非耶又上為八十四盤險踰前北上至峰名大歡喜路始平入天門石石雙峙如門歷七天橋抵光相寺寺殿皆鐵瓦是為絶頂環顧白雲滉漾若身在混沌視天腳反在下有二鳥名佛見及異鼠咸就人取食若相識然僧告豫曰時暮矣明晨請覩光相豫宿至晨起稍霽衆躍曰光必現矣比豫跂崖巔隂霧漸塞靡所覩見有儒者曰是必不見彼下有放光石當其雲蒸日麗與石相摩蕩為之光光不為異余曰唯唯有禪者曰是大不然此光出時一切見者於彼光中各見已像甲不覩乙乙不覩甲若此光者出於雲日則當如水中鏡中彼此互見乃知是異余曰唯唯於是峩眉曹尹進曰某去年侍訪院王公守巡楊王二公咸值光現各覩厥相果不互見人譽其所常見而毁其所不常見姑不逺見即此蜀地若火井油泉皆所自徵若皆以常見毁之豈不誣哉子思子曰及其至也雖聖人有不知歐陽子曰聖人治其所可知置其所不可知者是謂之中道余亦曰唯唯至午有驛騎促余歸下至梅子坡雨如注行者艱倍前日竟不得覩所謂光相佛燈及雪山瓦屋之奇下逮黑水龍門咸莫到焉至雙飛橋有僧楚山潛奧洞十年忽自牛心山後披荆莽間猿行出逆余訊曰山巔覩光相乎余告以登陟危阻未有睹楚山囅然笑曰公豈以未陟峩眉為安乎彼未嘗安也以未睹光相為少乎此未嘗少也余又曰唯唯既還雅久之有峩眉馬鞍山僧某者自山五百里踵雅稽首乞余紀遊豫憫其勤為書大略貽之桃栁記吳鼎宋蘇子瞻守杭日既浚西湖築堤堤樹楊栁世稱蘇堤栁更四百餘載剪伐衰耗可知巳今上之十一年侯官王君為錢塘令循行故堤歎曰仁侯之迹也而湮廢至此乎間課民補樹栁若干桃居其半君過之喜曰是不足想見東坡公風教耶君既入民部他日薦紳大夫士女過之喜曰是不足想見龍江君風教耶好事者寫為王堤桃栁裒諸賦咏識去思云往余從君觀堤上余請君數所樹籍而藏諸掌故禁後母樵伐君笑不應今春余過之屬桃栁盛布而我君溫恭盛德不復可從凄然感舊頓令人思封植嘉樹以母忘遺澤邑中父老子弟孰不如我而奚俟禁制之哉又安知後之人不續樹以紹君美如君之續樹紹蘇公者耶詩云我躬不閲遑恤我後言君子患其身無以示民毋憂身後變置其法也昔者君不我應有以夫有以夫君去之明年為嘉靖十六年其夏五月已卯朔故民吳鼎記許泉亭記許相卿許泉故郭公泉也石門山人更為之名浙山水勝天下泉值江回谷邃處涓涓出傾崖嵌竇中俗逺境絶為尤勝山人過而樂之亭其右卓錫焉已而喟然歎曰有天地則有兹山有兹山則有兹泉臨兹泉挹且玩者前公而往後公而來可十百數耶公專而名之者何尚其志不二於物而托之泉泉由以傳然則非公名泉泉以公名爾天地之間名可以榮利可以富珍麗之物把玩之可以怡情交乎吾前日紛如也世固嘗畢力營之忘死趨之志溺分渝造物者莫之許而有也或有之弗久或久之得咎猶無許耳况名以傳耶秀自分稿寂淪放世無可撓吾志者兹泉洌寒孤迥委藏於奧阻荒間之區用可資於世莫便於用也秀適遭之泠然而㪺沸然而瀹暢然而飲嗒焉樂以終老人莫吾競造物者莫吾禁也公去我來泉將不許我乎故更之曰許泉持以告豫豫憮然莞爾曰有是哉山人以正德十有四年八月九日亭豫以嘉靖元年正月三日記顔溪記吳鼎杭故洲也東塘西堰而中城焉所謂左江右湖者也湖清甚無巨魚宴嬉之舟歲費千金然以其麗也非特杭人日噪焉天下知名久矣東瀕江淤壤數十里每潮汐之候雖大旱土倐津潤用是宜農圃蔬蓏尤良諺曰東菜西水明非他方所及然以其朴也若顔溪者非特不逺聞杭人亦罕造焉出艮山門迤東七里為顔溪或云顔氏嘗主之故名或云顔鹽也溪經斥鹵若沙田云爾溪稍南即沙田東北指赭山赭山海門也潮汐出焉今司冦胡公别業溪上依水竹結廬面田築場不垣不斫胄子子忠未入成均時恆遊息焉樂之自號顔溪主人是溪之味不甘於西湖瑩徹乂不如湖載糞壤鳴桔橰飲牛浴蠶不雅於畫舫金罍而鼓吹也黃茅苦筍榛莽彌岸非若蘇堤之栁闕二字之荷蓬戶草堂話桑麻憂雨暘督稼觀穫而聽耕田之歌又非若漱玉泉汲龍井聆水樂紺宇在前雲樓映後而放鶴觀魚其間也沿濯斯溪皆黧面塗足之夫鄉音刺刺不入耳豈如湖上麗人簧言玉貌而羅綺金珠者乎之數者明知其不如而避彼擇此蓋佚則淫勞則好善其擇之審矣於是見司冦公恭儉之風子忠保家令德胥可為法記之表泰山之巔碑記万恭隆慶壬申春黃河泛溢輸道梗湮天子憂皇命恭若曰汝其治水踰夏河成灌輸悉盡天子懌豫命恭若曰汝其東封於是臣恭以八月禋泰山報成績也余乃歷巉巖踰險絶撫秦碑登日觀已乃陟山巔謁天宫忽緇衣蹁蹮目瞪足踐招余言曰是泰山巔石也余異之視其上室如錮也視其下砌如砥也而惡知夫泰山之巔而又惡知夫泰山之巔之石余喟然歎曰夫泰山擅四嶽之尊而兹巔石又擅泰山之尊乃從而屋之乂從而夷之又從而踐履之令尊貴不揚廢靈異不表見余過也亟命濟倅王之綱撤太清宫徙於後方命之曰第掘地而出巔毋刓方毋毁圓毋斫天成返泰山之真已矣倅乃撤土嶺出之巔石博十有一尺厚十四尺有奇聳三尺戴活石焉東博二尺五寸厚一尺三寸西慱一尺八寸長八尺有五寸夫約泰山而束之巔已奇甚矣乂摩頂而戴之石斯上界之絶顱青帝之玄冠也余倚活石覽觀萬里俯仰八荒逺睞則扶桑之日曜其東崑崙之風吹其西近眺則秦碣石若正笏叢石如羣圭而齊魯諸阜圓者似金直者似木曲者似水鋭者似火方者似土枕青陽之綘闕俯元君之幽宫而六極之大觀備矣彼巔石不表見幾千萬年矣今出之始返泰山之真而全其尊後來覽觀者尚毋刓毋毁毋斫其天成務萬世令返其真而全其尊以毋得罪於泰山之神其緇衣蹁躚意乎余問緇衣何許人何所受而告余默而不答噫我知之矣蓋緇衣受之碧霞碧霞受之泰君泰君受之上清上清受之元始元始受之寥冥之祖閲外城記王樵萬厯二十一年十一月二十一日同內外守偹參贊部臣閲外城豫以攝工部事出太平門尚書徐公以攝兵部事出神䇿門豫以五鼓盡至觀音門官廳俄而守備邢太監泰寧陳侯相繼至既而尚書徐公至黎明循垣內東行垣皆國初蒸土所築極堅厚上以蜈蚣木出簷覆之以瓦歲久土有剝落木瓦有頽壞則修之至今埀三百年外郭周百八十里包羅山谷誠前代所未有也北面一帶因山為險據江為守自觀音門而東繞鍾山之後而左皆岡阜不斷在東北曰姚坊門又南曰仙鶴門乂南曰麒麟門地勢漸平鍾山側看成峰橫看成嶺攝山後峙青龍左繞石城右踞天印為案於此行頗得其形勢之的而知我聖祖於金陵定鼎於鍾山卜吉以為萬年之藏聖鑒髙逺非尋常可窺也是日由南出者為協同守偹劉監丞定西蔣侯起鳳臺門又東曰夾岡門又東曰上方門又東曰髙橋門南北兩路同會於滄波門有官廳曰閲城會所內外守備兵工二部堂序坐飯畢豫與徐公入朝陽門道中審見鍾山蜿蜒扶輿衆山環拱南面空濶秦淮流於前大江繞於後沿江諸山乂皆遙為金陵拱護其面勢與尋常所見不同蓋從髙而下始得之也歸至工部與四司官議修城事頗言修內城易修外城難內城縱有崩壞舊甎多存用甎灰補修新舊即成一片勢自堅久外城原以土築土有剝落用土坯幫砌不久即壞後易以甎土外幫甎雖可暫支一時而甎土原不相入尋亦崩壞若欲永久不壞須如北京外城一如甎城之法裏雖用土築外則用甎實砌非幫砌之比故得堅久但北京外城止南三門一面南京外城則連亘遼濶其功實難周書畢命曰申畫郊畿慎固封守周禮大司徒乃建王國制其畿方千里而封樹之有掌固司險掌疆封人之官掌修城郭溝池樹渠之固頒其士庶及其衆庶之守郭即今之外城所謂溝池樹渠之固恐大略如今邊牆之制有牆以限隔有墩臺以瞭望拒守有渠以環之有樹以固之牆之比城易修而亦足以為守比城易修者以用土築而不用甎也欲其足以為守須備前所云四者而後可以經久則在當事者以意損益而已閲內城記王樵是月二十五日閲內城內外四守備兵工兩部堂會於通濟門黎明登城如前分閲劉監丞蔣定西由西歷聚寶門三山門石城門清江門定淮門儀鳳門豫等由東歷正陽門朝陽門太平門神䇿門金川門鍾阜門而會於淨海寺寺在城外據獅子山趾獅子山在城內即國初建閲江樓處是日頗盡金陵大觀蓋內外逺近畢見也通濟之外秦淮之池雉堞不甚髙徑不甚濶僅容兩馬俯視甚峻而基實𢎞濶瓴甋兩面厚可丈餘而附墉之土則長坂天成濶十餘丈雖不設臺亦無慮也至正陽門下輿而過旭日初上朝煙未消南望郊壇北望大內如在圖畫自朝陽門而北則鍾山在外隆廣山在內城貫二山之間包山而過孝陵中松柏參天溪谷逶迤歷歷可數隆廣山蓋鍾山之足隴石崔嵬亦多古木有巡山官軍跪迎山上道中見松柏枝幹多作虬龍之勢皮似鱗甲在動植二物中恐亦得氣之相類者歟城隨山勢此處獨髙歷級而上東北折處為孝陵後門自此而西至太平門城皆在岡隴之上太平門居隆廣覆舟二山之間門外長堤數里為三法司面城臨湖而在鍾山之趾玄武湖在覆舟山之後城亦包山而過自此至雞籠山岡隴不斷城皆因山而臨湖湖逼山趾城與湖相逶迤蓋至雞籠山之盡城不復西别築城下循湖而北為神䇿金川二門蓋至此始為城之極北處也城降於雞籠之後者一等有便門歷級而下自此玄武湖之曲折始得盡見新舊册庫在湖之中此處最深湖連亘太平神䇿二門之間環湖村落櫛比土田畦壠方整宛如棋枰自此而西則大江迤邐而東繞出帝都之後逆江而上皆山也江山之險實天造地設傳曰天險不可升也地險山川丘陵也王公設險以守其國設險亦因乎地險汴為四戰之地所以不可都也金陵以江為險人之所知而用險之道人或未盡知六代南宋雖偏安即其保守一隅能却敵而制勝如周瑜王導謝安韓世忠虞允文者亦有用之之道矣自金川北繞獅子山於內雉堞東西相向亦建二門曰鍾阜儀鳳金陵在春秋時本吳地越句踐滅吳築城於長千里俗呼越臺楚置金陵邑於石頭金陵有城邑自此始秦始皇以望氣者之言鑿方山斷長壠以泄王氣其河源二一出句容華山一出溧水東廬山合流入方山埭自通濟水門入都城南經武定鎮淮飲虹三橋西出三山水門治石城以達於江乃今所名秦淮者也東漢末以秣陵地封孫䇿為吳侯至弟權據有江東築石頭城因山為險扼江為守即今石城門一帶尚其遺趾也改秣陵為建業建安十三年移丹陽郡治建業遂徙都焉都城在淮水北五里據覆舟山西倚石頭以為重後帶玄武湖以為固前柵秦淮以為阻今詳審其地實得面勢之正南五里至淮水有大航門宫之後有苑城晉所謂臺城即此也赤烏四年東鑿渠名青溪自城北塹泄玄武湖水九曲西南入秦淮今僅存一曲而己金陵建都實自吳始其故迹大略具於此矣海岱記王樵豫年十三四時從先君官東萊嘗一至海上泰山雖未登道中先君每指示之初不甚了了及過魯境東方空曠逺愈分明後讀杜詩乃知所謂齊魯青未了者為簡而盡也嘉靖庚申待罪按察乂得奉遺軌尋舊遊至以六月諸僚間相邀泛舟大明湖芙蕖盛開舟行翠蓋間自謂身在水仙之國渚沚間時有村落忘在城市一日遂放舟出水門至華不注山而止城北古木蒼然清溪印月一時幽興言不能狀竊謂錢塘西湖不足以過也華不注為歷下主山諸山環伏此獨孤秀山以逺而妍此山純石不樹而黛色可挹逺近皆妍趵突泉今為午道數因送客至焉喬白巖嘗因遊此而起尋源王屋之興蓋王屋山至髙而險流水發源其頂入太乙池而伏九十里復見為東西兩源所謂東流為泲者也俗傳泲源能出物以應人之求然率於三四月間蓋春夏之交泉脈騰沸而泲尤徑疾物隨沸而上故餘時即否無他神異也再出為趵突泉曾子固謂嘗有棄粳於黑水之灣者而見之於此正與泲源事同然子固謂岱北齊東南諸谷之水滙於黑水柏崖之灣至於渴馬崖下泊然而止潛流地中北至歷城之西復出為趵突泉而不明言其為泲水然歷下發地皆泉實皆泲所過也瀦為大明湖注為濼水分為大小清河皆泲水也唐李賢謂泲自鄭以東貫德曹鄆濟青以入於海然則人稱絶於王莽時非真絶也山東苦溝洫之政不修儲泄無法故旱潦無備可耕之處往往棄為蒿萊歲一不登民輒流移須朝廷加意責成監司守令有以為之處而後可東三府差勝於西三府然總不如河南也山東人人習武雖五尺童子亦能射有能修太公管仲之政他日未必不如李抱真雄視諸方也臨清南北襟喉山東巡撫宜建臺於此以鎮之設險以守國道宜然已至審飢之法須編入村落沿門喚集給票注簿示有期日使按期而來不併聚一日然後依次給散則里老吏胥不得作弊而窮民得沾實惠庚申年山東飢巡撫奏準發粟賑貸豫以此法行之又設粥於寧陽親往監視同僚多謂其過豫謂晦翁在浙東單車却導從窮簷之下無不到故民隱無不知今猶患不能如此豈過耶景王之國道出山東舟大小千艘用夫二萬餘用七道民壯皇筏夫沿河接遞夫猶不足量派裏縣鄉夫豫慮其擾則命鄉夫且緩派憶昔為行人出使時見夫役有一程接代不至便嘵嘵有言及與雇錢則連行數程不稱困乏因知沿河雇募便可取足白於巡撫請盡罷鄉夫巡撫初未以為然及聞前路鄉夫被王舟人逼索剝奪有投水溺死者縊者逃者蓋鄉夫頗有衣裝乂蠢懦故舟人得肆虐乃如豫前議彼沿河人皆積猾衣縷蓋形不足腰裹三升棋炒錢十數文舟人無所索王舟自平原至沙河二千里一用雇募費省而人便半月而出境有司可委托者多為同僚所占不欲與之爭剩下典史驛丞素署下考者豫因呼而用之至則激之曰汝等自新之機在今日皆叩首願自效蓋王府人役非此輩不能與之言有以塞之使之安靖而過不受擾足矣臨清知州為王府人圍逼至欲自戕王舟夜過某閘束燎不續致問巡撫巡按安在孟知縣至於被鎖此可見矣汶水自古東北入海以智力導引使南接淮泗北通白衛實創自元人而成於我朝二百餘年歲漕四百萬石按期而至南北三千餘里官私一航閲月可達物貨相輸有無相濟故漕河國家之津脈有不通當求所以通之之䇿若欲舍此而彼求縱曰可濟猶非至計况必不可成如近日膠萊之議乎凡為漕河之患有二曰泉流之微也曰黃河之決也泉流之微起於泉政之失也凡係泉流所在疏導以時沿河水匱閘堰儲泄有法尺寸之水盡為漕用故以一汶之流濟千里之運而未嘗不足後七十二泉聞多湮塞儲泄之法悉不如前此可諉曰問諸水濱哉至於黃河決而南北皆有害決而南則徐沛淮揚受其衝而祖陵尤可虞此莫大之患而人猶狃目前之安卒無善後之䇿決而北方憂其害漕而又憂至於廢漕者繆説也余闕固云人言黃河北恐會通之漕廢吾謂黃河北而會通之漕不廢何則漕以汶而不資於河也此言可謂盡之然河勢若此而衝入會通則閘座皆廢幸而通流則舟行閘面一日數程暫若快意不幸而橫決有決有塞至於斷流舟楫不通而水匱閘堰素費工力者皆為所壞修復甚難此則害漕為勢所不免故人言引黃河以濟漕河未嘗不可導之使北何也天地之有四瀆猶人身血脈之有大經絡瀆者獨入於海也今河淮併行河奪淮之道至於泛濫猶人身血紊經絡此豈可謂天地之常也哉河水重濁號為一石水而六斗泥下流少緩上流必淤是以海口積成大沙以河淮併行淮道隘小去不迅疾之故也今海口之沙不可去上流縱築隄防約攔水勢安能永久無事欲永久無事惟有縱之使北而已或曰河淮併行幾年於兹矣非不欲使之北不可北也吾謂不然所謂不可北者若謂利害有不可則吾前既言之害漕之害孰與祖陵之重智者尚當權其重輕况河雖北而漕可無害尚有䇿乎若謂河性不可使北則尤不通於理不達於河勢矣漢時河有徙次止在北方去禹故道未嘗相逺漢武帝元光中河決於瓠子東南注巨野通於淮泗武帝親臨決河公卿負薪卒塞瓠子築宫其上名曰宣防而導河北行二渠復禹舊迹而梁楚之地無水災平帝時大司空掾王橫言秦攻魏決河灌其都決處遂大不可復補宜徙完平處使經西山足東北入海是前代定論固惟以復禹舊迹使東北入海為是矣逮後世不能如武帝逺見決意瓠子之塞所以多河患孟子曰禹之治水水之道也後世失其道而南豈河不可使北哉或言禹九河故道在今滄瀛景德之境密邇神京奈何引河患使近哉吾謂兩京俱為根本重地以祖陵言則南之害迫而難緩議以地勢言則北之害猶賖而可預圖况太行西繞黃河又來朝拱京東鈐鑰益固豈不有助於神京之壯反謂延患使近哉夫黃河治則不難於修復漕河漕河復則不必復言海運今膠河之議雖罷海運之險尚未有極言其不便而止其議者丘文莊公海外人故專言海運之利彼所謂計損失之少者歲到之米數而不知海中漂溺之事無日不有太倉但責歲到之數無虧而不問其他有司預有損失之虞安能無倍贏之輸而舟卒民力元人視為痛癢不知者安嘗一一報之官而書之史乎以近日徐沛間黃水泛漲之時猶有漂失乃改冬底起運以避此而况海中乎長運之軍歲無休息復驅之海情將不堪勢又及民兵民俱困矣借曰募其願者寧有幾也故閘河必不可棄海運必不可行閘河惟通故南北貨物交輸官私船隻繹絡兩岸人民輳集兩京津脈相通所以為國家全盛氣象若行海運則閘河必以無用而廢閘河以無用而廢則南北貨物官私船舟寧能如前日之通行乎兩岸人民必以無業而去寧復如前日之輳集乎自此浸成蕭條豈國家全盛之氣象乎或又言兼行海運非欲廢漕河也漕河或有遲阻此不至而彼至且因以習知海道不亦可乎此乂計之左者也聞太倉已有數年之儲漕河或乂遲阻自有轉般之法可行何事而兼行海運幸冀於此不至而彼至乎况自經倭亂以來人心日壞盜賊之變在陸地猶難盡防海中之事尤不可預料吾恐自此生事而習知海道之人欲為冦偹而先以啓冦元人之鑒固未逺也膠萊河者源出髙密縣南自膠州分流北至萊州府海倉入海風帆一日夜抵膠入膠河至海倉入海風帆二日夜抵天津通計海洋之中不過六百里耳元人疏濬欲以避東海數千里之險以末運兵梗而止入我朝士大夫以海運有風波之虞漕河或有意外之阻多言可開此以為餽送别道而朝廷未曾試其利害萬厯中用尚書劉公應節之言試而難成乃罷自是膠萊之議息矣因記於此諺謂此河為銅幫鐵底難於開濬又難於通津舊議所以為通津之䇿者有二一曰兩頭海潮一曰中路泉濼今勘河髙而海下勢本難通又南潮止及陳村閘距海口二十里北潮止及楊家圈距海口六十里遇風迅潮疾或至朱鋪亭口不可為常且潮水倐忽長落運舟寧無守候耽延况潮之所及有限乎此通潮不足恃也泉濼之説初謂沿海郡縣凡流泉湖濼皆可如漕河引泉之法以時疏之賴以為膠河之濟一曰沽河源出黃縣一曰張魯河源出髙密鐵橛山衆水所聚名曰都泊即公孫𢎞牧豕處周百餘里中隱二三十泉可濟分水嶺之艱一曰淮河水勢極大冬夏常流亦名淮河諺曰膠翁淮母無媒不偶此三者實膠萊河之命脈也今勘前項河濼最下之地為秋潦所歸十月以後日漸消耗至春月泉脈微細適糧運湧到之時雖置匱建閘終不能使之源源而來此引河不足恃也乘潮引河皆無足恃又况瀕海之地上多積沙下多碙石沙在海中者潮水湧進沙必隨之而入沙在地中者畚鍤所及沙必隨之而出土可蕩盡沙則下沈非挑除所能絶亦非堰閘所能障也至於碙石人謂錐不能入此乂難於挖沙矣庚申冬與參政林君登泰山初十餘里皆髙岡至回馬嶺始峻拔車馬不可上坐板輿用伏機可轉數人扛之二人挽之前者見後人頂後者見前人履底而坐者常平計三百四十一盤四千三百七十四磴初望髙峰刺天有白雲縹眇其間以為絶頂及到天關又在踝下下瞰神悚至頂尚十里也時當雪後初晴千山之巔猶白下視一氣混茫上下一色恍如身坐水晶宫因咏南軒張先生之詩曰人立千峰秋色裏月生滄海暮雲邊噫大哉遊乎日觀峰五夜見日出唐人言交州望南極才髙二十餘度八月望海中望老人星下列星燦然明大者甚衆乃渾天家以為常沒地中者也人以平地見日出而疑日觀之事正猶未到交州者不見南極下星爾林君問豫孟子小天下之説豫曰泰山特起東方青徐兖豫適旋其趾人目力有窮使有神人立此俯眺八荒則恆華嵩霍直相拱揖耳太行如几河江如帶皆歷歷在指顧間林君笑而不語乂問天下之山無髙於五嶽者乎豫曰以泰山觀之陟而始知其髙入而始知其深竒峰峭壁乃隱乎回巖復岫之中其勢之來者逺而鬱盤者厚是以為諸山長雄臣僕後先而子孫環擁匪以其髙也意五嶽皆然不然五嶽之外有他山尊者矣豫因乂論古者山川之祀壇而不屋今乃人其形宇其地又元君縱是仙靈不知於泰山何與使嶽神反若失位皆不合祀典所當釐正秦漢之君以不遇風雨得上封成禮為天之殊貺而今齊民雜糅褻瀆已甚亦所當禁欲行而未暇也自至山東欲恭謁闕里而非職事所經不得特至明年春始得至焉當别為記尋以謝病歸不復補兹為闕事矣登招寶記沈愷余吏明州三年至三登招寶招寶臨大海四望浩渺與天無際海中諸島隱隱如鳬鷗拍浪時時飛聳欲墮日本琉球諸番異域遐眺亦歷歷可指數誠天地一竒觀也興極偕二三同志登最髙峰頂坐石巖酒酣耳熱仰天嘆曰其有憑虛欲仙乘風雲而下來者乎乃瀉酒石上歌紫芝曲欲起黃公與之遊而不可得興盡而返蓋愷吏兹土民安其拙且承平日久民不知兵戎伍蚤起日持名籍至衛門報喏歸則偃卧無他事傍海居民亦往往牧雞豚放葉舟取魚蝦入山採松檜為薪或挾弓矢獵狐為樂山中六七十翁煦煦如小兒狀竟不知邊境為何如事乃今有不盡然者邊檄報漳民通番舶取息幣時肆摽掠憂時者至募民為兵乃帥其人晝夜警日出鼓鉦日入燎輝至振鐸巡鼜植棘樹墉坎山谷以守人情洶洶海邦驛騷若朝不謀夕時天久不雨俄而雲密欲雨風颯颯四起往余見海上人道招寶山頂望日出海雲生樹石巖屋聽風雨逈異人世客有好事者勸之一登曰盍往觀乎余曰山海宛然昨也余非前日之意况矣夫國家恩養軍士若驕子然若有緩急卒不得其死力其捍患禦難往往出於市井網罟之民果何為邪果何為邪余為唏噓久之乃望洋而歌曰海水洋洋兮天為茫茫我心憂傷兮曷為其亡明文海卷三百五十六
