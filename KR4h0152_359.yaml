body:
  text: 明文海卷三百五十九餘姚黃宗羲編記三十三遊覽泗州基運山小記蔣德璟泗州與旴𣅿縣夾淮而居相距五里許度浮橋從州城外沿淮北行十里渡小河即基運山也山一片皆漫土嘉靖中始改稱基運云易輿以馬入御碑亭佳氣蔥鬱古柏萬株數百步為紅門旁即祠祭署也世襲奉祀朱自讓來迎引入殿前行五拜三叩頭禮殿前竪石闕四石獸十六石馬六內臣控馬二朝臣十四殿內三黃幄置神座德祖玄皇帝后居中南向即髙皇帝髙祖也懿祖恆皇帝后居東西向熙祖裕皇帝后居西東向其陵寢神宫御器一如孝陵及天壽制殿門後即熙祖陵所稱萬壽山者也髙皇以世湮逺不輕祖故斷以德祖為肇基而德懿二陵經兵燹亦失其處故止於熙陵寢殿行望祭焉龍脈西自汴梁由宿虹至兩溝鎮起伏萬狀為九岡十八窪從西轉北亥龍入首坐癸向丁一大坂土也殿則子午陵前地平壠數百丈皆髙數尺繞身九曲水入懷從御橋東出與小河會又前為汴河其左為陟河為二陳溝乂前即泗州城有塔又前為大淮水水皆從西來繞陵後東北入海而淮水灣環如玉帶皆逆水也又前即盱眙縣治米芾所書第一山也山不甚髙然峰巒橫亘八九與陵正對即面前案山又前二百餘里為大江而陵後則明堂九曲水繞玄武又後為影塔湖又後為汴湖又後二百里為黃河又數百里為泰山大約五百里之內北戒帶河南戒襟江而十餘里明堂前後復有淮泗汴河諸水環繞南東北惟龍自西來稍髙耳陵左肩十里為挂劒臺乂左為洪澤湖乂左為龜山即禹鎖支祁處乂左為老子山自老子山北至清河縣即淮黃交滙處也陵右肩六十里為影塔湖為九岡十八窪又右為栁山為朱山即汴梁虹宿來龍千里結穴真帝王萬年吉壤縣令孫徵奎云大水時殿前可一尺其山較泗州城中地髙可丈餘惟御碑亭前築堤稍斜射而東一帶人家蔽塞案山似於明堂為礙耳午飯祠祭署朱君所因與瓏熺酌數巡而歸謹按圖説稱熙祖世為句容通德鄉朱家巷人生宋季元初至元間因亂挈家渡淮至泗州見其風土醇厚居焉泗人會社常推為祭酒居泗凡三十八年一日卧屋後楊家墩下墩有窩遇二道士過指卧處曰若葬此必出天子其徒曰何也曰若以枯枝試之必生葉亟呼熙祖起祖故熟睡道士乃插枯枝去十日後熙祖侵晨往驗果生葉因拔去生枝别易枯枝前道士復來心異之見熙祖在旁因指之曰必此人易去遂語祖曰若有福沒葬此當出天子語訖忽不見元致和二年丁卯夏熙祖沒因葬焉甫封土即自成墳仁祖年四十六冬十二月攜南昌旴𣅿臨淮三王及曹國長公主遷於鍾離東鄉至旴𣅿之木場里淳皇后見一異人修髯奇貌黃冠朱衣象簡授白藥一丸神光煥發使吞之遂孕明年天厯元年九月十八日太祖髙皇帝生聖造戊辰壬戌丁丑丁未也遡葬期甫歲餘耳將誕之夜紅光燭天里人起呼朱氏火及至無有也舍傍故有二郎廟時聞空中語亟徙去至曉果徙東北百餘步髙皇帝甫生淳皇后抱浴池歎曰家貧乏襁褓具奈何忽紅羅浮水上因取而衣之今傳為紅羅障其生處常見五色王氣世名明光山有紅廟在焉廟在旴𣅿縣靈迹鄉距縣百二十里及髙皇帝龍飛定鼎金陵追尊四代已建仁祖淳皇帝陵於鳳陽因命皇太子至濠泗祭告祖考妣於泗州然未識玄宫所在時向城西瀕河憑弔歲時遣官致祭洪武十七年甲子十月十二日宗人龍驤衛總旗朱貴從軍於外年老始歸即畫圖貼説識認宗派指出居處葬處偹陳靈異始末貴故偕熙祖兆渡者上即命皇太子至泗修建陵寢號曰祖陵命禮部製造三祖考衮冕冠服瘞殿後每歲大小二十六祭設祭田一百四十九頃僉選人户三百十一四户因授貴奉祀四品服色子孫世襲管理署事當貴面陵圖時恩賜田宅鈔錠金帶衣服等物寵賚有加令置祠署於貴先人所居之稍北其東南即熙祖舊屋基特賜奉祀官世為葬地及貴子紱襲前官髙皇帝召入謹身殿賜膳一桌復賜御前子鵝肉諭以莫嫌官小與闕二字濟而楊家墩者宋保義大夫楊浚大理寺評事楊𥅆墓也命改遷於陵西之黃岡里復諭户部免守陵户役及一應雜色差糧嘗曰濠泗實朕鄉里陵寢在焉人民理宜優恤諭署民曰鄰近荒田儘力開耕永不起科不屬有司衙門諭署官曰你衙門裏無刑名造作也不刷卷嗣是文皇帝駕過泗州詣陵祭告賜金飾鞍馬鈔錠田地四十四所並服役百户內侍等官又命朱貴子紱諭泗州降有功駕渡淮仍以令牌召紱至營賜坐溫語移時賜父老牛酒慰勞焉列聖承統皆遣重臣祭告景泰時以不雨𢎞治時以大風傷陵樹嘉靖時以陵前山石墜以基運山從祀方澤以皇嗣未生以修陵工完皆遣重臣祭告萬厯二年七月十四夜大風雨損壞殿宇門牆及湖水衝激東南角岸命南工部郎郭子章修理并砌石堤二十年復命南禮侍曾朝節南工部郎沈演周詩再築護堤二道然陵窩稍低前後土頗髙似不須堤且諸水朝宗一望瀰濶亦非堤所能障也况舍其右而偏左又有鋒刃尖割之形乎今秋七月二日大水泗城幾沒廬舍皆壞民悉走旴𣅿山阿至初冬水始退而陵殿前水幾一尺賴按臣設法防護得無患則堤不足恃明矣朱自讓即貴十世孫舊為粵幕以鴻臚序班改今官其人亦醇謹崇禎辛未臘二日侍講蔣德璟記遊宫市小記蔣德璟京師有三市廟市者都城隍廟左右街也以朔望及念五日燈市者上元燈節也以正月十日至十八日在東華門外宫市者皇城之內紫禁城之外以每月初四十四念四日諸士紳多行觀崇禎元年臘月二十四日上萬壽聖節朝賀畢從會極門過文華殿出東華門循玉河而北計護皇城紅鋪內三十六外七十二云至東上門而北即宫市也其繁麗不如廟市然諸貨亦畢集直北行復轉西為北上東門過北上門即後宰門也曰玄武門後為萬歲山山凡五如列屏而中稍髙出北上西門有兩坊甚壯麗一曰先天明境一曰太極仙林二亭金碧尤輝煌一曰炅真閣一曰靈軒而中即始青道境肅皇帝建也循始青而北曰福靜門又北為窖轉西為陟山門則鑿氷納窖甚多小憩樹槐下觀之登二亭望西海皆氷遂至遼后洗粧樓僅空山耳度橋即坐小橇行氷上以一人曵之行甚駛穿橋有二坊一曰堆雲一曰積翠繞山而北登岸觀龍舟甚敞壯舟濶三丈六尺上有樓樓有龍床龍椅及后妃六椅其下窗楯尤鮮麗旁小舟甚多俱藏於船屋循海北而西為雷霆洪應之殿乂東為內教場又東為五龍亭中曰龍津東曰澄祥西曰湧瑞乂東曰滋香又西曰浮翠惟中亭獨出數丈餘亭如手如驂如雁而內殿宇又聳拔其門曰福海夀嶽又西南為香津亭入仙芳門昭馨門又北為虎圈過牡丹園可數千本過芙蓉承華門又南為飛靄亭金鼇玉蝀大橋折而西為永亭門遂出西安裏門為十庫為西華門而歸同逰者兄中黃及同館王宫講昆華也永州西山逰記蔣鐄余讀栁司馬逰西山記己為永州屬吏二載未得逰今年冬詣郡謁分藩使者間出郭西度湘與茶菴僧本公步尋栁巖指謂余是巋然西面者芝山也明日導余往踰二岡見峭石巑岏削立簇然如林小廬其罅奉天帝繚以坦屏諸石於外余窮搜之石皆拔地起縱橫疊架如庭如户矗起如柱刻畫巧綴如芝故土人用以名山稍下峰益奇峭右折有亭如官舍芝之右石益森森與余所厯者東西對峙勢稍低嶄巖玲瓏亦如之石上橫碣刻鄧觀察九日詩讀其序芝山者即司馬所逰西山也司馬紀及西山而不及芝山永人特以芝重山耳韻人固不道也迤西漸夷曠迫崖而俯瞷則幽巖復洞棊布於足下僧引余遙睇前跋層巒而降側步巖間青障壁立數仞邪如半里石盡飽煙雲色洞口軒敞可容席許深可五丈其幽有光如牖迤西有石梁亘巖隙崖口橫裂丈餘如琢其隙通寶光即所見如牖者也其底深數尺勢逼而鋒鋭不可受足憑崖而探之何物五丁與垂爭伎倆乃爾循崖而東復道所厯諸奇而徑稍折就埤仰望益蕭森骨益瘦刻追琢益籠蔥疏林幽竹映帶扶疏崖窮而佛閣始側出其東為金檀寺幽絶人間恨甓埴半頽於風雨是日初冬氣和輕雲漏夕陽湘流如染逺山如黛本公令侍者以佳茗從每逢奇賞啜茗數杯茗盡而奇賞未已余自客永山之勝此為最生平雅遊亦惟此為最然後知栁公逰記特筆其冠冕未悉其奧窽也余乃悉書續之栁巖蔣鐄栁巖在愚溪橋可二里踰數阜下平疇始見峭石巑岏亘如陳巖口西向縱橫丈許深數丈仰視石理頗澤巖頂奇峰突兀萬狀頃嵗有治葬地者令石工鑿之破竹積巖前厚尺許諸奇石略盡大令栁先生短氣余語僧曰即是巖無恙永人故無過而問者乃遂遭石工之厄永石窟也取石於永猶取米於太倉也獨爭此巖哉巖以一人成以一人毁成毁殆有數與兩人並是巖知已淡巖蔣鐄淡巖在永城西南二十里山谷老人記謂瀟湘八景之一負湘而襟嶺望之如魁丘左折而上巖口如坎躡石級下深可五丈虛敞可三畝其平如掌可磐礴其上片石隆起若覆釡若集隼而膚理澤如膩仰睇受光有三竅表裏洞然無黯黮窈深之苦巖之隂有僧廬五楹荒涼香火不能給一衲子應門而已其陽有官廨吾友王令源修所築以駐遊鞅余往來永州數數探之始至極賞其幽奇已而探九嶷斜巖覺淡巖望實稍損兩巖奇峭大都髣佛然斜巖附深壑如武陵漁人初入桃源意不可窮淡巖突兀道傍如鮫絲霓縞清雅絶人恨短幅不堪裁剪第使兩巖不相扼當無能伯仲此者然永人不問九嶷則兹巖亦幸遇已逍遙巖蔣鐄逍遙巖在邑城西五里一峰峭矗拔地起數十仞枵其中若堂南向光明洞然可布數席右入窈窕如永巷數十步抵北向一小穴可傴行出入其地當廣陸一望灌莽而又為諸鄉孔道行旅過者暴客輒匿小穴中窺而羣起攫先是募健兒戍之戍卒依巖築草舍而墾土力耕多畜牛具休耕即驅牛入巖如圉然積穢無可刺足余初信步入巖道狹而羣牛突至幾大困巖瘦削如一柱中所擎其旁參差可受足者僧結廬為巢叢木千章扶疏覆之苔痕石齒班剝盡飽雲氣盤旋石磴或斷或續令一健兒先登籍其臂而上可百餘丈始得其頂頂方圍可二丈平亦可布席舊令蔡公築亭於此俄為暴風揚去壬戌九月縣尉周君觴余頂上磐礴四望忽憶九日陶家雖載酒三年楚客已沾裳之句不覺悽絶悵然命返東溪蔣鐄瀟水出九疑之朱明峰南流至三江口東北與迤合至湘口與湘流合此所謂瀟湘也初自九疑東北行草里為東溪沙石稍曠衍折而南乂折而東里許出望仙橋流益駛東溪山骨巉削兩崕拔起而中受水嚙為溪或滙為澤潭深不可量其色沈而碧大石錯出或為砥參差亘之稍淺則細鱗纎草具見膚理青苔覆沙水荇牽風極水石之美環溪灌木千章松濤微吼梵鐘隱隱映帶深林間余為輕舟蕩漾溪上名曰宋蓴每輕風殘照溪聲如潄半篙沒水觸石鏗然小繫松隂下或登石坐雲巢熟視逺山將夕蒼然螺髻黛色搖蕩若浮若斂俄而微紫俄而淡黃己而瞑色從地起黃者微黑瞬息變幻東溪古名剎久而廢余愛其幽勝卜築焉乂廬其北為草堂小間則磐礴吟眺居民因肖余像為爼豆之室余笑語父老為我異日爼豆不若雲巢一坐嘯余苦為令旦夕望去獨念東溪則不覺低回因憶李白詩長留一片月挂在東溪松鐫諸石而佩之鏡石蔣鐄鏡石在祁陽之浯溪綴石壁間縱可尺許橫倍之其色玄而寒光四映行人過者數武之外可辨鬚眉纎林飛鳥波光泛影皆落鏡中政宣初曾偹花石進御光忽滅舁還光復如初蓋神物也余謂更有隱德乃箕山處士桐江先生之倫可以輝山媚澤不可以薦清廟石之隂有疏林緑篠清蔭四埀甃石為徑屬飛梁而度有堂數楹大司徒陳公薦卜幽宅焉而疏林為沼於堂之陽巉峰骨立拔地起三面如障灌木蕭森覆之青苔班剝撲人衣袂夕陽逗漏樵歌互答宛轉可人時余將解令東歸道此磐礴久之滄洲吏情政覺霄壤明文海卷三百五十九
