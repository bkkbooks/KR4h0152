body:
  text: 明文海卷三百六十一餘姚黃宗羲編記三十五古迹遊赤壁記張元忭往嘉靖之戊午先大夫視學楚中豫來覲道黃艤舟而望赤壁恨弗及登也姑咏二賦以自遣距今且二十有五年為萬厯之壬午幸以使事再至既抵黃驟阻風雨同年友别駕陸子張具赤壁邀豫遊豫曰固所願也矧風車雨隊又挾使君指見留矣日為臘月望乃造郡署登雪堂及竹樓憑闌四眺江山隱映如畫輒不忍去已而出漢川半里許峭壁臨江土石盡赤有堂曰赤壁志稱周瑜敗曹瞞乃在樊口之上今之嘉魚是也此地非是然豫諦詢之郡之隔江為武昌有山曰樊山湖曰樊湖湖之下為樊口長公之賦殆必有據豫又循江而行往往見石磯類多赤色意者當時千里舳艫頃刻煨燼即嘉魚黃岡之間其為赤壁者何限豈必彼是而此非也由堂而西躡石磴而下為赤壁磯有石龜蹲踞江畔舊傳毛寶於此放龜由堂而北陟石磴而上為樓三層最上者舊題羡江豫易以何羡顧謂陸子曰夫有所羡於彼必有所不足於此今吾與子登斯樓撫斯景千里一瞬萬古一息物與我皆無盡也信矣又何羡之有陸抵掌大笑曰有是哉吾今而後乃蘧然覺也雖然今日之遊樂矣即夢也烏可無記遂記之遊白鹿洞記張元忭城中凡四大書院豫既遊嶽麓石鼓頃又至白鹿所未至者睢陽耳觀覽既多然而感慨亦不少矣白鹿洞之山曰後屏當五老峯之東南嶷然突起四山環之有水自西來縈繞其前為貫道溪東流出峽口聲益喧豗如雷名小三峽跨溪為橋者三東西為亭者五六皆可遊眺既入門謁先聖先賢祠坐文會堂四壁題刻幾滿洞嵌山趾壘石為之又鑿石為鹿蹲洞中其上為思賢臺舊有田二十餘頃以廪學徒近以新法廢書院於是改額為祠散其田十之八九文室講堂雖幸存亦且漸圮矣豫上下徘徊久之為之三嘆蓋古之為教者既設之學校矣而又黨有序術有庠家有孰所以振起涵育之者甚備故當其時士有學道之樂而國收養士之效逮乎後世學校既廢而鄉三物之教罔聞好古之士乃並建書院羣師徒講習其中蓋以廣鄉校之遺意而佐學校之所不及即不能無弊乃其利為多矣是何可廢也昔者子産不毁鄉校其言曰夫人朝夕退而遊焉以論執政之善否是吾師也若之何毁之子産之得為君子也以是哉且吾儒往往拒佛老而外之以為抑邪而崇正也今二氏之宫遍天下通邑大都無慮千百計曽不能廬其居而徒自廬其居以摧沮學者之氣是不幾於抑此而崇彼也乎是可慨矣豫又自解曰凡物之興廢何常之有白鹿之興也蓋始於唐之李渤其後遽廢至南唐升元中又復興其後又廢至宋太平初又復興賜九經置洞主視昔加盛其後又廢至淳熙中朱子來守南康力請於朝又大興當元末則大廢矣逮我明正統以後乃又大興今所創構大抵皆百餘年物也夫其興也或廢之其廢也或興之興而又廢廢而又興若循環然斯道之流行於天下厯萬古不可泯滅飭廢舉墜存乎其人耳天之未喪斯文乎此其人必有存者豫又何慨焉若乃居者冒餼廪而德藝不修遊者盛騶從而閭閻為病學者趨終南之捷徑教者騖江左之虛談若是則白鹿雖復興不如其廢矣凡居於斯遊於斯學者教者尚念之哉尚念之哉西施山書舍記徐渭西施山去縣東可五里越絶若吳越春秋並稱土城後人始易以今名亦曰土城山蓋句踐作宫其間以教西施鄭旦而用以獻吳又曰恐女朴鄙故令近大道則當其時此里固巨麗要津也更數千年主者不可問矣商伯子用值若干而有之山髙不過數仞而叢灌疏篁亦鮮澄可恱上有臺臺東有亭西有書舍數礎舍後有池以荷東外折斷水以菱而亭之前則仍其舊曰脂粉塘無所改出東南西而山者聳秀不可悉悉名山也繞其舍而畝者水者不可以目盡以田以桑以漁者盡畝與水無不然余少時蓋觴於此而樂之兹伯子使豫記豫雖以病阻其觴然尚能憶之也率如此嗟夫土城一山耳始以粉黛歌舞之宫當巨麗傾都之孔道而今變而遷之一旦寥寥然為墟落田夫野老耕釣徘徊於其間或捨其墮叉於鋤掘逮於隂晦又往往詫野火轉磷於夜歸牧唱之兒童宜無不感而噓資野人之聚而談者矣至其易冶以朴易優伎以農桑本業專而謡俗厚則有識者又未嘗不忘其悲而為之一笑也伯子聰敏擅文譽達事變試從讀書暇一登兹山而望之或觸於景而有如吾前所言者姑取而咀之儻亦一解頥耶伯子名濬字景哲禹穴記鄭善夫禹穴在會稽山隂昔黃帝藏書處也禹治水至稽山得黃帝水經於穴中按而行之而後水土平故曰禹穴世莫詳其處或曰即今陽明洞是已又云禹既平水土會諸侯稽功於塗山尋崩遂葬於會稽之隂故山曰會稽穴曰禹穴至今窆石尚存或然也後二千餘年而司馬遷氏來探書禹穴歸而作史記文章煥然為百代冠説者謂是山川之助也又後千餘年而晉安鄭善夫氏及山隂朱君節王君琥氏來復探禹穴尋黃帝藏書處乃玩梅梁磨挲窆石覩先聖王遺像得禹穴於菲井之上徘徊瞻眺想其卑宫而菲食為之喟然興懷又想其執中用智與臯夔稷卨之為臣又為之憮然自失也夫自禹稷以後三千年間遊者不知其幾而惟司馬氏顯此山川之能發為文章亦惟司馬氏夫三千年而僅得一人於山川顧止以文章顯何哉豈山川之能僅足以煥人文章耶世有不為文章者於山川何取也自昔至人見轉蓬而造車觀遊魚而造舟得河圖而成卦因洛書而作範咸取諸物也子在川上曰逝者如斯夫不舍晝夜余乃今知所以取山川矣夫登髙而賦余未能賦姑記余言如此云竹溪記方豪昔李白與孔巢父韓凖裴政張叔明陶沔居徂徠山日沉飲號竹溪六逸而竹溪之名滿天下自豫有知即慕其地意必清流之上修竹萬竿蕭森潔爽若神仙之居使人即之而忘去去之思復即也近余以審録之行登太山望徂徠詢所謂竹溪者不過荒煙野草之區溪既非舊竹亦何嘗有一幹之存哉然而言竹溪者不絶焉無乃六逸之力耶夫六逸者固一時之英也而惟太白為最顯其他若孔巢父人亦稍知其姓名而已餘則併姓名而昧之也嗚呼白於竹溪可謂有獨力者矣淮之清江浦有陳恭襄祠祠旁有道院道士陳元纁居之有溪為池為竹為林一碧上下寒氣凝而清光合雖溽暑若髙秋士夫道淮者必登之徘徊不忍去校諸他名勝為切蓋江南名勝至此絶矣故南往者有陽關故人之慮北來者有并州故鄉之慰而余之漫浪迷於山水者尤不能忘情也又其地與二署鄰署每餞客必就之客亦樂就今春之仲工部丁君敬夫户部李君貢卿餞豫竹溪之間陳道士以素卷請豫為竹溪記二君從臾焉豫雖諾之而自離此溪風塵困矣何能副之今者移官湖廣當再與溪會茍不副之豈直道士之憾溪靈謂我何如射溝風雨聊爾執筆嗚呼此真竹溪也世乃罕聞徂徠峯下顧為共珍可不謝白之力哉然不知道士所將迎與諸君子所共沉飲者果有白乎否也有白則有竹溪矣有竹溪則有道士矣奚以豫文為哉石鐘山記羅洪先漢酈氏水經載石鐘山以為風起微波激石有聲不詳其故東坡夜艤魚舟山下聽其所以鳴者本石多竅遂為辨以補遺丙午春余過湖口臨淵上下兩山皆若鐘形而上鐘尤竒是時水未漲山麓盡出緣石以登始若伏軾昆陽旌旗矛戟森然成列稍深則縱觀咸陽千門萬戶羅幃繡幕掩映低垂入其中猶佛氏言海若獻琛珊瑚珠貝金光碧彩錯出於驚濤巨浪莫可辨擇睇而視之垂者磬懸側者笋茁缺者藕折環者映連自吾栖巖穴以來攀危列險未有若是奇者矣夫音固有窽以出茍實其中亦復喑然故鐘之制甬則震弇則鬱是石鐘者中虛外窽為之也虛者大窽者小故出之有餘而應且逺今夫甕盎罌卣鈞虛器也注之水則甕盎不若罌卣之聲此中外小大之驗也東坡艤涯未目其麓故猶有遺論嗚呼石本無聲虛猶足以召之又况人之心乎是石當彭蠡入江處衆流迸駚湍回洑射日刔月消石雖堅不勝其力之久故其形亦備鑽研磨刮之工瑩白如玉其未入於水者色黯理疏頑悍而輪囷略不相肖然則風靡波蕩其亦有助於石而致虛者固有道耶因記以俟好古者滄浪亭記歸有光浮圖文瑛居大雲庵環水即蘇子美滄浪亭之地也亟求豫作滄浪亭記曰昔子美之記記亭之勝也請子記吾所以為亭者余曰昔吳越有國時廣陵王鎮吳中治南園於子城之西南其外戚孫承佑亦治園於其偏逮淮海納土此園不廢蘇子美始建滄浪亭最後禪者居之此滄浪為大雲庵也有庵以來二百年文瑛尋古遺事復子美之構於荒殘滅沒之餘此大雲庵為滄浪亭也夫古今之變朝市改易嘗登姑蘇臺望五湖之渺茫羣山之蒼翠太伯虞仲之所建闔閭夫差之所爭子胥種蠡之所經營今皆無有矣庵與亭何為者哉雖然錢鏐因亂攘竊保有吳越國富兵強垂及四世諸子姻戚乘時奢僣宫觀苑囿極一時之盛而子美之亭乃為釋子所欽重如此可以見士之欲垂名於千載之後不與其澌然而俱盡者則有在矣文瑛讀書喜詩與吾徒遊呼之為滄浪僧云滕王閣圖記盧柟柟少聞南昌當吳楚雄鎮而滕王閣則俯瞰西江延引甌越瑰琦絶偉為東南樓觀第一及讀王韓所為文賦諸所稱益奇嘗自語以為當及壯遊往視造物之妙於所謂滕王閣者庚子歲柟坐傭奴事繫獄秋九月巡按監察御史樊公白其寃平反明年殷公追置之大辟由是愈益錮其身不得之南昌觀滕王閣矣戊申山東石公以明進士治濬加恩囚儽柟法少寬因市諸所蓄故物得畫一卷曰滕王閣圖自閣道始傍達連房阿觀旋室㛹軒離簷倚楶戢孴翔翥於霄漢之上怪石幽篠危松蒼然護映屏障俱點綴人物山水圖書象態呈露咸極巧麗獨恨僮僕數輩不可役使黃衣客兀然吹笛無聲焉爾閣隂穹山嶄嵓橫碧黛緑騰赴環抱流泉瀐沃會為洲潏石衣蓱藻委靡悠然而可賞者是誠天作地藏以助兹閣為天下偉觀者也於是撫卷恍忽若失縲紲栩栩乎若馭雲軒而超越江漢飄飄乎若遺浮埃之表搏扶搖而遊覽於閶闔也乃知嚮昔王韓所為文賦不誣而柟亦得觀所謂滕王閣者竊償其私願焉夫滕王閣柟未之見所傳圖畫又未知真得肖其形與否今遽喜躍為慶幸如是設使柟誠得一憑覽盡江南臨觀之美即當乘元氣遊六合灝乎長往與世相棄豈直今日茍活為僇囚依圜牆溲厠而已耶柟幽拘多感每戍卒更番至則道故舊事或曰某遊宦業美田蠶園宅今丘墟矣或曰某見某服輿刀鼎奇器在若州縣蓋售之也或曰噫某死矣其子孫不能享有富貴窮且丐也嗟乎柟待罪七載視猶瞬息斯世已有陵谷變遷之意而滕王閣獨淹蔑吾廬無聞於縉紳士夫是不幾昧於天道往來消息盈縮之理歟假令使畫為匪人有不過資覆瓿之具抑安知是圖清淑之靈於柟無銜而吾燭物之智不見晦於滕王閣也龍川孟君思才俊豪爽尤深畫理於柟齠齔友善因將軸語之曰是宜與君即柟不幸死君可日哦其下以慰吾滕王閣之思幸而見原則吾與君觀天下形勝登會稽涉彭蠡泝洞庭越衡陽臨漢水以望方城獵雲夢窺荆門下岷江還行淮海之間貙鼠所鄰蛇龍所居厯幽顯崎岨之觀以求所謂滕王閣者周章而遍覽之柟雖駑蹇尚能為君歌咏其事舊所藏圖畫烏足為之羡歎云因戒之曰去汝好適孟君家待吾考訂姑作記與汝别遊莫愁湖記李維楨余將之南徐與山甫俱乘舴艋泊三山石城二門間有所遲未即發逼仄殊甚山甫曰此去莫愁湖不逺盍往觀乎舟子識其處者前導兩人攜而步至湖邊湖屬魏國家中有小艇三四覔之渡不可魏國監奴將來捕魚漁人具網罟以俟復沿仄徑穿委巷而出至大道過西城兵馬司治所望二石狻猊則徐氏别業入門瓦礫滿地蓋久圮敝而匠石方掃除更新之前為四美堂是徐髯仙篆後為勝碁樓則徐公子筆又有扁曰湖山逸興題出邢太史雉山字亦出髯仙髯仙固善古篆也樓旁垂楊數株鬖鬖作羽葆形勝碁未知所自豈謝安手談地耶按晉書符堅大舉入冦謝玄問計答曰已别有旨不敢復言令張元重請安命駕山墅與元圍碁别墅安碁常劣於元是日元懼便為敵手而又不勝安顧謂其甥羊曇以墅乞汝是不勝碁者張元也非謝元也而後人訛以為幼度謝可冒張樓不可冒墅耶山甫為之一粲左方有馮咸甫次唐人韻詩殊佳憑樓北檻而望鍾山龍蟠其右石城虎踞其左秀色綺靡若指掌上秋樹尚緑倒影湖中魚躍鶩泛暢人心目樓下引湖為池栽得苦荷葉少許小橋可渡湖堤已斷其半堤中尚有亭址主人翁或漸次修舉能著兩三畫舫更佳余叔氏入夔門山甫與諸人謀置餞於此以蕪穢不治罷計向後遊客必盛矣按唐書樂志樂府解題皆謂莫愁樂出於石城樂以石城有女子名莫愁唐人所謂南國佳人字莫愁也宋會三異以石頭城在余郢中漢江西岸有莫愁村一統志金陵不載莫愁湖三異又云曽見莫愁像石本衣冠甚古乃古神仙者流非女子郢中娼女竊其名則莫愁為女子亦誤石城在竟陵郡有晉杜預第臧質為竟陵郡時作石城樂莫愁村在其西盧家女善歌嘗召入楚宫古辭云莫愁在何處莫愁石城西艇子打兩槳將送莫愁來又云聞歡下揚州相送楚山頭探手抱腰看江水斷不流唐人詩莫愁魂散石城荒村近莫愁連竹塢人歌楚些下蘋洲莫愁故為三楚女或以楚山頭似郢而江水下揚州似金陵然郢視揚州亦可言下漢水亦稱漢江而郢人又呼漢為河那呵灘曲有江陵三千三聞歡下揚州語則此二語未可為吳郢分地定據或言此地相傳有妓盧莫愁家焉或亦如三益所云竊名好事者因其人以名湖而竟陵與金陵聲之訛石城與石頭城言者省文自可通稱亦非兩地判案也又按後魏孝文宣武相繼得江左舊曲及江南吳歌荆楚西聲總謂之清商署清商署謂之清樂唐用十部樂清樂在焉則天長安後不重古曲僅子夜等曲列吳聲而西曲則石城樂莫愁等曲或舞曲或倚歌雜出荆郢樊鄧間以其方俗謂之西曲莫愁如吳人曲不當列西曲矣樂志石城樂和中復有忘愁聲因有此歌樂録曰莫愁樂亦云蠻樂是以莫愁屬郢之明徴也又河中之水歌藝文類聚作古辭玉臺作梁武帝樂府曰河中之水向東流洛陽兒女名莫愁莫愁十三能織綺十四採桑南陌頭十五嫁為盧家婦十六生兒字阿侯盧家蘭室桂為梁中有鬱金蘇合香沈詹事古意本此别有還將盧女曲夜夜奉君王則魏時宫人故將軍隂升之姊明帝崩出嫁為尹更生妻者也如何四紀為天子不及盧家有莫愁或未敢以妓方天子妃所指非阿侯母即更生妻矣由此言之古今有三莫愁而盧氏多好女令湖山爭借以為重乎山甫微笑曰君郢人欲專莫愁為故實耳然其言辨可并記之遊古赤壁記莫如忠辛亥季冬莫子理楫還自嶽陽泝大江而北過嘉魚又北六七十里遇大風隂霾四塞驚濤撼空榜人恐疾抵舟岸得不殆有頃天反風晃朗呈霽褰帷而左則有頳石瀕江屹屹雄峙蔽若列墉俯瞷不測延袤距數百武其面勢峭平如引繩而削也莫子睇視久之念嘗道黃訪蘇長公所遊赤壁見謂無奇而古今識之不磨藉令兹石遇賞長公誠得一當赤壁其於取類不尤肖耶乃起扶策行稍狎居人問之則各往往言周瑜困曹瞞處而證以樵豎往來時得遺鏃沙礫間及指北岸里名烏林明曹兵嘗是戍守又懸崖鑱額存焉相傳出異人迹莫子益怪之為攀岌嵲披蒙茸而上務窮鑱額所從則竟長公法也而署之曰赤壁獨左方就湮僅有與弟字隱隱見莫子為憮然歎曰嗟乎嗟乎吾得之矣嘗聞長老言蘇子瞻賦赤壁乃黃之赤鼻山非真赤壁也余今所覩不幾遇其真耶按志赤壁之戰吳師濟自截險而西江流宜南北其折而黃則為東西流又史載烏林為當時焚舟處宜核而居人遺鏃之訛倘所謂折戟沈沙云者非耶惟是子瞻賦後談士輒附會焉其在嘉魚者遂不著亦貴耳而賤目矣余舟所次為石頭驛廢址士大夫舟過者候人不供風或引去而徒𨽻且莫以聞故能窮赤壁所在而有至焉者寡矣余兹行也出不測之險非有夙誡而昔賢勝遊遺蹤千載一旦幸或遇之豈非天哉會日且晡月亦既望余興彌極稍復解維縱焉浩乎中流冥色無際星河倒影掠棹而行還視赤壁矗如支機斯境殊詭似非人間而視黃之觀萬之矣夫以長公平生好遊所過名山川必籍之嘗手輯地理指掌圖甚辨余嘉其勤而赤壁瀕江為蜀道之所必出苐弗深考而猥以赤鼻當之有是哉蓋至達士寓言其稱海外三神山誠誕而君子不非之彼人情固各有托也余意長公於鑱石稱與弟云者固嘗偕子由來表赤壁所在章矣而賦作於黃要以即事寓言不害為情之所托俟好古者之自定也余斯遊也則惡敢弗識焉明文海卷三百六十一
