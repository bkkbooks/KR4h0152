body:
  text: 明文海巻三百六十二餘姚黄宗羲編記三十六古蹟八陣圖記王嘉言聞夔有陣圖舊矣隆慶辛未冬予來宦兹土詢之知在城東南魚復沙中直抵其處則見卵石散漫莫可認識土人曰湏髙處望之乃步城上遙觀隠隠若星羅碁布始咄咄以為神異明年夏月江漲水從城上流入闤闠於時屋廬蕩柝崖陊木㧞上下千里嗷嗷洶洶暨水落而徙移淪喪者至不可計數乃石磧則依列沙渚間也始信少陵不轉之說為的又嘗以已所窺視參考諸家論議則知縱横六十四壘布前為正遊兵二十四壘環後為竒合之則天衡地軸前衝後衝曰風曰雲殊其名分之則天覆地載風揚雲垂龍飛虎翊鳥翔蛇蟠異其變竒正分合苞含變化妙用無窮此所以走仲達伏孟獲功蓋三分而名垂萬􅑤也舊有碑在浦上遭洪濤斷裂余使匠人採石礱磨記而鑱之仍置故處瞿唐峽記王嘉言峽者何取以山夾水而為名也楚蜀之交以峽稱者多矣而三峽為險三者何歸峽巫峽瞿唐峽三峽同稱險矣而瞿唐為最舊所謂西陵峽者是也峽在夔東十二里兩崖對峙中貫大江蓋全蜀之門戸峽口石盤上樹鐵柱二根山畔岩谷中有鐵索七條柱髙六尺四寸索長二百七十七丈五尺蓋昔人置以截江者柱於夏秋水泛則汩冬春復見嗚呼夫瞿唐之險冠於諸峽者何蓋西南萬水總注於斯而雙崖把束極為陿隘以故縈廻曲折齟齬艱難驚濤奔浪噎豗訇匉歸舸行艓一遭水動則上下失勢而此生安危盡付之撇漩觸石瞬息間矣雖然關門一守百二之勢也明初以湯廖兩將軍絶人之智力席皇祖之神威師薄關下矢石一交而即却非頴國階文之捷水陸夾進以竒取勝亦難為力矣今天下熈熈氛沴久消雄關險峽雖依然索柱之存而山川勝槩祇為文儒嘻眺浪吟之具而已嗟夫宗國之憂雖非恤緯者所宜憂而處堂之樂達者亦恒笑夫燕雀之愚然則防禦之畧亦可於熈恬中講求之灧澦堆記王嘉言灧澦在夔東十里大江之中峽口之上水經云白帝城西有孤石冬出水二十餘丈夏即沒土人云灧澦大如象瞿唐不可上灧澦大如馬瞿唐不可下峽人以為水候又曰猶豫以舟子取途不決而言若夫淫豫大如襆瞿唐不可觸則南史記之矣而類要則曰淫豫大如鼈瞿唐行舟絶淫豫大如龜瞿唐不可窺又考梁孝子傳庾子輿扶父柩至瞿唐也時維六月禱而水平過而復溢時人謌曰灧與如牛本不通瞿塘水退為庾公夫以灧為淫為猶澦為豫為與同指堆爾字之異無嫌已曰象馬曰龜鼈牛襆同戒行爾名之異無嫌已嗟乎天地好生故生此石以開行路之迷聖人好生故存此石於疏鑿之餘而不去而輕生者猶忽天地聖人之明戒揚揚焉鼓枻瞥捩而過之噫愚甚矣愚甚矣彼以僥倖不死為可常恃也哉赤甲山記王嘉言由夔治而東過灔澦二里屹然立於峽口之北者赤甲山也草木不生土石盡赤望之若袒脾然於是乎得名或曰以漢時常取巴人為赤甲軍而名之也山上有城基曰赤甲城山畔有臺址曰旗臺山下有關曰鐵索關蓋公孫據蜀爰築赤甲諸葛建臺用樹旗幟而關横鐵索萬夫莫開則自蜀漢以來恃之矣嗚呼助髙峽之崔嵬俯長江之泓瀯秀㧞凌霄諸蠻拱向雄矣哉重䕫多矣而好事者猶訾之曰兹火焰山也䕫多火旤實應斯山夫赤為火則黑為水白為金乎乾坤之氣蜿蟺扶輿發而為山嶽者色相種種焉不齊而以私意掉其齒頰吁亦鑿甚矣乎白鹽山記王嘉言白帝城東峽口之南有山嵯峨與赤甲相對者白鹽也一色如鹽因名之山下有粉壁堂岩間鬱鬱四大字曰天子萬年蓋其來逺矣夫環夔皆山也其嶄然嶔然售奇競秀者不可枚數而惟赤甲為雄環赤甲皆山也其背峽面水綰綺錯繡者亦不可枚數而惟白鹽為對素輝明瑩與金光熠燿者兩相射焉髙出刺乎穹窿狀如華表雄峙分乎南北勢若勍敵為全蜀之襟喉資名賢之遊咏蓋天有意焉生之以為門户之壯觀乎雖然物固有相藉以為重者兩山之擅名以其當要害之區也向使不臨淼茫不負關隘不控荆楚之上游以矗峽口則亦他山埒耳詎得以稱雄如是哉草堂記王嘉言唐大厯元年春杜子自雲安至夔秋寓西閣二年春初遷赤甲三月遷瀼西秋遷東屯三年春則出峽赴江陵矣考劉禹錫刺史記唐州治在今夔東十里白帝城之側西閣實近白帝及遷赤甲亦稍稍移東爾瀼西在白帝西八里東屯在白帝東八里居凡數遷斬茅而構屋故曰草堂乂謂之髙齋今考其詩曰次水門者白帝處也曰依藥餌者瀼西也曰見一川者東屯也今三齋獨東屯遺址尚存地沃饒宜稻芋余嘗徘徊其側顧瞻形勝則知昔人所謂延袤百頃前帶清溪後枕重岡樹林葱倩氣象深秀者亶稱實記嗟夫公之詩唐宋文儒論之詳矣元㣲之稱其上薄風雅下該沈宋言奪蘇李氣吞曹劉掩顏謝之孤髙雜徐庾之流麗小宋贊其渾涵汪洋千彚萬狀善陳時事律切精深語皆中乎肯綮而王荆公所謂悲歡窮泰發歛抑揚疾徐縱横無施不可者其品隲亦精當不誣雖以韓吏部之奇文卓犖雄視百代者亦且推服退讓而有光燄萬丈金薤琳琅之語則餘可知矣若夫自比稷契人或未許而忠義之念慇慇懃懃至一飯不忘則雖稷契愛君之心亦若斯焉爾夫崇德右文盛事也景行仰止懿情也今夔之於公妥靈有祠歲時伏臘有祭無恨也而髙齋之跡㣲矣余不能以綿薄之力倡而新之姑記焉以俟瑰奇好古之君子風廂匣記王嘉言夔城多古跡如白帝城北嶺上有髙址形勢最險可捍敵號關索城白帝城西有柏柱大十圍髙三丈許傳是公孫述樓柱斫之血出枯而不朽瞿塘上與粉壁堂相連有石梯形傳是孟良夜過關所鑿名孟良梯夔北蓮池畔有城垣之迹曰鮑家莊傳是三國時鮑氏女據險破廉康賊之所夔西坪有劉封井謂先主養子劉封所鑿江之南與八陣圖相對者有石鼓傳是孔明教戰之鼓餘尚多不可枚舉皆古書不載漫無稽考然未有如風廂匣之竒者峽在瞿塘峽中赤甲山下巖穴間相傳為魯班之風箱或曰上古造以藏兵書者余望之髙數十丈不可梯而升噫班信智巧人置石廂於峭壁抑何取意以為兵書要亦不出龍虎韜雲鳥陣與玉帳術之上胡為上窮絶壁下臨深淵憊觔苦骨以寶蓄斯處達者或不宜如是而又非神設天造必有人焉為之與所以為之之意特其理不可得而解識噫異哉斯匣乎白帝沿革記王嘉言維公孫躍馬而稱白帝築城魚復號白帝城厯漢唐宋元迄今不廢豈非以險之殊常也而可據與城距夔十里今名下關周環千餘丈隨山上下包結完固鎮以瞿塘右所東南邇赤甲白鹽西北抵瞿塘灧澦蓋巴蜀要區也城中舊有白帝廟以祀公孫述正德初中丞林公俊征鄢鹽賊過而知焉曰淫祀也易而為三功祠以祀江神伏波馬援嘉靖中侍御朱公廷立復諭衆議更為義正祠祀先主而以孔明配焉夫述為漢賊義非當祀毁其像罷其享誠羣心之一快也然境内山川社稷歲祀非缺而伏波雖忠功不在夔祀之近於黷近於迂逺昭烈永安託孤武侯列八陣魚復沙土至今英靈凜凛遺澤在焉允宜血食兹土但一龍二虎均先主注意生不相離沒亦宜有以慰其靈故羽飛終難遺也至嘉靖三十六年侍御段公錦復以關張配享改曰明良殿然後大義炳然至情藹然而人心之公論始定余以公事適至顧瞻山川雄壯遺像清髙慷慨激烈之懷與明禋之念勃然俱動乃考始末援筆記之一以見地之奇也一以見神之靈也相公溪記王嘉言夔西二里市井之尾有橋焉牢厚完好先太守張廷柏建也橋下有溪溪之西有嵁巖宏谷徑紆餘陂陁行者登頓盤施捫膺努脅氣息上下依橋環矚遼濶荒險勢足觀也溪之源出三刹山瀠瀠而流注於大江余初經過見其瑰詭也吁駭而問焉土人曰此相公溪也宋冦公凖令巴東嘗徃來於斯愛其凉洌也取而烹茗茗味佳不侔他水後遂名為相公溪溪上橋橋西山皆以是名名矣余曰嘻偉哉溪之遇顧不竒哉古人曰愛其人者爰及屋上之烏憎其人者憎及儲胥余不暇逺搜即以夔論其間穿沙灌溆抵石溲坻澆圃落坡或潺潺有聲或沉沉絶響得名號者不知凡幾也豈盡温屯混淖少清凉芳美哉而兹溪獨擅榮名則以其人之足重也不然貪泉何貪焉而以貪名因人及溪而又因溪以及山及橋也溪之遇顧不竒哉余乃仰而顧俯而思徘徊良久喟然太息曰士亦有遇有不遇哉清凉洞記王嘉言客有為余談清凉洞者曰赤甲山畔瞿塘峽上懸崖絶壁有洞焉静窈鴻濛冬燠而夏不受暑登之以覽峽中勝槩若步雲漢而出塵籠也予頷之謀諸司理邢君吿太守郭公選日而遊將至則徑險不可輿遂相攜步屧且攀且憇數折乃及洞中徑愈仄危横木缺垠上令善援者傴僂先進前後夾衛欹軀跼步震掉而入中可容千人項形盤旋左側碎石交接如砌非砌身健捷而能者可升至絶頂前臨險峽下視極深兩崖相合中纔一絲舟過若游龍穿窟左右環睇則竒峯秀嶺華巒詭石如鸞翔鳯舞星羅雲逗龜拆卦分蛇蟠獸寢狀類千百或獻深紅或露濃緑邇延逺映熒熒煌煌䡾䡾兀兀迭出互見無所隠避於是相顧諠笑深酌而忘日之入焉歸而流連於胷次者累日乃乗隙想像而記之重修墨妙亭記張維樞墨妙亭者宋孫莘老守吳興日所構而東坡代為記者也東坡之記大要以莘老乘勞來之暇作為此亭日與賓客賦詩飲酒網羅前人賦咏數百篇并其刻畫尚存而僵斷於荒陂野草中者悉加搜集見莘老之能雍容自得也余以庚戌仲夏拜呉興符念是郡多名公褰帷之蹟亦欲鞭磨鈍頑思得一當適直指駐部案牘旁午冠蓋舟車之集如肩摩也求若孫莘老時自適於風流嘯咏投壺飲酒之樂而不可得且俗巧而囂矜華侈而喜起大獄牙駔鬬習豪長招權翼飛而漁下戸者鋒銳未易當也即山水清逺無恙而求若東坡所稱寡求不爭其民足於漁稻蒲蓮之利而益不可得予蓋朝夕撫心焉時訪朱大復先生於𤣥樓山中得所謂水火交和治民猶治生之訣而洒然若有醒也用是滌煩寧念將一二髖髀漸次批解而幸劃然未至傷手也辛亥夏初退息之便登眺澄碧樓上見此亭附樓偏數楹傾欹幾難搘撑余謂有樓無亭是失一巨臂也且前賢能觴咏以樂之羅集刻以光華之今聽其傾欹於榛藂茀草之間謂蘇孫諸公徃事何因悉索廪鍰鳩工重新易其朽敗煥以髙明横檻覆甍中厰外曠近一月而工吿竣用招康宋杜閻諸君合酌焉相與酣中而適情脫氛而解縛登樓放眼見弁峴諸峯蒼顔秀壁薄雲氣而帯暮景者巳近在枕席之上及情闌意極逍遥亭中又覺方丈之池可以鑑百年之松可以䕃雙石黯黮可以磨娑千畝青葱可以發響即不能如莘老之搜尋集刻羅列深簷而清韻芬芳子墨衆妙之致似去諸君與予懷袖不逺於是觴諸君盡醉而漫續為記以見吳興守之一派墨妙猶存也黄鶴樓遊記張維樞從臬司署後有山屹峙名曰蛇山髙三十餘丈署中疊石兩層躡級而登堂廡爽曠可供觴讌由堂背振衣再陟見漢水如帶宫邸如雲烟火數萬家如星羅是為攬勝亭由亭左折道觀頗壯麗監司及諸僚佐藉祝釐焉每晨夕逺方香客乞靈擊鼓撞鐘喧若潮沸是為武當行宫由宫西行睥睨間則漢沔之雉堞鸚鵡之汀洲晴山龜山之羅供儼如列眉巳觀髙表巃嵸重簷翼舒可時雲物而驗灾祥省謡俗而稱明德是為黄鶴樓由樓下行數十武㕔榭枕江有崔左司白雲詩與唐宋元及我朝諸公之題咏碑記在再行數武空亭八面類清凉界循亭遞進百餘步居蛇山之巔廟祀純陽仙人麟甍碧瓦香烟不斷岸畔老棗數株枯槎古幹當是千餘年物相傳山上多棗不實一日結實大如瓜太守命小吏徃視小吏啖之仙去遂亭焉郭美命宗伯歌行有安得纍纍撲滿地飽食江城百萬家之句是為樓東之仙棗亭夫黄鶴由酤者顯載在稗官亭所為祀吕翁也乃覽圖經與唐閻伯理之記又云費禕登仙常駕黄鶴返憇此山何也城郭廢興浮雲去來龜拱蛇列水湧壑奔即樓凡幾更而始重修於劉汪兩公伯玉中丞之樓碑可攷也費耶吕耶棗耶鶴耶亭耶樓耶仙耶人耶崔之白雲耶太白之鳯凰臺耶從有無竅妙中都可渾然齊視乙夘秋仲余逐隊監試之役甫撤棘即陪劉左丞陶宇王右丞柱明馬學憲荆陽邀髙大叅啓塘為鶴樓遊是日天髙氣清凉風薄體俱有欲窮千里目更上一層樓之興相與開窻四望覺烟波淡澄虹霞㸃綴若繡若碧若紫若朱幽草晩花虧蔽石壁漁舟釣艇晩泊水涯而七澤三湘夏門大别諸勝似束於鄂漢間為兹樓所壓而扼其吭斯謂𤣥嶽之門戸斯謂帝鄉馬公把余髯言曰攬勝亭利内觀仙棗清凉二亭利外觀若乃内外無碍可披襟而當快哉之雄風也則斯樓為最王公又向劉髙二公指曰攬勝亭山頂父老相傳為偽漢疑塜徃其遺種尚有嚮空遥拜者予惟天下之平久矣當皇祖以六師下偽漢定楚宫闕地胙壯王出鎮寧一日而忘三戸且斯樓並晴川樓夾搆鄂沔豈無逺意夫固謂鄂重地非有崇岡外障所恃沔為輔耳今楚宫無恙鼎器幾欹漢水嚙城晴川就圯果昔日分王而外戌沔之意乎矧皇祖不沼疑塜而搜勦其種類此恩與祝網何異今日四民所得耕讀漁釣遊嘯斯樓而吾黨亦獲乘此清暇登髙臨水當雄風之逺來也非祖宗寛大之澤而休養涵煦之久且深寧及此劉公曰吾聞能出世者能經世前事將墜者後事之任先憂後樂固范希文岳陽樓語也吾黨交志焉其可遂書為遊黄鶴樓記明文海巻三百六十二
