body:
  text: 明文海卷三百六十三餘姚黃宗羲編記三十七古迹重修九疑觀碑記蔣鐄出延唐東門數百武有九疑觀鄉耆老言古建於三峰石下唐貞觀中遷於斯我明洪武五年再經始余令延唐經其門詢諸耆老謂舊宫厯二百餘年巳圮盡數年間邑民慕義者共聚財新之工未半而力不任遂中輟余惟九疑椘之望也立命鳩工卒業旬月繚有垣塈有茨虛有牖一切頽敝者悉舉自中宫暨左右廡重牖列闥廟貌儼然外屏髙門飾以丹堊父老過而韙之觀以九疑重觀遷而故額猶存居人不知有邑之鎮山猶知有觀殆九疑之餼羊乎吾子之勤斯也其有意乎余曰夫瀟湘之南自昔在南鄙逐臣遷客澤畔行吟之地也余浮湘登九疑覔所謂三峯石者皆目為窮荒異域乃自貞觀以前斯觀翬革如故也今日嶄絶鳥道菁棘蓁蓁之路猶昔年香火不絶之通衢夫昔以投荒厭苦之而勝事若彼今稍以為中土安居之而虛墟若此豈山川之衰旺有數與抑古今之物力不相及也夫敬事山川以祝釐紹修餘業以志古徴文考獻以鼓吹休明邑令事也父老又請曰比歲之不易澤若焦方數千里艱食自吾子之來而時雨若畝有棲野有被也庶幾山川之靈其庇豫乎祈年以保我遺黎敢邀吾子之貺實居歆之余曰天之福也二三子之勞也余兹所圖者即不望貞觀以前之故宫俾湘靈生色又何忍洪武以後之遺構重夷為里社自今以往父兄子弟其毋剪伐以水告虔不穀將藉手以報采風者於是具歲月土工勒諸石九疑山志序蔣鐄粵自姚墟氏蒼梧鼎成湘靈帝子遂為千古詞林佳話若夫勞人仙客貞魂幽憤弔古含毫憑而嗚咽乃至投湘些斷黃陵歌闋哀絃如訴離腸欲絶詩發乎情於斯為極顧作者亦獨搴華攬藻實未窮探斯域晉魏以前缺焉無聞洎乎李唐槩夷之荒服栁司馬太息投荒楊道州日熟二升米漫郎守官差為吐氣而骯髒之意亦時露於篇章夫文則艷稱之如可望之明河地則厭苦之如厲人之鬼國蓋世情浮慕若此故自有虞迄於今九疑之名雖見於經傳而載紀漫無可考余令延唐九疑實為賜履始至掌志者以九疑集進意為法物其文若詩二百餘篇如長安市肆座頭塗抹一再閲之蹙然曰千載名區投之荆榛瘴癘之鄉總不得名人表章勝事備兹山九錫奈何復薦穢唐突迫令名山無地自容噫嘻何不幸也最後得一帙於鄉先生稍次山水名迹遊寓姓氏余因就而輯之合舂陵延唐二志參訂檢前集注文先後文人之筆可録者存十之二餘盡削之而益以三唐之詩為兹山賦咏者若干首為九疑山志三閲月告成客有過余請揚扢者曰九疑無志志自吾子韙矣雖然未易言也若能窮搜皇虞以降三千餘年紀載無遺乎曰不能能盡兹山而千餘里蒼梧之奧五嶺之陽若指掌乎曰不能則又請曰古者著九疑而不著九峯之名如元使君登九疑第二峯更不言第二誰何名也然則舜源英皇之號疑亦唐以後之人強字之以故其義短而名不古能遡九峯之自以折俗儒之月旦乎曰不能然則又何以志焉曰使我傳疑也則志古抑使我傳信也則志今夫昔人艷稱之佳話如取波斯以語貧賤子愛而不可得也余所取者如偷歲之稷寒年之纊久矣夫望吾腹巳傳不云乎禮失而求之野吾姑謀於野以俟山靈之侍史明文海卷三百六十三
