body:
  text: 明文海巻三百六十四餘姚黄宗羲編記三十八學校寧波府修廟學記楊守陳皇上紀成化之十有三年河南張侯賑守吾郡既六稔矣心仁政善民用輯寜始加意於教化之地顧廟學皆完獨殿與兩廡甃磚盡剥遂撤而新之於是執鬯奉籩者皆坦如矣士寝食之屋猶隘或敝廼為膳堂三楹寝舍楹二十於是退食入息者皆裕如矣學門外數武即民居迫隘且囂塵廼購民徙居以闢道樹兩坊表於東西衢於是弁而游學輿而謁廟者皆廓如矣教授鄭君機四謁余記時有言者請尊孔子以帝號而加籩豆舞佾以稱其衮冕一如天子制有司沮之乃遷其説謂不加帝號猶可而籩豆舞佾在所必加朝廷從之加籩豆十二舞佾八此固追崇先聖之盛典矣然猶未臻於極焉孔子道徳教化之盛賢堯舜而配天地自生民以至於今一人而已後世人君皆師之則皆其弟子也稱為先師固當矣若追崇之典必當臻乎極而後巳焉夫禮因人情可以義起周公制禮追王其父祖前未有也師生之義與父子之恩同子可以追王其父則生亦可以追王其師况孔子又萬世一人後王實被罔極之恩者乎近世人君師孔子而追王之固禮也而未為禮之至者古之皇帝王皆因時建號非有等差自秦始稱皇帝而後世有天下者無不稱帝其父祖雖編氓伍卒亦追帝之而族屬功臣則皆封之為王於是帝為君號王為臣爵懸絶矣君於臣禮當其為師則不臣也况異代之聖師而可臣耶王孔子而不帝是猶臣之也其可乎必帝之乃見不臣之禮而為尊崇之典之極焉在宋真宗已欲帝之矣其下不能將順而沮之謂孔子周之陪臣周止稱王不當加以帝號夫謂周之陪臣則雖公之與魯公班不可况王之與周王埒乎既王之則固謂其萬世之聖師而不可以周之陪臣視之矣於周何預而不當帝耶故先儒羅從彦謂可加以帝號而褒崇之誠百世不易之至論也今言者遷就有司之説謂孔子周人當用周制王乃天王之王非國王之王故不帝猶可夫用周制則當稱魯大司寇耳安可王之王之者是後世尊崇之典非周制也在周制則王猶帝耳在後世則帝之與王猶天澤之不可混猶冠履之不可殽矣尚可以周制論哉尊異代之聖師而用當代之臣爵曰此天王也彼國王也則亦非正名别嫌之禮矣孰若初説帝號之為確乎我太祖高皇帝之定祀禮也凡嶽鎮海瀆皆革去舊封止以山水本名稱其神若所謂東嶽泰山之神是已至於忠臣烈士亦止稱當時爵號而革去後世之封若所謂吳泰伯之神是已獨以孔子善明先王之道為天下師以濟後世非有功於一方一時者比故不稱魯大司寇而仍舊號大成至聖文宣王其尊崇之意極至而無以加矣但當時未有援宋真宗羅從彦告者故未及帝之耳今有司沮言者廼謂舊制而不肯更夫以太祖尊崇聖師之心如彼其至茍聞今議有不憣然更耶彼有司於異端與他政弗能一一遵舊制也而此獨曰舊制豈舊制果不敢更耶又謂孔子之道唯在君臣身體而力行之謚號噐數皆不足較夫道在身體力行是已餘亦安可置之如彼其説則明王但奉天道繩祖武足矣而又尊稱上帝追王先公制為郊社禘嘗之禮樂皆必極其至而足為萬世式者何耶有司之議過矣然自漢以至於今儒之僻隘者豈獨不欲帝吾聖師雖公之王之謚加數字天子拜之郡縣祀之冕服籩豆舞佾如天子制皆謂不可甚而謂獻官以皇帝遣而北面揖其禮太重請改東面此豈特不知禮而已蓋亦無是非之心者也然人心之天理自著於久萬世之公論卒定於一故既王之又累字謚之天子北面拜之郡縣通祀之而全用天子之禮樂矣獨帝號未加尚為闕典今若不加後世亦必有加之者聖皇良弼豈容有闕典待後世哉行將舉此至極之盛典超百王而憲萬世也歟因併記以俟雖然孔子之道在君臣猶當身體而力行之况士乎今士結髪誦孔子書而講明其道口之以為説筆之以成文者比比然也求能身體力行何其鮮耶蓋徒志掄魁而不志聖賢徒貴高爵而不貴令聞徒學文辭而不學道徳焉耳茍於此焉審其輕重先後而志聖賢而貴令聞而學道徳始於持敬格物漸於立誠端本進於克私返禮而造於從心所欲不踰矩則至極矣雖或未極而道徳一有諸巳則文辭自工掄魁自得而高爵自至矣有不得不至者其命也彼顓顓於文辭者豈亦能必得鈞之有命孰若力學道徳而不虛為孔子徒也尊孔子必加帝號而後為尊之極余既有攸望矣學孔子必偹聖徳而後為學之極余寜無攸勸乎故附記以告若吾郡人材之秀傑風俗之純懿與廟學之沿革則郡人李公璜王公應麟金華黄公縉紀之備矣無庸余言稽山尊經閣記王守仁經常道也其在於天謂之命其賦於人謂之性其主於身謂之心心也性也命也一也通人物達四海塞天地亘古今無有乎弗具無有乎弗同無有乎或變者也是常道也其應乎感也則為惻隠為羞惡為辭讓為是非其見於事也則為父子之親為君臣之義為夫婦之别為長幼之序為朋友之信是惻隠也羞惡也辭讓也是非也是親也義也序也别也信也一也皆所為心也性也命也通人物達四海塞天地亘古今無有乎勿具無有乎勿同無有乎或變者也是常道也是常道也以言其隂陽消息之行焉則為之易以言其紀綱政事之施焉則謂之書以言其歌詠性情之發焉則謂之詩以言其條理節文之著焉則謂之禮以言其欣喜和平之生焉則謂之樂以言其誠偽邪正之辨焉則謂之春秋是隂陽消長之行也以至於誠偽邪正之辨也一也皆所謂心也性也命也通人心達四海塞天地亘古今無有乎弗具無有乎弗同無有乎或變者也夫是之謂六經六經者非他吾心之常道也故易也者志吾心之隂陽消息者也書也者志吾心之紀綱政事者也詩也者志吾心之歌詠性情者也禮也者志吾心之條理節文者也樂也者志吾心之欣喜和平者也春秋也者志吾心之誠偽邪正者也君子之於六經也求之吾心之隂陽消息而時行焉所以尊易也求之吾心之紀綱政事而時施焉所以尊書也求之吾心之歌詠性情而時發焉所以尊詩也求之吾心之條理節文而時著焉所以尊禮也求之吾心之欣喜和平而時生焉所以尊樂也求之吾心之誠偽邪正而時辨焉所以尊春秋也蓋昔者聖人之扶人極愛後世而述六經也猶之富家之父祖慮其産業庫藏之積於子孫者或至於遺亡散失卒困窮而無以自全也而記籍其家之所有以貽之使之世守其産業庫蔵之積而享用焉以免其困窮之患故六經者吾心之記籍也而六經之實則具於吾心猶之産業庫蔵之實而種種色色具存於其家其記籍者特名狀數目而已而世之學者不知求六經之實於吾心而徒考索於影響之間牽制於文義之末硜硜然以為是六經矣是猶富家之子孫不務守視享用其産業庫蔵之實積日遺亡散失至為窶人丐夫而猶囂囂然指其記籍曰斯吾産業庫蔵之積也何以異於是嗚呼六經之學其不明於世非一朝一夕之故矣尚功利崇邪説是謂亂經習訓詁專記誦没溺於淺聞少見以塗天下之耳目是謂侮經侈滛辭競詭辨飾奸心盗行逐世壟斷而猶自以為通經是謂賊經若是者是并其所謂記誦者而割裂棄毁之矣寜復知所以為尊經也乎越城舊有稽山書院在卧龍西岡荒廢乆矣郡守渭南南君大吉既敷政於民則慨然悼末學之支離將進之以聖賢之道於是使山隂令吳君瀛拓書院而一新之又為尊經之閣於其後曰經正則庶民興庶民興斯無邪慝矣閣成請余一言以諗多士予既不獲辭則為記之若是嗚呼世之學者得吾説而求諸其心焉其亦庶乎知所以尊經也夫虢城新開學門記任潮虢學自𢎞治壬子至嘉靖己未諸生無發科者辛酉縣大夫句容趙侯舍菜孔子廟庭出博士清苑郭君等率諸生進曰學舍面城而宫雖有南山洛水雄勝障蔽不克見議者以諸生老困塲屋連不得意於有司咎當坐此前大夫嘗欲穴城為便門以通地氣問日者言於法不利縣官中罷願侯財察侯報曰誠門矣茍利學校人才即縣官何必不利譬如人家有才子弟登選舉其父兄長老人豈必不安明日遂移文提學憲副東原朱君令國中良家子有能力任是役願升為弟子員者聽惟時師儒以韓生請議可不閲月而郭門間然以成諸生則問記於前史氏任瀚記曰今天下萬國不問窮荒絶塞蠻貊瘴海之濵茍可以建諸學官類皆有一二豪傑士好古博學能文辭崛起章縫往往以制科名天下虢國近在成周東都數百里内當天地正中堯舜三王在位時聲氣相聞輦轂相蹂籍乃今王風未闕而絃誦聲不衰上下六七十年間不聞有一人凌跨風雲應制闕廷者且不愧東都耶古者太史令掌龜筴候王氣陳吉凶宅兆之數告徵於王以營城郭宫室動罔不利乃者郭門闢王氣通人文興亦理數所有者辟如人以巾幗自障目睫終嵗無所覩一日撤去劃然復見天地日月山海百物其為神氣休鬯可知諸生自是其有興乎吾觀郭門以南數百步瀰然逝者即洛水遵洛水而東又數百步巋然跱者即燕居堂夫燕居堂者魯哀公庚申以前孔子有事河洛所止處也今天下萬國皆有學亦復有出户不十里孔子燕居㳺息處相望如虢城者乎諸生出入是門誠知省䇿嚮慕如七十子時毅然興起以𢎞道振徳為己任淬厲不息駸駸乎升孔子之堂而入其室則是門也吾將以入聖名以見聖名其誰曰不可獨取其發科為哉趙侯醇誠愛士隆學校郭君倡義束職皆近世所不及記以劖諸石舒城縣儒學記趙釴今天下自王畿而下凡有郡邑城郭社稷莫不有學郡色城郭社稷有不治不為辠惟學宫不治則議及有司而學宫又以科目疏數為盛衰科目數不舉士則又議及學宫故凡為郡邑城郭社稷必選地為學宫否則易其以得士為重郡邑城郭社稷舒廬枝邑也代有聞人自嘉靖年来士偶稀舉群議學宫當易乆竟莫有易者學日就圯士以狀白督學侍御趙公侍御下其議於府府下之邑邑侯黄君適至即環眎學宫曰學故善但荒蕪不治是惟有司罪即首修孔廟次廡次啟聖祠次明倫堂次齋舍次尊經閣又徙民舍使逺峯面立既治躬率博士弟子入學行釋菜禮鳴鼔升座與諸士論説其博士子弟與其故老皆喜謂侯得所先務士當自此興問言於余余曰士顧以多舉為學宫重哉士多舉為其以仁義禮樂為天子施之四方其以仁義禮樂勤施四方莫如孔子孔子當游者主事時猶皇皇以仁義禮樂走告四方諸侯志可知也然退而與諸子私論若由求公西華輩皆欲勤施仁義禮樂於四方不一可否至於㸃則欲瀟然咏歌於沂水洙泗之間於四方何心則急與之他日過諸弟子治所如蒲如武城非不秩然稱治若不足以當其心者反謂不出陋巷如顏閔曽參輩能得其傳何其為教與其自為廼悖及見篤信聖人如子夏者亦自謂出見紛華而悦入見夫子之道而悦何人情之易移然後知聖人之意逺矣士貴在自立豈以仕為重哉舒俗素朴無豪商大賈亦無王公貴族民不見紛華貴盛可歆艶易治其子弟亦不見可歆艶皆矜矜以禮節自持而純龎博厚之習未雕雖未見施仁義禮樂於四方亦必有修之家者不謂無士要有待歟今以科目盛稱者曰某郡舉士幾某邑舉士幾跡士所自為未聞以仁義禮樂號於四方曰某某某徒垂紳佩玉冠履盈朝而田園甲第車服僮僕雄豪閭里以此言之固不如舒士猶得養其純龎博厚之氣以自全故科目不在多舉士而在舉得其士雖然氣習乆而昌舒必有偉士出能自著施者幸毋悦於紛華貴盛以散其純龎博厚之氣云博士江君謂其言有足以告諸弟子者遂刻於堂隂滁學尊經閣記胡松夫大學之有尊經閣逺矣而吾學獨亡東又庳下多闕隙邦中大夫士人數謀増築而弗克嵗已酉閩東山郭公来考牧拜先師既進諸生講論經理已廼比而校焉亟加賞嘆於是諸儒生相聚謀曰閣殆遇人乎則以請而公欣然報可令㑹計熊牧相惟謹即躬會計已而鄉宿朱遜泉郡授周弦齋侍御㑹余議它學門涂率左法右弗利盍乗時改作然隘以啟聖名宦鄉賢三祠費且鉅諸偏生又告諸太僕卿趙公卿貳余公丞凃公冀恊相三公襄之如郭史然不足又告諸大廵史公倉臺歐陽公咸有相余公又明堪輿家言為即學東隙地定厥址牧伯與倅朱君若林君又時来敦勞為閣三楹基以磚甃中洞為門可通輿馬議以三祠徙諸文廟東廡後左學正李君而下率諸弟子請記成事夫美懿徳而崇經術固不糓之攸勤也惡可辭是故古昔聖人所為作經之意繇孔孟而降則既擇之精而語之詳號博且約矣學者蓋㒺不誦法而尊崇焉然愚竊悲世儒往往至於淺且鑿賊且叛而淆以亂也是故漢人童子之課顓顓諷誦其説一經或十餘萬言然竟昧其奥其失則淺析户分門黨同伐異九師百氏言人人殊齊魯毛韓左糓公羊之徒動相詭異至謬悠迂曲而不可解其失則鑿居攝之文假以盗國乾豆之説托以媚君國服之息竟至覆宋其失則賊西京諸子行無特操耆利躭榮稱符頌徳甚者甘心輔賊而弗耻其失則叛號稱解易時雜莊老本自宗禪輙易頭面竊佛之似貿儒之真語高戾天禮卑則闕其失則亂嗟乎大道分而為六經六經散而為諸子諸子駁而成六失自五失之作而經始弗尊雖然是五者則固有間矣然淺之與鑿賊之與叛其敝如欃槍彗孛夫人之所指目夫人諸絀而病之其於經要之無損惟似是之非高明易惑盖其為道也宏以闊而其為説也蓋精以密儒者曰退蔵於宻佛亦曰退蔵於宻儒者曰感而遂通佛亦曰感而遂通浸滛淪浹如金糁物如膏漬粉幾於無辨淆不可分要其實彼其自私自利之弊弗啻不可以治天下國家而已豈非聖門之首辠經學之鉅蠧而世道之大不幸乎他日嘗與二三子試論之曰經者徑也蓋聖人所以示人適道之路也譬諸四方萬國適京師者之涂厯川程與京師之黄圖赤籍云爾然不行則不至不至則其中明堂宗廟之美百官庶士之富太倉武庫之積僅得於故楮之傳道聽於塗夫之口彼誠有至者試就而詰焉得不窒塞而窮乎故士弗務躬行徒取六籍列聖之言而諷誦之觧晰之貫穿之嘵嘵然以鳴於世曰吾聖人之徒也嘗遊聖人之門而入其堂室得不取誚於時乎則何以異於是哉故京師之鉅麗必身至而安居乃稱真見斯道之廣大必深造而自得乃稱真知故真知而道斯明矣道明而經斯尊矣經尊道明達之則能善治以興邦即貧且賤焉要不失為慥慥躬行之君子故孟子曰我非堯舜之道不敢以陳於王前齊人莫如我敬王也嗟乎知所以尊王則知所以尊經矣斯豈非賢聖修道立教之意朝家置學命官之旨諸明獻勤勤作新之志哉昔定山莊先生叙吾郡乗端簡其意以為滁之先游若韋應物歐陽永叔曽子固滿執中之徒不足為法而要吾鄉人於聖賢之學為山川増氣意甚厚也夫天地之生士最秀堯舜之道人可為六經之説日並懸學者豈以弗昭為勝為患哉余與鄉後賢君子當並責志以答莊公之拳拳也大足縣儒學尊經閣記趙貞吉嘉靖辛酉春知大足縣事董子極建閣於學宫之左以奉六籍而百家之文不與焉題其楔曰尊經過予居請記之予謂之曰美哉子之志於道也夫六經聖人傳道之書也尊經所以尊道也子知夫先師所以述六經之意乎其當大道不明邪説塞路之日也且上古之世有傳道之人而無其書中古以還著書始繁去聖益逺偽作競鳴而掊擊已尠至於衰周則炎炎詹詹騖於詼詭流放之言以售其私者多不可勝闢而道喪世衰之極矣夫子始發憤嘆曰嗟乎吾其述而不作矣乎乃取國史所蔵太師所陳者而刪芟之存其什一以為詩書筆削七十二國之史而著其大法以為春秋誦數絶韋於太卜之文而贊二篇以為周易百代之典惟周之從十代之樂惟韶是學遂次定以為禮樂曰後之學者茍得吾之意焉則即此六者可以藉手見古人之純全矣奚必予之自作也哉於是六籍既出而羣言自熄如二曜之掩衆光也二千餘年天下之談術業者必歸焉如江海之滙衆潢也義稍悖孔氏者羣起攻之才士巨子之出無盡卒未有操其觚翰摩孔氏之壘而與之角之者又如天王㑹同而萬國来王也嗚呼非夫至聖孰能為此哉語曰聖人之言可為也使人信之不可為也夫使人信之猶可為也使人信於乆逺而不懈長世而彌光若六籍者愈不可為矣非夫道之所寓烏能然哉是故道者天地之所法也鬼神之所發也前王之所憲也後王之所决也其孰能違之然後知秦之暴肆罪通於天矣董子乃蹶然起曰洋洋乎先生之論六經也而極何足以承之予曰未也予姑盡言之而子試聽之可乎夫先師之述六經也求其約而不可得也非以為博也六物并示者求其統一而多為之方也非以為異也知恃言不可以明道也故不作以息諍而欲擬之續之者可已而不巳也知忘言不可以明道也故假述以開先而欲𤣥解頓悟者不可己而已也夫是四者以為不法孔子則不可以為得孔子之意焉則皆未也何則言不可己而已者其失也誕言可已而不已者其失也僭求之異者其失也散求之博者其失也亂昔宋蘇氏以為後之治史者有其二病焉而予亦以為後之治經者具此四失也夫道之不明豈非四失之為害哉董子復起謝曰亹亹乎先生之論治經也極也不敏敢不服膺請記其言歸告同志遂書與之南平縣雲蓋里社學記徐階南平之雲蓋里故有滛祠雜老釋氏所為像祀之里楊生贊予毁以為社學既乆病其卑隘即祠之左作新居焉地高而明屋敞而固師弟子􅊰論遊息於其間者既安且適矣子乃進其師弟子告之曰若知此屋之所由作與吾所以責於爾者乎夫業賈者必於市業農者必於野業儒者必於學此屋之作固以别爾於市㧞諸野而登之儒也然而謀利者賈之為也謀食者農之為也謀道者儒之為也賈不能以謀利不可為賈農不能以謀食不可為農儒不能以謀道其獨可為儒乎自三代之衰外誘深而正學隠至於今日益靡然富貴之為慕師之教其弟子曰吾將使之為文詞取富貴焉茍有工於其藝雖甚不肖世以為賢矣弟子之求其師曰吾文詞之未能將就彼而學焉茍有能傳其業雖甚不肖世亦以為賢矣師弟子之所為胥失其本業而世又賢而助之為業日勤叛道日甚其名曰儒其實賈與農焉已耳其居曰學其實野與市焉已耳爾師爾弟子茍所為若是則此屋之作不亦虛乎故吾有以責於爾居其室必思修其業享其名必思履其事入而孝出而弟是弟子所以學也率之孝率之弟是師所以教也愛其親舉之以事君敬其長舉之以事上孝弟修其身而舉之以齊家治國平天下是儒之為儒也夫故曰三代之學皆所以明人倫謹庠序之教申之以孝弟之義凡吾之責於爾非有加於常惟本業之復非有出於位惟所居之稱非有逺於人惟以别於賈與農之為爾師爾弟子其知所從事也哉於是胥應曰諾楊生曰是將乆而忘也請記焉鑱諸石䧟置壁間楊生名清從予學儒之知謀道者也明文海巻三百六十四
