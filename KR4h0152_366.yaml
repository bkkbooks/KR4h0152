body:
  text: 明文海巻三百六十六餘姚黄宗羲編記四十書院石岡書院記楊士竒吾邑蕭自誠先生來京師屬余記其石岡書院余與先生之子翰林庶吉士省身交嘗聞書院興壊始末石岡在邑東南半舍許仙槎江之西梁蕭子雲十七世孫諱遜者始自峽江徙居之遜七世孫諱儀鳯宋舉漕貢始即其居之近作書院聚宗族鄉人子弟而教之儀鳯之子子安為王府掌計從文丞相舉義事敗覆其家書院亦廢掌計之從子福可明經擅為古文詩辭復作書院又廢於元季之兵國朝混一海宇福可之孫則善復繼作之而隠居教授其中蓋先生之父云吾嘗竊謂吾郡之俗所為可重非他郡所及者其民務義修禮尚氣節雖至貧不肯棄詩書不習至賤者能誦孝經論語曉知其大義凢城郭閭巷山溪林谷之中無不有學富貴者遇逄掖士必敬禮之不敢慢易而尤重世族茍其世賤後雖貴盛人固不願與齒而彼亦不敢以其貴盛加人吾鄉之俗如此吾何以知其可重也吾嘗下彭蠡泝大江浮洞庭游乎楚郢之間又渉淮道舒而東上下數千餘里或行數日不聞絃誦聲觀其人之所務朴者事漁稼智者趨賈販以逐什一之利率資大勢厚者為雄長不務乎詩書禮義不重乎逄掖之士也不辨乎世族也吾未嘗遍厯於天下而齊魯古稱詩書禮義之國今聞其俗猶不類於古昔然則論風俗之善惡必由乎教學之廢興故先王治天下皆拳拳興學於家塾黨庠術序亦各有制焉石岡書院固古人家塾黨庠之制考其創建以来雖屢廢之亦隨有賢者起而復之不至乎終廢吾郡之不廢其學類此故其風俗所以可重者有由也嗚呼一郡一邑之中不廢其學而俗有可重况於為天下之拳拳於學也哉是不可以不記滁州重修陽明先生書院記趙釴釴嘗聞先生與人語曰吾居滁時見諸士多務知解口耳異同無益於得始教之静坐一時𤣥解妙覺収效良多乆之漸有喜静厭動流入枯槁之病後教以良知則無動無静隨處有得釴祗服久矣今幸来滁拜先生祠下問先生弟子時多凋謝間有數君子能守師説不能倡其子弟又相牽從事口耳其意重希世云先生祠在幽谷中亦舊所示法地也户北啓左石右土柱漸東傾州守應君請於侍御少淇陳公出羡金埤虛易朽始可久託役竣時竊以士不至為歎釴曰噫吁口耳溺人久矣昔齊東門子者有道士也人曰東門子能目聽而耳視也衆皆趨之曰吾不能倒置耳目能順耳目之用而巳衆咸嘆之曰耳自能聽目自能視無待於人而詔之也又曰吾能不用耳而聽不用目而視也衆咸疑而走矣曰不然子之所以能聽者謂有耳也鳥鳴則子聞之乎曰然鳥去亦有聞乎曰否是子之耳以有聲而聽以無聲而塞也其能視謂有目也花開則子見之乎曰然花落亦有見乎曰否是子之目以有色而明以無色而蔽也是皆逐物者也夫鳥有去来而聞性無去来花有開謝而見性無開謝吾聞以真聞故不用耳見以真見故不用目今先生所謂良知者知以真知故不用聞見之知以為知以是来者益踈耳曰士患無有倡者今倡之而猶不至則祠可以無修歟曰不可此所謂感也今人適中都必問治跡所在經陳蔡則咨嗟四顧車肯不進望闕里洙泗則津津色動神竦矣故祠以存感也詩曰高山仰止景行行止此之謂也感則景景則無有不至者矣此君子修祠意也雖然有真知而後有真感昔者七十子之於孔子也有治任而歸者或治任而不歸此無他知有淺深故其用情有至有不至耳若真知陽明之學者則必無有不至者是為記雲龍書院記鄧以讚雲龍書院者中丞潘公侍御趙公為郡孝亷建也孝亷故無專舍今年夏吳子廷光陳子九功歸自春官而務變齊謂旅聚散非謀也輙率同盟謁中丞公請間讌公公雅好士大以為慰曰幾如是而不得志予其爾卜遂捐贖分起舘乎城南屬郡大夫王三錫顧其志度之已而侍御至謂獲其心也又頒營金卒役焉堂序亭垣具飭也於是錫以嘉名曰雲龍一日肅然造予請記予固讓不得命廼受詰朝又使諸君申請予乃告之曰勉哉命之矣夫説龍莫辨乎易之乾以諸君用之處潛躍之間其九三乎爻之辭曰終日乾乾夕惕若文言曰進徳脩業命之矣因坐而論文類皆專精若疑守勝若詛要以敬業為日夕予曰不然文一道也夫士之蘄彀也似射予昔去方之外嘗遭異人者工於中微而問其術對曰無他予學虛焉外不見耦内不獲身也然後引滿而已夫夫也為長於射者豈數數以中期為事此一之喻也予遲頓嘗學焉不象其心惟予二三兄弟皆矯焉所謂超軼無亦灑濯其神不役物不雄成考信千古直游意其不傳當觚抒思居然瓦注也若然則虛矣故心與境化而不稽機以順動而不桎曲成誰和焉然要以俟知者之知無為里耳易操嗟夫斯所謂徳業並邁與雖然大矣小之語黙周折大之述作位育孰是非文孰是非道一以貫之非有漸也故曰其入無倫其出不竭譬之龍惟無欲矣潛見飛躍安往而不神哉諸君曰由斯以談嘗聞用志不分乃凝於神是遵何説焉予曰不然此天人之判也予將盡言之夫不思而得不勉而中者先天之本體塗之人皆然故惟在黙而成之其志非分非合其神非凝非解則機愈㝠智愈靈易曰用九乃見天則謂不以人先之也顔子没而此學亡以安勉屬質而以能所求之故慮雖至變不離精粗斵雖至工不離瑕瑜雖滿志不離俞欿雖駭世不離雌雄是以聖人未嘗過而問焉以為未出乎人耳故予嘗妄謂聖自聖之學賢自賢之學曰吾持此而希其馴達必不達也諸君願為龍徳乎反覆是道可不謂繼絶學耶將使他日者曰是役也大有造於斯文豈不休美於是唯而退既蜡中丞公有秋卿之命且行諸君復申請予故書曰中丞潘公侍御趙公始建孝亷書院於城南中丞諱季馴烏程人庚戌進士在事多所興除民安其業士競其教侍御諱燿掖縣人為予同年又同中秘頃觀風蓋亦以經飾吏云記在落成之五月也九華書堂記王㒜池之青陽縣南有九華書堂蓋唐供奉翰林李公白字太白所嘗讀書處也初公之浮遊江漢也遙望九華山而樂之適故人韋仲堪為令遂卜居焉其居在龍女泉側嵗久掩為民丘宋嘉熈初令蔡元龍訪求遺跡始剏書堂於兹山之麓化城寺東以山初名九子亦公所易今名故以為書堂冠焉勝國時邑人柯敬之嘗加修葺去今二百年巳敝不支敬之之曽孫暹為按察使欲修未果至是其從子志洪捐貲集材徹而新之中為正堂五間翼以兩廡前為碑亭又前為石門施以扁額寺僧徳侃来謁予求記公蜀人也初隠岷山出居襄漢之間南遊江淮至椘留雲夢者三年去之齊魯居徂徕山竹溪入吳至長安被遇𤣥宗尋不合去北抵趙魏燕晉西渉岐邠厯商於至洛陽游梁㝡久復之齊魯南游淮泗再入吳轉徙金陵上秋浦潯陽受永王璘辟璘敗長流夜郎遂汎洞庭上峽江至巫山㑹赦還憇岳陽江夏久之復如潯陽過金陵徘徊於厯陽宣城二郡其族人陽氷為當塗令往依之卒𦵏青山時寳應元年也其始終閲厯可考見者如此所謂公嘗讀書於九華者當在天寳十四年前上秋浦時而郡志又謂公樂五松山水之勝建堂讀書於此豈記者誤以九華為五松抑銅陵縣别有書堂今皆不可考也噫公一代文豪也舊史稱公有逸才志氣宏放飄然有超世之心故平生厯渉畧無膠滯後人仰之毎因其所至而表見焉如齊魯之酒樓有六逸堂其在姑孰如謫僊樓翰林宅十詠亭之類清風逸韻千古不泯宜乎兹堂之建於今而復於昔有如志洪者之致意於斯以克承先志也抑嘗考蜀之彰明有大匡山山下亦有公讀書臺即少陵寄詩所謂匡山讀書處是也遺址尚在今隴西寺而兹堂既移建化城寺側乃復有如侃者協力以相成之於此可見其風聲氣韻之相感不徒在吾儒者雖異道之人亦知景仰而效力焉故不辭為併著之俾刻石堂下若夫公之文章流播宇内光燄萬丈人皆見之又無俟予言之贅也輞山書院記李舜臣鈞州勝地曰輞山者張子魚築室其中置所蔵書萬巻延鄉之子弟有才質者得縱觀焉子魚之為江西憲也吾從寮末得覩所謂輞山者圖及副使周某與吾友劉叔正所為記與述者知其創建之意蓋子魚以附郭上田易而得此初不自有共之諸生嘗以科舉之文體裁畫一童年而習既第乃易譬之銜轡遏其奔衝非至駑駘咸足驅䇿是謂大約而教之道不在是也人業一經以人聰明有及不及非謂高明之士亦限之也夫明經飭行以達於官學古能文以明有徳古今所珍而科目之選也今但慕之以為科目而已不復有明經之志是故飾碎裂之辭庶榮利之願食且寢於其師説舊聞而未嘗有見於古今之際雖幸登第脱其故習已廹於簿書之殷關乎崇卑之間所謂學古而能文者竟荒且負不能有成科舉之文又不足用於世下焉者遂為貪佞之歸道徳之士殊等之才所以不可多而見也子魚方以為萬巻書俟有志者究觀而强記也起其衰陋之習而資其才識之明且逺庶幾卓然有名其鄉者其微意也豈不美且盛哉尚行書院記李維楨隆慶初載余承乏為吉士師事蜀趙文肅先生先生嘗言鄒衍論五徳之運理固有之昔者孔子言仁孟子言義荀卿言禮宋儒言格致而王文成言良知今當言信乎今不識信所謂先生曰在尚行蓋去先生三十餘年而學術益敝矣虞廷之危微精一孔門之博約克復且以為事障理障而去之希心妙悟合契自然當體便是動用即乖桎梏倫常芻狗名物互標法門爭誇証聖其説洸洋傲之以所不知而莫得其端其趨操茍簡自便愚不肖者易合而莫覺其非其名尊美使人羶悦而莫摘其瑕游談作而周衰清言競而晉亡今學術不幸似之以此文學則廢經史之大義黜傳註之成説離章句之本指五尺童子拾二氏唾餘以自竒師心用智跆籍前人而出其上以此為言語則博名託於効忠修怨附於嫉惡冥冥決事而或以事外之人掣肘勿勿逐聲而或以忌成之口譁衆以此為政事則上下相䝉利害相仗毁譽相錯名實相詭膠序未聞揖讓而賢豪舉郡縣不問疾苦而尚擊斷新進喜凌厲而老成務優容長吏失操柄而下官逞胸臆區黨横分體綂衡法蓋學術不尚行而馳騖於空談虛聲生心害政流禍若斯之烈也吾友鄒孚如嘗三為主司衡文武士又為天官尚書郎銓叙九流能已見於天下矣退而耕於雲夢之野逺近士人負笈執雉受業者日益衆為之精舍居之監司郡國嘉樂其事有所供都養費加繕治焉號其所居曰書院書院故嘗有厲禁孚如固辭其名不獲而名之以尚行行信也左氏曰信為土朱子以為然土四序何所不有孚如之專言行也其有所憂患耶彼其所進退士無亦有如孔子失之宰我者耶孔子之聖也聽言且觀其行又曰勿取勿取健勿取口説士無行而其足以飾之其健足以任之其口説足以折人而恣其所欲天下孰能當之行之不可以已也如是夫孔子之行余所不敢擬議庶幾為孔子之徒者楊秉有三不惑酒色財張復之有四不言亷不言貧勤不言苦忠不言効功不言能邵堯夫有二不愧行不愧影寢不愧衾黄徳思有五不欺家不欺親仕不欺君仰不欺天俯不欺人幽不欺鬼神此四子者宋儒未嘗許以入孔子之室即今之學者目為老生常語耳余竊有取焉尚行故也孚如齓而為諸生髫而登賢能書踰冠而成進士為内史為天官郎極清華之選而生平所遘實有困窮拂鬰人不堪憂者以故動心忍性其行誼日加修盖尊人潛野公躬行君子母鄹宜人賢明仁智儷之孚如甫登第而失父聚百順以事母行如孚如父母善繼善述豈易也哉孝者百行之本孚如正直亷潔天下能言之而不以孝名以此尚行何以尚之從孚如游者黙識而時習可矣余安得起文肅先生於九原而告之曰今鄒子之學術非昔鄒子比也大滌書院記黄道周壬申秋余以逐客南旋實携杖屨啓闢斯山何兄羲兆左經右鉏綱紀其事不數年茨暨聿立苞麓既平環流既清四方髙躅之彦時亦往來興詠其間余方攀柏藝松棲遲漳海未之能從也戊寅初冬余再以逐客南旋緬念斯山暌違七載遂復誅笻其間徘徊日夕嗟乎天水之時畫江中斷李伯紀顛沛其先朱元晦寥消於後考其立朝逺者不能需朞近者不能彌月僕以迀愚幸逢盛世怒鼃之氣散其木鷄前無伯紀慷慨劍箾之誠後無元晦藴藉經書之致而欲與抗送千春提衡九鼎吾知難矣夫勲名之著身猶膏膩之著於茗葉道誼之著心猶寳屑之著於瞳子將為滌其盛大進以𤣥虛則瞿曇柱漆之流又溷其堂室此如逐清客以奉偶神郤膏梁而尊枯腊諒無濟於誕登未邀於成始也余少逺勲名長疎尊導繆從時路領日於兹感𤣥滌之未能班李朱而不逮然觀其事㑹酌其稽獲百世之下從此可知矣比考二公心身之際備悉淵微伯紀以誠明開君元晦以格致引士雖不標其宫庭要無殊此㫖趣至於旂常爼豆繫於兩室熨以河魁非君子之所宜謀學者之所有事也僕老矣農山餘談刪其將相韞丘之富無異薪樵以謂今日之所當為不過蒔花課竹汲谷烹泉即為格致之源不累誠明之動便可大滌𤣥氛廓清宙務役使黄面𣆀耳之倫以供烹㸑沐浴之具如此而可矣他又何知焉此山翠竹如苖巨身細葉益以薤芥涉冬愈嘉蹲鴟之倫盈隰被畬又少諸往時車蓋香火㳫雜之累即有一二朋從罇酒簋缶來證所學雞黍就遲稻米七鑿諒可免於噉菜事魔之誅乾餱以愆之刺也羲兆食貧未離寒素而綱紀於此已逾六年而僕僅一游目其間不能與諸名賢日夕講貫暢格致誠明之㫖雖逺近之勢不同而滯達之情備見矣壬申嵗余游兹山嘗為之記久不復憶比復重厯如讀經史再翻之後心眼亦别是左數百武即大滌洞洞九曲上下正平如鐻承塵傍為湧浪盤翠欲漾出洞左得小逕不數折去屐前齒得兩龍潭螺旋而上踰嶺不十丈丹黄交映折小逕而左厯頂西瞰可掇兩天目見蒼石藴草間叩之若磬是將達於棲真矣棲真右垣列壁數丈許唇齒匹之可啣一亭棲真谽谺如百間屋詭樓迷厦右鑿石逕隠現璣樹如鬬鷹鸛可數百歩即達歸雲矣從歸雲西旋循諸石徑稍東南行過黄山嶺還就小徑復於龍潭望大滌之口宛然歸雲也從是口而思棲真居然大滌矣書院大滌南折而東扆於天柱以妃大滌右行數百武得兩石門瓊液霏然如茶竈之在庋閣右少煩拄杖仰捫湧翠巖猶從驪龍逆鱗間行也自是出溪口渉畬吻可探石室石室未蓋而函殊可寳也南吞丹泉東出九鎖之溪龍蛻踞於北崖鳯瞑伏於南窈蓋出九鎖而洞霄之觀始究其自九鎖入者别從西嶺下南陟石步障以宿天柱之麓於以西探歸雲東掇石室仰承棲真俯納大滌猶右襟之結衣帶矣當時從游者為嘉興倪梅生先春汪爾陶挺錢仲雍琳蕭山曹木上振龍淞江陳卧子子龍時卧子以桐杖不遂登高諸數往還者余病未之能從也伯紀元晦二公祠即在書院之左腹書院制度及諸興創啓闢者不在記中崇禎十一年戊寅冬仲上浣右齋黄道周識大滌書院後記黄道周大滌山者當餘杭之西宋人所營洞霄宫者也古瓦殘碑依稀在焉而李伯紀朱元晦以俎豆特存壬申之嵗予以放屨常厯是山坐卧李朱几案之下今復七年矣再為逐客重厯是山嗚呼以僕迂愚遭逄盛際無格主之能匡時之益而鹿鹿往還剥烟啄霜猶幸與伯紀元晦情事相隣嚮令郭文舉許逺游在豈可令其竈下兒見之乎是山吐泉北出為九鎻之溪溪源發於天柱中際為金竺坪扆坪承柱築小講舍以面大滌是臨安諸賢所共余晤語者也謝傅嘗云臨安以西多金堂玉室異人所棲余嘗上下徑山天目三四百里間捫高探深杖屨所結堂室異棲未有盛於大滌者矣大滌一山凢六七洞其博奥不及天台靈幻不及雁宕石嶂流溪不及武夷飛瀑隆巒不及匡阜竒峻不及九黄山精巧不及浮丘白嶽而獨以諸洞著於天下凢天下洞壑率在窪崖洪濤之所鼓盪龍匠移宫鮫人徙宅故其變態萃焉大滌當萬山之中寗父之所未陶康樂之所不鑿而谽谺窅窐遂若葯房壯於層屋若棲真之嵬峩歸雲之窱䆗𤣥蓋之浄雅雖不復藉諸勝亦良足撮其所長矣𤣥蓋者即大滌上下正平如削承塵謂之𤣥蓋棲真在大滌西髻洞門如城闉層樓環聨旁有通竇道書所謂懸霤歸雲西望天目暮靄所巢噏舌吞之此三洞者雖不必異人所棲然使漢武聞而搴裳燕昭聽而抵掌何詎過乎杜光庭稱是山玲瓏𤣥牝之竅妙棲息之下可以大滌塵心嗚呼塵累於人猶雲之觸石堯水所不洗許耳之相䝉蓋亦多矣謝傅棲遲此山五十餘年捉鼻拂巾為司馬主簿嚮使此時風鶴無靈鞭流遂斷蒼生之恨東山之痛豈復可滌乎僕自少寡名縁長稀物累然而東臨闕里未累漁樵道龍𣆀之未能逃漆園而不敢必如邁子之謝家人文舉之辭皮袴雖髪白齒落末繇也矣所幾希者右軍誓墓之後嬉然入林安石取幘之前翩欲採蕨終始斯志未失遂初儻一二高朋觧纓罣組朝誦孔易之篇夕哦風騷之㫖鋤松餘暇灌竹多閒相與擷其逸華収其雋實八十之年足跨八百鼓喬之攀鹿髪安浮之詫瓊宫吾皆命以僮僕寘若有無又何羡焉家距武夷可千二百里既已離仙何殊郷邑丙舍之外狂簡聿從通經典者亦可百十然自以明發異瞻敬恭漸廣念我同心之好别為伐木之遷昔右軍之適㑹稽謝傅之移蔣麓豈必守其鷄窠憚此鵠舉乎嗟乎升沉岸谷百年之内累世足徵宋室丹黄之殿錢武金碧之宫既如此矣謝王視之太濃許郭視之太淡錢趙視之太貴李朱視之太瘁余以逸客翔集於斯濃不及謝王淡不及許郭榮不視錢趙瘁不視李朱故余之於此山亦猶此山之於九華匡阜台宕黄白也非獨余然余友之託於兹山者亦大抵然矣是山洞壑出處别自有記其經理講室者詳余友何羲兆誌中而是日同游諸彦為景陵胡公占繡水倪梅生汪爾陶吳江錢仲雍雲間陳卧子仁和朱美之蕭山曹木上與羲兆逓為主人余一日凡三記情藻盡矣其不倫如此黄道周識大滌書院三記石齋崇禎壬午予以觧網至白下買舟將出長沙值北告警桐皖之間風鶴騷然又毎倚杖聽明詔多寛大之音得裵徊容與與烟波上下念此暮年笻屨垂絶一泛湖湘抵夜郎探二酉親石笈或留或伏􅒓近崦嵫何期復至大滌與親友談話詢諸旅客長年咸云南出臨安渉富春泝信州從貴溪西流下臨袁不二千里可抵長沙省諸波濤風鶴之險嗚呼予如擇地避險者亦豈遂至此乎憶戊寅放謫將過豫章便道入大滌拜伯紀元晦祠下何羲兆持酒炙灑地跪讀祝辭遶梁震屋何可忘也今幸不死將排衡雲陟君山訪懐沙之渚探弔湘之窟不復與朱李周旋寜當舍舊交與屈賈少年同其怫勃乎四月十五日至西泠十月卄五日與錢去非孟長民入禹航僦青山舩入九鎻溪顧諸堂舍依然未墜而脩篁抽篠廕鬱加長矣於時芍藥未彫雜英正茂丹泉涓涓納烟可濯想石門翠崖近在跬步欲往話訊未之能也又兩日諸友先後間至剖析鵞鹿疑義稍稍與子静開滌諸友亦欣然無異漸復汎濫易詩書禮樂新故異同之致不能不與元晦牴牾而元晦醇邃矣繇子静之言簡確直㨗可以省諸探索之苦然而弊也易繇僕之言静觀微悟可以開物成務然而弊也支繇元晦之言拾級循墻可至堂室高者不造頂無歸深者不眩崖驚墜繇其道百世無弊則必元晦也時陳子龍卧子為紹興府推官陸自巖魯瞻為湖州府太守予以二賢在治不欲久滯越中二賢亦先後過大滌竟日别去所遺惠自茶笋黄米外諸友亦戒不敢受予又以病羸不能再尋諸勝獨與去非對榻時一隠几卧游而已荒山幽蹊四百餘年不治雖無魑魅虎豹常如淘礫欲囓人趾惟姚有僕朱康流邵先之登東嶺張睿衷尋虎巗唐既白王天岳再觀𤣥蓋一瞰棲真白日秉炬窺奥窔而反予念在白下時諸友欲卜小築不就記戊寅十月過栖真覓歸雲洞雜篠亂卉中與胡公占倪梅生汪爾陶曹木上錢仲雍披榛捫磴擕酒榼﨑嶇殘崖之上於時冬日銜山圭岑四暎暮靄未合下見平田十數畝竹葉招招與洞霤平循崖際巔列石百餘步可坐可倚欲約羲兆命鋤啟闢結亭其上下買竹阜作六壁小庵穿徑從黄山可二里許出𤣥蓋之臂今垂五載未踐厥諾而為三湘二酉奪其茨暨又何暇從白門滯畱適有樵子從棲真來談往嵗所游非歸雲洞别有歸雲為棲真後户去棲真不過百武攀蘿縁篁可一蹴至予㗳然而思世寜有窟宅百武間不辨門户者乎是猶從何顒游不過小山者矣策病足佐藤竹進之藤竹蹔然而前與趙浴咸吳季安郭彦深朱美之孟長民肩膝相嚙也至則窈然探石罅下砌磴而入可數十尺如墜猿舘不簉前所謂歸雲者而前所謂歸雲亦宻箐封之不復可步崖址亭意亦己俱失得毋前誤者花溪銀犬不可㪅真乎抑天下真者原不勝誤也逸少有言所之既倦情隨事遷則感慨係之矣兹山幽勝視西泠不能十二竒峭不能十五而獨以真樸自完遇時無赫赫之觀去後恒思之予之思此者屢矣石門泉壑敗瓦亂灰自石步障以西一丘三洞潛跳可樂山户遺劵高不上陽羡之田卑不逮愚溪之價而委蛇十載洗刷未就凡三過毎從數十日忽忽去之嚮遂白下過長沙列俎酉陽錬砂勾漏欲從諸友刋誤推真㪅思一適豈可得乎周濓溪欲營湓江結廬其下既復不果謂潘興嗣曰三十年讀書亦欲一濟蒼生行其所學如果不遂與子盤桓論道講書未為晩耳嗚呼司命在天着心便誤有待而營何者不晩行年六十能復幾何華嶽嵩高太行少室巳俱為豺狼之區戎馬之道而大滌一區僅存數椽與朱李木主相對僕乂當西行採蘭佩些賈楊以為顏閔景宋以為游夏不知四五百年後誰復念此山如吾之於朱李者是游也從訪者四十八人孟長民錢去非不去而去非以㣲疴不尋諸洞住山不尋諸洞者戊寅為陳卧子壬午有錢去非又為别山之辭曰為鳯遴梧為蛇擇沮誰當集菀不如鳥烏東則有泰山峨峨西則有蒼龍青柯北則有繁峙雁門中則有灊九羅狼豺守之狐兎孔悲旅鳥焚巢芝荻罔遺天憖彼老尚有衡嶽似樗全年如葵衛足相爾巃嵸則亦厥祖昔云中原有三天柱二者陵遲汙於盗㓂唯此一峯瞻前忽後以是一峯匹彼衡嶽雲霞孔馨惠我南國虎兕雖横不敢休鯨鯢雖頑不敢游宛委之書宜蔵其㘭岣嶁之碑宜植其頭我往從之實唯一氣移碑與書亦明主賜非明主所賜而我安得至召彼九巫諧我兩家炊蘭服香徴歌變些勿云室逺勿使人遐勿以毒溪􅒓我桃花恃爾十年相知勿為它山參差七洞九峯咸皆見之崇禎壬午五月十七日黄道周識明文海巻三百六十六
