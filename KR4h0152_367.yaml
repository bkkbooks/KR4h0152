body:
  text: 明文海卷三百六十七餘姚黃宗羲編記四十一祠廟談節婦祠堂記烏斯道談婦死節久未有祠四明烏斯道蒞政永新之二年為洪武十年丁已五月十有一日乃擇頖宫興文閣西南辟大池上建祠設主以補缺典蓋以婦死而聖人是依今祠而依乎聖人庶以妥其靈焉婦姓趙氏名逸不聞古廬陵郡之永新人也生有淑質嫁同里談氏子年二十有七至元十三年丙子江南內附越一嵗丁丑宋丞相文天祥志恢復有書約女弟之壻彭震龍起兵以是嵗七月十有九日兵內外合發震龍亦永新人盟同色張履翁顔司理先一月起與降將江西運使鎦槃并槃之禆將蕭明合戰永新而丞相之兵不至遂敗衄北軍突入城城中大亂民咸負携遁逃婦抱所乳子與舅姑倉卒走縣庠聖人殿庭軍羣逐至殺死人且犯人妻女不畏忌軍欲犯節婦婦罵曰吾舅姑死於汝吾保身以生且不可况辱身以覬生乎固不屈軍怒因併乳子殺死殿庭中時有屠者避殿庭楣梁上下視婦死事為詳遂傳聞至今逾百有餘載而婦與子之形在殿庭土磚上巨細畢具後有守土者弗信以沙石蕩磨或煆以烈火試之形影愈見嗚呼當宋季時朝廷培植人物皆以科第進崇爵厚祿至白首者孰不以忠烈事講之稔而責之深哉及乎版圖失守神器徙焉而向之崇爵厚祿者乞降走匿不暇其肯死節者曽幾何人哉兹以一婦人能慷慨死節與同郡文文山光焰相照垂名史册豈不重可慕哉且其生時精氣素己貫諸金石不可磨滅况死於聖人殿庭聖人之靈尤表而出之者哉若是祠而嵗時祀之宜也用請於郡府轉聞於上兾褒異錫號使風俗益有以勵焉祠成越十日從仕郎知吉安府永新縣事四明烏斯道撰象祠記王守仁靈博之山有象祠焉其下諸苗彛之居者咸神而事之宣慰安君因諸苗彛之請新其祠屋而請記於豫豫曰毁之乎其新之也曰新之新之也何居乎曰斯祠之肇也蓋莫知其原然吾諸蠻夷之居是者自吾父吾祖遡曽髙而上皆尊奉而禋祀焉舉之而不敢廢也豫曰胡然乎有庳之祠唐之人蓋嘗毁之象之道以為子則不孝以為弟則傲斥於唐而猶存於今毁於有庳而猶盛於兹土也胡然乎我知之矣君子之愛若人也推及於其屋之烏而况於聖人之弟乎哉然則祀者為舜非為象也意象之死其在干羽既格之後乎不然古之驁桀者豈少哉而象之祠獨延於世吾於是益有以見舜德之至入人之深而流澤之逺且久也象之不仁蓋其始焉耳又烏知其終之不見化於舜也書不云乎克諧以孝蒸蒸又不格姦瞽瞍亦允若則己化而為慈父象猶不弟不可以為諧進治於善則不至於惡不抵於姦則必入於善信乎象蓋已化於舜矣孟子曰天子使吏治其國象不得以有為也斯蓋舜愛象之深而慮之詳所以扶持輔𨗳之者之周也不然周公之聖而管蔡不免焉斯可以見象之既化於舜故能任賢使能而安於其位澤加於其民既死而人懷之也諸侯之卿命於天子蓋周官之制其殆倣於舜之封象歟吾於是益有以信人性之善天下無不可化之人也然則唐人之毁之也據象之始也今之諸彛之奉之也承象之終也斯義也吾將以表於世使知人之不善雖若象焉猶可以改而君子之修德及其至也雖若象之不仁而猶可以化之也三功祠記林俊正德庚午豫起征藍道夔之下關所謂白帝城者問其祠公孫述也豫曰越矣哉非鬼之祭也古者慎制祀以為國典無謂加典為非宜况賊而神祀之倒持綱常衊名教乃爾可慨也夫方述起成都以輔漢為名乘亂稱帝馬伏波見而少之曰子陽井底蛙耳故不受偽命專意東方用能佐世祖立功異域為中興名臣而述竟漢賊以死述可祀則漢莽可祀晉敦可祀他日藍鄢亦可祀亂賊之臣亦憚而自沮耶嗚呼世道大關也政而系之教焉淫祠之當毁有先於是者乎嘗怪述生盜名器既誅死猶土偶南面繆竊血食者千數百年少陵東坡徒寄春秋之筆而諸葛武侯張忠定范忠宣事任是方猶未及是正意者將有待於今耶固世道者之責也既命毁其像易其額為正所宜祀者土神江神而伏波亦與焉昔共工氏之伯有九有也其子后土氏能平九土故祀以為社書曰宜於冢土下關雖一里之社土之人其世依於生也川澤以出財用而祝融玄冥河伯江瀆具在祀典潞公所修益州江瀆之祠故在也書曰望于山川關又江之襟喉民寄命至要也皆蒙被功德所宜報而祀而以告以祈又胥聚於此焉若乃炎精中微姦偽移柄當是時述能如援擇漢胄自依則述將與賈鄧等伍望蜀之萌何自而起蜀之赤子何名為從賊浮橋覆溺八北之慘亦何因而至哉述名教罪人貽蜀人之禍至於今為烈也故毁述而進伏波與順也亦祀典也嗚呼君臣天地之大經也亂臣賊子人人得而誅無赦者况豫叨討賊之權者乎植人心扶世教毁述賊之祀以聲討藍之端道之大關若此無謂然乎哉是秋仲月莆田見素子林俊記全節廟碑記張詡全節廟在新會縣崖山之上𢎞治辛亥今兵部尚書華容劉公大夏為廣東右布政使時建以祀宋楊太后者也於時廟額祀典未之請也庚申僉事武進楊公紘適分巡是邦也乃疏上特賜今額而祀典如祀厯代帝王於時新廟碑未之樹也甲子左參政慈溪王公綸適分守是邦也乃屬筆於詡謹按后度宗之淑妃也當元兵之深入也直搗臨安一時帝后王臣盡為俘虜獨后負其子益土是與廣王昺航海奔閩於是羣臣奉是即帝位册后為太后帝崩復立昺奔崖山依二三大臣陸秀夫輩卧薪嘗膽為宗社恢復圖既而元兵進逼崖山破之秀夫知事不可為也負帝昺赴海死之而宋祚遂移矣后聞之撫膺大慟曰我間關至此者正為趙氏一塊肉耳今無望矣亦赴海死焉惟宋三百年后妃之賢前稱高曹後稱向孟亦可以為難矣然皆處常而能正者耳至於流離患難卓然能炳大義一君亡復立一君君亡而以身徇之其死也為社稷死為國家死為綱常死為扶乾坤光日月死所謂死有重於泰山者也其有功於世教也大矣豈非處變而不失其正者尤不易乎是雖丈夫子讀書説道理者事君則欺其君相國則賣其國專城則棄其城賊至則或閉門或迎降甘心而服左袵平時君以髙爵厚祿待之謂何一旦視棄其君父如棄辨髦者蓋亦多矣顧后儼然以坤柔之姿目或不知書而道理或不能出諸口及乎臨大變毅然視死如歸何哉盍亦求其故乎蓋體道在率性而己矣性無不具者也故以婦人女子之質之美者往往所行不期與道合而自合如后妃之流是已性昏於蔽者也故丈夫子而不能率性老類為物欲所蔽故無事則雍容委蛇談何容易至於小小得喪利害臨之於前而不喪志失守者或寡矣况死生之際乎欺君賣國之流是已彼為禍水為牝晨者又何怪乎然則我皇明全節之褒元祀之享以為后待者宜也非過也然自后赴海後二百餘年而得劉公始建廟又九年而得徐公始請祀典又四年而得王公始徵文勒之金石嵗閲七世事更三賢然後全節之廟貌俎豆后之流風遺烈殆與崖山俱高海水俱長矣詡近輯崖山新志載后事亦既詳矣復懼夫世之昧者或不知率性以為道也僭為之辭以為王公復俾刻之石系以詩曰朗朗性天古為明德明德克明不懼不惑有龍失所嗟日之昃星月從之崩於海國謀豈弗臧大命已革視死如蛻就義如食以扶天常以輔人極以奠坤維以煥神祏堂堂丈夫破釡失色孰能死生從容擁翟高曹向孟光昭史册於赫后烈允邁前彠二百餘􅑤貞風淪落有嚴廟貌臣大夏作有隆祀典臣紘建白帝曰俞哉宜屋宜秩嵗享太牢廟褒全節臣綸揚化用播金石臣詡操觚敬述帝則先烈煌煌聖教赫赫五嶺以南雷厲風廓碑於廟門垂示千億宋陸丞相祠記張詡宋陸丞相祠在潮郡韓山之上郡守葉侯元玉創以祠宋丞相陸公秀夫者也公負幼帝沉于崖海而廟食於崖山宜矣曷為祀之潮邪考之一統志及潮志皆云公墓在郡南海嶼上而續綱目載公與陳宜中議不合陳宜中使言者劾謫於潮則潮為公體魄所藏之地而過化之邦也今天下凡名宦流寓之賢例得祀於其土况公一代忠貞論者謂其尊中國排左衽立天地之常經明春秋之大義其有功於世道也甚大則其人品事功巳超然在潮之名宦流寓諸賢之表矣此而弗祀祀而弗專非缺典歟先是詡修崖山新志也考公事迹知公墓在潮墓碑猶存而近年始失之也為之嘆恨不自勝因走書侯為物色之既而侯復詡書訪公墓在澳山北青徑口第碑失漫不可尋儻卒不可尋也就其地封而表之更於韓山韓文公祠左搆一祠以專祀之焉詡得書又為之喜不自勝報侯書曰執事之舉甚盛舉也今年春二月晦侯走書幣告詡曰祠成矣請記之夫公之忠貞明白正大昭如星日崇祀而表章之使世之委質而為人臣者知死生患難如許而不忍少負况當治平無事之時享大爵蒙厚祿無死生患難之迫而忍欺其君乎推類而盡之凡為人子弟者不忍負其父兄為人妻妾者不忍負其夫主而為門徒與友者不忍負其師與所交也教立乎此風行乎彼三綱正九法修風俗厚世道隆矣其視徒敝精神於刀筆筐篋者其功效大小相去何如也夫豈但慰忠魂於地下報功德於當時而巳哉韓山去郡城一里許山之椒有三峯列若三台秀拔翔舞如飛鳯長江走其下蒼松古檜蔚然掩映江波景象明媚千態萬狀蓋潮形勝之絶也侯因卜祠地一日肩輿徑登焉徘徊顧瞻之頃遂得其勝於山之左峯之麓若有神相之者搆祠凡三間前廟後寢高低深廣規制靡不稱階之下鑿池一區植蓮其中周遭繚以崇垣當户則綽楔巍然以限內外是祠也背山面水縈紆環繞引領間與韓氏聨輝並麗宛若在霄漢之上於戲以寥寥二百餘年之遺烈而顯於一旦殆天所以報忠貞特假手於侯邪是不可以無記矣若夫公之忠貞始末載在信史及崖山新志者己暴暴可得而略也侯以宏才治大郡舉目無全牛而英風偉格隱然可任世道之責故能大有為如是祠經營於嵗甲子踰年而始成蓋事事未始茍故也王氏祠堂記羅玘𢎞治二年十月金溪明谷王氏祠堂成其作自元年之十二月而統其事者廷懋也堂之廣楹六之門如堂之楹而高殺其四之一東西室各四楹器數齋湢庖庫具在礱石為簷除四周如矩虛其中而甓之矢直砥平無興塵泥隂雨若霽闔宗升堂奠位凝肅顧瞻群主若見若語孝悌之心與涕俱生咸嘆曰舊徒吾祭不吾興感若是也鄉人之嚚嚚者曰甚哉王氏田入之饒成此其易也吾以為不然夫王氏田入之饒孰愈於賜廟之家祿入乎吾遊京師見其藩則拔矣垣則夷矣碑踣而畜室焉者盡賜廟也問之其子孫不入是者幾世矣又其甚者曰是既鬻矣俟其盡夷築為它氏之宫也至其大第以居高軒以遊則殫其祿入焉以與戚幸者爭為長雄顧不少惜豈其力獨歉於一廟耶蓋其先世得無有貪功之過而濫及於非辜乎其不祀可坐而待也獨其子孫之罪哉而此王氏者吾知之實自宋祕閣校理平甫五世孫彥逺居於此平甫荆國公之弟也當熙寧中一時小人皆附公敢行苛政以希貴富貴富公所柄也豈獨靳於其弟乎而平甫竟以不顯終其身要其心有切齒於公於小人之所為者此寬厚長者之風而為當世所竊笑然不知其固有可久而存者矣而彥逺又歸自金陵依故土以居其不忘根本又如此而公之子雱雱之死無聞焉小人之祀不祀蓋亦與貪功多殺者爭入於泯滅而己耳無足論也祠之所作庶其在此此天也夫豈牽於力哉嗚呼人亦孰不欲祀安知貪殘苛暴者其不愈急乎而卒愈促觀於此祠亦可少熄矣其族彥斯誠至是始克來請記吾以是為記亦以公為世勸云吉水忠節祠記彭教先王盛時道德一風俗同行成乎邇而達於逺政舉於上而服乎下毁譽不僭誅賞無濫士生其間一意修飭而無所回互上之人亦惟好是正直而不眩焉孫叔敖有言國之有是衆之所非則固有感於先王之盛矣宋故參知政事文忠公歐陽永叔以古文倡天下以風概立朝廷以禮義亷恥處進退之際後世至比之韓愈孟氏而猶恨其不盡用南渡之初建康通判忠襄公楊邦乂不肯以城降敵刺血書裾死於位開禧之季寶文閣待制文節公楊萬里不肯屈附貴勢謀進取聞權臣誤國憤恨不食死於家去今三百餘年流風遺烈與秋霜爭嚴嗚呼尚矣然文忠在當時一知貢舉而譟者成聚一入政府而謗者盈庭一移書朝列而如高者訥者亦得以操計而困辱之一賦詩稍及時事而雅有譽望如晏元獻猶懷之終身不置不奉行新政而晚出用事之人相與併排靳侮名為流俗姦邪致使朝廷薄敬故優老之禮而不恤其見是於人蓋亦無幾矣至若忠襄文節事不盡傳然竊計一時全軀取寵之徒黨與倡和必有以明夷之用晦趨時之變通皎厲之畔道苦節之匪貞上下其議論者隂淆名實之位潛鼓進退之機使天下之人靡然習而安之其於兩公所為不詬其悖必笑其強况肯相是哉由今而觀其非是何如也雖然亦豈待今而後定也時移世變公論隨白乃欲追直其毁譽而正其誅賞則已無及其人無益於事矣嗟夫此豈獨士之不幸哉今永豐之沙溪歐陽氏之先塋故在吉水之湴塘楊氏之子孫具存沙溪故𨽻吉水故吉水有忠節祠合祠三先生者舊矣嵗久修葺不嗣頽毁略盡江西按察僉事南海陳君夢祥按視學宫軫悼湮廢乃命以贖刑之金别搆祠屋為三楹於講堂之右孝子亭之北立主奉祀一如故事既邑之人士謂教宜考故詔令刻之祠下教不敢辭竊惟三先生之烈在天下不啻家至而日見之况於鄊邑之間父兄長老所誦聞街談巷議所道説無亦嘗有扼腕太息於其時其事者乎無亦有欣動企仰願為之執鞭者乎有志之士尚明道以端其趨養氣以厲其守庶幾三先生之是而不奪於衆之所非所謂成就一箇是者固於是乎在匪直先生之光鄉邑之重實國家有賴焉陳君勇義強仁所至能彰善疸惡樹之風聲觀其所是可以知其人矣改正祀典記何塘潞州東火鄉宿幕仇時濟氏往年與其鄉人舉行藍田吕氏鄉約即鄉之東嶽廟行之既而以東嶽非庶民所得祀乃遵太祖高皇帝里社得祭土榖神詔命設五土五榖神主即嶽廟之後殿祀之祀畢則藏主於嶽廟之前殿扄其門不啓由是嶽神之祀遂廢未幾時濟去世宗弟國賔時茂嗣主約事間謀於衆曰祀禮有典吾儕祀土榖之神而不祀東嶽於禮甚正顧嶽神之塑象尚在今雖不祀安保他日不復其舊吾欲撤之以室復祀之源如何僉曰可未果而時茂捐館仲弟義官時淳以兄之志不可不終也恐禮未允乃令其季弟醫官時間來南都訪於溪田馬子涇野吕子并及於豫二子曰東嶽泰山也在魯境內禮諸侯祭境內山川季氏以魯大夫而祀泰山孔子尚以為非禮之祀神必不享况晉民而祭魯之東嶽神之不享也決矣且褻瀆神明律有常禁而土榖神之祀則聖祖所許今撤東嶽之像而修土榖之祀稽於禮而合稽於情而順無可疑者以此窒東嶽復祀之源甚善豫曰所論正矣然東嶽之祀遍天下其故則不可不知也博物志云東嶽主召人魂魄其始不過謂東嶽屬木為魂蓋以五行象類言之耳非有他也而立言無法昧者不察遂謂人死魂皆歸東嶽嶽神將治其生時善惡而罪福之世之惑於其説者往往立廟致祀兾以徼福而免罪故東嶽之廟祀遍天下其來也非一日矣昔漢成帝廢諸祀之不合典禮者其意甚正劉向乃謂諸神俱有神靈不可廢帝暮年無子惑向之言盡復諸祀夫劉向大儒也於鬼神之罪福尚有所惑况餘人乎東嶽治人死後之魂而罪福之祀則可以徼福而免罪世之惑也久矣兹惑不解雖毁其廟將復設之猶反手耳况止撤其像乎以此窒其復祀之源恐未能也時間蹴然曰為之奈何曰此不難也事之有無斷之以理東嶽治人死後之魂而罪福之萬無是理借使有之乃緣是享人之祀而行私於其間則亦一瀆貨枉法之吏耳明明上帝豈肯容之乎誠有嶽神必正直無私如世之清嚴官府且將惡愚民之敗其名節而加之以譴怒矣况肯享其祀而福之乎由是而觀則東嶽享人之祀而私以罪福其無是理也決矣昔夫子謂泰山不享非禮已具此意特其言引而未發兹故反復論之世之惑者其可解乎二子曰解矣乃書之以授時間俾歸而刻之石以告後之人北園祠堂記葉應驄正德丙子自貫橋移居北園園數畝植竹樹數年成林又數年軒其前曰抱甕堂其後曰寬心嘉靖戊戌九月壬午立祠堂於軒之巽四楹以先君之故踰年而後成黝堊既畢龕主具設門牆棖鐍次第茍完客有過而觀者曰孝子慈孫之所為也雖然未聞禮也君之為長子我知之矣先大夫之不為長子亦我之所知也祠四世僭也為五龕妄也不西上俗也主不稱位簡也居則考妣同之祀則左右分之擾也居則五位並列祀則一祖獨尊支離也先儒説禮精入毫芒千百年莫之敢變今兹變之若之何其可哉應之曰兹所以為可行也夫禮緣人情而為之者情有所不達則禮有所不行禮備於周公孔子孔子舉周公之禮曰父為大夫子為士祭以士父為士子為大夫祭以大夫故因爵以制祿因祿以制祀支子之祭可也因情以制服因服以制祀四世之祀可也兹二者吾有所受於聖人之言也有無後之主下同凡祔别龕以祀之可也人生適意之可樂而區區軒冕之真不足榮也遂取韓非子釋耕待兔之旨著號守株子將隱處終其身焉君之言曰天下之事無其理者不可徼其必得有其理者可以覬其或得鑿泉於地出火於燧隨取而獲如探諸囊而賈諸市者惟其有理故爾若鑽燧而索水坎地而覓火即不復有是理矣故宋人守株而待兔世所鄙笑以為迂且拙也吾意獨不然以株為無兔則曷為昔者之獨有也夫以昔者之獨有庸詎知繼是之終無也然則株之有兔不可謂無是理明矣既有是理雖窮日力以須其再獲亦不可謂大惑矣以為大惑者時俗計功欲速之心也一有意於計功欲速則雖詭遇而獲禽舐痔以得車蔑不為矣吾非不知為是也顧有所不屑為焉無寧守吾株而已矣兔之獲不獲非吾所當預測也守株子之友鄭瑗聞其言而韙之曰篤哉守株子之志也愚公移山精衛填海徒取其有志耳焉求其必得哉昔漢隂丈人非不知鑿木架梁之便也而卒不憚於甕汲圬者王承福非不知薄功厚饗之逸也而竟不更其素業居易以俟命固君子之所取也守株子於是乎賢於人矣因緝其語遺之俾歸以為記三司馬祠堂記任瀚高皇帝經略天下封疆首敕祕書省案其要害取次為圖籍以獻維蜀利盡西海窮日月所入國而不賔者蓋數萬里其在近地世為邉患者北有冉駝白馬氐河東西路黃沙白草諸番業已屬之雪山松茂三城南有卭筰都苴蘭靡莫朱提越嶲牂牁諸部洪武初始置建昌行都司分六衛五所鎮之總號西南彛其地廣逺官家所不能一一倚法究切萬厯中雪山吐蕃入寇上命御史大夫宣城徐公討平之特進少司馬視師如舊居無何建南土官瞿紹良叛孽安守與其族河西五咱桐曹王大咱卭都所部黑骨彛各據險稱兵為亂流毒境土南軍多望風辟易邉人逢害者往走狀軍門報警不虛日少司馬以雪山戰血未寒稍復厭兵事問諸幕府賓客皆言杜元穎鎮蜀時南詔入寇成都為禍甚烈實藉嶲州卭筰人為鄉𨗳今咫尺狂虜不制萬一使建越盡化為南詔計安出少司馬乃馳奏詣闕請得如雪山三城事理疏下議可乃檄參將朱文達遊擊邉之垣為副將以坐營田中科守備王之翰滕光國為禆將屬都督將軍李應祥統之徵天全刺馬土兵益募材官騎士牂牁巴渝惡少年敢死者得衆一萬八千有奇以行都司宰調元通判丘一奇理儲需會計軍餉參軍周君嘉謨督餉副使武君尚耕為行營防禦不測參議李君士達紀驗功次更簡文武忠亮堪倚緩急者一人入贊計畫乃得潮陽周君光鎬奏以安漢治功為循良第一使備建昌兵監理征南軍事是嵗十二月辛酉將軍郊勞誓師申幕府三令授軍正載之以行諸將各領所部按韜鈐分諸路進縱橫闔闢各有成算然大率以竒兵取勝為多如甲子夜半發越嶲直走三百餘里昧奕陳軍於河虜出不意始半渡迎敵斬數馬賊河水上徑抵虜營大破之壁其巢使賊錯愕失據竒壬申磨旗山馬賊千盡縵胡纓挽弓露刃出強虜挑戰示有疑兵諸將料其無䇿縱兵合擊之斬其前鋒三餘盡披靡以次殺傷狼籍竒刺馬兵古盤瓠種魋結反舌鬼貌熊虎力南彛最所怖畏壬辰夜壁西河與中軍相望會日暮大風將軍潛令拔營徙别所既徙賊以千騎載火炬來襲中軍不可得不虞正當刺兵乘其鋭賊半死火下衆皆鳥獸散從此失勢竒安守蓋蠻中渠師自比夜郎王膂力絶人然竟為禆將設伏誘入營斬首麾下褫其甲盡虎韔金芾飾以雙飛龍佩刀鏤五星文將僭稱侯王乃竟死一部卒之手而主將且間暇若無聞知是謂得算安守既伏誅即桐曹王河西五咱黑骨彛以次就擒諸部曲皆死無處所至是無復南警計自丙戌十二月迄丁亥六月大小十七戰衝薄上下千餘里誅叛彛四種奪卭都印一上幕府功次二千有竒生縛大酋長十馘大酋長七馘諸部長五十有竒奪鐎鋋弓刀甲盾千奪氂牛笮馬牲畜焚寨柵碉房無算納降虜三千七百有竒京觀嵬然卭嶺二與雪山建武爭雄嗚呼壯哉蜀父老欲作征南紀事碑鑱置建昌都市嚴祠廟俎豆其下以無忘文武臣功觀察周君聞之召父老曰征南之捷實出宣城少司馬幃幄中非閫外鞮鍪可測吾聞西京有兩司馬皆文獻名家相如史遷又皆嘗經略卭筰有聲荒服間若以三司馬並祀文章勳業照耀西垂可謂千載一時殆天與為不朽矣父老起謝曰使君當代名臣海內慕其文有西京法度征南廟略豈詎出三司馬下古既可三今亦可四請附之西南經略志宋狀元僕射何公顯忠祠記任瀚華陽黑水在天地西南去中土逺異代能臣死士不登祀典即耆舊薦紳亡從得聞號名往往多湮滅不振至莫保丘墓成都仁夀郭北十里所棘楚藂薄中有斷墟殘碣兆時鬛二狐鼠野千窟穴其下為宋丞相僕射何公藏木主處明御史汝南吳臯喻公按部行縣哀僕射忠勞死事不食竟土乃下令斬剃薰窒益封樹更置祠宇羡門華表百物使仁夀尹毛沂繪圖勒狀問記於前史氏記曰僕射諱栗字文縝宋隆州陵井監人政和五年舉進士第一時金主完顔旻方稱尊號王室多事宰相王黼承蔡京後深文黷貨主佐旻攻遼取燕雲計舉山後諸州割截餉旻自決藩衛益增嵗幣至百四十萬行路切齒朝士洶洶莫敢抗聞栗為御史中丞獨上疏奏曰王黼姦回專制馮藉寵靈使海內觖望不去必亂中國請悉去其黨胡松年等謝天下繇是黼松年皆罷免歸靖康元年童蔡既伏誅公稍遷中書侍郎金師攻陷天威軍尼瑪哈舉部曲南下兩河震蕩詔百官集尚書省議三鎮便宜百官多言請割地求成便栗固持不可謂三鎮為國塞垣三鎮破國誰與守且敵情無厭即割內地盡江淮豈有不來理唐恪耿南仲力爭不釋公厲聲曰河北民無罪棄地民獨安之且以河北取天下勢若建瓴河北既亡其誰為中原者帝曰何栗言是然恪南仲寵厚不能奪竟罷栗開封尹已復詔為尚書僕射數日敵薄城下殿前諸統制敗死斡里雅布縱兵乘城焚南薰門衛士殺傷相藉公猶勃勃率都民巷戰欲以身殉闕庭敵謝不逞嗚呼雄哉徽欽北狩公及侍郎李若水從若水詬敵死公與秦檜等奉二帝至燕檜臣事達蘭得南歸約為間諜公獨仗節不屈日哭二帝所南望中原有能復仇者而竟為賊檜所奪卒走死海上蜀故老嘗説康王興河北帥府事出僕射建炎中興僕射最有功勳宜配享髙廟䇿勞記室而史闕不載誠為遺憾吾悲靖康之難蔡京為戎首王黼養亂幸成至耿南仲凌遲狼籍莫可楥救然數人者皆得完狗馬餘骨死葬東南僕射生不逢明主末路乃得柄用國事已去身陷朔漠死委骨瀚海不克歸還其社至削木為主題封舊山豈不慟哉山故有祠曰顯忠院不知敕自何代僕射去今五百餘年御史持節勸忠千里問記伐取岷峨一片石昭示無極使後來封疆之臣過其祠行其墟墓將有慷慨悲傷踟蹰不能去者知僕射得死所矣誰謂南朝惟李侍郎一人明文海卷三百六十七
