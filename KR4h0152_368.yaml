body:
  text: 明文海巻三百六十八餘姚黄宗羲編記四十二祠廟茶陵州鄉賢祠記桑悦人以人名其出羣者隨其所在而名為巷之人則曰叔於田巷無居人人止一二失之則國空虛得之則天下充實故曰不可謂秦無人又曰朝廷有人或甲有人乙用之則舉其國名故曰楚有材晋實用之是故某地有賢不可以人名之乃名其所自出此鄉賢之名所以立也夫士君子之生其賢有大小擬之以邑以郡以國以天下隨其所能包而歸之名賢於其郡邑則總以鄉名故止稱有國士有天下士茶陵長沙郡之屬邑宋有譚世勣為校書郎時蔡京專政媚事者秩多驟遷世勣泊如也宦者梁師成寵幸有與世勣隣者致意勣勣謝絶之六年乃授司門員外郎靖康元年為禮部侍郎金斡里雅布入寇犯京師京畿提刑秦元集保甲三萬請先出屯自當一面世勣謂宜遣元以所統分直國門使聲勢相屬則敵不敢逼僕射孫傅深然其計而不能用京師尋陷二年張邦昌僭位世勣自敵營歸邦昌命權學士印世勣堅卧不起邦昌知不可奪乃止紹興初追贈延康殿學士封端潔公元有李祈字一初渉獵五經元統壬申發觧漢人殿元任翰林應奉同知制誥兼脩國史轉遷兩浙儒學提舉與時背馳隠永新山中國初欲起之堅卧不就以疾終國朝有劉如孫字三吾至正丁亥乙榜授靖州路永平縣儒學教諭洪武十五年特授春坊左贊善厯官學士同知制誥叅定國朝儀禮命作大誥三篇後序宸翰褒奬御筆寳蔵至今祈與孫俱有詩文行世是三人者在當時皆可謂之國士庶幾天下士在千古止可謂郡邑之士故總謂之鄉賢東淛俞君藎臣字廷臣由進士為御史左遷是邑令乃作鄉賢祠以祀之俞後邑改為州吉之安成劉君時讓發身科甲擢憲職與俞同數以言事忤内貴謫為岳之澧州節判當道借宼攝州章顧瞻是祠碑尚未刻以為欠事乃求予言用垂永久嗚呼自靖康以至於今五百有餘嵗茶陵之人羣羣而生逐逐而死者何可數計可指而名者曰三人然則千古為士於郡邑以鄉賢名亦豈易得耶邵子曰有一人之人以至什百千萬億兆人之人予謂亦有一時之人以至百千萬億年人之人是皆不可以形論也就以茶陵三人而論之其骨已朽民到於今思慕之景仰之峙以之為四仙流以之為八水恒若接於心目者若然其人果真亡而與鳥獸草木同澌滅者倫哉州之大夫士覩是祠之立宜惕然於心曰不俎豆其間非夫凢所脩為建立俱不為一身一時之計則州之人為益増矣俞劉二君所以望於州人者有不在是者與使天下郡邑各増其人以治天下之事尚何天下之不治耶雖然虞周之時賢才之彚用為具臣汎職者皆非後世之人所易及然可指而名者曰五人曰十人大賢亦叅其間然則真賢之生從古為難天地氣化愈薄後世生賢愈寡間有一二生之於世所闗係於天下國家甚重世之人尊用而安全之當何如也或髙下懸絶而不之知或知之而不能用甚至沮抑之摧折之使不能宣天地之所欲言成天地之所欲為傷其一身而瘡兼天下害其一時而痛逮一世其人能自立於不朽者終不可以磨滅吾又悲三代以後能人於千古者多不能人之於一時也世不貴天之所珍則天亦厭生賢以實世天人相感之際任世道責者吁可畏也亦可憂也自人其身不計於人吾黨之士尚其朂諸昔賢祠記邵寳昭勇王公既𦵏之一月其子太學生尚絅即其墓之側而為廬焉禮也何為有昔賢之祠也於是某掘地築坦得斷碑之半焉蓋宋李常州昌宗之志郡志稱其文出王荆公公之集固載其全某讀而嘆曰此昔之賢人也𦵏於是者蓋五六百年其兆既不可識不可以復封吾則何以為心哉於是乎有祠之圖既又慨然以思曰兹山故號芳茂今名曰横實以晉曹將軍横者𦵏於是之故横於史傳無考其在當時非有重望何至以其名名山久而不易今也祠李而能遺曹乎地官主事段子辛聞而贊焉曰夫祠也固以義起也合之其可也遂成之祠為二主左曰晉將軍曹公右曰宋朝奉郎守國子博士知常州李公春秋有墓事祀土神後則具俎豆以享某既自為序復介其友錢景旻來請記於余余頃嘗為王氏記斯阡也於兹山也悉矣使兹石也先是而出予固當牽聨書之况義以起祠有如今之舉者君子謂某於是乎厚雖欲勿書烏得而勿書石得於正徳庚辰十二月越明年辛巳二月祠成上於廬若干步石刻嵌於祠壁又别用石刻其全文以伺謁而尚論焉者宋太學生追贈秘閣修撰少陽先生陳公祠記邵寳天下之勢重在敵國者時有之矣其始也勢必重在小人小人啓敵國外患也然人知重在敵而欲反之也難不知重在小人而欲反之也尤難重在敵國而欲反之當其時以戰鬬死者殆不可勝數也重在小人而欲反之當其時亦必有以諫諍死者戰鬬死者天下哀之猶可言也諫諍死者天下哀之不可言也此宋太學生追贈秘閣脩撰少陽先生陳公之死所以至於今數百餘年而痛閔傷悼之不已廟之貌之尸之祝之而猶以為未足者也宋之亂自熈豐以來其所由來者逺矣至於靖康之時則金源日盛内逼京師敵國之重於是乎極所謂極重不可反者其此之謂乎而中朝六賊者實為之地重在小人則輕在君子重在敵國則輕在中國天下之勢如此誰與反者於是有識有力足以當其任者李忠定公綱一人而巳使能專任焉而誅斥六賊則天下之勢尚有可反焉者而二三宰執内忌外懾與六賊者表裏經營不曰割地以和則曰遷都以避茍遂其私而忠定宏才雄畧直道正氣乍用遽罷秘撰公發天下之危言當天下之大難六書淵聖三書建炎屢遭挫抑愈益奮厲卒之汪黄二姦黨結䝉蔽曲矯宻呼身死其手比之朝衣東市之慘殆有加焉而天下之士去矣蓋反天下之勢者在識與力識在我而力不在我亦獨且奈何哉嗚呼少陽其可傷也巳是以天下之人聞其死者莫不扼腕流涕而有百身莫贖之嘆高宗聞於臨安愕然驚悟既贈官推廕車駕道公鄉特贈錢五十萬紹興初追贈今官仍與恩澤賜田十頃嗚呼人心之公固出於秉彛之初君心之明又復於蠱惑之後以是觀之若公之盡忠為國雖天下祀之可也而况其鄉哉潤之丹陽公鄉也祠焉禮也抑吾以為祠之者之意不惟風忠義以起懦而巳其欲弭敵國外患之釁於封疆戎好之間也夫其欲嚴君子小人之辨於進退任用之際也夫其欲察姦邪䝉矯之跡於倉卒變故之時也夫上誥下詔一舉數得其為教也大矣深矣蓋正徳已卯監察御史召南葉君廵我江南諸郡以江西之警往來視師江上道出丹陽問公之故慨然以瞻謁無祠為缺且見近地有圓通庵者茂林據勝遂命有司改而建焉時知縣武康朱侯方既以憂去金壇知縣南充任侯佃承檄來攝不越月而規制以完繼而内江趙侯章至從而成之君子謂之善祠祠成且考葉君還朝趙侯亦以憂去越三年今知縣上蔡張侯惟恕踵焉而増賁之趙侯起復復任秀水葉君在臺謂其便也遂命以記屬之於某某欽企秘撰公之忠義久矣且重葉君之屬於是乎記祠在縣西北隅前為石岸以臨運河大建綽褉榜曰宋陳少陽先生之祠樓門三間入門為碑亭左右各一中為堂三間二厦像公其中前為露臺𤣥金鑄黄汪跪伏之像左右廡各十間左曰希賢右曰尚友後為樓五間曰有歸取公自贊語也其下以李嘉仲像配公扁曰交情表贖死之義焉齋居三間在左守廬六間在右公之族裔居之有三丹亭義見葉君所題詩蓋趙尹狀云重修蘧伯玉祠記穆文熈蒲之南計十里許有蘧伯玉冢冢前有祠人謂之蘧公祠云祠有像有廊廡春秋有犯蓋其來也舊矣而摧挫於風雨剥落於鳥䑕久之祠像傾圮廊廡荒廢靡蕪盈堦苔榛被徑牧人樵豎時或跳嘯其間靡知所以憚禮之而搢紳學士則咸用慨嘆焉而苦於勿能葺之也某年屬某丞於蒲往謁其祠而因以過余因謂余曰茲祠乃衛之所謂賢人君子者也可荒穢不飭如此哉吾苐為君脩之於是廼捐俸廼計工廼掄材廼具揷畚躬往督之自某時及某時僅越某時而祠像之傾圮者整廊廡之荒廢者飭蘼蕪剪苔榛闢風雨除鳥鼠去嵬如奕如而牧人樵豎無不望之而驚且走者祠於是乎改觀矣凡既備君又作室其隅扁曰習静乃復招余而問曰君子祠其人則當知其行事之跡顧伯玉之跡吾之所未解者有三事焉是必有意義存其間而不可以逺近測者也子衛人也必詳之矣盍為我觧之夫以伯玉之在衛職列大夫不為不崇而衛之國事宜未可脱然不加意也然方孫林父之逐君逆節之萌也及寗喜以父命復欲返之者招亂之道也而伯玉俱未見其固止之皆從近闗而出食禄於人者可如此乎余應之曰衛之有孫寗如魯之有三家齊之有崔杼權有所歸也凌逼之勢其所由來非一日也大夫惡得而止之也而其俱由近闗而出者逺害之道正孔子之所謂無道巻而懐之之謂也曰伯玉之賢史鰌嘗薦之矣雖以南子婦人猶知之然一無所見其施為而無裨於衛之存亡何也曰知之而弗用也知之而弗用雖孔子且無如魯何矣矧伯玉乎曰若然則伯玉竟無功於衛矣乃食衛之報於今者何也曰玉在山珠在淵雖未剖而見用而石潤澤媚當自莫掩故伯玉在衛雖終於不試而衛有伯玉足為衛重善乎季札之言曰衛有君子未足患也兹可以觀伯玉之大有功於衛矣曰薦賢為國者大夫之責也伯玉固身其責者也然孔子以大聖人之徳而問陳於衛絶糧於陳豈伯玉之未有所薦歟抑薦之而有所不行歟然以子晳濮上之遇而激於託色託言之數語即能引伍胥蚠黄之奔走以悟楚子俾之立返子晳委以政柄則其薦又何行於楚也曰伯玉之於孔子惡得而不薦之顧其説有行有不行者此楚之所以成伯而衛之所以奚而不䘮也於伯玉奚尤哉於是某君揖余而言曰君果詳於伯玉哉吾今而後知所以學為伯玉也因命余紀其事而併述其問答之辭如左城隍廟石欄記張治道嘉靖乙酉城隍廟修前後殿及兩廡並石欄成本廟都紀黨明理暨住持黨宗源道士張宗良軰以余嘗習舉業於此而明理宗源又與余有方外之交走余為記且以啟後之繼而欲有所増修之如今日者余曰兹功亦大矣財力將焉出而考若此其急也明理曰殿廡取常儲之積而為之石欄乃鄉民張錦軰捐財而助成者也余即以此而呼錦曰有是哉余嘗觀城中祀典應祀之神及他非祀典之神而能禍福人者非一廟人之尊崇敬信而弗敢有二焉者無過城隍廟焉重捐以備儲厚施以濟費豈非神之威力在人能察善惡而人之尊崇者若將有黙運於其間而奔走敬信之不暇是故有由然矣近觀廟制雖日侈而人之尊仰敬信殆不如昔日之誠捐財濟費之人日趨於嗇且薄殆不如昔日之厚豈非以神之威靈日冺而禍福日差耶故今災沴頻見司民事者惟身家是圖過繩以殘其生疴法以掠其所有其餘奸盗化亂之人敗倫干義之徒増見迭出而神之災害殃咎畧不少施其威靈若此是故宜民之狎且慢而昔日之敬信厚施者弗聞焉錦曰不然神之靈不靈由於人之敬不敬人之敬不敬係於心之誠不誠不誠而弗靈者有矣未有誠而弗靈者也故曰敬鬼神而逺之又曰洋洋乎如在其上如在其左右錦一細民也嘗有所禱於神必齋戒擇日沐浴悔過而後進謁則神之禍福休咎雖毫髪而應咎如響况非錦而有爵位司民事者茍能潔巳以彰聞端行以養譽則水旱災沴將無求而不獲無欲而不答禍福昭格烏有所謂差忒者耶百姓之崇敬烏有所謂日入於薄且嗇者耶石欄費銀若干皆錦與弟鏜暨咸寜高鼐所出又何有官法逼之而然耶余曰然神之不靈當責諸今日之司民事者而己今以明理之請意遂及此其興功之嵗月木石之多寡與鄉民之姓名易具諸石隂原魯先生祠堂記瞿景淳原魯先生者蘇之崑山人也先生生元末天下兵起學士大夫争竄山澤亡棄故業先生獨抱墳籍隠居海上誦讀不輟學者稱為原魯先生𢎞治中先生所居鄉分𨽻太倉故祀太倉州學迨先生四世孫封給諫海隠公徙長洲復立專祠於郡城故復迎先生主妥新祠扁曰濓洛遺儒云太史氏曰余嘗觀古今人物雖公卿侍從以功業著者亦相望於世而儒之醇者則曠世不數見豈非儒之難其人哉孔孟之後數千年而得周子河洛二程復羽翼之斯道始明説者謂有以接孟氏之傳迄今復數百年接濓洛之傳者考亭朱子之外不多見道在人心不容終亡元末乃得原魯先生余竊有感焉方高皇帝膺大寶一新文命招選儒碩共定朝章先生嘗一至京師訪所延儒生復遯跡海濵不應有司貢舉嘗聞之故老先生讀書必正冠服終日端坐更寒暑無惰容所凴几两肱迹入木寸許其觀經史多所箋釋不泥成説今所著述不可復見蓋散逸多矣嘉靖初年詔録所在野史有司從故老言乃舉祀州學後郡守金公城復斥吳縣卧佛寺東隙地建專祠蓋以風勵来學且使先生子孫家吳城者得便瞻謁云給諫君考論世徳毎恨於文籍之無徵然先生去今餘二百年故老稱篤學好禮者猶必曰原魯先生則先生之所養可想也余嘗病漢初去古未逺先王之教猶未息漢之儒者乃僅得張良叔孫通其人豈秦人坑焚之後世果無真儒抑有之而深蔵不出焉言論風旨不概聞於後也乃今以原魯先生推之世固有黙㑹道眞不求人知者矣先生殆其一也謂朱子之後濓洛之學不傳是斯道有滅息之時而重誣吾人也可乎哉今給諌君復講學不怠顧多君子斯道重有賴矣先生諱愚封給諌海隠公諱啟明海隠公惇厚博雅亦祀郡學今祔先生祠給諫君名存仁堂成於某年月日行吳縣給帖蠲差者督糧叅政餘姚翁公大立云文山先生畫像記羅洪先吾於人有願見而不可得有欲避而不但己斯二者生於吾心咸莫知所自来謂非天與吾者耶方其願見而不得也不特聞其容貌足以想其為人幸得至其郷井覩其手跡之餘亦將歆嘅悲喜有如相接平生矣又况為鄉之先哲心所甚慕而闕者一旦得其容貌之似其於心何如哉余生文山先生之鄉相後二百餘年訪其居已為故墟父老相傳有寄陳赤岸帖摹本與墨書絶類捧讀不能釋手嘗夜夢先生投刺往来竊以自竒毎道經螺山祠輒登堂四拜雖衣冠塑像未知與生存肖否然低徊其下恨執鞭門下無從也嘉靖癸夘冬泰和王生有訓持先生畫像來布巾素衣丰神朗逸如史所稱烱目豐下若或見之嗚呼豈非大幸哉方先生少時豪宕雄放彼固一時也多事以來自奉貶損雖流離困頓不改故常有道者然與今觀其容貌與其所服將致政之日緩步田野與將空坑之後混跡行旅與將脱順州之厄而北渡失眞州之援而東奔與抑被執海上悲歌慷慨從容市中問南向與嗚呼均是人也丹渥魁傑者何限使人慕而願見見而足以盛者有幾而在吾之鄉得遂願見者獨先生耳古人有言死而不亡嗚呼是豈容貌之謂哉人之惜身固惟恐其亡也然而不知惜此何也有訓以其先人嘗寳是像求之十餘年而後得方問學於余求所以自立者故於其别敬記以歸之峽江練公祠記羅洪先余往讀金川玉屑集不勝慨慕練公之為然未詳其生何地也嘉靖癸丑登玉筍九僊臺道經廢穴土人告以練氏先壠徘徊久之不遽信巳而入永興禪刹老僧自述坐累往往以練氏没田言且曰由此南上三里許瀕江有地曰三洲即其故居又南一舍至玉峡峡分為縣公實今峡人也聞之戄然乃令前𨗳至則荒烟衰草中門堂堦垣遺跡隠隠階右數塚則赦歸之人姓名猶可厯指遂與趙生子良不覺慟哭流涕近隣黄氏長㓜聚觀者亦皆相向灑泣因道其家世甚悉練本淦東東山人至伯尚遷三洲是生公比及第復居淦城洪熈改元赦其家盡復故業於是東山三洲仍歸練而以城居畀陳壻諸黄所言如此練故與黎黄劉三氏著聞黄隣練且世婣受禍獨慘其土疆犬牙相入不怨厲已乃灑泣吐所未聞嗚呼此豈有所利而為之乎始錢守琦因峽請祠公鳯凰山巓淦之人士譁曰公淦人也何與於峡至為書詬詈之峡不為變當是時故老凋䘮惜未有以三洲告者三洲𨽻淦則淦祀𨽻峡則峽祀淦與峡皆公故鄉何擇焉陳喬名系廬陵臨有俎豆六一産於吉水廟食恩江神不可度知其在彼乎在此乎祭於廟繹於祊两地交至自古巳然淦人乂何疑於峽也余獨念淦之争者譬之家寳他攘是懼以公在淦則淦重也峡之争者譬之宗廟執事為榮以公在峡則峡重也夫能為淦與峡重者止一死耳夫人孰無死公獨以死重淦與峡何哉忠於所事知其不得不然而又能即其心之所安故也故知公不得不死之心則知淦與峡不得不祀之心推今日不得不祀之心可以幾前日不得不死之心此不得不死與不得不祀之心公不能要之淦與峡之人淦與峡之人亦不能私於公峡之争也淦固有言矣不謂吾可以巳也而必祀之其心蓋曰彼在淦者何與於我哉雖䝉詬詈無避也公之難也人固有辭矣不謂吾可以已也而必死之其心蓋曰彼在人者何與於我哉雖戮妻孥無避也夫是謂之自靖自靖焉者自盡其心而後能安也夫仁人心也盡乎心則求仁得仁此夷齊所以見賢於夫子也夷齊餓而商不亡百世以下聞者莫不興起宜峡在所必争矣嗚呼淦之祀公得所重矣獨不思吾身亦有當重者乎峡之祀公得所安矣獨不思吾心猶有當安者乎夫心之不得不然不獨臨難有之自言動食息以至綱常倫理日與吾遇者不知凡幾而未能有即所安如峡之争祀者亦又何哉即使安之亦倐忽轉移之間耳豈足比於公之一死也哉不是之辨而徒慨慕於公以為重其亦末矣錢之祠曰自靖故事憚登陟率請主祀之行署通判何公堅行縣病其非禮始議改遷而知縣王君陳䇿濮君桂相繼成之濮移置山腹制頗湫隘何復捐俸闢其麓併倉址與故刹地廣之下為求仁書院峻磴紆徑直聨之祠朗豁𢎞深祀有常度乃亭其巔曰高山仰止延眺其上三洲烟草盡入指顧嗚呼公無身與家矣豈計夫人之祀與祀之去三洲逺與近哉然近三洲不之祀固益無以慰峽人之心也因記其役備論之告後之慨慕於公者修天妃宫記王慎中所謂神者果有物哉焄蒿肸蠁飛揚浮游昭明在上充塞擊觸於四旁非無物也危困之所籲號疾札之所請禱忽然有接於人其精爽翕霍而狀象彷彿莫不神之以為有是物焉拯危困為安樂化疾札為生全而崇事報享之儀由之焉起嗚呼此民之所以為不可使知也其有接乎彼者固其籲號廹切之專請禱誠信之篤自為其神感於其心忽然有動乎耳目而以為有物焉則過矣方其專且篤也其人之所自為與或為其父母兄弟妻子惟其所為者之存乎心而他不存焉昔日之所膠擾抹鎩滑撓其神者一旦藹然不存乎心而神為之告豈有異物哉然世之人固舉謂之為有物矣於是摶土斵木為其形容寵之名號原本氏族廣衍景蹟以附是物而穹堂奥室大庭高閎以居之患其不稱也刲羊椎牛沉玉瘞帛為其饗侑伐鼓撞鐘祓巫粉史為其歌舞奔走竭蹷天下之人惟神之歸嗚呼斯民之不可使知其亦久矣故先王為之著其教善其報事之文使之鼓舞而不倦以勿䧟於淫諂誕㒺之邪盖始之所以有神者本生於其人之誠而教之既設則人莫不歸是神也而後能勉於為誠使其崇事之嚴報享之盛一出於忠利憚畏之本心則去非逺罪無即於㓙亹亹趨往以赴疇祉惠廸之會若有為之掖𨗳閉止是莫不起於斯人之所自為而由於歸是神之所為勉則土木形容亦聰明正直之所慿而何邪之有泉州有天妃宫其來已久海上尤神之故宫於吳越閩廣之間尤多成祖文皇帝時嘗遣内臣齎大賚譯賜島外諸蠻隨以重兵便宜討其不庭蠻酋讋悚受賜奉束約使節所指遂窮日􅙡之域神最有光怪靈變使者奉之謹故泉州之宫内使張謙修建也閲嵗積壊前廊後室圮而為墟惟門堂存耳而梲剥榱傾攴朽楹茨頽垣以禦風雨殆不蔽也其不至於毁無幾矣報享不虔民咸知病之神獨見夢於邑人徐槩乃以民之病告以神意民樂率錢以佐役堂宇聿新殿寢崇成顧役鉅費繁率錢猥微門廊獨不能興也郡侯童南衡公始捐俸以充其費免民率錢俄頃之間高門將將廊序有列而宫完矣郡民歡喜忭叫争走睇瞻願記其事則相與謀因徐槩来請於余余謂極治之國其神不靈蓋政之所以得民者為之興便布利除禳患害民不祈而得其所欲不禳而違其所惡籲號請禱之誠無所用之而烏有兾於神然先王猶存其教所謂鼓之舞之使之不倦順其不可使知之情而誘之於勿邪焉耳侯為郡既久災癘不生寇賊銷逃遺四境以安樂生全之福神將無以為靈則斯宫之完修殆予所謂存其教誘之勿邪之義與斯義也固非民之所知不可不著以告後之為政者故記之如此常熟縣二烈祠記唐順之昔人論女子從一於夫比於臣從一於君之義自古奸人簒竊而其故臣不幸以才見籍録於斯之時彼有棄瑕用讐之圖而我有佯合觀釁之便茍其黨有可携事有可濟則逞於一擊以誅讐而復國若王司徒之於卓段司農之於泚此其勢逆而其事之難以必者也彼有棄瑕用讐之圖而我堅委質䇿名之誼寜死而不二其心寜死而不二其君若豫讓王蠋之説此其勢順而其事之可以必者也二者其所處不同而其要於自盡則一也是故生也而無迂身於儌倖之嫌死也而無自經於無濟之愧女子之於夫則亦有然者矣嘗讀史所載孫翊妻之事而壯之當二兇貪於翊妻之色而殺翊也妻既見窘逼於是蔵機匿哀佯許二兇以婚而緩其期隂結故將為援須二兇以婚入而遂刃之雪不共天之憤於閨闥杯酒之間斯亦可快矣若夫二烈之事則異於是其夫以覊旅浮寄江壖非有可以豫藉之勢環而指者皆兇人之黨也非有肘腋可結之援方張島之誣其夫以盗而沉之於江島遂欲室其婦而島之黨欲室其女於是婦與其女倉惺闔門自刃以死嗚呼可謂烈矣雖然二人者豈不欲手揕讐人之胸如孫妻之為以報夫與父哉而勢有不能也則一死而其事辦矣故嘗合孫妻與二烈之事論之茍機有可乗而速忿以必死則殺身而無益茍事無可濟而濡忍以有俟則危逼而近辱此亦其所處不同而其要於自盡則一也二烈死時兇黨裒其尸而焚之其事秘無人能發之者後數年廵按陳君蕙詗得其事島與其黨始伏辜此蓋足以見節義之氣有時而必伸淫兇之誅有時而必不能逭者歟二烈者固不必手揕讐人之胸而後為快矣事既白於是知縣羅君鴻為之立祠以祀扁之曰二烈而無錫安君如石請余為之記嗚呼此義行不特所以勸節其亦深所以懼兇也歟是有闗於世教大矣烈婦某姓其夫某姓而逸其名相傳自通州而徙常熟之某鎮也重修瓜州鎮龍祠記唐順之龍之祠不秩於三代之典記禮者謂之四靈蓋以為鱗蟲之靈者耳其祠始見於封禪書朝那龍湫今天下大水之濵無處不有龍祠宋之儒者論大河之治以為不宜祀龍曰是天地之功也龍何力之有然余竊以為未盡也夫天地無為而百物之肖像於其間者莫不各致其能以效其功而天地未嘗與之争功然而百物之功孰非天地之功也至於昔人之制為祀典也凢有功於天地之間者不問細大莫不羣然秩而祀之以致其報而未嘗疑於與天地分功然而所以報百物之功亦孰非所以報天地之功也吾觀於蜡而見古人通乎鬼神之情而悉於幽明之故矣夫生成百榖以粒民孰非天地之功若是則古人為之禋為之祠以報之可矣至於大索鬼神而蜡焉者何為也其蜡也先農先嗇庸與坊焉可矣而至於迎猫迎虎而昆蟲亦登焉者何為也惟天地之生成百榖雖一猫虎昆蟲亦使之盡其能於食鼠食豕之間而無遺利焉於此見天地之功為甚大人欲報天地之功而無由則雖猫虎之效一能於天地者亦秩之祀而無遺靈焉於此見人之所以報天地之功者為甚深凢百物之靈固莫不肖氣於隂陽五行而龍得隂陽五行之氣之精故其變化尤靈猫虎未嘗無功於田而謂龍盡無功於水乎祀猫祀虎未嘗疑於與天地分功而獨疑於龍乎且夫天地之間大者不自擅其大而寄於小小者各務致其小以歸於大其為力也大者常逸而小者常勞其功之成也小者易以為徳而其大者常不可名故耕鑿之民不知帝力之何有而至於一社之長一邑之令則人煦煦然而嚮之死則為之尸祝而俎豆之此豈可謂忘大君之功徳而顓顓於一社長一邑令之為報哉然則龍何疑焉而不祭於古也曰彼百物之祭古矣又安知古之不祭龍耶古有豢龍氏豢龍氏之於龍安知其非如伊耆氏之於蜡實掌其祭者耶所謂豢龍者其無乃羞飲食以祀龍之謂而好怪者遂以豢龍為畜龍也歟龍乎可畜其亦非所以為龍矣古今大水凢四而河與江為最河移徙潰决不常而江獨為安流意必有宰乎其間者而龍之奔走以効其靈也亦不可謂無𤓰州據江之衝則其建祠以祀龍也亦宜祠不知所始嵗久圮壊嘉靖癸卯奉化王侯杏始為揚州府同知署府事乃斥贖金之餘脩之而使道士某来請記王侯儒者也其為是舉也必有以通乎鬼神之情而悉於幽明之故矣余懼後世之人泥於舊説而以為非經之祀也為之著論如此使龍其安且食於此而無慚焉且使讀者其亦無以余為語怪也明文海巻三百六十八
