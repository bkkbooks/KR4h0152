body:
  text: 明文海巻三百六十九餘姚黄宗羲編記四十三祠廟市汊東嶽行祠記萬廷言古者論善惡禍福之際必歸於天與鬼神曰作善降之百祥作不善降之百殃又曰福善禍淫其言不一而足其故何哉蓋人情易忽於善惡而恐懼於禍福善惡者禍福之原也推其所懼本於天與鬼神曉然類應使民必為善必不敢為惡而已矣嚴於㝠㝠之中而非以為有所私與也騐於昭昭之錫而非以為有所私受也推無可懼於測量之外而警所易忽於感格之㣲故其責常在人而不在神是以神人交修而福澤降至於後世民心日濫濁亂五常之精類應之道爽而民疑以為福有所從與不必為善而可以私謁也禍有所從受不必為惡而可以私避也禍福之原一歸於鬼神而不知自反諂佞横生邪氣日積䕫跂燐炫假托依慿祝詛祈禳遍滿天下趨於其所懼而蔽乎其所忽神人交亂天地日月山川嶽瀆之靈所以鼓風霆而澤雨露薰蒿愴悽與此心忠信神明相為感應者反闇然欝而不暢㣲而不章以是而求旱澇札瘥之不作阜民生而介祺夀也不可得矣嘉靖中予為祠官考案祀典有意乎反古正今以端民趨會改官而止嗟夫是豈古人神道設教之本意乎市汊鎮舊有東嶽行祠不知其所創始廟貌清肅冕而垂旒儼然帝者之尊萬厯癸酉居民某某等又閣於廟後肖僊妃其中而外為石坊以逆江勢粢牲華篆嵗事益脩因求予文為記予按東嶽泰山也虞舜首祀秦漢更用封禪至宋則有天齊仁聖大帝與僊妃元君之號國朝悉去焉止稱泰山之神是今之崇徽皆所不當有而王孫媚灶傳稱獲罪於天季氏旅於泰山以為不知禮則尤非民所得祀者况行祠乎神之正直尊崇未必歆於此矣然予謂聖人之大徳曰生東方生物之府嶽神主之其徳盛矣夫神以生道福民靈應異於羣嶽非私福民以生道報神嚴事異於羣祠而非私報神之接於民也仁民之交於神也義雖法與地所不得祀而神人相與之意則公矣自是鎮民日䖍而神無不在牖吾民以生養之正年榖順成災害不作報所可懼而警所易忽為臣而忠為子而孝與國人交而信使民曉然知徼福之必本於善也亦庶乎忠信神明之相感應者乎因敬為之記而繫迎神送神之章以道民志神之來兮海岱輦金烏兮飛霞佩西山南浦兮雲蓋顧我民兮不嚴以愛右迎神神之逝兮海東曳衮衣兮駕虬龍劍江錦水兮飄風何遺我兮民和嵗豐右送神徐廸功祠記宋儀望敬皇帝時北郡李獻吉信陽何仲黙以文章氣節睥睨當世天下翕然慕之而姑蘇徐昌榖氏最少以才名受知北郡二人者相得歡甚乃相與揚㩁古今綜理藝文而徐君聲稱遂與李何相埒矣君由進士三年授大理右寺副而君固簡抗不輕與人交已又求便地不報以故人多忌之遂落職為國子愽士君益自砥礪動欲希跡古人不肯少變其志久之遂雅意神仙之事洎遇餘姚陽明王公相與盛談其學至有無形氣之辨徃復連日王公笑而不答君固强起扣之於是語及聖門易簡之㫖遂翻然大悟然君固已病病作月餘死矣君既殁北郡序其文刻布焉陽明王公又為論著其行事咸具載文集中儀望㓜時喜學為文章嘗得李何集讀之然欲購徐集無有也嘉靖戊申余承乏茲土君嗣子伯虬以廸功集見遺讀之信乎其才不讓李何已逾年始謁公祠下欷歔久之祠故隘陋不治無以妥靈揚哲以風邦人余乃命工加葺之為堂凢三楹門如之辨等級㓗牆垣以孟秋朔日饈豕以報成事而公仲子叔麋及冢孫敬臣以祠記来請予竊聞之古之君子得祀於其邦咸以其有功烈於民不然則耆年宿行有以重於其鄉及其殁也鄉之人始追而祀之如古所稱鄉先生殁可祭於社是也夫徐君者甫壯登朝未强辭禄非有彛鼎之勲二䟽楊公之引年去位以取重於世如昔所云然而君子必加祀焉何也嗟乎士固有幸不幸耳昔者孔子周流列國以其學授諸弟子當是時若予賜由求之軰結駟抗衡於諸侯大夫之間何其盛也而回騫二子顧終身不仕人國而回又蚤死然至於今数千載間秩在祀典初不以其功烈在民與否如何也昔史稱漢武帝最好文學司馬相如嚴助朱買臣軰咸以文章詞賦見幸出入人主之前得發舒其志氣徐君與李何數子遭遇好文之朝並列職郎署使當其時有如狗監者薦之則其所表見恐不但相如軰以口舌取悦人主而巳卒乃使之沉淪下位以死豈非命哉豈非命哉然予聞徐君始弱冠時以文賦崛起吳中與今翰林文公徵仲相友善比出與李何軰上下其議論遂傑然有立成一家言斯亦足聲稱後世矣然竟脱棄華藻游心𤣥虗大道之要殆駸駸乎近之善乎王之述之也昌榖之學所三變卒乃有志於道惜也吾見其進未見其止嗚呼若徐君者豈孔子所謂朝聞道夕死而可者耶夫是則可以祠也已作祠記文昌道院記陸容文昌道院者故梓潼神祠也祠在勝國時嘗附建學宫之旁崑山州治西遷而祠之廢乆矣皇明宣徳七年有過義用宜者嘗禱於神獲應乃易廢鹽倉地剏為是祠前構禮殿後建庳屋門垣峻整甍宇輝映蓋己蔚然一叢祠矣嵗月既乆日就傾圮不足以妥靈掲䖍用崇祀事住持道士陸虛岩氏愴然興嗟以為茲豈不在吾耶於是鳩工聚材撤其舊而新之殿之六幕高廣有加於舊居室之列其後者視舊亦倍之肖成慶於門像真武於寢市民廬於其東偏而祠之規模益大以廓經始於天順五年五月落成於明年之三月凡興作之費皆虛岩樽節自奉積數十年而後舉之募諸人者蓋寡也工既成其徒楊機白之真人張公元吉為題今名按載籍梓潼神姓張諱亞子越闕人仕晉戰殁人為立廟劍州蓋梓潼劍屬縣今廟在縣之七曲山虞文靖公集記相如縣文昌萬夀宫亦云文昌宫蜀梓潼縣七曲山神君之祠也蜀全盛時俗尚禱祠鬼神之宫相望然多民間商賈里巷男女師巫共尊信而巳獨所謂七曲神君者學士大夫乃祀之以為是司禄主文治科第之神是則文昌之名有自来矣文昌者斗前六星如筐者也其第五星曰司禄神豈其降精歟何其擅名於文也雖然神蜀人也禮宜以功徳食於其土今乃徧於天下又非獨道家為然而所謂學士大夫者亦莫不然凡學宫之旁皆肖而祀之以為是司禄主文治科第者宜如是也牲帛相望莫以為非嗚呼豈其然哉吾聞之神者聰明而正直者也聰明則不蔽於私正直則不撓於枉彼妄意者將安所得耶然自隋唐以来士多以科第進後世迹其人考其行而君子得之恒艱小人進之恒易艱得者置之位未滿其徳也而禍或隨之易進者奸紀肆欲天下之人欲去之而不能必至於僨人之事覆人之餗而後巳若是者豈真歆私享而䝉曲祐哉蓋天下之道陽一而隂二也陽之不能有加於隂君子不能多於衆人是其紛紜錯揉有莫知其然者雖神亦隨其所運而不能為之主與抑治道有汙隆人事有得失而神亦無所與其力也與不然則天下之淫者為得而厚誣於神者多矣容因記祠之廢興而一言之欲今之學士大夫曉然知神之心大公至正而不可以私請也若虛岩則修老氏之學者其據名山擅佳會以自超然於塵壒之表固其家法也豈徒為祈靈祝釐之區而巳哉用宜初為太倉衛百户後以弭盗功陞千户終於位虛岩名阜字景阜與容雖異族然丈人行也故不辭而為之記云羅念庵祠田記田一儁祠田非古也古者鄉先生殁則祭於社如是而已後世祀道紊而多端好古君子始思以復古化今崇教厲俗之意黙寓於齋堂廡序籩豆灌獻之間求之鄉有先哲者焉或雖未生於其鄉而講道肄業之區逰息燕閒之所咸義起而特祀之而又慮其享祀之匱時移嵗遷無以相維持於永乆也則又為之田以為籩豆灌獻之需齋堂簾廡之備俾之有所資以維持於不壊蓋其法非直崇奬死者而已於生者亦有觀感興起之道焉意良是而制則非古矣夫自二氏之教行琳宫瓊宇咸有田衣食厥徒而吾儒氏或缺焉豈彼氏之教獨良而古制不為彼設歟彼其清浄禪寂之説既使人簡徑易趨而死生禍福又足以聳動愚民而使之奔走歸命故其法易行而其教獨繁昌也吾儒之學疑若汗漫難竟迂濶鮮速效而世之君子又􅉨往樂因循憚始事不以復古為心而多以非古之制自阻使非有好古君子出焉謀及於此宜其難矣故祠田非古而鋭然以此為務必其人好古君子者也贑舊無念庵先生祠通判廖君署其邑事以先生之嘗過化是地也合諸生等議白督府建祠於鳯凰臺之陽祠成復捐俸為諸生倡諸生之樂義者亦相率出金為助買田若干畝充入先生祠為嵗時享祀之費不以非古之制自沮而鋭然寓復古化今崇教勵俗之意於此齋堂廡序籩豆灌獻之間謂君子而能好古者非邪夫天下之事不激不勸不風不興故標徃以示来崇死以勸生好古君子者事也而觀感興起則在祠先生者勉之而已先生之學其大者視天地萬物皆吾一體而其所從入簡易直截不假蹊徑先生於大本卓然有見而格物窮理未嘗少緩視宇宙皆其度内而其量實自一介不茍取與者充之故人見其守之卓而不知其學之精也見其量之大而不知其察之細也祠先生者學其精以求其卓學其細以求其大而先生之學在是矣茍徒取名賢講習之區為光寵而㒺究其學術以思不負於往哲雖日俎豆而尸祝之於此邦人士奚益哉而好古君子思以復古化今崇教勵俗之意亦虛矣夫二氏之教雖於吾儒不相入然其徒高者守清浄禪寂之教以淑其身而下者猶能不毁壊其名號以誇於世故其教藉以傳而其祠亦因以永乆勿廢吾儒毁棄二氏顧若不甚惜至攷其所以為學輙與所尊祠敬禮者相背馳視二氏反讓焉則彼法之行而教之獨繁昌者非獨世之君子樂因循憚始事之過也而為其學者與有責矣廖君於余為里人以書来請記於余余故述好古君子所以崇奬先賢之意若彼復道先生所以為學者若此期與此邦人士共勉焉廖君名憲嘗從遊先生而得其所以為學者故為政而能好古興學如此新建韓蘄王廟記胡纘宗自金源氏分主中國於是宋社殄蕩宫車流播二三臣奮包胥之忠而競搘持之南轅脱輻越鼎泣新時則蘄王效武宣忠矢志忘死返麾而北拳勇神機建勲樹績北兵之旋我和之招宋室不復豈皆天邪王諱世忠字良臣安延人也卒於越𦵏於吳故吳人祀之王初應募虎挒而梟磔目無敵也扶銀州笞之薙睦之青谿劘燕山揚滹沱舉濬挟淄樹趙之屏摲西土獨與金角㩧其雄批魚臺㩋黎驛經河洛撥内難於平江至魚梁殱之提甲八千扼江之衝讋十萬綺鋋走無音轢閩建斮豫章覆湖南開軍受降掩大儀臠十之八嘬而封之執楚之臂絶淮之吭城高郵塞泇口崇山陽敵乃慄縮而祭荆大小百餘戰主辱臣死請當其重還两宫復疆土之言慷慨激烈錦衣驄馬勒兵交和金人宵熸何其偉耶夫金方熛熾上慘下黷恼恼莫敢攖王以孤壘相當梏其觸而齾其鋩龍潭渡而都無標烽山陽城而江無飲馬時非王固魚肉吳矣宋其奈何故中興之功以王為首王之功於吳為大至其抗論斥和政府之揖檜為側目争武穆之事不得乞身湖山徜徉謝世以全首領此其忠有餘而智足稱也忠勇之號百世是欽天資人違史臣歎息河山之誓太常之烝實闗周典易世報功禮亦宜然弗棟弗宇即墓而祀無以棲神靈委帝貺於草莽文儀為闕予移而来以祭祀取吳之神正其位序將事王墓顧瞻欷吁既乃得王故宅在郡黌之東淪為浮圖亟命撤所祀祀之不易一榱不役一力考王之廟實嘉靖甲申三月望日也位木其中饗用嵗秋妥靈宜神肸蠁用光祈災儌祐民咸利之然懼乆而淪没乃磨堅石用紀始事庶觀象者識表忠之彞章馭民者知事神之禮秩云監察御史斛山楊先生祭田記蔡靉夫宇宙間孰為貴且榮惟忠臣孝子是為天地之正氣躬行之君子也若夫大孝終身孤忠自許垂百代之清風立臣子之準極者其惟我斛山先生乎先生家世闗西之富平余進士同榜兄也初受學於苑洛韓先生靉亦先生門下士實有同道之雅嘉靖己丑同登進士同銓受行人後三載同選授監察御史任一載餘斛山謂予曰老母不任驅馳家在三千里外不能迎養吾當告歸以盡烏鳥之情予止之曰御史三載例有勑贈之榮寜不少待斛山曰菽水之歡天性之愛古人不以三公位易一日之養吾志决矣幸成吾速歸計予為白之宰執部院諸公無不稱重别後以養病違限例不起用予亦以言事忤旨黜為編氓两不相聞者七閲寒暑已亥秋以两京言官之薦予與斛山及浦竹塘三人同召用予丁母憂二公先入京竹塘以進言廷杖而卒斛山亦以進言繫錦衣獄壬寅冬予以服闋部院催取至京两閲月以罪下獄得與斛山相見時劉晴川正郎亦以進言與斛山同繫劉舊鈞州守予曽疏其賢乂相知故人也在獄同處者二旬餘予被謫出獄二公各有詩相迭予亦有詩言别予歸後復被黜再為編氓斛山䝉恩赦得釋與劉晴川周都峯同至文登祭浦竹塘回途復被逮械送入京仍下獄又四載首尾八年復䝉恩赦得歸家居數載而卒癸亥春斛山長子偲以應貢赴京便道来訪詢其家事及履厯曰家君自文登回復被逮械送時九月終尚未成衣一門生觧衣衣之予隨之過隨州石橋東指曰此去寜晉四十里昔與汝蔡年叔獄中别時約云過趙州相㑹渠豈知今日予過此橋家君自居官抵今三十餘載逺近饋遺一無所受以此家無纎積予兄弟止仰給儒學月廩曰斛山兄介正清操朝野知之李石疊曽為予言廬墓時客至無茶饋豆以代茶湯尚卻之况他人乎噫昔道義相期出處畧同斛山已矣予猶碌碌茍全恨衰年不能逺出持生芻一哭墓下今日無以為情聊以務農所積相贈為斛山兄置田一區以供時祭刻石墓下以表平生道義之情嗚呼先生天性孝友眞誠直諒二親之殁六載廬於墓側哀毁骨立鄉閭率化忠信恩義孚於族黨徒步從師講明理學敝裘疏食怡然自得事師如父處朋友如兄弟躬行實踐苑洛先生重之别時為筮睽大畜二卦知將来之必至也及授使職䝉闕重修澐泉祠記趙統先是河東分守吳公議毁淫祠計所當毁者改立社倉社學以其餘賤值易之民以所易之價為所立之倉本榖事未成而公去統来為令時見其遺績心是之而未敢踵行也已亥春御史王公代廵縣重此舉措乃以里社倉學事專命統統兹按籍徵價閲祠求神始知前日所毁之祠凡所不當毁者皆在毁中太息曰此有司承望之過也傷哉驅民何所適從乎夫淫祠之所以崇信於天下者為正道之不明於下也正道者帝徳王法倫理性命禮樂政刑非可使民知也民日用由之者跡耳雖聖人者不過因其跡而利𨗳其心焉耳今夫民其心崇淫祠非有他也逹其報祈之真心已矣今不明正道以𨗳之曰何者為所當祀何者為所不當祀俾之曉然知坦然行之而一槩毁去滅絶焉抑其祈報之心皇皇然無所寄是驅民於無所適從也雖日殺而求罷淫祠豈可禁哉古者民有四而農為本今之民雖非古之民而本於農一也農之家所資者土地所望者雨澤所助者灌溉所忌者蟲蝗今所毁之祠如土地井泉山川雷雨與夫所謂伯王即古焚山澤之伯益凡有事於農事當祀於農家者皆與焉民將何所適從乎統心病此而荷王公之委重乃擇所不當毁者若干祠請於公公是統議卒不毁民咸悦是嵗旱城東二十里有澐泉溉田數百畝亦在不毁之列民僉白於統願以不徵之價修泉祠此民心也吾何敢逆之許其修且許如其俗祭賽無何大雨民田咸渥是固不敢專歸一泉之功然而寸雲勺水亦與效靈焉而民固頼之矣一鄉之民心屬於泉祈禱報答皆於泉焉此固一正道也使由此而推之而逹之天下民皆知所當祀者而祀之雖不毁淫祠而自廢矣傷哉不示其正而抑其邪者之已甚也譬如逐人之迷者而不諭其所適之途也是故以一泉示吾迷民鄖陽追祀撫治大理少卿吳公記趙貞吉今南大理卿章丘張公往以僉都御史撫治鄖陽作而嘆曰鄖陽之政稍弊矣易不云乎治蠱者求其意於先事之初耳故其操切劑量思循往撫治原公吳公之舊而振新之也思其人因就觀其尸祝之所始知吳公之未嘗與祀也初原公以都御史撫治鄖陽名傑字子英陽城人吳公先以巡按代撫諸郡後以原公薦陞大理少卿任撫治名道宏字文博宜賔人在成化中并以戡定綏寜鄖陽事著勲名而鄖陽之人并思之乃吳公之不得列祀則莫不䀌然傷心久而末忘者也張公曰嗟乎畫一之章定於曹相泣碑之政廣於杜君鄖政之始建也原公綱之而吳公紀之有開拓於前有彌縫於後繄其可忘諸因訪其孫為府經厯者得遺像焉遂肖而配諸原公於是太守黎君堯勲率諸文武父老生徒進曰諸司守章程以奉天子俾兹土之民免殱馘之痛者七十餘年夫孰不知二大夫之功也而祀典之闕卒定於公聞之惟仁人能不忘人之功而處人以禮殆公之謂矣頃之張公去為大理而江西劉公代焉謂宜載之石以諗来者而黎君以委於予也予嘗浮漢江横鄖而東者屢矣其地枕秦跨楚包絡險阻員幅數千里元季棄之為荒國初殱之為墟間置數縣以領其遺民而在三省之徼司燎擊柝棄不顧者殆數十年故草木盛而變為矛㦸猿鹿多而化為􅓔兕矣成化初盜屢起横不可制常州白公圭三原王公恕嘉興項公忠繼率六師往克之又復嘯聚而原公實承之當是時吳公廵按河南佐原公有為於始繼原撫治以成能於終卒稱原吳吁盛矣二公之始經畧也謂大兵之後威已振不可復言殺遂下令撫之得流亡民四十餘萬授田以養之置縣以統之濬池髙城以固之設衛所屯重兵謹闗隘以制之割三省之地得七府而合為都㑹開撫治以聨屬之矛㦸之墟長禾黍矣􅓔兕之陵牧鷄豚矣山無不伐之椔澗無不汲之泉矣夫定近難而壯逺猷炳炳焉二公之功固百世不可忘祀亦百世不可廢也由今言之原公固才矣忠矣然建事之初倡始實難孤立易奪非吳何以禆之功立之後梁司易撤榱棟易移非吳公孰與定之則吳公之并祀固一日不可緩也張公劉公皆彌綸之器憐才稽往深致意如此宜矣予與黎君又吳公鄉人而毎好問共談當世之務也安得不竊以為快而重有感哉嗟乎承平之世卓絶竒偉之士恒退而循黙謹厚之人恒進忽有方隅之警而後知戡定綏寜之才之難也成化之際可謂承平而相繼定鄖難者皆得才卿名士甚易若此何哉渤海之盜必重用張敞西川之亂必再起詠之才之鮮也如此而諸公才名相埒聚定一方故能厯乆盡善而不變何其盛哉今方隅之警多矣皇上拊髀念臣鄰之義思閫外之才於是士大夫吐哺屏息思致其命以當天子任使於是時而表才名之士揚功臣之業諸君子豈得無意哉夫易絃而調聲者智之門也斷絃而理棼者勇之經也張公之言曰求其意於先事之初此智勇之所藉手而功名之從出也諸君子所以并休前人者不在兹哉因并書之以相諗焉重建了齋先生祠堂記徐階自孟子没而養氣之學不傳所謂豪傑之士狥國之臣薄死生禍福以氣節自奮於流俗者蓋亦世有其人然而其氣或慷慨悲壯一發而遽衰或愁苦憂思遂敗而不振其故何也長江大河百折必東而溝澮之水朝盈而夕涸彼其於浩然之氣養之不素而所謂慷慨悲壯者特出於一時感憤激觸之所為則不必困踣流離之狀足以動其愁苦憂思而敗其氣也茍出於有所感事往而氣亦平出於有所憤怒忘而氣亦索出於有所激觸勢定而氣亦阻矣矧撓之以憂患乎若了齋先生陳忠肅公乃所謂善養浩然之氣繼孟子而興焉者也先生沙縣人宋建中靖國初仕為右司諌以論蔡京卞之奸罷監揚州粮料院起權給事中又以忤曽布出知泰州謫監建州崇寜中除名竄袁州亷州移郴州稍復宣徳郎又以子正彚訟蔡京安置通州大觀末放自便又以所著尊堯録忤宰相徙台州竟不用以卒夷考古今士之䝉被憂患未有如先生甚者而先生處之前後一節不少貶以求暫容於時蓋先生克已尊賢虛心取善所以養其浩然之氣者非一朝一夕之積是故義有所不屈抑之而彌昌意有所不屑遏之而必逝流離困踣人以為至艱而履之若平夷寛廣之途屢仆屢起毅然必伸其志人以為竒偉卓犖而視之若寢興語黙之常豈彼出於一時感憤激觸之所為者可同年語哉某毎讀先生責沈文自警詩諭子姪諸篇未嘗不掩巻太息以為先生之獨立不懼遯世無悶其原蓋出於此未可直以氣節之士目之也先生故有書院在縣西一里許後因以祀先生及從子黙堂先生嵗久甚圮有司者未之能葺某謀於教諭李邦光訓𨗳林順石愷將出月俸之贏稍修飭焉而邦光等各請以其貲為助則遂屬典膳蕭延曽言卿撤而新之以為今祠自嘉靖癸已四月庚子至嵗十月乙亥工以訖功先生裔孫載興伐石請紀成事某因僭論先生之學使後之祀先生者知所嚮往如此若祠髙卑廣狹之度暨諸好義者氏名詳具碑隂重修四先生祠堂記胡松四先生祠何元浙江行中書省請於朝而祀何子恭基王㑹之栢金吉父履祥許益之謙以興起後學者也夷考四先生皆晩宋勝國時人當其時禮俗傾頽儒學絀抑邪説横行四先生生雖異時而行同業志同方逓相師授跡其抱道懐貞居敬學古清苦純質兢兢淬厲之實較然畫一可謂慥慥乎言顧行行顧言之君子矣不然元方儕儒於丐娼之間顧肯崇而祀之耶顧今世儒或謂四先生制行髙矣美矣然皆詳於分殊急於考索踐履至仲尼所稱一貫與其大本未發之中若子孟子先立其大之義或未甚瑩然也然子輿氏又曰人有不為也而後可以有為能言距楊墨者聖人之徒也四先生所謂有所不為能言距楊墨者非歟不然則胡以信當時風後世若斯之逺且著也愚嘗妄意言之曰當道學未明之世不患無篤志力行之士而患無見道識大之儒當道學大明之後不貴有講明誦説之儒而貴有蹈廸服行之實宋自嘉定咸湻而後晦菴先生之學支分派别同源異流當世號稱儒者大抵考索訓詁伐異黨同致知篤志力行貞純弗懈者鮮矣如四先生之清苦純實質有其内詎不可為百世之師耶或又言四先生清苦純實規規然自守之儒爾恐不足以渉事耦變而定天下之業余竊以謂不然嘗觀襄樊之師之圍危若累卵宋幾無人矣履祥乃進牽制擣虗之説請以重兵由海道直趨燕薊則襄樊自解且備叙海道所經難易逺近厯厯可據則豈迂儒無當者而權臣方且專事蔽欺誣㒺而莫之能用此豈人力也歟故曰君子創業垂統若夫成功則天也乃若三子之弗遇無成也豈不皆天也哉嗟乎嗟乎豈獨諸子古之志士仁人抱輔世匡民之畧阨於天時人事重於詭遇輕殉而不得一遂其有為若此者要之胡可勝數悲夫悲夫士固未可以成敗利鈍論也余覽郡志樂斯祠之新也㑹李守來請為書以風郡中人士焉唐一菴先生祠堂記許孚逺吳興稱文獻之邦舊矣名公鉅卿高賢逸士代不乏人若以斯道為已任思繼往聖而開來學孳孳一生不厭不倦以𢎞著述數十萬言則惟我師一菴唐先生一人而已先生初舉於鄉入南雍師事南海湛民澤先生既登制科官比部立朝數月以建言削籍而歸時慕姚江王文成先生不及見也湛先生稱隨處體認天理王先生稱致良知先生两存而精究之卒標討真心立言為的夫曰真心者即虞廷之所謂道心也曰討者學問思辨行之功即虞廷之所謂精一也隨處體認天理其㫖該矣而學者或昧於反身尋討良知其幾約矣而學者或失於直任靈明此討真心之言不得巳而立誠明得真心在我不二不雜即所謂體天理與致良知此先生苦心深詣可與湛王二先生鼎立為儒宗者也先生以其心嚢括宇宙故於天下名理靡所不窺以經濟當世為一生作用故於國家機務靡所不講以躬行踐脩為討真實際故於辭受取予出處進退以及衣冠言動起居飲食之節靡有不嚴其宗旨領要具在木鐘臺三集讀其書可以想見其為人也吳興自有先生而士大夫始知趨向於聖賢之學四方之士亦多聞風興起數十年来風教為之一動及先生殁而學者頓失所依歸矣嗚呼惜哉先生之初設教也寓胡安定先生書院中直指周公始因圮寺葺為景行舘未幾亦廢先生乃自搆木鐘臺於城東後直指張公檄郡侯選於北門隙址闢為唐先生書院前有講堂後有寢室傍有號舍外有坊表規模閎靚焕焉成一方之觀先生之既殁也直指蕭公督學滕公從諸生請肖像於寢室行有司春秋特祀著為例洎江陵柄國嚴禁學徒盡毁天下書院而郡守李侯權易坊額為唐先生祠乃移文報監司曰郡故無書院得不毁今郡守沈侯下車謁先生祠顧棟宇頽圮爰議修葺捐贖鍰為倡始其僚屬諸君共成之祠既新侯又請於督學李公給先生冢曽孫鍾秀衣巾典守祠事於是延不佞孚逺軰及遴取諸生有志者時集祠内復為討究真心先生幾絶而續幾晦而明可謂幸矣嗟乎真心在人本来具足萬古常然如日月之麗天如流水之行地無虧無盈孰得孰失然及其蔽牿於物欲頗僻於意見迷謬顛倒喪其家珍雖以聖賢萬語千言詔之而猶不喻或已知從事於學反求諸心至竭其終身之力而毫釐千里不悟一真孰謂討求之功其可己也討之而明則真心原自烱然不從外得措諸萬事而不疑要之終身而不變至於貫金石格鬼神而後可以徵一真之恢復微乎微乎豈易言哉吾觀有司諸公崇重先賢作興後學前後相成幽明相感此亦可以為真心之騐然而𢎞先生之教旨答諸公之盛心是惟吾黨今日事假令剽竊陳言踐履無實處無稱於宗族鄉黨出無補於天下國家則討真何當余與諸君子可不懼乎可不勉乎同門長者王學博汝源偕先生幼子炳度孫在明等屬孚逺為之記汧陽縣三賢祠記高攀龍汧陽三賢者曰燕公伋從夫子於遵周問禮之時者也曰郭公欽肥遯於王莽簒漢之世者也曰段公秀實死節於朱泚之亂者也舊皆祀於學宫邑侯夏公始創三賢祠特祀之請記於馮仲好先生仲好一日謂余曰若是者世之相去也品之各别也假令三賢者生同時聚同堂其志同乎同而後可同祀也余曰同曰有説乎余曰天地大矣惟人與之同者其才同也故曰三才才者何也生也生者何也心也故人之得其本心者同於天地失其本心者同於禽獸雖有賢哲語之同於天地必駭雖有凡愚語之同於禽獸也必憤是烏知不同天地則同禽獸其間不能以髪也夫子論成人非謂合知亷勇藝之四子又文之以禮樂而後為成人也謂即知亷勇藝之四子各文之禮樂皆可為成人也且推之利無茍得難無茍免不忘乆要者則不必有四子獨到之才茍不失其本心者皆成其人也夫以陳亢終身依聖人不識聖人夫子問禮之時名未著於天下而燕公首得聖人宗之視亢等憒憒何如乎揚雄號大儒不免死於莽大夫視郭公㝠鴻威鳯翺翔雲漢何如乎李懐光千里赴難破賊解圍不甘奸臣之讒甘為亂賊而不顧視段司農一笏何如乎此本心之辨也三賢者不同品同於不失其本心心同則才同才同則與天地不朽同故成人者其途甚博其要甚約既成其人矣又惡乎不同仲好曰善即以記三賢可矣夏侯名之時成都人王侯祀兩廡記髙攀龍天下有事匹夫能執干戈捍寇賊即不幸而死其一念自足千古何者此一念正氣也惟正氣不可磨滅天地之常運日月之常明山岳之峙江河之流皆氣也聖賢能精之一之與此渾合無間即匹夫匹婦一念秉正而死其氣未嘗不與之合然其心非精一之心故其氣非充塞之氣譬則盎缶之水必歸於器有所歸則聚無所歸則散聚則伸散則屈伸則神屈則鬼鬼則為厲神則為祥其小大之分然也往者嘉靖甲寅乙卯間吾邑有倭寇邑之義士何五路等三十六人奮然持白梃出擊之敗死城西之壕巫覡往往有言其為厲者邑人即其死所祀之簫鼓繽紛遂為淫祀余既與邑之紳衿建松磁王侯祠於惠山之麓王侯者宼未至而築城城甫完而寇至使吾邑萬姓不縻爛於寇者也吾同年陳公筠塘曰當寇之熾也百雉而外白骨矣義士輩雖敗而死寇虞其有繼至者獸駭而去城以獲全是則侯之城體也諸義士用也猶之手足捍衛其軀者也烏得而無祀乃自捐貲為兩廡列祀焉有司春秋犧牷惟謹自是而淫祠之祀大衰不知其所以然也余謂公之此舉有四善焉表義息邪彰往示来大錫福於邑也夫一筵之醲醇一夕之妖冶一朝寒暑風露皆足以殺人與諸義士西壕之死等而諸義士之死不死也即不信視西壕之簫鼔鬼神之情狀大可見矣死者有所歸生者有所勸天下一旦有事執干戈為吾民衛者必相繼而起故曰公一舉而集四善大錫福於邑也明文海巻三百六十九
