body:
  text: 明文海卷三百七十餘姚黃宗羲編記四十四祠廟崑山令樊公祠堂記歸子慕馬鞍之巔負古剎東向翼於南出萬松之上嶐然而立者故令樊公元之之祠也公之前厯十三令為祝公嘉靖間倭入寇崑山幾陷祝公守禦甚力城賴以全後五十餘年當公治崑縣民汪惠者募金祠祝公而公為之記名其祠為勝生蓋以今之生祠遍天下矣死而祠者百無一為故以祝公之死祠為勝生也及公沒而民競為公祠如公所稱勝生者公為令精勤無留事然不為苛細禁制豪右不解縱然不為文深一意卵翼小民如或傷之勸令息訟不喜為一切更張小民得職熙然樂生其政要歸於節用愛人縣中清靜好善樂士至其刻亷則自洪武以迄於今不乏亷令未有如公者也公生時恆茹蔬間進二卵故民之祠公薦蔬侑二卵焉災害疾病者祠公咸平嗟乎公既沒矣猶撫民之疾苦若是後之嗣公守兹土者聞公之風其有不浡然興起乎祠之經始以甲辰秋工成屬記於子慕子慕惶恐謝不文且病未能也居一年再登馬鞍徘徊祠下憑南牖俯臨萬家皆公之遺黎當門而望東城蜿蜒如帶婁江曲折而東注入於渺茫江之左右勻勻原隰畎澮縱橫皆公植也俯仰今昔不覺泫然雖病其容巳乎遂為之記公名玉衡字元之萬厯乙未進士黃岡人北山何文定公祠堂記劉茞金華何王金許四先生憫宋祚之將移憂悲抑鬱卒老於窮生不出仕沒不治喪葬不起墓慨此骼胔胡不速朽嗚呼微矣白雲先生以後至元四年戊寅正月壬寅葬於婺女鄉安期里許官山其子曰元曰亨皆以罪沒於我朝洪武間因絶其系迷其墓成化初推官林沂亷得之立石表其阡仁山先生以元大德十年丙午九月甲申葬蘭溪縣純孝鄉仁山之後隴不封不樹漫無標題前知府趙鶴芟蕪考墓纍冢不可復識而其裔寓彼鄉者亦近支也魯齋先生以咸淳十年甲戌十一月甲申葬金華婺女鄉望柴嶺金村之懷原墓地六十畝子姓世守之北山先生以咸淳五年巳已十二月壬申葬金華縣南山油塘之原荆莽無端狐兔有窟商山之芝不知四皓之高首陽之薇不知夷齊之清均為牛羊之牧而芻蕘之場也鄰有豪右逐其佃甲并其圭田據而業之子孫家盤溪者百數莫之能直蓋府治東草里許亦有油塘豪欲滅其墓乃匿其碑指先生墓在彼油塘志府者不察從而是之正德甲戌春正月知府事劉茞同知張齊通判趙天定推官薑山甫率諸生葉援陳育項復通馮紀等展修祀事墓己夷且陷惟趺獨存而商生大路復亷得完碑於油塘之匿孔尚無恙也乃繩其豪於法還其碑於趺正其田於籍歸其佃甲於鄰壤伐巨石以封若當而繚之以牆垣竪享堂四楹旁為連甍以處佃丁規制粗備庶幾有司崇儒重道礪世磨俗之萬一而先生之存亡固不係乎是也因定墓夫一名每年追其直於黌序輪遣教職以清明日祭其墓王金許亦如之茞因推其意以敘之曰自堯舜至於湯文周孔率五百嵗而聖賢出以續斯道之傳惟鄒魯萃天地之間氣賢聖林立不可尚已其餘希世寥闊乃僅一見自孟子沒千五百年始有周程張朱兆應文明道宗鄒魯蓋間氣之再見者厥後吕東萊倡道於婺朱晦庵張南軒相與切磋􅊰習於麗澤之會波流河潤至於文定親接勉齋之統傳諸文憲文憲傳文定文定傳文懿百里之內同門之間四賢挺生上承吕成公為地方五巨儒問道之士無慮數千成章者比比此又間氣之疊見者世稱金華小鄒魯不可誣也其大者拯頽救敝立懦亷頑如鳯凰翔於千仞四方欲快覩之而不可得味道之腴絶物之欲如蛟龍蟄於九淵天子欲識其面而不可致蓋其性命之趣長而爵祿之味短天人之理貫而顯晦之幾明德澤之滂沛不深於義理之涵濡小康之政治不加夫大道之感通所以孔曽思孟終身不遇周程張朱不能立朝何王金許終守環堵為是故也不然何庸衆之難退而聖賢之難進如此哉至其論大道則北山以洪範之敬五事為明明德之謂厚八政為新民之謂建皇極為止至善之謂皇極有休徵而無咎徵有仁夀而無鄙夭則致中和天地位萬物育之謂此為皇極之極功若此者不害其為同魯齋於易則以河圖為先天後天之宗祖於書以洪範為古今經傳之宗祖於詩定二南黜淫奔於春秋作發揮明大義訂大學致知格物章之未亡還知止章於聽訟之上謂中庸古有二篇誠明可為綱不可為目定誠明各十有一章若此者不害其為異仁山通鑑前編自周威烈以前各為編年穿貫春秋直遡堯舜據經考傳不嫌其為僭白雲集詩鈔名物讀書著叢説讀春秋有管窺皆傳注所未發句讀九經儀禮三傳至於天文地理典章制度食貨刑法字法音韻醫經數術靡不該貫不疑其為泛仰髙鑽堅鈎玄索隱惟欲求見聖人之止而後已然則勳庸彞鼎之榮綸綍隴阡之光何足為先生增損蓋自有不隨物而化不逐運而遷不待生而存不因死而往者矣茞亦嘗掇拾行實疏之於朝請得綴食孔子廟廷不知輿論僉同能有成否兹因祠堂訖工刻石識之學宫牧敲磷火想不能祟我先生道骨矣正德乙亥夏六月朔為之記三蘇先生祠堂記劉茞正德甲戌春婺守東川劉茞重建三蘇祠於郡城西隅景薊坊之邃巷仍故址為屋四楹其十三世孫生員蘇文撤寢室以為左廂房四楹官易民隙以為右廂房四楹及門屋四楹墻可及肩階惟旋馬重勞惜傷慳展拓也訖工有疑者曰三蘇蜀人也而祠於此乎曰因也非創也葺也非增也坊以景蘇名可知也曰祭法云法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能捍大患則祀之三蘇有一於此乎曰未也不以太乎曰祠為前太守贈少傅蘇公遲立也建炎初元遲守婺政成惠流民為生祠報其功也既而官終待制謝事請老因婺家焉乃推本所自另祠其若祖老蘇文公先生若伯大蘇文忠先生若翁少蘇文定先生昭庭訓也少傅德煦婺人一郡之望也三蘇學行雄天下四海之望也婺人藉三蘇之望以世少傅之望因並祀之所謂稱人之善必本其父兄師友厚之至也配食惟龍圖少保公簡一人不逺推者舊額也蘇世顯且延如太守公誦太卿公諤尚書公符正郎公林都照公友龍太史公伯衡匪弗耀也而不敢附此者從民心非一家祀也少傅甘棠遺愛不可以縷其大者如奏蠲嵗貢羅假之溢額民至於今能頌之郡乘不悉其承宣風動之休或逸典也祀其身以及其先非忝也宜也曰論人物於趙宋超邁雋永必歸三蘇參之為三鼎立之謂也果若是班乎曰昔人謂三友一龍余則曰三蘇亦一龍也龍之剛壯在首老泉之端方以之運用在身東坡之豪放以之骨力在尾潁濱之敏妙以之此三蘇之别也惟有宋隆重儒道故天啓文明之運理學有二程數學有二邵律學有二蔡文學有三蘇間氣所兆疊萃一門於戲盛哉竊有論焉古之取人寬而恕專論其心術今之取人嚴而刻兼論其學術心術既正大本已端他可略也學術疵至有見多白而廢眼覩蹣跚而廢足者矣古今文章大家唐有韓栁而韓為之聖宋有歐蘇而蘇為之豪况其心術光明出處正大湛乎青天皎乎白日孔門家法無相背馳議者猶謂其因文見道未識性理直以文士目之不以刻乎愚謂韓子性有三品只欠氣質二字濓溪曰剛柔善惡中而已矣此之謂也三上宰相不掩佛骨一表説命之對揚孟子之衛道不過是也蘇氏嘲謔文辭不害其嚴毅之操縱橫氣習難廢其厯履之實是以至誠通於天地粹德達於神明忠信行於蠻貊精明孚於蟲魚鳥獸觀其開衡山之雲驅鱷魚之暴枯眉州之草木禱萊州之海市走契順之納欵來貢使之問安傾天子之知遇廑后妃之解紛兒童走卒皆知敬慕小夫賤𨽻聞姓名比其沒也外自嶺海內自中州逺及吳越揚益之徼農人商賈輟業興嗟士夫君子聚哭而設奠不勝其哲人之慟梁木之悲於戲必有所以致此者矣可以文士少之哉近世有紛紛者多見其不知量也疑者曰余鄙人甕天管豹自今不敢妄議古人矣太守因筆之以為記重修顔孝子永慕廟記張維樞義烏縣昔名曰烏傷曰孝烏俱以秦顔孝躬畚鍤葬親誠感羣烏銜土助葬吻為傷得名宋景定間李公補始作廟勒永慕記一篇我國家風厲孝道意盛甚非若法律愚黔首時司烏土者如李公玉劉公同薑公淳遞為修葺定祭田供祀非若昔篳路藍縷時顧久不能無荒刺也余閲六春秋拜孝子祠下見遺壠纍纍每慨然景仰是春復修祀典覺風撲松楸羣烏悲鳴也因憶宋文憲所題千載之下禮憲淪胥豈獨愧君烏亦不如與王忠文之咏瞻烏云畢哺者烏紛回翔兮銜土助葬成高岡兮厥吻流血集哀聲兮悲風滿林日色黃兮等語為慨然心動徘徊不能去顧謂同事周時彥數君曰以河山之代更嵗月之駒度是廟也雖不見侮樵蘇然而堅者瑕翼者幾欹何以光孝道而慰公崇奉親靈之意且風于唱之群烏鳴和之地下幾幾望之矣責實在不佞乃悉索鍰餘一鎰有竒委黃承泗黃尚佐等督修程以磚植繚以周垣財挾日而功竣余同視歎曰與易寧戚孝子有焉與奢寧儉則今日之舉乎夫孝子孱然布衣耳非有詩書之習曽閔師友之素也彼其僻踊於堊室枕哭於苫塊瞿瞿皇皇於畚鍤間僾然如見者形耶愾然如聞者聲耶當日惟一抔土是期何意身後然而瞻依之所不至筋力至焉筋力之所不至血誠至焉天感孝子血誠而假靈群烏為之鳴號為之蹢躅而銜土孝子之一抔土完孝子崩心之痛始釋而孝子烏傷名亦隨之千秋嗚呼以秦風駟鐵之悍至祖龍又益厲之其行者無不鬬刀劍而其居者無不德色誶語於鉏帚孝子之悽愴襄事獨皎如白日不為秦俗所染雖謂未學謂之學矣且烏何知天知地知神明知故使烏亦知今夫孝之至者氷可卧竹可泣鹿可乳烏又何不可知也烏知孝子而百千秋後永知烏烏幸哉嗟嗟貴而逝泉分羮者同歸於盡而孝以負土特聞阿房驪山隔離天日矣曽不能當叱吒者之一炬瞻烏竟誰止耶而顔氏之馬鬛封與烏傷名今猶若新也顔之傳不係於廟之修不修苐視今執殳而或委親烏喙獨非四封之人乎修廟焉使不顔者愧嘻又何敢謂華川之無能為顔也則樓君藴龔君曇與今旌孝陳文言固儼然入顔氏室矣夫愧之不如風之之疾也因漫言重修永慕記肥城縣重修關侯廟記吳國倫肥城故有關雲長廟當邑之中不知創自何代至以王號號之御史中丞李公未第時嘗下帷廡舍間睹記邑父老嵗時伏臘更相主進持醵錢聚賽為樂其有兵荒疹癘及昆蟲豕鼠之害雖至微細輒相率磔雞刺彘尸祝而禳之以為常云弗賽弗禳即家懼而人不自安史嚚氏所謂神依人而行固然哉後中丞公宦逰且若干年廟日就蕪圮幾鞠為場隆慶改元邑父老聚而慮材鳩傭一新其故寢殿中嚴賓廬在序庖湢庾井各適其所繚以丹垣扞以重門又築臺可數仭而亭其上以懸鐘簴由命期以迄完繕曽不期月邑父老之賽且禳於斯者莫不義其役而歸功於神中丞公乃以其意屬豫記豫按雲長以漢前將軍遇害江陵後始追封為侯尚未有王號而追王之者毋亦竦意臚語有如蔣帝茅司徒之稱不必有據也夫廟以妥神而稱之以其所不安豫已不知其可又王則王祀必陳禮備樂而後舉非父老所得磔雞刺彘賽且禳也今尊神而卑其禮將饗之乎豫故先正其名因欲解父老之惑又申告之天下廟祀侯者多矣而肥祀猶為有名何也以侯嘗麾蓋䇿馬斬顔良解東郡之圍一時英風至今凛凛在肥故東郡下邑也祀典所載功施於民其庶幾當之夫侯之血食既有所從來齊魯人好義又其天性固宜世世祀不廢乃豫聞於古之人朕志先定詢謀僉同鬼神其依夫神依於人志帥於已志未定而聽於人是惑也人未協而聽於神惑斯甚矣夫侯合徒翊漢虎視孫曹忠勇稱萬人敵蓋人情所共震也諸父老聞侯之風舉邑而嚮於義乎是侯之有大造於邑已不然人不我與神將焉依且父老獨見侯之起也以亡命而其遇害也以樊之捷由斯而談禍福相倚侯亦不能自為命而又能於百世之後禍福乎人哉中丞公遂以豫言告父老因礱石而碑之厯城陳令君為李于鱗先生立嗣置田記邢侗李于鱗先生厭世且三十年所矣其子駒後先生十年奄謝二嗣子又相繼無辜死於是蓋代哲人幾同若敖分觸食於蓬丘之上所遺諸寡婦人二稱為先生巾櫛媵一則駒者婦卷婁浮寄於西郭窮巷間僅僅此下傭汙邪數畝不足供糝稗三孀弔影夜覓少膏為人作出嫁衣補藉小糊口而其期功強近中表姻婭之屬率亦滅迹無與通往來女子之交脯椇永絶遂令先生一抔馬鬛荆棘等身經祀無椒漿之奠嵗時祊寢廢罷可知也往往動輪之賔踵接濟南流連太息惟相與嘆先生無家無後付之無可誰何而已吁嗟嗟可慨哉上谷陳君采居平修業制舉而外最好于鱗先生書且亦微聞先生無家無後狀心竊竊念之謂一孱書生何自而倨惠施鍾期之位乎天若悔禍於于鱗陳君乃得成進士令厯城下車甫旬月即擬為先生後聚族僉同得先生諸弟成龍之孫世茂之子年甫六嵗於先生親則從曽孫令君手疏告先生肇鍚嘉名曰嗣為之要月賦囷數斗嵗給布數端以急此兒三孀于零丁孤苦之中一日而見丈夫子更遞為洗沐喜若撤蔀望天而數十牛倣徨瑟縮咄咄地下之老遂一日而稱人祖異哉居頃之令君又心竊竊念此不足為嗣沒身計也者而能為于鱗先生冗宗計也者乃蚤夜蕩胸蒿目而精為籌曰非宅孰竟厥居非田孰竟厥食也因謁臺上記一時臺監郡具誼令君之指有請必從為購仙臺百畝之産宅亦稱是計費一百八十千又為葺其窮巷故敝宅乃茅乃塓不憚指麾計費三十有四千已又為嗣課小學讀已又為議婚令君之為此也不沽世俗捐損俸緡名第調會計經費之餘取贏自我而靡所病帑一錢嗣及有田有宅易下傭之處而席八口無飢之業三寡婦亦遂有家于鱗先生自兹魂有守主墓有時祭一惟令君是憑是依令君之功巨矣哉有唐李白有子伯禽後白死禽子孤絶二女子流落農瑣視于鱗今日正等爾時范觀察傳正為白朽骨圖亦與令君同意而令君􅍀然視力俾于鱗無子孫而有子孫則更勝之蓋代哲人獲與繼絶興復之義以快詞林而先士胄此實天壤一大事惠施鍾期之位奪諸吳門豫之上谷蓄於海內同袍之素而酬於官下後來之彥蓋以見于鱗之道大而斯文之不墜於地人勝劣天於志足證焉某以事如濟南得諸縉紳士輩之談説甚晳歸而一夕㸐燭為記之然非令君意也倘亦天下後世薦紳士輩意爾三神記孫宜三神者華容東山三神也按嘉州志神趙姓名昱蜀青城人與道士李珏遊隋煬帝徵為嘉州太守州有巨蛟為害昱募船率千人臨江鼓譟自披髮仗劍入水天地晝晦頃之雲霧開朗昱提蛟首奮身出江水咸赤蛟害遂除開皇間挈家入山蹤迹不復見民感其德已因運餉往見其乘馬引犬一童子腰弓手彈以從騶仗如平生云唐太宗封神勇大將廟祀灌口玄宗幸蜀也進封赤城王宋真宗時張詠鎮蜀蜀亂詠禱之獲助平蜀事聞封川王清源妙道真君明初東山人有耕山麓者聞地中金鼓聲發得巨石覆籖簿神像焉閲簿知神姓號因考稽神記言祀故配以五顯晏公二神於是遂刻像繪祀嵗一博奉鄉民家今蓋幾二百年稱儺部神云邑人有疫癘疾率請神行水驅治之間致殊效即罔效亦必豫知其生死而神之出治疾也朱旗絳旌褐蓋文輿擁戈曳牌鳴金吹竽壯士旁翼豪夫後趨至所請之家則耄耋辨裳嬰孺僕臧跪扶拜迎肅肅蹌蹌設爼獻爵屠牛烹羊有不如禮或慢其從者神自下以輿倒書地笞罰之其人即惴惴受笞一旡敢抗神去明日主人整衣嚴冠躬諧神所稱詞致祝敬謝我顧乃至巴嶽荆潭澧朗之人無不奔走修謁祈福祐者厥費牲醴幢旐率踰數金云孫子曰語有之死生命修短數命者天之付也數者人之值也神固炳曜逖絶用物宏而取精多然廟食一方靈耳造化潛柄生民巨機謂能轉易揮斡陶冶自遂奚理哉昔者聖王之制禦災捍患祀典及焉蓋水旱疫癘之災民志悽惑莫知底寧於是索鬼神致祭祀安定而鎮慰之水旱癘疫者氣也志定則氣隨焉兹周禮所以設方相之司而漢法有侲子戲乃三神之祀久而罔廢者亦或以是耳即不然繪質圖狀喧群集儔萃民之財創國之儀器號四方而趨之厥於人功朝典奚據神心奚安焉而崇秩若此哉初豫先大夫疾也醫率謂不可為已乃召神訊禱如醫言然則神之靈蓋以人效云夫若神者亦善於自準者歟按志稱與道士珏遊斬蛟入水呵禁之術意必於珏得之自開皇迄今幾已踰千餘載神之子孫澌泯盡焉而血食不廢邈哉異矣神故有序記歌詩詞厚齋朴菴東山以下諸名縉紳出者凡二卷辛丑秋豫謁神張氏之堂張氏父老咸贊趣書於是作三神歌并記别為卷歸之平地濼重建龍王廟記于慎行平隂東北十里有山曰龍骨羣峰環而拱之如合抱焉山之東南有石之窟含氣出雲雨則為兆若龍洞然山之西址有滙水之陂雨則成澤若龍湫然其傍隈曲盤回有百室之聚命曰平地濼濼者泊也山坳有祠謂之龍骨以祠龍而雩焉祠不知所創始惟其前樹幢之石狀如追蠡則已千百年物而岡阜之間必嘗有龍蛻之迹故以名也父老傳説當其香火盛時雨暘時若禾稼如雲牛羊被野周山而田熙然康樂不逄害災故亦曰平地濼濼者樂也嘉靖甲寅秋有雲雷之異見怪物焉祠遂震裂日以頃圮旱潦為災澤不時降居民苦之里人孫公時為文學倡義募緣亟圖修復未成而沒後四十年厥嗣侍御君既第為貴吏而里中若有神降曰復祠者孫氏也侍御聞之泫然泣曰是先人之志夫豫其敢弗繼承以邀神貺遂諏日鳩衆出俸金四十為里人倡逺近聞之助者雨集公之兄璟實董其功不踰嵗祠成像設孔安堂階有穆周垣樓觀亦肅以整巍然水府之宫矣侍御以書抵豫使為之記夫龍何神哉志曰合而成體散而成章乘乎雲氣而養乎隂陽故曰神靈之精也然考之典記山林川澤有貍沈之祀風雨雲雷有槱燎之祀而未嘗及龍何與蓋嘗思之上古聖神在位天地之氣絪緼欣合以澤百物而龍者乘隂陽之和上躋下降以神於其間是致風雨順寧疵癘不作帝舜之世其臣有董父者能擾龍而馴之命之曰豢龍氏夏后之世其臣有劉纍者能擾龍而馴之命之曰御龍氏蓋所謂御且豢者固非能真得其物飲食而調服之也惟是潔其蒸嘗掌其祝號以精禋而饗之若今巫覡嘏史之流以事神為職者耳此非龍之所由祀與三代以下地天不通和氣乖鬲世之視龍至求之委蛇罔象不得其形而二氏之官亦廢然郡邑之吏猶以春秋秩祀修山川雲雨之祠而田更里父亦時就雲雨之所興山川之所聚立為廟貌以備不嵗之雩而號之曰龍君則龍之祀固未嘗廢也夫雲行雨施品物流行則雲雨者龍之所馮深山大澤實生龍蛇則山川者龍之所自即山川雲雨之交而求龍以事之以嵗時雩禱而迎其福祥非即二官之遺意耶抑古有之泥蟠而天飛者應龍之神也時暗而久章者君子之德也故乾之為卦取象於天而其六爻之動皆取象於龍故曰時乘六龍以御天也侍御附風雲之會以瑞聖世其猶龍矣豈其且潛且躍徒使天下想望其澤雩而願利見之猶卒未耶必不然矣書而識之石以為契焉宣府巡撫大中丞新城王公生祠記于慎行莊皇帝朝逺人欵塞迄今雲中上谷寢燧醳兵幾四十年世皆知襄毅王公之略而不知襄毅之後又有二王公其一廣平王公其一則今所生祠新城王公也新城王公者琅琊之裔閥閲甲於齊魯大父濼川公在嘉靖間以山西參議分守口北其後且四十年為萬厯己丑而公以山西參政分守口北宣人大歡乃其時鎮之將吏久狃欵而嬉遊戎且生心公至慨然曰夫欵者緩也本以緩敵乘間而飭武備乃遂狃而忘戒心乎則下令增亭障簡營伍將之智勇者異其秩卒之驍健者異其廪私馳騎而役卒者法請托竿牘一切謝絶行之無幾一軍校吏凛然改觀而會廣平公以中丞開府至而與公相得歡也凡所擘畫悉從決䇿公益發舒自任遴驍突為親兵躬御臂韝懸金教射差其良苦以行賞罰得蹶張之士二百與都護校射於郊騶發輒中者盡公部也又念上谷故砂磧地民鮮蓋藏卒有緩急粟價騰踴士且脫巾而呼當秋時先借帑金二萬糴而息之凡再三偫得息金三萬兩羡粟萬六千石用以繕治兵甲召補郵騎塹西路而守之延袤百里以遏敵入而先是襄毅王公之與敵欵獨諳達以其孫故回面內嚮而婁巴圖永實伯諸大部直宣府邉故利敵不欲欵則屬諳達要之且啖以厚利乃稍肯來而嵗恫喝要挾無己時典市者懼禍起肘腋率濡忍聽之以為常萬厯辛卯閲視科臣始議裁市撫嵗無過二三十餘萬計畫已定乃無敢與敵言公毅然以身往適屆市期大敵颷集恫喝如故公露冕肘刃坐市臺上呼諸部長面諭今有旨切責疆吏毋滋爾橫索我來更定約束爾如奉命而盟我則為政諸部長咄咄誶那顔安得是語穹廬千帳投鞬與漢堞平可使退乎公厲聲曰爾衆何可詫也西北事我盡知之今市隧之傍有鏹如雪有幣如雲聽我則皆爾故物不則我且閉關謝爾而以此募諸甌脫部落與爾為難爾亦安得宴然何可詫衆也聞者色動則呼衆環公而請公故示不測喜則分食啖之怒則叱吒坐而控弦懸鵠二百武外應聲命中咸驚服以為神市去鎮二舍而遙公晨坐堂皇暮挾二健兒疾馳平明又在市臺敵嚄唶語曰中國殆欲絶我不則何用如此人典關而日摩厲以須為不亟唯唯漢物非我有矣遂從公盟計公在事十年所省司農水衡金已四十餘萬而往者北馬入市數蹄而與之直公命駑直毋與駿均其長納固爾堅不聽命露刃以爭公斥之關外三日不內卒蒲伏受令遂為成規省亦不訾公又決䇿收史車二氏二氏者敵之别種故濼川公時所議撫也世葆龍門塞下力能角敵為我間敵畏惡之欵成徙入內地稍為邉吏所侵而史氏故與别部長安圖為婚圖乘其恚誘之遂挾車氏歸敵相引而鈔寇邉公與廣平公議史氏老於兵諸子皆驍勇敢鬬今為安圖用邉無寧日矣不制安圖無以示威敵不收史氏莫能制安圖乃因順義王之西獵議革其賞而令縛獻史氏以謝過俘至廷議欲懸藁街公計史老矣殺之無益其壯子徑兵悉在塞北今日殺史明日北騎必厚集塞下且以史氏為解折而入於敵此失䇿為敵笑乃急白廣平公馳書政府請中旨從末減史氏諸子乃大感爭拔帳來歸敵始惋悔而安兔數寇邉亦數敗諸降人又時時鈔掠之窘甚無所出乃因其主為請願欵塞如故時公已代廣平巡撫乃詰諭敵使令安圖悉歸所留史氏部落並送車氏乃許奏復市撫至今諸部馴服邉藉為用制欵機權實在於此公既開府益務風厲撫循壁壘一新耕耘蔽野所奬拔戲下往往自偏校纍伐至上將軍其有巽懦貪墨輒以惠文從事無所假貸而日以恩信畜敵敵時從城下問大太師何在能御湩酪黃羊乎相傳報以為歡而鎮人又津津頌公拒礦𣙜事以為布德宣鎮不在控敵下云宣故有牧馬場欵後無警營卒稍墾其旁課入當芻秣諸將校亦各闢並塞間田以給私費謂之養亷𣙜璫惑姦人言皆欲藉入少府而畿甸稅額共八萬金宣大居二焉璫先趨大同大同人曰吾視宣府乃趨宣府盛氣謂公云何公正色曰宣瘠鎮也而鎮城為諸路幟聞貴人將重征於化居市肆且罷罷而四方粟芻皆不至環甲鳴鏑之徒無所得食將蜂起與貴人為難且奈何它若張家口坌道諸處稍有貿易征亦不堪重也貴人如調劑焉毋魚肉吾軍民吾則戒軍民毋敢撓貴人令若牧馬場則有高皇帝制書在非守吏所敢循也軍中自大將以下皆食其故俸諸椎牛犒士一切供億盡出養亷地中而𣙜以為稅令此曹枵腹而持兵乎且上睿聖不測貴人即工為逄有如以飽槖受疑又且奈何璫無以難竟聽公指揮嵗以四千餘額解矣璫之采礦則先鎔精鏐雜砂中謬言某穴砂一升可得銀如干以令有司必中程乃已少忤輒羅織被逮公約部司及大將皆遣一使偕往各以砂至面鎔而驗之亦不得逞而去以故礦𣙜之使貙攫虎摶幾遍天下而宣鎮獨不甚苦以有公也公由分守建節居鎮十有三年會播州初平以威望廷推擢川貴督府去蓋自欵後任上谷事無如公最久先後所當亦無如公最難難者則將吏之以欵狃也大敵之以欵挾也持文墨議論者之欲以節縮見功也重以屬國外叛勑使內紛殆哉乎衡石桴鼓之間智不及謀勇不及斷倐忽失著機局遂更而公嶽立淵流因機坐折銷萌厭難外威內和卒使數十年來厚啖之敵一旦取諸其懷而定以畫一使之俯首郊關如稟功令又收史車之族以制敵要害欵始不渝夫非所謂安國全軍算多而善善者乎至如以備邉之暇創洋河石橋長千尺而贏廣並五軌利涉捍患以鎖鑰北門為邉防要險具郭少宗伯記中大營萬全學宫建尊經閣藏書萬餘卷以興文教具葉宫庶記與公所自為記中文事武備於是觀焉迹公英毅慷慨智略輻輳而沉幾雅度不輒輕發發必中窽用能光昭濼川公之緒以勞定國而貽邉疆數十世之安有以也公去而五路之變告矣宜鎮人之益謳吟思慕願尸祝而無疆與祠在城南五里即公所建廣濟橋北是舉也自大帥以至文武將吏諸生軍校不約而集既落而歡然呼已又愀然思也即敵亦時時問大太師何時來開制府如廣平故事乎守道張君副戎王君欲勒公迹於石以壓塞中外為後事師屬行作記行不佞嘗扼腕世儒拘於見聞至不能彰明國家盛美而猥引漢宋陋規以擬今日疆事又輇材諷説之徒不覩今昔情形第見史車之屬散處龍門意不無勦江統緒論謬欲為徙薪嗟乎邉事蓋難言哉自襄毅和戎後上谷得廣平及公益建無窮之利而公當事更久且處其難功在社稷寧獨邉氓之衛故不辭而論其大俾籌邉者考鏡焉公名象乾隆慶辛未進士山東新城人今為都察院右都御史兼兵部右侍郎張君名我續萬厯庚辰進士直𨽻邯鄲人以山西副使分守口北王君名某宣城前衛人以某官為副總兵明文海卷三百七十
