body:
  text: 明文海巻三百七十一餘姚黄宗羲編記四十五祠廟虎丘重修五賢祠記孫繼臯虎丘之北岑舊有平逺堂以佐名勝豁遊目而乆之乃為龕以祠五賢則為唐韋轉運白少傅劉賔客宋王翰林蘇文忠韋白劉先後繇重職補外刺史蘇州王繇大理宰長洲而蘇以南竄經陟不啻數數然咸有樂乎斯丘者龕之設實自近嵗江長洲始後十許年為今年庚成户部陳公用望郎𣙜闗滸墅自公来登覩堂宇漸圮堦砌都裂慨焉捐𣙜之羨凡百有廿金以付寺僧明鏡仍遴官耆之才而勤者使飭而新之工竣屬余記其事余於斯役而竊有感於斯丘之有數君子也夫此數君子者文章風節凌跨一時焜燿千古而或一麾以出或三黜以徙羈縻流浪於江湖之間而斯丘至今幸得借其風流以為重假令當時身不出國門官不離蘭臺鳯閣以老雖勲業在朝著望斯丘迢迢東南一抔耳尚誰得而有之哉蓋惟天也若故偃蹇其遇而饒予之以吾吳之佳山水而數君子因得稱隠吏遷人徜徉笑傲於幽竒葱菁之區流連題咏低回而不忍去夫亦重有感也然則斯丘也其遂為數君子之丘與客曰不然前此闔閭不有之以為墓乎而虎不至今蹲也是闔閭且不得而有也生公不有之以為臺乎而石不至今㸃頭也是生公亦不得而有也王珣不有之以為宅乎而非禪宫梵刹不至今永也是王珣曽不得而有也矧宦轍謫轅飄忽往来譬若雲萍然烏得而有之嗟乎惟逓處之逓去之而終不得據以為有則天下之倐忽滅没轉盼而不可以為常者皆是數也彼區區得䘮寵辱尚足以挂高賢曠士之胸懐哉吾以知數君子者其深有得於斯丘也已今吾試與公憑高而眺臨深而觀晨霞之粲然夕照之軒然而禽獸之嚶然非夫數君子之文章耶池水之泠然石仞之然而松栢之蒼然非夫數君子之風節耶以至嵗時寒暑之推遷風霆雨電之不測卉物之凋榮而烟嵐之聚散又非數君子升沉顯晦之變態耶公其亦有俯而思仰而㑹曠世而相感者乎是數君子之寄於斯丘者其迹而寄於公之俯仰者其神斯丘之寄其迹杳乎其不可尋而公之寄其神者躍乎其如有在也祠之右又有宋尹和靖暨國朝何别駕二祠和靖宋儒故結菴丘之傍而别駕在正徳間於郡有保障功公槩而飭之並祠下為重臺五盤旋蜿蜒直丘之麓公所創也公名訏謨閩之長泰人萬厯辛丑進士重表譙公祠記丁自申長民者務於義之所可盡而不過激於事之所必更其斯為輯民和神者歟夫以義有可盡於利所由而興之於敝所窮而革之謂之有為於民可也事之所不必更者因之無損於其實而足以垂荒逺之跡廢之徒眩於其名而或以啟疑信之心此其於民既無所為而所以為神者則吾不知矣夫神於民義亦有闗焉而長民者所縁以設教也今使義為之盡而所更者於義無所取其勢又不能排此以信彼則不若不更者之為愈如是而必為之更焉無乃志意亦有所激而傷於過耶且孔子所謂敬神而逺之者直以神理為不可知不欲䙝而即之耳未聞毁之而足以為敬驅之而後以為逺也今天下神祀之盛不翅古時其懐柔所不著者或以土人侈其威靈私其功徳而奉之未有無因而血食特歆於異代也儒者讀孔孟之書治三代之民豈欲舍民義而𨗳之以尚鬼之教顧事之已往亦有無害於義者吾盡其所以務民者兢兢焉固不𨗳其始之所趨亦不奪其習之所漸如是而和神乃所以輯民豈非長民者之所當知哉南兖之有譙公周彼其威靈赫於殊代功徳私於一鄉亦土人以為可血食者也其墓之封題於縣治之後者既祀且久一旦移而墟之於千百年曠世之餘雖當事者排宿業而犯群咻卓有定見然吾所謂非民義所闗而志意或傷於激者蓋騐以今日吏民之心欲復其墓而祀之則不若不更而移者之為愈殆非誣已當祀之未還故地也或謂譙公英靈常凴墟墓咄咄能菑禍人頗有伯有為厲之説余以伯有之厲為後不立自晋至今公後之弗延乆矣所為尸祝而崇事之者夫非吏民不冺之心乎雖公之靈足以為厲即不宜降厲以虐於我事者是使吏民何以欽公之祀而公亦無以繫斯土之私也吾知必無此矣但表其地而復之者是則吏民欲有以慰公之棲而公之英靈亘千百年慿附睠顧於此亦未可知夫不為神之故而有妨於民之義乂以答民之望而獲寜乎神之歸是一舉而兩得也何獨不可為與或曰徙而復遷返其故也又飭其祠禮也義乎曰墓之祀則野於禮祠之脩則附於典夫公於鄉賢有列享矣祠則本其所設而非有加也此所謂禮而權之以義者也祠成因推言公墓之可以無廢而祠祀之所由復興亦古者縁以設教之意歟祠屋凡幾楹不務豐飭僅取成禮凡費金若干两米若干斛皆取諸贖餘者以邑簿李褒董役而落成於署事通判吳君君才周民務又深於鬼神之情狀其力贊議以譙祀為必可復與予同官有合率多此類云法得槩書常熟縣新建先賢巫公祠記陳寰虞山者吾常熟鎮也其東南椒麓形勝尤倍丹崖碧溪河逆泝縣城址環之縁為西闗萬井輻輳其椒有仲雍子游墓有老子祠麓有致道觀觀内有七星古檜有梁昭明太子讀書臺有宋學士丹井銘嵗時習朝儀於此為祝聖道塲觀之西有嶽廟有張許闗劉諸忠臣祠當觀廟間地稍隙鄉民據之列栁鑿壙死將𦵏焉嘉靖戊子冬大廵撫峯陳公行縣至常熟先是吳公子游以縣之先賢故得立專祠於文廟左公既謁文廟則謁子游祠見商相巫公咸與其子賢亦皆以鄉賢設木主廡下乃退坐明倫堂進一高等生俾講巫咸故實既畢復進一高等生俾講子游既畢乃諭之曰巫與子游世次前後如此今爾崇奉鄉賢而乃列咸父子兩廊於義何如瞻享既忒神必靡寜此固官府責然事在學校亦訖無建請何邪諸生皆稱謝因再拜言曰昔宋嘉定間人治地青龍岡下得古碑鑱五大字曰商相巫咸塚皆古八分書縣令孫應時因遂建祠宇碑記尚傳今青龍岡地雖其可考然祗在山麓於是争舉鄉民壙地僭踰非制請飭為祠甚當乃付之縣令胡君因出公帑償鄉民價命歸壙立廟其内門前堂廡橋道後建正殿以奉二木主前臨通衢作石門表曰商賢相巫公祠明年夏落成縣士夫及小民日相率往拜但見崇山幽林明秀森鬱高臺素宇與松林竹石相掩罔不深副情佇慶忭頌美胡君與二令洪君熊君軰以寰先嘗從史官後請纂言述故鐫石祠中永示後世寰不可辭竊惟古稱鄉先生没可祭於社如公父子則豈惟鄉先生乎哉昔者周公嘗告召公曰巫咸乂王家而朱子集楚詞註又謂公古之神巫聖賢稱論蓋因事有指一以道言一以術言夫道有大小術有正邪道固可該術而術不外於道今如周公朱子所述則其道非小道術非邪術臯䕫稷契之所得羲和仲叔之所明萬世而下欲以輔世相君與夫推𤣥運測化機者孰非巫氏家傳之學耶即其有功世教若此雖天下皆祠殆亦非過况於所生之鄉而今且泯泯焉固宜當道君子考世申義而不能已也嗚呼商周之臣自伊傅外顯名後世者要不多見而孔門弟子江以南無聞焉今常熟海内一邑而商周人物已盛若此豈非東南之光乎為縣後學者景行先哲求無仰玷將若何而可逺勢忘利反身踐實不必追昔感義而所以為道術者必大必正不徒事文學之末以獵取科第而所以為臣子者必恭必謹敏徳勵行等而進之以希聖賢如是而經傳遺教以及今日祠祀之新庶無負耳茍不能自振㧞與時俗溷焉且瞻象過祠而心惟之其能無靦然也乎寰故直為是説願從邑之後賢同悉所戒勉者公安儒學梁公生祠記袁宏道天之大也無所不有而非挾其有以角也聖人亦然使天嘵嘵然與春争華與秋争實與萬物争洪纎大小天亦物耳故聖人之大以受不以勝天下之為道者岐矣其道皆竊吾近似者也吾僕役之則吾用而角之必且外吾而求張故以宣尼之聖而識小師老𥅆問道不以是貶大暨於後儒挾吾之所有以求勝而吾之道一變而儒始名再變而儒退然居九流之列三變而儒乃有為異道用者是則角之而張者也且夫諸子百家固未有能出吾範者也棼而為名法比而為楊墨遁而為老釋唯其竊吾似而甚焉則指之曰異學而實不出吾之所有夫聼所言觀所行譽所試是聖人未嘗不名家也春秋之斧鉞雖隠必誅是聖人未嘗不法家也吾蔬食而愉快其樂我席不温轍不觧其愛兼是聖人未嘗廢楊墨也寢有經食有戒是聖人未嘗廢攝生也幾研於未發道竟於無聲臭是聖人未嘗廢虛無也唯其無所不有而出之以平淡故其大至於不可名異學者竊其一以求專其譽故迹詭而言放以為不如是不足以自崇其道而不知千變萬化皆不出吾儒之固有吾取其精以供吾用而汰其甚告之以所敝彼亦且樂為吾用吾覆之以天臨之以君庇之以父母彼安敢出而為吾害吾自挾其道而與之角居然以敵名予之而彼亦傲焉以敵自居於是異端之禍與吾儒相終始名曰尊吾道其實薄吾藩而益賊以戈者也孟氏善衛道者其言不過曰歸斯受曰反經而已矣反經者使天下曉然知常道之大而本之身以措天下皆綽綽然而有餘吾常有餘而彼不足又安用借資於彼天下皆知吾之不借彼所謂濯龍之宫白馬之舍其黨不得不少而道自衰此所謂不攻而破者也故今之欲廓吾道莫若遵孔孟之家法而明其書暢其旨先是中丞梁公以監司臨敝邑見學宫圮慨然捐鍰新之毎至邑則進諸生徒告以聖賢之微旨其言朴直無彫飾已又出書傳若干多先儒之所未發蓋公之所以衛道者與孟氏反經之旨千古若一劵也昔者昌黎氏衛吾道徒為忿激之論而不摽其本是以介胄衛也夫介胄所以攻非所以服也今公苐發明孔孟之深旨使人知道之無遺覆而諸子百家無異載此猶禮樂盛而悍獷銷聖門之伊吕也邑士民戴公誨争請祠公邑錢侯聞之甚喜曰是王政之大者竟如士民請祠成以記屬余余拜手曰公他日當俎豆於白沙諸公之間者也然使後世知邑中有聖學自公始公之從祀自敝邑始一時令長師儒薫其徳而快其事而不肖某得以文字濫其役是皆不朽之藉也公名雲龍廣之瓊山人楚人戴公如羊叔子今者特祠黌序間故畧述其功在聖門者其他威惠不具載以竢異日志峴首者重修聖母元君祠記王嘉言東光城東四十里為燈明寺民萌凑積亦一顯鎮也鎮東路北有元君祠一區不知所自始而主此祠者為干氏近因風雨剥圮修葺之既固既完復礱貞珉欲紀其事而比丘尼明信者乃屬鴻臚君馬氏斯臧問記於余余聞之學士長老云碧霞元君者即華山玉女也今岱嶽有祠祠宇瑰偉壮麗天下之祝釐祈福者趨焉嵗所入香緡以萬計而自此祠外天下之為離宫行祠者小若大又不下萬計抑何盛也或者曰神有方也而方自有主元君西嶽神也胡為乎祠於東東已據非其位矣而離宫行祠又胡為紛紛於天下且也以柔姿坤徳而奔走四海之士女争先恐失供奉恐後望之若慕而即之若素彼遵何道哉吁可怪也於呼金石竽瑟之音青黄黼黻之觀聾瞽者莫與也夫元君之祠於東也彼亦直寄焉以為不知已疑議也不祠於東者且獨無憾乎彼不知夫𤣥帝乎𤣥帝北方神也而建殿於太和山殿以金飾至竭縣官之府庫而士女之奔走如雲與元君埒夫太和豈亦北土也彼不知夫清源真君乎斬蛇除害績茂於蜀而中國顧傾動焉彼又不知夫漢壽闗將軍乎生也威震荆襄没而其神破蚩尤復塩池祠而祀之者合天下紛如也亦豈獨觧人與荆人故曰神也者妙萬物而為言者也慈仁而貞烈瑩㓗而淵懿誠動於此機應於彼無西東無南北方所不得而靳杳杳㝠㝠日夜流行乎宇宙而莫知其所萌拜跪曲拳呼號鼔動竭蹷天下而不知其所為使若有真宰而曽不得其朕而凡人之心翦翦者廼以臆議之不亦謬乎嗚呼兹元君之祠所為無擇於地者非怪也雖然世俗所為建祠而供奉者果有為乎天下熈熈皆為釐來天下攘攘皆為福往不究夫惠廸從逆之理與所以吉㓙之由而一意徼之謬矣然則建廟可名節弗立惡乎可脩祠可行謬不飭惡乎可貞其心而幽隠孚㓗其行而神明合則為釐為福也且有待徼乎不然則神也者公明而正直者也孰弊弊以狥天下為事哉是為記重建至徳祠碑記蔣璜某生長於吳吳為泰伯賜履之域有司嵗奉蒸嘗廟貌甚偉其東北百餘里有虞山山之西麓有虞仲墓或謂伯仲竄迹在此夫吳於洛鎬為荒服在春秋以逺擯之然吳處東海荆處西南鄙相距數千里吳至夫差始折而入於越越後并於荆當翦商之世吳不𨽻荆明矣伯以採藥逃荆以翦桐卜吳事可逆揣乃又謂仲雍居吳斷髪文身豈伯仲俱逃而異轍耶其故不可知也余令延唐延唐之鎮曰黄馬山其陽曰大塘其泉西滙於山陂或渟或駛所溉田萬頃有祠於大塘者周大王廟即泰伯祠於山陂者曰黄馬相公廟即仲雍余始恍然曰兹荆蠻也茲伯仲遺跡乎两祠靈異著聞某治延唐之二年嵗旱率吏民齋沐禱輙應鄉耆老言尸祝自民間良乆神廟初邑令蔡公来治始用特羊而嵗無常供或市脯以獻嗣之者或舉或廢而荒祠不两楹材螙而埴崩遺像峩然櫛沐於風雨荆菁之中某踖然不自已請於两臺監大夫條上春秋饗禮嵗仰有司緍錢計七鍰費嗇而典備皆報可則更謀於縣尉周君幸徼使君之惠曠儀肇舉而榱桷不支堧垣不具有如一旦委諸草莽何以妥神靈乎且犧象不出門嘉樂不野合古之訓也私計鳩材埏埴益壯其棟宇而崇隆其址逾三尺許於是翦除荆棘流泉􅑇石幽壑重潭與古榦蒼藤森然䕃合盤薄四顧流可觴梁可度磯可釣峰隂紫緑可把先平丘壑種種相逼忘其身之風塵吏也既告成事乃肅鄉先生章縫諸士修俎豆之儀進耆老而觴之曰是禮也舉光昭令徳丕顯供庥敢徼福假靈於諸父老實式承之昔司馬子長謂荆楚悍勇好亂夫非伯仲竄迹地耶不寜惟是九疑之南有虞氏之鼎湖也两階干羽苗民已格百年龍馭猶指災荒彼一聖兩賢者千古車轍若擇地而蹈不謀而契即名都壯縣文獻之邦不可幸得而若邑两得之迄於今皤皤黄髪孝弟力田猶見舞干之風採藥之遺意安所得慓疾之民而稱之某生於吳為伯仲湯沐之邑吏於荆又為伯仲行遯之野何相遘之竒也吾蔣氏受姓於姬始祖伯齡於公為從孫泝源有自世數可推而某與伯仲遺迹亦步亦趨斯又竒之竒也夫神明之胄百世永昌而某宗姓受之禦災捍患粒我蒸民兹一方受之若夫徳高三讓道中清權苦其身并遁其名隂維萬古之綱常以續人心於不死則萬世受之是役也經費規畫則某為政部署工人篳路藍縷則縣尉周君思恩為政凢為饗室三楹左構亭六隅三面枕流右為别室三楹一治庖供明薦一居守僧而中奉司土更置門於東南向從龍首則周君議剙也其時為天啟壬戌之秋仲是為記明文海巻三百七十一
