body:
  text: 明文海卷三百七十三餘姚黃宗羲編記四十七寺觀重修工文菴記萬士和求木於市採石於山出甓于窰鑄釘於冶鳩工匠于諸役於是鎚者鑿者挑者載者斧者鋸者塗者砌者百藝咸備然後可以成屋故衆人為之則易而一人任之則難閭閈富人欲作一屋計其蓄聚飭材大率經嵗或數嵗而就至於菴院之修建某也助錢某也助力不踰時而畢其成之易較富室反倍焉余嘗思之末世以財為命各厚積以自焚而不肯棄一錢以易民死其菴院之施舍至使窮鄉小户樂出而奔走焉豈專以禍福報應鼓動乎人哉則又當思之矣富家巨室不但私其室中之藏較量於錙銖之間而德色於一飯之設其無勢利者曽不得望其門墻而華榱漆壁朝塗夕抹賓客之得至者有涕乎其中則怒于心而睍於目至於菴院之成則遊人行旅酒徒詩客輿疾待死枵腹求食者無不畢應若驛傳焉其便於人而切於用世固不得而無之也世不得而無之則其出錢力以助之者亦其情然也是豈專以禍福為心哉然則為政者不禁富人之過制而以毁寺觀為賢其亦未達乎情者與宜興工文菴在邑之北可十五里自官河湛瀆口入可半里吾師荆川先生由毗陵往返多至焉一日余隨侍先生於菴中寺僧德琇者出其修造始末求文記之先生以命於余余既不敢辭又感夫世俗之各私其家而菴之可以為會悟所也因為記之然余於德琇又有説焉富人知嗇其材而不知嗇其精知潔其屋而不知潔其心故窮奢極欲伐性喪生之事無一不備僧家外同于人而身裡寶珠如來法眼竟不能獨探而自惜亦且隨衆汩沒焉貪心未斷妄曰安禪則亦與彼之伐性喪生者等耳藉使其與富家大户易地而處焉豈不易地而皆非哉然則富人之鄙嗇僧人之外同乃其習之固然而失其真性一也夫僧以外同人而人猶助之如此茍能明大事因緣以如來法眼闡教其助之者當何如哉德琇朴質無華固非緇于勢利者然試以吾之言觀於僧與俗之人則亦可以自觀矣是菴修造之始末創之者宋咸淳二年潭心也再整者圓音也又毁而修則在嘉靖庚寅其僧曰道明而德琇則于辛丑嵗重整其殿宇者也長水塔院記屠隆余嘗與袁長史福徵沈徵君明臣馮吉士夢禎登泖塔坐藏經閣憑欄矚眺四面空水迥絶大地浮屠巋然矗立煙雲空翠間洪濤磢擊日夜撼其下川魚沙鳥芙渠菱芡參差歷落鐘磬之音冷冷然與波浪相答少頃斷虹蜿蜒橫挂木杪日氣霞彩下射湖心殿角回映閃鑠陡作黃金相又頃之月出東海波空如鏡流光蕩漾直似浮金剎云余心灑焉樂之時與諸君各賦詩紀遊蓋幽峭空曠離塵絶世足資髙流棲遁詞人登覽洵雲間山川之最勝處也按圖經泖者谷水也故秦由拳長水縣始皇時童謠告異野媪示兆一旦陷為谷水而泖名焉每遇天水澄徹隱隱下見城郭衢道井甃又器皿故物往往浮出間多神異傳諸好事者余則悽惻以傷此與禹母空桑之談歷陽化湖之事何其大類也余聞之數無常住物必有壞大化遰遷倏起倏滅若空若幻滄溟揚塵天地墮劫即大物不能逃而况一邑於何有釋氏等之為露電空花眇不可執陵谷相尋從古有之即吾今日之肩摩轂擊者安知非昔日之洪波巨浸今日之洪波巨浸又安知不為後日之肩摩轂擊也而世人據螻蟻寸壤假蜉蝣刻漏馳蝸角之名噆蟲臂之血忘旦夕之命而營千嵗之圖及其聲銷影沈瞥焉一夢難以語知余覽泖之勝則蕭灑以樂而尋泖之故則凄其以傷其樂也以物樂其傷也以物傷浪喜浪戚往來於胸是發於浮想非真性也是為物所轉非轉物者也然余之戚其起於樂乎有樂即有戚無樂何戚無樂無戚外境常移真性常湛而心地常樂樂根於性凝然而寂炯然而照是謂如如如如之樂不可得而樂不可得而戚其庶乎余蓋未能而浪有喜戚奈何不為長水之壞哉何者往來者不停之運也成壞者必至之期也委順者至人之幾也執著者萬物之妄也萬物遭不停之運乘必至之期則壞固妄也當其未壞亦妄也以物執物故卒不能離于妄以妄求妄故卒不能逃于壞而識者顧謂真性不壞歷萬劫而無恙超諸有以獨存儒者之所存養二氏之所修煉皆是物也視長水之成一浮沫之聚也其壞一遊塵之散也究而言之則滄海一浮沫也天地一遊塵也夫是之謂超然而余向者之浪喜浪戚隨境物而轉不亦細乎塔始于唐觀符間僧如海所創建殿宇塑諸聖像者嘉靖間比丘某築藏經閣者其徒自正也閣成延四方髙衲課誦其中不輟而大宗伯陸公樹聲倡緣為置大藏割腴田數十畝以供香火遂為吳中名剎云聖光永明寺記李維楨聖光永明寺在五臺山漢名大孚靈鷲以騰蘭故北魏一名花園以十二院故唐名大華嚴以新譯經故明永樂名大顯通以多神應故萬厯三十五年賜今名初蒲阪僧福登遊蜀為文殊師利象及殿金十萬斤髙二十五尺廣深各十五尺水陸萬餘里將至議所奉安僉曰顯通可登並造大士普賢象殿制皆同上聞賜金三百錢十五萬慈聖太皇太后賜數倍之已而上金書佛説眼明經十二卷為慈聖祝釐以寺制狹小革故鼎新上為易名而敕登住持登辭以老請得寶塔寺僧法須來代須既至乃與登經營不三年而工具舉更寺門東向北為千手文殊殿左右為十方堂為淨業堂南復為文殊殿如故時象進為三身佛殿沿顯通之舊而加麗焉進為七處九會殿事光明遍照佛皆纍瓴無柱棟進為請聖殿為五須彌塔為新造金殿掘地而得徐花石若干枚適與殿等事甚竒翼以兩藏經閣閣亦用瓴若漢屬玉之意其左右有祖師伽藍諸殿禪堂講堂庖湢庫廪養老居疾若僧廬九千餘楹維楨與登相識于京師且四十年復會晉陽同遊五臺而屬為之記是役也楨竊仰窺皇上仁孝大略焉比嵗左貂右騶四出榷修宫錢靈昆罼圭仞積三殿久燬司空曽不得一木一石之用邊境危如纍卵請餉一切不報而獨于佛寺金錢無所愛中外奏章不留漏刻之聽而手書梵夾端莊無纎微茍簡凡以祈母后萬年也此上之大孝也珠玉不脛而走萬里人好之耳天下熙熙皆為利來世衰道喪仕于朝工于市商賈於四方不遺餘力而讓財其為龍斷一也上業罷丱不罷稅丱稅使中白簡無不簿録其家惟仁人能惡人有賤丈夫焉惡而征之至于比丘無常業寄命于人不必有清淨戒律之實而迹則近為大衆明因果談色空導之嚮善不必有福田利益之實而意則慈是以惟諸僧與水旱無告隱民上發政施仁恆先二者數損尚方水衡之供為衣食資裒多益寡其此類乎令天下曉然知為利者不必利不為利者未始不利務本而黜末以出世法行教世法此上之大仁也然楨復有感焉福登周行天下所繕造工非一費數百萬錙銖無染人尊信之檀施雲集上與母后稔知其人捐金恣所使不問出入迄用成功登孱然老衲察于衆而得法須法須一旦能領所素不習狎之衆與諸匠師徒庸逺近數千人廪然受要束如奉大府之憲此非知人善任之效最較著者哉一寺且然而况天下今宫府閡隔股肱心膂莫知所寄八座九列不具官署有茂草政令廢弛膏澤壅閼災沴迭見狂狡􅔵望非冀在易為否為暌在詩為板為蕩杞人過憂天隕有如以二僧事入告上瞿然悟而敬大臣體羣臣式序在位亮采惠疇大孝大仁之化光被四表是齊王好勇好貨而孟子納約自牖之一端也維楨不佞因記新寺緣起而附以狂夫之言庶幾聖人萬一擇焉天皇山護國寺自來佛碑記袁宏道張無盡有慈氏瑞像讚蔣氏有記傳者以為天皇山自來像余初疑之既讀法苑珠林載廣州商舶事與記略同然據像乃迦文非補處也時乃東晉永和非髙氏清泰時也二公或别有所見耶抑偶得于傳聞而遂據以為文耶按記永和五年有廣客舟下載未竟夜覺有人奔船迹之不得而載忽重既達渚宫若有人躍而上舟遂輕是夕現像于郡城之北鎮牧而下傾懷渴仰如睹慈母干衆咸迎凝然不動有道安弟子曇翼卓錫長沙寺聞之嘆曰斯余本誓令小師三人導之颯然輕舉遂歸長沙後罽賓僧伽難陀瞻像悲咽謂曇翼曰近失天竺何為逺降此土詰其年月無不符合細勘像文有梵書阿育王造四字宋齊以來效光現瑞異迹尢多今其像貌衣褶已被庸工數髹髣佛不可見字長沙寺者郡人滕畯捨宅為寺故長沙守也夫宣父不語怪而至於禘嘗郊社則云不可知聖人蓋以不可知為怪非真無之也又云治國如視掌此歡喜讚嘆之極形容不及之詞也聖人蓋以形容不及為不語非直蔑視之也以為真無而蔑視此宋儒師心之敝是波旬説非聖説也言者以為堯舜禹湯文武其迹皆平平無他異而釋氏幻詭竒變似非經常之旨夫世代有升降而賢聖之軌轍亦異故禮樂盡而刑書出鞭撻窮而靈怪顯夫盜不知有法也而其詛而誓必質于神故怪之攝人也捷于詩書劍戟故天不有祥雲異氛珮玦流孛之怪則天不畏地不有芝草靈木崩吼震竭之怪則地不靈夫天地非故為妖異以駭世也所以導聖而警頑也且佛未始不常其談心談理使人蹈律而行義則固典彛也聖未始不怪如儀鳳落烏出圖躍魚金泥玉簡之錫龍孽水妖之伏固亦世儒之所怖聞也或曰信爾聖賢奚不恆為怪以攝天下是不然辟如花之根株梢葉常物也而偶爾一萼則人爭異萼愈難人愈怪使花而常萼花將不重花而止於根株梢葉花之廢久矣此佛與聖賢之微旨也郡侯徐見可以常道治民又推宣尼歡喜讚嘆之意莊嚴佛廬善巧導世王政所不廢也林君懋化吳人也郡侯嘉其賢托以兹殿堅緻完好若鬼工焉其人雅士樂其竒而悼其廢非區區為福田者也蘇潛夫别有文悉其事余故不贅虎耳巖不二和尚碑記袁宏道余童年熟不二師名以為古尊宿也既而閲元美伯玉二先生集往往道之始知為近代禪伯然二先生亦以夏臘髙嚴事之度其時皆壯盛二先生既悠遊以老去奄忽若干嵗白楊可棟而師白鬖鬖如舊時逆其生當在宣成間也諸侯屬試以臘叩不答嘗檢其篋得舊􅖯衣忽云此武皇帝七年王城中施食所得衣也扣之復不答或云師名圓信京兆之房山人剃髮白雲山禮大僧德敬為師往來上方紅螺之間二十餘年行腳所至為武林淮安六安終南每住輒數載以嘉靖庚申至太嶽駐錫虎耳巖穴而哮者爭避匿去師倚石為屋稍稍剪夷其積圜瓢數十餘踞石沿澗出入幽花美箭之中者纍纍如笠巖上蓮池二闊可二丈旱嵗不竭蓬室三方廣當身所得一縷一粲盡以供十方遊衲行之數年遂成叢林傾震旦士女號呼悲啼而至者不至虎耳巖猶未躋嶽也至巖不面頂禮者自以為慳緣必痛哭去否則謹伺巖扉外經數日得一見則喜過望歸而對妻子言猶有矜張之色以故虎耳巖之名遍天下好竒者至附益之以古神僧事家談户豔雖齠男稚女靡不道計賢士大夫之轍以日至尚方之賜掖庭之供以月至自嘉隆以來耆宿之著聞未有若師者也然師務為密行不以解顯應機之言多依孝敬撫摩煦煦猶乳母之於驕子金錢湧而至拒不納有贈糈者付常住作供四十餘年影不出山趺坐一龕中如朽株雖利根之士好為竒談詭學者睹其顔莫不肅然增敬余慕師久常以其耄恐不及待今年侍大人山行獲一拜師於巖間師貌甚腴額隆隆起至頂光滑可鑑短數莖如雪見人闔其目聞根甚利語清健望而知為有道會慈聖出內藏金為師治塔塔甫成而金至師之孫真慧等以記屬余世系年甲既不能詳不敢妄載庚申以後詳之抑其大者至若遊人之所傳好事之所述俟他時入山實而志之今未暇也明文海卷三百七十三
