body:
  text: 明文海巻三百七十五餘姚黄宗羲編記四十九題名安福縣儒學貢舉題名記胡儼士有一鄉之士有郡邑之士有天下之士自一鄉之選而登于郡邑自郡邑之選而升之朝廷所見者益廣所聞者益博所與游者益衆于是乎薫陶變化措諸事業其所造就益逺大而髙明矣推原其本則有自也葢自鄉而論之戴髪函齒之徒不知其幾千百其中之為士者僅數人焉自郡邑而論之其為人不知其幾千萬得為士而列於學官者不過數十人而已以郡邑之數十人三年而後擇其尤者貢于㑹府角其藝于風簷寸晷之下較髙下得失於有司而得與名於其間者又千百中之數十人焉以千百中之數十人是又㧞其尤者而貢之朝廷合天下之材者能者各以其藝又相與角焉而得與名于其選者則又千萬中之百十人焉由此而言士之登名于科舉者不亦難乎大江之西天下號稱文物之邦每當大比吉士居多而安福實吉之屬邑也歴科以來有其人焉而學校之䇿名者則始自彭汝舟也自汝舟至於今凡幾科而膺貢舉之士凡若干人顯融于時歴揚中外表表偉偉皆為聞人永樂初元儼備員禁侍與讀進士巻若彭汝器者文行清古余甚重之今詢知乃汝舟之弟茍無君子斯焉取斯信乎安福之多賢而彭氏可謂繼美矣雖然儒者之事豈科舉而已乎哉居廣居而行大道致逺大而極髙明利澤加於時聲名昭于後豈非儒者之事乎余葢有厚望焉是為記江都縣學科貢題名記李東陽江都於揚為屬邑舊文獻地也自國朝洪武初建學置師設科舉嵗貢之法茅拔而進者時不乏人山陰董君豫來宰是邑政事之暇考賢書稽宦牒得科貢之士若干人曰此而弗識無以示後學乃彚次其名刻石學宫之庭石既成則馳書京師請予記夫名有貴賤有賢不肖貴與賤為虚稱賢與不肖為定論故君子不以窮達得失為計而疾不稱不畏無聞殆以是耳葢自公卿大夫以及士農工賈皆有名其始𨽻於版籍甚微也升於庠陟於國學其名始有以别於人人及舉于鄉選于禮部皆録名于梓以傳進士其最著者故録其家世邑里加詳又題名刻石樹之國學皆令典所不可闕者而其名籍所在若府州縣者又私與題其名于學宫則國學之遺意有司者之事也夫使士之名于此者大足以傳天下而小足以傳之一鄉不亦榮甚矣乎及其名載宦籍功施而事見司銓覈者嵗考秩計執公論者從旁而議之某亷某穢某勤某情皆判不可揜而凡官職之小大不與焉殁而傳於史册或有奸宄貪濁者人得指其名而斥之其或免乎是而庸庸碌碌冺没而無聞者又不知其幾也其忠孝貞潔卓然稱為名臣銘鼎彛書竹帛歴萬世而不朽者於是始得為真名而所謂崇卑貴賤皆冺焉不復論矣然則為士者其可以自恃乎哉江都之士由科貢而陞者或居侍從或居風憲以至于州縣學校之官其以政績著者葢多矣今考諸鼎彛史册之間亦嘗有其人乎後進之士仰遺風慕餘光志感行勵必有勃然於此者亦今日之名啟之也若羨榮慕貴徇虚稱而忘實用則兹名也適足以為訾議之資石惡足恃哉董君以進士出宰有政譽尤注意學校此其餘緒也六合縣科第題名碑記莊㫤應天府之屬邑七其五邑皆江南而吾江浦暨六合者則獨于江之北也人才之多往往稱五邑而吾江浦自有國迄于今登進士者才七人鄉貢士亦不過三四十人六合亦然抑何少也世常以扶輿清淑之氣鍾而為人故靈而吾兩邑者山窮而地僻故其人多鹵裂而不知學科第則視他邑為獨後嗟乎此果謂之何哉國家三年一大比一省則合諸郡之人才其多不下數千人而得與其名者百人而已禮部合天下之人才其多不下數千人而得與其選者不過二三百人而已斵石以求玉而疵瑕莫掩而必盡其良士之得由是而出者亦難矣又吾兩邑之大小其視江南之五邑曽不二十之一二夫科目之嚴又如此而吾之兩邑者又如此故雖家置一庠序而人人為儒服亦不能以相及矣以吾兩邑之人之少為不知學而以其地者或非也雖然人亦何病於少哉大路繁纓一就次路繁纓七就珪璋特琥璜爵者此以少為貴也是故舜有臣五人而天下治武王曰予有亂臣十人五人十人少矣天下後世凡稱堯舜文武之治則莫有能及之者不貴于多也魯哀公以儒號于中國無此道而為此服者其罪死於是無敢儒服獨一丈夫立於公門問以國事千轉萬變而不窮是魯一儒耳世稱魯為禮義之國一儒何少于魯哉由是觀之人才不惟其多惟其人而天下無不治已不如是雖多亦何以哉是則凡為吾兩邑之人者其少也不足憂惟其不能如所謂十人五人如所謂魯一儒者斯可憂也六合科第題名碑闕侍御陳公士賢來督南畿學政乃命縣尹張公恒次第其名氏于碑而求予記予未有以應明年陽信唐君詔者繼厥尹事而復以是請予江浦進士七人之一者遂書吾兩邑之人所以少者如此且以勵吾同志母使天下後世之人得以少吾兩邑之人甘肅都察院題名記王鴻儒甘肅在中原之西數千里當玉門陽關之内漢史稱為故匈奴毘邪王休屠王地予考之於書殊不其然昔唐虞都冀即今平陽帝都四距各五千里所為弼成五服至於五千是也書亦曰黒水西河惟雍州燉煌在甘肅為極逺郡後漢志註謂燉煌去洛陽五千里則去平陽乂不克此數矣且黒水又在其地昔商道既衰棄稷不務不窋處豳邰之壤而猶曰自竄于戎翟之間周末小雅盡廢四裔交侵畿甸之中尚有戎落况甘肅之逺乎由是觀之甘肅在三代之前固中國諸侯封畛也其疆域如此初武帝徙民或以關東下貧或以報怨過當或以悖逆無道後皆為衣冠大族名臣良將䇿畫之士藝能之人累出其地其人才如此酒禮之㑹上下相通賦政寛厚吏民親服風雨時節米穀常賤盜賊稀少和氣之應賢于内郡其風俗如此地廣民稀水草宜蒭牧其畜為天下饒其土産如此王莽未關東兵起竇融獨以河西殷富帶河為固屬國精兵萬騎一旦緩急杜絶河津足以自守其險固如此由是數者而觀之夫豈可以荒漠其地而鄙夷其人哉太祖髙皇帝既定中原之五年命宋國公馮勝拓地西陲而甘肅始入職方氏自是而後率以宿將鎮守其地後復以文臣與中貴凡整軍經武實共叅協其所以南輯羌戎北禦䝉古西扞西域諸國者無復遺算自是關中無事而海内晏然矣正徳戊辰内鄉胡公由山西右布政使進拜都察院右副都御史奉勅出殿兹土公至鎮與元戎勅使協規一心蒐軍實繕卒乗積芻粟完亭障謹斥堠校功簡士號令精明暇日因稽按故牘求嘗巡撫于兹者礱石題名置於公署用存故實逺遣使幣而命予記之竊聞自宋司馬温公著諫院題名記而有忠詐直回可懼之説天下之論莫能昜之予嘗以為中人之資可導而上下者以是懼之可也題名之意疑不止此昔趙文子枚數晉之名卿而獨取士㑹謝混歴評族從子弟而深與𢎞微君子尚友千古之士而論其世必有所從違以為處應事之則而况居邊陲之雄鎮當國家之隆委而前人之政或寛或猛或繁或簡年嵗雖遙事端相接其在故府可以覆視勒其名于石公事有間召老校退卒指其名而問其事事㑹之來資之以應卒不亦善乎比之徒懼之以忠詐直回之跡而不示之以主善得師之方者亦若有間矣公之意或兼出於此乎予昔與公同硯席每見公屬綴如流及公之仕也鳴玉禁庭均逸外服者二十餘年益明習天下事今兹建節一方統制千里其機神算畧雖非愚淺所能測知然即此而求之亦可以得其梗槩矣傳曰作而不法後嗣何觀兹作法矣公行還朝此則當附凉州故事云進士題名記李元陽天下鹽運司多無學而河東有學天下學多立石題名而河東題名于壁南昌熊子天秀巡鹽河東之期年既已鞏禁垣鼎廟學瀕行而建題名碑走幣於栅以問記夫河東較利之地運學講義之府商賈逐末之流髦士務本之人故非義無以辨利非士無以形商故作士莫如敦實敦實莫如尚名進士者未仕者之所求以至者也已仕者之所由以行其志者也其名可不重乎故録字以尊名也録經以原名也録登科次第以實名也録地以稽名也録官以成名也録始仕及未仕者虚其下以俟名也録始正統丁夘本運學之復建也諸士子朝升而暮降左瞻而右顧前之車後之轍昔之形今之影寜無怵惕于中乎曰斯人寛以戒狹曰斯人果以戒疑曰斯人剛以戒懦曰斯人亷以戒貪曰斯人忠信以戒偽曰斯人達以戒滯曰斯人髙以戒汚曰斯人謟病吾直曰斯人弱病吾立曰斯人暴病吾仁曰斯人險病吾心曰斯人誇病吾徳奉七戒袪五病于是考政于是善俗于是康國其科巍其名顯其熊子之志乎不然則彼進士者三年之間而四五百人當日即弗聞者多矣又奚貴耶柟聞之音者稷契題名於唐虞益臯龍逄題名于夏伊傅題名於商七君子晉産也名至今存並日月光故有題一世名者有題千萬世名者諸士子如欲題千萬世名以與七君子並則熊子固欲磨上黨之崖礱大行之石挽西河而模墨本於天下矣熊子名蘭柟姓呂吏部考功司題名記陳有年謂天下事名耶古卓詭之士霾名隠氏惟恐閟之不深而罣流世齒頰謂無事名耶後天開物之英降迨九官十六族具可考而名也夫名教之興尚矣榮名亘宇宙僇名不齒于塗之厲名哉名哉中古以來何其齗齗也陳有年曰不佞故嘗為司功云國家稽古建官錯事而衡名實不可勝辨一綜諸司功其布在功令若稱者不者貪者酷者罷若不謹者躁浮者才不及者老疾不任者襍然而並程畫然而昈列較然擥若者之實而不得眩鑿鑿然被以若者之名而不得辭昭昭然若掲日月而行也彧彧然舉國之利器而以示人也此夫修混沌之術者所不韙也而盛王之所宰制者聖詰之所諦也志烈之所徇也好修者之所依而葆也齊智之所焄其教而勸應也天下得之則明失之則幽得之則理失之則亂百代不能昜也病者曰名教興使人䃣真宅而遁于名之肆以竒貨市為世妖祥嗟嗟其然哉請循其本本期于真不期遁如以真則名與實未始離也子病實乎如以遁方病其以名市也又安知其不以無名市也若惟無遁遁則吾苐按實而簡斥之奚逆病焉且國家令若日月中天然然而谷歟蔀歟矇之倀倀歟吾猶不敢知也利器非匵也砥者一之玩弗砥者二之頓弗受砥者三之吾亦不敢知者若之何塗斯世於長夜而示人以鉛也夫司功名實之官也曩不佞進受牘於庭而榮者榮僇者僇則為之竦然懼退食於宴所有題名焉論其世而榮者榮僇者僇則又為之竦然懼彼其榮若僇也人之麗名耶抑名麗人耶此其懼也牘若石交儆我耶抑自為儆耶嗟嗟天下小大之工亡慮數千萬人司功與居一焉後先而為司功亡慮數千百人不佞與居一焉吾與若皆遊于名教之内者也乆矣夫其遞相名也然而吾之名斯人也歟哉不如其自名也人之名吾也歟哉不如吾自名也此吾之所為懼也非為其相名也而為吾之自名也相名相遁吾有真吾者在人各以其真吾而後名之教不為天下病然則題名贅石乎曰人奚而鑑也盤奚而有銘也頻焉遇憬焉思戚戚焉若命也此以真謀者也題名倘亦有禆乎遁斯贅石矣不佞為郎之嵗㑹石盈無以待來兹乃謀員外郎劉希哲氏主事謝思敬氏趙夢白氏更伐石已而不佞遷繼者黃睿卿氏式成之成之日偕員外郎王子修氏主事陸梁彦氏劉元澤氏實來董記事不佞劣劣自承乏部中旋已旋復十八年而郎是司名實無所底胡空言為無已聊志吾懼而後之君子擇焉爾尚寳司題名記張治尚寳司掌寳璽牌符之事國初建符璽郎後改曰尚寳司秩正三品洪武元年乃置卿一人正五品少卿一人從五品司丞二人正六品其後大臣子弟以廕補丞者無常員列署左右掖之内其地至禁宻也寳璽之大者曰奉天之寳為唐宋傳璽惟祀天地用之凡詔若赦則用皇帝之寳立封及賜勞則用行寳詔親王大臣調兵則用信寳册上尊號則用尊親之寳勅諭親王則用親親之寳祀山川鬼神則用天子之寳封屬國及賜勞則用天子之行寳詔屬國調兵則用天子之信寳曰誥則用誥命之寳曰勅則用勅命之寳勅奬臣工則用廣運之寳勅諭來朝官員則用敬天勤民之寳凡寳之用必請命而後發焉天子饗祀郊廟若視學籍田勲衛扈從及公侯駙馬都督日衛錦衣當直則給金牌牌之制有龍者虎者麒麟者獅者雲者以其官為差皇城金吾禁夜五城夜巡則給令牌虎賁巡城則給錮符九門守衛則給銅牌錦衣校尉入直則給雙魚銅牌京官之朝叅者則給牙牌勲臣以勲字親臣以親字文臣以文字武臣以武字文武官之與倍祀郊廟及執事人亦給牙牌有圓花長花長素之别凡諸得給牌者有故則檢籍而納之親王之國及文武大臣出撫鎮則給符騐御史出巡察則給印事竣則納之稽出入之令而辨其數其事至重也每大朝㑹則二人以寳導駕先立侍殿中駕出幸則二人以騎從寳行其為侍從至親近國初類以文學儒臣領其職或兼秩焉尚書郎而下非有才名者不得調勲輔大臣子弟奉特㫖乃得補丞他流所弗與焉其選至慎也故事曹省皆有題名而符司缺焉嘉靖丁未分宜東樓嚴君以太常少卿領司事乃嵬諸故牘自洪武而下迄于今得若干人刻其姓名爵里立石于西長安之直廬以稽往而昭來也丐張子記之治曰寳者人君所以信其令于天下者也名者君子所以信其行於後世者也人君之于寳設官以守之者慎其令也然則君子之于名其賢不肖關于勸懲者至逺也顧可以弗思慎乎哉夫徳者所以慎名之具也是故人君有慎令而後天下無邪政是謂治法君子有慎名而後終身無邪行是謂治人以治人而守治法則身安而國家可長保也嗚呼豈獨尚寳然哉此東樓所為題名意也雁塔題名記許孚逺萬歴乙酉秋主上用言官議簡廷臣分往校天下士於是禮給諫田公疇司徒郎蕭公良譽來關中拔士米助等六十五人以獻葢自世廟以來斯典僅三舉不可謂非遭逢之盛也西安故唐都唐進士燕杏園罷則往曲江題名慈恩之雁塔以為勝後代效之士舉于鄉者如舉于朝必題名焉此一方故事所詳有其舉之莫敢廢之者也是秋田公蕭公竣事亟還朝米助等偕計上京請記不得既逾年矣則相率來言於不佞孚逺曰雁塔之名不可以自今廢二先生之意謂有先生在先生盍記諸不佞乃進諸士詔之曰若等母汲汲于題名夫名有顯晦所從來乆矣余自為兒童時知爾鄉先達有髙陵吕先生柟三原王先生恕及入仕版考當代人物則知有朝邑韓公邦竒三原馬公理富平楊公爵之數君子者徳業聞望所繇不盡同余皆夙知而慕之如景星慶雲不異若是者豈以題名得之耶余生長東海之濱固不識曲江雁塔在何處今至於此求曲江故蹟巳陻塞為民間耕牧之區獨雁塔頺然尚存其下殘碑斷碣不復可辨識唐進士題名于此者安在哉當時忠賢俊乂名炳史册不為無人然未嘗以科名為輕重明也自古關中神聖迭作不可枚舉萬世而下誦其名者等于神明不敢䙝視此又何以哉宋張横渠先生為一代大儒關洛之名遂亦並垂不朽譬諸華嶽在望而人推髙黄河自崑崙萬里而來而人推逺吾黨之士遐覽逖觀其可以審所趨向也已矣是故徳有大小名有逺近君子疾没世而名不稱惡徳之不修也名浮於徳則君子所不取況不足為名者耶雖然名之所在淑慝分焉士既名而傳之矣將使其他日鄉之人指而謂之曰某也賢某也愚某也忠某也佞某也亷某也貪公是公非毫不能遁則勸懲之義實有藉於斯毋謂雁塔之題名終為彌文而已也諸士悚然稽首曰敢不夙夜黽勉以求自淑乎其名遂為記巫山縣題名記李維楨不佞督學秦中門人張希尹甫髫而試為冠首待詔公車者乆之始筮仕蜀巫山凡六年蜀當征播之後物力耗詘希尹施舍已責匡乏困救灾患薄賦斂宥罪過時用民民既小康則為堅城櫓治坊庸浚井泉造輿梁敦秩紀繕署廨畫郊圻郵表畷險走集斧藻泮宫而督課其佳子弟六府三事靡不具舉已修邑乗曰古人舊令之政必以告新是代吾告也已曰十步之内必有芳草巫山百里巖邑也為令者東西南北之人不乏賢矣可使泯泯無聞耶裒明興以來諸令題其名勒之石而使請記石之上方記為題名而設不佞知希尹之雅意在名也第以名論君子疾没世而名不稱人有榮名若揭日月而行天没且不朽故名者士之所勤思馳騖而上之所藉為風勸者也三代而下惟恐人不好名今之從政者所以成名則有分矣有矯情刻意弔詭違道以殉之有廣交媚上曲體惠姦以取之有怙勢倚法迫勤吏民以報之撮徒成黨陳功述徳小有歌謠大有誦賦竹帛有書金石有考郡國有髙第公車有薦牘去而卧轍生而奉嘗上下相蒙真贗相淆習為故常恬不知怪要之可欺小人而不可罔君子可掩旦夕而不可逃將來齒其人而詈且詛讀其編而怒且嗔過其祠而笑且唾譬之齊豹之書盜也求名而名亡可不悲哉惟所為題名石者具姓氏里籍不書行事而賢知愚不肖乃在邑人方寸之心與三寸之舌三代直道而行是非誰其淆之搢紳先生能明之野史能記之長老通于事者或傳之不佞未暇逺舉嘗宦蜀見四明陳君令巫山亢直不阿義無茍取與上官方枘圓鑿卒坐左官律罷巫山人惋惜涕號通國如狂彼哉夫已氏某子甲者而名與陳君並列然而薫蕕異臭袞鉞殊口執匹夫匹婦而問焉淄澠蒼素無愚智皆知夫題名于是石者可以榮可以辱可以賀可以弔可以思可以懼也詩不云乎在此無惡在彼無斁庶幾夙夜以永終譽希尹勉旃人且求多于子先勞無倦増修其徳令名永世惟今日否則坐貽謗缺耳亦惟今日繼希尹而吏兹土者其不必愛此名耶不佞所不敢知若猶希尹之求名于實也寜無瞿然于不佞之言明文海巻三百七十五
