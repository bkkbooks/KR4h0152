body:
  text: 明文海卷三百七十六餘妣黃宗羲編記五十考古漢南北軍記王禕南北軍漢制也漢受明命撫方夏乃西顧卜宅作都長安城闕宫室光明神麗固足以備國制而昭皇威隆上都而觀萬國矣重惟天子之都宜有重兵所以壯根本而嚴衛翼者庶其在此蓋上天之象以羽林為天軍黃帝之聖以兵師為營衛王者規天法聖則爪牙之衛詎可缺諸髙皇帝以神武之資躬提三尺糾集義旅灑掃宇內天戈所麾蓬孛消釋五年馬上蝨鞮鍪而汗介胄縛嬰斬羽天下既混為一任罷之兵佚諸農畝巴渝北貉無勤逺人臥鼓包戈將與天下元元相安於無事矣然而強宗豪姓盤互關東而材官騎士散在郡國必虎符羽檄召而後來帝室皇居茍無武卒鋭士以衛翼之殆非所以防未然而窒不軌此南北軍之所為置也南軍所以衛宫城者也主之者衛尉其屬有南北宫二衛士左右而都侯南屯公軍蒼龍元􅐥北屯朱雀東明朔平八司馬凡衛士二千四百六十九人然衛尉主兵殿外而主兵殿門內則為光祿勳其屬有左右五官中郎將虎賁羽林郎左右監凡衛士三千四百六十一人北軍所以衛京城主之者中尉其屬有中壘越騎步兵長水射聲屯騎胡騎虎賁八屯校尉而騎不常置惟中壘射聲虎賁屯騎在城中餘屯則皆留城外總凡軍士三千五百三十六人而屯騎虎賁所領士數無所考大抵衛尉主南軍以衛宫城實居乎內中尉主北軍以衛京城實居乎外相為表裏其勢常相均然亦使之自相為制焉以史考之北軍在外而或兼乎南軍南軍在內而常重乎北軍何也國有大故則北軍亦環宫而屯故五校嘗入為宿衛之兵是北軍或兼乎南軍也吳漢之薨發北軍五校輕車介士以送葬而不易於發南軍是南軍常重乎北軍也豈其兼乎南軍者在外之兵多重乎北軍者在內之兵精故歟然古者內兵不外出以根本之當壯衛翼之當嚴也漢初猶存古意南北二軍未嘗出雖嘗出矣而其出未嘗逺髙帝十一年發中尉卒軍灞上文帝三年發中尉材官軍長安故曰雖出而未嘗逺也至於武帝始以衛尉擊南粵宣帝又以羽林佽飛諸兵擊諸羌厥後自明帝至順帝南軍逺出者二北軍逺出者六而髙帝建軍之本意於是廢矣竊嘗論之天下形勝惟地與兵漢都長安阻河山之險左殽右蜀太華涇渭表裏襟帶金城千里隱然天府之國矣而南北二軍負城環宫路佖而營列棋峙而星布平居無事則虎視耽耽四征不庭則如火烈烈戎心姦膽戰栗駭落孰敢弗率以干我天威可謂兵形地勢兩兼得之於以鎮安四方鞏固萬代永永無斁髙帝之貽燕於厥子孫者神謀聖略何其宏逺也是用著其建軍之本意以詔後世若乃官名之更革損益先後不同士卒之調遣增減始終有異已詳於簡牘者兹不復書唐兩省記王禕人君居至尊之位其職無他在乎任相而已若稽古昔黃帝命六相舜舉十六相而相之名始立湯之左右用伊虺周之左右用周召而相之員始定蓋相者所以寅亮帝載緝熙皇極佐天子而統大政者也人君非相焉是賴其孰相與共理天下乎唐有天下稽古建官置門下中書兩省以為左右相之所治而門下有侍中中書有令則所謂左右相也然而初無定名亦無常員或曰同中書門下平章政事則無定名也侍中及令其人不常置而尚書左右僕射亦宰相職則無常員也雖其定名常員先後不同而其佐天子以統大政者職任惟均其事權固無與比隆者矣惟門下有省昉於晉中書有省肇於魏齊嘗以門下為黃門隋或以中書為內省而唐自髙祖太宗之世門下中書或遵往制至髙宗龍朔元年始改門下為東臺中書為西臺武后光宅元年改門下為鸞臺中書為鳳閣元宗開元元年又改門下為黃門省中書為紫微省尋皆輒復舊蓋門下中書在宣政殿之東西而尚書在外謂之南省故門下中書總稱北省又别稱門下為左省為東省中書為右省為西省而復通謂之兩省焉是故門下為職所以取旨而出納乎帝命中書為職所以造命而黼黻乎皇猷至凡國之事實參而總之故下之通乎上者其制有六曰奏抄曰日奏彈曰露布曰議曰表曰狀門下皆審署申覆施行焉王言之制有七曰册書曰制書曰慰勞制書曰發敇曰敕旨曰論事敕書曰敕牒中書皆審署申覆而施行焉於是天子之布政任官詔旨命令之出首經兩省其或令焉而非其法任焉而非人門下取旨既隨時而駁正中書造命或因事而封繳彌綸潤飾使無缺失上下相而治本立矣兹其所以弼庶務而度百僚叶羣工而釐萬邦也歟抑嘗論之兩省之建固均為天子之相而事權所秉初不相同其於軍國之事雖參總之亦未嘗合而為一也按唐初故事政事堂在東省宰相議政之所在自中宗永淳二年裴炎以中書令執政事乃遷之於西省則兩省事權至是已合為一非復祖宗舊時之典章矣豈非其沿襲之弊哉今按兩省秩皆三品門下有侍中二人黃門侍郎二人給事中四人左散騎常侍二人諫議大夫四人典儀二人起居郎左補闕左拾遺各二人城門郎四人符寶郎四人𢎞文館校書一人中書有令二人侍郎二人舍人六人右散騎常侍起居舍人右補闕右拾遺各二入通事舍人十六人自餘兩省小吏各有差其詳則六典之書具焉謹著其略以為記鉶鼎記陸深海虞王君文潔喜文博古嘗獲一鼎其識曰維紹興丙寅三月己丑太師秦公檜一德協濟配兹乾坤乃作鉶鼎賜家廟以奉時祀子孫其永保是蓋宋髙宗之所賜而其相秦檜所從受者也文潔讀之愀然憐嶽武穆之寃忠而被禍而鄙其當時之君臣所為若是棄而勿顧者久之當正德辛未秋流賊入江南江南騷動文潔乂慨然思得若嶽武穆者之為將而恐又有若檜者隂賊險狼從中讒阻以害武穆之成功乃發憤即家山作萬松樓以祀武穆而以所得鼎奉焉既又範銅像檜跪於鼎足間若伏罪者以向武穆云是舉也可謂雄偉不羣者矣而文潔固奇士也哉按宋史載秦檜之殺武穆也在紹興辛酉之冬至丙寅之春乃作家廟遂有此賜五六年間和議已成忠賢盡擯固自以為百世之勳也觀鼎銘所稱以君而諛臣若此計一時頑鈍無恥之士道盛德於前誇成功於後者何限也抑孰知百世而下人心好惡之公不容泯滅雖聲色間亦有甚於鐘鼎刀鋸之所及者而况其他哉人可不自力於為善也豫嘗道西湖拜武穆墓下睹所謂南枝樹銀瓶井焉又一檜樹中剖而植其前固亦謂之秦檜也疑皆好事者所為又聞湯隂有武穆祠户外鑄鐡為檜拜焉凡一方疫癘者必禱禱者輒持笞箠踣擊鐵檜或十百千數皆如所祝輒得福事雖涉怪誕於此益以見人心之公而忠賢正氣流行於宇宙間鼓為風霆照為日星形為川嶽其英靈正氣真有不隨生死而殊古今而變者則兹樓也謂非武穆之神之所式憑以妥而以侑者耶而文潔固竒士也哉文潔名澄别號竹泉有子曰授攻進士業質美而勤嘗問學於豫者豫知其庭訓義方之貽遺安振宗之具激勸之微權皆類是余友姚君尚絅最能道之作鉶鼎記跋鉶鼎圖王同祖饗帝養親鼎之為用大矣而以賜宗臣銘功德元寶彛器傳世靡革焉帝王之盛節也宋髙宗範鉶鼎以賜其相奏檜且銘其功德之隆而祈其子孫之永保德云乎哉傾邪不忠矯殺武穆是已功云乎哉和議是已嗚呼高宗於是乎誣其臣矣檜之子孫卒不能保及今數百年乃為竹泉所得反以享武穆焉事安可逆料哉武穆英靈在天地間吾固知其不欲覩此鉶鼎也而竹泉是舉特以著髙宗之不明白武穆之精忠尸秦檜之罪惡微而顯懲惡勸善春秋之義也或曰武穆當時宜援君命不受之説俟恢復中原討君側之惡而請罪焉可也審如是檜得以藉手於國法形迹疑似之間何以自白是鼎將不得為仲山甫器哉而烏能享諸武穆觀欹器記蔣德璟右欹器在豫姻友傅君子訒家銅為之形如小鍾圓上鋭下口徑一寸八分髙三寸八分環口為旋波紋其下作虯形一角或曰一角當天祿額睛口耳眉髯悉具而角在鼻上其腰兩旁繫小銅耳曰欒各寸許平懸之中虛可受水三四合其背篆所光二字其簴方亦銅為之四足髙可二寸四分修五寸六分廣四寸內嵌空芝草形四周刻紋為旋波兩旁立小銅柱二髙五寸蟠以二龍然非龍也龍生九子以形求之疑當為蒲牢蚣􅫔博物志曰蚣􅫔似龍而小好險故立於橋柱蒲牢亦似龍好叫吼今鐘上鈕是也柱中二小窪即雙懸欹器處璟按家語孔子觀於魯桓公之廟有欹器焉曰此為宥坐之器而韓詩説苑及太平御覽皆以為周廟杜預曰周廟欹器至漢東京猶在御座家語注曰宥與右同言可置座右也説苑作右座之器或曰宥與侑同勸也淮南子作宥巵文子曰三皇五帝有勸戒之器名宥巵注欹器也禮宫伯以樂侑食鄭云勸食也詩以妥以侑左傳王享醴命之宥注云助也所以助勸敬之意通作侑右其義一也璟既與銓部林君為磐就子訒築巖樓觀之因試以水林君曰其下鋭而虯首斜出故虛則欹得水及腰則正滿則上盛宜其覆也故孔子曰明君以為至誡故常置於座側豫謂此自是物理至實理子路問持滿固佳然不若不滿之勝也夫子謂日中則移月盈則虧而詩以月恆日升祝其君以為至於中且盈而持之將有不勝持者易曰天下濟而光明地下卑而上行言謙也惟謙故能常恆常升堯疇咨舜禹有天下不與文王小心昭事皆純用謙卦湯日躋武敬勝蓋持滿也子訒曰古帝王生神聖然於几席盥鑑杖帶劍履之屬悉有銘戒至懸欹器自警矧吾黨乎交朂哉璟與為磐皆下拜請書紳焉子訒祖獻簡公堯俞為宋元祐名臣是器宣仁所賜迄今且七百年而能守之勿失可謂世孝其入泉自紹興中獻簡孫忠肅公察夫人趙氏攜以來簪笏相繼可謂世祿而忠肅家廟尚巋然如魯靈光所藏容老玉佩亦與欹器並存祖武孫謀逺乃益章可謂世德豫上下千古喬木之家如傅氏者殆不可多見也光疑元光恐是漢武帝紀年或擬周廟為之然扣之純作木聲其色澤特黝古要當為二千年物傅氏子孫尚世守之哉崇禎丙子八月書家語夫子論持滿曰聰明睿智守之以愚功被天下守之以讓勇力振世守之以怯富有四海守之以謙此損之又損之之道説苑引之則曰髙而能下滿而能虛富而能儉貴而能卑智而能愚勇而能怯辨而能訥博而能淺明而能暗是謂損而不極能行此道惟至德者及之其指尤備豫友林君為磐用説苑欹器語與金人銘並書座右可謂善學聖人者因各酌酒器中而曰捧欹器之物珍於禹鼎湯盤酌欹器之酒嚴於賓筵妹誥遂各圖其形歸而置之以時省觀焉德璟載識石鼓小記蔣德璟癸酉二月五日丁卯當祭文廟前一日百官例當贍拜豫約鴻寶過鵬洲宅同行鵬洲出倉庚圖戲示且下榻小酌豫謂不如攜之滿井因以小肩輿循皇牆而北過西海子春雪初消漫泓漾塵土為淨海子舊名積水潭聚西北諸泉流入都城而滙於此從皇城後入西海出玉河橋與通州合頃之抵國子監成賢街易吉服並馬入至廟門下馬監生六人迎入廟階下四拜因往戟門內觀石鼓左右各五其石髙可二尺五寸圓徑二尺許形如鼓而頂微圓四面籀文世傳為周宣文獵碣初在陳倉野中唐鄭餘慶遷置鳯翔縣學孔子廟而亡其二宋皇祐間向傳師求得之十鼓乃足然其一頂窪類臼矣大觀中徙開封置辟雍靖康末金人輦歸燕置大興府文廟元皇慶初移置今所本朝因之第榻者甚多久之恐遂并無字似可庋之髙閣也記壬戌春豫初釋褐至廟遇同年文湛持云此鼓非周宣王物直後北周宣帝耳豫曰後周才子無如庾信駢偶之文豈有此風雅且籒文甚古決非三代以下所辦適門人方博士廣德延西廂小坐則館丈綱存司業具三席為午飯綱存以陪中堂徐公玄滬演禮故令方門人來因酌數巡而别觀貝葉經記趙統寓能仁寺日求觀其畨藏貝葉經又有樺皮經云國初時胡僧自天竺持來後又有遺僧自西域取來者其葉似今日乾葦葉青白色質似乾棕櫚葉而更韌綿濶可寸半許長僅踰尺每葉皆橫用兩面書字以左上為始字乃順搆行則橫讀搆者密比行則相離豆許每由左讀既復由次左始如此五六行離而五為六層能布盡其葉一面即從左右反之復布文其背如前法盡則繼以他葉每葉先以物齊兩端俟畢其經一卷則盡編次其葉中開廣分長二分許孔貫以可孔編帶尺許即以帶反束之其經皆梵字又二體謂楷者甚嚴整頭類多方平而下腳偏長於右每行始末處皆用順畫二墨如字長細亦如其字所以起止其文如吾書册邊格然今佛宇鐘磬及人家器具服裝多為梵字真言其謂之草書者亦甚流動間類小篆遒徑飛揚甚可愛其始末處無順畫二墨云其字有四十二母如今韻書字母云其墨色甚光艷問其筆云以鐵為小匾管而濡墨其中然未見也其樺皮經者書法皆如貝葉制皮約長四五寸闊少弱積厚四五寸方成一册蓋其經之全部云其皮編釘為册亦如吾書册法以黑革為殼隱隱起花雲象其樺與中國無異但稍綿細耳間有浥處墨光不渝也又有國朝內經厰謄者用沃金紙為地金泥為墨長不尺許寬可三寸餘亦兩面書梵字筆法逺不如貝樺也每若干張為一夾用雕花板夾之束以五綵絨帶云自南都作成每帶價可當三千錢時錢幣當白金一兩弱耳每經盛之創金硃函寺僧皆中國人為之者號曰喇嘛胡名胡服服亦如僧衣但色用紅黃及用紅黃為領緣又領下直達於裾其末前為一斷續之四五寸微闕其外如爪環下直號為金剛腳者異耳問之胡語梵字多不解也問始來此者胡僧名皆梵語疊五六言為一名曰班迪達者其開山祖師也再問之以天竺地理物宜皆不能知但云其地多竹藤以為籬落居亦多草屋且少五榖但生青顆如今牟狀炒以為麵熬牛羊乳而食之其俗皆僧王亦祝髮僧衣精於其道者跣足裸股衣之襌裾不治他事治事者謂之俗僧又云中國遣僧往率至泥爾巴瑪克國而止去佛生西土尚逺云明文海卷三百七十六
