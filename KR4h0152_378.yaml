body:
  text: 明文海卷三百七十八餘姚黃宗羲編記五十二清玩三世雷記烏斯道三世雷者名琴也唐渝州雷震所製後震之子某嘗修之孫某再修側視腹中其識具存得之者以一器而出雷氏三世異之因以名焉以小篆刻諸底或謂震之製琴始於祖至震為三世也質雖桐梓尾則海藤其膝玄玉其斷紋蛇腹其製宣尼修不及五尺而聲若金石清越悠逺吾郡清客袁公當元之延祐間仕京師見是琴於故宗室趙氏不可得趙氏性好馬一日有顯官贈良馬於公公得而遺諸趙氏趙氏意殊喜自謂無以為報雖有雷氏琴實吾之先受賜於內府者不忍棄將返馬焉吾乂愛之以是依違者再三終以是琴報公公傳於家至孫日嚴以重價歸史君禮氏至正末天台方丞相入城嘗聽人鼓琴悅之因命左右物色琴之佳者左右以是琴稱遂以勢而得焉余友錢塘徐君梅澗以琴者數鼓琴丞相前退而大譽是琴余方以不獲見為歉今天子肇造區宇詔中山侯下明之郡縣丞相欵附入朝以是琴與倪參政晉齋余時主晉齋因得以寄意徽軫間中山侯將稅晉齋家晉齋挾愛物避處他室中山侯入閩晉齋返視愛物咸具惟是琴蔑之有也漫不省何若越半歲丞相之子名關者自京師來明云吾道經毗陵有一軍士抱琴來售晉齋始記是琴昔以愛之篤庋臥榻上忘焉必為中山侯麾下士先入臥內灑掃持而閟之每道及未嘗不歔欷悒怏歲辛亥秋余被貢之京師聞溪坊沈仲芳蓄琴及訪視之即是琴也撫弄慨歎而别余宰化之石龍甲寅冬余以核田事赴廣省聞城中一士有古琴最佳即偕往求視其士乃舊所見仲芳又出是琴無恙蓋仲以獲戾徒廣中凡器物皆棄去獨與是琴俱故也余撫弄慨歎如初己卯夏余以考滿當入覲先至廣省乞文時仲芳聞余至豫伺之水驛亭上見而欣然謂曰吾三世雷願與子歸明余驚念曰此非吾所能致也意謂戲言往返數過仲芳屢以為言不易果以見贈加水精絃白玉軫足上下括以古錦囊二余喜愛之而不辭重以白金答貺保抱攜持水陸行數千里至京師不損毫髮長子熙來候迎相慰藉余調吉之永新熙東歸余委琴於熙而命之曰今天下故物悉殄滅於兵燹中若是琴豈易購哉且屢見屢違終購之於絶域以歸豈非幸歟吾與汝又素好鼓琴汝寶之勿失庚申夏獲歸田里而是琴遷處浮屠氏保定師之室越三載癸亥謀復之未克又為好古者售入河洛惜哉噫數歟抑異物不永於一人也然是琴之得失可怪也有不可忘也特記之三物記陳繼余居室有三物可記因記之記之在物而意不在物也三物書藏葦牖木榻焉斫木為器其崇寸四十有六深殺崇之二十廣益深之半為十匭其中而出入之豫從行書三四百卷從類納匭中藏之置於席傍寂然也悉出而易貯之則它器皆滿紛紛有所不受余因感之用一器而數器之用兼之器有小大故也嗚呼奚止於器哉人亦如是而已矣距某橋東餘一里居室鱗次余室次其中臨大道道無甃甓一雨泥澱盈尺㶁㶁之聲接車馬達夜不息環室無虛牖鑿西南為之障以葦箔豫適病臥雨牖下而覩行道者富貴貧賤百出勢態倐然過之影響隨滅而若百年瞬息其矯情亂志僥幸得其所欲而無顧忌與憧憧營營殖貨利而不知止者其為何哉其為何哉木榻余與其不相違者觀書於兹食飲於兹接賓客於兹寢息又於兹也其設近依牖牖之外人之聲鼓樂之聲車馬之聲雜然而相喧者不間晨夕耳目能不為其誘之耶雖然君子毋不敬敬則心一一則自無非辟之干矣大盆石記楊守陳鏡川叟居京師客或以方盆盛巨石遺之盆髙二尺賸廣僅盈三尺石之高倍於盆廣如盆稍歉焉置之存養室之庭以石陷於盆不甚顯也乃積土盈盆樹石於盆土上石始顯而庭中羣石衆芳盡出其下既又實膏土於其腹以為原加奇石於其頂以為三峰於是乎植之嘉卉被之秀蔓煙冒之而嵐生水注之而瀑出宛然一小山也叟日玩之不厭焉然是石也庸陋堅朴粗厲亷稜徒以其高厚碩大而有隆類岡有峻類崖有窊類澗有突類豈有呀類洞有􅛦類谷故可飾之為山耳非若他石之狀樓閣形虎鳳備青黃黼黻之章具湖山雪月之景怪奇妍麗而可悅者計古今天下萬山中石猶河沙市塵然若此其粗陋則草翳苔蝕蛇豸之與羣熊鼠之為伍居者弗睨過者弗顧其誰取之如彼其奇麗亦或伏於幽遐祕於深渺有愛之而莫能取其見取也則必走豪宅歸勢家混塵坌邇囂譁凡砧几之餘腥脂粉之殘膩舉得而汙之甚或啓爭端藏禍機若文饒之醒酒遺災於監軍東坡之仇池賈惡於貴戚又甚則若慶雲萬態奇峰與太平獨秀神巖歷國如傳舍凡若是者叟焉得有之而兹石也幸為人之所取不為人之所爭入乎氷清之門處乎玉潔之庭漸翰墨之膏潤染蘭蕙之芳馨卓立永奠真將超萬物而閲千齡此豈非其遭歟雖然吾於兹石亦比德夫堅朴亷稜髙厚碩大皆君子之德而隆峻窊突各有所類德之備也實土加石漸膏染芳德之峻也植卉被蔓德之發而及物也卓立永奠德之恆也其視夫怪奇以駭俗妍麗以媚人者不亦逺哉孔子曰聖人吾不得而見之矣得見君子者斯可矣兹石亦君子也故為之記菊花記史明古余友汝其通嘗言其鄰顧氏蓻菊之盛約余往觀焉然各縻所役屢訂而屢廢也成化二十有三年十月乙亥始克往踐之顧氏喜客至以酒觴客俄而其通之厨饌繼至相與對花樂飲而酬之以詩主人曰今兹多雨且風為花病俟花無恙時君能再觀而記之否乎余曰諾後閲月以卷軸至𢎞治元年九月余家燬於火不及往且并其卷亡去顧氏不以為憾乂從而繼之明年己卯秋其通舉於鄉將與計偕粵十月戊子余從賓客之後往與之别而顧氏菊方盛開因得以飫觀而遍識焉有花大瓣密而色黃者深曰赤金盤淺曰佛面金有花小瓣密而色黃者深曰黃木香毬淺曰白木香毬此花同而色有淺深之異其名有不同焉有色如荔枝而花敷者曰荔枝紅花鬈者曰荔枝毬此色同而花異其名不同焉有花瓣如爪甲而微黃色者曰黃金瓣瑩白者曰白玉盤有花圓瓣密而深黃色者曰金毬瑩白者曰玉毬有心紅而花黃者曰黃鶴頂白者曰白鶴頂正白色者白鶴翎此花同而色異其名之乂不同焉有花大無心而色黃鎣者曰御袍黃有花小而色深黃者曰黃羅繖有花小瓣密而色微黃者曰西畨蓮有花大而色嬌黃者曰鶯羽黃有花小而色鎣黃者曰內家金有花大而色渾紅黃者曰黃玉蓮有花大而無心正白者曰清心蓮有花小而色初紅後白者曰玉繡毬有花小而色皎白者曰賽月明有花瓣密而色鮮紅者曰狀元紅此花之與色俱異其名益不同焉然其間有以形言有以蘂言有以香言有以色言有以風神言有以標格言有以韻度言或兼之以述其全或離之以舉其盛其亦善於取譬也夫最黃之色十有八白之色十有一紅之色十有二紫之色七亦可謂多且佳矣然顧氏猶以為未足父子恆皇皇焉以求而不得為恨其用志不亦專乎且求觀之賓日盈其門不厭有章逢之士輒花贈之無吝色其取之以貨者能拒而不受以為常則其為人又豈特蓻夫菊也哉昔人推洛陽牡丹廣陵芍藥甲於天下咸以為由土之宜今二郡之花無幾在而菊則隨人致力不擇地而盛然則在人而不在土也明矣因記其所寓目者如右且為更定其名之不雅馴者俟其後有得當續為之記余又聞吏於蜀之威州者言嘗以事至松潘松潘之地甚寒盛夏雨雪諸花皆遲惟菊先花於內地者十日於是乎益信其傲風霜秀搖落耐荒寒有非百卉之所幾也因并記之瓦頭硯記金幼孜豫嘗考漢未央宫諸殿瓦其身如半筒而覆簷者其頭有面外向其面徑五寸圍一尺六寸強有篆字凡六等曰漢并天下曰長樂未央曰儲胥未央曰長生無極曰萬壽無疆曰永壽無疆面至背厚一寸弱後人以其背平可為硯遂去其半筒因呼為瓦頭硯宣德三年戊申秋八月豫奉使慶邸王以此瓦相遺其篆文曰長樂未央察其規制厚薄皆同但質形稍粗耳嗚呼此瓦自今已千六百餘年矣追想當時金玉珍奇之物可寶玩者何限然皆澌盡無遺獨此尚留人間往往為士大夫所愛重豈非所謂鈍者壽之驗歟因書此以識歲月且以發豫之一慨也枯柯記邱雲霄藤江之曲樵有得枯柯於澗谷之間者鬱沒淤泥砥蕩乎沙礫剝其皮膚變其色相腐敗其體其竅之不實者丫嵌崛獨存其不可變者數尺許樵歸之將就薪焉其氣芬芬幽幽達諸其鄰樵異出之息其熖明日持以適市有負販者遭之塗過而睨之去而復顧嗅以辨其氣爪其膚理以驗其質乃直百錢樵欣欣焉歸以語其婦曰吾一舉手之勞取重負之直自相慶以為奇獲也負販者持以適城郭有巨賈遭之途過而睨之去而復顧嗅以辨其氣爪其膚理以驗其質乃直一金負販者欣欣焉歸以語其婦曰吾一遊矚而取兼日之貿自相慶以為奇獲也巨賈人持滌清波之上脫其膚之所蒙剔其齒齒間之齧而汚者重楮以藉之持入京師於是聖天子方精意以有事於上下神祗凡大臣內侍祗承上之德意廣求異香以享神明有達官貴人遭巨賈所持於塗反覆熟視出直金四鎰巨賈人弗之與復益之鎰取獻於天子天子悅以享神明神明居歆焉巨賈人姓王氏吳中人走粵好商外國物故能辨物庚戌春來梧述以相語丘子感而嘆曰材有生於深林隱谷之間負奇姿異氣如枯柯者不知其幾也其飽日月戰風霆凌霜露歷年所而後藴其貝馥而卒委之沙礫淤泥之賤以就腐焉又不知其幾也間一獲樵氏之遭而竟需於槱薪者又不知其幾也雖求登瓦爐石鼎之爇且不可得况望巨賈人之遇乎况望達官貴人之遇乎况望悅天子以歆神明乎然竊怪造物者篤生之不能使之遇焉則謂造物者之不能主物也亦宜今聖天子精意以求享於神明至誠弗衰深林隱谷之間産異材如枯柯者既又不少也而卒鮮應焉甚矣辨枯柯之難也吉安堂硯記靳學顏吉安端硯其傳不知何始厥面中窪而黝深若盂可盛二合旁缺蝕如蠧如朽株乃其底則顧澤然光凝然脂也是亦岱溜追蠡漸摩使然與或曰石性堅端於石又堅非數十百年不至於是夫硯數十百年閲太守若干人摧穎發墨乂不知幾萬千也而漸靡於水吾於是識剛柔之用焉吾觀斯硯其不穿者蓋十五之一夫其不擇不辭不吞不吐以至斯也於是審弛張之機焉爰命藏人礱而收之用告來哲且重系曰嗚呼斯硯閲太守若干人方其視事揮毫得之於心而應之於手也公私邪正有太守不暇謀而硯知之者閲歷之間其公私邪正有文獻不及載而硯識之者是可畏也夫故記補燭記王雲鳳𢎞治柔兆執徐八月哉生魄余直夜祠部吏人進燭瞑目而坐頃之瀝瀝有聲乃睇焉則燭之膚內溶而逆案有故箋列而防之以為奇䇿復瞑目坐鐸巡者報一鼓開目視則炙箋離披汁四潰出循膚而下懸者纍纍如畫猿子母手接探澗果狀墮几而矗者若怪石枯松層樓鋭塔奇者若戲兒伏犬最奇者若老翁負子未角之犢奔而返顧蟻蜂蛄蚓攀緣而上上泛濫如河江點綴如珠玉者不數而其勢潸然未已也余曰息熖可免乎吏請以末鹽補其缺徐以其餘為之垣燭燼不復壞也嗟乎燭以堅為體以明為用以不壞為材吾之燭豈固不良於他燭耶內有所熾不能自制而外無徑臣強藩相與周旋保持之吾且閉目焉故箋之防適以為病吾且以為竒䇿焉向非吏之請其不為棄物也哉余於是有感焉治安之國光大之朝或登一匪人行一戾政則衆嘵嘵然訴嘖嘖然議矣及乎人之黨既繁而政之積弊益甚耳目習慣以為常非惟不形之言亦復不介於心而風俗始變國家始衰矣庸劣之君冥弗之覺方且以故箋治之者世豈少哉漢而唐而宋千載一轍吁其可慨夫鹽之價非貴也吏之言賤也而可使吾燭為良燭然則興治之䇿極弊之才世未嘗乏顧人不知用之耳載籍稱揚側陋詢芻蕘又曰為政在人余於是乎重有感菊記孫應鰲嘉靖丁已余提刑江西按察僉事是時天台王敬所子為督學使每秋之季月嘗折簡相期余過廨舍看所種菊自署萬菊主人所種菊率多陶埴器若盂甗形者菊甚茂蔚花繁甚每相期過未嘗不賦詩投壺竭情歡洽然後别居無何余遷參議仍江西敬所子亦來為布政使余亦因政事暇以陶埴器學種菊率多稿即不稿亦不茂蔚且不花余因以質敬所子乃敬所子曰物莫不生於土菊者尤草卉類之秉土為性也余雖種諸陶埴器然置諸土上器內貯土滿不用底其氣通子以置諸石除土性既隔氣因閼塞矣余於是私識之無何余載遷陜西督學使既至陜亦因暇載學種菊如敬所子之言菊於是果茂蔚花繁甚語曰熟者之智暗者之決詎不信耶自余載學種菊欲盡其方於是考譜牒遍詢善蓻者當春苗時剔根析莖掇去其顛數日則岐出兩枝乂掇之每掇益岐至秋則一幹數花婆娑如小蓋其糞灌宜活水宜鳥獸之燖水宜衣垢水皆可肥糞灌不宜數宜兩壺庶水散而徐宜就日不宜熯乾宜常潤不宜佩麝慮蟲嚙苞穎宜勤視凡是數者皆敬所子之未余告然敬所子謂毋失土性以閼塞其氣則固括是數者何必盡告於余自余遷官陜西敬所子為文寵行大要稱陜本西京流風經術詞賦素稱雄謬指余亦以經術詞賦譽於時謂士不通性命則經術為口耳詞賦為俳優欲余進士子於性命此其旨與種菊者毋失土性以閼塞其氣何異惜進士子於性命之詳未余告然以余欲盡種菊之方例之茍知欲毋失其性恐閼塞其氣則凡欲以順時行教隨質異裁約禁其淫忒放踰使昏蔽撤去各得所以為心自是循法踐矩習耳目手足之則於不識不知由之誦説諷咏得返於性情樹辭摛文能攄乎理趣俾碩大光偉之業此焉基之斯曹劌所謂茍中心以圖知雖不及將必至焉庸詎兩有軌躅哉惜敬所子今逺隔數千里莫相對為歡證前説當否把菊懷人為之憮然淮海孫應鼇記時壬戌秋之季月柱石塢記陸深儼山西偏澄懷閣之下小滄浪之上復以暇日周施闌檻用備臨觀徙倚之適有川石者三髙可丈許並類削成有奇觀焉因錯樹之為三峰中峰蒼潤如玉彈窩圓瑩豐上而鋭下藉以盆石有端人正士之象却而望之擎空干雲邈焉寡羣豈八柱之遺非耶題曰錦柱傍甃兩臺其左曰龍鱗石蒼碧相暈比次成文儼然鱗甲之狀森聳而欲化也其右石首微而婀娜拱揖有掀舞之意名曰舞花虬合而命之曰柱石塢曲徑其下以通往來每當朝日始升夕陽初下曵杖徘徊聊以寄吾孤岸之氣時時賦王右丞五言短篇或歌陶彭澤歸來詞一兩解俯檻觀遊魚為之一笑意甚樂也客有過者相攜而共樂焉疑之者進曰古之君子間居而寡求今之君子退藏而喜事是塢也奚取焉儼山人復為之一笑徐應之曰夫生有定理物有定分各還其分以歸之理古之道也兹數石者遺棄荒林野草之間蛇虺之所蟠牛羊之所礪樵夫牧豎之所踐踏石固無悔也而理有不當然者一旦起而拂拭之立者為峯臥者為岫歆者突者為巗竇圓者中規曲者中矩抗者若介俯者若委參而列之者若同志孤者無黨正者不倚各還於理斯固其分也而石亦何加損哉乃若君子之取諸物也近而逺粗而精一以貫之獨非古也乎且豫之理是也役數夫之力假旦夕之工髙卑以陳動靜以位清濁以判治忽以區夷險以奠不曰儉操而博取乎吾子殆求之形迹之際末矣客起曰槩於理遂書為記雪山氷井記吳國倫往歲友人以白磁缸一口見遺體圓而資極瑩徹髙尺許徑一尺有半中可貯水五十升漢人謂玉晶盤與氷同潔兹庶幾焉驗之蓋正德間器也未幾客有載一白石山來求售者大不盈尺髙倍之客不自知其名豫曰此玉華石也出將樂洞雖工人稍斫其初而天造奇形故在巉巖礧砢光片片可鏡其隂則斗削壁立上下兩空洞有含煙出雲之形即小山賦不盡其奇矣因以布十匹易之客大溢所望而去頃豫抱病溽暑喘息如焚思欲登雪山而浴氷井不可得因取王華石置左名之曰雪山白磁缸置右而實以清泉名之曰氷井乃布竹榻其間朝夕養疴偃仰坐卧焉遂覺暑氣漸微涼意漸洽泠泠然爽致宜人間起而摩挲之則倐然山欲雪井欲氷也已而自笑曰炎方六月何自有氷雪哉夫霄壤之間凡可強而名者借也而吾以其不可名者寄焉亦借也豈惟拳石勺水為然仰積氣而為天俯積塊而為地皆強而名之也託之乎象其形也天地且爾又何一物非借乎乃豫之左雪山而右氷井也亦象其形而借其意耳漢書云清室則中夏含霜夫室可霜也安見山不可雪而井不可氷乎客有聞豫言而歎者曰信如子言不知真之為借借之為真矣客真知言乎哉醉石齋記馮夢禎昔蘇長公以怪石充供餉佛印參寥則文石之濫觴也余觀前後怪石供其文甚矣然所稱怪石者則以餅餌易之齊安小兒當時良不之貴而石之可怪僅僅多紅黃白色其文如指上螺而止似亦非石品之上今六合山中所産絶奇好事者競出金錢購之而貧者日奔走以自給余至南都則聞程别駕克全所貯不資請觀焉而克全欣然出其所有示余曰喜則取之不可則返無傷也余以故得盡其意於石自甲午至今識彌精取彌寡計前後所蓄僅數十枚皆取其天機而略其元黃牝牡乃所謂文如指上螺者則擲不顧恨不能起長公於九原與之品石耳然余之所謂佳衆俱不解即克全亦不解今歲病後遊城南克全具雞黍淹留竟日凡盆盎間物搜閲幾遍所僅取者不能數枚克全見訝又出其所寶若干大都求奇於人物仙釋余更揶揄之同一嗜石而意匠相詭如此余謂克全好石日購而聚之不減富人之積金乃不自有而歸其精者於余視長公之不自有而以供佛印參寥者何異然而克全之所謂精者自在余未嘗奪之也何必余之是而克全之非耶克全所居之齋顔曰醉石嘗自為賦而以記屬余克全為人長者慎於取與其亷聲在撫撫之人尸而祝之夫石堅貞而有文理君子比德焉宜其醉也是通而不溺之謂也余斤斤置辨明已之是張人之非余則溺矣是為記袖清源石小記蔣德璟丁丑孟春二十八日林公為磐邀同楊公康侯及豫弟中陛禮裴洞復前洞後登絶頂中台而中陛以事先歸豫旋登百丈坪左台再移榻南臺雨甚林公復先歸僅豫偕康侯宿僧寮明晨大霧凌風登絶頂為右台三台巔皆擇小石有孔竅玲瓏者帶苔蘚入袖殊有致比林公遊覺海以覺海石見餉而布衣黃公季韜亦餉豫白石子三百枚曰佐君盆景余因歎千古花石之富莫如宋艮嶽其得禍最慘它如李衛公以平泉醒酒石殺其孫而趙南仲舁靈壁石役卒五百鄭璠輦象江六怪石費錢六十萬勞民傷財身名俱損近則太湖英德大理玉華之石多為官府嶄鑿搬運數千里裝揑假山不過供俗子一賞耳以裴晉公之賢結搆緑野已有破盡千家作一池之誚而司馬溫公獨樂園小不過數十椽亦儼然與雒陽諸名園並列晉公未始有餘而溫公未始不足也况賢不若晉公者乎本朝楊太宰巍每遊名山即拾一石歸余最慕之豫年伯謝公肇浙亦云云山行遇道旁石佳輒掇置卉竹間殊有郊坰雅趣璟以為具四美焉省財省謗一也石受名山霧露日月之精久煙霧凝浮與出椎斧者不同二也每到一山夢寐常不忍忘古人或託之圖畫或為敲詩作記以供臥遊終不若本山佳石日在眼手三也取之無禁攜之不難一石題一山名山既無數相對欣然而亦易於敕斷不作愛想四也書以似黃林二公比怪石供何如而且漸為大小洞天及七十二福地之遊皆從袖清源始彈箏記蘇桓武宗時東院梁氏彈箏獨妙家世善聲備供奉天啓甲子二月中豫同劉君過之則已無彈箏者矣劉少時擊劍飲酒豪聞局中比入梁氏記憶庭徑慨然當時居有間問其家三姑善箏者下世今幾年一鬟應曰客何從知豫三姑也今九十餘尚能飯然二三十年來內庭靜攝教坊樂部皆湮廢時好新聲三姑箏塵久矣每家人小集風月間好姑悲來或一彈促節哀音聽者失悅劉因請見三姑冀彈數柱辭再四則列幛座右為奏一曲洪往舒歸鯨駭鸞續更時時聞折桂狀已若風霧煙雨共冷冷也坐客聽者悄然慨嘆云後田玉環亦以善箏名第非梁氏所傳大抵皆姑蘇太倉間琵琶聲兼儀揚里巷所歌陳隋調耳一抑一揚抗雲零露佇聽移時靡靡焉哀以思也時田錦衣子弟至驕倨顧獨慕環費萬萬緡求環彈箏環彈箏數聲即起去田私其色技不為怪且曰箏固如是妙耳其時劉弱亦彈箏但聽梁氏箏有詞有説田氏止有詞又彈時吟勝於絃不知者若以為瑟也弱彈箏則竟唱甘州桐城諸歌矣北風凄徑戍士秋懷把臂宣驕亦自哀激以此譜入箏聲未審違合但連絃並撥雨霰驚飛倒柱寂然山花未發亦近世所未有嗟乎箏一藝耳嘉隆所傳世無存矣遊俠如劉君復不可得長安風景何如耶記昔所聞才經數嵗梁嫗已歿田劉適人思向音響渺矣難即傷哉後之欲聞此技者也寒碧琴記王猷定余幼嗜琴聞四方有蓄必造觀然佳者往往不多得余論琴頗與人異審其質以考其聲而知陰陽之所自生察其形以驗氣而知清濁之所繇出故琴之有當於余者百不得一二癸巳春漢中楊公某來廣陵聞蓄琴甚善過公求觀啓其函則鏗然石也公曰子識之乎此蘇子由之寒碧也子由有寒碧琴説子為我記焉昔子瞻為登州司户參軍子由省之攜琴遊大海舟覆琴墮海後髙麗人得之獻其王王視知為蘇氏物也藏之數百年逮明崇禎間髙麗困於兵請援上遣總兵黃某帥師救之髙麗戴天子德意而以黃帥之有勞於其國也賫豫甚腆瀕行復贈之以琴而琴遂還中國其後黃帥道淮上總漕路公聞之易以良馬不可黃帥殁其子辟亂懷琴渡江至金山聞北兵南下益皇恐乃謀之僧匣琴繫以鐵絙墜郭公墓下沉諸江者三年黃子有姊甚貧因謂姊曰吾無能為姊計有先人之所寶者足朝夕矣乃告以琴所在遣人取之其姊謀而售焉王子曰有是哉兹琴也失於海沉於江淹於屬國其瀕於危者亦屢矣幸而復返於中國使又不幸而終於擊劍負販之徒無寧其在江海也而今得功而托焉公其毋易視此石之鏗然者也公曰諾吾將歸而藏諸南岐紫陌之山矣琴長三尺四寸濶六寸缺兩足明文海卷三百七十八
