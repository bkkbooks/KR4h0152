body:
  text: 明文海卷三百七十九餘姚黃宗羲編記五十三功迹江淮平亂事狀祝允明正德五年秋大憝伏誅瘡痍向復國憲昭振文武吐氣萬邦蒼生方仰頌皇烈奠鴻寶於無疆未幾羣盜復起或凶醜所遺或餘虐所激呼嘯團落動至萬千最厥渠魁所謂劉六劉七齊彥名楊虎者倡亂於霸州遂至狼戻四方上薄畿輔橫行齊魯旁延荆豫下靡徐沛屠城破邑發庾潰獄殺人如麻燒廬空野鈔敓市旅姦掠子女以至竊名號攻宗藩戕百官由盜而逆梗為國疾始於辛未之春逮乎壬申之夏皇帝屢命內外文武大臣分閫專鉞四出征討雖其東撲西燎左翦右蔓然而卒藉廟社之靈聖后之德臣工宣力將士用命凡彼諸酋先後戡戮與其夷類悉同汛掃惟劉七與彥名鞠頑負固奔迸後誅乃七年七月癸巳竟授首於南通州之狼山於是妖孽蕩滌王路載夷江河晏澄井邑綢繆兵休於伍民返其業喜極而鳴歡然一情淮安守羅君循二守胡君軒揚州二守于君利來屬允明纂次其事將請諸太史先生勒碑涯滸允明以為殘逆殄除固將登記史注題名太常以示有截而懸無窮惟此一捷獨在二凶禍始於西北而終於東南故特按蕩平之迹凡事聫江淮者繫時敘録以為狀據而其他偉績地屬殊方時非此日特書有在兹故略焉劉六劉七者霸州之民兵也初六年之春朝廷以其故實劇盜下命捕之圍困於霸才三十人他盜齊彥名劫圍而出與俱奔東兖轉上湖廣復來山東五月冦大名等地六月甲申冦日照遂冦諸城自甲申至於庚寅凡破州縣十三辛卯入文安趨霸州壬申冦武安至於丙午又破州縣十六七月己酉朔冦齊河至於乙卯乂破州縣八丙辰冦冀州先是他魁楊虎流劫山西轉掠而南亦以六月甲申冦武安後為都憲陳公天祥所蹙乃來大名與六七合羣其後或分或併至是二黨方聚丁巳遂同圍棗強衆二千騎燒殺慘毒知縣段豸死之自是狂焰轉熾戊午六七彥明冦景州至於甲戌又破州縣八丁丑虎冦滄州至於八月己卯方解去自桑園至平原而劉七踵至復圍之癸未始解滄被圍凡七日焚掠死傷不可以數燬漕舸三百艘六七彥明亦自桑園冦陵縣由穆陵關而東至沂州攻城犯藩府數日由嶧縣兖州出至濟寧燒運船千五百餘艘徑趨大名往來山東縱橫殘燬初都御史馬中錫被命捕賊布招安之令六七來以受招罔馬馬聽之遂至猖獗於是朝廷逮馬還以都憲陸公完代之復命中貴谷張二公監總戎務少司徒楊公督理餉給陸公以是月辛巳受命視師癸未陛辭而出首命各郡縣募集民兵修濬城池自是賊至不能入城又令諸鄉村拘收馬騾入城自是賊至野無所掠乃相機運算簡將練士師律明肅出輒有功丁亥宣府副總兵許侯泰遊擊將軍郤侯永等與賊戰於霸州之平口斬首百一十有竒總兵張侯俊兵備少卿陳侯天祥與戰於信安鎮斬首二百一十有竒生擒百一十有竒辛丑許副總又破之於阜城之半壁店斬首百九十有竒生擒百一十有竒甲辰郤逰擊又破之於景州之鑑橋集斬首百五十有竒其他小戰往往皆捷於是軍威始振民之從賊者始有畏心陸公乃乘機布令以曉諭之又於軍前立招幟以散脅從於是散去者甚衆九月戊申朔延綏副參將馮侯禎及郤永等兵擊賊於景州之宋門店丙寅又擊之於曹州之裴子巖皆大破之宋門之級千有五百裴子之級二千有竒其他小戰亦無不克賊魁朱千户為沙長孫所戮劉四齊仲德皆被殺死四即劉七弟仲德彥名弟也賊既屢敗十一月甲辰又為馮副參及參將李侯瑾破之於鄆城斬首五百六十有竒丙辰郤逰擊破之於髙麗店斬首七百七十有竒由是其勢益衰六七彥名先自霸州渡河時十二月丁丑朔乘輿方出郊省牲賊奄至新城涿州之界大肆燒劫以搖京師復往至大名之小灘甲午馮許二公又破之於彰德之何家屯斬首七百有竒乃奔至山東之桐城驛復上文安時七年正月駕將郊賊窺伏近地而迫於官兵不能肆也始楊虎之解滄圍而入平原也乃由髙唐以西隨地冦鈔既數為陸公部兵所破遂流掠兖州邳宿上下十月壬辰冦永城轉冦夏邑虞城丙申冦歸德遂冦亳州總漕巡撫都憲張公縉遣永平衛指揮石堅夏時知亳州張思齊等䇿禦之丁酉堅破賊於盧家廟擒其魁楊經等二十六人斬首四級賊退屯泥臺店二將移兵伏白龍王廟集伺之己亥賊來奪船將渡渦河堅至擊破一船溺死其衆賊乃返北岸與我相持堅之父璽急命指揮沈勇以其部兵張亳州遣其兵民俱來援潁州兵備僉事李君天衢亦遣指揮鞏臣丌麟以兵千餘并至戰禦賊乃退庚子收溺尸得四軀令所俘賊參伍驗之一乃虎也一為李隆與前所擒虎之孫經皆僣王也餘賊乃由蒙城太和行劫入河南境後推其首劉三趙風子等脅從甚衆時號河南賊亦為都憲彭公澤咸寧伯仇公鉞𠞰滅無幾正月辛酉郤逰擊等大破六七彥名之衆於穆陵關斬首六百賊愈耗衄逋迸自後遇官軍不能肆敵陸公益遣兵分道擊禦是月甲子河南餘黨賈勉兒冦碭山丙寅冦蕭二月己卯冦睢寧典史袁浩死之張公帥兵往襲甲申賊至宿遷欲渡公所遣指揮周正拒之乃退往桃源公追至白洋河壬辰勉等由靈璧虹縣遁去而劉七之衆萬有七千又自文安南下以是月辛卯由郯城贛榆而西將冦沭陽張公得報當河南賊甫去急引而東丙申入邳戊戌賊至沭陽公遣千户張瀛帥數千騎往覘道遇賊三百騎瀛力戰斬三人賊去公所遣他兵追襲亦多斬獲復遣兵下清河淮安以捍之辛丑賊冦邳州以八百騎三面薄城餘衆充塞郊野公視城惟南門東稍門二重要害命瀛守之持兵扼門之險賊破外門瀛并開其內戰殺四賊賊不能入乃退敗遺馬騾百餘近水沮洳中以餌我軍公曰此莫敖伐絞故智命勿取賊計不得行不三時竟去城以完癸卯賊過吕梁殺官民燒署舍張公帥兵三千追襲之賊奔至滕縣甲辰遼東副總兵劉侯暉遇於吕孟社大破之斬級九百有竒賊趨徐又為張公遣兵備憲副馮君顯所扼乃東至邳之馬古城遇副總及參將李侯鋐之兵三月庚戌夜半與戰賊且戰且却至魚頭集斬首百三十有竒奪回虜衆賊乃東奔登州海套雖經數敗隨在脅聚寡而復衆陸公乃大集諸路之師畢至分道屯集彌布逺近公指麾諸將各授成算而往動合機宜料決若神於是郤劉李三公及副參將溫侯恭之兵并各郡縣官校諸君並進與賊遇於嵩淺坡古縣集等處奮勇鏖戰凡斬首三千級竄遁千餘傷殘死歿不可勝紀四月丁丑等日也前後滅其酋豪殆盡六七彥名獨挾所餘驍猛僅三百騎間道而逸馳至河西務其勢莫禦復下至臨清之南陸公策調官軍邀擊之癸卯劉溫二副參將等與戰於冠縣等處大敗之斬首二百四十有竒於是止遺劇徒二百而已遂奔河南是月之初河南舊黨來冦定逺六安哨騎東躪巢滁驚逼陵寢已而復西戊戌遣二千餘騎竊渡白洋又為周正所拒庚子越邳州漸北至雙溝頻欲渡不得癸卯乃復由靈虹西南遁去而六七彥名復以五月丁未渡棗林庚戌夜渡邳才三百人從光山確山奔上湖廣乙丑至陽邏團風舍騎而舟丙寅遇都御史馬炳然脅迫之馬怒罵賊遂遇害而劉六遂溺水死惟七與彥名沿江掠聚其勢復盛至七百人閏五月己丑突來瓜州京口寄巢於常熟之福山港通州之狼山遂凌騖江面通州之臯濱江之區咸被創殘於時張公洞機研慮隨勢應變數遣將校守吏遏截衛防通泰儀真瓜洲海門諸要害地募兵萬有五千分屯應援儲粟積芻除器修隄數出竒略為必勝之計胡二守及楊守孫君祿皆承檄以集事賊不安水居日上通州城外遊掠城守甚堅賊潛謀掠馬竄亂淮北海州張公得偵報急申嚴防禦拘藏馬騾賊既窘六月辛亥乃驀海門而上甲寅越瓜洲過南京丙辰過采石泊蕪湖乙丑在段腰遂自湖口縣乘風而西寇南康迤邐蘄黃以至九江安慶肆暴益甚七月壬午復越瓜洲而南先是陸公自海套冠縣捷後身統中軍劄鎮臨清以控制上下至是朝廷以賊勢且南復賜璽書令公南下直抵蘇浙以窮逋魁務期殄絶公以六月戊申受命即留監督中貴陸公監鎗尹公駐扼通海要衝以遏賊奔而自馳以南是日至楊州會張公議兵所向邏騎報賊將犯儀真張公乃往赴之并溫副參之軍以從陸公督劉副總之軍趨瓜洲比二公各至灞上而賊已東陸公乃急渡河駐京口守截時總督水利都御史俞公諫亦被敕捕賊陸公分兵與之并命劉郤及都指揮陳璠等往襲賊將犯鎮江璠禦之陸公又移巡撫都憲王公縝來駐京口區畫備賊南衝時羅君方守鎮江乃集水工千人治戰艦百艘以周戎事惟力諸君俱赴太倉會仇公與參將金侯輔各以兵來陸公因與仇議以副總兵時侯源守鎮江金與逰擊將軍陳侯珣守瓜洲部分定彭公且至而陸公已督諸軍水陸並東矣丁亥賊泊狼山劉七妾丁氏阮氏逸入通州守兵執之己丑賊令狼山寺奴持書來索不與遂帥衆二百餘來攻我軍擊之敗歸入船其夕大風發烈甚賊船皆解壞飄落其衆顛踣不支僅存八舟將竄而遏於風勢兵威惶惑弗能前乃登狼山團聚或下崖散逸輒為通州諸處守兵指揮劉葵胡鎮千户王詔通判髙升等邀逐擒斬不絶庚寅斬首六十一俘口四十七辛卯俘十七有漂船至西洋港升岸虜掠遼東官軍執之又斬首二十九俘二十壬申陸公在江隂會諸將指揮方略其夕三更劉副總帥遼東兵千總官任璽帥大同兵副之郤逰擊帥宣府兵及諸從校並進癸巳與守兵主客齊集日比午與賊戰我軍聲焰震天風雨交作賊披靡大潰奔躋山顛古垣峻甚馮髙據險槍矢瓦石雨下鏖敵至於申際劉副總引其部領張椿蕭滓髙雲李春美饒徴等誓死決戰分軍為三劉任在山北郤在山南皆載盾跪行而上手施槍炮且上且攻盾上矢集如蝟將士有被數箭中數石者不退遂奪其地賊墜崖死者無算劉七下山入舴艋將遁劉侯列兵崖下百矢齊發艦中炮矢並集七墮水死彥名為宣府遊兵小旗張鑑所殺劉公擒斬餘賊馘截沉水賊級有泅而北者髙雲追斬之皆盡時已夜息兵甲午諸軍復登山檢搜賊已無類乃旋師凡斬級四百七十有竒俘百八十有竒間有逃匿復為通州守兵等擒斬先後三日內所獲并前共為級五百八十九俘二百四十八其俘曰劉惠吳漢則皆僣王也遭虜脅從釋歸其家而江南官兵前後所獲又不與焉於是一時平亂諸公獻俘奏馘朝於亰師而黃門柴君竒侍御吳君堂紀次功伐上之陸公亦具實以聞天子嘉悅特降德音賜賚文武之臣以酬薄伐之勳勞鼎建江海之祠以申捍患之報祀蓋是役也坐役飛籌知人善任料無不中發無不克者陸公之烈也保障京輔卧護東南先幾豫防部屬死守者張公之績也以至天心助順以效靈將士鞠躬而盡瘁用能千臣一心膚公協奏夫豈偶然者哉草莽臣不佞目爍盛業於生長之邦敢因請者以敘狀如右正德八年夏六月一日狀剿平貴州夷婦米魯搆亂事略蔣冕貴州夷婦米魯普安州土官州判隆暢之出妾也隆暢疑米魯與其子禮通密遣人殺禮米魯怏怏遂通於營長阿保禮既死其妻適固亦為營長福佑所蒸由是數人者皆讐視隆暢米魯阿保尋相與隂謀致隆暢於死米魯等自是肆無忌憚糾集夷衆劫掠諸山營寨白晝對衆支解人以為常有二人以其事告於巡按御史張淳適張淳巡行於外米魯等詣張馬前分析且求告其事者主名與之對理二人出入常依御史左右以防米魯等殺害至是米魯等知而疑之於御史前截二人頭徑去御史乃偕鎮巡議先聞調遣漢土官兵往剿之旬日間阿保父子及其黨與皆見擒戮惟米魯逺遁不能獲福佑畏死降伏而終包藏禍心乃𢎞治庚申冬米魯與福佑共殺隆暢次妾適鳥并其二幼子殺之明年辛酉夏巡撫都御史錢鉞委按察使劉福督兵捕之米魯福佑乃集烏合之衆萬餘來拒官軍為其劫殺者甚衆領兵都指揮亦被虜而死事聞上命兵部調遣雲南四川湖廣廣西漢土官軍十餘萬往征之而以南京户部王尚書軾兼都察院右副都御史總制戎務尚書甫入境賊聞天兵將至自知罪無所逃遂大肆叛逆誘扇生苗數萬攻圍附近各處城堡雲南布政梁方貴州布政閭鉦皆見圍困於安南衛城中勢甚危迫鎮守太監楊友聞之統調官兵八千人過盤江直抵安南城下賊始退避梁閭二布政乃自圍城中出其時議者謂楊太監當賊退避後尋即班師仍北過盤江固守險阻以待尚書至日聽其處分則計出萬全矣有以此言告於楊者楊謂賊兵寡弱勢無能為兼利賊賄賂百計需索賊怒其索賂無厭且偵其不設備也一夜擁衆入其營官兵不戰而潰倉卒為賊所殺戮及溺死者不可勝計領兵都指揮及布按二司官自布政使按察使以下為賊所殺者六七人楊太監遂為賊虜入山寨賊跣楊兩足置之釜中以溫湯煮之時呼其名而大詈焉自是夷獠橫行道路斷絶賊所屠戮之處白骨如山過者慘栗近城池如纍卵滇蜀附近郡邑皆為之騷然不寧矣尚書既抵貴州以調來諸處及本處漢土官軍十餘萬分八哨約雲南鎮守沐國公崑巡撫陳都御史金統領所部官軍分四哨刻期並進以御史黃珂紀功監軍兵既合四面夾攻其巢穴曰寨曰箐曰洞曰籠無不迎刃而破首取賊所虜太監還帳中諸軍先後擒斬賊徒首級五千有竒俘獲老稚千三百餘人焚廬舍萬有餘區米魯福佑二渠魁同斃於官軍矢石之下時壬戌嵗三月草七日也自進兵至是僅兩閲月尋函二賊首獻於闕下奏凱班師夫以一夷婦倡亂環數千里皆為之葅醢魚肉至勤王師十數萬閲三四寒暑始克平之古語不云乎涓涓不壅將成江河世之弭亂者盍亦壅之於涓涓之始而勿任其勢之至於江河也哉巡海副使雙華柯公海上平冦記王慎中自孔子答衛君問陳之言存於册學者習傳謂軍旅與俎豆為二事軍旅之事自有治之而為俎豆者莫肯過而問也由是顓固迂慤挾其盤辟委蛇之業以卑軍旅而恇弱謹細不間於兵亦卒為治軍旅者之所懾偶有能乎彼者則以為才之兼而已蓋孔用於魯為夾谷之會雍容壇坫之上却萊夷之兵若逐豚鼠論者直以為聖人之才巨而全有文事而亦有武備卒不知夫軍旅之事固俎豆之所出其盤辟委蛇而徒以恇細見怵於治兵者固非孔子之所謂俎豆也故夫嚴固強決凛乎不可犯之武乃其兢惕對越之精而潛深參伍淵乎不可測之機乃其齋戒神明之用其約束於節文制度之詳優柔乎講習論説之數而常若三軍之在行不待鋒刃之交鼓鉦之奏而後有制勝之威此孔子之所謂軍旅之事也如是而偶有伐肆絶忽之役以有事於兵而嚴固出於兢惕參伍由乎神明兩軍相接紛紜於鋒力震動於鉦鼓襜乎其若在堂陛階序之間樽罍之逡巡球鏞之擊拊也嗟乎聖人之學不傳而軍旅之事儒者益擯而不講援枹鼓親矢石遂為武人之所守學而為仕者務自詭於儒以玩安養髙茍自矜重掩其恇細不間之愧而已此方今之大患也比嵗閩海多警朝廷以為憂制敇卑按憲臣以海為責者尤慎其人而福建實得貴陽柯雙華公公之在鎮值島夷佛郎機部長率其酋卒浮海為冦於漳州瀕海為州而鄰於漳者咸苦其害而東甌南粵均以為警是時天子方勤恤東南慨然於洪波之不靖為特遣重臣制置浙閩二海將軍符檄下公委重特至而督促亦不少貸公發策決機取成於心所選文武吏士皆得其才力所宜形便所向鼓倡所率各有怒心探畫懷中授之使往公為之出次海壖增其氣勢兵出不浹旬而薄夷舟之所泊其與夷戰不崇朝而克之魁長徒從無一能遁者盡俘以來一時蕩平摧陷之功播喧海嶺風聲所憺殆窮日出之域於戲盛矣公學乎聖人之學其獨得妙契舍去世儒攣曲支離之見而一趨於易簡講究服行旦夕不倦所至與學者發揚宗旨計論歸趣睟乎仁義之色道德之談觀者徒見從容暇適若無所為而警變迫猝用凶器臨危事竒偉之功捷取而全收意公隂為揆謀祕怪荒忽人不及知自有戰陳之學如衛靈公之所問者惟其藏之微密出之深眇有不可得而見耳嗟乎此乃近世兼才者之治軍旅公之所能固不出此也觀其洶濤巨浪稽天浴日蒙衝千百並進班布雷炮駭發之機鈹矛決刺之利無一不具於胸中而戰休兵偃廓然無有此豈祕怪荒忽之揆謀籌於形勢之間動乎耳目之頃者之所能為乎蓋其以孔子為學而得乎俎豆之所傳故見於軍旅之事如此信可謂盛也郡侯盧君璧郡丞龍君遂與龍溪林尹松遣使至清源山中屬慎中為文以紀公之功公於是功尤遜不獨居而推其美於下嘗以郡守丞贊協圖議之審邑令奔走先後之勞而非三君子之助我亦未知所濟也盧侯輩思以昭公之功而圖其不朽如是之勤上下相與之間有以愧今之私已而狹人者亦可記也柯公名喬字遷之由己丑進士為御史以直諫謫而後起今以福建副使巡海云敘廣右戰功唐順之紫江沈公自襲指揮使時未弱冠已能馳馬手摶賊賊憚之未幾調征永安嘗以數百人搗陳村寨賊墻立山上公一人拍馬而登賊却下山誘公入淖中馬陷以吻拄淖中而騰其足及於陸三酋前趨淖劫公一酋鏢而左一酋刀而右夾馬一酋彀弩十步外公捩頸以過鏢而挑右足以讓刀鏢離頸寸而過刃著於鐙鞺然斷鐡公射鏢者中其項殪左挂弓而右掣刀斫刀酋於鐙間斷其頰車折齒殪弩者恟失弩僂而手行上山公又射之中膂既連斃三酋後騎至戕其首公以二酋讓後騎而囊斷頰者自為功餘賊羣遁入箐追兵戰於箐中斬酋若干級毒弩中公膊整軍而還驗功或以斷頰者非全首難之監軍吳布政怒曰賊豈伸頸而待斫乎命紀之以功遷都指揮僉事義寧賊冦臨桂掠而還巢公追之巢有兩隘賊伏兵丁嶺隘以伺使熟猺以某隘閉告而導公入丁嶺公策之斬所閉隘而入果無兵守於路擒販者數人以丁嶺之賊告遂遣以導巢而熟猺亦以公斬閉隘告丁嶺之賊賊還趨巢大破之賊奔公獨逐一酋酋騎而走岸窘釋騎跳而下澗公騎跳而下澗澗深沒顛馬浮而岸毛盡濕束濕馬於樹緣澗而求酋酋泅而逃矚水中影射之血縷水上入水斬之後騎相屬至崖望見公提人頭立水中崖峻不可跳乃尋路從公則賊遁已逺公乘濕馬與諸騎追之猶斬數十級而還荔浦賊八千餘渡江而東冦諜者告公倉卒率五百人待於江岸駐白面寨去蛟龍滑石兩灘各數里諜者又告賊飽而歸將及江公以為滑石灘狹牽線而濟雖衆可薄也蛟龍灘濶成列而濟衆難圖矣吾欲奪其濶而致之狹令製旗軍中無尺布伐岸竹揭竿而編蔑以為縿頃刻成數百旗插之蛟龍灘令羸卒數十人守之燃柴煙以疑賊賊至果避蛟龍趨滑石公分兵兩岸而潛以小艦載徑卒數十伏葭葦中賊營於中洲以護濟濟且半公以艦乘瀧急衝之兩岸軍譟而前有酋騎而水立挺鏢當艦公舍艦跳水斬鏢酋人騎皆踣洲上賊辟易賊濟者西奔巢未濟者却東走上山而復潛趨蛟龍灘以濟洲賊孤艦軍攻洲兩岸軍始至下水夾攻之洲賊後行擠墮淵溺死無算其前行盡俘之得生口首級若千收賊所掠牛畜之在兩岸者是役也以五百人破八千餘賊公用竒往往如是復以功遷都司同知嘉靖六年岑猛叛聚兵數萬人督府奏誅之一日督府召公計曰歸順岑璋猛婦翁也助猛奈何公素能得土官隂事曰璋女失寵而璋心恨猛徒貌合耳公復密向督府稟曰如此可使璋擒猛督府復曰猛乘上流之勢擁兵建瓴而下則雍梧諸郡危矣奈何曰此不足憂土官大率飽富貴戀巢穴所以叛者懼誅耳非有他志也猛離田州而子女玉帛皆在彼或乘虛襲之猛安得不慮乎督府又慮猛且走交趾曰猛走交趾則閉不能歸矣猛安得不慮乎猛果如公所料而岑璋雅敬公公潛使人於璋於是督府進兵分五哨入猛徑兵盡在工堯去工堯五里而軍進攻隘隘堅復退營五里而糧且盡湖兵五千人請於公願得一飽而死敵公時僅有自齎家糧五十石與湖兵人給之升而官軍縮腹張目以觀湖兵分米不敢言公無以為計時左哨將與公隔江而軍公潛濟江就左哨將乞糧而請并兵攻工堯左哨將以分地拒公公笑而還曰兵糧吾自有之姑試公耳左哨將慚公還軍乃夜分軍三百人緣山而右走間道三百人緣江而左上山並繞出工堯背插旗為號煮餘糧為稀糜食而遣之黎明合戰賊殊死鬭我軍却麾而進又却公親斬却者一人而提其頭以令軍復麾而進先所遣間道卒皆已至登山插旗初岑璋既與公為約而遣兵二千人陽為助猛守工堯遣精卒五千人以護女為名居猛左右璋兵在陳後望見山上旗大囂曰天兵得工堯矣潰而却猛軍見後陳却亦囂而却我軍乘之斬猛子邦彥於陳中蹂尸數里遂入隘得其積粟軍始飽乘勝攻田州猛聞工堯破窘急欲走交趾而璋卒五百人護猛妻以歸五百人獨守猛指猛所欲走紿之曰此路皆天兵也不如且走歸順為後圖猛不得已從之璋待於境相見因相抱哭璋以子女歌舞飲食恣猛圈留之而潛遣其子報公於田州公入田州五日而諸哨始至璋所使報猛所在者事頗泄左哨將移軍壓歸順境索猛欲破敗公事自為功璋以二十牛百甕酒犒軍而謂左哨將曰猛誠有之公無急也於是醉猛而斬其首函送督府斬他囚首貫猛尸而以與左哨將左哨將喜於得猛而抽軍獻猛首督府則猛首已梟一日矣猛死田州平安置猛子邦相於福建而議設流官公曰思恩設流官反側至今未憗田州復然兩賊且合從起矣督府不聽且調公守田州公請以他將假守三月而待希儀治裝他將守之一月而田州酋盧蘇果與思恩酋王受連兵劫城他將狼狽歸田州復為賊巢公又言於督府曰兩酋能用其衆以復故主為名今若返岑邦相於福建而置之南寧此竒貨也可使兩酋坐受縛矣督府復不聽而徴兵數十萬征之既而失利督府以罪罷新督府餘姚王公至其所以撫定兩酋公多與其謀因薦公右江參將右江栁州栁在萬山中城外皆賊巢軍民至無地可田而室廬妻子數被焚劫知府劉璉殪於賊知府鄧鋐間出城弩中其膊自是諸軍民官必甲而後敢出城城兵又疲不足仗公為參將始議剿五都五都去城五六里而巢最險賊又最獗所虜獲人畜最富巢中不聞官兵者百餘年公乃以五百兵付百户蔣紹宗使搗其巢賊蜂出褁我兵殺數十人而隘其入路使不得返我兵即賊巢為營固守而因賊糧以為食然氣奪不能戰賊亦欲坐踣之於是百戶潛遣人茇而告急於公公即上馬復聚兵得五百人入巢為援既至聲銃者三因奮擊賊百户兵聞銃聲亦出奮擊賊賊分兵為二腹背戰我兵鼓譟斬級賊不支然尚橫梗兩陳中守隘不肯散公使人茇而以勝告百户百户亦使人茇而以勝告公公因謂百户曰汝且據巢毋出待賊服乃已不更夾攻之可盡擒也賊素知栁州兵最易與至是詗曰汝誰也敢入吾巢公使人紿曰是新參將老沈所率藤峽軍耳兩江賊熟老沈名而憚藤峽軍因咋舌曰吾固知栁州兵不及此相持數日賊不退然心懼因熟猺為解熟猺者界漢人生猺獞間陽附官軍而隂附賊或官軍勢盛附官軍賊勢盛附賊以為常於是熟猺間説於公曰請為兩家解鬬公度賊尚徑乃且聽其説而謂熟猺曰返我生口牛馬我兵乃去賊以所虜生口二十牛馬百四十為獻賊收衆奔山頂而空隘以通百户兵公兵與百户兵牽連行至城城中人歡始知栁州兵之能戰賊也公以為欲大破賊非狼兵不可右江狼兵惟那地最徑乃請於軍門以那地兵二千戍栁州栁之有戍狼兵自公始先是賊勢張甚而熟猺及城中黠吏民多為賊詗者賊耳目遍官府左右官府閨闥動色情性賊在溪洞千百里外輒知凡議大征或雕剿口語沓沓未及聚兵而手足盡露以是賊得隂為備或伏巖藪伺官兵殪之或先徙妻子畜聚於鄰巢而自空巢以待官兵官兵至徒手無所得甚者我所任為鄉導往往為賊誤我入死地崩墜崖谷不戰而糜爛者過半而賊以耳目故益知官軍虛實與民積聚多少乘虛掠多所入無一當而所噬無不飽我兵築堡增戍則益紛然如刻穴守鼠而賊活脫不可蹤迹公以為圖勝算莫如得賊情得賊情則莫如諜而使官府人為諜則賊生疑於是隂求得素與猺人商販者數十人假以買物召至府密謂之曰吾素知若輩通猺吾不罪若更與若銀為販本若試為我詗賊衆感諾乃人給銀五兩使益買物散入諸洞中諸猺人雖凶暴樂殺人然販者至則寨寨傳送護衛飲食恐損一販者則諸販不至是以雖絶棧深箐販者無所不歷每有動靜販者輒先知奔走報公厚賞販者而祕其事雖肘腋親近絶不得聞至期鳴銃者三則諸兵皆聚苐謂之曰今日出某門而遣心腹人為旗頭引諸軍諸軍貿貿行問旗頭旗頭不知曰然則汝何為引我曰公強我往我漫往耳軍行千萬人其所往獨公與旗頭兩人知之而已頃之劄營設伏賊果至遇伏奔追殪之已而賊冦他所則公軍又已先在或絶遠村聚賊度官軍所必不至而潛冦則公軍又已先在賊始驚以為神而我軍亦不知公自何得之也公始至栁令諸猺得出入賣買遊嬉城中無禁諸猺時入府見公公兒女撫之久之稍稍擇其巧便曉事者結以厚賞使詗賊後賊發其火伍中輒報公公又厚賞之而間謂諸猺曰若見我若妻子何不來見夫人諸猺叩頭不敢公曰試令其來已而猺婦五六人來夫人好言慰勞賞之針線包帕諸物以銀簮簮其頭又命諸妾婢灌之以酒人數大碗察羣婦中其夫嘗以賊事報者則又隂摘之他所勞苦之曰若夫為吾大人盡力良苦私賞之包帕銀簮諸物倍於人前所賞者而益以珍果美物塞其袖中又隂戒之勿令人知也諸猺婦既多得賞又酒醉踉蹌舞手出府門猺夫望見之歡喜爭前掖而歸巢自是諸猺婦來者至數百人夫人傾筐篋針頭線尾皆盡猶不能給而猺婦相戒以勿令人知者猺婦又泄之以所獨得珍果美物誇諸猺婦以為夫人愛已諸猺婦皆怏怏心羡嗾其夫使報賊冀已入府得珍果美物而公間使人往諸巢中隂以夫人之命賜物諸猺婦自是賊中消息或諸猺不肯言則猺婦嗾之使言或諸猺竟不肯言者則諸猺婦自以使人至巢賜物時附耳語之云若勿向我老公語也公用兵風雨來去既得賊時率輕騎剿其尤劇者一二人兵至巢以菅為繩繞記劇賊家示諸軍所捕繩之內老弱婦女牛畜無一免者繩之外老弱婦女牛畜無一及者遂出巢數里遇平地度賊援所不至則停軍審究其為劇賊家婦女牛畜者收之其雖獲於劇賊家而係鄰家與鄰巢者還之諸猺得完室家與見還者皆喜以為往時官軍入巢見人輒殺或賊遁則搜斬不為賊者以充級故賊詈我輩我雖為賊時得脫或保孥資汝輩雖不為賊時見殺或孥資為虜自今我輩乃有顔面詈賊矣公入巢有助賊戰者既還軍遣熟猺檄之曰若奈何助賊戰吾剿若無赦頃之搗其巢盡殱之自是凡所雕𠞰歷數百巢竟無一人敢助賊戰者雕剿所過他巢或刀弩而門瞷既還軍則檄曰若奈何刀弩而門瞷今罰若五牛不者且剿自是所歷數百巢竟無一人敢刀弩而瞷者所獲劇賊多不殺剜兩目刵兩耳賞銀數兩而還之巢自是他賊有所虜掠多不遣兵而用剜目者騎而一人牽以詣賊使徴所虜掠賊見之驚曰某巢某也震懾不敢隱盡還所虜掠而剜目者索不已賊至出自所有與之公以給被虜者而以其餘給剜目者剜目者每一入巢則利益多而為賊者所獲每不補所償則益無利在栁州所剜目七人其六人皆為官用其還巢而復為賊者覃萬星一人而已公竟以計擒殺之公始議發兵故制欲發兵必請督府督府檄下乃發公以為吾治文書吾掾史知之文書上府府檄下我府掾史知之多人知則泄乂栁去督府千里待報踰時坐失機會而書檄往來水陸諸巢絡繹能保不為賊得於是凡率兵入巢未嘗先請既勝則上首虜督府而以邂逅追賊至巢為解於是督府不能以文法詰而兵謀得無泄公嘗欲剿一巢而恐其泄也乃佯病所部入問病公曰吾病思鳥獸肉若輩能從我獵乎因起出獵去賊二里而止營軍中始知其非獵也公耳目多賊不能藪率走之他巢他巢人乂嚇之曰公且剿汝則又走之他巢他巢嚇之則又走趼血瘇以死或餒稿崖谷公又每以甚雨凄凍風冥之夜察賊所止宿處四散遣人齎火銃以筒貯火衣毯衣毳帽與草同色潛至賊所夜聲銃者三賊盡驚老沈至矣挈妻子裸而蒲伏上山頂兒啼女咷往往寒凍死或觸崖石死不者且為虎咬諸妻子更相嗟怨汝為賊之利至此黎明下山詗之則寂無人隂使其黨至城詗之時公所遣衣毯者四散諸巢同夜舉銃明日諸巢所使為詗者亦同會於城旁西巢人謂東巢人曰老沈昨夜來吾巢東巢人謂西巢人曰老沈昨夜來吾巢則固已更相怪駭已而詗之城中人則老沈固安坐城中不出也益怪駭曰昨聲銃者誰耶鬼耶諸猺又自相嚇曰虎咬人者老沈所使也自此賊益膽落或易面為好猺獞而栁城四旁一童子牽牛行深山數百里無敢訶者其軍民往往寄牛於猺家以耕或索雞酒於猺猺不敢不與公在栁先後十三年名賊宿猾幾盡而韋扶諫者馬平四都猺賊弩中知府膊者也凶猾甚先是嘗七捕之不能得至公亦七捕之不能得會有報扶諫逃鄰巢三層巢者公潛率兵剿之至巢則扶諌又已與三層賊往劫他所而三層賊妻子獨在公盡俘以歸計七十餘人平時公所俘賊妻子盡以與狼兵為賞至是獨不與而閉之空室中善飲食之公又隂使狼兵數百人怒而挺刀猙獰入室恐諸婦女作欲搶狀公佯執鞭痛鞭狼兵使退如是者三欲以深德諸婦女而潛使諸猺聞之以繫其心公又使熟猺謂諸猺之亡妻者曰吾不害汝但得韋扶諫則還汝妻子矣諸猺四五人來投公公令入空室視其妻夫妻相持哭其小子牽其父哭妻曰非沈公吾為狼兵殺且搶去矣已而怨相詈曰咄扶諌非汝爹非汝娘何不縳以贖我諸猺心割而别復見公公曰欲得扶諫耳諸猺曰扶諫已逃他巢圖之實難雖然願公切勿以吾妻子與狼兵也吾且為公緩圖之公曰諾因殺牛犒諸猺而去之諸猺蹤迹扶諫所在遂往以言惱扶諫曰還我妻子扶諫不應諸猺因曰我輩失妻子計窮惟有更隨汝作賊耳扶諫喜諸猺乃詭相與計曰今官府虜吾妻子而穿山驛與守堡百户與巡司俱在山中今往劫之三印可必得也官府懼失三印得重罪以易吾妻子可必得也扶諫曰善扶諫既離巢則黨益孤諸猺因醉扶諫與其黨而縛之置巖洞中而使熟猺報公曰得扶諫矣恐見賣可遣吾妻子於三十里外相易公以為吾不遣諸猺且謂吾怯於是鎖諸猺妻刃挾之以行至三十里使熟猺諭諸猺曰諸猺且劫妻子者先殺妻子然後戰諸猺請於公曰吾獻扶諫懼讐公可遣三十人至巖洞自取之公慮諸猺有變乃選健卒十五人賞而遣之曰得扶諫吾且賞汝若諸猺殺汝者吾且重賞汝家又以十五人付之熟猺而質熟猺妻子曰十五人者損一人汝妻子虀粉矣至巖洞中果得扶諫而出諸猺閉之五里外懼扶諫往而妻子不至復要公曰必相易於此公又曰吾不往諸猺且謂吾怯於是先遣諸猺中妻女四五人往言刃挾諸婦女狀諸猺吐舌懼殺妻子帖息不敢動遂易扶諫以歸剜扶諫目截耳剔心手足斬之而四懸諸城門諸猺出入城者見之無不股栗諸猺既熟公威信公嘗調一巢往征他巢雖懼讐然不敢不往牛畜盡俘以歸獨首虜生口視狼兵為少耳公亦盡以所俘牛畜賞諸猺其後復調而與之期會天大雨諸猺懼失期乘雨泅溪水沒者六人公勞苦之命沒者人三牛付其家其餘皆遣還之自廣西為將如韓觀山雲惟能使猺人不作賊至公能使猺攻猺則廣西所未有也十六年而有思恩岑金之變初思恩府土官岑濬叛披誅而立流官以其酋二人徐五常貴為土巡檢分掌其兵各萬餘人而聽於流官然夷民獷悍不樂漢法數十年間凡數叛則數舉兵誅之而亦不能定也當破岑濬時調兵鎮安鎮安掠思恩生口以歸已而其中一人長大而姣因託言岑濬子而名之曰金夷民益思亂鎮安乃潛召其酋長出金而與之盟曰汝小主也諸酋感泣擁金以歸鎮安因要之曰金立與我某地幾百里遂盟金而遣之諸酋聚兵五千人以奉金將攻城郭復故地諸夷多欲為響應者勢洶洶而先時濬既誅其酋楊留者無所歸乃率其黨千餘人詣賓州應募為打手賓州兵素弱故倚打手至是留欲往投金以逞時公與兵備皆在賓州留入言於公曰留小主人在請往公方慮岑金之危思恩未暇慮留之在肘腋也聞留言獨心駭以為金去賓州數百里而留應之表裏相扇賓州危矣賓州危則咽喉梗咽喉梗則廣右盡騷而何有於思恩此事大不可急圖宜以計欵之乃婉色好語謂留曰汝苐往我曩征田州調兵鎮安時已聞有岑金在是岑濬第九子也留聞是言固已刺心公因叩留曰聞鎮安縶金甚堅何因出乎留詭曰百計逃耳公低聲作自語狀曰岑氏其復乎欲以深動留而呼留至密所曰為我一言語金若欲官必毋殺人劫城若欲殺人劫城任汝自為之金能聽我言可以狀訴我及諸上司留唯唯公遂與留銀十兩而以花紵方摺之納留懷中為我寄金得官後為衣衣之可常念我也公復紿留曰金欲官非賂我萬金不可留曰金誠當盡力然金方倥偬安能辦此公笑曰吾豈遽責金耶且欲得一帖為信耳自是益信公無他腸矣留出公又呼還謂之曰我幾忘之韋貴徐五素仇汝亦仇金可善備之無墮彼計也留詣金且如公言金大喜真謂倚公可得官矣因率其兵五千詣賓見公至城門門者懼而報公請無內金公怒罵曰金非賊奈何不內覘者以告金金心益安率其衆散入城而與留及其親信二十人皆衷甲見公公曰金來乎留曰來矣金叩頭潛以萬金帖子奉公公復笑曰若窮鬼安得此乎金曰賴公力得官不窮矣賴公力誠不敢忘報公子孫公戲曰汝土官多不知恩汝得官且忘我矣况子孫乎金唯唯不敢公乃令其姪出見金曰金汝兄弟也金得官他日每一出征乞金四功與汝公復為金計曰汝賂我兵備公獨無賂乎金對不敢公曰苐寫帖子吾為汝致公以兩帖子示兵備笑而火之於是遣金詣兵備始金叛而留且往兵備甚懼公潛與兵備計此事大禍叵測公夷情未熟一語蹉跌敗矣不若一以聽我兵備唯唯及見金但言吾視金有福相以微動之且曰此事一聽沈公明日公詣金營犒之五牛酒五十尊又明日兵備犒之如公公復召留與金謂曰倘兵馬殺金是吾殺金倘暗箭刺客殺金是貴五殺金非關我事今一以付留可無賺金也留乃日夜甲而擁金為備公復遣其姪至金營與金同飲食卧起金自是心死於公矣公欲縛金而憚其衆時巡按在南寧將誘金至南寧乃縛之乃請兵備先往密語巡按以故公謂金曰吾挈汝訴巡公吾代汝詞公為金作訴稿塗抹四五次以示忠於金復謂金曰吾與汝往南寧倘貴五伏人於路暗箭射汝不若易汝土官裝衣青衣雜掾史中而先我馬令五千人後行金如公言路中飲食公與金同席語金曰貴五以重賂賂我庖使毒汝則奈何自今以後吾所食汝亦食吾所勿食汝亦勿食可也金如公言而益以公為愛已行七十里至思龍驛公晨起耳語金曰今往南寧南寧人皆言汝叛聲甚惡以五千人往則人益疑汝不若散遣三千人而選心腹從卒二千人以往是汝不撤衛而坐息人言也金以為然選二千人往復行一日去南寧百里公謂金曰汝至南寧久候而諸從人衣糧懼不給不若以千人營於此而以千人從為便金亦以為然從金至南寧者才千人金入見巡按巡按好語慰之曰吾為汝奏明日巡按遣人至金營犒其衆而留金以待奏居五六日公度金衆衣糧且盡復謂金曰思恩去南寧近耳何不遣其半取衣糧而坐待糧盡衆且散矣金復遣其半衆行金所遣千人營百里外者久之亦以衣糧乏稍稍散去而獨五百人尚散處城中公欲縳金而又以為五百人者迫死而狠鬬則殺傷幾何更欲為計而金所遣取衣糧者適至則從金者又千人矣公知金未可動間請於巡按公且往南寧而以金從可於路圖金也至思龍驛忽報韋徐將萬人在陽以迎巡按而隂襲金金驚而跳公與兵備巡按聞之曰禍矣公謂巡按且陽為不知而聽希儀徐圖之公出呼韋徐罵曰汝安得擅兵至此金得官與不得官唯朝廷所命汝安得私讐之是時金尚駐近地覘伺而韋徐部中亦有為金耳目者金間公言復還公行三十里金道伏候公公曰岑金耶汝尚不知死貴五兵至矣可疾入賓州匿我參將府則貴五無如汝何矣金馳馬入賓州公復於巡按曰金入賓州矣巡按兵備至是始有面色自金往南寧返賓州飲食起居無不隨公居數日韋徐復私公曰請甘心於金公又怒罵韋徐亦莫測公計所出也公密請於巡按散遣貴五衆而後圖金然是時金衆尚千餘人與楊留所統打手千人皆在賓州內外公與兵備計公可遣楊留打手百人護巡按往栁州公間謂金曰楊留打手百人護巡按往栁州矣汝盍將百人護送四五十里以自結乎至五十里金欲返公又拉之行百餘里金乂欲返公曰汝獨返勢弱倘貴五伏人待汝奈何今去栁且近汝何不與留偕至栁而偕還金遂以百人至栁其酋長十餘人皆金死黨驍健會金於路躍馬而墜公以機責其酋五六人曰何不護金而令至此痛抶之五六人皆病創卧然尚以公愛金故被抶不敢恚公金至栁入參將府公命夫人見金曰金我兒子也金得官聽調往來貴縣吾縱不在汝必見之金益喜置酒勞金與其酋是時諸大酋其五六人既病秩卧獨四五人從金而留所部打手百人與金兵百人皆營於城外栁城故有狼兵二千人足以虞變公將縛金先以狼兵三百人護巡按三百人護兵備而以三百人入參將府待事謀既定因酒中戲謂金曰癡兒子汝往時懼誅又懼貴五逼意常不樂今無事矣何不痛飲金與諸酋皆盡飲至醉其夜遣狼兵縛之黎明遣人召留於城外狼兵夾墀左右立留與其黨三十人見公公大言曰非楊留忠不能成我事以銀十兩勞留取紅紵挂留留愕然公曰汝為之而汝不知乎金國賊也非汝與吾同心誘金至此吾安得縛之留大駭泣下曰留小主人也公曰汝為之而欲誑衆乎公意又欲以疑留於其黨也留懼不能言其黨三十人皆股栗公復曰吾且為留奏功矣因見留於巡按巡按勞賞之如公見兵備兵備勞賞之如公勞城外二百人牛酒而令留率之還賓州遂令留齎牌散遣金衆之在賓州者曰所誅止金一人留既惶恐見紿又虞同行者猜已賣金相讐見殺於路中日夜局蹐為備奔歸頃之遂發病死金兵聞金縛皆散去公乃以金與其酋之病抶者醉而縛者解巡按府而撲殺之思恩復安當是時使公不先欵留則金必不至而且攻城殺人使公在南寧賓州縛金則困獸之鬬何所不噬使公聽韋徐甘心於金則兩客相鬬而主受其釁惟公緩之又緩以漸脫金於五千人之手若剝笋然待其為一夫而後縛之人以是益多公之算而韋徐諸土酋亦益謂公不可測也公見督府於梧時鹽船八十餘阻峽賊不能前左江孫參將千人送之不能督府以命公先是公泝峽峽中大酋侯公丁嘗謁公公寄六羊令公丁牧養至是遣人取羊於公丁公丁奉羊至潯公命諸鹽船牛酒犒公丁與其從人謂公丁護船上峽公丁身居公舟尾命其黨乘小舟護船囑曰吾以身質於沈公護不謹吾碎矣公因命班首一人與公丁從人護船至武宣未返時孫參將與左江兵備聞公丁在公舟欲乘間捕之而密言於公公曰此斷不可人信我而我詐之不祥招而縛之不武且獲一人以疑諸夷將焉用之此斷不可公居常有所徴召雖其深溪絶洞未嘗不來其來雖桀猾宿惡未嘗輒殺其可諭者諭之其不悛者必遣還巢而後捕之故公以此語兩人兩人猶豫未決公乃摘公丁告之故曰可亟歸矣公丁大感泣去而公所遣班首護鹽船上峽者亦遂不失升斗公以報督府督府笑曰孫參將千人乃不如沈參將一班首十八年七山之役奪兩參將於虎口功尤竒公膽勇機警善撫士其私財與所得俸祿賞賜半以給諸人為耳目者其出兵多齎私財以行有先登與斬首者就陳給賞不失頃刻故人爭盡死力公嘗笑曰人以資財積賄賂而博官吾以資財積首級而博官豈為非計哉其征陳村時染危疾所部皆自戕於神前以禱公刀穿手矛剚股鈎刺脊繫鐡鎖械之痛毒諸體皆遍最後至者一人無所施乃箭貫喉為禱其得士心如此蓋豫宦逰而得當世名將數人北則馬永梁震西則何卿南則公震與卿豫未之識而識公與永永魁瓌長貌而氣特沉毅見人俯首下視寡言笑公短而精悍目炯炯燭人議論磊落激發皆所謂偉男子也公與豫稍談及廣西事豫是以得撰次之公戰功尚多余不盡聞也公謂豫言當世固多良將患在牽掣齪齪不能展噫嘻若公者猶為未盡其用哉沈紫江戰功後序羅洪先荆川唐太史敘紫江沈公戰功皆栁慶以前事公為參將最久在栁慶十有三年始移溆瀘故其功在栁慶亦最多其後總兵貴州且謝病會西北有警詔屯宣大未幾以署都督僉事總兵江淮二年調廣西三年復為貴州自溆瀘後每嵗必有擒斬然體數被創天隂雨不勝痛楚故數請告其在江淮江淮間素聞公名鹺販之警幾絶日以無事廣西貴州大小十數戰最大者則有賀崖銅平之役始公為參將時知狼兵能制諸猺獨土官猘獰不用命每調土官與共飲食寢處昵昵耳目如其父兄比罷多與生口牛羊金帛勞遣之諸土官喜競以狼兵從公或土官死其妻割愛子十餘嵗者遣來且囑之曰汝依沈爺勿怖逺離我也以是公所嚮輒有功賀縣諸猺據上下磊石諸洞之險出沒焚劫三十餘年未有窺其巢者總督都御史張公嶽謀之諸軍咸曰須沈公來沈公不來即拚死枉死耳而是時公初去江淮留道中其幸功者日上計策數十張公不納伺公至問計所出公曰此難以口舌對也夫兵貴神速因敵變化道有迂直亦有易險冦有聚散亦有堅瑕日有逺近亦有便阻謀有巧拙亦有忠佞疑而示之棄而擊之見形而移觸聲而應者何可縷數也而乃欲刻畫進退持已然以待之不已悖乎且今為將者貪暴而昧算者也夫惟無算故不得不授計於上禁貪止暴上亦不得不遙制之事機敗於札牘之煩緩急左於期會之豫往則空壁歸則詭功而軍又已耗此失之於不擇非任將之過也今去賊巢十餘日爾耳目不接安所得其形狀哉公能聽儀請以便宜許之誠得便宜以行而一不效儀固無所逃刑也公喜執手謂曰吾今乃知沈公遂以諸軍付之入巢數日而殱龔廷虎五百餘人餘黨奔富川公曰不窮根株他日拱蘖未可量也乃復深入凡五旬得級三千餘俘獲倍是張公上其功實授公都督僉事是役也使張公惑於幸功者之口不俟公至諸軍必觀望遷延功不可成使公制於張公動必仰成即有功亦不能弭患公多謀善斷凡此類也又明年而崖州變作崖在瓊之南背五指山面大海黎岐兩姓蠻藪居之而黎姓最衆土人槩呼為黎黎有生熟二種熟黎奉令應公徭如制獨畏漢法不敢踐更而嵗出更錢其性顓愚可計紿而土産香藥竒貨又重利中州監使數嵗不一至禁網闊弛州縣恣為姦盜市猾導官奴户徴諸黎更錢以便朘削每至墟落中解鞍投鞭分懸諸黎門户諸黎恐具食飲土物相餽然後聽算更錢錢直十數倍不敢丐免而知州邵濬者既黷貨其所遣官奴尤黠桀無賴既懸户鞭復私隱之以責黎首那燕痛飲出一牛以償而以一牛自贖官奴不嗛縛置庭中笞撻之諸女婦更出叩首服罪不許其子不勝忿強起解縛迫逐官奴官奴驚走以反狀紿邵邵遽上變而官軍者又鬭格死那燕知不免連結感恩古鎮諸黎為變八年不休都御史歐陽公必進上疏議剿且以公將兵請既報可於是崖感萬州古鎮陵水五道部署既定刻期待發而公以病愈始至謂歐陽公曰法家斷罪必分正從殺人者那燕使那燕殺人者誰乎今崖感古鎮相煽從逆如虎投穽其勢不可釋矣萬州陵水未有黨惡之實特蹤迹之嫌爾而并欲除之其視首禍如何哉且其被剿撫定數年未聞有他也疑而誅之則傷仁撫而誅之則墮信儀以為莫若止出三哨則兵并而力不分三哨捷雖有異志者且禠魂矣是公以生賜萬州也歐陽公曰善遂并五道兵以中哨入崖州而以左右哨當感恩古鎮俾公總之且謂公曰軍中之事惟所進退不相尼也公渡海斬不用命者二人諸軍股栗攀蘿緣磴以入直至五指山下縛其首惡符門斂那燕那撁等五千四百有竒俘男女二萬餘人既班師而有貴府之命捷間進公都督同知賜金幣公以征黎之年至貴州再征銅仁叛苗擒首惡龍許保龍七保等九百有竒其入銅平策甚竒公祕不以告人人亦莫有知其説者或者謂公征賀則索富川征黎則指萬州擒縱迭施猶鬼神不可測度然識者以為今之將領患功不成級不多耳甚者屠村堡掠子女以取盈此亦邉徼故智而嶺南又其最甚者公生長其地獨不蹈襲且以一言全數萬生靈之命此其心可與衆人道哉憶嘉靖戊子余計偕至京師聞西粵土人請公於司馬願得以為栁慶參將於是始聞公名其後讀荆川戰功敘心益慕之荆川既善為文而公總兵江淮開府鎮江與公數相見其所敘皆公口中語以故情狀曲盡每誦之如親見其躍馬彎弧叱吒之勢其借箸畫籌彈劒決勝眉目霍耀人前又可想也賀崖諸役惜不令荆川聞之盡入摸寫以補百將傳之所未備然善觀人者即其一二事亦大要具矣惟敘栁慶時不著劉現盧回事豈以為非戰功耶劉現盧回者思恩土酋與他酋徐五韋貴相仇者也徐韋與爭洞地不勝思嫁禍於我以千金賄他將上變都御史蔡公經從衆議剿之而劉盧連敗徐韋乘勝攻圍武緣勢張甚公自栁慶謝病家居而安南議起用事者數強公堅不應至是蔡令參議陳公茂義都指揮白公泫就問計公大言曰二公不畏死事濟矣陳曰奈何公默然良久曰非謂即死顧膽大耳陳曰豈少我耶公曰不然吾知公足辦此以故冒禍出此言也夫劉盧為仇所逼非故反我其愛生惡死豈與吾人殊哉誠用儀計至武緣盡遣諸軍而以數老弱卒白手從公入其營數言可撫而定也陳曰彼瞰吾不備見留奈何公曰彼固求生安敢犯公幸諭之曰若輩爭洞地今攻武緣何也且仇家欲甘心久矣奈何又以武緣為口實若不自愛乎彼感泣悔罪則又諭之曰今朝廷有事安南若誠悔罪胡不束身自效而還衆兵於洞仇家其將若何二酋必踴躍聽命公以善言撫之可不棄一矢奪萬人鬭志也陳曰若是而公以為出言冒禍何也公曰他將得千金業已舉事今欲散軍保無危言相激乎二酋伏公以出保無他慮令中變乎吾計行必見仇於他將此吾禍之所始也陳毅然曰吾為公保之公起手納牘陳袖中曰投之蔡公此吾之招狀也二公至武緣如公計不失分寸兵遂解以二酋歸而他將入千金者終始相尼一一墮公計中不果行即此一事可謂折衝尊俎者矣余既不獲見公聽其談論而都御史張公烜為余語者僅僅得此且云今謝病去自貴州以來大小諸戰不知有為敘録者否其祕不以告人不知何也法曰善戰者之勝也無智名無勇功不戰而屈人之兵倘公進於是乎人雖善為言亦安所用之哉明文海卷三百七十九
