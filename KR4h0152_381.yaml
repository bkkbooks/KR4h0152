body:
  text: 明文海卷三百八十一餘姚黃宗羲編記五十五名號栁塘記張詡天下之至樂生於心而會於境心境兩得難乎其遇矣心玄而境閙不害其為心之樂也境寂而心擾所謂境者雖佳心為之役矣謂之安不可也况所謂至樂者耶豫少從先君宦遊臨川前之人於公廨隙地輦土為塘沿塘植栁偃仰披拂於朝煙暮雨之間千態萬狀可數十本塘之水微波巨浪隨風力強弱而變化可數十丈鶯燕之歌吟魚蝦之潛躍雲霞之出沒不可具狀則境與心礙既塊然莫知其樂之所以稍長讀昔人栁塘春水漫及楊栁風來面上吹之句則心與句得又茫然不知其妙之所寓近歲飬疴之餘專靜久之理與心會不必境之在目情與神融不必詩之出口所謂至樂與至妙者皆不假外求而得矣是知得於心則雖處喧囂而江湖之思日逺居闤闠而山林之氣日生不然漁釣之徒樵蘇之侣土木其形草葉其衣其狀若類太古者然叩其中有所得者何鮮也豫同年黃户曹弟子振數相過往因出其外舅氏陳公用直别號栁塘者求記豫居去公雞飛之地市井之喧闐突煙之相接求尺丈空隙以為廬居蔬圃之地且不易又安得所謂栁塘者耶然公託意於此殆所謂得於心者非邪若然則乘灝氣而與造物遊雖居窮巷斗室樂也否則坐喬林以終日泛巨浸於萬頃亦境焉耳心既不能與之會所謂樂者又烏從而生哉然此可為有道者道也求道者安得不自身安始而身安安得不自擇境始耶粵多佳勝去城西北不數里林木之茂盛泉流之清深在在有之公擇其勝為别墅濬池植栁以求所謂心境兩得者而老焉彼數百緡之費耳異時從公席緑隂而濯漣漪咏昔人之佳句會至樂於千古為公續記尚未晚也峰湖記林俊峰湖本方壺樵谷故鍊冶處梅峰東引而水與湖會山截焉嘉樹蔽虧修竹環映無飄壒浮歊之所城中隱一山林殘碾斷竈參錯於假山方池磴回川曲之間又若蛻馽絡以遊乎方之外豫友陳君敦賢愛之翔其直而市之徙文峰之居居焉因引為號久之曰無殆神仙者流意固有寓其未足告也抑地之名舊名之我亦熟矣吾取其似代之易峰湖黜虛就實援之彼以入之於此吾儒運化殆其然歟神仙吾不得而知也世無是人則宜無是事倡為是説非獨方士之妄蓋有托而逃者矣君風神清脫運博而操之要視天下事若無其難在司諫有直聲逆璫時例與調停方壺所以寄也起藩參又起臬二提學懸穹付以待者不淺峰湖無蚤計耶士君子身雖廟廊未嘗一日忘林木魚鳥之思峰湖嘗在煙霏泡沫流止而生滅者祗見其小也傅巖渭濱南陽藏身巷影拔俗而離世一旦乘時應會使人指而駭曰此築徒也漁輩也耕流也突然起其若是烈也是固吾儒作用之常要之於山水不為無助山受而大水受而深積而至於含元氣宰化機長養萬族贊發育以遞承二五之匱峰湖固寓彼而取此矣其獨留情一玩適哉若乃酬雲水赴煙霞還迹山靈梅山香眉山爭其崇髙湖鑑湖爭其淨冽峰湖十年外事未晚也正德乙亥秋仲鳯山見素子林俊記於雲莊青野間叟記陳音李君伯珍家東廣之新會以齒德重於鄉鄉諸大夫士皆樂與遊處白沙陳先生公甫為號曰間叟其子鄉貢進士經上春官因豫門生余紹夔請為之記豫曰叟日何為紹夔作而對曰叟之居地僻而靜庭植花卉數十本日然香靜坐客有造者命童子汲寒泉瀹茗與談今古事坐久摘蔬出春釀與飲歌陶靖節詩以侑觴生平迹不闖公府郡邑吏未嘗窺其面或勸之事要結以張形勢輒他顧不答囷有餘粟囊有贏資假於人任其自償未嘗持劵責逋負每朝旭既升方于于而起杖屨出門行撫茂樹而坐與溪雲野鶴相徘徊於泉石之間不知軒冕之為何物也豫曰叟之間如此然獨無所事乎紹夔曰叟有田數十畝春夏課僕耕種耘耔秋斂穫供貢賦罔敢後時命子弟讀書習禮日校其修業與否手嘗持一卷獨玩怡然若有所得宗戚故舊有吉凶事慶弔以禮此叟之所事也豫曰叟之事亦殷矣顧安得所間乎紹夔俯而未答豫喟然嘆曰此叟之所以間也夫事有當為與不當為者當為而不為與不當為而為之皆非所以貽安而得其間也蓋人之處世有親戚君臣上下安能恝然無事世有惰其支體浪不知檢束以至隳墜先業為公私所窘雖欲求間不可得者此固天下之棄民也君子奚取焉又或資其智巧趦趄囁嚅於形勢之途憑藉熇熻以陵轢乎人竟至招禍尤觸罪罟而不知悔如是者又安得一日間乎唐人之詩曰好樂無荒良士休休揚子雲曰大味必淡知大味者然後能淡天下所不能淡其叟之謂歟豫與叟未荆識聞其事而心有慕焉用為之記未知白沙之號叟者其果然否也經持以質之尚旋以告哉越坡記舒芬荆之濓豫之洛雍之關閩之建安形於自有天地之後也濓之周洛之程關之張建安之朱生於自有聖賢之後也然濓不與荆而俱顯至周而始顯洛不與豫而俱稱至程而始稱關不與雍而俱稱至張而始稱建安不與閩粵而俱稱至朱而始稱則地固以人而顯哉周之生以濓而不羣於濓之所生程之生以洛而不羣於洛之所生張之生以關而不羣於關之所生朱之生以建安而不羣於建安之所生在絶學之後千餘年矣兹越董楊王韓突然而出其上則人固以道而顯哉夫然後知人之所貴者道而地之所貴者人况周之聖二程張朱之賢實有以繼堯舜孔孟之統非區區聞道者之比濓洛關建之獨著不亦宜哉不然則王之臨川陸之青田得以掉臂爭雄其間矣榕城之有越坡亦舊矣而略未之聞焉吾同年廖子居之而始見稱越坡其有遇乎哉豫疑越坡與建安連壤建安之山至是而其氣始盡建安之水至是而其脈始合是其靈和清淑之鍾而為人必將有繼朱子者起豈非廖子其人耶五百嵗而聖人出三百歲而賢人出自朱子以至於今豈非其數也廖子之學期於道者也知朱子之所以賢者主乎敬亦知周之所以聖者主乎靜蓋亦卓然有立者矣俗學文詞之陋末習利祿之私豈得而惑之哉詩曰我日斯邁而月斯征必無負於越坡使百年之下得與建安並稱庶乎其可也西溪記許相卿秀之地以水勝下而平湖水與地半又加勝焉最下而西南有溪卑居𢎞受地若盡而水無涯故其勝尤竒方夫上流諸水發於山道於江以達於川澤陂渠之間也大決橫放雷驅雲擁物鬭勢激變怒萬狀亦壯矣哉逮乎力分氣殺疾者舒悍者恬險者夷蜿蜒委蛇以底於斯萬頃湛如鑒徹空明黛蓄膏渟凛乎與神俱澄又何勝也而况霞映錯綺空連逺碧風行成文日涵生色雲煙雨暘開斂晦明而變態靡狀者天若相之險而石蹲危而橋橫斷岸深林呀如奧如柴扉竹屋隱見蕭踈而髙下畢呈者地若形之沙禽水獸之出沒遊鯈躍鯉之浮沈新緑倒影落紅浮聲渡者淋灕歌者激烈漁舟逺近泛泛如葉雜然前陳者皆若有意回巧而獻技焉此一溪景物之大都也若夫泠泠之聲以清耳瀯瀯之狀以清目淵浤澄涵之虛以清心觸而成畫感而成詩至於神會而境遺則善觀物者所自得又非言之可盡狀也某奕世家溪之東因自號曰西溪適也而遊倦也而卧意得而吟事感而嘯無不於斯若將終身焉趙君鴻逵其里人也過而謂之曰出處士大節也然古人曷嘗容心哉用舍任時而我無與是以處則出之用存出則處之道行要非茍然而已今子樂一溪之適而飄飄然洗耳濯足以為髙是有心以適已與無我以任時者無乃疾也乎某若為不聞也者而歌曰文駟華轂非吾期兮泌水濠梁惟吾師兮吾老吾溪其樂只且君不復詰間以語余余曰夫夫也豈有意而相時者耶抑為我而志世者耶直甘於素分而安於樂土者耶俟豫興至泛舟當湖造其廬觀其為人製招隱之詞以諷之君能索我於西溪之上否乎君曰唯唯兹溪重於秀自子始矣作西溪記鐡橋記陳沂鐡橋先生南海人南海有羅浮山四百峯人迹罕至方士稱神遊羽化之術者託迹於兹山相傳多怪誕不稽以駭於世有云山飛雲頂最髙峻壑絶澗猱狖所不能緣而至顧其窮處有橋其上恍若雲氣一人獨振履視之鐡所成也馮虛御風進却無所惟果於前而已至此即長逝不知所往餘惟驚嘆皆不能從焉先生曰窔窅之區至明在焉絶亢之際至夷存焉怫逆之境至順伏焉荒虛之中至真出焉故惟用幽而後明用險而後夷用違而後順用妄而後真謂之區化境亡不見其際而不入其中夫然後超也飛雲之峰絶淵之壑是使喪氣絶想無復有可即之者矣孰構孰冶孰因孰極而又孰後之耶故曰莫由從者妙也不可為者化也非在我者幾也非爾力者巧也所謂殊塗而同歸也因自號曰鐵橋子人稱之曰鐵橋先生不知者以訾其異先生笑而不答拘虛子相别者十年矣過楚而遇先生見先生之政曰信乎鐵橋之難行也石田記祝允明君子之心望於世也亷而自治也勤其望之亷故甘為未輯之瑞治之勤則不寧耀其生耀無窮焉蓋有不度而試者以杙為楹以撓人之堂殿君子視人恆若餘視已恆若虛每退一武曰吾弗彼若則弗可以試非謙也其自期者遐而更覺其歉而不知其已度越餘子逺矣伍員之喻石田以弗稼猶無田也沈先生則弗稼者與其以為名所謂君子之心也先生者巢許其居服而禹稷其腎腸既自退曰吾不敢豐望於世為是名已乃去以道自治削蕭莠抉沮洳揭其堅白以對日月爽然風塵之表璆琳琅玕從厥自生自潤吾亦不強自鍵閉唯不為太倉玉食之需安於寬間之野壽於寂寞之濱焉耳吾何恧乎哉或曰審爾先生亦獨潔者矣而亦烏乎耀於無窮與余曰先生之植志操節也不可窺吾試與若窺其詩非孝忠節義也無觸於膺無寄於聲油油乎茁元化之嘉種粒蒸民於終古其不類杜少陵與杜之位不過一員郎無片事自振當時而自方稷契人不笑之以詩史耀也而先生又惡乎恧哉先生之為斯稱也在少而小子言之於其老凡言諸先者當以期今則定矣敢以垂贊無止南疇記方豪豫所來刑部所居窗下有一樹命曰見樹窗間嘗和寮友葉國光歸興八首其一有云日月西臺上開窗見樹孤釋犂坐芳蔭不得比田夫時甫脫風沙頗為簡適雖有南疇之懷而未切也故其辭緩以平春來有事圜扉晝不離席夜不安枕與罪人相去者無幾矣南疇之懷怦怦忡忡故因沈魯卿南疇之請題詩若曰南疇生事佳往來東臯叟西臺困簿書對爾北回首所處漸困其懷稍切矣故其辭感以悲未畢事一日俄被執以去茫不知所以既至朝門乃知凡諫南巡者皆五日跪豫不可免焉跪已以為跪爾豈意復朝撻之撻已以為凡撻者皆豫等爾豈意以撻死者相繼也創居無事惟以賦詩為事其送徐甌寧詩有云玉女峰前春水流棹歌初歇鳥聲幽煩君早為營茅屋不復當年夢裡遊嗚呼南疇之懷至是切矣故其辭激以決甚矣豫之陋也夫豫自崑山以歸棠陵之南有地曰平岡先人遺田數畝乾溢無所虞每歲稼穡其間固嘗躬饁而時課之以為終身南疇焉矣越五年復為貪心所使雖不忘舊懷然非觸之也深其懷之也未切而亡有激決之辭矣辭雖激決然乂未知果不為空言否也甚矣南疇子之髙也遂其懷而無俟於觸此南疇子之所以為髙也南疇子豫浙西人也浙西多腴田南疇子於先遺之外更增創焉桑麻粳秫一望數十里其俗又多管絃歌舞肴醴童奴之奉山木花石亭榭魚鳥圖畫之觀每芳辰出遊則畫船載酒歌舞齊發平波緩彈若浮家宅隨所意好鮮有弗諧南疇子之所有者豫之所無也風埃雨潦被暑衝寒施慘而臨穢觸禍以殷膚逺貽怵於親近延悸於妻子豫之所有者南疇子之所無也夫南疇子之所有者豫昔固略有之而今盡無之矣南疇子之所無者豫則盡有之矣甚矣豫之陋南疇子之髙也南疇子名粟字克濟姓陳氏南疇者其友沈東臯所命也祖道微翁有仕基隱於村南時號南陳父靜庵翁亦隱世為善良人云澄河記宋儀望去邑城稍東界於兩水之間突為平岡外垤而內窪漸浸為湖湖旁多良疇果園宜於粳稻菽麥槐楊李梅橘柿芙蕖東湖劉氏世居之先世以文物科第望里中姻家劉君璣早歲試諸生績學待時卒不得售乃退而老於湖上結茅葺屋日偃息其中自號澄湖居士有玄同子者里中人也喜為老莊言翼日居士過玄同子劇道湖上之勝玄同子曰吾子誠有味於湖願卒言之居士曰余曩也從博士業覽鏡百家摉獵舊聞廢於寢食火蒸蒸內起猶然不肯休今幸見棄有司返乎故吾向之浸淫交鬬之患若濯於清泠之淵而不復干於前每出遊湖上旁皇四顧波光上下目接心謀嗒焉相忘當是時雖有三公之貴百乘之富吾不願與易也玄同子曰固也夫水有大有小有清有濁流為江河浸為陂澤渟為湖沼彼泠然之淵靜徹凝膩顧而樂之可以怡心神淡智慮宜子之眷然不能捨也假令歷龍門涉洞庭下三峽倏忽之間叫怒撞搪霆鬭汛擊洶洶湧湧破山走石目為之營救耳為之震撼心為之惴栗將卒然失其故常而莫知其所由子將奚若居士曰然吾聞擇地而蹈則險巇之患曷至循性以安則驚鬬之情不作古之人終身巖穴頽然蓬藋之間彼又安知龍門之為鬭三峽之為險乎玄同子曰嘻如子言子之心殆楗矣夫道無常物有當無常則萬變不能執有當則羣類不能逃是故物生有是物生有非必是其所是則是亦非是必非其所非則非亦非非請以水喻人臨乎清泠之淵則喜喜果是也邪值乎風濤洶湧之變則懼懼果非也邪喜亦一心也懼亦一心也此為是則彼為非其將皆是與非邪其將無是與非邪是二者則有辨矣子獨不見北海若與河伯相譏切乎方夫秋水時至百川灌河河伯欣然自得北造於海望洋而嘆北海若示之以人和之以天浸淫之以大道因乎分量察乎盈虛窮乎有無然後知天地之為􅲤米也豪末之為丘山也吾子則何居焉於是居士茫然失其所對仰天而嘆返袂而走馳見華陽子曰今日吾為玄同子所困吾幾不為人矣願先生往辭焉華陽子相與偕造玄同子而問焉曰吾子何難居士之甚也玄同子曰吾嚮見居士盛談湖上之勝意若自足者竊哀其局而不通滯而不化故縱言及於老莊居士乃茫然不能答吾子以為何若華陽子曰居士失矣子亦未為得也子未嘗究晝夜死生之變是非利害之因內外動靜之端乎古之至人其動也天其靜也地入水不溺蹈火不熱是故處乎無窮之紀而立乎萬物之表內不淆神外不滯物其於晝夜也死生也是非也利害也若氷釋凍解循其故然運而不有河伯忘於秋水北海若忘於海居士忘於湖今吾子乃揭揭然索之於是非之辨傲之以所不知宜乎居士之茫然不能對也子不聞程伯子之言乎與其是內而非外不若內外之兩忘內外兩忘則澄然無事而又何膠膠擾擾得此失彼之足言乎於是居士躩然謝曰豫嚮也矇未嘗得聞大道之方今聽先生之言其於道也若發矇矣遂去不復與言兒瑜壻於居士輒請書之詩不云乎唯其有之是以似之居士幾之矣明文海卷三百八十一
