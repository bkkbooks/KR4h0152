body:
  text: 明文海卷三百八十二餘姚黃宗羲編記五十六興造信豐縣重建譙樓記胡儼贑之信豐縣譙樓久圮縣令建德謝洙重建之聳然起一邑之瞻仰新田巡檢顧宗敘士民黃倫覩其壯觀告於令曰斯樓成功不易茍無文字載之何以示後洙乃寓書於其鄉人南昌縣儒學訓導邰汝能來徵記樓之制七間髙三十尺深加於髙者又十尺始事於某年月日訖工於某年月日凡材木匠石之費皆令之俸積也樓成前臨南山後峙浮屠碧桃之水繞其東九日之岡盤其西規模傑特簷阿翬飛丹碧照耀溪山之間起積廢而一新誠可記矣夫譙望也一曰樓之别稱譙樓謂門上為髙樓以望故美麗之樓謂之麗譙世傳麗譙之樓魏武所造畫角三弄乃曹子建撰初弄曰為君難為臣亦難為臣難難難次弄曰創業難守成亦難守成難難難三弄曰起家難保家亦難保家難難難今角聲之嗚嗚者乃難字之曵聲耳所以警人於昏曉之間使之感悟而有所懲創也至唐節度使辭日賜雙旌雙節行則建節立六纛入境州縣立節樓迎以鼓角今郡縣有樓或置鼓角不過為旦暮興息之候耳又嘗聞李衛公軍城及野營日出沒時鼓千撾凡三百三十為一通鼓音止角音動角十二為一疊三角三鼓而昏明畢角音之數與子建實符今信豐之重建斯樓也于以出治教于以集吏民于以書雲物皆有關于政事豈徒然也哉若時和嵗豐民物康阜令與賓僚登斯樓覽觀山水從容燕樂以詠歌聖化慶幸遭逢於太平之世不亦美歟是為之記重修徐州百步洪記商輅徐州城東南百步洪勢極險峻舟行艱於上下外洪大石百餘如獸蹲狀人呼為翻船石裏洪壩下數灣屈曲如之玄字每嵗官民船經過被損以百數賦稅供給之雷商旅之貨物淹沒至不可勝計甚者舟人亦往往因而覆溺東西兩岸縴路低隘稍遇水漲遂至瀰漫無路可尋水退則土去石出巉巖磊砢艱于步履官府督工修治鋪草萬束輦土平蓋費財勞民僅取便目前已而水至則前功盡隳艱險如舊自永樂間通漕以來所費不知其幾矣成化丁亥冬官主事郭升奉命守洪至則相其洪勢度材量力鋭意修治博詢土人廣採輿議遂具疏請之於朝及移文部堂并總督都憲咸以其言為然於是募工鑿去外洪翻船諸石補平裏洪壩下數彎東西洪岸并縴路各用石板甃砌扣以鐵錠灌以石灰既堅且固兩堤各植栁濬井以蔭濟行者凡其關於洪道有益於漕運如金龍等神祠觀音閣公廳閘廳鼓樓及軍夫所居共二百餘間重修增建煥然一新所費錢榖以萬計悉設法勸率所在軍民一毫無取是以人不知勞而功易就始於成化戊子春正月成於明年冬十月舟行至此如乘安流東西撁挽獲履坦途往來之人靡不稱快儒士𢎞毅等以主事有功是洪不可無述不逺千里求為之記惟天下事無有不可為者但安于茍且樂于因循以為人之受害乃勢使之然卒至于功無所成害不可去者多矣此豈仁人君子之所用心哉昔李氷鑿石堰江范希文築堤捍海皆急于興民之利而去其害郭君先在臨清三載曽造遮洋船七百餘隻改修南枝等閘挑濬觀音嘴等河人至今賴之而於此又克成偉績使去險即夷易危為安其利濟之功豈小補哉郭君世家崑山近籍潁川由進士拜今官亷勤幹濟將來名位未量其諸助財修建者列名碑隂庶使來者知所勸云城南漏澤園記崔銑皇上聖知天授裁成古今禮樂之宜正祀郊壇宗廟躬修農蠶之業先天下本務詔天下興飬濟院漏澤園增置義塜大哉聖人之治天子子萬民如有死而鰥獨莫為收掩即有子貧無地以施封窆乃捐中野肉餧逸犬饞鳶南京俗傳火葬不問尊卑付諸烈熖僧則菴名化人遊民則儲火具道諸葬者因以取利大司馬甘泉湛公既毁劉公淫祠以法辟僧及民入其地于官又曰凡有人心者豈其甘於是實欲置無所舊漏澤園日荒如詔旨雖然死者莫可計彼數十丈之區奚以容乃披裘冒風雪率其屬搜棄地於四郊果有則請于朝各封界為阡此在南者最沒官地三十畝一大阡又贖貰田三十畝並鳯臺者三阡為地一百四十畝並安德者二阡為地十八畝養虎倉民田二十七畝為二阡其貰田則檄城史嵗取二入辦羞醴通四郊之阡之無祀者凡葬以死之期為次男子自左隅以次右女子自右隅以次左前列周斯理中列逮下列又起不得廣穴失序各立表識嗚呼爾窮民生而凍餒院有養濟死而焚棄園有漏澤食味被服終爾天年與夫飽鮮著綺者同三泉之銅與夫石槨文梓袵錦含玉者偕返真於玄壤民無怨聲戾氣疵癘於兩間天乃出至和為應休見沴伏大哉聖王之治湛公協于一德古所謂大臣者歟貴州貫城河記席書今太豫少保刑部尚書兼都察院左都御史洪公先於𢎞治戊午以右副都御史總理幽薊戎務甫至首建大策治潮河川塞北敵南入之路事過半而尋沮嵗甲子詔仍先職改撫貴州貴州古彛蔡地入國朝為宣慰使司初𨽻四川以行都司控制其地逮永樂間始設藩省省城隂有溪遠出彛箐貫入城腹曰貫城河每夏秋水泛沿岸居人廬舍門墻率為傾圮人畜漂溺貽患有年公詢故老前巡撫蔣琳正統景泰間嘗於郊外上流傍鑿河渠泄水三四皆于南山滙襄陽河由思南浮於涪逹於江物換星移渠湮木拱故迹罔尋公親詣沿城度勢揣功乃會鎮守太監揚賢總兵官都督僉事顔玉集議修復財費資之公帑器具給之舊儲夫匠需之近衛率半月更畨經畫既久乃屬役於三司刋木斬道塞汙攻堅人樂趨事不五旬而渠道底績兩流既導城市胥安此公卧鎮之緒餘非經略之素藴也今嵗父老咸詣左方伯郭君紳請石以紀遺惠屬書為記本未或曰春秋大事則書小事可略貫河雖成法不必紀潮河宜書事未克成嗚呼貫河之可不書固也使潮河有成羣頌成碑惟其無成衆言成訟兹假貫河之石以伸其説可乎豫始未涉潮河之涘未嘗不隨衆悲喜者後以銜命過臨乃知兹川之在京北萬騎足以馳驅彌日可及都鄙河不徙則川莫塞川莫塞則敵莫禦鑿山而工已什五引流而效臻十二兹役果成乃國家萬世金湯之利豈直貫城河繫於一方哉顧以偶以失利不勝羣議而止兹有説矣天下事其成有二以順舉者人無怨讟士有頌聲雖庸人亦爭為之至有事關國社機伏安危不勞人不永逸不重費不長治夫自愛其身者人情也孰肯犯衆怨而冒為之哉間有豪傑之士炳見幾先忠勇體國為古人所未嘗任衆人所不敢然卒之委不專任不久口語橫生鑠金銷骨輟九仞於一簣隳萬里之長城往往是也由此觀之潮河之難成也何怪其然與噫樂成易謀始難吾見公之圖始未見公之底成是無惑于人議之譊譊也然公方執法中臺入參三府名實日加于上下庸知潮河之墜典不興復于今日歟萬一不然又庸知潮河之遺憾不甚于貫河之遺思歟夫貫河之功貴人思之貴人知之可也潮河之議一詘國是終晦國斷未伸其如天下後世何哉豫故以帝都天關之議竊寄蠻煙瘴雨之濱非為公言也為天下後世告也公名鍾字宣之杭之錢塘人耀州文正記唐虞佐耀州古祋祤之地也漆沮二水合而從之緣山為城城之北維則學宫在焉顧厥基弗廣館舍儉陋士執業者祁祁日繁至于僦屋以居弗能一其志而專其所業也距城二里聚阜為陵土覆若釡上平若砥聯五臺之峯附鑑山之光乃屋于浮屠氏棟宇溢其制金碧侈其文浮于學宫不啻數倍矣知州趙時憮然嘆曰宜廣者從其隘而宜毁者從其靡乎正之厄而邪之昌也咎在豫有司于是乎集弟子安紹輩議變置佛宇以廣弟子舍分守參政潘塤分巡僉事周鎬韙厥議知州遂列牘請于巡撫中丞灤江王珝珝曰黜邪翼正孰曰不可抑聞宋文正公仲淹初知邠州慶州後改户部員外郎知耀州刺史稱公政務忠厚所至有恩固不誣也先是邠人慶人嘗尸而祝之而今沒五百餘年于斯耀之祠闕乎哉吾懼民無所系屬矣亟遷土佛而踣之因葺其宇即以之為公祠因齋廡以居弟子員毋怠吾將巡功焉知州承命惟謹乃盡撤諸法像聚僧衆于庭訪其俗而還之因廡為堂得五楹設公之像于中嵗祀之旁仍其材以之為廡東曰經義西曰治事皆得九楹分弟子員居之南建門得三楹命曰文正書院過之者肅肅如也北循崖穴上室塗塞其罅啓其扄户共得七楹旁五楹分秩經義俾日會焉擇年長者長其約會畢乃至中二楹更相問難如讐如訟即弗禁也經始于嘉靖二年二月二十日迄于三月十五日則落之聚材貿工皆知州為之民弗知也亦弗病也龍聞而作曰大哉聖人之道乎猶夫海然也君子于道水之于海學之而已今夫水浮之為川坎之為瀆滙之為江河向若乎海而莫之及也然學之不已未有不至于海者也是故愚唁執其一德狂狷懵于中道仰視吾聖人望洋乎其思也茍矯其偏而割其過卒亦必至而己矣美哉公也雖于聖人猶有間焉其始講誦通乎六經論説本于仁義及其至也恆先天下而憂無負聖賢之學又豈啻川瀆而已哉蓋坌乎其源潏乎其瀾而浸淫于江河矣由是循其津涯遡而上之雖聖人之道可以幾而及也二三子慎之哉炙公之像則思對越其神明焉誦公之詩書則思論其世焉靜以定志敬以居業篤于信道學以辨之力行而蹈之庶乎無不至也若以小慧間大義羣居嬉嬉焉即聖人終嵗與居則何益哉浮屠氏將指而笑若曰若殆儒其名而墨其行者乎吾懼公神蹙然有憂色矣是非所望于二三子者二三子曰吾儕固不敢也果州浮梁記任瀚越巉巖驀幽壑出虎豹猿狖窟穴刳剡離竒輪囷以航清泠不測之淵使人絶長江如道唐除厯都市不知􅚡漾出風濤上此非有雄才峻略強仁義埀功勞永世如孫叔敖杜元凱諸人其孰為此者長江在天地為物最險嘉陵江出劒南軍負果州東郭而下望之濤瀵張天名漱玉灘者又荆吳梁益通津中流齒齒多怪石夏秋水盛時石隱不見漫然且成安流至霜降水落則乃衝薄震蕩杈牙怒號過人瞬息失便即舟敗覆沒不救下為魚龍餌食莫有出者故篙師往往據舷楫抗臂搘頥邀取長物以困行路乃嘉靖癸丑春郡太守南山沈侯謀諸參佐東即鶴鳴山下西距長堤甃石水步笵鐵以關其中步外各植華表相對跱貫以繂綯繫橫江舫百數十艘版其上施籧篨為閣道以通輿馬往來無復淪滯其傍則為飛檻欄楯錯以朱黫望之若井幹銀牀鱗差陸厯過客憑倚延佇則水煙漠漠鸛鵠鶖鶬交憂上下臯樹傳隂汀花亂人月在菰蒲鳴榔欵乃橫渡琳宫梵塔倒影中流剨然如夢如畫天倪道機皆自浮梁焉發之乃知偉人竒作與造化爭雄自蠶叢開國以來實所未見江山有待將非其時乎昔秦昭王使其大夫李氷為蜀守鑿離堆辟沫水之害蜀人世世祠之今永康軍有神露冕而其袍若王者前有穹碑書秦太守氷以水事奉皇帝祀即如沈侯嘉陵江浮梁功不知百世後宜何所食報也沈侯貞白循良多惠政可銘金石諸無關水事者法不得書重修涇州城訖趙時春涇州距塞僅千里輕騎七日而至城髙不及三仞隍僅仞廣不及附庸之雉稅鹽輸之郭遭世承平暍而不講甚無以副明聖苞桑磐石之至計嘉靖丙午春三月望濱海張君守涇越年能綱紀其民度時與力可以築治庀三之一其工萬尺令曰不以監病工不以工厲民民趣治役如庀而止得歸業先而鞏者慶後而窳者罰髙廣深浚視古加三之一而贏稅鹽屬之城毋為寇保民知利病所暨爭歡鳩役畢四旬而竣居者有保行旅有歸州人以為利張君來徵余文紀石以示永久余自庚寅秋免夏官士至己亥秋而赴史氏召與民居者十年再為史職嵗三月而免在民間者又七年其較民利病悉矣而最深且巨者莫如城公使之督修城者旁午於道率不省城可否但具印文取例賂而去城不可完賂不可止上之嘉猷不下施下之膏肉富私室君子為之太息焉兹涇之民何幸而得張君哉守塞列城數百官吏文武倚城而蠶食公私者滿萬城如之何成民如之何而不死且盜徭稅里甲凡官之役如之何而又肯亷于監城者以自瘠也安得盡如張君者舉而屬之以療吾民之危苦乎使余如之何而得已于言不以哀鳴以號于世之大人仁者庶其隱而救之也嗟夫余以無事而哀有事世目為狂遂再廢不振今又指摘小民之困呼噪以取罪余為狂迷以至此哉楚有狂夫自投湘江髮已被矣漁者挽篙以救之尚呼曰而勿救我而趣救楚郢吾哀秦師之虜楚也吾赴清流死矣幸免為轉尸卒溺焉儒生有袒跣而行吟冬雪中者或憫其凍呼之使就燠生不肯曰吾雪能阜吾民田吾喜而賦詩良不苦也已而僵手尚握厥詩余之文得無類此將無為張君哂乎君名髦士字令夫濱海之霑化人先翰林君教諭弟子以甲午山東鄉進士守是州熟余之狂者自童稚迄今二十有七載其必哀吾之狂以仁吾民乎遂詳而志之建陳渡石橋記唐順之陳渡橋去郭南十里而近當邑西南諸鄉與宜興金壇孔道近郭而又當孔道故往來於其上者踵相踐也橋故以石為之其始作與其既毁而易之以木皆不知在何時今獨有石趾在耳而橋木又不一二嵗又壞壞則輒更而作之夫屢壞則病行者屢作則勞居者而費且不勝計非石不可以久而莫之能任也會有浮圖人德山至遂慨然諗於橋旁之人曰吾力能辦此衆皆曰然因請山為主而相與以貧富為率出錢若干緡不足則山使其徒募錢於四方共得若干緡買石若干募石工凡若干其財取諸願助之家而不費官帑之一錢其力取諸傭食之夫而不勞公徭之一卒始于某甲子某月訖工于某月嘻可謂易矣蓋山之為人吾知之有粟必以施餓者而終嵗自食粳籺有錢可以易衣而嘗衣碎衲行雨雪中其苦行有足動人者是以募人而人爭應之役人而人不敢愛其力宜其成之若是易也於是友人蔣君英玉吳君鎮之為之請書其事夫橋梁王政之所有事也徒杠缺而國僑致譏川梁隳而單公以刺然特語夫長民者耳矧所謂浮屠者固與世漠然絶不相值者也山口不粒粟身無全衣以此自足而絲髮無所假于世亦可矣乃復能急人之病而閔閔於一橋之成也如此則彼長民者固衆之所跂而望以庇焉者耽耽而居飽祿以嬉其於人之疾疹阽苦則瞀瞀而莫知蓋先王一切所以捍災備害生人之道泯然盡矣其所缺者寧獨一橋也哉嗚呼此不為而彼或為之其亦可以觀世也已德山某所人其橋旁居人出錢者凡若干人建青柯坪館記靳學顔嘉靖辛亥春三月華山青柯館成華隂縣尹康修馳狀至曰縣距青柯坪蓋三十里坪其上又十里即逈拔立絶非恆迹所躡已斯圖經所載類削成四方者耶故遊者以青柯為極然厯玉泉莎蘿而上既抵青柯勝且什九故言厯攬之極亦以青柯為未始有踰者焉先是未有建置率谽谺所交蒙翳所布崟嶇所踞履而礥然立而錯然臃腫之與酢轇轕之為徒也是以逸朋攸戾紫庭把其流嵐勝迹薄遊翠芬畏其多露觴咏之雅淪諸野合錡釡之陳委諸黃茂雖幽尚離塵無鄙于汙匏然脆質易侵殆歉于延陟者哉乃已酉夏四月侍御古泉盛公始以檄修于是即秀神臯宅中靈壤託金皓之菁英締幽選之體則因髙駕壑夷砠崇蕪臨雲置墠慿巖考室林衡不戒而趣基落不謀而就曲執既審百度與能以其上為屋五楹中二楹堂也左左個右右個其下為左廂一三楹為右廂一如左數布以延除周垣繚焉外為綽楔一而侍御白崕劉公題曰山峙河流云自是棲置夷曠開闔容與坐有几息有榻眺有軾遊衍有時徒馭有莭順朝晏之適鬯人理之和逹于象候之變則斯館其惡可少諸既庚戌秋九月侍御古川程公又出藏金若干為碑亭其後櫺軒棼繚崇節堅澤一益所未備而是館為一巨麗宏美者矣君子至焉超然逺凝邈乎周覽大之則撫隂陽之熙業察鴻化之奕緒細之則贊無欲之神襟逹有生之淑藴禮席敞其秩度是情以制貞也泰宇發其光精是智以境晰也間寢澄其湛寂是性以區靜也又不見渭流涓㵼邑雉永麗如縷如練如棋如豆彚象殷陳亷采殽列不越一布筵隱几而得之斯豈與夫背稿梧向虛壑涉履荒怪叢哀與怨者同日語哉夫曠于昔始肇自今兹斯作者創其端乘者享其逸矣役不干時資不輸衆則既有稱于下代又無惡於初圖矣斯二者皆制作者之所難也二公于是賞絶振古光照不磨有其舉矣可無述乎夫事待言新表往以則來者言也惟大夫圖之顔唯兹館結乎修逈闢乎昭朗神明鬱纒其內煙霞吐納其側無俟峻築固己上參倒景仰出星河無得而踰矣雖柏梁巋構凌雲研製或競高於尋引或稱均于錙銖然皆託乎周原不違人境囂曠所較懸然殊焉是知清蒲充庖瑶簋可麾朱草棲廂繡棁遠謝將人謀者不足而天然者有餘也故能令人形精淡淡營慮寥廓蕩瑕滌穢而鏡於大清斯其所為勝與若乃投分於巖穴留愛於木石薄針鑑而耽騁望崇欲以養目者之所為也勤衆無已非時好豫析中産之儲以施之顓千夫之膳以供之藻鏤連雲而疾蹙不見也匏絲陳前而嘆言不聞也斯先身而後其民者之為也夫天下之事莫難乎其始始善矣而吾猶懼其終之乘之者不善也則是記也又惡可少諸或曰嵗旱與潦時則官長吏人婦子之祈請者必至于是以其涓誠易徹而叩籲近乎既館焉瞻依一矣羣情以洽又記曰山林川谷丘陵能出雲為風雨見怪物皆曰神張昶之記亦曰至其中者咸有浮飄之志愈悅之色必雲霄之路可升而越果繁昌之福可降而致審然則斯館為有據吾從而載筆記也不佞矣于是答康尹之意著為篇俾勒石云闢清逺峽江道碑記王漸逵浙西南岑吳公憲於廣備兵於嶺南軍于清遠先是峽江阻險濤石降暴為舟楫之厄入漢以來千百餘年志士仁人付之無何公至則惻然時方有連寇之剪凡厯而觀者再過而踟蹰者六曰東者壁西者麓壁者骨麓者肉其幾闖矣未觸其會方今聖澤流滲民物充盛視如中州天效靈地效神意者其在兹乎豫其何辭於是進僚屬兵士而語之僉曰諾乃相脈勢度遐邇測降陟量渙止集羣效列功次取材于山取石于巖取工于驍勇無煩邑長無驚我民由是莽者曠叢者豁嵲者傾壅者踈凹者平壑者架漥者形砰者臺紆者繩方踰月而大道攸達於是南者北者舟者陸者商者旅者止宿者漁者佃者獵者樵者郵者使者牧者騎者冠蓋者負荷者絏者採者遊者覽眺者送者别者客而經者流寓者廬處者皆欣歡嘆咏以為堪輿一小開闢溟嶠之濱傳為盛事是故駢翳化為闓爽厄隘化為坦夷頑纍化為竒勝激湍化為漪池鬱憤化為燕笑愁怨化為愈恬黿鼉化為畜玩嵐氛化為清霏殊方化為鄉國呻噫化為雅詩青蘿王子曰豫嘗北度大庾觀曲江開鑿處涉淮泗淄濟求禹功於九河盟津乃撫而嘆曰嗟乎時乎易稱會通重開物殆近之矣是故禹殺洚水先冀兖曲江闢隘南服以奠吳公入越而峽流衍雖時會之孚亦存乎人矣後之思公之功者尚求之名山大澤中因命刻記於飛來之巔俾山靈守之永勿替明文海卷三百八十二
