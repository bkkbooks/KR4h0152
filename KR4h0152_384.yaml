body:
  text: 明文海巻三百八十四餘姚黄宗羲編記五十八興造創建坎河石灘記萬恭泰山故清皇氏之都柱天而下濟水伏流至泰山氣升水溢出山麓者為二百八十泉滙而為汶北入鹽河道青州東注於海國初尚書宋公壩戴村濬源穿渠百里南注之達于南旺以其七北流㑹漳衛而洩於天津以其三南流㑹河淮而逆諸安東皆入海青州道絶是以汶之全力濟滕兗東臨八百里故陸地運舟而不膠然非汶之性也其勢曷嘗一日不欲東注青州哉𢎞治中汶大溢勢不能决戴村則潰裂而假道于坎河口坎河者入海之㨗徑也若建瓴而下南流遂㣲治水者議堤坎河口嵗堤嵗敗莫如之何則議捐南旺兩滙膏腴數千頃為蜀山湖為馬踏湖為南旺湖命之曰水櫃以待運以濟汶河之不足而坎河東注者日漸月流注南旺者㡬絶殆不可舟矣隆慶壬申余治水至濟上患之乃以主事張君克文徘徊汶泗之集周覽坎河之口向張君而嘆曰嗟獨奈何不以有源者為水囊而以無源者為水櫃乎北有龍山焉亂石如魚鱗壩歲敗無濟也君取彼石坎河口則萬世之計也乃役丁夫七千有竒運石湮河始於壬申之仲冬成於癸酉之孟春灘博一里袤一里而强壓河根而上崇丈餘秋水時至則令灘踰而㵼之復青州之故道春夏運行則令灘止而注之入安東者趨而左入天津者趨而右灘若天成汶失故吾蓋不能自制其命矣于時秋不雨至于春二月閘水瀰瀰運艘繩繩蓋我明餉道於斯為盛矣張君撫膺髙蹈為余言宜有記令後來者世守之余曰君誠樂哉汶良苦矣夫拂其性而激之逆其流而役之使汶水鼎足以裂不得全其天然吾過也吾過也然汶上濟隱湯湯淫淫孰與三分者以濟社稷之急而紓百姓之煩疴則汶雖失全性而有全功享全名不識汶神其將知我也乎其將罪我也乎張君乃刻石蟄存坯户記王文禄沂陽王生文禄字世亷父諱佐母陸氏𢎞治癸亥夏五二十九日亥時生七齡就傳弱冠受詩正徳庚辰游海鹽邑庠嘉靖辛卯中浙試式壬辰遵養乙未始計偕戊戌癸夘連罹内外艱乙丑春試陳状元謹首取争魁胡㑹元正䝉阻之冬季四日堂樓書畫竒玩俱燼不愠憂妻包氏女配朱蕚外孫三季殤妻痛悲疾劇隆慶庚午冬北行中返辛未春季炊臼徴壬申萬厯維新之孟冬八日築四灰隔於待葑原二親墓右外祖淳朴陸公曰土阜水環巽峰鴈塔蔚哉爽塏中生壙右妻傍妾生壙名蟄存坯户云夫人均倮蟲聖人為長猶龍乎秋冬咸蟄蟄咸坯户坯户以静蟄静蟄以存神順時也文禄師聖窮經稀齡矣未見一割之用剛腸疾惡直氣凌霄胎教義方嗜學不厭揮毫詠志撫劍調琴乾象地輿兵符邦紀罔不該究生平憫憐困厄若切體膚拯援未能也邇臣倡貪效尤彌偽營私征利寇攘勿休以致炎徼波揚漠庭塵澒金宿晝見虓虎郊行杞憂無可與語者出見衆生蚩蚩靡哲不愚閉塞成冬隂盛陽㣲巻之允懷居焉俟命抱蟄静寧豫築壙若坯户然存神爾曷成毁乎電光泡影夢幻刹那功烈文華何巍何煥禄也夙悟性真人心中虛即天心太虛虛故神河圖洛書中五中圈皆虛太極也聖人則之畫卦列聖授受一中由是知常守中致虛篤静應迹翛如也凡感遇著之篇鋟海沂子寤言莠言策樞書牘藝草若干卷世急載二親傳中集知契戚友語殿之為賛云語曰志凌千代氣呑八荒陸雲臺宅危言危行似狷似狂董兩湖穀清明根器董從吾澐經緯文章袁呉門尼龍門道續董從吾澐莘野鷹揚王一山愛積學老錬唐一菴樞慷慨激昻宋芳林俞其貌亦古陳龍川亮而心甚長王鳯洲貞存神坯戸俟命蟄藏自結重修洛陽橋記仇俊卿洛陽江距惠安縣南三十里越此則為晉江東連海澚西逼鸛堂山髙崕峻壁鳥道難尋境内西南岱嶼白﨑諸山之水皆㑹谷口趨入洛陽江以㵼於海外洋潮汐時至其地山海之勢相激波濤洶湧如雪山擁叠雲障盤旋涉不容厲渡更難航正當泉南驛道之衝行者至此莫不顣額因指其處為萬安渡蓋畏其險也其南壁名佛通山甚言此渡非凡境塵跡可尋常視者宋嘉祐中蔡忠惠公襄知泉州相襲山水形勢審知民情灾利廼於此架淵為梁釃為四十七道以分水勢兼可豎石櫛比又種蠣于礎令其附生而固袤三百六十五丈廣一丈五尺方其定址之初禱于海神借潮三日不至洛陽江底見而基就築及其横石為梁也江水震蕩不能傍架木植爰載石以浮船面待其潮至則船隨水漲遂置石于上抽舟下出力役不勞而工易集亦算與神符者也迨橋之成始瑤琨排列虹霓委蛇上通䭾載下便帆檣雖魚梁不足以比其功若鵲橋渡河事雖竒矣祗見誣於天孫萬里橋跨海工甚費矣徒湛迷於仙術孰若兹橋之普于利涉而功垂永世者哉嵗乆漸圮予因捐俸若干倡率修葺擇居民朴實夏某等董其役橋北舊有昭惠廟或云其神即永春樂山之白衣叟隨於其傍為㕔三楹便使節徃來或遇昏曉風雨可少憇焉併責廟祝司之再閲月而訖工至橋中亭佇眺連山遙海光怪呈竒亦天下一偉觀也昔唐宣宗嘗微行覽山川勝槩有類吾洛陽之語因名兼以附今嵗月云嘉定開河記王衡嘉定縣學泮池故野奴清境二水滙焉清境自北而南環其左野奴從西㑹之無何民居漸墊塞西水不東與左不相顧而科第亦寖不如前華亭鄉進士王君博學工文章兼通形家言辛丑來署學事集諸髦士校藝已出倚池上四顧而嘆曰非其文之罪也具呈邑侯韓公請稍徙屋廬之直河道者使仍故流而公償其徙居之費諏某日以畚揷來㡬日而輟工屬某記嵗月余不敏於形家言瞢如也獨念昔者青烏説未興先王説膠庠之制以敷教流化茍横經有地足以詩書弦誦其中可矣奚以若泮若雍環繞如璧為哉彼有取爾也學校蓄材正如井之蓄泉井不泉而泥則亦已矣井實有泉而莫繘之或幕之井渫不食則行道之人惻焉天下事類相感氣相合可盡謂水之通塞無闗於人才耶獨怪以王君之材品豈不能如蘇湖先生故事以實學實行教弟子而沾沾科目為即言而騐或謂所收者末而愚謂科目之與書升聘召非有二也天生才無方隨世所趨尚而靈氣儲於其間當今之世業無所求飯牛版築之用所以勵世摩鈍者惟是途使一不振則倦倦則業徙而日下所以鼓之舞之使之不倦者天與人叅焉吾郡七縣中嘉定風氣沉厚善惡雜其君子務讀書行義之士漸老且倦矣而囂而善訟者其氣方張使蘇湖先生當此時其亦不能以枯槁無用之學術鎮囂疏穢明矣倘有術於此使其君子早為天下用不至槁項黄馘私其衡泌之樂而邑之父子兄弟習見其利而趨之機心悍氣不繩督而自化疑亦夫慈惠之長忠信之師所樂與鼓舞而作新者也吾姑誌嵗月於石俟嘉之科第益振民風士習漸變雅馴而後頌君子之功焉歸氏修墓記歸子慕葬者藏也藏之山林藏之廣野也物盛而必衰聚而必散天之道也髙明之家鬼瞰其室自古王侯貴人燀赫一時代移時易其守墓之子孫今皆安在是故葬不欲淺欲其深使其厯世乆逺子孫衰微親屬既絶夷為平土樵牧其上游息其傍而不知其下有死人也故謂之藏也近世惑於青烏之説率附土膚或半出地上而髙其封以為易於得氣有利於子孫而子孫不肖往往掘其先人之骸暴之而以售其地可痛也歸氏之先族人聚居縣城之東南門外是以水之兩崖田之壟畔纍纍出者歸氏之墓相望也其在許氏園隠隠竹林下可俯而窺者則予五世祖之從昆弟也其子孫微矣有仲賢者貧窘先以墓傍之地鬻於王氏王氏闢為園築土垣環塜開一面令得歲時墓祭徑園中己而仲賢流離轉徙居海上者數年歸而園己更易主為許氏有矣其塜中生荆棘土垣傾圮非復昔年之舊矣於是仲賢感動流涕以此尤許氏而許氏為新主不服既而慨然曰吾以此地為憇息之所而使它人之墓榛莽若是乎遂捐金若干畀仲賢修其墓而子慕執筆識之勒於石以杜異日之爭而子慕遂僣為之銘誓聞古之君子先責已而後責人為人子孫豈其先人之朽骨不是愛而乗以為利天地之所不容載國有常刑其罔赦聞之古君子愛其親而以及人之親季武子之成寢也杜氏之葬在其階下百嵗而後許氏之子若孫所長有者此也則歸氏一抔之土亦永無猜焉承賢橋記髙攀龍錫城中有箭河九通者一而巳無論形家言凡河渠疏則靈氣鬯如人身血脈然然而湮塞所從來乆民居踞之不可問惟在冉涇里者計丈百有三十而通者且百有十是為文莊公邵二泉先生故里先生亟欲疏之尼於里人不果特為隂渠石甃之以通於所謂弦河者葢先生之寄趣逺欲二泉震澤之脈沿洄旋匝於吾前以為快也先生既没垂百年太學尤君時純居先生里中慨然念曰是先賢之志也夫吾不可以不承乃捐其樓居二十有一楹鑿為河河成而橋之請名于予予曰是惟二泉先生之志謂之承賢可矣太學君曰橋之至于河也其地為河者若干為陸者若干具有籍子其志之庶可永也予曰噫事其有可知者乎夫以二泉先生之賢也又貴重也曾不能以尋丈之地得之里人而其志遂尼何也語曰其父析薪其子弗克負荷即以父兄之命其子弟有弗克承焉今先生之没垂百年當年一念𣺌乎若逝水之無踪而君忽承之又何也皆事之不可知者也則繇此而往陵谷之變又焉可知乎雖然其可知者固在也夫以先生之賢也而君承之誰其甘為不賢者而復湮之果其甘為不賢者是人之最賤也世之所共惡也或擊之矣是可知也是役也邑侯同生許公寔主之故莫或有尼太學君之義而卒告成事侯名令典海寧人明文海巻三百八十四
