body:
  text: 明文海巻三百八十五餘姚黄宗羲編記五十九紀行夜度兩闗記程敏政余謁告南歸以成化戊戌冬十月十六日過大鎗嶺抵大栁樹驛時日過午矣不欲但已問驛吏吏紿言須晚尚可及滁州也上馬行三小里稍稍聞從者言前有清流闗頗險惡多虎心識之抵闗已昏黒退無所止即遣人驅山下郵卒挾銅鉦束燎以行山口兩峯夾峙髙數百尋仰視不極口棧嶇崟悉下馬累肩而上仍相約有警即前後呼譟為應適有大星光煜煜自東西流寒風暴起束燎皆滅四山草木蕭颯有聲由是人人自危相呼譟不己銅鉦閧發山谷響動行六七里及山頂忽見月出如爛銀盤照耀無際始舉手相慶然下山猶心悸不能定者乆之予計此闗乃趙檢㸃破南唐擒其二將處兹遊雖險而竒當為平生絶冠夜二鼓抵滁陽十七日午過全椒趨和州自幸脱險即夷無復置慮行四十里渡後河見面山隱隱問從者云當陟此乃至和州香林院已而日冉冉過峯後馬入山嘴巒岫迴合桑田秩秩凡數村儼若武陵仇池方以為喜既暮入益深山益多草木塞道杳不知其所窮始大駭汗過野廟遇老叟問此為何山曰古昭闗也去香林尚三十餘里宜急行前山有火起者乃烈原以驅虎也時銅鉦束燎皆不及備傍山涉磵怪石如林馬為之辟易衆以為伏虎却顧反走顛僕枕藉呼聲甚㣲雖强之太譟不能也良乆乃起循嶺以行諦視巖塹深不可測澗水潺潺與風疾徐仰見星斗滿天自分恐不可免且念伍員昔嘗厄於此闗豈惡地固應爾耶盡二鼓抵香林燈下恍然自失如更生者噫余以離親之乆諸所弗計冐險夜行度二闗犯虎穴雖頻危而幸免焉其亦可謂不審也已謹志之以為後戒中元謁陵遇雨記李東陽成化甲辰秋七月中元節例分官助祭山陵予與諭徳張君啟昭謝君于喬侍讀商君懋衡李君世賢當赴長景二陵前二日陛辭退㣲雨予與于喬並轡荷蓋以行出徳勝門土城外啟昭懋衡世賢皆會行數里雨頗急下馬憇野寺茶畢至清河少霽再憇再作午後至沙河河橋半圮壅土度馬馬上觀巖壑間片雲起輒雨脚如注明晦殊状暮至昌平縣學唐教諭玉率諸生冐雨迎候宿劉諌議祠後堂予與世賢牀于東壁與懋衡于喬對宿啟昭宿城西别館以詩寄之答焉入夜潦透壁及我牀下予亦苦衾薄乃與世賢移卧前室雨不止明日益急都指揮杜侯山來饋食徃訪之遂㑹啟昭入山山橋危滑馬厯磵度沙礫中暮抵陵廬駙馬蔡公孟陽攝祀事遣使饋果問其使云比至沙河河漲橋壞舟而濟予輩愕眙乆之夜半入陵祀已服盡沾濕上馬穿林薄中厯鄉所度磵水淙然有聲出陵門數里風驟作前後籠燭數十盡滅晦不辨色遂失道林木雜風雨聲若虎豹號噭響振山谷主僕朋侣咫尺不相應惟聞墮阬塹者相屬予與懋衡世賢進退無據自度恐不免時尚餘一燭隱隱見前騎有躍湍口以度者予輩引馬隨之每一馬躍首沒波内蹶起勢始定乂數里乃得路入昌平水深尺餘予先入祠懋衡世賢繼至予誦紀難詩有思親望闕語二君愀然曰此豈君賦詩時邪是夕于喬啟昭皆宿别館又明日㑹京府推官薛秉儀官邸酒數行五人者先至沙河北岸人積立如蟻予與吏部侍郎耿公好問户部侍郎李公文盛禮部侍郎謝公大韶兵部侍郎阮公必成刑部侍郎何公廷秀工部侍郎賈公廷傑大理丞楊公貫之列坐沙際官無舟惟兩漁舟出沒濤浪貫之募吏泅于南岸呼舟徑濟舟人利索錢呼不時至至則衆競趨舟舟欹輒覆墮渚水屢覆乃一濟濟不過五六人人望升舟者如登仙攀企不可及諸公僅以身濟僕馬皆限岸北予登一敝舟啟昭携一僕繼時舟己載三人至中流水急甚囬視舟尾有二人竊附縋著水中舟掣不得濟乘流下數十丈勢危甚前有洲旋繞若相迓者舟乃抵岸予與諸公坐岸南貫之出梨餅為野饋忽有一𨽻溺死衆號呼相顧皆慘沮無人色舟人驚散不復渡予有黠吏以一馬濟復徃取焉予自引鞚待之少頃又濟一馬予與啟昭皆空乗無鞍靮吏亦袒跣引馬入村店牖間稍稍見諸公皆獨乗馬過良乆于喬懋衡世賢繼濟復相賀僕馬猶有未濟者時日己暮去清河尚四十里予計欲稍前議未决予輒上馬衆乃追及夜至清河舊館爇火晚食予憊甚徑卧雨猶淅淅下未絶又明日始霽還至家晝漏下數十刻矣家君聞水漲殊廢寝食予至乃就食食畢後渡者始至云前夕赴祀時後堂東壁陡壞蓋昔所置牀處也因以語世賢更相賀云自予官二十餘嵗嵗四三祀予與其六然未有若是險者夜行失道險一也移床而壁壞險二也以敝舟渡急流險三也失道之險啟昭于喬不與敝舟之險懋衡世賢于喬不與壞壁之險世賢之外皆不與而予實兼之三者之中惟渡河尤甚其不至於顛躓者僅一髪而寒饑勞憊之状弗論也夫遭盛時遊近地舉吉禮而乃有是阨天下事固不可預計哉君子守身莅事惟所當為不可以夷險易志然亦有義處之夏屋非巖墻類固無容議獨終祀時若憇陵廬待明發必無道路之虞渡河時能返駐昌平俟水勢稍殺擇利以涉必無波濤舟檝之恐此二事蓋有遺悔焉盡人事乃可以諉天數茍充是志雖行之天下可也因作記以自戒且諗諸同行諸君子烏蠻瀧夜談記董傳策世稱蜀中峽粤中瀧真誠江道巨險即亡論府江險最甚其在左江諸瀧若烏蠻灘其著者也嵗戊午冬余時以入戍遡流而渡越庚申秋余從戍所出送家嚴君至蒼梧出而順流入而遡流合徃還為一渡焉又越甲子春轅門檄余探海徼倭寇事迺又從戍所出渡蓋七嵗中三渡險瀧幸無他患苦良嘆竒遭哉良嘆竒遭哉於時余挾横槎仙子陸生者登謁伏波祠夜泊烏蠻灘上談漢事笑指岸祠謂曰若覩此公作何状夫逸夫之與豪傑士未易同日語矣彼所為窮堅老壯㫁㫁赤心報國真漢竒男子若屬𤣥修逸適無意人世事迺亦過式斯祠乎陸君曰嘻蠖伏鴻翔誠當其時可矣風流遷客何遽惱人如是余又笑謂曰若胡乃殊時論耶夫嚴子陵馬文淵斯二人蓋同光武時然子陵委志髙尚就徵不屈思以其身挽世靡競之風而文淵垂老功名屢請出塞至不憚衝炎涉瘴以身殉國夫斯二人雖殊趣迺其致非繇一轍者與子陵當仕而處以矯貪文淵當老而出以矯猾世之徼寵避難者視二人宜媿死焉夫談理性者類擯其人為未學然彼豪傑士顧又莫能效嚬拾瀋依様畫葫蘆云陸君者王陽明子之徒也聆至此而蹙額改容余復曰王先生自比伏波既建社稷功猶不辭思田之役雖委曲招就諸黠酋尚稽正法獨其憂國奉公効節不顧私良無異伏波武溪事云屬者安南不廷皇赫斯怒三將軍臨闗按兵承望相指無能當上任使者然無事後謗忌迺於是益信王先生所為非顧毁譽計利害者即其學非空譚比矣陸君曰足下不聞灘聲乎夫今淙淙奔湍聴之若激而覽覩之若飛舞者彼其中有不能平也然而巨險迫人焉自古功名之際蓋難處矣故為嚴陵則易為伏波王先生則難走故烏蠻人敢忘烏蠻巨險哉子休矣談無所用之矣迺相與假寐舟中明晨北發與之舍而談逸遊事雷埠石壁記董傳策霄埠磯在永淳之南去火熖可里許厥石聳突成山廣袤數十丈㦸而森森者龜背者駝而負者鳯舞而豹蹲者環旋其左右兩崖相對夾之湍流厥壁峻立如巨障復突一尖者於江心互其崖石宛成二門粤自横槎而上諸瀧惟此為險諸瀧之石惟此壁為勝余初入戍渡此方搜竒時未暇搜及也至是挾友朋出游既得之喜甚爰告歐陽巡道鐫石顛而歐陽君欲鐫余名余笑謂名石不名余迺相與假重王陽明子鐫之云董子云余記雷埠石壁良怪物有遇不遇焉夫斯石壁者余即不出游雖經一再渡之猶畧而過矧諸未得渡者與然則其巖石之冺冺荒辟者又可知已雖然石無竒不竒人竒之即竒茍不竒之亦不竒夫石塊然無問竒不竒其又奚假余輩名哉雲陽夜别記呉時來鬱江之濱蓋有水名伶俐云余嘗詣而覽之因而熟思曰嗟乎世恒言智者為伶俐謂其愚者不及也茲水殆非智者與夫水以濟筏楫潤稼澤物溉注不窮其智者宜居通邑鉅都諸冠紳賈舶接踵之區或注沃壤敏灌洩籍以滋利品彚滔滔乎矜衒其所長而今乃甘茹孤寂偃然自處乎僻陬遐壤方且相猶於荒凉揉雜之鄉淹没頓乎瘴烟屯㳫之所殆㡬乎罔能自表著吾意物之太愚者宜莫如兹水也夫懷僕僕之跡者每富昭昭云也董子曰語云别方未定别理千名豈不信然初子儀舍大江舍彭蠡紆道而來也以二人也而二人舍庾嶺取永新間道而來以子儀也夫既有所為而别吾能知有所為之理道不能必其不可蘄之路岐於是呼燭就艫壺酒叙别明月漸吐白露如珠相與賦詩見志張子賦江樹夕陽五章呉子賦執手雲陽三章董子賦五章賦就輒歌歌殘復飲仰視明月已在半天三人者雖破涕為歡勉相勸酬然而山側水濱雁吟葉落一去異地詎相見期割慈分手仍復躊躇巳不覺黯然其銷魂也乂倣古人分衣之義各有贈張子贈呉子董子以廣葛各一呉子贈張子以一土紬董子以一呉絹二家室人夜不能登張太安人舟則各以其所績為别張子曰無復以益我董子曰合以迹迹離即散合以道無離無合張子曰如其合也須今夜之言以復若猶未須今夜之言以識呉子曰别不别合不合何常惟初心矢不離此道矢不間㫁古人困而進徳者多矣吾輩又何難於此别蓋聞處困莫辨於易吾將以卒業焉張子曰呉子為學易之説因而曰且需一宿其齋戒蓍之而後行於是各就舟明日夙興就近恩館焚香告天而筮得震之豐噫易示之矣敢不勉旃遂别尋烏石山記呉時來有山於此不百尺而髙不一里而遠山四面蒼色自遠而來前有萬頃之滄波晶晶漾漾若隱若見於樹間對城而廓處野而奥以呉子之好遊將為家於山水間博採旁問求其愜我意者不可一得此則最愜我意當眼舉趾經嵗而始能得之斯非可怪耶己未九日返自朗寧病横人之不麥也將教之麥課兒輩麥於西郊見叢莽中有若髙丘乃與諸人徒披莽而入棘裂我衣石滑我步無可見竒明日空齋中望寶華峰不戒僕夫乗興而往渡横江以風狂興輒盡循西行望烏石山而返又明日出眺龍起之池又以荒穢意亦不在循西行望烏石山忽語僕夫曰曷不剪荒伐莽以舒我視果而荒翳一除有美皆出寶華屏其前古鉢枕其後龍毋二塘迤邐山下東城西山禽鳴魚躍而嚮之盼望未徃者争獻於林樹間若有以逢迎我者於是日至又日至焉步既不厭景亦難窮始怪得之之晩以問之心心既莫知以問之山山又不答聞古之擅勝必於髙山深谷跡所罕到後出為竒此乃不凌髙不探深其竒又若此豈以後出者與我歟如必待至誠篤好舍我其誰且又遲遲踰嵗若彼其難卒乃以無意得之將造化者秘而不輕其出歟士君子俛仰宇宙登山觀水夫固寄意焉耳意茍在巻石勺水自足怡悦茍不在雖牛山瑯琊増慨生悲噫安知天下之佳山水不有沉埋草莽中不易自見如此山者歟為記以幸此山之遭又見遊者不遠目前莫不有佳山水在焉烏蠻灘夢記呉時來余於癸卯赴秋試將發前一夕夢一老人深衣幅巾策杖自里丞相橋而北提杖喝曰若何不拜我而祖也來前而端拱拜起畢老人曰賈誼傳不可不讀來作强對色且云這書那有不讀老人曰若曽面識其人乎來曰願識之顧其人安在老人不應策杖去如飛來隨之忽然不知何地所厯皆窮谷大川危巒絶塹其間險阻﨑嶇盤桓攀陟皆非素所曽至地乆之至一紅廟前指來拜曰此馬王廟也余驚寤夢若無可曉夙起語族父鸞峰先生先生曰祖告若矣今年題當有賈董事抑或霍光傳不可不讀意耶乆而無徵余亦置不意中今秋過長沙經衡永入桂林下府江渡左江諸瀧每至一處動如已至有疑於心不可憶記及投烏蠻灘謁馬伏波廟勃然大寤忽焉淚零夢中所謂馬王廟峭石驚磯浮烟飛沬光景滿眼依如昨遊余兹行以為咎由自執也而夢已定於十六年之前余祖於出試之初預告之矣豈非命耶馬伏波廟遍嶺外而烏蠻其著者是來至横之徵也所指賈誼豈昨經長沙之徵抑不善處窮謂用為戒耶謹述之以自礪并以告夫後之君子庶其安命易示知險知阻險阻疇能幸而免哉知險阻不為所遷有命存焉矣遊天窟岩記呉時來夏五董子與呉子為天窟之遊至洞口雨至題詩而還菊月呉子送董翁返自烏蠻過謝村借燎率羣從徃遊岩有洞口東向洞中有八景具沈學士與陸同知詩大都洞中如夾巷長里許不大竒絶惟盡處容光下照如綺忩有岩乳滴成玉鼎亦如玉笋又如石盆盛獅子箕踞其中者水冷甚從者掬而食之或取以濯眼焉既周而出岩居之氓蒸小豚兎子來食且言且笑問之曰以岩之外不如鳯凰之秀㧞以岩之内不如空洞之玲瓏呉子曰如玉乳二岩亦有之不氓曰惜乎其㝠㝠也呉子曰夫吾汝語汝未易吾領不汝語則岩之徳隱而不彰以為㝠乎其徳昭昭以為昭乎其質㝠㝠吁嗟乎安知㝠㝠之不昭昭乎今夫人心有窟耳目口鼻人之大竅也其質藏於人其氣交於天惟其窟㝠㝠故其能受昭昭出乎耳竅而天聲入之其納之也㝠㝠焉是為聰窟出乎目竅而天色接之其納之也㝠㝠焉是為明窟耳目之靈以交乎天也其中㝠㝠焉故能受故君子不外闗而外不能入不内楗而内不能出沈視於㝠以徹天明沈聴於㝠以徹天聰其竅常虛天光乃歸其窟常寂和氣乃出故其治身不竭精神而津津潤焉其治人不竭智力而明明覺焉安知㝠㝠之不為昭昭乎今夫人之所昭昭者日中而游正晝而馳目眩於五色而不自辨其黒白雖然强視其天明昏矣耳奪於五聲而不自辨其清濁雖然强聴其天聰聾矣處鄉為隙在國為蠧㝠行飾詐竊竊然雖崇髙據顯而且殖蓬髙也安知昭昭之不為㝠㝠乎故為善于幽暗之中其光常徹為不善於顯明之中其中常塞誰令以彼易此乎故天聰明其體常寂三辰為光不見人有夜秉燭者乎人之視之以明而彼之視人則暗故居明常暗置明鏡於幽室其光不發矣得日影而燁然此之謂以暗受明氓長跪而言曰小人無知不悟君話將歸而告之兹岩之丈人須臾有丈人仰天而嘯迎呉子曰吾之辭髙明就寂寞托業於此也有年所矣未有知我者幸子白之既以明吾徳而又以察人理也哉明文海卷三百八十五
