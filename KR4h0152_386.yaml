body:
  text: 明文海卷三百八十六餘姚黃宗羲編記六十紀行使代記王樵嘉靖庚戌豫以行人奉使至大同三月風變甚異風起西北黃塵蔽天己而天作赭色人物相對其色皆赭少頃天暗如漆時方停午室中燃燭然後可坐六月二十四日大同總兵張達以禦敵陷沒張達甘肅人起小校積首功至今官善弓馬無大略狃敵入非時絶不為備輕兵逐利陷於伏中部下莫肯救副總兵林椿以失帥慮逮突戰俱死事聞上以邊臣習于巽愞欲因二將以示激勸賜張達諡曰忠壯林椿諡曰忠剛各贈官蔭子立廟于大同逮總督侍郎郭宗臯巡撫都御史陳耀廷杖之各百謫戍邊耀死于杖詔起尚書翁萬達代宗臯未至以兵侍蘇祐暫行督事起僉都御史趙錦代耀復咸寧侯仇鸞太子太保鎮大同仇鸞者其祖仇鉞寧夏遊擊將軍也以擒反者安化王封咸寧伯又以征流賊功進封侯鸞為人短小精悍粗涉文字譎誕敢大言鎮河西以總督曽銑劾其不法事被逮曽銑江都人嘗獻議謂我朝以東勝孤懸徙鎮榆林初徙時套內無敵土地衍沃物産富饒當事之臣不以此時據河為守𢎞治八年敵編筏渡河剽掠官軍牧馬至十二年遂擁衆入套常駐牧不出禍根既種竊發無時出巢則寇宣大三關據巢則寇延寧甘固此剝牀以膚切近之災無己之患宜大驅遂之便答旨以銑任事慰納甚溫中外皆以為此上意也一日忽下手詔以兵力之未足取責問大臣生事造端之故內閣嚴嵩上疏謝罪因言此事皆夏言主之夏疏無引咎語上怒革言師保閣職以吏書致仕行至丹陽逮下詔獄以仇鸞有訐疏也夏愛妾之父蘇綱亦江都人在京出入夏私第頗用事而銑子以鄉親往來主其家鸞因言銑緣蘇綱交結輔臣餽金二萬載以二騾掩敗冒功建復套危計事下刑部初擬皆不合上意上曰第如律于是坐銑以交結近侍官員與夏相繼斬於西市仇鸞以告訐釋罪復用實無竒謀長策不過遣人欵令不犯已境而已時邊人籍籍言敵大舉必犯京師蓋消息在半年之前邊人盡知而京師不知也八月十四日敵攻古北口十六日抉牆入圍順義以保定兵駐城中城得全十七日報至京師始議守禦計兵部尚書丁汝夔奏發勇字四營兵分駐城外威字四營及三大營兵守城命文武大臣各一人分守九門檄諸鎮勤王十八日仇鸞首以大同兵至十九日巡撫都御史楊守謙以保定兵至既而諸路兵亦大集制以楊守謙為兵部侍郎提督內外官軍截殺賜仇鸞平敵大將軍印總諸路兵調度截殺鸞軍無紀律往往反詐辮髮為敵劫略被獲又自詭為遼陽軍時敵中呼朵顔為遼陽軍敵嘗言遼陽軍實導我來民間因言遼陽軍叛而丁汝夔又下令禁勿捕大同兵大同兵益肆略甚於敵人始疾汝夔矣言頗聞於上敵薄都城殺掠焚廬日夜火光不絶至坐教場飲酒撾鼓為戲樂又入東直門外馬房執內官八人去部長俺答復縱之歸持嫚書脅求通貢書非彼字乃內官代為之者也城外居民被傷千百成羣奔城城門拒之號慟聲徹御在所詔開門納之諭輔臣曰九門先閉是自困焉止是防檢盤詰時時代之僉服聖語之當先是輔臣疏言竊聞敵營我兵甚多昨者進邊皆穿中國衣帽假稱調來邊兵以入口子乞聖駕暫還大內軍機貴密乞諭文武大臣凡係密議許求面對皇上特御便殿親賜裁決二十二日上御奉天門受朝蓋上自十八年不出至今矣降制切責人無任事致敵如此以敵求貢事下羣臣議國子司業趙貞吉抗言敵不可許詔加左諭德兼監察御史出視師賫五萬金以為便宜激賞之用趙至軍仇鸞以計困之屢鼓於軍中若將向敵狀拉趙監戰則衆疾馳趙不任馳馬又駑不得如所欲乃以所賫金付鸞鸞與敵潛通揚聲追截實未嘗望塵發一矢敵乂犯天壽山繞出西山良鄉以西至保定皆震楊守謙營城東北隅以戰關國家大計不敢輕動上以為逗遛二十四日下尚書丁汝夔侍郎楊守謙獄時敵漸退鸞率諸軍尾之敵人欲奪白羊口出為白羊守將所扼復還猝與鸞遇縱騎蹂踐鸞軍不及陳幾為所獲敵分兩道出通計男婦殺掠蓋六十餘萬財畜無計敵過宣府城下呼守陴者曰無恐知爾兵在南爾所守者婦女城耳時守陴人見所掠關南人口行竟日不絶號哭之聲震動山谷力不能救是夜敵營於西門外二三里間以久勞皆酣寢城中無一兵可出劫其營鎮人惜之二十六日汝夔守謙同斬西市汝夔無軍旅材用之本兵己非其任况當此時哉使蚤用翁萬達則事不至此時翁居憂病疽再以本兵召未即至貶秩出經略紫荆諸關豫嘗歎世廟英睿不世出亦甚留心邊計而一時之臣多負任使是時本兵之任莫如翁萬達次則王邦瑞當張達林椿敗時當即以翁萬達代丁汝夔王邦瑞代陳耀聞二人皆不為用事者所喜又自周尚文死後一時邊將可謂無人不得已乃用仇鸞若算數焉趙貞吉復命以所言不讐又追其前申理周尚文沈束事杖貶嶺南周尚文守邊得士死力胡人畏之然亦頗用術數翁萬達能駕馭之其死也嚴氏沒其功不敘寢其恤典給事中沈束論之忤旨下獄楊志學有邊功守謙其長子也不待檄馳來不戰非其本心而獨受誅豫在大同一見仇鸞即知其姦其駐兵居庸關下乃先知敵謀故聞警即入方上憂敵時首到城下上使人登城視之軍行亘二十里其見寵以此後留總京營數請北征豈有敵入吾地既不能禦其來又不能邀其歸敵已出境反能問其罪搗其巢穴邪不過為大言以欺上夸下且欲攬兵事在手以肆其姦凶爾使更數年不死不知作出何事然謂鸞必反則無之鸞非能反者也姑以近事論如石亨父子亦驍勇絶倫身經血戰建有大功然後乃生不逞之心觀鸞之所為狐鼠爾豈能反者哉京兵皆市人操練亦空文自庚戌變後嵗調邊兵入衛然邊兵原各有地方倘敵先出兵向彼則不可調矣又如宣大近而易調然敵東犯必先經二鎮倘知二鎮空虛乘虛入寇門户失守則長驅徑薄畿輔豈能自安京兵不濟緩急邊兵又不可恆調宜募召四五枝分屯於近京要地操練防守聽調不必入京增兵不增餉但選汰老弱罷京操即以其食補此則不加賦而足矣丘文莊畿兵之説不可行唐時河北藩鎮竊據土地盡籍其壯者為兵以抗朝廷此豈治世之事只用募法可也河北固健兒之藪不患不足患處之無道爾有此四五枝兵京兵只當閲實不必補額外省京操可罷若募補京營仍歸於驕惰無益也且自來京邊之軍未有統於一將者鸞病始議分其權鸞病劇始遣趙錦收其印趙錦在兩鎮皆與鸞同事其入兵部也鸞援之鸞敗錦亦得罪方敵之求貢也大臣議遣使探其要領因以欵之幾墮宋人之誤使其叩邊求貢來則不拒可也豈有擁兵壓境乃尋城下之盟乎世廟札諭有曰皇曽祖及景泰時曰和甚差不可聽此一言甚得義之正後仇鸞卒開馬市敵斥彼無用之馬中國償以厚利馬俵諸民間牧養隨即倒死徒為民害或言近年西北邊頗得休息亦牽于吾餌保塞守約之效祖宗時亦嘗容其通貢四裔皆入貢何獨於彼而欲絶之不知祖宗時兵威強盛能制其死命彼以誠來貢則因而撫之一或犯順征討隨加故令畏威懷德今日能如是否乎謂許貢非講和蓋亦自誑以誑人矣而中國之險易虛實敵盡得以知之漢時呼韓稱臣保塞禍之所伏乃應于劉淵豈非炯鑑哉顧事業己成惟當益修吾備在朝廷上下中外協心不可一日忘且弛爾蓋自古雖極治之世不能無敵國之患舜禹修內治而三苗服周公征東山而四國吪幽王去文武周公未遠即有龍漦之禍春秋時狄滅邢滅衛入秦聖人作經猶嚴于列國之防戰國日尋干戈若無暇外事而燕秦趙各築長城以備邊雖過用民力而不失為中國自守之計至漢髙首開和親武帝窮兵北伐皆非古帝王制馭荒服之道西漢末五單于爭立呼韓稱臣保塞號為胸奴衰微中國得氣而不知易種于我至劉淵而發西晉分十六國中原板蕩又三代以來所未有也唐之初起即借兵于外不憚屈己稱臣子孫效其事討叛亂復疆土皆藉為鄰援而唐世冦患亦劇于兩漢五代石晉倚于契丹再世即受其禍宋承五代之衰不能復幽燕西夏故疆契丹元昊號稱敵國納嵗幣又甚于和親不振之機己伏于此故契丹衰而金人繼之金人衰而蒙古繼之一向得氣在東北而宋之受侮又甚于兩晉元遂代有天下則又自古所未有也蓋人主之於逺人茍馭之非道而漸啓其窺伺其勢相為盛衰其變無所不有聖人方盛慮衰先機防微常抑隂扶陽必進君子退小人必修內治防外患如氷炭不可同器來則不拒有貢琛無互市有禮待無和親無金繒境上無冠帶百蠻如其德不足以及逺而武備廢弛欲羈縻以弭邊患無是理也敵國得吾人而用之能為吾中國患前有王山後有丘富中國受其降人有可笑者如姚松寨辛愛寵妾也逃至塞上邊帥亦納之嚴氏父子令送至京聞其欲興兵取之又令人潛送出境皆欺上不知其無忌至此初亦不刺來投正與漢時呼韓渾邪王事相似武帝能因而用之分處其衆以弱胸奴之勢我朝不能處亦不刺而西海至今為所據彼不肯下漢我不屬不驅豈不為彼所笑也如馬芳幼陷敵在敵中亦稱驍將嘗盜敵女敵愛其勇不殺而割其右耳芳自以為功多宜足以當一女子不得又以為戮殊恨之遂來歸官至都督數出總兵敵嘗嗤之曰芳吾𨽻爾中國遂為大將足知無人然敵實忌之為禆將時嘗為總督江東以軍法箭貫耳徇于營芳恥之又欲北奔內閣徐存齋急遣人慰解餽以千金芳乃止豫在尚寶時曽見之與之語佯為侏􅍣不可曉及訪其第沉酣富貴與諸帥同態寧復有沙場死綏之志乎聞屢詣政府請外鎮不樂居中人言芳不忘飛揚豈然哉殆料之過矣紀循行朱廷立嘉靖癸未冬豫來牧暨乃造陽明先生之門問從政焉先生首悉古者親民之義且曰後世治不古若只此二字見不分曉耳豫始恍然以悟退而躍然以喜歸而求之無得也乃愀然以憂明年春復以問于先生先生曰是未盡其心者也田舍翁盡心於其家而家事不治者無之令乃弗若與則又歸而求之踰月焉時若有見者因詳先生之言曰邑之有令殆家之有主翁耶信斯言也邑之閭巷固家之舍宇也邑之田里固家之産業也邑之人民固家之子弟也舍宇不整則思葺産業不崇則思治子弟匪才則思教主翁盡心於其家也令之於邑亦然是故求為良邑令者求為主家翁之道也豫也朝出而視篆日夕而閉户刑名己矣錢榖已矣至於閭巷之隱情田里之要害人民之善與惡焉固不可得而知則固不可得而親之也其奚以令為又明年乃乘春和單騎偕從者二三人各携饁焉以循行原野山谷間竊效古人勸課之意求所謂親民者是故至一里則召其一里之老與其一里之長長會其聮屬之長頃各相率而環豫也豫謂之曰里有窮而流移者乎有老而無告者乎抑且有士居鄉而崇義者乎有婦遇變而持節者乎有子弟俊良而入墩者乎有惰廢農業而遊者乎有窩盜賊而殃地方者乎有恃富強而凌貧弱者乎有無籍唆詞訟而誣良善者乎有橋梁傾圮有隄防崩坍有陡閘閉塞亟宜修築之開通之者乎有則舉其人舉其實舉其處書之册焉毋私而偏毋妄而誣毋畏而避偏誣而避者罰罔有原罰爾罔不有悔噫嘻慎哉衆諾乃相與公議之議定推一人焉執筆臨册而書册呈豫乃按册而考詳焉其至一里亦如之又至一里亦如之不一月而百七十五里者蹤迹殆遍通百七十五里之所舉而前十二者之目亦既備矣是故於流移也寬征輸之役焉於孤老也修存恤之典焉於義士也優延訪之禮焉於節婦也精考核之論焉於俊良也課小學之業焉於遊食也示鞭朴之辱焉於豪右也嚴裁抑之法焉於無籍也嚴擒捕之令焉於橋梁也於隄防也於陡閘也勸首義之民率塘墟之長勤修築之功焉事畢而歸也而後所謂隱情所謂要害所謂善與惡者得其概矣得其概又竟其他是謂親民是謂良邑令之道而豫猶無得也因紀以自勉困學記景逸吾年二十有五聞令公李元沖與顧涇陽先生講學始志于學以為聖人所以為聖人者必有做處未知其方看大學或問見朱子説入道之要莫如敬故專用力於肅恭收斂持心方寸間但覺氣鬱身拘大不自在及放下又散漫如故無可奈何久之忽思程子謂心要在腔子裏不知腔子何所指果在方寸間否耶覔注釋不得忽于小學中見其解曰腔子猶言身子耳大喜以為心不專在方寸渾身是心也頓自輕鬆快活適江右羅止菴來講學見羅修身為本之學正合于余所持循者益大喜不疑是時只作知本工夫使身心相得言動無謬己丑第後益覺此意津津憂中讀禮讀易壬辰謁選平生恥心最重筮仕自盟曰吾於道未有所見但依吾獨知而行是非好惡無所為而發者天啓之矣驗之頗近於此略見本心妄自擔負期於見義必為冬至朝天宫習儀僧房靜坐自覔本體忽思間邪存誠句覺得當下無邪渾然是誠更不須覔誠一時快然如脫纒縛癸巳以言事謫官頗不為念歸嘗世態便多動心甲午秋赴揭陽自省胸中理欲交戰殊不寧帖在武林與陸古樵吳子談論數日一日古樵忽問曰本體何如余言下茫然雖答曰無聲無臭實出口耳非由真見將過江頭是夜明月如洗坐六和塔畔江山明媚知己勸酬為最適意時然豫忽忽不樂如有所束勉自鼓興而神不偕來夜闌别去余便登舟猛省曰今日風景如彼而豫之情景如此何也窮自根究乃知于道全未有見身心總無受用遂大發憤曰此行不徹此事此生真負此身矣明日於舟中厚設蓐席嚴立規程以半日靜坐半日讀書靜坐中不帖處只將程朱所示法門參求於凡誠敬主靜觀喜怒哀樂未發默坐澄心體認天行等一一行之立坐食息念念不舍夜不解衣倦極而睡睡覺復坐於前諸法反覆更互心氣清澄時便有塞乎天地氣象第不能常在路二月幸無人事而山水清美主僕相依寂寂靜靜晚間命酒數行停舟青山徘徊碧澗時坐盤石溪聲鳥韻茂樹修篁種種悅心而心不著境過汀州陸行至一旅舍舍有小樓前對山後臨澗登樓甚樂手持二程書偶見明道先生曰百官萬務兵革百萬之衆飲水曲肱樂在其中萬變俱在人其實無一事猛省曰原來如此實無一事也一念纒綿斬然遂絶忽如百斤擔子頓爾落地又如電光一閃透體通明遂與大化融合無際更無天人內外之隔至此見六合皆心腔子是其區宇方寸亦其本位神而明之總無方所可言也平日深鄙學者張皇説悟此時只看作平常自知從此方好下工夫耳乙未春自揭陽歸取釋老二家參之釋氏與聖人所爭毫髮其精微處吾儒具有之總不出無極二字弊病處先儒具言之總不出無理二字觀二氏而益知聖道之尊若無聖人之道便無生民之類即二氏亦飲食衣被其中而不覺也戊戌作水居為靜坐讀書計然自丙申後數年喪本生父母徙居婚嫁嵗無寧息只於動中煉習但覺氣質難變甲辰顧涇陽先生始作東林精舍大得朋友講習之功徐而驗之終不可無端居靜定之力蓋各人病痛不同大聖賢必有大精神其主靜只在尋常日用中學者神短氣浮便須數十年靜力方得厚聚深培而最受病處在自幼無小學之教浸染世俗故俗根難拔必埋頭讀書使義理浹洽變易其俗腸俗骨澄神默坐使塵妄消散堅凝其正心正氣乃可耳余以最劣之資即有豁然之見而缺此一大段功夫其何濟焉所幸呈露面目以來才一提策便是原物丙午方實信孟子性善之旨此性無古無今無聖無凡天地人只是一個惟最上根潔清無蔽便能信入其次全在學力稍隔一塵頓遙萬里孟子所以示瞑眩之藥也丁未方實信程子鳶飛魚躍與必有事焉之旨謂之性者色色天然非由人力鳶飛魚躍誰則使之勿忘勿助猶為學者戒勉若真機流行瀰漫布濩亘古亘今間不容息於何而忘於何而助所以必有事者如植榖然根苗花實雖其自然變化而栽培灌溉全無勉強問學茍浸説自然都無一事即不成變化亦無自然矣辛亥方實信大學知本之旨具别刻中壬子方實信中庸之旨此道實非名言可形程子名之曰天地陽明名之曰良知總不若中庸二字為盡中者停停當當庸者平平常常有一毫走作便不停當有一毫造作便非平常本體如是工夫如是天地聖人不能究竟况於吾人豈有涯際勤物敦倫謹言敏行兢兢業業斃而後已云爾困而學之年積月纍厥惟艱哉而不足以當智者一笑也同病相憐或有取焉甲寅孟秋記朝發釣臺記吳國琦崇禎七年季冬十有二日舟放自桐廬風旋復不定至釣臺已月上矣因泊舟臺下看月昌黎云淨渌不可唾非歟而月來更為映徹覺大地俱在琉璃光中留連幾不能寐已而霜下衣寒搴帷獨坐忽聞萬山皆響一舟頭尾與水相擊皆作龍吼世間何處無風雨而風雨作于危崖峭壁之下髙士隱居之天另自有一境界大略月浸於淥淨波內似美人臨鏡風雨作于危崖峭壁髙士隱居似學人見道震動六種俗諦疑根頓豁是夜却喜無夢約至五更有聲隱隱從雲林來亦不似人間雞犬而榜人伐鼓主人安眠至晨飰乃起開左右船忩俱為煙霞瀰漫幾不辨岸東西矣主人神氣亦為恍惚因下簾櫛浴飰畢復開忩四望見有素螺點點浮于白雲之巔又或白雲片片粘于渌淨之面又或蒼松緑樟懸于白雲之半如塔影如垂虹如月中桂樹如古壁漏痕作龍蛇形至近舟兩峯有瀑或竟飛於白雲之下若雲之腳或髙出於青山之頂若直㵼於天斜出於青山之腹若側吸於地或聞聲或不聞聲或穿林或濺石或繞茒舍數間髙樓幾座或孤亭荒圃亂石圓沙或入江或不見入江主人殊覺應接不暇始大嘆曰從來髙士隱居往來於此水者代不乏人自子陵外如桐君如董雙成如張志和如王初平兄弟如玉質如休上座如寶掌如傅大士輩或牧或奕或垂綸或採藥或繪或詩或舍兜率而遊或戀肉身而住良有以也至夜梅夾路氷雪之艷冷香之吟時時出入于枯木蕪草小橋怪石杳不經意之際與舟送迎舟中之主人固為之目招而心許而榜人牽夫輿卒之流亦為之回首顧瞻欲韻無語至畫眉翡翠唱酬鳴止溪山之間如花在春白鷺輕鷗出沒飛立波汀之內如枝著牒峯環流轉灘洌潭澄布帆無恙而不驚舟尖似蓮而無礙信乎從來髙士隱居往來於此水者代不乏人良有以也明文海卷三百八十六
