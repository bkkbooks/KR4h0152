body:
  text: 明文海巻三百八十八餘姚黄宗羲編傳二名臣蒼谷先生傳薛應旂蒼谷先生者河南郟縣人也姓王名尚絅字錦夫别號蒼谷學者稱為蒼谷先生始在襁褓即頴異不凡能言時遂出成人語五嵗讀孝經至立身揚名以顯父母乃謂其父教授平山君曰兒長當如此七嵗日記數百言或謂之曰子後當狀元及第乃應之曰吾讀書寧止為榮進巳耶盖自其童穉時已立志為聖賢之學矣比長盡通五經諸子尤邃于三禮年十八以儒士中𢎞治乙邜鄉試壬戌第進士授兵部職方主事有賢名正徳戊辰調吏部稽勲主事尋遷騐封員外郎已已遷稽勲郎中值尚書張綵依阿逆瑾勢㷔薫灼毎有私囑輙以正對且反覆理諭綵不堪甚銜之或謂先生曰固知不屑於富貴如將取禍何先生曰是有命焉非逄迎之所能免也不閲月綵坐瑾黨伏誅人服先生之逹壬申邃菴楊公為尚書先生議論亦多不合遂乞補外出為山西叅政䟽請侍養家居十九年樂道安貧養親教子於蒼山谷中築讀書䑓開渇睡洞往來於扈磵墅徜徉於馬牛亭養粹凝虚觀空㤀象随意所適採山釣水若將終身也京師故舊不通一字雖徴書屢至矢志不移已邜起四川叅政不赴嘉靖丙戌起陜西母聶太安人勸之行不得已就道時陜西有邊警邃菴自吏部尚書既歸復起為三邉總制見先生喜曰吾今日乃知王錦夫也即以兵柄付之不閲月奏㨗邃菴特䟽以薦未㡬聞母䘮仰天大慟曰為數月之出貽終身之恨即早夜奔歸曲盡塟祭之禮戊子冬起復赴部中途適嵗大饑奏捄荒十三事已而復除山西叅政己丑夏四月遷浙江右布政使庚寅冬廵按浙江御史李佶以先生不行磬折之禮妄摭論列先生曰御史為朝廷耳目之官乃怙勢作勢動以劾䟽凌人尚可仕乎遂棄官歸歸不逾月吏部覆奏謂李佶職在激揚論事不實王絅宜照舊供職乃復移檄起先生於家督促再三至辛邜秋乃復如浙浙之老㓜歡呼迎候者載道然先生此起盖已非其志矣至冬十月疾作遂卒先生文追秦漢詩過蘓李一時藝林咸稱作者有蒼谷集十二巻行於世然實非先生之所尚也先生平生毎右兩程而左三蘓崇理學而鄙詞翰使假之以年當必有繼往聖以開來學者而世顧以功名事業期之又豈以知先生哉薛某曰余為南吏部主事時安陽崔後渠先生為禮侍嘗與余論𢎞治間人才在其中州者則以何柏齋王蒼谷為首稱謂其志於理學而李空同何大復王浚川孟有涯諸公則文章氣節之士耳及余進郎中臨汾張西磐先生為吏書每論及同年之在州者則亦曰栢齋蒼谷而大復浚川次之其評隲之㣲亦後渠之意也余亦素聞諸公之大畧既因兩先生之言而致詳焉然于蒼谷之為浙江右轄則竟未之知也故先年作浙江通誌於官司中竟遺蒼谷之名乃今其季子府特持當代諸賢各書蒼谷之素履詣余問傳而余又記憶崔張之言不覺憮然自失晋陶侃子胡奴以袁宏為東征賦不及其父功烈至抽刀問之而宏為之續書其事矧府禮問之殷而余又素知蒼谷之賢者其又何辭因為之傳云李天瑞傳邵寳天瑞諱文祥姓李氏天瑞字也世為湖廣麻城人祖某正統壬戌進士累官山西布政使父某成化己丑進士歴陜西奉政叅政公配趙氏生天瑞五六嵗即露頭角及就傅授以書多誦强記應口屬對輙能驚人十三能文十五學春秋書其簡曰學不到聖賢終為人下二十中鄉試髙第卒業南雍愈力於學登丁未進士以風義自持一時名士多與友善見沉浮世事者輙叱詈之上即阼上新政䟽要在一權立法進賢黜奸廣言納諫語過切直䟽入數日召詣左順門中人傳詰疏中中興再造等語以為不祥天瑞從容對命既而得㫖俾佐劇縣遂補咸寧丞至謁上官有欲門見之者天瑞郤立不進曰庭叅有禮此非其所上官改容禮之廵撫欲調守城卒從廵而民壯代守天瑞悉放民壯卒不果出凡居數月民吏畏服或言天瑞不宜外補上意觧時三原王公再起掌銓因奏召還闗中父老擁道號泣監司有所餽者悉謝不受人以孟子宋薛兼金為言天瑞曰孟子大賢必有所處吾寧過中不敢假以自欺也既至授職方主事居十八日中書舍人某以言事下詔獄乃有媒蘖天瑞妄議朝政者於是被逮成狀下法司擬罪主者承望比附加重天瑞曰天下後世公議固在復何恨哉誣伏不辭中外寃之既而有欲指媒蘖者以訟其人懼乃宻解從輕降興隆衛經歴興隆處苖夷間為雲貴要衝途有給逓疆有竊攘上慢下抗名分蕩然天瑞立法均差復招致寨長申㫁塲禁雖異種部落亦凛然知畏相戒無犯提學呉副使檄兼學事天瑞首新文廟簿正祭品置田以供博遷俊秀分齋肄業親為講說鄰境士聞風來逰者若干人俗尚邪術病必禱鬼䘮必奉佛天瑞集僧巫火其書器遣就常業或以嵗旱請召方士天瑞曰毋吾自禱之卜日齋戒將有事於羣望是夜雨厥明徒跣走龍洞大雨及還乃止都御史鄧公廷瓉奉命征苖咨訪兵畧大竒其才以憲職薦天瑞曰昔以言出今以軍功進不可固辭不得乃請賫表京師因圖告歸䟽兩上不許即日南還大雪中行數百里至商城曲河氷䧟隕焉有司出諸氷中殯之弟之禎奔赴以其䘮歸塟於蔡家園之原天瑞少有大志讀書積學晝夜不息其在家敦行孝友施及宗姻至於義所未安輙侃侃正論辭受取與一審於義好分别是非寡合少容人頗稱傲亦不之恤及更事乆深自抑損毎以浮名為慮凡有議論原古證今具有條緒於文亦然詩尚精婉所著有檢齋稿若干巻生男一曰京元夭死女二年三十論曰古有磊落竒偉之士天瑞殆其人哉方天瑞弱冠時精神氣槩殆將傲睨一世及遲回顛頓曾不少變而持之益堅其執禮似簡盡職似矯守法似刻非君子鮮能知之若夫歛華就實毎恐規模太廣而才力弗逮不以自沮而必求往進咸寧之振奮興隆之綜理亦可觀矣充是心也何所不至而遽至於是豈非天哉先是天瑞雪中過予於許留三日而别講論經史旁及時事以至詞章翰墨無品評自謂慕古用心極苦恐不能夀已而果然豈非天哉嗚呼天之於才生之固難而卒自戕之果何為哉果何為哉齊安三先生列傳王一鳴夫人才亦其所應運而生者哉或地氣使然也夫豈其偶然歟吾聞世運與地氣合夫是之謂應齊安東西浸江之邑亦淮漢之間一都會也當國家休明之政積而百年在憲宗之際田野闢治戈甲朽鈍百姓富厚蒸蒸為乂而宦官内訌則請劔為常權臣外横則抗䟽不諱職方之氣於今為烈矣承平既乆邊陲失禦本兵雉經於圜土中丞扼腕於九塞羽書旁午軍興乏絶而陜以西有召虎作鎮維周之翰者矣至於孝宗中天之運北地汝南騷雅中興徐薛邉諸子并驂上駟而江漢之間俯顔拾廖孕童包張者裕州府君其人也至其伏闕之書諫臣攦指裕州為治誅鋤豪猾進而鼓其伉直退而而修其文辭此不其尤彰明較著者哉夫人臣之於國家當其無事則亦猶夫故吾也小人在側則搏之而為諫敵衆窺邊則動之而為功山澤之間放逐比至踪跡遼濶則憤結齟齬而為文章此其大較然也竊以是窺於君臣之際矣君常執不用之權以搆臣而臣卒不勝臣常執不出之節以搆君而君亦卒不勝然臣卒以其不出之節致於君而成吾君之世之度外竒舉君亦以不用之權鼓舞一世使瑰瑋之士悲憤之文皆見於吾世是兩搆而兩相成也故夫茂堅之横也安之汚也瑾之猾也仲文之纔也皆愛我之精者也河伯之召也四郊之不靖也放逐之窮愁也皆資我之精者也晚近世淺見寡聞之士是豈能與論其生熟哉嗚呼河清可俟人生㡬何此其人皆倜儻非常之士也誦其詩讀其書且將旦暮遇之後有作者私淑諸人也則是在後死者焉李職方列傳王一鳴夫學者引繩批根生平慕之後棄之者意氣不足也君子禔其身温良恭儉譲以得之乃其君臣之間若電若雷且託於燕處之虞乗醉飽之時未命而唯唯未使而諾諾龍之頷下逆鱗徑尺王者尊嚴若斯之甚也而説者曰深計而不疑引争而不罪明割利害以致其功直指是非以飾其身此何以稱焉外史氏曰余生江黄盖嘗竊聞麻城有李職方云薦紳士大夫稱説抗直諫論如解縉李夢陽之倫詳矣由余所聞職方其義至髙乃文辭不少槩見何哉乃其所睹記可太息焉其傳曰李職方文祥李㵾之子也憲宗時㵾為叅政其以叅政教文祥文亡害也文祥成進士萬安方以大學士尊寵用事又附上幸臣李孜省孜省從中為安地安益無所恐以文祥名髙也者思相結納萬文璧安孫也從文璧所紹介得文祥因約明旦過臣所其明日髙會益多市牛酒供帳甚盛致語文祥曰臣得以備主上股肱之事李孜省貴人也且與臣有肝胆之義幸而在事足下當無憂富貴足下念我此語乎文祥第目攝之不對且咏所為畫鳩詩仰天大笑冠纓索絶不謝安去安恚甚語文璧曰夫夫俠儒也會孝宗初即位文祥上書言中興事語侵安兼請尚方劔誅中貴人甚急安與中貴人共擠之得咸寧丞居頃之尚書王恕為吏部乃日夜為上泣曰李文祥才氣無䨇皇帝初即位文祥流涕言事稱萬安李孜省當斬狀今萬安李孜省已死洵不食其餘矣願終赦文祥且文祥在數千里外日夜東望者上耳孝宗急召文祥以六傳至都拜兵部職方司主事而文祥與故人鄒智湯鼐吉文等逰甚歡吉文上書孝宗語連文祥復謫興隆衛經歴興隆鬼方地也文祥居之亡恙竟以入賀渡商城水溺死鄒智亦謫吏目死由是觀之天耶人耶語曰觀聽不叅則誠不聞若文祥者所謂誠者非耶侃侃如斯而卒屏氣以死成祖孝宗武毅聖賢之君其觀聽也叅矣解縉以赭衣死文祥鄒智以謫死李夢陽死地而後生天之報施善人何如哉吕震萬安與時浮沉其於賢士大夫不啻殺之暴厲恣睢僅罷官卒以老死是遵何徳哉至若近世慷慨直節之士其遇禍者不可勝數也或脂韋淟涊跼蹐效轅下駒而終身逸樂富厚累世不絶余有疑焉儻所謂叅觀得耶失耶荀子曰耻不信不耻不見信耻不能不耻不見用閉則敬而齊憂則静而理窮則約而羣若存若亡其於出處可端拜而議焉孟子曰雖有智慧不如乗勢雖有鎡基不如待時文祥遇孝宗不能免於咸寧而能佹得於職方而卒不免於興隆以死微閼而微通之即再閼而竟死焉是其不可知者矣論曰讀職方事輙流涕者耶然職方之後裕州府君諫江彬邢寰諫南廵狩石金諫求神仙先兩人皆貶而石金獨削籍劉莊㐮公列傳王一鳴劉莊㐮公天和者湖廣麻城人也其先曰劉夢元時從髙皇帝起兵得漳州府同知者也故南昌徙麻城天和家世世受春秋為進士髙第孝宗𢎞治中父燧為豐城令而天和以長子從行豐城楊文恪公亷有學行天和以師禮行亷常從逰有所揚扢辨説及授博士業而亷曰嗟乎子能遇時如令子當今上時功謀可勝量哉及武宗初立天和成進士為禮部主事居二嵗以茂異拜御史出按陜以西先是中貴人廖堂鎮陜以西貪横甚其弟鵬為錦衣衛指揮使相因縁為姦也天和至陜以西即榜堂不法事於市又亷得堂左右數人下獄堂佯謝過曰堂已耄堂舍人為姦公誅之當耳而隂從弟鵬闗節幸臣錢寧所地所為謗書以其校卒稱詔捕天和下錦衣獄長安吏民至慟哭擁車車軹不得發堂益隂求得刺客欲殺天和甚急長安民張傑王倫以力持之褁粮相随至傳舍輙同卧起嘗天和食得不死下獄無所考遂長繫竟赦出為金壇丞亡何進為其令稍遷蘓州同知又徙為湖州知府其以湖州知府治行天下第一也晉副使視陜以西學政其職益稱明年遷太常即以其年為右僉都御史視甘肅屯政而大學士楊一清為世宗言曰劉天和先以廖堂之故大有造於秦秦人思之且自負其能終不當使獨在燉煌酒泉之間於是乃徙為陜以西廵撫都御史即劾去填陜以西中貴人及他利害上之世宗民大悦毎出竊相指曰此曩者擁車公耶既出師平洮岷番獲甲首三百鹵倍之其平他盗賊稱是其明年母秦夫人卒天和東歸而黄河日益南徙歴濟而徐皆旁溢不可以漕上從里中詔天和以都御史治河天和則䟽汴水自朱仙鎮至沛又䟽山東七十二泉自鳬尼山至南旺湖役民二萬費戸部金錢不至二萬功成上嘉之晋侍郎遂以侍郎居三邉北拒敵丙申七破敵丁酉十一破敵已亥十一破敵先後得敵首數千級庚子敵吉嚢將大入天和集諸將以所賜金為牛酒饗士陳二劔堂皇指左劔曰將不用命者狗此指右劍曰卒不用命者狥此敵至我師醉乗醉登埤諜者走天和天和夜馳八十里至花馬池即故壘營之敵錯愕不敢犯引而且西天和召醉帥至罵曰子反以小忠之僕死况當勁敵者乎則醉者乎亦何其不敗之有立斬以狥衆股慄會天大雷雨晝晦冥敵弓膠解盡馬䠥䠥泥淖中所物故十八九而天和所檄延綏周尚文寧夏任傑固靖魏時兵適至天和將三將軍兵擊敵遂大破敵斬其名王以下五百人獲人畜器械稱是㨗聞上行飲至告廟禮即軍中拜太子太保録一子錦衣衛千戸天和每當出兵與士卒同甘苦士卒不食天和亦不食黒水口之役一夜馳八十里吏士皆無人色天和治軍籍不休徐命帳下擊刁斗意氣自若人服其勇矣性亷其以軍興法治全陜人視之泉府也天和得賞賜輙分賜吏士家無餘財終不言田産事所推轂士徧天下故相太保桂蕚將太傅周尚文皆從貧賤中㧞之尚文從天和以將軍數出塞卒至通候其慷慨峻潔殆天性也終其身與權貴人相抗當中貴人劉瑾用事時以同姓故謁公且詭曰臣幸事皇帝富貴惟臣所致君有意乎天和不對去而以其兵部尚書入燕也上以敵嵗大入大同薊州或䦨入都門憂之使天和專治兵無所中制也而中貴人大將以廖堂劉瑾故事相傳聞多恐懼而上所幸方士陶仲文於天和未至都三舍而近使使以外戚禮迎天和天和髪上指恚曰與而主胡戚耶天和結髪事皇帝下獄當死不死在馬革間日夜與勁敵戰不死而主黄冠瞠然者耶終不能與若共事矣不視而去天和至治兵其中貴人大將恐懼者以其皆乾沒軍食予空名恐天和有意督過之首鼠兩端卒莫得要領天和益欝欝不得志而仲文日讒間天和於上天和日夜請去遂歸竟卒不得起上輟朝議祭祭至九議塟皆以大司農金錢議謚以履正志和因事有功得莊襄議贈少保天和卒二十二年而仲文死穆宗詔籍其家不得藏尺布天和部曲莫不扼腕曰恨不見莊㐮公者矣論曰劉公南人也十萬浴鐡之騎擢掣於交㦸之外以尺一如意揮之煒如也三秦之日校卒挾璽書一旦以鋃鐺至豺虎交跡其就道無惨容者其定力有以勝之也夫志大者不能無小出入術勝者不能無巧進退其以布衣逰兩都潦倒諸生耳一發而雲蒸龍變處如處女出如脱兔可勝道哉裕州府君列傳王一鳴裕州府君者余從四世祖也名諱不得稱字稚欽學者稱夢澤先生云其業成海内無不知有夢澤先生而余於子姓間居恒稱府君府君少頴朗從父叅政府君逰於四方其為文頃刻便就多竒氣然好狎逰黏竿風鴟諸童子樂又蹶不可馴叅政府君抶扑之輙呼曰大夫奈何輙虐海内名士耶為翰林庻吉士詩已有名其意不可一世士僅推何景明而好薛蕙鄭善夫故事學士二人為庻吉士師甚嚴重府君獨心易之時登院中樹而窺學士過故作聲驚使見大恚然度無如何佯為不知也時江彬挾武宗南下府君欲率汪應軫江暉曹嘉舒芬馬汝驥等上書言江彬學士石珤止之府君旦賦烏母謡掲之壁珤語不得出吐舌焉乆之竟為給事中言江彬謫裕州知州既中不屑州而以諫出益怏怏不樂臺省監司過州不出迎亦無所託疾人或勸之怒曰齷齪諸盲官受王生迎耶當不愧死而出候其師陳鳯梧以他藩道者梧好謂曰足下候我固厚而御史從後來足下儻有意一見乎且足下厚我以師故即御史君命也府君曰善乃前迎御史喻茂堅茂堅素鷙悍至州數州吏㣲過對府君榜之府君大罵曰陳先生悮我我見辱挺身出悉呼其吏卒從守勿更侍州吏慴伏無敢留者茂堅窘不能具朝餔謀於陳鳯梧為謝過稍給之僅得夜引去於是監司相戒莫敢道裕州而恨府君益甚為文致大梁獄獄中有左賦賦曰晝晦宵明川停嶽行隆冬劇燠六月而氷墮毛不揚石舉輿升廢鼙振韵奮霆無聲羣欣逐臭乃厭蘭芳猜鸞駭鳯精粻飼梟仁蹻徳跖勁弧射堯恬海狎江隘瀆沉舠風虎輟嘯土兕而號曠聴既收聾司音矣彼之朦朧五色分矣駿足則縳蹇服乗矣侏儒引臂上捫星矣醜女專憐婌媛不御讐璧惠蠅踏巾首屨適郭捐逵擇潦而歩賁獲閉勇尫夫勁弓麓兔拆趾獵者競兮不根而葉季為孟兮亂曰被繳之鳥載㧞其翎彼實酗酒謂爾何醒冦踰其垣導寇以登彼田不治懟隣之耕及出獄罷官歸家居益自放逹官貴人來購文好見者多囚服蓬首垢面見之間衣紅騎牛嘯歌因作述邃螢火二賦以自廣其述邃賦曰繄南服之靈萃兮頷豊慧於方童稽統世之軒崇兮惟哲人焉以降歘翼振而霄舉兮紛齊羽之誰蹤載殊薦以邇秩兮帝實洞其美𠂻𦍑嶽立而坎視兮將媒静乎遐至中實愠乎攘攘兮詎徒與之求避謇命占以吉貢兮覽蕪蔓焉是艾靡市背而岑閴兮曰惟窅乎其内隈不岌岌而崇兮逕不疊疊而遒彼衙衙之侈搆兮反予睇其足羞抗隆棟以締宇兮修垣遵乎坤隅約蓀蘭使被椽兮令日月乎常樞茍能奐娯以宅志兮是固予心之所仇重仁而襲義兮障夫塵之累也扄禮而牖智兮專乎其所事也吾將服貞一以省處兮夫豈惟藝之囿也括道器以充詘兮固衆兆之所駭也紛悸矚以竚貽兮欲干傺而儃徊眩厥施而弗竟乃各以其膚猜嗟躁士之本剥兮宜甫趨而忽蹶醜憸夫之懐詭兮乃讐直而委折傷二者之偕失兮荃菉葹審厥居心務却以基進兮惟欿然裕其所如晦累而冥探兮所以君乎紛華彼時俗之佻澆兮背繩墨而馳驟予將服正則以恬守兮虞窘歩於欹陬夫朋不可以聲來兮功不可偶作疇廢伏而有章兮疇棄耕而能獲亂曰仆不僵兮進不妍歛神志兮守吾𤣥有弗據兮孰敢奸匪邃道兮曷其然其螢火賦曰當朱明之杪月翫流螢之宵征感温風之扇爍醸腐草之末榮既化植以為動復縁死而遂生庻揚光於𡨕閴甘匿景於太陽或内照之猶尠焉旁燭以無疆謬用晦之邃㫖實自焚之為防孰潜形而更昭孰益膏而罔竭何恒㷔而不灰何炙手而弗熱彼𤣥宇之巧入訝明珠之翻飛偶驚飈之散激駭星辰之乍希羌倏明而忽滅盖石火之暫爾其代燈燭於書筵紛軒除以見掇幸蝌蚪之與隣聚朋侣而嚢括將炫赫以階危恨微軀之難脱亂曰日月出矣爝火何為闇然而章聖哲弗譏伯陽守黒豈邇禍機會世宗欲張楚詔修楚史都御史顧璘心知府君竒節䟽上世宗䟽曰臣都御史璘頓首昧死上言夫陛下欲張楚勒成一家之言備萬世天下之觀乎非得倚相觀射父之才不可故裕州知府王廷陳故亳州知州顔木皆有良史才惟上財察於是起府君及顔木給筆札承天居頃之書成上之世宗賜金幣然亦有所長短而璘嘆曰天乎夫王顔之才竟汶汶也府君性固髙潔即平居郡國之吏無敢輙至其廬即至不得見惟大梁郭鳯儀東呉皇甫汸各以其業進相得甚驩故夏宰相言時時餽遺不絶府君無所答亦不大通長安書其介如此著書十七巻二十餘萬言先是舒芬江暉曹嘉皆貶皆曲赦汪應軫為副使馬仲驥至尚書顔木亦罷官以死木未死時故人為叅政至随川訪木匿不得見既行部他邑有田父荷擔以炙鷄獻酒由中道入門㦸呵止之乃木也因共飲至醉委獻擔以去追問邸舍人莫能踪跡矣論曰太上立徳其次立功又其次立言夫其以尺一之書上建章闕下至死不慘沮者非其偶然亦計畫無所復之耳乃其從容優游桑之不止刼之不撓何蓳堇也夫漆園貧賤𤣥亭寂寥蠶室下而自叙興上官讒而懐沙賦語黙相抗進退相角矣然節義之於支章猶二之也代不數而得之楚人不數而得之府君節與文不兩得而府君佹得之此豈富貴利逹足動其心哉霍支敏公傳郭棐霍韜字渭先號兀厓更渭厓南海人生而頴異年十九始發憤學業不知芬華可欲事竭力奉親嘗書居處恭三字坐卧相對心無外馳曰他日對君亦惟是其志盖素定也入郡庠為督學使者屢擢首多士癸酉舉鄉試第二名甲戌會試第一人廷試擬鼎甲以倒用讀巻官闗防寘二甲第一䟽請歸娶旋丁外艱讀禮暇日博渉羣書著象山學辨雅樂訓釋辛巳北上過飛來移文山神以熄虎患又毁滛詞以杜舟楫之害秋授兵部主事世宗即位上大禮䟽明繼統不繼嗣之説力詆禮官議禮之非曰崇正統之大義曰正彛倫之大經皇上於孝宗稱曰皇伯考於武宗稱曰皇兄於興獻王稱曰皇考其正也於廟祀孝宗祝之詞稱嗣皇帝姪於武宗祝之詞皇帝弟於廟祀興獻皇祝之詞稱皇帝孝子其正也是故正統之傳由憲宗而孝宗而武宗而皇上相承無極此大一統也武宗於皇上不失兄弟之倫皇上於興獻不失父子之親此大綱常也時服其議嘉靖壬午進三劄曰居處恭為聖賢之大精任大臣為聖政之要曰六官舉職表率羣僚曰救積弊正人心擴天理遏人欲侃侃萬言真致治鴻畧也時以董賈比之力疾辭歸開四峰書院集逺近好古之士講明聖學丙戌大禮書成陞少詹事兼侍讀學士固辭屢㫖不允賜文獻通考一百巻命部檄停諸司俸趣行不得已出山既入舘上辭免日講疏及治河并救積弊疏轉詹事兼學士上鹽法及任大臣疏又上慎保聖躬并采老臣遺議疏戊子陞禮部侍郎尋陞尚書五疏辭允上謹天戒疏又上郊祀疏上怒付詔獄尋免復原官上廓大公賛聖治及慎選科道䟽丙申陞南禮部尚書己亥轉北加少保掌詹事府事進聖功圖上災異自陳疏上禁訛言疏庚子春上薛瑄從祀議十月卒於京詔贈榮禄大夫太子太保謚文敏初上命公入内閣辦事力辭不拜盖公天性忠直剛大由於所養見之所韙一國非之不顧天下非之不顧其節操則一介不與一介不取歴官三十年位居上卿服無重采食不兼味澹泊一類儒生不肯認李時毛澄為座主不認三百士為門生至引㧞士類勤勤懇懇薦王守仁平粤冦用王瓊握兵柄薦王九思康海李夢陽之文章氣節至薦隠逸則曰臣不如甘學林克忠人但見昻然屹立不知其欿然不自足休休而有容也公立朝疏凡九十上皆闗軍民大計世道大防學術正而徳施普矣其譲相有崔菊坡之風犯顔有張曲江之直上嚴憚之每起居有失輙曰霍韜得毋知否公歿後僉夫揚眉善人重足咸嘆曰使公在寧有是耶君子曰昔汲黯在漢淮南寢謀世宗初元大臣殫力㐮賛求其謇諤不回有長孺之風者公一人而已何端恪公傳郭棐何維柏字喬仲南海沙滘人大父方父應初皆以公貴贈通議大夫都察院左副都御史公生甫四嵗見客有尊貴者端拱為禮客竒異之長為三水諸生閉戸讀書玩繹周程諸子得其大㫖每言動稍忽則曰得無與聖賢殊乎嘉靖辛邜以三禮舉於鄉下第歸入西樵古梅洞澄心静坐日讀白沙集思見端倪時霍文敏方文㐮常過訪洞中語多黙契乙未舉進士讀中秘書益窺見精藴尋授御史上沙河功徳二疏省費百萬毛總制奪情起復征安南疏論其非是上嘉納焉未㡬在告復入西樵與劉素予模王青蘿漸逵陳尭山激𠂻論學門人逺方來者履常滿癸邜北上訪羅整菴以證白沙之學日益精進既補尋出按閩值嵗大祲福興漳泉為甚公亟畫筴發倉親率郡邑長吏賑恤全活數十萬命時分宜竊柄摧陷言官公首疏其奸比之李林甫盧杞上震怒詔逮官校至公即受繋神色自若賦詩有孤臣儻有生還日聖徳真同宇宙寛之句所過士庻遮留動以萬計緹騎持之急諸生大哭公徐徐拱謝曰此予慮定而後發人臣之義自當如是生何哭為民間失為歌謡有誠徴録以傳逮至廷杖僅存餘息備極栲掠語不變下獄與楊斛山周納谿劉晴川三公聚首甚愜上一日於宫中扶鸞問養身治國之要神對以養身莫要於寡欲治國莫先於惜才上黙悟乃削籍歸時通議公方矯健公日侍膝下稱觴為懽教其弟維椅舉進士讀中秘書公乃屏居詞林日集生徒發明理竅名所居曰天山草堂又闢河南勝地為天山書院以處從逰之士隆慶改元詔復原官遷大理再恊院徐文貞楊㐮毅二公敬重之機務重大多所取决既而丁内艱還廬墓側服闋遇今上登極召入仍舊職轉貳銓卿上修聖徳勤聖學飭羣工諸疏多讜語忤江陵意值江陵遭父䘮奪情太宰張公瀚以保留質之公曰此萬世綱常不可易也江陵聞而銜之遷南秩宗實逺之也公次潞河乞骸骨歸居草堂與諸生講明白沙宗㫖逾十年丁亥卒上惻然命祭賜水衡金錢以塟謚曰端恪公學以無欲之教為宗而忠孝實行岀處大莭可為世範所著有易義禮經説太極圖解天山草堂存稿及編陳子言行録傳於世學者稱古林先生明文海巻三百八十八
