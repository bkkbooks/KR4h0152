body:
  text: 明文海卷三百八十九餘姚黃宗羲編傳三名臣朱恭肅公傳瞿景淳余為諸生時有自吳門來者道太宰朱公却商人請一事余深有感焉夫不惑於剎不受請托知自好者皆能之公於商人請獨蹙然曰伐國不問仁人此言何為至於我哉因深自刻責商人乃悔罪叩首請退此於楊伯起之却金或過之矣嵗辛亥余以使事過吳門始獲拜公於里第公風度凝逺真後學典刑不數年公乃捐館逮今丙寅公從子景元持公年譜授余余伏讀之乃作公傳云傳曰故南京吏部尚書恭肅朱公諱某字某别號玉峯蘇之吳趨里人也公自幼端重絶嬉戲稍長服習侍御蘧菴公庭訓潛心墳典言動悉有程度識者已知為異人年二十三舉於應天明年丙辰對䇿大廷賜狀元及第時敬皇帝注意作人擇儒臣董教吉士公亦肄業其中博求約取淬礪不休學日益邃每修會典修實録修通鑑纂要一代典訓多賴刋定公侍經筵每進講必先期沭浴務致誠敬庶幾感格考試取士得人最盛異日多為名臣公之奉職固不必勤一事以自效也為修撰凡八年而晉侍讀又十有三年而晉侍讀學士學士踰一考乃晉南京吏部右侍郎今上即位轉禮部右侍郎踰年轉左侍郎時內閣缺人吏曹每以公名疏上而不果用又踰年乃晉南京吏部尚書公恬淡簡靜歷官所至惟知自盡而不知其他故其進每難而士論益重余考公遺事竊有異焉公生平與物無忤雖犯不校尤耻言人過若一於寬柔者然武廟初年逆瑾弄權搢紳多遭折辱公獨抗禮不屈雖瑾怒奪公一級而不以為意是又何壯也蓋公之不校者含宏之度而必守者義理之勇也中世士大夫忍垢無耻自詭於和厚以避權勢者身則全矣風莭不立姦邪益肆國何賴焉亦有負氣好勝自托於風節而深疾不仁者名則潔矣然身既不容黨禍遂成又何補焉此孔光張禹之徒既終於賣國而陳蕃竇武之賢亦終於速禍也余於是而益嘆公之不可及也公在禮部奏減光祿冗役若干人在吏部特薦遷謫鄒公守益皆有補於聖政余猶嘉公考察自陳一疏其言若曰國家考察非必每衙門各去幾人而後可以為公也如有可去雖多去之可也如無可去雖盡留之可也何必槩去之哉因堅自引去此雖公一時自陳之辭迄今柄考察者酌而行之可也公生平不自炫於文而太羹玄酒玩之有不窮之味不自矜於莭而泰山喬嶽望之有難犯之色對人不輕出一言及臨大莭議大事必據經典求至當雖賁育不能奪蓋養深而守定信天下之完人也已家居三十餘年雖處城市不一入公府逹官蒞茲土及縉紳過從者始一延接旋卜築山中以書史自娛時與故舊子姪散步逍遙田父見之不知為貴人云公處父子夫婦兄弟之間情意懇惻居二親喪哀毁三年恆廬墓側錢淑人卒公獨居二十九年旁無姬妾之侍弟姪姻戚恆相對共食雖無異味必盡其歡經時不見必令人速之蓋天性惇篤不俟矯飾也公雖身為大臣接人恆溫恭有禮不間卑幼雖家無厚資憫窮恤匱惟力是視民苦役費首割已産十一為役田助之詩曰髙山仰止景行行止余之仰公久矣公之懿行不可殫述因論其大者以貽同志云論曰憸壬之害正甚哉夫有瑕者不免於畏人太宰朱公雖逆瑾之勢且不為動何言有畏而科官得不去哉公既被誣請去辭甚激切聽者危之上雖聽公去猶命有司歲給廪米夫役蓋異數也非上仁明曷有是哉公既沒而恤典有加不俟陳乞蓋公之受知素深而完節皭然始終無可疵議矣彼嘵嘵者徒自彰其惡於公果何損也上篇鄒觀光許孚逺浙江德清人為吏部主事會時有學禁遂出為僉事旋降運判量移南太僕丞纍遷知府陜西提學副使以倡道作人為已任升應天府府丞會都御史李公材以邉事逮公移書所知訟寃御史論公私揭違禁遂得降謫歸二季起補僉事公沖夷恬淡見者心醉所至尚德化其學以知止為要領以格物為工夫嘗謂存省三十餘年以古人敬止為法比來見格物之功真切嚴毅不容躲閃有物則蔽無物則明有物則亂無物則定蚤夜之間絶無物纍則心境寧貼庶幾敬止又曰世之學者根器不同造詣亦别惟其悟入無有不可豈必以一説自號率天下而從之邪又謂王文成專言致良知洞徹性靈而學者依傍靈明知覺遂多淪於空虛踈略之病李孟誠專以修身為本似至直截簡易而乃謂格致誠正齊治均平并以修身為則又落孟誠之見道無人我亦無古今朱子嘗更程子之説王子復更朱子之説後有著述要以發明此理豈敢遽以為是而謂度越前人者哉劉東星山西澤州人自庶吉士改給事中降蒲城丞升知縣纍升至浙江提學副使湖廣右布政使公沖夷粹雅飲人以和所至與賢士大夫講説文藝討求名理若不知有一切世法苛禮者而職業自舉士被其容接者咸謂若精金粹玊頌之不啻其口出雖輿臺𨽻卒亦知其為清品也在楚時間留諸士脫粟飯猶出簪珥治辦云劉應麟江西鄱陽人自庶吉士改禮部為郎時與同舍諸郎為讀書會以文行相砥礪嘗曰修行欲如河津之篤摛詞欲如獻吉之贍後升廣東提學副使乞致仕歸已起補廣西提學纍遷至浙江左布政使升僉都御史巡撫吳中吳中諸貴人以逋賦為常至纍閭閻公至察積逋甚力然諸皆豪有力所從來久逺科臣遂劾公夫歲飢也而急催科邪公亦疏言臣所督者力不至逋而損國病民者耳非損民以益國也無何乞病歸詔許之會有科臣言公真誠任事不宜聽公請户部復疏極言公賢遇缺起用然公業已歸田數年弓旌未及也耿定力湖廣黃安人自成都知府遷福建提學副使與其兄司徒公皆以倡明道學為任司徒公之學深詣而有權衡副使公之學真誠而無粉飾每與士大夫論學就事論事極有針砭至公立身行已絶不為岸異而人自以為不可及薑士昌直𨽻丹徒人為户部郎慷慨有志節嘗疏請皇上視朝聽講上皆嘉納之最後疏言黜姦邪培士節定國論核名實汰罪贖五事其大指謂人臣上欲有益於國以正直為第一義下欲有益於民以亷潔為第一義請黜徐顯卿等而薦陳有年諸君子無何出為陜西提學副使教士先行誼而後文辭諸生試日人舉德行端方一人不舉與不公者黜罰有差又集士之俊者於書院分為五會曰經學會曰史學會曰古文辭會曰理學會曰當代典故會邱度淮安人為汝寧府知府孝友清謹士論翕然稱之是時陳汝之間嵗饉公精心賑濟所全活甚衆蕭良譽湖廣漢陽人寧國知府清癯文弱若不勝衣而抑豪子困興士化民治行為江南北最遷河南提學副使乞病還生作自檢編以貽諸生其言曰此心之神足周八極而徹千古惟時從靜中收攝完足常定常明則精采不可勝用又曰神愈濳則愈王智愈晦則愈明思愈近則愈逺力愈不足則愈有餘又曰外孝弟忠信無著落處外辭受取豫無關鍵處外視聽言動無體貼處外喜怒哀樂無煆錬處不學者既沉酣侈肆學者復虛寂荒唐敝何時而已也皆足稱名言云崔應麟獲鹿人余成進士時偶從一宦于真定者與語渠屈指三輔清修惟崔君耳為户部郎監兊九江行日焚香于庭盡出其羡餘出示吏書毫不以供行李升濟南府知府持正不阿顧憲成無錫人為户部主事江陵病盡國祈禱獨君不署名江陵殁調吏部主事遷稽勳員外郎上疏論尚書何起鳴及罷四御史事忤旨謫桂陽州判官遷處州府推官居憂服除起補泉州升考功主事管選事會有推輔臣之命太宰陳公與君各默擬七人已而皆合及詣執政執政詫某何以不與君爭之曰相國知其人則當為慮其終始倘費調停非國家之福亦非某公之利也時同事有必欲如相國指者君不為動執如初已而削籍某公羅萬化也下篇鄒觀光范世美江西髙安人以進士為揚州府推官遷南京刑部郎纍遷鎮江府知府攻苦茹淡問遺無所受郡當水陸衝冠蓋輻輳君無問顯晦僅一書代餉不為設供億居常布衣蔬食泊如也王貽德廣西全州人以進士為分宜令輒起輒躓稍遷嘉興知府清而執豪貴人干謁一無所聽當試弟子員有富人子干三相國書一日并至君故置之譽髦一落郡名無所復覬遂多就京師試者嘉興士夫為之語曰若官但貴清則何不刻土木為人而被冠裳彼不更無求邪蓋不得志于君者譏其不事事云耳然卒不能加一語徐大任南直寧國人進士為建寧府推官升南京吏部郎中纍遷河南副使調簡補廣西副使疏乞致仕部覆留之君生平繩趨尺步一言動必領于檢柙仕宦二十年而敝廬僅蔽風雨簡素不異諸生時任江西副使瀕行寮友以錦軸贈行割其文受之而還其緣幅鍾昌廣東東莞人進士纍遷彰德府知府時余以稽勳員外郎起家北上道經彰德供億僅具器而已余心竊識之比抵京師而君已升鹽運使銓曺故以運使為劣轉余嘆曰孰謂古道可行於今日邪稍亷其平生古朴大都類是已頌其清稱者什而八九張稽古陜西寧夏人舉人嘗為河南按察每出按所部盡郤廪餼第市餅啖之以其餘犒從吏即行居家時嘗乘一蹇驢行田間耕植自給或謂其不能忘情家人生産余謂若爾則古耦耕灌園之儔非邪張佐治福建平沙人進士知縣纍遷紹興府同知自俸入外一切無所取嘗署上虞縣事數月矣忽發一函歸貽衙舍衆共訝謂君從來所未有則紿其使者發視之乃栗實百顆貽太夫人耳士民為之感泣髙拱辰山西河津人舉人任西安府同知委署數縣印清苦如一日直指初亦知而薦之故事受薦者例有謝以舉人薦者謝百金君無以為禮亦竟格不行其後遂亦不得薦閻汝坤山西朔州人舉人為揚州通判揚故利藪而别駕故又多不自愛君孤立為潔其行部如張稽古故事嘗遣家屬婦酷暑騎一羸馬走赤日中屬官有知而憐之者追送長夫秋毫無所受馮渠江西新城人進士任泰興知縣風裁著聞相國申公屬吏部調吳縣君未任貽相國書大都謂相國謬知渠而任使之渠何以報德相國家有不法者請得以法從事所以報也及至吳縣裁豪暴拊貧弱具如泰興時丙戌大計業議罷有救解者得降二級調間散稍遷廣東永安知縣調東莞余知其亷乃東莞議論沸起謂君任刑太甚余遇泰興吳縣永安東莞四邑人輒問狀人人言君敝衣冠視事如窶人子而治用嚴最後泰興人言君所督責者衙門猾吏胥及豪強人耳實未嘗妄加刑百姓也頃余覽新城鄧元錫贈君任泰興序則君砥礪好修自舉人時然矣諸壽賢南直崑山人進士觀政時會御史房寰劾海忠介公君與進士顧允成彭遵古抗疏言寰何人而論列忠介得旨退回原籍數年俱為教授夀賢得河南南陽嚴督諸生課而敦琢其行誼不少寬假即束脯不受余北上見君貧甚適直指使者餉余遂以贈君君受之踰二年升國子助教詣京師竟歸余贈封識宛然助教賃民居僅一楹與闤闠無辨是時允成遵古并抗節清修稱三進士云王紹先陜西三原人以進士為工部主事會潞王出封君同太監往營建務精核節縮時與內豎忤躬自苦約即廪給不受撫按以例餉君君貯衛輝府庫還之郡守爭曰府庫非貯問遺所君為不動已事竣還朝言官劾其不繳御批降調山東鹽運判官率其妻子之任數米而炊脫簪珥自給數月乞致仕去張鯉山東膠州人嵗貢任主簿升縣丞再升山西芮城知縣騎一騾之官拮據勞作與百姓均甘苦所得俸入常為民完上司贖鍰或有徴取不能辦惟飲泣而已無何升鄭府審理正仍賣向者所騎騾歸舊銓氏曰髙山仰止景行行止諸君子皭若淵澄屹如嶽立庶幾中行尚矣在節之上六苦節貞凶悔亡説者謂聖人之不貴矯也如是非然也雖凶亡悔豈與夫不節之嗟同日而語哉立意較然不欺其志即汶汶猶將慊焉故曰假年以學易可以無大過矣明文海卷三百八十九
