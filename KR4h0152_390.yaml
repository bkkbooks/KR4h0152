body:
  text: 明文海卷三百九十餘姚黃宗羲編傳四名臣海忠介公傳郭棐海瑞字汝賢瓊山人為諸生時即抱當世之慮嘉靖丙午督學林公試嘉其文又奬其誼已酉督學蔡公再試竒之詢知其素嘆曰真所謂涅而不緇者遂登鄉薦第九名時居豫書室豫偶同登相得甚歡癸丑會試弗第曰士君子奮迹行志何必制科就福建南平學諭時黎賊內訌公伏闕上書極言開道置縣可無嘉靖間及今征剿防戍之苦識者壯之及至南平首揭朱子白鹿洞五規輔漢鄉試粹六事并摘鄉願忠信亷潔之似孔子申棖剛者之辨集諸生講明大義相見外不許更贄一物尤抗學官禮於臺使監司一遵憲綱郡守諸大夫視學升堂左右教官俱跪公獨中立時稱山字筆架教官戊午擢知淳安亟申飭曰知縣知一縣事也上而朝廷吾父母中而藩臬僚屬使客卿大夫吾長昆弟下而吏書里老百姓吾子姓遇之各有正道若謂止可潔已不可潔人潔人生謗凡所行不可認真認真生怨取禍不顧朝廷之背否而以鄉願之道待其身以鄉願之道待人浮沉取名非知縣也於是著為令曰淳安政事而一邑之政具是矣自奉簡約俸薪外一毫不擾雖家僮亦令樵採庭甚清間一切餽遺悉杜絶不行曰盡天下而不為上官之賂也豈盡不遷盡天下而惟上官之賂也豈盡不黜胡以身為溝壑也又毁淫祠為社學時都御史鄢懋卿挾權橫行公獨抗之不少絀鄢銜之假手袁鹽院論公改調公赴部吏侍鎮山朱公白公清望於冡宰遂補興國公見地瘠民貧弊在浮糧乃條八事上南贛都御史吳堯山公次第行之尋擢户部主事時肅皇帝晚年玄修諸臣委靡日甚乃疏直言天下第一事以正君道以明臣職謂為身家心與懼心合職所以不明求長生心與惑心合君道所以不正侃侃數千言自許於勿欺而犯之義直聲震天下無不欽仰海主事也者疏入逾數月下公詔獄中外臣工相顧失色讞獄雖上然竟留中肅皇固未有殺公心也已而莊皇繼祚詔出復原官改兵部纍擢僉都御史巡撫應天公一意斥貪墨抑豪強革浮奢釐宿弊出入輿從甚簡風裁凛然大濬吳松江為萬世利以清丈搆怨豪右嘖有煩言乃解督撫事歸家居十餘年嘗曰吾人身偹萬物之理當以萬物一體為己任士君子出處何常視所遇耳有君如此寧忍負之歸未幾而屢章薦起有謂志貫日月望重華夏萬厯乙酉起為南臺僉都御史未至晉南吏部右侍郎時公年七十有二聞命就道自矢勉副任倚獨坐小舟自五羊度嶺抵建業沿途寂無知者履任署部事亟陳治安要機曰欲安百姓無如守令上至司道撫按而致望閣部諸大臣歸本於君身公用世意甚鋭而梅房二御史大肆詆擊惟彭君遵古諸君壽賢顧君允成三進士連疏公大節少舒正氣以維持世道耳公乞骸骨疏至六上皆不報丁亥冬卒於官年七十有四檢篋中祿金僅一百五十兩綾紬葛各一都御史王公麟泉率屬捐金治具乃得歸訃聞上咨悼賜祭贈太子少保諡忠介蓋特命也公精忠大節自足不朽而生平學問惟欲識其真心必為聖賢不為鄉願謂孟子功不在禹下嘗以惡鄉願為第一云明文海卷三百九十
