body:
  text: 明文海巻三百九十一餘姚黄宗羲編傳五名臣大司㓂蘇公傳蔣徳璟上神聖起潜邸悉逆璫與妖姆交通状以次伏法收捕其親黨而簡吾邑石水蘓公為大司冦治其獄公親奉宸斷手定爰書條璫姪偽公魏良卿姪倩左都督楊六竒等客氏子都督侯國興弟都督客光先姪錦衣指揮使璠等斬戍各有差而戮逆璫及客氏尸復題蠲萬工部燝懸坐贓釋方御史震孺惠給諌世楊李戚畹承恩等於獄他株累得末减三十餘人而除錦衣刑具如腦篐烙鐵一封書鼠彈筝攔馬棍燕兒飛諸名色皆焚棄天下快之至定虎彪案以為殺人者應抵死攫官者宜褫官尤蔽厥辜當是時巨憝翦除天日重掲識者以聖主威斷賢於舜之罪四凶而惟明克允公實贊焉公舉萬厯壬辰進士二甲授戸部主事出守彰德内艱補汝寧未任擢江西副使改督學歸薦起卿南尚寳晉太僕少卿擢僉都御史撫浙進侍郎兼憲職督漕外艱起南刑部侍郎改督漕入為尚書督倉塲冄加官銜改今官公郎户部時使過山東見飢民以賑䘏請人或疑出位公曰飢渇由已豈異人任耶出𣙜潯闗税額外多縱舎行商徳之為樹碑丁酉典貴州試心動聞母病馳歸母幸無恙彰德為古鄴地喜格鬬公剖善惡報應圖邵康節孝悌歌曉勸之趙藩禄入多不時徃徃與守閧郡庭如市公悉用邑觧原封先時分給天潢誦義臺使舉卓異第一在江右端模範絶干請規條一倣吾鄉蔡文荘先生文體士風翕然丕變所㧞士姜公曰廣等皆知名有舊輔三以牘至且介同事同里為請公正色不納旋拂衣歸士大夫相與攀尼不得行然竟不曉其故公亦不言也家居七載三徑數椽頥神墳典辰起至寝室問父眠食退課弟及諸子書學粹行高海内宗向之既薦起南卿偕李本寧焦弱侯諸公嘯咏佳山水間澹然自逺在冏寺核俵觧清牧塲蠲落地税馬政一新而自撫淅以後所綜畫軍國大計尤俊偉台區水兵王元尤成者以朘糧毁總哨署旋擁入郡城焚屋放囚稱亂公疏黜大帥王良相叅将楊維垣而宻授計張副使師繹擒梟之㑹部檄抽兵援遼有訛言山東兵毎兵以五十金募者寧區兵陸敬趙鳯軰引例要厚糈海道鄧叅政持不可遂大譁毆把總血盟不散公念譁兵衆未可驟問宻檄定海令頋宗孟諭以祸福且曰部檄能勝敵者殊死皆赦若急散而聽調出征則前罪可貰於是以二人領兵行過慈谿復勒犒賞至餘姚踰城挾邑令勒犒數倍至壩上與新兵競擠溺水五人司道議欲誅之公曰未可動動必生變俟其登舟廼聲餘姚擾民之罪獨捕敬鳯二人梟示衆兵聞之股栗迄至京無敢犯者昌國哨官蒋良忠逐哨總王翼覬代其任嗾兵樹幟以保賢能為名而拒代者施應奎或言宜暫用良忠令戢亂公曰如此則唐卒自立留後之勢成矣檄副帥張可大之昌國觀變而令團練把總楊慈忠出不意縛良忠杖殺之并擒亂兵洪辰等正法廢弁賈祥因遼䧟媒用誑部言有舊家丁五百願歸招集併募兵二萬赴援部給劄正令招集家丁而㑹鄒御史募兵金華祥遂私刻票亦稱欽差且許人自備盤費抵津優給衆隨至杭者萬餘人公懼生變遣其壻把總鄧應科諭曰若欲招兵求官一二千足矣萬人何為且途中食安出復宻令營中舊兵語應募者汝軰真騃世有無餉而可以招兵者乎汝且問賈叅将餉在何處於是衆皆悟散惟飢民二千餘隨行公量給行糧又豫令通判楊墧齎餉先馳之鎮江淮安德州三要路次第散給兵廼至京而疏祥額外多募之罪凢四定浙變云至降海㓂王鍾王錦等擒陳藩吳老等於甌而沿海亦安枕矣它疏减織造停織監軫火災表章先正方公孝孺及吳公寳秀求卹録劾權璫李實不得以屬禮凌有司皆其大者李實即䧟吳撫周公起元於死者也將移鎮而妖賊葉朗生之變起朗生湖州人妖醫馬文𤣥髙弟也聞山東蓮賊反其黨丘太虚等舉事以攻白蓮為名而徑於湖城中先問豪家索買命錢士民駭竄湖守杜公喬林急捕朗生飛報募府公即檄水兵乘夜鼓行復發一虚檄營兵三千繼之詰旦兵至苕衆訝神速人心稍定因次捕誅而文𤣥猶挾宦家子陸鍾竒逃松江馳檄江南合捕吴越底定不至為鄒滕之續皆公力也揚州老庫金乆不㑹璫一旦借大工為名搜括二百萬而屬連司且八十萬遣璫胡良輔劉文耀守解公再疏言銀之得於傳聞者即千萬無難銀之入於鞘解者即銖兩不易輸財終事不敢言勞者臣子所以忠君用一緩二不盡取盈者朝廷所以恤下僅解挖河銀十萬康塩院丕揚加罰遺銀六萬四千九百食塩割沒等銀二萬六千各商逋欠銀十一萬以應猶不可則那解正項十萬両而下季即為扣除楊賴以紓奸弁劉魁等乘寧逺急持經撫咨取淮餉六千緡公曰遼中丞暮春四日受事望日始加廵撫而咨署朔日贋也且篆文不類條十疑鞫之立伏并得其户部應天二偽檄一舉而省國蠧萬八千餘金稱神明焉鳳泗為帝鄉湯沐陵寢重區水旱蝗相繼公下令捕蝗通商平糴復力為海徐贛桃州縣請得改折㑹清河口淤漕艘壅淺清河口者自淮入黄運道也河水一石其泥五斗恃淮流壮迅激河而盪之謂之以淮刷黄自淮弱不能與黄角清河淤墊横亘一灘漸集漸壅父老謂黄河倒灌其患叵測公檄募民兵撈濬復多撥剥船起運且親禱金龍神大雨三日夜淮遂暴長而十餘里之淤頻疏於是七千四百餘艘不逾期遂達津灣以飽神京上疏封金龍及平浪二神因條五議曰急回空早催徴備船袋輪水次改淺船而淺船以杜奸旗攬貨之弊尤為喫𦂳故事外督漕内倉塲事權相表裏公既入督倉益明而添設督餉部臣於津其人墨而狡輙借遼警以截漕為辭而以帶運遼糧抵補盖奸旗有大蠧者四焉漕艘米既侵盗無可入倉一也漕糧入倉累經揚晒為費不貲而遼糧例不晒揚二也遼糧例無尖耗而漕糧毎石外有耗米七升尖米四升二合一截則皆入其蠧三也津募舟往遼鮮一舟輙一百金四百舟則八萬矣既誆米復誆金而齎一空单以折色授受於海内為官為軍皆驟飽四也以故不截不止其賄最重又故為尾帮觀望漕之遲阻皆由於此而遼鮮方報糧到旋以枵聞莫可窮詰時璟在京目擊心惡之公尤洞其弊連疏以職掌力争畧曰查萬厯四十七年至天啟七年津門截漕連失耗計三百七十八萬有竒自天啟三年起毎年始有帶運遼糧三十萬耳即抵還尚少二百二十餘萬皆成泥沙矣且臣督倉方十月而津已八截始猶有帶運可抵餘更何抵乎遼餉自遼餉京糧自京糧豈可專以截漕為事致根本坐困其語絶剴切當事亦明知之而不能盡用也京軍月糧額放折色兩月部臣縁内璫劉應坤請遂欲少放折色一月公復力争謂大倉升合非􅑴江渡河不能入庾多放一月夲色二十八萬倉廪益虚請勅計臣恪守祖制兩月放折之舊皆與時忤復疏言錦衣衛官旗萬厯末僅萬七千餘石自逆璫與田爾耕亂政増至三萬六千餘名文思院匠官冊載僅七百餘名今三千餘名歳多支米二十五萬石鴻臚帶俸序班冊載僅百七十三員今五百二十七員嵗費俸米四千有竒官俸非漕糧比外解止蘓松常三府三萬餘石耳且冊中如魏田客隺諸姓皆奸黨清法當不俟終日上皆立行之既改刑部疏辭有品望端澄明允夙著爽鳩正席倚毗方新之㫖因㑹鞫魏良卿獄及侯國興俱决不待時光先璠六竒發烟瘴永逺充軍至五虎崔呈秀等五彪田爾耕等呈秀窮兇極惡爾耕許顯純怙威噬人最為可恨宜正刑書餘各遣戍而奸弁張體乾以詛呪誣䧟劉鐸亦擬斬復罪状魏忠賢曰忠賢挾先帝寵靈箝制中外交結客氏睥睨宫闈其大者如嗔怒張國紀則立枷而殺數命且連縱鷹犬必摇動乎中宫私憾成妃裕妃則矯詔而革封銜至摧抑難堪竟甘心於非命言官死杖大臣死獄緹騎四出道路驚魂告宻一聞都民重足生祠遍海内半割素王之宫諛頌滿公車如同新室之世至尊在上自命尚公開國何勲數分茅土尚嗾無恥之穢侯欲加九命疊出腹心之内黨遍踞雄邉至于出入禁門陳兵自衛戰馬死士充滿私家此則路人知司馬之心蓄謀非指鹿之下者也天討首加寸磔為快客氏妖蟇食月翼虎生風輦上聲息必聞禁中摇手相戒使國毋痛懐於憂憤致二妃乆抱乎沉寃且先帝彌留之旦詐傳廕子尚以儉一為嫌私藏見籍之贓絶代竒珍皆出尚方之積通天是罪盗國難容若崔呈秀則人類鴟鴞衣冠狗彘誰無母子而金緋蠎玉忍不奔喪自有親父而婢膝奴顔作閹乾子握中樞而推弟總鎮位司馬而仍總蘭臺總憲夙仇廹為池中之鬼銓郎乍嚇驚懸梁上之繯凢逆豎之屠僇士紳皆本犯之預謀幃幄選娼挾妓歌舞逹於朝昏鬻爵賣官黄金高於北斗假山氷泮遊釜魂銷雖已幽快於鬼誅仍當明章於國法其餘魏良棟鵬翼魏志德等及崔鐸崔鏜等或赤身駔儈或黄口嬰兒濟惡而玷賢書無功而攖世爵均應投裔大快羣情磔忠賢於河間尸呈秀於薊尸客氏於市魏志德等發烟瘴永逺充軍盖與振瑾之誅同稱快云於是清厰衛羅織之獄李承㤙寧安大長公主子也以擅用龍袍龍盒為叛僕誑首問斬公謂據律僣用違禁龍鳯紋杖一百徒三年即使承㤙不在八議之條亦無死法况世廟之親甥乎得改徒方公以御史監遼軍不宜比守邉將帥例惠公亦不宜引交結近侍律皆得免萬公劾逆璫築墳僣擬皇陵矯㫖廷杖被亂棍箠死復坐贓三百江西楊廵撫追觧京矣公請令原觧官領回還其家焉上新舉召對盛典召公見文華殿令部大臣各陳所見公疏言刑官舊為清曹稱西翰如王守仁何喬新王世貞軰多為名臣近選人趨羶途争避刑部其視刑部甚輕故屬官志少振作宜倣成化間尚書董芳言令本部辦事進士同各司問刑天選時户刑工三部均選有才品者優與陞調各司到部未一年不許借差回家錦衣衛慘刑宜汰而以防内侍預政蠲租飭邉為第一義謂漢唐宋盛時主德英明决無所謂張讓趙忠田令孜童貫者决無所謂税間架開官市放青苖手實者四夷稽顙亦無所謂輸歳幣講獻納者又引劉忠宣對敬皇帝有曰但得事事如今日與臺閣議當而行乆之自治中庸言不息則乆至於博厚高明配地配天為皇上望皆得温㫖褒納方嚮用而公力以病請因賜馳驛歸盖異數也公諱茂相字宏家别號石水其先光州人徙晉江曽祖春祖璟以子士潤貴封御史父士濳累封都御史三世並贈光禄大夫柱國太子太傅户部尚書公幼頴異有器度為鄉前軰趙公恒所知督學王公世懋耿公定力試竒之辛卯舉於鄉連第時年僅二十六耳通籍四十年乞休沐者七家食二十五年難進易退始終完節有古大臣風封翁家教嚴公奉侍恭謹不啻石建事父奮也父在時禄盡歸親囊無私蓄與諸弟推産分甘妺氏死烈為置孤邜翼視弟姪無異雅嗜圖史不喜徴逐宴㑹門庭蕭然尤喜奨借善類至不善避之如膩嘗教璟曰仕如築垣務謹其基基厚則高不墜又銘座右曰與物無競遇事有為故自閲四朝士大夫忤璫者身危媚璫者名汙而獨超然評論之外非偶然也其學以宋儒為宗以鄉蔡文荘李文節為矩而於本朝名臣言行尤慕嚮之嘗緝為寳善編他撰述如先覺要言讀史韻言正氣編教家三書浙漕户刑章奏除妖公案定亂紀畧東征行稿保約全書暨詩文行世有弟茂杓戊午舉人三子文昌文燾文燿而昌燿與余友善世其家學史氏曰明葢有三璫云振瑾暨忠賢而三汪直軰其小也然皆啓朱邸入纘之兆景帝以郕肅皇以興今上以信而忠賢則我皇實手芟之宇内稱聖焉考司㓂表讞振者俞長洲士悦讞瑾者劉鄢陵璟讞忠賢者公斯亦千秋快舉矣璟道浙淮及在中秘觀鼎革之際頗習公行事嘗取寳善編衡公鮮不合公真大臣哉故著其大者於篇俾後之君子得有考焉明文海巻三百九十一
