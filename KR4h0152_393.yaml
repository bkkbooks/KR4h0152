body:
  text: 明文海巻三百九十三餘姚黄宗羲編傳七能臣詹鼎傳方孝孺詹鼎字國器台寧海人也其家素賤父鬻餅市中而舍縣之大家應繇於官者大家惟吳氏最豪貴舍其家生鼎鼎生六七年不與市中兒嬉敖獨喜遊學館聼人讀書歸輙能言諸生所誦呉氏愛之謂其父令児讀書鼎欣然其父獨不肯罵曰吾故市人家生子而能業吾業不廢足矣奈何從儒生逰也然鼎毎自課習夜坐餅竈下誦不休其父見其志不可奪遣之讀書踰年盡通其師所能師辭之時吳氏延師儒鼎就學吳氏亦子育之使學未數年吳氏子無能與鼎談者其師去鼎遂為吳氏諸子師還邑中諸儒皆與為禮稱詹先生不敢慢鼎聞同邑有王愚可先生者學甚博從而師之學春秋通其説去就有司試不得代趙生試趙生乃得上第以仕於是鼎為趙生曰我學經亦勞矣而子乃以我而仕此豈非天耶然不可無以謝我携趙生白金五十兩而去元末方國珍起海上不能制以重位授之國珍開府慶元求士為巳用是時知向背者以為國盜也不可輔皆匿不出國珍聞鼎有才以計獲之鼎為所獲無奈因為之盡力為其府都事有亷名國珍弟平章事有人犯法属鼎治鼎論如法平章之妻受賕請於鼎持不可曰今方氏欲舉大謀當用天下賢士一心守法曷使婦人得預事乎不許妻怒譖之繫鼎獄半載乃釋復起為上虞制上虞與偽吳王張士誠地相錯軍吏貴臣其衆以鼎儒生不習邉事稍違約鼎㑹衆於庭引一驛丞責以不奉公斬之在庭者皆股栗膝行請罪膝屈乆不能起乃罷後雖元帥萬夫長有所陳説皆長跪以言不敢舉目視其面鼎臨事有才簡牘滿前須㬰而决暇復與故人賔客出遊四方遊士争及其門有馬給事者常與鼎以事過寧海令以下皆迎謁旦暮候其市中人相指歎曰學之能貴人乃至於此乎至正末我兵臨慶元城下國珍懼乗樓船遁於海上怒欲舉兵誅之莫為計鼎為草表謝辭甚恭而辯上讀表曰孰謂方氏無人哉是可以活其命矣乃赦不問更以國珍為右丞鼎亦召至京師鼎為書萬餘言詣闕下須駕出上之上為之立馬受讀付丞相官鼎楊憲為左丞惡言事者奉例徙居梁又徙陜去數年憲敗凡為憲用者皆受誅鼎頼此以免在陜七年大臣薦鼎名於朝鼎至京師中書以謫徙人不宜用将還之於陕鼎恐還為人所輕笑以貲属掾史願㽜掾為之言於丞相曰詹鼎有竒才以例棄不用可惜丞相不信其人在可召視之非誣也丞相果召見鼎問之鼎髯甚美又能為梁趙間言歩趨進退閑雅有威儀丞相甚喜之稱於衆曰詹鼎尚書才也時河南行省缺郎中吏部請命鼎為之丞相曰吾同事以鼎才不可使外也待半嵗除㽜守都衛經歴改刑部郎中刑部佐寮未完有司請除吏丞相曰刑部有詹鼎在勝百軰其見稱如此鼎在刑部一以寛仁行法威聲不起而人皆樂其不苛刻罪人當分覆者争曰願得詹公覆我我死不憾㑹大都督府受賂除軍吏事發誣鼎有贓御史覆鼎鼎言在留守時所養孤甥來省恐有之鼎誠不知御史曰法貴殺有名卒誅鼎與百餘人皆死鼎坐罪薄有才人惜之鼎為文章氣燄逼古人守身亷重行義好學不廢自陜入京師時聞人有好讀書價金一斤鼎無金惟所乗驢棄以買書其為人竒偉如此及死其所養孤甥為之服䘮三年南原王先生傳顧璘先生姓王氏名韋字欽佩上世自睢徙江浦再徙金陵子孫遂為南京人父徽彊直大節成化間為給事中劾大權貴忤㫖謫普安州判謝歸𢎞治初三原王公為吏部起為陜西叅議以直道處廵按御史不合遂乞致仕先生既負異禀復閑家訓德器遂蚤成不為不義不交非友自諸生時屹然有公輔望莆田林公俊海陵儲公巏並引為忘年交又與陳沂顧璘友善切劘為古文辭獨愛唐風意興蕭逺士林徃徃稱服警語舉進士選充庶吉士以才第當授翰苑顧叅議公年高請南便養授南京吏部考功主事考課功行及舉五年考察之典力持公論不少假借百司並見嚴憚從弟由國學生試政欲言文選未閒曹乃正色曰安有身為銓司為兄弟擇利便者乎南曹權輕且然使居北當何如也竟不以言後居憂服滿改除南京兵部車駕主事所攝有快船者主薦方物領以中貴故櫂卒之長率被誅索破蕩無所排救先生厚其資給損其班列嚴其節制害遂减半陞儀制郎中政與國學相闗舊格以諸生衣冠流一切姑息其一二事目頗傷禮教先生曰政尚法不尚情茍以情選何所不至馭民以刑馭士以禮禮有弗協於士何觀於是釐政條布雖喧閧終弗少動擢河南按察副司督學政廸以禮法綏以恩義士咸歸心以吳太夫人老不能迎養遂乞致仕值憂擢太僕少卿卒於家先生性純孝其奉參議公禮恭氣和養豐恵備故公在晚暮清不知乏老不知衰吳太夫人性多恐左右就養未嘗有大聲遽動其䘮之也適病在牀哭必慟絶水漿不御數日遂毁損至槁以沒四方聞而哀之子逄元亦有時名先生嘗曰生兒貴佳不必仕宦故逄元精究文藝不應科目論曰吾登都城望鍾印諸山欎欎葱葱隆偃闢翕興雲霧以敷澤采何其龎厚邪是宜生人之多賢也若王氏父子文行卓卓燦然麟鳯見諸郊藪豈徒然哉而卒不獲大施海内殊為可怪及觀大江洶湧日夜洩尾閭不息又慊然憾矣不然如近時李按察熈景中允暘器中瑚璉而卒早䘮文學金子琮謝子承舉皆有文不第以死抑又何説哉聞諸人言如使都城左右有大澤比吳洞庭揚五湖庶幾鍾水豐物而氣不散越儻亦有輔相之宜乎或曰天地之英率難鍾而易散此又物理消息無容置意也明文海巻三百九十三
