body:
  text: 明文海卷三百九十五餘姚黃宗羲編傳九文苑二巢書子傳童軒巢書子忘其鄉里官爵姓氏所居官舍後縛屋數椽幽閴爽闓喧囂之所不鄰賔客從遊之所不至家貧無長物惟貯書數千卷堆几栖壁陳列左右布架後先者皆古聖賢之文也巢書子公退輒過其中吾伊竟日仰而觀俯而拾困卧而枕藉者無不惟書與俱不以風雨寒暑一日離去若巢窟然因自號曰巢書子久之似有所得益沉酣其間浩然不知天地為大而吾身之為小也渾然不知聖賢為古而吾身之為今也曵曵然若龍之巢海鳯之巢雲亦未足以喻其適也甚而夜以繼日雖疲精神竭嵗月人事廢棄飢渴加身亦不少息妻孥勸之不能止朋遊戒之不能聼輿皂私竊笑之亦不以為意因自嘆曰人生兩間莫不有所嗜好使豫不幸而好酒則必奉罌抱甕哺糟啜醨至於隕身滅性而不知檢將奈吾何使豫不幸而好利則必侵欲崇侈厚蓄盈儲以至亡身覆家為天下之所戮笑將奈吾何使豫不幸而好仙則必燒茒尋草鍊鉛鎔汞卒至於破産蕩業以底於無成將奈吾何今吾幸不好彼而惟綢繆於書籍之間探造化之祕奧稽古今之廢興考哲士賢人之終始辨人情物理之是非雖其矻矻孶孶不少暇逸不猶愈於好彼數者之失乎雖然豈惟無失而已體諸身則身修推諸人則人化建諸事功則政治休和禮樂明備孰非有待於吾之所謂乎且去夫酒雖塵槽枵尊而吾之所得者自若也去夫利雖簞瓢陋巷而吾之所得者自若也去夫仙雖頭童齒豁耳聵目矇而吾之所得者自若也彼數者雖去而實無所貶損於已烏知計乎脫使去則塗目澒耳冥行徑趨貿貿然營於醉生夢死之場懵不自覺其可乎其不可乎秦惟不知乎此聚天下之書而焚之幾無尺籍傳二世而國大亂蓋去夫書則古今鑒戒之不聞仁義道德之不講禮樂教化之不行而終至亡國宜矣彼有國者且爾况其下者乎方今聖天子在上右儒崇道殆將家禮樂而户詩書異時束帛鳴騶賁於書巢吾當腹書以往既而抵掌笑曰吾言夸矣知我者為我刪之太白山人傳李夢陽太白山人者吳越間放人也終吳越間莫知其所自來人問其姓名山人曰我孫姓一元名問其字曰我太初問何以稱太白山人曰我秦人也嘗棲太白之巔於是稱太白山人云於是人始知山人為秦人及問其家世山人不之答故人止知山人秦人也而不知秦何人也山人善詩有超逸才嘗出秦四遊浮湘漢躡衡廬踰河涉泗謁闕里登岱嶽之峯憩日觀觀日出焉竒之駭叫狂走人頗異之然弗識之也於是山人則南走吳會吳會人識山人又識山人詩於是爭禮敬山人山人固善説玄虛又膚瑩渥顔飄鬚望之如神仙中人於是愈禮敬山人而好異之士踵接於門矣山人往來越湖間多在支硎南屏山寺中巨家則爭造寺餽山人美飲食鞋服以是饒裕冠佩之士慕名來訪山人輒供具歡洽竟日酒酣暢歌意態超脫令人起塵外之思人士或事功人説及時事山人則又善説時事率鑿鑿副名實於是人轉相譽稱為孫山人聞四方矣一日山人病且革倉皇屬其友曰死葬我佳山幸題我墓曰明詩人孫一元之墓已而山人蘇起而憤曰幾負我志而吳越人以是覘知山人初無羽化術徒空談放浪形骸稍稍疑避而山人則顧益説世務恆切齒不平其詩亦多為忿激悲壯之音於是用世之士顧益喜之樂與之交義投情合犯濤弄月扣舷和歌俯仰一笑每自許於世無雙而湖舉人施侃者雅喜山人而病其放因説居之山人然之於是買苕溪之旁又説之婚則婚侃妻妹張氏喜山人者聞之率移書相慶曰太初為全人矣是時建業劉麟龍霓咸徙居湖與吳充陸昆暨山人結社遊號苕溪五隱山人始講吾儒性命之學無何病作竟死年三十七矣李夢陽曰豫不識孫山人何如人未之面也往劉子過夷門蓋數稱山人風神藻雅云曰與之遊令人坐忘而山人亦時時詩寄來然豫竟莫知其何人也詩人邵謁傳黃佐邵謁者翁源人詩道大昌於唐而中原荆蜀多名家者五嶺以南當開元盛時以詩文鳴者曲江公張九齡一人而已栁宗元以謂九齡兼攻詩文但不能究其極顧於南士獨稱詩人廖有方者焉其言曰交州多南金珠璣玳瑁象犀其産皆竒怪至于草木亦殊異吾嘗怪陽德之炳耀獨發於紛葩瓌麗而罕鍾乎人今廖生剛健重厚孝弟信讓以質乎中而文乎外為唐詩有大雅之道夫固鍾於陽德者耶是世之所罕也今之世恆人其於紛葩瓌麗則凡知貴之矣其亦有貴廖生者耶果能是則吾不謂之恆人也實亦世之所罕也宗元之貴有方者其言如此而又於世之貴有方者加厚望焉必其詩之果當乎其心也其為人之果足貴於世也然有方之詩與其為人之詳不可得而傳也後世所録唐詩以傳者獨謁與曲江公巋然並存然則嶺南詩人如有方而不傳者不知凡幾而可謂粵無人哉謁以晚唐一介士獲永其名至與諸名家並行其詩當不下人矣使宗元見之當何如而貴之也世傳謁顛末可異焉始謁家食貧且賤屈為縣吏令有客至日使榰牀者三謁不應又頥指之者三謁不應令乃怒罵之謁瞪目視曰咄吏豈供汝榰牀者耶讀書干祿亦易與耳大丈夫當仰居人上安能俯為人役令益怒大言曰死狗胥敢爾盍牽來於是左右提曵之謁不為動掉臂而出握刀截其髻著縣門矢之曰學茍不成有如此髮發憤讀書無間晝夜築書堂隱起水心距縣十里許平居雙鬢蓬然如里中兒親友多笑之謁不自沮也久之博通經子百家束髮苦吟尤工古調學既成為有司所舉抵京師𨽻國子聲華奕奕薦紳間嗟乎謁之成名也由胸中耿耿者激之也天道莫不有陽明而陰濁勝之人莫不有徑氣而物欲柔之故其事君必突梯潔楹以求容也其處官必狐蹲蠖屈以求媚也其臨難必甘辱以求免也其制事必枉道以求合也得志則求滿失意則求哀也言則偽而堅也貌則恭而詐也茍可攫富取貴無不為者無他失其羞惡之本心也茍能充其夲心而擴之其氣可以薄天地其誠可以入金石孚豚魚天下事亡難處者而獨工為詩乎哉今有會稽之竹箭揉而笴之鏃以剛金附以南鵬之徑翮引滿而發貫犀兕七屬之甲不難也使寸寸而屈之曽不足以為挺易坤之六二曰直方大不習無不利直方而大利孰加焉謁居京師最久所與善皆名士然剛躁與時戾以是竟不第甲科作詩多刺時事其論政一篇曰賢哉三握髮為有天下憂孫𢎞不開閣丙吉寧問牛內政由股肱外政由諸侯股肱政若行諸侯政自修一物不得所蟻穴滿山丘莫言萬木死不因一葉秋朱雲若不直漢帝終自由子嬰一失國渭水東悠悠是時藩鎮強戾宰相多非其人故謁詩及焉溫庭筠以其數竒而不遇也及榜其所作三十餘篇以振公道後甫釋褐而卒卒後降巫賦詩自稱邵先輩世共神之迹謁之為人大抵剛而失養躁而無制故其言凌突而觸人剛而無養故其動猖披而自放使或聞道而集義以充其氣固宗元之所謂鍾於陽德者其所樹立曷止是哉志鬱不施沒有餘靈可哀也已謁有詩集南漢史官胡賔王者序之以傳其後吾廣詩人有何鼎孟賔于之屬然皆不逮邵謁戴先生傳文徴明戴先生者蘇長洲人也名冠字章甫生而頴異篤學過人其學自經史外若諸子百家山經地志陰陽律厯與夫稗官小説莫不貫總而搜覼刳剔必求緣起而會之以理為文必以古人為師汪洋澄湛奮迅凌轢而議論高逺務出人意表詩尤清麗多寓諷刺推其餘為程亦竒雋不為關鍵束縳一時譽聞籍籍起諸生間同時諸生多守章句訓詁所為經義類多熟爛骫骳之言先生既聰明強解髙朗自喜下視曹耦莫有當其意者以故人多忌而非毁之然卒亦莫有能過之者每賔興人必擬先生首解先生亦自謂科第可得也而八試皆絀𢎞治四年始以年資貢禮部是嵗貢禮部者數百人羣數百人而試之其名在第一入試內廷復褒然出數百人上然例止得學官當道者惜之勒令卒業太學以需他用而先生不能待矣竟就選得浙江紹興府儒學訓導在官以其學教授諸生諸生多所造就而先生益以其間隙肆志於學學益宏肆考論著述不少怠廢初先生為諸生時紹興有為御史督學南畿者以文學自負先生見其文有所指摘或逹於御史銜之欲論黜先生不果及官紹興御史者罷官家居邂逅有言不相下他日御史死其家誣執先生遂罷歸先生雅志當世自其小時即上書有司請逐里中淫祠去之及壯益究心時事三原王公以都御史巡撫江南特賢愛先生每召見輒欵語移時聼其論議未嘗不偉歎知先生非經生也及先生至京公已為吏部見之驚曰爾尚舉子耶因問當時切務先生條上數事大要以用賢為國家首務又勸公不棄邇言不恃已見勿以嘗挫愞奪素志其言謇諤皆有所諷切在紹興時浙中海塘為患有韓參議者從先生訪水利得失先生條刺利害興廢及今修築事宜纎悉詳明而切於用韓遂取而行之民至今以為便先生所著有戴子若干卷隨筆類記若干卷讀史類聚若干卷通鑑綱目集覽精約若干卷經學啓蒙一卷竒字音釋一卷禮記辨疑一卷氣候集解一卷濯纓文集若干卷和會稽懷古詩若干卷補文房圖贊幾卷先生年七十有一以正德七年正月二十一日卒先生兩娶皆夏子四人思憲憑應憑縣學生女三人孫男女十一人少谷子傳黃綰少谷子者閩人也姓鄭氏諱善夫字繼之少負才名不遇師友學凡五變而始志於道就其所履考之可謂今之豪傑非耶蓋少谷子初業舉子欲從今世成功名乃自悱曰舉業足盡此生乎遂刻意為詩文將追先秦莊屈唐杜諸人之作研求步驟既得之又自悱曰文辭足盡此生乎遂慕東漢以來至於南宋髙人逸士孤風逺韻之可激者而追蹤之又自悱曰風莭足盡此生乎遂慕西漢以來至於盛宋將相名公鴻勳盛烈之可垂休者而從事之又自悱曰功業足盡此生乎遂慕堯舜以來至於孔孟修已經世之可參立者而尚友之曰道在是矣吾將沒身於是乎昔者嵗在壬申豫官後軍知未足於道將隱故山求其志少谷子為户部主事督稅吳江之滸墅豫過而遇之握豫手與語竟日而别别猶眷戀曰吾亦自此遁矣子不我棄其將訪子于天台雁蕩間乎豫歸六載嵗在丁丑而少谷子果來遂與坐凌峯步石梁倚天柱面龍湫倦則歸紫霄卧豫所居謂之石龍書院者時天晦大雪浹旬不止人蹤盡滅豫晝伐松枝夜燒榾柮與少谷子對坐劇談堯舜以來所傳之道六經百家禮樂刑政天文地理律歷之源流及二氏之所以同異極於天地之間無一不究少谷子亦盡出其平日所著述者以質豫又貽書其友孫太初高宗吕傅汝舟諸子使之遜志而同歸故太初之逃老歸儒皆少谷子啓之也少谷子又自謂平生知已莫豫若者但恨相遇之晚遂忘形而不忍去豫兄芝谷主人因為少谷亭以居之南洲應子亦來會凡數月而出至台城台守金陵顧公欲重勝會乃作玉輝之堂以延之少谷子時以起疾將趨朝豫乃與南洲子送之渡錢塘而還少谷子又與豫期曰吾為父母贈典未獲有此行行當不逺再訪子於茲山以共老焉少谷子入朝為禮部主事升員外郎三載考績乃推封厥父母武皇自稱威武大將軍鎮國公欲東幸泰山遂從南狩廷臣莫敢議者少谷子特為疏論其非禮并指斥權姦之所以逄迎及狩遊意外之虞詞極剴切率羣僚共上之武皇怒杖之闕下或死或竄或削籍為民者而少谷子瀕於死者亦幾矣既而告歸果再來山中又同入雁蕩登天台卧于龍湫華頂之間糧絶殽盡則掇山花乞僧糜以食者各旬月而去既而武皇晏駕今上入繼大統豫與少谷子先後各被薦召少谷子則貽書於豫曰今上沖年百無玩好一味恭默誠堯舜之資也今日所急者知學之臣以講明古帝王執中之傳使聖德日新月盛然後可以責成唐虞之治今日四方徴召多是丘林沖養君子今日所闕又非尋常百執事如先生者直宜處以論思之地勿泥常格更得一二元臣鼓動其間使舉朝皆相信附使有道君子得安其位行其志積之嵗年不患先王至治不見於今日也既而聞朱御史白浦之卒則為詩哭之即繼一詩題曰憂其詩曰柱下朱郎成永别江東黃尉竟何求黃尉指豫也以白浦嘗薦豫故于其卒而云云其於斯世吾人之情之責望何如哉豫出升南京都察院經歷携家過越聞少谷子升南京刑部郎中未幾改南京吏部郎中有書期將至越訪陽明先生先生聞之喜留豫候之月餘不至豫至金陵而少谷子訃至訃者曰少谷子出經武夷陟絶巘闖隂洞不知其疲且襲寒醫誤用藥遂病革速輿歸至家二日而卒年三十有九乃嵗癸未臘月晦前二日也發其藏蕭然無所有斂而葬之者皆福州守汪君文盛别駕陳君鑭之為也少谷子器度溫厚而剛果超邁而淵密清介不為激抗貞信不為諒執皆天資之近道者也視其貌瀟灑清曠碧鬚蓮目若神仙中人至其自勵實足茹粗糲耐煩勞馳風塵其與取可以謝萬鍾而不顧揮千金而若芥其與人交小而一語諾之間大而死生患難之際未嘗或爽又每有千里命駕而不失雞黍之期之風其處家弟妹七人少孤撫之成人而竭力為之婚嫁又以其田贍族母及姑夫之孀居者又舉母黨之不能葬者二十二喪其居官許墅則寬商船之稅而不虧國賦治強狷之罪以惠於良善禮部則每執典秩以贊其長如論歷元嵗差之未定日月薄蝕南北分秒之難齊皆鑿鑿有見足發古人之祕誠可謂超絶往古出乎風氣而不可一世一方之士目之若使天假以年充之學問其於中庸之由禮樂之文進於聖門誠有可觀者矣惜其夀不永齡未見其止而止於斯已也所著詩文有少谷集者人以鄭詩鄭文稱之刻行於世又有某集某集者則録而未行配袁氏子男二長曰鳴梧次曰某夭女二長曰某適進士林應亮次曰某適某人應亮以豫與少谷子相知最深請為傳乃述而論曰古之聖賢所以濟非常之業立萬世之極者固其天資之絶人亦其有志而又有師友之成學問之功有以致之然則天資也立志也師友也學問也于人可缺一哉世有如馬遷賈誼陶潛杜甫李白韓愈栁宗元歐陽修蘇軾皆天資絶人惜皆無志於道又皆不遇師友之真講明聖人學問之功故其所成僅止于事功風莭詞章而已又如慧可慧能馬道一吕巖張平叔白長庚亦皆天資絶人生不逄時厭世溷濁而逃于釋老而已他有有志者又皆天資有所不及所以斯道之未大光至治之未大明也豈非世運氣數使然乎今以少谷子天資之美而又有其志蹉跎於世五變始有所聞而又遽止於斯其為斯世斯道之慨之憾又何如也噫草橋先生傳許應元草橋先生姓郎氏名瑛字仁寶仁和人生有異質五嵗喪其父父且卒指以語人曰吾六十生男不觀其成當視而入地然是兒成必有以自名者此吾所以暝也少長從先生長者遊有俊稱選為學士與邑人王一槐蔭伯相友兩人既髙才慕重期許自以寡儔又淺少當世之為舉子學者乃相與馳騁古昔以踔厲廣博絶出庸近為竒先生素多疾以是蓋無意榮進有愛之者曰如後時何先生曰吾既以委身載籍矣尚復與少年齗齗爭甲乙耶因作牌對以見意督學潮陽盛先生惜其才猶欲網羅推挽之卒謝不出家故餘財自奉親外一以購書所藏經籍諸子史文章雜家言甚盛至他人所無竒記逸篇古圖畫金石之刻䆮以益富而資日以貧先生無所顧獨敞大屋樹髙庋列置數几危坐諷誦其中攬要躐華刺抉眇細摘瑕指纇辨同異得失而著為書凡數種數十百萹四方纓緌之徒見其書無不願知先生者行省及臺郡守丞以下二縣之大夫下車則先問禮先生或延以教子姓至金陵顧公璘河南王公尚絅進賢萬先生潮皆當時宿望巨公尤器重先生與為交友云先生為人率直言議不能阿貴人亦時時扼攬談天下事正德末年寧藩計始萌芽未有覺之者先生獨先以為憂其後聞陽明先生在汀贑曰豎子不足圖矣在顧公座論士習頗詆訾吳人然顧公故吳人亦無諱也事母以孝聞有疾再刲股再愈幼小時兩姊壻利其財謀危之者百方幸不害其後死皆棺斂之初所與友王蔭伯者仕為工部郎中卒先生為撫定其身後事甚備其於倫道如此所著詩文及聮句若干卷訂正孝經大學格物傳各一卷萃忠録二卷青史衮鉞六十卷七修類稿五十五卷李空同先生傳袁帙李公諱夢陽字獻吉陜西慶陽人也母夢日墮懷中寤而生公故名年十八舉鄉試第一明年𢎞治癸丑舉進士丁內外艱戊午授户部主事倡為古文辭以變衰陋斷自秦漢而止六代以下弗論也乙丑進員外郎外戚夀寧侯張氏怙寵驕縱開張皇店奪民莊田聲焰薰灼莫敢問公獨上疏論語侵中宫昭聖大怒孝廟不得已下公錦衣衛獄拷掠詰責辭氣無所撓孝廟坐文華殿召見大學士劉公健李公東陽謝公遷問李夢陽宜何如劉公叩頭對曰夢陽狂直不足深罪孝廟色變李不敢對叩頭叩頭而已謝公從容對曰李夢陽雖狂然其心無他實欲效忠於陛下孝廟曰謝先生言是有旨夢陽復職一日孝廟獨召兵部尚書劉公大夏問曰日來外間事何如劉公對曰近釋李夢陽中外歡呼聖德如天地之大孝廟曰初下夢陽獄中中人皆勸朕杖之其意實欲殺夢陽以快中宫之怒使朕負殺直臣名其不忠如此朕故釋之劉公曰陛下此事即堯舜之心也正德改元丙寅進郎中太監馬永成劉瑾等蠱亂朝政給事中劉茞陶諧相繼論奏而大臣未有言者戶部尚書韓公文日流涕憂憤公進曰大臣同國休戚此而不言焉用彼相韓公慷慨曰吾當言而獲罪報先皇帝於地下耳乃令公草奏文多載集中疏入詔廷議其事而八人者環哭上前乞命事中變瑾遂召入司禮監而中官王嶽范榮皆竄死明年丁卯大臣多罷免瑾知韓疏公手草也蓄憾不已矯旨奪劉公健等四十八人官放歸田里榜為黨人公與焉然瑾必欲殺公又明年戊辰矯旨羅織公罪械繫逮京師再下錦衣衛公之內弟左國璣者間行徒步從公上書康狀元海勉以大義賴力救得免放歸大梁庚午瑾敗辛未起公江西提學副使振起古學力變宿習褒奬義節訓正禮俗士翕然向風時宸濠懷逆招致文學凡吏江西有才名者即啖以厚利否則威劫之以公有大名折節下之公初不為動久之墮其術中乃公不知也公既才高負氣不肯同流俗人人多忌之而江御史某與公有嫌遂相奏訐天子命大理卿燕忠體勘下公廣信獄摧苦殊甚公不稍為屈竟文致間住而布政使鄭嶽適為濠所陷公素與嶽不相能嶽既得罪謂公傾之也濠敗辭連公賴刑部尚書林公力救得亡窮治乃後大臣暨撫按論薦不用嘉靖辛邜就醫京口還大梁病卒所著有空同集若干卷余戊子嵗使大梁以書投先生辱賦答相逄行一見甚歡談宴纍日夜是後人從大梁來先生必有書遺辛邜以所著集見託屬纊之日遺言必袁生表吾墓而先生之子伯材馳書京師曰亡父落落大莭世或未盡知子必傳之嗟乎先生之名同天壤敝可也而何藉於豫世有不知先生輒開口雌黃者請三復於斯文明文海卷三百九十五
