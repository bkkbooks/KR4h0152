body:
  text: 明文海卷四百餘姚黄宗羲編傳十四儒林陶菴先生傳髙攀龍陶菴先生者歸子季思也蘇之崑山人名子慕字季思其父故太僕震川先生諱有光歸子兒時即有至趨嘗掛酒衣帶間見一卉一石佳者輙引酒自賞自餘童孺所弄一切睨視無所屑及長苦心為文詞醲味沉情而出之以輕聲逺度飄飄乎如祓濯于醴泉甘露而蕩以清風被以鮮霞者辛卯舉南畿乙未從京邸交於嘉善吳子志逺過錫山交於髙子攀龍三人相得歡甚時髙子築室於蠡湖之上曰水居吳子築室於祥蕩之上曰荻秋歸子既三對公車不第又兩䘮婦得羸疾築室於崑之西村曰陶菴三子遞相過從几席湖山衣被風月飲食圖史見者以三人相對一室終日黙然自怡而不知其所事也然歸子病相尋不巳遂屏跡陶菴陶菴者縛茅為屋插槿為墻屋後樹梅庭藝菊杞室中張一琴書數百巻一爐一藥囊一瓶粟他無長物歸子鼓琴讀書宴坐黙識窮天地之無垠察品物之有自陶然不知身之病也時復行吟溪畔覽物從容作小詩自娛客至煑蔬沽醑而己歸子自居陶菴不與衣冠之㑹不詣府縣不受當路問餽不為宗黨爭訟伸白不為子侄應試干請雖甚貧養其子之孤者養其弟婦之寡者雖甚病於人倫事未嘗偷惰少孤事諸兄友愛特至平居無疾言遽色農夫牧䜿相與依依如儕伍周念童僕如子弟其病愈久其學愈進客有至陶菴者登其堂未見其人不知塵念之從何去也見其人未聞其語不知和氣之從何來也飲食焉笑語焉退而慨然以嘆油然以思人人覺其形穢不知心腹腎腸之胥易矣此所以為陶菴也或問髙子曰歸子何以願學陶也髙子曰嗟乎使歸子而得志所謂斷斷休休者其人與而以病廢所自饜足者東籬南山之味而己此誠天下髙士也而使歸子以髙士名則世之不幸也崑山令王公時熙嘗造歸子屏騶從載酒殽而往歸子欣然納之清言彌日時以為白衣之致及卒學者稱為陶菴先生而以傳屬髙子髙子謂吳子曰惟子則能傳歸子矣吳子曰子苐傳之凡人之美人懼溢歸子不懼溢天下之美備是矣髙子曰予懼子之得其郛郭而遺其神理也吳子曰不然歸子如氷壺内外瑩徹其郛郭者其神理也髙子曰善夫吳子之傳歸子也歸子有一子名奉世歸子遺言敕奉世曰人能親近賢者雖有下才不至堕落吾無以貽汝貽以此言歸子得年四十有四其卒以丙午十二月二十日宋敖先生傳郭萬程今稱説敖先生者豈非哀趙忠定之詩律哉或曰揭之通衢或曰賦於三元樓壁縱筆酒三行而壁巳舁去或曰韓侂胄不之罪或曰大怒刋章追捕編管於嶺南至其敗乃登第或曰亟亡命走閩或曰因是逰寓遂贅居崑山蓋二三其説皆大謬不然者矣先生名陶孫字器之福清縣人也其父閩縣人父贈承仕郎夢於陶穴中見二人奕而與之子母孺人陳氏陳祖於陶正因而名陶孫焉少貧倜儻以材自奮淹貫載籍為文立就嘗曰蟠胸一萬巻落筆五千言言皆竒奥而氣骨渾壮嘗逰於潮潮人爭執弟子禮淳熈庚子年二十七鄉薦第一律賦海内傳為式下第客吳中而從者如雲巨室名族率虗講席迎致巳而入太學皆以通儒宗之時少壯發憤而多鳴之於詩率本忠孝性情未嘗一主於譎刺紹熈甲寅朱文公在經筵本趙忠定所薦韓侂胄搆之以難立講予祠先生送之詩言當年靈壽杖只合扶孔光蓋知忠定亦從此殆矣至慶元丙辰忠定死謫所作甲寅行哀之語不渉侂胄且藏稿不輕出或為律詩托以行無敢聞之侂胄者京尹丞趙師􅋷軰望風㫖急逮捕乃微服變姓名不知其所之事白而第己未進士自鄉薦至自落魄二十年初主海門縣簿開禧末侂胄敗詎其登第八年矣嘉定初教授漳州州守趙汝譡負詩律無對壘獨與唱酬而待以賔禮辟户通學宫以便其往來因廣宫門復侵租而佐汝譡大得士秩滿辟酒所幹官改廣東轉運司主管文字時師孫長孺性峻或嫚罵僚吏先生既負内美勃若摩雲衝斗而長身龎眉昂昂出意表當交際間且機疎語簡故不知者以為亢倨耳然起蹇涉憂患明練世務厯官多可書則雖嶔㟢道固委蛇也長孺知其質直故見必致敬改平海軍節度僉判兼南外宗正簿而不樂往州檄急之竟謁告去常平使者雅聞其名行部至州怪其巳歸因言可予祠寳慶元年轉承議郎賜緋魚袋主管華州西岳廟臺疏鐫一秩年七十二矣生平篤孝友娶崑山沈氏嚴之如賔奉祠之年適甫悼亡室無妾媵躬執炊㸑稍有俸錢買田二跬築室一區雖自釋蹻遲回為貧凡二十六載其修正皭如也異時交逰類當世聞人至是旁落将盡而獨深居簡出客至從户内摇手謝絶之新進晚生少覿其面所與往還者同里林文隱公遇連江李清忠韶莆田劉文定克荘二三君子而己間有佔俾則之寂寞之野時謂金璧易求其片言難致也然詩名益重託者益衆故江湖集又出而有詔毁之矣其所著多未詮亦不敢行於世卒年七十四紹定己丑子農師合沈氏塟祔東臯先塋劉文定題曰曜菴敖先生墓其銘議郎之秩華山之廟既嗇於少復奪之耄卓哉曜翁疇昔自號揭之碑顔以配貞曜今郡縣志其墓苗裔居故地守之士子則爼豆於官因舊聞而稱説之矣然先生質行其蘊藉蓋如此今遺文真者僅僅一二大都善名理而世則多其言詩云魏武帝如幽燕老将氣韻沉雄曹子建如三河少年風流自賞鮑明逺如餓鷹獨出竒矯無前謝康樂如東海揚帆風日流麗陶彭澤如絳雲在霄舒巻自如王右丞如秋水芙蓉倚風自笑韋蘇州如園客獨繭暗合音徽孟浩然如洞庭始波木葉微脱杜牧之如銅丸走坂駿馬注陂白樂天如山東父老課農桑言言事事皆實元微之如龜年説天寳遺事貌悴而神不傷劉夢得如鏤氷彫瓊流光自照李太白如劉安雞犬遺響白雲覈其歸存恍無定處韓退之如囊沙背水惟韓信獨能李長吉如武帝食露盤無補多欲孟東野如埋泉斷劍卧壑寒松張籍如優工行鄉飲酬獻秩如時有詼氣栁子厚如髙秋獨眺霽曉孤吹李義山如八寳流蘇千絲鐵網綺密瓌妍要非適用宋朝蘇子瞻如屈注天潢倒連滄海變眩百怪終歸雄厚歐公如四瑚八璉正可施之宗廟荆公如鄧艾縋兵入蜀要以險絶為功黄魯直如陶𢎞景入官柝理談𤣥而松風之夢故在梅聖俞如闗河放溜瞬息無聲秦少㳺如時女歩春終傷婉弱陳無己如九臯獨唳深林孤芳冲寂自妍不求識賞韓子蒼如梨園按樂排比得倫吕居仁如散聖安禪自能竒逸其他作者未易殫陳獨唐杜工部如周公制作後世莫能擬議是其詩評也而他作可概見矣縣之著述頗多先生其卓犖乎哉往志翁績字熈載漆林人也元豐五年特科為奉議郎政和末上書言夏人無故請和金人趙良嗣董才來降生邊隙乞斬二人篤信好不報遂飄然南歸渡江老於白嶼之上宣和初年童貫使熈和經略使劉法帥師伐夏敗死貫以㨗聞績以詩弔之曰千里寒沙遺白骨一番新鬼哭黄雲偷生同惡終相蔽安得忠誠逹聖君時蔡京當國詞傷質直不恤也著有天山十議鄭首者字晉信始家三山遷於縣前强記能文新頒通鑑有鬻於門一夜輙黙識之鬻者驚納為贄宣和二年年十九魁鄉薦南渡大赦首以赦文不文而别撰之遺弟子二百人馳宣于水南山下躬效縣官跪拜狀鄉人借地架屋首戲答之曰疆土日隘矣無可以借者為奸人所告賜死臨刑天黒太史奏東南文星墜赦之無及矣所著有六經解榕溪集亡傳焉郭萬程曰以予觀於敖先生而翁熈載幸矣若鄭晉信者敖先生其幸哉晉信或以譎刺而受譖愬死罪其非罪乃赦志言文星者謬也倘敖先生不免視此其何如耶宋林儒學傳郭萬程福清縣西溪宋稱儒學云閩時林遹居其間後徙於吳皆以儒學名坊吳志以林槩在國史儒學傳而然則失其故矣林出莆九牧葦生恕恕生遹為福清縣尉因徙居焉遹子奉禮郎仁倜仁倜子仲雅年十四能誦詩宋大宗召見授奉禮郎累殿中丞娶鄭氏生髙字子羽大中祥符八年進士為欽州推官徙漳州泉州興化軍以父母春秋髙踰二十年終養乃出知廣徳軍建平縣多盗能使獄無一囚遷祕書丞徙蜀縣以疾辭遷太常博士以子㮣代蜀官槩字端甫㓜穎悟年二十四舉景祐元年進士禮部第一登甲科第九為秘書郎當代之蜀而改知剡縣多宿滑捕逐殆盡邑屋相戒令年雖少不可犯也改知長興縣大饑富人堅蓄踊價㮣乃出俸米庭下召富人長老諭之曰人饑甚我不忍食爾不宜飽且能賑者蠲役而得衆粟以飼不能至者勅吏廪其家時他境多流亡獨其所治無虞縣未知學為開鄉校置生員躬訓飭之日出而往夜乃歸由是登科接踵轉運使狀其治行第一康定元年以大理寺丞出知連州州當廣南邊郡難治數被流賊其屬山陽有湟闗焉秦尉佗聚兵自守漢武誅建徳兵出桂陽下湟水故地也槩曰嗚呼湟闗一塗也佗始此限中國復此通百粤何其無常守哉乃知山河表裏有阨有㑹通塞在人不在運華夷内外有臣有畔逆順在此不在彼銘曰毋忸侵伐以尚武功毋僥得䘮以為汚隆爾教爾育爾勤爾恭舉億兆姓納之心胸闗河蔕芥敢噎其中而選蠻籍土民栅要衝購徭人使守禦由是流賊不敢犯又上封事言行陣無法而出於臨時將無素備而取於倉卒軍不予權而監以宦侍若是者雖得古之材使循今之法亦必屢戰而屢敗請附唐府兵之法四斂一民部以為軍閑耕被甲皆兵因命其家咸得蓄馬私乗休暇官為調習不報徙淮安軍又言蜀饑願罷川陜漕發常平粟代民租募富人輕粟價除商旅之禁使通貨相資所至有善狀慶厯七年遷太常博士召試學士院拜集賢校理以歸省親卒於道年三十六自㓜警敏好學忘寢食所著有史論百篇辨國語四十篇雜著六百餘篇髙自以子代蜀得知武進縣改髙郵縣時除屯田員外郎自陳曰臣有子先臣而亡臣當州判老矣願監泰州税至泰而請老天性慈恵毁譽不動好義薄利善與人交少同學生習章句獨持孟子韓文曰此可以為師矣故著書數十巻其言多似孟子終年六十九時㮣諸子㓜髙夫人黄氏同縣人也携諸孫獨栖吳旁無支親斥賣簪珥以資經理惡衣服而置田宅塟兩世於寳華山自子始就學固嘗夜治絲枲居其旁教督至是嚴課諸孫如昔有不中程朴之故四孫登第皆出於少俊希旦同登嘉祐二年進士四年而邵顔登越八年夫人乃卒嘗謂諸孫曰吾迨事祖姑而弄曾孫保有汝家起於既墜吾死不恨矣附塟於夫之兆劉邠曾鞏志之而稱其賢智焉希字子中别頭省試第一厯同知樞密院諡文節邵字才中寳文閣直學士贈太師諡正肅顔字仲和中奉大夫直袐閣光祿卿贈少師故仲雅以贈少保髙贈少傅吳國公槩贈太師嘉國公而希史有傳及顔多貶辭其獨稱者旦旦槩次子也字次中初為象山令以文學為政邑人有割股療其疾蓋大得民心如此由著作郎主管南常平擢太子中允熈寜三年擢監察御史裏行不五月上書曰王安石以李定素出其門聽其不服生母䘮擢在君側為崇政殿説書遂使朝廷之上經筵之間寘一不孝之人何以儀刑天下以此罷守故官久之幹當奏院陳繹領門下封駁文摭其前論罷之累年乃僉書淮南判官入為太常博士工部考功司員外郎元祐元年拜殿中侍御史甫涖職即上疏曰廣言路然後知得失逹民情然後知利病竊見去歲五月詔求讜言士民爭欲自獻及詳觀詔語名雖求諫實欲拒言約束丁寜使不得觀望迎合犯令干譽終之必行黜罰以恐懼之於是人人知戒言将出而復止至再申諭方逹天聰聞初詔乃蔡確章惇造端其辭盡出於惇今二人既去餘黨常懷醜正惡直之心願深留宸慮以折邪謀遂論吕恵卿鄧綰既罷揚州猶涖小郡之民奚罪焉乞投散地以謝天下又言近彈王中正石得一等雖己薄責得一所任肘腋小人如翟勍之徒亦宜編削詔並降諸郡營校又論崔台符賈種民舞文深酷之罪皆逐之大抵所論皆反希顔之所為也出為淮南轉運副使厯左司郎中祕書少監太僕卿終河東轉運使子虙少頴悟絶人伯父希獲古鏡背有龍朔二字虙從旁曰唐大帝時物乎希異而稱其文名當繼祖遂以德祖字之孔常父掌揚州學虙年十七試冠諸生㑹神宗遂罷尊號坐客或論尊號所起虙避席對曰宇文周宣帝生號天元唐髙宗自稱天皇自是美稱寖多矣常父遂擢為都講不受元豐中試太學第一後試賦屢髙等而連黜於禮部旦當任子虙遜其弟膚旦不許虙即取膚名上之㑹詔必以序乃詒書諫官曰虙當以廢病自棄矣膚乃得入仕旦牛於河東虙扶䘮歸塟盡禮登紹聖四年進士教授常州時方三舎取士州士籍者千餘人皆身為勸率焉大觀三年廷試常士選者五十三人上賜特詔轉一官州立進賢坊榮賜亭侈之在職六年用從官薦不詣政事堂遷揚州教授擢河北西路提舉學事陛對上首以久厯師儒顧問甚渥且使徧行所部推廣風㫖虙奉詔請加錫鄒兖二國公諡捐廨圃歸學除開封府左司錄以府尹不之禮請老夜自書牘旦報可家人乃知即日出國門士大夫奉餞不及既歸不入州縣無一言及時事為人强敏有志操錯綜貫穿文敏速暢而有抵宿凡所欲為則自信不疑晚好浮屠外生死説不食肉十四年始疾即不命醫藥逮卒弗亂年六十六居大雲坊而號大雲翁集因以名凡百巻有易説書義禮記老于解神宗聖訓十巻西漢詔令十二巻附父塟博士隝膚字碩儒坐元符上書而陷于黨籍其時希已死至崇寜四年還上書流人而邵子攄如遼報命歸而貶矣攄字彦振以蔭特賜進士厯左丞中書侍郎申贈開府太師史有傳多貶辭希子虡元祐進士後試宏詞第一厯祕閣修撰是後登第者光祖槩子雄之孫也為縣令世于閩者髙弟商之子開尚之子棐同希旦登進士南京少尹孫摯進士儀曹林氏凡以蔭補官六十人鄉書奚啻百數在吳為最盛閩今多喜稱其後焉郭萬程曰林氏之盛吳門稱焉然槩死而後寓之則八子非吳産其孫十二人而吳産者衆矣若希攄位宰執豈不翩翩然而貶於史氏不足為家聲重余觀古靈薦槀稱希與鄭俠之列其治五州亦多善狀伊洛諸儒則稱其祿隱之言攄以唱名坐貶乃其所讀固是也陸務觀稱之為有王陵少戅焉而皆為章惇蔡京所㸃是故君子慎所與矣獨旦象賢不黨於昆弟尤難即二子者亦豈可少乎哉宋福清儒林傳郭萬程自司馬傳儒林宋乂立道學者福清縣一人焉王蘋字信伯其先縣刹上人也自唐水部棨之八世尚書郎伯虎州教授伯起皆世其文學從弟仲舉徙吳生蘋伯起遣之從程子於洛得髙第之學若楊時者居多時曰同門後來莫踰伯信者紹興以白衣賜第終朝奉郎居平江而塟長城詳在吳志傳中閩自時載道而南傳羅從彦李侗至朱熹其宗為盛而私淑蘋傳莆侍郎林光朝光朝聞陸子正得程門尹焞之學而又與之逰及吕祖謙張栻朱氏並鳴為先軰而號南夫子歸莆以講於東井紅泉間閩之洛學又其宗也在福清者白衣新田林子充長於徃學有指南集三巻詩文二巻論五帝而繪為圗其論語詩五十首侯官林之竒引之伯起友也紹聖進士林虙字徳祖終開封府左司錄有易説義禮記解則寓居於吳元符進士塲前倪登字彦及者有論語解宣和收雲中而沒於聘使特贈太中大夫宣和鄉薦鄭首六經解以罪死而書廢皆宣和先蘋者當蘋之時宣和進士大壤黄祖舜紹興上論語講義十巻帝令國學鋟行朱熹引之其解他經凡數萬言紹興進士二人余玩黄顔榮字全仁有六經解莆人多宗之稱蘖山先生上井林栗傳其學有易春秋論語説白衣林文昭字宗範亦上井人有論語解一巻松林許天瑞家貧不娶與弟人瑞以道自樂解論語六經莆及泉士稱二許先生皆相友教以解經列儒林未聞出於蘋其渉福清以教則始於光朝光朝俠壻也故常往還而過翁亢之家亢字柔中號荔枝臺能詩隱居教授光朝毎嘆此翁五十年丘園而城市鮮知名者從子昭文圃非時得荔枝其母曰豈有嘉客踵門耶頃之光朝至因名為茘枝紅亢與昭文漆林世家皆豪傑士而為相引重門人可攷者五人楊林魏几字天隨以克已復禮問答曰五湖明月因以穎悟賦丹霞夾明月有半白在棃花之句人以半白棃花郎目之又有二盥阿盥林氏字載徳小練人問六經根源無所入苦心而欲投江光朝稱之為魚鹽中膠鬲叔盥陳氏不知何許人少從於紅泉出揖客而客頳然光朝曰心不負人面無頳容叔盥悟而自户遂以行義名在海口者曹方賢而早卒林亦之字學可網山人也徙居海口之曲維盛年挾䇿逰四方卒以不契去又将謁光朝齋宿與客語夜半聞息入而驚寢者光朝曰寢與人同夢乃自作遂大喜吾得師矣自此事之三十餘年光朝席下歲率數百人莆劉朔為福清賢令而顯貴相望然言髙弟必亦之以也光朝卒亦之嘆曰程氏寥寥乃有先生自六經絶筆而此為獨悟百年宇宙有君子者吾得而師事之百年宇宙無君子者吾不得而師事之其憾何如也而哭之如父忌則哭其墓朱熹早年過莆與光朝語喜躍忘寢食至是再過嘆莆無能為之嗣莆推亦之嗣講席光朝之學一本於躬行言動必以禮超然不喜著書亦之户外屨㡬半於師矣或勸著書答之詩曰講學紅泉不著書只將心學授生徒趙汝愚帥閩辟入東井書堂待以賔友之禮上其學業於朝命未下而牛所著論語考工記毛詩荘子解多門人所述惟詩數巻及玉融志其筆也子間字綺伯客死而遂絶莆中劉克莊少師綺伯而稱亦之曰光朝之文峻潔古奥人能之者鮮詩自宋來第視經義而為有韻者爾光朝始好深湛而加煆煉焉有累月經歲繕一章未就者亦之之文酷似其師詩律髙妙絶類唐人疑老師或辟之他亦稱是焉學者稱網山先生一曰月魚先生有夏良規者字道矩有論孟六經解不知其世亦海口人也陳藻字元潔侯官水西人而僑居于横塘距海口不半舎初從亦之於網山又從於紅泉時陳叔盥授詩於光朝與之讀國風於古寺吟諷累夕俄至采蘋掩巻而泣頓得中庸之㫖叔盥喜告亦之而遂以見光朝曰吾常語若詩不歌易不畫無悟入處而今於是尤信吾詩不亡矣乃受其拜而接之如孫藻為通儒遂嗣亦之講席開門授徒至泛㳺江湖﨑嶇嶺海積鏹百千買田數畝輙為人奪去其困甚亦之焉視昔遺逸阨窮之士若墨翟之悲韓非之憤虞卿之愁梁鴻之噫可為感時觸事之作者多矣而藻講學明理不汲汲希世入則課妻子耕織出則誘生徒絃誦或拾穂而歌或舞雩而詠獨志孔顔之樂學者稱樂軒先生時有林萬頃字叔度大湖溪下人也其解同聲相應曰蠶絲吐而商絃絶銅山崩而洛鐘應其聲同也磁石可以引針琥珀可以拾芥其氣同也氣同聲異天壤咫尺聲同氣異咫尺天壤平地而水濕者先濡水上而下也抱薪而火燥者先燃火下而上也龍興而雲從雲自下而上應者也虎嘯而風號風自上而下應者也水火燥濕無情而應有情雲龍風虎有情而應無情始藻聞其解春秋易意内鄙之及見此章曰當北面矣藻解語孟章子杜詩自成一家言視亦之而加雄放劉克荘稱之謂猶百官宗廟焉為人墓銘云佛入中國祭禮荒胡生奏樂孤子狂里人化之不作佛事其衞吾道而嚴異端如此亦之四十二藻七十五後死者四十年邑井聞見日陋張吕書在可以磔裂欺世故人能言之陸氏疑信間矣自光朝沒門人或更他師獨亦之藻篤守不悔至藻亦絶其門日微林希逸字肅翁號鬳齋縣之漁溪人也曾祖昌言及子介皆紹興進士俱通判希逸介侄孫也家去莆三舎少從藻於紅泉既而走江淮其聞見益博端平之元解試省試賦魁入太學明年成進士甲科第四人為平海推官以清白稱淳祐中遷秘書省正字因對乞信言路早决大計慰人心上皆開納厯翰林權直學士兼崇正殿説書八年以直袐閣知興化軍藻死二十餘年矣嘗念林陳微絶既祀藻於家廟又白尚書禁二墓樵采歳時若逺歸必墓祭出處命祝史以告至軍下車首誥學者自南渡後洛學中微朱張未起以經行倡東南使知聖賢心不外於訓詁者自莆南夫子始初疑漢儒不逹性命洛學不好文辭使知性與天道不在文章外者自福清兩夫子始乃鋟其遺文為三先生集時莆祀光朝而諡文節矣至是併祀亦之藻為三先生祠景定四年為司農少卿舉亦之藻為有道士及林公遇㓜承父澤奉親不仕乞褒崇之詔諡亦之文介藻文逺俱贈廸功郎公遇諡文隱進贈原官一官有司樹表書諡而祀於縣學宫亦稱曰三先生祠春秋釋菜三日遣學職各一祀其墓公遇學兼朱陸著求心等錄語在石塘書傳而尤善言詩蓋藻之友克荘内兄也希逸初學詩藻得克荘詩語之希逸少七歲耳因而定交才名相軋至莆鋟其集而序之為大家時之評者謂希逸文有楷範而邃理學優之克荘序其詩以宋自光朝三傳至希逸比之於師槁而華矣散而密矣嚴而紆矣搜索如象㒺之求珠斷削如巨靈之施鑿經緯如鮫人之織綃及其得心應手也簡者如蟲魚小篆之古焉協者如韶鈞廣樂之奏焉偶者如雌雄二劍之合焉蓋非經義之有韻者也且曰吾當退舎矣文天祥稱其不戚戚得䘮而言語文章足以詔今傳後是觀乎其大者終中書舎人所著有易講春秋正附篇老莊列口義攷工記解竹溪十一稿嗚呼閩自楊氏道南獨此可接羅李之宗惜時儒未深知至希逸亡傳且自道學興其辭命多鄙獨光朝之門斐然亦至希逸而亡子詠寳祐進士朝奉郎厯興化倅國子監其從弟希道及族海者皆進士稱世家元初武夷熊禾申希逸之請祀三先生并希逸於郡學至正十六年知州申閆家奴為三賢祠於龍江書院祀亦之藻而及光朝為嘗至於斯也十九州桃村蔡復初舉明經為書院訓導少從龍江梅林所余大車學易受書又從恵安盧琦學詩孝友力義琦卒心䘮三年欲立祠不果申閆家奴甚尊禮之所著有詩銘訓集子仕賔仕賔洪武初進士郭萬程曰言後學者毋論顔氏之子即王通之董常亦獨與於斯文然則亦之闕死一闕而與闕儒並行世所謂豪傑之士非耶希逸之於師未居魏文貞之地秉陳叔逹之筆而在三之義無憾焉故師嗣雖絶其爼豆不廢且於公遇義則廣矣郡學祀希逸是於師席為不孤蓋聞風而舉之豈必及門家子弟哉明文海巻四百
