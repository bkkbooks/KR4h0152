body:
  text: 明文海卷四百一餘姚黃宗羲編傳十五忠烈孫百融方孝孺孫炎字百融金陵句容人身長六尺餘面黑如鐵一足偏跛持辨風生舉辭如雲人莫當其口能為歌詩元至正中丁復夏煜以詩名炎遊此兩人間日夜相切益好立機括下紙可盡辭采爛然驚動一時雅好酒嘗與煜對飲務出竒相勝每得一爽句拍案大呼投劍起舞譁聲撼四鄰所與交皆天下英俊亦以經濟自負氣豪才雄常輕視章句儒衆口常自許曰孫炎男子豈死蒿下耶會江淮大亂今皇帝渡江來金陵聞炎名召見與語纍千數百言大意陳元運將終勸上延攬賢士以成大業義明辭正上甚悅之辟為江南行中書省掾每問以大事炎慷慨激切所謀多合上心上愈嘉重以為可用上親征浙東炎從行以勞擢同知池州府尋升知華陽府巳亥十一月擢行省都事是年十二月會師克處州擇守者咸以處在山澤間盜賊慿結不解難其人上既才炎遂以炎為處州總制錢穀兵馬之籍悉以委之不取中報且以敕牒未署者付之聽其辟任炎匹馬入處州時處州外七里皆賊窠穴獠酋黯蠻狼嘷虎踞不奉官府約束炎至坐廳事召城中民列階下諭之曰元之不為天佑人共知之今四海裂為七八然吾觀其志皆無以生民為心者得天下者必吾主上也至今爾民梗化未知朝廷意昧者猶或握兵戲溝中自招誅滅主上不忍加兵故命我面諭爾民將以安爾非厲汝也爾民審思之帖帖遵化則有後福不然吾恐爾民將盡為戮民叩頭拜謝誓不敢二心轉告其鄉民以孫使君不可玩狎炎亦下書屬縣遍諭之數月皆化為良民炎復擇其勇健者練為兵將將教習之擇其為衆所服者為之長有寇則率以禦無事罷歸為農聞有小警即發一符立至軍門無敢或有姦之者強族素驕蹇皆畏之如神不敢出聲語雖在素百里外亦皆縮氣喪膽民賴以安人人謂願得孫使君治吾郡時秀民有能才者見方戰爭勝負未分皆伏居山谷中不肯出炎患之鈎至一二人問有才者録其姓名為書遣使者招致之而故中丞劉基章溢知府葉深皆為處士所推基最有名亦豪俠負氣與炎類自以為不當為他人用使者再往返不起以一寶劍送炎炎作詩以為劍當獻之天子斬不順命者我人臣不用私受封還之草數千言開陳天命以諭基文辭甚美基不答逡迍就見置酒與飲論古今成敗之事如傾峽滚滚不休略無枝復基乃深欽歎之曰基自以為勝公觀公議論如此基何望哉炎遂致基於京師上方征伐無一兵與炎壬寅二月賊將李某賀某叛襲炎炎被禽幽空屋中列卒守之脅炎炎始終以生吾能為若用賀某知非其本情恐留自遺患以燖雁斗酒噉炎曰以此與公訣炎拔劍割雁舉巵酒曰嗟乎我乃為鼠輩所陷爾死犬豕且不爾食賊持刀視炎飲酒自如賊叱其解衣炎罵曰此紫綺衣主上賜者吾當服以死勿解引枕而卧賊不忍伺其睡乃害之時某日也年四十事聞上嗟悼以某年月日葬于某山甲辰贈徵事郎洪武元年上即皇帝位念宣勞之臣閔炎死義追封丹陽縣男妻某氏為賊所擒不屈死繼某氏子一人某女某炎事親孝與人交緩急可仗遇匱乏者解衣推食以給之所著有詩若干卷其弟子蔣敬編次傳于世以垂不朽介某以請方某曰余年十一二時先君守濟寧間言炎詩十餘卷皆豪宕可喜及觀却寶劍篇益竒其辭而炎死久矣炎負氣聽其言知其為偉然大丈夫也故卒以節死孟子論學必曰善養氣養氣有以夫胡應炎高啓胡應炎字煥卿常之晉陵人宋樞密副使宿八世孫也父聰淮南節度計議官咸淳中應炎登進士第授溧水尉未赴元丞相巴延南伐師次常境知府王洙遁朝廷以姚誾知府事復命將軍王安節都統劉師勇將兵雜守之誾等至常見應炎喜曰君吾劇孟也得君敵不足破矣署節度判官應炎歸告聰及兄應發弟應登曰吾家世受國恩今戎馬在郊王室將危是吾立功之秋也父老兄弟當奉以出避吾身許國不得復徇家矣聰應發並曰吾與汝雖父子兄弟然于國則皆臣也圖報之義彼此同之豈可臨難而獨免乎乃命應登侍母及護妻子出城囑曰善避以存吾宗不幸城亡吾必死之今與汝訣矣既應誾命即選民之壯勇者三千人自將乘城為誾畫曰吾州京師北門不可失守然城痺塹狹兵皆市人非素所撫循者而北兵鋭且衆乘勝逺來其鋒不可當恐未易與戰也宜樹木柵傅城益調粟繕械為守計誾然之初洙遁時其客王虎臣盜郡印自稱知府詣巴延軍門獻之巴延不知其詐命還守常而遣兵與俱及城誾等巳先至不得入反以民叛告巴延怒命元帥索多率步騎二十餘萬圍之應炎與安節師勇分門出戰各纍大捷殺其將校甚衆功上進直祕閣圍且久元兵多傷弊索多請益師巴延遂以西域諸部兵來會攻圍益急餉援俱絶索多以柵堅不可拔剽近野得婦人刳乳煎膏沃其上發火矢射之火熾柵焚又運機石擊樓堞盡毁食盡索多偵知之遣使呼應炎語諭師出降應炎罵之且截紙縷置盂中若湯餅狀者以筯引示之曰吾食甚足若欲得城需金山長也金山長蓋諺語謂無其期索多聞之曰能破城者金山長老也世呼寺主僧為長老故云即趣召金山僧至軍問以攻城之策僧不知為計周行視城曰是城龜形也東南其首西北其尾攻尾則首愈縮其法當攻首從之城遂陷師勇遁誾安節死之應炎率民兵巷戰至孔子廟前衆潰猶手刃數人力屈遂就擒索多讓之曰若即嘗多殺吾將校者邪應炎曰吾欲殺汝何將校邪恨力不及耳索多怒腰斬之時年二十七兵入屠城聰應炎皆被殺民匿溝中免者數人余為兒童時常聞父老言元兵取常時事甚悉及壯觀史多所未載豈搜采有失而致然歟抑著作者有所諱避而弗録歟或其事多繆悠初皆無有特好事者為之説歟是皆不可知也每竊恨焉近遇胡黼江上間為余言其祖應炎死節始末與余昔所聞無異斯固足徵矣夫以虎臣之姦索多之慘與僧者妄言而幸中其事雖微猶不可使泯况應炎之忠烈毅然如是耶因掇其語作胡應炎傳以補史氏之闕云姚善史明古姚善湖廣安陸州人也字克一建文初知蘇州府蘇州承元季侈汰之後豪右田宅輿服多踰檢高皇帝制法整齊之誅夷狼藉譁者用是持其長短巧詐蜂起號為難治善明達治體周知人情嚴而不克容而不弛執而不泥簡而不遺煩而不苛又數請謁郡中名士錢芹王賓韓奕等訪問吏治得失民生休戚俗化淳漓以因革之由是吏民皆顧尚亷恥好善趨義不復為非小大樂業化為善俗郡中大治號為天下第一芹初聞善命謂使者曰明公郡將也芹誠以得見為幸然畏懼而不敢往也明公茍引下士之風請伺月朔詣學宫時為停須臾芹將往見也使者返命善許之至期先一日芹沐浴更衣適學宫夕焉坐以待旦須善至見之善嘗使吏餉芹祿米而吏誤送俞貞木家貞木往見善曰竊聞錢芹絶糧久矣明公此舉當以歸之貞木自揆不得濫受此賜敢辭善知吏誤遽曰鄉試欲餽錢先生將因君為紹介聊以藉手耳君毋容辭錢先生别有餽也賓家在陋巷無妻子奴僕獨與母居善每候見賓輒舍輿屏徒從步趨至門以指扣門者三問曰何人則對曰姚善及賓往報謁輒于府門外投刺再拜而退善及知自追延賓賓辭曰非公事賓不敢入奕隱于醫聞善將來見之乃避于上方山善追至上方奕又泛小舟入太湖矣善歎曰韓先生所謂名可得而聞身不可得而見也後數因賓往請乃得見文皇帝稱兵南伐索太常卿黃子澄等甚急南朝乃匿子澄善所北兵日深善起兵拒之詔以善兼督蘇州松江嘉興常州鎮江五郡兵馬未及戰為麾下許千户等所縛并縛子澄獻于文帝皆剮之夷九族後有沈魯者以詩吊之曰倉卒勤王五郡兵南風無力北風鳴清忠自把巴湖月穢史何曽説杲卿聞者悲焉同時有王觀者池州人也洪武初以許觀中廷試第一後改王觀建文中知安慶府加侍中帥勤王兵屯江上文帝渡江知事巳去觀乃衣紅袍自沈于江死之文帝即位詔族其家以觀妻配象奴行至大中橋觀妻止橋上探懷中鈔授象奴紿云買餅餌餉所抱幼女伺象奴去急抱女溺橋下水中又有周是修者泰和人也為衡州紀善與纂修翰林文帝入南京日是修入應天府學文廟中自縊死是日有中書舍人聶同文因走迎新天子天熱走急死途中同文臨川人子大年以詩名鍾恭愍公程楷鍾恭愍名同字世京吉之永豐人翰林修撰復之子復以文學氣節軋時輩居京師與劉忠愍連邸第忠愍諌死時復以母老不與名恭愍趨庭稔聞正論復既殁勵學益深過廬陵忠節祠歸銘座右曰生不登進士第死不入忠節祠豈丈夫哉景泰庚午鄉舉辛未舉進士壬申拜遺州道監察御史臺論風采諤諤時天下多事凡大計輒敢言景皇帝既逾監奪嫡會所建薨憲廟逃潛邸幸侍擬必有所待恭愍則曰天下事無重于此者吾固不敢默雖然不可以輕言無補甲戌積隂晦逾日求直言五月四日適覘知敵情叵測因上章先敵中言父有天下固當傳之於子然太子薨逝則知天命有在兹皇儲未建國本無依而敵警天變中外洶洶誠不可不慮也太上皇曩待皇上友愛甚周今上皇之子兄弟之子猶子也天資厚重亦無過舉誠可為宗廟社稷託伏望擴天地之量敦友于之仁擇日行禮復其儲位仍選蹇諤之儒臣日侍講讀庶緝熙聖學用延祖宗無疆之休天下幸甚臣同昧死敢言帝不懌然重天變仍優詔報答所言事理深有憂國愛君之心然事有難易從多官議説後數日禮部郎中章綸繼以復儲言有旨鞫訊蔓辭連及並下錦衣獄命牢固監候窘辱萬狀逾明年八月南京大理少卿廖莊亦先議及儲事至是以考績來上過憤其言因被杖左右曰皆鍾同倡論至和者再三同是罪首耳遽封大杖入狴杖至百腐腫逾六日死獄中時八月二十三也史作十七日年三十二葬尸獄中土丁丑英宗復辟國子生葉華朱圭以為言贈大理寺左寺丞録長子啓為國子生巳卯得尸詔給衣棺馳驛歸葬尋授啓咸寧令以疾罷成化癸卯妻羅重以為請憲宗特命録其仲越為通政司知事月給羅米一石丁未越以易名典請乃諡恭愍俾從事忠節祠論曰景皇帝春秋方盛改建太子薨亦未幾復儲有論非所期聞亦人情也恭愍豈不知哉忠義憤發死不可畏天理人心不能一日泯然身死而義名益張厥後英廟復辟一時忠藎效給豈非有所激寧忍死以立功邪恭愍死非死也方其在庠序隙地特出紅葵一本迥異既葬冢木巢烏鵲産白雛者四而納諫章時馳馬出馬溝伏不肯去因憤曰死用我馬奚為馬猶迂回再四乃去復三日死廄中嗚呼葵𠂻捧曦以肇其祥雛鵲降異以昭其烈而馬之為主亦臣為其君者感之邪靜學先生黃綰先生姓王氏諱元彩字叔英號靜學黃巖人小孤隨母嫁陳氏故亦稱陳氏居亭嶺今屬太平洪武中為仙居教諭升漢陽知縣革除初以薦升翰林修撰與正學先後被召或云正學薦之上資治八策曰務學問曰謹好惡曰辨邪正曰納諫諍曰審才否曰慎刑賞曰明利害曰定法制又曰太祖皇帝除姦剔穢抑鋤強梗若醫之去疾農之去草急于去疾或傷其體膚嚴于去草或損于禾稼體膚疾去宜變其血氣禾稼草去宜培其根苗又論行限田法初在漢陽聞正學被召貽書曰子房于高帝察可行而言故高帝用之時受其利雖親如樊吕信如陵勃任如蕭何不得間此子房能用其才也賈生于文帝不察而易言且言之太過故絳灌之屬得短之此賈生不能用其才也入朝與正學期致身三代未幾太宗皇帝入繼大統先生正學死之先生募兵廣德將進遇尚書齊泰知事不可為遂退館于祠山作絶命辭曰嘗聞夷與齊餓死首陽巔周粟豈不佳所見良獨偏又書其案曰生既久矣愧無補于當時死亦徒然庶無慚于後世以辭裹金置道士棺中夜沐浴冠帶經于庭柏月出犬吠皂𨽻啓户視之則先生死矣道士以其棺斂之葬于橫山道士姓盛名希年黃巖人皂𨽻上其狀妻某氏捕死于獄二女死于井余聞諸父老曰楊文貞公士竒為布衣主墩漢陽村落先行部偶至聞讀書聲曰兵革之後久不聞此聲乃入其孰視之文貞避去見案上詩文題曰此公輔器也乃邀致薦之及讀文貞他文曰豫素與先生相知審理之除實其所薦又與人手簡曰昨得王大尹文字讀之説理甚精且有法度愈讀益有味羈旅中何幸遇也又東里小傳曰文貞少遊湖湘漢陽府學聘為訓導不就則鄉老所傳及簡所云乃漢陽時事府學之聘蓋亦先生薦之至入朝而又薦之又云鄉有張璣者嘗遊其門正統間嵗貢為國子生文貞詢其後鄉吏引見待之甚厚後為定琢二州同知先生有幼子名某謫戍大同因璣語知文貞以百金與鄉人孟範訪得之又以金若干遺州教諭某人使教之久而無成返諸文貞又益若干金再使教之卒無成文貞抱之痛哭以金若干與而遣之不知所之孟範後為治中亦云文貞薦之弟元默變姓名匿于京城商旅中鄉有金寬者識之告太宗捕斬之銼其尸先生所著有靜學集傳于世論曰先生與正學當興運懷經綸之志卒皆無成殉義以死及太孫聰明好古篤信儒術志欲以周官致治竟失天下而遁死果天命然乎人事然乎余于是益感君臣相遇之難又益信祖法之未可以輕議也讀先生貽正學書為之三復流涕者久之嗚呼識慮深逺矣楊忠愍公王樵楊忠愍公名繼盛字仲芳其先口外小興州人州常被國初曰伯源者奉詔內徙為保定容城人六世曰富者生公年甫八嵗使牧牛出過里孰見里兒讀書心慕之請于兄欲往兄曰若幼未能也公曰幼能牧牛乃不讀書邪兄異其言以告于父而聽之日受數百言四五過輒成誦年十八補邑弟子員踰冠讀書于邑僧舍恆至夜分不寢燈膏盡暝坐而思寒無襦起繞屋行令脛以上微溫則復讀以嘉靖庚子鄉貢士舉丁未進士除南京吏部驗封司主事受樂律之學於關西韓公邦竒庚戌秋闕犯闕京師明年公遷兵部車駕司員外郎會有馬市之議公上疏論其不可大旨謂馬市者講和别名也闕踐􅏳我陵寢虔劉我人民戎心無厭非一大治使終身創不足以雪耻往下北伐之詔天下聞風鼓舞爭出死力而朝廷一旦忘耻屈巳以討號召天下而以和終之豪傑之士誰不解體不可一也且邊鎮習于偷安久矣自闕變之後方改觀易聽一聞和之説弛備自肆如故非惟積廢無起時而隱憂將不可測不可二也往者邊臣私通闕吏猶得以法裁之今互市決闕之限開通闕之門將來勾結生事啓釁吏不能詰不可三也中國險易虛實為所習知用間于市不假遣諜而得不可四也又陳開市三事一欲部長諳達愛子入質二欲盡還所掠人口三欲别部入冦皆諳達保任疏奏世皇連三閲曰繼盛之言是也下八臣議八臣者內閣大學士嚴嵩李本禮部尚書徐階兵部尚書趙錦侍郎張時徹聶豹成國公朱希忠咸寧侯仇鸞也仇鸞舊鎮大同素通闕實隂主其謀上惑其言遂下公詔獄謫陜西狄道縣典史時謫官為上官所優多養高不事事公獨請事于長官于是上競以事委之事皆辦暇與諸生講學狄道多西畨色目人習畨經公擇教讀二人于圓通寺教以儒書畨漢生讀書百餘人因而知向進者三十餘人邊氓以織褐為生苦于官市會有稱巡案遣市褐者公執其人屬吏于是官市遂絶遷山東諸城知縣南京户部雲南司主事刑部湖廣司員外郎調兵部武選司時仇鸞敗嚴嵩用事公上言方今在外之賊惟諳達為急在內之賊惟嚴嵩為最賊有內外攻宜有先後未有內賊不去而可以除外賊者故臣謂誅賊嵩當在勦敵之先去年春雷久不聲占云大臣專政夫大臣專政孰有過于嵩者又冬日下有赤色占云下有叛臣夫心不在君而背之者皆叛也是亦孰有過于嵩者臣敢以嵩之專政叛君十大罪為陛下陳之我太祖高皇帝罷中書丞相而定五府六部分釐大政載諸祖訓曰以後子孫做皇帝時並不許立丞相臣下敢有奏請設立者文武羣臣即時劾奏將犯人凌遲全家處死嵩在內閣挾陛下之權侵百司之事凡府部堂司皆稟受其風旨內外僚出入必謁內自直廬禁地外至私第日夕其門如市輿馬闐塞衢巷至不可行都人皆曰詣相府也至士大夫皆號之曰相矣雖嵩亦以相自居矣吏部尚書百僚首也非其腹心不用進退人材必關請而後奏嵩視吏部若其屬然吏部且如此况其他乎是嵩雖無丞相之名而隂操其實使天下知有嵩而不知有陛下此其亂祖訓之成法大罪一也內閣條旨雖先朝有故事然機事甚密而臣下不敢干上之權今陛下用一人嵩曰我薦之也宥一人嵩曰我救之也其或嵩之所不喜則或激陛下之怒以行其擠排或乘陛下之不悅而進其讒搆于是使天下之得罪者畏嵩而不畏陛下歸恩者歸恩嵩而不歸陛下此竊君上之大權大罪二也陛下使嵩票旨嵩又托其子世蕃代票世蕃又引嵩之義子趙文華等潛入禁地商議同票題覆方上滿朝紛然巳知天語既下前講合若符契如錦衣衛經厯沈鍊劾嵩罪狀陛下發大學士李本票擬李本私問世蕃世蕃即自擬票使趙文華袖入封進此人所共知也即劾嵩之疏世蕃猶得票擬他可知矣是嵩既以臣而竊君之權世蕃又以子而弄父之權此其縱賊子之預政大罪三也邊事之壞皆由功罪賞罰不明嵩為輔臣乃為壟斷之計欲令孫冒功于兩廣先置所親歐陽必進為總督平江伯陳圭為總兵御史黃如桂為巡按竄其長孫嚴效忠名于奏功籍中冒升所鎮撫又冒瓊州一人斬首七級功效忠告病乃令次孫嚴鵠填替告併前功加升錦衣衛千户效忠嚴鵠皆世蕃養子足不踰閨閣而冒報戰功濫竊名器歐陽必進以是而入為工部尚書陳圭遷掌後府事黃如桂驟遷太僕少卿是嵩既竊陛下爵賞之權以貴其子孫又以子孫之故顯拔其私黨諫官御史知而不敢言則以其積威足以箝天下之口故也此其冒朝廷之軍功大罪四也逆賊仇鸞總兵甘肅以貪虐被論革任嘉靖二十九年大同帥張達等敗沒正闕窺伺之時使嵩少有為國之心豈肯用此債帥以寄干城而世蕃乃受鸞賂三千金指逼兵部薦為大將及鸞冒哈扎爾軍功世蕃亦藉以升蔭嵩父子于時嘗誇有薦鸞之功矣及鸞勢出嵩上為所輕鄙嵩自悔以為引虎遺患後又知陛下有疑鸞之心恐其賂露連纍始互相排詆夫勾賊謀逆者鸞也而受賄引用鸞者誰邪嵩父子誤國之罪于是又出鸞之上矣此其引姦逆以幾敗國事大罪五也前闕深入兵法擊其惰歸此一大機也兵部尚書丁汝夔問計于嵩嵩乃曰京邊不同勢敗于邊可掩也敗于京不可掩也且闕饜自退耳故汝夔傳令不戰陛下逮治汝夔求救于嵩嵩又曰無恐吾密疏保君矣及汝夔臨刑而後知為嵩所賣乃大呼曰嚴嵩誤我是嵩以不戰紿國而以死紿汝夔也此其怯懦無謀欺罔不忠以誤軍機大罪六也黜陟者君上之大權刑部郎中徐學詩以論劾嵩父子革任為民嵩于考察京官之時囑吏部黜其兄中書舍人徐應豐荷蒙聖明洞察留用夫應豐乃陛下供事內廷之臣嵩猶敢肆其報復之私則在內之臣遭其毒手者又何可勝數耶户科都給事中厲汝進以論劾嵩父子降典史嵩于考察外官之時又囑吏部黜汝進夫汝進言官也縱言不當陛下既降其官矣其為典史則未有過也嵩乃以私怨欲再黜之則在外之臣被其中傷陷害者又何可勝數邪夫考察大典也陛下持之以激勵天下之人心賊嵩攘之以中傷天下之善類大罪七也今府部之權皆撓于嵩而吏兵二部大利所在被撓尤甚嵩于文武之遷除不論人之賢否惟論賂之多寡其人到官亦通不以報國為心惟日以賂嵩為事將官既納賄于嵩不得不剝削乎軍士所以軍士多至窮困有司既納賄于嵩不得不濫取百姓所以百姓多至流離利歸一人毒偏天下人人思亂皆欲食嵩之肉如是臣恐天下之患不在境外而在域中陛下之仁如天一聞四方水旱盜賊一人有不得其所為之憂形于色而嵩為腹心之蠧漸失天下之人心大罪八也先朝居內閣者如萬安劉吉焦芳之徒雖其姦諂無所不至然猶得政日淺旋被斥去近年以來未有得政如嵩之久者蓋嵩之柔忍機變尤獨工于逢迎刺探凡陛下之左右皆先用重賄結納托以伺察聖意凡陛下宫中一言一動必密報于嵩輒酬以重賄凡事嵩得豫知陛下微旨所向以遂其逢迎之巧以悅陛下之心陛下但知嵩之每事能合聖意而謂之才不知陛下之左右皆嵩之間諜也通政司納言之官嵩欲阻塞言路故用義子趙文華為通政使凡章疏副本文華皆先送嵩父子私閲而後進少有干涉即為彌縫聞御史王宗茂劾嵩之疏文華停留五日方上夫朝廷設通政司以防壅塞而姦黨乃敢為壅蔽如此大罪九也嵩既內外彌縫所畏者厰衛之緝訪而嵩于厰衛官遍結姻親陛下試詰嵩諸孫所娶者誰女立可見矣厰衛既親所畏者科道之言而嵩于進士筮仕之初知縣推官行取之際誘之以求知脅之以納賄皆使俯出門下及給事御史考選之時皆預識面有先容而後得之以隂絆其他日敢言之口既選之後或入謁則留之飲酒或出差則為之餞贐或心所愛憎則授之論刺至五六年不崖異即升京堂次則方面夫受嵩之恩既如前附嵩之效又如後以故科道諸臣寧忍負陛下而不敢忤權臣也夫厰衛陛下之爪牙皆賊嵩之瓜葛科道朝廷之耳目皆賊嵩之私人以故嵩之得政愈久而其壞紀綱愈甚壞風俗愈深使天下士大夫廉耻盡喪嵩實為之此其大罪十也嵩有大罪十誰不知之而莫以告陛下誠恐言之而不信則非徒無益而禍且立至也以臣之愚乃敢出其一旦之命言難言之事攻難去之人伏願陛下察臣之言試召二王而密問焉必有知臣言之不誣矣則何惜一嵩而不以謝天下乎內賊既除外夷自却何則彼見陛下之聖明如此則不戰而氣巳奪矣疏上世廟素英毅莫寵如張永嘉然而攻其短者未嘗加大罪也嵩父子懼甚與其黨謀所以自解與傾公者百計無何乃摘指疏末援證二王以為非所當言密訌于上上果為之動下詔獄詰問惟此一語而無為罪法司則致其文以詐傳親王令旨法當絞時刑部尚書何鼇嵩之門生侍郎王學益嵩之姻家受嵩主使法之合不合固不顧也公在獄數年備嘗楚毒可謂出百死而後生臨刑慷慨誦所絶命詩聞者流涕乃乙卯九月晦也是日地震隆慶中贈太常少卿諡忠愍賜祠于保定額曰精忠二子曰應尾應箕應尾蔭入太學論曰自太祖革丞相之官永樂中始置內閣以編修等官解縉等七人供事其中雖曰典機務與密議而所供者不過翰林之職事而巳終成祖之世內閣之臣官不過五品豈非不欲變太祖之制而然與二祖可謂逺見足為百世不易之定制矣至洪熙宣德二朝內閣之臣始以舊恩與年勞加升至師保尚書等官三楊諸公號為一時賢相而不知引嫌固避故變二祖之舊制自三楊始也孝宗朝內閣之臣不過代言六卿執政之臣如劉大夏馬文升諸人皆日召見商大政預密議其時何嘗知權在內閣乎六部乎抑不在內閣不在六部而有旁落下移之處濳持默運之人乎此時皆無之也故下當以二祖之法自守上當以孝宗之事為法世廟于楊忠愍之言雖未即聽然未幾而嚴嵩得罪未必不因忠愍之言也贈光祿少卿沈公徐渭青霞君者姓沈名鍊字純甫别號青霞君生而以竒驚一世始補府學生以文竒汪公文盛以提學副使校浙士得君文驚絶謂為異人拔舉第一嘉靖辛卯遂舉于鄉戊戌成進士始知溧陽以政竒御史憚之卒得詆徙荏平再徙清豐巳乃擢經厯錦衣衛以諫竒庚戌冬入古北口抄騎至都城大殺掠時先帝倉卒集羣臣議于廷大官以百十計率媕婀不敢出一語君獨與司業趙公貞吉厯階扺掌相倡和慷慨論時事嚴時黨執格之君遂抗聲詆嚴氏父子又上疏請兵萬人欲出良涿以西護陵寢遮敵騎使不得前因得開都門通有無便不報無何又上疏直詆嚴氏十罪有詔廷杖君五十削官徙保安為布衣以戅竒當是時君懷憤之日久而忠不信於主上乃削木為宋丞相繪象旦暮射捶之隨事觸景為詩賦文章無一不慨時事罵訶姦諛懷忠主上也當是時邊人苦敵殘掠而楊順者方握符鎮宣大殺人如麻順不敢發一矢敵退則削漢級以冒首功上君飛書入轅門數順罪順痛忌之承嚴氏旨日夜竒構君及甲寅敵復寇大同右衛順計不出前轍君飛書益急而君在邊久嘗思結客以破敵或散金募土人豪宕者為城守保安飢又散金市逺粟粥僧舍活萬餘人順謂諸事非放逐臣所宜為可以叛搆君遂與御史巡宣大者路楷會疏入告君叛狀嚴氏父子從中下其事棄君宣府市連坐死者五人既又馳捕其長子襄械扺宣府杖繫糜且死會給事中吳公時來疏上有詔逮順楷襄得免戌時丁巳秋月也先帝始再聽諫臣鄒公應龍林公閏等説悟向者嚴氏姦罔斬世蕃西市奪嵩官籍其家再踰年而先帝崩遺詔録嘉靖以來以言事得罪者君得贈光祿寺少卿蔭子一人今上立一年襄復疏父寃順楷坐死上感君戅為制文命省臣祭其墓外史徐渭曰余讀離騷及閲青霞君塞下所著鳴劍小言集籌邊賦扼腕流涕而嘆曰甚矣君之似屈原也然屈原以怨而君以憤等死耳而酷不酷異焉雖然死不酷無以表烈忠今夫干將缺且折其所擊必巨堅也君結髮廬越山至入仕至放居塞垣其特竒行多甚言之人無駭心墮膽者然其要卒歸於孝忠君少時君父翁暌其室走京師誓終焉其後君舉于鄉入京悉要其鄉人為供具長跽請歸其父翁哀痛慟號路人無不灑泣者父翁遂感動亟命駕歸翁嫗相歡如初迹君所為孝如此其忠固有自哉然余嘗至京師過君故舍舍旁人為余道沈大夫盛時車騎集門如流水及禍起門可張雀羅所不去者永嘉張尚寶遜業鄉人胡通政朝臣耳然兩公者卒以此得禍悲夫宋玉為屈原弟子原死玉作些招原魂余于君非弟子然晚交耳君徙居塞垣時余直寄所愴詩一篇愧宋玉矣明文海卷四百一
