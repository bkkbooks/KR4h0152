body:
  text: 明文海卷四百二餘姚黃宗羲編傳十六忠烈趙烈士侯一元嗚呼野馬滅日月揭江河急砥柱立庶草歇孤松桀百鳥匿獨鶚繫天地萬物盡然而况人乎余嘗感慶卿聶政之事其始以親故不敢死目攝不足死而不死其既也七尺之軀若委土焉勇怯之用庶幾乎龍蛇而君子吝之以其用死睚眥攻伐之間也如令敵君父之愾除宗國之耻即司農之笏常山之舌曷殊焉悲夫處死之難也雖然扺鵲之玉惜矣豈此莽大夫明哲長樂老優遊瓦全者哉奈何一槩之刺客靡乎歲嘉靖壬子賊連倭冦劫海上所至戎士鼠竄公私狼顧莫有死綏膺賊者賊狃勝益深遂燒黃巖轉掠不復制樂東鄙水坑趙氏者世家也賊以巨艦一夕奄至其聚趙之士女或執或逃賊既悉輦其資方整居放兵四劫凡趙氏豪俊素稱驍健者皆走匿喙息草間無敢出氣天不泯趙氏烈士蹶興乃趙君某者聞難則辟其妻子他所巳乃大呼持梃出擊連仆數賊顧呼其子弟曰勿走賊易與爾又前更擊遂突入其陳意氣彌厲賊走且僵盡釋係纍委鹵獲道上以餌追者後援不繼一賊出于側鏦君以矛傷腋悶絶然賊亦破膽迸逸趙子弟緣君而奮者五人甌盤傳頌相與尾擊乘勝逐賊及舟乃返是日也斬獲首鹵三賊扶傷而歸死者無算子女之俘取之賊手課義疇勳君為最焉君既輿歸其家猶呼其左右曰賊可擊也盍掖我以從賊復起行數百步距躍高岸困頓乃還且死家人環而哭之君張目曰勿哭人百年會有一死吾今者脫嬰孺於屠剝免女婦于僇辱不䁾先世之宇不隕家聲吾則有以死矣語卒乃絶君家徒四壁非有錢財顧惜也平生言呐呐不出口非賈勇者也又非素學問習聞仁義舍生也其敢決輕死蓋天性然不以借客探丸而以扞宗斯狼瞫所謂君子也維時大中丞王公聞而賞之曰嗟嗟烈士哉介胄之士有餘忸矣爰搜戎壘用鉞惰驕河陽之幟一朝改色於是大將臨戎輕舟破浪遂一鼓而破賊人曰大中丞之蔑矣然楚國之勇激于式螳大中丞案劍擊節咨嗟乎烈士而海賊遄潰有以哉固知威天下者鉤戟長鎩不銛于節義也或曰往者賊入黃巖宿留其地延及傍邑村落數十百里皆盡向非趙君之死吾邑亦斷左臂矣蓋安平以畫邑始義江淮以睢陽扞蔽事有鎖而功巨者孰知君之為烈哉嗟乎君則死矣而名不滅彼求活草間者寧終不死也更數十載既皆湮滅澌盡與鳥獸草木同腐孰與君久長哉趙宗之良某某爰相與伐石表君之烈以風後人同知黃公侯一麟嗟夫文冕以蒞治而鋒匙以折敵猶鷹搏而鳳儀尸祝庖人異業也獨奈何鋒匙不銛而文冕毁鷹搏不疾而孤鳳奮庖人雍容樽爼而尸祝薦鸞刀勇怯易位名實相反故有大夫牧臣而死封疆嗚呼國家懸爵祿以世武胄者徒虛靡哉執袴之子遇難鼠竄殺賢大夫悲夫悲夫大夫黃公諱釧字某閩之福安人天性仁勇乙卯冬倭冦驟至時公視郡獨計以為難與決戰獨可遮伏要害相機而動日經略所以備禦旗幟改色賊窺之稍稍遁去或曰胡不疾擊賊曰吾不畏死然事未易與獨鋭意練諸部兵丙辰春寇則來藤頭藤頭台州地也公奉檄之即賊巳距險蓽山負海兵不易入賊不出相持月餘賊且困一夕炎風晦涌賊乘風艦海瞬息跳百里脫去公旋斾鞅鞅固不自得才解甲則羽書又先一日至責公以討賊會寇又熛至公則督兵疾發其日公母李夫人自家遣兄仲來視公即酌酒前訣兄曰大人幸無恙而兄善養也無復慮矣泣數行下因仗劍升車去不復顧遂與諸將下昆陽踰分水嶺至水北州其地曠夷溪淺總諸孔道遂結營傳陳分布上下約曰賊來渡淺半濟則擊之公既身先士卒露居蓐食與同業作時風雨淹旬櫛沐繭足遍行營拊循之四月己丑賊焚桐山光射薄營同事者懾向公為狐鼠耳語公怒讓曰何縮朒藉第斷頭如匏積爾明日庚寅賊渡淺半濟諸軍爭擊之稍却頃之賊譎出疊石鐵嶺遮營後潛伏乃復前渡淺公提刀督疾戰而鼓不起連斫退縮者肩爭前擊賊殺數十人已而復起四衝官軍遂潰不復可支同事又引公宜速去公復怒把其袖曰吾輩官屬寧效卒走也兵敗死耳其人奮衣逸去公猶怒目張膽整麾捕賊賊刃交下支解公以去一卒間得公澤衣血汗衊還報見者一郡人無不飲泣大府公歔欷哭之慟馳上書諸當道具列死節狀然賊緣是亦眙愕於是太府公乘城日出兵擊賊復縱敢死士豬突夜劫賊壘賊益怖乃益引兵郡賴無事時武胄諸將擁兵徒陽擊假令與公併力誓死前鬭猶冀有什一二可全而諸將竟坐不併力也豈不悲哉公為人沈毅平時常書揮戈許國之句慷慨好大節蓋天性也母娠時夢日照懷即寤生少而慧舉鄉試載上春官載詘以母老領溫郡同知獄訟立折清介弗擾仁保尫羸而豪強又讋服亷不取一錢顧時時分俸以給士其風流醖藉憐才取友不異儒生及論議當事屹然古先民碩人也為文根理道主自得富矣得人文字猶手録曰愛之不舍每恨當仕無暇多讀書其謙篤如此沒之日客吊問狀仲泣曰吾弟至孝痛吾父而奉母誨常恐墜失乃今死矣吾負弟吾負弟今求原隰而不得弟首則何以復吾母因大哭客亦哭其後返槥水北哀哭忽見父老前指公首埋處果得巾髮若平生乃斂以歸年僅四十有九猶子某嗣所著遺稿若干卷傳于世前上書既聞其年八月詔贈右參議録子太學生令有司專祠歲時奉祠事論曰昔張中丞巡死守睢陽議者以扞蔽江淮有功天下公今抗節倭夷既身殞氣奮亦巳扞郡折衝今羣盜麻沸諸將緣兹而奮乎斯亦天下之功各以守死成勳偉矣哉及察其砥節馴行稱孝歸仁政業足紀文章可述以儒飾吏雖循良所稱曷以加諸或曰公母老夫以母故不敢死刺客聶政云爾若敵君父之愾領封疆之守以死勤事大聖之徒也然則李夫人亦善誨矣王正義先生趙廣生乙酉夏六月日正義先生沈栁潭而死正義也氏諱易名之典具詳陳章侯行實中余與章侯之交先生䁥同狎於見聞久章侯已識其大著者余獨識其一二璅者軼者於此先生服竒而行簡傲醜俗之吝封者若濟之溷性解音律讀書列聲伎於帳中遑巳卯邀余讀書桐風館館環植老桐數十株引枝接葉籠日盡碧雜奏絲竹納于其中所畜伶小碧善治具羮以玉糝汁以雲腴入其中者疑為洞天日以為常先生之文顧日益竒思日益進殆有天授者歟運丁乙酉余盡室山居一日入城市訪先生遇諸塗先生曰山中人來耶挈余偕行路經余故廬命入坐徵余曰子可何余曰無何也處士我處先生曰嘻何言之易也吾與若皆聲色場中人久則難持不若一死之得一塊乾淨地也余愕然無以應因出袖中致命篇暨上劉先生書稿擲余曰奈文不佳何余戚然曰文以人傳先生曰然仍強我歸而飯我命舊伶三四人攜樂器來供且過于曩時曰聚散復何常耶會劉北生亦來呈藝競歡酒酣先生忽徵同座曰我言死若輩信我否時座中有侃侃矢死者余與北生同聲曰諸君言不敢疑不敢信子言死信十之八先生徵其故余曰子生平好做不朽文字題目差堪做耳先生頷之曰子信我十之八知我十之八矣散去余山中日訪事於鬻薪者薪者樂為我言一日走告余曰城中一秀才死義矣亟問其姓名莫之辨余曰必王玄趾無疑也次日奔哭先生猶未殮生氣射人詢之在事者云漸水不滅頂沈沙不顛趾噫先生之安于死如是夫先生靣黧巉長昻藏健走卧起歘忽不恆不能飲好飲少年使氣加人天啓時有鄉獍系閹孽勢甚灼先生跳身而逐諸路鄉獍語人曰某得罪朝廷不得罪于非門非户之秀才傳者資為笑談先生之豪而戅率又如是世之稱先生者顧重其死先生惟輕其死故死爾重其死者重其死也先生之死死於義余謂其死於豪於戅豪不吝已戅不入惴也先生之義成於死余謂其義故豪故戅義者有所不屑侏儒則惵籧篨不解也余故表而出之有如此周志新韓如璜周志新南海人大宗嘗呼為周新因改焉洪武已卯舉於鄉筮仕大理寺評事每有疑獄一言而白壬午拜監察御史彈劾敢言貴戚畏之人稱為冷面寒鐵公京師或怖小兒輒曰冷面寒鐵公來永樂元年巡案福建奏言朝廷設立軍民諸司彼此相頡頏兩非統屬今都司所轄各衛每府官適門或遇諸途輒怒府官不下馬甚至鞭辱僕𨽻衛所公務徑行有司理辦稍不從即呵責吏典請自今府衛相見行平禮遇諸途則分道而行所有分務不許徑行府縣有司官吏毋得凌辱聖節正旦冬至在外衛官悉於府治行禮開讀詔書雖邊海衛所亦從布政司差人都司毋與上悉從之二年巡案北京時制令所屬吏民有犯徒流者免罪就發北京民稀處種田監候詳擬往復數月多死獄中新奏請後罪及職官有犯詳擬待報其吏民犯徒流者悉從北京行部或巡案詳允就發種田如此則下無羈滯之患上不負寬恤之恩上諭都察院官曰御史言是也且命北京百姓有犯應決者許其收贖燕民大悅三年九月擢雲南案察使末赴有旨改浙江有寃民淹繫聞喜曰冷面寒鐵公來也吾無患矣至即果洗其寃一日視篆忽旋風吹異葉至前左右言城中無此木獨一僧寺有之去城差逺新悟曰此必寺僧殺人葬其下也寃魂報我矣發之得婦人尸人稱為神明一巨商遠回未抵家而日暮恐孤行為人所圖潛以其資置一祠石下至家妻問之告以故明日求之無有也往訴之新新曰是必而妻有外遇也覆之果然蓋歸語妻時樓之者竊聽先往取之矣遂併治之有訴爭雨傘者甲乙所言記驗皆同新命剖之各持其半去隂遣人尾其後甲曰我始欲助汝傘價之半得非汝利也乙答曰傘本我物寧能低價屬汝于是甲就縛正其罪其燭姦類此境中有虎害為文告于城隍神須臾格殺之初往浙道上蠅蚋近馬而聚尾之見一暴尸惟刻木布印及至任令人市布得印志同者鞠之乃劫布商賊也悉以其贓召布商家給之家人大驚始知其死于賊也人皆服之其除暴類此會夏秋潦窪田盡沒永樂九年湖州府無徵糧米十七萬二千四百餘石所司一槩催徵民日逃亡奏乞遣官覆驗上即命户部覆實蠲免嘗巡屬縣微服觸縣官收繫獄中與囚語遂知一縣疾苦明日往迓乃自獄出縣官恐懼伏謝竟以罪去由是諸郡邑吏聞風股栗莫敢恣肆錢塘知縣葉宗行號廉能嘗偵之入其居無長物惟笠澤魚臘一束其家所寄也袖少許以出示葉葉益砥礪號錢塘一葉清後卒于任為文往祭哭之甚哀其旌别淑慝類此寮寀一日餽以鵝灸懸于室後有遺者指示之新未顯時其妻治女紅以給及同官內燕荆叉布裙以往大類田野婦各相慚恧更為淡素當是時周憲使之名震天下澤及無告民自不寃雖三尺童子知其美焉初錦衣衛指揮紀綱用事使千户往浙緝事多作威福受吏賕新時進須知如京師遇諸涿州捕繫之千户脫走欣于綱綱乃更誣奏新上大怒馳馬逮新承綱者榜掠無完膚既至伏陛前猶抗聲曰案察司行事與在內都察院同陛下所詔也臣奉詔擒姦惡奈何罪臣臣死且不憾上愈怒命戮之臨刑大呼曰生為直臣死當作直鬼他日顧問侍臣曰周新何許人對曰廣東上嘆曰乃有此好人邪枉殺之矣後紀綱以罪誅事益白新既不祿其妻獨挈遺衣及書數卷歸廣東貧居如洗都御史楊信民巡撫時存問其家周以月俸嘗語人周志新當代第一人吾黨所未及也新無子景泰初其妻卒于家浙人在廣東藩臬者皆會葬云野史臣曰嗚呼新之死于紀綱也可哀也哉持身之亷臨政之明辨寃澤物之仁與夫持風裁臨患難之直而不撓可謂剛且大者語曰直木先伐又曰物忌芳潔其新之謂歟同里彭森傳曰被刑之夕司天奏文星墜上以是悔自後見一人衣紅立日中呵之問為誰曰臣周新也上帝以臣剛直命為城隍為陛下治姦臣貪吏言已不見天顔憮然嗚呼豈其然乎豈亦鄭伯有魏元徽之比乎今杭州城隍之神童叟僉目為周新縱不必然而新之聰明正直無間于童叟亦可以徵已先臣黃佐有言劉球毛吉近為姦盜所殺嘗附魂于人及比所聞楊璉黃尊素周宗建亦復現形著蠁貞魂耿耿自不同他氣易散豈幻誕哉要之新之清風徑節固不待此而自可傳于不泯也明文海卷四百二
