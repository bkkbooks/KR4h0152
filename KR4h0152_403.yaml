body:
  text: 明文海卷四百三餘姚黄宗羲編傳十七義士杜環宋濓杜環字叔循其先廬陵人侍父一元㳺宦江東遂家金陵一元固善士所與交皆四方名士環尤好學工書謹飭重然諾好周人急父友兵部主事常允恭死于九江家破其母張氏年六十餘哭九江城下無所歸有識允恭者憐其老告之曰今安慶守譚敬先非允恭友乎盍徃依之彼見母念允恭故必不遺棄母母如其言附舟詣譚譚謝不納母大困念允恭嘗仕金陵親戚交友或有存者庶萬一可冀復哀泣從人至金陵門一二人無存者因訪一元家所在問一元今無恙否道上人對以一元死巳久惟子環存其家直鷺洲坊中門内有雙橘可辨識母服破衣雨行至環家環方對客坐見母大驚頗若嘗見其面者因問曰母非常夫人乎何為而至于此母泣告以故環亦泣扶就坐拜之復呼妻子出拜妻馬氏解衣更母濕衣奉糜食母抱衾寢母母問其平生所親厚故人及幼子伯章環知故無在者無所附又不知伯章存亡姑慰之曰天方雨雨止為母訪之茍無人事母環雖貧獨不能奉母乎且環父與允恭交好如兄弟今母貧困不歸他人而歸環家此二父導之也願母無他思時兵後歲饑民骨肉不相保母見環家貧雨止堅欲出問他故人環令媵女從其行至暮果無遇而返坐乃定環出布帛令妻為製衣衾自環以下皆以母事之母性褊急少不愜意輒詬怒環私戒家人順其所為勿以困故輕慢與較母有痰疾環親為之烹藥進匕筯以母故不敢大聲語越十年環為太常賛禮郎奉詔祠會稽還道嘉興逢其子伯章泣謂之曰太夫人在環家日夜念少子成疾不可不早徃見伯章若無所聞第曰吾亦知之但道逺不能至耳環歸半嵗伯章來是日環初度母見少子相持大哭環家人以為不祥止之環曰此人情也何不祥之有既而伯章見母老恐不能行竟紿以他事辭去不復顧環奉母彌謹然母愈念伯章疾頓加後三年遂卒將死舉手向環曰吾累杜君吾累杜君願杜君生子孫咸如杜君言終而氣絶環具棺槨殮殯之禮買地城南鍾家山葬之嵗時常祭其墓云環為晉王府錄事有名與余交史官曰交友之道難矣翟公之言曰一死一生乃知交情此非過論也實有見于人情而云也人當意氣相得時以身相許若無難事至事變勢窮不能蹈其所言而背去者多矣况既死而能養其親乎吾觀杜環事雖古所稱義烈之士何以過而世俗恒謂今人不逮古人不亦誣天下人哉書博雞者事高啟博雞者袁人素無賴不事産業日抱雞呼少年博市中任氣好鬭諸為里俠者皆下之元至正間袁有守多惠政民甚愛之部使者臧新貴將案郡至袁守自負年德易之聞其至笑曰臧氏之子也或以告臧臧怒欲中守法㑹袁有豪民嘗受守杖知使者意嗛守即誣守納巳賕使者遂逮守脇服奪其官袁人大憤然未有以報也一日博雞者遨于市衆知有為因讓之曰若素名勇徒能籍貧孱者爾彼豪民恃其貲誣去賢使君袁人失父母若誠丈夫不能為使君一奮臂邪博雞者曰諾即入閭在呼子弟素健者得數十人遮豪民於道豪民方華衣乗馬從羣奴而馳博雞者直前捽下提毆之奴驚各亡去乃裭豪民衣自衣復自策其馬麾衆擁豪民馬前反接徇諸市使自呼曰為民誣太守者視此一步不呼則杖其背盡創豪民子聞難鳩宗族僮奴百許人欲要簒以歸博雞者逆謂曰若欲死而父即前鬬否則闔門善俟吾行市畢即歸若父無恙也豪民子懼遂杖殺其父不敢動稍斂衆以去袁人相聚縱觀歡動一城郡錄事駭之馳白府府佐快其所為隂縱之不問日暮至豪民第門捽使跪數之曰若為民不自謹冒使君杖汝法也敢用是為怨望又投間衊汚使君使罷汝罪宜死今姑貸汝後不善自改且復妄言我當焚汝廬戕汝家矣豪民氣盡以額叩地謝不敢乃釋之博雞者因告衆曰是足以報使君未邪衆曰若所為誠快然使君寃未白猶無益也博雞者曰然即連楮為巨幅廣二丈大書一屈字以兩竿夾掲之走訴行御史臺臺臣弗為理乃與其徒日張屈字㳺金陵市中臺臣慙追受其牒為復守官而黜臧使者方是時博雞者以義聞東南高子曰余在史館聞翰林天台陶先生言博雞者之事觀袁守雖得民然自喜輕上其禍非外至也臧使者枉用三尺以讎一言之憾固賊盩之士哉第為上者不能察使匹夫攘袂羣起以伸其憤識者固知元政紊弛而變興自下之漸矣錢可大梁潛可大名瑛姓錢氏本呉越王鏐之後厯廬陵刺史滙再世曰和自廬陵徙吉水又四世曰程程之子誠可皆以科第有聲而可大之祖本和號梧岡先生者尤篤行之士也可大生十八月而孤稍長性穎敏年十三以書經中臨江路賞試既又中撫州路賞試然是時元祚日非紅巾盜起所在皆争為雄長自至正丁酉五六年士大夫顛頓甚矣可大奉其祖及其母﨑嶇以避之走廬陵之富田遷泰和之梅岡既又走其邑之大淵尋又奔雷川最後奔廬陵之李坑李坑路極險盜又追及之梧岡被鎗不死縛之以行可大聞即冒白刄奔訴乞以身代盜并縶之可大訴不巳梧岡亦哀訴其無子唯此一孫耳兩人因争相代死情亦悲慘賊憐其意遂兩釋之可大方脱時其母尋亦被執而可大妻張氏翳伏叢薄中窺見賊巳執其姑即自出迎謂賊曰我姑老矣請釋姑而縛我賊熟視良久即解縛其姑縛張氏張氏既就縛擲所攜袖中雙鞋與其姑訣曰婦無用此矣且行且脾睨其姑稍逺即罵賊不復肯行遂死之變故倉卒之頃而一時憤然求死以全生者若素約然何其可悲也國朝兵定有司以可大之賢凡三薦之皆以母老辭親既没終身為之悲痛梧岡故所築樓可大每一登之輒流涕因名之曰思樓其孝行篤至世蓋少見也然其為頗豪健慨然以氣自負鄉有劇冦嘗殺人有司憚不敢捕以屬可大可大立捕殺之年若干卒于家一子曰遂志今以科第得官為山東案察僉事云賛曰吾嘗過錢氏所居其地今所謂錢塘者愛其山水清曠同登高而望焉其南數十里外峻峯躍起視衆山特高云其北即宋丞相文信公故居也諸老人言丞相徃事與史傳所記殊異因言可大之避亂也居其山下㝡久其被執也亦幾不免余既壯其山川又聞可大事思其人而不可得也因為傳云楊義士張弼天順間錦衣衛都指揮門達怙寵驕横凡忤之者輒嗾覘卒潛致其罪逮步考掠使無詰證莫可反異由是權傾一時言者結舌其同僚袁彬質直不屈乃誣以重情考掠成獄内外咸寃之莫或敢發也京城有楊塤者戍伍之餘夫也素不識彬而為之上疏曰正統十四年駕留北廷廷臣悉奔散逃生惟袁彬一人特校尉之役乃能保䕶聖躬備嘗艱苦及駕還復辟授職酬勞公論稱快今者無人奏劾考掠備至罪定而後附律法司雖知其枉豈敢辨明陷彬於死雖止一夫但傷公論人不自安乞以彬等御前審錄庶得明白死者無憾生者亦安臣本一芥草茅身無祿秩見此不平昧死上言遂擊登聞鼓以進彬仍送衛獄而達因是欲盡去異巳者乃緩塤死使誣少保吏部尚書華蓋殿大學士李賢指使塤佯諾之達遂以聞命中賫㑹三法司鞫于午門前塤乃直述所言皆由巳出於賢無預達計不行而彬猶降黜居第盡毁未幾英宗升遐言者斯劾達罪舉塤事為證達謫死南丹彬復舊職而代達總衛事成化初修英宗實錄稱義士楊塤云塤字景和其先某處人父為漆工宣德間嘗遣人至倭國傳泥金畫漆之法以歸塤遂習之而自出巳意以五色金鈿並施不止其舊法純用金也故物色各稱天真爛然倭人見之亦齚指稱歎以為不可及蓋其天資敏悟於書法詩格不甚習而徃徃有造妙處故其藝亦絶出古今既不避權奸為此義舉人亦莫敢以一藝目之有欲授之以官不就遂隱於藝以自高焉華亭張弼論曰義者無所為而為合天下之公論者是也使雖公論發之以私則其中巳不義矣若塤者於彬無恩於達無隙又非言官以圖塞責也特以公論所激挺身以突虎口其不死者幸也勇于行義何如哉然此公論具人面目皆能知之而高冠長裾號稱科第人物者乃低徊淟涊甘為之掃門捧溺無所不至而覸然自得誇譟于人何利害之移人乃如是其烈耶聞塤之風亦可以少愧矣予來京師師國子祭酒鄉先生陳汝同曰楊塤真義士也吾欲為之作傳先生没而傳未作弼故補之不特為塤計也庶亦勵世之頑鈍無耻者云呉叟宗臣叟蓋吉安人忘其名其里中有大猾家徒數百暴行里中里中人大患之然不敢上其狀于有司即上狀者有司亦怵怵焉恐變不敢問㑹流賊逼里中而叟遂聞詣其廬説曰公之暴行上下之所知也即有司懼不敢問假令部使者督千人捕公公能終拒之乎曰不能叟曰吾固知公之不能也公既不能何不因事自解亡論自解且令里人徳公其人跽曰唯父命之叟因執其手曰方今流賊四刼危急存亡之秋也公當此時誠能率其子弟擊賊賊必潰則里中莫不驩公公得以長豪里中無懼矣其人遂掀髯而起曰公無言吾當為公擊賊於是勒其子弟最強者百人人持梃急馳之而叟騎一驢從二蒼頭徃賛一遇賊輒奮鬭自己至未凡數戰殺數十人猾者稍倦矣輒命左右取水而叟心計賊既以殺數十人可無慮矣獨念此猾暴里中無巳時也不若因其懈滅之遂從旁大呼我兵且退賊遂乗勝逐之悉殺猾之父子兄弟叟乃跨驢從二蒼頭揚揚歸也宗子曰嗟乎若叟者竒士哉竒士哉夫賊内外應至變也叟不用一兵不費有司一米調三寸舌取二賊若探之囊假令叟得時雲變設竒制敵豈復測識者哉而顧巖老叟焉惜矣惜矣郭黄門與余言余懼其逸故為之傳阿寄田汝成阿寄者淳安徐氏僕也徐氏昆弟别産而居伯得一馬仲得二牛季寡婦得阿寄阿寄年五十餘矣寡婦泣曰馬則乗牛則耕踉蹌老僕迺費我藜羮阿寄嘆曰噫主謂我力不若牛馬耶迺畫策營生示可用狀寡婦悉簪珥之屬得銀一十二兩阿寄則入山販漆朞年而三其息謂寡婦曰主無憂富可立致矣又二十年而致産數萬金為寡婦嫁三女婚兩郎齎聘皆千金延師教兩郎既皆輸粟為太學生而寡婦則阜然財雄一邑矣頃之阿寄病且死謂寡婦曰老奴馬牛之報盡矣出衴中二楮則家計鉅細悉均分之曰以此遺兩郎君可世守也言訖而終徐氏諸孫或疑寄私蓄者竊啟其篋無寸絲粒粟之儲焉一嫗一兒僅敝緼掩體而巳嗚呼阿寄之事子蓋聞之俞鳴和云夫臣之於君也有爵禄之榮子之於父也有骨肉之愛然垂纓曳綬者或不諱為盜臣五都之豪為父行賈匿良獻苦否且徳色也迺阿寄邨鄙之民衰邁之叟相嫠人撫髫種而株守薄業户祚彫落溝壑在念非素聞詩禮之風心激寵榮之慕也迺肯畢心殫力昌振鎡基公爾忘私斃而後己是豈尋常所可及哉鳴和又曰阿寄老矣見徐氏之族雖幼必拜騎而遇諸必控勒將數百武以為常見主母不睇視女使雖幼非傳言不離立也若然即縉紳讀書明禮義者何以加諸移此心也以奉其君親雖謂之大忠純孝可也甄義士朱安侃甄義士者名英字士豪陜以西人也生而虬髯鐵面雄才英發善騎射喜任俠重然諾有古豪士之風常為人排難解紛義氣激昻雖千萬徃矣鄉人徳之稱為義士嘉靖中商於臨清日坐市門鄰左有王餅師者生於大河之南僑居臨清以鬻餅為業其婦悍妬異常視其夫奴臺然每詬詈之上及舅姑餅師但側立屏息而巳常持大杖撻之惟跪而俛首受責莫敢出聲義士見之扼腕一日呼餅師謂之曰汝婦妬而無子詈汝先人其罪大矣何不出之其人謝以貧而無能兼受制已久是不敢也義士曰汝若鬻此婦吾當買使西行多與汝金别娶良婦以續宗祧不亦善乎曰若鬻之奈其不從君去何義士大笑顧市人曰王餅師真奴才也汝但立劵受金吾何患其不從哉衆力賛成之呼牙儈至義士與之十金餅師得金避之他舍義士袖鐵簡至門謂婦曰汝夫賣汝為我妾可從行婦出惡言義士揮簡擊之仆地連擊數下婦負痛從之是夜義士歸邸明燭端坐使兩僕掖婦居前數之曰汝為婦人昧三從之禮妬而凌夫詈舅姑死有餘辜矣婦跪曰吾前夫性柔善是以敢爾今既歸君紡績烹餁惟命是從義士怒曰汝尚敢誑我耶命僕裭其衣俯而縛之地以荆杖自踵至頂鱗次撻之流血滿地又仰而縛之以馬策從胷及足鞭之至午夜義士與僕俱卧次早方解其縛問曰汝尚敢凌夫乎婦叩頭出血誓死不敢義士遂呼餅師與牙人至以婦付之曰不責汝金吾收其劵若能改過則永為夫婦如怙終不悛吾明年至當見還義士遂行次年至問之其居人曰自君為餅師治之即能執道甚恭雖比隣亦不聞其聲朝夕焚香拜舅姑之主已為良婦矣餅師夫婦至邸婦見義士股慄連叩其首義士遂還其劵餅師設酒筵以謝義士避而不至矣論曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義立世之道曰綱與常妻而凌夫則子可逆父而臣亦可欺君矣三綱不正則冠履倒置烏得為人乎北畿王惟誠氏遊梁為余言如是於乎聶政魯連世果無其人乎若王餅師者天下之懦夫也有一婦不能自治非遇甄義士豈能一日安其室哉甄子不惜十金除餅師之患而能以禮制慾凜凛然有烈丈夫之氣鄉人稱為義士也宜矣若使之乘軺建節受疆場之寄必不吝千金縱反間以破敵豈有不忠于國者乎顧乃蚩蚩逐什一之利於闤闠之間也惜哉潘布衣徐熥潘先生者齊人也徙居燕先生雖居燕而心不忘齊故自號海濱生云先生豐頤脩幹工騎射以武薦上司馬者三矣例得執金吾食萬户先生辭弗就竟以布衣老焉謂自古任俠之士如荆卿聶政劇孟郭解之徒皆以布衣起閭巷卒能赴士之阨困名聞諸侯豈必如信陵春申諸君藉有土卿相之富而後稱節侯也以故四方豪傑之士莫不延頸願交潘先生者矣先生不就職而名尤重于錦衣自執金吾大將軍而下至校尉之屬無不嚴事先生者先生出片語罔不功令奉之同時有秦秘書者呉人也亦任俠自喜與先生深相結納以振人之急時京師為之語曰緩急可依潘布衣使氣不除秦秘書其重如此今上初年江陵相用奪情不解政柄吴趙二太史抗疏論劾自知疏上禍且不測時賓客滿座皆與兩公所善者兩公以身後為托彼此相視莫敢應者秦秘書仰天而嘆曰所不恤公之後者有如此日終不令公妻子死而吾獨生乃夜遣妻子與呉趙妻子間道亡歸明日疏上忤㫖呉趙果下錦衣獄時執政方以酷刑塞言者路獄具楚毒無不立斃杖下者秦秘書衣短後衣雜于𨽻卒中從旁睨視目眥幾裂又時時目攝掌獄者掌獄者心知為秦秘書也為之氣奪良乆卒呼伍伯之屬從旁耳語故呉趙雖受拷掠無完膚得不即死而潘先生時巳伺之門屏間矣及兩公曳而出氣息幾絶將命以巾車載歸而政府厲聲叱曰囚安能車遂委頓于地潘先生乃與一舍人力負兩公歸當先生少時曽遇異人授禁方所謂萬金良藥也以一匕投搒笞者即甚糜爛無不立愈呉趙兩公以此得全骸骨執政聞之恚益甚尋出秦秘書為魯藩審理且將甘心潘先生矣潘先生了無所懼乃為書欲投執政數其奪情罪狀書成漫滅于懷者久之日夜於邑或繼于泣母夫人密知其事曰兒之所為濡忍而不發者豈以未亡人故兒誠能一言而悟執政吾死且瞑矣兒第徃勿慮潘先生曰諾書遂上執政不聽然卒憚潘先生不敢有所中居無何執政事亦敗先生得以自全自是任俠之士從潘先生者日益廣凡建言得罪之臣下錦衣者隂所全活者數十百人先生不以語人人卒無有知之者粤有士人謁選長安嵗久而大窮困將粥其愛女以給饔飱先生偶見之捐槖中三萬鏹以給之後士得官將以錢為報先生笑曰吾哀君困窮全其骨肉豈望報乎里中有相仇者即賢豪長者居間十數終不解得潘先生片言而罷四方賓客常鱗集座上不暇櫛食即鐘沈漏盡而户外轔轔不絶母夫人死自逺方送葬者幾千乘蓋不減劇孟云野史氏曰自古布衣稱俠者徃徃好剛使氣扞當世之文網如翁伯者流以睚眦殺人宜其及矣潘先生起自布衣然皆好行其德知與不知全活者衆其隂德厚矣不然當江陵之時奈何能免于虎口哉栁燕楊兆京栁燕者雒陽人也嘗寓居金陵癸酉歳余亦遊都下傍晚清秋氣肅余策馬出都門十里許見長楊下有數客席地擁歌姬傳觴歡飲余揮鞭不顧獨自遨遊馳騁長堤間旁若無人内有一客衣冠甚偉起就余曰君逸宕乃爾真可與言者余叩其姓名即栁燕也客曰我有逆旅在城東沿溪五里轉曲徑過第三橋白扉晝掩者是矣三日後城樓鼔動君可匹馬相尋余如期訪之則蒼頭俟門首曰主人相候久矣入門皆竹徑琅玕萬莖但聞鳥聲絶無人跡中有一石路委宛半里則朱甍峻宇擬于王侯客下階握手甚歡瞬息珍羞羅列器皿皆竒玩也酒酣拔雙劍更衣起舞迅疾如風時夜深月落星斗參差此景非復人間矣余起行客長嘆曰此去相思無限來年當訪於呉㑹耳余歸越嵗不知其踪跡及杪秋望夜漏三下叩門聲甚疾余知為公延之入然觀其容則悲凉激烈倍於昔矣余叩之曰君有所為乎客曰君固有心人今將以相告也吾有故人在秦中始與為刎頸交今死仇手余感之入夢及秦客來詢之不謬今將萬里為報仇然此事非三年不可不遂必死之三載後君其訪我于逆旅故處死生將有所托也余許之遂躍馬疾去及期余徃則風景依然栁笑迎道左曰君真信士然我事巳濟矣邀入内復張筵痛飲酒數行有一叟黄衫白巾自外來不揖而坐良久不言惟彈鋏而笑栁目余曰彼異人無忽之也十年不彈鋏矣夜彈鋏必將有所事須㬰忽果去不知所之夜將盡復來遂浮大白意欣欣甚自得栁叩之曰叟安之叟曰獨見不平事不覺小年時伎倆復露耳客曰吾以叟乆無意人間事矣尚如此情多耶酒闌余從容問叟曰如君輩海内有幾隠于何處叟曰何處無之俗眼覿面相失耳臨别欷歔泣數行下今不知寄跡飄泊何許矣因感其事而為傳明文海巻四百三
