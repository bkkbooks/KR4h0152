body:
  text: 明文海卷四百四餘姚黃宗羲編傳十八竒士秦士宋濓鄧弼字伯翊秦人也身長七尺雙目有紫稜開合閃閃如電能以力雄人鄰牛方鬭不可擘拳其脊折仆地市門石鼓十人舁弗能舉兩手持之行然好使酒怒視人人見輒避曰狂生不可近近則必得竒辱一日獨飲娼樓蕭馮兩書生過其下急牽入共飲兩生素賤其人力拒之弼怒曰君終不我從必殺君亡命走山澤耳不能忍君苦也兩生不得巳從之弼自據中筵指左右揖兩生坐呼酒歌嘯以為樂酒酣解衣箕踞拔刀置案上鏗然鳴兩生雅聞其酒狂欲起走弼止之曰勿走也弼亦粗知書君何至相視如涕唾今日非速君飲欲少吐胸中不平氣耳四庫書從君問即不能答當血是刃兩生曰有是哉遽摘七經數十義叩之弼舉傳疏不遺一言復詢厯代史上下三千年纚纚如貫珠弼笑曰君等伏乎未也兩生顧慘沮不敢再有問弼索酒被髮跳呌曰吾今日壓倒兩生矣古者學在養氣今人一服儒衣反奄奄欲絶徒欲馳騁文墨兒撫一世豪傑此何可哉此何可哉君等休矣兩生素負多才藝聞弼言大愧下樓足不得成步歸詢其所與遊亦未嘗見其挾册呻吟也泰定末德王軌法西御史臺弼造書數千言袖謁之閽卒不為通弼曰若不知關中有鄧伯翊耶連擊踣數人聲聞于王王令𨽻人捽入欲鞭之弼盛氣曰公奈何不禮壯士今天下雖號無事東海島倭尚未臣順間者駕海艦互市于鄞即不滿所欲出火刀斫柱殺傷我中國民諸將軍控弦引矢追至大洋且戰且却其虧國體為巳甚西南諸蠻雖曰稱臣奉貢乘黃屋左纛稱制與中國等尤志士所同憤誠得如弼者一二輩驅十萬橫磨劍伐之則東西至日所出入莫非王土矣公奈何不禮壯士庭中人聞之皆縮頸吐舌舌久不能收王曰爾自號壯士解持矛鼓譟前登堅城乎曰能百萬軍中可刺大將乎曰能突圍潰陳得保首領乎曰能王顧左右曰姑試之問所須曰鐵鎧良馬各一雌雄劍二王即命給與隂戒善槊者五十人馳馬出東門外然後遣弼往王自臨觀空一府隨之暨弼至衆槊並進弼虎吼而奔人馬辟易五十步面目無色巳而煙塵漲天但見雙劍飛舞雲霧中連斫馬首墮地血涔涔滴王撫髀歡曰誠壯士誠壯士命酌酒勞弼弼立飲不拜由是狂名振一時至比之王鐵槍云王上章薦諸天子會丞相與王有隙格其事不下弼環視四體歎曰天生一具銅斤鐵肋不使立勳萬里外乃稿死三尺蒿下命也亦時也尚何言遂入王屋山為道士後十年終史官曰弼死未二十年天下大亂中原數里人影殆絶元鳥來降失家競棲林木間使弼在必當有以自見惜哉弼鬼不靈則巳若有靈吾知怒髮上衝也王冕宋濓王冕者諸暨人七八歲時父命牧牛隴上竊入學舍聽諸生誦書聽巳輒默記暮歸忘其牛或牽牛來責蹊田父怒撻之巳而復如初母曰兒癡如此曷不聽其所為冕因去依僧寺以居夜潛出坐佛膝上執策映長明燈讀之琅琅達旦佛像多土偶獰惡可怖冕小兒恬若不見安陽韓性聞而異之録為弟子學遂為通儒性卒門人事冕如事性晚冕父巳卒即迎母入越城就養久之母思還故里冕買白牛駕母車自被古冠服隨車後鄉里小兒競遮道訕笑冕亦笑著作郎李孝光欲薦之為府史冕罵曰吾有田可耕有書可讀肯朝夕抱案立庭下備奴使哉每居小樓上客至僮入報命之登乃登部使者行郡坐馬上求見拒之去去不百武冕倚樓長嘯使者聞之慚冕屢應進士舉不中嘆曰此童子羞為者吾可溺是哉竟棄去買舟下東吳渡大江入淮楚厯覽名山川或遇竒才俠客談古豪傑事即呼酒共飲慷慨悲吟人斥為狂奴北遊燕都館祕書卿台哈布哈家台哈布哈薦以館職冕曰公誠愚人哉不滿十年此中狐兔遊矣何以祿仕為即日將南轅會其友武林盧生死灤陽惟兩幼女一童留燕倀倀無所依冕知之不逺千里走灤陽取生遺骨且挈二女還生家冕既歸越復大言天下將亂時海內無事或斥冕為妄冕曰妄人非我誰當為妄哉乃攜妻孥隱於九里山種豆三畝粟倍之樹梅花千桃杏居其半芋一區薤韭各百本引水為池種魚千餘頭結茅廬三間自題為梅花屋嘗倣周禮著書一卷坐卧自隨祕不使人觀更深人寂輒挑燈朗諷既而撫卷曰吾未即死持此以遇明主伊吕事業不難致也當風日佳時操觚賦詩千百不休皆鵬騫海怒讀者毛髮為聳人至不為賓禮清談竟日不倦食至輒食都不必辭謝善畫梅不減楊補之求者肩背相望以繒幅短長為得米之差人譏之冕曰吾藉是以養口體豈好為人家作畫師哉未幾汝潁兵起一一如冕言皇帝取婺州將攻越物色得冕置幕府授以咨議參軍一夕以病死冕狀貌魁偉美鬚髯磊落有大志不得少試以死君子惜之史官曰豫受學城南時見孟宷言越有狂生當天大雪赤足上潛嶽峯四顧大呼曰遍天地間皆白玉合成使人心膽澄徹便欲仙去及入城戴大帽如蓰穿曵地袍翩翩行兩袂軒翥譁笑溢市中豫甚疑其人訪識者問之即冕也冕真怪民哉馬不泛駕不足以見其竒才冕亦類是夫南宫生高啓南宫生吳人偉軀幹博涉書傳少任俠喜擊劍走馬尤善彈指飛鳥下之家素厚藏生用周養賓客及與少年飲博遨戲盡喪其資逮壯見天下亂思自樹功業乃謝酒徒去學兵得風后握竒陳法將北走中原從豪傑計事會道梗周流無所合遂泝大江遊金陵入金華會稽諸山搜覽瓌怪渡浙江泛具區而歸家居以氣節聞衣冠慕之爭往迎候門止車日數十兩生亦善交無貴賤皆傾身與相接有二軍將恃武橫甚數歐辱士類號虎冠其一嘗召生飲或曰彼酗不可近也生笑曰使酒人惡能勇吾將柔之矣即命駕往坐上座為語古賢將事其人竦聽居樽下拜起為壽至罷會無失儀其一嘗遇生客次顧生不下巳目攝生而起他日見生獨騎出從健兒帶刀策馬踵生後若將肆暴者生故緩轡當中道進不少避知生非懦儒遂引去不敢突冒訶避明旦介客詣生謝請結歡生能以氣服人類如此性抗直多辨好針切友過有忤巳則面數之無留怨與人論議蘄必勝然援事析理衆終莫能折時藩府數用師生屢策其雋蹶多中有言生於府欲致生幕下不能得將中生法生以智免家雖貧然喜事故在或饋酒肉立召客與飲啖相樂四方遊士至吳者生察其賢必與周旋欵曲延譽上下所知有喪疾不能葬療者以告生輒令削牘疏所乏為請諸公間營具之終飲其德不言故人皆多生謂是婁君卿原巨先而賢過之久之稍厭事闔門寡將迎闢一室庋厯代法書周彛漢硯唐雷氏琴日遊其間以自娛素工草𨽻逼鍾王患求者衆遂自閟希復執筆歆慕靜退時賦詩見志怡然處約若將終身生姓宋名克家南宫里故自號云贊曰生之行凡三變每變而益善尚俠末矣欲奮于兵固壯然非士所先晚乃刮磨豪習隱然自將履藏器之節非有德能之乎與夫不知自返違逺道德者異矣王古直李東陽王古直名佐字仁輔後去車為甫古直其所自號以號行世居台之黃巖今分太平縣地也少為詩及行草漫遊京師有鄉人坐事者古直候諸官官并捕候者詢其拏甚急古直甘侵辱竟不言所在入刑部獄獨暴立烈日不與衆囚伍李主事廷美異之檢衣帽間得柯學士諸詩問之曰爾能詩耶使賦日影詩成縱之歸長揖而出獄吏皆大笑然古直亦自是得名與今侍郎黃定軒侍講謝方石友善嘗主方石方石以憂去主林給事克沖克沖使海國主王員外存敬存敬亦出使主定軒子主事汝修然亦不恆在卒然求之莫得也旅食三十年無僮僕不置釡甑有大籠五六惟詩畫數百幅中貯壺酒晨出飲一再勺巳復鐍之以去上元節京師燒糯汁為瓶以貯少畜魚旁映屏燭通明可愛俗呼為泡燈古直買置謝館日玩弄而兒戲一日誤觸碎意怫然不樂曰吾平生家計在此今蕩盡矣方作章書值掾吏至曰遽敗吾興羣掾欲歐之或俾自為計古直曰我固當歐歐則我名益彰一日遇途竟被歐獨袖手承之以歸亦不以屑意也或勸使仕大言曰我來為爵祿圖也盍科舉乎則笑曰安得以少年處我嘗在酒所嘆曰此亦功名事業也顯靈宫道士請主師孰館餼甚厚閲日忽辭去曰安能矻矻操朱墨坐几案間乎克沖之使欲與俱不果或問之故曰彼不吾強吾安能為彼行邪自古大賢聞人不渡海者何限海豈必渡然後為快也其性氣屹屹不肯為人屈類此然意度率直內不為蹊徑遇所會意欣然忘去人亦以此樂之為説者曰方石先生嘗云天地如許大中間可喜可嘆可怪可笑事何所不有可勝道哉沈按察仲律嘗值古直詢其邑里名迹不置古直曰公不須問大扺竒怪人也其亦善自道耶周官稱四民班固表人物列九等魏晉以來中正第九品豫雅知古直然不能目其為何如人也作王古直傳唐仲言李公起陳衎唐仲言名汝詢華亭人世業儒仲言生五歲而瞽未瞽時聰頴絶倫方在乳保即能識字讀孝經成誦及瞽但默坐聽諸兄呫嗶而暗識之積久遂淹貫婚冠既畢年方盛壯益令昆弟輩取六經子史以及稗官野乘皆以耳授顛末原委默自詮次純纇瑕瑜剖别精核蓋從章句之粗以冥搜微眇心畫心通罔有遺墮矣于是遂善屬文尤工于詩海內人士踵門造謁仲言每一晉接厯久不忘與之商𣙜今古超邁諧暢繼以篇什語新韻協千言百首成之俄頃而音吐鏗然使聽者忘疲子姪門徒輩從旁抄録一字亥豕輒自覺察不可欺也間亦出遊凡中原吳楚之區山川里道亦能記憶為客述之豫嘗邂逅之于金陵見仲言貌甚寢而心極靈雖十有目者不能一當其瞽異而敬禮焉再讀其唐詩解其所掇入古文以為箋注者自習見以及祕異遡流從源搜羅略盡然必先經後史不少紊淆雖詩賦之屬所援引亦從年代次序之如某字某句秦漢並用則必博採秦人不以漢先詳贍致精有若此也所著有編蓬集姑蔑集及唐詩解共若干卷行于世然其造就未有巳也當豫晤言時為萬厯戊午仲言年四十餘矣李公起名埈鄞縣人父子靜官侍御出案遼陽卒于任公起墮地而聾雖聾岐嶷孝弟父母篤念之髮及額聞侍御公訃號慟兼晝夜咽枯而嘶凡五日水漿不入口遂啞免喪始盡取先世藏書縱讀之不足則懸金以購又不足則從他藏書家抄録積至數萬卷手自讐校雖凌寒溽暑弗倦也既聾而問難辨證之路永絶凡有疑義俱于經史中沈酣翻覆默自剖析專力致精無有罔殆詩獨喜賈浪仙築石洞祀之時念誦為賈島佛性好客郵筒走天下四方學士大夫聞其名亦樂趨之賓主倚案相通以筆有問竒者則載紙往黃虞以前天地以外粗及農桑微如佛老逮國家所有旗常典故户口邊疆叩之必應咸盡精核或既書與客又自尋繹幽竒畢呈終無遺軼轉更遐暢矣晚年尤好種植竒花異卉常滿階庭舍旁有斐園竹波軒青蘿閣諸勝咸與客遊處性既寧淡好學之外嗜欲益清反覺口耳為煩也行世有盟鷗集郢雪編永譽録研史凡若干卷大都清新俊逸兼兹二美六根具足者鮮能造其堂室矣長子名立身方在庠序亦有文學贊曰維誠與孝心通于天黜形內照神觀洞然公起純懿仲言靜專髙凌霄漢深及泉淵彼有耳目孰窺其全李一足王猷定李一足名夔未詳其家世有母及姊與弟貌甚癯方瞳微髭生平不近婦人好讀書尤精于易旁及星厯醫卜之術出嘗駕牛車車中置一匱藏所著諸書逍遙山水間所至人爭異之天啓丁卯至大梁與鄢陵韓叔夜智度友自言其父為諸生貧甚稱貸于里豪及期無以償致被歐死時一足尚幼其母銜寃十年姊適人一足亦婚母召其兄弟告之一足長號以頭搶柱大呼母急掩其口不顧奮身而出斷一梃為二與弟各持伺仇于市不得往其家又不得走郭外得之兄弟奮擊碎其首仇眇一目抉其一祭父墓前歸告其母母曰仇報禍將及乃命弟奉母他徙别去時姊夫為令于兖往從之會姊夫出姊見之驚曰聞汝擊仇仇復活今遍迹汝其逺避之為治裝贈以馬一足益恚恨乃鐫其梃曰沒稜難砍仇人頭遂走騎走青齊海上見漁舟數百泊市米一足求載以濟捨騎登舟渡海至一島名高家溝其地延袤數十里五谷鮮少居民數百户皆蛋籍風土淳朴喜文字無從得師見一足至各率其子弟往學焉其地不立孰晨令童子持一錢詣師師書一字于掌以教之則童子揖而退明日復來居數年積錢盈室辭去附舟還青州走狹邪不旬日錢盡散終不及私由遼西過三關越晉厯甘涼登華嶽入于楚扺黔桂復厯閩海吳越間各為詩文記遊二十載乃反其家仇死所坐皆赦母亦沒登其墓大哭數日不休自此以後足迹遍天下恨未入蜀會鄢陵劉觀文除夔守招之同下三峽遊白帝綿梓諸山著依劉集一卷然其弟自母喪不知所在一日欲寄弟以書屬韓氏兄弟投汴之通衢韓如其言俄一客衣白祫幅巾草履貌與一足相似近前揖曰我張太羮也兄書巳得言訖不見辛巳李自成陷中洲諸郡韓氏兄弟避亂至泗上見一足于塗短褐敝屣鬚髮皆白同至坡黎泉談笑竟日數言天下事不可為問所之曰往勞山訪元直韓笑之一足正色言曰此山一洞風雨時披髮鼓琴人時見此三國時徐庶也約詰朝復來竟不果甲申後聞一足化去先一日遍辭戚友告以逺行是日鼻垂玉筯尺許端坐而逝袖中有周易全書一部後數月濟人有在京師者見之正陽門又有見于趙州橋下持梃觀水佇立若有思者韓子智度不妄言人也述其事如此論曰從來古今相傳神仙之事往往多怪誕而一足為報父仇遂仙去然則神仙必由于忠孝哉吾獨怪其以擊仇不死悲憤竟竄身海外復極幽遐遼逺之遊夫豈專避禍亦其志之所存終不能息安也卒之既化而持梃觀水得道之後此心不忘不亦悲乎然事之濟否則天也子房博浪之恨千載而下可勝道哉明文海卷四百四
