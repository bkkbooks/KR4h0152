body:
  text: 明文海卷四百五餘姚黃宗羲編傳十九名將湯引績程敏政湯引績字公讓濠梁人其曾祖佐髙廟取天下是為東甌襄武王引績少負才好使氣貌類河朔人兩眸睜然髭奮起如戟年十五六入學為生徒日記數萬言學有舊版文千餘字引績騎馬過一目成誦應天尹下學傳籌召諸生引績獨後至當笞大呼折尹聲撼庭木尹愧憤卒笞之引績攘袂走出學門題詩府署合扉上有從今袖却經綸手且向江頭理釣絲之句遂去學出遊江湖上凡吳越間豪家富室爭延致之周文襄公轉運江南聞其名召之至曰王孫能作啓事否引績請紙筆即席具狀幾萬言類宿搆者又切當世務文襄竒之上書薦其才有文武具驛召赴京時于少保方督諸軍請試之立引績將臺下萬卒環視于公摘古今將略及諸史中事舉以問引績應對如洪鐘不能屈左右嘖嘖歎賞于公亦撫掌曰吾子誠有才入對以為錦衣衛百户正統末英廟北狩朝廷遣使通問巳命中書舍人趙榮擇可副者衆舉引績詔以千戶如北渠大帥托克托布哈問中國事云何榮未及對引績前語之又特於坐上箕踞岸幘朗誦其所著籌邉論其帥色變既出謂中國譯者曰彼髯何為哉恨不殺之耳景泰中詔舉將才胡忠安公言引績才可用進署指揮僉事時典兵者多忌引績不令治事引績亦時時歎息其功名不偶放浪詩酒間京師人率以為狂所與遊最善者侍講徐有貞教授馮益太醫劉溥英廟復位有貞入用事然亦隂嫉其材不推薦之引績亦不登其門天順中校事者甚橫李文逹公多裁之而文逹嘗召引績與語引績張口論天下事及古今成敗一坐盡傾文逹愛其才將薦之校事者遂托拾引績往年在江南受賕事下之獄怒而辱之引績詬罵不絶口至詆之為奴然引績實出息于人而不立劵無以自白遂謫為民荷校出都城故人有唁之者引績仰天笑曰吾子以指揮為足榮一湯引績耶掉首行弗顧成化初遇霈恩復官再用言者言詔以禆帥出守孤山堡孤山在延安西敵嵗入之守者多以軍敗黜引績得詔曰噫吾死矣夫孤山無城郭有他郡之來戍者七百人戰則為僨軍守則為怯敵如此雖諸葛武侯復生亦難乎免矣抵鎮草封事數千言大率謂朝廷宜先城孤山聚糧糗募死士又移書當路言狀遂憤憤吐殷血數升卧不能起丁亥敵入冦主將閉城門不出兵敵大掠子女而東引績怒髮上指曰死國分也力疾起戎服跨馬率麾下百餘人邀敵于境上力戰數十衆寡不敵遂死山下是年八月也引績為人軒豁倜儻直欲起古豪傑與之友視世之瑣瑣者以為齷齪不足與語好以氣雄人不問名位卑顯有不可意奮然去不顧或遂罵之至其人面赤不少貸甚有捶之者江隂知縣弗利于民將受代引績率少年數人直入縣廳反縛之狀其罪送上官上官大駭并收下獄凡數嵗會赦乃得釋夏郎中時正嘗于宴上與之藏鈎不勝而怒語侵引績引績就坐上捽之下拳之蹴之衆客為之股栗又嘗過友人家見道士在坐與語不合而罵之道士不知其引績也稍稍有憾色引績捶之幾死與人言出入經史子籍中縱橫闢闔隨意所如有問古名將者引績以張巡嶽飛為第一其人曰嶽將軍則聞命矣張睢陽何如人引績瞋目曰子不觀其對令狐潮之語乎卿未識人倫焉知天道自唐以下誰有為此語者其所見如此詩豪邁竒倔如風雨晦冥中電光翕焱使人不敢正視又如雷斧斷崖石下墜不測之淵觀者禠魄每就人席上操觚立成數十章有名能詩者多為其所懾或不能措一語以遁平生著述有五雲清唱風雅遺音東谷集千餘卷無子史官曰豫少與引績逰知其人使不死為大將將數萬兵出隂山其功名當不在古豪傑下顧獨膏血草莽中天也或者謂引績類太史公所謂遊俠乃大不然引績行事雖若任俠然扣其所得朱家郭解直奴才耳烏足以比引績哉明文海卷四百五
