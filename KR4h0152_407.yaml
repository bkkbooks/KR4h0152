body:
  text: 明文海卷四百七餘姚黃宗羲編傳二十一髙隱坦上翁李默坦上翁年八十餘常披褐扁舟往來太湖間湖中人不識也入城郡輒繫舟峴山隱處郡大吏造請不能得豫自浙左轄被召過湖物色遘之則前司空劉公麟也司空晚居故鄣之南坦不知者輒呼為坦上翁云翁字元瑞本安仁人先世以武功起家纍調南京廣洋衛副千户世敦德誼至翁始以經術舉應天登𢎞治丙辰進士是時外戚張氏貴幸頗驕橫骫法臺諫擊之逮治甚急翁與同年歸安陸崑抗章申救敬皇為之霽威事尋得解稍除刑部主事進員外郎以才選録畿內囚所疏雪寃痛無慮數百人老吏謝弗及轉郎中擢守紹興漢劉寵故處也在郡精核廉敏甫五十日郡聲大和會逆瑾銜翁出守不修謁猶掇郎中時瑣細廢為編氓郡人爭致贐金翁曰勤苦諸君吾治不逮前劉敢蒙一錢惠耶既去越人肖翁像為小劉祠語在大宗伯王公華記中時與湖名士吳珫施侃龍霓定交因徙居于湖山人孫太初亦以羈旅入社湖中風雅稱中興焉瑾誅起知西安遭內艱去郡其得秦人心與却賻賵無異越時服闋遷陜西參政屬關內飢寇數深入朝遣貴臣督兵將厚賦軍興諸司莫敢持異翁曰靖邉以為民也飢年加賦內難獨不可恤耶使者色沮會有赴闕陳訴者命與參政共圗其便議遂寢翁亦嚴核侵漁括逋負邉儲竟以不乏踰年擢雲南按察使謝病歸嘉靖更化起為太僕寺卿擢副都御史巡撫北畿復引疾章三四上始得請時論方髙翁才節再起為大理寺卿改刑部右侍郎尋升工部尚書水衡泉貨之府髙潔士頗避之翁咨曰吏部盡選才廉充曹任仍請築外帑刷四司之財貯之特銓主事一人與臺臣同典出納上嘉翁意賜庫名曰節慎自是財無汜出吏有亷名實自翁始凡工部上供率關內府所見徴輒淆典式不受覆核翁條上最甚者十二事得旨裁之中貴人用此切齒會上遣近璫督造龍袍于蘇松翁謂尚衣自有常供請停便上以為忤勒令解職久之猶以顯陵工薄遽奪官追前過也翁既斂德嘉遁益逺世紛里中不復知有巨公其于文能沖泊雅淡之詞發瑰瑋奇崛之氣要眇之音穠織之色皆冥與神會書法宗羲獻以還尺牘片簡人爭寶之至與人談謔往往出微辭臻妙趣雖蒙孺俚生咸樂自近云早參玄理兼逹天命嘗請浚川王公廷相預作墓銘今聰明色澤彌老不衰其天全也惟不貪生故能長信矣心慕樓居無力築作友人文內翰徴明為寫層樓圗遺之常懸置北壁下命之曰神樓賔至則陳法書名墨以為娛叩以時事即不答公卿臺僚騰章交薦翁不知也雅性清約蔬布自喜獨事繼母曳遇異母弟鳯尤篤恩禮先人田廬悉以委之其不以豐約纍志如此初翁僦居溧陽豫嘗遣門人候之翁引至卧內見四壁惟挂書數束他無長物又二十年觴豫於峴山逸老堂了無宿具臨以乳羊博市沽風雨蕭蕭欣然逹夜惟其真也默所觀古今人好名檢者或缺理略富文藻者或寡風節兼之實難若翁者彬彬文質君子也翁子二牖序克世其家所著詩文奏議凡若干卷贊曰坦上翁自為郡守至大卿數棄官以去朝廷慮不時起輒以右職徴之國家獲尊賢之名士大夫勵恬退之節天下莫不歌詠盛美蓋見索林公俊以來所希睹也晚節齟齬膏屯未施豈不惜哉默以為翁掞文似公幹治罪似士安剛分不撓似器之至于亷約省素家無貨積位列三事以功名始終此與東牟劉祖榮何以異哉世稱二劉不其然乎百花主人陳鶴主人者姓滕氏山隂人也性好植百花百花亦以人為主云主人故世家嘗以經術求仕逹時尚推移故其業亦淹落不進主人志益勵尚益髙逺而其行益不能隨人上下一日主人嘆曰世道何紛更且今昨即不相似耳然卒相似者非眼底百花誰邪于是主人始闢圃聚花得名花數百種遂陳列次第為王為魁者羅之中庭妖而奴者列焉因蔓以為屏聚卉以為砌髙而實者為林短而羣者為籬品繁而色異蝶欣而鳥疑四時一春香艷不斷主人暇則帶書坐花下琅然髙誦四顧落落惟百花與主人傾心相笑若默解主人意者時或雨霽或月出天上客必携酒扣主人門問百花孰為先開否主人亦指點一一客一一皆滴酒稱賞相樂抵醉不復知主賔為誰也主人常具席邀詞友蕭柱山朱東武陳海樵楊祕圗栁少明徐天池六子過看花時秋暮菊綻黃紫纍纍主人乃携樽集籬傍少明子舉杯謂主人曰天道當蓐收造物何復相泄而華衫畢見豈若是富哉主人曰非也我種花因得夫造物之理矣凡物生稟氣氣淺者而用先之故感于春者皆燦然而興霎然而􅐘耳惟吾菊得其厚者焉乃能含元抱貞歷寂待時有若嬰處胚內混蒙而無覺也一值其候始蠢焉具萌各出夫造化之所授羣聚林立嚴霜不能變其芳寒飈無以挫其質有若吾類後時進榮功施而節崇又如善與之士合久而義者是菊之積于始而顯于終也豈子所謂違天道而泄造物邪祕圗諸君皆欣然進曰主人論菊而闡造物之玄因玄喻道而得成人之義然則主人之愛花蓋混其形而俱化者夫豈托物而逃焉已哉主人聞其言拍掌而笑諸君亦就醉别去明日各為文記主人天池有菊花牡丹諸賦少明有生香不斷序柱山東武有詩歌吳長洲文太史邑大夫劉司馬汪諫議聞而皆寄詩嘉其事海樵子既為歌而復作其傳曰余嘗觀世之人矣一凡性有所之則好惡不得以並用也樂其玄者妬其素尚其黃者遺其朱天下皆是也而豈若所謂百花主人哉顧世不恆遂斂迹甘淡逍遙百花之中同風一臭萬象而皆春不以黃紫易其視不以盛衰二其心逹四時之化與造物相周遊順時候委枯榮樂天真而不疑吁若主人者亦足貴矣吾知風垂後世賢逹繼作其必有敘述百花主人之事者焉玉峰子王漸逵玉笥山在大江之西新淦之東其北漫為閣皂又其北之北為麻姑皆道書所謂洞天福地者也諸山惟玉笥最髙最竒勝實為仙靈之奧神明之區也世傳黃帝采玉于此山遂以名其下有八竅南竅惟羅浮勾漏其東竅惟武夷金華諸山西之北曰廬阜曰大小酉北之西曰太白青城八竅各為一宫鎮于四維惟玉笥居中其上多白璧其下多琪草玉芝靈鳥異獸其陽多丹藥其隂多神瀵道人玉峰子居之玉峰子貌癯而神朗外若朴野多遊於羅浮羅浮道士咸不識之久之又遊于燕京燕京之人復不識之後賣藥于穗城市上兒童見之皆狂笑愚弄之玉峰子不為改焉嘗過於廣之大夫士家大夫士疑其有道相與間而求焉玉峰子終不言嘗嘆而笑曰世所謂海上三神山亦大謬也洞天福地皆在人間金丹大藥俱集吾室舍常以求異背耳目而探幽杳世之方士誤之也茍泊而求之冥而遡之虛其心實其腹不入煩惱離諸苦毒自清自靜萬物自正何慮何思神明自期夫無事即仙也城市皆隱也故物物不物于物神神不汩其神是之謂真人時聞者亦不知異然而喜而狎之其所賣藥市之者往往竒效好集古物人玩而持去亦不吝或邀之遊即隨至旬日不倦未嘗以事辭故人亦重之愛之玉峯子姓程名堯卿字良佐玉峯其號也青蘿王先生曰豫見玉峰子于穗城觀其言語冠服飲食悉如常人未始異也獨好焚香兀坐室內汛掃必淨嘗與登青蘿頂夜半盤膝石上仰天大笑若有會于懷者問之弗應可謂竒矣然其闢諸方士謂蓬閬三山皆世所謬傳其歸要于絶欲去妄復其虛靜為仙道之本殆與廣成老聃之言合為世開一大障誠有道之士也然混于市㕓人未之覺所知者獨其迹焉聃氏所謂被褐懷玉者其謂是歟其謂是歟漢逸民周祚前漢書無逸民傳後漢書則載向長逄萌周黨王霸嚴光井丹梁鴻髙鳯韓康法真龎公沒其名則有野王二老漢濵老父陳留老父諸逸民皆出後漢書考其人實多前漢所遺前漢立國二百一十餘年培植生養風氣民俗猶足復三代不散之淳故其時率多髙士非如遭秦虐焰士類化為豺狼少有智識莫不奮庸走佐髙祖其不屈僅見四皓二生要其出先秦之上而非秦之可抱持者也漢遭新莽奪國不甘之心難辱之節一何多耶出而少仕往往有梅福龔勝薛方髙蹈逺走視新莽之爵祿真若狗豕之餘食唾棄不顧雖至於死而不悔不可得仕而深山窮谷之中大海長江之濵又有周黨嚴光之諸賢亡其名者又有野王漢濵陳留之諸父吾於是而推當時不可得見并亡其辭又豈無有如野王諸父而止於三人其名迹不能上達於天子下顯於郡邑又豈無有如周黨嚴光之儔而止於諸賢下可同於諸父又焉能知其必無哉夫士甘於隱逸其傳不傳固不足為士惜也然思西漢祖宗培養之厚方欲遺子孫以見其得士之效其為子孫乃不能用而反棄之如隨珠卞玉委置沙泥荆棘之間而人不知誠可惜也嘗觀氣之為也其始也未嘗不暢及其次則平其後也未嘗不鬱及其甚則激故漢之養士其惠文之時則暢武宣之時則平逮其哀平之時則鬱至於後而范滂李膺諸人則鬱久而激是亦勢使之而誠氣為之也當周遷之時王政不立然而文武之禮樂政教猶有沾濡浸漬之潤故孔子有曰逸民伯夷叔齊虞仲夷逸朱張栁下惠少連猶有丈人接輿晨門耦耕猶有荷蕢傾蓋當時逃遁不復孔子有不可得見者抑必復多其人而不止於是也降自戰國乃始縱而激蕩而髙甘殺赴死真若得聖人成人之旨若激湍走海圓石下峻欲障之有不可得其亦氣使之固然也書曰嘉言罔攸伏野無遺賢詩曰衡門固非士所甘也上無堯舜之君則寧肥遁考槃不以有盡之身而試無益之死此天下不可無賢士而可無逸民不可無逸民而可無義士多義士則必戰國之末東漢之衰世益有不可為矣故為范滂李膺猶不若嚴光周黨然其氣之必致於是者蓋有人力不可以回也孔子之道相傳於子夏子夏後流而為莊周源逺本喪道衰弊生固其然也豫深有感於漢之逸民焉三逸士邵圭潔粵逸有三焉一曰雋逸言乎才也二曰豪逸言乎情也三曰遺逸言乎遇也余所論三逸士者蓋人兼是三者焉言才則可憐言情則可思言遇則可憫余所親知不少而兹三士者真逸儔也齷齪猥瑣充斥行路而三士者乃皆露晞栁凋不可作矣傷哉乃述其略為之傳吳子諱某字致之名臣文恪公曽孫父某官至大理少卿抗疏諫毅皇南巡貶滇中有忠直聲致之其季子也致之少從宧遊每所經處輒紀覽其山川形勝自束髮即厭呫嗶讀古人詩刻意吟詠復臨摹晉唐書法紙筆山積日揮灑千葉不如意者火之自是所作詩篇書法清邁遒徑多可傳者出則􅖯衣駿馬詩囊酒榼不離左右人爭慕之匪謂其貴公子也一日少卿翁遊於西郊别墅方會客飲有仇家者集家衆聚薪環其廬將加火焉翁覺之莫禁也一僕從竇潛出還報時致之兩兄皆遊學京師致之獨號呼入縣治攜一尉䇿兩馬倩徒百餘人疾往解之執其仇之為魁者以歸撲殺之竟構成獄致之坐是以死死且曰吾為報父仇至此無悔也王某字于成祖某仕為工部主事父某考城令于成少失母多病父憐其弱即輸資入太學父亦早背家故稱雄漸以稅役就落于成悉力以支諸異母弟俱孤幼訓之若子父殁後治其室廬墳墓益加整闢園亭植名花卉蓄鼎屏清玩入其燕室觸手可愛賔至轍留連旬日不忍釋所出茗饌悉精絶園有古梅草株枝極扶疏花時爛如瑶林月暗之夕懸燈如星集所知愛歡賞達旦家且依山遇佳辰未嘗不擕客遊遊則舞裙歌扇班草盤石性少飲然飲必沾醉醉後有吟亦清峻可誦家人以多纍墮門戶勸之仕乃不得已授興國州判官未行卒年四十有一顧某字汝隆邑之宛山人界於無錫又為無錫人顧在錫稱巨室汝隆祖某父某復再振資甲于里中汝隆少有異質臨文揮翰清敏絶俗性倜儻豪邁不憚費情或有所種義或有所激即揮千金無難色與人處開襟期傾動無曲腸遇當意即濁醪粗糲歡笑絶倒不當意雖羅珍列鼎亦褰裳弗顧家御過侈聲伎常左右供設惟其所擇念父逺宧建保親塔於宛山之顛費以千計闢怡老園待父之歸中列名卉竒石回廊復閣飛甍刻棟費以千計所蓄法書名畫牙籖錦囊庋置几列費亦以千計談議風生土苴富貴漬技方友延納無倦性喜飲興至輒盡一斗醉則浩歌長嘯或頽然藉草而卧達旦客散則綺羅金玉狼籍不問也後抱心疾揮霍不如意輒裹足謝客自托於酒竟以是病痿卒邵子曰逸非中行之謂也乃君子亦有取焉宣尼之思狂士莊周之貴達生夫是類也程山人四谷山人侯一麟侯子曰自昔通人介士曷嘗不並列天壤乎今時俗尚通而畸人則靡述者何也以貴耶則裋褐有常貴以安耶則章甫多後責彼楩楠中規矩樗櫟棄繩墨中也者貴也棄也者賤也卒之所貴有不受虔斫者乎而賤者以全且君子得時則大行不得則龍蛇榱棟而不異廣莫嵁巖而不異廟堂則奚貴奚賤哉以余所覩程山人則隱而見身賤而道貴者也有以自列於後世豈與彼枯稿寂寞者同乎哉傳曰山人程氏歙人也世家臨河之上名誥字自邑幼負竒氣不肯為諸生曰今仕道如吾身焉用是百骸臣妾我也去讀書慨然曰適吾適足矣且吾寧能萬斛之舟而浮於江湖乎不能也然則併木之泭以遊乎溪渚之間真吾所宜於是人從而稱之泭溪泭溪云山人既自詭以為昔賢逺遊肆力其文常寓諸山川於是泛錢塘道吳門淮南以厯宋魯之都却棹荆郢泝沅湘經粵與閩以歸卧山中久之又起適汴西抵秦晉登太華賦詩出大梁持謁空同李先生一見語合先生曰子之詩異時以散置名家不别矣自是海內士爭序論山人詩而山人亦益從橫作者之場矣又二年遊武當出漢襄漢襄棗陽王賢下士山人奉書踵門曰江左布衣竊聞大王之髙誼善文章且夫南面稱孤而不挾貴以卑天下之士天下士莫不願摳衣秉篲大王之門者其服膺久矣嘗以為男子生而弧矢志四方故每聞竒山水輒不逺萬里而命駕天下九州涉厯其七所在瑰竒文儒之彥畢造討究指歸况兹際風雲之會乎伏謁待罪殿下昔梁孝之於鄒枚陳思之有儀粲單詠瑣語猶足耀當時駭後世大王盛德越梁陳逺甚儻不以長揖拒某或其人也王即延山人入禮之上客明年山人遊蜀蜀士皆禮敬山人有飛霞子韓懋者瀘竒士也致書山人甚恭山人答其書千言略曰某放浪不羈人也從遊名山今二十稔自惟小局於管窺大拙乎瓠用計乃在選長林卧大壑撰一家言以托不朽使隱𣆀窮卿不專美於前乃區區素抱也蜀中由是益竒貴之山人家故饒遊既久則盡糜其囊金資落而窶也意度自若與所善鄭玄撫十五人結社於天都詠愈豪天都者黃山最髙峯也常有霞縈焉則又稱霞城山人居十六年而安平故人朱君曰藩投書願割田資山人使耕射陽墟中山人嘆曰吾計息肩是矣乃復當就食射陽之墟乎然山人髙朱君為一往至則延之涇上之園居九月會淮漲田半湛溺慨然曰曩吾志固不在是因謝決去依黃山云山人性方直與人語必達其志然頗擇交寡耦非深知山人山人不為之盡詩集若干卷傳於世論曰觀山人自遜於舟楫而汜泭嘗曰我猶有瓠之慮也其拙於用大明矣及讀其賦又何感憤之深也與語上下古今泓博流宕固瞷於世故將非知其大而守其小知其巧而守其拙者耶余家海上習見漁者逺浮至不虞即欲膠其舟而不得乃知山人非乏濟勝才也而夷猶於卜居者意念深矣逸老侯一麟夫古之逸民謝帝臣而樂野處去富厚而甘賤貧者可不謂性哉余緬想其人未嘗不咨嗟之也乃今日而觀周先生行年七十餘家貧不為茍得賣藥都城之市口不二價雅善鼓琴知琴者咸以絶倫坐者視先生未嘗鼓而音出手間蓋忘其為琴者也海內士大夫巨公翕然歸之或造閭或屈先生至其邸舍頽然也當武皇帝之南巡先生時甫弱冠一日詔善鼓琴者中貴人舉先生至帝前從容拂絃跪奏曰臣願上禹會塗山曲夫禹後堯舜而王萬國執玉帛會塗山無非事者先生亦欲因此悟帝意帝聽其音亦喜且令待詔從至北都縉紳士大夫知之多欲引薦者先生力請乃放還嗟乎以蓬戶編氓未嘗見天子一旦望清光七校之前而能不震懾而又發揚其音以動帝意既合夫人亦孰不欲乘時邀富貴然卒辭而返此與古逸民何異哉或曰先生之返以思母也其平居常痛父不逮幸而逮母而又不幸貧獨恃所入藥錢以供蔬菽必夫婦親之時一擊鮮而恨不常有也朋友徴召遇甘旨即惕然念母終不敢嘗主人怪問之亦竟不言也必為母具厚味乃往母後聞恚曰兒何乃專口腹養我耶晨夕必盡敬每旦焚香祝天畢既拜其母乃出返而回遊有方如是者三十餘年母壽八十八乃終循行如一日云侯子曰夫逸民髙蹈豈必一迹哉菽水而腴於鼎食斑斑之衣而不以金紫易蟬蛻乎囂埃鴻飛乎冥𡨕賢矣夫賢矣夫膠東二髙士周思兼周子守膠東之明年以政暇遊覽諸峯觀大澤之雲酌潄玉之泉登雲臺之麓挹聖母之水喟然而嘆曰美哉此古膠東之國也山川靈秀之氣萃於此矣意者其必有竒傑雋偉髙出世俗之士生於其間乎吾願得而師事焉王生懷祖崔生廷楓對曰膠東僻處一隅無有也不然其張公鉞乎然張公貴矣不然其梁生萬斛乎斯人者庶乎其公之所謂髙士耶周子曰張公之髙奈何王生崔生對曰張公昔嘗為清苑令大有亷名監司器重而旌異之因戒之曰爾信亷然能保其終乎夫汲水於盎其始非不澄且徹也久之鮮有不腐者爾信亷矣盍思保其終乎張公抗聲曰水可腐鉞不可腐也監司為之大慙公性剛愎與物多忤有請托者非特勿聽且加罪焉人以是多怨公七年入考績或奪公之輿訴于銓部發公輿得豆石餘他物無有也銓部曰嗟乎張令賢若是耶此固吾之所願見彼訴者奚為者耶由是罪訴者而愈益賢公遂入補郎署尋出守常德厯官三十年家無餘資周子又問梁生之髙王生崔生對曰梁生初遊庠校每試常為多士之冠膠東守劉公重其才聘為子弟師供之酒食梁生弗食饋之禮梁生不受劉公怪且異之而弗能強也無何丁母憂哀毁甚得疾久不瘥家益貧棄舉子業業鬻蔬有憫梁生之貧而多與之值者梁生輒怒罵不受或誤多與之梁生曰爾與我直多吾不受也吾還汝有熟識梁生者或遇梁生於途其人貧賤人也梁生立與語少頃去其人富貴人也梁生輒避弗見或時鬻書則題其上曰是書值若干如其數與之則梁生受之或多與之梁生輒怒曰吾鬻書人也非梁生也爾多與我是凂梁生也梁生不可受也急還之久之人皆知為梁生梁生入市攜其蔬謂人曰是值若干人輒與若干知其不二也梁生之圃不為藩人亦弗盜有憐梁生而為之治圃者梁生輒與之直或不受則梁生怒曰爾更無治我圃由是鄉人之父老與郡之大夫士咸思所以厚梁生而莫敢致也是梁生之行也周子曰斯人也是吾之師也夫夫陳仲子郝子亷吾始以為戰國人也秦漢人也今之人無有也乃今復有斯人耶使天下皆得斯人者為之也天下其有弗治耶吾幸待罪於膠東也而又聞斯人之風焉吾於張公師亷焉於梁生師介焉膠東其有弗治耶斯人也是吾之師也夫然則梁生安在王生崔生對曰梁生之居去郡四十里其土下其地僻車馬弗至也夫子必欲造之則弗使知之知之彼必避不見也周子從之辟儀衛造梁生之廬梁生聞之先期遁去周子曰嗟異哉此何人耶其所謂泄栁歟假干木歟其有所慕歟嗟異哉此何人耶吾不圖膠東之僻而有斯人也吾待罪於膠東而獲遇斯人焉兹又幸也雖然使斯人生於秦漢時則必與泄栁假干木諸賢並稱使斯人而生於通都大邑則必名顯天下使斯人生於膠東也而膠東得賢守則亦能揚斯人之名惜乎膠東之僻而生斯人也而守又余也斯人雖賢其孰知之於是周子仰而嘆王生崔生皆嘆周子因題其壁曰靖修髙士命王生書之歸而作膠東二髙士傳明文海卷四百七
