body:
  text: 明文海卷四百八餘姚黃宗羲編傳二十二氣節吳思齊宋濂吳思齊字子善處之麗水人祖深有竒才永康陳亮以子妻之遂來家永康父邃武學博士官至朝散郎知廣德軍思齊少穎悟倣邃為古文即可誦季父國子監丞天澤器之悉授以所學遂用辭章家知名尋由任子入官監臨安府新城稅鎖廳試漕司中舉上禮部不利後從常調為嘉興縣丞會令以言去攝縣事縣獄多留繫思齊坐獄户讞問凡株連疑罪悉簡出之死刑多平反事有檢覆得實郡首吏持之上下承望不敢動亟聞部使者黜之郡有盜殺其黨于貨獄蔓延不決下思齊議思齊曰盜攘盜貨與民科殊獄久不斷者由吏教囚以贓纍民爾若正其殺人罪置寄贓不問則得矣慮囚者如其言民有育人之子者恆出入父母家一旦忽不知所往其父訟求之思齊召父母至庭一訊而情無隱卒白其事提點刑獄洪起畏辟思齊類曰吏或謂通籍可立致思齊曰斂怨以干祿非䇿之上也辭尋監户部犒賞酒庫起畏時守鎮江復檄入幕府起畏議築城思齊諌曰京口以長江為天塹城之何為即城徒厲民耳其役遂輟賈似道喪母上將以太常鹵簿臨其喪禮部侍郎文及翁欲上疏言懼禍且中止思齊曰叱嗟而母婢也公不可默也未幾遷饒州節制司準備差遣監察御史俞浙以論謝堂為太府少卿留夢炎當國言堂有勳籍浙劾之過思齊曰公宅百揆畏勢家而屈臺論天下其謂何似道丞相堂貴戚力能生殺人思齊以小官中其諱惡不虞宣泄人為危之而思齊弗顧也俄不願仕請監南嶽廟流寓桐廬婦翁方登嘗知饒州以思齊賢每謀以自近思齊不樂依婦勢避去性好施與兄弟孤女無歸者嫁之比鄰娩女欲殺者食之死無以斂手足者棺之宦遊十年田無半畝之增後值宋改物家益艱虞至無儋石之儲有勸之仕者輒謝曰譬猶處子業已嫁矣雖凍餓者不能更二夫也中遇寒疾耳失聼交遊苦其聾語未畢馳去獨婺方鳯粵謝翺陸方夀劇談每至夜指畫手書傍觀咄咄而略無倦意先墓在麗水不能數歸省嵗時必遙望隕涕因自號全歸誓不失身以病父母也思齊天性直慤雖行人所難坦然不見崖異心知有是非不知有毁譽禍福學者尊其行爭師之方鳯評思齊之為人如徐積陳師道君子不以為過大德辛丑年六十四手編聖賢順正考終之事曰俟命録録成賦詩别諸友遂卒臨卒神明湛然無怛化意所著書有左氏傳闕疑擬周公瑾平荊州碑魏司馬孚贊跋杜詩集陳亮葉適二家文選又倣真德秀文章正宗輯宋一代詩文卷帙多未就子三人翼之拱之成之拱之蚤卒贊曰濂遊浦陽仙華山問思齊舊遊處見其石壁題名尚隱隱可辨故老云思齊與方鳯謝翺無月不遊遊輒連日夜或酒酣氣鬱時每扶携望天末慟哭至失聲而後返夫以氣節不羣之士相遇于殘山剩水間奈之何而弗悲若思齊者其知事君不以亡存二其心者歟士有哀思齊者云睨碣石其如卷兮巨海簸而不移其言信矣哉方鳯宋濂方鳯一名景山字韶父其先出唐元英處士干干曾孫傳字輔卿始自睦來遷浦陽仙華山傳生招招生文遇文遇生資字逢源中嘉祐八年進士第歷官知真州未上卒贈金紫光祿大夫資生揚逺字遐舉疏雋慷慨以文章震耀一時亦中元祐三年進士第以吏部侍郎出為河北轉運使有能名上屢降詔寵諭之歿贈大中大夫揚逺至鳯凡七世鳯有異材常出逰杭都盡交海內知名士將作監丞方洪竒其文以族子任試國子監舉上禮部不中第主閣門舍人王斌家教其二子大小登斌與丞相陳宜中為親晜弟鳯因得見宜中三以策告宜中雖不能聽將奏補為初品官既而宜中走海南事遂寢後以特恩授容州文學未幾宋亡鳯自是無仕志益肆為汗漫逰北出金陵京口南過東甌海上類皆悼天塹不守翠華無從顧盻徘徊老泪如霰一日復遊杭有人自海上來見鳯伏地泣起相抱持鳯問故則曰豫大登也自從陳丞相乞師南海不得還遂為暹國臣暹蓋古者文單盤越屬國泛大海至泉南始逹岸今為其奉使上國重過丞相故府無一人一馬可識不意復得見先生也言訖乂泣鳯亦泣因欲與俱行人勸止之鳯善詩通毛鄭二家言晚遂一發于咏歌音調凄涼深于古今之感臨殁猶屬其子樗題其旌曰容州示不忘也宋季文弊鳯頗厭之嘗謂學者曰文章必真實中正方可傳他則腐爛漶漫當與東華塵土俱盡巳而言果驗性不喜佛老讀唐傅奕傳壯其為人自托奕後闢異教者數十事以擬髙識篇題之曰正人心書尚未完他所著詩三千餘篇曰存雅堂稿樗字夀父亦精于詩無愧于鳯云贊曰世言杜甫一飯不忘君今考其詩信然鳯雖至老但語及勝國事必仰視霄漢凄然泣下故其詩亦危苦悲傷其殆有得于甫者非耶鳯常與閩人謝翺括人吳思齊為友思齊則陳亮外曾孫翺則文天祥客也皆工于詩皆客浦陽浦陽之詩為之一變思齊以父任入官為嘉興丞宋亡麻衣繩履退隱深山中翺雖布衣尤忠憤鬱鬱或被髮佯狂行嘯于野或登釣臺慟哭以酹天祥酹巳復作楚歌以招其魂皆可謂氣節不羣之士而獨與鳯善豈易所謂同聲相應者耶于介翕凌翰于石字介翁生于宋宋亡乃髙尚其事鄭柏賢逹傳載其從王定菴遊接聞諸老緒論學有根據世變來遂一意于詩則其人可知也世逺人遙無從考據故世之尚論者或缺焉雖然不仕元一節非其據乎以先生取富貴掌上耳乃甘心肥遁托吟咏于寂寞之濵可不謂賢乎粵宋南渡中原文獻悉趨于浙故金華有小鄒魯之名不獨道學云爾如月泉吟杜一唱百和盡集兩浙之賢皆故宋遺材也斯人者流名節礪其志忠義激其𠂻視元人不啻仇讐而敝屣其爵祿故養髙林谷以待天下之清也時移事變不幸沈淪多矣其傳流固自有在耳奉議大夫南京大理寺寺丞仁齋趙公吳中行夫世之愛憎豫奪至難必者人也而福善禍淫施報之常所可恃者惟天耳至于天且不足憑而紛綸糾錯莫之窮詰宜禍者富貴夀考宜福者并其年而嗇之此其權衡或自有與世隆汚不可圖度者若天之報施趙大夫何如哉作趙大夫傳大夫諱應元字文宗别號仁齋陜西涇陽人也性亢直不善脂韋蚤嵗以明經舉進士筮仕令蜀之華陽再令洛之郟著績繫思二邑百姓至以天呼而尸祝之徴入為浙江道御史按遼陽無何以憂歸起改河南道按湖廣湖廣柄國者恬寵擅權勢焰熏灼望頥承旨者如雀之叢蟻之羶也公一切裁以法無所假借持斧行部縣有令一人貪肆不檢法當罷以善事柄國者為奧援莫敢誰何公首論之去柄國者巳銜之矣會柄國者戀位蔑倫杖戍諸上疏者舉國洶洶越明年暫假歸所過州縣無不髙厰清道望塵負弩矢以迎即中丞侍御藩臬長有脅肩夾轂而趨者無論逺近咸枉道旁午會葬悉如期無敢後先公是時竣事還朝遇諸塗柄國者私語曰先人事當借重公公正色應之曰御史以復命行無回車返境之體輒謝之去柄國者益銜之矣公行次汝南埋其輪引疾乞休疏云臣既不能秉公持正扶國柄于倒置之日又不能黜姦嫉邪報聖明于多事之秋意蓋有所指也臺長某希柄國者指劾公有所托而規避竟削秩歸里公固欣欣安之居數年杜門課子而巳柄國者敗諸附柄國者以次罷詔起言事及被抑諸臣復公官河南道而豫亦蒙恩賜環始與公識及一再與公語踈節徑顔絶無昵色縟禮至于議政務辨官材則娓娓不休而抗直之性不以既困少貶也且謂千載一時思所報稱即有抵牾不復顧忌會諸附柄國者驟失所憑依朝攻暮刺蔓引株連人心皇皇而國體傷矣公疏請以大計付之內察聽之公論去留定則紛紜可息當事者不諒公謂公欲借此復睚眥逞胸臆疏上格不行而其為比附藪者更深銜之矣公先在臺中積資著望久既從田間起謂當以不次待公而公復以抗直不善脂韋故回翔偃蹇始得升大理寺寺丞又南京也命甫下而公竟以寒疾卒時傅公應禎以名御史忤柄國者從戍所起久之晉秩如公官居無何亦卒與公事略同嗚呼豈非天哉豈非天哉豫獨慨夫世之人博歡干澤至舍巳以徇人曰人顯榮我也不然一失路輒尤人曰人擠抑我也而柄國者又且以勢能齮齕權足升沈貪天功以為巳力曰某我所用也某我所舍也凡此皆暗于天人之故者也以豫所論著趙大夫事自通籍就列二十餘年其抗直不善脂韋蓋其性然也一不合則罷斥而不用再不合則淹滯而不得大用彼柄國者之所為頓挫趙大夫者獨官耳若其時不與我天不假年命甫下而身逝此亦豈人力也者而乂何所尤乎夫藎臣正士以身殉社稷社稷茍利身不皇恤亦求仁得仁存順沒寧耳視富貴夀考真不足以當一瞬然其身之進退存亡有關運數可卜隆汚故帝賚則嘉靖殷邦夭夀則保乂王室蓋佑助忠賢即其佑社稷豈不尤大彰明哉趙大夫之可以用而不用既用矣而復不用人也天之未定者也無足怪也即不用亦可以不死乃竟死非人也天也天之宜定而不定者也烏可測也嗚呼柄國者獨能以爵祿豫人奪人榮人辱人而亦豈能必天之生死人若曲徇其意而巧合之也此可以破尤人者之惑矣雖然天亦何嘗不定哉趙大夫遇合甚竒而以坎壈終然垂聞不朽取數既宏豫不肖再起再廢為世所指斥所欠者死耳公幸蓋棺豫方銷骨乂安知夫死者非天之完其名而貽以安也乃其子慷慨慕義文采足自表見不逺數千里而長跪授簡屬豫傳大夫事此其意嚮固非隨世趨者有父風矣趙氏之裔其昌乎語云天之報施不于其身必于其子孫豫姑論其未定者以俟其巳定者而巳矣明文海卷四百八
