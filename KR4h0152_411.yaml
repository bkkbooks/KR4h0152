body:
  text: 明文海巻四百十一餘姚黄宗羲編傳二十五孝子孫孝子宋濂孫孝子諱惟中字伯庸濰州昌邑人祖明父琳世為農孝子朝出耕夜歸讀古人書性雅愛宋名臣言行歴歴能道之凡所謀猷恒取以為則年及壯用推擇為寧海州吏一年貢益都府瀕行㑹父卒皇皇如欲無生縣有漢昌邑王廢城舉柩塟城中結庵廬其側藉苫以居曠野無人深夜月冷哭聲依稀随悲風逺聞人為泣下日啜淖糜二盂却酒肉弗御晨起無火掬雪頮面輒詣墓前拜久之手足皸瘃形容憔瘁甚或勸其還哭而不對閭師韓泰亨帥闔巷民言於縣縣君戴友諒弗之信將㢘之伺夜半攜二蒼頭出風雪中抵庵廬而聽孝子聞足音遙問曰暮夜欲何為戴嘆息而去以為不讓古人亟上之府部使者加覆察如縣言請旌其門文達中書禮部不報孝子長身美髯善談古今事遇子弟若嚴師家法著于井落多効之娶劉氏從孝子之化居舅喪亦不近酒肉三載生三子尚志尚文尚徳尚志業為儒今禮部主客主事云史官曰李璮據益都明被兵掠至洪溝去家三十里年始十嵗兵以其童也易之明夜遁倀倀亂行有老父教之曰兒但從吾指以徃即至家矣明如其言走固隄鹽塲中草深滅頂而豺狼左右嘷明竟得還父母亦避兵方歸舉燈索明不得相向哭燈忽作花復自相慰曰我兒其返乎不然此花何徴也言未訖忽聞叩門聲啟視之明也亟挽以入初父止生明今明之子孫逾四十人而惟中又孝行卓卓如此天之不絶孫氏者其有以哉其有以哉石孝子戴良石孝子者四明山農夫也家世貧賤老屋數楹隱隱叢薄中孝子早喪父獨與其母居一日以事出則告母曰兒出母居此無侍養者幸往依女氏待兒之歸也母曰諾其女氏家去母甚邇孝子謂母可即至竟行後二日歸首過母所寓而母未嘗至也孝子即心驚倉皇扺舎忽見壁間一巨竇覘之則虎子三據其榻處為穴孝子知母已為其所害即慟且盡殺虎子復磨一斧堅執立竇内頃之母虎循竇入即斫其首碎之取肝腦磔諸庭而復大慟以斧指天曰吾雖殺四虎而我母之仇未足以報也乃更跡牡虎所行路持斧阻崖石待之牡虎果咆哮過崖下孝子奮而前當虎首連斫數斧即斃虎雖斃孝子亦隨死僵立不仆張兩目如生而手所持斧獰不可奪鄉鄰走弔咸凛凛欲亡去獨常捕虎者相率拜祭而神之蓋余至越聞諸宋先生元僖云論曰父母之讐不與共戴天是以齊襄仇紀而有紀侯之去國魯莊仇齊而有乾時之戰敗蓋寢戈枕甲仇在必復而已其可逆計强弱蓄情抑志以悔其生哉竊痛宋氏南遷二帝客死金國稱兵以復仇誠不可朝夕緩也而顧有阻於奸議卒使終天之恨竟莫一伸是果何為哉當時議者孰不以宋弱金强為説以孝子觀之宋雖弱豈下于一夫金雖强詎勝于五虎孝子能行之而宋之君臣反有所不能設使孝子之事見之于彼日主國議者亦可少愧哉嗚呼若孝子者皜皜焉烈烈焉雖與岳將軍輩比肩可也丁孝子鄔斯道丁孝子名鶴年字鶴年西域人也性狷介窮經博史尤工於詩自祖入中夏世為顯官父職馬祿丁公官武昌縣最長有善政殁而就塟武昌後兵亂鶴年倉卒奉母夫人走南徐世父家生母馮氏先匿邑之東邨東邨首難竟阻絶莫之知也餘十載母夫人殁鶴年又避地明之定海聞父墓嘗為盜發掘生母又病死塟洪道鄉日夕憂悸且却絶酒肉鹽酪示自貶又二十載道日通即告牒還武昌至則别竁地樊山窆父棺卜日襄事日已迫而淋雨十日不止鶴年先一日拜雨中願翌日雨止半日終事竢至質明密雲雖四塞雨則强不㴻也及發引視窆而反雨傾㵼如故已而訪生母塟地邨聚中邨聚自兵後草莽極目父老皆淪喪間有存者又轉徙他地故母之塟地漫不省何所自秋至冬徧詢之終莫有知者鶴年無以措意惟作母主蚤暮拜母主前求五旬浹有報拜至七日夜夢母氏出高堂中鶴年遽牽母衣慟哭以慟即寤晨起鄰老楊重者至云吾昨夜夢子之母氏堂宇間自内出以酒肉見賜與三人同食飲内一人不御也鶴年以夢母氏與鄰老同所夢堂宇皆在舊業之西又同夢之日又同斯是塟地朕兆試與耒荒土物色之因具畚臿皆徃徘徊顧視見平陸土有陷下者鶴年意謂吾聞母塟時無棺椁下輳土磚上覆敗舟板人與板肉盡乃爾茲殆可起而觀歟遂陳肉酒以祭祭畢斸其土骨果見板僅有松節土磚亦具良在是矣然恐他墓偶有同者復嚙指血骨上試之良久收去血骨通變茜色可驗母一齒當正中如漆視之亦驗時四人同往享祭餘鶴年未嘗入口正與鄰老夢無少異乃收骨棺斂塟是鄉慈母王氏墓在寒溪塘併加封樹鶴年就廬于父墓将終其身論曰子盡孝於父母固當至感夫幽冥渉至難而不變者非孝誠之至不能也予考史册方多古而少今孰謂鶴年屹然處乎頑薄之中為古今之所獨也彼幽冥者且足以感之顧不能感諸人歟東溪廖孝子解縉張鍠伏質報父仇曹娥没水求父屍不幸而死吉栩代父受刑黔婁為親請命幸而不死然皆自分必死矣幸不幸有命焉人尚憐而著之王子安省父南交溺于海廖自公省父大寧溺于河死命也而心不展志不伸不其重可憐也嗚呼静姝固樂於奔馳閨闈固樂于行旅人不知命也有定焉當死也居亦死行亦死自公雖未嘗必其死然曷嘗計其死且而死於省其親也豈若死於兒女子之手者乎於是王子安死千年而自公繼之自公幼能文章跟經躪史淵涓耿節恂恪恭敬儼然貌不逾中人而所當為奮發如電不可測其父敬先謫大寧四五千里水陸竒險自公嵗往省不以寒暑需家有大父有母有叔有弟姪有妻子家人衆多當離别忍淚眥睫間强顔笑語慰帖老稚出門及童奴客旅相處曲折良難敬先粹然有徳君子也莫能動其愠喜自公見輒喜慰甚自公平生愛人一家人愛之自公幼孑孑然孤立人見者皆為變色自公死時洪武某年某月某日也其弟自勤祭以文綢繆纒綿痛苦情切甚讀之使人墮淚初廖氏嘗大顯於吉吉稱東谿廖氏有名自公大父退省先生卓行舉世不可測與予叔父刑部公原禄相謂親家敬先兄弟三人皆賢亦皆仕有名聲其季敬已尤髙潔不諧世特與予善自公兄弟四人皆善予嘗嵗時過従見其一座三世人跪起列侍森森郁郁或舉觴論文川華月映顧盻如在圖畫中識者多云是家不偶然必將昌大未幾敬已歿敬先謫去自公死倐爍間慘然悽斷若此何也贊曰玉也不必以圭璧驥也不必以羈的中道而折衆所奭嗚呼斯人而斯溺擔骸姚䕫元失其鹿天下分裂兵爭不休杭浙之地據於張氏桐廬在浙上遊密邇于杭獨當其衝邑隘濱江水陸交值無城郭溝池之固無甲兵備禦之具冦盜旁午絡繹上下縦肆剽掠民無聊賴逃匿山澤父母妻子骨肉長幼各自為生邑居數百家一旦燬為瓦礫烏乎是何可言也時邑人姚伯華甫身長秀拔生二十餘年未娶事父母極孝晨昏定省未嘗去左右父母年俱六十餘家頗温厚值時艱難度不能存躬奉二親去匿閬原山中各挾貲費以行倉皇為羣盜所迫投叢莽間散失不知所在盜過父不虞後盜之至也出呼其子遂為盜所得妻聞知賫所挾物馳救其夫盜併驅以去至一山澗路﨑險夫婦老不能步哀訴乞免盜怒並推崖下墜石死明日稍退伯華甫遍野號呼追求不可得哭聲徹天忽有指示曰爾親在崖下趨視之則皆死矣伯華甫計盜來未已用絳紬被二裹其父母以肩擔之乘夜由間道奔桐江下時江無舟渡躊躇間俄漁人掉小舟逺逺向岸來若有使之者甫出銀鐲一隻付之載以渡南岸復肩擔二骸至姚家山祖墳之右採樹葉掩之徐用木錐挖土且饑寒無力又慮他盜之窺覬也晝伏夜作三晝夜穴成深可文許負二骸殯於穴仍負土築壘高三尺痛哭嘔血而出未幾我明有天下四海大定羣盜屏息民各復業於是伯華甫歸即舊基而屋之孑然一身形影相弔乃因其族嫂宋氏聘錢塘楊氏為婦生三子家業漸饒伯華甫恨二親死非其所每一念即號慟對人語及悲不自勝計其遇難時二月也不知其死之日故毎臨二月則終月絶飲酒不茹葷不接賓客獨擁爐自泣手持火仗畫灰隱痛裂肺肝淚傾注灰盡濕不已家人妻子或問之故不答勸之益嗚咽弗能聲進飲食推去不能舉筯奉祭祀執爵哀哀呌爺娘如在膝下時雖路人聞知無不感動伯華甫記逃難日乏草履幾不免尋以銀釵購得之始獲濟遂終身手織草屨以施貧乏弗取直此蓋得之予先妣申屠氏淑人之言如此三子長唯可次唯善次唯大仕洛陽令唯可三子曰岱曰啟口山曰稷稷今領鄉貢安福訓𨗳唯善五子曰鴻曰鵡曰楚曰嶽曰䕫䕫吏部左侍郎唯大一子曰龍河南左叅政暨子孫男女不下七百指伯華甫夀七十卒贈通議大夫禮部右侍郎楊氏夀八十有五卒贈淑人合塟于祖墳之次人號為延慶墓云贊曰䕫幼時聞鄉長老云伯華甫善人也家倩工發直平不爽約人爭投焉綾帛衣件以數百計一夕火發家貲煨盡不顧急移所寄物或謂掩之詔以火可信人亦自信無存也甫不然明日按籍各還其主無一欠客有過其肆少憇出下一巨囊甫視之乃鈔也急追還弗及矣逾年遇其人延至家詢之其人懜不知所遺處亦無更求意甫乃囊擲還封識宛然客歎謝而去兄伯榮洪武間任河南永成典史以事坐臺獄既釋乃死其内弟方姓者化其骸遺歸匿之語甫曰得錢事可解甫聞罄聚其所有不足復鬻畬田四十餘畆得白金若干兩併所聚物付方氏去既而歸語甫曰貨行幸弗累家矣不意病卒吾已收骨殖頓黄山寺盍徃取之衆知為所紿欲暴其情甫曰弟得兄骸歸塟足矣置勿問一日服新襁衣攜杖出街有羣少年侮之既而叩門頓首謝罪甫怡然命之去鄉有巨豪恃貲弄官府手反覆成禍福甫謹避之或過門即屏戸弗與近其存心之厚與物之宏守身之謹類如此是乃所謂善人也嗚呼積善之家必有餘慶甫不自享厥慶而持以遺後之人後之人可忘其所自來也耶不忘其自來而復以遺之後人庶乎知世澤勿斬也為子孫者可不勉夫因著擔骸傳敢併及此孝孫䕫頓首百拜撰范孝子周復俊孝子范運吉䝉化人其先合肥人也五世祖成以武功授䝉化衛指揮運吉父寅年十三即慷慨代父繫獄斷髪授經聲聞犴狴咸嘆異之踰二年逋完得釋寅益勵志劬書補郡庠生同舎生史官與其子被誣俱死寅旁睨不平挾牘往返陳愬不屈主者恚之黜其名寅夙抱大志麟閣蘭臺意崇朝可登乃今遭故家業蕩析母氏云亡生妻去室四子孱然而已為愬他人寃淪喪所有撫事拂膺憤悒亡聊決意出遊名山窮探遐矚以自恣不願拘拘留畛域間也時運吉已遊黌宫號泣諫止之不從欲侍兩喪未殯乃脱婦左氏簮珥命僕與俱嘉靖癸夘六月一日父即矯然長往比出門顧運吉曰吾從此逝矣兒他時有心其求我於葫蘆山乎吉蚤夜悲泣籲天靡從未幾左氏與女胥喪吉家徒壁立姻䣊給之始克襄事丙午省試下第痛父逺遊哀羸成疾卧旅邸巡撫雲南大中丞應公大猷聞之延諸齋閣就醫藥焉久之吉病漸愈製衲戴笠將為汗漫之遊督學副使胡公堯臣堅留秋試得雋即攜子潤不抵家而行蒼茫入蜀䕫州南山見方士家懸刺曰滇葫蘆山人范寅始知父無恙乃懸購書於背日負之行又刻尋父狀邑里墟落野寺山邨即布諸人人庶幾遇焉所過神祠稽首哀禱逐景依聲展轉恍惚茫然無應驗遂浮峽下荆湘上京師復𨗳淮泝汴東望鄒魯入濟南憇太平寺夜夢父執其手指一盤石曰我死此石下矣石形類葫蘆吉大哭而醒歴鄒魯諸郡邑倀倀莫知所之復入太平寺值應公撫山東元日出見其尋父狀乃訪諸寺中邀入官署俄應公召為吏部侍郎吉固辭去公憫其形神俱瘁攜之入京吉病轉劇歎曰死生命也第恨父未見而先死不瞑目耳屬潤曰我脱不幸爾當繼我之志無忘厥祖乃若我死則應公自有處分公適過齋閾聞之謂吉曰哀哉范君君若有變吾必無負君也撫之而泣繼移書慰之畧曰自古豪傑之士方其不能自遣時非不欲奮一死以自快而此身所係則有重於泰山所以寧隱忍而不敢輕失此身也今子行若思坐若癡縱為親委身溝壑亦何益耶范君其加餐定慮戒之哉無何吉少瘥應公請于家廟以兄女字之吉終辭公不可復為吉移檄四方求寅未三旬應公致政還越吉病亦尋愈再刻尋父狀無慮數千楮路逢人輒拜授之誓不見父不生還也由是入武當祈神登紫霄宫過榔梅林至大石旁肉瞤馬蹶還亦如之莫測其故既而訪黄鶴登岳陽樓道出京山度池河以趨承天承天庠生烏茲者其僕得尋父狀同庠生陳良臣見之驚曰此非葫蘆山人子乎若不吾遘雖奔走老死亡益也即遣弟追吉吉問良臣知父之由良臣曰嘉靖丙午春有中使廖彬遇一老人于樂豐河不下驢怪而詰之老人曰我雲外人非若可挫也中使怒縳之老人口不絶詈中使投之溝中良臣夜聞溝中有聲掖之以歸師事焉始知為葫蘆山人及其姓名半月餘乃去後良臣過榔梅林見葫蘆山人嘯歌坐樹下踰年再至前所過處詢之則曰山人死矣死之日坐雪中飲水一盂而逝其徒陳憲掩之石洞中計嘉靖戊申七月上旬某日也吉聞之大哭良臣母嘆曰此必葫蘆山人之子不然何其聲相似也吉於是拜陳母為母而兄事良臣急要良臣趨武當良臣亦迷其處遇道士王崇舉指示石洞儼即所夢葫蘆狀也吉大慟㡬絶恍若有牽其衣者遽欲啟之或曰此禁山奈何可輕啟且果為爾父紫霄宫住持鄒厚先山人徒也盍往白之吉與良臣同謁厚先厚先有難色哀祈曲諭始從遂于牽衣處掘得二骸冥然莫辨吉禱于神刺血驗之一血沁入骨其一不入也吉歛以衾棺舁出是時提舉太和山湖藩叅議雷公賀副使張公景賢叅將李公某鈞州守范君大儒感吉之孝為樹碑於石旁章厥美焉嘉靖癸丑予自瀾滄入滇運吉扶柩適至邂逅于昆池之上左布政汪公尚寧督學僉事徐公養正與予欽式高風悦伏至行咨嘆累日謂子平載生夀昌不多讓也遂言于都御史孫公世祐御史黄公中二公欣然疏請賜旌門閭汪公復倡寮寀大書孝通神明昭掲宅里吉既還家塟父遂構茅宇於冡旁朝夕泣奠以終制焉今嵗乙夘秋九月吉偕洱海張君伯和上春官將締姻應謁予于薇垣别館淹延晷日吉於釭下為予言往年親出遊時吾哭踊薪水之隟輒撑戸以杖畫地盡力習飛白書積久純熟雖闇中結構不失吾流轉四方與弱子扶攜幸餬口生全獲至今者皆學書之力也又言吾適荆州行逺安道中後若有人曰前有虎吾亟避之亡患回視四山寂無行人也一日渡楊腦津榜人紿納萑葦洲上積尸縦横夜雷雨大作江水驟漲幾没俄漁艇接之獲免嘗至河南某鎮日將昳已解鞍休憩忽心痛急呼潤馳去是夜劇賊師尚詔流刼至鎮盡屠其人吾之迫險幾亡此其槩耳其諸流移困辱顛踣饑寒頰噤不能言更僕亦未易悉數也言已淚涕絫絫雨下嗟乎人之於親其罔極之恩一也世固有蔑視其親而輕棄之若遺者何心也范君拳拳於所生不忘其覆載之恩而克盡終始之義茲出亡于外嶔﨑五年跋涉回旋不知其行幾千萬里而卒能歸遺骸祔先隴以明其志嗟嗟范君其篤仁敦行而為人所不能為者耶途窮跡微出入於九死之中而安然無恙若有物以持䕶之者寧非精忱昭徹為帝所相邪予少讀史傳見古之孝者却猛獸出水火感神祇獲瑞應諸竒事迺今徴諸范君益信無惑也王孝子俞烈婦劉文卿王世名字時望婺之武義人其先未知所自性聰毅年十七從師韓光濟治業焉持糧遊他境萬厯四年父王良四十三為仇王俊廿六所擊中要害死世名馳歸則就木焉世名不及訣且未敦器也痛欲絶念以狀聞郡縣抵其罪法殺人者死然不診驗不成殺也世名抱其母泣曰吾安能殪仇而不暴吾父乎族衆遂得請入仇産因涕泣哀呼為寢其事亦不欲傷母志也於是繪父像已持劒於其側問之則曰古人佩劒自礪吾薄飾以侍乃翁不亦可乎跪起號慕服闋不輟三年補弟子員謂其妻俞氏曰吾以儒服見先人汝其謂適乎吁嘻哉慶者在屋弔者在堂俞習其昕夕怦坎聞之憮然而未有以言也時仇亦來㑹世名攬涕接之亡何而生子狂喜大異謂俞曰婦知是何等兒也吾不能復須矣大飲達旦終不能㣲示於母知我有所必死而哀阻及也哀阻則事不就九年正月遂斬其仇於蝴蝶山下叱劒而號衆曰仇殺矣余惟不能愛身而濡恥也族衆嗟咄觀者盈堵名神色自若歸報母尋出其所受識仇産租數與其手刃仇者以聞於縣疾走入獄武義令呼曰子出矣吾將置子於别所上狀於部使者竟以兩令質之金華令曰俊廿六為殺生父者宜伏毆刀然殺不在生生為報非為殺也誠得而父傷者吾焉不能捨勁烈之士哉令出坎焉辨之世名大痛曰余固欲受辭殺也以至於此苟自戕伐吾父當被害時寧不能見賢令也仇毋用名誅矣朽骨起于修夜發掘見于後嗣吾曾不能軼絶曹娥而幽掠吾父也令令之歸俟再訊焉則隂令將其父棺以至因以減死論世名望見父柩遽以頭擊石血濆殷地大呼曰父不再辱余不再生嗟乎余欲一死不得矣光濟知其志不可奪進曰宥善人者君也寳藏胔者名也即令決於君前不如緩哉君止矣兩令悽􅒣去之父喪以故得全時邑里皆臨無不悲咽大號是夜持母泣曰子之命也夫義不危親孝不毁性死父而失母其何能為九原可作能無懟乎遂屬其妻與子於光濟閉唅不食死猶懐其父主祏云先時生入仇産嵗得租變值封藏之仇饋則拜語則諾也連牆而居善自匿以故仇不為備其自鑄劒私獨銘之曰報仇曰夫差爾忘越王之殺而父乎妻與母莫之識及斷其頭顱而出之時年廿一子宗禹嗣劉傒如曰天性之於人湛矣安邱捐市辱之生趙娥畧夫家之等斯以纎芥發憤帷袿立懦者哉放此為報則需時日以斷凶憝者無或激焉要其磨志繪俠後嗣逢生手而不憂固足以暢其往懐而欲惜此委蜕倖為全人霜介之志未之或知也世或軌以他衷嬰燕人之悲幕效牧豎之殘照斯君子所以無從容也周禮曰凡和難父之仇則辟之海外亦以謹避善良直情彰枉迨夫姦軌竄迹借交斯𢎞則夫暴骨定情矯徒無所仁孝之士其能忍乎用斯是殞古今同嘆是故郅暉出篣卒為漢良輿情不闇惡可格之峻文三代所以成其明哲也嗚呼又可已哉王世名妻俞氏武川俞源里人父聰為後母所鞠性惠婉嬧有修容年十七歸世名時舅已斃于仇見其夫怏怏不寧問之故不告曰我兒女子固不宜知君然君行婦自同此遂以夫所閉也而置之心識其為舅恨也世名有所居密室每戒其至輒理香擎跪其前誦所彚忠孝編俞一日偶見之則泫然淚下曰君固惡其謀及婦人耳敢不重閉乎世名於是食舎肉俞謬之曰子豈為大士也者以為穢其戒體哀毁而瘠母何賴焉終然弗之奪也明年生子宗禹夫祝曰善視我兒先君其不餒矣愈心諱其説時仇以慶事至室生退而目之曰彼遂偃蹇者不食麥矣愈益用驚念然以其夫非寔不先白正月世名遂斬其仇以歸婦姑相視駭愕世名曰孤之生也獨不得刃父仇逡巡數年所以不告母若妻者以有手仇之心吐之則衆止我衆止則泄今長棄母矣我為不孝子而妻為賢妻善事姑以卒我志遂就縣械故事囚親家屬無有令不拘而舎之故妻與母皆従焉俞哀謂生曰梁氏妻能自毁夫與之偕隠余偕子死不難為也生曰母老子弱王氏成敗其在汝矣俞悵然曰請以三年勉為子留於是絶而甦者四世名竟不食死俞復不能食韓生與媪弔其廬使媪譬之曰前與生言而忽棄之不祥紝舂之寄若如能任之耶視汝呱呱者何如耳乃就食屬姑病乃輟哭内哀嘗醫藥媳事如生事不解結襘者數月俞三年食息於柩側瘠不避也有伏棺扞火所不足為者一日姑叔議遷柩于外楹俞大慟曰死生異路故他適也君内吾内而不出君出吾出而不内矣吾與生言此其期乎遂盡移其簪珥業壤焉以遺藐孤絶食數日就拜姑焉曰今以五嵗子賴姑而姑固長年撫之也理笄拭髾死於棺側時年二十二鄉里無少長皆奔號之是日雨雪交涕山川縞冥弔者無不哀慘執宰以事上天子賜賻三十兩宇祠一區令後世追思焉劉傒如曰巾櫛以之有實無二夫慮不經倉卒幸全則名虧齒創則節壯時蓋不可已也俞氏之於夫長懐盡矣而立孤下報三嵗幾何道韞之優游㑹稽有以也王郎以難殞生世名以仇致命安否蓋大異焉侍慈哺幼待盡以踐然諾又何愧耶觀夫司敗自束泣骨為期骨肉之際諒乎興其烈思壯哉以哀滅也讚曰玟珉同穴夫婦剛烈怙戀仇兮身摧憲設拱木懼侵穴回潛濕三嵗室勞厚儀母掲於邑哀茨翔陽㣲滅熊虺朝俘兩竒繼馘夫非名浮噎憎痛骨雲黯天迴怯夫壯律明文海巻四百十一
