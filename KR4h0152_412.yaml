body:
  text: 明文海卷四百十二餘姚黃宗羲編傳二十六孝子李掾耿定向李掾者余里中人也名學梅初為臬司幕下掾當世宗賓天詔下諸司哭臨時掾伏庭下哭之獨哀督學顔沖宇氏義之因晉署司刑功曹云掾兄弟凡四人掾為嫡且長餘孽子掾父昵諸孽而疏薄掾田宅便利者采與諸孽故諸孽富厚而掾獨窘其大父不平欲訟諸官掾跪大父膝下泣曰弟吾手足父鍾愛弟即愛我奈何以腐鼠傷父意且也控孫訟子以子懟父匪彛大父乃巳里人稱其讓尋母死掾廬墓所者三年往見廬墓者率為廬居或為茇乃掾煢煢獨棲莽間暑雨一蓋嚴冬一藁席耳又苦貧日不免以拮據生理出出必返即深夜必至墓所一夜至墓近溪滸忽雷雨暴作溪漲不可渡乃持蓋立溪上望母踊號曰母兒在此母兒在此如是者達旦又一夜雪積數尺許鄰有耆儒張姓者意掾苦雪或他之也深夜往瞰之席藁卧雪中翳沒不可辨環視久之始見雪中隱隱一髻張益嗟嘆轉語人人近嵗其父死亦廬墓側如喪母里人稱其孝掾從事刑曹也憲長方某氏亦廉其賢特令督臬獄舊吏督獄者值慮囚時可坐得若干金乃掾受令即自榜獄中曰諸囚犯於刑者中多以賄故上令吾督獄者勑法耳若干法而䁥賄何如此囚一毫不以自凂且從家裹糧具饘粥以飼囚之無告者又有囚法不應死掾檢牘得其情請於憲長生之絶口不言恩其人懷百金致私為曹掾取后察知德由掾也乃置酒飲間更薦幣加金為夀掾艴然振手去又共稱其廉且仁云掾往嵗飭介紹謁余余重其行見之掾故古貌又冠履敝惡隤然一田夫也余間與友人談經史或舉其凡未悉其末或憶其意偶忘其辭掾從旁代對每多助余始知掾亦常涉獵經史者詢其小師里儒張高長師郭先生慶善甫善甫王文成之門弟子也其行誼蓋有本矣耿子曰天也命夫其不幸而不生於元和永建之年乎藉令生丁其際久已公卿矣乃掾故不善治生其家日落里人無識者咸姍其迂而行輩或反嫉其矯士貴遇乎哉雖然若原憲高柴輩得聖人為依歸則又不可謂不遇掾幸受知沖宇矣二孝子耿定向二孝子都逸其名氏豫聞諸長老先生言為紀其大凡云其一丐子也行乞吳市中吳門有貴人月夜道橋上聽其下有歌唱聲者下覻之則丐子也坐一老嫗塊上以所丐得酒捧缶而跪進焉唱蓋以侑云貴人訝詰之丐子驚嘻曰儂窶人聊為阿母歡耳貴人嗟良久歸明日轉相語稱異焉後時人窺之見所娛其母者多類是自此諸貴人每宴輒置餘豆間曰以待孝乞兒也吳下至今口其事云其一居浙之長興里蓋椎魯人也獨事母有至性其舊業俱以養母故至衰落僅餘屋數椽矣其從父猶贏於資一日飲諸姻呼孝子侍姻多豪貴人饌且腆甚孝子未及舉即私念曰令何緣得致我母前耶則時時目左右盻每伺賓所不顧急摘諸甘脆品裹紙納袖中未見一再御即御若未嘗旨焉紙盡而袂已盈盈矣縮縮逡巡席間復私念曰令何緣客罷即致我母前耶會席闌酒酣主人出金巵酌貴客貴客不勝酒以巵置樓簷間覆以瓦先間歸俄侍者報亡其巵衆客欲自明約曰請即扄戶令人人袒檢之必得乃已孝子兩手捫袖中至羞澀也倉卒不得計即謬曰由我詰出之則曰匿他所矣至夜再詰之則又謬曰求諸所不得或為他人乘也奈何然當卒償之耳詰辰從父責所償孝子願鬻其屋且曰幸稍寬我俾先僦屋奉母居令無訝也不爾懼傷母氏心從父雖嗔恚聽其語亟道母氏已默默心動矣無何貴客憶前巵乃折簡主人語以故且曰昨蒼黃歸未有白也將無枉君家僕耶主人如言檢之得急呼孝子至孝子猶謬對如初從父曰癡兒吾業已得巵知非君矣顧若何苦自誑負不韙名孝子始吐實淚淋漓下曰某苦不能勉奉母氏歡而兒女態若此比諸貴客在設令把我袖將大詬我且重為叔父羞故寧爾爾從父大感悟因曰若欲孝乃力不能我即贏餘兩豚犬兒能似爾萬分一不耶乃召前坐上客遍語之曰是子如是如是忍與吾兒二視哉卒三分其産令得終奉母氏焉聞其族里至今多禮義人謂遺風所漸云贊曰孔子有言啜菽飲水盡其歡斯之為孝乃丐子殆契是乎世之力能具五鼎八珍前羅而不能令其親一開顔者豈少哉令人脈脈感愴矣或曰行乞至詬恥辱親也不知彼營營競進者視乞墦行何殊矣究所止能以親顯不耶懷肉至自誣事若甚騃可憫乃其顧養一念即古潁封人奚加焉卒感叔氏風施後世有以也夫謝孝子顧璘謝孝子名廣字志浩祁門人系出南唐銀青光祿大夫詮之後由大嶺三遷而居王源由詮公十六傳至忠是為廣父母汪氏父性狷逸出賈梁宋聞神仙遐舉事志竊慕之遂遊名山求至人以圖不死不歸其鄉廣幼母教之學年十六授春秋於從祖方伯廷憲公讀潁考叔遺羮事廢書泣曰古人一羮不忘其親余有父失養不顧獨何心哉抑聞朱夀昌失母求之五十年竟獲廣不生空桑乃忘父母也顧母氏無他兄弟侍養即納婦李入門七日決計出行纒擔簦誓周四方以冀必見次大梁得父於小窰旅邸號泣抱持如得再生父摩其頭曰兒孱孱逺來良苦今與兒歸矣相依旬月戀戀顧慕如嬰兒信父己變前志顧乃紿廣往汴北取浮資云同歸會伯龍起偕兄祿自魯山來會因託二人代侍緣父惑彼道深得間即脫去滅迹矣比還躃踊既絶莫知所適忽傳父在魯山即匍匐往尋弗得有郭駝氏者儒生也哀之因館穀為圖計諸儒生來唁盡憐愛之欲挽留就學取科第云爾父聞之必來廣以書復諸生其略曰舜不得親雖攝天子之位猶怨慕而懷憂若余則失其親矣乃欲務虛名沮實念是誠何心耶仕以求忠安有不孝而可為忠乎已矣吾求吾父矣辭旨懇欵諸儒生不能強咸嘆曰孝子孝子聽其辭去歷陳蔡鄭衛之墟達于荆襄反于河上遑遑如追戚戚如喪舟涉陸跋弗御酒食夜則稽顙北辰以控精懇凡諸寄宿之舍輒勸人修孝弟行感動甚衆人亦每每𨗳送窮索幽險渺不得倣佛母在家病作族黨寓書召之歸歸乃持母泣曰天乎何置我于蹙蹙間耶人有襁抱稱孤者毒矣我幸有父而不得見有列鼎調膳者福厚矣我徒有母而不得供菽水雖謂非子可也仰天大號聞者酸鼻既侍母疾愈聞武當有道人影響類其父即銜哀辭母以死為誓嚴戒步拜以往腰資販賤營給口食至則非是又聞南山中多學仙侣乃衝暑雨躡氷雪歷風濤崖磴之險深入窮探難苦萬狀足痺且跛竟不得遇匍匐河汴又十年形羸髮秃悵悵待斃而已家又報母大病倉皇籲天挽輿兼程歸至家跪牀下泣曰兒罪當誅求父弗得復棄母養天地不覆載矣於是躬奉湯藥衣不解帶唾涕必手承之踰三月而母安又數月乃復逡巡進曰兒初意父志神仙索居方外窮矣事久不可料嘗聞河埠館人云有徽商每二三年駕巨舶一至貨盡即去述其容貌行事儻而翁乎兒因置行篋在彼計今秋冬當來欲往候之天其或者遂此也母許之乃輿痺往候踰年又不至倣徨計無所出長號而歸母亦老且病矣日維率妻子竭力供養結樓日北望冀父來歸又以意繪像朝夕哀臨或夢挽父裾不能留則號哭達旦至動雞鳴凡飲食及其所嗜輒投筯不食逮母氏以天年終乃具父衣冠招魂以窆焉哀慕之心至老不替也年六十有九忽疾作且起命製衣衾仍口占曰正氣還元造餘辜積厥躬一生行止定千載是非公遂卒卒後二十年其子祚録其孝德委悉成帙謁余為之傳豫讀之移晷乃盡訝焉踰年未敢捉筆問其鄉人曰信然乃作傳著其概論曰父母所由生也是謂之親生致其愛死致其哀豈待慮而能哉其或事變外迓弊精殫力以濟所願固亦天性之自然非有加乎其外也唯夫世教衰替耰鋤德色往往路人其親而後孝子得著其譽吁亦痛矣如謝孝子之事間關險奧憂愁疾苦亦云窮矣而持專篤至於蓋棺猶抱遺憾斯天性純良無慚於薄俗者乎其可謂篤行士矣楚岡苦孝郭造卿余纂燕史孝友列傳第非燕弗録矣每擊節百世上乃寓燕目擊若鄭之垣者黃岡團風鎮人丁丑嵗父遊都下母王慮夫宕而不返也命之從且囑勸亟歸至都父不如意為書吏以給垣竊計曰我生十六矣可使父日劬勞乎執鞭之士其可必求哉竭力付役人下庶朝暮易為活耳即入薊修足覓錢佐父需至三屯五月五謁景忠山靈為親夀嵗終以所覓歸父于羇旅每持齋誦經無非為親者日隨父都下間輒垂涕勸歸父不甘數千里來尚落拓入閭里而日苦父不歸念母之倚閭久矣壬午暮春朔齋之次日咬左手中指瀝血具詞為禱且願持齋誦經三年放生施錢各至千止朔望叩拜諸神五月望病且休遂夢神詰責狀自是益致虔三四載如一父棄書吏圖他役不遂憤悸成篤疾囊以求醫罄亦習剔髮糊口而塗益窮于歸垣傷之朝夕籲天有老人卧道左狂呼環視者多戲之尋散去見垣獨立最久詰孺子其為何對曰吾見老人長者卧病而不忍去也老人喜而遽起因覓其酒肉乃罄所有為治具共旅宿聽談玄卜休咎屢以父母問不答每明發而益不寐焉于老人所授者敬拜而祠之乙酉仲春五日五鼓在都下稽首于昊穹曰垣窮旅無厝為親哀禱者屢矣恐不足為驗今特割左肱以讖若而不可改請不肖身當之舍肌而刃若劈紙然父詰其狀為愴然動逮母脅病疽醫者不治矣夢神人投之藥及告而子祈禱狀寤疽破且瘥告諸妯娌竒之時别母幾十載矣一日同父觀傳竒者作孝童狀感念母益深父思大母亦有動色復舉母所囑纚幾百言而痛哭以告竟執前言不許乃婉辭求暫歸起居于大母亡何復歸膝下勉許而辭若訣也陽月啓行負黃米薯蕷及榛栗往嵗暮抵家大母徂矣母散所負示家人且語以所夢即當空合手拜謝因告母以割肱故而家人咸稱孝云居甫月復北負晚米凍米數升土魚數尾為别父時所須也塗乏資斧以藝輾轉求食夏初乃抵三屯父孟陽病卒鄰邸為埋于叢塜矣聞之哭幾仆熟所負而奠痛稿葬之不可返孑然五內若烈也土人示從火化則蹴然曰吾甘以薄俗而待吾父乎哀呼明神曰不肖别父以思母也不意父年未及中竟為羈以終垣不肖雖傭丏寧甘父作燕山鬼乎奈家數千里控告無門矣願自鬻買棺歸葬畢來役以償此生者再取左肱瀝血立券敢誓于明神庶幾人信之遂當空而剮作券于塜側荒穢纍纍不可數平時人所驚過者晚以灰畫圈趺坐其中念佛為父讖多怪狀不述明發引魂歸祀逆旅􅑎腹背血券悲號于街衢體無完衣面容深墨有與之飯則曰使吾飢而死歟亡父不終于此乎敢不拜惠而食諸有薄助以金則不受曰不足以襄吾事而吾不勝其為報耳於是人咸嘖嘖苦哉乎孝子云守備邢公謙南陽人聞而召之哀鳴執血券以自鬻公曰嗟乎吾豈以貨取而宦遊者哉囊固空儻求奴安忍以孝子為乎姑俟之為爾圖由是浙人金君印助之棺陶君雲鵬為殯具閩人余為備喪服林子守谷資杖屨仍有助者則辭之焉乃泣拜于陶君曰不肖亡父有餘幸賴諸君子就木俾不肖身亦獲成禮邢公厚賻道里費旅櫬可以長返矣且不忍奴我我忍忘而奴耶第於諸君子匪報終身何日忘之乎陶君諭之曰不知爾者奴爾奚為知而願為爾執鞭吾復何以贈哉因授余簡曰孝難矣孝難矣於今之見斯人燕史氏其舍諸外史氏曰余稽諸史其傭丏割肌苟有一足傳况兼之乎今迹其所為多二氏家教固不重遺體如吾儒者道然能不從火化以斂首足形且正首丘焉則全親者大矣視世人但知有身者何如即孝子惟求遺骨者何如吾儒稱負米以百里外為茲往來數千里與昔所負者何如雖當從于二氏儒者道過半矣由是縣棺而封負土可成焉里閭諸君子聞之有不助而非之者哉太史聞之亦必有定論在余則安知第感其事可以風且戎籍同余姓亦以宗稱不辭焉而為之傳趙孝子夏樹芳孝子諱鉉字文鼎砂山人至正間江南羣盜四起祖彥圭父思善皆以禦盜被害鉉與母吳匿姑夏氏盜蹤迹之急逃依外姻武林未幾武林羣盜亦大譟鉉母子亦相失時趙氏家奴有承信者在戎伍中知鉉所在求得之遣報夏氏姑姑亦避兵姑蘇遂取而鞠焉後十年天兵平偽吳鉉歸理先業語及母輒涕下不食嵗時南向慟哭絶而復蘇一日辭所親走求吳越間三年歷數十州不遇行乞嗷嗷淚盡流血後遇鬻牛者會稽旅邸言狀始獲聚於鄞之晝錦坊相持大慟蓋母子隔絶十有八年聞者為之墮淚遂奉母還後十二年以夀終論者以比朱夀昌云直指使者陳馥郡守何澄俱為詩以贈之有逄人淚滴千行血見面愁消一寸心又有望窮鄞水雲山路愁絶錢塘夜雨船俱惋惻可痛洪武初監司上其事時孝子居里中剛直多與物忤高皇帝别有所中密遣部使者廉其事事核始得旌萬厯五年入鄉賢與祀典論曰蘇子卿間關海外十九年而君臣再覲趙文鼎漂零吳越十八年而子母重逢豈非大孝純忠上帝所命合而離離而合鬼神自有以相之與世有親存若亡親亡若遺者聞孝子之風可以少愧矣明文海卷四百十二
