body:
  text: 明文海卷四百十三餘姚黃宗羲編傳二十七列女月娥塢斯道月娥者太平蕪湖葛通甫之妻武昌邑長職馬祿丁公之女西域人也少聰慧靜幽諸伯氏皆明經工舉子業月娥隨而誦説通奧義及長歸通甫及葛門事上撫下凛如禮法冡婦盧見月娥德踰於已一日率諸婦諸女請曰願以諸婦諸女屬之娣蚤暮教詔之月娥奉命惟謹紉針之隙必告以婦道及援引古烈女示以為則以是咸淑其化既而冦羣起其一據有豫章自上遊而下勢甚張郡邑悚懼盧曰郡有城郭可恃且有兵守因使月娥挾諸婦諸女避郡城未幾冦果至城陷冦紀綱民事月娥嘆曰吾生簪組世家其忍出犬彘下耶遂抱所生女赴水死諸婦諸女咸驚愕言曰姆之死必安于義吾可幸生乎哉亦相與死水中凡九人莫有後者其姻張綱中為物色死所得其尸時夏暑方熾七日不泛顔色如生郡人靡不駭異父老與綱中議曰十節同志死不可異壙乃於故居之南黃池里作巨穴同以葬題其石曰十女墓其弟鶴年相與樹碑墓下以昭節行月娥無子其夫子與冡婦盧皆死於冦鶴年富於經史有操行幼時讀書皆娥口授月娥幼名也今亦以月娥名焉論曰月娥不忍處冦境死以素習禮義諸婦諸女之死以素化於禮義以禮義死安於生也始一人自以死而九人亦相與俱何化之深耶是則九人者一月娥也自是而逺邇化其風者豈無其人奚止九人而已然不惟感諸人也至若尸七日而不腐毒暑又豈非精氣感鬼神鬼神為翊其靈歟嗚呼異哉趙節婦李東陽趙節婦宋氏陜西咸寧人也父諱翬嘗知歸德州趙琳者歸德衛干戶也故節婦歸之琳少負氣與范指揮者交惡范計傾琳怒不能下宣德庚戌琳以代赴京伍至兩河口暴得狂疾夜乘馬徑去家人物色無所得筮之曰死矣節婦乃為位發喪以其衣冠葬焉時婦年十九子一曰遜始晬餘節婦誓與兒存亡遜長而廕教之曰汝知吾所以不死者乎爾負我我無以見爾父于地下平居不假辭色雖壯猶加箠撻或解之曰兒無父將恃而驕驕必敗吾鬼不食矣遜卒克自立拓産增業有四男六女雖屢幹公于外栗栗如在膝下節婦亦自飭嚴甚别其母久迓之郊至則曰寡婦不敢野見請見于車中及堂而後拜有異姓遺女育于宋節婦弟之既而三嫁間往省節婦罵曰汝玷我家縱不能死尚戴面來也驅而出節婦事姑謹姑周老病疽甚節婦日舐濯之竟愈姑季子狙節婦之財即豫之姑問所畜節婦重怒其姑則曰固在實不存一錢姑死葬稱子事成化丙戌有司上其節詔旌其門今年六十有七矣初千戶之病而亡也泅于河而蘇鬻油者張氏竒其貌館而飲之酒酒作復病去後十年霸州人云有狂男子時能自言我宦家子及問之即失度求者至霸則又傳之保定保定蓋其支族在焉至亦無所得自是遂絶又二十餘年有僧寄歸德嘗乞齋馬牧寺為里人所嗤曰母嗤我我官也棄不為耳獨我哉如趙千戶者亦僧也趙黨有劉八者亟報遜使詰之僧曰豫指揮徐忠中山王裔也土木之亂逃為僧于香山求有道者師久不值至徐聞有名僧在夀州始造焉其徒數十人豫間及家故師怒以觚擊豫曰汝俗纍故在惡吾從吾亦歸德趙千戶也惟聞此而已然師自為此言已悔之曰吾祕此三十年不覺妄發吾不能久居此矣蓋將去也問其齒貌性度質其母其母曰噫是也遜諸父俊即率二老卒至夀訪之則已發矣後歸德有九僧入趙東鄰殷指揮家索飯中一老者甚怪偉問殷曰西鄰者誰乎殷具以告僧顧其綽楔笑曰嘻乃樹此乎遂亟去比遜追又不及人皆意其為琳也徐僧者居無何其五子來自鳳陽請歸之不可則強之去竟逃還馬牧猶能道趙千戶事云太史氏曰節婦之行高矣當其夫亡時非不能死飲泣抱孤凡趙氏之祀之絶是懼其律身教子皆能以義自勝圖于厥終雖烈丈夫豈復過哉千戶之事其亦矯詭務脫馽縳之流未足深論獨人之情有甚于死别者于是蓋益重節婦之哀天其或者矜節婦之心使趙果不死萬有一于後亦未可知彼節婦者固可以無愧也已節婦於豫姑嶽夫人兄弟也豫每聞其事未嘗不斂袵而作重為之痛歎而不能巳故傳之而千戶之事亦附見焉六烈女李夢陽儒生劉德舉來言六烈女事李子聞之泫然而涕出劉生曰夫子奚慟乎李子曰豫蓋傷為臣不忠云於乎死生亦大矣往逆瑾之亂豫實丁焉當是時人士大都以賕行問之曰救死爾又曰死瑾無謂於乎死生大矣彼粉黛笄褘之人乃顧若是烈耶自死瑾無謂之説興於是賕者公言於朝羣議於巷偶語於途以逮至則問金多少為罪重輕於是天下吏曰考掠桎梏之咸金逋也下斂而上聚公簿而顯輸曰姑救死爾夫為宜若是否耶設靡賕瑾能盡死之耶於乎死生之際難矣彼粉黛笄褘之人乃顧若是烈耶豫蓋傷焉於是作六烈女傳陳氏者陳傑女也年十八聘楊瑄居無何瑄卒女痛哭將死之父母不許欲往哭瑄又不許女則竊翦髮屬媒氏往置其夫懷汴俗聘女生年月日朱綺金字與男家號定婚帖於是瑄母以定婚帖裹其髮瑄懷葬焉而女乃遂卸容飾素笄縞衣居無幾父母謀改聘女縊而死天順五年六月十一日也後五十三年為正德甲戌瑄有姪曰永康者改葬瑄而求陳氏骨合焉二骨朽矣髮定婚帖獨鮮完劉生曰葬之三年而岐穀丫瓜産之墓李子曰世人蓋多言青陵臺事豫竊疑焉連理之木比翼之禽今以岐穀丫瓜觀之不其信耶張氏者李傑妻也年十八歸傑踰年而夫病且死握其手訣曰我死汝必更然善侍後人矣妻泣矢之曰君死妾死不願更也傑死張氏謂棺匠曰棺大之夫性喜寬大也其父母曰棺第狹之勿大匠從其父母狹其棺張氏哭毁其狹棺曰不大不棺也棺成自經而死高氏者夏永昌妻也嫁三月而永昌病死高氏欲從之然家人防之嚴則日主前焚香竊祝曰永昌俟我其母知之泣謂之曰汝今十九年耳奈何輕死高氏曰嗟母謂百年永耶然均死耳竟縊死劉氏者魏相妻也相之死也祖姑王覘婦有決志乃引婦登樓同寢婦哭之達旦不輟已紿其祖姑曰我飢渴甚祖姑信之下樓取水食婦以手巾二幅接縊於梁上年二十一矣王氏者孫林妻也林病貧無以療王氏賣衣辦湯藥夜籲天祈身代之林死則匍匐哭不絶聲水漿不入口者二日乃潛詣後園棗樹自經死張氏者田孝子妻也孝子曰田鋭嘗刲股療母病母死廬墓三年於是稱田孝子云孝子有甥宿舅鋪而夜殺其鄰鋪客盜其財於是逮孝子獄無何孝子死出其尸牆為之崩張氏之死也或勸之矣則忿痛曰我與田鋭夫婦二十年矣彼既為孝子我獨不得為節婦耶竟死今按六女者皆祥符郭門西人也六十年間烈女六焉足謂之興矣聞風者激也抑地之靈使然耶李子曰豫於六女而重傷時俗之偷也孔子曰匹夫不可奪志乃人不欲死顧詫人曰我死弗獲死今以六女事觀之然耶否耶夫巨鑊之赫盈諸耳甘綺之誘戰于中人鬼之關須臾是決乃六女者方視死如歸求亡如飴偵間伺隙如探金攫玉惟恐後時而靡獲也斯其志可奪耶不可奪耶夫粉黛笄褘之人至微窮簷敝闠憔悴下賤之女非有閨閣之儲文史之訓父兄之指誨聞見之開卓也而一旦有如此者彼冠裳鳴珮之夫口先王而講詩書者乃往往狼貪而狗生患難之至不化蘅為蕭則豕突鼠竄矣於乎極矣豫於六女安得不重傷時俗之偷也劉德舉曰斯舉也豫倡首義於鄉人復白其事於官司矣業為六女立廟郭西贊曰貴非必爵輝豈惟華有碎而完有凶而嘉於烈陳女甘心未家稿骸竟雙並蒂則瓜岐穗離離載嘉者禾五女繼興奮義執情隕軀捨生展哉令名於惟六女生有鴻毛死而遽巍山嶽其高瞻廟者拜過里者式無貴無賤無識不識即迹揆心持獨驗同古今一感人心至公熊掌取譬瓦全是恥爾忠爾孝敢告君子四烈婦張治道關中山川之壯風化之淳其來尚矣人生其間男子多仗節死義之士女子多貞烈抗厲之行古不暇論自嘉靖丙戌至於今百里之內有四烈婦焉嗚呼難哉四烈者馬康楊濮也皆以少艾之年以身殉其夫或縊或藥雖死有不同而英英烈烈之氣俱之與日月爭光余恐其久而泯焉於是作四烈婦傳馬烈婦者燕山左衛千戶劉鉞之女山西按察司副使欹湖馬公側室也欹湖公為吏部主事時以無子娶劉氏娶十九年欹湖公病劉氏晝夜不解衣親嘗湯藥籲以身代欹湖公卒劉氏遂不飲食日夜號痛五竅出血三日晚逐其侍女至夜半自縊而死覺乃奔救見其衣服腰襋悉密縫之顔靣如生有鬼神護之者焉康烈婦者康對山先生子栗妻靈寶左布政楊公女也栗有美才娶楊氏甫一年栗暴病卒楊氏堅以死殉姑張氏日夜防之恐防之有脫紿令之歸寧意其見母族少弛其意可以無死而楊氏即歸寧姑喜謂對山公曰無患矣無患矣及栗葬楊氏來奔葬已挾有砒霜在身至葬前數日遂潛吞之又毒以醯湯藥力大作百救不能解從容言笑而死三原馬溪田遺余書曰汝當為楊氏作傳以垂不朽至於今未能也楊烈婦者戶部郎中武功康德充女靈寶生員楊宋妻也宋於前康烈婦為兄而烈婦乃栗從妹也宋以前哭康烈婦嘔血成疾三年而卒康氏許以死殉舅姑知之百勸不聽乃指其懷中少女曰汝獨不念此耶康氏冷笑曰死且不顧安能顧少女乎乘間吞砒霜數匙須臾目暴面赤呼之不應救之不納而死渼波王太史為作志與傳甚悉濮烈婦者長安儒生員濮仕通妻西安右護衛千戶關景旻女也歸仕通十六年而仕通卒關氏哀毁骨立日夜坐靈柩前悲號聲達里閈弔客雖疏逺者聞之無不掩面嗚噎暨葬期親為仕通治槨乃謂姑曰當作大可容兩棺為是姑竊知其意親自防範之防之不及乃用仕通縧縊牀格上死後啓箱篋視之見明衣衾褥等物俱兩件平生舊衣巾裙巾鞋之類悉焚燒不存乃知其謀堅定久矣太微子曰人孰無死死而有名乃為可貴諺曰鴈過留聲人死留名美哉四婦與古之聖帝明賢忠臣才士並垂不朽可謂知處而不重其死者矣嗚呼關中天下之一域七八年間而有此四婦焉何其多歟歷觀載籍上下數百年忠臣烈士蓋不多見而馮道輩代代有之豈天之付與厚於婦人而索於丈夫哉意者富貴利達有以奪之也信哉今之享高官大爵德不足以變俗功不足以匡時文不足以經世朝身死而暮名滅其視四烈婦何如哉楊當載入河南傳以産自關中與馬康濮死照耀前後故得並為四烈婦傳云月尼陳鶴月尼者姓莫氏武林人也性慧多才有靜德其母向失身花間尼方十二三不能自奮遂從母失然非學士大夫不見及見非道德文字不談一日問潘大夫曰所謂名業者學從孰始大夫曰有志於名則名立於業則業成否則是無志者烏足以言名業耶尼聞之默然良久曰如斯而已以是益自勵凡人至益見抗不羣一日乂問田大夫曰所謂文辭者人從孰求大夫曰妙由天傳機由人究致天以盡人則文辭之玄得矣尼聞之默然良久曰如斯而巳以是日誦詩讀書遇學士大夫即稍稍能撰五七言詩論當世務故吳越間往往有傳誦其詩者後島夷起海上勡掠兩浙人多説武而學士大夫皆贊䇿軍門召募之士漸充塞閭巷尼憂惶闔戶密迹不面人者嵗餘或常對鏡顧容自笑若惜陷其已無以起而終者乙卯三月望尼入天竺山院禮慈像求超脫因而大慟歸倐失路見一樵者倚薪卧樹間尼往問曰孰路歸城中樵者曰路固岐苟致之皆可歸尼曰爾何滯于此耶樵者曰吾逃樵而歸于樵也尼聞之悟因拜樵乞旨樵乃顧所卧薪語于尼曰夫薪也始出土中天機莫遏焉但為類材糾繆遂屈上達之性今吾伐之方得脫根株斷萌蘖就收藏煆于烈陽之中變其凡姿反其靜質羣妄消融截然寂滅以復于命此薪之所能也吾固憐而樵焉尼因進曰問路知歸聞薪悟脫然吾生營營何求可了樵者曰人性本直流行惟光一有所制則直者屈施光者受昧不有見勇之士力反其元孰得其了哉惟山中之松溪上之月抑之不偃蒙之不滅初性自如本體常徹人誠求之即可了其生矣尼於是豁然大覺乃臨清流滌鉛粉卸綺麗衣草曳韋入家辭其母往清波郭門遂拜老尼為師削髮修禪終其身自號松月尼者鳴野山人曰世傳唐吕嵓嘗度女妓白牡丹宋蘇軾點化琴操事余每論之未嘗不異其人以為聲樂之場亦有能回頭向道者焉月尼本背法失從當艷盛之年一旦斷情欲逺凡歸真倘日後采而傳之未必非牡丹琴操者之流歟噫淫風蔓地婦道日凋使世之二節者與聞月尼之事得不俯顔自汗哉烈女輝鄭善夫烈女輝者三河令周應文之季女也其先姬姓末裔即國為氏散處方隅應文蓋居庸之世也輝生而含慧抱素七嵗知女訓嘗論夏侯令女曰一死事便了何截髮斷鼻乃爾應文甚竒之時有將耀者將子也習業於應文雋爽絶於流輩應文亦甚竒之間遂以輝屬焉待年于歸大禮未就而耀以正德九年六月死時輝年十七禮不敢踰閾奔訃吞聲痛悼自廢其食飲應文憂之糾戚屬諭意不少變旬有二日遂自經於中堂中外聞者靡不嗟惜聲動山後先是耀之家買棺畢氏得巨木一本析而二之至茲遂以及輝唏天其偶然耶輝性嗜花草墀下自萟數十本英蘂繁膴日供采擷輝死一夕盡為之凋焉山後暑多蠅自輝之死輝之家蠅亦去類盡其次年乙亥所司部使者以事迹聞曰節義越人鄭善夫聞之曰燕趙之風悲以壯其生人多慷慨奮躍有所激觸即輕舍其生自古然哉故感燕丹之義視死如赴者白虹遂為貫曰往往有焉輝一女子也一念之至至感草木動天時是故城頽杞妻雷擊齊廷天人通貫之理古今一也吾嘗論燕趙之士使充以仁義道德顧但為俠客劒士稱顯後世而己耶輝之天資沖粹節義昭然豈又不在學者歔夫徐妙錦黃佐徐氏妙錦者先世鳳陽人父中山武寧王達開國元勳母夫人賈氏妙錦夙承姆訓性復端靜雖生長王公家然執禮柔嘉且寡言笑長姊適燕王後正位中宫是為仁孝文皇后次姊代王妃洪武末諸藩不靖代王被逮妙錦乃爇香告天矢不適人齋戒潔清若事佛然實無佛可事自是親藩來求婚皆謝絶之有妹及笄亦歸安王為王妃矣家人或勸之妙錦堅志如故仁孝文皇后崩時妙錦年已二十有八文廟聞妙錦賢且美欲聘為皇后命內使暨六尚女官往諭旨妙錦稱病辭匿不出家人復來勸之曰此朝命也可終避耶女官隨即直抵病榻妙錦擁被呻吟內使遙列房櫳外與女官皆叩首請不得已乃徐徐引起自以手指面曰吾所以不嫁者豈有他哉正以貌陋且有麻痕非婦容也女官皆羅跪仰視良久乃進言曰尊貌明瑩如玉安得有麻特謙辭爾妙錦即謬指數處曰此皆斑斑作點豈非麻乎女官即出內使亦隨去復命妙錦即削髮為尼旦夕望虛空禮佛未嘗一日懈文廟聞之竟虛中宫不復册立洪熙改元妙錦乃養髮返初服宣德初上仁宗皇后張氏尊號為皇太后皇太后自為東妃時聞禁中往事歆羡其節行高潔每嘆以為古今罕有至是始下教令達于宣宗欲一見之於是遣宦官將命至留都召妙錦赴北京敘戚里恩誼敕有司具舟楫飲膳禮視公主且遣內使護行及至即延入宫中相見即自稱徐達第三女肅拜謙謹雅裕皇太后以下皆尊敬之每晨入晚出或出不待晚凡數日進退恭重不失跬步宫娥見之莫不悚然私相語曰此辭皇后不為者也特賜金帛服用諸物優養其老復遣內使護送還留都舊第正統庚申正月卒年六十有一祔葬鍾山先塋之次豫聞其志操於勳衛徐天賜甚詳惜不能盡憶也復得墓志陳璉集中略其始終然與聞諸天賜者相合天賜乃妙錦長兄魏國公徐輝祖曾孫云太史氏曰書稱二女釐降禮云天子一娶九女使妙錦在當時繼長姊正位中宫亦禮當然也顧乃遜避若將凂焉亦甚高潔矣哉世稱光武不能屈子陵子陵亦呼帝文叔視若韋布皇甫士安猶疵其面君耀節不入高士傳烏乎世之丈夫子汲汲求仕低首屈膝惟恐不榮以祿故遺子陵以高然此猶以君臣言也若中宫則與帝敵體並主天下大與委質事君者異妙錦乃竟堅厥貞守文皇帝亦竟不之強皆盛德事也嗚呼難哉熊烈婦敖英烈婦清江人也姓彭氏清江縣學生熊崇文妻也崇文貧而好學烈婦織絍給之不告劬勩故人稱內助賢必曰彭氏云初華林賊之冦端州也薑通判妾被執義不辱死之崇文以語烈婦意在激之也烈婦曰此婦人分內事耳既而賊果至攻東門不破焚城外廬舍殺人烈婦走遇賊被執之盡脫簮珥與賊不得免賊牽之入室將汚之烈婦則抱庭柱不行賊怒以鐵鎚擊之烈婦怒罵曰狗賊無禮我不愛生宜速殺我賊拔刃截其衣領懼之烈婦不為動賊猶遲之時里中嫗亦被執在傍勸之曰何苦如是烈婦叱之曰是何言吾意決矣第語吾夫自愛於是賊知不可奪也始刃之血流滿地烈婦猶罵賊不絶口而死賊去崇文收其尸其色如生過者悲焉有泣下者嗚呼賢哉烈婦可謂死於義矣夫彼戴鬚眉服冠紳攜志丐生蒙大僇於天地間者觀此亦可省哉或者謂烈婦之死成於激此不知烈婦者也此説行則忠臣孝子之志孤矣慨惟世降而俗漓為世道計者恆激之以作其氣是故名節之訓義生之别清議之譏評國史之華衮鈇鉞激之也至矣然猶貿貿焉莫知適趨也嗚呼何况婦人又况應變於卒至之時豫竊悲夫天下之不能皆激也使天下為子為臣果皆成於激而為子孝為臣忠亦何病於激而顧以之加烈婦也故曰謂烈婦之死成於激者不知烈婦者也烈婦死一年副使提學先生關西李公以其事聞於朝許立石旌表今立石明倫堂之右陸義姑姊陸粲陸義姑姊者吳郡陸粲之姊也婉嫕有識鑒歸蔣氏而寡其弟粲舉進士為給事中疏戇好言事一嵗中章十餘上數譏彈用事者過惡竟以是得罪謫西南夷徼外地荒逺不能以家從粲既行數月而其妻病沒有一男一女皆幼母胡夫人老且失明方悲號呼天莫知為計姊聞之曰嘻此吾責也顧其子曰善視而室吾往與二雛俱存亡矣亟走弟舍抱持其男若女以泣日撫視之且教以學書記及女紅恩意甚篤男若女皆忘其母之沒也他日粲得稍遷為縣令過家戀戀不能别姊曰别矣有爾姊在何憂粲遂慨然辭去不復顧家曰有吾姊在何憂久之粲致仕歸其男若女則皆長矣姊又日為縫紉衣被飭治奩具視畢婚嫁乃辭去復從其子以居於是吳之大夫士凡與粲兄弟友者聞之莫不高賢姊之行曰昔者魯婦人遭亂舍已子而存兄子時號魯義姑姊今姊行足追配若人宜遂曰陸義姑姊云或曰姊其有所聞而興起者與姊未嘗學問顧自其少時喜從諸弟説史傳故實及覽稗官小説至古人壯節事輒拊手稱善為吟誦不釋口夫其嗜義也固天性然耶然姊居貧足不出閫閾又其諸弟及子皆賤士不能藉交於四方之賢豪長者以談説遊揚其名故姊之事獨其鄉人知之耳今世有良史如劉中壘者録置之列女傳中安知不與魯義姑姊者並傳也雖然姊之始願則豈為區區之名哉於是姊年且六十其弟粲將率其男若女往為夀而書其事以祝之曰俾爾後之人無忘焉作陸義姑姊傳節婦虞氏許相卿節婦虞氏錢山董湄之妻也少慧知書年十六歸董歸董及兩月湄暴得惑疾強死節婦褫魄驚慟一日三四絶復蘇痛且自念從一大義也同穴信誓也殉義成信計莫如死潛治後事以身殉家衆覺共防之節婦不獲逞則長慟曰吾即不死終不能與生人事耳於是盡屏常所服髽免麻枲以居哀哭無間晨夕娣姒弗參語笑丈室重扃攻苦食淡時董方饒樂獨瘁瘠如枯禪苾芻尼人為弗堪顧甚安之間詠菊云移種春苗愛護周柴桑無主為誰秋寒芳甘抱枯枝萎羞墜飄風逐水流詠竹云一片貞心古井泉清寒徹骨自堪憐相看嵗暮青青色歷盡冰霜戴一天節婦死計不遂終怨無已曰吾不得從官人死得復見官人如生者快長瞑乎乃自貌其夫額準眉目耳輪郭倩輔兩顴重頥粲齒綘唇晳肌黝鬢如其平生募工刻畫而私潤飾之然工得形似耳意態風度溢於雕繪粉墨之表則節婦情屬神解會手應心得十五焉既成大哭曰官人今果如生矣且酒炙饗之自是日必薦語必告事必禱盥櫛湯沐昏旦寢興裘葛更襲無異生人之奉十五年一日也夫感通之實精誠之極也節婦于夫誠積而思專夢耶寤耶而目若見之而耳或聞之家衆老稚駭而走相告曰木官人汗簌簌下矣又相告曰木官人舉褎指揮矣見婦人口語張其舅謙木強人也恚曰兒乃馮為厲耶亟取火之節婦無可奈何大慟曰吾長已矣由是食則祈死泣必淚血黯爾鬱悒以終節婦死時年五十一以伯氏淞子升嗣淞好文與豫善故為序列之著于篇論曰婦以節事夫義也然時遇邅迍全于堅忍機來眇忽貴于決從決從俄頃而堅忍將終身焉故節一也惟時與機難易懸矣是故江漲待符貞薑溺旅舍斷臂王婦決惡疾偕老宋女貞早寡終養孝婦義自刑全節梁行高浴室畢命隂妻壯殘形顯操魏婦激投崖軿死二竇勇血書清風王婦烈禮殿血象談婦靈是其節何可軒輊而難易自非一律也故仲由結纓王蠋伏劒概之北庭十九年不屈之臣同一節爾而子卿險艱倍十百矣節婦亦云悲夫四烈吳國倫四烈其三郡人其一蜀人而郡人姬也俱生嘉靖間也先後以盛年從其夫死豫竊心異之喬木之詩説者謂文王化行江漢即女子能以禮自守豈四氏能風於詩乎夫四氏皆處身貧賤家生無所師死無所激第自信其從一之志巍如泰山不可動信如四時不可移曾不知有後名也奚啻賢於遊女之自守者乎至如劉中壘范宣城所著稱方斯或有遺憾矣夫徽美不殊而世典或漏君子猶愍焉乃豫産同其鄉而覩聞其事甚著寧能使之溘死無傳也即閭巷何以風作四烈傳石瓊秀豐樂里人郡諸生石漢女生嘉靖丁酉自少性剛烈與羣女居抗志自好不習為冶容甲辰聘州人張經世乙卯經世病卒瓊秀聞訃悲咽毅然欲奔喪父母力挽之不可比至經世家一哭幾絶徐強起上堂拜舅姑曰不幸不及事吾夫猶得為吾夫事二尊人即張家婦無他志矣遂留喪次不去其後父母屢迎之舅姑亦以貧故屢勸之歸瓊秀並以死誓弗聽稍迫之輒欲引刀自決自是宗黨內外無復敢有奪其志者張氏故微而經世父方困諸生不能自給未幾父又病死瓊秀獨與其姑自相弔即并日而食不言飢易衣而起不言寒竟癯然骨立至庚申三月嘔血死豫考列女傳其以未嫁稱高節者僅羅女靜翟女素也然靜之不嫁為父報夫而素之死夫為見迫於賊皆有以也乃瓊秀則何以哉夫執禮奔喪甘貧誓死此其志蓋可以貫金石而與日月爭光即羅翟二女難之矣經世又名化豫少嘗師事之從二姑為宣化里人從必達女適趙璁兩家皆田舍兒曾不聞醮誡語乃其居室倡隨油然天性鄉鄰賢之越六年璁病且死目其妻而不能言二姑泣曰得毋以妾為念乎惟有與君同穴耳於是璁目始瞑二姑撫尸哭之屢絶其姑力慰不解誓以死殉姑因屬一老婢密護之二姑知姑意勉從之已葬璁舍東隅朝夕持漿飯哭奠焉聞者為之哽咽流涕未幾私告其婢曰幸善視吾姑吾夫待吾冥冥且旬日今得以身與之試黃泉蓐螻蟻死無恨矣語畢遂不復食尋以他事紿婢出即閉門解其巾經死室中姑與婢破壁救之無及矣死之日年才二十有四其姑哭之慟曰婦死吾兒也因舉其喪與璁合葬豫觀古烈女類為人所不亮而恐見汚至自刑其耳目鼻髮以示心若曰刑餘之人可釋也乃二姑一無所為而獨以有同穴盟慨然身赴之惟恐失期即賈生所稱烈士殉名未必若是勇也此之為節不已難乎太史公嘗悲巖穴之士名堙滅而不稱嗟乎巖穴之士猶有稱者而獨處身泥垢若所謂男而壻婢女而婦奴即有竒節不得負青雲之士以傳豈賤其人而羞稱之乎夫管仲父之舉寧戚也以婢知其詩周大夫有其婢賢為能忍辱甘死以全其主父母不可謂細行矣曾不得少概見至如翟家婢青死其主女即因主女見烈由古及今其不得有所因而稱者又何可勝數乎豫所聞里中莊八兒死節事竊不勝其悲矣八兒郡富口人莊寧女寧父祖三世為莊家奴遂冒莊姓八兒年十六嫁劉學良學良亦人奴子越一年病卒葬舍旁八兒執喪甚哀日舉案進食哭奠于墓屢絶復蘇久之為舅姑所厭欲嫁之八兒以死拒又數月有少年傭耕者見八兒悅之求為贅壻其舅姑業已納聘而使八兒母從臾之八兒自度不能抗佯許焉傭遂為期以請至期八兒與其姒方晨舂私謂姒曰明日不相舂矣姒不解其意少選又與姒易簮曰他日見簮毋相忘也姒益疑之至暮忽改新粧出拜舅姑舅姑不知其訣也以為將受壻而喜之須臾入室自縊死夫八兒以人奴子為人奴婦至微賤矣又年少質弱即依違其舅姑非有門閥可損保訓可辱也顧獨視再適為汚而甘死若飴兹不凛凛丈夫女哉彼以富人子而有文君名人子而有文姬豈得與八兒論貴賤哉語云金生沙礫珠出汚泥信矣信矣艾姬者蜀之什邡縣人艾榮女吾友陶弼令綿竹時納為小姬初陶娶于黃無子而善妬嘗納吳氏姬生一子且數嵗黃陽愛之因勸陶再納黃氏姬蓋黃姬即其兄女性悍而有妖態計納之足以薄吳寵而危其孤也陶尋攜兩姬之綿竹果不相能無何黃亦往助之初入廨即撫吳姬子陽泣曰久不抱兒兒瘠甚豈小婦不善視兒耶陶信以為愛也遂不復有他虞會兒有微疾陶適役于外二黃隂賂醫鴆殺之且目吳姬曰尚能恃兒近吾夫否已陶知兒死二黃手而莫如之何第遣與吳姬俱歸吳姬遂見逐為農人婦矣故陶得乘是時納艾姬艾姬年始十七端好寡言笑有寵於陶後陶遷姚安别駕攜艾過家與二黃異居二黃竊恨之已陶又坐事貶閩閫參軍獨攜艾姬往黃愈不能平嗾黃姬往制之比至則艾姬退處一室曰寧絶吾進御毋寧使官廨有惡聲汚吾夫名是時陶己踰五十無嗣自憤為妬婦悍妾所厄鬱鬱成疹死黃姬恬不為哀第自括其裝中資為再適計而獨艾姬抱尸撫棺哭七日七夜不食而死死之日屬其從者曰吾從夫子地下無恨矣幸焚吾尸裹吾骨以歸庶幾祔夫子之餘土藏焉從者如其言以骨從陶櫬還至家黃猶妬未巳大罵曰婢子安得祔夫尋瘞其骨壞垣下且徑其上曰婢子安得有冢乃所謂黃姬者業已不用命而自嫁夫矣嗟乎悲哉艾事陶未久且非其正御也而能慨然以死殉可不謂貞乎彼婦之妬不有其夫而忍於翦其嗣又何有於殉夫之小姬也後三年黃以惡疾死又二年郡牧楊仁甫始遷艾姬與陶合葬而為文祭焉明文海卷四百十三
