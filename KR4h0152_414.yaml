body:
  text: 明文海卷四百十四餘姚黃宗羲編傳二十八列女書張貞女死事歸有光張貞女父張耀嘉定曹巷人也嫁汪客之子客者嘉興人僑居安亭其妻汪嫗多與人私客老矣又嗜酒日昏醉無所省諸惡小往往相攜入嫗家飲酒及客子娶婦惡小皆在其室內治果肴為歡宴嫗令婦出遍拜之貞女不肯稍稍見姑所為私語夫曰某某者何人也夫曰是我父好友通家往來久矣貞女曰好友乃作何事若長大若母如此不愧死耶一日嫗與惡小同浴呼婦提湯見男子驚走遂歸母家哭數日人莫得其故其母強叩之具以實告居久之嫗陽為好言謝貞女貞女至則百端凌辱之貞女時時泣語其夫令謝諸惡小復乘間從容勸客曰舅亦宜少飲酒客父子終不悟反以語嫗輒致榜掠惡小中有胡巖最桀黠羣黨皆卑下之從其指使一日巖衆言曰汪嫗且老吾等不過利其財且多飲酒耳新娘子誠大佳吾已寢處其姑其婦寧能走上天乎遂入與嫗曰小新婦介介不可人意得與胡郎共寢即歡然一家吾等快意行樂誰復言之者嫗亦以為然謀遣其子入縣書獄嫗嘗令貞女織帨欲以遺所私奴貞女曰奴耳吾豈為奴織帨耶嫗益惡之胡巖者四人登樓縱飲因共呼貞女飲酒貞女不應巖從後攫其金梳貞女詈且泣還之貞女折梳擲地嫗以已梳與之又折其梳遂罷去頃之嫗方浴巖來共浴浴已嫗曰今日與新婦宿巖入犯貞女貞女大呼曰殺人殺人以杵擊巖巖怒走出貞女入房自投於地哭聲竟夜不絶明日氣息僅屬至薄暮少蘇號泣欲死巖與嫗恐事泄縶諸牀足守之明日召諸惡小酣飲二鼓共縳貞女椎斧交下貞女痛苦宛轉曰何不以刃刺我令速死一人乃前刺其頸一人刺其脅又椓其隂共舉尸欲焚之尸重不可舉乃縱火焚其室鄰里之救火者以足蹴其尸見嚇然死人因共驚報諸惡小皆潛走一人私謂人曰吾以鐵椎椎婦者數四猶不肯死人之難死如此貞女死時年十九耳嘉靖二十三年五月十六日也官逮小女奴及諸惡小鞫之女奴歷指曰是某者縳吾姊某以椎擊吾姊某以刃刺吾姊嫗罵惡小曰吾何負於汝汝謂姑殺婦無罪今何如嫗尋死於獄貞女為人淑婉奉姑甚謹雖遭毒虐未嘗有怨言及與之為非獨亢然蹈白刃而不惴可不謂賢哉夫以羣賊行汚閨闥之間言之則重得罪不言則為隱忍抑其處此尤有難者矣自為婦至死踰一年而處汪氏僅五月或者疑其不蚤死嗟乎死亦豈易哉嘉定故有烈婦祠貞女未死前三日祠旁人皆聞空中鼓樂聲祠中火炎炎從柱中出人以為貞女死事之徴豫來安亭因見此事嘆其以童年妙齡自立如此凜然毛骨為竦因反覆較勘著其始末以備史氏之採擇徐貞娥陳有年貞娥上虞人也父諸生三暘字邑葛之泰泰殤娥聞問即於邑小樓雉經父母排闥入稅之得無絶則亟請赴喪衆格不遂遂衣大練自閉一室矢靡它間值家慶諸姑姊固邀之出娥愴然固拒曰繄不祥人也行將焉如父母夙庀奩飾間陳諸左右輒又愴然循其袂曰身已縞素矣直棄不視忉忉乎恤恤乎逾二年不解顔已而名家多慕從之媾者語稍稍聞娥娥大恨曰天乎身不獲蚤決致滋紛紛也齧其臂至糜始娥自聞訃隱閔湛痛日侵尋以病至是革竟骨立卒厪加中殤一嵗耳嗚呼脰之繆猶可稅也五內之繆不可稅也其歸一死也泰父諸生烶臨泣曰娥果為兒死矣合言諸三暘三暘歸其柩曰女志也嗚呼難矣古之為教者不輕貸人於死亦不重以死律人曰國君死社稷大夫死衆士死制乃若婦則曰夫死稱未亡人曰從一而終如是而已其在未為婦抑異矣戴記有之取女有吉日女死壻齊衰弔葬而除夫死亦如之又有之女未廟見而死歸葬於女氏之黨兩者明著之禮文可考雖然是果盡於人情而無所置隆汚損益耶否耶迹徐娥所操執同耶異耶易曰君子以致命遂志魯論曰匹夫不可奪志也志回則禮從釋之志端則禮從節之志純摯則竭情歸質而自致於天自致於天也者天之所不得違也而聖之所不得制也教之所不得束也文之所不得傳也嗚呼難言已難言已或閨閣而進於君子或章逄而非夫或荏苒而能遂或軒然自雄而易奪聖人之取舍宜何如哉童汪踦之死仲尼曰能執干戈以衛社稷雖欲勿殤不亦可乎聖人之教其不為不可繼也津津乎其許人以志而樂成人善也徐娥生不識兩髦然身殉焉而後瞑葛之宗未嘗告逆婦然窆兩鮮而後無憾余嘉娥以一藐殤女能用其志為世教重不宜泯泯乃為傳而論之曰若娥者加於殤禮而合之墓亦可也又曰娥高祖為聘君文彪葛生則大理卿浩曾孫也兩君當豎瑾時俱有大節娥不辱云二貞陳有年余少時則見世母家蓋三嫠嫂云繼重以仲氏孤之婦聚室茹荼門無偶迹亦人道之極恫也轉轂數紀諸嫠暗然蓋棺余重愍之宗父老言三嫠娣姚賢矣而仲姒李最蚤寡無間然余托其可論者聯為傳列家乘焉李貞婦者有智妻邑薑山李女也年十八而歸逮姑周媪歸一年子啓恩生啓恩生之嵗先中丞則備兵松州顧諸猶子曰有智願遂以智往往無何病且亟中丞公泣而撫之曰毋憂婦婦名家子當有固志有固志繼而絲枲立而孤則惟我在乃歸其喪而貽書先淑人謂周恤若有智婦如所謂有智者旨李氏哭稍蘇泣言大人豈以是堅我哉微大人寧當二心者遂稱未亡人以終李為人沈摯少言天然絶色笑亦未嘗菀蹙見所難堪渾渾默默家人見者盡以為古太朴也日夕紡絍撫所生子駸駸長中丞公歸呼啓恩共余學聘周媪宗氏女己而比嵗遭伯李喪中丞公之不祿火作諸居室悉燬焉周媪繼卒李雕落益甚先淑人起煨燼餘割旁舍二三楹棲其孤娶所聘婦扃戶與俱作即晝日過者寂不聞人音第時見壁間炊煬或軋軋紡紗聲始覺其有人也曰嗟乎李貞婦能帥其新婦一至此乎咸歎息又數年啓恩能授童子業先淑人復佐以址數椽草草營棲婦尋舉子李亦未嘗解頥如故操久之卒距始嫠三十四年年五十有四而其卒也娣姚貞婦哭倍哀以同憂患故姚貞婦者智弟有容妻也父家上虞曰姚經歸時年十六生一子啓英未晬而有容卒姚年視李寡差長然二十九耳先一年伯氏有常亦卒一子甫齔及是則周媪子盡矣媪耄且病三嫠婦相弔持藐諸孤纍如也居室災伯姒洎姚附同堂者構寢寢厪厪施椽未落會有周媪之喪同堂有惑於禨祥者議毋內媪肂三嫠婦環而哭哭己姚奮曰義不以惸惸故詘損姑喪遂身負尸呼二姒掖我直趨寢所既置尸復環而哭倡議者愕然至辟睨哭甚哀則義格且業已在寢遂不復言姚癯弱呐呐如不能言即言氣如不能屬然鐵靣凜凜望而知其節也啓英幼而孱甚時時病欲不生姚劑杯棬噢咻鞠之苦心特至居常泣謂英若父一線脈安在吾忍死待若若不慎自立吾瞪目死矣即英勝冠且有室猶然若始稅襁也姚持家治於丈夫第亡論攻苦纎嗇乃官私出入直用臆為計簿嵗時會稽䦱門授子弟凡目傾臆如貫無爽者初時疏糲不屬季年稍稱囷羡粟篋羡布孤壯且蒙成焉有孫二皆聘乃卒距始嫠三十七年年六十五伯氏先姚三年卒季貞婦子啓恩亦蚤世所娶周媪宗氏女二十八嵗而寡頗漸二貞風力貧長二孤無他先姚二年年未五十卒論曰於乎余觀於二貞而重傷世之多佻也自中古以還揭名教以厲俗興恥詎不較著於乎一何佻者之多也二貞起村閻襁呱呱不意全之孤持與俱立初曷知名為何物卒亦曷嘗沾沾自喜哉蓋性固然矣名之持人其流使人沾沾自喜而不得反其真然而茍出於不佻君子貴之况出於真哉任烈婦王邦才烈婦姓杜氏邑人杜薰女寧州刺史鄉賢杜公之孫也適庠生任堵子自立僉憲鄉賢任公之玄孫也烈婦天性聰慧克勤女紅自立家不饒裕烈婦以辛苦自甘一日自立疾烈婦供侍湯藥甚苦蓋己幾半載矣疾篤烈婦即以死誓家人俱莫之知卒之日衆為殮事於庭烈婦在寢室中以刃自刎血流如注者半晌烈婦挺然坐床頭一足強持於地終不之仆衆覺而視之略無難色久之方伏枕蓋在甲午年四月二十六日也無論男婦童稚往觀如市靡不驚異有告於余余既信且疑遂弔自立請見烈婦烈婦即許余同翁兄至烈婦室烈婦端坐於床斂衣衾叩首稱謝視項下刀眼如桃大氣從此出而眼光面色依然一無恙人也原刃在床邊余曰苦烈婦曰不苦余曰痛烈婦曰不痛且曰夫死願不移時而往不意今己七日不死也蓋雖聲氣不壯烈婦以手自形視之皆會其意至五月初五日以手指棺欲就寢於內若得意遂志之狀再二日方卒自自立末卒以前至刎後以及卒其不食者先後二十日矣固正氣自持即不至死者天不令烈婦即死使衆得目覩其事以愧世之無節操者不然而一刎即死一死即殮未必人人聞而信之也况氣從項出食不下咽至二十日方斃不以為苦且痛者非曠世所罕見者哉至邦才氏曰士君子讀聖賢書繫綱常任尚有不能堅白其操甚至昧義偷生視烈婦為何如哉古人謂慷慨易從容難烈婦能慷慨亦能從容蓋難之難者也吁是可以風世以俟夫司竹帛者採焉歸烈婦歸子慕歸烈婦者太倉陳鼎彛之女崑山歸善世之妻也年十九來歸而善世年十八二年而善世死善世疾革語婦曰爾母寡居無子我即死喪畢爾自歸與母居養爾母婦泣曰妾無歸禮君即死妾將隨君善世竟死婦哭之顧牀頭劒拔劒欲自裁母抱持奪劒謂母曰兒必死業已許夫死矣自數宜死者四無子宜死年少宜死舅姑老異日無依宜死舅姑自有子奉養無須我宜死曰趣市棺我婦人死即殯不可露尸母守之三日夜謂母兒活一刻即一刻如刀刺願聽兒死侍婢以糜進不食則以置善世前曰君食則我亦食撫尸哭曰吾所以悲者非悲君也吾旦暮死將歡然見君獨吾母老無子嗣子又亡走於外惟吾與姊二人而吾姊者勢不能相收吾又且死使六十嵗之寡母窮無所歸是故悲也含尸以玉珥璫一自含曰九泉之下以此為信母見其志堅不可奪慨然曰女死不過一時痛耳吾旦暮之人適使我無後纍遂母子相對縫衣衾治殮具市棺善世死五日婦沐浴更衣出拜舅姑舅姑止之悲哀不勝其從大母毛節婦周氏十九嵗喪夫無子執志不移事姑以孝聞朝廷旌其閭時年八十舅謂之曰如汝從大母者新婦所親見也顧不足效乎奈何欲死婦曰人各有幸不幸而大人皆老新婦年少嵗月遙遙事變難料新婦何敢望從大母死決矣退而復自語曰吾今日惟知不紿夫以生何心為名母與姑皆毛出從姊妹也姑謂母曰吾兩人何至立視其死必止之母出棺釘盈握錚然擲于前曰視之女已如是而謂尚可止乎是夜婦自經於牀喉間聲如鋸母堅塞兩耳卧嚙被流汗它嫗救之復蘇張目視救者頻顣曰徒苦我我終當死明日日中婦寢以被蒙頭伺人去仍以被裹衣為蒙頭狀脫身縊死其辭舅姑也襲衰其縊以殮服時萬厯三十三年十月十四日也婦之初欲死也勸者曰盍從爾夫臨沒之言乎婦曰臨沒之言非夫意也去年里中某婦者夫死年少無子而獨自居守吾夫哀其志謂我曰不如速死夫固已命我矣善世為人質直無隱情每自知其短刻意自將輒曰我不知何自能好數為其婦稱古義烈事烈婦黃氏鄭之玄烈婦黃氏太史東崖先生族姑嫁豫姪泓泓歾遺四孤不三年皆續亡烈婦自經死家史氏曰古有之死易立孤難厥有幸有不幸焉烈婦之死於夫也蓋死於孤也烈婦夫殁之三年而後死於其夫之忌日者孤存與存孤亡與亡之義也夫殁而有孤也又有四孤也烈婦固念不至死而其勢亦將不得死不敢死及夫一摘再摘以至三摘之又四摘之三年之內四孤蕩然矣一孤亡復立一孤烈婦已矣無孤之可立矣無孤之可立則死之雖欲勉於其難而不得不就於其易故曰有幸有不幸也鄉使夫歾之日無一線之遺者烈婦必慷慨引決不俟今日始殺身以報夫子也故夫幸則嬰之存趙不幸則息之死奚齊其尤不幸則亡一孤復立一孤﨑嶇圖存而卒無所濟則相死於崖山之海也烈婦乃類之悲夫烈婦死於九月草九日沐浴結束闔戶投繯癸亥泓死之日也用其夫故時靈帛即其日為異時釃酒之享從容審處死不忘同食也年三十八不得旌而力微亦不能鳴之有司余竊悲夫窮巷之户緯蕭之媪其有奇烈奇節泯泯齎志不聞於人如余家婦者何可勝數故私傳而藏於家贊曰死夫死孤志無有二用夫死日故帛一縊決絶成仁從容為義勝彼古人刮髮截鼻蕩子婦戴士琳蕩子婦者故儒家女也生而婉孌便娟間其父教自女紅外傍及圖史琴奕諸藝皆絶里閈習聞其美且賢父必欲得良偶而後字之會富人某者通于婦之鄰姥因賂姥使譽某子甲之才因致求姻之意母豔其富遂字某子甲未踰年富人死某子甲悉發其父藏為長夜飲一切狗馬踏踘摴蒱狎邪之好畢集遂掃其父資婦父兄故以舌耕無厚産可資壻某子甲從故酒徒逰諸酒徒業睥眤之歸而婦不善也日夜向隅飲泣某子甲不能堪自惟此身無所寄將遂作溝中瘠乎方躊躇間遇故酒徒故常鶉衣乞食于某子甲者俄而怒馬鮮衣掉臂于市某子甲低回羡之方逆縮不敢見酒徒從儔衆中攬其衣絶叫曰公乃一寒如此哉某子甲慚不忍告已而徐吐情實故酒徒撫掌大笑曰愚哉余貧寧出子下一旦有此秋毫皆主人力也子謂季布衛青非夫哉子誠一俯首猶可恣睢令人不敢正視又何論飢寒乎某子甲起再拜謝曰謹如教第不識所從曰方今邑中最赫赫人耳目者子試思之某子甲默然良久曰得非某公乎曰是矣是匪藉父兄靈也彼别有霜露在握視縣令丞家監耳可頥指使也每談一事發一箋即千金立至子誠能得幸某公蒙虎之皮橫行里中朝夕倚醉歌樓縱橫如意或微有睚眥則吾黨羣出噪呵之其人且韲粉矣何似爾婦翁齷齪青衫搦三寸管以石田糊口哉某子甲仰天狂笑以為遇子晚因相與連袂踵門見某公某公方張筵燕客不得見留宿故酒徒家夜分酒人起蹴其枕曰子休矣我視爾無一長足録徒龎然食粟耳為我主人僕者率多技能或美少年可狎者子自度何技可當吾主而往乎有則我見若于公不能子休矣某子甲垂首喪氣嗒焉如不欲生因長跽問計于酒人酒人故沈吟久之應曰得之矣我聞子妻甚麗而才子誠飾妻以求幸富貴股掌間耳某子甲曰我不難身為僕妻為奴獨惜老大不從奈何曰子又愚矣子在而妻焉往且子憂公不納耳公欲之疇敢抗者乃見某子于公因圖其妻之貌以進公大悅立召某子甲使召其妻某子甲意其婦翁必且梗命挾其羣數十人往揚揚從里門入婦翁果大驚徒跣號天而泣曰嗟乎子之無良一至是乎父子自度不能得之于公必不能得之于監司守令抱女欲絶者數四使婦飾膏以往婦乃從容顧父兄曰何慮之深也兒豈以此生纍父兄哉第令人戒車徒兒且膏沐以待詭其父兄出扄户自經死死三日某公方據胡牀對客忽覩一麗人自稱某人持匕首刺公中左肩因大叫伏地須臾覺左肩隱隱作楚及旦成大疽竟以不起野史氏曰悲哉蕩子婦之死我未敢謂節俠也彼特粗知禮義羞為臣妾計畫無復之耳其去溝瀆之經幾何獨悲某公之豪華豈不能千金買駿而逼其故人女供奴婢至令抱恨以沒傷哉彼婦之父兄身厠衣冠尚隱忍不得白何論含寃于蔀屋者耶李翠翹戴士琳京口娼曰李翠翹者貌可中上機頴絶倫甫及笄即負超然逺舉之志歙有羅生者自新安之燕道出京口邂逅翠翹翹即心許羅生生不知也既逾年島夷橫行江南所過殘破生還自都已失翹迹矣方奔走南北落魄貧甚時胡大司馬鎮越生往依之胡特衆畜生居嵗餘生遮説胡曰公所部材官良家子俱越柔脆之夫聞島夷腥臊自潰誰能陷敵也江淮間故多亡命販鹽鼓掉出入洪濤陸行持矛握槊不避生死此可當吳兵十百之用不佞習其渠魁一呼可致三千人公能假我萬里裝募致其豪傑使將而南即區區島夷如疾風掃殘籜耳公大喜立授三千金使渡江而北生盡以付昔時酒徒博人不逾月裝立盡自度不能見公則走分宜相胄子幕下乞一緘負荆而還公素習分宜公子度不能奈何生姑含之詭謂曰爾能從我麾下立一竒節數千金不汝問也生負慚矢口應曰諾願蹈湯火以贖前罪時倭酋曰徐海曰汪直者角立以畸扼東南公既己挑怒之兩酋者內不相能而外尚合公欲先誘海以釣直但未得人如酈生陸賈者因思羅生能以口舌動我脫三千金寧不能以口舌動海使內附乎此辨口可使也遂遣生使説海生既至海巢則踞上坐為陳説利害海意殊不為動撼羣鹵縳生下露白刃臨之生鼓掌而笑顔色自若海意解復延生坐稍稍肯赴胡軍而疑信且半姑試生曰汝能留質吾軍我單車見胡公乎生曰幸甚海大解頥與生痛飲期以旦日日中往抵暮而還囑其黨曰我暮不還則醢羅生發兵救我比旦海果行生留為質日既晡海留酌胡公所大酣暢不時返羣倭競來縳生刃加于腹生自分必死矣俄聞壁後叩門甚急衆皆蒲伏聽命則一少年女子亭亭立户下叱曰爾曺何須臾不能忍也假令主還欲得生羅生爾曺能續其頸耶主果不還羅生几上肉耳何煩此張皇呵叱也衆皆唯唯袖刃生竊瞷之則李翠翹也因叩首乞憐翹為吳音以對曰子無憂異類我將脫汝生又叩頭謝不殺恩因此知翹蓋被虜島夷已得幸徐海矣無何海歸大善胡公意遍諭諸酋使釋生縳然海卒無還生意也居旬日海忽遣使送生還生心知翹意特無從考鏡惟有涕泣銜恩而已以此胡公亦善御生留之幕府生又挾分宜公子勢恫嚇之居然為重客矣嵗餘公搗海巢縳海翠翹亦在俘中謂生且當活已所以乞哀萬狀生卒不向胡公出一語翹竟死于市臨刑仰天大呼曰李翠翹誤識羅生而負徐海死真晚矣乃知海昔日之從降翹與有力也野史氏曰徐海以狂豎煽禍東南國家蓋詘數萬金錢供戰士僅乃降之而不能勝翹枕上一語此其功當録即貸一死不為過也奈何羅生忍人不為翹乞哀令泯泯以沒余聞此事于金陵人陳岱華憐其無聞為傳之其後分宜敗羅生不免伏法天道蓋不爽哉明文海卷四百十四
