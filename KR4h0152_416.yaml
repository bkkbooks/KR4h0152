body:
  text: 明文海卷四百十六餘姚黃宗羲編傳三十方技滑攖寧朱右攖寧生出滑伯後名夀字伯仁世為許襄城大家元初祖父官江南自許徙儀真而夀生焉性警敏習儒書于韓説先生日記千餘言操筆為文辭有思致尤長于樂府京口王居中客醫儀真治方脈術有時名夀數往叩之居中曰醫祖黃帝岐伯其言佚不傳世傳者唯素問難經子其習之乎夀遂受之既終卷乃進請其師曰素問為説備矣篇次無緒錯簡不無愚將分藏象經度脈候病能攝生論治色脈針刺隂陽標本運氣彚萃凡十二類鈔而讀之難經又本素問靈樞之旨設難釋義其間榮衛部位藏府脈法與夫經絡腧穴辨之博矣而闕誤或多愚將本其旨義注而讀之何如居中曰甚矣子之善學也善哉子學之得其道也豫守師説者子識卓理融契悟前訓子過我矣他日以醫名世其子也邪自是夀學日進益參考張仲景劉守真李明之三家而大同之攄其所得投之所向莫不中肯綮既又傳針法于東平髙洞陽得其開闔流注方圎補瀉之道又究夫十二經走會屬絡流輸交别之要至若隂陽維蹻衝帶六脈雖皆有繫屬而唯督任二經則苞乎腹背而有専穴諸經滿而溢者此則受之宜與十二經並論乃取內經骨空諸論及靈樞本輸篇所述經脈著十四經發揮三卷疏其本旨釋其名義通考隧穴六百四十有七而施治功以盡醫之神祕他如讀傷寒論鈔診家樞要痔瘻篇及聚諸書本草為醫韻皆有功後學故其行有治驗所至人爭延致以得攖寧生診視一決生死為無憾生無間貧富皆往治報不報弗較也遂知名吳楚間在淮南曰滑夀在吳曰伯仁氏在鄞越曰攖寧生云生年七十餘顔容如童行步輕捷飲酒無算人有請雖祈寒暑雨弗憚世多德之其治法往往竒中人間能言之故記者頗多其徒日采表著者成編以傳其在儀真御史中丞班辰亦家焉其內人病艱于小溲中滿喘渴門僧寶頗知醫投以瞿麥梔苓諸滑利藥而閟益甚召夀候其脈三部皆弦而澀夀曰經云膀胱者州都之官津液藏焉氣化則能出矣所謂水中髙源者也膻中之氣不化則水液不行病因于氣徒行水無益也法當治上焦乃製朱雀湯倍以枳桔煎用長流水一飲而溲再飲氣平數服病己端君寶母六十餘亦病小溲閟若淋狀小腹脹口吻渴邀夀診其脈沉且澀曰此病在下焦血分隂火盛而水不足法當治血血與水同血有形而氣無形有形之疾當以有形法治之即以東垣家滋腎丸服之而愈三寶廉使仲子之妻泰不華尚書妹也病滯下晝夜五七十起後重下迫且娠九月衆醫率為清暑散滯痛苦尤甚夀至診視曰須下去滯衆以娠不肯夀曰素問有云有故無損亦無動也動即正産乃以消滯導氣丸藥進之得順利再進滯去繼以清暑利溲苦堅之劑病愈而果孕不動足月乃産童氏婦年三十每經水將來三五日前臍下㽱痛如刀刺狀寒熱交作下如黑豆汁既而水行因之無娠招夀診視之兩尺脈沈澀欲絶餘部皆弦急曰此由下焦寒濕邪氣搏于衝任衝為血海任主胞胎為婦人血室故經事將來邪與血爭作㽱痛寒氣生濁下如豆汁宜治下焦遂以辛散苦溫理血藥為劑令先經期十日服之凡三次而邪去經調是年有孕丘仲山女才八嵗病傷食煎煿內閟悶口乾居舌燥黑腹痛不可忍或以剛燥丸藥利之而痛閟益甚夀遂以牽牛大黃清快藥為丸以伏其燥利而愈天寧寺僧病發狂譫妄視人皆為鬼夀診其脈纍纍如薏苡子且喘且搏曰此得之陽眀胃實素問云陽明主肉其經血氣並盛甚則棄衣升髙踰垣妄罵夀以三化湯三四下復進以火劑乃脫然如故馬萬户妻體肥而氣盛自以無子嘗多服暖宫藥積久火甚迫血上行為衄衄必數升餘靣赤脈躁疾神恍恍如癡醫者猶以治上盛下虛丹劑鎮墜之夀曰經云上者下之今血氣俱盛溢而上行法當下導奈何實實耶即與桃仁承氣湯三四下積瘀既去繼服既濟湯二十劑而愈楊子縣吏陳某當臘月鼻衄至正月凡十三日始定其脈實而數治法與前證同蓋馬婦過服剛劑陳過食煎炙飲醇酒皆積熱所致也鄧千户二婢子七八月間同患滯下夀至診視一婢脈鼓急大熱喘悶曰此必死一婢脈洪大而虛軟微熱而小便利曰此可治即下之已而調以苦溫苦堅之劑果一死一愈張佛兒暑月患中滿泄瀉小便赤四肢疲困不欲舉自汗微熱口渴且素羸瘠衆醫以虛勞將峻補之邀夀至診視六脈虛微曰此東垣所謂夏月中暑飲食勞倦法宜服清暑益氣湯投三劑而病如失記其在儀真時所治若是什無一二焉至正間趙璉守杭州以同里知夀且邀之與俱過嘉興汪澤民病怔忡善忘口淡舌燥多汗四肢疲軟發熱小便白而濁衆醫以內傷不足擬進茸附趙彥博爭之未決固招伯仁至視其脈虛大而數曰是由思慮過度厥陽之火為患耳夫君火以名相火以位相火代君火行事者也相火一擾能為百病況厥陽乎百端之起皆自心生越人云憂愁思慮則傷心汪君平生志大心髙所謀不遂抑鬱積久致內傷也然抱薪救火望安奚能遂命服東垣補中益氣湯朱砂安神丸空心則進小坎離丸月餘彥博抵書云汪之疾瘳矣尹安卿妻妊五月病咳痰氣逆惡寒咽膈不利不嗜食者浹旬招伯仁診視其脈浮弦形體清羸伯仁曰此上受風寒也越人云形寒飲冷則傷肺投以辛溫劑與之致津液開腠理散風寒而嗽自安矣既之錢塘館郡守第時出治病即愈屬縣有不能治之證皆來就伯仁臨安沈君彰者病自汗如雨不少止面赤身熱口燥心煩輿來杭城舍客樓盛暑中帷幕周密自云至虛亡陽服术附藥已數劑伯仁診其脈虛而洪數視其舌上胎黃曰前藥誤矣輕病重治醫者死之素問云必先嵗氣無伐天和术附之藥其可輕用以犯時令邪又云脈虛身熱得之傷暑暑家本多汗加以剛劑脈洪數則汗益甚悉令撤幔開窗初亦難之少頃漸覺清爽為製黃連人參白虎等湯三進而汗止大半諸症亦稍解既而兼以既濟湯渴則用氷水調天水散服七日而病悉去後遍身發瘍疹更服防風通聖散乃巳其同縣陳元善病氣發則臍下築築漸上至心下嘔涌痛悶手足清喉中淫淫而癢眉本痛痠目不欲視頭不欲舉神昏昏欲睡而不寐惡食氣睪丸控引小便數而欠年未三十尫瘠若衰耄人劣劣不自持伯仁視其脈沈弦而澀曰是得之憂鬱憤怒寒濕風雨乘之為肝疝也屬在厥隂故當脈所過處皆病焉厥隂肝也張從正云諸疝皆屬肝素問云肝欲散亟以辛散之遂取吳茱萸佐以薑桂及治氣引經藥兼製回練等丸每十日一溫利之三月而病愈俞彥良亦臨安人病嘔血或滿杯或盈盆盎且二三年其人平昔嗜市利不憚作勞中氣因之侵損伯仁視之且先與八寶散一二日服黃芩芍藥湯少有動作即急進犀角地黃湯加桃仁大黃稍間服抑氣寧神散有痰用礞石丸其始脈芤大後脈漸平三月而愈彥良遂以此法治他人皆驗宋可與妾暑月身冷自汗口乾煩躁欲卧泥水中伯仁診其脈浮而數沈之豁然虛散曰素問云脈至而從按之不鼓諸陽皆然此為隂盛隔陽得之飲食生冷坐卧風露煎真武湯冷飲之一進汗止再進煩躁去三進平復如初杭妓有患心疾狂歌痛哭裸裎妄罵問之則瞪視默默其父母固邀伯仁診視脈沈堅而結曰得之憂憤沈鬱食與痰交積胸中涌之皆積痰裹血復與火劑清上膈數日如故既而左丞楊完者統苗兵守江浙民頗不安居會故舊陳性中王叔雨招乃挈家渡浙江往來鄞越居虞姚間最久人皆稱之曰攖寧生初叔雨寓錢塘病傷寒他醫至皆以為痓症當進附子持論未決其弟熙暘謁攖寧生曰舍兄病亟唯幾生忍坐視不救乎至切其脈兩手俱沈實而滑四末覺微清以燈燭之遍體皆赤斑舌上胎黑而燥如芒刺身大熱神恍惚多譫妄語攖寧生曰此始以表不得解邪氣入裏熱極甚若投附必死乃以小柴胡劑益以知母石膏飲之終夕三進次日以大承氣湯下之調治兼旬乃安比來上虞熙暘館于魏氏一日乘盛暑肩輿入邑途中吐血數口亟還則吐甚胸拒痛體熱頭眩病且殆或以為勞心焦思所致與茯苓補心湯生至診其脈洪而滑曰是大醉飽胃血壅遏為暑迫上行先與犀角地黃湯繼以桃仁承氣湯去瘀血宿積後治暑即安陸用和病惡寒發熱頭體微痛苦嘔下泄五日矣其親亦知醫以小柴胡湯治之不解招攖寧生診視脈弦而遲曰是在陽當溫之為製真武湯其親爭之強與人參竹葉湯進即泄甚脈且陷弱始亟以前劑服之連進四五劑乃效人始服攖寧生之賢于人逺矣余子元病惡寒戰栗持捉不定兩手背冷汗浸淫雖厚衣熾火不能解攖寧生即與真武湯凡用附六枚一日病者忽出人怪之病者曰吾不惡寒即無事矣或以問攖寧生生曰其脈兩手皆沈微餘無表裏證此蓋體虛受寒亡陽之極也初皮表氣隧為寒邪壅遏陽不得伸而然也是故血隧熱壅須用硝黃氣隧寒壅須用桂附隂陽之用不同者無形有形之異也魏士圭妻徐病寒為疝自臍下上至心皆脹滿攻痛而脅疼尤甚嘔吐煩悶不進飲食攖寧生視之脈兩手沈結不調曰此由寒在下焦宜亟攻其下無攻其上為灸章門氣海中脘服元胡桂椒佐以蘹木諸香茯苓青皮等十日一服溫利丸藥聚而散之也士圭守其法治之果效王宗祥之父年老病臍腹㽱痛其里醫為溫中散寒卒無驗宗祥固邀攖寧生往視脈兩尺搏堅而沈曰此大寒由外入也寒喜中下因為疝治宜在下加沈降之劑引入下焦數服尋愈陳伯英病肺氣焦滿攖寧生視之曰病得之多欲善飲且殫營慮中積痰涎外受風邪發即喘渴痰咳不能自安為製清肺泄滿降火潤燥苦辛等劑服之既安衆詰之曰是出何方書名何散飲生應之曰是謂混沌湯聞者皆大笑曰混沌湯有用也潘子庸得感冒症巳汗而愈數日復大發熱惡寒頭痛眩暈嘔吐卻食煩滿咳而多汗攖寧生診之脈兩手三部皆浮而緊曰在仲景法勞復症浮以汗解沈以下解今脈浮緊且證在表當汗衆以虛憊難之且圗溫補生曰法當如是為作庥黃葛根湯三進更汗旋調數日乃愈時淮南丞相方公分省四明聞攖寧生名禮致見之館穀留城中一日公壻戴穎仲以使事往奉化雪中且進冷食病內外傷惡寒頭疼腹心痛而嘔診之脈沈且緊時伏而不見曰在法下利清榖當急救裏清便自調當急救表今所患內傷冷飲食外受寒沴清便自調救表裏以桂枝湯力微遂為變法與四逆湯服之晬時服附子一兩明日則脈在肌肉唯緊自若外症已去內傷獨存乃以丸藥下去宿食後調中氣數日即安方惟益患消渴衆醫以為腎虛水竭津不能上升合附子大丸服之既服渴甚舊有目疾兼作其人素豐肥因是頓瘦損倉皇中召攖寧生視之生曰隂陽之道相為損益水不足則濟以水火不足則濟以火未聞水不足而以火濟之不焦則枯乃令屏去前藥更寒劑下之蕩去火毒繼以苦寒清潤之製竟月乃平復適方明禮寵姬新産受寒四肢逆冷脈沈弱亟令取向所製附子大丸三四粒餌之立效生曰不得于彼而得于此蓋用有不同耳丘彥材平居苦胸中痞滿憒憒若怔忡狀頭目昏痛欲吐不吐忽忽善忘時一臂偏痺召攖寧生視之當關以上脈溜而滑按之沈而有力攖寧生曰積飲滯痰橫于胸膈蓋得之厚味醇酒肥膩煎炙蓄熱而生濕濕聚而痰涎宿飲皆上甚也王氷云上甚不已吐而奪之法當吐候春日開明如法治之以物撩咽中須臾大吐異色頑痰如膠飴者三四升一二日更吐之三四次則胸中洞爽平復矣龍君澤分院餘姚其室張暑月中病經事沈滯身寒熱自汗咳嗽有痰體瘦悴腹臍刺痛招攖寧生至診視脈弦數六至有餘生曰此二陽病也素問云二陽之病發心脾女子得之則不月二陽陽明也陽明為金為燥化今其所以不月者因其所遭也陽明本為燥金適遭于暑暑火也以火爍金則愈燥矣血者水類金為化源宜月事沈滯不來也他醫方為製歸茸桂附丸以溫經而未進生曰夫血得寒則止得溫則行得熱則搏搏則燥復加燥劑血益乾則病必甚亟令卻之更以當歸柴胡飲子為之清陽瀉火流濕潤燥三五進而經事通餘病悉除龍君曰微生幾為人所誤矣宋無逸餘姚大儒也病瘧瘠損饘粥難下咽六十餘日殆甚攖寧生聞而往視之脈數兩關上尤弦疾久體瘠而神則完生曰是積熱居脾且滯于飲食法當下衆疑而難之藥再進而疾去其半復製甘露飲柴胡白虎等劑浹旬而起如故後四嵗無逸客昌國病頭面腫赤妨于飲食或進以薑附攖寧為製劑清上散火而愈無逸曰嚮得清涼藥以濟危急否則誤于剛劑矣德之不忘嘗以語人云夏思忠病胸膈脹痛心怔忡嘔逆煩悶不食情思惘惘不暫安目􅉩􅉩無所睹攖寧生視之六脈皆結澀不調無復參伍甚怪之既徐而察之其人機深憂思太過加之脾胃內傷積為痰涎鬱于上膈然也素問云思則氣結又云隂氣者靜則神藏躁則消亡飲食自倍腸胃乃傷其是之謂乎為製祛順丸服之旋復平和思忠曰吾疾諸治罔效始以為天下無藥兹服生祛順丸乃知天下有藥矣金丙病韓自行邀攖寧生往視之脈數而散體寒熱咳血痰生曰此二陽病也在法不治當以夏月死至立夏果死自行愀然曰攖寧生能知死必能知人生矣乎方德明七月內病發熱或令其服小柴胡湯必二十大劑乃愈如其言服之未盡二劑則升發太過多汗亡陽惡寒甚肉瞤筋惕乃固請攖寧生視脈微欲無即以真武湯進七八服稍有緒更服附子七八枚然後愈夏子韶妻始病瘧當六七月他醫以為脾寒胃弱久服桂附後瘧雖退而積火燔熾致消榖善飢日數十飯猶不足終日端坐如常人第目昏不能視足弱不能履腰胯困軟肌肉虛肥至初冬子韶謁攖寧生往候脈洪大而虛濡曰此痿症也長夏過服熱藥所致蓋夏令濕當權剛劑太過火濕俱甚肺熱葉焦故兩足痿易而不為用也東垣有長夏濕熱成痿之法當以此治之食日益減目漸能視至冬末忽自起下榻行步如故其姪夏仲儒因拘留赴海積恐怖心常惕惕如畏人捕之狀攖寧生視之脈豁豁然虛大而浮體熱多汗曰凡病得之從髙墜下驚仆擊搏留滯惡血皆從中風論終歸厥隂此海藏之説也蓋厥隂多血其化風木然也有形當從血論無形當從風論今仲儒之疾是走無形也從風家治之兼為化痰散結佐以鐵粉朱砂丸良愈鄭髙卿母倪病瘧寒熱嘔涌中滿而痛下痢不食年五十餘殊困頓他醫為清脾氣理中脘不效邀攖寧生視脈沈而遲生曰是積暑與食伏痰在中當下之或曰人疲倦若是且下痢不食烏可下方擬進參附生曰脈雖沈遲按之有力雖痢而後重下迫不下則積不能去病必不已其母弟倪仲權獨是之乃以消滯丸藥微得通利即少快明日復加數服之宿積腸垢盡去向午即思食旋以薑橘參苓淡滲和平飲子調之旬餘乃復王敬中母病翻胃每隔夜食飲至明日中昃皆出不消化他醫以暖胃之藥悉試之罔效敬中詣攖寧生言且固請往視脈在肌肉之下甚微而弱生揆衆醫用藥無逺于病何至不效心歉然未決一日讀東垣書謂吐有三證氣積寒也上焦吐者從于氣中焦吐者從于積下焦吐者從于寒其脈沈而遲朝食暮吐暮食朝吐小溲利大便祕為下焦吐也法當通其祕溫其寒氣復以中焦藥和之生得此説而喜起嘆曰其合于王母之症歟但王母大便不祕遂再往視専治下焦散寒以茱茰茴香為君丁桂半夏為佐服至二三十劑而飲食晏然生曰經不云乎寒淫所勝平以辛熱其是之謂歟俞德明嘗病傷寒經汗下病既去而人虛背獨惡寒脈微細如線湯尉不應攖寧生乃以理中湯劑加薑桂藿附大作服外以蓽撥良薑吳榝桂椒諸品大辛熱為末和薑糊為膏厚付滿背以紙覆之稍乾即易如是半月竟平復不寒矣此尤治法之變者也顧機仲病傷寒後勞復發熱自汗經七日或以為病後虛勞將復補之攖寧生曰不然勞復為病脈浮以汗解奚補為以小柴胡湯三進再汗而愈胡茂林子婦魏仲彬妹也新産二日惡露不行臍腹痛頭疼身寒熱當隆冬時衆醫皆以為感寒溫以薑附益大熱手足搐搦語譫目攛仲彬固邀生往診脈弦而洪數靣赤目閉語喃喃不可辨舌黑如炲燥無津潤胸腹按之不勝手蓋燥劑搏激血內熱而風生血蓄而為痛也生曰此産後熱入血室因而生風即先為清熱降火治風涼血兩服頗爽繼以琥珀牛黃等稍解人事後以張從正三和散行血破瘀三四服惡露大下如初時産已十日矣于是諸症悉平方明禮內人感暑病洞泄厥逆惡寒胃脘當心而痛自腹引脅轉為滯下嘔噦不食人以中暑霍亂療之益劇攖寧生診其脈三部俱微短沈弱不應呼吸曰此隂寒極矣不亟溫之則無生理內經雖曰用熱逺熱又曰有假其氣則無禁也于是以薑附溫劑三四進間以丹藥脈稍有力厥逆漸退更服薑附七日衆症悉去遂以丸藥除其滯下而臟腑自安矣生之活人率類此然頗有不盡述者生嘗語其徙曰余在儀真時聞友人王德全言江西有醫士曰黃子厚為術精詣其治往往出人意表有富家子年十七八病遍體肌肉拆裂召子厚治子厚偕門生四生輩往診視各以所見陳論皆未當子厚乃屛人詰病者曰童幼時曾近女色犯天真乎曰當十三四曾近之已子厚曰得其説矣禇澄云精未通而御女則四體有不滿之處後日有難狀之疾在法為不可療後果惡汗淋漉痛楚而死又鄰郡一富翁病泄瀉彌年禮致子厚診療浹旬莫效子厚曰豫未得其説求歸一日讀易至乾卦天行健朱子有曰天之氣運轉不息故閣得地在中間如人弄碗珠只運動不住故在空中不墜少有息則墜矣因悟向者富翁之病乃氣不能舉為下脫也又作字持水滴吸水初以大指按滴上竅則水滿筒放其按則水下溜無餘乃豁然悟曰吾可治翁證矣即治裝往翁家驚喜至即為治艾灸百會穴未三四十壯泄瀉止矣生自少識之後在鄞胡元望女生始六月亦病泄瀉不巳因教以灸即愈子厚在至治天厯間術甚行虞文靖公嘗有贈醫士黃子厚詩云史右曰豫幼善業醫遇醫士輒近之覩其治往往誤藥死若以試其術然豫懼隂殺人而莫之罪必不逭于天刑遂棄不復習襄城攖寧生夀能活人反掌間而竒驗若此時人為之語曰世以人試術生以術活人其相去奚啻千萬豫聞盧扁曰聞病之陽論得其隂聞病之隂論得其陽倉意曰吾以脈法治之而愈生其有得于二子者歟乘槎客陳謨客江浙竒士姓張氏字安國隱居玩易窮變極數别自玄悟值天下雲擾不能俯仰抹撒深自韜抑寄迹卜肆中假六書文推人禍福吉吉凶凶輒先處其時輒不爽所至座常滿適相遭建業相與論易其言曰易卦興而結繩廢為人文一初卦即書之形書則卦之畫而縱橫旁午曲折之中古由籕變篆分𨽻後世變楷行草則加之波戈飄瞥以就簡便爾實皆卦之支也吾第考書之文與數以起卦渙然契矣昔者聖人觀河圗以作易程子因見賣兔者以為觀此亦可畫卦不但河圗也然則何者不可卦乎書文點畫形象古今不甚殊而人心匠經緯布結疏密妍醜人人殊禮所云禍福將至動乎四體者書尤可驗吾數亦竒中以此吾遊藝于道其幾哉且夫崎􅋂厯落者遊俠之常態也麾斥汗漫者賢達之髙致也博望侯乘靈槎犯斗牛取天孫支機片石而還竒事竒事六合之外聖人存而不論政此類爾吾故自况曰乘槎客云僕行四方所見聞傳聞以易數名多矣皆並緣易理時亦弋獲皆未若客竒中者乃傳其事以覺來者贊曰聖人作易精可通神明之德粗可類萬物之情其用亦然矧幾者動之微吉凶之先見乎然惟可與神逰八極之表者為能與于此博望侯窮河源厯崑崙以超遙于銀潢天津世俗疑焉達者信之且嚴君平不嘗逰乎不然支機片石烏能識之哉後世如郭景純張茂先李淳風穆伯長輩皆嘗客槎上皆深于易者也若張安國氏知之者蓋寡矣世所知者徒藝焉止耳至若槎上之趣藝不足以云烏乎賢哉蔣先生童軒蔣先生名主孝字同揚之儀真人其先蓋出于周公之後子孫以國為氏自漢厯隋唐代有顯者至宋南渡有曰逺者仕金為尚書兵部郎中逺之孫安中官國子助教安中之孫應茂元初避兵淮南因家儀真遂為儀真蔣氏國朝洪武初有以史才薦者授翰林修撰以疾辭尋改蘭陽縣丞此先生之大父也厥考用文永樂中官太醫院使仁厚忠勤為當代儒醫巨擘名播一時兄主敬克紹前志亦官太醫院使先生生而岐嶷既長秀頴而發經史子書靡不涉獵負材器有用世之志嘗閲岐黃書撫而歎曰是豈不可以行道乎于是肆力于醫凡諸家方藥之集悉皆究而通之用藥則與越人華他相表裏由是請求者屨接户外經先生診視輒著竒效聲譽勃勃動京師京師薦紳大夫往往折節相下先生嘗曰人之有身肖天地之有形也天地以一元之氣橐籥于四時之間人以一元之氣榮衛于四體之大元氣壞于天地則星隕日食川溢山崩而天地若疣贅矣元氣壞于人身則耳目癃閉手足痿痺而人身若痀瘻矣天地人身一而已矣又曰善將兵者旌旗火鼓繽紛揮霍咸歸節度善用藥者參苓桂附錯雜兼舉卒著神效以正禦正以竒襲竒其端雖一其末則殊寒因寒用熱因熱攻雖合其始則異其終至于當汗而汗戰必勝也當下而下攻必取也故醫之用藥猶將之用兵又曰人徒知四時之脈有弦鈎毛石之異而不知有所謂七表八裏者焉人徒知九道之脈有代牢徑細之别而不知有所謂竒經八脈者焉故善醫者不于其人之肥瘠惟視其脈之病否而已又曰越人之醫如陽燧取火造化潛通莫知其故華陀之醫如泰豆之走木塗技巧百出孫思邈之醫如端人正士雖有疾趍不失矩度李東垣之醫如東風著物而生意寖回張仲景之醫如百步中鵠非巧力俱至者不足語此朱丹溪之醫如石潭明月雖有浮滓終是澄徹戴元禮之醫如青出于藍理雖自然亦由功到羅謙光之醫如新學舉子雜鈔衆説縱有論辨見道未真其論若此其醫可想矣先生以道自重雖尊官要人之門亦不輕售其術然其心則樂于濟人或值貧而疾者亦必以善藥應之所活不可縷數也性尚恬退喜談吐其論前史人才賢否成敗之迹如指諸掌作詩則效樊南集而酷似之工小楷書法識者謂其有顔筋栁骨蓋確論也至于醫術則其専門之業云贊曰醫之藝相之才也相以翕受敷施舉稱其職為能醫以俱收並畜待用無遺為任相得之以理天下醫得之以拯人疾事雖有巨細不同其所以夀元氣理血脈修內攘外一也若蔣先生者所謂良醫非與惜乎先生有道而不用于時也使為相者誠若先生之用心以施之而國而天下也不難矣惜乎先生有道而不用于時也王翁黃綰王翁良畫者也以輕墨淺彩作禽蟲蓏果華草間出山石林藪莽蒼幽岑或音或揚或憩或嬉或色或馨往往極妙尤妙寒塘野水拍泳朝暮之態又間作茅屋竹樹雲氣點逗人物灑灑益可玩於乎技耶臻斯也豫每見翁作人甚珍翁不惜不問其值多少受之否者亦受之可與輒不吝貧不顧耽耽若有事嗒焉似忘揮而迅注而留衆妙翕而翁之精神猶塵表也於乎此翁所為妙也可觀哉故為傳示其子翁諱乾字一清初號藏春更號天峯吾郡臨海人翁既死尺幅人罕之論曰昔庖丁解牛進惠文君以養生豫初不知其説既而觀王翁操觚染素始信有之天下事物多矣天機之動淵微矣故曰百姓日用而不知獨翁畫哉明文海卷四百十六
