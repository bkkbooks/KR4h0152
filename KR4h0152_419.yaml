body:
  text: 明文海卷四百十九餘姚黄宗羲編傳三十三方技日者蔣訓劉伯燮日者蔣訓蜀榮昌人也訓大父萬有以術顯蜀王王好飲酒為長夜之宴一夕忽大醉憑几而臥左右皆酣睡几跗故可移易遷轉者臥重而沈遂斷跗併折其齒王起大呼曰寡人何為有此左右皆起懊恨無已時左右從解曰莫非數也一從者猶記昔年榮昌日者蔣萬有故推有禄命曷取試之則已業稱某月某日某時應折一齒矣王起嘆曰術固至此乎神哉奇哉立候爽馳驛使榮昌召萬有萬有至則舘以華屋食以餘珍被以錦服自是凡一飲食一舉足必試問曰萬有云何云何成都市中一日萬有名滿四境矣後錫其子四掾皆充公家用季子竟得出身河泊所云萬有起家踰千金再傳至訓訓受大父學能一一通解其理不為游談滇屯察馬平徐公嘗語余曰訓隆慶間譚亷訪常熟徐公祿命一一如持左券亷訪甚神之名動公卿間萬厯丁丑秋余至滇聞訓名未之見訓亦不來謁余驛察松江張公召訓見言某日應遷轉果應是日轉言某日部檄應至亦以是日至初部檄之至也余與驛察方接杯酒懽謂余曰訓固言此日至耳余曰有是哉驛察瀕行間忽病不出者旬日召訓與語訓曰狀固已陳之矣取狀來閲果然訓確有大父風哉嗣是余與之語亦多奇中間有不然不逺矣天不足西北星辰西北移地不足東南以海為池司馬季主固已言之矣賈誼曰古之至人不居朝廷必居卜醫之中有味乎其言哉逸史元甫氏曰世言屈原卜居篇言詹尹執筴事以為徒寓言耳及讀伏羲八卦孔子演易尚象尚占尚辭又不信其為卜蓍事然則卜筮之作曷故哉如吾游寰中見蔣生訓者是可稱日者矣張平山先生朱安􅧔張平山先生者大梁之畫史也諱路字天墀世為聞家先生竒姿英發雋邁絶倫身軀短小而雙瞳烱然初習舉子業即于書案之上或課藁之末畫人物山水之狀弱冠考入郡庠為弟子員屬文雋永為時輩所宗爾乃清介持身忠義自許慨然有經濟之志既屢舉不第是以棄置舊學專精畫理觀古人之舊蹟遂能神解得其六法其氣運生動乃自得于天成也作人物山水花竹翎毛俱入神品始倣王諤之縝細人物衣紋用游絲筆後喜吳偉之豪邁山水樹石之飄逸而自加渾厚遂方駕前人自以名家也以膺例入太學其名傾動京師大司馬李恭簡公尤喜之延于賔館一時公卿貴游造之者無虚日也得其一幅數筆寳之以為珍玩焉先生欲覽勝探幽舒豁襟抱于是東游海岱登日觀謁闕里訪先聖之遺風南涉江湖躡金焦探禹穴慨時物之變態至于巖壑之嶔岑源泉之濤湧樹石之交錯禽魚之翔泳必凝睇久之乃展縑素黙坐搆思神㑹意到則揚袂而起落筆如造化之生物而無窮也先生既歸豹隠林藪布袍芒履逍遥物外未嘗以塵事嬰懐平生不樂造請足跡不至公門當路者欲得其畫必拜先生之廬先生亦不答謝嘗有監司以勢位加于光生欲得其畫先生避去之監司怒欲中以危法先生怡然俟之監司亦莫如之何也時過親友之舍人皆預陳楮墨先生劇談浩歌引滿舉白興到輙作一幅凡四方求畫者若韻人佳士無不應之有以貨財至者必却之嘗云畫乃士君子游戲翰墨耳豈可以貨取哉亳郡考功薛公蕙精于内典請先生畫佛贈之以詩云江夏吳生乆物故畫手人間無獨步爾来張子出大梁又見丹青照縑素奈何絶藝多自惜未許千金換真跡髙士飛揚不易馴貴人造請空無益遥聞病叟耽𤣥理為畫釋家兼大士貫休羅漢殊未工虎頭金粟真堪擬精舍安居伴白雲玉毫瞻禮對爐薫他年負入深山去應寫伽佗重贈君噫先生之為海内聞人之所推重如此也先生暮齒髙卧謝客年七十四嵗終于家焉余與先生居止接近氣味頗同乃以弱息妻其季子柯有忘形之契焉常與先生評品畫理至於夜分先生每嘆古今之畫賞鑒者絶少葢不能畫之人多而能畫者少故也且不識字之人必不能讀文章觀法帖不能畫之人豈能識畫哉間有天資之髙者不過觀其大槩而己至于用筆之老嫩開墨之清濁則不能盡知矣其運用之際若扁匠之斵輪庖丁之解牛有出于筆墨之外者矣嗚呼自先生之殁也余株守一室無復心賞矣每玩其遺蹟未嘗不興惠子知我之歎也其嘉遯之跡邁往之行余恐久而遂湮聊括其素履而為之傳云逸史氏曰東方朔為嵗星之祥李太白有長庚之兆詩云維岳降神生甫及申盖山川之靈異必産㧞羣之軼材昔我太祖髙皇帝削平元季之亂車駕至大梁望城外東南之繁㙮有王氣命軍士夷其巔使與城平嘗聞故老云有異人過而太息語汴人曰此塔乃狀元筆此地當生一狀元今秃其峯矣其生名畫手乎先生祖塋在塔之左遂鍾其秀而為一代之名筆雖使顧陸復生先生亦可居伯仲之間也鮑奕士侯一麐侯子曰古今論奕數多矣余獨愛班氏奕㫖而參以鮑君之奕葢天性焉鮑君以此游京洛名顯當世鉅卿大夫之文其游揚至矣余曷以言哉然余與君同里閈知君平生竊自以有闚而諸論者未備云夫鮑君奕遇敵絶矣然尤讓子其讓子以少擊衆始拙顧益竒初行往往為陣不求生道聴敵人環之也譬則全燕困即墨趙空壁背水旁觀者共危之然今之奕者類多竭外而罷内者也君用批亢擣虚之䇿設開户突圍之竒須㬰亡者存死者生庖丁提刀而躊躇工倕旋指與物化斯忘適者也四坐愕然變色嗟嘆曰藝葢至此哉君算勝什九不勝什一亦蟻空潰隄忽不容髪然其徒手震匈奴李陵之竒反旗鳴鼔走仲達諸葛之威孰知君不勝猶勝也豈肯從風而靡哉君懐沈澹飲醇啜醨陶然一醉有勝負兩忘之徳處人不辨涇渭黙而識之其游嵬巾博服華矣居家顧勤儉桔橰灌園察雞豚事其尊人惟謹諸弟窶貧君游所得百金盡散之此其孝友有足稱者昔毛公薛公藏于博徒賣漿者卒賴二人危言以感魏公子彼能為人謀者能自為者也以余所覩鮑君葢毛薛隠而有得乎藏用雌守者非耶嗟乎鮑君非奕士也馬又如何偉然馬又如諱某慕司馬相如之風流因字又如家金昌固婁東産兩浙三吳間有星術游大人號小喬者其祖也父某承大中丞郵命疲于車塵馬足死于燕大中丞憐之舉又如代庖于是吳楚燕趙之間又有又如蹟飛騎雲奔飽五方之霜露晏然自得不辱命以承先志窄衣小袖長刀大弓豪于五陵少年客訪二施君于雞鳴山寺二君津津談馬乂如又如名始布擅長鵾絃婁東絃索一道為海内絶唱本領婁東不得不佳客因慕之及遇諸山寺見其目光洞矚當是曉人遂捉酒促歌以慰所聞雨夜寒燭之際凄音悲調不堪多聽遲之白月吐山碧光流樹班荆席地清奏動人與雨夜若出二手矣方其絃手未附飛音流響之趣㑹之入意之先于是一奏情深宛然神遇或細如髮或溜如溪或如寉之唳松而濤急或如鶯之囀花而雨紛絲肉不辨宫商各安所謂絲不如竹竹不如肉到此無非自然矣寒樹為之支影孤鴻為之鼓寒即宋廣平鐵心且為之消鑠况有心之羇旅乎而不為之激而欲吐乎拈題賦贈倏忽成卷時六院爭髙于聲歌有沙姬者憐其聲偶以茗餉又如若不勝情西吳朱生有輕分小鳳團人易别月空圓之句諷之义如且以卑技無品每一曲罷必借文詞掩之若絲可斷竹可破及興發而好弄如常矣仙郎曰技到妙處皆足不朽何必騷詞倘李杜元白有可挾以自尊寧沾沾于韵字為獨恐爭長者才一拊絃手口自相胡越令人擊玉磬以清耳則不若扯幾句歪詩或可冒山人之名而掩技士之欵也至于青樓之目挑手語自是常局相如之于文君多少作用豈專在琴中一曲乎茗椀可欣則渴消亦易易事茂陵之病何取金莖露乎又如當自廣矣予願又如明月山頭一唱三嘆和子晉之笙驕孫登之嘯以寄其咸池洞庭之思無以三寸管揣元摩白以自愚也宋劉太常郭萬桯劉太常者名詵字應伯福清縣北里人也其先黄跡裏洋人宋初天錫大中祥符進士終大理丞知竇州再從之姪處約皇祐進士終殿中丞詵其伯子也熙寧九年進士厯莆田主簿知廬江縣崇寧元年置講議局以大樂之制不協博求知音之士詵通音律為講議檢討官三年罷講議司進軍器大理丞四年新樂成賜名大晟專置大晟府有典樂官詵嘗上歴代雅樂因革及宋制作之音故委以典樂事又言周官大司樂禁淫聲慢聲葢孔子所謂放鄭聲者今燕樂之音失于高急曲調之詞至于鄙俚恐不足以召和氣宋火徳也於音尚徵制不可闕臣按古制旋十二宫以七聲得正徵一調惟陛下裁取帝曰卿言是也五聲闕一不可徵招角招為君臣相悦之樂此朕所欲聞而無言者卿宜為朕典司之大觀頒大晟樂于天下及脩樂書政和班新燕樂新徵角二調已經按試者令大晟府刋行詵之所制也他日禁中出古鐘二詔執政召詵按于都堂詵曰此與今太簇大吕聲協命取大晟鐘叩之果應又曰鐘聲之無餘音不如石聲詩曰依我磬聲言其清而定也復取以合之益諧其時主講議司者蔡京領大晟府者京子攸也而主樂者方士魏漢津詵獨正樂于其間為難歴宗正鴻臚終太中大夫太常寺少卿時置禮制局故所著有續因軰禮其時元祐間海口鄭叔豹上宗祀明堂制及配享冕服之儀與兵器圖兄叔熊亦好談兵王安石有詩送之歸閩而言其低佪于詩書云其先皇祐進士林開為祕書給事所傳者五命祕訣一卷崇寧而後林摶者字圖南古屯人也鄉人目為九峰公或云舉八行入太學政和五年特科授楚州參軍不赴退隱于靈石之九疊峰好聲詩鼓琴有詩一卷琴譜三卷常學琴于皇甫道士道士却之歸至餘杭聞道士死涕泣嘔血不食曰嗚呼此音絶矣不逺千里返吊未入門而慟時道士無恙感其意因授之其性豪逸有以琴謁即攜出戸遇可意者即為一鼓帝三召入内為鼓悲風一曲帝惡其名而罷後改為碎玉葢帝性機巧多技藝修禮樂為彌文窮極淫樂佳兵喜禍天變民怨故鼓悲風其意深逺矣未幾北轅而為南渡紹興末林昌言字俞仲漁溪人也令惠安用日者張仁作漏室以天地相去凡八萬一千三百九十四里周天凡五十一萬三千六百八十七里日月循環㝠寞難測皆不逃乎涓滴為籌三十有八以騐晦朔弦望遲疾出沒無差毫釐亦博物君子也有張宏圖字巨濟場前人也精于星厯常謂宋禮多舛著大禮説及萬言書大槩言天皇神位不當在五帝下火徳當尊之祀大火當尊之星五官之神居壇上為非葢紹興熒惑數凌犯而多灾二年雖詔祀大火而其義未明也故詣闕上之焉自十九年金犯土宿占太子不安于是秦檜有動摇之謀二十八年閏六月丁已火犯木占冊太子有大赦明年始正太子名三十二年正月戊寅星行入太微垣占軌道吉天下喜有赦五月乙未木順行入太微垣占同旣望月重五輪六月太子受禪宏圖上書之次年復上書論太子星及皇嗣葢其末年也乾道五年縣之林栗為太常少卿乞祀大火詳在其傳中縣稱二太常為詵與栗也葢宋主火徳詵以樂請栗以祀請故宏圖亦言之矣慶元六年四月癸已火土合于室及火犯土占為憂大人惡之女子當之于是慈懿皇后李氏光宗皇帝繼崩嘉泰間宏圖復上書以慈懿太后攅陵在湖曲脩吉寺而湖上張樂宴游豈履霜露之義帝感悟沉御鷁于水時宏圖旣賜為保義郎又轉一秩旌之自是西湖絶清蹕之聲矣帝信羣小啟兵釁又兆北轅之基而幸以節儉不即敗故宋人之詩曰龍舟大半沒西湖此是先皇節儉圖二十餘年安靜裏棹歌一半在康衢宏圖之名因以顯矣有大全集其傳無聞摶傳漁溪市陳杰字希古市當置郵中多停驂問希古者乂有彌陀陳克勤善鼓瑟通韜鈐遁甲諸書而尤長于詩詞林文韜者字宗孟上井人文昭之弟也文昭能解經而文韜善星數嘗論史記與漢書皆稱太初元年丁丑歲而二説不同者史記顓帝厯漢書黄帝厯而有厯集其于摶宏圖並時先後無攷詵之弟詢為太學博士子彦適試别頭第一廣西經畧使知徐州彦適之姪孫潮判潮州沐為提榦潮之孫應東賓州教授皆進士北里後也而其族居海口鍾門什洋大湖松林者進士六人特奏二人武舉二人無有傳其業者居永東里招撫使同子死難于宋亡元有應竹字友直居縣西門廬母墓所居門楣及墓前石産芝焉武夷熊禾有詩紀其事葢居母喪盡禮有雙芝生墓側則自詵先之矣郭萬程曰夫言六藝禮樂大矣詵職太常固其任也嘉定間袁州教授孫禮輿作禮器圖記林䕶制分獻官及士服皆縣人于司存而謂之知禮矣葢詵世忠孝故獨著之焉王曉山何宗彦太史公曰聖王建國受命興動事業何嘗不寶卜筮以助善余讀其言而心韙之葢天下事有開必有先有株榦必有萌蘖聖人假卜筮以要潔于精神之微而逆睹其吉凶之兆如詩書所稱引左丘明司馬子長所紀載葢已彰明較著矣後世瞀儒失易之理而求之數昧蓍之用而索之影卦非無一二偶中而其言悠謬無所遵馮世人貿貿然不知所之往其日久矣余聞新安曉山王君善揲蓍往往奇中券之後日如目睹其子逵從余遊因得其詳而槖筆為之傳焉君諱顯祖祁門人唐兵部尚書金紫光禄大夫太獻公之二十四世孫也父宣母汪氏生君于正徳壬申幼穎異受易湛淫顓篤久之得聖人作易之指謂蓍神物也其所生獸無虎狼草無毒螫故聖人重之何後世廢而不占也遂揲蓍合繇辭以卜吉凶什不失一徽州故無白糧蘇人飛與之令尹尤君不忍民之重困偘然欲力爭迎君問卜君決其必濟令氣百倍正其籍倭由浙宼徽羽檄如雨邑民皆蒼黄欲竄山谷自免矣令尹錢君同文問蓍于君君得占喜見眉宇曰寇苐至界中不擾境内也令與民故信君遂安堵如故竟如其言孫令尹光祖治邑時㑹歲六月大旱一邑皇皇禜門漬龍不應令計無復之就君卜得需君曰孟秋四日大雨屆期風雷暴作四履霑洽大有年君所為卜葢有超于象外悟于繫表者惜其繇詞不傳假令筆之側理將與左傳諸繇及漢大横之兆熠燿千古矣邑之人至今詫君之奇感君之徳相率建特祠春秋肹蠁於無窮豈非司馬季主丘子明之流耶君清方不苟事母孝得其驩心待人有終始三令尹折節下之卒不干以私也遇恩例有司為樹棹禊旌其門卒於萬厯庚寅享年八十子逵精長桑之術有父風其孫曽未艾云贊曰王者代興皆重卜筮以決於天命賢如宋忠賈誼猶然簡賤之何也豈三令尹賢於二子耶葢功見言信著于丹青與邂逅立譚者自異耳嗟乎一布衣術數之㣲猶令人思之不已復戴髙履膴為人人造命則尸祝可勝道哉余于君重有感矣湯琵琶王猷定湯應曽邳州人善彈琵琶故人呼為湯琵琶云曽貧無妻門前有石楠樹一株構茅屋奉母以居事母甚孝㓜好音律聞歌聲輙哭已學歌歌罷乂哭其母問曰兒何悲曽曰兒無所悲也心自凄動耳世廟時李東垣善琵琶蔣山人獨傳其妙周藩有女樂咸習其技罔有善者曽徃學之不朞年而成聞于王王賜以碧鏤牙篏琵琶令著宫錦衣殿上彈哀笳十八拍激楚動人王深賞歲給米百斛以養其母曽由是名著大梁間所至狹邪爭慕其聲咸狎暱之然曽頗自矜重不妄為人奏後征西王將軍招之幕中隨厯嘉峪張掖酒泉諸地每獵及閲士令彈塞上之曲戲下顔骨打者善戰陣其臨敵令曽為壯士聲乃上馬殺賊一日大雪至榆關馬上聞觱篥忽思母痛哭遂别將軍去是夜宿酒樓不寐彈琵琶作觱篥聲聞者莫不隕淚及旦一隣婦詣樓上曰君豈有所感乎何聲之悲也妾孀居十載依于母而母亡欲委身無可適者願執箕箒為君婦曽曰若能為我事母乎婦許諾遂載之歸襄王聞曽名使人聘之居楚者三年偶泛洞庭風濤大作舟人惶擾失措曽匡坐彈洞庭秋思稍定舟泊岸見一老猿鬚眉甚古自叢箐中跳入蓬窓哀號中夜天明忽抱琵琶躍水中不知所在曽自失故物輙惆悵不復彈已歸省母母尚健索婦而婦已亡惟居旁坏土在焉母告以婦亡之夕有猿啼戸外啟戸不見婦謂我曰吾遲郎不至而聞猿啼何也吾殆死但吾死魂魄不即逝者以久不聞郎琵琶聲與郎一訣耳倘歸為我一奏于石楠之下曽聞母言掩抑愁痛不自勝夕陳酒漿彈琵琶于其墓而祭之自是不復彈猖狂自放日荒酒色值寇亂負母鬻食兵間其生平所彈古調百十餘曲大而風雨雷霆戰鬭與夫愁人思婦百蟲之號一草一木之吟靡不于其聲中傳之而尤得意于楚漢一曲當其兩軍決戰時聲動天地屋瓦若飛墮徐而察之有金聲鼔聲劍弩聲人馬辟易聲俄而無聲久之有怨而難明者為楚歌聲凄而壯者為項王悲歌慷慨之聲别姬聲䧟大澤有追騎聲至烏江有項王自刎聲餘騎蹂踐爭項王聲使聞者始而奮旣而恐終而涕淚之無從也其感人如此曽年六十餘流落淮浦有桃源人見而憐之載其母同至桃源後不知所終軫石王子曰戊子秋予乞食遇曽公路浦已不復見曽曩者衣宫錦之盛矣明年復訪曽曽在土銼中作食奉匕筯于母人爭賤之予肅然加敬焉曽仰天嘆曰世鮮知音吾事老母百年後將投身黄河之岸矣予凄然許曽立傳越五年乃克為之嗚呼世之淪落不偶而嘆息于知音之寡者獨曽也乎哉明文海巻四百十九
