body:
  text: 明文海巻四百二十餘姚黄宗羲編傳三十四仙釋尹蓬頭傳彭輅尹蓬頭者北地産也至元時為天慶觀道士其道牒以羊皮綴而尚存成化間遊南都髪累歳不梳南都人呼為尹蓬頭云尹得邸寓輙閉關卧多者踰月少亦五六日後起居常不飯人饋之食亦不辭嘗詣人㑹漉麵餉客約盌四十餘客戯尹曰公能盡之乎曰能須臾噉之盡孫㮚秀才曰某伯父接尹於市市有擔𤓰賣者某伯父戯之曰公能盡之乎曰能即買饋噉瓜立盡無餘也南户曹李員外乞予告一日辰刻尹見李僕於都門外僕曰命己下主人幸得告矣是日方午尹報李曰蚤見使者言己得告盍趣裝矣曁僕還質問果然則道里三千徃來特一飯頃耳人聞而大異之某御史當仲秋耗磨日命其隷召尹來隷曰昨昔之暮尹登大中橋觀月兩鼻孔垂涕尺許尹殆死矣御史笑曰此為鼻柱非老病也𨽻甫行而尹己扣門入盖知其召己也御史亦異之魏國館尹齋舍晝嘗隱几臥寤而語魏國曰適遊姑蘇洞庭山甚適也魏國愕不信即出袖中兩綠橘畀之時洞庭橘尚未至南也南都一貴人母敬事尹數數供衣饌甚䖍其所愛孫少未冠而病尫瘵諸擅醫名者悉告技窮母乃乞命于尹尹曰此非藥力所能為顧太夫人遇我厚不敢愛我十年功史肉此白骨也令直置兩榻夜與少年四足相抵纒縳仰臥尹鼔氣運轉喉嘑嘑有聲氣達湧泉貫少年足若大火然藏府支節間者舉體汗如雨注耗穢畢泄詰朝觧其縳而少年蘇蘇有生色別授圭七藥徐服而起王文成公守仁禮闈落第卒業南雍從尹游共寢處百餘日尹喜曰汝大聰明第本貴介筋骨脆難學我我從危苦堅耐入道世人總不堪也雖無長生分汝其以勲業顯哉文成悵然洛陽有野毛頭張姓者售偽誑愚自矜飾而以聞見該洽論說雄俊引重薦紳間客抵南都士人慕而爭趨軒車滿户外尹識其偽也敝衣跣而往謁隨輿隷尊稱之張方危弁髙坐側侍者肩摩傲岸不為禮顧罵曰乞兒辱吾教尹廼據東面坐而謂曰爾欲譚我耶張曰夫道難言頃談道者何如左慈之羊鳴安期羨門之觧形銷化且爾乞兒又奚知焉尹因刺之曰爾無我罵爾注悟真篇恐天下爾罵者無窮也張曰然則爾曉參同悟真耶尹張目朗音為抽廣成壺丘延厯度紀樞奥稍論叙柱下五千文曁内典華嚴㑩伽姬易艮卦彖爻三教渾合之㫖翩翻千百言衆驚異悚聼得耳所未聞于是始知尹之辯慧不群邃于元學也尹歸倚墻立自掌其頰數十恨猶有勝心且道非可言言則益與道逺因鍵扉寢伏久之終南黄山人過訪值尹睡正熟謂弟子曰謹以一芒鞋貽爾師我不能待別矣又數日尹起問曰有友人黄來渠何言弟子白所贈尹曰是期我逺去也無何逆閹劉瑾濳圖不軌惡尹私有詆斥羅而戍之關右尹至戍所偶過鐵鶴觀騎一鶴凌空飛去論曰嵇康謂神仙繇異禀受之自然非積學可企然禀異者鮮不學不學而何以合三教也又謂養生善調攝上可千餘歳則居常不食食而𤓰麵無餘非康所謂調攝也耶不然而何以能至元而宏正也我明以神仙著稱僅張邋遢冷子敬尹蓬頭三數人囘視雲籖一何寥寂張冷跡無可稽而南都人能歴歴道尹遺事故論著馬尹髼頭傳屠隆尹髼頭名繼先臨洮人目見徽欽北狩時事至元得禮部度牒為僧遇異人授以接命之術元末常乗黒驢遊燕雲間接命于真定遇羣盗奪其驢刀傷其身首遂入滇南山中避亂景泰中時往來荆襄陜洛間成化末過江西有宗室叩其術不答宗室怒杖之垂死令置棺中舁出生焚之尹宻告舁棺人曰死則死矣幸微露竅穴少便呼吸其人憐而許之及舉火空棺耳遊南都成國朱公見所佩元時羊皮度牒相與駭異知其年且二百餘矣正徳初太監賴義召至北京劉瑾時方竊權欲以威刼其術尹終無言瑾怒遂以妖言惑衆緝送法司議死司冦閔公珪止令招年九十免死押發原籍鉗束後於鐵鶴觀發土得鐵鶴跨之飛去初在刑部問官叩其術合用婦人否頷之而已或再三問之自言每一接命必得竒禍是獄也豈其餘殃乎對問官惟請死期略無懼色一食能盡胡餅數十酒數斗或數日不與亦未嘗告饑平居惟單衣袍隆冬不寒樵陽子傳孫繼臯樵陽子者蜀灌青城山樵子也本大足縣人姓雷氏方誕有踞而募於其門者父若母因呼之化緣化緣可二嵗父若母死安縣安縣民陳和養為子養十餘嵗陳夫婦亦死化緣孱然一孤童耳則托足青城山下童翁家童翁家乂貧無所得食則入山斫柴售灌縣人以活灌縣人持升米或碗許米市樵子柴盡一挑樵子不許也一日入山天大雨雪迷失道入山益深雪盈六七尺許所見惟髙厓萬丈古木架隂壑飛鳥都絶忽一老人鬚眉皓白手執拂子招樵子坐頃之乂一老人貎頎腹便便衣大䄂紫衣亦來共坐如是累月並有所指授其語秘不傳巳乃導樵子大樹下指而曰是中爾前身所托也坐樵子石上設十二拜禮甚恭號之曰樵陽子以故人皆稱樵陽子云老人旣去樵陽徘徊巖谷間往徃聞隔厓彈琴聲或人聲及跡之無有也結跏趺大樹下凡百數十日敗衣掩形頽然槁木采藥人遇而怪之佛耶仙耶頗以語灌縣人灌縣人轉相語羣走物色識為童家兒是兒陷雪窖一年久矣曷不死寒餓死虎狼乃作如是相事聞灌縣令令景某也駕而之山中臨問狀而所對班班應古記非童子口吻也自言吾前身在樹中令便使人斫樹樹轟然若雷震者火發其腹劃然開現委蛻焉髪垂額覆領指爪遶身其貌像則樵陽子也令驚嘆而返尋並蜕坐處得一石匣匣有文字亦秘不傳有布衲有鐵冠縧樵陽子以自有劔劔柔繞指今失所在其時令下教製龕奉樹中蜕築庵居樵陽子於是樵陽子之名一日而傾動州郡士庶競來瞻謁樵陽子遽能談人未來事又能巳人疾來者愈益多樵陽子避而匿安縣之天池山士庻則亦走天池趾相錯自鄉薦紳以迨官長車盖相望而獨石泉鄧令某憯墨吏也問丹何居樵陽子云為令亷而仁是官人外丹令疑誚己恨刺骨而孫弁某將因緣為功隂教令名之妖人上變告䑓司用令追捕毋釀亂事下城都張丞某逮治樵陽子朴野至則箕踞而誶丞大恚罵何物囚敢爾痛榜之無苦也繫囹圄三月獄上而王觀察某特亷其非辜覆丞牘身為白艾中丞是夫童而好修安所渉人間世而惑衆為事得觧久之譚中丞來檄所司即鄉所築菴建大通觀遣還山厥後凡開府及領藩臬至者率召見樵陽子樵陽子率一再徃不拒也顧其意忽忽不自得㑹吾常吳叅知以捧表過家謀挾之來江南樵陽子洒然從焉來則止常之永慶寺亦數過吾錫山龔方伯城南別業稍一游武林西湖樵陽子所至江南人就徴未來事若丐已疾者麋集樵陽子不甚應間露一斑即往往中樵陽子在山專生餌黄精出乃復火食食止蔬素然終歲廢便溺良有絶異者故未名强而自名曰思道亦書出山後書相傳其大父孔文進士也與内江趙文某同榜友善父鳴春蓋人為樵陽子言如此留未一歲歸焉賛曰昔東林老古錐定峩眉樹中七百年旣出求復定去今青城樹中身托樵陽子是兩也𤣥與禪有異乎張紫陽因折瓊花事推明隂陽性命之變以必得金丹乃是最上乗法通乎此可以知所竟矣余不觧為二氏言幸獲習樵陽子其人沖夷悟穆不界人我教人只於心地上領宗㫖雖以通儒者言不謬嗟乎余安能極樵陽子所詣哉落魄張傳王瀹落魄張者一名張三風一名鐵脚張世莫知其鄉閭年紀名字之實周游天下其於鳯翔寳雞者居多形體清癯脩然而長環目髙鼻鬚髯上指戴大笠着道士服垢弊不飾放情任真動止無檢故時人名之曰落魄張好和光同塵與世俗雜處時發隠語以洩其真有問之者復恢諧以泯其跡以故人又名之曰張三風經行四方其地相去數千百里之逺一日之間無所不到到則人皆見之因又名之曰鐵脚張永樂初猶在寳雞蜀王遣使徵之未發一夕而殂鄰里為具棺歛使者不敢歸遣人揉之而蘇已復就徴徒行上道令使者先馳未及前驛見其己在座矣至成都王加敬禮之特厚送入青陽宫奉侍唯謹未㡬遂不知其處太宗在藩邸時嘗一接見旣即位思其所言有騐數年四方徴之竟無所得其棺在寳雞猶存宣徳四年冬予隨鄭王殿下之國鳯翔父老猶有識者往往能道其事予聞而異之因為之傳書濟寧王翁事程敏政予過濟寜同年友按察副使淮人石漢卿為予言州人王士能年百有二十嵗近朝廷遣使徵之因同入城訪焉所居城東僻處老木深巷人跡罕至士能居敗屋中閴然終日鶴髮被領面如童子少婦神完氣和與客言率靜坐寡欲之說瞑目曰僕老無能為朝廷過聼而召之僕豈知道者但習靜而己一身之外皆非所知也時舟行急不暇盡扣而還道聞漢卿及州人言士能海州人生元至正甲辰迨今成化癸卯實年百有二十嵗其寓濟寜亦六十年矣士能少慕養生之學不受室不飲酒食肉入蜀廣聞雪山有異人投之見老人被一氊衣卧深洞中石牀上長三尺餘耳目口鼻手足皆類小兒士能禮之不答自為執役老人不飲食坐側一袋所盛類乾麫饑輒取啖之渴則手掬飲磵水一二升士能執役數日所賫米盡跪而乞食老人分袋中物與之苦澁難咽士能難之自拾山果以濟饑居三年老人憐其志勤苦忽曰吾語子道子得之宜出山非其人莫輕授也士能去雪山後事不可知其來濟寧濟寧人不如其有道也後稍稍知之竊伺其所為蓋久絶烟火食惟日啖棗數枚或菜數莖飲水少許而己始以為異濟寧衛指揮王宣亦海州人往扣之大駭曰吾上世有叔祖實名士能聞先祖言好道出家不知所終翁其是乎所言家事皆合自是日往候之郡人時有所饋皆拒不受㑹宣有同任欲往授其業者士能望見曰爾聲妓滿前日事妄作非吾徒也謝之其人大慙乃上書言狀朝廷下山東守臣俾乗安車入京且令宣侍行噫上古之人率以百二十歳為壽之常世降俗下人少斵䘮其天真壯馳騖於聲利老不知止死且弗悟其弗壽無足怪者若士能固今人之所異而古人之所常也傳曰人皆可以為堯舜又曰塗人可以為禹然則今人以為異古人以為常者又何止養生一事而己邪劉仙傳宋淳大司馬宛洛翁為言其鄉有劉先生偉者曽為侍御為兖州守卒於官翁之叔父某時為某縣簿實主其䘮事或云劉乃不死往往見人間翁不以為然後僉憲山西有衛經歴某者亦翁鄉人也朔日叅謁不至翁詰問之對云夜因劉先生過訪旦遂起遲耳翁問劉為誰曰故兗州守也翁大駭異命經歴與俱來憲長蔡公曰佐貳備酒固難吾當主之旣入見即握翁手縷縷道平生事且云子昔癯也今肥矣乂曰子記彈琴時事乎我至而翁家備酒食欵我時河漲不克渡但殺雞為黍命子撫琴子為彈昭君梅花二曲今忘之耶翁曰然時憲副李公川夫聲名籍甚跂足卿相蔡公曰先生言吾三人者誰最先陞曰汝問即汝陞矣李公曰聞先生死且久矣然乎曰不然也汝且死耳即席惟飲酒榖肉食皆不御清戎察院聞之曰異哉故䑓長也亟遣使招致之遂不知其處徧境内物色卒不可得是年蔡陞都憲李落職言皆騐云翁言兖州為人素以理道自閑父母䘮皆廬墓三載妻亡不復娶方為御史時住慶壽寺閉門謝客積書至數櫃每出必自封識人莫窺之一旦以侍班早出不及封康太史對山宻往闖之其床帳朴陋殊類庄家櫃中所貯皆丹書也其在兖州日忽終南山一道士至家謂其子曰尊公今日入吾山中特相告報其子曰吾父方守兖州豈有是哉數日後訃至計其亡為道士至家日也至今垂四十年未有誌誌者必及神仙事其子雅不欲以是名先生故久不誌云司馬屬曰神仙之說吾儒嘗詆之謂不足信然葛洪子晉洞賔希夷載在子史豈皆欺世之言哉即宛翁之言劉先生事乃耳目所覩記翁初不信先生先生之見也實欲示翁而明其非誣耳然必於信翁者何哉夫海蟾之術非藍方不售羨門之訣必義山始得翁昔在獄中遇名仙雙丫髻謂翁有道氣敎之長生翁曰吾儒者有殺身以成仁安用此又授之以黄白之術翁曰吾儒者一介不取予諸人安用此雙丫髻曰謬矣子謂取予諸人者豈我之謂哉翁於是蓋有得矣今年㡬七十而顔色童赤形如野鶴聖胎真訣固有所受夫豈凡品可得而與聞哉劉太守仙觧傳趙樞生太守劉氏名偉關中人幼慕神仙長而愈益好之正徳間舉進士第始為御史出守楚郡一日忽封函寄其家與為訣當以某日逝父以為狂不之信其母獨曰兒平生詡詡好談仙事今得無有異盍使使訊之及令家人至治所則果逝矣因祓殯歸旣行徐覺棺輕及抵家若無物者父母趣啓視之僅遺含殮具爾因大駭以空棺厝之公旣得仙蛻去乃別自稱劉胡子賣藥於山西代州人初不識其何許人乃病者求藥隨以丸應不索價無不立瘳者乂相人言未來事輒竒中於是代之好事者莫不聲相傳曰劉胡子劉胡子云有秀才甄成徳李念及弟愈三人仡仡負才士也聞劉胡子善相二李先往詢之公一覯㑹即許進士仕當為給舍愈幼素儇戱呼之曰劉胡子試觀我何如兄公摩其頂曰孺子乃玩我吾本不應語若然若實亦進士也位清要即次乃兄耳二李旣得報趨往告甄甄在三人中齒素長不欲往二李强之乃往公就相之曰君勿憂不貴後當為李官也甄喜即投契數隨侍之後知其有金丹術握手引至靜處向公再三叩之公曰若問吾吾惡能為若諱然係上清秘㫖凡人誠難知今有一養氣訣授若若其持而行之甄謹拜受公客代州久代人第知為劉胡子無能踪跡其所自㑹有一商人過見公愕曰異哉兹吾恩人劉太守是也胡為來哉公始佯不喻商即長跪再拜道某前以某事寃繫郡獄賴公平反得釋公度不可隐即云吾己出家戒令勿言公旣為商人物色得遂遁去越數嵗復之留都留都時掌臺事者輯公邦竒與公少為同學生後聞公為太守死歸葬一日出三山街見一人山巾道服行廊下狀似劉即停節呼吏附耳語令躡其後偵之果劉也便强與俱來吏如指往公不色遁尋隨吏先詣韓私廨韓還見公猶疇昔時人也驚且喜便設榻道舊事接殷勤甚懽巳設飲食公談笑言動舉止皆如平生韓公始終疑之意其死己久此何物者韓謂鬼畏燒酒試問云公能飲燒酒不公徐笑曰若疑我鬼耶吾故吾耳取燒酒飲數斗無恙韓公始不疑居久之辭去僧寺中宿韓公時時與六卿諸公詢訪之而後諸司官聞公名悉來通謁車跡遍寺門矣然公多辭不見惟韓公同往者乃得見有官求見公不獲隨寺僧引至公所居則閴無人焉官怒趨出欲抶寺僧僧再入求之則公又在僧具道所以公曰不可以吾故累若乃出見之問功名不答公自是遂辭僧言欲往他所忽不見不知所終時嘉靖戊申己酉歳也其後代州三士者念與成徳果為給舍愈部郎甄所傳養氣法至今行之秘不肯洩甄為家大人同榜進士𤣥都外史曰余聞雲笈真誥𤨏言内傳等書其言尸觧事類狀非一即衣在形去者或與白日沖昇者有間然軼却疾延齡之科數等矣第初逝時今人心惑不信如王屋同學四子者不少爾洎逝後幻跡往往彪著乃始信其不死故非有卓見素測歸化理以一蜕為快者難與道焉太守雖靈誕有自然其積基絫構成其幻志亦學海必至者歟迹其業舉子入彀又逐世資膺治民職非外三生別持功行者也其皆以過客視所歴者耶抑世之倜儻竒瑰之士禀尚𤣥虗者非鮮盖有敝蹝塵徑入山出林一往不返者測其所之亦當乗雲躡虹遨乎不繫之域然聲湮迹没不如太守之膺世資又昭昭處人境而蜕去去而不死而迹留異矣然太守方騖冥濛穢埃壒其以留者為重與否耶余欲學太守者覩其始終顯化是以列其行事著於篇明文海巻四百二十
