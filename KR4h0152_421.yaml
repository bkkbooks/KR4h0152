body:
  text: 明文海卷四百二十一餘姚黃宗羲編傳三十五仙釋俞長沙傳林大春明興二十有七載天子臨軒䇿士得張信而下百人有俞允者字嘉言松江華亭人也官拜楚府紀善改魯山今尋遷禮部主事奉命使楚坐還報失期謫判長沙故今稱長沙公云初長沙公少時為人疏節倜儻不羈然能力耕以事其父父性樂施豫嘗與道者俱一日有道人者羽衣策杖而過之因止宿焉父命侍食侑以美器道人輒隕其一公殊不為意遇之如禮明日道人者出遇少年行博於市旋博得一器以歸其器絶類昨隕者曰器固無恙如是蓋道人業己預知有此姑以試公耳乃公固不為動而少年者輒恚憤益急與博徒十數輩求博道人道人每與之博必得竒勝於是少年窘甚不敢鬪咸竊驚異之公因笑而問曰而技可學乎曰子有竒氣異時當奉大對為天子命吏是不足學也遂別去公悟乃始折節為儒補博士弟子是時江南甫定經學失傳公獨得三傳於蠧簡中玩味久之欣然有得乃以春秋舉畿內髙第至是果舉進士歷前官如道人指其後之長沙貶所未至會道病暴卒己而復蘇先是公病己革己易簀待櫬於沙門七日矣忽有醫者貿藥而至或戲之曰寺有死者可復生否曰可入取青囊一粒納公口中有頃得嘔數聲竟起不死於是家人大喜競以金帛酬醫醫無所受詢其姓名亦不答也第云長沙有白鶴大仙廟盍往修之俄失所在衆皆駭然然後知其為白鶴仙神也而或以問公公始為言疇昔事謂我實神遊其地而未嘗往也往而復還而未嘗生也其靜定如此及至官訪之果得白鶴廟重建焉居七年以壽終後六世孫汝為者復以毛詩舉隆慶辛未進士假守潮州為豫道其事林子曰余少客吳越間嘗聞吳中人士往往談長沙公始終遇仙事私心異之及得其孫二守公所為事狀始知公蓋儒而自託於仙者其于死生之際視若夢幻亦可謂有守能不亂者矣而論者乂謂圮上之遇濟北之祠卒成帝師以光輔有漢而公官不過為郎位不過別駕以為公憾不知公于死生能齊矣彼區區得喪何物者且以賈生之賢尤不免于長沙之悲而公乃不聞其有幽憤之辭投湘吊古之賦其視賈生處此似為過之由此觀之其迄于今以有胤嗣也宜哉達觀大師傳略陸符師諱真可達觀其字也晚自號紫柏萬厯中慈聖皇太后欽師道風上亦雅亷知師謂若此真可名一僧師遂取以更其名云世家於吳江之攤缺沈姓父連字季子其先句曲人也師生有異徵雄猛不可羈紲稍長志益大飲酒恃氣慕古遊俠之行他日自言吾本殺豬屠狗之夫蓋道其實也年十七辭親隻行願立功名塞上行至郡城楓橋天大雨不得前虎丘僧明覺者過視壯其貌問知逺行因以蓋接之歸具晚餐夜臥聞僧誦八十八佛名號心忽開悅侵晨起告覺願出家遂解腰纒治齋覺即白衆為祝髮因禮覺為師是夜即兀坐達旦時覺欲募鐵萬斤鑄大鐘師乃獨身往平湖趺坐一巨室門外主人進食不食問何為曰願得鐵萬斤鑄大鐘鎮虎丘山寺主人立畀鐵如募師為舉食徑載之歸即閉户讀書歲餘不越閫年二十從講師受具戒掩關武塘景德寺三年辭覺包腰去參訪聞僧有誦張拙秀才偈者至斷除妄想重增病趨向真如亦是邪曰何不云方無病不是祁僧哂之師大疑到處書二語于壁迷悶至頭面俱腫一日齋次忽悟頭面立消曰使我在臨濟德山座下一掌便醒自是氣宇凌鑠諸方矣初祖西來以楞伽印心從上祖家皆精其義立為綱宗勘驗來學宋宏覺範憂末法失傳遂為智證傳僧寶傳諸書以撰述佛祖旨訣其書世多未之聞見師搜得古本大喜因遊匡山深究相宗精義巳而遊五臺至峭壁空巖有老宿孤坐師作禮問一念未生時如何宿豎一指又問既生後如何宿展兩手師于言下領旨尋迹之失其處至京師參遍融大老融問何來曰從江南來來此何事曰習講又問習講何事曰貫通經旨代佛揚化融曰能清淨説法乎曰至今不染一塵融命師解直裰施旁僧攬其裏曰脫却一層還一層也師笑頷之遂留時與知識嘯巗法主暹理諸公參證所得乃歸省覺蓋去辭覺時巳九年師見道法陵遲五家綱宗墜地以負荷大法為已事倡刻大藏廣其流布日以智證傳一書囑付傳習或時教人專持毗舍浮佛偈謂此偈是去來諸佛心印禪之真源嘗言吾待此二十餘年己熟句半熟兩句死生無慮矣先是有南昌諸生出家補陀曰密藏道開者聞師風來歸師深器重留為侍者凡法門大事如復楞嚴寺刻大藏復化城皆以屬之師終身不受人祈請出世終師世亦無敢開堂受請者獨與憨山清公為友嘗對談四十晝夜不變睫因有志修國朝傳燈録與清公約共往曹溪開導法脈遂從帝京繇三晉歷關中跨棧道至蜀禮普賢順流下瞿塘過荆襄登太和至匡廬尋清公約時清公以興復勞山海印寺為黃冠奧援訐奏被逮師聞報禱佛冀佑不死獨往曹溪將回救都下知己得遣雷陽戍因住白下江關待之相見執手嘆曰公以死荷大法我何人哉公不生還吾無生日他日即先公死後事屬公清公至雷陽得間過曹溪曰此達老志也吾以行間至殆不偶後公得釋即住錫宗風振焉時上以三殿工開礦稅中使輩出有李道者劾奏南康守吳寶秀抗旨逮治其夫人哀憤投繯死師聞之曰良二千石為民請命死其妻身且不免時事至此乎遂入都門營救授以毗舍半偈令誦十萬當出獄吳持至八萬上意解得末減師因喟然曰憨山不歸我出世一大負礦稅不止我救世一大負傳燈未續我慧命一大負釋此三負當不復遊王合城矣其時門弟子皆知都下側目師巳甚相繼奉書勸出開侍者刺血具書隱去當師居方山時嘗卜出處於李長者誓以身命宏法故報書輒謂吾當斷髮巳如斷頭今更有何頭可斷其意以出家兒大事既明身心尚有僇辱揀避雖比古之立名義不侵然諾者尚不可得况欲稱祖家兒孫操提止令以殺活天下故雖謗師形章疏不一師處之屹然居無何妖書事發上震怒方大索先是江夏郭公正域為少宗伯以楚藩事與政府抵牾而吳江沈令譽者師弟子也以醫遊公卿間尤往來江夏稱最善羅織者遂欲乘妖書中郭即掩捕沈拷掠備至沈終無所承惟篋中搜得師與令譽書乃營救清公謂勞山海印之復為聖母保護聖躬香火今毁寺戍清是傷聖母之慈妨皇上之孝也御史康丕揚得之遂據以聞先時慈聖聞師至命近侍陳儒致齋供賜紫伽黎師受供謝紫衣適從石經山得隋時琬禪師所藏佛舍利因請入供太后出帑金送歸石窟言者率以縻內帑金錢為師咎一日有中使奉上命賫數千金請師印藏經頒賜師不奉詔曰印經自有人中使固以受上旨堅請不肯去其人嘗從師執禮者師呵之欲起杖不得己復命上笑曰固知此僧非利財者上嘗手書金剛經汗漬册紙疑當易亟遣中貴馳問師以偈進曰御汗一滴萬世津梁無窮法藏從此放光上覽旨大恱以故劾上留中遲之乃下命大金吾研審而己時師居西山潭柘嘉福寺諸校夜至不敢白但匍匐求開示師為語竟夕至曉諸挍伏地哭出帖師命治齋禮佛書偈別衆就訊以三負對無他辭傳送刑部對如初有郎官嫉師者同鞫故令杖師凡對簿直入趺坐階下左右雜投刑具唱聲恐嚇不為動受杖己復起坐獄詞無可按特以救清公書謂語連朝廷欲引子罵父律不果竟擬左道獄具將上師聞之曰世法如此久住何為手字付侍者性田令致江南法侣田哭師叱之曰侍我二十年猶作此去就却食飲尋説轉生歌子夜猶口授十餘偈黎明索薑湯嗽齒就地坐誦毗盧遮那佛數聲閉目不語有御史曹學程先以言事繫獄聞狀趨至望見輒大呼師好去師復張目微睇啓手扶兩足跏趺以逝時萬厯癸卯十二月十七日也師生於嘉靖癸卯六月十二日世壽六十有一法臘四十有竒師報逝待命六日坐風露中顔色不少改遺命毋龕斂周以蘲埋葬慈惠寺土坎中次年春夏霖雨及秋衆憂淹漬久令田侍者鳴諸當事得請歸龕啓視端然如生見者悲慟如佛復出傳聼來觀奔動畿下龕歸江南途中尚多求啓視瞻禮者江南弟子議卓塔地持未決適圜中録刻成寄至中有怪來雙徑為雙樹遂定議歸徑山師相好魁竒雄碩威掩萬衆童真絶染膚體如鐵石日飯數升過中不食自出家即脅不到席四十餘年如一日所至設髙座懸燈趺對密藏開公嘗侍立聞雞鳴顧語師曰學道人坐地安問雞鳴始行腳二十里足痛以石砥足至日行二十里乃止嘉興楞嚴寺初復禪堂成師題一聨謂當以血書之引錐刺臂血盈碗用絮漬大書榜上嘗至膠西秋水時至欲渡衆不可師解衣先涉亂流及肩疾呼衆前顧謂曰閲生死要當如此師身律嚴至於忠孝大節尤為性篤幼奉母訓不坐閾終身立不敢近嘗禮佛始進食在潭柘值客至誤先舉乃對知事曰今日有犯戒者命爾痛杖三十輕則倍起受杖就佛前伏地受責如數在陽羡山中讀長沙志至忠臣李芾城守垂陷授劍部將斬其全家部將慟哭受命己而自殺執卷淚迸如雨旁侍者不哭叱之謂當推墮崖下所至梵剎見祝聖牌必敬禮厯書初授必加額始開覽白衣弟子入室激發以忠義懲戒貪暴形於論説至謂教人制舉業進身使為大盜劫財較昔人畫馬入馬腹其罪報當愈甚師心慈外貌威重及門弟子多賢豪搢紳御之平等尊嚴不少假嘗言法道非資人為牛鼎以世情求法不入吾室我不憾也惟遇利根男子錐劄不少假借當機不契恨之直欲頓斷其命至誘接下中隨器盡量人自習安駑緩畏其攀躋多望崖而退焉明覺者故嘗好醫一日還家畜妻妾以醫名吳會然移居大澤中深自匿師密使人蹤迹詭名字稱病臥舟中邀覺覺至見師大駭師流涕嘆息覺皇恐惟命遂剃除乃反執弟子禮師行腳見名藍慶址必發願恢復從楞嚴至歸宗凡興建一十五所歸宗遺迹僅古松一株寺僧薪斫幾折將盡伐售米五斗有丐者乞米贖免師過而纍土石掎築呪其下願松再榮寺當復後松果日茂寺竟因師復云師聞難無敢為之訟寃者當是時惟侍者性田周旋圜中故有松木冷重雲獨見田侍者之句田常熟人幼嘗事慧日寺比丘古林貌癯顴起純體筋骨性突兀不易馴擾已林遣執侍供事惟謹頷頥指使氣息相應中夜承諾警絶無寐少不知書索卷籍筆劄隨所命必應手師有所往頂笠即行一肩追隨若預裝者嘗呼為小道人或命為田道時遭痛杖初無怨色一日逐之使去田哀號無所出故嘗向大士禮清淨三業文是日聲鳴甚悲音齒忽異師問知為田乃復令入自此不復加杖師示寂報訃江南復北上奉龕歸徑山始剃除不踰年微疾死塔骨寂照菴放生池山左曰田侍者塔云師龕始供菴中越十一年定葬山後黃沙灘人言其地有瀦水改卜五峰大慧塔之陰曰文殊臺己擇日火浴矣清公從南嶽數千里來操文預定祭日適與期會遂把火焉師有文集及圜中語録金沙門人合刻共一十六卷後三十二年有私淑弟子四明陸符刪次補纂為紫柏心要數卷序而藏於家論曰嘗聞震澤間有寺名普濟者寺中有古柏一樹竒絶吳興閣學某嘗艤舟其前夢師登舟謖謖作風聲明日起入寺婆娑樹下若有所見後追録其夢正圜中滅度日也因疑師以樹中神道成而歸且曰師固嘗號紫柏云至考師心行本末若其夙命前知顯迹坎土直以肉身熾然説法自非古佛大士酬願一出豈易得此也哉憨山老人曰正法中可無臨濟德山末法中不可無此老誠哉知言彼樹中神何修而得此於出世乎僧有相傳尹民興師名如堂號有相南陽人也示寂於巳丑十一月之九日八十春秋有二矣始師有歐歍之疾住嶽陽深山中持華經二年夜夢金臂人飲以玉露疾遂瘳挂錫出泥菴則丁亥十月也師嘗匡坐而含笑余問曰何笑乎曰豫心樂亦不知所樂何事也頃之天暑甚豫氣喘出師從容微哂曰寒暑小事也不守如此他日生死場中何如哉公能澄定此心則入水入火無往而不自由矣余拜手志之今秋九月絶粒不茹惟啖棗栗巳辟棗栗惟進熱湯如是七晝夜張目語豫曰本以十月行因修懴事展留一月旦日酉時豫逝矣及旦禮十方佛入奩趺坐久之衆竊聽焉念佛有聲縮不忍視師覺奮聲呼曰去弟子本有合十指爪殷勤上請曰師何去曰竟往佛國至則火光鏩鏩化作金蓮花而上所謂無往而不自由者與夫性本空也含十方國土僅如點塵何况水火是以至人出入其中故能函蓋遊戲情識既生則為一物與水火偶觸之為焦為濕入之為溺為焚既不勝水火而我且為水火用如是為恐怕為痛楚為壞散既壞復成則為欣羡為悅樂為貪戀轆轤不停而我本有之空性未嘗毫末減也今人或夢火灼其膚醒時無有此可以知師之火用至平無奇至常無怪矣覽觀師事毋為魔説慧常傳蔣鐄慧常者以行腳卓錫長林之金竺山里居士沈七老時與遊七老家修符籙召道士朱法官領符籙事既齋戒設壇場而七老請法官曰人謂大師道力遊行三界能攝某神入天門乎法官曰可引七老登壇伏而自伏壇下須臾詣天闕如王者宫殿朱門雙啓見慧常持篲掃天門下遇七老驚曰爾安得到此幸今日值侍趙公若他將公不得生還矣遽匿七老户扉後巳見金甲神巡至訊侍者安得生牛皮氣當是時七老固曳革履命索之而慧常前揖神敬禮之慧常以身翼蔽户扇乃不敢索神徐去而法官捧檄自天門出擕七老下明旦往請慧常謝至山半侍者捧盤匜肅迎曰師知居士見過命候道左七老驚因拜慧常具謝解救得不死狀慧常曰此地那可戲行然亦公往因也七老曾孫謙長林知名士有文行余博士長林謙為道其事甚悉又言朱法官道術亦甚靈異嘗渡江以一蓋投江中捻訣禁呪片時飛渡後飲酒醉寐訣解沈江死明文海卷四百二十一
