body:
  text: 明文海卷四百二十二餘姚黃宗羲編傳三十六詭異陸彥先傳蔣鐄余年十六而識彥先彥先自喜為詩詩名籍甚公卿間中嵗不得意乃益自放人呼曰癡翁微酣踉蹌突至童子譁云癡翁來則皆走而余先君獨雅愛之彥先之尊人啓孫先生於先君為中表兄弟呼先君表叔又娶余族姊先君度甚莊內外子姓亦無弗莊事先君者惟彥先任性磐礴自如每造先君必索酒酒至則髙吟所著詩雜以他語杯入手數為語奪語又數為酒奪兩不可竟而炙酒喜極燥且炙且飲且飲且髙吟輒竟夜或頽然醉縱談今古不平事戟手瞋目繼以痛哭而先君擁褐聽之亦竟夜不休家釀善酒味冽彥先睨之曰此三白耶吾欲首論造三白者叔父宜從坐先君大笑屬余兄弟此異人也毋以癡易之彥先有至性逾三十舉一子而殤不勝悲愴盡燒筆硯托酒人自豪酒適或占歌詩韻檢甚超或聘之捉刀亦弗謝平生詩皆醉後擊唾壺走筆而成然氣易盡故不復作長篇景語殊曠情語殊楚致語殊逸不甚計工拙而得句輒沾沾聊以消其無聊之况至人間齷齪雖夢想亦不及以故家四壁立余姊挫針自給內顧益不可堪間有贈片金者懷以歸家人迫攫之金盡出而交謫未巳則或經嵗月不敢歸而客余及二三友人舍中或寄僧廬故其詩骨肉頻年盡肝腸遇節摧春風吹萬卉不到轉蓬人又情獨愛難捨心惟悲最傷祇緣兩重障遂發一朝狂句絶凄斷彥先有至友徐君聲逺王君孟夙兩人皆善余各有髙䪨而酷愛彥先忘機後乃善陳生古白三君酬答極多彥先多畏尤畏鬼畏蟲畏爆聲而起居簡率衫袖淋漓胔羮剝落糟氣拍人同舍者走匿跟蹌大叫抱一老傭卧曉起亦復恬然一夕客苕中别館主人兩戒青衣伴之彥先忽醉卧覺而呼青衣不應遽起取衾自裹匿户扉頃之青衣持炬至驚喜躍出青衣大悸一兒悸死又一日與孟夙步西湖堤上青蟲挂衣幅顧見裂衣驚走里許不可止武士有仗䇿而售者窘且餓野哭彥先顧問之亦相持哭甚哀悲感行路或唁之曰乃父子耶何悲也晚嵗客喬將軍一琦喬憐其無子遣一媵侍之彥先意頗䁥而貧且憊為奔走計饔飱若有家纍者欲以娛所歡而力弗任歲餘困疲乃死付生曰彥先多嘉觀為余從伯父平仲館甥伯父曠懷髙韻彥先若臭味而伯父顧不甚契彥先先君子顧獨深知之文章有神交有道其然乎其然乎方彥先以貧死余亦落魄不自振友人欽愚公張豫誠諸君為治産食其未亡人陳古白為檢其遺稿夀諸梓余無一焉生慚中散死愧南州今己矣乃悉生平所習見者為之傳世有讀余之文毋笑彥先為癡人者而吾與之談至人矣明文海卷四百二十二
