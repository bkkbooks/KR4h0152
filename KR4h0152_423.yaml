body:
  text: 明文海卷四百二十三餘姚黃宗羲編傳三十七物類石丈人録楊維楨宋元祐中韓相國玉汝帥長安築通津大石梁督責有司急巨石無所出忽夜夢一文面人自薦曰吾可應命詰其所來曰吾青州石氏丈人也居某所以齊封人辱吾文面之垢若干年矣倘起吾泥塗磨洗吾垢與今相國任津梁以濟世之病涉者非吾之至幸歟明日抵某所果見一穹碣在泥中丈尺應所科磨其刻輿至津所柱於津而梁落成楊子曰唐人弔剡藤氏以世之惡文辱藤也五季末有弔青之石氏而石丈人自伸其辱豫録其事以慶丈人之獲湔而重悲藤者一汚而不可再雪也噫丹霞翠琰屈於汚豈直青州一丈人哉明天子今使得磨洗砥輿梁與民堂大厦丈人之族不羣然自薦者吾不信矣三義傳周是修一義者吉泰和鳯岡胡如林之犬也有元初胡為泰和巨室如林胡氏之傑然者也富而敦詩書重交遊喜射獵常入山以所畜愛犬自隨防虎而射之冥搜抵絶壑中卒與虎遇機未及張而為虎所攫仆地將噉之犬見主危亡命以赴縱囓虎尾虎棄人而從犬則退走喧叫聲動岩谷虎復攫人犬復以死進囓如是者屢故虎不暇噬而如林已魄喪不省矣既而旁林之樵者訝犬聲之異羣趍而視之虎稍驚卻犬奔伏主身若覘其傷者樵者知為如林併力逐虎如林移時乃蘇逮歸賞樵者樵者辭曰公所以得免於虎者是犬之功也如林感其義撫愛不下所生數日犬以駭膽而殞如林慟之具棺斂以人禮葬焉君子聞之曰勢迫主危去死一間為畜犬而能捨生赴救勇黠若此卒脫主難死以義稱為人臣食君之祿而有不憂社稷市私賣國臨難苟免貽唾罵於後世者嗚呼可以人而不如犬乎二義者滁陽野湖之鴈也洪武丙子冬十月豫從王子朝京師經滁陽去周道里許有湖方百餘頃鴈鶩之團沙以居者不翅萬計王子令將校縱名鷹擊之鷹發而鴈起蔽空如雲鷹竦身直上拳擊一鴈還墜湖沚間鷹據鴈爪嘴各肆其鷙鴈殆而音甚哀羣鴈皆回翔喧呼不去俄而一鴈下赴以死敵一鴈繼赴之其敵尤力又數鴈下赴之皆殊死鬭鷹幾不支以走免於是始受擊者與諸赴救者俱定神理翮而舉空中羣鴈亦喜舞下迎嗷嗷嗈嗈相唁相勞而相慶焉觀者莫不異之君子曰義哉斯鴈乎同類和處一罹於禍則勇敢者爭先赴難格鬭若此之力世之人為兄弟為朋友平居歡洽自謂魚水之不若蘭金之莫加一朝勢窮利盡或變故卒至則紛然解散視曩之同契顛連困踣倉皇而失措者曽不動心一相拯援甚者至於投之井而又下之石焉者比比有之於斯鴈寧不大可愧乎三義者陜西長安蒲陽里晏氏叟之烏也叟性慈仁而無子夫婦獨居行林中見雛烏為風雨所墜螻蟻􅝚之叟惕然不忍取而救之歸養以筠籠閲月而瘡痏瘳羽翮稍稍然長馴擾眷戀有感恩慕德之意叟竒而釋之由所之烏乃留止庭樹旦暮去來愈相親狎叟益竒之名之曰黑兒聞呼輒至止叟几席懷抱間以為常一日銜金釧泊叟膝上作啞啞聲若伸其報臆者久之求一雌為耦結巢庭樹育子而孫歷二嵗詵詵以十餘皆馴狎如黑兒之習叟婦或近出呼黑兒以護家即謹守於門人至則噭噪摶擊拒不容入婦還哺以所携則欣躍無任婦忘一髢求之弗獲呼之曰得非汝輩銜置巢中乎少頃銜髢至婦前以獻又二嵗而叟卒晝夜哀號於庭率其類銜土以益冢封又嵗餘始去庭樹莫知所之焉君子聞之曰世降俗薄兵凶荐臻士子有流離而失據顛沛而無告者幸遇長者收而畜之寒以衣飢以食病以藥凡可以成全而保愛者無所不至及其免於患而賴之以壯且強也其不忘不悖眷眷而不去切切以圖報者幾何其人或思故里而欲返其初或因小忿而輒昧其本邈然無情飄然棄去者往往而是皆是烏之不若也周子因三者而歎之曰古人皆云人而無禮無義則與禽獸奚擇是果可以一概論哉麟鳯龜龍為聖世之禎至若虎狼之父子蜂蟻之君臣騶虞之仁關雎之別皆性中之天無間然矣又若晉之義馬唐之義象義猴俱著名傳記不可誣也今泰和之犬則能捐生以赴其主之危滁陽之鴈則能奮迅以救其類之急長安之烏則又能馴慕以念其人之恩犬鴈烏禽獸也其於徇義且爾况稱為萬物之靈者乎况讀聖賢之書習先生之道而名為學者乎傳其事以為流俗之戒且勸焉犬之事豫聞之先師渚樵胡先生先生如林之至友也鴈之事豫親見之烏之事聞之郢府紀善周添祿氏添祿嘗教諭長安於叟為鄰比云倉庚傳楊慎梁武帝代齊籙居齊宫後庭稚齒在潘余之亞者損之又損尚溢乎百數郤后心妎焉帝間居一日覽大荒經云倉庚食之令人不妬遂下令虞人收捕此鳥絡野籠山佛首爭獻者盈軒墀乃敕中庖以為宫膳旦旦不繼他肉后與帝食而甘之帝心冀其術之速驗試問后曰此餘甘可以分諸夫人乎后即輟箸不食帝曰荒經曷豫欺乎其諸食力尚淺耶將盡脯其餘倉庚中有老而慧者鼓􅢄作人語而稱曰余西裔之羽臣也余祖逮事庖羲氏庖羲氏之佐有鳥鳴者主建福是釐百羽命余祖曰而仁鳥也其司春候繇兹以還奕世載育及周文王邑於岐山西申有鳯鳥者覽其德而下之羣鳥皆往從之萃於岐下維時風翔者露翥者雨舞者霜嘷者朝嘲者夜㖡者以萬計復有巴人之比翼蜀山之文翰方山之孔鳥善芳不昧翡翠華首咸集宫樹王及後宫不之竒也而余族獨著彤管焉其詩曰維葉萋萋黃鳥於飛為其有助於德象也二號髻戲引弓飛土而逐之后曰非所以養童心也戒勿彈周公白文王命羅氏境內特貰不捕焉今帝不欲為文王則巳欲為文王盍赦微軀帝曰爾曷知周文王試為我言文王后妃之德何如庚乃喜而躍曰鵹知之鵹知之匪后妃之德實文王之烈日者天之明月者地之紀夫為妻綱象日明使婦從夫放月紀日載魄於西由媵以升嫡月載魄於東由嫡以逮媵帝笑曰禮失乃求諸鳥乎為我説之庚引脰曰鵹何知鵹何知月之朝也君以視朔不近內焉后亦辟焉月始魄左媵六人迭御三夕象微陰也月成魄右媵六人迭御三夕象漸陰也月成弦三夕而世婦迭御焉月成采三夕而御妻迭御焉月之幾望后當一夕陰將盈也月之端望后當一夕陰極盈也月之后望后當一夕陰不終盈也自是三夕仍降而御妻三夕薦降而世婦三夕還降而左媵三夕復降而右媵及月之夕也君以掩身不近內焉后亦避焉象日以進象月以退授銀環告進也正金環告退也施元的告辟也鳴佩玉告節也由媵以升嫡本微而著盛由嫡以逮媵自盛以下微勿使陰厭陽勿使柔乘剛嗣續以昌壽命以長此陰禮教六宫而頌聲洋萬方也又公此制於天下諸侯有副宫大夫有側室士有妾當夕侍夜倣是為節當此時豈伊無險陂王制鰌之妬亦何能為周制之蕪久矣而欲委罪於微禽變性於纎羽不亦異乎且荒經之誕非神農之述也帝而信之是不知也沈昵之專非周文之制也帝而行之是不仁也負此二愆不可以君羽族而况君江東乎帝聞庚言悚然側席郤后聞之懨然無色乃命寫其言於斧扆行其制於永巷郤后幡然更為逮下之行庚之力也帝喜曰徒信古陳編不如倉庚言乃放之不殺封為金陵郡公唐世有號金衣子者即其後也異物傳張升有物如小龜土色雜灰土以居蠕動而步速好居柱礎下或墻壁下鑽軟土而入畏雞食之生育亦蕃至冬時穴土取驗之始見三時散居不知食何物人傳能食白蟻至盡吾鄉王家嶺下李輔字良佐故家豁逹人也嵗辛未暇日過余坐談曽經撫州金溪宿饒泉大姓郭氏堂中地未潔乃譴從者淨掃之方設榻其人再三戒曰吾家新創室屋不意嵗被白蟻傷食梁棟內空無如之何有人教以往求川中物如小龜者置於礎下灰土中今數年來白蟻皆盡棟柱俱空叩之逄逄然了無一蟻存若令人掃地及有懸緣壁上遇此物幸為保全勿傷之余聞能食白蟻必竒物也問良佐以名良亦不知也許為致之閲再嵗六月二十一日午合挈而見余啓其合祗見雜以灰土蟲亦同色大不盈寸塊然不動少選蠕蠕然稍行蔚有生意其數五枚良佐𨗳余僕置於園亭右小房中皆鑽土而入曩言此竒物今果致之良佐信人也噫天下物類何限人不能盡識余備檢古書並不見有此物良深歎愧此物乃有益於人能去害而存材豈瑣瑣小物哉惜不知其名宜名之曰蟻虎請更質於博物君子烈象傳楊師孔事有以一著係安危一物閲成敗居恆視為平平而識微主幄者尤必謹之蚤焉嵗乙丑當霑烏聨水藺大舉憤兵再出雞聨四省震驚六詔目中視昆海一杯不足當飲馬矣懷山彌壑峰峰撬帳雲連夙將名王望前鋒惴惴不敢輕試賊騎分三路下東南一路尤鋭鋒不可當時陶兵象馬初到有陸姓小將鋭若初生犢主者置之此路非無意也鋒創未接各營面面無人色主帥叩天誓師三單振奮賊果先以東南萬騎奔突排山倒海陸將兵不滿千幸陶有名象一隻象奴馭之素得神機深伏小塹鼻中飲水泥數斛賊騎恬不知奔騰而下象突出咆哮號吼躍起丈餘萬馬辟易鼻中水泥噴作雲霧直搏賊鋒勢如猛虎舉足踏賊人馬俱如糜復用鼻捲一悍賊拋向天墮地踐蹙皮骨無完陸將引兵乘勝追逐喊聲四起馬奔壑人潰野器械山集揮刀發鋭我兵刀劔盡敵肉溪壑漲賊血十年來滇兵之捷未有如此勝者大且速且全者抵暮收兵象尚勃勃具餘勇焉龍通城百姓携壺漿芻食望象稽首百叩以謝次日創發病通體出箭簇計三升餘鼻中一矢毒甚遲又日象盡瘁矣嗟乎據三酋惡焰六詔兩迤只拉枯朽中外洶洶不可保得此一象滇雲數百萬生靈轉危為安易亂為治間不容髮孰謂象之功可泯耶嗟乎設使象知有人我知有衆寡知有趨避必憧憧於勇怯即忘人我衆寡趨避矣藏伏不深沈機不豫敵必因變設竒勝敗不知誰屬所謂無心合道善藏為勇不意於一象見之也馬龍人業己封冢立碑余代庖守安普聞見最真特表出之以告黔陽臣子之留心封疆者捐軀報國必先忘人我象一物且竪大功矧具七尺靈萬彚者肯出此象下耶義虎傳祝允明荆溪有二人髫丱交壯而貧富不同窶子以故晏安無他技獨微解書數妻且艷富子乃設謀謂言若困甚盍圖濟乎窶告以不能故富子曰固知也某山某甲豐於賄乏主計吏覔久矣若才正應膺此耳若欲吾為若䇿之邪窶感謝富子即具舟費并載其艷者以去抵山又謂言吾故未嘗夙語彼彼突見若夫婦得無少忤乎一忤且不可復進留而內守舟吾若先容焉計也窶從之偕上山富子宛轉引行險惡溪林中窶胼胝碎破血出被裸踵不巳至極寂處乃蹴而委之地出腰鉞斫之隕絶富子謂死矣哭下山謂艷者若夫君嚙於虎矣若之何婦惟哭富子又謂言哭無為吾試同若往檢覔不見乃更造計耳婦亦從之偕上山富子又宛轉引行別險惡溪林中至極寂處擁而求淫之婦未答忽虎出叢柯間咆哮奮前嚙富子去斃焉婦驚定心念彼習行且爾吾夫其果在虎腹中矣不怨客轉身而歸迷故途順塗而哭倐見一人步於傍問故婦陳之人言爾勿哭當返諸舟可歸爾舟在彼遂𨗳之返見舟而滅蓋神云婦登舟莫為計俄而山中又一人哭以出遙察之厥雄也婦疑駭其夫鬼與夫亦疑婦當為賊收矣何尚獨存哉既相逼果夫果妻也相携大慟而蘇各道故夫曰彼圖淫若固未淫若圖死我固未死我則我可置我憾也婦曰吾苦若死若固不死圖報賊賊固自得報矣我憾亦何不可置耶於是更悲而慰哭而笑終歸完於鄉祝子曰視賊始謀時何義哉巳乃以巧敗受不義之誅於虎虎亦巧矣非虎也天也使婦不遇虎得理於人而報賊且未必遂遂且未若此快也故巧不足以盡虎以義表焉可也庭鳩傳陳鶴余舍後有屋數椽巋然環峙楹欄宛委控引不斷人登而望之不異庭榭然其守僕性愚無能每客去惟箕踞就睡雖撻之不能改乃置數鴿庭廡下令養之手水穀旦夕鴿或飛翔空中僕奔騰上下掌求而口召之惟恐失鴿所也及至必伺宿於闔籠然後自往畢食夜則夢寤惕惕慮畜有傷鴿者居數月習勤成性雖欲復箕踞就睡不能矣庭之後即龜山山常多野禽栖樹間有二三鳩每見其鴿出入山澗聽其鳴同也視其羽文喙爪亦同也鴿日與鳩隨逐鳩亦無疑也遂同散漫林薄或馴行庭階含食而吐哺比翼而歡呼意若得其羣而樂焉者一日鳩隨鴿亦飛翔空中值野鳩群而過之鳩視鴿覺大相殊也其視野鳩而鳴同也而羽文喙爪同也於是欣然隨其群而去焉於鴿若無所顧念者鴿乃望其鳩而疑之曰彼或非鴿耶否則何遽爾去栖無名之林以自卑耶抑為羣所惑且往之而後返耶山之南有樵者見之因笑謂鴿曰爾何一愚至此哉彼鳩之與爾不過羽文喙爪之相同也爾見而輒愛之與之同庭廡同啄食往來相樂而不相離者是爾之仁也彼得其羣而往焉者鳩之性也似亦有所厚薄其間鳩亦不自知也世有同類之人偶言笑之相契衣食之同情一見之即與之遊然究其心之所謀我則於義也於彼則利也而路之相去不亦逺甚矣雖朝夕共室樽爼嬉嬉苟當利之所在縱死生而骨肉者則將拂衣長往而亦有所不顧矣吁是亦無足怪者夫人之不相逺者性而大相殊者欲也彼溺於聲色貨利而忘道義者非一日矣適或值其欲則翕然從之有若火之得薪水之襲土而孰有能禦之者此彼之所以去者亦性之欲也宜也彼鳩之性而猶人欲之不若者今則舍鴿而隨其群尚何疑焉二貓傳程可中祝給諫無功嘗館於溧水武家武家蓄小貓瑩白而馴善捕鼠有小童雲寶不以畜畜之必滌魚腥飯汁為飼臥則編蒲為窩中加枕焉察視摩捋備至貓見雲寶亦帖耳搖尾就其懷得鼠輒銜弄擲戲待雲寶命而後敢食武有壻髙淳人見貓靈乞攜登舟去雲寶走哭如喪貓亦閉目絶不食壻憐其不食且使人日馳二百里籠還雲寶迎喜若獲其喪貓亦帖尾就食如故焦太史弱候舊居近成均珍珠橋之東河繞其門踰東鄰數十家有貓善竊防少疏輒為銜去一日享客俄而盤中失鵝首遂減客歡主人怒甚釘其四足於板棄之河中貓受釘順流下痛苦號叫踰西鄰百家收得之者為拔釘養之良久無恙遂絶不竊惟多捕鼠食其家愛之謂貓性馴靈如此奈何主人戕而棄焉殊不知貓之有所懲也後年餘貓主人過其家見貓臥榻上手捋其尾謂其家曰此殊類吾家曩時貓其家方申其故而貓躍起嚙主人喉急解勿脫至用利刃斷貓首抉齦拔齒扶歸竟用病喉死人言人靈於物不知愛憎之過之猾其靈也貓犬去人差近往往有異豫覩二氏貓亦駭矣人惟能置恩怨而後為君子今貓反以是見詫此其所以為異類也歟明文海卷四百二十三
