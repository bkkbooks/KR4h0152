body:
  text: 明文海卷四百二十五餘姚黃宗羲編傳三十九雜傳吕震史明古吕尚書震在禮部時文皇帝數自將伐北邊吏部蹇尚書義戶部夏尚書原吉皆切諫上上不聽一日上問原吉曰今糧儲足給幾年原吉意上又將出師因詭對曰才彀半年耳上疑其誕乃令中官及御史按之則十年尚有餘也上大怒以原吉等朋黨欺妄居嘗憤詈時兵部方尚書賔提調靈濟宫日有中使至宫賜香數語賔以上怒故賔惶懼自縊死朝房中有司以聞上立命銼其尸且械繫原吉錦衣衛獄以震兼領戶兵部事時變起倉卒諸大臣相繼罪死上怒不己中外洶洶咸不自保上慮震自危親諭之曰兹事卿本無與朕坦懷相期毋得自疑但當為朕盡忠輔政耳又令校尉十人隨震起居以防之密敕曰震萬一自盡爾十人者皆代之死震乃頗自安震聰明絶人每朝奏請他尚書皆執副本又與左右更進迭奏震既兼三部奏牘愈多皆自專請對侍郎不與也情狀委曲千緒萬端一覽之後輒背誦如流未嘗有悮又嘗扈從上北狩上駐蹕敵地見碑立沙磧中其文具在率從臣讀之後一年上與諸文學語及碑因詔禮部差官往録之震奏曰臣當時與讀此今尚記憶不須遣使也遂請筆札於上前疏之上不信密使人至敵中拓其本回校之無一字脫悮其強記如此尹昌隆史明古尹昌隆者江西人也洪武中舉進士魁天下授監察御史建文初人主視朝頗晏昌隆諫曰昔太祖髙皇帝雞鳴而起昧爽而朝未嘗日出而臨百官百官於是乎戒懼故能庶績咸熙天下乂安也陛下嗣守大業固宜追繩祖武兢兢業業憂勤萬幾未明求衣日旰忘食如有不及焉蓋天下之大四海之廣兆民之衆不可不勤以撫之也今乃即於晏安日刻甚晏猶未臨朝羣臣宿衛疲於候伺曠職廢業上下懈弛流為陵遲臣恐播之天下傳之四方非為社稷之福也制以昌隆所言切中朕過禮部可遍行天下使朕有過人得而知之及太宗文皇帝舉兵南向昌隆上書言今事勢日去而北來奏章有周公輔成王之語不若罷兵息戰許其入朝彼既欲伸大義於天下不應便相違戾設有蹉跌便須舉位讓之猶不失作藩王也若沈吟不斷禍至無日進退失據雖欲求為丹徒布衣不可得矣不報文皇帝入南京命捕齊泰黃子澄方孝孺昌隆等為姦黨同驅出戮之昌隆當陛大呼曰臣當時曽上章勸以位讓陛下奏牘尚在可覆按也上乃命緩昌隆刑閲其奏上流涕曰火燒頭若早從此言則南北生靈受禍未至若是之酷朕亦無此勞苦也特詔貸昌隆死且諭之曰朕長子在北京爾往事之爾能盡誠輔導朕不忘爾昌隆頓首謝永樂二年册立皇太子授昌隆左春坊中允前後在東宫隨事匡諫多所補益太子甚重之後升禮部主事尚書吕震方承寵用事羣臣無比當其獨處精思以手指刮眉尾則必有密謀深計官屬相戒無敢白事者而昌隆適有事往白震怒不應昌隆未喻移時又白之震愈怒拂衣起曰事當行自行何問為昌隆踧踖而退謀於所知者或謂之曰今既請不得公舊事東宫皇太子素知公何不啓取令旨行之昌隆從其計果得令依所請震大怒遂奏昌隆傲慢狠愎事多專行臣以職守相臨為所拒無屬官禮且身為王官事無大小並須上奏而乃假託官僚怙賴恩私隂欲樹結故不之父而之子其潛蓄無君之心可以概見矣又言昌隆身事庶人名在黨籍僥律苟免見利忘義其心叵測其行匪良不宜任用上乃命逮昌隆下獄尋遇赦復官丁父憂歸後起復至京往謁震震慍言接之入理前奏詔繫昌隆錦衣衛獄且籍其家上方巡狩西京凡下詔獄者率輿載以從謂之隨駕重囚昌隆與焉後數年谷王謀反事發辭連昌隆以曽經保奏為長史乃坐以共謀詔公卿雜問昌隆初不服力辨不已震折之昌隆知不可免乃無言獄具上冎死夷其族是年震病面疽病不可忍宛轉床褥間常號呼曰尹相尹相其妻子問之云見昌隆守欲殺之竟死平思忠史明古平思忠者吳江人也少為縣吏役滿歷京考選授禮部主客主事于時明興四十年矣中國強盛蠻夷嚮慕文皇帝方事招懷諸國朝貢者蹄踵交於道路烏蠻驛至不能容勞贈晏犒館餼無虛日率主客主之思忠有精力勤敏過人遇事皆應機立辦尚書吕震皆器之升為郎中嘗以事下獄適北使入貢新任主客者區畫皆不稱旨上怒震因言思忠等以微纍禁繫罪不至去官且習外國事乞宥之以收其後效旨可即日赦復任初有楊𢎞者陜西西安府朝邑縣人為刑科都給事中敢直言上特擢為陜西左布政使吏部以𢎞陜西人例不該除上曰非爾所知也後不為例𢎞亦以本貫辭不許蓋是時有楊太監者數人在陜西故上以𢎞往制之也他日上諭執政曰楊𢎞初去時頗肯言事近日又默然矣可選清強有膽氣者一人往參政以察之吏部以思忠應詔上素識其名命之往而思忠有養子曰平安者私以綾羅度潼關為抱關者所發解陜西布政司思忠時出行部𢎞命收而勿籍候思忠歸私以物還之思忠感愧不己竟不敢有言嘗有某府一推官録事至司思忠知其素貪乃發怒杖之後其人解京因招嘗分事某贓賂思忠刑部併逮思忠就考適有例凡貪贓官吏委訴不已者笞殺於市思忠乃誣服謫戍邊會太監劉馬兒奉詔市馬西域以思忠在主客久多識賈胡請以自從詔釋其戍給官帶辦事隨瑪勒西抵吐蕃烏斯藏朵甘隆達等處赤斤蒙古罕東安定阿敦楚遜哈密等衛及和卓額爾巴里賽瑪爾堪哈哩于闐諸國而還復免官家居以漁佃自給又數十年卒初蘇州府知府况鍾亦以吏員起家繼思忠為主事及思忠參政又以嗣其郎中寮寀交承情分甚密鍾來知蘇州思忠往見之鍾迎候甚恭呼其妻子出拜謂曰此吾舊長官也飲思忠酒時正暑熱命二子扇之思忠辭鍾曰某忝知貴州非無僕𨽻可給使令但欲使小兒輩知公為吾故人耳其敬之如此然思忠居貧自守未始以事干鍾人以此多之初思忠未貴時知縣蔣奎嘗延一相者問休咎遍視在座者其言皆不大了了思忠時給事堂下相者數目奎因呼上使相相者曰此人他日當貴至三品然不終奎大笑相者去奎謂坐客曰術士之妄如此一小吏安能頓至三品乎後奎坐事自殺同僚無一顯者思忠竟如其言陳奉時李承箕陳景秋字奉時白沙先生仲子為邑庠生廪餼者十餘年不得志於有司者四舉矣奉時作科舉文字示人人稱羡之則眼平而色怡知其性氣者每見其文但一過目不復出一語相詰腰背戍削不飲酒頗好度曲事繼母順母亦偏愛之故其婦女亦被寵於姑順之應也增城湛民澤曰𢎞治巳未先生謂余曰景陽今其悔乎駸駸乎反正矣未幾時奉時暴病卒吁可怪哉鳥之將死其鳴也哀人之將死其言也善説者以為曽子之謙辭也其易簀之意非歟奉時壽四十五年不可謂折夭矣顧吾所壽於今與後者何如豈曰年哉奉時少年時不自顧惜傾意柔曼造戲具招歌兒遊衍其間先生悵然曰李泰伯自為墓必取隂陽家所謂絶穴者殆為是哉豫聞先生出斯語大驚焉既而奉時亦欲勉強所當為與所不為掃宿軌剪狂奔之志收之桑榆齎志沈沈云陳樂藝李承箕豫南逰嶺海訪求古今之遺逸意丹砂寶才之鄉庶幾有隱君子吾將求而得之其人不可得吾將求其詩書倣佛其精神而得之乃聞古岡昔有少丈夫陳樂藝者其風可想也其詩曰箕踞長松下忘情白髮新城市有名利江山唯白雲豫曰美哉少而忘世始而徹終塵視斯世而不忒者乎漁家詞曰前江水順水平流漁婦移舟折海榴折得一枝簮緑鬢怕歸渡對人羞曰美哉華而不逞樂而不流不愧其冥冥者乎山水詞曰水何碧雲何黃漠然真是水雲鄉水雪鄉梅灼爍一夜東風盡開却幽鳥飛來不知去幾許芳心欲偷啄曰美哉休休乎心乎悠悠乎迹乎散乎留乎其得於天者多乎是奴僕命騷之苗裔歟何思韻之深長也樂藝自六七嵗時在蒙學中為諸童子引詩對或一一代為之得筆墨不煩取于家家人異之凡書一過目輒成誦師兼授以試之略不為困十餘嵗時能長吟不起草鄉先生每以為莫及而知詩者皆知其駸駸乎將薄乎古人也年草七以沒家人失其稿得於人所傳誦者止此且夫詩苟美矣雖一句傳於後世可也士苟賢矣雖夕死可也豫嘗北遊過襄郢之間秋風時來誦邢居實之三疊而悲斯人之蚤亡也夫涉世而後才豐棄人而後天全異乎古所云斯人之流所謂造物所忌者非耶孔子疾沒世而名不稱是天之所寶者其在斯人之名乎阿留陸容阿留者太倉周元素家僮也性癡呆無狀嘗使執灑掃崇朝運帚不能潔一廬主怒之則擲帚于地曰汝善是曷煩我為元素或他出使之應門賔客雖稔熟者不能舉其名問之必曰短而肥者瘦而長者美容姿者龍鍾而曳杖者後度不能悉記則闔門拒之家畜古尊彞鼎敦數物客至出陳之留伺客退竊叩之曰是非銅乎何黯黑若是也走取沙石就水磨滌之矮榻缺一足使留斷木之岐生者為之持斧鋸歷園中竟日及其歸出二指狀曰木枝皆生上無下向者家人為之哄然舍前植新栁數株素恐為鄰兒所撼使留守焉留將入飯則收而藏之其可笑事率類此元素工楷書尤善繪事一日和粉墨戲語留曰汝能是乎曰何難乎是遂使為之濃淡參停一如素能屢試之無不如意者元素由是專任之終其身不棄焉傳者曰樗櫟不材薪者勿棄砂石至惡玉人賴焉蓋天地間無棄物矧靈於物者獨無可取乎阿留癡呆無狀固棄材耳而卒以一長見試實元素之能容也今天下正直靜退之士每不為造命者所知遲鈍疏濶者又不為所喜能知而喜矣用之不能當其才則廢棄隨之於戲今士胡不幸而獨留之幸哉王昌祝允明義興人王昌有竒力治田不以牛身犁而耕妻駕之昌一奮土去數尺或抵塍塍為之動嘗餽運昌肩舟之桅而擔焉前後堇十鍾達數百里他舟人不知昌乃或侮昌昌曰若欲以衆攝我耶雖百人胡能為衆恚集鄰船得百許人爭欲擊昌昌持檣拂左右左右及拂者無弗溺者昌山行見蠅蚋紛然起叢薄間視之有巨蛇長數十尋昌走不竟蛇蛇將尾而置之口昌怒捉蛇尾而振之舉投空地逮地死矣途間遇搏虎者持鎗戟來昌弱其具都折而置之自拔巨竹削其端使廉甚水以和之火以堅之方俯僂治竹未就虎突至後昌不及運竹便以兩手搘虎兩膊又空執於一掌抽腰間竹刺虎喉信手一擲踰其背後樹杪斃焉昌或久虛其力輒手足撼掉不自休速奔山中擢林木數株運弄之或提頑石行百匝兩無為于室則索綯如杵數十丈寸寸搯斷之力稍解云昌有女力肖其父陸有修艦衆莫置之水造昌廬命昌昌病命女女往辟人獨蕩舟手及舟舟在水矣昌行四人以行連其名呼曰昌四白石翁云聞之其鄉人岐山叔父侯一元二谷子曰茫乎幽沕哉天道余莫測其倪焉每旋觀民故覽察所由未始不泫然悲也世常言禍福有本自淑慝生以徴諸耳目所睹記常不酬時大乖刺焉儒者多方則救之以經變曰理從而數忤者也從者經忤者變欲以籠其紛糅納諸環中余嘗贅若説以為善惡自人所祈嚮有殊耳禍福者遇也無緣而行猶寒暑晦明也時然而然寧有所繇者耶故君子不沮喪不雄成不逆來不跖往油油然從而徂斯不亦達人大觀也哉生死之於禍福大物也而生死有大較焉曰修短修短有大較焉曰正變自箕範明命極福以示威嚮民莫不尊壽而賤夭樂夷而怵難有蹈所惡則相與翹其疵纇以明有召若裴氏之前鑑子安是己尋其言有條余獨以載籍所稱算勤其官而卒水死楚妃需符而入漸臺之下李白才也沒於采石杜甫志比稷契漂死蜀江張世傑營宋社稷身禱盲風不霽竟覆崖山此數子者當安所獲戾而至是易曰過涉滅頂凶無咎此言行不自已則無所咎也且王子安文行不掩未聞其有大詬也並時而生者巨慝大懟貪狼窫窳之徒衆矣咸壽終于寢不聞他患以勃方之不猶愈乎而謂禍福由天意奪此與彼何其傎也凡修短不齊齊於盡所由盡不齊齊於化由今鑒古腐骨一矣在所存而已誠有所存雖湘江流人吳門放士會稽巫女名隱隱谹谹而傳後世自汙泥顯無所存則雖錮南山周石椁為藏送者畢乎同軌前紼萬人數世之後無餘處矣是以莊生齊鳶蟻管晏明不在我王孫富人而用倮葬非詭情而妄諉也彼亦有大掦榷以然悲夫余岐山叔父為人修文慎行鄉黨稱寡過焉弗逢有司以貢上春官業國子訖事還至浙風於錢塘溺焉余既䀌傷骨肉而重哀斯文背膺交痛咽弗語者久之客或謂余岐山子之死非天道矣禮云君子不弔溺為忘孝也自昔而僇之獨如岐山子何余曰六經自秦火後多贋而禮尤甚果若所云則是澤國之民終不可為孝而箕以下凡水死者皆不得奠楹致客比於齊民抑何不幸之甚也凡禮經踳駁多是類不足悉掊擊余既粗明天人之際復次叔父之行較著者一二以發其凡俾誄者有擇焉叔父興寧公之後興寧公仕興寧也惠于政民尸祝之再傳乃至叔父有昆弟而伯考無嗣以叔父嗣叔父之考鄉偉人長者也賢叔父愛之雖外嗣常父母之不使叔伯己考卒叔父行三年喪士友諫不可則請期衰而心斬是嵗當大比士故事士大比不得辟期以下喪而新督學某公者有嚴聲士人人自惴用是學官以法強行叔父比至則前泣願納巾服為編氓終喪督學不可意弗信愈益督切之俾為文文不滿數行手卷俜然以白督學督學嘆曰允哉孝子乃欲以不終試丐吾罷舉也雖然以文則子不當廢卒舉之夫人道孝為大孝善喪為大俗之敝也齊斬而御酒肉越紼而從慶勞或乃乘而講牢巹安錦稻若平時命曰借婚仕者喪未斷有所規取即竄文書損月日變服而趨利嗚呼孰有自致至隆抑捽從禮復祓心哀痛不疚聲利如叔父者耶叔父既嗣伯考襲有其廬乃獨處廬東偏而以其西偏居其生父昆弟之遺孤嫠人曰岐山子哀其猶子而借之居乃後叔父竟不言借借者久之亦自以為已物則反數有短長謂叔父盍歸我直我且出而其責直高叔父如所責償之無吝色人曰岐山子乃以已直市己居也此亦世人所錙銖較者叔父尋丈而委之叔父美髭髯工談討與人言時時雜以諧謔莫不雅循有致凡人情物曲委瑣蕪穢者自叔父發之即融灑間暢文采琅然聽者不忍去以是歡於人人至其臨大是非謀大疑凛然矩矱不求調於人人亦以是重之知其非無町畦者也嗚呼已矣訃之日邑人士無賢愚疏戚知不知皆為流涕哀誄並興有黃鳥之餘悲焉傷哉叔父今且驂虬乘螭從文魚而侣伍子入湘弔纍及河唁狄古之人若林咸希風而來最皭然泥滓齊光日月豈復戚戚兒女情哉知叔父者其無噭噭然以怛化為也嗚呼悲夫二谷子曰余所次岐山叔父之行事不能什一爾乃余則以為人道莫尚孝慈者矣叔父致孝而不閡于制務恤孤而弗效之尤也豈非難哉乃其細小則薦紳先生類能傳之然亦得其一曲以言乎大全猶有憾焉往余遘叔父金陵也蓋同臥起連觴豆數日乃去云叔父法語森森與之處日起畏余業己怪憚之昔武帝謂東方生何言之善竟得其死叔父平生語多詼今不詼顧益莊聽之乃無一語不依于仁義將别送余都門手而曰語我二子讀無嬉我且旋至言琅琅然未絶乎余耳也魂黯黯焉期而至悲乎悲乎叔父之所不可傳者逝矣夫雖然叔父不蘄悲而悲人聞而莫不齎咨不蘄傳而傳君子有美言煥然而簡編令百世之後咸知叔父之賢也叔父雖枕流入齊以禍終亦優于屬纊遷寢逺矣乞市者陳鶴武林山中有乞市者衣裂履穿貌舒而心逸索人食獨寬一市人疑以問乞者則曰吾戰卒也主軍陳三嵗而不一敵卒多死惟吾善走得存不若往丐之為愈也市人聞而責之曰爾何不義若此矣今海夷之延禍也民業凋瘁農蠶不時吾延頸以望戰傾耳而待捷爾何不自奮亡命而不思耶乞者曰吁公謬罪我昔者士卒連部運旄而示令者惟主軍一人焉軍令吾進則進之令吾退則退之于凡䇿畫變見以出勝負者一皆主軍之所施非吾卒之能奪也今府庫之入嵗且七八而布於召募者六焉坐飲臥餐曽不知習練之勞竒伏之訓一旦赴江川昧地道突然夷來弓刀自廢當是之時惟知走之為豫也主軍不能以自罪而歸於部長部長不能以自罪而歸於行伍行伍不能却且罪且死矣吾安戀升斗之餉以寄命於卒哉故寧以乞市自終耳雖然吾乞有年今亦有得於乞者我自朝至夕經千舍而千乞焉然與之者不為喜抗之者不為怒多寡亦不為計也飢而食焉飽而息焉或絶吾乞亦坦然以嬉無富貧之動慮無骨肉之纍情遠鋒鏑忘勝敗逍遙乎閭巷任所寓而為之家今吾年且六十餘矣以百約之則來者少而往者多也知其進亦不可以成功拜侯故退而乞市以全其身耳非袖手視敗以甘為不義哉陳子聞而嘆曰若乞者似亦有道者之流歟余嘗觀上世百勝之師矣必先練其兵卒以待其敵一或有勢不可則出竒設伏以收萬全之功今安有不習技而能幸勝者哉乞者知其故且自度師必無終遂乃匿形于汚流以逺禍害隨緣寢食淡然得失之外其較之千金之子勞簿算計費直為子孫憂消長抵死而不悟者不亦逺甚耶中官羅虞臣原子曰中官之寵其來尚矣浮陽比伊霍之勳費亭視良平之畫蓋自桓靈之際烈矣唐興建五局之號立令丞之職降於天寶衣朱紫者動以千數世主昏弱倚為扞衛故輔國以尚父見顯元振以援立致奮及至凶愎參會黨類殱滅王室亦夷迹其盛衰之原亦國家安危之繫也然古今之論中官必曰善佞曰貪賄善佞貪賄二者誠足以誤天下而誤天下獨不在中官何也今善佞貪賄之巧莫過於士夫苟順苟容結納左右求親媚於主上及至得意乃挾主威以阻天下之士氣誇主寵以樹天下之朋黨窮主欲以盡天下之財貨蔽主聽以亂天下之是非是病天下之原也夫中官固刑餘之人而掖庭房闥之職也聲名無耀於門閾肌膚靡傳于來體而責以君子之行非其任矣何者中官善佞貪賄固昏主之所惑也而明主所易察也是故不足以誤天下若士夫善佞貪賄之巧雖或明主莫之能辨矣是故誤天下多由於士夫士夫實有誤天下之姦而以其誤天下者歸咎中官欲起而擊之此禍亂所由成矣昔張讓詰何進曰今天下憒憒非獨我曹罪也卿言省內穢濁公卿以下清忠為誰悲夫斯可以愧士夫矣明興高皇帝初定宦官之令止給宫中之役置監有十尚膳以掌供養尚寶掌符璽尚衣掌冕服司設掌車輦牀褥帳幔內官掌成造婚禮粧奩并諸內使貼黃宫中器用司禮掌冠婚喪祭之禮儀制帛及御前勘合御馬掌廄間與諸國貢獻典牧所屬印綬掌誥劵貼黃選簿符驗直殿掌灑掃神宫掌守奉園陵其官級次有太監少監監丞之等長隨奉御之號至鐘鼓惜薪兵杖織染承運司鑰諸司局庫之屬皆用宦者為之各令食職於內無得干政待之極嚴始未嘗不憂其漸起而思壓絶其原也逮自文皇永樂以後增至二十四監是時詔以李恭等守備邊鎮然止西北路一二要害之地耳恩寵之任肇自章皇中官始盛內而帷幄論事外則鎮守諸藩故使廣以採珠奉命守邊以監督見委司織造於吳杭通貨物於洋海買善馬於西北銜命四出旁絡道路斯亦峭塹潰壞之漸矣然而幸路未啓大臣尚知據法劉永成宦者也有軍功而沒天子議欲追封伯爵內閣力爭曰祖宗成憲具在誰敢違之事竟寢不行然蟒衣玉帶之加褒亦少濫訖於毅皇正德之間爵及家人勑由內降賞封之制可謂不檢矣豈非其初略於澄本塞違鑒微識著之義哉惜夫故自已已之變廷臣議欲遣使迎復興安面折羣臣曰爾輩故欲答使且來言孰可行者孰為文天祥富弼其人耶衆莫能答成化時帝嘗決事於內大學士彭華曰請得如先朝故事召見面議遂託諸常侍奏聞有頃帝御文華殿召華等見華言昨準御史奏減京官俸之半然文官尚可武官不免鞅鞅須陛下大發明詔以慰人心帝曰卿即傳旨與該部華等頓首呼萬嵗而退於是諸常侍笑曰常言不召見及見無一竒謀至論止呼萬嵗因名華等為萬嵗閣老云由此觀之士夫之行無以服其心故羣譏笑之余按自宣德以來表其德寵著惡與士夫所釀成之者於篇蓋亦當世得失之林也使後之君子得考焉他無所與成敗則不著自文皇時有孟繼章皇時有陳蕪蕪交趾人帝為太子時蕪得幸帝即位賜蕪更王姓名瑾常從征武定州還受賞金帛寶楮纍巨萬又以兩夫人賜瑾官其養子陳林亦從瑾姓曰王椿及景皇帝立瑾常有疾帝遣醫往治復遣中官遺金帛飲饌問安否旁午道路不絶瑾卒又命官其奴與其從者一十二人賜鈔五十萬緡恩寵之篤莫與比然瑾性嚴謹睿皇時則王振方振未貴楊榮楊溥楊士竒同時秉政然議懷私便內互猜忌遂迭請告展省振乃乘間托拾三楊之短會僉事廖謨杖死驛丞有司奏逮治榮溥曰謨罪當死士竒曰宜論謨因公律士竒與謨同鄉故解之爭久不決振間言於上曰三楊皆私坐死過重因公過輕宜對品降調帝韙之因信任振從此奏白多裁決於振矣居亡何振又發楊榮受宗室賄請覆案之榮竟以憂憤死振權日重學士劉球上封事請因天變削振權振怒遂用他事下球獄殺之自時公卿畏禍重足一迹皆爭附振以免死為解振又請征麓川自將逺討廣地荒夷濫費爵賞九溪貓獠乘時不靖中國多釁耗矣至己己之變振死於土木景皇時有善增增恃寵多驕恣貴幸不及瑾振二人而聲勢赫畏頗比於振是時公卿皆因關説增誕日各奉土珍為壽盈門庭矣純皇時有汪直黃賜談勤直為人便黠得幸成化十一年妖賊李子龍坐出入禁中與宫人亂伏誅帝鋭意欲知外事乃任直刺事西厰會建指揮楊曅殺人事覺走匿京師賄大學士商輅等求解直知其狀奏捕曅辭連引其親屬楊仕偉等十餘人皆被逮下獄後曅死直又遣人盡沒入其家得曅嵗所結納諸當道簿欲入奏朝士夫聞者半嚙指矣及直巡邊又發都御史牟俸贓巨萬下俸獄坐戍由是都御史官皆鎧甲戎裝迎直百里外伏謁望塵挨過然後敢起至入館復易小帽曵􅮌趨走唯諾自治供帳上酒食故京師謠曰都憲叩頭如搗蒜侍郎扯腿似燒蔥言卑靡而猥也而尚書尹旻王越都御史陳鉞御史戴縉王億皆以倚附得據寵位後直坐擅啓建州釁罷免獨王賜談勤此兩人皆著謹媚然其權任不及直孝皇時李廣以方技進貴幸日篤勢傾中外大臣多用賄求𢎞治十一年建育秀亭於萬嵗山適成會少公主患痘瘡廣飲以符水遂殤宫中多歸咎廣久之清寧宫災或曰亭之建年月不利皇太后怒曰今日李廣明日李廣興工動土致此禍災廣懼飲鴆自殺帝聞廣死意有竒祕方書遣人廣家索首得其納賄簿簿載某官送黃米幾百石某官送白米幾百石帝曰廣所食幾何乃受許多米耶左右對曰黃白金銀也帝怒命沒入廣家於是言官請出簿竟案諸與名者急甚夤夜走壽寧侯求救不期會者十三人由是事得寢毅皇時則有劉瑾馬永成谷大用陸誾初皆給事太子家毅皇為太子與相愛及即位益親幸由是日導帝狗馬鷹舞唱角抵之好宴遊無度尚書韓文等用功能進賞益加祿米四十餘石兄弟家人皆得拜封伯爵其傅奉為錦衣衛官一門數人國朝恩澤之封蓋自兹始焉是時中官布滿天下割削黎萌劇盜緣間動搖區夏中官之禍至正德極矣今天子詔定班爵之令侍中侯封悉見削黜九年詔罷天下鎮守備監鎗官潛消國釁用章中興之治某謹按天順八年詔令裁革止江浙關閩臨清五地鎮守其各邊正統前所置率如故令百年未剗之弊蘊夷殆盡學士縉紳莫不喟然嘆興太平之基也功德施後世至深長矣初上在楚藩習見毅皇任中官之過及即帝位御之極嚴左右賞賜悉從古制有罪撻之至死陳尸示戒又禁天下幾省不得進閹腐小豎今給役省殿視先朝僅什之一二爾亦天子鑒昔思治之義也乃若近嵗高忠麥福之徒以建造頗見寵任然取過庸不篤無足數也其後五年禮部請收京師內郡自腐者一萬餘人第為三等上者給役宫中次者留應各王府補缺又其次者充海戶皆得嵗食粟錢如令然而非所以汰冗費杜僥幸之路也天子重違其議詔可之自此之後則民多腐身熏子求進用矣明文海卷四百二十五
