body:
  text: 明文海巻四百二十六餘姚黄宗羲編傳四十雜傳山人操舟丘雲霄止山子與程生君正將適越舟次城村有山人將之市呼渡甚急渡者曰舟楫具盍自渡而嗚嗚然也山人遂取楫放舟未中流漂蕩而下山人驚悸不自支將遡流而順鼓欲左舟而右楫顛倒失措而舟愈蕩有浣童子紿之曰急跪拜可止山人即跪拜環江而視者為之拊掌絶倒山人力窮乃呼救甚哀為有力者没而渡之止山子顧君正曰子識之學不達於經濟使居位操政柄不至顛倒謬戾而淪胥以敗如若人者幾希其能免天下後世一拊掌耶故曰上者舟也下者水也水以載舟亦以覆舟蓋善操則濟不善操則溺府君仁庵公丁自申公諱善字彦仁仁庵其别號也其先自蘇州籍居晉江之文山里元至正末隨父大臯公徙居城南門外二十里許是為陳江今族姓櫛居江上公所貽也公為人倜儻志大以才略雄於里中陳江故多巨姓著代年逺自公後至擇一二門第相埒者與為賔禮而諸族無不俛首承伏環江居負海而海潮所往來處其地鹵㵼宜生海錯諸鮮居民受産以為業謂之海蕩沿海瀰漫一望數十頃大約産以什計公有七八其二三則與公為賔禮者得之而他不與焉國初更定籍版患編戸多占籍民官為出格稍右軍鹽二籍欲使民不病為軍而樂於趨鹽公抵縣自言有三子願各占一籍遂以三子名首實而鼎立受鹽焉其地無鹽之産而有鹽之征公之意第急於應令然亦自知其後必繁衍果可無累於斯役也觀此而公之慷慨好義可知已時海内甫定尚襲䝉古色目之舊里社好為白蓮㑹摇惑衆志官雖為厲禁猶弗戢有司廉公行誼使糾于鄉公發鴈溝諸黨觸禁白請以官治之新令方嚴而犯網者衆致獄嵗久不能決奏下刑部逮公與諸黨至京連及公之長子俱繫獄按法奏十人以上大罪不實當論死而諸黨揚揚然得志謂公父子當庾死獄中即骸骨不能返丘墓矣㑹有寫真者高皇帝召寫御容酷愛其似忌復為民間傳寫幽寘於獄一見公歎曰公非獄中人也當有遐福索紙為公圖小影片幅以遺公且曰後當無忘余言是夜公夢獄卒唱云北風吹倒玉欄干救出獄中苦難白頭老子歸去始知天意循環唱凡數過歌聲琅琅公驚起拊長子背曰傳神者之言豈固有騐哉己而果大風隕刑部欄石尚書檢獄察公寃覆訊再四隂致諸黨倣作白蓮社狀就衆中褫其巾幗諸黨盡伏辜無辭具獄奏聞乃治諸黨十八人編戍而出公父子於獄中其小影夾置衣領中以行公歸猶十數年老於家壽終七十八論曰夫觀仁庵公可不謂天道無親常與善人者哉方公繫獄論死度生還無日矣向非大風明公之寃以儆夫司寇者則囹圄之下幽同屋蔀何有於公之一死耶今吾子姓食指數千皆飽公之粒夫苟不力為善以不獲祐於天者非公子孫也申嵗祀瞻拜公像見公時雖在獄中而眉宇英氣襲人彼寫真者得以鑒其貌而騐諸後毫髪不爽也抑古之所謂有道者歟談參邵圭潔談參者吴人也家故起農參生有心筭居湖鄉田多窪蕪鄉之民逃農而漁田之棄以弗闢者以萬計參薄其直收之傭饑者給其粟鑿其最窪者池焉周為高塍可備防洩闢而耕之嵗之入視平壌三倍池以百計皆蓄魚池之上為梁為茇舍皆蓄豕謂豕凉處而魚食豕下又易肥也塍之平阜植果屬其汙澤植菰屬可畦者植蔬屬皆以千計鳥鳬昆蟲之屬悉羅取法而售之亦以千計室中置數十匭日以其入分投之若某匭魚入某匭果入盈乃發之月發者數焉視田之入復三倍參且纎嗇憚費平生無紈綺服非大故不宰割毎飯熟一卵竅可容箸者箝而啖之飯畢封其竅留之再飯三飯乃盡以故參之貲日益窖而藏者數萬計然弗子僅有女女所適者某睨其藏久之一日參病亟某請曰翁脫不諱即誰嗣者參曰己有屬矣若將利之耶叱去之參死某乃謀戕其所屬者蔓而戕者幾人搆為獄官没參之産某盡歸其藏云邵子曰昔馬遷論貨殖謂巧者有餘拙者不足噫亦安所論巧拙哉莫巧於參矣參自奉不輕盡一卵有餘胡為哉矧參無遺算矣於身後計懵如也巧耶拙耶噫千匭百匭歸一匭矣謂千匭百匭者巧耶謂一匭者巧耶余故論之使效參者評焉潘屠車大任夫君子秉持人紀勸善懲惡猶必以神道而設教非語怪也欲以濟其勸懲之所不及故君子有不廢焉潘屠者名麒秀水人居新城鎮之急水橋素以窣屠為業孟子曰矢人惟恐不傷人甚哉其不慎於擇術之故而然矣雖然世之為屠宰者豈鮮哉未必衆惡之皆歸稍獲令終無足怪異乃潘屠賦性兇暴先不知有母戕其母命又不畏天地神明雨晹偶愆輙加怨恨怒視三光其對天地父母也此屠宰之心也奪人財貨滛人妻女其視人之財貨妻女也亦此屠宰之心也見人强梁者附和之柔善者欺凌之教唆播弄致人繫殞而不恤其秦越視人之肥瘠亦此屠宰之心也新城鎮人畏之如虎惡之如蛇蝎壬寅秋八月二日身死越宿復甦語言動作一如舊日其妻大喜過望麒乃告其妻曰無以喜為也閻羅天子謂吾素行不義當受惡報第世人不信因果即自信者不親覿其苦狀誰則畏之是以死者受報生者不知往往作惡無忌上帝哀憫下民之無辜欲以津梁普度之令吾傳示萬衆暫時放回何喜乎語訖遂操刀自割其隂曰以報吾之宣滛也又自摳其兩目瞳子曰以報吾之怒視三光也又自斷其喉舌曰以報吾之致人繫殞也又自剖腹刳心曰以報吾之隂險賊物也是時隣人相與錯愕驚駭連日逺近來觀者千百人其妻初猶恥之揜戸而阻人入麒復告其妻曰閻羅天子正欲以吾示衆何阻焉但見其痛楚不覺直延至六日後方死同里居有諸生王道立者竒其事述而告之屠緯真緯真遂製因果記一篇示余余讀之歎曰因果報應之理從古有之使因果不足信潘麒之受報不宜若是酷且烈也彼其操刀而割孰令為之孰令受之如其知痛癢也何能强為即使不知割其一而己足何有餘勇漸次為之直至體無完膚而後已乎緯真所云人死而受苦報不屬形骸俱屬神受是神也非獨閻君之神儼然臨之在上亦潘麒之神自為鼓舞承當於下蓋造罪者神而受報者亦神形滅而神不滅信斯言也真足以喚醒愚䝉而鍼砭膏盲也己或曰子言因果報應之彰顯者若此何以孔顔之阨盗跖之壽而天固有所未定乎無論孔顔即如世人有忠孝節義者反受屠戮之慘檮杌饕餮者或享富貴之福又何漏網至是也且潘屠事誠足異何以止見於新城一方之人而他不多見耶余曰否否不然蘇子瞻謂雷霆擊不孝之人有時而不可測閻君處潘屠之事亦有時而不可測也不然物物刻而雕之嘵嘵然以示於衆閻君之威幾於䙝矣夫生死幽明理至微妙孔門未嘗一切諱之不以示人而世儒見釋氏有輪廻三世之說動輙以韓愈藉口豈知作善降祥作惡降殃即韓愈亦不能别為之解蓋吾人所造之善惡即因也所受之苦樂即果也蘇子瞻又曰吾人修徳於已責報於天取必於數十年之後至其子孫而定己久矣吾是以知天之果可必也蘇子固善悟此理者但三代而上其人多作善故壽考亦多三代而下其人多作惡故夭折亦多是以人相忘於因果如魚之相忘於江湖一在今世則罔悉前因安處今生則不悟來報而不知善惡感應之理毋論其遲速久近斷斷乎毫髪不爽譬之種樹者然前世因即種子也其生而後之受享則果之結實也又譬之索逋者然千金則償千百金則償百其福業之淺深亦如其所償之多寡也生生世世循環不窮神識常存形骸可改論至於神似無可逃而人猶不悟者惑滋甚已余聞馬少師諱文升者其卒之明日里人有王姓者自鄉回遇公於途見公蟒衣玉帶騶從嵬峩若素日出師之狀拜而别焉歸家問人則公己告終數日矣生為良佐死為正神寧獨馬少師然哉近世士人有作感應篇者中間稱述大都類是是故吾人觀馬少師之事則為善者興焉觀潘屠之事則為惡者懼焉王生素以孝行稱乃亟亟然傳此示人蓋與緯真氏同一宣慈䕶法之盛心也雖然此但可為愚人設耳聖門謹獨之訓其嚴乎君子無所慕而自善無所畏而自不為惡固不待其回生以示衆而始知其不可忽也故曰此君子所不廢非語怪也胡横江公曽朝節余友格齋盧君思道素受業胡横江公公捐館舍久矣思公之遺教不能忘自為述以書遺余京師乞為公傳余童子時一再見公長乃知學已不及叩請盧君篤學人也其於公甚深余乃採掇其大合於所聞庶幾不謬誣焉公諱秉觀字尚賔行貴三十一别號横江世居桂陽州下鄉石燕坊父鯨甫母鄺氏正徳壬辰正月二日生公公質敏慧幼為舉子業㳺州庠嘉靖丁酉負笈道州從周合川公學合川公曰吾亦將往求師公曰師己登科復何師乎曰吾求師非舉業求以學聖人也去此六千里子能俱耶問為誰曰泰州王心齋先生具告以先生之學公欣然曰吾將歸禀於親束裝往從抵安豐里合川公以公見先生先生喜其有志踰月公聞先生之教日有領悟先生與語不倦公亦遂忘嵗月既三年告歸省先生贈之詩所稱許期望一時及門之士未嘗有焉將行而鎮江有欲迎致先生者先生即命公以其便代往寓東霞寺中三月闡發先生之學多所感奮陳竹溪諸君作巻送之時庚子二月也歸一年而先生訃至為心䘮毎以不獲再詣安豐為恨歸既罷去其業至是愈以倡學自任方鄉居日與里族談學里人環堵而聽歌聲常徹四野維時湖以南素不知有學公崛興風動遐邇吾武邑彭健堂顯卿首毅然往師事之遂以轉告同黨有志之士皆相繼執北面禮及公來遊邑中從者彌衆王君立齋有我欲終身横江子之句大司馬凝齋劉公時未第顧以信慕公父一溪翁訶止其行則日與彭君過從私所論議獨有契也其後劉公雅談名理有聲縉紳間本之則公倡云公造沈邃而智開朗妙得章句之外所與同志語竟日乃莫不歎服曰自吾見先生始得聞之其教人惟自體騐身心初不規責人過失或不得己但曰某不用功如用功則自無差失矣有問功夫者毎於坐定時指㸃喜怒哀樂未發之中體乃示以慎獨之功聞者咸見意趣莫不樂學公别築一室便生業以給來學門人滇中李明著謂為小人之事公曰得諸友來共明此道使善人益多雖躬耕亦為天下養賢固無愛於吾力也所著有立志盟省道說了心說惟以明學㫖不蘄為工别駕王劈泉公造請其門洽旬而後去月崖李公平大槁峒冦諮於公卒以收㨗州守蔣可齋公特加延禮迎宿於署中萬公守素則為題楚南獨秀匾贈之癸亥以疾終正寢將屬纊盧君進曰先生棄弟子往何處也先生涵養有年心體今若何公曰我此心明明白白再問生死證騐曰無今亦只有此心初盧君之從公學也嘗問打叠此心潔淨似亦無用公曰陽明先生云只因些子還嫌少空自支離過一生又誦程子語云一物不該非中也一事不為非中也忽不覺言下有省盧君歸久不至即以書召之曰吾欲爾來豈欲有弟子耶爾以我為師我亦如有師矣同堂共室積嵗累月相觀砥礪久而功夫熟庶幾有成聖人之學豈容影響湊泊乎及論身方心圓心方身圓類精思㝠解之語微盧君亦孰能抽其緒發其藏哉公配李氏有賢行子三天一天然天徳傳主在著公之學他固不得偹載爾元平章陳有定郭造卿陳有定一名友定清流明溪人幼孤傭於橘州富室羅氏雖病頭瘡其狀魁岸有志略即樵為戲輙設隊伍羅竒之將以為壻其妻不悅以為瘡頭郎因失鵝而奔宿於隣舍王氏之門其家夢虎踞門得有定大異召飲食乞於羅妻以女俾習商販善敗大困充明溪驛卒至正紅巾冦起壬辰寧化曹柳順據曹坊擁衆數萬其黨八十餘突來明溪索馬衆莫敢拒有定被酒半酣諭衆紿而盡殺之柳順怒率步騎千餘將屠明溪有定發老孺登寨誓其侣賴政孫通胡螭等五百人乗柳順營自馳擊之斬獲過當遂進屠曹坊擒柳順以歸事聞授明溪寨廵檢羅翁賀之曰虎踞門之祥自此始矣有定謝以瘡頭郎豈敢翁謂不然陳嬰在秦以蒼頭封侯昔呼子者為之兆也子幸勉之大丈夫豈止此哉是年我太祖起濠州有定尋陞清流縣尉隣冦數十皆所剗平陞延平路總管戊戌十一月癸卯偽漢陳友諒將鄧克明䧟汀州越庚子進圍清流有定駐兵於縣前平安寨間道夜襲大敗之追於寧化清流以復繕崆峽嶺闗寨及南北寨守之是年福建行省參政袁天禄以福寧州歸我太祖壬寅五月有定復汀州鑿九龍灘石通舟楫以運汀粮鄧克明偕胡廷瑞復䧟邵武延平攻建寧城西北立數拾砦以鐡礟火箭雲車機弩攻突不少息凡十有八旬城中食且盡平章旺扎勒特穆爾謂非陳總管不可解八月壬辰有定奉檄偕行馳十數騎冒圍入城衆懽呼陳總管來吾屬生矣有定叱守將阮徳柔開北門焚橄欖山砦還奪水南砦敗之於菱角塘萬安州賊踐溺者千餘人孫通等尋復建陽崇安浦城諸縣有定尋復邵武郡縣賊散走輙遮殺之度三闗以遁安撫使李國鳳上其功第一陞福建行省參政事乙已四月太祖時為吴王命元降將胡深以處州總制王府參軍同指揮朱亮祖祁興耿天璧等統兵三萬五月至閩五戰浦城之南進克建陽崇安太祖甚慮有定豪悍㨗至大喜以所乗駿馬賜之有定赴建寧遣阮徳柔兵四萬屯錦江繞深背以㫁歸路深破其寨有定率牙將賴政等二千餘人突與深戰徳柔逆兵夾攻深馬蹷被執頗寛遇之深為具道朝廷威徳并陳天命所在援竇融歸漢事動之有定曰己既被執而且誘人不忠何耶我太祖遣使以良焉金帛贖深㑹有元使至督逼之遂殺深并其使我太祖震悼丙午興化林珙與惠安陳同柳博順仇殺引番阿固鼐及伊巴尔希木兵時博順據興化行省檄有定討捕番冦遂南下四月阿固鼐黨博拜等攻興化寧真門有定子宗海已領兵夜入城明日開西南二門縱兵而出旗服鮮明步伐整肅亦思巴奚所恃弓箭刀牌宗海兵直搏之伊巴爾希木遂大敗僵屍數千追擒博拜等殺之是日有定師至撫集軍民完復路治聲勢赫然博順在城中聼令而同及珙皆領兵奉約束先是泉州賽甫丁據福州路戰敗餘衆航海還據泉州故有阿巫那之亂有定命宗海督博順及同等兵合珙水軍並攻泉州自以師繼之五月克泉州擒阿巫那等興泉二郡始免於禍八月留福建行省平章政事右丞修城池養銳備儲分遣諸將各守郡縣時長汀人羅良授漳州路總管與有定素有郤九月有定使至漳良獨不下乃以書責有定有定大怒益發兵攻之良使三千人伏江東待之誡有警勿輕移忽有定兵千人夜攻海倉寨佯言奪海舟乗潮直下警至伏兵悉赴之有定遂渡柳營江士卒驚潰良逆戰敗績遂圍城良誓死守踰月部下有叛者延有定入城䧟良死之有定遂據漳州以其地勢完固乃鑿山以洩之而縮其城西凡平閩諸寨三百餘奄有潮州以行省郎中王翰徳望素著表授潮州總管兼督廵梅惠丁未五年戊寅元以空名宣勑遣赴福建行省平章曲出及有定驗有功者授之政由有定出行省都司藍光獨謇謇持正一言不合遂拂衣歸蓋多更制用其私人朝廷命官不與矣福寧州人陳瑞生為福建宣慰使出鎮福清州拒有定被執憤罵見殺其妻及幼女投井有定由福清平海上烏尾賊海上人立碑頌之崇安令孔稭拒有定而死建陽人詹翰自保障其鄉不從有定遇害有定於建陽因閩越王大潭城址増築之以備我太祖兵先是胡深没太祖問太史令劉基基以有定守株虜腹中無書不足畏惟方谷珍負山跨海可虞既平珍由海入閩取之如反掌耳九月命御史大夫湯和都督吴禎領兵三萬征方谷珍谷珍請救有定恨其部下悮殺海戍不之援谷珍遁於海十月甲子命平章胡廷瑞為征南將軍江西行省左丞相何文輝副之湖廣參政戴徳孺隨行由江西取福建以廷瑞本偽漢將嘗攻閩中而知地理險易也十月壬寅廷瑞攻杉闗賴政為指揮戰屢不克退保汀州廷瑞遣指揮沈守仁費子賢乗勝略光澤下之十一月甲辰廷瑞至邵武守將李宗茂降丁已至建陽守臣曹復疇降留沈守仁守之是時方谷珍降得舟楫萬計戊午勑征南將軍湯和副將軍廖永忠都督吴禎舟師自明州由海道以取福建己未廣信衛指揮沐英帥師破分水闗畧崇安縣克之太祖問閩中諸將於御史中丞章溢對曰兩道進兵此固必勝宜兼用韓信修棧道度陳倉之策閩人尤聞李文忠威信若令文忠更引一軍從浦城取建陽萬全計也次日詔文忠等出師以溢子存道率鄉兵從之文忠督部將繆美鎮撫譚濟等兵三萬攻浦城有定守禦偏將胡螭豪悍多力屢出死戰美濟兵屢不利文忠復遣萬戸武徳兵挑戰璃不為意閉闗酣酒而臥繆美武徳乗夜雨斫闗入醉起手刅數十人時大寒血凝刅遂敗死進攻無蓋銅船山寨文忠不敢輕進乃屯浦城待海師消息有定大驚自率兵至延平復遣兵至邵武建陽十二月湯和廖永忠徐大興吴禎費聚謝得清等帥舟師由明州海道擒把海指揮孫通嚴程乗虛而下不數日掩至福州城下圍西南水部三門直入鼓譟守臣曲出遁守將瑪爾達出降湯和整衆入行省宣政院事多爾行省郎中拜特穆耳死之廣東㢘訪司僉事呼圖布迪音寓福州投井死江西行省郎中吕復攝長樂自經死行臺侍御史韓凖病不服藥卒元參政王仁遣宣慰使闗珠至興化諭降有定所設府判徐昇及元帥王思義葉萬等殺珠及經歴鄭元明走泉州軍民自至福州納欵戊申正月乙亥太祖即皇帝位改元壬午胡廷瑞至建寧參政陳子竒堅守壬辰克建寧執陳子竒械送京師湯和等命指揮孫虎督新附者守福州乗勢自水口舟騎並抵延平水南隔溪而陣廖永忠渡水攻西門有定倉卒遣參政文殊哈雅指揮賴政等七戰不勝閉門堅守湯和奉命招降有定嗔目語我為元守土官可以土地易富貴耶子宗海叩諫不聽遣其出守將樂將佐知其不降乃請出戰有定疑攜異殺其將蕭院判士卒多踰城夜遁徐大興攻東北門廖永忠攻西南門四門鼓譟勢急聞李文忠胡廷瑞兵逼度不能文乃衣冠北面拜訖退省堂仰孔雀血以死文殊哈雅等輿屍出降至神武門疾雷震醒械送京師宗海自將樂來歸和并執之有定至京師帝將釋之授以元官曰不降伏銅馬古炮烙刑也有定伏之命瘞其屍或云有定死時賜深子臠之祭其父云三月辛未師至漳州達嚕噶齊特哩必黙死焉五月丙寅有定故將金子隆攻延平官軍出陳於城南橋以禦之指揮蔡玉大破其衆追至沙縣青雲寨子隆等負險拒守沐英遣兵夾攻破之㧞閩溪十八寨擒馮谷保廖永忠撫漳泉閩地悉平王翰居十年因薦書至引決藍光深衣隱居教授三十年卒羅良有别傳福清參軍陳八不仕藏有定像長身巨目狀貌偉然今其家尚世祀之當有定興屬元皆以非世所敢指名莫不多羅翁知人及王氏之得壻也迨敗禍必及之故二氏無歸附者人乃言曰有定一時雖虎踞閩故王地踞其門而為贅是若贅龎非所有也陳嬰從母言不蒼頭持起乃興有定暴得大名則不祥固宜羅翁之知不及陳母逺矣蓋以成敗論之故不知者諱焉史氏曰有定起布衣平巨冦以累功而受元職視偽漢輩不同其自稱許輙曰元吾主云既為右丞郡縣不服則征之其時既亂自以便宜從事爾平章多爾輩多元死節之臣倘有定䟦扈據閩則當死之觀其所攻漳州而特哩必黙不死可知矣第真主龍興不知如胡深棄元歸順是其頑也嗟夫元既失政天下共起即有定終非純臣寧非勝廣田横者流歟得王失虜葢難言之矣洪溪子楊兆京洪溪子者不知何許人余亦未嘗識其面與友人浙中陸生善生七八嵗時遇洪溪於途撫之笑曰子識我乎尚憶松溪對月説無生否也越十載陸髙才年少聲華籍甚步自西湖不意中與洪溪遇陸亦欣然若故人相與握手慇懃洪溪歎曰吾子氣静而神深氣静可與入道情深易於溺縁譬如利器本有剸犀切玉之貲用倒之鮮不血指矣陸服其言汗浹沾背然未能改也乂五載陸再遊杭則聲名益振文章益雄日與名公卿為伍一日正杜門却掃焚香獨坐則洪溪忽復相訪欷歔太息曰吾子世味愈深本來面目愈逺矣陸曰我亦不自知其故然嘗聞之凡人才與情相生某徃往自負情多豈為才所誤耶洪溪曰然但文人結習自是如此聖人忘情其次不能無所寄顧用之何如耳興㑹所之何不放懐山水寓意琴書與夫朝有花夕有月其為所愛與嗜慾何異然取之莫競與心無係其損益殊矣吾雖羽流頗好翰墨嘗藏古畫一軸當出以相賞展巻凡數幅或作玉堂貴客或作麟閣功臣或作紅樓歌舞或作北邙送客曰人間事盡如斯矣陸爽然悔悟欲從之入山洪溪曰入道之人非剛腸烈性不可子胷中不無係戀恐未能終始然仙風固在終當相度也遂謝余嘗遇陸於山中寒夜挑燈對榻細述其概余喜其言多近道故傳其事明文海巻四百二十六
