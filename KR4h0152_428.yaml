body:
  text: 明文海巻四百二十八餘姚黄宗羲編傳四十二雜傳宋石塘林氏郭萬程郭萬程曰吾縣宋世家石塘之林與北里之劉俱世臣殉國難元目為叛幾無噍類史訛且闕志失其故久矣苗裔亦諱余甚痛之幸具忠義集而紀年弗核乃為釐次以論其世林實多賢雖女徳足稱焉故劉以連姻顯而志軼過半矣乃庚為之傳以表所自者逺哉福清縣東里許石塘林氏居焉其先固始人唐著作平遷此或云其後荷為潮州刺史至宋伯材去平五世矣三舉進士不第子格娶於陳生子廸夢祖塋題柱云山道養靈窠遇酉生珠玉熙寧元年己酉而遹生六年格始以諸科特奏名為建州司理試將作監簿後贈通議大夫廸字行中元祐六年進士為福州教授知餘姚縣遹字述中未冠國子監第一元符三年進士甲科第四人浮湛十餘年丁母憂廬墓甘露再降宣和間知南建州毎言刑三千一言以蔽之曰罪疑維輕而治尚清簡又舉范忠宣言私事胆小公事胆大為訓靖康元年福州兵害其帥擁衆數千道出南劍遹遣司録謝如意諭以禍福乃縛巨魁二十餘人斬之建炎元年偽楚張邦昌伏誅削其元符科甲名籍陞遹為第三人毎舉王彦章云豹死留皮人死留名而稱其為忠義第一時詔録熙寧元祐忠黨後遹以縣故進流民圖鄭俠聞因追贈官其孫二年上言苗劉逆事在西掖不失義自起居郎特進中書舍人三年以中大夫徽猷閣待制知福州兼福建路安撫使初嘗提舉常平至是尤為鄉邦盛事焉次年奉祠歸里中為立晝錦坊進寳文閣待制知廣州終龍圖閣學士開國子贈少師金紫光禄大夫葬裏橋嶺有妙峯集四十巻子埏字仲成蚤失父兄田廬蕭然刻意自勵事生母劉恭人謹及篤撫孤姪以遺恩授監稅為漳浦縣丞因母老乞祠歴福建提舉司幹辦常守職爭是非不以小官有所屈知潮陽縣州符造戰艦而不給一錢埏條不便守怒譙讓遂藏符束擔欲去㑹詔寢其事又樽節贏財代民兩年丁鹽錢提領戸部犒賞所長官欲酒本為羨以獻埏力止之陛對請罷提領以諸庫𨽻諸郡知沅州治蠻猺以恩信而守備不廢民夷晏然秩滿諸壹上治行方中年而力求祠歸蓋淳熙十一年三子同第進士矣縣令江濤詩以紀之曰千里朱旛迎五馬一門黄榜占三人為立椿桂坊以表其盛先是遹姪居海口者資深第進士資熙亦大法科至是閥閱日盛而其恬約如故享祠禄者兩任八年矣病革猶曰平生無他憾獨掛冠不早爾其倦仕進如此積階奉直大夫爵開國男卒年六十九葬大湖山之原累贈金紫光禄大夫子四碩人卓氏出惟季琮以䕃知海豐縣同第者璟瓌琢皆嚴而有成多碩人之教焉璟字景宋知靖安縣疾比屋禱祠卒行路相弔歸罷市祖送同僚遣子䕶䘮蓋廉仁而得者也瓌字景温為江山主簿奉州視委輸餉以贏錢五萬不受遷仙逰丞教授沅州州屬撰錫宴樂語以非祝君父辭歴陽朔萍鄉命下萍鄉發常平粟由澧陵入湘江以餉㐮師瓌爭曰邑僅綫流可通中間陂堰百餘當此旱乾而奪粟毁堰則本實先撥矣郡臺以聞詔免津發和糴令下萍鄉當萬四千石瓌以邑阻山舟車不至七萬口自食其力不給倘有之不可致郡為鐫額復命糴三千石聽留於縣又奏記倉臺今之常平或數十年不啟鑰矣豈復有粟哉請令州縣各實占數嵗豁一分為耗所積不過三分所豁至三分止使者陳貴誼因奏行于諸州鄭性之為守察而異之矣遷通州靜江府知容州前抑民市鹽加正耗外米者悉釐革之年餘乞祠端平改元性之簽樞密薦瓌以為軍器監簿或言其不可致除知寶慶府辭至再除直祕閣予祠淳祐改元年八十矣侍郎李韶言瓌高年清節進直煥章閣予祠祠凡十任苦貧自若其時出者或竟老死及多貶議惟瓌巋然無異論卒年九十前嵗預言其期將革謂身妄也去則歸真矣請其說者告以塞天地之間通晝夜之道云爾初葬妻夏氏去郭五里營壽藏命其廬以全菴至是可謂全歸矣琢字景良少入太學登甲科第四教授鄂州往時丐州家羊豕稅助養士琢却之而以節浮増學田三為轉運幹辦秩滿有㫖待掌故執政欲攙授辭歸四年不通問執政以他屬久之除吏部架閣嘉定初元除國子正遷武學博士諸王宫大小教授輪對言由陛下剛㫁不足故欲更化而未善治民生憮悴極矣當發内帑省掖庭裁戚畹覈貂璫及破數十贓吏家可活數百萬民寧皇嘉納改國子博士請外知興化軍前守坐減楮價罷奸民動以訐官吏琢令如詔交錢則皆坐未交而反之訐者遂息矣監司按産配民藏楮琢屢請期寛之督者多猝至又預示為備比去無犯者而楮價自増郡多名刹鬻寺取財名曰實封逐僧沒榖名曰拘椿而悉罷之且蠲税有差改知全州未兩月擢廣西提㸃刑獄引疾不拜改知袁州疾愈矣為辭逺節而就近麾不可也力請祠凡四任寳慶初召再辭除寶章閣予祠褒以訓辭滿詔之再任蓋自五十後䘮黄宜人而獨居矣宜人温陵通直郎輊女也幼孤隨母聶夫人依縣侍郎簡肅林公公性莊獨竒之擇對歸琢嚴之如賔事舅姑孝隱約宜家而其子皆賢比卒子公遇公選侍父服勤跬步左右夜䦨燭䟦猶不忍退二十年如一日故琢毎謂家食雖貧至樂也嵗積祠禄買田贍宗二子善承志賔祭無闕禮與仲兄友善時方之二疏臨卒無他言第恐戚吾兄耳年七十一積階朝請大夫毎言人士不可有勢有名要官固不喜為聞人亦慎所與著通鑑記纂而論楊伯起云舉茂材懐金既不能知人此言之至於我是不能使人知己也世以為知言而信其非茍然者矣公遇字養正初棄任子父强之補寧化尉不忍去竟乞祠及服闋又辭建州戸曹營精舍曰寒齋温恭自修里閭宗之公選字養直隱約俶儻與兄同徳學不縁師授不以文見於世公遇常束書高閣隱几永日理性自適終嵗不出戸然考論今古具見方略若元夫鉅人有禆於世用故名公卿李韶方大琮趙以夫杜範皆力薦不出韶再薦之朝廷重違其意淳祐六年特改予祠主管仙都觀仍下福州給札條所欲言言臣素孱早衰因而退處本無高論足當優禮尚書以聞詔不允又言義無所取拙不能言願得瞑目為山林民命未下卒是年五十八其學兼儒釋不專以名家毎焚其所作僅存求心録石塘閑話别藁貧士窮女二吟雜詩文百餘篇屬纊留詩别故人遺言以隱服斂葬而書曰處士林公墓次年朝表其門為寒齋高士之家景定四年邑人司農少卿林希逸追舉其賢請褒詔原官進贈一官予諡縣立文隱坊以旌之兩世俱葬清逺里琢於福勝山公遇翁坡公選田源其志銘自埏而下多屬莆中劉克莊克莊琢壻妻即公遇之弟公選之兄也俱黄宜人出嫁年母䘮哀慕終其身從夫行覆舟夷然如平時敵騎大入夫當從帥督戰以其患癰未發請曰敵入大恥奈何以婢女子而後君事乎夫愧是言即發重其賢早卒而不再室焉克莊終尚書致仕諡文定為名臣其言世徳家政而必歸石塘云初公遇嘗語人曰士行吾志易爾未知妻子何如也始而棄尉父命決之婦陳氏陳氏卒辭戸曹益決二子同合皆出於陳氏陳氏通儒釋書而家難擇對年二十七乃歸公遇與公選妻王氏事舅皆以孝稱自公遇辭尉曹公選亦辭澤與子兄弟嵗寒一燈熒然對語達旦皆未嘗輕出戸公選晚而攜妻從其子觀為尉於海陽方大琮素重之時帥番禺按潮同載返其館卒悉經紀䕶之歸公遇視其葬後益堅卧終正寢同字子真獨有父風棄世澤官終養不出孝謙廉譲而深於詩嘗著孝學篇及三教一心諸語合字子常與兄同志植梅百株結廬於小孤山愛敬無間言一如祖父之兄弟然也蓋自髙曽後而仕多早退埏四子九孫伯季早卒于縣令䕃不及季之再世其孫仕者為三登第之後璟子公度以祖澤歴南劍判官乞休致轉通直郎賜緋瓌子公奕通判泉州孫成之高安主簿文之字子彬者不仕為古文從克莊克莊以文印屬之有若存集及朱墨通鑑綱目琢子既不仕僅孫觀為尉當宋末造其䕃澤微矣而同既隱獨以忠義報國徳祐北狩景炎立於福州尋避入海上閩郡多附元次春元北有警召諸將班師七月宋樞密張世傑圍泉州未下傳檄諸州多起兵應之前監丞劉仝子公遇之壻也于琢舊宅置忠義局募卒伍以復王室宋以為福建招撫使九月元額特黙色入福州諸郡復失冬兵入福清仝子拒之大敗同宅既建局衆勸避之同盛服坐堂上嚙指題壁曰生為忠義臣死作忠義鬼草間足可活吾不苟為爾諸公何為者自古皆有死兵至詰之大罵而死仝子轉匿株連親故甚衆急而經至元十四年也次年三月元索多行省事於福州鎮撫瀕海諸郡有司執仝子妻林氏詰反狀林氏叱曰我林劉世為宋臣欲以忠義報國事不成天也何謂之反者汝知去嵗有以血書壁死者乎是吾兄也吾心忠義一耳死且求治汝於地下可生為汝等辱耶而遂遇害次年宋亡噫乎林劉之起忠義豈不尤難于當事者哉然林從容死劉喪敗亡均之不屈于敵其妻不具反狀益白矣一門之烈何其異也史有林氏傳以仝子起義兵事見劉同傳而列傳無同者獨有空齋傳蓋同號空齋取空同之義也故忠義集稱曰空齋處士史訛同為空齋父而監丞為同官以空齋舉進士歴知縣家居仝子為仝祖福清為永福與林氏傳矛盾幸仝子之名附林氏傳而同事暨見其言乃可尋繹不泯志訛同於隱逸言至元中臺郡上其行義詔徴所著小孤山人集命之以官並辭不就無乃合獨全其節後人因為同諱之歟按永福宋仕者林稍有之劉不㮣見其均為吾縣世家明矣劉科名倍石塘仝子為族屬居去石塘里許故就而開局今有種祠守之林自南渡至北轅與宋相終始後雖散微局地為墟然至元亡百餘年乃為異姓所居臧文仲哀六與蓼滅曰臯陶庭堅不祀忽諸時去千五百年矣今去二氏未逺幸子孫有存者其墓多湮沒余尚考其一二而同輩葬否則痛其無徴矣追而祀之不在賢有司乎宋三老郭萬程唐制赦宥推恩於民百嵗上版受州刺史九十上者刺史或司馬宋制百嵗者始得初品官封福清百嵗上者二人九十上者一人皆封初品而稱三老云林雄字道祖永西里人也善方醫閨門敦睦政和七年明堂成赦太學生劉特等以雄年百四嵗奏乞推恩敕曰古者貴老以其近親也爾安居閭里年逾百嵗子弟化之鄉閭服焉錫官命服以明朕尊重耆老之意既為閩海重乂為後生法可特授右廸功郎致仕又三年乃卒林洞安夷南里人當紹興十年張魏公浚以安撫知郡母秦國夫人初度名其燕堂曰眉壽縣宰林世修以洞百三嵗二子皆踰七十鬚鬢皤然衣綵翼其父進而為壽浚悅而禮之以其狀聞敇授右廸功郎致仕又十四年乃卒二子皆終九十餘呉齋文興里人紹興二十九年天子孝養以顯仁皇太后八十有詔寵錫高年齋年九十有一矣姪芳居上庠以聞敇曰老老以及人老古今通誼也汝積善勵躬年過九十屬諸異渥寵錫榮階豈特以示朝廷之意亦以増耀于閭里可特授右廸功郎致仕又三年乃卒是後淳熙三年以太上皇慶壽推恩稍優遂有増年詭籍以冐寵命者衆矣郭萬程曰宋仕大夫壽考蔡伯俙八十七致仕林瓌九十可考也乃此三人不亦異乎或曰雄者儒學㮣子也蓋與其子將仕郎監酒稅者偶同名耳槩生壬子伯俙同庚雄少二嵗而壽再倍幸全享太平之盛沒則明堂非宋有矣紹興二老雖當南渡而不覩北轅之難其亦偏安之幸哉歸三老程可中歸三老崑山人年五十鰥居城南壕上得米炊於床足並日食而好為大言丈夫居當華榱隆棟聨隧達衢出擁峨艑撾怒駟何致作賈豎握一錢惟恐從指罅漏去也故人笑之以為狂疾鄉富民莊小舍者五日一詣邑應科差㑹晚不得入城就三老宿三老顧室中無所為暮餔惟牀下鷄新鷇悉截其喙距炰而進莊噉而甘之不暇問何肉也明日入城勾當館人留餐曰吾歆三老異味不能擘若若市脯噦我三老曰夜以咄嗟無具赤伏雌之族充君之筯顧安復得嘉柔引視數之政得喙十六距三十二莊為惕然因謂之曰三老貧欲謀利雞寧如豬資若資斧入郡選市肥腯鬻諸屠肆當得息錢少贍三老曰諾莊歸持百金并舟徒從徃三老道阻暮雨遥見一人敝裾悴容彳亍郵舍底雨勢少殺登岸問之曰林某閩人與計偕逢刼一僕死於盗一被巨創主僕不祼者僅厠腧蔽下體耳三老曰無傷請客移創者并入舟為具澡沐肉食藥劑創者亦幸無恙於是盡出其百金為辦裝十割其八一無所市而歸後五日莊來問息錢如何曰萬倍曰何也三老語之故且欲納還所剰金莊懊且愕而終賢之為非常人委之去無何崑山令使三老為塘長嘉其能所言多從乃林某者試春官以第一人成進士除翰林院庶吉士請告取道於吴時鎮吴開府中丞為林某姻連昵甚監察御史則又其授業姪也咸郊迎金閶亭下酒半林某起再拜伏地不起至泣下曰曩余遇摽於此舉足成殍歸君塗人傾橐相濟寧空身歸於困此豈世人所能兩臺適官其地而能為某報歸君如某躬所為也者某且不朽兩臺許諾交下牒崑山急歸三老乃崑山令則以己與三老周旋疑所部察譲三老己必不免三木嚢頭遣行入見中丞臺中丞望見譲令何梏致賢者目令出引三老烏幘絲鞶寘上座授餐見御史臺御史以仲父被恩深直下拜登致辭傳命令丞以下宴寵之自後凡郡邑大獄劇務諸所不理者咸牒歸塘長處分遂致珍瑶累鉅萬營宫室舟車服御一如往者言築橋門百餘尺郵卒操版蒲伏橋外喝名而入鄉里咸豔之此聞之崑山髯上人言歸三老五十三始有室嘐嘐之志不貧老詘豈誠有所見耶卒食太史報享有才名信其志者二十年市義之効如何哉莊小舍一村叟有㮣於衷貸而不責蓋與市儈駔詐然諾若風者不侔矣彼其持一嚢自固沾沾計得何殊鼠窖粟豈人也哉湯表背程可中分宜當國其家督少司空操予奪之柄又精賞鑒故天下之珍瑶寶玩晉唐墨蹟畫片畢集惟以裝潢收藏無其人為憾時姑蘇王廷尉某故太傅文貞公孫也以䕃累為冏卿出入分宜門與司空有兄弟稱云屬冏卿購其人冏卿遂以所知湯表背薦極贊其能司空為致二百金為秣馬費至則相得驩甚嘗居旁侍食見寵用往來二家門下足恭問對恒稱主二人亦以其能而不伐也親信之冏卿私喜以能置心腹權要左右而湯小人也瞰知冏卿家傳文貞紫金盤重踰鎰中盛漢玉杯希世珍也密以告司空司空屬湯求旃冏卿心念此吾先世重寶愛踰於命乃謬對曰功名富貴相公之恩司空之慫惥也誠何敢􅪟司空幸與我大中丞理漕務我即舉以為壽功令無以廕得開府者冏卿特藉是為解耳司空曰冏卿姑舍是吾請吾父晉君奉常大廷尉少司空出理河政是事權等中丞而秩階有加冏卿許諾適求得璞中玉如羔肪百金購滇良工日夜琢成杯與家所藏者無毫髮異并其盤以獻司空喜甚一嵗三擢至奉常一日湯來謁冏卿與之粲矢口曰湯君故人吾有人乎司空之側杯吾太傅舊物即償十五城弗易誠何有於空䘖湯驚曰安得有是言在司空所者非耶冏卿語之故且呼杯來吾與湯君勞湯心久欲傾冏卿而己獨當分宜盻睞翼日告司空曰冏卿蔑主其博美官者贋也昨暮飲奴見之其良十倍司空嗔忿奮袖起湯曰冏卿不攜家篋笥具在臥内主旦日往拜將訐僕十人搜其室真杯得矣司空然之晨往冏卿有老家幹從隙中逺望司空意弗善曰必以杯來急内杯懐中跳短垣外避司空入坐未竟起執冏卿手曰奉常官三品乃不如一酒觥寧忍以贋相詒冏卿曰向言相公恩出司空析骸刳胃不足稱報其敢以要領嘗斧質且杯絲縷如出鬼工豈世間俗工所能下官無家櫝篋具在請檢之檢之得他杯十二皆下品也冏卿起謝曰人嫉我䝉恩厚耳幸司空無入小人之言而猶不虞湯之構也司空愧歸大責湯湯無以自白他日又過冏卿冏卿曰昨履虎尾幾不免而杯幸在杯來吾與湯君再釂湯退家幹曰郎君慢藏安知昨日之危不自湯致奴且慮明日及禍冏卿頓足悟曰是己是己將奈何曰奴黎明懐杯潛歸嗣圖解官歸耳詰旦家幹甫出城而司空嗾緹騎百人來搜又不得司空慚失舊歡又疑湯小人為構狐疑於心終不可解而冏卿亦思有以報湯矣微偵其所為㑹㑹稽人持唐宋人畵三巻湯以百五十緡市之而因鬻司空八百緡冏卿密召鬻畵者曰若取巻來吾倍值酬若即不肯若佯以刅破額彼必懼矣鬻者如指往湯入告司空司空亦不甘心棄八百緡也冏卿獲巻乃大張具請司空枉其宅曰湯奴背恩構我二人其始入也自我之疎偶獲三軸聊以贖罪司空驚起曰巻奚自為值不貲何以得此冏卿曰浙人宦家子欲薄宦京師無階將售此為羔雁幾為無賴所奪奮欲自剄始出諸虎口我以九十緡得之不足當司空寓目也司空曰湯奴狡若是當令獒吮其肝是嘗入我庋誘乃公八百緡猶以為不足而來告贖不虞纔九十緡也冏卿曰湯憑恃威靈向下官索三千緡未與啣我遂以杯為釁端賴司空仁察幸完首領湯槖中蓄已不訾皆恃司空聲名恫愒横索恐不利於相公司空不懌罷酒去旦呼緹騎圍之籍其槖銀八萬五千兩他物稱是拷掠湯無完膚逺戌密雲時湯來京師未及期今詬薦人者曰無若吴門湯表背也歙詞盟汪文𢎞何偉然嵗丁未于𤓰渚與汪文𢎞遇越六年癸丑於真州與汪鳴瑞遇皆結千秋之契不知鳴瑞即文𢎞宗人鳴瑞亦不知余先與文𢎞交及甲寅秋復真州聞文𢎞訃灑酒遥哭與秋俱慘鳴瑞亦不知余為文𢎞傷也忽柬語云有文𢎞叔祖遺稿乞為商略以存文𢎞余趨語曰此不慧典型也前此之愁顔正傷此老成耳相與悲歎不已且詰余得於文𢎞者何似因述其所見知者以備傳述若夫世裔與其生平自有太史公筆紀在途遇文𢎞於𤓰渚陳兆聖月舫軒兆聖性豪放入其座者一以風流諧謔為勝適文𢎞至談詩縱横傍若無人當者半為笑半為嗤文𢎞瞪目良久曰江上風流盡矣余因知文𢎞真大雅也夫詩人言詩猶耕者言耕織者言織固本分事乃酒人狂客放浪形骸簒入雅道無不風流自命及遇詩人反藉口善易者不言易以掩其愚於是談鋒相角刺繆支離勝則薄其短不勝則忌其長大雅淪亡莫此為甚文𢎞力起而維持之遇善言詩者則拜遇好言詩者則賞遇欲言詩而勢不能者則儼然師導之遇喜聽言詩者則欣然以粲齒予之詩之外似無一可為生活者余不能言而善聽直如游魚之於鼓瑟頑石之於說法故獨以心知相結嘗訂三吴之㳺宿糧難舂爽者己久至己酉秋余以下第入山陳載道訪余至西湖紅葉滿眼詩思忽飄念文𢎞不啻萬里李杜與載道宿初陽臺夢文𢎞攜手看紅葉談及韓夫人詩其後余上掦州文𢎞從茱萸灣來晤遂言去秋曽夢與余看紅葉述其夢中所見併其時夜一與余合情之所契神異如此余病卧蜀岡絶似相如茂陵秋雨時二三兄弟各赴文酒社即咫尺者隔若千里文𢎞獨不憚逺頻來相視袖果相餉坐床頭朗讀新咏索余强起而聽不覺岑岑者聞檄而起也其率真之性慷慨之氣一屬先輩多不諧於小兒惟老成若髙洪父陸無從者尊且信因與結伴常入廣陵其時淮南社初成人紛如蟻何有一文𢎞乃寛衣博帶登壇闊論叠出驚人語英異爭下之自是廣陵多宗為祭酒設講席於東郭栁浪菴置之髙座左列詩僧右案韻客戞玉鳴金栗人如嚴雪得解人則快賞若異寶間出快語以手擊几欲穿引古證今可翻可駁有啓發再四不悟者則痛哭若有所喪傍觀謂先生癡絶蓋謂不如是則說不精也有𨽻人子者䝉謂同宗虵形奉教遂訓之如子然其人隂陽詭譎甚為不祥假束贄之說科斂以為利宗人直奴之其人巧於削迹席遂廢毎一詩成疾書百幅沿客分示余所往齋頭無不見文𢎞詩者一刻不談詩即病一刻不遇喜談詩人亦病偶思及一友或偶有一得不論旦暮不論飢渴不論逺近必晤語而後快距余十年許一日走晤者三不肯損余茶供傾談久則巾角出兩錢易餅與余分食必竟其論後去去而復有餘緒更返而足其說以余知言是以說之詳也不嗜酒喜人聚飲坐銷長燭不倦不躭歌舞當歌舞之㑹又必賦詩以紀盛至於山水則不事追隨蘭珮籜冠芒鞋竹杖時與孤雲往來余結社春江遺書邀之司盟許與鑾江一新烟月竟不果而死夫不得生秉旗鼓而徒招之魂也小子何述焉其立徳立業汪髯序己悉予以立言則詩人不外於詩故以談詩者為文𢎞不朽梅臣曰為儒說書為僧説法至於詩歌咏太平己耳文𢎞以儒宗禪觀㑹之於詩開一講座功徳得未曽有毋論宗旨皈依法果不二即其雄恣無憚固大雅而有浩然之氣者也可以挽儇薄之習矣逸事蔣鐄事胡以逸或以瑣棄或以忌詘采風者不問諛墓者弗哆也逸事胡以傳事微而梗㮣存人久而月旦定窺豹者見一斑相馬者出驪黄也夫艱貞䝉難凛凜千秋靜思𤣥對如歌易水忽然隕涕忽然髪指匪直幽闡亦備羮牆其利我亦大矣傳自唐寅以下凡四人唐伯虎寅唐伯虎寅與都𤣥敬穆雅以髙才負時名伯虎性豪爽𤣥敬稍迂腐常同學毎夜酌清泉向北斗晨起拱揖飲之自謂吸沆瀣之氣伯虎竊笑隂以他穢易之𤣥敬悮飲已知其穢也大恨𢎞治乙未同上春官主考程篁墩問天文策門下有洩之者伯虎對策獨詳而性故不檢毎對人言我當魁多士𤣥敬聞之以語其友給事華㫤㫤遂疏程鬻題詞連伯虎竟從黜而程坐法削籍尋命搜落巻𤣥敬遂登第伯虎恨甚終身不與見毎廹遇輙起相避居久之文徴仲諸公强居間令解𤣥敬内愧亦求解而伯虎心獨恨常燕坐䃲礴樓徴仲攜酒過之隂約𤣥敬以不時至至則奚奴報都某己亟登樓矣伯虎急墮樓幾死終身不復面敏政被誣解職忿疾而薨京師有雪夜祈仙者公降筆云雪夜因與東城蘇子游聞有請詞仙者余謫仙之遊也事之不偶殆以甚焉詩以紀之江山何曰許重來白骨青林事可哀吾黨莫言清夢逺海東東更有蓬萊又云紫閣勲名事己休文章空自壓儒流孤忠敢許懸天日浩氣還應射斗牛蘇子直松遭謗毁杜陵芳草笑窮愁乾坤不盡江流意囬首青山一故丘又斯文今古一堪哀道學真傳己作灰鴻雁未髙羅網合麒麟遇見信時猜迅雷不啓金縢册紫電誰知武庫才此氣那同芳草合渾淪來往共盈虧朱中丞紈朱中丞秋崖精嚴孤介督兩廣首嚴通番之禁有新襲衛弁者世以舶市利家累鉅萬而新弁年最少有母有嫂族無餘丁中丞掠治坐法當腰斬獄己具未論七日而闕下權貴人居間書集轅門中丞㢘知之勅門下姑勿通候某囚論竟己而視其書果皆為通番弁者中丞後中睚眦坐殘賊免戒行惟一簏嚢先是以軍興費檄五省餉二十萬貯廣州未處分藩臬諸公以中丞貧不任治裝意此餉可從他途輦送而以中丞嚴恐喜怒未可測有沈倅者吴人也常與中丞接慇勤諸公因介倅探之時中丞已角巾登舟矣倅入謁勞苦若平生歡倅乗間道諸公中㫖中丞忽起入良久傳諭門下肅三司吉服入中丞衣緋出厲聲曰我雖奪職而賜劍猶在倅敢妄言汚我軍令守便宜當斬首顧司馬行法倅叩頭流血請死三司跪謝乃免中丞既歸惟草舍三楹夫人漚麻易升米治饘粥中丞少有受業師心徳之微時約云他日富貴以千金相報後督五省師如約往至則軍令如秋霜門下莫敢為通者居數日中丞駕出師於道傍呼秋崖識我乎即下車謝令兩指揮延入頓首曰師久未報敢忘宿諾第需之俄報四武弁失機應對簿中丞曰先生幸為解可得二千己入報當庭受法師於帳後屬目意中丞己解當寛法矣縛至帳前命分其頂力士手銅𤓰盡斃之師大駭語中丞曰幸聽我我己受金而斃之何以報之中丞笑曰固也吾聽先生先生為於此弁甚大師問故曰我以軍法論斬當揭黄世爵絶矣今擊死爵固在也師辭出果重得金周給諫怡周給事順之論救楊御史爵并逮繫詔獄五年上忽念之赦歸田里未幾熊太宰浹疏諫箕仙如楊御史如前疏㫖上追理御史及救之者密諭緹騎復逮之順之家居宛陵之太平既赦出策蹇歸道蕪湖見邏者二十餘人左右挾之走意疑之呼謂曰得非上意不釋我乎衆應曰然尾之益急順之好謂曰纍臣誠不敢望歸骨第老母在念兒得罪倚門血且枯矣願一歸拜之疾㑹逮於是挾小艇歸而邑令得密㫖先坐其堂中順之具道歸一拜母意令坐定不起順之呼家人吾逺歸且饑取草蔬與令同飯令不食而順之獨飯糲糗二升許令視其神色自若度無他乃謝别去順之入母持之大慟順之跪泣曰兒不孝以狂言賈禍貽吾母憂死不足贖雖然母當年令兒讀聖賢書通朝籍幸備耳目之臣不能緘口持禄誤君父母勿以念兒故重不孝罪悲慟至夜分其夫人長號欲絶順之正色曰吾豈為兒女子戀者顧高堂垂白長繫請室不能一刻安膝下用是腸九囬耳漏下五鼓即詣邑庭請赴郡就逮於是郡之縉紳先生鄉三老盛供帳祖於郊順之飲盡一杯顧諸公曰此生奠我耶衆泣下不能仰視有哭失聲者順之慷慨語曰狂瞽愚臣久當鈇鉞幸主上仁聖不忍殺縱之歸即再逮我罪無加於前寧遂死之乎行矣與諸公㑹有日也徐赴法官受械緹騎憐之釋弗械順之昂然曰天威咫尺豈爾輩玩法地耶索械被之兼程赴詔獄獄吏希上㫖窘之萬端天幸得不死語具楊御史處困記居三載大内火上聞火中有神人呼順之同繫者三人名乃赦出之順之既得出而太夫人尚無恙余客長林去太平不二舍邑之父兄子弟猶能言其事有雪涕者噫順之真豪傑也畢太保鏘畢太保鏘為京兆時休沐還里下車兒童擁縱觀之呼公名曰是畢某乃作大官公熟視撫慰曰爾亦讀書學我作官了無愠意人服公雅度卒年九十有四時蒲圻謝中丞鵬舉年九十二能乗騎伯子京兆年七十趨走膝下若稚子袁石公過蒲贈詩云一行旌節萬人從爭看前朝老卧龍杞梓楩楠俱朽盡就中留得兩髙松是年存問畢公號松坡謝號松屏故云畢公以戊申九月卒先一日朔夢與金庭朱公二山楊公及謝公同辭闕下旦起曰吾其行乎浹旬示微疾輒經紀身後事忽一日呼家人持刺召邑令及博士官與訣遍呼諸子婦環跪受戒語門下士至者各與作别人人盡所欲言俄驟風作公談笑瞑而是年四公果俱謝世甚奇也明文海巻四百二十八
