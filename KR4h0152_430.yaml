body:
  text: 明文海卷四百三十餘姚黃宗羲編墓文二文苑故翰林檢討致仕陳君墓志銘楊榮吾友陳君嗣初諱繼號怡菴先世吳興長城人諱鄴者自蜀徙南康之都昌七世祖篆宋明州通判徙星子五世咸涼鄉貢進士洽其高祖也元翰林待制同其曽祖也祖諱徴號天倪受學臨川吳文正公得旨歸人稱天倪先生至正間徙吳城父汝言國初濟南經厯有政績母吳氏廬江名族永樂初以貞節旌表汝言初未有子吳夜夢白衣神人授之兒遂産嗣初實洪武庚戌十一月丙戌也明年八月父卒母抱歸吳城躬紡績訓育之嗣初既長奮志於學受詩於鄉先生酈尚德秦師尹受易于俞立菴既而忡忡然若不足復從半軒王止仲用是學日益博時家貧甚嗣初躬自農圃以供祭養親時或讀書或援琴高歌因以耕樂自號及筋力少衰乃開門授徒學者謂其善教多從之人尤以其為文簡健有法度求者相屬由是道益尊名益重郡邑交章薦之屢以目眚母老辭不就母卒喪葬盡禮有聞於人仁宗皇帝即位少傅廬陵楊公首以文學薦初授國子博士尋改翰林五經博士命同太常卿南郡楊公直𢎞文閣備顧問時以為得人皇上嗣位命修先朝實録書成荷白金文綺之賜升翰林檢討逾年以老疾乞歸明年疾作既亟命其季子完誦西銘至存吾順事沒吾寧也因接誦不己門下劉溥請問先生如何直答曰無事遂卒實宣德五年五月六日也享年六十有五宗黨姻友門生畢至哭之皆盡哀守令而下咸往弔哭朝之縉紳大夫士聞之莫不悼惜配金氏故郡守絅之季女初受聘絅之長壻坐法併沒官嗣初訴于朝乃得釋金素有禮教亦甘清苦事姑以孝謹聞先十二年卒子男五宗寬宏宣先卒季即完女二長適謝壙次幼孫男七傅儀仁偉佃佶俌女四卜是年九月十日葬吳縣太平鄉薦福山先塋之次所著文集四十卷藏于家其賦性純淑聰敏過人孝友篤至恆以不及事父為恨言及未嘗不流涕奉母甚謹尤善養志長姊失所天養之終身訓育其子甚至少姊早寡存恤其家曲盡恩意友人死無以為葬買棺葬之他凡婚喪貧困與夫鰥寡孤煢之弗克振者輒賑恤之無少吝其為人大率類此完奉治命走京師謂豫有疇昔之好徴銘諸墓豫按其門人大理評事張益述為之銘銘曰繄陳之先吳興孔昌既徙于蜀復居南康瞻彼吳會具區之澳爰及中葉居用載卜光前振後詩禮簪纓蔚乎孫枝繼繼繩繩有華其躬孝友斯著有豁其心問學斯富既塞而通晚遭奇逢秩列𢎞文侍從九重日月清光洊被寵遇于焉退休式慰衰暮歸視其庭子孫滿前云胡不樂乃奪其年薦福之山先塋之側既藏既銘永昭令德故翰林學士奉政大夫賜二品袍服沈公墓志銘楊榮公諱度字民則姓沈氏世居松江之華亭公以儒發身纍官至翰林院學士階奉政大夫宣德甲寅冬十月乙丑卒于北京之第訃聞上遣官賜祭給舟車歸其喪詔有司營葬朝之公卿大夫士素相交者莫不悼歎弔祭之其孤藻奉柩東歸以某年某月某日葬于邑之玉屏山先塋之次乃狀公行實泣拜請豫銘豫與公為僚友三十餘年相知最深誼弗容辭乃志而銘之公大父德輝號竹庭嘗為郡吏平反寃獄鄉稱長者祖妣宗氏儒家女父易元末為咨議參軍棄官還鄉里授徒養親人稱苦節先生妣顧氏出士族公賦性敦敏言動不茍刻志讀書喜親筆札及長學問該博於書法尤精洪武中郡邑以文學薦而以家艱坐稽緩謫戍南詔岷王聞其賢延待甚厚時學士董公倫亦謫居南詔一見公甚相敬愛董公歸朝首薦公召還未及登用太宗皇帝入正大統詔求文學翰林編修今禮部尚書楊公宏濟首薦之擢翰林典籍與修太祖高皇帝實録賜白金綵幣織金紗衣復承命書孝慈皇后傳及古今列女傳書法精妙式稱上意自是詔誥制敕及御撰詩文碑刻皆屬於公未幾升檢討升修撰復升侍讀學士上嘉其清勤賜二品袍服象笏命大官日給盛饌以寵異之官其子孫藻為中書舍人公與其弟翰林侍讀粲扈從往來兩京蒙被恩施賜賚不可勝計仁宗皇帝登祚賜誥推恩贈其父如公職母贈宜人公請告焚黃詔賜鈔幣給驛傳仍命藻侍其行鄉里榮之皇上嗣位升今職年七十有三屢乞致仕不允逾年特命食祿不煩以事公素有痰疾至秋即作是秋益劇遂卒享年七十有八配鍾氏先二十二年殁贈宜人繼陳氏子男二長芹先殁娶高氏次即藻今升大理寺副娶王氏孫男二潮有志于學蚤夭源娶李氏孫女三曽孫男一曰寅生嗚呼公胸次坦夷持身儉約孝友忠勤出自天性居常以不獲終養為憾言及必流涕歲時祀事惟謹粲嘗感疾公晝夜守視調護甚至出入禁闥小心慎密始終一誠嘗侍顧問得以從容進言多見採納至於講論古今薦引士類無不精當所居構軒扁曰樂琴書處旦夕遊憩其中以自樂先生所著詩文有滇南藳隨筆録西清餘暇自樂稿若干卷藏于家公之殁宜有銘以昭于世銘曰偉哉沈宗積世長厚維公紹承厥德益茂初起鄉邑乃罹困窮用玉於成由塞而通遂登詞垣受知列聖恩賚洊臨實公之慶惟公之慶既壽而康子肖弟賢舉荷龍光玉屏之山營兹宅兆銘以藏之千古有耀故國子司業吳君墓表楊榮君子寓形天地間德足以師表于人士學有以兼通乎古今修諸己者有餘而見于用者或有未盡故其既殁而哀傷追慕猶不能已於人者若余亡友國子司業吳君是也君諱溥字德潤别號古崖先世家臨川之種湖曽大父景南號南窗博學工文草廬吳文正公嘗序其南窗吟藁大父某號楚江隱德弗耀父思清贅崇仁章氏後遂為崇仁人君生元至正癸卯四月四日少遊于鄉先生前衛南令鄧伯恭門伯恭見而奇之謂思清曰是子器宇不凡異日必能大公之門弱冠舉孝亷不就洪武丙寅大夫知其才賢乃舉邑庠子弟員從前進士李原成治春秋文藻甚為原成稱賞家雖貧窘而志學不厭祁寒盛暑亦不少廢同輩有忌之而肆譏侮者恆不與校而所志益堅嵗庚午領江西鄉薦以疾弗果會試尋丁外艱哀毁骨立幾至不起服闋假館學舍教授以自給衆亦易視之獨永豐羅博士師程時分教邑庠折節與交乙亥上京師以試期不及遂入粟為太學生嘗奉詔宣諭武臣使雲南卻其元戎文綺之贈又以閲士伍使福建一無毫髮之私人皆稱其亷介其所至遇古迹名勝輒賦詠紀之纍至數百篇比還太學時太常丞張顯宗攝祭酒事嚴毅方正於諸生中罕許可獨以君為賢而為延譽于公卿大夫間歲庚辰試禮部第一廷對賜進士出身擢翰林編修永樂初與修太祖高皇帝實録書成大沐恩賚升修撰既又纂修永樂大典充副總裁戊子用祭酒胡公若思薦升國子司業居官以禮自持以師道自任以勤率諸生每五鼓升堂講授終日危坐無怠容諸生皆敬畏而心服焉仁宗皇帝在東宫監國南京眷遇殊厚洪熙紀元首膺敕命進階承德郎贈及考妣宣德丙午通政司陳璉奉命掌國子監事九月三日設宴公堂君從容言笑如平時酒闌忽得風疾舁歸私第以是夕卒享年六十有四臨終無一語及身後事但屬治喪不用浮屠所著述有古崖藁若干卷配鄭氏封安人子男四人與弼與疇與年與性女二人長適應天府學教授孫曰讓次適豐城徐士英孫男三孫女五人諸子奉柩歸葬崇仁邑治北二十里之左橋既葬十有三年與性以明經領薦至京泣而告曰先君子務學篤行以古人自期而官止司業弗究所施年未及古希不肖無似又不克致位通顯以光振先德惟先生與先君子同年登第又同日擢官翰林知之悉者莫先生若也表諸墓道傳示永久亦莫若先生宜也不肖敢以請嗚呼君之孝友篤行出自天性清修苦節至老弗替其為詩文詞暢理明足追古作者第亦不媚當道官太學幾二十年而不獲敘遷卒之日身無以為殮家無以為喪子孫無以為衣食資而縉紳之流持乎公論者莫不為之悼歎也然君之志雖不獲大伸于當時而能使天下之人信君之德操者無間於貴賤傳誦君之文章者無間於遐邇視彼之得志一時而滅沒於身後者豈不相去逺矣哉况君之子若孫有志問學期乎顯榮昌大以慰君於地下者又有可冀歟姑立表以俟云明故謝君墓志銘嶽正謝君諱績字世懋初號靜可學成因所居有王城之山更號曰王城山人其先宋經略使鞅自會稽謫居黃巖九世入國朝諱溫良世稱孝子者避地元季晚方定居桃溪桃溪今𨽻太平君孝子曽孫也為太平人大父諱元參葆光林下名泉石翁標白本懷父諱性全贈奉訓大夫兵部員外郎雅志家法故號友松友松再娶皆陳四子省復君母兄也省登甲戌進士兵部員外郎今知寶慶府復早世其最季者濟君諸弟也君於學師父友兄弟貫徹為經實際為緯不求速化不任以組織人謔以古迂雖屢弗恤也畢竟智者不能不韙之嘗就有司試者七不合擬於必合迫期忽病病革遺言寶慶云仕當先幾完名未及試五日竟不起年四十有四娶張氏生二女幼未有歸友人高廷美輩攢之杭郊訃達從兄世逺扶護以歸君家世故孝友後母無出事之不遺力與寶慶出處相違草年各再歸省會即薑被夜談幼弟孤姪撫同所出族里孚服每以愧君為畏諸從遊者若從子今翰林編修鐸字鳴治鄉進士施槃其顯者製作有王城山人集史官李賔之序之曰君詩初出入盛唐盡流麗之妙晚更步趨少陵其感時興物之意一出於正詩家曰不誣文選員外郎黃孔昭君知己也狀君之行甚悉既追許其致用必效有可觀者又悼其卒困死於科目於乎豫嘗謂古科目人法兼任尚有遺材世逺人嫌使如君者竟至此極抑君命當然邪可悲也巳初寶慶且入覲本圖會君浙上遽意哭君之死乃命子彩後君卜用卒之明年某月日葬君前山之原鳴治曰先師之墓宜得豫銘為之銘曰生也淑壽而穀我匪局奚其梏誰其欵天詰虐酷雲壑先生蘇公墓碣張寧先生諱正字秉貞號雲壑宋大理評事世堯之後考順菴府君闕氏世家海昌與其兄秉衡齊名人共稱曰小蘇先生為人孝友敦行義克勤小物終其身無非禮事早從翰林修撰張洪習舉子業中歲盡棄去之專意古學諸經子史皆嘗肆力以故發為文辭根據藝實麗則不靡古詩似漢魏律詩似盛唐著述之文體法西漢一時才名高出兩浙流聞四方嘗教授海鹽弟子甚衆至今邑中多能文之士死之日自書銘旌撰墓志神氣不少衰亂時年五十有九遺命葬于小桃源不食之原有自鳴集二十卷子淵懿雍能世其業嗚呼先生學可傳而材不見用德可久而壽不甚逺蓋其所能者人也所不能者命也能其所能而已焉者世也文章實關世運人豈能違之寧夙賴師承幸竊科第自叨職禁近以來去函丈者七年而先生之兄弟相繼就木心喪日逺無能為役因合同門之士書其大略立石而表諸墓庶幾平生義恩云史明古墓表吳寬吳江穆溪之上有隱士曰史明古其為人足迹不出百里之外然江浙間人知其名至于郡縣大夫亦皆禮下之而豫取以為友蓋四十年于此矣其志正而直其言確而厲其所為無弗依於禮者當其壯時患閭里之人以巫覡惑衆上書縣中欲盡除之曰此皆不容於先王之世者不除則風俗不正禮教何由而行耶與人論事辨説超卓坐客莫能屈至有所感奮詞氣益峻雖達官貴人衝突不顧見依違徇情者心輒鄙之其治家辨內外定上下嚴若官府凡吉凶之事悉違俗而行必放於古知禮者取之其學于書無所不讀而尤熟于史論千載事厯厯如見而剖斷必公蓋有宋劉道業之精至于時事人言得于聞見往往筆之成編則有洪容齋之博若錢穀水利之類皆知其故使得郡縣而治之恢恢乎無難者為文章紀事有法醇雅如漢人語詩則不屑為近體興至吟聲咿咿冥搜苦索欲追魏晉而及之家居甚勝水竹幽茂亭館相通如入顧辟疆之園客至陳三代秦漢品物及唐宋以來書畫名品相與鑒賞好著古衣冠曳履揮麈望之者以為仙也間與親友吳鐵峯數人扁舟往來月為雅集以觴詠相娛樂又嘗與劉僉憲沈石田諸公遊武林經月忘返所至為文記之曰此未愜吾志也會當絶大江北至中原覽岱華涉河濟循王屋廬阜而歸乃為快耳晚歲益務清曠室無姬侍築小雅之堂方牀曲几宴坐其中或纍月不至城郭至即止宿僧舍前二年豫家居一日忽冒暑見過飲水數碗而去又二旬而疾作家人進藥俾持去曰吾治棺待盡久矣且吾年六十三又夭耶竟卒𢎞治丙辰六月庚子也明古狀貌奇偉鬚髯奮張平生喜交遊持信義四方之士過其門者不絶於所厚者有過尤好面折故人以直諒稱之少謁武功徐公公與談史即許其有識遂數從議論三原王公巡撫江南時聞其名延見之詢以政務尤器其才然未嘗言及私事公益重之且恨其老而不用於世也君諱鑑字明古自號西村人稱西村先生曽祖彬祖晟父珩母陸氏繼母朱氏娶李氏子男二人曰永錫太學生曰永齡縣學生女一適鄉貢進士吳鎣孫男四人曰曽同曽繼曽遇曽達曽同縣學生孫女二人曽孫男一人曰夢禎明古卒之明年豫與文溫州宗儒往哭之其二子即以墓文請豫念失此良友方竊悲傷何文之能為顧有終不得而己者既卒之四年己未三月庚申葬于吳縣西山之博士塢為表之曰嗚呼世有信古執禮如斯人者乎世有博洽好學如斯人者乎有才之達論之正如斯人者乎亦有剛直好義高曠絶俗如斯人者乎有如斯人當觀其終達生順命能保其躬嗚呼明古庶無愧于其中王允達墓表吳寬成化五年寬遊南京得友一人焉曰王君允達其諱汶義烏人也王氏自宋以來號為儒家五世祖炎澤得朱呂道學之傳婺人謂之南稜先生曽祖褘在國初以文學事太祖高皇帝為翰林待制使雲南執節死義追贈學士諡忠文祖紳國子監博士考稌隱居授徒門人私諡孝莊先生後贈中書舍人母李氏贈孺人允達生稟特異志向甚端少孤思繼家學極其勤苦家素貧能守道自樂挺然無所降屈好古執禮篤行實踐不欲以文士名然操筆為詞章豐蔚可誦亦無忝其家既壯從鄉校貢上禮部卒以春秋登鄉舉遂擢進士第居京師癯然靜退猶寒士也嘗上疏乞就郡教授奉忠文公祀不遂乃授中書舍人遇事持正同官憚之居三載見有非其道進者稱疾而歸今上之初用賢圖治或薦允達可起而用部符下允達初不欲行郡縣與鄉人迫強之道病甚曰吾決不能仕矣然獲至京師與故舊一見以死無恨未至五十里竟卒年五十七允達純孝人也自忠文公之死博士君痛恨食不忍兼味孝莊如之至允達己三世猶不忍改以忠文公宜廟食死所遺書巡撫大臣為奏請于朝始秩于祀典又忠文公有續大事記在蜀藩得板刻行世亦其志也居家作祠堂置祭田凡所行禮參酌其宜其教人有法出其門者輒有可觀至所與交皆一世名賢於情意最篤也其不賢者則疾之往往面斥其過使無所容蓋其為人若隘而才則通處世若迂而行則直使其見于用則功必加于人澤必下于世顧僅以行義屬乎一鄉一邑之間如允達者蓋深惜之其娶俞氏有賢行封孺人子男二長俯縣學生次仰女三長適貢士許塤次適龔徴其一尚幼允達卒時為𢎞治二年十月四日葬以明年十二月六日今祭酒謝公既為之銘寬宜表其墓上以良友之不可復得也蓋久而不能成文抑允達之賢人知之不必書惟其有不可及者則不可不書也嘗聞謝公言往年自台州往訪允達鄉人無少長賢不肖聞其名皆唯而立其學者即其所居皆稱之曰齊山至不敢斥其姓又聞其友馬谷曰允達殁門人迎柩於數百里之外將至親友又行數十里迎哭皆盡哀又各為位而哭於家蓋百數十人及其家長幼童僕皆疏食如喪父母嗚呼允達之得此於人者其必有道矣故書以表之張東海墓銘謝鐸成化丁未六月十有三日南安守華亭張君汝弼以疾卒于華亭之故居其子寧海令宏宜將以是歲冬某月某日葬君祖塋之次以狀來請銘於豫始豫天順初與君友今亞卿黃君世顯故方伯陳君士賢僉憲林君一中識君于禮部蓋三十年於兹矣慨念疇昔一代交遊稱豪傑士若諸君者固落落可數豫駑下病且不死既銘一中又銘士賢而尚忍復銘君也哉君諱弼姓張氏汝弼其字也其先汴人八世祖稱斗山先生者宋南渡始居松江之華亭曽祖庠以易教授鄉里祖子英蚤世父熊應以睦族稱號村居子用君貴贈兵部主事母胡氏贈安人君少穎異過人既壯以詩經領景泰癸酉鄉薦登成化羅倫榜進士倫以言事忤宰相去國君作詩慷慨送之未幾拜兵部主事轉員外郎己遂有南安之命南安兩廣要衝大山長谷亡命嘯聚為民患者蓋衆君下車悉捕滅之尋慮民之窮而勞役弗息也亟請諸當道者俾均節之且得以食其力于商而橋梁道路之利因亦以時興焉既又毁淫祠百數十區為社學凡先哲之嘗涖兹土者若張九齡李綱劉元城諸公皆特為立祠至周程三先生則既祠而又别立吟風弄月臺以深致景仰蓋于風俗教化之大者其惓惓又如此初君之外補也人咸惜之謂若君者盍留以羽儀明廷以藻繪一代太平之盛治君固不薄淮陽而卒有成績至是始謝病而歸歸之日民蓋相與立生祠焉歸方三年天竟不憖遺以卒年六十有三而己惜哉配王氏封安人子男六長宏正次即宏宜以進士拜今官次宏至邑庠生次宏圭次宏玉次宏金女二李觀顧行己其壻也孫男四性協欣恪女七所著有鶴城天趣清和慶雲諸稿凡若干卷號東海翁又有東海手卷行于世蓋君手筆也君以靈識異稟充之學問老且不倦詩與文成一家草書之妙論者至推為一代冠冕然世之所謂文人者類近浮薄君獨惇尚行履慨然以風節自持雖論議問雜諧謔而往往必以理勝故彭都憲鳳儀嘗論其天分人品學問政事有如此者而君亦嘗為豫戲評其所能曰人故以書名我公論哉吾自視文為最詩次之書又次之其他則非吾所敢知也恆相與一笑而罷噫昔人稱趙孟俯為書畫所掩莫克盡知其文章與經濟之學然則君之所以自道者其亦感于斯乎於乎斯文非細故自文與道離而後世之所謂文人者始為大賢君子之所鄙然則文豈易能哉故豫又即君之文而銘之以吾人之所謂文者正在此而不在彼也銘曰東海之東有氣如虹凌虛厲空人曰此獄劍之鋒孰知其下文冢之雄於乎萬靈所鍾鬼護神封後千百年兹其不墜於地耶尚有考乎吾銘之公明中書舍人王君墓志銘謝鐸今皇帝嗣位之初勵精圖治納誎用賢於是南京兵部婁主事性首以一時名士退修于家者列薦于朝若翰林檢討陳君獻章中書舍人王君汶凡若干人詔下公卿議特起檢討君暨君檢討以母老不果君病方愈有司趣之行行至淮病復作未抵京五十里卒于舟實𢎞治改元之明年十月四日也距其生宣德癸丑得年五十有七於乎痛哉鐸既與左庶子吳君原博會哭遂亟謀諸戴郎中師文陳員外于章相與殮君既殮將歸葬庶子吳君謂葬宜為銘且將表君之墓以示不朽嗟乎豫與君交幾二十年凡其敦慤之行清苦之節靜退之風皆豫之所愧畏而未之能者其何以銘顧其義有終不可巳者乃托其世次而序之王氏本五代節度彥超之後蓋自太原徙金華遂顯于宋世為金華義烏人君曽祖忠文公褘在國初與宋太史公濓齊名以翰林待制奉使雲南執節不屈以死正統中有贈諡之典今廟食其地忠文之祖南稜先生炎澤實得朱子再傳之學于葉通齋由庚遂以授黃文獻公溍其子國子博士紳實與正學方先生同登太史公之門博士之子贈中書舍人稌於正學有館甥之義實生君君字允達别號齊山汶其名以春秋舉成化戊戌進士拜中書舍人王氏在金華文以行顯至是蓋六世矣君子謂忠文之澤方大發于君未艾也於乎詎其遽止是哉君初登進士輒願為教官衆謂其迂不知君實欲見之行除中書非其好也曰吾豈少年矻矻筆硯間者哉未幾遂謝病歸結屋齊山之下取纍世所積書研窮之將終身焉去年秋豫以史事赴召道金華將問君之廬而拜鄉之人無少長賢不肖聞君名皆唯而立其學者相與尊之曰齊山先生至不敢斥其姓君迓于道上歡然握手如平生明日君餞豫百里外相與謁四賢祠謁崇正書院至蘭溪會章德懋而别於乎詎謂以君而遽止是哉君貌朴而和平生無町畦崖谷人人得而親之然其善善惡惡之誠則有確乎不可拔者詩與文如其為人不為斬絶奇險而自成一家家居儼然夙興必具衣冠率子姓謁家廟歲時享祀必躬必敬日食唯一味雖對客亦然蓋其祖博士君痛忠文死國之故不甘于食子孫遂永以為訓亦可見其世德所從來逺矣所著有齊山稿若干卷藏于家配俞氏有賢行子男二長俯次仰女三人長適鄉進士許塤次適龔餘幼未行銘曰慨彼下泉澤而不川再實者木栽或以覆在勢則然吁嗟齊山吾何尤乎天中書舍人孝莊王先生墓表謝鐸於乎此贈中書舍人金華孝莊王先生之墓也先生為翰林待制忠文公之孫忠文公之祖南稜先生實得晦翁再傳之學于葉通齋由庚以授黃文獻公溍至忠文又得文獻之學而益顯忠文之子博士君紳又嘗登宋潛溪之門與正學方先生為同志之友先生因得以門弟子受知正學至許以女暨其難之及也蓋嘗周旋其間誓欲返葬而不可得卒坐逮繫文皇帝念忠文死國之功特從宥罪且方嚮用之而先生力以疾辭還金華讀書結屋青岩之下將終身焉先生性至孝初博士君痛忠文之沒每食必斥兼味先生一遵其志子孫相承閲數十年不少變事母丁如事其父丁每遘疾輒倣徨不能去左右沒之日哀毁甚殯葬必以禮終三年酒食未嘗入于口撫其弟稚而教之卒用為石泉尹有聲先生年既至學益成行益高而士之從遊者日益衆郡邑交重之恆禮為鄉飲賔至以分獻于先聖廟先生疏髯偉貌出必儼然古冠服人爭快覩之曰此王先生也所著有青岩稿若干卷藏于家所編校有聖朝文纂金華賢達傳續西山文章正宗皆行于時先生諱稌字叔豐世居金華之義烏其先出五代節度彥超之後為太原王氏實生于洪武癸亥九月二十日至正統辛酉五月二十五日而卒得年五十有九暨卒門人相與私諡之曰孝莊先生以子汶貴贈徴仕郎中書舍人配丁氏繼吳氏側室李氏皆贈孺人子男二曰瀹曰汶孫男二曰俯曰仰汶以進士拜中書舍人文行卓然王氏以儒顯至是凡六世未艾也於乎習與性之不相及也久矣蓋自教化風俗之不出于一父兄師友之習其功在天下有不可誣者金華文獻在浙東南為著王氏在金華為尤著而先生實生其間宜其所得之不可及有如此者然堯或不能得于其子舜或不能得于其弟而孔孟之徒或不能盡得於其徒則先生之賢于人人亦豈不逺哉豫懼世之人安于習而不知父兄師友之為功又懼夫徒恃其功而不知所以自立也乃表于墓以著君子子賤之義以告夫世之欲知先生者俾考焉戴師文墓志銘謝鐸始豫與師文之父潛勉翁交己聞師文自少即頴異日讀書幾數千百言至義理肯綮會心處雖其師亦反為所難甫弱冠以書經領鄉薦來京師豫見其所作不甚類科舉文字心竊奇之及試禮部以所試文字來視豫豫益奇之謂科第可俯拾也既揭曉今閣老長沙李公為考官迎謂豫曰公鄉戴豪今年幾何是固久困場屋者邪豫曰其父視豫且少今猶在太學諸生中公驚且笑曰有是哉遂袖出其五䇿以視豫曰恨得之晚奈何暨廷試豫以受卷官得盡閲天下諸名士至師文所對俗尚時務處皆酌古準今確有定論其鋒焰所逼如負嵎之虎而人莫之敢攖豫私謂李公曰公所稱五䇿者今當不在大魁後矣既而乃聞冢宰尹公果欲置之上第而閣老萬公以為冗長難於奏讀遂置二甲之三然師文之名亦自是隱然動京師矣師文既登第往往以通家故來謁豫請益豫曰固知一第不足以溷子而區區文字間亦恐未足以盡子也要當傑然為吾台第一流人物如所謂十大儒五大臣者其庶幾乎師文不以豫言為不然每頷之而去未幾師文拜兵部武庫主事豫以憂去官謝病不起者幾十年而師文之聲實遂流播逺邇間得其敬齋銘當官三針通陳公甫書而讀之則見其修已治人之大方而求道之志於是乎在矣及豫以史事赴召師文已自武庫遷職方郎中乃盡得其所謂贅言録者而觀之則益奇其問學之篤曽不以吏事自沮蓋武庫主𨽻役出納職方主邊務區處實天下勢利所在居之者恆縻溺於此而莫知其他師文獨盡收天下書而讀之公退雖甚疲亦手不釋卷家人以日用不足告輒麾去曰其稱貸之無亂吾志至於衆務糾紜不動聲色而判決如流人皆服其精敏雖老成練達之士亦或自以為不及是其賢蓋又不特貴而能貧仕優而學之為難也豫既以南京祭酒致仕師文尋升廣東右參政取道歸省豫留宿緦山上觀其論議益英偉不凡而憂世之心恆在眉目因叩豫出處事豫謂之曰逺大之業子其勉之吾老矣無能為也師文唯唯而笑遂酌之酒而與之别未幾遽以訃聞於乎天下士大夫之望師文者何如師文之所自望其身者何如而竟止於是惜哉豫既為位哭柩至復往哭之潛勉泣謂曰豫豪赴官之夕有大星隕于水而豫之故居四望草木亦有瘁色豈其凶兆先見而竟止是哉乃相與再哭之慟潛勉復謂豫曰豪葬且有日幸賜之銘豪可以不死矣於乎吾尚忍銘吾師文哉師文系出吾台之黃巖南塘戴氏是為石屏先生之後再遷溫嶺今𨽻太平凡六世矣戴氏自宋厯元世以詩書宦業為邑著姓至國初以故官謫鳳陽而族始微師文蓋戴氏之中興者其祖慎齋府君諱圭隱處不仕父潛勉翁翁諱通亦以書經舉于鄉待試禮部將入仕矣母陳妻鍾氏子男二曰曽曰魯女五以𢎞治七年六月卒于官距其生天順戊寅得年三十有七而已所著有贅言録凡若干卷其學實師于父而自得為多蓋質本天成非偶然者於乎而竟止於是惜哉豫嘗竊怪靈識異稟如賈誼李賀邢實者一皆短命以死而姦憸頑靦若張禹馮道秦檜之徒又皆以卿相壽考終其身未嘗不有疑于天道之不公然而天下後世之所羡慕而痛悼者恆在於此其唾斥而賤惡者恆在于彼人心之公即天道也然則豫之於師文也亦何惜其不為彼而為此哉雖然人之所難得於天者美質而克自問學以成之又天之所難得乎人者也夫人既知其所以難而欲有以成之天乃不少假之年俾得大底于成以見其所止又安得不為之永歎之深惜之也哉乃為之銘曰於乎師文孰始之而亟己之孰豫之而亟毁之吁嗟天乎不朽者存亦孰得而死之明文海卷四百三十
