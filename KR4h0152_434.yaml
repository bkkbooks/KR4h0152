body:
  text: 明文海卷四百三十四餘姚黃宗羲編墓文六文苑故浙江按察司知事王屋張公墓志銘莫如忠吾郡有張玄超先生者騰聲藝林紳襟誦義之日久矣其歿也無論識不識莫不相赴欷歔傷其哲萎有典刑之思焉而公之孫孝廉君篤孝纘緒懼世德寖湮而又痛父九韶君早卒弗及為公闡揚休懿乃雪涕謁余奉太史唐元徴氏狀請銘以余與公雅相善能知公也余惡能辭敘之曰公諱之象字月鹿一字玄超别號王屋先世有鐵一者自嚴陵徙上海之龍華里家焉由鐵一而下七世為餘姚令杰八世為萊州府同知地及公大父湖廣布政司參議萱九世為公考順天府通判文洲公鳴謙及從父博野令鳴岐淵源名閥簪冕蟬聨鬱然盛矣而公少負穎異父文洲公及母李宜人絶憐之謂亢張氏者必公也而公固曠覽不羣於一切蜉蟻世榮意殊易之而就諸生及卒業國子屢試弗第乃慨然歎曰命夫天遂不與張子能終窘張子不朽業不以勢而彰者乎自是下帷發憤專力治古務博總羣籍囊括百氏勒成一家言與海內士别建旗鼓而馳斯誠偉矣逮其潛神積思久而神詣時發之詩若文其詩爾雅沖淡興寄寥逺有魏晉風其文宏深奧衍出入東西京不作晚近語及若緩頰盱衡考據前聞剖析疑難雖當世宿學皆自以為不如即單辭片楮傳之好事又無不視若拱璧爭購為竒此公平生建豎之較著者洵足不朽矣而以跅􅕟不羈困於遊稍從祿仕為浙之藩幕非其好也當是時諸監司大吏率偉視公折節相下不欲煩以簿書而公亦因得時乘休暇幅巾竹杖駕一舠嘯歌武林山水諸名勝區以吏隱自命無何會御史某者任苛政為聲虐使公公不可遂以歲丁卯飄然投劾歸歸而閉門却掃室常懸罄殊安之而期必竭其平生以竟所撰著或縱羣籍几案間兮日研討至不能布席對客嗒然班荆趺坐而已晚歲卜築秀林山麓其地多怪石危泉煙扉月榭叢竹茂林因公而勝者公自是益屏迹城市有司以賓飲強之才一往即謝郤不再所著書有剪綵翔鴻聽鶯避暑題橋猗蘭擊轅佩劍林棲隱仙秀林新草諸集所輯有詩學指南韻苑連珠韻學統宗楚語楚範楚林楚翼賦林七萃太史史例史記發微新舊注鹽鐵論唐雅回文類聚詩紀類林等編夥不勝紀其所交與盡宇內賢豪若先輩金陵顧中蔡翰林九逵文翰林徴仲王太學履吉皆公所嚴事而金陵許太常仲貽吾鄉徐奉化伯臣何翰林元朗何祠部叔毗董太學子元朱太學邦憲吳興茅憲副順甫濟南馮憲副汝言東粵歐工部楨伯黎祕書惟敬輩以雄文髙調塤箎一時無不推轂公為交譽者四明豐翰林存禮天才豪宕意少許可誦公詩擊節稱善久之武林方憲副思邂逅公太學廡舍未明聞語異之及晏溫識面歡然定交古歙許相公維楨聞公名時方入都造焉公未起直叩其榻前一見語合握手如平生其為諸名流所雅慕如此公素貌寢傴僂若不勝衣而禔身處家動遵古訓嘗憤流俗諂附焰勢反傅咸意著叩頭蟲賦以見志又憤後雋稱詩者多謬古而師今為談藝篇以規之居常評隲臧否耿耿不阿曽不少假脣吻於暴豪之徒而遇士臭味偶同即虛懷延譽不置里中有不平事慷慨仗義直之不得則或終夜咄咄忘寐族人以貧故有鬻其女豪家者傾囊訟于官必歸之乃巳何翰林遺孤反噬于黠奴出身力援卒置奴于理所知董子元以才不祿匍匐臨之哭失聲聞者感悼此又公篤于交誼之大端也先是巡撫陳公我渡廉公行誼為白其無妄而檄有司以學行俱優扁其門巡按邢公知我行部至松髙其義數存里巷為置買山錢若干比卒之前一年上洋顔令君議修邑志而難其人禮聘公公時巳寢疾而令君意益虔公乃力疾往再閲月而書成其紀載博雅義例精詳一時目為實録而公自是亦不起蓋有待以畢志云公卒之歲為萬厯丁丑正月朔距生正德丁卯十二月十二日享年八十有一配唐氏墓在望湖涇之原葬卜是年四月二日將啓唐孺人之竁合焉子七人女五人孫男十四人孫女九人曽孫男三人曽孫女三人並英特婉順而其長嗣雲門孫齊顔俱領鄉薦他奮起膠庠振厥家聲者濟濟未艾也諸名字嫁娶具見太史狀中不著嗟夫公以宏才博雅望重一時其或稍自抑貶以諧世好豈必後人而曽不能徼再命榮建碩畫于當世及弱冠操觚要之白首而又不能一奏公車之牘來掌故之求志誠悼矣然當舉世方務夸矜勢能之榮而獨以鴻文巨藻放辭瓊琚為藝林望令與靦然懷尺組岌塵冠而遊者一得相當即公考妣所稱能亢其宗以錫羡來裔者於取數為孰多當有能辨之者余論次其可知為志而系之銘曰器無恆量玉毁瓦存木托而茂蠅附而奔卓彼明懿貴匪位尊學窮玄旨思入妙門既咀其華亦尋厥根縱橫騷雅搜羅典墳掩藻先士垂型後昆棲遲衡宇含和葆淳其文霧隱其變泥蟠敕銘幽宅永賁泉原故南京禮部祠祭司郎中大壑何先生碑銘莫如忠君諱良傅字叔毗其先居陶宅仕顯髙皇帝時自君髙祖志清君出贅柘林李氏家焉子孫碩蕃遂為里著姓至君考靜軒君孝生子三人長良佐光祿寺署丞仲良俊南京翰林院孔目其季君也君鍾英茂裔騰聲稚齡敏睿夙成餘力該綜擇賢處友志期立言童時補博士弟子員邑令永豐雙江聶公竒之召詣門下風勵諸生總角應畿試弱冠拔貢京師建康東橋顧公關中西玄馬公忘年定交爭相延譽庚子領鄉薦辛丑舉進士分宜介溪嚴公在禮部知舉案署及君喜曰是吳下兄弟知名者干將鏌鋣其一至矣當是時君實與仲內翰君才名等埒光後察孝廉哲軌齊驅英標競爽羣公賞識仲必與焉以故所至籍甚稱二何云君筮仕行人兩使宗藩式禮不辱擢刑部主事以儒飾吏讞獄多平反改南京禮部儀制司主事升祠祭司郎中恪守章程刷靡振弊故祠祭所𨽻動關勢家君欲裁之而大吏沮撓弗竟其志乃喟然興歎鑒周任陳力之戒髙邴生薄遊之節抗疏陳乞投紱言歸時年四十有七通都大夫下至閭里徒御咸庶稱難謂古鮮儷此君出處之槩也議者或以行人多官禁近而君獨郎曹仕宦卒貴京朝而君投間散務進者白首郎署而君不終日遂疑窮通所值乃忤於時而本其恬淡寡營實成於性故能脫屣榮名甘心嘉遁飲食宴樂薄取世資假麯糵以寄沈冥託二氏以逃名迹君之雅致可覩于斯矣年五十有四疾終正寢相知交訃感涕山陽文學哀辭傷其哲萎相與謀曰君行雅誼訓韻宇夷曠去機率性不忮不求巳諾必信見義能果總其素履德不踰間而乃仕弗究施年靡躋夀胤子來樹述造多逸所不朽者允惟令名匪藉鐫辭曷彰潛耀乃碑而銘之曰猗與何君義問奕奕或出或處知玄知默其行規圜其躬矢直坦坦君子履道終吉亡何昊天憗莫是奭既厄其遭復褫其魄誰謂缺者全於理則曷于詔來我銘玄石陳山人墓表徐渭海樵陳山人鶴卒之六年為嘉靖乙丑其子廣西都指揮僉事某將以是年春二月之十日葬山人於某所與山人配胡安人合且擬乞銘於湖之茅副使坤而先以狀屬栁君文至是顧以葬事阻湖之行又以余與栁君先後得友山人雅相抱筆伸紙以朝夕庶幾稱知己於山人也顧且令余表山人墓而栁君所為狀亦束不見且曰必按狀而表吾翁若母安取于知吾翁哉噫都君之志則善矣乃若天之所以縱山人者豈惟余不之知雖山人亦不能自測其然也然謂余盡不知山人固不可山人生而穎悟絶羣年十餘巳知好古買竒帙名帖窮晝夜誦覽十七而始以例襲其祖翁某軍功所得官官故百戶也山人固不喜握鞭執弓矢以自匿其芒角負平生志一旦鬱鬱得竒疾更百療莫驗山人則自學為醫久之洞其旨則自為診脈凡七日而病愈已而棄其故所授官著山人服乍出訪故舊神宇竒秀余從道上望見之疑其仙人也居數年始得會山人于甥蕭家酒酣言洽山人為起舞巳而復坐歌嘯諧謔一座盡傾自是數過山人見山人對客論説其言一氣萬類儒行玄釋凌跨恢宏既足以撼當世學士而其所作為古詩文若騷賦詞曲草書圖畫能盡效諸名家既已間出己意上贍絶倫其所自娛戲雖瑣至吳歈越曲緑章釋梵巫史祝呪棹歌菱唱伐木挽石薤詞儺逐侏儒伶倡萬舞偶劇投壺博戲酒政􅍐籌稗官小説與一切四方之語言樂師矇瞍口誦而手奏者一遇興至身親為之靡不窮態極調于是四方之人日造其庭盡一時豪賢貴介若諸家異流無不向慕願得山人片墨或望見顔色一談一飲以為幸雖逺在滇蜀亦時有至者即不至幸以書托交每旬月積紙盈篋山人又喜拔窮士士或往四方又必借山人片墨以動豪貴人每值山人飲旅者行者舉爵持俎載筆素以進山人則振髯握管須臾為一擲纍幅成數十丈各愜其所乞而後止而往復箋札酬酢去留目營心記口對手書又雜以論説娛戲如前所云者一時雜陳燦然畢舉于是軒蓋益集諸司巨公郡縣長吏或銜命之使有未見鄉搢紳而先造山人臥未起或時就榻見之諸公既異山人姿髙其履而山人指顧自如雄談闊視雜以嘲詆無不氣折心醉願內交而去蓋家居如是者凡三十年以為常乃一往金陵客四年而不復返矣嗟哉始山人少時遊金陵將造尚書顧公公先一夕夢李白及見乃山人也遂深相結而今之殮山人而哭盡哀者為孫公官又皆尚書豈山人終始于金陵固自有數耶嗟哉山人之配為胡安人先山人幾年卒故千户胡公女也公性方嚴無子教其女如子以故安人賢且才率能給山人取山人雖外豪宕然事父母至抑畏處諸弟若女兄弟至和愛周貧乏不問有無至於晏安無虛夜調飲食紉中服皆時出新巧安人無不佐之隨事立辦于是山人內成孝友外益得肆其抱以騖一世故豫嘗謂山人氣雄邁跨諸貴遊似東方朔才敏似劉穆之其為瑣細藝劇忽整衣幘談理道辨世務又大類曹植見許淳事然穆之史載其妻截髮為食飲事雖不類山人然其賢可想見而朔數買長安女未聞其妻之妬且割肉遺細君又意甚歡也此亦與山人夫婦中頗相似而獨悉舉山人百所能真若海釀山負則三人者互有所短而山人獨兼之此所謂天所縱雖山人亦莫測其所以然豈以豫寡陋謂其智盡知山人耶故豫略述其所可知者以復都君之請都君當朝奠以豫表若栁君狀並告於山人脫稍相異同山人當自知之也中順大夫陜西按察司提舉副使何君墓志銘孟洋孟洋曰余讀伯夷傳其稱天道不與善人謂其不然今觀何子修學力行而夭死又何戾也余哭仲默之明日其孤以門人樊鵬狀謁銘慟乎慟乎君知我我獨不知君已乎仲默兹為汝志矣何君諱景明字仲默號大復山人髙祖太山由羅田徙居信陽生海海生鑑鑑以隂陽家縣辟為典術五子曰信者封徴仕郎中書舍人讀書善吟號梅溪公四子長景韶東昌通判卒次景暘安慶通判次景輝最幼何君何君秀而癯惟沈敏有度八歲能屬文十二從梅溪公宦遊陜西之渭源臨洮守聞其竒召置館下甚愛幸令師授春秋數月即説春秋其師乃辭避弗教也梅溪公既歸乃又從其兄受尚書受尚書才九月𢎞治戊午即以尚書魁河南鄉試己未試禮部不第遊太學祭酒林公又甚愛幸何君贈詩美之壬戌舉進士進士例改庶吉士何君獨以不喜私謁弗與進士請歸娶娶張氏二年卒當是時關中李君獻言濟南邊君廷實以文章雄視都邑何君往造語合二子乃變之古自是操觚之士往往趨風秦漢矣甲子拔中書舍人明年奉使南方還過里門再娶唐縣王氏是歲正德元年也劉瑾得君度惟大臣可與抗節乃上書諸尊貴言宜自振立撓瑾權諸尊貴惡忌何君丁卯何君恐禍及謝病歸郊居著述一年瑾盡舉免諸在告者戊辰何君免已已梅溪公及李太孺人相繼卒何君哀毁危絶辛未冬何君因閣老李公薦復授中書舍人直內閣經筵官時四方學士咸願知何公車馬填門巷即元老巨卿亡不欲出門下錢寧欲交歡何君間持古畫謁何君題君謝曰此名畫不可點毁弗許乾清宫災君應詔言時事詞義剴切疏留不下丁丑升吏部驗封司員外郎仍直內閣戊寅升陜西按察司提舉副使提學政尚嚴務在崇本起敝士初稍不堪漸久而安風習亦振初何君獨以文學著聞既提學政人又服其能若是辛未二月何君以形勞慮深卒然嘔血損六月棄官歸會道暑益劇抵家六日為八月五日而何君卒嗚呼傷哉王孺人故有內疾號痛莫支越十九日亦暴蹶而卒孺人幼喪父相者貴之人求婚母輒不許年二十二始歸何君以賢稱會毅皇帝上尊兩宫及李太孺人張氏同封贈云何君事兄恭能順承父母之志其父母諸兄亦獨甚愛何君何君一切不好華靡復不治産業居官所入祿則又常分所親故既歸餘白金不滿五十兩所在不齎方物疾且亟王孺人泣曰官貧諸兒女幼君即有不諱奈何君曰若無多患第不昧天理足矣何君友與人訟者故嘗寡友與友訟衆莫為之地何君乃獨上書力諍直友之屈施御史者客死京邸莫能斂錦衣官廖鵬錢寧之黨也賻之棺因結歡士大夫君曰奚為汙我友地下乃出金賻之諸所知皆賻之斂成禮旋郤所賻棺其見義勇為如此何君天資穎異好學常若不及讀書率過夜半即盛暑蚊虻汗浹背不廢邇年略去詞章嘗稱以為天下自有實用之學竭精力猶弗逮何暇文詞無益也蓋其用世之志至逺今中沮惜哉及王孺人以哀絶亡他顧慮亦貞固矣何君生成化癸卯八月丙寅卒年三十九歲王孺人少二歲生成化乙已三月甲寅子三人長夫聘郟縣王氏參政君女次登女三人長聘袁氏子次馮氏子次張氏子皆王出是年十月七日合葬典術公墓側何君有文集詩集詞賦集合若干卷行刻傳於世云銘曰噫歸哉何君孰奪爾夀也雖奪爾夀爾名不朽女有媞媞爰儷君子如琴如瑟樂爾偕死未畢爾婚嫁豈無巨源靡孤叔夜凄凄雲旗霧駕遲遲鳳凰喈喈和鳴相隨瞻彼崇岡載隂載陽靈魄攸藏用萬祀無疆翰林修撰升庵楊公墓志銘遊居敬余之涖滇彌月前太史升庵先生楊公以書至并惠所著海口碑并晏公廟碑刻余讀所為文古雅奧麗燦然若珠璧鉥目劌心作而曰兹秦漢之軌也余垂髫時聆公名及宦遊四方搢紳學士談先生博雅而竒若不容口今驗之信然然詢先生起居容貌異往昔心憂之又逾月先生復貽書并惠製便民纂敘一篇文之竒博猶夫前也而光焰覺稍減余心語曰先生得毋有恙乎無何先生走僕告余以病余數遣醫診視之醫復曰病不可為也乃七月六日乙亥丑時先生卒于昆明髙嶢之寓舍為嘉靖己未歲也距生𢎞治戊申十一月六日乙丑年七十有二余聞之曰吉人隕矣為之悲而悼者數日食不飴九月先生之門人安寧庠士丘生文舉輩述先生素履之槩就正於池南唐君錡謁余而請曰願為之志先生將屬纊時所托也余惟先生為海內賢碩余曷足以辱命然余聞先生為有道士表賢樹聲係余責也又曷可辭乃按狀而擬其大者先生諱慎字用修升庵其號也四川新都人前太師大學士石翁某之子督學留耕翁某之孫母夫人黃氏家世淵源儲祥穎發非一日矣先生生而聰明異常兒孩童時所讀書過目輒成誦年未總角著詩名與李獻吉何仲默諸名公並稱乃祖留耕翁每竒之於諸經古書無所不通子史百家樂律之言一閲輒不忘至於竒辭隱義人所難曉者益究心精詣焉作為文數千百言援筆立就悉出經入史不蹈襲他人語正德丁卯四川鄉試第三辛未會試第二廷試賜進士及第一人三試俱首雋名實稱也官翰林院修撰秩承德郎益專文事三載考績同官韙之為經筵講官著大學正心論語君使臣臣事君講章丁丑武廟聖駕北巡有疏請還宫副總裁兩朝國史文詞以爾雅為流輩所稱讓辛巳校文禮典受卷祕閣所取多知名士官至館閣臺省者若干人修撰楊公維聰中丞陳公講其著也今上嘉靖改元壬午代祀南瀆有江祀編詩記學士玉溪張公潮秩官棠陵方公豪評之甲申以議禮忤上意謫戍雲南之永昌衛遂安於義命以天王聖明悔艾自新焉居常誦詠古人書日探索三代以來舊所覿經史子集百氏之言博而能約粹而弗泥或發摘隱潛或裒采菁華長歌短篇鏗然中金石攄為記頌序論銘書賦贊雜著無慮百千萬言用是以治其身人有叩者無貴賤靡不應時出緒言以誨掖羣髦滇之東西地以數千里計及門而受業者恆千百人脫穎而登科甲居魁選者藹藹然吉士也先生又不以問學驕人藏智若愚斂辨若訥言質而信貌古而朴與人相接慷慨率真評論古昔靡有倦怠以故士大夫乘車輿就訪者無虛日好賢者攜酒肴往問難門下屨常滿滇之人士鄉大夫談先生者無不斂容重其行誼博物云前巡撫黃鐵橋公巡按郭公為擇安寧州雲峯書院以居先生黔國沐敏靜公處以别墅巡撫白泉汪公題其碑亭巡撫擢司寇箸溪顧公為創廣心樓于髙嶢歌以紀之皆好德之心所表見也先生居滇泛昆池登泰華遊點蒼並洱水探竒挹勝所在有述人爭寶之又工書法片紙隻字相傳摹榻殆遍宇內名碩諭德任君少海方伯孔君文谷輩率千里神交郵書相訊述古好文至於臨歿無雜思焉其庶幾古之所謂豪傑者乎卒之日巡撫侍御吳公右泉黔國沐公雲樓暨藩臬諸大夫咸有奠賻余嘗博稽衆聞而為之論曰位有崇庳惟德不朽名有汙隆惟實斯符自洙泗振鐸素王世祀惟時德行文學政事言語列為四科並獲依歸永垂令聞至仲尼作春秋記者曰筆則筆削則削遊夏不能贊一辭言遊夏之以文學擅長也余聞諸升庵先生考賾鈎玄進於邃古搜冥發隱網羅舊聞摛辭達情彪炳溢采敘事辨疑貫穿典墳而又蔚成一家凝神沖淡晉之聖門其不將為遊夏之匹乎子遊為宰弦歌教行子夏篤信序詩淑世皆不外言辭以傳聖翊經也先生禹碑有釋檀弓有訓經疑有録古史有評論述往古提覺來今擬之往哲抑又何疑有言於余者曰先生蜀人也蜀之先文士彬彬著于詩傳若王褒著得賢之頌揚雄述太玄之經左太沖之賦三都司馬相如之賦子虛皆製作富蔚轇轕造化與楚之屈宋爭鳴宋而後道學有張南軒氏文章有三蘇氏世之所亟稱其人而樂誦其書者也先生其誦習上古逺觀近稽萃為文辭麗而辨宏而奧非是之流演而淵涵者乎譬之河而委于海山而宗于嶽者乎不然何先生之文肆而大篤實而光輝包括宇宙曲盡事變若鐘鏞之叩聲徹蒼玄大韶之舞時間雲門使人玩之而神怡覩之而目眩莫測其端倪有若此乎故嘗評先生之古詩歌行若魏晉初唐文若兩漢詞賦比之長卿子雲云余曰固然先生殆采華而茹實溯流而得源者與故華藻雖泛濫于百家而道誼則統宗乎六經竒博雖上掇乎班揚而理趣實沈潛乎伊洛幽居之久時寄諧戲以抒興泄思亦皆若古之思美人思公子然而卒不詭于道非養之深而能然與非有得聖人之教而能然與故嘗觀先生之作禹碑歌其敘述甚羡慕唐韓愈之為工而隱若自附焉唐三百年見道莫如韓愈先生私心擬之其自負豈尋常所可窺哉舊嘗聞國朝狀元著稱者博學若曾棨氏節槩若羅倫氏好古若吕涇野氏藻麗若康對山氏皆世之所稱卓然名垂後先者也以今先生觀之其著作之富禔躬之勤是與數君子並茂而同傳無惑也吁可謂難矣先生所著有經説丹鉛餘録滇候記韻林原訓風雅逸編巵言文集詩集詩話南中集行戍稿諸書若干卷多梓行于世配黃氏封安人子男四同仁安人出娶歐氏新都庠生早卒寧仁娶滕氏瀘州庠士右仁資仁尚幼女一許適韓參將孫某皆側室某氏出兹將歸櫬于蜀以某年某月日葬于某縣某山之原安人之弟松江郡守黃君梓谷于余為同年進士緘書來速余言遂為之銘曰先生之生岷蜀之精先生之出朝廟之英文擬班揚學侔遊夏首選大廷無雙聲價擢君禁中實才之雄主上曰咨汝毗朕躬未幾落魄出戍滇僰聖德如天臣罪莫測乃安義命述作自娛揮毫對客落筆瓊珠人言天才天實賦汝俾列史官佚相之侣竟老碧雞光射斗奎金蓮莫返昆池草凄吁嗟已矣有書盈屋石室副藏永讐天祿惟忠惟義逺近誦之不亡者存尚俟穹碑清涼居士自序居士姓文氏漢成都守翁之後五代時有諱時者自成都徙廬陵事唐莊宗為帳前指揮使輕車都尉至宋淳熙間有宣教郎寶蓋時之後也為衡州教授子孫上籍為衡山人十一世祖元金紫光祿大夫某金紫之孫曰俊卿者仕元季為鎮逺大將軍湖廣管事都元帥佩金虎符鎮武昌入國朝授某州衛千户鎮逺六子長子定開從髙皇帝平偽漢有功授飛騎衛荆州左護衛千戶賜金織蟒衣改名添龍建文中殁于兵子憲為錦衣衛千户調徐州衛今徐州之族是也第三子定聰以武臣子入侍署散騎舍人為都指揮蔡本贅壻從蔡徙杭生四子其仲子惠壻于蘇張聲逺氏因留居蘇為長洲人居士五世祖也始讀書業文隱居不仕教授鄉里人稱存心先生存心生淶川府君諱洪中成化乙酉鄉試授易州淶水教諭以子貴初贈南京太僕寺丞再贈少卿少卿生三子長溫州府君諱林成化壬戌進士仕終溫州知府居士曽祖也次中丞府君森成化丁未進士仕至都察院右僉都御史又次貢士府君彬以年資貢禮部未仕而卒文氏世武辨自少卿奮起科目生三子宦學通顯嫓德儷義望於當世溫州府君生我祖翰林府君諱徴明世號衡山先生生三子長即我考博士府君諱彭仕終國子監博士弟和州府君嘉祝峯府君臺妣孺人錢氏生二子長為上林録事肇祉次即居士居士名元發字子悱嘗仕為浙江金華府浦江縣知縣五年升河南衛輝府同知未上以病乞致仕歸自號清涼居士居士生有至性初博士府君以志趣髙朗不屑生産家貧甚至乏薪水代勞之人錢孺人方病居士年六歲即自往祖母吳安人所哀哭乞倩人為饘粥以供錢孺人吳安人亦為之哭錢孺人歿時居士方九歲伏尸躃踊自始死至殮三日夜不離尸側亦不輟聲逮浴尸既俗云若親子飲澡水者即死無地獄之苦居士隨附盆飲水觀者咸異之時祖母吳安人以髙年倦勤居士既喪母幼又孱弱多病內外親黨莫有觀之者惟其嫂王碩人為之煦哺鞠育極其拊循寒暄飢飫莫不周至蓋不待上林公之詔而然者故其歿也居士為之期以報之事後母楊孺人時尚童稚然曲意宛轉哀號孺慕若成人然楊孺人雖性嚴乎亦為少霧其威也但自幼因錢孺人多病日不離側既錢孺人歿伶仃哀苦遂至失學年十五始克就外傅從大儒魯子大先生受春秋章句稍通大義又不肯竟習未幾博士和州二府君俱宦遊在外而待詔府君以盛德顯名大耋居家賓客輻輳凡應對延接悉以屬居士即飲食起居逼浴綦履之微非居士在側不適也而居士所以先意承志以代博士府君之勞者亦殫力焉年弱冠被選為郡學弟子員滯場屋者垂三十年年四十遇穆宗踐祚詔天下貢士不限資次名恩貢時郡守永年蔡公國熙謂居士宜選薦之於督學麻城周公𢎞祖遂以居士應詔同選者吾蘇十人十人中巳大半騰甲科登膴仕而居士再試再斥丁丑遂謁選選授浙之浦江浦為浙東巖邑地瘠民刀好鬬喜訐囹圄常滿而逋稅較他邑為最居士至聞其槩欲變其俗時瓊州王公思德守金華名能知人亦慎許可一見居士謂其僚佐曰文子非百里才也居士亦見王公可倚以立事遂請間因歷陳縣弊事數十條王公報可居士即以次行之執法不少阿縣多豪大家每持縣事縣官至先以利嘗之不可則以勢劫之又不可則訐之於上而搆之以故縣官稍下者遂食其餌明斷者不得善罷居士一繩之以法莫所縱釋而實繁之徒即走金陵騰毁焉晉江陳公我渡時為南司空蓋先撫南畿知居士者特致尺一諷居士有曰浦故刁俗善訐官吏韓鳳橋許益齋以甲科盛望被浦民誣告至敕兩府會問足下丰裁凛凛恐有鋌而走險者不可無濡尾慮也居士報之曰申棖以有欲不剛孫寶因受囑色沮不肖幸免此二者破柱剝鼓諸豪聞之蓋終居士任不敢出一聲也其他條舉志在必行事集而衆不擾賦稅視他邑乃更早完獄訟希減盜賊屏息民大安焉而禔身苦操終始一節即始之譁且撓法者莫不詘服三載考績例得恩典於是先父母及繼母二室人皆得贈恤煌煌寵章賁兹黃土幸矣幸矣居士在官雖有賢聲然世局時情較量資格不爽秋毫而居士素狷直不能與時俯仰初居士為青襟時與今相君申公有筆硯之舊申公後既貴時居士尚家食申公頗為推轂及有浦江之選即謝相君曰文生年踰四十得憑閣下之靈受一命為民社主自今日以往固不敢以不肖之身纍閣下負夙昔之知矣然而相君於故舊意甚不薄每部使臣及監司至浙者多以居士為託世無隻眼遂以此為縣令重也而煦煦然請間示恩情態百出殊為可厭甚至有欲市其私者先乃令人捃托長短聲言按劾而後竟薦之於朝以為德居士遂浩然曰嗟乎文生束髮讀書家世名德生平自許亦欲乘時少見以不負初念而運會不逢遂以老貢生僥天子之命得一邑如斗大顧不得驤首康莊而局蹐轅下誰識鹽車哉乃欲以綈袍緩故人頦頰縱自駑下無若先世羞何會有衛輝之命因得解歸遂移疾上疏乞骸骨蒙準以新銜致仕居士年已五十有四矣居士始欲歸有同官與居士厚者新建喻公均髙安范公俊同安黃公文炳為居士謀曰若家素貧今歸何以為十口計且以一老郡丞在家與部使臣監司相與不無世態慮耶居士笑曰勞苦諸君愛我良厚然人各有心吾終不能以此區區者而戚施於市兒前也柴桑翁笑人齒冷矣况吾自上世以來田不滿二頃屋廬僅除風雨吾曽祖守溫卒于任同官視其篋中僅縿青布袍一件鍍金帶一圍書數十卷其清如此吾今幸藉先人遺澤得免負戴有田三百畝足以供朝夕草堂一區歲時伏臘烹雞芻酒足以備祭祀此其家不貧况山姿野性素無軒冕意閉門自適雖子平之纍未畢而公理之志可申諸君乃欲我東帶僕僕隨士大夫後蹣跚墀戺之下然後為文生重耶巳乎休矣於是居士歸旋葺其舊居顔其堂曰願賢寢曰語安築小樓一楹曰心逺日坐其間讀書課子間吟小詩詩不甚工亦不求其工自娛而巳居常自郡縣大夫外雖豪貴人長者非素相知即不肯束帶出見亦不報禮雖似於簡傲然不欲強顔應非情言笑與俗人相對蓋其素性爾也而人亦有諒之者居士與上林公同胞少公十歲又嘗鞠育于王碩人如子以故事王碩人如母而事上林公若父及居士致事歸四年上林公亦致事歸吳中與居士居相去僅百步朝夕相聚甚歡也初博士和州二府君兄弟友愛白首無纎芥卻洎晚歲宦遊南北阻絶臨終皆以老年兄弟不得一執手為恨今居士與上林公乃得以暮齡垂白怡怡于于徜徉于故山林壑為吳人所艷羡也不亦幸哉居士雖生于貧素然性不喜作寒窶態亦不肯干乞于人自少至老口不言貧衣服修潔雖至親密者故不知其貧生也垣屋居止處方廣不盈丈必淨拭掃除性方整即屏榻裀几稍有傾仄不肯即安然氣宇簡重凝定間雅楚然自居而秉志髙亢與人寡合不能容人過又不喜與富人往來居常見脂韋夸毗誕妄不經與輕諾寡信輩及長者家兒恆白眼視之如將凂焉故家居以來賓客益鮮門無剝啄日手一編倦則徐步庭除間朗吟古詩三四首亦善睡每飯後髙枕酣寢融然逺寄欣戚不繫謗譽無聞如是已耳世間可欲之物若無足以動其心者然任懷得意旁若無人其終身坎壈亦坐是焉間得一二相知結山間之社每數日一會相與甚洽意足以終老弟未知諸君歲晏何如耳居士原配彭孺人生三女無子繼室周孺人生一子名從鼎今更震孟而周孺人媵陳氏生一子名從升周孺人卒復聘史氏女為側室生一子名從泰今更震亨後歲己丑陳氏再得一子與吾同物名之曰從同云今更震纓鼎娶陸升聘徐泰聘王同聘潘三女長適陸士仁次馮時康次姚汝輒悉名家子歲戊子居士年且六十念諸子生俱晚未悉居士履歷暇日因稍録其生平大都并所著詩文雜稿藏于家以示之云清涼居士曰夫惟聖人不凝滯于物而能與世推移自非聖人必有所寄藉而後克展古人謂賤生于無用中流失船一壺且千金矣雞靡豕零時為帝者也信然哉夫世有懷瑾握瑜壞竒倜儻之士弗獲一試泯泯於當年者又何可勝道也幸與不幸與乃孔子稱四十五十而無聞又疾沒世而名不稱焉士獨可薄世資乎哉居士結髮立志自謂不後于常人顧當文明景運格于際會進不得宣力樹勳效鉛刀一割之用退不能讚揚皇猷撰述一家之言為爾寂寂幾為胡盧生所笑語云邦有道貧且賤焉恥也豈非聖明在上而功業不建聞譽弗逺烈士以為至羞乎雖然他日獲啓手足所以從先君于禰廟者儻可藉口以復也則又幸矣膏以明自銷薰以香自燒吾知免夫吾知免夫明宗室泉亭先生墓志銘韓世能太史氏曰昔先王兼制天下封建親戚作之藩屏何其久而彌鞏哉故其詩曰文王孫子本支百世逮漢髙王子弟謂犬牙相制磐石之宗吾以為在其德足長世者也蓋孔子之轍幾遍文昭武穆之國獨于眇然一公子致意焉為題其墓曰嗚呼有吳延陵季子之墓其聲烈千載何必席大路少帛重哉自余赴舉南都則聞宗室泉亭公賢籍甚比來佐禮留曹其嗣君完玘苴衣冠泣持余司業所為狀乞銘余既耳泉亭公久安得辭泉亭公者髙皇帝六世孫也賜名可浧泉亭其别號云其始祖槫以髙皇帝第七子封齊王永樂己丑謫居廬江嗣子賢爀在襁褓歸京師養于西內景泰甲戌遷南都賜第三山里仍敕有司歲給廪祿布帛及婚喪諸費賢爀生能㙊能㙊生長鉜是為守靜翁守靜翁以昆弟子姓日繁舊第隘不能容嘉靖癸已請于朝仍賜第聚寶門之飲馬巷顔其堂曰思服昭寵令世為嫡長子居守靜翁娶羽林劉將軍女有二子嫡而長即泉亭公也公生頴異垂髫日受書數百言輒了大義弱冠喪守靜翁哀毁弗勝既舉大事事母必在視滫瀡最善承意指厚存二姊之已嫁者而歸其妹飭奩具甚多百凡務得母歡心比疾籲天祈代卒含殮殯葬如喪守靜翁禮蓋久而忌辰伏臘必哀一時物未薦不敢嘗遇異母弟可潛極恩洽其至性如此初守靜翁簡淡寡營公以勤儉承之機敏中綮數十年資用大饒慨然慕梁孝陳思之烈闢地一區疊石激流竒卉珍木充斥名其園曰同春一時諸名勝結駟而遊籍籍謂王孫乃愛敬客然自授簡而外未嘗輒干以私也其治家嚴督諸子尤甚力居常朂以忠孝故不喜誼呶聞猾黠遊博欲唾之而性實寬簡嘗大書已所不欲勿施於人揭座右自警故其操履甚髙稱其賢者擬諸河間東平云嗟乎奢麗同流久矣公天潢貴胄自力起家食指千數最巨盛而能癯然儒素顧不得表求自試而能無戚戚具爾之心重飭忠孝以勗後人既不能一究厥藴能令人頌義無窮若公者即不必儼然臨官常民社乎豈不裨於帝宗者哉公年六十卒訃聞敕有司贈金可謂髙朗令終也已銘曰偉其隆準與常人殊髙帝子孫遡由賜履海岱建國大風斯存穆陵無棣王者氣遷廬江噴吞卒集舊京穆穆皇皇詵詵振振列聖重熙昭德萬方涵濡世仁脤膰兄弟寶玉伯叔時庸展親五世而昌周伋漢閎素封實均礪若鍾山帶指秦淮不爵而尊巋然遺老明經有行宗範具陳允出在兹厥旨在恕八言書紳以方東平為善最樂大言若新紀綱既樹標的兼猷追軌不逡鄴中清夜園白雪嫓美同春蓬萊雙闕毗以王家增而嶙峋疇龍其種疇麟其趾夙德升聞不藉白茅而康朱邸國有顯恩鳳凰城西五彩陸離鬱其楸原我銘厥幽大隧閟日千秋出雲明中憲大夫太僕寺少卿致仕都公墓志銘胡纘宗吳有大雅君子博物洽聞砥節礪行淵澄玉潔蔚為醇儒蓋都公其人也公諱穆字玄敬仕為禮部主客司郎中年五十有四即上書乞骸骨歸許之加太僕寺少卿致仕維時京師大夫士見公之歸無留資于囊無田廬圃墅于鄉蕭然戒行視棄官爵如吐唾無毫髮顧藉心爭挽之不得莫不交歎以為公真賢逺於人歸而攻苦食淡寢臥圖籍與相知婆娑嬉遊屏車斥騶掃迹公府以著書為業或放逐山水冥搜遐寄如是者十餘年嘉靖壬午以撫臣薦進階中憲大夫又三年年六十有七卒實嘉靖乙酉九月二十二日其子元翁等卜以卒之年十二月六日葬公花園山纘宗屬守吳得與其凡役事而又屬之以銘重以工部主事伍君疇中之狀乃不獲辭而為之志曰都氏之先為丹陽人有逺祖稱丹陽先生者仕宋為尚書吏部郎中由丹陽徙蘇居吳縣南濠里曽大父文信大父彥和父印封工部都水司主事母朱氏贈安人公七歲能詩及長不習章句泛濫羣籍杜門篤學者幾二十年屢空晏如絶意進取名聲大噪吳下巡撫都御史何公某提學御史林公某欣其名強之應舉公乃出以是秋乙卯領應天鄉薦己未第進士甲子拜工部都水司主事階承德郎未幾丁父憂服闋復官工部公理器皿厰厰事故旁午多靡費公則鳩匠會計大小贏縮惟其舊有不便輒弛去匹馬入廨自齎米蔬厰人掘地得金貯之庫吏有私請者公斥之曰若曹何敢汙我巳而巡視京城浚渠繕壘事咸集丙寅改南京兵部武庫司廉幹如工部日辛未復官工部升虞衡司署員外郎壬申乃進禮部職主客諸番入貢使者充館公柔逺有道國體以尊慶陽王妃應册封公副崇信伯費公某往使之贐以腆幣拒弗受便道躡終南巔尋過首陽登華嵩兩山抵少林濯溫泉轉入王屋以及三山砥柱龍門伊闕囊括其勝泄之歌詩徜徉而返公性友愛養孀妹撫孤甥恤幼弟皇皇如不及文祖韓歐詩宗陶孟尤長於纂述故郡人稱為南濠先生其行於世者曰南濠文跋南濠詩話玉壺氷聽而紀談藏于家者曰南濠詩略文略賓話史外類鈔周易考異金薤琳琅云距生為某年某月某日配徐氏封安人先卒子男二元翁次翁俱府學生女二嫁太倉州學生陸之箕太學生陸采孫一曰祖齡維公束髮好修奮師古人完德邃學星列海內受知兩朝贈貤有赫風流儀矩興懷後賢老於食貧不可謂不遇也是宜銘銘曰羣鳥爭擊鵷雛乃鶱炳其五色羽儀翩翻覽德而下終息丘樊矯矯太僕光耀璵璠蟬蛻汙濁霞舉雲掀獵精吐靈綜古立言飲水飯蔬清風灑然代有作者興愾文園嵩渚李先生墓碑陳柏毅皇帝初年北地李獻吉汝南何仲默以文章著學士大夫皆曰何李未幾大梁李川父與譙國薛君采相繼起又曰李薛由是四先生之名嶽嶽遍海內矣川父者即李先生也先生名濂字川父其先為大梁人世業小兒醫宋季有以醫顯者曽賜金鐘因稱曰金鐘李氏曽祖得祥祖信皆傳其業父敬少業儒長精于醫其所存活者數百人語曰活千人者後必昌今子孫果彬彬然而李氏之族遂豪大梁矣敬生三子先生其季也為兒時恚而啼以棗栗啖之愈啼示之書則止七歲就孰師日可誦千言九歲能為詩其語多驚人稍長習舉子業即攻古文詞非秦漢書不讀好稱先王則古昔嘗與郡中豪雋載酒上吹臺出夷門馳昔人走馬地感憤為懷古篇擊築而和聞者壯之嘗作理情賦李獻吉自左舜齊所見之輒歎曰其班馬之儔乎締為忘年交時遂庵楊公自沛入關中一見稱為國士而郡守陳澍者愧其未之識也召試郡閣其文一揮而就語甚藻麗督學使者秦公大竒之於是汴中人士咸出李先生下而李先生亦自謂其弗已若也年二十五其年癸酉舉河南第一人明年舉進士髙等以王府姻不得侍宿衛乃與仲默君采結都亭社而海內才穎之士想望其風采乙亥出守沔陽會丙子丁丑兩歲大祲獨加意撫字民賴以無徙亡暇則開閣與諸生談藝遂令文體翕然丕變其所造士甚多若太史童士疇其最著者不肖時以童子獨受知焉辛巳擢二寧波其治亦如沔尤留意興學癸未擢山西按察司僉事顓督屯田凡積弊湔除殆盡後攝學政三晉人士駸駸向風一時中丞及御史觀風者交章薦之謂其德器學問于是士類有所觀法云未幾歸臥河山之陽慕延叔堅之為人乃闢景延堂朝則肆力六籍手自箋注夕則詠詩南軒百家衆氏投間而作請文者無虛日所著有嵩渚集祥符文獻志鄉賢傳汴京遺迹志勼異記醫史諸傳及李氏族譜居室記凡若干卷而河南通志多出其手先生才髙學博其治行赫異使究其用將相之業豈多讓古人哉乃獨持風裁不能與時俗低昻而忌先生者日衆故年三十餘而業己懸車杜門養重其詩歌逼唐文則自成一家傳之百世無疑也世有富貴而名磨滅者視先生何如哉先生娶孫氏繼娶嶽氏生子三人長莘叟鴻臚寺署丞娶田氏次巖叟早卒次磻叟光祿寺監事娶傅氏俱孫氏出孫男十六人長孺立次某某曽孫男八人某某先生生於𢎞治戊申卒於嘉靖丙寅享年七十有九以隆慶戊辰葬于蘇村督學李君從衆議祠於學葬二年其子磻叟以授光祿至京師會豫仲子文燭以某弟襄陽同知洛所為狀寄之漢上余作李先生墓碑陳生曰往余過大梁之墟登景延堂與李先生縱談向余東指曰此古夷門也非曩者魏公子枉車騎及嬴抱關處耶何其壯也相與抵掌賞之假令先生當其時必能喜士如公子雖藏于博徒賣漿者必從之遊然今海內士聞李先生名皆願為之執鞭其誼寧復在無忌下耶明文海卷四百三十四
