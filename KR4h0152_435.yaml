body:
  text: 明文海卷四百三十五餘姚黃宗羲編墓文七文苑翰林院修撰舒先生墓志銘陳沂正德丁丑春策天下士以先生為第一甲第一人賜進士及第授翰林院修撰沂與名榜內改庶吉士同先生讀書於中祕戊寅春諸權幸欲武皇南巡江彬實迫之廷臣數諫不納沂與同館者八人亦具疏未上詔下謂沮逆致疾弗廖未堪視朝沂曰未可也先生不從遂入諫復罪刺閣中於是編修崔桐庶吉士王應軫曹嘉王廷陳馬汝驥江暉並令於午門外跪日辰初出盡酉而退者五日人杖三十於廷公每呼髙廟之靈神色獨不喪出謫為福建市舶副提舉病危而復蘇逺近有相傳為野祭者先生之事與羅公倫實相似故人益重焉辛巳今上即位肆赦諸竄謫皆超起先生適奔父喪嘉靖癸未秋服闋復修撰甲申夏會議大禮沂與先生疏凡三上以伏闕皆得罪先生再杖于廷幾死明年乙酉太安人棄養于官邸即扶柩歸葬丁亥春三月十有四日先生以疾卒嗚呼痛哉是年冬十有一月沂待罪補江西左參議明年戊子秋九月二十有五日其子泰遷先生之柩於進賢之梓溪至章江是日巡撫都御史周公廣巡按御史儲公良材左布政司使顧公珀右布政使黃公芳右參議李公緋按察使胡公璉僉事王公瑋及郡縣皆往祭于江滸沂得臨而哭之越冬十月五日葬先生于新建之象山之陽銘于墓者沂何能辭先生諱芬字國棠舒姓世出浙之東陽宋建炎中曰選者來居信之懷玉山紹興中曰繼祖者遷隆興之北山元大德初曰文英者徙進賢之梓溪至曽祖溥震生祖庭式庭式生法先生之考也贈如先生官母聶封太安人先生為縣學生時嘗賦赤鴈郡守以魁天下期之初號石灘邑有石人灘諺傳灘合當有魁天下者乃改號梓溪後果及第豈偶然哉先生生於成化甲辰三月十有二日享年四十有四先生負氣剛毅所遇貴者常失勇者常喪雖覺峭厲世不可得而無焉文章氣逸宕不窮所著述賦詠若干卷皆觸事而發辭義凛凛實似其行娶齊氏同邑善族封安人子男三人泰奉奏女二人長適徐曰敬次適樊夔奉奏側室冉出銘曰維學作人百年其興維名登俊四國是憑學斁其倫道將焉明名隳其節義孰與行去道去義不可為國噫維先生以辨世惑朱性甫先生墓志銘文徴明吾蘇有博雅之士曰朱性甫存理朱堯民凱兩人皆不仕又不隨俗為廛井小人之事日惟挾册呻吟以樂好求昔人理言遺事而識之對客舉似如引繩貫珠纚纚弗能休素皆髙資悉費以資其好不恤也成化𢎞治間其名奕奕望於郡城之東人以其所居相接而業又甚似也稱之曰兩朱先生正德壬申堯民死明年性甫又死自兩人死吳中故實往往無所于考而求其遺書亦無所得惜哉初性甫嘗相約為傳不果及是葬而其于以狀來速銘狀固不若余能詳也性甫長洲人宋樂圃先生之後曽大父元英大父明父灝母周氏性甫生穎異少學於里師覺其所業非出于古人遂謝去從杜稷先生遊於時東南名士若吳興張淵若嘉禾周鼎仕而顯者若徐武功有貞祝參政灝劉參政昌劉僉憲珏並折節與交且推之為後來之秀既而諸老凋落吳文定公石田先生繼起而性甫復追逐其間最後則交楊儀制君謙都主客元敬余視性甫丈人行也性甫不余少而以為友視諸公為親蓋其自少至老未嘗一日忘學故亦未嘗一日忘取友以自助也居常無他過從惟聞人有竒書輒從以求以必得為志或手自繕録動盈筐篋羣經諸史下逮稗官小説山經地志無所不有亦無所不窺而悉資以為詩其詩精工雅潔務出新意得意處追躅古人所著野航集君謙實敘之尤精楷法手録前輩詩文積百餘家他所纂集有經子鈎玄吳郡獻徴録名物寓言鐵網珊瑚野航漫録鶴岑隨筆總數百卷既老不厭而精力不加又坐貧無以自資而其書旋亦散去每撫之歎息其意殊未巳也而豈意其遽死耶性甫性簡慢待人無鈎距晚歲嗜酒婆娑益事間曠或時乘醉忤人人亦不以為異尤為郡邑大夫所禮前守洛陽史公新會林公先後修郡志並以性甫從事歲時鄉飲必致為上賓時人榮焉性甫死時為正德癸酉七月二十五日享年七十是歲十一月甲子葬陳公鄉受字墟先塋娶監察御史張維書女生子女四人男延娶湯氏建娶尹氏女適金爟花汝舟孫七人男曽庚乾女適彭暐王普張源倪宥曽孫女二人銘曰維朱有聞自樂圃君德言孔碩為時令人五百斯年耳孫其秩有賢一人性甫維克其克伊何維文之揚維行之稱德懿其章嗟嗟性甫少也則勤經籍圖書窮終其身抉摘雕鎪既揚亦榷豈無利途弗易其樂其髮蒼蒼其視茫茫歸視其家其書滿牀樽酒婆娑百年維適彼榮亦崇孰得孰失陳公之鄉有玄者堂既藏既安後永有光王履吉墓志銘文徴明嗚呼悲哉王君巳矣不可作矣君文學藝能卓然名家而出其緒餘為明經試策宏博竒麗獨得肯綮御史按試輒褒然舉首一時聲稱籍甚隱為三吳之望三吳之士知君者咸以髙科屬之其真知者謂能肆情詞藝非直經生而巳然皆非君之極致也乃君之志真欲軼古人而逾之自非通古今周一世不足以充其所受也是可以一時一郡論哉君資性穎異將以勤誠於書無所不窺而尤詳於羣經手寫經書皆一再過為文非遷固不學詩必盛唐見諸論撰咸有法程余年視君二紀而長君自丱角即與余遊無時日不見見輒有所著日異而月不同蓋浩乎未見其止也而豈意其遽疾而死耶嗚呼惜哉君正德初與其兄履約並以俊造選𨽻學官嫓聲儷迹翹然競爽既而履約舉應天鄉試尋舉進士而君每試輒斥以年資貢禮部卒業太學又試又輒斥蓋自正德庚午至嘉靖辛卯凡八試試輒斥而名日益起從遊者日衆得其指授往往去取髙科登顯仕而君竟不售以死嗚呼豈不有命哉君髙朗明潔砥節而履方一切時勢聲利之事有所不屑猥俗之言未嘗出口風儀玉立舉止軒揭然其心每抑下雖聲稱震疊而醖藉自將對人未始言學蓋不欲以所能尚人故人亦樂親附之性惡喧囂不樂居廛井少學於蔡羽先生居洞庭三年既而讀書石湖之上二十年非歲時省侍不數數入城遇佳山水輒欣然忘去或時偃息於長林豐草間含醺賦詩倚席而歌邈然有千載之思迹其所為豈碌碌尋常之士哉是其志之所存必有出於言語文字之上者曽不得少見於世而僅僅以文傳而其所傳又出於文場困躓之餘雅非其志者嗚呼豈不重可惜哉君孝友天性常能愈恱其親而順之於道於兄履約少同筆硯食息起居未嘗少離既各授室而聨裀共食視室處之時恆倍也君卒時履約方官京師及是以都御史出鎮鄖陽便道過家以葬君某山之原俾某為銘君諱寵字履仁後更字履吉號雅宜山人父貞以履約貴封中憲大夫太常寺少卿母朱氏繼母顧氏贈封皆恭人君生𢎞治甲寅十一月八日卒嘉靖癸巳四月三十日享年四十娶徐氏子男一人子陽太學生娶唐氏解元伯虎女孫男一人銘曰維慧而明亦藝而貞胡不潰於成而卒困於衡吁嗟乎其名翰林蔡先生墓志文徴明嘉靖一十五年辛丑正月三日吳郡蔡先生卒吾吳文章之盛自昔為東南稱首成化𢎞治間吳文定王文恪繼起髙科傳掌帝制遂持海內文柄同時楊禮部君謙都太僕元敬祝京兆希哲仕不大顯而文章奕奕顒然在人要亦不可以一時一郡言也先生雖稍後出而所造日深自視甚髙常有所評隲雖唐宋名家猶有所擇其隱然自負之志殆不肯碌碌後人而潦倒場屋曽不得旴衡抗首一儕諸公間而以小官困頓死嗚呼豈不有命哉先生諱羽字九逵其先家陳留宋南渡時祕書郎源自大梁徙杭又自杭徙吳居太湖之包山先生其十四世孫也髙祖敬曽祖曾貞祖升以長子貴封奉政大夫父滂母吳氏先生髙朗疏俊聰警絶人少失父吳夫人親授之書輒能領解年十三操筆為文巳有竒氣稍長盡發家所藏書自諸經子史而下悉讀而通之然不事記誦不習訓故而融液通貫能自得師為文必先秦兩漢為法而自信甚篤發揚蹈厲意必已出見諸論著奧雅宏肆潤而不浮詩尤雋永早歲微尚纎縟既而濺滌靡曼一歸雅馴晚更沈著而時出竒麗見者謂雖長吉不過先生乃大悔恨曰吾苦辛作詩求出魏晉之上乃今為李賀耶吾愧死矣其髙自標表不肯屈抑如此然其所作陵轢頓迅誠亦髙敻莫及當其得意時不知古人何如也先生故邃於易出其緒餘為程文以應有司而辭義藻發每一篇出人爭傳以為式而先生試輒不售犀挫益鋭而卒無所成蓋自𢎞治壬子至嘉靖辛卯凡十有四試閲四十年而先生則既老矣歲甲午以太學生赴選調天官卿雅知其名曰此吾少日所聞蔡某今猶滯選調耶然限於資地亦不能有所振拔特以程試第二奏補南京翰林院孔目居三年致仕歸卒於家故資善大夫南京刑部尚書顧公墓志銘文徴明嘉靖二十四年乙已閏正月八日辛巳南京刑部尚書顧公以疾卒于金陵里第先是公考績還自京師道聞長子嶼卒驚惋得疾抵家疾甚久之竟不起嗚呼惜哉公諱璘字華玉别號東橋居士世為蘇之吳縣人國朝洪武中髙祖通匠作徴隸工部因占數為上元人曽祖海不仕祖誠以公貴贈資善大夫南京刑部尚書考紋號愚逸初封承德郎南京吏部主事加贈資善大夫南京刑部尚書祖母陸氏母楊氏俱贈夫人公以應天府學生領𢎞治乙卯鄉薦明年丙辰舉進士已未授廣平縣知縣壬戌徴入為南京吏部驗封司主事進稽勳郎中正德已酉升河南開封府知府癸酉謫授廣西全州知州丙子起知浙江台州府升浙江布政司左參議嘉靖改元册立中宫禮成奉表入賀道升山西按察使以親老辭不允尋以病免戊子起為江南按察使未行升浙江右布政使轉左布政使庚寅召為都察院右副都御史巡撫山西疏乞終養忤旨落都御史以布政使致仕丁酉再起為都察院右副都御史巡撫湖廣兼贊理軍務已亥升刑部右侍郎尋改吏部會顯陵肇工改工部左侍郎領山陵事進工部尚書事竣還朝改南京刑部尚書公於是歷仕三朝閲五十年歷十九任積階自文林郎歷十有一資為資善大夫正位上卿公融朗闊達精于吏理能激昻任事初蒞廣平年甫弱冠或易視之而公關決敏利摘伏若神拊循利道靖而不煩而飾以文學有古循良之風及為開封益更練堅決盜起燕薊流劫中原攻圍城邑所在繹騷兵部尚書彭公澤奉詔討捕領兵壓境上簡公自輔公亦悉心展錯練兵飭甲轉餉傳餐取具呼吸間而解難折衝謀畫居多在郡期年隨事經理多所緒正而強執不撓鎮守中官廖堂恃逆瑾黨援漁奪自恣公摧折捍蔽每折其萌芽不令得肆瑾誅廖罷去而錢寧用事羣閹方熾王宏者尤悖謾剽疾繼廖出鎮席權藉寵氣焰讋人一時有司或屈節自容公故不為禮有所徴需一不答歲時展謁長揖而巳用是即積忤宏宏方恃寧為援矯詔逮赴錦衣獄獄吏問狀公據禮執誼抗言條對一無所承寧無巳遣邏卒隂探郡中無所得乃文致他事以竟其獄獄成鐫三階徙全全即古零陵郡越在嶺嶠僻陬荒陋公不鄙夷其民而翊以文教道化更革誠心拊綏久之民用乂安而士興于學甫三年而有台州之命台為東南劇郡武衛錯居俗獷而多詐胥吏並緣其間縱橫叨詖更數政不治公至爬梳剔抉求得其弊端與利源所在次第興除之故事武衛諸城郡為修築經費浩穰率為主守者乾沒恆歲一築築輒壞公鈎考得所侵漁悉沒入為城費檄義士經理而程督之故他城易隳而台所隸三城特完郡瀕海有鹽策之利貧民業鹽自食苦督𣙜煩苛每迂道轉輸而邏卒乘是為姦利至相賊殺不可止公為弛禁俾得負販出郡下而薄其稅入民用便利而國課亦登故時軍餉不時給運軍往往稱貸以需而駔儈得肆侵牟公支放有期而勾稽維審軍皆給足而姦民無所牟利矣郡南瀕江卑下多水患地有中津橋且壞公復修之因築石隄而樓其上凡數十楹人初莫喻其旨己而夏潦水猝至居民得依樓以避所活以千計乃服公先見云既久於台悉浙中事宜繼起藩參遂得舉而行之雖不及久而宏規碩畫功緒為多及以左轄重臨益諳練宏達措意復周審展采錯事惟志所為而釐革積弊若賦發科適調補吏胥皆利蠧蟠結前政所不敢問者公排根絶蔓搜剔不少縱而畫一以守要束章程咸正而掾吏不得緣以為姦事緒雜襲文牒糾紛隨事剸裁司無留政御史按浙者往往斂手無所事事然積不能平乘其解任而躡尋過誤一時雖橫被口語而素履明潔堅實在人卒亦不能有所誣衊也起撫湘南益事振植湖湘遐曠提封數千里撫臣尊重受計坐理而巳公不躡故迹軺車首循遍歷州郡雖偏疆下鄙莫不躬蒞跋涉險阻蒙犯霜露不少厭却故事撫臣巡歷必以藩臬守臣自隨公悉謝遣輕車簡易傔從斂約供頓次舍身足周用民安堵不知為勞念荆湖沃衍而庸流惰弛地利有所未盡科輸煩擾期會促迫民日益貧公私交病故所至勸農振業平徭復稅而摘伏省微軌迹夷易民用安集而歲亦比登在鎮逾年多所建白首言地瘠民貧兵食不足而藩府賦祿無隄後繼為難又以湖湘控扼邊徼地大事繁御史按部歲更一代勢不能周欲乞添差御史分蒞湖南北以廣詢謀又言外屬臣僚多有宏才碩望足充任使者比歲限以藩府戚屬不得內徙此非祖宗舊制乞越例推選以收偉才所言凡數十事皆當時利病深切治理雖不盡施行而論者莫不韙其言云顯陵之作役大事繁經費不資公既長於料簡而程省弗懈調發有制視他所營率損費十五而功實倍規制宏偉翬飛赫奕而民不告病有司不以為煩其經理施置有足多者然此特出其緒餘耳而非公所用以為才也及是雖典邦刑而留司務簡亦不足以盡其用且在鄉里父老姻戚不能無望于公而公執志堅定不肯骩骳以徇茍罹于辜必以法繩之豪植強禦咸不得肆而怨言興矣言者因得假以為辭肆言醜詆而素所忌嫉之人從而醖釀之公雖內省不愧而不勝浸淫之辱竟鬱鬱以沒嗚呼公論不明是非失實使瑰竒卓越之才不復推究于明盛之世必有執其咎者君子固有俟於百世之下也然公亦奚憾哉公素長者不虞人詆欺而直諒自信不肯脂韋干譽出入中外垂五十年一時新進多非曹偶公既前輩自處論議之間陵轢奮迅侃侃自將每下視諸人多不能堪往往旁睨切齒而公不知也其得謗受禍殆亦以此乎平居事親孝愚逸公病疽公時巳五十餘與同臥起吮濯扶掖舉身親之肉血淋漓十指皆潰曽不肯自逸以委勞於人初公以親故一再解加官其後出入靡恆而二親之亡公適皆在告皆得受終焉殆有不偶然者與羣從兄弟尤極友愛從弟英玉繼公舉進士官按察副使仕歸而貧而介潔自將公雅知其志雖日與親接而不輒餽遺然而中心相孚不殊同胞也少學於李璞先生李死一子不立妻某不免飢寒公在官每分餘資給之既又為其子植産旋植旋廢而其子卒困以死乃迎某氏于家死為殮葬而給其孫如子終其身不衰友人胡欽死妻方食貧養姑公俾里中上其事請表於朝凡旌核探究文牒往來咸具于公而一切更費咸自公出至于里黨族屬婚喪緩急亦多倚成于公其於倫誼至篤也為文不事險刻而鑄詞發藻必古人為師見諸論著雄深爾雅足自名家詩又雋永矩矱唐人而劖芟陳爛時出竒峭樂府歌詞不失漢魏風格問學深博既有資池而才敏氣充足以發之自其少時已有名世之志既舉進士即自免歸大肆力於學時陳侍講魯南王太僕欽佩皆未仕家居皆名能文與相麗澤聲望奕然時稱金陵三俊及官南曹曹事甚簡益淬厲精進居六年而譽益有聞自是出入中外所雅遊若李崆洞獻吉若何大復仲默若朱升之徐昌榖皆海內名流一時詩名震疊不啻李杜復出而公頡頏其間不知其孰為髙下也然諸公皆仕不顯又皆盛年物故公仕最久官亦最顯所歷若沅湘若天台鴈宕若衡嶽皆山水勝處雖簿書鞅掌而不忘觚翰所至領客宴遊感時懷古臨觀賦詩風流文雅照映林壑委蛇張弛有古髙賢特達之風及是時解留務往來吳門尋鄉里舊遊期余盡遊諸山以畢其平生而事左心違竟成乖越嗚呼而今巳矣尚忍言哉公所著書曰國寶新編曰近言曰顧氏七記詩曰浮湘稿曰山中集曰息園集曰憑几集曰登衡小記總若干卷距生成化丙寅七月二日享年七十娶沈氏封夫人子男三人嶼歲貢生娶羅氏峙娶陳氏又次峻女子二人適俞璉趙念孫男八人履祥廕為國子生次賓祥元祥耆祥應祥楚祥餘幼孫女二人曽孫男三人履祥等以卒之明年某月葬上元彭城山之原前事奉公門生太常少卿許穀所為狀來乞銘銘曰於穆孝皇立國用明孰言翊之允維邦楨烈烈顧公維邦之彥爰外而中式揚用踐起家民牧弗奪弗違薄言飲之既去而思豈德則周亦堅厥志志植靡移乃言有濟扶微興壞樹之風聲載蹶載奮卒階以升維靖而共乃剛弗折式遄其歸峻躋華列出將使指入典邦刑以翼以貞以莫不經維爰飾用文富兹述乃古有訓仕優而學其學如何亶言華國敷彰帝猷歌詠明德在孝皇日羣猷英英發藻攄詞式章用明翶翔後先公實曹偶德音洋洋經學之懋烈烈顧公既瓌既竒學為文宗政為吏師維學維政鮮兹兼得賢名之髙斯毁之積烈烈顧公連蹇在是豈不顯融迄屯厥施彭城之原公兆於斯尚後有考視此刻詞浙江按察使僉事皇甫君墓志銘文徴明僉事皇甫君子安既解浙臬還長洲未及赴調而母夫人卒摧毁得疾甫三月亦卒嗚呼傷哉君舉壬辰進士官禮部以文學為當道所知會東宫肇建遂用為春坊司直論者以為得人而餘人意忌固巳媒孽其間未幾補外自是浮沈外僚者纍年再起再僨卒骯髒以沒嗚呼自古文學之士往往不得志于時其侈聲擅名固造物者所忌然而一時秉銓之人不得不受其咎也君諱涍字子安裔出宋戴公以字為氏世望安定趙宋時有為提刑者扈髙宗南渡居吳城孔聖里占數為長洲人六世祖斌死張士誠之難一再傳乃君之曽大父也大父信以文學起家為太學生未仕而卒父諱録丙辰進士仕終順慶知府母夫人黃氏生君兄弟四人君其仲也黃夫人夢人授寶鼎而生韶秀異常能言即解誦書專對敏給如成人稍長績學綴文遂有名世之志及選入郡學為諸生益事博綜兄弟自相師友揚榷探究務求抵極攄詞發藻回出流輩未數年相繼舉于鄉而君與二弟遂收科甲一時名文學之盛三吳之士鮮其侣者而君不以自異益思振植操廉服勤􅍀然自守不與時流徴逐人亦莫敢與狎初授工部虞衡司主事尋改禮部精膳司再改儀制進員外郎升主客司郎中主客職蕃人朝貢凡餼館勞徠與凡貢篚之屬往來之儀皆主客領之故時曹司怠緩稽留使人經歲傳食供億浩穰君奏報以時不踰旬浹靡密上下斟度維宜視曩時損費什伍朵顔內屬歲有賞賚發自內帑故多穢濫君以其捍邊有功非他濫恩比言于主者俾精擇以給被賜者莫不歡感以去車駕南巡諸蕃留京師者慮有窺伺悉屏之徼外時稱其逺識君自虞衡至主客凡歷四署所在職辦而能緣飾以文在儀制時建儲九疏咸君屬草詞理明辨有以上當君心遂為諸公大臣所簡注春坊之擢蓋緣於此車駕之行君先巳注籍扈從會改官不果行駕次承天按籍推賞而君不在有司秉簡劾君失事而實非也坐是左遷廣平府通判踰年召為南京刑部主事進員外郎尋升浙江按察使僉事分蒞浙東所蒞天台寧紹緒郡民忮而狡叨詖喜訐最為繁劇君所至懲飭綜核周審擲伏若神而裁決敏利案無留牘恤隱崇賢納之仁軌甫三月而宿蠧為清管內振肅以其暇逸覽觀山川發為篇詠委蛇張弛文治燦然譽聞亦達而南遷考核惟視一時實履以為黜陟近時乃有既徙官而徴其舊事者因得以其私意中傷之然非顯惡大懲亦不敢公肆詆毁公初曹未及上再任亦無幾時竟以勝任推擢曽未數月而以不職論黜嗚呼羣耳目何可塗也君沈靜寡與自負髙峻人茍不當其意終日相對默無一語居官任事砥礪操切不肯脂韋取容既多忤物又稍稍與時崖異故愛之者雖深而卒不能勝夫疾之者之衆也雅性間靜慕玄晏先生所為自號少玄子作續髙士傳以著志居常問學之外他無所事羣經子史莫不貫綜而酷喜左氏著春秋書法紀原選唐文粹為文粹為文必古人為師自西漢而下咸有所擇見諸論撰居然合作詩尤沈蔚偉麗早歲規倣初唐旋入魏晉益玄造鑄詞命意直欲窺曹劉之奧而及之惜乎未見其止也歿後其兄子俊集所作為皇甫少玄集云君生𢎞治丁巳六月某日卒嘉靖丙午三月九日享年五十配劉氏後君一月卒子男二人長泰郡學生娶王氏次拒聘金氏女三人長適國子生王大猷次適太倉州學生陸鳴陽又次適郡學生吳尚儉孫女二人卒之歲十二月十有三日葬虎丘新阡於是子俊手具事狀率其二子詣豫乞銘豫何足以銘君哉辭不獲為序次如此係之銘曰嗟皇甫君維時才彥天實生之亦既有衍爰賓于王式揚用昭胡豐其受而厄其遭秩秩郎曹五禮云職身德允文乃言有克維文之克維德之載實德升聞有簡斯在青宫蘭省命官孰宜譽者在前毁者隨之誰毁誰譽君則有命命也自人弗隕厥聞嗟皇甫君靖共維秉豈無遺榮降年弗永弗永其世式宣其言後有子雲尚鑒我玄錢孔周墓志銘文徴明吾友錢君孔周以髙明卓絶之才負陵轢奮迅之氣感憤激昻以豪俊自命雅性豁達不任檢押所與遊皆一時髙朗亢爽之士而唐君伯虎徐君昌穀其最善者視余拘檢齷齪若所不屑而意獨親時余三人與君皆在庠序故會晤為數時日不見輒奔走相覓見輒文酒宴笑評隲古今或書所為文相討質以為樂既而唐徐起髙科入仕尋皆病亡而湯君子重王君履約履吉雖稍後出而遊好為密君喜學而好結納自少至老未嘗一日忘學亦未嘗一日忘取友以自益也其所友必皆勝已者茍不當其意雖富貴有勢力者輒白眼視之或取怪怒不恤也家本溫厚室廬靚深嘉木秀野足以遊適肆陳圖籍時時招集竒勝滿座中酒壺列前棋局旁臨握槊呼盧憑陵翔擲含醺賦詩負軒而歌邈然髙寄不知古人何如也嗚呼而今巳矣交遊中有如斯人不可復得矣性喜蓄書每併金懸購故所積甚富諸經子史之外山經地志稗官小説無所不有而亦無所不窺尤喜左氏及司馬班揚之書讀之殆遍遇有所得隨手劄記積數巨帙至所不喜雖世指以為切要而君未始一注目也為文竒崛深奧讀之棘口不能句然思清語麗足自成家而尺牘之妙尤其所長一行數字矢口信筆文意燦然如出硎鍊他人沈思極意不能至也早歲思以功名自奮稍斂鋒鍔以就文場矩矱亦惟涉獵訓故涵泳道腴而巳於世所謂括帖關鍵皆不之省人咸非笑之而提學莆田陳公獨識之常按試第君髙等咸以為疑公曰吾見其文有古意知非經生常士也余親聞陳公語喜公能得君而又喜君之為陳公所得也自陳公去他主司惟取淺近合格者而君不復振矣君自𢎞治辛酉至正德丙子凡六試應天試輒不售而年日益老遂自免歸嗚呼惜哉君長身玉立被服鮮華而舉止軒揭人望而異之謂必有所就而竒窮骯髒迄于不偶嗚呼惜哉晚歲困於征徭家日益落而又得末疾行履跛曳每負杖而嬉而髙懷雅致不殊前時文酒過從宴談謔浪逶迤容與使人意消嗚呼君真雄俊不羈之士哉君諱同愛字孔周别號野亭錢氏其先江都人有諱仲陽者以醫顯于宋事見國史五世祖益仕元為常州府醫學教諭避亂來吳遂占數為長洲人益生太醫院醫士原善原善生晉府良醫宗道宗道生太醫院醫士良玉良玉生伯寬伯寬生汝式自汝式以上世以醫顯汝式娶陳氏生君之兄弟二長同仁太醫院御醫次即君娶張氏子男二人鶴徴太醫院醫士娶吳氏竹徴薊州吏目出後同仁娶宋氏繼娶湯氏女二人適余長子縣學生彭次適陳遇側室生子男二人復貞娶某氏女一人適劉某孫男三人女二人君生成化乙未某月日卒嘉靖已酉某月日享年七十有五庚戌十二月某日葬吳縣寶華山銘曰維氣則揚亦藝而章維命不臧而志弗昌卷而藏而卒困以亡吁其傷廣西提學僉事袁君墓志銘文徴明吾友袁君永之以髙明卓越之才精深宏博之學而輔以陵轢奮迅之氣自其少時巳不肯碌碌後人既起髙科登膴仕視天下事無不可為而砥節履方不肯附麗匪人首忤權臣幾蹈不測賴天子仁聖得不擯棄浮沈中外垂二十年再起再廢迄骯髒以死嗚呼惜哉其命也夫君諱􅐆字永之别號胥臺山人世吳人髙祖以寧曽祖琮祖敬先考封承德郎刑部主事諱冪母安人葛氏袁氏自髙曽而下世以氣義長雄其鄉而未有顯者至君昆弟數人藻發競秀突起閭閻聲生勢長隱然為文獻之族君於羣從中最少而竒穎異常五齡知書七歲賦詩有竒語十五試應天再試再不利憤曰吾所志何如顧為場屋所困耶益淬厲精進刺經質義務究底極嘉靖乙酉遂以第一人薦試禮部亦在髙等一時聲名傾動京邑入對大廷摛衍揚繹上下數千言出入經史詞旨宏達時權臣方為學士得君卷竒之執欲冠多士在廷諸臣惡其攬權故抑置二甲第一人及啓封見君名乃悔不用其言而權臣則喜于得君他日詣君敘致本末自謂君知已而君不對亦不謝權臣大懟銜之然無以發也未幾入內閣用事而君方為翰林庶吉士因上言諸庶吉士跅􅕟靡薄不宜在禁近悉罷為庶僚怒猶未巳乃起兵部火災之獄將甘心焉時君為武選主事火時當徼巡在法為失警乃掠立文致劾君縱火為姦利必欲殺之鍛鍊數月無所得編戍湖之衛會赦免歸權臣死稍起為南京武選主事歷職方員外郎晉擢廣西提學僉事致仕歸卒年僅四十有六始君自翰林出為刑部主事即思明法以達于政謹推讞審法比所當必允為尚書胡端毅公所知簡涖本科本科者凡諸司獄詞及上請章疏皆從審畫君析律詳明剸裁敏利而將以勤誠案無留牘時稱職辦有詔以京朝官考各省鄉試君被命主試河南校閲精審去取攸當時稱得士尋奉使決獄淮揚還朝改司武選武選有銓選有勳祿有貼黃及諸委瑣故號劇司而貼黃尤多弊事君督併嚴密關決明審吏不得並緣為姦展采錯事方將有為會獄事起而君去國矣在南部適當考選軍政尚書熊公特委重君君杜請託察賢否勵精從事考核緒正一于至公人服其明莫復異議廣西在嶺徼之外夷獠雜處文教久弛君不鄙夷其人教詔諄切而率之以身示之矩矱程以科條取士貴淳雅而黜浮誕恆矜其不逮薄懲而廣録以誘進百粵之士士方安其化而君倦遊矣君樂間曠而居吳興日與髙人逸士探竒選勝登陟遊衍悠然自適及歸築室橫塘之上據湖山之勝縱浪其間有終身之志雖暫起守官而寤寐林壑未始少忘篤志問學羣經子史無所不窺為文必先秦兩漢為法樂府師漢魏賦宗屈賈古律詩出入唐宋見諸論撰莫不合作所著文集二十卷皇明獻實二十卷吳中先賢傳十卷世緯及歲時記及周禮直解總若干卷始君雅志用世及事與心違時移身逺乃肆意於此以泄其所藴耳觀世緯所著皆鑿鑿乎經世之論其官宗遴傳與夫詎偽諸篇實維時弊惜不能少見于事而徒託之空言可慨也已君闊達髙朗議論英發能以辨博勝人人莫能屈然實無他腸志同道合即傾倒無間故知君者莫不賢愛之而不勝嫉之者之衆也君生𢎞治壬戌十月二十六日卒嘉靖丁未六月二十三日配馬氏封安人繼文氏子男一人尊尼癸卯貢士女三人適生員王子恭殷邦柱徐欽葬以卒之某年某月日墓在某山銘曰侃侃袁君維時之碩履道含宏抱真翼德爰起髙科式揚用聲載緝用明奕其邦楨維邦之楨弗為道屈矧兹匪人胡彼之恤豈無榮途有命在天寧玉之毁維瓦斯全陷則有穽守則為正孰其生之天王明聖侃侃袁君守身用恆弗利攸征身否道亨亨之如何有言則立言立名存有永無泐沈先生行狀文徴明先生諱周字啓南姓沈氏别號石田人稱石田先生世居長洲之相城里自孟淵先生以碩儒肇家生二子曰貞吉曰恆吉才美雅飭並有聲稱恆吉號同齋生三子先生嫡長也生而娟秀玉立聰朗絶人少學于陳孟賢先生孟賢故檢討副初先生子也諸陳皆以文學自標致不輕許可人而先生所作輒出其上孟賢遂遜去年十五代其父為賦長聽宣南京時地官侍郎崔公雅尚文學先生為百韻詩上之崔得詩驚異疑非已出面試鳳凰臺歌先生援筆立就詞采爛發崔乃大加激賞曰王子安才也即日檄下有司蠲其役先生既長益務學自羣經而下若諸史子集若莊老若稗官小説莫不貫總淹浹其所得悉以資於詩其詩初學唐人雅意白傅既而師眉山為長句巳而乂為放翁近律所擬莫不合作狀其緣情隨事因物賦形開闔變化縱橫百出初不拘拘乎一體之長稍輟其餘以遊繪事亦皆妙詣追蹤古人所至賓客牆進先生對客揮灑不休所作多自題其上頃刻數百言莫不妙麗可誦下至輿皂賤夫有求輒應長縑短素流布充斥內自京師逺而閩浙川廣莫不知有沈周先生也先是景泰間郡守汪公滸欲以賢良舉之以書敦遣先生筮易得遁之九五曰嘉遁貞吉喜曰吾其遁哉卒辭不應然一時監司以下皆接以殊禮尤為太保三原王公所知公按吳必求與語語連日夜不休一日論諫先生曰對章服諫非鄙野人所知然竊聞之禮上諷諫而下直諫豈非貴沃君心而忌觸諱耶公遽曰當今之時將為直諫乎抑亦諷乎先生曰今主聖臣賢如明公又遭時倚賴諷諫直諫蓋無施不可公徐出一章示之曰此吾所以事君者試閲之先生讀畢曰指示切而不泛演言婉而不激於諷諫直諫兩得其義矣公以為知言同時文學之士為上官所禮者往往陳説時弊先生不然曰彼以南面臨我我北面事之安能盡其情哉君子思不出其位吾盡吾事而己然先生每聞時政得失輒憂喜形於色人以是知先生非終於忘世者先生去所居里餘為别業曰友竹居耕讀其間佳時勝日必具酒肴合近局從容談笑出所蓄古圖書器物相與撫玩品題以為樂晚歲名益盛客至亦益多户屨常滿先生既老而聰明不衰酬對終日不少厭怠風流文物照映一時百年來東南文物之盛蓋莫有過之者先生為人修謹謙下雖內藴精明而不少外暴與人處曽無乖忤而中實介辨不可犯然喜奬掖後進寸才片善茍有以當其意必為延譽于人不藏也尤不忍人疾苦緩急有求無不應者里黨戚屬咸仰成焉平居事其父同齋無所不至同齋髙朗喜客飲酒必醉先生不能飲每為強醉以樂客同齋殁乃絶母張夫人年幾百齡卒時先生年八十矣猶孺慕不巳弟召病瘵不內處先生與俱臥起者歲餘及卒撫其孤如子庶弟幽墀未練事為植産使均於己一妹早寡養之終其身其天性孝友如此先生娶于陳生子雲鴻文學稱家嘗為崑山縣隂陽訓術側出子復郡學生女三長適崑山縣學生許貞次適徐衮又次適太學生吳江史永齡孫男一人履女二人曽孫男一人女二人先生所著詩文曰石田稿總若干卷他雜著曰石田文抄石田詠史補忘録客坐新聞續千金方總若干卷正德四年己已先生年八十有三八月二日以病卒于正寢於是雲鴻先卒數年矣復乃相其孫履治喪以七年壬申十二月二十日葬先生于所居之東某鄉某原屬將求銘當世有道以信于後俾某有述某辱再世之遊耳受目矚知先生為詳遂不克讓用論次如左謹狀明文海卷四百三十五
