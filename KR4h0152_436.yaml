body:
  text: 明文海卷四百三十六餘姚黃宗羲編墓文八文苑祝先生墓志銘陸粲先生諱允明字希哲蘇之長洲人也其先出古太祝以官氏或曰黃帝之後封於祝以國氏云七世祖碧山勝國時由松江來守郡後卒官一子留於蘇遂為蘇人祖皓正統已未進士終山西布政司右參政父瓛母徐氏大學士武功公女先生少穎敏五嵗作徑尺字讀書一目數行下九嵗能詩有竒語既天賦殊特加內外二祖咸當代魁儒耳濡目染不離典訓稍長遂貫綜羣籍稗官雜家幽遐嵬瑣之言皆入記覽發為文章崇深巨麗橫從開闔茹涵古今無所不有或當廣坐詼笑雜遝援毫疾書思若泉湧一時名聲大譟嵗壬子舉於鄉故相王文恪公主試事手其卷不置曰必祝某也既而果得先生文恪益自喜曰吾不謬知人自是連試禮部不第當道奇其才會修史將名薦之弗果初仕興寧令地介嶺海民尚譁訐惑於禨祥先生示之禮簡進秀異授以經學親為講解遂一變其俗羣盜竄處山谷時出焚敓為設方略一旦捕得三十餘輩邑以無警稍遷通判應天府亡何乞歸又五年卒春秋六十有七夫人李氏鄉先生太僕少卿應禎之女子男二長續進士入翰林纍遷陜西按察副使次側出幼未名女嫁潮州府經厯王穀禎先生簡易髙曠不樂拘檢在衆若無能者然默而好深湛之思時獨居著書解衣盤礴遊心玄間賓客來者叩戶呼之若弗聞也性善書出入魏晉諸家晚益奇縱或購得之輒藏去為榮喜奬掖後進終身不言人過其為家未嘗問有餘得俸祿及四方餉遺輒召所善客與噱飲歌呼費盡乃已或分與持去不遺一錢故其歿也幾無以殮云先生少有意用世既濩落不試一發於文雖聲實閎振猶非其志也所著書合詩文集為數百卷藏乎家陸粲曰斯文之用與天地準由漢氏來纘言之士臻於斯極者亦僅可數己明興百年士猶膠守章句未覩其恢然者也乃憲考之際始彬彬矣祝先生由諸生起覃精發藻橫逸踔厲超追古昔盛哉若其湛浮自得龍變不羈大觀逍遙廓然離俗矣夏侯湛贊東方生云明濟開豁包含𢎞大拔乎其萃遊方之外者殆先生哉先生歿以嘉靖丙戌冬十有二月二十七日又明年戊子冬閏十月十六日葬橫山丹霞塢太原王寵撰其事行粲為之銘銘曰惟聖有文自天啓之其卒敝刓孰振起之猗嗟先生發天之明達聖之經播為噌吰舉世震驚維時弗逢食貧以終獨昌其辭以爥羣蒙橫山之原崇四尺者先生之墳後勿壞傷視此名文天池山人陸子玄墓志銘陸粲天池山人陸子玄者吾弟也名灼更名采世吳人吳之西境有山曰天池蓋道書所稱可以度世者也君意慕之因自謂山人云君生踔厲英發始為校官弟子不屑守章句縱學無所不觀從其婦翁故太僕少卿都公遊鋭意為古文辭尋以例升太學益務精進視當世顯人名能文章者輒往蹐門自通贄以所業皆一見賞愛其名遂隱然以起自江以東學士多延頸願交者而君意獨自許用世謂功業可立取時時於廣座中奮然抵掌論天下事語多觸時禁客不樂聞稍稍引去或目笑之君色自如不為止在太學二十年纍舉輒躓遭世玩侮中不能無少望日夜與所善客劇飲歌呼為樂間出遊或經月忘返槖中裝無一錢從者以告若弗聞也東登泰岱賦遊仙三章慨然有輕舉之志南踰閩嶠徘徊武夷諸山語人曰世無知我者吾聞京師天下豪傑輻輳又燕趙多慷慨士吾且往觀焉儻庶幾乎行半道病還及家意頗惘惘夜中數起東西行謂余曰日者言吾嵗行在酉當厄今吾形神不相攝矣吾殆將死也因屛人屬余後事其言悽愴不忍聞兄弟相對欷歔泣數行下居亡何竟不起傷哉是歲嘉靖丁酉九月二十二日也年四十一後八年乙已十二月十三日乃葬其地實天池之麓亦若其冥契云陸於吳為著姓宋季始家陳湖之上吾先君諱應賔母夫人胡氏有三子君最少先取都公女繼取鄒氏子男二長舒枝都出府學生次敬枝側出女一鄒出適太學生陳沛孫男二嘉禾嘉栗君性倜儻不羈與人遊處輸寫心腹無所隱匿每揚榷今古品藻人物機辨鋒出莫能窮者而強執自信不肯屈折徇俗雖故所親善一弗當意則面斥之或致怨懟不恤也於文喜稱六代詩初規摹盛唐晚宗謝康樂造語往往似之居間弄筆遊戲為近體樂府若調笑率然之作亦醖藉可喜獨好聞國朝故實所至延訪勤切率多聞人所未聞者他如幽冥物怪黃冶變化之言靡不采獲著之編録黠者或謾言以中其意君亦傾聽勿疑聞有奇人異書不逺數十百里走求之其篤好如此余與君少俱侍吾伯兄子徵學議論下上自相師友而嗜好略同方賴焉以相規切庶有益乎而君棄余死矣銘曰吳有奇士陸氏子玄生不逢時又弗永年嗚呼悲夫大石山人夀藏銘瞿景淳大石山人者姓顧氏諱元慶蘇之長洲人也顧在吳為著姓入國初有諱仲賢者任淮陽倅三傳至山人曽祖以禮以禮生瓊瓊生巖巖取吳氏繼劉氏生子七人山人其仲也始山人祖父性孝友稱為長者有丈夫子八人多以髙資雄里中山人父倜儻頗疏於治生然好賔客集方伎有俠士風山人兄弟多纎嗇殖産山人獨以圗書自娛意有所適雖叢説不棄所纂述自養生家以及諸史燦然雜陳以故竒偉博習之士尤多好之久與之遊山人稱説古今亹亹不窮間遊戲翰墨瀟灑夷曠得作者遺意故山人雖窮居而隱然名重士林搢紳先生多折節與交山人故居埭川後徙通安里有山巋然光照庭户山人玩而樂之時與同志嘯咏其間因規大石塢為壽藏表以貞松曰人生行樂耳即有不諱吾將葬焉因自號為大石山人且以生志屬余云余少習知山人文雅甚都竊怪其與衆異趨疑其有阮嗣宗之放達也邇嵗山人執父喪余往弔之山人貌甚毁瘠杖乃僅起心益重之既余登山四望窮勾吳之墟慨然歎曰嗟乎此泰伯之所以從遁也夫古人意有不存即視天下猶敝屣况下焉者乎既而徘徊夷猶南望震澤東望胥口傷子胥之不終至為流涕思欲起范蠡而挹其緒風乃知山人之意逺矣今山人不以後事為諱而屬余以志銘蓋將齊生死等彭殤超然與元化共遊窮逹之際又惡足為山人言哉山人配王氏誥封詹事府翰林院侍讀學士王公朝用之女子男四人曰誥曰諌曰議曰謖各事耕讀不愧山人云銘曰雲觸石兮山冥冥龍翕忽兮雨下零忽雲收兮雨止獨山石兮青熒豈動者不處兮而靜者永寧吟山風兮玩山月固將永托乎山靈南京國子監祭酒槐野王公行狀瞿景淳嗚呼槐野王公之卒三年矣淳每念疇昔瞻望西嶽輒欷歔不能止思欲一拜几前無從也今年丁已春公母太孺人將圖葬公乃馳一介走京師乞銘於當世名公且屬某編次行事顧某誠固陋不足以知公然公從弟維新所述甚核而文參諸吏部司勳南君所覩記宜得其大都謹拜述如太孺人教公姓王氏諱維禎字允寧别號槐野陜西華州人也其先昌平州人始祖諱伯牙者由進士任河南憲副左遷華州稅課局大使因家焉伯牙生處士得得生真定縣令徽處士和和生子六人處士原其行五也原生子二人長曰載號文菴次曰軒號質菴文菴公配劉氏以正德丁卯十一月二日生公王氏之家華州者至公凡六世矣世以文行相後先故遂為關中望族云公生而風骨峻岐文菴公督令就學甫十嵗即善舉子業復多博習古文辭為文疏宕爽朗經師異之曰大王門者必此子也文菴公亦喜甚甫弱冠督學漁石唐公鳳泉王公咸以國士期之嵗辛卯舉於鄉越乙未舉進士選授翰林院庶吉士讀書中祕三閲年乃授檢討自同館咸推讓公才後文菴以公貴蒙恩贈徵仕郎翰林院檢討母劉氏封為太孺人云公傷文菴公早世祿養不逮太孺人復以久客京邸思歸丁酉冬充册使副便道奉太孺人西歸而祭文菴公墓焚黃寫哀太孺人有女許字東生夔夔故仕族家稍削公特厚其資嫁之仍嵗時餽遺不絶以順適母意又明年已亥公留內子東孺人侍太孺人家居單車復命再閲時會東孺人卒公感泣且念母獨居無侍故肺疾寖劇具疏以請得賜歸侍養越辛丑復奉太孺人如京師甲辰會試為同考官取士號多得人乙已冬太孺人念其女忽忽不樂時公與纂修會典重違母意復疏請得奉太孺人歸以丁未春還史館繹舊業逮巳酉以九載考績乃晉秩為修撰方公以盛年登朝而積勞取貴可嵗月計然公欲娛太孺人每遲回家居公誠賢者知所重固不以彼易此也庚戌會試復為同考官公發䇿詢士略曰今大同邊垣既以底績而薊州一路顧有遺謀自今作之西接宣府東抵山海為邊千二百里使幹濟之臣戮力經營患可少止是年秋敵果自薊州入天子採羣臣議特設總督大臣一人使專備遼薊其議蓋自公發之冬十月會試武舉公為主考官仰天祝曰是安得徇國之人而收之以裨國用臨卷品士必先謀識所進武辨亦多得人公燕居好觀古今名臣經略凡關隘厄塞備禦疏密之詳皆能厯厯指陳不俟按圗其用世意氣立談可知也辛亥冬詔晉秩為右春坊右諭德署南京翰林院事公念南京王業根本控江海上遊宜早戒不虞每搢紳過從輒訊兵馬錢榖之事人或以為迂無何會倭奴寇下江諸郡始服公先識時洛陽孫公以工部尚書攝兵部事公馳就議事即日協同內外守備振揚兵威固守要害冦知有備遂遁去公謀居多甲寅夏有詔召還宮坊時太孺人留關中便道歸省且疏請終養天子不可吏部移文促公還任惶懼就道既入見復申前疏留中不報乙卯秋命主順天府鄉試士類欣欣多自幸入公彀中公凡四入試場每録出士爭傳觀謂真班馬之匹云時公方嚮用會太孺人遘末疾公聞報驚仆失聲悲號寢食俱廢復披瀝請終養久之乃晉秩為南京國子監祭酒謝恩畢即日陛辭倍道西馳不數日過西嶽為文虔禱請以身代母太孺人聞公至病亦少愈是年冬關中地大震山摧川溢城郭廬舍多傾毁民人壓死者過半而公亦不免實嘉靖乙卯冬十二月十三日悲夫悲夫傳稱天道無親惟與善人若公之念母好爵不靡非所謂善人耶而卒罹此曩所稱天道信耶否耶豈天地閉塞賢哲將隱公固不能獨違也公性孝友始為諸生時喪文菴公哀毁骨立比既貴每在告事仲父質菴恭順唯諾如事文菴公與從兄弟維祺維新維厚羣居怡怡友恭藹然人不知為從兄弟也從姪吉兆少孤貧公異其質資給就學撫而教之甚備今為郡學生念族蕃有貧不能喪葬者割地立塋俾以昭穆次第即葬其中嵗飢則出粟以贍族有婚喪亦如之故族人多德公云公素剛直少不當意即時貴必面斥其過人或不堪然與人交不渝終始誠意懇至迥出俗輩里中孫通判某居官清苦夫婦歿垂三十年其子不能葬公為買地葬之其與人之周多類此故雖素不恱公者亦服公髙義公雅意經世然優遊館閣積二十餘年訖不當任故不及以功業自見時托之著述今有稿三十餘卷逹人君子取而玩焉亦可以識其微意之存也公先配東氏兵部車駕司郎中東君魯之女生男二曰逢春長春俱不育繼配安陽丞郭君從禮之女生女二長許舉人東君棐子某歿於室次許今吏部稽勳司主事南君軒季子學嗣側室宋氏生男一曰京闈復聘東君棐女尋舊好也太孺人卜以某年月日葬公少華山麓祖塋之次於戲公為關中偉人咸期以公輔然厯官僅四轉享年僅四十有九何去之忽也然公文章節概傳千百年猶當赫赫在人則公雖死猶生矣淳本海濵鄙生甲辰之春荷公首薦入史館從公後每辱訓迪愧淺中弱植不克副今公己矣豈名山之頽哲人之萎數固相符如古所歎乎敢忘固陋取公遺事論次如右惟大人先生擇而賜之銘公雖不幸亦可瞑目矣夫中憲大夫翰林院提督四譯館太常寺少卿李公墓志銘殷士儋嘉靖初文治恬熙羣良彚進於時仕於中朝者有八才子稱中麓李公其一也公以隆慶二年二月望日卒於家嗣子幼弱里中無賴稍稍齮齕之而一二有司復持之急以故不克襄事者數年至是始議以壬申某月日葬公緑原村祖塋前期嗣子持狀來請銘余曰公吾邦之良也矧頗悉其行事銘惡可辭按狀公名開先字伯華中麓其别號也先本伯陽之裔居隴西者最著其後始自隴西徙長城嶺又自長城嶺徙緑原村於是遂為章邱人數傳有名子瞻者公曽大父也子瞻生聰皆邑諸生聰生淳正德庚午舉於鄉取於王而生公以公貴纍贈奉直大夫吏部驗封貟外郎王纍封太宜人公以毛詩舉嘉靖戊子山東鄉試第二人明年成進士授户部雲南司主事久之調吏部考功厯稽勳驗封貟外郎郎中己又改司文選尋擢太常寺少卿提督四譯館居無何罷歸蓋家居者二十年而卒公生而卓犖穎異七嵗善屬文讀書一見輒成誦而又即知聲律吟咏之學稍長補博士弟子貟里中有繇役苦公公自言於令令面試大竒之為復其家於是齊魯章縫之士咸嘖嘖推轂李生矣未幾贈公捐館舍公哀毁盡禮巳又喪其祖母某公持服如贈公鄉人稱之服除遂連舉進士嘗運餉金詣寧夏當是時關中有兩太史康公海王公九思家在武功鄠杜之間公業聞兩公名及使還過訪之此兩公者俱以才自雄睥睨一世乃見公獨歡然相得為留數日始别復移書唐太宰薦之抵家以疾在告者踰年始授户部主事户部為金榖劇曹而公所督太倉栗時尚有中貴人監之公不競不絿委曲調停無撓法焉復奉命出理徐州倉頃之以望調吏部為太宰汪公鋐所器重故任吏部者率矜崖岸髙自標致扄門謝賔客雖親故人不相接以示尊倨公顧數與諸交遊以詩文相賡和暇則浮白對奕談笑竟日而無廢事卒之人莫敢干以私而稱吏部能謝絶請謁亦卒無踰公者公既負才氣居銓衡要路素抗直不善事權貴人而諸僥幸見抑者又日媒蘖之時柄臣銜公不附己遣邏卒廉公隂事久之無所得終不釋公至是蓋己遷太常矣會九廟災公例上疏自陳竟中以他事令公歸歸時年才四十耳居六嵗而配張宜人又卒六嵗而太宜人卒公哀毁彌甚每哭輒撫棺號曰天乎乃不令母見開先舉子耶蓋遲遲者越八年始葬焉公故嘗病脾間歲作不至劇丁卯秋乃大作踰年竟不起距生於𢎞治壬戌八月二十八日凡六十有八嵗配張氏即先公卒者繼王氏齊東人咸有懿行可稱述嗣子名春塢娶康氏太守迪吉女公少博學強記有大志所與交皆當世知名士以意氣相許遇事籌畫剖析多出人意表往先皇帝幸承天嘗命少傅翟公巡九邊云翟公議自遼東始業己行矣公獨請間謂曰公國家重臣也主上所倚任京師密邇當路塞藩籬單弱敵飈迅可至今車駕在江漢公奈何復去京師令緩急不相及乎公往宜自宣大此聲實相副萬全之畫也翟公瞿然悔失計拊手謝曰老悖不任事微君幸教幾失之卒改行如公䇿公之慷慨知大計皆此類也於戲以彼其才假令秉管鑰之寄所建豎必且掀揭可觀乃於方壯之年竟一蹶不復起雖致位卿二稍稱通顯矣然實未究厥施也昔人論馮唐李廣有不逢時之歎乃先皇帝長馭逺攬臣下一言稱旨即不次待以卿相可謂有時而公卒擯棄不偶以死此又何説也比先皇帝上賔公聞之躃踊幾絶意若無復有知已者公之情見矣公自罷歸稍益充拓舊學與荆川唐公念菴羅公約為天台雁蕩之遊值喪其內子不果行既而歎曰會心處不必在逺吾直巖居而川觀耳乃闢亭館招致四方賔客時時以其抑鬱不平之狀發之於詩尤好為金元樂府不經思索頃刻千餘言酒酣與諸賔客倚歌相和怡然樂也以是公之長篇短調幾遍海內而名亦隨之人或以靡曼謂公者公不顧於戲古賢智之士抱琬琰而就煨塵者或傍山而吟或披髮而嘯或鹿裘帶索而歌要之其中皆有所負而未庸故緣此以自泄而世以恆度測之逺矣若公者毋亦有所負而欲泄也歟良可悲矣所著有間居集十二卷雜集二十一種行於世系之以銘曰繡江之濵章邱是營誕此哲人維公以生譬彼韞玉為圭為璜僉曰良哉天衢而亨胡然中塌挂冠遺榮繡江清漪可以濯纓以觴以咏以怡我情千里伏櫪向風則鳴天地一噱泰山為輕古亦有言人貌榮名彼巧宦者四至九卿公豈不達遹駿有聲鬱鬱芊芊美矣佳城閟彼無疆視此勒銘黃先生墓志銘皇甫汸夫神駿伏櫪而駑駘驂乘蛾眉棄捐而勃屑進御瑜瑾韞櫝而瓴甋騰價龍劔敝室而鉛刀發硎士亦有然者天乎人邪求士若此望世乂安得乎吳人於是乎扼為黃生矣按狀黃君諱魯曽字得之人稱為中南先生云其先河南汝寧人也宋元兵興間髙安公徙家袁州生斌少習孫吳書學擊劔騎射察觀英雄屬焉值徐夀輝破袁州以斌為萬户尋自偽漢亡歸髙皇帝從徇南昌授昭信校尉調禦蘇州遂家於吳君六世祖也生信信生景暉為武略將軍景暉生暐始棄武攻文以進士起家任比部郎決獄三輔以為神明生異號葵菴公君其仲子也生而穎慧過人葵菴善操其息立致萬金産析子各千餘君與弟省曽即五嶽山人也盡以購書讀之父為譙讓對曰昔人謂黃金滿籝不如一經矧五車乎與其饒於資孰若饒於學乎比部公聞而賢之弱冠並充弟子員竊鄙時義博綜羣籍探古文辭好竒縱譎為文閎衍莫能加焉長則方面巨耳修髯炯目昂軀山立偉然丈夫也丙子試南畿主司為李公廷相覽其卷深加歎賞置易第一録其論以獻不竄一字俾為後學式云屢上春官不第同年崔公桐時為少宗伯諷曰子日暮矣時不可失禮曹司務員缺姑屈效一官可乎君笑而拒之出曰咄嗟崔生安知余之心哉方今專重進士即才如董賈學擅班揚位躋卿二勳垂竹帛問之非由進士終赧顔憾心矣是時抱志不屑謁選者余長公仲海鹽王生文祿耳嚴相聞之亦願見此三人三人不肯行天下想聞其風焉葵菴晚年任俠務博有大度茍不得盧千金捐於一擲無恨也以故家易凋落又廣置妾媵多生庶子卒無長物君事母王太孺人竭盡孝養讓其先人之廬以與諸弟而身自僦居委巷晏如也長兄太學生孝曽早卒撫幼妹長為治裝嫁之錢生用商示以時義獲舉於鄉今為肥鄉令是也性狷介忤俗離羣寡所交遊弟省曽外惟王守王寵耳余兄弟以中表尤密八子齊名吳趨為之語曰黃家二龍王氏雙璧皇甫四傑鳳毛鸞翼同學莫敢仰視矣包山徐繗以藝交始終稱莫逆焉後遇太學張獻翼即投分歎曰恨得子之晚也兼以峻直不能容物邑令張舜元苛法於其僕斃於杖下君為發喪令蒲伏引慝里兒以催科逞侮君上書李莭推士允略曰一介不取僕之志也倚馬萬言僕之才也李覽之為斂容卒當侮者罪居父喪郡守胡公纘宗唁其廬就幕次稽顙曰衰絰不敢詣公庭以謝守辭而韙之其梗概皆此類亦以見當時守令賢於今逺矣已未之春年餘七十猶擔簦躡屩自潞河徒步入京師其篤如此所著多憤世刺時之篇若令語士役議枕戈雜言序使服官政必多忠猷毅烈乃竟巳矣間居弗豫時過其姪姬水城南精舍茂林修竹觴咏移日姬水者五嶽子也嘗奉安石以遊承阿咸之賞者也是嵗業將北上趨治裝把臂謂曰人各有志余豈智不逮而父耶蓋五嶽由辛卯舉於鄉亦置詩第一壬辰走京師觀樂而返後不更往世盡髙之亡何君卒方其彌留猶不忘一第悲哉是為嘉靖辛酉六月晦生當𢎞治丁未三月朔享年七十有五云娶徐氏都御史徐公源之孫繼蔣氏側室趙氏男三長道美郡學生先辛次道貴次河水俱郡學生孫男三道貴生嘉瑞郡學生嘉德河水生嘉榖尚幼道貴等卜隆慶某年月日奉公柩厝於靈巖西麓之新阡踰十年所而後克葬傷哉貧也狀即姬水手勒粲然華矣然詳於論文而略於紀事余稍增益所聞至云文喜左氏莊騷太史得其曠婉詩喜曹謝岑李黃孟得其健逸皆實録也余復何贅焉而妄人詆其不嫻於藝何哉白首牖下誦覽不輟鉛槧日操多所校輯若孔氏家語兩漢博聞漢唐晉四傳唐詩二選仙家四書大咍小咍録詩説諸集行於世及隱居北遊間居客中諸集散逸頗多蓋襄陽綴不逮意茂陵稿輒屬人也河水挺濟美之才負紹述之志旁搜博采題曰天中集徐君序而傳之所謂愛奇凌誕率任天衷藴藻沈思獨持氣骨要亦知己之言哉二孤請銘銘曰矯矯黃君希世竒寶鸞鶩匪羣竽瑟違好莫為之先蟠木登廟伊誰之愆荆璧委耀原君屢貧孔行卒老夸死馮生均湮腐草氣吐虹霓塞於蒼昊卜宅靈巖别開京兆辭乏中郎曷彰有道往矣餘名來斯允詔眀吏部文選清吏司員外郎王君墓表皇甫汸吏部文選員外郎王君卒其門生陸尚寶師道狀其行友人王參議庭為之銘足以闡懿生平垂休來葉矣諸孤謂余與君乙酉同舉於鄉巳丑同升於朝交最篤而知更深也請表其顯且大者聊補志狀所未備云君諱榖祥字祿之惟辛酉君以降而上世嘗誦酉室者適符其生因題其居而自稱酉室云系出太原晉末徙閩之福清唐水部棨為世譜載其先大雅慎微皆起進士傳至八世祖仲舉贈奉議郎始遷吳之長洲生蘋仕宋為著作郎終中大夫生敏精於醫生觀能世其業即君之父也子孫守其方書往往全活人吳中稱醫家者流必首王氏云君生而器雅童烏之齡即能屬文樂安之嵗選充縣學弟子員文恪王公一見奇之曰吾宗千里駒殆此子矣時文待詔蔡孔目尚在諸生中引為忘年交二王諸袁以才齊名既舉進士改翰林院庶吉士先帝疑政府私樹桃李詔悉罷之乃授工部屯田司主事少宰徐文敏公乙酉座主也薦調考功尋署文選員外遇正郎缺期月不拜謂君眀慎銓藻咸當其人力足攝也時太宰為婺源汪公鋐專司政府賢不肖一切倒置選法幾壞君每與忤將中傷君君稍覺乃以母老不便北土乞歸侍養而忘其有兄不得輒引是例命下豫告仍敕按院核之遂出貶真定尉棄不拜兄榖禎尚官嶺南郡幕先有傳其物故者妄也嗟乎為母承譴無忝人子矣時鄺子汴王子慎中任子瀚唐子順之並以才居吏部不利為伍君行而諸子亦相繼謝去鄒陽入朝見嫉之言固不驗邪後周恭肅公故吏部少宰也再召入京謂汪曰公不足王子者奚故汪曰夲部左遷非止一人彼獨薄尉者非矯邪周笑曰公謬矣員外初以母不便於北土真定去京師才數百里獨能安邪既以母老乞歸今可捨之而身自之官邪是猶欲其出而閉之門也江浙間寧無散郡可迎養者乎公頷之意終不釋而君亦矢心不復仕矣亡何太安人背養居喪敦禮以父事兄以母奉寡姊友睦蓋天性也杜門却掃委懷圗史絶戀紛華既無塵網之嬰亦無山水之好有田在東郭外課農自給殷春閲耕逮冬納稼間一往與田父老談笑移日不知為吏部郎也胡安人亦時往饁之君曰昔介子與母偕隱龎公將婦以遊向恨失之綿上今幸得之鹿門矣撫按諸司交相推薦疏纍上未報厥後太宰為甌寧李公默巳丑房考也素重君諷御史特疏舉君又移書所司為趣駕終不赴時倭夷構亂兵火戒嚴人皆以墳墓妻子為念奚暇計爵位哉安人痛姑之亡鬱鬱喪眀君素不畜妾媵躬視家事雖灑削修脯酒醬之瑣悉理周密或以此少之而君恬不恤也君既不出而李公竟坐讒死世益賢君矣今上嗣位簡用先帝舊臣君業巳補尉大名至是超拜南京文選主事地近而易即僉謂由此可立致崇顯而君稱疾堅不就衆為惜之而陸君由南儀曹起僅遷尚寶君殆有見也郡守永年蔡公甫下車首書清德表其里枉駕造其廬坐牀第間相勞苦君口不能語咄咄書空稽首作謝狀里中嗟歎謂賢哉蔡侯也隆慶改元丁卯春二月十二日安人胡氏卒君震悼幾殞五內俱傷又力疾為治喪事病遂劇非藥石刀圭可緩息也越明年戊辰九月九日卒七十稀年未躋二稔耳悲哉先是文待詔方負重名吳人士多因之起譽君尤所親愛其所否者余安定與黃江夏耳君為詩沖淡而不尚綺靡文亦典雅有則書倣晉人不墜右軍大今之風寄興丹青追工摩詰之技篆籀八體並臻妙品晚抱書癖手自鈔録無間寒暑讐校魯豕纍無脫誤雖大亮之百卷繕寫子孺之三篋刋亡曷過焉今張燕公陸放翁曾南豐三集南唐書野客叢書手澤猶存所纂郡學志并著詩文若干卷行於世君性整潔不為茍簡室中器物置必有恆所衣服巾履雖敝無點膩可浣足迹未嘗入公府有以事干請者挹其風概不復敢言客有詆人短者以他語亂之慙色而去自唐宋以降數百年遺像封誥璽書之類必加寶護此外無長物也子男三長仲友國子生次仲恭郡學生季仲序孫男四婚娶皆名族詳具志中兹不載君亦可以不死矣是嵗十二月二十八日卜吉祖塋旁仲友等奉二棺合葬云司勳氏曰若王貟外者表署於鄭鄉稽評於月旦勒有道之碑展季子之墓易名斷諡其在陶趙間乎夫嗇君者年完君者天夷清而聖臧節而賢嗚呼先生之清莭足以起懦激廉矣靈巖之境橫山之巔爰起新阡灼灼桃塢夫人從焉奮猷樹烈後其考旃眀中奉大夫廣面右布政使許公墓志銘侯一元嘉靖乙丑茗山先生許公以廣西右使覲還道家屬疾其秋七月遂卒嗚呼巨人歿矣我眀述作於是焉寄井冽鼎膏亦既云食忽而羃焉弗及玊鉉命也夫搜獵墳典浡潏自出而弗獲典司綸綍著之鼎石眀練政理惠亨人屯而弗獲身都將相繫奠社稷馮翼孝德棐恭允塞而弗獲正容造膝培輔衮職公雖該三不朽聲施無窮與天壤終哉而知公者猶以密雲不施吾道窮也悲夫始余甫與計偕公為都官從塵坌中獨騎訪余城南邸舍引與為友余素慕公髙其龍門迎謁則大驚不識所自聞也已乃知公友蔡公子木言余而公忘巳好士所飢渴類如此遍於海內矣去五嵗則公之弟叔夏來同官一見相説其遊昆弟不如也而余弟一麟亦自以其所文贄謁公公又弟蓄之因相為通家中間蹤迹或離或合往十二嵗則叔夏歿哭之及是而遂哭公焉悲可言哉公卒之眀年其孤長豫將以十二月窆公某山之陽而謀父友敬亭陳公以狀來請銘嗟乎余何足以知公亦幸有陳公之言爾志曰公諱應元字子春其先順天東安人髙祖誠舉鄉進士謫宦為蘭溪典史道錢塘家焉遂為錢塘人誠生九臯九臯生紳紳生龜年號平崖則公之父也力學負畸行為博士弟子試輒不第因棄去而有二子長為公次即叔夏應亨異材駢出於是以公貴贈父奉訓大夫工部都水員外而母陳封太宜人蓋許氏之遷僅五世而隱然錢塘名家云公生而絶敏數嵗即日誦數百言平崖公受易稱深博而公年十五則盡通其家學嗣為博士弟子二十而舉嘉靖乙酉鄉試嗜古學名大起巳丑之試太史倫公以訓奇其文欲髙列之不能得至壬辰而舉進士復得倫公品之曰西京之文也當選庶吉士執政者欲一見公不往曰吾始仕也而當傴僂鼎貴之門冒詢干進哉竟坐是出為泰安州知州至則闢泰山書院簡士濯磨教之文風大振有豪右觸法賂權貴人以請公不為撓廉白自守減莭民力嘗有史僉事者以供饋薄捽寮吏欲笞之公從容進曰知州罪也請貸寮吏僉事不顧公出即投劾自免於是撫按交慰留公而僉事亦內愧去無何以能理劇復調泰州泰人有張御史者隂鷙常狙伺持吏短長橫行州中公至與直繩既伺無所得即攝伏不敢骫法居一年以父憂歸服竟擢工部都水員外郎是時江西夏相國者幸於上詔工部遣官作治其父墓而夏欲得名士即推公往非其志也然職事不得辭使往且二年益持廉正非公事不交相君相君心敬之欲轉公太僕少卿公聞堅辭又欲使江西提學又辭其轉為虞衡郎中也董鑄錢治盔甲日與中貴人從事而公端凝自持未嘗與交私語中貴人亦莫不敬公者為郎六載乃遷夔州府知府夔孔道交番漢雜兵民號難治公馴以靖廉馭以平典時斥其桀黠者法之郡以蘇息日勸學敦士暇則求三閭大夫杜工部故迹為祠祀之弔古嘯咏篇什流傳以儒飾吏彬彬如也而夔之治遂為一道最又六載擢四川按察副使甫上而值新執政不恱於故相則以公前使事嗾言者彈公御史大夫屠公僑者剛正人也抗言曰夫許子為郎久之乃出為逺郡又久之乃遷即不考其行能也且若此者而猶為干進耶於是素履愈白然猶調為廣西副使兼撫夷夷侵蝕郡縣為上三議曰責田主嚴罰格更旗軍大略主守隘護田者扼夷奪之食豶牙牾童使自屈而已事皆施用攝兵府江誅巨獞三焉巨獞者莫氏兄弟三人以雄勇名兩粵間往嘗破城殺吏討之漏創去前兵備以獲報而罷兵及是復出公懲前事設方略購土人浹辰而三凶授首督撫將上其功公念前兵備且得罪乃力阻不復上有獄當逺戍而人衆公第謫其一二餘悉末減曰法如是足矣且戍者皆當發閭左護其行本以懲姦也而甚病民不可凡公之𢎞厚類是也遷遼東苑馬寺卿條牧政八事轉雲南布政司參政未上而奔太宜人之喪已未乃起補福建時倭夷整居縱掠公至則慷慨蓐食厲兵以寡擊衆遂大破賊衆多首功而公終守正不自言也公去閩半嵗間則後守者隳敗賦遂入興化塗地矣壬戌為雲南按察使明年徙今官所在有績廣西父老迎公蓋欣欣喜而泣也然公再厯瘴鄉憂民惕夷貌亦侵尋為之敝矣余嘗以戒公甲子同覲京師數相問無恙明年余先至江右除道遲公怪其久不至豈謂長逝哉公之生正德丙寅正月二十八日得年僅六十甲子適周也悲夫蓋許氏世仁平崖尤好施公嘗先意承志父歿事仲父如父事姑如母婚嫁其從父昆弟又旁及其母氏之舅若女弟鍾公鄭媪凡窶貧者皆以公為歸其教弟石屋君叔夏也甚愛而嚴石屋君天穎舉世無與讓余嘗與品文至公則動容變色欿然自謂不才弟也蓋伯氏而若嚴君云石屋君失偶遺其女公則使室人撫之己又厚嫁之視之如巳出馬雅念水木每道東安省封樹過存其宗人又攜其子弟至錢塘教之成業乃去其交友不妄若翁長卿相邵良用梗包子木梧子同桐張伯生乾元陸良弼佑或出或處而皆同心斷金焉伯生先卒事具公所為志良弼貧也公則自滇萬里寄白金二錠資之其他醇德甚備而推夲皆自平崖公所著有水部稿倚堂稿春秋內傳列國語史記鈔漢語合若干卷世嘗言文士鮮行而椎魯者亦少文乃讀公所著書雄深雅贍遷固無以加也卓識通猷則肩於董賈其敘義烈苦言至意讀之常使人涕焉以彼質行而文乃若此非所謂弸中彪外者邪敬亭公稱公曰文行具美亶然哉亶然哉或曰許公行仁厚天所佑恂恂不以其能先人宜有所助而仕顧久不進亦不大夀何也蓋公文詞絶世而不肻為貴勢役自前後相國鱗萃天下之士雅誦洋洋而求之卒亡有也亦知公矣彼豈能無心愠哉至言天之故則其所甚美而靳祕者尤莫如文詞故李杜轗軻勃賀則夭齒角翼足之理然也馴斯以觀公位嶽伯而年下夀其亦天之善貸也己悲夫公一娶徐氏贈宜人子曰長豫郡學生才行肖公者也再娶包氏封宜人子曰次紆三娶張氏子曰少妤其媵子曰季序孫男蜀客郡學生楚材晉卿孫女長字林鳳翔次何汝孝俱邑學生次幼曾孫女一振振乎仁者之後蓋未艾也銘曰被爾雲裳佩爾玉璜玄黃柔剛以行四方有來煌煌朱虎以降青牛逝矣紫雲其藏有斧有堂為嶽為光言旋言歸於帝之傍中憲大夫重慶府知府嵩陽劉公暨配胡孺人墓志銘張佳胤某弱冠稱諸生時劉先生守重慶校一郡士拔置髙等至引與二子黃裳黃鼎遊蓋歡然師弟子也先生歿五年而黃裳手狀徵余銘嗟夫狀所列盡矣而余安忍銘然余視先生猶父也又何能辭按狀先生諱繪字汝素一字少質其先陶唐氏有劉纍擾龍於夏代著融顯國初𨽻籍錦衣衛其徙汝光州自七世祖始曾祖忠贈太僕丞祖進太僕丞以子方伯公貴贈少卿以孝旌閭生六子季曰廷佩為先生父俶儻喜大節好施豫娶鍾夫人生先生先生八嵗師受伯兄經毛詩通大義稍長讀史記汲鄭傳慕其為人為文倣史氏伯兄見而驚曰必弟也興劉氏者年十六補郡弟子員郡倅張君竒先生材為具禮室胡孺人先生長晳電目髙準修髯喜讀左國縱橫家言擊劔通俠以自豪嘉靖辛卯領省解入京而滏陽王生引少年數十輩逆先生邯鄲校獵山下置酒亢歌振木燕趙慷慨之士聞之咸為感奮比至京都御史儀封王公語人曰今嵗計偕士若蘇清左國璣與劉生可謂中原三豪矣乙未成進士肄政户部嘗晏至大司徒梁公據案讓之先生為賦孤鶴上書求去梁公更相推重而是時濟南李開先武進唐順之平涼趙時春名傾一時乃無不下先生者以母鍾夫人病告歸歸二年出授行人使韓事竣道出武功時康修撰海家居逢先生縣界歎曰子非汝南劉髯耶執手歡甚為置酒鞠域中康自起撥琵琶先生撾鼓三摻作漁陽聲宫羽轉激四座盡傾明年選給事户科首上治河疏陳四事上可其奏九廟災上封事具禨祥洪範五行休咎勸上居法宫無勞神是時貴溪相用事深忌先生益氣奮再伏闕上書為樞言者一正言者二愚言者三在攬權馭大臣令中官毋得制兵而益開言路上為動容俺答數入雲中詔舉邊材可當之者而言官某阿相公私所舉不稱旨先生廷劾言官非是上乃讓二相謫言官罷不稱旨者初貴溪相與侯勛隂害而陽浮好謀共傾司馬王公公遂劾勛姦贓竟下獄而夏緣是欲中王并罪之先生為上書理其寃明日罷王歸夏恚甚然無可誰何先生者乃遣客李寶以姑布之術説先生附己當大顯先生怒髮竪捽胡投寶柱下明日揖夏於朝曰某且死職不能從客言他日從諸給舍夀相公相公手玉碗行酒至先生前誦麗詞為歡公色勃勃故墮碗客盡驚出明日疏夏十罪謂夏顓權驕恣無人臣禮當坐死疏寢不報是嵗壬寅六月朔晝晦上大恐問天官主何占公復上封事曰臣謹按漢書劉向京房郎顗皆謂隂掩陽為臣迫君之象沴氣下盛上著於天宜亟去言以塞天意明日遂逐夏一時臺省出夏門者悉被黜因上邊事疏舉聶豹王儀可大用而劾二撫臣巽耎語侵銓部吉水毛公伯溫讀疏吐舌曰真夫哉每過先生必論兵陳車法先生曰此故器書不可以兵夫敵血飲而蹶張鳥舉而獸伏飄若風雨非得神勇士卷甲銜枚絶塞斫營則燕然未易勒也毛公歎服是冬復草疏欲及內事母鍾為絶漿相向泣先生乃己因求使楚中奉母鍾歸明年癸卯改右給事刑科未幾出守重慶蓋銓部報往疏也重慶在萬山中稱巖郡先生攜二子扁舟過黃陵廟祝曰此神禹駕黃龍犂峽所也梁豫去數千里吾以二子來而以墨反有如此江至即貌野老幅巾延問便苦獻嵗行春必載牛酒勞農因止宿田家召其子弟教歌咏彈琴焉夜市火先生拜之滅夏旱身雩於社雨隨注至沒先生之腹父老泣扶乃起是年大豐渝俗士人上已咸泛江遊塗山先生亦間往諸父老具壺簞迎先生少飲輒醉醉歌起萬人和融融泄泄至今想光景不衰渝多竒士先生聚若干人使讀書塗山上丙午蜀試士半出其中民有兄弟訟田者先生為對泣曰豈吾不忍其兄而使民乃忍其弟哉民皆叩頭流血相讓田去凡受爰書必平之法寧失無苛郡以大治郡地通西南夷而播永土官數爭地相讐戮直在播臺使者屬先生按其事先生單車入赤水永女酋魁結莋馬陳諸山譟兵澤中嘗先生賄弗為動諭以大義永不勒兵播地遂歸渝江官舸費萬計而大司空采木亦不下百萬計先生悉上竒羡不以私屬守令皆莊事先生無敢睨視使者剡薦於朝為循吏第一而值貴溪起相嗾鄉人給事南省者論罷先生先生讀疏笑曰愆豫之彈絃而踏踘殆知豫者豫乃今從榮生帶索遊矣然豈以重慶易吾養也乃度北瀦濕淤圜之幾十里名玄湖湖種魚十萬頭隄樹萬章盡有蒹葭菱芡菰藕之利洲上牧牛羊雞彘聚廬其中如農家又責僮以鹽莢乘馬數以嵗賦布易鹽構通馬者鬻善馬他郡而實之邊因資以贏而身與數友馳快馬射獵熊山下得禽以奉太夫人歡自撰歌曲為綵衣銀鐺之舞以侑太夫人太夫人忘老為加餐其榖入厪厪先公之遺而親族貧士資以舉婚喪者半又稍通墨客無他贏己太夫人歿而黃裳黃鼎舉於鄉乃盡散山中諸少年結草閣湖中集徒數十人講經義撰易勺四卷春秋管十二卷作通論四十篇著詩賦序記雜文二十卷學者尊為嵩陽先生而不敢氏安陽郭相嘗謂新鄭髙相曰劉汝南富於著作必傳矣先生之卒於隱仲子黃鼎方會試癸酉預知死日言白雞之年吾逝哉逝二年所而胡孺人亦卒孺人性甚慧年甫七嵗誦春秋孝經父面泉公授以衛夫人書下筆精詣西泉公甚材孺人而擇偶者無如先生遂歸劉姑鍾性嚴一臠非孺人操鼎即不食雖祈寒盛暑孺人未嘗少懈也先生給事省中每疏上人人危孺人前慰姑曰給諫死忠新婦亦能死孝姑何憂自省中出守至以讒罷孺人未嘗少戚也其力儉不奢自其天性然其撫二媵若娣姒字其子女若巳出蓋所謂嫓賢儷行哉先生生𢎞治乙丑卒於萬厯癸酉四月二十五日得夀六十有九孺人生正德丙寅卒於萬厯乙亥十二月二日得夀七十子三黃裳娶崔氏舉乙卯鄉試黃鼎娶汪氏再娶成氏舉甲子鄉試黃駿媵王出娶陳員外璋女女一媵謝出適璋子九鼎孫三衍衎衢衍聘鄉進士賈一敬女衎聘胡御史俊德女女孫三適喻芳華聘賈之約羅璿張子曰嘉靖間夏相貴勢熏灼天下幾侔人主矣先生以夕郎言事至令其惴不出聲捋虎鬚幾不免虎口巖哉乃其出守罷守始終無少點流澤迄於今未閼其非純氣是用可知己顧材雄不能受貧取愆於俗夫策既巳不用之國而用之家即賜蠡何傷於賢乎至晚節益茂於經術其所取精也多矣又記乙亥冬某起家南卿迂道走光黃起居孺人至則孺人先一月卒某為文哭己躍馬南山下作挽章展先生墓為之欷歔失聲信宿長公子玄廬所然後去嗚呼先生位不酬才與孺人教諸子伯仲並舉於鄉以文章鳴世乃仲公賫志蚤卒何哉先生之留餘以究厥施者是在子玄以及諸子孫矣某往與汝寧趙良弼太宰私論先生父子氣節文章類眉山而孺人則又類程太君良弼謂其知言也為之銘曰造化福取不足曰惟先生之畜操婦則立壼極曰惟孺人之德嗚呼天中之野淮康之沚玄室千秋二靈妥是施其夲支振振濟美其誰者銘巴蜀弟子中憲大夫江匝建昌府知府少岷曾公墓志銘張佳胤武宗朝吾蜀數君子者起咸尚文章氣節而江陽少岷曽公其一也余為童子時聽學士長老誦説公名德如隔世人嘉靖丁已走江陽為先府君乞墓銘於楊用修先生始奉公几杖公亦接引後進談學術經濟灑灑有致公歿後二十八年而公之子某考功君持狀以志銘請豈以余受公一日之知耶余客江陽時聞公父某以公貴受封遂稱封公其人倜儻重義數急人之難嘗拾遺金於道必迂歸以伺亡金者授之能詩文著有乾峯稿乾峯在合江縣去郡可二百里而遙縣西有安樂山千巖萬壑競秀爭流中為洞為臺為峯為盤為嶺為泉為峽為城為室即山經竒紀所不能臚列封公則樂之遂卜居終老而少岷公舉矣公生竒穎殊凡兒稍長即以聖賢正學自任七嵗侍封公山陽茅屋見隙光曰此何故哉其野馬丈虹耶封公異而詰之兒能對乎明透屋山光似玉公應聲曰影浮書案氣如龍封公益竒之十四嵗補博士弟子每試輒髙等郡侯為築别業於鳳儀山以居之公益肆力於古今之學尤精書法得帖意時威茂兵憲王某者聞公名欲召置西孰督學蘇某曰曾生非可檄往也宜禮聘之公應聘往因登大岷青城諸山西眺湔氏東眺汶瀆胸中吞其八九而歎曰大岷之外可稱配林孰與吾家安樂日相從几席間也遂易安樂為少岷山因自號云正德丁卯舉省試第五人眀年成進士授户部江西司主事時逆瑾為政搢紳趨者如市公不惟無所投刺間有言觸之會瑾執不附己者跪午門外而公幾不免尋榷稅清源以廉明稱後轉員外郎中條上大司徒以十事曰革皇莊裁冗費禁濫支減廄馬清鹽法停鈔法明徵納禁使用蠲門稅重漕政大司徒稱善而卒不能行其言丙子知建昌府公益修循良以臻良二千石共理之效上劑益藩下悉民隱立社學建書院羣弟子而考德問業盱水之上洋洋如也郡有兩芙蓉山多淫祠妖術橫行公廉得其首付諸理毁淫祠以祀伍大夫李旴江嶽武穆郡俗遂變其他發閩人王政胡添三詐偽正豪民梁敖十九殺人罪暴妖術連世勳父子尸伸雪良民羅增寃抑然皆非公之大者惟是寧庶人謀不軌要脅諸司莫敢不為夀以求免公自持如常會省城變起公遣健卒間道走上變又自帥兵兼程詣軍門陳擒勦七䇿王文成采之合兵火攻又慮九江南康業巳從逆不分道擊之則楚援兵為梗文成檄公取南康斬賊首謝天一等四百八十餘級又自王家渡同廣信守周朝佐斬獲賊三百三十餘級釋脅從者八十五人寧庶人遂擒當公勤王時與母鄧恭人永訣誓與賊不共天卒能成社稷功王文成亦敘公勞烈而竟不録先是寧庶人膏腴苑園屋廬多為豪所侵中丞鄭某者檄公一無所徇盡返之旴郡有巨室欲齮齕麻姑山公裁以法又上叛逆疏內有省內姦邪顯附隂附語繇此忌與怨交集咸為蜚語中公不免矣然旴人至今尸而祝之益信天理人心未泯如此公以庚辰垂橐歸移居江陽郡城購茅齋數楹藏書數萬卷日坐其中手一編以著述自快中丞劉公大謨御史金公深交薦可大用不起著有聖學會通河圗洛書解春王正月考厯代史評論心學論樂律論數學論氣化皆發自契悟無所勦襲其要歸於中正精實有宋儒所不能道者嵗旱課耕苾里靜觀雨暘之故雩禱之節又著召和録不泥不鑿深於天人之際修川東志精核有體為一方良翰為文髙峻鬯逹一夲六經行乎意之所止而不沾沾蹈古人語所與交者如王伯安何仲默鄭繼之呂仲木皆當世偉人也楊用修白首戍滇欲歸蜀為首邱計乃不歸新都而卜宅江陽以就公相與賡酬甚盛然公意在經學思成一家言以詔來者其於題詠劄記則隨意小赫蹄成草草畢亦隨散逸今存者皆諸子私録特百之一二耳故名拾存篇云公貌修峻而癯骨立健爽即屋漏無惰容平生目不識權量手不持金玉耳不喜絲竹布褐蔬食常晏如也曾經池陽夜夢青衣童子入舟曰余九子神也九華則爾鄉李白所易重錫余以嘉名意良厚然不樂也子為余復故號公覺作青陽九子歌公敦朴無華感孚山靈非偶然者與人真誠直易無他腸具知人鑒料事多中然善惡界嚴嘗面斥人過不少避而宗族賴以衣食婚葬者甚衆常祿外及先世所遺者分授猶子士謀士交士傳輩家有墩課子弟不效經生常語故江陽稱曽氏子弟優者為龍劣者亦不失為虎矣一日病革將易簀啓手足謂諸子曰平生無他恨苐著述多未脫稿紹明余志是在爾曹言訖而暝公守建昌有祠居鄉為月旦所重其鄉之人與弟子私諡公文節先生又祀於社公蒙詬而屈抑林下者幾四十餘年以考功君令甌寧時上最考循良髙第請復公職取俞旨亦異數云公諱某字東石生成化庚子三月三日卒於嘉靖戊午十一月二十九日享年八十嵗上世有祖諱長一自江西徙河南再徙麻城入蜀家於江陽為河西公是為蜀之始祖河西公有隱德不顯厯四傳生思虎思虎生海寬是為公父以公貴封户部主事配員氏封安人公配鄧氏封安人加恭人繼配郭氏張氏宋氏封太孺人毛氏生子六士𢎞舉嘉靖壬子鄉試授洧川知縣士宗士林俱郡學生士登丁丑進士士彥甲戌進士考功司主事士科舉丙子鄉試孫男某某曽孫某某以某年月日葬於某山嗚呼此據狀而志公者如此余為諸生時余邑先逹有都運童養之先生蓋鄉之朴茂長者其父諱琦仕為瑞州通判正值寧庶人變起通判公亦嘗督師擒賊以功升四品秩都運公嘗語余言江西討賊之役有幸而功者有功而不幸者幸而功者難言之若功而不幸者吾鄉曽公是也都運公侍父任得於耳目者真且都運公平生寡言言必有中余聞而咨嗟久之夫公豈惟功不録並其所固有者而奪之何以勸忠余謁公時曽述此言以質公公笑而不答嗚呼可以知公矣又為之銘曰於戲公出而稱社稷臣者為年僅一十有三幾不免於二逆之耽耽公處而稱鄉先生者為年則三十有九庶幾乎兼太上之三不朽忌公在人公何所嗔篤公在天公亦超然六子而髙第者四未量者二天若有意以報公志人限公以有涯公獨遊於無涯即小子能銘功德而於公乎何加明文海卷四百三十六
