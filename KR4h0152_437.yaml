body:
  text: 明文海卷四百三十七餘姚黃宗羲編墓文九文苑河南參政王遵巖墓表雷禮遵巖王先生既卒葬其壻會稽尹莊君祉求余表其墓思昔壬辰之年先生官吏部莭操文學為時推目余方釋褐偶以文字相知見先生立志逺大不翕翕以相歡亦未嘗悻悻以自忤意必入贊邦經建不朽業乃一蹶二十餘年竟弗起耶先生諱慎中字道思别號遵巖東州晉江人也幼稟慧質讀書日誦數千言輒了悟不煩師解年十四補弟子郡守葛公見所試舉子業竒之曰兒異日當為天下士詎取科第己耶十七舉於鄉明年嘉靖丙戌第進士疏乞歸娶二十赴銓授户部主事監兊通州舊以核糧頞虧虛為稱職多操一切先生惻然曰運卒疲轉輸極矣不厚加優恤徒刻削為耶取宿滑故為留滯者懲之不輒貸一日視糧胥以浥爛告先生曰此船漏所致非彼罪也但不宜久貯爾即給散於軍曰此一軍所虧粟粒耳可以免賠償者幾何人於是運卒相慶曰王大人活我其曲悉人情類此差滿調禮部祠祭司時天子崇祀典多始創無故牘可稽大宗伯命先生起草獨推原禮意揆時折中雅稱上旨辛卯鄉試廷議以京朝官主各省試事敕先生主試嶺南善鑒别越嵗壬辰所取士林大欽果廷對魁天下尋轉主客員外郎會詔取文學士充館職輔臣欲羅致先生使人喻意先生固不往謁竟為所沮又因屬人望改吏部考功員外郎以塞之未幾升驗封司郎中時少宰兀崖霍公韜與輔臣有宿憾每於衆中譽先生同列附輔臣指共擠之因先生疏論封典坐以變更成法謫判常州值江隂缺令撫按欲擬署篆疑先生必辭先生喜得親民事自效請檄以行延見耆老審所宜利者注指之即米鹽事不憚煩邑有髙姓者怙勢侵牟鄉民習為姦市先生廉得其狀置之獄併鉤摘諸不逞者並伏其辜邑用肅然未幾升南京戶部主事禮部員外郎尋轉山東僉事提學校先生敦風教以身為標齊魯故事學官迓上官類跪輿臺前不以禮處乃諭之曰師必自重而後可以教人若輕其師是輕其教也令以士禮相見校士秉至公不徇舊案所識拔者多為時聞人踰年轉江西參議值章聖梓宮由九江入楚下吏懼誤供給有棄職以逃者先生往董其事裁約以禮人不知疲繼升河南參政屬嵗大飢天子遣戶部侍郎王公杲賑恤王公見先生發稟平糶有方活民數萬具以狀聞且薦其可大用會辛丑大計吏治輔臣故猜先生又因巡按在江西謁輔臣先祠以奠文委先生蓋其意所屬也先生固辭遂銜甚因考察諷銓部重違其意而外憚公論姑以不及擬調內批竟報罷士論共惜之先生聞報無愠色以獲侍父母為樂父方渠公捐養哀幾滅生事母左右承歡雖貴且老不弛勞事兄如其父撫二弟以家學切劘弟惟中以所得取戊戌進士官至南京太僕寺少卿居家悄然閉户取聖學宗旨以自鏡日以所得引誘後進易其耳目訓詁之陋隨其所扣皆虛往實歸四方聞而興起者以不及門為歉凡觀風兹土者必式於其廬或大事刋金石并秋闈録序必借重先生以其言足垂訓云豫嘗概先生素履初束髮登朝抵掌談天下事謂事無不可為為之無不如吾願視時諸著名者嶽嶽無所讓其諸著名者亦莫不前先生及發為文詞亦因性資英邁吐藝林英華馳騁秦漢六朝上下而竒氣逸發變態百出不可繩律後經遷謫轉徙反究實踐豁然有悟夲真渣滓盡融於是造詣益邃窮制作之妙不為綺靡語古雅醇深動關世教識者謂登歐曽之堂而入其室亶其然乎嗟夫天生俊乂為世用也先生崛起閩中桀然自見其才而不自滿足勇於求道卒底大成使假之重柄必能以求道者立功業而不安於卑近乃為小人所詆猜無以竟其所藴何哉昔人謂子厚寓栁州而文思日進是天殆假此以成其名也今先生雖坎軻於世而當其靜居穆然見天真片言緒論流布於海內者無不足以感發夫後學以求自得夫而後知俗套之不足貴謂造物者得無意乎先生生於正德已已九月二十七日卒於嘉靖已未七月十七日享年五十一葬都溝邊山之原蓋先生所自卜也其世系見於太僕君墓志銘兹不詳敘惟本其德行學術之大者特表於其墓可使世之人過此咸知秉道守正如先生雖遭罹讒搆不及大用於時而天為斯文所以起衰反弊永垂不朽者非人之力所可幾也彼怙勢竊權赫視一世者雖能擯抑先生而不能奪其聲名徒為世憎斥豈無感慨耶陳石亭墓銘顧璘先生吾南都文人也當童稚時頴異早見雖其軀不甚長神采朗秀眸子可照少學蘇氏之學筆勢瀾溢氣局渾健人咸謂其類東坡先生亦自號曰小坡至中嵗再變其格詩務宗夫盛唐文則出入史漢而歸於簡古晚年益好著述惟期浸淫理奧絶不以綺麗競能厥趣逺哉璘自登第後即相結為文友傾心幾四十餘年切􅀈契許日益膠固真如兄弟骨月頃年先生以山西行太僕卿璘以浙江布政使各請老居山中與諸耆舊大夫修淨社甚歡丁酉璘召起為副都御史撫楚與先生别意殊怏怏戊戌秋忽以訃聞實卒於六月二十六日璘哭之慟其子時萬等致禮部主事許子榖狀來請為墓銘嗚呼吾與先生交期止此耶乃又不獲執手永訣痛矣夫天道負人每如此也恨恨何有窮哉乃志曰先生名沂姓陳氏初字宗魯後改魯南號石亭居士本宋丞相秀國公升之之裔曰澤以言青苗謫四明為鄞人曰珤國朝以醫徵入太醫院始家南都其詳載長沙公傳中長沙公諱鋼稱遲宣子即先生父初為黔陽令再擢長沙通判皆有遺愛祀於土母金安人以成化己丑七月二日遲宜公先夢釋氏奉眀珠入室旦生公五嵗能屬對八嵗能摩古人畫十嵗能詩十二嵗能舉業率竒拔驚動長者總角著孔墨辨赤寶山賦諸文傳誦人口自是行誼文學日益隆茂辛酉始舉鄉試暨丁丑始舉進士雖久處韋布時名曄然出入人上閣老野亭劉公太宰白巖喬公少宰柴墟儲公宦南都時皆海內具瞻鄉定山莊先生負學行髙望皆引為忘年友既仕改翰林院庶吉士除編修與修武宗實録推內館教書癸未禮部聘同考官甲申與編修鄒守益等及與修撰楊慎再論大禮實録成進侍講賜白金文綺隨充經筵講官撰講章善寓諷勸上問宰臣知其名丙戌授册封楚王踰年出為江西布政司參議先生素抱經濟樂於惠民於是備設科條以杜姦完賦同官驚服進山東左參政按沂莒滕費諸郡邑察其災荒發官帑市牛百餘頭給民墾藝且寬其稅期年皆熟又為蠲除種馬薪木運布諸征民獲蘇息嘗至巨野察有盜將發調卒襲捕散之即言於中丞職兵者不謂然已而盜竟破縣去衆許其略嘗遇執政於德勞之曰先生久外將召矣對曰齊民困甚苟行吾疏勝吾受德意大忤吏部舉河南福建布政司皆不遷遂改山西行太僕卿再上疏請老歸築遂初齋於家園杜門著書絶意世事及今天不愛賢遽爾見奪蒼生已矣又如鄉國何哉先生孝友忠信出於天性事二親死生情文備極人所難及素廉於財長沙公歿後營弟妹婚姻貸以備禮及貴周恤南都與四明族屬往往曲殫心力嘗有大臣後流落不能歸葬必圗為之所居京凡鄉閭人急難匍匐拯之唯恐後蓋平生舉事造念率歸忠厚固不可以計數也所著書有皇明翰林志金陵圗考金陵世紀畜德録誨似録花巖志遊名山録晤言詩談總若干卷詩文拘虛集若干卷又金陵志山東通志南畿總志皆出筆削狀謂其清修厚德文藻惠政合而歸之有道仁人吾鄉稱為實録初配楊繼馬婦德并茂馬尤能文贈封皆淑人子男四伯時萬鄉進士仲時億叔時兆皆才哲方向進季時尚幼孫男幾女幾其興蓋日熾云卜已亥月日合窆於楊淑人之墓墓在岔山祖塋兆內銘曰文以章物唯道是則發藻於才立本於德小儒偏長下乃剽竊於維先生秉德自天企彼四科庶幾閔顏乃述乃作是謂善言達諸大業僅試旬宣乘雲御風言返天門有遺在壤瘞玉彼岔赫赫其光爥於九原匹躬斯已百代攸聞侯二谷墓銘茅坤樂清侯二谷先生豫嘉靖戊戌同年進士也諱一元字舜舉始釋褐時同年錢塘翁君相首篤行會稽沈君鍊任節俠永嘉王君德談經略而先生暨華亭莫君如忠治古文及詩歌然先生尤好為湛深之思豫不自量抑稍稍共五君相頡頏以為聞於時已而各以授官散去其所為離合顯晦不同而要之同歸於道者間嘗賦六子詠是也久之翁以廣平太守致仕歸而沈以上書詆執政徙塞上被誅王繇給事中以直諫出臬南粵且棄官去已而海倭內訌復提兵赴族父難死之豫亦以忤當世免官而先生同莫華亭浮湛世路乍告乍起者三十年始並領方伯然竟不及持節鉞參大政以究所為戮力四方之志命也然豫於翁之歿間表其墓沈及王之死復書其烈及碑賜祠而莫且屬豫序其家藏刻嗟乎先生之歿而葬也少子某抱其弟某所為狀屬豫銘其墓豫安能獨無情乎哉按狀先生於南京刑部時省囚書暇輒下帷謝賔客讀六籍及六家言間與曹郎王公問皇甫公汸蔡公汝楠許公應亨輩相與選勝休沐分曹賦詩風流文藻於莫華亭無間焉於參議廣東提兵大名道頗得先生文武材而轄河南轄江西也則又稍稍聞其撫災賑飢不下古富鄭公青州之遺獨故嘗以文詞忤江陵相公坐構去其死事雖於沈會稽王永嘉不相及而抗直之聲則又於兩公者或相雁次矣及按先生罷官歸而卧林廬也入以將母出以悌弟及服喪讀禮所散橐中裝以贍內外姻族鄰里鄉黨則又有翁廣平之所不能而節而書之者什且伯焉嗟乎先生於豫所詠六子蓋兼之矣然考其自則繇上世節毅公畐髙大父誠齋公震大父梅亭公敬及父廷訓世忠義而流耀後昆者逺矣方其年十三以父嘗議大禮坐構逮繫走數千里守闕上書悲慟天子為之霽威縉紳大夫於今聞之猶為欷歔而囓指飲泣者其歿也猶手書祠堂事以授少子某其於名理大誼類如此所著詩文詞賦傳記論贊志述共若干什朝太史瑮嘗序而傳之以行於世享年七十有五葬之三台峯之麓子男六人曰興邦曰化邦曰儷邦曰任邦曰保邦曰傳邦化邦中鄉試卒他並郡縣博士弟子員女一人孫男女二十餘人中多魁壘相望而未艾者銘曰其入朝也文學政事鏗然巖廊其解紱也角巾竹麈山水徜徉生不為三公歿猶為文昌銘爾藏聿耿光魂則無不之兮於海上異人乎翺翔朱公墓志銘唐順之公姓朱氏諱某字某吳縣人也父東耕君諡以隱德為里中所推至公讀書為儒在縣學若干年以貢入太學在太學一年謝去歸老於家明年子鴻漸第進士厯官兵部武選主事於是天子封公武選主事後鴻漸為武選郎中已而鴻漸守瑞州調守廣信又自廣信調守梧州而公復封鴻漸未去梧而公卒於家某年月日也公自少苦志讀書嘗寓蘇城北寶幢寺寺傍空室一區寺僧以寄棺槥其中嵗久積疊墻壁間鬼氣觸人户無履迹公喜曰此真吾讀書處矣因獨攜一童子往讀書其中每夜中或晝風雨輒有聲隂隂若嘯若泣一童子者數以為鬼也竟驚病死而公讀書其中如故公既以老儒生精於治經又性喜為詩所著有草堂集凡十卷蘇人故多以詩名家而近時則迪功郎徐君昌榖最著昌榖嘗數過公論詩公曰詩貴成家格卑弱固不可若規規摹擬前人逼真亦詞家大忌也且夫古之為詩者以寓性情也得之於體裁而失之於性情亦安用詩昌榖深服其言故公之詩雖醖藉古人而要於自寫已意略如所以對昌榖語然昌榖之詩則自海內藝文之士莫不喜道之而公之詩雖以吳之人士雅好為詩者亦多不能舉其詞豈公善韜蓄以為既隱矣不欲以言自文耶抑古所謂山澤之士必有待而後能施乎世耶彼其所謂有待者不獨操柄也雖文詞技藝若可以自振於世者固亦不能無待也耶公既以讀書至老無所遇而發之於其子副使君副使強直有節概不善與時上下其為宦也亦往往多鯁自為郎積若干年而始出守為守厯三郡積若干年其最後徙梧梧瘴癘窮徼地也副使君欣欣然曰吾所聞於家大人者如是吾何憾公亦欣欣然曰吾兒如是吾何憾公卒之三年某月日副使君始得地於陽山白墡塢之北麓乃克葬公先葬之日副使君具公行事為狀來請銘余雅善副使君其語當不誣為之敘而銘之公娶李氏繼娶鄒氏子五人其長副使君鴻漸也次鶴鳴虎文雉膏馬良孫男九人承家承烈承宣承武承文餘未名曾孫四人享年七十有九銘曰學古為儒委蛇步趨挹其容者以為此山澤之癯貤封自天有子則然署其墓者以為此梧州之阡徐魯菴先生墓表王世懋於戲此魯菴徐先生之墓先生嘗讀書中祕為諫議大夫不稱稱魯菴先生尚德也按狀先生姓徐氏名師曽字伯魯即以魯顏其菴為别號云徐氏其先嬴姓偃王之後散處太末至勝國時有諱潛者知龍慶州始來家吳江數傳至文亮以贅壻始城居文亮生達逹生綱綱生養恬公朝出後其從父縉實為先生之父元配王孺人子弗育其二凌孺人實生先生先生生有異質弱不好弄七嵗就外傅即匡坐讀書終日嶷然授以易義輒通大略十二能詩歌屬古文詞十四試有司不得志自是數絀而名益起吳中子弟執束脯紛來受學而先生亦抗顏為人師嘉靖庚午先生年二十四矣郡守馬公以儒士首選上御史試復被放人皆惜之先生不以數奇自沮顧益下帷誦習嘗程書自課屹屹至丙夜不休其學自易外旁逮諸經下至洪範皇極數法隂陽厯律醫卜籀篆諸家之言皆能通其説亡論經生即世稱巨儒弗過矣嵗辛丑始遇令喻公督學使者楊公兩公皆名能得士於是先生試輒被賞遂冠邑諸生而諸生亦亡敢雁行者所遇監司直指無弗人人稱知已矣丙午領鄉薦丁未上春官連捷念兩尊人年髙而生母在淺土遂稱疾不對制歸歸而襄凌孺人之葬已養恬公召先生而諭之曰兒幸第春官一命行及如廢前代之典章弗考懵於國家之令甲亡稽胡以酬上恩夫精義者致用利用者安身兒其勉之先生奉父命乃益專志於學亡何養恬公卒先生自傷不以祿養哀毁幾不勝終喪事亡踰禮癸丑成進士選為庶吉士閲二載試恆居優解館時顧不得授史職出已為兵科給事中先生無幾微恨色夙夜奉職明年嫡母歿京邸護喪歸服闋赴部補吏科先生在兩垣先後長官邱梁二公雅知先生諳悉時務凡大議多從商榷即公疏多出先生手而先生亦自有建白如酌處川兵請立任備祠之類多見施行庚申奉命册封周藩便道休沐閲嵗厯轉左給事中當是時肅皇帝春秋髙益摧折諫官而相嵩用事隂齮齕言者以自便臺省多循默失職先生歎曰吾奉先人遺體不忍即狼藉闕下奈何效儕輩積月奉默默坐致金紫乎而會奉使時脾疾作至是益甚先生曰吾有以自解矣因請告不往闢書舍於南湖之上聚書萬卷吟誦若諸生時己遂屢疏乞休銓部惜不為請隆慶辛未再疏始奉俞旨致仕然天下益想聞其風今上初用兩臺使者薦竟起為禮科左給事中檄迫之出先生喟然曰臣在先朝以不能建明故竊附周任之義以止今羣賢滿朝臣老且病何能復禆聖明萬一復抗疏辭上諒其情許之於是海內愈益髙先生之行御史郭中論薦甚力行且復召先生託所知言之銓部乃已先生既無意用世常思託遺經以自見故晚年論著彌富學尊望崇鄉邦方倚為蓍蔡而先生遽捐館舍享年厪六十有四云逺近哀賻逺同太邱鄉先生歿而社祭先生當之矣平生所著有周易演義禮記集注正蒙章句世統紀年湖上集所纂輯修注有文體明辨詠物詩編臨川文粹大明文鈔官學見聞六科士籍吳江縣志小學史斷經略全書共數百卷行於世又以字學不眀欲緝全編以贊同文之治尤邃醫術論著業已數十篇此皆有志未成者也先生於學雖無所不窺然根極歸之於敬嘗揭其齋曰主一無適旦夕諟之即燕居顰笑咸有矩矱性雖醇謹傴僂自將至取豫大節毛髮不可苟堵宫蕭然有以自樂終不為人居間也吳俗好言冥福先生之葬元配並自營壙誡其二子曰吾生平不敢遂過嘗有凜凜庶幾之心即冥報當不吾譴小子志之毋徇俗好為也屬纊之辰猶勉二子以持敬指牀頭書令收篋中而已終不及私人謂先生之學真得於敬云有丈夫子二人詢論皆能世其家其它詳具志銘中不載余惟國家以科甲羅士士由此進者爭願出所長自快然中原之人或不知止大江以南官多六百石自免者談者謂江南人多田園子女之奉以故輕去其官云若先生當盛年美宦一旦棄去編摩窮年此亦詎有所染好耶當其請告時天下未能盡窺其指見以為明哲保身而已載更兩朝途險者已就夷居靜者且思動而先生卒堅卧不起然後有以見隱君子之真也昔蔡中郎為人作墓碑獨云於郭有道無愧色余非中郎其人無足為先生重者然先生亦詎減郭有道哉明文海卷四百三十七
