body:
  text: 明文海卷四百三十八餘姚黃宗羲編墓文十文苑明故嘉議大夫南京禮部右侍郎管南京國子監祭酒事白野先生殷公行狀余孟麟萬厯辛巳五月南京禮部右侍郎白野先生殷公卒于家二子將走闕下乞恤典且謁大宗伯華亭陸公為銘以余小子謁告歸屬之布狀昔先大人與公同舉于鄉即余小子辱世講後無能為役其曷敢辭公諱邁字時訓號秋溟一號白野鄉人故多公厚德稱白野先生世為南京留守衛人曽祖福祖冕並隱父俸以公貴封承德郎吏部主事蓋殷氏自承德公始昌大云承德公娶于錢而生公少穎敏端靖七歲而母見背育于外祖母翁氏始受書輒成誦始工屬文輒有志聖賢之學十七就試輒起民間首諸生籍二十登鄉薦公以少失怙居恆茹哀所以刻勵尤劇乃時時寢疾其後多稱病者以此三對䇿不利已肄業南雍與江西單君山何遊聞陽明先生學已又從少司成南野歐陽公講論理道有當于心以為非靜無以成學遂屏居山寺鍵關默養其所悟領為多年三十而舉嘉靖辛丑進士尋歸省癸卯赴部授户部山東司主事甲辰以病乞南改吏部驗封司主事是年八月廟恩詔至晉父如其官母錢贈安人繼母張封安人丙午上三年績書冢宰西磐張公稱其踐履端雅經畫精詳尋進文選司郎中丁外艱服滿復除前官雖委蛇省闥而不耐交際苛禮以故每勞必病遞病遞已癸丑上六年績書進江西左參議明年甲寅總部來南京引疾咨司乞休未允又明年乙卯復之任提調江西鄉試事中丞午山程公御史初泉吳公交薦之共云儀觀雅秩德器靜深雖恬淡疏于應時而孤貞可以勵俗識者韙之丙辰進貴州提學副使中途感疾遂慨然歸中丞玉華高公以公學行優邃宜訓迪多士促其赴任而公竟草疏上之既得請乃却掃衡門一切世好如洗自題齋壁云浮生歲晏是元城斷欲之年虛館雲間正叔寶閉關之地時年僅四十有七耳丙寅御史吉菴王公疏薦明年丁卯隆慶開元御史栗菴宋公又疏薦吏部為開讀事題準起用改除浙江提學副使方抵省疾作移檄乞休中丞玉泉趙公御史仁菴王公並勉留之公下車廣厲諸生務操功令時有選貢事例公宣言曰貢士於朝而不先德行胡以令作人也直指使者報如議而是歲升黜稱當矣諸生沈廷詔黜其妻周氏周氏父禎訟之當事者議纍年未決公駁其招曰周氏不敬其夫凌妾自經離異復何疑周禎逞刁終訟當論如律廷詔令招還復業人心翕然快之又舉人林萬春病故其妻死之議當旌表公獨以為所貴節婦者音年矢志白首孀居上事姑舅下撫襁褓非謂夫死而即死之也夫執親之喪尚稱毁不滅性況執夫之喪乎此過中之行不足為訓但量加存恤可耳持論卓有大體如此無何進江西右參政明年戊辰進江西按察使病不能赴移檄乞休而中丞應谷劉公謂其林居十載望重一時亟為勸駕五月投劾歸吏部寢不行赴任俄進四川右布政已已遞疏皆寢庚午進南京太僕寺卿是年九月又疏乞歸又寢時僕寺法弛而公務張之在滁來等州縣有雇役冗名有偽票諸弊公一一釐正之著為令庶幾民力蘇而公庭帖然唯謹矣明年辛未年六十有一自惟三十年之科名四十年之孱疾顧令皇皇風塵中跋前疐後徒敝形神奚益乎乃移疾辭懇甚賜休沐居里八月以兩宮徽號恩進階一級明年癸酉為今上萬厯改元崌崍張公明臺向公交薦之是年十月進南京太常寺卿公修舉禮樂對越神貺肅如也明年七月進南京禮部右侍郎無何丁內艱丙子十月南京國子監缺祭酒主爵重其選會推首公于是以原官管祭酒事十二月方除服明年丁丑先後兩疏辭時言官以衰病論公不報既而蒙溫旨留用公以國家重賢關謂何而士風侈靡若此乃發揮明理敦奬行誼六館之士一時知所祟尚彬彬興矣居數月當秋祀以足疾不能效駿奔如禮乃乞骸骨歸決策且堅吏部具公清望而為言所以欲歸狀乃訐致仕時年六十有六矣既歸益多病今年首夏忽病自知不起豫屬後事獨居一室戒家人勿前惟焚香晏處暨病革右脅著簀曲肱為枕而逝若假寐者蓋幾於委蛻云嗚呼歲在龍蛇賢人嗟當今辛已公乃死豈其驗耶公生正德七年八月初十日卒以萬厯九年五月十八日得年七十元配朱氏封安人側室俞氏子二長序辛酉舉人次慶國子生女一孫男二長士龍府庠生次士騏皆序出孫女二曽孫男一人女一人公賦性恬穆玄尚遐覽浮遊埃溘之外少時常求大學格致之義而不得其説哽咽終日已而收斂耳目澄思靜照久之灑灑精詣自言一日于幽寂中忽恍然見其良心始知此心虛融周遍本無內外而身內有形之心非吾心也又自言於天命之性亦有真見此其超然洞明所得詎可易測哉以是終日居戶庭謝請謁一意以身心性命為務常纂經傳微言及名流雅尚置諸几案間為觀省助著書若干種藏于家大都皆世外語亦自言著述非其長所好不在也語曰不觀其始觀其終公自通籍如用世然不為造物所羈而終焉髙引以身寄之故在官什三在告什七倦而歸歸而復起行藏天遊而難進易退之操始終四十年如一日也公雖求退無近名而所至政績未嘗不章雖外襲人以和而其中界畛未嘗不辨雖自處甚節約而奉祭祀未嘗不腆承德公性故嚴事之蒸蒸敦謹貴而不倦念翁氏撫育恩既沒祀于家久而不忘為其兄輸粟乞散官以榮身又割宅一區居之不吝子侄御以禮法各斤斤奉其教不殞夫公故不為矯世稱奇之行如他人栩栩保鄉曲之譽然而里閈中亡不雅重其行方其家食喁然相向慕之及沒則簌簌然撫筵而相悲泣之嗚呼古所謂鄉先生沒而祭于社者公其人矣余小子從公里閈間竊習公夫上以纂綴國書下以表著世範史氏事也他不具論論其較著者惟巨公賢大夫擇焉謹狀明通議大夫南京太常寺卿贈禮部右侍郎諡文簡穆公墓志銘王道嘉靖已亥八月南京太常寺卿玄庵穆公以疾終于家訃聞士林驚嘆上悼念經幄儒臣詔贈禮部右侍郎諡文簡遣官諭祭兼營葬事蓋備數也公子符虔奉制書經度兆域將以壬寅某月某日襄事先期持太僕寺卿季守正先生所為狀衰絰蹐門謁銘于余因憶昔隨計吏幸偕公後自是南北宦遊輒得相與過從講習受益于公者逾三十年晚來各謝事家居方圖合併以究至論而公不我留矣發其藴以詔來世固後死者之責也銘何忍辭公諱孔暉字伯潛玄庵自號其所學也世堂邑人曽大父𢎞潞州訓導妣南氏大父彪朴庵處士妣任氏父清耆儒妣任氏繼黃氏公既貴貤恩初封父徵仕郎翰林院檢討贈妣孺人繼贈大父父皆通議大夫南京太常寺卿祖妣妣皆淑人公少穎悟凝重未成童即文章奇古為識者所器年十八遭母任淑人憂哀毁嘔血以善喪聞𢎞治甲子舉山東鄉試第一乙丑登進士第被簡為庶吉士讀書中祕丁卯授翰林院檢討已已預修孝廟實録成忤逆瑾意調南京禮部主事瑾誅還舊職辛未同考禮部會試壬申遷南京國子監司業癸酉以外艱歸服闋改北監司業尋丁繼母黃憂服闋改翰林院侍講充經筵講官嘉靖紀元壬午主順天鄉試乙酉預修武廟實録成升左春坊左庶子兼翰林院侍講學士修武官續黃丙戌主考武舉公凡三執文柄皆號得人試録出識者輒指其深于理者曰此玄庵筆也已而果然是歲入直便殿日講公既以經術侍謂足以行也因攄所得發為講義簡明剴切寓誠規諫聞者皆悚敬焉未幾進掌院事兼撰文官誥敕首遵聖諭崇雅革浮遂定為一代詞命之體庚寅冬十有二月上于文革殿奉安先聖先師神位因諭講臣人各陳經書大旨一章冀以不負所望于是公獨取孟子卒章發其見知聞知之奧以祗若聖天子纂承羣聖之志篇末獻言指切時弊則所謂啓沃交修之實目前緊要之事以仰副聖明之望者也大略謂用人者不肯體聖心布公道使私求者易進直道者難容由是內外大小臣工罔不改操趨時道化未洽皆由于此故欲用人之得其當在聽言之致其審偏聽則蔽兼聽則明以一人愛憎之口為人才邪正之據此用舍之際或有未究于理者矣奏入聞者韙之明年春某月日公已赴闕候講以隂雨免朝隨衆而回俄聞上御文華殿亟馳以趨已不及矣即上章自劾明日得旨改南京尚寶司卿舉朝駭愕給事中葉洪上言穆某聖代醇儒留之左右必足以禆益聖德不報公惟循省自咎無幾微見于顔面壬辰轉南太僕少卿癸已遷南太常寺卿公德望隆重善類推先自為學士至官太常凡十擬侍郎皆不果用然益昭輿論之有在矣甲午夏以疾自陳得致仕歸公自是杜門靜養與世相忘而望實益彰薦剡交上朝野喁喁冀其復起不幸天不憖遺奄忽至此嗚呼悲夫公資稟既純問學尤邃初留意古文詞已嘗窺其奧矣既知其無益棄不復為乃篤志正學研窮義理體之身心其所造卓然處可與儒先君子同不謬于聖人而公不自以為足也嘗謂古之人窮理盡性以至于命今于性命之原習其讀而未始自得之也顧謂有見安知非汩慮于俗思也邪于是抉去藩蔽力肆恢𢎞經訓之外雖世儒所斥以為異端如佛老者悉取其書精擇而詳説之以與吾聖人合曰性中固無是分别相也久之洞見道源通達為一嘗論心學之要曰鑑照妍􅑦而妍􅑦不著於鑑心應事物而事物不著于心自來自去隨應隨寂如鳥過空空體弗礙觀此則公所得信乎玄矣故其見之行也無事矯飾而中正純懿自中禮則孝友之實取重鄉評忠信之德孚于朝著在南雍時父封君適患風疾公左右醫藥食寢俱廢及卒柴毁骨立殆不勝喪後喪繼母亦如之有弟八人皆相繼夭逝公哀悼之久而不置子其孤遺皆至成立宗黨姻友姻睦周至不以貧格恩教人每薰以和人樂親之故及門之士多所成就立朝雖久而位不稱德未究厥施然志操雅正宇量深沈當事變揮霍波瀾反覆之際人多不能自持公處其間超然無預確乎不移泊如也同時縉紳無問趨向同異咸宗仰之以為不可及知德者至擬諸程伯子云晚年忽病脾不能食者數月而神志益清文思焕發皆寫其自得之妙有塵垢斯世遨遊太清之意其於死生去來蓋亦翛然庶幾孔子所謂聞道者矣公所著述有讀易録尚書困學前漢通紀諸史通編遊藝集各若干卷其大學千慮玄菴晚稿則病筆也生成化已亥正月十六日享年六十有一元配張封孺人贈淑人繼配周封淑人子男三長箕早卒次符郡學生質厚而文志掇科第以振家聲故讓廕于弟人皆賢之次筌廕為國子生女二長適國子生劉孝孫次適生員張紱箕符二女張出筌周出也墓在城北之原銘曰大化相扶一有一無實同厥初兮初維道原希夷渺綿玄之又玄兮玄德軋沕蛻形與質反流全一兮流而繽紛各私其羣道術乃分兮不合不公蛙鳴蟻攻邈焉玄風兮不有碩儒孰廓其區孰握其樞兮於休先生清靜為正微妙玄通兮修之於身其德乃真百行肫肫兮蜚英玉堂執經帝傍帝曰汝良兮史凖春秋言代殷周黼黻皇猷兮兆足以行臣弗敢成孫於留京兮夷險升沈不我能煩我玄固存兮浩然東歸玉藴山輝有聞如雷兮天不憗遺哲人其萎珍瘁興悲兮訃悼明廷頒錫易名始終哀榮兮朝聞夕臧殁不有忘公歸無鄉兮穆穆太清神其上征遺魄斯扄兮埋石幽阡詔億萬年曰此玄菴兮南京國子監司業孟河先生溧陽馬公墓志銘李春芳隆慶五年七月二十一日少司成孟河馬公卒於家其子舉人震伯遵遺命以少參環溪狄公斯彬狀來請銘豫執狀潸然淚下曰豫忍銘公哉豫與公論交餘四十年且同舉進士同官詞林復有孫子連姻之誼銘公者舍豫而誰遂為志而銘之志曰公名一龍字負圖號孟河别號玉華子溧陽人也其先為馬服君裔南海郡公訓從晉南渡遂家溧陽五世祖秀夫自了髻山徙居甓橋人稱甓橋馬氏大父清由國子生任衛經歷碧溪公性魯正德辛未進士授兵科給事中歷升尋甸軍民府知府配許孺人生公于河東之里以有龍祥因名龍性資穎異垂髫能詩讀尚書輒解聱牙語長而博綜羣籍涉獵諸子百家詩類太白文類莊孟恥規模前人糟粕故所作直寫胸中所自得意趣天然尤精書法作字懸腕運肘落管如飛頃刻滿幅縱橫閣闢惟意所向初覽若不可辨細玩則條理脈絡具可尋識非茍然者知者謂懷素以後一人碧溪公以言謫官遷尋甸有夷玀變致罹誣獄公時為諸生即力疾伏闕上書情詞哀切世廟矜而釋之尋援例入胄監嘉靖戊子中順天鄉試第一五䇿詳贍海內士子爭誦之碧溪公喪公痛父寃憤而終也哀毁骨立水漿不入口幾不能生母氏多方慰解始強食居廬三年釋服屢上南宮不第時豫亦落落難合相顧笑曰我輩豈終蓬蒿人耶丁未澶淵宮洗朝公瑮奇其文録之閣臣雅重公才特破限年例改翰林院庶吉士時許太孺人春秋髙乃疏乞終養歸承歡昕夕嬉嬉然若孺子母終哀毁如喪父時服闋出補國史檢討奉綸命册封衡德二府餽遺悉却不納已未分校禮闈祟雅黜浮所拔皆知名士擢南少司成攝大司成事繩約諸生悉遵矩矱諸生不樂檢束有造飛語中公者公不為動曰吾知盡吾職耳庸恤其他條上成均八事語多譏切時政僚友止之不果上今其草具在遂疏乞休浩然長往構務本書院方山之阿日與鄉里後生講習其中窮究心性之學經年不入城市有司罕覩其面捐粟數千斛新尊經閣手書六經勒之石僉謂有功學校云建合宗祠置祭田百餘畝以供歲時享祀有餘則貯之以贍族之貧乏者嗟乎世之才髙者多濶略于踐履氣豪者恆俯視乎等夷公有卓越之才負豪邁之氣少雖任放中就檢約動必遵義晚涉仕途未嘗折節權貴熏心利欲而孝親睦族又其務本之大者至于虛已受善人有一才一藝必稱服以為不及尤人所難若公者其所謂見大立大者哉所著有玉華子遊藝集五十六卷行于世其中如天問等説庶幾達造化之原矣百世之下讀其書可知其人矣公生𢎞治己未五月初三日享年七十有三銘曰學而務本曰孝曰睦仕而知止不殆不辱名滿寰區神返寥泬卓哉斯人一代英傑尚寶司少卿北山先生濮陽李公行狀邢侗當世作者率推歷下李先生是謂于鱗不知更一李先生出濮上其齒同其居朝之日同其談議同其所不同歷下簡貴不昵近人而濮上伉爽敢決任俠自豪兩人者論難過從瑕瑜不相貸也逮後歷下名愈髙濮上若為所掩乃先生修戈偫糒未嘗一日忘于鱗云濮上名先芳字伯承初號東岱後更北山元美猶用東岱命詩筒先生生而蚤慧又膚色玉潔也比當東髮與在駙馬籍中父母強行使者林君調之謂李郎濮上良佳帝以壻鄉遺汝矣先生正色曰芳聞龍門不聞鳯簫林君內恧而奇之尋罷歸例與青襟先生獨不受也再年試而為青襟二十舉於鄉僅亞第五人進士不第去而遊太學凡三下第而遊道日廣韞負日以奇丁未舉南宮髙第需次得江西之新喻焉新喻僻悍民俗疏闊視事大小賕吏不知官城壞虎夜闌入市蛇鬬寢門室人交遍謫先生矣先生夷然謂邑故沐猴今令其無三尺乎乃伺隂岡大盜謝某等悉禽論法又得豪牧長嗇夫而罪之其所當他獄裴仰三劉本等靡不驚詫若神邑人章浚家纍巨萬誤為大盜連染先生出之浚以一硯為壽先生謂此他山也者置之守藏不問也一日藏吏白前硯非石實銀先生笑曰陶泓清士辱以朱提立召浚而還之由是新喻之政冠冕江國卒以不善骫骳三歲得民曹亡何祗役留都抵舍及先尚寶大故拮據終喪北上改授刑曹郎于時諸郎髙伯宗究心經世彚粹本朝故實為鴻猷録先生手所著書而言曰我思古人實獲我心余其改慮從事乎乃輯近代一切名家詩而繕之逾年亦成書人謂西曹雙璧名籍籍動巖廊矣居頃之改尚寶司丞尚寶清嚴地居右廣往往唾手上卿先生侮僚任子如嬰兒寖不懌遂乃欲甘心矣已未充殿試受卷官已奉節册臨德藩德藩鄉郡地州邑令長為負轥矢御五封軺如臨卬先生略不為意撫中丞萬安朱公直指襄陽劉公俱以氣調修平生歡先生平揖而睨之餘客莫得前使事告竣升本司少卿壬戌再充殿試受卷官是年屬弟茂才同芳迓母劉安人就養京邸傾槖為弟費獲需次趙府審理副母氏悅之故事繡衣握方寸印出行部部使率赴尚寶授受以為常使者劉宋入先生趨受印劉宋目從行黑衣先生曰印不足受尚寶不足交酬耶而目黑衣為二使者大銜之會歲大計因嗾諸螫者左其籍得亳州同知先生自負遷謫人一意斷擊無少避回又州孫守即墨産用并里故莊先生以亳州屬之先生為立程課督其援上居間者若輩滋不自安遂風校官劉某羅他事擠先生復私淮安劉通判與謀通判即恚先生以州同據其上座者也先生未幾擢丞寧國見謝眺青山而樂之聞鵲鎮鐘聲而泠泠然善也至持潔令不詭隨人視亳無異寧二千石以下憚之用前校官通判中傷坐臺抨竟回籍先生適在壯年毛氂無戚容曰天其以山林奉我而以渦水之微坐進我我奚為不豫哉且夫藏山之業什吾得其二三而嗛六七豈吾稅駕日乎吾其涖盟于鄉悉索鄄師以與中原合吾而足自老矣歸之又二年劉安人謝杯棬不以既艾減哀及禫撫中丞薑公薦于朝寢不報先生邑而搆清平閣蓬玄洞野而營會丘臺拾翠軒草屩籜冠吟嘯其間未一日而廢酒未一日酒而廢詩書未一日詩書而廢管絃絲竹也先生生産故饒復善計然白圭之䇿室計錢帛谷量牛馬靡不中訾乃者囷與親交粟笥與親交衣囊與親交財緩急與親交衾襚為德於生者倪文學朱節卿趙纍人范貢士若而人為德于死者蘇尚書龔觀察邢宗義侯繼宋若而人為德于家者叔四老從弟靈寶仲升輩猶子如杜輩從孫炳輩若而人為德于僦者余秀仁周正照楊仁輩若而人肺腑而友朱學博周太守蘇鴻臚蘇孝亷蘇右史藝文而友李于鱗王元美殷正甫宗子相徐子與謝茂秦黎惟敬歐禎伯張助甫王師古魏懋忠傅伯俊董元仲宋登春吾師束阿不佞侗相吏而友兩御史大夫南充王公黃安耿公兩大司馬銅梁張公登州陳公一督府重慶蹇公于喁鼓吹視柳宗元所稱先友不啻過焉先生家蓄聲伎倍蠻素園勝履道文匱副名山諳曉琵琶理類琵琶行其對蘇八右史談此四鵾雞大俠雅音夫沈沈而牛鳴窖中者宮也野雉登木者角也餘可推言江東查八十聞而伏之晚以目眚盡遣侍妾曰吾駱無可賣伎省可驅耳先生者抑白公樂天之儔與其自署達生不虛矣先生所著東岱山房稿三十卷已行世外為大學古本四書解毛詩考正春秋辨疑漢注疏臆老子本意解隂符經心經解五嶽志略拾翠軒雜纂十三省歌謡本朝安壤新編古交編闡微録明詩纂醫家須知壺天玉鏡蓬玄雜録凡五十萬言藏于家狀曰元美之序先生詩也謂似宋延清似王摩詰似劉隨州至樂府則謂于鱗似合似離先生以離為合若小有軒輊云者夫樂府不必言言歌行言律言絶則有唐三子未必遽操前矛于鱗未必盡歸左袒矣要以于鱗才致橫軼孤髙響絶發脣􅋆耳駭目洞心矣徐而求之聲實衡而肉好倍繭絲溫而麩麥飽則先生寧甘左辟于于鱗也先生辛巳向豫言余為詩成于鱗始學詩余見于鱗于元美元美悅元美稱五子而余見汰余歸獨往獨來而五子疏試取余言與五子較同乎異乎是宜弗相急而寢相遐也余時不敢答今十五年獲執役于先生豈復能為曹好語用先生指狀先生耳大抵先濮之音淫而先生易之以雅于鱗之言法而先生濟之以通隆萬之趨史而先生主之以騷于鱗起白雪而先生倡清平厯濮互上下兩君相頡頏其取舍未始不相同也先生裔孫鴻臚君以治命命不佞侗狀將詣宗伯師丐銘焉夫弟子為先生屬草則可粳粃而為珠玉導則不可心喪記赦敬吾師大宗伯李雲中先生之喪元子宗衍斬然衰經匍匐三千里伏闕告哀聖天子軫念五朝元老詞林舊臣進爵宫保發帑金治葬敕守臣薦俎豆恩綸哀奬光賁九泉不腆下邑三百年來創見之曠舉也區區白首老門生獨抱疴荒郊柴扉晝掩垂三十年不能出門户襄大事縱觀盛典致書天使曰民生君治師成終身北面服勤至死同也孔子大葬門人為臣今日之事區區不當供奔走乎老病癃殘不能躬執紼荷畚臿覆一抔之土生有餘恨死有餘辜為人弟子之謂何宗衍譬余曰何傷乎老者不以筋骨為禮死者不以資送為財子誠衰老雖然舌存有筆如椽不助生者以力而贈死者以言先君沒且不朽余承命飲氷焉明日偕其弟宗工來齎金錢若干餉余下逮管記皆有賞再拜稽首乞墓志碑銘且屬友人周思皇從臾余倉卒無所隱避直對曰不能往拜稽首郤金還之宗衍愠見曰非不能也是不為也昔山人朱衡死足下為作佳傳何獨靳于吾先子豈其忘一日之雅而以生死二心無乃謂藐諸孤不足與言而懷璧不售余不能已就思皇所屈指而心數焉曰弟子為先生頌功德分也然須量其人勝此任否為長者折枝追履奉杖語人曰我不能是誠方命有罪矣責以負千鈞涉逺道氣匱力乏其若之何文人死須文人作傳公卿大夫死須公卿大夫題銘乃為同調知已輕車熟路豈經生訓詁酸饀語可充數也其不能一也平生未嘗為應酬文字惟貧交朱山人死草草作一傳山人竈下名迹兒女家常米鹽語若吾師儼然青宮少保天子大宗伯位台輔學貫天人望重南金北斗揚厯中外五十餘年宦業文章懸宇內雖談天炙轂之士未易覼縷如昔王大司寇元美汪大司馬伯玉今董大宗伯玄宰官同才同學同乃為同調知已不取諸彼而濫委之龍鍾老門生引山人為例是使膜母貌西施也不能二也他人志銘信口隨筆人未必屬目李雲中先生志銘出自門生手不知經幾人磨勘巧索瘢痕而余以鹵莽滅裂之才受此鉗椎作千萬人笑端其不能三也余雖讀書止于翻閲檢校雖著作不過解説經義訂訛誤質道理疑難耳至於鴻章大篇官常朝典䇿勳揚勵勒鐘鼎金石如所謂碑版志銘者生平無此才亦不作此想未嘗蓄此具應此征役一旦催科督責不已所謂重為任而罰不勝逺其途而誅不至也不幾于持人之短而乘人之困乎其不能四也犬馬齒七十有四尸居餘氣薄業茍就將盡焚筆硯束書髙閣澄心默坐俟一息之盡耳旦莫之人尚暇與毛穎作緣自取葛藤其不能五也五者皆肝鬲之要宗衍不加察請足下善為我辭思皇以告宗衍艴然不悅曰文章公器也師弟子源委也功不必自已出以夫子之道還事夫子若之何不能五十年門下士授書破萬卷不能為先生贊一詞著作盈箱山草數十種不肯為先生作一傳漫自數曰不能不能吾聞其五矣請言其六余情窮語塞口重意滿淚淫淫下耳卒乃不得已而即素所奉教于先生者引繩批根與同學二三君子對揚以當志銘可乎猗與先生髙才博學為一代文章宗盟士林所知也其為人也溫恭醇懿如玉如金而又倜儻仗義重然諾好施豫不責人報雅度豁達多可而少違故士爭親附賢愚僉忘交遊遍海內德行道誼尤為一代詞林人物之孤表也逺邇內外親疏行道口碑鄉里月旦同然無間言余嘗擬以遊夏冉閔合為一人非阿所好也蓋聖門教學二曰文曰行文易而行難也孔子自謂行未得而文莫猶人況庸衆乎文又二曰經術曰詞賦詞人喜文藝而詆經術為陳言薄行誼而誇詞賦為風雅故經生之文詞人之文未可方駕也余之從學于先生也以經術進而先生之教余為文也以行誼先世稱詞人寡行莊士少文文行交修行誼經術盡美者古今惟孔孟二聖為千萬世斯文主論語二十篇以德行為言語周易十翼大學中庸以性命為文章孟子七篇以養氣為知言以放淫距詖為雄辨是故孔子之文如瑞日祥雲和風甘雨孟子之文如髙山流水光風霽月文章到孔孟所謂大明中天也三代已上虞典盤庚大誥周易彖爻之文深沈隱奧是平旦昧爽之交秦漢以後諸子百家蟬噪蛙鳴是返照之落暉也不可謂之非文而去六經逺矣去道德逺矣此孟子所謂道不同姑舍是也大抵經術言義理而傳志紀人物義理無適莫而人物有毁譽自非孔子不敢作春秋而遊夏不能贊子貢好方人而孔子以為我不暇司馬遷作世家列傳年表試使為道德南華必不能矣老子莊生為史記則能之而不暇此文章華實取舍之大較也故余之下帷注九經也十有六載而緒言出先生見而喜署其尾曰余鹵鈍仲輿從遊久于經無半字發明指授不圖晚年得此惺惺仲輿幸不虛度一生書其後方以志幸雖先生過謙然亦足以見經術之為絶學自孔孟沒而六經義理曲暢旁通者百不得一焉經術與文章渾融一貫者萬不得一焉惟吾師兼之而讓不居余何人敢兼取之乎是以寧蹈襲偏安而為經生不欲攘竊兼併而為詞人也且也今之詞人是古之所謂負販也資翰墨為壟斷假鉛槧為市利邀人作佳傳而索米算文字若干而償絹以賣文為美談以多藏為勝事自昔賣文多藏惟唐北海太守李雍杜甫為詩諷之曰干謁走其門碑版照四裔各滿深望還森然起凡例豐屋珊瑚鈎麒麟織成罽紫騮隨劍几義取無虛歲衆歸賙給美擺落多藏穢此殆于孟子所謂為宮室妻妾之奉窮乏得我而為之者不幾於貪叨市賈乎哉余束髮離經即薄此以質諸先生先生曰然語在山草序中余不欲舍所學以變生平焉敢犯所知以忝師門使余諛墓攫金是以所賤事師也使先生以不志墓討余是以衆人責我也必不然矣豫讓有云國士遇我國士報之吾何以報先生哉唐㫿曰人有德于公子不可忘也吾何忍忘先生哉不朽者德也不泯者心也傳曰君子賢其賢而親其親此以沒世不忘也先生賢我親我者至矣幼而多難微先生則為釜中之魚機上之肉矣貧而落魄微先生則為溝中之瘠桑下之殍矣長而無術困而不學不從先生遊則如井底之蛙不知天之幾大如壁中之兒不知馬之幾足矣嗟乎余何忍一日忘先生哉禮師死心喪三年先生年八十考終余僅少六年耳年有限而心無窮吾以心喪終吾餘年已矣故為記記吾所以喪先生者以心不以言使衆人知吾所以銘先生志先生者不在言在心是為心喪記崇禎四年仲冬門人郝敬頓首拜撰明文海卷四百三十八
