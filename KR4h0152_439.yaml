body:
  text: 明文海巻四百三十九餘姚黄宗羲編墓文十一儒林鹿皮子墓銘宋濂婺之東陽有隐君子戴華陽巾裁鹿皮為衣種藥銀谷澗中當春陽正殷翫落紅於飛花亭上亭下有流泉花飛墜泉中與水相廻旋良久而去君子樂之日往觀弗厭既而入太霞洞著書其書縱横辨博孟軻氏而下皆未免於議論元統間濓嘗候君子洞中君子步屧出速坐之海紅花底戒侍史治酒漿葅醢親執斚獻酬歌古詞以為歡酒已君子慨然曰秦漢而下説經而善者不傳傳者多不得其宗淳熈以來羣儒之説尤與洙泗伊洛不類余悉屏去傳註獨取遺經精思至四十春秋一旦神㑹心融灼見聖賢之大指譬猶明月之珠失之二千年上自王公下至氓𨽻無不倀倀日索之終不可致牧竪乃獲於大澤之濵豈可以人賤而并珠弗貴乎吾今持此以解六經决然自謂當斷來説於吾後云濓乃避席而問曰其意云何君子曰吾以九疇為六府三事而圖書為易象者不可誣以片言統萬論而天下古今無疑義以庸言釋聖經而野人君子無異詞謂神所知之謂智知天下殊分之謂禮知分之宜之謂義知天地萬物一體之謂仁禮復則和之謂樂謂天地萬物一體經子之㑹要一視萬物則萬殊之分正家齊國治而天下平矣濓未逹請復問其詳君子曰國家天下一枳也枳一爾而穰十焉枳有穰而一視之其於人則仁也發而視之穰有十則等有十其於人則君臣父子長㓜之等夷刑賞予奮之殊分所謂禮也視十為十者禮之異視十為一者仁之同分愈異則志愈同禮愈嚴則仁愈篤者先王之道也分愈異者志愈同故合枳之穰反求其故地枚舉而銓次焉者差之黍銖則人已無别犬牙錯而不齊歛之不合而一不可見禮愈嚴者仁愈篤故治國家天下者不以禮則彛倫斁禮樂廢而仁亡是故洙泗伊洛朝夕之所陳者天下萬殊之分視聽言行之宜所操者禮之柄耳故學聖人者必始於禮焉故一體萬殊者孔子之一貫於洙泗伊洛之言無不統者也理一分殊之義廢則操其枝葉而舍其本根洙泗伊洛之㑹要不可見章句析而傅㑹興遺經不可識矣濓受其説以歸間嘗質之明經者或者曰近時學經者如三尺之童觀優於臺下但聞臺上語笑聲而弗獲見其形所以不知妍􅑦惟人言是信君子之論偉矣或者伊洛之學大明於淳熈未易遽取舍之也自時厥後為貧游仕奔走於四方不及再候君子以畢其説聞君子益以斯道為已任汲汲焉惟恐不傳靡晝靡夜操觚著所見於書書成即刻梓示人復貽書於濓曰予瀕死吾道苦無所授子聰明絶倫何不一來片言可盡也憂患相仍亦未及往而天下日趨於亂君子之室廬亦燬於兵寓子婿王為家留六年之久遘微疾黙坐於一室不食飲者踰月縣令遣醫來視疾君子麾去曰吾年八十又八其死宜矣何藥之為未幾翛然而逝實至正乙已十月戊申也君子姓陳氏諱樵其字為君采因其衣鹿皮故又號為鹿皮子表隐趣也其先居睦之富春宋之中葉來徙東陽太平里世為衣冠巨族曽祖居仁祖嚞登仕郎父取青國學進士從鄉先生石公一鼇與聞考亭之學有志節嘗抗章詆權臣賈似道誤國及宋亡元丞相巴延見其章欲用之辭君子㓜學於家庭繼受易詩書春秋大義於李公直方其於天下之書無不讀讀無不解學成而隐邈然不與世接惟寤寐羣經思一洗支離穿鑿之陋形於談辨見於文辭恒懇懇為人道之文辭於狀物冩情尤精然亦自出機軸不蹈襲古今遺轍讀之者以其新逸超麗喻為挺立孤松羣葩俯仰下風而莫之敢抗或就之學則斥曰後世之辭章乃土之脂澤時之清玩耳舍六經弗講而事浮辭綺語何哉少作古賦十餘篇傳至成均士徒競相謄冩謂絶似魏晉人所撰君子則諱之不復肯為也君子足跡末嘗出里門而名聞遠達朝著知名之士若虞文靖公集黄文獻公溍歐陽文公𤣥皆慕之以為不可及移書咨訪如恐失之性復至孝父患風攣君子扶之以行嵗久益勤後為風痰所侵氣弱不能吐君子截竹為筒時吸而出之母郭夫人歿君子不見見其遺衣輙奉之嗚嗚而泣生平未嘗言利茍非其義千駟萬鍾弗為動家雖素饒於貲痛懲膏梁之習惡衣菲食以終其身遇嵗儉輙竭粟賑閭里自取來牟以續其食嘗發所藏錫為器工人持歸乃白金也悉易之或以告君子君子一笑而已嗚呼君子已矣世豈復有斯人哉君子所著書曰易象數新説曰洪範傳曰五經解曰四書本㫖曰孝經新説曰太極圖解曰通書解曰聖賢大意曰性理大明曰答客問曰石室新書曰淳熈糾繆曰鹿皮子曰飛飛觀小稿合數百巻君子正配朱氏先若干年卒生延年大年耆年喬年昌年大年至正庚寅中鄉闈一榜第一署徽州路歙縣教諭側室某氏生逢年君子沒時諸子惟喬年在餘皆先卒女三人其婿即王為次則俞某張紹先孫男九人庭玉庭珪庭筠庭鸞庭鳯庭堅庭誨庭某庭某女四人適徐信俞本虞某闕某曽孫男五人紹宗超宗林宗某宗某宗女三人在㓜喬年庭堅等洎王為以是年十一月某甲子奉柩塟於縣西南四十里懷徳鄉斗潭山之原縣長貳及學士大夫門弟子咸㑹莫不洒泣塟後五年其高第弟子楊君芾乃為撰列行狀一通而喬年同王為持示金華宋濓再拜請為銘嗚呼君子以超絶之姿曠視千古若一旦暮期以孔子為師而折衷羣言之是非不拘偏曲不尚詭随必欲暢其已説而後已可謂特立獨行而無畏懾者也非人豪其能之乎雖然淳熈二三大儒其志將以明道也初亦何心於固必使君子生其時與之上下其論未必無起予之嘆而君子之衆説亦或藉其損益以就厥中則所造詣者愈光輝混融而卓冠於後先矣天之生材相違而不相値每如此竟何如哉然君子措慮之深望道之切其所傳者確然自成一家言殆無疑者世之人弗察伐異黨同常指君子為過高是豈窺見其衡氣機者哉濂也不敏竊有慕洙泗伊洛之學有志弗强日就卑近不足以測君子所至之淺深而君子則欲進而教之今因請銘故備著昔日問答之辭於其首後之傳儒林者尚有所稽焉其稱為君子者君子葢有徳之通稱尊之可謂至矣銘曰洙泗傳聖髄兮伊洛發遺精天人既混合兮隂陽悉包并無聞不開闡兮金石奏和平自兹益演繹兮白日中天行如彼蓺黍稷兮薅去莠與稂舂實既白粲兮詔使來者嘗有夫起東海兮吐言一如鏞噌吰逹幽隐兮務使聲遠揚豈欲異塗轍兮理致無終窮著書動盈車兮片言類括嚢中有萬寳玉兮包絡無遺亡解之溢衆目兮瓌異吁可驚似兹海外珍兮神光華如虹茍施琢刻工兮定可獻明廷下可奉公侯兮上可奠方明胡為堕空山兮猿狖埋光晶鹿皮剪為裘兮峩冠賸垂纓臨流翫飛花兮心與太霞㝠清風與逸氣兮横絶宇宙中食道身自腴兮疇計禄位豊婆娑太霞洞兮卒以上夀終斗潭向東流兮内有八尺塋鬼神必呵衛兮靈氣結華英永為文字祥兮千祀随休聲汪先生墓銘新安之婺源有隐君子曰汪先生諱炎昶字茂遠學聖賢之道不求聞於世年七十八以元重紀至元戊寅四月二十四日終於家初元既滅宋宋太學生孫公嵩悲哀不自勝歸隐海寧山中誓不與世接發為賦咏以寄其無窮之思孫公同時進士許公月卿亦入婺源山中製齊衰服服之以識其終身哀宋之意此二公者皆新安之節義士先生受學於孫公而與許公門人交友故自少慨然無仕進意先生壯時元有天下已久宋之遺俗變且盡矣而先生衣冠動作語言禮度猶宋人也後生小子去宋遠無從徴之見先生咸以為先代之遺賢而先生亦曰吾古逸民也學者因稱之為古逸云先生少凝重記憶不能過人然刻苦專篤雖執匕據枕不廢誦習力久思深該貫宏博遂無所不覧要其歸宿精索於六經而詳究於孔子孟軻曽参子思之言叅之以伊洛大儒傳註之説絲析髮解日攻月較不故求為異而亦不茍為同其所自得既形於言雖不欲求人之知然人有辨其未至者必樂而從之終其身未嘗自以為是也其教人履庭躋級具有條序為文竒而不肆遇時觸物輙以詩達其情婉切悽壯人傳誦之蜀郡虞文靖公集巴西鄧文肅公文原皆盛稱其才而先生志操之高人莫之知也先生家貧事母能致其樂母年八十九先生亦老矣䕫䕫祗肅進食奉水必躬親之母為忘其貧先生將終整冠坐命家具蔬食少飱置筯戒諸子以祭祠之禮言畢正身歛手而逝先生之曽祖諱冲祖諱天衢父諱季安裔出於唐越國公華娶江氏生三男子曰淮琛照乗棠金照乗為弟禹玉後一女適詹某其孫男三人曰某某某先生所著有四書集䟽藏於家詩文若干卷先生卒時棠金已死淮琛貧未能塟命從子壡告於先生之門人趙君汸請輯羣行為狀趙君以末塟辭既而淮琛亦卒後十九年至正丙申某月日壡始買地塟先生於黄京山高路原又以為請趙君乃為狀屬余銘余諾之未獲為去塟之嵗又二十四年余欲銘先生墓而趙君之死亦已久矣於是撫几歎曰先生之卒今始四十餘年而先生之子及門人知其事者皆已亡矣使復越四十年其能有知者乎為善者固不冀人知已然有善而不聞於來世後死者之責也乃本先生之志為銘以告世之知先生者銘曰朔風荒荒海水赤矣宗社為墟將安即矣冠履倒植命之忒矣高蹈避世舍道焉適矣彼夸者子羣趨溺矣人之攸樂我心戚矣為陵為淵孰失得矣嗚呼先生千載是式矣明文海巻四百三十九
