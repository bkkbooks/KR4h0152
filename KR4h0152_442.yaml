body:
  text: 明文海巻四百四十二餘姚黄宗羲編墓文十四儒林明故大理寺副東嶠先生李君墓誌銘楊循吉往年予再官禮曹居京師大理評事嘉魚李君實為之友君清介絶俗不屑事事與人言未嘗不期於將退予别君歸之三年君果遽以病謝官去時其弟鄉貢進士世卿方築釣臺於黄公之山而不出遂從居焉君歿既塟未有銘世卿求君之遊於門者吏部侍郎王公將為之銘公在疚以屬予敢書其一二大者以為叙而後銘君諱承芳字茂卿五世祖遠為譯史曽祖煥仕洪武中為四川鹽課大使祖善珙縣教諭皆皇贈都察院副都御史父阜贈大理寺評事君自㓜頴敏强於學出言論即侃侃驚人其後通經史泛及百家為文章典贍有法遂知名荆楚間年三十有七領鄉薦四十一登進士第既授官素貧無鮮衣良馬儉約如儒生時性高慵不喜羈束旦日入寺習唯諾趨走退據案執筆署銜尾還邸破屋寒冽煑蔬飯糲或出逐人事無少休用是無一日快意其歸計遂决嘗謂予曰吾得俸錢足三十緡可津而南矣居三年陞副於右寺志少就乃老君平生讀經書每謂聖言簡大後世訓詁繁支牽合不㮣於道道由是益翳遂奮然著論斥其非往往見於述作間聞者羣訶衆詆至大罵君不為改惟一二好古者信其言以為然然君以是取譏亦以是自立真有志力人也歸五年屢空兄弟相對談心焉𢎞治壬戌五月二十二日君卒年五十三前配孺人石氏生男二人長曰肇次曰棨女三人婿曽恩進周夔袁褒後配嚴氏一男曰瑗世卿以卒之年臈月塟君於蒲圻烏石湖之旁明年始克治銘事將啟其前而納焉塟速不得備物權於禮也君天性孝友與人交尤篤信義其論治道以教化為本立論高古非拘拘者而世卿蹈竒節尤甚至是實以其二子來其名曰李整李教蓋浮江千里其一家之樹誼若此銘曰可尚也已繄斯人之賢兮既顯兮維時治平有邱而掩兮吁嗟先生正學先生道林蔣公墓誌銘孫應鰲嵗嘉靖己未冬十月某以省覲道武陵侍論道林先生桃岡三日期涖官再侍焉逾三月某以涖官復道武陵未至前十日先生屬纊矣十二月三日也嗟痛哉先生夀七十有七感時疾諸門人侍疾惟論學無他語疾革作詩二章歌咏傳性傳神之微貴竹汪君若泮持馬君廷錫書至仍就榻與論中庸首義命其子如川如止曰我化桞孟卿侍我久撰我行誌我者孫山甫乎是夜分瞑目衣冠端坐逝越六年乙丑孟卿具有狀於是某再拜謹誌其墓先生為海内鉅儒禀受既粹潔而究竟於學問者益醇氣量既𢎞毅而蕆明於師友者益精鍜錬於貧病者證之彌切故體察至真厝注於事應者用之愈彰故踐履至熟衛道則剖判微渺防之甚嚴守徳則兼融動静持之至宻中和㴠諸心光彩煥諸外型範被諸人述作流諸後藹焉春廻燦焉星布嶽焉山立沃焉海潤光大孔門厥功偉矣始先生少與闇齋冀公元亨友善交砥礪已乃陽明王先生自龍塲謫歸先生見焉陽明謂冀公曰作顔子者卿實也無何先生病久之噦血於是寓道林寺一室自養黙坐澄心常達晝夜一旦忽覺此心洞豁宇宙盡屬一身呼吸恫瘝全無隔閡虛白盈室溘焉病已乃信大公廓然無内外之㫖此身與萬化有流通之㫖自悦自樂自慊自成悉由自得由是神明煥發有不言自喻之趣後應貢入京師謁甘泉湛先生執弟子禮甘泉每與議皆契合随侍甘泉於南雍時尚書費鍾石公宷司成魏莊渠公校一見皆嘆服以為不及海内士問學有不之甘泉而之先生者官京師時與太原潘公高江西徐公樾六安潘公子正徽州汪公尚寧歸安呂公光洵日相講明正學官蜀時蜀之士石洲張公鑑請設講大益書院官貴州時建書院二左文明右正學集諸士講之凡所至冀望指凖莫不鼔舞興起逮晩年家居隐善徳山門下士日集復再遊南岳衡之士請設講甘泉精舍石鼔書院遂省甘泉増城粤之士請設講獨石書院増城返始卜築桃花岡為精舍門下士遠近大集以精舍田所入廪之如向君淇軰自數百里至吳君宗堯章君評軰自數千里至縉紳聞名者亦紆道至先生苐四孟祀祖考一歸日惟危坐慎獨堂大觀樓與諸士究徹言警發㳺息歌詠風雅如是十有六年先生聲言大致備文集續集後集中不具論其實見道本如古大學義桃岡日録講義訓規所載與摽摘羅念菴公洪先冬遊記答何吉陽公遷論學諸書咸闗閩諸儒所未逮所繇掲日月以啟後塗皆千古正鵠未曽有者先生年十八為縣庠家故窘不給饘粥舊居陋巷復燬乃僦舅屋以居正徳改元捧詔沅江沅令知其貧稍厚餽先生不為顧督學使張甬川公邦竒御史毛東塘公伯温先後至郡試士得先生大竒之尋居母憂不用隂陽家以厯内日吉從事里人嚴氏盡疫無與往來先生朝夕之得全活嘉靖戊子舉南畿鄉試壬辰登進士授户部主事丙中改擢兵部再擢四川按察水利僉事播州土酋私餽金立叱出闗堡戍守久廢苖夷白日格殺人即條其事得復舊商旅為通至則咨詢民隐茍利於民不以忤當道及權力人為忌議罷岷江之東諸水驛供億嵗省無筭議茶馬法一復秤盤二禁湖茶三限引目私額一時盡堕今猶守為成軌攝按察事亷得寃獄二釋之攝提學事汰冗濫杜絶求托人不敢干以私有方士以妖術憑愚民武斷大衢中人莫能近先生召前立方士作術不復效置之法已亥擢貴州提學副使作聖諭衍寓約束好士愛人眞氣流盎於是士知崇正學莫不飭名檢賢者勸不肖者媿且革奏益普定十四衛廪生額奏改湖廣清浪五衛附貴州試城中黠民易裝若而人匿宣慰土酋所不逞廵按趙方厓公大佑捕之宣慰土酋紏衆揚亂為挾持訃自廵撫下莫不謂當撫先生正色曰寧亂而斃我撫何可行也命人諭以法土酋戢衆遍歸癸邜先生病且亟求致仕廵撫劉公彭年難其請適督府檄藩臬官各一詣幕府議狀劉公遂屬先生行得便歸武陵劉公聞先生疾且愈又數使促之來乃御史魏君初至宿憾先生遂劾先生自離職於法不便適宰丞亦宿嫉先生名㫖下若曰此講學蔣某罷歸籍仍𨽻編氓行之日貴人士號泣持輿先後不能前為詩慰朂之丁未冬奉恩詔得復其官如閒住例先後部使薦先生宜為宮輔為司成䟽凡幾上不報凢鄉里後學可接引接引之郡邑有隐痛郡邑吏造請殫告之鄉里朋友不能殯殯之有難恤之郡邑民無大小敬依先生若神明若父母雖永順保靖土酋提兵亦必再拜先生之廬然後行蓋先生蚤得聖門天地萬物一體之宗其論雖殊其本為要於知止知止為嚴於慎獨慎獨為妙於黙識黙識為融於勿忘勿助之間其綜之為成此仁於一身故凡學術偏外皆不敢望厥宮墻而乾乾終日即一息尚存清明獨照沒其身一言一行靡外天則斯躬行君子哉先生諱信字卿實姓蔣氏既沒學者私謚為正學先生先鳯陽人洪武初五世祖諱文舉來判常徳因家焉高祖俱不仕父諱經别號恵菴贈兵部車駕司員外郎有厚徳鄉人稱為長者母萬氏贈宜人成化癸邜八月丁亥為先生始生初娶姜氏再娶李氏三娶桞氏子三長如霖李出次即如川如止桞出俱府學生女四長適楊應寛次適李與檀次適陳可禹次適張天秩俱庠生孫男四孟賢縣庠生孟祥孟才孟竒曽孫男一辛酉二月九日塟於金霞山之羅帯峯銘曰衡南之山鬱崔㟢兮江漢洪流兮深廣無涯鍾祥炳靈兮哲人生而鄒魯路迷豐蒿萊兮白日黝堊唐虞世遠道何卑嗟哉我心將安歸哲人兮哲人手芟榛莽袖拂囂塞之霧埃大道如流水景風澄朗青天開哲人行藏和且怡哲人觀化兮獨遺我思我所思兮衡之山邐迤江漢離離金霞之山突起兮相掩映而崥􅒈哲人肉骨藏在斯兮千秋萬年永無虧金霞兮自今哲人交為依南京禮部尚書致仕贈太子少保謚文恪月湖先生楊公墓誌銘羅欽順國朝士夫留心理學者蓋往往有之以余所聞若河津薛文清公崇仁吳聘君安仁胡敬齋所見若蘭溪章文懿公晉江蔡虚齋豊城楊文恪公則君子之論皆無間然者也文恪公之學開端用力得之其父復菴先生復菴師胡先生九韶胡之師即聘君也淵源固有所自若夫旁搜博取窮深反約則公所自得為多其平居之應酬立朝之議論篇章之著述政事之敷施大抵自其學術中出可謂名實相副者矣乃今已矣公諱亷字方震號月湖一號畏軒姓楊氏世家豊城邑中曽祖諱徳義祖諱行素父諱崇仕終永州知府復菴其號也以公貴祖父俱贈南京禮部尚書祖妣某氏妣劉氏俱贈夫人公自㓜頴悟過人成化丁酉以邑庠生中鄉試第一丁未㑹試第三廷試賜同進士出身改翰林庻吉士移疾家居庚戌授南京户科給事中丙辰内艱服闋改刑科戊午以便養請改南京兵科初管後湖黄册即奏行清查法請與户部委官各行囘報以相叅對由是所杳户籍無弗實者兵部議謄洪武永樂年間册公奏言年遠册或不完暴之天下姦且日滋非便然遠年之册誠户籍根源宜添造册庫稀架薄堆以便掲查晒凉從之公志切匡時以經筵講學為出治之本䟽每上必懇懇致意嘗因地震劾奏用事大臣首薦張元禎吳寛李東陽王鏊劉戩宜備日講講讀書宜用大學衍義時論韙之吏部尚書王恕被䜛力言公卿中不可無恕所宜優禮請斥遠䜛邪無為所惑楊茂元盛應期因事獲譴亟奏乞叙復他所論薦如周瑛周孟中王鴻儒張吉王雲鳯劉元劉大夏謝鐸林俊曹璘等皆有時名屢上時政便宜凡十數事又两因邊鎮有警陳言備禦數事朝廷采用幾盡又嘗論宋儒周程張朱從祀之位宜右漢唐諸儒又因闕里重新請更立木主以革俗陋偶未及用識者惜之庚申陞南京光禄少卿嘗入賀千秋節陳言輔道元辰其説尤備間考淛藩鄉試得士為多丁邜陞南京太僕少卿俄遭外艱服除陞南京通政司右通政前此軍民投狀或寢不行公謂政主於通不宜任情行止悉分送所司仍存其底備考壬申冬陞順天府尹北人犯邊命將出師者再所湏車輛約費銀數千两公以水旱連年根本宜慮力言於兵部移大興逓運所餘銀以給之仍奏免派補又奏免夏税一萬七千餘石又令農民改撥者量入貲為賑濟備民甚頼之慮各屬巧取民財每嵗辦創作底簿具載其都數撒數使上下通曉無能為弊凡徴税則例鄉飲儀節悉加裁定遇鄉㑹二試所需悉從官給盡革和買借辦之擾府收例銀前後幾二十萬公立法簡而有制類皆妥便且絶侵欺昌平縣以嵗辦不前奏准陞州請轄宻雲順義懐柔三縣三縣復奏不堪事下公議乃均車輛十之六於三縣使州無偏重釐各官馬夫銀於均徭使不得多取定陵户貧富撥補之法使不得影射皆著為令公名素高人或疑其用及是見其施設優裕計皆經久相與信服翕然乙亥春陞南京禮部右侍郎䟽論交修論廟祀論廵逰語皆切至駕臨舊都即奏言臣僚冠服當如朝儀又請太廟皆得俞㫖今上登極用廷薦陞尚書首進大學衍義節畧有㫖褒答又申論大禮以堅上意諸卿佐皆附名焉前後凡八䟽乞休癸未春求去益力上察其情詞懇切特允所請賜勅給驛月廪輿夫皆從優典公歸則取勅中語扁其堂曰頥保杜門却掃縉紳益歸重焉乙酉三月十三日以疾卒於正寢其生景㤗壬申八月十一日享年七十有四廵撫都御史陳公洪謨以聞上嗟悼贈太子少保賜謚文恪遣官諭祭者再并治塋域以丙戌十二月二十二日塟邑東銅湖之原東向公配贈夫人陳氏前卒至是遷祔子男三長畋邑庠生次攽峽州判官俱貳室程出次㢸邑庠生女一適國子生丁森俱貳室黄出孫男一女四公事親篤於養志間嘗移禄以具甘㫖其自奉蓋甚薄也敬事伯父友愛諸弟姪始終無間清約嚴重望之凛然就之則言温氣和有足感發人者愛人好士一出於誠意士有同郡者數軰病於逆旅日徃存問或不禄殯殮皆親涖之自初下第歸及仕且顯從逰者日益衆每欣然為之講説旁引曲證務令得聖賢指歸乃已平生所著有文集六十卷劄記三巻奏議四巻家規一巻皆其精華所述有新増伊洛淵源録先天後天圖學考證太極圖纂要分類程氏遺書二程年表西銘旁通皇極經世啟鑰象山語類洪範纂要禮樂書皇朝名臣言行録皇朝理學名臣言行録選註風雅源流唐詩詠史絶句白沙定山詩星畧筭學發明綴筭舉例醫學舉要名醫録凡二十餘種初公疾且甚遺言諸子銘我必羅整菴及卜塟得日甚廹至是其季㢸始克以公命來告欽順於公有世契交久逾厚其敢以淺陋弗稱辭行狀乃公門人孫荆州存所述既詳且信是誠得所據矣惜不能盡書也銘曰學以為已惟明與誠惟聖有謨詒我法程明必無疑誠必無偽仰止聖賢庻幾可止卓哉文恪博極羣書既探其藴爰握其樞篤信力行隐顯一視有煜其光文章政事事君惟敬非道弗陳臨民惟簡大小歸仁典禮留都公則既老疇不知公用公不早平生著述其書滿家衛道之嚴毫釐敢差生為醇儒沒承顯謚𤣥室有銘徴於百世故致仕南京禮部尚書贈太子少保謚文懿楓山先生章公墓誌銘羅欽順公姓章氏諱懋字徳懋世居蘭溪純孝鄉之渡瀆至公始顯成化初翰林有四諌之稱公其一也其三人為吉豊羅公倫莆田黄公仲昭江浦莊公㫤羅公首上扶持綱常一䟽公繼草培養聖徳䟽偕黄公莊公上之所言皆切於治化本原雖相繼外補而直聲大著士氣勃興至於今未衰也四諌齊名而公景夀蓋享年八十有六官累進至南京禮部尚書而卒其卒也制贈太子少保謚文懿賜祭與塟䘏典之厚近時所稀有也嗚呼是豈可以幸而致哉公生正統丙辰天資頴異讀書數過即成誦長益嗜學淹貫羣籍尤深於易天順壬午鄉舉易魁成化丙戌試禮闈為劉文安公所賞識擢冠多士廷對賜進士出身改翰林庻吉士文學益進丁亥冬授編修内閣循例課上元燈火詩進呈公謂燈火非昭徳之器詩賦非論思之業遂因事納忠䟽入忤㫖調臨武知縣言官論救改南京大理評事日取刑書及故牘玩之具得其要領每有論駁人服其平滿三年得告歸省陞福建按察僉事毅然以振揚風紀為已任嘗議處畨舶均海田弛鑛禁假清軍以擒㤗寧劇冦急賑濟以離沙尤賊黨皆有實恵及民然事多掣肘不得盡行其志殊不樂也滿考入覲遂懇致其事而歸歸則日以娛親為事稍暇輙讀書楓山菴中從其遊者日益多随材引誘諄諄不倦學者因稱為楓山先生士夫道過蘭溪得一見公無不欣慰家居二十餘年所造益深守益固侍從臺諌交章論薦前後不啻十數孝廟因熟公名辛酉夏特起公為南京國子祭酒㑹遭父䘮辭不拜詔復置司業攝學事以需終制又辭不允乃赴任名高望重尊尚徳化寛大中自有規矩諸生質疑請益無不嚮答或泛而不切務令收歛近裏士皆惬服凡學政所宜興革者次第以聞率從其請正徳紀元陳言五事曰勤聖學隆繼述謹大婚重詔令敬天戒皆切時務㑹逆瑾擅權紀綱日紊公深以為憂前此嘗三䟽乞休皆被温㫖勉留及滿三年以年逾七十連章請老甚力上乃從之瑾勢益張縉紳多被其摧折於是始羡公之明决也庚午冬復起為南京太常卿辭辛未春陞南京禮部右侍郎又辭詔聽以侍郎致仕公乃受命今上即位言者請待公以異數特陞尚書致仕懇辭不允有學行老成名實相稱之褒繼遣行人王懋賫勅存問而公已不待也疾且亟卧與林守有年論天下事甚悉又與族子贄論保國家長久之道於士㑹獨有取焉始終不亂卒之日則辛已嵗除也公器度宏偉於人無所不容和厚之氣溢於顔靣坦懐待物好善有成居常無甚異同及臨事决議援據精審確乎不易清心寡慾不事標榜有欲為之表宅里築書院者皆力辭服食器用取給而已於書無所不讀有所不合必折𠂻於程朱其精切之論門人董知縣遵記之特詳皆可為法於天下事無不理㑹堯舜君民之念每惓惓焉郡守嘗以嚴冬集夫築堤捍江亟為書以天時水勢人情利害白之守為立罷其役民間利病茍接於聞見必以達之上官其誠心愛人如此為文章平正典實理勝而味永遺文僅九巻門弟子於公卒後相與蒐輯以傳者也曽祖諱叔良國初以人才徴辭不就祖諱邦和考諱申甫志識高邁能豫知子若孫之當顯者以公貴封文林郎南京大理評事加贈朝議大夫南京國子祭酒妣吳氏追贈恭人配恭人郭氏善内助先公十六年卒所生三男振擴㨗一女適趙儆及孫男訢亦皆先卒曽孫男衢繼孫男試俱早夭有庻子接方四嵗從子司空拯以壬午三月癸酉塟公長山之岡先塋之次墓石未刻蓋有待焉迄今二十年接既長而能立且䕃國子生矣不朽之圖朝夕在念司空以余嘗佐公於國學有交孚之雅乃具書及行述授之俾來請銘大司寇唐君龍久從公㳺復以書申致其懇雖衰鈍不文然於義有不容辭者謹按行述取其始終大節序而銘之庻以慰公於地下云銘曰儒有君子亦有小人奚名為小止見其身物我天人渾然同體所見者存如公有幾粤從辨志惟道是謀夙夜孳孳遑事逸遊愽學精思貫通以類羲畫周經心領神㑹以言以動時止時行惡衣菲食道則光明忠愛之誠形於初仕甫上鸞坡俄栖棘寺强年秉憲皓首司成民懷士服有本之徴林卧日長不忘兼善其進之難亦惟有見風聲所暨慕仰攸同亷頑立懦君子之功言必有稽力扶正學寤寐程朱同歸於約鼃聲紫色惑世誣民公心如噎長嘅且顰聖主龍飛大明淑慝八座之榮以彰有徳璽書存問公以告殂載厪䘏典䕃及遺孤鐫石埋銘用垂永世孰不為儒惟公是視尤西川墓銘張元忭嗚呼此河南西川尤先生之墓先生嘗仕於朝為户部主事矣而其鄉之人被服於先生之教最久故共稱為西川先生而不以其官於其歿也亦以此題其墓此鄉人意也予不識先生而識其門人孟進士叔龍聞先生之教最詳先生歿而屬予銘其墓此孟君意也嗚呼予銘先生有不勝其悲者自予居京師得與四方之賢士為友於山東得孟子成而又得間其師所謂宏山張先生焉於河南得孟叔龍而又得聞先生是予幸而得两友又得两師也前年宏山歿予為表其墓乃今先生又歿而两孟君一以憎去一以憂歸予悼夫老成之日以凋落也良朋之日散而之四方也嗚呼予銘先生能無悲哉先生諱時熈字季美其先本吳人高祖某始從軍𨽻河南衛父錦贈户部主事母姜氏封太安人其生母蓋王氏云先生生而警敏不羣稍長為諸生輙有聲弱冠舉於鄉是為嘉靖壬午時王文成公傳習録始出士大夫泥於舊聞競駭而排之先生計偕入京師一見輙有省晝夜讀之不休則歎曰道不在是耶嚮吾役志於詞章抑末矣已而以疾稍從事養生家則又歎曰文成公致良知之㫖所謂養生主者非歟何以他為自是深信而潜體之毅然以聖學為已任壬辰授元氏學諭甲午丁外艱服除再諭章邱其教两邑士一以文成宗㫖委曲開導之两邑士始知有聖人之學庚子遷國子學正時祭酒為華亭少師徐公最重先生每令他舘師弟子咸取法焉辛丑年四十因念古人道明徳立語忽淚下居常以不及師事文成為恨且曰學無師終不能有成於是以弟子禮見文成之門人晴川劉先生師事之甚謹劉先生以言事下詔獄則書所疑契時時從犴狴中質辨不少輟甲辰遷户部主事榷滸墅税先是司𣙜者務以苛歛溢嵗額為能甚且牟其羡以自肥先生至則一意便民僅僅足常税而止纎毫不以自汚所居瀟然無異於學宮也長洲令某負氣與部使者抗先生亷其人寔賢者初不與較他日代𣙜者至問吳中令孰賢先生首稱長洲代者曰此非抗君者耶先生曰吾儕論人惟其賢豈當以細故雌黄其間耶丁未年四十有六以母老乞終養歸歸三十餘年日以修徳明道為事足未嘗一渉公庭所居環堵諷詠自若郡守或以官地遺之謝不受不妄與人交然於後進有向學而來者輙喜動眉宇與之言終日不倦其所問答随人深淺而要歸於提撕其本心令聞者各有所省其大㫖寧祖文成而得於體騐者為多蓋自一見傳習録寖讀寖入寖入寖透齋中設文成位晨起必焚香拜來學者必令展謁其尊信若此迨其晩年病世之學者崇虚見而忽躬行甚且誤認不良之知而越繩墨以自恣先生嘆曰孔門教人必以孝弟為先忠信為本其慮深矣故其論議必依乎中庸切於日用而不為𤣥虚隐怪之談其善學文成而救其末流之弊又若此陜洛間士聞其風擔簦笈而至者百數十人士大夫道洛者咸以一覲顔色為快嗚呼河南自两程子歿寥寥數百年其間策名砥行之士豈少乎而知學者鮮矣予曩聞沔水有曹先生間嘗閲其書論其世蓋篤行君子也視先生見大而識融有徑庭焉叔龍謂先生二程之後一人豈溢美乎哉先生卒以萬厯庚辰九月二十七日享年七十有八卒之日門人十數軰在側相向哭皆失聲為之經紀其後事塟以是年仲冬十有八日墓在洛西澗之陽配觧氏與子郡庠生洙皆先先生卒孫三居厚居黙居朴厚與黙皆郡庠生能世其學先生所著有擬學小記聖諭衍諸門人方謀梓而行之予又聞先生臨歿時手自為誌僅紀里氏嵗月不欲為身後名然則叔龍又何以銘為請哉雖然凡古之聖賢皆非有意於名然而門弟子不可使其師冺沒而不傳則叔龍之請為宜予於是摭次其狀而為之銘銘曰瞻彼伊洛其源㳙㳙真儒迭異如流有源孰開其源卓彼二程孰沛其流庶幾先生先生之傳文成是啓仰讀俯思無言不唯匪唯以言允蹈以身出以範士處以淑人道尊而夀有孫繩繩吁嗟先生生順歿寧西川之濵西澗之陽以栖以藏源遠流長茌平𢎞山張先生墓表張元忭有明正嘉之際王文成公倡道於姚江維時及門之士自大江以南無慮千百人而淮以北顧寥寥焉誠阻於地也既一再傳諸高第門人各以其學流布於四方然後一二傑者始興起於齊魯燕趙之間而其毅然自樹超然獨得顧有出於及門諸賢之上何哉今夫世胄之家其子弟有父兄之教或不能率有父兄之書或不能讀其得之者易故其守之也不堅如是而有成者十亡一二焉甕牖繩樞之子崛起於布素非有所承藉也得一師則敬信而從之得一書不成誦不置得之彌堅守之彌固蓋鮮有不成者嗟乎學者徒傍門墻務口耳其信不若自脩自悟者之為堅哉予頃居京師得一友曰孟子成氏子成山東茌平人也其守介其學特立而深詣予每叩其所由則稱曰吾師云吾師云已而叩其師則曰吾邑𢎞山張先生也已又叩先生之所由則曰先生故嘗私淑於文成之門人江右中溪顔公波石徐公而得之者也一日出𢎞山教言數十條示予予受而讀之既終業嘆曰有是哉文成之的傳其將在兹歟江以南諸君子著書以明良知之説者多矣大都高者或過於𤣥遠而無當其次或凑泊牽附而未融予甚愚下誠不能無逆於心今觀先生書簡直融貫無一言不本於心得無一言不契於宗㫖其最著明者有曰耳本天聪目本天明順帝之則何慮何營有曰良即是知知即是良良外無知知外無良有曰人心不死無不動時動而無動是名主静有曰真知是忿忿自懲真知是慾慾自窒懲忿如沸釡抽薪窒慾如紅爐㸃雪摧山填壑愈難愈遠凡此類直掲本體非高遠非凑泊即令文成復起且首肯之矣斯道將不在先生歟先生名後覺字志仁自蚤嵗為諸生獲聞良知之誠於两公輙自信此心與仲尼無二久之益深思力踐洞朗無礙已又以取友未廣為媿耻於是南結㑹於香山西結㑹於丁塊北結㑹於大雲東結㑹於王遇齊魯間學者舉知有𢎞山先生海内大賢道茌平者必造先生之廬近溪羅公守東郡頴泉鄒公視學東藩為先生两建書院曰願學曰見大先生又北走燕南走金陵入水西日與四方諸同志證其所學歸而與其門人孟子成及趙暹趙維新軰日夕相琢磨蓋不知其身之不遇與老之將至也先生狀貌魁梧美鬚髯軒眉廣顙見者傾歛其事親孝遇宗黨有恩與人交恂恂恭譲里中稱長者其仕終華隂諭當在華隂時㑹大震殞者亡筭先生獨無恙奉檄視邑篆未匝月起仆弭亂境賴以安家居踰二十年以萬厯戊寅七月二十日卒享年七十有六其明年某月日塟於城北十里原之先塋其世次具其父東社公誌中其子一本介於子成請予表其墓嗚呼先生仕不顯於時其學之可用僅一試於華隂而平生又不喜著書向非門人録其教言以傳則遂沒沒而已乎雖然以先生卓爾之見上接乎文成則其人雖死其神固不死也又豈以書之傳不傳為顯晦哉世有知先生者當不以予言為過周孺亨墓誌銘歸有光昔孔子修明六經及與門人問答論語之説無非教人全其性命之理以治其君臣父子兄弟夫婦朋友之際是其所以為道也孔子既沒天下為道術者襍出學者馳騖以趨世主之所好孟子修其説以明於世顧其流益浸淫而不可止自人生服食器用以至於經綸天下之業無一出於道蓋歴千有餘年世與道離而為二宋之君子始以明道為已任以至於今其後出者相望然非有名位不足以為倡既有名位倡非獨其志義篤信之士從而和之雖所謂榮禄之士慕高名者亦紛紛焉求入而附之矣至要之於其久倡者既沒和者随息所謂慕高名者澌然盡矣唯獨其志義篤信之士久而不變也若余友孺亨豈非其人哉莊渠魏先生於正徳嘉靖之間以明道為已任是時海内慕從不少後二十餘年能自名其師者幾於無人孺亨篤信之如一日不幸不用於世世亦不知其人其所以飭躬勵行修其孝友忠信於家至於沒身而已者此所以為先生之徒者也孺亨姓周氏諱士淹字孺亨世為太倉人父諱廣南京刑部右侍郎其上祖考皆隐不仕以刑部追封如其官孺亨嘉靖十六年舉於鄉試禮部輙不第初刑部公為御史上書武宗忤佞倖再貶竹寨驛丞孺亨年十三随居沅湘間已奮志於學三年還適先生退居星溪之上遂從之游日端拱不妄發一語或謂刑部公宜飭其子勿為道學公曰天下大重任令兒自負荷君何以云云先生之學始得之餘干胡敬齋大要以主静為功葆合冲和蓄極而發嘗謂上天之載無聲無臭惟潛龍為近之而與同時講道者論終不相合是時天下尤尊陽明雖荆溪唐應徳始事先生後復向王氏學惟孺亨稱其師道終不變余少為先生家婿獲聞緒言顧迷謬無所得而先生晩年屬望之意特惓惓焉先生之沒余獨於孺亨心師之嘗質以所見其不合者十二三後讐定先生遺書孺亨之指發為多嘉靖四十一年與孺亨復同計偕北上行過徐沛至胡陵孺亨病還余愴然有顧形無儔之歎孺亨竟不及家而卒是嵗二月三日也年五十有九其弟士洵以其明年九月九日塟尉遲村刑部公之墓夫人毛氏先卒孺亨請余為銘未及塟及是以毛夫人祔夫人無子以弟士洵之子邦模為嗣銘曰道之窮也世莫以庸匪窮於其躬其又奚恫薛西原墓誌銘唐順之西原先生姓薛氏名蕙字君宷先生憫學者漓於多岐作約言學者執言詮以求見聖人之心而不能自見其心也作五經雜説方士穿鑿乎性命之外而不知養性之為養生也世儒泥象於有無之内而不知無為之為有為也作老子觧先生之學無所不窺不名一家中嵗始好養生家言自是絶去文字收歛耳目澄慮黙照如是者若干年而卒未之有得也久之乃悟曰此生死障耳不足學然因是讀老子及瞿曇氏書得其虛静慧寂之説不逆於心已而證之六經及濓洛諸説至於中庸喜怒哀樂未發之謂中曰是矣是矣故其學一以復性為鵠以慎獨為括以喜怒哀樂未發為奥以能未發而至之為竅自是收歛耳目澄慮黙照如是者又若干年而後信乎其心其自信之確也而後著之於書嗚呼心學之亡久矣有一人焉倡為本心之説衆且譁然老佛而詆之矣學者避老佛之形而畏其景雖精微之論出於古聖賢者且然而不敢信矣先生直援世儒之所最詆者以自信而不惑其特立者歟先生少嘗刻鏤於詩世絶喜其工今所傳西原集者其少作也既有志於道則棄不復為雖為之亦絶不較工與否然西原集世争慕效之而約言老子觧好者希矣先生以正徳甲戌舉進士授刑部主事病免起為刑部主事以才調吏部主事嘉靖中先生在吏部歴考功司郎中而罷後十八年辛丑正月九日以病卒於家年五十有三其罷也坐論大禮先生自為刑部時值武廟南狩抗䟽諌禍叵測先生晏然後大禮之議起廼撰為人後觧為人後辨奏入下獄已而復其官然已為權貴人所不釋矣已而竟主給事中某搆先生罪先生上書訟坐是罷後所搆事觧吏部數移文促先生赴任時權貴人且張甚曰是可褰裳而蹈淵也哉竟屡薦不復起先生貌臞氣清行己素峻潔其才雖高然坦易洞朗破去厓岸豪傑皆慕與之交其庸衆亦無所疾者獨以一二權貴人故至一斥遂不用先生方且藝圃灌花澹如也居鄉絶不肯為人干請至戚里有疾親為之檢方製藥嘗脱綿襖施凍者或曰焉得人人而濟之曰吾不媿此心耳始號西原居士後扁其齋曰大寧齋更號大寧居士而世猶稱西原先生云薛氏故𨽻偃師國初以戍武平遂為亳人祖琇父封吏部主事曰鎰自封主事君而上皆不顯然世推長者妣楊安人生三子先生其仲也與其季萱皆無子而伯兄蘭有一子曰存先生與蘭友愛甚其沒也蘭為之經紀其䘮將塟先生於亳城南先塋之次而緘其遺書請銘於余無何蘭使人來速銘且告塟期曰卒之嵗某月某日近矣曩先生嘗寓書於余叩以致虚極守静篤與未發之中其㫖同異余未及復請於先生也竊妄意之寂而未嘗無感而未嘗有吾儒之所指為中也乎内有鍵而不出外有扞而不入老氏之所指為虚静也乎以是復於先生先生其許我哉雖然先生之註老子則可謂得其髄者矣乃竊取先生之意而為之銘曰在昔老聃握元化樞人皆競巧已獨若愚吾師歎焉其猶龍乎棼棼末學枝葉日繁豈不莞然而撥其根維聃之生寔是譙亳寂寥至今西原有作閉户獨窺微言五千参諸孔庭獲我同然孔曰未發聃曰静虚立教有二其究豈殊譬如入海所貴得珠其所從入孰一其途自是反躬精思力踐黙然一悟與天有衍亳之南墟有欝其墳嗚呼西原其尚何存林東城墓誌銘唐順之嗚呼吾友東城林君古所謂敦行君子也紛華盛麗耳目之好一不膩乎其外獧巧慧辨機智之習一不鉤乎其心潔以律乎其身一束脩之問畏之若苞苴然謙以裕乎其人一輿臺之賤接之若賔友然行必惬乎人之所安故不為嵬崖嶄嶻之行言必衡乎力之所抵故不為杳𦕈浮濶之言嘉靖辛丑十一月二十日以吏部文選司郎中卒於京師年四十有四出其槖得銀四两不能棺其寮友為之棺以歸歸不能塟郡守朱君州守黎君賻之錢以塟而黎君又使君之友陸位等狀君之行來請銘朱君黎君君在文選時所選亷平吏治其鄉者也君諱春字子仁始號方城以其先福建福清縣方城里人後改東城祖諱某父諱宏母某氏自君㡬世而上有諱閠者始自福清以從戎𨽻㤗州守禦所故君為㤗州人林氏自徙㤗州未有以儒顯者為儒自君始後君貴始贈父宏為吏部文選司主事而封母某氏為太安人君始以窘故幾廢書者屢矣君讀書居常以行筩注膏繫衣帯間惟所適則出膏于筩燃火讀書君父為漕卒君又獨與母妻織屨織屦讀書率以夜不睡嘗日不能炊貰米於鄰不得君行歌自若家人頗非怪之君自若君是時堅苦已如是已而受學於知州王君某與其鄉先生王君汝止两王君故王陽明先生弟子君因此始聞致良知之説則心喜之至夜中睡醒無人處輙嘖嘖自喜不休遂欲以躬踐之則日以朱墨半㸃記其意向臧否醇雜以自考鏡久之乃悟曰此治病於標者也於是駸駸有意乎反本矣戊子舉鄉試壬辰舉㑹試第一登進士第選户部廣西司主事調禮部主客司主事又自禮部調吏部文選司主事吏部故矜厓岸鎻門謝賔客雖親故人往拜示自尊重而吏部以提熱柄故雖諸寮中率以嫌隙相猜詆君色温氣柔不以行能先人其在諸寮中悛悛下之唯謹其在同志中雖其名位絶不相埒者悛悛下之唯謹門無留賔日旰出部則徧走刺答諸賔客或羅致諸賔客講學意蒸蒸如也諸賔客人人自以林君親已其尤厚者則相與挾衾被櫛具往宿觀寺中講學竟夕以為常後為郎中官重益多事矣然猶如此以此諸寮中雖其志行與君絶不入者亦謂君長者不復猜也而善類因君以聨者為多君自束髮至蓋棺未嘗一日不講學然君本以長厚清苦繩墨自立其於學也亦因其質之所近君為主事是時縉紳之士以講學㑹京師者數十人其聰明觧悟能發揮師説者則多推山隂王君汝中其志行愊實則多推君與吉水羅君達夫羅君於朋友中最沉宻矣然君猶靣疵羅君以其露才也君之自欽可知矣王君汝中洒落而君小心周愼畫尺寸不敢失两人操行不同然君獨心敬王君為主事久之轉騐封員外郎已而調文選司員外郎居一年母安人病癰卧君謝病歸養君居鄉則益悛悛謹甚如故儒生時家居無一錢亦不以取於人家有一錢亦必以施於人侍母安人病病少間則出寓故所讀書處萬夀宮者與其故時友人及鄉之後生講學以其間走安豐就其故師王君叩所疑義每往必喜幸以為聞所未聞君於師推王君汝止於友推王君汝中君居官有未識王汝止者君與之言必曰吾師心齋説如是君居鄉有未識王汝中者君與之言必曰吾友龍溪説如是居久之赴官補稽勲郎中調文選郎中君自為吏部主事㤗州守某黷而虐君請於尚書黜之㤗君鄉也尚書趦趄曰某未有劾者奈何君曰不實則罷主事遂以其人調邊地頃之南御史劾章至則其人也竟黜之後君赴官泊淮淮守某以次謁諸過客舟始及君供張又薄若不知君為吏部者後淮守入覲考下當遠調君為稽勲郎具白尚書以過淮事薦其亷静懇乞留之更得調永平内郡二者其一遠嫌者不敢為其一怙勢者不能為而君為吏部若此然君長者常䕶人短其請黜㤗州守事則尤為君所難君既長選事益思薦進賢人慎擇監司守令洗刷奉其職然事有曳掣或不能盡如所欲為則君自謂曰選曹之職欲上通於君與相冡宰之心下通於選人與天下人之心相冡宰之心未必選人與天下人之心選人與天下人之心未必相冡宰之心選曹居其間欲两合焉難矣雖然求無負乎吾心足矣君始調文選㑹御史論君受牌坊銀事雖衆以為妄然君獨自念束髮兢兢砥行遭㸃染居常引咎不惬欲觧官又業巳為之既任事又曳掣縮縮不自得曹又多事君日夜其間固甚瘁居無何病一夕卒卒之日猶在曹不自知病病且革乃舁歸舍先是君嘗㑹朋友講曽子啟手足意懇惻聞者皆怵惕未數日君遂卒君問學幾二十年其膠觧凍釋未知其何如也然自同志中語質行者必歸君君娶李氏封安人子四人曉暉曜昕曉樸而材能似君者也為庠生妻某氏暉聘某氏女一嫁王用賔塟以卒之明年某月某日墓在某所君不喜為華詞其舉第一應試文字及後所為詩古文務理道質而不艶如其人始君㓜不知書父故苦貧也不能資君以書以餘子給事千户王某所某竒君令與其子王烈同學書君自是始學書後父數見君諄諄且喜且嗤之曰兒讀書固善然書可飽乎因取其書欲燒之君婉詞跪謝乃觧後君貴常思王氏厚報之自王烈以下禮節稱謂嵗時起居一不改於故餘子時銘曰君嘗有言天然之門盎然出之不作好醜不為我偶不為人觭天心之窟如彼日月光照四垂樓臺殿闕糞壌鼠穴亦所不遺藏疾於藪有茹其垢蓄徳之資有如寳然玉金在前其耀不施君子若愚暖暖姝姝不其淺而我韻君語勒石於墓式昭世規董先生墓銘許相卿董先生卒塟有日矣其子以先生同社僧法聚狀來曰請誌而銘諸則謝曰予罔所知其奚能銘然狀先生者其有以知先生已夫予其終讀讀之曰先生諱澐字復宗別號蘿石其先汴人始祖武功大夫健扈宋南來家於澉浦後仲真者遷海寧之錢山至樂静翁鑑配虞氏先生考妣也先生世澉戎籍兄源長當往役先生銳身代之遂復家澉平居樂義與善根器天植兄累於貧則割私產譲之其所知鄔魯以田來質逮魯疾革出劵燬焉卒復經紀其塟聞高世賢達所在不計遠近寒暑投贄納交見後軰工一辭厲一行亟稱屢歎不但已也人以是多之然先生生不觧俗間作生事時時獨好歌吟所遇節序景物離合欣戚憤愕慶悼懐古慨今一寓之詩家徒壁立不以經意一時名能詩者吳下沈周闗西孫一元閩中鄭善夫皆郵寄𢋫唱遇佳風日放浪湖山流連親知嘯咏忘返好事家往往除舘以待先生紀之為五舘記云晩造陽明夫子聞良知之説幡然改曰不爾得稱人乎悚然就弟子列時年六十七矣故所與游者聲咻色招之先生但曰吾從吾所好已爾更號從吾道人先生末復究心内典忽若有悟喟然歎曰乃今客得歸矣於是援匡廬故事與聚紏諸緇俗同志結蓮社於海門精廬遂又號白塔山人嘉靖甲午某月日卒塟以是年某月日配康氏繼莊氏子男糓鄉舉士女二孫男鹿鳴鶴鳴於戱先生我文人行也忘年友予餘三十年矣吾見先生始專於詩遺其家甚難之晩志於道遺其詩甚愧之終入於佛嗒焉自遺也予愈益怪之莫能窺已觀乎聚之言曰先生在先刼中殆業豢龍氣相感召近可遠大可小有可無虚實相因動静相體若有類焉蓋先生學三變歸於空而自所謂吾者且見為妄矣尚安事銘予將安所銘無寧試妄求之亦憗妄應之耶銘曰一顆蓬翳蝶化蟬蜕吁嗟董翁墓於是明文海巻四百四十二
