body:
  text: 明文海卷四百四十四餘姚黃宗羲編墓文十六儒林近溪羅夫子墓志詹世講先師近溪羅公以天年終於萬厯之十六年戊子是時世講万視學南畿也訃聞為位而泣者七日亡何厥孫太學生懷義持狀來徵講為志講於師實有罔極之恩誼不可無言也師諱汝芳字惟德家世南城四石溪别號近溪其先豫章人遷居今所則自唐侍御君第六子近通始厯國初有季文者代父從戎義聲壯里閈季文舉永和魁然以孝友著於家庭永和之二世孫為庭繡則犖犖負奇節大亢厥宗者也庭繡舉大夫子三其季為前峰公即師之尊人封比部政如師初年官公嫺於文詞馳聲藝苑中籍甚比稿落當年乃去而講理學嘐嘐然嚆矢東越孺人寧夢赤日入懷生師師襁褓時即悟啼聲五年能執孝經甫長雅不好弄羣兒以侮狎至油然受之鄉人大奇其不羣弱冠受博士籍悟尼聖之學有不專於博士業者遂卓然以身任正學癸卯薦鄉書明年捷南宫人皆以為華師欿如也叔子樂溪怪而問之師曰爾謂一第能了我生平耶超一乘即有一乘事業此壯夫終身有蓋棺憂也隨輟廷試歸姑山決策尼聖面水澄心凝神易學若無意於仕者人謂寧孺人曰爾子幸一第乃不服官政何輕視若此孺人曰吾兒正不欲輕此一第故爾當是時介紹於西昌結駟於南楚講業於中都轍迹所臨屨溢户外聞者靡然咸遵厥化師即未拜一官治一職教澤已滿東南矣厯癸丑始就廷試受太湖令太湖嚴邑也民強且多盜師至修渤海之政捕從寬益以道化之不踰月而盜平其他政務一本於興教化明禮樂不為一切俗吏所為三年天官最其績擢比部政時大司冦則海鹽鄭公曉也公素慕師比在屬歡甚以為得師晚事無大小悉以咨之所明罰伸抑者甚夥逮守寧國教化益行郡堂無鞭朴聲日惟講學水西志學二處以崇學育才為功課宛陵六邑一時有三代風六邑亦聞風歸化未幾以外艱歸歸而士民悲號不忍釋去有步至旴江者師在制四方來學者益衆當道聞其賢厯引哀詔促起復守東昌間行泰山塗遇盜將犯之既聞為師也拜而泣曰吾意為某某乃羅父耶稽首而去尋遷滇南憲副時莽酋犯三宣急且逼州境師遣馳諭六條涕泣化之莽亦涕泣請降更為開水利塹城濠省徭役大布朝廷德化暇則召同志講學如永昌諸處信從尤衆無何轉藩參賫捧入京禮成偕同志大會廣會諸剎諸大老咸傾蓋焉時江陵柄國喜操切惡談學諷附勢者言之已又召諸從遊修撰沈君編修曽君輩切責之師喟然曰時事若此道復奚望其疏乞骸骨浩然歸矣師之歸薦紳談者憾柄國併唾言者欲甘心之師掀髯而笑曰記云君子隱而顯且一世與萬世孰多乎吾旴江汝水之間寧無斐然小子可裁者復與諸弟子聨轍走安成下劍江趨兩浙金城往來閩廣間益張皇此學今上戊子秋偶疾知將辭賔矣乃起繡衣冠謝皇天后土召諸弟子諸孫授會語八卷更手書大哉洋洋之章丁寧王史命各舉觶相酬以别諸弟子泣留留一日復正襟危坐拱手而逝噫吾師仕則以其學敷之政不仕則以其政敷之教歷七十餘年無日不在斯道至死而後已其任重道逺若此孰非本諸道而措之躬行者哉蓋道之大原出於天天之所以立命即人之所以為性此性命之理洋洋優優隨境皆是然而其宰也未嘗不運至虛而至實其運也未嘗不宰至實而至虛故放之則忘忘則淪於無執之則助助則滯於有勿忘勿助乃見真詮師研究有年透悟獨到常語人曰鳶飛魚躍無非天機聲歌笑舞無非道妙發育峻極眼前都是其超然灑然見之襟懷雍然穆然見之家庭油然熙然見之處人接物講嘗以學請正曰學貴靜乎曰不宜離動在動處著力乎曰宜不失靜體功宜何著乎曰心兮本虛致虛要矣何著講以寂為疑曰性中萬象森然何寂之憂然則何如而為得力乎曰知得得力處便是不得力不知得力處便是得力大都道具吾心而吾身實在道中真機隨處洋溢工夫原無窮際一念不通之人者非道也一息有間於道者非功也講每見師居常無日不親師友無念不通人心自志學之初以至令終之日孳孳矻矻惟成就後學是急蓋師之心仁心也師之心體仁體也仁者以天地萬物為一體師其有之雖其或時談玄類禪不知有出世之心乃可經世或時笑號類放不知其手舞足蹈皆為自得或應接吾人不無分别則簡文溫理之道原自不混嗟嗟吾師之心豈尋常世俗之見所能測哉靜菴蕭先生墓表薛𩔶旗會稽之隂有大儒曰靜菴先生者稟賦不凡少即頴異甫踰十齡修詞藝文已卓然成章年十七即厭棄之從陽明王先生遊講明聖學窮極指歸體認踐履不務口耳在諸生中甚為提學副使趙公寬所賞識𢎞治甲子楊文恪公亷為浙江鄉試考官得先生文大驚謂學有本原才堪經濟取置第一自是遂以文名四方實先生所不屑也登正德甲戌進士選授監察御史時方以言為諱先生劾奏兵部尚書王瓊雖小有才多挾私妄作都督江彬夤緣投托蔓將難圖申救胡副使世寧孤忠為國力剪強藩封章慷慨天下想聞其風采非徒事聲容者比奉命巡山海諸關值邊備久弛將官怠縱先生遍歷邊徼修廢振墜相機設備廣樹材木多為覆塹敵騎不敢長驅相顧喙息會傳奉武宗將出邊捕虎總鎮以下遞相掊尅先生上疏言陛下不當賤民命而貴異物玩細娛而忘逺圖因及官司掊尅兵民疾苦之狀留中不報總兵戴欽鎮守王欣圖中傷之用事者曰蕭御史無隙乃止嘗疾馳黃花鎮啓視倉糧苴礫居半且侵尅纍巨萬守將盡論如法巨璫溫祥在司禮監有權令二倅折簡為請先生併逮倅治之邊境悚然士始獲餉先是權貴人多冒奪士卒首功前御史盡為紀驗先生悉奏奪之江彬錢寧忿然論於先生之前先生曰某地某地相距幾百里某乃同日出戰彼此獲功豈能二三其身邪二人語塞巡邊代還盡圖山川形勢量地夷險敘著機宜方略緩急有差按圖可議戰守彭都御史澤上其功且薦可大用王瓊以夙憾不為覆奏先生亦初無意於論功復命巡按雲南值左脛為邊風所中疾作太孺人憂之遂疏請歸省踰年南畿缺提學御史乃膺簡命先生素以人才廢壞為憂至則振起科條以身範物先德行而後文藝士有可進者先生降色溫言懇懇誘掖語及理道反覆推明其或有不率教者縱其文入格亦在所必黜重以權貴人請之不聽也其諸官師之賢否生民之利病往昔之忠賢山林之遺逸靡不悉心咨訪抑揚興革究其所措意直欲挽回陋習躋之隆古而與人為善之誠惻然可掬故南士有陳泰山蕭北斗之謡陳謂先提學陳恭愍公選也尋升河南按察副使仍董學政凡所施設一如南畿臨潁有大臣在大閣以故怨搆誣其鄉人谷生者欲假手甘心先生亷知其故不為處乃復為其子弟甥壻請托又弗許由是憾甚嗾言事者劾先生連及廣東提學副使魏先生校二先生皆當世名儒疏下吏部恐拂臨潁意乃量移先生於湖廣魏於江西皆兵備副使南御史上疏謂二人皆長才碩學宜大用不宜左調值臨潁去位乃更先生廣東魏河南仍各為提學副使廣學政久弛魏以過嚴獲譴先生繼之不少貶復為怨者所搆先生不辨唯疏求解職竟復論改調尋丁太孺人憂年且五十而哀慕不已蓋寖就衰矣自是遂不復出嘉靖甲午八月某日以疾卒於家距生成化庚子某月日年五十有五疾革時令子弟扶坐堂上曰吾平生不欺使我一見天日耳子泣請遺命曰為好人餘一無所言先生諱鳴鳯字子雍紹興山隂縣人學者稱為靜菴先生父諱昱任山東髙密縣知縣以先生貴贈監察御史母茅氏封孺人娶周氏封亦如之子男二曰勉曰飭皆有文行為國子生女一適錢塘縣學生田肯播孫男三承芳縣學生餘皆讀書習禮先生所著有靜菴文録詩録教録杜詩注若干卷六經方次第有説創草未就先生瓌傑廓落亷靖方介終身未嘗畜媵侍靜處一室浩然天遊常正襟危坐或獨步中庭遇風月清朗則自喜曰此吾儒受用處也其所自得者如此故其於出處之際百折不回雖識者謂其足以大受惜其不為公卿而先生之視功名事業則真若浮雲之過太虛也嗚呼斯世有如先生者幾人哉先生卒之二十年其門人武進薛應旗亦以視學過先生里第拜遺像而尋宿草之墓焉勉飭以墓未有表遂屬之余為南考功時西磐張公為尚書檢察庶寮唏噓嗟嘆者久之曰士失養於學校而顧稽之於既仕殆猶使不教之民戰也宜其鮮完人矣近時如蕭子雍魏子才之為提學其人豈易得哉然則二先生之所以取嫉於人者固其所以見稱於世者也昔歐陽公謂宰執可為而唯翰林學士不可以輕授余則謂學士可為而唯提學不可以輕授蓋士習之汙隆世道之升降由此其出也吾未知河南廣東如何今南畿諸士去先生三十餘年猶若畏先生而不敢為不善者此其為益豈小補哉余因表先生之墓而特書其大者憲副畏齋薛公墓表薛應旗吾常至古延陵郡吳公子札所封札以禮樂見推於上國逮卒葬申浦吾夫子表其墓曰嗚呼有吳延陵季子之墓蓋謂其逹於理學也自是之後兩楹夢奠禮壞樂崩漢董仲舒隋王仲淹唐韓退之傳孔門之餘緒斯道賴以不墜然皆西北之産而東南則眇乎其未之有聞也至宋政和間楊中立承伊洛之傳僑居於常於是常之屬邑武進則有鄒志完父子周伯忱兄弟無錫則有尤延之師弟宜興則有唐彥思皆知以道為學而實為東南之倡矣未幾學禁旋作宋祚遂衰逮我洪武崇尚理學逮今二百年間吾常謝處士子蘭邵宗伯國賢徐司徒用中毛給事式之唐中丞應德皆以理學聞於時江隂人文雖盛其以理學聞者則尚未之有也畏齋薛公應登者其殆褎然而崛起者乎公諱甲字應登畏齋其别號也常之江隂人父浮休先生諱章憲以文學名娶張氏生公公生而頴敏有異質年二十五中嘉靖壬午應天鄉試己丑舉進士選授兵科給事中遂以言忤當路謫湖廣布政司照磨壬寅量移浙江寧波通判又三年乙未升保定同知明年丙申升四川按察僉事整飭敘瀘兵備又四年庚子升江西南贛兵備副使在贛五年致仕歷任政績皆種種可述具在公年譜中而公平生所自為者則不屑屑於是也公自弱冠時即謂文人之文於身心無益遂潛心晦菴之學逮入仕後得陽明傳習録讀之遂遵其教而以象山為宗曰解縳者陽明先生也不然桎梏死矣時四方從事陽明之學者所在羣起公皆斂袵下問按公年譜在京師則會於白塔寺在江西則會於青原山居鄒則約諸友為名山之遊往往會於僧舍雖在會者其人未必盡誠而公之探討服行務求良知之究竟知行合一之本原則皆真心實意以冀其必得所歸而略無徇外為人之私故年逾邁而志愈勵汲汲焉未嘗少懈所謂朝聞夕死斃而後已者公實其人焉嵗辛未公年且七十有四矣特顧余山中余迎之竹樹間值雨過石滑公纍步艱行余進而扶之公即笑而言曰陳瓘生長東南不識伯淳猶可委也吾為魯人不識東家可笑也哉吾是以來余問云何公謂近見君考亭録謂晦菴之言孔子教人之法象山之言孟子教人之法不覺恍然而悟前人數百年之爭辨吾輩數十年之講求誠費辭矣不然良知之言又一桎梏也吾敢不以筋力為禮而不至君一拜耶余謝不敢當而心服公之真切為道蓋誠不在於附和趨時聲音笑貌間也余方將從公以永餘年詎謂不逾年而公遂易簀矣余既為文哭公而公之子逢等乃衰經詣余稽顙請表公墓余謂公之蒞官行政不表可知而江隂之以道為學則實自公始惟其道之是否而不惟其人之從違惟其言之當否而不惟其人之顯晦亦唯公為能之也謂公為豪傑之資聖賢之學亦何過哉是故表而出之俾過公之墓下者得以覽觀而興起也公生於𢎞治戊午十月二十四日卒於隆慶六年七月二十五日享年七十五娶華氏子男四長某次某縣學生次某恩貢生早卒次某太學生女幾孫男女幾具在志狀中所著有易象大旨四書口義心學淵源録藝文類稿行於世明太常卿贈正議大夫資治尹禮部右侍郎恭簡魏公墓碑徐中行公名校字子才少英頴絶倫讀書四行俱下𢎞治甲子魁應天鄉試乙丑第進士正德改元授南京刑部主事歷員外郎中訊讞必齋居夏日滌溷穢於疾病者飲食之臨刑素服事畢不御酒肉與諸郎異時奄豎劉瑾弟琅守備留都張甚諸郎願有謁公不往其將攟擴某富人死公不避嫌骫法琅卒莫能絀日集諸郎講德與鄱陽俞子積信州夏淳夫武城王純甫尤切劘蒸蒸如也九年改職方時嬖幸擁兵大內藩宗將告變乃移病歸星溪學士大夫多造廬請益薦者無虛嵗間承召不起藩王變定武宗崩世宗立諸嬖幸誅乃起家為副使督廣東學政遵功令頒化條毁淫祠創社學專祀宋儒及名吏鄉先生卓犖者且示民息訟弭盜一以敦本為務士知鄉往者命禮遣而躬導之其有道術者不憚與之友踰年謡俗一變而奔封主事喪歸盡禮服闋補江西兵備力辭弗允改督河南學政大較如廣東而矩矱稍廓行冠禮正名稱毁浮屠像專祠羲皇於畫卦臺以蔡仲始封國依太公祭爽鳩之義而以世子死社稷書於春秋者配信陽宰端木公賜蔡人曹公恤漆雕公開秦公冉為之立經祠又援漢梅福疏請封孔子後為世博士守微子廟因嵗時省湯陵不果甫三月轉大理少卿冢宰桂文襄公推轂之也凡封事質正多為之削草明年轉國子祭酒例謁相國踧踖偶坐公上坐自如相國蓋嗛之及充經筵相國滋不恱故事講章先裁於相國不贊一詞而愈益嗛俄改太常假少卿已升卿提學四夷館時上議禮進郊社論二篇明年致政歸飬太安人張氏甚謹撫兄諸子而教之篤其先本姓李居長洲莊渠城自莊渠始祖三傳曰琳鞠於姨夫崑山魏家而蒙其姓琳生鍾鍾生公父圭雅意復姓因其先有迷所出而與李氏婚逮公疏復不得復為憾言必稱莊渠人多稱為莊渠先生乃為李氏統宗族屬譜祭則合族以申其義而於無告者有賑其孝友若此薦者無虛嵗雖冢宰聞問不答舉主費文憲公再入相期吳門不赴卒乃候其喪而修正大抵然也嘉靖癸卯卒距成化癸卯生享年六十有一訃聞贈官賜諡及祭葬於某山子紀夭季子殤配淑人王氏奉公遺命以兄子續子恆嗣紀恆殤郡守命續嗣公續舉於鄉矣鋟公太學解六書解遺文若干行世命立經祠於學宫左春秋有司奉嘗焉徐中行曰余聞莊簡公引當代名公十六人為公誄詳哉其知之也世君子或能之兩者無當於大誼乃君子弗能焉豈非苟然者耶自浮屠入中國少林逹磨面壁九年傳其影也入石慧能受其衣鉢於曹溪世咸惑以為神公督學南粵既毁其鉢督學中州復斫其影匪直嘵嘵實躬任之矣故其學引繩墨必軌於正義病邇來欵言者比於晉之清談則其所就豈茍然蓋可俟之不惑者矣銘曰浮屠而熾公也伊何既毁慧能爰斫逹磨乃識其大雅行孔多疇不是式有鬱其何廣西布政司左參議古林沈君墓表萬士和沈君諱寵字思畏號古林宣城人也君為人外貌樂易而性實剛方志存一體然不務阿世見一善事鼓勇直前不為不止聞一善人負笈千里不見不已所交皆當世名士故海內嚮道者莫不知有古林君其鄉有貢受軒先生者受學於歐陽南野氏君師受軒因同至南都參南野有得於致知之説已而得見王龍溪錢緒山二公悟證益明然君每崇實踐不落言詮此君學問之終始也君年幾弱冠其考桑園公督之業農君白其母固請就學旋入郡庠中丁酉鄉試甲辰落第就選授行唐令以才調獲鹿戊申擢監察御史清戎福建癸丑升湖廣江防僉事丁已升廣西左參議致仕隆慶辛未年即世此君歷履之終始也視民如子視官事如家事賑飢荒復流徙教紡績節厨傳一切保甲倉儲團練之法無不舉行此君之治邑於行唐獲鹿者也獨持法紀風采凛然均編役黜貪墨興正學别賢否至於搜獲積盜摧蕩九龍灣巢窟此君之才著於御史監司者也君當為令時保全撫字惟恐失所治尚寬仁其為御史監司鋤姦遏惡惟恐不盡治尚威嚴蓋牧民之體執法之職既不相同而北土瘠薄易於離散利用招徠江防巢穴易於哨聚利用搜獮因時制宜同歸於治而已豈有心於其間哉君自歸田後講學一念老而彌篤時郡守羅公立開元之會諸生環座者數十百人耿楚侗督學臨校深為嘆賞檄聘君與梅宛溪參議主其席諸生因而善良者甚衆宣城風俗至今知學者君為之倡也君性孝悌事父母及喪葬咸竭其力復喜施豫自未遇時鬻衣器易粟以賑貧乏及致仕歸悉以俸餘為伯仲買田宅創建祠堂聚族子弟教於其中此雖非君難事亦足以稱於宗族鄉黨矣疾革時人來問疾者輒與論學亹亹不倦或問君胸次云何君答曰已無物矣時次子懋學方上春官乃顧長子懋敬及諸孫囑以善自勉不及他語遂瞑君之卒也貢受軒作狀即其師也梅宛溪作傳即其友也二君平生知已故其事核其辭逹余朴直無文惡足以發而懋學來留都乞余作表余忝年家素辱交契聊綴數語特其大者焉耳若其行事則志傳悉之不敢增一詞懼失實也提督四夷館太常寺少卿訥溪周公墓表萬士和明興士大夫之學謹規矩守格套以為道在是矣而或滯於事為形器之末有陽明先生者出一剖其籓籬倡良知以詔天下世之從事其説者欣欣然足矣而或墮於空虛無著之歸自是兩家角立同異紛然彼曰汝拘此曰汝放如方圓之齟齬也然陽明之學特謂知行之無二耳專事空談而無復踐履則末流失之矣有能不滯於事為形器不墮於空虛無著祛一偏之弊以坐臻乎道德之實則豪傑其人哉若余所見訥溪周公是已公之學以大同為旨以誠一為功以為乾坤與人號曰三才同也由我而之人人我同也由人而之物洪纎靈蠢一切天地間無弗同者其有弗同者不誠故也誠財一惡得不同不誠則二惡得同苟能致其誠一以歸於同則天地萬物各得其所而位育之功成矣公蓋嘗以是語余而余竊之以自潤者也公名怡字順之號都峯改訥溪寧國之太平人少果敢有氣節常以溝壑不忘自勵在邑庠大為督學章介菴公鑒賞文譽鬱然一日見傳習録曰此聖學也慨然有求道之志聞鄒東廓先生倡道南都徒步往從之聽其言論喜曰不然枉此生矣甲午中鄉選遊南雍時山隂王龍溪在職方公復師事之一時交友皆海內名士非其人則不妄交大司成倫公深加器重戊戌登第授順德府推官大書臯陶祥刑以自矢以明恕為本而以公正折之髙明不畏煢獨必伸民大悅服鄰郡爭求質成監司交薦天子聞其治狀徴拜吏科給事中屢劾羣臣不職最後將論柄臣告其母劉太恭人太恭人慰勉之因南還癸卯夏公遂抗論大臣不和狀幾數千言其所指不和者相鑾嵩冢宰讃總督翟鵬趙廷瑞總兵張鳯周尚文也而其意則專責相嵩且曰嵩威靈氣熖凌逼百司中外之臣不畏陛下而惟知畏嵩言甚剴切嵩多結中黨為援肅皇帝震怒摘其疏中日事禱祀語謂為訕謗廷撻之送鎮撫司監公創甚先是楊御史爵劉員外郎魁亦以言事繫獄二人者曲為調治得不死公囚禁踰二年艱苦備至卒莫敢有救解者乙已秋上信箕仙言釋三公上欲為箕仙築壇熊太宰上言箕仙妖妄上怒態太宰罷為民因復逮繫三公公再就繫又三年丁未冬上修醮事三殿災上大悟手敕釋爵等時漏下三鼓矣公旦日謝恩就道嗚呼箕仙非正也其釋三公人方幸其天啓熊太宰之言正也而竟不虞三公之復逮然使三公之釋不出於箕仙而出於聖衷尤可尚已公歸值劉太恭人病篤家人驚喜太恭人曰此朝廷再生洪恩也汝不可以忘報公復得侍湯藥十三日視含視殮以終大事吁嗟其孝心所感哉公為人守直不阿方在枕塊時有巡按御史投刺欲見公曰某公之來不弔我我不可以喪禮見客候之良久卒不出公家居久之穆宗登極召用未幾升太常寺少卿上疏言五事觸中貴人忤旨調山東僉事升南監司業二任雖不久然盡心職業講學益勤聲望逾重已已夏復太常少卿提督四夷館既上道疾作不克赴任以十月十七日卒於家卒之前一日猶置酒饌命子弟歌詩和之遺命戒其子身後勿求入鄉賢祠又貽其弟遂安令恪書勉以供職精神意氣如常不少亂公平時萬物一體之學最為得力於事無所厭於人無所不容其待公卿大夫與樵夫牧豎只此一心一言既出則終不改易人之接之者就之如春風信之如元龜不覺其心醉而神融也嘗念楊劉二公同在患難而二公出獄已先朝露乃往泰和弔劉公往富平弔楊公因遍歷名山川及諸名公懇求印證充然其有得也其於賢人善士中心好之效法之如不及若唐荆川羅念菴二先生則尤其所嘆服者遡公之始終未嘗不講學而不脫略於片言細行之微未嘗不力行而直通徹於髙明光大之表其以忠諫顯名於世偶任一職不得不然非公之志也乃公之心則欲君臣一德天下同風世有良臣而無忠臣太和元氣盎然在宇宙間而已噫嘻此為得公之心否也公弟恪子可貴以余素交厚於公乞表其墓余為著其大略以示世之學者使知有正學不偏如公者則紛紛爭辨庶幾其有瘳乎於是乎表明榮祿大夫太子太保兵部尚書贈少保諡貞襄雙江聶公行狀宋儀望嘉靖癸亥冬十一月太子太保兵部尚書雙江先生聶公卒於東臯私第從子儀部郎中靜經理其喪殮甚厚尋以訃至都下於是嗣子錦衣千户靛上疏言臣父某幸得備位樞府叨階一品前後蒙皇上恩賚甚渥兹不幸至大故乞比照往例給與恤典以假寵於先臣以昭皇上推念臣下至意臣不勝幸甚明年三月儀部君乃奉公柩淺殯於邑東五都之仙女塘以俟啓土卒事既又泣謂儀望曰子從先公最久願為狀其行將請銘於當時巨公以垂託不朽豫既不得辭謹按聶氏在晉時諱逹義為新淦尹因家邑之拏埠其後由拏埠徙永豐磊源遂為吉之永豐人至宋恭甫始徙邑之下市元末諱逹和又自下市徙雙溪在永豐三徙而氏族益繁衍髙祖諱敏瑞國初以督運客死其妻楊氏守節自誓長育二孤曽祖淡樂公諱汝璉祖巽菴公諱日聰考水雲公諱玉治水雲公以先生貴封文林郎華亭縣知縣妣鄒氏封孺人水雲公生二子長即五巘公諱洪後以子儀部考丹徒績封如其官次即先生諱豹字文蔚以成化丁未正月十三日生於雙溪里時室中忽有異光巽菴公心獨異之遂命今名曰兒苟立必大吾門此名所以志也年十嵗即頴敏不羣十六督學無錫二泉邵公取為弟子員一見大竒之又明年甲子娶夫人宋氏是時父水雲公家事日落莫至為先生師友費即傾資鬻産不少顧惜鄒夫人以為憂公笑不答先生學既成每竊嘆曰豫茍不第何以報二親劬勞語已輒泣下一時同學見之多所感激是時陳公唐甫延先生訓其子陳故富家先生令其折節讀書卒由胄監官至州守正德丙子先生年三十以易經中江西鄉試明年丁丑登進士是冬以例給假歸省既歸即杜門却掃慨然以古人自期庚辰春就選吏部授直𨽻華亭縣知縣華亭在東南為巨邑官是地者往往易為染汙先生至則首禁吏胥革積年民皂嚴防衙宇不得與外一時夙弊頓清久之名遂大著華亭錢糧舊額八十餘萬自正德庚辰以前未完折色多遇蠲免經收人役往往乘機侵騙莫可蹤迹先生亷得其事乃收各役問狀具悉遂盡置於法追還官銀一萬六千兩有竒米五千六百餘石其餘長多收稱頭銀至二千六百兩悉為追奪隨申補積年拋荒逋欠併備賑濟上下稱快有富民許震私置金醬瓶中冀以啖先生先生隨置之法一時豪猾斂避境內大治邑之水利在西鄉者低下水宜泄鄉以東稍髙仰宜蓄水溉田先生訪求利害延禮知水利者撰次圖説乃悉力疏濬修築通計濬過塘港三萬文有竒築過堤岸減十之六又創總會册以稽賦額造歸墟册以驗實在併查出餘田一頃七十餘畝以補坍荒百姓至今賴之每聼訟日旁午棼集一鞫輒得其情法有難更雖勢豪不得干請情有可矜即嫌疑必為伸雪每嵗審編徭差悉躬自查對吏胥斂手備行文書而已其修理文廟建名宦鄉賢祠皆捐俸倡義不以苟簡將事在縣三年積穀至一十九萬餘石復業人户至三千二百二十三户撫按以章薦先生者凡七八人先生才既髙治縣多暇惓惓以興起學校作飬人才為事今師相徐公在諸生中方弱冠先生試其文大竒之曰此宰相器也時同被賞識如徐君南金張君承憲楊君世賢子亨數十人俱收置門下於是郡諸生楊君沛夏君允中王君教等又數十人亦願執經又考取儒士二百餘人拔其優者如包君節孝兄弟何君良俊良傳王君球吳君培等十數人皆朝夕受學先生親為講説動以古人道德可師者風勵之明年提督御史蕭君鳴鳯至校士其所賞鑒皆出先生門下蕭君笑曰雲間素稱文藪君一網盡矣是秋諸君薦南畿鄉試多在髙等明年少師公以進士及第入翰林為編修前後以科第起家躋膴仕凡十餘人其餘亦各以文章氣節表見於時癸未冬乃以任滿給由赴部時宰有欲用先生為吏部屬至遣人留之先生力辭復任乙酉始召入為福建道監察御史方試職時即上疏論司禮太監張佐違詔收補內監工匠又劾兵部尚書金公獻民侍郎鄭公嶽受邊將金為東厰所獲以賄得不發覺二公尋罷去既乂論禮部尚書席公為弟乞留翰林入臺數月疏凡三上皆人所畏忌不敢言於是直聲振於時是年以華亭績如例貤封其親夫人宋氏同封孺人尋差往應天等處稽察馬政明年春按應天乃上疏條陳馬政積弊大要欲將江南拋荒田畝逃亡丁口從實稽查免其俵養將原額種馬變價入官候其復業成熟别議召買常年額解馬價仍令實在人户包賠各處草場無分養馬與否核其荒熟肥瘠量為起科計畝均納照舊收貯州縣各準該年折色馬價云云其考核羣吏激揚諸司尤所留意是嵗乃往謁陽明王公於越相與講良知之學先生於是鋭然以聖人為必可至其後以書問學於王公公深嘆先生任道之勇乃為書復之丁亥復命未幾遂差巡按福建戊子春入閩至則振紀綱察吏治抑豪右懲姦慝一時貪墨吏多望風解印綬去鎮守太監趙誠橫暴難制先生移文按察司查其冒費驛遞趙誠懼尋又奏革市舶而以少監司章代為鎮守暴橫頓息漳州詹知府龍溪黎知縣貪聲久著先生下車即首劾之建寧守陳能已遷去其贓私狼籍特甚先生因追論之陳譎詐善賄尋以疏自辨執政欲反中先生乃復上疏論之陳竟罷去閩人快之每有訪拿其諸惡迹即妻子且不知者先生動亷得之一時凶黨咸自首受罪郡邑吏稍有過舉先生即發覺之其所注措如神設鬼施不可端倪巨冦鄭新盤據漳泉官兵勦之數年弗克先生以計擒之地方始安既又應詔陳言四事大要謂今提督官宜倣成周造士遺意分德行經義二齋以端士習其次清寺田以備賑恤核官籍以均徭役考宦餘以勵風節其言皆根極治本深切時宜而事多阻格識者韙之是春復以書往陽明論學亹亹數千言公復書具悉所云既又建養正書院射圃亭於會城羣八閩秀士教之重刻傳習録道一編二業合一論大學古本以訓迪諸生先生在閩持法嚴正風裁凛然以此起名當時然亦以此取忌於人明年己丑以期滿候代建寧遂上疏養病所著有巡閩稿尋得報升寧波府知府遂兩疏乞休不允會改知蘇州府明年庚寅先生往守蘇州至則首興學校正風俗問民疾苦禁革賭博裁抑豪猾吳人舊以豪縱自喜初不甚便其後乃帖然安之蘇為東南首郡舊稱難治先生處之裕如日羣諸文士於學道書院相與切磋如今太宰嚴公訥祭酒瞿公景淳大中丞王公忬章公煥給事中顧君存仁儀部陸君師道皆先生所取名士郡治前繪二十四孝事實於壁以風百姓民有兄弟訟者先生令往觀之已訟如初先生曰是頑民不可化者乃重羞辱之卒感泣悔罪蘇有巨冦王子家者坐官舫糾凶徒會於平望射瀆間已携妻子匿泖中先生乃置人於漁舟偵之不旬日即擒置於罪太倉州巨盜龔淵龔錦為患海上先生密遣人獲其弟錦而淵遂逃匿已乃縱錦吳人譁然未幾淵兄弟果私往來其家先生遂併擒之人乃屈服民有婦訟子不孝先生故責其子婦不色動先生疑其有私遣人伺之果有與婦姦者掖婦以行𨽻人執至訊之遂服至於經理驛遞分撥夫役各有成法一時稱便郡嵗織造多扣羡餘以備支費先生悉嚴革之辛卯十月治裝入覲會考君訃至次日即就道倉庫囚獄扄鑰不改其所治裝具即付代行者蘇人至今稱之既宅憂凡所治葬祭俱遵古禮稍暇即受徒講學於是邑之人士咸執業門下服既闋上疏乞致仕甲午六月尋丁鄒夫人憂自是杜門不出前後凡十餘年庚子辛丑嵗南北科道遊震得邢如默等會薦先生是時北兵連嵗犯山西乃起知平陽府於家會伯兄丹徒公喪先生不欲往時從子給事中以言事落職奔訃抵家乃趣先生行以其冬十一月如平陽先是北兵謀言欲侵平陽先生至府庫空虛募兵築隘一無所備乃謀於僚友士大夫請之撫按行各州縣偹羊酒於富民量為勸借以舒目前於是臨汾等三十七州縣民人郝尚能等共輸銀二萬二千餘兩蒲州儀賔蘇仁因繼室悍妬乃誣仁姦義男妻播言仁且持數千金賄當路冀脫罪久之仁遂成獄後仁纍告願濟軍餉贖罪先生亷得其事乃白巡院許之令納銀五千兩於是大修關隘塹山堙谷列墉崇址郭家溝冷泉靈石等處屹然天險矣又募義勇張鸞等五千二百人河南礦徒八百人皆厚其供給衣甲器械使樂為已用已而兵果入雁門徑趣平陽犯郭家溝關兵李芳等開關延敵殪其二人乃咋舌失計遂退營介休境上先生又為三邊總督書與總兵雲冒牌謂大兵不日且援山西令善射者直冒敵營戒令見敵即將牌面書騎俱棄去佯走敵覘知平陽有備又得所為書牌遂大驚棄營逺去時郡城方告飢乃設粥於近城寺中民就食者日以數千計又增浚城濠築南關外城以工後獲全活者又數千人啓土之夕得石枕一鞭一鑑一欵文云道髙龍虎伏德重鬼神欽時以為應在先生同知許檖有記迄平陽功成巡按御史童君漢臣特薦之給事中劉繪又薦為邊方都御史會今上有平陽何狀之問輔臣介溪嚴公亦疏薦堪任巡撫於是上益知先生可大用矣先生當寇警旁午日親戎事猶時與今方伯亢思謙企舉人陳嘉言嘉謨阮思瞻侯效古劉光啓秦健與各州縣生儒崔汝孝等數十人朝夕講學不輟修平陽古今人物題名記冀以朂勵諸生是年冬作大學古本臆説明年癸卯升陜西按察司副使兵備潼關先生遂疏乞休拂衣南歸所著有知晉稿先是僉事許勉仁遷自同知與先生舊僚又拜門下既為親臨復執禮如初先生初不忌之平陽功成時論皆歸先生許不能平乃以勸借及處蘇仁事騰謗於都下會冡宰許公入其言遂附成其事於是科道交章拾遺奉旨著山西撫按官從公查勘先生遂堅卧不出一意受徒講學其後撫按官查其支銷册籍無絲髮滲漏往反三四年至丁未嵗巡按侯御史始題覆前事部議且將用先生矣會執政夏公入謗者言擬旨逮先生錦衣獄既被拷無所驗明年九月又奉欽依行巡按御史覆勘是時尚書西磐張公在留都大言於衆願以百口保某無他未幾夏公亦被罪下獄相對赧然乃知其禍起於浮議先生略不為動所著有被逮稿困辨録幽居答述等稿既巡按御史黃君洪毗勘至於是謗事悉明向矣尋得旨落職南歸時已酉春正月也明年庚戌北兵卒至都下皇上震怒乃降敕切責諸臣不任事者遂用少師徐公薦特召先生為僉都御史巡撫順天整飭薊州軍務既得報即慷慨就道至九江已報轉兵部右侍以十二月抵任先生自以罪廢驟起思有以厚報上恩明年辛亥奉命巡視九門乃條陳六事多見採納九月轉本部左侍又奉命清理軍實復條六事上之尋又得旨協理京營戎政是時咸寧侯仇鸞實總營務多所變更先生乃條列四事大要謂京營之兵核該一十三萬宜遵欽定營制五軍營精選兵二萬二千神樞神機營各九千共四萬人仍各分撥總督四遊擊及三佐擊統理操練以備征戰每嵗器械操糧犒賞等費查於各省班軍免其半赴營就令領班官解納應得行糧併户部每年應給班軍糧賞足補前項支費凡諸操練務循軍法而軍中不得藉口役占橫生異議其略如此是時逆鸞怙寵驕橫知先生疏多為已發已心銜之會又謀撤宣大防禦假以入援為名人情洶洶叵測先生方攝部事乃歷陳四慮大要謂宜以宣大之兵付還二鎮二鎮安則京師安鸞切恨不已又明年癸丑會本兵缺該部擬進未定尋奉諭閣臣云某可正卿如何遂以正月二十七日升本部尚書先生力辭不允既正本兵即修舉廢墜嚴禁請託痛革夙弊參論債帥動據法例一時聲望赫然至於修築邊墻增補關隘選調將士預處糧餉分屯重兵以控扼要害等事皆悉心為之兵科右給事中朱伯辰通政司趙文華先後建言宜築外城以護京師先生力請於上允之尋改議止築南關先生與諸共事大臣協力經營是時宣薊邊備廢弛乃題差本部左侍郎楊公博前往經略既因楊公前後建議悉為題覆先生添設昌平易通都御史三員原無所轄事權既輕動多牽制其二州已革去而昌平如故先生仍條議裁革每年防秋即令順天巡撫駐劄昌平以護陵寢其原設副總兵如楊公所議仍舊添置衆議稱善是年十月北兵犯紫荆關浮圖峪甚急先生先期督發入衛朱鳯等所領邊兵前往截殺遂至大捷各鎮共斬首四百餘級奉旨加太子少保廕一子錦衣衛千户時撫按參論各鎮功罪不同先生上疏略云今日禦敵要以血戰為先血戰之功要以保固京師為重故功重於罪者當從其功罪重於功者當從其罪人以為救時確論明年甲寅四月重城功完奉旨加太子少傅仍廕一子入監讀書時修邊功費甚巨又年例犒賞户部不得以時給發先生乃條陳二部事體大要以共濟時艱為言朝議是之十月北兵犯薊州攻墻六日夜不能入奉旨加太子太保先生洊受上恩益思報塞朝夕勞瘁或經旬月不家視宣大錢糧缺乏軍士告飢先生上疏言邊弊因參論前督撫諸臣因循玩愒不肯用心撫綏上怒遂逮二臣於獄尋遣户部侍郎陳公儒往賑恤之其在江南倭冦竊發閩浙蘇常連嵗被害又湖廣川貴苖民弗靖先生乃博採諸臣建白參酌題覆以南京兵部尚書張公經總督浙直等處軍務附近各省兵馬悉許調用賀給事中涇孫御史慎建言宜添設總兵一員駐劄鎮江先生謂鎮江偏在一隅宜設於金山衛俾沿海一帶俱屬防禦又因徐御史栻建議乃添把總四員於南匯吳淞江劉家河鎮江等處即以附近衛所屬之而分布汛地令其自為戰守至今四府海口屹為重鎮都御史鄭公曉議於鹽城東海各設把總一員仍以所屬地𨽻之先生從之其處置苖情則聽張公嶽議移軍門開府沅州凡湖湘川貴附近司道府衛土官司悉聽轄之又以蘄黃為全楚咽喉德安為陵寢門户所屬州縣與江西河南接境深山窮谷盜賊淵藪乃因督撫諸臣議比照鄖襄事體添設守備一員駐劄二府交界以防不虞先生在本兵年餘南北交警羽檄日馳凡所題議動當上心明年乙卯先生年六十九會工部侍郎趙文華遙授禮部侍郎朱隆禧議欲遣官視師祭海神差田賦開市舶等事先生堅執不便且言視師非股肱重臣不可我朝閣臣多在左右不外出且東南民困已極士夫豪右動多橫議若以此時差田賦徒滋勞費必無成功如開市舶則倭奴變詐不常如大同馬市反為外國所愚疏上遂忤旨降俸二級久之乃以年至多疾乞罷前職尋奉旨得致其事以去先期從子儀部亦以罣誤落職遂侍先生南歸乃建賜老堂於東臯之上日與故人門生子弟談述古昔講究學術詠歌太平而已明年先生夀七十儀部君與其諸子開宴東臯為夀旬日乃罷先生前後家居三十餘年惓惓以表率鄉里汲引後進為事自五世祖以下皆為改封塋域屬從子儀部纂家牒為譜戒以聯屬族人族之子弟有可進者皆奬拔之凡邑有利弊力為訪求嵗壬辰邑令金君清舉行丈量編補里甲禁革坊廂諸所措置皆先生發之既又請於大府屠公大山少府李公本推訪藍田之意設立鄉約以厚風俗其後由尚書歸則請於當道辨減里甲均徭銀一千二百餘兩辛酉廣冦流劫至城下數日乃去則請廣邑城以保居民凡諸親識細氓有以迫切來訴輒為諭解不少倦平居尤喜崇節義厚先輩先正歐陽文忠公既遷於潁支庶散佚墳墓失守先生按潁上訪歐公後得今裔孫雲以歸乃謀於邑令商公買田娶婦更立太師專祠又請之督學代以一人充弟子員以主祠事一峯羅公倫以忠節冠一時會有詔應議贈諡先生乃為疏以請又躬謁執政其後卒贈官諭德諡文毅狀元學士西墅曽公棨遷葬新淦富民鄒愈二誘其孫鬻之遂藏公骸骨冀以滅迹積數年訟不能決今少師徐公督學江西先生備言之乃案行同知季本少寬鄒之罪卒復學士骨骸復葬本里舊塋僉事髙公安清謹人也暴露未葬餘五十年先生謀於署邑事江君得安厝祖塋仍為石志其墓按閩時有鄭三娘死於節輒躬自祭奠有道在婦人之歎先生自聞陽明王公之教終其身未嘗一日不與人論學其在同輩如同郡東廓鄒公守益南野歐陽公念菴羅公洪先兩峯獅泉兩劉君文敏邦寀臨川明水陳君九川虔州洛村黃君𢎞綱餘姚緒山錢君德洪龍溪王君畿皆嘗與之往反辨究雖其論議互有發明而學問脈絡亦不能無少異同儀望從先生遊垂三十年蓋嘗屢聆其説竊窺一二指歸矣先生自丁亥以來其論致知功夫則以孩提知愛知敬為良知本來面目反而求之事親從兄之間便覺有所持循致書陽明南野二公蓋極言之其後先生家居每接引同志惓惓以躬行孝悌為致良知下手切實功夫戊戌以後先生有悟於本體虛寂之旨企守平陽作大學臆説其釋致知格物云宰物為知感物為意處物為格心猶鏡知猶鏡之明致知猶磨鏡格猶鏡之照妍􅑦在彼隨物應之故曰格如云格於文祖格於上下又曰致知即致中也寂然不動先天而天弗違格物者致知之功用感而遂通後天而奉天時又曰有未發之中即有發而中節之和聖人於咸卦言虛言寂是究言感應之理以破萬有之障先生自平陽歸與同志論學一以㴠養本體虛寂為歸是時適與念菴羅公論相契合其後再居京師凡四五年其與學者語益發明所得以為必如此而後謂之聖學因刻白沙緒言以見意而諸君子則反覆辨論恐其分知與物為二不免墮於禪定云云先生亦屢為書辨之總括羣言各有指據而諸公不復能難也所刻有致知議略良知辨其後因謝子經從門下問學庸首章先生發明其旨而其説益詳今所刻有質疑存稿先生長身玉立丰度峻整每入朝議事神間氣定言論簡當同輩望之如孤鶴長鳴風神自别平生勇於為義臨利害禍福屹然不動往被逮時從容出見使者更囚服慷慨就道室中悲號不勝先生若不聞門人父老送之無不流涕先生苐拱手以别是時東廓念菴諸公皆追送江滸猶相與講學不輟綿衣百户戴經伯常因執弟子禮從受學在獄與桂州夏公亦時時與説牲命真機夏公首肯良久嗟乎此可以觀先生之槩矣平日著述甚富儀部方將裒次彚為全集辛酉之冬忽遘痰疾自此精神慌惚不寧又明年癸亥十一月前疾大作趣召儀部屬以後事初四日未刻遂卒享年七十有七屬纊之日家無餘錢至不能具賔客夫人宋氏無子先卒先生未五十時即奉母鄒夫人命過繼同祖姪旵為嗣改名靛今以廕授錦衣衛前所正千户其後妾生子窮兒踰嵗而殤生一女許適羅殿撰公長子先生與殿撰相契尤深遂締姻家未幾女五嵗而殤在兵部時生子營吉已報名廕授千户甫六嵗亦殤先生痛念不置乃為營吉立同祖孫耿為後若曰吉雖殤然應名在朝不可使其無傳靛娶陳氏繼趙氏耿娶吉水周氏孫二人冬孫孝孫皆靛出先生早以宦業顯名當時二親皆康寧無恙與伯兄丹徒公友愛尤甚丹徒公止一子即儀部自幼先生携與出入延師授學冀朝夕朂之成其後儀部起進士令丹徒有聲召拜給事中尋以言事左遷久之復起官至儀部郎中為郎中時先生在兵侍豫以御史朝夕同在坐每縱言邊事儀部故熟邊方要害及各將官後來成敗先生咨訪至夜分不去及為本兵每警報至必召儀部䇿之前後章疏亦多令草定既而歎曰人患多才吾恐汝不能久留也儀部有子五人長棟以先生廕入國子監讀書邑里交逰如處士劉君霖僉事湯君克寬州守陳君唐甫劉君希昭曾君夢祺江夏尹蕭君韶天台尹鐘君紐平湖教諭陳君綸皆為莫逆其在門人如府丞郭子汝霖憲副陳子慶左給事中鄒子濓企豫儀望咸在仕籍豫從兄龍蕭子浩張子鏜袁子禮先後舉於鄉凡諸胄監企校官弟子布衣行誼之士亦百餘人皆從先生遊而在各邑以企雲間姑蘇八閩三晉之間及門之徒不下數百人往往多持行誼至大官其最著者少師公以輔弼重望為當時所宗企薦先生同朝猶凛然師事之不少衰海內既素髙此兩公而親見其相處如此於是始識師弟子之禮而益髙先生之行誼先生始居雙溪之里號雙江山人其後躬耕白水之陽建凌空閣於巘山有飄然出塵之想遂稱白水老農既老卜居東臯為終焉既又號東臯居士然門人故舊仍稱雙江先生志所尊自雙溪始也嗟乎先生已矣教言日逺典刑具在儀望深愧不文不能殫述懿德以章示來世所冀當代文章宗工賜之名筆悉為論次俾他曰國史得並考焉踰五年為隆慶紀元之嵗先生贈少保諡貞襄蓋特恩云明故中順大夫南京國子監祭酒前太常少卿兼翰林院侍讀學士追贈禮部侍郎諡文莊東廓先生行狀宋儀望世有大儒曰東廓先生姓鄒氏諱守益字謙之吉之安福人其先系出幽州范陽後家宜黃徙永豐八世祖天成因族父􅘶從文丞相起兵尋敗於元乃自永豐徙居安福城岡傳二世而當元季紅巾之亂諱思貞以智勇為鄉里所推有保障功入國朝諱克修始居徹源里子孫漸以儒術起家曽祖竹坡府君諱仕魯祖毅軒府君諱思傑俱隱德弗仕毅軒公以子貴封大理寺左評事考即易齋大夫諱賢𢎞治丙辰進士歷官福建僉事致仕母夫人周氏有賢德封孺人先是易齋公夢先聖孔子立於門之石橋母夫人亦夢日墮於懷尋以𢎞治辛亥二月二日生先生於徹源之第稍長即頴敏不羣已從易齋公遊宦留都讀書至忘寢食是時彭公禮巡撫南畿一見大竒之曰是兒出必爭鋒天下易齋公遣從司冦胡南津公璉受學多所問難丁卯先生年十七以春秋中江西鄉試是年娶夫人王氏尋丁母夫人憂少間乃受徒講春秋陽明王公移令廬陵先生慕其名見之極相稱許辛未王公由吏部主事同考會試時主考得先生卷甚喜謂王公曰子素知文善識此為誰者曰此必安福鄒某先生遂冠南宫廷試及第第三人尋授翰林院編修方是時先生年弱冠丰格敻異同榜中望之如玉映山立主考內閣野亭劉公深以國器待之時易齋公在漳南得報喜曰吾志有托矣竟致其事去先生在翰林踰年念易齋大夫不置遂抗疏養病歸四方人士慕先生名咸來受學一日與諸生論及中庸輒慨然曰子思學於曽氏今程朱補大學必先格致中庸乃首言戒懼慎獨而不及格致何也時諸生辨難良久先生終不釋然丙子丁外艱悉力喪葬待庶母弟三人咸遵易齋公遺言撫愛有加己卯謁陽明王公於虔臺因論及格致之學王公乃盡語以致良知之説反覆辨論先生翻然悟曰道在是矣遂執子弟禮未幾宸濠反江西王公起兵吉安先生聞變星馳軍門王公喜曰君臣師生之誼在此一舉企江西功成王公力薦先生先生乃疏讓同列先生既受徒山房乃以聞於王公者精思力行沛然有得既又探之周程以遡孔顔考之濓洛諸書以證六經若同軌合轍無復疑二於是作學説以警同志今上登極之明年録用舊臣先生將戒行北上尤惓惓作祠堂規立鄉約置義田周鄉族有差作别同志説語甚警切明年癸未復謁王公於越中參訂月餘既别王公悵望不已門人問曰夫子何念謙之之深也公曰曽子所謂以能問於不能云云若謙之可謂近之矣入京復授館職與經筵修國史進階文林郎於是贈父易齋公奉政大夫母進宜人王夫人封孺人會大禮議起先生率同館上疏不報明年甲申先生復上疏忤旨下詔獄是時修撰吕君柟繼疏入下獄先生與吕君曰講學不輟有獄裏雙况集尋謫廣德州判官復入會稽省王公聞如保赤子之教先生自是蒞官臨民務以誠心相感觸作諭俗文以訓父老子弟長吏亦加敬信遂撤淫祠建復初書院先生自為記從遊之士自四方來者日衆所著有時習講章學者爭相傳誦感發然先生雖由文學起家至判州動能發姦摘伏一時稱為神明民有逋其室者值某甲冒爭而訟先生飾為婦試之輒冒以為妻先生笑曰此僮也庸可冒耶遂屈服陳姓者兄弟皆黠盜逮其弟而兄逸監司詰捕不巳會先生攝篆逮者之妻稱枉先生故麾去之密遣人伺之果有私訊者於是逸盜立獲部民有婢竊其藏以逃詰朝婢殪於他所莫可蹤迹先生亷得其人拷訊不服乃授𨽻方略捕其幼子至訊之果得藏物富民步氏因繼爭産連年不決先生審其應立者諭之以理尋又處分其餘為祭祀宗族之需其人悅服仍願割其田三百畝助給書院在廣德三年乃轉為南京禮部主客司郎中先生既去廣德父老子弟送至白􅛄涕泣以别先生以詩慰遣之民乃為立生祠既至南都日與海內同志砥礪於學嵗戊子陽明王公征田州班師卒於南安遂率同志為位以哭是嵗撰九華山陽明書院記於良知之學大相發明其後甘泉湛公涇野吕公與先生咸聚南都講學之風於是為盛又三年辛卯四月先生給由至真州痔作遂上疏乞養病由吳中就醫與魏莊渠諸公力論知行合一之旨既趨會稽哭陽明公與同志大會於天真書院是冬進階奉政大夫封王夫人宜人先生既南歸家事悉置度外日與門生故人商確問學如飢如渴每嵗會同志於青原白鷺之間又數入吉水永豐泰和萬安永新樂安崇仁臨川南昌既又遍歷名山從遊之士自大江南北楚廣閩越之間去來恆數百十人海內交遊以書問學者日不暇給丙申嵗松溪程公文德量移安福先生喜曰昔人謂移風易俗莫善於學其在此乎乃相與行鄉約併里役省糧長朔望聚諸生論學於明倫堂巳乃建復古書院先生為記十七年戊戌纍用薦者起南京吏部考功郎中道南浦時今師相徐公督學江西乃約藩臬諸公率諸生肅先生聚講於貢院先生發明性善之旨痛快明白一時聞者莫不躍然省悟明年由考功改司經局洗馬時同以召入者如渭崖霍公少湖徐公念菴羅公荆川唐公浚谷趙公等皆負一時重望會先生與霍公同繪聖功圖及疏以獻上初下禮部參勘既念納忠免罪尋題充經筵講官庚子先生年五十應詔議薛文清公從祀評品精當見者歎服不已夏升太常少卿兼翰林侍讀學士掌南院事同志集京師者咸不樂先生逺去先生作醫説以别六月履任會途次酷暑王夫人病渴不起時季子善侍側二子義美尋自訃所奔至乃命美扶柩歸十二月升南京國子監祭酒今相國南渠李公為司業先生相與興教化申明約束端嚴士氣一時士習丕然為之一變雖外國入肄業及武臣輩亦津津受學不巳嵗辛丑會九廟災有旨兩京文武大臣著自陳時政闕失故事諸大臣多惶懼引罪自解先生乃惓惓於上下交修之義至引殷中宗髙宗反妖為祥之説語甚懇切巳遂落職間住先生乃遍逰金焦張公洞玉女潭諸勝既歸遂卜築東陽行窩四方學者日衆王夫人既卒中饋失助先生始議繼室壬寅五月娶今夫人李氏癸卯春逰衡嶽登嶽麓諸峯謁諸先正祠有南嶽風詠稿歸歷攸邑聚講金仙洞先生自以身棄草莾不得進輔天子弼亮左右所藉以明己志而酬上恩惟有培養人才講明學術為生平實際每嵗出會青原白鷺郡中諸賢先後來集已同志又建連山復真書院先生嵗主教其中其在各邑以企撫虔南昌袁廣江浙徽寧諸郡或一至再至未有厭倦至赴沖玄齊雲象山廬嶽天真諸會動經數月其答同志企門人問辨皆隨器成就因事辨晰其言明白簡易學者多所啓悟前後會語俱載集中嵗庚戌先生屆六十九邑士大夫以及門生親識俱赴復古書院為夀無慮千餘人先生家居既久凡邑有疾苦若恫瘝乃身如舉安福丈量則以一人呶呶其間不便者日為訕謗先生不少移節推危君嶽實克成其事百姓至今賴之所著有危君遺愛集序甲辰乙已連嵗大飢先生率諸子出粟賑贍其鄉又數為書請糶於郡邑乞發於當道甚至為粥以餉餓莩既又創義倉嵗計贏餘以贍宗戚鄉人貧窘不能自活者則多方恤憐之嘗率諸子企鄉人修建橋梁躬自督勸至於清邑稅復沙米減額外機兵復水夫常數及議帶徴諸凡利於民者先生力贊有司致書懇於當道悉施行之鄉之父老子弟以及田野細氓無不隂德鄒氏至有籲天以祈報者諸子及孫前後以科第發身每捷至邑中人輒曰此為善之報也人或以橫逆相加惟閉門講授若不知聞平居無他嗜好每與客延坐和氣盎然可掬往來與諸子諸孫書惟惓惓勉以問學於世之富貴利逹泊如也季子善自丙辰登第歷刑部郎中庚申以考績奉特恩先生復原職致仕母夫人俱進贈封恭人是嵗先生夀七十海內士大夫仕於朝食於家者咸肅幣陳辭以獻祝誦視昔有加辛酉善奉命恤刑湖廣便道歸省先生深以欽恤民命戒之壬戌九月先生寢疾邑之髦倪交籲奔禱諸子諸孫咸侍先生惓惓以毋侵人産毋縱家人生事毋傷骨肉和氣為訓疾之先月猶與同志大會復真書院發明言行合一之旨愈加緊切至十一月九日王龍溪畿至自浙入問疾先生拱手以别次日疾亟命義美扶坐正衣冠端默而逝訃聞通邑大夫士民奔哭於堂深山窮谷不能至者皆會哭於其鄉諸生依各書院為位朝夕奠哭其在各邑亦然嗚呼先生可謂有始有終完名全歸者矣王夫人出嘉溪少參公理孫女有賢行事載念菴羅公所為志中李夫人出瓜畬巨族子五人長義癸卯江西鄉薦美辛酉順天鄉薦俱入髙等次善由乙卯鄉薦尋登進士歷今官俱王恭人出次養次蓋俱李恭人出義娶廬陵黃氏提督僉事國用女美初娶王氏御史文女繼娶周氏善娶臨川陳氏禮部郎中九川女養聘劉氏員外郎文孫女蓋聘伍氏同知宇女女三人長適劉方伯佐子紹藩太學生次適廬陵楊少參儲子應禎幼許聘今吏部侍郎萬安朱公子維京孫男十一人德源德濬俱邑諸生德㴠戊午中江西鄉薦德溥德溫德治德泳德濟德洙德汴德澡孫女九人曽孫男八人主庚京立唐玄庸衮曽孫女二人娶聘俱名族先生既卒之數月諸子遑遑經營葬事乃獲地於同里白竹陂之原期以甲子閏二月甲申襄事先期義等相率肅贄稽首泣謂儀望曰先大夫葬且有期純德純行不可殫述願吾子狀其實將請銘於當時巨儒豫惶懼力辭不獲乃謹按年譜次第書之卒乃申言曰嗟乎斯道在天地間自孔孟既沒異端蜂起性命之精寖微寖滅至宋周程氏起而吾道正脈復有指歸乃再傳而門人私淑者互持所見競立門户而異議遂紛然矣迄至我明陽明王公勃起於困踣顛躓力求本心乃恍然特悟於致良知一脈以為直接千古聖門不傳之祕於是海內學者翕然歸之顧王公所言良知明白直截言下立悟於是習聞其説者立以聖人為必可至其於躬行實踐多所缺略平昔所稱髙明頴逹又多從意見悟入各持所得以授學者甚者參以老佛之説自以為得良知妙悟嗟乎二氏之教先儒以為闢之甚難溺之甚易吾輩乃又從臾之若云與吾道互相發明何其悖也先生蚤嵗博極羣書自六經子史以及百家一經誦習終身不忘弱冠登第即以文章氣節命一時然自虔臺一見王公遂盡棄舊學終身師事其説平日著為文章發為述答自六經學庸語孟之外惟元公聖學篇純公定性書亟為學者稱之今觀先生語録如跋大學古本企或問一篇其於王公之學極相發明至論寂感則云四時常行不論寒暑百物常生不論開斂故寂感無二時體用無二界論道器則云就其不可覩不可聞超然聲臭處指為道就其可覩可聞體物不遺處指為器今人却以無形為道有形為器論良知則云昔見陽明先師時便知從良知上致只是認得良知粗了故包漫世情倚靠聞見懸想精藴終於潔潔淨淨處未肯著實洗刷論真性超脫雖從無極太極悟入則云悟得此意只在二氣五行流連中故從四時常行百物常生處見太極禮儀三百威儀三千處見真性方是一滚出來若隱隱見得真性本體而日用應酬湊泊不得猶是有縫隙在論聖學則云天命之性純粹至善而無形與聲不可覩聞學者於此無從體認往往以強索懸悟自增障蔽此學不受世態點汙不賴聞見充拓不須億中測度不可意氣承擔不在枝節點檢亦不在著述繼往開來凡有倚著便涉聲臭於洗心神明處尚隔幾層論費隱則云費是常發隱是常未發觀諸天道四時常行百物常生而於穆無言萬古如一日吾輩知費而隱隱而費則日用云為視聽言動一於天則而不可須臾離論克巳復禮則云以非禮為巳之私則可以巳為私欲則禮安頓在何處故克巳復禮即是修巳以敬天下歸仁即是安人安百姓論性善則云形色天性通一無二以盡性而言性即是氣以踐形而言氣即是性嗚呼斯道之傳自濓洛以還諸儒之説具在其脈絡指歸互有出入求如先生之言明白痛切至當歸一蓋亦罕矣蓋先生之學指受雖有所自至其深造自得彌老而篤則今之學者莫能至也海內之士謂陽明王公之學所賴以不墜者先生之功為大誠知言矣先生有集數十卷大要主於扶天常植人紀不立異以駭俗不衒竒以釣世蓋其胸次豁逹精神瑩徹恢恢然脫去籓籬洞徹人我其切磋善類接引後學涵以和氣溫以春風潤以時雨故凡海內及門之徒一見先生傾心景慕退則同聲而和曰先生今之程伯子也夫古之君子懷才抱德患不得遇休時而際明主先生自正德登第逡巡館職屢進屢退彼其時勢艱危年資未至其引而退避亦其宜也今上以明聖睿武御極餘四十年先生夙負重望主上素知其名然自嘉靖初復還史局尋以議禮貶逐再宫洗以上聖功圖不合暨官祭酒教國學四方學者嚮風景從乃復以自陳間住先生自遭廢家居踰二十年前後薦者無慮數十輩而卒莫能用豈其汲引者未至耶抑先生所遭蓋有數存焉而非人力所能與者豫觀明道在當時遭遇神宗欲用之者數矣乃纍以諌諍不合時事卒為執政所扼企後有登對者至自洛神宗輒問曰程某在彼否連言佳士其注意如此然竟莫之用也以今先生觀之其與淳公出處可謂先後一轍矣豈非天哉先生平昔交遊多海內巨儒長者而在吾郡十居其三及門之徒亦多以文章節誼自表見前後躋膴仕樹功業者亦十數輩若夫先生平生履歷及所論著他日自當書於太史播於金石儀望竊以得於先生一二大者僣為論次以俟立言者採擇焉隆慶元年奉特恩追贈禮部右侍郎諡文恭蓋異數云明文海卷四百四十四
