body:
  text: 明文海巻四百四十五餘姚黄宗羲編墓文十七儒林張陽和先生墓表羅萬化嗚呼此為余友宫諭張公子藎之墓余之獲交子藎也自嘉靖丁巳與大宗伯朱公少欽同師事侍御俞先生之門余長子藎一嵗少欽長余一嵗三人相視稱莫逆云己余與少欽俱成隆慶戊辰進士先子藎授史職而子藎隨以辛未登第官翰林脩撰余三人復比舍聯床切磋䆒竟宛如同學時何其懽也詎今萬厯戊子而子藎逝矣嗚呼痛哉少欽業為狀以請銘於相國王公荆石而復命余表諸墓顧余安忍也蓋屢操筆而屢廢者乆之雖然誼安能無一言以慰子藎按子藎姓張氏名元忭别號陽和先世故綿竹人為宋相魏公後徙家山隂入國朝而父太僕公天復以仕顯母為劉安人夢文昌降於庭而子藎生古貌稜稜雙眉㦸立識者巳謂不凡及長嗜學誦讀不倦而慷慨負意氣論議侃侃常從太僕公於儀部每每詢搢紳臧否時政得失隱然巳見激揚之意楊忠愍公死諌為文哭奠詞意悲憤聞者偉之讀朱子格致篇輙覆巻沉思務求所安巳聞王文成致良知之說恍若有悟喟然嘆曰學在是矣自是日究心焉戊午舉於鄉時太僕公督學湖湘子藎罷計偕徃覲逾年始歸築融真堂於龍山陽講學其中後連上春官不第而㑹太僕公有滇難下石者蝟毛集之子藎以一孱書生力脫竒禍蓋期年而吞吐蠻烟瘴雨中叩門號呼洎於父子相抱泣於庭事卒以白而子藎之精力頓耗是矣旣入中秘自以釋蹻取上第期有以自樹無媿科名稱聖明之遇日珥筆館下蒐金匱石室之藏而研究之詞臣雍容文墨率揵户簡出為髙子藎獨聚徒講求世務人才有得輙籍記之至國有大興除必反覆詢考務恊於一㑹上御極星變御史某以直言被放子藎疏請復某官且乞取彤管列女傳進講兩宫語甚切至不報無何聞太僕公病給假省視歸躬湯藥者十閱月而太僕公卒子藎哀毁骨立杖而後起免喪起家同修㑹典巳充内書堂教習昭鑒訓忠期埏埴正人以偹僕御之選蓋有古大臣之思焉巳又充經筵展書官代草文官誥勑直起居注館㑹皇嗣生奉書告楚中諸王匡廬沅湘武夷諸洞天福地足跡靡不遍至必有㑹㑹必有記使竣以便道歸覲太安人依依膝下不忍去而太安人盛色督之行行不數舍心忽動馳歸五日而太安人不起矣前後兩喪皆以歸侍得躬含殮人以為孝感云再免喪起家用詞林乆次擢春坊諭徳清理武黄尋充經筵講官旣入侍見上津津嚮學時齊顔色納講臣諷勸退而色喜謂宗社幸甚庻幾抱㣲忠伸末議靖獻於萬一也初上御厯覃恩太僕公以坐誣被黜不得與子藎疏白寃狀請移恩太僕公詔予冠服至是復懇疏以原官請上以其違例凟奏切責之竟不許子藎大窘伏地慟不休痛洗之不行也控籲之無地也烏鳥之私格而貫日之誠㣲也竟伏枕奄奄尋至病革時余遭大故跧伏苫塊惟少欽守邸中得與子藎訣啟手足示之呼陛下者再且曰朝廷亦多有人張目拱手謝門人之請遂歿嗚呼詎謂子藎而止此邪子藎少負竒禀忠孝大節明發不忘自總髪以及艾行己守官耿耿為宇宙竒男子而尋厥本源則良知一脉逺宗文成而體驗實踐自得為多每謂學者皆說良知不說致良知去師門宗㫖逺甚又曰上智即本體為功夫下學用功夫合本體其超悟融釋表裏洞貫不讓諸入室弟子而矯偏救弊以羽翼師說則子藎之功有焉尤惓惓接引後學成就人材性剛直嫉惡如讐至於奬善常若不及如復文公文成兩賢祠祀四鄉先生於學宫議條鞭法便於民衆建龎公去思祠推創法之功以示不揺皆本子藎力也居恒負天下志間偕鄉先生讌集胥目子藎為黼扆中人願以古名臣傳及國朝經濟録為相業助子藎莞爾曰忭徼先生寵靈得事明主執秦誓一篇足矣其自任之重如此以故一時内外搢紳莫不以伊吕器歸之而子藎亦不復固讓至處權勢竇間不激不隨漠如也文章舂容爾雅粹然一出於正初太僕公作山隂縣志旣成子藎為續其後傳又修㑹稽縣志紹興府志義嚴衮鉞稱一方信史然並出張氏父子手人謂有班馬氏之風云撫異母弟恩義備篤尤厚於親族待以舉炊者數十家孤寡老弱婚喪皆有給越俗浸尚奢靡居喪讌賔崇佛子藎以禮節之著為家法人多化焉衣必重澣飯僅脫粟子弟稍不如指輒譙讓不巳子婦有服珠玉文綉者立焚之暇則率諸孫歌詩堂上陶然自得人莫窺其際大都從虛明中一竅作用無失其本來者而己余嘗謂少欽縝宻而有不為子藎剛毅而有必為皆任道之器而余以淺𠂻弱植左右二公間庻幾箴砭薫培我也而今子藎逝失一良友矣可勝痛哉子藎以五品終格於令不得請謚與贈越三年吏部鄒君元標以子藎請得如羅公倫例以為不媿科名者勸少欽狀子藎謂後必有表章之者不謂近在吏部也子藎可無憾矣子藎娶王安人純徳懿行著於内外子汝霖汝懋諸孫玉立所以紹休嗣羙者且世世弗絶皆子藎之所留也爰碑刻石用識余思以詔來者先師司訓在川黄先生墓表鄧元錫萬厯初元夏五三日先師子黄子疾卒於京邸鄉人羣聚相弔哭里人涂從事伯躍為買棺視含歛訖承師志盡却郡若旁郡官京師者諸所賻遺金巳人歸其喪比自京師還手出師遺墨授師門人鄧元錫曰噫􅐵兹先生疾革時起端坐手所書也方書時若平居偶漫書無謂者已瞿瞿若有屬也敬藏以俟元錫起再拜謝神怵心怛不自知涕之滛滛下也巳受書亟讀之書在一故帙帙端其書曰偶爾一疾詎意遂成長徃天降之殃敢不自知永念平生上負父母之恩下負師友之誼今一旦巳矣言之拊心愧其負在虛行徒修實踐未至影見亦妙終非真誠來者尚以我為戒云末著虛游子遺言五字識焉元錫奉之泣曰嗟夫是師末命也命至矣翼來學為至深則徧以視諸門弟子門弟子讀之泣曰嗟夫師末命至矣身沒萬里外拜㣲官甫月耳家懸磬子㓜而妻妾處室不顧念而來學為遺憂當是時門人奉師柩塟考府君潺坑之墓下同兆有宿草矣於是元錫列師訓具表諸墓上曰師末命其可不深長思哉忱深長思於成學不有的哉人有恒言皆曰學無庸多言為也顧踐行何如耳言華也行實也今觀之猶之行也乃虛實顧辨於其間耶師事親終老孺慕處鄉閭恂恂翼翼無貴賤少長賢不肖由由無間也與朋友切偲忠告懇懇結其心臨財亷然諾信言徐動矩即造次事變雍如也有守氣而無亟心疾威不懾見侮不怒所不為不欲確乎其不與易也師在膠庠中最乆督學使者下校官察士行校官集多士具楮墨則人予片函令各舉所知發視皆師也最後一生至問之曰若何舉對曰廪生某也曰某何狀對曰立心正大行巳端方學諭君為欣歎者乆之於是督學使者數更蒞而師以徳行旌不易也中丞吉陽何公敬所王公有特旌嗟夫師於實踐不孜孜著信哉乃猶以虛行自訟嗛嗛也無亦以知之所至行必至焉之難耶無亦以修之昭昭者人知之伏之㝠㝠者心知之心嚴之耶中一不自慊即飭躬厲行亦厪免顯然尤悔爾矣於不疚無惡者終逺耶嗟夫危乎㣲乎固學之大辨也自南粤東越之學興人有恒言皆曰學不見性即修行義襲耳汲汲然一見之為快乃見有影見耶乃影見亦妙耶即見妙於真誠終有辨耶自師始志學與三五同志宻切磋於真靜無欲之體屏見聞黜思慮凝立危坐以求入不即終夕遶榻行以為常日収攝純固也於造體益親始見師泉劉先生於洪都一見語合意時它名公有招劉先生宿者謝不徃曰黄君學有靜根吾所願與切磋者也就師館敦琢者累晝夜始見東廓鄒先生於闕首質格物逐物之辨時夜坐門廡間百十人不辨色矣鄒公喜曰誰與問者對曰某也公曰善哉問與徃復者乆之巳元錫西遊吉二先生次語未嘗不於師乎拳拳也師於學辨念於意辨意於覺而約之貞靜以立本於見也卓矣乃猶以影見自訟嗛嗛也無亦以有見皆妄即𤣥見猶之見耶見之為陽熖見之為空花見之為泡影廓然無物也於物也蛻矣斯影見乎否耶故鵾游蝶化見妙矣然恣睢轉徙於無何有之鄉㝠莫能自反而鳶魚飛躍造夫婦察上下一實萬分者固誠之不可掩也嗟夫此學之大辨也彼以虛行自蔽者務外者也語命之小人之儒以影見自詡者眩内者也記目之無方之民蓋終身闇闇終身勿勿終身慥慥而後能以其身誠也故曰師末命至矣翼來學為至深元錫以丱角事師師覆字待恩已誘掖備至後更推挽之巳甚也乃知罔行殆無足為師門重心愧之顧推其媿心之言為之表用自朂朂來者踐修誠一庻其繼師志無負哉即不然於末命謂何矣師諱天祥字文明建昌新城人以貢為邵武府學訓導未至官卒它世系生卒始末具壙記中兹不復悉云愚齋傅先生墓誌銘鄧元錫昔孔門七十子之倫通四教六藝者至衆而獨稱顔囬為庻幾决克復歸仁於一日喟然之嘆蓋其覺也然且終日不違如愚若虛以黙成乎徳行宋濓溪周子以無欲標聖之的程伯子妙齡指掌躍然於吾與㸃也之意而敬正㴠養渾然元氣一㑹於天成蓋闇然之章上逹天徳能有造者鮮矣邇江門稽山之學興天下學士無慮言證悟求其黙識黙成居安深詣如愚齋先生傅君余及見一人而巳先生名明應字國卿筠髙安菱湖里人也其先出清江自逺祖君志始徙居菱湖傳十一世而祖以明遷水東之蓮花山大父埴又卜居珠浦埴生義泉翁維孟先生父也先生生有至性始學時郡學愽樂昌鄧公與吉水七泉周公講稽山之學於筠筠士未有應者先生携從父弟菱湖君賔應造焉二公日黙對無啟告而先生津津有入也巳教之修念内觀一日㳺城闉體呈露隱隱語友人友人以謂鄧公鄧公召問之先生面發赤背汗浹而内省愈深然念擴益進欲汰愈生懲克力至體為羸瘠而未有以得也於是與賔應走匡廬入鹿洞即三賢祠棲焉巳果有所遇澄心危坐竟旬日而釋然於諸欲無欲諸念無念諸境無境本心之體洞然也萬膠氷泮學覺超於無為於是命侍子具浴心開目朗諸觸處爛然如有光自是神精以明其言曰嗜慾叢中纒縳窠裡惺惺者予誓還厥理神明神明倐其予啟自兹内忘并忘其體一氣氤氲歸於太始又曰元氣未復病於夏畦元氣既復泳於淵魚藏焉息焉允握乎元樞修焉㳺焉將元化之與舒蓋自其始覺而篤信不惑已如此於是歸與新喻簡君守貞上髙李君應時諶君悅日漸磨於學忘饑寒暑雨靡昕夕怡愉以懌也愈乆愈質閑邪若臨守真如保而居愚用晦走桐江石蓮謁東廓念菴二先生從學焉而其造愈淵其言曰不求人知而求獨知是謂真知不求獨知而求人知是謂無知又曰皇天降命纎穢不入一念忍戚然如斧斤之伐心一念私黯如鬼狐之奪魄蓋翼保純至又如此心不二於一故諸念不攖事不迫於阻故履險不驚言不離於幾故動人者微而觸焉者立解其貎翼然其氣冲然望之儼然即之温然見眉宇者咸知其為有道之氣象然也其言曰體莊氣和心正可知心焉不正氣體必移是知直内方外如明之與照融融液液何内外之可岐耶先生於所性洞然徹視無間以為此形上之體乃天命人心之本當深養完復求為無忝諸日用應感與百年事業獨當素位盡分因物循則順而應之於此體無渉也故不大事功不矜智能淡然内足無復餘羡雖文章功業仙舉禪乗世賢智之士希慕期冀以為不可必得者而先生介然無所動於中乃世人得喪毁譽用舍屈伸死生夀夭視之如蚊虻之過前泊然無有也其言曰此理坦然百姓日用但明此盡此即無近非逺無動非神又曰吾人處世盡道俟命如舟行江湖載滿矣需風為行止又嘗言世有大人先生諸皆明了獨叩以欲根未有不憮然失者蓋逹者鮮也嗚呼微矣先生自弱冠造體守不離於宗者三十年有學造而無回易有完養而無操舍故氣習渣滓日有澄汰而氷泮霧釋莫知誰之所為病亟時淹奔床褥百楚備嘗而靜正不亂整衣冠以逝所謂㴠泳從容未嘗着纎毫人力而生平全力盡在是也先生孝友成性義泉翁客滇南母歐陽孺人疾不能興日夜侍愛敬悃愊時年十五未學也歐陽孺人命之學於是湯藥外日手經榻側劬於學義泉翁還自滇歐孺人沒事繼母葉於歐孺人無間也内外以曽閔稱葉孺人沒義泉翁手書訃曰而母以某月日傾背臨終獨言無以報若恩蓋慈孝之感至於此伯兄早逝撫二孤不啻巳子事仲兄友恭篤洽於羣從兄弟子姓驩如也身任其經紀䕶翼之勞衆倚怙焉倡搆家祠祀菱湖始祖以合族乃羣應如響先生戒勿亟而衆益悉力自奮也祠成以其餘買田為祀先贍族費而灌薦瘞餕畢申訓比禮可觀矣處家靜而理馭童僕肅而恩遇强暴格而化家故貧然持身氷玉皭然無濡染而於人最恩婣戚有婚喪未嘗以貧病故不周於禮也有友人喪京邸殫心力經綜歸其喪諸事關郡邑利害風俗隆汚者幾可反必悉力圖之其求友汲汲如饑渇所與居分更漏切琢不厭即造次旅泊拉同志交警虛心求益不是巳見人有片善欣然樂取心所不欲勿以施之人故動之而從率之而風訓之而興起者渢渢也故生而無賢愚咸親之病而無内外踈戚集禱之殁而無貴賤上下畢哀之蓋徴者逺矣嘉靖戊午江西鄉薦第三人入宴日御史徐公執手太息曰余出京至張灣業巳聞君名今幸薦君得藉手報國矣試南宫屢絀戊辰以父老將需一官為養㑹得葉孺人訃奔歸巳又有義泉翁之喪喪𦵏毁頓是年有詔舉郡國鄉科乆次有文學行誼者都御史劉公筠守鄧公以先生應詔事且上而先生疾不起矣配敖氏子二長士簡娶新喻簡氏季士約聘李氏女適新喻簡應麟孫女一生正徳庚辰正月卄一日沒隆慶巳巳十月十有八日年適五十朞嗚呼哀哉吾旴距筠七百里壬戌始搆見先生於京邸莫逆也比再見益親與陳君省齋共眠食砥益者三閱月始聞變即日走菱湖哭焉㑹先生有治命遺訃矣明年士簡㑹從弟君狀來請銘竊自念先生於予子翼孚化保危解厄徳不後師保而讓善推能咸受巽與蓋相視如一人此其誼至深顧安所得辭惟是先生終生隱約又鮮所論著世未之或知其徳行純懿造詣精一非深於道而通知其所存者又未易及知也顧又安能言然中心怛怛竟不容於辭避為也益難言難言矣為著論曰先生始悟近陳公甫持養如李愿中悟而不肆養而不廹中和具體漸於程伯子矣而國愽文君似韓哭之詩直以為貧如顔樂虛無不校云系之銘曰於維先生有覺淵淵敬修乾乾將予温之肅穆宻綿履常立中有截不偏劉彦修有言韓子云軻死無傳殆不其然蓽門圭竇中黙契聖心如面承傳亦何代無旃亶其然矣陳一泉先生墓誌銘鄧元錫萬厯丁亥夏四月望日一泉陳先生考終於家之正寢明年𦵏祖壠陳家山子以果奉學諭呉君所為狀來請誌曰先子之所屬也元錫謝讓曰有萬學憲君在學憲君戚而賢戚也知深賢也言傳則為書懇焉學憲君報曰泉兄之所屬也君其誌吾為之傳乃敬為之誌蓋先生成章時受學於里人吳子金先生業巳聞越東王先生之學請事之矣旣冠與司空曽公少司冦萬公相觀摩司㓂公自誌之比壯從吉永新顔鈞先生游顔鈞先生者㤗州王先生弟子也其學以人心玅萬物不測也為即性即命欲以心運世而頗訾古儒先為見聞理道格式實障道以自詡為恣睢先生游學揚㤗間恱之從渡淮渡江從入衢信建越嵗矣盡領解其說顔鈞先生喟然謂門徒曰吾與若軰言從情耳與惟徳言從性與本潔言從心本潔先生字惟徳則大參羅先生字也蓋其學以從心所欲為極致故髙標許如此當是時先生尊信顔先生甚乆之中自疑若巳盡其學然學何容易也㑹從西游吉見安成師泉劉先生劉先生王文成公髙第弟子也篤而深顔鈞先生嘗師焉就訊之劉先生愀然嘆以為獨苦夫功烈之入人深也先生心易之中自語何卑卑及是則請曰聞之學以通性命原本為大宗功利乎何有劉先生曰為功利從有性命來入之耳時先生悟固髙而人本忠實不自欺内自省知自名性命而心所潜藏隱伏者則盡功利也乃大懼蹶然起曰唯然將學何自成劉先生曰唯然何成是炊沙而飯之也於是退改悔卧不帖席者三日更徃謁劉先生請曰是猶亡人哉功利種種欲滌祓而無從則奈何劉先生嗒然不荅者乆之巳而曰苐能於當下蕩掃廓清見無欲真體庻矣於是先生恍然有省而夙心舊學倒囊盡棄如蕩長風而濯大波也明年入辭顔先生請從劉先生居顔鈞先生以為背巳怒嫚罵之諸同門爭挽留則對曰曩源所為事先生者學也今學殊指貎為容而留事先生以迹不以心吾不忍為也竟去從劉先生鄒文莊公於冲𤣥廣衆中嘆之曰若陳子可謂大勇矣於去就較然不欺其志意豈不毅然大丈夫哉於是劉先生盡以師門致知之㫖授焉小麤曰知麤是知不麤小昏曰知昏是知不昏少懈曰知無力知常明常健小有過曰知無過夫知常止過常化知常一過常精也而以見過内訟為自致要機問悟曰悟乎悟吾未見不即悟即病者也必也其學乎學者覺也時著時察不住悟故知惟學為無病也於是先生僩然於學有入矣比貢之京師則學憲君官祠部魏司空官都諌皆懿戚相切磋因得並海内論學諸君子游而學造愈淵嘗夜半攝衣起坐妄想心銷落澄然内明若有與天通者喟然嘆以為内潜之力也而下學於潜語具萬學憲贈别序中於是時得諸學憲者最深巳入銓得池石埭縣訓導石埭人興於學督學使者耿公禮重之徴為書院七學師遷諸暨教諭諸暨人興於學如石埭巳稍遷崇王府教授蓋先生為學官者九年矣署邑篆者再而家猶壁立則又之汝寧内艱歸復起補阜平王教授又來旴旴故先生舊㳺也時大參羅先生官益尊悟益超夐說益宏濶勝大而譴學作益急先生以故交徃徃抵捍之面疵之曰君奈何尊其道而紆其身羅先生熟視乆之曰髯公事學乆衰白矣而終不囬頭不悟當如公何先生㣲哂曰曩吾方悔所悟公更令悟所悔乎理程門語曰祗恐囬頭復錯也而嵗時過新城留必閱月或旬或兼旬反復於知天知人之㫖本心本天之辨甚晰而吾旴人士稍近裏就實者顧徃徃依先生以為歸先生恒言曰人生於世染於俗聲華勢利乃其命根即痛摧折之不滅也况從栽培之乎此根在即髙見𤣥悟多諸伎倆亦培養此根之具耳又曰吾自省日用應酬大概於人心中出沒幾㣲之際欲從末由正如老年看花不惟眼力糢糊抑且心神蕭散又曰近驗此身於此學日有查考日有磨鍊益信有切實研精之學不可須㬰離又曰近驗此身稍覺有終食不違意又得二三篤實老友與朝夕事焉庻枯楊之稊哉嘗遇事壹鬱以自訟曰吾過也吾祈其化又不欲其速化懼創懲不深蓋學平質深力至於此丙戌冬得㣲疾遽請假還而卒令少濡忍者旅死矣距其生正徳巳巳秋九月日享年七十有九按狀其先世出江州義門宋康定間徙南昌蠶溪世為南昌人國初濟享公以經明行修薦知安陸州子廷堅復以薦授南兵武選司主事而文學石溪公璉先生父也母魏孺人先生早失父能事母魏忠養蓋母沒而七十猶毁也撫弟濓㓜授書長授室卒立之亦以貢為學官介弟頗跅地時時割囊中裝為償責終已無怨悔少貧甚而多長者㳺同學與之約曰必絶游從專於業先生許諾杜一室攻苦間偕同舍生出遇饒廣生旅見旅勞問日之夕饒廣生投刺來請交則惟先生也於是同舍生媿歎以為君非博交實人樂與交其温巽善入人易親得之性也官石埭余及見石埭生石埭生慕誦於旣去如一日署邑篆恬而不煩民讙然奉公官王邸請王日講請王諸子日聽講而日親鄉後進生從㳺學甚衆多顯人至郡守郎從官娶羅孺人賢早卒繼室王氏子二長以栗府庠生娶鄒氏次以果娶龍氏女二適羅祥羅垣皆羅孺人出孫男三舜賓娶雷舜臣娶朱舜卿未聘元錫未冠辱知於先生迨白首彌篤於先生之為學本標具見之且誌之如此即不文庻其録哉銘曰聖學本天以道物身而不過物近學本心㝠心即道過物爽則自有生民以來有心咸危即上聖大賢㣲志以道寜欲無危而不可得也君謹師傳潜悟深省自知自克矩矱䋲尺非所謂出入不悖所聞而有造有徳者耶噫徴仕郎鏡川涂君墓誌銘鄧元錫徴仕君旣巳官秦鳯翔府經歴巳轉楚沅州衛如前官宦十年矣仕有聲人意君仕優且廢學而君歸日切磋於學不置也君恒言人何可一息廢學夫王事若龍學焉得習孔氏弟子患之况下此數千載學與仕益岐簿書期㑹錢糓獄訟勤居將徃無已時仕於學何當而何謂學也今經生受學嘗有造者徃徃以離索乆而怠學問之曰日理帖括訓詁語而妨學即如言即學何時何地得自致耶以今觀徴仕君宦乆而日深於學即官而即切磋於學則知不患妨功患奪志之言尤信矣自近學興名世者務索𤣥窮大以自蓋曰性命性命至存誠反躬恂言質行若以為不屑為者乃其言彌髙其行彌濁其心彌廣其識彌狹其悟彌卓其忠信彌薄茍自快一席之談若可凌前聞侈後觀而虛蕩之風愈煽俗彌濫以惡也乃今徴仕君獨拳拳立誠反躬言恂行質造次於修學顧不難哉有言學它可勉乃剛柔輕重遲速得之性者難卒變也君曰無自恕有言事難如心者曰無有寛有旁及釋典𤣥言者則浮大白謫之曰何為讀非聖書蓋君之學自信於知寸行寸知尺行尺尺寸之失不如此也可與共學矣抑且比有立哉先是予從師友講業天峯仙居間君選二子來受學亦時時來質學既翹然奮巳入銓適先師在川先生貢禮官在都下同舍同寢食切磋而君以有立也君語及先師必追悼慨慕益以信學之不可巳矣君諱懋光字伯明號鏡川其先進賢人宋季團練使伯一公徙新城國初登甲第者三人曽祖某進士欽曽孫也祖坦軒翁洛父梅例官帶未官卒自君未聞學執父祖喪能喪事祖母朱母潘能養比入官能官世以資限士君起例貢而官聲籍甚也在秦視汧陽篆在楚視㑹同篆者再所至字民慎獄清徭平賦賑饑掩骼政具舉而苞苴餽遺毫無染也間勦秦囬賊議建縣治楚五開填峒夷尤偉當道下奬檄者十有一撫按㑹奏薦者再欽奬者一嘻君之能官學之力也官乆且更陟而君念母老求歸養甚懇監司挽留之不得聽致仕而奬檄沓至多羙辭其大者以為居蓮幕介胄歸心八年一日攝花封閭閻頌徳萬口一詞且謂其未老以孝養歸為士林盛節云然君歸痰疾作乃無何卒生嘉靖戊子九月日卒萬厯乙酉六月日年僅五十有八第藉令君不能信一旦之决少濡忍幾幸一遷不克一面母而客死即目何能瞑矣人安可無學也君室璩子世増世陞繼室楊子世積世慶積少而端慧余造君君必令侍令問經問學予竒之無何夭予為悼痛而君安於命勉寛譬不過戚也曰令慧者不夭則公俗子今存令為善者必有後在川先生何竟乃乏嗣也俗余季子亦慧而夭云噫逹哉言増婦黄陞婦裘繼劉慶聘璩増子曰大亨女二適劉宗濓郭子然𦵏某都某山先期増陞慶以君從子世修狀來請銘銘曰君仕有聲者華耶學有程者實耶華不竟曜實不竟成者疾耶疾不永日而既有立死不亡者貞石皪皪奉政大夫兵部武選郎中淡菴錢先生墓誌許孚逺淡菴先生旣歾之二年其季子光禄君闕以手撰行畧及沈水部叔敷狀屬銘於不肖孚逺嗟乎余何忍銘先生而又何能不銘先生耶余受教先生垂四十年於此詩所謂匪手携之言示之事匪面命之言提其耳者深矣至矣銘先生者非余不肖而誰耶先生諱鎮字守中别號南離還山之後改號淡菴髙祖份曽祖讓家烏程之陽㤗里父贈職方員外郎母呉贈安人呉生三子先生其仲也贈君窶僦居城市先生自孩孺孝謹異常兒甫九嵗贈君以它累繫獄吳安人且沉痾先生日夜拊摩安人不交睫又奔走禱禳病乃起十嵗出就塾不數晷畢所授課白師歸跣而操作以供朝夕蓋三年而贈君獄始觧一日先生對塾師問偶欠確贈君怒呵曰何誑長者批頰眩仆乆乃甦其嚴如是先生剛方質直所自來矣年十七借棲殷氏初習舉子業躬執釡爨旦暮一粥弱冠就試補弟子員棲誦黌舍徧讀諸經子史文章日有名郡中諸英乂爭願結履聆謦咳者亡何贈君卒㷀㷀在疚聞一菴唐先生講學鮑山之陽偕潯陽董公徃師之即遷居唐先生舍旁寤寐古之聖賢有滿頭白髪悲顔子幾度春風憶仲尼之句年二十二娶茅宜人而母吳安人卒卜壤昇山遷贈君柩合𦵏焉由郡城歩至𦵏所日徃返再三拮据襄事幾至顛踣無違禮伯兄欽旋病延醫治之卧起與俱盛暑不避臭穢兄肉削不能帖席先生以身藉之手持扇左右揮凡十四晝夜無倦色而兄竟殁云是時嫂氏孀居弟孝亷君錫與一女弟尚㓜先生稍從諸生授經得糈以自給既嘆曰丈夫豈能坐青氊終嵗俯仰人為也計得閒曠地躬耕其間以足衣食爰徧閱郡東南至思溪周視之地惡而廣可蕃子孫且萃族遂斬荆艾蓬藋徙居之自昧爽起躬督家僮樹藝而手携一編咏讀不輒夜則篝燈獨坐殫精凝神自經史外旁及隂陽五行之變化草木鳥獸之名理愽考精䆒充然儒者也年三十二登庚子鄉書明年下禮闈益闔户沉思深研易㫖其於觀象玩詞必從靈扄獨悟不徹不巳心力大耗至於嘔血然先生學益進而逺近士及門者日益衆矣當嘉靖己未孚逺偕計上公車初識先生於京邸稠衆中數語契洽遂執手而勉之曰吾子可與共學其歸同事唐師未幾先生登春榜名在第十一而孚逺下第始及唐師之門聞聖學焉庚申秋先生授武庫主事時董宗伯巳處津要猶兄事先生如曩昔時先生於同朝縉紳多落落寡合其數相過從以道徳相劘切者惟盱江羅徳甫麻城耿在倫四明顔應雷吉州胡正甫曽于野洪都袁孔安魏舜卿東明石拱辰永年蔡夢羲及同郡沈以安數君子而巳迨壬戌孚逺再上公車先生方大集四方同志講求此學而余與同年李孟誠萬曰忠滕汝載與焉孜孜接引惟恐不及先生旋奉使南行戒孚逺曰子入仕以學為急學在覺悟性靈消融氣質與同年寜處厚毋處薄一言一動必足為人所儀刑而可孚逺謹書紳不敢忘癸亥使竣遷職方員外郎滿考得贈父母與封其内茅如例再遷武選郎中先生洞悉天下邊關險害機宜遇事輒慷慨論列可可否否不少依阿遜避胡莊肅公時為少司馬極稱服而同僚或以此忌之有叅選事者病苛刻每以㣲文抵牾齮齕諸應襲子先生亷知狀嘆曰吾何忍輕沒人祖父汗馬勛而令其裔逺斃京塵以自為察耶檢其文無害者婉轉於堂翁使得襲是僚造蜚語相搆先生遽移疾歸㑹有同鄉張給諫疏糺大司馬諸不法狀其僚駕罪先生交相憾值隆慶改元大計京朝吏坐免先生官郎署甫七載其半在休沐而任事者僅朞月以直道見擯天下士大夫莫不惜之先生意豁如也是嵗孚逺繇銓郎予告歸見先生先生方督畚鍤濬河思溪握手笑曰吾平生自有經濟在此凡士君子升沉出處確有定數於人乎何尤談笑終日無幾㣲見於顔面余益知先生之不可及於是孚逺携兩舍弟執贄先生而先生亦率其仲叔二子就學不肖時季子尚㓜先生曰傒兒試完徼一第使就子門墻冀玉之成耳逾數年丙子惟凝甫歌鹿鳴罷先生徑從武林駕野航來寒舍畢前約而歸余在告及謫居艱居前後十四五載惟先生是依是仗過思溪精舍動經旬月或偕赴㑹約訪問知舊相從於湖山煙水之間白晝閒行清宵靜對其於兩間象數經史㣲言靡不䆒析先生藴藉深逺不叩則不鳴一有詰難發揮每令神動而其髙邁强忍超脫俗情尤能作余志氣而使之立有善必以勸有過必以規孚逺之受益於先生不啻如江河之浸而膏澤之潤也當孚逺官銓曹之日先生遺書有云天下事非必智勇才識之所能辨要在神氣有餘語稱不動聲色而措安社稷其神定而氣完也神欲藏不欲露日用間百凡可以計筭料度而致獨神氣不能要在有識而能養而不能者為智勇力識所驅而騁於計筭料度以自快於一時也况乎以聲色財貨而自恣者哉孚逺誦之終身恒恐有媿於斯語郡自劉清恵公結社以来髙風邈不可繼先生偕陳繡山方伯孫屏憲憲副呉樞季郡守始復峴山社約其後沈時秀中丞李彦和參議沈以安司空及余不肖並從諸老之後春秋燕集稱勝事云嵗在庚辰惟凝甫巳成進士而余以罪謫量移兵曹先生遺季子書曰初第倥偬今稍清暇而許先生尚留曹署不聞朝夕徃復參䆒此學豈胸中别有馳驅視此為立身第二義耶嗟乎余與季君俱媿死矣先生年逾七旬乃析産傳家政謝絶世囂專意著述謂古之君子得志則大行不得志則退而自治其身窮理盡性以正其本稽古正學整齊百家之異同槩之於道使後世復見二帝三王之遺意嗚呼此孔氏家法余曷敢怠哉於是起自周平王下迄五代上下數千年考㨿諸史刋去蕪雜存其彛倫大節及關國家治亂興衰之大者題曰通史經正録凡十年始克成編嘗遺書屬序於孚逺孚逺受而讀之見其詞約事該足垂鍳戒而其間尚有一二疑義於鄙見未融正思歸而請質而先生不待矣繼先生之志為之潤色補續以垂不朽者非他人任季子任也著學術書二篇其内篇明人性與氣禀相為進退性體著見一分即氣禀消融一分到得所性渾然全盡而氣禀纎毫不得以雜之之謂精纎毫不得以貳之之謂一要令此心常覺從靈扄中刮磨盪滌不使纎毫昏蔽駁蝕即是精一執中又謂虞廷精一俱從性體上見陽明先生冲漠無朕者一之父萬象森然者精之母冲漠無朕時亦萬象森然萬象森然時亦冲漠無朕一中有精精中有一是也其外篇論子貢多學而識與顔子心齊坐忘學術殊科學從性體上覺悟如原泉混混不舍晝夜盈科後進終必放乎四海若止在聞見上蹈襲如七八月之間雨集溝澮皆盈其涸可立待也子貢聰明才辨求道於聖人造詣力量之髙深而不求道於吾性虛明之本體孔子屢提之而不悟故與顔子終隔一階子貢之學流傳千載儒者多以義襲為事有志聖人之道者必學顔子之學而可由斯以譚先生學問根宗可得而識矣蓋先生雖歩趨討真良知之說而逺宗儒先近覈方寸不祈同不茍異要使粹然一軌於正而後已若近世談空說𤣥猶落氣禀用事者皆先生之所不與㣲乎㣲乎學豈易言哉又嘗著國制國計等書痛禮制之廢壞而天下以權勢相資滛侈無巳要在天子守禮定制以為乆安長治之圖謂國家財用之蠧莫甚於養善為國者不使天下有未興之利不耕之土而又天下不可有一優㳺焉無事而仰食之民欲驅游惰之民為食力之計興水泉之利墾荒棄之土以足國足民此皆關於經世要務其風俗書謂古人相與以誠而責人至寛故其俗多寛大愽厚質直踈鹵之氣後世責人至備而相與以偽故其俗多綢繆委曲虛浮不根之習古之俗尚質故其人多廓落不覊平居常事不遜面相質責有事則亦不擇利害委身不顧後世之俗尚文故其人多文雅修飭平居卑巽檢束不敢踰即有事則亦畏避退縮坐觀成敗古今風俗人才不同而國之治亂短長之效卒由於此有味乎其言之也先生方面廣顙色蒼而神完音響如洪鐘見者自生敬畏為諸生時督學林公試髙等應補同試劣等邵鈇廪缺遽從班行中抗言邵生文劣而行優宜廪如故林公動色卒允之有友人殷君客死京邸為殯殮䕶其喪歸故人子錢存發多漁官鏹論戍倡親厚代輸得免庠生呉士誠以誣搆滯縲絏隂為白於有司而出之其兄若弟且不知也棟塘陳先生甫圽州大夫役之城特為言於上官捐其役可謂曰義鞅掌終嵗人不堪其勞而抱膝長吟翛然物外當其貧時煙突屢寒誦讀自若也自少至老所入奉禄錢糓隨輒散去竟不知勾較盈縮或有貸予不問契劵居恒胸次廓然可謂曰逹每日寅起攝衣冠雖村孺不以䙝見暑月燕處儼對賔客可謂曰莊與人不設城府對里中父老故人子弟笑語歡然乃未嘗一濡足於權富徃來交際屏絶繁縟之儀義所不居雖强以一物納之不可雖在素知欲援而止之不屑可謂曰介冬夏一葛一裘寒不圍爐暑不揮扇食朝夕二簋奉客不過數肴出入挾蒼頭一兩人棹扁舟徃相與登臨雖髙逺惟徒歩遇盛饌羅列珍羞取一肉一飯飽而止他物不以入於唇有徘優在前絶不入於目可謂簡而定姻婭故知遇窮厄無不藉之舉火即及子姓數十年弗替藹然嵗寒金石可謂厚而敦里子有靣詢先生不為應隨而肆詈若弗聞其人即夕不良死或曰君豈前知乎笑答曰吾知其喪心不校不知其他有丘姓者嘗搆先生幾入羅網既第歸匍匐自責先生慰遣之巳廼以嚚訟獲重譴更庇之免於溝壑可謂犯而不校士衡等以萬厯巳亥某月某日奉先生與茅宜人柩合𦵏於思溪之西阡家於斯藏於斯令子子孫孫母逺丘墓蓋先生之志也銘曰吳興山水清且逺淑氣千秋徃復闕碩人髙踪長衮衮先生赤脚立乾坤一飛折羽終丘闕五栁伊川風味著書祖述麟經意權衡萬古刋闕書成一枕羲皇睡少㣲天上忽沉淪後死許子摹公神庻幾不朽存貞珉翰林院待詔鄧汝極先生墓誌銘許孚逺我國朝中葉自制科而外以儒碩徴聘起者僅有若春坊諭徳吳聘君與弼翰林院檢討陳先生獻章及今上所授翰林院待詔鄧君元錫禮部主客司主事劉君元卿四人而已吳聘君辭官不受陳先生受而不仕惟遺聲光在宇宙間近鄧汝極捧檄出門抵旴江將上疏辭官亦遽卒賢者用世固若此其難也豈名與位不兩全造物靳之而然耶當汝極之沒前二日孚逺自閩中遣使問出處兼期過三山商訂平生未竟之業汝極方在母墓僊山作報書及欲辭官狀謂君命未就義不敢遄赴友約語歴歴如平時而逾日即不起異哉其生死之際也其冬門人黄文學渾持所述行畧走洪都乞萬學憲狀而入閩乞余銘余諾之既三秋其孫思恭復於同邑鄧孝亷澄所撰事傳來留都申前請余不能待學憲狀始為之銘而銘焉君諱元錫字汝極别號潜谷髙祖義中永樂辛卯進士官御史歴湖廣廣西僉事立朝侃侃著風節曽祖時康祖廷璋俱有隱徳父植慷慨好義所居靣南山因以自號結層樓招客嘯咏其中配張孺人不宜子置側室劉生汝極汝極童而莊然志氣髙廣不為覊係塾師難之稍長南山公延黄文學天祥為之師文學知其非凡品也不為繩束縱其所如學日進當是時寤寐典墳馳騁史籍巳廓乎有囊括萬古之思矣而汝極性褊多戾文學為之調適維䕶其間時創聞稽山良知學衆駴弗省文學以朂汝極相與邁徃則矢志肩負洗然契發於傳文之上文學嘆曰聖學非吾子不能及也嘉靖丁未補邑校弟子員乙卯舉鄉試第三人南山公歾於是十年餘矣張孺人且老汝極謝公車不上戊午冬行至中途復回車過吉州問學於鄒文莊劉師泉劉三五諸先生文莊手書發育峻極從三千三百充拓三千三百從戒懼心體流出語為贈而二劉先生於汝極有深契交加鍜錬學益有得已而張孺人强之庭試始偕計一再赴春官及張孺人與劉孺人相繼卒遂絶意世間功名事杜門潜學歴寒暑三十餘載著經繹上下函史等編汝極之言曰大哉先師之六經乎洋洋乎天人之奥倫物之情備是矣刪述垂訓功至罔極近世學者牽滯聞見迷離於原本其師心自用競口實於六經註脚之語蔑問學而不事吾深病之於是首著書繹詩繹三禮編繹闡先師所謂雅言詩書執禮者也其言書也莫重於人心道心危㣲精一之㫖謂人心乗氣出入而其本乎天者曰道動於人則危復其天則㣲不㣲不危㣲則康猶反覆乎精以察道心恒㣲之幾一以止道心恒㣲之所斯人冺天定而無危是天地之中也誠信而執之時幾永保千變萬化吾常守中焉是學之極則也唐虞之典謨夏殷周之訓誥誓命率由是焉而已其言詩曰風者風也風本於家而化成於國故端起於夫婦雅者正也政發於朝廷而逹之天下故綱始於君臣頌者交神明之道也主唱歎無滛佚主清潔無侈詞風主情足以興雅主性足以正頌通神明則至於命極矣三禮本曲禮儀禮周禮而謂世以記並稱者誤也故取曲禮及少儀内則玉藻酌以彛倫日用先後緩急之序編次為曲禮上下篇而以表記坊記緇衣等語附之為經記儀禮本古經為經經有義見戴記者類附經為傳傳錯見他記者摭取為外記記各附其篇之末周禮仍五篇之舊而記於經相發若記考工者附焉蓋科條畢具而失倫者咸各歸其官故其言曰曲禮制而人道有理曲禮禮之本也儀禮者先王所以訓齊天下經仁義之大端也周禮治要在論官而六官三百六十屬一凖乎天行周禮制而天道以明民故以察王治其大順矣余讀書詩三禮繹而知汝極潜心於古之大聖繼天立極叙倫經世之道精以深閎以宻也春秋者先師明天道以正王統而定人心之書也屬詞比事大義森著非擅可句字繹也故作統言通焉易本汝極所専經晩益篤好著易繹諸卦爻具有繹祖庖羲圖象作先天圖原宗文王卦辭作周易序卦後天圖原憲宣聖易賛作十翼通又玩易反對為偶圖說易草初就余時守旴得觀之旣自闗中遺書汝極謂易理精奥稍着意見落言詮猶難以俟後聖而不惑汝極復書唯唯乃更繹竄改者至於再至於三垂易簀不休而尚未以付剞劂今所摹行郡中者歿後出之門人弟子者也然而殫精研思闡發四聖人之藴者既可謂大有補於先聖有功於後學矣史依洪荒而來迄於勝國考觀天人貞一之統察古今離合之變王路隆汚道術善敗之故為上編有表有紀有謨有訓有述有傳有志體裁各異其材取諸史其義禀諸經故其言曰帝之有紀明治之有統也翼以謨而明穆交賛師之有訓明道之有統也翼以述而庚衍不墜聖賢在上則推而行之在下則述而藏之㣲是天莫屬其心民莫必其命而王路道術遂為天下裂矣嗚呼此汝極之志也史下編總三才之撰觀㑹通之極由上古迄當代各紀一事本末終始臚列為二十一書其言曰天官之分九野也方域之奠九州也人官之列九品也是三極之道歴萬世而同條貫者也故首天官次方域次人官天官莫大於時令厯數以紀之災祥以騐之而天人之際大備故次時令次厯數次災祥方域莫大於土田土田生徳之本也有土田而後有貢賦漕河通焉故次土田次貢賦次漕河人官莫大於封建封建政之根也封建廢而任官任官有統而後九徳服在位也乃學校其本巳故次封建次任官次學校有學校而後有經籍經籍者天文地理人事之紀也禮理天地之序樂宣天地之和而後人道成焉故次經籍次禮儀次樂律嗟乎利誠亂之始也夫子罕言利常防其源也長國家而務財賄乃其來乆矣於是小刑明刑大刑制兵次貨賄次刑法兵制殿焉春秋謹嚴莫謹於中外之辨矣故次邊防次夷狄異教之為常道裂也自道之散始矣當防乎其防故受之以異教終焉汝極之學於經史者徧可覩其槩巳而異教考一編鏡二氏與吾儒迭為真勝之故以及理性命得失毫釐之幾可謂深切著明篤信於聖人之道而不惑者也而其要以反經為本以天命為則以禮教為防以乾惕為行一務於神明黙成而不事辨說其言曰小辯亂徳君子尚行小人尚言尚言好辯辨必窮大索隱以相髙茍務加人雕刻渾淪析𤣥解㝠焜燿如火旋轉如風令聞者惑心慝志雖足譁衆為人師而無當於事實有味乎其言之也然闕汝極言足純師之石街巷遂家於潯四傳為柟中淳祐進士修厚徳菴奉其先移狀本鎮給印押世守今藏於家又四傳為丹徒教諭公逸逸生英英生文亮文亮生寧寧生琪琪生濟濟生畏畏生震長身玉立有隱行人稱老佛君大父也生四子長月溪公經是為君考少孤依外家吳氏娶葉孺人且賈且畊家頓起為其諸弟以次授室左提右挈俾各有家蓋赤手持立而能振中衰為貽謀燕翼之計晩年行營髙敞地奉父畏公遷𦵏因自祔焉生二子長即君君㓜多病十餘齡始就外傅三年通經書補弟子員方攻制科文藝有聲於時而月溪公以貲稍贏為賦役所困又伉直不善事官長數受厄君長跽請曰兒徒事空言圖效而坐視巢卵之毁後將不救則奈何遂挺身代月溪公奔走於外東至海南至荆襄歴寒暑無所避又代之徃役典庫藏先是典庫者為有司所魚肉率破家符下相嚮泣君曰苐以書生身當之㑹龎直指鵬按浙首疏行條鞭法罷一切徭賦君應闕不旬日而歸既息肩杜門發憤思竟前業闕又湛恩闕給朝夕而富人恒操其急困踣之也叅倣古社倉常平倉法合鄉為社審其歛散榖漸贏則法漸廣一主憫農而其髙年有疾及節婦孝子特優之若在族姻尤為厚視待汝極而舉火者不知幾百十人垂四十年於此矣少與同里朱君僅共師黄文學劘切為深其後朱君夭無子黄文學以里闕受官卒京邸亦無子兩家爭衣食於汝極髙安傅孝亷明應以同志稱石交其沒也走數百里臨其䘮而存恤之靡所不至初舉鄉闕執經滿座大小畢育之成學若張司空闕光禄闕黄栁洙凃孝亷雲鴈並出其門中嵗重自潜歛不喜為人師乃臨川傅侍御元順南城聶邑宰鋐左行人宗郢並以同袍執弟子禮汝極故不能辭而若鄧孝亷澄者晩進歸依視在門墻尤篤蓋其感之深矣邑司成王公材識汝極於諸生時晚益折節相下司成公既歿卒頼汝極以片言徴信於有司方汝極學成其書稍稍出海内巨公長者無不慕其聲想見其人諸兩臺監司若郡守邑令徃徃致書式廬廼汝極義不徃謁雖幣交不茍受余之守旴也蓋三年而後得接顔色於郡城巳遷督學闗中偕過臨汝入洪都㑹鄧少宰萬學憲與余周還逾月乃别無言不盡則相契以心不在形骸之内矣然而徃返舟輿必捐貲宿戒不以一夫一馬累吾有司其操致凛然不可凟也汝極於文章雅不為酬應間一操染率傳經析義以相教而雄渾極變規周漢而有其質文詩尠襲近體而古選沉欝蒼麗漸風雅而成家著述自經繹凾史外有四書周易潜虛集古今儒者詮解而折衷之以為後學指南謂漢而下儒莫大於王文中而以僣訾之者過也次中說為六篇而周元公之遺書張子厚之西銘程淳公正公之遺書彚為編以明儒統周衰經降而諸子之說昌史列其傳傳所不及者有子約近代以集名家者有集約詩自古而來取其卓然闗世教者曰世風詞不必盡詩而義存雅正者曰近雅騷賦係焉統曰詩約明真詩未嘗忘也而諸經具有圖昉羲圖而來曰文字之所從出焉爾諸皆藏於家先是薦汝極於朝者韓直指國禎秦直指大䕫趙司成用賢王侍御以通而司成之薦以徴賢請擬汝極於吳聘君陳公甫之流厥後主爵者特起汝極以翰林院待詔與吳陳相頡頏闕重也然汝極風致徳業具可考鏡視前軌孰髙孰𢎞必有能辨之者矣汝極卒不數月而郡邑上之學使者學使者下郡邑學官弟子並祀郡邑賢祠中兹可以見秉彛好徳之騐汝極生嘉靖己丑二月二十八日卒萬厯癸巳七月十有四日享年六十有五配江氏續楊氏子一景儀江出亦娶江氏女三江出者二一適生員凃懋文一適黄涵楊出者一適南城生員丘徴景儀後先生三月卒孫男二長思嚴娶敦氏續楊氏思嚴先卒次即思㳟生員娶黄氏曽孫男三𤣥一𤣥二𤣥三並思恭子未聘墓在邑四十四都下村盤溪子山午向銘曰於爍儒軌肇啟宣尼下學上逹萬世為師六經垂憲燦若星日天經民彛藉以扶植世衰道降異學縱横𤣥寂變幻乗其髙明彼忱髙明行僅為僻浸而虛誕譸張罔極亦有豪儁文章自雄綺言無當藻繪徒工嗟爾鄧子黎陽潜學洞燭羣迷獨追先覺旣繹諸經載摩函史上窺神化俯䆒名理疲精著述易簀不休旣沒言立光賁千秋爰考素履矩繩是蹈克孝克㳟示民則傚道之藩籬曰存名節而子皎皎曽無玷缺實大聲宏升聞於朝徴起史局蒲輪在郊擬疏辭官叩閽路寢行及旴江少㣲忽隕自昔儒者稀聞盛遇天若靳之莫䆒其故嗟余凉徳辱子深知銘子百世非余而誰明文海巻四百四十五
