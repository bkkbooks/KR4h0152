body:
  text: 明文海卷四百四十八餘姚黃宗羲編墓文二十名臣龎原化墓銘夏鍭公諱泮字元化别號芹齋由縣學生中成化丁酉鄉試登甲辰二甲進士第簡授工科給事中稍遷刑科給事中公在諫司久而又事無不言扶理善類五沮格幸進一斥賤異教妄術三災傷二節罷好玩二戚里一出身與中官為敵怨二凡十有六疏可考悉有頭尾每一疏入衆遫遫危公雖長二皆以為可不必言者公自不能止若責獨在我又如論駁反活及一事聯名為副從尚多未計所幸遭遇先帝仁明間多報可即有未合亦不過詔獄一旨戊午升福建右參政近年大理之二以待科道之久次者公兩擬大理丞于南京皆無成福建亦再上乃得公在閩分守漳泉興福先是福安縣庫被掠縣官利在得盜雜捕平民二十人趣斃之公至及活者三人權其罪盡絀知縣丞簿既而以才力總督糧事辛酉當入覲李布政適病死公次當行檢李篋中得銀一千四百兩辭不取曰朝覲人事書一部足矣宋儒黃勉齋故宅為中貴香火院公毁之改彌陀堂為彌高堂祀勉齋壬戌補河南右布政司首革鎮守太監劉琅及馬尚書家私役錢銀以兩計日省三四十駕帖取洛陽牡丹疏請罷之司禮太監李榮索古銅鏡器物公曰物非土産官取之民民無以應則纍及冡墓卒不與甲子轉左廣西未幾思恩土官有為叛謀調發旁午及其成績公實一書諭止之乙丑用病歸御史何道亨給事中戴寶之等交章留公不顧也既歸詩酒親舊十有二年而卒則丙子十二月十九日也得年六十有七其先年襄德公之裔至隋有諱玉者仕唐為總管十三世曰正巳宋大中祥符間為天台尉遂家焉高祖伯靜號石湖居士曾祖叔圭有士行決武中辟不起祖諱瑞父諱計贈工科給事中母烏氏曹氏贈太孺人娶泉井蔣氏有淑行先卒贈孺人繼李氏子男一曰櫟縣學生女二俱適名家孫男二曰蓀曰護公平居坦易遇事振發斬絶不為左右顧視分所當行貪若嗜欲挈利害而趨之不可扼挽豫年十七八才少知趨向口不為常兒語常為公舉前人之言曰秦檜秉政三十年只成就得一個胡邦衡公曰吾輩耳中不可無此等論議夫言必先有之不然安望其相入如此也乃今日益驗公卒之明年櫟卜以某月某日合葬公于縣西芝山之原手録公歷官行實請銘墓中豫不得辭公嘗評吾文曰如我所見子之文比於韓栁氏更若理到雖推許過實要為不薄吾文也况櫟又以為言銘固吾責也公在官手不離卷帖發為詩文視其為人有諫垣薇垣歸田三稿寵嘉録名臣論略若干卷藏于家或曰前所舉十六疏者若又出姓名指列某事以為後信可乎豫曰得暢御史亨與浙江鎮守張太監訐奏一山東副使楊茂元言觸時忌幾死二刑部郎中丁哲斷事橫下詔獄三武岡知州劉遜見搆藩府四中官何文鼎言家法忤旨五威寧伯王越營求再入六戒璇乘轎七濫度八燒丹禁中九京師天水十陜西旱乾十一內監請備元宵燈料十二傳奉取銅鼓十三侯伯周或張鶴齡縱奴殺人十四論置蔣琮於法十五數李廣十死十六當暢張搆訐時適有知名巳殁大臣視事兩浙反若有助張者并出之非止以見公之難亦使居位者知謹於未死之前於乎有如公者誠不敢不表而益著之銘曰志則難施舉世嘻嘻蹇蹇匪躬臣實以之若錮臣心山石可移虎豹食牛視其兒時所乏矯矯亦有自持公一不少氣溢殿墀惴惴小夫便汗弗支石不能言我為之詞百世而下銘公者誰山東按察司副使李公墓志崔銑公諱惟聰字自愚河南杞人也生而異狀碩首豐背厚靣腰腹方濶身長七尺力舉千斤望之屹然躍馬擊劍儇捷如俠士性質氣猛趍義若奔甘淡服勤避汚如不及少習朱氏詩夜誦畢則入室空習劍懸枕作壘為攻擊之狀讀古兵法有妙悟成化巳酉舉于鄉後屢上春官或獨行無僕荷杖跨驢惡少駭散丙午選邳州知州河瀦荒田公相地勢之宜走潦開渠抽棘辟畞歲入倍常流民復業蝗不至境上官驗而稱之𢎞治壬子河決廣陵治河大夫劉忠宣取公供事河久未塞公忽悟卷掃法蓋先於岸上作臺後密置刃木於下背環繫索臺上作掃堅築之長七十丈高二丈乃抽木下掃於水其激流則并下二掃又以草束土密其隙河遂東注不溢作堤延袤六百里公以四十日成均分合工毋敢買佚奏功晉工部都水郎中改繕部采木湖南庚申北兵大入侵大同兵敗死晉公山西按察副使大同兵備公比五閲精十抽一拔制兵長短互用馬步錯行因藝執器不強未能挑牌防矢戰車立藩晝則治武夜則固壘旗鼓號令聽聞相辨自率三千與同辛苦又修邊城續斷剗復外曰大邊內曰小邊皆十里一墩中舍小墩或三大墩守兵五十人小亦得半由是士躍馬騰烽燧不舉又三年改山東副使管遼陽屯田公又悉究病源掊奪權貴皆受約束並邊廢田益市牛耕鑄鏄釤鉏劚給農之弗能自具者丁壯興厲歲益田若干頃造册送府恐防射沒皆公自畫疆界手笇尺寸又欲倣古井田溝遂畝澮暇則便耕作警則阻馳驟值改官不果正德丙寅乂以急命往宣府飭兵畏而不敢至公年七十致仕杞人陳子乙曰公之善兵備也有四德焉誠使人樂死也義使人生勇也明斷使人不二也清儉使人息競也公好農居常出入阡陌時刀美稼仕則舉而施之不治賁觀不務茍成懇懇截截既竭聿績惡閹人之毒民每却漁取治河時李興列其名受上賞固求削之在遼東抑沮朱秀乃賄逆瑾矯命下詔獄罰五百粟輸大同公之子倬暨其三弟俱從公出戰編行伍間倬以勇力好義上官令督盜河南擒獲竒略可載之史倬之壂舉進士淳實能文將大李氏之績而藴者詞曰唐士三足宣國宏猶惟食惟兵惟才則修修食伊何服功畎畝蓘溉既時穫積孔阜修兵伊何飭度于戎欲勇可賈惟餼是充毅毅先生生我南杞經略夙成章句實鄙治經獻策際我明良載矛伏劍克彼陸梁辟田種粳隄障陂藪濊濊者惠尚傳民口引長接短肅隊疏行翼翼者律何戰不臧於維李公厥才孔有為國長城為民慈母拂衣歸來彈鋏長歌河濱釣石塞上干戈土墻及肩糲餐入口試吐厥竒填兹宇宙銑也先公及公同升惟公雄名聞自過庭銑晚入朝公孫作友文兹玄石期垂永久田汝耔志崔銑君諱汝耔字勤父汴之祥符人𢎞治戊午年二十有一與豫同舉遂業太學勤父博聞善辭又飭操檢三原馬伯循稱之曰見人之有技而不驚規人之過而溫乙丑又同與舉進士巳以外艱歸服除授行人選中給事中是時劉瑾竊政瑾誅閹嗣其所行朝紀聿紊官惟附權潤巳勤父挺立其間絶請謁攻詞賦豫既交舊而雅好何舍人仲默每過豫兩人浮白吟詩慨時自憤曰引裾請劒者固丈夫許國爾顧事不當其會而情不中其欵殺身無益章主之暴嗟乎嗟乎迹與心違命與世左是以西山餓夫夫也然勤父遇事斤斤自信敢斷決直端揆虛位爭進者類禦徒然勤父上疏言當用大臣以忠諫去位如韓文等遭旨斥然不禠職又劾武帥時源恃功淫縱遷江西提學僉事江西雖號文邦士習諼恣尚請託提學官校試列第不合素所評輒呶歡徑去善宦者先陰訪衆議參以今試者列名下之勤父惟據試文勤父雅好秦漢諸家書刻行史記往以舉業譽者勤父病其腐置下列又遵敕諭賢知府伍文定同知曹琥四人及教官十二人及退居御史宋景及逸士某俱上疏薦又劾知縣及教官不職者十餘人憲臣及僚惡其侵官乃共升謗當考官時南臺劾之調山西方謗起共欲擠入不測之淵然止言其乖方他無可摘者古所謂因貶見褒者歟自山西遷湖廣副使皆理獄清屯田修水利榷庾儲事靡不飭前後乞休者三乃得請時四十五年既還汴力田養母杜門讀書誦聲琅琅聞户外病六經庸學傳注紛如靡統字稱句品思纂輯成一家言僅畢周易而巳詩暨古文集若干卷勤父之生母魏氏兩娶俱陶氏女子一人惟屏女適李萃叟徐夢鶴前陶一女適和顔葬以丙申三月八日勤父受行人在正德戊辰選給事中在巳巳治刑科遷江西在癸酉十有一月調山西在丁丑二月遷湖廣在己卯閲四歲歸嘉靖癸巳三月二日卒維勤父間居維十有二年銘曰潔行而剛攻辭而章枘鑿戾只揆義奚坊彼精斯稗一槩而量返服水南樂此洋洋伊誰進賢休以君襄歲云趣矣孰訊彼蒼維夀弗長維聞卬卬維河湯湯維文之昌中憲大夫陜西行太僕寺少卿趙公墓志銘趙貞吉公諱某字中甫世居嘉州之犍為縣高祖永永生陽衢陽衢生俊俊生贈廣南府知府諱天祿公之父也妣贈恭人郭氏公生而竒貌少未知書間至江上部使者甚愛幸載去勸力學受春秋名家正德丁卯薦於鄉庚辰謁選領耀州嘉靖乙酉以能調乾州破賊以憂去服起補商州辛卯入南中清大理戎事乙未付公儂沙地居儂沙七年地得復稱廣南府完入職方不毁棄使者考上不已以壬寅三月年六十七卒于官距乾州破賊凡十九年于是公之子正學入主文選事皆班班稱説公事矣而公適卒初乾賊樊紳為省中小掾有反相藩伯誤禮異之民漸指目紳紳稍以術聳衆久乃割布書約法以號窺隱占官搖蕩逺近斬竿刻期出死力者無算前守悸慮死計免去公至密令詗者飬乞兒數十刺賊內備審較外佯示不理乙酉九月難作公誓衆登城按籍傳定旗幟器械甲士俄頃就列無譁者密刖布賊內偵者五十人賊初不虞州之衆整也又見刖者大沮城上矢石雨下賊殊死不能近退保楊千村疑幟四起發伏城中鼓譟蹂之賊大敗走卒擒紳散其黨收賊之燼撲之不以煩於人監司掠功乃棄去不辨頃之又撫定廣南矣廣南地接交趾宋狄青殺儂智高故處儂逺孽入國初遂為土酋自分割居之知府阱視不敢入公受命慨然曰烏有為天子土官寄命他地而可者固求入是時有司按兵待討儂氏之亂皆危公行入即諭見亂首儂仕獬及獬孫承恩留數日盡得其情拘讒人跛西對衆杖殺之曰吾今日除汝家禍本復汝祖孫矣急解劒平壘謝過有司無煩大兵儂酋驚懼服公神泣謝不再教罷廣南兵廣南人稽顙留公公曰數百年無廣南知府視篆事今露宿草昧奈何留我諸酋率伐木運石立署求居公公雅意欲留居耳乘快當之傍無了僮夷人爭聚來居期年板屋鱗次公漸儲貯築鑿出太祖條約摩諸夷漸揉抹之收豪徑厮𨽻近之取其子弟束其髮耳以書語四年得編户四十八里土酋利公鎮土舍人利公約其長夷人利公在無橫罹討罰與俱焚也蓋七年而度務畢興還國初舊物公在廣南初助破龍的再擒儂寬威震恩懷居至五年天子嘉其勞誥贈其父母及其配交趾受成例賜白金文綺某少試藝即知稱説公乾州事聞公荷甲七日白𠂻單皆赭心竊悲壯公及仕于朝稍稍談説公之守廣南惜公事不煒煌著稱于今也巳而召為天子圉卿漸著稱將大用矣而公又卒公忠勇沉深慮中機宜諸魁壘立事不止此耳狀稱公在耀州招流民增户墾田賊循山陽不敢入其境拒勢閹變嫁娶俗與朱裳並稱清吏商州故有礦賊鋒鋭甚當事避之公初至集民兵斷其餉道先馳以聲賊焚廬帳急走避養老訓士鋤豪如耀之操二州獲芝十數本麥禾䨥穗者無數虎傷人公文檄之虎自售死蝗鼠雷雨死異矣入大理封點蒼山還軍官冒破數萬金提去就與撫巡官爭大義褁藥入蠻鄉勘獄揮金而獄決蠻獄最纒結者聽公言皆泣下輸情去則祀公公以忠信試素矣不獨入廣南也公居則孝友廉恤士行卓然出則喜竒節而終其身遇皆盤錯嗚呼士得其一節足以自樹况其多若是乎狀作于成都劉諫議大直劉君與豫皆喜談述公事云公配江氏封恭人生五子長正吉國子生次正言次即正學敦道而經世次正心學生次正庚正言早卒長女適安元甫次適車純季聘徐祉孫男五人孫女四人卜以卒之年十二月庚寅葬金華山陽從先兆也初公與安磐徐文華程啓充宿進張鵬相望號嘉州名士故壻其胤好以終老銘曰嗚呼監罔不躬豫言靡同公流無窮中順大夫都察院右僉都御史丘公神道碑趙貞吉僉都御史集齋丘公以巡撫四川調江西辭代歸卒三十年矣初公之嗣維禎持孫太史升之作狀求張大司馬公經之墓志銘而遵嚴王先生慎中為之傳以襄公事矣巳而禎沒其弟維栻代祀事栻當公沒時甚幼復以文光於前人今年類公之藁數十卷載三先生之文作長牘道往事介於方伯象川林公以抵豫略曰亡兄所以不朽先子者三先生之文也而三先生之文皆以翁為質焉翁歷試久又嘗坐政事收用天下才望應知人才之難而立事者之不易也先子之事殆未肯以久而忘耶敢借寵於林君而徼幸於翁之門倘得神道碑成以卒亡兄業而妥先子靈於無窮豈止孤兒之幸將丘之孫子百世皆賴焉豫初讀為之哽咽嘆曰噫集齋有子矣初公之入蜀也豫以謁告家居聞公單車御兩僕至境上一僕索一小吏脯炙食之即撲殺僕而焚棄之于時澄清之氣搖動岷蔡群吏墨者解綬去隨者振衣彈冠新耳目以待之公至日臺中積案充棟公命吏日持牛腰大數十束睨立而批駁之官吏軍伍之利害民情土俗之隱伏竇穴之翕閉齦齶之鴟縮狐藏兔狡神狙鬼伏皆滅迹刮影電掃而霆擊之無與遺類數月而庭無留牘三川之外江瀘嶓僰碉寨賔竹之民疾痛苦樂皆在鏡中况近密乎笠豕攘鴿之盜捋鬚弄筋之戲皆得其地所名姓記之而况于大猾乎間與大吏議獄事必舉其初辭末貼中證旁縱之迹縷縷如親為之于是直指奪氣而提刑避影官民畏公如張忠定之初震疊也愛公如武侯之老撫綏也豫起家過成都與談信宿服其練逹而諸不恱公者亦具見也無何調江西而論者隨至有問豫蜀事豫曰丘公舉劾數一二耳非難知者行當白矣事白而公卒矣栻謂豫為質即是時也語具志狀中遵嚴王子傳曰公器識博逹憂時亹亹若不早逝則林見素胡靜菴彭幸菴之流也豫亦以為然或謂江西之調實奪公蜀也夫省大使人不疑也所代賢俾公不自疑也獵人藏網之法也論者隨至搖兒齒也縱犬法也三縱則懸獲而歸矣故知江西非公居也公烏能為諸先逹之勩乎豫曰時之利鈍何可論公豫獨重公之本立也公事父孝友于兄弟敬于妻子周恤于親友其行如此為御史劾近幸戚畹與議禮之臣不附炙手之勢而憂失散之才口誦心維無時不在於南徼西陲之外瘴煙蠻雨之中也其節如此固知士鮮有不立行於家而能著節於朝者公幼頴異十五蜚聲州郡為先逹所重二十舉鄉二十五為令有異政殆獨授之致生有自來者與成此恢廓豈偶然哉或謂蜀之治太猛夫捨墮極之罪而譙振竒之勞豈非助賊之攻乎傳曰執未究之意以訾偏持不終之政以譏猛是俾子産仲尼之獲罪於當年也公之論於是定矣詩以誄之俾栻歌以祝公曰宋有人傑張復之才術可拔雲中梯重趼所歷優于施西蜀多火疇救之公三來沃清冷池梁岷高高名在斯丘公後興五百期天子命保蜀之釐單車御僕九折馳寓書友人令其知行當俎豆張君祠張君救火公治堤蟻宅蚓竅無留疵手握疏鑿堅橛剖導江排倒天風披孰謂烹鮮理棼絲天女巧襄自憐持夜半忽改流黃機張君之功時與資公歸不來止或尼五年始信成非遲公治蜀墮未及期别公一世時易移英風錦水猶昔吹公之幼孤文巳齊萬里弋取豫之辭空山高製錦城碑刺桐花樹班竹枝白日照耀清江湄誰起九原遵巖思與公論世抒餘悲明文海卷四百四十八
