body:
  text: 明文海巻四百五十一餘姚黄宗羲編墓文二十三名臣明翰林院編修止菴張先生墓碑瞿汝稷先生諱洪字宗海祁州人毓靈于侯甫娩五日而母郁亡父常復客燕不歸靡為顧復張翁炯媪丁憐而乳之故從張姓幼頴睿詩書臚傳精義神㑹識者已知其非凡矣就計然䇿逐什一資大起踰冠比鄰事連戍滇黔寧王一見才之遇以國士都䕶瞿登之賢閣無何木邦刁干孟亂逐部長思倫法髙皇帝詔三司議勦撫便計衆多謂雕題互攻我可勿預先生語都䕶曰思倫法擁三十六甸之衆嘗蘭入㓂景我師禦之帥馮成敗績後雖讋黔寧之威舉部歸順國家即彼故地授宣慰其强未殺今彼之亂是天授我宜討木邦而示威分建以殺其强彼既被逐得復雖分建猶戴賜是恩威並流固内弱外完䇿也三司因其議議上上俞行遂捕斬刁干孟以其子與思倫法並授宣慰西南頼耆定既以明經徴授靖江王教授稱病免永樂元年以行人徴旋使日本復使吐蕃董茶馬既緬甸宣慰那羅塔殺孟養宣慰刁木旦而據其地奉詔責那羅塔歸所侵地立孟養後那羅塔未拜命六徃諭始如詔夫蠻邑惟力是怙而無寸兵徒騰頰輔收既侵之區宇續既絶之君長比績隨賈侔勲唐馬豈趢趢能窺哉竣事編摹大典晉行人司副洪熈元年擢翰林院修撰宣徳元年同修仁廟實録五年引年致仕比歸杜闗謝將迎日事著述有周易㑹通尚書補傳詩書正義春秋説約禮記總類四書解義琴川新志日本補遺厯代詩選史記要語等年八十有四卒今篇帙湮滅索之好事汲冡靡藏河間絶獻而苖裔寂寥宗姓無考詞同中郎餒甚羊舌窀穸之託樵牧來登嘉靖末郭徴君登賢至祖壟得仆碑剥落不可讀僅有先生姓字知為馬鬛所寄但謀復封樹繚以修垣逮萬厯戊戌太學生徐汝良謂非表以貞石則無以示永乆特營碑石于是徴君子梧乞余文勒焉嗟乎大暮同歸聖賢莫度秉彜好徳今古不渝張先生宦轍茂于媺烈邑乘列于名臣生宣威于萬里死不保於一抔谷遷陵變詎可前期芝焚蕙歎何堪旋視夫嬴秦稱虐尚表展封唐徳方明首隆僑窆昔人於鄉桑梓必敬此日追逺儀刑未磨遺文己不可求於茂陵靈冢可使冺于原兆諸君子力為章之均可尚矣勒碑示逺其辭曰東則日際西則月竁北及蒲海南窮緬裔溟渤無涯吞吐天地夷徼嶃岞出入瘴癘獨秉一節奚逺弗詣卉服文身旃裘椎紒豺虎為姿猰㺄同鷙三王所外五帝莫制先王有諭脅息聴誓生控蠻邦窮髪悚企死靡自衛不保遺骴狐狸潛搰牧䜿嬉戯含識有覿疇不掩涕爰復垣封刻銘永眡凡我君子幸繹兹誼於萬斯年克襄毋替劉士和墓表湯顯祖嗚呼此吾友人司成公劉士和之墓也予欲與其為天下事而君已矣君起家壬午歲舉江西第一人廷試進士第三人授編修翰林院司業南雍改坊允補經筵日講官以侍讀主北闈試以侍讀掌坊事終大司成戊戌夏四月吾師相國張公以決贊東征事與首相蘭溪趙公異同幾中不測而去所常徃來論議者皆受重劾而君與焉賴上明聖指應秋曰此清士也安得在此下部院議而吏侍閩裴公掌院閩郭公以下皆曰劉司成耿耿為人不宜横加誣詆為分别言之君得請以去歸二年為庚子春哭鄧少公文潔公于豫章過信州登龍虎而下見仙人遺棺慨然有遺世之想歸而秋病滯服下藥太過竟不已至冬十月七日起衣冠端坐而逝嗚呼哀哉人亦有言膏火自煎而磽器先缺君狀貌笑語不踰中人而志意常在千古目烱然如巖下電面多赤氣與對食從容而後能下咽予常憂之夫為人寛然而靜者壽也君不其然假柄而得天下事為之亦非可以譟法而久况夫道不可期而業不可意遂即其自語幾稱無所與然亦豈能亡介介於懐哉嗟夫天下未受其明而果在於用其明此所謂膏火自煎者也善天下之善也其不善者亦天下之不善也吾惡足以與之而烏足以勝之仲尼知其然苐曰舉爾所知而巳君好惡明甚每見人未嘗不問天下賢士與其不然者出不能忘於心入不能忘於口君之地非能自去留人也言善未必不去言不善未必不留而祗以見怨夫世之善少而不善人多則怨君者固多于徳君譬之器翰林者藏器之處也日磽磽然取其所藏者持以示人而能無缺乎其朂無端倪者曰君張公之所親舉動不能令人無疑嗟夫士亦視其所親何如張公豈不可親者耶言道徳而負經濟故天下所屬心屬為名相一出而隂為國本重顯重定邊計意念皆在國家獨其發決太蚤未能收拾天下賢士厚集其勢而輕有所為臣不密則失身勢固然耳豈張公為人眞有不可親者也君平生蘊積憤發欲有所抱用于時誠不欲厚自遠引然亦何以遠引為也且吾與君私語張公行事君亦常為戚然非茍為同而巳唐桞子厚天下之才俊賢人也王叔文世之所謂狂劣無底者也非呂非葛庸衆人知之桞子讀天下之書懐堯舜之業豈其識之不及此夫士惟不欲急世患而成功名也欲之必起而環視於世儌倖於其有所同心者幾附焉而相與以濟唐之患未有大於宦官典禁軍者也前後執事多依倚其中以容以進慮無及除滅之者叔文瞷然發端雖未竟其謀不可謂無呂葛之心矣權賂之劾葢其事後中官所為史因而惡之當其未敗時但意其名正而事成唐室可興安見夫叔文之不可暱就也况夫張公者負經濟而言道德二十年以來天下所仰為名相者耶易之觀曰觀我生進退又曰觀其生我者我也其者世也我可而世不可則無傷我世可而我不可則無傷世如此以觀則我與世機可以相用相生而不死若君之進退非不詳於所觀葢子厚所謂大人欲速其功耳天下士亦安可以成敗論也嗟夫子厚巳矣友莫若韓退之退之序子厚死但記其易播一事至其委曲用世之志不為發揮一言意退之亦猶人之見乎予欲哭士和君之墓而表其所存所虧以告後之君子欲有為於世者亞中大夫山東等處丞宣布政使司左㕘政南灃王公墓志銘許宗魯咸陽王生道正將塟其父南灃公其弟道直狀行請銘狀載事蹟幾萬言余乃撮其大者為誌而銘之誌曰南灃者用世才也諸所履厯底有成勣其有禆於治無右於修復海運之功然其忌於人而棄於時者皆坐是余故詳焉如南灃由御史晉山東按察副使巡察海道謂其政莫先於海運者其為議曰國家定鼎上游漕運為重㑹通河建萬世之通利海運備一時之權宜二者可相須而不可偏廢也承安習故似若不可急思患豫防顧不為首務哉弭節之日備閲圖志延問耆老乃得元人之故道以及膠萊之新河歎曰嗟乎海運之方我知之矣夫自安東放舟遵海而行靈山峙其西浮山勞山介其東薛島陳島石礁林立横浮海中險阻難越故元人放洋自三沙以達登州西北至於海倉又北浮於渤海始達於直沽避此險也然牽輓之勞雖節而漂溺之患亦多故丘文莊有説聞者惑焉以余觀之夫自薛島之西為馬濠其涯為膠之麻灣北為新河又北為掖之海倉其地里至僅三百耳若徑於此諸險皆脱元人常治此道遇石而止今若因地為工鑿馬濠以抵麻灣濬新河以趨海倉良便乃以事宜請於制使聞於朝廷議於司空皆報曰可檄下從事議者紛然南灃直任不謝倡言曰天下無不可舉之事亦無不可成之功民可與樂成難與圖始茍能足國裕民吾負謗奚惜於是擇吏授規諏日即事誓告靈神督戒有衆斤斧肆力火烈具舉馬濠之石焚如而燼海水流滙麻灣以通河渠奏工矣計其延十有四里其廣八尋有竒其深半之於是江淮之舟達於膠萊官不費財民不知勞公私賴焉計其經始及於底勣凡三閲月耳土人徳之立石頌功巳而復事新河之役濬淤夷險立防以蓄洩浮梁以渡渡設吏以司守規畫垂成即有山西之命於時制使疏請衆庶輓留不報而去河工由之中廢論者惜之先時工作寮友有不協者移書紛更南灃舉措不問其人銜之逮其居憂於家乃嗾言者誣以妄興海運迄無成功疏奏報罷南灃復歎曰嗟乎事之成敗在天人之出處有命吾何容心哉然海運必當復萬全之謀必不可忽吾死不敢易此念也更著説以告世人噫其亦見定而守固者歟既數年臺諫薦休廢首列南灃亦以海道被讒而言是公論之不没也南灃筮仕為御史分曹南臺持憲不阿論奏不詭其請釋大禮諸放臣及論罷南都添設鎮守二疏尤為人所稱説初使山西清理軍伍稽察案牘究心所事即行陣充足淹弊釐革其再按山西也時值荐饑且罹鹵患下車即請帑施賑民藉以生乃其周邊方之處置而武備修急學校之教養而士風振别部吏之臧否而官常飭嚴府庾之㑹計而錢穀裕諸所設施憲度斬斬其決晉藩襲封之疑以杜爭端升潞安州治為府以弭宿患尤人所推論者總其先後論列皆經國遠猷裕民至計若崇聖學設總制繩黄内侍之違法劾席尚書之庇私糾常都御史之怠事㕘郭武定之侈僭種種多故海内想望其風采詳載家傳誌不悉云按王氏之先出於渭南蒼頭鎮諱舜卿者選守文武陵寢徙居畢郢原下遂為咸陽人有諱珤者國初為宫僚然皆譜牒無考不可論其世次至諱十者生子士榮士榮生整整生才初授散官封文林郎江西道監察御史加贈中憲大夫山東按察司副使配岳氏封孺人加贈恭人其子即南灃也諱獻字惟臣以居灃渭之汭自號南灃成化丁未正月二十七日誕生于家少有美質長則偉軀玉立識見超越初受學於邑人劉君釗十三能文提學虎谷王先生試補縣學生員繼從司徒近山劉先生員外郎忠齋董先生受易學又從内翰渼陂王先生受史學及為古文詞賦學成程於有司輙居上第正徳丙子舉鄉試嘉靖癸未登進士甲申授南京江西道監察御史丙戌奉勅清軍山西戊子考績勅進階文林郎封其父如其官其母及配馮氏俱封孺人己丑丁外艱辛夘服闋改授北臺山東道職如故是歲巡按山西癸已復命職司臺政巡視京營㕘預考覈侍經筵欽賜御製諸詩無逸豳風碑文并大學衍義乙未陞山東按察司副使職司海道㑹上上尊號父得加贈如其官母妻皆封恭人巳亥陞山西布政司左㕘政庚子春便道歸省未幾丁内艱是秋抱病家居辛丑春坐論居閑丁未七月二十四日大命允終壽周甲子而竒一戊申十一月之朔塟九嵕山陽畢郢原南灃有子二人長即道正監生娶張氏次即道直舉人娶張氏監察御史緯之女繼娶栁氏孫男子三人淑田淑頥淑止孫女子一人南灃性寛惠而操貞方有教民之政有周世之畧有居鄉之譽余自為諸生時友其人知之為素每歎其才不究用也銘以闡之其為世道計耶詞曰轟耳之音聴者悸奪目之采視者蔽震代之績論者忌從古則然今何異耶行則奚翊止亦何尼不維其躬維其治耶我懐世矣怛其喟矣明文海巻四百五十一
