body:
  text: 明文海巻四百五十二餘姚黄宗羲編墓文二十四名臣南京兵部右侍郎北川陸公行狀鄭明選公諱穩字汝成號曰北川其先嬀姓後齊宣王少子通封平原般陸鄉遂姓陸氏云梁時有臨川王長丘公始居吳興郡是為吳興郡人宋時真泗兵馬都監圭與賊方臘戰勝還溺為神居郡之石塜而族最盛為石塜陸本朝髙皇帝時公之髙祖敬居郡城東溪為東溪陸矣敬生震景泰丙子舉於鄉為四川瀘州知州震生嵩𢎞治丙辰登進士為福建南平縣知縣嵩生階五階五生公公性頴異又好學嘉靖庚子舉於鄉甲辰登進士為刑部陜西司主事公為主事以為刑官之於法律猶匠人之於繩尺也乃晝夜讀律令義既通以㫁獄無不立剖者毎讞上輙稱允人亦莫能難之戊申遷刑部員外郎辛亥遷刑部郎中是歲分遣曹官惜刑天下而先是福建㕘將盧鏜副使柯喬俱以忤使者㫖中以法議當斬人人腹歎之莫敢救皆願母徃福建恤刑者公獨請行至福建案其獄果得寃狀乃上疏訟之曰臣穩謹按律故殺者斬葢指凡人因事忿爭有心殺害者福建㕘將盧鏜決死賊犯本激於通番積弊以張軍威施刑過當似與忿爭故殺者殊科又謹按律故勘平人致死者斬福建副使柯喬所殺李𢎞宥等並與番人交市本有罪非平人二犯者臣愚以為皆不當斬且非獨臣知不當斬凡横目者皆知之然徒以大獄心懐畏忌莫敢出口一言而臣獨言之者誠以陛下浩蕩之恩無所不及不宜獨令二臣抱怨以没也疏上鏜喬竟得釋而公亦以是遷為四川建昌兵備副使建昌故有流賊魁作者招納亡命數萬掠人金帛子女吏莫敢問公至聞土酋賢宗仁吉正榮及夷媪鳯氏瞿氏者其兵强可用乃身自諭令分道𠞰賊破之獲其首魁作白玉其地悉平巡撫百川張公以公功聞於上詔賜金十兩幣二匹蜀人為立生祠祀之丙辰遷江西布政使司㕘政已未遷江西按察使亷使庚申遷江西右布政使皆有聲辛酉遷江西左布政使夏五月流賊盧梅林等兵起閩廣殺憲臣流賊張璉合峒賊蕭晚等起饒埔僭王者號秋朝廷以公前在四川擒賊有能可徃平之遷為都察院右副都御史提督軍務凡四省江西則南安贛州福建則汀州漳州廣東則南雄韶州惠州潮州湖廣則郴州皆聽公節制云公受命行至吉安而賊盧梅林兵屯鸛朝不得進然是時未有兵符即便宜刻闗防檄兵討賊三敗之獲其首盧梅林劉肯王橋乃至䖍公曰吾聞土酋有黄鄉兵者最猛誠得而用之此以賊攻賊策之上也遣辯士諭其長葉槐因與槐定約束槐曰我素聞陸公名今來敢不如來命黄鄉兵者先臣陽明王公嘗用其力至今四十年公再用之其後公與賊數十戰皆有功葢多其助云九月討上杭峒賊李占春占春降尋復叛擒之冬十月上疏乞明職掌増軍餉二事詞多故不載又嚴闗隘之法清兵額黜墨吏更番練戰士葢公討賊之經畫此其大畧也十一月討田坑峒賊梁寧夜襲擊之寧走追之至檀嶺㑹程鄉峒賊徐東州刦撫州而還也望見之因伏以待賊兵過半襲擊之擒徐東州十二月連城峒賊刦歸化順昌甌寧泰寧諸縣内溢峒賊冦龍溪長泰二縣公分兵討之斬其首謝文瓚馬東山蕭大生蔡表素燒其巢壬戌春正月麻陽人袁三叛破玉山永豐崇安三縣公擊破之三走死二月討大田峒賊黄積山夜襲擊之積山中鳥銃死燒其巢夏五月㑹閩廣兵討饒賊張璉滅之初璉為縣治書盜官銀坐罪亡入賊巢又隂刻璽投池中乃佯㑹衆作食使人竭池以漁得璽文曰飛龍傳國之寶於是衆大驚以為帝王之符也而大埔賊蕭晚羅袍楊舜三人者因與璉㰱血璉為長而諸巢數百輩皆附之於是璉偽封晩袍舜三人為王其餘偽授官不可勝記而璉自稱飛龍人主劫興寧長樂二縣去攻南靖據之圍平和縣城又使林贊屯南靖為響應呂細截漳汀道路羅袍楊舜伏大埔以兵出永定連城斷餉道蕭晩據木窖為遙制而璉又遣王伯宣入海誘倭夷數千犯潮州以牽我兵當是時公私股栗道梗不通公曰兵法云攻瑕則堅者瑕我聞賊林贊無謀而怯不如先擊之而擊贊贊懼降袍舜皆就縛此滅賊之秋也乃日夜趣兵擊蕭晩晩殊不意我兵猝至惶顧無措因遣人誘致晩擊之而潮州太守何鏜亦誘斬王伯宣倭兵不進於是璉勢始孤矣公乃遣將俞大猷擊璉距璉壘五里所望見朱城二重璉匿不出然負山險兵珠不得入公乃懸賞獲璉者萬金與之秩指揮賊黨有能賣璉者同賞於是賊所部郭玉鏡潛為約誘璉出城擒之燒其巢當是時羣盜並起然璉勢特盛及璉既擒而難始定矣上聞賜金五十兩幣四匹六月加秩兵部右侍郎兼右僉都御史仍巡撫秋七月討流賊李楠吳舉曹國清及上杭峒賊廖選皆平之凱旋九月復合兩廣兵討程鄉峒賊林朝曦擒之林朝曦之勢亞於張璉然亦盛既擒朝曦難益定於是收其餘黨十數處皆平之而四省帖席矣公前後擒斬渠魁二百餘魁賊從一萬有竒奪回被擄前後葢不可勝紀云功既成諸將皆賀公曰某本無能辛賴諸君力得滅羣醜敢以為巳功雖然盜由貧生止盜莫如利民公於是開平遠山鐵鑛令民得自鑄薄税之又上疏乞免加賦安百姓心癸亥福建巡撫二華譚公㑹公兵擊故陷興化府倭夷平之賜金三十兩幣四匹夏五月改南京兵部右侍郎而江西監察御史陳某劾奏公私用上杭官銀若干及毁祝聖萬壽觀等事公上疏自陳大畧以為上杭官銀自先臣王守仁以為饋遺賓客至今四十年例不自臣始且臣以盜賊之生本由不識禮義故援引生儒教訓輙藉此銀時加賞賚雖非正法情實可原至所謂祝聖萬壽觀者原非祝聖萬壽觀實真人許遜紫極觀臣本改為䖍州學宮又非生祠疏奏不省初公之討賊也遣兵備副使陳某督兵某福建人而賊黨亦多有福建人者賊宣言曰陳兵備來我且移兵誅其家某恐因謂公此輩實平民不當討公曰夫世豈有攻城池掠子女而稱平民者哉急誅勿疑某不肯公曰汝不討賊者我且劾奏汝公特以此言感動某殊無意劾某也㑹某遷江西布政司㕘政去是時兵備道缺而江西巡撫胡公復遣某權知兵備事某又不肯巡撫胡公遂劾某而某大恨公以為此必公教令劾某也㑹江西監察御史陳某來陳某者亦福建人與某善某因教令劾奏云公既被謗而巡撫堯山吳公來代公具以公功聞於上上亦思念公詔賜公金二十兩幣四匹其後兵部尚書思齋霍公工部侍郎雙江方公浙江巡撫玉泉趙公湖廣巡撫唐巖劉公先後舉公在四川及江西平賊建不世之勲有大才此社稷之器雖遭蜚語亟宜擢用而公遽疾遂老於家公將兵嚴而有謀及家居恂恂如也屏長沈山中足跡不入郡邑者十餘年日課用車等誦先人之書暇輙灌園賓至飲醇酒而已為人性亷官雖貴家無産業日夕僅具饘粥大學士徐公聞之歎曰夫人官為侍郎至不給居食豈非古所稱亷士哉輒時時饋遺公夫公之功盖一世矣生而被讒殁不揚其休則志士恨之故畧序其始終以請達者一言為公雪其鬱而暴其功徳亦仁人所許乎公生正徳丁丑三月五日卒萬厯辛巳五月十七日享年六十有五配潘氏封安人先公卒繼配沈氏側室陳氏子三長用車次用輅皆太學生俱潘出次用駿安吉州庠生陳出孫男六大武大受大經大中大有大知曾孫男二世顯世達用車等卜於是年十二月十二日奉公柩葬於卞山之西岡云姚現聞墓銘黄道周嗚呼堅龎氣降濬發之茂不迨殷周其道徳豪傑之士皆驟起無所承自有漢而然矣間有之隠隆蟬綿卬浦之數可得而稱焉呉門姚先生世有懿徽發為文章甕口方舟沐浴天下予聞其語嘗見其人矣先生諱希孟字孟長有虞之𦙍也明興有祖榮者擇配黄盛年而寡高皇帝首以節行風勵天下旌其門史臣蘇伯衡焉之作頌於是姚以義烈起家二百有餘年文太君始毓先生先生淵源明德值貞元之㑹卓成名世宜其然也榮生華卿亦以節孝稱華卿生叔威叔威生梅谷梅谷諱翊始著高隱翊生畸艇君丞丞生白隄君厚為沂州判官厚生五涇君圭為武涉令三世皆明經不樂折腰而畸艇以吳文端公婦翁嘉遯以老葢自梅谷而然矣古稱戴顒宗測皆世遐舉為有嗣異人是唐子畏所為梅谷圖者也五涇治武涉不二年致仕簉室施生頴菴公汝轍為南國子生以先生貴贈如先生官武涉之捐子舍也贈公年方十四毁瘠踰禮既娶文太君是稱母師實舉先生先生未週歲而頴菴公辭世文太君方二十有二坐荼蓼中乳血雜哺又以征徭之累從父借雛鷇弛擔施太孺人抱先生躋公堂對簿是日先生正週歲踞堂上弄飴笑視施孺人孺人歸哭告文太君文太君乃益哭然心喜是兒有福必是堂上人既三歲嬰疢幾廢矣諸大母衛之哭忽一夕聞庭中聲鍧然如大鳥翼擊而去質明遂瘥是所謂大鳥覆翼者歟自是岐嶷善占對異於常兒外翁文衛輝公以少府致政歸太君數擕先生依外家見其先世懸籖積軸輒别識位置不爽衛輝公每肅客輒呼先生出周折為儀詫客云是吾宅相無雙也於是相國湛持公甫總角為諸生長先生僅六歲以甥舅篤朋歡衛輝公嘗云姚孫與吾兒異日當比珪廊序雖湛持與先生亦自謂吾甥舅於當世有二無兩也湛持公既蚤登賢書困於南宮凡十九載先生始舉於鄉兩人相視謂吾甥勇如檜栢旋葉無殊共飽霜雪耳及己未先生登第湛持後三年亦大奮去二公之於學同業識同趣操㨀同勵品藻同㫖音吐同徽體質同瑰而先生文采沈馥騷雅合致包裹六代邈乎踔舉矣先生既登第當選庶常諸前輩咸以人望推屬先生獨私念在東觀當三年倚閭如何又東事方棘諸肉食者日發帑南下誼不得以一官貽母憂且需次補廷評之籍而太君獨發緘鼓先生讀書先生於是膺選也明年具版輿迎養京邸而東事亦稍靖冰玉之供為熊丸解瘳韓蒲州劉南昌二公每見先生必竟日宗社大計盈庭未發者必先咨先生楮落翰飛都人競誦於時楊忠烈公入為給諫左公光斗在臺班與先生同道相朂每言世界即有缺陷只此方寸間缺陷不得耳及庚申七月神廟遐升光宗即位甫旬日違豫内醫崔文昇侍藥無狀浹月遂稱大行中外哀慕又有停封移宮諸毖事忠烈先後發疏皆從先生質疑義先生亦匡直不辭云故事詞林與言路踪跡微疏先生獨謂青史法從離若蟬翼即後世誰從明其可否者既受簡討為史官於兩朝實録多所論定於時明賢盡起田間葉文忠當國鄒忠介趙忠毅王莊毅馮恭定高忠憲皆在九列而湛持以鼎甲領望與先生翺翔及同邑周忠介嘉善魏忠節日夕請析首善之堂商古㩁今或值先生未至諸老必㗳然若失也先生既道廣折節下士賓從雲歸顧慎許可門無膩刺乂每出東西坊必遣蒼頭報太君食寢數反乃巳亡何湛持以建言歸王莊毅馮恭定先後去國先生念太君初喜檄又己丑實録未就不得發片語與渭陽偕南居一年請假歸葢自先生歸而時事大變諸君子蹙蹙如漢熹平間矣里居既二年逆魏愈煽楊忠烈再疏討罪萬工部捶死而逆魏手滑先生與湛持日夕惋歎周中丞起元引賈彪事勸先生北上先生曰吾不為范滂足矣至河而反是何人乎入問文太君太君欣然曰爾行觀之爾志行沈篤禍必不及既抵畿而楊左幷禠忠毅忠憲同日解職舉朝汎汎方頌玉璽河清致符命之奉先生以仉夫人筦簟未安勉就房考是乙丑二月也考竣所獲如陳唐姜閔梁馬岳楊悉天下名士一時罕倫先是冬黨禍巳發諸君子就檻中纍纍無一免者先生出對友朋凝涕在睫入侍太君怡怡湯藥如平時太君亦微覺外間有異疾日􅒵遂不起先生三日絶水漿扶櫬出國門徒步哭趾血目腫舟行至淮上見邸報知奸人受逆閹㫖巳得削奪之命先生入撫棺泫然出涕曰經年來皇甫威明之恥懐之久矣今成吾志又不於親存日奪捧檄歡是天厚吾親也星馳歸即金涇阡之旁誅茒作丙舍廬于斯金涇阡者先生所葬頴菴公予為之作碑者也於是緹騎四出鋃鐺相望先生念袁夏甫在土室中穴垣視母翳我獨無亦大慟祈死丙寅三月緹騎至吳門逮周忠介齊民數萬為呼寃捽旗尉殺之當事愠欲遷禍於湛持及先生先生數擬從三閭之後而朝議憚吳民恐東南遂叵測僅戮五人餘置不問先生始放跡湖山高嘯縹緲幽探林屋自號閏生道人閏生生之餘也先生初號現聞與内典通既以多難奉母故彌精於竺乾之言前輩中涉獵是學者稱内江趙公先生才似内江顧内江用而先生不用則先生閎深矣丁夘秋熹宗不豫逆黨謀變先籍海内清流五六十人欲勒自盡先生名在籍中事未發而今上從信邸登極海内始慶更生不月餘誅逆黨毁天下所在逆祀明年戊辰崇禎改元以太子贊善徵陟三階以右庶子充經筵日講官知制誥先生在講筵本正叔淳夫之意沷誠悟主又善為言詞嫺威儀法巽幷致每出班黼扆必為改容諸前輩咸心儀先生然諸奸人謀翻案事甚厲閣中諸老以次罪去又適薄城諸不靖者借為風雨值枚卜遂罷㑹推捘錢宗伯之腕先生心非之也湛持又有所排擊不動於是銓輔搆難欲先去先生次及湛持公庚午秋典北闈而冒籍之璺發攘柄者猶以冒籍不足阱先生遂移冒籍而誅文因下二武生獄久之讞上先生以宮詹坐鐫秩嗚呼是足以快箕舌掩文昌矣猶慮先生以文行被主知恐一旦發夢遷隂摘先生講章中語腹夷之而先生弗知也嗚呼先生於羣小豈有誅觀之威破柱之痛而仇猜若此哉不過謂先生才耳先生才而用則諸番徒悉不得用諸番徒不用則佌佌簌簌者率枕藉就死故其極費力如此也以予所見則先生才悉歸於道先生為文章韻事包燕納許揺筆傾世而未嘗以是自詡一也先生與人交無大小先造驅車肅客不憚寒暑見一善事及閭巷媺蹟輒手記詠言恐忘二也徑草蕭然木瓜不入賓歸如水竿牘不出三也儀觀如神明而不作貴容不作介色謝諸紛善四也自宗族閭里嘗負我者率德報之未嘗訟誅一事五也天下才人率以是五者傾敗而先生無有顧以才詘何也予從其長君宗典見癸夘歲發願文謂之五律一曰十不忘一曰三勿起一曰六勿言一曰五恥一曰三長率蚤悟令修權借葱嶺實歸洙泗葢與湛持公株葉共之丙子五月有微疾端坐奠楹湛持公實紀其事不十餘日湛持公亦去陶陶永夕是之謂矣葢自公逝而岸谷屢遷又有甚於曩時者嗚呼公生己夘嵗月日卒丙子歲月日享壽五十有八元配馮宜人繼王宜人子二長宗典國子生娶孝亷張異度先生女孫男二廷脩山脩次宗昌縣學生娶趙文毅公子叙州府知府隆美公女蕃衍子姓備家乘中且葬為之銘銘曰一言幾道貴於玉積玉盈腰安所支千言幾道貴於穀積穀如山安所貽清閟之堂天爰立額璧眉奎南斗入絳趺之館天旁求驂軻服孔連春秋天之相人文行耳人之相天何異是上帝精微達相理現前大麓納芥子諸種種者已如此不朽之言但皮裏玉書萬年托石史明文海卷四百五十二
