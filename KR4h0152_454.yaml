body:
  text: 明文海巻四百五十四餘姚黄宗羲編墓文二十六能臣明故永寧縣主簿諸君墓表史明古江西吉安府永寧縣主簿諸勝受檄治一府九縣盜以景泰四年巡按江西都察院右僉都御史韓雍上疏曰臣聞去姦以制任人以才古之善教也江西十有三府地大而多險人衆而雜居地大則襟帯江湖包絡山澤姦宄易于亡匿人衆則善惡渾殽亡賴之徒萌蘖其間盜賊斯出矣今法禁彰明比嵗豐給猶竊發若此即不幸有水旱之災物力匱散則强者奮臂而倡呼弱者聞風而響應恐饒信以西安袁以東未有寧居也于時始驚而謀之其可及乎臣深為此懼故府委一官専令逐捕盜賊以防其微以杜其漸然人之賢否不齊才力亦異故有出此入彼不能窮其巢穴也惟吉安府永寧縣主簿臣勝受任以來夙夜在公至不顧省其家勞心盡力不避艱險故能時月之間禽戮渠魁徒党解散民反常業而又精爽詳審人不能欺既亡濫及亦亡幸免人稱為平盖其才畧信有大過人者臣愚以為宜令専督屬府之盜然以職分素卑人不秉畏謹案江西布政司故有捕盜經厯間者闕於選補今臣勝屢著勞効第以詘在下僚上亡由知臣請授勝兹職俾之徼巡管内不惟少旌其勤使人知勸而盜賊亦可以漸而戢矣臣雍昧死以聞制下吏部吏部以勝資淺寢不行明年始有文綺之賜用前奏也當是時吉安人多當道文淵閣則陳循蕭鎡大學士吏部則王直尚書都察院則蕭維禎羅通左右都御史餘以侍從卿丞給史布列清要者不可勝紀其子弟親屬奴僕率怙權使氣恣横部中輒橐盜以居利守令莫敢誰何君獨持法直行亡所假借推情立議尋繹鈎探窮竟根柢衆以是大怨君乃共為飛語誣之於巡按御史項聰聰時與韓巡撫以鄉曲更責望不相能欲去君以快忿念亡以為之辜乃攟摭修學時減刻榖價坐之奪其職當逮讞京師君聲寃事下都察院維禎入私言望君不與辨君遂持維禎隂事維禎恐使所親囊白金賂君蘄解君弗許上書告其居喪時受郡縣貨財具有左騐維禎大懼盡用其貲求救於中貴人興安教其上章自愬從中下其事錦衣衛捕君繫詔獄與刑部大理寺雜治之諸大臣咸詬君莫肯白其誣枉者鎮撫門達於衆中責數君曰此豈爾求直時耶故事當參請置對今是何等時也卒成案傅以詆誣大臣報下戍鐵嶺時七年三月二十八日也明年天順其年三月二十六日君卒於戍所年六十二家人負其遺骸歸其子中即𦵏于錢塘東山衕後二十年君配某氏卒中以成化十四年九月二十四日自東山衕啓葬君於大慈鄉資崇塢丁家嶺之西馮從葬焉君字廷義其先祥符人宋南渡居仁和祖嚞徙鹽官久敬復居仁和君有吏才負直尚氣常慷慨思樹功業吏杭州從事工部尚書李友直采官材四川典史鉛山父喪去官卒葬改桃源考滿遷主簿永寧所至皆能興利除害恭勤不懈愛民如子桃源當南北要衝民疲於挽送死傷滿道君身任之煦嫗燠咻民忘其死其在永寧尤剛腸疾惡故不容於權臣竟以戍死悲夫中以改葬之墓未有刻語其友史某曰子雖不與吾父接然詳吾父事業者莫如子子又辱與中遊墓上之石將子是託焉某辭不獲乃為之書曰嗚呼人能自視重則外物輕當五六公柄用時呴枯吹生傾動海内自藩憲以下莫不曲意事之以規進取君寧不知能少詘其志以比阿之則髙官要職可致也而守正不撓至罹毒蠚卒之劘其牙而膏其血身死名僇為流俗笑者由其自視重也嗚呼賢哉屬者有巡撫使奏江西盜倚大臣家為扞蔽李孜省之黨方盛諱恧其言立貶斥居外則其奸王法亂吏治賊民生者有不待君一人之言而具也傳有之深山大澤實生龍蛇又曰觸犯人主罪或見原牴牾勢臣死在不救信然用是表之于墓覽者將哀君之不幸且為世道慨焉嗚呼蹈此轍者微獨君也哉東莞縣知縣陳君墓誌銘陳琛陳生大猷從余逰一日出其父在東莞時諸名士貴公所贈詩數十篇余觀每篇皆有豸冠顯擢之祝無一篇能脱者因笑曰何待尊君之淺也進士作縣不數年得臺省者恒十五何異之甚抑尊君平日自期豈専在此一官耶大猷曰家君當日亦厭之謂皆俗見諛辭無足寳者余曰吾固知其厭之矣吾嘗見君在稠人之中元聲朗調峻卓驚人無顧畏語鄉先輩量寡容者不能堪至以裴行儉相人之術詆之君聞之不為動盖其剛方坦直得之天性所謂人各有能有不能而突梯婉軟以取容恱於時者亦君之所不能也不能自為諛顧喜諛耶吾固知諸詩皆君之所不喜也大猷以為然且曰知家君為人誠莫有如先生者矣遂以墓誌見屬余不得辭命取狀為叙之君名寧字士泰號介庵世居晉江桐城西其先世若雲心梅西中齋皆克自光其譜者也中齋第三子彭夀是為君之曽祖彭夀生正𤣥正𤣥生成聰娶潘氏生二子君其季也白面炯瞳望之知為敏穎人作科舉文字不苦索而就而明贍輕順無少紆鬱艱深甚似其為人戊午以羲經領鄉薦壬戌登進士第癸亥出知東莞凡舉進士皆喜職内出為州縣則惘惘然視居内得清要者若登仙然君獨曰何不樂患才乏耳縣令猶不足為政耶束書數篋赴治至則以吳隱之飲貪泉節詩為佩符曰不如是則氣餒畏人窘驥足不得逞盖才出於氣未有氣不足而力能排天斡地者也東莞號繁劇難理舊有堅訟積數年厯數官不能破君訊之立洞其族會即取紙大批數語擲庭下兩造各甘無後言者一境皆驚有作詩頌之至以神君稱者君曰吾非神吾得其意於春秋撙節人情天理而輕重吾權衡於常律時例之外顧執律拘例者亦不能為吾制焉耳雋不疑之謬引陳子昻之議誅元慶張柬之不能為唐室討罪人皆無得於春秋者也識者聞之愈驚皆曰臨事不可無學術専恃才氣猶不濟況徒以謹愿朴直之徳稱者乎由是東莞之豪者黠者無賴而欲入於盜賊者胥吏之老於案牘而神出鬼沒者有官無守恣其父兄子弟席氣欿以沮撓官府而漁獵士庻者皆惕驚蹇澁不敢稍出䋲墨果君之神明感應若是其周且速哉事有機術有要先聲而人以為皆實舉一而人預服其百也然亦足以見君之拔出尋常矣善觀人者即其大端而得其全體固不待事事詳之而後其人可知也鎮巡藩臬諸公屢加旌奬期以大用而君亦汲汲然不自意滿政暇則左經右史俯讀仰思有一得即入邑庠進諸生課試之以其所自得者發其疑使各自思而因以授之於鄉社改滛祠為鄉校命諸鄉子弟延聘山林遺逸師之而窮鄉遐里皆知向學此皆俗吏視以為迂而甚慢之者而君獨知急焉然則君之没而邑人至今猶曰於我有徳者亦豈專以其威令能行而決獄平允也哉君臨没時歎曰吾年未及强仕吾仕而治方有可觀而天不少假以既吾藴豈天不喜善人而世之多福者皆頑忍癡肥逐逐無厭者耶此言激發失平有餘恨也君生成化壬辰卒以𢎞治乙丑四月十九日年三十有四配黄氏男三人長即大猷次大謨大謀女一人大猷舉止有父風亦挾負竒偉不肯隨人後者也遊郡庠聘吾蔡虚齋先生女君卒時大猷年十一扶柩歸權厝祖墳之側去年冬始卜地于三十二都金匱山背壬向丙穿二壙擇今年壬申十二月二十一日葬虚左為黄氏夀藏銘曰憫君英氣未發一二不有萬縑為君作誌秋佩生作墓誌銘劉茝古人墓誌銘托之名筆盖欲附文集以傳逺後世懵此義厚遺名爵以為耀文浮質滅識者少之近世録名臣收人物者多據此益見其惑也又有自作輓歌自作祭文者事雖不經情則夷曠吾有取焉故自述誌銘期以傳信茝字惟馨號秋佩别號鳳山生成化之丁亥十二月十一日戌時曽祖信忠元末亂甫七嵗隨舅氏自湖廣之麻城來徙譜帙遺失逺世不詳哀哉祖文隠草昧祖妣李氏無出鄒氏生父志茂以茝貴贈戶科給事中妣劉氏生妣王氏前妻程氏繼妻沈氏俱孺人茝生不大慧亦不大愚父愛之甚篤教之則甚嚴少有過差不少恕嘗語茝曰吾上世逺遷於涪俱不耀徳積汝祖吾遵循之後有興者其在子乎以行以貌以心汝決有官但吾病且老恐不及見茝每憶此言心痛泣下奮自勉學先妻程沒六年不娶欲副親意𢎞治戊午巳未叨聫科第吾父巳謝世淮南子曰子欲養而親不待水欲靜而風不寧殆將預為茝發也吾奔喪時同鄉舉人李姓者客死京師吾不忍其死舉血屍輿而西者萬里事或難於以栁易播者後服闋授戸科給事中任僅四載尸素無所建白每見時事爽度憂形於色妻沈氏曰人以官為榮君以官為懼何憔悴若此吾應之曰杞人漆室何禆於國亦此心不能巳耳忝居諫垣雖無大禆補不敢怵時緘黙且如減竈丁之逃課昔之鬻子女以代償者頗徳之奏屯田之妄増時之虚丈量以要功者悉蠲之論妖言之誣繫所活不止千人劾鹽法之弛禁所節何啻萬計瑾賊謀逆首發其姦張綵黨惡預摘其伏逆謀既露以次伏誅人曰子何先見若此吾曰吕獻可首劾安石蘇老泉先論辯奸豈有幻惑之見亦論理勢之自然耳瑾賊因建白中傷之杖於朝落職家食者七年兩罰餉邊三百石産盡傾藩臬牧守下逮親朋咸以義助始克畢事涪州舊有五賢祠祀編置程伊川别駕黄山谷郡賢㬊亞夫地主譙達微一日郡守南城黄夀忽易其扁曰景賢笑謂予曰君知所以易扁意乎吾曰不知黄曰奏屯田減鹽課衛賊捍患先生功徳及涪人吾欲生致公於是此耆老龔浩輩之公言也茝力止之曰吾不敢叅道教又不能與詩流又非地主濫于斯是重吾過也黄笑而止扁今尚存又嘗買郡人劉寛顯之樓居以處予予悉拒之都御史林見素因流賊亂為茝府城買居予亦請止所不屑者多類此後瑾誅公論力薦有云居官能善其國居家能衛其鄉倡義兵以捍流賊四境晏然擐甲胄以先卒徒闔郡安堵等語復起金華知府在任三載無政禆郡無徳及民敦風俗恤民隠乃拳拳之本心浙俗侈奩資生女輙渰沒重法禁之存活頗多人稱其存曰劉女婺郡多節義疏旌舉者八人俱見表揚風化録何王金許婺人也以道統請於朝崇祀孔庭論雖未行識者是之處事近迂心則實事上類簡心不欺愛謟者皆嫉之吏部五次推陞提學叅政等官事從中沮亦以瑾故也瑾黨有宦浙者始以附瑾被劾將加重典主國是者曰激則反側不安俱從輕謫外任無何夤縁復起適僉浙憲因附御史潘鵬併力䧟茝旋復致仕時浙人曰死逆瑾能害生忠臣言路如之何不阻塞忠謇如之何不解體哉八縣父老及官屬泣贐者旁午於道茝錢無取後鵬果黨逆極刑浙人稱快茝致仕又八年新天子自藩服入嗣大統甄拔人物有薦之曰古忠臣者有曰古循良者名浮實爽可愧也公論汲引不巳始得旅進起守長沙浙儒有寄詩云古今忠諫共危機曽憶飄然去任時死瑾能生無孕子燼灰猶煽燎原威奸臣漏網天刑在賢守彈冠士論歸誰道㝠㝠無果報潘鵬此日竟何知公論之在人心不泯如此病痿未赴任間復轉江西副憲病勢愈増恐不作乃寫誌銘以貽子姓俾没後鐫之石思昔先王諡以尊名節以壹恵茝官卑無可請之諡徳薄無可壹之恵但自少及壯且老不妬不忮無刻剥偷惰之行雖不能為善亦不敢為惡司馬公曰吾晝之所為夜必焚香告諸天不敢告者不敢為也茝自反廿三嵗以前不可告者亦有一二事悔不及也程明道曰中心如自固外物豈能侵茝内訟被侵者儘多居官不能亷貪心尚在然取斗米張紙以自肥天則我殛居家不能儉侈心尚存然使銖侵兩剋於匪義神則我譴若夫恤鄉鄰睦宗族厚五倫樂三益周窮給匱恤老憐貧徒有是心原無是事盖棺論定付之後人吾不敢自文今不盡述雖然吾嘗以人占天謫官自都下祖墓側有長巨石一日忽作裂繒之聲響逾時破而為二長數十丈又有山名八卦崖者裂開三寸亦長數丈致仕自金華舟至䕫以上地名麻衣灘風漩大作巳不自保闔目以俟頃之漩醒平善艤舟岸人以訝之流賊火吾居祠堂盡毁四龕及神主出於煨燼之中畧不焦腐事雖偶然亦頗異常由是觀之天盖未醜茝之所為也嗚呼吾不得於人却得於天不得於外却得於心不得於私却得于公不得於今或得於後乗化歸盡吾無憾矣子男四雍武程出承武步武仲武沈出承步業儒孫男若干以某年某月某日某時卒上距生年㡬旬有幾附𦵏鳳凰山祖墓之側棺衣飯含之具屏去華麗無毫釐金銀珠玉以殉亦大明之俗如此變遷之後人必無所利可保無虞也乃繫之以銘曰鳳凰巍峩有作其誰爰自涼菲實培其基不肆以亢不弛以隳時稱鳴鳳自慚伏雌載黜載遷不廢其馳載仆載興我心則夷國有元凶欲秉珽圭封章一劾駢首就誅郡有瑞人倫理攸歸表揚一旌善類生輝亦有徐福代訟我私天子曰嘻擢而用之銓衡曰俞姑試有司官以旅進副憲江西天亦孔吝不究其施還此淳龎歸于地維樂在兹丘風水攸魁山靈訶䕶莫敢侮予明文海巻四百五十四
