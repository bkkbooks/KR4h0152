body:
  text: 明文海卷四百五十五餘姚黃宗羲編墓文二十七能臣楊北山墓銘公之繼室武功康太史德涵之姊也故公之葬也其兄子太學生玠謁太史請銘太史謂知公之深者莫如豫宜豫銘夫豫烏能為公銘哉然豫知公實深不可以無言也昔𢎞治巳酉春公及豫俱為學官弟子督學潘先生合一州八縣士試於乾州無慮數百人乃獨竒公謂公逺到之器云而豫交公蓋自此始然是時咸寧馬公順長安童秉虔俱名動關中其年秋秉虔發解而豫三人者亦遂同舉其後同逰太學道誼劘切交愛甚至豫三人同舉丙辰進士秉虔後舉壬戌又先逝至是公順亦不幸卒矣乃獨豫在故太史銘委焉按參政孟公德厚所述世行公姓楊諱武字崇文岐山人也岐山在北公愛之故自謂北山先世蓋𢎞農震之後唐末避兵岐下遂家焉曽祖文秀精星厯術勝國末識東南天子氣仗劍歸我髙祖以功授百戶後辭歸終於家祖貴博學能文章乃不第嵗貢太學終太學生父禮隱者配孺人龎氏生子全企繼孺人翁氏生公公且免身母夢月墮其懷故公之生也神骨特異不幸父母早逝鞠於伯兄全而後恃以底成立者伯兄力也公舉進士之明年丁巳出知淄川縣是時縣治久廢公下車鋤惡弭盜修繕城池疏理寃滯勸課耕織積敖倉之粟振帷簿之風拓廟學之規崇鄉賢之祀興詩書之教賑貧乏之士蓋乏科者且百年乃相繼舉者數人彬彬與名邑敵矣公善用智以此聽訟輒得其情蓋有盜市人稷米者求之不得公攝其鄰居者數十人跪之於庭而漫理他事不問巳忽厲聲曰吾得盜米者矣其一人色動良久復厲聲言之其人愈益色動公指之曰第幾行第幾人是盜米者其人遂服又盜田園瓜瓠者是夜大風雨根蔓俱盡公疑其讐家也乃令印取夜盜者足迹布灰於庭攝村中之丁壯者令履其上而曰合其迹者即盜也其最後一人輾轉有難色且氣促甚公執而訊之果讐家而盜者也瓜瓠宛然在焉又一路行者於路傍枕石睡熟囊中千錢乃人盜去公令舁其石於庭鞭之數十而許人縱觀不與禁乃潛使人於門外候之有窺覘不入者即擒之果得一人盜錢者也聞鞭石事甚竒不能不來入則又不敢求其錢費十文爾餘以還枕石者此數事豫皆聞諸淄川細民蓋典史陳璝者黃巖老吏也嘗侮慢公公怒鞭之於庭璝急誣奏公於是淄川民十輩走闕下為公訟寃嘗見豫豫故聞諸善政云公嘗出視淄河謂可溉田指示疏鑿處皆值故渠嵗旱蝗飛蔽天公憂甚齋沐祭蝗蝗息徒行禱雨甚苦天降時雨竟以有年於是撫巡都御史御史前後薦而辛酉春考績於吏部其年冬起為浙江道監察御史乙丑清理河南軍務及查盤軍器前後凡三年尺籍器物罔不精審而風裁凛然藩臬郡縣逺邇懾伏正德丁卯代歸刷卷京畿道明年戊辰出按順天諸郡縣往時巳稱為難而是時劉瑾用事事多牽制不可行公蕩然無所回避雖不及於禍然猶罰米百餘石至於救任邱邊氏中傷之禍辨密雲李順殺人之誣即劉瑾亦稱其為真御史也己巳擢大理寺左寺丞受勑勘視大同邊務若屯田不均軍役耗損諸弊政釐正裁革彈劾不少避邊人誦焉明年庚年超拜都察院左僉都御史巡撫宣府地方蓋所謂北門鎖鑰者公毅然當之而時論亦以為非公不可冀將大有為矣未幾瑾敗言者不問才能堪否輒以鄉人為辭公由是罷歸里舍乃於城外置墅構寶穡之堂以農為務藝植花竹必成行列一器一物罔不精好性不喜酒而風致甚髙往年戊寅嘗與德涵太史過豫同逰南山紫閣諸峯信宿然後别去嘉靖甲申豫往夀德涵尋又歸女得再會公而己丑冬會葬康生子寬幸復會然是時公巳被疾數年矣風致頓殊執豫手不勝眷戀豫亦戚戚不忍别嗚呼孰意其竟不起蓋壬辰十一月二十一日云距生天順甲申四月十四日夀六十九嵗以卒之明年癸巳月日葬某地先塋公為御史考績得勑贈其父母而元配郭孺人繼葛孺人得贈封焉後繼王氏及太史之姊俱先卒而與葛孺人俱無子獨郭孺人生一子一女子琢甚慧不幸十七嵗死女適鳳翔府學生李韋亦先卒矣今幸有子琰為側室李氏出者巳勝冠足以慰公公妙舉子業而古文歌詩亦不作世人言語蓋數卷載之家乘云豫往遊太學時與公共憂患通有無即同氣之親或弗如也比歸里舍顧會晤希闊甚不能無感及公卒又未能走哭盡哀俯仰今昔情何如耶情何如耶幸未死猶得以銘公之墓乃抆淚為之銘曰北山之英鍾其靈海月之精感而生智圓而神胡蒞弗能中道而傾匪豫智之弗經既歸既耕既樂且盈厭世而征蒼虬是乘海月熒熒北山青青億萬斯年神遊乎太清明文海卷四百五十五
