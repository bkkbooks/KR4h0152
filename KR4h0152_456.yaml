body:
  text: 明文海卷四百五十六餘姚黃宗羲編墓文二十八義士杜府君墓銘宋濓金陵有孝義之士曰杜君諱元字一元其先居吉之吉水與會稽正獻公衍同宗至君始遊江東樂金陵土俗遂居之為金陵人君苦學有才氣能為詩元重紀至元中張文穆公起巖為河南行臺中丞見君詩願掾君君不可欲以茂材異等薦又不從年若干卒以布衣終君少時父患噩疾夜數驚君冠帶伏父榻旁父驚起輒抱持曰兒在斯父疾數月君目不敢瞑至愈乃巳母沒服喪合於古禮聲問日起貴人賢士多樂與君遊君未嘗以事干之及有罷黜失志者則為之力不怠行臺都事楊惠被劾去人莫造其門君獨持酒與飲而送之趙𢎞中為御史掾坐法罷君徒步與俱行百餘里僦居之儒學教授張鉉以事黜君出金帛資其行其子四嵗失母君命婦鞠之不異巳子兵部主事常允恭家人夜失火允恭方醉卧衆怖懾散走無賴子利其資將劫之君率少年數十輩為出其篋笥寶貨於外允恭泣謝曰微君吾其死乎鄰人陳鼎舉室死於兵二兒匿舍側怨家復害其小者君曰脫并殺大兒則陳氏絶矣卒為抱匿他所以免吉之運部吏輸糧金陵不足者三千斛吏受笞搒號泣莫為計君憫之為貸於大賈以償之吏德君以物來謝君却之蔣山僧為御史所誣夜竄君室求救君藏之故人家僧獲全宋楊忠襄父邦乂廟在城南君以公吉人嵗時率吉人遊寓者具牲酒祭之君之為義多類此君嘗攻醫尤良於治證疾病造君者不問有無必與藥藥必擇精善者服之必瘳金陵大疫君和藥走給之不得食者以薪米餽之賴君以生者甚衆由是人多稱君美及兵亂士卒相戒不忍犯君卒於至正丙申七月九日以丁酉三月十日權厝金陵清涼山右國朝洪武壬子十二月九日復改葬南門外之鐘家山夫人劉氏祔焉君曽祖若海祖懋父文華母周氏君二男子曰珙曰環珙早卒環承事郎晉相府録事賢而能文得晉人筆意二女適蕭伯髙鄧世良孫男二某某環與余交頗久以銘為請余惑乎世之交友者利之所在則趨有小害則避去不肯留目一顧或道上相值輒引箑掩面陽為不識倘以事過其門策馬疾馳惟恐為所見況望其拯恤乎若君者可謂無讓於古之君子者矣烏可不銘之以為世勸乎君所為詩凡若干卷藏於家銘曰杜裔孔巨支著吉水其在金陵則自君始君才既多胡不祿仕非不樂仕義不屈巳養氣為文五色有煒孰非公卿接迹交軌彼徼其權權銷志阻吾守吾義夷險一揆章服之加鞶帶之禠所交者心加禠何與拯難濟危存孤起死匪名之求惟義所止兵戈如林白骨千里君若不知左孫右子斯起人為天錫嘉祉天曷私君惟善之致貴有不聞賤有足恃刻文昭美以諗多士蕭師文墓銘解縉宋丞相信國文公兵敗於吉之空坑也有石大如數間屋忽然自山頂震落當路徑元兵望而大驚稍却丞相由是得脫去鄒􅘶輩以餘兵拒戰死傷塗地父子兄弟相朂冒白刃以為榮吉水倚富蕭文琬父子督饋餉亦在是役幸而不死退而筆記是事甚詳豫獲見之可羡哉吾鄉之多忠義也而今宋史乃無之丞相傳云空坑之戰得趙孟濚紿元兵以免而已蓋宋史作於元盛時故於丞相事特誣漏至於丞相求為黃冠等語欺罔尤甚顧豈足為丞相輕重然恐相襲訛謬不可不辨也文琬南唐御師大夫儼之後倚富之墟儼之墓在焉文琬上距儼十世家世節義流風故存文信公嘗大書餘慶堂以朂之文琬生獻可獻可生季章季章生德祥字元佐皆忠厚人也元佐生天祐字師文元季傾資奮義保障其鄉鄉導官軍舉宗血戰賊每望其風而靡元參知政事全公子仁承制授主簿不拜時里有劇賊擁衆萬師文宗族梗其喉牙賊不勝憤圖掘其先墓以逞師文與之苦戰賊勢益熾師文度不免即自取墓中遺骸身負之出走藏匿還與官軍合勢大破之其忠義節孝類如此誠有光於文琬常恨不得主帥如文信公者與之一死光明俊偉可書也不然師文豈在鄒􅘶輩下哉惜哉守吉安者財一梁克中尚完城數年師文等不為無力也及天兵南來師文不忍賈勇謝散其徒遣弟師賢率壯從寧河王鄧禹破熊天瑞于贑亦奉身歸第口不言功豫因蕭氏重有感於吉士多忠義又重有感於宋史之謬也考之元史又獨著全子仁傳而梁克中無之豈知子仁極不足道驕淫不法無智略其死為人所逼非得巳者謬言美名不如梁克中殆不如蕭氏兄弟也而隱顯若此可勝嘆哉師文容貌儒者直諒敦實家富千金一門三世同産百餘口飲食衣服一出公帑庭無間言撫兄弟之孤逾於巳出未嘗一飯無賔客每食前方丈考鐘鼓大飲髙會連日夜人不以為侈逺宗貧鄉人賙恤之備至其卒於外而子扶櫬以歸吊哭之聲震天於戲何必附青雲之士哉吾知施於後世矣其母彭氏配李氏子士益字時用繼室張氏子士季字時選士郁早卒士柔字時徽女適泥田周子鼎孫茂實英聲海雩穎乾震其生元延祐丁巳八月二十七日沒於洪武辛酉二月六日葬里溪陵之原前葬里之下嵩今改卜焉前志有奉議大夫刑部郎中蕭公用初作今為表特加詳焉則按士柔所為狀也士柔好學善為詩少時嘗與之登倚富諸山臨瀧江之上想師文兄弟之髙風英傑豪偉之氣尚凌厲於煙雲落照之間可激昂而興慕故為之表而不辭也系之以詩曰溪陵有原青煙盤盤其瘞璠璵采雲團團瀧江之濱華第嶙峋昔有英傑今其子孫食報久長怵愓霜露有此蘭蕙接其榮光義烈軒天九族蒙恩於戲百世式象其賢彭氏義阡表王直彭氏義阡者葬彭氏之死於義者也當元之季豪傑並起椎埋剽竊之徒亦相扇為亂龍泉羅邦其一也彭氏居邑之雩溪世為士族於是有文逺者英偉有才略卓然為一鄉之望嵗辛卯賊勢浸盛官軍不能制乃散財發粟集義兵以保鄉里賊頗畏之壬辰江西行省參政全普菴薩里開分省於贑命張萬戶守龍泉許辟署從事張辟文逺為護民巡檢參其軍領民兵守北門賊引衆及城下張與文逺屢出戰不勝因閉城堅守以待救癸巳春城中食盡且無援張夜率衆棄城去文逺殿舟至螺灘賊追及合戰衆飢困不能支勢且北文逺使從弟大逺馳騎請兵於吉以圖興復率敢死士大呼奮矟入賊中欲刺邦不得殺數人賊亦攢槊向之文逺創重遂被擒大逺走吉吉安總管為移檄泰和同知楊某使以兵復龍泉兵至境大逺為前鋒踰章村河涉南洲河會風雨大作河水暴漲兵大半不得渡賊以衆蹴之遂擒大逺兄弟同死於賊是年三月十一日也賊既得志憤彭氏倡義圖巳其兄弟子姪有先在軍中或竄伏田里者皆捕而殺之自文逺而下凡十九人又婦女二人我太祖髙皇帝既受天命削除僣亂以興太平彭氏族屬之存者休養生息今七八十年日以繁盛蓋詩書禮義之澤未艾也然其老長間居族坐相與談向時事未嘗不慨嘆文逺兄弟之英風義烈且深念夫死於其難者之無辜而皆不能歸葬或無以嗣其後蓋䀌然傷之嶷文逺之再從曽孫項城令仲恭甫之賢子也聞諸老長而有慨于其心乃即雩溪大塘口之原開兆域營冡壙倣禮各為木主以宣德三年七月望日招其魂而葬焉又以項城命置近田九畝以供嵗時祭祀曰死者有知庶幾能安於此而無所恨矣嗚呼喪亂以來姦宄縱恣善柔多隕於非命有能奮力以討賊而舍生取義如文逺兄弟者誠少矣雖曰有之其宗族兄弟有能興哀於既久之後而為之歸使祭奠有所如嶷者亦少矣然則彭氏其誠能篤於義者哉是皆可表也嶷來京師因其姊壻督府經厯項斐求豫言欲為之書使歸而刻諸石凡葬者之名諱次第則備載於碑隂江君文博墓志銘熊遇國家都燕去蜀最逺吏治不能比中土今縣都委積倉人粟人之藏趨文具而巳然勾稽法嚴司牧者卒欲賙民之艱厄單出里核之非可朝夕獲也聚野粟者大抵富民耳旅師不能與其權無以通材行平興積施之政即能與其權而亟奪富人其心未厭矣往時蜀卓孔程鄭之徒富擬封君隱民皆取食焉以其擅山澤之利周官藪以富得名蓋是也然與今力田服賈者異責彼於此是曷可易云哉嘉靖元年以來蜀凡三歉其始戊子己丑部使者勸發民粟而太平江君文博與其父凡入粟千五百石部使者上其事鬻爵格及等當授指揮使銜文博曰隂德者非明星也吾與受級豈若行吾志哉吾世為民耳謹謝還受文博起農商非如卓孔程鄭有所擅利嘻為文博不難乎其後吏疚于安富丙午民遂困甲寅之歉富者且或不能自活無以受廢棄故文博之卒行野有哀者矣文博名溥姓阮氏其始湖廣麻城孝感鄉人元末避南鎖紅巾亂入蜀家太平壩遂為富順縣人髙祖德七配江氏曽祖文仲從母始江姓祖琦父志鑾故儒生也母陳氏少從其父操竒贏往來蜀楚間比長代父事秋冬暇則泛舟下江陵瞫映洲渚間科頭而起解纜行伸手作勢招長年白浪中與相應夜呼囂驚盜不稍稍怠遂貿布幅揣其長短工苦偵所往媺惡赴之握算觚上下循緣計盈縮蓋三十年而以資豪矣以故喜周窮乏建寺飯僧以為佛事如是資其庶弟鶚鴻鵬學輒推分與之撫其遺甥陳良文猶子也異母妹適榮昌人李垣亦多周之財有養子凡數人皆列産焉文博好有所揆作隅牗阿桷豐殺中程蔇茨丹雘莫不克壯以奉其所嚴視其燠涼以節宣以無不敬事庶母王有禮其孝友非得於竿牘蓋天性也文博晚始舉子即能教五嵗則外就師傅擇有文譽者厚禮之其後汝峨汝岷相繼為庠弟子員越明年峨為廩生遂以明經壬子鄉舉第三人岷如京師送三十里外命曰吾老期見爾建大業光門望也比歸文博曰與我承三年歡寧計不第哉性喜奕岷圖娛父則列局爭道喧聲四聞崇酒稱歡養以為樂人曰精用而不竭夀徴也五月朔與客奕棋多稱病明日病即卧不起問之曰病得之飲食耳吾且待二子齊鳴爼豆足憂耶五日治命子孫以耕讀勤儉召諸親族别八日訣曰吾明日歸矣明日竟卒文博與人無長幼貧富資和以咻煦之不干官府法氣剛辭不徇人鄉鄰有爭輒為平解之又緩急相倚故里人䀌傷非茍然也是宜為之銘銘曰攫之以為豐巳不巳而又豐之耿耿乎其似不忘也浚之以為深巳不巳而又深之芒芒然其似夢也身執其勞而息其艱乞之則搆迫之則鬭胡可攘也異人同情蓋其常也望室而喙如或息焉災而充然如或蔭焉猗嗟江也不易方也是以昌也龍坪蛇蟺封若堂也后千百祀過者軾之而讀斯銘終允臧也桐鄉少府戴君墓志銘魏良弼萬厯二年嵗甲戌夏五月戴君二孤將葬厥考於馬耳山祖隴之原謁豫請銘其墓庶永永有光也豫愴然思少府逝去蓋嘉靖巳未六月計今十有六年豫從叔為君姑夫者舍豫去今亦三年餘矣少府美風度白晢朱顔衣冠濟楚惟是欠師友豫謂十室忠信蓋公之類云俯而就吏非其所安設使得師友造就其所進立當出儕輩逺甚所得與其儀表裏兩稱矣嘉靖初世宗皇帝御極勵精圗治議禮制度凡祖宗有未備及備而未協於義者孜孜求言以規制作之善豫時謬充補闕出入禁闥期以將順匡救盡忠補過報國時有獻納荷蒙採擇施行然亦時有犯顔廷諍事預國典者不容不直輕則辱罵呵斥或奪俸重則逮治栲訊甚則廷杖怒始泄尋復追悔竟不黜落亦足徴聖德之有在也夫以狂直戅愚之性事聖明濬哲之君加以七八年之久昧於進言中間批鱗蹈尾履危冒險蘇子所謂魂飛湯火命如雞者何日忘之也聖主賔天戅臣猶幸茍全故是聖主優容向非海內異姓同志兄弟若南野念菴龍溪克齋諸公等及公與陳公曜羅君顯等分班夙夜護持供理藥物其登鬼録久矣何能有今不然斃於杖者豈少哉況豫么麼屢經下獄杖亦不一次今銘君墓追憶四十年前患難不覺吞聲飲泣重有感傷君如有知當知豫之懷抱山之髙水之深也自是薦紳多知君君亦知所立豫罷官南歸君亦與陳君相送至灣豫尚病杖瘡泣别以為不復再見寧論今日然自是即落落不獲如在京朝夕過從也詎意今日復能銘君墓乎少府世居戴坊逺有端緒在宋有為評事者焉官於桐鄉聞古朱邑髙風知所樹立補任山東掖縣捕賊海傍而倭夷突至則領兵設伏出竒大破之斬獲甚衆蝗為苗􅊣君率民禱而捕之嵗獲豐稔民皆悅之君可謂獲上信下以此從政何崇卑之有人言五十不稱夭君年六十有二是夀杖於鄉也恩榮一命惠流兩邑貴加於人一等矣桐鄉移祿以養親在行年五十之後有終身慕父母之孝復何恨焉豫為君銘亦為君歌銘曰錦水戴坊來自剡江中有吉人孝友義方祿為親移仕以民康遁迹洪都徘徊溧陽桐鄉桐鄉官不卑慈祥豈弟民依依衆皆胥溺君拯之掖縣少府行春早盜息民安書上考抑民食蝗心何狡襲擊郡倭震海島毋以我公歸我公歸兮民有殍馬耳氣勢低復昻山回水繞堂若防卜云其吉終允臧會見德厚流清光明文海卷四百五十六
