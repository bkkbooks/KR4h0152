body:
  text: 明文海巻四百五十七墓文二十九義士中順大夫南京鴻臚寺卿觀吾史公名朝賓墓表王樵昔椒山楊公下獄時權奸摘其疏末援證二王一語以為離間欲必致之死刑部尚書何鰲侍郎王學益皆姦黨也争以承風㫖為事而其事屬山東司其時以員外郎署司事者觀吾史公也執不可曰繼盛何罪堂官知不可奪乃自為獄案以授之司坐以詐傳親王令㫖法當棄市公乃書奏尾云楊繼盛語雖誤引心實無他惟望陛下憫其狂愚宥從逺遣以全好生之徳疏上謫泰州判官及權臣事敗公始叙復擢南京大理寺丞鴻臚寺卿將大用而公己告終大宗伯袁安節公嘗銘其墓越若干年其子繼芳復求予言以表其墓道予與公不惟同年相知其尊君商崖先生實嘗司訓金壇予得識公于學舍先生嘗有夣云公宴觀吾公與予兄弟列坐意蓋期予之兄而不謂丁未第進士予從公後果符先生之言也噫予與公契分不薄矣其忍無言公諱朝賓字應之觀吾其别號也自㓜凝重商崖先生厭近時業舉者學無本原不令外從師公與從弟朝宜朝富日相講習公以深沉之思尤自謂獨以魯得之督學樸谿潘公試公第一是年中鄉試第二年纔弱冠耳自後四蹶春官自信益堅嘉靖丁未舉進士為本房第一廷試二甲第四授刑部主事坐獄事外謫時貽椒山書云賓爭此獄己辦一死所以不死者冀得出公於死耳公幸自愛椒山即書其後以答曰公心良苦吾與公訣矣天下事尚可為努力勿怠此觀吾公行履之概也吾於是而有感焉嘉靖初年皇威伸於上言路開於下一時上意所向初若難回及情見得罪誅罰立加最寵莫如張永嘉亦逐者屢矣惟中年慕長生事祠禱而嚴嵩以佞巧承順得柄至十餘年攻之者衆矣惟椒山楊公列其十大罪中外竦動雖嵩亦自知無辭於誅以及於敗上英武卒誅之楊公之言盖未嘗不行也人之知史公者或淺矣吾見其於天倫厚於内行謹平居呐呐若不能出辭而不可奪之節遇事乃見即其從容數言雖無救於楊公而楊公之䝉非其罪昭昭明甚謂其於正義有助乎非耶吾見世之談者動曰名節曰氣節夫節者視夫義之所在而巳氣無所用名何有焉今之所謂節者氣耶名耶他有所為耶徵仕郎中書舍人餘山秦君墓誌銘吳中行士固有闇然修巳灂乎不淄自足表見於世而遘㑹逢適偶有竒節偉事赴人之困厄急於己而賴以存亡生死為世所談説顧以一節一事名焉即當時頌功没世頌聲而或掩其生平嗟乎此人之侈言者乃士之所恥居者也故予銘亡友秦君之墓而志感慨云秦君者所謂敦倫扶義操行博物自足表見於世者哉君諱柱字汝立為太守次山公之季子為太守鳳山先生之最㓜孫故自命曰餘山夙禀甚慧嗜學問雖生於殷盛乎絶無紈綺習十七以明經補邑諸生文日有聲而體善病不能就有司校藝貲而升上舍為南太學生游京東而坐傾六舘談稷下而立廢千人盖不啻郭泰田邑之名矣金吾帥太傅朱公與君為中表親未識面而心慕其權力能推擇士素知君工文詞精於楷𨽻㑹詔選中書業以君名上忽馳檄召拜官而君猶未知也中書稱内史頗華重即厚賂奥援不易得而君徒以太傅公推擇得之初未嘗有所干請人艷羡以為遇合而君實不願也君雖列侍從而恥以他途小就更恥隨諸曹偶為囁嚅傴僂狀故公卿之賢者折節焉而貴游班行中多側目矣元輔新鄭公與君有先世誼而又重君材能接遇甚隆既公為次相中閹所傾擠單車就道邏卒緹騎四出籍送者姓名昔稱門牆士者一時避匿去而君獨送之至百里謂踪跡者曰語而主吾中書秦某也吾何忍而乃為翟公客乎次相中閹相結納勢焰甚張至矯㫖奪情之議起予與趙常熟上疏賈禍度不免於死則以身後事屬君及受杖闕下即日編戸出都門外予時喘息㣲矣數憒數甦邏卒緹騎更四出籍相從者姓名昔稱肺腑交者一時避匿去而君獨僦舍挾毉藥起予血肉中而生之謂踪跡者曰語而主吾中書秦某也吾何忍而不為鄒正言友乎至是君固不可一朝居矣亡何遷君為魯府審理本朝故事無中書遷王官者乃今自君始除目下人莫不創見駭聞君則曰業巳觸忌扞罔不詔獄我而王官我幸矣即王官猶仕籍耳彼修郄者寜遂釋憾乎氷雪在途薪粲為絶又亡何果中以考功法坐罷久之相死閹亦罪廢予與趙常熟䝉恩賜環日夜圖所以伸理君者時阻力絀議且格也藉令君以官為重則向者以予所屬為輕又藉令予能伸理君則今者必能榮膴其身予復以忤世歸君竟以罷籍終益足明君志而庶可以釋予之負乎君豪儁爽達洞徹底裡時露鋒穎善持論議不漫為然諾其所交游心相知能以身相許不則雖遇顯重義不受爾汝也内行更孝友純備事父母養生送死竭情致禮及事伯仲兄尤怡怡敬愛而門戸徭役以獨力支持于其間雖甚勞甚費無問彼我凡受人之託而為謀之必忠必信至恃之為緩急則慷慨捐其身以赴之常曰居恒相徴逐一旦臨小利害乃反眼不一引手如韓昌黎所云者非夫也郡人蔣某留絳帖於所未幾亡而子㓜越二十年招其子歸之獲厚值以濟其家浙人童某鬻書顧善詩母死家貧不能𦵏君出室中釧易二十金貽之以襄其事邑人某素習君君憫其没而母衰婦嫠子在襁褓歲以粟帛周之子成立乃己閩人林某雅慕君不逺數千里來歸君為舘舍衣食之久更賫發資斧乃返里中子某誣其族黨陷於法不能自直君則訟言之於官事始白蓋其拯危扶困排難解紛無所為而為者類如此君素無他好特好客又好古金石圖史及法書名蹟購藏百千巻手自朱墨校讐者半至搜獵稗官野史逸壁斷㦸諸種種令侍史繕冩摩削者半筆楮饔飱之費傾其貲不郄而四方賢豪客又未嘗不過君君接納不倦黽勉有無以餉僕馬故聞日博聲日蔚起而産則坐是以日落至割膏腴廢箸未足償逋責卒之日壁立而橐若洗今其孤鬻圖史以營窀穸傷哉貧也亦足以概君之生平矣君為文雅鬯中情欵然自秘恒不以示人書法楷宗歐陽率更草宗孫䖍禮皆足傳世稱名家君生於嘉靖丙申六月十六日卒於萬厯乙酉九月二十六日得年僅五十昔予丁丑事周旋患難惟君與朱君嘉得兩人耳君以失官得名而朱君則無咎故無譽朱君之生先君二歲而君之死後朱君一日予適以是時乘傳抵里皆得視其含歛而哭之嗟乎予捐生蹈不測必死不死君與朱君皆仁人履安處常又下壽耳不宜死俱死死生之際天乎其有意耶否也秦之先自淮海先生子湛倅常州因家武進十傳而至瑞五贅無錫遂占籍焉又五傳而至霖霖生光禄大夫太子太保南京兵部尚書諡端敏諱金金生姚安守諱汴則君之父母曰楊恭人妻曰蔣孺人生二男長延烝邑諸生娶顧氏太學生武陽君女次延赤㓜未聘五女一適禮科給事中吳君子桂芬邑諸生一適鄉進士曹君子道孫太學生一適廣西布政司理問成君子衮一字顧君子本曽殤一字禮部主客司主事華君子師曽殤更字光禄寺署丞朱君子肇敞延烝奉蔣孺人之命以某年某月某日𦵏君于姚灣之新阡夫君之植於天者長驅髙歩耿介凌厲之氣見於眉睫又博洽經史務湛淫之思稍得學問之力故矯矯修其行於生平及其見義必為隨遇輒發若飢食渴飲有不自知其然而然者要以内足其志外不矜其能而已世以官為重遂以失官故為君重而一節一事津津乎其言之也淺之乎知君矣知君者莫若予予不銘而誰當銘者銘曰君起予生予銘君死疇測其然靡憾於理義以利傷惟君所鄙名以事成惟君所恥有涯者形不泯者志姚灣之阡曰歸於是考徳徴賢千秋有祀萬騰霄墓誌銘楊麒正徳初中官劉瑾用事以峻罰刼羣工而取其賄晨有言賂弗暮入則殺身破家之禍隨之中外縉紳之士不附瑾者輒中以危法至有不能保其骸骼於泉下者人人重足莫敢言於是瑾之泉貨裒積如丘山而其力幾足以揺宗社時吾鄉先達今方伯弋陽吳公克明守泉州與其禍當罰米五百石吳公㢘於官無可輸貸於人罔有應者聞萬氏騰霄之富而告之萬慨然曰吾固知吳公之為人也公遭難吾無愛其賄矣遂倒囊以五百金貸之吳公之難以解越明年賣田宅器服計本出羔羊之息來償納其本而返其息固强弗之受也由是萬氏之義聞鄰邑鄉之顯者咸降勢以與之交益斂約弗敢恣正徳甲戌逆藩宸濠請䕶衞於朝大學士鵞湖費公知其將藉此濟不軌之謀以毒鄉國而危朝廷也顯言於朝而力阻之濠大恨以計去公公去位之三年嗾仇家三姓之盗攻公之家殺其奴僕兄弟破室廬墳墓掠貲畜蕩然如洗時公從弟子章被執公傷其早孤無季昆殫力圖所以全之之計非重賄不可而公無所措其手騰霄聞之泣曰公胡為至此乎公不顧家以恤我鄉人吾安忍惜財以不為公計乎首倡出百金助貸里之好義者慕而應之遂出子章於豺窟之中其行大率類此嗟夫世變洶洶之秋生死休戚惟財乎是係小人習觀世變之機而知其勢之所重在於此也於是唯貨力是矜是尚而尊崇之不知其他屠沽瑣瑣輩握贏貲以自雄攘臂捧腹傲睨乎闤闠之中而不知名器為何物往往乘人之急難以徼大利務益富而不恤人之困胷中生意蠧蝕於賄者畧盡至有藉餘力以快平生睚眦之讐茍可以行其胸臆者靡所不至若是者皆騰霄之罪人也君子挾財以為義小人挾財以滋悖若騰霄者不幾於君子矣乎騰霄之起家也得之於至艱當其少孤貧落魄而有機知前給舍玉湖王公見而竒之知其不終困也貸重金資之貿易乃勞苦奔走經營運化蚤夜勤惕弗自寜數十年而致大富家成不忍獨享其厚則求族戚之弗植者給之量所能而處以商藝故騰霄之族戚鮮失所者夫得之至艱宜執之至怯執之至怯則由前所言者皆不可望之矣而騰霄所為卓然如此不亦異於人哉騰霄諱伯昇王父普同父友成母丁氏世上饒縣人娶李氏吳氏韓氏生子男二永鑑吳氏出永釗韓氏出女二長李氏出次韓氏出孫男一璋女一終於嘉靖壬午夏五月初八日癸丑距生正統庚午十一月十九日享年七十有三以嘉靖三年甲申五月十四日戊寅𦵏上饒鄉之灘頭陂繫之以銘曰豐而資而何施王孫困食我其飯之世路險激我心不移恭以貴貴濟其嶮嶇粤稽古昔亦有為嫓絮賈出荀漁叟逃胥豈曰徼利言有秉彛猗嗟騰霄其舉趯而子孫食報弗止厥軀明文海巻四百五十七
