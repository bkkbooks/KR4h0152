body:
  text: 明文海卷四百五十八餘姚黃宗羲編墓文三十名士林石峯表張嶽正德巳卯春三月辛亥武皇將南幸中外訩訩危疑廷臣交章諫上怒責先諫者跪外廷待五日罪止來者勿敢諫丙辰行人司奏繼上上愈怒羣捽去下詔獄翌日大理寺闔寺繼之又翌日工部屬三人又繼之上讀奏怒如行人司加甚命鎖項械手足暴廷中五日復繫詔獄待後命是時余備數行人司同年長樂林君質夫為大理評事質夫長余十餘歲稟素癯繫械出入神氣間靜無異騎從出入棘署也越四月壬申杖於獄又越五日丁丑杖闕下質夫兩臀無完肉流血漬街砌竟杖息微微弗續舁至同年刑部主事鄭君與聚舍遂絶就殮焉余時卧瘡不能視質夫之殮而親見其死狀為之伏枕流涕纍日是夏六月余謫南京國子監學正便道省視乃擕質夫喪偕行至延平付其子逢春歸葬質夫為人忠孝沉默心事瑩明無一不可質諸鬼神其事親居家孝友恭儉與人信詳明謹細不以一字茍喜怒於人可謂賢者當質夫未死時士大夫知質夫者大率謂其清修雅飭為鄉里善人而己非有卓然竒偉可動人耳目者以故秉筆之士亦無從書而傳之以至於身名俱沒若先生者余知之詳矣而能紀其行事僅止於此以此而望信今傳後以亢先生於永久亦未知吾言之果能乎否也悲夫先生以嘉靖戊子十二月二十一日終享年五十有五娶王氏早卒繼娶吳氏相君子無違德子男四淡洵液涵女一適林春暉孫男二有極有樞墓在晉江縣三十二都石璧山之原北向其葬以己丑冬十二月二十一日狀其行者先生門人張天衢銘曰學以為巳仕不逢時吾銘其丘千載不夷陳存齋墓碣吳鼎粵昔盛時名國萬家之城必有儒林世家傳其經術業成而耆艾其耉德淳風為世典刑所繫豈其微哉仁和陳存齋先生殁四十年矣兹余特為表其墓云先生諱良心字彥仁上世河南杞縣人宋有團練使者扈蹕寓上虞其後轉徙於仁和曽祖振為元平江路學正避鈛鶴臯兵亂買田長興山中故先生為長興學弟子祖胤明古田縣學教諭贈文林郎閩縣知縣考政南康知府贈中議大夫贊治尹妣鄒氏贈孺人繼妣張氏封太恭人以季弟京兆尹良器貴故先生少業春秋經傳下帷講誦務探其賾隱至不知日之蚤暮其精如此辭藻論議踔厲恆詘其同舍生同舍生皆嚴憚先生出其下顧謂掄魁發解如舉秋毫然典學使者考定率為選首應補弟子正員食廪餼而先生毫不肯就推以與他生者數矣年四十餘乃為胡提學榮勒令就廪然以屢舉屢不第也蓋得遊息於藝文諸經外傳厯代全史貫誦罕有遺謬諸儒學士稽古質疑於先生先生為言某事出某史某義某疏如是揆諸簡册良然由是縉紳名卿大夫咸推先生博雅君子矣𢎞治改元先生年六十有一應貢上春官考定天下歲貢生先生為選首明年應順天府薦為春秋第二人時泉山林諭德瀚天下士也校其文曰淹貫經史對策尤竒蓋晚乃遇知巳云明年分教江西之新城僅三載進丹陽縣學教諭先生素矜嚴若不可嚮邇至於為諸生授經授藝輒亹亹不倦相得甚歡諸生或禮餽先生先生受之不讓而諸生空乏輒復賚豫通有無均豐約師生如父子然嘗喟然嘆曰君子之所以異於凡庸者以其存心也吾顧吾名宜號我曰存齋由是學者咸稱存齋先生云竟卒於丹陽官舍時𢎞治十二年十一月二日先生年七十二反葬於故丘在錢塘甘溪之濱丹陽為祠於名宦焉先生年未四十喪其初妻張氏嘆曰丈夫大業未就奚復以家室為應薦之歲乃繼娶黃氏側室出子男一曰賓女一孫子三人炳耀煥孫女一先生平生狷介無隱好周宗族陳族大以蕃子弟來遊者輒捐資豫之不吝益以書招羣子弟均豫之資曰以是為紙筆費且嘆曰世之貴人厭薄親戚干謁計利析秋毫乃厚藏自封以飾其車騎衣裘也悲夫竟先生卒無餘資財潤其子孫至不能庇廬墓而先生有從子之子曰克昌為吏部郎念其先德為買石屬友人吳鼎表之吳子曰余為兒童時郡縣擇民子弟補學官諸生其父兄多不樂從至以故避去者今則比屋為子營入學齗齗惟恐後時矣人才果盛耶衰耶昔之士非博習親師業成強立未可以蚤有譽者宦則以名德自重雖卑官薄祿要亦有所施豫不為紛華盛麗可喜之事人亦無健羡心士之難進也有以夫嗟乎後進束書不觀乃誕曰昔之人無才而談天雕龍少年立取高第稍仕輒攫厚資營利便田宅揚揚閭里以驕淫相高其子弟爭相慕之由是黌序為市門肩相摩以入所期物在其中也嗚呼科第日崇人才日下過存齋先生之墓者盍少警於斯文董子壬墓銘許相卿於乎此董子壬甫之墓也董故饒於資子壬生而穎異以志自雄猥視家殖敻然欲自别於富人兒喜振施慕賢達其所遊知皆海內知名士大夫子壬足不良於行嘗重繭三十舍東見楓山公其敦尚如此茍庸劣雖富貴人奴視之加詬訕焉人咸咎其迂妄子壬弗為變獨時時好讀書世所傳書無不窺尤好先秦古書卑魏晉以下不足學時經義程文行天下子壬居校中一簡不蓄也比舍生間示之子壬誦不一再行則大笑棄去曰淺之乎兒侮聖訓壯夫羞稱焉有司課試得子壬文誦不一再行則大笑棄去曰怪哉將安所置是子壬用是連試輒絀𢎞治中以薦應敷陳王道科伏闕獻萬言論政治得失天子異之下禮部試會要路人子壬故奴視者阻之罷歸子壬自顧生世弗諧愈益放誕為無顧忌大言廣際天地幽極鬼神逺遡皇王近逮古今名達罔不評刺人聞而迂之知者悼其幽憤也或發之詩大篇短章多奧雅可誦然家日落其好施日甚錢粟在前來求者色辭為可憐狀聽持去持去盡則又破産以施若不知有然其子力諍之自若也其父痛懲之自若也既又大苦之子壬終自若以至喪明乃後己尸居鷇食守黑閟光殁齒無怨言苐言我固當爾佛氏所謂業障豈適今日事耶因號聽光大師三年而卒卒時年六十子壬諱淞其先汴人始祖武功大夫諱健南渡居越之新昌三世祖諱潮遷海鹽之澉浦八世祖諱鎮遷海寧之錢山家焉祖慧父謙母陳氏配祝氏子男三觀醫學正科升後其弟湄季益女二長妻浙江都指揮楊輅子和幼妻同里周玠孫男三女二子壬卒以正德戊寅十一月二十三日葬以辛巳正月八日所輯聖學全書真儒藎語紫陽正脈若干卷藏於家豫聞子壬客京師倦逰困甚或勸之幸途媒進取者子壬詩謝之曰我有腹中書不辦頭上帽浮雲自去來難應鴻都詔衆以為迂於戲其迂也祗迂於時匪迂於道也哉銘曰形易用兮至人事嗟聽光兮謾自戲存弗視兮殁而視天夢夢兮終古閟內斯文兮志子瘞光斤斤兮燭九地趻踔來兮閲爾世陶子沾墓志銘薛應旗陶子生三十九年而卒卒十有一年而葬葬之先一月其遺孤棟泣請於薛子銘其墓薛子子沾友也感愴泫然因書以歸俾刻諸石嗚呼子沾己矣以子沾之事觀之古今天下之士一才一節附青雲而顯當世聲施後世者不知凡幾其卓犖竒偉命世出倫者顧坎坷終身名湮滅而弗彰也又豈少哉子沾長身玉立氣性豁達甫弱冠即欲陵跨揚韓掩迹顔孟嘗對鏡自言曰以若人而僅為近代人物非夫也邑里儕輩遂目曰陶癡陶癡云乃子沾則實不安於凡品攻苦力學務究所志裋褐衡茅啜粟飲水陶如也久之貫穿經史而百家九流咸泛濫出入及發為文章則又徑切工緻無蕪辭長語初遊郡學有召之者弗往選入國學祭酒司業亟問之亦弗私謁也既舉應天鄉試再試禮部不第窮居一室杜門自樂飲酒歌詩形影相答人以事干輒謝餽遺之弗受儕輩乃始曰陶子其果為文章氣節之士哉至其妙悟本原上窺聖學則固其所自得而未有知之者嗚呼子沾蓋天下士也邑里交遊尚淺乎知之况寰海士人末識子沾者其又何以稱哉嗟哉子沾委骨原野蕭然一丘不得與一才一節之士並馳於世謂有幸不幸者非耶雖然其與白髮蒙頭紆金橫玉而集百詬以死者則亦有間矣子沾姓陶名澤子沾其字也從遊者稱為朴菴先生世為常州武進名家其先居於橫山徙於郡城運河之南再徙城西之宋莊村曽祖某祖朂任寧海州知州父亮嫡母王氏庶母胡氏子沾乃胡出也生於𢎞治庚申八月二十六日卒於嘉靖戊戌五月十八日屬纊時援筆致書以貽其生平友朋曰不意遂為長别母老子幼望一視之餘無一言怡然而逝嗚呼死生之際整暇若此此不可以觀哉所著有近思續録古本孝經解朴菴稿若干卷藏於家娶徐氏子男一即楝聘吳氏女一適謝某君卒之年棟方七歲幼且貧弗克襄事今為縣學生漸有成立遂卜地於白鶴溪之原以葬君君其有後矣乎葬之日為戊申十有一月二十五日銘曰玉毁於璞孰為圭璋金淪於礦孰為干將孰云可遏終不可藏還諸造物返此大荒川流嶽峙日朗星光將與地久而天長中山先生墓志銘許應元嘉靖戊午三月八日中山先生張伯生卒應元與廣平太守翁相長卿走會哭治凡斂事明日浙江右布政使希齋陳公來弔復會哭陳公推俸為葬具就唁其孤經紀本業之既廣平曰嗚呼伯生己矣不可使無聞於來世乃狀其行而使應元銘之狀曰伯生之先本姓馮氏趙之君子館人宋建炎初武功大夫寶南徙吳興其子忠翊郎安國仕台州死葬臨海因為臨海人曽祖拱杓再徙錢塘仕為豐城主簿生子存璘存璘生子鎮仕為福清訓導遷高安教諭教諭公娶吳氏實生先生諱乾元字伯生伯生常曰我中山人也學士因稱之曰中山先生云始教諭公五歲而孤父之友壻張瑀者撫以為子以是從其姓伯生時時語其友豫為張氏立後乃復吾姓竟未復以死伯生負竒誕節好為俶儻非常畫䇿學無所不窺然要以建功立事為用説經亦往往以後世事為解覽往籍稱引事成敗若與其人對語也與人論學疾高華曰卑之吾欲使食其實吾知賈誼陸贄也道榛蕪久吾力而闢之家世為舉子學顧指為小技而自雄其才欲以所獨得者括取祿位曰使我由此負任當世事吾安用此軀為藉苐令不施於事猶當以言死不能哫訾嚅唲沉浮取兒女子寵也憤疾邪枉時時好出位言天下大事又喜談兵島夷難作當事者與縉紳先生圖戰守計未嘗不在其間所指畫有足發憒憒然無能用之者生平舍己所事事赴人之急嘗葬友人三喪損服食行質貸棺斂族姻之貧而死者行之終其身不變少時從先公遊閩中以是與希齋公相友厚善及公來為郡守又數年為布政使交禮如一日公不以己貴有所加於伯生伯生亦不以貧賤故非禮有謁於公士以此兩賢之初先公既殁無長業伯生徒步入台南山中收集逋負買田百畝有兩異母弟皆授以事無何仲喪其資病死田廬無幾矣伯生固大度士不能别治生窶甚太息曰嘻士貧而餓死職也寧當使老稚轉委溝壑乎於是從友生先貴者相周旋有規無從主人周之則曰吾所得受也且以免諸人死嗚呼斯亦曩時高陽狂生街亭卒之儔非耶士固有侈自奉而同産一不得入其門夫以伯生之貧而恤其亡弟生姊收其孤嫠四三人三十年不倦如何哉如何哉為文敏疾多竒所著無事公傳毛頴問答等篇數千言古詩文數百篇瓌怪宏放類其為人然終困一第丁巳秋始貢於有司而病不可作矣生於𢎞治戊午五月二十五日得年六十有一妻陳氏生子男三靖翌端廣平之辭云爾初應元與伯生長卿及仲凱舜佐邵楩良用講業吳山之陽五人者志相得也伯生常以為茍皆得效用願有以淬厲著白於世不望相推轂取高位方是時伯生氣鋭甚遇流俗人不能忍視中有所觸常終夕咄咄不寐起燃兩炬光向晨髮三十餘盡白矣其後豫為泰州伯生寓書於豫高自閔悼辭旨橫決且曰兄弟三人有田五十畝均之則三人飢捐之則二人飽一人飢不如捐之於是并宅一區盡以與兩弟獨跳身出夫婦僦斗室以居豫為戲語寄之曰世事何煩雪滿顛憐君三十氣無前肘邊金印何時挂郭外今無負郭田蓋伯生常自許有縱橫才用且曰吾雖儒衣冠乎然吾節俠也其後仲子貢未上春官卒翁子邵子同舉進士為郎出典郡方州之簉二子果皆有聞可傳後如伯生指獨余最不肖濫於末行而伯生終窮以死悲夫銘曰使驥捕鼠笑於狌狸干將以綴履曽不若彼纎錐壯夫有懷曠世與期營彼秉庾為孺子嗤為璧毁喜兮與珉完鄙兮等斂於斯氣獨上指兮明文海卷四百五十八
