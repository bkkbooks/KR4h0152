body:
  text: 明文海卷四百六十餘姚黃宗羲編墓文三十二忠義孫炎墓銘宋濓君諱炎字伯融姓孫氏金陵句容人曽祖某祖文嗣父顯卿皆為儒母洪氏君身長六尺餘面黑如鐵一足偏跛於書少所不通喜雄辨纍纍數千言常窮一座人人莫不畏其口長於歌詩元至正中天台丁君復同郡夏君煜皆以詩名君遊此兩人間曰夜相切劘益得其旨趣下筆一掃百紙可立盡辭彩爛然驚動江東雅好飲酒常與夏君對飲賦詩各務出奇相勝每得一雋詩捶案大呼譁聲撼四鄰所與交皆當時豪傑間出遊四方君既以氣自負常輕視章句儒衆中常自許曰孫炎豈齪齪輩伍耶然卒無容之者竟困而歸嵗乙未今皇帝渡江來金陵開江南等處行中書省聞君名召見與論君陳元運將終勸上延攬智能士以圖大業上甚悅辟為掾每問以事慷慨激烈所謀多合上心上愈嘉重以為可用戊戌從征浙東以勞擢同知池州府事尋改池為華陽府即拜君為知府皆有聲明年十一月召為省都事會處州降擇鎮安之者咸以處在山海間盜賊憑結非君莫可治上亦才君入省月餘遂命為處州總制錢穀兵馬之柄悉委之不取中報且以省符未署者付之聽其自辟任君匹馬入處州時城外七里即賊營狼嗥虎踞不奉官府約束君至坐廳事驅城中民跽階下諭以元將亡及上起兵意謂民奉法則生否則必為虀粉語甚剴切民皆叩頭流血誓不敢二心退則轉告其鄉民以為孫使君仁且武不比舊官可玩狎君亦下檄屬縣遍諭之因是投兵來降者相繼於門數月皆化為良民君復擇其驍勇者練為兵時時肄習之拔其服衆者為長有寇則率以禽寇事罷散歸為農有所警發馳一符立至軍門無敢或後姦吏巨族素驕橫者斂手吐舌畏之如神不敢出聲語雖在數百里外皆縮氣屏息如臨其家郡民賴以安皆謂得孫使君治郡晚時上欲用人而秀民有才能者見方戰爭勝負未分皆伏匿山谷中不肯出君患之鈎致一二人問有才者為誰今皆安在録其姓名為書遣使者招之而劉君基章君溢尤為處士所推劉君最有名亦豪俠負氣與君類自以仕元恥為他人用使者再往返不起以一寶劍奉君君作詩以為劍當獻之天子我人臣不敢私用封還之為書數千言開陳天命以諭劉君劉君無以答逡巡就見君置酒與飲論古今成敗如傾河決峽略無凝滯劉君乃深嘆服曰基始自以為勝公觀公論議如此基何敢望也君既以口舌安反側郡上方征伐無一兵與君壬寅二月苖將賀甲李乙叛襲君而所練兵亦應之君無援被禽幽空室中列卒環守脅君降君紿之曰若生吾吾能成若事賀李知非其本心恐留自遺患遇夜以燖鴈斗酒饋君曰以此與公訣君拔佩刀割鴈舉巵酌酒仰天飲曰嗟乎丈夫乃為鼠輩禽然我死義爾賊死肉臭狗且不爾食卒怒持劍瞋目擬之君飲酒自如食竟叱其解衣君罵曰此紫綺裘乃上賜吾者賊勿解吾當服以死引枕而卧賊俟其睡乃害之時某日也年三十又三事聞上嗟悼久之是年某月日以其喪歸葬金陵南門外聚寶山之陽後二年贈徵事郎戊申上即帝位念君死事之忠追封丹陽縣男仍命有司復其家君先娶王氏初國兵入金陵不屈死生一子毅繼平氏君事親孝與人交緩急可仗有古烈士風遭時遇變所為可稱道守死不二卒成美名可為俊傑雖位不大顯生不永年然忠義之士當與天地長存不足為君憾也君所為詩若干卷門人蔣敬編次傳於世銘曰元季政亂盜若螽戈矛相劉河漢紅江淮中間飛一龍誰其輔之惟羣雄維時孫君起章逢齒牙差差萬劍鋒陛前論事聲震鏞帝一見之為動容俾知大府佐幕中鋤姦剔蠧别罪功栝蒼告降內猶訌詔君持節總兵戎匹馬三矢韔一弓徐行直入如涉空羣冦噤伏傴且恭大開城門滅燧烽口宣檄告悛頑凶敢有弗悛屠其宗銷兵鑄鐵耕以農生民有如魚脫罿拔諸水火哺飱饔凶徒內蝕據崇墉乘其不備襲且攻君氣吞賊兵力窮長蛟在陸制蟻蟲仰天叱月月為東義不負國徇以躬遊魂上天化白虹下壓賊營賊眼曚大軍四來若雷舂析骸解項殱彘􅚧死事上聞帝哀恫贈官復戶頒爵封生氣凛然薄蒼穹生為偉人死則忠位卑壽嗇名譽豐脫令耆艾登侯公死而無聞鬼猶懵取彼棄此孰纎洪史臣焯行鎮幽宫名與天地期無終王圭死事本末劉楚嗚呼義士不可得見矣若謝彬所言廣水都巡之死於戰也豈不悲哉其言曰當至正辛卯春彬為行販往淮河時道路猶無他梗其夏汝穎變始作民則大恐明年壬辰河南省右丞某奉旨總兵出捕至隨州時應山民已先降賊官屬解散獨廣水鎮以王君故猶固守不下君聞右丞兵至即馳謁言事右丞竒之署參軍事俾復應山旋以功攝令久之冦日滋而右丞所總兵遲疑不進民困供饋君凡三上書請急進攻毋玩以養寇右丞怒曰若書生寧能戰乎吾令若率先鋒得毋怯乎君曰誠得效分寸死不憾即受命領驍勇以前不數日連破賊圍猶奮擊不休己而寇乘其後右丞兵隔絶君引兵將向德安未至聞德安已陷衆皆潰君獨與麾下數百人投孝感之新店會劉禹章吳思明等方舉義聞君以省兵至大喜迎之君知衆心堅可與共事即率其衆及商民之來附者凡數千人屯新店掘塹植柵令老弱運粟聚堡中出與賊首黃思明大戰於蓮花寨破之拔其小寨凡一十九所折馘以千百計得其輜重以歸兵勢益振明日冦悉衆來攻君退保新店冦圍之逾月糧且盡援兵終不至君知不能守顧謂劉吳曰事急矣奈何設有不利必不可為不義屈趣出戰果為賊所敗君與劉禹章俱被執君罵不絶口賊欲殺之劉曰彼參軍爾我乃大將盍殺我君奮呼曰我奉河南省右丞軍檄出征逆賊不幸勢窮為賊所執當殺我毋害劉也亂兵遂斃君於城門下劉被刳吳以千餘人遁五公山賊追及之猶格戰數十合死傷過半終不屈自刎死時某月某日也彬田野質實人與君同里其兵敗而死親見之其言宜可信君既死彬獨與其徒渡江得間逸歸時為鄉人道其事云嗚呼圭亦真義士哉記泰定丁卯間余侍先祖翁側見君以諸生來謁體幹魁偉冠帶翼然執禮卑遜進問起居外徐出所業懷袖間鞠跽從傍請益時翁年已七十餘為之色笑辨説亹亹傾竭至日晏猶不退時余年尚幼亦不知其所謂何者也比稍長知就學君亦出遊臨川拜吳先生以歸而先祖不可作矣君過門哭奠甚哀退與先君敘通家禮談功名事磊磊落落如掌股間物益浩然四方志矣及遊淮漢間聲名籍甚余讀書山中追思為童子相見時事為之惘然後過武昌見威順王獻黃鶴樓賦嘗憾不得讀其文繼聞其從應山令魏進入京師伏闕言世事又恨不得見其書最後聞以薦者為應山校官而調廣水都巡也吾固疑其或有所不屑為孰知遭逢不淑竟終於是哉嗟乎天下諱言兵久矣圭以一介書生負竒氣常易視天下事至言兵忤時相意幾致危蹙不勝憤憤赤手奮窮旅中邂逅知己以烏合之衆轉戰百萬之冦卒以援絶力窮死酬其言悲哉嚮使右丞録其言惜其微忠置之幕下以盡其一日之長不使冒敵境或後先出援相與為犄角則成敗槩未可知不幸君以孤軍失援死而右丞亦以怠傲覆敗豈非天哉若劉吳之於君非有平日之素與名位之定也徒以彼此急義一旦邂逅於顛沛之頃卒能爭死以正名殺身以就義若素所感切而安於撫循者豈非義之所在固當然歟而或者不察至事僨勢去始扼腕撫髀謂天下無義士至詆儒為不知兵豈其然哉君字方剛其弟果以余為通家請書其事義不得辭敬述而論之俾歸以附其家傳云明文海卷四百六十
