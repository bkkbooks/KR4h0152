body:
  text: 明文海巻四百六十一餘姚黄宗羲編墓文三十三忠義崇徳李君墓誌銘舒芬崇徳死予瘡甚不能走哭哭於家慟侍者曰子亦弱喘餘魂其毋傷哉不知予於崇徳不能不慟者有穴焉以諌死死杖下一也死慶夀僧房惟一二僕之手二也予輩厚善者皆不能與歛事微蔣虞中往視則棺不可盖三也始車駕議以三月十九警道東巡視岱宗厯徐揚抵南京下蘇州徑浙江浮漢沔經大河喬嶽且遍中土繁麗人情洶洶懼變叵測大臣多從㬰之予鄉同年夏考功萬儀制館中汪子宿輩約風諸小臣連章乞留十五日早報免朝予率館中同年先入疏兵部黄伯固陸汝亨論時政疏亦入時百司皆懷疏集闕下太窣陸公沮之時夏于中萬汝信過予扼腕恨予因邀陳太常至俱酌之酒贊之云匹夫之志今其可敓三子遂于是夕在吾寓連疏入且告諸同志明日吏部張元承等刑部陸天爵等疏俱入明日禮部姜夢賔等兵部孫鳴和等行人司余伯獻等俱疏入又有太醫院醫士徐鏊以醫諌車駕遂不出乃二十日癸丑天威震怒以黄鞏陸震夏良勝萬潮陳九川徐鏊下錦衣衛獄以舒芬張衍慶姜龍孫鳯陸俸等百有七人跪午門外五日行人司疏不報以通政司壅之也諸君待罪離次至二十二日得報命余廷瓚等下獄明日同黄鞏等六人亦跪午門外五日梏拲工部林以乗等三人大理寺周子厚等十人亦連疏入明日俱下之獄亦梏拲跪五日復有指揮張英大言車駕出不利乃肉袒㦸刃於胸死諫數日天色隂霾京師震駭公卿避唾罵瓦礫擲晨夕出入不敢待别色其尤顯者減去辦事官吏易箱笈以包服在昏暗中若異流奸無所容益謀蔽惑命禮部示禁一槩言事者通政司遂不受疏又有貢諛參劾各屬為妄言者天威遂不可霽二十五日戊午命舒芬等百有七人俱午門前杖三十為首調外任餘罰俸六箇月四月十六日己卯是夕月食命黄鞏等六人午門前俱去衣杖五十徐鏊邊逺充軍其餘為民林大輅周敘余廷瓚杖五十降三級調外任其餘杖四十降二級時死杖下者員外陸汝亨主事劉宗夏何孟循評事林質夫照磨劉珏行人司副余伯獻行人孟子範劉平甫李徳卿詹敬之與吾崇徳蓋十有一人而傷夷未起者尚多也夫首義者于中汝信子宿與予四五人而已使予能為太窣沮則于中汝信之疏且緩矣諸公之氣亦衰矣安得此舉哉致十一人慘死而我獲生四也是舉也雖士氣少振奸謀少沮而國體亦少損五也自正徳戊辰九月我與崇徳同投文南京禮部明年同入國子監驢背一話遂相許資麗澤而朝夕見者三年情又宻昨丁丑又同年為進士戊寅春大喪朝夕哭未畢議往視山陵予度其且至宣府明日上封事崇徳過予曰夜間報似非禮之禮㣲子莫能辯析可但己乎予告以疏早入矣崇徳欣然曰適奉慰時與羣可語者料此義須君發之果然人將服我知人也子視我真知巳耶是同年相知莫深於崇徳六也嗚呼予哭崇徳死有此六者烏能不慟哉崇徳以四月二十四日死其家人將奉柩歸𦵏予南竄限又急以五月三日舁疾登舟大行潘宗魯使人來曰崇徳之知惟子深墓亦惟子銘也嗚呼其奚辭崇徳諱紹賢李姓先世巢縣人以戎籍編泗盱眙曽祖宗祖華父本有隐徳尤好士樂賢母黎氏繼母曹氏此崇徳系也崇徳生成化辛丑年十有一月七日㓜穎異不羣凡兒及冠有大志負時名與夫孝友稱於族豈弟稱於鄉義理稱於友文章稱於主司幹局稱於觀政予不暇詳姑以其同朝一二事利害詔諸後來君為進士觀政戸部未浹旬部銀餉邊例有火耗羡餘在自好者猶假義取之君悉籍付有司且盡以其費還部夫以寒素士偶值數百金之利畧不誘去其器何如耶授行人月餘齎孝貞純皇后遺詔往江北至徐州開讀徐因水次倉守以羣閹勢焰熏炙率吏視州衞職官兹偃然席班首君立詔左從容令去其席撝不得與職官同禮俾帖然去有不怒而威者矣比縉紳逮繫多以迕此輩君畧無忌直奴視之而亦無能中傷蓋禮度辨析自足服其心耳予嘗評君學足以立政才足以濟時義足以存孤謀足以奪人之志而深沉大度好惡不形尤人所難及惜乎仕未久政未及見其大行耳斯人也而止於斯耶銘曰孰不有生貴踐其形孰不有死貴全其體汝形之踐道通常變汝體之全未喪其元忠犯人主鼓兹進旅禮服閹人囓伏不狺汝没汝寜汝墓我銘汝後有立有需秩及孫少卿墓表崔銑正徳六年蜀盜冦漢中畧陽漢中間道也都御史藍公章集省臺議畧陽知縣嚴順懦扶風知縣孫璽毅而多知可使遂檄璽住城畧陽扶風君既至畧陽將下令順恥之教邑人賂扶風君金求勿城扶風君不聽日周行相地勢布民築之期一月成城未届期蜀盜卒至城三面成東門觀堵始立城中兵適調他所嚴順曰城必不可守己曷亡扶風君又不聽順故令也城中人聞之譁欲亡扶風君拔佩刀斫坐杌曰敢言亡者如杌乃盡出城中弓矢刄令士賈輿𨽻人持之登城礌石積城上如阜水沃氊披之障矢甲統十人總甲統五十人總甲五十人官與士統之曰令爾守南城曰簿爾守北城曰典史爾守西城曰東城未堅惟予守曰爾士爾甲賊如陷城戮爾父子妻爾女火爾室蕩爾蓄爾寜勿傷心義生勇勇則無敵曰凡吾官存亡視城民胡可棄天子命吏勿奔曰爾士爾甲晝傳食夜張火鳴柝爾甲執扇傳命斷者刑舟人為令發篋上舟獲之割舟人耳鼻以狥閲三日賊弗克攻欲去㑹賊執告急人殺之發公移知城中窘悉賊衆環攻之攻東城自辰至晡不下有徤賊戴木案趨城下礌石下破腦而死己而順奔賊陷南城入執扶風君扶風君罵賊賊臠殺之七月十四日也賊大掠三日去順渡江還牘報曰與扶風知縣同奔而溺水蕩扶風知縣尸都御史怒責求尸亟順大窘與簿謀取江濱一尸棺之還其鄉其兄弟暨子暨族人啟視之多髥而碩體非扶風君也乃走京師投匭辨事下御史王廷相治乃得實奏上制贈光禄寺少卿賜祭廕子紹卿國子生於乎順非宿憾君惟恥其無能語曰忮心慘於戈小忿必敗大謀扶風君死信烈矣漢中非荒裔也猶待辨而核否則上下罔於順而不知自蜀盜起至扶風君死時己數年是時薊盜冦中域桃源盜冦江西邉境數擾值世久平文臣短於謀武臣短於勇長吏習於奔初棗強陷民於城下得尸肘繫縣印知為令段豸也朝廷創聞死事者嘉之贈太僕少卿廕子為錦衣百户世襲己而予所聞上蔡令霍恩西平令王佐裕倅郁采與扶風君事甚偉夫廹而死偶而死畏而死激亢而死彼猶有驅之也志定矣功修於素節堅於危而安真丈夫哉扶風君字廷信山西代州人明春秋深慕荀息之為人少舉於鄉初令諸城再令扶風有治績死時年四十七其兄璒弟珂從子太史紹先紹祖子紹卿具衣冠招魂𦵏於代州東門外詹君墓表張岳武皇之將巡幸尚内畏兩宫外憚大臣臺諫有時騎馬至東西華門閽者伏馬前諫不可為回轡者屢矣丁丑秋七月始馳一騎從近幸數人徑至南海子都下洶洶部院臺諫詣海子跪門請回蹕上遣從者慰遣示以回期至期衆又欲往大臣有為鎮静之説者揚言古天子以四時巡狩况南海子邇京師祖宗時常臨幸上一出即洶洶如是徒揺人心不如無往衆乃止是年冬幸宣府明年幸大同又幸榆林則莫敢有諫止者是時宸濠逆械己成以重賄賂左右嬖近蠱上南幸傳者謂濠將以輕舟伏甲卒迎駕江上變且不測己卯春三月戒行有日吏禮兵刑四部及翰林院先具疏列名詣闕下伏留甚懇上怒罰令跪門五日已而行人司繼之大理寺繼之工部主事三人又繼之上愈怒禠繼上疏者衣冠械手足下獄亦罰跪四月九日杖之於獄中越五日又杖於闕下余時備員行人司同僚上疏者二十人其七人杖死而詹君敬之與焉敬之為人開爽磊落長身羙鬚髥熟於世故每論天下事掀鬚抵掌明於丹青其科目資望又獨先同僚衆莫不推服之聞其死尤為之痛悼初上頻歲巡幸無諫者而南巡即羣伏闕死諫頗為感動故自敬之輩死後竟不言南巡事己而宸濠逆械發覺詔遣勲戚重臣往鞫之濠遂發兵反上震怒召大臣議出師致討而濠己就擒江西當是時都城内外籍籍言幸不南巡如宸濠江上謀逆或四方莫知乗輿所在訛言相煽揺其為變豈可遽弭哉今上即位首詔贈敬之與同死者皆監察御史蓋以未官言路而死諫故卒以所能盡職者官其志云父母妻皆贈如敬之官賜祭録一子入太學皆異數也國家養士百五六十年祖宗列聖優假成就始終正徳間權姦繼起用事士大夫屢起與之抗或列名或獨諍雖貶黜死亡而氣不少挫最後變起宗藩連結左右嬖近之臣謀深而事秘非諸公舍一死以諫人心蓋岌岌矣古人有曲突徙薪之喻若敬之之死所謂繫天下安危成敗非耶敬之死時年四十四其再從叔父瀚方為刑部主事亦以諫受杖幸不死為經紀其喪主事君今為浙江左布政而敬之所録嗣子曰貞亦授南京光禄寺署丞謂余與敬之同官又同事知其狀最詳以墓道之表見屬嗚呼敬之生平為人故太史石潭汪公銘之詳矣余獨懼後世謂敬之止於一節死諫而不知其所繫天下安危成敗有如是者故特為書之使後尚有述焉明文海巻四百六十一
