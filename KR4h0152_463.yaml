body:
  text: 明文海卷四百六十三餘姚黃宗羲編墓文三十五忠義周迹山墓志銘王慎中士有奮微起陋立人本朝沾一命之寄無當世之責而懷憂世之心無正君之任而愧衮職之闕亦其志然也然而慮過其身之所居言踰其位之所守則有思出其位行越其思之説出而攻之慮過其身慮未遂而身逢其殃言踰其位言不行而位貽其危則有徒喪其身無益於君之説羣而誚之夫使身違其責而皆逃其憂位非其任而並諱其言猶有當責受任者也若夫畏逢殃為不濟而全其身懼貽危為無禆而固其位則是莫有憂與言之者矣彼為思出其位無益於君之説者豈誠其心之所然哉隂持全身固位之私計而陽為是説以自解脫耳議論不明於世而節義不立於朝其説蓋由此夫君仕為户部主事在朝六品官耳督儲視𣙜有可舉之職會計當出納平防範謹勾稽詳君既能其職矣而憂盛世危聖主蒿目怛中常若一日不能安食而居於位者其志然也君以言獲罪偶斃杖下其心固能不悔也君天也安所逃之受死如受命為東西南北之行亦事之所不得逃者也而余有以知君之無悔者君居家孝與兄弟友與人交信而能敬為户部始監草場繼督德州倉儲後𣙜崇文門商稅皆利權易染君絶無所近如置玉涅中漸而不入其白皓如也菲衣糲食挾册吟誦不安舊聞思廣所業於世之賢人志士口講神注雖不能盡交意常以為向而謹趨捨慎操術卓然必為君子矣其應詔一疏冀以微誠感悟非為求死也主上怒其越職過直薄撻示警非欲其死也而君不幸死蓋命也使其杖而不死其憂當益切其言且益多必不為少挫以敗其志或守封疆備障圉患至禍及必能以身徇職不茍免以幸其身此余所以知君之心而斷其無悔於當日之死也君姓周名天佐字宇弼泉州晉江人嘉靖乙未進士娶吳氏女三人以兄天正之子日暹為後上疏逮杖之日為辛丑五月六日下詔獄兩夕卒五月八日也距生正德辛未二月一日為年三十一耳其仕不久其年不永其學專鋭而方進其行勤修而日敏進而未見其止勉而不及至於成獨其志皎然可知也憶君喪歸時余友人毗陵唐君順之寓書於余曰不可使周君無傳子以文名世周君又鄉人也子必勉之余奉唐君之教不敢失而君之父封主事公琅以狀委余曰貧不能葬亡子賴諸當路之賻與縉紳之遺買地後市之里寶蓋山之麓穿壙堅密將以是嵗甲辰十一月十五日葬矣願有志余不敢辭豫惟唐君之不欲君無傳也亦偉其言而哀其死也余志君之墓獨論其志詳焉庶世之求君者不徒偉其一疏而哀其一死也然以余文之陋如此知不足副唐君貽書相勉之意而有孤封主事公之託矣其何以慰君於地下耶銘曰以為如是而可以死耶非君憂主之意以為不可以死耶亦所以明為臣之義以一死為足以傳耶則君之好修不止於是以為不足傳耶則其節已昭然而若此張毅齋墓表王慎中議國之大事而處其禍之必至幸則其議行而國享其安而其處之也為不中之言不幸則事及於禍而其言中蒙國之大難而矢其身之必捐幸則其難濟而身獲其利而其矢之也為不踐之盟不幸則身及於難而其盟踐前識足以決議而節不副竒節足以徇身而識不豫此力之不可兩能者也有兩能者矣職及於議而不當蒙難之役則思復濟以死而無由身從於難而不在揆議之列則欲先關其忠而不得此又其事之不必兼盡者也若夫始及於議卒蒙其難至於言中而盟踐其亦仕者之不幸矣以其不為徒死而可以有傳於世則人猶將幸之仕於人國者至以此幸其傳亦可悲夫其人雖幸而其國有大不幸由其國敗君出故彼有以著節而成其名也國大不幸而死者以其自不幸為人幸之死者有知決不以人之幸自幸矣身之不幸而大幸在國卓然效死之節獨以國完君復而掩其名使人不得以其傳幸之於不幸之中宜若又不幸焉惟其大幸之有所存死者之心宜不以為不幸也正統己巳嵗值額森犯塞權璫王振實倡親征之計以誤廟謀車駕戒發備百官以從而刑部之屬以主事張公塘應詔公首率同曹具疏極陳萬乘不可輕動而深斥近姦獻計之非其言甚危卒不見省則慷慨從行不處家事而去家人固問曰君出與出君入與入何問焉師次居庸時倉卒出師士無宿偹而紀律尤不整公策其必敗三疏請還蹕為權璫所阻不報及土木而難作車駕蒙塵公誓不獨入遂死之已而犬羊悔禍化逆為順羣執羈絏御銜橛奉車駕還都鑾鈴不爽節鋈靷無脫者而國勢尊鞏曽靡障陴戍壘之隳蓋國之大幸也嗟乎公始議見沮而後六師輕出師已出而再議見沮而後輕入邊地方事之未然其慮審而憂深而言絀於不省使晉臣慶鄭懷違諫廢卜之怨且快於君止以實其言而公之在仕黽勉職業守潔而行髙仕十三年猶為主事而髙官厚祿以寵於朝者何限使衛之士大夫當之必有使鶴之詬公獨踐必死之盟畢其身以殉所事之重不為茍遁以求全嗚呼可謂烈矣然亦何其不幸也以彼其烈而人之幸公而傳之者當與庾珉王雋辛賔李若水同其傳然今之講慕公者自不得以與四人者同談而他人之記者亦不當與四人者同書則以國完君復列其事無所當而名因為之掩也公之存不為晉臣衛人之詬而一意於國死而不泯誠知國完君復方且慊其期於安國之本懷與存君之初志烏以名不得列於昔之死君者之間為不幸哉噫此公之心也公沒百年某始從公之族孫鄮西君謙得聞其事相與歔欷慨歎想見其烈而豫又有感也豫嘗觀國朝故事竊窺英廟實録載扈從死事之臣已遺公名所謂事烈而其名掩為不得與昔之死君者同書耳其事固當書也孰知其身死而事不存已不得在史氏記則其名殆將沒矣此吾黨之所宜圖也於是張君出故都憲王節齋公小傳以示豫曰傳以藏之家墓上有石不可以不識也蓋公沒既久而其子撫州推官圭始斂衣冠而葬焉濁墨形魄公既決棄不復顧懷齒髮骼胔化為朔陲之驚塵以從飄風其混於砂礫委蔓草而啖烏鳶皆非公所恨惜其魂氣之清英昭爽必且飛揚悽愴眷故都而棲舊里附衣冠之潔莊而常遨遊於鄮山甬水之側則亦何以異於全歸而深藏於此年運而往木拱且抱虆葛施石而狐兔穴室牧豎樵子頑懵不靈將有箕踞嘷跳於其上而睨草木以為薪槱之資胡以嚴往烈而象幽光寧獨其家孫子之戚且愧而己惟刻詞於石以表於其阡庶其免夫豫謂公之魂氣既常棲遊於茲阡土魍木夔猶知呵庇崇護而不敢狎而永免於岡陀石泐之患然以其烈如此而事已不在史氏記才及百年而昧陋如某者非張君以告則莫由聞而藏衣冠之域又當絶去城郭在遼墟榛莽之間鄉里後生與四方之遊客有講古尚友之好者入其境登其山而不知有斯人之墓忽焉過之而不致其肅則無以告之者之罪也至於時移事改此石幸不顛踣或不幸而仆猶不為風霜之所剝蝕訪古之士或得之於蒙薈蔽翳之中模而傳之復出於人間雖史氏所不記而一旦震耀喧詫播為竒聞異迹卒可以補其遺而終以不歿於後則吾黨之所圖庶不為無益於是為撮其事而論其意書以授鄮西君使歸刻焉而表於其墓王東華墓志銘羅洪先天其有意斯世乎必生任事之人維持而倡作之生平所期率汲汲於吾身是非利害之外幸而學焉斯聖賢其歸也不然意氣激發猶當雄偉豪傑振越一世而天下治亂恆必賴之吾嘗持以定士品而莫有信其然者往年嘗晤東華王子袁御醫所當是時王子為進士年才弱冠色潔白若氷雪竟日不一接語後十四年王子棄廣東兵備僉事東歸過余慨然身相許為語在兵科時募兵山東曲折與兵備嶺南諸事甚悉其後數以書問又三年為丙辰倭擾海上漸入溫官府熟視不知計王子主族議練鄉兵待之其年十月倭渡南溪入蒲洲殱之於上金斬首十有六擒十四人拔其脅虜八十人還之鄉明年復殱於梅頭斬七首自是倭畏永嘉場不敢犯永嘉場王子之所居也戊午四月六日倭至梅頭王子伯祖散官沛死之王子憤曰所不能戮力復沛讎者有如此海次日斬二首擒七人而他苜數千方圍樂清十四日王子納其家郡城十九日兵備袁君祖庚來告急遂移袁寧村以便策應其日參將張鈇來附是時倭圍郡甚急袁請援以張並進王子許之凌晨簡輕鋭從間道往日昃伏起金嶴遂遇害當變作時手猶射殺數人張兵相視甚邇無一救者倭以鄉兵少之不知為王子也總督胡公宗憲上死事於朝詔贈太僕寺少卿立祠郡城廕子世襲百户已而當道聞狀為之黜袁罪張以伸王子則何及矣嗚呼當王子為兵科為兵憲以兵死死職也今死溫何哉夫金不彈雀尸不代庖此易知也出門反顧誰則無情且儒者之論多主委任權力而敵愾弭亂率諉武人即任職者猶且以此藉口彼肯營其所不及乎士大夫居鄉豢養驕惰臨事則髙拱緩頰譙責不至議者方以持重歸之王子計不出此而所汲汲乃在吾身是非利害之外嗚呼王子其有大不容已者乎或言王子有母在郡郡圍則母危王子殆死母也嗚呼是或然矣使無母其遂已乎王子其有大不容已者乎王子既殯西墩其子如圭自為狀走使不逺數千里索余為銘且曰先君靡日不言先生幸卒憐之余持書泣曰余後死矣忍不為銘按狀王子名德字汝修少英異有大志舉丁酉鄉試戊戌第進士庚子授東昌推官善治獄巡撫曽公銑壯其人已而見才弱冠乃更改容嘗署髙唐民病汲開北門便之鑿土得石石文有曰北門開王德來人語為神辛丑臨清外城成以督工升俸一級六月丁父憂丁未補大名會河南盜掠湖廣貢金衆疑在滑且指四人姓名為證有詔逮捕王子聞之自府趨滑驗狀無實執弗與河南將上奏未幾得真盜京師遂釋四人滑立生祠祀焉自登第至是十年不遷不知榮進比滿考會選臺諫乃與沈君束堅不赴考為當道所亷授户科給事中二旬上疏言時政所忌上不加罪旋主光祿罷無名費財三月省四萬餘金庚戌北敵入冦條陳十餘事首議開北門納奔民平通太二倉米價活諸餓者夜半遣中官至家傳旨允之無何募兵山東軍資乏懼不足數則假便調簡民兵直以償之易其名曰義勇兵始大集是時詔下特舉才望格於議出為廣東按察僉事兵備嶺南至則以身率海兵雕勦村堡動至數百十人飲食兵器呼吸立具蠻寨惴惴莫測次第就降會英德民兵盜庫金為海兵所獲知縣吳希曽畏罪反坐海兵爭之不得遂引疾棄官不悅者劾其擅違竟罷職異時王子所語募兵與兵備即此兩事此兩事在王子尤不甚竒其居官亷慎過於處子執古喪禮不眩時俗在諌垣嵗餘凡四十疏詞極剛懇雖至忤人而其人喜怒又足以張禍福曽不委曲少徇其意生平所期惟知進則澤被天下退則福及一鄉以必不負此心為主蓋有人視以為無益而己在所必為人或以為可緩而已不容以朝夕者惟其氣極憤烈而和易藹然出於天性赤色厲聲未嘗或及僮僕嗚呼是果可以死乎王子自五代世居英橋宋有諱惠者以長厚望於鄉髙祖育曽祖􅓨祖鐲父浥號橘泉以王子貴贈文林郎直𨽻大名府推官母林氏封太孺人娶邵氏封孺人子二長如圭府學生次汝璧襲百户女四長適禮部儒士張鳴球次許項光祖二尚幼王子生正德丁丑閏十二月十二日午時卒嘉靖戊午四月二十日申時年才四十二銘曰孰不愛親而殺其身徴之聖人聖人曰成仁孰不愛已而輕其死告之天子天子曰勤事情之所激嘗恐罔生謂非天與其成則既見之躬行事之可為尚不止此惟其心有不已夫是謂之志士何孟循墓志銘羅洪先武皇帝朝瑾彬相繼用事縉紳往往以諫死議者以為於事無益徒纍聖德非人臣所宜或謂死者多緣意氣鼓動遭觸不幸實非得已自兩説出縉紳競慕持重以脫禍人亦莫或非之於乎若何孟循之死彼又何説哉彬方導上南巡禱祠名山取道魯衛淮徐江漢中土騷沸而是時寧濠才謀以侍子入朝倚彬內應比詔下彬幸得便窺伺乃為危言撼衆懼其中沮衆亦相視搖手戒莫敢出何語甚則以諛言媚彬彬氣益盛兵部郎中黃鞏翰林修撰舒芬疏入諸曹稍稍踵之武皇帝怒罪鞏等彬復揚言鞏旦夕且死冀以脅衆孟循業已隨衆入疏力言淫祀無補敗亂辭極愷切且曰萬一宗藩藉口奉迎潛懷不軌則福未降而禍已萌蓋直指濠不諱也彬畏事泄不以進御孟循性復謹默恥矜伐人亦未有知者至是慮衆為彬所脅又以鞏罪叵測復與同官林大輅蔣山卿乞自今罷巡幸勿為左右姦佞蒙蔽鞏等無罪願特寬宥毋使後世有殺諫臣名不爾臣與同死彬既欲杜衆口聞是言愈自懼則更四出機穽既下孟循等於獄隂使衛卒多方拷之復嗾其黨指劾言者懷姦訕上無人臣禮武皇帝信之益大怒榜示朝堂毋得效尤遵等獄上被旨荷杖暴午門外五日杖五十罷遣彬自請視杖杖者素視賄為重輕至是密受彬意而賄又不至杖視他人嚴甚而循體故羸又憤所言不逹而瘡潰骨靡不可復療越二日竟卒正德已卯四月十九日也邸舍獨僮奴何安一人當草疏時安覺之前持哭曰主君縱不自計獨不念老親幼子且今又垂空囊耶孟循執筆從容曰無多言歸見大人為謝萬死罪兒子令勿廢學足矣草疏已書託鄉人太僕卿周金編修陳沂後事語不少亂蓋是時一子世守方九嵗孟循生成化丙午二月十五日年止三十四孟循既卒南巡議亦竟寢嗚呼若是者果不幸遭觸耶果無益於事否耶孟循自幼無他好垢衣糲食不見顔色性故寡合不能與富人遊父嘗令學賈心厭之願去賈為儒或言祿命不利則憤曰儒固有利不利耶正德癸酉舉鄉試甲戌舉進士吏部尚書陸公完聞其名延為子弟師未幾當試臺諫獨引疾弗出曰吾不可資人以進丙子始拜工部營繕主事明年𣙜木荆南故事多昵姦胥踵弊承訛嵗增羡以自潤甚則算及尋丈商人苦𣙜過於虓虎孟循更置一切以亷率之無何出羡千金左右勸以獻績怒斥之曰來者將何繼耶乃下令商自百金減算三之一風水敗資弗算以羡足常數但令相等入算者手實數自摯之藏郡帑數日會所入數以等減算其或越貨敗令及私謁者沒入之威惠並舉至今守為𣙜令比去𣙜行李蕭然卒之日貧不能殮待賻而後棺也嗚呼人莫重於愛生所資以奉生者勢與利也非位不足以據勢而利之所在必貨賄而後通二者不可驟至而身之不存又莫得以享其成夫然後死生旦暮之際不得不繫於情矣公於臺諫司𣙜若此是其處世真若飄風浮埃栩栩然無所仰藉故進可以遂志退可以逸躬此其素定有不俟決裂於臨變者而豈計其得己否耶人言南巡之諫惟户曹不與工曹三人外他皆聫署以進有避而不署署而不往往而復規避者問之曰吾親老也不然則曰未有後也於乎即使無二患矣自顧奉生之資有不盡享其能決裂於臨變乎即有不幸遭觸與孟循等幸使不死其竟無優劣矣乎此可以論孟循也孟循名遵其先吳江人洪武初以閭左徙江寧髙祖文廣曽祖澄祖瑄通星占厯數學天順間徴補天文生令通籍欽天監以季子鉞貴贈監察御史父鐸母王氏孟循被杖時鐸與家人墓祭歸有鳥悲鳴而前心異之比抵舍聞工部有以言獲罪者鐸長號曰遵死矣夫已而果然其素信於父母如此孟循以卒之年十二月二十四日葬江寧德安鄉梅山村之原又三年辛巳今上即位褒先朝死事臣誥贈孟循奉議大夫尚寶司卿封鐸如其官母與妻狄皆宜人遣官諭祭其家録世守為國子生又十六年丁酉應天府請於禮部起祠祀之而世守自刑部主事擢判臨江府為政有聲三女適嚴時泰金旦徐某皆士人世守二子應謙應豫又已漸長昔之逃死者泯泯焉爾於是人始以孟循之死為榮然不自知其見困於奉生則又安知死之榮辱與榮辱之所為辨也臨江使人言曰昔世守幼不能共大事致墓石有闕典幸有以惠之余嘗忿議者之言不逹於死者之心也因志墓備書之於乎聞者其毋以余言為無益也乎銘曰謂死為足重耶人之死不必如公謂死為不足重耶非公死不可以風有慕公者求其所以其榮與否在其後世陜西富平縣知縣定五王公墓志銘張同德萬厯癸卯七月十六日丑時富平令定五王公卒於詔獄再逾月喪歸於汴從子職方氏損伸卜葬於卒之明年三月十日則為公狀挾而過張子請志若銘張子覽狀悲曰余於富平公之卒也匪直為志士恫實深為世道悲世道汚隆關乎士氣今之士氣何如也自言利之臣得信其説中使採山𣙜市擁傳四出使者四出而百姓無寧業百姓無寧業而監司以及郡邑長吏多不得其職於是賢者蒙死守官以徇百姓出其身而犯不測駢首就獄前後相望士氣摧折無復振矣悲夫悲夫定五公者吾鄉所稱賢豪負意氣者也諱正志字淑明父諱中逵隆慶戊辰進士為黃縣令祖諱琇嘉靖癸未進士為名御史終官按察司副使世以清節著聞定五公舉萬厯戊戌進士初仕為陜西富平令公治富平要在抑豪右撫善良不能為人俯卭邑中權貴及大猾莫不心懾強項令不敢犯其孤弱則恃公袵席之不至阽於流亡是時中使奉命監礦稅者遍郡國天下騷然關中為虐尤甚富平部中羣聚亡賴及富人怨家多附中使翼姦而修睚眥豪奪民財以為利迫脅吏民榜笞爇刺體無完膚多至死者指富家某墓田某舍有礦金動即發屋椎埋以相煽嚇必收重賂乃舍去百姓絫息重足朝夕不能自保公盡捕部民從中使為姦者收治之姦民亦隂持縣事以求中公公持之益急中使怒望公愈深公奮袂曰縣令受命天子拊循百姓今吾百姓為奴儕所魚肉安用令為令在必不忍使百姓坐困今日之事令當其咎吾豈為一身惜而致天子失百姓心乃疏列中使大罪三大端指其貪利虐下違法欺君利歸羣小怨歸朝廷當明正其罪以慰人心疏上中使心悸乃誣訐公阻撓礦稅公遂得罪有旨遣緹騎械逮公公聞命怡然曰吾為百姓請命天子其濟百姓之福也得徼君之惠以布之下臣何敢言功不濟百姓之辜也余奉職以死亦且有辭以謝天下復何憾旨下之日兩臺監司及兩中使具在督撫謂緹騎曰械具姑少緩俟入都傅之公不可曰天威咫尺不違敢不伏辜且指兩中使罵曰奴儕虛辭枉上殘虐善類吾固不愛一死異日天心開悟奴儕無遺類矣抗首舉械具擊兩中使兩中使氣折而出既至都下榜之數十繫北司獄公日取羣書誦讀不輟左針右銘遍於壁户所著有定性諸説居二年竟以疾卒初公之赴獄也夢黃縣公招之去公不肯曰姑待之卒之兩月前公夢遊一神祠攝其魂覺而精爽迷散復就寢往索之乃蘇中備王某亦以事繫南司獄與公素未通姓名忽公以手劄通問王持之大痛五日後與公相繼卒公初病即與同繫者訣翌日竟不起豈其正直之氣歿為明神神固啓之耶公賦性孤介好為振厲之行少時早起適孰師所見遺錢於途不顧而去既舉孝亷家貧甚公事一亡所干謁郡守蘄州劉公知公貧適有豪家坐法劉公欲寬之則令持重資為公夀而私有請焉公遜謝卒不受也部使者及藩臬郡邑大夫莫不重公人有過輒面折亡所少容人皆憚公或稍引避公益喜自負以嚴見憚讀書至忠臣烈士即慷慨泣下心私嚮往之卒以是及禍距生嘉靖庚申十月二十四日卯時得年僅四十四娶楊氏無子從子惟佶為之嗣嗟嗟自古宦寺之禍至為慘酷陳蕃竇武躬總大政典禁兵卒不能祛除而及於難况其下者乎其罹禍曷可勝道哉或謂明哲保身當與時委蛇然志士發憤畢誠何所不勉夫中使虐熖方張當事者多選耎而不敢攖公豈不知言出禍隨顧露章發姦身當其怒雖其激昂峭直未必盡軌於中行然大節凛凛甘隕其軀以烈其名可不謂賢哉使公之説得行則天下礦稅之使不敢肆其暴而困敝之民亦得少息肩乃幽繫圜土愠衄以死世莫不憤公之寃而悲其志乃其論疏具在讀之勃勃有生氣公也其不沒矣銘曰寧剛而折寧隅而缺矯矯富平抗志砥節百年等死纎若鴻毛死而蹈義巍彼山髙烈操清風世德作配光於士林無沗厥位微軀易捐榮名是寶赫奕千秋以當夀考玄壤封之職方氏營之諫大夫銘之公實寧之後有作者於繹思徐太宰行狀陳子龍冡宰徐公者諱石麒字寶摩浙之嘉善人其族人有别居於南畿之青浦里者公就試焉補其邑弟子員故又為青浦人其世系具家乘不具祖曰畫泉公某考曰心虞公某皆有隱德以公貴纍贈至太子太保心虞公生三子公其仲也公少頴異心虞公愛之自授以經八嵗能通大義九嵗善屬文及稍長舉子業已傾其曹而公性倜儻羸秀多能顧沈冥天文樂律兵陳之書靡所不洞曉家日貧而嘯傲自得慨然有𢎞濟之志於科目泊如也至贈太保公沒服除始為諸生年三十餘矣居久之舉戊午應天鄉試舉之者忠端黃白安先生明年試禮部罷歸而同年生某歿於途公為製朋友之服經紀其喪甚至公復以女妻其遺孤同郡義之又三年壬戌成進士授工部營繕司主事司節慎庫國家水衡錢慮無不與中貴人相綴連前後管庫者或與交通共乾沒為國漏巵而是時逆奄賢初用事勢張甚屬視諸曹郎顧方欲得政與南司爭時時察郎署中賢才有聲者以禮下之茍當意即得美遷以示恩示重其所以羅致公者至再公方嚴自處不少顧奄始不悅當是時光考陵園未竣而奄方興三殿之役欲自以為功督責甚急帑藏不繼公纍疏陳便宜期於省浮費蘇積困奄既格不行而浚削無己每請公必以令甲折之故事每嵗納內員靴料至費縣官不資蠧至巨萬是奄賢欲以惜薪金錢借支己得請於上而公猶固持之遂大忤奄意大獄起楊左諸君子相繼瘐死坐贓纍千公之師黃忠端亦在繫時支蔓鈎連道路以目無不引避幸免而公獨首約同里為魏忠節公償所坐黃先生所受誣差少公獨為稱貸上輸冀出之若盧較事者以報奄奄深銜之益思所以中公而會戚畹王升等矯領賜塋葬金公疏發之下詔獄奄即屬升子國興造浮辭誣公冀反噬詔并訊公條列升父子罪狀甚著白奄不能絀事得解然猶罷公官以歸人尚為公危懼公曰我惟守正俟命耳何畏隨以太夫人喪廬居得免復命及先帝御極誅大憝召用諸去國者公與焉凡是時賜環起者無不立躋華要而公恬淡不競久之始補南祠部郎無何改吏部文選郎滿三載會乙亥當察京朝先帝知公亷正諭廷臣云留都去輦轂逺聲聞易混欲繩違舉過澄清流品必得端直之士主之已而特旨改公為考功郎主計典蓋異數也公感上知遇益自勵精别淑慝不徇親故一二有大援及負聲望者皆屏黜不少顧時南冡宰為建德鄭公大賢素重公可否無異故益得發舒而是嵗南計為從來所未有既而被斥者知其至公亦不能怨也舊例考功計事竣即擢京卿以敘勞時烏程當國惡公斥其私人託他故特勿豫久之始升尚寶卿尋轉應天府丞攝尹事尹事最劇而任者每自謂位列九卿不甚親細務如有司往往委事參佐公探擲鉤較不少懈使十餘吏抱牘左右決之無不精暢民翕然稱焉惟恐公不得真尹者京兆試士例丞主之南都士習囂公日率而紏虔訓誘之進其秀彥與之揖讓一二敗類者屏之郊遂會賔興公所取士異等十五人多得雋者一時以為盛事云公攝尹半載所興革利害不可悉數尤傳其振驛困一事天下郵傳多凋敝而江東尤要衝輶軒往來既不絶而諸臺使者吏卒軺傳徴發絡繹即無不虎冠豺聲奉符持牒斥叱驛吏如輿臺每班馬而釋之索重賄始去少不當意則箠擊之或斃道路故馬户之役最苦馬户者非素封之民則髙資商有司所檢報者也其人既不間牧圉而畏見吏勢必雇更無籍者代之此輩衣食其中往往與吏表裏而恫喝其主費無限故一麗此役無不破産南都空虛民資無滿數萬者職此故也公議以額設之糧官為募人牧馬供用可悉罷僉報遂列十二條或移御史臺或上請著為令又蠲尹所設紅船座價九百餘金以厚其糈復以二百金協濟江淮驛俾接應疾置抵驛下於是厯世童困之民咸慶更生而傳車亦無留滯之患矣戊寅春大司冦鄭公持法平以鑄局屯豆二事讞決失上意下於理鄭公海內耆德而上方震怒不測百寮趦趄無敢言者公適入賀元會因極言主上嚴行峻法上下不交漸成釜鬵故上天應之以災三時不雨大可省懼且清直大臣以執法頌繫上纍聖德疏上人咸為公危之時宰揣摹上旨擬用重典以懲言者越三日上御門畢忽召羣臣申飭大要以非不知司冦清而清固人臣分內事安可自恃析律執法今念其老姑釋之因戒諭羣工數百言皆上所口占越二日傳宣中外歡頌蓋國家故典鮮有於御門之日宣諭者即上所逮治大臣未有六日即釋去者天下咸仰先帝之明而嘆公格君之深也公自元年由廢籍起厯官在南十二年至是始召入拜左通政轉光祿卿上鋭意於治力崇節儉至有終身布蔬之諭而食監供具積習久概多浮汰中貴人每嬲之謂帝王家事大烏用書生屑屑較籌為公弗顧也釐奏諸冗食可罷者罷之可省者省之以成君德寬國用上悉嘉納焉晉通政使先是上雅尚綜核兼採聽聞布衣上書之路遊光友會之徒馳騁闕下叩銀臺門或獻策求用或有所告攻訐往往得售其説倒置無等主者遏之則噂􅊱反唇至挾持語不可忍公計此輩非可以勢格也日進其讒説者就其封章句駁而字比之析之以理繩之以法使窮於辨而悔生焉蓋洶洶而來俯首而去者十有七八矣其必不可曉諭者則移之各臺使自為理不輕以上聞也故自公作納言而告訐之風少息上亦不以此病公無何遷少司冦攝御史臺署部事時貫索恆滿公日夜閲積牘凡三月而出滯獄萬餘得活者無算至有以欵陳新甲事誤國者其人雖在禁自負得上心多奧援公立傅爰書遂至棄市海內快之晉大司寇蓋自陽羡再當國頗能推廣上意進一二舊德收物望然其人儻􅛅好諛其於君子陽浮慕之而小人以非道進者不能拒也以故天下日益亂而君子亦不能久於其位自公為納言少司寇時相君時致欵洽示接引公落落若勿知也者而會上欲廣輔弼召九卿以下面對公獨辭以疾於是上有所爰立有所嚴譴而天下咸以公淡於榮進相君亦稍稍知公薄之矣及公正位爽鳩未幾而有熊薑二給諌之事當是時方以邊警大嚴上甚憤怒而外庭浮薄之徒有江南北分黨之徒上微知之因出中旨諭羣下毋結黨而薑君埰上言黨非盛世所宜有不知陛下何所見而有此諭恐啓姦人窺伺端上震怒而熊君開元新從謫籍來極論時政微及元輔則上意已移而難大臣并豫杖下獄御史大夫劉公中丞金公咸以廷諍譴去公復繼之大要以國事至此奈何以喜怒塞言者路上弗聽公竟以此去國然臺省交章以為公老成不宜去上亦時時念公語諸大臣有總督本省之議議未定而西冦益亟公旦夕遣幸官偵探至廢寢興已知漸逼畿甸痛哭竟夜質明遂為文檄同志起義兵悉吳越之甲北首赴難題曰當哭文多不載不十日而鼎湖之問至矣公一慟垂絶絶粒者數日己而曰徒死無益當圖報仇然後見先帝於地下耳遂定繼嗣嫁二女悉遣姫媵厲必往之氣枕戈投袂履及於窒皇見者雖懦夫無不感動未旬日而𢎞光帝監國尋即位起公為右都御史旋晉冡宰是時南都草創天子恭默中貴人勳戚外鎮互相附麗政柄不一請託公行公單車就道幹僕不過三人至即居公署中門無私謁嶷然獨行其意諸司所呈無巨細必親自裁決或批駁再四務當乃止因條上七事一曰定官制以肅體統二曰慎破格以養名世三曰行久任以臻實效四曰慎名器以端士習五曰嚴起廢以維國法六曰明保舉以儲真才七曰交堂亷以銷朋黨又以年例之設所以佐計典之窮自更例轉為優升而優劣莫辨勸懲兩疑矣事雖報可而中所陳多忤權貴意及會推諸大寮惟核才品不徇方隅執政者益不懌啓事多格不行用人或以中旨不由部推而一二思躐要津者以公不滿其意齗齗如也推登極恩進階光祿大夫太子太保然公志己決一日朝罷有一中貴忽於衆中揖公曰公非大冡宰徐公耶曰然曰某有門生某令者才而賢可任公屬吏公有意乎某居中能為公地也公愕然拒之退而自念雖先朝閹寺極橫時亦無公薦人於朝堂者綱紀墮壞盡矣因上疏紏論留中不報己而推臺省年例當坐為藩臬者其人竟留用因上疏排公公遂謝病以歸在銓堂三月耳舟次京口見北事日迫復馳奏以前使不可恃宜再遣忠義大臣通和好約討賊而內修江淮守禦其惓惓不忘君國如此蓋自公歸而稗政益甚宵人盈朝國事遂無望矣公既歸嘉禾明年六月郡城破公自經廳事北楹是月二十有六日也公嗣子爾榖間關百計凡二十餘日始得入城負公尸置槥櫝中以出方當溽暑顔色如生鬚髯戟張凛然生氣忠義之士史册所載蓋豈誣哉公清髙絶俗其淡泊自處天性然也厯宦南都凡鹽豉米醖多取給於家轉而北也去家益逺則益自節儉凡官曹所餘長物遷轉之際無不因緣而公必襆被登車毫無膏潤自在繕部節省金錢數千用助殿工又耻居其名留餘後來者以尚璽攝太常餘帑千餘金攝京兆也羡盈萬金皆貯公藏勳卿典大官物例有所謂呈樣者公嚴絶之少司冦時郎官以差還者知公清嚴絶饋遺苐以一二方物託客以進公固辭客固請之公曰寧自為好官而候餉人者乎卒却之為尚璽也當嵗除騶役向舊銓署中取一竿供爆燭之用公訊所從來即立斥其人不復用其守嚴防密如此類也故通籍二十餘載厯清顯至統均而田園不滿數頃書史數千卷而己公樂易愛人溫藹贍於持論與人言娓娓移日不倦凡事紏煩難決者每以片言解令人爽然自失客至無論貴賤皆和顔接之毫髮之善靡不稱道下吏寒士才行可録而厄於無援者茍可引不遺餘力終不告人人亦有終身不知者故人皆以公為長者及與議正事或干以私又毅然不可犯也公既以傾身下士而士之真偽優劣恆一見決之無不衡當雖交滿天下然生平同德稱蘭石者莫過於御史大夫劉公宗周大中丞祁公彪佳左納言侯公洞曽考功郎夏公允彛今諸公皆與公相繼殉難即公之取友可知也己豫嘗私謂冡宰之德清嚴廣大俱不可偏廢而尤以規鑑為本即前輩多賢如徐公者鮮矣及公登用而事己不可為國運方頺善人無祿豈不信哉公性純孝以父心虞公不及祿養因自號虞求以志永思甲申有司採贈公隱德崇祀學宫公老矣為文以祭淚淫淫潰紙間猶孺子慕也事太夫人色飬偹至母族有以産來售者強買之既貴召其人各還之曰俾毋忘太夫人之德公兄弟三人素愛惟伯兄一子視如己生弟有女毁産嫁之常邀名師相祖墓云法仲不宜子當遷公謂季虞存曰我與若皆無子惟伯兄一子當遷與否俟伯兄主之遂卒不果此公逹命恭友之一端也公博學強識條貫經史七略九流類能洞徹尤長於國家典制諸司掌故文章古雅淵茂出入東京三國間章奏警健而婉懇至而辨故雖直言正辭每能回人主之意尺牘雋永可誦餘文斐然稱作者旁邃二氏之書亦為人道也公生於萬厯戊寅沒於𢎞光乙酉夀六十有八娶顧氏繼室馮氏皆有婦德俱贈一品夫人顧夫人生二子馮夫人生一子皆不育立族子爾榖柱臣為嗣事具公立後説嗟乎子龍安忍以狀公哉子龍少而辱知於公資拔奬致邁於等倫癸未之冬公以大司冦家居豫役於禾郡見世事傾蕩相與咨嗟公曰足下方壯當勉力事功我老矣若事不可為惟辦一死耳及公居冡司備員言路事無巨細罔弗諏詢時邪説充塞志不得行豫先為拂衣計公曰子既勇退我老人安可施施於六卿之上以自致狼跋哉行且休矣豫歸一月而公亦去國三吳淪覆豫行遁於野公三遣使貽書相勉不踰月而公殉難矣嗟乎子龍既不能輔公之志又不能從公以死其何以狀公哉苐以生平知已無踰公者而海內故老遺臣漸以凋喪子龍雖生晚幸稍習公今亦旦暮且死誠不忍無所紀述以沒公懿行故忘其無文不辭爾榖之請而編次其略以俟立言之君子明文海卷四百六十三
