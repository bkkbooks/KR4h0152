body:
  text: 明文海巻四百六十八餘姚黄宗羲編墓文四十列女華孺人墓表楊守陳無錫華烱之妻闕氏孺人卒塟于其里西夀山之原其二子塾基既求南京吏部侍郎王公㒜志諸幽矣復屬其族人進士珏請某表諸明珏乃余所論之秀還徃素習而請甚懇至故余不得而辭乃考志參其行狀取余所信者書之孺人世家蘇之常州父曰公澍母蔡氏也年十七而歸烱其舅素饒於貲方承二親撫四弟羣子姓公私事繁日不暇給孺人為冡婦佐其姑周旋於内不逆不怠事尊屬以恭處諸姑以謙日食不二味常服惟浣濯之衣未始作驕侈態及舅老而傳也孺人相烱無廢事饌賓加豐訓子彌篤御婢妾有法每授以織紝之事必身帥焉其姑有疾孺人侍之勞憊姑卒哭之過哀成疾久增劇醫禱弗效里人羣約禱于神祠孺人曰吾疾不可為矣毋以我故使彼妨農費財也亟遣子謝而止之既而聞其舅亦疾輒呼天以籲泣下沾巾鬰鬱不食而卒年纔五十有七時塾以納馬冠帶與基皆有子矣凡此皆志與狀之言也志又言孺人卒時其族謂孺人之行備矣葢節以壹惠而以賢孝稱之於是志之書題與為傳者皆如之獨余不能從之葢節以壹惠者周人之諡法也在禮生無爵則死無諡爵謂大夫以上也魯莊公誄縣賁父檀弓載之曰士之有誄自此始記失禮之由也後世士而私諡若陳文範陶靖節君子猶或議之而况婦人乎婦人惟從夫之爵而己諡惟后夫人得之雖大夫之妻未聞有諡而况士民之婦乎然則族稱孺人節以壹惠過矣宜余之不從也雖然孺人之行如余所書亦庶乎賢孝矣凡表婦人墓者其言有傳不傳而人之聞無聞繫焉使余言而不傳也則孺人安能有聞雖加以數字之諡徒自勤耳使余言而傳也雖不書諡而孺人之聞其有既乎繼母朱氏行狀史鑑繼母姓朱氏諱淑清嘉興秀水縣思賢鄉人也大父逹父忠母張氏正統十二年繼母年三十二矣歸先君為繼室先君家故多蠶其初收也以衣衾覆之晝夜程其寒煖之節不使有過過則有傷是為䕶種其初生也則以桃葉火炙之散其上候其蠕蠕而動濈濈而食然後以鵝羽拂之是為攤烏其既食也乃熾炭于筐之下并其四周剉桑葉如綿者而謹食之又上下抽畨晝夜巡視火不可烈葉不可缺火烈而葉缺則蠶飢而傷火致病之源也然又不可太緩緩則有漫漶不齊之患矣編絰曰蠶薦用以圍火恐其氣之散也束結曰葉墩用以承刀惡其聲之著也是為看火食三四日而眠眠則摘眠一二日而起起則餧是為初眠自初而之二自二而之三其法盡同而用力益勞為務益廣是為出火葢自此蠶離於火而葉不資於刀矣又四五日為大起大起為薙薙則分箔薙早則足傷而絲不光塋薙遲則氣蒸而蠶多濕疾又六七日為熟巧為登簇巧以熱葢曰貼巧騐其猶食者也簇以藁覆曰冐山濟其不及者也風雨而寒則貯火其下曰炙山晴煖則否三日而闢户曰亮山五日而去疾曰除托七日而采絸為落山矣凡蠶之性房宜卑卑則温蠶簇宜髙髙則爽又其收種時須在清明後榖雨前大起須在立夏前過此不宜也至於桑葉尤宜乾而忌濕少則布挹之多則箔晞之凡此成法而繼母獨得其要他人效者莫能及又能節其寒暖時其饑飽調其氣息嘗使先不踰時後不失期而舉得其宜一時任事諸女僕又相興起率勵咸精故其所收率倍常數傳者始而驚中而疑終而信也其後益加講求為法愈密所産益良前後幾二十年歲無敗者時咸謂吾家有養蠶術焉歲時得以充賦税供衣服佐婚嫁者葢不少也而禄命家之言又以先君始生之日為癸丑歲午月建己已午火為癸之財蠶命屬午死於巳繼母年月日皆為丙申其午與納音盡屬火故宜蠶云然徒委諸命不資人力非所以為訓也初繼母無子愛某如己生後側室生子曰鐸均其愛於鐸又聘其妹之女張氏為鐸婦先君卒鐸㓜繼母所以為鐸慮者無所不至也成化十九年三月二十八日卒夀六十八卜以是年十二月二十五日奉柩葬于小旬原從先君兆先君姓史名某字廷貴號桂軒世居蘇州吳江縣范隅鄉穆溪里先十有六年卒子男二人不肖某鐸孫男二永錫永齡孫女三曾孫男三嗚呼我繼母之殁不肖孤某不敢稱述先德惟是墓中之石宜有刻也謹掇其大者著於狀托立言君子以圖其不朽焉謹狀蕭孺人行狀羅玘孺人姓曾氏諱掌珠泰和長溪人處士彦威之女萬安夏雲簫莘夫先生之妻監察御史柯之母彦威父興甫興甫父祥卿莘夫之父為重山處士皆能以其家聲振於二縣中而彦威妻魏氏魏亦安成宗家内則世嫻故孺人生而柔慧夙成姆不能施其規矩教誨之益長而在閨學女事或時誦古書雖家人不能見其面姆以其女事示其宗親姝嫗博觀嘖嘆逹于䟽屬或以為式竟亦莫能如也既笄歸莘夫重山素方嚴姑劉氏亦欲端冡婦于其初備設諸難以為試曾則徐隨應之如水注地莫不釃布之姑大悦賀重山能為宗子得婦重山亦心幸老遺五穉脱有不幸可無戛羹憂正統丙寅疫鬼入室中姑劇又中重山亦劇又次第中家衆羣然呼呻門閾絶無履跡雞犬飛逸不知其處或曰歸可避也孺人曰咄吾骨可碎吾足不可移惟與莘夫約吾入侍女出掃除焚滌瘞吾出掃除焚滌瘞女入侍無間疫勢乃大熾不可為卒皆死凡南方諺禁疫喪哀哀且及哀者孺人曰烏有執舅姑之喪而不哀者乎哀如常斂殯葬雖草具亦粗以禮事既定所存惟重山所遺五穉暨孺人莘夫七人五穉於孺人叔也門戸狼籍不可支過者傷心孺人撫五穉叔或泫然而悲又忽而喜謂莘夫曰木摧折甚矣然根存猶可培也假我數年吾見其亭亭乎於是悉發篋實得布焉時五叔之寒温而製以為衣得繒綺簪珥焉量門閥之宜而委禽以婚得金錢焉資之贄師以學視其學成焉者而又資之以進取鷇呱呱在褓若弗子曰吾所愛何敢視舅所愛矧其無所怙恃一蹉跌何以為解拮据徬徨綢繆補苴越數十年迄今一縷一鈎之復實於箧而地之畆割入户者倍舊之二户之口升入縣籍者倍疫餘之十莘夫遂埒封君至推擇為長掌區税事五叔亦擁雄名嶄出邑里自能權子母為居積乃聚謀曰吾拊吾頭顱至吾脛踵居而廬出而騎坐而指使傭奴其吾能邪繄吾兄也盍以父視之亦吾嫂也盍以母視之兹猶總領日僕僕以佚吾吾奚以安曷若割而自食幸釋二人重負何如皆諾孺人不能奪然日猶為之㸃檢若初不懈人以兄父嫂母謡之君子以為確論子三人伯升文仲御史季叔廷皆遣學進士業御史登𢎞治癸丑髙第入翰林為庶吉士立臺三年最典恩封以月日計乃兹四月二十二日得家報白函疑焉剥之丙辰十二月十八日孺人殁此訃也年七十有三御史請奔歸治喪且謀諸伯季告先生率民逸民安民懐民用民表葢孺人孫也將以某年某月某日奉葬孺人于縣龍塘山之源瀕行玘比縣人也同逰于西涯先生之門又嘗同院徃臨弔御史泣謂曰人有言與西涯先生同世而不得一言以為重是自藏也况幸遊其門而不得一言於其父母是藏父母也自藏可藏父母不可先生忍藏吾母乎然吾母之行先生不知也今吾昏憒不能一二數數一二子亦必能之吾當執是請幸賜之銘與殞吾身以報吾母有間矣玘哀之不能辭也謹狀嫡母苖宜人墓誌銘徐渭宜人姓苖氏雲南澂江府江川縣之里人也父某公諱有文雲南府廣狼衛百戸某之弟為澂江府諸生羙丰姿性聰敏善琴娶左衛人女禇氏太君生宜人有文公年二十一病死時渭府君己舉於貴久之始拜巨津知州抵滇陽驛所與俱童宜人既道病死殯雲南之歸化寺中而巨津故𨽻麗江土官府不可居時王先生之尊公諱理者適為兵備僉事按雲南於府君為中表兄弟乃始檄府君歴攝嵩明鎮南潞南江川禄豐三泊諸州縣而時以長兄淮取俸於麗道遇宜人姪佐旅語及宜人府君稍以媒徃不入其後府君攝江川佐又為太君訟其母家負嫁時所與田徳府君而太君母范有妹夫楊武者家雲南為千戸徙太君與宜人其家楊既富人公復有屯田在嵩明屬其税於府君因憶徃年佐所及宜人事遂成之宜人乃歸府君宜人寡六年而有佐語又六年而嫁其始以守自誓欲不嫁太君又憤其宗人當始嫁宜人時利婿家財縱嫁亦不令其在鄉今更利渭府君征那大功當遷轉其地又家籍近在貴故不難之及嫁未踰月倉卒赴夔州太君乃嚙宜人臂以别故其當府君仕及解官歸即已戀太君稍不樂府君下世益厭其長子婦宗親人及越之風物迨後家零落舊使侍悉散去又日夜課望渭用是以鬱憤死然心未嘗一日不痛念太君死之夕亦嚙渭臂以决而命火其骨歸太君鄉實嘉靖某年月日年五十九以某年月日合府君塟焉宜人性絶敏畧知書其持身嚴毅尊重内外莫不敬憚其描寫俎醢為世女師其才畧酬應畜釀種植出入籌䇿駁辨禁持則宗戚子婦賓客塾師老牙嫗悍奴婢靡不失氣其保愛教訓渭則窮百變致百物散數百金竭終身之心力累百紙不能盡渭粉百身莫報也數欲攜渭走其鄉謁太君時節旦莫數為渭道其鄉親故變遷景物風俗宛在渭目前至太君必慟哭乃已又數疑太君或己死不得一見而宜人死時太君乃反在江州養其姪某家時兄潞去家徃貴至應雲南省試尚得見之而宜人不得聞也痛哉渭既以宜人寳渭事多不可述而哀宜人生死終孤羈且痛母太君也故誌所履特詳而收涕以銘之銘曰魂欲徃兮柰兒在此魂欲留兮柰母在彼愛母與兒孰少孰多魂不可以去留傷如之何自為墓誌銘徐渭山隂徐渭者少知慕古文詞及長益力既而有慕於道徃從長沙公究王氏宗謂道類禪又去扣於禪久之人稍許之然文與道終兩無得也賤而懶且直故憚貴交似傲與衆處不凂袒裼似玩人多病之然傲與玩亦終兩不得其情也生九歲已能習為干祿文字曠棄者十餘年及悔學又志迂濶務博綜取經史諸家雖瑣至稗小妄意窮極毎一思廢寢食覽則圖譜滿席間故今齒垂五十五矣籍於學宫者二十有六年食于二十人中者十有三年舉於鄉者八而不一售人且爭笑之而己不為動洋洋居窮巷僦數椽儲瓶粟者十年一旦為少保胡公羅致幕府典文章數赴而數辭投筆出門使折簡以招卧不起人爭愚而危之而已深以為安其後公愈折節等布衣留者葢兩期贈金以數百計食魚而居廬人爭榮而安之而已深以為危至是忽自覔死人謂渭文士且操潔可無死不知古文士以入幕操潔而死者衆矣乃渭則自死孰與人死之渭為人度於義無所闗時輒踈縱不為儒縛一涉義所否干恥詬介穢亷雖斷頭不可奪故其死也親暱執友莫解焉尤不善治生死之日至無以塟獨餘書數千巻浮磬二研劍圖畫數事其所著詩若文若干篇而己劒畫先托市於鄉人某遺命促之以資塟著稿先為友人某持去渭嘗曰余讀旁書自謂别有得首於楞嚴莊周列禦冦若黄帝素問諸篇儻假以歲月更用繹紬當盡斥諸註者繆戾標其旨以示後人而於素問一書尤自信而深竒將以比歲昏子婦遂以母養付之得盡遊名山起僵仆迯外物而今己矣渭有過不肯掩有不知恥以為知斯言葢不妄者初字文清改文長生正德辛已二月四日䕫州府同知諱鏓庶子也生百日而公卒養於嫡母苖宜人者十有四年而夫人卒依於伯兄諱淮者六年為嘉靖庚子始籍於學試於鄉蹶贅於潘婦翁簿也地屬廣陽江隨之客嶺外者二年歸又二年夏伯兄死冬訟失其世業又一年冬潘死明年秋出僦居始立學又十年冬客於幕凡五年罷又四年而死為嘉靖乙丑某月日男子二潘出曰枚繼出曰杜纔四歲其祖系散見先公大人志中不書塟之所為山隂木栅其日月不知也亦不書銘曰杼全嬰疾完亮可以無死死傷諒兢繫固允收邕可以無生生何慿畏溺而投早嗤渭既髠而刺遲憐融孔微服箕徉狂三復蒸民愧彼既明孫氏妹墓銘吴鼎吾同胞三人二弟皆女此其季也先府君諱宗裕封承徳郎南京刑部江西清吏司主事妣陸氏贈安人𢎞治十六年癸亥十月十五日生吾弟於錢唐城北隅魚行橋之故居字之曰珩玉年十八而妻仁和孫鸞縣學生其翁曰憲姑沈氏弟嫁十年而病痿痿四年而死嘉靖十二年癸已十月二十五日也止一女曰待元是年十二月二十二日塟其邑東山衖從孫氏之先兆焉昔季路云吾寡兄弟而弗忍也今而後知斯言之悲吾憶喪母時吾年十八弟八歲耳一錢半縑糲蔬卉褐彼此更共如左右手遇饑歲弟恒半飱留飱飱我士友時來講藝或乏童應客弟至婢服執茗飲出獻舉人俞文祥善相人者也鑑之曰此淑姿豈真婢邪予時為羞澁吾母遺貲裝無幾弟又盡推以贈其姊予約倖有祿時為營裝償之逮予享粱肉飽妻孥擁騶從時而不獲與吾弟共之吾負吾弟悲夫初歸孫氏也頗得其舅姑歡心居數年竟以其夫學無成名俾夫婦别食而無一壠之分一金之産弟徒易所佩用為田為舟以謀朝夕且給其夫遊學屡至絶糧既病時乃指晡日語予曰曩時日景至是我尚未克晨炊唯飲泣塊處一樓咎其盍不以告予則曰恐為兄累耳嗚呼疾所由來固矣吾不能周吾同氣使不能餬口窮蹙以死尚誰咎哉悲夫去年吾見待元衣故紅繒詢知猶予為諸生時有司所犒束帛也計其藏二十年矣身後製斂衾檢其篋得嫁時線用之其縷積銖累儉以圖永類如此克諧孫氏子弗能詳知然觀其善事吾繼母戚安人與吾妻周旋十九年未嘗有迕言殁之日吾家奚婢以上咸號哭失聲要其恭順慈柔有足感人者今年春疽發背逮夏聞吾兒遵晦選補生員猶手製一花命簪之疾革訣其嫂曰吾無子幸吾姪他日成立歳時灑我墳一盂飯無使作餒鬼逐食也悲夫悲夫尚忍言哉銘曰爾温且惠既年之不長無號無嗣曷以永爾藏後有憐予悲者其弗忍爾戕宣節婦墓碣歸有光節婦姓宣氏蘇州嘉定人同知㫤之孫濮州通判效賢之女也節婦少有異質生數年濮州病侍立床下終夜不去如是者數日人以為竒及為張樹田妻樹田與同里沈思道友善思道妻孫氏夫婦相愛而樹田暴戾無人理節婦歸見父母父母對之泣節婦曰此不足以傷父母兒自是命也樹田病節婦進藥樹田泛之罵曰若毒我乎節婦飲泣而退及樹田死節婦被髮號踊人初見樹田狂虐皆為不堪比死則皆以為喜而節婦哭之極哀非衆所擬也是時沈師道亦死孫氏與節婦兩人志氣相憐數遣女奴往來比孫氏送夫喪過河下因求見節婦以死相要頃之同日自縊節婦有救之復甦而孫烈婦竟死其後三年父母欲嫁之節婦見其家竊竊私相語知其意登樓自縊嘉靖十七年十二月二日年二十五予友李翰好義之士每談節婦事慨然太息至是興節婦之弟應楫請書其墓上之石夫捐軀狥義之士求之於天下少矣嘉定在吳郡東濵海上非大郡之㑹數年間女子死節者數人甘氏孫氏宣氏張氏張氏得禍最烈予嘗為紀其事若宣氏葢又人所難者銘曰沉沉幽谷不見日光葵藿生之日向嚴霜彼童之狂以為存亡緑衣終風自古所傷生雖不辰有此銘章明文海巻四百六十八
