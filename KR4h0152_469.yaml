body:
  text: 明文海卷四百六十九餘姚黃宗羲編墓文四十一雜類薛宗道墓表練子寧公諱孰字宗道姓薛氏翰林學士兵部尚書肅公之弟薛之世德終始有肅公之志與碑公官至內殿崇班某年月日卒官於蜀其子仲儒扶其喪歸葬于絳之正平先壟而來乞銘以志余幸嘗紀次肅公之德而又得銘公其銘曰公躬直清官次材稱惟賢而似不愧其兄既葬而仲儒又來請曰銘之藏誠以永吾先君子之不朽然不若碣于隧以表見于世之昭昭也余惟薛於絳為著姓肅公於公為兄弟而公之世德余既銘之而其子又欲碣以昭顯於世可謂孝矣然余考古所謂賢人君子功名烈士之所銘表於後世者其言簡而著及後世衰言者自疑於不信始繁其文而猶患於不章又備其行事惟恐不為世之信也若薛氏之著於絳前肅公之信天下而余之銘不愧其兄則公之銘不待繁言而信也然公行事終始余亦不敢略而志諸墓矣今之碣無以加焉則取其可以簡而著者書之以慰其子之孝思而信於絳之人云吳止菴墓表吳寬吳氏世居吳江韭溪之上其先有諱秋淵者從虞文靖公遊以文學稱里中其後族益大且厚蓋六世始得朝用以明經登鄉舉官中書舍人其父母皆八十餘蒙恩褒封康強逸樂而嗣續甚盛壯者克家少者奮志學業競入邑庠為弟子員又有登鄉舉如朝用者矣其為族如此豫忝與朝用同朝相好間嘗諗其先德曰璠愚無所知竊聞諸吾父曰凡吳氏所以有今日者汝之大父母止菴府君與翁孺人之德也汝能識之則又以其事語璠曰壬午之嵗文皇帝旄鉞渡江天下同時響應鄉人爭持鉏犁四出剽掠以殺人為嬉而吳江尤甚然特乘之以報私怨而已里有戚吳二氏既焚死盜手殆盡時吾兄方壯長田賦恐不能自保請備之府君曰吾平生所恃者惟善耳且吾未嘗以怨遺人人奚以怨報我不為備方出户偵望而盜巳號呼擬之府君不得巳避去翁孺人遂急呼家人登舟盜至無所得益怒出兩舟追十里許及之相距才尋丈人人自分必死翁孺人計無所出惟默禱於神求救俄而盜所搖槳驀然皆絶因得脫去潛于洞庭山中逮事定始還適有詔撫巡郡縣諸被殺傷者得赴有司言狀所獲盜輒論死如法不俟奏報當是時吳江羣盜悉斬之長橋血流涔涔湖口盡赤或謂府君曰公怨可報矣府君曰天幸全活我家彼蠢蠢者固于我無他特一時相從為亂耳其置之勿言翁孺人亦深然之其人乃得不死至今里中某氏某氏固在皆其人之子孫也凡府君善行以不幸早棄諸孤不及多見即有之而吾時甚幼又不克知獨此吾躬嘗其患猶能記憶也豫既得聞其事他日朝用來告曰府君之葬無為銘者及祔葬翁孺人而故少詹事劉文恭公銘之又逸其事吾父每痛于心兹願得文詞顯刻墓上以自解慰且使我後之人得以考見先德相率以仁厚為法而克肖之也豫辭不獲則為具書之而系之以論曰嗚呼為善獲福此常理也世徒見善與福或參差焉遂謂善不可恃而肆然為惡無所忌憚觀于吳府君於是知善之真可為矣蓋方羣盜追及之際而府君一家皆獲生全固足以驗其平日而事定之後曽不為憾反含容以生全之視彼睚眥必酬者相去何如至是則種德益深而食報益厚此吳氏所以有今日也歟後之人果能克肖其先則族之大且厚者安能料其所至也哉府君諱為字孟才止菴其别號也少為翁氏贅壻以永樂辛卯十一月十三日卒享年四十三翁孺人之卒則以正統巳巳九月二日享年八十七男四人曰敏致效政政封中書舍人二女長適李琳次適張琳孫男五人曰瓛璲瑾璠璩璠即朝用也曽孫男若干人女若干人張愚菴墓銘王汶東陽之拓塘曰愚菴處士者乃僉事張君榮之季弟也當僉事君殁時豫往送葬見處士哭於喪次後聞處士富尚禮義好施與為里閈推重雖相去不二舍竟弗遂再接其詞氣以察其所存心成化癸已秋豫過其邑之南午嶺憩於嶺上山屋仰而視之題曰利人所有記文懸于楣乃今山東提學僉事天台潘君禎所撰者云此屋十楹間皆處士創又具床袵釜器之類使人守之以供行旅所需用且夷山為田塘若干畝以養守者豫嘆曰是誠所謂利人者也及會同年鄉進士餘姚許君謹于京邸云其往年嘗主芝山書院教出其所著處士小傳讀之知處士修家譜以睦族立家廟祭田以尊祖建邑庠禮殿以崇吾道又造古竹巧溪諸石梁以濟病涉又當凶嵗兩發穀若干石以周貧急又當每嵗隆冬發米若干石以活狴犴中餓者豫又嘆曰仁矣哉處士之用心也今豫謝病東歸見仁厚如處士者相論議以變薄俗而九原不作矣嗚呼痛哉其男治介吾友盧勉夫來丐余文銘其墓纍辭弗獲乃厯舉前所聞知者書之而繫之以辭處士諱明字孟昭姓張氏别號愚菴曽祖貴嵩為醫學教授年九十七而終祖明善讀書知義理父原仁贈禮科給事中母姚氏贈孺人處士為人寬厚坦夷尚朴素以誠實自持一生無忤於物撫養兄孟舉之孤子不異巳出築别業于湖溪之上以居邑大夫請為鄉飲賔亦弗赴配徐繼樓男六淳治瀹泌洧汸女一適高砂吳玘孫男一十七棣棌植橒棐樵楩柟梅材格檖緘梃栻楦梧若汸與棐皆為邑庠弟子員曽孫男二十五處士生洪武丁丑二月二十一日卒成化辛丑十月二十一日享年八十有五閲二年癸卯十月二十六日葬懷德鄉黃諫塘山之原葬之明年乙已十月十日始克為銘追納焉銘曰嗚呼處士何修而至于斯弗豪俠而詭隨弗險怪而坦夷弗吝嗇而好濟貧危凡禮義所在而勇于為抑莫非人心之發施人或弗知而天自知故錫之以壽考而蕃厥孫枝嗚呼非處士烏能至於斯耶樓立中墓銘楊守陳天順七年二月丙寅融風丁卯風甚戊辰大甚試院火士死者百有十六人鄞棲君與焉壬午夕余夢有求銘君者方為之序而覺蓋余與君同邑有葭莩之親而交好厚甚見其死之不幸而傷悲痛惜之不巳故為是夢抑或君之靈所感也耶寢起序忘半足成而書之序曰君姓樓氏諱啓字立中樓氏世居鄞自太師越國公異之後纍葉貴顯四明大家史樓二氏為最而樓氏世濟其美史氏有愧焉至君之祖始以醫術徙京師其伯父儒泛愛喜賔有信義聲然無子愛君不啻巳出初遣從余父季學巳而學于鄒博士允隆文益進天順已卯試京闈中選明年會試禮部在乙榜例授教職不就遂為國子監生居三載復會試及夕火作起趨而避鬱攸從之死焉時其父某方商於遼陽妻某氏病妊三子某某某長者方十嵗門庭閴然其姑陸夫人姊吳孺人為之治衣衾而姑之夫刑部尚書陸廷玉姊之夫刑部主事吳君顯為之棺斂茶毗收骼將返葬於鄞之某山祖塋之側某人求余銘之嗚呼死有重于泰山有輕于鴻毛故死非難處死為難若大夫死衆士死制斯處之當也君少好剛負氣長乃務為恭遜樂易之行然其所養實剛以大使其顯庸於位以建勳業或不幸而死於制死於衆以樹大節猶可也今乃生不及庸死不及處舉泰山而鴻毛之其可嘆也夫其可悼也夫其可使人疾首酸鼻而長號大慟也夫夢中所述大略如此覺而為之銘曰銘闕順菴墓表楊守陳處士姓汝諱旻字思元别號順菴世居吳之吳江黎里生子謐年六十有四天順癸未卒明年葬西胄圍先塋之原行有狀志有銘矣其從子太學生訥復求余表其墓余辭不獲乃據狀與銘書其行之立于家敷于鄉效于國者以示其後之人處士之父諱衡仲母呂氏窮水陸之珍以為養疾則晝夜候其湯藥食飲卧起惟謹至籲天以求代方壯喪父哀毁幾滅性逮老母喪哭泣七晨暮遂滅性與兄思逺弟思善思顒怡怡相友愛思逺先卒撫其孤子如所生此其立於家者與人泛愛而包荒别一室置觴奕書畫以延髦生韻士相與娛適家素以資雄有司委徵鄉賦賦完而民不擾其乏絶者疾厄者婚喪不克舉者多周助之嘗建太平迎祥鍾秀登瀛五石梁以濟涉葺羅漢寺西廡以栖僧此其敷於鄉者景泰癸酉之嵗聞朝廷將北征募民助軍餉乃輸米八百斛於京庾詔錫冠帶以榮之此又其效於國者昔王荆公嘗謂浮屠寺廟之盛由其學者之材多有以動世而嘆吾徒之行可一鄉才足一官者常少以余觀之由古逮今凡淑一鄉綏一邦以至陶煦萬國而參贊二儀者皆吾徒也彼區區朝丐暮乞以𢎞其棲者曽何足道然亦由吾徒之力能庇之耳使吾徒不振于斯世則民胥以溺矣彼能以獨昌耶若處士者其行既可一鄉而其餘力尚能為浮屠之庇視其才使勝一官有不足耶吳江一邑耳處士一民耳况四方之廣百辟卿士之衆材豈少耶顧宋之材獨不逮今耶天下之治安誰之力也今因表處士而言及此世其訾余好辨也夫陸處士墓表楊守陳處士諱桂字庭芳號朴菴世居海鹽之馬廄里近創平湖縣而馬廄里入焉故今為平湖人其先固以富且穀聞而處士誦書史尚禮義田宅日益闢子姪日益蕃齒德日益髙偉然鄉閭之望而邑大夫嵗飲之于庠亦既亢厥宗矣逮其子愈成進士擢知縣以陟御史行且被誥封之榮而遽即世壽六十有八鄉人惜之愈既卜葬遂求余表其墓余觀刑部郎中屠勳狀處士之善多矣有卓然異俗而可表者三焉景泰間嵗嘗歉有詔富民出粟賑飢者樹碑其門以旌之處士遂輸米六百石一時偕輸者必琢貞石為碑勒侈言曼辭而樹之覆以亭甚奢麗君獨曰吾知奉詔賑民耳烏用是觀美者哉鄉鄰飢者衆吾省一亭之費尚可賑十數家卒不樹碑構亭處士有女弟贅張承宗久而承宗欲復厥家處士念女弟為父母所絶愛而張氏家僅給乃分與田百畝宅一區凡百器用畢備世之兄弟分産或雖一錢猶競而處壬於女弟猶爾人以為難自佛老之説熾世皆惑之凡疾病死亡則刑牲以祠祝鳴璈鈸以追薦者相屬也處士親喪悉遵朱子家禮未嘗設一齋供家衆病惟迎醫市藥未始行一禱至其身病且亟聞子姪欲祠祝輒怒詈罵之其不惑而有執若此是三者皆卓然不與俗同宜表以勵世余故書之若其他行與世系卒葬之詳則志墓者巳具之余可略也古者稱人之善惟實而簡故聞之者信傳之者衆而其人之善乃彰後世銘表諸作掇拾其人之巨細言行毛舉而縷數之甚或有未實者故人厭觀慵道并與其足觀宜道者而忽忘之譬之宴筵羅列繁雜至熬腐魚而繡其外綴蠧果而虛其中鮮有可口者品益多人益不記莫若選薦一二佳品人則味之弗忘矣若處士之三善則實而可信也簡而傳者也猶品之佳而可味者也豈以余言之鄙而有不彰者哉康長公墓碑李夢陽純皇帝時靈臺有楊生名重長安有李生名錦二人者皆與武功人康長公遊長公之與二人者友也于是并稱為關內三才云余曩遊關內見秦父老頗采其事實碑曰康長公名鏞字振逺其先世固始人也其七世祖曰康政始遷武功居長寧里政生廷瑞於元仕為學官廷瑞生世睦世睦生珙珙生汝楫汝楫初為武功學官高皇帝時辟之為燕王府長史後出為安嶽縣知縣文皇帝既興乃召安嶽縣知縣為刑部侍郎留北京輔皇太子而侍郎有大勳德文皇帝將封之為侯侍郎固死不拜比死又上表乞勿賜贈秩蔭上竟皆允之語載康氏家傳侍郎者康長公之曽祖也侍郎生三子長曰爵次曰年次曰禋文皇帝一日盡召侍郎家諸男子侍郎中子會賈在外惟二子在於是二子乃大恐並匍匐入見上上曰汝非康侍郎兒邪二子免冠首觸地對曰然上聞而憐之顧左右曰令侍郎在直不至此耳於是卒官其二子以爵為上林苑監正以禋為監副巳知侍郎有子賈在外上拊髀太息曰薄福薄福於是詔賜侍郎子千金鏹數十千緡敕關津吏往來不得詰侍郎子於是關中巨貴族咸推轂康氏而康氏因遂豪關中矣侍郎葬于縣北卜家原至昭皇帝時始贈資善大夫工部尚書云監正纍官至中議大夫贊治尹南京太常寺少卿卒葬江寧縣新亭南而太常生健睿皇帝時又有詔起尚書孫應祠者於是健來送銓部會健著田間冠由部甬道入及見部尚書又祗長揖不拜部尚書怒以為慢已乃竟授通政司知事而歸而得食半俸祠知事卒葬於縣南紙坊原而知事有五子其長康長公也康長公生而孝友八嵗而善文辭及長而好辨善口然習識當世之故好稱先王則古昔于是關中人士咸出康長公下雖康長公亦自謂關中人士弗已若也年二十餘從其先太常就辟試南京顧數不第巳乃還關中即又試關中又不第乃以嵗貢至太學至太學又試又不第然太常業巳葬南京于是乞為南京太學生云而即其故太常之域祠焉然自是不復有試志矣是時楊生李生亦皆厄塞弗庸于世關中父老語曰古人有言勿為嶢嶢人將缺焉勿為皚皚人將汚焉三子之謂矣康長公既與時不合于是始好莊老浮屠等書及外家傳語其言曰夫人以形骸處天壤其速絶若飄風也豫行年五十有四矣吾日以思功名之會是益速絶而巳夫孩提于斑白期甚逺今忽忽若瞬息即能至百嵗政少半耳京生有言孰易如葦孰化如燬言生死易至也夫喜生者欲心恆安逸也君子疾沒世而名不稱傷功名之不立也夫功名于身至疏也古之人以死效此者以可萬世不與物朽至厚身也今不得之功名又因以勞費心體是非喜生之道耳故曰百人射招無弗中矣百物誘生無弗傷矣夫乃今於吾可以巳矣乃遂自謂為巳菴巳菴者止於暗也康長公故以懼悸病心乃後上銓部試會墜馬乃復病顧愈益甚比試心怔怔怦怦不能措一辭於是除平陽府知事逾年平陽君棄其官而歸而心病未間也巳又病痿又二年所竟卒葬于紙坊原之墓而平陽君有二子長曰阜次曰海阜先平陽君卒平陽且卒子海侍平陽君執其手而泣曰夫豫先大聖人之苗裔也至吾祖嘗樹功名於草昧之際世有顯官聞人豪於關中今絶于豫乎汝如有志其無忘吾祖矣夫欲心恆安逸者為其可以貪命而樂存至厚生也今吾棄功名之會不赴又不欲勞費心體非於身疏也今病痿乃且死諺曰斷酒白首餔糟而朽是天乎是天乎雖然吾無面見吾祖于地下矣小子勉哉平陽君卒十年而海舉進士第一為翰林院修撰儒林郎四年而當正德元年今上上徽號兩宫推贈平陽君如其子官云又二年海有母太安人喪於是海有友曰北郡李生適自河南來而留滯京師於是作平陽君墓碑李生曰先民言期年樹穀百年樹德曷觀康尚書令其子孫餔勳而啜績曷使人誦其義無窮如此哉夫平陽中衰之遺裔也能不藉尺寸而洞視往古凌駕時輩亦謂之振世雄豪者矣使其遭遇脫穎而嚮用魏衛將相之業尚足道哉其銘曰維武王建侯衛邦厥有固始武功是祀嗚呼遐哉尚書開國不伐帝懷其德澤流于孫子少卿明禋亮采通政明逹乃續其家祀故纍基者崇數沃者豐譬作堂室稼穡而蔀而翔而懋而達夫平陽其屯之際乎畜而不施以昌厥嗣阜不自祕發鬼神之藏騷雅並鳴文古而殤嗟嗟平陽舉世重官宦即使君巍爵而崇位珠玉文綺珍食駟馬有臺樓亭榭孰與發祥廣志如二子乎哉故明不蓄不光流不塞不長武功南原草木膴膴蕃蕃岐渭盤焉平陽宅厥土太安人祔之是曰寧所維厥繩武瞻哉吕溥墓銘康海公諱溥字某家世高陵人也其始祖曰世昌又幾世至彬卿生八八生興興生貴貴生鑑鑑娶魏氏生公及其弟博公長子柟者海友也海以柟友則數之髙陵因得數拜公親見其容貌聞其言論覩其行事知公之宜有柟也公以正德丙子五月十六日卒于家七月九日葬于縣北祖塋當時柟以海為公墓碑海懼匪德不能昭述盛德揚著幽光故至於今始勉復於柟焉夫人子於所生者生莫不欲其榮殁也莫不欲其哀言語行誼莫不欲其傳然虛誇鮮實人指議至矣尚奚言傳哉故海之自矢也不憂天下之不信吾言而憂吾言之不足以自信夫公鄉里恆人無麗詞輝藻以要譽文學無豐財崇爵以驚炫流俗無竒節詭行以聳世習然海數言不置非所以私其所好也示天下以長者之道所以廣教布德懲勸浮靡也海惟公朴實不華耕鑿飲食之外一無所為海不敢輕誣之遁世不仕也孝親友弟守身畏法處親戚鄰里無所欺負治生期于僅足責人不為巳甚雖傳記所載典册所訓何弗啻哉此公之大略人人易言之人人不能為者故君子素其位而行不願乎其外君子無入而不自得焉若公者于此道庶幾否耶公美髯鶴翰望之如神仙達識事體深計者莫能會其意其指擇是非談述理義學者或鮮焉志稱其決魏某詐嚇李縣判之事豈非其事實哉墨劉之鬭墨嘗謀鴆其老病以償劉矣片言之間卻鴆巳鬬生墨氏長少蓋幾人也其後又解妊婦之死平劉李之怨訟買田逋稅者官不能稽諸板册以公一言而決縣官定徭役辟于里書方伯至亦信以去公言諸富平道中方伯即歸以正之其巳壯哉公居常惡衣糲食休休自娛既受封貴顯猶著補綴履繩布終其身無怨恫於人少日以大户輸餉榆林同輸者為掩昧得資皆笑公歸無完履乃同輸者發覺至于破産公獨安居闤闠至今應輸者必自戒飭曰慎不可忘若吕公間居嘗謂柟曰汝知仕之大本矣乎無他慎取與爾有餽者無故而餽豈無所為也輒令反之寢疾經兩嵗柟晝夜侍不敢少怠或履聲稍震猶厲色以責曰汝侍天子側亦當爾耶病且革呼柟語曰汝受朝廷榮寵他日當竭力報國無得自便宜咨稟汝叔而行公所以愛其弟者死猶未巳也曩聞髙陵人言公壯時父命為居室將於弟異公乃擇大木為弟室弟讓公公曰安知為爾室也室成乃卒以與弟配宋氏藩府教授宋公之孫女也宋公愛其孫不欲與凡子李州判者宋公之友也公十五即為李所器曰此大美弗興若身當興若子孫故宋公因以孫妻公當其時諸宋薄公貧也李君曰渠稍長豈止如爾家後其言卒驗云宋安人既配公奉其家範事舅姑處妯娌各得其道諸吕內外無弗悅者柟之少也安人一是以身教之凡枕鞶刺繡故事必曰此賢此孝講説大義亹亹不倦又恆誦其祖教授公之遺行以詔柟故柟之所以為天下之士者其父母之教有然也公生正統戊辰五月十四日春秋六十又九安人與公同生生七月二十一卒𢎞治乙卯五月八日壽止四十有八正德癸酉三月一日以柟封公為儒林郎翰林院修撰贈母宋氏為安人繼室侯氏亦加封安人焉子三人柟舉正德戊辰進士第一官翰林修撰為上經筵講官仲曰梓公葬後五年殁季曰栖縣學生志弗忝兄二十一嵗死女一人嫁劉孟陽孫子三人田縣學生甸柟子留梓子孫女三人嗚呼其傳盛矣銘曰維吕氏世懋德藴靈尚父啓齊爰有高陵世昌孔武孫子是型及彬卿父高陵以興至於六葉封君乃生纘此懿德厥宗用成篤生我友維邦之楨直義廣孝公志斯承昔在壬申拜公於庭望之則嚴即之則平溫恭易簡若蘭之馨匪德曷永匪言孰明享不盡孝德不愧齡逺近悲悼况云我情高陵之北實惟廣坰建爾玄宅萬世之寧考光摛曜因勒斯銘趙氏丹崖墓表謝鐸於戲是為元處士趙公良顯之墓公實黃岩縣丞迪功郎不弱之六世孫不弱之父安康郡王士説蓋宋太宗第六子寧王元偓之後士説死靖康圍城中不弱避亂江南因仕黃岩而子孫遂留以家入國朝來愈益蕃盛若故工部員外郎鼎藁城知縣關博興知縣珂鄉進士季齡經魁慥率彬彬仕籍間而博興之孫本又方濟美世科大抵皆迪功之孫子也公生于元延祐丁已以至正丁未卒葬丹崖之弓嶼子四友輔早世友養葬聖水山友礦友繁實祔公以葬其孫旰暹亦在焉友繁字進茂讀書尚義隱約不仕實維我大母太夫人之父太夫人生先編修府君甫期月而寡守節自誓以長以育以至于有今日我謝氏不絶如線再造之功與天罔極吾豈敢忘所自哉𢎞治己未公之曽孫某某等將伐石以表公墓而顧以諗於豫豫泫然曰豫小子無似恆愧求所以報公父子之德而未能也又焉敢以不文辭哉乃為之言曰嗟乎德厚者流光天道雖逺無久而不報之理趙宋之有天下也以忠厚傳家世以寬仁為治三百餘年之間無殘暴慘刻之主故雖運改時移不能永保其基業而深仁厚澤實足以庇覆其子孫若吾黃岩之趙氏蓋可見也彼六朝五季之君其身且不能以一朝居况望有以及其子孫於異代之久也哉故觀於今之趙氏可以見宋之德澤觀於公之子孫又可以見迪功之德澤不忝其先益相與為無窮矣雖然東都之河洛南渡之會稽皆有陵寢今所奠掃而為之主者誰哉而丹崖之墓子孫具奠掃無缺於此益足以見德之淺深厚薄誠有不在富貴貧賤之間者矣然則為公之子孫者可不益思所以培植而延引之哉作趙氏丹崖墓表故曹先生墓志銘楊循吉傷哉吾曹先生乎垂絶為詩使其子召我將託以銘未及遣而殁既一年乃得詩悲傷吾心氣欲咽吾口噫人間一死豪傑之所不免先生巳七十餘厯閲享用粗盡世事死則歸焉而巳當復何憾然而其殁也實不及家惟銘之丁寧噫謂先生其無意於世者耶死而猶以不傳焉為恥若是則其生可知也生而不用故人不知人不知故自負自負於生至死而不白則曰斯也巳矣不書于其墓以其志與骸骨皆埋是生晦而死益幽也焉得謂之曰人書亦無益亦曰吾之為人若是吾弗遇乎世吾亦挾而往耳噫豪傑士恥無名名亦有遭有不遭遭者彰不遭者匿匿也者有乎巳而無乎人者也若是必自抱而生自挾而死耳又焉得默默而空生死於天地之間哉斯先生之志也先生之殁也自傳甚悉曰自吾為士至取第厯官以及老死若是其英邁偉岸之氣雖死不衰噫先生以生不用死莫聞唯其恥故不免自白是其終不肯巳心于死也傷哉毛遂東方朔伊何人斯唯諾一生以為謹厚亦胡有一點丈夫氣孰使先生抱才負用而至此不敢吐一語乎吾是以壯之先生諱謙字鳴吉以鄉貢進士初授金華府學訓導改南康又改南京武學升永新教諭博學善談論所著有平軒集六卷學為名士仕為良師其殁也蓋致仕十年矣生死之際人以為難先生怡然若無憂也惟銘則又若不能忘者故及我我何以塞先生之志使不憾嗚呼是人惟其氣志不足道也偶遇其地胡曰髙胡曰卑今曹先生之氣有五發乎文安乎冷靜乎休放乎死耿乎不傳是其為人非曰其官能盡之者也先生巳矣奄留一生用不達矣往古來今若是者多矣瞑目掩體捲其有而休矣奈何哉奈何哉子一人墓在吳縣西陽山以𢎞治辛亥某月某日葬明文海卷四百六十九
