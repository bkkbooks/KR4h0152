body:
  text: 明文海卷四百七十一餘姚黄宗羲編墓文四十三雜類西洲墓銘歐陽徳嘉靖己亥某遭先大夫喪里居而先生以陜西苑馬寺卿免喪復除遼東越明年庚子擢任廣東道故里過某作别喟然歎曰埀老宦逰旁無侍子吾何樂於此行時伯子蘭早夭獨仲子博士諸生䕫䕫室王氏才有女曰京潔男曰文載皆㓜元配劉安人女妻庠生周循理䕫同産妹妻劉生超鳶者皆歸矣䕫理家不能侍行與其生母蕭居先生以繼室楊氏往故快快不樂若欲遂歸休者辛丑遷福建右布政使䕫婦誕子文軌楊氏亦産兒兒尋殤乃先生益眷眷思歸故園矣居久之移疾慨然欲西會與御史忤御史以為為己發者固慰留竟卒于官豈其志哉嗚呼叛夷安全之變挺身出嵩明城撫賊賊加刃批肩抉肋破肌流血懵仆危死矣賊中有大呼曰此歐陽爺非王僉事也羣擁入城遁去藥四旬乃有瘳此所謂大難不死者而胡寜止是今科第二十年往往内貳九卿外長藩臬矣而先生自戊辰至癸夘官不過右轄或曰先生簡亢不畧為矯飭以故知巳者寡嗟乎知巳可易言哉憶某生纔九年而先生中𢎞治甲子鄉試又十有四年為正徳戊寅先生厯官南虞衡營繕司主事員外郎謫倅澧州遷辰州府通判過家某始識顔面然未通欵洽以前則日聞鄉人論先生者云云庚辰晉同知䕫州府嘉靖初擢四川按察僉事某始舉進士接四方士大夫則日聞士大夫論先生者云云庚寅以雲南按察副使亟表入賀萬夀節明年復入覲某備員史館得欵暱京邸然後知世之淺深先生者亦異矣寡黙似簡娬媚形亢顓侗僻陋與沈厚凝重者有間而言貎揣取意見相懸孰為真知定論者哉人之言曰先生以虞衡郎分署真州時六卿大貴人至不逺迓閘不得擅啓江干上謁輿從傘扇委蛇容雍自如坐間或寒暄起居道古今不休獨黙無一語以是得罪既下遷澧州㑹湖廣鄉試執事外簾御史屬簾外官校試巻墨本與簾内叅定至取舍異同以去就力爭辰守缺承符攝署府寮有駕言位次先自攝者實以恣其墨符至餉頃輒從奪之印䕫守自尊大倅以下坐之隅先生獨頳發于面長揖不即席退引疾自免守為謝後不如是乃起雲南副使分司署與清軍察院比御史從暫借署穿垣内通以宿史胥籍諸司㑹要抗執不可廣東按察司官塘勢宦家請之從提督府下書索報又因貴要人為言竟不報嗟此非習傳聞以為簡亢者歟質有所近志有所不為其諸兢兢法守人以柔廢我以剛植孰為傳之矣乃福建庫官之貧憐其非罪多方積羨金為補虧耗乂何恕也士大夫能無諒其衷耶先生官遼東時蜀士立朝者言今蜀吏多墨往東西川吏獨畏歐陽僉憲僉憲守身嚴持法正不可干以私時九卿長貳寖多先生舊寮而故吏亦多位通顯者咸公言西洲長者可與久要不可與苟合使服大寮必不以法徇人先生以故連陟而前此副使轉馬卿者往往遂不振宦久論定可謂世無盡知者耶然而大命不逮矣訃聞鄉族閭里無智愚賢不肖咸悲嗟曰西洲仁厚君子也家居絶不請託受産不乘急以要賤售往往溢常價又不侵為然諾與人無煦煦詞色然甚真蓋昔之論先生者今亦不復云彼秉心不塞圜轉機警偷取一時之譽者亦情狀卒露棺未蓋而物評巳去者於先生何如也歐陽氏自刺史公留家于吉大尉公徙萬安常溪徳祖公徙泰和蜀江逺矣其近者我後峯府君再傳而有月臺及先石塘府君月臺曽孫通議公昇實生皜齋公鶴慎菴公鶚則先生王父世父父也先生諱席字崇珍號西洲與皜齋仲子吏部侍郎石江先生鐸同舉正徳戊辰進士於是王父用石江貴贈通議大夫南京都察院右副都御史慎菴用先生初任階封承徳郎南京工部虞衡司主事妣劉與元配皆封安人蓋儲休委祉發之積餘者至先生與石江始大而其用皆不究官雲南以討安全功廣東以平交功凢再錫白金文綺乃作酒器刻識令世寶之以無忘主恩其望之後人者逺哉喪還自閩御史江陵李君遂按江右弔祭賻贈良厚問知未有塋兆而西鄉栁條寺廢矣令䕫以其意請入價且盡與隙地曰古有營葬令可置守冢數百家者先生盛徳何知不在其後李君蓋湖廣外簾時所取士以去就爭者非以市報而報不違焉亦異哉先生生成化辛丑十月八日卒嘉靖癸夘七月廿二日葬于乙已春正月二日䕫來告且徵銘嗚呼石江巳矣銘非某誰宜為銘曰乘橇擿泥寸前尺隮憲臺薇省孰曰差池直道于世世寧莫知直以誠成積以久輝漸磐其衎鴻翼于垂逺道久廢咎也誰歸挺挺伯子蘭曷萎之仲也䕫䕫杜其枤而葱蒨玉樹種徳之遺培壅以需雨露孔時伯考獻竒府君墓誌銘陳九川昔者聖人之制葬禮也将以順生死之理達升降之道盡孝慈之情而别尊卑之分也故禮有隆殺期有逺邇天子七月同軌畢至諸侯五月同盟至大夫三月同位至士踰月外姻至庶人視士可也春秋書諸侯薨必月可以考緩速之非禮焉書葬敬嬴巳丑雨不克葬庚寅日中而克葬可以考魯備之不周焉考諏日之不尼焉自學絶道喪禮制不明詭誕不經之説附葬經而出者皆得以逞孝子慈孫惑之始有尼嵗月抱負之不宜厯數禩暴親而不葬者矣我明若天頒厯云某日宜某事國家大事以之未始有匝嵗月而不宜者且禮未葬則居倚廬故古之力不能葬者戚戚焉如袒括不敢離苫塊而寧寝處也今詭誕之説逺畔古禮邇乖時制而陷人心偷習俗悲夫伯考之卒在某年月日距今十有三年巳夘始得諏某月日葬于崇仁大洞之原者以此伯考為人風流儒雅造家勤儉而接物和性喜飲微醺輒歌王父溥卒王母聶孀居餘二十年率用是娛之有老萊之風焉溯其生在某年月日享壽六十有三伯妣汪氏後四年卒幼子某後九年卒皆就土矣時維長子某奉柩以藏伯考名某字某姓陳氏先世宣城人銘曰大洞之岡負隂抱陽伯考斯藏相久迺成厥卜惟精庶幾永寧徐元定墓誌銘儲巏君諱興之字元定與余同舉成化甲辰進士出宰淄川縣甫三月坐事執政者罷其官既歸之七年為𢎞治壬子六月十七日以背疽死于家訃聞余痛悼者累日嗚呼元定遽止是乎蓋抱才負氣之士嘗患于不自善用又患乎用之者違其長元定跅弛踔厲取求於人者既疏而人望元定者乃槩之拘儒曲士毫髮弗少貸焉此其遇合之難而卒窮以死也元定讀書最深到喜遷固韓蘇文日不釋手其為文氣勢張皇馳騁反復觀者洞心駭目如萬馬爭場武夫悍士猝不可得而馭也其為詩師杜子美傚其諸體悲壮沈著五言律蓋近之其尺牘長者數百言短者五六語無不警絶兼之字畫遒勁海内人與之通徃來者每得其一劄爭相傳誦蓋元定能事臻妙者尤在此也喜交遊後生及門者皆折行輩與之傾倒肺腑揮金飲客磬橐無愠色遇不合者輒厲聲擯之于坐善元定者多危之元定處之漠如也卒之日戒其從子曰璜余平生故人完好者唯儲君我即死其徃請銘璜來以告嗚呼予何能為元定銘且又安忍耶為之序曰元定初名傑棄官後以字行其先為太平繁昌人貌豐而晳眉目瑩爽可愛幼隨其先人主簿公政官汶上故語態悉類北人母吳孺人老尚在娶于氏生二子長曰鳯翔早死次曰養浩妾某生子一曰同仁女四人春秋四十有六以某年月日葬某山祖塋之次有詩文若干篇稿藏于璜散逸者尚多知元定者必為之彚編也嗚呼科舉行而古文廢非一日矣元定崛起時輩中天資豪鋭不餒不懾直前以古人為師可謂難也巳今人枚指其細故欲併而棄之要之得失終不相掩也今嵗元定以家乘來與予言近讀老子孫吳書益見古文高處又曰讀朱晦翁集其文章議論興之當低頭拜矣嗚呼元定於是蓋将易故而即新也孰謂其遽死此余所以重為之惜耶銘曰孰艱其行孰隕其名斂其英華壹文以鳴彼蚩者缺我巳得贏伊銘之故哀靡有成嚴雙洲墓銘王維楨監察御史嚴君者朝邑人也名天祥字叔善以所居望仙觀在洛渭二水之間因號雙洲常稱以為人能修㓗其躬比於洛渭斯可語士矣以故嚴君修謹平生無洿節辱行皭然若處子云嚴君中嘉靖甲辰科進士除為山西絳縣知縣既三年徵去一錢不著于身去之日父老遮道攀留者以千數嚴君持法不假借常約束吏胥竟嚴子去兢兢不敢縱以此百姓戀之己酉選為四川道監察御史居三月嚴君忽鬱鬱不樂或問嚴君曰君官御史何不樂也嚴君應曰官御史可樂今且責我以能官樂乎吾亦有所覽觀思慮夫鸞鳯鷹鸇各有所稱皆著其能吾将柰何是以弗樂也久之嚴君病嚴君父曰堯黼號直菴母李氏弟天祐舉人嚴君生而孝友六七嵗時李嘗病罷食嚴君跪而進食不食輒泣食乃起一日天祐病嚴君身奉湯藥夜三起問之惟恐其弗間也嚴君病在京師直菴公聞乃跨馬馳來視病留天祐事其母李是時六月大暑嚴君相見泣曰噫翁何觸熱為也兒病固無害殆傳者誤翁耳尋問母李及弟天祐語刺刺惻惻淚數行下移時不止直菴公居月餘而嚴君病少間歸既歸乃復遣天祐來視而嚴君病忽劇遂卒天祐來不及訣才數日耳天祐撫棺慟哭曰嗟天乎吾兄何負而遽令至此乎嚴君配曹氏無子有二女皆㓜皆隨居京師天祐乃扶櫬載嫂若女俱還以庚戌三月十日葬嚴君于望仙觀之東從親新兆也其後一嵗餘曹氏坐哀毁亦卒天祐啟其竁與嚴君合焉初嚴君且卒也曹氏提二女伏牀哭嚴君亦哭有頃戒勿哭徐言曰吾視吾弟厚吾弟視我又甚謹必不令若等無依也吾死而還骨於家具告父母以天祐之次子允恭為吾子立之於是直菴公竟與立如嚴君嚴君舉進士時余識嚴君於稠衆中敬之既嚴君為御史病卒余與長安人王給諫子皋偕視棺斂哭之成禮然後去巳而天祐至遂請王給諫状其兄之行攜而同乘吾門乞銘倉卒不能應去越三年而余遷官南都便道還華下天祐渡渭造請者三泣曰先兄所不瞑目于泉下者獨竢先生一言耳幸以慰死者而絳縣人又言嚴君方在絳縣時恒以役至夏縣道經傅説祠側嚴君必入拜徘徊瞻顧有曠世相感之思焉一日復過屬有急不得入拜憩其側短亭中坐見二青衣持檄伏堂下白云傅丞相要公嚴君謝不徃顧左右賜使者食左右實無所見以為嚴君作鬼語然不敢詰第應曰食使者矣嚴君乃語二青衣還報傅公異日者竢我為御史乃徃矣言訖就寝頃之寤呼左右大驚汗出述夢中事左右白云自未寝時有之非夢也嚴君黙然戒左右勿泄卒而從行者始傳其事由是觀之嚴君甫為御史輒鬱鬱不樂者蓋斯念哉彼其稱憂不能官者托説也嚴君生正徳甲戌十二月十六日卒嘉靖已酉十一月十九日年方三十六耳女一許字樊氏一又天蓋重可傷悼焉乃為之銘曰人生而良惟神亦慕翼翼嚴君傅要于路傅跨箕尾嚴乘烟霧翺翔九虚以遊以娛彼衆弗知嘆息驚顧杞梓俄摧驊騮窘步我解以文刻置新墓有來觀者兹石可寤劉涵江墓表王慎中嗚呼予何忍表劉涵江公墓哉辛丑嵗予與公同罷河南叅政予方倨侮自恣馳書於公約遊淇水王屋太少二室武當山相攜而歸公艴然徑歸且報書曰君報罷猶出内批孰不知為權重人所為如吾誰當為明者吾歸矣不能從君游且宦其土方見罷而又徃遊焉得毋太作意乎予時巳至淇上彷徉百泉蘇門之間愧公之言徑趨安陽訪故學士崔後渠先生談數日亦遂歸不復至孟門洛陽矣嗟乎公達人也既巳罷矣何必使人知其為誰所為者而公報予書其言如彼公生平約已守官儉薄瘠苦獨蹈人所難要欲以見于世而今猥與不肖同罷宜其不能忘也嗚呼悲夫予何忍表公墓哉然公己没世予卒以悲故不為文誰當明公者予又何得不表公墓也劉氏故莆之涵頭人祖均長仕元為漳浦縣尉因家之當文廟時有仕為宿州知州名觀者有能吏名實公高祖再傳為封南京禮部郎中公淵公之父也郎中公娶封宜人周氏公名友仁字是成原所由徙故號涵江以示不忘其始以正徳甲戌進士始授南京戸部主事轉禮部主客郎中遷知黄州府以母喪去職起為衡州以材調廣州遷湖廣布政司左參政遭郎中公憂起復為浙江右參政調河南參政撫民南陽其為户部嘗監淮安𣙜税及持節徃使湖廣理賦督發其滯逋以填京庾𣙜税故毛細易汚為之者徃徃矯厲苛核皦其跡以冀自免督賦所臨遇皆藩郡大吏至者輒弛懈不欲急懼見為觸公在淮安尤簡易與商為便督賦故嚴宻鈎剔滲匿不以藩郡尊鉅為忌二事以集竟免汙跡亦卒未嘗有所觸黄州江漢經流之衝民蹙政煩前守日夜治文書應賔客寝食不得休衡州在山谷深奥處田野饒足郡中常暇豫因習為偷公兩易其俗為張弛為黄州政每閒尋周瑜破曹孟徳故處酌酒吊之與客泛舟婆娑甚適日與諸生考論術業第其得失奨飭之文用大振比公厺而以文奮為時名流者項背相踵皆公所教士也衡州置郡南嶽之下顧未嘗一遊而設約束布條教起民之窳雖在郡日少恩施未洽而精采有加焉湖廣浙江參政主督版冊財計而南陽主撫民公為之皆有體人謂治版冊財計宜為米鹽公獨踈目濶節顧絶無漏失撫流逋多以寛捨致安集而稽察誅賞公用之不少貸唐鄧之間益用和懐其所治各有以自得如此而其尤難在廣州嶺南土廣民衆莫如廣州且據省㑹部使者藩臬監司所治人性各殊難於齊調郡於其時賢貴人在朝最有權望鄉里多附麗之者强則折而弱則靡公持其間而免焉蓋其尤難也公平生廉謹自好居官所至不以細如毫毛或茍而有取其於人不為茍與性尤濶直朴率無機數曲節既無以買名譽寄援汲而居官輒得賢聲官輒起由其廉謹不取雖有憎惡者不能加㸃而然也然在浙江為言者所論在河南未幾卒以罷歸則以寡聘遺簡将迎雖其亷謹而終不足以勝憎怒者之勢也嗚呼其可嘆也夫公没二年既葬其子祥鸛持其族昆約齋中丞公之状與林二山中丞公之銘謁予曰願有以銘先君者予主廣東辛夘試事公屬在廣州其事院中留都主客為郎覽壁中陷記摩挲題名得講其風美最後同為河南參政又同罷也其言宜可信于是為表于其墓曰有以自待者必不托于人于人無所托則其享于世亦不能遂彼所謂自待者皆矯强鷙卓恃巳而卑物竒跡以驚衆其不能遂意於世固其自待者所自召與公誠無所托於人而任質徑情貌恂而詞愊非期與人為異有所戰薄於才騖聲角之場者所遇竟若此何也豈材與不材之間固其所難處耶然公終始所尚無少異而始見為賢終以得罷予又以感夫世尚之變蓋三十餘年之間而仕者見容之難易其可覩矣陳東莊暨配黎氏墓表王慎中南海處士陳公名濓有徳而壽其在毅皇帝朝令天下入粟實邊酬以冠服翁首應令入粟而不肯冠服有司以令格强與之翁乃冠服嘉靖改元優詔養老而翁以年七十以上有行義受冠帶復其家厚給酒食綿帛如詔㫖既老且榮為州鄉長者其家又殖而子孫蕃茂婣婿盡得名家子尚書湛甘泉公道徳學問為一代宗工呼翁為舅翁配黎氏與翁偕老娛嬉一門之内和氣旁皇翁不惜以錢予貧人而好教人以善黎氏能諭其意而力佐之鄉人無親踈少長咸歎陳翁夫妻兩人之賢而重歆其福然翁自少時始脱丱童即遘家禍同里鍾姓者興巨獄以搆陳氏獄事初起如燎揚于原勢不可嚮翁挺身就逮誓不以難䝉父兄父兄愛翁不忍又患其少弱不能與仇為理公不為止搒笞楚毒甘若食飴繫獄十餘年無幾微悔沮色為同繫者所覘同繫故仇猶嘉翁之義而伏其壮竟得埋出方翁繫獄自謂不出父兄竭力營捄雖冀其出然不計何時故翁在獄屢以意告父兄使辭黎氏之婚父兄然其意辭之黎氏黎氏父母亦然所辭且為其女謀别選所歸黎氏矢死自决曰以身許人當其有難而背之不義出不出未可知不冀其出而先以不出絶之非人所為吾有俟之而巳翁既出而黎氏歸翁嗟乎此兩人者其於義可謂堅苦卓偉者矣予觀先王制為少儀教子弟之少者使修其職以事父兄其詳在於撰杖屨扱帚箕奉席執几帶觿佩礪極卑而甚勞以為少者之事足以能此而巳至于蹈義發憤赴難而不悔禦侮而能勝非童子職也魯人欲勿殤童汪踦而仲尼以為可也君父之難又何擇焉兵刑之死其死一也翁之不死固有命焉若翁之事是先王所不敢責世之子弟而孔子深以為難者也至于婚禮納幣有吉日而壻之父母死猶以不得嗣為兄弟使妁致命禮之教人非為偽也有其辭之則女家亦有可許者矣父母之喪其節也有數其釋也有期先王謹婚之時而重於廢人之道猶有辭之之禮焉推此義求之則壻有陷辟之凶縲絏之免無期而衿帨之申難俟其不得嗣為兄弟宜先王之所許也而黎氏之志如此豈尤不可以為難哉嗟夫使世之男女皆如陳翁夫婦兩人則豈有擇便茍活後君親之患與夫中道相棄婚姻之道缺而夫婦之恩薄者哉予謬以文名當世好求當世行事之可列者見於予文使不冺没陳翁兩人之事固余之所欲著而請予文者又翁之孫泉州通守陳君也君以文學為吏其政事不俗而有名士賢人之風顧獨深好余文余既雅慕陳君於陳君所欲誠不敢愛顧余所能獨有文字而君所欲又在乎此故為之論著其祖父母之行使歸刻石表之墓上以慰其顯祖之思焉明文海卷四百七十一
