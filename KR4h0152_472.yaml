body:
  text: 明文海卷四百七十二餘姚黄宗羲編墓文四十四雜類張鴻臚墓銘歸有光嘉定之南有地曰南翔張氏世雄其土迨適耕翁力田積居家至不貲翁長子早卒次生君少學進士業入太學一試秋闈不利然翁家既饒以貲奉其子游京師君又才雋諸公貴人皆樂與之交以選為四譯館譯字生除鴻臚寺序班鴻臚所選用其屬綺紈子弟君于其間偘偘自将寺中號為閣老序班每朝㑹臚句傳多舉不如儀者輒引去治罪久之乃陞為司賔署丞奉使至邊犒軍厯太原雲中雁門兵官皆戎服執櫜鍵負弩矢迎導從士數百人儀衛甚盛以登五臺山觀清凉寺人以君為榮既竣事南還丁外艱服除赴官逾月又以内艱還時海上有倭奴之警君家最邊海上數跳身遁常以天子仁聖稽古右文制禮作樂殆厯三紀天下和洽四裔向風日月之所照莫不賔貢竒琛瑋寶呈表怪麗絡繹于館候無嵗無之君時在司賔親見其盛矣一旦窮島小醜懸度大海來為侵盜使江淮千里之間靡然騷動毎言及常憤邑數為大帥運籌䇿帥亦竒君數從君問計㑹君亦巳服除賊勢稍解将治装北上尋病不起時嘉靖三十四年九月二十四日也年止五十六君之奉使也以二親老在京師殆逾十年因晨夜馳歸省之巳而連丁内外艱中間一至京師坐不及安比服除京師貴人數以書促之竟不能至而卒人以是惜之君諱梓字子道曽祖某祖某父某是為適耕翁以君貴封鴻臚寺序班母某氏封孺人子男一人善鳴女二人長適嚴治次適丘權皆某孺人出也側出子一人二元尚㓜張氏先未有顯者自君始登朝著而從父弟懋最後乃登進士焉善鳴以其年十二月十二日葬于某原來請銘銘曰吁嗟張君志高騫執法殿陛何肩肩象胥之職嘗優閒從容日見王㑹篇歸來滄海波濤連毁瘠苫凷厯二艱永矣長逝無北轅用之不盡彼蒼天留其餘者遺後賢我為銘詩刻其元趙汝淵墓銘歸有光宋熈陵九王子其八為周恭肅王元儼恭肅王生定王元良定王生安康郡王宗繹安康郡王生南陽侯仲鑛南陽侯生處州兵馬鈐轄士翮士翮始遷嚴陵士翮生保義郎不玷又自嚴陵徙浦江不玷生三觀使武經郎善迎善迎生武翼郎汝汝生崇傒自定王以後至崇傒始失其官為士庶崇傒生必俊必俊生良仁始自浦江徙吳今長洲之金荘也良仁生友端友端生季永季永生同芳同芳生瓛瓛生四子濓潛深濱潛者汝淵諱也汝淵於兄弟次在二授室於崑山真義里朱氏汝淵年六十有六卒嘉靖四十二年十二月某日朱孺人年五十五卒嘉靖三十八年正月某日生子男一人世貞孫男四人和平和順和徳和某皆夭最後生和敬孫女一人其葬以隆慶二年十二月某日墓在長洲之某鄉宋自青城之難王子三千餘人盡為北俘其散處四方僅僅有存者若周王之後以詩書世其家故譜系頗可考其在長洲同魯其賢者也同魯於汝淵為再從父汝淵夫婦孝敬修士人之行世貞方将以進士起其家世貞于予先妻魏氏内外兄弟也故屬余銘銘曰宋失維城宗淪于北哀哉重昏鼎折覆餗不仁之殃逮其九族存者孑遺逃竇而延恭惟肅王當世稱賢宜其孫子百葉以傳宜君宜王今為士類亦修于家魚菽以祭曷以銘之不愧其世從叔父墓表歸有光歸氏世著于吳自唐天寶迄于同光百八十年以文學科名為公卿侍從有至令僕封王者吳人至今紀之宋咸淳間湖州判官罕仁居崑山之太倉頂脊涇洪武初徙今附城須浦上六世之墳墓在焉叔度逃難走夜郎邛筰間有神人來迎将之宜興徐文靖公為之作傳叔度再世為我高祖諱璿承事郎生我曽祖諱鳯城武縣知縣城武公三子長我祖諱紳仲叔祖諱綬季叔祖諱綺府君仲之子也諱格後更諱于徳字民從𢎞治間曽祖父母與叔祖一嵗中俱亡府君少孤吾祖教之後常依季叔祖以居恩勤撫育二父之功為多其後吾歸氏之在海虞白茒浦者兄弟皆修學延致府君府君遂盡室以行白茒瀕江海府君築居田野中四望寥曠每秋風落木慨然首丘之感然去歸市隠隠莽蒼間歸市諸兄弟家也時時相過從㑹集府君是以喜曰吾居此殆不乏跫然之音也府君雖在海虞界與宗叔諫猶籍崑山博士弟子嵗皆有米廩之養諫復推其半與之蓋白茒諸父兄弟三十餘年睦友任恤之義可尚焉然性曠達髙簡獨以宗門相依他無所屈也嘗與人友善後其人貴顯終身不見其面有所得飲酒輒盡以是不能為家而少有異稟讀書過目輒成誦能日冩經義百篇人見其無所事學而藝甚習數試不第㑹督學御史牒至府君當貢博士有所私持兩端上請御史墮其計遂以府君為次還至揚子江大風雨連日不得渡忽感疾腹脹泄痢府君母龔氏青縣教諭紱之女山東左布政使清惠先生理孫也家世科名府君少隨諸舅計偕北上至是歎曰吾少從舅氏觀都邑之盛宫闕官署街術至今厯厯記之天子致治中興建明大典數事及備禦外國吾方壮年不得有所試今老矣且将一望闕廷而竟不得徃命也夫府君卒于嘉靖三十八年某日年六十有五娶張氏修武縣知縣謙之孫卒于嘉靖三十年某日年六十有三生男四人有恒有倫有守有徵孫男四人士𢎞士毅士和士達城武公墓在須浦上先祖妣及仲叔祖父母祔左先妣先姑祔右先姑以下無餘地故為新塋海虞萬嵗涇之隂南去白茒浦百武禮公子始來在他國者後世為祖謂之别子明有始也又曰去國三世爵禄有列于朝出入有詔于國若兄弟宗族猶存則反告于宗後明不絶也嗚呼宗門衰落吾叔父竟羈窮以死能不為之悲慟哉其葬也叔祖曇以下皆自崑山徃哭之同學諸生上其行于有司友人陳敬純斂賻贈而弟學顔助葬事尤盡其力云吳文墓表唐順之文字之變于今世極矣古者秉是非之公以榮辱其人故史與銘相並而行其異者史則美惡兼載銘則稱美而不稱惡美惡兼載則以善善為予以惡惡為奪予與奪並故其為教也章稱美而不稱惡則以得銘為予以不得銘為奪奪因予顯故其為教也微義主于兼載則雖家人里巷之碎事可以廣異聞者亦或採焉故其為體也不嫌于詳義主于稱美則非勞臣烈士之殊迹可以繫世風者率不列焉故其為體也不嫌于簡是銘較之史猶嚴也後世史與銘皆非古矣而銘之濫且誣也尤甚漢蔡郎中以一代史才自負至其所為碑文則自以為多愧辭豈中郎知嚴于史而不知嚴于銘耶然則銘之不足據以輕重也在漢而已然今又何恠余兩為史官皆以不稱罷而姻戚閭里以其嘗職史故徃徃以銘辭見屬嗚呼試㸃檢前後所為銘其如中郎之愧辭者有之乎無也余進而位于朝不能信予奪于其史退而處于鄉不能信予奪于其銘是予罪也雖然予奪非予之所敢也是以欲絶筆于銘焉其或牽于一二親故之請有不盡絶者則謹書其姓名里宦系世卒葬月日此外則不敢輕置一言雖不盡應古銘法亦庶幾從簡近古之意焉墓有銘有表表亦銘也今予所為表者是維按察司照磨吳君之墓據君之族孫進士禎所為状君諱文字從周號鯁齋世為無錫之閭江人大父諱某云云君少讀書為邑諸生後援例入太學凢兩試不中第已而選福寧州幕官陞山東按察使照磨不赴任遂乞致仕家居凢幾年病脾一嵗卒嘉靖某年月日也年七十有五墓在閭江第二灣祖塋之次葬以卒之又明年某月某日将葬君之二子忞慰詣余請文而君族弟從夏實為之先二子且致君遺言曰吾死汝必于唐太史乞言焉從夏為吾母任宜人後母之弟其人恬靜有守余雅重之故其為君請不可辭而余嘗兩㑹君于京師其氣温然謙厚人也始改官而乞身賢乎冐競不知返者君之遺言又如此嗚呼君豈以余不能為愧辭也乎故余叙所以不敢輕為銘之説及所以銘君之故而謹書君之姓名里宦系世卒葬月日為文而授之忞慰使鑱諸墓上明文海巻四百七十二
