body:
  text: 明文海卷四百七十三餘姚黃宗羲編哀文一汪尚書哀辭汪仲魯至正十六年乙未八月丁丑長鎗畔將鎖南班陷宣城前嘉議大夫禮部尚書汪公死之或謂公告老間居為日已久可以無死嗚呼是豈知公者哉忠誠之存靡間今昔不死則辱在在皆是况宣之城守得完數歲無遺者臬司守將惟公是咨逮城陷而公執義就死非邪是邪頃見老成數輩與公同升於朝名望夙著一旦臨患難隱忍幸生俯伏周旋勳名委地莫顧人指笑則公之死是邪非邪仲魯與公同出唐兵馬使都虞候公嘗歸婺源率宗族祭掃武口大田先塋過鄉里不以仲魯貧窶而外焉兹已二十有餘歲公之行義卓卓載史册惟公之死關乎世教不可以無言也遂為之辭以哀之其辭曰天幽幽以杳然兮日黯淡而無輝海氛騰而鰌蜃舞兮河橫潰而漰馳悲夫人有生兮委草木而同隨孰篤信而秉義兮偉英傑之猷為惟松柏之孤植兮糅羣芳匪異姿霜雪慘而交墜兮色貞毅而靡虧嗟哉夫子兮夫豈異兹間居日已久兮忠藎猶一日也民皆君之赤子兮城闉亦君之廬室也憂君之憂而靡忘兮天穆穆猶咫尺邦民惟吾視瞻兮吾舍是而安適城之存吾與存兮城既隳而吾將安匿死義以酬君兮殺身以成仁中庭危坐兮曷有其身罵賊聲不絶兮惟志之伸嗚呼哀哉揭日月以為明兮昭天地之常經彼偷生以全軀兮類禽犢之冥冥蒙羞被恥不顧慮兮反議先生以不必死世豈昧夫公論兮錫文節之嘉諡敬亭兮清秋雙溪水兮夾鏡流惟先生之髙風兮邈山川之悠悠些吾文以敬弔兮日西墜而雲愁余左丞哀辭汪仲魯武威余忠宣公名闕字廷心曩以色目第一人登第內任翰林太常外官州郡省憲文章政事昭昭在人耳目退處金斗之青陽讀書一旦被命為左丞守安慶方危急之秋即日就道撫其疲民羸卒百戰抗賊誓與城存亡凡幾越歲終以節義昭史册其傳即今翰林宋濂所撰昔公僉憲浙東時見仲魯送戴璩教諭三詩數見問故待制鄭玉還自金華俾仲魯往見之殊蒙許與且言易之一經嘗求得古書考索積思有年遂得見易中一句盡出河圗洛書自秦漢以來人未之見今幸偶得之方將注述成書以貽後世然未敢輕也仲魯再三舉一二疑難叩問但言子且用工此經五七年後相見當以吾之所得者相告非有隱也子必用工日久而我之所見者端確然後可以面商訂爾不二三年而兵革動海內不相聞壬寅春上同安詢知有王無霸者專為公謄録所注易書因求王生詢之無一字存亦不能識其一語向嘗見公答鄭待制及與江西友人書其語與昔之言無異旨痛哉故率諸友生理其塋墓而致祭焉為辭以哀其辭曰大江西來兮波千里而東馳皖山峻極兮鑱雲漢之巍巍嗟夫子之真烈兮揭日月與爭輝岌岌同安孤城兮抗巨賊越歲年兵食絶而援寡兮民之死而靡遷唐睢陽之張許兮論孰為之後先昔公之志于學兮夙忠貞以自許文魁先其匪議兮非古人吾誰與政事隨以昭兮辭翰恆譽處易深探乎化原兮妙達乎象辭之根謂經之字字句句兮或出乎河洛圗書之文自秦漢以迄今兮人莫之見而獨吾有聞惜述注之良苦兮泯焉未有傳也豈天之喪斯文兮抑神之祕而弗吾宣也悵金華之涼宵兮那忘乎懇欵之言也遡江流而西上兮羌徘徊乎古舒弔遺迹而詢故老兮酣百戰于城隅拭殘碑而灑涕兮大節堂之渠渠城之南峩塜兮羞芹藻而薦芳風蕭蕭而蓬偃兮日黯淡而無光跪斂袵而載奠兮慨今昔而靡忘鄭待制哀辭汪仲魯師山鄭先生名玉字子美隱居講學善為古文或以黃犢駕小車人或笑之識者竒之嘗搆精舍于里之師山其堂曰三樂踞岡為軒曰極髙明集諸朋遊討論春秋筆削之旨為之注釋曰春秋闕疑至正甲午朝廷用大臣薦遣使以翰林待制召先生起而拜命束書就道道中疾作遂還山適大軍駐吾新安遭謗捕入郡不屈而死卒以節義顯名列史傳仲魯辱先生之愛者每過山下仰睇羣峯遺趾如昔草樹凄迷豈勝悲慨抽辭哀些敬酹一觴其辭曰遡練溪之寒瀨兮睇師山之崇崇仰三樂堂之遺趾兮森莽莽之荒叢念昔松篁茂鬱兮奐堂搆之方新友朋紛其來集兮濟冠佩之如雲繄先生之剛直兮懼師道之莫立也申義利之辨兮謂聖賢可企而及也春秋述而闕疑兮易經傳而有成釣岑山之深峻兮牧西疇而耦耕方逰息而玩樂兮聲聞逹於明廷詔倐降九重兮徵待制于翰林宜弭亂之有䇿兮闡治教于來今遏半途而遽疾兮還乎吾故鄉豈終不能以有達兮孰若遂初心之遁藏慨浮雲之萬變兮亶不可測也名匪為身纍兮義之歸乃吾責也情沈鬱而靡申兮蔽而莫之白也從容就死兮吾心安而理得也吁嗟先生既往兮節義昭猶日星名存史册而不忘兮粵千古而彌馨徘徊兹山兮糅草木之羣榮酹清觴而灑涕兮惻林鳥之悲鳴陳狀元哀辭汪仲魯浚儀陳狀元名祖仁字子山壬午科以漢南第一人登第廷對䇿忠厚懇切天下傳誦謂有漢意繇翰林編修遷太常博士以憂還京口辛卯春來新安以葛元哲髙則誠二進士書邀趙汸子常與仲魯偕逰黃山孜孜講學不少輟論詩法甚詳别後數書相規勉期望殊切且言天下將多事惟紹興風俗淳厚薪米易得約同遷于是以待天下寧宴更以兵阻不相聞近觀史傳方知其在朝議奏折姦扶危忠君愛國辭氣端確昭如日星終死于義是故追悼之以辭曰瞻黃山之􅍶崒兮三十六之竒峯念昔陳子山兮來躡仙子之遐蹤招豫與同逰兮駕天風而戾止朝浴乎丹砂之泉兮夕攬乎玉蓮之芳蘂凌天都之峻絶兮以周觀乎八紘慨生民之庶富兮化殆漸乎四溟何風濤之蹴天兮乃豫違而逰乎蓬島羣仙耽夫燕逸兮至于君豈同造舟顛覆而將伯助兮終莫究其摧隳大厦勢己傾壞兮夫豈一木之能支九廟棄弗顧兮輿翠鈿以自隨君倣徨將安適兮當奉主而北馳成敗詎能計兮矢吾心而靡渝恭執事兮登載車排國門而出兮死生與俱竟殺身兮委骨丘墟皇天鑒厥精誠兮魂昭陟乎帝之居曽日月之幾何兮丹青著其名譽披史傳而長太息兮悼往昔之無巳軒轅峰猶萬仭兮倚寒空而遙峙哀見君而不再得兮颯秋風之夕起程禮部哀辭汪仲魯前禮部員外郎程公名文字以文號黟南生吾邑人也孝友純至奬勵後進不倦蚤逰燕文章行義為諸閣老所推許然安分恬退不務進取中歲始為郡博士任懷慶滿考來京師適賀相當國人有薦公于賀者乃求公文余廷心貢泰甫就公索之堅拒不與二人索之朋友得數篇以進賀相焚香拱讀稱嘆不己遂有翰林編修之命選除御史轉任禮部賫賞天台方氏還寓會稽之錢清僧舍道阻不克歸一日張氏遣使逮紹興路官以厚禮來饋公堅卧不顧既而兵四集乃往杭主貢泰甫晨謁丞相達實特穆爾還卧疾張氏之為平章者就謁公擁衾面內卧不回視遂移卧西山僧寺一日疾果篤召泰甫而諭之曰吾以纍子埋我兹土勿為塜可也泰甫為主其喪葬後大軍至墓皆被發惟公葬所以不塜免丁未夏魯與邑人汪炯之杭往西山求公墓弗得還西湖書院求所刻文集讀之不勝悲慟遂哀之以辭曰萃材兮棟梁美輪奐兮廟堂翬飛采絢兮跂翼而鸞翔公之文擅一代兮諸閣老誰與頡頏進不競榮寵兮退焉與心修藏賀相喜文繇我知兮劃乃徵吾文章豈溝中之斷棄兮尚可取而青黃郡博士嗟久淹兮一旦致身乎玉堂峩豸冠兮馬行桓桓官禮部兮仰依日月之清光倐航海而南兮老將旋豫之故鄉天台險絶兮留會稽而徜徉病少駐乎錢清兮張胡為乎承筐有將卧不面顧兮勵貞節吾何敢忘兵革四集兮遁西北其孔良輿疾遄往兮吾願瘞骨乎此坑貢公素相友善兮託之斂以襄悠悠天地兮吾終焉其允藏嗚呼陟吳山兮逰鳯凰江山如昔兮蘇堤夕陽求先生之墓而敬弔兮萋露草之荒荒反湖西而容與兮披雄文于頖庠奉讀而長太息兮浩海濤而飛霜王進士哀辭汪仲魯王進士名銑字伯恂吾婺源之範溪人宋奉使昺之裔也才思俊逸人夙推服甲申領江浙鄉薦丁內艱戊子春試春官擬置魁選或以帝車賦黜之既而自悔其誤交相咎責訪問謝過薦為翰林編修辭以親老而歸壬辰蘄黃冦陷饒徽癸巳夏舉義設䇿應官兵以復郡邑退則講學于鄉里乙未冬冦復至乃應樞密院判哈密之招往德興見之還喻巨室胡伯振從義冦覺之臨難不屈死之伯振亦遇害嗚呼如伯恂之俊發超邁人固罕及而終死於義其可泯邪仲魯既不揆而銘其墓復為辭以哀之其辭曰氷潔兮日輝古鑑懸兮絶纎翳才華天造兮人力曷施清波芙蓉兮匪雕飾乎聲詩文不加點兮夫豈讓乎衡為才美信若是兮行義虧又何貴學與文尚有逮兮孰知先生之死義雪慘裂兮草枯而風利原隰求而斂殯兮有同宗之諸昆季堂封深固兮樹森鬱乎坑臯浥湛露而重省兮悽猿鳥之悲號空山木葉兮聲蕭騷靈爽英發兮惘愴薰蒿墓銘有碑兮將鐫置乎巖坳徘徊而不能去兮我心忉忉日荒荒而雲暝暝兮激松風之怒濤朱縣尹哀辭汪仲魯遂安縣尹朱倬字孟章歲辛已領江西鄉薦登壬午第授某州同知以憂家居服闋授文林郎遂安縣尹庚寅同考江浙鄉試既出院會于椽郎葛元哲之坐因詢仲魯詩經無封靡于爾邦義作如何破題答曰己在孫山之外夫復何言元哲曰此友非特義髙賦尤髙一破自當首薦因誦之曰崇德報功之典賞延於後世修道全德之化法本乎前王詠嘆之至者感慨之深也孟章愕然曰此篇己録全文在卷中諸公同擬作本經魁竟尋賦䇿未見移文謄録彌封所亦對字號不同誰不惜之且索甪端賦元哲曽録之出與之觀三復擊節稱歎元哲又曰此公志存乎古人之學得失不挂念由是孟章相與遊情義甚至且與李亷諸公皆來相見因約來春過遂安明年春仲魯往留一月嘗自嘆曰倬登科十年未霑寸祿其命也夫仲魯應曰不患無位患所以立故君子行己立身惟安義命不以外至者動其心也孟章殊服此言壬辰秋冦繇開化趨遂安吏卒逃散孟章大書于坐曰生為大元臣死為大元鬼禍患從天來不死復何以乃坐公所以待盡冦以邑虛無人而焚之火逮廨舍乃赴火死後竟無傳其事者可哀也哉追以辭其辭曰疾風兮草萎徑節兮靡移繄遂安之賢尹兮厲真操其匪虧邑小而荒僻兮氓其蚩蚩令初下車兮即興學而誦詩夙夜孔勤兮化洽而民熙一朝冦忽臨兮靡兵備其孰禦民駭而卒逃兮誰與獨處冦豕突兹邑墟兮劃煙燼其棟宇豫執死不二兮天明明其吾與夙披簡册兮矢致身乎忠良况瓊林之燕集兮堯舜君民之有望憶武林之嘉會兮豈徒事彼文章行與義之有在兮望聖謨之洋洋歲忽忽其巳逺兮心耿耿其莫忘川悠悠而波逝兮山靄靄而雲驤思賢令之不可見兮長向風而哀傷姱修之不可渝兮發斯文之耿光亂曰學端以粹質之純兮顯擢甲科名譽臻兮十年未祿笑命之屯兮牛刀小試絃歌陳兮變故莫測奚衛我民兮之死靡忒惟志之伸兮是謂殺身以成仁兮哀志士辭宋濓竒俊之士無世不生特時人弗識之或識之而弗能用或用之而弗能盡其才所以聲光不流於當時事業不白於後世豫竊悲之庚寅之夏因覽元好問所録金之諸儒自辛願而下凡五人見其氣節剛方言論磊落實所謂竒俊之士者也雖其行事或未能無過終非齷齪陳腐懨懨不振者所可冀其萬一然恨其有志而不能遂也因擬其大略𨽻于各人之下又從而哀之以辭辛願敬之福昌人年二十五始知讀書音義有不通者搜訪百至必通而後己由是博極羣書且善于文辭尤以是非黑白自任每讀人詩必為探源委發凡例解脈絡審音節辨清濁權輕重片善不掩微纇必指如老吏斷獄文峻網密絲毫不相貸雖貽人怒罵不恤也性踈宕不修威儀貴人延客願麻衣草屨足脛赤露坦然於其間劇談豪飲旁若無人家甚貧衆雛嗷嗷張口待哺負高氣又不能從容俯仰其枯稿憔悴流離頓踣一假詩以鳴雖百沮之餘其耿耿自信者不少變元光初李獻能元好問在孟津願往見之獻能為設美饌願放箸嘆曰平生飽食有數每見吾二弟必得嘉食明日道路中又當與老飢相抗去矣會有一日辛老子偃仆栁泉韓城之間以天地為棺槨日月為含襚狐狸亦可螻蟻亦可耳聞者悲之辭曰天生爾才胡不汝騁麻衣如墨下不掩脛下不掩脛不過寒我我食無所我生其可水豈無藻山豈無薇茍非吾有我敢采之市魁屠伯彼豈無食我腹雖虛我腰肯折抱節而終我則奚憾烏鳶螻蟻上下何辨爾貧固甚爾守則多不義而富其如爾何李汾字長源平晉人曠達不羈好以竒節自許避亂入關關中無一人敢與相軒輊者元光末用薦書得從事史館從事職名謂之書寫特抄書小史耳汾素髙亢不肯屈世乃今以斗食故人以府史畜之殊不自聊館中諸人又多新進小生史家凡例或未能盡知就其所長有不滿汾一笑故刋修之際汾在傍則蓄縮慘沮握筆不能下汾正襟危坐誦左丘明司馬遷文數百言音吐甚洪暢誦畢顧四坐曰看秉筆諸人積不平乃以嫚罵官長訟于有司證左相半踰年不能決右丞師中遣東漕掾置酒和解之尋入關驅馬來京師日以馬價佐歡道逢怨家則畫地大數而去會恆山公武仙在鄧汾往説之署行尚書省講議官既而參知政事思烈與仙相異同懼汾言論遂害之汾孝友亷介過人者甚多寧寒飢而死終不作寒乞聲向人又善為詩清壯磊落有幽并豪俠慷慨之氣人以是稱焉辭曰奎星光光今何其昏大河東流遑恤無人金匱石室藏我册書豈伊羣兒所堪穢之我言弗信弗信從汝丘明雖鬼其文不死既不我嘉覆謂我僣我視我觚有淚如霰黃霧四塞黑白誰分彩鳯無華山貍有文悠悠蒼天曷其有常自古莫不然爾又何傷劉昻霄字景元一字委房陵川人聰敏絶人或戲取市家日厯鱗雜米鹽者令讀之一過無脫遺以故其學無所不窺六經百氏外世譜官制與兵家成敗為最詳為人細瘦似不能勝衣好橫䇿兀坐掉頭吟諷幅巾大袖談辭如雲四筵聳聽噤不得語遇其飲酒眼花耳熱後其鋒愈不可當不知去古談士為逺近餘子不論也嘗用門資敘調慶陽軍器庫使不就諸公方薦試宏辭未幾卒辭曰陋儒拘拘以簡為常目視環堵不知有四方狂瀾既倒誰復回之氣蓋一世獨爾能之上自黃虞下逮五季一隙必燭何有幽邃或觸其機談辭如雲誰非男子有舌無聲我豈誇多我豈鬭靡一物不知吾儒所恥獨立千古上遡寥絶爾身雖窮爾名豈滅雷淵字希顔别字季默渾源人崇慶二年進士授涇州録事不赴改東平府録事以勞績遙領東阿縣令東平河朔重兵處也驕將悍卒不可制淵出入軍中偃然不為屈不數月家有淵畫像雖大將亦不敢以書生遇之調徐州觀察判官召為荆王府文學兼記室參軍轉應奉翰林文字同知制誥兼史院編修官拜監察御史巡行河南搒掠贓吏風采凛凛蔡下一兵與權貴人有連時以藥毒民家牛馬以小直脅取之淵捕得數以前後罪杖殺之老幼聚觀交口稱快然亦坐是失官尋用宰相侯莘卿薦除太學博士再遷應奉終于翰林修撰纍官大中大夫先是正大間元兵突入倒回谷勢甚張平章芮公逆擊之突騎退走填壓谷溪中不可勝算諸將議不定釋之勿追淵請急殱之主兵者不能用後聞北兵狼狽而西馬多不暇入御始悔不從淵言淵學甚博文甚竒為人軀幹雄偉髯張口哆顔渥丹眼如望洋遇不平則疾惡之氣見於顔間或嚼齒大罵不休雖痛自摧抑卒亦不能變也食兼三四人飲至數斗不亂生平慕孔融田疇陳元龍之為人雖其文章號一代不數人在淵仍為餘事耳淵之友髙廷玉李純甫亦以竒節自負人號之為三傑云辭曰爾心之徑爾氣之剛嫉惡如仇不問暴強將指出巡面冷如鐡霜簡所加邪蒿即折才豈止斯兵算又長眼見千里孰曰不明志不獲伸多士短氣其書徒存九原能起埃風四來式脂式韋有髯如戟妾婦之為我俗之昏誰復繼君茫茫九州敢謂無人雷琯字伯威坊州人志英邁博學能文以薦書從事史館調八作司使初并州李汾與琯同在館中以高蹇得罪琯往送之信陵攜酒酹魏公子墳握手痛飲後去客陽夏以鞭擊酒壺作楚聲歌自言去國十年甲兵滿天地短兵匹馬來自西北將起楚漢間竒才劍客與遊而不可得當是時金巳遷汴大河以東北盡山東西抵關輔大軍長驅徙少壯數萬人殺之居庸關外自黃河洛陽三門析津至丕之源雀鎮凡二千餘里潼關一帶西南邊山大小關隘亦一千餘里各分地界統以總帥夜則傳令坐守冬則燃草敲氷兼以關輔大飢秦民死者相枕藉琯皆悲之作商歌十章寫其情曰秦豫父母國也而一至此乎竟淚下不能食乃出竒䇿白宰相宰相不能聽琯去不知所之辭曰北風泱泱海水為竭俯視神京不隔一髮舉鞭擊壺歌聲愈苦來自西北短衣匹馬我淚既盡以血繼之天門九重曽莫聞知孰秉國鈞我將自薦反謂我狂斥去如箭商顔有芝豐蔚葳蕤可以葆神可以樂飢長往不返誰甘幽深赤日在天亷明我心祭胡仲申文方孝孺上下百載四方萬里心所敬者數人而巳惟數人中少達多窮或困其始或艱其終謂天使然天實何故賢者奚為為天所惡謂為偶爾智力可圗孰云君子不及鄙夫人之所重天之所輕其所至靳宜與禍并汲水于鄰終世不怒試攘珠玉挺劍相顧造化之機變怪詭竒恆以示物使物莫窺儒者多言抉發幽祕陵轢鬼神譏切天地人之至情忌人揣摩矧造化者寧不譴呵是以賢哲多困不逢百無所能乃宜公卿富貴一時電滅漚起有以自立百世不死較其所獲多寡可量肯舍八珍而取糟粳嗟若先生其又何悲不競斯須千載是貽命不榮身祿不逮嗣人以為報道不在此其中所蓄月朗日溫著為文章追配古人風雲之變江海之深元酒太羮粹璧精金惟所欲言無不如意聲名赫奕昭灼當世曠視宇宙奚古奚今有盡者身無窮者心凡人所難深探獨得余復何嗟為天下惜斯道不振文弊質凋環目顧之一何寥寥兹巳可憾聞者嘆咨况在不肖嘗辱見知違濶幾何墓草巳宿音容儀度宛在耳目後先相禪若晝夜然敢謂寡陋不圗其傳已死而生逾逺彌耀敘奠矢辭如己是報哀唐衢辭王達唐衢韓公退之同時人也性耿介落落有大志不妄與人交人亦莫知其所負衢于學發憤研究不少自廢然纍舉不中人咸笑之衢則不以為意也衢能詩詩多悲思激烈而感創讀之使人慨然有動于中衢往往見人文章有傷激者必大哭涕泗滂沱而弗能已每與人言論既别發聲一號竒韻嗚切聞者莫不為之酸鼻人皆以衢善哭而不知其所以哭也獨退之識其人贈以詩曰虎有爪兮牛有角虎可搏兮牛可觸奈何君獨抱竒才手把鋤犁餓空谷當今天子急賢良匭函朝出開明光胡不上書自薦達坐令四海如虞唐退之之意詎非以衢之才回出一世而反不逮乎瑣瑣者邪樂天亦有詩曰賈誼哭時事阮籍悲路岐唐生今亦哭異代而同悲而樂天以誼之才方衢矣舊史附衢于退之傳後新史則又削之何君子命薄者有若是之不偶哉吁有人負竒才如賈誼當世既莫知之後世又莫知之不既深可悲乎俾無退之樂天則天地間空生此材矣是以君子貴成人焉天遊道者讀退之樂天二詩深嘆衢之不偶作哀辭于千載之下炷香杯酒酹衢于千載之上仰天大慟衢其知邪凄風西來吾知衢不能不知我心也辭曰蘭生於幽谷兮為衆穢之所翳玉産於崑岡兮以碔砆為同類匪良玉之靡良兮寡不能敵衆嫮之聫勢衆勢之聫兮固己密比而難攻此芳馨之潤潔兮幸不掩于匠目之與春風衢乎衢乎爾材雖竒兮何造物之靡通但千載之下識衢之𢎞濶兮賴樂天之與韓公世之媕婀讒嫉擠人於極地者讀二公之詩兮烏知其不額泚而心懵明文海卷四百七十三
