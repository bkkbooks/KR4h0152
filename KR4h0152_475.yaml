body:
  text: 明文海卷四百七十五餘姚黃宗羲編哀文三祭甘泉先生文何遷道本無窮誰其尸之必生先知以覺後知乾坤不毁其寄在兹慨自洙泗迹熄濓洛繼興千載邃旨曠代可希而再傳以往復蹈支離無以究性命之微夫崇見聞遵途轍依傍門户若足以間尺度然默而識之由仁義行見天則而知化育則或辨以毫釐故夫道之不明也儒者何遺論焉奚只竊奧義而助老佛者之為足嗤宋賢既沒踰數百載而後先生出先生之學受自江門曰以自然為宗實其淵源乃廓而著之闡密統以詔來世先生固力任焉亦以明覺我者之能開先夫見聞途轍彼所沿習者苐世守乎前言爾先生出而后知此學惟在此心見聞途轍適足以益支離之糾纒先生之言體認天理天理者天所為故曰自然怵惕孺子與物為體孰安排之此我命根茍由前言反身而識之其識以天是之謂默此機生生仁義時出不離體認而宰萬化之原斯於前言乃為蓄德而非以傷煩竊聞先生天質完粹一見江門托以墜緒始也物感不交文義皆廢默坐以觀端倪在睇既而疑之放乎隨處請於江門曰學如是忘助兩忘貞明如立與化周流一致百慮以此復乎自然庶幾師傳不二遂奉母命與時變遷委身行義敷教作士必使一物不違六經親見斯足以明道而悟焚檄以居者之非事天講筵陳善辟雍育賢機務即戎邦禮明禋雖魁柄不持猶阻于名世之遇合而贊王明膺簡任風動乎朝列亦已罄乎力之所得捐爰自立朝至老而及乎天關無一時不講業無一夫不與善所過必有館穀有訓語周覽于燕齊吳越閩楚之區及門而遊者三千九百餘人而先生畜持不倦年踰耋耄猶走數千里再倚杖於祝融之巔所謂不知老至今見其人彼駭習見愕竒蹤以謂只此可以稱仙是惡足以窺先生之拳拳蓋先生清明如神萬緣不染獨聞帝則出入遊衍終日流通乎昊天明旦羣動隱顯之間扶圓景而昭河漢托英華于百氏析微辭于墳典抽毫湧泉衝口琬琰於凡載籍以來格言大義揆方祛偽注腳悉驅亦以大明乎先王之撰由是以觀雖其藏密皓皓不可度思乃發自然於詣極通天地萬物而不遺此學復明將使世之學者即心印古不為訓詁格式所沈錮明興以來自先生始豈其微哉至是而後知先生鄉也嚴於靜專者立大本而出經綸而其刋落文義將以緝完經而翼往聖彼以枯寂擬者既失其精神以勳庸病者亦蔀於時會而以泛愛立言為贅抑以知先生所存不徒在是執是以求亦足以依形聲而卜底止僅得其似而巳遷方弱冠沈酣傳注讀先生書未及終篇輒爭同異比卒業於成均因摛文以待試先生呀然置先多士乃語周子道通蔣子卿實相屬日集顧遷膠執舊聞疑信交臆已而進覿德容退覩行事飲睟盎而氣平被儀刑而神醉乃始喟然而起悟言説無關乎性靈愧口耳靡端於學力倘察見本心以驗合否信沿習之多左盩時引宗旨以參同遂忘言而若契於是俯仰今昔自謂得師摳衣牀下昕夕指揮由靜基動合一為期有事無事長裕隨之侍席半載稍歷階梯先生北上遷亦西歸再見京邸指劈偲偲雖未能遽達乎語上之境然返支離而聞邃者先生實開之亦坦然其有步趨竊闢鄖野同方共勵輾轉歲時何云繼志遷乃深省指天自誓惟嚴顧諟翕放在我雖緒論師説不留胸臆儼躍如於眉端欲罷之而莫去日用糾紛我若無與然後證諸古訓若皆陳吾所有而導吾所至故自居深山官二都每列蠡測稟教羅浮妄意宗旨離否有無先生頷之每報書曰不泥吾説斯乃吾徒間與卿實班駁咨諏先生諭之點雪紅爐遷益自信竭才可圗遷在豫章願聞訓語亭銘生生堂記默識提耳發蒙手澤可挹曰此吾無窮之托吾將再入武夷見汝川裔遷拜稽首南望下泣馳使逢迎剖中以俟蓋先生夢奠之前歲也詎意龍蛇之辰先生永棄俄而踰春訃音乃及嗟乎悲哉造膝幾何吟弄是冀豈道不可傳抑教難其繼緯繣一時摧煎五內誰歟廢興為此乖戾嗟哉悲哉乘化全歸先生何心山頺木壞我輩奚親念真詮之中格渺後死其疇任悵粵山交海以隕涕遡心喪築室以含情緘哀一奠函丈如臨倘英爽兮不昧將謂遷智足以知而學不足承亦或有慨於斯文會葬膳部陳伯符先生哀辭孫𢎞祖夫死生者造化之期窀穸者神靈之宅先生行矣庶其宅矣顧先生徑氣頓于下位壯圗屈于短晷遐名痛于無嗣浸而一棺戢身浸而曽泉閉骨悲感逖邇慟興戚故况余因緣接事知巳之恩有情同喻馮棺而弔景響難尋望墓而哀松楸堪斷猶庶幾束芻攬涕敘生平之懷也其辭曰伊夫子之典型值末流之昌披稟百錬以不化撫千丈而無枝固弱志而強骨豈色厲而腹夷羌翩翩其羽翮冶都士而貞儀披瑞錦以懷香擢水鏡于洛漪既圭璋之文府亦桃李之芳蹊排金甌之闕紀泣玉階以申規苟擇利與近名何荃宰之莫比雖在官其日短實大雅之在兹臨龍阪之峻邈載仙舸之渺瀰嗟余躬之落拓被夫子之渥私晨奉履而絶倒夕前席而相吹章世寶之髙價昭有道之絶期嘆常兒之作遇痛國士之數竒先生與余書足下素衷蔚藻望之知為世寶與家世父書談文説理磊磊偉器若布素儉質居然有道也與家尊書兄有佳兒雄文力學固其餘事惟是識趨卓立服食清素願勿以常兒目之雖牙生之非耦顧鍾子其曷差指絳帷而有請懸空隴以何為余嘗欲北面稱弟子而先生卒捐館舍因從門人後治喪恍青簡之尚映悲宿草之浸夷羊叩扉於西路阮慟轍于窮岐殆白日而欲寢將沒世不可期彼大造之不馮故人事之多詒嗟松摧而鶴捐慜蘭湮而芝萎鮮百年之遐齡靡一旦其孑遺弔樂安之壁立惜南陽之幕垂夫誰人而不死先生死乎誰歸靈輀蜿其臨路靈裯襲而空遲反而真乎潛肂畢天命乎塋斯閟寒泉兮不曉黯熒燎兮何時風颯颯而低掃猿噭噭而傍洏埋彌天以朽壤冀綿神於天逵固濛亡而粲夭亦式奔而楚思信國家之可惜轉風流之相悲搴桃花于水上聊執蘭以招之茍盛靈之孔降我稅駕而同歸哀乞者文戴洵嘉靖丁巳年四月作時家新被燬破屋一間風雨不庇衣食蕩然得麥飯甚喜乃聞乞聲感而哀之云耳伊大鈞之播氣維衆靈之流形均父母乎乾坤胡榮辱之殊名逮形勢之反覆奮智力以相并故有貴而且富兮又或賤而且貧彼安居而美食此行乞而零丁于是色如稿灰形若枯枿瓠鉢懸腰鶉結蔽膝或手當其目或杖代其足無地不到何門不入依酣歌而流涎聞犴號而屏息其求之也悽悲其得之也秒忽蓋贏餘之無望而聊夤緣以度日嗚呼何為其然哉若乃祖積宗纍燕翼貽謀自少及長有喜無憂覩陳紅而燕溺朋曳白以效尤口不離盞斚耳不離歌謳身不離樓館足不及田疇一朝罄盡四顧悠悠任妻孥之離散背鄉井而藏羞悵舊歡之己邈托生計于哀求及夫偷兒博徒官𨽻私商玩法恣己習以為常陽施隂取自誇強梁智窮數盡置身圜牆資儲籍沒配斥逺方縱心計其安施徒望屋而倣徨至若遼右開邊閭左興役掩淚辭家誓心報國奮一矢以加遺衣三屬而纒束方主客之紛拿警塵沙之蔽目力創痛以潛逃脫鋒刃於交觸始畏死而求生終功虧而名辱念故里之尚遙顧行囊之無粟茍道路之得前何嗟來之弗足復有歌臺妙響舞榭纎腰流蘇夜暖香霧晨嬌手不知織身不習勞忽顔色之消歇嗟淪落其無聊緣庭除而顧盼維仰首而長號是知事出萬端理惟一緒雖命運之不常總驕荒之所致口盈寸而軀六尺兮何凍餒之莫措儻慎持乎初心兮豈顛迷於末路豫子漆身於趙市兮至今有耿光非自罹之故兮雖辱己其何傷何羞惡之盡喪兮甘呼蹴於膏粱君子寧守正以俟死兮豈偷活於草間嗚呼爾則不淑兮尤不爾尤笑奴顔婢膝者之相悅兮反自以為良謀曽富貴之幾何兮乃逐逐而不休寧取譬於墦間之齊人兮又奚獨於爾而為羞我聞古昔兮稷契伊周一夫不獲兮以為己憂四海同春兮民咸嬉以遊安得斯人布列於朝廷兮庶無負吾之同胞祭萬古齋文唐順之庚寅之歲余客陽羡公來顧余實始識面識面之初遂以知心朱絃白雪相與賞音惟公老成行方志古余也何人自知踈鹵豈足禆公辱公節取過則相規善則相許一日過余奉幣以告余有二子煩君教詔佛廬仙洞水曲山坳攜壺擔盒與余相邀花木玲瓏禽鳥啾啁流目傾耳永日逰遨或時閉門對坐一室竒文共賞疑義與析清言不足或繼以奕晨食相逢忽焉日昳余有所往不告於僮僮來相尋知必在公公命家人為具客食家人不問知余為客綢繆往復踰四五年曽無一日曠不周旋公訓桐廬余赴宫寮心豈不邇其地則遙逮公解官余亦屏居握手一笑歡言如初通家之誼婚媾自此公有女孫以字吾子朋友或言師生之拘公曰何妨古有蔡朱尚期白首賴公劘礪公不我留忽焉厭世屬纊以前神氣清皛顧謂二子事豈有了荆溪山水昔陪公遊余今復來愴公其休死生常理抑又何怪不敢負公恃此心在與公二子敢忘切磋尊聞行知矢言勿磨窀穸在兹舉我觴奠敘往悵命公其我鑒祭項甌東文羅洪先嗚呼嗚呼尚忍言乎往憶同第君為壯夫十年以長比屋而居余喜談學辨晰陸朱居默熟視弗厭弗俞負疴而南君司水符鑾江之上下榻維艫時疫甚熾僮僕告痡豈無姻友過門而趨君為心惻時來𨽻胥薪水是給分廪與蔬或朝就問或午或晡欵欵耳語撫床及膚衆畏其染勸勿過迂君咈曰嗟胡是之拘人且效尤孰侍孰扶孰汲孰爨病孰與蘇豪猾王紀干法以逋逮及弟績既伏其辜彼瞷在厄斧喪槖虛數萬來賄介以名姝日夕屏伺間露揶揄枕席微覺奮起索驅託君間衛防人苞苴縱忍貧死不為利汚君向鶴翁駭而長吁凡今談學睢睢盱盱考其曲衷有氓弗如孰如羅君至今不踰浮沈淟涊豈斯人徒從兹莫逆意氣益孚幸其獲瘳酹酒歡娛十有五旬乃判征裾不賴仁者必委溝渠厚德未報空此頭顱亦再離合情親亦踈遙聞宦轍南北載徂巳酉之歲停橈見諏劇談晝夜玄潭為枯綜經錯史鈎玄考圗守默為誚期必著書辛亥過嶺枉道山廬信宿不舍更出緒餘尺書往來時舉一隅毫髮未契輒見責誅力辨性體知止之殊余亦不讓囊傾錙銖塗畛違越期之桑榆炎風播虐傳聞不虞拒以福善天道豈誣言者三至失聲驚呼身如可贖寧惜微軀孰為問疾如君劬劬方俟櫬返長號路衢事左不偶莫致束芻君之大節更僕莫敷父子授受兄弟友于視欲鴆毒味道醍醐古昔是鏡檢點為奴室無姬媵門絶祝巫知希者貴戰勝弗癯載論出處偃蹇﨑嶇寧淹郎署不媚鈞樞翔鵷嚇鼠老馬隨駒人皆化茅已獨守株麾移三郡剡騰兩都庭謝刀筆野頌均輸昔病毒徭有梁可踰昔困委積有懸使車逮登藩省益峻而孤貪夫在位封豕孽狐亦有強宗如虎如貙斷摶獰猘如揮湛盧氛消海市日靜郊墟楚歌來暮忭舞于途粵人飲食祝而後哺凡兹巨細咸足範模使據要津定亂訏謨兼收衆美自可枝梧豈無才智轉圜應枹豈無文采章煉句鏤背善邇俗曽是弗愚必如君者始可謂儒奈何弗憗毁璧隕珠古云難諶殆其信諸悠悠後死何益有無念出再造目斷心瞿因悲弱質曷異栁蒲九京閴寂百年須臾尺寸不立與速朽俱感此盟心君聞否歟嗚呼瘞溺文羅洪先舟發采石阻石尤泊和尚港從而泊者以百數既三日有五人駕艫揚帆行顧泊者若嗤其不遇意揚揚甚得也是時江水怒號白浪屋起雨霰交下晦冥慘烈逾港口檣傾舟覆五人皆溺余乘髙望之或援舟舟水滑復墜浮沈浪中有頃抵岸其三人少而強奔入野舍弱者僵于步而老者仆于涯三人莫顧也余與劉良溪王有訓及弟邃夫各分薪米遣人掉艇子往救之奔者得食僵者蘇而仆者則己死矣問其鄉為江州姓與余同而年且六十其身則四人者傭也悲夫悲夫人之為傭利求直耳當其揚帆以行也豈亦快其得直之速而不虞其禍及乎抑身有所質分卑力微即有言莫之或聞矣乎其既溺而奮起也亦思有以自脫乎抑尚急人之難而不顧其身矣乎其倦憊而就仆也膂力衰乎抑飢餓摧苦過勞積損而不勝其困矣乎其傭也備使令乎抑以善遊自名輕險阻效操作於棹工篙師之間矣乎然吾見傭者矣生也用其力死也棄其骨其賤薄等馬牛然幸不食肉寢皮耳其何利之有今四人者雖以身免欲不為傭不可得也其能為傭身計乎乃捐金市槥令四人瘞之江滸復為之文曰物險者水矧江流兮浩浩滉滉天日浮兮風伯不仁煽虐尤兮佐以豐隆用師仇兮蛇虺黿鼉結蚴蟉兮天吳吐舌齒鋋矛兮挾威玄冥腥血求兮汝何不智輕身投兮秉棹飾檣鼓枻遊兮他人顰蹙汝安休兮起忽溟渤若駕虯兮岸移地縮快逺遊兮索朽木蠧孰知由兮墮槳偃帆喪計籌兮奮臂出淵足蹻泅兮頭童髮種紛颼飀兮倒藉項踵從沫漚兮上舞蛟涎下龍湫兮幸而毒吻不見收兮離淵就址凝望眸兮志竭氣衰筋力柔兮懷沙枕流非意酬兮骨寒體僵魂悠悠兮逝矣何知為余心憂兮聞汝有家宅江州兮維南匡廬萬峯􅍶兮樵人朝暮多薪槱兮北連蘄黃莽汀洲兮桑田間間有鳴牛兮耒耜勤止足膳羞兮出入閭里呼匹儔兮博陸象奕樗蒱骰兮嵗時壽斚吳歈謳兮胡不是樂為人謀兮將慕任俠誓在溝兮亦貧所驅忿淹留兮問而莫對安咨諏兮擇術不慎孰相猶兮乾坤逆旅彭殤侔兮速朽乘化鈞蜉蝣兮豈必易簀正首丘兮衣薪為禮安一壞兮煦以春陽芳草幽兮淫風怪雨無啾啾兮優兮遊兮惠汝千秋兮祭張子藎文鄧以讚嗚呼痛哉豫子藎遽捨我耶豫病居山中嘗兩月不通問子藎輒督過之曰子能忘物寧我忘我然豫實不忘兄兄今乃能真捨我耶豫初與子藎遇也蓋傳臚之日闕門之東時在衆中兩相許矣嘗從兄出東門偶論管鮑豫曰此其難不在鮑而在管彼不遮飾其情而甘以其身受人之知此為難也兄曰豫有意焉豫未答遂各上馬去自是十有八年或合或離豫不能為夷吾兄必曲為鮑叔知我病則供奉之役常代其勞知我貧則節春秋供其匱乏又以壽母為號使不得辭知我憂生不在形骸也數以好言相慰不以我為不達己卯之會驟謂豫曰豫近見一先生像其貌酷似子其年望八十無慮也如我不為茍比則是非可否不求必同不以我為執知我意有擇雖雜陳别家書細而讀之不以我為支知我有老母即依依子舍至虛國恩不以我為固蓋骨肉之恩而道義之好悠悠百歲永矢弗諼奈何遽捨我耶嗚呼兄雅意當時洞知大計常受事靜悉辦斯亦足明其能矣然人有片長其心好之又樂稱之常曰使國有人焉何必我則所謂其為人也好善不切于此矣本其意直欲平康斯世而弗究其施能無介然耶嗚呼痛哉兄學先行誼以戒慎恐懼為門以出處辭受為則即深談妙至而行不掩言無取焉且曰學之不講是吾憂也群而聚之用相警戒故其要言曰斯言既出一念萬年所謂以友輔仁莫專於此矣本其意直欲主張斯文而未見其止又能無介然耶嗚呼痛哉兄使楚還常迂而過豫里徘徊三日忽動倚閭之思豫遡逰從之有懷如焚則又自解以為豫與子藎皆未及艾後會且多何必爾爾蓋癸未之春烏盆之滸也孰知此别竟成永訣嗚呼痛哉丙戌之秋書來告我曰古人有云死歸生寄豫藉天之靈而賜之土矣自今日以往無夕不可豫之適也抑又何求豫讀之舌嬌而不能下蓋喜兄之達而過其早計也由今觀之機固有先動者耶豫求靜久矣四月維夏意忽忽不樂則深自責志以為山中虛度如是細而求之又無所倚蓋紛者未解而訃者忽聞由今觀之神蓋先示之耶嗚呼痛哉兄殁之後兩有報音不逮記室豫請讀之其一為答重施其書曰兄不忘老親之耄而重之以大貺如天之福為榮多矣又孱弱之軀以為兄憂而貽之參杞之直其何誼髙焉山中無能謝無亦斯征斯邁庶幾無有慆心逸志以忝所生所以報也是二月之某日也其一為兄疑豫之以論學為諱也故詳道其所以其書曰聞兄以友輔仁千載之大業也微兄之力不及此前豫所謂慎重者抑謂今之學士多浮慕耳人心之不同有如其面聚而相蒙為損滋多豫故願兄之朝于直諒而夕于多聞也不然聖逺言湮庸諱講乎是三月之某日也當豫作書時孜孜切切如對兄語豈謂弗達嗚呼痛哉嗚呼己矣豫嘗聞之古之至人死生一條兄之殁辨而不亂亦既超斷續矣幽冥之中其亦無忘前念而益圗圓神乎人之大患為有吾身外身而為之其何患也所過者化所存者神此豫所為效其區區也嗚呼痛哉豫自兄沒竟承內召傳除書而讀之又承兄缺謂余能無痛乎不遂乞骸今復陳情况昔在直幸布腹心兄今已矣無可為屬謂豫能無念嗚呼嘻吁子藎子藎十有八年子藎在口今輒向人昔者吾友夢寐之間再三握手談笑如生兄真來否五十非夭百歲非久得正而斃是謂不朽我來渡江白馬素車百年肝膽一束生芻我腸欲斷我淚欲枯喋喋千言兄知不知狀者窗友銘者胄師傳以傳之豫亦何辭嗚呼痛哉祭李復齋文盧柟維嘉靖三十二年歲次癸丑十二月癸酉朔越二十日同邑布衣盧柟謹以少牢庶品之儀敬奠于故河東督轉運鹽使司副使前工部營繕司郎中李公之墓再拜哭且告之曰嗚呼士有慷慨悲歌杯酒彈劍意氣相傾者少罹禍患即為之決胸臆刳心膂痛哭流涕無己者則其心為何如邪若乃掊鎖裂垣澤及枯胔權奪造化之私惠洽茂育之德公其視慷慨悲歌杯酒彈劍意氣相傾者有間矣一旦天隕玉棺世喪遊龍逝川莫返大夜長扃琴軫雍門之調歌傷蒿里之音其罹禍患顧謂之少邪即令僕不為之決胸臆刳心膂痛哭流涕無巳者是不可得也已昔公首宰咸陽繼佐大郡導河治民何若風采官曹擅兩部之英王命獲三錫之顯古稱良吏若趙中大夫白公魏西門豹公豈遽出其下哉既而權姦扇仵詔獄逮加公獨處之宴如謫判寧國人固以此髙公矣讐者銜公誣以他事去公官公之來歸一無愠色教子課農容心淡漠此豈愁戚嬰心汲汲於功利要勢者所易及邪始僕被罔在獄公於當路曲為解原當是時僕貫三木負明刑蓋不知公果能出僕公亦不知僕之有今日也今僕既出乃公之墓木己拱把思為公陳視形魄伸展曲衷極平生寃頸頓踣之苦者而今不可得矣且公之蓋棺幾時也長掩泉壙幾日也未亡者尚不知公之亡矧公之既亡又安知巳亡者今復不亡邪公邪我邪乃大變邪抑亦恍惚不可為辨邪或謂禮喪者之墓有宿草則不哭公之葬己久而子哭之或失之緩審如是僕前所云云又何為邪夫哭之及時者物理之情不可哭而哭之者吾道之窮公之靈馮日月騎星辰御六氣之辨以浮遊於兩間者其必有鑒于斯他復何論哉明文海卷四百七十五
