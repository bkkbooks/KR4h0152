body:
  text: 明文海卷四百七十六餘姚黃宗羲編哀文四祭王文恪公文陸燦嗚呼燦生垂髫始誦公文越十五年乃登公門公本天人遊戲域中諸所紛麗莫嬰其衷而獨愛才飢渴飲食聞人有能若自巳出顧我謭劣辱公之知待以國士千載是期公於斯道篤學躬行不立門户渾然天成發為文章金聲玉色晚益臻妙居然古則刋落華繁獨造本原取材左漢規摹王韓豈無名家斂袵退懾愚不自量跪獻所業誦而首肯俯為指評曰此不怠莫之與京文貴意勝辭乃其枝苟辭而巳夫人能為再拜斯言廓若發矇佩服終身用之無窮六籍之餘九流百氏浩如煙溟不見津涘公鉤其玄發矢破的考古辨疑忘食與息我效其愚公曰起豫不蹈故常爾見卓殊故事舊章朝野罕習傳聞異辭訛舛踵襲公核其實引繩貫珠纂勒成編淡墨細書我獻所聞公曰有徵士貴識務不惟專經退則語人此我輩徒加以數年吾且避諸壬午之冬乞銘先君哀絰拜稽太湖之濆公聞其來喜動眉宇山亭篝燈從容欵語吾得子晚實獲我心斯文之傳非子誰任在昔昌黎殷勤籍湜我非其人敢忘公德公曰子來無渝斯誼申之婚姻用篤世契爰以弱息字公元孫我辭非耦公命實敦聞公屬疾往候榻前猶為申眉諄諄誨言日徯康寧杖屢隨逐木壞山頺百身何贖見諸夢寐音容宛然覺而失之中夜涕漣巍巍我公豈其云忘將乘風雲陟降此堂公來此堂若聞我辭我辭有窮而痛無涯嗚呼哀哉祭李立卿吳時來維嘉靖某年月日寄人仙居吳時來聞雲間立卿李子卒於南寧之旅舍心怖神駭為西向而哭之將拔履修弔一日歸櫬過橫州乃備牲醴拜立卿之靈而寫以兹詞曰嗚呼立卿遽卒於兹地也耶東吳西粵雲隔萬里誰為而至此而卒此逰魂耶余何忍而視立卿之歸耶余初與原漢赴謫鄉也立卿以姻連原漢接見於濟上聨舟至吳門謂當與立卿别乃立卿不忍别從而經錢塘踰姑篾歷豫章入螺江度茶陵窺衡湘遵零陵陟桂林吾與原漢有山水之僻所至無一巖穴不沉吟其上立卿亦無一巖穴不挈䇿以從立卿在南寧凡三載雖原漢知命善處窮然使內無嗟咨之音外無離索之迹者立卿不為無助余每及秋訪南寧見立卿必勸立卿學立卿正向學稍稍逺大自期而今己矣嗚呼升之太發轉戚為讐白首按劍自古已然若立卿豈易道耶余三人獲罪於天己則執之乃纍其親朋至是極也子儀殞乃甥於茶陵余哭外舅尹翁於潯州而原漢又立卿之變也豈其親故所遭亦同耶嗚呼天何意哉將後之恤患敦義者懼哉我告立卿毋以他鄉為悲今原漢與汝兄姊殮爾形歸汝喪將返葬汝不在九峰之山則在三泖之濵固汝昔日所遨逰躑躅於其間者雖不得終於故土猶得葬故土也庶收爾魂遵舊路以回旋毋復放浪於林菁荒僻之墟為山魈所窺昔盧遵從栁子厚之栁州逮死不悔蔡元定竄死道州而己無愠丈夫志業豈必身為之其所必致則一而已嗚呼立卿更奚恨尚享祭吳子道文沈思孝維嵗甲午季秋三日從燕中聞吳子道先生之訃友人沈思孝素服哭於寢門之外用遣一介以絮酒瓣香祭我子道之靈於毗陵里第曰天乎天乎子道死乎胡迅霆訇磕而不蘇蘇虎豹擇人射影短狐於焉無宛死幽憤乎夢耶非耶道路言耶如何急足在吾門耶發書伸紙悲難止矣天乎子道幽憤死矣嗚呼哀哉往當權獍倍本沈厥彛常盈庭巾幗同聲而倡惟余五人子道首盟爰批逆鱗料虎口傍既承天棓箯輿來回被髮覆面色如死灰噴血流沫濺兹六街爭觀填道莫不興哀幸無遄死還實編伍長為農夫樊棘雜處與人無爭孰是怨府胡鄉里之小兒潛搆陷而賈禍知中要之甘心遂居之為竒貨非天好生幾成摧墮嗚呼哀哉孰知夫河清可俟氷山終壞小往大來於是乎在天明回矚援沈騰滯子道業既興廟余復歸魂嶺外執手相勞猶疑夢寐於是聖皇圗治昃食宵衣納約講帷扶陽而飛以為流唐漂虞回掌見之豈諛風之復振更抗疏而是非勢臣齮齕衆簧萋菲投簪神武謝病言歸若其休神家弄不不憂閉門靜居交謝凡流固齪齪之所怒乃歸非而日稠衆氂毁玉積羽沈舟中抑鬱其誰語竟溘死而不少留嗚呼哀哉翡翠于飛罹其翼貂狐之毛躬之賊美好禍所棲名譽怨所集始子道為忠義所激固不與衆爭死而馮生者忌其死及為名教所與固不與衆爭名而逐臭者忌其名假令子道旅進旅退默處朝廷知白守黑謂名實賓自應驟登阿保橫被寵榮備生人之至樂享喬松之茂齡今則官不過五品年不及下壽瘞貞幹於朽壤摧逺圗於促漏嗚呼哀哉雖然不至者位名豐其爵不滿者年氣存丘嶽無云不遂含恨入地其子七兮鵬騫鳯翽堂構克舉善繼而志人誰無死自今伊昔脫中死於權姦庸詎知乎今日生存多所慮長寢萬事畢余獨悲夫同氣相求五人而己汝師塞門仁卿病廢爾瞻擯落余懷進退而子道公論始明且進大位豈期缺隙曽不少待何天之無厚於吾人而與善之徒謂也嗚呼哀哉尚饗祭趙汝師文沈思孝嗚呼哀哉汝師夫心不易信之人主而信之乃不能信之友也身不易托之名教而托之乃不能托之天也其命耶當勢臣挾主専邦之枋遂欲倚廬闕下謀不利於朝家幾於三綱淪矣汝師為社稷計幾先謀將然不惜出死斷亡偕余四人者言焉即掠辱之屏廢之不啻甘苦如薺亦信夫臣義當爾矣比炎炎者滅上卒以汝師先入之可信而剷其類於地上戮其骨於地下為人臣將而必誅者戒於是反玦以環登之清塗而成均曲禮題才秉鑑者先後數年不惟一啓其心納牖明主至二三知交莫不切切然相摩以信忠之以言滯則援之後則讓之若慮其事君不己若名位不己先也如此亦可語德友矣顧人心不同有如其面不知正言情忠適足為來害相報而巳及一旦得志則凡求盈願於汝師者惟寐忘之由是小夫趣指以為健士居中不便於相國乃生之言而有集非之勝是矣然上豈信於前而疑於後歟亦無奈股肱意何耳而海內視之則以名相猜以位相軋隂中於忠之讓之之人若觀火也以故毁愈至而名愈髙身愈窮而志愈逹雖有勢辱己多義榮衆煦或可漂山而於汝師曽不足損其魁父之丘胡天不愸遺一老而遽云泰山其頺也豈造物者固將息之以死乎抑適去者命乎不然則忠之於君臣交之於朋友均之乎自天出也而汝師以一身綰焉以防其墜所謂與天為徒者而獨靳之年耶大抵汝師心非不能信之友異類者難以氣求身非不能托之天冥漠者難以理測耳若世論謂汝師之忠且才竟不能援立以究其用為恨是又指腐鼠之未嘗為鳳凰食者也且一時相者多矣或貽憂於國家或開罪於名教雖幸登年以載其毒將不壽於朝生寧若汝師以一朝之日一日之人秉千嵗之心須千嵗之士生荷大節死垂大年其所謂信之友而托之天者又在此而不在彼矣庸可以不死之死與忝生之生者較相與不相哉嗟嗟人而其死請死以此汝師亦復何恨而余猶噭噭然若不知命者誠謂人之云亡不免為名教泣數行下耳靈如有知庶幾乎其或饗之也祭劉三五先生文鄧元錫稽山真承即知即行即博即約為不二門近哲玄超務新視聽俯視修學士蔑誠正曰悟真體何修何為曰造古初何考何稽𢎞濶勝大淫為異學狂蹶疾顛如瀾赴壑猗歟我公獨得其正蚤及師門密勿印證炯然者天湛其內存純粹以精何欲得淪瞬存息養知乃不昧庶幾夙夜以無祗悔虔臺夜雪稽山晨鐘迄於白首髙朗令終亦綰銀章芒碭作牧慘怛忠誠海㴠養育精神折衝黃河逺徙膏澤淪沃癃瘵咸起乍登蘭臺虎豹當關引疾叩疏貞孤不刓引兊如飴肥遁接淅皭其不汚龍蟠鴻翼既懸我車亦來我徒絃歌紬繹樂亦在乎稽山之學遍於海宇亶惟安成克光厥緒賢哲如林萃聚一堂巽與咸受沉默以將二三同志清齋對榻惟扣斯鳴舂容鏜鞳隆慶初元屢詔賜環引年自委丘壑盤桓時語時默時行時止展其不愆聖門之軌暨於晚嵗道行德刑群望冥孚衆允質成貴賤小大童耆愚智奔走及門操几撰屨山頺梁壞家弔巷哭公祠専祠俎豆尸祝元錫末學年德敻遼徹原清晝雲霞連霄翁實降悒剖心相信接遇綦隆恩禮莫並平生論撰咸委校讐汰擇環璧磨營琳璆片言咨疑應手輒改我投涓滴公本滄海雲霞有約十年再酬骨肉孚契心髓綢繆自惟終生見知見許豈無他人莫與公伍聞公云亡流涕屢日為位慟哭廢寢廢食方在草土有羈撫棺宿草幾青寄此汍瀾祭師泉劉先生文鄧元錫悲大道之洵夷兮鑿牖户以專門主一説以自覆兮莽求尚乎前薪惟稽山之良知兮秉皛日以耀明何萬象之弗察兮云一丸之混成傷近學之猖披兮羌憑心以自聖情萬變何可蓋兮從滯淫而離正曰天機終蔑修學兮將嗜欲之放競走狂途以疾顛兮猶藉口於頓徑翁始悟詎不焯爍兮曰滿地其南金哀衆懵而作鐡使兮孰聆乎無為之妙音衆屬目而蚩眙兮忽稱心而自悼紛遐覽以失度兮孰迷行而蚤造正明目以內觀兮何纎翳之得留既精精而粗粗兮井源源而流流性太虛而惟一兮命有賾其吹萬不研精以修命兮何性命之得盻匪全力以邃詣兮孰親乎知之為良譬晉明之出地兮乃焜耀其耿光衆群訾以失宗兮翁自知其不忤考作室而我堂搆兮固師明之所許謇識力之不愆兮老矻矻其猶壯攄易緼以鑿混沌兮超群罔其獨上斂三才於一掬兮析千古於毫芒畜衢天以既亨兮浴咸池之耿光登天壽以平格兮卓師門之焜耀信自道而自成兮任群蒙之誹誚今乘箕而長往兮邈鯤化而莫攀哀我人之失資兮孰啓鑰而抽關慨百年三繼見兮感敦琢其獨契比復真之再造兮荷奬掖之彌至悼千里之為遐兮奠椒醑以何從緘斯文以寫哀兮靈沈洋其來降尚饗祭羅近溪先生文鄧元錫自東越之學興指獨知為良即良知為聖使人一洗其支離眩騖之習內求諸心可謂尤切固者為之惑心在內以人見之知為知以耿耿之小明為明而不通於本蓋二三傳而失者益逺至先生實始悟人為仁悟同人為為仁以良知為覺以三界一心為大覺指恕之端即舒鴈舒鳬同群樂生皆歸於仁體指仁之天即旅行羣宿欣欣依依並暢其本心論赤子之心則胎娩乍分初與母離即哇哇一啼直明其不忍論未發之中則喜怒哀樂未有交接即平懷一種深信其泯然於是標孝弟慈之真心貫通乎家國天下謂仁淵浩為在我和光於日用人倫此先生之學所以為獨見其大不離於宗者也彼及門之徒即心自信信心自足或乃流於猖狂自恣甘於隨俗習汚者固為滯其言筌而離迷於本况世之人即江海之混混而疑其深廣即形影之妍媸而訾其鑒照者又豈足與於先生之真哉元錫未冠及先師先友從先生遊四十一年於兹矣自最初發心謂同向方招徠引翼業萟植之為町畦中之蓀荃逮大圓鏡智現諸影像彼是厯然終并包之為藥籠中之薑桂蓋先生所以造元錫者時其煦嫗時其捭闔欲羅之於範圍在元錫之所以事先生者時同所同時異所異以自輔於助我逮於今夏過余衡門晏晏晤言曰惟心源君言及此豫心釋然指乾坤之二體為兩曜之髙懸一飯三遺起坐留連而何悟中宵綢繆之語即終生永訣之談也耶霏雪冥郊走哭一奠絮酒隻雞有淚如霰尚饗哀畫眉辭王世懋并序友人俞仲蔚有鳥曰畫眉畜之草載竟以老死籠中斯亦禽理之異致物情之永終已詳夫詞人之賦鸚鵡鷦鷯舞鶴之倫皆托物以喻情非夫情生於物者也若兹禽之依人以周旋而見憐方之人理同於久要蓋仲蔚悼亡之作厥亦有鍾情之實焉余乃哀而和之辭曰惟越禽之翾利兮擇深林而知止懷好音以長鳴兮理修眉而自喜始尋聲以蒙縶兮終緣巧而被齒匪林莽之無思兮翳主恩之足恃爾乃籠以朱檻被以翠幬峰竒石而介嘴盎清泉而潄流苟飲啄之惟時雖摧翮其何尤感鴻恩之優渥忌鷃質之微眇既騁辨以載睨亦安居而思擾寄身樊籠之內抗聲雲霄之表竭音容以進御罹寒暑而忘老嗟竒質之易凋獨何德而久處雖經玩於耳目難終假其毛羽尾翛翛而就頺聲啾啾以含楚猶翕翼以向人似懷德而辭主驚絶響兮雕籠覽遺挂兮在壁初悵恍兮若聞既杳冥兮自失悵詩腸之獨在兮憑鼓吹而誰即傷眉嫵之不作兮望逺山而無色嗟乎夫臣委身而蒙遇鳥依人而被憐養無譏於在梁寵無纍於乘軒盡筋力於垂老委命運於終天吾將以方螟蛉而不足亦寧與蟪蛄而並年祭南京禮部尚書孫季泉先生文何良俊古人有言曰士為知已死又曰感恩則有之如已則未也管仲曰生我者父母知我者鮑子古人所以拳拳於此者何哉蓋亦感知巳之盈前痛如巳之難遇也某爰自束髮誦法孔孟然屢不售於有司遂歸卧海上閉門却掃惟托交於古人不求知於當世如是者三十年癸丑春始以常調謁選於天官時先生為天官侍郎良俊素無根祗之容於左右先生識其文於衆人之中以為此子能為史漢文至口誦其句於公卿間及丁巳秋先生擢大宗伯而南良俊時去官客南都以所業為贄先生見其文以為絶類王槐野夫槐野先生嘗署留院良俊經事之其人氣蓋一世心雄萬夫文章自康李以來罕見其匹實百代之選也然世猶言其持論太髙若良俊僅守章句纎嗇委瑣其視槐野特么麼耳先生欲長其聲價乃過為此語雖浮於實然士大夫亦稍稍以良俊頗能為語言者又良俊自少好讀史傳欲考見古今成敗之故及魯仲連酈食其輩倜儻之籌畫故光祿卿前大周趙先生今沃洲吕先生引與論事常至日晏頗采其言以為可試於用今頭顱種種皮骨僅存知無所施但自廢於聲樂杯酒之間非故欲爾正自不得不爾先生不以為狂而棄之正以知其非本懷也先生卧病嘗經歲謝客獨良俊往輒呼至便坐與語良俊恐坐久勞神數起求退先生曰古人言病中與相知共語勝於服藥數日不見得一談殊快不苦也故未革前數日猶在榻前商較文藝移晷始出然則世之知良俊孰有如先生者哉先生尊公忠義貫日月先生德業彌宇宙諸子聲望著朝野故先生之病人有為先生憂者以為家世太盛也良俊曰不然夫古之觀人稱器宇以其大而能受也今先生如萬斛之舟所載未及其半且人富貴之後但加摧殘更無培養今先生日斂其華而壅其根庸何慮乎然竟以不起豈先生為天地元氣造化恐其太泄乃一翕而聚之耶及先生既沒人有惜先生不至上壽者良俊曰世之壽孰有如先生者人謂顔子夭不然夫當春秋時天王之宰與列國之卿相何限今史册所載者幾人蓋今日死而明日聲光隨滅若顔子則至今在也今先生有髙世之行可以垂世者數十先生感忠烈公之事每遇誕辰輒閉閣卧不舉子弟之觴太夫人年近百歲先生色養如嬰兒先生事其兄伯泉甚恭官至卿二猶侍坐若侍嚴父先生位登八座猶躬素士之節不畜姬侍不近聲樂不治垣屋計其産與忠烈公時不加尺寸先生處官勤慎雖毫髮不敢忽先生仁而愛人其接人無貴賤大小而必以禮先生文章髙一世然人有一字之善必加奬勸常為推轂先生平居人未嘗見其喜愠之色先生尤不喜聞人過客有道人短長者輒不應亂以他語夫人有一於此猶稱賢士况兼此數者即謂之髙世之行非耶由是言之則先生文章在石室功業在太常惠澤在人心詩歌在里巷傳播雖至百世猶不朽也今之仕宦沾沾自喜茍得轉一階即自矜眩者縱位至卿相算及百嵗其壽孰與先生多獨沃洲先生曰季泉公仁人愛士但不曽任事一行其志為可惜耳是蓋深知先生者良俊感知己之遇况當永訣豈敢過為飾言以取欺謾之罪故直披胸臆所謂亡者有知使言者不愧惟先生在天之靈其昭鑒之哉明文海卷四百七十六
