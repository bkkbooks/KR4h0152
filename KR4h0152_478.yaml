body:
  text: 明文海卷四百七十八餘姚黃宗羲編哀文六祭何老師文鄭之玄崇禎辛未十二月二十有一日吾師何少司空鏡山先生終於好德里第明年壬申三月訃至京師門人鄭之玄聞之怔忡皇惑不敢為信既乃素服而哭為文釃酒告於先生之靈曰嗚呼玄嘗有感於蜀人譙周之言昔孔子七十三揚雄劉向皆七十一吾年過七十必當長逝其意將欲竊比於古人而以遂死為不足嗟也審若爾則反袂之哭何其愴然而山頽木壞何其痛之至於如斯也豈非吾道之衰而斯文之恐墜也耶嗟乎先生其數亦止於此而巳先生之學真狂真狷而必以躬行實踐為先不為不欲而尤以忠君憂國為務誠足以動風雷信足以格禽魚是故善者以之勸而不善者以之愧若夫處而無厄窮之色出而無安飽之懷其舉杯落落浩歌自得者萬物無足以介其胸其著書矻矻白首不輟者千秋不足以圉其志然而顔子簞瓢尚有負郭之三十孔明淡泊亦有遺桑之八百先生庇先人之敝廬糊先人之五畝啜蔬藿食若將終身當其生而無以為奉及其死而無以為斂嗚呼尚忍言哉三代以下人品斯難借如更生強諫而有鑄金之惑子雲草玄而有投閣之慙是皆不足致慕而譙周之言若彼者先生立身行己毫無間然其生而為聖人之徒則歾而食於聖人之廡又何疑焉嗚呼玄束髮而遊先生之門先生即知其將能奮起於孤生也今頭髮種種矣無以與於先生之道而又捨之去豈不悲哉蘇子瞻之哭歐文忠也曰譬如深淵大澤龍亡虎逝則變怪雜出舞鰌鱓而號狐貍陸務觀之哭朱紫陽也曰某有贖百身起九原之思有決長河赴東海之淚玄所以哭先生有如此矣萬里椒漿悲來涕集攬筆嗚咽嗚呼先生維其鑒之景素于先生誄夏樹芳并序萬厯四十三年三月念八日甲戌禮部儀制清吏司郎中景素于公卒嗚呼哀哉公諱孔兼字元時直亮清貞生平旁無嗜好以道義詩書為槖籥以濓洛關閩為正傳姱節振於儀曹雅志堅於園賁居恆挹損門無雜賓居恆所著有四書大指及論易論學前後億語若干卷聖門聞知見知録道學編正氣編若干卷當官則有江州餘草春曹奏疏若干卷夫朝聞夕沒聖哲所嘉立德建言太上所重公抗疏歸田二十有餘年而宵旦竭蹶於編摩忠愛不忘乎廊廟一矩一矱先民是程即擬之素絲伐檀曷以讓焉公之大父為中丞素齋公父即鄉進士勵菴公子姓兄弟繼公而起者並得䇿名金閨竪鴻名昭亮節後先煜盛美並傳公年七十有八得正而斃斂福箕疇庶幾宇宙之完人矣公學術甚正而詔人者甚直始見余習法喜則曰子有洙泗之真詮母師竺乾既見余習棲真則曰子有危微之旨要毋觀􅑆妙蓋公一言而所以針砭我者良深矣天不憖遺靈光去魯國人哀悼里為罷舂君實云亡謹厚尚傳於洛下樂天度世耆英曷表於下邽矧在通家能忘記述江之永矣不可方思何以唁公生芻白駒何以贈終青山素旗遂作誄曰大涪聳翠長蕩揚波山水於公鍾靈實多遙遙華胄發源東都逮自建康乃徙曲阿甲第蟬連玉葉金柯晉朝王謝唐室崔盧鳳翥龍翔實繁有徒公之標質崑山片玉風幹挺然疏眉秀目鳴臯之鶴摩空之鵠一段清機翛翛邁族壯嵗登朝澡行孤獨司李潯江維明讞鞫晉秩容臺寅清鏡矚大典必稽大禮必復公論手持排姦激濁三王並封國本幾搖虎豹當關觺觺諑謡抗疏九閽奔霆震霄豪傑同心左挈右招旋定皇儲絶彼惛呶時俗嶮巇蛾眉見誚一官放逐單車就道射隼高墉曼聲長嘯月白風清金沙返棹道則沈淪節則彌耀解組來歸閉門著書力剗偽學期砥真儒痛黜瞿曇尚友程朱口不絶吟手不停披格言名理奉為蓍龜恥效世凃媛媛姝姝毋施鞶帨毋狃玄虛躬行君子亦既有餘公之生平毖眘取豫三十年來冰檗是處最所絶迹權門要地監司守令不遺隻字遺隻字者門生故吏匪曰要之好爵自縻正學既廢儒術久湮時有涇陽倡道東林吳越江淮朋從盍簪公無寒暑相與提衡開關啓鑰一稟聖真謫官鄣城積俸數載州守緘齎摽使門外謂此五斗可妨一介議倡學田生儒有賴溯公一生仗義懷仁為鄉祭酒為國典刑出扶朝論處篤家倫老而好學曾無倦勤庶幾衛武無慚伏生勃窣理窟拮據艱卒孝友濃至以詔後昆既饒令子復裕文孫球琳琅玕璀璨滿庭所憾於公道未大行位不竟德屈不求伸嗚呼哀哉吾聞神龍潛德首重鴻飛冥冥道貴勿用矰􅗤罔加雲遊川泳俯仰相羊神遊氣縱既壽而康大耋將躋胡然一疾忽爾騎箕人命短長萬期須臾何草弗黃何日弗西聞公去來了了不迷存順殁寧生寄死歸獨有同盟搔首踟躇志矩堂堂願學齋虛孰坐春風孰領天倪馬䇿橫江徒煩叩扉秋水芙蓉聊寫我悲嗚呼哀哉徐宜人誄夏樹芳有序萬厯四十有七年己未二月十八日壬申誥封宜人范母徐宜人卒享年六十嗚呼哀哉宜人諱媛字小淑勾吳長洲人也父輿浦公太僕寺少卿諱泰時祖悟石公尚寶司少卿諱履祥外祖潯陽董公禮部尚書諱份夫家即姑蘇范氏光祿寺少卿中吳公諱惟丕之冡婦而雲南學憲長白公諱允臨之元配也南州高裔東海名家玉葉金枝吸瑶華于上苑靈心慧質濯珠采于蕊宫年甫及筓言歸于范溫清之暇輒能賦詩上探漢魏六朝下及唐之初盛靡不擬議成變品隲宫商詞賦淋漓歌行爛熳凡有著作傳之大都昔充容以弱歲擬騷價重小山叢桂采蘋以妙齡作賦名高鳳笛梅花左嬪之歌詠成編孫璚以詩文行世準之小淑方斯蔑如矣若夫遊戲三昧雅好臨池於古之法書碑版臨摹曲至衛夫人善步鍾繇急就之章絶賞劉秦妹工書大令西安之帖堪誇今觀宜人小字蠅頭大字如斗真行並作鐫刻煌煌豈非軼羣之女史冠代之閨秀哉而又貞心雪映雅操冰清出入無慚乎母師訓誡可嫓于班惠昊天不弔奪我賢媛子荆哀逝彌增伉儷之情奉倩悼亡益抱情文之痛好逑頓失良士如何蒼璧齋中若箇焚香繡佛白雲泉上阿誰汲甕栽花茂苑鎩乎翔鸞文園失其孔翠不佞芳與夫君忝同年誼義辱通家淑嬺久欽幽間夙仰第令徽音不載彤管無徵則萬笏峯頭誰識當年黃絹哉遂誄曰東南甲秀聿鍾吳會盤礴吐吞扶輿育瑞上方穹窿靈巖鄧尉震澤揚波三江襟帶名山大川蜿蜒迤瀰鬱鬱金閶寶婺星輝大貝明璫媖媓誕竒自非世胄誰馮誰翼不有大賢誰資誰匹於鑠范宗啓自高平甲第蟬聨篸組雲仍惟德惟賢爾公爾卿施於長白早樹英聲出匣芙蓉照乘連城鳳凰于飛考詹懿氏乃召龍媒乃修雁幣南園佳人東吳才子如璜合琮如蘭協芷爰相夫君經營四方頡之頏之和鳴一堂古稱嘉淑今羡鴻光大言小言播弄篇章彼才鮑謝此美姬薑夫君宦遊揚厯中外携手同車子佩我戴始列西曹共侍含香樽俎折衝幃幄是襄繼列水曹欽哉亮采疇若豫工內則是賴彩雲五色下矚滇南萬里修途並轡同驂文星璀璨憲節高騫金馬碧雞縱意躋攀異士甄收珊瑚木難再遊閩海再涉參藩天風海濤盡入詩篇才譽鏗訇直宰所妒何物含沙匪兕匪虎挂冠歸來爰得我所隱彼天平祀我烈祖用葺菟裘偃息樊圃怪石嵯峨靈泉漭沍圖畫天開神仙洞府七十高峰列案錯組萬頃湖波光搖肺腑平野蒼蒼憑欄一撫誰則齊眉灞陵賢婦前于後喁金石相宣卓筆題詩龍門引泉亦有良朋問字探玄是惟宜人焚枯擊鮮䆗窱歌喉葳蕤舞筵絳樹紅梨雜之管絃春光駘蕩景物鮮妍余每過此投轄流連勝逰安在寧不堪憐嗚呼哀哉方慶宜人厯逢花甲漢書未就恩來北闕何期一病二豎告孽廣栁兼程中途遽絶曽謂陽春迅彼列缺洛浦還珠嫦娥奔月嗚呼哀哉余憫宜人不在詩文貴而能下淑慎且溫富而不驕儉素常存唐風蟋蟀齊后鳴雞肅肅雍雍家人女貞是時寒山尚推趙室考槃有詠玄芝有集吐鋭噓毫人稱雙璧其與宜人一山相隔倡豫和汝匪朝伊夕國雅並傳千秋不易道藴尚存令暉先滅嗚呼哀哉神女騎龍為虹為霓若煙非煙慶雲何之寂寞王孫去住誰依玳瑁梁空海燕孤棲月照流黃霜凄繐帷瑶草不芳傷哉履綦絡緯吟殘歸兮不歸嗚呼哀哉寒山趙凡夫誄夏樹芳并序天啓五年十月初三日戊寅凡夫趙先生卒嗚呼哀哉先生逝矣不可作矣瞻彼寒山德音邈矣臺有玄石榭有青霞漢字秦碑㟮屼磨崖至人泬漻吾道非耶昔者郗超死操筆為誄者四十餘人而超之名益彰言之不可以無文也如是矧余傃友能忘大招遂遽梧三號而為文以誄之其詞曰於哉趙宗帝頊基胄宋室王孫神明濯秀彼美伯京人倫領袖秉憲明朝清風振後咄咄含玄介特自守衾影無慚不愧屋漏四異先生佳名不朽逮我凡夫生而穎齊汗血桃花漮浪不羈纍散千金睥睨有餘晚恨跅􅕟翻然讀書磅礴九經撤去筌蹄泛濫百家獨運爐錘塵視軒榮雅志淡如一入賢關遂掩柴扉惟孝立身有懷靡二五世祖塋仔肩葺治氏族宗統表傳世系竭蹶養親肸蠁視氣泰山玉符父夢徵異頓升鬘持楊母繼逝棘人欒欒霣身雪涕破家營葬買山卜地卜地維何寒山之陽雜沓峰巒蜿蜒重岡萬朵芙蓉掩映玄房公請苫廬乃裹餱糧挈妻偕隱兹焉允臧曼衍支離四十餘霜鑿石為梁依雲結霤山開五丁書藏二酉灌莽一區金堂小有瀑布高懸長虹挂牖最所得意尤工篆籀獵碣之罘縱橫馳驟玉柱銀鈎劃然天授匪今斯今造化在手翻空摘竒見者狂走乃至博古爛熳長箋亦有字學婆娑悉曇下括輿地上絶天官參略十道集史九圍逸草稠林翰海無邊鐘鼎遺文屹屹窮年晉代長松道林塔院幾奪斧斤匪公孰捍華林廢剎袈裟一片幾厄尸陀匪公孰辦法喜一開禪林陟建天際錫飛長空落梵五百支那參方請見趙州一茶雲門一飯説法散花惟公獨擅幽蘭在澗處士名高皎皎白駒孑孑干旄觀察監司室邇人遙余也同心空谷見招湩酪為漿鮭菜為肴異書揚𣙜閟發天􅌢媛媛姝姝千秋自豪玄言點石曠語干霄土木形骸逍遙燕處小宛齋頭跌蕩志喜春色濃酣萬山罨翠寶馬香車不億其麗才子問竒佳人揭珮有客叩門鶡冠相對枕上泉流溪頭鶴醉人謂輞川茲園匹儷既有隱侯懷琛孕琦豈乏令人頡之頑之繡口靈心謝韞左妃叶和騷壇前喁後于玄芝考槃厯落相輝鳳鎩九苞文鸞曷棲嗚呼哀哉嵗在甲子涼秋訪戴公時小極侵尋不韙余視牀頭濕灰見怪既乃霍然良朋永快每謂過此居諸未艾曾未幾何山中歌薤嗚呼哀哉百年誓墓永絶囂塵半生結伴與石為鄰朝斯夕斯攻錯紛紜如龍如虬以寫我真山盡水窮潄出雲根公今蝶化拜石何人野鹿園荒清風尚存嗚呼哀哉四壁青山悠悠自殉生産茫然置而不問侯蕭澀遁世無悶怛化之期無錢庀櫬生平無長長于好盡公所自言足為心印南塢珠邱是公巨寢竹堂新構誰尋幽韻驛路馳煙山鬼吹磷嗟乎玄晏云亡孝緒既泯高士傳中誰歟傳信嗚呼哀哉祭甥女瓊章文沈自徴維崇禎五年嘉平之月越十日舅氏徵聞汝喪之後再閲月從新安歸始得採芳芷為殽以告於甥女葉氏小鸞之靈曰嗚呼春折穠華風摧竒萼珠沈璧碎何慘如之夢夢彼蒼益難問矣憶昔余與汝母少失慈怙伶仃艱苦余雖繁兄弟然汝外祖母顧恭人所生惟汝母暨余故余猶獨子也余又艱於嗣育汝生六月襁褓而來眉目如畫宛然玉人羣從昆季見者靡不嘖嘖稱羡逮三四歲口授萬首唐人絶句及花間草堂諸詞皆朗然成誦終卷不遺一字余恆食貧雖梨栗不具而愛字有加每寒夜擁絮命汝誦詩若雛鶯弄聲睍睆不止也比甲子冬汝年九歲余以餔糜不給仗劎北走塞上汝妗不解别苦獨汝繞膝牽衣問余幾時歸余黯不能應故余作客遼左馳逐黃沙白草金戈鐵馬之中略不憶家獨念及汝未嘗不泫然淚下與胡笳聲俱墮也余别去久汝妗不祿汝還歸汝毋遂博極琅函廣採彤史皆汝母自授汝手為較閲謝庭咏絮十韻立成汝嘗以二詞相憶及七言絶數首寄余燕臺時止十三歲也其詞見者炙口社友爭録其絶句家中丞季父袖示孫女今皆散失惜哉余既備嘗險阻閲厯人情味同嚼蠟汝母以顧恭人無嗣泣書相勸不得不復爾繼室辛未始挈家南歸就往看汝潑墨塗鴉之景倣佛在臆比見則汝己長立成人規旋矩折神姿不凡玉秀花明光采耀目余不復能識認因問汝曰尚憶少時同汝妗雪夜乏爐以瓦甓貯火誦毛詩二南否汝應曰憶之因嗚咽失聲終席無一寒暄語但低首掩涕余固知汝慧性之特異於人也嗚呼何意余歸與汝止此一面遂成長别邪汝既許字張氏汝翁方伯公與余京邸受困時患難相與過從靡間洵有道長者聞汝壻韶秀異才余雖不識面深喜佳兒佳婦他年有半子之托汝母數遣使促余以汝出閣期近宜頻來一看余適有南陽新安之行略無停軌且余私意以兩縉紳締婚余一蹩躄老布衣刺促其間作呈身丈人余恧弗願也故知汝母拮據備嫁心力為竭余若為弗聞也者余則忍矣早知若此余何忍逺出不源源看汝僅止此一面己哉余猶自幸有此一面以余千里之逺數年之别及見汝長成之質今尚可永識於懷也余又謂多此一面見汝長成之質使余苦痛切心不若幼小佩觿時景尚未至牽淚之深也嗚呼痛哉余雖忍心薄汝私計來歲春明汝當歸寧余則掃門迓汝先為汝設館小閣錦茵為汝雙飛之止牙籖藝帙為汝簡閲之用小箋韻葉為汝吟咏之資洞簫靜琴為汝間情之寄投壺玉局為汝酡顔之娛素馨媚蘭為汝弱質之佩汝繼妗與汝年相若不甚癡憨或可共語妗越女燕産近學秦筝將索汝新誦悉為譜之擁髻剪燈定多一畨佳話孰意盡付之夢想也邪嗚呼痛哉汝婚期以十月十六日二十之夕余在新安客邸屈指計汝出閣且巳四日喜而不寐偶拈紅葉為題以消永夜忽夢見汝曰吾父詠紅葉惟深閨一律若同靈草芳魂返留伴金泥簇蝶裙之句為佳余詢汝有近稿否汝出望江南數闋示余止記有金鑑曉寒追短夢玉簫聲逺立空廊二語余醒後詳繹語意心甚惡其不祥未幾而家人以汝訃至矣汝之殁在十一日而離魂逺告余耶嗚呼痛哉余腸裂之餘欲呼天而相詰舉世無鹽宿瘤之輩咸得結褵白首何至於汝若不可頃刻少延謂天無情何故鍾此異寶謂天有情何故肆此竒毒即使蚤殤中夭亦未至為大慘獨不先不後摧折於嫁前之五日桃李將華肅雍擬駕鳳吹遽逺藥不靈使骨肉心狂姻親魂斷造化之虐何至是歟余冥推沈究而今得其故矣余輩皆學佛人也余以道念不堅復墮塵網汝母為吾家道藴夙有根器以兒女情多未能灑脫汝父與翁亦素究心禪學凡此眷屬皆所謂無著天親汝正如龎家靈照視日影而先化以䇿勵乃公乃媪因緣會合之際其故微矣夫我輩情根纒綿飄沒愛海吾佛慈悲正於人情最竒最艷甚深甚戀之處猛下一剪如鋒刀冷體使人痛極方省恨極始淡見此風花泡影明明如是閻羅老子正是老婆心切假使汝關雎宜家相夫榮貴玉臺香笥品月評花不過如李易安楊夫人以文明一代垂聲來祀己耳汝元從蕊珠碧落而來示現一十七年將嫁不嫁完汝蓮花不染之身不惜以身説法蟬脫而逝度兹有情眷屬則汝之來豈偶然者邪余論及此可以拭淚而笑矣聞汝母於汝臨殁題字於臂囑汝轉生余家為男子以相報嗚呼余自聞汝殁念同灰冷益堅五嶽之心異日者三生石畔吟風鐵笛一笑相逢不昧本來面目一段大事因緣余與汝期之矣苐今余來汝室筆牀硯匣閴掩梁塵繡帔羅襦淒迷蛸網痛明霞之易散哦麗句而如新嵗嵗春歸徒瞻燕羽年年花發空咏桃夭入抱紫煙未遂聨枝之冢遺奩黃絹誰題幼婦之碑太上未幾塵情詎免余能己於悲邪嗚呼哀哉明文海卷四百七十八
