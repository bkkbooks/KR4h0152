body:
  text: 明文海總集類提要臣等謹案明文海四百八十二巻國朝黄宗羲編宗羲有易學象數論已著録宗羲於康熈乙夘以前嘗選明文案二百巻既復得崑山徐氏所藏明人文集因更輯成是編分體二十有八毎體之中又各為子目賦之目至十有六書之目至二十有七序之目至五記之目至十有七傳之目至二十墓文之目至十有三分類殊為繁碎又頗錯互不倫如議己别立一門而奏疏内復出此體既立諸體文一門而却巧瘞筆放雀諸篇復别為一類而止目為文尤為無謂他若書序傳記諸門或析學校書院為二或叙文苑於儒林之上或列論文論詩於講學議禮議樂論史之前編次糅雜頗為後人所譏考閻若璩潜邱劄記辨此書體例為必非黄先生所編乃其子主一所為若璩常遊宗羲之門其説當為可據盖晚年未定之本也明代文章自何李盛行天下相率為沿襲剽竊之學逮嘉隆以後其弊益甚宗羲之意在於掃除摹擬空所倚傍以情至為宗又欲使一代典章人物俱藉以考見大凡故雖遊戯小説家言亦為兼收並採不免失之泛濫然其蒐羅極富所閲明人集幾至二千餘家如桑悦南都北都二賦朱彛尊著日下舊聞時搜討未見而宗羲得之以冠兹選其他散失零落頼此以傳者尚復不少亦可謂一代文章之淵藪考明人著作者當必以是編為極備矣其書巻帙繁重傳鈔者希此本猶其原藁四百八十一及八十二巻内文十二篇有録無書無可核補今亦並仍之云乾隆四十四年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:affd1c57203e1108de47e5c63faee476748978bccc7d0f5efc059568f363b6a1
