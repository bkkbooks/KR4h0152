body:
  text: 明文海巻二餘姚黄宗羲編賦二國事二北京賦李時勉惟皇明之受天命也我太祖皇帝首仗義師以平暴亂豪傑景從聲振江漢削除僣竊拯民塗炭定鼎金陵撫綏萬邦乃睠兹土實雄朔方倣成周之卜洛欲並建而未遑逮我聖上繼明重光握乾御極一遵舊章仁聲洋溢乎遐邇恩澤汪濊于八荒既致治于太平遵皇衢以省方仰先志之未遂度𢎞䂓以作京𦍑經營之伊始徧區夏其懽騰曰惟北都在冀之域右挾太行左據碣石背叠險兮重闗面平原兮廣澤宗恒嶽其巍巍鎮巫閭而奕奕冠九州之形勝實為天府之國是以軒轅邑之以分州唐堯階之以為帝擴神化以宜民大勲徳之光被鬱王氣之所鍾于今茲而有待也於是仰瞻析木俯測地靈龜筮兆吉天人叶應神祗獻珍而山石自出河嶽效靈而神水自行民子來兮相續期不日而功成爾乃懸水樹臬識景表營方位既正髙下既平羣力畢舉百工並興建不㧞之丕址拓萬雉之金城引天泉于西阜環湯池而鏡清九衢百塵之通逹連甍邃宇之縱横顧壯麗其若此非燕逸而娱情盖所以強幹而弱枝居重以御輕展皇儀而朝諸侯遵先軌而布仁政者也若乃四郊砥平皇道正直視萬國之環拱適居中而建極其南則萬流宗海平林蔽天攬邯鄲鉅鹿之廣衍貤平疇沃野之綿延溏淤恒衞徑其野濡磁淶􅀈匯其前界以大陸廣阿之𢎞壤阨以大茷井陘之連山包絡趙魏襟帶齊魯膏腴之地綿亘三千餘里而極於黄河伊頴之川其水陸之所産卓犖繁盛盖莫得而計焉其北則叠嶂􅐑峞層巒蔽虧長城矗乎雲表百泉湧乎山隈壯天闗而設險守一夫而莫開偉左盤而右顧宛鳯舞而龍飛實磅礴而鬱積粤擁衞於邦畿包狼山上谷之阻據野狐獨石之危掩祖山木葉之離立連白登紫塞之逶迤控遼陽而極乎洮河之北鎮朔漠而逾乎瀚海之湄總部落以千帳莫不畏威懐徳相率而來歸其東則潞河通漕控引江淮肥洳灤淶灌注縈廻連峰片石之隘首陽崆峒之厓玉田白璧神仙璚臺超無終而越金山跨遼瀋而逾鴨緑至於暘谷日出之涯固已遐哉邈乎而莫不在乎綏懐環以大海衆水所歸洪濤巨浪洶湧崔嵬盖不知其幾千萬里而蠻商畨舶㠶檣隱天上下不絶而往來又有蓬瀛方壺鳯麟聚窟十洲三島靈異非一琉精之闕瓊華之室墉城岧嶤金臺崒嵂紫氣丹青景雲矚日靈圄偓佺安期羡門之倫相與游從乎其間出入隱見而恍惚瞻帝京其伊邇庶可見其駿鸞駕鶴之髣髴其西則崇山鬱翠髙挹泰岱北接居庸南首河内竒峰擁闗龍門阻隘玉泉垂虹青煙浮黛上嶻嵲兮倚空下蟠據而際海其麓則有渾河湯湯西湖泱泱蘆溝琉璃桑乾廣陽雪波泛湧灝溔汪洋一瀉千里㑹流帝鄉又有上林禁苑種植畜牧連郊踰畿縁丘彌谷澤瀦川匯若太湖瀛海渺瀰而相屬其中則有竒花珍果嘉樹甘木禽獸魚鱉豐殖繁育􅂒􅂒籍籍不可得而盡錄固可以因農隙而校田獵選車徒以講武事乃遵國風稽王制詔期門簡將帥乗玉輅擁翠盖出天闗而雷轟轢芳郊而雲㑹非所以威戎誇武娱樂騁意盖將取不姙而除苗害狩無擇而順殺氣謹大易之用於三驅之時驗騶虞之仁於一發之際水衡虞人之容與武夫壯士之奮厲皆知夫仁者之為勇而以投石超距之足鄙亦何必殄夷禽獸割鮮野食而以俛仰極樂之為貴也若夫其宮室之制則損益乎黄帝合宮之冝式遵乎太祖貽謀之良居髙以臨下背隂而面陽奉天凌霄以磊砢謹身鎮極而崢嵘華盖穹崇以造天儼特處乎中央上倣象夫天體之圓下效法乎坤徳之方兩觀對峙以嶽立五門髙矗乎昊蒼飛閣屼以奠乎四表瓊樓嵬以立于兩旁廟社並列左右相當東崇文華重國家之大本西翊武英嚴齋居而存誠彤庭玉砌壁檻華廊飛簷下啄叢楹髙驤闢閶闔而蕩蕩儼帝居於將將玉户燦華星之炯晃璇題納明月而輝煌寶珠焜燿於天闕金龍夭矯於虹梁藻井煥發綺忩玲瓏建瓴聫絡複道廻衝軼霄漢以上出俯日月而盪胸五色炫暎金碧晶熒浮輝揚耀霞彩雲紅其後則奉先之殿仁夀之宮乾清坤寧眇麗穹窿掖庭椒房閨闥閎通其前則郊建圓丘合祭天地山川壇壝恭肅明祀至於五軍庶府之司六卿百僚之位嚴署宇之齊設比館舍而並置列大明之東西割文武而制異至於京尹赤縣之治所王侯貴戚之邸第辟雍成均育賢之地守羽林而掌佽飛者至九十而有四衞莫不井列而棊布各雄壯而偉麗其岩廊之上則有臯䕫稷契之倫元凱俊乂之軰相與􅆳虞廷之歌談羲農之際罄補衮之能懐忠貞之志考禮文于大備賛聲樂之盡美是以朝無缺政徳教漸暨薄海内外均陶至治幸其有作聿來趨事成此大功忘其劬勩人和既極休徴滋至慶雲瑞靄之覆于闕庭素鳥𤣥之獻于丹陛醴泉屢出甘露數墜麒麟騶虞之珍馴獅天馬之類紛紜雜遝莫能殫記于以見天眷之益隆而聖徳之純備者也於是正月上日工既訖工爰告成于天地肆紹美于祖宗清心凝慮齋沭肅雍粢盛既潔牲牷既豐芬郁郁以旁逹靈繽繽其來䧏錫嘉貺之穰穰介景福於帝躬將順應於昌期趾盛美於無窮乃服衮冕御帝座開九重之深宮受萬邦之朝賀内侯甸而要荒外殊方而異俗胥近悅而逺來紛鼔舞而匍匐方物溢以充庭奓絢燦而駭矚率蹈舞於階墀效華封之三祝爾乃浹和㑹昭景鑠鏗鯨鐘奏雅樂詔光祿以開筵合百辟而宴樂饌珍玉兮芳馨罍瓊漿以斟酌聨貂蟬兮夾陛雜蠻方之荒服莫不酣暢而飽徳咸頌歌而踴躍越填城而溢郛藹歡聲於寥廓斯可以嫓太古之無為慶華胥而蹈栗陸顧皇上之謙抑視至治為未足於是降徳音播嘉恵省刑罰薄賦稅汰冗濁旌㢘吏舉賢才擢俊乂發倉廩賑貧匱尊髙年而禮有徳慎防禦而修武備貴爵重賞以厲㢘恥厚往薄來以馭逺裔盖欲使人知所本士知所勵四方萬國無一民之失所窮陬僻壤無一物之不遂舉陶於春風和煦之中而樂於雍熈泰和之治此盖堯舜兢業之心文王敬止之意所以紹鴻業繼先志益宏逺而有偉故不勞而甚易冠絶乎前古垂休于後世固可必聖子之與神孫益昌盛而無替小臣㣲陋忝職文字願賦帝都之盛槩揚國美于萬禩復為之歌曰煌煌帝都兮逾鎬豐阻山帶河兮壯以雄天開日月兮王氣所鍾穹窿造天兮惟帝之宮廓氛祲兮開溟濛鎮中夏兮宣皇風王道平平兮四方來同願皇圖之鞏固歴萬世兮無窮皇都大一統賦楊榮洪惟聖天子龍飛當天下大一統聲教所暨無有逺邇咸樂清寜乃猶夙夜孜孜思所以紹承太祖髙皇帝之先志於是倣成周卜洛之規詔見兩京以肇國家萬萬世之鴻基以開天下萬萬世之太平甚盛舉也况北京實當天地之中山川形勢之壯帝王基業之盛莫逾於此由是車駕累經巡幸宸謨睿算上合天心昭孚祖考百神協順川嶽效靈故自經始以來嘉祥駢集靈貺昭荅而中外臣庶百工衆伎之流㒺不懽忻子來樂於趍事而皇上擴天地之量戒之以勿亟撫之以厚恩賚錫駢蕃慰諭備至不數年間厥工告成以今年春正月朔旦皇上御奉天殿朝百官凡内外文武羣臣與夫四方逺藩之長來覲於庭者莫不懽忻踴躍以為氣象宏偉規模壯麗卓冠千古真足以臨四方朝萬國實為聖夀萬萬年鴻福之徵宗社萬萬年磐石之固聖子神孫帝王萬萬世隆長之慶也猗歟盛哉臣備員侍從覩兹盛美敢不鋪張其事以昭示於無窮焉乃為賦一篇述其大槩謹拜手稽首以獻其詞曰維皇明之有天下也於赫太祖受命而興龍飛淮甸風雲依乗恢拓四方弗遑經營既渡江左乃都金陵金陵之都王氣所鍾石城虎踞之險鍾山龍盤之雄偉長江之天塹勢百折而流東炯後湖之環繞湛寶鏡之涵空壯江南之佳麗滙萬國之朝宗此其大畧也迨於聖皇嗣大一統剛健日新聰明天縱囿四海以為家登羣賢而致用思繼志之所先惟都邑之為重於是天意覽觀人心和同神靈效順龜筮協從既應天以順人爰辨方而正位視往聖而獨超繼髙皇之先志乃相乃度載經載營眷兹北京山川炳靈其為形勢也西接太行東臨碣石鉅野亘其南居庸控其北勢拔地以峥嶸氣摩空而崱屴復有玉泉漫流宛若垂虹金河澄波雪練涵空膏渟黛蓄浩𣺌冲融包絡經緯混混無窮貫天河而為一與瀛海其相通爾其派連析津源分潞水既環抱以榮迴亦瀰茫而清泚來職貢於四方通檣㠶於萬里至若王畿之内輦轂之間沃野彌望原陸寛閑烟火相接雞犬相聞宵無警柝外户不闗以牧則蕃以種則穫以田以漁以耕以鑿隨其所營皆得其樂而其為都也四方道理之適均萬國朝覲之所同梯航玉帛為都邑之㑹隂陽風雨當天地之中爰勅臣庶爰伐材木南浮湖湘西入巴蜀斧披虹霓聲撼山谷徂徠之儲新甫之蓄楩楠杞梓杉櫧檉橚梢横青天根連地軸鉅細畢輸長短悉録駕雲車之百輛振龍驤之萬斛紛紜輻輳彌布川陸厥材之良不一而足若乃美石比玉從古所稱瑩者如圭潔者如瓊溫者若璐潤者若瑛以磨以礱乃堅乃貞鏗林振􅊤馳飈驚霆千夫所攻萬里啓行山靈助其光華坤后發其精英豈碔砆之敢混實寶玉之爭呈若夫坎離播功坤艮合徳出於陶冶成于埏埴飛紫燄于半空結祥烟于八極或䂓以圓或矩以方粲琉璃之一色耀文采于中央或肖形於獸吻或擬質于鴛鴦於是良時載啓吉旦既卜臣庶駿奔滃若雲矗源源其來登登其築百堵皆興萬夫相屬行若魚貫立若鱗蹙斧斤揮霍尺度攅簇由是賁育効力公輸獻竒曰殳曰斨伯與暨倕攄厥巧思運厥神機各效其能以見于為顧小善之並録矧妙伎之或遺羣材碨磊以山積鉅棟騰躍而翬飛爾乃九門洞開三殿攸建觚稜雲聳丹漆霞絢輦路逶迤閣道回轉華盖屹立乎中央奉天端拱乎南面其北則有坤寧之域乾清之宮璇題耀日寶柱凌空金鋪璀璨綺疏玲瓏珠玉炫爛錦綉丰茸葳㽔起鳯夭矯盤龍千門瑞靄萬户春融其南則有午門端門左掖右掖丹闕峙而上聳黄道正而下直豁大明之髙張屹正陽之拱挹繚周廬之穹崇蔽重薨之䕶翼其左則有宗廟之祀以奉祖考仰在天之神靈隆萬古之尊號謹嵗時之烝嘗薦純誠於蘋藻其右則有社稷之靈以崇祀享汎壇壝之肅清通神祗於肹蠁爰春祈而秋報用昭荅于靈貺若夫乾清之前門列先後日精月華之對峙景運隆宗之並搆謹身翼乎其前仁夀屹乎其右又有奉先之祠大善之殿文樓武樓之特聳左順右順之並建若乃震位毓徳文華穹窿亦有武英實為齋宮有天財寶藏以貯珍貨有大烹光祿以典飱饔寶善在左以翼翼思善居右而崇崇若夫欽安之後珠宮貝闕藻綉交耀雕櫳嶻􅑖六宮備陳七所在列親蠶有館繅絲有室二南詠歌播于篇什輔徳相成風化洋溢皇城之外殿宇魁渠有翼有嚴太孫之居金水之濵瑶階玉除梁棟巍巍上凌太虚為諸王宮翊衞皇圖星羅棋列以臨九衢至若文淵之閣祕書之府纂述乎今儲蓄乎古汗牛充棟莫知其數牙籖迤邐緗帙旁午粲奎璧之上連赫虹霓之夜吐若夫飛閣峩峩實為承天綉楹霧簇畫栱星聫踞石猊之盤礴竦華表之巋然至若南郊之設特超古制圜丘方丘不岐以二合祀于中父天母地壇分内外二十有四羣祀有典百神有位惟我太祖寔配上帝乃嵗孟春三陽之始吉日斯蠲祀事有備薦以粢盛泛以醴齊豆籩秩秩庭燎􅀈􅀈鼔鐘戒嚴鑾輿至止儼對越以升中祝蕃禧之攸萃至若山川有壇先農有祀馬祖旗纛各以時祭寅畏恪恭㒺有弗至若夫稽古建官為民之牧内外相承各率其屬至若黄門給事青𤨏仙班典内廷之封駁近咫尺之天顔復有文翰之林詞藝之苑處嚴宻之清禁列英華之妙選優游玉堂之署出入金鑾之殿擅瀛洲之美譽承黼扆之清問至若鳯池之職尚寶之司掌絲綸于紫誥典符璽于彤闈有宗人以統天潢之派有銀臺以通㗋舌之機若乃六卿分職位躋台鼎賛廟堂之謀謨總藩方之政令至若憲臺之任風紀是司廼耳目之所寄實法度之攸施若夫都府有五軍政是宣奮貔貅之將士耀霜雪之戈鋋保輿圖于安堵掃絶漠之烽烟至若都邑有庠辟雍有學育才于兹以儲以擢若夫容臺典祀士師明刑錦衣總夫儀衞廵警係於五城鴻臚謹朝謁之禮太僕司監收之名京畿布列於州郡田野参錯於屯營至若奉神有祠執功有廟梵宇琳宮光輝朗耀倉廩之積如坻如京露積紅腐陳陳相因鎧甲晶熒士卒精銳靡強弗摧靡堅弗碎驊騮騏驥騕裊驌驦宛冀之駿渥洼之良充乎内廐磊落騰驤又有福山後峙秀出雲烟實為主星聖夀萬年層嶂叠擁竒峰相連鼓鐘有樓其髙接天勢若貫珠萬里綿延若乃朝市既成井邑斯列閭閻輻湊闤闠有截豁九逹之通衢羅萬室之如櫛富商巨賈肩摩袂接北通朔漠南極閩越西跨流沙東渉溟渤來百貨之縱横雜輪蹄之填咽珠機爛其煇㸌羅綺煜其騰沓至若青樓並峙綺榭相連妖姬窈窕艷女嬋娟穠妝競倚粉黛争妍引歌㗋之宛轉廻舞袖之蹁躚極酣嬉于暇日窮勝賞於芳年至若太液之池萬嵗之山澄波㶑灔層岫㠝岏開闔蔽虧縈帶廻環竦飛樓於晻曖敞貝闕於岩端門臨碧蘚之磴橋梁玉虹之灣晴光出乎軒檻飛翠洒乎䦨干瞻廣寒之月殿撫桂樹之團團爾其瑶草蘢䓗琪樹羃歴長松之蟠古栢之直脩篁烟挺老檜雲積瑰偉之姿竒異之植蓊然其隂嫣然其色宛蓬瀛之在兹恍塵凢之遂隔至若上林衍沃靈囿逶迤瀦以碧海湛以深池百草緑縟群卉芳菲寛閑薄乎禁篽平廣屬乎坤維樂鱗介之游泳縱毛羽之離褷乃有騶虞效祥麒麟表瑞白質黑章麕身牛尾神鹿貢於遐方白象出于南裔倐𤣥之繼呈忽天馬之沓至復有馬哈福祿厥獸殊形駝鷄之異白烏之禎竒姿詭態率舞縱横𨽻首莫紀伯益難名至若地祗協順天心昭格嘉祥叠臻靈貺蕃錫神木不運而自行祥氛煥發於巨石忽靈蛇之前導現大青於沙磧瑞光煜乎半空卿雲爛兮五色醴泉湧兮瓊漿甘露湑兮玉液靈芝産于碧山景星見於南極秃千以難窮殫百喙而莫悉然而歴觀前代迄于往古帝王所都難可畢舉豐鎬之美崤函之固宛洛之竒汾晉之富雖或雄據於一時控馭于中土而於今兹帝都之壯麗又豈可以同年而語哉廼嵗庚子告成厥功辛丑正旦方春和融聖皇御朝萬方㑹同百辟卿士肅肅雍雍光天之下㒺不率從戴白之叟垂髫之童且欣且忭拜舞呼嵩仰祝聖夀萬福來崇慶此皇都佳氣鬱䓗擴基圖於萬世偉壯觀于九重真帝王悠久之業據山河表裏之雄然而聖天子以六合為家以四溟為池以仁義為干櫓以禮樂為藩維不恃險以為固惟在徳之所施至和塞乎穹壤恩澤洽乎荒陲致九有以寧謐躋萬國于雍熈此其所以徳侔乎堯舜道合乎軒羲寧天地亘古今而莫能與齊也臣職禁垣叨䝉眷顧謭陋是慙㳙埃莫補覩皇都之鉅麗壯宏䂓於往古潔泓頴於長辰陳盛事以為賦又從而為之歌歌曰翼翼皇都萬方之㑹兮聖徳之宏實同覆載兮聲教所暨一統無外兮又歌曰皇都翼翼民之所止兮惟皇萬夀福禄無已兮聖子神孫寶祚萬世兮皇都大一統賦金幼孜洪惟天朝太祖髙皇帝誕膺景命龍飛淮甸既渡大江遂都金陵撫有區夏肇造洪眷以開萬世太平之業逮我皇上繼承大統克紹丕圖仁恩誕敷聲教洋溢雨暘應期民物阜蕃薄海内外㒺不率從而自蒞阼以來宵旰拳拳惟思所以繼志述事以承太祖髙皇帝之意於是傚古制肇建兩京以為北京寔當天下之中隂陽所和寒暑弗爽四方貢賦道里適均且沃壤千里水有九河滄溟之雄山有太行居庸之固玉泉之流經緯乎禁籞之中碣石之壯盤踞乎畿甸之内故其山川之壯觀風氣之清淑真有以卓冠四方為萬國之都㑹誠帝王子孫萬萬世太平悠久之基由是勅冬官洎内外文武百執事經營于兹而凢民庶士卒工匠之流莫不駿奔子來趨事赴工㒺敢或後遂至天意人心感孚和同靈應叠臻嘉祥屢薦不數年間厥功告成而宮闕府庫之宏壯郊廟社稷之嚴肅朝市民物之鉅麗秩乎其有序井乎其具列盖自古先帝王都邑之盛未有逾於此者乃永樂辛丑春正月朔旦皇上御奉天殿大朝海内文武羣臣四方藩服率皆在庭踴躍鼓舞以為皇都之竒麗若此誠曠古所未見而未有者而所以為皇上萬夀之徴宗社盤石之固聖子神孫寶祚綿延之慶皆兆于此矣何其盛哉臣叨居禁苑職業文詞幸際昌期躬覩盛美謹鋪張為賦以彰太平之偉烈且以昭示於無窮其詞曰維太祖之受命膺上天之禎符奮布衣於淮右提一劍而長驅乃翦夷于群醜悉蕩滌于寰區既渡大江金陵是都虎踞龍蟠興王之居爰啓鴻業肇開皇圖振光華于曠古恢萬世之𢎞模繄我聖皇祗膺寶厯奉天勤民太祖是式恩覃九圍仁周八極雨暘應期民物豐植覩四方之清寧乃有念于京邑維此北京太祖所屬天造地設靈鍾秀毓緫交㑹于隂陽盡灌輸于海陸南臨鉅野東瞰滄溟西有太行之嶻􅑖北有居庸之峥嶸㵼玉泉之逶迤貫金河而廻縈瓊島上聳以盤礴太液下澈而澄泓將繼志而述事必於此而經營乃勅羣工乃命百職萬方子來効勤殫力萃四海之良材伐南山之鉅石感恩意之昭孚戒經營而弗並于是天心協順靈應彌彰布輪囷之卿雲發璀璨之祥光醴泉湧其浩浩甘露下其瀼瀼赫萬靈之呵䕶藹瑞氣於穹蒼乃卜良辰乃蠲吉日以相以度以搆宮室棟宇崇崇簷楹秩秩以盖以覆陶冶埏埴以繪以塗黝堊丹漆煥五彩之輝煌壯九重之嚴宻天地洞開馳道相連金鋪絢日玉柱凌烟星羅棊列壁璨珠聫虹飛霞擁龍翔鳯騫超凌氛埃壯觀宇宙䂓模恢廓次第畢就奉天屹乎其前謹身儼乎其後惟華盖之在中竦摩空之偉搆文華翼其在左武英峙其在右乾清並耀于坤寧大善齊輝于仁夀豁千門之雲矗敞萬户之輻湊至若丹闕巍巍飛觀凌空觚稜上聳閣道遥通左祖右社蔚乎穹窿有壇有壝有寝有宫亦有天地以嚴其崇復有石渠天祿以蓄圖書玲瓏綺錢照耀文疏懸牙籖之萬軸列緗帙之紛如宛奎畫之宵暎粲藜燈之夜嘘瀛洲文學之士閬苑列仙之儒備顧問于朝夕咸欽仰于聖謨又若大庖光祿列乎西東珍饈駢羅玉食惟豐禁城之下金水溶溶畫棟凌雲繡柱含風璇題耀日綵橋架虹雕甍隱暎寶殿玲瓏太孫所居諸王之宫金枝玉葉照耀層空育徳講學宴適㳺從若夫御苑逶迤上林深窈有山有泉為臺為沼巖谷谽谺雲霞縈遶走有竒獸飛有靈鳥樂寛閑以棲息恣回翔以馴擾復有天閑十二駿骨軒昻渥洼神龍之種大宛名駒之良並權竒而雄傑或磊落而騰驤又若廩庾輪囷惟萬惟億豐嵗所儲累世之積玉粒金稃露積充溢國用所資人足家給復有武庫巍峩戈矛森列旗幟揺雲鎧甲耀雪凛凛白旄差差黄鉞四征不庭以彰九伐奮軍聲之揚揚振皇威之赫赫又若内帑充牣寶藏紆餘竒珍異産海匯河輸夜光之璧明月之珠琉璃翡翠瑪瑙珊瑚􅟴璖琥珀火齊璠璵錦綉迤􅆔羅綺芬敷又若百司庶府有綱有目文武頡頏為國鈞軸太學羣庠之並建琳宫梵宇之森矗列九衢之坦坦引六街而相續閭閻櫛比闤闠雲簇鱗鱗其瓦盤盤其屋馬馳聫轡車行擊轂紛紜並驅雜遝相逐富商巨賈道路相屬百貨填委丘積山蓄又若歌樓舞榭艷熊穠粧羅袖回雪清聲繞梁管絃嘔啞狎坐傳觴娱青陽之麗景駐白日之飛光維大小之不遺仰制度之畢修斯皆聖智之籌謀實出宸衷之經緯儼氣象之一新壯䂓模于萬世屹鴻基之豐隆偉河山之巨麗貽子孫以嘉猷紹先皇之初志邁豐鎬之舊䂓軼漢唐之遺制于是厥功告成慶叶天人乃嵗辛丑為孟之春王正之月朔旦良辰聖皇臨御大朝羣臣内外文武濟濟彬彬逺及蠻貊工商士民稽首嵩呼抃舞歡忻筐篚其列方物畢陳以饗以餔洽此皇仁大一統而無外藹至和于八垠臣忝詞垣叨職文字懐寵眷之彌深愧㳙埃之無補際千載之良逢幸㣲生之快覩傳盛事于將來奚往牒之足數祝聖夀于萬年播皇猷于千古明文海卷二
