body:
  text: 明文海巻四餘姚黄宗羲編賦四國事四文淵閣賦顧清昔我文皇之統萬方也稽往古遵舊章攬衆維提要綱謂六典之分雖倣於周禮而百揆之總實自於唐虞或合而分或約而詳盖不可無樞機之總疇咨之良也乃眷斯顧禁垣之隅乃崇傑閣翼彼宸居錫文淵之嘉號擢鑾坡之碩儒職論思於九重賛元化於中樞雖官曹之未彰實名體之隱如此其大略也若乃其地則日華之右丹鳯之東重門側啓複磴中通長廊後帶而龍矯層城對起而繚虹非宻勿之有闗盖不得以闖乎其宮其中則有石渠之秘金匱之藏殷周訓誥洙泗典常班馬之所叙述賈董之所鋪張奎光璧耀照灼乎虹梁其前則有玉階珉磩仰接俯延文杏敷錦碧芸連錢瑶臺植和鼎之卉銅池分並蒂之蓮承雨露之先及各獻巧而呈妍其為制也邃宻髙閎沈深肅清黄扉豁其前厰白間疎以通明案有朱墨庭無訟争希夷乎紫宮逍遥乎玉京邈風雨之何及時仙韶之逺聆乃有臯䕫之軰稷禹之倫大冠長劍鳴玉垂紳坐于兩楹敷帝猷而演皇墳萬機倚以裁決庶績賴以經綸則有大官供帳天府竒珍湛恩渥禮眷我儒紳至於睿思時凝事資訪逮中貴傳宣東朝賜對日度晷而徐還歩金扉而緩退其或金根戾止玉輦幸臨略等級於堂陛咨失得於古今每先過而陳善亦隨時而獻箴或都而俞或吁而咈言皆可書動鮮有慝此則建閣以來累朝之盛節也嗚呼漢開金馬賢俊雲蒸唐啓學館士誇登瀛徒取技于雕蟲尚無關于大經然猶耀簡策熈鴻名而况地兼乎木天之重名並乎鳯池之榮酌元氣以運四時敷王言而令庶正宜乎萬事於此理萬化于此成而陶冶乎其中者又可闕於頌聲也於是拜手稽首敷陳其槩而系之以歌歌曰五雲葱龍黄閣崇兮東壁流照光空兮維帝伊佐志浹道同兮政於此成民物豐兮有隆自今垂之無窮兮河清賦有序胡廣永樂三年春正月癸夘髙平王平陽王奏禹門津黄河清朝臣歡動以為皇上聖徳所致進表稱賀皇上謙抑弗居未㡬秦王暨山西守土之臣亦皆來奏見者謂其清如碧玉洞鑑毫髪既而成五色經三旬有二日漸復其舊稽之載籍黄河千年一清聖王之大瑞而五色者尤瑞之大者也恭惟皇上以至徳之聖主敬之躬作配天地廣運神化瑞應之來適當其期臣叨陪侍從幸覩兹盛事宜有紀述以傳誦將來其辭曰葢聞洪河之水通銀潢而直下介箕斗之微茫繞崑崙而奔㵼歘潛行於地中忽渙發乎重野景如汲海之長虹勢若馳岡之迅馬驚湍騰逝悍波衝射競千雷兮砰洵鬬萬鼉兮呼咤淈泥沙兮悠揚羌晝夜兮不舎方其道積石厯龍門下砥柱逾孟津出乎無際漂乎無垠臨萬頃兮漭潒折九曲兮沄渾想夫浩浩湯湯堙塞未疏濟漯未從淮泗尚瀦滙四隩而為壑襄髙陵而為汙暨九川兮滌源九州兮既别拯蒼生於墊溺免斯世於魚鼈惟六府之孔修兮賴胼胝之偉烈嗟形容於允翕兮諒一葦之可越逮乎周道既東文武益逺清人麃其翺翔方叔去而不返葛藟興綿綿之詠尼父有已矣之嘆至若瓠子載決宣防既歌下淇園之綠篠沉美玉於滄波恒汩汩兮混濁或沸齧兮盤渦曽未識其安流胡能有於盈科誦逸詩兮俟清嘅人夀兮㡬何信不可以驟得必以待夫時之泰和爾乃禹門中闢磧石碕礒洪濤不興一碧千里若人間兮天上𣺌余視兮衍迤式同觀乎渭濱儼浮游於湘芷澄靚兮泓渟滉瀁兮濔比鴨綠於漢江陋苔青於淮涘澹玻瓈兮洞射凝雲母兮毋滓風泠泠兮吹淥漪天晃朗兮映漣泚粲飛鳥兮白鷗數遊鱗兮鱣鮪山倒黛兮染翠嵐拖練兮成綺姱瀲灧兮挼藍堪薦潔於明水朝陽升兮澱彩盪夜月照兮鏡光洗紛揮霍兮五色乍紆徐而忽駛寔元氣之融㑹而發榮光於此乃有黄耉居河之漘睹奫潫而瑩澈為盛世之休徵爰以告言聞於紫宸無小大而咸喜騰遐邇之歡聲維聖人以在上致四海兮隆平霈仁恩兮汪洋洽寰宇兮皆春萃諸福兮畢來沓衆瑞兮駢臻所以天乆儲其晶英地復閟其靈秀而千載之嘉應實有待於聖明乃宗藩稱瑞寜謙抑而弗居秦晉呈祥遜膚功為曷勝葢功愈大而心愈小道彌髙而徳彌𢎞視夫平成之績亘萬世而同稱者也猗歟聖皇允協神禹稽河清之致祥翳寥寥兮前古撫金人而徘徊摩銅狄而容與求有並美於今日亦澷漶而莫嘸泛星槎以尋源聊逍遥兮銀渚俾𤣥㝠兮先驅訪往跡於河鼓雲冉冉兮斯征路迢迢兮逺舉憇鵲橋而孤吟睇層霄而延佇瞻珠闕之崔巍聆羣仙兮夜語謂聖皇兮逹孝克繼述於太祖纉洪業兮率舊章靡毫髮兮爽軌度誠於穆而不已全睿智與文武天茂錫兮純祉浩穰穰兮繁聚粤鴻荒兮芒芒河之清兮今始覩於以闡皇猷之精㣲隆子孫無窮之祚彼漢唐之偶值又奚可以比數辴元元而無知將以告夫下土羲和忽以啓駕宵朣朧兮欲曙靈繽繽兮既遥􅒆余袂兮來下扶雲漢之昭回挹九天之湛露披琅玕以自呈造金門而獻河清之賦於是為之歌曰河水兮清漣聿應期兮斯千年聖皇御極兮徳配天於萬億秭兮福祿綿綿放鳬賦有序周是修洪武丙子春仲之月陛下憇乎東城之臺環羅俊彦咨詢古先既而有進水鳬百餘翼者毛色鮮華群匹和輯悠然興夫不忍之心俱放於濠觀其始則紛紛焉少則濈濈焉俄而並舉翀逝於是覽春光之舒遲樂物性之得遂怡怡如也愉愉如也召奉詞臣周是修賦之臣感夫君徳之至仁及庶類敢不奉敭休命再拜稽首賦曰猗茫茫之堪輿兮胡萬類之紛敷維水禽之衆美兮盛莫盛于鷖鳬雖群游之無算兮非定耦而弗居泛波濤之浩渺兮樂滄洲之遼夐藉軟莎而安眠兮㺯經萍而閑泳頳其趾而丹凝兮縞其襟而玉暎性於物而不忮兮恒恣情乎煙沙孰虞人之曾識兮𦍑潜羅而忽加愛毛質之綺䴡兮遥將獻乎皇家繄予皇之仁徳兮當覽春乎崇臺體陽和之生育兮澹冲融而舒懐適筠籠之跪進兮絢晴光于文繡既彬彬而戢羽兮亦肅肅而並咮啓予皇之良心兮勅俱放乎金濠始依依而泊淺兮漸翾翾而升髙交廻翔而返顧兮若感恩而不捨徐翀蜚乎雲霄兮遺餘音乎鉅野何皇心之惻怛兮由親親而仁民由仁民而及物兮秩先後而有倫豈睿鑑於往古兮寔誠中而形外思髙下與洪纎兮期並育而不悖唯好生而惡死兮人與物其同情何至徳之昭明兮舉一視而同仁觀夫若商郊之祝網兮暨中山之放麛於禽獸猶有所不忍兮矧於人而違之尤異乎華隂之黄雀兮終啣環而報施抑嘗聞江濵之白龜兮先伏篆而朕祺善予皇之深慈兮澤旁沾乎㣲物念蒼蒼之生靈兮曷非辜而有忽嗟羣鳬之何幸兮脫萬死於斯須遂重登於遼廓兮從心性之所如歴漫漫之河濟兮依漠漠之江湖刷羽儀而再整兮顧儔匹而相呼縱物性之或昧兮將天理之可慿粤作善而降祥兮同影響而足徴匪麟趾之仁厚兮又烏致夫騶虞之蕃息願擴充乎是心兮明刑政而不忒日揄敭於仁聞兮無一夫之不獲誶曰爾鳬之生兮仁君之恩倐離鼎爼兮翺于天門東西無際兮南北無垠網羅交張兮矰􅗤相仍慎爾所止兮全爾性靈母或輕投兮暝渚寒汀庶永慰乎王心兮想遐征而孔寧盍啣圖而獻禎兮逐韶鳯以來庭彰予皇之至治兮發詠歌乎詞臣超間平於千載兮流無窮之徳馨感宦籍賦有序湯顯祖今上丁酉三月予以平昌令上四年計如錢塘盪舟長日篋中故有髙士傳慨然尋覽之無存也童子故以宦林全籍進予覽其書書官書名書地書號大若麟角細若牛毛晰矣備矣反覆循玩亦可以奮孤宦之沉心窺時賢之能事感而賦之曰有平昌之令尹淹結課以孤覉偶猶夷而懊悵暫循求於展披頗有仙班秘籙士品𤣥碑巾箱失檢記室忘携既宦林之有籍豈童子之無知因而取御業已忘疲嘆閱川而閱世何此書之可怡冠二京分列省之地界標四季合匝嵗之天時其地界也東綿遼掖西折凉嶲北隃代薊南極滇黎控中軸于長安部河山而四維皆百戰之所取豈一日之可縻署都官於南北擬周漢之東西南簡曹而少務北備宷而多儀外則邉遥其腹幹切其支臺省於焉受使州郡於焉稱知有斗僻以孤鎮亦犬牙而交岐甫一逕以紀絶或三㑹而扼竒下至一尉一候險如三亳三危有兼有特孰正孰禆莫不禹迹陟于周官堯封攝乎漢威猶恨缺紀官于朶衛失請吏於邊陲其天時也選則通急之殊其候推則例閏之譎其竒秘館視三年之學内徴以四稔為䂓奏計佹優而或殿報政當遄而或稽卧痾者往來於浹嵗予寧者去往以彌朞或遑將而往返或奄息之早遲苐有聞其必鐫鮮存亡而闕疑覘邸報之日積直㑹計而改為是故日厯終嵗以猶把宦籍逾時而輒揮在近者摘新而賞實市逺者豫舊以酧欺非春秋也筆削聖而竊取非易也先後天而奉時時之為義大矣惟名與器隨之嗟夫大鈞寫物皇極鑄人物與無妄人生有真吾有身而易寵世喪道而難貧是以羞其編户榮乎縉紳然而布種詭雜值候繽綸幸者乃為公矦之子卿相之孫前書厥考有階有勲後列環衛如官如恩托江河而猥大依日月而常新不必學書學劍自然允武允文又若駙馬都尉一體天人在既富其何費獲至貴而無勤次則納貲而為郎亦以財而發身過此以往其勤可知矣清流之跡奮以文辭則必沒身乎藻綴噪吻于吟吚寒暑侵而靡覺骨肉怨而不辭至如羽林𨽻䇿倉門學醫吏人讀律中書臨池𤣥流理樂天文測璣莫不窮年渇晷立骨銷肌彼殆胡為乎爾誠亦有所用之又其甚者作奸犯科知無不為跂榮分僇迂平取竒皆欲爭毫釐于此籍之上附咫尺于半部之餘外有乗間抵􅇖能畵能棋㣲言解頥說劍說詩日者狎客夜來秘師皆得遊大人以成名指旁流而借貲下則緹騎惡子前魚弄兒一則如貙如豺一則如韋如脂無足比數何所覬睨然而物有所至事不可知買功爵於攫金之後乞告身於枕袖之時經營衣錦踐躐綦絲在主爵而無靳咤剞劂以何遺苐云為之則是敢曰文不在兹嗟夫天下亦大矣仕人亦夥矣有鳯凰之官則必有蟣虱之使有金玉之英則必有糞土之士巨海葺龍蚌以鋪文太華總松榛而繞翠散之人有十等合之天無二日天其平也不平人則不一也而一不平謂何有一有多有終身於帝所有絶望於廊阿有十年而不調有一月而累加有㣲欹而輒振有一蹶而永蹉有弱冠而崢嶸有白首而婆娑有受萬金而無譏有拾片羽而為瑕有擁氊于華羡有投牒于荒厓有提鹺而擬方伯有守郡而無建牙有贍僮客而鳴豫有絶父母而勞歌有長孫曾而襲珪有鬻子女而還家有上夀而賜尊有自經于幽遐麗風者衎言笑而加翼絶津者罄號咷而靡槎得時者隨俯仰而皆妙失志者任語嘿以無佳徒使墨守者視此書而失據捷鬬者指是刻以嚴誇智愚勇怯於斯乎盡銳貧富侈嗇于是乎交賖細則鑚如蚊蚋大則㨿若蛟鼉緩則穆如塤竾急則惨若鋩邪親屬之榮悴以此人身之軒輊匪他何必耆舊傳而特筆人物志以編摩苐登名於仕版若陟巘以盈科有䂓有矩如琢如磨諒有朝其必市想無臣而不波乃有揚休山立籧戚駘駝姓名舛詭爵地参差鸞視虫其一粒豹覺鼴以隨窠茍有懐而未瞑緫奔命於旁羅是故謁選則咳成雷雨議汰則委若泥沙地貴則聫之以雲錦命賤則等之以風花至消詳于品列益撫巻而增嗟名理疇而贋售功勤埒而盗夸等竒節而抑真並文林而采華然則兹籍也盖有朱紫異質淄渑同和者矣迨其甚也且有人焉巧若窮竒昧若渾敦名可以冠楚杌貎足以鑄神奸物論之所必去兹籍之所獨存方災木而未已或閱季而彌尊亦有行若處子智若耆舊望足以壓折非是才足以獻替可否謂周行其必先視百爾而豈後比索名于右方復展轉而烏有或置無人之境或寄冗從之藪冷之所以必灰瘴之惟恐不􅋅彼拙效其常然豈削籍之所朽徒使頑弱之人覽兹籍也耀其貴如得如驚黯其賤如失如玷懲死灰之不然慕積薪之所占名已沒其焉如貴及生而可艷損亢壯以和顔筭幽憂而委念然則兹籍也能使人采色飛舉道心沉亂可觸手而偶觀難淹神而久玩忽掩巻而㒺然吾亦多言之為幻矣秋夜繩牀賦湯顯祖嗟予肱之三折兮方髫齓之嵗月峩峩病骨固難支兮又逢途之九折當春陽之新麗兮蘭茁其芽不使吐辭作醴兮呵筆出花而層冰飛霰兮敗其頴秀身藉荼蓼兮材輸莭莠憶昔十一讀易兮七年鼎革五經句讀初離兮左國文辭未析波平則圏雞牧豕兮塵起則萍漂絮翻於是四民失據兮俯仰惟艱冉冉嵗華兮三旬夢魂妻殀子殤兮聊餬口於村童蜩螗蛙蛤聲中兮舌敝耳聾庚午水變兮開闢未際爾乃穿竄蕭寺兮猶然戀兹疣贅之未潰晝則山童四五兮授以三字夜則寂守繩牀兮共兹囚山之味食則三投麥菽之饘粥兮已煮之碗飯當暑熱時必蒸過一宿後而後投之為粥食者毫無米氣營營青蠅又玷其紅白佐以瘠地之苦蔬兮反漬以衰殘之心血居則分僧寮之咫尺兮乾蝸掛壁南山八月蒼葭兮逗引風霜東海三脊白茅兮疎漏星日野蔓山葛驕而入室兮蕨筍蘆芽戢戢而爭其餘隙蚍蜉遂爭國於檀槐兮蛙黽窺天於坎井一几一榻兮曙而復暝敝帷落盡梅花兮月色融然故衾冰裂水田兮幽渚鷗眠每欲避愁於華胥兮恨春宵之猶永何夏夜之易明兮似獨迢迢於孤枕俄而朱明告謝又值凛秋寸寸衰草處處酸眸山闇闇而欲寐兮溪㶁㶁而捫㗋風鳴金鉄兮盡是商聲雲垂帷幕兮似悼窮愁萬感不召而自至兮都歸展轉之更籌因思夫人自立於宇宙兮君與親之恩㒺極非致主之伊周兮則安邉之衛霍雖束手而談王霸兮亦何忍視斯時之民瘼茍時不吾與兮遂藏經綸於把握即若予之廢人兮豈無翰墨之堪託乃悲歎窮廬兮負千鈞之家學洛閩姚江門牆徧宇宙兮歐陽傳經八代嗟哉尸居餘氣兮園之耳目如芥是以鰥魚之目睫長炯炯兮萬山之凄苦畢集試敷陳其百一兮已藤葛纒乎酸筆初聞淅瀝於風竹兮勢漸逼於奔濤波臣忽溝為絶島兮冷炊火於昏朝天夢難醒兮獸搪突而禽號斯山雨之狀也濕暑收潤兮秋氣到襟初則舞幡幢而拂佛火兮故紙愁吟繼而星河揺而欲落其或落葉敲忩兮魂返雲山之夢宿鳥墜枝兮悲興三匝之音斯山風之狀也着樹凝雪兮穿沙湧潮憶昔四載漁澄兮依依故交今向空林兮分我半巢但怪夫近軒楹而帶秋兮入筆墨而含騷斯又山雲之狀也山境逢秋兮意緒凉荒茅苦竹之間兮贈以清光分清隂於禽藪兮落凉冷於魚鄉於是茅簷逓影兮葦壁蒼蒼松竹書衾兮癯鶴巢霜斯又山月之狀也若夫寒蟬之吟也夏蟲忽值凉秋兮翳槁葉而寄絲聲白雲清露生涯兮花爛花殘豈異其鳴若為代冩心寒兮風中嫋嫋領彼餘清秋蛩之怨也當夫寒澗捫舌兮露草唳含爰有㣲物兮時訴酸咽既不藉食於夷跖兮亦何恨何支干攪倦羽之眠鳥兮警斷腸之定猿嗟予之凉行無伴兮何怪汝之多言至於西月飛梁兮夜影向晨透喤聲於空境兮諸蠢蘇魂如雲冉冉兮不住蒼狗之羣如風渡水兮豈滯藻川之文硜爾一聲兮驚破耳根擬乗桴於二楞之海兮曙樓起東方之白雲非鐘聲之叩曉乎山無雲帶兮樹斂商聲忽起悲音於逺塢兮互報霜清一到衰殘之耳兮感生凄斷之更憶自破鏡離鸞兮十載衣單悼故􅃭之淚痕重叠兮魂絶千山非砧響之搗夜乎若夫循籬瘦菊兮寒映曵汀蓉影堆堦敗葉兮熖分綴草踈螢烏驚暗月兮斷續雁離孤唳鼯嘯空梁兮依稀猿斷三聲猛虎怒嘯兮不寒而慄苦鳥訴衷兮酸欲墮城佛影沉沉兮琉璃明滅梵貝寥寥兮寒竿卒折騷魂召而不反兮雲未斂而惨黯天亦老而㵳泬雖然觀夫世之紅塵機巧兮争枯菀而着足譬彼海市浮山兮儼輝光之眩目走炎趨熱兮競自焚以待燼吁凍呵霜兮易暄凉於片瞬自惟即無轗軻於盛年兮不過把玩於俄頃究亦何所得兮難繫夫崦嵫之夕景憶前賢之流風兮山髙而水長思分雲而把茅兮髙堂之大椿永芳置琴書之楚楚兮摘堦上之薇芳揷萬巻之森羅兮波及乎性海之汪洋觴詠於倍日之年兮亦有雲水之徜徉山中之清風習習兮乃有味於繩牀亂曰山淨林空水清泚兮逈出雲霄無塵滓兮别開門户亦云美兮時不我與託跡此兮名賢風韻可翹企兮養老長㓜翦蓬藟兮雲水遨遊同舄履兮苾蒭蒼翠映蘭芷兮柏子清香妙沉水兮塵世浮華猶糠粃兮明文海巻四
