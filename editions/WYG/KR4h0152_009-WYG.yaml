body:
  text: 明文海巻九餘姚黄宗羲編賦九山川一䝉山賦梁寅維堪輿之奠位斯山岳之肇形類波濤之激蕩擁泥沙之峻嶒為嶠為岒或丘或陵尊若帝王陪以公卿然人也以山而鍾秀山也因人而著稱在于荒陬雖崇而隐邇乎名都雖卑而名竊愛夫䝉􅊐之鎮吾地其餘終南少室天台會稽何彼重而此輕也哉觀其勢雄千仞根盤百里嵯峨嶔唫蜿蟺峢施竅以諸洞界以衆水巘崿鱗鱗崕石齒齒疆域之標郡國之紀皂嶂東迴春臺西峙鰲峯北聳渝流南迤其為寳藏則白金之璀璨碧鈿之璘㻞長炎方之竒産充天府之上珍其為靈蹤則金刹據其陽仙巖在其顛森祗樹於翠谷閟小有于洞天若乃瑶草匊芳珠林挺秀風篁球戞烟蘿帷覆蘭茝緣於徑畈芝术産乎嵌竇長隂澗之茯苓絢霜林之橘柚猿猱哀笑熊羆怒咆霧卧文豹湫吟黑蚪揚夜鶴之遥音露秋鶻之懸巢過客眩於妖狐樵子駭乎山魈凡其根荄之品飛走之族時榮時悴以涵以育富于靈囿之駢羅夥于陸海之儲蓄博物之張華無以辨其類洽聞之郭璞曷能究其目宜夫絶俗貞士離世潜夫悅雲霞而長往與麋鹿以為徒玩岡葩之春媚樂岑木之夏敷吟素秋於月觀度𤣥冬於雪廬坐紫臺兮綠綺奏蔭蒼松兮芸帙舒或茹芝兮白日晏或掃葉兮凉飈随想夫楚叟之賢栖山之陽躬尚稼穡志輕侯王觀山泉之泓渟悟䝉養之端莊惬閑情於濬壑杜妄轡於巖廊嗟軒堯於既逺顧沮溺其可望勵雅操之氷玉謝溷世之粃糠疑斯人之或逺復東瞻夫魯邦既異世以同趣宜随地以安常吾將稅俗駕屏塵心企潁陽懐箕隂朝與山兮為儔夕與山兮相尋濯纓山下流振衣雲中岑寧抱甕以自勞賦歸來以長吟歴萬里於至近返千齡於方今庶永託於茲山嗣髙躅之徽音底柱賦唐肅按底柱在冀州大河中流禹導河自積石至於龍門南至於華陰又東至於底柱然後至孟津過洛汭而復北折焉盖河自龍門既决以來奔騰迅快勢不可遏至是而齟齬之乃分為四流貫於三門之下然後力殺而行緩故酈氏水經謂底柱與龍門皆禹所疏鑿也昔蘓子賦灩澦堆以為蜀江會百水而至於䕫瀰漫灝瀚横放大野而峽之小大曾不及其什一茍無是堆則瞿唐之險當不啻此余謂底柱之功亦有類於灩澦者故述而賦之賦曰黄河之流西來數千里兮貫長城而南馳激龍門之險阨兮霆奔電馳氣洶湧而莫支歴華隂而徑趨兮乃折流而東下勢若萬騎銜枚而疾走兮將悉鋒盡銳鏖戰於平野何底柱之崔巍崒嵂兮獨儗立乎中流儼一夫之當闗兮強兵悍卒睥睨退縮不敢運其戈矛惟崈伯子之敷土兮導洚洞而平之鑿茲山以疏洩兮剖三門之嶔巇然後洪波巨浪齟齬而不騁兮分流析派間度以逶迤指孟津而逾洛汭兮遂東極乎大邳茍非是以中梗兮曷以殺天吳水伯之淫威予嘗駕方舟而逺求古蹟兮誓將豁心胸於浩蕩過黄老之神祠兮遡蝦石之泱瀁睇連天之修楹兮干雲霄而直上濁波汩汩會其下兮顯神功於俯仰使昔懐襄之莫救兮滙四海為一區上巢下窟之赤子兮殆皆戢以為魚覽斯險而嘅嘆兮雖天造而地設微𤣥聖之大智兮孰能成夫萬世之烈彼蜀江之灩澦兮𦍑地勢之所同誦金聲於儋叟兮信物理安危之所從噫吁􅐵世道降兮風移而俗媮頽波汗漫兮忌剛而茹柔魚蝦鼓舞兮蛟龍鬰愁豈無吾人之底柱兮障百川之横流日觀賦唐肅漢征和之四年帝親耕鉅定返駕泰山封禪既畢還朝甘泉於是東方大夫上千萬壽已而言曰臣等昨奉國家告成岱宗因得覽觀於巖之東臣詢其名是曰日觀其髙莫窮上薄雲漢當宵分之未幾瞰蒼溟之有爛浴初日於咸池詫人世之未旦盖兹嶽之華精天下之竒玩也帝曰嘻若是則髙矣極矣大矣特矣壯矣赫矣駭矣惑矣子能抽秘思騁妍詞想像彷彿為余賦之乎大夫乃置觴肅袵脩詞而對曰臣聞𤣥黄肇分清濁殊位𤣥精峙結限隔風氣山惟岳尊岳惟東最矧斯巖之旁出奠巽隅而特異東介丘之近連西石門之迴對眺月壇之不遥俯天闗之猶墜緣亘道之百盤猶可仰而未至其為體也嶔崟崱屴嶻嶪岧嶤若鏟五丁若戴六鰲矗乾運而莫極鎮坤維而不揺畆孰計其延廣仞孰測其崇髙雲烟在下羲娥可招宿星辰於㢘隅吐風雨於巖㟼飛猱之臂不得而陟巨鵬之翼不得而超盖將吞西華壓南衡駕中嵩軼北恒㣲九河其綫委小七澤其杯盈彼王屋太行終南五老岷嶓雁蕩之秀拔天台會稽之竒峭不啻塠埠之争雄培塿之呈巧斯俊偉之絶倫諒形容之莫表若乃夜氣正寂陰魄既淪萬籟絶響六合同昏悄漏刻之既平忽靈雞之一鳴睇東方之漸豁窺赤曜之上騰丹轂㣲露頳盤欲呈踆烏刷翮以習飛燭龍銜光而迅征走神丹於寳鼎擁玉帳於金鉦爾其吐暘谷拂扶桑沸鯨波蕩洪荒員規閃爍以上下列彩絢爛而周章一沐而水府為之震揺再頮而蛟龍為之遁藏瀹重光而益晃澡五色而逾光赫炮璀璨曈曨焜煌勢將歴九阿以朏明越曾桑而載驤當是時九州未明萬國猶晦羣動尚戢衆象莫會匪是山之獨髙曷覩斯之為快宜命名之有義昭靈異於紀載且臣聞日者衆陽之宗大君之象出入以時昕夕靡爽故能燭萬物而發生齊天地而彌朗況至髙者見理於未形據太上者觀下於至深彼處卑而混濁孰先睹夫大明故臣願於國家陳焉帝聞之曰善哉大夫之辭信覧物足以知道因寓目可以契心故宣尼有小魯之嘆孟軻視觀瀾之箴茍惟遊觀之是樂夫豈聖哲之所任乃喜而賦日觀之詩曰日觀穹窿太山東兮未曙而日覽陽徳兮居髙察卑我其㡬兮由闇處側豈人極兮大夫迺賡歌曰帝出震兮東方破曾陰兮奠𤣥蒼登日觀兮民樂康帝之徳兮如陵如岡歌竟天顔悅怡聖衷攸啓悟至道之昭晰念前行之或昧乃詔郡國詢政理培一徳以隆基明四聰以廣視收逺討之疲兵罷求仙之淫祀大開明堂垂拱而治震澤賦朱右客有鄒陽生號逺逰公子俶儻玫瑰超竒拔偉衣白雲之翩翩峩危冠之韡韡神怳怳以欲逸風飃飃而凝佇於是上會稽探禹六訪遺踪超洞壑軺車前驅輜重紛錯王子進之以笙鶴江令贈之以芍藥邇乃揚颿錢唐鼓檝中吳將欲窮覽山川壯逰江湖造松陵主人而驩然從予主人曰子號歴覽亦嘗聞澤藪之大有三萬六千頃者乎生曰未也可得而聞與主人曰唯唯夏名震澤周曰具區下屬三江實為五湖右接天目宣領出谿之原左通松婁中江入海之洳庶衆流之委羣利之儲苕溪出其南溧水經其西五灣豬其東垂虹界其隄流甘泉之清液隐雪灘於北隈洞庭中起林屋天開𣺌彭蠡吞雲夢駕雷夏軼孟豬杳不知其幾千里之為逺疇能計之三萬頃而有餘其澤則汪瀼滈汗洶許拱湧奫猗筠潾瀰漫涬溟渙渙沄沄流飈吹波結絡龍鱗日光玊潔澄泫氤緼清蘭凝漪錦花成文浪濤噴濆澎淜汯粼出雷騰虹蒸雨生雲呼吸陰陽吞吐乾坤如潮汐之不測或早暮而異觀飛揚蕩薄迅澓汩淪千態萬狀不可殫論其藪則碧沙曼衍黄石碔砆莎薛蒹葭白蘋青蒲荇芹蕰藻茭菰荻蘆蔓青杜若茳蘺靡蕪芡實雞頭草長龍須芰荷翠沃蓮藕芬旉衆物居之何可勝圖其土硬則塗泥微露埤濕就乾葴䓆藨平表蒿茝芷蘅蘭昌蒲馬荔荃蓀射干圬楊絮白水栁葉丹蘋蓼早綠榆楓暮殷朱橘火齊黄柑金丸連枝並秀駢集乎其間爾乃周流梗概溥覧闌班兩兩相峙欝乎崇山其山則層巒崑崙叠嶂嶙峋岑嶔參差如陵如墳崔嵬􅍶崒陂陁紏紛上㧞仞岡下臨湄濆控地軸以旁礴逐水曲而折旋馬跡屹立以嶷嶷翠峯峻㧞以盤桓戞浮雲之流景俯蛟龍之深淵空谷谽谺上火含下火加以無底磴道蜿蜒而相連其中乃有奉真之祠供佛之堂琳宫道館梵宇禪房烟雲緲繞金碧焜煌黄冠緇衣往來而徜徉談𤣥讃空學幻言哤莫江或髙堂以演𤣥或擊鮮而稱觴駕白魚之飛艎泝重洑之流光水産則粘蠔旋螺土蛤石花􅗫鱧即鯉鱖鱮鱨魦縮項之鯿頳尾之魴細鱗之鱸紫甲之蝦稻蠏盈尺巨黿専車長蛟潜鱷穹龜靈鼉周㳺涵泳其樂無涯羽禽則晨鵠荘雞鶄鵁鳬鷖交兼鴇鶂鸂鶒鶬鷀羣鴻來賓陽鳥攸居鴽鵝逺舉鷗鷺忘機王雎並騖屬玉交飛振翮刷羽以敖以嬉來如雲集去如烟晞若乃絶岸之濱漸水之石或伏或倚或卧或立或方如珪或員如璧或矗如峯巒或平如几席或滑如胠肪或㢘如劍㦸或赭或赤或蒼而碧或縞而玉或黝如漆為中流之底柱若逆河之碣石怪怪竒竒熒熒爍爍斯又天造之神工而出於兹水之蕩激也思昔夫差競伯圖勲鏖戰於此勝負未分旌旗蔽空舴艋如雲始魚鼈以為樂終麋鹿以成羣廼若歸釣之徒著書之士去國鴟夷汎舟西子亦復𣺌渺滄波茫茫白水主人之言未終鄒陽生肅乎改容喟然而嘆曰甚矣世道逾下而人心之不古也吾子好學頗識典䇿不述職方之經邦而盛稱茲澤之庶殖不思禹蹟之胼胝而徒歎英賢於戰國皆非所以極㳺覽之願望而擴夫五性之至徳也遐思往古擊節太息請誦主人所聞而陳予所得烏虖噫嘻浩蕩方割懐襄未平九域混而莫辨百潦壅而不行支祁崛強於淮甸天吳披褐於海溟時維茲水震蕩靡寧浡浡洶洶砉砉轟轟疑撼天而動地猶駕雷而奔霆類不周觸而天柱折若巨鼇抃而洲島傾斯震之澤所以錫名也迨夫九載既南庶土交正波神受職川后奉令應龍畫地以效力庚辰持㦸而制命導吳淞以安流别淮海而表境於是澤安其所水順其性鳴者自停動者自静斯震澤之所以底定也千載而下美哉禹功昏墊之害既逺灌輸之利無窮故漁人舟子之出入豪商薄宦之經從擊檝鼓浪引㠶随風莫不連檣接軸往來乎其中斯又具區之藪以萬民惟正之供也方今海宇清明朝廷静謐内宣民化外脩貢職農安其耕女效其織工習其業商估其值士守遺經民食餘力風不揚波水不濫佚方鎮以寧土地墾闢開禹之疆廣禹之績是以九州之外咸仰聖域沾濡仁義涵詠乎道徳浹洽恩波沐浴乎膏澤漸被浸潤流衍洋溢天無亢燥之災人樂沃土之俗試言其故則辟雝湯湯聖化行矣靈沼洋洋聖澤汪矣御溝溶溶生意茫矣溥徳川流逹要荒矣下視一隅寧不隘杯水於坳烏交堂矣主人於是聳乎樂聞憮然自失仰神功之長存慨餘子其何益相與鼓枻乎滄浪曾不蔕芥於胸臆迺起為詩歌以頌徳詩曰於赫禹功配天比隆生吾遺民宅我土中原隰畇畇徐均江漢為東萬世永頼維禹功是崇於皇禹徳立我民極手胼足胝救焚拯溺鑿井而飲耕田而食靡謝天功焉知帝力於昭太上示民以應眷佑我皇與民立命開禹疆土繼禹作聖其混合四大維民之正於穆聖皇維上帝不常敬哉有土亹亹不敢康五嶽四瀆七澤九岡罔不修其職來享來王來享來王受天之祜於萬斯年睠我有土有土有民有子有孫有引勿替以頌茲文漢水賦黎淳鰲極立嶓冡尊漾川鑿漢水分通西徼兮萬八千里吐金景兮東注坤元索重坎以為體兮下就乎濕潤萬物而成務兮上霈其恩滔滔萬折有委有源瞻積陰之皓渺闢元化之胚渾亘南紀之奥區實襄國之遐觀邇乃爵土頒封山河帶礪維藩維垣以經以緯撫茲大川樂其佳致朝發軔於荆條兮夕瀰節乎三澨風飄飄其吹衣兮雲冉冉其驂御肆吾目而逺覽兮見逝者之如斯聳吾身以跂立兮嘆有本之如是瞻巍城屹立其虎踞兮浮萬雉之晴暉俯禁庭敞豁而深邃兮亦清涵其灝氣殖百貨兮來舟航委萬屋兮興民利吾恍見天吳效職而馮夷拱衞兮信可觀其瀾適其趣而考古證今於百千萬世也於是浮樓船凌素波横中流發浩歌嘉期集兮賞心遂歡樂侈兮感慨多觀其晴日皎明濃綠滉漾平臯旁迤翠碧後障初越武都勢峻而馳乃徑葭萌量廓而壯其狀若白虹蜿蜒繞乎漢東而益其清漲者非沔水之發氐道而連於上者乎長風驅濤雷電叱咤銀山嵯峨靈怪幻化跨陵楚壤浴日浮天望極滄溟不舍晝夜其勢若隂山萬騎洶湧漢陽而會江夏者非長江之出岷山而流於下者乎方其九州一壑萬水争雄民其魚鱉物其沙蟲漢水於斯孰遏横衝於是禹載啓行疢疾在躬懐襄濬滌窒塞疏通然後天廓其䝉地夷其隆昏墊以拯波濤乃東江漢朝宗四海會同此漢水在唐虞所以有仗於神禹之功也及夫去古已逺商徳寢㣲漢有㳺女淳化已漓漢水於斯孰濯漣漪於是文謨丕顯美化内推篤近舉逺式於九圍然後桃天及時芣苢自持漢之廣也不可泳思天休滋至郟鄏以基此漢水在成周所以式化於文祖之儀也迨宣王之中興奮王猷之允塞故江漢浮浮著召虎南伐之勲如江如漢成王旅北征之烈夫何春秋已降竟隔大猷嗟栢舉毒於閭闔兮分濟漢以嚴陳由小別至於大別兮莽暴骨而為仇陋蔡侯之畏楚江兮猶吝獻其佩裘雖沉玊而誓於漢兮曾何補於國謀然則漢水在斯時匪足為東南之勝實姬室土中之患與羞而已歴斯以徃民偽日滋歌大隄之曲兮誨淫是騁解漢臯之佩兮傳怪奚疑干譽沉杜公之石放情侈謫仙之詩味甘楂頭之短鯿欲殉銅鍉之艷詞紛紜轇轕寸益何禆然則山川之靈千古一日盖將竢於今日之貞元會合然後得以萃靈秀而發珍竒也恭惟髙皇啓運六合風清江漢來歸天地平成文皇纂圖徳化四極湜湜江漢亦流恩澤列聖嗣統恵我子孫四國于藩我徳茂存建中和之極兮品物咸若溥好生之徳兮庶類交欣故今江豚海豨叔鮪王鱣䱻鰊􅀈鮋鯪鰩鯩鰱揚鬐掉尾噴浪飛涎凡水族均得適其性於漢水者實無異泳㳺於文王之淵陽鳥天雞鵁鶄鸂鶒鴢鷔鶩鳬文禽雪客散若霞飄集如雲合凡羽蟲均得樂其生於漢水者又無異飛翥於文王之澤至若藻荇連綿於涯涘萍實蕩漾於深洪篔簹薜荔寔繁有叢葭蒲蔓衍蘭蓼青紅與夫黿鼉鰕蟹神蜧蛟龍草木鱗介均此形色又何異生育於靈囿靈沼之中也哉然則今之江漢實變而為成周之江漢今之民物又升而為唐虞之民物矣吾誠樂得夫忠貞之輔兮而親吾親以蕃其族也𦍑熙熙然有生同樂兮囿八荒於玊燭也翳徽猷可光於後嗣兮綿億萬載邦家之福也故為文以冩盛美於無窮兮善繼述而永崇其天祿也誶曰維漢之流南國之紀价人維藩于疆于理仁源疏鑿義路安行文㵼其瀾樂鏘其聲𢎞斯有容毅斯無息至於海隅兼此衆徳何以樂之王智之周何以保之王徳之修來朝來宗無忘本始慶源有餘貽厥孫子遷於太古萬福攸寧播之金石永揚天慶明文海巻九
