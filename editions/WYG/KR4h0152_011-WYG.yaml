body:
  text: 明文海巻十一餘姚黄宗羲編賦十一山川三泰山賦馬一龍余昔聞孟軻氐之言孔子登泰山而小天下每栩栩然託莊夢以神遊飄飄乎憑列虚而夙駕今既獨立萬仞之巓可以𤣥覽委順之化一瞬宇宙芥子乾坤芻狗萬物睥眤崑崙驅鬼神於方册發造化於斯文噫吁嘻重陽赫戯兮撑藜結幕重陽天也天九重重陽赫戱光明貌俱見楚騷積塊坱圠兮積塊地也見列子坱圠音養扎髙下不平見騷地維演絡天柱折地維絶見列子振天維演地絡見莊子元公委龢兮元公謂主宰之帝也見真誥委龢謂陰陽積和而後物生也見莊子象器紛若見乃謂之象形乃謂之器見易傳紛若見巽爻嶽瀆峙漼兮謂五嶽四瀆也峙髙也漼音翠深也見詩靈蠢粲錯閱廣輪之埏垓兮大司徒掌天下地土之圖如廣輪之數見周禮九州之外有八埏垓地際也見淮南子莫高匪山古詩句引用指寰宇之奠區兮以陳兩間奠高山大川見禹貢區以别矣見論語卑高以陳見易繋孰為中髙兮嵩為中嶽在河南汝州嵩髙之名見都賦神岳天鎮之莫攀詩曰維岳降神謂之神嶽建武頌曰配天作鎮謂之天鎮也玉人金像之瓌富兮嵩山有玉人高五寸甚光潤出没無常見嵩髙記又曰巖下佛圖竒妙有一大金像見仙經瓌富見天台賦三臺二室之紆盤三臺漢武東廵過此山遂以名焉見雜道書二室太室少室也戴延之西征記孰為秀壁兮衡山叙曰竦秀壁於蒼眉赤帝館其層巒赤帝館其嶺見南嶽荆州二記石囷寳洞之􅞝邃兮晉書劉麟之採藥至衡山見二石囷盛𢎞之荆州記曰衡山之寳洞􅞝音淡雲貌邃幽深也竦朱陵紫盖而㠝岏衡之朱陵謂之靈臺又謂山有三峯其一名紫盖見盛𢎞之荆州記㠝岏音賛完見髙唐賦當畢昴之精者春秋元命苞曰畢散為冀州分為趙國立為恒山宋均注常山是畢昴之精欎臨代頫趙之竒觀管子恒山北臨代南頫趙天下竒觀見性理𤣥泉神草之鍾瑞兮五嶽圖曰恒山有太𤣥之泉神草十九種朔野拱疊嶂之晴嵐唐太宗登恒山之文亘朔野而標竒人曰疊嶂參差稱玉井之名者豫表秦城之固安太華為豫州表鎮之山見周官漢書賈誼過秦論曰秦王踐華為城石鼓沆瀣之不朽兮華山記山頂有石鼔靈泉之所聳柏箭蓮茅而上叅韓子秦昭王以松柏之心為博箭華山記曰山頂生千葉蓮花或㧞天柱玉樓之秀葛仙翁傳崑崙一曰天柱仙傳拾遺崑崙有玉樓十二崛閬風𤣥圃之竒十洲記崑崙山有三角一角正北名閬風嶺一角正西名𤣥圃一角正東名崑崙宫王母居焉崛突起也神舟福麓之美萃辛氏三秦記終南山上有水神其水能載舟神人乗舡行追之莫及福地記終南太乙山内有福地玊堂石室之翬飛福地記終南太乙山在長安西南有玉堂又三秦記太乙山中有石室翬飛見詩或背岷流而面彭蠡伏滔逰匡廬序曰廬山背岷流面彭蠡插雲日而闞川湖叶見前仰插雲日頫闞川湖之流結岱根以聫五老天台賦曰結根彌于華岱五老峯名䕃牛宿以曜九嶷若重岡連阜而躨跜𤣥谷抗勢而凌虚晉袁宏詩嵬嵬太行勢凌虚衍義太行重岡連阜醫巫閭延袤萬里以為長城躨跜危險貌見文選采苓之詠於國風㢘貞之羡乎夷齊詩采苓采苓首陽之巔㢘貞見騷隐耀真之隂室烜朱明之陽宫見謝靈運羅浮山賦丹芝挺於芳谷蒼梧接乎𤣥穹山海經南山蒼梧之邱蒼梧之川其上有九嶷山芳谷挺丹芝見庾闡採藥詩縣天河之綠湑綻秋日之芙蓉見李白九華山詩太虛臨安之仰眠日月天目二山在臨安縣見杭都賦虎牢熊耳之睨占印東壯印東眺虎牢西睨熊耳見張協賦駢華掩兮石龕星落於蛾眉一統蛾眉二峯相對周圍千里有石龕百十二駢華見真誥星落見天台賦嶘虚牖兮玊狗狡走於崆峒嶘音站危髙貌崆峒山下有洞其石上出相傳洞中有白犬常㳺故號小篆為玊狗峯見韻府續編類為山兮擅雄掔天景兮可蹤胡泰山兮弭節掔持也見楚騷志曰天景澄澈弭止也按也徐歩貌亦見楚騷豁銀海於詞工銀海目也詞工詩家詞匠之謂盖必有五物之崪儇譎五物大司徒辨五土之物儇音枚異也譎詭也見靈光賦十形之逈傎異楊泉物理論土地十形傎音圭亦異見西京賦母徳之孕靈秘物理論地者其道坤其徳母智方而主藏故云靈秘而媪神之運倕竒者乎媪神見漢書倕匠也然其為岳也溷羣逰之白鹿王紹之始興記含淮縣白鹿城有白鹿岡縣尹政善則白鹿出游泰山亦洞號白鹿誇形見之青龍南康記陳蕃墓有青龍岡人見青龍每現此岡㤗山亦有此岡未聞龍見證日曜之雲母裴氏廣州記增城縣有雲母岡日出照之晃耀泰山有日觀峯夜可見日出則為雲母日照之證􅗘紫㣲之諸童紫㣲南岳之仙人掌天下長生之錄諸童亦仙流並見真誥泰山有紫㣲宫碧霞元君􅗘事也借披衣以諧玊女安城記萍鄉有山名玉女岡天當雨水先湧出石岡有五色𤣥黄人謂之披衣玉女泰山有玉女也脫遺跡而毁金牛武昌記鳯闕南有金牛岡相傳金牛出此岡岡邊牛跡尚存泰山聞有仙人書金剛經在石後為牛跡踐毁字畫不認走三門以立砥柱砥柱在山西黄河中流其形如柱禹鑿砥柱以通河三川既决謂之三門泰山是乾坤砥柱沂泗汶三水遶之搆半石而奐仙樓地理志零陽縣有半石岡岡上有石名仙樓泰山有御帳四壁皆峭石若仙樓天搆者謝居玊笋謝安所居有石一株安常倚對吟嘯北齊劉洙名之為玊笋峯見續編泰山無字碑若玉笋素詠梅仙梅仙峯名相傳梅福煉丹於此危素有詩泰山亦有梅福遺趾陋金粟龍蟠而鳳翥唐内紀明皇朝拜王陵見金粟有龍蟠鳳翥之勢泰山亦然壯麗過之豈玊浮圖獨秀而倚天蘓軾賦獨秀峯髙百餘丈其詩云倚絶玉浮圖泰山南頂上人呼云大哉巍乎岱出震屹兮泰山屹然居震之位實衆岳之攸宗坤厚盤址兮易坤厚載物滋化源以發䝉䝉物初生也滋其化源見内經遡黄帝建圖兮春狩柴望而轍東胡吕政徼福兮封禪踵武以為功黄帝制明堂圖其後倣之歲二月東廵狩至岱宗柴望秩於山川見書秦始皇始以封泰山禪梁甫誇耀功徳以徼福後世遂相傳以為盛事踵武見楚騷志曰先王廵狩之典凡以為民後世侈以登封移以徼福其言㫖哉神霄峙於左兮神霄在山岳之東迎翔陽於扶桑翔日也暘谷上有扶桑日出所浴言迎日於東也見木𤣥虚海賦而揖葐蒀之翠㣲葐蒀音芬温盛貌翠㣲山勢氣之輕漂也見蜀都賦傲來拱其右兮傲來山在岳頂西南媵大明於金樞媵送也見楚騷大明月也金西方也樞庚之朏位見𤣥虚海賦并參同契而盻俄景之崦嵫俄景日斜影也崦嵫日出山也見楚騷天門嶔峙漢官儀泰山東上七十里至天門嶔音唫兩山向也有南天門上天門二處石磴崱屴石磴見靈光賦崱音擇屴音力山石貌見文選泰山石磴共三百四十一盤髙四千三百七十四磴二千六百二十四尺每盤盡處有少坦地行者定息復躡磴以行雲闕靄䨴漢光武封泰山雲氣成宫闕靄䨴雲貌見靈武殿賦日觀崒嵂㤗山記日觀峯雞鳴見日始出崒嵂音卒律山峯貌見文選及經史通用其峯在封禪之東南石閭神府之爌怳漢書武帝禪石閭道書福地記泰山下有洞天鬼神之府爌音廣炾音况明貌見靈光殿賦魯瞻秦眺而崝嶸詩曰㤗山巖巖魯邦所瞻又泰山東南山頂名秦觀者望見長安崝嶸音棖榮髙峻貌出文選金狀玉几之瑋麗列仙傳岱宗石室中有金狀玉几瑋麗見文選錄鑭璘彬而粲呈錄金色鑭音爛金光見經史通用璘彬五色彩見西京賦頫視而培塿則有鶴山之茐鬱培塿小土塊也見海篇泰山頂北有鶴山上林水多茐鬱見山志近接而礧碨則有石馬之仰鳴礧音壘碨音畏不平貌見靈光殿賦石馬山在泰山頂西仰鳴仰秣而鳴黄流嘌銳乎寒門山志玉斚峯在岳頂嘌音表峯之特起也寒門北極也見楚騷紫虚將嶬而易升志紫虚山在岳頂西南嶬音希山􅕑也升升中也嶂列明月兮志明月嶂在岳北際接黎而參差際接黎上通霄漢也梵語参差不齊也屏開岵疊兮懸倒景而下垂志羣峯秀列若屏岵音户山多草木貌倒景見仙史囬馬屹􅀈兮志囬馬嶺上泰山上石磴漸峻乗馬至此不能止也屹􅀈音乙葉山斷絶貌見南都賦勢澶漫而暈駛澶漫平博也見子虛賦黄峴緜邈兮志黄峴嶺勢甚險峻土多黄色緜邈長也見吳都賦狀詰屈而伏螭詰屈委曲貌又艱阻也見韓文伏螭如螭之伏也巖巖東柱兮天削成志以方位别五岳言東岳是為天之東柱泰和穆沕兮無將迎言泰山岳神主造物而無心者也嵣㟐自若兮匪媚世嵣㟐山石廣貌見南都賦胡人啓幻兮登封名無字碑碏無字碑在岳頂始皇所建碏音錯石雜色也祖龍空圖植砟􅀈於千古砟音乍碑石也􅀈音恰石狀見經史通用暴遺像於獨夫秦政焚書坑儒自謂獨夫可以把持天下故其不立文字後世即此便見其遺像矣磨崖砥跡究劖文於蕪没劖音䜛斷也又刺也玉液淵澄玉女池在岳頂元君祠右玉液之名起於此古文不及惟陸機一讃後人侈大其說今遂為泰山大香火假瀏濫以自沃沃叶瀏清也濫汎也言清浄汎濫可以沃心則邪妄自除瀏濫見甘泉賦嗟捨身之崖兮懸空欲絶誰俶厲階兮俶始也厲危也惎人顛越惎音忌教也見文選捨身崖倒懸虚空中因其危險欲登是崖者如捨棄此身然狀其險耳後人乃援佛氏捨身之說往往自投崖下盡為虀粉矣愚昧至此可哀也夫天神下㵼簾垂玊龍志天神泉在傲來山百丈崖下懸流下㵼如垂紳水珠若簾形如玉龍也翠華蔓草盆子偃躬首矗御帳兮松坪駐蹕志御帳坪在岳之中道即秦封五岳之地宋東封駐蹕於此翼趨過化兮斗母泚容以上為先師過化處因下輿趨謁山岳靈神各有廟貌先師孔子乃在斗母殿門廡間豈崇重尊隆之意其徒能無泚顙耶亭袪􅀢之䡾䡾亭泰山巖巖亭也袪􅀢見真誥䡾䡾髙貌見文選顝黝紏兮矯而顝音骨獨也見文選幽虬特出之貌矯舉也並見前嘉明時以絶苛歎往政於泣􅊔巖巖亭即孔子問婦人哭處昔者孔子過泰山聞婦人哭之甚哀使子路問之云昔吾舅死於虎夫又死焉孔子曰何為不去婦曰無苛政孔子歎曰苛政猛於虎也𦍑紺殿之隆棟兮承霓而棧齴也言飛殿髙聳上承虹霓也棧齴音湛眩髙峻貌見文選丹撐枒杈而莖擢兮撐音撑拄也枒杈參差貌莖特起貌俱見文選鱟梁而昈絢也鱟音吼虬之彩色全者昈音户赤文也言長梁朱畵五色如虹之赤文絢耀也見文選華榱璧璫而韡曄兮華榱畵其榱也璧璫韋昭曰裁金為璧當榱頭韡曄明盛貌見文選虬龍而騰翰也堂宇䆗窱而闃􅃉兮䆗窱音咬跳深也静也見文選闃音菊無人貌見易爻辭廓厞而深衍也廓厞見真誥空曠之意簷楹磊砢而訬霐兮磊砢音壘可壯大之貌訬髙也霐開爽也爣閬以肆展也爣音倘閬明朗也其峯㦸列兮森璱玊盤錯璱音瑟鮮也盤錯交結也而刺霄漢以嶙峋其崖珮委兮紛烟綃之突兀而墜厜㕒以雲仍珮委見曲禮厜㕒音垂宜巉崕也爾雅雲仍如雲之相仍也其洞蟬聫兮蟬聫不絶貌見吳都賦徧空􅀢乎風穴空音竹詐物在穴中貌又空也見文選風穴見韻府石廪峯有風穴淲氤氲而靉蒸淲音瀌淵深貌見海篇氤氲洞中充塞之氣靉靆皆雲氣其巖星懸兮㵼飛淙而霤玊搴明垣以毓精俿偨之谷兮霤玉言飛泉上如玉霤明垣巖中虚隙如有明俿偨不齊貌窅井幕而欱霧豁荖蓼以通明荖蓼即􅀢寥見潘岳賦厯之石兮音宻歴分布覆假貌見吳都賦號五車而為應劭漢官儀泰山有石漢武用五車載不能上因置山下為屋號五車石儳羣羊而彚征蘇東坡登黄茅岡滿岡亂石如犀羊䂳䂳有聲彚征見易以類相從也截彼臺兮螮蜺㨗弈而墱道逶迤螮蜺髙貌墱道閣道也逶迤長貌又行貌見文選通天𢎞敞而珠斗上侵通天古臺名𢎞敞大開也俱見文選珠斗見選詩謂臺之髙侵星斗也粤彼泉兮潜㕎隂潤以慘廪山旁穴曰㕎潜㕎見文選慘廩寒貌易曰井冽寒泉涌駟漢箕湛玉涌泄出也房駟在天漢之旁箕水玉穴出者湛然如玉也澶湉泓澄吾見其為池兮澶湉音纒恬安流貌泓深大也澄清澈也俱見文類色縞而雪朗見郭璞鹽池賦澒溶奫潫澒音汞溶音涌言水如汞之溶也見騷奫音氲潫音淵廽縈之貌見文選浮金而瀲彧隋江總天淵池鋊日宿夜浪浮金彧音域文貌又􅣃其為井兮竅地濬素瀱之香瀱音計爾雅有水曰瀱無水曰汋泰山有香井故云入汶滙諸水之族泰山天井之水在岳之東北十里許廣數畆諸谷之水由東轉南入於汶迅澗溪之蜿蜒蜿蜒言盤廽屈曲也散瓏􅌑於林曲言澗水之聲如玉也瓏􅌑見法言灝瀬潏而長逝瀬濆為湧泉見吳都賦瀎潏為疾流見南都賦河環帶以自束言河環如帶之束也㤗山如礪黄河如帶楚詞又若氣滋若形完莽尊音阿那木盛莽尊草叢生也見西京賦指草木􅀈􅀈㺦猭􅀈􅀈音咸獲疾飛貌㺦猭音聮銓獸走貌指鳥獸造化之不能盡藏者而名物之不可以悉言秦松之擢本橚矗擢本髙聳貌橚矗音肅觸長直貌俱見文選茷骫糾蟠茷骫音㧞委茷木枝葉盤紆也骫􅟆屈見楚騷糾蟠謂樹如龍蛇盤屈糾結也見文選漢柏之㧝莖蓊蒨㧝音加亂也蓊蒨茂盛也輪菌嬋媛言屈曲而羙唐槐之㙷黝儵㙷音鏘戢枝柯相重叠貌黝儵茂盛貌俱見文選葉槰柯攅槰音迸與攅皆言簇生也椿梧梓檜最觜敷華參苓蘭蕙镺蔓芬葩最觜林木榮積貌镺音祅長也見吳都賦芬葩南都賦曰斐披芬葩琪樹璀璨而蝟出芝房宗生而異荂山海經崑崙之墟北有琪樹璀璨音垂燦珠垂貌見天台賦蝟出如蝟毛之多也宗生言種族繁生也荂榮也俱見文選蟎蛦而朝雊蟎蛦音蔽夷即雉雞也朝雊朝鳴也俱見蜀都賦觀鶴而翩翻鵁鶄翡翠鳩爵鷹鸇肆啄蔓藻刷羽漪瀾蔓藻海藻之屬刷刮也漪瀾清水也言鳥啄食於海藻刮羽於清水也俱見文選虎豹穴其隂熊羆咆其陽郭樸巫陽山賦熊虎隂而夕䐾咆哮也見蜀都賦貛兎貂貍蒼狐白狼􅛖􅛖騃騃音否俟趨曰􅛖行曰騃見韓詩章句趠超騰驤吳都賦曰騰趠飛超騰驤見西京賦顧兹岳之神異兮他山莫􅣫極天蟠地兮余徴典籍繄𤣥聖為仰止兮冠古今而並立逺賢於堯舜兮亦道合乎天則余復紹聞衣言按圖深索馳神運思窮究脉絡故知泰祖崑崙去天一握崑崙天地之中心中原崑崙正脉東至㤗山為龍西以華山為虎去天一握見廣異記云孤雲兩角去天一握言其與天近也大經所㑹元氣磅礴大經所㑹之謂谷見素書磅礴見莊山介止於水濵海環抱其地絡神州盡天府之九則崑崙東南謂之神州中和􅃵鄉帝王之宅聖人所出也王嬰古今通論天府見劉敬傳及周禮地官九則楚騷地方九則九則即九有九州之謂南贍宿女牛之孤虚佛書以中國呼為南贍部州在女牛二宿之間鍾光嶽兮聖賢誕生膺厯數兮帝王攸居再瞻燕冀轉盻荆徐頌祖徳於畿甸我祖起兵泗州美王業於巫閭文皇遷都於燕巫閭山在其後此真邁跡於古今而重光於唐虞者也又孰知㑹昌景福崑崙邇蜀言天帝運期而㑹慶建福也見蜀都賦圖經曰凡山皆祖於崑崙崑崙邇蜀之西南山有岷嶓發源岷嶓山在梁蜀地逮湖南則為楚境今承天為聖天子所生之地故敘言山川之所從來衞行脈中出黄帝内經形勢連續天精地粹見性理翼軫菀簇楚為翼軫分野菀音鬱簇聚也篤生聖王龍飛五位滌除𤣥覽言内無思慮外無情撓洗心息念萬事俾無疵病見老子繼天作配以六合為家兮錯峙承平錯峙列居也見蜀都賦其恃有形之險兮山川丘陵易曰地險山川丘陵也若泰山之鞏兮輿圖允寧其視無形之險兮天徳胙明胙分錫也言天錫以明徳也揚子曰天胙光徳若尼甫之晠兮晠盛美也楚騷大人所晠奕世炳靈奕世言世世也炳靈見左賦盖不必誇功兹岳而千萬年穆穆迓衡余忝絲綸兮册命恪膺逴勩齊魯兮大禮告成暇爾解紱兮塵鞅惟息睎目六指兮睎目見騷六指謂上下四方也見荀子揚靈紓逸建虹旌以迤邐揚靈揚其光靈猶言舒展意氣也虹旌以虹霓為旌也皆見楚騷迤邐行貌見文選率望舒而先驅望舒月御也見騷後飛㢘以躡軌飛亷風伯也軌轍跡也駟𤣥牡而驂虞揮霍天日跨躐雲霞目竭無垠手拂若華真有造化為徒而悲區區為井蛙者矣於是乎擬泰山之氣象兮即砥礪以自律齎銳於亢爽兮恒迷復而若惕易迷復凶竊時中而在寢兮在察也寢奥也言入聖人之奥在寢見楊子法言願軻學之踐跡曲江賞兮玩情唐人上已遊賞於曲江杜少陵有麗人行乗槎遊兮幻術油幕恣兮俠驕長安貴公子春時遊晏風雨以幕覆之盡歡而歸見天寳遺事八駿周兮漫軼周穆王少好神仙嘗欲使車塵馬跡徧於天下乃乗八駿之馬觴王母於瑶池之上太平廣記余無負於大觀爰修詞以繪飾青蘿山賦王漸逵王子居於青蘿山與世邈隔者殆十餘年客有過而訪之王子與之登懸石之臺竚孤雲之頂天八表以敞開雲若合而復逈冐欎藍之無際涵元灝於將溟王子顧客而語之曰此亦可以言樂矣乎客曰樂矣而未大也真矣而未竒也吾聞白雲之髙足躡雲霞星斗可呼西樵之石神鑿鬼劈靈洞虚無羅浮之𤣥秘實神明之奥宅黄嶺之崒峛黄嶺在東莞下臨溟海固溟壑之上都也斯則大而竒矣王子曰如子之言則兹山之所以為大而竒者殆非夫人之所能識矣客愕然而問曰何為其然也王子與客顧而指之曰今夫東溟然而窿若雲若烟者非羅浮乎客曰然今夫西亘焉而齊若坐若眠者非西樵乎客曰然今夫北擎焉而崛斷而後連者非白雲乎客曰然今夫南屹然而闗瞰於無埏者非黄嶺乎客曰然曰此則吾固有之天常與之而周旋者也乂何外是而求旃且物之凝滯者不得其會器局者不貫其全若随寓而有礙固所處之或偏是以居西樵者不覩夫羅浮處白雲者無見於黄嶺豈髙大之相虧殆中孚之未應惟夫兹山巋然中正匪髙而尊不竒而勝緬四山之翕輳含羣動於至静故自東自西自南自北興冥神契舉目而得雖異境而殊途實同歸而致一嗟乎學亦有然者惠之和夷之清各造行之極至猶未免於小成矧渣滓之不融抑大原之未瑩夫合内外人已而一之者心之通也無逺近大小而體之者道之中也是以書掲允執之義孔稱大成之宗子思著未發之訓顔淵修具體之功兹固天人之相授歴今古而皆同者也客喜而笑曰今日益矣於㳺觀得進學焉古人貴觸類而長良有覺也於是王子與客把酒嘯歌林木振舒泉冷冷以助興風飄飄而吹裾窅然而起𤣥思欲別而顧踟蹰但覺此心全露萬象森如與天宇之俱霽不知吾身之為太虛也少華山賦吾謹古者名山大川莫不有紀誌所以備觀風辨物之採擇也少華山僻處東南之荒陬近稍聞於世而猶未顯予得造而登焉實壯其形勢以為不可無辭章以表暴之而使觀風辨物者之冺於見聞也遂援筆而賦之辭曰大江之西百粤之東有曰少華峙於其中想其肇崖也奔熛怒馳祝融飄朱光奮火龍騰神力施𤣥功噴薄隂陽吐洩鴻䝉乃使地螾運土靈鰲負躬招拒持鉞威仰景從琢削鏤刻敷青布葱模太華之竒狀閱數元而就功爾其形張四維勢吞楚越矗青冥而黭曖軋坤軸而崩坼跨江夏以盤踞帶閩海而逓接環以衆山連絡不絶岡脊嶕嶢峯巒岉崛倚伏奔驤嶚􅀢嶻峛周圍繚繞屹􅝝鍔列似斷似續疑崩忽嶪逺而眺之若隐若顯或明或滅惟烟霧之霮䨴杳蒼冥之揺拽近而即之黛色熒瞳𤣥姿空㠔覺后土之鴻龎迷太清之昭徹乃若陟巍巔歴巖壑睠形勢望環拓則崆􅱔嵣􅸌屹屼嵁崿巉巖峭峍縹綃相薄翶嶼騰崖沙柱石閣參差茈萀崒倚錯落或坻坂之硎磏或堂宻而壙墎時峻隴之逶迤忽幽谷之寥廓亘淵涯之無極臨空洞而㫬曤怪石齒列巧形異名磈礒碨􅓓縝出叢生疑下墜而弗隕似深伺而將騰或宛轉以蹁躚或碕䂺而憑陵若相拱以蹲跱猶争蹀而互攖如龜虬之贔屭恍鳥獸之飛鳴名卉竒木遝雜紛産蟠蛇屈蠖綴華凝菼埵濕綢繆交加蜿蜒飛紛散陰糾結攅攬葳蕤旖旎集千萃萬其山川之大約則若珊瑚之玲瓏琅玕之翻覆乆睇則奪目而眩睛攀登則神駭而皇惑恍惚升焉若雲陟而空舉宛入㝠而㳺渺縱跡淡漠之鄉凝神八極之表瞰日月之出入捫翼軫於昏杳昭赤道之經横森南極於縹緲九江彭蠡淼瀁奫潫淈汩無崕瀺灂廽旋洪濤洶湧光色連天長江西下涵漫洄澶流澄泛綠滺㳺漣湉糅羅紛列舉在目前爾其矚衡嶽望九嶷眄白鹿盻匡廬隐朱陵之深邃彷雲臺之依稀瀑布飛練於千仞五峯攅聳而披離雖丘阜之紆曲舉一視而周知若乃白雲四起溟欝氤氲覆空澔紆佁儗繽紜紛靉靅以凝沍極瀰漫而渾淪失峥嶸與寥廓如兩儀之未分時乃大塊噫氣天風䬀䬟振蕩百川沸擊宇宙叶紬如軋千􅋴之迅焱鼓砰磕於遐陬奮三軍而赴戰馳萬馬之驫飍又若朗月懸空光燭四山萬籟寂憇澄瑩烱然禪宫仙闕廊檻晴鮮則如躡清虚入廣寒坐貝六逰珠巖清魂潔魄灑滌心源倐忽羽化翛然登仙或落雪四周素光浮炫晶輝照燿混涵燦爛指顧瞬瞵景移象換綴瓊枝鎪璐橑起瑶臺開珵院爽塏洞明朗徹幽燕偉竒態之類兹猶不能以悉殫軒轅之所不能歴重華之所不能至徒悵望以終身奄徒老而野死盖靈異之所在乃造物之深秘何浮丘與葛𤣥幸踪跡之一寄帝憫予之好逰遂降命而錫畀於是得以罄其幽𦕈盡其形勢恬然假􅄰兀然長踞觀元化之始終冥經天而緯地與太初逰於無端曾何形氣之足以凝滯明文海巻十一
