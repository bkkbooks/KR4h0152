body:
  text: 明文海巻十七餘姚黄宗羲編賦十七山川九遊峨賦來知徳春到草堂陽回瓦屋玉壘之積雪方消灧澦之孤根漸沒客有紉五芝之秀纕九畹之英傲墳素之邃圃飫往獻之清芬識風雲之變態詠雅頌之徽音暀蓬壺之岑寂嫪日月之颷奔乃拗枯桐戒力從遂奮袂於蟠龍更馳突於銕鳳􅪴扁舟而逆水兮厯忠涪而平都恁宣公之忠懇兮靈丘空嶕嶢而榛蕪入釣深而仰止兮卓承學之刑模羌妖廟之誘民兮走九坑之芃狐跇塗山之嶕崝兮䀡賈辨於斯須涉凡水之㴸泊兮驚清夜之將但望寶峰之巃嵸兮哀履霜之伯奇彼先童之克勵兮終劉仙之可疑迺緬避世之楚狂兮甘捽茹於落莫豈知鳳徳之未哀兮斯道萬年而振鐸憩大峨之卧石兮㪺玉液而小酌披古字之苔蘚兮蟠蛇蚓於雲壑及臸三望更歴雙飛奔雪濤而磢錯兮掛銀氷於十圍滉㵷於巉􅀈兮惢與塵世而相違倞思邈之虛牝兮啟憮㠑之重扉智欲圓而行方兮吾非斯人而誰歸乃尋天柱深䟏翠㣲藟􆃀􅳵􅳵而失路兮􅷃樵徑之斜暉臨雲表之􅂒瓽兮囦泫瀴㵾而欷歔尋九老以澶漫兮不火食而長搪㝩㝗以永年兮鐲石芝而自肥約秋深以獨􅀈兮共趺跏而㤀機我飢調矣我僕痡矣乃眕八音於陂池兮萬松於峛崺大雲小雲黑水白水碋磫􅮍磛礹碽􅀈碨􅀈碌䃚硱磳䃊磼礏磞􅮥䂢䃳銜瘤戴癭篆蝸踥螘既胡孫之有梯兮豈蚺之能止屴龕殷殷之雷䰤石䶞㔗㔗之兕忌㕦於傖伹兮勥越嶔嵌之梅子唹天上之重來兮洵鬷邁之錯喜八十四盤袖潲雲蘨更有路沿彼䠓䜮捫豐草而擿上指雪嶂而隒高入獦狚之厹穴鷞之阽巢壑雰霏而起霧樹布濩而垂條厓未傾而似墮石已裂而猶交流雲䨢䨴而成水枯杉􅀈􅀈而如魈骨驚心悸意奪神逃俯仰䚔􅳳去住􅙚瞧爾其雞園挿碧鷲館㭿霄飛簷啄雉疊桷盤蛟或支蝸石或就䶱橋或依䝦穴或枕螭坳憑太清以飛構越埃􅅽以騰捎莫不凝魂幽礒委骨荒椒窮年累嵗茹草吞蕭快蒲根之漸老􅀢松子之方彫㗿耆域之榮樹􅀈佛調之眠彪革嚢來天女之試紅芙縱烈火之燒海水可竭須彌可揺大半秦人而越客間有投冠而棄貂乃度天門之閌閬兮登光相之削硌撫杪欏而四望兮信蜀道之登天向沆瀣以縱觀兮識坤靈之磅礴指㸃巴字之縈紆遥對大荒之寥廓崌崍晒經巫陽劍閣三江五溪周廽聨絡衆水􅾮其蹄涔諸山􅀈其揢撮或虎變而龍馴或􅀈麟而翥鸑或牻䍽偃蹇而蹩􅍷或駧􅀈髬鬡以號欔或蜾嬴而螐蠋或蠛蠓而螫􅯟或灌叢而茂悦或宿莽而沃若或恠兮三足六眸或竒兮九頭一角或連兮淵客榜人之歌淮南風波相隨或斷兮匏爪牽牛之處河漢東西相却或覆兮孤臣逐客匑譏讒悁悁之有懐或舒兮酒侣詩儔嘲風弄月㗨㗨之長噱扗兮力士之干戈烈兮忠臣之謇諤髙兮千年萬世挺秀於魯丘鄒軻之間卑兮朝再暮三投足於秦關燕市之末同兮依形附勢而奔趨異兮樹黨立朋而相割南威青琴兮煥其羙寗成犨麋兮呈其惡狀别形众糾纆赮駁本物態之變幻類人事之紛錯亦令人喜亦令人愕乃拂吟袖於髙寒振塵衣於碧落浩浩乎不知所乘兮登閬風而絏馬翩翩乎隨其所適兮濟神水而駕鶴乃若連氛累靄揜日韜霞崩雲屑雨或近或賖浟湙㶑灔吼雹揚沙四塞籠煙似公超之有術單衣索纊嘆遷客之無家及爾長風擁篲盡掃浮隂雲驅萬壑日入千林爾其白毫挺出恍若玉玦之蟠空踈霧平鋪宛如野馬之撲面俄而蝃蝀亘於厓牙鳥語鳴其佛現豈大士之弄丸兮以有為為露電或䃱質之欝英兮乘㬫輝而流絢方施鞭而吐火兮成纓就而規練乃若斗杓既仄啟明尚杳午夜風㣲寒霜􅜝窅少焉暝色曈曨爝光縹緲始而散出幽􅀢繼而遥分雲表厓依乍吐若藜杖之生花過嶂愈明如星珠之泛島一徃一來或巨或小熠燿宵流火泉夜曉將落霞而齊飛值雄飈而更燎好事者謂之聖燈窮理者莫之探討意者山􅂒木累蜃樓海市之類經之所謂見恠物則祀之者也因勝槩之偶來念此日之難得水嶈嶈以浩溔山矗矗而􅏭嶫足踟蹰而九廻心惆悵而百折瞻上林而盼望兮驚題柱之竒才對春樹以遥思兮傷騎鯨之可哀嗟知己之幾何慨遭逢之不偶每景短而思長或輪平而路陡使桓譚之鑑别少差兮文章幾於覆瓿彼李定之萋菲既售兮甲兵起於臂肘以夫子之忠懇兮宜鼎司而台斗何此理之不然兮竟東擯而西走故是非葢棺而後定毁譽何世而不有逺眺長思感今追古孰嫮孰媨孰賓孰主孰懐瑜兮孰握瑕孰飫甘兮孰攻苦彼鷦螟之較鵬鶚兮固殊形骸而蟪蛄之與螉䗥兮同歸塵土是以至人握金鏡達士坐兠𤣥脩身兮其􅀈在我鎔鑄兮其黙在天黙我窮兮則蠖屈黙我達兮則鳯鶱或可以肆我之志兮𦍑賣卜以何嫌如俯仰之無愧兮篾翁亦至今而猶傳茍棲不擇木翔非日邊投彼琳鎏負此龍淵雖有賢臣之頌兮亦明月無因而至前故寧陳情而冺冺看霧市以嫣嫣繄此夕其何夕兮余何為而山㟽俯仰古今於一望兮渺天地之何小何芝蕙之不焚何松栢之不􅒝嗟買䤥之長鳴兮欻西昏而東曉方見紫而成緑亦視丹而為皜信陵谷之盤渦終舜英之難保登九疑兮隔洞庭望滄海兮迷蓬島既達觀於真宰兮胡脱跡之不早曷不齊萬物於一致兮委彭殤於夀夭歌在陸以弗告兮與兹山而並老招浮伯以容與兮巢雲窩於雲表擁香國之崇蘭兮樹空谷以自好搴薜荔以自娯兮時濯纓乎幽沼雲無心兮洞門鳥長鳴兮木杪已矣乎吾將反觀乎太初兮求自得以為寳奚囁嚅趦趄乎浮名兮坐令朱顔白足彫􅀈紅塵道聖泉賦馮惟健泉在貴竹城西北十里其泉倐盈忽虛莫測其機因謂之聖觀者異焉馮子為作賦以觧其惑其辭曰執徼子從𤣥化子飄飄玩世遨遊四極雄覽八埏至乎祝融少皥之虛憇乎卭笮蒼梧之間傍皇相羊息徒觧裝言徃觀乎聖泉於是披雲霞啟蕙路乗清風騁輕御振衣乎髙岡馳情乎太素爾乃遥望其地則東接銅鼓西眺木菁南迤芳洲北拱翠屏近察其勢則繚以重阜經以長川覆以華棟甃以石淵承曲池而構閣䟽龍首以揚涓其樹則儲楓楨欀杶櫚檰杬其草則葴韭菥莎蓀芝􅉅蘭阿那被麗翍風凝煙黄鳥好音鷓鴣翩翩其陂阤則参差刻鏤塍疇龍鱗農民荷鍤將有事乎春田唯涓涓之不竭故比澤於𤣥雲爾乃覽其風氣之所藂萃景物之所披敷如遊方丈與蓬壺欝乎西南之奥區於是相與造於泉上凭石欄而觀之沕兮其流之自滿也儵兮其源之自返也洞澋瑩澈滀洩潝㵝延佇有頃葢五六而至焉執徼子眙然駭曰異哉豈人為之機械抑天地之自然何顧盼之須臾邈消長之無端𤣥化子莞爾而笑曰子何異兹邪夫大鈞播物隂陽陶蒸萬變錯詭不可殫形世乃有隂火不爇沸潭無氷趵突騰珠火井飛熒抑孰使之邪吾且語子以天地之大恠終古之常然變子之疑氷宏子以達觀且渾沌之初寧有天地暨鴻濛之剖判劃黄承而𤣥芘伊方員之始凝𦍑川湧而嶽峙何浮沉之殊裁而剛柔之異濟時迤邐而稱今忽渺茫而云古四時分糾以交化歘燥濕而寒暑既融朗以開曉復黯黕而淪夜何日月之雙懸逓靈曜乎天㝢蚌蛤形於晦朔潮汐應乎旦暮坤北遊而上浮日北陸而下地觸膚寸以興雲沛虛空以流雨紛雷颮而電熛亦寂然其何處斯天下之至神𦍑誰為之使者大哉消息乎一隂一陽一闔一闢萬有之妙窮之此域吾方有感於斯泉也無徼於有兮有玅於無無用之極兮有利之腴天地之化兮周流六虛於穆還轉兮宛單相扶盎兮瀁兮衆變不居坎兮蹇兮烏識其趨虛兮盈之宇盈兮虛之廬復姤共軸兮屈伸同區鼓予身之槖籥順鄞鄂以呼吸既因徃以息來亦上下其相須草無秋而違霜桃李粲其春敷物欣欣於所遇時冉冉而遂徂繄陳迹之可懐煥日新而如初玩尺蠖之為利探野馬之𤣥樞推通變以隨時固聖哲之所圖茍非兩以裁化縱一神之焉如葢乾坤毁則無以見易易不可見則乾坤之理或幾乎息矣子徒異泉流之無端而不睹天地之變態效罔兩之責影而不知操持之有待也不亦惑乎子諦觀焉爾其出也浸淫淅瀝咉呻披離沛轇轕兮其四施也爾其入也􅢋谺踧蹜唈嚈搞􅀈洞潚漻兮其寂寥也渾渾沌沌放乎無垠杳杳冥冥歸乎至真降以胎升動以涵静滿而不溢縮而不窘動兮為乾靜兮為坤大以乾生廣以坤存易簡理得為易之門其源滴瀝中涵太極其池方文渾合萬象莫知其端莫究其状觀之者妄競之心平躁侈之欲降坎坷之氣舒跼促之情暢不窺河洛而圖書之理章不濯滄浪而清濁之有量此伏羲氏所以玩於環中尼父所為嘆於川上也且夫天地一水兮太虛一源古今一瞬兮萬有一涓巨細殊形兮理安有異乆暫異時兮安有二致知來藏徃羲軒得之以神德兮翕受敷施堯舜得之而為治出日入月彭老得之以養生兮流行坎止孔顔得之而處世㣲玅通𤣥合體自然夫是之謂聖泉執徼子蹶爾而興曰達人之言哉吾於是乎喻道焉曩予有䝉固之疾幸見藥於吾子乃今脱然愈矣葢俯仰無傫洋然而退天馬山賦朱淛壺公莆鎮山也東分一枝屏翰海上列為五侯半落天表復折而西行隱見起伏且數十里結為文峰端偉秀㧞飛動不居有天馬行空之勢而首足尾鬛色色完具不可縶維余為之定名天馬山居暇日因為之賦世有九方臯者索諸牝牡驪黄之外當自得之何是物之神雋𦍑㨗業而騰凌離埃􅅽之混濁憑豐隆而上征遡金天之浩蕩篸玉宇之峥嶸按圖經而索故吾不知其所以為名而其為物也氣吐青煙目懸皎日尾掃攢林足蹋磻石以鉤陳為韁維雷霆為鞭䇿雲霞為鞍韉江海為槽櫪動隨氣機行無轍跡投足而安唯意所適廼者從天而下既佶且閑騰逹乎象外蹤浪乎人間爛神光之炯炯灑汗血之斑斑朝發崑崙之巔暮抵祝融之境浮巨浸之𣺌瀰驀遐陬之修永閃走電之遺光歘狂飈而先逞孰氣力之可任夙造化之所乘行若委蛇進不暴猛越嶺徼破閩荒望莆口過遊洋擘八壺之右派簉五候於上蒼翳若木映扶桑凌溟海而飛渡觀初曜之景光爾乃駐金驂停玉歩靡然東馳忽焉西顧行行且止遲遲不去挹榖城之仙風愛沙堤之煙樹擷錦園之芳㽔濯銀塘之横素島嶼明沒滄桑朝暮爾來八萬六千嵗於兹矣纒井絡殿坤維仰抹晴昊炙背冬曦吸寥天之爽氣饜九土之華滋矯矯雲龍之勢濯濯君子之儀使仰之者起敬而翫之者忘疲至若廣壑噓煙朔野振吹天地倐起風雨驟至爾乃奮迅踴躍怒張噴嚏喋毛渭興嘶鳴海沸虎豹望之辟易鯨鯢聞之震悸居人為之迷方行者不敢仰視昔者河圖示兆候日開祥庖羲作易伊祈開唐運丁熈皥之㑹位恊東南之陽冝其鍾為人物洩為文章珠璣璀璨金薤琳琅掉􅀈乎詞苑振歩乎周行藻繪殷冔黼黻舜裳其靈異徵應有如此者若夫驊騮紫燕騕褭騄駬來月氏之重譯産渥洼之淵水圖畫傳觀歌聲載起顧盼光榮服御華侈豈徒慕夫名髙亦有稱於德羙然而道非無方日惟千里而其名係於天者顧若是而已乎若夫雲閑之駿天駟之駒毓於無極産於太初亘萬古而不息行六合而有餘將以殖琬琰載璠璵負金匱之璽發玉檢之書服太乙之葆輅駕上帝之采輿乘風馭氣周流於􅐓洞廣莫之野吾又安知其所如也懐故園賦并序顧大典昔庾信賦小園眷長林而偃息陸機賦懷土撫征轡以躊躇雖寄興不同而抒情則一余也家世東吳園依北郭迴溪石瀨雖非靈運之新營芳樹清流敢擬僧淵之精舍曾下帷於綺嵗宜養拙於閒居緬自釋褐明光以至服官郎署薄遊數載衣緇京洛之塵閲嵗丹齡鬢染河陽之色嶺上白雲誰侣山中叢桂堪招帝里雖榮慈闈日逺况夙抱幽憂之疾乆違寥廓之思觸緒興懐感時增恨式抽短思爰賦兹篇其辭曰承明時之嘉恵彯玉署之華纓眷白雲而延佇移仕版於陪京仰舊宫之宏麗倚天闕之峥嶸攬三山之夕秀慨六代之朝榮陟層臺以騁望悵懐土而靡寧江淼淼其無際雲冉冉其遐征懼匏𤓰之徒繫嗟萍梗之飄零愴鍾儀之楚奏悲莊舄之越吟心肫肫而軫憂思縈縈而如酲睇征鴻之遵渚感倦鳥之長鳴永濡迹於京邑困組緤以自嬰况廼嵗晏多懷覊人易感宻霰凝愁同雲結惨青鬢兮蕭疎白日兮晼晚年荏苒兮飈逝跡悠揚兮蓬轉行彌乆而情深途非遥而望逺積思成慺積慺成悲魂何寢而不夢夢何夕而不歸自筮仕而再遷兮屢逐食而推移展四體而率職兮逾一紀而迄兹詎飾擢之匪榮嘆㣲尚之日違撫南枝以彳亍盼北郭而踟蹰戒膏秣以肅駕願言返乎故墟廼若爰居爰處句呉之里潘岳面城晏嬰近市環雉堞以縈紆接虹臯而迤邐松落落兮垂隂石纍纍兮﨑嶬草􅓂􅓂兮䝉茸鹿飈飈兮騰倚抗舟檻兮臨渠列芳園兮雜綺復有清音之閣舒嘯之臺素琴之室𤣥覽之齋幽軒窈窕宻樾交加枝翻鳥去沼溢鷗來屋覆王猷之竹几飄何遜之梅館熟潘尼之果庭森𤣥盛之槐一壑風煙半頃莓苔笑彼買山聊同鑿坯若夫旭日始暖和風載揚遊絲罥樹舞燕窺梁傷紫陌之春度對紅芳而斷腸至如羲輪揚烈祝馭當衡朱華逞艷碧樹舒榮蜩蟬鳴而晝永熠燿飛而夜清及其金􅒫屇節氷簟生凉玉䋲湛色珪月流光雁初飛兮木欲落露將溥兮夜未央又若急景凋年窮隂促節野惨繁雲庭含積雪愁僵卧於衡門聊擁衾於邃閤悠然四序眷此一丘從吾所好樂以忘憂覺身聖於宇宙毒塵慮之紛糺遯世無悶賁園今有睠北山之草堂懐潯陽之舊友闢蔣詡之三徑植陶潛之五栁蚤脱迹兮簮纓永屏居兮林藪寧耕負郭之田詎羨歩兵之酒於是謝華紱曵輕裾結霞思振煙衢遠喧囂以成趣繄逍遥以自娯或擁膝而嘯或垂竿而漁或携笻而眺或負鍤而鋤或潄流而枕石或種藥而蒔蔬或寄賞於絲竹或樂志於琴書或奉輕軒以獻夀或席長筵以怡愉歸與歸與吾將覓蓴鱸於江滸蓻花竹於郊居非敢忘情於魏闕聊以保已於斑廬系曰歌藂桂兮山之隈維吾廬兮江之湄閲山中兮四時結區外兮遐思賦歸來兮秩滿以為期遊羅浮山賦湯顯祖夫星圖粤地引潮汐於𤣥紐日次周天晷晝夜於陽陸然則南嶺之南北户之北固以輿象之所偏龎燭龍之所長寤矣而廬嶽天子之障衡山祝融之㟽樞軸雖連於西極經絡未窮於南紀高融奥博是在羅浮羅山上直百粤之精旁羅赤溟之氣軒轅以䧏隆為粤嶽矣而浮山者是惟蓬萊神山浮自會稽靈海斷鰲不足比其波蕩操蛇不足異其轉徙葢流睒絶橋佇胎分嶴飛峰息壤神理自然所悵欝者名迹蕪藹采真莫續湧塔暗朝花之影沉湖銷夜樂之音毎與友人祁衍曾曾人蒨歎恨其竒大有終焉之意而束官陵祀升踐靡由辛卯冬十月始以出尉徐聞速令尹崔子玉於南海遲文學翟從先於東莞枻川墟履原隰宿朱明曜真之館候晴霏焉葢晦夕也詰朝朔㣲雨襲梅墟經白門聽泉於葉大夫春及之廊阿明日觀大簾泉避雨厥朏弔湛公於黄龍講堂道甚窄硌夜光青霞洞中有湛公樓七楹仙鼠居之此盡下界三矣明日起青霞至巔際觀日出為中上六界美人峰殊好䄂如道人時時出雲其下千仭葉大夫石館處也日始華露欲晞見城廓者四五前立石雙如蛾翅堅又立石翥為燕子門一名彈子門為美人障其前蟾蜍峰也同人不前獨徃彌勝從數羽衣人芟藴而上馬道二十餘里廻翔眩視草樹飛走光氣有異非所經識意謂靈境阻欝剨然一岡平曼修婉名以子午正其昏朝登頓再舍圭隂未禺遂躡飛雲凌日觀惟見香爐一具白水一巵祀羅浮君焉望天池以陽星沙而隂東連扶津之藹西盡崦嵫之色靡不區封有畛眳藐無倪者矣可謂恢魁乎大觀淵綿其神致也哉枕石起卧欣言賦之儗於謝靈運想似浮寫差為飛愜云爾極廬衡之經首暐赤嶽於賁禺畧招揺之桂樹望雲氣於蒼梧問津途於莞城釋泛舟於源墟灧林霏之窈窕漠巖户之紆徐晨光飛而首路夕影流而載驅倒煙容於衿帶睇朱明於隙餘磴環頳于莽蒼林織宻以扶疎䇿孤征而晻影鳥群歸而沸呼傍靈池以渉趾歴廻梁而聳軀鍾鼓鳴於林間香氣騰於路隅是為帝軒轅之所履神赤熛之所廬坐參正而披衣閲柳中而定居何遷人之鞅掌得借一於冲虛靈想接而心歡營宅清而寐除慨衣冠其委土想丹竈之流珠問洗藥於真人發靈簫於聖姑守瑶光之玉虎戴碧斗之銅魚恨天華之宫不存怨明月之壇乆蕪斷㝠心其莫引翳神光其忽諸徒使來粤都者走明珠於合浦浮毳衣於賈胡彼臯壤與山林非天性其焉如將縱觀其窟宅恣風雲之襲余度石關之穹窿接新構之離婁泉淙淙而夜鳴雲英英而晝敷清不可以乆畱澹容與以踟蹰山帶氲而翠積水簾波而素紆營磐砥兮偃仰䠞葩華兮噴噓避雨蝴蝶之洞睨梁天漢之虛拂金沙兮夜語蹍青霞兮旦發􅂒威夷而宛轉望敦龎而坱軋澹孤青於氣表漏陽華於空閲砉崖隒於川渠錯􅋛瓏於樓閣雖道絶於登降亦臨觀其曲折緬增城其在兹逓仙風而岅􅠣俯龍門而直上有流光之彯撇澂上界之精華照下方之明滅何峰容之偉竒漾真人之秀烈偶儷石之前臨露參差而障列如倚翅以斯冲似懸帆之次掲映神姬之出雲美朝暾而暮晰轉靈蝸而下視象寒津之潄齧始神山其浮來自會稽而涌垤覽至今其草木有東方之種别泯合際於羅丘度鐡橋而綴缺豈華靈之逺擘非秦皇之近設抵半舍而泉分宿煙炊而飯潔䪺金䇿之拳竒歩羽人之勃窣上登􅖇其若梯進孱顔其若闑陗壁虛而溜浮積泐欹而苔滑寄掌股於旁陘托跟趾乎冒橛葢起瑶池而躡飛雲周三十里之靈樾象耕之所絶蹊雉樵之所迷術肆竒樹之葱蘢并異卉兮冥宻紺蒼凝而互隂碧鮮流而競發固風霞之所藹薱亦丹膏之所淫欝有一花而四照有五色而一節或建日而無影或嵌空而有雪青珠冷風其欲亂珊瑚叢生而逾活神䴥倚其雍容仙鼯彯而撇拂木客離簁而似語山魈隱映而倐忽别有朝菌若雲夜芝如月翠羽攢菁金粉浮馥曩得一而為艷此成林而不掇固靈境其常然歎人生之覯絶謂林封而徑窮忽岡巒之秀濶儗撐距而不前乃按衍而條達曉發足於青霞午凌岡而戴苃候鷄鳴於上霄降兹巒而子末正子午之嘉名定昏曉之相割念人間之急晷劣放車而已瞥矧山行之阻迂慮峰攢而影咽竟凌霄而未禺何鄧林之蚤渴豈日氣之偏延非海音之所遏遂徑度其造天極空䆡而戴日屬相嶷於壘碓辨交亷之隴埒𦕈蒨木於河林認扶桑於渤碣掞瓊州而地矯引長星而天豁布肸蠁之芒芒衆毎生而忽忽偶旦宅以推排糅山川與名物昔㝠丘而去燕今南池而徙越為情多其苦悲亦心淺而易悦塵影含而志虧年路深而意没夜樂何時而遇仙花首何因而禮佛忖凡情於聖真若闚觀與窮髮將無始之趣未融令有終之相難閲朱鳯沬而潭氛碧雞殷而石裂覽異鳥其參差意靈禽之彷彿宫觀巋而如在丘壑虛而豈屈吾將洗浮氲於自然悟空明於一切朱陵之闕靡闕曜真之氣長結耀光景兮夐不知乎天之所窮靚凌兢兮吾以觀乎日之所出明文海卷十七
