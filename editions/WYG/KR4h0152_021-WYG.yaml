body:
  text: 明文海巻二十一餘姚黄宗羲編賦二十一哀傷一閔貞賦楊守阯夫何一佳人兮塊獨居而無侣朝悒悒以至暮兮夕營營而達曙言我家良而族茂兮幼連娟以好脩珥瑤碧而佩寳璐兮戴孔雀之搔頭覽薜茘以充幃兮緝蕙蘭而為禂光陸離其繽紛兮芳與澤其雜糅慕闗雎之窈窕兮兾君子之好逑籍蹇修以為理兮執髙門之箕箒葛蘿附於松栢兮吾懼夫身輕而厚施覽圖史以自監兮哀哲婦之傾城思雞鳴之賢耦兮恒警戒而相成繫靈修之髙義兮方採芹於頖池懐青萍與結緑兮俟和燭其子知將榮耀以貽寵兮矢偕老以為期何大厲之嫉妬兮羌中道而奪之如渉川而無航兮如凌霄而失梯豈妾人之殃咎兮抑天命之不可違易珠翹以麻髽兮代羅裳以繐哀泣既盡而繼以血兮心怛絶而復悲天隂隂其欲雨兮景翳翳而將晡燕飛飛而歸梁兮雞登塒而相呼宵燭黯其無光兮撫孤孩於坐隅摶哀苦以為枕兮結愁思以為衾依苫席以假寐兮恍若君之幸臨乍悲喜而欲言兮怛驚悟而惕心猶傾耳以馳想兮似聞君之聲音終悄悄其閴寂兮哀四壁之蟲吟欲夜哭而不可兮淚浪浪而不禁朝進拜於殯帷兮奠桂漿與椒醑芬咇茀而不饗兮忳鬱邑余誰語人與嵗而偕進兮暑與寒其代序念死生之異制兮卜宅兆而安厝薤歌凄其載途兮柳轝儼以即路雪霏霏其交零兮氷溓溓其將沍獸挺走而失羣兮孤雌峙於逺樹抱𤣥纁以臨穴兮欲殺身而為殉憐幼稚之重孤兮又低迴而不忍暮返哭於故宫兮氣奄奄其欲盡何昔日之甘薺兮今直為此堇荼也哀同室之人兮溘先委於山隅也倐祥禫之既踰兮人告予以從吉惟夫死為未亡人兮吾心喪其猶未畢彼媒妁之嬋媛兮迺申申其煩言曰琴與瑟宜更張兮鏡已破而重圓汝何㷀居而自苦兮終槁死其誰憐曽歔欷余侘祭兮媒莫察予之衷情烈女不更二夫兮在古訓則明明詠柏舟於共姜兮悲黃鵠於陶嬰凝妻引斧以斷臂兮梁寡撡刀而殘形冷女䝉被以流血兮荀氏以衣帶而自經吾悲不及古之人兮又何能踐乎二庭琰失身於異域兮嗟怨憤其何如易安自辱於駔儈兮空嘆咤於桑榆茍大節之一虧兮又何取於雕蟲之緒餘吾亦知􅄔居之無聊兮忍而不能辭也將蒼天以誓心兮雖九死而不移也擘松枝以掩涕兮倚修竹而延佇阽予室之翹翹兮閔鬻子之良苦勉拮据以綢繆兮雖卒瘏而莫顧嵗䀜䀜其若頽兮時冉冉其哀暮哀良人之日逺兮𣺌英靈其何處命靈氛以占筮兮召巫陽而問故曰兩美其不終兮孰知其英靈之所寓匪修文於地下兮將玉樓成而作賦勉陟降以永素兮或庶幾乎一遇假蓬萊之仙軿兮驂螭虬而橫鶩邀金母使前𨗳兮招麻姑使為御朝發軔於扶桑兮夕余至於湘浦謁重華之二妃兮睇蒼梧之坯土事同心而相感兮淚斑斑其如雨道岷峨而弭節兮文君繽其來迎余惡其失節於臨卭兮疾驅駕而不停縱余轡於沙漠兮嗤王嬙於青丘爾何嬖於二酉兮為中華之遺羞朝騁燕而莫粤兮遇浣沙之西施憤尤物之喪邦兮誰將戮乎鴟夷周下土而不見兮將乗雲而上征封姨先驅以清塵兮􅄔女從予以揚靈泝天津而遵河渚兮見河東之織女隔夫君於一水兮亦脈脈而不能語雖嘉㑹之不常兮永相望於終古步蟾蜍而入月兮拜嫦娥於桂下后羿死己千載兮猶孤眠而不嫁惟廣寒之清光兮照萬古之長夜屬纎阿以啟途兮適太微之所居羌中心之憤鬱兮將扣閽而問諸蹠何為而夀兮淵何為而夭共姜賢而早寡兮夏姬婬而三少莊姜仁而不遇兮嫫母醜而自好惟兩美其必合兮胡不與之偕老孰主張乎是兮而施之顛倒死者其何之兮乃冥冥而杳杳將乗化以歸盡兮抑輪迴於六道何下上而不遇兮増余心之悄悄望閶闔之洞開兮蹇欲進而躊躇念下土之臣妾兮敢冐昧而干誅申禮義以抑情兮聊逍遙以自舒回予車以復路兮卒稅駕於故廬仰旌閭之赫奕兮輪奐翬飛而凌雲金書鬰其焜耀兮曰表余貞節之門鵷鶵翩其髙舉兮隨九霄之鸞羣願竭忠以趨勞兮報乾坤之渥恩余雖老死而無憾兮將籍手以見吾良人庶無媿於婦道兮光彤史於千春哀逝水賦商輅哀哉水之為物也浩浩乎窮四海而委形混混乎歴萬川而流行繄䝉泉之始發兮或檻出而旁通洎靈液之啟秘兮亦壑趣而科從上無髙之不自兮泝銀潢而為蹤下無深之不入兮渺溟滓而為宫載四游以為極兮涵九提而為封浴兩曜而出入兮吞列宿而渾融彌三湘而漫七澤兮蕩垕靈而浥太空若迺時雨驟集潢汙橫流八埏伊阻平賦悠悠黃河逆上地軸橫抽沮洳成淵絶巘成丘禹功莫展丹績奚收及夫青娥告令白收秉權洞庭葉下吳渚楓妍潢歸潦縮澤枯隰堅海歛而碕露磧江收而渚呈壖其往奚歸其洩何宣吾但見其亘古今繼日夜而東馳而日益長往而不舍指虞淵以為途兮迅方壺而遐征去益逺而返無由兮何西歸之可憑謂尾閭之復宣兮氣益充而滀渟遂蒸蓊而上下兮爰循環而相仍噫有是哉天地之生賴氣以成輕清上浮重濁下凝浮凝定位乾坤以名流峙羅列二氣之餘惟斯水也一六之符氣入而盈氣縮而虚窮邃古而一軌豈斯今之可疑鍳斯流之不返撫人生之胡為羌朝露之易晞慨夕槿之就萎目睠睠兮若存魂飄飄兮如馳豈天人之諐殃兮將修與短固有定數數固有之兮吾且信其必由理而寓理既宰斯兮諒惟善之是留胡於今之不然兮乃背馳而殊路兹既執欵誠而履柔淑兮獨中道而顛仆將修正之來咎兮抑此數適因時而畀賦每撫膺而浩歎兮涕橫墜而莫禦噫噓欷閨門掩兮夜寥寂香徑空兮杳無迹青鸞沒兮金鏡塵寳猊冷兮沈烟息中饋空兮伏雌在蘋藻芳兮寧復來哀招九復兮魂不來白日忽兮掩藹渺深情於溟漠寄逝波於東海托迅瀾而通勤瀝余衷而莫悔觸余目而増欷攬予心之芥帶水濺濺兮東馳日杳杳兮西飛送㝠鴻兮三太息夫人一去兮何時歸擬恨賦有序李東陽予少讀江淹李白所作恨賦愛其為辭而怪所為恨多閨情閤怨其大者不過興亡之恒運成敗之常事而己是何感於情亦奚以恨為哉中嵗以來更渉世故記憶舊聞忠臣孝子竒勲盛事或方值幾㑹遽成摧毁失之毫釐而終身曠世不可復得至令人吞聲搤腕而不能己聖賢不言恨然情在天下而不為私亦天理人事之相感激雖以為恨可也乃效江李體反其為情以冩抑鬱而卒歸於正知我罪我皆有所不避云其辭曰仰視大塊流觀古今撫陳編之磨滅悲往跡之銷沈或事幾之幸㑹或禍敗之相尋感志士之涕淚傷善人之聾瘖若乃國士報怨吞炭漆身遺恨飲噐潛身水濵部馬為之驚跼賊徒為之崩奔奮仇衣於一劍隕怨血於千春威横強秦怨深隣國壯士夜奮神椎晝撃山嶽為之増氣天地為之變色誤失手於副車僅逃形於大索陳竇秉政誓清濁亂推席定謀露章請斷機事暗泄禁軍坐畔塞宇宙於烟氛墮衣冠於塗炭昭烈繼絶武侯託孤勇復漢祚雄吞魏都陳二表之宏略運八陣之竒謨忽將星之淪落悲帝業之榛蕪武廟將建唐社幾屋躍少海之潛龍返虞淵之日轂二竪伏法五王就戮功甫收於藥籠禍終留於机肉建中失母感槩天衷顧衮衣與玉食嗟欲養而無從誤承歡於别輦翻飲怒於深宫兾百欺於一得竟忍慟而長終金人南下岳侯奮矛復中原於破竹誓决䇿於焚舟神禠姦魄天遺國讎痛長城之自壊委社稷於荒邱朔騎南驅江沙夜駐若兵力之不支幸潮來之有處海若助虐坤靈失據豈二儀之翻覆莽萬物之非故已矣乎江山改兮人民非白日黯兮隂風凄時不可乎再得嘆浮生兮曷歸駭餘聲於璧碎佇滅景於雲飛事難成而易敗世寡合而多違矢脩正以俟命孰利鈍之可期庶人定以天勝終斡旋於化機東門賦何景明步出東門四顧何有敝塜培纍連畛接畆有一男子饑卧塜首傍有婦人悲挽其手兩人相語似是夫婦夫言告婦今日何處於此告别各自分去前有大家可為爾主徑往投之亦自得所我不自存實難活汝婦言謂夫出言何絶念我與君少小結髮何言中路棄捐次别畢身奉君不得有越夫聞婦言此言誠難三日無食腸如朽管仰首鼓喙思得一餐大命旦夕何為遷延即死從義弗如兩完婦謂夫言爾胡弗詳死葬同溝生處兩鄉飽為汚人饑為義殤縱令生别不如死將夫愠視妻言乃執古死生亦大爾何良苦死為王侯不如生為囚擄朱棺而葬不如生處蓬户生尚有期死即長腐寤寐黃泉美諡何補夫婦辯説踟蹰良久婦起執夫悲啼掩口夫揖辭婦􅋞淚西走十聲呼之不一回首矜逝賦孫宜蒼蒼孟冬兮草木莽莽緒風振於清原兮滄流凄其迴蕩㷀徘徨而逺顧兮見丘坟之纍纍狐狸卧其側兮豺狼號其四陲荆棘生而蘙壠兮楸松儼以成行念三畆之是列兮悲九原之若堂進野叟而就問兮曰此故達人之藏昔夫子之享休兮羌積勢而孰當秉炎威以灼爍兮屹氷山而造穹蒼於峕鬼神避其力兮日月潛而莫襲其光或片言而致福兮一語爰以胥戕使𤣥黃卒可移兮將覆載為之易設欲轉市而成山兮神人乃於焉以驅石明珠逺致來越裳兮翠羽棼而羅家謂千齡之可矢兮曰夀夭而無常朝並齒乎河嶽兮夕乃齊乎秋霜縱祩􅃭以為藏兮亦祗益乎椑之度也矧一逝而不復旋兮是皆他人之數也嵗未幾而成墟兮塋巃嵸而蓁蕪石麟竊而為砥兮翁仲貽之牧夫謇椒漿其孰奠兮頽􅒗彚其嗚呼覽斯土之荒穢兮吾既閔而嘆之彼權夫之暴骨多槩何如而見之玉魚縹緲留人間兮銀河蕩而為池三泉湜其既竭兮九京之骼而奚遺死生之鯈忽兮惟大人之逺覽生有義而死有旹兮欲昌被而不敢攬薜芷以結佩兮搴芙蓉以為裾懼修名之不立兮老冉冉其無餘使生無益於峕兮吾寧淹而速化既樹德以培芳兮縱名往而奚詫觀上古之明哲兮亦率由乎此行循繩墨而不頗兮故雖死而猶生三后之耿介兮乃邃焉而有稱旦几几而無泆兮又奚愧夫沒身彼司馬之石槨兮世乃夷之非倫原倚石而自沈兮顧以忠而曜其名使逢峕而可恣兮何堯舜之戒儆也棄槼榘而無尤兮何以名之準也信夫子之垂涕兮非縁乎土茍遐武其可慕兮吾將為季札之所醻傷涯櫬賦有序魏學禮魏子歸自金陵將涉江焉有櫬在湄波時及之哀而作賦曰彼江干之汎濫兮胡斯椑之泊兹嗟迅湍其洶涌兮回波􅒓而及之骸形戢而未露兮諒魂魄其有知俯舷旁而遐矚兮式慘慘其興悲粤陳辭以訊之兮子胡為而致斯將子春秋之故及此兮或嗣續之靡人將子疾在於骨髓兮或二豎厄而莫振將子若楚纍之沈湘兮乃控節而殞身將子若魯生之蹈海兮乃憤激而投津將子懐璧而媒冦兮若道逺而中踣將子引波以潔躬兮遂與汨而俱入非暮濟而蹶僵兮何既歛而塗泥豈陵谷之貿遷兮乃隧圮而濱涯嗟白雲之英英兮慘侵肌以旤沴惟風雨之靡䕃兮又巢䖟其羣噬哀檝夫之衆觀兮咸惝怳其倐睨哀其欲墮未墮兮令何格乎掩薶將恐將懼兮行且覯其裒皚吾誠不忍其即溼兮屬僕夫其徙之行者告余以勿徙兮此實怨而死之官將檢其棲止兮孰能易而之他嗟作法之弊成兮俾亡者之臨波顧余無力以庇之兮噫彼魄其奈何明文海巻二十一
