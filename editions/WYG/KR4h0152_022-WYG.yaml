body:
  text: 明文海巻二十二餘姚黄宗羲編賦二十二哀傷二反招有序俞安期范叔子雲門人也少有彊志博覽善辭君公車業師心獨造海内學士翕然宗之咸得進用而叔子獨無顯效因著書以議當世世亦嫉之至老窮絀無聊若六合之内九州之上無以容其眇然之軀而騁其牢騷之志者遂營度生壙築居其旁示與當世訣絶意足悲矣昔屈原被讒見放其徒宋玉慮其魂魄放佚乃賦招魂招之其稱楚國之美區區堂奥之盛也臺池之美也陳設之備也修膳之珍也女謁之妖麗也被服之文纎也歌舞之雜㳫也飲宴之湛荒也用以諷諌懐王而兾其覺悟以收原辭固偉哉竊恐懐王昬憒原未必收適開其侈誕之心皇甫謐譏其淫文放發誇競失體風雅之則於是乎乖諒哉其言也余不自量迺賦反招爰正宋玉之夸用廣叔子之意俾其悠悠順化逰魂𤣥憺窺本原之大同齊死生為一致茍居寂寞之身外馳紛華之志塊處尺五之地結想四方之逰徒絶快意之談蔑忘憤懣之氣得無有張毅之疾以攻厥生而漓厥真者耶遂作其辭曰肇有厥體魂附麗些絪緼時夜亶不離些君何佉佉善逺逰些九州之土行不休些異方鬼物羈魂是讐些魂兮歸來毋奄其銷些魂兮歸來齊魯不可以愒些巖巖泰山其嶽㙪㙪些逮此逰魂深以繄些厲飈焉祟槯城撤室些人其觸之揭而永殪些歸來歸來毋適此轗軻些魂兮歸來雍秦不可以招揺些自癸及戊女魃驕些如惔如熛塵敽敽些藴隆陸海濯濯無毛些髑髏晝行諸呶呶些偵人肉血食飲饕些青天飛犬聲號號些此其災象尚不知所遭些歸來歸來毋與禍交些魂兮歸來蜀道不可以逰般些羊腸蠶叢備險艱些上造參井下重泉些一瞬不戒疇完厥身些歸來歸來毋阽危以為安些魂兮歸來交廣不可以少延些火山赤坂置膚則潰爛些蛇鬼虎倀嘯人以為膳些飛蠱狂逰中人以為昪些菵露瀼瀼厲烟煽些歸來歸來毋入以瞑眩些魂兮歸來閩越不可以周旋些耽耽海民獷愎而醟些人身蛇文水中是潛些捫人以戲載浮載湛些歸來歸來不可與親些魂兮歸來江漢不可休息些赤壤千里鮮黍稷些炊彼遺粒如金如玉些若敖大鬼䫲頷而不得食些汨羅寃臣遭之心奭些魂兮歸來毋貪其殛些魂兮歸來幽并之土不可以躋些嚴風利射膚坼指墮些髙水崇雪人馬咸埋些寒門幽里魂往必迷些歸來歸來不可以由些魂兮歸來中原不可以暫適些臮我呉越災殄不絶些旱潦四臻民生夭札些儵陵而襄儵川而熯裂些疫癘淫行道殣如綴些復有孑遺烟不黔突些魂兮歸來俾善息些魂兮歸來帝都不可以相常些權貴炎炎勲戚陽陽些貂璫社䑕恣披猖些朱甍紫觀焜煌煌些瓊㽔金華絢雕堂些蘭宫蕙室網明璫些孌童名倡進成行些華轂約軧巧趨蹌些文筵為藉瑶席張些䴏髀鵠膚鳳膏烹些雲飛水潜截其昉些饜棄芻豢珍異競些甘酸適調椒桂芳些鬱金吳醥汎都梁些夸毗磬折上夀先些諛言盡甘擎跽連連些援登層霄抑沈淵些規規良士望難前些虞爾狐管紀其諐些爰造新令逰客是攣些歸來歸來毋乆淹些魂兮歸來諸侯不可以客些習尚不同行止異適些臺池聲色畋獵是溺些益髙為山鑿深為壑些寫象溟渤儀衡霍些曲池承流迴歕薄些被岡遵隩施繡幕些吳姬楚艶顔沃若些曼聲緩氣志靡弱些鄭音趙節遞絡繹些歡樂煩怠思騁躍些彌山槩藪忽震爚些乘黃飛䴏縱若射些如黃青骹噬逺若㰌些殫情蕩思歸銜爵些左右侍御語諾諾些東西是以亶不逆些陳說禮法誰根格些矯矯遺直適罹其虐些歸來歸來毋往索些魂兮歸來冠蓋不可以逰些名位為寳道德贅肬些顯榮幽仄判不儔些粤有陽慕式相招些駴鐘飾鼓引箜篌些瑶觥瓊髓旅獻酬些白日為失稱好逑些聲氣好合期千秋些片辭抵忤成戈矛些含沙射影潛相謀些歸來歸來毋相逐以蹈其就些魂兮歸來邊塞不可以彷徨些蠻方逺徼事攻殺以樂康些跡􅏳中國攘奪無所懲些啾啾夜啼此成國殤些碧血漚草白骨成岡些敵入不迎去不從些材官邏卒刈人如蕫糧些稜嶒恠相囊之而上首功些魂兮歸來毋丁此旤兇些魂兮歸來適新居些後倚旄丘前清渠些左築場圃右平疇些蕙房蘅户結中區些木蘭為撩松為樞些䝉以葛虆繚芙蕖些周旅栝栢列栟櫚些隰有女桑叢有茹蘆些珍木異卉鬱敷華些懸綴皜雪疊緋霞些上集孔翠鳴􅀈鷄些淹留長離振朱鷺些䲓鰅鯶鰋千石魚些驅鷄役犬伍􅣩麌些魂兮歸來惟君是愉些魂兮歸來入中堂些曲几四陳列圓方些蒲葅瓠脯藉蘭芳些蓴絲秋緑擘為羮些莝屑蕨苗枯而為粻些畦𤓰五色傾朱瓤些纍纍林實充篚筐些陶樽既滌含醴漿些松牀桂架陳縹緗些蟲書鳥篆列成行些芒芒紀載煥文章些日含月咀擥華精些尚論五帝揖三皇些誕則𤣥聖友素王些大庭華胥恍托身些雲官鳥氏旦暮逢些魂兮歸來樂何窮些魂兮歸來留宻室些從容墐户守太黙些逰心無始體道質些絶棄鬱㠥居沕穆些回矚昭曠静以潔些恬愉沖漠抱純白些達情遂命齊萬物些綿綿若存保厥一些古哲是儕歴千祀些亂曰媒媒晦晦兮乘鴻濛齊得喪兮淪𤣥風世莫吾知兮循大變以始終羌憂患之不處兮視紛紜之𤣥同適天行乎人間兮化則憺遵乎夀宫招魂詞錢琦萱以清淑勤苦積學成名早拔賢科洊居儀部夫何以獲罪謫守德慶州客死炎方輿櫬艱險歴程五千悲哀罔及五内割裂父乃長號逺呼升霤四望而招之曰噫魂歸乎來爾父在堂嗟夫日昃之離爾在土八載其將嚋依噫魂歸乎來妻妾三人未滿四旬四子二女孤苦伶仃哀聲載道行路之人有不忍聞噫魂歸乎來縱不於爾父母是念尤當憐室内之無人繄歸來德慶不可以久住兮瘴氣最惡白日如昏殺人非刅十往一存況夫雕題椎髻何有乎三吳民俗之淳繄歸來南方不可以止兮蝮蛇蓁蓁封狐九尾巨􅀈奓哆啖人脂髓繄歸來北方不可以久住兮一望沙漫誰其友隣飛雪千里層氷如山去不復還繄歸來東方酷熱金石爍流咸池若木浴日驚濤長人千仭吞噬莫逃繄歸來西方無際鬼教移人非我族類流沙傾䧟弱水難濟繄歸來無上忉利豐隆震威飛亷揷翅縱能力排閶闔帝閽之怒不可避繄歸來無下幽都河伯馮陵龍師仡仡吞象之魚深淵莫測魂兮歸來閒以静止峽山之東景物勝麗父兄宗族生長故地樂不可言只峽東之春舊屋数椽鶯歌鷰舞花卉争妍魂兮歸來恣所適只峽東之夏門牆幽楚稼穡稠稠黃雞白酒主獻賔酬魂兮歸來恣所飲只峽東之冬時和嵗豐蒸羔烹豚炮鯽炙鳬魂兮歸來恣所嘗只峽東之曉暘谷始旦萬物畢見峽東之暮崦嵫滅影月星滿户其樂無度魂兮歸來尚信汝父哀黃生賦有序湯顯祖余友黃生名棟里人也年六十矣貌寢孤貧聞逰者談京師之富冐漲而行止之不得至徐州中暑横舁過東平已不任視聴矣至京一日而瞑同里人共瘞之闗南余感其生時驩謔撫壠酸涕下第陸歸不能致彼故鄉先賦逝言哀哉黃生生年甚飲今日故人醊君幽寢欲不吞聲嫌相嘲切欲不陳辭難相飲噎生貪好書仰人眉睫定本巾箱亡書别篋蠧跡難憑蠅頭自冩獻笑虞初渉略蒼雅目不知書玉珮金車讀書如此不及侏儒生故無子求方服食雖有間情曽無弱息不善為容揭露喉齒掉臂而行槃跚歩屣故無長志亦復短視忽慕豪華來觀帝里帝里云何昔我經過夏浸積空江淮沭河濤翻雪鳬漩轉雷渦曲折駭頓寧任風波渡江而馳僦逐騾車焚輪疾堁牛馬之餘中目凝齒䝉頭變軀懸發有程不得徐驅寒門暑路礫石峩氷羊腸巇險騄耳摧零公無渡河余方泣岐拔劍而去不若哺糜生時揮手語謝朋友帝里豪華誰非白首土風便習豈問奸醜結駟難期蹈隙時有余聞此言重相止勸凡今之人年輕力健勁出如鎚巧入如線動止如風舉舌如電若鬼若神潛形魄現如瘵如蛔食復轉變承鬛嬉逰侯鯖穢羨生無技姣㮽阿則便古人有言貴不如賤白首華京非生侣儔號曰強起名為宦逰年髙始壯漏盡何憂如生已矣宜終首丘左思摘白楊雲逐貧人皆有憶我獨無身蟣腸蠅鬢鼴腹鳬脛影必隨形力不敵命河上郵亭别舘横經妻稱牧犢子字螟蛉希夷自貢怪魅無逢翻為浪士忽翳雲蹤隂陽之食貧病之容中暍徐邦逰魂岱宗裸致於京不復省人目直猶視古橫難陳一宿而㝠同旅悲嗔藁瘞都南時服周身他鄉是客異鬼非隣已迷生路寧識歸津千秋一寄萬里同塵夐夐獨冡遙遥族親魂飛渺茫過鳥號翔何當拍取還君故鄉擬招招两亡女沈宜修槎夕已往蘭㑹旋臨悠悠生死心乎痛矣杳㝠泉臺無期再見擬楚騷而招之魂兮歸來閨中弱質豈堪渉彼㝠途些繄汝二人昔何為而來今何為而早徂些使我暮年罹此傷心天何以控呼些歸來歸來返户樞些魂兮歸來金風乍凉玉露冷些秋蘭芳馥芬盈庭些小池風度亂藻萍些曲檻蕭森敞浮清些軒閣明忩好談經些無静三昧無爽靈些歸來歸來得清寧些魂兮歸來木葉微脱洞庭波些菱歌晩韻泠芰荷些水鏡圓魄浄翠蘿些清風徐來澹素柯些纎雲天表澄練河些花竹映秀耀曲阿些秋華多麗休羨考槃之薖些歸來歸來不可以蹉跎些魂兮歸來床間有書可娛目些架上有琴可橫膝些歸來歸來無虚室些魂兮歸來墜露可飲落英可餐歸來歸來無遙想些魂兮歸來荷衣蕙帶芙蓉集裳些北牖風清小簟生凉些花覆簾低爐裊香些蘿屏曲映繞畫湘些粧前明鏡舊日之光些歸來歸來返故鄉些斷香猶茜匣遺芳些蕙帳空兮怨啼螿些故園回首豈無自傷些歸來歸來無𣺌茫些魂兮歸來藥卉凝階艶秋棠些微雨疎桐滴銀床些風月正美容與徜徉些樽中有酒羣集流觴些歸來歸來無徬徨些魂兮歸來兄弟成行姊妹連袂何汝二人獨遐棄些歸來歸來不可以久暌些魂兮歸來聚談竟日謔浪笑傲些花草參差堪臨眺些歇雨送雲林端留照些歸來歸來速歸還些魂兮歸來冥漠無倚日月無曜些歸來歸來一室之中豈殊調些魂兮歸來胡然而久寓些桂露凉烟夕香度些閑宵漏静清輝徹樹些房櫳幃幌仍回顧些歸來歸來可疾趣些去路茫茫無親故些長夜漫漫永無煦些歸來歸來何為乎誤些魂兮歸來朗景清冷素風吹些髙秋搖落昔同悲些白雲黃葉堪賦詩些薕葭蒼蒼何無思些魂兮歸來不可以久離些亂曰熠燿燦兮商氣清落芳㽔兮鶗鴂鳴時不可兮復再得惜往日兮徒傷情風嫋嫋兮思無極水潺湲兮秋望平蟪蛄兮無聲蟋蟀兮宵征又曰泬㵳天髙兮良夜修空目斷兮懐離憂銀漢沈沈兮月華流魂兮歸來無淹留傷心賦有序沈宜修昔人有攀桑條而泫涕覽搖落而興悲無非感時事之移異物色之變遷也二女亡後倐焉經嵗庭花幾落夜月幾圓病中言語宛爾如在億昔儀容已成隔世思忽忽以若遺心怦怦而常憾黯兮回風惜乎往日蕭條野曠泬㵳天髙鬱無畔靡靡之痛歎不歸渺𣺌之魂傷心若此聊賦斯言夫何物之最慘於世兮情莫傷乎死生終翳翳之𤣥壤永杳杳兮九京倐奄然而長逝欲一語而絶聲斷窮烟於碧落若晞露之槿榮恨填膺而不息憤無控而難平草荒涼而改色雲黯淡而凝橫盻音徽兮寂黙觴遺韻兮悲盈是以鵑血流枯猿腸悽惻芳樹愁深霏絲怨織春葉紅消秋蘭寒逼茫茫宇宙奚痛如極而迴思在昔靡不瞻依顧復銜恤掌上珠璣端嫻冶澹淑慎威儀温明愷恵婉約瓌姿如鄅稻之早辨聞絶絃以先知逗瑤華於朗月襲花氣於羅衣容光麗而要眇德音静以清懿邈仙蹤之一去歸環珮以無期閉葳㽔於寂寞慘搖落於芳時啟房櫳以欲喚驚斷絶而還疑情一緒而百結恨萬縷而千思於是美誇燕趙才壓班劉容迴雪而妍嫵兮思裁雲以令攸飄娟嫮之輕袂兮振舒采之纎裗曉傾鬟於菱鏡夕遺佩於芸篝清言啟而斐亹逸韻揚以閑幽吐芳蘭之秀潔含潤玉之瑩柔爾風流以頓盡余愴懐以無休覩風寒之碧蘚覽霜泠之青楸殞桂芬兮寂寂悽梧影兮悠悠毎恍恍兮在目時忽忽兮遷流笛怨山陽人逺雁哀隴首雲秋鶴去悲餘華表鳳飛音斷秦樓感百哀之彌漫擣寸衷以若抽草無言而自緑花歛黛兮如愁恨莫恨兮連摧坼哀復哀兮見無繇恫玉顔之早謝若朝暮之蜉蝣迺又篋留蘭膩爐冷麝烟斷明光於月下咽參差於花前粧臺静而塵滿繡閣閑以翛然風颯慄以紓結鳥哀鳴以多憐鏡孤芳而無覽衣歇香以遺妍文牕窈窕永棄筆床翡翠長捐更以鸞機罷織紈扇無鮮寒生綺幌零落花鈿琅函掩巻錦字停箋怨蠟流殘兮照夜愁斟不復兮長筵自彩雲兮一散悵明月兮空圓折芙蓉兮誰寄淚隨波兮潺湲煎迴腸兮不息纒痛思兮連綿摧百卉兮無光蔽朝輝之艶景蛛網縈兮殯宫奠漿陳而空冷捨此春華藉彼夜永素魄慚形嫦娥弔影遙憶前歡何堪重省望歸魂兮迢迢逈青燈之耿耿樹迷離於庭除蟲慘切於軒屏繐帳空垂靈几静晝梨粉飄香疎枝影瘦風景不殊人物非舊蕭蕭白楊烟光相逗至如空梁泥墜雁來燕歸朱門悄悄斜日依依鎖藥欄之繚繞掛簾月之霏㣲風狂呼兮雨泣秋木變而歔欷又若林花吹盡柳絮飄揚永斷送春之句終無咏雪之章怨蟪蛅於夕露愴黃鳥於青陽花放河陽之錦菊舒彭澤之芳無不悼生對景感發臨觴動啣惆悵静處徬徨㸔白鷗兮愁不去遶萱草兮夏難忘魂徨徨兮恒慘絶涕浪浪兮時沾裳涕沾裳兮情何已新夢囘兮離思長欲一慟兮心哽咽望雲霧兮空蒼蒼亂曰春光爛熳兮虚佳節冬日蕭森兮凄凛冽茫茫代序兮徒自傷生死殊兮永為别明文海巻二十二
