body:
  text: 明文海巻二十六餘姚黄宗羲編賦二十六述懐四大遊賦祝允明允明以宇宙之道於我而止矣渾鴻包之萬象條之三五肇構於其先宣尼總齊於其後君建為極臣成為業士治為學民遵為世隨其時也易曰拘係之乃從維之王用亨于西山允明時不自立身名隨人拘維將老而神明中亮問學外廣有無之際三五宣尼之所營葢嘗㝠訪其間焉斯用亨之利也暇日叙之為大游賦可以垂語千載焉爾夫何恢慮之大人兮羗縱觀於域中柯柘檍以為車兮畢妙制於輪工建六等以道逺兮職三材以行空既軒之以華轛兮又積中以堅􅤧招鈴且使附輿兮􅀢鞭而右從帀九圉而窮轅兮矤章亥之有終跨四渤以修征兮隃華封以臨戎左賔暘於二桑兮右嚮晦於三春前炎洲以玩鳥兮朔幽紘之夢夢耳鞮象其支朱兮胡旅鎻於蟲封惿皇盤之下繼兮中六圍而作宫命旋轅而内歸兮攬覆載之所有薉蕭稂之被壤兮葾芳蘭之不茂喬隰榛與山樗兮斤文梓令速朽獷貙豹之犇犇兮藐麟虞之在囿吅鵂鵬之啾啁兮梧不集其鳯鳥夷高岸為深谷兮堀墣礫以為阜翦珞壆以圊椁兮童丘隅俾不􅛄睨洪河之橫怒兮恒襄陵而汩宇洶漫漶以突徙兮數失邑而病漕懐神功之難纉兮惋夏蹟之非舊帶衡江而修截兮判二戒於左右聨南濵之百巒兮蜚千泉而下湊亡晝夜而建瓴兮濜交注於揚藪漭散衍於三江兮赴伯若而為湫始湀而繼湮兮濆汜濫以妄走蹇重咽之中楗兮焉執咎於授受嘅𤯝灾之嵗成兮􅀈殫虐於呉畆􅀈沮洳而莫遣兮抎十千之維耦驅𤣥黃以高驤兮循中原之舊服畫州邑以星敶兮敝曠土之沃沃邈山川之遐隔兮空千里於一矚憶先王之位天兮經九井以為國掌地政於司馬兮詳同成而澮洫樹萬里之基槙兮厚蒸人之安宅固君民之比輔兮食無為之帝力厪諸聖之造述兮與世期而亡斁何秦孝之顛暴兮益衛鞅之薄刻始必墾以阡陌兮繼稅人而蕩潏垝坤元之綱紀兮勢一剝而弗復艾因時以茍為兮僾彌古而偕極􅔨蒼黎之増増兮揉千百其品倫伊四業其各守兮劙百役以駿奔恫窮㷀之顛隕兮懀惰游之獧嚚􅀈戕之以宄賊兮樓豺贙而食人痡九夫以征榖兮餉凶餘俾悍淫捐田事而不男兮競逐末於錢刀集千姦以為利兮網無恤於戚曹攟泉布而操壅兮靳濟物於一毛鄙逡縮於狡窟兮酋驕戾於王侯工不度而作淫兮聊須庸於斤陶皇天生此元元兮惠司牧以大君建萬邦以諸侯兮賦官士而臣鄰寧一夫而非農兮而戴履於乾坤怵兹辰其何時兮農八一而僅存八民一農飱饛簋罔稽田兮畯曽弗得以食新均含氣於化育兮哀細人之特勤予既未榖於道邦兮吁釋錢鎛而被此鞸紳氣紆蔚而不解兮意周章以交馳違巖野而即市兮求化理於官司闚訟堂之佻佻兮匐萬子而榜笞大夫騁而蕉萃兮不得知其所為輿胥五百柙千􅀈兮引羔豚而飤之檄氄磔而運兮格辰道而申齊士呻癉於饟輓兮伍病空於陴垂悁四方以謈嗸兮甫焉得而驩熈操艅艎之䝉衝兮晨橫江而西㴑扣曽城之九重兮闢臯應而疊五卬天京之鼎立兮頲綘闕以崇騖欽萬域之攸則兮拱北極之星附􅀢三殿以中嚴兮奉天華盖謹身矗雙樓之夾輔文樓武樓閟椒闈之沈肅兮峻丹陛之複䕶列八屯以周廬兮離千曹而張署啓巖閣以𢎞文兮宅大訓而稽古坐耉成以寅亮兮諧宻勿以釐務蕆法筵以尊師兮訪道揆於墳素倣明堂之法象兮裁靡代之踰矩近堯階之三尺兮削漢宇之萬户廟四親以致享兮宫崢嶸於左祖右駢祠維太社兮同先稷而為伍毓儲聖於青禁兮昭英華於文武文華武英二翼殿觀靡究於中秘兮䂓載考於庶府張五督以詰兵兮昈六官而開部廣通政而給諌兮謹臺察與大理太常典厥禋杓兮宗人掌其圖譜謐翰苑之閑清兮都成均之綽膴守信玉於符臺兮顓筆削於史注欽天審其厯象兮大鴻傳其臚句光祿精夫玉食兮僕馬備其徒御條萬幾以緄襄兮錯羣工而牙布沛周詳而章徹兮互責稽而棐俌奕神祖之開業兮濯神宗而善遷為王賔以觀光兮遵大路而北轅厯揚徐而齊魯兮趨豐鎬於幽燕瞻帝居之際天兮服王心之所甄葵啓承之有道兮盖同經而異權屹高皇之奠鼎兮介哉格乎淵算承乾休之凝注兮憮坤輿之饒贍執天徳以守國兮豈徒防於天塹來百蠻之賔王兮㑹諸侯之覲獻岠文宗而上徙兮扼荒􅞯之突踐居高屋以尊臨兮繞衆星而北面提四外於有截兮晅奉時之英見亶鴻仁之積洽兮熠光重而絫宣鱗百揆以具張兮轂皇極之中懸􅋾工僚其偁偁兮稟成憲而周旋惟張弛之殊科兮深㤖惑而眩悗殆愚固之莫憭兮縡有幾於攸先山臣銓草樹而牧麋鸐兮焉能覘其韋弦匪余位之所謀兮嘖奚煩於蕘言思沉潜而内求兮憺將歸乎故苑縶佚足於菅限兮㩱鴻芬於楛簡䀨萬夫之交鳴兮佩六編之神典探經邦之逺猶兮察庶政之竒變逮長古而周歴兮該千岐而綜練勴勵迹於㴞天兮抽幽緒於獨繭殫精誠於至思兮肩旡象而諧劵情􅀢以倐怳兮志強毅而逾練遄上升於至陽兮曮皇人之垂見發柲鑰以授余兮叕炙筠之𤣥篆吟㣲辭以啓悱兮歎樞栝之精雋忽不悟其所如兮屑儃佪而徯旦宓閉闗而函光兮幸韜聞而㓕見散神明於空靈兮泳皇冲而敖衍兼萬化於芒機兮統三極於一貫識天人之燮成兮假幽明之互賛寤道器之相咸兮歸有亡於亡辨嶃歴聖之繼天兮討千文而同鍵杲曜靈於永宵兮齊受法於皇旻承皇命者犧兮始拜受此𤣥文九穹無言不愛道兮勅地寶以龍呈栝五十而有五兮峙大道之靈根五相得而有合兮成變化以行鬼神觀穹文而祗理兮載取物與諸身爰立卦以生爻兮用四尚而成萬營居觀玩以既得兮動假筮以質成橐萬化以鼓舞兮漱千妙之幽源崇守位以財成兮纎出入之紜員洞生死於原返兮了情狀於游魂冒承燾以彌綸兮貫異同於千門逮農軒而顓嚳兮迭奉帝而詔人因龍鳥與草木兮依水火而風雲備物象以周世兮抪養本於生民代泰穹之何言兮晫神心於三墳司重黎於二正兮構貞厯之四分唐欽昊以授時兮宗厯象而三辰虞絜齊彼七政兮在璿璣而玉衡原欽明而被格兮址時雍於睦親粲重華之協帝兮終命位以升聞㳟垂裳以無為兮巍成功而莫名扈文命之神靈兮黙取道於清𤣥奠山河而再造兮相天地於成平帝重錫用𤣥範兮誥龍龜而眎敶舒九章以列對兮姒乃第之以類成遰殷周而密畀兮令箕武以載申掲建極之元則兮握天人之闗鉗援神器以設教兮假泰卜於歸連眷岐封以下鳯兮勅尼泗而來麟三聖演翼夫羲畫兮文王周公孔子旦䟽官而盡君周官亶羣經之自聖兮以時差而錯出孔完天以總聖兮萃整齊而立極道有本末而著㣲兮本㣲既其在易張末著以長世兮諗禮樂之為急誠修身以御家兮𢎞治平於邦國作人備乎儀文兮宣和興於樂律稽典疇而作榘兮耿二史之布策左右放墳丘之𦕈綿兮縱唐文而姬厯昞嘉謨與大猷兮心偕事而録實閎刪述以詔來兮立型模為永式體二篇以樹本兮用四典以示則二篇者易四典禮樂詩書張人綱以持世兮參成位而撰畢世惟遵而勿渝兮釂天心與聖職𡨕弗由以顛隮兮教乃廢而代汩聖何道而援若兮懣不位以敷徳掇侯史以衛經兮剏予奪而作格尹天明與王憲兮凖賞刑於霜筆三代絶而世變究兮六册具乃聖功訖理與事而偕著兮勸交懲焉縣植以為治以位天地兮違斯亂而乾坤熄孔既翦齊乎千牘兮攣綱要而綴集愾漢武之中興兮業躅孔而均績蒐獲僅於百篇兮訓終代而已給云理道其亡垠兮亦庸傷於多逸書枿缺落於完籍兮咨三簡之不没儀周小戴三禮何長息於逝者兮摩存緒而弗繹抒人情以合化兮亮聲詩之為特蕜忽亡以永昧兮聠天聰於瑱塞昄律天而襲地兮眰憲章而祖述此下還謂今五經維天地之為大兮代天言而不息䝉遑克以辭賛兮代奔走而靡斁迒作息而㣲顯兮咸由户而出入考羣聖之攸作兮罔非天而自隲縒顯㣲之㪉庸兮覆相質而弗忒普含生於兩間兮誰違天而已立感㣲賦之有聞兮懼白棼其髦習拊修辰而蹔寄兮矢乾乾以永訖臮千氏之攅叢兮助馳蹏而翔翼覽諸師之襲述兮披衆聖之膺臆苞鴻纎以條䟽兮丳衷表而協一遹㴑漢以游唐兮惠畀受以綿宻考靈奐示乎度躔兮瞍焉察夫天日被賢恩如面命兮等父仁而焉域咻後者之剽贅以沿兹兮吾將暴諸同心而未覿彼固自為至一兮謂精義之我集冺前修之夏業兮迹深扄而固匿何斯今之膚獵兮愗捐甲而逐乙熲高皇之垂誥兮酌交以而無僻詔士治經用古注䟽與某傳說云云羣生曷靡靡乎顛視以奔時兮敢背祖而妄執寘聖謨賢教於公擯兮趯胡悍而胡逆疇鳴閽以一􅂒兮攑千載之流溺嵗悠悠以隤頃兮洪章殆終乎聲㓕聖乘時以施化兮賢隨時而成謀諟憂樂以行違兮肆有用而亡求賤將五十而服政兮憮徃日之藏修辰其息而亡悶兮􅬢將放乎大游擁良謨以匵韞兮弁消揺以夷由揫千業於一函兮諒奚之而不優出遵宇而遵塗兮邁九躔以環流駿一日以千里兮快崇朝而九縣指河冀之上領兮􅵢嵩洛之中壂􅒺三五之更都兮應𤣥樞而流建則乾元之用九兮􅀈海㝢之疆甸大畫圻於方州兮細規土於井田烝哉先王之宅中兮憲井牧之攸便悼荒泯於周榘兮流一潰而亡返沈余慮以構植兮摭餘規於漢彦籍民品以有定兮括肥壤而制限定永業於口授兮分授薪以購羡縣百級以酌授兮人無食而不佃井田不可復請為均田盡地平賦三道立田制為三科毎科為三限五十等百級自五十畆至五千畆也凡一民不得過一科先過制者籍之禁毋得更市田以其羨為待分平易二法待分者分其羨於餘口及通籍凡官民無田及少者酌授之而嵗收其入之半為價償故主足則已或能頓償者聴自籍民品以至此言均田也析嬴田之南民兮易中原之隙衍每縮析而羨授兮足牛粒與舍广稽十秋而合貞兮廿有一而始斷平易者取其十則易償以中原西北隙土十有五并牛粒廬舍凢二十乃分其口令徃懇歴二十年而其稅足然後征其十一永不加益自析嬴至此言盡地也既均田而盡地兮乃平賦之有漸都一郡之税額兮總重輕之原版駕履畆以周旬兮核腴墝之實算各斟勺以損益兮為新條而升殿第融紐以少均兮總無減於舊貫既不縮夫邦計兮庶重負之㣲嘽自理郡及通藩兮究海内而普徧若明后之牧宇兮更審地而制典租必當於壤力兮居中正而永奠此言平賦天下賦半東南今賦特蘇郡極重民皆痛賦不當田又偏重縁以王制不敢易請融紐之如一郡之賦四重而六輕并為十分乃覈其田腴幾何瘠幾何隨以定賦損之益之以總足於舊制之十則不縮國資而賦無偏重又以是廣於他郡又廣於藩省以通於天下然少平爾不當地之輕重若能請上更隨土以定額始為中正以上三法具見祝子通此所陳乃其粗畧爾急東南之倚重兮最水利之難善偉高平之所列兮足紀綱夫羣辨范公劄吕中丞滌宣歙之上流兮百瀆之垔涮宣三江之故道兮堅圍垾之防堰癙白茒之海咽兮趡百川而呑嚥病雄潮之日至兮挾塗沙而壅填非時抉而嵗剔兮道奚出而不汧逖民勞而費穰兮役頻興而婁罥顧蘄疴以有瘳兮而却藥之瞑眩兹譚固諧理叶務兮又焉睹夫物狀之繁變盤盂之有稱兮道中卑而表淺謂呉地與江平其間田又有更下於外水者沮洳已膏腴兮欲夷之而且戀戀猶惜潮淀為田者亦利官民是亦一理然猶害多益少撤梁而斬荻兮揆亦非潦疴之專騐如撤長橋刈茭葑至欲廢呉江縣恐上流非盡縁此而阻若阻此獨病橋上田幾何許耳水既出橋雖少緩茭不全阻安得專尤之循諸貎以發救兮又豈一端之已辨救術獨統夫宣防之二歸兮在交施而各殉穰衆瘽以叢軀兮翳曷弗周詳而異按長河滔滔而東駛兮歘怒嘯而橫濫夏跡漠其非故兮洸亦不恒於一薦術固率彼其二歸兮亦與徙不超於三撰相時宜以各庸兮厥亦斯其樞楗􅂒征輸與兌漕兮擬重陳而歎倦征餫雖敝在隨時酌究此不詳既奠北都此不可易官歛民以藝賦兮傷哉冗或踰時踰禮謂名不正者慽牛毛於先王兮又安能一切而屏置率土殫供正之願兮誰將不恭以沽戾憾綿肌之殄瘏兮而剔刲以無已嗟五材之給世兮出與没宜相視彼濫耗而潜匱兮顧不與司存之計謂不經之費户部不得知之為行止傷財既莫由斯兮責求之而獨委傷財不全由養兵及土木等事必自有在版十稔而審易兮徭一霜而均制呬法良而情隱兮職競人以舉替業春陵而秋谷兮能錙察而銖諦切考心以仁公兮子殆少於偏蔽悃存用於智數兮神鉤察於聰慧拱黙化以望孚兮蔑兹途之攸貴齊民生生大校兮凡農商之歸二丁不足凖兮田亦多昧丁或少而雄多而弱昧言難的田多聲而鮮實兮商態錯於内外田有瘠肥稅復偏重商有肆華實薄或本假貸或閉户而盌箱或豐貨外行類惻賦與工之加患兮從或董之王吏征余駕而流觀兮覯懐生之遑遑明王厚下安宅兮類四族以為邦搴冠領於士儒兮曵尾禸於末商雖撙撙其異等兮貞萌萌之天良􅠟異世而殊道兮薦多門而分張繁胥徒之蝟蒸兮裂兵農而别行悵庸主之失馭兮魚不麗於王綱􅀈邦本之逾寡兮縱冗雜而日昌閔四窮之無告兮懥三游之陸梁棼汩蠧之旭旭兮䑕化虎而羊狼忮乖絶於人道兮曽何有於天常余蒿目而傍睨兮孰同淚之淋浪認同類之乳育兮寄食貨以為生古君王之子民兮廓一視而均情制生食與裒散兮撢羣柄而不頃自彼君之繆術兮務姑息而倒衡算工車以為利兮崇婦臺之懐清商交農而雙厲兮末顛本於不平悲歴國之臨財兮每剥下以踰贏賊哉安石之聚歛兮詭士術於王經謂周官蔑均田以建本兮僥垢源於流澂匹公姬於仲鞅兮企仁周於暴嬴侜后民曰均利兮實胥戕以互蘦歔既無克於迷復兮盍先取於無名走中原為治亂兮信珠玉之不脛持大道以生財兮晧千古之聖程憡氓斯之已悈兮日盝氣而涸精弗少拚以㕟齂兮任噊酋以無生彼多逐於商末兮呰拸之以豢兵或徒食於釋老兮武餼賚於來庭􅜚何有於二教兮肶頑冠與穢髠惟玉食而海富兮烏有尚夫並耕鉅創至濫以㝠輸兮時有在而靡懲所在見後慒疒孑之乞人兮彛有政於周矜𦕈窶甲之㣲限兮如來者之日増一是蓄之為養兮俾溝􅊤之不盈簡大夫少強力兮荓闗柝而牽征資官飱以免丐兮婦給衣以妻軍取丐不廢者什伍之代挽縴率婦可與人處者補戍妻以購貲半治衣衾半給之詳子通泪流莩之瘝積兮勿客視而庀營至即團以為户兮給廩飼以為恒移土邑以財輸兮吾特為之鼎鎗移文流莩本貫令以財來廩緌漸運以交抍兮一仁視而不病茍客者之過繁兮著吾廛為土氓懠汩治而戕天兮所鉅惟民螟攘哺嬰之㣲餐兮饁􅀢夫之已膯禽郊牲之肥腯兮餥羣逸之蒼鷹委精純於塗泥兮虹邦産於一甹㳫伾伾之蝮虺兮吾何舌以指稱此子通所謂汩蠧之民前言賦財二端故及所在即斯耳皇威無崇而必􅀢兮震乾剛之匉訇凜岳壓以霜殺兮烈鈇鏚之馮陵慄神令之赫迅兮驚歘電而轟霆薈冦賊而姦宄兮迨汩蠧之伯洶孰承天而法祖兮屠羣豕於一鋒瞴萑苻之日繁兮欲屏戢之焉從聖訓止於不欲兮賢獄市以屏容予其懲而猶異兮有殊初而同終矜狗䑕之偪餒兮怒獍梟之鞠㐫先釋苛於歛徭兮遂嚴致於搜窮毖宥過以刑故兮兹刑罰之為中坦大沛於潜竊兮劉姦殺之惡雄勿參差乃絶判兮皎氷凜而曦融省潢池之披猖兮舉兩初以為萌懇原情以審勢兮慎蔽法而即戎戢反側於招綏兮肩㐫渠於大䝉報怙虐以洪威兮與捐苖而芘螽須慎察而痛劖兮禆皇穹之仁公古王者之保邦兮作師旅於地水茹容民以畜衆兮田偕武而興制垂列國以交更兮之秦鞅而大戾后厥時以逾逺兮􅀈摫裂而為二醴頺波以下注兮寧能返乎涓澨謖譚計之諸諸兮僉傷養於大費亮先作之叵復兮棼後述以多貳怛熈寧之保甲兮校拓䟦而猶疐㣲因損益以張䂓兮亦善謀之亞䛋采材官於漢矩兮擥府兵於唐載韙長源之嘉尚兮擷稚圭之美議唐宋李韓二公重時募而精教兮乃要切之至最竊虞夫謫戍之永終兮拱甲令而文致法常隓於滋久兮即三五而須異異者改蠢匹夫之麗辟兮將不宥於十世遂至無窮豐廩養之長麋兮且望深而感細况懐土而迫窶兮由竄迸以川潰遂益之用核追兮煩鉤攝而部遞紛張官役徒以擾擾兮日馳驅於四海實惟益薄而損厚兮宜亦矢謨而請裁萬幾數求言以罷行兮曽不狂夫之為􅖄非犯忌而亂成兮謂効忠而襄治既未薦乎野謀兮敷公仁而從事軫鄉思而甲蟣兮懲抽力而誅賄完家室而固志兮周粟帛以強體時畨土以休容兮辟賂免之姦怠㧞私徭之長痗兮襄侵掊之積穢故雖小而必刑兮兵無伍而不次挽千漏於逸罘兮剔百門之宿滯力訓閲於徃圖兮帶財蒐於儒吏揆張皇之𢎞要兮知亡踰乎簡帥祖仁義以為質兮厥楨之以勇智律經籍之典訓兮研歴史之成敗厲瞿瞿之廉節兮仡矯矯之直氣勤步伐於苖獮兮豈臨機而尋藝推請論於司馬兮命畀簡於宸扆論必斷於援賕兮斥浮聲與柔葸耆授鉞而推轂兮勿叅之以弟子軍容何為徃監厠兮嗟乎李趙之階厲將携壹而僨克兮夫焉有於此係覈諏研於績敗兮畛賞罰之昭㫼彼屠降與殪良兮兼粥級之作偽偽多報級數毅戎昭而不弛兮飛蕭斧於誅刈母狥免於援議兮必姦絶而而良勵銷枉毁於貝錦兮破滔謗於珠苡熊虎毅其六師兮魚鶴輯其七萃務貌識而音别兮暋閑練而衷義㥄強足與宻代兮直寄命於童戱謂臨事募不精實茍用充數與私倩代行膢姦宄於中邦兮衛天險於荒裔林建國而所民兮䖍有整於職方藩周飭於隍陴兮垂堅宻於闗梁崇函夏以立道兮陗百代之大防訐天王之集統兮越歴古以包桑樊封昄之峻截兮戒勤逺之否藏頻迴譯於異貢兮只收誠於來王事見祖訓肎包羞以餽女兮焉自殘而割疆無歲賂之坐凋兮有互市之交償鑠皇代之神聖兮跨振古而無雙偉神祖之清漠兮恢王威而四張熯簡任於干城兮專權力於鷹揚弗牽肘於彼夫兮譴賧得而姦防為恤士之無實兮猶餔饑而搤吭䀠衡瞦以八燭兮迴浩刼而未央惄遐萌之繹繹兮附九埏之芒芒徂日用而莫已兮串出入以隨陽悹亂衆而治寡兮唈樂矩而憂長念蚩蚩之錯産兮不越兹以成邦愴美惡之必兼兮諶獨藉乎四良嘳兹良之自植兮䇐素履以獨守毎自彼以戕陵兮巋帝彛之固有相斯辰之攸頼兮秪俊髦而畯叟甿既􅓠夫不井兮睎三法之或救三法即井田盡地平賦尚稽實於征輸兮還㣲息於頻㱙恐二子之終夢兮虞和緩之懐手蔚大氣之紆蟠兮壬胚靈而降秀顥蒼惠錫夫后王兮君成之乎黌校詳養射於夏殷兮具司徒於周教帝首出以廣運兮幾新邦之綱要舍賢能而安藉兮投碩材其安構渡長江以整旅兮倚干戈而詢道築禮賢以館傑兮聘名悊而探討及鴻圖之懋建兮夙教士以有造漻辟雍之湯湯兮溥侯頖之浩浩範端嚴以恢緻兮思周㣲而懇到曰成賢以為期兮憶羅才而畢考藹思皇之濟濟兮聳周楨之廣效其在今之司存兮澌郵委而同眇眺儒堂而閴其兮凝沈沈之半沼籍束閣以停披兮琴絶絃而歇操填胄省之青衿兮日聚散而三造俾庠黌而率由兮亦胡辨於土偶之淫廟獨糜財以備聲兮疇蔀牖之為了漮法意於餼羊兮名將實而枘鑿崇術四而尤餘兮僅偏誦其邇小辨曾患乎先藝兮兹并藝而草草幸王國之克生兮士不乏於覆幬業毎樹於高遐兮履亦周乎末杪䯂騋牝而如雲兮夫奚失得於櫪皁嗟嗟吾黨之徒兮要賢聖以為期放四科而八行兮舉六藝而百家究學問以思辨兮劭仁行而寛居行成物以博濟兮巻善道而遯肥通天地人以稱儒兮賛化育於𤣥㣲國縣斯以求媾兮士執應而登之學由循以成士兮教率章以為師時與道有違行兮臺詎隨以推移咿蜎蝡以自細兮胡不輪冶而駔奚初既育乃后舉兮儴科條於隋唐務㧞萃於大公兮倍駿立其周防索理性於經術兮攷全畧於文章方政事之需試兮策時宜以多方為程寧弗良盡度兮逐有司而淑涼來薄海之彦異兮危尺罭之莫當予歴觸於禹穴兮胡鼓尤於鰷鱨余有貢舉議大㫖若此迅賢豪之絶羣兮挺堂堂之賛皇麾時科而弗即兮喻龍媒之越行洵覂駕之不種兮聳萬夫之攸望鄙負羞於大人兮空趾壯而心長進而逡而前郤兮澹胡為乎皇皇矚時髦之升庸兮燿勲華而頡頑霜蹄之超驤兮徯何有於王良羅目千以得一兮先民所為悲傷羅以多目故一目得禽今為一目羅則安得士本古語王通亦稱之睿謨固經於神運兮勿拘梏於尋常彚小大以兼收兮悉側陋而明揚廥百材於塲師兮共京構於明堂掄棁楔以畢良兮粹豈獨於柱梁以周完而大壯兮㢋備具而豈康害超等以異懸兮擢萬羽之孤凰或科存而弗舉兮徒惋遺於衆芳為國惜才何人斯兮謨罄畢於鴛鴦鱗甲乙於一班兮可百年之短長何斯據以卒躬兮信輊軒而弛張上既馮以升沉兮下亦自為摧抗坐弊日以淪胥兮叢倖望而縈妨望怨也尋世科之有無兮與第差之低昻鑒才出之先後兮及巻舒之靜庸孰失得以饒不足兮孰隆汙之存亡隆汙謂美劣存亡猶有無也爾其鋪觀而平角兮成效不其已彰繚庶位之崇卑兮環中外而周設尸修政以立事兮並陳力而就列今視昔以異宜兮沿與易而殊節祖建典以官士兮掄時宜而章别多率舊以監成兮掖無期之皇業劼兼山之止位兮臣何知而嘖喋想拱職以綢繆兮熈庶績以咸凝唐虞和於朝兮賡元首而股肱昔秦人之憍亢兮儕百辟於倌伻後秦胥以沿洄兮且肅體而諧情貌隆坐接兮呼莊君卿塗黄還命塗勅繳詞頭兮席前目征目送崇庳必詞兮揚抑告行皇王建設兮簡要以殷中譆守官而罔道兮愚深眯於兹評王用道以命官兮官將道而為命䝉夫昧體而守支兮直置道以狥名逾追勢以滋顛兮偭疈坼而拒撑交隔盭以無通兮不相謀以相能臣殊僚而一政兮肢連體而析形咸左趾以將東兮引右夅而西脛各稱官而罔道兮烏不病殘以殞生宰萃士而一命兮粗因科而下上既蒞政以稽績兮復何初以為量年疇力於良庸兮才奚由於耆壯木不谷栠而郊韡兮材將鳴寃於族匠非祖宗之盛心兮䠞後時之膠狀假三五㨀斯方以舉錯兮當亦迷八四之直枉八凱四㓙何莫峻登其異傑兮年序以餞夫尋丈儇筆工以醫傭兮濁銅駔而榖養汙王章以螘縁兮誨邪陵而貞障猥膏紈之流䕃兮偉漢疏之直諒王吉請除任子法縱故襲之未革兮又何弗涯於漭沆凡斯亦不局之貴兮非清波之都喪非盡無清流也聲復侵夫無擇而無止兮益皇涂之泱聞方人之不暇兮識野求之無讓將循位以求理兮匪稱人為標榜㮣焉名襲而任别兮姑試徵二三之改尚公孤寵貴以年登兮未或倚其燮亮用為九卿資深之寵寄甄鎔於中相兮獨調衆而拯病天曹天下之才庾兮無暇遺而倖誷懸鴻鑑以八照兮能薄號之故妄惎邦本艱固而易蹷兮盱司徒之斯仗黨耗國之職思兮拱三緘而不創懲創非䏁䏄於竭澤兮哀株守以循罔祖議禮以作制兮綱維誕其貞廣豈科條之無俟兮虛百年而亡訪僤哉今之為政兮執邦刑以不爽􅉃死法不死情兮殱十九之國命抗儒抑法誰為異家兮腐生迷而弗講豈三尺難求於六籍兮對刻木而惝怳世生才以為士兮才弼辟以親民顯利用以成務兮幽履道以媞身靜庸兼維天之命兮士也允三才之珍偏有才而善用兮聊銷慚於宦塵守罷駑或不肖兮世何罹而尊親彼斗筲仕以為已兮用以學而為人已富寵人求知民何仗以為長兮后何藉而為臣嚱予固艱夫谹議以畢偁兮亦􅀈此不尊而弗諒忥心亨而道塞兮旦綿綿而斯徃庖人不越乎尊俎兮陶師握其范模作者慹其亡為兮藏山澤而為癯余懐靡得於斯兮求兹人以為徒去城郭之垢氛兮嫁岩谷之鬱紆漫陁靡以豁廓兮蒨芊綿而周遮岑崟嶔而譎鬼兮流滮􅀈以趨瀦儔㕙麚而騰伏兮連庚乙而几几絢時榮以繪繡兮戞鶴􅎜之笙竽閴無人乎崖竇兮鞫幽求而單居末寢食於皇區兮安平康而樂分綴聲籍於士舉兮足瀕申而猶遯懐君恩以無酧兮慚魯子之葵悶抽長沙之太息兮夢宣室之宵問敷前聞於沈臆兮嘏婉約而莫盡功必一於天人兮理不隔於顯隱通千期以一契兮右皇靈於無冺奭明王之天造兮蒞日中之豐運塞王猷以登咸兮丕重堯而襲舜學無恥於不榖兮尚席珍而玉韞若木不示乎世標兮神鳯無諧於塵韻天錦莫覔其機杼兮媵三籟而㣲引先素王之昭誨兮盖二方以容世謂初道而繼齊兮有政刑而徳禮上焉恥且格兮亞且免而無恥明良誕務其至兮烝率次以佌佌并殄㱪以誖捐兮􅐃人洼而時否政刑洵異夫今古兮緒言無庸以究齒徳如毛而鮮舉兮禮司存其議擬俶鴻濛之已渙兮佑作聖以君鄙大人後天而奉時兮惇五典以為紀搤三百以為經兮􅀈三千而曲致摯元功於賛化兮全備體於唾涕措萬品之手足兮秩其紛而壹貳衆高沈而彊燮兮參音森嵒砥而柴虒竇一抉而橫趨兮倐滔天而洸潰非因情以植則兮溘焉一而焉濟唏失徳而信薄兮忍謝嘅於周史荒哉厖訏逷乎標枝之不還兮將非禮而奚以禮陰作與生俱兮樂陽來而儼啓聲容達而生神兮體音澌而死鬼肆犧媧迨姚姒兮極陰陽之文理裁衣裳以吹匏竹兮熈殊造而均㫖柯出梯以為華兮毛傅皮而成美奏至治於雲池兮盡物性於宫徵遾盛皇之厭世兮寓大柄於遞位雜狡童與昬夫兮隤王彛於裘委姡何别於芻靈兮冠􅅂具而亡裏維禮綱於五端兮吉無先乎郊類莽欺天而侮聖兮軾輩申以傅㑹唐既蕪以並配兮宋逾淫於赦賚設有妄於祠衣兮位有汩於祧祪以上言前代郊廟之誤家庸行而不知兮曽無違之能幾猥趙氏武靈與北代拓䟦魏高齊宇文周洊變通於遐裔底䝉古之寖熾兮羌增廓於九圍非穹皇之命聖兮疇能擅此勇智祖一匡以再造兮駕百王而絶儷篤父子以孝慈兮協周文之敬止董百官以為朝兮截冠舄於首址肅大别於掖壼兮斬收承之顛穢冏前星之繼明兮郁青坊於繼體羅九服以樹屏兮藩不億之其麗釐羣神之淫號兮叙百辟之規第推文質以四達兮布方策而漸被葢郊廟之大儀兮時乃定於睿志馮三重而建制兮曰非君其不議倘時命以下詢兮嚴丘澤而敬事象雷豫以張樂兮薦祖考而配帝侂權輿以成徳兮善武周之斯徯昌期而隋愒兮抑將順之能怠較民用於兹辰兮纔一合而百戾胥濫越以敗矩兮淪逐欲而鄰戲誺輕重之不權兮􅀈僣陋以交昧委筋力於無情兮擿貨財於空棄儼衣冠以臨莊兮况大君之斯侍端章甫如會同兮可非喪而去佩詎公廷之為燕兮䙝長裘而蒞視噫人服之不衷兮􅀢孽孽於卉毳玩好奇之盈冠兮惡衣妖之怪忌殽室舍以什皿兮等衆歎於一蔽余既未聘乎上國兮望王懸而不耳過閭陌而或聆兮閧緇黃而倡伎亂一雅以萬鄭兮喿四戎而錯厠日作息以震驚兮駭律吕之焉寄嗌六合以恒瘖兮䁎九陔而悉瞶八門張而何風兮四時行而何氣雅烏噪於晝日兮鸑鷟翥而不睨頠穹輿之定位兮磤風雷之鼓吹廡草木以有條兮噰䖵蟲之吟唳僑仲佐伯以尊王兮使其民而有義臣何望於今堯兮不觀興於兹禩王乘龍以中立兮治六有於鑪􅀈根人綱而植初兮落有家以俶載簡姬姜之世貴兮愛任姒之徽嗣逑闗雎之窕窈兮論鐘鼓而樂只貽銑鍰以前却兮暢迭御於朓朏親郊禖以降乙兮儀姜嫄而茀子擇周宗之妊傅兮拜后䕫而教肄宻緝熈於光明兮斮刁牙之侵嬖扞千邪而勿接兮賦萬幾而厯試太祖故事隆親親於九族兮剏章條而登殺鏡前塵而邁㧞兮羞田恒之惏纇􅀈實産以𨽻國兮嵗坐觀其銍艾保堯睦於不竦兮供虞接於無匱弸支蕃而土限兮司存寧能以無槩維天王廟世以七兮實殷周之𢎞制茫皇古之靡究兮二代亦復宗異上古未審夏五宗商六宗然七世之文本商書如姬周之二室兮固不祧而非次文武二世室不祧其後王時七世固在二室之外二室非七數别太祖以特立兮三昭穆以對蒞乃一祖而二宗兮與四親而共備迨後王之復宗兮猶文武之不替迺七世以為恒兮確古今之通誼於皇明之握符兮羕天涯而地際􅙬既廟於有七兮那千萬而莫計皇高文之巍巍兮擥百世之永繼丕承烈於歴葉兮列諸宗而裸餟撫大典以徐謨兮意冲襟之不易纉昭穆以無紊兮乃傳世之常系或頡頏而高卑兮儀馮從以位置匪今晨之攸聞兮法周知以為貴曩聖祖之丕訓兮定儒臣之請褅御史達魯特與權請立禘祭上命儒臣議議者以始祖所出未明而寢矎趙氏之禘祖兮亦時棼於僖藝侯王儀之不襲兮曷由疑而永廢當肇統而慎始兮固宜存而不遂始謂始祖所出累重光以欽承兮將神靈之有俟盍懋建於崇典兮偁宏義而時起高帝時固宜存疑未立今七廟已備已立禘祫以義起高帝正東向之位又今位與古昭穆亦異地時正而道合兮從心究於内外罊孝順而諲潔兮悃皇彛之極至洎儀章與物數兮比聲詩而容綴載采采於羣神兮莫不審於享祀開明堂以嚴父兮汗大號以施治隆法宫之九成兮翼前朝而後市晝三接於康侯兮旦五徹於弼士請舉祖宗日三朝故事更叔孫之蕝貌兮整鉤陳之法衛幄明王之采章兮柬鹵蹕於羣代被黃虞之法服兮禕日火於繡㑹貞輿旂而籩簋兮盡生用之百器蒐古今以分宜兮區雅俗之殊裁革淫巧之哤靡兮絶羌戎之陋悖后模臣以逮民兮宫刑廷而御海王有三以寡過兮果風草之相逮常經總乎嘉吉兮與賔軍而喪祭周上下以用施兮惟日見之為帛爛揖讓於交際兮彧𤣥黃而牢醴纚目縷以條支兮陳更僕其焉既雖殊王之更轍兮儒亦紛其輈轊㧬徃辟之故秩兮窈三典之略在儀周戴氏三禮辭有單而已蔽兮道有一而知二迪在者以推施兮僅含氣而亡愧徽列君之有作兮荷羣政之勤惠諦繩矩於銖權兮研節度於旒繫覔迷途於擿埴兮興證辨於張蝟署根枝以交參兮部優劣而互採鑠開元暨君卿兮亦司馬而無晦頫今昔而時措兮斯數家之為懿按三經以疏繪兮又莫茂於先輩前後議禮作述者浩不可數互相得失得之多宜於今者大帥開元禮杜氏通典及司馬光高閎朱熹數氏其為三禮注疏若圖譜如馬融三鄭偉昭王肅虞翻張融賈公彦孔穎達聶崇義陸佃等皆經師啓述之功尤大先輩謂此煥堯文於神祖兮大集成而班賜茁楨柢於恒性兮順條柯於日履申邦教之森矈兮補未充之俴細鋪遐邇以折裁兮要覸時以為揆剗昬狂之僣濫兮俌眇忽之不暨匡以居正之名兮章以昭明之軌來九苞以均係兮誃相䑕之遄死遵王度於截防兮允蒲盧之可企觀天文以察時兮賁順叙而貞明昊穹牽而西股兮儀娥錯以東行訂俱右之臆談兮淵鑒破乎迂㝠太祖詔改朱熹日月俱左行之說檢班陳之分土兮何壤局而霄𢎞班固陳卓星士之說天大地小不為允審嘗有貳於分星兮亦未究其諦精夏曷不中近天心兮三隅偏濶而空宏經舍輹以環轂兮二十有八而咸趨中謂地雖曠而邉逺兮分厠占於䂓零豈理果能御器兮器乃因理而不通測遲留於伏逆兮校容留與無名綜天官於靈顯兮冏休咎之分徵珠璧信其有期兮同上下而清平氣多符而罕戾兮翼儆修之有行天文祥異應不應者以氣理事人四者參錯不齊非可以類必膠師執用類索不視三端不應正宜爾乘除消息又本各不一如日月五緯合聚以算本有常期期届是氣之元亨世當常治斯自然之符或世不應氣此他戾也故王者當儆心修其行以應氣耳矧氣否以變沴兮漠不省其遑寧暟厯代之悊臣兮遝治歴以齊政遡都閎而下之兮孔難剸於一定監徃故而聿造兮大統於斯而為令彚羣造以折衷兮改月令以守敬免久紐之必譌兮徵良師以時訂曩授時之可採兮祀四十而已病元用授時法上尋千載不繆而下以推來纔四十年已差一度嚴緹室以候氣兮莊脩表以測景於製律以治物兮鍾一正而萬應既禮達而政修兮馴刑清而世康愷人蕃而物條兮曼至和以充盈王中正以居心兮氣驩通於蒼黃玉燭炘熹乎泰宇兮員嘉來而八風平禔仁浹而功振兮鳥没世而不忘騰風詩以交宣兮鏗作樂而薦享本吹筩以造律兮擢五要以為綱劉歆奏備數和聲審度嘉量權衡五者五者為樂之要衆言不齊不復能易此緒審黍以立管兮正九寸之黄鐘各三分以損益兮於相生以旋宫均七始以為調兮八十四而成章間者濶焉䕫曠之無作兮術布策而炳明三禮國語吕覽漢隋史𣺌杜荀之神解兮代已希而非亡京房杜䕫荀朂阮咸萬寶常張文收輩讙述者之悟諝兮議驤烟以誩攘自漢以來張光嚴宣錢樂之祖瑩梁武帝信都芳陳仲儒鄭譯蘇祗婆祖孝孫王朴和峴竇儀阮逸胡瑗劉几房庶范鎮司馬光沈括蔡元定等尤難偏舉如何妥牛𢎞軰無可言至魏漢津蔡京等益繆爾遴執隨而成渝兮非數詞之已彰肇和聲以製器兮倚度曲而綴行摘窈𦕈於純和兮援絲宻於腐常衎歆神而賔徳兮戡哇鄭之猥厖彼金元之系統兮聲後國而猶荒沸俗躁而胡疾兮且將裁而未遑躁令人輕輕則多犯疾急也急令人憍憍則多畔唍斯音之么末兮爾猶昧其條章今北曲出金元固非雅製十七宫調今但十一而律又過高全失中和病本由絲音肉音囅杭歌其何響兮鬼啼嘯於晝梁謂今所謂戲文南曲本出南宋温州全無絲髪可成音律畧不足接耳目鏜吾聲之有作兮融噍殺而鏗鏘頌皇烈於神明兮適今時之豫昌假令今製樂大畧律宜大下於今俗倍而㣲高於古律縁古者氣大和今氣大戾更化之若從大戾驟返大和亦恐未遽得或漸次徐變俟少久人與天地氣應乃更歸純古可爾延鴻碩以倡構兮逝効工於更張即二代金元之俗譜兮鑄昌詞以雄莊給比閭之小奏兮嫴備部於下堂猗帝徳之夏殷兮般穆穆而鍠鍠誕光天之下兮至海隅之蒼生吊幽明以效答兮郃六幕而同風遐休嘉之弗呈兮抑𤣥文之或爽五曜潤於乾垣兮五財理於坤軫河岳位而澂靜兮四類效其靈命萬祗嚴以衛釐兮䰡鬽伏而不眚民於變以時雍兮同虞方而風動蓐王區之棫樸兮天命生於熙朝皇契道以盡受兮非行違之異標器必藴於徵庸兮志須亢於沖遼愚幸賦此𤣥𤣥兮愕夫人之它操潛兹未之或悶兮令達又胡以宣驕已焉哉俗以勢而成世兮勢以時而自然淈時勢以太順兮存兹道以為楗森三端而翕張兮亘宇宙而推遷仰惠啣生於黔雷兮肯棄受於崇圜飛元靈於泰虛兮收萬實於甫田控太乙以貫之兮艐有無於齊詮撫羣有於日用兮秉神根之淵淵羡諸子之敏修兮㗊交通而互全兆流歸而皆海兮億管瞰而均天㣲無拂於風鳥兮碎或攝於筳篿躡太乙於九宫兮丙離章於太𤣥機條條於木獸兮數斤斤於銅丸灼莘降之非異兮易菽兵之戔戔上四事謂諸葛公木牛馬張平子地動儀神降莘郭景純事舉四以例餘抱鴻通以欵塞兮疾細滯而浮漫悉蟲沙而願遂兮當貅猰而不戁惟無欺與至慈兮所不負於高旻坦詔鬼而交神兮直衣􅛚而踐川譩凡夫之妄顛兮北二子以睽分謂殊儒而端異兮繆世教而為三昔柱下用表而存中兮師友於我文宣竺尊儲性道之本兮其何事於嚚讕千門萬室横六内兮朝蜚波而夕烟卬既尚此皇符兮炬百幽於一焱戚城隍之湫仄兮赦羣蟲之所廬解故蹝於黟垢兮翺洪翼於蒼墟櫋修雲以為輈兮結浩氣以為輿並三辰以循紀兮極八遐而同區晙晞髪於若榑兮夕留軿乎融都蓐收道以前轅兮誥𤣥㝠使迎余召飛廉以興飈兮翬屏翳而滌塗氛侵伏而淑朗兮恣余襟之所如玩羣生之起滅兮觀兩儀之渙儲朋山河以結解兮賔曜宿而盈虛銜紫皇之黙詔兮偕金女而同趨統父母於元氣兮或天神而一衢問日月其何紀兮咍死生而焉殊真一性以長覺兮去六凡而不居大哉余游奚適而奚來兮㗨焉徃而不歸與明文海巻二十六謹案巻二十六第二十九頁前一行逹魯特舊作答禄今改
