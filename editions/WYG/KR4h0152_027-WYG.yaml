body:
  text: 明文海巻二十七餘姚黄宗羲編賦二十七人事一午夜讀書賦有序商輅古人有言夜者日之餘也計朞之日三百六十兼之以夜而日倍之則功亦倍之矣矧日冗而分功反居夜之半夜静而一業可當日之全故善讀書者日不足每繼之以夜焉作夜讀賦繄惟志士之征邁兮廼篝燈熒而夜讀爰發亡書之三篋兮益羡張安世之目用宏夙儲於五車兮欲如邊孝先之腹惟時羣囂屏而宴息兮將余棼拏之已就肅但瞻户外之三星兮止聞天邊之一鶩燒寳鼎氤氲之若雯兮剔銀缸清瑩之如浴叠廣文青氊之半榻兮下馬融絳帳於髙束酌春茗之蓓蕾兮嚥晚糜以苜蓿下應氏之五行兮披鄴侯之萬軸訝皮編之敝於欲斷兮何牙籖之新而不觸隨開洛誦之殷殷兮不輟伊吾之謖謖幸分江上處女之餘明兮思耿耿而若毣音木陽氣時滿乎大宅兮烱烱雙眸而逾矚惟熠燿之宵行兮又覩望舒之餘於缺屋况蛩聲啾啾於四壁兮若助予呻吟之碌碌時齁齁鼾睡在予之臥側兮輙不容而詈僕披夕秀固無間於帖席兮然猶每借儆於圓木即旦日篇什之已陳兮中宵無妨乎更熟不嫌引錐以自刺兮光雖竭而更丐隣之壁煜矧復中壘之抽𤣥兮老人之藜輝可續茍達人真覺之自來兮即廢膏油而問心之亦足縮萬彚之華於眉端兮抉千古之秘於衷曲我思古人之矻矻窮年兮夜黽勉固無分乎寒燠春罷犁而課經兮夏囊螢而代燭秋聴聲而下睫兮冬映雪以三復抑聞焚膏以繼晷兮用成韓公之宏蓄爰有聞雞而起舞兮誰步祖生之芳躅對𤣥雞於處宗兮吐白鳯於天禄何素王之足弛兮仍不寢而自朂雖元聖而未寧兮每坐待以式榖嗚呼予誠有惜於寸隂兮何暇就安於枕褥將就賦有序桑悅江右之龍泉令池陽張君大信政學俱優於人以將就自號葢熟於處世者也予為之作將就賦詞曰惟造化之茫茫兮允福謙而禍盈地東南缺兮天西北傾見世事不可滿意只得將就譬彼築室兮留三瓦之不成大厦既成缺其三瓦見史記惟茍合而茍完兮來宣尼之渥稱麤布勝兮無裳得隴絶乎望蜀鳥有兩頭外國有並命鳥兩頭争食蚿惟一足見莊子食覺蹇連行深躑躅躑躅兮徐致逺將就而行蹇連兮徐充腹將就而食善乎張華之賦鷦鷯曰鷦鷯棲於蚊睫大鵬彌於天隅將上方不足而下比有餘茂先所賦正將就之意吾仰天隅之公卿俯蚊睫之羣黎月俸雖薄足以樂飢公宇雖陋足以棲遲將就得過矣知足常足得過且過將就之實風帆易傾雲翼易墮不將就之戒虚中者獲祉飾表者賈禍吾將漸造不營之域無為之城到此地位將就熟矣微風亦凉片月猶明優哉優哉聊畢平生得將就之樂悶賦張治道愀然而生者愁也怵然而涕者悲也嗟余心之悶兮匪愁匪悲發於心志淪於骨肌歛狂褫豪奪强返糜聦不能測神不能知懵然如愚憨然如癡神傗佩而不伸氣㰰㰨而難排叶肇於一心攅在兩眉似求弗得如合將離疲精兮垂首困智兮罔思出門户而含恤入房廊而靡之縱茹脆而策肥終含嗟而不怡混五情而愺恅雜萬慮而鞿覊耳不能聞目不能視莫究端倪罔知終始役心令氣少㤗多否侘際惘􅐞怐愗佁儗獨有於我何分於彼將抑之而反亢欲斂之而彌侈與愁思而駓騃將惝怳而迤邐尼父困於匡國文王囚於羑里情思之而可同氣餒焉而相比若乃開華筵以速賔雜衆樂而兼舉燈煌煌而在室鼓嘈嘈而弗止聽豪客之飛談若蚊虫之過耳情怔怦而不安心悢恍而轉委或隠几而冥思或返神而内顧欲浩唱而未能徒瞀忳以自忤心如灰而不死情如適而未遇天地瞥乎風沙日月慘其煙霧惚恫憛悇絓結愠惀注黄流於玉斚發清詞於絳唇口欲醊而不入耳欲聽而不聞遺百年之富貴失一時之冬春窺人間之萬類若梁上之飄塵何笙竽之能樂返簫管之増愠若夫却於春夏熾於冬秋雲晨霧夕邃館重樓商風振木積雨飄林哀蛩送響落月在砧余乃攅眉捧心褁被擁衾心煩意亂兮似醉編愁緝苦兮如眠叶目收視而自省耳返聽而内聆思怳恍而彌結心俺仃而如酲與娛樂而不穆處寂寞而不争守一途而無他抱耿耿而在中叶思紆鬱而靡放情俇俇而如驚似䫖䫴而莫競何瞟􅕉之能精若乃登髙山以騁望厯崇岡而放神思蹇産而靡悦心鬱悒而不伸煙霞明㓕而罔見虎豹悲鳴而不嗔坐危石兮意漫漫眺逺林兮心悠悠採幽蘭兮迷空谷折瑶草兮失崑丘惆悵徘徊踟蹰淹留乗紫鸞兮望九闗駕八龍兮遊十洲洲島不可以遽上兮突然思之生繁憂重曰造化無情兮隂陽平日月罔晦兮萬類生天地無悶兮嵗功成何不屈其情與造化而偕行止漁賦趙樞生繄東南川流之浸大海朝夕之池三江茹納百瀆緫輸萬品彚育庶族潛滋鯤鵬變化鯨鯢走趨何珍不萃何怪不儲爾乃沿江介控水滸鍾澤國障陂渚有浦有潭有堰有漊皆滄溟之遺潤亦江湖之委聚似星宿之發源作羣流之窪滙湜湜其流沄沄其沚茭蘆列而蔽虧葭菼蔓而軒翥篠簜紛敷蘋萍萃止漁人泛宅舟師浮寓網釣每生絲綸是理爰有濵河之夫傍海之子昉蓮葉之輕舠窮衆川之源委張巨維以作綱析衆目以振紀浮片木而排筌沉寸鐵而繫趾將釣巨鰲於茫洋運吞舟於鈎餌也於是主人諏日送徒循流矢魚盪雙槳之如蘭放一葦之若鳬初投石以震潛旋扣舷而讋愚時則秋鱸屬思冰鯉告獲魴美周南鮒標羲易曰􅀈曰鮎維鱖維􅠧鱉蟕鰍鰻巨鼇蟛􅒹異狀竒名不可殫悉並育種於深淵盡罣體於罾繳爾其黙駭潛驚飛攅浪擲軼紘迅逝抉綆遐逸觸湛綸而躍輕軀中芳餌而藏詭跡曩騰踏於風雲竟噞喁於滓汩星罶無以匿形蹄涔安所寧宅合九罭而誰何布四維而莫釋裂鬐鎩鱗暴鰓折翼噴沫流津嘘涎屏息始張眸而潑刺遂掉尾而翕擑陳尸臚板之中列籍陂塘之側朱殷草萊鮏濺阡陌汗液淋漓脂膏絡繹毒遍海隅怨盈天澤昆蟲䘮氣鱗介奪魄釡鬵需晷刻之期枯肆覬斗升之活信先王所隠悼而仁人所憫惜宜虞衡絶數罟之投川澤禁罦罿之入解四面戒三驅斷連紘屏羣罝却䱷師而不用謝舟鮫而無為鸞刀自敝珍鱠何施澹澄潭之如鏡囿萬類於安棲風波不起宇宙寧夷庶窮魚之咸若示大造之無私愍惑賦有序汪必東汪子讀書雋溪之南見鄉人鳴積善者往往外儒術崇異教垂老畏死咸作道佛事曰貯㝠財以資鬼用奔奔焉波波焉勞百念罄百材而為之而不知其惑於二氏之厚誑思欲化而力莫之勝也作近賦以愍之其詞曰蠢蠢我民曷時有靈一教棄正二惑蠱明崇佛信道謀死於生䜟經表籙夸毗善聲方其一念詖邪百計紛奢運薪采木貨豆易麻料菜理果釀酒焙茶黍粱布帛筆札丹砂下及器具靡不羅爬逮夫緇黄至止華采嚴莊祥旙逺樹諭榜髙張鑿楮為錢編竹為箱錠以金銀繪以衣裳羽羽焉鱗鱗焉青紅黛白費不知其幾千萬張於是鋪陳怪象羅列堂廊恍臨𤣥帝儼見竺王焚香裊裊列炬煌煌奏鐃鼓之法樂開傀儡之戱塲鬨謎談於上界羅禮拜於下方駭比隣之耳目走男女之交相爰鐘鳴而鼎食或三嘵而七光侈外觀之虚美而内醜之或戕忍百日之經營付一火之災殃并數年之蓄積傾二氏之槖囊彼終迷而不悟反得意以揚揚謂寄泉貨於㝠府謂布福果於幻方謂錢神死可以資食謂紙灰死可以禆裳不知百物經火與塵土而飄忽人生葢棺等大化之𣺌茫何形跡兮可覔何方所兮可藏況乎死生人鬼理互隂陽人既託財於鬼主鬼必通貨於人皇夫何人之寄鬼者紛紛籍籍或百篢而千箱而鬼之遺人者寥寥落落卒不見其一簍而一筐悲乎愚哉民之惑也官有常征弗督弗完親有常養弗力弗歡酬師一縷忍弗能􅂸祀先一簋長揖敬闌孤貧百丐嘑噈色難二氏何功而好且貪悲乎愚哉民之惑也談常則厭語怪則喜借曰有之爾盍為人謀人為鬼謀鬼且以爾之羡餘赴君急難隆親甘㫖殷祀祖宗義訓子孫周爾族屬濟爾隣里宴爾親朋樂爾生理待其既斃然後與爾無形影者謀無聲臭者處而乃勞勞焉假生以濟死雖貧乏而效尤雖䘮富而不悔也耶嗚呼孔孟之派寢微楊墨之火滋熾覩習俗之猖狂感盛衰之相襲讀昌黎之遺言増志士之長息逋歸賦有序張文宿竊謂御詭則禽獲釣直則魚沉冰凍則龍潜煙煴則鶴避是以公輸不以木曲而改繩伯牙不以聽稀而易操也古今之歸者多矣如尼父之歸與淵明之歸來二疏之乞歸沈約之求歸二張之同歸逮今空同子則曰宣歸仲黙氏則曰述歸歸雖不同其志一也余學易者况才拙而位卑力孤而性直勢不得不逋也故作逋歸賦以辯隠顯之跡以叙得失之由以定從違之志俾天下後世知余之所以歸者非敢僣附於驥尾也辭曰念余髫之甫童兮奉先志以自研荷成均之鎔淬兮仰英軌於昔賢唯性魯而寡儔兮獨日夕以乾乾及銖累而寸積兮頗繩貫而局連望天衢以上征兮世以文而為梯茍機會之適來兮普龍徳而博施忌時命之坎􅇄兮屢升髙而逢危惕年嵗之將邁兮姑小試於割雞雖列土以附庸兮責實重而易隳余既承此遐命兮懼薄劣之不支躡清源之屹崪兮樹叢箐而石巉何虦猫之負其隅兮又訓狐之嘷其巔風飈飈而熨人兮雲黯黯而蔽天承瘴海之毒流兮黄霧噴而觸顔唯側躬以服勵兮心兢兢而靡寧值世維之反覆兮咸好濁而惡清既爬弊而剔蠱兮期邦猷之允升何民俗之獷猂兮多棄禮而尚争攢霜㦸於塵胃兮每下虐而上凌故持辟之或矯兮夫豈余之初情况羣朋之罔恕兮動號族而結侣冒堯冕與舜裳兮藴侏儒之僂窶余固非騰空之驊騮兮亦入器之鼱鼩何纎銖之未慊兮輙攘臂而詬語余既負此啟介兮唯持正而不阿寧竽瑟之相反兮胡薫蕕之可和若黨人之叢毁兮荃不察而同訛遽信以為不慈兮反疑璧之有瑕測籧篨之孔壬兮挾左道以為戈使藻鑑之獨精兮安能被其媕娿視繁星之薄掩兮顧予心庸何傷唯指鳯以為鵬兮誠有欺乎盛明欲仰天以自白兮又無良媒在傍將竄節以求樹兮恐失身於否臧或孤進以謻直兮徒激怒而増殃設􅀈􅼱以茍延兮何忍為此蠅營與其逐鳬雁以唼藻兮曷若效蚯蚓之歂塵嘉蕙草之不汚兮以其别衆類而獨芬遇濁世而榮寵兮固非余之夙心雖見斥而窮處兮屈吾蠖而勿信賈生以獨立而被謫兮叔子以羣惡而䝉難魯連燭先幾而長辭兮仲舒憤不遇而興嘆考淑人於先世兮多受䜛而逺竄何申生之沉江兮彼捐育於狂瀾余誠拙而寡謀兮亦數之所遭絜龍劒以遐逝兮旋余轡於蘭臯揖九鯉之靈貺兮駕三山之吻濤越七閩之襟喉兮跨二君之虹橋陟仙霞之崇關兮當四鎮之所交指會稽以西邁兮望故都而逍遥選湖山之竒勝兮簡元辰而築居伐辛桂以為棟兮挽澄波而濯衣探孤山之梅鶴兮招白雲以共怡采瓊枝以為珮兮雜幽蘭與芳蘺截洪竿以垂釣兮據𤣥洲之奥區趨孤趽於物表兮豈嫉妬能障之省余躬之既遯兮雖幽屏而不窮環仁義以為域兮列道徳以為墉闢𤣥牝以為户兮建太極以為宫驅豐隆與椎革兮役蓐收以扣鏞舞霞袖於馮夷兮竪雲旂於蒼龍布勾芒使值春兮命𤣥㝠以司冬奔左右於玉臺兮坐上帝於其中運四晴之變化兮察性命之始終擴仁孝以事天兮總萬物而帡幪承慈顔於萱闈兮伺桑榆之寸隙苑千古之鴻裁兮復游心於羣籍抽黄神之遐緒兮索莊老之𤣥極檢周秦之遺編兮標漢魏之竒袠纈唐晉之芳葩兮浣梁陳之陋習尊六經以為祖兮叙百家於杪席顧謭才烏足以與此兮亦當策蹇而追逸倘微名之可成兮庶前美之能匹慕古人之浩曠兮寧偪側於一丘肆愽觀於坱北兮延歴覽以滛游揮青霓以騬乗兮呼白黿以負舟召飛亷使前導兮問直符之所由朝發軔於煬谷兮夕返駕於西甌跨九野而超八延兮遵五嶽與十洲指余節而南征兮令青童以為媒候松喬於仙掌兮跪華㠋之崔嵬邀彭期於海上兮抗瓊館以洪厓訪傿禄之故居兮濟長江而涉巨淮淬靈波以拾瑶草兮渡弱水而窺蓬萊忽臨風而興愴兮激玩湘之湍瀬弔三閭於汨羅兮𣺌不知其所在羗既不甘於披昌兮合完軀以逺害胡遽沈而不疑兮蹈申生之故態彼上下之迷誤兮審伊余而何罪乃自𦵏於魚腹兮豈䜛夫之為祟方悵望而猶豫兮遘至人於中途告我以往者之莫招兮仙人之不易圖矧洪河之湠漫兮與行潦其合汚豈不見世路之崛堁兮乃南奔而北趨汝既憑軾於大雅兮又御舟於錢湖盍順時以安志兮守三吳之舊廬保神明之澄清兮游吾心於太初唯含英而握華兮期永息乎桑榆茍顓恣而不信兮請解袂以獨驅倘蒭言之足采兮吾與子其同車亂曰歸乎來哉仲尼之徳衰接輿笑兮彼豈昧於隠顯畔斯道兮余何人斯敢不踐先生之芳躅以終領其教兮夢歸賦王材余何索索而夢歸兮自邇嵗而益頻夕抱食以就寐兮至旦晚而相循時洊歴於川梁兮指郊郭以忻忻復廽游於帆櫂兮望故里之無垠忽轉幻而得路兮山川鬱其更新親賔僚以雜萃兮又門巷之未陳宛髫丱之階闥兮聽嚴訓之諄諄偶飣餖之紛繣兮又衎然釋冠服而飫比隣䕃溝蹊以春遊兮美宿植之蓁蓁瞰川魚以映日兮布白石之彬粼蹇邅廽而侘傺兮慨輿僕之頑齗儼失携於中道兮悵所往以弗申杳花竹以盈洲兮驚好鳥之馴馴奉慈親以康樂兮酌椒桂之芳辛洽親戚之藹藹兮揖棠棣之津津亦往往述其宦迹兮曰不能骩弊於凡倫紛糾糾其莫紀兮恒一夕而屢變奚歴載之啽囈兮曽不離乎鄉縣晨豈不趨乎宦省兮事豈不經乎當世之羡况聖君賢相穆穆休休兮士亦咸懐於自見既通籍於金閨兮豈果哉而自善顧情愫之黙成兮恒自愜於荒賤涉膏珍之芬馥兮獨佁儗於藜莧鳥榆枋以自止兮未逺飛而已倦沼鱗盈畝以噞喁兮無得乎滄溟之浩衍念自抑以乗時兮嬰固陋之非淺愈憧憧於去住兮追鹿蕉而莫展輙獨抱而長嘯兮瞰左右之莫辨槩千古以内哂兮庶退約之無譴夢兮何疑覺兮何睠吾將惟夢之從兮毋為覺之所眩明文海巻二十七
