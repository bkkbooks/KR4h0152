body:
  text: 明文海巻三十六餘姚黄宗羲編賦三十六聽彈琵琶賦袁尊尼原夫琵琶之為技也按調流音徵曲冩聲下上其手逆順有經絃無取多宫填徵鏗洪殺㑹節要𦕈希清振容動思暢志懌情逺傳翔漠近稽漢京信樂府之妙品絲屬之雅鳴非夫嬌昌嘹瀏明姿盛麗皓齒素腕玉瑩肪膩照耀激盪耳駭目注則不足以稱擅工而繩絶倫諧羣心而娯極意蓋絲馮肉亮器以神宣色藝䨇珍古今共旃客有與於茲賞者乃賦之曰夫何有美之沃若兮洵涓嫮而修姱披芝房以禀秀兮絢芙蕖而濁華擅絶代於名都兮掩衆姝於秧斜曰予幼好此薄藝兮醜俗工委巷之煩哇謂上客儼其安坐兮奄日暮無以為樂也援四絃而試一鼓兮乆矣予斯音之不託也爾其揎袪出手宛約善容㣲傴却坐調絃淙淙態逸情朗矯若凌空乍撥良已欲放未雄鳯延頸以倚臉龍蟠體以當胸鵾筋迸縮而髙張檀槽攏撚而聲融華表應虗以送響回窓擬竅以含風啓丹唇兮揚素蛾倡回波兮間積雪絃之驟兮脱兎馳歌倚之兮貫珠協幽留屡抑澁春鶯也爽切赴㑹折寒氷也正宫鏜喤鳯和鳴也悠延細轉竹飀清也倐歘激突戰騎驚也砉然止劃掣裂繒也曲終有聞餘韻凝也四座静聽蹶不覺其醉之醒也飛斚復酬䟦燭更秉俁俁于于忘夕之永始奏兮怳皆有觸畢彈兮各獲所領閨辭多思歡耹乃欣越調沿怨樂感俱冺匪烏孫之出塞異馬上之悽聞豈潯陽之去國殊舟中之愴神固知境善遷物而音能㑹心也載歌曰雲披日遲靄春陽兮餘寒夕清夜未央兮井榦綺疏靚蘭房兮布席髙讌燭煌煌兮蕙肴雜遝臭芬芳兮有客既醉醉徜徉兮於爍令姿耀宵光兮朱絃親御歌琅玕兮其歌伊何鳯求凰兮願言矢心結明璫兮彼美人兮得也可忘兮參差賦王寵余聞王卿子美文子夀承皆善吹簫賦以贈之曰彼江南兮紫管洞罕節兮條遒掍㑹合兮象牙爛朱唇兮金鎪承公子兮光御發宫商兮清秋𦍑明月兮翔東美要眇兮雲中擕佳人兮燕後宫臨曲池兮伏丹櫳吹激楚兮順揚風霓裳飄飄兮鸞皇若逄紛予去故而就新兮四海焉窮蹇誰留兮中止忽婉孌兮聲靡眷寳結兮同心矢偕老兮君子終嘽唌兮縱所之朱顔倐忽兮能不悲人生幾何兮朝露晞歡樂不常兮日月馳安得千秋兮永若斯亂曰繁音促薄兮蕩人心罔象相求兮窮髙深神歸来兮勿周章彷徨四出兮恐弗勝聊逍遥兮澹容與哀中節兮樂不淫畫角賦方逄時萬竅噫於大塊兮太和鼓於人心粤兼搃於一氣兮肆恊比乎八音繄惟茲之畫角兮疇肇錫此嘉名竊餘音於韶濩兮倣遺軌於咸英效伶倫而截管希涓延以施簧應八風而不爽順五氣以成章流徵間羽移商度宫殊鳴球之戞擊匪鐘鼓之鏜鍠嗚嗚兮軋軋喔喔兮嚶嚶悲迴風兮斷續哀永夜兮凄清乃若茫茫鴈塞莽莽龍庭三軍獨壘千嶂孤城白日沉兮昧谷暗皓月升兮瀚海澄啣枚野宿兮旌旗捲影登陣固守兮刀斗停聲或倚楼而三弄或按節而一鳴風颼颼兮夜未央天窅窅兮日未生荒雞聞而響應旅雁起而羣征夢斷元戎之幙魂銷壮士之營霜氣凝兮錦裘襭星光閃兮寳刀掣闗山隔兮音書絶戰閗苦兮㓂未㓕臨風兮抱月餐氷兮臥雪泪盈睫兮半成血髪衝冠兮眥欲裂怨莫怨兮腸九迴悲莫悲兮氣屡結别有空閨嫠婦逺地覊臣含情無語懐忠未申燈熒熒兮照影室耿耿兮傷神褰帷殷兮欹枕嬰情思藁砧而不反賦懐沙而靡聽恨經年離别惜往日兮屏營歎芳華之易謝感佳㑹之難并梅花落兮嵗云晚楊栁折兮春欲零信良工之妙理異俗樂之淫哇單音奏而有斐羣聽寂而無譁遂使桓伊儷指於長笛文姬廢拍於邊笳湘靈斷絃於錦瑟明妃歛撥於琵琶寄幽懐兮一噏發髙韻於天涯歌賦俞安期嘗誦傅毅舞賦遣辭洵美寫態畢妍其後平子梁王之儔抽毫並作咸不逮茲世每以歌舞並稱而謝徳偃所造歌賦寂寥短章敷陳未備余在南都遘齊王孫席上事迺衍為一篇或庶幾補藝林之闕文云其辭曰東呉王孫遷自齊國嚮意文辭数讌賔客啟雕堂敷瑶席合簮履騰觚爵鼔簴縣鳴筝瑟樂工屡終膳夫未畢王孫起而謂客曰昔我先封之在齊也髙唐緜駒處其右魯國虞公居其隣復有東門叩角漆園引聲髙商揖封彈鋏先生辭流於往牒音習乎来今其来遊者則有韓娥瓠梁薛談秦青林木留響而屋梁遺聲夫寧足齒乎淮南宋蔡與夫遼西之文成俗稱善歌餘風未熄不德不忘乎故疆顧好而自忘其忒爰集名倡願以娯客客曰葛天八闋寔闓厥先九招興咸墨渡漳作佺倫大唐卿雲擊壌箕山君臣賡詠苓落朱干二陽初慮歸来縵縵下逮五子九德始乃濫其觴而揚其瀾塗山遣候人而南音出九成飛燕徃而北調彰萯山破斧東聲爰起餘靡封翟西氣發揚審音察故亦由此而辨乎四方詩稱式歌書叙永言衛地以之號邑東陽以之名山歌之時義大矣哉君何以憂其忒焉于是王孫愕然而喜曰敬聞客命亶悉其原顧茲之娯異客所陳依於古則變以新聲幸聆音而發㫖其有無闗繫乎性情遂迺屏樂部蓬别館撤藻筵即清讌止瓊華之堂藉紫羅之薦御珠綴之帷馮雕文之案命齊秦之女召荆鄭之妃集呉越之職徵燕趙之姬成列進侍爛其盈而玉光互暎珠飾如翬清曥善盼輕質懼飛衆曲萬變惟所命之其始命也蛾從動黛色揚輝唇朱欲剖中顯瓠犀韻遲回以俟㑹態都案而含思喉輕欬以檢氣首俯仰以整儀其既發已蘭馥馥以輕歕聲嫋嫋而相隨乍冉弱以優渥兮既繚眺而􅜃靡或激越以矯縱兮或舒肆而騰娭或縹緲以輕邁兮或蕭蕭而清凄或絡繹以條昶兮或紆餘而鬰伊或翩緜以憀亮兮或都雅而逶迤或將斷而忽颺兮或将迅而忽㣲或将轉而輕送兮或将疾而少稽或邀險而若誤兮或俟機而若乖既投隟而趣汛兮遂搆㑹而入竒何若隂而若陽亦若安而若危翩如其往突如其来細不幽散大不昌披疾不浮厲徐不陵遲揚不遽上抑不遽頺油兮若愛黯兮若哀鯈兮若怨歘兮若怡折頓赴矩旋轉就規圓如運道沈若研幾况迺衆口並發異囀繁詞南北之音互出東西之調兼施千迴萬逝舉無参差不期而㑹不絜而齊高低修短不爽毫釐繁聲一響若有物絯若墨而界若斤而裁若羣珠纍纍而貫獨縷兮若亂繭在繅而抽一絲豈能陶之於型範有若和之以天倪於斯時也璇霄遏雲雕梁飛塵蠕蟲徘徊以支喙兮飛走傾注而欣欣鱗物目聆之而不駭兮介族角聽之而無震惟夫靈妃帝女上元法嬰紫㣲白鵠䨇連辟方昭靈婉来四珠䨇成合茲衆妙揚彼曼聲輕風流水昭霧秋霜𤣥靈歩𤣥駕歘排空音容庶幾乎比方至於呉都子夜石城莫愁越人擁揖女娟中流名謳碧玉善伎緑珠渡口桃葉陌上羅敷曽莫能與之匹儔也其曲則有魚麗朝日激楚流風白雲白露陽阿陽陵白水延露采菱渉江於遮歸邪去鴈離鴻蘋生朱華落葉吹蓬焦泉商飈沈靈流隂北里靡靡皇荂折楊陽春白雪刻羽引商八變九曲渌水江南鳥生玉鳬雞鳴東光伺聲定情艶歌何嘗鵾雞十五東門平綾長干呉趨招商采桑五調六引西曲上聲清妍安緩髙族短長雅清嬥浩酣怨勞傷咸宜今而宜古咀五音而俱五行若夫郊廟房中之奏里巷道路之謠鐃鼓之所習絃吹之所調亦别有其類固與茲而殊操已及夫過殷墟而麥秀居首山以采薇周王東嚮以哀慕兮王子南望而思歸呉人離别而相去兮夏人瑶弊而相持寡女黄鵠棄妻扊扅越妃去國竇婦将離包胥向秦庭而哭罷兮優孟入楚宫以滑稽孔公曵杖於户外兮皇娥讌戯於水湄鉏商樵而麟獲兮楚狂過而鳯衰易水寒兮壮士去烏孫逺兮公主悲子胥河上漁父蘆漪青陵烏鵠緜上龍蛇幽囚趙主放逐湘纍孺子滄浪之濯梁伯北芒之噫隴頭水之戍客上留田之孤兒以至漢帝興而過沛楚軍困而在垓天馬逺至鴻鵠髙飛沈璧瓠子汎舟淋池戚姬抱杵於永巷兮翁子負薪於路逵楊侯烏烏而拊缶兮商老曄曄而采芝班女團扇之怨田横蒿里之哀協律北方之佳人益守莋都之逺陲林林總總不可殚稽亦莫不因感而響洩觸事而音来然皆偏聲而促調或短節之與夫璅辭豈若茲之下變乎衆庶上亂乎祗靈聽之者舉一其心而歛其意専其志而凝其神酒澄不及亂殽乾不漫進暴者為之惠柔兮躁者為之泰寧怒者為之改慮兮妬者為之息爭憂者氣為之宣冩兮喜者色為之不形懦弱為之奮迅兮亢厲為之逡巡矧含五徳之妙理夫人亦在乎善聴性情殫為之滌蕩孰不去故而就新豈必樹蘐於堂背足以忘憂而引年乎亂曰音聲微妙惟絲竹兮瑟琴箏笛與笙簫兮聆其清韻匪不淑兮惠察其文殊邈邈兮往哲有言兹可復兮絲不如竹竹不如肉兮王孫避席而起率諸歌伶再拜錄之用傳千齡秋夜琴聲賦楊兆京余性嗜音律托志清琴夜䦨月落忽聞逸響徘徊留之不能去爰賦短章聊寫其因風逺近無端觸耳之况耳若夫極意敷揚備求端委則子淵安仁叔夜季長簫笙琴笛各有名篇余何必更為效顰哉感草木之變衰兮亭臯靜而凉生皎素月之流空兮銀漢寂而無聲忽迴風之送響兮發清微之悲鳴乍掩抑其如訴兮屢斷續而凄清豈園客之絲兮抑九寡之珥驚廣陵之調兮契鍾期之㫖髙山欝而嵯峨兮後潺湲其流水入楚澤之涵秋兮冷沅江之蘭芷弄塞門之積雪兮感從軍之蕩子爾乃玉堦葉墜金爐香起初調既更新聲復始亂松風之寥瀝兮環佩響於長安寄鄉愁於千里兮泣天外之離鴻撫絃輕泛如落花流絮舞春風長吟永歎如故姬對扇怨深宫頓挫繁寃如逐臣覊客訴孤忠蕭條寂歴如幽人逸士嘯髙嵩神明為之暢適精魄為之猶夷哀愁纒於弦末㣲音蕩於流颸清猿聽之而垂淚孤鶴聞之而苦悲竹露凉於虗館蘿月入於薄帷於是變商易羽絃急柱促發為竒弄更為别曲肖鸞鳴而鳯和冩寡鳬與別鵠彼太古之遺音何繁憂之感觸罷秦筝而收響柔趙瑟以停歌望連成而不返鮮知音其奈何迨曲終而奏雅何冲融其太和秉幽閒而静潔含至德而無頗寔正性而閑情匪鄭衛之繁多但一弹而三歎奚絲竹之森羅明文海巻三十六
