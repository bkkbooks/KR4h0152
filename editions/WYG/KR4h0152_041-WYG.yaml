body:
  text: 明文海巻四十一餘姚黄宗羲編賦四十一禽蟲四吐綬賦董夢桂嘗讀詩賦有山雞吐綬不解為何物既考爾雅吐綬雞一名珍珠雞羽毛有白員㸃嗉蔵肉綬濶長數寸紅碧相間遇晴頂上先出角肉二寸許然後徐舒其綬壬戌夏嘉禾有尉秦中者挾二冠歸市之好事者爭徃觀之余得與寓目焉與爾雅所稱若劵夫精華所鍾即山林不常有況越數千里得聞且見異哉為之賦相彼雞兮庸庸可鄙何有木形徒誇金距相呼爭食無澡刷之撡鑿垣羣棲乏軒昻之志别有火徳含情金方産異寂寂無應潮之聲落落無勇鬭之氣繡領綺翼丹嘴碧眶琅玕作額珠璣綴裳嗉頷之下結如繡囊雜以朱碧間以𤣥黄銜雲霄之丹詔偹黼黻之文章其舒也振藻其斂也含章卒然就之不見其好植足亭亭垂頭悄悄既而日暖風清隂霾不至陡然展舒崢嶸赤幟如繡柱之雙懸如晴峰之對峙爾乃雲車錦綬翩翩欲出顧影自矜孰肯閟惜其狀如輪其文如織錯落既殊經緯不一或如渥丹或如蒼璧或如凝脂或如㸃漆炫燿心驚輝煌目溢五色變而不可勝窮五采雜而難以遞述皎皎秋旻雲蒸霞蔚爛爛春山緑暗紅宻鵕䴊對而無光翡翠仰而寢色於是佳人脈脈思舉靈芸之針才子躍然夢授文通之筆夷考羽族丹山最靈九苞毓徳五彩麗明鸑紫而鵠白鵷黄而鸞青各得其一莫能偹形乃以渺然之質全收鶉離之精産靈表於窮谷揚傳記之芳名固宜翔帝囿㳺天池超衆禽而獨上覲君子之光儀嗟攖禍於罿罻遭時命之險􅇖上之不能啄飲於山阿下之不能乘軒以見竒作耳目之近玩守藩籬以淹兹踰山嶺而提挈秦與越之流離信美而非吾土想故鄉而踟蹰若乃霜露零落風雨淒其徘徊櫳檻俯仰庭墀懼英華之易謝負珍異其焉施嗟夫鸚鵡以聰明剪翮蒼鷹以猛鷙受緤孔雀以美羽招殃鳬雁以豐肌自齧與其致飾而䝉患不如自全而守拙後憎蒼蠅賦王樂善伊斡維之坱圠甄萬彚而樂生何君子之大心獨有疾乎蒼蠅謇為品其何𦕈至緝文以示懲豈伊人之作惡自斯物之足憎彼其生兮本汙長而含穢天賦貪讒習成狡獪陽漸老而薨薨隂一生而嘒嘒鍾兩間之沴氣繄小人之同類峩峩騏弁楚楚青衿黔如者顔頎然其身舒素翼以如蟬翹廣顙其亂螓即形貌之壯偉類小人之有文潝訿信口幡幡捷捷造言倐東寄聲忽北羌熒惑夫二人遂交哄乎四國即厥聲之亂聴類小人之讒譎工於伺間巧於投隙鼓翼趦趄搖頭睥睨但罅璺之可乘即飈發而電掣果無縫而下蛆類小人之深計徃來翕歘不可以方翩翩翾翾其用善蔵當炎溽之蒸鬱肆意得而揚揚即盛氣之淩人類小人之披昌所嗜靡常恒懐不潔為白為緇隨處變色㸃完璧以成瑕甚老氏之守黒即厥行之變幻類小人之汙衊㫖醑佳肴既飫既嘬穢種潛施務底於壊覺悟茍或不蚤佳品因而立敗即播惡之為殃類小人之忮害閃爍揮霍魍魎不啻逐臭尋芳無所不至聚胔博名弔客成列疑為表瑞惑齊諧以有稱類小人之欺世迨夫朋友合志聚樂討論往來其間遂令紛紜攝衣思退不復披襟親知高㑹晤言杯酒撓亂其間遂令掣肘回面獵纓可以出走大賔相對祗敬雍雍膠擾其間遂令失容矯手頓足陷於不恭髙年永晝北忩坦腹奔走其間遂令跼促憂貽子姓勩及童僕邇之者化馴雅為狂率接之者易厚重為輕浮近衣冠沾漬而難浣入齒牙嘔噦而堪羞固嘗入夢兆昌邑之亡當夜誤齊妃之聴䦨入災庫狄之閽抱筆漏苻秦之令附驥千里幸以詭計見竒隠字受撲宜以忌能委命嗟彼物之含靈何為鬼而為蜮悵厥惡之難知每臨風而太息豈讒賊之遺魂鬱千年而再埴引六一之遺篇恨厥奸之未悉重有感於頽風用少紓於愊臆感蟋蟀賦孫承恩庚寅秋七月既望夜寢書齋聞蟋蟀之聲驚節序之迅速念徳業之蹉跎感而作賦曰當清夜之迢迢兮窅天宇之沈沈何啾啾以唧唧兮亂夜蛩之悲吟時則銀河在天玉露如洗淡月流輝涼颷不起爾乃空階暗壁幽砌閒庭非公非私自止自鳴何悲而泣何怨而訴其舒徐也何思其悽惻也何慕或獨唱而無偶或相和而同聲或語短而屢變或永言而尠更或更端而方濃或終章而暫停或䦨珊而欲歇或羞澁而不勝或沈思而未縱或得趣而自矜孰好汝而為娛孰叩汝而故荅孰誘汝而弗知孰督汝而靡輟孰假汝以聲音之妙孰授汝以疾徐之節以時而有顯晦何感而為語黙豈新愁之旋増聊舊恨之未絶溷一類而自分引百變而弗襍羌何物之善鳴兮齊萬籟於一吷子時幽夢既䦨宿酒全醒却慮屏思側耳靜聴如窶人貧子之出於無聊如放臣去婦之吐其不平如感風木者極終天之恨如羇逆旅者切懐土之情如鼓盆者强歌而終悲如慰别者當喜而翻歎如過故都者興黍離之欷歔如念行役者極中宵之淒惋如抱沈疴如懐隠憂如登山臨水送將歸者意戀戀而莫釋如辭家逺役顧婦子者語刺刺而弗休虞姬請劔而吞聲韓姬當筵而斂態懐湘靈之淒清動雍門之感慨腸斷山陽之笛魂銷薤露之聲寄慟哭於絶塞寓哀怨於邊庭非宫非徵不律不吕疏數弗齊音節自㑹爾其乘氣機之感觸兮任天倪而呻吟雖知生之云晩猶喜名之及辰昔摧蔵而未逢乆冺嘿其如結抱終歳之窮愁欲於兹而盡泄極抽思而弗竟逾出竒而莫窮何情事之如許兮而藐軀之能容既歴歷以分明亦切切而覼縷恍依床而近榻兮似向予而訴與感予心以掩抑兮増百年之煩憂方自念之弗暇兮顧何能為汝謀嗟乎盛事不常流光易換念予生之幾何已百年之强半悲沈腰之漸怯驚潘鬂之忽變愧徳業之無成將與草木而同貫矧兹感物而摧傷置此心於氷炭抱耿耿而莫語答悲韻而永歎欹孤枕而弗安獨惺惺而達旦黃鸚鵡賦應制習嘉言夫何品物之生彌滿乎六合兮紛羽族其摠摠曰靈鳥兹鸚鵡兮辨慧軼乎羣動彼翠衿緑衣之聨翩兮世已為之矜重矧斯鳥之挺生兮賦靈表而殊種偉竒姿之伊何兮實不縞而不蒼亦匪𤣥而匪縹兮羌采采以載黃體方祗之正色兮翕靈氣於中央衣金縷之􅗒襹兮逝璀璨於耿光文鵷遇而羞其華采兮鵕䴊亦愧其錦翅胎禽胡為其翯翯兮夏翟胡為其洩洩羨獨負於妙質兮蔚自然之真粹忽掩映於修􅙆兮聊一抹於緑裔趾淇洿以凝丹兮喙纎婉而流頳性委順而孔馴兮貌閒暇以曷驚儼鵠眄而鸞峙兮寧輕舉而妄停揚咬咬之逸響兮時縵引於圓吭吐華語以玲瓏兮囀方言於瀏亮紛獨有此衆美兮信不凡而莫尚眷攸毓於滇南兮適迴翔以夷猶聿置身於雕籠兮遺翕習於遐陬盼故巢於迢遙兮俄延頸於中州逕洞庭其淼漫兮道淮海其綢繆瞻新都之奕奕兮門九重而𢎞敞振羽儀以進獻兮爰依光於仙仗亘黄道而一色兮炫金鋪以交􅙬荷重瞳之屢顧兮被靈囿之寵榮林瓊樹之蒼蔚兮池太液之渟澄恣啄飲以自適兮樂容與於微生慨往昔之所畜兮惟勤貢於逺國彼婆羅與林邑兮竟眩耀乎赤白雖訶陵陁恒之颯沓兮邀傳聞乎五色亶斯鳥之莫儕兮曠前古而肇覿原太鈞之坱圠兮斡𤣥造以無私乃真宰之有意兮或畀付之孔竒揆諸理以究其故兮諒由聖化涵育以致之誓與鸞鳳而等美兮同和鳴乎千載之昌期聞蜩賦徐􅎾維五月之既望兮寒蜩嘒其初鳴何盛陽之甫届兮倐微隂之已生兩儀斡以迭運兮四序忽而變更彼在物以無心兮豈所觸之殊情吾獨樂斯之皎潔兮含造化之太清翳纎枝以自蔽兮類逺害以全身吸純和而不茹兮庶縁督以為經值夏元而秋代兮禀金氣之至精故其為物也飛不妄萃止必擇林憇修條之􅟭崒恍灌木之幽森撫夕陽而増思對南薫以微吟陋百舌之巧囀襍萬户之疎碪爾其為聲也或促或長或近或逺或清或混或迅或緩或將往而復來或已續而中斷川寂寂以無波日沈沈以乍晩羌一唱以萬和𦕈綿延以繾綣漁老投綸舟人解纜學士為之停披逰子為之垂幰彼憂樂以多門固同繫以異感乃若閨中思婦陌上麗人憶秦闗兮浩蕩懐沙塞兮苦辛步井幹兮傾聴罷柔瑟兮含嚬至若楚苑烟青吳宫草緑傷今古之潛移慨盛衰之倚伏噪暮雨於荒原鬱餘懐其相屬亦有澤畔遷客隴隂放士步偃蹇而不前形枯槁而無侣訴悲聲以飲泣獨望風而延佇迨夫長門永晝銅雀深秋瞰西陵之松栢追北渚之歡逰悵餘音之繞繚増賤妾之煩憂至於蕩子從軍河梁怨别形與影之相依哭無聲而將咽聆遺響之參差悄離情之斷絶已矣哉日慘慘兮雲悠悠風颯颯兮木颼颼凴髙城兮俯長薄泛清川兮對芳洲引燕趙之妙曲兮徵二八之名謳鼓雍門之愴奏兮冩濮上之新愁窮妖淫之衆技兮何如聞振羽之啁啾物有天而相遇兮情有激而相投茍予心之無悶兮固已過而不留齊得喪而一窮達兮樂天命以何尤啼螿賦徐渤歳在壬辰宅艱寢塊一丘未掩千里徵文旅寓吳門心懐故園孤燈兀坐顧影寂寥忽聞四壁寒螿不禁千行淚血淒然傷感鬱矣増悲欲抒哀情漫成斯賦銀河如練兮商飈蕭瑟金氣灝渺兮槁梧墮葉傷哉逺人離懐百結良夜以永復如何殘燈慘淡愁思多凭危欄兮惆悵對孤枕兮滂沱流螢幾㸃明復滅寒螿四壁怨如歌冷砌空堦頽垣暗室半夜微寒螿聲唧唧始騰音於曠野愁吟喓喓再流響於中庭哀號趯趯如吟如嘯非竹非絲刻商宫以窅杳變徵羽兮淒其荆卿别於易水楊朱泣於路岐長門永巷湘江九疑傷不足以疑其嗚咽哀不足以狀其漣洏揚兮復抑速兮復遲爾其月落屋梁露零玉戺達南北兮東西徹前後兮逺邇雜烏鳥兮啼夜霜伴鴻雁兮叫秋水哀韵紛沸於一堂繁音不絶於兩耳乃若零雨其濛終風且曀虛室泬㵳重門宻閉啁哳出乎蘭叢嘈雜透於薜荔若夫早烟初斂曉色冥濛廢井苔深荒園露濃和城闉之斷角荅古寺之殘鐘乃有逺客宵征離邦去國馬蕭蕭兮魂已斷車轔轔兮心半死悵夜月兮空明怨秋風兮蹔起梁鴻度闗賦五噫王粲登樓歌信美又若香閨綺閣憶逺不歸望蟾蜍兮空佇立織鴛鴦兮難上機麝蘭火燼於寶鴨絲桐愁絶於金徽魂消永漏泪漬羅幃更若劉蕡下第季子空還黒貂裘敝壯士無顔風塵痛楚道路險艱萬里羸馬一夜闗山視筆硯兮愁咄咄睹詩書兮淚潺潺斯時也石人聞之而感傷鉄心聴之而増慟況麻衣孝子淚盡目枯而不飲恨吞聲者乎亂曰萬籟寂兮秋夜清秋風瑟瑟吹前楹秋風秋夜秋月明秋月明兮秋思生淒淒秋思空復情羇棲客子心魂驚心魂驚兮愁不輟吾將歸去兮誰云此恨而難平錦鷄賦陶允嘉鄖山中多錦鷄五色可愛古不經見至明而定為二品服章人始稱之按爾雅紀雉有數種曰鷩者似山雞而小冠背毛黃腹赤頂緑色鮮明疑即此物又尚書山龍華蟲注華蟲雉也一云鷩雉也當時章服所取意或由此初夏晝永感其在目聊為賦之有鳥於此鼻祖鸑鷟厥采五章實繁其族玉衡之散其造不淑棲於塒桀人所卵育爰有令支機精所屬首若鬱金頂如結緑翡翠叢腋渥丹凝腹忽橫絶而迅往杳驚電而掣目稍安翔而反顧爍殘霞之散陸爛爛兮芍藥之春敷灼灼兮菡蓞之朝榮又似乎火齊之為鐙兮蜀機軋軋而未停爾其耿介自標馴和且平棲止必諧飲啄不爭使鶡慙粗猛雉遜文明雖彬彬乎君子實粥粥其無能乏曽城之善舞謝九真之長鳴然而么麽微質托産遐裔豈帝舜之華蟲而傍采乎爾類彼譽命兮不逮乎先朝乃服采兮章施於聖世陋吉光之徒珍笑鷫鸘之非麗躐孔翠而直上托胎禽以差次聊頡頏兮筍班竟先登兮楓陛噫嘻譬之雲臺丹青而赤松托寄者耶上應天象而垂釣水涘者耶名之曰錦雞而古無是者耶其鷮為兄以鷚為弟者耶亂曰唼喋禾黍聊容裔兮不自知賤安知貴兮食子之食匪以恵兮所苦籠縶願從此逝兮乳異雞賦趙統趙子幽居乳異雞焉白而先黒翮人譽之曰此鶴雞也請進鶴徳於是賦鶴鳴之詩曰余為子占之矣曰鶴鳴於九皋聲聞於天天將乆子而歸之乎子蓋神夫知幾且余將得與子老卧龍於驪隂而時放鶴於磻磯不然孰為乎幻吾之時夜者而更之鶴衣髙吭修膝絶海嶠而為儀趙子曰否不然也夫天之歸不歸命也命不克物先泄蘇卿之歸也曽不兆夫秃節夫君聞之乎馬之謂龍也非肖其形比為其足千里也天其惠吾此一鶴乎夫豈解絶九皋而孤起且吾之羇於斯也閲世事以窮年邈知命乎皓首内不瀝乎其忠孝下不足以裕乎吾後競桑榆之末照倖琴鶴乎陽九爾乃愀然外感竦而長嘯風颯颯乎落葉日沈沈而脫乎簷徼蓋曽不滿夫一笑也譽人曰嘻僕誖與子之所執者物余之所先見者幾之兆也理根乎兆而先乎理故周王興而魚跳孔子厄而麟死且子固獨好逆天而留此乎乃自起為鶴舞盤旋輕舉因重之歌以歆愚叟歌曰月明兮日普華山兮渭浦美人歸兮鶴為侣𣺌天地兮終古余乃倔起長嘆為之大笑曰夫豈獨不知命也耶將不知物物極必反且吾固天地之一生物爾非我生歸必有死返吉凶乆近不决不圈君蓋誤其末兆乎而昧乎其本且夫天下事之誤於虚名不少也而將貴鶴乎吾固以為賤鳥焉其顛雖亢其視則卑其履雖濶實汚其資如鸛之螮甘嗜璞如鴟空鳴不恊乎鸞凰髙舉不離乎鷗鳬不避罻羅鎩翮豢養效舞取食隨人俯仰彼將自圖歸之不暇而克為吾兆歸哉古之常言曰鳳鳴而鷙翰之其鶴而翰吾雞乎盍反吾初服愧此五徳實惟不榖維鶩爭食將羞神卜而又奚自附於鶴乎嗟我人斯矯矯不龍不鳳不鸇何所不容方寸為巢四大為櫳繫而緝雀脱而飛蟲鄙范滂之何為攀陳實而曲終固無待乎鶴而又奚以雞為彼人也噤無以應拂衣而絶反而相顧而相尤曰子老不化乎危言獨行齊譽毁之矯人悲行藏之逆命子將何所歸税乎且夫士有百行子非一眚之固知不終棄子也行掃石乎松隂要他日以相迎余悵然其不屑也就我雞列泛然與之别明文海巻四十一
