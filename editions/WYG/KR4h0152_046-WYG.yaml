body:
  text: 明文海巻四十六餘姚黄宗羲編賦四十六器物奉制撰蟠桃核賦宋濂洪武乙夘夏五月丁丑上御端門召翰林詞臣出示臣桃半核盖元庫内所蔵物也其長五寸廣四寸亡分前刻西王母賜漢武桃及宣和殿十字塗以金中繪龜鶴雲氣之象後鐫庚子年甲申月丁酉日記其字如前之數亦以金飾之所謂庚子實宣和二年字頗疑祐陵所書既奉㫖譔賦垂誡方来臣濂謹按王母獻桃事詳見張華博物志第八巻史補類華言桃七枚大如弹丸遺帝五自食其二以今核觀之且十倍於彈丸則其實之如斗可知矣豈華出于傳聞而想像載之歟抑其言足信而後之好事者假托傅㑹之歟不然漢武内傳所謂桃如鳬卵形圓而色青者又果何如歟復按蔡京所記尚方有王母蟠桃核頗鉅京嘗相祐陵其見與今相符事當可徴然則傳志所載誠有不可信者歟臣敢忘其固陋譔賦一篇俯伏丹陛以獻初則極其形容終則一歸于正其詞曰炎漢六葉實惟武皇闡坤符握乾綱祀汾隂建行宫仁獸在郊赤芝薦房西海獻續弦之膠弱水来燕卵之香慶諸福之畢集思騎龍于帝鄉幸靈桃之入口傳仙種于下方想其瑶階露寒彤庭秋逈銀燭未㭺畵屏斜映啟承華之秘殿眄瑶池而神騁忽王母兮遥臨托青鳥以傳命欝佳氣之蔥蘢覿芳姿之妍靚于是玳席初延霞觴屢傳蘭辭吐兮襲人縹袂舉兮髙騫紫雲之輜軿暫駐九㣲之燈火猶然乃啟錦幪乃濯翠籩乃出桃實獻于帝前味甘醇而如醴色含腴以不乾鸞刀割蜜神液流泉上滋華池身輕欲仙将懐核而種之斸上林之寒烟王母㣲笑塵境易遷儻花實之並見嵗屢閲于三千唯紫府之列真視滄海于桑田彼窺鳥牖之小兒尚奚測夫幽𤣥斯核也匪鑄而成非陶而凝籍五行之亭毒資六氣以流形鄙瓠犀之脆薄並玉質之堅貞爪之不入叩則有聲知何年之中析存半璧之晶熒俯貼金盤巢蓮之龜仰承玉露常滿之桮銳首聳兮尖岑豐下橢兮橢狭長也墜曐衆皺蹙背文之籕一窪暈面色之頳荷盤欲展蚌甲未扄藏仁之跡猶在含肌之罅如生函肉好之隠約圍合線之交層龜鶴軒翥兮顯象寳章絢爛兮金明鳯卣鸞彛同藏真于大府星形月魄挟灝氣于蓬瀛嗟夫自昔仙靈惚恍難凴出無入有變幻莫停橘類盎兮巴園棗如瓜兮漢庭恣燕齊之方士騁詭辨之犇騰瞻雲路之咫尺恨凡骨之難登以雄才之盖世甘昏溺而不醒至若建章月淡甘泉風冷銅莖中峙仙掌髙擎望飈輪兮不来徒馳情于窈冥苦白日之易短兮竟莫制于頺齡核雖存而人則逝兮悲秋風于茂陵矧宣和之繼軌兮慕鼎湖之龍升托青華之帝子設神霄之𤣥稱何殷鍳之不逺踵覆轍其相仍天啟皇明真人龍興順堪輿之大化調隂陽之至精道徳行兮即龍虎之丹顯忠信昭兮勝鉛汞之功𢎞以九州為仁壽之域躋兆民于喬松之朋神機流浹太和薫蒸指佞人兮草生屈軼齊氣朔兮階秀堯蓂視區區之遺核初何係乎重輕此所以革􅉨古之荒唐法唐虞以作程也誶曰桃有核兮大逾掌歴千齡兮多惚恍嘅靈仙兮勞夢思誰見昆丘兮紫芝長真人出兮海㝢寧禮樂為冠兮仁義作纓簫韶九成兮鳯凰鳴青鳥不敢徕兮幻説清千秋萬嵗兮永長生椰子酒瓢賦為知滑縣事諸君仲仁作君前雷州遂溪縣丞宋訥祝融之荒朱崖之疆有木維椰花實同芳葉毰毸乎鳯尾樹彷彿乎檳榔融瘴雨之滋養受海風之吹揚凝鯨波之潤澤孕蜃氣之光芒竹長節兮下生雀五色兮上翔採一殻之貞姿破半瓠之異常不深而𤣥不老而蒼訝琢疑雕離圓遯方謂為匏耶而非濟水之具謂為螺也而無掩甲之鋩制作合自然之度規模豈杞栁之戕薄臨池之荷杯輕隨波之羽觴尊藤癭兮土苴巵竹根兮粃糠憎一杯之鸚鵡妬㕠盞之鴛鴦斟酌乎真一之醖輸冩乎波若之楊納麴生之風味支陸醑之壺觴齊列並陳雖翠勺銀􅎆之属無忝先後爭操競執雖􅄞康阮籍之徒亦效奔忙注春色于蒼顔添風韻于紅粧踈水部之醒何親酒泉之渇𦍑素過乎陶匏之質貴饒于金玉之相箕山之許由未棄陋巷之顔子不将若夫公子髙樓豪客畵堂銀屏前列綉幙後張薦瓊酥之炙鵝封杏酪之蒸羊緑醅漲竹葉之釀紫霞溢葡萄之漿夜月秦若蘭春風杜韋娘或妙舞兮垂手或清歌兮遶梁巧笑仙容轉宫腰之猗儺懐春翠袖露玉笋之纎長澆彼磊塊之胷傾此㶑灔之香銀鑿落兮在側金叵羅兮在傍瓢于斯時孰低孰昂負清標與雅致任酣顛而醉狂又若幽人草亭髙士山房詩禮之庭翰墨之場逍遥兮蘭佩葛巾優雅兮野服雲装杜甕半開香膿釃乎蟻緑郫筒初斷色淺泛乎鵞黄縷銀絲之鱸鱠研金膏之蠏匡新洞庭之緑橘嘉糟丘之紫薑冠者數人童子兩行冄獻不假于歌喉一傾直潤乎詩腸滴殘瀝于布袍㪚餘馨于銀鐺瓢于斯時價比琳瑯視金罍而不耻顧瓦盆而有光有美一人邦家俊良典六藝于文教肅三語於憲綱蔚賛畫之才華近池上之鳯凰出貳遂溪來宰靈昌昔訪兹瓢得于雷陽封以溪藤之紙韜以蜀錦之囊逮琴堂之公暇時㑹友以徜徉精麹蘖以作醴潔甘㫖而起嘗味過杜康客邀宋庠幕賓之丰儀俊逸廣文之環珮鏗鏘掛一幅之墨梅設四位之胡床爇水沉兮霏㣲燒銀燭兮熒煌乃命愛子鑰啟筠箱出清賞于勝集樂良夜之未央蔬如瓊芝果剥栗穰肴佳山雉味美河魴一酬一酢和敬交彰一奠一舉賓主相忘延席上之歡伯拓樽前之醉鄉引青州之從事啖湯餅于何郎宜賢侯之特逹重此噐如圭璋嗚呼海中之洲瓊山效祥實産椰子大小莫量懿為瓢而為榼亦風土之木强來中華兮萬里幾山海兮梯航物逺見珍愛之恐傷木靈知毒騐之允臧杳窮陬之地理恨考索之未詳吾将假之過黄公之壚持之喚西家之墻曠席地而幕天脫聲鎻而名韁属一瓢于海神追祕怪于𣺌茫酧一瓢于坡仙予謫居之聞望盡南海于一吸嗽嶺島之風霜倒着白接籬翻汚雲錦裳揖羣彦兮歸来拂醉袖于縑緗承主人之索賦聊染翰以成章願常加乎洗滌示清白以保藏風筝賦凌翰梁苑王孫身閑情逸悦目怡神假是長物伐竹淇園搆胎産骨或方或圓六出八出鏤花剪綵錦文素質宫姬刺綉絢以五色白黒丹青紅紫緑碧炫燿輝煌父成黼黻曳以修尾流蘇累百長徽竟天數千萬尺手不能舉轆轤収繘於是乎乗其髙墉假以人力憑虚御風頓生羽翼始扶揺而直上旋夷猶而反側爰飄颻于九霄乃周游於八極快萬里之鵬翮奮千仞之鳯翼扶白雲以斜飛與紅日而翶翔既前軒而後輊復左低而右昂自已至申而不倦歴東轉北而靡常日云昃矣返照生光素帶流金翩其煌煌美麗當空蔚乎文章景星卿雲天孫錦裳亦有鳴聲鼔出千囊六鷁退飛言駕彼蒼二三其偶盤舞頡頏爾其巻舒進退悠乎洋洋瞰視下界民物阜康士女盈盈諦觀仰瞻叶側羊兒曹拍手攔街似狂上盻乎九重之顛下臨乎百里之外大塊假之以噫氣雲逵動之以天籟隠而不見沒於霮䨴顯而于飛垂翼􅞪􅞪横出蔽天有豐其斾日入而息一巻以退系歌曰世路坎坷兮城守堅飛樓髙舉兮臨塵闤虚實洞見兮惟紙鳶肉骨委地兮摧肺肝太平無事兮飽饔飱錦衣綉裳兮金玉冠挾兹飛舞兮薄青天遨行盱豫兮聊自歡焉得風塵永永不動兮天下安如山摺扇賦楊循吉當溽暑之蒸欝咸浹背而汗流雖四海之遍爾在江南而為尤况城郭之逼側復塵土之飛浮思清風以如渇畏重絺而若仇于斯時也吾無廣堂大厦髙亭曲榭披襟向阻散髮未暇興維水鏡之懸心繄氷壺之掛荷隂㸃㸃而遥隔重湖竹影蕭蕭而逺違僧舍使吾局東乎放逸之懐偃蹇乎坌濁之状恨八溟而猶隘嗟六合其非曠于時則有祛炎雅製却暑芳姿昔日之班姬所詠往年之逸少曽持歛之不盈于把圓也有中乎規出袂而輕飊自動拂膺而凉颸允宜觀其皓繭裁容素藤張面洒金星以作飾削牙釘而為鍵紫檀擑擑而板肳無痕𤣥珠團團而蒂垂如鏇爾乃寒韻来權熾威亡酷偏宜掌握之攜豈用僮奴之撲兼鄰座而飂飂及旁賔而簌簌快哉何爽甚矣其樂然而先生方且撫髀三歎仰屋長吁吾適于此有熱者乎蓋三邊多重鎧之甲士而四野足赤背之農夫也竹夫人賦徐肇惠嵗是戊戌六月既望徐子燃香鼔琴啜茗摛調據胡床以清嘯陟雲麓而棲遲於時新篁觧籜薫風襲衣午睡未振頺然枕書恍兮惚兮乃夢一姬不事靚粧有綽其儀邂逅覿我遂締交頥素心虚朗談笑寡施余頋而駭曰噫嘻天女仙娟雲容月姿胡為乎来兹哉詢其所自廼歛袵而對曰妾在湘江之陽黄岡之陂英皇之遺裔也武昌之譜可考而知周轍既東鳯鳥絶棲吾族斯落一至於斯降自五季風㑹益趨七賢長逝六逸謝歸雖衛武公之宴賞樂天氏之品題蘇長公之結契清虚子之徘徊而時事已日非矣于是溪悲巖淚本撥夫離娣妹妯娌莫知東西飄泊天涯烟雨寒凄獲見君子妾之辛與既而又訴曰妾非巫山之媛亦非洛浦之妃自我祖以来秉持髙節嵗寒不渝家襲清脩淇園卜居慵事鉛華羞競妍媸故将托身於賞音也君其憐之余曰噫嘻静矣一矣不可狎矣枕席之娱得無䙝歟于時翠盖停停蓮姨笑迎廼執齊紈乃遘氷音迓新姬於合卺奏鳯管於良辰湏㬰清風入帷明月當庭涼飈薦爽桂魄流馨逸而非肆樂而非淫余戯之曰子誠徳輝之良儔也盍贈以徽稱姬笑對曰幼字青娥長呼湘雲時移物換潜踪晦名君其謂何余曰子有婦徳内助孔殷秦虢之號可以褒尊于時侍女繽紛皆稱夫人稽首欽承莫敢僣陵姬曰妾聞寵渥者疾甚恩深者妬生祇恐白頭吟作團扇歌興秋風寂寞寒月凄清當斯時也君尚念此否乎余曰嘗聞貞女矢操義士秉心與子偕老千秋百齡汝勿猜也於是相與歡娱於竟夕而不覺東方之白已生寤而視之四顧無人惟有竹奴在伴流鶯數聲噫嘻異哉乃一夢耶鐵硯賦王文禄後周桑維翰屢試不第人嫌姓請改翰不答撰日出扶桑賦以見志又鑄鐡硯以自誓志壯哉予嘗撰日升滄海賦擬之戊辰試春宫南還有感翰志復撰斯賦云萃五金之精質兮特鍮石之凌汞鉛招歐冶鼔橐籥兮肅壇宇而吉蠲排乾坤之爐鼎兮秉洪鈞惟太𤣥文武火以調燮兮任龍虎之熬煎爛光華之五采兮渣滓淨而廽旋啟硎範以肖硯兮藴日月與星纒非琢削以成象兮較端歙而相懸稽硯譜之莫載兮㧞硯品其逾千滴蜀峽之湍水兮簇煤黛之雲烟迅寒暑之代謝兮恒黾勉以磨研孚忠信之貞確兮縱堅剛而必穿利筆鋒之横劒兮揮波濤于剗箋下深入于厚地兮上髙出于穹天列左右俱阻䘮兮匹無敵于後先岱宗砥且礪兮黄河流而帶牽海底𣺌生塵兮嗤舌耕夫硯田崇誓願于厥初兮烱厯刼之彌専豈衡鍳之罔徹兮雖鬼神亦垂憐幸資言以獻身兮展平治于堯年阜困窮之億兆兮靖海島及三邉渾六合猶一家兮溥霖雨以窮源鑄硯亶其鑄志兮師苦卓之鑄顔何曳白之不濡黒兮每棄擲之如甎奈㴞㴞之若是兮肆鑚刺之夤縁凜棟撓之覆餗兮孰佛時之仔肩運拙以轉巧兮忍九仞而舍旃曷縻于好爵兮每遐慕于神仙塵關設末透兮殆心丹之難全負堂堂之大器兮恥雕虫小技之尚慳再髠頴而涸勺兮抵皓首猶奮然傚童䝉之凟兮兾出谷而喬遷以硯相麗澤兮奚秪三絶乎韋編奪錦標于金馬兮驚春雷之躍淵快飛騰儼冲舉兮増氣槩于山川鐵硯化為鐵劵兮同國祚之綿綿續蒲團賦毛愷予既續黄鵠先生中流砥柱賦矣先生又示以蒲團賦焉既伏讀之縱横馳騁極其辯博不待上林子虚已令人有飄然凌仙之想私心窃慨慕焉因復續之黄鍾畢奏瓦缶繼陳故知不倫矣其詞曰夫何有物之輪囷兮肆編蒲之所為質既柔而且温兮體圍圓而中規豈天孫之織巧兮庸畀夫静者之為繄君子之假憇兮曰維宜夫好修頋兹蒲之為物兮紛芊芊于河之滸謝芳敷于春風兮薄言采之于秋暮濯之以沸百之湯沭兮晞之以九曜之陽光迎鸞刀之既觧兮又擣之以𤣥石之琳琅于是弗縁機杼捆据成章製非示辱之鞭藉豈安車之箱爰為團席何用匪臧其為状也厚不踰寸闊不盈方平若周砥潔于截肪團團類月皎皎凝霜一經一緯有抑有揚層見叠出錯綜相當如鱗之次比甲之光熨帖外示藴藉中藏湘簟為之左次華氊于焉下堂諧孺子之木榻侣幼安之䔧牀彼芙蓉兮繡褥洎蜀錦兮文茵􅉊毺五色龍鬚千金皆豪貴之所事非有道之宜珍孰若兹物之樸雅遡幽貞之遐心當夫落花滿逕緑隂牕映南薫徐來簾垂晝永其盤薄也可以理素琴之無絃閲黄庭之内景又或銀河淺清紙帳夜明爐烟乍燼蝶夢未成其枕籍也可以委天地之至和吸沆瀣之元精至若縁諦白蓮之社跡㫁紅塵之境世諦盡脫凡慮悉屏趺坐堪結上乗之胎内觀可熟大丹之鼎然此特禪夫肥遯者之資而非志于吾道者之所湏也若乃挾以入孔氏之室坐以待周公之旦閉門著書期登道岸爾乃纎塵不凝匪石不巻參承座下罔辭困頓力佐夫下帷之憤功倍于懸梁之半是其為器也雖𦕈而其有助于崇徳廣業也亦豈片言可殫哉故顔生坐忘于心齋諸葛髙臥于廬間子厚見易于臯皮司馬警徳于枕端斯皆不出于几席而表聲光于四寰吾嘗有感于數子故兀然黙隠于蒲團轉注壺賦陳柏伊誰氏兮巧思爰範錫兮為壺既藏水以作鼎更畜火而為爐口孤懸兮峭直腸九曲兮廻迂其酌而注也隨多寡以為乗除其瀉而出也任緩急以為盈虚不寒不烈匪疾匪徐制既備夫衆美名應取諸六書爾其青春方麗白日末晡皓月流彩素雪平鋪奏妙曲於下廡飭嘉餚於中厨集文園之詞客㑹髙陽之酒徒因攘袂而長嘯爰拍手而狂呼興既乗兮不淺情復浹兮未疎相與欵洽寧復趦趄将千廵兮不足且一飲兮無餘厯舞筵兮傞傞入醉鄉兮蘧蘧曽知夫光隂之為過客與天壤之為寄居破硯賦孫七政嵗壬午之秋季予訪虎賁陳君於清溪之灣板屋棐几卉木萋然齋名卧雪破硯在焉展玩良久慨歎興憐遂援毫而賦之曰粤此硯之本來乃帝家之珍異穴端溪之片玉蘊溼雲之沈紫舍故墨于非烟溢餘光于星紀辨剥蝕于篆書識思陵之竒字年何代兮流落代何人兮撃碎别故井於頽垣将千年兮萬禩竝幽魅以為家隨刼灰兮共死始何為兮忽離終何故兮復萃将造物之無心何倚伏之多秘抑萬物之見重咸完合以珍傳獨将軍之寳此豈破離而棄捐謂缺陷之世界多毁好而忌全况此硯之離合實神物之㣲權惡全軀之非夫故玉碎於人間厭守故之未竒復葆光於重泉雖毁方而瓦合隠墻東而頽然辭匠石之小知獲懸觧之大年卒相時而顯晦效秦璽之輝纒始分交於有激終膠合於鳯弦噫嘻嗚呼君知之乎彼大塊兮為硯雖含黙而虚無一離一合兮幾摧琢一治一亂兮幾研磨何堅貞之不脆何太白之不汚豈若茲硯之似道得逍遥之妙避陽九於前元希明光之顯耀吾将佩此硯以為弦韋匿雕龍兮守𤣥豹孫生季子聞而歎曰世䘮形交道尊神合無用為用元光煒熠因復為之賛曰故井頽垣獲帝宮之佳玩破坳殘石竟合璧於文房千年廢棄一朝重刼灰為鄰溢精光古來聖哲多類此寳劔不死亦不亡輕車强弩賦樊鵬自古名将至漢衛霍李耿尚矣然皆以輕車彊弩立功絶域可考而知也時逺人亡缺于講究司馬松石劉公至則仰承上意宣布徳威勞心竭智逺求往古近咨羣議手造輕車强弩二事曲盡其妙朝夕教演士氣百倍套賊聞之徙其營數百里固匪直利戰守而已也為賦以識之其一輕車惟物有輪徑三尺一寸厥輪惟隻凡車皆雙輪此惟一輪輞濶四寸厚二寸輻貫于頭輻如常車頭木徑五寸以家榆槐木為之串樞中結樞即管軸以鉄為之重一觔五兩徑一寸串在軸外以鐵為之重六兩犬牙相制周旋僁僁戮力同心厯􅑶蹈臲居左有箱箱可以掇二塊塊長二尺一寸五分横一尺二寸三分取下則為二牌持以蔽身居前有牌猛獸以趃牌髙下四尺五寸横二尺八寸畫猛獸形如走状四目斯張火兵之穴上二眼發神鎗佛郎機有法三等髙一法逺一百步中五尺打馬上人以漸近下下二眼發銃前轅後軫施以梁柱前中轅二長四尺七寸後轅長二尺九寸五分肘轅二長五尺中箱傍䦨中箱兩傍䦨干髙一尺四寸五分立柱六卧板堅巨兩傍底板長二尺四寸五分濶九寸厚一寸八分上有穏坑䧟火銃其中坑末加鐡排椿以防銃後坐前後雙足前則二足活止則下地行則縣之長二尺四寸五分後二足不動長二尺後傍匣堅後匣髙六寸濶一尺四寸深九寸五分施軫上有盖以盛火藥左右兩箱各濶一尺五分髙四寸深七寸以盛鉛法子利刃森列開兩斧二鎗二鈎一小旗二龍筒欲吐中上施箭筒長二尺六寸濶七寸五分靣如九龍筒以放火箭夾耳夹耳以木為之荅背以毛蔴為之鐵鎻覼謱左右鉄鎻二條長六尺止則聨于鹿角環為營員者象天方者象地四象八卦各有倚附廣受重任萬事咸聚三人輓之可以超堵防守險要遏絶奔旅以壮國威用揚我武請問其名夫是之謂輕車其二彊弩惟物有肘中下峯起肘長二尺九寸前髙二寸七分濶一寸一分後髙二寸中肘下有眼髙二寸三分徑引䋲壘平如止水其上維何盖梁覆之盖髙七分長二尺六寸濶一寸一分其下維何虚中承舉厥容有槽所容惟一槽深三分半濶如之長二尺三寸厥發有機聽命行止機左右二以牛角為之長四寸五分濶一寸厚二分五厘鐵軸二各長一寸八分低昻以發矢下鐙上絆手持足履皆以鐵為之鐙方員長一尺五寸半二長七寸鐵拴一長一寸八分鐵軸一長一寸八分鐵弩盖絆一長四寸鐵軸一長一寸三分葢軸一長三寸弩牙角一塊長一寸濶一寸厚五分鐙以脚踏之上弓弦上手持端橫置弓兩弦抱倚弓長四尺六寸濶一寸六分弓稍桑木二長一尺五寸方二寸弓胎桑木二長二尺濶三寸厚二寸弓把桑木一長一尺濶二寸厚二寸弓靣牛角二長一尺八寸濶二寸弓弦二条每条用絲一兩五錢箭長六寸五分重四錢四分箭頭長一寸重二錢一三分共七寸五分重六錢五分前二分後三分有等厥色維黄厥形維嚭虎兕其力賁育莫比攻彊存弱適逺在邇體巨用細重本輕枝誅戮兇醜貫堅披靡風疾刄利動弗逾軌百發百中宣威萬里廣敗成功恭危不死既破鋭師亦攻固壘請問其名夫是之謂彊弩前破械賦徐渭嗟乎哉西河殘守東海孝婦差之豪釐千里岐路寸脰尺支二木一金昨日何重今日何輕其在今日也栩栩然莊生之為蝴蝶其在昨也蘧蘧然蝴蝶之為荘生後破械賦徐渭爰有一物制亦自斑鸛喙琴體乏絃乃偕二友木竇金紐與之為三脰及足手一人邇之不棺而朽多其髙義隨我四年我分殉之何心棄捐二三神明駕鵝其首司其去留為我撞剖嗟乎哉捶錢賦葉憲祖嵗丙寅余濫司鼔鑄之役故事錢非式者捶之因感其不才見棄有似乎人乃為之賦原夫周立九府秦等三幣操子母之權精郭輪之製足國便民斯惟其利象諸靣以尊王喻之泉而布地因以傳於中古是不一名五銖謝事赤仄代興呼繞床之阿堵冠童子以上清爰及明興水衡是掌局曰寳源百流所仰余承乏於司圜愧心計之惘惘陳而觀之美惡攸殊乃有非幼非壮不範不模違錯刀之金飾類綖環之薄膚盖萬選而莫中将一擲而若無於是命朱亥之椎碎鄧通之鑄紛如委地曽莫之顧若風前之榆莢兮零落而何依似禁中之蝶翅兮彫傷而孰䕶入君平之卜肆兮無媒掛阮郎之杖頭兮空慕讀選詞之銷漏信于今而不誤余乃喟然太息有感斯人一經廢置復進無因繄惟抱槧之子挾筴之賓眼迷日色額㸃河津痛劉蕡之下第歎季子之長貧乃至宦轍多岐君恩不保身依泌水之陽夢斷長安之道嗟屈子之将沉悵馮唐之未老亦有虎頭殊相猿臂自雄鏑未鳴於沙漠劍莫倚夫崆峒從軍失路荷㦸悽風若夫皜日盟寒紅顔命薄溝中之水徒寫怨於棄捐箧底之紈詎甘心於寂寞斯其揮斥異状寥落同悲惟余心之多戚覩斯物而顰眉吾所願者大造假我以爐鞲授我以鉗鎚使夫成毁一好醜齊爾各適其用而吾無所用其捶布賦徐獻忠邑人以布縷為業農甿之困藉以稍濟然其為生甚疲苦非若他郡邑蠶繅枲苧之業力少利倍者可同語也然天下所共夜被而詳其𠂻者甚寡于是核其事告諸觀風者作布賦客有至吴下邑覧織婦之布素歆卉物之流澤収島夷之末計啟閨房之長息廼喟然而歎曰美哉布也是固一匹可以愧盜心不得千金之償約者歟何齎者之逐逐而拾者之堇堇也下邑之士曰羅紈繡文素綈錦綾長裾交緯流景飛晶此居者之所揚輝而觀者之所凝睇也子不是慕而慕諸貧民之業亦有説乎客曰布通貴賤之服不擇温涼而適其為製也疏陋縑繒宻殊絹縠有􅉊毺之毛毳齊縞素之潔白賤靡綺之浮華傷貝錦之徒餙孺夫匹婦可濟其乏缺通都大邑與千乗之富相埒豈虚言哉曰子何不傷其勞而徒羡其美不稽其私而徒夸其㑹子亦欲聞其勞且病乎若乃鐵木相軋手挽足壓且餧且扐出絮吐核張弓挂弦弦急聲噎牽條絡車吚啞錯雜借光于膏繼夜于日心急忘寐力疲歌發衾簟空寒漏水寂溢婦子喧闐老穉畢力客曰若是勞乎曰未也嫠婦巻袖妖姬解珮含秋入機凝寒弄杼流蘇綰綜一伏一起踏躡相次上下不已縷斷苦接梭澀恐膩手習檻匡聲揚宫徴長夜凄然得尺望咫寒鷄喔喔觧軸趨市方是時也母聞謗而不暇投杼妻迎夫而帖然坐起客曰若是勞乎曰未也織婦抱凍龜手不顧匹夫懐饑奔走長路持莾莾者以入市恐精粗之不中數飾粉傅脂䕶持風露摩肩擘以授人騰口説而售我思得金之如攫媚賈師以如父幸而入選如脱重負坐守風簷平明返顧客曰若是勞乎曰未也婦辭機而望逺子牽裳而愬饑先潔釡而待米旋汲水而候炊語少待以相慰既久竚而始歸夫嬰嬰以捐涕云攘攘者在途索子錢而不釋併布母以如飛夫狼攫虎噉肉寒骨觧無一語之抗聲猶三􆃙而稱怪握兩手以授之拂空拳而吞欬雖卒嵗之靡從完小信而不怠是豈但一婦織而衣十人殆所謂一室肥而衆俱瘵者也客曰若是病乎曰未也海上之民土薄水淺其惡易遘枵腹者未知其税駕鶉夜者徒羡夫長袖夫廣儲豐積出自農夫之耕一絲寸縷皆從匹婦之手然而繭絲告成置蚕不問耕犂召豐於牛何有是固天下之同風惟江南為叢藪畮鍾之他税從升塗泥之末路計斗是以手不停機而終嵗無衣窮年仡仡而不贍其口客曰何言之過也滄海變遷化為陵陸禹土塗泥廕注滐淥禾黍芃芃滿家彌谷貧攜自墮富樹華屋婚媾靡靡徒侣簇簇顧今日之江南殆海内之樂國雖有布縷之征亦豈加於糓粟何徒抱杞人之憂損名都之望乎曰否否不然恒嵗之運水毁木饑消長相代前建後除陽九隂七聽命皇衹今昔庚申火仇馮夷炕令爍金天漢飛灰槁土沃焦赤地拆龜既葵藜之莫采亦木緜之變衰枝無垂菝絮罕葳蕤傾筐脫負采掇支離寡夫臃腫哲婦鴟夷里胥蹀躞督郵喧豗無尺寸之可縫况綱運之崔巍匪凶嵗之取盈抑國計之在兹當是時也雖使星婺獻技火鼠脫鬛罄大夏之全産省公儀之百室偪陽不懸於城雉匡廬借練於飛瀑亦何以應之客曰嗟哉下邑之民若是病乎曰未也工以習勝巧自技生傷末路之靡滛變素樸為華英始力作以助農終䌟麗以耀名競良工之巧思幻化國之神能於是飄絮若蓬刻縷若􅀢積嵗成匹累纎敵絨廣倍乎東海之二尺袤齊乎别渚之五虹鑿以團鳯繞以飛龍綴金章以錯縁變猩草之鮮紅爛太霞之朝采奪景烏之晶瑩袨已浮乎龍水綃何羡乎鮫宮葢其技巧始於渡海之黄嫗章聞出自戀闕之鉅公忘萬家之膏腴邀一日之歡悰傳觀内近遂入公宫一匹遂抵于千緡聫筐始逹于重瞳民已窮而益偪霜既結而氷從鳴呼嗟乎蒟醤竹杖天馬蒲萄通西國而開越嶲窮異詭而馳臆胸啟皇武之逺畧辠臣騫之作俑朝槿不思其暮落寒灰尚戀夫冬烘竟殘桃之取戾何獻曝之耿𠂻方今聖主龍飛問民疾苦諸非著令改不暖坐首蠲兹役䘏我隕仆尚衣之絺繡有章進御之浮靡不取免徭征之巨累思息肩而就臥雖紅紗之綱運尚存而貂璫之督課稍妥客乃瞿然作而言曰甚哉鄙人不知民之病苦若是也九月授衣猶以為晚終嵗作勞祁寒不免吾又何敢袖手以向人徒負暄而思暖明文海巻四十六
