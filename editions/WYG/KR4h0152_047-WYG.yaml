body:
  text: 明文海巻四十七餘姚黄宗羲編奏疏一上萬言書疏葉居升臣觀當今之事太過有三曰分封太侈也曰用刑太繁也曰求治太速也何以明之日者君之象也月者臣之象也五星者卿士庶人之象也臣愚不知星術姑以所聞於經傳并摭前世己行之得失者論之詩曰彼月而食則惟其常陰盛陽微則為不善矣今日刑於月猶之可也而曰日月相刑則月敢抗於日者臣敢抗於君矣切觀主上之有天下埽除羣雄如踐草芥包絡豪傑如臂使指今公卿大臣數十萬之衆戰必勝攻必取者朝廷遣一介之使召之則拱手聽命無敢後時況敢有抗衡者乎傳曰都城過百雉國之害也先王之制大都不過三國之一中五之一小九之一使上下等差各有定制上得以兼乎下下不得以兼乎上所以彊榦弱枝以遏亂源而崇治本也國家裂土分封使諸王各有分地以樹藩屏以復古制盖懲宋元孤立宗室不競之弊也然而秦晉燕齊梁楚吳閩諸國各盡其地而封之都城宫室之制廣狹大小亞於天子之都賜之以甲兵衛士之盛臣恐數世之後尾大不掉然後削其地而奪之權則起其怨如漢之七國晉之諸王否則恃險争衡否則擁衆入朝甚則縁間而起防之無及也此皇天眷顧之甚或者譴告以相刑之象歟今議者曰諸王皆天子親子也皆皇太子親叔也分地雖廣制度雖侈所謂犬牙相制磐石之宗天下服其强耳豈抗衡之禮邪書曰列爵惟五分土惟三今王亦爵也漢謂諸侯王亦不過三分之一耳禮莫大於分使王侯之國與京畿同則為列國矣尚有君臣之分乎今秦晉燕齊梁楚吳閩諸國皆連帶數十城而復優之以制假之以兵議者何不摭漢晉之事以觀之乎孝景皇帝漢髙帝之孫也七國之王皆景帝之同宗父兄子弟也當時一削其地則遽搆兵西向晉之諸王皆武帝之親子孫也易世之後迭相擁兵以危皇室遂成十國雲擾之患由此言之分封踰制禍患立生援古證今昭昭然矣此臣之所以為太過者歟昔賈誼勸漢文帝早分諸國之地以待諸王子孫謂力少則易使以義國小則無邪心向使文帝盡從誼之所言則必無七國之禍願及諸王未國之先節其都邑之制減其衛兵限其疆里亦以待封諸王之子孫此制一定然後諸王有聖賢之德行者入為輔相其餘世為藩輔可以與國同休世世無窮矣割一世之恩以制萬世之利以消天變以安社稷天下幸甚臣又觀厯代開國之君未有不以尚德緩刑而結於民心亦未有不以專事刑罰而失民心國祚長短悉由於此三代秦漢隋唐享國之數具在方冊昭然可觀其故何也易曰天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義此可以見天地好生之心與聖人守位之道矣然而禁民為非之義特居末者明不得已而用刑而不專任刑罰也古者斷死刑天子為之徹樂減膳而寓惨怛之意於其間誠以天生斯民立之司牧而教養之俱欲其並生於天地之間也然而不率教者入於其中則不得不刑耳故其仁愛之篤洽於民之肌膚淪於民之骨髓民思其德愈久而不忘故其子孫享國久逺者六七百年近者亦三四百年豈偶然而已哉今議者曰宋元中葉之後紀綱不振專事姑息賞罰無章以致亡滅此行小仁而滅大義雖有其位而不能守之主上所以痛懲其弊而矯枉之過者也故制不宥之刑權神變之法使人知懼而莫測其端也臣聞開基之主垂範百世一動一静必合準繩使子孫有所持守況刑者民之司命可不慎歟夫刑罰貴乎得中過與不及皆非天討有罪之意也使刑政不立而强暴得以相凌則國非其國矣若刑罰繁苛而政治促急則民無所措手足矣姑以當今刑罰言之笞杖徒流死今之五刑也用此五刑既無假貸一出乎大公至正可也而用刑之際多出聖衷致使治獄之吏務從深刻以趨求上意深刻者多獲功平允者多獲罪或至以贓罪多寡為殿最欲求治獄之平允豈易得哉近者特㫖雜犯死罪免死充軍其餘以次倣流徒律又刪定舊諸律條減宥有差此漸見寛宥全活者衆而主上好生之仁已藹然布乎宇内矣然未聞有戒治獄務從平允之條是以法司之治獄猶循舊弊雖有寛宥之名而未見有寛宥之實所謂實者在主上不在臣下也故必有罪疑惟輕之意而後好生之德洽於民心必有王三宥然後刑之政而後有囹圄空虚之效此非可以淺淺致也唐太宗謂侍臣曰鬻棺之家欲嵗之疫匪欲害於人欲利於棺售故耳今法司覈理一獄必求深刻以成其考今作何法使得平允太宗矯隋之暴刑罰務從寛宥猶患及此况今立嚴宻以矯寛縱能無是失何以明其然也古之為士者以登仕版為榮以罷職不叙為辱今之為士者以混迹無聞為福以受玷不辱為幸以屯田工役為必獲之罪以鞭笞箠楚為尋常之辱其始也朝廷取天下之士網羅捃摭務無遺逸有司催迫上道如捕重囚比至京師而除官名以貌選故所學或非其所聞而其所用或非其所學洎乎居官言動一跌於法茍免誅戮則必屯田工役之科所謂取之盡錙銖用之如泥沙率是為常少不顧惜然此亦豈人主樂為之事哉欲人之懼而不敢犯也切見數年以來誅殺亦可謂不細矣而犯者日月相踵豈下人不懼法哉良由激濁揚清之不明善惡賢愚之無别議賢議能之法既廢以致人不自勵而為善者怠宋程頥有言曰君子小人常相半也天下治則小人多化為君子而君子多於小人天下亂則君子多化為小人而小人多於君子此言在上之人有以化之耳有人於此亷如夷齊智如良平一或不謹少戾於法上之人將録其所長棄其所短而用之乎將舍其所長指其所短而寘之法乎茍取其所長而舍其所短則中庸之才争以為廉為智而成有用之君子矣茍取其所短棄其所長為善之人皆曰某亷若是某智若是少不如法朝廷不少貸之吾屬何所容其身乎致使今之居位者多無亷恥當未仕之時則修身畏慎動遵律法一入於官則以禁網嚴密朝不謀夕遂棄亷恥或事掊尅以修屯田工役之資者率皆是也若是非用刑之煩者乎漢之世徙大族於山陵矣未聞實之以罪人也今鳳陽皇陵所在龍興之地而率以罪人居之以怨嗟愁苦之聲充斥園邑非朝廷所以恭承宗廟意也近令就中願入籍者聽其免罪復官者宥之而猶聞有拘其餘丁家小在屯夫有罪之家長既赦而任之以職矣餘丁家小復何罪哉夫摧强敵壘則揚精鼔鋭奮三軍之氣攻之必克擒之必獲可矣今賊人偽四大王突竄山谷如狐如鼠無窟可追以計獲之庶或可得而乃勞重兵以討之使之驚駭潰散兼之深山大壑人跡不能追從之地與之較奔走則彼就熟路而輕行與之較生死則彼負必死之氣三軍之衆孰肯舍生而争鋒哉今捕之數年既無其方而乃歸咎於將附戸籍之細民而遷徙之騷動四十里之地鷄犬不得寧息况新附之民日前兵難流於他所朝廷許之復業而來歸者今既附籍矣乃取其數而盡遷之是法不信於民也夫有戸口而後田野闢田野闢而後賦稅増今責守令年増戸口正謂此也近者已納稅糧之家雖承特㫖分釋還家而其心猶不自定已起戸口雖䝉憐恤見留開封聽候今軍士散漫村落居民不知所為訛言驚動况太原諸郡外界邊鄙民心如此甚非安邊之計也臣恐自兹之後北郡戸口不復得増矣何者小民易動而難安今之小民以為新籍在官乃見遷徙反易逃匿若欲遷徙槩而遷之我奚先受其殃乎凡此皆臣所謂太過而足以召災異者也未見其可以結民心而延國祚者也晉郭璞有言曰陰陽錯繆皆煩刑所致今之天變豈非煩刑所致者乎臣願自今朝廷宜録大體赦小過明詔天下修舉八議之法嚴禁深刻之吏斷獄平允者則超遷苛刻聚斂者則罷黜至鳳陽屯田之制見在家小住屯者聽其耕種起科已逃戸口見留開封者悉放復業當差如此則人主足以隆好生之德以樹國祚長久之福兆民自安天變自消矣昔者周自文武至於成康而後教化大行漢自髙帝至於文景而後號稱富庶文王武王髙帝之才非不能使教化行以致富庶也盖天下之治亂氣化之轉移人心之趨向皆非一朝一夕之故致治之道固不可驟至今國家既紀元九年於兹偃兵息民天下大定綱紀大振法令修行亦可謂安矣而主上切切以民俗澆漓人不知懼法出而奸生令下而詐起故或朝誅而暮犯者有之昨日所進今日被戮者有之乃致令下而尋改已赦而復收天下臣民莫之適從而不能相安者甚不稱主上求治之心也臣愚謂天下趨於治也猶堅冰之將泮也冰之堅非太陽一日之光能消之也陽氣發生土脈微動和氣薫蒸然後融釋聖人之治天下亦猶是也刑以威之禮以導之漸民以仁摩民以義而後其化熈熈也孔子曰如有王者必世而後仁此非空言也况今之天下猶古之天下民俗雖漓而民好善惡惡之心則未嘗冺也因其好善惡惡之心以正風俗則求治之道在是矣求治之道莫先於正風俗正風俗之道莫先於使守令知所務使守令知所務莫先於使風憲知所重使風憲知所重莫先於朝廷知所尚朝廷知所尚則必以簿書期㑹獄訟錢穀之不報為可恕而世俗流失敗壞為不可不問而後正風俗之道得矣風俗既正天下其有不治者乎古之為郡守縣令為民之師帥則以正率下以善導民使化成俗美者也征賦期㑹獄訟簿書固其職也今之守令以戸口錢糧簿書獄訟為急務至於農桑學校王政之本乃視為虚文而置之不問將何以教養黎民哉以農桑言之方春州縣下一文帖里中回申文狀而已守令未嘗親㸃視種蒔次第旱澇預備之具也以學校言之廩膳生員國家資之以取人才之地也今各處師生缺員者多縱使具員守令亦鮮有以禮讓之實作其成器者朝廷切切以社學為重教民之急務屢行取勘師生姓名所習課業如是之詳今之社學當鎮城郭或但置門牌逺村僻處則又具其名耳守令亦未嘗以教養為己任徒具文案以備照刷而已及至憲司分部按臨亦但循習故常依紙上照刷亦未嘗差一人廵行㸃視興廢之實上下視為虚文如此小民不知孝弟忠信為何物争鬬之俗成奸詐之風熾而禮義亷恥埽地矣此守令未知所務之失也風紀之司所以代朝廷宣導風化訪察善惡條舉綱目拯治萬事至於聽訟讞獄其一事耳今專以獄訟為要務以獲賊多者為稱職以事蹟少者為闒茸一有不稱雖有忠臣孝子義夫節婦視為虚文末節而不暇舉若是謂之察惡亦近之矣所謂宣導風化者安在哉其始但知以去一贓吏決一獄訟為治而不知勸民成俗使民遷善逺罪為治之大者也此風憲未知所重之失也守令親民之官風憲親臨守令之官未知所務如此所以求善治而卒未能也王制論鄉秀士升於司徒曰選士司徒論其秀士而升於太學曰俊士大樂正又論造士之秀升諸司馬曰進士司馬辨論官材論定然後官之任官然後爵之其考之詳如此成周得人為盛今使天下郡邑生員考於禮部升於太學使厯練衆職任之以事可以洗厯代選舉之陋而上法成周之制矣然而郡邑生員升於太學或未數月遽選入官者間亦有之臣恐此輩未諳時政未熟朝廷禮法不能宣導德化上乖國政下困黎民雖曰國家養育之仁然世間竒材罕有如顔回耿弇鄧禹者固未可拘於常法雖賈誼之才漢朝以年少難任委之開國以來選舉秀才不為不多選任名位不為不重自今數之賢者寧有幾後之視今亦猶今之視昔昔年所舉之人豈不深可痛惜乎凡此皆臣所謂求治太速之過也大庖西上封事解縉臣伏奉聖㫖朕今命爾義則君臣恩猶父子當知毋不言古云爾有嘉猷嘉謀則入告爾后於内爾乃順之於外曰斯謀斯猷惟我后之德嗚呼人臣咸若時惟良顯哉臣謂成王於是失言矣厯觀載籍以來固以進諌之臣為善亦未嘗以納諌之主為非唐虞君臣更相勸戒更相推讓光昭不窮載為盛美昔人有譛魏徵於唐太宗者為其録前後諌章以視起居郎褚遂良雖未必然借令有之亦足垂世臣主同休停婚仆碑臣竊謂太宗怒非其怒矣陛下當同符堯舜師表百王豈宜下比太宗則非臣之所願望也臣願與臯䕫比肩不願與魏徵同列則臣之感恩服義懇切以為言者尤願陛下毋自狹小誠萬世一時也陛下挺生南服一統華夏功髙萬古此放勛也得國之正皆非漢唐宋所及真所謂取天下於群盜救生民於塗炭命將出師皆受成筭不假良平不倚信布徐定燕都市不易肆女寵外戚寺人藩鎮之患消融底定皆處之有法朕兆不萌矣不邇聲色不為逰畋既皆逺過於漢宋又何謙遜於唐虞惟願陛下篤惇信之本加慎獨之功登臨若對之功益加宻不覩不聞之地能無間雖處深宫之内亦如郊祀之時即前日郊祀之敬繼今日存養之功推所以愛臣之心以愛天下推所以待臣之恩以待萬物喜怒哀樂一聽於天理上下四旁一視而同仁以天地為一體以天下為一人令出惟行也不宜於數改刑期於無刑也寧失於不經故令數改則民疑疑則不信刑大繁則民玩玩則不清國初至今將二十載無幾時無變之法無一日無過之人陛下嘗教臣云世不絶賢豈億兆之衆果無一賢如古之人而盡皆不才者哉陛下嘗教臣云民不畏死奈何以死懼之良由陛下誠信之有間而用刑之大繁也宜其好善而善不顯惡惡而惡日滋者善未必䝉福而惡未必䝉禍也嘗聞陛下震怒鋤根剪蔓誅其奸逆矣未聞詔書褒一大善賞延於世復及其鄉尊榮奉恩始終如一者也或朝賞而暮戮或忽罪而忽赦施不測之辱則有之矣誠以陛下每多自悔之時輒有無及之歎是非私意使然也存養之功須臾未加宻耳是以有過不及也陛下天性素嚴或失於急克伐怨欲臣知陛下聖性所無也臣見陛下好觀說苑韻府雜書與所謂道德心經者臣竊謂甚非所宜也說苑出於劉向向之學不純溺於妄誕所取不經且多戰國縱横之論壞人心術莫此為甚韻府出元之陰氏鄙猥細儒學孤識陋蠅集一時兎園寒士抄緝穢蕪畧無可采陛下若喜其便於檢閱則願集一二志士儒英臣請得執筆而隨其後上泝唐虞夏商周孔之華奥下及関閩濓洛之佳葩根寔精明隨事類别以備勸戒刪其無益焚其謬妄勒成一經上接經史豈非太平制作之一端也歟今又六經殘闕而禮記出於漢儒踳駁尤甚宜及時刪改日御經筵訪求審樂之儒大備百王之典作樂書一經以惠萬世以承唐虞尊祀伏羲神農黄帝堯舜禹湯文武臯陶伊尹太公周公稷契夷益傅說箕子於太學而孔子則自天子達於庶人通祀以為先師而以顔曽子思孟子配自閔子以下各祭於其鄉而魯之闕里仍建叔梁紇廟贈以王爵而以顔路曽晳孔鯉配一洗厯代之因仍肇起天朝之文獻豈不盛哉若夫祀天宜復掃地之規尊祖宜備七廟之制奉天不宜為筵宴之所文淵未備夫館閣之隆太常非俗樂之可肄官妓非人道之所為禁絶娼優俾於變之民不遷於淫巧易制寺閹尊天子之貴不近於刑人執㦸陛墀皆為吉士虎賁趣馬悉用俊良雖門戸掃除之役命公卿子弟之賢任諸侯王於衆職定久任法而加封待臣子於一體示天下之為公除山澤之禁稅蠲務鎮之征商木輅朴居而土木之功勿起佈墾荒田而四邊之地勿貪釋老之壯者驅之俾復於人倫經呪之妄者火之俾絶其欺誑斷所謂瑜珈之教禁所謂符式之科絶鬼巫破淫祀省冗官減細縣痛懲法外之威刑永革京城之工役流十年而聽復杖八十以無加婦女非帷簿不修毋令逮繫大臣有過惡當誅不宜加辱治厯明時授民作事但伸播植之宜何用建除之謬方向煞神事甚無謂孤虚宜忌亦且不經東行西行之論天德月德之云臣料唐虞之厯必無此等之文所宜著者日月之行星辰之次仰觀俯察事合逆順七政之齊正此類也元首叢脞則股肱惰而萬事皆墮人君不以察為明帝德罔愆則民志應而天命用休人君惟以德為政陛下拳拳於畏天畏鬼神而所謂畏民者則未至也孳孳於治民治强暴而所以治心者猶未至也且粢盛之潔衣服之齊修舉之時儀文之備此畏天畏鬼神之末事也陛下豈誠以此為足以盡事天事鬼神之道哉簿書之期獄訟之斷詔誥之勤鉤鉅之巧此治民治强暴之支流也豈真以此為足以盡治民治强暴之術哉古云天視自我民視天聽自我民聽孔子曰聽訟吾猶人也必也使無訟乎惟一於敬則心即天祭不必凟而受無咎之福神不必勞而享無為之治與天地合其德日月合其明四時合其序而鬼神合其吉凶矣近年以來臺綱不肅果若人言以刑名輕重為能事以問囚多寡為勛勞甚非所以厲清要長風采也夫人自救過之不給何暇劾人之過人自以言為諱何能有諌諍之言御史糾彈皆承密㫖未聞舉善惟曰除奸毎聞上有赦宥則必故為執持意謂如此則上恩愈重而不知被赦之人疑上好諛此輩皆市井小人趨媚劬勞之細術陛下何不肝膽而鏡照之哉何嘗真有一夫持法固争謂某不當刑某當刑如舜曰殺之三而臯陶曰宥之三哉臣篤知陛下輕天下之士者皆此輩無以稱塞淵衷也然誰不願其父母妻子安榮哉所以諌諍寔難禍愆不測入人之罪或謂無私而出人之罪必疑受賄逢迎甚易而或䝉褒營救甚難而多得禍禍不止於一身刑必延乎親友誰肯舍父母妻子而批龍鱗犯天怒者哉陛下進人不擇於賢否授職不量於重輕建不為君用之法所謂取之盡錙銖置奸朋倚法之條所謂用之如泥沙監生進士經明行修而多困於州縣屈於下僚孝亷人材㝠蹈瞽趨而或布於朝省驟厯清華椎埋嚚悍之夫闒茸下愚之輩朝捐刀鑷暮擁冠裳左棄筐篋右綰組符剔履之賤衮繡巍峩負販之傭輿馬赫奕雖曰立賢無方亦盍忱詢有徳是故賢者羞為之等列庸人悉習其風流以貪婪茍免為得計以亷潔受刑為飾辭出於吏部者無賢否之分入於刑部者無枉直之判黜陟無章舉措乖方八議之條虚設五刑之律無常天下皆謂陛下任意喜怒為生殺而不知皆臣下之乏忠良也古者鄉隣善惡必記今雖有申明旌善之舉而無黨序鄉學之䂓互知之法雖嚴訓告之方未備序禮講學必有其地有其時先之以仁義而後之以法制則庶乎磨之有漸而行之有效如影之隨形也今也應故事立虚文善惡二字蕪穢而莫之顧長幼之民掉臂而不相揖紀綱不立節目無依勢使然也臣欲求古人治家之禮睦隣之法若右藍田吕氏之鄉約今義門鄭氏之家範布之天下世臣大族率先以勸旌之復之為民表率將見作新於變漸次時雍至於比屋可封不難矣陛下不可視為迂濶而不切當今之急務也陛下天資至髙合於道㣲百家神怪誕妄恍惚臣知陛下洞燭之矣然猶不免欲以愚弄天下若所謂以神道設教者臣謂不必然也一統之輿圖己定矣一時之人心已服矣一切之奸雄已慴矣天無變災民無患害聖躬康寧聖子神孫繼繼䋲䋲所謂得真符者矣何必興師以取寶為名諭衆以神仙為徵應謂有所謂某仙某神孚佑國家者哉且以傳國寶論之潞王從珂已焚之矣屢求屢得真偽莫明假令真有之則區區李斯之書秦政之制何足為寶哉周武之時未有神仙符應書之所載可見也已而古今享國之長未有如周者神仙釋老誕嫚恍惚何足稽哉臣觀地有盛衰物有盈歉而商稅之徵率皆定額是使其或盈也奸黠得以侵欺其歉也良善困於補納夏稅一也而茶椒有糧果絲有稅既稅於所産之地又稅於所過之津何其奪民之利至於如此之密也且多貧下之家不免抛荒之咎或疾病死喪逃亡棄失今日之土地無前日之生植而今日之徵聚有前日之稅糧里胥不為呈州縣不為理或賣産以供稅産去而稅存或禆辦以當役役重而民困又土田之髙下不均而起科之輕重無别或膏腴而税反輕瘠鹵而稅反重此丈量之際里胥之弊也欲拯其困而革其弊莫若行授田均田之法兼行常平義倉之舉積之以漸至有九年之食無難者臣愚所謂願除天下之征商者此也臣聞仲尼曰王公設險以守其國故小邑必有城隍重門擊柝以待暴客聖人之所制也而近世狃於宴安隳名城銷鋒鏑禁兵諱武以為太平一旦有不測之虞連郡至望風而靡良平不暇謀賁育不暇鬬武備隳之過也及今修治不宜動衆但勑有司以時整葺寛之以嵗月守之以里胥額設弓手課之以弓弩兼教民兵習之以兵農開武舉以收天下之英雄廣鄉校以延天下之俊乂古時多有書院遺基學田舊業貢土有莊義田有族皆宜興復而廣益之夫罪人不孥罰弗及嗣連坐起於秦法孥戮本於偽書今之為善者妻子未必䝉榮有過者里胥必䧟其罪唐虞之世四凶之罪止於流竄故殛鯀而相禹禹不以為仇舜不以為嫌況律以人倫為重而有給配婦女之條聽之於不義則又何取夫節義哉此化原之所由係也孔子曰名不正則言不順故賈生欲易服色而定官名尚書侍郎内侍也而以加於六卿郎中員外何職也而以名於六屬御史詞臣所以居寵臺閣郡守縣令不應迴避鄉邦同寅協恭相唱以禮而今内外百司捶楚屬官甚於奴𨽻是致柔懦之徒蕩無亷恥之節擎跽曲拳於進退下氣怡色而奔趨一為下官肌膚不保甚非所以長孝行厲節義也臣以為自今非犯罪惡解官笞杖之刑勿用催科督厲小有過差蒲鞭示辱亦足勸懲矣臣但知罄竭愚𠂻欲言固不止此奉命忖量急於陳獻所陳畧無次序亦不暇組織成文兾以將來取譽惟陛下幸垂鑒焉資治策疏王叔英臣聞天生斯民立之司牧而寄以三事曰庶富教是也為人君者將欲遂民之庶必先有以富之既富之然後可以教之今天下之民未甚庶未能從上之教者以富之之道有未至焉耳富之之道臣嘗讀大學而知之矣有曰生財有大道生之者衆食之者寡為之者疾用之者舒則財恒足矣是則平治天下之道寔本於此臣竊觀之天下凡有害於此者亦頗知其畧矣恒産未制而貧富不均賦斂未平而田多荒蕪此二者生之乏本之害也軍卒有多餘之丁而惟務於工商僧道有汚雜之衆而失力於耕稼民之務末者常勝而務本者常負此三者生之未衆之害也養兵太多而有徒食之軍冗食未汰而有素餐之員此二者食之未寡之害也官司役民或奪其時或盡其力此二者為之未疾之害也土地有可養之物而不養民粟有可儲之時而不儲民用有可省之費而不省此三者用之未舒之害也臣請而詳言之古者井田之制一夫授田百畆故民生業均一後世井田既廢故民業不均至於後魏有均田之法北齊有永業之制唐有口分世業之田雖非先王之道然亦庶幾使民有恒産者自唐以後恒産之制不行富强兼併至有田連阡陌者貧民無田可耕故往往租耕富民之田亦輸其收之半由是富者愈富貧者愈貧此恒産未制之害是以貧富不均也古者田皆在官故什一之稅通乎天下而賦斂以平後世田有官民之分稅有輕重之異官既事繁而需於民者多故田之係於民者其賦不得不重惟係於官者其賦輕而亦有過於重者官民之田肥瘠不等則賦稅有差然或造籍狥私以肥為瘠賦當輕而反重者往往有之若夫官田之賦雖比之民田為重而未必重於富民之租然輸之官倉道路既遥勞費不少收納之際其弊更多故亦或有甚於輸富民之租者由是官民之田其入有可輸富民之餘而又有可酬其力者民然後可得而耕其不然者則民不可得而耕矣此賦斂未平之害是以田多荒蕪也斯二者豈非有害於生之之本乎古者兵出於農則兵固自耕而食者也今為兵者既不耕而食於農者多而乂多餘丁不為商則為工是亦不耕而食於農者人之務末者衆而務本者寡寔由乎此此軍卒有多餘之丁可以裁減歸農而未裁減之故也古之為民者四曰士農工商而已後世益之以僧道而為民者六故務農者益寡況二氏之教本以清净無為為宗而後世為其徒者多由避徭役而托於此又倚其教能使人尊奉有不耕而食不蠶而衣之利由是為之者衆往往食肉飲酒華衣美食肆欲營利無異於汚民是則於其本教既忍違之況可律之以聖人之教乎其人可耕稼而不耕稼乃托佛老以為生無補於世道而有敗於風俗愚民不知彼之身己獲罪難免猶謂人之事彼者足以獲福且輟己之衣食以奉之其惑世誣民甚矣昔唐髙祖嘗議除之正以人之坐食者衆而資食者少寔由於此此僧道有汚雜之衆可以省除助農而未省除之故也古者制民之法以農為本故常厚之以商賈為末故常抑之後世抑末之法猶存而厚本之法毎病於費廣食衆不能行之故為商賈者益多然商賈獲利既厚而財貸有餘農民往往衣食不給反稱貸於商賈況又有工藝之家男女或盡棄耕織不務而施竒技淫巧為服用之物以漁厚利徒多費工力而無益於實用農人竭一家之力者或不足以當其一夫之獲積一嵗之收者或不足以侔其一旦之售由是務末者恒有餘而務本者恒不足斯三者豈非有害於生之未衆者乎古者天子六軍諸侯用兵不過三軍近世宋太祖定天下精兵不過二十萬十萬屯京師十萬屯外郡今京師之兵已十萬而在外郡者不知其幾以此推之今之兵過多而有徒食者可知矣天下賦斂之難平儲蓄之未豐實由於此昔唐虞稽古建官惟百夏商官倍亦克用乂後世事漸繁宻故官亦漸増然唐太宗省内外之宫定制七百三十員曰吾以此待天下之賢足矣今内外大小之官數以萬計以此推之今之官有冗員而多素餐者亦可知矣天下賦斂之難平儲蓄之難豐亦由於此斯二者豈非有害於食之未寡者乎古者用民嵗不過三日然役之必於農隙之時後世事繁故徭役寖多唐太宗制租庸調之法嵗不過役民二十日盖由其能省事故也故其法至今稱之今天下有司役民無度四時不息由其不能省事故也至於民稀州縣人丁應役不給丁丁當差男丁有故役及婦人奈何而民不窮困乎盖由州縣有應併省而不併省者其民既稀其役自繁是以民稠州縣雖不盡其力亦奪其時民稀州縣既奪其力又奪其時斯二者豈非有害於為之未疾者乎古者山林川澤與民共之所以春夏不失其時秋冬無愆其候則盈寕有象比户可封當此之際民無凍餒之虞亦鮮過用之費即有時或出於不得已而用有常經不踰其分至用不以時將祭祀至乏祭物或竭已貲而致衣食窘乏者用之必舉債於人而致田廬典賣者有之所謂民用有可省之費而不省者此也此三者豈非用之未舒之害耶凡此數者特其大略耳若其他固非臣之所能盡知而徧舉也陛下誠能因臣之所知而益求其所未知明其為害則除之明其為利則興之將見富庶之效不數年而可致而教化之行不難矣明文海巻四十七
