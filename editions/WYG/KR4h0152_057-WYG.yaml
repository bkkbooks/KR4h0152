body:
  text: 明文海巻五十七餘姚黄宗羲編奏疏十一時政切要疏張居正臣聞帝王之治天下有大本有急務正心脩身建極以為臣民之表率者圖治之大本也審機度勢更化冝民者救時之急務也大本雖立而不能更化以善治譬之琴瑟不調不解而更張之不可鼓也恭惟我皇上踐祚以來正身脩徳講學勤政惓惓以敬天法祖為心以節財愛民為務圖治之大本既已立矣但近來風俗人情積習生弊有頽靡不振之漸有極重難反之幾若不稍加更易恐無以新天下之耳目一天下之心志臣不揣愚陋日夜思惟謹就今時之所宜者條為六事開欵上請用備聖明採擇臣又自惟幸得以經術遭逢聖主備位輔弼朝夕與同事諸臣寅恭諧協凡有所見自可随事納忠似不必更有建白但臣之愚昹切見皇上有必為之志而淵𠂻静黙臣下莫能仰窺天下有願治之心而舊習因仍趨向未知所適故不敢避形迹披瀝上陳期於宣昭主徳而齊一衆志非有他也伏乞聖慈垂鑒俯賜施行天下幸甚臣愚幸甚一省議論臣聞天下之事慮之貴詳行之貴力謀在衆斷在於獨漢臣申公云為治不在多言顧力行何如耳臣竊見頃年以來朝廷之間議論太多或一事而甲可乙否或一人而朝夷暮跖或前後不覺背馳或毁譽自為矛盾是非淆於唇吻用舍决於愛憎政多紛更事無統紀又每見督撫等官初到地方即例有條陳一疏或謾言數事或更置數官文藻競工覽者每為所眩不曰此人有才即曰此人任事其實蒞任之始也地方利病豈盡周知屬官賢否豈能洞察不過採聽於衆口耳讀其詞藻雖若爛然究其指歸茫未有效比其乆也或并其自言者而忘之矣即如昨年皇上以賊内犯特勅廷臣集議防禦之䇿當其時衆言盈廷羣䇿畢舉今又將一年矣其所言者果盡舉行否乎其所行者果有實效否乎又如薊鎮之事初建議者曰吾欲云云當事者亦曰吾欲云云曾無幾何而將不相能士譁於伍異論繁興訛言踵至於是議罷練兵者又紛紛矣臣竊以為事無全利亦無全害人有所長亦有所短要在權利害之多寡酌長短之所冝委任責成庻克有濟今始則計慮未詳既以人言而行終則執守靡定又以人言而止加之愛惡交攻意見横出讒言微中飛語流傳尋之莫究其端聽者不勝其眩是以人懐疑貳動見譸張虚曠歳時成功難睹語曰多指亂視多言亂聽此最今之大患也伏望皇上自今以後勵精治理主宰化機掃無用之虚詞求躬行之實效欲為一事湏審之於初務求停當及計慮已審即斷而行之如唐憲宗之討淮蔡雖百方阻之而終不為之揺欲用一人須慎之於始務求相應既得其人則信而任之如魏文侯之任樂羊雖謗書盈篋而終不為之動再乞天語丁寧部院等衙門今後各冝仰體朝廷省事尚實之意一切章奏務從簡切是非可否須明白直陳毋得彼此推諉徒託虚言其大小臣工亦各冝秉公持正以誠心直道相與以勉修職業為務反薄歸厚尚質省文庻治理可興而風俗可變也一振紀綱臣聞人君以一身而居兆民之上臨制四海之廣所以能使天下皆服從其教令整齊而不亂者紀綱而已綱如網之有繩紀如絲之有總詩曰勉勉我王綱紀四方此人主太阿之柄不可一日而倒持者也臣竊見近年以來紀綱不肅法度不行上下務為姑息百事悉從委狥以模稜两可謂之調停以委曲遷就謂之善處法之所加唯在於微賤而强梗者雖壊法干紀而莫之誰何禮之所制反在於朝廷而為下者或越理犯分而恬不知畏將陵替之風漸成指臂之勢難使賈誼所謂􅏓盭者深可慮也然人情習玩已乆驟一振之必將曰此拂人之情者也又將曰此務為操切者也臣請有以解之夫狥情之與順情名雖同而實則異振作之與操切事若近而用則殊盖順情者因人情之所同欲者而施之大學所謂民之所好好之民之所惡惡之者也若狥情則不顧理之是非事之可否而惟人情之是便而已振作者謂整齊嚴肅懸法以示民而使之不敢犯孔子所謂道之以徳齊之以禮者也若操切則為嚴刑峻法虐使其民而已故情可順而不可狥法冝嚴而不冝猛伏望皇上奮乾剛之斷普離照之明張法紀以肅羣工攬權綱而貞百度刑賞予奪一歸之公道而不必曲狥乎私情政教號令必斷於宸𠂻而無致紛更於浮議法所當加雖貴近不宥事有所枉雖疎賤必申仍乞勅下都察院查照嘉靖初年初定憲綱事理再加申飭秉持公論振揚風紀以佐皇上明作勵精之治庻體統正朝廷尊而下有法守矣一重詔令臣聞君者主令者也臣者行君之令而致之民者也君不主令則無威臣不行君之令而致之民則無法斯大亂之道也臣看得舊規凡各衙門章奏奉㫖有某部看了來説者必是𦂳關事情重大機務有某部知道者雖若稍緩亦必合行事務或關係各地方民情利病該衙門自冝叅酌緩急次第題覆至於發自聖𠂻特降勅諭者又與泛常不同尤冝上𦂳奉行事乃無壅蓋天子之號令譬之風霆若風不能動而霆不能擊則造化之機滯而乾坤之用息矣臣竊見近日以來朝廷詔㫖廢格不行抄到各衙門槩從停閣或已題奉欽依一切視為故紙禁之不止令之不從至於應勘應報奉㫖行下者各地方官尤屬遲慢有查勘一事而數十年不完者文巻委積多致沉埋干證之人半在鬼録年月既逺事多失真遂使漏網終逃國有不申之法覆盆自苦人懐不白之寃是非何由而明賞罰何由而當伏望勅下部院等衙門凡大小事務既奉明㫖須數日之内即行題覆若事理了然明白易見者即行據理剖斷毋但諉之撫按議處以致躭延其有合行議勘問奏亦要酌量事情緩急道里逺近嚴立期限責令上𦂳奏報該部置立號簿登記註銷如有違限不行奏報者從實查叅坐以違制之罪吏部即以此考其勤惰以為賢否然後人思盡職而事無壅滯一覈名實臣聞人主之所以馭其臣者賞罰用舍而已欲用舍賞罰之當在於綜覈名實而已臣每見朝廷欲用一人當事者輙有乏才之歎切以為古今人才不甚相逺人主操用舍予奪之權以奔走天下之士何求而不得而曰世無才焉臣不信也惟名實之不覈揀擇之不精所用非其所急所取非其所求則上之爵賞不重而人懐僥倖之心牛驥以並駕而俱疲工拙以混吹而莫辨才惡得而不乏事惡得而有濟哉臣請畧言其槩夫噐必試而後知其利鈍馬必試而後知其駑良今用人則不然稱人之才不必試之以事任之以事不必更考其成及至僨事之時又未必明正其罪椎魯少文者以無用見譏而大言無當者以虛聲叨譽倜儻抗直者以忤時難合而脂韋逢時者以巧宦易容其才雖可用也或以卑微而輕忽之其才本無取也或以名髙而尊禮之或因一事之善而終身借之以為資或因一動之差而衆口訾之以為病加以官不乆任事不責成更調太繁遷轉太驟資格太拘毁譽失實又有一種風尚士大夫務為聲稱舍其職業反屬茫昧主錢榖者不知出納之數司刑名者未諳律例之文官守既失事何由舉凡此皆所謂名與實爽者也如此則真才實能之士何由得進而百官有司之職何由得舉哉故臣妄以為世不患無才患無用才之道如得其道則舉天下之事唯上之所欲為無不應者臣願皇上慎重名噐愛惜爵賞用人必考其終授任必求其當有功於國家即千金之賞通侯之印亦不冝吝無功於國家雖嚬笑之微敝袴之賤亦勿輕予仍乞勅下吏部嚴考課之法審名實之歸遵照祖宗舊規凡京官及三六年考滿毋得槩引復職濫給恩典湏明白開具稱職平常不稱職以為殿最若其功過未大顯著未可遽行黜陟者乞將誥勅勲階等項酌量裁與稍加差等以示激勸至於用舍進退一以功實為凖毋徒眩於聲名毋盡拘於資格毋揺之以毁譽毋雜之以愛憎毋以一事槩其平生毋以一𤯝掩其大節在京各衙門佐貳官須量其才噐之所宜者授之平居則使之講究職業贊佐長官如將官庫所儲盡行催解以致各省庫藏空虚水旱災傷視民之死而不能賑两廣軍兵供餉百出而不能支是國未充而元氣已耗矣臣切以為天之生財在官在民止有此數譬之於人禀賦强弱自有分别善飬生者惟撙節愛惜不以嗜欲戕之亦皆足以却病而延夀昔漢昭帝承武帝多事之後海内虛耗霍光佐之節儉省用與民休息行之數年百姓阜安國用遂足然則與其設法征求索之於有限之數以病民孰若加意省儉取之於自足之中以厚下乎仰惟皇上即位以來凡諸齋醮土木淫侈之費悉行停革雖大禹之克勤克儉不是過矣然臣以為矯枉者必過其正當民窮財盡之時若不痛加省節恐不能救也伏望皇上軫念民窮加惠邦本於凡不急工程無益徴辦一切停免敦尚儉素以為天下先仍乞勅下吏部慎選良吏牧飬小民其守令賢否殿最惟以守已端潔實心愛民者乃與上考稱職不次擢用若但善事上官幹理簿書而無實政於百姓者雖有才能幹局止與中考其貪汚顯著者不必引例發遣但將所犯贓私嚴行追併押發各邊自行輸納完日發囘原籍為民不但懲貪亦可為實邊之一助再長官有缺即以佐貳代之不必另索其屬官有諳練故事盡心官守者九年任滿亦照吏部陞授京職或即轉本衙門堂上官小九卿堂上官品級相同者不必更相調補各處廵撫官果於地方相宜乆任者或就彼加秩不必又遷他省布按二司官如叅議乆者即可陞叅政僉事乆者即可陞副使不必互轉數易以滋勞擾如此則人有専職事有責成人材亦不患其缺乏矣一固邦本臣聞帝王之治欲攘外者必先安内書曰民惟邦本本固邦寧自古雖極治之時不能無賊盗之患惟百姓安樂家給人足雖有外患而邦本深固自可無虞惟自百姓愁苦思亂民不聊生然後盗賊乗之而起蓋安民可與行義而危民易與為非其勢然也恭惟皇上嗣登大寳首下蠲恤之詔黎元忻忻方切更生獨昨歳以元年蠲賦一半國用不足又邊費重大内帑空乏不得已差四御史分道督賦三都御史清理屯鹽皆一切權冝以佐國用之急而人遂有苦其搜括者臣近日訪之外論皆稱不便縁各御史差出目覩百姓窮苦亦無别法清查止乞勅下户部悉心講求財用之所以日匱者其弊何在今欲措理其道何由今風俗侈靡官民服舍俱無限制外之豪强兼并賦後不均花分詭寄恃頑不納田糧偏累小民官府造作侵欺冐破奸徒罔利有名無實各衙門在官錢糧漫無稽查假公濟私官吏滋弊凡此耗財病民之大者若求其害財者而去之則亦何必索之於勞苦之民而自耗國家之元氣乎前項催督御史事完之後宜即令囘京此後不必再差重為地方之病其屯鹽各差都御史應否取囘别用但責成於該管撫按使之悉心清理亦乞勅下該部從長計議具奏定奪以後上下惟務清心省事安静不擾庻民生可遂而邦本獲寧也一飭戎備臣惟當今之事可慮者莫重於邊防廟堂之上所當日夜圖畫者亦莫急於邊防邇年以來患日深邊事乆廢比者屢䝉聖諭嚴飭邊臣人人思奮一時督撫將令等官頗稱得人目前守禦似亦畧備矣然臣以為不一創之其患不止但戰乃危事未可易言須從容審圖以計勝之耳今之上䇿莫如自治而其機要所在惟在皇上赫然奮發先定聖志聖志定而懐忠藴謀之士得效於前矣今談者皆曰吾兵不多食不足將帥不得其人臣以為此三者不足患也夫兵不患少而患弱今軍伍雖缺而糧籍俱存若能按籍徴求清查影占随宜募補着實訓練何患無兵損無用不急之費併其財力以撫飬戰鬬之士何患無財懸重賞以勸有功寛文法以伸將權則忠勇之夫孰不思奮又何患於無將臣之所患特患中國無奮勵激發之志因循怠玩姑務偷安則雖有兵食良將亦恐不能有為耳故臣願皇上急先自治之圖堅定必為之志屬任謀臣脩舉實政不求近功不忘有事熟計而審行之不出五年邊可安矣至於目今自守之䇿莫要於選擇邊吏團練鄉兵併守墩堡令民耕牧時簡精銳出其空虚以制之㓂即入犯亦可不至大失此數者昨雖已經閣部議行臣愚猶恐人心玩愒日乆尚以彌文塞責伏乞勅下兵部申飭各邊督撫務將前事着實舉行俟秋防畢日嚴查有無實效大行賞罰庻沿邊諸郡在在有備而不敢窺也再照祖宗時京營之兵數十萬今雖不足尚可得八九萬人若使訓練有方亦豈盡皆無用但士習驕惰法令難行雖春秋操練徒虚文耳臣考之古禮及我祖宗故事俱有大閲之禮以習武事而戒不虞今京城内外守備单弱臣常以為憂伏乞勅下戎攻大臣申嚴軍政設法訓練毎歳或間歳季冬農隙之時恭請聖駕親臨校閲一以試將官之賢否一以觀軍士之勇怯有技藝精者分别賞賚老弱不堪者即行汰易如此不惟使輦轂之下常有數萬精兵得居重馭輕之道且此一舉動傳之逺近皆知皇上加意武偹整飭戎事亦足以伐敵人之謀銷未萌之患誠轉弱為强之一機也明制體以重王言疏張居正竊照閣臣之職專一視草代言故其官謂之知制誥若制詞失體以致輕䙝王言則閣臣為不職矣謹按舊規凡官員應給誥勅該部題奉欽依手本到閣撰述官先具稿送臣等看詳改定謄冩進呈候批紅發下撰述官用關防掛號然後發中書舍人冩軸用寳此定制也至於制命之詞貴在簡嚴莊重乃為得體查得成化𢎞治間誥勅叙本身履歴功績不過百餘字祖父母父母妻室不過六七十字至於慶典覃恩則其詞尤簡盖以恩例槩及比之考績不同故以賚被為榮不必詳其閲歴此制體也近年以來俗尚干求辭多浮靡撰述官沿襲宿弊徃徃不候進呈先將文稿傳示於人其中詞語又過為誇侈多至百千言或本無實行虛為頌美或事渉幽隐極力宣揚臣等方欲為之更定而本官已先得稿登軸矣夫誥勅者朝廷所以告諭臣下者也臣諛其君猶謂之佞况以上諛下是何理乎查得嘉靖十二年該大學士張孚敬等題為重誥勅事奉世宗肅皇帝聖㫖卿等所言已足見敬慎至意近年以來委的誥詞之文浮泛誇譽至於數百甚非制體甚非王言今後都着删去浮詞以存實體欽此又該本官題為前事叅論制勅房辦事大理寺評事岳梁撰擬南京兵部尚書陶琰贈官誥文浮詞誇誕又不先送内閣看詳輙便進呈等因奉世宗肅皇帝聖㫖卿等另撰誥文來看岳梁騁賣浮詞蔑視制詞不遵前㫖着法司提問欽此此時嘉靖初年誥勅之文視成化𢎞治雖為稍繁然尚未如近年之甚也竊以禮貴從先辭尚體要况命令之辭乃一代典制傳之四方垂之後世所關非小此係臣等職掌不容不為釐正伏乞皇上念朝廷體統之當尊國家典制之當守勅下臣等戒諭各撰述官自今以後凡為制誥必須復古崇實毋得狥情飾辭以壞制體及文字未經進呈亦毋得預行傳示以市私交如此庻王言重國體尊而臣等亦得以守其常職矣申明冠禮疏孫存禮部主客清吏司署郎中主事臣孫存謹奏為申明冠禮事近該臣奏請皇帝陛下舉行冠禮伏䝉勅下禮部覆題奉聖㫖是既先朝俱未舉行罷欽此欽遵臣有以仰窺陛下虛心聽納無意無必之盛節矣盖本部言家語載孔子謂人君治成人之事者何冠之有肆我英宗皇帝武宗皇帝俱未舉行冠禮陛下因是其言而罷之若本部詳言天子冠禮乃我太祖髙皇帝之聖制與歴代之所已行則陛下亦且是其言而行之矣臣謹按家語周公使祝雍頌曰令月吉日王始加元服去王㓜志思服衮職欽若昊天六合是式率爾祖考永永無極此周公之冠禮也歴漢魏晉唐帝冠之禮大率祖之博物記漢孝昭帝冠辭曰陛下摛顯先帝之光輝以承皇天之嘉祐欽奉仲春之吉辰普遵大道之郊域秉率百福之休靈始加昭明之元服推逺冲孺之㓜志藴藉文武之純徳肅勤髙祖之清廟六合之内靡不承式永永與天無極後漢書正月甲子若丙子為吉日可加元服儀從冠禮乗輿初服緇布進賢次爵弁次通天皆於髙祖廟以禮謁見世祖廟又興平元年正月甲子帝加元服司徒淳于嘉為賔加賜𤣥纁駟馬此漢天子之冠禮也三國志魏天子冠一加其說與家語相發明曰士禮三加加有成也至於天子無加數之文者將以踐阼臨下尊極徳備豈得與士同也此魏帝之冠禮也晉書穆帝孝武帝將冠皆先以幣告廟訖又廟見江左諸帝將冠金石宿設百僚陪位又預於殿上舖大牀御府令奉冕幘簪導衮服以授侍中常侍太尉加幘太保加冕太尉跪讀祝文曰令月吉日始加元服皇帝穆穆思𢎞衮職欽若昊天六合是式率遵祖考永永無極眉夀維祺介兹景福加冠訖侍中繫𤣥紞常侍脱帝絳紗服加衮服事畢太保率羣臣奉觴上夀王公以下三稱萬歳乃退此晉天子之冠禮也唐書四曰嘉禮皇帝始加元服有司卜日告於天地宗廟祝曰令月吉日始加元服夀考維祺以介景福乃冠此唐天子之冠禮也今曰天子無冠禮然則彼皆非與我太祖超越百王親集五禮其制天子冠禮盖取諸周奏告郊廟百僚陪位行禮殿上進醴稱賀盖取諸晉一加冕冠盖取諸魏祝詞爾雅盖取諸唐今陛下將冠誠述我太祖之禮而行之幣告於天地宗廟詔告於文武羣臣於奉天正殿行之以文武大臣攝之太師太尉相之使臣子喜哉遂其嵩呼舞蹈之賀則四海之民聞之舉忻忻然有喜色而相告曰明天子冠矣復行太祖之政矣天下自此太平也豈不光明俊偉哉乃若今之所行以巍巍天子之冠禮官不與其儀史臣不書其事天地無奏告之文臣民無慶賀之節不相之以元老大臣而相之以近習閽寺不行之於當陽正衙而行之於燕居寢殿竊為聖明惜之且臣之所論者非謂陛下不行三加之禮為不重人道之始也謂陛下不行一加之禮為不偹冠禮之儀也盖三加者士之冠禮載諸儀禮者是也自元子以下皆然天下無生而貴者故也一加者天子之冠禮行於周王衍于魏人備載於大明集禮者是也惟天子行之其禮異於士則義亦異於士矣士之冠禮成人之禮也君之冠禮君人之禮也家語所謂人君不冠者謂人君不行士之冠禮也乃謂人君不行人君之冠禮可乎况家語文不類於六經義或繆于聖人殆不可盡信之書也若大明集禮之冠禮本之周公監於歴代而折𠂻於吾聖祖乃無非可行之成憲也我聖祖嘗命羣臣議毋服古今言人人殊乃斷自宸𠂻著為定制而曰禮樂征伐自天子出正以三代之禮不相沿襲時王之制所當遵守凡所著定者皆精神心術之運萬世不易之定體也若以天子冠禮之制為有戾於孔子之言則我聖祖萬幾之暇博極群書豈獨遺家語而必欲從周公之制哉殆必有槩於中而損之益之以適厥中耳惟我英宗武宗未行冠禮則亦當時之疑議也與其法當時之疑議孰若法聖祖不刋之成憲耶其有謂周公以叔父攝位故冠成王以成人之禮非後世臣下可同也臣謂此言尤謬大抵成王君也周公臣也君臣之義無所逃於天地之間而何有於叔父何有於居攝惟如此而後天下之為君臣者定故有周君臣之分猶萬世君臣之分也周公可以舉冠於成王固知冠禮未有不可行於天子也今陛下冠期日近而臣復凟宸聦無及於事而祗蹈干冐天威之罪但心有所懐不得不盡倘䝉聖明採擇則大婚尚在半月之後尚可改卜日行也臣言之後恐有以非正月甲子為言者則漢惠帝冠以三月固不必正月可冠也伏望皇上仰遵祖訓俯賜宸斷訪於元老儒臣毅然復行隆古之禮則修已化民之大端而敬天法祖之一道也臣極知方今天下之事甚有大於此者則陛下有股肱之寄有耳目之司有諤諤之六卿有師師之庻職夫既已言之矣如臣卑微愚昧徒陳一節之禮猶弗可底行尚敢他説哉臣不勝隕越待罪之至先夫子曰孫存字性父滁陽人官至河南布政使所著豐山集文亦應酬畧兼理學乞行攀送梓宫䟽孫繼臯奏為古今大綱常必不可虧國家大典禮必不可缺冐懇聖明扶疾攀送母后以光聖人大孝慰寰海同情事臣於本月十五日忽禮部接出聖㫖朕自閏八月初旬偶爾痰流注於左足動履不便今大行皇妣引發朕不能恭行攀送不勝哀慟着遣獻代行卿還傳示務要䖍潔敬慎恭誠供事欽此臣再三捧誦再三思維於所謂痰注左足動履不便者而見聖情之萬不獲已也於所謂䖍潔敬慎恭誠供事者而見聖心之萬不獲安也雖然皇上綱常之主而典禮之宗也兹舉而遂皇上異日必自追悔又必將追咎羣臣不言而以為朝廷無人臣敢先言之以無勤皇上悔可乎夫皇上大孝聞天下乆矣毋論母后生前極天下飬即初逝而成服皇上且奔且哭哭極哀外廷所聞也上慈謚奏册寳登降薦獻戚與禮步而過宫門而後登輿外廷所見也盖天生大聖人其舉動不愆徃徃若此矣今只一攀送而以疾格九仭一簣臣竊為皇上惜之且皇上不出宫眷必不得帷而至午門神帛朝祖必且降而藉奠獻使手宫眷即不送其小者也神帛何帛朝祖何事奠獻使何人而猥令䙝凟不知母后之神靈肯於帛乎慿依否耶列聖在天之神靈肯於使乎降鍳否耶古人於親䘮雖小物細故必誠必信必躬必親而今却於大處不無虧缺也臣又為皇上重惜之然而皇上固曰吾適於痰弗良於行耳臣請有以進今夫禮居䘮無沐浴飲酒食肉而有沐浴飲酒食肉者疾故也皇上誠適於痰弗良於行即輿而出午門等門掖而成禮何弗可者親之䘮達乎天子在所自致而已事關大綱常大典禮四海觀刑萬代瞻仰實在兹舉臣不勝狗馬之心攄其愚忠惟皇上深思力行勿之有悔臣冐昧陳言無任惶恐待罪之至史職疏張位臣聞古者左史記動右史記言故當時聖君明臣經世之蹟炳然侈於後觀厯代建置不同厥任均重我祖宗尚設起居注官故聖政記日厯諸書謨烈孔彰允為昭代啓佑之典後因詳定史職以翰林修撰編修撿討專任紀載之事而起居注遂罷今國史之員雖設其名存其實廢矣臣頃偹員纂修切見先朝政事不過櫽括章疏之存者紀之若非出於詔令形諸建白則近者以無據而畧逺者以不知而遺中間精神脉絡每每不相聯貫致使聖代鴻猷茂烈鬱而未章非所以嫓前徽而光後範也舊聞史氏中亦有随所覩記暗疏之者因事無專責徃徃中輟紀載既失其職徒令野史流傳淆亂失真甚亡謂也况不值纂修則史官充位無以自效徒日費大官供給循名責實其將謂何兹事關係不細舉世知之以為冝復乆矣恭遇聖厯更新明良㑹合凡典學勤政都俞儆戒盛美之事有不見於章疏而為中外傳誦者甚多紀載無徴誠為缺典夫當職而不能舉守官之恥也主上明聖而徳不布聞有司之過也以臣愚見今不必大為更張别創名秩第令見在諸臣日輪數人進直史舘候有明㫖及朝講召對宫禁逰習凡一言一行為師保所及知者謹㨿見聞敬紀之其各衙門所奏所行大事疏下六科亦㨿縁繇紀其節畧藏之秘府以備叅考且今之史臣將以儲講論弼直之選者學古而未通今奚以待用誠使之日有見聞明習國家政體異時備顧問當大事不患無具夫天下事不知其非而安之猶可言也今明知之轉移無難逡廵莫肯先發欲何待也臣切憂之不特此一事為然伏乞勅下閣部㑹同計議如果臣言可采事體無礙特賜斟酌施行則盛美傳而國典備職業修人才儲於治道未必無補萬一矣建輔城定兵制疏張位奏為建輔城定兵制以鞏萬年皇圖事臣聞之易曰王公設險以守其國書曰申畫郊圻慎固封守以康四海盖險不設則不可守國尊嚴王畿則根本固而天下䝉安國家定鼎燕京雄勝超越九重居尊三面鄰邊固與前代建都中原者不同成祖文皇帝三犂北庭力强盛草創建設以竢後人念自大寧撤防東勝失守關隘彌近拱衛冝嚴今京東距薊鎮不二百里京西去宣鎮不四百里東南之去天津海口不二百里西南之去紫荆關路不三百里朝衝隘口夕抵郊原鐡騎乗風勢不可遏夫以至重之地而伏至危之形防䕶未周形勝未備咸抱隐憂乆矣嘉靖庚戌年間敵騎闖入邊關徑至城下輦轂萬姓米㸑所需城門一關内外交阻况今北邊騷動倭防正殷桑土綢繆尤當亟慮臣竊以為冝於近京周圍十里内外卜擇水土善利要害處所特建輔城四座䕶衛京師每城置兵萬人内設營房以處軍士外設教塲照常操練聲勢犄角有恃無恐猝有外患城門可開合遵照祖宗五軍舊制即以三大營見操官兵為中軍大營其四城應撥營兵各萬分練或查取京衛五十四屯及京營三屯餘丁挑選精壯以充其數擇前後左右五府見任官知軍事者統之俱聽戎政大臣節制偏禆將領一視大營之制城内兼置倉塲各貯一年芻粟再設憲司文臣二員監􅋵督餉令熟兵事以儲邊才量撥近城田地給軍耕種以優飬贍四隅聯絡墩堡以嚴守望周遭開通溝洫栽植樹木以扼戎馬險足以守兵足以防此真國家强本之圖萬年不㧞之計也嘗考漢設南北二軍宋設禁廂二軍彼此相制為安我太祖定鼎金陵長江天險復設浦子口大營屯兵積餉具有深意伏見今之講武者但計兵力不考兵制盖兵弱則有耗費之患而兵强則有肘腋之虞虎豹在山牙爪自恃尾大不掉輕重倒持冝令各將官於營軍中揀擇壯勇千百名稍厚廩餼常置左右即以此千百人充伍長甲正部隊名色視將領官職崇卑以定多寡差等俾名分相維苦樂相通臂指可使緩急可頼或一營掲挺彼此勢足以相制或一夫脱巾上下力足以相鈐分數既明多多益善此又為將領强本不特可行於京營而且可行於各邊者也若言四輔之城兵力尚少則請於畿甸八府州縣民壯中再行挑選充數或以入班之軍酌量凑補或以召募之衆事寧續增仍令廵視京營科道官一體稽閲此制一定不惟可壯居重馭輕之勢且可弭驕悍譟呼之事矣或謂營建多費時詘舉贏然乆逺之圖豈必旦夕之就期以數歳何患其遲或謂守在四邊在徳非險若為堂奥之備恐示張皇之形徒襲常談終誤大事盖非常之原黎民所懼及臻厥成天下晏如今夫冨人之家欲防外侮必須固籓籬守門户而後室家即安戒僮僕嚴備禦而後盗賊難犯今建城制兵之議是即固守備禦之䇿也庻人且能為一家謀况以天子之尊可不為皇居萬世計乎謹繪城圖一幅恭進御覽伏乞勅下該部及時㑹議待邊事稍寧次第舉行宗社生靈不勝幸甚明文海巻五十七
