body:
  text: 明文海巻五十九餘姚黄宗羲編奏疏十三乞休第一疏徐學謨為感恩披瀝少白愚𠂻乞賜罷歸以謝人言以全國體事近該通政司參議梁子琦以覆閲夀宫不與疑臣阻抑特疏論臣欺㒺奉聖㫖朝廷吉典如何逞忿争勝揑情奏擾該衙門知道欽此仰惟皇上日月之明斥讒申枉臣方感激天恩之不暇夫復何言但相擇始末無由上徹於九重則臣之心迹尚未明也故敢控於君父之前臣查得本年二月間皇上穆卜夀宫命國公徐文璧大學士張四維司禮監太監張宏等前去相擇仍於内外官員有諳曉地理見在京者令臣開名來看臣因訪得新陞南京刑部尚書陳道基通政司參議梁子琦朝覲貴州僉事胡宥素講風水奏同前去踏看臣誠何心哉不過欲集思廣益以贊成聖天子萬年營兆之祥耳是臣於子琦薦之也非欲傾之也顧子琦稟性執拗出言誇誕每至一地動輙喧争衆之所是彼必以為非衆之所非彼必以為是于是與陳道基等欽天監官張邦垣等術士連世昌等徃徃梗議幾至攘臂臣始竊鄙之矣後乃復自獻八地為説附圖其説有景陵不吉致英宗土木之難等語臣不勝駭異夫士庻之家作一善事猶圖吉兆當此穆卜之初乃忍言臣子諱言之事今其圖説尚在御前可驗也何其狂悖無忌哉幸皇上不加之罪子琦愈益肆志比奉㫖重閲臣與工部尚書楊巍等以其所獻八地同子琦逐處踏看除蔡家山長嶺山東井右邊平岡地景陵左山等處即子琦亦以為備數雖皆遍歴統無足觀惟所稱珠窩圈絶佳顧其地伏于廻巖側隩之中路徑欹險輿馬難度同事諸臣俱不能前進是時臣若不行彼必有辭故臣不惜老憊與諸術家跼足從之一步一蹶深入二三里始至其所則見两岸墻立左右寛不及十數武中横澗道臣曰此地雖竒今將作何以經營况每歳大雨時行淙流灌注寳城其能安乎子琦語塞然其氣已勃勃動矣又至石門溝山術家稍稱其結聚但坐南朝北非向明而治者之居亦似難用子琦益不能堪又西至黄山寺第一嶺據術家云地儘可用但介獻裕二陵之間位序不宜子琦曰今日不用後來聖子神孫須要用臣曰在今日不得不盡其心且取之以俟上裁此尚書楊巍守備太監尚文及欽天監諸臣所共聞何嘗有莫管他之語而子琦誣臣以爾我之辭非所施于朝廷為大不敬天日在上耳目難掩今可質而證也又迤西至徳勝口則在近關荒漠之地矣且形如覆甑神路難通與諸陵不相拱向决非萬乗之所宅也子琦以衆心不與益復憤懣若今所取形龍山大峪山二處子琦至其地唯聞呵罵術家之聲耳非但目之不睨抑且足亦未遍不知何據而極口詆醜之也抵晚臣與楊巍等㑹議巍言此事須要調停以防子琦之口乃公定形龍山第一姑以子琦所取石門山溝山第二大峪山第三而又以子琦所取黄山寺第一嶺亦附備則臣與子琦初未嘗盡棄其術也乃子琦即咈然詈臣曰爾何得以術士所取先我耶臣應之曰今日論地不論官且言臣雖不諳風水之説但人君履后土而戴皇天億萬生靈皆其造命而卜年卜世自有預定之祥即今所擇止求形勢昻聳堂局廣深便可選用非若士庻之家以地下求福者比何必以口舌求勝耶故臣囘疏有聖意所注即為吉壌之語今次覆閲臣實恐衆喙紛紜聖駕祀陵伊邇儻復别生横議必至稽誤大事况子琦當萬夀之期註籍不出而此行又止閲其見取之地非踏看時也故疏内不列其名謂臣為踈漏則有之子琦與臣同鄉既欲効忠即當開心見誠或告臣以欲行或自疏請行未為不可何乃逞忿肆噬捃拾他事以相汚衊而且誣臣以欺罔之罪此何説哉是臣以公心薦子琦而子琦以私忿報臣也藉令臣知風水自執其説故抗子琦而誑朝廷謂之欺㒺則可今各地俱諸臣所擇臣不過以職事奔走其間而已其去取之權在覆閲大臣而終取决于皇上臣何能以私意主之而為子琦者亦何必怨毒臣至此哉然臣不敢深疵于子琦者盖謂隂陽家聚訟常態也惟子琦疏内指臣為張馮之黨以故激皇上之怒則其説又不知何自而起其謂黨張者以臣嘗為荆州知府而居正乃荆州人也事在嘉靖三十八年居正尚為編修臣豈能逆料其後來當國而先結納之遺以萬金也景府請討沙市事在四十一年臣嘗以社稷人民非王府養贍之資執不肯與後經叅問而竟獲全首領者頼世宗皇帝宥之也是時居正官小何力之能庇此逺年事不足深辨又言居正占王墳奪民地誣臣為之經理其二事有無臣不能知但田土事皆屬之本省廵撫與臣職掌無干臣不能私之也又誣臣黨居正以傾害忠良當居正奪情時臣尚在外僚即欲為之謀不可得矣謂臣黨馮者以駙馬梁邦瑞之被選原在内廷臣嘗疏請京城子弟俱不堪中選已得㫖于山東河南北直𨽻等處差官另選後來諸王所洞然者而指臣為附馮保之實巳屬影談則其餘之虚揑可知也至于臣與大學士申時行結姻此同鄉士大夫之常在在皆然何足為怪楊日章偶因風水有名故帯領踏看而形龍山亦非其所取即用一術士何足為附勢之囮乎凡以上誣臣數事皆信其口之所出不顧其事之無稽原子琦之心非有夙憾于臣也擊臣以希進耳臣之進退何足為國家之輕重但朝綱所係人情恃之以底定世道頼之以治安者方今聖治聿新内外祗肅正文恬武嬉之㑹而子琦職在納言禮無與禮樂之事即非官守又無言責顧乃一旦肆其狂嚙譸張于朝夫讜言固可以興邦而辨言亦可以亂政使各衙門官效而尤之則九列之中人人自危矣讒説殄行豈堯舜之世所宜有哉是則臣之所深憂而過計者不得不一言以白之非為臣一身計也顧臣自念通籍三十四年齒髮頺矣原無寸長可録叨冐至此涯分已逾位重望輕致滋蹂躪臣不急退則亦何顔復玷班行伏望皇上憫臣衰劣賜臣骸骨以歸别選賢能以充任使其來月聖駕祀陵子琦所獻八地故在如䝉臨閲儻其中亦有可取似不妨采用臣亦何敢固執前説以阻抑子琦如果難用則臣忠皇上之心可鑒而欺罔之罪亦得以自解矣臣不勝惶恐俟命之至擬乞正孤竹黷封疏郭造卿臣按至元十有八年詔封伯夷為昭義清惠公叔齊為崇譲仁惠公至順元年頒廟額曰聖清至我大明成化九年詔頒清節廟額及祝册命守臣春秋行禮如儀實守臣王璽所奏臣謹按元前鬼神皆有封爵贈諡迨我太祖髙皇帝詔革之一洗千古謬戾可為萬世法矣今孤竹廟額從維新之典而其諡號仍宋元之封非所以崇祖詔而重清風也夷齊既為百世師則祠祀先師孔子亦畧相等矣古事先師不追諡不贈爵不設像敬之至也諸侯薨天子論行以易名孔子卒魯哀公誄之子貢以為非禮而追諡其可哉王公太師皆後漢所贈前此未之有祭有主有尸釋奠先師有主而無尸况像乃鄙俗而謬以為尊崇至聖之典何耶嘉靖初釐祀典于孔廟正位號革爵諡塑像而别祠啓聖今孤竹君有别祠矣但夷齊廟號未正爵諡塑像未除是守臣知重先正而尚未達于禮也禮官請賜額而不知封諡為非且節非所以語聖孰若仍舊而曰聖清猶為合于孟氏之㫖歟孔子無可無不可而歴代妄加爵諡世宗皇帝悉洗而去之此可以考聖祖而不謬俟百世而不惑者又何疑于夷齊且太常于漢夀亭侯闗雲長去武安王號况夷齊不事汚君不立惡朝衣冠不正望望去若將凂焉乃肯從流俗之制而土木其偶者乎名不正言不順未有甚于此者臣愚以為孤竹夷齊廟宜從孔廟例立木主稱逸民先聖伯子逸民先賢叔子而孤竹君廟當稱曰啓仁不然何以祀焉乃仍固陋如故有司之責也臣概于中乆矣伏乞聖明勅下禮官詳議如果臣言不謬亟賜施行明文海巻五十九
