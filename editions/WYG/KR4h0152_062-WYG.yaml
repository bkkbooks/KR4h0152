body:
  text: 明文海巻六十二餘姚黄宗羲編奏疏十六輔臣以去明心疏詹爾選頃臣具敬循職掌明剖是非一疏駁陳啓新因而責備冡臣與諸輔臣盖謂大臣擔荷不力狥情不言而發也乃近閲邸報大學士錢士升為微臣職分看詳等事一疏奉聖㫖云云欽此不勝驚異及得輔臣與李璡疏合觀之而後知輔臣有不忍言之情且有不得不疾呼之勢也俄而輔臣引咎求斥俄而遽奉回籍調理之㫖矣明乎輔臣之以票擬去以執爭去也夫大臣所以不肯言者其原在不肯去耳今輔臣肯言矣肯去矣上可對九廟之式憑下可質後世之清議隠以去就昭明主顯以氣節風百僚臣寔榮之而獨不能不為朝廷惜此一舉也盖皇上所不滿于輔臣者為其以心膂之臣而致疑于聖明之主耳臣則有説焉孔子曰君有諍臣父有諍子夫臣之有諍皆從疑起也不疑而又曷諍古來一徳之士孰如唐虞惟時臯陶矢知人安民之謨而禹輒曰惟帝其難之然則千古以上之能疑其君者莫如禹而舜未嘗以此貶聖鰓鰓焉惟恐禹言之不盡也故從顯處見者小臣之事也而從疑處諌者是幾諌此真大臣事而不意其以過慮無當于皇上也且輔臣所言者何事乎李璡不識皇上為堯舜之君而敢導以非情非法荼毒富民縉紳從來庸主所不屑為之事此關一錯大亂將興正輔臣痛心如焚之時而忽又奉有改票之命因是揣摩未當亦繇驚懼愈深遂不覺抗章之汲汲耳竊謂輔臣此舉差強人意皇上方嘉許以示鼓舞之不暇顧以為相疑以為要譽耶夫臣無故而敢疑其君非忠也若乃全不敢疑謂吾君為萬舉萬當以是為信其君者恐即容悦之借名亦非忠也人臣而習于沽名義所不敢出也乃人臣而不以名譽鼓天下使其臣争為尸位保寵習成寡亷鮮恥之世界又豈國家之利耶况今天下之欺皇上者恐亦不少矣何也以天下人對皇上皆中材以下之品也知常而不知變知平而不知竒知法後王而不知遵逺代如上方劍不靈將領驕懦日甚聖意恩禮感激于鈇鉞也而人見億萬之生靈徒以供韎韐之逗遛貪冒則或疑急于右武穿札與操觚並課非是者弗録聖意取聰明才技分注于騎射以助武臣之不振也而人竟賣牛而買馬詘徳而齊力縱使強㓂混迹于道塗而父兄莫必其子弟則或疑緩于敷文免覲之説行上意在暫甦民困臣亦以為暫甦民困也而或疑朝家之大義值數萬路費之金錢駁問之事煩上意在痛懲奸頑臣亦以為痛懲奸頑也而或疑千載之刑書能當幾番加等之紛亂其君子慮驅䇿之無當其小人懼䧟累之有門明知一切茍且之政或拊心愧憾或對衆唏嘘嘖嘖隠情有難殫述輔臣不過偶因一事代天下而發憤耳而竟鬱志以去輔臣之去也以言而自後之大臣恐無復敢言矣大臣不敢言而小臣愈無望其言矣所日與皇上言者惟此苛細刻薄不識大體之徒似忠似直如狂如癡勝則挺身招承敗則濳形逋竄駭心志而爚耳目毁成法而釀隠憂天下事尚忍言哉伏乞皇上以逺大宅心以簡靜率憲責大臣弼違之誼作言官敢諫之風嚴敕内閣部院大臣不得以去輔士升為戒寧獻可替否無藉口聖明獨斷掩皇上之謙冲寧進禮退義無藉口君恩未酬飾自家之淹滯務期上下交格而志氣聿新于以覩廓清平治之猷成紀綱風俗之美庶幾有日矣明文海巻六十二
