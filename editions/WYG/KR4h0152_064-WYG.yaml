body:
  text: 明文海巻六十四餘姚黄宗羲編奏疏十八易數疏黄道周臣自少學易以天道為準以詩春秋推其運候上下載籍二千四百年攷其治亂百不失一臣所學本於周孔無一毫穿鑿其法以春秋元年己未為始加五十有五得周幽王甲子其明年十月辛夘朔日食以是上下中分二千一百六十年内損十四得洪武元年戊申為大明資始戊申距今二百六十四年以乾屯需師别之三卦五爻丁夘大雪入師之上六是陛下御極之元年正當師上六其辭曰大君有命開國承家小人勿用自有易辭告誡人事未有深切明著若此者也凡易一卦直六十七年零一百五日一爻直十一年零七十七日有奇今厯十分之四矣陛下恭黙深明天道嘗寤寐以思賢才而賢才卒不可遽得懲毖以絶小人而小人卒不可遽絶方陛下開承之始外清逆黨内掃權黨天下翕然想望太平曾未四年而士庻離心冦攘四起天下騷然不復樂生雖深識逺慮之士豈虞變動至此乎臣觀陛下開承應大君之實而小人柄用懐干命之心在陛下以大君之哲可制小人而有餘在小人以干命之才可中大君所不覺自臣入都來所見諸大臣舉無逺猷動成苛細治朝著者以督責為要談治邊疆者以姑息為上策序仁義道徳則以為不經談刀筆簿書則以為知務片言可折者藤葛終年一語相逺則株連四起使陛下長駕逺馭之意積漸而入科條之中臣子悃愊靖獻之思抑鬱而消文網之内跡其所為既不足服小人之心度其末流終必承小人之敗支吾輾轉茍據目前瑕釁既成則誕欺立見即如往嵗遵永被兵已七八日而叙収復者以為千古奇功又如近者山東被殘已六七縣而䕶叛帥者以為不犯秋毫即此二事而逺邇情形概可知矣凡外廷諸臣所敢於欺誑陛下者必不在於拘攣守文之士在於權力繆巧之人内廷諸臣所敢於欺誑陛下者必不在於錐刀帛布之微在於阿柄神叢之大惟陛下超然省覽思地中有水之象知民情之所繇通體剛中而應之文知師功之所繇立因以旁稽載籍自漢唐以來所用在師中而致治者幾何人用在師中而致亂者幾何人因以仰質聖賢自孔孟所稱對君子而砭小人者幾何事就小人而砭小人者幾何事自古迄今決無吹毛數睫可成逺大之猷斂怨樹威可奏雍熈之業者凡小人見事智恒短於事前言恒長於事後不救淩城而謂淩城之必不可築不理島民而謂島民之必不可用兵潰於乆頓則謂亂生於有兵餉糜於漏巵則謂功消於無餉亂視熒聽以至極壊不可復挽臣觀今日道化未𢎞用師之毒勢不可已昔有夏𦙍征仲尼所録向戍去兵丘明非之今陛下之意在於干城腹心羣臣之圖在於偷安避患上下相畸不遂於成臣愚以為正功之道在乎定命亂邦之誡止乎小人小人用即無邊患亦足以致亂小人不用即有干戈亦足以致理從古有釀亂致亂之人必無有討亂致亂之事隋梁晉宋事不足稱殷武周宣功在自立凡人主之學一以天道為師則萬物之情可照人主斷事一以聖賢為法則天下之材具服自二年以來以察去蔽而蔽愈多以刑樹威而威愈殫是亦反甲商以歸周孔捐苛細而振紘綱之秋也惟陛下起然深思易象隂陽當否之際何者謂之丈人何者謂之弟子何者謂之長子何者謂之小人用之而亂朝著則去之勿以朝著為嘗用之而亂邊疆則去之勿以邊疆為戲因以定命正功安内攘外不過數年而三錫之勲可成無疆之休畢至矣臣攷自丁夘大雪至戊寅春分凡十一年零七十七日皆在師上六勿用之防誠不可己書曰無疆惟休亦無疆惟䘏臣膏肓已乆痼疾又新不能冒矢石以報陛下又不忍溘然終閉一言而死誠不自䘏吐此一言即瞑目無愧非敢穿鑿傳㑹以凟聖明為天下萬世之所譏笑黃石齋先生召對崇禎十一年七月初五日昧爽上常服坐門内命五府輔臣入輔臣東序五府西序各官俱立檻外吏部尚書商周祚侍郎董羽宸户部右侍郎署事許世藎兵部輔臣楊嗣昌刑部尚書劉之鳳侍郎王命璿工部尚書劉遵憲侍郎李覺斯左都御史鍾炌僉都御史徐爌以次奏對訖次召少詹事黄道周上曰朕幼而失學長而無聞時從經筵啓沃中略知一二凡聖賢千言萬語不過天理人欲兩端而已無所為而為之謂之天理有所為而為之謂之人欲多一分人欲便損一分天理天理人欲不容並立你三疏不先不後却在枚卜不㸃用之後可謂無所為乎道周奏聖學淵微非臣所及若論天人只是義利之别為利者以功名爵禄私之於已事事要為已之私此是人欲為義者以天下國家為心事事在天下國家上做便是天理臣三疏皆為天下國家綱常名教不曽為一已功名爵禄所以臣自信其初無所為上曰前月二十八日陳新甲汝何能當日成疏道周奏先時要推不拘守制者已知是陳新甲又楊嗣昌先薦之所以當日草疏要上至未時已晚故不上上曰三疏皆不上却說阨於時㑹誰為阻格何為時㑹道周奏初欲上疏時因同鄉道臣林蘭㕛科臣何楷有疏恐涉嫌疑上曰同鄉先上疏遂有嫌疑今豈無嫌疑乎道周奏臣所奏闗天下綱常邊疆大計如今不言何時言之所以不得不上若言路有言臣亦可以不言臣之有言不得已也上曰近來言路大開原無忌諱何為先時不言至簡用之後方言道周奏先時猶可不言至簡用後不得不言今日不言再無進言之日矣且如髙官厚禄誰則不樂臣緘黙數時亦可偷竊升斗為先人誥命後人㤙廕何苦舍自已之功名為他人之話柄皇上亦可亮其心之無私矣上曰清原是美徳但不可傲物遂非我太祖祖訓云俗儒是古非今奸吏舞文弄法正指此等人也上又曰且就清字言如伯夷是聖人之清若小亷曲謹不受饋遺止叫做亷不叫做清道周奏陳文子不能强諌大節可觀夫子説他清而未仁夷齊大節可觀心地明淨夫子所以説他是仁上曰汝所言多有牽强如前日說智仁勇就是清任和亦是牽强道周奏臣前日說智仁勇仁明武此智字明字皆從心體本清而來事事從心上做出即此可以歸仁上曰我前日駁汝之言亦未當汝又翻弄了許多如云子思子一生以誠明為本是矣又云誠出於清仁出於誠不又隔了一層道周奏古人言閑邪存誠此誠字都從清來不清安得誠有子説孝弟也者其為仁之本歟此即誠能生仁之説凡孝弟最篤實所以為仁之本有孝弟之人纔能經理天下發生萬物如不孝不弟之人無有根本如何生得枝葉故說至誠能經綸天下之大經立天下之大本綱常名教禮義亷恥皆是根本上事如無此根本豈做得事業奏未畢楊嗣昌出班跪奏昨黄道周有疏論臣不為别事止為奪情起復原非常理臣才又不足以當之昨䝉聖恩更叨非分臣具疏辭不忍以雲霄之逈路違草土之初心至具再疏謂父死之謂何又因以為利臣實不敢承當止因同官待臣入直未敢三辭道周論列誠是但謂䝉面喪心營推營復臣不幸遭臣父之變奔還鄉里又遭繼母之變草土哀迷四千里外焉知京中有兵部尚書缺出來此纉營道周説綱常二字臣不生於空桑豈不知有父母今聖明在上文武諸臣在旁綱常二字不敢不剖明白所謂綱常者君為臣綱父為子綱君臣還在父子之前古之君臣是列國之君臣可以去此適彼故避地避色避言今君臣乃一統之君臣為臣子者無所逃於天地之間即臣父臣母皆受君恩而無所逃臣又逃於何所若論仁義仁不遺親義不後君原難偏重況臣聞命之初瀝血控辭至奉明㫖撫按敦趣臣有何才能有何徳業敢安然在家不倉皇奔命乎行至保定具第四疏力請終喪内引先朝楊榮蹇義侍祖宗三四十年無一日敢離左右故有奪情之舉天下人能亮之後來臣子旅進旅退無侍上三四十年之事所以人不能亮且如成祖奪楊榮蹇義之情而竄給事中丁鈺憲宗奪李賢之情而許王鑑等終喪世宗奪楊博之情而罷廖道南不叙祖宗朝非其人不奪情如此正統間編修劉定之成化間修撰羅倫皆為奪情一事有持正之論臣意今詞臣中必有博通經史親切論思可以代臣力言挽回天聽得兩全於君臣父子之間此入京聞道周品行學術為人所宗意其必有持正之言可以使臣終制而去不謂其疏上自謂不如鄭鄤臣始嘆息絶望上曰朕正要問他這事嗣昌奏禽獸知母不知父鄭鄤杖母禽獸之不如道周又不如彼還講恁麽綱常上曰卿前在闗門卿父子屢奏俱在御前數年在外俱不攜家昨屢奏服色仍衣縞素朕俱知之道周復奏大臣聞言義當引避使小臣得盡其言漢唐以來故事諌官論執政者執政皆出聽諌官對仗讀彈文臣雖非言官未有大臣跪在上前爭辯不容臣盡言者上曰汝說多時輔臣纔奏嗣昌奏臣為綱常名教不容不剖陳委覺非體道周實係清品為人望所歸望皇上納道周之言放臣歸里上曰卿才猷敏練原為時事多艱屢㫖敦趨誠非得已被疏也不為奪情古時人情多無所為近日人情各有所主所以孟子欲正人心息邪說古人邪說别是一教今人邪說直附於聖經賢傅之中闗係世道人心更大道周奏臣生平恥言人過聞人之過如聞父母之名今日在上前與嗣昌口角亦失體臣知為天下後世留此綱常名教天理人心而已上曰對君有體這本前邉引綱常後邉全是肆口潑罵道周奏臣何敢潑罵魏徵云臣願為良臣毋為忠臣臣疏中只有兩句說公子開方不省其親管仲比之貑狗李定不持繼母服當時比之人梟此兩句是臣過激亦惟遇明主纔敢直言上曰既説是直言直言豈是潑罵道周奏人臣立言甚難管子云禮義亷恥國之四維臣所言綱常名教者朝廷之綱常名教禮義亷恥者朝廷之禮義亷恥假如臣為一人之私但當緘黙自取富貴何苦與他對辯上曰汝無端汙詆大臣又以大題目來說他不倫不理摠是别有所為道周奏宋臣司馬光有言臣若有専司則有所不言如為論思之臣則無不可言者臣為侍從論思之臣與嗣昌比肩事主比不得詆毁大臣臣自少讀書於今五十年無一言一事不可對於君親告於妻子臣二十躬耕手足胼胝四十喪親負土成墳畚鍤皆臣自親誠不忍見奪情之事上曰既如此又說不如鄭鄤何也道周奏章子弃於通國孟子不失禮貌孔子自云辭命吾不如宰予臣謂文章不如鄭鄤上曰章子是不得於父豈鄭鄤杖母之比你說不如鄭鄤正是朋比道周奏衆惡必察劉摯有言人奈何可避於權勢使主上不知是非之實上曰陳新甲先做兵道諳練軍情用之巡撫不幸有人倫之變不得不遣歸今日為内冦外警不得不用他輔臣嗣昌薦舉甚多不止新甲一人人都不肯擔當便有力量汝謂他走邪徑趨捷足何為邪徑他差恁麽人來京捷足有恁賄賂難道督撫才料朕一人也不知只聴人營求威福予奪盡出臣下然後快於心乎汝疏中䎡美容恱叩首折躬者是誰道周奏臣不識陳新甲但人心正則行徑皆正心邪則行徑皆邪且今新甲在蜀中聞命已須兩三月又辭謝徃復動須八九月陳新甲未得來盧象昇不得去使新甲可以來則象昇可以不去上曰陳新甲服將滿盧象昇父死在途如何不放他去朕問你捷足邪徑汝便不能對只懸空說去了上又指疏問曰汝疏中破非常之格以奉不祥之人冠婚是吉禮喪祭是凶禮凶對吉而言這是說禮難道人也凶了人皆有父母父母皆有年老之時是人人皆凶人人皆不祥之人矣道周奏禮三年之喪君命不過其門援琴之後始稱釋吉未釋吉前則孝子自謂凶人不祥之人古者兵禮鑿門而出故奪情在疆外用凶禮則可上曰自謂是孝子哀毁自謙豈真是凶真是不祥外邉做得裡邉也做得如何分内外道周奏臣見嗣昌二年來今日也是墨衰明日也是墨衰不知其何日丁艱何日起復上曰當初起用時已過小祥今已兩年彼時汝何不講直待今日簡用方言可見不為此事道周奏前後有七疏止擇三疏來上初意其自請行邉惟白圭曽坐司馬堂翁萬達以尚書降左司馬亦自陳以去向使楊嗣昌在邉疆則可在司馬堂則不可在司馬則可在政府則不可使嗣昌一人為之猶可又呼羣引類使成奪情世界則不可臣所以至今不得不言臣今日不言使後有言者亦是臣今日之恥上曰今人心有所為就在綱常名教上借箇大題目來遂其私道周奏綱常名教自是陛下之綱常名教豈臣一人之私上曰朕正要問汝鄭鄤五倫盡滅昨日許曦等說他罪狀甚明不如雜職到有公論大小臣工到無公論這也可恥道周奏臣若為功名富貴只當說鄭鄤不孝以阿權臣豈不取恱立致通顯今日反說不如鄭鄤正是臣無所為宋人惡李定不丁母憂纔舉孝子徐積賜粟帛以風之臣如要救鄭鄤則叅楊嗣昌非所以救鄭鄤也方今獨立敢言之人少讒諂面諛之人多故臣不得不言上曰我先師孔子攝行相事誅少正夘少正夘當時亦稱聞人心逆而險行僻而堅言偽而辯記醜而博順非而澤五罪有一不免君子之誅今之人多類於此道周奏少正夘欺世盜名心術不正所以夫子誅他臣心術正所以不同上曰向以汝偏激稍示裁抑後聞操守隨復賜環即前日酷暑勞頓之餘做成一篇文字雖不切題才亦可愛故意用汝不圖這様偏矯恣肆本當拏問念係講官姑著起去候㫖道周奏今日不盡言則臣負陛下陛下今日殺臣則陛下負臣上曰汝都是虛説究竟毫無歸著一生學問止學得一張佞口起去罷道周叩頭起復疏奏臣還要將忠佞二字奏明夫人臣在皇上之前獨立敢言者為佞豈在皇上之前讒諂面諛者為忠耶夫敢爭是非辨邪正者為佞豈不敢爭是非辨邪正一味容恱者為忠耶忠佞不分則邪正不明何以致治臣亦不敢多奏上曰不是輕易加你一箇佞字問汝這邉汝却遁在那邉非佞而何若論紅牌轉換支吾就當斬起去嗣昌奏道周所言原是經愚臣拜命原是權望皇上優容道周存此綱常可以教天下萬世臣子上曰也不耑為卿近來人心澆薄無所不至但未敢有明白像道周這様放肆的所以特召來面諭以正人心卿既申救姑著候處嗣昌奏皇上所論誠是誅意之法但朝廷聽言自有道理道周又負盛名仍望皇上優容上曰這就是優容了於是百官俱出賜茶果㸃心畢復召回聽諭上曰今内冦外敵天灾地震皆朕不才不能感發諸臣公忠為國之心不智不能辨别諸臣是非邪正不文未能宣布徳化不武未能削平禍亂凡此皆朕之寡昧即是朕之愆尤中於人心尤闗係國運世道一等機械存心者専於黨同伐異假公濟私朝廷簡用一大臣便百般詆毁律以祖宗之法當如何處看來外冦却還易治衣冠之盜却是難治以後再有這等的立置重典諸臣各洗滌肺腸消除意見共修職業共享太平之福閣臣以下皆承㫖退上還宫明文海巻六十四
