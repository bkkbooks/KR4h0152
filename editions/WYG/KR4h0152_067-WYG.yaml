body:
  text: 明文海巻六十七餘姚黄宗羲編碑一勅建歴代帝王廟碑宋訥兩儀判而人極立大統建而君道明粤自上古神聖繼作代天理物以開萬世太平之治故天地以之而位四時以之而序萬物以之而育大經大本以之而立盛徳相繼傳至於今欽惟聖天子受天明命肇修人紀以建民極纘皇帝王之正統衍億萬年之洪基稽古定制作廟京邑以祀歴代帝王重一統也相舊廟地介乎通衢䙝而弗嚴洪武二十一年秋始命改作於欽天山陽越明年己巳夏五月三日工部尚書臣秦逵奏成功請文劖石詔臣訥為之記臣忝職胄監懼不敢辭謹拜手稽首而言曰帝王功徳於昭于天宜有清廟以宅神展敬歴世以來祀典斯關三皇五帝祭于肆類僅見於周而堯舜禹湯發迹肇基及所經歴之地或有祠焉遣使致祭後世有之至於合廟京國嵗修享禮古未之聞皇上定鼎江左治功既成神人洽和禮樂明備凡廟祀之瀆禮不經諂神非法者一切去之正名定統肇自三皇繼以五帝曰三王曰兩漢曰唐曰宋曰元受命代興或禪或繼功相比徳相侔列像於庭金玉其相衮冕焜煌聚精㑹神咸宅於兹每嵗春秋二仲諏日誓士上御宸極制命大臣齋明承事籩豆靜嘉粢盛豐潔告充告碩神格洋洋所以推惟本始式昭曠典者至矣三年則命官奉香帛詣陵寢具儀物以時致享又以昭聖顯靈而示不忘也嗚呼天生民而立之君所以靖亂也康濟天下阜成兆民而登之仁夀之域者皆以奉若天道而已是故前乎三代之官天下者天也後乎三代之家天下者亦天也皇帝王之繼作漢唐宋之迭興以至於元皆能混一寰宇紹正大統以承天休而為民極右之序之不亦宜乎秦晉及隋視其功徳不能無愧故黜而不與是可見皇上敦名實重理道崇徳報功大公至正之心真足以度越百王垂憲來世永永無斁謹為之銘曰惟皇作極克配天地丕昭盛化以正大位皇道而皇帝道而帝歴夏商周三王迭繼熙熙皥皥同底於治於赫漢祖寛而有制光武奮興炎靈用熾唐興晉陽遂有神器太宗重光力行仁義明明有宋其徳克類暨於元氏而亦用乂豐功茂徳後先輝賁翼翼新宫有侐而閟貌像既嚴皇靈斯蒞享祀苾芬儀文孔備陟降在庭神之攸暨祚我皇明以克永世黔寧昭靖王廟碑程本立有非常之遇而後成非常之功有非常之功而後享非常之報湯之興阿衡聘於莘野周之興尚父載於渭濵曰漢曰唐曰宋有所興必有所遇然而義則君臣親則父子若我大明皇帝之黔寧王者未之有也王姓沐氏諱英字文英鳳陽定逺人八嵗而孤遭元末大亂居室燬於兵隨母逃難母亦病殁惸無所歸謁上濠梁上為惻然與孝慈皇后撫之為子賜姓朱氏上即位金陵建元洪武始詔復王姓王天資忠孝厚重簡嘿雖在髫齡不樂兒戲年十八為帳前都尉由都尉為廣武衛親軍指揮使改廣信衛親軍指揮使拜僉大都督府事陞同知大都督三十有三爵封西平侯授以鐵劵賜號開國輔運推誠宣力武臣階自昭勇將軍鎮國將軍至榮禄大夫勲為柱國以都尉守京口以指揮使守廣信節制甌閩以同知大都督填撫關西皆有威惠天下兵馬實大都督府總之在府七年裁度機務舉無留滯稱上意焉一從大將南征獨取鉛山下崇安翦陳友定㧞閩溪十八寨遂定閩中一從大將北征出古北口獨克灰山全寧嵩州過臚朐河擒元知院李宣俘男女萬口一為征西副將軍總京畿兵伐川藏抵崑崙山俘男女亦萬口馬五千牛羊十三萬闢地數千里一為征西將軍總京畿河南陜西山西諸軍征朶甘之地降其萬戶且實勒戩夷其部落平納琳七站之地擒洮州十八族番酋曰汪舒多爾濟曰鄂温都爾并其衆二萬獲馬牛羊二十萬一總陜西兵出和林畧以集乃路自寧夏歴賀蘭山渡流沙擒元國公托和齊元知院按珠俘其全部以歸天下已大定而梁王巴咱爾斡爾密實元之遺孽恃雲南險逺執我信使納我逋逃上命頴國公傅友徳為征南將軍王為副將軍率師三十萬討之旌旗蔽江而上自辰沅陸出羅鬼普定普安皆下苗蠻犵狫迎降恐後循格孤山之南出竒兵襲畢節擊可渡河皆克之巴咱爾斡爾密遣其司徒達爾瑪以精兵十萬拒我師於曲靖王曰彼謂我師罷於深入未有虞心及其無虞心乃可破也於是倍道進師未及白石江忽大霧四塞衝霧及江而止霧霽則兩軍相望達爾瑪大驚以為我師飛至因擁兵陳水上傅征南亟欲濟師王曰未可别遣一軍泝流潛渡出其陳後鳴銅角樹旗幟為疑兵山谷間達爾瑪軍欲亂王乃趣師濟江以猛而善泅者先之長刀䝉盾斫其軍而奪之氣却數里而後敢陳我師既濟整列而鼓砲聲震天地戰數合王縱鐵騎衝其軍遂大敗之生擒達爾瑪俘甲士二萬馬萬匹死者横屍十餘里巴咱爾斡爾密聞達爾瑪敗遁滇池島中先縊其妃而自飲藥不死投水死之父老爭出金馬山焚香遥拜以迎王師王入鄯闡城市不易肆收梁王金印并官府符信圖籍撫其民洪武十四年冬十二月也自秋九月出師至是百日雲南平分兵下烏撒得七星關以通畢節畧建昌澂江臨安沅江尋甸楚雄洱海次第皆下大理城倚㸃蒼山西洱河為固南詔皮羅閣所築龍首龍尾二關號險要王自將取之土酋段世聚衆五萬搤龍關牢不可破王以一軍付裨將夜從間道繞出㸃蒼山後攀木縁崖而上立我旗幟遲明彼軍驚亂王䇿馬渡河水及馬腹將士隨之斬關而入彼軍腹背受敵遂潰㧞其城擒段世脅從者悉縱遣之分軍下鶴慶麗江收三營砦破石門關畧永昌由是西蕃車里平緬相率來附雲南平以幅員之廣分烏撒以東越嶲以北皆𨽻四川餘列為郡邑凡府州縣宣慰司長官司一百八籍其見戸七萬四千六百設官以治其民立衛以守其地烏撒東川建昌謀變王還與傅征南合攻下之并克芒部斬首三萬級獲馬牛羊數萬計王師已東鄯闡諸蠻部乗之以叛圍城二十萬衆都督馮誠以孤軍固守伏强弓弩於埤賊近輒射之往往應弦而斃伺賊怠則出擊之賊不敢即攻城王將鋭兵一萬赴援至曲靖遣一健步懐檄入城約為内應為賊所得詰之賊皆錯愕轉相告報解圍宵遁王既入城賊散走安寧羅次邵甸富民晉寧大棋江川諸山猶據險立栅悉分兵殄滅之斬首六萬級生擒四千諸郡復定奏聞上大悦詔傅征南班師王留鎮雲南辨方物以定其貢賦視民數以均其力役踈其節目以寧便其人麓川之外有國曰平緬車里之外有國曰八百媳婦皆請内附在鎮十年得上恩賜悉送官府以助軍資凡遣將討賊者六逋冠集浪穹鶴慶劔川輒相應為亂遣大理衛指揮使鄭祥掩而殱之平緬叛結砦於馬龍他郎甸之摩沙勒遣都指揮使寗正擊破之斬首千五百級東川蠻據烏路山為砦山極險峻上下三百里遣寗正帥雲南兵與京畿大兵相為犄角討之殺火頭弄宗等五十九人俘男女馬牛羊皆以千計阿資母出降敎化三部不供租賦遣臨安衛指揮使王執討平之普安酋密即叛遣貴州都指揮張泰擊破之自將討賊者四廣南特磨道未附自將討之酋出降廣西阿赤部叛自將討之誅其酋曰者滿曰矣清俘男女五千口平緬以三十萬衆寇定邊自將二萬討之與宼對壘以輕騎三百當宼宼出萬衆乗三十象以戰一戰而殺寇數百人獲一象以還王曰吾知賊不足破也明旦宼集衆驅百象以陣象皆背負攔楯左右以大竹筒置短鎗其中乗以標之勢恃以張王分軍為三馮誠領其前寗正領其左都指揮同知湯昭領其右乃下令曰今日之事有進無退進而捷者一級必盡賞退而衂者一隊必盡戮於是鼓而合刃機發箭鋒星流煙飛雷擊電走象皆驚北宼之勇而力者曰實喇亦殊死戰我左軍小却王登髙望之命左右取左帥之首來左帥遥見一人㧞刀飛騎而下麾衆復前王責戰益急三軍大呼而鏖不移時宼大敗斬首三萬級俘萬人生獲四十六象餘象被矢如刺蝟以死渠帥刀斯郎埋亦被百矢殪象上餘黨走死百無一還自是平緬嵗入貢賦不復反矣阿資復叛自將討之擊於補衝殺獲其衆殆盡阿資僅以身免方搜捕山間俄有㫖諭王還鎮以前軍僉都督何福為平羗將軍寗正為叅將代領其兵阿資遣其子詣王降王請於朝立衛越州鎮之遂罷兵嵗較屯田所入増損以為賞罰計逺近墾田至九十七萬畆以滇池末流淺狹霖雨汎濫瀕池之田不可以稼乃督萬丁自池口入渠濫川中浚而大之無復水患通鹽井之利以來商旅選凡民之俊秀與諸酋之子弟入雲南府學朔望或賜之飲膳嵗時或賜之衣服又命行鄉飲酒禮於學民知尊長養老而興其孝弟矣二十年十月王入朝上宴之奉天殿賜黄金二百兩白金五千兩繒綵百鈔為貫凡七萬五千以西南之人安於王也復歸之鎮初王留鎮之明年哭孝慈皇后三日不食踊慟幾絶及再鎮之三年哭皇太子號慟失聲飲食為少一日暴薨二十五年夏六月丁卯也享年四十有八官僚士庶胥吏卒伍緇黄髫白莫不奔號其門泣語於路訃至京師上哭之慟不視朝一日自為文遣禮官往祭命嗣子春奉喪以歸詔發兵䕶喪出境所過衛府州縣設祭如禮柩出金馬山送者萬人蠻夷酋長哭之盡哀喪至自雲南詔封黔寧王謚昭靖三代考皆黔寧王妣皆黔寧王夫人冬十月庚午以王禮葬江寧縣長泰北鄉觀音山之原自喪歸至葬上遣使祭者三皇太孫親王遣使祭者再葬之二日詔春襲西平侯爵嗣鎮雲南賜白金若干萬兩明年太常以太牢祭王功臣廟而雲南父老諸酋首合辭願立廟祀王守臣奏請上許可之乂明年廟成父老諸酋請本立紀王勲徳刻諸廟石嗚呼自宋靖康之亂戎馬蹂中國百五十年而極於元矣末政隳壞神憤人怒天命我明掃除湔滌永清四海以承大統於是賢豪並出輔成帝業至於西南六詔之地一變而為華夏之俗非斯民之大幸與王之治西南也以威武定其地者功若速而事返易以徳化洽其民者事若緩而功則難論者謂唐李西平不特良將乃良相也王其人乎王於濂溪周子之太極圖横渠張子之西銘西山真氏之大學衍義皆尊信而講明之至以太極圖與晦庵朱子之白鹿洞規刻之於石立之雲南府學則漢之功臣有所謂木彊少文不學亡術者得不愧於斯乎蓋非聖賢之學無以為大施設之體非將相之才無以為大藴蓄之用王能體之以聖賢之學用之於將相之才宜其過人逺矣雖然向使王樂生無事之日其所遇所報安能始終若是哉故曰天也夫髙莫髙於山嶽大莫大於河海本立才劣辭陋㳙埃奚贊其萬一父老諸首思之也哀請之也至輒不自揆謹按王行録述之系之以詩詩曰上帝有赫降命我明剪㐫戡亂以開太平乃授以臣乃賚以弼龍興雲從日出爝息勇奮其力知角其能焯有聲烈則惟黔寧黔寧始生生元之末㷀㷀稚年天其我割匪曰割之實將啓之惟皇父之維后母之長試以官帳前都尉廣武廣信指揮兵衛皇曰汝來汝績其凝為朕腹心為朕股肱朝夕事朕僉大都督繼陞同知累階榮祿柱國惟勲西平是封建侯襲爵崇徳報功鐵劵丹書金匱石室子孫保之世世無斁既平南粤既定西陲北靖邊庭威行九圍惟彼西南古之六詔元有遺孽阻我聲教皇曰西平爾副征南役蛇役豨爾劉爾龕樓船蔽江師三十萬乾旋坤迴山擘濤潠悠悠牂牁峩峩格孤羅鬼犵狫徯我而蘇彼昏不知擁兵曲靖敢遏我師罔畏天命我師其行如霆如雷大戰白石手縛其魁載厲我兵載秣我馬直入滇池如裂其瓦元之遺孽破卵覆巢父老歌舞迎師於郊段世亦擒罔有不服班師振旅獻俘授馘摩些施順望祼茫河尋傅漢裳婆羅秦婆烏蠻白蠻東㸑西㸑穿鼻長鬃黒齒綉面麗木金麩朱提銀流白雉孔雀馴象犀牛一百八區三十六部七十城門八百媳婦版圖既入職貢是修大開明堂萬國懐柔皇曰斯民悉朕赤子一視同仁無間逺邇詔汝西平其撫鎮之以燠其寒以飽其饑西平奉詔稽首以拜夙夜兢兢罔敢或懈拊摩吹煦於懐之咳芟夷藴崇于田之來于羊于狼以膊以磔于稼于苗以膏以澤以興學校以敦詩書農隙講武鼓舞邊隅滇人有言我亦人類逺於恩化弱肉强噬今也奚倖昔也奚辜子有其父婦有其夫滇人有言我枵我羸西平餔我西平繐我西平曰吁兹豈在予維皇之命維皇之謨天胡不仁奪我父母擗踊而哭匐匍而走九重眷注一日哀聞驚慟輟朝諭祭以文數備禮登有誄有謚王以黔寧侯以冢嗣黔寧始薨人莫不哀嗣侯既至人莫不懐江寧之岡有鬱其兆滇人不忘滇則有廟金馬左立碧雞右昻千萬斯年以祀我王鄉飲酒碑王彜皇明既一四海乃大興禮樂以新今俗還古道為千萬世計惟鄉飲酒繇近代以還蔑之有講洪武五年始詔郡國以孟春孟冬舉行斯禮而讀律焉其時江夏魏公實守蘇州奉詔惟謹既一再行之然尚恐未能宣上徳意是以明年復叅考儀禮以授經歴李亨教授貢頴之使與郡士周南老王行徐用誠共商挍之且使張端及諸生相與習焉爰釋菜先聖先師以孟冬之月吉日癸未行於郡學其大賔為前進士魏俊民介為先聖五十四世孫思賙僎為推官王芳三賔為范廷徴衆賔為邵允禮錢瓊等十有一人次僎為知吳縣事曽黼知長洲縣事張其而樂正以張田司正以滕權賢而得其人如此又特位三老人曰崑山周夀誼年百有十嵗曰吳縣楊茂九十有三嵗曰林文友九十有二嵗皆形充神完行坐有禮老人而得其人又如此然後乃列坐八十以上者十有三人七十以上者六十有二人六十以上者四十有七人五十立而聼政役者百人凡在位者之子弟侍立者二十有八人主賔僎介之贊相爵尊豆籩爼洗之執事者皆具又别為教授位而吳縣教諭徐鼎崑山教諭陳圭次之訓導十五人又次之長洲教諭周敏則以侍其父南老常熟教諭傅著侍其父玉皆降而北面立合鄉學及六縣弟子員之立者百有六十人文武僚佐之在位觀禮者若干人農工商賈逺近之觀者又以千計公年且七十而朱顔煥如獨出人表升降揖拜竟日無倦而其子子盤侍立進趨中度如是禮明樂和衆以大悦既而乃讀律衆復肅以聼皆曰今天子神聖援吾人水火中而斯禮也吾身親見之幸哉越五日周老人還崑山公躬出婁門之郊再拜以餞都之士女觀者又慨焉以為幸見且曰公於人之父兄也如父兄然吾於吾父兄宜何如君子以是知公之政興孝興弟者蓋易易然也且老人者生宋景定中歴元百年而遭逢聖代意者天生斯老以待今仁夀固已在百年先矣微公誰能表之彛也居公之野以病廢得扶曵以觀焉蓋曠世之遭也故為銘其堂下碑曰於維皇王正此方夏奚釋戎衣有事郊社祀享朝㑹禮作樂造神人既和及鄉飲酒維鄉飲酒萬方攸同俾孝與義載臻時雍顯顯魏公牧我蘇人公有㫖酒樂我嘉賔嘉賔戾止以僎以介公在泮宫賔至則拜出爼東壁羞自東房𤣥酒於尊房戸是當有勺有勺實彼爵矣再拜稽首獻且酢矣吹笙鼓琴而瑟而簫而間以歌厥音猶猶有黄其髪台背兒齒百有十嵗眉夀曷已公拜而饋實猶父兄何以將之篚有𤣥黄賔既樂只言旋言歸醉飽自公祝公期頤我子我孫公之孫子公我父兄我孝我弟公曰咈哉天子明聖天子萬年畜爾子姓猗嗟蘇人今爾復古我作歌詩以告來世題名縉紳仗錫禪寺紀績碑烏斯道古之逃空虚者必靈境奥區擇而居焉至山水之氣閟而不泄神呵鬼禁人不能迹而見者尤為佛氏所專若仗錫寺是已其地南去郡治可二百里山深入萬壑中蛇盤斗折而上重巒疊巘峭峻際天勝槩絶世至峯頂頂圩而爽塏可廬清流散飛灌木層翠晴必沾潤暑必挾纊雖樵者靡常至四際又有峯二百八十有一回合起伏雲霞蔽虧内七峯尤瑰異郡諸山咸莫之抗唐龍紀元有石霜下長政二尊宿在藤湖肇基於此寺建徒集天祐三年吳王錢氏賜今額十傳迨宋之天聖四年太白已禪師徳隆名重足以開先裕後又尊之為第一代祖寳元二年額加延勝繼兹席者類多碩徳雲栖霧食燈傳香衍實東南之望刹也歴嵗滋久寺或燬或復傳五十二代遭時孔艱窘於徭役費如丘山貲産垂罄僧日竄匿寺日摧毁至仁讓公負荷法任痛念諸祖創業之難倡道不匱茍不􅠜本枝葉以亡雖有智力者出求興復如故惡可得哉於是殫心瘁容躬走官府招亡植壊保守先業於綱紀縻爛之後甫七嵗珠環璧合俾圓頂方袍之士不􅔵望今住山起予公又力纘遺緒篤揚前休謁章蟾書走永新請於予曰寺舊有顛末載諸樂石以灾而不存兹不紀述則建初之績圖存之功咸冺滅無傳敢辱先生之文明始顯今以貽厥後余謂昔諸祖必處夫髙深靜僻地者蓋以明心繕性非逺紛去譁一耳目之官不可也若兹山者豈易致基業豈易圖哉自佛法入中國法有阻行寺有興廢莫有常者元運既圮天下大弗靖寺悉廢於兵燹吾郡幸無恙而廢於艱難者又十九焉兹仗錫禪寺將絶而復振雖諸祖之願力深重亦讓予二公之力也以世間相論之寺有興有廢以正法眼眎之寺未嘗有興廢也然不有世間相何以明正法眼哉自兹以徃比主是山者鑒徃懲來使是寺益以永久得以考鐘伐鼓大宏講席以正羣妄則其功徳又豈忝於諸祖也耶寺之棟宇土田與夫山所入之利具刻諸碑陰繫以詩曰東南之山維明為盛維明之山仗錫為勝髙設於天閟司於神其在𤣥右豫竢哲人哲人伊誰張於佛氏藤湖之長太白之已有廓其址有巋其廬建業之始倡道之初名聞雷厲學徒雲集繼兹席者代踰五十匪山之靈胡底於成匪祖之聖胡底於寧元運之末根柢幾絶讓予者出式茂其蘖以隆於俶斯永其傳克懋於後斯昭其先伐鼓考鐘環居列食心祖之心庶幾朝夕有章有程有聲有輝俾四方士惟兹焉是歸大寧觀碑劉定之大寧觀在大同府城中大同古雲中地漢髙祖鋤秦蹶項威振寰海然至此為冒頓所困拓䟦魏據此而起而以得中原之半遼金皆以此為别京元因之立宗廟置社稷焉維我皇明視為藩垣重地屯兵千萬連城堡十數百以控制朔漠達於無外蓋自帝都顧視之大同其右翼也徳威所及之逺豈前代居中夏控外邊者可侔哉信足謂之大寧矣洪武初創道觀以大寧為名厥有意焉然其地寒故山林無傑木鉅材其人勞於戍守饋運征行故於取木伐石陶壁之役有不暇構架塗墁繪飾之巧有非素習則維王公將帥官府廨署有不逮中土者况於觀固宜因陋就簡也今副都御史右濬王公越来鎮大同㑹肅法舉亦既有年意欲新之有待未果太守緩徳郝君淵之自監察御史知河間府連著績用遷綰郡紱有所興革克承憲度公嘉奬之以新觀之事委焉君退與其僚捐俸為率俾觀之羽士張道維集好義者所願輸始事於成化三年丁亥某月訖工於明年戊子某月最北正殿五間殿之南甬道屬於中殿三間道東西各有亭中殿之南甬道屬於山門道東有鼔樓西有鐘樓環其區域為廊四周東廊二殿北以祀三官南以祀靈官西廊二殿北以祀四聖南以祀關公間架髙廣深逺如其數觚稜罘罳欄檻増其明香火洒掃朝夕節朔定其制石山藝卉沙墀植樹期其久既成文武官曹兵民士女咸集瞻視靡不欣喜謂曩者吾人至於斯觀有所祈謝祥臻災弭寇殄物阜雖感神惠而愧觀弗稱今兹稱矣功有自焉惟亭立碑以待刻文紀實郝君嘗從予學乃以王公命來請予文夫斯地之安寧綏靜陶大化超往古由有聖主在上享天心恢神謨以長轡遐馭也斯觀之盛則賢臣總風紀任牧守治神人能得其宜於中也然則斯人在下衣食有餘而奉神之休庸有既乎予既記其事乃繫以銘詩曰絶塞之表不聞刁斗乃聞道觀鼉鳴鯨吼鼓鐘之聲警於昏曉烽燧不見乃見華燈夜集於觀煜煜如星我皇御世武緯文經天下之大孰如其寧風調雨順禾黍被野日之夕矣牛羊來下饔飱是宜湩酪亦諳出而射獵獲虎耽耽歸舉兕觥抵掌醺酣囊金車帛來自塞南家給人足捐財弗貪以作斯觀千楹楩楠維神之尊其居王宇垂衣雲霞寳冠玉塵與天為徒祐我聖主旁殿居者哂喜瞋怒各司厥職我民依怙爾驕勿驕神欲勦之都憲節出大將纛麾執以還城往觀數俘入門而左關雲長居顔如渥赭有虬其湏單刀雪瑩狂魄先誅有訖者亭碑峙龜趺守臣所立鰲島仙書勅修河道功完之碑徐有貞惟景泰紀元之四年冬十月十有一日天子以河决沙灣久弗克治集左右丞弼暨百執事之臣於文淵閣議舉可以治水者僉以臣有貞應詔乃錫璽書命之行天子若曰咨爾有貞惟河决於今十年東方之民厄於昏墊勞於堙築靡有寧居既屢遣治而弗即功轉漕道阻國計是虞朕甚憂之兹以命爾爾其往治欽哉臣有貞祇承惟謹既至乃奉揚明命戒吏飭工撫用士衆咨詢羣䇿率興厥事已乃周爰巡行自東北徂南西踰濟汶沿衛及沁循大河道濮范以還既究厥源流因度地行水乃上陳於天子曰臣聞凡平水土其要在知天時地利人事而已天時既經地利既緯而人事於是乎盡且夫水之為性可順焉以導不可逆焉以堙禹之行水行所無事用此道也今勢反是治所以難蓋河自雍而豫出險固而之夷斥其水之勢既肆又由豫而兖土益踈水益肆而沙灣之東所謂大洪之口者適當其衝於是决焉而奪濟汶入海之路以去諸水從之而洩隄以潰渠以淤澇則溢旱則涸此漕途所為阻者與然欲驟而堙焉則不可故潰者益潰淤者益淤而莫之捄也今欲捄之請先䟽其水水勢平乃治其决决止乃濬其淤因為之方以時節宣俾無溢涸之患必如是而後有成制曰可臣有貞乃經營焉作治水之閘䟽水之渠渠起張秋金隄之首西南行九里而至濮陽之濼九里而至博陵之陂又六里而至夀張之沙河又八里而至東西影塘乂十有五里而至白嶺之灣乂三里而至李􅕞之崖由李􅕞而上又二十里而至竹口蓮花之池又三十里而至大瀦之潭乃踰范暨濮又上而西北數百里經澶淵以接河沁河沁之水過則害微則利故遏其過而導其微用平水勢既成名其渠曰廣濟閘曰通源渠有分合而閘有上下凡河流之旁出而不順者則堰之堰有九長袤皆至丈萬九堰既設其水遂不東衝沙灣乃更北出以濟漕渠之涸阿西鄄東曹南鄆北之地出沮洳而資灌溉者為頃百數十萬行旅既便居民既安有貞知事可集乃叅綜古法擇其善而為之加神用焉爰作大堰其上楗以水門其下繚以虹隄堰之崇三十有六尺其厚什之長伯之門之廣三十有六丈厚倍之隄之厚如門崇如堰而長倍之架濤截流栅木絡竹實之石而鍵之鐵蓋合土木火金而一之用平水性既乃導汶泗之源而出諸川匯澶濮之流而納諸澤遂濬漕渠由沙灣而北至於臨清凡二百四十里南至於濟寧凡二百一十里復作放水之閘於東昌之龍灣魏灣凡八為水之度其盈過丈則放而洩之皆通右河以入於海上制其源下放其流既有所節且有所宣用平水道由是水害以除水利以興初議者多難其事至欲棄渠弗治而由河沁及海以漕然卒不可行也時又有發京軍䟽河之議有貞力奏蠲瀕河州縣之民馬牧庸役而專事河防以省軍費紓民力天子從之是役也凡用人工聚而間役者四萬五千有竒分而常役者萬三千有竒用木大小之材九萬六千有竒用竹以竿計倍木之數用鐵為斤十有二萬鋌三千絙百八釜二千八百有竒用麻百萬荆倍之藁秸又倍之而用石若土則不計其算然其用粮於官以石計僅五萬而止焉蓋自始告祭興工至於工畢凡五百五十有五日於是水官佐工部主事臣詡叅議山東布政使司臣雲鵬僉山東按察司事臣蘭等咸以為惟水之治自古為難矧兹地當兩京之中天下之轉輸貢賦所由以達使終弗治其為患孰大焉夫白之渠以溉不以漕鄭之渠以漕不以貢而工皆絫年費皆鉅億若武之瓠子不以溉不以漕又不以貢而役久弗成兵民俱敝至躬勞萬乗投璧馬籲神祇而後已以彼視此孰輕孰重孰難孰易乃今役不再期費不重科以溉焉以漕焉以貢焉無弗便者是於軍國之計生民之資大矣厚矣其可以無紀述於來世臣有貞曰凡此成功實惟我聖天子之致所以俾臣之克效不奪浮議非天子之至明孰恃焉所以俾民之克寧不苦重役非天子之至仁孰賴焉有貞之於臣職其惟弗稱是懼矧敢貪天之功惟夫至明至仁之徳不可以弗紀也臣有貞嘗備員翰林國史身親承乏不可以嫌故自輟乃拜手稽首而為之文曰皇奠九有歴年維久延天之祜既豫而豐有蔀以䝉見沬日中陽九百六數丁厥鞠龍虵起陸水失其行河决東平漕渠以傾否泰相乗運維中興殷憂廼凝天子曰吁是任在予予可弗圖圖之孔亟嵗行七易曽靡底績王㑹在兹國賦在兹民便在兹孰其幹濟其為予治去害而利惟汝有貞勉為朕行便宜是經臣拜受命朝儼夕儆將事惟敬載驅載馳載詢載謀載度以為乃分厥勢乃隄厥潰乃踈厥滯分者既順隄者既定䟽者既濬乃作水門鍵制其根河防永存有埽如龍有堰如虹䕶之重重水性斯從水利斯通水道斯同以漕以貢以莫不用邦計維重惟天子明浮議弗行功是用成惟天子仁加惠東民民是用寧臣拜稽首天子萬夀仁明是懋爰紀厥實勒兹貞石昭示無極海寧縣障海塘碑張寧海寧古鹽官縣瀕海南上有山名赭赭南逺有山對峙如門是為浙江受潮之口嵗久泝洄渟滀赭涘出潬若陼則口隘潮東仄擊於鹽官隈岸宋嘉定中潮汐衝鹽官平野二十餘里史謂海失故道有繇也成化十三年二月海寧縣潮水横溢衝圮隄塘逼盪城邑轉盼曵趾頃一决數仞祠廟廬舎器物淪陷畧盡郛不及者半里軍民翹喘奔籲皆重足以待縣上其事於府府守陳上其事於欽差鎮守太監李巡按監察御史侣二公以所上事詢諸三司布政司杜按察使司楊又以二公命各詢其佐叅政李副使端叅議盧僉事梁咸集厥地周視翕謀區畫㑹計相與祭於神具以成業托分巡僉事錢曰君宜任重有所給乏從革惟君自處公乃躬履原隰量材度宜命杭湖嘉興官屬因地順民採石於臨平安吉諸山物用林積舟楫轉挽蔽河而至分命把總指揮李通判何兼總工役初用漢犍絙法不就乃斷木為大櫃編竹為長落引而下之汎濫稍定人知有成勢皆奮趨事計以日費致月工填壘稠復為力漸易業可待就時盛暑公有念曰我聞聖禹治水奏鮮定賦非但䟽泄而已今民蕩析未寧農稼方作饑勞野聚必有疾疫未可亟也繇是作治雖嚴間輒撫循勞來失次者徙寓空舎惠以薪米大集醫藥以療病者作副隄十里衛灌河以防泄鹵之害義聲倡道富人爭自振施民至是始忘死徙之念嵗八月塘成適沙塗壅障其外公因増髙培厚覆實擣虚使腹抗背負屹成巨防而海復故道矣是冬舉羡餘之財修葺文廟増廣學地重建按察分司致祭告成公乃復邑父老過相語曰昔元延祐海患財力大艱時官謀寡誣以異術今之深沙鐵神遺跡近在吾少嵗猶見大父行於悒流涕而道其苦辛者皇朝永樂九年海决有司不時治民流移者六千七百餘戸淪田一千九百餘頃事聞遣保定侯孟英等力役蘇湖九郡貲纍鉅萬積有十三載其患始息此吾輩耳目所及者今錢公以一騎行邑斂不及民勞不縻衆徙以三府萬二千人僅七越月而績用聿成患大費省力少効速較之前事孰與此賢方首事之際振撼倉惶若遇勍敵雖有優才絶力當亦不暇旁顧公能發心藴竭性能紓徐委曲以庇食我以調劑我以成我稼穡以寧我婦子凡吾輩今日得以復安此土者皆公賜也奈之何泯没其徳遂相率叩縣令孫綱教諭彭永烈介予友醫官郜暹庠生凌雲翔徐寛具書幣走徴予文刻石予念風波漲溢凡際海之區無不間遇至於衝决激射惟浙江地勢為常自延祐及今纔百五十年海已三變雖曰氣數消長未嘗不以人力定勝但恐物非天成終當復故使赭山之潬復出沙塗之壅再去後之繼任非人文獻無考則父老前日之憂將或在其子孫也文章非紀實不足以傳信請詳述本末凡有事者皆刻之碑陰一以示今日之功一以示後世之法重修海鹽縣儒學碑張寧海鹽縣自宋建學至國朝凡十一遷修嵗月滋久典守靡常殘毁傾摧幾不可依息者非一日矣成化庚寅郡大夫方欲修舉㑹監察御史劉珂叅政寗良僉事周正方行部視學顧瞻不遑詢簡通判鄭昇委以創述之事鄭素㢘濟承命惟謹盡撒敝餘易以栢木中立明倫堂南徙中門北徙後堂東建復禮齋西建由義齋西北隅為饌堂東北廪庾肄舎在西際南上廨宇在東際北上復宣公祠於廟東仍文昌祠於廟西重門翼廡垣屏周肅左殿右堂廟學均稱自經始至告成僅八越月而吾邑之士遂復有所歸矣嗟夫學校者士之家也人而無家則無所於歸其適也將惟遇而止撫世者知其然必先為之地陶以禮樂期以科目待以禄位使有定詣所以收天下之材而一其歸也當周盛時鄉國有學賔選以時徳行道藝天下皆若人焉及其衰微以至戰國王政不行庠序廢熄士始變故求通放為游説騖為戰爭流為異端聚為食客波流風靡智藏耄遜而莫之振皆由乎士之無歸也汎濫浮蕩及乎嬴秦厭苦縱横之術一切焚書坑儒專尚法令士之所學益無嚮用絶於授受或就耰耡或附刀筆或迫為卒伍或困為屠庸茍避時禁不復審義一旦倡謀起事由其智力相並動足致人大約皆出乎無歸之士使其初不務除絶而務反古以居之則䟦扈踰閑者固皆曩時之賔興賢能也何至乎空國而速亡哉漢唐以下學校僅舉科目多岐士之功業與時相平因循遷合沿及五季儒者之門戸蕩然矣天啓人文誕敷宋治三百年來未嘗一日亡養士之地其後國步雖艱學治不廢官曹或紊士論常存建炎徳祐之際天運改屬人心不移雖有外圖卒無内叛扶持迓續百有餘年而仗節死義與國終始者率多學校之士蓋由其養用兼隆安危相倚士至是則又以國為家以死為歸不特不他適而已也嗟夫秦宋之國勢强弱不倫而其廢興失得之故乃爾士果可使之久無所歸也哉恭惟聖明繼周邁宋學校遍於海内所以陶養期待乎士者舉天下而一之無所不用其極海鹽雖地薄民聚居無厚資然比之疇昔人皆安土樂文俗尚明達風化日臻而不可動以非義者學與士之效也諸君子以士入官仰體聖意用能舉弊起廢使吾黨大康其家而終為吉士之歸是豈獨一州之美雖達諸天下可以善政稱矣寧故弟子員也舊家有光深復自慶因紀叙其事而刻諸石凡我同志盍歸乎來明文海巻六十七
