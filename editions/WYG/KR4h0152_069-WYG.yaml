body:
  text: 明文海卷六十九餘姚黄宗羲編碑三興寧縣城隍廟碑祝允明唐李陽氷記縉雲城隍神言祀典無之宋史謂城隍諸祠由禱祈感應而封賜之非通祠魏慕容儼有一事云其地先有城隍神言有亦非常祀也陸游記寧徳廟言自唐以來郡縣皆祭之又云社稷雖尊特以令式從事明此非令式故城隍歴代咸不在祀典至本朝乃甚重洪武初以公侯伯三等分封府州縣其號皆曰鑒察司民顯佑後復去之而列常典與社稷均禮凡小大守臣禮先夙祭誓於神然後莅民施政朔望走謁祠祀厲則牒邀神共臨之每行事拜以四皆懸著令甲盛之至矣而民之私事者尤極恭肅遇事禱祈匍匐控叩即無事亦以時瞻頓凛凛如事生逺近之所同也嵗乙亥予來􅌥興寧率國章弗敢弗䖍於神邑地陋憙事鬼而於神特嚴予以其正弗止也凡民有事兩自謂直不肯下家族鄉侣判以理未遽服寧並走廟號於神矢之願福直禍枉乃遂釋去雖沉痛重貨寘不復校以為神司之矣至兩造於訟庭或有疑須左驗而人若劵劑不存官將諏於衆不願願即神共誓後便聼如所擬無復譁其崇信秪畏如此然其始蓋誠然既習以玩則曲者亦恬然為之乂黷而巳矣戊寅之嵗予初考將盈每謁祠見頗有未葺餙處稍以私錢整之因文於碑終為民徼於神且以儆民焉夫甲乙儷詛豈雙直乎必有一欺神矣神不彰别善淫久將弛厥敬信焉又凡曲者既繆為之至不肖之舉殺刦姦偷亦凟神以倖免請焉若是者彼固自為黠然實頑㝠不靈不知神之聰明正直不爾聽也今而後願神直之小子才躓徳凉臨事暗鈍政為多迷用弗闖於治或者信其愛人而不惑乎上下者又有之矣兹惟庸愚之效然而如傷之心絲縷𦕈𦕈可質於神神鑒之矣行當去此斯民者神之民也神既洞灼物隱於素以予所知斯土汙習多岐有如刼禾奪婚侵防冐田誣冢墓屠耕犍輕身自毒是則最繁其甚者乃嚚訐健訟陵弱暴寡又甚者乃寇掠劉殺斯二大憝冐聲于邑亦孔之醜惟神樞機其間先導之趨辟後布之祥殃煌赫震厲俾潛遷於良良人益安嵗穰物熙邑用大康兹惟神之休長吏之志而黎人之攸企願欽事亡斁敢因以薦聞神其采諸晉烈士廟碑李濂余讀遷史至程嬰公孫杵臼之事及左氏所紀提彌明鉏麑之死靈輒之亡與夫韓獻子啓景公立孤之言未嘗不掩巻悲怛引袂雪涕而泣下弗巳也乃嘉靖癸未秋余巡都邑至忻州之九原夫九原者晉卿大夫之葬域趙宣孟之田邑也世家謂趙孤復立得其田邑如故檀弓國語並載趙文子與叔向觀乎九原盖即此地云余駐馬遲徊詢程嬰杵臼韓獻子諸墓父老曰吾郡程侯山乃嬰之故村韓溝乃獻子宅里逯家莊乃公孫中社原頭左城公孫之東西社也三子者之墓在焉余因命父老導謁之出城南郭門則酹嬰墓反而出城北七里則酹杵臼墓又東南馳二十里則酹獻子墓晡而旋宵而永喟維緬諸烈士年代遼逖塋壟荒薉非建祠以合祀之不可乃進郡大夫而諭之曰諸烈士風概在天壤間霆轟星耀震動千古矧兹故都也汝亟擇地而廟祀之翌日郡大夫報曰城西北一里有龍王廟焉撤淫祀正不亦可乎余往相之則見短碣伏草莽間篆刻莫辨洗剔徐覽始知是廟為杵臼故祠乃白其事巡撫都御史長垣胡公巡按監察御史萊陽王君咸是之且謂余曰匪祠何以表烈匪碑何以昭逺盍紀其事而載之碑按宣子晉之賢大夫也下宫之變屠氏之無道極矣嬰朔之友也杵臼朔之客也獻子宣孟所薦士也杵臼死之嬰立之厥贊之卒滅屠而反其田邑可不謂難矣哉當宣子之驟諌也靈公患之鉏麑者受命於公而賊宣孟者也提彌明車右也靈輒翳桑之餓人也觸槐搏獒接踵死焉倒㦸報食不告亡焉皆感宣孟之義而奮不顧身不可不謂之難也宜合祀之於是貌宣子於中而厥嬰杵臼彌明麑輒咸配食是故合祀之者禮也先宣子者主也次獻子者貴也次嬰杵臼者功也次彌明麑輒者惟及其烈也春秋饗之者思也廟曰烈士者悼也廟既成余作迎送神樂曲二章教忻之人於春秋饗祀之日婆娑歌舞以樂神而并刻之石其辭曰縆瑶瑟兮拊鼓巫緩節兮應舞神之來兮前素旗紛玉珮兮光陸離風颯颯兮凄其若有言兮傷悲曰遭時兮靡昌匪諸良兮疇襄聨虬駟兮徜徉澹忘歸兮樂故鄉睨九原兮晉疆相顧歔欷兮涕泗浪浪右迎神終獻兮徹爼停律兮降羽靈濟濟兮既歆焱去我兮何所太行委蛇兮滹沱東流吁嗟此邦兮神之樂丘春芳菲兮秋黍胡不留兮容與陵谷變兮時代移逺有塚兮近有祠英風萬祀兮在兹怳我氓兮永思右送神㑹稽雙祠碑文徴明嘉靖廿有六年丁未十月㑹稽雙義祠成祀宋義士唐公珏林公徳暘也宋社既屋䝉古氏據有中夏不修政教信用邪説首毁故宫為寺而宋諸陵之在㑹稽者悉發而夷之以翦王氣姦僧楊璉真珈實倡率之珠􅃭玉㭱悉為攫取而投骨榛莽極其憯慽璉方貴横莫敢傍睨二公先後以他骨竄易而瘞之植冬青以志賦詩激烈不勝遺黎悲慨之感未幾璉裒遺骸雜枯骼築為鎮南浮圖謂可以夷滅摧盡而不知雅非蛻玉矣方二公舉事之時履危探險艱阻百出而卒潰於咸其志亦烈矣顧正史不傳而其事雜出於元儒紀事之書其言不皆同而皆有所徴要為不誣也夫千載河清廢興有時開國之君往往以封植陵墓為首事而元之君臣乃首發諸陵以事厭勝於是乎有以知元祚之不永也或謂此皆姦僧之為而非元君之意按世祖以丙子下江南丁丑二月即詔璉為江南總攝尋命以所發宋陵金寳修天衣寺又以寧宗攢宫故地為泰寧寺其後以臺臣言其盜用官物及流毒江南請正典刑而世祖竟赦不殺雖嘗没入土田家口尋給還之其委曲蔽覆蓋可見矣初年秕政固無足言獨怪當時輔佐諸臣多一時名碩亦有前宋遺老曽無一人興懐而奮身抗義乃出於布衣韋帶之士其事有足慨者且其時宋巳滅亡時移運改二公者豈復有所覬乎説者謂其無所為而為髙義卓行比隆豫讓夫讓嘗受智伯國士之知以國士報之宜矣二公在宋曽不沾一命之榮而慷慨從事至於變服為丐鬻家具以需間關覉逆以圖即功其難易厚薄君子蓋能辨之矣稽之前史漢唐易世之後其陵寢亦多被發不知當是時亦有髙義之士反虆梩而掩之如二公者乎蓋有其人而不見紀載則夫二公之義雖謂之前無古人可也抑於是有以知宋養士之厚而獲報之無巳也縣故有祠在名宦祠之左嵗久且敝南充張君鑑以甲辰進士來知縣事考縣志得二公之事謂公所為得名直以陵寢之故陵傍故多隙地依陵植祠於事為宜嵗時有事六陵以次及公祠與陵相為終始亦庶幾二公之志也於是言於郡守吳江沈公􅑸公亟俞其請相與成之以書屬徴明記其事為論次如此而二公事始具於鄭元祐陶宗儀者不暇詳也建武城碑任瀚夜郎為寇中國僭稱侯王自莊蹻畧西極以來軍法所不制蠻中惟夜郎部最號梟雄是稱都蠻竊據犍僰要害四塞險絶猨猱虎豹所宫即有孫吳提重兵壓境賊乗髙客軍處其下如人射鵰雲中决眥向空功力俱喪故先朝諸將戰守多敗屈失利常置不問明興二百年間王師西下討罪前後數百戰訖無成功憲皇帝常勅大司馬提軍十八萬駐境上師老將罷纔搏一捷然所耗傷甚重得不補亡今聖神文武皇帝嗣位朝覲萬國薄海窮裔包奉貢獻無敢後時唯都蠻擁部落横行塞下數犯慶長髙珙筠戎漸逼叙瀘所到疆土盡赤刳衈人血肉以釁邊甿野死無弔開府中丞曽公上疏言臣待罪西垂不能絶邊患無所稱塞意㫖願將戮力破蠻赭其巢畧地以聞皇帝下閣臣議奏言蜀在中國為西南重鎮叛不速討諸羌將望風起事蜀豈得全百官多以蜀道艱難什倍塞漠噤不置可否間有以漢武使唐䝉畧通夜郎事對不報閣臣遽入奏上取進止詔遣使授中丞弓劔節斧行大將軍事聽自擇官中丞既受詔督軍夜郎以左布政使成能叅政宫用伯龍兵巡副使江僉事思充咸入贊計畫分局受事表請以南中軍都督顯為節帥統制諸軍以故總兵成叅將澤等十二人為偏將自宣撫效忠以下咸聽節制元年春三月中丞南嚮誓師傳令軍中無殺降無縱亡匿敢有黷賄市奸宣漏風指坐以黨叛伏誅臨敵首竄攜貳逗遛進退者其斬以狥誓巳密進顯計師所嚮顯議九絲城蠻中都㑹自比漠南王庭蕃漢土著無賴亡命所歸地深阻不猝得拔凌霄砦九絲便門都砦比東霤先擊便門次東霤即王庭蚤晩可得獨凌霄王阿茍最桀黠蠻所怖畏然喜貪賂遺封爵使通老㗖令下關執其王并六酋帥以獻羣獠奪氣夏五月軍襲落豹設伏擒四賊將取惡淚坂進迫蠻營顯以牙校鯨將鋭卒五千與成澤軍合圍連决十餘戰城破賊敗走追斬二百級誅名王阿么名賊將六七人梟其頭夜郎都市夏六月以鎮雄兵三千攻落亥鯨軍藍澱坂襲淇匡成軍董木與鎮雄兵犄角攻蠻巢千餘賊迎敵决殊死戰執其兩名王斬首麾下盡收都砦部落秋七月始計取九絲城城據夜郎西山兩壁對望中阻長谷庫入谷兩陣夾攻無得脱者厓磵斗絶四十里三雄王壘其上控弦數萬王皆彊力曉軍事貫攻戰聞别柵既破益防隘拒險嚴矢石塹牢自衛顯使間諭三雄王大將軍用兵如神聲號聞海外今以百萬師摧兩砦如搏雛鷇理豈得逃能先事降我許待以不死蠻懼且遲回觀望不决部下乞降者二千四百有竒秋八月令募郡國敢死惡少年増兵至十四萬公按兵法分五部進各將二萬八千以行營副使江監督諸軍事顯仁威引兵入黒胃軍其西斷呂郜烏䝉豕哦諸路成將所部出印覇軍其南以當芒部越巂牂牁澤軍出穀爆陳其北以絶冉駹董下韓胡朝似闕軍得穵口陳東北斷其内寇使毋猾餉道毋阨儲胥以資寇食位祖軍西南與顯兵合五陳環絡如連珠緩急相應兵既㑹賊出勁卒鏖柵下十餘遇皆北始退保兩壁間乗城轉石發標弩下擊䎒䎒如雹霰不休時鬼方多淫雨𤣥霧晝𡨕彼堅持不下秋九月公傳檄責戰厲甚用顯計令軍中厚賞賚土漢衝鋒死士使夜襲城㑹鯨等將顯所用諜夜入帳中見顯諜言蠻中以九日作社椎牛大饗且見霖潦無搏戰理將弛兵酗酒自放顯密諭諸將宜出不意廼夜發猿臂軍千人乗飛隥嗛枚取道間關霧雨中遲明進薄城下斬守門者破關以入諸路軍取鳥嘴為節刻期㑹戰起寅至午所格殺貫戰數百人賊大披靡前軍引火炬燒城中囤舎千餘炎燄張天賊勢窮赴火墮崖谷死者數萬雄王皆棄壘走分兵大索冬十月取次就擒都蠻至是盡滅計先後攻下城柵六十有竒擒王三十六人俘斬四千六百有竒畧地四百里還報闕庭皇帝御皇極殿傳制曰國有戎兵予不敢臆决惟爾中丞哲肅勞瘁封疆能䇿諸將士破賊擒王以速成丕功用奠西垂康靖我國家其晉爾右副都御史顯以下爵賞有差其以九絲城為建武城置府衛兵下控西南部落命所司伐蔡䝉石勒朕文武臣功使能賦者銘其勞聲諸永世其辭曰天王神聖威加九夏僰胡為者坤之社其山硉矹谷􅛦閜蠶樷開國來百戰不得下鬼其讐之聲在野貍晝號守以虎䝤不庭戒邉櫓其誰使者狥西土殿中有丞既文且武願假旄鉞斬桀虜丞哉飛檄怒濤發英風颯爽能起邊城八萬四千戰死之白骨笔籌赤牘肝膽壯勁氣直上蒼龍闕雲旓羽旂盪摩日月墨王􅀈廖王􅩻落豹熭落抝鈯長鎩夜擣雄王窟三十六碎領顝土有賸壤戸有㖓卒且蘭靡莫咋舌不敢唾楪榆卭莋磔狗飲血斷出没咦雀入淮化蠣房雉入海化蜃先寇盜得險化侯王窅窅建武城列雉天一方守者非忠賢能無化豺狼蜀有天險上為劔閣下瞿塘割據自古昔可獨問夜郎誰借明王三尺銕為君世代誅豪彊蜀不割蠻不屋蔡䝉補天之石髙崒嵂長與乾坤鎮南服無使三十六王城下鬼夜哭嶺東平三饒寇碑黄佐漢人有言曰兵者所以明徳除害也故舉得於外則福生於内確哉言乎乃今徴之矣欽惟聖皇在宥啓廸鴻猷四海𤣥同臻於悠久夫朔南之相距固萬里也然徳意所孚如在咫尺雖不軌不譓之徒時或孽牙其間亦皆闟然而服儵然而化殆猶日月容光必照而奚㣲小之遺哉自嵗丁未倭奴窺潮東鄙戊午遂侵饒平於是逆賊張璉負固竊發始則肆行剽掠恐喝鄉衆以遏追呼旋苞三饒築重城結圍寨以自固巳而四往結聚大埔則賊酋蕭雪峯程鄉則賊酋梁寧王朝曦王子雲南洋則賊酋王伯宣煽動飈發海陸相為犄角自是流刼於外跳梁而不可禦矣初破閩之雲霄鎮轉掠三河詭執縣官要求招撫時方罹倭患瀕海所在盜起故璉得以陽降陰叛而其徒因尊向之比陷鎮海衛破南靖縣城遂逼豫章憲臣被害潮素號繁庶王伯宣復導倭奴大行殺僇民不聊生莽多暴骨雖有良將遮守要害莫可誰何三省乃各上其事於朝辛酉秋簡命少司馬兼都憲百川張公起諸家食賜之璽書俾撫百粤與總兵平江伯陳公興師討之復特勅代巡侍御蔡公紀覈功次㑹議僉同廼下令選調漢達土目官軍合十萬有竒而檄吾藩預備粮賞且逆慮其敗走不北入贑則東入閩先遣竒兵萬人餉金萬兩趍往䖍臺分發詔安和平二哨以防守而又戒約閩之海道提師西遏公遂移鎮駐潮乃分我師為五道指授方畧刻期齊發密令大兵臨寨則多方設竒預簡精卒持利㦸勦滅梁寧以斷其羽翼先鋒至寨生擒賊帥宋興璉巳奪氣矣而王子雲復被擒於程鄉前後俘馘數多璉漸窮蹙於時中哨由大埔渡江夷道刋木憑陵險阻以衝其腋分守嶺東左叅議馮君臯謨與鎮守廣西副總兵王君寵監統之攻克烏槎等九村及圩嶺等寨前哨由饒平北入分巡嶺東僉事張君冕與瓊雷叅將門君崇文監統之簡竒兵三千為左哨控扼要地防遏海倭統以惠潮叅將張君四維仍令與前哨夾擊攻克石湖馬岡等巢寨後哨督賴家營以扼其亢則分巡嶺西僉事皇甫君渙與肇廣叅將鍾君坤秀監統之攻克小靖埔坪等巢寨右哨由大埔胡料鄉以掣其臂則分巡南韶僉事賀君涇與潯梧叅將祝君明監統之攻克白堠吳家畚等巢而饒平連結大埔之凑遂摧折矣公先榜諭令賊能俘賊者俱准報功給賞是後右二哨計擒蕭雪峯以獻璉勢益孤思遯海而震疊無措中及前左三哨麾兵齊進其徒遂紿璉擒之及其謀主李逢時歸於我師賊帥偽都督詹世旺等皆攜偽印以降適王伯宣統衆數千人入府城下公密運籌使守巡及知府何鏜分兵執之即磔伯宣於市觀者驩抃稱快倭奴暨璉殘黨俘馘無算巢穴次第悉平潮民始出湯火云是舉也四月十八日始臨寨行誅迄五月十三日獲璉而告武成信神速矣哉昔齊伐燕五旬而舉之自説人力不至於此今也不浹旬月而賊酋自縛大類炎帝之世夙沙來歸而堯戰丹水舜征有苗風斯下矣於是有司稱賀公遜謝曰我聖皇天也肅將天威惟恐不副敢貪功乎於是馮君立碑紀功乃授簡俾予載筆猗乎公承天命克襄天功而不居可謂至矣嘗聞進賢之北湖肖二曜百川歸之涵混天碧有日月得天之象焉公實鍾靈挺生履星辰而上之其在今哉輔成天徳丕寧萬國既昭萬世無疆之休則垂萬世無疆之問易曰日月得天而能久照詩曰明明天子令聞不巳此之謂也重修徳化寺碑銘沈鍊道也者自動自靜自闔自闢孰得而思維之能思維其所不能思維則通乎道矣故道有盈虚有消息陰陽之義也儒佛之論興而道益以晦道未嘗晦而人見之晦也夫道何嘗無儒與佛亦何嘗有儒與佛謂儒為盡道非也謂佛為非道亦非也世教之盛則道縁於儒世教之衰則道縁於佛故道無所不縁豈惟縁佛縁於衆庶縁於小人道也者天也天之將滅小人耶則稔其惡矣小人之惡不稔則聖人之徳不昌故霜霰積而陽春生矣西極晦而東方明矣今之時世非耶保安新城東上徳化寺天順間有僧天然創之其徒圓達繼之而㘣達之徒徳鑛復建天王鐘樓并碑亭三座徳鑛性淳實有佛行始余謫遷即卧病其中謂余有忠義大節朝夕顧視為切至而余宗子應璧業儒是燕趙名士率諸弟子數十人讀書於其精舎因屬余為碑文記其大畧予曰兹非鑛所思維者此道將縁佛而興儒者之化使余得推明聖人之意以警將滅之小人豈不有自然者哉因不辭而文於其碑而且銘銘曰燕趙之際秦郡上谷州為保安漯陽是躅已巳搆變辛未發足五百之年神貺其輻雞鳴翹首八寳潛育三川盤旋㑹於坤復佛舎曜祥神宫展籙儒行光明章甫雲簇寄跡雙林揚聲九牧大悲救難小隱巻曲車行彭彭馬亦何跼擒彼六賊惟神之屬吾斯銘斯非鑛也獨宗子相祠碑王世貞往嘉靖戊午倭冦起閩海躪福清遂以其勁搗省其大帥恐甚部分諸監司乗城守而故廣陵宗君子相以叅議得西門西門最為省要害郭外之氓叟婦稚跳賊而求入者踵相囓也大帥念賊或得以間乗之下令毋内民内者坐軍令宗君謂奈何遂拒吾赤子而委之賊且賊逺未遽乗也乗吾力能辦之大帥益恐欲設難難宗君則謂省無百日粮而驟益人以耗吾食非計更令入而挾芻粟者入之其非挾芻粟者弗聽宗君又謂吾赤子奚擇奈何遂拒其饑者而委之賊賊又必不能為百日攻也於是大帥之難窮而宗君遂大開門縱其入諸見阻他門者亦轉旋而入凡數萬計宗君度入且盡徐徐治守具而出竒以創賊賊竟逡巡遁走於是宗君之聲稱冠諸道遷其省按察副使督學政竟用積䜪病周嵗卒當宗君之為叅議副使而汀守徐君某以事趨幕府故善君因得從君遊其遊輒於西門之烏石山山有薛老峯鄰霄臺蟠桃塢之屬皆遒聳深秀昔人之所詫以為靈仙窟宅者宗君樂之間謂徐君曰天地大矣而有兹山為兹山億萬年而始有吾二人哉則又曰吾去吾官若脫展耳而不能遽舍兹山也庶幾異時神遊乎哉蓋宗君没之十六年而為萬厯之丙子徐君自謫起數遷而為其省之叅政以至按察使嘗經行西門咤嘆曰此故宗君所入避寇吏民道也指謂其父老若猶記宗使君否父老涕涔淫下曰微公言吾能忘宗使君其為人長者稍出而謂郭外之民記宗使君否則大戚中有號哭者曰微宗使君而不肉於倭冦者幾希且吾猶使君子也更問徐君宗使君不幸而夭吾聞活千人者後必封使君所活詎止數萬人其後何若徐君亦泣而不能答以宗君之無子也則相聚而泣其頴者曰吾聞之朱仲卿而以桐鄉民愛之故謂後世子孫奉嘗我不若桐鄉及死而其子葬之桐鄉西郭民果為仲卿立祠嵗時祭不絶今宗使君無子獨不能捐西郭之咫尺地以祀之而視其為若敖氏之餒乎哉徐君乃曰無庸也吾不忍以宗使君故損汝曹橐乃搜贖鍰之羡與學匿租百五十金以為祠費行地而得烏石之址喜曰此故宗君所屬神游地也其必食矣於是閩令裔先丞從周受工焉為堂三楹牆繚之出石橋而門與西山對復得傍寺僧之匿田供嵗祀其民以時禱祈者勿禁徐君乃走書及狀而屬世貞曰請假子之一言以示永久余謝不敏則謂韓退之嘗誌柳柳州之墓而又記其羅池廟以知柳州深也今吾幸辱宗君知亦為之一誌其墓矣宗君文當不下柳州故嘗為要官而外除亦畧相同其遷地之近與賜復之易宗君雖若少勝之乃其年與其後不及也獨所謂少年勇於為人不自貴重毋論宗君無之而烏石之祀亦其民之久而不忘與徐君之獨居厚也非若所謂死能驚動禍福之以食其土也巳余文固不敢望退之其何能辭乃記其事報徐君而復為樂章一以迎送神俾刻之石其辭曰築宫兮嶔岑望烏石兮參差桂棟兮玫垣薜蕙兮繚之藂百馨兮廡門攬遊鯈兮橋池黄流兮灌鬯實籩兮肥羜氓紛紛兮若囝靈何為兮延佇倩覡餙兮前舞靈徘徊兮心獨苦秋蘭兮紫莖濯清泚兮流素馨靈翛然兮若來獨流睞兮友生風謖謖兮茄帶怳若襲兮靈之袂彷徨兮不得吐將兩誠兮𡨕㑹夷猶兮澹忘惆悵兮日將暮金支蕩兮迴照霓車轔兮澤霧朝汎兮歐冶夕栖兮丁戊靈之格兮羣愉靈之逝兮我憂吻滄海兮不波束金﨑兮使安流憯莫憯兮百年樂莫樂兮千秋正學書院碑劉文卿婺州之崇正祠勝國時行省中書請而秩之祀典我朝憲廟復詔建為祠故四主宋何先生子恭元金先生吉父許先生益之王先生㑹之皆鄉人服元晦之學議述多行於世楓山章先生濲人也力學玉山之陽與一峯之徒相權輿郡國旌其澤祔於廟春秋比之釋奠然廡櫳圜道無有也其址赭城右翠翼巒環縈松谷舒其西脉紫室映其北垂烏溪騰帶永水盪胷引湖鑿汭匝為近襟逺眺信安諸峯綢雲浮玉風土靈潔信名賢所都居也張君來守是邦暨余祀故祠瓦堙木刋二三先生且暴露歸土偶矣士莫愛道及此數耶楊子曰匪伏匪堯禮義哨哨其先有衣冠言行而可遷則豈在思逺規賤儒懼枯也走秦魯趙衛之郊求止也聞至言指簡易相率而駭如爰居恥祀一二門牆之人其心畸行畸曰盡偽事也不知教人之無類也道若川若途有贊矣有和矣茫昧於中道而戰癯交集易之繫禮之庸士尚不能明而斤斤闢三諦之業烏在服其心而與之甚矣今天下數士病道也燕雀不忘故都士居先生之地而興起易動習尚易釐信之則祖父之戒諭佩之則青出於藍也世無河汾之席董薛逸少之響不必應時乏北海之門中逺鴻豫之徒不必覩造士有塾塾有期期有課課有髙山之仰亦或王之席而鄭之門也張君於是占氣審食建襲經之閣布編蒲之牖届於玉池為堂二廡二亭一龕一藏一徒室百十有六肩牆百有十丈壯哉祠之周也周哉祠之壯也閲嵗績用大播無懸甕之文而有鍾離之治其峋然塑繪若衣冠言行之佹具足以振隱淪之脉而興百世之風所謂周禮盡在魯矣耳六代之樂者言必及雅吾大張其户庭而彼焉巧於岐路往者不拒來者不追冐僭王之譏而黜非服之儒則吾所謂待能者也詩曰維彼鶺鴒載飛載鳴而月斯征而日斯邁彊不息也學士何不反其窳溺者而精進道不可離也不自顧其鳶魚之察而川上之逝終食顛沛造次胥與役也其功日益岐而性日益昧乾坤簡矣易矣夫婦之與知大人之不失學士胡不格物而識之童習白攻非盡牽耳目也如是則内照不殆不殆悦不畫矣正我之習而無以相似窮彼之是而無以相是令二氏之自見也其無以與孔孟争造影也外道將自降此非吾之言而聖門之言聖門之言先生不以為不我似也則學士何不學其學人其人而相與一變之為快也張君輾然曰圖之此其時矣甲戌之嵗糺相翳明天下萬宇俱廢斯土佳氣鬱葱而余首其事熾於宋元而􅀈􅀈若生不是過也嗚呼百家禮樂可燔乎而濟南吃其餘訓學徒庠塾可滅野可祭乎而東山新其徃蹟使夫士與士言義大夫與大夫言政其化速矣而天下往吾以是知斯文之不地也乃銘曰遹彼象賢居城之東塹苔碣蘿庭蔬踰紀如川閲水幽谷莫響惟守於行以古傳祀幅富捐甘峙楩編茨跨堂密宇華觀丹楣周垣四葺棊櫺相經古則膠庠今也惟聚廬洞千羣鵞湖問系士説師經漢詁晉訓蘭芷紛如四科競入子駿輕移景伯條例祀由光國學莫愆家周衍無知鸞嶺外驅無文猶興地徳參禎背白石之仙蹤祖雲黄之嶤阿面雙流之清直奠海沙之敞宫攢林織坳野蒔承隅審勢宅休累世誕貞景止五賢功阜一人純徳純師是邦之君朂哉子衿蓐籍振纓毋為􅢟斯大道蕩平海常祠碑吳時來海棠祠祠宋臣淮海先生秦觀也在横州郊西之海棠橋側即先生故所寓地後人髙先生之風為亭其上又改為書院實與祀典未載初横人以先生風義有益於其鄉之人合祀於是祀先生於鄉賢議者以事先生不宜以鄉乃又祀於名宦既又以先生編管也處非所據於神未妥二者皆非所以康先生也推先生之志即生而血食之將舍而棄去復奚後之祀不祀羡耶從後觀之謂先生為横人可也莫土非吾也謂先生為名宦可也人有餘思也嘉靖乙卯南海髙君士楠來守州事因亭宇圮壊方積需謀為修之適先生之後人有秦某者以靈山丞過横復以請於髙君乃為之立棟宇築垣牆將迎先生主祠其中於是議專祀今之論先生者曰詞人詞人甚又沉迷禪㫖以寫佛書為徼者所乗致流竄無寧日吁誰從而論先生之世耶先生初為編修與蜀黨諸君子忤時􅌥章惇輩乃御史劉極承意劾其修實録詆誣被謫處州實與范祖禹諸人同既而以寫佛書徙柳州既而徙横州徙雷州益戞戞乎靡有寧處唐宋以來髙修操厲之士半入禪家而趙清獻二蘇公黄魯直諸人乃其尤者豈學道未純而好髙異之心易投難㧞亦不覺其深入歟及觀逆旅集海棠祠有本無本等語乃知先生之叅禪皆其居困之時借以解外紛以舒其抑鬱無聊之意而實未嘗有害於吾道也若致患之因即不寫佛書其遷徙猶是也不究元祐碑中諸黨人寧獨少游耶乃為之歌曰歐歍肪脂宅南方臭肥滅鼻幽以芳山澄水碧清夜光奎婁錯落燦文章舌筆之吐離毫芒危難之安思所傷委命大郭托醉鄉含孕苞元極横洋䦯閟靈室配崇岡風流後嗣宜久長忠節廟碑陳栢按西關志揷箭嶺舊有忠節廟云嘉靖庚申余自職方出備井陛志事廼秋八月提兵由曲陽縣趨倒馬關遂駐揷箭嶺守焉九月又由浮圖峪走紫荆關得備觀蜚狐諸隘口蜚狐者今廣昌縣也其年敵擁衆數萬自大同入掠朔應忻崞諸處十餘日始遁去余乃督諸將整兵伺之兩閲月乃還凡所歴有倒馬祭刀曬甲諸石皆宋將楊六郎遺跡始余按嶺之明日即其廟掃而拜焉其前題曰宋良將楊六郎祠者蓋宋髙陽關副都部署加團練使楊延昭之貌其後寢所祀土人稱令公者則宋贈太尉代州刺史楊業也旁復肖其貎有七皆捧胄執戈凛凛然猶有生氣尚欲搏強敵而噬之者詢之皆云令公有子八人其稱六郎者則延昭也余初至倒馬關亦謁其祠未見題有忠節廟碑立馬欷歔者久之今至祠下摩挲所謂揷箭石其遺識宛然又未嘗不拊髀而歎也余讀宋史業本北漢舊臣初名劉繼業方其主繼元來降業猶據城苦戰太宗素知其勇欲生致之繼元方遣親信者往諭業乃北向再拜慟哭釋甲而往見焉帝喜且厚慰之復姓楊氏授大將軍尋晉為代州刺史卒副潘美以破遼師拔雲應寰朔四州至號楊無敵使遼人忌之望見旌旗輒引去及陳家谷之役乃為䕶軍王侁所迫業巳度其不利且謂美等幸張步兵於此以相援也及退趨狼牙村而侁等巳麾兵却走矣業乃撫膺大慟猶率麾下力戰身被數十創士卒殆盡尚手刃十數人遂墜焉被擒其子延玉死焉業復三日不食乃死於乎若業者謂之忠節非邪真宗咸和之際其子延昭復以團練使守髙陽關契丹之侵遂州也衆以城小莫不色懼延昭乃集衆登陴固守以候援至且汲水灌城悉為堅氷城賴以完今所遣揷箭及祭刀諸石土人談之烈烈如昨日事凡水旱疾病有禱輒應是延昭之忠憤猶有存者余獨怪宋事以延昭輩為將而寇凖方力主親征使真宗不為王欽若所惑則燕雲十六州可唾手以復奚啻僅僅為澶淵之盟邪後世子孫又何至南渡如靖康也我國家奄有四海威震朔漠蓋嘗三犂北庭矣今天子明聖神武以文惪綏宇内其有弗庭者輒出師討之曩余在職方嘗檄諸邊帥願以長纓繫單于之頸而致之頃者視師關西即與諸將士繕城練兵矢心以破北敵諸將士亦攘袂思奮因慕楊氏父子遺烈慨然想見其人恨不與之同時親覩其戰功如宋史所云巳為之扼腕顧瞻兹地乃素所馳歴以樹勲名者乂可使之冺冺無傳耶乃命守備李著伐石紀焉且改題其額曰宋良將楊父子忠節以告來者云東吳靖海録徐縉吳水國也濵江帶湖東漸滄海當倭夷孔道蘇之崇明邑尤斗絶治海中所轄地皆離立水面非㠶棹不通故稱各沙云風氣澆薄民俗輕悍習於濤波之阻狃於漁鹹之利寇鈔讎殺日尋干戈雖復約束以文吏鎮壓以戎行而法久弊滋綏禦無方率三十年一遘大亂如劉通如施天泰如鈕東山如董琦侯仲金王顧諸賊皆沙編氓而竊發相望不踰常期咸至用兵勦截屈法招誘乃克小康良由草薙禽獮不能芟其根株破其巢卵數載之後醜類日繁凶徳叅㑹則始於盜賣漁鹽中刼奪商旅馴至罪釁叢積主名顯著非叛逆不能延其喘息終階大亂斯海寇頻仍之畧也近嵗邑之長沙民秦璠王良王庠宋文晟邵漢顧良徐守正等皆前叛族之黨裔私分部曲世濟兇醜出没江海盜販流刼為日乆矣兵備憲司屢檄州縣招撫之不肯降自分不赦益嘯聚亡命羣盜鑄造兵器樹立旗號偽稱靖江王内自太倉諸近地外自大江千里間白日殺人燒刼市鎮剽掠賈舶不可勝計沿江瀕海之民騷然奔竄而斥候捕邏之士莫敢誰何遂乃邀截運艘戕殺兵吏騰播妖言無所顧忌蠭屯豕突勢漸獗猖嘉靖庚子春兵備副使王君儀遣官討捕州判石巍千戶周朝卿等違其方畧並致喪衂於是巡撫都御史松泉夏公巡按御史䝉泉趙君上疏請師誓圖勘定上為之震怒切責内外守備重臣及江防諸司逮繫僨事者下之詔獄仍勅本兵依今少師大學士桂州夏公在諫垣時所論建置江淮總兵官以專戎務乃擢都指揮湯侯慶為前軍都督充巡捕江淮總兵官嚴期討賊冬十月湯侯乗傳至吳與夏趙二公洎操江都御史王公巡江御史周君親臨太倉相度賊勢叅酌機宜協贊軍務若夫興發資儲整勅戎器戈船砲艦長棘勁弩艨艟百艘飛騎萬楫則夏公徴集之招徠勁勇選練驍敢妙簡偏裨撫循列校虎士千羣魚麗九變則湯侯訓齊之明賞罰之條舉激揚之典制中權之謀建廟勝之䇿則夏公與趙君運斡之扼長江之險控千里之勢増守禦之防恢掃蕩之畧則王公與周君襄贊之用能號令整齊憲度嚴肅資械山積人心飈奮固已不戰而奪之氣矣十六日小遇於唐子口擒其􅀈酋縱其奔逸示以先聲决我全勝十一月三日大軍出劉家渡口賊勢鋭甚海鰍巨艦長蛇堅陣彌亘聨絡螳怒鴟張其渠魁皆緋衣金帶鼔吹儀從談笑揮霍指顧拒敵我師則長㠶蔽空𤣥甲晃日雲翔鳥集之隊龍驤鷹揚之校開闔左右變化若神既接戰湯侯親秉白麾往來督䇿呼聲如雷海水飛立神鎗效靈竒績先著戰自朝至日中昃賊徒殱焉臨陣斬馘賊首秦璠等四人賊從二百餘人傷溺者二千餘人臠屍沸血洪濤為赤惟王良以三舸逃歸長沙翌日副使王君密遣辨士陳熙持賞購榜諭曉說賊首小宋文晟捕斬王良贖罪取功十一日小文晟果等猶屯結未散越二十五日湯侯乃以副使王君行營諸哨開帆大洋直擣長沙焚其巢窟夷其險阻萑苻篠簜鞠為灰燼斬首四人捕虜二百餘人鯨鯢戮於淵渚蛟鱷尸諸藁街累年黠逋一旦掃滅三軍凱旋萬口稱慶臣盡其算畧無所牽掣協心同慮克樹大功海甸寧謐永無東顧之憂海隅蒼生奠安袵席之上者數公之力也至若軍興而民不知擾寇熾而列城安堵俘馘千計而不及於無辜資費巨萬不出於征斂則乂巡撫公之雅量操江公之逺畧巡按巡江君之風裁太守馬侯之㢘能節推陳侯之明慎處分經畫切中事機之所致也洎夫元戎湯侯副使王君偏裨列校竭忠宣力經文緯武勞績茂著之先後則有聖天子賞功之典在辛丑之秋南岷王侯以名御史來守吾蘇下車旬月政教大行乃謂節推陳侯曰蘇維畿輔重地意外之防莫切於此海沙之寇顧兹偉績誠宜請於立言鉅公鋪張揚厲銘勒貞石樹之海壖如銅柱故事以昭示於無窮庶幾有所懲勸謂縉郡人也聞見所及諒得其詳猥托以序述不獲辭遂録其實如左明文海巻六十九
