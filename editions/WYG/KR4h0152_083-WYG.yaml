body:
  text: 明文海巻八十三餘姚黄宗羲編議十復河套議尹耕蓋聞智者之圖事揆理以立本審勢以達用是故理有所當盡而機有所宜察志有所必奮而謀有所不可畧者是之不備難與慮終矣河套之地淪於邊外藉冦齎糧孰不為愾然以今日事勢論之則有可復之理而無可乘之機有奮發之志而鮮萬全之算故不能不為圖事者慮也何者河套本吾内地周秦以來為國為郡漢制朔方唐城受降扼塞據險往跡俱在我太祖以神武定天下成祖躬御六飛三犂北庭其時彼既殘破我亦未暇後遂因循棄河守山使中國之地巢穴盤固滋其畜牧遂彼生養往來馳突迫吾近塞可為深惜者也又黄河千里於守為便昔人固有築城於外以規全利者矣而乃棄之不守任其出入涉流履氷無所顧忌遂使榆林一鎮孤懸獨立外之不足恃為藩籬内之無所需其供給捐天設之險失沃野之利有志之士談之扼腕觸之衝冠蓋不能一日忘懐者也然當其時我雖未守彼亦未取不見可欲其心不動不奪所賴其争不力取之可也而我終不取之先總制余肅敏公置鎮榆林亦有志斯舉矣然套終不復鎮則空置開懇無聞轉餉難繼不有其利而當其勞事之不可悔者也今敵已盤據其中資用其産譬之為家成業久矣又控弦之衆視昔為强一旦復之無乃難乎故曰有可復之理而無可乘之機有奮發之志而鮮萬全之算也請極言其故以干天聴可乎孟子曰天時不如地利地利不如人和夫天時者非止時日支干孤虛旺相之屬也敵有盛衰我有强弱以强值弱僅足相當以弱值强是為無策夫漢武雄斷天啓衛霍不世之將也絶幕四出不能一屈單于之膝成哀短祚内釁且生而呼韓稽顙願保塞北是何也漢武值其勝强而成哀際其衰弱也是勝衰强弱者天之所謂時也地利者非止險阻城池山溪疆域之屬也馬步矢刄各有所宜主客勞逸從來異狀韓信背水置陣死地以生魏武舍鞍馬與吳越争於舟楫之間烏林削跡是何也韓信以死地為生而得其逸魏武舍中國之長而困於所短也是長技所宜與主客異勢者地之所謂利也人和者固所謂得道多助也而事體利害之緩急人情好惡之向背有不齊不可以不慮也夫人情莫不愛其親然負米以致其養與遇變而捍其患緩急自有不同人情莫不愛其身然一勞以永其逸與暫息以休其體向背亦為殊絶喪先王之乘舟不如死則取艅艎者必濟義兵謳歌思歸則定三秦者易為力也故曰萬有不齊不可以不慮也我國家拯天下於前元天威所及電擊風掃遺種逰魂僅存喘息年來牧養殘畜兼之擄我生口日滋月息即今吉囊俺答輩部落動號十萬視昔之奔命窮荒不見馬矢者勝耶衰耶强耶弱耶而我承平日久軍政多偷三五年來雖賴上下協德中外一心漸次振舉而其竭籌慮耗財用奪工業也不少矣回視二祖之時其勝衰强弱又何如耶是揆之天時未見其可也河套舊固中國地也陷没日久間諜罕至人不屋居畜牧其内山川之險易路途之紆直水草之有無我不可必知也提軍深入其境能無慮乎夫塞以内吾中國地也將領講求其形勢不能如彼前時所遣奸細者履步之為詳卒伍諳記其要害不能如彼臨時捕内地人指引之為慎而况塞以外乎今我勞以徃彼逸而待我馬出塞三日而疲彼騎遍野一呼而集得有小利歸途尚難倘失鄉導全軍何賴數萬之衆緩行持重則敵備益嚴疾行趨利則輜重在後且刻日有定期褁糧有定數敵遷徙靡常則戰無定地逺近不測則戰無定期一戰之後敵或保聚或陽為逃遁笳角時聞壁壘相持已離復合終不渡河而我軍於此戰耶退耶兩相守耶數萬之衆出塞亦必有數萬之衆援之否耶有驍將以通糧道否耶保無摽掠不至匱乏否耶是皆至難而不可任者也夫馳擊者彼之所長也守險者我之所便也弓矢利於馳擊而火器利於守險者也舍火器守險而與之馳射突擊於黄沙白草之間得耶失耶是揆之地利未見其可也夫塞下兵即塞下人也墳墓廬舍先人之所營妻孥眷屬骨肉之所居禾黍桑麻産業之所具牛馬牲畜身養之所供迫於兵刄怵於生死尚每每退怯以煩上人之督責今驅之於無人跡之地限之以可垂盡之食要之以難必成之功苦之以不即罷之役恐之以將徙居之禍而欲人和可得乎是又不可之大者也議者欲以整立下指揮其將領以邊事得罪者相望而行伍之人曽不肯為其將奮勇以請贖每遇軍法嚴厲之將輒行謗毁今處之數難豈能一一知我為彼建久安長治之䇿乎是人和未得更不可之大者也詳味議者之意其所謂建城置衛募卒分田率平定之後事選將練兵信賞備器亦飭備之常規獨所謂整六萬之衆為三嵗之期䇿春夏馬瘦為彼弱而我利於征秋冬馬肥為彼强而我利於守春蒐於套秋守於邉三年三舉彼必難支待其行遁拒河為守是固一説矣然天時物性不相逺也秋冬馬肥而我馬不亦肥乎迺止利於守耶春夏馬瘦矣而我馬不亦瘦乎迺獨利於征耶夫春夏馬瘦彼誠弱矣雖不能入冦而坐以待我懼其擾擊我也秋冬馬肥彼固强矣既能為冦則多方謀我懼其報復我也六萬之衆非所以襲人千里之途非所以自逸轉盼之間情態異致嵗一為之以俟三舉其可得乎一舉失利士傷馬耗議論蜂起則將已之乎竭天下之力排天下之議以俟成乎三年三舉咸可得志彼敗而守我去復來終不渡河版築難舉則將何時已乎盖議者見近時搗巢之舉恒獲首功昔年城大同五堡諸邉敵亦不來深競遂謂套地可復然復套與是二者不同盖搗巢因其近塞乗其不備勝則倐忽而歸敗亦支持以退舉足南向便是家門壕塹城墩為援可恃復套則深入人境後援不繼勝固艱難敗虞陷沒事勢異也夫必勝之兵有限之矢此李陵所以失也今我將士能為陵之所不能為者乎往城諸邉實近我土又沿邉之地彼原不以為利故雖城邉築垣少有侵取亦不恤也套地則彼自𢎞治以來據以為家資以為生四時之間三時在内一旦欲取而有之彼豈晏然不有爭乎事體異也故曰殺虎者易奪虎子者難奪虎子者易奪虎穴而居者難今未能殺虎而奪其子處其穴得乎夫先據北山將勇者勝趙奢之所以勝也今我將士能為趙奢之所為乎若曰伺敵出套拒河為守先將渡口及可以履氷道路稍築牆垣以次移置邉堡沿河如昔年總兵官周尚文所論似若可為而不知套地敵之巢穴各有分地豈有空套以出之理二千里沿河之地其間可渡應防道路不止百餘築垣為限豈時日可完移置邉堡非百數十不相聯絡堡置人非千人不可而逰徼瞭望哨守者不與當三十萬衆不止也布置未完而爭穴之虎至矣况我邉去河動輒千里一年之食為數億萬此亦未嘗深思逺慮者也然則套中之地其終不可復乎曰事變之來至無常也要之君子不可有徼倖之心夫秦之所慮者邊而終秦無北邉之警漢之所備者邊而中葉有欵塞之順事變之來孰能逆覩聖天子在上文德日修天心助順將來敵之盛衰强弱安能保耶自相攻擊如匈奴之南北洊遭疾疫如先零之殄滅豈無期耶彼有其隙吾乘其弊套地之復此其時乎謹我塞障飭吾戎備和吾行伍固吾元氣以俟其隙為計之得也故曰知彼知已百勝之道也若不察敵勢之强弱不審事勢之難易不揆我力之有餘不足使塞下之民迫於備邉者喘息不獲定沿邉之卒傷於鋒刄者瘡痍不獲起而復横挑强冦以事非常則愚所不解者也明文海巻八十三
