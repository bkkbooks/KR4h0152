body:
  text: 明文海巻八十四餘妣黄宗羲編論一井牧論胡翰天地養萬物聖人養萬民故天下之利聖人不私諸已亦不以私于人井田之制是也井田者仁政之首也井田不復仁政不行天下之民始敝敝矣其後二百三十有二年而漢始有名田之議猶古之遺意也又其後六百有三年而元魏始有均田之法猶古之遺制也先王之遺制遺意由秦以來僅一二見又皆行之不逺天下之民益敝敝矣為政者南面以子萬姓一夫之飢猶己飢之一夫之寒猶己寒之孰無是心也而訖莫之拯焉方漢承秦苛虐之後民新脫去湯火未遑蘇息髙帝因而撫之逮及文景之世國家晏安無事宗戚大臣憑藉貴髙之勢爭取美田宅以為子孫利益郡邑富商大賈周流天下貲累鉅萬治生產畜牧膏壤十倍上儗封君編戸之氓無立錐之地則卑下之為役為僕不暇顧其身貧富不均勢所馴致也故董仲舒言于孝武以古井田法雖難卒行宜少近古限民名田以抑兼并名田者占田也占田有限是富者不得過制也其後師丹孔光之徒因之令民名田無過三十頃期盡三年而犯者没入之議者以三十頃之田周三十夫之地也一夫占之過矣晉石苞令民男女二人占田百畆丁男女有差有國食禄者有差或十頃或五十頃兼以品䕃其親屬自啓奸端矣民無恒產不能制之專事要求之間不勞民駭衆坐獲井田之利此吾所未喻也殆不過為兼幷之閑耳非有資于􅅵畮細民能無不足之患也故名田雖有古之遺意不若均田之善李安世在魏太和中其得君非令哲之主也其得民非歸馬牧牛之時也以魏國之大獨能均其土地審其經術差露田别世業魏人賴之力業相稱北齊後周因而不變隋又因之唐有天下遂定為口分永業之制而取以租庸調之法口分即露田也露田夫四十畆婦人二十畆而率倍之口分八十畆而不倍惟嵗易之田倍之永業即世業也夫家受而不還皆二十畆所以課蒔桑麻也民有多寡鄉有寛狹田有盈縮狹鄉之民受田半之為工商者不給而在寛鄉者給之亦半也老疾寡妻妾給之三十畆四十畆雖不耕不可無養也當戸者益之二十畆雖已有田不可不優也以此均天下之田貧不得粥富不得兼猶懼不能守吾法而乃聽民粥永業以葬粥口分以遷是以小不足而大亂法也何救于弊振窮恤貧民獲保息周典也何惜而不為之粥而加罰永徽之禁抑末耳議者如宋劉敞又以魏齊周隋享國日淺兵革不息土曠人稀其田足以給其衆民獲其實唐承平日乆丁口滋多官無閒田給受民不復獲其實徒為具文不知隋唐之盛丁口相若耳開皇十二年發使均天下之田狹鄉一夫僅二十畆隋之給受何加于唐也唐雖承平日乆貞觀開元之盛其人戶猶不及隋何至其田具文無實也敞言過矣但狹鄉之民多而田不盈永業之田粥而民不固如陸贄所謂時弊者執馴致也時弊則法亦弊故均田雖有古之遺制不若井田之善周制九夫為井井有溝四井為邑四邑為丘四丘為甸甸有洫四甸為縣四縣為都都有澮地方百里是為一同治都鄙者以之夫間有遂遂有徑十夫有溝溝有畛百夫有洫洫有涂千夫有澮澮有道萬夫有川川有路萬夫之地三十二里治鄉遂者以之孟軻氏請野九一而助國中什一使自賦蓋二法並行遂人匠人多寡異數而内外相經緯焉王畿之内五十里為近郊百里為逺郊六鄉六遂居之六遂之餘地為甸地距國中二百里即公邑之田天子使吏治之者也甸地之外為稍地距國中三百里大夫所食之采地也稍地之外為縣地即小都之田距國中四百里卿及王子弟之疏者所食之采地也縣地之外為畺地即大都之地距國中五百里公及王子弟之親者所食之采地也此王畿之制井田常居十之六其不為井者四郊甸地耳其曰夫三為屋屋三為井則出地貢者亦三三相任如井田之法八家樹藝一夫稅入于公孟軻氏所謂皆什一者是也鄉遂之地菜五十畆或百畆二百畆而都鄙之田或不易或一易再易是亦名異而實同也地有肥磽為之井者必有牧以濟之所謂菜與易者則皆牧也故小司徒曰井牧其田野井者其正也牧者其變也井地均不必牧也井地不均必牧以均之也由是達于天下雖有山林川澤不可以開方制者以井牧授之以貢助取之諸侯之國可按而定也楚人東南之要服也蒍掩為司馬度山林鳩澤藪辨京陵表淳鹵數畺潦規堰潴町原防牧隰畢井衍沃量九土之入脩千乗之賦況中國之地無山林澤藪之阻無淳鹵畺潦之患原隰衍沃舉目千里夏后氏用之以為貢商人用之以為助而周人兼用之以制畿甸經邦國其法可考者往往存於周官之書其不合者以孟軻氏為之權衡豈不較然也哉故嘗以為井田之法行有十便民有恒產不事末作知重本一也同井並耕勞逸巧拙不相負齊民力二也奉生送死有無相贍通貨財三也貨財不匱富者無以取贏絶兼并四也取以什一天下之中正吏無横斂五也比其丘甸革車長轂于是乎出有事以足軍實六也一同之間萬溝百洫又有川澮戎馬不得馳突無邉患七也畎澮之水澇則疏之旱乾則引以溉注少凶荒八也少壯皆土著奸偽不容善心易生以其暇日習詩書俎豆養老息物成禮俗九也逺近共貫各安其居樂其業尊君親上長子孫其中不煩刑罰而成政教十也一舉而十者具矣何憚而不為乎其謂不可為者蓋亦有二焉丘甸縣都其間萬井為溝洫者又萬計包原隰而為之窮天下之力傾天下之財非數十年之乆不克潰于成也非大有為之君不能致其決也此不可者一也中古以降淳厚之俗薄澆偽之風熾恭儉之化衰功利之習勝經乆之慮少僥倖之弊多以限田抑富强猶有撓之者況使盡棄其私家之產乎以均田授農民猶有不能周之者又況生齒滋衆之時乎怨歸於上奸興於下此不可為者二也以余論之二者何足厄吾事乎古者步百為畆漢人益以二百四十為畆北齊又益之以三百六十為畆今所用者漢畆步也今之五十畆古之百畆也漢提封田萬萬頃惟邑居道路山林川澤不可墾餘三千二百二十九萬頃皆可墾元始初遣司農勸課定墾田八百二十七萬五百三十頃是時天下之民一千二百二十三萬三千戸以田均之計户得田六十七畆古之百四十畆也家獲百四十畆耕之未為不給也加之簡稽則工商禄食之可損者又不知其幾也雖唐盛時永徽民户不過三百八十萬至開元七百八十六萬亦不漢過也以天下之田給天下之民徵之漢唐則後世寕有不足之患乎田無不足之患則取諸臣以與民天下皆知吾君之不私也天下有如卜式者且將先吾民而為之孰不響應于下也秦長城之役袤延萬里塹山堙谷暴兵三十萬而阿房之作督用徒刑者又七十餘萬郡邑之民發謫徙邉者又歳不休息不徳甚矣天下怨誹未聞有一人違者況下令如流水之源固民心之所欲也王政之所本也今先取一鄉之田井之其制定其事便其民恱然後行之一郡取一郡之田井之其制定其事便其民恱然後行之天下天下之制定事便而民恱也亦何異於鄉郡乎是天下之田可井也事不勞者不永逸欲長治乆安而不於此圖之亦茍矣唐太宗嘗讀周官之書至體國經野設官分職以為民極慨然歎曰不井田不封建不足以法三代之治人君負有為之才操可致之埶其時又非難也封建議而不行井田知而不復君子蓋深為唐惜之吾聞春氣至則草木生秋氣至則草木落生與落必有使之者矣物莫知之也故使之者至物無不為使之者不至物無可為上之人審其所以使故物莫不為用管商之法孰與先王之制天下皆知其非民利也而齊秦舉國聽之其故又可知也以先王之制使若管商者為之以紀人事經地利吾知天下之田可限也可均也亦可井也此無他善操其所使而己矣忠信之道賞罰之柄上之所以使也慎習胡翰天下之埶窮則變由治而趨亂者其變易雖一憸人壊之而有餘由亂而趨治者其變難雖合天下之智力為之而不足由秦以來天下之變數矣議者莫不慨然欲迢復先王之舊歴漢唐千數百年而卒循乎秦人之敝者此豈其勢難而力不足哉荀卿子曰法後王一天下制度又曰法貳後王謂之不雅蓋卿有以啓之也自卿之論興其徒李斯用之以相秦凡可以變古者莫不假秦之柄奮其恣睢之心而為之雖商鞅之刻薄不若是之烈也鞅廢井田止秦之土地改法令止秦之人民而斯也尊主為皇帝舉天下以為郡縣舉天下不復有井田夷其城郭銷其兵刃人主之勢孤立于上而怨起于下計無所出益倒行而逆施之燔詩書以塗民之耳目黜儒術以滅天下之口說所守者律令也所師者刀筆吏也其變既極其習既成秦亡而漢承之聖王之繼亂世掃除其迹而悉去之崇教化而興起之此其幾也陳經立紀以為萬世法程此又一幾也髙帝以寛仁定天下規模宏逺矣然未嘗有一於此其後賈誼言之于文帝董仲舒言之于武帝皆不能用又其後王吉言之而宣帝亦恬不以為意觀髙帝命叔孫博士之言令度吾所能行為之天下事孰非人主所能者奈何帝之自畫如此而群臣不足佐之創業之君後昆所取法由是而文帝有卑之無甚髙之喻宣帝有漢家自有制度之語當更化而不更化當改制而不改制一切縁秦之故雜伯以為治逮于中興光武以吏事責公卿顯宗以耳目為明察文法宻而職任違督責過而恩意少雖從事儒雅投戈講藝臨雍拜老有緝熈揖讓之風未能盡更化改制之實也故朱浮言罷斥之擾于前陳寵建輕刑之議于後建初之政所以濟永平之失也之數君者在當時號為賢主且去古未逺而因陋就簡未嘗取先王之法一試為之為之而不效舎之可也不為而舎之烏知其不可乎蓋其溺于所習者乆矣辟之戎人生于戎蠻人生于蠻少長所濡染者皆其類也中國之禮義未嘗接焉雖知其美不能使之一朝去其舊習之俗此豈其性殊習固使之耳古今之相去何以異此有能善變其習者果孰禦之魏晉之衰天下之亂極矣元魏起代北其先土托后䟦之裔也其人民被旃控弦之屬也與漢不侔矣宜未易以禮法理也而孝文遷都洛邑挈其人民而居之均田别里崇祀建學國人莫不有忤心焉獨排衆議而咨之王肅李安世之流釋干櫓而事絃歌去樸野而事詩書王通氏曰中國之道不墜孝文之力也豈不信乎及隋之衰天下又大亂而唐承之太宗却封倫之對從魏徵之勸貞觀之初力行仁義其為化也得矣制官以六典制兵以府衞制民以均田制賦以租庸調其為制也備矣行之數歳家給人足行旅不齎糧外戸不待閉方制四邊之外太平之效可謂盛矣故宋儒以為由文武之治千有餘歳而有太宗之為君方之于漢其寛仁孰與髙帝其𤣥黙孰與文帝其所以致此者由其不惑于後世之論能自拔于秦漢之習也向使孝文無卓然之見必為之志雖得中國終于敗壊而止耳使太宗有躬行之實名世之佐舉唐之治又豈殷周之不若乎故俗之不淳不患也刑之不措不患也功之不遂不患也而患無必為之志躬行之實持之者未乆也惟聖為能盡倫惟王為能盡制三代之興其王皆聖人也其所以為天下者莫不本諸天理要諸人心大法之則大治小法之則小治茍以為逺而莫之法也其道固存其意猶可識也春秋譏變法而大復古聖人豈好為異哉懼後世不知有先王之法故假筆削力爭之然猶懼不勝況順而下之是猶決江河而放之陸勢必胥溺而已耳故余不責斯之不師古而深悼況之法後王由其有以啓之也君子度已以繩接人用枻夫與世遷從而偃仰者戰國之遺習也卿之意不過如此學術不醇而遂以毒天下太史公曰法後王何也以其近已而俗變相類議卑而易行也天下有能知其近而相類者為不可法也卑而易行者為不可行也則秦人之敝去矣非聖人其孰能之物初論朱右或問天地果有初乎曰有人物果有初乎曰有然則有初必有終曰惡乎無方噫氣之大息也混混沌沌沖漠無始一氣既復隂陽遂判清濁以分髙下以形非天地之初乎于時萬象森羅已具有初而迹未形也天地一隂陽而已人物固囿于隂陽以生者也陽生有六是謂之乾隂生有六是謂之坤陽生子中極于午中乾道立矣隂生午中極于子中坤道成矣乾坤者萬物之父母也當一陽初復二陽既臨陽在地中草木生焉故草木之本皆居下而末反居上陽在下也三陽既交四陽漸壯鱗介羣生羽蟲次之故魚鼈身横飛鳥兩足而昻首陽未足也五陽健而決膏脂生焉故獸形近人至於六陽既全乾道始備人斯立矣故人首居上足固在下得天地之全氣以生者也陽以生之隂以成之自午至子為六隂成物之氣故能全乾坤之徳者為聖人聖人得天地之全氣而盡性踐形者也詎非人物之初乎然則曷為終曰生長斂藏一歳之終滋育消滅一物之終非吾所謂終也若夫生物屏息天地無有斯為終矣曰終當奈何曰有終必有初作物初論分野論蘇伯衡分野之說其傳也逺而周禮春秋傳始詳焉春官保章氏以星土辨九州之地所封封域皆有分星以觀妖祥左氏内傳曰參為晉星商主大火外傳曰歳星所在則我有周之分野也此分野之說見于周禮春秋傳然也至漢地理志言分野乃始詳宻謂秦為東井輿鬼之分野魏為觜觹參之分野周為柳七星張韓為角亢氐趙為昴畢燕為尾箕齊為危虚魯為奎婁宋為房心衞為營室東璧楚為軫翼吳為斗越為牽牛婺女而鄭康成則謂堪輿雖有郡國所入度非古數也今其分可言者十二次之分也星紀吳越也元枵齊也娵訾衞也降婁魯也大梁趙也實沈晉也鶉首秦也鶉火周也鶉尾楚也壽星鄭也大火宋也析木燕也觀乎左氏謂熒惑守心宋景禳其咎實沈為祟晉侯受其殃鄭氏謂分野之妖祥主用客星彗孛之氣以為象則驗災祥于星土其法蓋古有之不可誣也然而吳越之地南而星紀則在丑齊之地東而元枵則在子晉之地亦東而降婁則在戌東西南北往往相反而不相配是則誠為可疑者杜預等注既莫能詳而鄭氏則謂中國之封域于星則有分焉其書亡矣夫有其書而既亡此後人所以求其說而不得自漢以下星官史家參之以度數毫分縷析各極其至而十二次分野相配之理卒莫有明言之者嗟乎夫豈不以不足言而不言之歟唐天文志浮圖一行皆以河漢為言固己疎逺及賈公彥輩乃援古昔受封之日歳星所在之辰其國屬焉以為證若然則三代之分野皆當不同而列國所屬亦必有同焉者矣嘗試論之分野視分星古不謂地也地有彼此之不齊而分野在天則一定而不易以彼此不齊之地必欲求配于在天十二次整然之分野其說之難通也固宜蓋天有三垣紫微太微天市是也紫微太微皆將相輔佐之位而天市下垣則列國星宿之所在其星東西二十有二宋南海燕東海徐吳越齊中山九河趙魏韓楚梁巴蜀秦周鄭晉河間河中曰分野者指列宿所屬之分而言也鄭氏所謂星土者星所主土是也其國在此而星則在彼彼此若不相配而其為象未嘗不相屬非地之在北者其分野在天亦居北地之在南者其分野在天亦居南也列國之在天下彼此從衡之不齊猶犬牙然而欲以其地之不齊者求合乎在天分野之整然者彼此之不相配無足怪者甚者至以天之北極為天之首其體及背故有吳北魯東之差其惑甚矣易不云乎在天成象在地成形水火木金土其形在地者也而天有其五星焉所謂象者豈惟五星哉凡物莫不皆然矣故夫齊吳燕宋韓楚周秦魏趙諸國之地地之形也而其星在天象之謂也地有是形則天有是星天有是星則有是名曰齊吳燕宋韓楚周秦魏趙列國者非後世有是名而舉以為分野之名也何以知其然也徴諸東海南海九河河間河中巴蜀中山在天皆為列星而東海南海九河河間河中非國中山巴蜀非若諸國之顯也故曰地有是形則天有是星而分野者指列星所屬之分而言也或曰若然則十二次之說將無所徴歟曰十有二次所以驗天運之度數日躔之次舎此蓋古法而厯家之所取證者也因其度數次舎之所在而妖祥見焉則其所屬之地從亦可徵矣抑分野之說豈專係于是哉兵禮吴沉愚讀周官之書未嘗不嘆夫聖人之于兵政何其詳也蓋兵之設乆矣唐虞之前不見于經而唐虞之際則士師之官實掌之士刑官也兵者刑之大者也古人所謂大刑用甲兵是也尚書所言冦賊奸宄此豈象刑之所能盡服哉兵藏于田賦徒衆主于司徒軍師領于秩宗虞則馬政之司而共工則軍械之所出也故兵雖無專官而事初未嘗廢焉吁九官之兵刑合為一而六典之兵刑分為二亦可以觀世道之變矣且六官之制周公之所定也九伐之法既専委大司馬矣而五官之屬亦互相參領太宰統衆職即百揆之無不總也宗伯即秩宗而司空即共工也司冦雖不主兵而軍刑涖戮則其任焉平居雖各司其司以聽上之命有事則各職其職以趨上之令官非虚設而法非文具聖人之經制纎悉如此哉且兵者將使之以殺人者也聖人不取之于浮閒凶暴之徒而必取之于勤苦稼穡之農夫使其為農之日不知有兵之害而為兵之日不敢忘農之勞用之則驅之于戎行不用則歸之于田里豈有後世招聚之害供饋之費乎此則立法之最善者也然天下之事不習則廢不祥之器豈可以常施于日用之間乎無故而習兵是習殺人也故聖人又為之蒐狩之制因祭而田因田而閱申之以戰陳部曲之法詔之以坐作進退之節以天子之尊而遂取禽獸草莽之野不以為煩也不特此也干戈之舞射御之方蓋自成童以及于壯其教未嘗一日而廢也至于弓劔之獻矛㦸之進亦必謹其儀焉聖人之慮以為平時授受之不謹則當夫倉卒必有不善于用者矣王朝邦國之中朝祭賔享之日上以射而擇士下以射而貢士以考徳行以觀威武是以當是之時公卿大夫以及士庶其所以為禦侮克敵之備無不能焉他日用之民皆良兵而吏皆良將也嗚乎弓矢斧鉞人情之所畏也田狩宴享人情之所恱也先王以飾怒之具而為飾喜之儀寓至險于順動而伏天下之所畏于君臣之所共恱此則其微意之所在也使天下之人而皆從容于禮讓之域焉固聖人之所大願也不幸而用之將以除殘去暴而聖人之心亦必欲行之以道殺人之中而有禮焉非古之聰明神武者何足以與此乎惜夫有虞之禮不可得見而成周之制度可考者僅若是而己先王之禮既廢不能講宜天下後世之爭馳于變詐之末而不自覺也豈不可哀也哉明文海巻八十四
