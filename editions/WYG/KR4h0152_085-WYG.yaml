body:
  text: 明文海巻八十五餘姚黄宗羲編論二深慮論一方孝孺慮天下者常圖其所難而忽其所易備其所可畏而遺其所不疑然而禍常發于所忽之中而亂常起于不足疑之事豈其慮之未周與蓋慮之所能及者人事之宜然而出于智力之所不及者天道也當秦之世而滅六諸侯一天下而其心以為周之亡在乎諸侯之強耳變封建而為郡縣方以為兵革可不復用天子之位可以世守而不知漢帝起隴畆之匹夫而卒亡秦之社稷漢懲秦之孤立于是大建庶孽而為諸侯以為同姓之親可以相繼而無變而七國萌篡弑之謀武宣以後稍剖析之而分其勢以為無事矣而王莽卒移漢祚光武之懲哀平魏之懲漢晉之懲魏各懲其所由亡而為之備而其亡也皆出其所備之外唐太宗聞武氏之殺其子孫求人于疑似之際而除之而武氏日侍其左右而不悟宋太祖見五代方鎮之足以制其君盡釋其兵權使力弱而易制而不知子孫卒困于邊庭此其人皆有出人之智負蓋世之才其于治亂存亡之機思之詳而備之審矣慮切于此而禍興于彼終至于亂亡者何哉蓋智可以謀人而不可以謀天良醫之子多死于病良巫之子多死于鬼彼豈工于活人而拙於活己之子哉乃工于謀人而拙于謀天也古之聖人知天下後世之變非智慮之所能周非法術之所能制不敢肆其私謀詭計而惟積至誠用大徳以結乎天心使天眷其徳若慈母之保赤子而不忍釋故其子孫雖有至愚不肖者足以亡國而天亦不忍遽亡之此慮之逺者也夫茍不能自結于天而欲以區區之智籠絡當世之務而必後世之無危亡此理之所必無者也而豈天道哉深慮論二方孝孺藥石所以治疾而不能使人無疾法制所以備亂而不能使天下無亂不治其致疾之源而好服藥者未有不死者也不能塞禍亂之本而好立法者未有不亡者也人身未嘗有疾也疾之生也必有致之之由誠能預謹于飲食嗜欲之際而慎察于喜怒悲樂之間以固其元氣而調其榮衞使寒暑燥濕之毒不能奸其中雖微藥石固不害其為生泄敗之壊傷之而恃藥石以為可免于死此死者交首于世而不悟也夫天下固未嘗好亂也而亂常不絶于時豈誠法制之未備歟亦害其元氣故也夫人民者天下之元氣也人君得之則治失之則亂順其道則安逆其道則危其治亂安危之機亦有出于法制之外者矣人常拘拘焉盡心于法制之内而不盡心于法制之外非惑歟聖人之法常禁之于不待禁之後而令之于未嘗為之先故法行而民不怨欲禁民之無相攘奪盜竊也必先思其攘奪盜竊之由使之有土以耕有業以為有粟米布帛以為衣食而後禁之則攘奪盜竊可止也欲禁民之無為暴戾詐偽不率倫紀也必先為學以教之行道以化之使之浸漬乎禮讓薫蒸乎忠厚知暴戾詐偽不率倫紀之為非然後可得而息也欲其無相淫亂也必先使之知畏戮辱而重亷恥夫先使之可以無犯乎法而猶犯之者此誠玩法之民也玩法者非特法之所不容亦民之所不容也故刑罰加于下而民視之如霜雪之殺雷霆之擊以為當然而不敢以為非故民曉然知上之法所以安己也非所以虐已愛戴其上而不忍離卒有至凶極悍之徒萌無上之心亦無由而成事以其能固民之心也不能使之安其生復其性而責其無為邪僻禁其無為暴亂法制愈詳而民心愈離欲保國之無危是猶病内鑠之疾而欲求活于針砭及其死也不尤養生之無道而責針砭之不良嗚呼曷若治其本邪深慮論三方孝孺繼世而有天下者必視前政之得失而損益之知其得而不知其失懲其失而盡革其舊此皆亂之始也夫有天下逺者至于數十世近者百餘年而後亡其先之政必有善者及其子孫一旦而敗之亦必有不善者茍去其不善而復其善增益其所未足而變更其所難循求其宜于民情則可矣奚必使其一出于己而後為政哉三代以降昏主敗國相尋于世者非他皆欲以私意更其政而無公天下之心故也舜繼堯未嘗改于堯之政禹繼舜守舜之法而不敢損益湯之繼桀武王之繼紂反桀紂之所為復之于禹湯之舊損益之而已未嘗敢以私意為之也以私意為天下者懲其末而不究其本者也周之政可謂善矣本于唐虞二代之為而損益于武王周公二聖人之心後世雖有智者豈能過于二聖人哉暴秦起而繼之見其子孫敗于削弱則曰周之政弱于是更之以強周之政過于寛于是易之以猛而不知周之法未嘗過于寛與弱也當周之衰國自為政苛刑宻禁四布而百出武王周公之遺意掃蕩無遺民不堪其主之暴虐于是亡六國而為秦則周之諸侯以強與暴而亡非過于弱與寛也秦不知其故不反武王周公之舊而重之以強濟之以猛于是天下怨苦而叛之非民之罪也變更之道非也夫政譬之弓然日用之則調越月逾旬而不用之則欹善治弓者見其欹則檠之使其調而己不善治弓者則折而棄之而更以朽株敗枲為弓以射射而不中乎禽豈禽之過哉棄良弓之過也天下之弓不能必其良否惟羿之弓不問可知其良以其善射而擇之精也後世之政其得失未可定也千載之後舉而行之而無失者其惟武王周公之法乎深慮論四方孝孺治天下有道仁義禮樂之謂也治天下有法慶賞刑誅之謂也古之為法者以仁義禮樂為穀粟而以慶賞刑誅為鹽醢故功成而民不病棄穀粟而食鹽醢此亂之所由生也山谷之民固多不待鹽醢而生者矣其害不過羸憊而無力以鹽醢為食不至于腐腸裂吻而死豈遂止哉人性非好死也常趨死之道而違生者告之者非也夫仁義禮樂之道非虚言而己必有其實本其實而告之人寧有不知其美者乎仁義禮樂之為人忌于世者由夫虚言而不為事實者始告之以為仁之故彼將曰此虚言耳奚可用哉告之以為義為禮樂而不告之事彼將曰此特其名耳安足信哉此聖人之道所以見棄于世而不振也持劔擁盾而謂人曰我善鬬人必信之儒衣冠而謂人曰我善鬬不笑則怒矣故欲人之見信必先示之以其事聖人之為仁非特曰仁而已也必有仁之政欲民之無飢也口授之田欲民之無寒也教之桑而帛麻而布欲老者之有養祭享賔客之有奉也教之陂池而魚鼈牢栅而雞豚欲民之安也不為苛役以勞之欲民之無夭也不為煩刑以虐之親老子獨者勿事胎育而貧者有給以至于獵而不傷麛卵樵而不斬萌蘖皆仁也其為義也必有義之政上之取之也有常用之也有節均之也有分疆界也以防其爭鄰保也以洽其欲車服也以昭貴賤衡量也以信多寡飢寒也減其力役之征略其婚娶之儀學于閭也使其知長幼之序書于鄉也使其知善惡之效推而至于安生而達分尊上而趨事皆義也為禮之政而使民自揖讓拜跪獻酬之微各極其敬以至于五倫叙而三綱立為樂之政而使民自咏歌摶推舞蹈之事充而大之至于和樂忠信不怨不怒而易使聖人之用是四者持之以堅凝而守之以悠乆如待穫于秋濬泉于深必得其效而後止四者之化成天下之民膠結而不可解有不齊者從而以法令之則令之易服而治之不難故三代之民非異于後世之民也後世之民常好亂而三代之時未嘗有一民為亂者治之者異也仁義禮樂入其心民雖知可以為亂而不能賞罰旌誅動其心民雖欲為亂而不敢不能者有所恥而不敢者有所畏也治天下而能使人恥于為非雖無刑罰可也恃法威而使民畏民其能常畏乎及其衰則不畏之矣三代以下雖有賢主而不足致治者欲民畏而不知仁義禮樂之說也故為治不可以不察也君職方孝孺能均天下之謂君能覆兆民之謂君立政教作禮樂使善惡各得其所之謂君生民之初固未嘗有君也衆聚而欲滋情熾而爭起不能自決于是乎有才智者出而君長之世變愈下而事愈繁以為天下之廣非一人所能獨治也于是置為爵秩使之執貴賤之柄制為賞罰使之操榮辱修短之權位乎海内之人之上其居處服御無以大異于人不可也于是大其居室彰其輿服極天地之嘉美珍奇以奉之而使之盡心于民事故天之立君所以為民非使其民奉乎君也然而勢不免粟米布帛以給之者以為將仰之平其曲直除所患苦濟所不足而教所不能不可不致夫尊榮恭順之禮此民之情然非天之意也天之意以為位乎民上者當養斯民徳髙衆人者當輔衆人之不至固其職宜然耳何以為功哉後世人君知民之職在乎奉上而不知君之職在乎養民是以求于民者致其詳而盡于己者卒怠而不脩賦稅之不時力役之不共則誅責必加焉政教之不舉禮樂之不修弱強貧富之不得其所則若罔聞知嗚呼其亦不思其職甚矣夫天之立君者何也亦以不能自安其生而明其性故使君治之也民之奉乎君者何也亦以不能自治自明而有資乎君也如使立君而無益于民則于君也何取哉自公卿大夫至于百執事莫不有職而不能修其職小則削大則誅君之職重于公卿大夫百執事逺矣怠而不自修又從侵亂之雖誅削之典莫之加其曷不畏乎天邪受命于天者君也受命于君者臣也臣不供其職則君以為不臣君不修其職天其謂之何其以為宜然而祐之耶抑將怒而殛絶之耶奚為而弗思也天與人其形雖殊其好惡就去不甚相逺也使君命一人焉而治民而困踣之厲虐之其有不怒者乎怒而能舎其禄位乎天之于君雖不若君臣相接之明且著然未嘗不明且著也幸其未形以為無憂幸其未至以為愛己嗚呼其果可恃也乎正俗方孝孺行于一人之身而化極四海之内觀于數百年之前而驗于數百年之後者風俗是也故風俗之所成至微也其效至著也所繫似小也所由甚大也不可忽也昔者楚靈王好細腰舉國之人皆約食束膂引而後能起憑而後能立伊川之民被髮而祭智者知其俗將變矣風俗之端可不深察哉夏之忠商之質周之文其先之所尚傳之數十世而不變守之至于國亡而後已其俗素已定也故商之不能為忠猶周之不能為質也周公豈不知文之不若質哉至于商之末質漸散而繁文興矣周公知其莫可反也故因而文之恐其趨于浮薄也為之禮以節之作之樂以和之惟其如此故能至于七百餘年然其後亦己不勝其弊矣戰國之世逰說之士螽聚蚊合以謟言邪說㗖諸侯傾動天下誠二代之所未有也由是生民日流于變詐豈非文勝之弊哉及秦懲其病遂坑殺儒生舉先聖賢之遺文餘法一火而盡燔之曾不師古而任其深刻巧苛之律不旋踵而遂亡其所尚非道故也漢興務以寛大更之法疎禁濶四百年之基用此以立然其時朝無人不知以禮義為俗其所因仍大率皆秦制也烏望其如三代哉至于近世惟宋之俗為近古尊尚儒術以禮義漸漬其民三百年之間宰相大臣不受刑戮外則庶官顧養亷恥雖曰綱紀未備其所崇尚逺非秦漢以下之所能及故其垂亡之際孀后少主既己就擄而其臣抱君之遺孤奔走海島誓天指日擁立為帝朝夕請命如事神明卒之無一人有背叛之心至于溺死于海而後已雖三代之亡未聞忠厚惻怛有若是者孰謂風俗無益于國哉且夫秦皇帝之死未乆而其黔首相與奮梃而呼願食其肉漢唐之衰皆逼于其簒弑之臣而奪之而宋乃獨若此者何也秦棄禮義漢唐不知以禮義為俗而宋風俗淳美故也假使宋無邊庭之禍尊其前世之俗國安遽亡哉以是知風俗之至急也宋亡元主中國者八十餘年中國之民言語服食器用禮文悉合於禮教者鮮矣其初尚有一二賢者教之參用宋法而亦頗以寛大為政故民亦安之然而暴戾貪鄙未得賢良以處要職黷貨紊法終以此亂其俗大壊以至于今譬如敝鐘漏鐻非重皷而鑄之其音不可得而調也夫欲因亂國之俗而致治雖聖人不能也勢不可也俗之既壊則日甚而歳滋耳無以匡持之豈遂止哉今愚下之民父子兄婦同室而寢汙穢䙝狎不知禮數盂飯設匕咄爾而呼其翁對坐于地而食之為學子者其頑不知教其于大倫悖棄若此甚非國家之便也上下有則乃所以𨗳民故古者士民不非其大夫今小民得以執郡縣之短長撾皷而訴之闕下弟子或訟其師子姪或證諸父禮義不立曷所不至哉法令非不明也有司按四方之罪非少怠也而犯者不為衰止黠胥巨吏開口肆然徵取于人而不顧問之則曰行且輸作不取何以為資或曰身死而妻子何所仰食姑取之以自給耳其設心自以為明逹見執貧守法者衆且羣指而笑之而其人亦不幸卒無赦以死于是益堅貪者之心小民轉之窮苦割剥次骨鬻產賃室以奉其無懕之欲非特為此也國之大柄可以貧富者惟寳鈔為然無賴之民聚徒勅板而偽之御史中使國之亷察天下者妄詐男子假其衣冠符印乗傳而横行夫偽鈔僞官之律至重也而若不愛其死而冒之者豈誠不愛也哉彼見死者之多而死不之畏也且人雖至愚奚不畏死彼誠見生之不足樂也知生之足樂則安肯言死哉頃者富民受挫辱于官府或裾其衣而跽或庭拽而詬罵其心大恥掩面而不敢見人里中弔者填其戸殺羊為酒而祓除之其人亦終身以為病況犯有名之律至于死地哉今人則俱不顧矣鞭一百扶而出于外掲其瘡以示人笑談而道之人亦不以為怪一百之刑曾不直舊時之詬罵刑愈多而人愈不知恥則刑之不足化民亦明矣故欲民之重死而難犯法莫如省無用之刑而以禮義教之夫牧者之于羊操長鞭而逺麾之未嘗及其體則逐逐然行矣茍步步而鞭之則必馳突散走而不可制故刑者非所以治民者也不得已而後用民知其不得已而後用則烏忍犯之哉俗之不美至此甚矣少遲而不變法令將不足禁之不可不深計也三代之變俗各視前代而變之凡舊俗貪鄙暴戾故今宜用禮義為質而行周之制今周之制亦有行者矣學校非不立也鄉飲之禮非不修也然而俗尚未善者未嘗灼然示之以所尚也夫示之以禮義者朝廷之上皆不言他而以禮義御史出行郡縣不以搏擊責之而責之以禮義化民之事守令者考覈之等不以興利增戸求之而求之以刑罪息學校興歳舉其孝弟忠信之民而尊異之使小民皆知朝廷之意在乎成俗而不求利在乎任徳而不任刑則信讓立而亷恥興亷恥興而民重其死然後取先王防範天下至于七百年之法舉而盡行之三代之俗必復見而成康之治不難致矣世嘗謂古與今不同俗豈其然哉今也民啜粟飲水與三代之民同養老育幼與三代之民同獨人君不可行三代之政乎用今之法而欲致古之治猶食烏喙而望其引年附獨木而濟大川也斥妄方孝孺君子之于衆人其生與死同惟生而有益于世死而無愧于心者為君子其不能然者為衆人此其所由異也使飲且食焉以養其生而于世無補雖有喬松之壽猶無生也不能奉天之道盡人之性自致其身于無過雖正而斃猶不得其死也古君子所以汲汲若不及者未嘗以生死入其心惟修其可以無愧之道焉耳天之全以賦我者吾能全之而弗虧推之俾明養之俾成擴而施之澤于天下後世于人之道無所愧雖不幸而乖于天迕于人死于疾病患難何害其為君子哉不能盡人之道而欲善其死者此異端之惑也異端之徒其立身行己固己大畔于君子視倫理之失夷然以為宜爾而不恠其身雖生其心之亡己乆矣而猶務乎不死或尸居以求其所謂性命或餌金石服草木而庶幾乎坐化而立亡以預知其死為神以不困于疾病為髙彼既以此夸眩于世世之惑者又從而慕效之不知其所云性命者果何道而預知不困者果何益耶孔子曰窮理盡性以至于命斯聖賢所以為教而所當為者也窮天下之理而見之于躬行盡乎三綱六紀而達之于天道堯舜禹湯周公孔子之所傳人之為人不過學此而已生者知此而後可生死者明此而後可死入乎此則為人出乎此則且無人之理不可毫髪去也異端者果足以知此乎其所云性命果不異于聖賢之所云乎其去世俗凡類果逺乎皆不能然而惟緩死之求審如其言能閱千載而不死與木石何異曾何足以夸人而效之耶況其生死亦與恒人同其不為疾病所困而預知其死之期特寡慾清心使然耳不足以為異也茍以𨼆几而死為異則植物皆立枯茍以預知為神則鳥有知死而哀鳴者此二物者亦足異耶故不能盡人道雖不死而無益盡人之道雖不得其死猶不死也記禮者稱孔子將終曵杖負手而歌聖人之于死生宜先知之然不若是不害其為聖人也聖賢之于道不茍同于人于跡不茍異于俗道欲其同則枉己跡欲其異則駭世皆非聖人所為也舎聖人不效而惟異端怪術之師幾何而不陷于匪類耶司馬孚方孝孺斯道之在天下猶日月之在天也淫風怪雨彌時而止日月未嘗不行乎其間亂臣賊子恣横乎世而天理之在人心者終不少變秦能滅六國之君而不能使六國之民不思其故主王莽能竊漢之位而不能使海内之民一日忘漢之徳力可以服人身而不可以服人之心智可以擾人紀而不可以滅天之道先王所以欲明斯道于天下者豈誠欲務迂逺難行之事以為觀美乎其意以為茍徒用法以禁之使不敢為邪不若使之各知斯道自不能為亂之為愈也周自昭穆以下皆可以亡國強侯鉅伯環擁而迭興皆可以兼幷然而却視竦顧莫敢發口萌犯上之言者非其勢力之不及特以斯道猶有存者畏受悖道之名而不忍也秦之土地兵力豈皆過于諸國哉卒至于刼其主而不顧者虎狼之俗教化不明君臣上下不知道也一家之敗必始于不學之人一國之亂必興于不教之地天下之禍常發于無道之國先王必以教化為先務而不敢忽者豈茍然哉曹氏以詐力得國而不知所教當是之時斯道不明甚矣故丕叡父子坐席未暖而司馬懿己瞷其旁而欲攘取之臨終涕泣托以幼孤少不合意則引其手而易其位如易偶人然公卿大臣迎合將順莫以為非積習既乆至于弑君簒位以為常耳而不復怪蓋舉中國而從之矣而其宗室之中若司馬孚者獨懇欵悲痛不忍與其謀子姓為天子而身為王公可謂尊顯矣獨慚愧若不忍居者身死于晉猶願為魏之貞士夫魏之亡已乆奸佞小人若賈充之徒咸以為堯舜之禪無以過而孚獨拳拳懐其舊君豈有所求而然哉吾以是知雖大亂之世斯道未嘗亡國可以滅而斯道不可滅也求之二千載間生于逆亂之族而不為所變者三人司馬氏之孚武氏之攸緒朱温之兄全昱皆能知簒逆之非唯攸緒辭位避去不受寵禄為最賢孚固非全昱可及然卒至受王爵而不辭其歸與全昱無異全昱故羣盜惑于利而失其本心無足異者惜孚知忠而不知遷義之方也使孚為魏而死謂之魏貞士可也魏亡而不仕乎晉謂之貞士亦宜也既分土而居之是與師昭無别矣猶欲自托為魏臣其不智豈不甚哉雖然孚當廢弑之際不失臣禮使曹氏之臣皆能如孚師昭雖暴終不敢奪魏而自立也然則孚焉可少而斯道烏可忽哉殷民叛周論周洪謨或問武王之伐商也書曰前徒倒戈攻其後以北是言王者無敵也又曰篚厥𤣥黄昭我周王是言人心恱服也夫何天下甫定武王既崩而四國殷民扇亂不已雖化訓三紀之乆而閑之猶艱故先儒謂大誥康誥酒誥梓材召誥洛誥多士多方八篇皆為殷人不服周而作又謂方殷之虐人如在膏火中歸周如流不暇念先王之徳及天下稍定人自膏火中出即念殷之先王如父母雖以武王周公之聖相繼撫之而莫能禦也由是觀之則所謂倒戈執篚于弔伐之日者不幾于虚文乎聖人以至仁伐至不仁何其人心之不易服哉南皋子曰是蓋不然向之倒戈而不敵執篚而來迎者非商之臣也乃紂所虐害之蒸民也所播棄之黎老也其後不服周而念商者非商之民也乃紂所比昵之罪人也所崇信之姦回也何以明之書曰乃惟四方之多罪逋逃是崇是長是信是使是以為大夫卿士俾暴虐于百姓以姦宄于商邑又曰為天下逋逃主萃淵藪則商臣之黨紂虐民者皆天下之姦回罪人不可謂不衆也故孟子謂武王驅飛亷於海隅而戮之滅國者五十而朱子以為皆黨紂虐民者也然滅之云者豈噍類無遺哉不過殱其渠魁而餘孽之猶存者不知幾千萬人誅之不可勝誅也既不之誅而子弟念其父兄之死臣僕念其國統之絶者憤怨不己故乗三監之隙而脅其民以叛也今夫盜蹠一呼聚黨數百猶能麋人之國其故何哉脅之而己矣豈有紂黨之在淵藪者猶衆而不能脅四國之民以叛哉故多士曰予大降爾四國民命多方曰我維大降爾四國民命皆謂商民為所脅者衆故寛宥之而不加誅也雖以四國民命為言而曰商王士曰爾殷多士曰殷侯尹民曰胥伯小大多正則實告殷臣而非告殷民也至于畢命曰毖殷頑民亦指殷之餘孽而言故下文言世禄之家鮮克由禮兹因庶士席寵惟舊則極數殷士之惡而無一語以及殷民也數千載之下讀者不得其意乃謂殷民既怨殷而歸周又叛周而思殷且或謂周之頑民乃殷之忠臣夫殷之臣孰有忠于微子箕子而叛周者非微子箕子乃紂子武庚及其餘黨耳使誠以為叛周者非紂餘黨乃前日塗炭之民則聖人伐暴救民之意終無以白于天下後世而亂臣賊子得以藉口矣予故為詳辨之明文海巻八十五
