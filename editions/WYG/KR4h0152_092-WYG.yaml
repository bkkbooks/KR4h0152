body:
  text: 明文海巻九十二餘姚黄宗羲編論九尊道篇顧璘或問天地之道曰視太極問人之道曰視天地問聖人之道曰視人道曰盡乎曰盡矣然則異端之教紛然譁於天下者何哉曰其流者妄也古者包羲氏作始畫八卦洩天地之秘類萬物之情於是文字興焉而道統之傳立矣可以修身可以治人可以養生可以利用孔子所舉十三卦制器尚象之例是已烏覩所謂異端者哉其後黄帝堯舜禹湯文武周公迭興守而傳之教化明法制立無有異説奸乎其間於是怠棄三正則有誅讒説震驚則有刑雖有暴行邪説不敢起也及周之衰聖王不作處士横議于是百家衆氏之學始興孔子孟軻起而闢之卒不得絶以無其位故也後世之害佛老為尤甚儒者世議而日排之亦勤且力矣惜乎不揣本原獨舉吾先王之緒言瑣瑣然與較曲直彼且嘵嘵然交辯而求勝卒使聖人之道降而與之為敵此吾儒之罪也盍使之觀天地之所生包羲氏之所作果孰始乎是謂本也物無二本則吾儒之道源遠而至當獨尊而無敵異端之道皆後世流妄者也執斯言也雖有悍夫不得不屈雖有孺子不能不覺吾何以多言為哉且佛老之師聖人之罪人道之妄也今之為佛老者又佛老之罪人妄之妄者也吾儒者不稍寛其始而務急攻其末故其辯滋甚聖人曰虚老氏曰虚而無聖人曰寂佛氏曰寂而滅學道之偏其流妄固至於此老氏起於周末其始或亦本於隱君畸士逃山林養性命者之說佛法當漢之衰始入中國本生於西方無文字之學直達本原其始不甚相遠也百家亦皆有之申韓之慘刻儀秦之縱橫其始固亦本於刑名者流欲治世者之說其流妄之禍至於殺身滅國而不能己後之人懼而息焉二氏之不息者其禍隠也秦漢以後先王之教既衰塗之民不見吾仁義禮樂之澤而異言者又無禁於是其徒駕其寓言奸智詭術愚不明之民以罔衣食廢人倫竭財用滅聖誣天肆行而不忌顧其師之言則虚無寂㓕止耳其道則茍私其身止耳豈顧其害若今之甚也哉故曰今之為佛老者佛老之罪人也堯舜禹湯文武氏作必取而禁之不息則必誅之今使其徒但明而心見而性錬而神養而生守其師說不以亂民則固山澤枯槁自好之匹夫耳若務光許由之徒何山不容吾又何以多言為哉故璘之意佛老非遽可誅者也其妄者可誅也去其妄則其說自微微則息之不難也定志篇顧璘道有仁義質有隂陽致曲成章德乃可立故因資而追琢者易成器也立範而陶鎔者不失其形容也觀古人之成德有由來矣非其君不事非其民不使者伯夷也不羞汚君不卑小官者柳下恵也五就湯五就桀者伊尹也質有所近抱一而終窮達不能入其心死生不能易其操名譽之成猶曰之謂白皂之謂皂茍有目者莫不别色而舉號焉其志素定也故特釐女於伯夷之門則怒矣側冠倒裳於下恵之側則漠矣所操殊致安得不異施乎世之學者不通大方不程已力游於汗漫無所專執語人曰吾孔子之徒也無可無不可吾誰欺欺天乎夫梓匠輸輿其勢均也其斧斤之器斵削之法均也其攻於木又均也不專一師不守一法終其身不可以稱工况君子之行乎夫孔子之弟子皆學於孔子也自顔淵以至子夏之徒皆大賢也論語乃列為四科若金玉珠貝之寳不相假名茍無其象門人安所區别乎由是觀之大道無方聖人無名中賢以下定志不早執德不一汎汎然揺惑㓕没而無所附著譬之草木其猶飄蓬也夫别謙篇顧璘謙何生乎曰道不可究功不可全衆人不可兼君子兢兢焉恥其不足也是以謙生焉是故堯舜古之有道人也以堯為父而丹朱傲以舜為子而瞽瞍頑是不得為慈父孝子也道烏乎究禹稷古之有功人也禹平水土視天下不能無溺也稷播百穀視天下不能無餒也功烏乎全仲尼古之神聖人也禮不如耼樂不如襄稼不如老農圃不如老圃人烏乎兼由是言之五聖人者朂其所遺憂其所短退退然以下於人而猶恐諸人之予棄尚何矜之有哉今之為謙者異於是釣名以從學飾貌以親賢事君不以心報國不以力所求乎身者既偽矣彼且柔口傴躬繁儀下節舉凡人之行無大小是非一切遜避其後曰我將為謙若是者何與其心曰人道惡盈而好謙吾謙焉福斯集之矣弗謙則禍嗚呼挾大偽以要福是取聖人之道而重為罔也凶於傲徳甚矣何福之能幾書曰象恭滔天此之謂也難墓有吉凶論黄省曽按周禮冡人掌公墓之地辨其兆域而為之圖先王之葬居中以昭穆為左右凡諸侯居左右以前卿大夫士居後各以其族凡死於兵者不入兆域凡有功者居前以爵等為丘封之度與其樹數墓大夫掌凡邦墓之地域為之圖令國民族塟而掌其禁令正其位掌其度數使皆有私地域先王之世君臣宗族葬同一墓生相愛親死相依眷仁之至義之盡也其為葬道若是而已後世饕剽富貴之人衆而竒邪之流乃興故為堪輿風水之説以簧皷於萬世以為天下之人貴賤由墓地之興衰貧富本葬辰之凶吉與凡一切顯晦替隆之事皆闗於三尺之黄土上自鼎鉉下至閭閈莫不俛心帖耳而信之迎術師若綺皓尊青囊如六經登高相脉揑怪指空陟險求龍談虚恣偽日侵月盛至於家無不相之墓墓無不㸃之穴穴無不選之塟天下之人皆憒昏望兾於爵冕金玉之榮聾眊於其小術之中而不悟亦可悲矣今其言曰塟者所以乘生氣也五氣行於地中人受體於父母本骸得氣遺體受䕃予以其説為虚也信以為然則本骸宜常得氣遺體宜常受䕃帝王之後常為帝王公侯之嗣常為公侯朱頓之𦙍常為朱頓然後其說為可信也然塟埋之術莫尚於唐宋亦莫慎於唐宋自當時而觀之唐則有若三原高祖之獻陵敬宗之莊陵武宗之端陵九嵕太宗之昭陵梁山高宗之乾陵龍泉中宗之定陵豐山睿宗之橋陵金粟𤣥宗之泰陵武將肅宗之建陵檀山代宗之元陵嵯峨徳宗之崇陵金甕順宗之豐陵金幟憲宗之景陵堯山穆宗之光陵天乳文宗之章陵仲山宣宗之貞陵紫金懿宗之簡陵宋則有若鞏縣昭武太祖太宗真仁英神哲之八陵會稽寳山徽高孝光寧理度之七陵皆師極天下之妙工土極天下之貴穴日極天下之良辰可謂卜之嚴審之極矣生氣可謂乘矣本骸可謂得氣矣何唐之祚卒移於五代宋之祚卒移於元陵寢之地今為蔓草牧羊之所而帝王之後或流而為氓伍化而為僕𨽻而遺體不為之受䕃乎帝王不能䕃子孫以帝王則知公侯不能䕃子孫以公侯朱頓不能䕃子孫以朱􅉐也亦明矣又曰氣乘風則散界水則止古人聚之使不散止之使不行故謂之風水風水之法得水為上藏風次之予以其説為虚也夫地氣流行何所不貫毫髪之塊膏潤咸達者也若無風之地草木榮麗多風之地草木凋落斯迺可謂乗風則散也今觀無風之地草木榮麗多風之地草木未嘗不榮麗也若水之此方草木盛長水之彼方草木不生斯乃可謂界水則止也今觀水之此方草木盛長水之彼方草木未嘗不盛長也大地之氣充霄塞漢非風之所能散貫金通石非水之所能止况風亦氣也以風乘氣是謂以氣入氣可謂之聚不可謂之散也水者氣之液也氣行土中獨不行於液中乎陸有草木水有萍藻生氣未嘗為之間隔也山譬人之骨也土譬人之肉也水譬人之血脉也氣行乎骨肉之中獨不行乎血脉之中乎人氣無血脉骨肉之間知地氣無水土之間也水雖界也氣安得而止乎又曰骨者人之生氣死而獨存故塟者返氣納骨以䕃所生之法予以其說為虚也人以氣聚而生氣散則死骨既朽枯氣安可返若可納氣人應再生人不再生是氣不返骨骨不納氣之徴也又曰千尺為勢百尺為形勢來形止是謂全氣以止為氣之全則以形為氣之不全矣蜿蜒曼衍之地皆虧消虚之所萬物宜不育産可也今蜿蜒曼衍勢行之地未嘗不産乎物則氣未嘗不全也又曰地有吉氣隨土所起以起為吉則以伏為凶矣天下之地隆起者少平伏者多是吉氣少而凶氣多也氣一而已吉則俱吉凶則俱凶一起一伏千伏千起是一吉而間一凶千凶而亂千吉也紛紜錯糅坤元之氣豈其然乎既以平伏為凶則今城郭人民之居何多居於平伏至凶之地乎城郭人民居於平伏之地者未嘗皆凶居於隆起之地者未必皆吉山鄉之民未必皆富且貴平鄉之民未必皆貧且賤是以起伏為吉凶者虚也又曰左為青龍右為白虎前為朱雀後為𤣥武𤣥武垂頭朱雀翔舞青龍蜿蜒白虎蹲踞勢形反此法當破死予以其説為非也青龍白虎朱雀𤣥武之說本起於天文之家天文家以角亢氐房心尾箕東方七宿為蒼龍斗牛女虚危室壁北方七宿為𤣥武奎婁胃昴畢觜參西方七宿為白虎井鬼柳星張翼軫南方七宿為朱雀即史所謂東宫蒼龍房心南宫朱雀權衡西宫參為白虎北宫𤣥武虚危者也凡天星之名皆天文家以人物形器名之而實無其形况二十八宿隨天而運初無定方今借以為東西南北之定象固已非矣至以東方為青龍實求其蜿蜒之狀西方為白虎實求其蹲踞之狀南方為朱雀實求其翔舞之狀北方為𤣥武實求其垂頭之狀則誣謬之甚也仰觀天文東方七宿果有青龍之蜿蜒乎南方七宿果有朱雀之翔舞乎西方七宿果有白虎之蹲踞乎北方七宿果有𤣥武之垂頭乎天象無青龍白虎朱雀𤣥武之實則地勢不當求蜿蜒蹲踞翔舞垂頭之形也况天之東方七宿常名為青龍西方七宿常名為白虎未或之改也今一山也北墓目之為朱雀南墓目之為𤣥武東墓目之為白虎西墓目之為青龍是於一山之間可為四象之目無是理也既欲其蜿蜒又欲其蹲踞既欲其垂頭又欲其翔舞是則山雖人可造為朝營夕設亦難為衆墓形勢之各給也况青龍吉也何又嫌其嫉主白虎凶也何又樂其蹲踞是皆詰之而可窮者也又曰土以紅黄紫為生氣以青黒為死氣予以其說為虚也按禹貢兖州厥土黒徐州厥土赤埴墳梁州厥土青黎雍州厥土惟黄壌則天下之土惟徐雍為黄赤則惟徐雍為生氣吉善可塟之地惟兖梁為青黑則惟兖梁為死氣災惡不可葬之地若然則天下之人死者皆當求徐雍而葬之可乎然未聞徐雍多墓而兖梁無墓也兖梁之人死者所葬者皆青黒之土矣未聞兖梁之人皆罹災受禍履貧蹈賤覆家絶宗如堪輿人之說也今兖梁之人仍多富貴吉慶之族則青黒土為死氣之說為無驗也又觀宣聖之墓在兖州曲阜之孔林顔子之墓在兖州之防山孟子之墓在兖州之四基山皆葬於黒墳死氣之地也今孔子之後世為上公萬祀不替顔孟之後皆有常官天下之善祥吉慶莫大於是是青黒土為死氣之説為無驗也又其法以山形之圓者為金方者為土曲者為水頂圓身聳者為木尖峭者為火支脉之行以相生為吉以相尅為不吉予以其説為虚也設使後山為金前山為木是為金之尅木金既尅木則後山産物前山不能産物斯為驗矣未聞前後兩山相依圓者産物頂圓身聳者不能産物也五形之山皆能産物各擅生氣則相生相尅之説為無驗也况世有貧而無墓之家徃徃出草茅而公卿由布素而臺閣此其遺體果受何䕃而然也且同一祖墓也或父貧而子富或子賤而孫顯或孟夭而季壽或兄華而弟枯以為父子子孫孟季兄弟同一遺體也以為本骸得氣耶則父不宜貧子不宜賤孟不宜夭弟不宜枯而有不受其䕃者也以父子子孫孟季兄弟有貧富賤顯壽夭華枯之不同則以遺體受䕃之說為無徴也世人欲信其說試先觀於堪輿之人乎堪輿之人為其祖先父母相度墳兆安厝棺槨必竭目力之巧盡心思之營過於為人相度當百倍矣而卒無一人之富一姓之顯者不過朝游暮陟餬口四方鼓舌揚唇資生巨室而已堪輿之人既不能相善墓而福利其身與其子孫則必不能與人相善墓利人之身與其子孫也此其術之誕假明著大驗也推原其始不過因人情之澆壊世皆希慕富貴之人學究之徒覬為卿相倚桑之女庶為后妃搴旗之輩思為建牙不軌之徒仰為王侯故術者造為不經之說迎其情中其欲預為之兆遠為之期故得行其術而竊其貲爾長掊奪之風作叛亂之氣起非分之望騰無將之心甚非國家之福也今一世之人方且羅網於其内如夢不寤如醉不醒雖圭璋特達之士亦且甘其誣偽之說而亦何罪於庸庸瑣瑣貪汚細下之人乎難八字射決論黄省曽今之術家為珞琭三命之說者以人肇生年月日時支干次列四柱謂之八字其法務取諸五行之平建日干為身主年為根幹月為提綱時為翼佐以三者支干加臨於日因其旺弱用忌而消息之其尅乎日干者為官星為子其生乎日干者為印綬為父母日干之所尅者為才為妻然是三等又以陽見陽為偏陽見隂為正也日干之所生者偏為食神正為傷官與日干雷同者偏為比肩正為刧財為兄弟又以十干為天元十二支為地元支下所藏如子中壬癸水丑中癸水辛金巳土之類為人元以逐歲干支加臨為流年以十年干支加臨為大運專以五行生尅為論者謂之子平家其為耶律之說者以二十八宿為天經四餘為地緯日月五星為七政於肇生之日分宫配垣以所躔生尅而論剖吉凶者謂之五星家治其術者上自京師大藩每方不啻千萬雖鄉邑之小亦有百輩盤集以蠶食於其間大抵多楚越之人也蓋由盡一世之人承迷襲暗舉皆崇信而樂尚之自公卿至於民庶一切没溺其必驗引薦者為之先容延欵者為之倒徙凡誕舉一子經營片事罹搆末疾角鬬天水之官服賈幹利求名莫不取决於斯流是以工學而餬食者紛紛也究而言之是乃誑惑詼妄之術爾君子不道也人之生也富貴貧賤生死壽夭皆已㝠宰而黙定特非人之所能預識爾蕭條亭長歘起帝王惟悴織夫俄登將相莫為而為時至自成所謂造化之神茫杳不測也今星命之家則以人之貴富貧賤生死壽夭皆可終身了了前決而先定操方寸之紙斷百年之數則是造化之神反司於庸夫之手聖人難明而順受者皆可左契而取也有皇上帝乃失𤣥運之權矣寧有是乎其術八字雷同者則貴富貧賤生死壽夭同其決射可也今夫天子之生其為年月日時將盡遏天下之生者而獨生之耶抑亦有同之者耶四海九州之寥廓窮隅遐壤之衆夥其為八字上與天子雷同者不知幾何矣使凡與天子雷同者皆得貴為天子其術斯驗也茍為不然此其術之不可信也予嘗執此以詰術人沈生沈生曰天子不言命超乎五行之外者也其言似矣予又詰之曰天子而下不有世襲為王為公為侯為伯為揮户者乎今之天下若人也不啻數萬輩矣皆生而享成爵食定禄者也其生之年月日時也亦將盡遏天下之人使之不生而獨生之乎抑亦有同之者乎若人也數萬輩則同其年月日時者不啻百萬輩矣則百萬之民何不盡得為王為公為侯為伯為揮户也不能盡得為王為公為侯為伯為揮户斯八字之說無驗也沈生曰先生且休矣僕誠無以應先生矣則又詰之曰爾治子平之學者必自信其術之必然而後可以望人之信之也爾今不先自信其術矣而何以望人之信之也沈生曰何謂也予曰汝茍自信其術也必當自審其八字於某年月日時為財者相旺而宜於金錢也於某年月日為財者衰虚而不利於金錢也則當止擇其饗利之年月與日而為之列肆行遊以求之其不利之年月與日為之閉闗息趾可也今爾歲無不求之月月無不求之日勞勞皇皇奔走於塵埃伺候於臺府浮翺於國都盖無曠時矣豈爾之年月與日盡宜於金錢者乎不盡宜於金錢而爾輩求之不置盖縁自本不信其術何時必利何時必不利故一切冐昧而求之則是已先不信其術矣安能望人之信之也沈生曰先生且休矣僕誠無以應先生矣或曰然則術者之言徃徃昭驗者何也予曰其驗者乃其操術之巧耳非有決然之數可憑而驗也天下之惑溺於是乆且深矣何謂操術之巧夫人之生斯世也其身之所遭不過貧也富也賤也貴也生也死也壽也夭也大要八端而已天下之人不貧則富也不貴則賤也不死則生也不壽則夭也術者操此八言而曰爾貧爾富爾貴爾賤爾死爾生爾壽爾夭曰爾貧爾富也其不貧不富者已矣其貧者富者則輳合其言而驗矣曰爾賤爾貴也其不賤不貴者已矣其賤者貴者則輳合其言而驗矣其於死生壽夭也亦然盖其所執者八端而盡古今合天下之人咸槩於此矣凡扣其術者不輳騐其言貧則輳騐其言富不輳騐其言賤則輳騐其言貴不輳騐其言生則輳騐其言死不輳騐其言壽則輳騐其言夭非術者之能言貧賤富貴生死壽夭也人自以其貧賤富貴生死壽夭輳合而騐之也何必日者即使不辨菽麥不識竒觚之人使之列日者之肆有咨命禄者皆告之亨吉則千萬人之中必有亨吉者矣其亨吉者則以厥人為昭驗也皆告之窒困則千萬人之中必有窒困者矣其窒困者則以厥人為昭驗也有咨商賈者皆告之倍利則千萬人之中必有倍利者矣其倍利者則以厥人為昭驗也皆告之貲喪則千萬人之中必有貲喪者矣其貲喪者則以厥人為昭驗也有咨疾疚者皆告之眉耉則千萬人之中必有眉耉者矣其眉耉者則以厥人為昭驗也皆告之凋殞則千萬人之中必有凋殞者矣其凋殞者則以厥人為昭驗也殊不知列肆之人乃不辨菽麥不識竒觚者也人自以其亨吉窒困倍利貲喪眉耉凋殞而輳合驗之爾由是觀之則斯術也可以不挾籌䇿不談五行不陳衆曜而可以論人者也可見斯術之誑惑而詼妄也且天之生人無異於生物人之生也既有年月日時則物之生也亦有年月日時也人之年月日時可據以為凶吉則物之年月日時亦可據為凶吉者也則魚之育子一生累萬累萬之子累萬之魚也萬魚之生同時而散於江湖也其果一魚中罟而萬魚俱中罟耶豚豕之孕鷄雛之出同時而生常有十餘其割而烹之果有先後耶抑亦同時而割烹之耶其中罟割烹不同則其生年月日與時無據也知生物之年月日時無據則知生人之年月日時亦無據也且天之生人隂陽之交五行之會無所不具者也今日者於八字之中無甲乙寅卯者則曰無木無丙丁已午者則曰無火無戊己辰戌丑未者則曰無土無庚辛申酉者則曰無金無壬癸亥子者則曰無水若云無木必其人之内焉無肝外焉無目者也内不無肝外不無目則無木之言虚也若云無火必其人之内焉無心外焉無舌者也内不無心外不無舌則無火之言虚也若云無土必其人之内焉無脾外焉無肉者也内不無脾外不無肉則無土之言虚也若云無金必其人之内焉無肺外焉無聲者也内不無肺外不無聲則無金之言虚也若云無水必其人之内焉無腎外焉無耳者也内不無腎外不無耳則無水之言虚也今觀八字之有缺者其形體未嘗缺也則是五行之生未嘗少也且日者常云金多善義木多善仁水多善智火多善禮土多善信則是以無金者必無義無木者必無仁無水者必無智無火者必無禮無土者必無信無義是無羞惡之心矣無仁是無惻隱之心矣無智是無是非之心矣無禮是無辭譲之心矣無信是無誠實之心矣必非人而後可豈有名之人也而於斯五者乃有多少有無之分乎其論六親亦以四柱為之準騐以印綬為父母則無印綬者將謂人非屬毛離裏者乎以比肩為兄弟則無比肩者將謂舉無鶺鴒急難者乎以財為妻則釋老之家未必甲乙俱無戊己丙丁俱無庚辛戊己俱無壬癸庚辛俱無甲乙壬癸俱無已午者乎以官為子則貂閹之輩未必甲乙俱無庚辛丙丁俱無壬癸戊己俱無甲乙庚辛俱無丙丁壬癸俱無戊己者乎君子之可干禄果皆庚辛臨於甲乙甲乙臨於戊己戊己臨於壬癸壬癸臨於丙丁丙丁臨於庚辛者乎一財一妻也則天子一后二妃九嬪二十七世婦八十一御妻者八字之中何所見乎一官一子也則嗣𦙍之繁至於累十者八字之中何所藏乎樂妓之命亦有正官則若夫果正否乎其為淫濫皆涉犯咸桃者乎世臣武弁果皆年挾官印者乎鴻鴈亂離果皆丑北夘東而柱多隔角者乎四殺庫墓辰戌丑未之運果皆蹭蹬者乎筋拘目瞽果皆木被金傷而火遭水尅者乎田疇萬頃於井授之日當何騐乎納粟買爵於鄉選之代當何取乎於父干而衝撃子可曰吾命然也而當悖其父乎於子干而乖背父可曰吾命然也而當虐其子乎於兄弟之干而矛盾兄弟可曰吾命然也而當胥戕其兄弟乎於妻之干而有配合之多也夫可曰吾命然也而當不修帷薄可乎䨇舉之子一吉一凶一貴一賤何以異乎命而富也可曰吾命然也吾德無修不妨其富而不義之貫鏹皆可以取乎命而貴也可曰吾命然也吾徳無修不妨其貴而不義之軒冕皆可以居乎且其五星之說係風捕景益為誕謬略為折斥如日月皆一也則曰太陽僅一太隂有五五星皆一也則曰木土與水皆六火金皆二其理何在乎又以十二地支布之為宫命宫為一財帛為二兄弟為三田宅為四男女為五奴僕為六妻妾為七疾厄為八遷移為九官禄為十福德為十一相貌為十二其次第相生命名取義何所本乎命宫何榮於二曜財帛何耗於土兄弟何局三人於金田宅何失祖業於火男女何定五二於日奴僕何豐於羅妻妾何䕃於木水疾厄何瘢痕於金計遷移何客旅於炁土官禄何卑薄於計孛福德何减破於火土相貌何陷弱於日月是皆尋繹其說而不可通解者也其宫十二人皆有之矣亷潔之臣財帛何儲列仙之儔疾厄何論驅走之賤奴僕何徴閨房之姬妻妾何應不耦之輩男女何徴不毛之鄉田宅何準舟楫之子豈盡遷移誅戮之徒豈無福德戚施籧篨而得相貌齊氓編庶而宜官禄是皆尋繹其說而不可通解者也且其援古為證又曰河上之懼七殺也宣父之畏元辰也峨眉之闡三生也􅄦谷之播九命也魏武首風以為水火相尅也夷齊餓死以為貴值耗空也劉阮棲隱以為印逢水木也項籍自裁以為四大空亡也淮隂見縛以為天地轉殺也凡此古人之迹何䇿書之而伊誰傳之也書之無策傳之無人則為是言也誠誕語也且術者之家以貧夭歸之愚人富豪屬之賢士蓋以富而貴者目為嘉命以貧而賤者目為醜命則是刧鈔饕餮之富莾操懿温之貴乃財旺生官是其羡賞者也尼軻之坎躓回憲之貧窶乃身衰遇鬼是其嗤鄙者也而不知人之為命自天子至於庶人一也無二命也何也民受天地之中以生中即命也能者飬之以福不能者敗以取禍養是中而善者斯為嘉命也敗是中而不善者斯為醜命也命之嘉醜人之禍福在於善否之分而非以富貴貧賤論也使其善也富貴亦福貧賤亦福無徃不得富貴貧賤皆嘉命也使其不善也富貴亦禍貧賤亦禍無徃而利富貴貧賤皆醜命也或曰不善而富貴之禍善而貧賤之福何以見其然也予曰子見富貴者揮霍盈侈洋洋赫赫之盛以為無禍之形乎富貴而不善則百姓怨之詛之鬼神害之天地損之其心惴惴然荏荏然焦憂以保之所履者危機所趨者殺阱所遺於子孫者皆覆宗亡家之胚胎也斯非其禍者乎子見貧賤者式㣲凉寡卑卑瑣瑣之陋以為無福之徴乎貧賤而善則百姓頌之美之鬼神䕶之天地益之其心優優然坦坦然熈樂而安之所踐者吉門所升者亨階所遺於子孫者皆昌族顯家之基幹也斯非其福者乎故人為命當以善否為嘉醜而毋徒以富貴貧賤為也故曰人之命一也一者善也無徃而非福也無若是之紛紛也故仲尼曰齊景公有馬千駟死之日民無得而稱焉伯夷叔齊餓死首陽之下民到于今稱之其無得而稱者非其不善而為命之醜者乎其稱之不已者非其善而為命之嘉者乎是知景公富貴保僅一躬而夷齊之榮華萬世饗之也斯言也日者不足與語也所以語夫儒家者流熒惑没溺而信之者也今也猾黠之流則又羅集一郡一縣之八字户聨家次其貧賤富貴生死壽夭之已然者皆黙鈐而私記之謂之春法凡踵肆而扣者靡有不驗殊不知已徃則神將來竝昧也其作姦騁偽若此而世之信之者果哉其不智也難柳宗元封建論黄省曽王天下者計乎生民而已非可僅曰子孫利也計在子孫未有能利其生民者也不能生民利而能終庇其子孫者鮮也故堯舜為生民不恤其子所以熈雍各得其所後世為子孫不恤其民此唐虞之治所以不再也宗元封建論大抵為子孫也卑乎淺矣故其指謂天下之權必攬於我以秦人之法可畫一於萬世嗚呼天下豈有不亡之郡縣哉使郡縣永永安奠徒郡縣之可也然而封建亡郡縣亦亡何獨于封建利民者疑也譬之服餌郡縣之害硝黄也封建之益精术也硝黄破削孰如精术沃補者之為得乎天下天子有也天下之亡係於天子不仁非封建亡之也使其不仁郡縣亦亡始皇是也故三代之興也以仁其亡也以不仁果非封建亡之也仁者何也利乎生民之謂也不仁者何也不利乎生民之謂也封建之制術之仁者也何以為仁也盡天下生民而田宅耕蠶之國之君以飬之訓之諸侯弗能者黜而移之民有能賢興而庸之若是焉而已非若郡縣之紛紛也封建各保其土子其民而富康之郡縣者視其所治若傳舍過客然極其掊取而去之貪滿者方謝羡渴者繼來歲羅天下之餒虎而臨乎其上又有土之豪右以銷戕之求生民不盡徙而斃不可得也故曰郡縣者術之不仁者也宗元曰封建者更古聖王堯舜禹湯文武而莫能去之蓋非不欲去之也勢不可也其言非也若以封建之制二帝三王皆欲去之而不能也夫欲去之者必制之不善者也不善之制帝王不能一朝居何至含容勉忍沿非襲誤傳諸二千餘年之乆哉夫莫大乎以天下與人堯直徒手而授之舜又莫大乎取人之天下湯武皆以臣子而有之其奮發神武而無難者如此所謂大有為之君也豈有封建之制知其不善而不能去之耶果其可去則帝王去之不啻於一毛且二帝三王不能去而秦始何人則又一朝遂能去之是二帝三王之有為反出秦始下矣以二帝三王欲去而不能是其說之大謬而誕肆者也宗元又曰周有天下裂土田而𤓰分之降於夷王下堂迎覲陵夷東徙為諸侯盛强末大不掉之咎其言亦非也封建之典煎古莫究大略見於唐虞既已分之萬國則又五載一巡四朝以敷奏明試其功然後車服庸焉又考績而黜陟幽明之量厥德而有乎家邦其壬人憝惡如防風四凶者則誅放而奪之國非若後代公侯世襲雖有愆過亦不之變也孟軻氏不云乎天子適諸侯曰巡狩諸侯朝於天子曰述職入其疆土地辟田野治養老尊賢俊傑在位則有慶土地荒蕪遺老失賢掊克在位則有讓有不朝則貶爵削地而六師移之天子討而不伐諸侯伐而不討由是觀之封建諸侯其權未嘗一日去天子也詩曰時邁其邦莫不震疊載見辟王曰求厥章此之謂也周之衰也不狩不朝敵國相征而有以失乎封建之初故淪於亡爾盖不狩不朝則休戚不聞於天子國有荒虐之君無從而去之摟諸侯以交伐則是周之亡也在於封建之壞非以封建亡也天子不狩則號令不行於天下諸侯不朝則不復知天子之為尊故鄭伯射肩楚子問鼎勢宜然也况以桓定之微不率祖考無以君乎天下時有湯武則南巢鹿臺之禍遇矣豈特射肩問鼎之侮哉宗元又曰秦有天下裂都而為之郡邑廢侯衛而為之守宰據天下之圖都六合之上游攝制四海運於掌握之内此其所以為得也不數世而天下大壞有由矣亟役萬人暴於威刑竭其貨賄咎在人怨也即其言而論之則郡縣亦無救於不仁而亡昭昭矣使郡縣之雖有不仁之天子亦可救而不至於亡斯郡縣之得也無救於亡而且以為得何宗元貴郡縣而賤封建劣帝王之盛典而優秦人一切之政於其上也漢之封建病於太溢而無檢不廣之於帝王之後及大德之賢又無周家田宅狩朝司馬之制班固所謂漢興懲戒亡秦孤立大啓九國跨州兼郡連城數十宫室百官同制京師矯枉過其正矣此其紛紜多故非封建之罪也宗元謂漢有叛國而無叛郡則獻帝之日袁紹守渤海曹操守東郡而孫䇿守會稽皆以其郡而叛安得謂之無叛郡邪欺誣甚矣宗元又曰失在於制不在於政周事然也失在於政不在於制秦事然也予則以為周之衰也王者迹熄而詩亡詩亡然後春秋作春秋之作大抵傷周室之無政也政不失春秋不作安得尚謂周之有政也予則以為得在於制失在於政周事然也既失於制又失於政秦事然也宗元又慮孟舒魏尚之術黄霸汲黯之化非郡縣則莫之施行夫封建之行亦必賢有德者乃君之爾非曰不肖淫頑槩可南面也所謂孟舒魏尚黄霸汲黯之治在其中矣雖然使郡縣之行吏治皆若孟舒魏尚黄霸汲黯者惡乎不可惟其郡縣也而使彼豺狼不厭之人以漁獵乎其上致使民無聊生之日此予所以為郡縣病也宗元又曰諸侯歸商者三千資以黜夏湯不得而廢歸周者八百資以勝商武王不得而易徇之為安仍之為俗湯武之所不得已也私其力於已也私其衞於子孫也其言非也若然則湯武所為一切出於私意乃若後世竊國奸雄者流爾非聖人光白之謨矣即如其說湯武資於三千八百不能廢易之矣舜禹之興出於揖讓初無三千八百助也何所不得已而亦不廢易之邪知舜禹無所私而存乎封建則知湯武亦無所私而存乎封建也宗元又曰公天下之端自秦始鳴呼何其識之茍而言之易也先王之法至秦始盡廢訕笑三代自號皇帝而子弟為匹夫焚典坑賢何所不極三正且棄而以冬十月為歲首郡縣之制亦猶是也行郡縣而併萬國以為一人之饗天下之私莫大於是而宗元以為公者母乃非人之見乎且慮聖賢生於其時無以立於天下宗元之意盖以必貴而為聖賢之立也夫聖賢之生樂行憂違其窮與達無徃不立也豈必區區爵位之縻乃謂之立邪此乃後世兒童之見㶷組綬而揮霍者之心何宗元之鄙一至是乎且封建之世野無遺賢共惟帝臣矣而又嵗進其士升之天府至於郡縣以來守不禮才令不薦士使天下俊傑鴻朗之輩懷珠含章老死巖穴者不算數矣何得謂郡縣之而聖賢盡立於天下也察究宗元之論無一而可者何世儒惑其强詞而不悟也仕意篇上黄省曽今之張科罝設舉網而羅乎天下之士者果何為哉今之天下之士乳口而聲習丱而操觚長而依泮以求懸一名於越席之内者又何為哉予觀乎今之天下求士者不明夫所以求之者而示之士也應夫求者亦不知所以求之者而為之應也是以士日卑汚而道日湮求門愈闢而賢聖者不出圭組軒符日授於人而天下益趨於不治也所以然者凡以仕意不明而已矣古之仕也以民今之仕也以身古之仕也以國以天下今之仕也以其家仕與古均而意與古繆揮霍溢耀作驕發狂益甚於古人而貪襟墨抱虎臨而狼寢者何其紛紛也是以今之天下茅甕而居者其父之詈言於其子師之正規於其徒妻之蹙額於其夫曰何不仕以華其宫也糠籺而食者其父之詈言於其子師之正規於其徒妻之蹙額於其夫曰何不仕而膏梁其口也空匱而厯日者其父之詈言於其子師之正規於其徒妻之蹙額於其夫曰何不仕而積夫千金以侈老而利夫子孫為也是故五尺童子方辨蒼頡而即皆以此為之心所以分官以徃各以其官而漁獵於億兆環九州布四海去來乎守令萬千乎南面各求飽其谿壑之欲而已輕之者為貿易加之者為屠沽極之者乃盗賊而已矣夫天之立君君之建臣惟以安民也而俾貿賈屠沽盜賊之人以鷙擊乎其上豈天心哉豈天心哉此所以民日窮困莩死而寒暑不昌輪風沴雨時奔作於宇宙而禮樂無期而興也雖拱乎天子之位者仁孝如堯舜制作如軒黄亦且如之何哉夫天子為安民而求士士以貴身富家而求用何其求之應之之不相值也故其釋褐之初以至於請骸之日無非為一富一貴之計而夙興夜寐於簿牒之繁亦不過假此以為圖利之階耳至於民情之樂苦歳事之成歉獄訟之淑慝生齒之流集一切置之心外而無問矣縣以委之於府府以委之於司司又委之於六治如寓於逆旅然棟梁雖頽簟陳雖弊垣牆雖穴惟曰自有主人而已也夫今之士所以逆旅夫國與天下者如此則同一民也摽枝野鹿何為不可而顧乃異其章服殊其號名以民而病民也哉仕意篇下黄省曽仕意不明則進者驕而退者愧至無以立存於閈里而有道之士亦無以自表於天下夫今城衢之内門閭屹屹堂觀煌煌而窮極土木之麗者必進士之家也郊遂之間青疇萬井栁埼百里而肆其畎畆之闢者必進士之家也役奴下走文衣麂履泛鷁浮馬賤妾愚婦翠髻瓊冠一珠千金拱如后妃出則象輿者必進士之家也夫天之立君與夫君之所以建臣者意豈如是而已哉今且天下而成風矣幼之所以誦習者以此長之所以服儒者以此通於帝籍而所以宦貴於四方者以此族屬之所以相髙肺腑戚骨之所以相欺友儕之所以相誇者以此父師之所以為教子弟之所以為學者以此夫此宫室之巍焕田疇之連闢妻奴之華盛行之者為成器為罕才為天人失之者為不肖為下愚為無賴則三者皆利欲之常情也而且有成器天人罕才之名人亦易不力騖而爭馳之哉故庶民儒士之家殘瓦斷甓漏日見雨田無尺寸衣無複再而為之妻孥者蓬髮垢顔以當井臼凡為里中之富貴者莫不撫掌而笑之滿氣以凌之而士之見道不明者含其笑凌於胸中一旦富貴亦必求與之相敵而為仕之意皆㝠然不少聞識嗚呼此太和之治所以不復見於天下而亂臣賊子乃地有之也殊不知天之生斯民也而無主以綱之則必亂是以立之君君之欲安乎斯民也非臣則無以遍乎天下而繼其耳目蹈履之所不及故古之喻者以為元首股肱是以建之臣君邪臣邪俱奉天安民而已故茅茨土階鹿裘素馬堯不以為薄卑宫容膝惡衣被體禹不以為陋但為天生民而已初無一毫病民之為何古之天子且儉約如此而今之進士乃珍奉尊處其身如此也使上天立君建臣之意雲飄海沉而不著是以彼長於此土此長於彼土互相吞噬互相割剥互相摽奪而斬闗發篋之盜緒視為縉紳之常法游宦之公事而不之怪忌矣夫人而徒欲富貴也則何所為而不至哉兹者宸濠之變名為元老而右輔者偽為儒而諮謀者宦其地而倒從之者與夫潛不軌之心而鼠伺於髙位者欲乘便而起環待於下僚者亦不可以數矣凡此者皆仕意不明而徒以富貴為心故耳嗚呼仕意不明亂臣賊子其興也乎其能免乎接迹於人間也乎明文海巻九十二
