body:
  text: 明文海巻九十三餘姚黄宗羲編論十論中一徐渭語中之至者必聖人而始無遺此則難也然習為中者與不習為中者甚且悖其中者皆不能外中而他之也似易也何者之中也者人之情也故曰易也語不為中必二氏之聖而始盡然習不為中者未有果能不為中者也此則非直不易也又難而難者也何者不為中不之中者非人之情也魚處水而飲水清濁不同悉飲也魚之情也故曰為中似易也而不飲水者非魚之情也故曰不為中者難而難者也二氏之所以自為異者其於不飲水不異也求為魚與不求為魚者異也不求為魚者求無失其所以為魚者而己矣故不必求為魚也然而不但此也為中者布而衣衣而量者也自童而老自侏儒而長人其量悉視其人也夫人未有不衣者衣未有不布布未有不量者衣童以老為過中衣長人以侏儒是為不及於中聖不如此其量也若夫釋也者則不衣矣不衣不布矣不布而量何施故曰不為中黄之異緇也則首譬曰尚欲為魚也盡之矣雖然魚有躍者化者時離水而徹飲者有矣似難而易也魚不化不躍而不離水也而飲必無不清者有之乎似易而難也故曰中庸不可能也論中二除渭天與人其得一同也人有骸天無骸無骸則一不役於骸一不役於骸故一不病一役於骸故一病一不病者何堯傳舜舜傳禹曰道心者是也一病者何堯傳舜舜傳禹曰人心者是也微者何骸勝一而一者膏日火以消矣危者何一不能勝骸而骸者土日簣以高矣中之云者酌其人之骸而天之之謂也猶曰半其道心者亦半其人心者之謂也故中也是中也難言也言半則幾於墮而執矣故曰中也者貴時之也難言也凡二聖人者其始之治其心於土階者不過三尺中治其軀於形者不過七尺中治其䕫及其象九其男二其女者多亦不過數人中而卒之利億兆爭參兩者皆是物也是二聖人善因也因其人而人之也不可以天之也然而莫非天也亦因其不可純以一而一之也然而莫非以一也故精也者精之乎此中也一也者一之乎此中也精也者治玉者之切與磨也玉玉而切與磨之則一也此二聖人之中之者之功也二聖人者以骸治骸以人治人者也骸者何竅也鞹也軀也殻也噫二聖人不能强人以純天也以其人人也是二聖人之不得已也至語其得一也則人也猶之天也論中三徐渭自上古以至今聖人者不少矣必多矣自君四海主億兆瑣至治一曲之藝凡利人者皆聖人也周所謂道在瓦礫在屎溺意豈引且觸於斯耶故馬醫醬師治尺箠灑寸鐵而初之者皆聖人也吾且以治者舉人出一思也人創一事也又人累千百人也年累千萬年也而後天下之治具始大以明僃忠而質質而文文而至於不可加而具之枚亦不可數使今者一人也而曰我自為之而自用之而又必待其全而後用則終古不治矣故治必累聖人而後治夫既已如是而足以治矣而彼一人者又曰我必自為之而後治之則非愚則病惑者矣故治莫利於因因而博則其去自為而自用者不逺也惟因而不博者得之夫孔子學幾七十矣老矣錬而酌且審矣亦博而且約矣而所刪所定所贊而所修者幾何哉治僃是矣民可以使由而止矣而今之治者顧曰我且博焉則愚且病惑者矣故曰貴因故又曰因又不貴博農咀草軒與岐也區也緩也和也鵲也倉也而方也而七者必曰我自為農也自為軒也自為岐也而區而緩而和而鵲而倉而自方也非苦悖且不暇故曰貴因困又貴不博孔所刪諸者是矣故曰孔子集大成集其大於帝者王者也雖然之方也而方之抑末也而方方者一也一者方方者也故旦也者以其因者思兼於方則不必皆合不合則思思則得得則待旦待旦則果用而果合是之謂因方而不病於方是之謂藥之王醫之綱乃民徳則醜矣分則有常必使之農其農而商其商視其木以梁今之亂學者類梁而不視其木者也故强齊民而學帝與王之學以為盡帝與王之梁論中四徐渭凡博者一之影也蜕也而一始安有博凡博者悉病也凡聖人之博博其所分也譬之醫奕吾奕也奕有譜盡奕譜而奕止矣吾醫也醫有譜盡醫譜而醫止矣故博也亦約也不博其分而博其所不分而後有百子百子而用者自霸以强自强以譎自譎以攘而縱以横而莫知其所終悉博也博而無所用者則今之所云詞家之流者是也夫詞其始也而貴於詞者曰興也故詞一也古之字於詞者如彼而人興今之字於詞者如此而人亦興興一也而字二耳興一而字二者古字艱艱生觧解生易易生不古矣不古者俗矣古句彌難難生解解生多多又生多多生不古不古生不勁矣是時使然也非可不然而故然之也興不興不係也故夫詩也者古康衢也今漸而里之優唱也古墳也今漸而里唱者之所謂賔之白也悉時然也非可不然而故然之也故夫凖文與詩也者則墳與賔康與里何可同日語也至興則墳固不若賔康不勝里也非獨小人然大人固且然也今操此者不勝此之興而急彼之不興此何異奪裘葛以取温凉而取温凉於獸皮也木葉也曰為為古也惑亦甚矣噫木獸之又難能也今且紫而敗素矣繡而爛纈矣剪楮矣織蝥矣夫論媒者貴許婚勸貸者貴出鏹貴興也非較咻於齊楚也齊語而敗婚齊語而脫鏹何取於齊咻也舉一焉今之為詞而叙吏者古銜如彼則今銜必彼也而叙地者古名如彼今名必如彼也其他靡不然而乃忘其彼之古者即我之今也慕古而反其所以真為古者則惑之甚也雖然之言也殆為詞而取興於人心者設也如詞而徒取興於人口者也取興於人耳者也取興於人目者也而直求温凉於獸與木也而以為古者則亦莫敝於今矣何者悉襲也悉勦也悉潦也一其奴而百其役也其最下者又悉朦也悉刖也悉自雷也悉求唐子而不出域也悉青州之藥丸子也語之其所合者則欣然語之其所不合與不知者不笑則訕且怒矣耳而曰唐矣語初盛則愕矧其上耳而曰漢矣舍有味乎其言之輩數語則涸矧其上是其諸所為奴而役者多不踰數葉楮少不能數十百字而止耳徃徃拾唾餕以為腴而自以為養間從而論其興於心并其所謂興於耳目口者而忽焉其若喪夫其弊也如是乃不知其俑也俑於博也論中五徐渭明明徳三語綱也八條目二十語目也三虚也八實也三闔也八開也三根本也八枝葉也三起八也八結三也本末二字云者一篇之眼也何謂眼如人身然百體相率似膚毛臣妾輩相似也至眸子則豁然朗而異突以警故作者之精而㫖者瞰是也文貴眼此也故詩有詩眼而禪句中有禪眼大學首篇人人熟之者也而文之體要盡是矣通其故千萬篇一也首尻與脊也然而一開一闔者則又且無定立也隨其所宜而適也故凡作者長短不同此同也豐瘠不同此同也詩與文不同此同也自上古之文與詩與今之優之唱而白之賔者不同此同也多此也者添蛇足也不及此者斷鶴足也而昧此而妄作者貂不足也指畫餅攫摶泥而思飽其腹也將以動衆焉而顧失其謏也論中六徐渭姑譬以今吳之畫首英游之畫首進也今丏畫者實以英與進也而名以公與孤必否也今丏文者實以左與屈而名以左與屈必否也必趙以孟也何輕者之不貴贗而貴贗者之不輕耶非此宜贗而彼宜不贗也古之文也一今之文也二文也二故薦者必文文者必貴貴者必尚而今也實者亡矣而其尚者非今之求文者求文於既貴者之責也乃今之求文者求文於未貴者之責也若畫則一而未嘗有改也今求文於士者亦一而未嘗有改斯無贗文矣論中七徐渭耼也禦冦也周也中國之釋也其於曇也猶契也印也不約而同也與吾儒並立而為二止此矣他無所謂道也其卒流而為養生耼之徒之為也入不測之淵海以學没而已者非求以得珠也至海之半不期而得珠焉而後學没者遂遷其學於珠此養生之説熾而他端者始蝟興而榛塞之由也故道之名岐於此與釋與儒而為三非本三也二之三嫡之庶統之閆楚之有昭景也甲氏也漢之有陀也罪言論皇甫汸天子設臺諌之官重言責之寄盖以刺百寮察萬民也匪徙利害得失攸係而人之賢不肖闗焉唐虞敷奏上可達聰漢魏疏陳下將清憲今則給事科分御史道置權僃糾繩職司彈劾者也明哲之庭若屈軼之指佞夫鷹鸇之擊無禮在物且然矧伊人乎飾鷺彰其發隠冠豸示以觸邪使簮筆立朝貴戚斂手以避持斧按部貪墨解綬而亡輦轂瞻其威稜臺閣欽其風采庶幾鮑薛之槩焉自昔孔光之奏董賢發其奸回任昉之按劉整數其釁稔亦可以脇息動色矣近觀章奏跡涉風聞事同毛舉若盗嫂撾翁無而為有也鄰鉄市虎疑而為信也殺青兼兩薏苡懷珠似而為真也展季覆寒目以為挑子瑕奔疾坐以為矯此泥其迹而不亮其心也或希指於權赫若路粹之誣文舉或乘隙於寵衰若子䖍之責商君或逞忿於已私若到洽之詆孝綽或媒孽乎善類若牢脩之排元禮既乏劉隗切正之義復罕傅盛勁直之辭謔浪鄙言每汚尺牘帷闥穢行濫整惠文明主聖䜛當加欺謾之誅讚人交亂宜申投畀之罰乃敢鼠忌憑附不肖網疎蠅㸃單微群賢株逮雖衆口易鑠而百足不僵致綴旒有䝉蔽之嗟負材興倒置之嘆此非進言者之罪乎知難論皇甫汸宰臣熈載效能舉之公烈士徇名垂不朽之業姬公厪吐握以相成仲父廣推引以匡白南國秉人倫之鑒西京宏開閣之風凡挾一才一藝而上不能知者相君之恥也茍有才有藝而不為時所知者亦士之恥也故朱門起彈鋏之歌白首多按劍之嘆不度上之意而槩謂樹黨過矣不諒下之心而盡謂奔競苛矣嘗聞昔人曰女無美惡入宫見妬士無賢不肖入朝見嫉又曰士為知已者死女為悅已者容蓋悲時之黮黯而痛相知之難也夫姣如施子艶若毛嬙使與無鹽嫫母雜處椒房竝貯金屋其美醜安所不能别而用其妬哉獨嗤夫傴僂侍傍勃屑進御恩移團扇愁溷蛾眉為君惜耳至若士抱顔閔之行負董賈之才鬰淵雲之思摛屈宋之藻其視朝貴猶鸞鷟之於醯雞駃騠之於駑駟賢不肖何所不能判而用其嫉哉所恨紫色淫聲眩視淆聽為道悲耳佩蘭服茝而世多逐臭之夫懷瑾握瑜而時乏辨璧之吏此匠氏廢斤於郢人牙生輟弦於鍾子夷吾興慨於鮑叔恵子致賞於䝉莊者也今有江東獨步視猶中行海内無䨇伍於噲等夫翠虯絳螭思聳蒼梧橶膠葛肯與露蟬泥蚓竝談乎故寧韞韜而罕耀不欲偃蹇而共芳待悼知已之難奚悟知希之為貴哉躭詩論張治道正徳辛巳客有謂作詩無益鄙而不為者因作此以答之且以發舒已意爾何物隱者苦思躭吟寒暑弗輟饑餓罔間得之則悦弗得則患無我先生見而問曰詩何物耶而子躭之深也余聞富貴者脩身之符功業者名譽之本二者生民之所急世道之所先也若詩者虚言而寡實者也子何擯實用而苦虚辭捐脩身之符忘名譽之本棄其所樂而躭其所苦哉何物隱者怫然怒囅然笑曰子但知詩為一時之虚言而不知為一身之日用但知作詩之苦而不知作詩之樂也且詩者本於天命之性原於人情之宜合乎日用之常者也肇於唐虞演於周盛於漢魏枝蔓於六朝而變於唐雖體裁不同而引情發性未始或異也今之詩即古三百篇之末流也國風歌於閭巷二雅陳於燕饗三頌奏於郊廟由此觀之人情非詩不宣神明非詩不感風化非詩不行此特其大者若夫喜非詩則怡悦之情遏而不流怒非詩則拂鬱之懷結而不暢哀非詩則流而必傷樂非詩則荒而必淫此詩之大段也方其思而未得之時情隱於未抉思氓於未抽四時運於無迹萬物藏於無形鬼神莫窺其際造化莫測其情斯時也情滯於無方性懸於無向怔怔怦怦繹而未形翳翳軋軋感而未通收視返聽瞳瞳矓矓瞑目涵慮一志定情雷霆震之而不懼魑魅促之而不驚五音六律耳無所聽趙女燕姬目無所營猶不足以養心一志哉及其情與物觸應與感通五情異具萬慮皆萌拈而成句屬而成章手舞足蹈自莫知其所知也詠造化則收藏顯伏隂陽失其權衡詠山河則峻秀吞吐流峙失其標格詠草木禽獸則殊形異象嵗功失其運用詠朝廷軍旅則尊嚴威武朝闕不足以為尊劔㦸不足以為利不亦補造化而助歲功哉且庇身奉欲者富貴也顯身揚名者功業也斯二者内有所求外有所制得之固足償欲失之亦足罹禍趨而成貪躭而成黷盡而成困覆而成敗位不相與分不相親若詩者則不然取於内而無所求感於外而無所制斂情於一心而人不病其拘放情於六合而人不責其蕩隨意而安而人不指其貪竒花異草因材而取而人不議其黷情淹慮滯思而無所而人不斥其困意躓情蹶蕩而無歸而人不鄙其敗若夫崇山峻峯隠秀埋靈詞客匪遊騷人匪經品題不及吟咏不行斯時也覧勝者不之其地採異者不列其名山嶽俗而無靈草木慘而無精使顔謝經麓曹劉升巔見景生情逐意成篇模靈冩竒呈怪探𤣥記之典籍勒之巉巖當世傳其竒後世慕其異山靈載悦草木生氣一經品題傳之萬世若夫朝廷之上君臣胥悦燕饗時行殽核未徹情鬱抑而未伸心盤桓而未泄當此之時工師獻頌大夫呈章宣徳達情罄祝闡揚來逰來歌為龍為光管絃失序琴瑟匪張於是使瞽盲歌詠載之典籍傳之百世諷詠無斁若夫郊廟之間焚燎既舉鍾鼓載陳尸祝無語神明感而來通宗祊求而無所當斯之時繼之以歌咏奏之以篇章一唱三嘆美哉洋洋神人胥悅如在其傍若使載我清酤潔我牛羊歌詠不行神靈傍徨烏足以動幽達明哉若夫戍夫逰子度隴行闗涉彼危濤陟彼崇山卒然相遇會面承顔哭泣不足以為哀笑語不足以為歡也當是之時述别離之苦詠行路之難攜手行答載歌載嘆山川忘其跋涉流離忘其饑寒也當此之時縱使有金帛之贈車馬之親卒然雖悦别後成塵紙非可録客非可陳又烏足以道情感人邪至於棄婦寡妻窮房邃處畜怨含嗟寂寥無語明月當户凄風飄杵心揺揺而靡依淚涕泣而如雨縱使琴瑟在御笙歌置前怨結靡釋情抑匪宣當此之時竭情抽思操觚染翰興與時旋倐然成篇幽閨忘其寥落浩嘯奪其悲凉也由此觀之詩也者所以宣鬰悒之情逹和平之氣者也使富貴可畧功業可忽唐虞不必有慶雲之歌周公不必有東山之詠四詩不必傳百代不必重也嘗聞好騖險者以行坦為勞寳敝帚者以懐珠為賤人情不同不可强而一也由今觀之空山窮島不如朝闕之榮也荷衣葛巾不如冠裳之華也咀雲嚼芝不如珍鼎之美也刮腸涸腹不如談笑之樂也造化忌其錘鑿鬼神畏其嘲咏山靈避其探索花鳥愁其形容宜乎知道者之所不取養𤣥者之所深惡也若夫騷人墨客栖身獨處於烟島之中青山壁立明月高舉洞澗哀壑雲林霧溆凄風有聲悲鶴無侣富貴者之不少安功業者又豈肯暫處哉於是抽我幽思發我秘藏探異索竒飾藻麗章山不藏幽草不匿芳倐然成篇與造化而翺翔世不與争物不與妨也斯時也朝闕之尊嚴孰若海島之放曠冠裳之華美孰若荷衣之樗散肥體滑膚孰若刮腸涸腹者之無灾喝呼叱咤孰若捫心瞑目者之無怨鬼神喜其闡揚山靈悦其標榜造化與其流通也又孰苦而孰樂哉無我先生頓然悟縮然退曰若余者誠所謂飽死鼠而笑人之鸞膏者也不亦謬哉取大位者必有曲行論張治道君子守道之惟一而時勢之外者有二焉天下有道君相聖賢故君子之道伸天下無道君相違戾故君子之道屈伸則未有不進屈則未有不退者故孔子不用於春秋孟軻不用於戰國非孔孟之道非一而時勢之遇者二也使孔孟曲其行以求時勢之可則春秋之用孔子者不肯後戰國之用孟軻者不肯遲則孔子不為孔子孟軻不為孟軻矣歴考史册治日常少亂日常多君相之聖明常少違戾常多君子之學道候時者不知幾千百人也遇時得伸者有幾焉守道不屈者有幾焉徃徃有君子之徳而䧟於小人之為者又不知其幾千百人焉若此者終小人非君子也君子之守不偷也茍時可行焉勢可乘焉我用其道以匡時特不可行焉勢不可乘焉我懐其寳而迷邦而富貴利逹一無所營於心以此居位以此行道此周召伊傅之為故不俟乎曲行求通以逐時勢之可至若君相之違戾而時勢之不可居然取大位而不難者非曲其行貶其為以求依附於小人迎合其君上者道何從焉是君相小人之喜怒好惡君子之進退窮達闗焉君相小人之喜好焉我從而喜好君相小人之惡怒焉我從而惡怒所謂曲其道矣曲其行矣未有不升達進用者矣君相小人之惡怒焉而我喜好之君相小人之喜好焉而我惡怒之此所謂正其道正其行矣未有不疎遠擯斥者也小人揣度於二者之間遲回於進退之際欲其守道以違時何若貶道以干世欲其直行以違勢何若曲行以求全故勢在君上也則阿君上勢在宰輔也則阿宰輔隱行其邪而顯示其正隂為之黨而陽為之戾故位日進而富貴日極人見其位進而日富貴也以為道之行也而不知假道以媒利禄者之為而謂君子為之乎且吾之道仁義也中正也亷恥也禮節也君子之所由以進身治世焉者也口舌殺伐之為豈吾儒中正之道哉蘇張以之佩印孫吳以之師君何也盖春秋戰國之時勢在重口舌戰伐也蘇張孫吳非不聪不慧者以之學仁義中正亷恥禮節非不能焉以施於世者也然審時酌勢在口舌戰伐故曲其道禮之談而為縱横之術曲其仁義中正之論而為戰伐之謀故數言而佩印一戰而師君轟轟烈烈而號為大丈夫當時慕之百世傳之孟軻之外未有不羡慕者未有不願學者也今之曲行以取大位者又異乎是矣又數子之所不為者矣外孔孟之談而内懐妾婦之心陽為周召之為而隂為穿窬之事審時之便以售術酌勢之宜以投奸時在尊小人也隂結小人以為之主勢在重權謀也隂施權謀以為之附小人有所為以得君上也已先是其為以悦其意有所行以取爵位也已先附其行以助其勢勢茍成矣時茍得矣小人之心悦矣君上之心結矣爵位不於我乎徃而焉徃哉然猶恐君子之議其後為衆所不容也而為掩飾覆被之行舉所以同於小人者叛而戾之悦乎君上者違而去之而為道徳仁義之論以欺天下後世此又蘇張孫吳之所不為也又小丈夫之尤者也嗚呼若是人者乃欲自進於孔孟之門乎乃欲自進於孔孟之門乎見用於小人者必有暗交論張治道人有君子有小人故其行有邪有正君子喜正小人喜邪自古及今未有不然者方君子之秉政所用皆君子而君子之道行小人秉政所用皆小人而小人之道行又有小人者出知其附權黨惡為君子之所不容而持已守正為小人之所不取乃於其間詭其行以投其欲佯為不詭而隂寔相附或假人以示其與或托言以售其意或發為著述言語文字以露其迹而在位小人正患其衆不相與恐其獨而慮其無助茍得是人焉拔之在位引之當道是小人者外若不相與而内實相附佯若同於君子而實與乎小人其所以與之者非其見乎理之當然而因小人之為也正而助之行以排衆之非也實黨邪取媚而隂附乎小人之列以欺世取爵位也嗚呼此小人中之小人無所用恥焉者也余故曰見用於小人者必有暗交暗交者小人欺君子媒爵禄取大位之為也其心機其術巧君子欲指其奸而無跡欲攻其術而無証欲伐其黨而非夥及大位之已得也乃揚睂吐氣以功業自許以道理自居而不知明哲之竊視而旁觀未有不知其奸者故曰小人閒居為不善無所不至見君子而後厭然揜其不善而著其善人之視已如見其肺肝然余讀載籍見小人之用心若是然異代猶自寛假今時有一二小人其用心若此者未嘗不嘆古今之相同而嘆邪正之不異也尤未嘗不嘆今時小人之巧雖古之小人不及也其用心同而其致術也巧其用術同其行術也神何也見在位之小人其行茍得君而播時我即與之同焉人將伐其術而指其黨矣我不與之同焉上將衆其待而靡之顯矣出其後而助之行焉人又將不為之功矣不若見於著述言語文字之間掇其旨而異其詞同其論而殊其稱後其出而先其時以示其早見之明以逃附而免伐在位行惡之小人遂指以為先得乎已而已之見也非謬主上遂用之而弗疑小人親之而非疎正行其邪異示其同遠著其附人見其正而不見其邪見其異而不見其同見其逺而不見其附在位之小人知其同焉知其附焉遂引之同陞抜之在位雖以已之位與之甘心焉是小人者有黨之名無黨之實有小人之心無小人之跡心機術巧而位日進余故曰小人中之小人無所用恥焉者也明文海巻九十三
