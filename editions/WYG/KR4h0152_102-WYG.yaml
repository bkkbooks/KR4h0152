body:
  text: 明文海巻一百二餘姚黄宗羲編説二觀陶説邵寳邵子觀于景徳之陶厯羣工所咸造焉客或嘆曰吁陶之為器其難矣哉方其取土於山猶夫石也碓而粉之澄之以水濾之以渠浥之以甓和之以漿始可以揉而規之又必削其未整焉因以壊者什一磨其未澤焉壊者什二潤之以膏飾之以采内諸火而出焉壊者什伍其幸不壊者璺隙痝玷又什之三盖自始規而至成器以獻于尚膳其不得與焉者多矣然取土而舁者若干人碓者若干人澄者濾者浥者和而操者削者磨者潤且飾者納諸火者各若干人凡越工者十而后器斯得其成也其獻之上不過備一御耳為之如是其難而用之不以為異是可嘆也邵子曰是誠難矣雖然吾猶以為易也夫取土而制其質澄濾浥和而後就規刮磨潤飾而後就火茍不壊者皆成器矣器而獻之不過三月則離山野而薦諸郊廟陳諸宫寢祭祀享燕實與有用焉斯亦異矣視其為之之難亦何負哉乃若君子之脩身以待用者材以為土學以為碓戒以為澄省以為濾從義以為浥力行以為和循禮以為規研精以為刮師友以為磨出詞以為潤表儀以為采自試而徴之以去其痝隙玷璺近者十年逺者三四十年曾不得望君門而效用焉甚或終其身於山野其視夫陶也又何如邪寳方陶於人才知其難焉故陶吾猶以為易也客起而謝曰吾聞萬室不足於一陶今乃知其難若是雖然器猶末也請著以為説俾用才者知焉愚説贈王君楊循吉駙馬都尉訓導崑山王君成憲自稱曰真愚予為之説曰今天下皆知愚之不若智矣以愚之名加之其人誠愚邪亦不肯受矣然而愚能勝智智不能勝愚夫何故以吾之智勝天下天下復有智於我者而後吾之智竭矣而天下之愚者惟無所用以勝乎天下而天下恒不能勝之彼其權謀術數之學有時而盡也今夫終日辨而必歸於黙終日鬬而必歸於息夫與人辨與鬬者則人亦必有辨與鬬者起而乘之而不鬭不辨者未嘗有求勝乎天下之心而天下自然莫能與之角也夫使天下莫能與之角則其智豈不實出乎天下之人而何謂其愚耶故愚者以其不勝勝天下訥而不敢辨怯而不敢鬬而實非怯與訥也乃所以常持其必勝之道者也故天下之辨者恒遇訥者而止天下之勇者恒遇怯者而止天下之智者恒遇愚者而止愚之勝智不已多邪書説蔡羽草備𤣥機亦由風氣籀文三變六像具存雖云道藝盖通神明子雲心畫類别正邪中郎筆論散懐恣情多力豐筋者聖鍾司𨽻得之韋墓通靈感物者譚衛夫人示以七妙芝象㓕景鍾索邈步右軍筆陣判將領之後先衛瓘風流亦西臺之髙品是故有劒法籐法戈法弩法㸃法波法増減法畫㫁而脉故連形虚而氣故實右軍云戈如長松倚谷曲如懸鈎釣水放如長弓發箭收如虎鬬龍驤是故有立法踠法頓挫法顯異法貫穿環合曳如杖横如舟牽如電掣立如鳥卓踠如股疊秀如秋水芙蓉險如崩崕縣石穏如平郊安步猛如泉㵼驥奔虎嘯而谷隂生雲興而天彩煥是故渾厚而英發清新而潜括散散澷澷而剛介勁㧞趨趨蹌蹌而優閒裕幹疾者如脱徐者如待竒正不同視前軍之部位東南虚席效賓主之成章是故踈不容加宻不容遣華不可凋秃不可少筆行而志自從趣動而機不已故曰用筆者天流美者地力圓則凋勢疾則澁内貴盈而外貴虚於戲聖賢既逺聞見日疎池舊被穿用心良苦意在筆先山隂之確論十遲五急墨道之要機羊欣親受於子敬張翼亦幾于亂真阮研骨力紹之淵微梁武荅書首推程邈元威論筆先進張融蕭思話不識右軍欣為鼻祖永禪師遥托僧䖍不失家鷄筆待心傳道難俗論文皇辟以魯廟之器世南謂之神遇無為歐陽八訣發永字之威儀過庭長譜歎古今之阻絶故三十六法不為贅懐瓘十體不為侈魯公之所述必待志士髙人方明之授受在乎掌虚指實公權筆諫之要盧儁臨池之訣各有由來非浪言也顛張得之劒戲狂素亦類驚蛇徐浩之體氣純白沈傳師之骨法清虚蘇長公論書法謂大字之難在嚴重結宻黄庭堅云自移戎州之後悟沈着痛快吁代有古今變無終始皇王帝霸各暢厥猷是故三才一徳典章不能掩其盛品彚含曦鬼神不能奪其秀立造化于毫端壯萬古于一瞬非吾所知也養魚説上桑悦思𤣥先生朝步西昌市售魚苗之盈分者九尾以三投之池沼以三畜之盆盎以三放之澄江祝使赴海投之池沼者數月盈尺歳無加益焉畜之盆盎者數月盈寸歳無加益焉予怪池沼之魚其長不能填池沼而必量之以大小盆盎之魚其長不能填盆盎而亦量之以大小惟放之江海者不可知而魚之歳益亦量之故千尺之王鮪生之江而河不能育幾千萬里之鯤産之海雖江亦莫居之也若夫不拘不礙可大可小喜則勺水為神淵怒則巨浸為焦澤其神魚乎嗚呼人之於位恒不能盡填其職而多量之以大小其身心惟渉位而不量遯世而無悶者乃為至人而推移變化斯不可以常情測之也養魚説下桑悦予盆盎中所畜三魚鰱二仙鯉一時寓目焉忽春雨驟至溝澮皆盈二鰱思欲致身江海嘘吸波濤乃隨客流而逝未及澄江水涸石出枕籍交衢焦爛而死獨鯉方圉圉焉洋洋焉吹微沫以自適予怪鰱之長不過數尺其用足充鼎俎而已仙鯉則寄名龍籍乗時變化可以上下風雲而霖雨四海何鰱之不安分而鯉之能自守如是哉古今斗筲之士偶借恩波不自揣量遂謀非望駢首戮於東市者何可勝計而抱濟世安民之具者乃甘栖遲一丘壑與隠一小官下吏泮奐以長年不猶是耶貴行説示門人桑悦言行君子之樞機二者孰貴貴行行言之實也舜彈五絃之琴歌曰南風之薫兮可以解吾民之愠兮南風之時兮可以阜吾民之財兮䝉􅀈氏之國有臣襲姨剔思玲瓏盛夏置麾車千乗車置輪郭鑄鉄為拮抶上樹八十一扇機括屈巻風韻澎濞其止所草木熛兮激激翬兮紜紜騰涌幡摩如一然長養不加彼區有南風之聲無其實也妄言為啞妄聴為聾言而無實與不味而聴之者厥病齊同君子聰明之㑹而自聾啞乎哉君子有三行五性澄心纇瑕纎萌剚撃若讎念慮碾獵罔非至徳是謂心行履仁服義非禮不動是謂身行非先王之法言不言天妙剖鉶霏屑飄冗是謂口行口行純玉猶為崇影矧或純與糅瓦礫耶天下生瀾以國欺國者起兵以家欺家者起訟堅軟之鬭俱慊得雋言焉背行是以口欺身心不思鬬口而勝之是其人無真氣無真氣而可以為人乎哉古之聖賢其言載之六經非言也宣其實也後世之文熛峙涎括凝躁異格精之者能籞渤澥礪槐岻長河榮星宿控焫飲沆瀣江淮餐甘露於沃渚之野騎黄鶴駕應龍下上八紘其妙入無相則神巫莫窺其宻衡婪焉如谷􅰗焉成陸漉焉非真爚焉通神其與呐呐藏脩奄然蔽闗之君子異矣昔周公相成王致太平開明堂受朝賀鎬京有二眩人獻技一致雞卵數斛平纍于地躡屣軼盧其上沓訊盤蕩輕彀不驚一舞干將莫邪揮霍光碎若宻雪亂下雲隂天寒夏葉蔌蔌乾落王覽之曰神哉技扈之畛鄙人種禾耨壅灌剔以時禾秀粒如荳穗垂垂盈尺鄰井之穫莫肩自號神禾以為妙術亦獻於王王大笑史佚等俱笑周公曰眩人作淫巧以蕩上心誠蠧政而無益者也扈之畛鄙人之術行天下其制禮作樂之本歟於是投眩人於四裔封扈之畛鄙人為保介降真香説桑悦栁之懐逺産香藤葉大如掌多刺鑽蹀絞嚙巨材産多于山林紆攣之處歳久色微黄曰藤香或深藏巑岏巨石攫路人跡不到霜饕雪虐積以歳月皮肉俱爛赤心如鐵為之降真真之所成假降久矣天之於人純真竝畀長與世接巧偽日滋欲聰明盡亡耳目俱䘮纎假悉屏獨全其天果易得耶嗚呼物降其假其真香于一時人降其假其真香于萬世故曰人為貴安得舉世皆淳萬物同春入混沌室結鴻濛鄰焚真香㑹人以遺乎假合之身用茅説桑悦栁州郊野多産茅根株如蛇虺結蟠長沒牛馬困猺獞藉埋伏刼商至冬則盡焚之𢎞治甲寅二月予奉當道檄築玉融之缺城數百丈且置敵樓百楹於其上與里胥籌其役僉曰未或易致邑瓦工惟三四人瓦難猝具葢樓合暫用茅時野茅已盡焚各村老弱至回祿虐焰不及處採取有得蓬蓬勝於蘭蕙予懼新城灰土未乾忽春雨連綿冀城樓帡幪其頽圯故求茅甚急日坐行府中聞負擔簌簌聲則喜吾茅將至雖連城之璧化盂之金不願易也且是物未火前隨處翳塞最為人所賤惡豈知丁時之缺亦逢亨運上下貴重之有如是耶嗚呼茅一也昔焉在野為藪以蔽賊今轉而輸官䕶城以禦冦凡物能取其長未必無可用也抑亦僻逺之茅素不黨惡至是而得顯用歟雖然城樓聳軍民之具瞻不得已而用茅茅性易腐其品極卑升之兹樓之上氣象蕭然無以壓人之望是可暫而不可常也因循茍且不急求瓦以易之而以全城専托焉則悞矣昔漢髙祖以安劉付周勃勃猶士夫也劉卒頼以安唐太宗取李勣于羣盜因以為將不為無補使居相臣托孤之任安能久而不變哉髙祖用瓦太宗用茅故其後之城或固或不固觀戲説桑悦桑先生愛觀南戲不論工拙樂之終日不厭或曰先生大觀今古而於是戲之觀何取焉曰吾取其升而不榮黜而不辱笑非真樂哭非真哀而已昔文惠君之養生得之於解牛張旭之草書得之於舞劒宋元君之畫史得之於般磚司馬遷之史記得之於遊覽是皆見之于彼而悟之於此者也予於觀戲得處世之道順逆之境交於前不為置休戚焉謂非有得於戲哉嗚呼今古能觀戲者鮮矣明文海巻一百二
