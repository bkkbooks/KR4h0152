body:
  text: 明文海卷一百五餘姚黄宗羲編説五醫説李濓李子曰上古聖人之置醫也為凡民耳是故凡民有醫君子無醫客聞而愕曰異哉言乎敢問君子之無醫何也曰醫為凡民設而不為君子設也曰子之言亦有所本乎曰有曰見諸何書曰周禮天官醫師之所𨽻者有食醫有疾醫食醫掌王之飲食疾醫掌萬民之疾病各司其事世守其職而君子惟放王之所食放甫往反故王暨君子皆不言疾盖攝養有道自無疾也無疾故無醫曰疾醫吾常聞之矣敢問食之有醫何也曰此古人治未病之方也易頤之象曰君子以慎言語節飲食莊生曰人之可畏者袵席飲食之間而不知為之戒者過也今夫百病之起皆由于氣血之不和而氣血之不和皆由於飲食之失節是故食醫之侍王也調和五味各適其均所以保育天和俾弗偏勝以養夀命之源也曰願聞其詳曰天有五行歳有四時人有五藏庖有五味奉時從化病乃不生春為陽中其氣温而王之食齊眡之食音嗣齊才細反下並同食宜温也夏為陽盛其氣熱而王之羮齊眡之羮宜熱也秋為隂中其氣凉而王之醬齊眡之醬宜凉也冬為隂盛其氣寒而王之飲齊眡之飲宜寒也春屬木木之味酸春主發舒宜多酸以收之夏屬火火之味苦夏主解緩宜多苦以堅之秋屬金金之味辛秋主揫歛宜多辛以散之冬屬水水之味醎冬主凝栗宜多醎以耎之而又調以滑甘謂利其竅和其中也它若牛宜稌羊宜黍豕宜稷犬宜梁鴈宜麥魚宜苽莫不以地之所産而合天之所産弗反其正弗戾其宜而攝養之道備矣是故王心常清弗為物所淫王體常寧弗為物所侵不特王之一身弗搆疾而已也中和致而位育臻五事修而休徴應災害不生沴厲不作而舉斯世之民同歸于夀域故曰歛時五福用敷錫厥庶民夫食醫調攝王躬其功用之大有如此者君子讀書窮理以格物致知為事而格致之大㫖有切于理身之大者乎故君子之飲食恒放乎王曰恒放者言不可以一日廢也若恣口腹之所快徇嗜欲於無涯以致病邪交攻而後問醫而亦蠢蠢然無知之凡民耳夫奚貴于為君子耶是故周官疾醫施于萬民而君子不與焉者以其飲食有節起居有常胃氣疏暢脈絡平昌耳目聰瞭筋力壯强期頤耄耋既夀且康或偶有小疾將不藥而自愈矣豈有至於神枯形敗尫羸耗竭不可救藥之地哉故曰聖人不治已病治未病不治已亂治未亂夫病已成而後藥之亂已成而後治之譬猶渇而掘井鬬而鑄兵不亦晚乎嗚呼君子之所以異于凡民者以其知道也惟其知之是以慎之窮則調燮乎一身達則康濟乎天下推此達彼其道一也世豈有不善理身而善理國者乎故曰君子無醫非無醫也不俟醫也客再拜曰聞教矣而今而後吾始知自愛其身也夫紙説李濓書契既作式代結繩隆古用竹簡嗣易以縑帛依書長短隨事截之名曰幡紙故其字從糸貧者無之或用蒲冩書若路温舒截蒲是也夫簡重縑貴蒲脆並不便于人故傳書亦少後漢和帝時中常侍蔡倫有巧思始剉故布擣抄作紙故其字從巾又擣故魚網作紙曰網紙桑根楮榖麻藤諸皮皆可抄紙世稱蔡侯紙是也余嘗觀天下之物暴殄至甚者無如紙何以言之當紙之未興也簡牘刀筆而已故三皇五帝三王之典謨訓誥下逮先秦古書國不能備而况于家乎始皇焚書固其虐政亦由書之少故㓕之易耳自有紙以來録摹甚易非聖之書無益之籍日新而月盛粃文瘉詩在在鋟梓而紙之費歳不下幾千萬計此則暴殄者一也近世法令繁苛上以虚文令下下以虚文應上簿册公移填塞官庋榜文告諭徧滿垣壁天下幾困于文法而絶無實用於民時人之謂故紙世界此其暴殄者二也士不修行而習于浮辭揮毫伸紙動千百言曽無少闗于身心性情之實其甚無謂者科舉程試之文也决裂章句侮聖人之言記誦套括迎合主司以倖一得比歳以來書坊非舉業不刋市肆非舉業不售士子非舉業不覽問之則不知用之則不錯一登仕版旋學律例視此為唾去果核無復用處此其暴殄者三也古者祭祀用牲幣秦俗牲用馬唐𤣥宗凟于鬼神王璵始鑿紙為錢以代幣凡禱祠必焚紙錢加以畫馬謂之紙馬今江浙之賈水舸陸車載紙貿易者舵相摩而轂相擊也而𡨕紙用之幾半十室之邑數家之村必有鬻紙馬之肆寺廟壇壝齋醮𦵏祭無處無時而不焚化此其暴殄者四也鳴呼耗費之端有此四者而在上者不為禁在下者不知惜裁成天物有志于經世之學者必不恝然于此也余嘗讀舒元輿悲剡谿古藤文而憾其意猶未盡也故著是説以諗世之君子或少啓其珍重愛嗇之心而下筆弗敢輕用之弗忍易則區區芻蕘之言庶幾少有補于斯世乎乗轎説李濓或問服牛乗馬引重致逺以利天下盖取諸隨吾聞諸易矣然則仕者之乗轎也果昉于何代乎李子曰古無是制也故不見于經漢淮南王安諌擊閩越書有曰輿轎而隃嶺轎始見于此按後漢井丹傳信陽侯隂就光烈后弟也以外戚驕貴丹在就坐上見左右進輦乃笑曰吾聞桀駕人車豈此也就不得已而卻輦繇此觀之是兩漢之君尚未有輿人輦者而臣豈有用肩輿者哉魏晉以來朝士皆駕牛車或乗馬三公大臣有老病者君命賜輿猶力辭乃受昔鍾繇有膝疾拜起弗便華歆亦以髙年疾朝見竝令載輿工殿唐太宗時司空房𤣥齡病稍間詔許肩輿入殿太子少師李綱有脚疾太宗賜步輿令宿衛之士舉入東宫此皆出于一時特命豈貴顯者所得通用邪慨自命車制廢而轎興焉或謂之檐子或謂之兠籠百官有疾病者皆必陳牒中書及御史臺而後敢御見諸黎植之所奏者可考也唐令要乃若貫髙以箯輿載疾潘岳以板輿奉母陶潛以藍輿代步與夫野人㳺客所乘筍輿竹輿之類皆兩人扛之以行非若今之制也荆公之居金陵出㳺惟乗驢或勸其用肩輿公艴然曰自古王公貴人雖不道未嘗敢以人代畜吾何敢用肩輿乎由是知唐宋以前元臣大僚未聞有乗轎者迨南渡以後江表人士無不乗轎者嘗觀汪藻集中有行在百官謝表許乗轎則當時官無尊卑皆得乗轎可知矣程大昌曰百官得于寓京乗轎自駕幸揚州始後遂不復乗馬惟從駕則乗之祖宗時臣僚雖在外亦不許乗轎也演繁露我國家定制兩京文職三品以上者許乗轎四品以下雖堂官亦乗馬得以方杌隨其在外服司府州縣官並乗欽給馬若武臣自公侯伯以下皆乗馬亦不得用方杌有弗遵者罪以違制士夫老病閒退去京逺者從便載在令甲炳如也屬者閫司亦乗轎市人見而譁之咸以為自昔所未有而觀察弗之詰臺臣弗之問良可嘆也傳曰上下和同雖有賢者無所立功甚哉和同之為害也又按唐車服志開成未定制宰相三公師保尚書令僕射及致仕官疾病許乗檐子如漢魏載輿步輿之制三品以上及刺史有疾者亦許暫乗夫唐制如此當時藩鎮䟦扈之臣亦未有敢僣踰者而今乃有之吾不知彼何所據而乗之也區區懸車林壑久矣一切世事絶不相闗或因或問而為此之説以貽之亦聊以識吾感爾頋空言夫何補哉噫相説羅洪先隂符經曰心生於物死於物機在目余少時讀之感其言間以試人凡其恭傲恕刻剛柔明闇之情皆不必與羣居可以得其大都然揆其終身夀夭貴賤貧富雖間有值莫能㫁其久近與其果然否已而聞形家語嘗試其術則於夀夭貴賤貧富之㫁十不五值而於余之所謂恭傲恕刻剛柔明闇之情不能庶幾十一焉嘻豈所習者分鑿于部位混淆于氣色而遺其所謂機歟夫恭恕剛明之士不能多得其於貴夀而富又常不能以相兼而刻傲柔闇者往往皆是聞利達則色津津然以喜語貴夀與富稍淹緩亦所不樂况敢直指其貧賤夭折耶故持術太嚴則喜者常少而忿怒相接者殆無虚日日以忿怒而賴得糈以自養其不禍者幾希彼方幸糈之得禍之不及而何盡計其術之騐則其出言之機盖可縁也余未第時鄉人皆騐崇仁馮髙言雖不吉無其忿怒且多禮貎者豈又得出言之機於輕重先後之際故無所犯耶不可知也余歸田馮適來過以其舊所騐者為言余深嘉其術然為之懼不細也凡人敢於為惡者將以求富與貴而冀多夀以享之者也其不敢縱恣者以將來未可逆睹故且猶豫而不決夫疑則謀緩謀緩則為力淺為力淺則其貽患也小而近及其既得而始自信則心滿志遂歳月邁而血氣衰無復能出逺慮是烏可與早見哉今某言出人人可以持鑑自決而縱恣其邪心其相之不類者若可少殺其頋望矣然其平日邅迴於聲譽掩飾於形似者固將有待也所計不效又獨當困窮將亦不勝其憤恨而或肆其傾陷排擠之毒以中傷人人亦孰能禦之是子之術於助惡也實深安在其能機也為子計有説相之生㓕皆由于心此形家語也引而伸之號于人曰吾相相先相心心相善則相相隨之汝貴夀而富由某善也汝勉之而􅆭傲柔闇禍不旋踵矣不聞然臍拉脅者耶汝貧賤而夭由某惡也汝改之如恭恕剛明福亦不旋踵矣不聞遺帶編竹者耶如是則喜者畏怒者平日以邀糈而人無憤恨是子之相得生機也術烏乎云郭氏立後説羅洪禮同宗可以為人後此為生者言也故曰為人後者為之子既為之子情専於此勢不容以他分故為其父母降服後世因之名亦遂易此禮之正也郭君伉以子汝器為叔父蔚州公後在既死數十年後蔚州不知子鞏之夭與汝器復未接面是於情不可得而推此禮之變也禮既變處之者亦當有異宜伉之有疑也伉之言曰祖孫不可言繼嗣謂承其祀可也斯言似矣雖然是遺鞏也書于譜也何所屬乎夫為後于生者其情専其事煩為後于既死也其義重其事簡何也主於承祀焉耳矣知蔚州不可無祀則雖姪孫可也豈必易子孫之名且鞏既無子矣頋安所得孫乎名不易則叔鞏可以享姪祀自無所遺故處禮之變者據事實而以義㫁之雖聖人復起所必同矣於蔚州之主則題曰顯叔祖旁書曰為後姪孫男某奉祀於鞏主則題曰先叔考旁書曰為後姪男某奉祀妣亦然叔姪不必易名則父母不必降服明書為後奉祀則其義甚重後世永為蔚州之裔不敢他適情與義可兼得也於伉之譜書其旁曰五子以第四子汝器為叔父蔚州公後於鞏之譜書其旁曰無子從兄伉以子汝器為後奉蔚州公祀則伉之情伸汝器之為後有所主書之譜為順傳之將來可以為法所謂名正言順而事成也郭君其何疑史説上黄省曾武宗皇帝晏駕之明年大興史事内則開十館以作述外則盡郡縣以修纂嘗聞之師少傅太原公曰班固死天下不復有史矣此誠不滿於今之史也古之史也掌載有専官言動有注記故所撰皆實録今之史也於一世之終而追筆乎數十年之事在位者或去而老老者亦復物故焉得盡精神面貌而詳書之也所以成者惟前後奏疏與墓銘二端奏疏之言亦多淆亂真實嘗觀宋之人如伊川考亭咸大儒也一則目以為奸人一則比以為正卯惟其所恨而致訟焉若此等疏亦可遂信而書之乎至於今之言官紕繆尤甚則奏疏不可盡據矣古之墓銘惟述生死歳月以為陵谷之防至於後來為子孫者於其先之沒莫不盛揚其善揑怪指空無有窮極試觀於今之世家孰無銘銘孰無善則是凡有銘者皆可書而傳也何堯舜之代尚有凶人而今皆比屋可封之君子乎是大有不然者也以罪而黜者誌得掩其罪以墨而去者誌得蓋其墨愚嘗曰墓志立天下無惡人矣十文九誣何足為信然則為史之道奈何曰亦惟以天下之公是公非者為之而已矣有是心而位館閣者豈少哉獨襲沿之不易則其流未可卒改耳愚嘗有志於此而無風雲之便徒抱恨於林壑設使馬遷不世太史班固不預蘭臺則抱恨亦若省曽而已烏能成一家之言光照日月乎嗚呼有其事不得其人不可語史也有其人不専其事亦不可語史也必有其人矣而又専其事則遷固之業何難為哉史説下聞之長老髙廟實録一百八十餘巻學士解公軰掌之文廟實録一百三十巻大學士三楊諸公掌之修髙廟時列傳有洪武之記注有金匱之勲劵以是一時鷹揚之佐制作之臣咸得軒軒磊磊與神功峻徳並耀而無缺沒至於修文廟時列傳不知當柄之臣何故抹殺其事每載一人不過述其姓名科甲轉厯歸老如由狀然中間略見其為人若何而已雖有殊功顯謨竭力社稷抗法萬世一切不録皆随飄風春榮以澌㓕焉耳噫造俑之人亦不仁矣哉自是厯朝以來遵習為法善者無大褒惡者無深貶而勸懲之意亡矣夫蹇蹇匪躬之士所以捐生命棄坟墓焦心慮以建尺寸之功者徒恃青簡之名可垂耳今又不然則人亦何所勸而忠藎生哉為史若此大非國家之福也昔遷固之史每傳一人則不特功徳言語了了無遺模冩如畫又且并其形態之狀以鋪張之今専官已罷固不可以望此矣然亦當稍祖其意縱横求之寧繁毋略盡録其長務令不朽若于今可詳之時遂忍致其落落則年移世改文獻凋零固將盡一世英雄之善而掃蕩之矣雖有良史之才又烏得鑿空影響而書之哉或曰造俑之人以善惡難知而性情無定不若平平書之為無愆也殊不知善惡難知者天下亦鮮設有是人何不遂書其難知之狀其他如有善七而有不善三則書其七而不掩其三何為不可有不善七而有善三則書其七而不廢其三亦何為不可善善惡惡隨其劑量多寡而信書之如冩真然凡面目口鼻肥瘦長短一一與之差别則亦何為而不善哉特由作俑之人無其智又無其才且或挾妬嫉之私存禍殃之懼故縮避含糊草草應制求塞史官之名而已矣以是訛承謬踵至於今日而猶未已也廟堂之上賢俊羅盈必有能變之者致良知説薛應旂大學一書乃學者入徳之門而致知一語實大頭腦處實𦂳闗下手處世儒誤認其義遂以為必窮盡天下之物然後吾之知致則是涉于聞見之知使人向别處走毫釐千里正在此處若此處一差則日用工夫便無安頓陽明先生乃直指以示人曰此致知者乃致良知也非别有所謂知也其言明白痛切拯溺登岸誠有功於吾道不小若㑹悟得來則古聖賢之精一執中一貫忠恕尊徳性先立乎其大之類雖其話柄似若各别而血脈路頭無非所以發明人心天命之本然實至當歸一精義無二者也譬諸天一也既謂之天又謂之乾又謂之帝雖若謂其有形體性情主宰之殊而其實則此一天也譬諸一人也既有名又有字又有行又有職銜近世又有别號雖其所稱之分與地不同而其實則此一人也果能見得此處透徹則不落言筌雖古聖賢許多話頭皆為剩語奈何今之從事口耳者執著良知之説而不能實求諸心其説紛紛遂致自相牴牾枘鑿其於道理一無所得而古聖賢之格言至論已一切廢棄不惟不能為陽明之輔翼而其説反晦矣敢告吾黨求諸本心當自有豁然貫通處尚安以多言為哉春王正月説徐師曽甚矣春秋之難明也如春王正月乃是書開巻第一義即已難得孔子之心而徒滋説者之紛紛盖自胡文定公安國為夏時冠周月之説而春秋之義愈以不明愚嘗考之左傳曰春王周正月謂周王之正月也孔穎達曰三代異制正朔不同周以建子之月為正是改夏之十一月為正月也月改則春移是周之正月為春也孟獻子曰正月日至可以有事于上帝此改月之證也前漢書律厯志武王伐紂之歳周正月辛卯朔二十八日戊午師渡孟津明日已未冬至而泰誓云惟十有三年春大㑹于孟津此改時之證也故春秋據事直書以尊王制而微意自寓于其中何必以夏時冠周月然後垂法後世也即孔子之意謂周正於天時人事不便則以一言明告乎人如答顔淵為邦之問是矣不當假天時以立義也且春秋大義惟在尊周至於正朔一事尤周制之大者顧取夏時以冠之其違戾時制如此乃欲責當時諸侯大夫之不倍周豈不謬哉故近世王文恪鏊王文成守仁二公皆云周正時月俱改良有見也或曰書稱惟元祀十有二月史稱秦元年冬十月詩稱四月維夏六月徂暑則夫時月不改經史有明徴矣子將何以解之曰此自文定及蔡仲黙沈説爾果如其説三代皆以寅月起數安在其為三正也按穎達又曰湯崩踰月太甲嗣位其崩之年即稱元年顧氏以為殷家猶質踰月即改元年以明世異不待正月以為首是也如以孔安國太甲嗣湯奠殯而告之説為非則從史記云湯崩太子太丁未立而死立太丁之弟外丙二年崩又立外丙之弟仲壬四年崩伊尹乃立太丁之子太甲則太甲雖不嗣湯而嗣仲壬矣夫安知仲壬非崩于建亥之月太甲非即位于建子之月乎然則書所稱十二月何可必其為建丑之月也宋儒謂踰年改元乃周制耳蘇氏習聞周制意周以前皆然遂以崩年改元為亂世之事如南朝宋文帝元嘉齊昭文延興北朝魏孝莊永安齊孝昭皇建隋恭帝義寧唐元宗先天宋太宗太平興國等類不知三代迭興多所損益要不可以周制槩前代也然則奚必亂世而後崩年改元乎秦人建亥其制書曰改年始朝賀皆自十月朔此由秦始故以制書明之不然商改夏周改商皆無書秦之承周亦若周之承商商之承夏何獨有書也夫秦儀不經古今所嘆豈可據以説春秋乎若詩所言則文恪己有説矣民間傳習之便也曰然則子所謂微意自寓于其中者何也曰四時成歳寒温有節時冬也而謂之春故書曰春明實非春也東遷陵遲諸侯皆有無王之心矣而不可不謂之王故書曰王明實有王也本十一月也而謂之正故書曰正明實不當以為正也所謂據事直書而其義自見焉者吾聞諸陸文裕公云陸公深本云書王實非王今以桓公不書王考之殊不合故更此説廣師説送李生如京師熊過始予為祠官典司太常禮樂思古所以𨗳化其民人者漢西京去古近矣郡國遣士受業必詣太常此與太師樂合國子弟何異然其合而教之必使有道徳者主焉而漢法太常博士率髙第者迺得之本實雖離然其官聫之設猶可繹思其禮樂教化建中和以為民極者未至決裂如後世也其官師之重如此是烏可求得而倖至哉自予屏居麗澤常欲討尋塾師之教兢兢然不敢易也而况於求之乎李子解官淹恤者越三歳將赴謁銓曹隨牒為學官師如是者不可謂不求也然州黨之序以行射飲其為科條雖大于塾師而視諸國學則少疎矣予不敢師比閭李子乃欲求州以上而師之何也昔孔氏之門以有若似夫子夫子之論學曰有朋自逺方來不亦樂乎繼之孝悌務本夫樂之實樂斯二者而已其近取諸身原情根性如此其于夫子亦孰能辨其非士哉予考信周官之所𨗳化者統以馭之曰親親物以教之曰孝友其閭黨州長之所合而書鄉大夫之所比興胥屬之教官而已然則由學而化民成俗者其至徳要道誠不别搆使學士挾日而服習矣今之師長掌其版以眡其疎率程其文以辨其工苦研其厯以馭其後先别其數以賦之多少非復有先王之法也其職易稱人可求而得何必李子也况李子又有待時乗勢之利哉道以中和為至是故有所抑而俯焉有所引而跂焉三年之喪以祥琴嘗之所以示有中教之中和也予不見見李子所為創痛者其淡然而平則今固見之矣倘亦庶幾祥琴之意乎意其真機之發必有則焉而不可踰者上以是而風下以是而化其相為感通即未論西京太常博士弟子也申禮以教而和樂防之者亦豈必減古太師樂之遺乎此其待時乗勢之利其幾可睹矣故曰歸而求之有餘師有餘師矣則亦何嫌于求之也予雖未能修塾師之教然因李子而悟中和之則是以已心可為嚴師矣商人之言曰徳無常師主善為師善無常主協于克一予協予一自能得師矣予又何求耶他日以語從子典請以歸諸李子曰吾舅也舅諸昆有教麟逰者或可並貽之乎因名曰廣師説醫説樊鵬齊威王即位三年不親政事飲酒好色小人得倖而紀綱不立自是晉楚交侵兵戈寢集人民日散遂憂忿而成疾疾三月列國醫士集齊下者數千人百方弗驗有林月子者聞王疾自秦于齊問之王曰寡人因憂而致疾今已三月百方不能治葢朝夕之人也先生又何問焉林月子曰王何拒人之甚也今來問王固欲治王疾爾且諸醫何在請得而問之可乎王曰可盡呼見林月子林月子問曰曷僉言王疾也一曰王之疾寒暑失節隂陽失和燥濕失均吾欲以藥和調之林月子曰此天下之庸醫也惡能治王一曰王之疾嗜慾過度傷心損精起立傾倚苦走宅神吾欲以藥安静之林月子曰此亦天下之庸醫也惡能治王於是王及諸士曰先生之醫更何也曰吾之醫非藥非石非鍼非灸能使生者弗死死者復生王驚曰先生之醫至此寡人且生矣何皇天以先生賜齊國也乃除朝堂設禮儀列林月子上坐諸醫側立王對席焉再拜而後敢就位既而進前跪請曰今齊國之大負于一人不幸而疾至此先生何以治寡人林月子曰王坐予言之夫良匠治屋必視材之大小良工治器必視玉之美惡良醫治疾必因人之貴賤是故有天子之疾有諸侯之疾有庶人之疾王曰何以為天子之疾曰天子以四海為四體以王畿為皮膚以天子之身為心以六卿為耳目口鼻以三公三孤為臟腑以流行于天下之紀綱為脈故天子有疾則觀其天下之紀綱若何然後扶持保養之而天子之疾可治矣王曰何以為諸侯之疾曰諸侯以四境為四體以侯國為皮膚以諸侯之身為心以大夫臣宰為耳目口鼻以左右相為臟腑以流行于一國之紀綱為脈故諸侯有疾則觀其一國之紀綱若何然後扶持保養之而諸侯之疾可治矣王曰何以為庶人之疾曰庶人上無天子之尊下無諸侯之貴無天下之托無一國之寄孑然藐然一身之外無他有也故有疾則治身今王處諸侯之貴有一國之寄紀綱不立政事不修國内大亂四體壊於外心腹壊於内庸醫不知病根乃以庶人之疾治王是無異以攑棘而建大屋以碔砆而為瑚璉也吾恐強秦猛楚之兵三晉之卒百道攻城不日斬王於卧内以分王之四體雖有藥石無所施矣言未畢威王痛哭遂悔過自新明日悉逐諸醫尊林月子為太師右相正紀綱布政令賞善罰惡親賢逺奸威風敷出四境震恐反侵地結和親行之一月國中大治王因喜而疾瘳廣悲人蛆篇王文祿王生角藝逺逰每經通都大市偶登酒樓下見飛埃濛濛往來憧憧雖襟裾殆烏頭䖝極擬之如羣蛆鑽滚于溷厠之中相忘臭穢共溺從容欲摛文以拯之未遑也戊辰秋閲田子藝續集載悲人蛆篇有慨予𠂻乃廣之曰夫人固倮䖝也而非蛆也世固塵界也而非厠也以世為厠以人為蛆不幾憤世悼人之甚邪然原厥初寅突肇生隂陽委和清而無濁潔而不汚與天為一也以故心中皆天太虚而神迨及物誘性相近而習相逺記曰天下蚩蚩皆為利來天下攘攘皆為利往諺曰夢青蛇而得官夢糞穢而得財夫利莫大于財官夢者心神之感也糞穢青蛇汙濁之物也凡天下人生死夢惺無不在于利中非溷厠蛆䖝而何由是推之錢穀盈充鎮日營營得非貪蛆䖝酒池肉林饜飫酣濃得非嚵蛆䖝粉白黛緑倚玉偎紅得非淫蛆䖝聲勢赫濯縱肆威風得非驕蛆䖝田産饒廣榱桷宻礱得非奢蛆䖝鬬狠争強勝決雌雄得非暴蛆䖝横鞭流血辜枉罹凶得非酷蛆䖝争名力穡特士與農貿遷器用惟商及工得非勞蛆䖝擾擾紛紛溷厠為榮狀態萬變言曷能窮嚴冬冷冽僵腐一空誰悟清都之潔非于天上而在心中一念不起澄然净潔而清通神妙無染與太虚同習何能移性豈凡庸奈世多李赤之迷厠鬼遂顛倒而邪從以溷厠為宏麗椒蘭之華厦甘耽樂而永終嗚呼悲哉孰思髙翀須登彼岸無競無慵不必大言欲為希聖希賢之列請先免于人蛆䖝明文海巻一百五
