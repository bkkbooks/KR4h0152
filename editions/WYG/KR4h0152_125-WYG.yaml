body:
  text: 明文海巻一百二十五餘姚黄宗羲編箴一三箴祝允明余以禍福非聖哲所趨避然有自召之者盖亦有機矣士之機多由三者心舌筆也因各為之箴心倐然而人智賢聖神而與天地均非斯曷存忽然而物姦究盗賊而作萬物螣非斯曷出人用斯殺我我亦用斯殺人以逮其身人不可察而我可戒戒之哉戒之哉禍福曰心舌倏然而譽仁賢知儒而㳺揚誕孚非斯曷居忽然而毁暴慢倍鄙而憎逺罪棄非斯曷起蔑用斯殺予予亦用斯殺蔑以偕其孽蔑不可察而予可戒戒之哉戒之哉禍福曰舌筆倏然而褒華衮立朝而炙竹耿昭非斯曷操忽然而貶象服黥臉而流汙刀簡非斯曷典物用斯殺己巳亦用斯殺物以并其譎物不可察而已可戒戒之哉戒之哉禍福曰筆還心箴鄒守愚余性癡也日余酬酢出於余心以恊天則而不余愧或􅅓余竟不顧懌叙不喜顛躓不懟然亦不余留也其或不然而奪於愛物不能制持余顧憤悸交戰戰不止寢不帖寐食不甘嗜坐不暖几行不寘履前噤後呵森列余前乃自唾曰汝胡為乎然以形累汝隳平生耶於是乃憤然以劚之曰還汝還汝毋為余妖雖忤於人無惜已乃怡怡然于于然譬諸霧開冰釋如於其初於是作還心箴汝動於義汝心則遂汝不動於義汝心則悸汝毋問其他曰惟汝帥景星慶雲維其瑞矣魍魎魑魅惟其類矣上帝臨汝勿云貳矣讀書左箴丁自申讀四方書如陟四方之顛讀萬古書如㳺萬古之前耳不聞諠嚻之聲若與聖賢相問對身不設暴慢之氣若與父師相周旋噫余何可一日不讀書兮盖將有味乎斯言讀書右箴耳讀書而聪目讀書而明心讀書而一神讀書而清疑讀書而辨慮讀書而瑩饑讀書而飽困讀書而醒愠讀書而喜忿讀書而平噫余白首未聞道兮惟讀書以畢此生明文海巻一百二十五
