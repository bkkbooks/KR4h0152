body:
  text: 明文海卷一百三十餘姚黄宗羲編解七七義朱元弼世以死者七日為受罪之時遂作佛事以解禳此固妄誕之論然傳襲之來既久逺邇相同亦必有故問其人不知也嘗思以為虞祭有七之義此亦未瞭後讀論衡訂鬼篇有曰鬼者甲乙之神甲乙者天之别氣人病死甲乙之鬼至矣然而殺鬼之至者又庚辛之神何如驗之以甲乙日病者死期常在庚辛之日或本命所屬為其所殺也時刻亦然余以是思之此則五行相剋之理如木日鬼金為之殺金日鬼非火為之殺乎推之七七之説恐亦是此理以其相剋之􅓙解遂延增妄誕之説然亦未知王論何從生余推之者何如姑識之以俟明理君子雖然七日來復周易之義也古先聖賢言之詳矣並以識存則七七之義自見周誥疑丁自申蘇氏曰余讀泰誓武成常怪周取殷之易及讀大誥至多方八篇乂怪周安殷之難何也方殷之虐人如在膏火中歸周如流不暇念先王之德及天下甫定人自膏火中出始念殷先七王如父母然雖以武王周公之聖相繼撫之而不能止也其説似待殷民厚矣而吾恐其未必然焉夫殷民之所以不服周者其民何民哉觀武王之数紂也曰崇信奸囘曰眤比罪人朋家作仇曰乃惟四方之多罪逋逃是崇是長是信是使曰為天下逋逃主萃淵藪紂之所以肆行凶虐貫稔罪惡者其左右實繁有徒也吾意紂雖誅矣而餘黨之散在四方者既已失城社之威必欲張掎角之勢其相與謀作弗靖也特待有間而發耳故乗三監之叛而嘯聚響應者又將有如林之旅盡以武庚為私人也葢不獨徐淮為然孟子言周公誅紂伐奄驅飛亷於海隅而戮之滅國者五十朱子以為黨紂虐民者是已然雖已滅之不過墟其宫室屠其君長而已而五十之國其脅從之小醜助惡之餘蘖則誅之不可勝誅也彼謂殷之頑民者即此類耳是所謂奸囘也有罪也逋逃而淵藪者也而豈前徒倒戈之衆與夫篚厥𤣥黄之士女哉乃周人之誥之也猶曰予乃大降爾四國民命且申言之非畢命之自相吿戒猶不忍以頑民目之焉以此見周家忠厚溢於八誥之篇而彼民之朋比為仇者則猶姦宄商邑之餘習也説者乃謂周之頑民為殷之忠臣夫殷之所以䘮者由諸人之濟其虐也此而謂之忠臣則微子箕子非歟然㣲子不辭作賔之命箕子親受改容之訪不聞以二子歸周為負於殷也信如蘇氏之論則紂之毒痡四海者其罪尚淺未足以葢七王德澤之深彼民特憤於一時猶思於既往而武王伐暴救民之舉亦不諒於殷之民心矣使後世之奸雄得以藉口者此論啟之也漫書所疑以俟高明者訂焉祭祀章羅虞臣記曰夫祭過亟則黷過踈則怠故始祖尊者也其祭也以歲高祖而下親者也其祭也以時尊尊親親仁義之道也然而忌祭不及高祖何也高祖五服之至尊者也於始祖則義為親於祖考則情稍逺且忌祭者君子痛泣之餘祭也齊衰三月服之將竭者也故忌祭不行於𤣥孫墓祭上及於祧祖何也曰墓祭闕則掘發之奸起子孫不忍先人之蒙禍故墓祭不可廢也禮祫已祧之主於廟今祭祧於墓亦祫之遺義也不行於廟懼僭也曰古者廟祭其主止嫡今嫡庶皆同享何也曰禮也生而聚同宴矣没而祭如之何其不同享也夫祖考視子孫猶子孫之視祖考也今人有歳時之㑹獨其長子長孫在而衆子衆孫不與焉其心未能喜而飲倉是故祭及其長遺其庶非所以宴樂祖考之心也且衆子孫顧視自家祖考不得與享於廟人情豈得晏然又非所以體悉羣族之義也曰皆有主乎曰主各設於私寢祭之日子孫奉主於廟祭畢而反其位如之何曰位各以其班尊卑之分也班次序視其生之年尚齒也考東妣西主皆南向象生時男女之别也子孫異居而道逺其奉主則如之何曰古有題版書其名號位次訖事而藏諸夾室可行也其獻也如之何曰獻必宗子嫌奪嫡也執事各用其子孫以申孝也歳祭用冬至之前一日時祭用分至之日不筮日衆志定也擇士於前享之七日吿豫也命士以上用少牢餘則特牲祭從生也品物偹於祭田所入遺子孫以可守也牲不及肥大薦不美多品有常數也㓙年之祭殺其二止以春秋示變於常也故曰禮貴勝財不尚茍豐貧而不逮何疑於降其祭之物也雖㐫年不儉貴其稱也貯有餘於廟五服之婚嫁䘮𦵏者取給焉貧者倍之逮族之仁也以所貯為贈則宗人同焉私禮不行優貧也祭不與於内謹男女佚亂之漸也今人孝敬不如古人使舉宗之婦女並拜相接非所以持情合危交於神明之道也然則其亞獻也將誰代之曰王人有强力者自行之不則使其兄弟之長者祝用四祖考異位也不幾於煩乎曰稱各不同也位必異祝所以達誠也總一視則止稱𤣥孫似于專祀高祖而曽祖下皆祔食矣故丘氏謂初獻四龕畢然後讀祝非禮也其於祔位者何殤與無後也設位於高祖之傍東西相向四配之倣也祭止一獻無祝牲體禮略於祖考祭殤與無後之道也其拜位諸伯叔分左右而居前諸兄弟亦分左右而居後宗子位乎兄弟之中便於對越尊卑嫡庶之序也年高者休於他所禮老也叅神辭神舊四拜今止再拜遵國制也周禮大祝九拜之辨曰襃拜謂再拜也註曰再拜之禮事尸與神也故集禮儀註皆以再拜為節曰今人見祖父母父母皆四拜至事死而再拜何也曰事生之禮簡故加於四拜事神之禮煩故止於再拜不受胙祭與諸父昆弟同也故不欲獨邀神貺廢徹同宴神惠普也亦受胙之義也禮吿利成尸謖之期也古有尸祭今無尸而告是孝子供養之心自為成也是故可省也曰然則禮不已殺乎曰揖拜多則筋力匱筋力匱則誠敬衰是故禮以去繁文而全恭敬為貴也昔者季氏之祭逮闇而行日不足則繼以燭君子曰雖有强力之容肅敬之心皆倦怠矣有司跛倚臨祭不敬孰大焉他日子路與則室事交乎户堂事交乎階質明而行事晏朝而退仲尼聞之以由為知禮由此觀之揖拜少畧所以全其恭敬之未衰也而曽是以為殺乎哉説曰家禮追贈舊儀多與道戾故自祝辭而下吾不欲觀之矣夫義不可與奉上謂之怠禮不可與享親謂之簡二者人道之大忌也今也主正位於上君命宣於前是以臣坐受之也君恩之榮臣子得之莫不歡忭鬼神之情與人同也乃其祝文曰益増哀隕死者宴樂生者哀隕甚非所以對越君親之言也記曰祭不言㓙况君命之臨乎夫君命至寵也不敢行於墓懼䙝也雖支子必受於廟示重也主降於階下明為臣也北向象受命之義也主返廟而居東俟吿祖也古者受䇿書歸則舍奠於廟子孫有錫命之榮祖考所欲聞也是故宗子告之告則稱諱父前子名尊無二也故曰廟中不諱古之道也享於中堂猶生而受子孫之賀也告而後祭不先禰而後祖也凡此數者皆孝子之弗忍死其親之仁也禮廢章羅虞臣或問宗子三年之䘮祭乎曰䘮三年不祭禮也故賀循曰禮在䘮不祭祭吉事也其義篤於生人亦祖禰之情同其哀戚也今有三年之䘮而祭者不亦首誣於禮乎曰杜預曰凡喪卒哭而祔祔而作主新主既特祀於寢則宗廟四時常祀自如舊也其言非與曰春秋譏喪祭謂失禮也杜氏之言葢春秋時失禮之禮也不足準也曰然則高祖及旁親之父祖無乃以宗子之故而缺食三年乎曰喪主非宗子則持喪而不與於祭喪除然後入廟禮也若宗子則繼高祖之嫡也高祖之廟不可以終年曠祭故以宗人攝之也攝之何如曰大夫士未𦵏五服未除者祭可廢也既𦵏則緦麻可攝矣既練則大小功可攝矣既祥則期可攝矣記曰宗子死稱名不言孝亦攝之之謂也曰古有以衰服祀於几筵墨衰祀於宗廟禮乎曰墨衰非禮也不如攝也曰天子諸侯之無攝何也曰天子諸侯之喪其臣皆衰服三年雖欲攝誰為攝之曰然則有期功之喪祭乎曰不敢以卑廢尊也祭哉祭必卒哭未卒哭則廢故曰有死於宫中者則為之三月不舉祭此之謂也曰禮云緦不祭今卒哭而祭然則不亦輕喪乎曰吾服伯叔兄弟雖期然自高祖視之皆庶曾孫也禮為曾孫緦至卒哭則緦服竭矣故孔子曰所祭於死者無服則祭曰歳有宗人之喪相仍也則如之何曰期功之義重則哀戚深故斷以卒哭若五服之緦雖既殯可也昔者曾子問於孔子曰大夫之祭鼎爼既陳籩豆既設不得成禮廢者幾孔子曰三年之喪齊衰大功皆廢外喪自齊衰以下行也以此準之士之内喪雖緦與衰同也若外喪先緦而後衰其祭也俟衰之卒哭先衰而後緦其祭也雖既殯之末可也何必終期曰然則庶子之陪祭者有期功而下之喪與乎曰陪祭與主祭不同除服可也曰期功之喪既祭高祖然則死者之父其主亦得與於祭乎曰古者國有喪則祝取羣廟之主而藏諸祖廟卒哭成事而後返象生時為㓙事聚也既返於廟是故可以祭矣明文海巻一百三十
