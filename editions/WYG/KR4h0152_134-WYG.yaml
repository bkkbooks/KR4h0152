body:
  text: 明文海巻一百三十四餘姚黄宗羲編問答一襍體葬書問對趙汸或問葬地之説理有是乎對曰有之然則其説孰勝對曰葬書至矣問曰葬書真郭氏之言乎抑古有其傳也對曰不可考周官冡人掌公墓墓大夫掌凡邦墓皆辨其尊卑度數而葬以其族大司徒以本俗六安萬民次二曰族墳墓則葬不擇地明矣豈有無事而著其法者哉漢書藝文志叙形法家大舉九州之勢以立城郭室舍形人及六畜骨法之度數器物之形容以求其聲氣貴賤吉凶而宮宅地形與相人之書並列葬地之法其肇派於斯乎予嘗讀張平子冡賦見其自述上下岡隴之狀大畧如今葬書尋龍捉脉之為者豈東漢之末其説己行於士大夫間至景純最好方伎世見其葬母暨陽卒遠水患符其所徵而遂以葬書傳諸郭氏邪然無所考矣問曰葬書世所有然自齊梁至隋唐君子不道至宋司馬温公乃欲焚其書禁絶其術何也對曰其言有大悖於理者書固可焚術固當絶也夫盛衰消長之變一定而不可推移者雖聖智功力無能為盖天之所命而神功之不可測者也後世諸子百氏好為異端竒論者衆矣未有敢易此以為言者而葬書獨曰神功可奪天命可改嘻其欺天罔神謗造化而誣生民也甚矣世俗溺於其説以為天道一定之分猶有術以易之則凡人事之是非黒白物我得失之細固可顛到錯亂伏藏擒制於方寸之隠發以遂吾私而無難而世道人心遂有不可回者豈非葬書之有以誤之與禁而絶之固善問者曰夫其謬戾既己如此而又以為葬地之理在焉何也對曰術數之書其言不純往往類此夫創物之智難以言傳固不可以為言者之失而蔽其善也曰敢問其言之善者何謂也對曰所謂乗生氣者是也班孟堅曰形與氣相首尾此精微之獨異而數之自然最為得形法之要盖與葬者之言相表裏夫山川之起止合散其神交氣感備百物之精故地形之書與觀宫宅人物者同出一原而後世楊廖之徒遂精其能而極其變然後坤靈生息之機得乗以葬而後無失焉盖非殊資異識足以盡山川百物之情逆來順往旁見側出皆得其自然之數者不足以語此則事雖鄙而理亦微矣故其書愈多其法愈密而此三言者足以盡蔽其義盖古先遺語之尚見於其書者乎又問曰星天象也術家以名山豈葬書之㫖耶對曰五行隂陽天地之化育在天成象在地成形聲色貌象各以其類盖無物不然無微不著而况山阜有形之最大者哉茍至理所存不必其説之皆出於古也曰直者吾知其為木鋭者吾知其為火轉動者吾知其為水而圓之為金方之為土何也對曰易象乾為天為金為圓因其從革以觀其在鎔則知之矣四方形而土居其中盖體坤而得地之象也問者曰然則或謂人間萬事皆順惟金丹與地理為逆者何也對曰人有五藏外應天行流精布氣以養形也陽施隂受以傳代也非逆不足以握神機而成變化天有五氣行乎地中流潤滋生草木榮也絪緼上騰發光景也非逆不足以配靈爽而貫幽明知金丹之為逆者則生氣得所乗之機矣夫豈二物對待之名哉又問曰今閩巫方位之説亦得葬書之㫖乎對曰論五行衰旺生克此自隂陽家事非所以求形法葬書言方在勢與形之次而近世臨川吳公刋定其書置是語於雜篇之首盖常與人言方位時日無闗於地理可謂得其本矣譬諸方伎家起死回生必精乎色脉之度數長生久視不出乎内外之法象盖形氣之治神機合變不係於方其本如此問曰然則欲知葬地之理者將即形法而求之備乎抑合隂陽家而論之也對曰是固當辨譬之人事形法其言相也隂陽其推命也有不相待者矣然言相者因百物之異形而各極其情狀以察造化之微而知吉凶必不以相人者相六畜也推命者以生年月日時論禍福吉凶猶或失之者由其為術之本不足以範圍大化也移之以推六畜輒大謬者六畜之生不同於人也夫方位之説本非所以求地理况乎隨意所擇不得形法之真而槩以其説加之則亦何異以虛中子平之術而推六畜以論牛馬者而論人耶又問曰然則其説何自而始術家多談之者又何耶對曰不知其所自起也贛人相傳以為閩士有求葬法於江西者不遇其人遂泛觀諸郡名蹟以羅鏡測之各職其方以相㕘合而傅會其説如此盖瞽者扣盤捫燭以求日之比而後出之書益加巧密故遂行於閩中理或然也夫勢與形理顯而事難以管窺豹者每見一斑按圖索驥者多失於驪黃牝牡茍非其人神定識超未必能造其微也方位者理晦而事易畫師喜模鬼神憚作狗馬况羈旅求合之巫惡肯改所難以艱其衣食之途哉此可為智者道爾問者又曰理既如是則葬書所謂反氣納骨以䕃所生者固在其術中矣何乃於奪神功改天命之説而斥絶之若是耶對曰本骸得氣遺體受䕃者氣機自然之應也然吉地不易求而求全吉者尤未易葬師常鮮遇而遇真術者為尤鮮是其術之明晦用舍地之是非得失且懸於天而不可必今其言曰君子以是奪神功改天命何其不思之甚乎孔子曰不知命無以為君子豈葬書之所謂君子者乎又曰然則今之名卿大家其先世葬地多驗如執劵取物至其盛時竭力以求輒無所得或反倍謬取禍豈亦分定者不可推移耶對曰不但如是而已夫家之將興必先世多潜德隂善厚施而不食其報若是者雖不擇而葬其吉土之遇與子孫之昌固已潜符黙契盖天畀之也後世見其先之鼎盛而不知所自來於是妙貪巧取牢籠刻削以為不知何人之計則其急於擇地者亦殖私窺利之一端爾其設心如是則獲罪於天而自促其數者多矣擇而無得與得而倍謬豈非神理之顯著者哉問曰然則大儒子朱子亦有取焉何也對曰大賢君子之事不可以常人類論古者三月而葬凡附於棺者必誠必信地風水泉螻蟻之為患至深善腐速朽之藏如委棄於壑盖時有定制民無得而遺焉皆昔人知之而無可奈何者伊川程子謂死者安則生人安乃自後世擇地而言其自然之應爾朱子之葬必擇地亦曰為所得為以自盡夫必誠必信之道而不失程子之意云爾然君子之澤未常有加於報施之常則其託斯事於季通氏者又豈有所歆羨期必也哉固非可與常人類論也問者又曰死葬者生人之必有而大儒君子所為乃後世之標凖也故世之論葬地者必以朱子為口實則仁人孝子之葬其親地不可無擇也明矣今物理之難明者既如彼而得失之懸於天者又如此則所謂為其得為以盡其必誠必信之道者將何自而可耶對曰死葬之以禮祭之以禮斂手足形還葬與葬以天下一也故喪具稱家之有無夫吉地之難得豈特喪具之費而已哉先王制禮致嚴於廟以盡人鬼之情而藏魄於幽以順反原之變其處此固有道矣積善有餘慶積不善有餘殃秦不及期周過其厯祈天永命歸於有德而心術之壞氣數隨之此必然之理也聖賢豈欺我哉學士大夫秉禮以喪親本仁以厚德明理以擇術得失之際觀乎時義而無容心則庶乎不悖於性命之常而無憾於慎終之教矣豈非先哲之志而君子之道哉又問曰然則孝經所謂卜其宅兆而安厝之者果為何事而前軰謂中原土厚水深地可不擇江南水土淺薄不擇之患不可勝道則將奈何對曰聖人之心吉凶與民同患也而不以獨智先羣物故建元龜泰筮以為生民立命而窀穸之事亦得用焉豈以偏方地氣之不齊而强人以所難知者哉且江南之林林總總生生化化者無有窮時而地之可葬者有時而盡也又安得人傳景純之説而家有楊廖之師哉夫道不足以公天下法不足以闗後世而垂訓者未之聞也雖然有一於此葬書所謂勢來形止地之全氣者誠未易言若夫童斷過獨空缺曠折水泉砂礫凶宅之速㓕亡者固有可避之道也大山長谷廻溪伏嶺之中豈無高平深厚之地可規以為族葬者雖鬼福之應無及於人而盛衰之常得以盡其天分譬如有病不治常得中醫其視委之庸巫聽其貪戾妄作㝠暗顛覆於一坏之壤而不自知者則大有逕庭矣昔人謂誤解本草為生人之禍今葬術豈輕於本草然藥餌得失見於目前而葬地吉凶每存身後故未有能稽終知弊者也事闗於送終之大節儒先君子有所不廢而流俗因仍未能極其表裏精粗之藴與夫得失之由故作葬書問對賣柑者言劉基杭有賣果者善藏柑涉寒暑不潰出之粲然玉質而金色置於市賈十倍人争鬻之予貿得其一剖之如有烟撲口鼻視其中則乾若敗絮予怪而問之曰若所市於人者將以實籩豆奉祭祀供賔容乎將衒外以惑愚瞽也甚矣哉為欺也賣者笑曰吾業是有年矣吾頼是以食吾軀吾售之人取之未嘗有言而獨不足子所乎世之為欺者不寡矣而獨我也乎哉吾子未之思也今夫佩虎符坐臯比者洸洸乎干城之具也果能授孫吳之畧耶峨大冠拖長紳者昻昻乎廟堂之器也果能建伊臯之業耶盜起而不知禦民困而不知救吏姦而不知禁坐縻廩粟而不知耻觀其坐髙堂騎大馬醉醇醲而飫肥鮮者孰不巍巍乎可畏赫赫乎可象也又何往而不金玉其外敗絮其中也哉今子是之不察而以察吾柑予黙然無以應退而思其言類東方生滑稽之流豈其憤世疾邪者耶而託於柑以諷耶愁鬼言劉基歲次𤣥枵律中林鐘北山起雲南溟來風土潤溽暑蒸靉靆而為虹岑峯先生獨處不懌筋嬾肉緩體倦志􅤕形神枯瘁精氣消爍頽乎岸塌湱爾氷泐口不能言心意迷惑敗敗泯泯若有求而不得龍門子使賈生診之賈生曰異哉先生之疾病也若陽非陽若隂非隂没没淫淫倐浮忽沈其來無蹤其去無跡吐之不出下之不泄汗之不液針不能刺艾不能灼其在丹元之宮爽靈之室乎龍門子恠而伺於其寢是夕也𤣥雲往來月色黯黵凄風吹衣隂氣肅穆颯颯率率恍若有物入自壁隙閃閃魘魘唏唏㛍㛍肸肸歘歘若滅而没如有形質龍門予使保兒招而問之曰女何祥也昊蒼賦形至靈維人游魂為變歸鬼伸神女其神耶將德是憑廟貌血食福善禍淫正直聰月日享於克誠胡不召而自至蹈穢䙝而爽德馨其鬼也耶形氣殊途幽顯異致女身安屬女神曷寄㝠乎漠乎非我族類胡為來哉吁可畏乎憎於人也於是其物滚滚而前跮跮而却睢盱舔舕載踸載蹻咿唹嚄唶而致詞曰我愁鬼也生於昧潰之野而長於鬰厄之鄉其出無朋其動無常其去無方饑無以為食渴無以為漿風雨颯灑無以為居廬霜雪凌冽無以為衣裳恒曀曀以儽儽忳愲愲其如傷或乃噫氣成城噓憂為陣當之者䝉䝉中之者暈暈巫陽見而哀之為我請於上帝上帝惻然乃詔咎繇審厥愆申命巫陽賜吾六窮之符使游人間帝命若曰惟鬼無依將人是依王公大人積德為基運亨福宏女不可窺猗頓陶朱大屋髙垣徐儀守門女不可干達人大觀知命不憂與女異志女不可投赳赳武夫無所畏懼大膽如𤓰見女必怒㿕㿕痁痁載柔載纎旖旎沾黏則不女嫌低首下氣如膏如膩喑嗚涕泗則不女忌女往自擇無有差迕既得女所順與之處我乃再拜稽首受命以還聿求同志以為依歸久矣未能得也間嘗乗子之虚入子之廬歴相羣公下逮僕夫莫不笑語嬉嬉歩履舒舒喜色著於眉宇精神滿於身軀諦所向之鑿枘知不可以與俱於是逡廵却立曵足欲遊微風入耳忽聞謦欬委霍呷喢嘆緩憊帶迫而視之得一人焉華鬢半秃發言遲滯舉趾局促頽乎若將覆之墻瘨乎若不食之鵠面蹙薰瓠膚凋槁木憂容不霽痗氣可掬伺而知其岑峯先生也於是因彭矯以見先生於宵寐先生果憐而收我舍我於靈府之中食我以丹田之瓊糜飲我以華池之芳泉方期與我出處以終其天年龍門子大驚亟呼左右挺劍擊之其鬼黝然而消乃命賈生發囊傾瓢作大齊以投之岑峯先生汁然汗出妯然而知詰旦魂返魄定歸神聚氣筋骨植立不知沈疴之去體也土偶對貝瓊岸海有古祠奉捍沙神者余暇日過之循其垣則惡木朻然而烏鳶噪其顛入其户則毒草茀然而蛇虺蟠乎中有屋焉仆而不支有像焉剥而不完老巫揖而進曰是祠閲五百春秋矣嘗能以禍福恐乎人有疾必禱水旱必禱海賈泝濤往來者必禱神皆荅之如響百穀歲登無蜚蝗霜雹大疫之災人既樂業至者如歸由是剪荆棘而宮室之或光怪夜見髣髴金支翠旗自天而降而日有事於是者麏至及其廢也咸玩而侮之神亦不能禍福於人豈盛衰闗於造物者乎余曰嘻是土木而衣冠也昔非神也而神之者人也今非弗神也而人弗之神也若何怪焉是夕宿於神之旁有介而弁者見於夢曰吾既辱子子何毁之過耶子見吾土木而衣冠也獨不見衣冠而土木乎小而邑邑有令大而郡郡有守其為禍福甚於神也罷軟者茍禄貪縱者敗法非守令而土木與内附百姓外柔四方生殺繫其喜怒黜陟由其向背執天子之柄而位百寮之首不啻神之魁然而貴者也出則陳兵而驅入則複壁而居目瞽而黒白相混耳塞而淫雅不殊非宰相而土木與吾假丹青之飾而託乎太隂使玩者有時而懼彼肖天像地握珠玉被錦繡且倀倀焉尸居而鬼躁未始見德於人子奚不以誚吾者誚彼與萬金雖積不救然臍之禍三窟徒營豈免排墻之厄吾恐棟焚而及巢燕基圮而殃穴蟻其不為吾祠之毁者幾希余應之曰汝之所斥者似矣而非其實也昭昭者或愚皎皎者或汚安知其才足有為而時不可為乎介者又曰胡廣歴六帝而無稱於時一盧懷慎耳張華裴頠禍至而不圖一曹爽兄弟耳人物不同而同為土木已余無以詰覺而識其語將獻諸上懼執政者之不悦也故尼補余氏潮汐對童軒古人之論潮汐者非一或言氣之升降或言地之喘息或謂神鰌出入或謂地勢浮沈臆説紛紛訖無定論惟唐人盧肇嘗著海潮一賦以謂潮之往來舉係於日世頗以為近理至宋儒余氏安道獨覺其非其言曰潮之漲退海非増減月之所臨水往從之故月臨卯酉則潮漲乎東西月臨子午則潮平乎南北彼竭此盈往來不絶皆係於月不係於日何以知其然哉夫朔望前後月行差疾故晦前三日潮勢長朔後三日潮勢大望亦如之非謂遠於日也月弦之際其行差遲故潮之去來亦合沓不盡非謂近於日也夫春夏晝潮常大秋冬夜潮常大盖春為陽中秋為隂中歲之有春秋猶月之有朔望也故潮之極漲常在春秋之中潮之極大常在朔望之後此又天地之常數也余氏此論又謂信而有徵矣然近時史氏伯濬則又譏其失曰所謂月之所臨水往從之則亦盧氏天旋入海日之所至水不可附之見也月所出之處不知去海凡幾萬里曽謂水有可以從月之理乎謂潮與月相應則可謂水往從月潮係於月則不可及其論朔望春秋潮之漲大則又歸之氣數然後知水之從月潮係乎月之説皆未得為通論也何則謂潮朔望則大兩弦則小似矣春陽中秋隂中潮當其時而極漲豈亦係於月乎非不通之論而何雖然史氏之言辯則辯矣然皆泥其迹而不察其理知其非而不信其是予於是慨夫余氏不能起而為之對也且月為隂象水為隂物隂類既同宜必有相感相從之理是故方諸取水於月陽燧取火於日其與月之於海又孰為遠且近哉然取水而水盈取火而火灼者亦以其氣類之相感耳易不云乎同聲相應同氣相求水流濕火就燥雲從龍風從虎曰應曰求曰從曰就言雖殊而理則一由是論之謂之從可也謂之應亦可也又奚必疑於從之與應乎此予謂史氏泥其迹而不察其理也至若春秋之中而潮勢極大者盖二月為卯卯之支辰為兎世謂月中有兎兎之生必望月理或然也五行家又謂癸水生於卯非以陽中之月母旺而子生乎卯為晝時故春分之晝潮必異於他時也八月為酉酉之支元屬金月本金象故其色白而體虧盈又若可從革者理所同也五行家亦謂金能生水非以隂中之月金旺而生水乎酉為夜時故秋分之夜潮必盛於他月也此予謂史氏知其非而不信其是也大抵地之有海猶人身之有脉也海有潮汐猶脉之有息數也潮之生必從乎月猶脉之動必屬於肺肺於五行屬金潮必盛於五行之中脉必表於春秋之候論至於是則潮之從月與夫盛於卯酉之月者天人之理一也名實對童軒或為余言今之為親銘墓者率求當代顯人勒諸石譔文者曰某公也篆盖者曰某卿也書丹者曰某大夫也若此者將以邀重於世吾實愧其所為也予曰何為愧之曰吾愧其名存而實亡也公不能譔則假能者譔之卿不能篆則假能者篆之至於書丹亦然此吾所以有愧於彼也予曰不然古今曰能文者或有他故而不暇以為則轉屬能者以代此載於先儒文集中往往有之不幾於銘墓之似乎或曰彼之代者非其人之不能也不暇為也今之銘墓者沽名以邀重非其人之能也予曰子之言是也而其人之心亦有取爾也彼其所以邀重於世者非以為親之榮乎今之所以名存而實亡者又豈止於是乎姑即其最著者而論之大舉於鄉升於春官而進於天子之廷者所謂薦賢也古之賢才出於鄉舉里選必曰賔興䇿名賢書貢之天府必加拜受今也不然士之試於有司者圍棘以守之褫衣以索之監門廵綽以伺禁之而其嚴閑密固若防冦賊奸宄然者此豈復有薦賢之禮哉然賢者亦階是以出而不計其名存實亡者盖以濟時行道為急也茍以濟時行道為急固將取其大而畧其細也不賢者將由是媒利祿以活妻子不亦名實之俱亡乎彼名存而實亡者人或不為也然名實之俱亡者賢者乃為之吾不知也因而為之對貴荅謝員洪武已已之秋予𨽻兵籍都城艮維之姚坊門廼九月八日與其儕輸作於公晨自龍江之次舁巨木抵門乃歸則寘擔繂牖下治蔬食食畢仍以日之餘力銷彘肪乎缸旋以讀書比夜漏下二十刻許罷極而睡夢一神人赧如其形歘如其聲瞋色盛氣指予謂曰吾寧女讐也耶何今日毒我之力也予矍然問曰子謂誰為毒也其神曰女終日毒我不識也耶我托形汝靣居中嶽下山林間我口神丹朱也汝顧諉以不識非妄甚歟予沈黙良久徐謂之曰子神而尸予口予其怨子是毒乎今子謂予毒予反而不得也敢問毒何若口神曰若欲言若毒也耶汝他日固恒毒我而莫甚今日請為子數之夫啟明在地翰音未呼晨蓐而食飯糲蔬麄略弗下咽子强致吾子之毒我一也出側徒旅傫然就途或驕而歌或悲而吁頥撼莫合息窒罔紆子之毒我二也衆其舉任子肩非勝众呼倡子邪許以譍奄奄綴息叩叩聨聲子之毒我三也弛擔作肆我謂稍間號咷以慟於邑而歎奚體之勞而予之煩子之毒我四也往復三舍繇昕踵昏傴投圭篳浙炊是親復飲食予猶昔所云舍此四毒庶夜而訴若之何比暮而猶予勤也膏膩弗輝目眵弗舒擁䣛據几復書於劬兀兀矻矻伊伊吾吾使吾屬羅於虎賁正輪之徒舉額額焉而搖熇熇焉而歊爍爍焉而焦吾茍非子讐何子毒吾之饒耶吾見托形於他人之面者食前方丈已飲羶薌左絲右竹已龤宮商代言敷奏已宣辭章居則潄乳覲則含香液津流潤輔靨生光此固富貴者為然然至托於貧賤者視我猶愈也彼歌則不哭勞則不讀乞匄盃炙亦饜膏馥獨我不幸而為子所毒也予復之曰子之言予是乎吾愳真有毒於子也言茍止是則子之托形於吾乃大幸也而非有毒也吾語子大幸設子不幸託形於便佞之人截截善諞營營忒忮如簧覆邦危機生厲則人將惡子而目子為利矣設子不幸託形於亂世之人巻智嚢括束辯縢緘下禍之端上謫之監則人將戒子而謂子為箝矣設子又不幸托形於深中之人鬼蜮幻詐率狙與狼譎謀以秘害乃昭發則人將冀子之㓕而併軀之馘矣其或傷於辯而摺羅千悖於詈而拔正輪怙於不順而斧虎賁是皆若辱且不幸者其毒若此而子不聞乎今吾之處子也食必正茹必壽哇不義謝嗟來是自子而入者無違而子可無麄糲之辭矣道法言頌雅詩禁躁妄屏支離是自子而出者咸宜而子可無劬書之譏矣羮味雖不足猶暮鹽而朝虀有言雖不信猶正理而達辭用能守子如瓶而善千里之樞機此數者皆子之大幸顧謂予毒子何是非之背馳歟若夫勞而歌其事哭而宣其悲呼以相其力吁以洩其思是皆人情之常吾不虞子之棲棲也於是口神而心内顧噤不得語慙謝而去予亦遂寤則趣趣五鼓而自公召之者在户矣亟召墨卿錄其所臆秉擔與繂復趨厥役明文海巻一百三十四
