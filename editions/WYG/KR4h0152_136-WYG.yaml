body:
  text: 明文海巻一百三十六餘姚黄宗羲編問答三襍體私諡答問李濓或謂門人弟子之私諡其師禮與嵩渚子曰非禮也郊特牲曰古者生無爵死無諡爵謂大夫以上也故卿大夫有諡士無諡曾子問曰賤不誄貴㓜不誄長禮也是故君之諡則稱天以誄之臣之諡則請君以賜之諸侯相誄猶為非禮况弟子而誄其師乎曰士之有誄何也曰乗丘之戰縣賁父死之魯莊公誄其赴敵之功以為諡盖以義起也檀弓記之以著其失禮故曰士之有誄自此始也曰諡者行之迹也先生長者生有善行其死也乃以無爵而弗得易其名門人弟子之心實有所不能自安者私諡之舉亦禮之變者也何為而不可曰昔者橫渠先生没門人欲諡為明誠中子且云漢魏以來此例甚多乃質於明道先生先生疑之訪於司馬温公公答書深以為不可大意謂漢魏以來事不足法孔子之没也哀公誄之不聞弟子復為之諡也子路欲使門人為臣孔子以為欺天門人厚葬顔淵孔子歎不得視猶子也君子愛人以禮今闗中諸君欲諡子厚而不合古禮非子厚之志也與其以陳文範陶靖節王文中孟貞曜為比其尊之也曷若以孔子為比乎此至當之論百世不可易也曰唐制無爵稱子凡養德丘園聲實明著則諡曰先生何也曰此亦公諡也謂有司表其行而請之於朝既得諡則告諸柩前以白君之賜固非子弟之私諡也然法不應諡雖公亦私所謂漢魏以來事不足法者也亦何足據哉曰劉敞撰續諡法五十字自以為待後世天爵之君子何也曰此原父之臆見也吾嘗覽其所撰五十字皆以古人之名實之其無謂殊甚自宋迄今而世亦莫有用之者抑天爵之君子令聞廣譽自足以垂於後世胡為而私諡之耶是故弟子於師之亡也心喪則可諡則不可忌日答問李濂李子當考妣忌日必杜門謝客不親書史蔬素竟日客有造謁於門者閽人辭焉他日客愠見曰先生何簡客也曰以忌日曰忌日不見客何也李子再拜謝曰某有罪某有罪己而仰天歎曰古禮之不明於天下也久矣檀弓曰忌日不樂祭義曰君子有終身之喪忌日之謂也忌日不用非不祥也言夫日志有所至而不敢盡其私也又曰忌日必哀其於考妣忌日致齋於内不通賔客守先王之禮也亦情之不容己者也粤稽諸古若王修之母以社日亡每歲社日修感念哀甚里閭為之罷社祝欽明以匿親忌日而貶申州元亘以忌日辭攝祭而甘坐罰凡此咸可鑒也夫既見賔客必接談笑而孝子之心忍乎不忍乎顔氏家訓曰忌日不樂正以感慕罔極惻愴無聊故不接外賔不理衆務而艾仲儒侍郎嘗聞其祖母于歸時衣笥中得黲黒衣娣姒皆驚駭詰之曰父母敎以遇翁家忌日著此耳當時衣冠之家猶知此禮惜今未之聞也晦菴先生大儒也每於母夫人忌日著黲黒巾衫門人問其故先生曰子豈不聞君子有終身之喪乎先生凡值先代忌日必蚤起出主於中堂行三獻禮闔門蔬食此士大夫所當法也故曰君子有終制之喪有終身之喪有斯須之喪終制之喪三年是也終身之喪忌日是也斯須之喪弔日是也夫天之道隂陽不同時則當寒而燠者逆道也人之理哀樂不同曰則忌日接見賔客笑談如故者逆理也君子愛人以德君其勿深咎予哉客再拜曰先生敎我矣作忌日答問招魂葬答問李濂嘉靖丁酉冬十一月十日汴馬生北赴南省試渡河走氷壞其舟溺而死求其尸逾月不可得其家擬招魂葬焉乃質於李子曰招魂葬有諸李子曰史傳有之禮家之所不取也吾聞葬也者藏也所以藏其形於地下以安厝也故椁周於棺棺周於身非身無棺非棺無椁也茍無其身而招魂葬焉則於義為窒於德為悖於禮為不物何也亡者不可以假存無者不可以偽有也是故禮經無招魂葬之文漢魏以還或有冒為之者而袁瓌荀組干寳孔衍之徒咸著論以非之可謂通神明之故知鬼神之情者矣且人之死也歸神於天歸形於地故延陵季子曰骨肉復歸於土命也若魂氣則無不之也故聖人制為殯葬之禮本以掩厥形骸不以安魂為事既葬之日迎神而返於家盖孝子之心不忍一日離也詩曰祖考來格知自外至也又曰神保聿歸歸其幽𡨕也故墓以瘞骨廟以棲神此古今之通禮也乃若失形於彼穿壙於此誌石明器無柩可依若堂若坊虚文是尚反乎人情戾乎聖典王者所宜禁也嗟乎閉靈爽於沉魂之域是不仁也樹松楸於空棺之冢是不知也仁知亡而人之道熄矣豈孝子事親之心哉由是知招魂而葬乃委巷之陋習非先王之遺制也豈可乎哉曰招魂之萹見諸楚辭何也曰非是之謂也古者人死則使人以其上服升屋而號曰臯某復遂以其衣三招之乃下以覆尸盖猶冀其復生也而荆楚之俗或以是施之生人故宋玉憫其師屈原無罪放逐恐其魂散而不復還乃托帝命假巫語以招之欲以復其精神延其年夀而盡哀以致禱耳豈謂招魂而葬之耶曰橋山之冡葬其衣冠何也曰好事者為之也按大戴禮孔子論黃帝生而人得其利百年死而人畏其神百年亡而人用其敎百年史稱黃帝在位百年夀百十有一歲豈有騎龍上天之事乎世傳𦵏衣冠於橋山者謬也曰然則當如之何曰闔門眷屬宜於遭溺之地備迎神之禮括髪徒跣號呼於塗而迎之以歸祠廟以妥之木主以依之祝辭以告之牲醴爼豆以饗之哭泣躃踊以哀之三年而除其服歲時舉祀如常儀則庶乎其可也毁舟對皇甫方束教公子問於通方先生曰聖王制器尚象舟楫興焉呉郡巨麗巨艦接艫識治者惡夫崇奢之病禮也議將毁舟示以甲令先生曰不然先王有因民之政而民宜之舟楫之利博矣用之聚族逆女以洽嘉禮用之送死弔喪以崇厚徳用之祖逺餞近以暢離緒用之登山臨水以宣幽思胡蠧於政而欲毁之哉且疊樓島峙不僣於瓊構之翬飛也錦颿霞舉不夸於雕墻之衣繡也軒冕之照水不多於緹帷之竟道也終宴之所費不浮於一饗之玉饌也芳辰之綴賞不曠於窮年之㳺手也采蓮之靚女不荒於倚市之明艶也中流之簫鼓不闐於閭巷之絃管也何舍彼而亟此盖事有緩急物有大小治有先後政有因革今瑶臺無恙而餘皇被災狐鼠當道而鷁首䝉戮里猾怙勢而榜人受禍嚚訟繁興而櫂歌輟響殆非所以召和氣弭怨聲也吳之侈靡鼎貴比肩操贏繼踵乆矣成周風在四方先王不强而同蜉蝣之刺不能齊之以儉沮洳之譏不能挽之以奢使蘭舟桂楫不泛於朝夕之池危冠袨服不覩於長洲之苑襍賄奇貨不鬻於吳趨之肆陳粟紅腐不儲於海陵之倉巨商良賈不通於閶闔之金而上錯之賦可不登於天府之國庶一切盡廢之乎今夫舟之習於水猶車馬之習於陸也為之飾以珠玉錯以金貝被以繢罽藉以簟笰鏤以鈎膺文以輪轅約以鞗革和以鳴鸞非不麗也乃猶屏騎於周行而脱駕於魯道也未見其可也宰民者浸以湛恩潤以鴻澤惟患康衢無鼓腹之夫南畝乏媚我之婦顧戒其樂胥坐而愁鬱止其笑歌起而呻吟曷故焉昔季子入晉見今室惡而故室美新墻庳而舊墻髙歎曰民力竭矣吳舟雖麗亦故室舊墻也民實不堪漸自庳惡耳若昔管仲沐枝而塗無愆期之役晏嬰棄車而民罷擊轂之戲致治有本導民有機故曰民可感而興也二子之謂矣哲侯良吏勅躬閉心端軌務實達權挈要在宥去甚斯民將有率履從敎改行安節而嚮化者焉毁舟何為哉答西北墾田水利問鄒徳溥頃者或建議西北多空棄地誠度地宜導水溉灌其區計可墾田無慮鉅萬萬衆論或然或否而未得堅决也客儼然造予而問曰子試籌興之孰與無興便予應之曰兹役之不易就固矣必排首議而曰無庸有事於民則誰不能者然語有之不一勞者不久逸不暫費者不永寧兹役之巨利有五雖費且勞未可以已也請借前箸為客具籌之西北故稱沃壤乃今一望萑葦若石田無所用之豈土膏顧與古殊哉水利不興而民無所蓄洩也水利興而旱潦有備可使萑葦之塲盡為庾廩其利一國家都燕北迺獨仰東南為命緩急或不可恃水利興而西北皆奥區譬之富室所謂負郭常稔田也其利二東南之漕輓率數石而致一石是西北一石之入當東南數石因是可漸省漕輓以紓東南其利三敵故利於騎不利於歩舉邊地而盡溝洫之令敵騎不得長驅是閭井之界皆金湯也其利四塞上之卒土著者少遠募則餉費不貲班戍則奔命疲勾補則多逋亡閭閻徒困而伍虛自若田墾而又萃兵且取諸土著而足可漸罷一切以便民其利五昔史起導漳於鄴封鄭國溉鹵於涇渠白公借灌於谷口馬援設利於洮濵古之興水利者皆西北也奈何獨於今而曰不可就哉且夫地曠水夷疏引易徧東南之地不與也淋雨在夏耜趾靡煩東南之時不與也遼海青徐有海之饒無潮之患東南之勢不與也彼之可耕而曰此之難就愚竊以為計過也客曰水利之益則吾既得聞命矣顧謂其功可必就則吾猶惑焉墾田之用夫至夥也計户而役之則民怨作捐金而募之少直則民不應募多直則内帑匱勸民自為之則民或應或不應此不可以歲月見功也使者安所持而報命使者急於報命而督民役則吾懼民之騷也將舉内帑數十萬金而捐之壑往者膠莱之役可鑒已予曰唯唯否否自古興大利者不急近功今必特遣使者計歲月而督之吾不敢必其不若子之虞也然吾以為可不煩專官而集也盖昔者鼂錯之議實邊獨令民得入粟拜爵除罪粟立集而邊富何也爵者民之所甚欲也罪者民之所甚畏也懸其所甚欲與其所甚畏者驅之故民自就也今獨可遣使者按行郡邑計其水可濬田可墾者彚奏而籍諸部因為下令曰有能墾田百畝者爵何能墾田千畝者爵何墾者以報郡邑長中丞覈奏而爵之略如今輸粟拜官者而為之差夫輸粟拜官者動計數十年近乃十餘年今以田成税而官之利速官者必争赴此矣則又為下令曰除大辟不贖外其他罪當戍者墾田若干免當徒者墾田若干免墾者以報郡邑長中丞覈奏而赦之民得以其力與財贖罪又必争赴矣則又為下令曰邊將能以其卒墾田千畝者賞若何墾萬畝者賞若何督撫覈奏而給之賞賞與陣功等赴敵之與闢田安危異究也今且不憚捐其軀於鋒鏑以争賞而謂不競於闢田吾不信矣若是行之數年水利宜可興半廼復以其半之入而募民畢治其有不易就者免其與捐積帑而行怨于民功相萬也客曰此於水利計則可耳顧民得以墾田拜爵則開納寡得以除罪則輕犯法將得以此受陣賞則不競戰子將謂何予復應之曰國家得田以為永利積十年而田之入固與金相當矣此何啻倍得金也大辟則既不之赦矣彼當戍與徒者則墾田之勞費斯亦足懲矣若必曰重創之民乃不犯則如今之戍且月廩焉又安在其重創乎食足而兵寓此所謂不戰之勝也夫使將之以不戰勝也固愈於戰勝又况乎臨敵之賞罰固在也於是客逌然笑曰善哉若子之言有百世之利而無一朝之患計無便於此矣逡廵再拜而退股對沈堇甲子之冬十月既望縁崖子患股疾舉足踧蹜弗良於行呻吟二旬罔克出户愀然視股責之曰子禀氣於靈鈞受形於大塊乾生坤成氤氲化醇得父母之大造同一體以相分期肖形於天地為宇宙之完人廼進弗能振足青雲之上逍遙廣寒之廷履歴崇階升華陟要股栗人世子之負我其罪一也退弗能咸股執隨籧篨磬折健歩風馳趨蹌榮貴之門奔走炎勢之途逡廵退縮委蛇自如子之負我其罪二也夙遭嚚兇骨肉傷殘辱我公庭屈體髙貴之傍跪伏庸䜿之側奔走昕夕進退維谷其行趦趄子之負我其罪三也兹者沈疴月餘肌腐肉爛神形彫瘁足躩傴僂疾痛罔伸南忩偃仰髙卧呻吟余何負於子待余之酷烈耶股忽應聲曰嗟嗟君何見之黯也吾聞達士明屈伸之幾哲人達進退之義尺蠖屈以求伸龍蛇蟄以存身塞馬非妖支離獲倖兹常物之大經𤣥造之至妙也吾與君一體而分巻舒伸蹜舉足相親受形乾坤無貴無賤無富無貧其形一也君之弗能奮騰雲霄徂陟華要非我也命也弗能趨蹌公門躡足權貴非我也志也屈辱公庭折膝庸吏非我也運也是故樂天知命者為至人養髙尚志者為達士識時貞運者為通儒君子修此三者故全也古人觧體世紛達觀時變嵇康箕踞而含輝無趾蹲足而闇美孫子傷刖而强齊顔子墮體而希聖范睢折骼而伯秦司馬臏脚而登相之數子者明乎榮辱之分知乎吉㓙之幾植乎功業之本明乎常變之宜晳乎順逆之理故能建偉績於當時茂聲稱於後世士之窮達不在形體間也詩曰采葑采菲無以下體醫三折肱術髙天下君子體受歸全庸是道也子何罪於我哉子何罪於我哉方將與君髙蹈遐軌遨游乎棲霞之嶺登眺乎紫雲之巔濯足清泉持竿釣舫歌滄浪而坐石流憩間曠追往哲之逸駕遊生人之坦途察隂虛忘得喪敦仁安土和其天倪豈以艮限裂夤厲薰心哉緣崖子幡然而作怡然而康曰諾敬聞命矣甫浹旬而疾瘥明文海巻一百三十六
