body:
  text: 明文海巻一百四十三餘姚黄宗羲編諸體文三越車方孝孺越無車有㳺者得車于晉楚之郊輻朽而輪敗輗折而轅毁無所可用然以其鄉之未甞有也舟載以歸而誇諸人觀者聞其誇而信之以為車固若是效而為之者相屬他日晉楚之人見而笑其拙越人以為紿已不顧及冦兵侵其境越卒敝車禦之車壞大敗終不知其車也學者之患亦然聖人之道離之為禮樂政教法度文章合之而為性命之原仁義之統其事業在詩書其功用在天下粹而精大而正確乎其無不具也不幸而敗於私欲折於異端昧於衆人之不知窒於學者之多岐於是世各以資之所近為道愿者以小慈為仁剛者以嚴刻為義能言者溺于言而不求于所不言嗜名者以詭僻立事而未甞要之於至理人人自謂得聖人之全而聖人之大全卒為天下裂譬之摧輈斷轂之車置而不用猶或可以欺世茍執之以任當世之重其不僨人之事幾希故人不知學足以害其身而不能禍天下學不知道而多才能其為害也大矣是以學以知道為貴知道以識其大全為貴存之于心體之于身見之于事而著于言一以聖賢為師少有未至自視凛然若耳目手足之不完也恒以為憂則為善學矣挾其易成之技而不求道之大全者皆敝車類也仙居陳憲直與其同姓之友子頴奉其縣大夫之命謁予山中將率儔輩從子以為學予固求聖人之全而不得者自度不堪師人且今學校之所學者將以為道乎將以為進取之計乎抑將以任當世之重而推所得以及人乎如止以期進取則無用吾言矣茍志乎行道以及人舍聖賢將誰師哉而奚取於吾徒也夫所慕者聖賢也所法以自期者亦聖賢也則其行事幾於道也必矣舍聖賢不之師而僕僕焉求吾徒之愚者而師之吾懼憲直子頴之為善學者笑也雖然觀其細可以知其大於吾徒也猶不之遺而况聖賢之道乎然則憲直子頴之取善也周矣其所慕者殆非進取而已也不惟進取利禄之慕而以道為歸余雖魯且病固將以憲直子頴為友於其别而去也欲無説得乎玉枕山詩話張汝弼成化壬寅九月既望石齋先生白沙陳獻章公甫應詔起而之京道過南安而太守東海居士華亭張汝弼甫欲用曹參禮蓋公故事欵留於周程吟風弄月臺上數月以受教石齋不可曰當不俟駕矣今方度嶺又值積雨裝弗亟辦容與數日耳東海不能强石齋有詩曰玉枕山前逢使君西風吹破玉臺巾巾乃石齋自製類華陽巾直方而無襞積者東海籧籧齗齗論議或有戾於其道而云破此中耶遂以一絶激之曰白沙村裏玉臺巾不耐風吹易染塵莫笑烏紗隨俗態宋廷章甫是何人石齋復以玉枕山詩曰一枕横秋碧玉新金鰲閣上見嶙峋使君得此原無用賣與江門打睡人跋曰東海居士詠玉臺巾侮我太甚口占玉枕山詩答之東海和答曰炎瘴多收一雨新獨看天柱聳嶙峋横秋玉枕真無用自是乾坤不睡人天柱峯亦安南之照山也故自依天柱以玉枕與石齋順其意耳而又作二絶云客囊羞澁客衣單却買南安玉枕山縱有枕頭那得睡雞聲催入紫宸班寄語江門打睡人而今天地正芳春覺來莫管閒花鳥須掃崑崙頂上塵又繼之一絶云青茸鋪榻玉枕横白雲為被天作帡東海先生睡不着日月當天正大明跋曰觀此則東海石齋大家不得睡而司馬公拍掌笑殺陳圖南吕䝉正亦起來打更而錢鏐仔甘心奔走左右也鏐下多一仔字因江西風俗而加也五代史可稽未幾適武選郎餘干蘇文簡由廣東使還具道石齋之師康齋吳與弼之端嚴剛峭勇於進道亦千載人物東海方悟極論康齋立心造道處世化俗之詳東海漫賦詩曰耳根何處得浮塵浪説康齋識未真風月周臺燈火夜伊川路上見斯人葢不惟深喜得聞前輩名徳有益持循且以謝玉臺巾詩之過玉枕山不必買當長揖白送矣文簡當為折中云斥仙祝允明余答問仙者恒不盡其辭因激直以待扣大歸欲得有無宜為不一言以蔽之矣有而不可為也揚子曰聖人不師仙厥術異也聖人非不能不為也子曰朝聞道夕死可矣釋氏曰寂滅為樂形滅性不滅也老子曰死而不亡者夀皆無以不死為善由羲炎至于孔顔為聖賢在孔氏書者無一人脩仙如其言黄帝冲舉不知果否史故言帝崩冡且在非謂决必無即言仙帝道已盡身為聖人乃仙亦何害至所稱廣成之流其為人賢不肖不在書史吾安得知之由孔子後為者悉不聞其素高識士或言仙若嵇阮郭璞輩知不免世禍託云爾後多放之不誠為其它君臣士庶人誠為之悉愚不肖也雖有良士且為之是智中之愚賢中之不肖也道二君子小人仙所為何有於天典民理益於身家國天下何一心為君子之心何一事為君子之事是故天下誠不肖之事二燒金者大盜也罪溢于蹠仙者賊也謂盜賊者非獨人世盜賊天地之盜賊也又其事萬敗而一就就者雖千萬嵗猶莽􅋵懿温裕劉廣楊雖帝王而盜賊也即所謂鍾吕等在坐雲表笑九土亦糞土而已矣糞土且益世其敗者即卓泚禄山暨黄巢等愚中復愚不肖更不肖窮惡極禍乞為獸蟲不可得萬悔不及夫何惑之有婚範侯一元易曰正其本萬事理揚湯止沸不如絶薪諒哉是言余生長於斯觀國之故男女之際何其誖也大都重女而論財有女者往往懸高價于人人趨之或捐恒産興諍辭絶行葦之恩而不顧子晳子南之事嵗嵗有之及女笄則主人廼始病矣於是乎傾家以奉其女良其袂庀其具費數十百于男男前有委禽之厚因心計其生息視之固然不徳也而女據所有則以驕男或先富後貧納其厚幣而嗇其裝則違言生而夫婦之道始苦矣且禮親迎以重女今重女者親迎非幸也女至則坐車門外為之揖已廼設帷帳坐女上坐而下為之拜余五六嵗時習見之今稍衰矣拜交而女左揖尚如故也此不知其所由來矣夫浙固古東甌于越勾吳之地也不及被周公之禮而漸于蠻俗然哉其有果敢而殘賊者女生往往不舉婦人已免身視之女也即水之若漬草菅然恬弗恠也今人有雞犬溺則惜之而溺其女曽不少惜千金之家所舉女及二三以為多矣夫以其重女若彼求之奉之其厚若此而不免殺之不得與雞狗為等此有由然故諺有之曰盜不過五女之門以其空人之財此哀痛之言也故女有不舉則女愈少女愈少則求愈艱幣愈厚則奉之亦益厚奉女愈益厚則愈不舉女因襲以然其無足異間者良有司患之誨諭紛若牖其天性憲殺子之令使相收司以為懲復三女之家不事以為勸然皆當身則行事已復然莫可奈何至乃禁其器服聽人簒取行一切之法而猶弗能禁也余每感朱簋之紛奢思示儉于豆肩劇山林之厚藏懷矯枉於引囊慨然喟曰夫以女為市無異賣僮烏孫之嫁不劇於此矣質人之女責其貨賄縁本規息負販之行不汙於此矣庸奴其夫傲其尊章則反胥相稽之俗不惡于是矣賊虐天性擠之溝壑則豺狼之戾不是酷矣執柯伐柯其則不逺出爾反爾即彼我何利焉甚矣哉俗之溺也余不敢以告人爰著令令子若孫焉令曰葢黄帝始知男女之禮而大備於成周禮經述焉昏事女盛服衣𤣥而衻纁其首飾髲也無金玉文繡之飾媵以女姪女弟而無僮奴男以𤣥纁幣皮為禮五兩為過非必盈也辭無不腆不主腆也及期陳鼎設饌而已用是知女氏先期張陳並後世流失之禮不足以汙周公今由奢入儉難于上天獨可隨俗為制同其流因移其源而塞之耳自今吾家娶女用一鴈二幣務如古制其當有臣妾者男為買之以先婚三月教之女氏欲飾女以金玉文繡者男具之以先笄三日遺女氏陳鼎設饌而無張陳親迎不能至其家則迎之塗女至門不可下車則無揖也吾家嫁女受人亦無過一雁二幣女服無過𤣥衣若髲亦以先婚三月先笄三日受其有臣妾金玉文繡之遺者亡者勿責也自餘俗禮非古制費一金以上者並不得行議婚之初其以吾之話言對賓賓許幸也不許則勿諸幸許而不以吾範至勿受俾雅俗參用男女一軌欲令不及禮者可相假貸而無患女之心其有贏餘欲厚其女者自以他日饋問不為制嗟乎吾後世女子其庶乎無横罹墊溺者哉夫婚禮辭命必曰有先人之禮吾子若孫而吾言之違者曰不孝其令來婦生無見饋沒無奠也尚敬聽之哉侯子既為婚範乆之不出曰吾方遣女已而侯子遣女則猶今之俗也客曰何居侯子曰吾始者未獲以是語賓吾不得輒變焉葢自懲其初之弗豫云乂曰吾聞賢者不避嫌夫有女而譏厚嫁嫌也吾非賢能無避乎哉廼今吾之子人之女吾可以告之矣吾可以行吾之志矣疑詩王諷甞讀詩未甞不疑詩者樂之章也夫子自衛反魯正樂雅頌各得其所洋洋乎盈耳者凡皆取其聲音之中和可比於樂有闗于倫理可以養人之情性而使之思無邪焉者也淫亂之詩乃或間見于三百篇之中者豈夫子删定之全詩哉既又見晦翁之註有曰言善以感發人之善心言惡以懲創人之逸志有曰興起其好善惡惡之心有曰觀風俗之盛衰騐政治之得失則又未甞不重其疑以為人心易私而難公道心難明而易昧示之以善詩猶未能朝夕咀嚼時有所感發而况以淫亂之詩而使之誦之是猶以衆楚而傅一齊也寜不滋人之逸志哉而望其有所懲創而能改也吾見亦希矣况詩既為樂之章則所以典樂以教胄子也當皆取其有闗於倫理有比於律吕者凟化亂倫之詩果可以比之樂章乎若曰觀盛衰驗得失此則當時以聲音之道與政通太史采詩以觀民風者然也若以為傳法無窮而將以養萬世喜怒哀樂未發之良心者當不必其美惡之具載也其殆出於秦人煨燼之餘民間傳誦記憶不皆三百篇之善者漢儒於是因掇其善者惡者妄以已見補足三百篇之數而晦翁遂縁襲其美惡具存之義以成其承訛踵誤之説乎然而不敢自信也偶見先輩論説所見亦同因識其疑如此或曰春秋備善惡昭勸懲也詩獨不可乎曰春秋紀實之書也詩聖人比樂章養性情之書也紀事不可以不備比樂章養性情不可以不善或曰桑間濮上則既可樂矣昔有以簒弑不忠之詩示太子者則既可訓矣曰樂則樂矣夫子正樂雅頌得所闗雎之亂洋洋盈耳者果為亡國之音乎夫子告顔淵欲放鄭聲恐其亂樂也此顧收之以入樂章乎教胄子以養性情也示之以簒弑之詩使之知所懲戒則亦欲人主觀尚書唐書之意也乃若比之律吕使之朝夕諷詠耳聞而心受不自覺其氣質之漸入于中和者豈無綱常倫理之詩可以為訓而必以淫亂之詩乎况簒弑之詩見之者知惡淫亂之詩聞之者𨗳淫要又不可以例論也黜諛劉鳯爰有鼔頰佞夫翩妍小子學未究於通方才未成乎一藝競熖澆浮豈類宛丘之蕩狎㳺朝夕妄希稷下之談嘯不逞之羣肆胷臆之見私為標置横相詆訶非子真之懷古詎識人倫異郭象之懸河何能賞鍳加以不窺作者之門尚逺藩籬之下㒺讀邯鄲之碑焉識顯陵之字輒欲較彼短長議其工拙亂紫渝朱凌黄妬白瑕纇流其口吻貝錦成于舌端或褒述過情寓抑揚于言外或銓流失次託諷刺于辭間或藉彼文雄因其品目勢成挾主意在慿陵誇飾無當方從泉注抉摘同異亦已蝟興致亮㧞盛才翻為塵㸃冲懐雅士徒遭毁敗斯元伯不甘于見夢許子因之而舉聲者也復有聆緒言于座隅接清風於俄頃多其耳學謬稱暗解未弛負擔敢為宏論瑣兹賈䜿特賜猖狂望餘暉而借光並順風而托勢亦情馳意惑目蕩心摇歆艶名華慕戀聲哲㤀其駑下顛倒其間雖不足貽玷缺于青蠅亦可為笑資於談苑也溺于風之相煽遂使呱呱黄口已濫觴於流俗番番小子厥匍匐而爭趨襁褓之内皆為童烏巫史之兒悉稱幼達視前人為蹊逕每空空而自喜附和之徒仰其鼻息待之舉火復為之欺父兄而取憐瞽庸愚而騰價訛而益訛醉而復醉悲夫大吳以三讓始其風獨道隆其化言㳺誕其英華延陵表其亷退沉鑠斯盡陵遲逮今謂之何哉覆波方被而介人之􅋵獨申嘖議繁興而在握之珍彌曜龍劑寡而奪衆薫貞行微而掩𤣥素詠嘆之作焉能翳彼幽音知樂之倫方復揚斯孤奏千載之魂尚申悲于王弼一時之論寜有恨于劉歆故知懷絶俗之見者不旁采於衆謀守獨是之説者不遍諮于道路必若飛響迅發逸調間起排黄雲而儷曲度幽蘭以齊潔荆人見之而屢驚鄭客望焉而却走矣教通贈劉師禹之勛西熊過蜀有劉子學者也將如勛西喟然謂熊子曰教之難也吾受牒於十日而九不獲吾心矜其不能乎子甞試語吾來熊子為誦教通之言曰人之劑量也不可執乗于時束於教也溝中之斷木也婺者榮之無取裁也工師邪許而舉之鐻之銷之附以青黄離離然天下之利器也是乗時之參决也鈌曽丹􅈨𤣥砥之生澒也澒之生金也各以其數或幾千嵗而一化若是其滋乆也方人合以羣材正以匡國節以符貞屯以子申䝉以庚戌六十卦各以日為主不期年而金成物之速化是其稽凖也天以節而六氣生焉地以制而五運行焉其相為勝而奸于攴闌藏者血氣滯而神不麗矣疾醫眡其死生參商其動變鑱石毒熨搦腦揲荒𤓰幕浣腸蹶然起而復人也否之可傾此其大校彰明者也察其時而材之奉過者厚矣審其化發機在心闇明柔强資之可以有道矣通其可以傾制之故得其環樞而應之無方矣雖然吾思之兢兢然不釋于中亦君子之心何也將其始也吾有雄成之心其求之也飄乎其浮氣也而昧其難乎甞試語子青鳥氏之記有胎教其生也梧栁桑棗以為弧雞狗牛羊豕以為牲中四方以為射示之事也命之曰養正之教今輸將日㙤袺襭以須箕倨抱餔委地去之如遺土也拊背而祝之曰勿哇呱呱逐毋啐詈以趣又奚暇徐教之為以古為軌今有乎無也其壯也五物之地辨以土㑹五物者民之常也而以施教焉命之曰厚生之教今或流徙無託老而帶索奉腹以餓氣餒膚鑠鷙鴛者攻剽誦詩者探其含珠以自活與乎其喜也果乎充其體也肆乎其流而不知止也以古為軌今有乎無也今其為教也風旁行而偷渝又將趣之上茍以身文下提空名以饗之青衿逢掖委蛇于塗指而詡然曰吾能教以為教若此而已嘻其欺也毋亦謂人之盡亡其知哉古者葢世刑措而家可封今有乎無也故今之教國無檢焉而係乎師師乎師乎端本以先之明禮義以導之或推之或招之刑就心和而無為尅核而無為詬厲主誼而謀利毋凟于經以亂天常是教之則先師之所營也知命之所糾合而仲尼所不倦也此所謂救其末流化原之不可蘄得而思其次也勛之志曰錫義之蘅日不自持風之發也其相遭也挺然而已矣其靈之所融與其精之所結其昌于物也孑孑然特異而况散于人者乎子之勛也期年而觀子之化非墨篇郝敬予杜門十有八年庚申辛酉之嵗逢適子適妻之䘮客有叩門而弔予者予謝不納客問曰䘮而不弔禮乎予曰䘮而弔禮也弔而主人不受不可謂非禮也有説乎曰有夫世有今古而人情異禮有報施而往來異事有吉凶而哀樂異審斯三者然後行禮禮云知死者哀知生者弔死而不弔者三畏壓溺而已古之人三月無君則弔况予有齊期之慘子儼然辱臨是禮也而于予心有戚戚焉葢昔者吾有先子之䘮而人莫予弔也先子登賢科二十載孔多兄弟一官落拓五十考終豈其畏壓溺也者而獨一先生素車白馬而來豈無他人惟是牛馬走傫然三孱不滿一隅而誰予問距今四十年往矣少不如人老何能為先于人不遑恤况吾妻孥敢徼非望之榮望而不獲滋辱不如寢也予所以卜諸人情而不敢受者也吾聞之禮尚往來來而不往非禮也已不往而責人來人之愛禮誰不如我我離羣而索居乆矣嵗時伏臘三黨之不虞素乏殷勤今也不幸至于大故而望人之憐我不可得已前乎此者施而不先後乎此者受而不報不施不報何以明禮予所以酌之往來而不敢受者也夫禮由人心生心有哀樂則禮有吉凶故曰吉凶異道不得相干飲食餽養所以為吉也衰麻哭泣所以為凶也有哭泣之事者人為凶人服為凶服家為凶門夫斯徒跣隕越于苫塊之間水漿不入口以成為凶也今世俗横曰主人凶賓則吉也不可以其凶凶人之吉於是投杖而擁篲解麻而割牲掃殯宫而陳饋釋飦粥而調羮男女老少盡室奔走舍哭泣之哀而徴逐酒食篚𤣥黄摐金鼓樂我嘉賓曰不醉無歸則是主人借親䘮夤縁納交而賓朋因送死期㑹醵飲輿臺未饜醉飽生端如竇嬰灌夫所以得罪於田蚡者求榮反辱事之難測有固然者矣是以符偉明妻死無殯人助之不受曰唯妻子可以行吾志故始吾妻子之䘮請典客予曰已之從衆吾力不能縱吾力能吾心不欲也吾心欲而禮不可也禮如可也雖不能不欲焉得今世俗不畏禮而但畏人言人之言曰我愛其財而託于非禮也夫惟非禮故託吾寜避託而甘於非禮乎寜不為非禮而甘於託也此予所以辨於吉凶之數而尤不敢受者也客曰然則古之人何為而弔人之䘮乎曰古之君子視人䘮由已䘮聞人哭已亦哭見人擗踊已亦擗踊惟其憂人之憂是以弔人之䘮今之君子人哭而已熈人擗踊而已􅁔舞是以登哭泣之堂而稱觴過倚廬之門而大嚼笑棘人之欒欒樂凶事之總總嗟夫既燕且喜奚取哀死既醉既飽胡為號咷為市為利為誰隕淚問多問寡其弔也假此古之弔所以為弔而今之弔所以為不弔也客曰子亦不弔人乎何言之過也曰吾自有先子之戚而終身不敢弔人矣無已則一問不淑即退甞三仕為令矣凡民有䘮亦一問不淑即退賓不及席主人亦不設賓席主不侑幣賓亦不受主人幣惟是則主不慁賓賓亦不慁主寜戚以致哀而行簡以從儉斯貴為弔也今之為賓者有弔生之名而無哀死之心今之為主者有好客之名而無居䘮之禮寒門下户鬻産稱貸以充盤飱内不稱其家外求稱其客内既苦於死䘮外又苦于惡賓譬之拯焚益薪浚井投石非有深怨何至于此客于是忿然作色曰子之道墨道也予曰否自吾有妻子之喪朝哭吾妻而夕哭吾子附身附棺於何不盡而吾墨也乎哉墨無服而吾無服也乎哉墨桐棺而吾桐棺也乎哉惟是臨䘮不哀吾何以觀子嫁言于墨則是薄者為厚厚者為薄子不學孔而謂吾學墨異乎吾所聞孔子食於有䘮者之側未甞飽於是日哭則不􅁔季武子之䘮曽㸃倚户而歌人雖不才死矣又何歌若曽㸃孔子之所謂狂也吾懼夫人之倚户而歌也是以請辭客遂去意雖不懌而竟無以復予因述以諗同志明吾非墨明文海巻一百四十三
