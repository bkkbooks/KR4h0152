body:
  text: 明文海巻一百四十九餘姚黄宗羲編書三經學與蘇平仲先生方孝孺去年得叔度書已知執事念太史潛溪公之徳欲為論次遺事以傳私心喜慰繼以感泣旋聞從者校文關中不知歸期何時而某卧病山中無由遇括蒼路使欲致一書逹所欲言至今未果自古聖賢君子道徳言行信于天下者如孔子孟子身沒而言在者若無待于人之傳然由門人弗圖其傳也後世史官無所憑信往往勦取異聞怪説以實其事或不知其姓字夀年之真讀其書者至今以為恨其次若揚雄王通俱號一世大儒咸有所論著以發其藴蓄亦若不待人言而後信矣然雄以作美新媚莽受訾于世或者謂非雄所著殆後人依傚而為之通書稱隋唐大臣皆其弟子識者謂多誤妄疑非出於通之手若是者使其門人有所述以紀是非之實寧有紛紛異論哉惟其當時以為吾師之徳行文章自足以傳而有輕視天下之意故天下之人得持此遺失而議之嗚呼天地之大日月之明無所資於人而其行度徐疾盈虚之數猶必俟人紀之而後定彼以聖賢君子為無待於人之言不亦大過矣乎吾太史公逺宗孔孟以為學髙視雄通而有餘其著書其制行其事君行道固已暴於四方而信於當時傳於邊逺之國而誦於縉紳當世雖未有發明之者亦無害其不朽也决矣第其末年遭罹飛語一子一孫死于禍而家遷身放卒于異鄉倘不得有道而能言者白其本心告之萬世瞹昧之謗人將憾之非特忠賢受抑於無窮且俾聖朝有知人未明之損豈細故哉宜乎執事有意于圖之也千載之間士之蒙誣受誑者何限逺則司馬子長以言語被刑蔡邕以慨歎受戮近則程叔子有貪黷之謗洓水公遭姦黨之名其他擠於險詖之人汚於朋黨之論生不得訴寃于朝殁不返葬于里者不可勝計然其心跡卒光明于後世者頼有明士端人斷以天下之公是非而不惑于流俗一時之私意大者辨其誣於史䇿小者表阡銘墓以示將来是以士有就死而不恨挫抑而愈光以有人彂揚於後也今執事居與公同鄉學與公同道於公有師友之義而公之自朝退於家也属望於執事者甚厚且執事嘗官太史而以論譔之作為己任於公之事而不有述焉何以解後人之疑正流俗之失而慰公之神靈於地下哉雖然公之心不期人之白已也忠義自信而且嘗為人言事君猶事父與事天也父不可欺天不可怨順受之而已矣每論古人遇貶竄而怨誹及為文過於憤激者深已薄之以為不逹君臣之義其素所存者如此及夫臨大故遭大禍視子孫之死夷然不少見顏面竄逐之至若返其鄉次於江壖端坐而逝此其心豈以世之榮辱介意哉其信乎已者可以質之幽明而無怍考諸聖賢而不愧其於人之謗且譽若推之以為髙也抑之以為卑也安之而已矣身受其患尚無怨尤而於事行之白不白也復何較焉然而某之有求於執事而欲圖公之傳者非為公計也為誦公之文尊公之徳而欲盡知其平生之計也是則斯文烏可已哉自公之亡天下無師後生小子自以為髙而議公者多矣然徐而視之如蚊蚋之羣忽已消而公固自若竊亦見其不量力而徒為爾嘵嘵也人之賢不肖固有定論文章之髙下亦然近時作者漸以稀闊在東南惟執事及徐教授耳徐公之文簡質典重有渾然之氣然推贍暢急言極論而不竭者實惟執事某往與太史公論斯事過辱特見許與而前輩三數公復從而推奬之然七八年来痛自摧斥向時之可闕盡矣人持所業殊與相見時異惟以體乎身見乎事有補乎聖賢而傳之萬世此鄙陋之志而亦太史公夙昔期望之意也執事可無以教我乎士氣日卑學術日趨於汙下某病廢無聊無足負荷斯事矣惟執事善自謀以大宣正學上報國家下慰相知者之望心所欲言者無踰於此而當今可告以此言者惟執事耳故卒一言之與王脩徳書方孝孺與足下别後三遇期功之喪入夏來得㿃下疾近又患痔悲憂呻吟忽忽無聊于旦夕之間是以聞吾許君卒雖已久而未獲走望殯幃宣一哀于亡友以致逰處相好之情江窑人至承恵書及詩情辭深切悼斯人之不幸歎斯世之不獲有斯人而恐其冺滅無傳足下於親愛之義厚矣然許君之淳明脩潔㣲足下其誰不傷之僕始見許君以為尚可多得及行天下見四方士大夫或乗氣舞智以為通或茍冒無恥以為能或逞其纖毫之技以夸世自足求一二於千百而不可致然後知許君為難得也士不知道盖乆世所推仰者惟在乎文章文者道所不能無而非所以為道也僕深厭之深病之每抵許君未嘗不有以彂我意其可以共論此事以進乎聖賢之庭户而天遽奪之不知天者竟若何夀考富貴常不惜施諸鄙人庸夫而恒與豪傑之士競此果何理哉得非衆人取於造物者少故其生成也易所受大者取於造物過多故天有所不能支而自拔絶摧踣之耶然天下之生不可勝計而古之傳世者未必皆夀考富貴之人也是則安知世之所貴者非後人之所賤今之夀者非後人之所謂夭乎焉知賤於今日者不貴於後夭於當時者不夀於萬世乎以今觀今未足知之以今視古則知之矣且古之傳者足下以為皆自致乎盖有因人而益章者李觀歐陽詹之文韓子亟稱之詹文未能脱俳諧之習觀頗振激欲立論亦不雅馴非名世者比也而今人凡讀書者莫不知尊二子豈不以韓子故耶蘇子瞻竒秦少游近借得其集雖有可喜而殊淺迫無深厚之趣使之獨立無知己者未必若今之赫赫大著也匪特文辭為然雖有道之士亦有然者士之不可無友也如此今許君之可敬而畏者人未必識之所識者乃其詩耳而亦未必識其真也况固有不知其能詩者乎知與否於許君無損益有士焉如許君而不傳當世君子之恥也僕竊望於足下而足下顧以是勉僕夫何期待之過乎僕十五六時即妄志乎斯道以聖賢行業為可效而至今十餘年矣湛没流俗之中上不能出才知建太平之䇿康斯民於無窮續周統於既絶次不能抉幽探㣲明天人性命之奥以詔來世下之不能合一鄉一邑使閭里稱愿人秉介抱拙動與世乖内自思忖茫然無尺寸之長足下不有以教我而猥譽其美不以許君勵僕而俾僕昭揚許君之行何敢當也雖然有意於傳世者多不之傳而有益於世者不求其傳而人自傳之足下姑脩所學孜孜不懈僕亦願竭其愚孜孜不懈使足下之道光被於人則僕且將依附末耀以昭於後何患許君之不傳乎禮記且少留僕嘗惜其混雜無叙又多淆偽欲為定次之多病未果舊文稿想徧覽之有謬誤處幸以語及僕有所知當不敢隠亦交相為益之道也承寄示古賦及雜詩數篇賦寓意深逺得楚人音節詩亦蕭然有出塵之韻諷詠累日喜不自勝某向以安居飽食無毫髪及物之益妄不自度欲蒐輯邑里遺事成一小書上以昭揚賢士君子之潛徳下以為勸于將來俾後生小子有所慕而為善盖舉古閭師黨正之職爾非敢妄竊褒貶之柄而冀其傳也夫古人之傳世者豈偶然哉其事足傳矣其辭不能發之則不可傳其辭與事稱矣作者之道徳言行不足取信於世則雖傳而人不之信今縱使有卓然宏偉可喜之績付之無聞之人著以不文之辭亦恐其卒歸于冺墜而况耆舊淪喪之餘聞其名者不知其事言其事者莫考其實而欲取信于無窮焉可冀乎是以嘗為吾兄言其故而久未成書者此也忠節孝友篤行之人既各為之傳其他文學貴顯者欲析而二之則其跡雖有隠顯之殊而其志行學術初不相逺以仕者為宦逹既非所以尊之俱目之曰儒林則亦有以政事稱者今不敢僣為區别通謂之先逹列傳但以時世分先後而不以仕否為重輕竊意如是庶乎不失其序而無抑揚去取之嫌若夫治邑之大夫其有恵政及民如陳長官胡汲仲亦不可使其遺事日就亡失今為立良吏篇以處之凡名姓稱于吏民之口者皆得附見焉然宋數百年歴賢令丞多矣世絶無所傳聞往時紀土風者俱棄而不録今亦無所徴而為之立傳使其人皆若洪忠宣者由是而興處顯位立名績于天下固不待此而傳若不幸官僅止此疲其心思智力蘄一聞于來世而又不可得豈非可恨哉前所問數公不知曽得其事狀否第宋末為文者矯陳腐之過喜以新竒亂事實如君家太常固未免此近訪得太常及鄭龍圖墓銘至於官位亦以他名易之讀之殊不曉其所居為何職所行為何事惟視之太息而已文之為文豈以此等新奇為好哉真不識其何説也夫文辭於學者至為淺事以道言之正不必求其新奇惟發人所未嘗言之理則可謂之新非衆人思慮之所及則可謂之奇如孔子之大傳有聖人以來未之有也子思之中庸孟子之七篇有諸子以來未之有也周子之太極通書張程之西銘易傳以至朱子之所論著有經説以來未之有也以其古所未有謂之新奇或可也然聖賢豈務為新奇哉其道明其徳盛其言不得不髙且美耳故夫外道徳以為文辭者皆聖賢之所棄者也近時自悼少時狂謬所好所業者不過記誦文辭而記誦不能博文辭不能工則又僅得其最陋者以是空言寖多絶無自得之味思一屏絶之而以顏曽所以自治者治其心為日稍久覺向時過闕愈衆茍不早悟其非幾老死甕盎中與蚊蚋俱盡而不知天地日月之為大深可懼也吾兄前書有學無端緒之歎甚見進學之篤近世之淺陋者正坐易足而自髙耳未能執筆已斥顏栁不知晉人書法未能遣辭已呼蘇子瞻為阿軾欲毁棄其文於孔孟之書未嘗詳讀旬日已指程朱説經之誤紛然辯駁不自愧恥此其人豈復知有天地日月也哉吾輩當深以之為戒求古人崇大之域而趨焉可也所欲言者無窮不為吾兄發之則無可發矣然不能詳畧道一二林嘉猷在此靜篤可喜不欲其専意為文辭嘗痛與之言凡在此者皆知所向方但未知終竟如何耳近鮑民瞻来其為人有意於學俾且讀四書以端其本知聖賢所言之要自當知其本末也鄉里質美者不為少但不喜學故無由與之言使得數十輩錯布一邑豈非美事耶有雜詩數首書遺嘉猷風味出所寄茅栗下如蹲鴟黄獨不足適口然或有無味之味也乆不執筆不復成字聊發一笑答鄭仲辨方孝孺去年王仲縉至蜀承手帖喻以近讀佛書自遣心切疑之以為特戲言耳及朝京師於一初處見所往還書援佛氏之說甚詳向慕於彼者甚至然後知足下之果入於佛也夫儒者之道内有父子君臣親親長長之懿外有詩書禮樂制度文章之美大而以之治天下小而以之治一家秩然而有其法沛然其無待於外近之於復性正心廣之於格物窮理以至於推道之原而至於命循物之則以逹諸天其事要而不煩其説實而不誣君子由之則至于聖賢衆人學之則至于君子未有舍此他求而可以有得者也足下學乎此也久矣曷為一旦棄素所習而溺于佛氏之云也茍以佛氏人倫之懿為可慕則彼于君臣父子夫婦長㓜之節舉無焉未見其為足慕也茍以其書之所載為可喜則彼之説必不過於吾堯舜禹湯文武周公孔子之格言大訓未見其為可喜也茍欲以之治心繕性則必不若吾聖人之道之全茍欲以之治家與國則彼本自棄於人倫世故之表未見其為可用也故世之好佛者吾舉不知其心之所存使棄儒從佛果能成佛猶不免於惑妄畔教之罪况學之者固逐逐焉以生昏昏焉以死未嘗有一人知其所謂道者耶以足下之明智篤厚不于吾道有得焉而顧彼之趨不亦異乎足下習其説者果出於誠心乎抑亦姑以為世俗好之吾亦從而好之以取庸衆之喜悦乎由後則自欺不可也由前則事其説必當從其教必去夫婦父子兄弟之倫必削髪被緇必水飲草食而後可不能如是則是口其書而身違之外好其説而心不誠亦不可也夫不習佛氏之説於道固無所不足習其説而不誠自欺非惟得罪于吾之道而反且得罪于佛亦何所取而為之也近世從佛氏者甚衆未有得福者有一人焉嘗識之初頗好儒既而著書佐佛氏斥儒已卒死於禍計其人慕佛氏冀福利福不可冀而禍及其躬是未易曉也得非不誠抑且自欺故不蒙祐而獲罪於天耶福禍之報儒者所不論特閔其欲徼福而反致禍亦可為不守正而妄求者之戒耳計足下之卓於識而深於道豈真若世俗徼福之徒之為哉盖世之儒者當年壯氣鋭之時馳騖于聲利用智惟恐不工操術惟恐不奇及五六十之年顚頓於憂患顧來日之漸短悼往事之可悔於是覽佛氏空寂之音而有當於心遂委身而從事焉以為極明逹而最可樂者莫佛氏之書若也雖昔之賢豪以氣雄天下以文冠百世如蘇子瞻諸公亦不免乎此後人習俗以為宜然且謂以前人之智識才氣猶以佛氏為可慕而歸之矧不及萬萬者而可不從乎然以道觀之凡有慕於彼者皆無得於此也足於梁肉者無慕乎糠糜安於厦屋者無慕乎苫闔使有得於聖人之奥其樂有不可既者窮通得喪死生之變臨其前視之如旦夜之常而何動心之有奚必從事於佛而後可以外形骸輕物累哉舎可致者而不求援不可必得而求之既以自欺又畔乎吾道惑莫甚乎斯也昔與足下論斯道時僕年方二十三固已知吾道之有餘而無待於外物時不知者多竊笑之及今十有五年愈覺聖人之訓為不我欺而舉天下之道術果無以易之也毎見流於異端者輙與之辯非好辯也閔夫人之陷溺而欲拯之于安平之塗誠不自知其過慮也以故為佛氏者多不相悦方期與足下共進斯事以衛聖人之教豈意足下有慕於彼乎今有人言行路之人墜於井雖閔之未必徬徨奔走而思救之也聞至親且賢之人墜於井則不暇食息狂呼叫號而思出之矣親愛之故也與足下相與之舊而徳器宏深交友中不可多遇烏能已於言而不告乎僕今年三十七足下當六十矣相違十餘年相隔萬餘里之逺使足下所慕得其正僕將有以佐而翼之而何敢逆盛意而取不讓之責乎盖必有所甚不得已者亮足下之賢必能察之而未至於深怒遽絶也數百年禮義之門而足下於今為老成人在乎慎重學術以表厲後生非特僕之望斯世之望也僕守一官無分寸補世教近髪有白者面已皺筋力漸減飲酒不敢如昔者惟自覺有過毎應事已時時悔之恃此頗謂尚可進未知天之處之者何如耳如有所得聞幸速以見教是亦為報之道也與鄭叔度方孝孺承吾子意厚過稱僕之文有足觀者慚愧彌日不能自解非謬逆盛意以辱知己顧私情有異于此者鬱而不發無以答吾子一笑故敢略説其一二僕聞古之人未嘗以文為學也唐虞夏商逺不可徴然觀于詩書數十篇中紀四代之功徳固若耳聞而目見至周制作大備孔子稱其文特言其禮樂憲章之盛耳故雅頌之所陳誥命之所述易禮之所論著崒然而崇淵然而深炳然而章明肆然而易直端大斯謂之文矣而豈有意而為之哉譬如登泰山之巔極乎目之所至而水則江海淮泗山則鳬嶧龜䝉周秦齊魯滕薛梁鄭衛趙韓魏人民之繁鮮土地之廣狹皆得之於心故言之而不誣問之無不知澤中之夫升尋丈之丘而望焉所見不過東阡北陌雞犬牛羊蹤跡輒逞智以談於人終不暢達而順適何者所見髙下之不同也故人有知道與否而文何以異此自漢以來天下莫不學為文若司馬相如揚雄亦其特者而無識為已甚夫屈原之離騷憂世憤戚呼天目鬼神自列之辭其語長短舒縱抑揚闔闢辯説詭異雜錯而成章皆出乎至性忠厚介潔得風人之義然務以衷情達志非拘拘執筆凝思而為之也至於其徒寖失師意流于淫靡而相如與雄復慕而效之窮幽極逺搜輯艱深之字積累以成句其意不過數十言而衍為浮漫瑰怪之辭多至于數千言以示其博至求其合乎道者欲片言而不可得其至與澤中之夫何異哉自斯以後學者轉相襲倣不特辭賦為然而於文皆然迨夫晉宋以後萎弱淺陋不復可誦矣人皆以為六朝之過而安知實相如之徒首其禍哉向非唐韓愈氏洗濯刮磨而力去之文殆未易言也僕少讀韓氏文而髙其辭然頗恨其未能純於聖人之道雖排斥佛老過於時人而措心立行或多戾乎矩度不能造顏孟氏之域為賢者指笑目為文人心竊少之從總角輙自誓懲以為雖不易至孔子之堂奥而顏孟之事皆在所願學者茍循其路而望其廬烏有不至哉復以欲知古人之道必識古人文字故時習章句凡有所感觸亦間發之其意在明斯道非為文也而吾子猥譽其文為可觀此僕之所深懼而不敢居者也雖然吾子見其可而稱之乃愛僕之至而樂其有所成名豈有過哉顧失者僕耳僕奉先人之遺體二十有二年學雖未至而知其味者亦已數年矣而身不能由之口不能以告乃徒假紙筆為事宜乎吾子之以文稱我也僕今而後其知過乎夫人不生則止生而不能使君如唐虞致身如伊周宣天地之精正生民之紀次之不能淑一世之風俗掲斯道於無極而竊取於文字問受訾被垢加以文士之號不亦羞聖賢負七尺之軀哉僕齒年尚富又受君子之誨自謂不至此不止而儕侣之中無誰與語吾子明逹敏慧乃肯降屈為僕友此真僕所願而未獲者也夫道有可言者而不言則何以見愚陋之心冀盡所懐不覺近於誇大惟諒之勿怪答王仲縉方孝孺十一月十一日某端肅奉書仲縉翰撰尊契家兄長侍史兪兄子嚴至得書及所作文啓封伸紙立捧細誦意厚而誠義純而達不自知手之不釋而心之暢懌也世人之於文誰不為之至於求其可誦者何其鮮哉盖不得其塗故也士之患多厭常而喜怪背正而嗜奇用志既偏卒之學為奇怪終不可成而為險澁艱陋之歸矣且學奇怪者以其美也而奇怪亦非古人之所尚也文之古者莫過於唐虞三代而書之二典三謨禹貢𦙍征以及商周訓誓諸篇皆當時記事陳說之文未嘗奇怪詩三百篇亦未嘗奇怪春秋書當時之事雖寓褒貶之法於一言片簡之中亦未嘗見其奇怪禮經多周漢賢人君子所論次其言平易明切亦未有所謂奇怪至於盤庚大誥其言有不可曉者乃當時方俗之語亦非故為是艱險之文也然則嗜奇好怪者果何所本哉茍謂於司馬遷班固則遷固之書有質直無華如家人女子所言者唐之文奇者莫如韓愈而其文皆句妥字適初不難曉宋之以文名者曰歐陽氏曰蘇氏曰曾氏曰王氏此四人之文尤三百年之傑然者而未嘗以奇怪為髙則夫文之不在乎奇怪也久矣惟其理明辭達而止耳而世顧他之焉者猶之迷人醉客不問塗于大道肆意徑趨是以卒不免入乎荆棘之場鼯狖之居而終弗獲就乎大道也今足下之所為非特得其塗而已而又有始終焉有理趣焉茍益脩於不弛浚其源而導其波將見汨汨然來而不止繼乎待制君之聲烈可望矣昔在朝廷為文者非不多而人獨推太史公與待制君盖文之法有體裁有章程本乎理行乎意而導乎氣氣以貫之意以命之理以主之章程以覈之體裁以正之體裁欲其完不完則端大而末㣲始龍卒蚓而不足以為文矣章程欲其嚴不嚴則前甲而後乙左鑿而右枘而不足以為文矣氣欲其昌不昌則破碎斷裂而不成章意欲其貫不貫則乖離錯糅而繁以亂理欲其無疵有疵則氣沮詞慙雖工而於世無所禆此五者太史公與待制君能由其法而不蹈其弊而務乎奇怪者皆反之此世之公言所以推諸此而不居乎彼也斯文者造化之至理寓焉人患不能造其極耳茍造其極决不可冺滅有志者在乎自力而已僕所志尚有大乎此者省事者少不欲與人言雖應時作文又恐人以文人相謂亦久不喜談感足下愛我之深念我之篤聊以此復命子嚴亦甚可喜頃時相與議論有益也又答王仲縉方孝孺僕資質不明敏聞道日淺行已之篤不逮古人是以年益加而智愈昏名益有聞而心益為之欿然日汨汨與世伍語黙俯仰能自異於流俗者幾希毎念昔之聖賢道徳言行之懿未嘗不内咎而深自慚也足下在友朋中最為相知且相與最久不思有以正其闕失納之於寡過之地顧以書譽其所未至而强其所未能豈僕之所望哉夫古之著書者非好為辭而然也非慕乎名而然也盖以已之所有無由淑乎人天之舉以與我者懼其至我而絶也故從而筆之於書而公之於天下如子思孟子周元公之流其智誠足以知乎道其才誠足以周乎用其發之於言誠足以啓昧幽而垂矩則且不戾其所為也是以學者傳而信之如龜䇿恃而賴之如稻粱尊而仰之如日月茍為名而已爾夸其辭而已爾如揚子雲王仲淹之所述而已爾於道無明也於事無補也揆之於其躬又不能無憾也則亦奚以為哉僕上之未能學子思孟子之萬一至于揚王之所為心又不敢以為可也居則黙黙以思兢兢以行勉勉焉期不畔乎道而冀其有成使吾學果能成其身乎則雖不著書其所傳者自在使學焉而無以自立於天下縱琢刻其辭其將孰信之僕之不易於言者鄙陋之志殆有在足下未宜以韓退之之事責我也夫退之之重著書有不自滿假之美焉未可深過其過在未聞道而言行未能無可議耳於道有得焉至和充乎中至順達乎外其聲音中乎律其周旋中乎禮其取舍好惡是非進退中乎義即之者邪慝消望之者鄙吝祛聞其風者相率而化於善彌千載而如尚存若斯人者何待著書而後有益於人哉故顏子黙然處陋巷而聖人與之為羣賢首其後若漢之黄憲言論之存者無片簡焉當時莫不自以為弗及至於讀其傳者猶怳然想見其為人與憲生相先後之士有為昌言者矣有為政論者矣有為論衡者矣如足下來教中所稱著書三數公其有益於後世者或有之而其人之賢否視憲何如哉僕少不自量亦喜有所著年長以來窺見聖賢之垣牆内顧彌覺不足非惟不喜為亦有所不暇為矣毎見好名者不度智之不任徳之不類而亟為言言往往畔於道輙為之汗下果使聖人之道世無知者必待吾言而後明猶當審其醇疵而後出之况斯道自近世大儒剖析刮磨具已明白所患者信而行之者寡耳今世有賢者作當以躬行為先一反澆陋之習以表正海内庶幾有所益豈宜復増以浮辭而長其虛薄邪足下謂僕所接見者少不能副遐陬僻壤之望因欲著書以化之夫以化當世為職者賢士仁人事也僕也烏敢當且賢者能化從已者不能化違已者仁人能使善者勸不能使惡者變故孔子至仁也而化不行於陽虎武叔孟子大賢也而臧倉賤之王驩怨之淳于髠輕之彼一聖一賢且有所不及而况纖㣲昧弱者顧舉一世而盡化之以口之不給而欲假書以傳僕雖騃其為計不宜若是疏也且萬世之所共尊而師其言者惟孔孟為然今閭巷庸人讀孔孟之書猶不知其可用或以為戲笑之資僕縱著書其能加於孔孟乎孔孟不可加其能庶幾孔孟乎道徳如孔孟不能必世俗之信而僕乃欲著其荒言以化世俗不待智者而識其難足下不冝以之相勉也然足下之心豈有他哉乃愛僕之深處我之厚而不知非其任耳雖然僕非無志於道者學道而未至者也學未至則悔吝不能無過眚不能免必賴朋友以相成吾今而後所望以成已者舎足下而誰哉幸求所闕時以告我則足下所云化今傳後者其將有在矣願少緩之無以著書為勸復鄭好義書二首方孝孺恵書以先府君學行不傳為僕責吾兄辭業不脩為僕罪始而恐既而惑已而思之斯二事也固有任其過者而非菲陋無狀所敢任也夫古之君子於親之存既竭其志力以為養迨其殁思其姓名徳烈不昭於天下於是脩身飭行務自樹立以顯揚之善稱於時功及於人使人推其所本而歸徳於其親曰夫人之所立其父之教也而其親之名以傳若孔子孟子於古昔聖賢遺佚賛述之者衆矣而未嘗一言及其親夫孔孟豈不愛其親哉知夫已之所立者大親之徳不待言而顯也已可以言之而且不言况肯以人之言為重乎若夫以人言而傳者自漢魏以來銘墓者始然其初也作於門生故吏故其事為可信其後門生故吏不敢自作則請於世之聞人其文茍傳則其事亦因以不忘僕於先公不幸弗獲同時執几杖在門生之列學業固陋又不能與世之聞人者齒而古君子之所務以為親名者吾兄之所知也今不以自責而責之僕無乃非其任也乎且僕求於吾兄者古人之學也古人之條教俱存其事始於通萬物之理而終於盡性知命始於正身及家而終於仁民育物由少至老而不以為逺由中人至聖賢而不以為誣有未至焉自訟於心有未講焉資益於友未嘗敢乖本末之叙而施怨於人也今吾兄所圖以顯親者不以道而曰以辭所引以為未至而歸罪於僕者亦不以道而曰以辭如果以美其辭而已則亦奚取於學而僕焉敢承是罪哉雖然僕交於吾兄幾何年而吾兄之期於我者辭也取益於我者辭也則僕之為罪可知矣嗟乎僕少之時妄自許與謂聖賢之道為可速成學不得其術企而望之茫然無所歸行乎衆人之途恤恤乎其自悲先人之殁天下未有所聞毎一念之若不欲生於世是心也其與吾兄有異乎夫内不足光昭其先人而謂其言可以取重於後世人皆知其不能也吾兄何辱命焉雖然繼自今不敢不勉吾兄其益懋乎古人之學相與講其非是而惟道之趨則僕之獲罪於吾兄者尚可贖於他日而吾二人先徳之傳其必有在矣幸安之無遽復鄭好義第二方孝孺前日相聚雖甚驩而談道講古之餘時雜以嘲謔私心頗不喜以為謔雖古人所不廢然不若無出諸口之為美故嘗僣為吾兄規之臨别時又以相屬盖朋友之義在我者宜然而言之從與否則非所敢與也兹辱恵書陳述夙昔攄發志意惻然引咎詞義懇篤且謂自此當絶不復為覧之驚喜不能自已夫以吾兄之信道嗜學於改過之勇特其細事固不足異而未免於驚者盖習俗益降交友以諛說為忠愛間有及於其身劘切過闕輒頳爾變色以為發已之短或陽受而隂疎之今不特不加以怒而引咎不惟不忍疎棄而又歸徳焉此其越於衆人也逺矣且片言之失未為深過使好辯者處之必援引古人以自解釋不笑之以為不足聽則忽之以為不足改不務自訟而謂同浴譏裸者雖名士大儒不能免此今吾兄獨痛自懲創若負不潔然惟恐刮滌之不亟假而事有大於一言者其有聞人之言而不改者乎僕之所以驚且喜者此也然吾兄之意則美矣而書復謂自歸鄉里所接見者皆俗子庸人故徳不加進此於義為未善孔子曰三人行必有我師焉又曰魯無君子者斯焉取斯聖人之厚鄉黨而不敢誣衆人若是近時士大夫喜髙自大瞋目扺掌有孩撫一世之態皆棄於孔子者也僕甚閔之甚厭之毎自省察恐或蹈其失以為狂愚之歸故與人處未嘗敢萌慢易意雖號為無知者亦與為禮務盡其情盖資性才器之不齊其勢然也所貴乎君子者以能兼容並蓄使才智者有以自見而愚不肖者有以自全故天下無遺棄之怨必待與吾類者而友之則吾亦將為人所斥矣勝已者寧肯容我邪寧海雖小邑著籍之民至三十餘萬才且賢者必衆矣如僕者安足道今以僕故而卑鄉里之人甚非所望於吾兄也夫因人之見信求辭語之過而言之不止其迹若好勝者然能受言如吾兄倘隠黙所疑而不以告則為不知言而失人矣故終一發之惟吾兄察焉正蒙一書乃張子窮源盡變之論間有可疑者先儒已言之學者信其易知者而缺其難通處可也必曰定是非得失置去取於其間則烏乎敢若編集成書者以參同契隂符經置諸太極圖通書之末此則甚非朱子本意耳熱甚喜雨躬書不謹餘留面談與趙伯欽方孝孺僕求友於四方十餘年可友者衆矣於同郡得一人焉曰林右公輔尤僕之所敬者公輔氣髙而才敏於人鮮推讓視人行行然有不滿之色前與僕書獨稱足下陳元采文僕固已知足下非流俗人可及近入臨海見公輔公輔説足下尤詳公輔之友張廷璧不相見者七八年其人奇偉不肯茍伏人至語及足下必稱善因二子而求足下之所造心已傾之久矣今乃承恵書為論甚大為辭甚逹卓乎有曠視前古之意反覆覽繹嘉二子之確於取人喜吾黨之士果有足望發於中而見於外如獲大吕九鼎而載以歸也僕嘗怪近代道術不明士居位則以法律為治為學則以文辭為業聖賢宏經要典擯棄而不講百餘年間風俗汚壊上隳下乖至於顚危而不救者豈無自也哉私誠恨之不自知其不肖亦欲有所發明損益以表著於世而習俗卑下學者梏於舊聞不復知有學術竊竊詡詡茍且自恕或有志而才不足有為或才髙而沉溺不返可與言斯事者惟公輔耳公輔毎與僕言未嘗不歎朋友足望者之少而有意於足下也書之所陳謂近世文辭不能比隆於唐宋而有取於僕僕無能之辭豈能過於近世哉使真有以過乎人則亦藝焉而已而足下安取乎是且近世所以不古若者足下知其故乎非其辭之不工也非其説之不詳也以文辭為業而不知道術雖欲庶乎古不能也知道若行路然至愈逺則見愈多而言自異今欲至乎窮谷者言其所見不過泉石樹木禽鳥虫魚之狀而已比之逰乎雄都巨邑者見宫室之壯麗車馬之蕃庶人民物產之瑰異變怪其言豈不有間哉故聖賢文辭非有大過於今人其所以不可及者造道深而自得者逺恒言卑論亦可為後世法非剽襲以為説者之淺也唐之諸儒惟韓子為近道其他俱不若宋宋之士以言乎文固未必盡過乎唐然其文之所載三代以來未之有漢何足以方之今人多謂宋不及唐唐不若漢此自其文而言耳非所以考道徳之㑹通而揆其實也僕嘗謂求學術於三代之後宋為上漢次之唐為下近代有愧焉斯道之盛衰其端㣲矣非明智睿逹不能知之足下何知之蚤邪雖然足下之論近代信當矣抑僕猶有説焉世俗之患忽見而尊聞已之識既不能决是非醇駁互相承傳以白為黒者皆是也足下言之而僕聴焉則謂足下為知言士矣所與交者或與僕之見異則無乃以足下為方人好髙而為驚世之論乎惟君子之所守不以毁譽而變茍慎所言而力於行以古之聖賢為準而不與近代較崇卑得失則古人且將畏足下近代安足並乎又僕為吾郡喜者寧獨若今而已乎久不談感足下勤厚聊以此奉報適有疾不能躬書明文海巻一百四十九
