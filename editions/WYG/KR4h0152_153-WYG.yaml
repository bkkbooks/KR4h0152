body:
  text: 明文海巻一百五十三餘姚黄宗羲編書七論文與項甌東王慎中僕所遣人還自三山得奉答書甚慰方遣人時正與洪君語度其不及不意及也而公於治行匆匆之際復教詳至如此不但仰感情誼之殷又以竊知有道者所養從容暇豫終身無造次之時與所謂前定而不困者固此事也来教所云孔老異同而為文者不當襍出於老子而當一於孔氏之言其所及孔氏之得失雖未得其精要而欲學者一於此而不出入於彼義則正矣老氏得失今未暇答公書本非為老氏發故亦不必答也惟所以論為文者其義雖正而於識不為達也文之為道固博取而曲陳惟其所以取之者雖博而未嘗不㑹於吾之極故謂之約其陳之雖曲而其義主於正則曲而不為雜南人周任之言每舉於孔子以孔子之聖豈不足以矢口為言而於前人之言時有舉焉所舉雖前人之言而其意則吾之所欲言者矣龍子公明儀之言往往迭見於孟子而陽虎之暴其言亦有可以發者老氏之賢固加周任公明儀龍子而南人之陋陽虎之暴又不論矣惟其有取於老氏而皆出於孔子此所以為學孔子者之為文者也今稱述必在乎經援引必則古先王如書生科舉之文者豈不為正而豈可以為文而亦豈可以謂之知道者哉有甚似而實非有大反而正合非獨文然凡人之事業功行皆若此矣非公之明何以語此義則序已付黄生入梓矣先此呈覽僕於此亦自謂不為茍言者公得無又以其雜出於莊周而病之耶有以見教毋惜便風千萬之望答茅鹿門書唐順之熟觀鹿門之文及鹿門與人論文之書門庭路徑與鄙意殊有契合雖中間小小異同異日當自融釋不待喋喋也至如鹿門所疑於我本是欲工文字之人而不語人以求工文字者此則有説鹿門所見於吾者殆故吾也而未嘗見夫槁形灰心之吾乎吾豈欺鹿門者哉其不語人以求工文字者非謂一切抹摋以文字絶不足為也蓋謂學者先務有源委本末之别耳文莫猶人躬行未得此一段公案姑不敢論只就文章家論之雖其繩墨布置竒正轉摺自有專門師法至於中一段精神命脈骨髓則非洗滌心源獨立物表具今古隻服者不足以與此今有兩人其一人心地超然所謂具千古隻眼人也即使未嘗操紙筆呻吟學為文章但直據胷臆信手寫出如寫家書雖或疎鹵然絶無烟火酸餡習氣便是宇宙間一様絶好文字其一人猶然塵中人也雖其專專學為文章其於所謂繩墨布置則盡是矣然番来覆去不過是這幾句婆子舌頭語索其所謂真精神與千古不可磨滅之見絶無有也則文雖工而不免為下格此文章本色也即如以詩為喻陶彭澤未嘗較聲律雕句文但信手寫出便是宇宙間第一等好詩何則其本色髙也自有詩以来其較聲律雕句文用心最苦而立説最嚴者無如沈約苦却一生精力使人讀其詩祗見其綑縛齷齪滿巻累牘竟不曽道出一兩句好話何則其本色卑也本色卑文不能工也而况非其本色者哉且夫兩漢而下文之不如古者豈其所謂繩墨轉折之精之不盡如哉秦漢以前儒家者有儒家本色至如老莊家有老莊本色縱橫家有縱横本色名家墨家隂陽家皆有本色雖其為術也駁而莫不皆有一段千古不可磨滅之見是以老家必不肯勦儒家之説縱横必不肯借墨家之談各自其本色而鳴之為言其所言者其本色也是以精光注焉而其言遂不泯於世唐宋而下文人莫不語性命談治道滿紙炫然一切自託於儒家然非其涵養蓄聚之素非真有一段千古不可磨滅之見而影響勦説蓋頭竊尾如貧人借富人之衣莊農作大賈之飾極力裝做醜態盡露是以精光枵焉而其言遂不乆湮廢然則秦漢而上雖其老墨名法雜家之説而猶傳今諸子之書是也唐宋而下雖其一切語性命談治道之説而亦不傳歐陽永叔所見唐四庫書目百不存一焉者是也後之文人欲以立言為不朽計者可以知所用心矣然則吾之不語人以求工文字者乃其語人以求工文字者也鹿門其可以信我矣雖然吾槁形而灰心焉乆矣而又敢與知文乎今復縱言至此吾過矣吾過矣此後鹿門更見我之文其謂我之求工於文者耶非求工於文者耶鹿門當自知我矣一笑鹿門東歸後正欲待使節西上時得一面晤傾倒十年衷曲乃乗夜過此不已急乎僕三年積下二十餘篇文字債許諾在前不可負約欲待秋冬間病體稍蘇一切塗抹更不計較工拙只是了債此後便得燒却毛頴碎却端溪兀然作一不識字人矣而鹿門之文方將日進而與古人為徒未艾也異日吾倘得而觀之老耄尚能識其用意處否耶并附一笑又與洪芳洲唐順之近来覺得詩文一事只是直寫胷臆如諺語所謂開口見喉嚨者使後人讀之如真見其面目瑜瑕俱不容掩所謂本色此為上乗文字揚子雲閃縮譎詭欲説不説不説又説此最下者其心術亦畧可見眉山子極有見不知韓子荆國何取焉近来作家如吹畫壺糊糊塗塗不知何調又如村屠割肉一片皮毛斯益下矣試質之兄其有㑹焉否答華補菴唐順之鄙人不敢刻文心事具見於所與王南江書及與令闕安子介言之已詳執事諒我此心乆矣而益泉大尹忽為此迂濶之舉昨有書道心事於益泉如石沈水竟不見答鄙人罪謫之餘也傳曰身隠矣焉用文之罪謫之人自合閉門杜口豈宜以文章自名又豈宜以大書刻木以標榜於世且所謂罪謫之人者其於當世尤最得罪於勢要有力之輩而益泉為之刋刻文字是昭其與罪人比而與勢要有力之輩異其好惡也豈惟非僕之福其為貽累益泉亦甚矣平生本不能為文此心自知而一二相知偶以為可虚聲所集衆謗遂歸誠以文者豪士之所競而名者造物之最忌譬如支離侏儒之人本無拳勇不能格鬭偶爾嬉戯扭首搖目舞腕曳脚而里人不解事者見其盤旋之影從而悦之悦而奬之以為有拳法而道之於人至使當世拳師打手疑其鬬已叢起而譁之不知彼固支離侏儒人耳且彼固自知支離侏儒人也何嘗自謂有拳法其亦何心與人鬭勝負哉奬者逐影疑者附聲世俗可笑大率然也僕之得名與得謗何以異此雖其疇昔知厚之人猶或不免睽目相猜怒僕自度本無可致猜怒於其人者祇以不合􅉫弄筆舌及不合盜虚名之故耳邇来深自悔其少時篆刻之技經年束書閣筆絶口不敢道文字以自附於村野不識字人而後為快如侏儒矯前日嬉戱惹事之過手腕亦不一出袖口自謂庶幾免矣栁子厚云豈可使呶呶者復入吾耳而益泉乃方為之刋刻行世以豎拳法之赤幟而滋拳師打手之疑譁既與僕私心相戾其於益泉亦何益焉僕之私心尤有所不可者平生所與交游書札率如户外二屨密相規告之言今乃大書刻木以翹人之過而彰已之訐直豈惟心所不安其何以靦然與友人相視乎雖友人素多善類不以受盡言為諱然在僕則不可也内量之已外量之人量之人者此書盡之量之已者與南江書及前與益泉書備矣量已量人無一而可因知益泉之必相諒也答蔡可泉唐順之别乆不勝懐念每於士大夫徃来間得聞兄政聲善譽為慰僕自正月冒病今尚在牀也二月三月之間瀕於死者三四已分與世長别今漸有生意然精神則益耗矣蓋外腎癰瘍痛楚不堪之故也来書所示刻文一節正以此事為錫尹卜君所苦極費口舌近忽得遵巖兄書又道及紀山刻文之説方輾轉無可奈何欲託洪方洲百方止之而来使適至是造物者亮我之衷而賜之便也知我莫如兄豈待多言固知此事之必廢罷矣僕不才豈敢以文字市聲名於世者哉山澤迂僻之性每閒靜中得一適意形骸之外則覺此身亦是贅疣而虚名果是羶氣不能早自晦匿使野人姓名尚有聞於世間以為此身之累不及古之織簾箍筩之流使人不得知其姓名者每自笑前生業障之厚也其又敢以文字市聲名於世也哉即使欲以文字市聲名於世亦其文之最工者而後可自古文人雖其立脚淺淺然各自有一段精光不可磨滅開口道得幾句千古説不出的説話是以能與世長乆惟其精神亦盡於言語文字之間而不暇乎其他是以謂之文人僕不能為文而能知文每觀古人之文退而自觀鄙文未嘗不啞然笑也半生簸弄筆舌只是幾句老婆舌頭語不知前人説了幾遍有何新得可以闡理道而禆世教者哉此皆肝膈之論非茍為謙讓以欺兄者愛我如兄如曹君雖欲使吾文不朽吾文其能不朽乎否也兄試觀世間糊牕櫺塞瓶甕塵灰朽腐滿牆壁間何處不是近時人文集有誰閒眼睛與之披閲若此者可謂之不朽否耶本無精光遂爾銷歇理固宜然設使其人早知分量將幾塊木板留却柴燒了豈不省事可笑可笑兄書中有發明性真開示来學之説僕又非其人也且所以發性真而示来學固絶不在言語文字閒行已多缺而强飾之於言語文字此性真所以益鑿而先輩之所以悞後學而眯其目者也僕自三十時讀程氏書有云自古學文鮮有能至於道者心一局於此又安能與天地同其大也則已愕然有省欲自割而未能年近四十覺身心之鹵莽而精力之日短則慨然自悔捐書燒筆於静坐中求之稍稍見古人塗轍可循處庶幾補過桑榆不盡枉過此生居常每自笑不能敝却精力以求文之工然竊幸其文之不工而稍蓄餘力亦尚可以他為也是以語及文字輒茫如隔世事或不得已應酬一二篇亦信意打抹真所謂老頭巾矣以少年欲求工於文而文猶未工况於今日意興若此則宜益淺陋無怪也不識曹君何取乎今曹君已去此事行止皆在兄手相知如兄而復不能信我此心必欲為此業障以増牆壁間之一塵而後為了事則與兄二十年之交便可告絶矣寫録多訛誠如兄言嘗欲稍改差字留一正本藏之於家又自以為本無足闗擊於世訛不訛不論也且捐書燒筆亦已多年既無正本又無新稾誠無可以應兄命者奈何至如遵巖之文則必不可以僕為比遵巖以絶世之資又用力專而且深故其文雄渾雅奥自北宋而後數百年間特然傑出以名其家所謂能不朽者也惟單刻此集足為文章家指南而一洗近世文妖之弊正不必以吾疎庸之文溷之也尊翁老先生表文原有今春之約平生不敢與人不信而况敢不信於吾兄乎但自正月到今圖死不暇是以未能執筆倘病體復得為完人必於今年寄奉也論文書舒芬文章家辱不以芬無似詔以作文法是欲引而升諸莊騷太史韓歐之堂意則盛矣然芬竊有見焉典論失大本莫適主也不足為文章家稱説唐人不知韓子曰愈以六經之文為諸儒倡雖愈何敢望六經之文哉宋儒祖是論紫陽朱公亦云六經治世之文豈不知易之興也當商之末世而風雅多夷王以下詩乎春秋則又逺矣目之以文且不可况槩論以治世乎老兄之論要亦未離此義恐古文當始於逍遙遊諸篇而昌黎則大成矣六經未可以文法摹倣也書禮紀述即事見道風雅咏歌以聲和律曽何句法章法不類之顧耶易始伏羲不知六畫竒耦其句法章法果安在耶春秋仲尼所筆削也簡者一字繁者僅三十五字其句法章法果安在耶故今之論文者動稱六經則亦前人悞之耳愚嘗以六經當以道論不當以文論此也惟是記誦不勤體認不明躬行不誠而求文擅作者之塲未之有也蓋無記誦則古今上下禮樂名物器數無所証據無體認則天命人心之微王道霸術之幾無所適從無躬行則施設注措之畧操縱闔闢之權欲布之筆札之間而信於宇宙環海之内必一出一入而無親切有味之辭也韓子曰本之茂者其實遂膏之沃者其光煜仁義之人其言藹如也吾取以為法是耶非耶非也則大鵬圖南而培風怒飛莊生之説信荒矣芬謂作文而主是三者則遷固不足多也茍不循其性而漫焉曰六經之文六經之文則不獨為邯鄲之步也法言中説為子雲仲淹平生之累矣伏惟終始教之寄後渠顧璘郵使還得手書甚慰乆絶同心之言奚翅如蘭把玩不忍釋公果悔嗜酒攻文之癖則萬年之慶然結習極難除恐見獵復動耳如何如何文序詮古人之文死者自當心服璘精神衰耗祇見此道非用力可盡所謂得之於心應之於手雖陳言然至理實不出此譬之聖人之道動容周旋中禮者安有㸃檢其間必至耳順從心乃神化之域也作者其始病於有意其終病於有迹自曹丕立意為宗一言啓六代雕鏤無窮之禍孟子曰始作俑者其無後乎五經四子姑勿論歴代文人吾所深服者屈原莊生荀况賈誼太史公其人皆直吐胷次無所鑽研粉藻於筆墨谿徑故文詞明直意味深永可續諸經傳視左傳國語猶夷惠也其後韓愈氏獨得其宗當觀其原道諸作為的若進學解諸文必其少作未可論定宋歐王蘇氏父子所見甚確老蘇得矣王傷刻歐蘇傷易乃其天性使然猶師商之過不及不可深病也六朝之非不俟更談若揚雄王通與栁宗元諸君皆見其末未見其本栁氏晚年覺之故栁永之作極可誦惜乎不乆而遽没也詩則風雅之後惟漢十九首及建安得其傳兩晉若阮陸左郭靖節諸公猶有存者可怪宋謝氏一出倡為刻畫鑿死混沌即他日西崑之義山學者靡然從之而末流遂至陳隋之靡麗古風盡滅可為痛哭至唐陳李崛起蘇州繼之真可謂大雅工部及王岑諸公格律雄健當孟氏泰山之巖巖謂非聖人之徒哉髙氏品彚㮣題李杜曰大家而别於正宗未盡是也僕衰矣無力供簿書矣得遂贈典後將請歸去計與足下相對無時因貴鄉馬司諫便輒奉此書望賜教訂以代面談餘惟加愛是願論文書顧璘僕聞達者痛乎卑俗狂士亟稱古人雖傲睨凌厲廢中和之經然曠志峻節固一世之雄也僕度徳程力不逮懦夫豈敢望此事哉然思不弛心語不輟口著之毫楮呈之友朋至再三而不厭冀豪宕之士一進乎此使已攄懐古之幽情釋悼世之積忿耳何必在我耶夫文章士之業也孔子修六經以建百世之則而百世弗能述蓋折衷理道之極經緯天地之章子淵不能得其止游夏不能贊其辭身没響絶亦其然耳下是左氏蜚聲於東周莊生逸響於䝉土靈均哀鳴於漢上太史建議於西京誼舒子卿淵雲褒向揚芳擷藻前後相屬而漢之文章炳然於金馬石渠之署雖純疵相形遐邇異趣要皆作者之殊列也烏可訾之哉僕雖殫力竭智不敢望其下體然仰探六經下逮數子未嘗不拊膺擊節悵然遠懐執事之才百倍於僕其於古人皆可超其躅而拊其背頃者獲讀拘虛集所載才麗學侈誠今聞人也惜其選義沿近習體物乏沈辭比量作者尚出其後豈徇俗之趣未盡納諸古哉獨長書十餘章宛悉情事讀之悢悢填詞數闋軋諸宋人吾愛之重之而不為執事稱者先其大耳夫今之同志寡矣同志如執事才且茂異復爾乖剌誰能黙黙蓋登危者駭步入靜者疑影今之視古豈特危與静已乎吾恐既疑且駭則必反走而下趨矣執事不棄譾陋惠然下問僕亦不揣本末謬進不慚之言蓋友道貴直諒君子之愛人非茍為姑息而已昔劉季緒才不如諸賢而好詆訶文章曹子建論其非吾固謂子建失論也今有南威西施之容畢粧而鑒焉鑒之所不及在側者能誨之豈在側者之容固美於南威西施哉妍媸都鄙其辨一也如有不自美其容者僕能效在側者之勤矣執事毋内罪之與少宰王荆門公書董份頃方具啓付之小孫恭達記室而僕輩從舟北上恐其稍遲故因徐壻遣人復為附此昨兒還道我公欲得鄙人舊稾録成帙而備覽觀焉因盛言公之意甚勤其屬之甚切份豈有敢辭者然向来交遊不知其不肖欲探其槖而出之者多矣而份竟不敢出即兒醇自以其意請者亦數十百矣而份終不敢出斯何物而欲秘之哉其所以然者蓋份少嘗讀古人之書頗能窺作者之意究文章之旨亦嘗畧得蹊徑輒不自量而欲妄追往昔成一家言此其蓄積者大矣顧其才有不逮性復多病大槩每嵗伏枕者踰半心慊慊不自持故不能竭精畢力以副其意而徒因世俗黽勉應酬聊以塞責免咎既而展誦則曩之所得蹊徑者非但不能踐迹而且往往背馳相去天壤矣是以既成之後每當一讀輒復自慚惟以録授其人不復更存其副即成者亦不自愛惜其間散落者多矣嘗以文自秦漢以来必有蹊徑得其蹊徑而既得登堂又能入室者此古之宗工大家卓然傳後世而不朽者也得其蹊徑而未能遂臻其堂室者則或傳或不傳後世或尊稱或否者其次也其有未得蹊徑而才亦足以自騁氣亦足以自凌有不得亦有偶得則雖不能以必如古人必傳後世而亦足以名擅一時者此又其次也而世之人才不足稱氣無可取不過巴人下里耳而惟其不知蹊徑也故不自識其合否不自解其是非而落筆不休靦顔自許凡忝仕籍必梓一編人或憤之至欲借秦火餘威投之者言雖若過而其多已甚則其可厭亦宜也今份畧知蹊徑而才與氣不能副之匪惟堂室即藩籬未越焉故深藏而不敢出亦庶幾古之知恥者耳而公不察其心數加慫慂而徐壻泰時之奉使也公寓意尤勤且切臨别囑之再三且云子他日使還赴公車而見我當即以是為贄矣於是徐數過請之兒復跪而助其請焉以為公在交游則舊知在文章則識者今從數千里外數致勤惓而數謝却之恐非古人所以待知已之誼而取正有識之心也且泰時方鼓篋公門將藉手以見長者倘不得此則何以復為贄之命耶况古之子弟其家大人有一言必謹志之有一善必謹紀録至勒之彞鼎示之子孫而醇不能自喻其誠未遂所請使家大人所著未一布宣則醇之不孝深而死罪莫贖矣且家大人自謂不能竭精畢思而數十年精之所勞思之所搆實亦在此將天之意未肯遂泯斯文而假之有識舊知以回其深執不然之悃未可知也份因其言輒亦感動遂忘其恥而稍繙閲之則數十年間棄置已乆南還舟潤而篋封不啓腐敗頗多蓋平生散落者十之四腐敗者十之三而鼠囓蟲蝕漫漶不可考者尤多焉所存直一二耳而類皆手書諸無副本壻雖遣人繕寫大畧亦十餘冊矣適嘗校之則漫漶者腐敗者必沈吟記憶可漸補續而所遣人亦復自多謬誤更須屢校乃得無訛而份病雖漸瘳元神未復不能遂勞恐當淹至冬初方能再遣馳上也頃者繙閲之始兒見其漫漶駭而欲泣曰今尚若此使踰數載當復何如兹令醇得稍為加裒而獲免於不孝之萬一皆大造之賜也是以與壻喜躍而深感焉欲刺骨矣而不知份雖下慰兒女之私而上貽知已有識之醜傍萃儒林藝苑之譏則份感雖固深而恥實増甚耳病乆精力甚乏不能翦裁遂致蕪蔓且因公通家誼篤故以家人語進焉惶恐惶恐復王沂川書何良俊恭承嘉問為日乆矣第株守海上無縁得一瞻奉以聆清誨繫仰之私何能有忘耶適令甥来緘至教札惠訓諄復奬與過情乃知大雅含𢎞降意末品如此感服感服且得捧讀佳集格製精嚴藻思綿縟誠藝林之鴻搆也冗次未得卒業亟讀三四篇若函牛之鼎嘗其一臠固足以厭小人之腹矣更諭以編選我明文章此豈特為先生不朽之大業實亦昭代華國之永圖甚善甚善但尊諭以篁墩文衡為斥華摘實故欲專以昭明所選為例小子之見則謂言而不華誠不足謂之文茍使華而不實則又何所用之必也體備質文辭兼華實庶乎彬彬可稱而編選之家亦不失為通方之論矣且文章所稱叙述詳雅則史漢為之宗藻思纒綿則齊梁擅其美碑頌當取模於崔蔡序誌必駕格於韓蘇兼是數子融貫通徹而以時出之然後足為藝林之宗工僕徒有慕於昔人終瞠乎其莫前而不得不有望於先生者也文選目已得細閲詩類似專重樂府雖古詩亦僅僅數首近體則全不入選試觀昭明之集樂府特十之二三而游覽行旅雜體居其七八今何太畧如此亦須稍廣之夫詩之體格以時而降即陸士衡顔謝諸作中間率多排比已為近體之濫觴矣今安得獨遺之望嚴校嗇取亦編入數百首庶乎體裁斯備而後代可無遺憾文評一編校練可方談藝録評摭足擬詩品乃近代作者一案斷自媿小子亦得厠名其間夫青蠅飛於堂序竟日營營不踰尋文及其集於良馬之尾不崇朝而自致千里其所附者善也乃小子何幸如之長谷近作如布賦六朝聲偶集序等篇皆可入選幸録之僕近補刻説苑序一篇敬用呈覽伏惟刪潤以備采擇草次布復千萬照察不宣明文海巻一百五十三
