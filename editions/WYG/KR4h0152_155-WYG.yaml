body:
  text: 明文海巻一百五十五餘姚黄宗羲編書九論文遺伯兄元美王世懋世懋以丙子歳六月受四部稿於鄖邸奔走終嵗卒業舟車間未遑窺作者之奥也在昔士龍獻記於平原君子無譏焉竊不自揆略攄所見倘汙我者以為阿好則有斯集在夫角力者力有大小角藝者藝有精疎所以皦然易辨者何在旅勝旅負耳書畫稍涉印證便自難於秇力然有跡可尋具眼自見至乃文章之業寸心千古雕蟲自工刻鶩忘贗匠鑄既自殊途評隲又尠恒論雌雄今古於斯實難若區區之見猶謂匪然政以世無真才才乏通方即以吾兄言之弇州一集足藏數賢即忌才者可謂文章小道不可謂才遜古人由斯而言寧無定價盖謬悠之談至乎人才極矣以是古非今之口値朝賢暮佞之身幸則藏拙於筆端不幸則毁成於吻角所以我明三百年來堂堂大業而必謂聖庭絶從哲廡隔塵逺則董相之賢不信於歆固近則文成之詣尚卑於羅李良可歎也詩道拓基於北地極深於濟南然而採蓄之途尚狹游矯之神未充兼此二家登乎彼岸古惟陳思子美今則吾兄庻幾吾兄境雖神詣然亦學以年劭白雲之什雖經删改未離矜莊逮乎讞獄三輔建節青土字字快心言言破的性靈效矣變化見矣擊節賞勝每恨古人無此快句然謂稍遜古十九首意者亦坐斯媺居憂以後縱心觸象取材愈博演教彌神或鬼篆蛇文㝠搜六合之外或牛溲馬勃近取咫尺之間離觀則邈若無闗湊泊則天然一色大都字險者韻必妥韻竒者聲必調天壤之間若為預設此真藝林之絶技律家之𤣥造也甚或直指故陳纎辭間作雖淮隂用兵多多益善瞿曇拈指頭頭是道然弟臆陳則謂周行所示末流宜慎何者恐比丘無飯鍼之能效羅什而有室也所以鄖襄諸篇特寡游戯簡善謔以示娛𢎞大雅而垂訓意在兹乎騷賦同源長短各擅作者無幾成章斯達即使美不逮於古人長足掩乎末世况文質麗爾彬彬具足者哉樂府一岀必使于鱗匿響明卿竄影宏篇奥句故是苦心極力之言齊梁小調當與六言並觀前無敵手世眼不解服膺青蓮異時分道並馳未可知也文章之妙尤不易言自宋迄明可謂無文而吾兄獨收二李之都長上接西京之宗㫖紀事持論各臻妙境岀沒變幻殊非一途所謂大能使之小小能使之大虚能使之實實能使之虚逺能使之近近能使之逺斷能使之續續能使之斷庖丁解牛輪扁斵輪莊生喻道吾以論文唯諸小論稍質於歐蘓而㣲弱於韓柳尚未當家故毋足傷其大也弟與胡郎元瑞論古今文人互有雌黄至於吾兄無可瑕摘妄謂具美之中稍露巧骨似於古人滔滔莽莽渾厚質直之意少殊然作文至此正亦何須莽直胡郎笑而不答元瑞又為弟言古人文章大家無闗博洽至專門肉譜尚多譌漏而君家中丞於博洽中特擅精覈此在古人尤以為難弟頗賞其能言抑亦可謂篤論矣昔𤣥徳短氣於伯符衛媪揮涕於逸少弟豈敢謂來者之無人終自信真才之難再耳興集神來不知所裁倘獲首肯毋以示人如其未安請俟來諭與蔡白石太守論文書茅坤伏念僕與兄同起湖中前後中明天子甲乙之科當是時僕忘其駑劣而推附於兄兄亦憐其同聲而好為揚於縉紳大夫之間星附於月丘附於壟遂得並聲而馳然嘗誦兄之詩讀兄之文章竊疑官不稱其才位不當其識兄亦顧僕時相笑咤纍欷不已也僕今且操縣印綬於江海之間者十年於此矣漁石入為吏部尚書大鶴為文選郎偶皆故知始得解去縣印綬厠名郎署兄或喜其稍進而亦未必不憐其晚也然竟不能一日安於朝廷之上隨被指疴而去其間事機固遭時難然其所隂搆力擠則實起忌於同輩絓怨於顯㳺彼其創謀不過欲搤人之吭而去其食也而其所相與合為萋菲遂至有耳目心思所不逮者悲乎悲乎僕常讀古蜀道難詞以為風人之㫖喑嗚涕洟故亡實至是今何意驅轂結軫游其間哉雖然僕何尤也僕自罪譴以來以為進不得附當世名公鉅人顯揚功名退亦當如園丘巖壑之吟自勒一家以遺於世即欲亡去匿身五湖烟霧之間以從所好也然或謂今且罪遣不得遽強而之者故姑浮湛混濁洺博中山之間然其當晝而思當寢而夢已逃人世乆矣僕嘗念春秋以來其賢人君子間遭廢斥未嘗不即其窮愁自著文采以表見於後何者恥心有所知與腐草同沒也然技不能兩有所精而學不能兩有所逮何者傳不云乎倕工於為弓而言天下之善射者必曰羿也奚仲工於為車而言天下之善御者必曰造父也盖萬物之情各有其至而人以聰明智慧操且習於其間亦各有所近必専一以致其至而後得以偏有所擅而成其名故世皆隨孔氏以非達巷而僕獨謂孔氏之言者聖學也今人未能學聖人之道而輕議達巷者皆惑也屈宋之於賦李陵蘇武之於五言馬遷劉向之於文章傳記皆各擅其長以絶藝後代然竟不能相兼者非不欲也力不足也故李杜詩聖而韓歐文匠其間不自量力揚躒蹀躞而進者獨魏晉曹劉二陸及唐元白柳宗元之徒稍稍侈心焉然亦疲矣使宗元獨以其文與韓昌黎爭雄當未辨孰劉孰項而曹劉獨縱其詩聲於武陵之間又未必降為黄初之音也故曰人各有能有不能僕才乏思澀於兩者俱無能者也然間嘗從兄學為詩毎見兄言笑岀金石噴吐傾珠璣數年以來大者王孟小者劉韋矣而獨不能睥睨一二其中者不岀兄之唾遺其背而馳者尾瑣猥陋矣獨私扣文章之㫖稍得其堂户扄鑰而入而自罪黜以來恐一旦露零於茂草之中誰為弔其𠂻而憫其知以是益發憤為文辭而上採漢馬遷相如劉向班固及唐韓愈柳宗元宋歐陽修曽鞏蘇氏兄弟與同時附離而起所謂諸家之旨而揣摩之大畧琴瑟柷敔調各不同而其中律一也律者即僕曩所謂萬物之情各有其至者也近代以來學士大夫之操觚為文章無慮十百家其以雲吻霧噏虎囓鷙攫之材揚聲藝林者亦層見踵出然於其所謂萬物之情各有其至者或在置而未及也近獨從荆川唐司諫上下其論稍稍與僕意相合僕少喜為文毎謂當跌宕激射似司馬子長字而比之句而億之茍一字一句不中其纍黍之度即惨惻悲悽也唐以後若薄不足為者獨怪荆川疾呼曰唐之韓猶漢之馬遷宋之歐曾二蘇猶唐之韓子不得􅆀其至而何輕議為也僕聞而疑之疑而不得又蓄之於心而徐求之今且三年矣近廼取百家之文之深者按覆之卧且吟而餐且噎焉然後徐得其所謂萬物之情自各有其至而因悟曩者所謂司馬子長者眉也髪也而唐司諫及僕所自持始兩相印而無復同異今僕不暇博喻姑取司馬子長之大者論之今人讀㳺俠傳即欲輕生讀屈原賈誼傳即欲流涕讀莊周魯仲連傳即欲遺世讀李廣傳即欲力鬭讀石建傳即欲俯躬讀信陵平原君傳即欲好士若此者何哉盖各得其物之情而肆於心故也而固非區區句字之激射者昔人常謂善詩者畫善畫者詩僕謂其於文也亦然今夫天地之間山川之所以寥廓日月之所以升沉神鬼之所以幽𦕈草木之所以蕃翳鼪鼯之所以悲嘯九州之所以聲名文物四裔之所以雕題鑿齒以及聖帝明王忠賢孝子羇臣寡婦䜛夫佞倖幽人處士釋友仙子之異其行禮樂律厯兵革封禪天官卜筮農書稗史之異其術宴歌遊覽行旅蒐狩問釋譏嘲咏物賦情弔古傷今成敗得失之異其感彼皆各有其至而非借耳傭目所可紊亂增葺於其間者學者各得其至合之於大道而迎之於中岀而肆焉則物無逆於其心心無不觧於其物而譬釋氏之説佛法種種色色逾𤣥逾化矣嗚呼盛矣此庖羲氏畫卦以來相傳之秘所謂其㫖逺其辭文其言曲而中固非専一以致其至者不可與言也近與潯陽書亦論文大較與告兄者互暢其㫖而僕亦未敢遽取然諾於兄但操金而求酒不敢不問價於市也并附與潯陽書及所著文數篇幸兄憫而裁教之荷甚荷甚明文海巻一百五十五
