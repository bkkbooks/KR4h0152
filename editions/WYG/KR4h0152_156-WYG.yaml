body:
  text: 明文海巻一百五十六餘姚黄宗羲編書十論文答茅鹿門蔡汝楠楠自結束承兄録為心知之友奉教良多然每一覯遇兄見彌髙客嵗握手前山之麓一夕晤言之間偏匝宇宙結以心期楠益嘆兄厥修之益當不可量是時楠方困於新州又繼之以慘怛痛結之時徒傾嚮慕未暇尋繹别兄之後以輟哭之晨痛自思淮三年恭黙古人非塊然纍囚以忍瘡痛必有不言之思不動之覺於愁抑之中得震警之意偶於一日瞥然若狂哀警兼至雖未能修其所晤聊能晤其所修遂欲千里馳書以告於兄如得醍醐以飲兄弟式好之懐方不自已而聞兄且有左官之命南北蹤迹未有定所遂遏而不發耿耿至今夫以兄竒瑋介特十載令名入而為吏部以世人之拘瑣齷齪傾搆擠䧟岀而判廣平皆世道之所有故聖賢於五福六極茫然不齊之氣無不歸之於天至於立言及太史之文先儒謂借史才以發已藴非天下萬世之公故不必觀其自叙而太史為人之狀已散見於諸傳矣韓文最醇其友人張籍貽之書曰近日甚怪君為駁雜不實之文以累於道程夫子亦云韓子之學華蘇文忠見放之後友人畢仲游貽之書曰近知君以言得罪銘箴序記之文務為炫耀以夸世是亦言語之過也數先生之文所以不免有道之議者各以其不平而鳴遂多太過不安之詞非有徳雍容之象其自謂不受煩瑣而非所以通於論道使數先生而達孟子知言之指則立言亦甚可懼也昔者孔子當道之不行不得已而竊比老彭孟子之言曰詩亡然後春秋作太史公欲以區區之褒貶附於春秋何其不自知哉春秋之㫖本於詩大雅清廟悠揚婉㣲怒者不激喜者不淫使雅頌常存則春秋有魯史在何必作也且平王以前未嘗無史孔子之智豈不及紫陽之為綱目自伯禽以後皆為之筆削哉繼詩而興明其不得已也惟其立言之意岀於不得已故其所是所非不改於詩人之㫖寓直於婉不改於詩人之詞使聞者㣲而知勸懼而不怒此夫子之立言視數先生者何如哉即夫子之不得已而言則夫子窮而可以忘言達而可以行道夫子又宜何如也故立言者夫子之末節而夫子汲汲於􅁱徳為先忠信為業為吾人安身立命之學至於所謂忠信之道大端亦在修省言辭恂恂便便誾誾侃侃修省之用也至於六經删迷修省之準也建大中而不過積和順而不詭立至徳以示天下後世而不以文詞稱斯道之在人至今若掲日月而行者盖猶衆流之必有源萬木之必有本也舜傅說膠鬲困窮拂鬱而動其獨知之心忍其欲流之性心性者弟之所謂才源也名為世忌而益之以偏激無本之文是惡影而奔也故與其即枝流而迷夲源不若反本源而自然不窮也以是大行以是窮居以是巻之至宻以是散之至文焉徃而非至性焉往而非歡愉恬暢之地哉凡兄之文富而不艷竒而有典弟不敢以兄所自知者賛兄乃以弟自知者致規於兄也請兄自今而後不入煩瑣之思不作竒特之想既不必如所諭作意立言又不必如所論夣逃人世但宻求本源安身立命豈不坦易豈待依憑而種種心聲亦無出於此不然激而成文文則美矣而無以考徳則兄不可以不省也兄肯裁示尚有以復不次與王九難郎中丁自申來諭文自秦漢而下韓柳二家最為近古宋歐蘇曾王雖稱大家其格局去古逺矣此評文之斷案也然愚以為文之髙下因人而異不獨於時為然即秦漢之文如戰國䇿逰説之辭亦自與樂毅報燕惠王書魯仲連不肯帝秦之對辭氣迥别仲舒天人三䇿淵懿醇雅視主父偃嚴安徐樂之説又不可同日語矣韓之於柳亦猶是也讀柳之文自梓人傳封建論數篇之外其餘諸製終渉俳體造語類多苦思尚未脱八代氣習而無韓子起衰振古之才歐生於宋雖自為一代之文若論其至者自當與韓頡頏恐柳氏亦不得以唐之家數揜之也蘇曾王三子文各自有優劣其優者可亞於歐盖一代一人之文各自有至者繫於人不繫於時也今世古作獨稱闗西前後二氏兄向所論謂得秦漢竒偉之氣此固無論韓歐也然則仲舒淵懿醇雅之文亦不足法與以愚所見談今之文而效秦漢之作是越産而燕語也夫燕語豈不竒勁有餘音哉而以越人學之則雖酷效窮年有不相似者不若就越語而求中原之正音則雖語之不燕無害也近見吳閩一二名公文集據理敷詞舂容典雅蓋一代之正音在是矣其集具在試與闗西二氏較之其氣格之髙下豈無可言者敢以請於吾兄質正倘鄙見有所未通則願髙明更垂敎焉答呂侍郎沃州莫如忠昨荷瑶函之辱隨有報書當已徹覽兹復荷教言知門下於樂道之餘兼多撰述誠切羡之夫文章正宗之續編僕平生正苦其繁蕪殊謬於西山先生之㫖至於尤竊恨者以西山先生之見之卓而於古人論文本指尚覺隔一谿徑未敢遽質所疑於有識也夫文以載道其言岀自拘學若孔子則曰文以足志又曰辭達而已矣夫文者言之辯而有理緒之謂也易觀乎天文以察時變此理緒之辯乎經緯者也觀乎人文以化成天下此理緒之辯乎徳業者也彼各有當爾如必求文於發揮性命之原潤飾太平之烈而後為合轍不已隘乎故六經載道亦即載事者也諸史載事亦即載道者也百家技藝各載其學術純駁雖不同科而槩以達辭足志云爾則惡可廢也西山先生之見則異是取之必求其理析之必歸於引經必差次仁義必標駁儒墨而後曰文彼文莫近乎秦漢而先生自先秦策士之言各成其章者多擯不載至左國之取又似濫觴而不精皆僕之所未釋也夫文章與時髙下先觀其氣之醇漓定其格之今古而片言合作咸屬品題文斯偹矣若但泥於載道則自六經以來文闕有間而至宋儒訓詁之言岀其語性情心體特詳焉若曰文在兹矣即賈董韓愈氏之作僅以數語合道而倖存其不屏棄者幾何此其説之未暢者也西山先生之意毋亦以為文壊於六朝故所選取正矯昭明文選之弊舉其言之支而麗者盡削之似已然有文選所遺而正宗未盡入有文選之不可盡非者而正宗削之抑又何故至叙事議論之疏别近世有辯之者僕以為非獨叙事議論之過於疏别而以辭命與叙事議論析而三之尤不倫也豈不曰辭命不當例以文士之言故特掲諸其首而不知辭命乃文章之一體與疏奏封事論賛記序等分為體裁則可而與序事議論之凡例等可乎即辭命中亦孰非叙事議論之互見乎盖凡史之記事皆叙事也其記言皆議論也此二者已足該文之義而必參以辭命㡬於贅矣僕自屏跡蒿萊嘗一究心斯藝今皆忘之因尊諭所及不覺中熱於見獵然斯於門下抑末爾僕所欲請益者當不啻是也惟亮而終誨之復周柳塘書莫如忠巖居再辱來教雖從一時諸生答問之言然開示詳明傍引曲証要歸於易簡忠也衰憊無庸未嘗問學得與聞此亦為頓開茅蔀矧諸生之雋者乎第語中有未盡釋然者不敢蓄而不宣以負髙義且執事鋭志聖學方相切劘期以共明斯道以惠來學此其秉心之公虚已之量必不果持獨是之見以標門户為名髙即芻蕘可以自獻也敢疏别其說試商確之一來教述丁學博云昨日王龍溪在此曽云士人且將舉業丢下一二年先去理㑹身心之學却好執事以為此是龍溪因病立方聖人教人只一事初無舉業聖學之殊若使習舉業者能将聖賢言語一一反身體騐則舉業即聖學也其言似已忠竊以為龍溪之言為看舉業太輕而執事之言又看舉業太重遂略相忤不知舉業一節實國朝制義而父兄師友所以訓其子弟者孰能廢之假如鄉舉里選之法雖取以徳行道藝然其自閭胥族師以至升諸司徒詔廢置於太宰其間節目繁多容亦不無去取榮辱之繋如今科舉差次得失之迹也又如秦人以律令教士令以吏為師士生其時茍不為沮溺避世之徒舎是無由仕以行其志者况國家設科取士原責以明經通達世務以施於用豈意其將剽竊辭章獵取青紫以自壞之故晦翁嘗言舉業壞了多少人夫不罪於人而罪於舉業可慨也已今之學者誠能於務舉業時知去明理義淑身心就中領悟聖學之緒則舉業自做學問自明不相悖也又何必棄彼而就此哉至如來諭曰如此則舉業即聖學如彼則聖學即俗學斯言於理良近而辭若有未融何則舉業聖學此不可對舉而言理學是千聖道統真脉舉業只是一事舉業但可對做官治生用兵百工技藝等事説而學問乃總主張之使諸所為事事合於道者雖不相離而實不相雜故舉業得學問以主張之則身雖做舉業事而志未嘗不在聖學便曉得從佔畢行墨之外别求其至者餘可類推矣故言舉業不妨做學問則可若言舉業即學問似少失賔主故程子云學者一月之中即将十日幹舉業餘日即可為學此其甚不得己之言亦可以見舉業聖學之實為兩事矣象山講君子喻於義一章全以舉業相証不過因人易曉者以誘進之非故合兩事為一近來前輩乃有為二業合一論者則贅矣學者自斥異端之外於尊徳性道問學處紛紛尚費辭説而又将舉業混入其辯何時已耶竊意今之設教者且須将舉業聚集來學即其常所講解者先令暢然通曉待其餘力疑問從聰明特異有善根者因文解義引而進之於道以免驟聞之駭而潜移其故習使知尋向一邊庻㡬聖學可明而有得於先儒以舉業教人之㣲意矣如何如何一來諭云仁者之夀不必壽考即聖人至今不死便是此言見得一死生齊夀夭處甚髙陽明先生亦云顔子三十二而卒至今存焉雖不為此章而發亦足以相証矣然僕意尚疑此乃是推廣言外説仁者夀第二義而於孔子説仁夀本指似少差也大凡君子道其常而已矣仁者之夀孔子盖道其常如中庸言舜大徳必夀君奭言天夀平格無逸言三宗夀考皆是實事道其常也至如回之夭蹠之夀乃值其變爾常者理也而變者氣數之適然然雖曰變亦是宇宙間時有者故變亦常也且如天道福善禍淫而單豹以終身行義死於虎其為福耶禍耶此可以通扵夀天之説矣盖聖人所知者壽夭不貳而已而他無庸心宜夀而不夀聖賢所不諱也孔子於回曰不幸短命死矣所謂不幸者非氣數之適然耶而未聞强以死為不死也至尊教謂顔子過一日便頂得别人數十年此言甚快可為世人膠膠擾擾枉過一生者深省至曰今日一時聚㑹精神意氣若不間云云未敢信也執事又引袁府尊云松江風俗太奢似不可長而責我輩以崇朴雅挽浮靡為衆庻倡斯言甚善即亦時政所急也乃鄙意竊謂俗化之原自上移易民愚罔知此不可以空言説而吾黨不腆之望乂安取表正於鄉而敢聞命也古稱循良長吏率先仁儉以臨其民故以令則易從以禁則易止彼賢士大夫第樂賛而奉行者爾矣詩曰視民不恌君子是則是傚夫詩稱君子非即今紳絇之士其所則而效者耶而示民不恌實在公等足下未之思耶且松俗之敝非自昔固然一切往來燕遺之侈靡乃至今而始甚足下覩末而遺其本泥涉世之溷迹而不察其大繆不然之本情亦惑矣鄙見如斯願遂轉而聞之袁公祖倘令深究化原而毅然為移風易俗之政以固松民之元氣吾黨倚杖而觀之矣明文海巻一百五十六
