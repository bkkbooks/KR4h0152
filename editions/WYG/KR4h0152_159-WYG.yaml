body:
  text: 明文海巻一百五十九餘姚黄宗羲編書十三論文答王澹生湯顯祖弟少年無識嘗與友人論文以為漢宋文章各極其趣者非可易而學也學宋文不成不失類鶩學漢文不成不止不成虎也困於敝鄉帥膳郎舍論李獻吉於歴城趙儀郎舎論李于鱗於金壇鄧孺孝館論元美各標其文賦中用事出處及增減漢史唐詩字面處見此道神情聲色已盡於昔人今人更無可雄妙者稱能而已然此其大致未能深論文心之一二而已有傳於司㓂公之座者公微笑曰隨之湯生標塗吾文他日有塗湯生文者弟聞之憮然曰王公達人吾愧之矣而當其時門下於弟則有所謂心與而目成者人誰無情而忍不報施乎客曰呉士文而吾鄉質文常有餘質常不足以不足交有餘辨給固不能相當精㣲亦不能相致無所相益有以相損因自引避不敢再謁尚書之門一叅公子之席其夙性然也又時知公子之意雅在氣節不在文章文章已矣而竊觀其時所號氣節諸君者弟亦未敢深附易不云乎定其交而後求平其心而後語安其身而後動不然莫益之或擊之矣迨其擊之也而悔其交容有及乎且門下人地才美固與弟江外枯槁之士去就不同何也今之執政者非異人固門下之父行也執政尚將擇疎鄙有才之士而近之况如通家之子也才而好逺之豈人情乎夫以門下之才且親尚負意氣不肯自近其疎鄙有才之士負意氣者固益以逺矣然則肯自近於執政執政因而近之者其人又多非負意氣而才者彼其時政公論安得不兩而執政者之無所逺聞殆非疎鄙寒士之過皆通家戚里子弟髙者引嫌卑者暱附無有與言之過也以愚計之門丅幸及此時强起除一閒署郎得從容間見言事執政有當驩然承之誤則愀然而獻疑入則盡規出不以語人此亦事父執者禮然而因以陰就天下之大計亦不可謂非名節事也且執政所以不受言事者以為此毁人以自為名莫愛已也若門下以戚里晚進而規隨其間又自匿不奪其名執政必以為愛已而不聽其言者非人情也然惟門下可以就此正以門下有美才而負意氣執政所重重之而不親此必門下負其人地才美不思以用之或意他有所在先其疑形如此而言不聽交不成此如學漢文者譏學宋文者皆未有以極其趣不足相短長也偶感門下推引過至及欲移病塞門似傷於懟世故不惜亹亹言之以門下昔日之心與而目成庶有當於斯言也答伍夢符失名一别六年迅如彈指此彈指頃悲慼劬瘁與之俱謝矣朝菌大椿無分修短論逍遥者定不誣也所恨者少年埋首科場薰心青紫到頭只付蕉夢回念窘辱棘圍者四十晝夜人非金石經此銷磨今猶蠢動視息頑健如初亦足羞矣且狂斐成性生無師法鄉先達如崇相能始諸公每欲引為後學意頗揶揄之自謂當世無韓昌黎吾遂不如李習之孫可之乎以是筆墨披猖動廢繩尺盖由客才浮氣使然遂至應舉讀書兩不得力悲夫晚欲師事石齋先生探討三易消息而千言未授九鼎隨淪同時石友凋零殆盡環瞻山海孑然一人葉披水落根石乃見毎手一編不問今古人語涊然汗出媿不能及腐塞此𠂻何處更有文字吾兄尚欲以著作相期慮與陵谷同遷改亦迂矣憶向年寓宋司理署中於諸家文部妄有甲乙司理言㸔著作如㸔小兒先問夀夭有旦暮盡者有數十年百歲者推之則數百歲千歲與刼同休者吾輩不能與刼同盡可無數百千歲乎細推此語作者實難六經之外意惟老莊二榜足以當之即唐宋大家敢有數百千歲乎若旦暮之文直不作可矣某所欲捐焚筆硯静坐内觀庶幾擴此隙明還歸造物與莊瞿諸老往來太虚不以頑滓掛世人耳目斯為足矣不知兄以為何如也垂示詩巻喜破谷音至於感不及傷誹不累道如與兄坐卧潄其温雅也微恨追琢之文不及金玉之相耳大抵此道以多閲多作為主乆之紕漏自見又在自考所短不使滑手便路趁入常蹊乃有生新之致鄙論云爾髙明當有獨裁也若嗣續一節正不當以縈懐邵堯夫四十餘始室其得伯温當亦在兄之年孫明復踰艾而受李廸從女其子即不知何名陳修七十三未娶宋髙宗乃詔内人施氏嫁之王逸少毎問嚴君平司馬相如不知有後否其最著者叔向之鬼餒伯喈僅女存李太白蕭頴士有子而獨孫女流落皆為市人妻陽域三昆不娶王維四弟無子崔曙一女白公一姪古之名賢缺陷者指不勝屈豈能與造物争耶即如某某非無子者乃狼戾無親竟同蠻髦是所謂寃親耳正不如鄧伯道孑然無玷未失千古髙士也陶潜云天運茍如此且盡杯中物毎誦此語悠然出人間世矣率筆潦倒忘其不倫恃兄之知我也明文海卷一百五十九
