body:
  text: 明文海巻一百七十八餘姚黄宗羲編書三十二國是與方正學書王叔英僕與執事别十餘年其間情慕之淺深書問之達否皆事之細者耳姑置之不足道也惟執事之身繫天下之望士之進退天下之幸不幸與焉側聞被召計此時必已到京獲膺大任矣兹實天下之大幸也故敢有説以進於左右焉凡人有措天下之才者固難自用其才者尤難如子房之於高祖能用其才者也賈誼之於文帝未能自用其才者也何則子房之於高祖察其可行而後言言之未嘗不中高祖得以用之而當時受其利故親如樊吕不可得而間信如陵勃不可得而非任如蕭何不可得而奪此子房所以能自用其才也賈誼之於文帝不察其未能而易言之且又言之太過故大臣絳灌之屬得以短之於是文帝不能獲用其言此賈誼所以不能自用其才也方今聖天子求賢用才之意上追堯舜固非高祖文帝可比而執事致君澤民之術逺方臯䕫亦非子房賈誼可倫眞所謂明良相逢千載一時者也將見吾君不問則已問則執事必能盡言執事不言則已言則吾君必能盡用致斯世於唐虞雍熈之盛者在是矣豈非天下之幸歟雖然天下之事固有行於古而亦可行於今者亦有行於古而難行於今者如夏時周冕之類此行於古而亦可行於今者也如井田封建之類可行於古而難行於今者也可行者行之則人之從之也易難行者而行之則人之從之也難從之易則民樂其利從之難則民受其患此君子之用世所貴乎得時措之宜也執事於此研諸慮而藏諸心者非一日矣措之猶反掌耳尚何待於愚言之贅哉然僕聞知者千慮必有一失愚者千慮必有一得故不能無言於左右耳夫人情愛其人之深而慮其患之至者必救其失於未患之先茍待其既失而後救之是乃愛之淺而慮之疎也其得為忠乎天下知執事之深愛執事之至如僕者固多矣竊謂忠於執事則未必盡僕若也伏惟少埀察焉論武銓書熊過月日兵部武選主事熊過頓首達尊少宰君侯典謁所聞程力搆謀者知士之度也赴時投機者懋功之要也傾否出治者大人之分也君侯以葢世之英震動宇内自薦紳放於氓𨽻想望高誼之日久矣程其力無不可舉而又受知陛下深所簡在值聖明之朝身為列卿與廟堂之議解棼之㑹何可後時旬内嘗承介使詢及選人聞者頗不悉君侯之意過獨知大人之度兼善成務方以共修王章建治平之業謝天人之望埀竹帛之名無惑也謹以選事奏記君侯察焉天之生民盛矣由一人乃至數十或有百千無算者皆是也而地不加多國家自留州供上輸邉之費其取諸民殆無遺利民已困罷一有征調率不能堪而公家之財嵗有常經即使少有贏餘亦應為緩急之備今四邉多壘行陳往往擒兇魁縛徒從奪獲馬牛羊器械者則國家思所以報之舊者未銷新者叢至地之生財既不加多欲責取於民則亦巳稱疲公家勢又不得裒益以奉之所謂上下俱敝者矣往時賢哲深惟根本洞察律令分辨時勢至其子姓限以三世五世有入刑者麗以常法奪其世爵其子姓即隨所附籍令世世復其家無有所事徭戍可謂義至精也然猶有遺説者三焉今之武選異於吏曹吏曹自正途外吏胥醫厯譯鞮之官皆籍焉武選務在清武臣而已武臣不可徒清計莫如令程其功便然言事之臣皆曰洪武永樂創業之時異諸後世其所除拜兵吏雖不厯戰陳不得輙議裁損然招諭之使幹局之勞乃至持金鼓采海青厯年月者諸凡途之不一是果何武功也今法皆論首功授之官祖宗時武人子孫䝉其已成獨坐享賞延之澤不敢究詰過愚以為非惜紈袴之心失祖宗大同之義一也過江之功非僮子所知顧五年之間其官乃與百六七十年等竊意文皇帝深念從事酬一時附助之情非萬世之計也攻圍克䧟固不必深言至如大營朝見者并一軍寵秩之其賞可謂太侈矣永樂中有征討官繫獄者文皇帝曰不以功掩過不以私廢公然則曲庇新官葢亦有司之過非盡文皇本意也王者以天下為度不宜示人以私探君之心成其過舉當時之臣可謂不忠今又失此時不議裁損竊恐至於大壊而思改絃雖有善䇿抑亦無及矣此其二也今職官有世襲有流官言者指流官以為高爵要亦不盡事實過以司存常從内府觀貼黄文雖試百户乃有稱流官者非必指揮使以上也有始為流官而後欽准世襲者然則指揮以下不可盡襲亦當分世官流官矣今槩而授之據非所據與初意可謂不侔夫世襲尚應裁損流官何得坐靡也不審當世之思果何為使因沿至今此其三也此外又有中官貴豪特為冒濫竄空名尺籍中儌倖茍得大將有不賞之懼則畏其勢不敢難也往年大將及撫臣為特設奮勇諸科以待之奪士卒功尚少今例諸奮勇而無擒斬者與雖擒斬而非為首者被傷者諸執大將旗有功者尚有一二其子孫皆不得録於是直上首功避他日禠奪計甚周過愚以為諸中官貴豪者子孫雖有眞功一世後不與凡士齒止其非望然後武選庶幾少清嗟乎君侯天下之事未有極重不反之理易曰窮則變變則通變通宜民不可有後時之悔過抱區區之心年所於此矣告之莫有應者力又不足以行之君侯存心天下又適因下問選人計舉斯心宜莫如君侯者敢願君侯少為留神言出於君侯之口上下信之勢自多可行者國家之利也伏惟君侯恕其狂瞽詩云楊園之道倚于畝丘此之謂也某頓首頓首上西涯先生論時務書黄綰綰聞士有為知已死者夫茍可以死也其未至於死者敢不盡其心以為報乎公固以天下士待綰矣綰可不以天下士為公報哉今公之事有大於天下者乎大於天下而不盡其心奚所盡其心也曩者先帝棄天下公與二三大臣皆受託孤之命翼今上嗣登大寶逺近聞者莫不舉手相賀謂有老成忠壯如公者為國股肱必能推素所蓄積引君當道蚤更新化以慰天下人神胥望山川改容以俟者幾兩載於兹今乃宜聞不聞人將疑其失望且云朝廷上下有不同量諸公皆去公獨欲去未可而在始則甚惑惟懼公一日亦去則國無人既而思之知公前日之志在於終濟天下不有其名者也羣公之志在於速靖一時急就其名者也葢公能用其愚羣公不能用其愚公能用其忠羣公不能用其忠此羣公所以一奮而輙去公所以從容而有待者在此矣古之大臣固不以吾君為不能而必去亦不以吾道為必行而必留一日業乎其官則一日立乎其位仕止久速各隨其時故身無牽制而心常奮然以有為否則山林丘壑何往而不適哉居今之世志之非難行之為難綰嘗念當今之故叅已然之跡中夜以思矍然而起為之痛哭流涕者幾誠恐太平無事之兆端不如此不知公為善後之術將何道以先之綰聞唐虞之際亦多事矣惟其君臣能知制亂之道通其變於未窮卒底至治易曰窮則變變則通通則久不爾則如晉之張華專恃維持謹守故常延以嵗月天下大亂身卒不免為可哀也惟公明審二者而早圖之今千瘡百孔苴漏補弊要非一端所能盡綰則敢摭其要者言之其一曰古之大臣知治亂之機在於一人一人之機本諸一心故必先勉其君以為學夫學所以去人欲全天理不學則人欲之萌如奔流誰得制之此桀紂二世煬帝之徒終蹈滅亡而不悟者也今上厥初嗣服小人得以他技易其聰明他道啟其非心豈非不學故也不先慮此徒以危言激之遂欲於君側取十數奸寵而殺之為計不已疎乎自昔君子欲去君側小人反為天下之禍者何限今欲少遏其横尚不可得况得殺乎孔子曰君子信而後諫不信為謗已羣公不此之思何其昧耶為今之計只宜於羣小方萌之初但知邪正之辨而不立邪正之名率諸元老往召其儔諭以先帝之意曰若皆先帝所選養青宫之素倖不患富貴之不極惟患有富貴而不能保今上春秋方富行義未彰大臣未和百官未輯四裔未撫庶民未孚得則治不則亂一間耳先帝臨崩目不能瞑惓惓惟二三老臣是託若豈不聞乎今水旱頻仍災變屢出民窮財竭怨咨載路盗賊方熾邉報復急若常宻邇何不一言於上以有盈成之業而若亦得以保其富貴顧猶䝉蔽之乎萬一事機有失雖欲一飯茍活不可得况富貴乎如此詞懇義正雖未能改其惡亦可小沮其心而無他於是專勸主上以講學擇經徳明備之士朝夕啟沃弗使間斷則天理可明人欲可消彼軰雖奸將無隙之可投君徳既正然後圖而去之未晚也且周之成王乃中才之主㓜而踐阼太公為太師召公為太保周公為太傅及左右近䁥咸選正人開其聰明養其徳性所以卒致成周之治豈偶然哉其二曰自古帝王皆先脩其内政而後及於外政夫閨門無法王化無本天下何恃而治周道之盛今古罕比然必闗雎麟趾之化行而後江漢汝墳之俗變周公六典所以致成周之盛者廼以宫正宫伯至閽寺嬪御皆屬天官冡宰其㫖微矣及其衰也皆由於閨門詩曰赫赫宗周褒姒㓕之此不脩文王之道而廢周公之法故也今天子新立中宫初冊奈何以五六刑餘外持人主之命内挾母后之權威攝中外勢傾上下一時皆為䝉蔽不敢指摘其奸是以宫庭雖無醜議家法必致難守安得不為慮哉自今脩之猶未為晚舉祖宗之舊章求前代之覆轍或論於經筵勸講之際或奏於皇后皇太后之前庶交相警戒早為持守失此不救人主之血氣浸盛情欲之愛日益深聲色之悦日益甚内庭近而易親恩常掩於義外庭逺而易踈義不勝乎恩比其已極雖百伊周不可救矣其三曰椒房之戚實闗袵席之恩此人情之易厚茍非明哲之君至徳之后孰不有所私金帛之賜足極其富爵命之加足極其貴富貴之極而不驕者鮮矣况常人之心知求而不知足知貪而不知止如漢之吕王晉之楊賈唐之武楊擅權專政致危神器覆宗赤族皆其驗也故古者帝王婚姻不以微賤上匹至尊必擇先徳之舊家法有承頼其隂佑以培基本綿無疆之統今之外戚貴極人臣富可敵國貪猶無厭有識為之寒心近雖稍收歛然無藉之徒尚盈門下抑之則怨縱之則無所不為且多知禁宻之情國家無事則已茍有毫髮其常懐怏怏之心將一日萌動挾其膏粱愚闇之人肆為非禮深可慮也反覆其故始之不由徳族繼之寵遇太隆以至此耳邇聞今上擇配攬户之家何不以此為鑒耶未幾果聞造屋聞置莊每用幾千萬銀例照皇親略無撙節爵命之加無異前事而前日之貪横將必不逺與之同矣此皆祖宗已來外戚所未有者今事已遂將何咎哉漢竇氏初寵於文帝周勃灌嬰請置師傅教之由是長君少君終身退讓保其富貴王氏之盛梅福亦嘗與成帝言之成帝不用卒致簒竊今之外戚既無先徳之可承又無家法之可守惟當早選師傅以教之或别置尊官於宗人府兼攝外戚别其賢否論其爵賞察其奸凶制之以法使無所縱不惟外戚之家可保富貴而母后之徳亦於此有助矣其四曰古設閹宦專便閫内役使他無所為刑餘之軰必鮮忠良小用猶為不可况可以攬天下之權哉漢宣帝以霍光專政為戒故輕宰相之權而恭顯遂得肆志至於元帝而天下蕩然蓋權在宰相雖專恣猶得斥其非而去之在閹宦蟠據在中人莫之測或傳内降或托御筆諫官不敢執九卿不敢問而令甲之行常為所播弄夫前日閹宦皆祖宗舊人縱有所為猶知祖宗法度自今已後前日者皆老死晚進少年皆代之彼實不知祖宗法度但知威福在已悍然横行無復如何此尤可憂也貞觀之制内侍不立三品只供内庭掃除不任以事本朝太監不過五品亦不許任事視貞觀最為良法奈何至今玉帶蟒衣儼若侯王天下操柄盡歸掌握今欲正之固難一朝而變議者謂莫若章奏之進所奏之司以封目先投内閣内閣計所奏請至尊於退朝後親御便殿更畨上直侍列計處若遇安危所係刑賞黜陟之大雖内閣亦不得專必召進九卿科道集議可否務合天下之公衆論既翕然後决自上裁行之唐太宗每與大臣議事必令諫官憲臣史官預聞之有不當諫官得諍之憲臣得彈之史官得書之有勸宋仁宗事當從中出者仁宗謂曰事正不欲中出付之公議使宰相行之有過失臺諫得言改之易耳人主尚爾况閹宦乎其五曰朝廷之有言官猶人之有耳目必耳司聽目司視而人之用完人無視聽則不得謂之人矣朝廷而無耳目可謂之朝廷乎晉侯問於叔向國家之患孰為大對曰大臣持禄而不極諫小臣畏罪而不敢言下情不能上通此患之大者也故明主知此必虚已以納其言優容以作其氣罷黜以激其不諫重賞以旌其能言言有不合縱加薄責旋即超陞猶慮其不言未聞轉喉觸諱動即禍隨内外遮邏骨鯁一空朝野相視咋舌噤口不敢論天下之事豈有指鹿為馬之心將復萌乎夫言官所係不止通否塞亦將以折奸人之萌救内重之弊若反為奸人所折内重之勢自此固矣楊場曰糾彈之司若遭恐脇御史臺可廢也抑不見盜將有意主人之家物必先毒其吠犬吠犬既死不為之防盜必大至故主人方一吠犬之死即為意外之憂急求數吠犬以繼之使盜知主人已覺而不來此良策也今之所憂有異此乎况言路風采消委已甚茍非豪傑焉能自振當擇素通古今貫達義理忘身狥國不顧已私者使居其職專責以言養其鋒鋭猶可及也若或不然徒以備位欲正君而不知正君之術欲彈劾而不知彈劾之方欲議禮制而不知典章之源欲論機務而不知成敗之幾其好名喜誇者或激剥以成禍患其巽懦不振者惟循黙以待陞遷或伺死虎以擊之或窺腐䑕以攫之甚或排正人以報私怨或引匪類以市私恩夫豈不為奸人之資重為天下患哉夫言不言不足論惟言無不濟天下斯為難也其六曰祖宗立法皆試之於民雖有缺遺天下久已安之且四方異土風俗殊尚故治各有宜若强其所不宜使異同之斯亂之兆也近者有司每以意見逞能非由講習思慮之精妄將舊制彼此移易日變月改徒見耳目之紛更而不知何者為適從以致奸民因之而愈謬奸吏乘之而為非春秋書魯作丘甲用田賦重其更端之始為民患也此乃往事猶未為甚今宦豎竊權於内必將施暴於外流毒初出如川方興不至引用非人大為紛更不足以行其志若不申明舊典定為中制責成有司謹守固持以遏其機紛紛變亂為生人之害其有窮乎自昔敗亡鮮不由子孫變其祖宗之制唐𤣥宗無太宗之哲而不守貞觀之舊卒致天寶之亂宋神宗無太祖之明而輕變開寶之章終兆南渡之禍夫創業之君所與共事之臣皆身厯艱難慮患之深立法之宻有非後世所及後世雖有才智終不若其更渉之多天下至大庶事至夥茍非厯試其艱深明其故誰得輕變之哉是故不知立法之意未有不亂法者也知立法之意至不得已而後變之斯為善守法矣其七曰君之為君以有民也得其民得天下矣失其民失天下矣民未有夫天命未改雖有智者不能謀之勇者不能奪之若使飢寒切民之身仰不足以事其父母俯不足以畜其妻子則人心離散非君有矣民既不為君有君何藉以有邦哉西漢傾危之勢不絶如綫光武乃以一旅中興葢人未厭文景之徳王莾不得以革天下之心邦本固也東漢之衰雖有先主孔明之賢猛將如雲謀臣如雨卒之不能復有漢鼎葢人厭桓靈之徳曹操孫權又得以革天下之心是邦本不固矣周禮大司徒以保息六養萬民曰慈㓜曰養老曰賑窮曰恤貧曰寛疾曰安富所以致其蕃息結其歡心淪入骨髓故民常戴其君君常得以有其民也今海内旱潦常半官疲於徴歛民困於追求鬻妻賣子流散四出雖有年糓之登常不免飢寒之苦賦役日急一日前日之所謂富民今已退為窮民前日之所謂窮民今已委於溝壑廟堂不知省守令不知恤皆謂祖宗積累之深有足恃者漫不為慮馬周曰當脩之於可脩之時不可悔之於既失之後真至論也其八曰義者天理之公利者人欲之私王者所以建立邦本垂裕無窮者義也伯者所以䧟溺人心貽毒後世者利也推其至聖人之所以異於衆人人類所以别於禽獸皆由此也若狥人欲而忘天理則孟子所謂不奪不厭雖有天下其能一朝居乎葢自孟子以後真儒間出義利之説漸晦於世雖有老師宿儒尚或以義為利以利為義所以傳之於人謀之天下國家皆不免功利之末流之於今遂無可辨以壟斷罔利盜名欺世為能事以刻核攻訐朘髓剥膚為有才以奔趨進取為當然以學古求道為迂誕持論以矯激兩可為能言臨事以逐謬詭免為得䇿隠忍茍容則為有徳締交阿黨則為善宦榮華莫大於戀禄羞辱莫先於去位賄賂公行於上下浮薄尤工於學校争訟大半於齊民有司不省治本特以簿書錢糓為大務胥吏罔知國法特以漁獵尅剥為生理交征於利相習成風人心穢濁恬不知怪何以異於秦隋五季之亂也失今不救求利之害其有窮乎惟在上者身先仁義以絶求利之心公行賞罰以正趨利之俗使天下曉然皆知明揚寵拔必狥公守義之士放逐廢棄必謀身務利之徒如立表示人人知定向交脩於仁義之中以振抜乎功利之外則風俗丕變而治效可求其九曰天下之所頼以存者綱紀綱紀之大有三明用舍公賞罰敦倫理持此三者斷而行之所以齊人道調萬化者也今賢者未必用用者未必賢暴官汚吏未必去清徳懿行未必彰賞之不足以為勸罰之不足以為懲人之犯法視為泛常漫不之畏倣傚成風愈罰愈犯以至父子相賊則懐忿而讐怨婦姑不悦則反唇而相稽諸父昆弟告訐肆行男女内外凟亂無紀夫常制於妻妻或殺其夫小兒嬉戯罵其父母都下之人時常醉酒詬及乘輿强者欺弱富者凌貧剛拏力攫恣所能為官長視小民如猛獸常懐抑伏小民視官長如寇讐每含憤怨此皆危邦之陋綱紀之失莫甚於此竊惟朝廷天下之首綱紀所自出若提其首下無不從所謂賞不必徧及於人而人自勸罰不必徧加於人而人自懲夫賞常行於君子而罰必及於小人此朝廷綱紀所以立也賞常行於小人而罰或及於君子此朝廷綱紀所以廢也齊桓公始用管仲九合諸侯一匡天下管仲死信豎刁易牙遂至身死而不救唐𤣥宗初任姚崇宋璟以致太平末相李林甫而海内大亂則知君子小人之用否所以闗繫於綱紀者何如哉其十曰國家太平既久民生不經塗炭憂愁之苦心思淫逸勞之則怨擾之則驚幸者國家無事無以啟其非心者使一旦少有驚變勤之以饋餉加之以饑饉睊睊狼顧偃蹇驕怒各將逞其蘖芽或有一二奸雄伺候其側假托名義指朝廷之過失執生靈之詞説攘臂呼號鼓舞而起當此之時我之將帥不足以應之武備不足以制之亦聽其自為而已近者國門之外盗賊時時竊發聚衆刼掠白日殺人有司皆以小事不聞略不加意及其猖獗偶得勦獲又以為功盡行陞賞甲子之旱僅兩直𨽻浙江山東數處饑殍盈道流民充斥焚室廬殺妻子羣相搶掠嘵嘵怨呼有司往來旁觀莫可誰何尚頼天祚國家二麥成熟即時安集不至大患又有海冦漳州人者不知姓名駕大船數十艘聚黨幾萬人僣擬旗號出没温州福建沿海境上招誘奸民不時刼掠前年於温州殺金鄉衛指揮一人軍士數百人又前年殺黄華廵檢司廵檢一人弓兵數十人有司皆以逺方小事匿而不聞翫以為常既不及時剿捕又不加意防禦其勢駸駸豈終為海寇者乎又近日蘇州民施天常寇虐為非蟠據崇明海上亦因有司姑息玩愒所致今雖偶爾捕獲然四海之廣踵之豈無其人元末敝邑方國珍與蔡亂頭以王伏之讐逼逐入海為亂之初亦甚細微遂不可制終為張士誠陳友諒之階豈非逺方哉凡事未有不起於細微而生於所忽星火不滅終必燎原蟻孔不塞久且潰堤易曰臣弑其君子弑其父非一朝一夕之故其所由來者漸矣大畜之六四曰童牛之牿元吉姤之初六曰繫于金柅貞吉有攸往見凶羸豕孚蹢躅皆言絶惡者當防之於幾微也羸豕之孚誠在於蹢躅又言止惡者不可徒以一時偃伏而忽之况今國家未能無故誠恐勝廣巢角之徒或萌於草澤而鉏耰棘梃之類或起而應之可不慮哉其十一曰羣公卿者皆前朝所任之舊臣長養成就於數十年者也不惟中國以之為表瞻外國亦以之為觀望猶山林之有虎豹樵採為之不入江河之有蛟龍舟楫為之恐懼如汲黯寢淮南之謀干木息諸侯之兵遼人懼司馬之復相金人問龜山之安在則知不出樽爼而折衝於千里之外者豈必在於荷戈持㦸之列哉故曰正人在朝羣邪所忌謀臣不用敵國之福今以奸臣之言一旦驅逐殆盡誠駭視聽不能不長奸雄之志以起外侮窺覬之心其所闗繫豈不大哉古者卿大夫既老月朔猶朝於君所與聞政事天子有事持珍味問於其家其重之如此雖國家無事尚不當輕去以起衆疑况今内本空虚外變將揺此正任用老成之際不宜輕棄况其中又有才徳為天下望乎惟能委曲調和於内求其為衆望所歸者復之可也其十二曰有文事者必有武備此聖人安不忘危之意也國家以威武立國置衛所錯於郡邑以待不虞可謂有其備矣奈何休息既久上下茍安軍律不明武備廢弛韜鈐不識而謂之將戈盾不分而謂之軍其襲職替官雖有比試考校之法但不過臨時僱倩以應故事大者以養勲階小者以守禄位優㳺飽食勇無足用謀無足取其平居無事驕心惰氣凝滿眉目使一旦有急雖人與千金亦莫效用如此養兵何益西北防邊最為要害其兵常戰特為精强非他處之比近年以來各差内臣鎮守使都御史總兵皆處其下反為所制動輙拘忌其怙勢作威規利自肥多帶私人散處各邉或打攬糧草或結放私債糧不足則虚串以入納草不敷則分束以備數債不完則扣糧以自償軍能克㨗賞歸其家營田肥沃僣為私莊軍丁力壯擇以耕田老弱創殘留之守營小大倣傚百蠧紛然諸邉幾於不守然夙沙衛以辱齊師魚朝恩以䧟唐兵豈盡如此故連年邉報失利先帝在日雖切留意終無祛病根在京諸營者天子自衛之兵所以防肘腋制外兵也尤當精鍊以待徴調今亦以内臣提督號令不一將無專心教演不精兵無素習甚者罷癃殘疾半於其間無所揀擇又以河南山東兩直𨽻軍赴京班上操半年一換新者未去舊者已回叅錯道路因而為非未見演習益困兵力况非盛時故事宜悉罷之選集精壯或别置輔鎭以備輦轂之虞夫兵者非衆多之為强惟能擇良將校變通明賞罰蓄勇鋭之為强昔齊威王烹阿封即墨遂起兵擊趙魏衛三國兵盡走齊國人人震懼以致安强賞罰明也方今文恬武嬉之餘正將惰卒驕之日雖曰治兵不專於嚴然烏可使其䙝而不振故申嚴紀律亦變通之所宜先者穰苴斬莊賈三軍股慄然後少施以恩病者為之求行争奮孔明必殉馬謖為法不可廢李光弼以嚴代郭汾陽人謂之得體孰謂姑息養兵如今日猶可望其用効於危急哉竊謂鎭守提督之類不去則帥權輕帥權既輕雖有良將不能成功名况授非其人何以措手足而脩武備哉惟熟籌之廟堂求得人而任之寛猛惟其所施庶幾可也其十三曰保社稷安天下莫先於人才人才之生錯而難見故宜廣取而不可限求今用人雖有數路惟進士則大用之否則雖有豪傑亦無以自見夫所以大用者正以其才其徳豈徒以其能舉子之文哉今日舉業所選之士果皆足以當他日非常之用否也士必素養而後可以當大事古之豪傑能立非常之功名者皆其胸中先有一定之規模然後仕而行之如韓信一見漢高祖即為畫取天下之䇿如指掌及為大將出百戰滅項羽無一不酬其言范文正公為秀才時即以天下為己任無一事不理㑹於心至上執政一書終身功業其本末皆不出此其所以精於心者豈一日哉今用人惟重於進士使天下之士方當少壯精力有餘正可以講求脩已治人之道惟知進士之業為當務乃一切從事於浮詞淺説之間疲神竭慮勞勞卒嵗惟患其業之不專不足應主司之求及用之且限於簿書期㑹行之不勝其掣肘然又束以資格考語之法夫資格限年躡級考語萬人同律持銓衡者憑此以騐賢否論黜陟雖有美才特志困不自見故士皆卑卑小節怠而不脩至令議者乃有我朝人才獨不及前代之嘆豈眞有不及哉取用之法使然也茍能撤偏重之弊去資格之拘慎藻鑑之明行不次之擢使士之出者皆得以行其志天下之大豈無非常之才足為邦家之用而猶曰有不及哉夫出類拔萃能包括一世之用者代不過數人豈如羣才之可多得周止亂臣十人唐虞之際尚止數人故孔子嘗並嘆以為盛今以海内之廣廣詢博訪但能得一二人養之寛閒之地作其精華果鋭之氣則他日非常之用自足應之不窮矣其十四曰世道之衰由於學術之壊學術之壊由於選舉之非法當今進士選於舉人舉人選於學校學校選於民間俊秀讀之以六經語孟之書明之以濂洛闗閩之説試之以經義論䇿之文固非前代墨義詩賦之比宜其得人之盛逺超漢唐宋而過之詎謂人物之下器識之卑反不能及何哉今徒取剽掠浮詞之末而失其涵濡體騐之本不知聖人所以為經者以心傳心將以明天理辨義利於分毫而已今之學者專為求利禄取富貴之㨗徑偶或一得不啻筌蹄之已忘雖其不忘亦鏤冰刻脂之工俳優齷齪之語名為正理其實視墨義詩賦反不及之逺矣昔朱子嘗嘆當時科舉文字之弊今日之弊有甚於朱子所嘆者其憂又何如也今天下之人但知其為利而不知其為害夫楊朱學為義而偏於為我墨翟學為仁而流於兼愛原其設心豈遂至此孟子嘗推其禍為無父無君以闢之差以毫釐謬以千里矧以聖經為學假之媒利名似實非昏蠱眩惑皆為患得患失之鄙夫其弊可勝言哉三代之法自鄉黨逹於王朝其所以居而教之無異道取而官之無異路故士各得以徳行道義自奮平居惟憂徳業之不脩而不憂官爵之不至此得人之所以盛也兩漢以來雖不能及乃有賢良孝廉之選故董仲舒轅固之徒由此以進及至隋唐始專以文詞取士不復有尚徳之舉宋沿唐制其盛時猶兼采時望而去取之其後糊名之禁行科舉之法益壊傳習至令士皆不必論其實行進退之際惟取决於三日之虚文雖行檢若狗彘屠沽販賣皆不必擇以至誣經詭聖能希主司之意莫不中選遵理道拙華藻者莫不屏棄以一日之長得登一第清官顯爵擅之終身無不如意乃使習對偶之童子皆斐然有卿相之想而不知慚噫使古之聖賢如孔子孟子顔子者生於今日其所自負如何亦肯與今日之士同其用心相逐得失於此哉雖然勢極而反亦理當然使後代之論者謂選舉之法始壊於某代某人卒復於某代某人顧不盛歟若欲選舉得人莫先於正人心欲正人心莫先於明學術必使一時學者皆遵小學大學之方以求聖賢之道實有得於心方令為舉業許以應試取之之法或如周之鄉舉里選或如漢之特舉實行或如宋之兼采時望然後試以經義論䇿不必如今之對偶虚文命題必明白正大不困以所難務擇其眞切者為上格中不必多亦不必限以名數庶幾所學皆實學所得皆眞才不至如今日人才相去之獨逺也綰生長東南㓜而讀書有志天下之務念祖父世受國恩尤欲以身為報乃䝉先朝曾收育於仕進之列但以學之未成屏伏閒曠朝夕自治以俟其充不敢即叨升斗之禄目今天下之勢跡雖未形機則已露譬之人身外貎雖壯衣冠雖好五臟受傷四肢百骸無有不病以此憂念至深夙夜食息不敢或忘故敢吐其一得之愚以獻自頂至踵之思但知欲忠於國願報於公不復有所避諱亦不敢冀其言之皆是在昔伊尹周公攝位行政人心貼然流言相扇雷風感變此何道以致之是其胸中至誠所存者有以貫徹天人之際豈區區智術所能然哉戰國縱横諸人其才知非不美其謀䇿非不優特所發非本心詭偽遷就求合人主一時之私以遂其欲終必至於滅六國亂天下此不誠然也惟公推二公之心積至誠之道持守之堅不以利害死生而得間上有以格天心中有以感君心下有以孚民心一轉移間使天下為康為寜為福為夀不使世有遺策人有遺用遺後世之憾皆公平生所學所志竭節盡忠報君愛國不可後者惟望不以草野慮廣為倨侮芻蕘放論為難聽曲加優容不録其狂妄之罪擇其是者而納之是則先帝顧命之重幸甚宗社神靈倚頼之深幸甚蒼生仰望之切幸甚啟桂洲公論顯陵形勝書顧璘比拜手教感切至深念公上應顧問贊萬機下酬咨啟神用固無停乃復念鄙人如此尚何云希濶邪不敢望不敢望璘竊有獻頃者奉命告謝純徳山得縱觀我獻皇陵寢之盛其山東自京山中盤諸大山發胍而來再起於聊屈蜿蜒而西屏聯障疊至今純徳山而止乃幹龍之盡處以其過北更無山前界漢江是以知之所謂界水而止亦曰勢如萬馬從天而下也或言主山太小兩沙太直其理殊未切凡言主山非指葬地之山乃泝其龍胍所起之處正不貴其逼近如中盤五泉聊屈等山皆崔巍秀拔接於百里數十里之間何謂小乎楚地山多正嫌其偪仄阨塞而難於寛廣此地自陵山以北龎厚寛舒四望千里儼有京都之象光嶽所聚非偶然也兩沙為脩築牆宇欲成制度稍去坡陀今望若直然大勢則青龍回而作岸極得環抱何可謂直乎其南五泉之野古有曰天子墓在今俗呼天子岡舊志載其靈變葢異兆也古者天子所興之地必有符讖物象之祥豈可不信乎璘又謂天下之地各有極貴之處今都城與天夀山諸陵據燕冀督亢之勝不俟言矣古稱芒碭有天子氣則我高祖奮起又祖陵據為宅兆金陵曰龍蟠虎踞眞帝王都高祖既定鼎於此又為鼎湖升遐之區杭州曰龍飛鳳舞至於臨安我太皇邵太后適出其地鍾靈之所固已凑合於皇家矣今荆郢之間亦海内一大都㑹自春秋楚莊稱霸以來代有竊據而偏安者亦其地氣素貴也國朝郢梁祚薄而不能承乃大發於聖宗自獻皇埋玉以來我主上當陽御極聖躬康强皇嗣叠降景福嘉祥可謂極天下之美善無加矣仄聞道路之言云皇上孝思誠切若有遷陵之議璘逺臣疎賤不敢與聞欲言中止者屢矣竊比富貴之家葬地得吉尚不敢輕動况萬年之宗社乎左右乃國之親臣位在輔佐不可不極言雖少違主上之孝而實臣子之至忠也且商周遷都未聞遷陵况我太祖不遷祖陵太宗不遷孝陵此數聖人必有深意不可不慎無俟後日稍有慮悔噬臍難及昨鎮守張太監謁顯陵至省見璘亦曰美哉陵山之盛長陵可以頡頏諸陵皆不能比渠乃内臣熟見國家規模其言亦如此可以占人心之同今諸臣不敢言者恐未見之耳若再奉此議執事宜請遣大臣稍知堪輿學者來此遍觀熟視庶知璘言不妄不勝拳拳及此幸勿以為愚也明文海卷一百七十八
