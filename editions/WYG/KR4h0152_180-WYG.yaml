body:
  text: 明文海巻一百八十餘姚黄宗羲編書三十四民事與行在户部諸公書周忱伏聞治民之道在於禁惰㳺以一其志勸耕稼以敦其業葢惰㳺禁則土著固而避勞就逸者無所容耕稼勸則農業崇而棄本逐末者不得縱由是賦役可均而國用可足茍或不然則户口耗而賦役不可得而均地利削而國用不可得而給先王制六鄉六遂之法以維持其民而均其土地者正為此也邇者皇上念天下之人民有因饑窘逃移者累降勅㫖設撫民之官頒寛恤之條令天下郡邑招而撫之諸公頒布奉行克謹無怠天下之民感戴聖恩扶老携㓜競返桑梓惟獨蘇松之民尚有逺年竄匿未盡復其原額而田地至今尚有荒蕪者豈優恤猶未至乎凡招回復業之民既䝉蠲其税糧復其徭役室廬食用之乏者官與賑給牛具種子之缺者官與借貸朝廷之恩至矣盡矣如此而猶有不復業者亦必有其説焉葢蘇松之逃民其始也皆因艱窘不得已而逋逃及其後也見流寓之勝於土著故相扇成風接踵而去不復再懐鄉土四民之中農民尤甚何以言之天下之農民固勞矣而蘇松之農民比於天下其勞又加倍焉天下之農民固貧矣而蘇松之農民比於天下其貧又加甚焉天下之民常懐土而重遷蘇松之民則常輕其鄉而樂於轉徙天下之民出其鄉則無所容其身蘇松之民出其鄉則足以售其巧忱嘗厯詢其弊葢有七焉何謂七弊一曰大户苞䕃二曰豪匠冒合三曰船居浮蕩四曰軍囚牽引五曰屯營𨼆占六曰隣境蔽匿七曰僧道招誘其所謂大户苞䕃者豪勢富貴之家或以私債準折人丁男或以威力强奪人子息或全家傭作或分房托居賜之姓而目為義男者有之更其名而命為僕𨽻者有之凡此之人既得為其役屬不復更其糧差甘心倚附莫敢誰何由是豪家之役屬日增而南畝之農夫日以减矣其所謂豪匠冒合者蘇松人匠叢聚兩京鄉里之逃避糧差者往往携其家眷相依同住或創造房居或開張舖店冒作義男女壻代與領牌上工在南京者應天府不知其名在北京者順天府亦無其籍粉壁題監局之名木牌稱高手之作一户當匠而冒合數户者有之一人上工而隠蔽數人者有之兵馬司不敢問左右隣不復疑由是豪匠之生計日盛而南畝之農民日以衰矣其所謂船居浮蕩者蘇松乃五湖三泖積水之鄉海洋海套無有涯涘載舟者莫知蹤跡近年以來又因各處闗隘廢弛流移之人挈家於舟以買賣辦課為名冒給隣境文引及河泊所由帖往來於南北二京湖廣河南淮安等處停泊脱免糧差長子老孫不識鄉里暖衣飽食陶然無憂鄉都之里甲無處根㝷外處之廵司不復詰問由是船居之丁口日蕃而南畝之農夫日以削矣其所謂軍囚牽引者蘇松竒技工巧者多所至之處屠沽販賣莫不能之故其為事之人充軍於中外衛所者輙誘鄉里貧民為之餘丁擺站於各處河岸者又招鄉里之小户為之使喚作富户於北京者一家有數處之開張為民種田於河間等處者一人有數丁之子姪且如淮安二衛蘇州充軍者不過數名今者塡街塞巷開舖買賣皆軍人之家屬矣儀眞一驛蘇州擺站者不過數家今者連甍接棟造樓居住者皆囚人之户丁矣官府不問其來厯里胥莫究其所從由是軍囚之生計日成而南畝之農夫日以消矣其所謂屯營隠占者太倉鎭海金山等衛青村南匯呉淞江等所棊列於蘇松之境皆為邉海城池官旗犯罪例不調伍因有所恃特賜豪强遂使避役姦氓轉相依附或入屯堡而為之佈種或入軍營而給其使令或竄名而冒頂軍伍或更姓而假作餘丁遺下糧差負累鄉里為有司者常欲挨究矣文書數數行移衛所堅然不答為里甲者常欲根㝷矣足跡稍稍及門已遭官旗之毒手由是屯營之藏聚日多而南畝之農夫日以耗矣其所謂隣境蔽匿者近年有司多不得人教導無方禁令廢弛遂使蚩蚩之民流移轉徙居東鄉而藏於西鄉者有焉在彼縣而匿於此縣者有焉畏糧重者必就於無糧之鄉畏差勤者必投於無差之處舍瘠土而就膏腴者有之營新居而棄舊業者有之倐往倐來無有定志官府之勾攝者因越境而有所不行鄉村之譏察者每容情而有所不問由是隣境之客户日衆而南畝之農夫日以寡矣其所謂僧道招誘者天下之寺觀莫盛於蘇松故蘇松之僧道彌滿於四海有名器者因保舉而為住持初出家者因逰方而稱掛搭名山巨刹在處有之故其鄉里㳺惰之民率皆相依而為之執役眉目清俊者稱為行童年紀强壯者名為善友假服緇黄偽持錫鉢或合伴而脩建齋醮或沿街而化縁財物南北二京及各處鎭市如此等軰莫非蘇松之人以一人住持而為之服役者常有數十人以一人出家而與之幫閒者常有三五軰由是僧道之徒侣日廣而南畝之農夫日以狹矣凡此七者特舉其大畧而天下郡縣此弊俱無縱使有之亦未必有如是之甚此等之人善作巧偽變亂版圖户口則揑他故而脱漏田糧則挾地名而詭報惰㳺已久安肯復歸田里從事耕稼况其缺乏税額累累加配見在之户其中頗有智能者見其得計亦思舍畎畝棄耒耜而效其所為惟愚騃無用之人方肯始終從事於農業然坐受其弊亦豈無避免之心乎凡天下之事不可有一人之僥倖茍有一人僥倖而獲免則必有一人不幸而受其弊蘇松僥倖之民如此其多則不幸而受其弊者從可知矣是宜土著之農夫日减月除而無有底止矣忱嘗以太倉一城之户口考之洪武年間見丁授田十六畝二十四年黄冊原該六十七里八千九百八十六户今宣徳七年造冊止有一十里一千五百六十九户覈實乂止有見户七百三十八户其餘又皆逃絶虚報之數户雖耗而原授之田俱在夫以七百三十八户而當洪武年間八千九百八十六户之税糧欲望其輸納足備而不逃去其可得乎竊恐數嵗之後見户皆去而漸至於無徴矣是皆惰㳺不禁耕稼不勸故姦民得以避勞就逸棄本逐末如前之所云者誠宜立法檢制之撫民之官固未易以招之也愚以駑鈍之才濫叨重寄晝夜勞心莫知所措伏望該部列位卿相與在朝公卿大臣詳加講究明白奏請將蘇松等府逃移人户不拘通例别立一法以清理而檢制之庶幾户口可增田畝可闢税糧可完忱事出激切不覺覼縷之至惟冀詳察而恕其狂妄幸甚呉中賦税書與廵撫李司空王鏊古者什一而税使民嵗不過三日故天下和平而頌聲作後世未能遽行也然亦當稍倣其意使法較然畫一而可守今天下財賦多出呉中呉中税法未有如今日之弊者也請備言之呉中有官田有民田官田之税一畝有五斗六斗至七斗者其外又有加耗主者不免多收葢幾於一石矣民田五升以上似不為重而加耗愈多又有多收之弊也田之肥瘠不甚相逺而一坵之内咫尺之間或為官或為民輕重懸絶細民轉賣官田價輕民田價重貧者利價之重偽以官為民富者利糧之輕甘受其偽而不疑久之民田多歸於豪右官田多留於貧窮貧者不能供則散之四方以逃其税税無所出則攤之里甲故貧窮多流里甲坐困去住相牽同入於困又有奸民以熟作荒嵗以為例謂之積荒板荒馬役義塜之類悉攤之於衆此加耗之所以日重者也又官民之田舊不過十餘則近則乃至千餘自巧厯者不能算惟奸民積年出没其中輕重高下在其手或以其税寄之官宦謂之詭寄或分散於各户謂之飛寄有司拱手聽其所為而不去非不欲去不能去也其弊起於則數之細碎故也田之税既重又加以重役今之所謂均徭者大率以田為定田多為上户上户則重田少則輕無田又輕亦不計其資力之如何也故民惟務逐末而不務力田避重役也所謂重役者大約有三曰解户解軍湏顔料納之内府者也曰斗庫供應往來使客及有司之營辦者也曰糧長督一區之税輸之官者也顔料之入内府亦不為多而出納之際百方難阻以百作十以十作一折閲之數不免出倍秤之息稱貸於京以歸則賣産以償此民之重困者一也使客往來厨傳不絶其久留地方者日有薪炭􅀈菜膏油之供加以饋送之資㳺宴之費罔不取給此民之重困者二也前代無所謂糧長者我太祖患有司之刻民也使推殷實有行義之家以民管民最為良法昔之為是役者未見其患頃者朝廷之征求既多有司之侵牟溢甚舊惟督糧而已近又使之運於京糧長不能自行奸民代之行多有侵牟京倉艱阻亦且百方又不免稱貸以歸不特此也貪官又從而侵牟之公務有急則取之私家有需則取之往來應借則取之而又有常例之輸公堂之刻火耗之刻官之百需多取於長長又安能不多取於民及逋租積負官吏督責如火則拆屋伐木鬻田鬻子女竟不免死於榜掠之下此民之重困者三也三役之重皆起於田一家當之則一家破百家當之則百家破故貧者皆棄其田以轉徙而富者盡賣其田以避役近年呉下田賤而無所售荒而無人耕職此之故也夫有田則有租有身則有庸有家則有調今田既出重租又併庸調而歸之此民之所以輕棄其田者也古之為政者驅末作歸之田今之為政驅農民而歸之末作使民盡歸末作則國之賦税將安出哉時値年豐小民猶且不給一遇水旱則流離蔽道餓殍塞川甚可憫也惟朝廷軫念民窮亦嘗蠲免荒數冀以寛之而有司不奉徳音或因之為利故有賣荒送荒之説以是荒數多歸於豪右而小民不獲沾惠於戯民之患極矣有仁心者忍坐視而不思所以拯之而拯之實難鏊日夜思惟莫知所以為計孟子有言葢亦反其本矣意者今日之弊亦當先端其本乎使官田無太半之税内府無出納之艱有司無侵刻之擾則諸弊可一掃去而民有息肩之所然官田之税國有定法未敢輕議昔宣宗皇帝亦嘗勅减其數因是再損削細碎之數併為一二則或四五則或如舊例十一則其亦可乎出納之艱則在明主加之意時察之而重為之禁貪官之弊則廵撫之責而乃使之晏然在位或幸而見黜又晏然捆載而歸曾不究其贓如此復何所懲而不為乎於戲三者之弊及今治之猶可不然民日以困田日以蕪國家之財賦日以益缺數十載之後吾未知其所税駕也與李司空論均徭賦王鏊鏊居鄉數年見民間甚苦均徭富者或至毁家貧者多至賣田鬻産伐樹繼以逃亡前此未有也訪其故起於呉縣尹鄭軾軾良吏也輕變舊法貽禍至今葢舊法計里不計戶姑以長呉二縣論之二縣共一千二百五十二里嵗額共一千一百五十五役里分役數大約相當即有參差自可隨宜消息每里共當一役雖有重費十戶共之不為甚苦人户貧富里長素諳略為重輕人亦能堪自軾為縣謂里長不能無弊也悉召人户至縣人人面審家家著役役少人多則儲為公用謂之餘剩均徭軾之為此亦甚均也繼其職者不能如軾多因之為利人人面審恣意酷􅉽一户有至百餘兩者嚴刑痛箠敢有不承其餘細役似不為重而交納之際百方艱阻多至一倍二倍三五倍者有之民吞聲而不敢言所謂餘剩者竟不知何在故民間争言舊法之便舊法似疎而民悦均其利於下也今法似宻而民怨專其利於上也以愚計之役之大者莫如解户斗庫之類宜别為一項推上户有名衆所知者當之而下户特為優免其餘一甲止當一役按里可定不必人人面審騷動一縣益面審之際不免詢人人恐重役多方行賄詢之糧塘則賄糧塘詢之里老則賄里老無所不詢則無所不賄故有以富為貧以貧為富有司又從而高下其手名曰均徭實不均之大者也曷若舊法不詢而自均乎或言舊法善矣官府之用不足如之何曰此自為役法耳非為財用設也賦之與役不相渉入如有公用贓罰之類尚多有之必不得已與其豫儲均徭不若别為科派科派多及富右不及貧下也執事體國愛民之心至矣近效一得之愚亦不自知其可用與否而公以為必可行復詢逺謀足利永世者於此見公之心何如也民間利害未能悉舉而徭役實其大者願公不惑羣議斷而行之符下州縣照里定役一年足一年之用更不許僉餘剩若有餘剩即同贓論如此數十年之害一旦除去呉下人人歡呼相慶不特此也田無重役民皆務本不至輕棄其田而逃亡是本末均利矣然湏刋定大榜昭示逺近永為定例不然公去呉之後貪官汚吏又將如前之為呉人之弊吾未知所税駕也近考蘇州誌文襄役法一里出銀一兩其輕如此其後知府汪虎變為前例當時尚以為重不知今日流弊至於此極也今役額頗增若倣文襄之法雖一里十兩猶輕且均也執事以為何如與中丞劉養和書王九思車從過鄠獲侍左右幸甚竊見憂勞百姓形諸顔色所過咨訪下及芻蕘此昌黎韓子喜談而樂道之者况不肖乎伏念髙明不以九思不肖納為知已詢以今日之務當時倉卒未及陳對乃今有懐而不以告是負知已也故敢以書上亦韓子所謂惟愈於執事可以此言進者惟高明察焉高明按臨郡縣輙進鄉老詢以民瘼昨見鄠中所進見者多市井賈人不諳政體或以一人之私或以讐家之故率爾發口自不知非此高明親與聞睹不容以或誑也不肖以為度諸他縣想亦不逺雖然此就其無益於事者云耳即其所言多切於弊而高明行焉而行者或非其人竊恐高明之勞日甚而無益於下也雖然此就按臨之地云耳即其所言多切於弊而高明行焉而奉行皆得其人而有益於下也全峽七百里能徧厯而月與之臨乎此勢之决不能也不肖以為今日之急莫如擇人古法有云朝廷任吏部吏部任監司此天下之勢也而一省者天下之凖也故今全峽之地兵馬在都司錢榖在藩司獄訟在臬司而府州縣則承接而行而規畫布置則廵撫臺也高明於此將何為邪規畫布置而已耳任藩臬而已耳擇府州縣吏而已耳雖然藩臬人少而多賢其任之也易府州縣吏少賢而人多其擇之也難惟其難也故近有宻切訪察者焉不肖於此不能無疑何也其訪察也寄之何人乎使其人果君子也必能公其心以事其上矣萬一錯繆於十人之中而誤一人焉竊恐九人之得不能償其一人之失也况其多乎况不公其心以事其上者乎今日之急莫若於府州縣吏每府書一方冊置之坐隅分命藩臬及各道守廵留意訪察親見賢否從公揭報高明不負天子藩臬諸君必不忍負高明也既得其實已其上而可旌與其下而可黜者則亟為之其向上而未久者勸勞之其未久而志陋者姑罰之使其警焉而知悛也若夫中人之資固無異才亦不廢事此其最多者則戒飭之使各勤其職焉於是一省府州縣吏不下數百人覽之則在目中憶之則在胸中不假下人訪察而賢否可知不勞親問百姓而民瘼自悉一人家有一都御史葢有所恃而不恐一官府有一都御史葢有所畏而不敢高明於此又何為耶亦惟總其大綱去其大惡以收其成效而已無復多勞也多勞則病損千金之軀以貽高堂之憂可乎不肖於高明為通家兄弟父子辱知愛於門下甚深是故敢以此言進也異日高明坐於廟堂之上佐天子進退百官倘不迂不肖之説推而行之則天下其庶幾乎惟高明留意幸甚幸甚上廵撫三原王公書趙同魯竊聞為政者不患上令之不行而患下情之不達情不達則上下隔絶忠言莫進而惠澤不流其為害有不可勝言者惟上有聽言之明下有盡言之士言之而當聽之而審則民志以之而通政教由是而成矣易曰上下交而其志同也又曰同人于野亨此聖人所以必察邇言而盡下情者也伏惟明公以王佐之才為國元老為明天子所倚毘輟廟堂之畿輔以任南國之旬宣而能不自滿假汲引士類周爰咨諏務使拯顚崕之厄置諸袵席之安此即先正保衡不忍一夫不得其所之盛心而加以周公吐哺握髪之勤也同魯不於此時披瀝肝胆以盡所欲言以失事機之㑹則將受下瘏之責矣竊惟我蘇昔在禹貢揚州之域厥土塗泥厥田下下由漢厯唐其賦皆輕宋元豐間苖為斛者止三十四萬九千有竒元雖稍有增損亦不相遠至我朝止增崇明一邑耳其賦加至二百六十二萬五千九百五十六石地非加闢於前糓非倍收於昔也特以國初籍入偽呉張士誠義兵頭目之田及撥賜功臣與夫豪强兼并之以罪没入者悉依租徴税故官田有一石九斗八斗七斗之額呉民世受其害久矣洪武間運道猶近故耗輕易舉至永樂建都北方漕運轉輸始倍其耗由是民不堪命逋負死亡動以萬計宣宗章皇帝明燭是弊詔減官田三分之税時格於異議事寢不行前守况侯抗章上請得遵優㫖所减税糧凡七十二萬餘石又頼廵撫周文襄公存恤惠養二十餘年嵗豐人和汔可小康自後水旱相仍無嵗無之加以虧折賠償不貲民復困瘁每使節臨呉自閶門入者見其貨賄充斥人物旁午孰不以為富庶殊不知皆名商大賈東西南北之人所湊集耳土著之民自名宦世族之外率多逐末之徒不識耕稼之苦賦税之事者其處乎窮鄉僻壤頽簷破屋啼飢而號寒者皆吾蘇務本之民也且田之負郭及當官道者率皆高阜麰麥稼穡芃芃其盛孰不以為膏腴之壤殊不知沿江傍湖圍分積水逾仞數年不穫而小民破家鬻子以償官逋者皆吾蘇重額之田也至於今年自春徂夏不雨五月下澣始獲一雨沾足百榖既播良苖勃興謂豐年可冀矣詎意六月以來隂寒為沴禾皆連根槁死復生螟蜷蟊賊四蟲孽所食之處疾若風雨根苖心節靡有孑遺八九十老人目所未覩逮七八月以及九月盲風怪雨發作無節發必連日信宿拔木發屋田禾之高阜者風秕低窪者腐爛高者十存四五低者十無一二全無穫者又過半焉愁歎號泣之聲遍野呉民老穉倉皇固常控訴有司有司亦常為之詳覈而獨許免其全災者耳至於風秕腐爛者略不議及葢出納之吝有司職也自非明公俯垂大造之恩體皇上子養元元之意心究大易損上益下之微㫖鑒先哲百姓足君孰與不足之名言槩减税額以活此一方之人解此倒懸之急救其􅂷絶之命則百萬生靈何所仰頼而自存亦何所收穫以充賦乎前此吾蘇嘗大水矣永樂三年太宗皇帝特詔户部尚書夏公少卿袁公洎同魯之叔祖友同治水於呉復命太子少師姚公發永豐倉糧五十餘萬石以賑之誠以蘇為畿内根本重地國計所頼故也景㤗甲戌大水郡守汪侯諭民曰爾民救得一分則得一分之食不爾税也其時逰青晞薄俱作全渰之數次年復行荒政給粟設糜多方賑濟然猶餓殍接迹尸骸塞川腥聞原野盗賊狂徒乘時猖獗時太子太保王公廵撫尚書李公廵按御史應公發兵勦捕幸而撲滅此往事之明騐也祗今窮赤之民謀墐户而逃者十居四五惟俟節鉞之臨聽明公之號令以决去就耳其可不防微杜漸弭患於未萌乎然此非愚一人之私慮凡蘇之士夫耆老諳練世故識達事機者靡不深懐隠憂忘寢與食莫知為計顧惟愚賤何敢遽爾冒凟威嚴然念自祖宗來世以詩書為業至同魯不肖生長田野稼穡艱難生民疾苦頗所諳悉平生足跡未嘗輕造公庭干非望取斥辱以隳素行以玷前人兹特不忍坐視呉民廹切之患故敢馳詣行臺用獻曲􅋓徙薪之謀庶幾少助廟堂拯溺救焚之大計非為一已之私也明公倘賜採擇則東南之民死骨不朽矣伏惟矜其愚不録其罪而俯垂察焉不具答蘇松廵按曾公士楚言撫按職掌不同書張居正手翰領悉呉素稱難治比來直指使者能舉其職者鮮矣執事以望選宜勉旃竊謂撫按職掌不同政體亦異振舉綱維察舉姦弊摘發幽隠繩糾貪殘如疾風迅雷一過而不留者廵按之職也措處錢糧調停賦役整飭武備撫安軍民如高山大河奠潤一方而無壅者廵撫之職也近來撫按諸君不思各舉其職毎致混雜下司觀望不知所守以故實惠不流至於直指使者往往舍其本職而侵越廵撫之事違道以干譽狥情以養交此大謬也因憶嘉靖間有周如斗者廵按蘇松信豪宦之言博流俗之譽將應徴錢糧槩請停免士民悦之為建生祠奏留再厯遂超陟蘇松廵撫及為廵撫則錢糧徴發百責攸萃不復能行其寛貸之政將以前免停逋賦復行徴派於是士民怨之毁其生祠刋布謗書向之稱頌徳美者轉而為怨懟忿恨矣何則驩虞之術易窮衆庶之欲難厭也况此中人情叵測衆庶難調惟一以大公至正行之庶得無咎無譽耳辱俯詢敢以職掌為告幸裁擇焉答蹇理菴撫臺王家屏凡舉事最不可有功利之心除却功利無事可為一有此心便復害事即如古人治水墾田豈不是要興水利成田功然必勤胼胝者八年而後水道始通較豐凶於數嵗而後田賦始定則知旦夕之功目前之利雖聖人不能圖也畿輔水田非盡可開墾亦非盡不可開墾者朝廷用言官議委其事於尚寶君尚寶君於水田身親渉厯精意講求决以為可成者數年矣一旦受事不患不任正患其任事之過求功之速或拂民情招物議耳乃尚寶君亦自言始事寜少勿多寜緩勿急寜相順勿相强也何圖尚寶未出而豐玉之工已興矣當其興工固且恐尚寶一至煩擾地方而不知倉卒經營亦自有一種措辦於是農不足而募南兵以充矣餉不足而貸庫金為費矣其後費不能供兵不可散而議復輜重營以處餉矣法誠善意誠良然去水田之議則已漸逺不佞向固疑之而有書以質於前督撫公謂募兵為農以田授屯乃屯田非水田而農可散兵不可散兵且無餉農何時有粟乎㑹有成議兵車營竟復而尚寶君見豐玉間田已成其志意滋廣遂去而之河間眞定談治河决渠之役矣役未興而議起以有今日不佞因有感於國家之事其為而無成非獨怠事者之過而任事者不能從容計慮次第舉行稍有急功利之念亦必决裂破綻而不可久則此水田之工是也向使豐玉不募治田之兵眞定不徴治河之卒以開墾屬之百姓以勸相付之有司而行田使者嵗不過一出省視但以勸相勤者為盡職勿以墾田多者為賢良如此行之數年當令荒蕪漸闢水利漸興而官不知勞民不稱擾豈至急目前之功而阻累世之計哉嗟乎已矣事已至此無可為矣獨今水田雖罷而營兵固存帑庫之金既無所償輜重之餉將何所給誠不能不厪臺下之籌畫也顧此軰向已失之遽招今可驅之遽散惟分已開之田以抵額餉扺者有數則餉當半省而易供散無用之卒以補别伍補者漸多則卒當益少而易散是在一運量之間而已不佞何足與計苐大教下及僭有區區之愚因敢就正左右幸賜裁擇答王對滄撫臺王家屏開荒之議大是難言以為不可開而却有可開之地以為可開而却有不願開之人人所以不願開者富有田者盡力於熟田不肯治荒田也貧無田者又無力可治荒田必仰給牛種於官官給牛種豈召之來而遂給之耶必報姓名必闗里甲必逓領狀皆不能徒手得必有費矣還牛種於官又有費矣起收子粒追呼之使相屬又必有費矣此三項者正費也未為累也田未墾時荒田也官田也既墾而田主人至矣田人欠糧則拉與賠糧欠差則拉與賠差非必眞正田主人也本非其田而頼之使賠者亦有之矣頼之於官非必不才有司聽其頼也即才有司而急於差糧之完屈之使賠者亦有之矣非直一嵗賠也嵗嵗佃之則嵗嵗賠之不棄其田賠未巳也故人之視荒田不啻坑穽官雖召之不應也雖給之牛種寛其租粒不往也何也差糧之累難支而官府之令不信也此百姓之所以益逃而田土之所以益荒也乃諸鎭以墾田入奏者動輙數千百頃不佞視其籍惟有切齒而恨且嘆耳將誰欺乎夫田既曰墾則租當日多祖日多則餉當日減今各鎭一面報開荒一面請餉則其未嘗開荒可知其所報開荒直虚文耳臺下却欲實做必踏勘地畝攤派税糧使荒熟有定數輕重有定額而後召民開種令其樂從此舉事之所以甚難報成之所以獨後也若止具文書如他人則何難之有而又何至有怠政之議哉雖然寜以怠政去官無寜以虚文冒賞也即此一事以議臺下而臺下之人品宦蹟乃益見其高毁譽去就何足計也欽服欽服救荒書程一元夫救荒恒言其一曰平價平價者欲令凶嵗用樂嵗之價也糶者有餘糴者不足損有餘補不足故曰平此善政也愚竊以為欲平者人君之心也而不平者物之情也書曰惟齊非齊故必以平寓之不平而後可幾也昔耿氏常平之法榖賤則增價以糴貴則減價以糶此在官者也若民則惟害之避惟利之就有父母所不能諭君長所不能制者乃天性也昔范文正知杭州嵗饑糓貴至斗百二十文范公更增其價至百八十文告諭逺近於是米商大集價亦隨減包孝肅知廬州亦不限米價米更以賤此固以誘致境外之米然可以推見人情誠價貴有利則境内之米亦必不煩告戒而自出矣常平所謂增價減價者葢就時價而稍增減之故曰價平而止若豐凶獨守一價則何所用其增減而又何平之有哉夫以官府之粟無愛於民猶必隨時低昻其勢然也况在民者乎今境外之米或不可望境内之米亦宜用時價而少損之庶幾民之從之也輕其猶有不從者然後勸粟之令可時下也其二曰勸粟勸粟者亦平糴之意但其權稍出於上所以開民之故吝教之以相生相養之道亦善政也愚竊以為勸粟之意本欲以有餘補不足也然凶年非巨富之家鮮有餘粟中富以下則足以自給而已責中富以巨富之事是使舍其父母妻子之養而養人非補助之本指矣江浙之民其貧富以田為差故欲辨其産者惟按其田則可知也愚以為諸有田數十頃者為定其高下之差使以差出粟官為主其價用時價而稍損之若今所謂勸借者則粟有定數猶愈於鄉民無已之求也輸之於上猶愈於人自為政之舛也如是民必樂之其五頃以下至一頃者勿賦以粟而亦不得受粟此其與責民自料其産自出其粟者相懸矣葢使小民呈報則有賣富誣貧之奸使富人自糶則又有冒妄不實之奸而其甚可憂者小民羣軰自入富人之家争以攘奪為事法不可勝則為亂之漸也此俗一成中人以上人人自危矣又所謂饑民者謂其無田可耕無家可倚而今皆椎牛釃酒攘袂奮臂相與約誓而為饑民而其無田無家者反不能自列於上則是善人常飢惡者常飽彼惡少年不喻上之徳意方且以為衣食之本惰其所有事而趨之傷化之大者也其三曰閉糴閉糴者非先王之法然今之郡國各有分地人惜其粟人愛其民百郡皆然而一郡獨否則病何者無入而有出也故閉糴亦為不得已之政愚竊以為天下一家均為生民以百郡之廣必有有餘不足之處因而通之則俱全之道是以先王禁遏糴也四海譬一郡一方譬一縣方今閉糴之政在列郡行之則不得已也何也以他郡之政他郡制之也在縣邑行之則仁政必有壅遏偏枯之患矣何也以一郡之政制於一人也就一郡而言之則諸縣豐歉不同矣譬之决渠水以救涸澤渠雖稍減澤亦得滋水平自止渠澤兩利非必竭渠以附澤也凡人之情先自為而後為人誠使五縣之間各得通流相為出入則其出者必有餘者也入者必不足者也不待為之却慮而民自得久之則五縣若一仁無不貫矣愚小子竊惟涓塵以必赴為勤海嶽以并容為大伯宗多知而梁山之議乃效於將車之役夫威王明主而治齊之理乃發於自售之醜女古今大賢若此者非一葢議有不可用而言無不容則人自竭而理畢具矣伏見明公哀矜之心浹於窮民明威之治訖於豪猾令無不行法有必用將以兼舉周官恤貧安富之政而并包五縣之民此千載一逢也故某自忘其將車求售之陋而欲有獻於深哲逺聽之前誠珍莪子而昧太牢矣伏惟明公矜而察之幸甚明文海巻一百八十
