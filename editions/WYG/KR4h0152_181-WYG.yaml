body:
  text: 明文海巻一百八十一餘姚黄宗羲編書三十五籌逺答王檗谷中丞張岳解户至伏承教言備審近日起居之詳不勝慰藉真州終非久居之地祠堂婚嫁麤畢似當束裝歸莆然莆無舊業而世態紛華要之珍膳醲味之中亦當有梅蓼一二味存其酸辣乃有風趣爾此道不於吾老先生之望而誰望安南之議士大夫譚之數年然皆出於一種喜功利尚權譎者之口沈靜守道者初不譚也大抵近世學術不明㢘恥道喪士大夫徃徃犯見金夫不有躬之戒其所操之術皆管商秦儀之奴隸所不屑譚者而妄托以為經濟自媒自衒且不論三代何如孔孟何如就我朝成化𢎞治中前輩亦有如是習尚邪孟子曰我亦欲正人心息邪説距詖行放淫辭以楊墨為禽獸儀衍為妾婦闢土地充府庫戰必克者為民賊而善戰者又服上刑聖賢之言良非迂也西漢之衰士大夫柔巽之風終不足以勝其經術節行之美故漢能既廢而復興東漢之衰士大夫氣節之高一變而為詭激縱横之習故漢一敗而不能復振由是觀之天下之盛衰不外在四裔而在士大夫心術明矣且就今日四裔言之士大夫果有深謀竒略能為國家建萬世之䇿亦不在於安南何也秦寧三衛肩項之疾也河套腰脅之疾也若安南則膚爪之末爾舎肩項腰脅而治膚爪失其等矣昔人有畫狗馬難畫鬼易之説三衛河套形勢切近一言不售則其術窮安南逺在萬里徼外未必便有實事謾為大言爾其守方拘文自知不足以料敵應變竊恐今之譚安南事者大抵多半畫鬼也次崖初到此慨然有勒功銅柱之意某屢勸以且去孔孟故紙堆中尋箇安身立命處馬伏波一時之士殊不足學今亦知其難不復出口矣某前年八月抵此將及兩載多病兼以吏事素非所長旦夕俟以㣲罪訶彈而去歸卧林下儻老先生歸莆得以侍杖屨領誨言平生之幸也未有奉教之期惟倍加珍攝以副注望不一奉朱砥齋僉憲書許烱僕惟天下之事惟智者為能謀勇者為能决故審勢而計者智士之慮也見可而斷者勇士之行也昔者劉項之際可謂急矣而留侯投之若左右手亞夫不畏七國之强而喜於得劇孟夫破險扶危乘時争利惟豪傑之士能謀之亦惟豪傑之士能㫁之而庸夫懦子方自安於無故之變甘於豢養之樂非可語於範圍之外者也當今之勢愚以為小者不足慮而大者深可憂彼以為無憂者固陋矣其以為憂者亦皆出於其小而未能及於其大也夫人之治世如醫之治病隂陽寒暑之變人所不能免也皆可隨診而得其情投之以藥無不愈者何則其病之所鍾者淺故可以條析而理也至於疑似之間似無而有似隂而陽醫者莫能得其情雖病者亦未易狀其所苦此其受病至深殆不可以旦夕治庸醫以為尋常而洞見肺腑者束手而去之矣今之勢亦大類此夫年糓不登而盜賊竊發亦治世之所不能無猶人之隂陽寒暑也然其中有不可知者盤礴膠固於其間治之而暫寧觸之而即發與夫當治而不治不當治而治者交錯而莫之能辨至於積漸養成雖有大奸㓙惡生於其中而未易去此亦衆人之以為尋常而洞見之士束手而去者故愚以為皆出於小而未及於大者此也今之為説者曰凡盜者饑寒所逼耳是固一説也然有既招之後美衣足食遊手好閑至有小忿輒結黨連朋呌號擊搏以發其怒市井細民備甘凌轢而莫敢較有司畏其生變而莫敢治是養虎也必咆哮於山林然後足以發其性雖華其闗欄豐其剖囓終不可近矣今之為説者又曰凡為盜者類至後悔招之無不服者是又一説也然習俗既成先後相效今之為盜者曰吾當招耳後之為盜者亦曰吾當招耳故於為盜而料於必招是下賊上之情也知其不可招而圖於塞責是上賊下之意也上下交相賊故雖有大奸㓙惡生於其中而未易去也愚以為當今之患非大懲創不可如防大川豈不遽止然其潰也傷人必多今之最不可為者是招撫之説也夫招撫者盜之所大利民之所大不利也剽奪財貨刼殺人民凌辱子女是國法之所不赦人情之所至憤者一旦招撫之説行而寃死者無所訴受辱者無所雪孝子義夫勇決之士無所復甘心焉彼其始為國法之所不赦而卒奠於衽席之安置於無虞之地豐財厚食照耀里閭甚非所以示民效也古之為盜者被戮辱今之為盜者受榮顯轉相倣慕莫敢誰何其間流弊吾不知其所終矣或曰招撫之説古之人皆用之今何為獨不然是所謂得其名而忘其實者古者用兵取其鯨鯢以為大戮而其脅從之輩束手貫耳自抵軍門以丐餘息故為將者憫其陷溺與其自新故曰不殺已降此古之所謂招撫者也今之所謂招撫者畏之耳為其所脅耳無可柰何而為之耳彼為盜者兒視官長草視良民頥指氣使無不如意未招而肆行無忌既招而長惡不悛鼓惑愚民潜結兇慝無事則羣飲敗度有事則横潰莫支故未招也盜在山海而人猶可避既招也盜在市井而人莫能逃葢招撫之説官之以為利而可見者徹守備罷支停簿書而已耳而其不可見者良民被毒申訴無由寃憤之氣結為災沴是皆上之所不及見者也而惡得以為可哉或者又曰招撫之害誠亦有之然今羽翼已成卒難制禦欲且緩之徐圖其後是又腐儒懦弱不知兵之説者古人用兵有以寡敵衆者矣未聞以衆而畏寡者也且為盜者貪近利而忘逺患非有長久之計顧治之者類不得其術故反為所困而無成夫以百餘烏合之衆而皆昏頑無識之徒内逼於隄防外危於波浪苦鹵之地難以久居不得水泉坐見困渇備受衆害計當易擒而吾連千百之兵聚數千之糧器械之精明起居之便適百倍於賊而坐消嵗月與之相持分寸不能有得此亦可見將兵之無能而時事之可惜矣設有大於此者其將何以禦之而或者猶欲以招撫之説用是直所謂不知兵者也答周友山弭盜張居正辱華翰佳布之惠深荷雅情且諗憲從即駐寧州因以彈壓姦宄拊綏善良甚休甚休葢聞聖王殺以止殺刑期無刑不聞縱釋有罪以為仁也茍子之不欲雖賞之不竊此孔子箴病之言是時魯失其政寵賂滋彰故言此以警之若謂徒不欲可以弭之無是理也夫人之可以縱情恣意有所欲而無不得者莫踰於為盜而秉耒持鋤力田疾作束縳以禮法世之所至苦也安於其所至苦無所懼而自不為非者惟夷由曽史為然今不曰吾嚴刑明法之可以制欲禁奸也而徒以不欲率之使民皆釋其所樂而從其所至苦是天下皆由夷曽史而後可也舜不欲之君也臯陶不欲之相也大舜之君上古之世猶不能無明刑作士以威之况今日乎異日者有司之不敢捕盜也以盜獲而未必誅也不誅則彼且剚刃於上以毒其仇而合其黨故盜賊愈多犯者愈衆今則天子提綱維於上執政者持直墨而彈之法在必行論者乃不惟堯舜之所以致理而獨用懦者姑息之説以撓之其毋乃違明詔而詭國法乎執事當弭盜之任而華翰所云又似不狥俗以為是非者故敢畧陳區區惟髙明裁擇焉與蔡半洲書鍾芳鍾芳頓首啟自謝事歸後杜門養拙無豫外事獨念故鄉多盜桑梓嬰情今春往崖省墓東經陵水縣牛嶺以南節報刦殺人牛擄掠子女包圍鄉村皆所目擊感恩一帶亦復如是小民不能申訴官兵巧為扺飾上司無由得知崖州感恩陵水三處地方官民素無田土與黎相近哨捕等官無黎田借口却妄指被害者曰彼有黎仇彼欠黎債彼因醉失物彼爭田仇殺彼乃外面強盜截害非黎賊也其弊起於畏罪避注故寧忍小民寃死皆托故不敢明報法愈嚴而弊愈甚矣漢武帝末年盜賊滋起作沈命法盜起不發覺覺而弗捕滿品者二千石以下至小吏主者皆死其後小吏畏誅有盜弗敢發府懼累亦使不言故盜賊愈多上下相匿以避文法及光武時羣盜並起遣使者下郡國聽羣盜自相糾擿五人共斬一人者除其罪吏聽以擒討為效其牧守令長坐界内有盜賊而不收捕及以畏愞捐城委守者皆不以為負但取獲賊多少為殿最惟蔽匿者乃罪之於是更相追捕賊並解散此二事均為治盜而立法嚴者反不如寛何耶葢寛則人各自奮雖或蹉跌而無失事之虞巖則自保不暇何暇治賊光武之法未必盡善而獨嚴蔽賊之罪􅇰切事機先年本道王憲副檵到任年餘輒報寧靖及巡歴至崖遣土舎峝首分投招賊以里老質當出官措牛紅賞勞曽未出境而賊愈恣横葢海外地方賊所畏者兵憲衙門耳今既按臨赫赫却乃賞以奬之名曰招撫其間正賊不出而出者非賊被其窺破籌畧不過如此誰不樂為賊哉及崑山王憲副倬兩度巡歴至崖密調土兵鵰勦千家大村僅戮三人曉諭傍峝莫不震懼賴以靖謐者十餘年去任知州陳堯恩因東黎一小村暴横調土兵撲之示以威信不殺一人曽無寸鐡斗糧之費而外裔聞風懾服南山千户萬人傑昔承本道宻批假以捕獵勦一小村而境内大治葢其倐徃倐來因賊之所以㓂我者還以治之故機潛而不露事易而不勞所懲者寡而所威者衆也自此之後將領不畏賊而畏法怯懦者無罪勇敢者䝉辜以巧飾為竒謀以䝉蔽為上䇿哀號滿野無路申訴誠可為流涕痛哭者矣為今之計莫若選委得人寛其繩勒不以盜賊刦掠為罪惟以相機截捕為功不以擅調兵欵為任惟以撲賊無虞為貴招撫支吾者弗録隠賊不報巧言抵飾者必刑中間機宜妙用弭盜安民有陳兵憲新任奚待贅言惟是職官功罪激揚操縱重輕之柄掌在節鎮其初委任指揮等官取英鋭而舎腝弱及地方失事英鋭可用者先受禍而腝弱無為者享安閒之福故智者寧托病自逸而差遣毎患於無官鄙言出自為民痛苦迫切一得之愚絶無分毫私意而情之委曲尚有未能盡者伏惟留神埀察不勝幸甚明文海巻一百八十一
