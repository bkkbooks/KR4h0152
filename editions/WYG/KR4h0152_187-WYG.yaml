body:
  text: 明文海巻一百八十七餘姚黄宗羲編書四十一忠吾與友人書王縉僕自成都接見以來即以情事未申為請幸執事上奉賢王之㫖以斯文之故惻然見憫衷情懇欵恩禮有加及來普安之後館穀之豐復假之以推引之重顧僕愚陋誠何敢當然僕亦切思所以報之者而未得其説伏聞君子愛人以道故有責善之義規戒之言今僕亦欲効古人而陳之苐未知執事以為何如也僕竊見執事逺回人情懽洽故多置罇爼以相慰勞而執事天性諒直凡飲必盡其情數日以來宿酲未解又啟新筵薰陶醖藉無復已時致使食氣不勝而所存者不過糟粕麯糵之餘耳况復益之以它感所以成夫前日之疾僕愚以為若不痛加懲戒其害恐不止于此也且聞古製酒之意殆不若斯書曰越庶國飲惟祀德將無醉孔子曰唯酒無量不及亂故為一飲百拜之禮使其終日飲酒而不得醉也今之為禮則不然以泛滿痛飲為能事以沉酣吐哺為忘情否則訕其矯揉矣怒其虚詐矣由是即席則思以沉醉為度豈知一醉之後精神潰耗邪僻乗之言不成章行不成步輾轉牀枕呻吟達旦有數日而不解者有成終身之痼疾者且人禀天地之中以生至貴至重上為父母之遺體下為妻子之仰賴況有身膺國家之爵位寄生民之休戚者其可捨仰事俯育之責而快口腹之欲哉或論人享富貴無所用心姑假酒以為樂耳是大不然夫天下之可樂者豈特酒哉司馬君實以園池花竹為樂歐陽永叔以終日在書案為樂范仲淹以後天下之樂為樂其樂雖不同然未嘗及乎酒也若夫劉阮􅄞山之徒乃放逸縱蕩之士其眈乎此不足道也僕嘗記元某宗嗜飲其臣有指酒槽而諫者曰此器木之所為被酒所蝕尚致朽腐况人腸胃至柔豈有不受其害者某宗遂引滿痛飲而覆皿終身不復御未嘗不歎其勇于為戒今執事精通古今旁及脉藥知事物之本然識榮衞之相感豈必待于子言然察執事之意但不欲拂人情故曲順之耳豈知吾身受患于彼無干詩曰每有良朋況也永歎伏望執事暫節數日以試驗之若不飲而勝前則請終絶之可也若不飲而猶然則復飲之尚未晩也子夏有云信而後諫未信則以為謗已也而韓子諫張僕射擊毬書亦以為諫不足聴者辭不足感人心也今僕之言未信于人而辭不足以感人心也明矣苐以見愛之深故復喋喋如此惟加恕納不宣答唐荆川書劉繪京師自得灣中手札無便通記王翰林懋中還乃具動止知居宜興山中躭幽寂避人事庶得澄養神駿也聞居山中雅好弓矢盡悟開闔之巧挽强達疏乍聞不信後言者交至知兄聰靈靜蓄有術氣充力倍加于徃昔鄙意不覺歡踊矣辱多謬愛徃徃遇士夫過為推與以是京師見者雖未交識莫不増顧今在渝州見曹子東亦傳論及胡仲望来又䝉寄聲眷懐懇懇不我遐棄萬千感懐莫抒衷愫弟嘗思古人既不可友古道徒為懸仰道途詭易聲利相援今之隆友道以引善類而去卑習者得如兄有幾人邪人情好髙而惡聞善好勝而憚進修兄負竒雋之才而冲虚并容今之屈已下人而孳孳力行古道又幾人如之邪以弟之狂當兄之髙明必不為佞邇復聞兄憤他族强悍數逼京邑每當士人喜為雄談有請纓仗鉞之志聞者相傳靡不壯之且欲盡覽西北諸邊形勢牆砦阨塞可為臨事屯兵結壘麾羽仗䇿横掃強敵計彼以忠義勇㨗綸巾若孔明輕緩若元凱持箠彪哮之衆鞭𤣥漠名王其賀兄封侯之業者固多矣弟竊疑之徃古英傑立事皆有定數人生成就必有倫類此須洞窺𤣥理而不可以勝氣乗之焉今姑借漢初人才為喻昔張良握計無韓信畧地之勛蕭何餽給無曹參野戰之力絳灌少文陸賈闕武叔孫抱鼓成綿蕞之儀得行其儒學也婁敬脱輓定關中之䇿獲售其遊談也彼天啟佐命咸以英産絶足率操一藝博樹立前後未聞有能兼者也其後賈誼文學請典屬國以擊匈奴鼂錯對䇿自獻法令以削七國至揚雄本辭賦乃耻鉛槧以假符命之妄劉向本經生乃記黄冶以結主上之寵四子中持未定移易本業以希景運貪竒功率至喪名傷敗可悼也已今兄以明經起家早登上第主上嘉之儒林慕之不可謂之竒遇乎前以奏記不合海内英髦俱仰氣節爚爚矣今宜居深山益肆力舊業他日朝廷時置經局辨議整史籍殘闕其舉鴻典大儀遐稽古制裁定羣論必不能舍兄也即不搆㑹可以疏徃哲之奥言明羣生之性理著書以肇来學而名業熖然繫聖賢之籍為一代鉅儒其仰報君父之恩豈不閎哉若霍去病匈奴未滅之恨馬文淵馬革褁尸之談彼其抱氣業術有自来矣兄試裁酌便示惠音如何答友人書薛蕙辱惠書并示春秋或問三經説數篇讀之累日不勝欽服世之溺于所聞之士如執事之用心者寡矣執事謂孔子六經焚毁于秦漢世無能釐正宋儒傳義尚有牽合附㑹之説欲黜其偽而補之且譽僕為當世知名之士使評其是非執事之為書其獨見自信盖將度越厯代之儒者而今世之寡陋如僕者執事顧就而問焉僕誠惶愧而不敢答也然厚意不可虚辱試誦所聞而執事擇焉夫六經自秦漢而後其殘缺錯誤多矣盖非孔氏之舊也而凡古之載籍亦皆逸亡其存者多偽書焉儒者生于數千載之下不獲見聖人之全經復無古之載籍可以為證宜守夫子多聞闕疑之訓學其可知者闕其不可知者如是足矣不然是臆説也傳曰疑事無質况聖經以臆説決之可乎六經之大義自宋儒發明之思過半矣中間不無未當者不害六經之大明也至于諸儒議論同異亦各有所見當並存之以廣異議非可以一人之見廢之也程子謂解經不同無害但𦂳要處不可不同盖謂此耳然區區復有所聞敢為執事言之夫古之君子學成而後立言其言也為道之不明也言以明道為主則其言不得不約故古之為書極寡後之君子學未成而先立言其言也為名之不聞也急于知名則文章訓詁皆襲取而為之言之當否不恤也故後世之書極多雖然以亡當之言而致虚偽之名此可得于愚人爾君子之論謂之何哉今執事之書非為名也盖欲明聖人之道也然程子有曰學也者使人求于内也不求于内而求于外非聖人之學也何謂不求于内而求于外以文為主者是也學也者使人求于本也不求于本而求于末非聖人之學也何謂不求于本而求于末考詳畧采同異者是也是二者無益于身君子弗學然則君子求聖人之學盖有在焉非在于文章訓詁之間矣竊又以為聖人之學未易遽言也有志于學者宜以論孟之書取其切已者講明而踐行之若夫六經之義姑徐徐求之未晩也此不惟初學自治之方使世之儒者果皆從事于此則人人有君子之行雖不治六經而六經之道不逺矣若後其身心而徒以窮經為先雖真得秦火未焚之經親聞夫子筆削之義亦何益之有執事著書立言不過信今而傳後僕之言倘不甚謬執事其取之以告今之同志亦信今之一端也上楊䆳菴先生辭入内閣書張治道盖聞天地賴閉塞以成功聖人倚收藏而顯化故孔子不强仕于返魯孟軻不再進于去齊何者去就之義明君子之道行也恭聞老先生執事負伊周之才際堯舜之世三朝頼其倚弼四海遵其道化秉鉞持衡覃謀𢎞慮可謂極矣繼而遭遇權奸遏而不行雖青蠅貝錦之讒不能有加而于進退光明之道終亦未盡既而皇上臨極索羅耆舊而謂鴻才碩輔無踰我執事者夢想于朝物色于野恩休踰天詔㫖如春海内以為執事功已成矣道已髙矣枕藉丘壑不可以出矣既而幡然就道輿疾臨戎戾天地閉塞之義違聖人收藏之道雖在門牆之下者不能不疑于出處之間也繼觀謝表未成安攘之言勉效韓范經畧之意又云不大改絃轍無以作新士氣不力任怨怒無以奮起事功乃知進退得孔子時中之道符君子大觀之心伊尹不鄙要湯子文不嫌三仕之意也及觀抵邊以来功業未成而事機掣肘始薦楊宏逆而不行繼論邊儲遏而少遂大勲未建而口語相侵海内將謂髙明見小試不行則大功可卜知後效難圗則今日可去而執事尚復無聞雖庸劣小子如治道者亦不能不疑于執事也近聞復降詔命取迴内閣人皆以為慶獨治道以為不然竊觀今日之事勢與執事之心其可去者有四而不可留者有二四者在所必難而二者尚未可望敢畧而陳之惟髙明擇焉且皇上以宗藩入統聖德秉治有堯舜望治之心無周召輔治之臣起執事于江湖之逺而付以全陜之地恩命雖隆而神交未符敷謀雖切而聖心未契矩跡雷同而魚水可言建議非常而風鴻未信此可去者一也天下之事未嘗不成于相讓而敗于相害道義相讓稷契所以成功功名相害蕭韓所以罹禍今日之事故敢望稷契之相讓于執事焉此可去者二也綱紀大壞不可收拾處常則不盡才猷建異則輒來口語與其衡而持其權功成則衆疾其能事去則獨䝉其詬此可去者三也且執事嘗為冢宰矣嘗為内閣矣不能以此時免讒謗齊人心安其身于朝廷之上而今乃求難獲之效于再進之餘諺曰百步之矢不穿魯縞而執事之功與名不止于百步之外而天下之事難于魯縞此可去者四也其二則朝廷倚托不可負蒼生屬望不可孤斯二者此臣子之所以負毁而忘軀者也治道以為不然聖人之道期于必行君子之功樂于無損然道不虚行行于無妨功不虚成成于無阻無前四者之害而後可以成兹二者之功此周召所以成名于文武欲成兹二者之功而昧乎四者之害此蕭望之所以殺身於西漢惟執事亮察之倘遲迴眷顧再進中秘道昧止足行乖難進竊恐臧倉肆間委命晚矣治道以晩進之士而不得入執事之門牆亦嘗側聞執事之懿風矣好謀能聽不棄蒭蕘故敢效孟軻氏説大人之義披情素于堦下惟執事恕其狂愚少加容察則一得之愚不能無少補于執事者上三宰相書李黙僕聞士遇而獲信于天子其不遇而幸信于天子謨弼之臣今陛下明聖僕何患不過顧事有偏繫勢所難投慮非執事不足聞此昔孔明治蜀務集衆思廣忠益且下教曰若逺小嫌難相違覆曠闕損矣又曰有能忠于國者亮免過矣僕謭昧鄙人豈曰能忠至攄忱效愚所不敢以小嫌自避則奉教于君子矣孟嘗君使楚將受象牀登徒子懐德色而諍之曰吾得寶劍以獻也古之人樂于成人之善如此僕猥辱甄收使奔走咳唾之末豈不以德重岡陵義足淵海然而旅進羣退依阿取容非執事所許也敢縁所䝉念存斯義唯執事聽之比者陛下降發中之詔修翊戴之功執事首膺異數進秩諸侯可謂曠世雋談矣昔二虢不辭兩國之任旦奭不讓齊魯之封其功大也誠在優宜不為過侈然而外内譁然不浹衆懐其説有二小人曰相公汰冗食正典禮義不假于君親而乃自利其爵為君子曰相公畢命之臣無利之心雖然三子並拜而宫掖乖五王並封而武氏横相公不鑒功名自此去矣夫小人之言懟也君子之言愛也懟者懐固其私愛者要成敗以為説也夫是命也執事謂盡出上㫖哉即不過左右慿藉以階寵耳意其伺上勵精倚毘遺耉難以得志獨計所嚴憚者二三宰輔與臺諫數輩耳乃者適覯兹隙遂託焉以逞以為是足以羈絏之矣觀其叙列吾黨不及三四而此輩已居八九則其情狀先已敗露矣先帝時左右謬寵奸賞動及圭組濫爵一開使八柄遂入二五之手干命之禍幾至土崩雖其肇孽不可比類然究觀今日之勢欲至此無難也昔寜彬輩陷先帝降號淫遊慮朝議不從乃大賞勲舊而下而投之餌雖諫疏屢臻而依違者衆竟使先帝不終正位至今切齒所不忍言此執事所睹記也詩云殷鑒不逺奈何弗慎曩者執事釐復舊政所裁武員刑餘軍役不下二三萬頃又用諫官言沙汰僧道洶洶未定京師之人大半此類積怒懐訕已非旦夕頃見執事膺此懋典遂羣起側目謬生誹議夫一人之身而當衆怒之衝竊為執事不取也昨者稱號之典執事據禮執議反復十數雖曲加遷就猶非宫闈之意萬一上春秋長盛猝有媒孽其事引據祖訓搆貪天之言執事何以自固今陛下仁聖樸誠周防矢義然執事一忤之後此輩妄有希冀執事能復忤之乎僕慮正色難矣即有否也其搆忿殆不可測僕念君相未交釀亂方自此耳為執事竊計不若守奉祖訓堅自遜避決去就之圗諸所䝉恩亦宜正言裁罷庶幾人人知吾謀國之心雖至其身奕世之業猶將棄之上足以結主心下以謝市里之謗而中以破憸壬之奸使之屏氣攝息不敢恣肆然後天下之事可為也邇來執事累疏抗陳冲心光大然時未獲命物議未孚以為姑徐徐取之云爾且有病執事包羞之語者誠執事所宜急圗萬一持久間有絓誤妄少指斥虧損大矣夫皎皎易汚嶢嶢難全可不畏歟今執事勲藏盟府福澤在黔黎子孫自宜世食其報永永無替奈何獲此而後為貽謀耶昔仲連説趙却秦軍平原持千金為夀連曰即有取者是市井之事連不忍為也後世稱播仲連之義且執事勲勞孰與魯連茅土之錫孰與千金然執事猶且蔑之令聞廣譽豈有極也僕日夜詭量敢以介推之事妄意規切獨時念國事至此憂防甚重輒忘狂悖畧其讚述謬稱縷縷之愚所恃執事休容無以下體黙皇恐再拜戒弟書侯一元夫係蹄不解猛虎決蹯危疚在前孝子進藥非不痛於身蜇於口也愛有所至情有所不得不然凡熟諫之道異於責善義方之誨别於忍心如使畏不祥而曲阿慕怡怡而順非是以一蹯之痛易其七尺之軀不忍乎介然之苦口而自詒罔極之恨也豈可謂知類哉克已之難自昔而稱之柔曼之傾意尤其難者也故女戎禍水聰明之主以自誤而吳姝越艷智術之士亦以誤人譬之鬼物之惑人始者必有以中其意使如膏火相滋不盡不止方李赤之惑于溷厠也所見無非清都麗宫妖艷苾芬者欲以區區之辨易其所見豈不難哉彼死而有不恤而欲陳之以毁譽利害不亦末乎故苦藥所以已病也苦言所以去惑也醫經云疾有不治者二不可藥一不治也可藥也而不受藥二不治也始之以不受藥終之以不可藥此忠臣孝子慈父友兄所為流涕長嘆而呼天也衢塗跬步而揚朱哭之跬步之失何足哭也然至其千里也則又不及哭也詩曰何嗟及矣是也曲突徙薪以告燕雀燕雀其信之乎然而有必至之勢其不至乎焦爛者幸爾吾前所謂啖野葛飲酖而不死者也古今以来獨一曹公奈何以不貲之軀天地所畀父母所遺試之猛獸毒藥僥倖於萬一乎夫文人無行非謂固然惜其是文而廼是行猶言斯人斯疾云爾古今文人獨一司馬相如哉屈原之忠為詞賦祖賈誼升堂漢之彦也昌黎東坡唐宋名臣人非堯舜誰無小疵然必立行大節不踰斯為君子至如孔孟左國經史之文何嘗不妙絶天壤但不可以文目之耳假令天壤間不生司馬相如無其詞賦何損於治何傷於藝林哉且相如文傷靡麗故前輩謂其類俳而武帝亦徘畜之此何異奕秋丸僚以一技垂聲者耶昔人謂九原可作吾誰與歸區區雖未敢妄意九仭之門至於及肩之牆不願託足常思執鞭叔度對嘯孫登相與遊於無言而或發於不得已則纚纚洋洋為寒餒帛粟疲瘵鍼石即不能然猶欲鳴其心之所藏如春蟲秋蚓宣寫和氣自得而止無用雕蟲殫極侈靡淫泆如相如為也今人固無相如即有之吾亦不好文且如此況其行乎而聞以卓氏事自解此大謬也且卓氏事相如寜慕其色耶臨卭令謂相如窮困幸來過我而王孫竒貨可居故謬為恭敬以相如壻之耳已而果大得其財為富人馴致以貲為郎顯于漢庭則相如本意不在文君甚明讀史者忽之耳如令相如反效其貲財重幣卑禮以求失身之文君吾知相如不為也若為之則其家徒四壁者不將愈甚轉入溝中乎狗監未薦天子不聞獨與失身一婦人無用之書數巻而何適矣然則彼雖失行猶為身謀今杭州諸公慕之名實兩失無相如之利而有其累難以言智矣位尊家温者其患遲位下家儉者其患速不觀之膏火乎雖同于灰燼而膏之盛者後亡亦理也惑者或曰膏雖竭我能續之燎雖息吾能揚之商賈恃什一之利士大夫仰俸禄之賜而能文善逰者資朋友之助此其所為續膏繼明之術也悲夫吾所為碌碌服賈致身䇿名抒思竭精者寜為區區一女子哉武王不斬妲已乎且好色人之天性不知子都之姣者無目者也而詩人如雲之棄縞衣之樂豈其性與人殊哉誠富貴有羡金餘帛何不自置妖姬深宮自娱猶未決裂男女之坊解絶亷節之維求之縞衣綦巾亦其次也夫巫山之雲朝暮而送人河畔柳枝如林離亭之泣如雨計文君之所當豈一司馬相如哉前袂未分來人復結是何異蹴珍餌行道之中䝉袂者猶唾之而聰明之士顧甘心焉何也盖婦人有挾媚道者其術如鬼神使人神眩目昧而不自制漢史徃徃見之吾意倡優之家其有傳乎不然何顛㝠之衆而覺悟者之寡也商賈負販縉紳之士無知愚小大銖錙而積之胠篋而委之甘心効其力沒首而不悔夫左右戮力治生以奉其主者奴也左噬右搏得狐兎以効之人者狗也今倡優挾邪術媚道奴畜犬豢天下之人坐食其錢財而惑者猶然不悟一旦商者折閲亡其什一仕者失官亡其資財始匍匐而無所歸爾猶曰相如愛文君豈不謬哉吾觀今世文士類多虚名昨所觀其人歌詩草書圗畫其品至下而能盜虚聲者正猶下里巴人一唱而千和也易世論定之後吾不知其人當在相如詞賦之科否也恐不能過李赤李赤詩賦固在廼能與李白相亂而因循失足為厠中蛆後世士羞言之況若人者乎夫蜩鳩之翼難以圗髙蜉蝣之衣難以持久故附鳳者千仭附驥者萬里彼悠悠盜名之士安足榮其咳唾而與綢繆應和哉相如之事既其意指不類斯人又西施之顰不可慕效姑效其倩笑者可也觀今之文士非特盜名乃亦盜利故辛垣髙魯連以其無求鄒忌不信賔客之䛕以其有勢勢移利盡雌黄隨變吾觀今世柬書利遺傾肝相示語卒未有不涉取求者也此其交游歸趣大體可覩矣不待交解於張公子而龍陽之情已暴於後言矣凡斯之類不可殫陳區區今者藥石之獻惟在靜諷六經四子閉門謝客使天機有雨露之息則以子之才如寶鏡拭塵邪魅畢燭刀刃發硎向之繚繞游絲而斷之耳以相如之文明鄒泗之道以周南之窈窕易巴蜀之奔亡斯亦生人之至樂也於子何如楮短意長有言不盡明文海卷一百八十七
