body:
  text: 明文海卷一百九十餘姚黄宗羲編書四十四忠告上唐荆川尊師萬士和人之相與可以盡言無隱者莫若師弟之間然先生每若某之難悟而某亦不敢輕進一言何也某之難悟則以性鈍而心散包蔵怠緩之意多而磨勵真切之志少是以每到病痛便學難醫此某之不能承受處也若某之不敢進言者則有二説先生每事皆求定見其見一定信之甚堅而持之甚固即有學識與先生等者必不能回其既定之見而况萬分不逮者欲置喙于其間豈非跨海涉河而使蚉負山乎先生聰明盖過一世凡有言于左右者不待其辭之畢而己洞見其所言之情皆不出其料度之内是以視之也甚易而動之也甚難夫信之堅而持之固則人必不樂告以善雖無拒人之心而不免有拒人之勢視之易而動之難則于庸言近論無一愜意而取快于非庸言非近論之間由是好為新竒以上下其游辭托為異術以文飾其膚淺者時時中其巧而使得售其奸此二説者某竊妄意其如此不知其然耶否耶倘先生不以為然則和雖淺近無知得以盡言而無隱可乎先生身所擔當直欲為宇宙間創開一路續從來相傳法眼心源以鍜鍊而通融天機以無欲而昭著豈某之所可窺測某之所欲言者非敢議之于精㣲之際而直求之于形跡之粗耳所謂求之于形跡之粗者亦有二説好尚之少偏應接之過當也先生于同氣相求處甚為懇切故欲其意思之慇懃而嫌其形跡之疎濶是以窺伺者常滿望而忠信者常見疑某雖癡戇然常謂先生之意可以探而取也其人之未見也而謬為恭敬則不問其可否而皆得以親厚其既見也察其指意而虚為好語則不問其言之真偽而皆許其由衷徐而察之而非親厚也非由衷也乃推而逺之然而向之容而受之者吾心已為之乍喜矣其待忠信之士一事之過差或由于詿誤而槩其中心一跡之或疎本出于無心而疑其叛去徐而察之而非中心也非叛去也又容而受之然而向之推而逺之者吾心已為之乍怒矣其乍喜也不但行于矯飾不正之徒而或及于智慧有餘之士其乍怒也雖不施于光明磊落之軰而時及于中才以下之人是以人之交于先生者若賢若不肖當其容而受之也其熱如火及其推而逺之也其冷如氷故某常疑先生之用人未必皆心腹之賢而賢者之用于先生也亦不能無不盡之嘆此豈非由于好尚之少偏有以致之歟君子之行藏視世之用舍而其憂世之心則不以用舍有異但當天地閉賢人隱之時可以有憂世之心而不可以露臧否之跡徒露其跡而無救于亂則東漢李杜諸人所為也某見先生凡接士夫絶口不論人長短可謂無臧否之跡矣但叩門求見者均之以是心至者也而先生乃或見或不見至于一日之内而有見有不見在先生固自有意非以見者必賢于不見者也而人之欲一識之而不可得者遽以為列於不肖之目雖面斥而衆辱之無以踰其怨也怨不怨於先生何足損益但于處世之道或者任情而不任理終覺未安耳見惡人以避咎與夫黙足以容君子委曲以處亂世者如是先生卷舒存亡之理籌之素熟而明哲保身處即號為智者不能如其慎宻然某不免于前所言者以其避之於幾㣲形跡之間而不曽求之于性質作用之際也某自渡江來有人以先生行事言者一以為握官府事權一以為有府官求見值先生飯客吏人已趨報而先生乃謹避之及吏人再至座客猶在也其前之所云甚俚鄙無稽可笑而乃出于故交項甌東之口豈非不肖有司因先生絶之太甚疑先生言其短而造為之乎其後所云則徃來于門下者所述雖某亦以為此先生之常也是豈非否臧太露而人情大有所不堪者歟此和所以為應接之少過者也是二者和又妄意先生所稟過髙性質意見之用多而虚以觀理物來順應之功少即此而徃恐終為功名氣節套住而于聖人之道畢竟有差從來相傳法眼非先生任之而誰任乎雖然此大率所謂求之形跡之粗者也井鼃甕雞何以為見而遽談天説海秪露出本相覺得見識之每下耳反欲以迴先生之駕而動先生之聽某之罪其又何可逃歟與湯海若闕名今天下方䝉䝉爾亦役役爾足下抱俊才髙調安之乎僕為足下謀明洞八埏吾守其黒氣壓三軍吾居其柔辨若懸河吾用其黙人知我則出所得相磨相勵而不尸其能不知我則擴此之竒涵彼之庸而立于無何有之鄉足下與虞葑丈方讀易坤之象曰君子以厚徳載物竊謂持之而不使傾捧之而不使墜任其踐蹈而不為動斯之謂載積之甚深養之甚固收衆流而不拒納羣穢而不辭測之莫得其涯窺之不見其厎斯之謂厚釋氏亦有言曰身為牀座遍三千夫牀座豈易為哉居最下之位而勞者待以安走者待以息牛羊踐之不加怒尊貴履之不加喜此善載物者也吾儕能爾爾乎雖骨肉至親稍稍蹴踏輒有憤心己則終日跳梁而怪人動色不惟不能載物而且為物所載不惟為物所載而且咎物之不善載我斯亦過矣此衆人通病而髙材能文章者尤易犯以其恃氣而卑視一世也僕與足下相慕頗深兹來也䝉足下招我惠我之殷勤顧我無以報以此謝足下不為薄矣明文海卷一百九十
