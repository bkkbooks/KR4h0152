body:
  text: 明文海巻一百九十一餘姚黄宗羲編書四十五忠告復董潯翁老師許孚逺伏承惠教纍纍數千言老師之神思可謂太勞而留念弟子亦太厚矣吾師以頽暮之齡受非常之侮不肖孚逺辱在門牆素䝉知遇而不為攘臂號呼其間者非人情也師何以憐之深而與之過耶苐世間萬事總是無常升沉進退得失去來如晦明寒暑之相尋無異故君子無入而不自得其見此明審也日中則昃月盈則虧茍為處盈而中虧昃必有所不免聖賢于此亦以為常然而順之寵辱不能驚哀樂不能入是其所以異于恒人者也人或謂吾師髙年履此蹇厄又數十載拮据創造之艱所為貽厥孫謀者若不忍親見其損缺嗟乎百年之前吾身且不知所自來百年之後吾身且不知其所從去而何有于身外之一物其亦何全何缺何少何多耶川竭而谷盈丘夷而淵實我之所失人之所得未為不可而况以富貴豢養之子孫投之艱難困苦之景象使其動心忍性增益其所不能又所謂生于憂患禍兮福所伏者也師之髙明洞然于此豈得絲毫芥蔕如恒情所云耶洪水滔天此振古災變而大禹惟行所無事卒收平成之功秦漢之間宇内鼎沸而張子房從容佐沛公定帝業又旋從赤松子遊委功名于何有古之聖賢豪傑施為作用類如此師豈難取法之耶弟子非敢為是迂濶之談實以老師今日全在自處有道完其天和以躋上夀其諸訟事紛紛一聴令孫處置與有司斷決可矣惟尊慈亮察幸甚别徐存齋張居正居正惶恐頓首再拜上書師相閣下居正即日南發逺隔門牆未一奉音徽竊念正自寒士非閥閲衣冠之族乏金張左右之榮弱冠登朝賴相公甄拔厠在下弟子深䝉鑒奬雖仲舉知深于徐孺中郎倒屣于仲宣未為過也知已之恩每懐國士之報假令相公興周召之業使如正者束帶立朝參制作之任或拾遺左右備九九之數雖不能使惡言不至門人加親然進奮短翮飛翔之用退效杞梁一介之死正雖至愚敢不勉乎小人命薄分過災生蒲柳之質一旦溘先朝露則終已無以報知奬之恩死有餘恨竊不自諒有惓惓之愚秋毫少效于萬一惟相公裁察焉相公雅量古心自在詞林即負重望三十餘年及登揆席益允物情内無瑣瑣姻婭之私外無交關請謁之釁此天下士傾心而延竚也然自爰立以來今且二稔中間淵謀黙運固非謭識可窺然綱紀風俗宏模巨典猶未見使天下改觀而易聽者相公豈欲委順以俟時乎語曰日中必熭操刀必割竊見向者張文隱公剛直之氣毅然以天下為己任然不逾年遽以病殁近歐陽公人倫冠冕嚮用方殷亦奄然長逝二公者皆自以神智妙用和光遵養然二三年間相繼凋謝何則方圓之施異用愠結之懐難堪也相公于兩賢意氣久要何圖一旦奄喪誰當與相公共功者況今榮進之路險于榛棘惡直醜正實繁有徒相公内抱不羣外欲渾跡將以竢時不亦難乎盍若披腹心見情素伸獨斷之明計捐流俗之顧慮慨然一決其平生若天啟其衷忠能悟主即竹帛之名可期也吾道竟阻休泰無期即抗浮雲之志遺世獨徃亦一快也孰與欝欝顑頷而竊歎也夫宰相者天子所重也身不重則言不行近年以來主臣之情日隔朝廷大政有古匹夫可髙論于天子之前者而今之宰相不敢出一言何則顧忌之情勝也然其失在豢糜人主之爵禄不能以道自重而求言之動人主必不可幾矣願相公髙視𤣥覽抗志塵埃之外其于爵禄也量而後受寵至不驚皎然不私之心上信乎主下孚于衆則身重于泰山言信于蓍龜進則為龍為光退則為鴻為㝠豈不綽有餘裕哉公孫𢎞有言人主病不廣大人臣病不節儉身為漢相脱粟布被良史稱之夫京師四方之極大臣庶民之表也自頃内外用竭習尚侈靡貧者䄈褐不完而在位者或婢妾衣紈綺百姓藜藿不飽而在位者或厮養厭粱肉此損下益上之尤者也誠宜倡之以儉視之以禮𢎞晏子狐裘之節覽詩人羔羊之詠庶儀刑百辟易移侈俗也夫天子有諍臣士有諍友故能動不失則故藥石猶生我美疢滋毒也端人直士藥石也令色孔壬美疢也然端直勁而難親令壬柔而易狎傾佞之人未語而唯唯未言而諾諾較德則擬于臯伊論功則卑乎管晏足使人志滿情逸受其面謾此髙允所以深疾閔湛謂其所營尺寸之間而貽崔浩無窮之害者也願相公擇士之端諒者使在左右資其匡輔聞其讜言亦鴻業之一助也夫士習者人才之關也自頃士氣頽靡亷耻道喪苞苴顯于贄雉倖孔多于亡羊乞温逐臭相煽成風豈可令明主在上相公在位而習弊至此夫爵禄賞鑒所以磨世也亷耻節義所以建標也爵禄賞鍳不足以激上才止可以勸中人耳然上才百一中才者多令爵禄賞鑒常歸之亷耻節義則中才者望標而趨矣迨夫清議已行士氣己振然後相公鎮之以無名之樸醖之以醇和之氣即大化薰蒸風俗長厚矣此相公今日所得為者若夫格天之業致主之功固非末士所與且愚䝉未諳故不敢言也夫翳薈之翔無以論九蒼之高蹄涔之遊無以測四溟之深相公德冠宇宙知兼衆哲而下走欲以管窺之見仰禆髙深不狂則愚且以下賤干非其分不知者以為預結于左右也然自惟受恩深重茍有效于涓埃即剖肝裂膚亦所不辭况恤其他乎古人之言曰近而不言為謟逺而不言為怨今將逺矣不勝感激縈積鄙懐臨發澘然詞不宣心仰惟相公清閒之燕垂察狂狷之言幸甚幸甚明文海卷一百九十一
