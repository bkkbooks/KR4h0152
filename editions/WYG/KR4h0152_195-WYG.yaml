body:
  text: 明文海卷一百九十五餘姚黄宗羲編書四十九出處上楊太宰書王雲鳯近聞執事晉位太宰竊為天下慶而不敢奉問者非敢效劉元城不通司馬公書之義也以時事多端每一把筆輒長太息而止近于咨文中始見陞少保益慶位之愈崇而志之可大行也山中屡聞忠讜之言近者留王昻一疏尤為人所傳誦不聞唐介初貶之時潞公有此舉也執事于是乎加人一等矣然介雖貶數月之間兩轉未乆而復其殿中侍御史今王昻既不獲還之青𤨏則推薦超陞在執事筆端焉耳他日秉史筆者書此一行豈不足照耀今古哉每恨李文達近稱賢相然惡羅倫淪落以死擯岳正坎坷終身而極貪之陸布政反得峻擢今文達之富貴安在哉一時快意可略也前輩影樣之多後人是非之公可畏也一人之私情可略也天下指視之嚴史氏紀載之公可畏也一身極榮極貴極富可略也且用舍之間士風所繫扶持正人則善類慶而士風一振奨進邪人則善類黜而士風以頽竊恐有奔趨富貴舚舕利逹之人相見之際非稱功頌徳之詞則乞憐求官之語未有以直諒之言逹于聰聴以古人功業望執事者故某敢布其愚焉某迂陋孤蹤疊辱薦藁委以巡撫重寄乆病殘喘豈堪任事向者臨歸寺中拜别妄有看不得幹不得之言此某之本心也況今兩耳全聾調治不痊只當耕田納税為畎畝之餘民養親攻書忘嵗月之不我與豈有夢寐更著冠束帶耶惟俯垂憐念縱猿鹿於林莽之外投魚蝦於浩渺之中使各得其性焉則其未死之年皆執事之賜也倘執事他日解重而南某尚當杖竹跨驢候門下於待隠之園或隨杖屨登金山之巔把酒酹江以弔千古之豪豈不快哉與王中書論致仕書周叙某致書益夫中書相公足下早間同列中能言本院有人駁張僉都及吏部所劾不能致仕者之事一時聴聞未暇悉其為誰扺暮有傳奏詞見示者乃知足下之舉也張僉都矯枉過直近于激足下泛引曲證近于諛非賴朝廷明㫁則未免于紛更矣縁前此掌銓衡者年老不知止足之道凡應謝事者曲為囘互復任庻已亦得安其位遂致亷恥之風盡喪故張僉都有言以矯一時之弊然已分輕重矣今之掌銓衡者從而振舉之所以為士君子出處進退之大閑也朝廷固已是之足下所引漢唐宋諸公若申公之徴不過崇儒胡廣之留何益政治張柬之有匡復社稷功而昧于明哲保身郭子儀以身係天下安危非可例論文彦博再出再入雖有相業豈免時譏惟孔戣累疏乞身韓愈上章留之不聞其不懇求去位而留也而㡬亦果終留乎若夫漢唐宋輔佐守成之大臣魏相丙吉蕭望之宋璟張九齡裴度李沆韓琦富弼范仲淹歐陽修司馬光諸公其節槩勲烈萬世之下所共仰者在當時果皆不能退乎足下不以古之數君子待今之君子而援引胡廣輩何其薄哉夫士君子行已立言必求近道而師古不可以意見輕徇時勢而為之足下自以為斯舉有禆助國家優老忠厚之風有匡扶大臣逸老不去之力而槩以中道揆諸古典果何如耶若曰其果耆徳碩望老成之臣聖主所倚毗誼不容不留而張已言之矣至其間代為推度隠忍不敢明言求去等語此又何也得非所謂近于阿附迎合者哉雖然足下所言盡始終全美之意養老尚賢之心察言者之可否罷糾劾之新例此亦不為無見足下年富學勤往日謬嘗從區區游欲相與勉進于道而思慎重守正也故輒此奉瀆燈下草草恕察不宣某致書上王天官書夏鍭鍭愚人也能自信而已故嘗見之自負而多失之信乎某之為愚人也某自十七八知自别于人而人已臧之矣至于今二十年矣自顧其身無不與者矣一旦至京師用是以自負傲而不求以踣子大賢君子之門今而後始知自信太過獨立無助者之不可也且以當今之世論在位之賢則宜一數而及公舉在下之士亦宜有我是二人者韓子所謂事勢相資者也豈可相應荅以傲而一不相求也哉公不求我則我當求公于此不求吾恐失于大賢君子之門終以逺去沒齒抱悔于無及然則宜何如其求之也曰求退可也求進不可也自獻于前為求進自獻于後為求退某今者不復噤矣得發口矣某于明公知有罪矣知自失矣前之意誠以謂大賢君子者任天下之望退處于家有司馬相公在洛之形今皇帝即位首念而起之置之大官之長又似商周夢卜之事職無不兼而知賢求士當其先又實行其事而有其名若是其必知我也雖無實而有名未必不徹于大賢君子之聰也而其也又或作為文章以相慕而具于天下昭昭乎而以稱遥遥乎而以談天下幾人知之矣傳之後世後世之人又将知之某之于公逺而天下後世将無不知況近而至乎公之身也哉是故不勤一跡不泄一字将以待人不欲自見愈望而愈不求益不敢出有似于傲故曰傲其實乃非傲也今而後士固自出矣大賢君子誠始知矣明見而實覩矣非向之所謂出于意料而未可必知之也又非若傳聞于人而以入乎耳也今而後惟恐其情之不足察其志之不欲伸也今而後吾知求歸而得歸矣欲終養而終養矣大賢君子者能容士者也豈復更求其罪以破其歸而以止人之行孝乎然則大賢君子其不欲待我也如欲待我固無不及古人曰亡羊而補牢未為晚也某今者實有望矣大賢君子者宜早擇矣答薛君采書張治道治道白君采足下治道僻在千里逺惠徳音把玩數日有踰骨肉窮逹異路親疎匪乖又自感矣切怪情懇意違未盡相知在他人則面受陽諾不復論其可否僕于足下豈容緘黙僕畧而陳之惟足下擇焉来音以仕事相勉呼其北上且曰君子之道無在不可行也此誠君子濟物之心友朋忠告之良道也然僕無約矢降城之功豈敢為離人蹈海之事祇以負性孤獨持行狷介不能與一世同其可否故脫綬秉鑱避毁離憎以自全耳豈有如足下所言者耶且事有所獨知不可一一與人告然又終不敢隠于君子之側者亦恱已為容之意也惟足下亮察之昔僕為秀才時飭操厲躬動期古人舉足蹈孔庭發言凌孟軻自謂蕭韓之事不足為仲産之功不足立也詎意畧試功為輙遭口語飬譽招䜛砥行速議仕事如此尚復容心吾今而後可以知矣昔僕為令時凡所施為冐不顧身竊見世之從仕者曲行隨俗以求容枉已順上以保譽心甚怪之執亷守介以立功耽善從直以違衆心甚樂之故去嫌逐好飬獨戾同欲使中道不廢不同流合汚也豈意志未酬而怨恨己隨行未立而謗毁已至使立功之心不興遯世之情轉放昔讀載記見閉門踰垣之事以為一節之福行非君子濟世之𢎞規自今觀之誠超世之見盡理之行非後人所能到也來書又曰流俗是非終有辨析之日是則固然靜言思之終違古訓見幾明哲之義嘗聞衆口同歸則堅金可鑠偽言三至則賢母投杼是非眩人自古為然俟其辨析葢亦迂矣況嫌疑之中明哲擇術疑似之間君子不處若欲飭行以葢前愆則已涉違道以憎多口況負毁延譽含垢求潔人豈信之哉昔在縣齋持法太嚴假借不行微弱懐徳高門抱怨報施之理固在今日今日指瑕議疵之人乃前日俛首頌徳之徒被摧遭抑之人也嗚呼怨荓之蜂迴螫固宜䝉叱之犬反噬則當今之嘵嘵何足怪耶又曰不須以高蹈為潔僕豈敢若此祇以進退者士君子之大節進則立功退則修已今古一揆賢聖同轍二者不明他何足貴昔孔子栖栖于春秋孟軻營營于戰國未嘗不欲濟世立功以表正當世及至女樂饋而聖政妨臧倉進而吾道沮雖孔孟用世之心亦不得不為接淅窮日之行若此者非矯世絶俗之為中行之道不得不如是耳僕雖不敢望孔孟之為進退大閑亦不敢不勉也夫豈以高蹈為潔哉又曰意今家居讀書著述必甚適意但乆之必厭不若出而行于四方資山水朋友之樂亦可快也僕非不知空言無補歷試多效自思意量淺狹不能涵情廣慮以免流俗之言則發其狂惑者屢矣于此弗止猶夫營營速謗招禍蹈難厯危所謂不有内患則有外憂者也諺曰失途不逺尚可迴足若一向冥行則乖違殊甚累羽沉舟積毀銷骨可不慎哉韋杜之南僕有舊田一區舊廬一㕓終南在前少陵在後潏水瀯于西龍渠遶于東又有牛頭華巖興教諸寺太乙杜渠諸宫以資其隨喜登眺又有太乙玉案金華諸峰以資其瞻望閒則弔杜甫之墓尋何将軍之故墟悶則引水修竹決渠灌花此亦一樂事也何必珮玉結綬然後備大丈夫之事哉所籍文藝之好死而不輟但恨不得常在左右以圖進益倘不鄙愚䝉數示徳音則治道幸甚餘惟順時保愛以慰鄙懐治道頓首寄聶雙江羅洪先今嵗不數數得執事書前兩書率易有請皆甚謬不足入覽聴盛使貴二持十月所寄書儀高文華卷厚幣重觴茅屋窮窗照耀赫奕犬馬之齒倐及五十衰矣分與糞草同委山野稱借之過錫賚之蕃何以堪之對之幾至掩泣愛之深不自覺其惠之傷固如此也感愧豈言可譬将來日月稍餘敢不自勉求少進以副期待耶執事功業寵渥日盛此不獨知戚之喜謹列状稱慶别紙見論當道欲以軍旅物色荆川與生者極力說阻恐終不免聞之且愕且喜荆川命世之傑也其行峻潔其學精進其志堅剛其精力壮健世不用則已小用則小益速用則速效而又無擇于遲速小大之間此世道之賴也故可喜若生非其倫也非其倫而槩求之故可愕願執事為我圖之也往年銳意功名以為人生不展拓則已立乎其位務使君享其成民被其澤然後奉身以退斯無靦顔即使卑官下僚無所厭悔不幸殺身碎首亦當談笑從之故嘗高魯連東海之節壮少游馬革之語葢得之天性固然不自解也歸田以來攻苦茹澹凌冐寒暑躍馬彎弧身習馳突考圖觀史曲盡險夷意謂任其職庻幾即有其具不至束手擁位而已庚戌之冬警報疊至當是時目不交睫者月餘已而病作幾于不起兩年以來齒落二三鬚已半白稍近書册則頭眩目病夜廢熟寝即飲食不甘乃自悲曰吾其不復久於人間世乎則又自反曰使吾無身若復何為則又自反曰使吾有身又有所為于性分亦何干涉性分不有大于此者乎于是囘顧向之所嗜慕者蕩如飄風澹如嚼蠟脫如振槁雖妻孥相對如處深山收視歛聴坐以待盡一切章句見解世俗技能甚若傷我不能復親葢緩急輕重之辨其勢然也執事知我者豈不以為誠然哉知其誠然聴人之求而不為之所何也違期之罪在近例不過為民而止􅂸為民即可無事第不免形迹怪異驚動耳目故莫若豫計而黙寝之彼此為兩得也執事豈謂當道姑以軍旅行召旋復他移或還舊物其職不過供應入直講讀諸務殊不妨碍此在少年可耳以向衰之年俯首筆硯竭心思儌寵利未見其可至于假途躐榮累資待次尤其所不欲聞也者憐其早嵗登第立朝不踰再期枯槁山林不無可惜此特待之大卑爾吾儒名教所守何事退不失已進不尸位其道同其責同且性分固有真貴存乎在我外物何得而與哉古人有迫于饑寒苦于僕債不得己而為之者矣生幸有薄田百餘畆嵗入可給饘粥弱子多疾福量輕淺正不欲以厚藏美業累之雖近日移栖多所稱貸二僮販易乆亦可了吾何求哉且仕非為貧而吾之官亦非為貧者所宜居也夫子有言邦有道榖恥恥之于人大矣生不幸得之天性者恥心最重稍有違拂輒憤憤恨不即死自其少時已不能被華袪新與羣兒競侈其後取科名官翰苑他人以為至榮也每旦候鐘入朝坐史館書公㑹出則垂鞭緩韁歸舍偃卧對食嘅嘆不能甘飽誠不欲以此身為豢養物爾及被罪歸禠服乘蹇出大通橋行道指目有可憐之色自顧此身若釋重負夫翰苑無政事之煩有儲養之青使當時低徊俔伈守其常度積日累月位可序登然人競進而已顧思退人競榮而已甘受辱此其不能自解者亦其福量輕淺之驗也昨得書歸語之婦亦曰不做罷無若往年被罪恐嚇人也嗚呼婦人之見何遽至此哉彼相從于患難見其害不見其利又深知吾平生所安故能以是相勉也聖賢逺矣東方朔避世金馬門汲黯願出入禁闥趙充國請擊先零彼三人者所業不同然皆視天下如一家知其力足以任之故皆無所嫌避如此天之與我者何如哉茍得性分之真出其緒餘以委曲當時大小必有所濟三子者何足道哉顧其所不能者有四學問空踈高之不能善世利物性氣悻直卑之不能諧俗同人識見淺陋内之不能追陪􅉏御筋力綿縱外之不能効死封疆上負聖主知人之眀下負諸公知已之愛亦竊以此自悲卒莫如之何也已人之置身有如置器其安其危定計于早大要由已者可以進可以退由人者進亦難退亦難故衰者不可以語勇病者不可以逺謀何則在已有所不足也生豈不知長往不返者為苦節為我自私者為末志而與時消息者為中行譬之飲酒有數升而醉者有數斗而醉者有一石而醉者及其既醉不可復強亦性分則然也故量已而進進則不辱非力而取取必為災生自決乆矣去嵗與荆川别湖上論及出處謂之曰兄不可不出吾則終老山林耳荆川不甚許可彼葢足以任之故其見與生稍異執事聞之得無又以為希高慕大好竒喜新矣乎生年五十縱有希慕時已不待虚名無實于我何有然而云云然者亦稍有見于性分之真不欲負其平生也天果有意于我乎必不令其多疾而早衰天如無意于我乎相知雖衆何能為我果有聞于道乎舍之不足以為損我如無聞于道乎用之益非其所宜已矣已矣幸勿復言長林邃谷一介不通瞑目委形百念皆弛考其言無一編之書責其實無尺寸之效冺冺黙黙以還造化豈于性分遂有歉乎哉望執事成之不爾終為聖人罪人耳事有關係故不避諱惟執事不以為迂幸甚與王堯衢書唐順之抱病懶慢乆缺書問知執事不謂我疎簡也春來卜居陽羡此中山水絕清無車馬迎送之煩出門則從二三子登山臨水歸來閉門食飲寝夢尚有餘閒復稍從事于問學然詩文六藝與博雜記問昔嘗強力好之近始覺其羊棗昌歜之嗜不足饑飽于人非古人切問近思之義于是取程朱諸先生之書降心而讀焉初未嘗覺其好也讀之半月矣乃知其㫖味雋永字字發明古聖賢之藴凡天地間至精至玅之理更無一閒句閒語所恨資性䝉迷不能深思力踐于其言焉耳然一心好之固不敢復奪焉此類之書皆近世英敏材辨之士以為老生爛語至束閣不肯觀雖其苦心敝精于文字間而竟不免老而無所聞有可痛者僕之自陳其愚葢過不知量亦欲執事同所嗜好也何如何如近日當事者所去取投閒之臣僕已先知其去取之必如此矣不足為怪且平生亦頗能自為主張不敢跟人哭笑不敢以鴟鳶之所爭蝸角之所戰以動吾心而累吾守此亦執事所素鑒無待僕自明而猶自明云云者有説也父子至情恐以此上累吾父之心須吾執事解喻耳當今之士隠居篤學修名砥節如湖州唐子平涼趙子輩者凡若干僕之駑駘十不及其二三然此輩皆淪胥流落淹滯已十數年少者壮壮者且老以衰或餒凍無以存活又其初皆以盡力國事誤觸網而抵禁非如僕之自以私罪去也此輩尚不得為當事者所與則僕得與此輩同陸沉焉固無憾也豈復有所覬乎此人出處利鈍數固不偶始言官謬相薦時僕固知終必且棄去以為萬一不棄去則僕之自為處亦有甚難者何也若使僕復如舊時隨逐行隊進退以旅趦趄囁嚅于明時無粟粒之補則将毀平生而弁髦之且向惟不能為此所以甘心去官而無所悔耳不然則柳士師所謂何必去父母之邦者也若使不如此而如彼守其愚戅固陋而不變恐日月漸乆積嫌積忤自作禍孽更有甚于向時既不能為邯鄲之步竟當匍匐而歸耳是以終夜思之進退狼狽乃今得自脫于此固可謂之幸而不可謂之不幸也古人有言人各有能有不能懸釜帶索枯槁丘壑雖窮死而不肯悔者僕自謂能之隨逐行隊進退以旅以儌幸于衣錦乘軒之華僕非不欲勉強學焉恐竟不能也僕自生齒以來百種嗜欲頗少于人亦絶不知人間有炫耀顯赫事獨不能淡于飲食乃始痛為節損或四五日不食肉始而苦之乆且甘之矣間飲食于富貴之家腥膏滿案且噦之而投筯矣所以苦身自約如此者以為既不能改于其固陋以狥時好則貧賤自是此生常事諺曰畏水者不乗橋恐其動心也且夫自處不當違其所能而強其所不能處人當成就其長而䕶其所短安知當事者之非深憂我乎僕幸未衰敗茍自不樹立則已耳若夫假之以二三年孜孜早夜敏行而不敢怠則子輿所謂獨善兼善與退之所謂行道為書化今傳後或者不能兩讓矣豈有不得于進又不得于退者乎執事知我故不慙大言且非此無以解吾父之懐也吾父之所以戀戀于僕者亦非以今時富貴人望僕也王良有言父子情深或意僕之以是為憂也而亦憂焉耳僕固不憂也又或者以自少教之讀書不忍遽見其廢錮于聖世矣乎雖然成敗得失且當要之乆逺毋遽為僕戚戚也望吾執事早晚間曲為寛慰則數千里外人子懸望之心亦稍安矣是執事之賜也客居無事二三子時時以舉業文字強相問訊亦殊妨静坐與讀書但念此身為宇宙中人其于塵俗奔走縟禮煩儀之事既以其溷擾而獨避之于此不當更有所厭耳舍妹并甥女想皆康吉餘懐不盡生平最懶作書更懶作真書書又多差與執事書既不可假手于人又不能不差又不及更錄輒以呈上并希亮之復秦少說書朱察卿一别更時升沉異路誨函三及慰喻綢繆知足下㫖于宋𢎞之言矣足下勸僕復修故業舉進士重以骨肉之誼激以榮辱之詞是足下相馬忘其疲知其必能騁足長途愛玉掩其瑕謂其可以肖形圭璧也足下念僕深矣媿未能絶纓伏劍以報知已如古燕趙慷慨之士也僕家世業儒代不乏仕竊自附于冠族而别于蓬戸桑樞之子也舊矣今巷無結駟門可羅雀豈不欲出舉進士結綬于人主之前高議于王公大人之側承先人之業而新衆望哉但僕有不能者三願足下察之僕生九嵗先人物故内乏父兄之嚴外鮮師友之益肆情逋蕩夏楚不加里中之夫謂僕隤其家聲矣及知向慕皷篋傳經外侮相傾莫可支禦勉強問學僅游學宫雖資等中人才踰下乘曽無焚膏繼晷之功寧知唇腐齒落之苦學未通博蓺不精専烏能爭長俊人見知有司哉僕之不能者一也僕屢嘗挾䇿上都校文多士不克先登退無觖望知干将之璞而不淬鋒礪鍔必難㫁蛟剸犀理固然耳故帯經慕乎倪寛下帷懐乎董子閉戸謝客側席事師自謂可雪曹沫之辱而成孟明之功也豈期島夷難作鯨鯢怒號邑里成墟伏尸蔽野僕奉老母擕病妻播越他郡以保首領斯時也莫不挈㓜襁老狂奔盡氣屠者亡其刀漁人舍其舟矣僕也獨能顧其鉛槧哉遭時不偶已知天之于僕已矣時流離寄命喘息未蘇太守來議脩城交興兵役六館諸生畚築是務僕素承清白更值中衰不免典先君之裘帯鬻煨燼之室廬盡力徃役以答太守之議也嵗屢不登家復多故二妻未葬三男未婚催租者排戸入室收責者毀瓦畫墁雖未至于糝藜懸鶉亦庻乎家徒壁立者矣僕不免旦夕奔走衣食樹立門户入對妻孥出視臧獲揚眉吐氣而不可得也烏能復修故業以畢平生志哉僕之不能者二也僕有志記覽不善帖括嘗讀六經秦漢諸書心志暢懌精神爽朗有若庖丁之于牛造父之于馬若討論章句之㫖誦讀程式之制則扞格不通苦難畏退未嘗不掩卷長嘆廢書増悲矣性復疎狂不喜檢束每于知已之㑹稠人之席衆方帣鞲鞠􅎽僕已脫巾徒跣睡魔卒至有聲如雷故嘗高嗣宗之放賢叔夜之迂恨不得與此人同時也又復嗜酒好歌間喜吟咏興至愁來無可遣謝或解帶于傭保或寓書于王孫指酒索嘗立盡一石厭厭無歸燭滅不散若有鄭女當壚呉姫行斚聞激楚之音對陽阿之態則箕踞長歌頓足起舞醉則據長者之席卧羙人之股塊視三山杯看五湖雖催租者在前收責者在後大笑而却謾辭而謝矣豈復知貧賤之足恥僕性如此又烏能奉足下之教哉僕之不能者三也夫僕進不能振鴻漸之翼退不能離燕雀之羣徒自沉欝憤懣欷歔忉怛求奉先人之丘墓保老母之餘年而不可得真與腐鼠為伍絶物是類矣嘗聞接輿避世魯連辭禄薛公藏于賣漿季主隠于卜肆嚴光以布衣而傲萬乘君王符以縫掖而重二千石此時危道尊身退名成者也若侯嬴捐軀于期折首田光以死而謝燕丹豫讓亡身而酬智伯此以節義為聲任俠自喜者也若左丘記事于國語馬遷垂言于史記相如揚雄振藻漢庭士衡安仁摛辭晉室此又以翰墨為勲績詞賦為君子者矣使僕能通先哲之高衢窺墳索之長圃或可以侍賢豪之門牆見先人于地下也今年已四十無所成名亂心志于野馬邁日月于隙駒此所以俛首無聊撫心於邑也噫伯樂不作絶足等于凡馬鍾期已逝流水入于新聲僕之悲哀益不能止矣裁書叙心敬白足下奉柬黄柱史符錫某頓首子中先生有道執事下僕錫一委巷士耳間者蹔出忽枉驄從之辱童子以告輒惟其故僕始而疑中而思終而釋然以慶葢始者自顧荒譾間自臺省名公一二有知僕者未敢輕造其門況于執事里居雖近傾仰雖切而實未有一日之雅奚所聞而至于斯邪既思聖明聿興輿圖輻輳主上高拱公卿大夫居常守易無所待于側微之士其來尚矣抑豈無閎大寛綽不計踈逺而忘分彼已者出于其間是不可知也是用釋然以慶何者不意古道之復見于今而發之自僕惜乎僕之委𤨏陋劣而不得夫魁偉特達之士使誠其人有足以副執事之望則其待之不知又何如也既而腆顔修刺再䝉禮接氣温色和令人鄙恡頓釋且復詢以出處之故適有他客懐未悉展雖然出處亦誠難言也葢僕自七八歲時讀大學書即知聖賢教人修已便當治人不徒自善而已奈何性本庸劣學無統緒又不能刻意程式之文以是雖忝鄉薦而卒困踣至此往來憧憧謂能不媿于所生亦誠妄矣況今老父年躋八袠家貧無以為養而犬馬懐切又度不能乆違以資斗升之禄徒爾眷眷者縁以父子世荷聖明成就之恩不敢遽為自便之計以此擬受一官邇之可以終養逺之可以圖報僕之初心庻幾畢矣或者顧謂覆盆之私難以仰覬日月之明萬一得一逺方州縣辭之不可就之為難子将何以處之或者又謂入仕之門畦徑已别何若少遲嵗月以竢再舉是皆過于愛僕者之情繆為相親重之道也夫豈不知刖者之不能前而馮婦之不可復也至若蚊􅀈不能厯階序騏驥之一日而千里則僕亦知之稔矣且科目之設自漢以四科取士然猶首之孝悌力田唐承隋制而後進士之科始重公卿之選一由是出浸尋于今極矣比者新進浮靡之士又相競為竒詭綺麗之文大抵文日巧而氣日漓考之經㫖或無合附之時事亦已繆此亦極重漸不可返之機以宋之歐陽子不能抑一劉煇使之不第也其如椎朴蹇懦之人又能改度易轍與之較一日之長期于必㨗也哉古者論士之品三上焉者直取公相次者由薦達次者由科目以今薦達之途亦窒矣科目不可謂不重而得人不可謂不多也直謂科目之外九州之廣必無一二賢者足以偹公卿之選應緩急之求似近誣耳夫耕莘築巖釣渭之叟誠不可望然而閉門讀書明出處之道慎取與之義以聖門學者自期其視飯牛扣角朝秦暮楚之徒差亦竒矣然卒未有振而舉之延頸巖穴之間激昻青雲之上使天下後世知聖明之代豐􅉮之澤罝之野猶有用而不盡之賢豈不浚明矣哉比者若臨川吳公南海陳公斯亦庻幾一時之望猥來徵辟之勤雖未究其始終至今使人生氣然聞當時好事者猶爾藉藉二公亦果于不仕矣豈非盛名難副抑亦造物者之所忌耶乃今學者又欲私立門戸飾言行以矯名一時吾恐其去古益逺其不犯衆怒而取訕罵亦難矣有識之士方且為之寒心寧敢復蹈其故轍也然而今者有人于此其勢窮迫無聊又将入山之深入林之僻激衆怒取訕罵而有所不敢避者可知其心非故欲為是踽踽之行也此僕之拳拳所以欲聞執事之教而終昔者顧問之意夫既知進士之不可復舉而就選以有老父又恐切中或者之所料量且将犯兹不韙進退之際斯誠難矣履霜氷至去留之計似亦不可緩矣語曰識時務者在俊傑又曰士詘于不知已信于知已若僕今者不偶于執事為知已不復有知已矣復不自媿録上舊所為文數首併以為獻執事倘不鄙棄而賜之觀采其必有可以見教者狂斐干冐惶恐待罪嘉靖癸未仲秋十有六日潁江錫再頓首陶周望宫諭袁宏道去年入匡山今年入太和天目洞庭直魁丘耳兄真解官去弟來春當之西湖偕遊天台鴈蕩便了却武夷普陀諸約新其所常見而證其所不至亦快事也㑹胡大六知社中兄弟之益精進弟謂諸兄純是人參甘草藥中之至醇者若弟直是巴豆大黄腹中悶飽時亦有些子功效也家父迫弟出而弟懶于世事性僻而疎大非經世材料弟又生計減少數椽殘茅十畝秫田已付之妻兒管理身口自足無庸勞心仕途弟客寄村廬四方道侶分餐而食雖親戚朋友亦不責弟以常禮及告以風水田宅往來酬答之事弟公然一方外人也然弟尚以為苦出門雖敝衣踉蹌人必指曰某官人數日一見妻子或告曰某籬落壊兒子某廢學黨中有不解事者至言及鄉里間不平之事未免動念若一離家併前數事亦無眼中得不常見爛熟人雖俗亦快也靜虛兄恐已歸所云頓除漸修大非弟指不知以何為修若云蔬食㫁腥是修則牛羊鹿豕亦蔬也若云長夜不眠是修則馴狐蝠䑕亦不眠也若云一念不起是修則無想諸外道亦不起也若云騰騰任運不著不滯是修則蛙鳴鳥語亦騰騰任運也楞嚴經云一迷為心決定惑為己身之内凡六根可攝持皆身也可分疏悟入皆身見也所云漸修不知當從何處著手靜虚若未去幸以此字示之明文海卷一百九十五
