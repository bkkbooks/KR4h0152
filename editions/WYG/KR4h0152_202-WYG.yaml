body:
  text: 明文海卷二百二餘姚黄宗羲編書五十六感憤上大司徒梁公儉庵書劉繪進士繪頓首死罪繪不佞不能敬奉徳教以順下陳之心繪恐以不肖之故有傷扵門下之度也繪以進士分大司徒觀政國家之法以新進者多下邑草莽之臣不習典章令觀大臣舉事庶他日有所法程可寡過爾未先授以職事也昨澍雨竟日進士以僕馬未便遂未到部隨有健吏持札相喚進士方與客對即辭客衝雨沾濡來見初以為必有明訓教㫖便當勇受之也不意門下據案不荅禮聲色兩厲進士以庶司在列不能當面數之責畧無辯論以為一揖不至未成過也門下何動氣若斯此所謂覆羮之失而致翻海之怒毁瓦之咎而發破山之威竊亦為門下不取也門下怒愈甚環視兩旁指為冥悍不識事體公肆傲慢令曹吏勒疏叅劾進士始長揖退見同年友但瞑目沈心而笑曹吏之亡識矣夫進士未受職曠何職也未受事敗何事也曹吏雖袖筆如刀不知所主何意所加何辭所摭何事所議何罪聖主髙居法宫宸覽諸大臣奏章見大司徒奏囊必慮以為軍國何大議邊圉何大策内庭何大計象魏何大令發而視之則叅一未到進士爾繪懼此瑣細事乃勤聖主當何以出絲綸下明詔哉是本欲成進士之材而反損門下愛士之徳白進士之過而反累門下容士之量繪聞仁不棄物禮先厚施以不肖之始進望門下有以全之不虞其輒棄之也以不肖之狂悖望門下有以教之不虞其輒摧之也故不教而怒者禮之暴也不寛而伐者義之惨也且舉一言而傷國體之大非忠也薄一士而動羣情之猜非知也願門下察之昨聞周司務同郎吏二三人皆短繪扵門下謂繪多言戯媟俯仰亢倨出入不循矩度嗟哉以繪之行誠如左右之言但繪且思之以繪之志行欲免扵左右之譖必不可得也以左右之志行欲相合而矜之亦必不可得也諺曰女入宫見妬士入朝見忌夫宫妬者必名姝也朝忌者必竒士也繪雖亡竒然自左右眂之必駭顧而叱焉者也昔黄次公卻督郵之譛而全許丞之名龔少卿拒功曹之誹而得王生之力孟公不顧尚書之期而司徒馬宫優之位躋列侯士元不理耒陽之事而相國孔明原之權登上将此四人者豈徒以疏濶媮慵哉性有能不能人有遇不遇爾是以孔門設教列為四科班史論人注為九等善人難以入室狂狷可以成章不有巨徳何以造士也門下又讓繪曰觀汝年已踰三十何不省事若斯嗟哉嗟哉繪生八九嵗時頗具知識能屬文鄉里謬指為竒今三十一嵗矣不能扵此時光揚駿業為國家濟一事遂隊南宫厠扵釋褐之末嘗自愧恨力倦神疲時或目不辨朱紫耳不聆音理隨口應荅健忘如耄而自不知其故也但仰方今聖主御極六合一家雖有竒傑何能自表見此正馬卿揚雄所謂儀秦無所騁辯賁獲難以事勇者也故如文子弱齡能禦𠂻甲甘羅十二憑軾下趙子房以童年報韓仲華十九而為佐命古昔英哲不尠假令並生斯世則亦就摳衣鼓篋之業爾豈能遽奮青霄之上邪繪文不能獵取上第名不能横四海則宜為左右之輕且斥繪亦以此澹蕩而困扵自悼常恐終無樹立而自委扵末行也繪且籌之繪居宛汝之間其俗子弟多好獵繪往獵家見名鷹扵未獵時凝金眸垂雲翮毳毛剥落翛然如鶩徘徊絛革之繫若病且死啖以翠鳥之肉不厭也飲以烏梅之液不甘也一旦脫韝而颺乘迅風而起也竦翼而翔扵碧落其神俊莫能當之扵此之時信乎大鵬避路孔鸞驚舉野無狐兔之跡林乏燕雀之羽何也以其才力得縱而精耀氣湧也以繪之不肖倘辱納而教之當有鸞鳳朝陽之志肯以名鷹自况邪若終不加愛而與進之繪聞智士不違心以干禄烈士不忍詬而喪名髙鴈傷空弦而横透雲幕神駒驚虚箠而滅影崑崙今九州之外五嶽之巓可為曠士棲神寄足者無限肯終阻門下之條約而有汚印紱哉狂愚敬勒通記外孤鶴賦一篇并見志意覽辭喜怒惟其裁察與殷子王廷陳竊聞人各有偶物從其類故婚姻人道之始伉儷家政之基豈可使汙隆一揆涇渭混源哉此鄭忽之拒齊不疑之辭霍良有以也故秦晉國匹欒郤族均王謝閥等潘楊世睦本其門素既爾齊同稽厥風猷復無虧替又其子弟雅醇弓裘克禪則施衿命往結褵言歸百兩是将箕帚獲所扵是甥舅騰氷玊之譽龜筮告鳳占之吉風人詠其好逑宗黨贊為具美斯天作之純休人倫之畢鬯矣其或今迹雖微先鬼則大𦙍支云劣祖徳在稱則駕言歸女意屬振微仁不遐遺民歸其厚猶長者之用心矯偷之髙舉也又或席門之眷甕牖之賓前徽無聞舊彦缺録而豹姿突變騂角旋生無待能興洿塗拔起則知昌願托冀庇望諧譬之食果畧株棄牢収豕徼新福扵将來違衆情而締納此婚姻之變例明賢之逆覩也至若椎埋宄類闤闠狡童不齒齊民世濟惡徳以逮馬醫夏畦之子給喪傭保之兒亡命負辜之徒導騶先驅之厮籧篨戚施之状俯仰無能侏儒介眇之稱孝慈莫改擬倫扵犬豕比徳扵優伶一旦以乾沒而致多金資營茍以騰髙貲心志驟侈不足非財自醜卑流仰攀華胄推潤屋之餘脂希宵燭之末照扵是醲肥啖其門客貨賄誘其私親遊説之言日至宻邇之譽不衰遂至寡廉鮮恥明目靦顔唯利是求族類罔計衆齒競謀鳳毛安惜是故育女猶之居貨行媒同扵貿絲忍使化源釀為賈道扵是犀璧金珠爛充簪珥氷紈霧縠髙貯筐篚雖位在九列族右一方多議濶視之人喜譏善誚之士莫不一見解頥弱息請往遂使纓冕之産入扵駔儈之門河鯉齊姜比扵鳴盜之裔生為合􅈟之人若牛驥共皁而食死為同穴之鬼則薫蕕並器而蔵髙門遂爾降衡芳草為之化蕭矣士人贅行孰此為大哉僕嘗懐此而未有陳也近見郡中婚媾多托媒扵足下者故敢布此幸子稱品審流別羣分類茍非異等務遵常塗母使禮門頓開利竇也講信書一郝敬某足下執法明庭休暇故里兩尊偕老兄弟孔懐人生之積慶鄉邦之萃美使枯槁之夫望之而生色比年髙牙往返不佞行夫先驅歸忘倒屣親故之誼闕如非敢為疎薄也盖不佞自丁未之嵗抱病杜門扵今五年矣士大夫歸田日與父老周旋追陪懽笑而不佞獨坐窮山衡門反鎖豈其性與人殊自惟肝鬲之要難一二語人也請為足下畧私布之盖外議謂楚人剽悍而吾邑為甚不知此議何從起良由我輩奔競喜事知進不知退一著偶差全局盡輸即今鄉里衣冠非乏長者而人以為勝母朝歌冠盖不入其里請謁不受其刺此何等時也人方鵂鶹我我自謂威鳳祥麟逰羿彀中其何幸之有知止不辱為善最樂此兩言童而習之身既去官安分循理公無逋負私無過犯雖風格稍峻深居簡出人誰得而問之此區區自全亦為吾黨增氣此其肝鬲之要一也人家子侄懶學親族好事奴僕横行三者皆縁主人素與郡邑大夫院道官長周旋故子弟親戚緩急觀望奴僕倚城社作姦吾邑聲名之壞大率由此今既杜門寡交自邑侯貳領博士先生以上一切不通往來則子弟絶望親戚亦不以閒事相聒家奴知主人素失禮扵上官斂手入市逢人讓路矣如此則門無剥啄之警身受清寧之福良覺省便憶自乙已嵗兩兒進學後雖孤侄孤甥縣試無名寧為貲助不為干謁宅後地髙價平買强隣生端委而棄之豈曰能讓亦唯以息紛争之擾省出門之煩妻子無識笑其龍鍾區區拊掌自謂得計盖能忍一朝之忿而後能博一日之安隻字不入官府勾使不到家庭昔人云無事此静坐一日如兩日何為匆匆冗冗與世紛紜此其肝鬲之要二也生平不善飲酒不博奕不遊嬉對客兀坐終日木偶惟好古讀書癖入膏肓家有古彜器髙人墨蹟把玩可以永日辭翰粗習而不工亦不甚好也緬惟先聖六經之訓炳如日星數千年來各家師說䝉蔽多未發之隱願以未死之年鑽堅研微手為註釋補前人所未備非竭十年之力不可而今已五年矣功将及半人生五十始衰余又過四來日苦短有志未竟恤死之不遑遑恤門外事此其肝鬲之要三也三者向未以語人雖妻孥無喻吾意者惟皇天后土先聖先師或者監之而今以語足下豈謂足下知我乎聊以明區區非好與人長短専心田舍者也使不佞専心田舍當日與官府酬往規求便利而縣大夫蒞政兩年尚不識面則不佞豈好事之徒争利之人哉足下可以垂察矣夫足下世胄也令祖方伯公田舍甲扵閭里尊公又從而附益之足下拱手而受成扵人世艱難自可無問區區窶人子先君一官清白家無甔儲今與尊府相連馬跑泉滔口薄田皆不佞十七年前拮据置買為老母饘粥一家餬口計而滔口有尊公生兆則自近年始耳區區創業之初豈預知尊公将卜兆扵此先去以避之乎去年突将馬跑泉百年水利一旦阻絶使薄田數頃化為焦土時足下内召胡幼泉年伯馬瑞華親家皆云候足下歸易處耳無何霖雨大降不佞扵時注易初畢踟蹰滿志世情冷煖忽忽都忘比足下歸而馬瑞華謂足下不改其父之政也不佞嘆足下孝子哉抑或者将彌縫其闕泯其迹使不佞隂受賜乎未可知也扵時不佞方注書前事盡置度外比入冬書畢将謀注禮三禮浩繁非數年不可了而兩兒懶學欲以家事付之値縣司編稅遂令兩兒履畝清額不意執事者一旦炰烋震怒摐金伐鼓械杖如雨畚鍤如雲咄嗟之頃薄田五堰盡築為大堤不佞聞之莞爾而笑曰可謂庶民攻之不日成之者矣然習静久三告至不為投杼已乃復自思惟不易不于長此安窮扵是率畧數語授兒代書告邑長者求為先容而尊公報以纚纚大篇不惟以滔口之五堰為當築且併以馬跑泉之水利為當阻至是始知足下果不改其父之政而不佞亦竟不得䝉足下隂庇之賜矣将若之何夫尊公無地不相阨不佞何地可相避縱不佞謬為髙雅盡置田舍不問則将閉門枵腹嚼槁壤咽螬李而為於陵仲子乎扵是不佞始嘵嘵焉向足下一鳴耳雖然争奪之言出口則清明之氣銷好訟之辭入耳則風雅之道喪舍文弱之雍容而為睚眦之紛綸離却掃之清宴而開盈庭之閙市使居不得安其所退不得修其業跼天蹐地曝纊寝闗區區向所布肝鬲扵足下者盡付之東流矣夫天下事惟情惟理惟法我輩鍾情中人論理愚夫讀法足下法官也事至議法卑矣人品至犯法下矣吾兩人者直當以情語請足下平氣聽之虚懐訪之勿信羣小勿從亂命其必有以忠言告足下者倘灼見區區之情誠有可原此疆爾界宜仍舊貫泯扵無迹忘扵無言安扵無事俾區區養拙投閒席門長掩未死之日誰非足下之賜盖不佞死灰也而足下煬燄也今姑置可不可然不然勿論惟扵常格外乞哀扵足下曰請勿壅泉勿曲防使鄉隣霑一滴之潤解倒懸之渴以足下賢明亦宜優為此而况不佞非無因而至者何難一見許乎不佞扵足下雖非肺腑屢世桑梓未始無瓜葛先君與尊先仲父乂世講也去年聞足下有南臺之擢私心愉快他日薄業就殺青建鄴詣柱下繙蔵書固我東道主人也豈意未離里閈早相抵牾是使區區竟不敢附青雲望龍門矣翻然垂省尚存乎足下一念盖聞智者不可辯窮而可以情感龍蛇不以直伸而以詘伸今使足下萬勝不佞萬不勝人不謂足下善謂足下强耳使足下萬不勝不佞萬勝人不謂足下不善謂足下讓耳足下試思之寧以侍御之有應人求而與之之為貴乎寧使人謂侍御兼他人之有之為貴乎吾聞明月之珠不以彈雀屠牛之刀不以割雞一勺之水盌脫之地所値㡬何挾豸冠之力以遂升斗折霜簡之威以溺寒灰借使得之非曰利也借使勝之非曰武也此言滑稽扵足下為蓍蔡越人關弓誰肯垂涕雖有長者居間利害未必相闗吾與足下當局願盡除其荆棘相示以肝髙如此使不佞受賜扵諸長者勿寧使不佞受賜于足下乎惟足下圖之講信書二郝敬昨者奉書足下披露肝膽自知交淺言深然迫扵無可若何企足下萬一垂聽而足下藐焉如罔聞也得非以前書詳扵人情畧扵事理故足下疑之乎向固與足下言矣我輩鍾情中人論理區區非詘扵理也田舍之長短争訟之是非書之則汚簡牘傳之則醜聽聞屢讀尊公書皆憑奴客口授都似夢語黒不可以為白鹿不可以為馬通國之口誰能捫之所以静俟足下從容詳察不欲皎皎自白獨居其是而足下褎如充耳又不得不以顛末告請先言馬跑泉一名沙泉泉雖發源􅊐東而溉田則嶺以西居多環􅊐西下十里之内百家千頃水利公共也而尊公每向人云沙泉者劉氏物也郝氏攘之此豈非夢語耶泉越嶺西流為三溝一溝循嶺而南為滕家壋滕姓等數十家共之不佞有田十六石在内同利無争也下嶺數步又分一溝折而西南為周家壋周姓等十家共之不佞有田五十餘石在内同利無争也半嶺直下又分一小溝北去為君家長流水而大溝直西去為聶家壋聶姓等數十家共之不佞有田一百餘石在内滕壋周壋二溝去泉近地勢下得水多而田少各家隨便利取水故不分晝夜聶壋去泉稍逺地近山而髙田多水少故先年屢訟各姓照田分水日夜輪流嘉靖年間廖朗官帖及各家私約具在可憑也尊公過聽使者劉寅謂此溝之水専為君家有夫君家有長流小溝其大溝専為壋設也壋専為田築也君家田盡在上流壋下一帶皆不佞與諸姓之田君家無寸土在下不知併吞此水何用自開闢有此泉即有此壋幾千百年矣令祖方伯公萬厯丁亥年來不佞萬厯乙未年來皆新户也計尊公沙泉田不及三十石及令叔田不滿八十餘石而薄田在下流者一百六十石此泉所灌田且千石而尊公靦然以為已物此又非夢中語邪假使區區非其有而攘之亦非攘之扵君家也壋水舊分七晝夜聶秀陳進一晝一夜王安一晝一夜廖成二晝二夜王明一晝一夜王本敬一晝二夜王本義龔鶴一晝一夜今陳田屬我水一晝夜王安田半屬我水半晝夜廖成田半屬我水一晝夜王本敬田半屬我水半晝夜王本義龔鶴田屬我水一晝夜計薄田該水四晝夜各姓共該水三晝夜各家公私新舊劵約可據農家以水為命誰肯相讓使不佞果越分攘取衆姓豈無一言而何待尊公呶呶乎古壋即在小園烟雨堤左水溝傍牆南下乙已年山水泛漲壋決為深潭衆姓推田多者首事不佞捐三十金買石募隣人王天義鄒少光等修築二人現在可問也使區區非其有而攘之豈亦非其有而代他人修築乎近年祇為小奴得罪尊使劉寅挾忿阻絶上流将泉溝一帶處處穿決滴水不令入溝兩年禾苗枯死而尊公反謂我越分引水渡壋夫壋不渡水築之何用有壋無水又豈非夢語邪今姑就尊公所明者曉之尊公謂廖朗水二日夜已賣與胡鳳垣則胡鳳垣田之有水尊公所明也然胡田之水必由小園牆下先灌薄田一片九十餘石而後西南過王本敬田又東過袁照所換廖朗田又東過胡雍丘田又南過不佞買王明田又南乃抵胡鳳垣田自泉口抵小園一里而近自小園抵胡鳳垣田二里而遥逺二里者既有水而近一里者反謂無水此又非夢語邪尊公謂王本敬向未放此水今王本敬雖死其子王天治尚在各家有劵可無煩多言至謂我以廖朗之空帖借口夫不佞之買此田本為泉田買也其各主賣此田以泉田賣也稅糧之以泉田科也百年之古壋古溝非旦夕可偽造也一鄉萬口行道之人樵夫牧子皆知郝田共此泉何待廖朗之帖始為左驗乎是又一夢語也尊公又謂我田自有堰水可灌夫小園之有堰非舊設也甲辰嵗不佞棄官歸始鑿此池旋買龔敕熊國賢基田又抵換魏敏庵年兄田共七十餘畝通濬為濠以承聶壋餘水為養魚種竹休老計原非此田之額堰也而尊公見數年新鑿之池遂忘百年久開之壋是又一夢語也尊公又云不佞昔託王鶴陸仰求令祖方伯公小奴近日又賄盛使劉寅以此為無水營求之罪案事誠有之嗟乎何為其然也哉足下亦可以反而思矣夫使是水而不佞果無分乎則請求納賄謂之贓跡使是水而不佞果有分乎則請求納賄是勾踐所以事呉太王所以事獯鬻者耳豈得已哉即區區今日告哀扵足下纍然如喪家之狗奚啻鶴陸之請小奴之賄而已尊公不深思垂憐而反昌言以明得意其若之何惟尊公難與言故不佞不與之言企足下可與言故不佞娓娓言之此乃馬跑泉之顛末也請更言滔口之五堰向者君家築堰之日小奴來告但云占我四堰耳昨不佞閒行親視實五堰也夫滔口薄田自萬厯二十三年董述溪以所買王鏊陳才等田十石七斗五升藕堰一口新堰一口又小堰一口又大堰水一分又泉水一分俱坐王族門首沖下憑陳楚亭抵換我倪家沖田迄今十有七年矣嗣後王姓人各以田堰基屋求售且盡而辛丑年以後尊公始卜生塋扵此地匆匆謀買皆各姓星散之田而門首堰沖下己無田可買矣藕堰下皆薄田也内止存王堂田三斗一丘王大節田二斗一丘被尊公挾買之亦不過田五斗耳今遂占我藕堰一半新堰下皆我田也内止存王大元田二丘王大茂田一丘萬厯二十七年我募工疏鑿此堰而二家逐年止用水一分今尊公挾買遂占我新堰一半我買王宗成門首堰一口其下皆我田也止存王大化寡妻陳氏田一丘四斗尊公挾買今遂占我門首堰一半又買王愛民堰一口其下皆我田也止存王大節田一丘三斗尊公挾買今遂占我王愛民堰一口我買王大啟大教兄弟三人門首堰一口尊宅無寸土在下今将堰隄掘毁斬其隄上樹木稱為已物我買王愛民基園一所尊使盡斫其竹籬伐大桑一株舁歸此去年冬月事不佞扵時方注書小奴從忩外告劉家砍樹不佞叱之去不願聞也昨始親見矣嗟夫已毁之薪木不敢望償新築之五堰将靦顔以為已物乎雖不佞羸弱不敢相抗人情輿論其若之何今總計君家堰下田不過二石一斗五升既不能攜有餘之水以溉別田何為興無益之役以作虚器為尊公謀者勞且拙矣及不佞以告諸長者而尊公乃抄寫王姓清丈册抵飾夫今之不明者非丈册也清丈在萬厯七年至今三十四年矣中間買賣遞換即有侵越王姓人與董宅宜争扵三十年之前與我宜争扵十七年之前既經董宅與寒舍兩主遞換未占王姓尺土今無故而捋虎鬚則不佞病狂喪心矣借云尊公重買豈以二石一斗五升之田併据人五堰乎即云係水豈得徑行築斷并無水者一概築之何名乎刁民王卿王魯無賴小人搏噬族人以奉尊公尊公唯兩人之言是聽今日之事兩人搆成之滔口泉水從來隣里相安寂無一言自兩人移住泉口需索放水之家稍不遂意輒決壋水而注之溪穿竇而洩之別田亦如劉寅所以處沙泉者尤而效之矣但滔口之害泛及衆人若沙泉之害則不佞獨受盖滔口尊宅之田多在下流其勢不能壅水使之不下若沙泉尊宅之田盡在上流而寅使盤踞泉口尊宅田告潦而薄田生煙塵矣使者方楊然得意盡以有餘之水賣之無分之家索雞索酒索米鹽吾受分者終日荷鍤奔走旋放旋決不得霑一滴之潤将誰愬乎故今滔口之堰雖築不佞吞聲忍受但沙泉之水相厄則薄田數百畝束手待枯而尊公錮扵寅使之言以為當然不知寅使非忠扵主也亦非讐扵不佞也與小奴争酒食起釁佃民唐大智適有牛犯山尊使執之小奴登門索取成隙不佞不知也及秋旱不佞卧病園居聞泉上喧閙遣小僮勸諭而尊使謂不佞将以奉告先為一切無端語以激尊公尊公以為然彼遂横行無忌以不佞分水賣與髙林孫正年滕舉王大才等家而聶壋以上沿溝一帶隄堘千孔百竇塞扵此決扵彼上流田滿即掘水使之東注涓滴不得過嶺西矣薄田何嘗霑一杯之賜乎家奴得罪禍延主人殊為無辜兩年枯旱亦足以少洩不平之恨倘猶謂未足其害何時而己尊公耄矣足下又宦出羣小為政難與之言今足下歸矣則足下自為政豈可使蜂蠆小醜毒螫同袍至此極乎今即不敢望足下改父之政與父之臣但屬尊使睦隣里體人情勿生事勿已甚往日之横已矣将來之孽止之各守分土安居樂業使一境清寧皆足下錫之福矣夫不佞扵君家無論世講也無論瓜葛也維桑與梓世世同土吾邑桑梓之為荆棘也四方莫不聞之大都覺由羣小而禍極彌天故一馬飲水而曹衛之難結一女争桑而秦楚之兵起凡事類此不佞雖愚數奉教扵君子矣無奈尊公偏執不通又有數年之長不敢不遜即今牟沖滔口上下多薄田比年隣人以田舍來者一切謝絶雖力不贍亦以有尊公在彼也如牟沖周一仕之田已屬我尊公有命即毁其劵而索原價居士岩王魯之田已屬我尊公重買即以予之而更以渡母橋之磽田相償王正立正義正忠之田屋皆屬我尊公欲之即委而去之他如王天位王天佐之田王天格之基屋皆來求售以尊公之故而辭之即今五堰下田二石一斗此在他人所必争者皆以尊公故而讓之然則不佞何負扵尊公而必索我無已獸窮則觸鳥窮則啄區區亦有血氣者顧念瑣瑣田舍動相胡越使官府持短長是薦紳之辱而桑梓之羞也故寧緩頰告諸足下告諸長者區區所惜良重而尊公悍然不顧也豈以足下之明尚念不及此邪夫吾之有小園亦猶尊公之有生塋也尊公為千秋浄樂之土而區區圖殘喘旦夕之安旦夕者可以立待而千秋者無窮期也不佞以無窮期者奉尊公而盛使不能以旦夕待者容不佞扵人情亦甚拂矣足下倘能俯賜䕃庇使不佞一枝聊棲故鄉仁里豈忘首丘是仁人之賜也必構我無已則康樂之園行将為逃亡之屋一瓢一衲何處青山不可寄吾嘯傲而乃與人家奴作此惡縁詩云碩䑕碩䑕勿食我黍逝将去汝適彼樂土吾兒才與足下鷸蚌相守不才身請為奴稽首獻地願受一廛而為氓耳若不佞老且倦矣焉能日憧憧往來長與蠻貊之邦為比隣乎不多譚明文海卷二百二
