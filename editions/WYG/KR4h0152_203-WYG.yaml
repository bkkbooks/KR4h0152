body:
  text: 明文海卷二百三餘姚黄宗羲編書五十七頌美謝李郡伯建三元坊啟商輅三元及第今為隔世之虛名刺史表閭又作他時之故事未嘗忘我何以報公昔高宻為鄭康成建通徳門頴隂為荀朗陵改高陽里皆邑令崇一鄉之虛譽與時流為千載之美談孰若掄魁之坊出自相公之筆如坐㑹同館而張氷篆如游法華寺而覩邕碑波戈峙金鳳而欲飛閭巷疑蓍龜而再轉雖進士之科未復然化民之意已多某因念平生真堪一笑衮龍殿上嘗誇獨對之三千朱雀橋邉今作尋常之百姓進不得陳箕子之洪範退而發揮郭氏之中庸開山學効嘉眉之規借時文明孔孟之意松間倡道豈無考徳問業之人花外小車亦有事親從兄之樂然或預司徒之役則又如舉子之時伐樹削迹之仇吾知免矣毁瓦畫墁之咎誰能興之不圖三十年金榜之名増重二千石銀鈎之字成前歲部使欲為之志動昔年鄉人助喜之心十字街頭如浮圖之起廢一千年後與華表以俱存何榮如焉可感多矣兹葢伏遇具官坤維間氣河右俊人泉府培風善計江西之財賦翰林借逕飽看天上之圖書肯為朱幡皁葢而来大是碧漳清江之福論振文誅奸之政季弟元兄用留耕捄荒之心召父杜母使七八月遂雩壇之望使三百州無溱洧之憂一日而百廢具興三年而四境皆治遂令迂濶亦属作新某雖奉几筵敢忘棨㦸武陵太守屡許訪於桃花黎家小童竟空吹於葱葉末由胥晤曷盡多言某敢不佩此寸𠂻銘之百世薛少保三大字長如甘棠蔽芾之春楊文貞一瓣香願祝仙李蟠根之盛其為皈嚮無任敷榮與李先生書張翊翊拜白李先生閣下令似孔修不以不才見視数過僕意葢有取於僕也僕也不徳環顧腹中枵然無所有也然頗以鍳裁自委竊觀孔修志甚大才甚高識亦正其天分葢亦百之一二也至於詩道文道㒒疇昔頗事探討者其閫奥之處孔修類能言之雖於君子長者之前未免言動有失此非所以責孔修也嗟乎後生可畏豈不信哉㒒嘗南北奔走十数年非其人不妄接也不妄交也不妄取也至如孔修㒒眼孔寥寥未之見何者年㡬弱冠而有許大見識力量何所往而不至也苐有説焉程子嘗謂天下英才不為少直以成就之無道耳葢觀之成周之時取士之法人才之盛何如以及漢及後世之時取士之法人才之盛何如葢可見矣今日先生茍能不顧俗議不隨時好不急近利姑勿責之以科舉之習因其志氣而張旺之因其才力而輔振之因其識見而誘導之教之以入孝出悌之道飬心修已之術親賢逺佞之方磨其圭角去其矜逸使之得以優游沉潜乎仁義詩書之府力追疾馳古人成立之地出則必經綸必王道必禮樂必為一代之賢臣處則必垂訓必立教必傳道必為百世之師不但光李氏之一族而為一代之國華不但光嶺海之一方而為四海之徳星先生亡謂其必不能也舜何人也予何人也古有是言也孟子曰豪傑之士雖無文王猶興功名富貴自有一定之命捨榖粟而取糠粃棄參苓而服鈎吻不知之甚也㒒之少年亦嘗從事於此顧以當時無有大賢之接卓越之識而墜此穽也一墮其中欲出之不可得也今之白沙陳公甫先生倡道此邦抱經濟之宏畧負仁義之大柄千百世而一人者若使孔修師而事之其成就之大也必矣夫天既與其才而為父者反逆其才是天愛其人而父不愛其子也其可哉昔吕榮公嘗言人生内無賢父兄外無嚴師友而能有成者少矣㒒於此亦云惟先生留意焉某再拜賀王陽明平西啟費宩伏審儒者知兵相臣出将殱渠魁以昭王度除羣醜以奏膚功九域同懽一家尤幸㣲君子其何能國在丈夫乃克帥師方叔顯允而制荆蠻仲尼文武而盟夾谷恭惟大中丞陽明老先生執事天畀𢎞猷世基碩徳行高而心獨古才大而用不窮爰直道以事人肆忤奸而去位孤忠自許百折不囬繼承前席之求亟拜賜環之命厯敭中外所至皆赫赫有聲槩視險夷無入不怡怡自得盛名允副重荷攸歸来控三垂獨當一面下車平賊境内晏然退食受徒吾道南矣快若鸞鳳瑞世隠然虎豹在山迺值寧藩忍干天紀其所賢者五而智伯不仁不足畏者三而楚武心蕩冓言可醜葢穢徳之彰聞國事日非惟姦回之崇信無罪而殺民殺士非辟而作福作威何患無詞能入端人之罪惟知有利輒傾厚殖之家神人共憤者数年道路以目者千里魄由天奪怒激主知懼隠惡之彌彰恣逆謀之大露驅囚徒而出戰磔命吏以張聲罪浮於淮南之謀刺将軍律可同吳王之招納亡叛矯誣惑衆僣擬稱尊計竊鼎於南都大揚帆而東下雖亂臣賊子人知不共戴天而後顧前瞻疇肯率先報國况長安之日逺兼蜀道之時艱守臣盡入網羅疆圉誰其犄角人心騷動事勢幾危幸天不廢其所興而公可托之大事身名兩得智勇萬全一馳河北之文盡下山東之淚羣僚嚮應壮士先登况志乆奮於祖鞭而力莫勞於侃甓悦安社稷誠動鬼神冝兹先發後聞倐爾一月三㨗長江天塹既回魏虜之戈赤壁火攻悉燼曹瞞之艦室家胥慶海宇一新事可方之古人功實葢於天下西人膽破魏公之勲望預隆下蔡功成晉國之經營先定似兹雋舉亦豈幸成雖公匡國以興六月之師實天賜公以活一方之命某依憑善類舊忝登龍居處亂邦素傷談虎托二天而幸免頻九死以更生喜隕自天恩酧無地慚請纓之已後忍擊壤之莫前恐門高而言則難幸惟俯納然室逺而心則邇可遽遐遺伏惟君子龍光茂徳音於不爽大人虎變守謙吉以有終未遂叅承益深企倚與康對山書霍韜生自小年即信對山空同為今之豪傑也及来京都人則加訕言於兩君子者喋喋生乃詢之吕仲木侯應乾乃知今之為訕者皆小人也自李東陽妬忌海内賢才論人則取其軟靡者論文則取其絮爛者一時賤儒鄙夫奔走其門士習遂至極壊而號為自立有守者率亦攣縮小器沾沾硜硜而已無怪乎百口一聲訕詆對山空同也生嘗語人曰若輩訶訕康對山李空同然兩君子者視若輩譏訶猶溝渠中蝇蚊也今之人保守禄位如丐人之得簞食豆肉也恨不一嚥已飽乂復皇駭驚顧恐他人旁奪之兩君子者視之不啻厠中䑕也空同於詩文猶少見本相若對山被小人誣詆後不惟不疏奏自直且於京師交游無半字相愬於詩於文不少見懟恨不平之氣其視世之毁譽何如也故凢今之喋喋恨不擘頥秃舌短訾兩君子者不惟不足當識者一笑適足以見其不肖䘮是非羞惡本心為可哀憐耳今之人最號有識亦必曰李空同尚氣傲物康對山聲色自娛生為之解曰今之世居高官都要路者烏得尚氣人哉孟子曰我善飬浩然之氣亦尚氣而已矣説大人則藐之亦傲物而已矣古之人居危疑之世各有所托以自垢蕭何以田宅淵明以酒豈淺士所能知哉我國家百六十年文明之運宜有命世豪傑出應其盛或立勛業追掩前轍或續聖緒垂式後人文章氣節不與也尚冀珍重為生輩矜式至願至願用舍在時雖孔孟不敢必生雖處此去止乆速亦尚未定何時得遂一面以慰懐渴家園十数年必有制作足以聳一代盛美於隆古者毋惜垂教亦嶺海狂斐願望之幸之一也不宣答顧東橋廵撫書孫宜東橋相公閣下僕韜迹草莽企慕名賢之日乆矣徃者竊聞當今文人信陽仲黙大梁空同關中對山具下昌榖為之首先此外則濟南寳應東橋三公咸亦其足稱紀者於是搜集藻翰購求篇章期在兼收靡或遺逸何李康徐凌谿華泉之作則備睹而間見之矣乃於公顧徒䄒其名姓夢想獲焉非有曵裾摳衣之雅篇聆袠誦之詳也歲旃䝉作噩八厓子自淛歸幸得所投贈唱和卷讀之然尚謂公之全且大者或不在兹當是時僕已弱冠有功名之役矣於是浮鄂逹燕㴑吳絶魯扼山河之勝攬城闕之雄訪遊厯之英筆賦詠之雋将盡圖所謂東橋公文者而卒莫可遂始悲惨噫嗚自悼其所值之不偶云誠以僕之疲駑浪迹以来窮其身阨其一第之名老大其年足矣曷有於精辭鉅筆海内豪雋之作即下里末學猶或得以捧誦識焉而僕固每求之而毎失之斯其為数之竒情之悲也可言哉可言哉今年秋卧病𤣥石山中有張彦博氏者持公集致我僕意張之貽也攬衣而起再拜而受則公之貽我也且我質而我商也顓吟恪咏字咀而句繹之驚愕失錯斂衽以避者彌日已而嘆曰嗟乎文其在兹乎夫著作之體先本性情乃及詞彩故詩也者言其志者也賦也者述其感者也文也者宣其蘊者也故情深思逺氣昌詞化是謂懿淑非此道也不在厥品今之墨客藻士豈無騁辭造語雄富濶大而足以駭聞美觀者乎其於性情之義則何如矣夫騁辭而造語雄濶而駭美者以其戾乎性情也亦㒺足稱数焉矧猶有卑𠂻淺畜之夫取𤣥渺難曉之事徒掇拾古人糟粕略易其曲折始終謂出已乎其於賦詠務一切沉晦支凑言欲以異常殊故而意實謭稚莫通者兹豈非文章之隠盜儒學之極鄙而宗工宿匠所深棄乎夫公之文寧值脱去数者固模世之大程垂逺之的則而性情之發且深者也是故讀浮湘之稿則幽憂之懐著矣覧樂府之集則諷寓之道昭矣觀顧氏之記則貽燕之㫖切矣誦近言之録則規範之訓詳矣味論語之抄則編類之見審矣玩登衡之紀則超適之興悠矣撫國寳之編則存亡之眷厚矣兹其於性情也有不一備者乎而僕之累求而莫遂乃今顧適焉致之則文章之遇合不有時乎然公也不自是而質諸人人夫自是之耻而人質也盛明之世羣哲庶彦固莫有能測公之萬一者矣僕也南荒之鄙人也嗜古無成希今鮮合力學罔詣其極修辭弗逹其機非若人也公胡為質之胡自眎之過謙而眎人之咸我勝也此無他徳之盛則其心愈卑知之愈真則其待物愈廣故也夫善人能受盡言以忠益望天下天下亦當忠益裨之公之文無容議已僕竊聞文者道之寓也道者濟世之符也古之君子非徒言之亦能行之公所為文若此其於經綸康濟之具固已畧備且其位又可以有為者也必一一以所言推而布之則是純道之政而非徒設之誕也夫全楚之地勿論其他即以民言水旱凶飢之廣徵求斂率之勤弊豈一日積耶而休飬安全令馴就蕃殖者上責也故誠一推其言則即公所謂富生朂㢘近民之数篇亦且用之勿盡矣而矧其有出此者乎夫衣食不足教化乃輕天災数起而上弗之恤則争奪興而亂離繼之兹三代以来恒患也故治世之務鮮不自富民始議者曰漢文帝於民也富耳奚教之聞僕則謂後世之治天下姑無望其教焉富焉幾人矣今天下萬里為郡縣奚啻千百等哉然僕觀其民葢靡不有饑寒逋負之慮其釋此勿係者二三鉅室豪賈已爾由此言之民之貧且瘠也殆不獨全楚則然即使公計日省閣卿輔賛兩儀之化而握四海之命也有出富民之圖者乎夫若是則公之道濟天下而文益奚足論矣然自公撫吾楚也其所行葢莫非所言云僕乃終日諤諤而無忌者一得之愚不敢自祕也惟公其宥之誨之實切瞻望明文海卷二百三
