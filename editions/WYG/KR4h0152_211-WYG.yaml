body:
  text: 明文海卷二百十一餘姚黄宗羲編序二彭氏族譜辨疑序解縉甚哉公議之難明也而世謂嘗明於身後非謂國史之傳足以考信歟未也時移事去過其舊鄉詢其故老稱人之善者無所佞諛言人之不善者無所避諱考其成敗之跡與其言行之遺以推原其用心庶幾足以知之然猶未也國史固不足盡信賢人之隐徳難知而凡傳記所説私家之所纂録或朋友私與其所善子孫欲盖其所親亦有姦諛未死之先逞其胸臆之見筆之於書以授其人令身後出之以為信實是非錯謬又有甚於國史之傳訛昔人有言人無所不至惟天不容偽欲知其人之善惡是亦在并視其子孫之隆替可以徵之也唐末五季豫章廬陵之亂極矣鍾傳起鄉兵䇿功至通顯已而驕恣其下復亂賴危全諷彭玕兄弟起而救其弊粗定一方傳奏全諷為撫州玕為吉州雖由傳所薦實唐室之命也楊行宻既背唐以自為則脅江西從之獨全諷及玕不從仍唐刺史之號各守境土以拒行宻則二人者特立不從亂固唐之忠臣也厥後勢孤援絶不得已而奔馬殷未嘗為之臣也殷亦念同盟以客禮待之獨鄉之傳聞與私家纂録多毁其務報仇為剽擊刦州人往臣於楚盖是時全諷死光稠降玕既去而行宻盡有江西鄉人亦多仕於楊氏矣玕固楊氏所惡也則其毁短玕者非私怨則為楊氏惡之矣玕之不死宜必有以報唐室者不幸梁唐繼簒志不獲伸惜哉又其事多散出於國史不得其列傳獨其子孫之盛有非私家所得而抑之者盖天之報之也故翰林危公太朴嘗敘其族出於全諷建昌撫州之有危氏猶吉之有彭氏榮盛相埒兩家善慶之積公議之明亦可得而徵也予友彭君子斐以家譜來京師名卿鉅公既皆為之序乃以示予予頗通氏族之學請著予所聞以考正焉譜稱彭宣氏事漢成帝為大司空而北齊陳留王樂其九世孫予按宣事孝哀以二千七十四户侯長平薨謚曰頃子聖孫業嗣侯遭王莽始廢而譜略之成帝下距北齊將四百年來不應纔九世疑上當有十字盖譜之增續傳刻屢矣㣲或有此遺脱也又云陳留王六世孫景直值唐中宗為禮部郎官其後有構雲天寳中袁州刺史李景以名聞上遣中使齊延立召之至再乃行上欲官之辭歸遣中使房嘉送之加賜束帛號其鄉曰招君有震山釣臺石室其所居處今袁州宜春也予按宣家淮陽樂家安定而景直但云世居淮陽豈遷徙不常故略之歟中宗時距天寳未逺景直構雲非父子則祖孫耳譜稱構雲之子始家廬陵而不著其先以何時居宜春予以他書考之盖自景直之先隋之季世而譜失其名不敢妄加盖謹之也又云招君之子兹憲宗時進士為進賢令三子伉倜維岳皆進士而倜登第在徳宗貞元七年為令宜春父兹登第在其後盖兹十七生伉十八生倜倜登第時纔十九兹登第時年五十二相去十六七年且以年少榮升而父差池晚世固常有此也倜生輔信州長史五子玕其第四子其世徳既如此譜稱其乾符初投筆舉義兵不著其居里按史稱玕世家廬陵今吉水永豐故廬陵縣地南唐保大八年始置吉水旋廢雍熈元年復為縣致和元年始置永豐今永豐之沙溪吉水之豐口墳墓具在玕以後唐長興四年癸已三月薨年八十敕葬長沙楊氏太和之五年也未四年而楊氏國亡始歸葬折桂鄉之豐口玕之生當在唐宣宗大中年也癸酉起兵時纔二十餘耳州志稱平湖有彭玕疑塚所居必在長溪豐口之間其為吉水人無疑也又云乾符丁酉謁鍾傳命鎮王嶺按王嶺在今吉水之蘭溪其上倉廪府庫之迹猶有存者其前有山曰張欽察乃呉將屯兵對壘之所初玕以門第領胥徒為州從事即棄去歸鄉與兄弟治兵王嶺非傳命鎮也傳以中和二年觀察江西而撫州亂賴玕及全諷平之傳始上其功為刺史未嘗私謁傳也譜稱乾化初授檢校太保後唐長興壬辰加太尉封安定王以疾辭不拜予按乾化之時馬殷尚在羈縻莊宗克梁殷始入賀玕不與偕行其志可見長興封王之命猶且辭之朱温太保之命其不受可知矣然則但稱吉州刺史者固玕之志歟今吉州自唐初所置故無城玕始築宋季丞相江公萬里為守以兵少減其舊之半其故址襟山帶江雄據要害元季措置緒餘猶可想少年起事白首百戰干戈從容不廢講學真豪傑之士哉故楚國大司徒歐陽文公以為使吉州遇時得君當不在郭汾陽下不虚語哉然予嘗過華州仰思汾陽之風低徊其故里而訪其子孫又不如彭氏之在吉者逺甚彼此先後所得又何較哉玕長子世家廬陵顯者有博士齊太子中允應求賀州刺史君醇御史中丞思永程伯子其壻也其在鄱陽有汝勵治平進士第一吉水豐塘有方迥寳祐南省第一人其在鏡方有應瑞應星應祈方界晉起予皆進士子美叔季新叔士龍九齡必逹士傑禹玉徳髙子明子承仕皆有名吾子斐其後賢也增修是譜其善承先祖之志哉書文章正宗楊士竒右文章正宗二十四卷凡七册今存五册欠卷一至卷八不完余客武昌時假館授徒有秦叟者以二子從叟耿介豁逹賈書為業所畜有十餘年不售者以是坐貧數月束脩無所入叟曰先生用書惟意所取也為取大學衍義及陶淵明詩叟以為㢘指所從學十嵗子笑曰是兒初生時千錢所得耳余曰畜十年不得當萬錢乎叟曰先生自處厚奈何以薄處我余為再取文章正宗叟益以王維孟浩然韋應物詩孟韋詩皆舊刻特完叟復顧余笑曰此書亦静極當動也余既以書去是夜秦隣家火延秦書肆盡焚之明旦余往弔焉叟曰物成敗有定數先日而歸先生以獲全者亦數也余孫擕書在京師姪子相登第賜居崇禮坊一日就吾家取衍義一册正宗二册又取陶王孟韋詩及他書歸讀是夜隣舍火延相家所蓄書盡焚之於是余所得於秦叟者惟存此五册及衍義三册如相後一日持去不及於燬然思叟定數之言固非偶然哉書胡忠簡公封事藁楊士竒右吾郡宋胡忠簡公封事藁有周文忠公楊文節公題跋在後忠簡孫搢刻於融州真僊巖劉長吾得之以惠余者忠簡筆法出顔魯公盖忠義之性有相契矣掲文安公謂此書本左司郎中豐城范璿舜文所為將奏之以示忠簡忠簡曰書奏即不免南遷子有老母不可以累母吾為奏之遂有新州之命余近於兩府檢志書見豐水志載范璿事云為户部檢詳時欲與胡銓相繼論奏和議胡首抗章范實慫慂之胡之逐又贐其行未嘗云此書范所為也豐水志作於宋南渡後當得實不知文安何自而云然也然文安云廬陵胡氏楊氏皆國家之元氣故以所作楊氏忠節祠記附此帖之後書蘇老泉文後楊士竒右老泉詩文三十餘首與用之同讀全集而擇之者也世之論文章家曰一代不數人一人不數篇觀於此可知其難矣書李長吉詩後楊士竒洪武戊寅冬余自陶金歸邑中過深湖值雨憇道旁田舍有學館教者延余坐童子從旁誦長吉夢天詩其句及字音多誤余私告教者正之應曰吾受之吾師如此意若不懌然者頃之入告其主人主人出不復問余所從來揖余曰子奈何非吾師余歎而不應童子益朗誦不休余厭聞欲起避之而雨不止既久余告主人曰讀此汝無所用曷如讀雜字書得用也曰然曰吾以雜字與汝易此何如曰可遂以鈔一貫納主人曰此可得雜字十數部主人喜即命童子以此本納余始問余所從來呼婦取豉湯蕎麥餅為禮雨止送余出門甚恭獨教者於余言終不能平夫於已不明妄自尊重為師以誤人及聞善言拒之不從而又有憾焉與欲教其子不知擇師徒費而無益如余所遇者皆不可也因記始得此詩又以寓戒云跋四書待問楊士竒四書待問一册八卷元臨江蕭鎰南金編為科舉之學設也元塲屋有四書疑問國初三科猶然洪武甲子始改為四書義此書余初習舉業時受之司倉伯今吾所蓄書獨此最久也跋史畧釋文楊士竒右史畧釋文一册余在京師并史畧二册皆得於隣舍之罷官去者憶年十四五坐貧不得已出為村落童子師以謀奉養之計而急欲此編及字書直音是時二書市直百錢然不能得也家獨畜一牝雞數嵗矣先宜人命以易之今致書頗多而先宜人棄背已二十年不及見也嗚呼慟哉法帖釋文楊士竒右宋劉次莊法帖釋文附以陳與義刋誤余初録於武昌尹千户盖童子所寫草草來京師重録之尹名昇余客武昌時已七十餘致仕間居與余厚其為人慷慨豁逹有俠氣好草書明四聲等字之學自著書已板行喜賓客尤喜接儒者所居直黃鶴樓之北面大别山江漢會其前鸚鵡洲帶其左治隙地數十畝為園池作小亭其中雜植四時花卉爛然不絶而山川陰晴朝莫之景出於亭下者一望可數百里實據武昌勝處亭中嘉客無虚日余亦數日輙一往醉其間然自余去武昌尹亦往雷州以卒其地遂廢謾因識此併及其人云説文字原楊士竒右説文字原一册元周伯琦著伯琦字伯温聞之前輩言元至正間初改奎章閣為宣文朝臣咸謂必命庫庫書榜是時伯温雖在館閣精篆書而未䝉上知庫庫日令篆書宣文閣榜十數紙周不識其意一日敕庫庫書宣文閣榜庫庫言臣所能真書非古古莫如篆朝廷宣文閣用篆書為得體周伯温篆書今世無過之者上如其言命伯琦書下筆稱旨由是益見進用前輩臨事明於大體而不自取其功與引拔人材委曲成就之如此皆不可及因得伯琦所著書輙附志舊聞於卷之末孔子家語楊士竒孔子家語一册在江夏時得之南昌龍參參博學工詩有清思喜規模盛唐吾友夏仲逹特愛重之參敦契誼然不能擇交湘中有道士善詩參南游與之厚後道士以符呪敗官并捕其家其父走匿參舟參弟諫不可納參歎曰豈有朋友之父有急而不容乎弟走告仲逹仲逹竊謂參曰不忍朋友之父亦念吾有父乎參雖悟終不肯明言遣之道士父心知其意去匿他處數日官跟捕得之他處匿之者同罪家屬皆徙邊參雖幸免罪亦因是盡䘮其家資易曰比之匪人參之謂矣若仲逹非納約自牖者乎余目擊其事故因此書思其人而以志戒常建詩楊士竒唐常建長安人𤣥宗時進士授盱眙尉世傳其詩集一卷今已罕見余客武昌時一日同陸伯陽造呉孟勤先生時先生初得此詩以示余兩人伯陽戲曰老師無所用此宜以惠教後生先生可之余曰以教後生則僕當得盖余少伯陽七嵗先生笑指門外汲井者曰二賢請賦此先就者持去余詩先就曰皎潔如明鏡銅瓶下愈深粧成不照影應恐墜金簮遂揖而取之三人相視大笑伯陽遂不復賦謂余曰宜録一本納我以謝不悌既歸即録送伯陽伯陽取謝𤣥暉詩見報謝詩亦今所罕見者後相姪持去失之此詩余得之二十餘年伯陽去世十有三年呉先生捐舘亦十年矣每一披閲追思當時游從之樂未嘗不歎息而怊悵也玉篇楊士竒玉篇一册考其圖書云周陽侯世家盖吾族兄孟堅之書余得之賓畿弟賓畿得之蕭子英子英孟堅内弟也孟堅多蓄書既死無子故遺書無為保蔵悉散落不存嘗誦劉長卿生子詩且免琴書與别人之句竊以為無後者之慨然今世儒之家子孫不肖往往取先人書籍及所為文章博易所好甚者用易酒食視棄之猶棄土苴以䧟於不孝而為人所僇笑者吾見之多矣如此亦何貴乎其有後哉廣韻楊士竒廣韻一册洪武庚午余市之其直五百文既為友人持去後十年復市之其直亦然凡今民生日用之物歴十年之久率增直十數倍獨書無所增豈售書者其操心獨㢘哉抑好而求之者寡雖欲增而不能耶跋木鍾集楊士竒木鍾集一册朱子門人永嘉陳埴器之著余初得於江夏樊思齊子賢子賢遺余他書尚多後率為親友持去今獨存此集及韓文耳余弱冠至武昌逆旅與子賢居相接一見相好如平生時年已七十其少與鄉人聶炳南昌包希魯交厚嘗親見虞揭歐陽原功許可用諸公其為學有要領治詩經評論古今人物及忖度事後當成敗皆有理而浮沉市㕓以賣書為業雖鄉人莫或知之者獨呉公啟佑時來就之然不知其意也頗喜作中州樂府以為馮梅粟之豪俊張小山之精麗當兼而有之時有所作輙為余詢焉余一日效其體和數篇見之愀然不懌曰老夫豈以是望賢者又曰老夫過矣余甚愧焉自是不復與余言樂府矣可謂愛人以徳者也未幾而别别未幾遂卒惜哉不肖駑劣既無以副前輩之望獨其拳拳厚意至於今未始一日忽忘之也故因此書識余之情跋橘亭幽興集楊士竒右橘亭幽興集一册集古棋法也友人鄧存誠數與余棋余不能勝存誠授余此集自是余頗勝存誠然僅勝存誠而已耳未有以勝餘人也始余未習棋授官翰林晚退之暇或與光大相聚以此為嬉光大機悟頴敏駸駸有造詣余不能及也是時同官能棋者頗衆以所造深淺髙下各相為耦日彰伯益一耦也光大宗豫一耦也用行民則一耦也崇璧與果之用之與余又各自為耦希範不及果之而差勝余然喜持論議不屈日彰嘗戯余曰吾棋如坐十一層塔頂公之棋殆在百尺井底乎余曰公尚未及李憨子吾豈不勝林和靖哉仲熈曰既不能及李憨子亦何用勝林和靖然仲熈棋尤下而篤好特過余數人者遇暇輙造用之及余或邀余兩人者就其家閉户以奕促婦具酒饌欵客余以疾戒飲則為粔籹代酒率嘗至暮或夜二鼔始散然仲熈未嘗一勝不勝未嘗不樂盖好之而不留意得失者仲熈一人而已余嘗有詩嘲之云年中欲數輸棋日直自新正到嵗除時又有好之而不能者若思幼孜能之而不為者伯厚也夫叨職侍近荷國榮寵閒暇不能及時進修以自見乃甘自棄若此且使後生小子視而效之廢學而敗徳皆非小過然當國家太平之時吾徒職務之暇得以從容間肆適其情者皆上之所賜其安可忘乎故既自訟吾過又以志幸遇云跋通鑑前編舉要新書楊士竒通鑑前編舉要新書􅄔金履祥編四明陳桱舉要起唐堯以下接乎綱目其體則編年其事則易書詩春秋其文則兼孔子春秋朱子綱目之法也刻在蘇州郡學余家一册録於中書舍人朱季寧盖讀之竊有感焉孔子傷周東遷之後堯舜禹湯文武之道不行上失其所以為君下失其所以為臣彞倫斁而天下亂故作春秋以正君臣父子尊卑内外之分以明堯舜禹湯文武之道向使二百四十二年之間堯舜禹湯文武之道行焉春秋之書無作矣春秋之後降為戰國為秦漢以至隋唐五代其為斁且亂益甚朱子傚春秋作綱目亦孔子之意也向使戰國至於五代堯舜禹湯文武之道行焉綱目之書無作矣故春秋綱目之作皆以傷堯舜禹湯文武之道不行於世也新書用春秋綱目之法乃比堯舜禹湯文武之事而書之果可乎哉綱目者繼春秋而作以新書接綱目之前是無春秋矣其又可乎或曰此書簡要便於學者夫簡便者常情之所趨趨彼者必舍此使人皆求之新書之簡且便將舍易書詩春秋不講卒不知聖人之所以為訓可乎不可也此皆余之所惑而不能通者願有質焉三朝聖諭録序楊士竒太宗皇帝初正大統故翰林之臣不及十數人詔吏部及翰林舉文學行誼才識之士授職其中士竒首膺簡擢賜五品服肇建内閣簡七人専典宻務皆進官士竒與焉屬時幾務孔殷常旦及午百官奏事退内閣之臣造扆前進呈文字商機宻承顧問率漏下十數刻始退既建儲簡翰林之臣兼輔導士竒與焉旦上前奏事退必造東朝參侍經幄車駕北巡簡内閣二人輔監國士竒與焉仁宗皇帝宣宗皇帝嗣位所以寵任士竒者始終皆如永樂士竒祗事三聖三十有三年寵愈厚而官愈進負乗之愧夙夜靡寧嗚呼三聖逺矣當時共事之臣或亡或退獨士竒今年七十有八衰病昏耄猶濫玷朝行未已也誠孝昭皇后上仙梓宫歸葬士竒奉命祗送旬月乃竣事其每旦展敬三陵之下追念舊恩五内摧痛因記憶榻前所得玉音之詳者輯而録之釐為三卷永樂居首洪熈次之宣徳又次之盖計平生所得此殆十之一二而潦倒荒迷非惟不能悉述亦不能悉記也有疑之者曰廷陛之宻可存於私乎輙應之曰吾惟懔乎慮冺吾君之盛美是懼而遑他恤哉不觀於古乎歐陽文忠公著奏事録及濮議司馬文正公著手録且記當時君臣問對之辭委曲而詳盡所以著一代明良契合之盛事盖昔之大臣君子往往皆然義之所不能已也况臣之所録有聖徳焉有聖訓焉有特恩焉臣惟懼録之不能詳也而奚暇他恤哉疑者既釋敬號曰聖諭録明文海卷二百十一
