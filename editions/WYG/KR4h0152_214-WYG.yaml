body:
  text: 明文海卷二百十四餘姚黄宗羲編序五著述跋石鼓詩陸深右石鼔詩先儒辯論至多葢風雅之遺云鼔在今北監予為司業祭酒時慮其日泐也欲扄鑰之而不果别有樹碑一元司業潘迪以今文寫之仍其舊闕潘碑與鼓積有存亡矣潘仕大徳間虞文靖公集助教成均時嘗謂十鼓其一已無字其一惟存數字潘虞相去不遠其言如此今去之又將二百年石可知矣詩之存者頗賴諸家文字集録以傳石顧足恃哉博洽之儒如王順伯鄭漁仲又好古而搜訪訓釋靡餘力矣咸存斷闕焉歐陽公集古所錄􅅻四百六十有五字胡世將資古所録僅多九字乃稱先世臧本在集古錄之前孫巨源於佛龕中得唐人所録古文乃有四百九十七字視資古又前矣又前之則韓文公所見紙本已謂毫髪備盡復有年深闕畫之歎韋應物亦謂風雨闕訛而杜工部直云陳倉石鼓乆已訛矣其上下世數如此近世吾衍子行尤號博雅自謂以甲秀堂譜圖隨鼓形補闕字列錢為文以求章句又參以薛尚功欵識諸作斯已勤矣亦僅得四百三十餘字毎鼓列行裁分為十而章句次第又與諸家不同子行介士未嘗入燕止於畫中見鼔爾不知近日何縁得此十詩完好乃爾耶此詩出於修撰楊用修慎若所從來果有的據豈非千古之一快哉如以補綴為竒固不若闕疑之為愈也子方選四言詩不覺欣喜而録之首簡文體明辨序徐師曾文體明辨六十一卷綱領一卷目録六卷附録十四巻目録二巻通八十四巻撰述始嘉靖三十三年甲寅春迄隆慶四年庚午秋凡十有七年而後成其書大抵以同郡常熟吴文恪公訥所纂文章辯體為主而損益之辯體為類五十今明辨百有一辯體外集為類五今明辯附録二十有六進律賦律詩於正編賦以類從詩以近正也輯既成繕冩貯藏以俟正于君子乃原撰述之故而序之曰夫文章之有體裁猶宫室之有制度噐皿之有法式也為堂必厰為室必奥為臺必四方而髙為樓必陜而修曲陜與狹通見爾雅為筥必圜為篚必方為簠必外方而内圜為簋必外圜而内方夫固各有當也茍舍制度法式而率意為之其不見笑子識者鮮矣况文章乎夫文章之體起於詩書詩三百十一篇其經緯各三風雅頌為經賦比興為緯書體六今存者三此蔡氏真氏據周官太祝六辭而言六辭祠命誥㑹禱誄也祠當作辭存者三誥誓命也誓即㑹也商有訓周無之然無逸等篇寔訓體也厥後顔氏名之推推論凡文各本五經良有見也或謂文本無體亦無正變古今之異而援周孔以為證殊不知無逸周官訓也不可混於誥多士多方誥也不可同於訓此文之體也其文或平正而易觧或佶屈而難讀平正者經史官之潤色詰屈者記矢口之本文乃文之辭非文之體也十翼皆孔子手筆序卦雖云夾雜要亦聖人之精藴存焉此釋經之體非屬文之體也其答齊景公問政止於二語答魯哀則七百五十餘言此随宜應對之詞而門人記之非若後世文人秉筆締思而作者也至如以叙事為議論者乃議論之變以議論為叙事者乃叙事之變謂無正變不可也又如詔誥表牋諸類古以散文深純温厚今以麗語穠鮮穏順謂無古今不可也蓋自秦漢而下文愈盛文愈盛故類愈増類愈増故體愈衆體愈衆故辯當愈嚴此吴公辯體所為作也曽成童時即好古文及叨舘選以文字為職業私心甚喜然未有進也幸承師授指示真詮謂文章必先體裁而後可論工拙茍失其體吾何以觀亟稱前書尊為凖則曽退而玩索焉乆之而知屬文之要領在是也第其書品類多闕取舍失衷或合兩類而為一或混正變而未分於愚意未有當也竊不自量方更編摩而以庸劣絀居瑣垣然退食之餘志不沮䘮蓋忘其非吾職也已而謝病家居積累成袠更以今名聊畢前志雖於先正述作之意不無異同然明義理抒性情達意欲行世用上賛文治中翼經傅下綜藝林要其大㫖固無戾也初擬上進故註中先儒並稱名姓後雖莫遂不及修改覽者勿以罪子則幸矣是編所録惟假文以辯體非立體而選文故所取容有未盡者亦有題異體同而文不工者復有别為一格如六朝唐初文陸宣公奏議今並弗録博雅君子當自求之至於附録則里巷家人之事俳優方外之語本吾儒所不道然知而不作乃有辭于世若乃内不能辯而外為大言以欺人則儒者之恥也故亦録而附焉萬厯改元嵗在癸酉三月朔旦吴江徐師曽序禮記集註序徐師曾古昔聖王迭興人文漸著各有禮樂以致太平蓋至有虞氏而始詳厯夏及商猶尚忠質至周而又加詳意其時禮樂皆有全經而散逸不傳今所存者惟周禮儀禮而已若夫禮記則四代之遺制聖賢之格言在焉孔子沒後七十子之徒相與共録而成書雖王制月令作自秦漢要亦不可少者孝武時河間獻王徳得其書而上之孝成詔劉向校定二百五十篇厥後戴徳既删為八十五篇戴聖又删為四十六篇後漢馬融傳其學乃附月令明堂位樂記合四十九篇其餘歸諸大戴禮故今之禮記戴聖馬融之所定也後儒謂儀禮為經禮記為傳似矣曽竊以為此書蓋二禮之傳不特傳儀禮也何則周禮者周之官制也六官各有所職而大要以五禮為主故舍曰官而曰禮儀禮者周之禮制也五禮但揭其綱而行之以儀節為目故不専曰禮而兼曰儀由是言之則儀禮者為周禮而作也彼其並稱為三禮者固云誤矣而謂専傳儀禮無乃有遺論乎今考此書之於二禮有釋其義者如祭義冠義問䘮等篇又如曲禮朝覲聘問之類固釋儀禮至于遇㑹誓盟之類則釋周禮也又如文王庶子所記庶子是釋周禮諸子之類今不能悉舉讀者當自考之有補其闕者如曽子問奔䘮雜記䘮大記投壺諸篇又如曲禮所記天子諸侯后夫人卿大夫生死祭享祭品稱名明堂位所記朝位昏義所記天子諸侯教婦之類有引其全文者如内則所引並周禮全文有文同而指異者如䘮大記多引儀禮士䘮禮正文而所指則自大子而下曽子問載子㳺問䘮慈母如母本儀禮文而孔子所答則異之類有畧相似而増損者如少儀言語之美章與周禮畧同然損其三而増其一之類有因其文而推廣之者如䘮服小記婦當䘮而出一章是因儀禮子嫁反在父室為父三年之文而推言之之類有觧其未明者如䘮服小記問䘮三年問䘮服四制諸篇有不相合者如䘮服小記生不及祖父母諸父昆弟而父税䘮已則否降而在緦小功者則税之與儀禮兄弟皆在他邦加一等不及知父母與兄弟居加一等不合又如䘮服四制言父母以思制與儀禮䘮服傳言至尊者稍異之類有雜記四代之禮者有専記周人之禮者有美其合禮者如檀弓所記孟獻子禫文子除䘮待弔之類有譏其失禮者如檀弓所記公儀仲子舍孫立子子路姊䘮弗除之類有記其非古者如檀弓䘮冠反古及易墓之類有記禮之所廢者如郊特牲夷王廢覲禮之類有記禮之始變者如曲禮士誄檀弓帷殯之類有記其僣禮者如禮弓設撥來舍禮運醆斚户君之類有專言禮者如禮運篇有兼言樂者如禮噐郊特牲樂記仲尼燕居所言之類有别記録而無闗於禮者如學記緇衣儒行大學諸篇中庸除追王逹孝禮樂三重外其餘皆是要之傳周禮者固傳周禮其傳儀禮者亦所以傳周禮也彼異代之制可備損益記録之附可資禮學皆二禮之羽翼也顧其間或出後儒之傳㑹不免有倍盭者存讀者但當闕其疑刋其謬以禮樂之本治其身心以器數之文博其理趣則由此書以逹二禮豁如矣然非通其文義終莫能入此註疏所以不可廢也鄭氏而下亡慮五十餘家舛訛雖多切當時有是在擇之而已宋有陳可大氏集諸説之大成為世所宗厥功不細惜其取舍失衷章句錯雜殊不滿乎識者之意曽末學寡陋潜心三十餘年輙不自量稍為刪改參以愚得命曰其註使讀者暢通大㫖而因以求先王象天地制禮樂之心或未必無少助也脱藁斯竟序而藏之以俟君子隆慶六年嵗在壬申五月二十四日吴江徐師曽序明文海卷二十四
