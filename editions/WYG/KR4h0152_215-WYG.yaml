body:
  text: 明文海巻二百十五餘姚黄宗羲編序六著述刻唐詩二十六家序黄姬水叔氏浮玉子梓唐人詩自武德迄建中二十有六家成有詆之者曰唐人詩自貞元以後其音嘽以緩替之漸也弗梓可也以問余余作而歎曰夫詩者聲也元聲在天地間一氣而其變無窮者也取諸洩志而眞已矣代曷論也今之談詩者其誰不曰風騷而下其漢與魏乎漢魏而下其唐之盛乎指五尺童子而問之亦知談如是也嗟乎名言也而未為逹方之説也即是而論則三百篇已矣奚有于騷奚有于漢于魏又奚有于唐之盛耶嗚呼今古時遷質文俗革聖人制禮樂而不制于禮樂故苟根于心不必復古苟出于眞何嫌于今奚必易衣裳而綣領反雕峻于采茅者哉昔九方堙相馬曰臣得其精而牝牡驪黄弗與也以代論詩是以牝牡驪黄相馬失其精者衆矣若曰氣有强弱調有髙下以是疵焉則天地之可以聲求者莫如風雷必以奮者迅者為雷則殷殷然以鼓者非雷也耶必以飃者颲者為風則颸颸然以噓者非風也耶故激烈雄邃者詩也温柔暢婉者亦詩也惟其眞焉而已浮玉子曰彼之詆者亦知貞元建中諸子之撰其律和其情備非不嘉藻也慮夫效之者其調日趨而莫之底也余曰否否在人今夫閨房里巷未嘗論討而其言可被管絃即宿儒老師曰某格某調卒嵗穿求而不能幾一言者有矣故如其人雖降而為貞元建中眞也猶之章縫之士而為桑麻之談俗亦雅也非其人雖躋而為開元天寶弗眞也猶之市井之夫而習都人之語雅亦俗也嘗聞陳思王曰有南威而論淑媛有龍泉而議㫁割竊笑夫窮鄙之社空空之夫字義句讀尚或未通却乃剽竊其詞倔强其句嘵嘵然曰我漢我魏我盛唐也而輙置其蜚喙以凌誚媒孽徃哲可羞也已悲夫悲夫良工獨苦寜自今哉有唐三百餘禩不知作者凡幾而流傳於世者僅百人耳雖所詣不同緬想吟魂靡不極慮沉思殫其生平者矣則雖卑弱如晩唐不可以訓而亦不可以湮也况夫郎拾遺秦隐君皇甫司空軰與錢劉抗行者哉至如李蘇虞許接軫於沈宋顥詠頎建方駕於王孟者所不待贅也于是浮玉子命書簡策以詔同志云浮玉子嘗學於先子五嶽君故知詩貧士傳序黄姬水粤天生民惟民有欲廼作君師俾寄乎理故帝王之治井授㕓分務存普濟而玉燭之化人熈戸給自臻大同粒被之外靡圖滋羡富貧之目于斯未分自夫鴻古既降窮縱肆趨茹杯土茅之俗遐珍甘峻雕之風起故天下之民五性蠱其衷十盗集其室盈則驕革僭于宸御歉而匱瘁謟赴頓陶貲鏹豐溢者力適而勢彰釡篋單虚者友疏而家誚於是各人其人各心其心舍孑身皆胡越處一姓為仇讐攫而争也如猛獸鷙鳥豢而養也如廐肥欄畜然禄以德享財非悖入精英之聚鬼神所殃多藏之門鮮不罹咎如漢卓以郿塢而族晉崇以金谷而收若是燼㓕者不可勝紀良足鑒矣然昏惑沉淪危亡安樂莫不熈熈利來穰穰利徃貪墨掊克而桀心充位饕餮苟得而跖行塞閭貴豪積貨于丘山元庶槁躬于溝壑嗚呼此天下之所以日就于匪康而貧士之所以希覯也困亨貞于周辭無怨難于洙訓豈我誣哉然庸彚雖繁廉資者特受情瀾雖倒清介者獨持則代亦有其人焉由今論世即事考心或逸尚高盤弗屑塵穢或懐冲養順恐擾天和飽仁飫德則澹視如雲苦節清修則嚴揮若凂保身明哲以遠害而輕履命舛乖以居易而泰是皆襟侔𤣥造意軼遐皇不以欲疚不以俗磷不以終渝者也吁哉卓乎其諸蜂營蟻競而靈鳳丹山神龍蒼海超然無累矣乎使天下皆貧士之心焉則揖讓成而雍皥登矣詎可易視之哉慨其不樂世聞名跡韜閟間有散見經史百家者不有類傳曷便披抑馬遷之紀貨殖未免興汚揚雄之賦逐貧豈能激濁陶歌蕭咏緗帙多遺某也幼遭坎􅇄雖處屢空之時緬思古人實獲宴如之抱癸已之春青陽卧疾乃就榻上徐為編摩姬周迄今凡得七十五人列為二卷務皆畢老無榮斯登芳簡倘先窮後逹老乏少殷有一朝之遇者皆所未編也始之蹟述繼以頌揚庶乎景表懿德遠揄素風則是傳也非徒為一已之私好将以望天下之困窮君子庶幾有聞而起也註叅同契序徐渭徐君景休所註叅同契存而諸家云亡者以偶不諒古人著述之體故也後儒於書句句而訓之章章而貼之故經自為經體而註自為註體古人則不然其註經也取於明經而已註之之體或不章貼而句訓編而次之之人亦無從章析而句分兼乏作述之才韻調不遠古今相隔考問無由指存為亡轉傳轉信矣景休之註之湮也坐于是景休之註湮而魏公之經亦泯㧞景休所以起魏公也諸家言經者欲㧞景休而不得甚至欲分四言為經五言為註是止馮字數以别唱隨遂起吳傖妄裂亞招如萬手繅絲不勝其亂好古者尚譎又從而繆序以信之註未及還經且盡失予覺其然乃取廬陵陳氏所註分章上下乆之一日試挈某篇與某篇相印一經一註母子粲然以逐他篇莫不畢爾辟如陸遜束炬先攻一營遂曉破蜀之法連營七百里一旦席卷魏經徐註既蝕復明夫長者貲財記分衆子帳籍自别然當其未分不特為衆子畫餅抑且起衆子支屬妄擬某物當付某房誇示眷戚註未分經亦復如是及至分貲妄擬乃歇註分經定亦復如是雖然貫穿文義印字曉人亦小補耳若悟眞機字乃無隻故分經分註援筆於既悟之後則可牽文於未悟之先則不可不然掇拾糟粕希不見誚斵輪矣阜阜冬冬有上無下有西無東貫心于中開户支忩叅之斗蓬一用寄衝主言始終言終於甘始於十兄若問吾心正兎三䨇而雞十䨇蒼箕中人叙言詩説序徐渭予嘗閲孟德所解孫子十三篇及李衛公與唐太宗之所談説者其言多非孫子本意至論二人用兵隨其平日之所説解而以施之於戰争營守之間其功反出孫子上以知凡書之所載有不可盡知者不必正為之解其要在于取吾心之所通以求適于用而已用吾心之所通以求書之所未通雖未盡釋也譬諸癢者指摩以為搔未為不濟也用吾心之所未通以求未通之書雖盡釋也譬諸痺者指搔以為搔未為濟也夫詩多至三百篇孔子約其旨乃曰興而已矣曰思無邪而已矣此則未嘗解之也而其所以寓勸戒使人感善端而懲逸志者自藹然溢於言外至於所解見於魯論鄒書者有若淇澳烝民裁數語耳他若棠棣志懐也而以警遺巧笑美質也而以訂禮雄雉思君子也而以激門人之進若是皆非正解者矣㑹稽季先生所著詩説解頥凡四十卷吾取而讀之其大槩實有得於是其志正其見遠其意悉本于經而不泥於舊聞是以其為説也卓而專其成書也勇而敢雖古詩人與吾相去數千載之上諸家所註無慮數十百計未可以必知其彼之盡非而吾之盡是至論取吾心之通以適于用深有得于孔氏之遺者先生一人而已夫以孟德與衛公摘其所述兵家者流耳有濟於用而吾猶然取之矧是書也詎邪説正人心上發先儒所未明下有禆於後學者哉吾讀之解頥焉因為之刻刻成而請序遂序之若其剔隐伏刺缺漏按駁禁捋胃搯而腎擢之雖善避者無所逃如子唐子所謂古經師不及者多散見於諸所著述不獨是書已也四書繪序徐渭嘉靖辛亥余讀書於錢塘之瑪瑙山寺寺西近岳鄂王祠兩廡壁畫王出處及征討撫降事人馬弓旌馳騖伏匿之勢行營按壘叩首呼歡相問訊之狀顏色丹青能顯其跡畫不能顯輙復畧書表叙比之尋史册中語似更明暢且動人其後讀内經氣穴等篇藏俞府俞之類及諸經絡皆三百六十有五扣其所在雖百註解不了也行市中買明堂圖四長縈為脉圓孔為穴脉穴名字就記其旁闗鍵貫穿向所不了一覽而得焉四書中語言聖賢之精意也全體似人身有脉絡孔穴隐藏引帶不出字句而傳註講章轉相纒説未免牀上疊牀乃感前事始用五色筆繪之即其本文統極章叚字句凡輕重緩急或相印之處各有㸃抹圈鈎既以色為號復造形相别色以應色形以應形形色所不能加乃始隐括數語脉穴之理自謂庶幾燦然夫繪之與解均屬筌蹄但其異處雖渭序中不能自表也學士君子觀其繪書幸有以相教然渭所作繪之意率感於明堂圖文章辨體序余孟麟夫文以道其心之所欲言曷為而有體也文之有體夫即樂之有倫乎樂之為音起於蕢桴土鼓成於大章雲門而䟽於流商刻羽究其指極則曰無相奪倫聲者不得振振者不得聲何其犂然辨耶今夫道以麗事言以因時載在徃籍如畫卦叙疇亡論已自朝廷矢謨閭巷托詠與夫勒之彛鼎陳之諷諭以極于儒生墨卿之所屬詞而引類為賦為序為贊為書諸不可枚舉總之則出乎至情而發之當物皆文也劉勰氏曰表章序記則羽儀乎典雅贊頌歌詩則楷式於清麗豈所謂體固然耶古之作者言人人殊然選義按部考辭就班大都各率其體是樂之聲者聲振者振晳乎不可紊鑿乎不可廢也晩近世操觚濡藻之士非不羣然踵接顧師心自用斤斤不喜剿説而擿埴冥行去先王仁義禮樂之道且詭而遠非夫文辭多變不識其體乎奈何鼓宮以角應叩角以宮應也鮮不悖矣嗟嗟文胡可以無體抑胡可以弗辨也海虞吳公訥慨文體之不端後學者靡所考鏡乃取古今之文編為一書上下數千載其人無慮數百家凡古歌賦以及銘檄為類數十餘種釐正體為五十巻而附以變體五巻彼其無闗世教者並置不録名曰文章辨體揚扢㣲深劈析疑豫發今曩之藴校華質之規良以觀象乎古人而貽則于來葉也往有刻本其傳不廣兹重為繕梓以公惠於人人刋既成予覽其書而序之曰射御直藝耳非得其道不精予觀善其事者省釋于括度先後于馳驅若飲食被服然終其身而不厭而衛靷之工苦弓矢之端衺不勞揣逆而知此其法也至其總驂騑而中侯鵠隨所試而無不當則得之於心而應之於手非法也道也惟精者自得之耳故曰齊扁之斵輪也進乎道矣是書所具故法耳學者由其法而精之叅伍夫歴代之變而仰遡乎先王仁義禮樂之訓其於道殆幾矣百家類纂序余孟麟百家類纂者羣百家之書各從其類而纂次之也夫百家所從來乆矣禎圖靈篆玉䇿金繩靡得而云典謨兹降機見殊門爰有鏤精掞義之士各暢其性襟宣之簡素勒成一家言不其彬彬焉鏘鏘焉于文藝之圃哉自漢以來史官别其名氏篇第以為六藝九種七畧至唐始分四類而經史子集並世異流矣或曰諸子之澶衍皆起于聖學之湮塞也夫大道既隐㣲言幾絶一曲之見欲以杼軸精英窮極跌宕故朱藍並妍不相祖述然舉其靈變則超詣弗神裁其名理則詮析失實卒使蔓延雜説畔于正軌其不為道術裂者幾何乃讕言兼存璅語必録君子猶時有取焉則奚以説也予觀類合之書或以文羅衆妙或以事囊千載參伍古今之變發揮物彚之情昔人所稱入道見志之書而隋志亦謂諸子為經籍之鼓吹文章乃政化之黼黻故傳聞者所弗棄也但充廂照軫繁積𢎞多索貫披條尋究不盡有識者所以詳繕故實比類相從標其妙義削其枝辭以纂會成帙顧夫靈禀罕遇管窺易䝉各擅編摩不繪經練傳家以摉冗為富人以淫麗為誇是故摯虞流别徒掇菁華義慶集林僅娛耳目且代次弗拘雅俗罔擇志牒雖夥殊未有秩然者此百家所繇類纂也今諦閲其書八家臚列以陶鈞乎品教故儒家立其凖以觀研乎冥筌故道家攡其精以綜覈乎施注故法家徵其實以幅尺乎體格故名家表其模以曠適乎解脱故墨家括其隐以搆攝乎機變故縱横家致其曲以釀浸乎物典故雜家通其方以籠挫乎韜略故兵家掄其算有題引以叙各家之本原有題辭以詳諸子之始末而又去其踳駁㧞其綱統使讀之者若控衘轡馭六馬從横屈曲于九折之坂而不亂以殷鑒曩古以設教将來庻幾乎凖的人倫佐張興理亦在所不可缺如已抑乂聞之蕞殘滿車不成為道玉屑滿篋不成為寶多聞見而岐于他道君子之所闢也嗟乎石以為錯不曰非玉弗用也藥以攻疾不曰非五穀弗食也誠極其異同之故逹其指意之殊而一要諸聖軌即泛溢百家不足為我惑而且将為我用是故君子之於學也博而取之約而擇之以是乎不然者射𢎞博之科矜闊麗之識窺壖嚌胾而奥㫖靡聞飭錦彪章而實用蓋寡此乂類纂者之深慮也詩考序王樵子曰吾自衛反魯然後樂正雅頌各得其所史記云古詩本三千餘篇孔子去其重取其可施于禮義者三百五篇今按夫子正樂止言雅頌各得其所而不及風蓋二南用之天下無俟于正十三國變風雖領在樂官但存其實以為鑒戒而不必皆有所用孔子不必一一論而定之如雅頌也自史記有孔子去其重取其可施于禮義者三百五篇之語故後世謂孔子刪詩其實未嘗刪也雅頌有殘缺失次者正之而已班固謂王官失業雅頌相錯季札觀周樂以小雅為周衰以大雅為文王蓋以正變為大小也則當時禮壊樂崩之後詩亦從而亂也久矣夫子自衛反魯得之他國叅相正定然後各得其所得其所者得其所用也有王者作則禮樂興是皆其用豈空言哉近時王純甫先生謂夫子論治則放鄭聲述經則刪詩正樂刪之即所以放也刪而放之即所以正樂也若曰放其聲於樂而存其辭於詩則詩樂為兩事矣此言固是而未盡詩樂雖非兩事然當知詩自詩也聲自聲也笙詩六篇有聲無辭舊蓋有譜以記其聲而今亡矣非但笙詩也餘詩皆有譜有譜而後聲可傳今辭傳而聲不傳矣孔子曰鄭聲淫謂其聲淫耳若曰皆男女相悦之詞則是鄭詩淫矣鄭聲者周子所謂妖淫愁怨道欲增悲者也疑春秋時所謂鄭衛之聲者亦不專行于其地諸國皆有之但是其音節而不必是其辭則皆其聲也夫子以其時之所尚而盛行蕩人心壊風教莫甚于是也故亟欲放之放鄭聲者夫子之本志歸魯正樂則考定雅樂以為之兆也當時聲與辭俱存故樂可正今聲不傳故古樂卒不可復而其辭之存者亦多非古經之舊自朱子集傳之後其門人項安世平甫時于言外有所獨得可謂有功于此經其説曰甘棠分陜以後詩也何彼穠矣東遷以後詩也楚茨以下十篇正雅而雜之變雅豳風雖繫于國風之末然非變風也周公之正風也七月周公所作備陳王業之本以告戒成王與無逸相表裏其餘或周公所作或為周公而作無可附麗故取而綴于七月之後且有豳雅豳頌一詩而具三體不止于風也故置諸風雅之間所以尊之見與列國之風不同也自王仲淹例以為變風既失之而且勦王亦未敢誚公之言以為君臣相誚尤無理其曰成王終疑周公則風遂變固矣獨不曰周公至誠卒能正之乃不曰正而反曰變以損其實乎殆非夫子之意也周頌章句與風雅之體不同其音不必協其句不必齊其章不可分記曰清廟之歌一唱而三嘆正謂周頌也倡者舉辭和者舉聲三嘆則和聲之多也今其三和之譜不存而一倡之辭獨載此所以多類有闕文疑義而不可易知也桓之詩春秋傳以為大武之六章則今之篇次非其舊者多矣商頌那與烈祖二詩皆五章章四句以韻考之可見獨第五章各加顧予烝甞湯孫之将二句以為亂辭而必欲凖之周頌以為一章則失之牽合矣國語稱那之末為輯之亂則元非一章明甚又長發殷武皆明著章數不應一頌而自為二體𤣥鳥一章亦當分四章章皆五句獨第三章七句此詩毎章之首皆承上章末字發辭正與文王下武等詩相類皆其分章處也而經師不察右皆項氏之説自朱子一洗小序之陋以詩說詩而不為沿習所膠其得詩人之意不啻什九愚學之晩因項氏之説再為考録相遺經接緒義成先覺是亦朱子待後人之心也校録古禮序王樵古禮亡闕文公朱子嘗請於朝欲修三禮而不果又嘗編類亦未成書然其考禮之意凡吳氏叙録所擬議者俱已具朱子與潘恭叔書中朱子大意儀禮附記一也禮記分類二也其他經傳及注疏類書但説禮文者並編集别為一書三也周禮全書雖不可分析若欲便于考閲亦即以祭祀賔客等項事别為門目自為一書四也此外雜書若國語孔叢子之類别為外書以收之庶無所棄遺又不至混亂五也竊謂此恐是朱子編類之初例也又答應仁仲書曰前軰常患儀禮難讀以今觀之只是經不分章記不隨經而注疏各為一書故使讀者不能遽曉今定此本盡去此弊恨不得令韓文公見之按朱子所定此本不知與所編儀禮經傳通解同否要之分章句附傳記朱子以為讀儀禮之要法因恨不令韓文公見之而吳幼清乃謂經之章後不宜𨽻以補記補傳經之篇後不宜錯以傳篇補篇其亦泥之過矣經傳錯處如漢費直以易彖象傳釋經鄭𤣥王弼乂分附卦爻之下誠不可也朱子之書豈有是哉愚嘗謂經不可補而記則可續朱子於禮經中如内則等篇名曰補經而所刪修實戴禮之文非經也或削本篇之文而補以他篇之文如郊特牲中有冠義昏義在本篇宜削而歸之冠昏本篇乃得其所是乃正其錯簡而非亂其成篇也内則最為完篇中間亦雜以養老一叚朱子所定内則之文一曰事親事長次曰飲食次曰男女之别次曰夫婦之别次曰御妻妾次曰胎教次曰生子次曰教子次曰冠笄嫁娶整然有倫使先儒掇拾之簡更成完璧豈得必以舊文為是乎自有此書使學禮者尋討易見要領豈不甚幸且於衆論有所折衷尤非小補惜乎禮學日廢學士大夫罕復究心于此并其書而不復讀者多矣世之所存僅有監本而殘闕漫漶幾不可讀予竊懼焉爰取舊本叅校而重録之儀禮十七篇三山楊信叔有圖行於世足為禮經之指掌禮必有義義必相附取冠義等篇依朱子所定各繫經後其内則以下諸篇并䘮祭二禮悉依朱子與勉齋黄公所修而録之取便于誦習故但掇其要畧餘有不能盡者凡朱黄所采輯諸經傳記之文惟周禮謹遵朱子初意别為一書云周禮全經序王樵孔子曰為國以禮先儒程子以為逹此理者堯舜事業也蓋天高地下萬物散殊而禮制行矣流而不息合同而化而樂興焉此理之自然也君子循乎此理故其為國自君臣父子之大以至言動威儀之細其多至于三千三百而莫非此理流行之體天地萬物自然之定分也但我不以私意擾之則天地順序而萬物各得其所顏子克已而復之於一身堯舜安仁而逹之於天下其為禮一也故曰天叙有典自我五典五惇哉天秩有禮自我五禮有庸哉天命有德五服五章哉天討有罪五刑五用哉謹之於人心之危道心之微而逹之於水火金木土穀惟修正德利用厚生惟和者一事而已所謂順此理而不以私意擾之故曰夫何為哉恭已正南面而已矣得此于上堯舜所以有天下而不與也得此于下仲尼所以飯䟽食飲水而樂在其中也或謂夫子若得邦家堯舜事業如運諸掌此理不然夫子不得邦家堯舜事業何嘗不在禮儀三百威儀三千無一事非仁也四時行焉百物生焉吾無隐乎爾無非堯舜事業邦家之得不得非所以為夫子之加損也由求之徒蓋未逹也顏子其庶乎故子語之曰行夏之時乗殷之輅服周之冕樂則韶舞嗚呼周公之道其不在兹乎其不在兹乎周公之道堯舜之道也其遺典之存者有儀禮周禮他經言其理二禮見諸用此固古聖人所以修身齊家治國平天下之實事也佛老見其大而不見其實則騖而為虚禮學專門之家見其細而無見其大則拘而為陋二禮之不明也久矣漢儒譬之周公守藏吏也名物充陳不問良楛天球河圖兌弓和矢與夫名材毒藥敗鼓之皮但傳以為先世所遺者皆籍記而封守之惟謹王安石啓漢儒之藏用其毒藥以療人之饑渴遂禍天下世之以是為周禮病則亦過矣紫陽朱夫子見高千古學綜徃哲嘗謂周官一書固為禮之綱領至其儀法度數則儀禮乃其本經而禮記郊特牲冠義等篇乃其義疏耳因為之緒正今世所傳家鄉邦國王朝禮與其徒黄直卿所纂䘮祭二禮者蓋僅其編類之稿本也将復加筆削而先生殁矣元吳幼清氏有志續成之而乂不就長樂柯君獨能精考力求不泥於名法之拘陋而能見其大於古聖人所以由之於身而措之天下國家者可謂見其實其書之先成者有周禮全經蓋取遂人以下地官之半實冬官也不煩割裂紛亂而全經自復乃集諸儒之説以釋之發所見以原之其間如鄉遂井田貢賦軍伍皆有獨見非諸家所及周禮既成将遂及儀禮以終紫陽夫子之志日偶遇予雲陽一語意合遂辱定交閲嵗盡携所著過予草堂而相訂焉且以序屬予愧謝弗逮而柯君之意堅甚乃為著其志焉國子先生姜叔氏者廸古崇禮之士也試以予言質之當復有以進於柯君薛方山隨寓録序何良俊方山先生詩文集總若干巻既刻梓以傳矣兹隨寓録者乃督學浙省與治兵秦中時其所論撰門弟子隨手輯録遂亦成袠先生出以示某使序之某卒業以復于先生曰先生之文若淵海然余不得其涯涘余曷敢序焉曷敢序焉先生曰公一時最知文且素戅直言不誣公無辭余曰唯唯余憶辛卯年與先生俱入試于南都先生爾時名譽籍甚已震動于都城南畿人來就試者皆知常州有薛先生善為古人文其學無所不窺南都士莫有能先之者先生偶知余過訪焉交見甚懽也是年先生與余皆見黜于有司相繼以㧞貢去繼是先生以甲午舉於鄉乙未舉㑹試第二先生官漸起天下人皆知有常州薛先生矣而余屢試不售遂歸隐東海上取所藏故書讀之毎晨起誦讀必至丙夜遊行持巻册有時顛墜阬岸蓋欲覽前代餘畧以揣摩當世之事不但為文詞爾也如是二十年復出以干時又不售得翰林孔目而南非其志也甫三年即罷去而先生故勌遊矣丁巳春相見于青溪之上各出示其所為文相顧大笑先生乃曰公不負余余亦不負公哉夫今世所稱最善為文者公知之乎大率有三等其一喜言理其二好騁聞見援引故實牽合强附以竒僻為工間有不渉二者能上追史漢論事切當情實忼慨激烈于時世有闗然合之於道或稍牴牾余於此二者不能無隘心焉若其崇竒好怪務為晦澀故滅裂其體艱深其辭然要其中之所存不越常人之見此又最下劣不足言者余試舉言理者與公論之嘗聞古人云文以載道未聞其必欲援道以為文也夫援道以為文此之謂挾天子以令諸侯舉世莫或非之然道正不須言不言而道未始不在苟一渉有言稍或不合則毫釐之差而學者承誤襲謬所謂以學術殺天下者此也夫道者磅礴混淪酌之不竭如羣飲於河由人自取詩曰中原有菽庻民采之此之謂也夫飲河者豈能盡河之水猶之求道者豈能盡天下之道易曰仁者見之謂之仁智者見之謂之智言人之氣有清濁性有剛柔各充其量不能兼也今序一人之事則曰某事如此是仁也某事如此是智也則是聖人許人以各具而今人顧能全體之耶易曰形而上者謂之道形而下者謂之器夫子曰中人以上可以語上也中人以下不可以語上也夫所謂語上云者道之謂也語下云者器之謂也則是以聖人之門中人且不得語道故曰民可使由之不可使知之子貢曰夫子之言性與天道不可得而聞也今贈一人以言則曰如是而謂之性如是而謂之命如是而謂之天道則是其所告語者盡子貢以上人耶然要之無當于其人無闗于其事不過取先王芻狗陳之見者曰是嘗為神之所慿矣遂駭然生敬而不知其故芻狗也世無尼父誰為折衷為文之弊余不知其所屇矣余舉手以謝先生曰先生之言某之心也後數日陸祠部五臺過余偶論及文余舉似之五臺曰為文語道蓋自昌黎公已然矣余曰公試舉一二五臺曰如原道送文暢師序皆是也余曰嗟嗟五臺夫文名原道非道曷明且文暢以浮圖之説與吾儒角立苟非明吾道以勝之乂将何所言哉至昌黎其他之文若送王含秀才則近取于醉鄉送董邵南則遠思燕趙悲歌之士辭意忼慨令人思奮豈必盡談空談性説仁説智哉夫道若日月然日月在天則盡天下之物凡慘舒榮悴舉莫能逃其形矣道在天下則盡天下之人凡邪正得失舉莫能遁其情矣譬之太史公作史記其序游俠刺客四豪諸人皆直述其事宛如畫出而千載之下讀其文者猶可想見其人然而道固自在合之不合而醇駁之迹見矣豈必曰某事合道某事非道然後為得耶故懸日月以待物而物形自見苟一物以一日月照之日月其晦乎懸道以待人而人情自見苟一人以一道語之道其裂乎五臺曰道固若是公無乃稱故余因叙先生之集聊復及之先生之文談理而不見其迹引故實皆當其事上薄史漢而不詭于道今具在集中覽者當自得之蓋必得先生之意然後可以讀先生之文後世有知余二人者其在斯夫後世有罪余二人者其在斯夫唐雅序何良俊張子撰唐雅成東海何良俊曰余讀謝康樂擬魏太子鄴中集詩蓋未嘗不傷之焉夫世有辭章之士苟得見知其主上下齊契君臣同聲相與遊譚詠歌雍容盛美顧不謂顯榮哉然好文之主不世出難進之士彼其于世又不屑屑也遂有伏死巖穴終身不得望帝王之門者此其遇不遇何如也世有如此者可勝歎哉可勝歎哉誠使謝與七子比肩於建安之朝則公幹仲宣之亞匹自偉長而下有不得争騁而較疾矣乃遂偃蹇下僚終以狂逸取罪當世故其言獨傷宋玉唐景鄒枚嚴馬之主不文魏武帝雄猜多忌而以鄴中之娛為書籍未見此其意不無少望也今余考鄴中諸作自公讌贈答之外不少槩見獨有唐君臣之盛視是有加焉夫唐太宗當草昧之初即好篇詠海内風動羣士響臻是以俊彥在列風雅盈朝毎朝章國典錫爵寵行節候和韶物色妍冶苟情有所屬事足樂詠者則君倡于上臣和于下雖以一事之微而鋪張陳冩曲盡其變獵秘搜竒窮綺極麗顧盼而興風雲唾咳則成珠玉至景龍中上官昭容以宮閨之媛徃徃與朝士埒能竇從一以将臣而時有屬綴蹈厲之音初無間于彤管婉約之辭亦不遺于武弁轉移之機有符神宰陶鑄之功無爽𤣥造謂之曰盛信不誣耳使謝而得聞兹風則其感歎當又何如耶然世有謂詩者無益于治天子在上可無用詩嗚呼兹豈然哉夫詩之所從來遠矣自卿雲賡載之歌作于朝康衢之謡興于野詩道其濫觴乎厥後世代遞變流别漸繁雖美刺雜陳而風雅無别至孔子刪詩始定著為風雅之名詩序云以一國之事繫一人之本謂之風言天下之事形四方之風謂之雅則雅之義蓋兼風矣古者天子在上則在下之人苟有其情而不得言與言之而不能盡者必託之詩以自陳于天子故凡王政闕失民俗吪亂以至貧士失職匹夫匹婦不得其所一見之于詩天子初不下堂遂由此而覽知天下是非得失之故是上以風化下下以風刺上上下之間但以㣲辭相感動而精神流通雖最僻遠若出一體詩為用豈細故哉及王澤竭而雅亡天子遂不用詩士亦恥以辭章自進由是天下之情始有壅而不通而困窮之士愁苦怨嗟之聲作夫愁苦怨嗟之所謂詩則古簡兮考槃之屬君子以為衰世之徵是豈詩之本然耶世之集唐詩者衆矣率多里巷歌謡要非詩之本張子特取唐君臣唱酬之作集而刻之其亦有康樂之感也夫夫聆鈞天之奏者塞耳不願巴渝之歌觀黼黻之文者瞥目不願茹藘之色自唐雅出則諸集詩者可盡廢矣或者又以為唐初承陳隋之習詩歌靡曼君子蓋無取焉夫陳隋以偷安之君競事淫侈乃造為玉樹後庭花春江花月夜等曲輕綺浮艷特委巷之下者耳亦何足宣之廟堂布之典訓其風雅之罪人乎若唐太宗以英武之姿雄畧蓋世卒能混一區宇讋服戎蠻故其詩有曰雪恥醻百王除兇報千古乂何壯耶至于所謂庻幾保貞固虚已厲求賢則禹湯之規也滅身資累惡成名有積善則風愆之戒也其後𤣥宗雖頗驕盈而饑贈守牧拳拳子恵之言春臺望有還念中人罷百金之辭猶志存儉節苟槩以陳隋視之不亦過乎且一時之臣如魏徵之詠漢書則責難於興禮虞伯施之觀宮體則弼違於雅正李景伯廽波之辭秩秩初筵之儆李日知定昆之作悠悠勞者之歌宋延清應制龍門追思農扈魏知古從獵渭水取類虞箴並辭託婉諷義存忠鯁即詩序云主文而譎諫言之者無罪聞之者足以戒若此者非耶苟得推是而廣之亦三代之遺也世主因不用詩遂以為詩不足用嗚呼可無傷哉是編起自武德迄于開元通得二千餘篇分二十六巻自天寶以後則風格漸卑其音亦多怨思矣故削去不録張子撰述之精世自有能知之者故弗論乃相與論著其大者如此云疑略序丁自申六經語孟曾思之書其垂於世而焯然大明者是豈一人之力哉古者遺書方出秦火之厄傳誦未廣也漢儒遞相口授皆業專其書相與叅訂缺謬而䟽其訓釋雖其言不能皆醇而所以羽翼聖經以待後人之慎擇而取者其用心亦勤矣然當時親傳聖藴如學庸二書猶混於傳記之中至唐韓子特揚大學誠正修齊治平之序卓然於原道有見未可以其遺格致而輕訾之李習之發中庸論誠之㫖為復性書其言有漢時白首窮經之士所不能到而書不待宋儒而後表章者夫以文公朱子殫其平生以集諸儒大成可謂前無古人悠悠千載何韓李二公獨以文稱而與抗焉謂原道復性不得與於斯文不可也由唐而後其各以所見互相推明而共致力於遺經者抑又多矣今當經學大明之世儒者之弊大抵在於襲前人之成説隨聲雷同而莫知所裁此其名為尊朱而實未知所以尊譬如遐方蠻服奉諸夏之正朔而倫叙等殺所以軌聖而合天者彼惡能盡識哉近世陽明王氏稍摘一二以駁朱説之漏使紫陽復生亦當與之去短集長上下其議論焉然義理無窮人各有見安知異時不復有駁予者必硜硜然已之為是而彼之為非也則亦恐非公聼並觀之義矣乃今觀於堣齋先生之為是書也折衷朱説而反覆於義理之所安不敢於背朱未嘗狥人之所同信不必於異朱未嘗諱已之所獨得蓋更數載而後就稿翻數稿而始成書有以知先生之用心於學者深已且先生誦朱之書而尊守其説者也豈敢以其言少出入於朱而覆坏土於泰山添勺水於江河以求多哉必無是也先生之心固朱子之心也夫朱子極尊信程子而易本義不必盡同於程傳其序伯恭甫讀詩記也深有味乎其言至自為集註少或取之使以學庸章句為已足矣不必别為或問以附其後若解誠意章未為絶筆其他固當覆改也所謂以俟後之君子者則亦何妨於後學之申明耶帷不察其用心之所在而妄肆詆議輙欲求勝于前人者斯為可憾耳歐陽子曰經非一世之書也其傳非一日之失也所以刋正補緝亦非一人之能也儒者勞心苦神於汗簡之中欲為千世决難解之惑帷使學者各極其所見什取其一伯取其什庶幾可以俟聖人之復生也其論公矣然彼斤斤焉斥漢儒之妄必蘄千百嵗之後復得一歐陽修者至于再至于三以附同其説得無褊而傷于固歟先生之書既著不以自是其説而名曰疑畧斯其義可與朱子相發明而其虚心出近世豪傑之士之上宜為學於朱者之所取也愚也讀先生之言雖未至懵然無所疑乃竟不能發一辨難以相質證以此見愚之不足以語乎斯道而未免堕於隨聲雷同之弊因刻先生之書而序之竊願再有請于先生明文海卷二百十五
