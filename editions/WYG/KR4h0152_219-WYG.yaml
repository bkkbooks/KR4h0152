body:
  text: 明文海巻二百十九餘姚黄宗羲編序十著述讀律吕元聲何塘律吕元聲莆兩山李文利氏所著也其法謂黄鍾律三寸九分最短㽔賓律九寸最長宫音最清羽音最濁與古法大相反竊謂此不過一家之言耳究其實則非也夫律之短長音之清濁皆人所命則謂黄鍾爲長爲短宫音爲清爲濁似無不可今所以知其非者亦以其法象無準倫類不通知之耳古法黄鍾律長九寸蓋以天地之陽氣冬至之日始自下而升然去地上猶逺故埋黄鍾九寸之律于地中以候之氣至則律管灰飛以此爲驗若黄鍾止三寸九分則安能與地中之氣相接若謂候氣之法十二律之管埋于地中者皆齊其下不齊其上則十二律之管氣至當一時飛灰又何以别于黄鍾此其法象無準一也律以候氣和聲聲氣皆屬乎陽老陽數九故黄鍾九寸若謂三寸九分則不知何所取義此法象無準二也樂聲與人聲各有五音而人聲尤爲自然喉爲宫音舌爲商音牙爲角音齒爲徴音唇爲羽音此人聲之自然者也李氏亦謂此爲可據矣喉爲宫音豈非以其來之深長而濁乎故古法以長律之音爲宫以配之唇爲羽音豈非以其來之短淺而清乎故古法以短律之音爲羽以配之今李氏乃爲宫音最清羽音最濁則與人聲之宫羽相反此倫類不通一也李法謂數少者音清數多者音濁及論五音之數則謂宫音五十商音八十角音九十徴音七十羽音六十宫音五十最少謂數少音清可也商音次清數乃八十羽音最濁數乃六十又安在其少者清而多者濁乎此倫類不通二也若謂宫土音故數五十羽水音故數六十則商金音數何以反八十角木音數何以反九十乎土濁水清理不可易今乃謂土音清而水音濁何居此其倫類不通三也既以宫爲清而羽爲濁矣及論學調則又謂㽔賓爲宫則夾鍾爲羽又安在其宫清而羽濁乎此其倫類不通四也此六者皆其大端餘瑣瑣者未暇細論然則其法之非也明矣吕梁洪志序唐龍序曰吕梁洪曷志之蓋名山大川綱紀四方昭靈紀異咸俟君子况漕之水道者哉是故司馬氏作河渠書九川九澤三江五湖罔或遐遺惟漕故也國家定賦歲漕米四百萬石白糙粳糯一十八萬石由江入湖入河直達于京師水道凡數千里曰難曰險未有甚于洪者也予方有事于漕搴衣躇階升梁而眺焉夫洪多鉅石胚胎巖㟧長如蛟蜒伏如虎豹糾錯如置棋盤旋如輪轂廉稜如鋸牙如劍㦸前代闢鑿引而爲渠汶泗衍溢沁汴滲淫黄河瀾汗合而瀦之石之所激奮躍鼔盪雷訇而阜湧懸水四十仞環流九十里魚鼈不能過黿鼉不敢居漕萬三千艘胥于是乎進每一艘合數艘之卒夾洪夫挽之弊肩傷臆躃足揮汗咸畢力以赴然縁崖躡級蟻行蝸引得寸而寸焉得尺而尺焉一弗戒則飄忽瞬迅猶夫駟馬脱銜非窮日之力不可囬也是爲天下之至難也天下之事惟難思戒惟易忽之斯志行經國者知漕之難乎則官不置冗費必汰浮兵定以制役止不急粟無耗蠧廩有備焉受祿者知漕之難乎則祿以養賢吾思吾賢食以食功吾圖吾功敬事之臣日廣素餐之風熄矣是故考迹以明規因文而廣喻志之大也夫曰勒一方之宏圖掲今昔之勝槩抑末矣君子猶曰弗志焉書孔子通紀後黄佐右孔子通紀八巻吾廣督學憲副南山潘公所著也其紀祀典評羣賢詳且公矣孟氏有言匹夫而有天下者德必若舜禹而又有天子薦之者故仲尼不有天下濓溪王祀萬世無窮及康節仲尼以萬世爲王之論蓋皆因之此我聖祖明詔正天下神祗仍存王號而成化中加樂舞八佾籩豆十二豈非以德侔天地道冠古今刪述六經垂憲萬世其功實賢于堯舜也與惟是生卒年月春秋三傳所紀不同公則據長厯及闕里志諸書而考正之實周靈王二十一年庚戌十一月庚子之辰甲申時即魯襄公二十二年今之八月二十七日也已交寒露月建丙戌卒于周敬王四十一年四月乙丑即魯哀公十六年今之二月十八日也世皆忽之不行祭奠愧於僧道多矣於戲六經在世如日月行天然求諸吾心以自明明德推之用世則内君子而外小人尊中國而謹邊徼燮理隂陽參贊化育皆此道也司馬遷以爲勞而無功陸九淵則謂爲註脚無乃禦人以口給而上同媚衆以取寵盗名與於戲其何傷於日月哉公因謂孔子所深惡者三鄉愿也佞人也鄙夫也此三者賊德亂道變壊風俗然今之鄉愿人愛之佞人人畏之鄙夫之貴者人敬之富者人悅之故人多樂爲之而不知省此其所以敢于侮聖人之言雖非聖者無法亦悍然有所不顧與又言𢎞治十二年闕里廟災斯文大厄逆知兵革之患極陳安攘之䇿明年小王子火篩之衆果相率而至大同殘暴州縣害不可言然則感召闗係豈小小哉非毁六經其爲災也大矣夫書之明峻德詩之思無邪皆言心也謂心學當求諸佛老其爲罪也大矣論從祀諸賢則曰節行之美足以維持名教著述之善足以羽翼聖經二者皆無歉焉而後可故仕莾如楊雄仕元如吳澄皆削之荀卿言性惡則僅書蘭陵令雖司馬光非孟子而宗揚雄猶致譏議可謂萬世之公論矣公名府字孔修上虞人後以終養求去士論髙之從化縣志序黄佐從化縣舊無志志之者今令灌陽吕子天恩也既梓且竣以嘗受業乃請序于予予閱之終篇深有感焉遂序曰天下大勢之所趨天地鬼神不能易而易之者人也昔疑斯語乃今信之嗟乎從化自昔一羈縻溪洞耳隋唐之際馮盎所據迄于宋元叛服靡常作邑以來孚譓之日久矣吕子始至觀其形勝則北山以南扶輿淑清兩峰秀峙流溪襟帶翠巘碧瀾暉映上下玩之令人樂而忘去問其風俗則楓陬茅麓鏗琅皆絃誦聲勝冠之士相拱揖而談道且使搦彤管輙成縟辭枹鼔不戒於其心而冦警反在新順逖聞不軌則樵夫笑之稽諸郡乗俗雜魋結性狠善鬬激氣服蔓誣謂人謀乗電盗牛競誇天賜法以繩之每每掲竿而稱亂今豈有是哉揆厥所元則髙原瘠壤商旅罕至非有果布之湊也灌溉飜㪺椎練觕楮終歲仡仡取給篁竹絶無外務非有聲色狩獵之娛也抱其顓慤不知書業夫誰與易之故設學之初儒衣鳥駭被選就廩至者畏踧不寧何則其質錮而其見蔽也自黎氏起甲族登玉堂之署爲柱下史經緯禮俗先之牖之李長汀輩又多蟬聫科薦而譽髦嚮風以故比屋詩書牙璋不聳儒者之效也吕子清慎且勤民治益固凡其所徴文獻實多取諸韶山云夫堯舜之道集于仲尼洋洋文德洽於裨海百越則信遐矣其可稱道者吾廣南越也蒼梧西越也象郡駱越也江右楊越也八閩東越也永嘉甌越也㑹稽於越也溪峒皆介其間至于勾吳斷髪文身之鄉也荆楚篳路藍縷之俗也巴蜀魚鳬蠶叢之國也鉅壙深林均爲荒服奎耀文明在在鄒魯無間阻焉俗吏刀筆筐篋苟以簿書為務則雖鄒魯且將不聞絃歌矣而况夫逺方曶爽闇昧之區初得耀於光明者哉且百裔羅施古稱鬼方棄而弗圖以教化難也今雲貴且建藩而軒冕等中州矣向謂符祝役人之魂土木換人之骨者又安在哉蓋天下有道固有仲尼所不與易者存焉誠使其始若不能易也貞潔其身以先之設爲禮文以牖之重之以節用愛人之令則民性無拂而道之浹者深矣邪僻銷而守義固忍爲干紀作亂之事乎故曰基廣則難傾根深則難㧞理節則不亂膠結則不遷予而今而後知天下大勢之所趨而卒易焉者仲尼之道行也顧汚暴乃倍吾道何也惟理與文道固在兹哉予深有感於是故表而出之以風世焉四如黄先生講稿序黄佐予嘗觀夫易自畫後皇道洩矣書自謨後帝道汙矣詩自南後王道寝以熄矣吾夫子丁周末運禮制紊廢而樂缺有間乃作春秋其義主於尊王道而賤伯功爰俾亂賊懼而不肆綱常正而勿墜蓋汲汲乎挽其頺而振起之也學庸語孟之書則明是道而見之躬行初非托之空言徒曰講學云爾秦漢以來匪惟不行抑亦不講至宋而濓洛關閩之儒興斯道因講授而後著明于世惜當時君相無復帝王繼世之志卒莫見之行也予每覽諸儒講義竊獨悲之嗟乎講學明道利于行猶烝徒楫舟利于渉也宋自南渡寰宇日蹙國非其國猶恃談名理以正綱常而元氣不至隕絶迨史相挾楊后廢子竑而立理宗則經書所謂君君臣臣父父子子夫夫婦婦者蔑然矣辟諸舟無楫徒其不淪胥及溺者幾希先生舉進士于咸淳時居無幾何而宗社且爲元人所屋矣其所著經書講稿雖殘缺不完然學易則玩象畫稽書則宗科斗誦詩則先二南訂禮考樂則求古制解春秋則諄諄王伯而悼諸夏之亡孔曾思孟之遺意厪厪存焉至于更其名字與其别號以見天水行違之義蓋䝉古字學既行宇宙畢變惟韻鄉猶可安耳此其志不亦重可悲乎九世孫以約氏僉臬江右刻是稿以傳于家俾祖父之講明于衰世者爲子若孫明諸心措諸躬終大行于全盛之時蓋非徒講焉而已也詩不云乎孝子不匱永錫爾類六藝流别序黄佐聞之董生曰君子志善知世之不能去惡服人也是以簡六藝以善養之而各有所長詩道志故長于質書著功故長于事禮制節故長于文樂詠德故長于風春秋司是非故長于治易本天地故長于數人當兼得其所長是故舉其詳焉志始于詩以道性情爲謡爲歌謠之流其别有四爲謳爲誦爲諺爲語歌之流其别有四爲吟爲詠爲怨爲數其拘拘以爲詩也則爲四言爲五言爲六言爲七言爲雜言其雜近于文而又與詩麗也則爲騷爲賦爲辭爲頌爲贊其專事對偶亡復蹈古則律詩終焉書行志而奏功者也其源以道政事爲典爲謨典之流其别爲命爲誥謨之流其别爲訓爲誓凡典上德宣于下者也又别而爲制爲詔爲問爲答爲令爲律命之流又别而爲册爲敕爲誡爲教誥之流又别而爲諭爲賜書爲書爲告爲判爲遺命而間亦有不盡出于上者焉凡謨下情孚于上者也又别而爲議爲䟽爲狀爲表爲牋爲啟爲上書爲封事爲彈劾爲啟事爲奏記訓之流又别而爲對爲䇿爲諫爲規爲諷爲喻爲發爲勢爲設論爲連珠誓之流又别而爲盟爲檄爲移爲露布爲讓爲責爲劵爲約而間亦有不盡出于下者焉禮以節文斯志者也其源敬也敬則爲儀爲義其流之别則爲辭爲文爲箴爲銘爲祝爲詛爲禱爲祭爲哀爲吊爲誄爲挽爲碣爲碑爲誌爲墓表樂以舞蹈斯志者也其源和也和則爲樂均爲樂義其流之别爲唱爲調爲曲爲引爲行爲篇爲樂章爲琴歌爲瑟歌爲暢爲操爲舞篇春秋以治正志者也其源名分也其流之别爲紀爲志爲年表爲世家爲列傳爲行狀爲譜牒爲符命其大槩也則爲叙事爲論贊叙事之流其别爲序爲記爲述爲録爲題辭爲雜志論贊之流其别爲論爲說爲辨爲解爲對問爲考評而凡屬乎書禮者不與焉易則通天下之志矣其源隂陽也其流之别爲兆爲繇爲例爲數爲占爲象爲圖爲原爲傳爲言爲註而凡天地鬼神之理管是矣昔晉摯虞嘗著文章流别其亡已久故予蒐羅散逸以爲此編統諸六藝竊比於我董生云順慶府志序任瀚順慶當劍門白帝䕫渝涪閬之中而果州之故處也天下有事䕫劍門諸州先備而果獨閒暇自保不爲動以其非要害之國是故無斥堠壘壁亭障徼塞之名先主下峽窺吳出棧閣拒魏明皇僖宗前後幸蜀皆取道潼渝而果以偏郡不得䝉一見翠華黄屋巡幸之所不及是故無宫闕臺榭明堂京觀樓櫓之制郡城在天地西南山川靈奥旁魄而鬱積嘗所出忠義瑰偉神明之士徃徃聞天下而人賢物怪理不並鍾是故無璆鐡銀鏤赤盪𤣥研􅑭璞砮砂竹箭絲枲文羽之貢若是者其爲郡志宜簡約易辦而乆不志者無以金石考信之務缺歟將爲長吏者不能不奪于行官羇旅之懐而凜乎其未暇也朱侯博文修政風雅所宗謂子嘗待罪記室理于郡志當有所述稱而不知予之不可爲此也以射傷者終身不操矢世顧不諒予哉今志草原出郭睿氏題編而侯與師儒更相裁訂即予未嘗一言入也孔子曰吾欲觀夏道是故之杞而不足徴也吾得夏時焉我欲觀商道是故之宋而不足徴也我得坤乾焉今列國亡史乆矣安知後來者不有取于此志而倖其僅存如夏時坤乾者乎常璩譔華陽國志鄉䣊頼之然不達史體而多所參附人以爲病陳著作壽郡人也有良史才嘗譔三國志耆舊傳而獨略志不著近世吳使君伯通雖著則又自以不滿意不欲表行于時而尋以散失乃知山川人物之顯晦古今藝文之傳不傳真若有期數而不可爲者况乎其廢興成敗有大于此者乎順慶領州二縣八凡百八十九里賦七萬二千有畸志首地理次征賦次建設次祠祀次官師次登用次外志總若干卷朱侯名簠字守晦號拙齋浙山隂人順慶之人思其賢而仰其功嘗恐一朝去其境土守長循良僚佐皆君子一時所難吾既樂郡志之成而又悲前代著作之徒不遇吾是以不能忘言也過此將去遊海上與世不復有言嘯㫖後序唐寅右嘯㫖一編館閣暨鄭馬諸書目皆不著所撰名氏内述其事始于孫登嵇康先生遂繫以内激外激運氣撮唇之法最詳而于聲則云未譜聲音蓋激氣而成者邵子謂物理無窮而音聲亦無窮惟無窮乃可以配無窮故以音聲起數御天下古今物理之變聲則起于甲而止于庚多良千刀妻宫心之類是也音則起于子而止于戌古黑安夫卜東乃走思之類是也與沙門神珙之法稍異神珙則以内外八攝縂其聲三十六母縂其音法雖不同其于音聲則括盡而無遺矣然有事有聲者雖多而有聲無字者亦爲不少必皆以翻切得之翻者翻出其音切者切出其聲如徒公徒丁顛謂之翻徒東謂之切也其他無字之音聲如水聲風聲之類皆可翻切今黄冠師符咒袐字亦有聲而無字梵門宻語若一字呪合普林二字爲一呼至有三合四合者彈舌取之而皆無字及其號召風霆驅役神鬼若運諸掌今嘯亦有聲而無字豈吾儒感天地贊化育之餘意歟聲雖未譜其間稱或取聲自上齶出或自舌上出者四聲惟平聲有上下蓋氣自上齶出者爲上平聲氣自舌上出爲下平聲上去入聲無上下者仄聲故也平聲清而仄聲濁竊想嘯之爲聲必出于平而不出于仄矣孫嵇仙去逺矣白骨生蒼苔九原不可作安得善嘯之士以譜其聲而習之登泰山望蓬萊烈然一聲林石震越海水起立此亦此生之大快也子瞻朱君好古博雅一時俊彦之良無有逾者於僕契分甚厚暇日出是編以相勘校因曰嘯之失其㫖也久矣幸存此編略知梗槩不刋諸梓以傳于世則羊禮俱亡後人何所考據子盍爲吾叙其事於編後以遺同志幸遇反隅之士衍而習之庶幾復有以嘯名于天下者知由此書以發其端云叙草木子鄭善夫草木子葉子竒氏括人博物洽聞達于古今生元季詭時匿德于龍泉之槎溪立言以昭厥志人亡識者所著有範通元理太元本㫖各二巻詩十有六巻文二十巻本草醫書節要各十卷齊東野語三巻草木子二巻草木子成于洪武戊午狴犴中稽上下之儀星纒之軌隂陽五行生剋之運海岳浸瀆蠻荒希乏之物神鬼伸屈之理草木之變魚蟲之尤律厯推步易衍之大宗釋老理制之書而終之于六籍之緒大歸同焉野語記時事失得荒兵災異而文勿避而義則則乎春秋古稱虞卿非窮愁不能著書草木子其善窮哉草木子云者草計時木計歲以况其生而傷乎其言之立也或曰草木子劉基宋濂時人詳觀誠意集未之及者而濓叙太𤣥本㫖似不心賛其能夫二子者亦蔽賢乎哉凡人賤近而貴逺知者相世機則掩其識昔揚雄譔太𤣥法言與州箴以此迹聖人當時雖劉歆輩號稱知已亦拙其書顧乃盛傳于後世好竒者以爲奥于孟軻然𤣥實失之滯法言州箴亦多迂謬今觀草木子其義至精論甚正使遇賢知者闡而張之走楊子矣其與法言太𤣥並傳復何嫌耶而或者又以惟鯊胎生無無華之實胎卵濕化貴賤之類病之是惡足以累其成哉舊本凡二十八篇今纂爲四野語凡三巻今爲二其七代宗子溥殺青而行之并曰草木子古語之傳先之美仁也刻成晉安鄭某爲之序刻文章正宗序崔銑文章正宗者宋真希元氏之編也芟蕪屏異將以翼經而正術其亦聖人之志與夫物生而有情情而思宣之斯生言矣訥者弗達陋者亡采則亡以敷事而喻物斯生文矣文言之善者也而貴于正其情夫幽賾之理彰于顯詞遼逖之懐發于堂序雍遜之談驗于遐歲非邃于道者其孰能之而徒以模襲之勤記問之富億中暗投吾未見其可也夫獻忠之謂䟽恤隠之謂詔達彼此之意質問遺之藴之謂對之謂序之謂書紀故表賢之謂記之謂銘引思暢和之謂詩言斷而意續發凡以該目或婉或著或麗或質或因乎人或就乎時出之至真而發之當物及乎教息而學淆質衰而詞是工是故乆漸美化動憑典刑以摧强枉而稽成敗此左氏之文也援經議制夷厥藻繢此漢之文也綜倚羣言辯而委辭此韓愈氏桞宗元氏之文也君子于是焉考變而徴實左取其禮漢取其樸韓取其昌而因以見先王之教之逺且該也今夫登者必陟其巔行者必自其家非可以息趾于巖麓而發軔于旅次茍未崇志于先王之術以參伍夫歴代之變予恐其不特謬于其言焉而已隆慮馬君敬臣以按察副使督學山西既用六經教士凡禮之凶詩書之變俗之所廢而急于求仕者一切復之陋彼時義迺刻是編以則諸生白于其長是之其僚皆來賛工兩閱歲而梓人告成事周易餘言序崔銑銑童丱居陜聞蜀蘇氏荗之講易心樂之先君子亦篤好是經采取明訓咸出手録及壯仕于京㑹友繹習官爲翰林得閱秘書至今五十年銑齒六十有三憂喜夷險履行處運無一日而不體夫易也先儒解釋詳矣繁矣好竒者求義于象流爲詭誕飛伏内甲互體互用以彼小術蕪我聖典夫皇羲畫卦文王周公繫辭夫子作翼一也謂易道加詳可爾乃曰有羲易有文易有孔易支矣哉易有聖人之道四今尚象者無其裁尚占者失其法因夫子之賛明三聖之㫖以貞夫變以正夫履傳是者倡于王弼備于程子斯時宜而易之要也爰述管見于篇以暢二氏之疑者云明文海巻二百十九
