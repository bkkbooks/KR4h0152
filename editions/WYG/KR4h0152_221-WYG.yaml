body:
  text: 明文海巻二百二十一餘姚黄宗羲編序十二著述巖西遺典序符驗古昔聖王之治天下也其綱維世道考驗風俗一道德而觀隆汙頼諸文獻耳文與獻實相表裏如剡子之對非獻孰徴如周禮在魯非文孰徴文不足則稽諸獻獻不足則稽諸文文獻不足雖至聖如吾夫子亦末如之何已故外史掌四方之志而十五國之風皆足以達于上而委巷匹夫匹婦之言亦得以上諸朝稗官小史所載無或遺之者且有采風之使日勤于天下是故國無遺事野無遺賢俗無遺紀而天下之疾痛休戚如一人之忻戚天下之賢不肖如一家之子弟天下之習尚美惡如一家之仁讓與否故曰惟聖人能通天下之故率由是也後世則不然匹夫匹婦之言謂其俚而不録隠居獨善之人謂其野而不録不求聞達者謂其僻而不録殘山剰水憂時憤世之言謂其譏世觸忌諱而不録而其所録率獻諛標榜與夫爵位通顯者耳上下之情于是乎睽是非之實于是乎眩而道德風俗世道隆替遂莫之稽果孰爲傳信之言也哉吾台傍山瀕海其俗樸而直其人質而不浮其文覈而不史雖有作者不能自炫抱藝而獨隠行甘遯以及井里之謡感激之賦記傳逸載者不知凡幾楊君某憫之而有巖西遺典之集或者曰尊鄉有録赤城有志是可無作也余曰信若是則滄海之珠皆無遺耶國史所紀段太尉尚有逸事史記博聞而王子年且有拾遺如段少卿之雜俎如太平廣記如朝野雜記皆不一而足况幽僻不達于通衢小説不關于顯達遺不遺其可必哉與其遺而冺不若博采旁摭以俟知言者擇而取之之爲愈是故識其大識其小不可誣也嗚呼吾知者吾記之人知者人記之文獻其足興矣夫天下尚有逸情遁事也哉老子集解序薛蕙嘉靖庚寅予爲老子集解其後屢有修改丙申之冬復加刪定自謂有補于道德之萬分迺自序之昔老子有言吾言甚易知天下莫能知周之衰先聖之道未絶賢人君子猶有爲性命之學者且天下知尊老子而老子之言世獨莫能知也况至後世道術數傳數變學者舎本趨末且詆訾老子爲異端則其筆之於書者天下益莫能知矣間有高明好古之士澹泊學道之徒爲能有味於其言然非研精覃思亦安能自知其性以真知老子之言哉始予蚤歲嗜神仙長生之術凡神仙家之説無不觀也晩讀老子而好之當是時予方祈嚮聖人之道致思性命之理蓋乆之而若有得考諸老子無異也乃昔之所嗜者苐方士之小術而非性命之學也復知老子之道惟導人反其天性而非異端之流也夫性命者道也天下之一本也生民同得之非異物也聖人同傳之非異術也迷其所同得故異見失其所同得故異說是則同乎此者謂之同異乎此者謂之異予見後人之異矣未見老子之異也今夫老子之書盡皆性命之説多出于上古聖人之遺言故古者叙六家而謂之道家後世顧謂之異端矣道者修之身以及天下天下之事無不統也後世直以道家爲養生耳予皆未喻也予又竊怪夫方士之言養生者徃徃穿鑿于性命之外不知長生之道不越乎養性世儒率言知性知天而斥小養生不知養其性者即同乎天道而不亡此其不聞性命之實不合聖人之道也耶傳曰禮失求之野聖人之道不明于世久矣學者求道而未得比老子于野而求之何不可者况老子古之史官孔子之所嚴事豈野人之比而已乎然老子之書學者恒病其難讀蓋其辭約其道大所謂測之而益深窮之而益逺者也古註之亡者其善否則不可知今之傳于世者未有明老子之意者也予爲此解其間文義小者儻有未盡若夫楊㩁本指發揮大義明聖人之微言究性命之極致竊以爲近之矣有欲求老子之道者必以予解爲指南乎老子曰自矜者不長乂曰知我者希則我貴矣其言非以相反夫各有所當也子之不遜亦冀世之君子無聽我藐藐庶幾爲入道之一助云坐忘論序薛蕙太史公書曰神者物受之而不能知及其去來故聖人畏而欲存之惟欲存之神之亦存其欲存之者故莫貴焉予嘗以爲古人之至言夫神者羣生之本萬有之府大可以參天貳地次可以長生久視誠莫貴之鴻寶無偶之珍物也然悠悠之俗棄寶取礫貴物而不愛其神愛神而不求其術奄忽而盡良可哀矣坐忘論者唐司馬子微所撰蓋存仁之秘記安心之要訣也予愛玩斯文亹亹忘倦客謂予曰昔程子之爲斯論爲坐馳其言曰未有不能體道而能無思者故坐忘是爲坐馳有忘之心乃思也子顧好之豈有説乎曰程子之說誠善矣苐其議子微者殆不然也夫無思者無忘也惟聖人者能明之易而得之速非夫學者之事也凡學者必始于操心終于無忘漸習則可致欲速則不達雖大賢之資未有越操心而至無忘也或問程子曰敬當用意乎曰其始安得不用意又因論持志曰此亦私也然學者少此不得及其評子微之書曽不推此意而言之先儒爲論之失乃後世過信而弗察不亦惜乎獨其終篇有云非孔釋之所能鄰此則子微之蔽不可不絀者也嘗以爲自古褒貶失實抑揚過當其來尚矣所以爾者蓋安其所習毁所不見或摭片辭而遺大意或執一端以槩衆說此論議之通患也客曰子微之言道家之流也固合于儒學矣今猥尚之無乃導人于僻乎曰天下之理本同末異所以異者由人之用心不一也二家之學皆以無私心爲極茍無私心異安從出人生而静是謂一本先聖後聖同復其初而已奚道家儒學之辨乎今儒學即事以治心其蔽也流蕩而忘本道家屏事以安心其蔽也固滯而不該于用非二家之學本然也夫百氏偏駁猶有助于救俗道論素寧導人于邪僻嗚乎自三季之後秦漢以來淳風載息躁人實繁莫不肩摩富貴之路轂撃紛華之域異代一揆恬不知悲若乃黄老希夷之術喬松澹泊之風荒塗翳然鮮有一問其津者然而踈教寡聞之士言僻好辨之徒猶謂尚同者寡好異者衆豈非謬于過計乎抑斯論之傳世將惟寂寞枯槁之士爲有樂乎此也豈能中縫掖之徒哉求正集略序萬廷言韓退之稱子厚窮不極文必不傳使子厚富貴爲將相其失得必有辨者永叔亦云詩必窮而後工世謂知言予惟言者言所志傳者傳其道也士君子所難者志志之所難者道誠志道矣則辭有所必修修則工工則傳矣死生貴賤誰能易之且窮人所工窮者之辭道之細耳故有在有不在若君子所志則天命人心之正聖賢經世之謨仁義禮樂忠信孝弟之大道自身及家國天下自富貴貧賤至險阻患難自瞬息至千古一也道在志無不存志存言無不得墜之九淵之下不益其深抗之雲霄之上不益其髙故閭閻畎畝之稱述即金匱石室清廟明堂之紀載金匱石室清廟明堂之紀載亦何間於閭閻畎畝者所稱述哉何者博大精微之理撰於吾所得言者既無二致精研沈繹之思本爲吾所能言者自無異趣故文之工拙在志志在道而窮達非所論矣惟是達則矢謨揚烈極帝王之淵懿布經緯之華章文多𢎞顯窮則畏天悲人發情止義陳古是以裁今闡微言以正學文多深婉體或異致然大㫖不得殊也故其傳一也典謨雅頌豈窮者之詞易雖以憂患作非必待憂患而工藉令孔孟爲將相如伊周彖翼之奥筆削之嚴性善之㫖豈遽泯没無傳哉左丘明不窮必傳春秋司馬遷不下蠶室必作史記志素定故也惟是山海之遐烟雲之變鳥獸草木之詭譎必待山林之士然後能窮本極微發精眇之思非榮遇者所暇及然所謂窮者之辭道之細耳無甚關於理性安人之大致亦何貴於其傳則文之不待窮而後工且傳必矣區區較失得於富貴將相之間不亦繆乎家君同年友南安雙峰劉公少志學喜文詞弱冠舉進士爲刑部郎微誤左授當事者别有怒因并斥公四十年不復起而公志益堅講學勵行工古文辭久乃得詩文若干首題曰求正集略萬厯戊寅冬持謁家君溪東草堂予始獲侍公歲既云暮風雪滿廬深夜清談宛焉佳致未嘗幾微見厄窮之憫焉明日以序委予而别予尋憂病未暇二年始讀焉其談理正其叙事平中無𤣥詭之僻外不敢爲繆悠之辭雖間詠禽魚旹多感慨大都不詭於仁義婉而能正一切窮者之辭不與焉公志可知矣或者謂人窮則憤憤則思苦而文工此理有必然者然君子志慕前修恥躬不逮則無時不憤夫豈在窮待窮而後憤其志不足稱也已于是序次其意以傳使學者有以亮公之志焉公師事東廓鄒先生嚴守師説志且未量文辭將益工兹其崖略云論學緒言序萬廷言古之學自東廓鄒先生南野歐陽先生稟學文成以萬物一體爲宗良知爲竅格物爲實地博大圓通簡易平直聞者當情而易親游從最盛同時有念菴羅先生謂性體自善顧生機之與欲機良知之與意見皆積習所乗源波易混千里毫釐湏静攝澄渟庶知良而體一然大㫖與二先生不殊其歸一也自後論議漸廣途徑遂分於是有動静寂感之辨學稍漓矣徃予典安成王子植論學京師志力方强頗研端緒萬安兌隅蕭公時發舉嘉靖乙丑進士嘗就予兩人言公夙昔朋儕討究既專乃亹亹論自羲皇孔孟以來至有宋及本朝先哲皆能析其同異指歸而約其趣於明道先生渾然一體之語以爲希聖楷範予兩人斂袵受焉公一日私予子將謂何予謂公入肆辨寶可謂精博不知何縁得寶在我公憮然因謂公今能渾然一體否公曰正未以有自私用智之病在予謂此猶病苗中有藏之者公久之曰然是意根也每苦放逸令人氣浮予曰如今下手用工將遂一體將在意根公徐曰畢竟在意根克治予曰然則前二先生宗趣極大且正而羅先生之静攝實下手第一步未可少也子植贊予語頗盡公亦深謂爲然頃之公奉使出京索别予爲廣夜氣之説贈焉自是予以罪斥居羅原子植亦齟齬歸十年不一二見公功名日起以御史歴中丞鎮撫陜浙救災靖亂敭歴中外不相見者二十年萬厯乙酉春公以少司㓂召艤舟晤予章水相對歉然謂竟苦意根難净氣難下也予竦異之私念公多歴艱大皆以學爲政思証一體之實於上下所在有聲而猶多歉中所得必深矣時風急行迫不及請未幾公逝而予與子植亦老矣又明年公冡嗣中行裒公所著學易記聞及書序志雜文若干巻題曰論學緒言屬予爲序曰是先子意予備讀之益知公二十年之所用力具得三先生微㫖駸駸乎不知所止矣夫學貴見性不見性而意存一體或云歸寂是謂平旦無雨露思抱水甕不知雨露靈源自有也恐淵泉之不静深思止其波不知静深淵泉本色也又或惡動而益以静惡静而益以動是迷失元和思自益生寒則暑之暑則寒之不知一寒一暑之適足傷生也故學貴見性也静攝者所以解積習嚴放逸爲見性實功非謂性有待於此也從古未有意放逸而得性地昭明者也古人言語少今人言語多正坐意根未净沾沾評衆而學日漓徒勞忖度徃與子植與公嘗切憂之今集中研究河圖既深途轍而答友人書有云浮游日久寧定力微又云不作徹底一空終非了手津津有餘味焉公所自得不亦深乎顧予念衰落無成三復益増歎息敬本生平切磋之意序而歸之且請於子植與學三先生者共訂焉庶不負公一體之意云燕子磯集序薛甲自諸吏部而下凡若干人詩凡若干首文若干篇皆燕子磯作也考其時上下僅五十餘年前乎此者不可知後乎此者不可窮而所得已如此噫亦盛矣凡寓形宇宙之物雖洪纎修短爲質不齊卒歸澌泯惟道德與文章巍然獨存蓋造化爲之扃槖人心爲之範模二者不滅其能久固宜此磯居金陵西北偏前臨大江横亘突起軒然有鶱翥騰舞之勢每風和日晴凭髙望逺則淮北諸山歴歴呈秀可以攬取俄而夕照沈空皓月千里俯視絶壁空洞萬仞惟戞戞聞罾網聲若有鬼神異物徃來其間者至或隂雨霏微長風怒號揮霍天吳憚赫草木斯時也英雄望之而失色騷客當之而隕涕此其俯仰之間倐忽變態登斯磯者雖不必一一更歴而所得已多亦宜作者之無涯也磯舊有漢壽亭侯祠相傳創自建炎蕪廢已甚正德初道士陳某鄭某始鼎新之二人勤苦精煉少壯若一閱三十年乃成至是有殿有堂有廡有門有面江之亭憇賓之所庖湢井溷莫不具備方將裒集衆作傳播諸梓以昭徃示來而未有爲之主者嘉靖某歲予友陳君稷山將授官京師君倜儻好竒至京口挽舟而上訪兹磯宿焉道士請曰公他日倘官于此兹磯其有遭乎君笑曰諾已而果然乃爲捐俸成之仍托盧生某次之而予爲之序時壬子秋八月也存齋先生教言䟦語薛甲黄生道既刻存齋先生教言而未喻厥㫖問說于予予應之曰此二篇者子程子爲道術分裂而言也仁即性也存仁即所以定性也仁根于性性無内外則仁無内外中庸云性之德也合内外之道也此言性之無内外也孟子云仁者人也合而言之道也此言仁之無内外也何以明之今夫孩提而知愛親既長而知敬兄愛敬者仁也而人皆知愛人皆知敬則仁無不在焉以其根于性也循性而發則愛敬之理不假外求而仁不可勝用矣夫何内外之可言乎道術不明始有是内而非外者不知吾心之通乎物理而欲絶物以求明其心此楊墨佛老之見孟子之所謂忘也求照無物者也又有務外而遺内者不知物理之具于吾心而欲即物以窮盡其理此訓詁詞章之見孟子之所謂助也鑿以爲知者也不忘即助不助即忘入主出奴各是其是則内外合一之㫖不明而思孟立言之意隠矣子程子憂之故因論訂頑而發須先識仁之㫖又因論定性而發静亦定動亦定之㫖如曰防檢曰自私則指是内非外者而言也曰窮索曰用智則指務外遺内者而言也曰天地之用皆我之用以明物我同體之義而仁無内外可知也曰廓然大公物来順應以明澄然無事之義而性無内外可知也此子程子所以繼思孟之傳者也存齋先生合併示人將使學者反觀而自得之而楚侗先生所謂入門須識主人翁者可謂一言以蔽之矣學者服膺于此而有得焉則凡知行存省與夫博約忠恕誠明之說皆可即此通之而知其爲合一信乎色色可辨而存齋先生引而未發之意不益彰之矣乎道德經解序薛甲老子之學握天地之樞者也天地之道静虚而已矣静者動之根也虚者實之源也其静也篤則其動也通其虚也極則其實也固動與實可得而見者也静與虚不可得而見者也即其所可見而指其所不可見使人嘗握其樞以與天地合德則造化在我而運用不窮此深根固柢長生久視之道聖人所以無所不爲而未嘗有爲者蓋以此也老子爲周柱下史孔子嘗從而問禮矣至其所自爲書又謂禮爲忠信之薄而亂之首其于禮文疑若無所事事者或者以其言之過激近於槌提仁義絶滅禮樂而遂斥之爲異端不知彼之所謂薄且亂者乃周末文弊失静虚之本者爾若是而槌提絶滅之亦何不可夫茍静虚之本不失則三千三百之文正道之所寄老子之所從事而吾聖人之所取者其言與儒者寧易寧戚之㫖實相表裏安在其爲異端乎爲此言者彼書中之所謂下士也老子之言本自明白而解者或泛濫詞章失其本㫖間以已意輒爲註釋以與知是書者商確雖有笑我者吾無憾焉玉臺新咏序方宏静夫詩縁情而作者也情莫近乎妃匹之間故三百篇首闗雎寤寐窈窕發乎情止乎禮義是以知先王之澤風化之本也及王迹既熄鄭衞競鳴詞人之作恣乎麗艷有異是焉迺若北方佳人一顧傾國邯鄲少女獨立無雙浣紗溪邉千人爲之歎息采桑道側五馬以之踟蹰漢帝阿嬌貯之黄金之屋石家娉婷買以十斛之珠吁可動乎其天下之至靡也至夫春華方艷秋月俄輝白日未移紅顔將斂君王不御蕩子忘歸長信宫深羞乞大夫之賦昭陽風起忽聞弦管之聲玉堦苔生菱鏡長掩又何寥乎其幽瘁也夫文魚比之比目則歡愛可知匹鳥譬之孤棲若離愁何盡樂莫樂焉憂莫憂焉是以文人才子詠其美艷之情忠臣烈士痛其枯槁之狀語冶容宛仙人來下言寂寞雖戾夫歔欷作者接軌咸歸二途綵筆盈懐錦帙溢篋矣有陳東海徐君于是搜諸藝府無慮百家萃彼艷歌類爲十巻千花競映掩赤城之春霞萬寶皆縣燦𤣥圃之玉樹挾蔡枕之竒有如重璧貴洛紙之價何啻三都若迺揆之風人格以雅訓殆有可言者矣爾若霍家馮都之篇秦氏羅敷之詠秋胡之妻玉壺比潔隴西之婦齊姜不如婕妤託意于紈扇蘭芝委體于清池抱貞白而莫渝與皎月而争色漢廣行露又何過焉蓋亦什一千百矣至如相如求鳯貽辱于清評繁欽定情無閑于貞則子夜吳歌盡寫放蕩之思江南雜弄率多淫佚之詞桃葉團扇縱情于内篝舸郎溪女相調于中流王謝髙蹤于斯貶矣故采其合雅象流金之在沙究其離經異白璧之微玷昔尼父刪詩疵媺並著桑間濮上存而不棄所以明風刺示懲誡也述者之意豈類斯乎且摛藻風雲動情心目勸風百一其來逺矣夫道無二津情則萬委波詞類海各指所之若文攷其世則是頌烈女也若德放其詞固非訓内則也亦何譏哉故知畱連彤管信有賢于博奕彈誚閒情諒見非于來哲矣鄭子思祈以名家公子綽有雅懐揖當代才流馳其高駕得抄本于上都撫殘篇而動色爰迺廣逸拾遺續爲外集併刻山堂傳諸寰内使芸閣棲遲將無勞于栢葉巾箱展玩何自苦于蠅頭其不負徐君之用心矣乎重刻水經序王世懋水經一書黄先生省曽序之詳矣其言宏肆麗宻大都侈其功用與兩家之文宜傳云爾苐校讎未精亥豕時混人非邢邵疇能取適新安太學吳君絶愛此書志存嘉惠力延陸俞謝三君假以歲月窮其搜剔於是匠梓殫技觀者厭心書成諸君以屬世懋爲之序曰物於天地間最鉅而最夥者莫如水其於經紀法界浸溉萬靈功至矣譬如人身津液精血流貫注伏皆是物也治身者不循其血脉意醫無所措手治水者不辨其經紀意匠無所施功詎可無傳述於世令荒度者受成乎子長號爲良史書止河渠蠡測一勺耳後之作者竟無述焉世所馮依見天地之血脉者桑欽氏一書而已欽書雖多挂漏體嚴辭雅故是作經法也後魏酈道元疏之旁引百家時發韻語流濕之外贅行紀異博雅之士倚以爲談然經言不典者已經道元多所刪定今去道元不能千載而余所覩記源流或盭何也蓋其說有三焉首楞嚴云見水身中與浮幢王刹諸香水海等無差别是知人之一身從少至老其間枯溢流壅種種不一水行天地間而欲令千載一轍乎自魏迄今詎能無變此其解一也時代陵谷聚落耗登或名在而邑徙或地是而名非道元所著新莽之稱良有意矣今之郡邑豈盡元氏舊彊即波流不改而名號已殊安所定爲故都繩其繆指此其解二也河出崑崙傳之載籍尋源勝國星宿始聞故知身所未經終爲貴耳道元雖稱多歴未便徧行魏疆况澤國在南天塹見限安能取信行人之口悉諳未見之都此其解三也然則言在先民鑒惟來哲好古者尚其奥博經世者貴其變通若謂書不足憑則負械之尸彭侯之怪何以見驗于天人若謂書可盡信則禹貢之山川毛詩之鳥獸草木何以頓異於今日學者㑹而通之足明是書之足傳矣若乃桑欽立言良史不著其名道元多竒穢史貶過其實譚藝之士以爲遺恨而諸君子能為表章羽翼傳之通邑大都足使千載而上靈鬼骨香千載而下文人氣吐詎非方輿之珍覽寰宇之一快乎吳君名琯陸君名弼俞君名䇿謝君名陛皆一時嫻於文辭人也風雅逸篇序周復俊仙村草堂之㑹升菴楊子眎余以風雅逸篇余受而紬之願有復也曰是非六義之裔三百之𦙍文乎楊子曰古辭所遺古音寓之學詩者不可不到心焉有言詩曰取材于選效法于唐縁情綺靡之勝温柔敦厚之荒也一荒斯宋再荒斯元元之荒也冶宋之荒也俗㮣乎未聞于唐風之靡矧曰闖風雅藩籬哉余因之而感夫音之說矣夫鶡鴠也倉庚也雉也鵙也螻蟈也蜩也寒蟬也鴻雁也異耳同聞也常音也故合之喙鳴繋之月令若夫巢阿而鳯集衡而鸞雝雝喈喈節節足足下遥九仞鳴曠千年有耳希聞也非常音也故冩之律象之琯鑄之和照之鈴爲其希聲也爲非常音也樂聲自太古始百世之後遂忘古音樂歌自太古始百世之後遂亡古辭其僅存而未亡者吾寧舎旃或曰是度越風雅翼矣嗚呼汰哉劉履氏專以風雅許人彼方專專然上稽虞周駸駸然下迨漢魏顧乃瑣瑣焉羼入宋代譬則鶡鴠升鳯阿螻蟈倚鸞衡也亦必㸃叢雲而涴晨露矣師矌有耳謂之何哉方伯南湖公一見而累深歎焉且曰余必刻兹于滇雲以念同好鳯琯鸞和雖未遽及鴠蟈其逺矣東吳周復俊快之見而樂其傳作風雅逸篇序評㸃唐音序周復俊余於昔年夢有告之曰詩如鏡中花谷中音水中月寤以諮諸座賓莫有覺者或迺曰詩體輕微専務刋脫滅迹銷形上乗匪逺余曰審若兹則鏡無花矣然鏡中未嘗無花也谷無音矣然谷中未嘗無音也無花無音神罔附矣何以言詩關西吕定原詩論曰水中流月是真方恒撃節悚歎以爲英言故擅稱合作者似音非音似影非影風容將格響争馳色韻與情神交澈若近而逺若逺而近斯爲至矣明興作者雲蒸吾郡太史髙公季迪妙悟神澄起廢季習嗣後洛中何大復北郡李空同淮海朱凌溪相繼崛作翩翩風度而吾郡太常徐公昌榖尤獨縱𤣥關舒光神室爾來韻士罔不極志風騷興象蕭逺至於吾家以言伯氏年踰五袠靡心室家惟抽緒𤣥幽恍悟淵密可謂符情牧犢協趣飛鴻者矣故咸能以碩作瓊篇標馳寓内余徃年出使南溟邂逅升菴太史楊公散帙仙村彌七晝夜余扣公曰今世和聲者稍知厭宋人榘矱矣徃徃䧟入于元尋逐源本非希元也力苟未逮唐人不得不淪胥干元故知晩唐者元人之巢窟也太史公再三韙之乃抽篇徃復動輙千言其指曰宋詩村姑而洗粧元人倡優而后飾又曰唐音猶鳯也宋其鷙翰乎元其翬采乎佩服明憲耿耿弗磨矣秣陵大司冦東橋顧公海甸英流明廷宗匠爰式唐音潤吐彚語恨流思專勤衡藻未稱嘉靖丁未冬余銜命督戎霸郡觸襟閱目罔非疆塲簿書之事暇時游偃小室觀望流雲俯玩芳草言念壬辰獲雋禮闈我師吏部蘇門髙公手授空同批㸃唐音丹鉛爛然飛駕塵品惜困于車馬未遑移牘頗悟沈㫖尚能一二懸掛胸臆於是撫東橋舊編時綴短語積之旬月蟲鳥盈紙用以淘刮塵沙追動精魄嗟乎詩不易作亦不易評徒作靡補于騷妄評取戾于世千古而下如鍾常侍者可再作邪周復俊曰大率唐詩初焉胚胎渾淪繼焉風格温厚中焉氣韻宏逸至晩唐體質清弱元神其漸銷薄矣若乃宋人粗硬失之枯元人浮縟失之漫皆無預于唐音者也五經旁訓䟦周復俊昔人喻聖人之經崇深猶海嶽擬若稱矣愚不其然夫海嶽有形而測其崇深者尚有未盡聖人之道無方無體仰之彌高挹之彌深而或欲以一斑窺之祗見其漏也已惟古聖憲天立象盡意而後有作者始繋辭以盡言弗繇其象弗遡其言而求知聖道愚未見其能也自漢世專門之學興篤守師説以紬繹羣經自謂不遺餘力而或乃病其太繁近代釋經徃徃驅率聖賢以下同已意求之愈工失之愈逺厥病均焉俊竊望名世之英振古獨立沿文切理不必妄臆加損鑿破元淳舉其一枝而全體自見亦猶投綸于川沈浮髙下一任善􅈄者取之初無迎必庶幾學者涵濡歌咏之中自有真咮古聖之心意性情將親見而有得此則解經之上乗也大中丞可亝游公間示五經旁訓奥而通簡而明質而不俚指證而有據師漢儒之注䟽而不繁備百家之言而不泥可以翼徃聖式來葉斯道之崇深將由是而梯航之矣刻既成謂俊宜一言以賛其役愚也陋奚足以知之聊以復公之明命云爾易說題辭周復俊夫易潔净精微止矣二畫洩其秘三聖翊其文萬祀言聖經之㫖者莫加焉魏晉已降𤣥之以老莊狹之以太卜厥宗昧矣余猶喜安國康成之徒注釋羣經承師指授沿古敷言未始置樹竒僻破壊元淳辟之投竿取魚浮沈髙下一任善􅈄者取之初無迎必縱於大道未克盡窺盤辟周旋不迷蹊徑注釋家之指南也後來妍尚匪一枝流益棼易布象占大加離析吾夫子不云乎居則觀其象而玩其辭動則觀其變而玩其占夫居無事而動有爲無事斯暇則象以求之而占非所急有爲斯應則占以决之而象靡或遺循是知濳龍象也亦占也勿用占也亦象也象有真假占不他適聖人垂訓豈有平居祗觀濳龍之象而不及勿用之占乎象從何來縁畫而生占從奚分由畫而决象者擬議之占托言之也占者裁定之象顯言之也抽端殊貫托體同歸不能不分而能不分其象占之謂乎子言之聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象言象及爻而不言占明占寓於象也繇斯繹之義自晰矣假令象外有占聖人胡靳一言而不發天下之矇覆耶誠能悟象數之渾成覺占决之匪二其於易思過半矣光禄惕菴先生敦尚古學居常以山水文籍自娛蓄極而通不假餘思撰易說二巻言約㫖逺神孚道洽辭變象占渾然一致同非伐異異不茍同而鈎深通微何者不詣凡天道之極則事幾之變化人情物理之糺錯爛然皆聚於目昔旹讀易之難而今而後知讀易之易矣詩不云乎惠而好我示我周行俊也不閟其愚輙陳瞽說如右惟是正之庶幾哉沐浴不忘云爾楓山章先生年譜序凌翰年譜者纂言記事攷覈始終以備一人之史也一人之史也者有傳以傳之狀以形之述以著之表以標之誌以記之賛以宣之雖裁制之體則别而質實之用不殊皆足以辨爵里考德業録功勲備名實斯已矣又何事乎譜譬諸形象有塑有繪塑得其全形影俱具繪得其半影立形偏技藝各有專也楓山先生既沒其文之遺者或約而刻之或博而刻之皆翁之精神因言以顯行之遺者狀述篇篇傳賛首首或以雖詳而補其不足或以既備而略其有餘皆公之言行因人以彰凡皆繪畫之云爾乃公之從弟井菴公沛則紀年以綱注事以目事以月繋月以譜分以類公之終始則備矣以爲摶埴之工非歟某閱之管窺得其一斑蠡測竊其一勺觀夫德以崇志道以積躬思以鈎深言以闡教文以華國介以立操清德雅望以廉頑立懦宛乎塑像可瞻已且𢎞大猷以賛帝業燭隠憂以達民情躬素履以崇正學黜空談以勵世風至于熙代之優耆宿哲人之佩德行亦因之而附見焉信一塑之不可以或少也雖然塑與繪皆求公于形者也求其精藴生氣則皆亡矣不可傳者與公俱徃所可傳者不亦糠粃焉爾乎達人君子得其一體良得其全體者光是故兹譜之不可以不刻亦味道者之一臠也大政紀序李國祥古昔司典有官以爲大政蓋彰徃考來鬱爲不朽也自周末史失其官國自爲史業多冺冺何至祖龍烈熖而史隨以燼乎即幸尚書春秋得存而二書所不及者無能一爲臚列也至兩漢迄今人人得緩頰以臧否而賢者共相見德不肖者共相見慝無亦千六百年即史不盡良而穢者猶存尚論者因之以張侈耳蓋以子長述史記漢武取覽孝景及已本紀削而投之非不隠切也尚許其生任職死布書無或爲忌孟堅修父業仇者間章帝以私史乃益出袐書給筆札于蘭臺俾續成焉桓温覬覦非望彦威著漢晉春秋以裁正之范杲守夀上言家世史官得秉直筆成一代大典綦崈禮請于舊臣家訪遺文徃蹟以參史官所紀漢以來臨我者不䕶短儕我者不拂正仇我者不肆謗而史復得成于出位備于藏家雖上非尚書春秋爲聖人言下非史記漢書爲良史筆猶然核綜羣籍博采衆記成一代史以備典故爾爾於惟國朝軌事功緒踔絶百代而表章若史者何獨冺沒無聞哉其世無熟典墳丘索之業者乎抑無極涇渭朱紫之辨者乎無乃金匱石室閟不易覯而建文景泰時事又諱不易言用是因循二百年畏難於史即大手筆私有記撰徃徃不敢示人即示人輙從匿去未敢懸之市門傳之都邑也比者陳南充得請于上開館執簡以成正史㝢内鄉所撰記舊聞者始得網羅以出亡慮數十百家大都如元美所謂修郄以滅公是逞已以淆衆非剽時耳遂爲目信人舌用爲筆又或改事之非而稱是掠人之美而歸已若今家乗墓諛之遺文致不足憑也館開既乆尚爾因循者意在兹乎苐自世宗朝以來靖難出狩于時當事者無不褒而登之祀典䘏紀中殆非諱言日矣以故繼東莞通紀京山洪猷毘陵欈李憲章而梓者不特鄭端簡之吾學編黄恭肅之昭代典則已也復有周生時泰者取朱職方閔茂才所校豐城雷公禮述洪武迄正德之大政紀與洧川范公守已所續紀者梓之問序于余余得卒業非純左之編年亦非純司馬之紀傳其祖涑水新安通鑑綱目以成者乎無大䲭張其臆以移瑕瑜之體無大蜷􅈰其論以窘琬琰之用異日載筆者藉此顯以隠質中秘之藏藉此總以分質郡國之識藉此錯綜以備質㑹典所輯星官所職六尚書所留故牘彼修馬班業虎炳豹蔚一時者于此即不知斑亦可見一毛也若于諸梓輙因自爲鷹揚而隨有雌黄古人致論目睫不由然哉余固謝不敢祗序周生梓埒稗官野史俟載筆之臣採擇意也亦以見聖明之世無䕶短一切畏難于史云誠齋先生易傳序尹耕誠齋先生宋人也文章行誼冠絶當世他作徃徃梓行易傳則否宋人曽取置秘省卒不頒布良慚不廣嗣是蓋無聞者三百年矣明守臣尹耕乃爲刻諸開之郡齋尹耕曰徃余得是傳于好竒者謂易盡在是矣故樂爲刻之叙曰夫易其可易言哉惟聖人全體至道幽贊神明妙應感形化裁機務是故洩天之精發地之靈㑹人之極布法立象直指逆數以通能于百姓及夫觀象命辭研理翼傳然後探𤣥極變盡賾顯微其道大備百用不惑由是知庖羲氏至德文周孔三聖人用心勤矣故自周之盛時及其李世官不棄職學不廢業史朝惠伯舉曰良識而穆姜陳文子皆稱善用矣秦焚詩書此頼卜筮得以不毁然簡策雜亂辭意淪失左氏所述繇辭一無可考文言繋辭或者乃疑其不出于孔氏况其他乎嗚呼天何言哉四時行焉百物生焉此非聖人述天以教人者乎惟易闡隂陽闔闢之機窮剛柔致用之妙洞鬼神倚伏之情立大中至正之矩以究性命道德之極而曰止于卜筮使學古之士逺遜𤣥宗近稽事應不復措之心身以求所謂蓍䇿龜牘之外者悲夫余嘗謂易以卜筮存蓋亦以卜筮亡也嗚呼天下有道某不與易待膰接淅鼓琴微服故善用易者莫孔子若克已復禮一變至道用行舎藏曲肱飲水故善學易者莫顔子若是故由之武人求之進退憲之苦節賜之尚口咸乖厥㫖而况其他乎而又萬世之下乎耕小子生十歲年受易家君每于指示之餘見家君凝神湛慮遐思永歎若有及于簡䇿之外者而不敢請也自得先生此傳耳目開豁神爽飛越瞻前忽後千里几席如穴中之蚓得覩龍變上下風雲呼吸宇宙雖莫測其故而其在穴之陋一旦洒然故不敢以自私也又曰徃余在南宫時讀是書未覺有入及以罪干國憲謫兖移開心以跡危情縁物感反躬思過悼改無從每焚香静室展閱是編至于用晦白茅之戒先生必前後反復引喻諄切以明之辭危理盡道直思𤣥未嘗不流汗揮涕自懼無良而徼倖于愆者尚多也思天下豈無病余之病者乎故刻之益力若夫句讀簡䇿之間釋語命字之類先生所見間有異于晦翁本義者讀者莫之異可也重刻朱子摘編序劉文卿嘗謂朱陸兩先生之學自二先生在日而及門之徒已有不能深知其際者即象山三書其深切激烈爲晦菴之知音在斯而䝉數百年不解之謗者亦在斯是何知兩夫子者之稀也及觀陽明先生所輯朱子定論諸書則見晩年瑩徹精微其於象山當不復置同異于其間矣學者又從而藩籬之何哉陽和張先生復大明其説而益以悟後詩晦菴所至皦然如日中天而或者謂二先生表朱以伸陸亦非也自孔孟以來惟有此明明德一路秉此者謂之天命明此者謂之大學昧此者謂之愚不肖象山所云稍有端緒即爲異端於此二三其説是以杯水爲仁爝火爲光烏能久而不息哉即晦翁書中云日用之間觀此流行之體初無間斷處又曰近㸔孟子見人即道性善稱堯舜是第一義其形諸咏歎者則於酧酢處見本根垢盡而㸔寶鑑春水之中流自在雷聲之萬戸千門則其平生努力躋攀已作等閒笑破以晦翁之痛反懲檢者爲學士筌蹄而不以晦翁之自在得力者與吾徒指㸃非惟失晦翁且將失孔孟面目使朱子有知方將扼腕長太息而定論可以不掲悟後詩可以不輯乎哉蓋此理自在天地間自孟氏以來千五百年而失傳非世無理世無窮理之儒耳窮理之儒所以明明德于天下也天下方昏昏墨墨而一二大儒復以若存若亡之學散失本真飣餖末議所稱孔孟冡嫡固如是耶故其成已成物莫如誠之爲貴至誠之學亦如大冶精金千錘百鍊雖火候不同精金縂無變色設有變者藥汞之流不堪爐焰故守書册泥言語之不可爲道亦藥汞之不可投於大冶耳精金不以付之錘爐而徒以藥汞示人始則自欺終以欺人朱子所謂全没交渉方深省而痛懲之毋乃大不得已者耶所學未至而一龍一蛇以誤後之人晦翁固無是語所學已至而不以揀金之手遍告將來晦翁之意滋以戚矣陽明曉此深意拈出警俗所謂述者之功與作者等也必謂象山之學待定論而後伸又何以勝心小二先生乎縂之明明德一路千聖同歸二先生豈能自異而世儒又烏能異二先生也學者誠患不能克已復禮則此説終無了期此禮一復則我之全體呈露如秉燭髙堂朗然洞徹可以獨立宇宙之間毋論往日紛紛異説涣然冰解即所稱定論指歸亦且為門庭指㸃緒餘耳先生之詩曰若知體用元無間始笑從前説異同此語盖盡之矣故陽明先生知象山知晦翁者也而陽和先生知陽明者也學者由摘編以親見晦翁則此學當與天地始終而王張兩先生所以表章晦翁者無已時矣不然有不為藥永之説者哉是編也陽和先生長君雨若公出以示予欲重刻之可謂承其家業而盡心於朱學者矣髙士傳總序皇甫汸在昔先公𤣥晏丁辰末葉抗志幽人采身名于玉潔覈終始于蘭芳嵗厯二千人纔九十目為髙士竊附同流樹此風猷激彼波蕩仲尼之嘅作者季札之慕子臧又曷故焉世多䝉垢書遂殘缺殆其勢也伯氏子浚覃加􅊧討銓次成編仲氏子安復廣公意自晉至宋亦拔百人勒爲十巻嗣軌前書良足光照先烈禆益淳化矣覽者謂公棲痾丘中遺榮區外一辭束帛之徴再謝翹車之使彼何爲也二子者方嬰情于珪組希功于竹帛口異言朝跡懸在野是編寧免逮躬之恥乎或出或處道乖君子非隠非吏見詆通人于是乎有河陽誠拙柱下非工者矣嗟夫矯意殉名則􅃵讓而色變委情順物則瓜竊而心凉若我伯氏獻䇿違時掃軌絶俗耽綜羣籍無忝書淫著論盈箱何慚釋勸迨我仲氏效郭伋以辭憲甘顔駟之潜郎調滯十年仕恬三黜昔曼倩陸沈于金馬子雲寂寞于天禄豈必逃虚斯爲髙尚乎矧彼全德韜華運終戢羽之期而此旋符迴耀世濟攀鱗之代詎非消息乗時龍蛇互用者哉季弟子約合而梓之傳諸其人可謂濟美同好矣各有序説故不重述云禪棲集序皇甫汸嘗謂虞卿著論誕自窮愁屈子賦騷由于放逐故文王拘而演周易宣父厄而作春秋考諸聖哲蓋同斯者詳之馬走豈或云誣矧詩本縁情情悒鬱則其辭婉以柔歌以言志志憤懣則其音慷以激是故稽生揆景猶愬繁絃雍周撫膺遂流哀響詩可以興可以怨不在兹乎余綺歲明經冠齡結綬尚厠下大夫之列參多士之末光然性惟􅘅俗識罕通方一改官再承譴一不拜職徙者三而已善乎潘生之言此誠拙者之驗也丙午之歲承太夫人諱儼然在苫塊中而監察以隂憾苛抵其罪坐是免官明年丁未上書闕庭敕下撫臺移之京兆余羇紲都門客居長干寺之精舎夫鍾儀晝繋自同楚囚李廣夜行見呵灞尉時哉勢乎既而勘者兩造具研聽者三復未報清流投濁竟成孟博之寃白首相新莫鑒周陽之枉乃使奔走道途淹留歲月昔䝉莊願處才不才間則余亦可以罪非罪自遣矣斯地也髙帝由此肇都文皇于兹建刹净域經始于赤烏化塔更新于白馬布金恧麗多寶慙工余乃銷跡緇塵息心慧梵客有許雷時方同病僧多林逺可與晤言若夫貫華冩葉之書四韋三乗之典無不流觀染著宿障之根因果㝠報之業靡不殫究出惱煩于累刼超忍辱于空筌其暇日也登高臺以延眺訪故宫之遺蹟運革於三分鼎遷於六代吕周英烈託壠樹以西靡王謝髙風隨江流而東逝夫得喪異途其虚無泡幻也既如彼榮悴共域其倐忽燼滅也又如此則于蟬蛻一官懸解萬物余復何有哉涒灘春謝作噩秋殷蒹葭落而淮水清霞霏收而鍾山紫頽光迅于駒隙禪定辟之猿調兼以哀深庾信涕甚楊朱抒情宣志篇詠間作占授行者書之又若貸更生于薪旦庶存禮樂返中郎于鉗赭尚寄典刑此殆非余之心也或曰西子以蛾眉取嫉曷不爲之毁容越人以神手殱生胡不爲之輟技嗟乎南山種豆顧非引慝之辭空梁燕泥詎是招愆之牘世設以此吹韲則詩可以削草矣去來三稔在寺凡十有三月前後得詩若干首題曰禪棲藏之舎部明文海巻二百二十一
