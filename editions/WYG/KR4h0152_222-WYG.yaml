body:
  text: 明文海巻二百二十二餘姚黄宗羲編序十三著述書徳華文章正宗辯後王雲鳳宋西山真氏集古人詩文作文章正宗盖為專攻文詞者設與昭明文選姚鉉文粹用心無異至其自序乃曰學者所以窮理而致用也文雖學之一事要亦不外乎此故今所取以明義理切世用為主則以儒者體用之學濟其說而未免岐而二之夫聖賢所以相傳者道而已是道也其功用極於育萬物賛天地而其實不外乎日用行事之間故聖人既有是道於身則自日用行事以至所以育萬物而賛天地者固已煥然其明盛而不可掩矣若堯舜禹湯文武周孔之禮樂制度威儀言辭與凡見諸事形諸外者皆文也孔子曰文王既沒文不在兹乎文者道之可見者也而言辭者尤文之可見者也故六經四書儒者謂之文誦說其文以求其道而體之於已儒者謂之學學者誠知所以學而得夫道則所謂文者将復自我出豈特言辭而已哉若以文為學之一事則是孔門之徒皆将操筆學為文詞而不知儒者之學固未始有意於文而徒學為文者固不得竊學之名也盖自三代之教廢而儒者之學不講世之人徒見聖賢言辭之無弊流傳之無窮心慕而竊效之然不知深探其本於是乎秉筆締思日積月累久而既多編之成書則自視以為天下之文不吾過矣轉相授受倣效成風千有餘年使才質髙明者不得進為徳義之儒而資質庸下者不得守為謹愿之士至於有宋真儒迭起講明聖學一洗其陋其友輔之其徒和之所見雖有淺深所就雖有髙下要皆能辨於二者之間而知所取舎矣真氏生於諸儒之後號為大儒而不能自㧞於文詞陷溺之中反又從而文之孟子曰惡紫之奪朱似是而非有誤後學非若昭明姚鉉為淺薄之士而文選文粹出於文家之手固不足重輕也其辭命議論叙事徳華辯之悉矣其詩賦曰三百五篇之詩正言義理者無㡬云云盖詩者人心之感物而形於言之餘也人各言其志故有是非之不同而無工拙之可言誦詩者諷詠之間既有以因其言之是非而知其心之邪正以為吾之所當取舎然必窮理慎獨真有好惡之誠省察之久實能為善去惡而後性情之正有可言者故古人必十三誦詩久而後能有所興起其次第之不可紊而功效之難如此今曰諷詠之間悠然得其性情之正即所謂義理為言亦傷易矣又曰後世之作興寄髙遠讀之使人忘寵辱去係吝翛然有自得之趣此盖後世躭吟之流溺意詩句之間而不知其他所謂但覺髙歌有鬼神焉知餓死填溝壑者實非有見於道安於命胸中自悠然灑落而無寵辱係吝之可言也至若朱子詩有三變之說盖為答鞏仲至之問雖其論極盡詩之本末取舎其意則以為使今之作詩者能如此亦庶乎不失古人遺意矣豈可謂詩乃朱子之所取學者必不可不作而為學之一事乎且朱子嘗欲注荘文矣使其書成必能尋究其病根之所起體貼其旨意之所在而大有取舍於其間盖窮理者必如此然後是非功罪者可得而論也亦将謂朱子教學者以學荘乎况真氏雖自謂以文公之言為準乃不分三等兼失之矣或曰如子之言則孔子所謂則以學文博學於文周子所謂文辭藝也道徳實也篤其實而藝者書之皆非與曰孔子所為文詩書六藝之文格物致知之謂也若文莫吾猶人則專以言辭而言若宰我子貢之言語者耳真氏言文乃作為文章之文然作文之文與周子所言之文雖若不異而所以言之實不同周子之意祇謂學者當先篤其實明其道而後可以言其言亦不可不羙而所謂美者則亦善其辭說之云耳非謂有志於求道者又不可不學文也不觀朱子之言乎人之才徳偏有短長其或意中了了而言不足以發之則亦不能傳於逺矣故孔子曰辭達而已矣程子亦言西銘吾得其意但無子厚筆力不能作然言或可少而徳不可無有徳而有言者常多有徳而不能言者常少學者先務亦勉於徳而已矣此其緩急本末輕重取舍學者所當潜心也盛明風雅初集序胡松布衣江問山採詩四方實勤且博間以魯國非車子所梓盛明風雅數帙遺余因以其叙見屬頋余非知詩者何能為江君役而請屬益力弗解乃述所聞而歸之夫詩之難言久矣匪言之難作之難匪作之難作之而能道性情合於典則美且愛焉難𢎞治前勿論論所採且梓者盖繇𢎞治正徳来北地汝南何李諸君子崛起始厭薄故習追迹古始力挽奔流而溯其源其志甚偉而其資材學力又足以副之明興詩裁為之一變然其時或有憑筏依模規於太甚之議未皇暇䘏也自是逓相師承僅得形似攻詞者或近冶艷襲格者太露筋芒甚則無喜而笑靡哀而哭又甚則教欲宣淫習非長傲殊失古人發情止義矢志永言之誼智者率能辨之矣余觀是集所載雖其言人人殊總之因縁觸遇攄寫性靈體物鑄詞揚芬致飾或逸若遊雲或繁若絢錦或潔如朝露或淡如𤣥酒亦或嚴若霜矛雪㦸古若周鼎秦巵而悲壯若楚歌漢曲雖稱近體繁聲總之變而不失其正樂而不至於流風槩氣韻咸能皭然以其所長而鳴國家之盛信乎其為盛明之風雅已顧說者猶不能無淄渑並泛雅鄭間陳之疑此則深望具正法眼者詮擇是正澄汰清釐乃可以傳而逺夫文章天下之公器固不可以私假而逹者在前識者踵後又寧可從容私假哉問山君雅好吟頗通諸詞閔作者之苦心悼後来之失傳即凡一聨一句可傳誦者悉録罔逸故其多若此而尚有竢於詮鑒間嘗過余謂將西遊大梁之墟就正於西亭史氏余以為得其人矣不知西亭見謂余言然否刻孝經序胡松始余為童子師授今文孝經句讀盖及半而疑夫其所云廣至徳紀孝行與右傳㡬章諸如此者是誰所詔告與記注也求之弗得置弗思其後數年冠繹故所誦反復輙大疑不能解偶從友人家見今所刻晦菴先生刋誤讀之豁然有㑹於心廼知古書傳於今者類為後人之所竄定附益如禮儒行月令檀弓雜記諸篇其不純乎道詭於聖人之意諸若斯要自不鮮奉文公之書信之弗疑比仕且學㑹海内名儒與相揚㩁乃於所云刋誤又不能無疑其中夫謂章首為經今試取讀之彼其義理深醇氣脈流貫夲自一時之言無疑顧古文二十二章與今文十有八章以皆仲尼曾子閒居間出之言或他人有問或曾子自問或孔子所嘗語人意者仲尼既沒曾子即世諸門人弟子雜記其言私相纂輯誦法後人相與尊之為經爾夫尊之誠是而顧輙分經傳則亦尊經之過矣夫分經傳已無當乃曰是章傳某是章廣某曰是為天子之孝是為庶人之孝是孰詔之而孰識之耶其孔門以來之舊邪夫聖人之言通乎上下其逺如天其近如地又曷嘗顓顓然曰是為某人之孝之道云爾學者試即齊魯論語取孔子言之約者以為經而以他日他章之言為傳以詔於人曰是章傳某是章廣某要之無弗通然此可乎不可乎此其不足據證明者必能辨之矣或曰是書之傳歴數千年學者世守之子獨何據而疑之也曰以漢儒識孔子之言知之也漢儒識孔子之言曰吾志在春秋而行在孝經夫春秋者本魯史記之名當時固有其號彼孝經者是後人之所尊信而夫子之生自以為經有是理乎自論語大學之書已多出曾子子貢有子之門人所雜撰而况是書知者觀於古文今文之殊思過半矣若其他雜引詩傳傅㑹成文則宋衡山胡氏玉山汪氏具有其說故在學者之自得焉爾雖然秦漢而來聖學不傳寥寥數千載自有宋諸大儒外至於今靡矣學者惟利是聞髙者習静語空下者沿俗守陋日務脂澤其言以悅世其於事親從兄之節順悅翕耽之旨曠弗省余是用大憂思有以捄其敝廼刻斯上黨仇氏書院中仇氏固敦孝友之行不沿於俗者也嗟乎士無志於學則余固無望矣志於學而弗是之先是戕木之本而務膏其華堙水之源而兾其行之逹也其涸與萎要可立而俟知我罪我其以斯言也夫刻唐宋元名表序胡松說者曰表之言明也摽也譬物之摽表言摽表事序要於章顯而已奚駢儷之尚也余竊以其言徒取一隅要未為通論今夫人之於文猶其之於言語之於衣服飲食與其宫室器用者也且夫言語之於逹意衣服之於蔽體飲食之於滿腹宫室之於安身器物之於利用以今方古其可得而齊諸譬則四時之行萬物之生江河之流轉各因其時以為變故易曰損益盈虚與時偕行自天地且不能違時而况於人乎故善學者從今之文以明古之道不善學者執古之迹以失今之宜斯其行之所以弗逺而施之則泥者也是學也昉於漢魏六朝盛於隋唐而極於宋彼其工拙繁簡駢儷直致要之其體不能盡同然其意同於宣上德而達下情明已志而述物則其後相沿日下率競新巧争尚衍博徃徃貪用事而晦其意務屬辭而滅其質盖四六之本意失之逺矣今世士業文益乂轉甚曽不深維體裁之所從始勉思搆撰而乃掇拾補綴勦竊沿襲是曾弗若直致之為章明較著也余是用悲乃輯斯以式晉士要使學者敦尚夲實優游道藝期可愛而傳爾或者弗察以為斯特文詞之華而已是非士所先過矣夫召賔客者必腆其辭命告氓黎者必悉其志慮矧乎以詔君上以交鬼神以諭邦國以動天地而可弗修其辭乎傳曰修辭立其誠所以居業也故夫以唐宋之體裁陳虞夏之謨典用休文之聲律寫孔明之忠義神而明之存乎其人此則使者之所深望抑亦吾黨所當自朂者哉刻良知議辯序胡松龍溪王子自越緘示良知議辯凡兩帙曰此某與雙江公所為徃復論辯語也子其裁訂是正為余梓焉不則姑舎之或以覆瓿其言如此顧余章句賤儒何足以與聞斯旨然此靈明一竅通乎宇宙繄誰獨無則亦頗竊窺睹焉夫王子所稱良知即未發之中即發而中節之和未應非先已應非後即寂而感行焉而寂非内也即感而寂存焉而感非外也無先後無内外渾然一體析也則支其言廣大渾融顛撲難破近乎墨子之守矣然自陽明先生指出此竅傾懐示人學者執徳不𢎞稍悟即歇安其簡便以知為行忘其所謂戒慎恐懼養之致之之實以立乎天下之大本甚至棄真歸贗謂冦為戚至於蕩而無歸積而為慝而莫知辯以反則世亦盖多有焉此雙江公歸寂豫飬之論所繇以發者也今其言曰夫節者心之則也不識不知順帝之則惟飬之豫者能之豈能使之發而中乎使之中節是宋人揠苗之故智也故必歸寂以通天下之感致虚以立天下之有主静以該天下之動雖若疑近於析然王先生始在滁輙教學者静坐澄心盖亦此意而當世弗察譁然謂禪門人有疑而問者世謂先生為禪何也先生曰吾學非禪吾學孔孟正學即使孔孟復生當不能易第吾涵養未之逮爾嗟乎此余髫年所親聞於諸老儒者豈非實録哉然此非先生之私言也明道固言之矣曰識得此意湏以誠敬存之更求義理栽培充拓又曰既知所有更不可不飬所有中庸曰唯天下至誠為能盡其性其次致曲曲能有誠誠則形則著明動而變而化奚俟多言為哉故易既曰得其一萬事畢而又曰差之毫釐謬以千里故飬而致之之功要不可闕如此也竊謂二先生言各相發而義實相濟盖鹽梅麴糵合而成味是在學者染指含哺咀噬咽啖有難以口舌争者矣夫茍食而知味味而充實則其生色也晬然於面盎然於背施於四體四體不言而喻矣大畜之彖曰剛健篤實輝光日新其徳盖此之謂也故願與吾黨諸君子交朂云爾籌海圖編序胡松今比年海内憂世之士游談聚議必曰南倭北敵然言倭事畧矣畧矣何者我國家之有天下實遯元君而宅之元君逋遁而遺孽支屬尚多有之是雖大將屢出成祖三犁然地廣衆滋殖甚易故永樂来馬塔瑪阿嚕台布尼雅實哩之徒跳梁蹢躅至爵之三王而後少戢以定矧又割大寜而棄之其後寖然寖熾即紅羅白雲開平木葉東勝拂雲之險皆不能守正統末㡬至覆没𢎞治中繼以和碩浸淫削折並朔方河南故地遂失矣自是國門戎索之憂肘腋腹心之患日切孔邇憂及廊廟即廊廟不遑暇食文經武略嵗積月增乃諸邉鎮既有撫臣又設總督而總督之設初亦止於建寜甘固四鎮而止其後宣大遼薊則皆並設至於兵備憲使㕘遊副將之屬不可勝紀法盖日詳宻矣故西北邉事雖若官冗費鉅然以張皇戒詰即韋褐文墨之士類能言之而其輿地形勢與書疏論著世多有而傳焉事徃徃在人耳目倭之負海即自𤣥菟樂浪迄於徐聞東莞要無慮萬餘里所在可犯然自聖祖拒絶信國經畧之後伏不敢動者頗厯年所永樂中雖嘗蠢動賴劉江望海窩之㨗寜謐盖百餘嵗要不獨韋褐文墨之士不能詳其本末即搢紳樞筦者流亦與相忘久矣加比嵗防濶疎舶利羡溢濵海三窟之豪造舟售貸横行洋中翩翩如雁春来秋去各有主名當事者即知其然而憂連懼及托於喑且瞶矣故人老而耄以荒器陳而敝以圯法久而蠱且蠧盖自其理也重以風俗傾頽紀綱瀾潰君子小人交騖於利以隂召隂小雅廢而僭竊乗矣前此十數禩廟堂盖憂患之嘗遣重臣廵視竟以罹禍自是益靡所忌因縁忿怒轉為叛逆乘勝從横狡焉思啓盖自壬子至戊午黄巖至淮泗渉壖場渚至村落邑鎮而兩浙三吳長淮之禍變慘矣所賴聖主憂民天心悔禍英豪僇力兇渠授首雖其遺燼餘烈時或灼然而巨燄大勢溘其遏矣顧當時變出倉卒事承蠱壊徴兵調賦署吏建官一切從便頗覺煩費多事焉崑山鄭子伯魯故太常卿魏荘渠先生髙第弟子也有志匡時而阨於命親在圍城竊觀當世舉措有慨於中念欲紀載論著貽之方来即凡兵興以來公私牘牒旁搜逺索手自抄寫家本劇郡而居又宻切理所夙以徳學見禮有位故得究詳焉他日以其間繕造沿海圖本十有二幅附以考論郡守太原王君為之版行因獻督府梅林胡公公見而驚曰韋布中乃有斯人耶此世所稀睹余比欲為之而未遑暇及韋布中乃有斯人耶於是檄來武林使益成書伯魯感激知遇追跡冦始詳稽典制㕘質風謡即賊所入冦嵗月道路克㨗僨北與今昔主客兵馬饋餉之數舟楫器械戰守屯戍之法備書具載凡為卷者十有三盖經世者有依據矣雖然前兹所載譬之局方醫案已事云爾若夫審運氣之流行察臟腑之虚實辨脈衛之理亂増損劑量弗泥弗執則係乎神聖工巧之人矣昔仲尼答顓孫氏知來之問而反復乎損益之際孟子輿告畢戰井地之法亦曰此其大畧也若夫潤澤之則在君與子矣嗟夫損益潤澤道豈虚行變通神明是維賢者至於制治未亂保邦未危防乎其防則余盖深望當世之君子焉三泉志序胡松夫和古厯陽郡也地故廣邈巢與烏江嘗𨽻焉境内盖實多温泉云要不啻沸井而已國朝洪武初始省和之南鄉𨽻無為是曰巢邑而以其東割屬江浦故烏江之湯泉與陳村之半湯池遂與和之香泉同原而異屬矣顧其名有著有㣲有極為人所想慕而弗克見即有絶不為人知者焉盖其所遭云爾士之生斯世也則亦曷有異焉廼香泉在蕭梁時嘗遇昭明太子太子故好文章事宜有作惜其無傳湯泉於宋遇秦氏少游少游賦而詠之遂以盛傳其時至半湯池之遇希矣繇宋而來學士大夫騷人詞客徃徃經從或相慕來游大都有賦而又有存有不存說者則以其幸不幸也余綜其實不然頗以無好事者為集刻嘉靖丁酉和守魯君某與某判胡君有感焉謀裒集梓行今所云香泉志者是也而又以淮海定山所為湯泉賦若諸詩雜其中盖失實矣今乙夘春太守李君來自華陽問郡之故取香泉志讀之嘆其舛誤冝釐訂且合三泉為一志復厥本初要之元始然弗即斷㑹嘉禾張子仲華游學其郡邂逅見之則介張子以問於余余報之曰李守之言是也宜速即梓氏李守乃屬張子詮次纂輯自賦以下則各以其體類附釐為上中下三巻盖自是古厯陽之盛章章然益有聞於天下矣胡子曰余讀李守三泉志而重有感焉夫古湯泉盛矣而今僻在烏江之滸也棄置於荒山灌莾之墟而見辱於痬人墨士屠沽販負之流盖不勝其牢落可憐矣然自余覽鏡但見其悠然自得而與造物者同其游衍汗漫曾無怨忤之色至香泉之界於我而逹乎廬也則大為薦紳先生王公大人之所賞鑒而甃以瓴甋覆以亭館華扁綽楔光動林壑盖又其焜煌榮耀焉余他日數過之則見其瑩然相暎淵乎不矜而與物相忘於無何有之鄉又曾不自以有徳斯人如此也此豈若世猥𤨏齷齪之小丈夫然哉此仲尼之所為亟稱而知者之所繇以樂者與余盖於是乎得師焉然則太守詮集之意或取諸此余聞太守學求本原政事一新而自視欿然此其進又可量與太守名渭字湜父毛詩折衷序沈鯉古人之書有出於千百載之上而冺無可據之迹者欲從而訂其是非明其疑信則安所取衷哉亦曰信之以理焉而已矣前乎此者有賢者之所見與之同焉則其説可信也後乎此者有賢者之所述與之同焉則其説可信也君子之聴訟於人也非家至而人覩之也而以吾心之臆見懸斷於茫昧不可知之鄉卒之而為直為曲且判然如蒼素之在目矣彼載籍之無據孰與夫人心之難測乎故曰信於理而已矣秦漢而後六經雜出於煨燼之餘其錯亂逸失啓人之疑而不能自決者曾何啻一毛詩也然書之渾厚易之精微春秋之屬辭比事非聖人不能作雖無據曷疑而二戴之禮詞多繁複或足以漢之附㑹雖有據吾不能無疑也執此義以折是非雖羣籍可知也豈獨一毛詩哉盖詩之有序如今之詞賦先以名篇而後有詞賦之作未有其作傳而其序不與之俱傳者然則毛詩之序當亦為並傳無疑而或云子夏或云衛宏之作者皆非也方詩之未出也在左氏説春秋往往引詩詞為喻如柏舟清人等篇皆散見列傳雅與序合則前乎此者信之以左氏可也詩既萌芽有齊魯毛韓四家後乃三家廢而毛詩獨傳當時去古未逺而碩儒鉅卿博古通經之士皆藉藉傳誦而未聞有訾且議之者豈亦人心之公是有不得而終冺乎則後乎此者信之以當世之好尚亦可也而奚其疑不決哉或曰朱子之註詩也深闢小序之説而去取其間則毛詩之序朱子亦嘗折衷矣然則信毛氏而疑朱子也可乎愚曰不然朱子之説據經文而推之與諸經例論也詩之為經多民間閭巷之辭含蓄諷詠之義非有所指受固不得以已意懸斷之如他經比耳夫子嘗曰闗雎樂而不淫又曰放鄭聲是夫子刪取之意亦可於二説推之也而淫奔諸詩毛詩以為刺淫朱子以為淫者之自作判之以夫子之㫖則得失將孰歸乎故曰信之以理焉而已矣雖然詩之本然者在吾心善讀詩者取其可以為性情之助觀感之資而序非所泥也如其讀之而有得於心也雖㣲詩序而不以為畧得其章句而無益於身心則秦火未焚而三百篇已亡矣序奚禆焉孔子引詩皆斷章取義而其許商賜可與言詩亦未嘗拘拘小序之説也讀詩者又何必深辨焉滕侯趙仲一實政録序湯顯祖佐王之才常寛而取伯之才常急非有相反其時與他固然寛之無宜以絙猶急之無宜以縵也盖昔桀紂之法胥亡而亳鎬之法常在伊莱旦奭之輔固得以從容而鋪徳義翺翔而登太平及其時天下已定法制已信風俗已成如是而誅之如是而賞之俯仰之間益可以休然而無事矣幽平之後先王雅頌之制衰廢無存諸侯相攻并敝者先亡勢不得不急法而治時則伯才興焉齊管仲楚吳起秦衛鞅三人者其著也大致亦周官正地比受官成畫一於經畧會計之意而持之歸於富强其國曰誅殺不必則令不信不信則不行如是則國弱令不行雖有地力不可得而盡也如是者國貧貧則事雖小不可舉事雖小不可舉則是與亡國同也是故三人者急持其國而用以富强如晉文公之伯晉子産之存鄭皆是也後世諸葛武侯以用蜀而王景畧以用秦至王荆公以用宋而效異者何也勢不行也伯者審勢急可以治其國不可以卒治天下國狹吾之所得急為天下大非吾之所得急為也如以王公自治其縣青苗固效専治方岳則均輸方田無不可者專治邊郡則保甲保馬無不可者何也勢所得為也是故舉天下而急為之安石不能用宋取一國而急為之趙仲一可以用滕今且語天下以滕公之政吾嘗以於越長上計過滕時公上事一嵗耳大祲之後人太相食公為乞漕粟大府錢施其民問公庾庫中無有也徐起與吾北去更三年而再計止滕待公不能得見後堂主籍者約視其牘積金乃至羡贏三千糓踰六萬予啞然而駭曰是何興之暴也主者曰公費修治公私署堠禮際惠振收恤士民為民贖子婦所亡失立茇舎牛㮔以業流集者復不在是予益異之移以富一國又何國而不遂以富乎退而謂滕人公何以至此對曰凡田賦影避盛則有所逋而後期公奮議度田上下相傾動恐喝不可而公輒已單騎從所在父老行度之名其田有倨而撓者公故怒容渥丹奮髯眉相抵撓者行避去故壤則而賦平不比而争輸羡若鍰一錢以上率以糶故異羡而粟流又公課民桑栁有籍數去縣十餘里要人孺子戯折其四五樹圍捕之償十五栽而後止罰必而先貴故民不犯所在賦飢人粥治􅀈河皆獨身馳數十里察視曉夜暴露不少休故民無欺而不怨衣褐食稗而宫館馳傳爼豆咏歌之節必明以清故民儉而知禮語未卒予憮然而歎曰此伯才也乃先公行為載其牘長安以示執政張公張公曰此固當以節鉞盡其任幸少湏且以御史行邊專屯田鹽筴開塞之事可也已而事移官止吏部郎以亷梗訐激執政不可復容罷官去嗟夫人有如此才能盡之於法而不為盡何也用非其才也今夫以貧弱之滕三年而暴富誠委之一二大鎮其行法益巨三年當不異滕富强之效所求於臣者重而所求於人者輕然而終無亡敝之憂者固将曰天下已定風俗已成法雖有所緩失亦未見急之能為也嗟夫言治滕者異矣皆以公才且老而非當急才之時不幸而可悲然以予意之公雖進不得如管葛諸公主臣一心光賛盛業退猶免於呉起衛鞅刻厲之禍其亦幸而生於王者之世矣易象通序湯顯祖人之生靣目理澤亦無以大異而所好玩殊逺士之於書凡民之異其業有所好之是非全乎好之者也得已則已其風雨旦暮矻矻然而不已者其有不得已者乎貴㳺之家去四民之業而好狗馬聲伎博塞狗馬聲伎博塞其利於飬也不如農民之業其利於智也不如書然而有好乎此者何也得已者在彼則不得已者在此吾獨愛臞王之孫有如用晦宗良貞吉三君者去貴㳺之家所好而好古書傳然技止以詩行於公卿布衣之間㳺其名至於文字之所起理義之所變探賾而鈎深刻意而成言亦有時乎未暇也最後鬰儀王孫好揚雄氏之學方言竒字多所訓明憮然而歎曰文字之所起者畫也理義之所變者易也通於書而蔽於易不足以診天地人物之變乃退而學易凡子夏所傳九家所為變象互體者潜測幽討不遺餘力久而櫽括彷彿為一家言名曰易象通盖能極暢其意之所欲至亦可以有傳於世矣豈其不得已於書而矻矻焉者乎此所謂好之者也雖然方海岳子未成此書也散然而傲睨敦然而居休倫黨堂除之間愉如也書成而嘖言且起拘然以悲翛然以貧豈所謂作易者其有憂患乎抑鬼神之害盈乎海岳子能明易必有以通其故矣古文品外録序王衡陳子仲醇選古文品外録既成以示王子王子曰余不敏讀古人書如隙中數鴻毛而已持敗橐囊雲霧而已品内之不知焉論外乎陳子喟然嘆曰人莫不飲食也鮮能知味也先正樸重於古人之文類論而不議雌黄而去取之自昭明文選始昭明以降選者莫煩於宋然昭明以六朝選古文也猶之乎六朝也宋諸公之以宋選古文也猶之乎宋也要之乎世囿文文囿識矣非但自囿其識逓耳而逓目之抑且囿百世以下讀者之識非但囿讀者之識抑百世以前作者之神情笑貌筋骸脈絡種種生動之妙亦囿焉而不得出矣人第知窮餓者之苦而不知醉飽之過也今夫稻梁魚肉天下之至美也抑亦口食不以舌食如澠如坻若嚥若噦於是不羮之梅未漿之茗含辛之虀禁火之餳皆得而奪其好迨於一嚼甘再嚼酲予之以稻梁魚肉而後知其美也新陳之相化其亦何常之有至於新者陳而陳者乃始復為新民之好新甚矣不使之日新於虚談小慧剽剝離跂之學而使日新其好於古人之文章亦猶尚論之遺意也余故擇兩漢以來之文未經前人採拾而㫖逺情深者得三百篇其或詞章之外别具世變余亦間為箋其始末附紙尾以備咨考凡余所以如是者要欲學者知九州之外復有九州九畧之外復有九畧引伸鼓舞其聰明使之不倦而已王子笑曰噫嘻子之糟粕則猶吾之醴齊也子病在飽余病在飢且也非品外人誰能品品外文者陳子賢乎哉夫我則不暇列國史補序王衡史今者以我史史古者以衆史史今史詳古史略詳者歸治敗於事幾歸是非於議論按册而攷之十不失二三而畧者若存若亡於土蝕蠧敗之餘非立案於此而檢括叅合於彼則煩亂而莫辯今時好誦説司馬氏史記顧以其列國世家不免粗蔑為司馬氏病夫不覩秦灰漢律之慘乎哉七制以還冢壁之藏發家國乘號大備而作者寥寥焉蘇子由歎前事之拙而其所自為古史於左氏三國之外卒無一語短長以發新難而訂宿訛則又何也豫章魏華容氏意惜之既以其全力為全史又為列國史補大槩以左氏國語國策為本而旁證之公羊榖梁杜氏年譜諸書同則偏舉之異則錯舉而𠂻擇之事疑證以情情疑證以理務求至當而後已人謂華容上下三千年事如數一二以彼淹通茂明使執三寸弱翰録起居注討郡國書而次第之顧不易易而愚竊歎以為不然古史異者疑今史同者疑古史易辯析而難於編摩今史易編摩而難於辯析春秋無論董之筆南之簡不媿名史即公榖之多疵而其瑕瑜的然可不深維而見戰國策士譎甚矣然人勇而謀詐或反留漏穴以示人而才如史遷其所為貴黄老進奸雄者後世且得測其㣲尚而雌黄之故曰讀古史難而易若今則瑕瑜見而人知所趨匿矣試觀今廟陛之間青簡書白簡訟皆言之有故使主者左右聽而况於史彼其金匱石室之紀既秘如鼎書泥檢而不可窺而藂談野記又皆蓄墨兵於心而以塗説為輿吾誰與為證譬之羣閧於市茍立之平而設叅伍必得情焉而其誹於腹稽於唇勃谿於室者雖靣靣而質之且奈何哉嗚呼後之為史者其窮矣夫孫子書校觧引類序趙本學天地間有人則有争有争則有亂亂不可以鞭扑治也則有兵兵之為㓙器不可以妄用也則有法其事起於鬭智角力也則其法不得不資於權謀用兵而不以權謀則兵敗國危而亂不止君子不得已而用權謀政猶不得已而用兵也用之合天理則為仁義合王法則為禮樂故管仲霸者之佐用兵釋實而攻虚釋堅而攻毳釋難而攻易以驩虞為道假尊周為名要純乎權謀而已耳孔子稱之曰如其仁如其仁何歟盖人雖權謀事則仁義也諸葛亮澹薄以明志寧静以致逺此存心養性之言也躬耕南陽不求聞逹此尊徳樂道之行也至於用兵知孫權之本為漢賊而姑結與為援劉璋宗室也而掩取以併其軍仲逹不戰遺巾幗以激之郭模詐降泄人語以間之盛兵晝行夜攻遂陽以襲之息鼓偃旗開門郤灑以疑之事雖權謀心則仁義也若宋之韓琦范仲淹㓂凖宗澤李綱岳飛用兵主戰而不主和權謀無所不至求其人則金玉君子忠厚正直一言一行無非聖賢正心修身之法王欽若汪伯彦黄潜善王倫秦檜之徒終身主和而不主戰未聞一啓權謀之口求其心則犬彘小人姦回險薄滔天之惡無不忍為以此觀之可見正用權謀以紓軍國之患安四海之民者寔為儒者分内事而致知格物之功明經學文之暇不可不兼讀其書而潜究其理也古人著兵書凡四十餘家存者今有其七孫子十三篇實權謀之萬變也數千年來儒者未嘗一開其扄鑰雖有曹操李筌杜佑杜牧王晳賈林張豫鄭友賢張賁劉寅鄭靈等十五六家之箋不過粗畧訓義苟且引證加以訛謬相承古文漸失迨至於今凡用兵者無所於法庸非治亂所關一大缺典乎學不自量竊重為校讐而通釋之又取古人一二已行之事以証其下名曰校觧引類使四方經生學士皆可以讀之而不難夫自三代之後儒者不知兵其故皆以孔子不答衛靈而因以為諱殊不知春秋之時天王在上諸侯無合義之戰亦無問兵之體其不答也固宜今日不答於衛異日固請於魯使孫子生魯魯君用之以誅陳恒而明王法孔子豈不以魯為義孫子為賢乎漢唐晋宋及我聖朝天下一統禮樂征伐自天子出儻遇國家有難出而主兵何不可之有猥云徳化不當用兵此迂儒保身之謀賣國之罪也學註其書又恐文士惑不觧故復推其説而序之枝山志怪序錢允治孔子不語怪而齊諧志之齊諧之書不傳而續之者呉均曹毗祖台之牛僧孺紛如矣吾呉祝枝山先生有志怪論若干巻没後止存五巻會其曾孫化甫文學圖刻罪知録欲并刻兹編而不能全也余家有五巻遂總付之乃問序於余余生也晩不識先生時於休承先生處飫其緒論盖先生於書無所不讀於學無所不窺天姿英邁俊朗卓絶舉一世無有當其意者雖酒狂興發手不停批口不絶談近而撰述著作罔晷刻暇若志怪者志其耳目見聞之可驚可愕可駭可異者筆之於册若曰宇宙大矣洪纎髙下何所不有今人徒見前人所書謂本無是事子虚烏有姑妄談之不知物有常變理無迴互常不為常常亦為變變不為變變亦為常常常變變逓相隐顯迭為呈露常不足言變始為怪豈理也哉昔人不云乎日月之著明山川之融結此至怪者也見以為常至鬼嘯於梁山移於地牛鬼蛇神狗妖雞禍遂以為怪易有之精氣為物㳺魂為變物者氣之凝積者也物乆則靈變者氣之流衍者也魂交則滯依草附木勢所必然奚足怪乎夫赭黄重於隋朝國禁有之今則男子無不赭衣緋褲誅於齊帝不宜䙝服今則男子無不緋褲大夫不可以徒行今則空空鄙夫肩輿塞道而鴟尾獸環朱扉畫棟僣擬王公矣婦人出必擁蔽其靣今則粲粲彼姝露粧行路而聽經禮懴入山宿寺穢徳彰聞矣其他怪事不可枚舉詎止君子為猿鶴小人為蟲沙靈龜知剖老桑知焚乎假令枝山先生生此時則志怪不止數巻世變江河莫知㡳極即不謂之怪也可河防一覽叙于慎行河防一覽者何宮保印川潘公志河防之績也潘公自乙丑迄今奉三朝簡命從事河漕之間前後二十七禩矣其功難而鉅其畫詳而深其耳目之所狎精神之所寄若與水相忘者國家萬萬年大計在焉志之以示後也兼漕而專言河者何防河所以治漕也河者漕之藉也然則古之防河也避其害今之防河也資其利乎曰唯唯否否漕之藉河禹貢以來有之匪自今也禹畫九州冀為都㑹河流碣石以入於海兖浮濟漯青浮汶濟徐浮淮泗揚浮江漢豫浮於洛梁浮潜沔以入於渭雍浮積石至於龍門未有不通於河者也漢唐皆都關中漢漕山東粟百萬更砥柱之險以逹於渭唐漕江淮之粟由汴入河由河入洛以逹於渭亦未嘗不藉河也獨今日哉然則公之防河也奚若曰二十七年之中有大役於河者三其功皆成於因始而飛雲之決則開南陽以徃新渠二百里以避河之險因而避之也已而清口之役則合河淮之流以趣於海因而合之也其後銅瓦之決則隄大名上流以防其潰因而隄之也凡公之成功皆因也而淮河之績為最即萬世不能易焉嗟夫古之聖人見轉蓬而為車覩落葉而造舟察列星而分四時視月行而推晦朔未有無所因者也况夫四瀆之流呼吸吐納天地之性閟焉者乎禹能通九道陂九澤播九河疏九川東注之海而不能使水西流因其勢也故曰三代所寳莫如因因則無敵此之謂行所無事也盖自河淮議興而謀夫盈庭或以為當瀹海口不思海口之壅河淮分也則以為當開故河不知河淮之分隄防潰也是故高堰之隄成而淮不東崔鎮之隄成而河不北以河予淮以淮予河而以河淮予海又安用瀹海口而又安用復故河為此所謂因也因者水之道也漕渠之要在河淮之交而公之績亦以此為最故特著焉後之防河者第因公之成勞而時修備之則智亦大矣故曰志之以示後也元曲選序􅆇􅅷循世稱宋詞元曲夫詞在唐李白陳後主皆已優為之何必稱宋惟曲自元始有南北各十七宫調而北西廂諸雜劇亡慮數百種南則幽閨琵琶二記已耳或謂元取士有填詞科若今帖括然取給風簷寸晷之下故一時名士雖馬致逺喬孟苻軰至第四折徃徃彊弩之末矣或又謂主司所定題目外止曲名及韻耳其賔白則演劇時伶人自為之故多鄙俚蹈襲之語或又謂西廂亦五雜劇皆岀詞人手裁不可増減一字故為諸曲之冠此皆予所不辨獨怪今之為曲者南與北聲調雖異而過宫下韻一也自高則誠琵琶首為不尋宫數調之説以掩覆其短今遂藉口謂曲嚴於北而踈於南豈不謬乎大抵元曲妙在不工而工其精者採之樂府而觕者雜以方言自鄭若庸玉玦始用類書為之厥後張伯起之徒轉相祖述為紅拂等記則濫觴極矣曲白不欲多唯雜劇以四折冩傳竒故事其白有累千言者觀西廂二十一折則白少可見尤不欲多駢偶如琵琶黄門諸篇業且厭之而屠長卿曇花白終折無一曲梁伯龍浣沙梅禹金玉盒白終本無一散語其謬彌甚湯義仍紫􅁫四記中間北曲駸駸乎渉其藩矣獨音韻少諧不無鐡綽板唱大江東去之病南曲絶無才情若岀兩手何也何元朗評施君美幽閨岀琵琶上而王元美目為好竒之過夫幽閨大半已雜贋本不知元朗能辨此否元美千秋士也予嘗於酒次論及琵琶梁州序念奴嬌序二曲不類永嘉口吻當是後人竄入元美尚津津稱許不置又惡知所謂幽閨者哉予家藏雜劇多秘本頃過黄從劉延伯借得二百五十種云録之御戱監與今坊本不同因為校定摘其佳者若干以甲乙釐成十集藏之名山而傳之通邑大都必有賞音如元朗氏者若曰妄加筆削自附元人功臣則吾豈敢元曲選後集序臧懋循今南曲盛行於世無不人人自謂作者而不知其去元人逺也元以曲取士設十有二科而關漢卿軰争挾長技自見至躬踐排場靣傅粉墨以為我家生活偶倡優而不辭者或西晉竹林諸賢托杯酒自放之意予不敢知所論詩變而詞詞變而曲其源本出於一而變益下工益難何也詞本詩而亦取材於詩大都妙在奪胎而止矣曲本詞而不盡取材焉如六經語子史語二藏語稗官野乘語無所不供其採掇而要歸於斷章取義雅俗兼收串合無痕乃悦人耳此則情詞穏稱之難宇内貴賤妍􅑦幽明離合之故奚啻千百其状而填詞者必湏人習其方言事肖其本色境無旁溢語無外假此則關目𦂳凑之難北曲有十七宫調而南止九宫已少其半至於一曲中有突増幾十句者一句中有襯貼数十字者尢南所絶無而北多以此見才自非精審於字之陰陽韻之平仄鮮不劣調而况以吳儂強效傖父喉吻焉得不至河漢此則音律諧叶之難總之曲有名家有行家名家者出入樂府文彩爛然在淹通閎博之士皆優為之行家者隨所粧演無不摹擬曲盡宛若身當其處而幾㤀其事之烏有能使人快者掀髯憤者扼腕悲者掩泣羨者色飛是惟優孟衣冠然後可與於此故稱曲上乘首曰當行不然元何必以十二科限天下士而天下士亦何必各占一科以應之豈非兼才之難得而行家之不易工哉予嘗見王元美藝苑巵言之論曲有曰北曲字多而聲調緩其筋在弦南曲字少而聲調繁其力在板夫北之被弦索猶南之合簫管摧藏掩抑頗足動人而音亦嫋嫋與之俱流反使歌者不能自主是曲之别調非其正也若板以節曲則南北皆有力焉如謂北筋在弦亦謂南力在管可乎惜哉元羙之未知曲也由斯以評新安汪伯玉高唐洛川四南曲非不藻麗矣然純作綺語其失也靡山隂徐文長禰衡王通四北曲非不伉傸矣然雜出鄉語其失也鄙豫章湯義仍庻幾近之而識乏通方之見學罕協律之功所下句字徃徃乖謬其失也踈他雖窮極才情而靣目愈離按拍者既無繞梁遏雲之竒顧曲者復無輟味忘倦之好此乃元人所唾棄而俗人畜之者也予故選雜劇百種以盡元曲之妙且使今之為南者知有所取則云爾俠遊録小引臧懋循余少時見盧松菊老人云楊亷夫有仙遊夢遊俠遊冥遊録各四種實足為元人彈詞之祖每恨無門物色之後四十年而得仙遊夢遊二録於里中蠶嫗家校刻以行世矣又十年嵗壬子以採茶過夀聖寺此創自呉赤烏而重修於元之至正巨麗甲吾邑今皆為茂林修竹獨毘陵閣猶巋然於蒼翠間余登眺良乆忽豎子墜閣下云承塵中多藏書盡為蟲䑕嚙蠱如敗絮余念寺之廢久矣而閣獨存是書何遽不如閣耶亟命檢之則所謂俠遊者在焉讀其書校前二録小異而豪爽激烈大過之摹冩當時劍仙諸状若抵諸掌誠千古快事然其間脱落者十有二三不泥闕文之説輒為詳其首尾繹其意義倣而足之亦不至如束廣㣲補亡詩直用鑿空為耳昔魯恭王壊孔壁而尚書諸經乃出説者謂天之未䘮斯文故其藏也若避秦火而其出也應漢表章俠遊何物岀亦有時然則古人秘書所湮滅而不傳者固已多矣太史公作史記欲藏之名山而副在京師傳之通邑大都有見哉有見哉明文海巻二百二十二
