body:
  text: 明文海巻二百二十五餘姚黄宗羲編序十六著述律吕正聲序李維楨某不佞徃承之史館與修肅皇帝實録見鹽山丞王邦直上書言事世宗善之下所司無以官卑廢言稍為斟酌施行而其言多譏切時政犯忌諱卒以此拓落終其身亟問丞生平知為即墨人起家明經慷慨有大志耻冐謁干進歸而歎曰孔子自衛反魯正樂使雅頌得所今樂之失其所甚矣討論研索二十餘年而律吕正聲成自謂懸諸日月不刋之書也恨無從得見去之三十餘年丞里中人少司馬黄公開府朔方收其遺草鋟之梓盖公伯父嘗與校讐焉不欲使丞没沒無聞且負伯父師友之義而以授不佞序之凡數乙數讀而後竟其大致具丞自序中有圖有觧有制有義有體用有統㑹有經緯本圗書合先天參晷刻應躔次按之天度中星閏餘五氣八風筮卦縱横無所不符其要領則以黄鍾三寸九分取閩人李文利之說而糾其左律為右律之非三分損益隔八相生兩者殊科而辨諸家以三分合隔八求上生下生損益之數為律管長短之誤卓識獨悟通靈入微然亦倣吕覧太𤣥而推明之確然有據至于節候噐服八音之制歌曲之調參伍折衷最為精宻非以私臆索無何有之鄉謬悠荒唐而無端崖也古樂失傳自漢司馬遷魏杜䕫晉葛洪阮孚隋鄭譯唐祖孝孫宋王朴和峴李照楊傑宋郊司馬光范鎮蔡元定諸人勞若鑿空紛若聚訟當年累世不能殫其學于今得王丞而大學咸正罔缺少司馬安内攘外厥功甚偉復梓其書以成一朝未備之典後有作者莫能尚矣朱紫陽論樂之理載在禮樂記而惜無噐數可施丞說具在誠采而𨽻太常奏之明堂清廟翕純皦繹洋洋盈耳其于正樂功可不謂孔子之徒乎魯兩生有言禮樂百年而後興國家乆安長治閲四甲子太和在宇宙中而正聲始出夫豈偶哉不佞所私幸者束髮登朝侍教于君子久每言厯差而樂亡卒未有肩筆削作述之任者今老矣以秦晉之役讀邢使君厯考而為之序復得序王丞正聲庶不虛此生不虚此遊耳使君嘗語不佞律與厯相通而律不可為厯丞則言厯必由律作安得起丞于九京而大揚㩁之又聞東莞袁茂文著樂書有緒未知與丞指若何竊願緩須臾死以觀其成也唐詩紀序李維楨始黄清父紀初唐詩四十巻無何病卒而俞公臨竟其事益之為六十巻則又以為未盡一代之業乃倣髙廷禮品彚馮汝言詩紀紀全唐詩詩某萬某千某百某有竒人千三百有竒名氏若詩闕疑者五十人有竒仙佛神鬼之類為外集三百人有竒考世里序本事采評論訂疑誤稗官野史之說殘篇隻字之遺無所不攟摭合之得某百巻數年而告成盖其難哉不佞聞聲音之道與政通世隆則從而隆世汙則從而汙三百篇不可勝原苐言成周周以勤儉肇基其詩為豳愿而淳詳而中於人情文王文明柔順化行汝濆江漢其詩為周南召南婉而有致恭而不忒武成之際公旦相之反商政尊周道其詩為雅頌和而正華而實晏然而有深思東周王迹熄其詩為變風雅若板蕩怒而黍離哀去先民逺矣上下千年汙隆之故瞭然指掌匪詩何觀焉然而以詩論世易以唐詩論唐世難譚者曰唐以詩進士童而習之故盛士以詩應舉追趨逐嗜故衰少陵宗工曾不得一第右丞雜伶人而奏技主家于詩品何損也貞觀開元二帝以豪爽典則先天下詩宜盛而最闇弱者中宗能大振雅道即德文兩朝不及中晚人才樸遫詩宜衰彼元白錢劉栁州姑無論昌黎若山斗猶且服膺工部供奉而避其光燄何也古者上自人主下自學士大夫以及細民莫不為詩而詩盛衰之機在上後世細民不知詩人主罕言詩僅學士大夫私其緒而詩盛衰之機在下其轉移化導之力詎足望人主乎則唐與古殊矣樂八音皆詩詩三百皆樂唐人樂府已非漢魏六朝之舊時采五七言絶句長篇中雋語被絃管而歌之代不數人人不數章則唐與古殊矣六朝以上惟樂府選詩眉目小别大致故同至唐而益以律絶歌行諸體夐不相侔夫一家之言易工而衆妙之門難兼則唐與古殊矣先王辨論官才勸善懲惡于詩焉資其極至於饗神祗而若鳥獸善作者莫如周公僅僅可數他皆太史所采稍為潤色春秋列國卿大夫稱詩觀志大抵述舊而唐一人之詩常數倍于三百篇一切慶弔問遺遂以充筐篚餼牽用愈濫而趨愈下則唐與古殊矣三百篇删自仲尼材髙而不炫竒學富而不務華漢魏肖古十二三六朝厭為卑近而求勝扵字與句然其材相萬矣故博而傷雅巧而傷質唐人監六朝之弊而劌濯其字句以當於温柔敦厚之㫖然其學相萬矣故變而不化近而易窺要其盛衰可畧而言律體情勝則俚才勝則離法嚴而韻諧意貫而語秀初盛奪千古之幟後無來者絶句不必長才而可以情勝初盛饒為之中晩亦無讓也歌行伸縮由人即情才俱勝俱不失體中晩人議論多而追琢踈故無取焉初盛諸子啜六朝餘瀝為古選不足論子昂應物復失之形迹之内李杜一二大家故自濯濯要之不越唐調不敢目以漢魏况三百乎漢魏六朝逓變其體為唐而唐體迄扵今自如後唐而詩衰莫如宋或出於中晩之下後唐而詩盛莫如明無加扵初盛之上譬之水三百篇崑崙也漢魏六朝龍門積石也唐則溟渤尾閭矣將安所取益乎不佞竊謂今之詩不患不學唐而患學之太過即事對物情與景合而有言幹之以風骨文之以丹彩唐詩如是止爾事物情景必求唐人所未道者而稱之弔詭蒐隠誇新示異過也山林宴逰則興寄清逺朝享侍從則制存莊麗邉塞征戍則悽惋悲壮暌離患難則沉痛感慨縁機觸變各適其宜唐人之妙以此今懼其格之卑也而偏求之於悽惋悲壮沉痛感慨過也律體出而才下者沿襲為應酬之具才偏者馳騁為誇詡之資而選古㡬廢矣好大者復諱其短強其所至而務收各家之長撮諸體之勝攬擷多而精華少模擬似而本真漓是皆不善學唐者也嗚呼繇三百篇以來得失之林較然甚著公臨繼三君子㑹萃斯編如善相馬者雖千乘萬騎良駑可觸而辨儻以不佞言能窺一斑否贊公臨而校讐剞劂者新安吳琯雅能詩户部疏草序李維楨昔漢靈帝開西邸賣官作罼圭靈昆苑列肆後宫尚方歛諸郡之寳御府積天下之繒西圜引司農之藏中廐聚太僕之馬設導行費造萬金堂歛民田畝十錢名修宫發州郡材木文石部送京師西園騶分道督促恐動州郡多受賕賂百姓吁嗟黄巾董卓之變乗之而起朝臣諫者司徒楊賜太守陸康司馬直纔數人耳豈事固有大此者不足問耶唐德宗括富商及僦櫃質錢稅間架墊陌涇源兵反舉為口實然且貯諸道貢物扵兩廡榜之曰瓊林大盈惟李泌與陸贄數進諌而贄最力向後宣索秘無令相臣知泌終不言贄請罷相裴延齡極為忠懇而身與言俱黜於是和糴強取宫市白望羨餘進奉門户脚價横政滋多藩鎮強虜干戈相尋而國日蹙矣本朝靈長之祚萬非漢唐比上神聖寧可與兩宗比而數年來行事殊類之抑有甚者中官與市井無頼争言礦税率土之濵山童澤涸冢中枯骨暴棄相望雞犬細物負戴窮民無所得稅公私之積如掃三事九列以逮百司條奏利害汗牛充棟率報聞罷而中官用事者膽勢益熾小有齟齬文武督鎮之臣或戍或逐監司郡邑之吏卿大夫孝亷博士若富民大姓下詔獄瘐死者駢首天下重足側目盜賊麻沸而莫之省改也司徒陳公領部事以來前後章數十上明暢剴切凡數千萬言唇燥舌敝其渉外庭者十或得一而至扵發私藏損浮供停採榷罷中使如水投石不入矣諺曰借車者馳之借衣者披之漢靈之為帝也非所必得制命扵五侯十常侍之手姑自封為快而已天子厯數在躬纂述大命而不以天下闗其心何也德宗懲蒙塵之苦報𤓰果以官喜醉人為瑞孳孶聚歛縉紳中裴延齡盧杞之屬慫惥之其播惡溢於漢崔烈輩今諸文臣無是人也軍興無錙銖仰給也潢池㺯兵旋即撲滅勍者東倭西夏與播亦佹就芟夷上意驕而四方告變若災異謂是詗喝我耳益中距而不信臺省耳目之官曠廢不置宇宙以來未有伐山鼓鑄無所不及者皇陵皇都地脉斲傷而不惜元子年二十而不冠婚朝堂累瓦礫草莽而不顧苐為之號曰以資大禮大工云耳持籌握筭下同賈䜿非是物也食不甘寝不安仭積朽蠧殊不知將以遺何人乎情理不可以推求事形不可以測度至此極矣陳公其如之何漢唐臣主不大閡隔時造膝而進言楊竒因間譏諷靈帝優容之而泌贄則德宗所鄉慕委寄之臣也燕閒顧問導欵納牖猶能挽回萬一邇来宫府離絶上乆不視朝大臣如有陳公者不識何状又安能欽其德望察其誠悃而行其論議哉此必不得之數也中外言者誠衆不在其位要以一疏塞責茍成已名陳公任事之人與言事者殊科劌心疾首竭股肱之力無復餘方事不可任而至於言言不見聽而籍之豈其翹上之過為名髙小臣不引身則結舌大臣身係安危國同休戚何所逃之是草也倘亦知我罪我之意乎東京諸君入告之辭存者僅有獨李唐陸䞇奏議扵今誦之不衰公諸草大類贄所稱引儆戒惓惓以漢唐末造為殷鑒頼社稷宗廟之靈言不中耳讀是草者有賈太傅之痛哭流涕長太息而已矣新安文獻續志序李維楨程篁墩先生新安文獻志歳乆漶滅里人畢侍御孟侯更梓于京師㑹舘中京師之有歙㑹舘盖吳内史雲将首事舘成而内史續志以為程先生書成扵𢎞治庚戌凡二甲子有竒繼先生起者相望缺而不載責在後人乃謀於同志旁求大家故族鴻生鉅儒續葺之孔子曰文獻不足徵也文以言獻以人其人徃矣其言則存左史記事右史記言獻之所取徵者亦在文古列國史類如是今志分甲乙二集甲集則新安人所著文若詩為體四十自齊程郢州茂以下至明三百三十人有竒非新安不得與焉所謂文也乙集則新安人之行實凡分類十有五自梁程忠壮靈洗以下至明三百六十人有竒外郡人作者自唐姚常侍思亷以下至明可一百二十人而新安人不與焉所謂獻也亦新安之左右史已其大體次第準真西山文章正宗首辭命而以詩餘附詩雜體之後崇大雅也其人準梁昭明太子文選稱字朱紫陽註書稱官爵謚號而附見其名崇厚道也古全史中有志始自班孟堅志有藝文亦始自孟堅劉子炫謂一代之史何取當代之文獨宋孝王闗東風俗傳墳籍志所録皆鄴下文士讐校之司所列書名悉取當時撰者要以志載一郡郡代不乏人自有不得已者焉今志例用㑹稽掇英集成都文類法也古史之紀獻者自司馬子長始有循吏儒林諸傳而酷吏佞幸之類美惡並載班氏因之范氏始傳列女亦不必盡有女德盖史體宜然常璩志蜀郡廣漢犍為漢中梓潼士女皆賢鄉里小生禮應為尊親既名曰獻何可錯以匪人乃其不見采者隠然筆削之義直在其中矣今志例用華陽國志法也余又論之凡事作難而述易惟為鄉國志者作與述俱不易而莫難於新安新安山四塞兵革患少大姓或十餘萬人唐宋以來支系可考先世之遺善守勿失富者好行其德嚮慕文苑儒林雅道大興尤尊禮貴顯程先生而世列鄉宦承明金馬著作之庭有年其力既便蒐羅而所裁鑒一時人無異議度為此志當不苦難今新安文日盛即百工之技精麗甲天下好勝噉名凡一切慶弔事必徵文貴者賢者以張大之竹帛金石汗牛充棟邇來辭賦之業傳習彌廣徃徃撡野史權志以文獻稱誰自居於不文不獻即程先生在且未易措手吳内史之果扵續也壮哉能任怨任勞矣萬厯疏抄序李維楨今皇帝臨天下乆耆宿名德厪有存者守經據古危言覈論之臣投鼠噐探驪珠不安其位身且不免後進無所禀承紛然殽亂莫繇取衷而侍御史吳公毘陵世家賢胄練朝章通國體思以發末俗之覆取程先民㑹按部雲中上谷自公多暇乃葺上纘服訪落迄乎今兹凡諸臣封事若干篇數十萬言而離其目為五十其闗切君身者為首而總論諸政體若臣職若官邪若民隠分而屬六卿者逺而制四裔者次之而以上書終焉亦四十年中朝野得失之林也義興陳公方按河東陜西相與共校行之而授某序所以某俗吏淺聞不能究宣然四十年乘空乏之間充位具官耳目私所覩記大都有三變焉嘉靖末執政墨而善阿邑固寵羣蟻附羶濁亂天下自壬戌至萬厯凡十年而厯三朝矣代者或尚清靜奨恬退貴名理而空談廢實或輕喜怒急終更重意氣而太剛易折於是執政綜核名實繩下如束濕薪其知深而勇沉偵瞷者不得要領吠影射聲株連蔓衍其訑訑言貌距人千里之外其極惨刻少恩此一變也言路之塞塞在驕倨而專恣上益習國事不欲倒授人太阿柄執政無一介不取三公不易之節以厭衆望而懲驂乘前車都俞多吁咈鮮上既無所逆扵心見以為馴謹而時詘言者以徇之内不沾洽而外示包容強笑語相下中外章滿公車謹謝之以聞罷而已此一變也言路之塞塞在泄㳫而靃靡上乆廢朝廟郊講厭薄大小臣不即除諸署鞠為茂草奏入不答常十九而舞智御人者因以為利曰黙足容也諌愈磯也遇主於巻可耳麤翹不急為而静正伏言何在人不適政不間而格非心何日横政横民悖出悖入怨歸於天而下逃其責此一變也言路之塞塞在觀望而巧匿人心世道不惟逺不及洪永而亦遜嘉隆也毎况愈下不遡其源則頺波不可挽不縁其督則藥物不可投四十年中情偽微曖事勢鼎革按是抄而約畧得之于以轉移人心祛詖淫邪遁之害綱維世道歸平康正直之路良有藉頼矣我思古人忠愛無已反覆必聴則趙普之懐牘范鎮吕誨王拱辰之累奏舍已從人同心僇力期於共濟則歸登之附名崔植劉覃之更疏梁燾劉安世之交章多蓄前言斟酌時宜殷鑒柯則事在不逺則侯覇收遺文條善政吕祖誨趙汝愚集名臣奏議兩公之為是抄也意倘在是乎不佞病不任乞賜骸骨歸田竊比于隠居放言之義論其概畧如此老憊妄發知我罪我敢不唯命苑詩類選後序包節余戍湟中之明年丁未得友人所寄楚刻苑詩類選未及展巻雪涕欷歔嘆曰兹詩竟傳乎閲數百年而始傳傳又自余多難之後於乎信有數哉及展巻則大司馬龍山戴公侍御大别朱公序之簡端矣予尚何言然懼宋人蒐述之意冺泯而予又無以謝其刪校之僣可竟無言乎按文苑英華宋初降王之臣所成書凡千巻詩一類且三百巻自梁而後迄唐季數百年諸名家網羅略盡世無善本徃徃傳寫惟秘府有宋刻非校書掌籍官不得見或儒林之家間有善本又以巻帙浩欀望而却走故苑詩竟無傳予自壬寅歳在告居閒則取苑詩而讀之廼知其續昭明而成者也詩自梁以前備扵選梁以後文苑盡矣其部分類别亦祖選例夫兹二書上下數千年詩人原委脉絡繩系相屬豈不彚一大成哉特其所載采獵汜濫簡覈或寡廼因其部類剪刈繁蕪大率梁陳周隋間南北人之靡麗甚者晩唐人之纎弱者盡去之十可八九其魯魚豕亥亦稍稍校定得其詩三十巻凡三閲歳始訖事題之曰苑詩類選乙已之冬携以入楚屬校扵王龍田給舍屬梓扵何月梧太守未一月而予以奉法無状逮行旋流戍湟中矣烽燧之暇固未嘗一日不夢寐之廼兹竟傳者毋乃同好之意而文苑数百年所遭㑹其在兹乎予嘗見論者謂齊梁而下靡麗可盡刋削審若是則漢魏無支裔而唐人無本始耶夫以齊梁陳隋上遡漢魏則古風之變下沿唐人則又近體之祖彼其時隂何徐庾之徒比肩並跡傑然名家者無慮數十軰均之洽學贍才裂錦裁璧煜如春葩􅌺如颷起豈後世綴詞之士所能髣髴使其在建安黄初豈不能為東阿仲宣使其在唐豈不能為陳拾遺特其一時君臣習尚喜為綺靡駢偶之句媚思柔情類多脂澤鉛華然陳詩審音亦一代之風也勺藥桑中三百篇不遺豈非以政治得失世道汙隆因而致見者哉及觀唐之帝王才如太宗猶效庾信體詞臣之才如李白猶句句似隂鏗况其下者乎唐人效似率不外梁陳間諸名家非近體所從来者哉豈惟唐人宗右之其在當時即已標榜題品聲價隆貴故有吴均體有徐庾體沈約之稱何遜則謂毎讀卿詩一日三復徐陵之薦隂鏗則使賦安樂宫援筆立就此皆吐曜舒華煒煜一代照乘連城曽何足云廼槩謂齊梁而下可盡刋削此與耳食何異夫詞賦之學本属藝下世道淪趨波頺湍逝即使賈誼升堂相如入室已無復風雅之遺齊梁而下可復求備耶况去古日逺文多散逸兼以綜輯之家束于好尚若唐人李康成軰所輯選以後之詩有麗則集有玉臺後集今皆不可復見若姚合髙仲武軰以唐人而選唐詩又皆略盛始而詳晚季迨及宋儒品裁多主義理限局拘方百不能存二三故西山正宗所選詩賦肇自擊壤下暨韋栁不過數家數篇遂使歴代竒葩委置籬落湮没彌年㡬同朽壤斯詞林日以凋謝而大雅之所想望者歟廼兹詩苑網羅六代籠罩三唐武德貞觀間所不傳之詩所未聞之姓氏亦畧概見庶㡬博雅之士大嚼於屠門屬厭扵臠爼尚復有遺思哉於乎和玉隋珠世無完質㸃瑜粒屑即足為竒此予僣為選苑之意也雖然予扵茲選凡三感矣疇曩之暇謝病屏居枯槁山澤則扵採藥逰仙遁棲覧眺之詞有感焉既病起贅員身麗日月則扵侍宴廵幸應制之詞有感焉想賡歌於虞廷慕巻阿於周室謂可希覬萬一迺兹竄徙裔荒羌戎與徒則於媫妤明妃闗山隴頭之曲三致意焉詩非縁情而動感物而生者哉何近世作者徃徃戾性情而就景物殊失選意矣且予一人之身而所遭閒逸逹遇患難苑皆兼而有之非其所蓄富能然耶苑之不可以無傳也有是哉初唐詩序王格昔唐之有天下也其文盖屢變焉而詩因之故有初唐盛唐中唐晚唐之别學者多稱盛唐尚已而餘略焉余觀中唐以降雕章縟綵刻象繪情多浮靡膚露之詞乏古者雅馴之體絀而不取誠所宜也至乃初唐居近體之首質而不俚華而不艷其渾厚蒨欝之氣有足觀法者余嘗總括上世作者之家品其大較以為唐人斯作亦猶三百篇有啟周之盛賦有屈原之體五言有初漢之辭皆當變更之始為創制之宗譬諸天地初分百為未備雖風教朴野而元氣藹如也美乎樊子推言之也曰如池塘春草又曰如未放之花斯不易之論矣非篤好苦學心知其意何足以語此余故為序列其因以貽來者有所藉憑焉諸儒講義序劉􅊉程朱出而傳註多學者之至幸也亦學者之至不幸也盖嘗觀於貧人之稼矣佃田貸種汗血風日眼穿雲霓以期有秋幸而不為旱潦蝗螟之所妬公私逋欠之所分則粒視黄金顆視珠玉煑蔬藿以佐食力齒頰生香而有餘味是何也得之之難也又嘗觀扵富人之稼矣柙有牛庾有種耕有臧獲失之東畝收之西畝旱潦蟲蝗不能多為之侵築場納稼主人首領權量而已及其付之饔丁侑以珍鼎異品滿前疑於舉著豈辨麥稲梁之味是何也得之之易也今之學者何以異於是七十子之徒目不見載籍而斐然成章古人有老而後見完本論語聘上國始見詩之風雅頌適魯然後見易象春秋甚至乞扵鄰剽竊於市借觀於秘閣者其書之難如此故其潜心積慮力索強探一旦豁然貫通則沛然矣今則典籍愈多訓詁愈明而人愈懈未見有窺至理成大儒者以其道理易見無復體認精察之力雖三尺童子亦觧執䋲墨以議論古人其於身心懵如也况乎科舉之業得失之心趣之哉然則多書非學者之幸矣此編非諸儒之極至余愛其有益學者身心性情故重鏤焉非欲為傳註贅疣也後學劉􅊉序書五經白文後楊濬右五經白文知耀州進士王榖承吾檄刻以傳世者五經之文誠若浩瀚而先正鄭教授嘗以為周易尚書毛詩春秋左氏傳禮孝經論語孟子大小經合四十八萬二千二百有六字止以中才為率日誦字三百不過四年半可畢脩身齊家治國平天下之道盡在是矣然則有志之士尚鑒兹哉楊用修藝林伐山序吳伯與昔老子生扵周尚以不及睹古為恨况在今人然今人讀古人書梯崖縋淵望古遥集若夫脫纒觧糾更不難互相揚㩁平分案斷古之人與寸心自致矣楊用修先生茹古涵今其咳唾散落珠流而璘結郁郁盛哉兹藝林伐山特臕胲之一臠耳夫取材于山所由來矣山自五嶽而外如終南固一巨鎮其間異物之類不可勝原東方朔嘗謂百工取給萬姓仰足韓昌黎亦云架庫廐而銜瑩繡以此推之山何如䕶畜也夸蛾負而厝焉其事渺矣必若所稱從天作之竒而荒之相與刪繁剔冗開異蒐竒因以飲神瀵之水問仙鼠之名啖胡麻之飯餐栢上之露掀翻寳藏不由斧斤亦大勝妙哉故伐材者有盡伐山者不􅁨材盡在斯編歟盖其薈撮墳典以及仙經佛偈齊諧唐韻凡天地之紀人物之變與夫夭喬飛走法書􅃔尊茶寮酒醤之属盡從单詞片字中扢㝠搜元析疑正誤如此禹圭舜琴堯土杯居然千古法物不作耳目近玩昔孫處立嘗恨天下無書以廣新聞王右軍每問蜀中故跡以廣異聞大抵聞見新異是古人第一樂事彼謝氏碎金麗沙的爍瑯琊羣玉𤣥圃峥嶸方斯猶為渺矣此非讀書破萬巻其将能乎然余謂讀書正不易能箱盈石積膠黏作兒女子語書而腐耳即以用修之稽古批較不為不該正陽諸家詆訶而論難之如是編所載舉案一語猶可弹指何况天禄諸事在用修亦自言之矣曰安敢駕䇿古人借以耗壮志遣餘年耳夫吾黨亦何必為用修觧也要以秦漢而來經畬史藪榛蔓已極援引評擊窮秋毫之遁情開夏蟲之積瞶諸凡用脩所芟正而廓清者真可謂古人功臣不然徒以辨博而已遺其逺識靈心正似搜斷瓦零甋于鄴都遺勝曰此英䧺之極思也然乎哉而矧于執其一漏以為博物病也余又謂士當窮時呻吟經生語未遑他渉纔一適意勢灼名薫敝帚棄之徒重尤秦熖也奚為用修少游金馬晚戍碧雞百函俱發千古自命倘謂開山居士非耶則是編之傳豈但蓄德消鄙旃檀熏而芝蘭襲亦以指陳覺路吾黨之家山也仰止焉而寄其尚友古人之意爾逰山記序林大春始余恭朝紳與莆人戴子者逰竊嘗髙其節竒其氣以為可許身稷契也乃未㡬一麾出守尋入壺公舊隠闢世七洞天以居時余亦適歸臥東山不相接者數歳萬厯改元戴予乃自閩入廣過潮陽訪余數千里外相見甚懽止宿久之余或叩厥曩所自許輙張眸不言至談及登臨事則躍然而喜余因歎曰嗟哉巍巍乎戴君之志其在髙山乎顧山有不同有得山之趣者有狥俗之名者是二者不可不審擇也君逰半在全廣余今請以廣喻夫盤互嶺表飛來吳㑹者有羅浮焉其中有四百峰金沙鐵柱符竹萬松之竒是葛生之所宅也横亘於溟渤之中者有珠崖千仞汪洋四望瀚海之所環也以大漢之強而不能至突起西北纍纍若貫珠者其小金山乎其中有靈洲欝水郭璞之所望而慕者也翼然翔于吾潮之東者有鳳凰山也吟風長嘯聲聞八極昌黎遺蹟在焉睪然秀于吾邑之海口者蓮花峰也根連玉井影揷天河有宋漂泊信國之所陟以悲者也若夫東山雖蕪名勝攸歸其靈蹤玉檢猶有存者君如好逰亦何必遍歴五嶽窮五原陟醫閭踏賀蘭然後為適邪詩曰豈其食魚必河之魴豈其取妻必齊之姜又曰豈其食魚必河之鯉豈其取妻必宋之子于是戴子聞之謂余曰子言其契予衷乎因以逰山記一巻示余其所逰率嶺南諸巖洞如余前所云者盖十二矣惟東山未至遂命駕偕徃則見其竒峰凌雲幽谷產芝古柏千秋清泉四時令人輕得䘮㤀物我戴子又不覺爽然自失矣已復振衣絶頂濯足滄溟以及其所謂鳳凰蓮峰者而盡收拾指頋之中以為海宇之極觀備是矣乃其志固未已也猶将約余遍五嶽窮五原盡覧天下諸名山巨鎮然後返扵武夷重入羅浮歸壺公曲水而終老焉嗚呼君之志其真能樂山者歟其真得山之趣者歟世之同好者有能得吾說而存之其亦足以知君之心矣疑畧序林大春學必有疑哉明不至則疑生疑無以為也學不必有疑哉小疑則小進大疑則大進疑固所以求進也此皆有成論已彼立論者非故為是兩可之辭終于相牴牾而已也盖必斟酌于疑不疑之間以求其所謂的然無疑而後可者故告子不得于言勿求于心最長于無疑而獨疑于義之為外孟子日從事于審問慎思明辨之學若疑之不置矣至其距邪說以正人心則斷斷然必以聖人復起為不易吾言然則求聖賢之學者不但當知不疑為非是雖疑亦當知有不是者在斯可與進于疑也已晋江王恭知先生自㓜學及于優仕以經史所載聖賢之道問之思之辨之其有不得者仰之繼日夜終不自釋于疑也乃録其自著疑畧三巻以示同志其邑人丁使君序之意謂朱子當年未必自以訓註為是亦将以俟後之君子而先生乃能上下千百載間出已見與之辨析疑難固朱子之所取者其說備矣然余尚疑先生所以有疑之因意必自其無疑者致之及觀先生為人氣節挺挺不為世俗邪詖之態至蒞官表樹必裁之義以正人心盖得之學問思辨之功為多向使先生果于自是而不求諸心其于聖賢之訓自以為一無所疑則今之為告子之疑者又不知何如也獨惜疑進方殷未見其止充其志殆将求至于孟子自信聖人之地而後已者詎知業未竟而不幸齎志以歿遂成先生之疑于永世也豈不悲哉初先生以序属余余心許之及先生没而使君復以遺言請予因為之論著其指如此聊竊附于延陵季子挂劍之義云爾晝簾緒論序王㒜晝簾緒論宋括蒼守胡太初所著嘗梓行之以治七邑者也論凡十五篇合萬有餘言自盡已臨民以至審勢利逺嫌疑為邑之道大率略備誠有民社者所宜佩服而不忘也由宋以來此論乆不傳吾常貳守謝君庭桂近自京師得摹本以歸適進士何鑑來令宜興請刻焉盖治民之職令最難其下與民相狎而上統承于郡于藩憲于省部狎斯玩統承斯廢格不行加以豪胥黠吏夤緣其間投間隙以撓之譴訶汙衊百責攸萃使令非仁明修正敏辨而果斷而尤濟之以博雅行之以忠信欲望其成治功以追古賢哲是誠有難能者也此論凡人情所繫事機所伏民隠吏慝之所在蒐獵無遺盖與縣務綱目作邑自箴諸書相表裏太初之名不見於史傳其守括政績亦無考然即是觀之亦可概見其為人矣元祐中吕惠卿留守北京作縣法一書說者謂雖古今事殊而大體不能越恵卿小人之雄扵才者其叙述雖富然以法令居首教化居末可知其為俗吏其有愧於太初多矣今之為邑者果能究心扵是書玩索而推行之牛刀製錦之賢未可遽及其扵理劇邑如山隂晝日垂簾門階閒寂盖恢恢乎㳺刃有餘地矣明文海巻二百二十五
