body:
  text: 明文海巻二百二十六餘姚黄宗羲編序十七著述唐詩艶小序周詩雅今夫名園金谷寳砌瑶林稱華矚矣艶乃在扵夕露晨流新桐初引粉香㳫雜花氣披靡亦佳麗矣艶乃在扵苧蘿一嚬逺山一抹熊胹豹臛炙酒行車頗豪嚼矣艶乃在於軍持之中泠洞山之野馨何也艶未有不從清中流出者能以其清新者一變漢魏六朝為律絶而古風則仍其習排律又衍其波使不得初唐之一反漢魏六朝之為填詞已乆矣斯又氣運升降之微機難為俗耳說并難為作者觧也予苐近取其清者而艶在其中矣逰名園對美人御盛饌都向三者之外尋討是余清新之所寄也知我罪我吾何知或曰古詩言準而唐詩言艶得無盭乎嗟乎除却新機便是套本心花倐滅筆彩何傳反之吾心不相準何處再求古詩也準與艶皆以心言即謂古之準藏艶而唐之艶投準也无二也於是而選唐詩艶古詩準小序周詩雅詩何以準稱也準於古唐虞三代以前立言之㫖也古無詩而有歌有謡有銘有引氣厚而詞簡詞簡而景生如山之有恒華嵩衡焉如瀆之有江淮河泗焉如天之有日月星宿焉如載籍之有十三經而書畫之有鳥跡大小翮焉淺深曲直不論致鹹酸辛苦不論味青黄赤白不論色一以真氣為之淵雅停盖漢魏而下有古詩浸浸乎開風雅之門扇嬌艶之致矣且能以一字抵初唐人之一句一句抵初唐人之數百句瑰瑋磊落不瀠苛細新花驟發不留故態摸之無痕嗅之無氣舉我之曠懐千古血淚丹肝讀之而紙上噴出至若雲雨銷魂含意未申大都有韵而不奈形容有情而不能言説者得其一字可以廻想十日得其一句随爾眉眼欲語此無他氣至而古人之筆研心手皆靈即我之夢寐神魂畢活也此所謂一心生萬法萬法歸一心能令古人見我心又令我心見古人而詩準扵是矣非尺尺寸寸工師量材之說也於是而選古詩準宋元詩三刻序周詩雅今之言詩者首漢魏以及唐輒云其道大備至宋以後無詩矣非無詩也格卑氣弱世運使然噫此矮人觀塲貴耳賤目之論也今夫三家之村尚有人焉吸月吞風口吐㑹心之語詎以煌煌有宋之代遂之作者審聲按律筆操在世之權夫宋人詩之大不滿人意者因諸君篤于講學以致注訓入之八識田中故徃徃以誠意正心之譚譜入風雲月露之什其氣詁其色腐何怪好異喜新軰不借言力古卑今而自文其倦繙踈較之病也語有之但盡凡心别無聖觧去其詁氣而真者存削其腐色而新者露其又何患焉即如坡公山谷兩公蘇之犇流浩放黄之峭激嚴覈雜之于唐且踰晚而中盛矣何渠以宋迸之若臨川性即倔傲詩政不嫌扵髙深孤山目無古今意寧復知有晋魏是又可以宋而少之耶至於元則局少遜於宏遠性不碍夫靈通字句突生偏饒别響既不以宋而不采又寕可黜元於勿論哉嗟嗟今之舉口而蔑宋元者舉體具宋元局相不過啜標榜之猥語欺人耳可嘆亦可憐也予因有感而㸃定刋之殆有未可深言者在噫明詩選序周詩雅我昭代醇厚開基泰符昭乎星日厯聖文明持世天藻爍於雲霞蒸為運曰離鍾諸人曰賁故夫垂纓佩緌以及澤釣煙耕之軰無人不詩無詩不麗于運而盤薄以出之真足接武貞元大厯陋宋元于不足道雖然固不能無初盛中晚之别焉予妄論之此非闗世代也初盛豈盡不落中晚之蹊中晚豈盡不能追初盛之躅竊以為存乎其人其韻坦而平其神闇而深其脉靜且貞此初之徵也夫見為㳌渫而揚波則其盛也為磊落而英多則中矣至扵幽響鳴泉而自瀉寒鋩燭斗而孤騫斯末流屬之總之運授於元氣神氣之旺衰人情以喜情哀情之大概可觧于古詩訣盡之若一時興㑹之所至作者不知迨異日賞鑑之所加閲者剔出斷斷無足憑者也故從古之論詩者俱自寫胸中之詩而何與人詩即鍾嶸詩品古今稱絶其是非且為後世口實餘子更復奚贅焉我明首尊髙楊繼推何李以至厯下琅琊盟壇狎主迄今公安竟陵偏鋒自䧺論者亦嘗取以立正始中興之案予正以世代轉詩者也詩非轉世代者也爰搜諸公之全集以及書記之偶存繙獵㡬兩年而得如干首噫紕漏所不待言且首為鑒而彚為評是猶不免矮人看場之見要以鼓吹休明借人之賁而表聖代之離擊壌而歌嗚嗚以相和竊敢附野人貢謡之義云爾厯理發微序朱元弼徃余逰留都最善金陵張子近山者張子冥心内典而尤邃扵厯其術本之盖天謂天平如掌日月五星浮空而行渾天之儀制非古也推古驗今得七千二百五十七萬六千年為一元而以經世篇所紀元㑹運世之數為未盡其說與臺司逈異先是吳中有星川陳子諱瓖者精囬囬厯推歩春秋以來二千餘年七政交食躔離分杪俱合謂國朝所頒大統厯本授時厯以至元辛已為元迄今垂三百年其冬至先天一百三十五分當釐正嘉靖末上書闕下下禮官議為一時臺臣所齮齕寝不行至是余客婁東張子訪余遂得與陳子逰兩君子者傾盖抵掌如隔世相逢莫逆也因各出篋中帙互相印可陳子木訥淵思少辨才所出帙積數萬言若懸河不可詰古厯大都更八十餘家術皆順天求合隨時増減行之乆而不敝陳子盖契札瑪魯鼎之秘剖秒微定中氣無纎毫渗漏立萬世法程斯已竒矣張子盡得其學而明辨過之能發陳子意緒中隠奥其按羲和母子之法闡容成宣盖之微明天平如水之真形辨日覩如丸之虚状此又陳子所未悉也至窮厯理之𤣥昉諸易有太極而以太極為象帝之自命之曰函天地之體盖與兩儀四象八卦之㫖相發明且叅合竺墳法報化三身之說及道德内難等經謂無極所生帝象之生無非隨順羣生被機稱性羣生各具一太極與圓象之體无閡无别反末歸本在瞬息間此三聖人作易㣲意而張子契之超于厯家逺矣昔邵堯夫評洛下閎知厯法不知厯理揚子雲知厯法又知厯理張子未之許也余謂陳子知厯法矣若張子真可謂兼知厯理者其略在陳子厯理發微讚中余不及贅易頌序朱元弼夫易變易也經首乾坤首六十四卦也其上下非故分也自有此理不容易耳就卦而兩之原變而引伸之易理自具也即如卦約乾坤坎離渾身易位而反之者也大夫婦也水火亦无婦而不相射中男女耳皆非易之用也易之用特用其少長男女而中自在此有物之固然無足異者故上經用男每二卦上下易而反之至頥而男之用窮則變為女而為頥為大過下經用女每二卦上下易而反之至中孚而女之用窮則變而為中孚為小過上至澤風見而水火不交下至雷山見水火交而終以未交何也此既濟未濟結上坎離雖不言金木而終始無非金木易之所以為至妙至妙者歟故上經似經下經似緯寔一篇也上之臨觀下之損益卦體易位其一徵也或謂上用先天下用後天似亦得其概而未深言之者也余未敢以為然也頌之所以作也山居日輯序鄭履準夫人生貴適意富貴何為此知士之格言逹人之佳論也且百年之間如駒過隙而憂愁抑欝一半相妨風雨疾病十常八九光隂㡬何而衆患攻之此樂天所以發白日之歎也僕本鄙人生扵海曲㓜多美疢嬾業箕裘志學之年即侍親南逰金陵覧龍蟠虎踞之形勢覩王謝風流之遺踪六朝塵跡四顧凄然北覲神京見羣英濟濟黼黻皇猷冠盖如雲紆青拖紫而性本庸愚懶惰無匹竟乏思齊之志所以優游歳月無所成名然復觀近倖益慕前賢朝為将相暮就誅夷或聲名尚著東隅而身首已横西市或銓衡再掌未展經綸而囹圄一幽竟死縲紲其執㦸邉陲荷鋤畎畝死徙廢棄者不可勝數於是目覩神驚不求聞逹心耑志定決事漁樵矣庚申仲夏隨父南遷七日之間百口出京酷暑長途僮僕多病晝畏風波夜虞冦盜始信行路之難難扵上青天也今髙堂逸豫兄弟怡怡海甸澄清不見烽烟之警雨暘時若幸瞻禾黍之豐為堯舜之民藉父兄之䕃門枕流渠茅茨尋尺不羨茂先之一枝良田負郭租稅釡鍾殊勝留侯之萬戸聚逺樓前不啻千竿脩竹凝雲池􅆕奚止半畝芳塘一葉扁舟無勞稱貸奚童數指自足使令禦冬足於大布粗絺可以應陽四體不勤甘㫖自辦三省不疚愧怍相㤀取諸宫中有伏臘蒸嘗之費反之心上無富貴利逹之憂起居以時行藏自適佳辰美景皓月清風設㫖酒具山殽良朋玉立益友清談投壺雅歌吹笙鼓瑟或登髙逺眺或徐歩郊園坐茂樹臨清泉友魚蝦偶麋鹿忘機垂釣寓意奕碁心曠神怡陶然自樂恍疑身在清虚境界初不自知其為塵世中人也且門無俗客吏不征求獨坐書齋悠然髙臥竊比羲皇上人而好鳥調歌扵枝上蝴蝶飛揚於華胥竹韻琳瑯輕風入戶睡足之餘焚香啜茗覧竒秘之書探古今之奥凡髙人逸士所述所作理生治家之法養性行樂之事逰觀景象之美歳時風俗之盛與夫詼諧拊掌之書無不周覧心之所恱手即書之積之既乆所録遂多第分巻數名之曰山居日輯姑以存之巾笥自備遺㤀不敢獻之髙明以為談柄也春秋伸義序馬森春秋何為而作也孟子曰王者之迹熄而詩亡詩亡然後春秋作是春秋之經孔子因王迹熄而後作也誅亂臣懼賊子以正王法孔子之意淵乎微矣孟子去孔子未逺也其私淑諸人能得孔子之心印者即其厯叙徃聖見知聞知之實曰然而無有乎爾則亦無有乎爾可以見其自許非顏曽下矣其言曰其事則齊桓晉文其文則史孔子曰其義則丘竊取之矣此三言者足以破諸傳之惑矣秦漢以來言春秋者不下數十家大抵多祖左氏公羊榖梁三家之說然公榖在七十子後諸弟子所傳聞而授之與左丘明親見夫子自是詳略不同即左氏或疑非是丘明而為當時魯國史官則確也國史䇿書藏在太廟其簡牘本末孔子非由史官何能得見趙汸氏謂春秋一經出於史官先禀命魯君而後得成其事似非臆說今詳三傳獨左氏頗具本末事實然已不能無文勝之弊若公榖以所傳聞扵諸弟子雜之已見其所病又豈但亥豕魯魚之訛哉至於義例之論有求其說而不得者又託為變例以附㑹扵夫子之經因而後儒諸家紛然異同盖不能不背扵春秋之大義矣春秋大義尊王黜僣以律諸侯誅亂臣賊子以正人倫者也今經首元年春王正月公羊曰加王於正者言大一統也胡氏宗之則曰書元年者祖二帝明三王正次王王次春乃立法創制裁自聖心不知此元年者乃魯隠公紀國之元年實周平王之四十九年也以諸侯之元年冠周天子春王正月是得為夫子創制明大一統乎否也弑隠寪氏實羽父謀諸桓也經反書薨而為之說曰隠公見弑魯史舊文必以寔書其曰公薨者仲尼親筆也古者史官以直為職不諱國惡仲尼削而不書斷自聖心謂國史一官之守春秋萬世之法其用不同此非厚誣聖人以不道者哉許世子止親疾不嘗藥而書弑楚公子圍假問疾縊殺其君而書卒若非魯史舊文是何深刻扵許止而曲䕶扵子圍耶此可以例其餘矣陳恒弑其君孔子時已致仕猶沐浴請討况於春秋明百王之大法者乎此又可以仰窺聖人之心而知其不諱不宥之必然矣盖春秋之脩皆據魯史舊文而筆削之並未有特筆變文以増改扵其間也其曰筆者言因之而書也其曰削者言去之而不書也若外加筆削而又増改於其中則與孟子其文則史之言異矣其曰天子之事者非以褒貶予奪屑屑焉扵事事求詳而托為命德討罪之權也以王者政教號令不行於天下禮樂征伐皆自諸侯出故因魯史之文竊取其義以正其失而明之使知有百王之大法焉耳至謂知我罪我云者我謂我衆人也言天下後世之善惡者讀春秋之所善所惡若美我刺我者也故曰孔子成春秋而亂臣賊子懼惟知我罪我故懼也若如後儒之說則孟子又自與其文則史之言若相矛盾而孔子亦必不曰竊取以嫌於僣耳今考經所載朝聘㑹盟侵伐戰争兼攻取侮之類莫非列國之所謂事也編年以著代紀時日月以敘事録列國文告以登諸簡筴莫非魯史之謂文也有詳略異同有書有不書者有彼善扵此者或據事直書而義自見或屬辭比事而義因以明則孔子之所竊取者也是故以此求之於心而不必鑿之扵文以此攷之於事而不必泥之於經信其所可通闕其所可疑以經證經而不屈經以伸傳以傳證經而不屈傳以伸經則庻㡬於經可以得聖人取善之心於傳可以知聖人所以取義之㫖春秋大義燦然可求諸家紛說抑亦少訂矣某也鹵莽之學猶在靣牆未洗心滓固知寡陋不足以上探春秋微奥而低昂乎衆說也竊自登籍之後曽兩乞身臥病林間耽玩墳集掇拾諸傳參考見聞輒自紀録今厯有歳月漫成篇巻名之曰春秋伸義盖取王仲淹氏論述作而曰吾於道屢伸而已之義也極知謬妄無所逃罪或縁管蠡一得之愚以俟後之君子冀能味醇醪於糟粕中焉耳元城語録序董後亨元城先生當宋哲宗朝髙節閎議能令權奸膽落間關新恩瘴癘間頻死弗死晚年居亳士大夫相謂曰過南都不見劉待制如過泗水不謁文宣王歿纔二嵗而髙宗南渡宋遂不支然則去就存歿先生盖宋一代安危所係非僅僅取直名去者也而朱文公名臣言行録不載先生殊不可觧及閲宋史然後知文公所以不録先生者大都有三盖先生嘗上疏論程正叔且與蘇文忠交好又好談禪文公左袒正叔不與文忠至禪則心薄力距以為寂滅之教者以故不録然周公留相召公不恱㳺定夫胡康侯皆大儒亦與秦丞相善正叔豈過周公文忠豈不及秦丞相哉先生寕至不得從召公定夫康侯後議從末減耶至談禪一節則先生逺竄嶺南時意非絶欲鮮營不可故稍覧西來語有慨于中以外薄世縁内完真我夫用之忠君孝親不用之離類滅倫用之禔躬飬性非用之立教貽訓正語所謂正人用邪法邪法亦歸正者奈何目為異學而令不得與韓范文富闗濓伊洛琬琰千載耶嗟乎寃矣寃矣予待罪天雄天雄即先生故里間召故老問先生墳墓已前化為烏有問及子孫則不知何許問及祠宇則湫隘頺廢僅遺像存耳余因低徊乆之最後乃得先生所謂盡言集數卷并語録三巻行録一巻者受而卒業盡言集本頗善語録輯扵馬大年行録輯於崔子鍾為觧者所壞且多魯魚之誤余暇乃即其觧正訂其誤稍掇遺事附其後而列本傳于首命外黄令刻之蘇文忠嘗上疏神宗朝乞校勘陸宣公奏議當是時神宗求治太鋭信任非人故文忠縁此感悟神宗神宗不用卒為臨川所誤醸成靖康之禍今之時世視宋未諗何似而先生師司馬君實傳陳瑩中學自不妄語入或于宣公無不及其於近日士風人才尤對症之藥詩曰髙山仰止景行行止雖未能至心殊向徃之吁予于先生盖向徃深矣王氏易序孫宜孫子曰世有言王弼何晏祖尚老莊卒之亡身而禍其國者予讀王弼周易注嘆曰善乎弼語簡而義明思近而觧切要之逹隂陽之故審變化之㫖識乗應之文該爻象之妙其所述大不詭于聖賢而絶無渉乎老荘晋魏以下勿論已程氏傳最稱的源乃其善者於弼取資焉其稍異弼者特敷衍厥辭加詳婉耳夫時有古今人材因之材有古今著述因之是故兩漢之去古曹魏之去漢俱稱未逺風氣近厚箋觧疏注之士即其聡明性識較之後代固自弗倫繼漢而唐抑亦逓相崇減理在可知故宋儒之闡明道學釐定經術由今品焉誠已超邁逖絶者然漢唐諸子若馬鄭王何元凱安國頴逹之流未必咸無所得是以禆宋之全也弼易尚己徃余覧何晏之奏曰善為國者必先治其身慎其所習所習正則其身正不令而行為人君者所與逰必擇正人所觀覧必察正象邪心不生而正道可宏也此其言又豈荘老虛寂放浪者倫歟夫弼晏論著若此在當時後世徃徃以二氏目之至謂流禍闗世教罪之為離經畔道者盖魏晋之俗大率以風流酣暢相髙跌宕不檢而二子行亦未免焉斯其故必歸之耳然言行殊途君子于言也㒺以人廢仲尼固已云矣謂弼晏著述類其行者豈非厚誣哉或曰兹宋儒之說程朱所嘗病者夫言而程朱也亦不足當歟孫子曰六經者大道之載而天下之公也天下之公噐則當用衆之公言釋之故仲尼之刪定贊修也要皆憲徃聖之遺而酌前哲之善未嘗不出于已而假以自異也其言曰述而不作信而好古竊比於我老彭後儒訓釋悉罕達此掠美而私長取同而棄異槩之不揆諸道而惟以其人其時謂無足尚廢之兹何也挾其勝也夫程子之觧易也其于弼之言用之幾什五六矣至其教人觀易輔嗣翼之介甫三子首焉而朱子者述其說為訓非有見于此哉或曰弼言簡切明近善矣質諸聖人之意未必審若是也嗟夫仲尼之門游從者三千焉深扵其道七十二人夫七十二人者朝覿而夕覲面命而口傳者也今考其得所師之精藴而言動悉不戾于厥真者㡬人哉仲尼嘗曰回也其庻乎後儒且謂顏子未至聖人猶是心麤夫朝覿而夕覲靣命而口示也其所得卒若此末世諸儒之生去聖人千百載乃欲以流傳之徃言臆測之獨見而望其悉得聖賢之秘有是乎故觧釋牋䟽之法要之在模倣正道而恊于大義者也夫誠能模倣正道而協於大義則雖徃意前致不必咸中而亦思過半焉詭凑曲合字軌而句泥之斯其術不足明聖茍以増紛亂之失長穿鑿之風己爾奚益乎奚益乎故弼之注成已如所議矣乃程之觧也即曰深明易道視仲尼之的㫖本趣亦豈敢謂其盡若所述乎執此盖可以論弼云易凡六巻予徃讀而善之因手録上下二經他日将刻以傳焉而題曰王氏易三禮考註序孫宜昔周公制禮作樂用昭王治紀載條述于是有書今之周禮是也六經之遭秦火斯亦與焉煨燼既餘散逸漫漶莫可尋理漢河間獻王得之乃闕冬官一篇千金弗購劉歆氏校中秘以考工記補冬官之闕及元而臨川吳澄謂冬官特淆錯司徒中他四官中未嘗亡也牽合附㑹出而足之自大司空小司空至司稼五十三官皆司徒官也自職方氏至六官皆夏官也自司氏至薙氏五官皆秋官也又謂地官之文多在春官故今所定自大司樂至典庸噐十九官皆春官也自訓方氏至諸子四官皆夏官也而所存司徒本官惟州長至舞師十一官云而大司徒掌建邦之土地之圖之職既以歸冬官矣于是自以意見補之曰掌建邦之教典繼以施十有二敎以保息六養萬民以本俗六安萬民正月之吉布政以鄉民八糾萬民歳終致事不可入司空者即仍厥舊焉又天官以下四官亦率殽雜弗倫于是以春官之内史外史至眡祲十三官以地官之司禄一官以夏官之司勛司士二官歸天官以天官之司裘内司服至女祝十一官以夏官之節服氏至小子六官以秋官之大行人至朝大夫八官以地官之封人至􅐪人六官歸春官以秋官之銜枚氏至貉𨽻七官歸夏官以地官之胥師至胥四官歸秋官于是周禮稱成書云孫子曰六經者聖人之書也其條理倫脊必有妙致遭秦燔燬僥倖僅存然亦什一云爾全書既亡湊合掇輯之餘厥倫紊矣茍非有聖人者作則曷能是正而詮定之以復其故乎而學士大夫淺窺偏據妄意改定即陧杌自擅謂得的原此豈非厚誣哉此豈非厚誣哉昔孔子之定六經也可者存之不可者去之務合於道已爾不必其皆存也不必其遷移竄易而后定也今之學者于六經固非敢以去取若聖人然其可從者從之不可從者仍之斯亦用以用世也矣必曰如是如是而可則安知聖人未亂之全書果即所定否也夫其深舛至訛固已勿論一有不合罪則奚辭故聖人之學守經以逹變而已後世儒者不求諸聖人之變而惟已焉師泥滯執抝斯所以膠固一隅而莫通者也且澄意以謂冬官之文雜五官故取五官之類者補之謂五官文互雜也各取其類補之此誠巳辨矣然稽之于理言無定衡惟人所主義靡恒適視我所偏是故六經之言尚己後儒茍欲穿鑿附㑹強斷已意則周禮之書即一官一職孰不可以遷移竄易彼此相通者也而奚獨澄今所云然也夫天官冢宰之職内及宫壼膳羨謂有深意此固臆説虚辭無可稽証何則閨房掖闥之禍奢靡服食之淫茍一魚爛癰潰未聞宰相能制之者周公聖人也其見獨不斯及耶而為之制乎故曰臆者此也不然則安知他官之形似交錯若澄今所改易謂某官類某某當以某属者非聖人制冢宰掌錢榖渉宫閫意乎澄乃扵其臆說則信服而不能少議而他未嘗有辭者刪定紊亂惟厥己見此曷故歟而况復有所難觧者六經既遭秦火己書則伏生之口授孔氏之壁藏詩則毛公之小序大抵非厥本初至若儀禮十七篇禮記四十九篇皆漢儒揣摩量度文以已意假以仲尼為之先生之制盖略有見於是云要亦不可倫次矣澄取戴記補儀禮取曲禮為之觧破碎決裂曰禮之全經盡在于是孰據乎昔杜祐之為通典也凡祭祀郊社亦私採摭諸禮言編排秩敘以為之準不知孔子之聖猶曰夏禮吾能言之杞不足徵也殷禮吾能言之宋不足徵也其用禮惟從周惡生今而反古者矧夫末儒淺學取燔熾灰靡之餘文師心任見欲以律徃古而例當今不亦難哉不亦難哉或曰周禮聖人治天下之遺法也後世制治者師焉是故茍有為是正刋定若澄者流猶足備一王之制借以詔天下而俟來聖不然即欲師倣行之亦莫尋厥緒矣夫澄豈得巳者哉而予以為任法之善不如任人今後世有興治者即周禮殽雜弗究彼猶能推其意因其時别其類行之成一家治否則以周公之制文武盛治之餘成康而下不三四傳而已廢矣澄獨能以一已之臆合而係後人之觀聴哉是故聖人之學神而通俗儒之學拘而滯惟通也故殽可也惟拘也故必變有所不變則窒矣故必就有所不就則泥矣是書周禮凡十七巻予尚欲取其可以遷移謂不獨如澄所易者别出之而未遑也若其訓釋簡而明致而不鑿要不可以盡廢云三禮纂註序宋儀望予早歳從父師問三禮同異因臆嘗所辨說周禮一書自漢恵除挾書乃有獻周官五篇其後向子歆得之遂以考工記補冬官而不考載官名自歆後賈鄭諸人争相校讎用力愈勤而大義愈晦宋程朱大儒雖嘗亟稱然未有折衷迨元臨川俞氏以周禮冬官雜在五官遂黜考工記更補之王吳丘三氏復増訂焉余竊謂考工記特記語耳諸君子莫究所屬併其名缺之然則輪輿桃冶弓車廬梓諸人果官名耶自髙堂生治儀禮而誦習者五家而戴氏又傳禮記四十八篇其義多孔門諸人相與發明元晦㓜清欲以儀禮為經禮記為傳以今攷之周公法天制禮如郊祀宗廟朝聘㑹同禮莫大焉皆亡逸不可考儀禮止士庻人而王制月令明堂等篇又雜出傳記中其義舛缺弗倫後之儒者掇拾扵煨燼互為剖析而聖人微辭奥義欝而弗章闇而弗暢盖三禮之晦久矣予後以御史在告吴人王應電避難南游因挾所註周禮以從嘗徃來恩江輙相摭難上察天文下攷地輿中定官制謂周官止五篇後儒攢補非是乃按天文作冬官演義其用力既勤而持論甚髙士大夫争敬信之予謂諸經當漢時始出詩殘書缺禮壞樂崩非孔子刪定本㫖歆去漢惠又百餘年冬官亡失如山川邍師虞衡等職雜在别官明矣王子頷之予因作讀周禮說其略曰昔在文武創造方定禮樂未遑周公以叔父位冢宰輔㓜主朝羣臣爰稽唐虞監于夏商乗時竭忠更定法制故六官周禮作焉盖嘗論之王者父天母地代工宏化責在三公故首立天官冢宰居之有生林立教養是頼故次立地官司徒掌之四時更運天地以成故宗伯掌春司馬掌夏司冦掌秋司空掌冬六官既立百度乃貞故經禮三百曲禮三千於是大備此明周官典禮非相為二也攷之王制冢宰統百官制財用故自王朝王宫王内事㒺巨細職兼崇卑厥惟統握而六卿三百六十屬皆受成焉王者不私盖藏故外府内府王府非稟于冢宰莫敢出入焉宫中府中俱為一體故内宰主内宫正主外凡厥細𤨏皆得總轄焉其為慮逺為義深冢宰之職於斯為大地者配天者也司徒掌邦教定民數興賢能宏敷式和厥功並焉斯地官之義也宗伯以下各率其屬宣欝導和以贊助元氣雖佐理各殊而體統流貫故觀扵六官六職然後知周公之聖與周之所以王後人攟摭疑似不悉聖人精微之義輒以已意妄加評駁是所謂遺神髓而弹皮毛也時王子見之願為更端未幾還吳遂歿去歳冬予行部宣州㑹東平守貢君安國出厥考翰林汝成甫纂註三禮示之儀望紬覧連日至㤀寝食然後知貢君于古人微言奥義多所發明而折衷更定決自胸臆如云以天官之卿考五官之卿以六官之卿考六官之屬事以類從官以職别斯其義雖周公復起不能易也至於攷儀禮補傳義正禮記而又更定王制諸篇以備二禮遺逸斯又其獨斷也自歆向父子以還考三禮者衆矣有能總挈衆論更立體要如有用我執此以徃如太史公所述豈可少哉宣守東莞陳俊雅志好古願亟刋布之東平君乃走數百里索予為序嗟乎古之聖人上下一體君臣同心其彌綸贊助如心腹手足共相營救故六官分職百揆時敘王中心無為以守至正嗚呼斯成周之盛也非周公其孰能成之或謂貢王二子於周禮奚若予謂二君皆能以吾之心究聖人之心者也惜也一二同異予欲與論正者已不可復得矣雖然予又安得以是病二君哉讀伯夷傳徐應雷太史公列傳首伯夷其所稱青雲之士何人也今驟讀史記者将謂巖穴之士趨舍有時若此類名湮滅而不稱歟夫古之遯世者若焦先羸孫登黙仲長子光瘖豈不甚矣哉皆無家属絶人事並不廢身前後名則豈有抱竒巖穴而名湮滅者耶又将謂砥行立名者非附青雲之士惡能施于後世哉夫砥行立名者青雲之士也其附青雲之士者非青雲之士也又何砥行立名之有已矣哉盖吾未見青雲之士也世人不察猥以仕宦富貴者當之楊用修曰青雲之士謂聖賢立言傳世者孔子是也附青雲伯夷顔淵是也後世謂登仕路為登青雲謬矣楊用修之言辨矣且以楊用修之言辨之不若即以太史公言辨之也太史公固曰富貴而名湮滅不可勝數何為砥行立名者翻附之以施於後世乎且又不若即以顏子辨之也夫季氏魯上卿富于周公顏子當附李氏而益顯東家丘焉足為輕重乎且又不若即以伯夷辨之也夫齊景公有馬千駟附之者且當不朽而何以民無得而稱焉翻不若伯夷叔齊之餓哉此固不足辨而世人開口輙以仕路為青雲以仕宦富貴者為青雲之士乃至臨文亦然是故余聊復辨之雖然太史非沾沾以孔子為青雲之士而伯夷顔淵附青雲之士也太史公不云乎周公卒五百歳而有孔子孔子卒後至于今五百歳余小子何敢譲焉故曰聖人作而萬物覩正義曰孔子沒後五百歳而已當之故作史記使萬物見覩之也得之矣彼直自任青雲之士諸名在列傳者皆附青雲之士也故借孔子以自見斯其為太史公哉雖然太史公沒誰為青雲之士太史公之後若李元禮孔文舉有位者也郭林宗無位者也其齒頰臧否並儼然操華衮斧鉞之權可謂青雲之士哉雖然匹夫有志必不肯附之以成名是故當自樹立耳必欲附所謂青雲之士者必不能砥行立名者也是故汜毓清静自守不畜門人彼知附青雲者之非青雲之士也而所謂青雲之士者必非齒頰臧否之謂也夫李元禮孔文舉郭林宗豈能以齒頰臧否操華衮斧鉞之權三君子皆扶樹名教而青雲之士也吾以為三君子又不若孫登之默視一世而獨與嵇康言然三年而始一言仲長子光之瘖而獨與王无功對酌酒歡甚其為華衮斧鉞最嚴其為青雲之士尚奚疑今不能黙且瘖又不敢齒頰臧否而又不能撰史記則如之何夫立言不如無言而又不能竟無言無多言耳矣明文海巻二百二十六
