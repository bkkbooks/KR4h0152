  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0152_WYG_227-1a, image: WYG1455/WYG1455-0535a.png}
body:
  text: 明文海巻二百二十七餘姚黄宗羲編序十八著述四書疑問序曹于汴或有問於予曰吾讀蓮勺史先生之疑問而竊疑焉夫先生積學功邃神遊於孔曽思孟之間黙契道真何疑之有吁此未知疑之不可無也孔夫子自述云四十而不惑是其四十之前何嘗自謂無惑儒者四十之後尚未可當夫子四十之前動云吾既知之矣居之不疑是何其謬也善哉乎先生以疑自居而長安諸君子復有未能信未能疑真疑真信之惓惓也疑則問問則成其學學則信然則既信矣當無復疑乎是匪可易言也虞帝之聖奚啻於信而問察之好不置夫豈自處了了而故為是諮詢也夫子年至四十而已不惑矣而假年以學蘄免過之大者又豈自信無過而求免也世人謂惟聖無過此殊不然到得聖過轉多耳譬百里之侯不任咎於封外天下之宰詎委責於遐荒故彼能是是亦足為一長之士也聖人而有足時乎不足則不敢駕言信烏得不問且學也是故讀四書者疑焉而已讀疑問者轉疑焉而已伯玉未五十時幾不覺四十九年之非儻亦嘗自疑也而不憚於問也乃克自覺乎夫學難於有覩而有覩非可盡學也疑以生問問以成信轉信轉問沒齒焉而已矣則兹編之所開者宏也余不敏叢疑如織當圖航大海之津陟華嶽之巔摳衣請問矣重刋五音篇韻序徐熥上古有音無字出諸口者皆天地之元聲也自羲皇畫卦倉頡造字制既立矣音斯附焉字者音之形體音者字之名稱類形始於許慎而慎生於漢世去古已逺其所訓釋不無牽合之病至於玉篇諸書則祖説文而潤色之惟王與秘之五音篇海分其畫段則字無遺形類聲始於沈約而約産於南服間操吳音其所分别不無割裂之病至於廣韻諸書則祖唐韻而更置之惟荆漢之五音集韻隨母取切則字無遺聲此形聲之大較也然箧笥嚴扃匪鑰不啓形聲無窮匪法不通有司馬公之指掌圖韓彦昭之三十六母勝國安成劉士明之切韻指南國朝沙門真空之貫珠集挈領提綱開示門法求聲音以歸母考偏傍以入部字得韻而知韻得字而顯則凡大而典墳丘索經史子集三藏十二部之文以至稗官小説重譯方言如恒河沙未可更僕者無不探賾索隠鉤深致逺畫無亥豕音不聱牙還天地之元聲開萬世之襲韻教闡同文功匪細矣此書流傳既乆梨棗漫漶沙門如岩者朗質觀空精嚴戒律曩朝落迦得傳斯訣與支提寺僧真燦者發大誓願期鍥此書積之八年始克竣事可謂有禆教典矣熥根器朽鈍識不反隅驟加披閲茫昧難明岩師矜我愚䝉詳譯屢譬匝月之後漸見一斑乃令不慧片言行諸簡首夫畫前有易教取先天有相皆虚禪宗秘㫖故毘邪杜口開不二之法門摩竭歛心啟無言之津筏葢聲音俱屬浮塵文字同歸理障則三蔵之文皆如來之幻迹羲皇一畫綺語之濫觴矧辨清濁審浮沈出入於口耳之間精研於指掌之上其於西來之指何如也昔蒼頡書成而鬼為夜泣悲混沌之己鑿世與道而交喪耳岩師賞予之言遂書於篇端楊忠烈實録序李長庚人臣為國家建持大議規利除害惟其言之得行也所為者大所損者小大者子孫黎民小者一家一身也而所謂行者有行于當時有行于後日行在後日何必當時故忠臣不難以殉身者一時之禍而竟以志酧者後日之行此其苦心原為國家千百世治安起見不以一時之禍福升沉計也彼喜同惡異慘心毒手此内璫之常原不足惜其幸明者謂天下之良心清議在也國家不患刑賞一時之倒置而患良心清議一時之不在斯民夫刑賞出内璫一時之熒惑耳若使良心不死清議猶存則上者抗之中者亦不之附也舉世不附則璫止一人而已其何能逞况抗者懼禍太烈不附者禍亦輕何難為焉乃楊公一疏初上之日人心羣然是之及見被禍則指為激漸而指為非且下之石明以為非者或迫扵一時之勢而暗非者則并其五夜之心平旦之氣亦化而見以為真非天下事至此可勝慨哉兹幸乾坤在御隂翳潜消窴璫扵法盡反所為寰字再覩太平而郡守胡公下車之日先為傾嚢贖宅綱紀其家輯忠烈録而梓之俾公心事曉然于天下一郡之内而前有李夏後有胡公能從患難敵彊禦以救忠巨尤人所難者一時刑賞頼皇上而正良心清議頼諸公而明矣議者又謂今上躬不世出之資逺軼堯舜堯舜在上古之世洪水之災乃開闢以來山川未濬所留之害非人有意為之也舉世之人莫不以洪水為當治也未有一人出而謂洪水之當行者至于今日羣然奉洪水而揚其波皇上一人不動聲色而除之此其天縱聖明千古無兩一切褒嘉咸出獨斷申以特諭可謂千秋殊恩盖楊公之疏初猶疑其太過及内璫之毒烈日甚而後公之疏始騐初猶疑其難入及皇上一一見之實政而後公之疏始行人臣遭時遇主豈必盡在生前公死而得皇上知之行之公不與逆璫計恩怨不與紛紛者争是非獨頼皇上為知已公不可謂不遇矣其前後疏恩㫖詳在録内此書行公扵九原下稽首拜恩起且掀髯而笑此一腔熱血不空洒圜扉也胡公諱繼先李杜詩通序朱大啟海鹽胡子孝轅于學為博物聞當世之畧起家孝亷領州牧方知敭厯遽遂初衣時時著書斯以勤矣㑹今天子詔仿古公卿各舉所知儲文武兼才牧民禦冦之選余備員廷尉職得薦吏輒表副側席之求時戎事孔棘大司馬察茂才異等夙諳邉務者将擢以不次齮齕者顧尼之不竟其用而余亦懸車歸老山居多暇每有揚㩁時過從相驩甚一日出手定李供奉杜工部詩集示余且謂李杜大篇寄意深婉何可不為通故于舊注間參而伍之務探其原委復為之臚次其體佐以評隲語無弗衷盖胡子有三唐五季詩統籖之輯析名搜逸懐抱筆札者積二十年而後成而于李杜詩尤加意訓纂将謀諸梓命名李杜詩通屬余書之以序序曰胡子曷為乎有通也詩有魯故后氏故韓故繇來舊矣陳隋以降詩至唐則已極大抵體無弗具而人登作者之林又何限也然必自李杜勃興而乃大備李注有舂陵章責兩家杜注有原叔次道軰二十五家徒剽口耳之學揣摩得之徃徃逕庭者盖不能貫穿羣冊攷當時身世遭遇之槩得其指事陳情有合于風人美刺時政之義欲劑量前人逺矣彼古采詩之官微言喻志知得失而觀盛衰抑何歟嘗論李杜兩公自開元天寳之隆迄于至德大厯親罹兵火䘮亂之世太白流離坎軻浪迹縱酒逰覧行役懐古之什為多然百憂萬憤畧見升沉之感子美懐忠仗莭羇旅間闗奔詣行在慷慨悲惋一寓于詩至今艱棘虎狼之惨與夫生民被毒螫轉溝壑可愕可憫之事慨然在目意授于思言授于意其心悲者其音眇其憂深者其詞悱憫而温厚吟咏寄言之餘骫骳紆軫在以意逆故夫注書之家如裴松之三國志陸登劉昭兩漢書劉彤晉記劉孝標世説酈道元水經冀廣異聞掇竒補闕以名扵世至扵箋詩集者是在旁引載籍托緒造微多發㫖趣也君子立言以垂不朽箋雖小道而以割昔人名誠非易哉善乎胡子之為通也如豫章行别録所載古白楊篇陸謝諸作皆傷離别惜景物考豫章漢邑名太白在廬山受永王璘辟及璘潰鄱湖坐繫尋陽獄並豫章地以白楊榮落豫章自况用志璘之傷敗及已身名隳壞之痛蜀道難梁陳作者止言其險太白兼采劔閣銘用之為恃險割據與羈留佐逆者著戒非為嚴武與章仇兼瓊而作他如蟾蜍薄太清謂賦長門悟主是我事以當世相如自負古風六十篇十二言仙九言游仙譏𤣥宗崇尚𤣥學多借秦漢為喻自謂神仙可致聊抒曠思皆為昔賢發覆杜之荆南述懐為房琯之貶因諸王分鎮之畫深中肅宗之忌中間磐石圭多剪為琯建䇿原凶門轂少推又若為琯自将咎其漢庭和異域晋吏坼中台霸業尋常體宗臣忌諱災等語若白琯去位始有和親囬紇事國體損而忠臣以忌諱斥矣宛轉為琯湔雪明已之救琯去國未為失也子美生平出處莫備于斯篇寄劉使君伯華敘其先世系是劉憲後人憲仕天后朝以推按來俊臣貶俊臣敗轉鳳閣舍人故云推虛捎魍魎丹極上鵾鵬景龍中憲選直修文館學士時文館寵賚甚盛故有雕章五色筆紫殿九華燈宴引春壺酒恩分夏簟氷等語賀沈東美除膳部郎詩内稱沈為通家又有禮同諸父等語証以太平廣記注東美詹事子與子美祖著作同官修文皆本史傳溯譜系至若麗人行紀楊氏諸姨與國忠同逰事哀江頭一箭正中雙飛翼之指貴妃破向來射雉諸說吾聞楊子云依仿聖籍好之者以為過於六經然則胡子之通豈不功昭于風雅江河萬古長流使李杜而沒則已李杜而不沒斯編其可廢耶本古律異巻迨曾南豐始就李集攷其先後而次苐之黄長睿復用東坡之說于杜集亦隨年編纂胡子務整齊之以類相從明别體要使人犁然有當扵心夫唐興盡一生之力于詩僅偏工獨至李杜以英絶一代之才併兼衆調倘汎濫諸家要扵歸宿亦鎔鑄各體集於大成是則胡子讀書之法也余因而有慨焉詩能窮人夫貧愁滯㽞凡不得志于時之所為皆見于詩故夫李杜流落之魁也胡子以其才浮沉於世亦足身致髙位遭時䧟排如軸摧牙折不求更振偃息林谷托意扵諷采以視李杜宗工淪廢流貶遭遇又何殊乎嗟乎兹亦所以自見也夫毛詩出比自序李舜臣詩有六義唯比興之有同異者義難言也何也朱所謂比毛之所謂興也而毛寓比於興夫既曰比曰興義宜有别嘗考之興之言象也事存于物之中比之言類也事而與物偕舉若毛所謂興聖人復生豈可易哉惟不出比以興該之漏扵是矣又以詩多引古以風比義也何也物情與事偶似其形古人與今或異其趨于是引古以風今或出物以質事二者皆比義也然引古以風今者多以通篇出物以質事者篇數語爾尚大君子裁焉明文海巻二百二十七
