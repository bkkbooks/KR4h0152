body:
  text: 明文海巻二百三十餘姚黄宗羲編序二十一著述五經蠡言序蒋徳璟明以耑經取士士鮮兼經者然自聖門子夏商瞿左丘公榖之倫皆僅名一經漢景武後經師輩出然一人猶不能獨盡其經多以相合而成且每詔五經諸儒講異同於石渠虎觀稱制臨決其難如此而後世如鄭𤣥王通顔師古孔頴達及宋大儒程朱諸公顧皆兼五經論譔甚富何聖門之難而後世諸儒之易也入明而楊公慎鄧公元錫特號博雅揚間拈同異鄧則戛戛乎深矣家君子授諸子各一經余又得易不解更授詩旁通書禮春秋習其訓故亦復不甚解最可商者如易必拈占辱以卜師書訂武成詩掃小序禮多以漢參古春秋乃舎左而狥胡皆古今疑府它如金矢非贖鍰已日不必非干支嬪虞非瀆姓戡黎非文王遜荒非奔周騶虞非獸鄭衛非淫周公居東非東征履帝武為髙辛𤣥鳥非卵孔子非不知父墓魯郊禘非成王賜周正為子為寅許止趙盾之獄蔽罪與否滕子不書侯季札不書大夫非貶更僕未易數思向名儒洞了三代以上事者一為發覆而得許君大賡蠡言讀之起舞曰異哉夫海非蠡所測也然一蠡而海之性已盡五經學海也千古挹酌無慮萬家而竟不盡者何也漢唐為經用而宋自用也為經用患拘自用患戾皆經功臣而宋人於漢今人於宋則皆自以為忠臣然後知經之大於海也余友黄君㓜𤣥精十三經言向寄易黄圖京中余出與同館讀之相嘆伏以為楊子雲不能作甲子之役漳有顔君茂猷以五經二十三篇得雋而大賡復以是書行於世何閩之多才哉大賡學博而行方以名魁里居鍵户修不朽之業異日出經術經世必有卓然自表者即為飲海之長虹運海之大鵬其可無言蠡矣鑑杓序蒋徳璟作史難讀史亦不易自余在著作之庭見所纂實録皆采科抄章奏與起居注兩者而科抄多漏畧十僅得三四起居自文書房傳諭及閣揭外寥寥即欲有所刪潤以諸曹掌故與邸報參補而已又一二載筆眎為爛朝報不經心其髙者胷臆為政間規時局所嚮行其髙下至於百十年之久文獻俱湮而野史與之錯行於世繇今思之古今史殆未可盡信也當上初年召對文華平臺幸與同官持不律侍御榻言動必書一出殿門惝恍若夢互相舉似已不無撈雲捫日之疑矧其它乎而士大夫顧從蠧簡斷編懸斷耳目之外故其精則可以功史而其敝也亦嘗為史所愚余友吳比部田年自其尊公惺初先生與福清葉公讀中秘書以古文辭著比為柱史所至有聲而比部弟晜繼之客春比部以使事歸暇取涑水通鑑論列名曰鑑杓如言舜柴岱宗乃廵狩非封禪太公無隂符子房亦未必有黄石異書也明為荆聶隂為紅線聶多費一姊荆多費一田光魯仲連義不帝秦多却聊城一書也漢光武赤伏符倣赤帝子子陵卧隠陳希夷睡隠也佛入中國被佞佛者撏撦一番佛殊不願中國之入也楊闗西却暮金妙在子孫步行蔬食也順帝寵乳母山陽君李固能立令出宫也華歆以狗續龍當付狐貉噉盡也孫權稱臣曹操非三分也魏徵娬媚無忠骨寧為良臣不為忠臣無以謝建成也髙力士為田令孜輩作俑也皆於定案之外卓有平反其上下千古也殊具卓識若比部真有功於史矣使之探金匱石室之林當勝余輩逺甚而余更有商者昭代皇宬既秘不可闚諸稗史通紀傳信諸書尤多舛陋易誤來學試以實録為綱而合鄭端簡王弇州及吾師何氏名山記之類成一部明書何如余不敏病未能也請以俟君子元和御覽詩序潘之恒詩以情至惟性是近凡述志陳辭非至性所安未有能定其情者徵之唐詩庶㡬得性情之正而於唐選若張侯以中鵠或同代或同朝野稱千古一時其風調自合莫可易矣以今觀元和御覽詩其所録僅三十人進詩不滿三百首與世所選十九不侔如簫􅐟箜篌異指同音律有所持而調有所協故足傳也友人汪騰逺氏得之古篋繕本以相示余讀之心醉十日尚未能醒其詩之所工以幻為本以靈為胎以想為因以虚空為典故以遷易流動為精神抑将爽美疢而嗜美芹生於藥石以獻至尊豈徒曼音長嘯於空林邃谷間而莫之聲遏響答者以為異於鷇音若紀黍析塵為不易辨也盖其吟同社其仕同朝其隠同志其所選在中晚之間若發一竅如出一口與今時詞場所尚若相逺而實相侔黜枝衍存頴碩削繁縟尚素真騰逺氏惟有之故似之惟知之故樂之至精於校讎一字不繆又其餘事近梓唐選者如英靈間氣搜玉極𤣥篋中國秀才調俱有善本行世獨二妙未梓𢎞秀為宋選而剪綃尊前為唐詞能次第舉之其有禆於風雅非淺而余猶以老眼屬望先序此集標為諸選之最惟耳目一快新賞昔陸務觀據允言墓碑為唐舊書不若余以品詩為榖士據也善乎方職方氏之評曰詩文之道以情進以性成子之情無不之而性有特操是謂能性其情者而情性乎哉余服其知言遂述之篇首以質諸同調金焦二山刻石經序錢府漢明帝時佛法始入中國惟四十二章經最先至貝葉線穿無有三藏之目也梵書旁行無有華夏之字也因果報應無有心性之精也嗣後僧教漸通梵僧羣集佛經之來寧獨白馬可䭾而已哉逮於隋唐屢翻重譯庋閣緗綈則有五千三百之多焉噫嘻亦侈矣然紙傳筆寫流通則艱口誦心惟脱落則易乃版刻肇於景徳之季而石刻則幽州南山石洞有之佛藏始布滿㝢内云金山昉為澤心寺而焦山則南朝之醮山戍也傳㑹焦光名勝與金山埒自古無有以石經刻置兩山有之自今日新安詹生始詹生素工筆札雅善詼諧一旦以純灰滌腸懴悔夙業始而逃儒終而逃佛發心刻四十二章并金剛經於金山道徳清浄經於焦山廣募博化奔走南北苦心繭足樂此不疲詎不可嘉尚乎夫佛藏侈矣不可加矣道藏自宋王欽若分洞真洞元洞神為三洞太清太平太真正一為四部其間多雜收方伎旁採諸家而老子一書躋之洞真遂為𤣥元之鼻祖其他如清浄五厨心印其類尚多然紬繹之則皆道徳之雲仍耳詹生始終感異夢誓竭此生之力必欲書而刻之藏之名山以垂不朽豈非末刼䕶法之傑丈夫哉吾獨悲鴻都石經自中郎没後寥寥千載雖魏周隋唐代相移徙而古文篆𨽻畢竟烏有今漢碑澌滅唐刻僅存學士大夫雋永聖言沐浴聖化由明經以取科第夫孰非遺經之力哉竟無一人出而倡率經營其事者何耶豈非二家因果報應之説足以聳動維繫乎人心而吾聖人之教日用常行若存若亡一切付之不聞耶且也詩殘書偽禮壊樂崩此無他無䕶法如二氏者流故也吾願詹生儒佛兼修先之以諸經後之以論孟必有異人出於熈洽之朝共肩勝事永永無斁顧不偉與僣書以俟易解序唐俞易其至矣乎聖人曰立象以盡意意終不可盡也故神無方而易無體必竢之引伸觸類者世人習其師説黨枯保朽牢不可破烏足以知易余嘗思道大宗有三為羲文為黄為老老之道徳黄之符讀者輙目為幽詭以其意皆主於用逆而易逆數也乃反若易言之何耶不過謂考亭正義業已奉功令如日星稍欲為異即屬狐禪詎知易理秘宻聖人洗心退藏𤣥之又𤣥寧僅是一番君道臣道籠統説語便打發過去太白所云白髮死章句豈不信然旦世代遷移豪傑輩出人持一赤幟㡬欲奪焦京之席而解濓洛之弢斯時即起考亭於九原從前論定亦必互有同異而無識者偏䕶其所短以為衆射之的又安得為朱氏功臣余因是憤作俑之誤與吠聲之弊就是解中稍加詮訂亦自知孤陋寡聞識不能什之一筆又不能百之一獨憶麻衣有言從心地馳騁不向注脚盤旋姑為標一指於此使淺人自見淺深人自見深而已矣偶與客談及稍指陳大意客曰昔輔嗣善易而君名適同君其中郎氏之顧邕乎應之曰予何能知易抑思易之名廬􅨦也一日中作十二色若是其變也故術家言徵應道家言服食儒家言性命各有精義可以永世至帖括而侮易甚矣勦襲蕪陋對之欲嘔當時聖人所謂絶韋滅漆者果在是乎吾意兎卦雞占猶賢於研硃滴露者也世有精易者惟變所適乘遞換之春秋與天為徒補不全之日月萬化黙成神明在我乃可以薄吾之説也夫小忩清紀序何偉然燕園寧野之别業小忩燕園之别竇清紀小忩之别述也夫人静坐幽忩不讀書枯坐何用讀而不述死讀何為寧野之讀而述也不負此静坐矣然兀坐易枯非有廹之而起則鼓舞不神忩以外之江練山翠遥濺於鄴架而脉望欲為飛動也忩以内之桐影花隂栁烟竹月掩暎於筆牀間也無非撩人語者得趣深發越自靈異矣紀以清名者寧野熱於情而境漸冷将以小忩為攝境之户不覺清味之雋永也雖然豪俠性成寧為境移吾知寧野之境愈冷而心愈熱也夫廣清紀序何偉然予與吳寧野初纂清紀海内翻梓者再王經倩起而廣之其書益竒海内嗜若蔗境芙蓉粉養紙以待副墨薔薇露浣手以待展巻經倩曰此何與欣賞令人珍好若此則以清名之可貴也清名可貴乎清名固自貴獨奈村夫不認清為何物執林壑所韜晦者與游閒亡賴埒則清名将為寒酸之譏刺名從此得賤由是龍蟄之雋流驥伏之烈士雞棲之彦倫共厭其名而思避焉清名何可避也概而觀之天則取清氣朝則取清時官則取清吏禪則取清規仙則取清班鬼則取清魂山川則清而秀吐草木則清而芬揚昆蟲則清而韻冷天下無此清字不成為世界惟恐胎俗載清名不得耳如果冰神玉儀世外佳人世方藉以洗刷何以避為必求村夫認取而後清之名貴則清反為投俗之物矣苐怪工態飾名者起而為清中之異端鬚眉面目盡是游情装束步趨總墮惡趣流慧齒牙不可方物蒲伏衣冠浪嘲林澤朱紫奪而淫雅亂其中非有大雅為之主持不無溷場決隄之虞也然而大雅之自認亦有未必盡是者以批風抹月品水論山為清語則麈尾無經術以松濤竹籟鳥語花聲為清韻則休明無鼔吹以巖居川觀煮茗焚香為清事則閒居無抱負如是則飾名者得雜處其中何怪乎名之不能自貴也吾将何以收其常貴之名乎則惟有讀書一節語云讀書可以醫俗今之薄清客之名而肆其凌轢者無論矣即如求清得濁求雅反俗者只是胸中無一字故作意蕭踈轉呈粗鄙使其讀書則斂神肅氣洗塵祛氛美標格而遊名通安得猶然竊清之膚襲清之皮與游閒相激昻也一不讀書則爻象皆非縱村夫認識清名亦何居焉所願讀是紀者得其清之所以名而收其名之所可貴則是紀不為游閒之借資已雖然人惟恐不好清名耳天下不相率而墮惡趣者幸避却一俗字以清名自托則清之名猶足貴而不必避也言及此不覺清淚欲洒經倩曰乃知清為天地民物之原千古髙人逸士之根也㫖矣哉明文海巻二百三十
