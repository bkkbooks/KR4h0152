body:
  text: 明文海巻二百三十一餘姚黄宗羲編序二十二著述于司直金石志序金鉉歐陽子記峴山謂元凱銘功二石一投漢淵一置山上是知陵谷有遷而不知石有時磨滅也余謂未然人生世上果有篤志真氣結之金石間則長物可頼之得夀又况險亦致之深亦探之古今不乏嗜竒人哉廼每語同志及金石文字皆茫茫不知所從出抱殘守缺自古慨之疑歐陽子之言其殆是歟而集古一録亟亟為之不置者又何説也毋亦惜其雙而思以留之與抑中有不變者存而天假竒人以為之表與余質司直司直曰否歐陽子磨滅之云誠有感于卓人異士作不刋業者為末世傖父妬子埋沒無極故作此語非有憾於頑石也此正與作集古書同一遐想爾吾儕生雖晚豈可為古達者譏遂相與為僻盟博覽金石文於天下盟曰胝所及雖險巖幽壑畢力求之舌所及雖蕘人牧子詳悉咨之有不如約者代為六一居士鳴鼓而攻之然猶恨鬰鬰居此未即為輕舉徑度周海内酬若大願司直因綜其目若干巻用廣碌碌腐册者之胸且以為徴竒檄代吾胝吾舌之所不及也司直每謂吾儕學問文章皆宜同金石夀此編成若金石且不能同明晦亦足以見一斑乎其風雅卓然實永叔後一人矣詩經偶箋自引萬時華余僻處而無心家世業詩閒居偶有所見隨手識之義類不能深也跧伏既久忽復成書題之曰偶箋子夏讀書有人亦樂之無人亦樂之子尚以為見其表未見其裏子曰吾嘗悉心其中前有髙㟁後有深谷詩之精㣲如是夫偶於詩亦何有哉然今之君子誦詩而蔽皆未必以偶失之詩雖埒之五經而㫖與他經異或近之而逺或淺之而深或顯之而隠或笑之而嘆或反而正今之君子知詩為經不知詩之為詩一蔽也謝太傅嘗問語從毛詩何句最佳遏以楊栁依依對公所賞乃在訏謨定命逺猶辰告之語譚友夏亦言讀詩不能使國風與雅頌同趣且覺雅頌更於國風有味易入便入終是讀書者之病今之君子少此𤣥致二蔽也至於因經有傳而逐傳者迷經因傳而生訓詁而襲訓詁者迷傳塾師講堂輾轉訛謬夫古人之唱嘆淫佚神境超忽而必欲硬提其字句以為綱强疏其支派以為斷千年風雅㡬為迂拙腐陋之書嗟乎蔽又甚矣孟子之論説詩以意逆志夫千載之上千載之下何從逆之大都目光所止古人妙理相遭無故之中作詩者之志或偶而靈讀詩者之意或偶而動天下之不可力取而偶或遇之者惟物之精㣲者為然也癸酉中和節時華自識周太僕四書解序章世純夫聰明所起始於天地明出於日月聰出於空虚天地得全而人分之不肯讓天地各以其見相通取合以有其能所以可通則以言矣言可逺行則以書矣書者言之迹言者智之輿以此取通聖人之始為之盖其難也五方之人各以其聲命事物雜然而來如鳥鳴獸語紛互舛抝啟行之音則有爰維夸誕指事之辭則有彼其之斯轉注之響則有若乃於厥止息之韻則有忌只矣兮是非之應則有然否喻咈如是之類五方詭趨王者考文因並用以取通因相通而取喻然而冀州之聖人出則朔北之語常為主安邑亳都之聖人出則中土之説時為君岐雍之聖人出則西方之言又為帝而時代推移語音互扭因訛成變假借用煩加以木䇿竹簡約文便書於是何之為假益之為溢弑别上下戰分征討或聖賢之所定或民用之所安而向之求通又以多成隔則非一聖人之制所可己於是又有聖人者出為之爾雅以總其類春秋左氏發凡言例以括其義釋詁之學後為賈鄭馬顔發義之文後為周程張朱是則詩書為之舟楫而之數君子者則其長年三老撑拽運駕而使之吳之越者也由此觀之古今訓解之學歸於通之而已矣歸於明之而已矣作者不能盡明其意固不為作者矣讀者不能明作者之意則固不為讀者矣而因於爵禄而為士者多因於士多而解説者衆因於解説者衆而隙中觀鬬水面測河紛紜益甚以解晦書以傳覆經周程張朱之徒復為周程張朱之賊矣今太樸氏一起而正之一篇之中先舉大義則周程張朱之志也一句之中字為表白則賈馬鄭顔之業也合為之譯以盡其起承轉結之趣則又今制藝代言之體也以其昭昭使人昭昭以其孑孑使人孑孑手指之中挈日月而行而使天下後世目有視而耳有聞此真可以通今古之隔而争天地之能者與兩朝詩選序尹民興陳皇士以兩朝詩選屬敘於興興拱手而曰水有坊激而成波人有坊激而著節禮教者民之坊也壊坊毁教滔滔之水放諸壑夫子愴然矣昔者聖王不競才力惟是古禮古樂謹諸膠序使民習安而悦豫守其禮樂若上甿之獲穡也豈復更造辟違之戾節以梟亂天下哉求之於此取之於彼所謂國之神氣也先髙皇洞暢此意斬刈不義之後即選儒臣明修禮憲然後孝子忠臣祗敬而有所至矣故靖難之日誅殛淫苛其視落肌如委土耳迨之議禮建儲肉飛階殿而不悔夫豈有所跂預哉各悦其心之甚安也當是時衆心如藩悖節不起𤣥紐天下不在金版六韜而在升降揖讓之中是至一至逸之術也有治畸毗者抉毁先坊優奨馮道品選古蹟獨贊狄公若曰是不蠡盤盂而安人家國者夫民之趨利張乎不可遏也先王纆之以禮刦之以義抗之以美名炤之以禍災而民猶有竊發者今哆然大號曰禮義不足偈名禍不足規也是猶廢垣墮墉而招盜賊入室也民将何所不至乎卒之魏客釀奸李孽凶逆兩朝巨公卿詘要撓摑娩乎婦女者豈盡安恣耶禽獸之行亦或持之有故趨利若騖頓忘臣節也卑卑之徒毋足論假之老狐之毒未衰五王之烈不著奪裘鄙事何禆七尺之孤事有禆於一時而不足著冰防者君子不由也中行穆子不受鼔降懼賈貳於邊鄙况治國安君大事哉一夫之言猾諸夏言不可以不慎矣烈皇帝握操健斧鋤逆章奸若得三四名弼夾輔其間自然迅發如霆剪除茨蔓乃至旋睇無人姑示之鎮靜魏客田崔咸逸顯戮而諸彪虎多逸山林諸君子又不潔身靖共媚於明主既滋小人口實日夜䜛搆而明主亦漸薄之於是追維逆孽邪黨雜進是以敝裘不足衣藉虎豹之毛欲蔽其體也其不厎於傷害者㡬何矣兩朝之禍始於破先王之坊終於樹坊不峻無所憚懼也不憚懼則敢妄行如南行者無所期何能不北走也哉兩朝遺詩固猶先王之憲民而徳教之先聲也誦其愿慤薄澆可敦焉誦其隅方撓挑可息焉誦其隆髙卑陬可作焉誦其端直旁僻可化焉以砥狂夫之説瀾而存法崕於虧缺之後雖曰聲歌非小補矣明文海巻二百三十一
