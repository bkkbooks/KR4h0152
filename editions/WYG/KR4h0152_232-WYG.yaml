body:
  text: 明文海巻二百三十二餘姚黄宗羲編序二十三著述畸人傳序闕名嗚呼誤天下者其庸人乎庸人者屈原所謂黨人也原之言曰黨人之鄙固兮不知余所臧任重載盛兮陷滯而不濟又曰誹俊疑傑兮固庸態也始於誹疑卒於鄙固始於鄙固卒於陷滯嗚呼黨人之庸至此乎方其毛舉鷙擊樹幟䕶籬自不謂鄙也脱手營官身勢迅滑如彈丸自不謂固也一旦海波蕩嶽坐失千金之壺盡罹滅頂之凶有㧞足崩流掉萬石之載而厝安瀾者乎身尾既濡神魄枯落於時則藏身狗竇抱頤雞栖輸金緩死媒女進身破族屠宗賣交刃主無不可為所謂庸人者遂為大逆窮凶極險之人矣究其蹠矢負塗澣濯無䇿雖續殘喘故行尸耳不謂之庸可哉天下已受庸人之禍而後思畸人以救之亦已晩矣鑪敗則滅而更鑄厦傾則撤而更新人弊矣弊可救弊乎新莽之簒世盡淪汙徳己而歌則歌以十百萬罪已而哭則哭以十百萬人心狂酲天日㡬晦倐而鄧馮宼賈有隕自天禄山之叛海内風偃倐而顔張李郭為海峰天柱漢室之衰羣豪並起未有挾天子以令諸侯之説也而荀彧忽倡之未有保江東極長江而據之之説也而魯肅忽倡之未有跨荆益撫苗獠據荆州以向宛洛出秦川以向長安之説也而孔明忽發之亦竒矣哉殆天啟其聰而非人所與慮也是之謂畸人也故曰畸人者畸於人而侔於天反之則庸人者畸於天而侔於人矣天所不許而欲薰釁俘囚任為蕭管奨誘凶逆委諸廓清收羅豺狼寄以民社是以脂濯垢而鴆解酲𦕈相𦕈而跛相跛也覆前車者庸人而推後轂者又庸人輾轉陷滯哀斯人之上坎無時矣豈非庸種滋蔓耘鋤失計乎今夫纎餌畢命者魚也一隈待弋者洲鶩也覆粟而呼者雀侣也悦草而鳴者麋羣也庸人之唼汙謀梁呼羣圖活則亦雀鶩魚麋之智矣是披羊之客所以癡唾乎菜傭而墜驢之叟尚假寐而不願醒也哉名士傳序闕名孟氏問楊朱曰人而已矣奚以名為曰以名者為富為貴為死為子孫名奚益於子孫乎曰名乃苦其身燋其心乗其名者潤兼宗黨况子孫乎凡為名者必㢘亷斯貧為名者必讓讓斯賤為名者必身為的的斯射三者何用於富貴與死哉實名貧偽名富也實名賤偽名貴也實名死偽名生也實無名名無實名者偽而已矣名實散亂於是公孫龍疾而思正之假物取譬以守白辨謂白馬為非馬也其言曰白名色馬名形形非色色非形也言色則形不當與言形則色不宜從今合以為物非也欲推是辨以正名實而化天下焉同時好辨者桓子惠施之流則又演其説曰狗非犬犬可為羊也白狗黒黄馬驪牛三也狗馬之説駘蕩益怪而名實愈亂故劉晝曰名彌假而實愈反則廻犬似人轉白為黒矣今指犬似人不類也類推以象謂犬似玃玃似狚狚似人則犬似人矣吾為正其説曰狗亦馬馬亦狗狗馬亦人此其情也情形之背也無算矣合以為物而無疑者名實眩也梟名曰鸞莎名曰芝跖名曰夷嫫名曰施褒妲名曰姜姒墦壟名曰園綺商臣許止名曰舜文莽操懿温名曰周伊殷房名曰管樂臣僕名曰㣲箕鳴乎以是名名之可不以是士士之乎華子魚禇彦回其士名也而逼母后賣故主者其實也王夷甫沈休文其士名也而乞命胡羯勸穪尊號者其實也蘇叔黨趙子昻其士名也而被衰閹門忘宗事仇者其實也故漢士尊名駢首争死糜身湛族而不辭輓士修名䑕首偷生獻室屠親而不憤以此為富貴即富貴矣以此為死即不死矣以此為非狗馬即非狗馬矣又何以曰狗非犬馬非馬名非士士非名也乎故天下之至眩者莫甚於狗馬與名也此公孫龍桓子惠施之流所不及辨也作名士傳第闕忠義傳序闕名公孫述刃而刼王皓皓曰犬馬猶識主而况於人乎遂伏劍以死付使者夫皓以為人之報主甚於犬馬也今翩然反之則曰人猶不識主而况犬馬乎此一悖也凡物性近於人者人必憐愛之談反哺跪乳蜂臣蟻國之事於昏暴之前未嘗不温肅以聽也至有談馬能殉節犬能復仇者雖商臣許止莽操懿温猶交口而贊其善也今指士大夫而曰爾為曽閔爾為龍比爾為顔常山嵇侍中則逡廵而額濕莫或敢任者是以懿徳奉犬馬而以凶徳自居也此一悖也或見怪焉秦犬逃而守齊門魏馬逋而負燕客則共恨為妖矣甚且言飼犬而噬其翁修廐而齧其主者雖非同室猶痛其不祥而協力磔裂之也今馳人之車者乃反衝而攻其域食人之禄者藉糧而攘其土則又以惠廸戒犬馬而以逆惡自蔽也此一悖也之三悖者天下必於沐矣沐則心覆心覆則圖反反之為言猶惑易也茹不潔以為薌攫腥血以為㫖也毁膚髮以為修易家室以為禮也摧域之哭以為笑湧濤之怒以為喜聲罪之檄以為醫齧舌噴血之罵以為蠅聲之過耳其談貞臣恭子義友烈婦者則以為醒狂而晝鬼也於是舎其沐人而陳忠義於犬馬豈謂狗馬亦可談忠義哉自吾之意以為無忠義則亦不可為狗馬而已何也無忠義則如豺狼之不可嚮邇而虺蜴之不可暱就夫人防豺狼虺蜴而不虞狗馬則以其忠義足恃也假令犬馬而為崔杼趙盾者乘主人之醉寐登牀而解其體家相戒而户屠之犬馬其無噍類矣假令犬馬而為張柔張𢎞範蒲夀庚孫勝夫吕文煥劉整者連率異族而覆主人之廟社逼孤㓜於滄波則主人之邦族亦豈有孑遺哉故曰無忠義必不可以為犬馬也我故揚犬馬於人而比類言之支離言之含心包垢而言之也嗚乎此故子慶所不能哭士龍所不能笑劉四法秀所不能罵而談天炙轂所不能謔者我猶喋喋然傳之沐之人其以我為匪人也作忠義狗馬傳第二十七明文海巻二百三十二
