body:
  text: 明文海巻二百三十四餘姚黄宗羲編序二十五文集説齋先生文粹序蘓伯衡宋自濓溪周子河南程子倡明性理號為道學逓相傳授至乾道淳熈間紫陽朱子廣漢張子東萊吕子鼎立於一時而東南學者翕然宗之説齋唐公出乎其時又與呂子同居於婺而獨尚經制之學眞可謂特起者矣而豈立異哉尚論道統由周程等而上之至孔孟由孔孟等而上之至三王又等而上之至五帝經制者三王五帝之治迹也聞之曰治本於道道本於心得其心與道而後其治可得而言則經制性理固自相為表裏者也茍從事性理而經制弗講焉不幾於有體而無用乎公之尚之也有不能已者矣立異云乎哉公與其父侍御史堯封其兄饒州教授仲温樂平主簿仲義皆紹興名進士家庭之間自相師友不惟史學絕精而尤邃於諸經自謂不専主一説不務為茍同隱之於心稽之於聖人合者取之疑者闕之又謂三代治法悉載於經灼可見諸行事後世以空言視之所以治不如古此其志為何如哉天文地理王覇兵農禮樂刑政度數郊廟學校井野畿疆莫不窮探力索於遺編之中而㑹通其故不啻若身親見之上下古今和齊斟酌之以綜世變精粗本末兼該並舉其所造又何如哉使得志而大行焉舉帝王之大經大法於千載之後輔成一王之治俾天下之人復覩唐虞三代之盛夫何難之有然天性亷直利不能囬勢不能撓忤物旣多謗讟攸歸仕未通顯而遽自引退其欲發之事業者僅推而托之論述此君子之所以追恨而深惜者也所著書六經解百五十巻九經發題經史難答孝經解愚書各一巻諸史精義百巻帝王經世圖譜十巻乾道秘府羣書新録八十三巻天文地理詳辨各二巻故事偹要詞科雜録各四巻陸宣公奏議詳解十巻説齋文集四十巻今去公垂二百年洊更兵燹行乎世者惟經世圖譜諸史精義在其他傳者蓋亦無幾矣揚雄有言存則人亡則書欲求公於公之書而其書又如此不愈大可惜哉諸孫懷敬為是極力搜訪得文集焉觀士介所為序乃重刋本也以發題愚書足四十巻之數且駢儷之什應用之作居多然則亦非彚次之舊矣欲採擇為文粹嘉惠承學則又懼以寡聞淺見而輙去取犯不韙之罪伯衡曰梁昭明太子統嘗以一人之見去取秦漢至本朝數千百年諸家之作為文選矣宋姚鉉嘗以一人之見去取唐三百年諸家之作為文粹矣他若文鑑之類未易枚舉至於昌黎之文自謂約六經之旨孰得去取之而公嘗掇取二十六篇為韓子今是舉也猶是意也奚為而不可使是集出則公之學術庶亦粗足表見後公而作者有志於學而無從見其書一旦得而見之豈不深可藉而若獲拱璧哉於是懷敬採擇論議記序書銘奏議雜著職䇿一百五十四首釐為十巻其發題愚書則置於前詞科仍列於後合十五巻不鄙以序見屬伯衡晚陋何足以知公竊嘉懷敬不墜其家學喜承學之士得有所考故不辭而書之且以見公特起流俗之中絶學之後所藴之精微所造之高妙不盡在是猶愈於槩乎無徵云爾潔庵集序蘓伯衡潔庵集詩文若干首平陽孔子升先生之所作門人同邑林與直敬伯之所彚次也敬伯以告余曰先生志於立德者也立功且非其志而况於言乎然而先生由進士科出身雖不蘄以文辭行世而求文辭者則固以先生為首矣則先生雖欲不述作烏得而不述作嘗聞諸先生文章非應用應用非文章此至論也凡吾之所作第應用云爾吾敢自謂文哉以故先生雖為文未嘗留藁子弟門人間私録之亦不多也先生旣棄世其子綿屬與直􅁼粹為八巻附以詩四巻因先生自號題曰潔庵集一二同志將鏤版以永其傳敢請為之序余取而讀之理到矣氣昌矣意精矣辭逹矣典則而嚴謹温純而整峻該洽而非綴緝明白而非淺近不粉餙而華彩不鍜鍊而光輝古之有德必有言者蓋如此尚論文章何以加諸至於詩則近於性情而不窘於町畦有優游咏嘆之思風雅騷些之遺而先生自視欿然何哉豈不以世之為文者於學無所聞於道無所得險澁其語以為竒僻怪其字以為古隱晦其意以為深突兀其體以為高而流俗之所尚也先生則不出乎是自意不足以追世好而云然也哉嗟乎文辭之陋未有甚於彼者也曾謂先生而為之乎人固有却菽粟而進蜆蛤者亦有舍布帛而取罽毯者茍弗貴先生之文而惟流俗之所謂文是貴則與是何以異乎夫蜆蛤可適口而不可療饑罽毯可悦目而不可禦寒養生則又以菽粟而不以蜆蛤也卒歲則必以布帛而不以罽毯也先生之文布帛也菽粟也世之所不可無人亦不得而弗之貴者也敬伯惓惓於其遺藁可謂知所貴者矣然則先生之有敬伯不猶揚子雲之有侯芭也歟先生世系爵里行業詳見墓碑此不重出劉樗園先生文集序方孝孺學術視教化為盛衰文章學術相表裏豪傑之士固不待教化而後知也然先王所以孜孜焉先之而不敢忽者以為天下之人不能皆生而有聞明吾教於天下使過者抑而就中不及者企而求至德旣一則萬事治矣當周盛時微而閭巷之人遠而産乎遐方絶域肆口所成皆合乎仁義之旨及其已久而衰著書之士以千百計雖不能皆槪乎道而宏博深𤣥咸有所自得譬諸黍稷稻粱雖為味不同而皆可以醉飽未嘗假剽竊襲浮談虚言如後世文士之為也自周以來教化詳明得先王之意者莫如宋故宋之學術最為近古大儒碩生旣皆深明乎道德性命之理遠追孔孟之迹而與之為徒其他以文辭馳於時者亦皆根據六藝理精而旨遠氣盛而説詳各有所承傳而不肯妄相沿踵蓋教化使然也有元百年之間宋之遺政銷滅殆盡士之能言者不為不多辭采音節不為不工及觀其所至不過攘取舊説以為言求其學術之所自得豈惟不及宋之名世者哉凡生於其時及見宋之遺風者自以為不可及也寧海在宋時為詩書文物之邑去南渡國都為近故士之顯聞於世者甚衆宋之衰也兵刑不振而教化猶存取士之法稍弊而風俗不壞故其文章雖不能不降於盛時而學術之醇終不能甚愧於古樗園劉先生少游錢塘學於宋太學與名士大夫交斯時違乾道淳熈諸大儒猶未遠文獻之傳盛有可徵是以先生之學淵博崇高得聖賢之大要其為文章樸茂質實不為異常絶俗之談而紆徐衍肆必逹其意而後止索之而愈深味之而愈長其視葩藻無實可喜之辭􅗥乎其不侔也先生所尊善者惟同邑閬風舒公景薛南山陳先生夀所交而敬者則剡源戴公師初鄞袁公伯長袁公後仕元為顯官名稱海内戴公文亦傳於時閬風南山與先生皆自謂宋遺人不屑仕故文行雖高而不大彰著於世傳而知之者惟邑人而已今相去五六十年故老淪䘮知先生之名者日以寡矣使又厯數世豈復有知斯文之可貴者乎夫學術如先生而不傳後死者之責也故擇其尤善者決為若干巻且推其所自而偹著之使知先生自得之深非近代能言者所及也先生諱莊孫字正仲樗園其號所著有周禮輯傳易説今不傳張彦輝文集序方孝孺昔稱文章與政相通舉其槩而言耳要而求之實與其人類戰國以下自其著者言之莊周為人有壺觀天地囊括萬物之態故其文宏博而放肆飄飄然若雲逰龍騫不可方物荀卿恭敬好禮故其文敦厚而嚴正如大儒老師衣冠偉然揖讓進退俱有法度韓非李斯峭刻酷虐故其文繳繞深切排搏糾纒比辭聨類如法吏議獄務盡其意使人無所措手司馬遷豪邁不覊寛大易直故其文崒乎如恒華浩乎如江河曲盡周宻如家人父子語不尚藻飾而終不可學司馬相如有俠客美丈夫之容故其文綺曼姱都如清歌繞梁中節可聽賈誼少年意氣慷慨思建事功而不得遂故其文深篤有謀悲壯矯訐揚雄齪齪自信木訥少風節故其文拘束慤愿摸擬窺竊蹇澁不暢用心雖勞而去道實遠下此魏晉至隋流麗淫靡浮急促數殆欲無文惟陶元亮以冲曠天然之質發自肺腑不為雕刻其道意也逹其狀物也覈稍為近古韓退之起中唐始大振之退之俊傑善辨説故其文開陽闔陰竒絶變化震動如雷霆淡泊如韶濩卓矣為一家言其同時則有栁子厚李元賔李習之之流子厚為人精緻警敏習之志大識遠元賓激烈善持論故其文皆類之五代之弊甚於魏隋之間宋興至歐陽永叔蘇子瞻王介甫曾子固而文始備永叔厚重淵深故其文委曲平和不為嶄絶詭怪之狀而穆穆有餘韻子瞻魁梧宏博氣高力雄故其文常驚絶一世不為婉昵細語介甫狹中少容簡黙有裁制故其文能以約勝子固儼爾儒者故其文粹白純正出入禮樂法度中南渡以後眞希元魏華甫以典章文物為文陳同甫以縱橫之學為文其他各以其文顯者甚衆至於末流而文又弊矣元興以文自名者相望於百年之間為世所稱者曰姚寛甫虞伯生黃晉卿歐陽原功寛甫敦龎有威儀左右佩玉故其文沉欝而隆厚伯生岐嶷絶人談故事遺法竟日不竭故其文敷贍無涯不可準則晉卿謹慎有禮故其文守局遵度考據切當不放而宻原功博學多識故其文繁多而不廹至於今則潛溪先生出焉先生以誠篤和毅之質宏奥𤣥深之識發而為文原功稱其如淮陰將兵百萬百戰百勝志不少懾如列子御風翩然騫舉不霑塵土用鳴一代之盛追古作者與之齊近代不足儗也由此觀之自古至今文之不同類乎人者豈不然乎雖然不同者辭也不可不同者道也譬之金石絲竹不同也有聲則同江河淮海不同也蓄水則同日月星火不同也能明則同人之文不同者猶其形也不可不同天下之道根於心者一也故立言而衆者文之𨽻也明其道不求異者道之域也人之為文豈故爲爾不同哉其形人人殊聲音笑貌人人殊其言固不得而强同也而亦不必一拘乎同也道明則止耳然而道不易明也文至者道未必至也此文之所以爲難也嗚呼道與文俱至者其惟聖賢乎聖人之文著於諸經道之所由傳也賢者之文盛於伊洛所以明斯道也而其文未嘗相同其道未嘗不同即其道而求於文者善學文者也襲其辭而忘道者不足與論也然斯豈易易哉世有自謂不師其辭者則剽生抉怪雜取艱深之辭敷錯成文以飾其鄙陋之意至於不可句讀使人誦之而不曉其意以為文故如是或者懲其病則施慢不思輯陳蹈故混不加修甚則取里談巷語猥䙝嘲笑之辭書之編簡以為明道文與道割裂為二互相訾詆又或見其然遂放言而攻之以為古之道不可釋以今之文今之文不當學古之辭三者雖異而俱失之不師古非文也而師其辭又非也可以爲文者其惟學古之道乎道明則氣昌氣昌文自至矣文自至者所謂類其人而不悖乎道者也其人高下不同而文亦隨之不可强也嘗執此説竊觀天下之文為三者之歸者多矣而無愧於古者亦有矣往居京師從潛溪先生學得句曲張君彦輝之文而覽焉其語踈爽類陶元亮善持論類李元賓意其人必雅飭和易君子人也雖未嘗見而存乎懷今年幸而見之與昔之所意果合且得見其文之全其辭不泥乎古務自已出而無艱深俚陋之病往往本乎聖賢之道蓋庶乎斯文也已茍精而不倦於今之人又何難乎此某所以不能無感而言也雖然文之道大矣某也何足以知之哉遜志齋文集序林右流而不可止者勢也習而不可變者俗也與勢俱往與俗同波者衆人也知勢俗之所趨而能確然以聖賢自守不浸淫於其中者君子也非惟不為勢俗之所浸淫而吾一言一行之所逹天下之勢皆隨以定天下之俗皆隨以化譬若烈風震雷鼓撼上下無大不摧無幽不及雖有强梗不撓亦妥焉委靡於其下此非聖賢豪傑之士不能當周之末孔子之徒已没楊墨之説盛行於天下孟子慨然於布衣中修明仁義之道而楊墨之説以廢孟子以來更厯秦漢旣遭坑焚之禍天下學者不見全經而佛老之徒倡為私説鼓舞天下天下之人皆相與師而尊之曰此當今之聖人也使三綱淪而九法斁其害有甚於楊墨者雖以韓文公之雄才竟不能為天下變至宋程朱諸子者出一掃陋習頓囘天下於大道之中天下之人幡然而改曰吾道固在是也然後老佛之説為無用嗚呼當其肆為邪説乘吾道之無人戕賊其間根蟠枝散固植人心漫不可拔天不生程朱於天下則天下之人終日昧昧如瞽者之宵行何由睹青天而見白日也哉故曰能定天下之勢化天下之俗非聖賢豪傑之士不能也有如雲之舟方能適無涯之海有烏獲之力方能負千鈞之重有天下之才方能剖天下之事才不足於天下而欲剖天下之事猶乘小舟以適海驅孱夫以負重不待識者皆知其不可也是故不患天下之勢不我定天下之俗不我化惟患我無蓋天下之學耳彼郭林宗王導之徒屑屑衣冠之間猶能使天下之人效之况吾佩服聖賢之學而謂天下之勢不我定天下之俗不吾化哉惜乎當今之學者則異於是况聞前朝之故習竊成説為文辭雜老佛為博學志氣汙下議論卑淺齪齪然無復有大人君子之態吾友方君希直奮然而起曰是豈足以為學不以伊周之心事其君賊其君者也不以孔孟之學為學賊其身者也發言持論一本於至理合乎天道自程朱以來未始見也天下有志之士莫不高其言論將盡棄其所學而從之嗚呼豈非豪傑之所用心哉常士世生豪傑之士不多見而於吾希直見之又豈非吾之願也哉希直之文吾評之矣譬若春氣方至津液之色充滿廣宇飛潛動植之物各有生意天下之人莫不信之此特其一事耳要其大者不在此也雖然文所以逹志也不觀其文何以知其志之所存余故又序其文云操縵稿序林右吾台郡雖僻處海隅而文學之士往往與上國等厯唐宋來名登史氏者弗論姑以吾同軰視之如方希直郭士淵王修德者森然出為世雄文章播流於人人異時潛溪太史公見方君之文歎曰眞竒才也遂留左右不忍其舍去繼見王郭二君之文喟然言曰吾道台矣公以身任斯文之重天下所則也譬衡之於物豈偏於三君子哉要其實之所形言有不覺而至也余因公言取三君子之文觀之方之文如春氣方至津液之色充滿廣宇飛潛動植各有生意郭之文如蒼鵠摩空飛縱東西初無定適而俊逸之氣自為人所畏王之文如月墮澄江上下一色淨絶垢氛清明之氣可掬也由是往來三君子不以吾爲不可語嘗手書其文以遺余余置諸座右將欲焦心盡氣追歩其蹤日不可得而思之未嘗不自慊於懷今年王君過鍾離㑹予客舍出其文使余評之吾知其為戲也雖然間嘗聞之物有五色五色之變不可勝窮也物有五味五味之變不可勝盡也色味在物其變在人人之才智不同物各隨其人而變此所以無窮盡也文章之在天地亦猶是也其大經大法本於聖人其淺深精粗高下輕重則各随乎其人故自古以來厯代雖遠作者雖衆然體制迭異意氣代殊譬如人也均有其靣而靣靣之貌不同非各極其變之所在歟由是而觀則知守色味而不變者非善文者也修德之為文不詭不隨惟正是守不泥不専惟義是宜此其文有過於人者其亦可謂善變矣乎雖然吾聞古之君子變已非難使天下皆有所變為難文自前代以降千人一律如刻符信讀之厭矣則變而通者有不在修德與諸君子哉靜學齋文集序林右天之與人富貴名夀皆不甚惜至於文章則甚惜之何也一代之興位列上公土封大國名滿天下而年至上壽者不可指數而文章之士不過三數人三數人之中能使天下後世寳其文而傳之者無幾人以天下之大能者又不過三數人以萬世之遠而傳之者又不過幾人非天所甚惜乎不然何生於世若是其寥寥也嗚呼吾知之矣文章之士探造化之原窮聖人之理究古今人事之得失推有於無生無於有世之顯者可使之没世之沉淪者可使之顯馳騁所至雖英雄不可得而議鬼神不可得而知浩浩乎與天地爭功能蓋天地非聚夫至精至純之氣不足以生斯人於世雖欲不惜之而不可得也生之也難故惜之也甚至生之於世也少理數然也今夫生數百萬於天下者何損天地之氣而天地之氣必因文人而泄將欲不惜之可乎世之能文章之士不知天所甚惜之意一處草莽則呼號於人見夫豪官勢人甘於奔走不暇殊不思彼可尊我可賤也天何生彼之多生我之少則我尊於彼也多矣雖在饑寒之間猶為可貴而乃為彼屈抑何不自惜之甚哉余觀古今文人其不屈者鮮矣雖韓文公之賢猶不免乎此吾未嘗不為之太息也陳君原采之文其嚴重也如大儒之執禮周旋必中矩度其和通也如巧夫呈技歛散反覆機括轉移之間初非在已者求之於世如原采者無幾人原采嘗言趙孟之貴非吾所願陶朱之富非吾所慕使吾文如古聖賢是吾心也其氣節庚庚不為勢家所屈疾風破屋斂衾而坐誦猶不止原采豈無心哉蓋天所以與吾者甚重而吾不得不自重也然所以自重者非恃吾所有以驕慢人世乃所以重乎天也昔傅欽之欲見陳后山知后山之貧懷金往見一談之頃金竟不敢出甚矣欽之知人后山之能自處其身也故公誦后山之文不衰原采其后山乎何陳氏之多賢也於乎世習日下士不以文章自重皆挾之以為取富貴之資而已爾得如原采者而友之豈非吾之願哉故叙其文以見其可重者在此而不在彼也周僉憲文集序解縉永樂庚寅春予自交廣入朝道經虎頭城下雲南僉憲周君彦竒奉表行在驛舟夜呼相見歡甚出其文一編示予詰朝别去自贛至吉五百餘里晝夜觀之忘寢與食鄕山在望不暇應接忽然舟泊文江之滸至家而尚在手賓客皆傳觀之共嘆君之仕日顯而文與之俱進也蓋君生名家自少敏頴為學官宣城宣城固名郡君不以為人師自大也來試禁中問五經百史時務如古所謂宏詞科一揮萬言十解更端辭義俱偉廷中莫不歎服尋除國博不拜擢刑科給事中日與三司豪辨昌言力爭百辟皆靡遂超擢今官當方靣之寄而奠中外之交勲舊宿將相與共事較之他方靣實為難能也人有日不暇給者而君乃從容於文章若是其富也非不恃其敏而益勤乎及今又得其全而觀之蓋其所經厯山川之雄又以煦而發之矣慨予平生所履與君有小異者嘗登華岳窮河源而觀於周秦兩漢唐宋之經營也有以豁其氣焉不若君之所厯者遠且大也君之示予甚幸焉然昔者孔子惟南至楚西至於河予與君之所厯有聖人之所未嘗觀也聖人之文存者可見議論有易大傳叙事有春秋其答問言行有論語是豈有待於外哉豈有待於外哉西游集後序解縉余友康君以寧吉之永新人洪武甲子舉進士為太平府推官謫居橫浦二十餘年每歲集其迎送序述悲喜離合與玩物適情之作皆在焉以較其今昔學問所進與交朋往來歲時事物之代謝可以備閒居之覽而非有所刻削以求工以誇多而鬭靡狥外而為人也前序范君仲綸作稱廬陵文章自歐陽後世有傳續其論當矣特未知吾廬陵詩人之源流也始自周末有避者九人隱於玉笥多為四言詩刻之石間郡人往往效之而廬陵之四言詩始盛漢封安成王長沙王而淮南王賔客多往來荒祠古塜鑱文俱存至晉許遜郭璞殷仲立皆遊廬陵而五七言復盛至唐杜審言為吉州司戸始大興詩學廬陵之律詩尤盛吉詩人堂之作由是也南唐劉洞夏寳松擅其家宋盛時彭應求一作元忠稱南國詩人江西詩泒葛敏脩擅其雄諸體備矣至元初而范德機授學於楊學瑞學瑞之子又從師德機即邵菴虞公所謂得范公之骨而廬陵之為歌行者大盛不可悉數若永新吾得一人焉曰萃樂呉先生以寧鄕先軰也宜其所得者有緒故不求工而自工歟康君未老幸而所作當益富他日歸鄕拜詩人堂而重論焉屈伸榮辱進退萬變而性情之樂易如一日雷雷風雨晦㝠萬變而日月之光景常新也康君其必有以惠教我乎省愆集序黃淮太宗文皇帝涖祚之初誕興文治規致太平慎簡儒臣設内閣以處之俾職論思典内外制叅預機要而臣淮猥以末學黍與列焉永樂已丑車駕廵狩北京今上皇帝居春宫監國臣淮偕二三輔臣承朝命俾侍左右癸已再廵狩亦如之受命兢惕不遑夙夜誓竭駑鈍圖惟報稱然而質素愚戅以故處事乖方有不副上意旨者明年秋逮詣北京自分當被顯辟乃復䝉恩矜恤俱寘之獄俾自省過一何幸也在獄踰十年懲艾之餘他無所事凡觸於目而感於心者一皆形於詩甲辰秋伏遇今上皇帝即位覃恩肆赦臣淮獲全喘息復從諸大夫後退食之暇細繹腹藁得詩賦詞曲合若干篇彚次成帙名之曰省愆集志不忘也嗚呼先儒論詩以為窮而後工近古以來若李白杜甫栁子厚劉禹錫諸名公其述作皆盛于困頓欝抑之餘至今膾炙人口淮也才不逮古人處困日久而囹圄禁且嚴目不覩編簡手不親筆札口不接賓客之談舊學日益耗落氣愈昏而趣愈卑志愈窮而辭愈拙深可愧也然而篇什所載或追想平日見聞以鋪張朝廷盛美或懷恩戀闕以致願報之私或顧望咨嗟以興庭闈之念至於逢時遇景遣興怡神一皆出於至情蓋亦不可廢也是用藏之巾笥以貽子孫俾覽者知予處困之大畧工拙云乎哉東園先生文集序呉溥有儒一生禮度甚閑挾書一冊貽予招鶴亭下置之几上再拜而請曰某東園先生之子也家君之文無慮數千百篇家君不自愛重稿多為人持去散而僅存此冊蓋千百之十一耳今將鋟梓願為序以永其傳予曰文之傳也係乎人不係乎叙先生之文豈待叙而傳者哉且文之有叙所以叙作者之意也若予之愚䝉膚淺何足以窺先生之意而敢叙其文乎辭不獲開巻讀之未竟數篇即斂袵而嘆曰先生之文甚類老泉吾知之矣其氣昌其思深其詞正而不阿其辨博而不雜老泉而下莫之能及也旣而自疑其言之妄以為老泉特西蜀一布衣耳晚年受薦得一官止於主簿而吾先生少掇高科入翰林為法從厯官大司徒其出處顯晦不同若是而其文又無一句一字相襲者擬之得非其倫乎旣而讀之旣思旬月乃釋然而悟曰是宜其同也某不妄也老泉少不好學年二十七始發憤讀書數年而後下筆為文吾先生初入翰林即歸卧屏山讀書二十餘年其養之也久故其志也慤其積之也厚故其發也遲其見之也眞故其取也精聲實本末一無不同而何以顯晦疑為哉然而微有不同者老泉取韋布而所論皆朝廷之事先生服大僚而所作多山林之文其意有不可曉者豈所謂處江湖則憂其君在朝廷則憂其民易地皆然歟是固無害其為同也昔者老泉以文謁張益州益州許其似司馬子長又以謁歐陽文忠公文忠許其似荀子夫荀子古之大儒子長古之良史後世之所仰望而不可及者老泉以布衣謁名公卿得如是之稱不為卑矣而老泉當時當之不為深喜今某為先生門下士而妄稱先生之文類老泉烏能得先生之喜哉老泉曰樂道人之善而不為謟者以其人誠足以當之某樂先生之善者也非為謟以求悦者也是故始終以老泉為言書諸末簡以授於某書居士外集序鄒緝予少時客遊新淦新淦之仁和有李繼武者敬士而好文尤好畜古文竒書聞人有異書世所貴重者不計其資之多寡輒重購之嘗得故禮部侍郎曾魯得之所校歐陽公居士内外集知以為竒寳而藏之予嘗借得其外集蓋板本大字上下邊幅最高濶曾公皆手自校讐中間頗多缺板又手自補完曾氏家多古書所校諸本有吉本家本刋本諸集辨其同異及其改易增損皆朱書小字於其上下旁邊字極謹細常滿其邊幅以為其用心何其若是之宻也非積日累月之勤何能至是哉是時曾公没已久而其子坐事見籍官散鬻其書故繼武購得之予甚惜曾公用心之勤而其子孫不能保而全之為可恨又以外集之文罕有傳者其所考異尤為難得因取而備録之惟所校居士集五十巻洪武初永豐縣令蔡玘已為之鏤板而建寧書坊又為之傳刻則此外集亦當與之並行也其後予官太學居京師以李氏所藏本不可復見深加愛惜吏部侍郎練公子寧好古君子也見之而喜因借以去久未之取㑹子寧遭事死其集遂亡焉予又為之往來惋惜不已也李後復姓胡出為松江華亭丞集藏於家有子患風狂疾其存亡不可知李今又已没則其集之流落散亡也必矣豈不重可慨念哉此本予永樂九年借義門鄭氏本所録蓋此已得居士集故復錄此以為全集所寫雖未能精善又非有曾氏之考異然自謂鄒氏家竒書又後五年予再自北京扈從還京師入見皇太子獲賜歐陽文忠公大全集一百五十七巻裝繕整齊蓋尤為至寳之物旣珍襲而袐藏之以此錄本旣得之不易因備述予平生愛慕歐文之心與前後得失之故而并予之所感者係焉抑菴文集序蕭鎡太宗皇帝臨天下首選進士二十八人入翰林為庶吉士使盡讀中秘書為文章必欲其上追古之作者厚其既稟而責其成當是時凡在選者莫不奮勵磨濯爭先恐後而表然特出於衆者不過三數人泰和王先生其一也宣德初二十八人顯者無幾獨先生與永豐曾公臨川王公偕拜詹事府少詹事於時三公之文章内而京邑外而遠方不獨縉紳士雖庸人小子往往傳誦之而三詹事之名隱然擅天下旣而曾公先物故正統中先生與臨川王公先後由館閣出任列卿其位益尊其文益重於是當時稱二王者無間言焉無何臨川王公又物故景泰以來獨歩當世先生一人而已方諸公讀書時太宗屢閲試之謂曰文章稱韓歐軰彼豈天成耶若曹但力學患今無韓歐軰耶蓋先生資性敏絶過人而又䝉上之作養充之以問學自六經子史百氏之言橫堅鈎貫靡不為已有故其為文章浩乎沛然不必勞心苦思而千數百言下筆立就其汗漫演迤若大河長川沿洄曲折頃刻之間輸寫萬狀畧無凝滯之意其閎肆高古如連峯疊嶂層聳間出秀氣之發上薄霄漢不見刻削之態蓋其體之鉅故其聲之震也洪其蓄之深故其流之及也遠所以成一家言而為當世所推重豈偶然哉於是其子翰林檢討希稷彚次之為若干巻屬予序夫韓退之文李漢序之歐陽公文陳師道序之皆見誚於當世今先生之文而鎡為序得無陳李類耶雖然陳李之序因韓歐而傳則鎡為序未必非幸也故序而不辭先生名直字行儉别號抑菴清忠大節巋然當朝老成人今任少傅兼太子太師吏部尚書年七十有四云明文海巻二百三十四
