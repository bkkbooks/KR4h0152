body:
  text: 明文海巻二百四十二餘姚黄宗羲編序三十三文集石田藁序吳寛詩以窮而工歐陽子之言世以為至矣予則以為窮者其身阨必其言悲則所謂工者特工于悲耳故嘗竊以為窮而工者不若隠而工者之為工也盖隠者忘情于朝市甘心山林之下日以耕釣為生琴書為務陶然以醉翛然以㳺不知冠冕為何制鍾鼎為何物且有浮雲富貴之意又何窮云是以發于吟詠不清婉而和平則髙亢而超絶求之唐人若陸魯望是已今其詩具在予嘗讀而愛之魯望吳人也吳之詩自魯望首倡盛于宋尤莫盛于元然其人多生于季世身雖隠其時則窮則其詩亦悲而已予嘗讀而傷之入皇朝來偃兵息民天下向治及承平日久人情熙熙士之求仕者争治經義取科第而出若相成沈氏顧獨好隠盖自絸菴徴士已有詩名于江南二子貞吉恒吉繼之至吾友啓南資更秀穎雖得于父祖之教自能接乎宋元之𣲖以上遡乎魯望且其宅居江湖間不減甫里之勝賔客滿坐尊爼常設談笑之際落筆成篇隨物賦形縁情叙事古今諸體各臻其妙溪風渚月谷靄岫雲形跡若空姿態倏變玩之而愈佳攬之而無盡所謂清婉和平髙亢超絶者兼有之故其名大播不特江南而巳予少居鄉亦喜為詩辱相倡和方自愧于松嶺之襲美而其子雲鴻乃欲得予序其石田藁者予何以為序也噫聖俞既仕而得乎窮名啓南不出而全乎隠節其詩之工一也而悲樂則殊覽者當自得之啓南詩餘發為繪圖妙逼古人或謂掩其詩名而卒不能掩也今年七十餘詩思益發數日輙成什予雖不能窺其際又安得而盡讀之耶容春堂文集序王鏊文之製大率有二典重而嚴敷膄而暢文如韓栁可謂嚴矣其末也流而為晦甚則艱蹇鈎棘聱牙而難入文至歐蘓可謂暢矣其末也流而為弱甚則熟爛萎薾冗長而不足觀盖非四子者過學之者過也學之患不得其法得其法則開闔操縱惟意所之嚴而不晦也暢而不浮也文而至是是可以入作者之室矣董南畿學政侍御張君手一編授予曰是為戸部侍郎無錫邵公之文鼇山盖常師焉將梓刻以傳唯先生序之初予承乏翰林北上公時始得解過余舟中出所著眎予固以超然脫去凡近其後予官於朝公亦敭歴中外恨不能即而友之亦未克汏而忘之也今茲予告歸公亦歸卧無錫地孔邇而亦不能朝夕數數獨時得詩讀之體裁簡重興寄閒逺未嘗不改容欽歎而患不可多致今乃得其全觀之知公之用力于斯也久其志直欲追古人而並之不為近世之詞而已也是足以傳矣或問公文焉師曰是非予所及知雖然公盖師韓而不暇及乎其他其古歌詩盖有晉魏之風焉而亦有不佀者何師其意不師其詞此固韓公語也師韓而不必似韓此善學韓者也所謂嚴而不晦者也公年未及懸車當朝廷渇賢之日公將復起大建功業不徒托之文章而文章之出將日冨以深又非予所能涯者姑以是題其首併復侍御君何如也式齋稿序王鏊始吾蘓之官於京者最名多文學之士其在崑山則有若翰林修撰張君亨甫太常少卿兼翰林侍讀陸君鼎彛浙江左叅政陸君文量三人皆能文而尤工于詩亨父頗以才自喜其詩翩翩如濁世佳公子竒氣溢出最為時所膾炙鼎彛志尤髙不肯茍出出必竒奥簡古讀之或不能句商盤周鼎識者賞之而世好之差少文量不為險峻竒怪意盡則止如行雲流水自中法律亨父鼎彛皆官翰林文量獨官兵部頗以政妨世知之益少而三人最號相得杯酒倡酬無集不偕意氣所至不知古人何如耳久之亨父卒鼎彛以病告歸亦卒文量出參浙藩罹讒口歸林下挾所有不一試又遭屈抑以去意不能無少望疽發背亦卒嗟乎予未耄老三人者乃及見其盛衰顧其著述有終不可湮没而鼎彛之集不少槩見亨父有滄洲集十不及二三己未春予乞告歸省舟且發文量之子伸裒其父之遺稿為六袠作書且萬言貽予予閱之則平生倡和之作咸在又得其文讀之多予所未見者敷腴鬯達如其詩而奏議又有經世之志焉亦其所以見嫉于時者乃知前謂君特工於詩亦未為知君者也予與君交且二十年于其文猶未盡知又况深于文者乎予方悲君之不幸遽喜伸之能子也于父之書無少散佚故序伸早占應天鄉試篤志古學人謂陸氏有子於乎君可以少慰矣夀梅集序文徴明松江在元季時鴻儒碩彦多避地於此自鐵厓楊公而下若錢惟善思復若孫作大雅若陶宗儀九成邵亨貞復孺皆傑然天下士而土着之士則有陸宅之董良史衛山齋諸人者皆才雋喜文雅遊相翼雖更俶擾無忘問學唱酬吟諷不以時廢風流文雅照映一時比入國朝而袁景文顧堇中遂以清辭麗句大鳴國家之盛不可謂無所自也朱静翁楚材者嘗遊諸賢之門文詞行業亦袁顧曹耦嘗被薦起家而用不盡才旋即廢死其子士誠沾溉之餘亦以詩名余嘗讀邑志而知其人盖清修積學之士也近得其所著夀梅集于其諸孫察卿詩才百篇清新爾雅縁情寫事隨物賦形命意鑄詞無一長語宛有前諸賢風格師資源委寔以興之然諸賢生當叔季風塵澒洞奔播流離見諸論著多悲憂刺促之詞雖袁顧大家際㑹昌時顧以勝國遺材履維新之朝懾首而畏尾骫骳蓄縮求其和平盖亦難矣君在宣徳正統間當承平極盛之際隠居求志外無兵戈之擾而居有丘樊之樂文酒燕遊親戚情話發為音詞紆回冲逺無有吁咈真鳴盛之作也惜罹鬱憂遺草燼滅察卿與其父福州公子文再世搜訪僅僅得此夫金膏水碧奚以多為嘗鼎一臠足以知味矣雖然名世非難傳世為難古之作者冺沒何限是在後人耳不得其人雖巨編完簡往徃置為篋中故爾余見亦多矣矧此出於蛛絲煤尾之餘非察卿之賢而有文安望其慎葺而有傳哉吾於察卿有慨焉且鐡厓諸賢皆一代偉人求其後嗣無聞焉而朱氏自静翁以來垂二百年歴且數世世有聞人人皆有集如所謂静翁葵軒玉州福州及此不一而足夫亦盛已昔王筠自譽其世謂七葉之中人人有集朱氏何黍哉鴻泥堂小稿序都穆江隂文士在宋有葛文康公勝仲與其子侍郎常之及丘忠定公宗卿元初則有陸文圭子方後子方又有王元吉氏張希尹氏孫大雅氏皆以述作擅名一時文康忠定僅見其文之一二常之有韻語陽秋予嘗序之子方有牆東類稿今歸秘府張氏溝南集嘗一見録本然邑人鮮有藏者惟元吉大雅之集與韻語陽秋並行於世數君子之沒寂寥百有餘年乃今而得一人焉曰薛君堯卿其文古奥簡質如商彛周鼎雜然並陳蒼緑眩目不俟摩挲知非今世之物其清健嚴宻又如修僊道人僻處深山飡霞飲泉而塵濁之不能溷也盖君少常業進士通易書詩三經屢試有司不利幡然棄去一意古學每有所作日鍛月鍊弗工弗已其為人沉静寡欲而性嗜山水嘗徧遊吳越以至齊魯燕趙之墟尋幽弔古搜竒抉怪惟用資以為文其在稠人廣坐衆方髙談宏辨較短争長君獨袖手黙然若無能者及其操觚搖毫篇章一出則人未嘗不驚且服以為江隂之有人置之孫王之間殆未可優劣論也夫天下之事勢無兩全使君早獲一第人固榮之未必有文若是然則君之困抑蹇連終身不遇天固將以昌其文視世之炫赫一時而名隨身沒者果孰得而孰失哉雖然世之士盖有賤貧而短於文者若君者亦可以無憾矣夫君諱章憲堯卿字也沒年六十未沒時嘗豫營夀藏自為之銘人稱其達三子布卓甲皆勤學好文以君所著鴻泥堂藁鋟木以傳卓來請予文予交君久相知為深遂不辭而書之袁永之文集序陸師道吳自季札言游而降代多文士其在前古南鏐東箭地不絶産家不乏珍宗工鉅人盖更僕不能悉數也至于我眀受命郡重扶馮王化所先英竒瓌傑之才應運而出尤特盛于天下洪武初髙揚四雋領袖藝苑永宣間王陳諸公矩矱詞林至於英孝之際徐武功吳文定王文恪三公者出任當鈞冶主握文柄天下操觚之士嚮風景服靡然而從之則有若李太僕貞伯沈處士啓南祝通判希哲楊儀制君謙都少卿元敬文待詔徴仲唐解元伯虎徐愽士昌國蔡孔目九逵先後繼起聲景比附名實彰流金玉相宣黼黻並麗吳下文獻於斯為盛彬彬乎不可尚已正徳嘉靖以來諸公稍稍凋謝而後來之秀則有黄貢士勉之王太學履吉陸給事浚明皇甫僉事子安皆刻意述作力追先哲而袁君永之寔頡頏其間君天材卓逸文筆華妙自其少時與諸兄尚之補之切劘講習嚮徃踔厲及出接文祝之清芬挹唐王之髙馥論議馳騁與相資沃沉思𤣥詣日進不已既舉進士績學翰林佐政郎署試士中州督學南服盖與當世名卿質正揚㩁務造閫奥於制作粲然動師邃古詠四言則法三百篇而下視韋張作古選則尊蘇李而恥言潘陸綴近體則宗盛唐而罕尚錢劉南征諸賦祖述屈宋連珠三十抗行平原懲邊以儗過秦祭董乃傚弔屈其他命篇鑄詞必則古昔雖率爾占舉亦無妄作盖其志存體尚固將超越千載凌跨百代而學博才贍又有以充之故一時作者往往歛手退避晉江王道思與吳縣顧華玉論古今文章之士獨稱君與武進唐應徳為後來之特無能出其右者北地李獻吉今代宗匠雄視海内少所許可一見歡然如故交賦相逢行為贈且命其子他日必袁生表吾墓其重之如此惜乎中遭竄斥官簿偃蹇不能極潤色之休光論譔之業以鳴國家之盛飾至治之績自解廣西提學僉事即歸隠横塘閉門著述將成一家言以貽來世而年復不永多所未就獨詩文二十巻手所選定其子尊尼刻之以傳問序師道嗚呼師道何足以知君邪顧自弱冠逰君兄弟間極承知奬殆與計偕為賦晨風再上春官寵我行序贈處之言班班在籍感念平生其何能黙乎謹摭所聞以弁諸篇若君官閲世年立身大方則有太史氏志之余故得而畧焉司直兄少𤣥集序皇甫汸兩儀奠位二曜揚輝經緯其間書契攸作文之時義逺矣哉雖有懿徳鴻勲非假典謨曷由宣闡故夀不固於金石而名可齊於霄壤者以此世之談理學者詆為末藝守吏局者謂非適用殆猶茹藜糗者難與道蹯腴之美䝉旃毳者不足與語綺縠之華也矧言本心聲詩縁情靡㳺心内運應物外感性機妙發氣韻天成爰稽作者良亦艱矣匪作之艱知之惟艱匪知之艱言之惟艱此輪扁不能臚斵而伯牙終於輟彈者也羲軒既邈虞夏寖湮宣父釐正之後卜氏泝其源申毛貫鄭沿其流咸能詮風人之㫖窺作者之意歴世近而習說真也倬彼我祖敦詩眀雅皇考纉業哲昆嗣響迺誕仲氏聿秀厥宗七齡夙悟即懋藏膏之志九嵗綴文遂精彫篆之技至乃研詞六籍旁覽百家朝帷不巻夜榻幾穿室人讓麥而莫知侍兒竊饌而無見其篤如此由是學臻博極思覃深湛緬豪士於西州追𤣥風於東晉家稱千里國號無雙兼以氣資爽邁儀容儼肅後進資其善誘末學藉其人倫而余分則友于義同師授雖士龍特眷於平原恵連最鍾於康樂蔑以踰也每有述造輒相詔眎商榷砥奨可得向言方其家食含章與徐生二黄定交筆札之間篤嗜工部既而何李篇出病其谿徑専意建安嘗曰詩可無用少陵也至解巾登仕與蔡王二行人廣搜六代之詩披味耽翫稍回舊好雅許昌榖乃曰詩可無用近體也又與王文部李司封唐陳二編修劇談開元天寳之盛而心醉焉乃曰詩雖選體亦無使盡闕唐風也至為歌行一本樂府而叅以太白櫽括鐃吹之餘猶曰七言易弱恐降格錢劉也故其詩特工五言而七言近體薄不經想余與聫組二京方珂三署被竄則郡檄交移承諱則倚廬同戚雖伯季具邇而敦賞獨深矣試為標論詩盖錯綜魏晉而託宿於唐英賦則馳驅屈宋而逸駕於散騎文則陶鑄班賈而呈範於中郎其為篇也幽𤣥以通思舂容以御氣婉麗以陳詞和易以達理憤懣以抒情綿暢以該事雋永以歸趣其始構也隻字不愜於心片言無艷於目蹋壁窮思擁衾寤索曽不少休是以吟苦則彌日不就神來則下筆立成今稿中或兩字未竄或二語並存致盖宻矣若夫錦必有襲巵非無當茍慙博物疇發斯藴欲倣胡廣於官箴擬劉逵於都賦病未遑也奈何覩姱容而决驟過屠肆而垂涎妄意吠聲詎曰知味哉方其潜心經術睎軌儒林若易序詩說春秋考原周官雜志亦略槩見早謁陽眀洞析道體亦其性静得之若與東郭鄒氏揚山方氏徃復諸書鋒辨莫之能抗至其佐郡分臬坐有餘嘯案無留牘魏懐慈父越畏神君固知㦸臣歎辭賦非夫蕃侯恥翰墨垂績良有以也然才髙妨位命達憎文淪落一官見嫉衆女不令第嘉頌於屬車備清問於宣室是皇猷無潤於掞藻而國典不寄於方聞也嗟乎當宁按圖詎攬燕臺之駿開閣倒屣惟羅葉邑之龍匪今為然振古同慨矣嵗在丙午丁辰荼酷頗有憂生之累貽余春日齋中讀丹經一篇系曰夜來更加竄定庶幾可觀詩之難言如此後世誰相知評定余文此陳思所以興悲也亡何長逝命矣夫命矣夫然年雖中促而名則宏逺矣胡云未究厥止哉余知兄詩庶能言之不特可比申毛貫鄭亦卜氏之亞者也昔孝常次補闕之編王縉表右丞之集顧余謭劣曷克勝茲幸而伯氏運斤二孤命梓芟采精覈都無遺誤猶謂標譽騰聲以俟宗匠聊以習聞余兄之言揮涕而告秦樞俾知先人制作之艱若此云爾三州集序皇甫汸三州集者紀宦跡也今上嘉靖改元嵗在戊戌余為司虞氏閲視京畿時武定郭侯勛慿寵作威日益驕横詔典大匠作隂操部權奪取賈人金以億計歸于私槖余為發摘之又嘗請毁張掖民居名通山陵實益已第余曰此殆欲直取武庫耶持議不可侯啣之誣以慢㫖置之理官于是有黄州之役歲在乙已余為南省司勲氏時當考吏太宰張公潤耄無能為専任郎官罔論賢不肖黜其所素嫉而留其所易與以快已私余起而力諍之言官希附詆以侵職謫為州倅于是有澶州之役亡何太宰為甌寧李公亷才察滯稍遷郡佐于是有括州之役嗟乎坎軻屢遭未嘗損其烈節訟牒旁午不少輟其篇章黄盖楚疆屈賈放逐之區也諒而見疑忠而被謗憂心辟標故多怨誹之辭澶盖魏境䝉莊寄傲之地也虚憍疾視猶有鬭心故多忿激之辭括蒼越稱嘉麗康樂娛遊之所經也時余安常委順若將終身焉既和且平故多暢達之辭當是時倦宦而并減文情避人而間出累句亦足以興慨矣細自弱冠起家解褐登仕躬際聖眀孰不欲出入禁闥優㳺以致卿貳然才滋衆嫉命與時違退而立言豈余素志乎謝憲以來偶撿制作散逸過半田雕禪棲寓楚還山江行新語諸板悉毁于謝兵之手三稿篋中幸爾無恙兒軰請授梓人以應好事者之求嗟乎余政乏何武之思徒離沛郡詩慙謝眺之詠奚重宣城若夫白雲赤璧山色猶存湘水淇流江聲無改一展巻之餘而嵗月徂征風塵奔走王事鞅掌物情變幻宛在目中至今心悸黄甫朞月澶僅半載括三改嵗其久速咸數也昔人愴陳跡于俛仰喻過客于光隂聊以識吾適耳詩云乎哉長子㮊嘗㩦之黄州令校黄詩次琳擕之澶州令校澶詩季榖㩦之括州令校括詩勒為四巻題曰三州云陳約之集序皇甫汸嘉靖庚子余友陳子約之以憲職督學于梁即捐館淇上歸襯越中時太史唐子應徳以上書失㫖免官祠郎熊子叔抑以奉職忤意承譴二子者不逺數千里漬絮酒以入踊望繐帳以出涕撫藐孤於素室搜遺草於名山而後相與别去余方倚廬未果從邁嘗移之詩而悲焉亡何唐子刪定其述造若干巻乃就荆令某登梓而以序屬余申之曰昔先士安假寵於太冲子獨無意哉余不能辭序曰夫聖王耀徳志士殉名是以神龍驤首幽雲景蒸寒蟬發聲凉飈始冽當其生利見之辰適司鳴之㑹履好文之朝遇同時之主凡含經之生綴辭之士孰非摛菁掞藻以緯國華者哉嵗在己丑天子覃側席之慕相君有開閣之風乃緤組諱藝彯纓味道契協塤箎言郁蘭茝彬彬乎號為得人而海内嚮風矣枚朔丘馬迭晉於漢庭陳劉應徐同升於魏室坐論豈足多乎是時也侍讌登歌則家追大雅從㳺第頌則戶起新聲一字之工聞竒而傾耳片言之巧覩縟而躍心紙價騰踴于都門簫譜浸淫于禁掖若陳子者方齡於終童比才於賈生雕章綺合藻思羅開顧英跱一時尤藝苑之選也然而好惡易更盛衰頻復不逮之隙搆見􅀈之釁成斯長沙之役徃而金馬不容于陸沉矣陳子于是稍戢鋒穎卒就繩檢猶且寄興于山川發憤于嵗月周爰于馳驅宣情于羈旅述造益工豈曰在外無竒哉流盻之間不十餘年而向之契協塤箎者邈為參商言郁蘭茝者析為萍梗子竟長逝化為異物良晤愴跡于南皮零落傷心于北海盖謂此矣今考誦其遺編早鑄四傑晩鎔二張遒軫于平原睎駕于康樂麗于㳺燕充于入洛雋永于浮湘備于吳越甌閩間展可傳以不朽異乎湮没無稱者矣柰何湛思棼于吏牒迅翮摧于嶮路雄才頓于促景榮名乖于中夀使鳯池未褫曜靈假年究其所底寧止是乎此運命之奥蕭劉所以互論而董史所以同悲也唐子諒余之言哉因占為序并系詩于末簡夢澤集序皇甫汸夢澤集者齊安王君之作也君名廷陳字稚欽號夢澤子因以名集云父南墩公濟孝廟時登壬戌進士為吏部郎生君穎慧絶倫髫齡即能綴文殆由性靈非假師授黄童世謂無雙倚相時稱能讀咸楚産也君實似之吏部公愛之甚常云王氏千里駒復見此子矣甫冠舉於鄉越丁丑試春官俱為禮經第一廷對擢髙第選為庶吉士與東浙汪子應軫江子暉闗中馬子汝驥許子宗魯任丘鄺子灝大梁林子時曹子嘉西蜀余子承勛楚顔子木暨君並摛藻掞天敷華緯國得人之盛彬彬首是科矣江子為文鈎𤣥獵秘襍以古文竒事指既閎眇語復聱牙令讀者謬根眩霓至莫能句隠口汗顔而罷王君每有所造輒大呌以眎人曰有能増損一字者願以千金為賭恐吕覽金卒莫可得也又好為譏評由是人多陽服而隂憾之矣嵗餘解館拜為吏科給事中值毅皇帝將南狩在廷羣臣咸諌止之章奏日盈于公車不獨言責也王君乃激衆詣闕下上書宰相熊峯石公典司館教危言沮之曰倘禍叵測老夫力莫汝庇也旦賦烏母謡大署玉堂之壁語侵石公公為大慙其縱誕多此類先是忌者以館中譏評語浸淫聞于政府政府銜之書上果諷吏部出補州郡吏竟得裕州夫脂韋磬折不習其容訟牒填委又非所好至則治尚嚴棘不畏强禦法行貴戚有鷹撃之風謁御史不為少貶迺晞附權勢文搆釁稔遂使鍾儀繫冠于楚囚鄒陽按劍于梁獄悲乎今上嗣位湛恩汪濊虚納曲貸諸子稍稍晉復君獨詿網擯棄顔子嬰禍尤烈至使患同黨禁而榮異彚征去均淵墜而進乖薪積世共惜之自後一紀而余忝己丑進士識崑崙山人于都門山人者張詩也雅善諸子間與余道夢澤事因聞其詳余亦濫有時名諸子引與締交未嘗不延頸想見王君也况負才使氣亦與同病尋以觸忤權貴頼天子寛仁謫為黄州理官是役也不以左遷為恨而以得繼蘓長公為榮不以赤壁為樂而以得見夢澤子為幸下車亡何乃乗雪造其廬時君足跡久不入公府余置自外員居由别館君亦不惜造余乍奉半面驩若平生接以杯酒申以贈章辭載集中夫王氏業紹青箱官聨朱紱為楚世家君又令其子暨弟若侄從余㳺嗟乎君何白首于衆而傾盖于余余亦胡為在衆欲殺而在君獨憐也顔子雖清揚未覯而芳訊亦數相聞矣君屏居幾二十載釋戀於爵服娛志于琴書覃思古人専精作者屢勤剡薦恥赴弓招觀其上顧中丞陳監察書若嵇康之絶山宰及寄余懋昭舒國裳二劄即楊惲之報㑹宗其節槩可想見矣君方歛英戢銳撝謙履坦不以才華傲物而以道術誘人使早年砥行能然可優㳺以取卿相然未能宣耿介發孤憤如晩嵗所底也固知書成于去趙賦就于還卭人爵榮名豈有既乎終不以彼易此也夫楚多才之邦而辭賦之藪也屈原見詆于上官宋玉䝉詬于登徒禰衡被害于曹瞞然其志則爭光于日月而其言則等敝于霄壤矣君亦奚媿哉是集也樂府古詩潘陸齊軌下擬隂何五七言律沈杜比肩叅之盧駱文效左氏國語而兼騁班馬書類東京尺牘而雄視崔蔡足以不朽矣凡詩賦十一巻文六巻共十七巻成一家言舊刻于家塾季弟廷瞻刻于淮陽侄同道又刻于吳中而吳板益精矣五岳黄山人集序皇甫汸山人諱省曽字勉之黄氏季子也苖裔汝南葉繁江左武徳由提戈䟽爵奉議以射䇿發科乃知易學起乎將軍刑書𨽻于司法矣倬彼先考維我舅氏鏹積既饒贏貽悉滿山人幼在紈袴雅尚墳典每嘆曰昔謂黄童無雙今安知有二哉遂散金罄槖購緗充架覃精藝藻鬱志儒林糟粕城旦之書寤寐竹帛之業一經口誦允為心極旁通柱下流覽埤官左史尚其能讀東方詎云足用子政謝其愽極中郎慙乎該綜于是文恪公鑒以偉器新建伯期以千里喬司馬申倒屣之接霍少宰垂推轂之奬漁石唐公造次晤語即敦久要空同李氏未奉半面先投書謁遞斯而下鴻公鉅卿咸以交知山人為榮否則為憾詳見自傳事多不載山人雖跡晦丘中而聲馳海表矣乃與仲氏晞軌二俊並駕一時師資友于商榷公是力追古則盡滌時趨忌者詆為别立門戶而不悟失之徑庭矣既而仲氏以明易舉南畿第一山人屢黜乃棄去更治詩亦擢置第一循例計偕登臺展駿都人欽遲朝列虚左噫歌累月觀止而返然薄玩軒冕耽情山水欲長逰名岳託慕向生因號五岳山人嵗在戊戌謝南宫之招締西湖之賞與豫陽田子窮探歴覽更唱迭和賦詩成帙增價藝苑視攀龍鱗税若蟬翼士益以此賢之至夫使者行部守令下車莫不籍其人倫訪以政事雖名在諸生而禮隆上客舌妙談鋒腹韞經笥嚮如應叩泄若縣河聴者膝前靡不心醉自是問字之樽日陳於座上在浚之旄雲爛於戸外山人肺病倦逰𤣥思甘寂繹我貴之㫖達名親之累不為家省鬻書自給深居却掃専意述造乃叙頌髙士以寄志焉迨夫晩嵗絶戀區中結友方外馬遷習道於黄子許詢叅梵于支林故其詩往往娛康樂之清暉屏淵眀之喧􅅽緬景純之仙逰契摩詰之禪理兼以苞蓄既富探汲不竭譬𤣥黄襍組而縟彩炫目金石叠奏而英韶盈耳璠璵並儷而世覯其寳椒蘭俱燻而人挹其芳思劇沉幽語罕仍襲凡象外難摹之景必鑄以新範雖目前塵瑣之態亦縁以華辭宿搆非工食時為敏今品味全集賦頌凖乎騷經詩歌本之古選興寄備乎開元序說叅之二京碑誄酌之六代語苑祖乎充衡連珠合於平原客問擬於韓傳玉畧覈於河上典録昉諸越裳是故鏡理者取為蓍龜愽物者資為武庫儲說者竄為累繩綴辭者采為筌餌又以才猷經世數值違時故鳴以不平言由孤憤年才半百奄隕大命詎不痛哉黄集總為百巻部以十千手自銓勒藏之篋中厥嗣姬水授𤣥肖諸童烏屬草方于文考捐彼負郭夀此遺編嗟乎雕論足傳知徐生之不朽鳯毛早秀慨荀令之猶存余與山人有中表之戚號為相知故序次不誣云爾徐廸功外集序皇甫汸徐氏迪功集六巻為君手自定正空同李子刻於豫章或曰李子稍芟損之其說出于少谷鄭子自今觀之徐集獨綜菁英莫可瑕纇非其佳穢自得去取過嚴乎家兄山居搜逸稿於元子伯虬乃歎曰丹以素掩華蘭以薫奪氣顧變態不窮豈形質夐絶者哉遂選而刻之題曰外集勒為二巻昔人謂長門上林殆非一家之言洛神池鴈便成二體之作若夫窺苦心於初構究條理於終篇推廣厥致無害並存矧操龍泉以議割持夜光而論照即千載端拜曠若神對孰謂後世無相知定吾文者耶嘗考論𢎞徳之間李何諸子追述大雅取裁風人一時藝林作者響臻同好景附咸足馳騁海内而徐君亦獨歩江左矣然而意見枘鑿造詣堂室恥凌好勝詆訶生焉君兼尚𤣥虚守寂寞禄位不顯聲稱亦㣲毛嬙雖艷不悅於凡鳥陽春誠麗寡和於巴人李子未化之談家兄知難之嘆可合而觀矣今或未辨音節罕閑興寄剽綴靡辭詭於風雅俗方貴耳羣起吠聲辟爝火之燔其能争光於日月乎此君山知𤣥經之必傳中郎抱論衡而秘玩者也詩之品藻二序詳焉余故不多評云何翰林集序皇甫汸何君元朗嘗撰綴詩文累萬言輯成名曰何翰林集繫之官也學憲莫君序而傳之間以眎司勲氏余為嗟賞久之盖君自綺嵗從經師逰即厭棄時義耽嗜古文博綜九流研味四始兼抱濟物思効一官試諸生間輒㧞異等竟以數竒蹶於取第惜哉宰相察其才强之起家拜南京翰林孔目地既清華職復閒散俾克覃志著作賢哉相君賈生不為不遇矣先是吾鄉文徴仲氏亦以推擇待詔金馬門後十餘年而蔡九逵氏繼為南孔目嫻於文辭日與上公鉅卿交聲聞籍甚世傳南館集云後二十餘年而何君繼之二君徳學頗相埒蔡性迂立遌風流醖藉何殆過之夫陪都者古所謂秣陵建業也表以鍾阜環以大江地稱壯麗俗號繁華君雅好山水故樂居之每自解曰今我守茂陵之園索長安之米亦足陸沉乎然非所好卒上書自免設勞以訟牒屈以手版當不俟六百滿而邴生行三徑荒而陶令去矣何君亦古之勇退者哉君雖謝秩猶眷戀石城將營别業及桑梓盪於海波柘林殘於烽火遂懐避兵之圖益堅卜居之志杜甫草堂開於潭水羅含精舎寄之江陵加以談若懸河識同藻鑑或咨訪政治或詮析名理君為揚榷古今指陳堅白車騎填門履綦沓座南國人倫更達有道西京遺事復見慿虚其暇日也狎梵侣以𤣥探結勝流而觴咏每一篇出匪但藝苑翕推而閭巷遞誦鳳館詠昌齡之句雞林售居易之篇曷讓焉君又妙解音律晩畜聲伎樽罍傾於北海絲竹理於後堂躬自倚歌尤長顧曲江左餘風不在茲乎昔相如不與公卿託疾倦逰陳思恥事翰墨上䟽求試誦君館中言懐乞休得請諸詩可以槩見至與王左輔趙中丞二書使秉麾當局勲烈亦豈少哉由是知寄興非逺而鞶帨其辭持論不洪而枝葉其說以此言詩與文失之千里矣莫君深於藝者謂君文法劉向馬遷詩本蘇李而近體出髙岑間評覈良確矣仲氏叔皮由進士為郎聫纓南署亦拙官工文方之求㸃云夫華亭自機雲而下往徃有兄弟齊名者二包長謝兩范嗣興靈淑誕祥信不爽哉徐文敏公集序皇甫汸昔余先子中憲公嘗謂汸曰我明制科遇丑輒得文士乙丑吾鄊翰林徐公其選也汝嘗從公逰又為公所取士亦由己丑擢第將弗圖紹厥美歟汝其朂之夫文闗氣運詎虚語哉契革羲繩葛天已飛浩唱音流媧管叢雲遂掞幽詞監二代以郁周忝列國而芬楚詞人間出騷客嗣興炎漢肇基六十餘年延至文景海内乂安化臻刑厝武帝方嚮儒術招賢良徴文學之士以公孫𢎞為宰相擢嚴助為中大夫由是買臣夀王枚朔鄒終等並列左右覩子虚為異時見主父而嗟晚開東觀延賢之閣置金馬著作之庭唐虞邈矣文不在茲乎明興髙皇帝薄唐宋之緒企周漢之隆息馬論道投戈講藝百五十年孝皇垂拱於前毅帝祗台於後治號時雍比隆文景長沙李文正公挺儒流之宗秉人倫之鑒奬誘後進軼軌平津時李員外何舎人又抵掌而談秦漢奮力以挽風騷乙丑䇿士顧文康榜也公與㑹稽董公玘分宜嚴公嵩鄴郡崔公銑雲間陸公深南海湛公若水並在翰林出入禁闥郎署之間則有給事殷雲霄倉曹鄭善夫迪功徐禎卿咸逞雕篆之伎締筆札之交非秦漢之書屏目不視非魏晉之音絶口不談當是時毅帝雖耀武而兼好文六龍北狩八駿南廵之回之曲度紫塞以遥聞横汾之辭望翠華而遞奏雄才大畧殆亦漢武之匹也公之婦翁為文恪王公叅衡亞相合璧長沙乃接芳論於外庭授詩法於甥館所造益𢎞深焉若夫元光發憤以上書建安摛藻於中論東海綴玉臺之詠瑕丘輯珠英之篇遡其淵源實由苖裔公與李何特相友善朝夕揚榷往復譏彈每有撰述輒為嘉賞矣世宗臨御崇儒重道稽古禮文將柄用公羣望攸歸帝心簡在貳秩宗則寅清亮績佐銓筦則允哲端揆與㑹稽均職齊名擬之董賈焉余覽唐子應徳叙中峰集曰𢎞治以前未嘗言秦漢而能盡其才近守繩墨而不離乎法盖病乎世之決裂以為體餖飣以為辭公之文庻幾類此而詩則方駕李何翼響迪功矣或謂館閣之作踈於昉古而巧於徇今不知視草宣麻訓誥之體典則攸宜綸綍之音潤温斯稱差與外制判耳踰一紀而為丁丑舒芬榜也時則江子暉顔子木王子廷陳許子宗魯彬彬盛矣又一紀而為己丑羅洪先榜也時則唐子順之陳子束任子瀚熊子過李子開先不能悉數而余光誦先君之言竊附諸子之末幸矣前之為癸後之為辛推之恒騐否者氣運消息盈虚也夫士閲三榜才僅若人皆首華金歩鳴玉負璽丹地揮翰紫宸宫唱商和霞蔚雲敷朝露溘先晨星零落所不朽者託之斯言悲哉凡古今詩合序記碑銘頌賛傅說襍著及經筵講章總若干首勒為幾巻題曰徐文敏公集云公卒踰三年仲子𤣥成赴闕上書而祭𦵏錫再上而贈典隆謚䕃備踰十五年季子𤣥素請於監司而祠宇考又踰年搜採遺闕刋校訛謬彚次之屬余為序以梓而文集成嗟乎龍門罷御媿任昉之非才鳳池有毛慨公業之不死云爾沈太僕環谿集序皇甫汸稽昔嘉靖八載時膺昌厯運際熈朝帝方典學崇文右賢左戚拔我多士三百二十人庭攬振鷺之儀階肅漸鴻之羽含章曫藻彬彬乎得人之盛推是科云當斯時疇弗欲彈冠晞世䇿足要津紆朱懷金出入禁闥君臣相得坐致卿相然十罕其三者竒於數也又疇弗欲攀附鱗翼炳績恢紘俾皋䕫衡旦之業顯枚馬淵雲之辭修勒勲鼎彛垂聲竹帛然十罕其二者阨於時也奉身林壑委懷圖史託諷詩歌闡道綦訓藏之名山傳諸來裔十罕其一者拘於才也余解憲屏居踰十稔矣曽是在位皤首晨星徽猷煙燼海内詡聞著作鋟布則羅達夫有念菴集唐應徳有荆川集陳約之有后岡集楊汝承有濟南集任少海有吏部集李伯華有閒居集羅熙載有華原集吳純叔有玉涵堂集僅若而人猶或守儒說而失則固或慕仙逰而失則誕或學綜愽極而擇未精或天不假年而造未竟才難不其然乎環谿集者雲間沈大夫鳳峯所撰也君自束髪為弟子員即厭棄時義研討古墳非經緯之書不流於目非漢魏之作不畜於心逮紲組而躋上蘭剖符以領劇郡尋端臬軌復秉藩條所在蒙化去輒留思然非其好也雖訟諜叢積而鉛槧間操吏局塵棼而占綴自適觀其乞改南署引疾東江諸䟽可以想見其槩矣昔人謂閎眇之製必湛思以宣綺靡之辭由縁情而得茲茵鼎之貴不能奪蓴鱸之思熊軾之華無以挽扁舟之興不既深於詩乎子㳺學擅精華士衡才稱俊秀皆吳産也君今其人若梁推文士隠侯居先唐品詩人雲卿其選然雲卿之詩進於驩州以後而隠侯之文妙於郊居之餘夫豫章漢沔之流廬嶽衡山之鎮風景又不特崇山瘴癘也而環谿在九峰三泖間詎减墜石磓星懸氷縈雪之勝乎盖君之作實宗家範無替世美矣且卧髙謝傅尚繫望於蒼生年逼趙昌猶堪承乎清問初服乍反薦剡屢騰終不以彼易此矣集凡詩賦四巻諸文十巻萬有千言大都妙悟神解俱造𤣥乗並可永傳而襍著連珠尤所最得意者余才劣之問敢竊譽於比肩識乏王筠媿要賞於撫掌聊書簡末為同榜得人慶爾劉侍御集序皇甫汸侍御劉子威以所編詩二帙眎余一為客建一為越覽云夫劉子早嵗以眀經擢第拜中書舎人選為侍御史著聲南臺三輔至今猶欽挹風裁同官嫉其能竟遭播遷乃謫理興化移倅吳興有是作也諦覽閩中詩凡所賦樂府盡合古調及所擬名家咸類其人雖鮑照代東武諸篇宫商襍奏而並出雅音江淹擬陳思諸作丹素互施而悉呈艷繢又曷過焉非妙思通方兼才具體能臻是邪載覽越中詩麗則自成沖襟超悟盡去雕篆都棄塵筌如境間花稍落林盡鳥忘還華滋紛易歇芳願坐成乖自是煙虹驚藻思可煩花鳥入閒情足稱秀婉又江路愁能盡鄊園夢懶尋聊慿寄衰鬢為道未歸心哀而不傷得風人之㫖矣矧靈巖仙鯉地接武夷天目苕霅溪通罨畵足以展眺興懷余弟子約與侍御同榜亦由水曹出贰茲郡凡有占綴每相商㩁江山助藻於燕公羊何附聲於靈運寔一時勝遇非獨窮愁而已若其眀允折獄庭寡諍詞沉靜當官坐惟長嘯乃克殫心於藝焉夫詩闡成周漢魏繼作齊梁稍靡迄唐始盛盖唐以詩賦取士故士之工詩猶漢之經術有専門焉如從逰應制必品其髙下學士競掞於外昭容評可於中雖讌集賡唱亦私為甲乙推其擅塲故詩益精焉稽古柏梁而下從臣第嘉於屬車華林以前副君課美於即席盖同揆矣今輦轂之下絶口不敢談藝遷謫之人尤所深諱乃使仰楹而纂言杜門以覔句侍御之作有未及覯而賞之者文本闗運道固因時寧不重可慨哉侍御業已遷臬終太夫人䘮將赴闕補職嗟乎長卿輟吟於巴嶺夢得申詠於𤣥都其家範驗之此行矣祝氏集畧序代張中丞景賢作自昔文蔚吳中才臻江左言偃業於孔氏獨得精華厥後嚴朱並緯漢典顧陸競掞晉庭方朔寓為書師伯喈隠茲談藝彬彬盛矣其為俗也民有輕心士多師古伎尚竒巧物必精良故覽左生之賦而騐山川之巨麗誦平原之詩而測土風之清嘉考持正之序而覩氣狀之英淑至乃翕輕清以為性結冷汰以為質喣鮮榮以為辭美稱竹箭粲等春葩且至徳造自泰伯峻節亮於延陵故士之生也往往玩睨爵服趺宕琴史雖輡􅀈未遇而撰綴不輟申孤憤於一朝流芳聲於千載此王孫之詡我公子者也余家食時盖聞祝枝山云迨逰京師每學士大夫持其片言十翰争相傳眎咸加歎賞惜乎未覩其全也丙辰之秋叨奉簡命來撫茲邦軍旅之暇躬歴山川周爰土風延眺氣狀其嘉麗英淑固無爽於乗諜所載也竒巧精良物産工師猶昔也握珠抱壁文獻之彬彬具在也間詢所謂枝山公者則已物化三十載矣而公之元子方伯續謝秩屏居亦久矣訪其廬蓬逕蕭然也索其籍珍發篋中也翰墨僅存其一又蠧所殘缺也盖公少落魄不事家業而方伯克守其祖參知公清白之遺力莫能梓翰墨為時所重書竟人皆持去家無餘也世徳其賢矣哉公諱允眀字希哲性靈夙授機敏黙成五嵗而手作徑寸之書九齡而目兼數行之覽稍長益篤於學夏無巻帷冬有穿榻遂綜貫百氏銓析九流窮鏡𤣥緇覃研緗素雖輶使未譯爾雅闕載靡不究而習其說焉其為文也芳腴融於心極雕繢暢於辭鋒取無竭源叩有餘響分吏占牘則十紙互通對客揮毫而千言立就同時乃有揚儀曹之愽極都太僕之沖澹徐迪功之俊婉唐處士之縱誕公將兼之自謂取髙第反覆掌耳乃僅舉於鄊晚嵗試宰興寜超倅京兆著有異績皆非所好也因自免歸而四君者仕罔通顯業並終窶謂非伯季之風節激之然耶諦閱公集述道徳則闡而弗畔紀象緯則覈而有徴論政治則可推而行陳事情則委曲而欵談名理則標顯慧宗志靈怪則不誣幽秘至夫賦綺靡而有則詩藻贍而寄深辭託諷以感物聲諧律以赴節神搆匪襲肺吐必新體裁具偹意無不逮者矣鳴匠如公不獲振鷺羽於彤階奏鳳音於清廟亦命也方王文恪掄材之初徐春卿揚譽之日豈直以鉛槧垂聲哉思欲銘彛鼎而不偶者也悲夫悲夫再閱大逰一篇則又譾䝉叟之巵言陋公孫之繩辯逸騁雕龍指深喻馬探其襟抱將扶揺宇内豈區區搶揄所可控而笑哉昔魯肅披巻以臨麾燕公視學於戎幕予愧非其人悼徃哲之不作而懼斯集之久湮也又先大父與方伯公同登進士忝茲世誼圖為鋟梓時則蘇守雲中温君飾吏右文樂任其事用廣其傳云集之分類凡十有二曰騷賦曰樂府曰古調曰歌行曰近體曰古體曰論議曰書牘曰碑版曰傳志曰記叙曰外教勒為三十巻總曰祝氏集畧皆公手自編定富矣哉其四君著作都未閑於辭賦唐則篇章寂寥揚復簡帙散失傳者徐集耳公别有祝子通祝子罪知蘇材小纂浮物蠶衣太中遺事野託興寧縣志祝子㣲祝子襍語怪慙鐸音江海殱渠記多未遑及後有好事者因予興起庶搜輯羣玉不使韞韣名山也是為序編次仲弟少𤣥集目序皇甫沖上帝發祥錫我皇甫乃有樹名周室紀績耏門由茲以降鮮不有文以華中國以昌休𦙍是故周書述㣲子之命詩人載有客之篇其來尚矣炎漢徳衰𢎞農慷慨陳辭束身歸黨觀其對䇿日食應詔自效自頌諸篇史稱言不怍其心矣槐里削平禍亂功髙不賞閻忠干說拒而謝之曰委身本朝守其臣節雖云多䜛不過放廢猶有令名死且不朽反常之論非所敢聞嗟乎此言雖與日月爭光可也𤣥晏自以漢人不仕魏晉託言尫弊棄跡丘園後之君子知晉徴士而不知漢逸民亦不亮其心矣若夫愽觀宏覽時號書淫守𤣥釋勸可以見志髙逸世紀可以考學豈以侯王屑意乎時則傳烈女而龎娥釋序三都而左思顯何其偉與李唐之文至昌黎而三變近道持正首得其傳著在文苑韋處厚稱其排百氏之雜說判九流之紛蕩徴㑹理軸遺訓辭波踏正超常曲暢精㫖比之賈誼劉班云一時操管之士若温岳松枚彬彬乎競美矣而茂正孝常則入室崔王方駕錢劉安定八宗於茲為盛盖自徳參以𢎞義眀公之屬直言事太宗而談文者與唐相終始也五代以來寥寥無聞吾仲氏子安考求先葉至宋元之際未常不撫巻歎息以為欒氏之下降杜生之既㣲不是過也爰入我眀籍鳳陽者以武功顯㞐睢州者以望氣用寓安東者以鄉舉達子安謂予曰是皆未足以重吾宗復其世業而光昭之固在吾等耳於是苦心研力窮搜邃討博采精思謂非馬班曹劉不足以詣其極盖今之為文者王宋稱一代之宗李何為中興之冠然王宋反元習之靡而不能不病於聲李何矯一時之弊而不能不泥其跡故其為文雅意於史漢莊騷間而於詩獨有取於迪功然又狹小其篇章乃刪其遺文以為外集嘗歎曰㑹諸氏之長以追六代迪功其庶幾乎子安刻勵二十餘年其性敦靜簡黙又能致其深沈之思其於詩鑄辭精而為㫖逺體骨竒峻辭彩英發陳風諭則婉而不迫叙政事則直而不俚頌功徳則艷而不誣不取妍於一字不求工於一辭肇端莫測歸趣難探詠之而有遺音咀之而無窮味使觀者動心說志又以拙宦不達多感慨之辭亦憂患之意與擬議而談則建安開元之盛盖瞻忽間耳子安之在藝苑猶機軸之有文錦廪庾之有秬黍而吾宗之有子安則衣裳之冠冕而居室之棟梁矣惜乎天不假年而竟止於斯也子安卒之眀年其子秦樞捧其遺稿請為刪定展誦灑泣掩巻而起者數矣今年秋秦又申其請遂飲痛而為類編之稿凡十帙已於㞐蓬二集十取其一而不足仕使二集十取六七使旋客魏金陵三集十取八九而有餘東覽則子安之所自定也若其散篇漫簡殆與十帙相半則僅以類從不復得其日月之先後矣摠得賦一巻一十四首樂府一巻四十八首古今詩一十八巻八百七十九首書序記表雜文五十五篇題曰皇甫少𤣥集以示秦樞二子不惜空匱命諸梓人秦樞可謂能子矣可以為孝矣刻成請子序之嗚嘑子安刪定吾集欲為吾序而弗逮也吾逮序其文矣吾何辭昔王元禮七葉重光名徳為盛劉孝綽宗人七十聨華當世心切慕之故於先世之文采諸散亡編其遺軼既輯先大夫五集與所著諸書又取大父韋菴公詩文集而刻之今又見茲集之成也能不為子安喜不為吾慰耶雖然青箱之學屬在後人三都之文必資名世予但序次其目故稱先人云若其標譽騰聲程徃鏡來以永遐軌虚諸首簡俟擅辭宗者徐迪功外集序皇甫涍僕昔耽藝究作者之林卓彼徐君雅擅音藻岩棲暇日徴訪遺文得徐君詩百餘篇於其家予刪其半刻之為迪功外集徐君有集六巻刻於豫章北郡李子序之所云守而未化蹊徑存焉者也集君手自選定予所得百餘篇者皆其棄餘然尚多可采今詡於藝者弗逮也又所次存綴厥㣲詭於流轍庶翼而傳云惟君華郁其思天然特稟尤長賦頌之文其所用心盖自漢魏以迄開元天寳之盛無弗窺也夫詩之為藝獨異衆體作者韻度鮮朗情言超瑩而原其趣參之以神要其搆極之以變考則古昔徃徃冥契嘗謂徐君之於詩可以繼軌二晉標冠一代斯不誣矣夫并包衆美言務合矩檢而不隘放而不踰斯述藻之善經也奚取於守化而暇詆其未至哉始君弱冠為文賦即可垂世而人莫知之然於詩未為工而榆塞嘆西閶吟等篇則既藻麗如梁陳間語顧人弗稱即他詩最纎下者輙稱之不置而其人沉淡不競釋褐交李子最昵時宰屬君代為之文君揮之弗顧以此坎壈終其身李子當𢎞治正徳間刻意探古聲赫然君與辨析追琢日苦吟若狂毋吝榮訾卒所成就多得之李子而其知君顧未盡况非李子哉古曰知難久矣夫諒哉悲矣吳郡皇甫涍子安序明文海巻二百四十二
