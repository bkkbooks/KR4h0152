body:
  text: 明文海巻二百四十七餘姚黄宗羲編序三十八文集七十行戍稿序周復俊安寧丘君文舉為予言升菴生平著書凡九十三種行于代者僅四十六種云乃若七十行戍稿則公晩年所作而文舉輯之楊生富春手録也嗟乎公以師臣元嗣年二十四即舉進士第一官禁林門第科甲亦既通貴清華極矣頃議禮不協恩譴滇雲由嘉靖甲申遡已未葢已三十六祀其客路之悲辛旅次之岑寂歎風雨之淒其感日月之征邁悒鬰亡聊或情與景㑹意象融適率于篇章寄之加之天賦不羣超悟卓絶博學强記至老彌精故其所著若是其多且麗也假令公出入承明武不越輦轂下而山川之嶔巇草野之蕪曠人情物態之糾紛迮遌均弗經于目亡拂于膺則搗練未精諏詢罔悉而乾坤海嶽之靈淑亦何由俯仰旁稽以窮其變縱于論思啟沃之暇敷文代言自宜華美温麗不若窮而後工如其工也孰與今多由是知天之申錫今上之陶鎔於公獨至矣憶自嘉靖乙未至甲寅俊三入南滇載仕西蜀凡二十餘年恒與公握手接膝散帙論文闌夜申旦開諭勤拳實兼師友之誼且祝母有文訓子有誥申貺有篇亡慮數十百札公之于俊何如也今兹來遊忽覩丹旐飄揚于昆池之上而文舉所輯戍稿適携而至慨歎疇昔不覺雪涕之無從爰命梓之流布海宇而其所著書併疏其目于左方庶學士大夫知有攷焉楊升菴集序周復俊予少聞揚子雲其人湛黙自守不欲矯然于世意其中若無餘者及觀甘泉河東長楊解嘲解難厥辭􅔿潫凌摩盪擊飄轉流互儵曶如神至太𤣥法言奥矣又何所暢懸殊也其懾桓生屈侯芭有以哉皇明光嶽氣完英賢雲蒸文道古雅滇南戌史成都楊公慎興焉人皆云今之子雲其信然耶公幼慧頴八歲即㸃綴儁絶二十四舉進士第一少師三南楊公設四事詗之皆生平所未了公從容酬對本末融貫少師歎曰此眞才子既紬文石渠預觀閣秘進詣逾湜而逺未㡬恩譴滇雲違丹禁而就朱炎辭宻親而之荒戍萬里于邁人何以堪公神襟灑灑旅棲髙嶢扄絶世務時與韻士浮艫㳺韁窮金碧林泉之勝人間斷簡奥篇延搜極殫行㳺飲嘯唫披不徹獨舞之暇著書五六十種扶疎浩蕩考訂精宻篆𨽻草眞咸臻厥妙嗟夫古人之學可想也漢以降儒或博而不精或精而不博迺今兼之以故含英擷秀之士識或不識皆宗尚焉當此之時寧知公與子雲其孰為雋也君子曰大夫低回新室竟䝉投閣之恥公揚音吐氣于聖朝雖投荒三紀寂歴以終不逮翊皇猷輝帝制殊可悼盡方諸子雲一何夐邪公為文憲章遷固翺翔晁賈總轡于屈宋染指于王劉濯纓于權栁而扶搖縱恣有其似之不必摹擬而始工則奚止馳駕子雲已乎公自稱訓詁章句求朱子以前六經永言緣情效杜陵以上四始今兹所覯特九鼎之一臠旃檀之片香已耳俊往時總憲蜀臺邂逅公金沙寺謂予不鄙斯集幸刻諸吳中予旣口諾心許之慨徐劍徒縣嵇琴沈響爰次遺編并叙其世庶來葉有考焉刻南中集鈔叙周復俊癸丑夏五余三使南陲訪升菴先生於連然海莊未覿也久之緘鯉徵鴻貽音授簡以南中集鈔梓繡未精丁寧彫易先生詩刻在人間若南中集二巻南中續集二巻手書升菴詩二巻升菴楊先生詩二巻皆已映色瑶珪騰輝虹漢顧鴻辭麗藻登載實繁裔楮殘章散遺不少近從記憶逺逮蒐披小市孤林方珉片碣凡慈宫仙苑之留題竹宇松亭之揮灑涼縑暑箑之所流傳漁舸樵扉之所斂蓄曠若二時俄堆簡素而乂獲連然諸生入門髙弟知余篤好千里惠將亡異鱗屋飛珍鷄林薦馥矣余乃撫几而歎曰此江潭澤畔之吟太乙藜輝之燄也登臨㳺矚之遺金馬碧雞之光也茆茨蓬藋之韜文苑木天之儲也海童蘆笙之倡明庭清廟之奏也余何敢忘焉余何敢忘焉嗟乎子雲未老寧無擊節之桓譚季雅有文行見賜纁于光武乃若先生之詩權衡千古操縱百氏列錦合綦含英茹實驅馳漢魏肯與顔謝比肩掩抑齊梁何啻徐隂接壘斯則奎緯有章神化所至非東吳菰蘆中人所能知也刻成視前上巻通為二巻云顧行之集序周復俊始余識行之于林臯也從陸墓楊甥行逰散至浦口見一宅門舍晻藹上書柴門次流水乳燕度春雲意其中必停雅人通刺候之倉卒接晤論吐蒸洽遂怡然相彌日始退便定交于籬落之間桑竹之䕃矣君長才博學風神儁朗内受靈沖徜徉不覊故藻翰之工㸃綴氤氲景效㫸前情融世外尋其累牘率如春雲流水之音始歎其駿今愕其贏矣系本世族蚤折桂枝茂承箕裘之緒充其所挾料佩玉紆紫咫尺斯近蕭然夷曠不以時務經懐既旅進旅卻年髪稍頺川途盤桓時境岑閴覊思所牽亦増累歎毎結情于林澤寄況于樽斚而尤恣于篇章怨而不誹憤而不激視緼袍如黼裳等蓬宇于綺閣可謂得風人之正者矣明興詩禮聿新自吾郡太傅徐公泊崆峒大復輩出力培古雅浣滌頺風衡璣逥斡學者宗焉而君以𤣥識清襟適遘時㑹非徒排比敷勻音律流暢尤顧瞻風雅存尚風骨一篇一咏光采照人譬之文輪玉輅陳載敦鼎驅馳于清塵芳草之郊觀者咸仰其輈輹之堅斿干之麗也是弗得為正始之遺響乎夫詩之教微而其為韻也逺微斯淵深淵深斯叵測茍非學窺百氏則不能含包千古而致極其精迺若其韻命之者天授之者神英英郁郁與化俱生冉冉焉溶溶焉如水上花漪雲端月流又如月霞灝氣飄帶林岫雰霏映蔚可挹而不可盡學循滋習大道可通韻非化甄不可强得故知韻者詩之所由汙隆也無病學之弗充惟患韻之弗足聲歌非韻莫楨矣則詩豈易云者哉行之洞示今古式準諸家刋削模儗止絶揮霍而繩之惟中雅迫唐初恥攀元宋宫徵務調其音方圓不爽其度情藴夫辭色銷于象泯然無蹟混以化遷亭亭如也軒軒如也與外縟中稿閱未終篇而倦者天澤矣斯非學與韻兼勝者邪顧懋仁見之歎曰洋洋焉懿哉夫詩乎行之世居郡西周山有林巒之勝父終藩㕘家劇清約其棲陸墓葢依婦家楊氏云集凡四巻古今詩四百十四首雜文二首蘇長公集抄序顧冶山羞海錯非不珍也然以之常食則不如榖氷綃霧縠非不貴也然以之常衣則不如帛有淺丈夫者以為帛與榖之不足御也斤斤焉珍貴之求而人亦遂以是羣而和之甚矣人之好怪也世之言文者何以異此其言曰我進于古矣吾尊周秦而卑唐宋矣凡文之所以衰者皆韓蘇數子為之也嗟乎韓蘇數子者其見豈遽出若人下哉彼誠有以自蛻者固無用此區區肖貌為也且夫古之人專得其神故惟恐其有所似而其眞獨完今之人專得其形故惟恐其無所似而其眞彌䘮神形眞似之間斯古今文字之辨也余少而最喜蘇氏父子之為文而喜長公尤深謂其縱横類子長綜覈類賈傅𤣥虚類莊生變幻類佛氏忽來而莫知其所由來忽往而莫測其所由往澹而實濃質而實綺辟如人終日食榖而曽不厭口終歲衣帛而曽不厭體此亦眞之至也神之極也故曰無味而味出焉無文而文生焉若長公者近之矣於是即余生平有當乎心者命兒子悉别而抄之凡八巻總若干篇葢非獨為兒訓將使天下文士以似亂眞以形奪神者其或有寤焉耳故陳光州鳴玉園集序顧冶往歲甲戌故友陳貞父自寧鄉徙寧州已而坐脱賊黨歸則著客憤以發舒其鬰鬰不平之氣其寫盧源顛末白甚當途者寃之方擬嚮用貞父而貞父固不芥蒂益理鳴玉園以自快每交霉雨横溢貞父輒股引囬斗諸山水直走潢池魚薄間沸若崩雷飛雪也嘗邀余坐浮青舫見萬魚縁亂水而下細者撥剌跳沫無算貞父顧縱之去而其尋丈者差不肯受約束忽而屈强作人力勢如拔扈矜雄者貞父竊大笑是復欲類陳家老子邪亟命園公數曹共挾之因喚姬人騁金錯為鱠氷絲紅縷照耀雕俎中不覺空堂晝寒綠酒増色也當是時賓客共厭粲罷余乃叱箸而起曰今法網稍稍宻矣卒不就理者豈罰太重賞太輕乎貞父以為不然夫賞罰者上所以礪世而非下所以自礪也要在罰而莫測其所由怒雖薄必威賞而莫測其所由喜雖小必勸如其可移之以賄賂而不辨之以貪亷則其法窮而無所施各希冀于他日之得而規避于一時之失其䝉厚賞峻罰皆具文也將安貴法矣吾故曰苦無法于是余進曰然則尚嚴乎貞父又以為不然今夫豪傑之士非如羣兒爭膏其田宅肥其子孫而已也固曰吾胡然而不負上者及其竟也齟齬于資格而不得越牽制于議而不得專方且以因循為老成方且以含糊為忠厚設有大役始而聽此人焉捐鉅十萬姑試而漫嘗之不效也既而聽彼人焉又捐鉅十萬已輟而更作之或昨是而今非或攘利而掩害舉一切非常難奏之功都付之茍且依阿之手其幸而成則吾享其福其不幸而敗則人受其禍天下卒然有故泛泛如横舟不繫而豪傑之氣已枯竭而無餘矣尚何以為天下吾故曰苦有法其惟有法以御庸材無法以御豪傑而後可余聞而歎息者久之殊悲貞父老不盡究其用居二年丁丑十月貞父以蒲州趣之北而適有太白為彗其光竟天閃閃如懸旂也余送之更酌貞父曰長庚勸汝一杯酒貞父其行矣蒲州誠知人定有當于貞父者比赴銓部僅奉例左官知寶雞也貞父雅不耐折腰溷風塵吏未到官首登華山拔希夷峽餐玉女蓮華抵李白呼吸通帝座處頗文而記之累千百言至數其犯死道凡有八不似昌黎徒狂哭為也亡何再遷光州治愈寧名愈盛竟輿病還卒于家矣於乎余今乃恨格之能死人也貞父卒之九年已丑春其伯子爾耕痛貞父不獲信其志獨念貞父文章多英爽駿烈酷肖其人初不學他子削鐻刻葉以鬭工呈巧第私所欲吐便自娓娓落紙不休尤長尺牘藏者榮之耕謂梓傳于代麤足慰貞父九原而屬余校定總若干巻顔曰鳴玉園集亦貞父遺意也余晩而交貞父然誼最堅不宜以燒筆硯而無言者幻眞子曰昔虞仲翔云海内有一人知已死可以無恨甚矣心相知之難也貞父剛腸勁氣摧倒當世偶限于上第遂蹇蹇州縣没其身乃至今海以内知貞父非一人寧獨以政事文學抑德之休明不誣耳貞父不死哉貞父質行具載本傳弗論論其有關治理與余燕語者次于篇紫峯文集後序丁自申紫峯先生文集梓於家塾梓於書坊海内爭愛而傳之寢病未廣自申之入蜀也則取令予及峰君所遺抄本而翻刻之既以請於文峪毋公序其編次矣復不揆蕪淺而掇其後曰惟文之弊於今有可言者自周文郁郁誥誓繼謨訓而傳歴漢而唐而宋代有作者各以所長傑然而自鳴一家秦與漢之不可為周與唐之不可為漢宋之不可為唐也且言人人殊非獨其世則然自曽思孟著書同宗孔氏之道而學各有從入言各有攸當要以文其意之所欲言闡其藴之所未發其為道相謀則均也彼老列莊荀數子雖皆為偏曲不該之見然彼馳騖其精神鼓舞其筆端騁雌黄之雄辭而爭為道術矜赤幟者今其書具在人自為家可讀也何至如今人没身塗俗學之口耳而張吻談秦之糟餘哉夫唐宋文稱六大家氏推本韓祖孟歐祖韓栁與韓頡頏蘇父子一門曽王一時較相考訂而其文務去陳言前後相掩不可謂非步秦漢絶塵者而無秦漢一句一讀何也鎔金在範色象肖而規製别矣豈今人命辭顧出六大家右哉宋人有言黼黻刺繡良錦也尺寸而割之則綈繒之不若世之刻意班馬句字而模倣者皆割錦之類也即使優孟似叔敖吾猶惑焉今觀先生諸作本孔孟之學術程朱之義理而發以自然之文章固不當與文人題品然其推嶽倒海之氣媚澤輝山之精卓乎成一家言未知與數君子相伯仲何如自申恐世之讀斯集者執蹊徑以求先生之文將茫焉而無所入故為是說以質正焉若先生之吟咏性情則愚嘗以比於宋儒康節方追悔少作而以為未盡也觀者因是文而得其意于文之外或可以想見先生云巾笥集序丁自申昔之論文者曰文章與時髙下夫文章髙下因人者也虞夏商周之書無論已今學士大夫言文人人率宗西京豈不謂西京去古未逺有雄渾宕博之氣觀其文知其世然如司馬賈董數子可謂炳炳然西京者矣然子長之文奇相如之文麗賈誼之文激發大要以其周流歴覽比類寓詞與夫少年之英邁據其才情性術各有所至而言人人殊矣由數子而他可攷而知也惟仲舒氏以其下帷發憤之學其言最為近古不惟天人三對考見學術而正誼明道寥寥二語世孰有加之也仲舒非所謂西京獨冠者耶數子者生其時與相先後而文則大致相逺今所稱西京文者直取子長以下句比而字肖之輙以為入漢堂奥而曰古在是古在是不知漢文之所以近古者為有仲舒不背六經宗旨也其淵源最近古云稍後劉向匡衡者出皆相繼明經術為儒者宗以彼極諫封事與治性戒妃匹諸疏何其言論淵懿有六經之遺則文章信以人為髙下槩委於時者非也必若西京四百年後其文已降則韓歐生於唐宋乃為力追古作其時之漢與不漢奚計哉雖漢時亦有傑然獨出其文不羣者如仲舒衡向是已若瓊泉先生之為古文也其自以意而為之古者也先生蚤歲受詩治匡氏之學而博極羣書洞貫性命長於發明經旨即董劉未能或之先者始先生弱冠魁閩中主司梓其文為程式遲十七年而後舉進士先生於經學可謂如釀之醖如繭之繅其為古文所由來者逺矣按集中諸作多揚㩁風雅比經傳義而美頌直規逺引廣譬雖極貫穿博洽惟斷自經史而戰國䇿韓非稗官小說之書弗與焉至論其體裁渾雅意度悠揚則自西京而上其屬辭不必同自眉山而下其命意不能到當必有鑒古者能評隲之矣先生昔為留曹其文盛行時有談古文虎視西京者士類籍籍爭慕也然先生守所學自信益篤久之士論亦翕然以定夫士類而果籍籍西京也則先生其仲舒向衡漢文之傑出者乎抑不然也則願先生且自處於唐宋之間不聞論文者以韓歐二氏為非古也某淺陋惡足以窺作者之庭第不敢謂於經學藐無所見故直知先生學有所本其文一以意為古而使天下不敢以異世而殊視古文者或於余言有取焉集舊刻於筠陽為筠陽集今合續集刻之而易今名則先生所自命云袁永之集序王格余與袁永之生同嵗方永之發解南畿也余亦舉於鄉明年同第進士讀秘館書日與永之出入承明相周旋也次後彼此官轍雖不得一律然以永之之才而竟終於外臺簽書余之罷河南也又適與之同牛驥同櫪在永之固為未究其用而在余則已幸矣昨丁未之臘永之嗣子尊尼以所刻永之集見寄且屬為序當是時永之葢已下世余泣而存之未有以為尊尼復也嵗月易除倐忽更十有七八載矣而卧病江渚亦五换嘉靖之厯平居塊獨諸念皆息而獨於海内故人之思有不能忘於夢寐者况與永之踪跡之同又若是邪頃兒子宗彦逰太學曾見尊尼尊尼意若有望於余者噫余何人而顧於永之有所靳也謹畧載平生所與永之逰談之概而庶幾以償其宿心曰嗟乎文章之事以其時則稱於聖朝者嘉靖為極以其地則稱於中夏者三吳為盛而永之所以自處與人之所以稱永之者皆不肯居後永之居館中時其聲譽甚隆余下方之士固不能有所窺瞷及余出為縣朝於京師與永之相見則永之以典試歸自大梁也向余道其在大梁得見李崆峒語言頗悉余時逐逐困吏事亦不暇諦聴後數年余督餉姑蘇訪永之於桃花别墅時永之以徒中居憂而余又即署進止自便故與永之始盡平生之歡其談及藝文亦不似曩時之草草矣永之語余曰杜子美詩人之富者耳其妙語蓋不及王孟諸公又出所選唐伯虎集示余而定其評曰伯虎才甚駿惜流落後不自檢束大墮於樂天隊中耳故所存伯虎作百纔一二語稍涉樂天即黜之嗚呼永之逺不喜子美樂天而近於伯虎所稱僅此其際果易窺耶今全牒具在讀者取其言合而觀之盡可以得永之矣永之耿介有直節在兵曹不能媚權貴人故緩急無左右之者以至得罪其視學廣右又恥絀體其大人卒上病自免其果决自任如此文章葢特其餘事耳余昔赴永新也永之贈詩曰一官淹驥足百里試牛刀仕姑蘇乂贈詩曰十年一見知非易楚水吳山莫浪分此二篇余寶藏之猶在巾笥手跡宛然而謦歎則不可復聞矣傷哉傷哉余非敢謂知永之而其慕永之則非淺世固有知而慕之而視余乂能特深者幸相與推而明之書昌黎集後王格退之千載之文雄也自有退之而世之推而尊之者至矣何假於余言為重耶而余於退之則有深悲其見詘而不能不為之辨者焉夫自東漢以來學者習為綺麗之文代相祖襲侵淫至於南北朝極矣唐興餘風未冺上以此求士下以此自媒淪於心骨而莫覺其非葢八百有餘歲而後得退之退之生於流離孤獨之中非有師說導授及科禁示之趨避也而一旦起而矯正之今觀其文大抵忤時背俗與唐人若異代然者雖衆共非笑而所持益堅以卒抵於成其原道原性原人佛骨表諸篇雖辭旨所極未必盡合世儒銖兩揣摩之嚴然大要尊孔氏排異端扶斯世而反之於經自孟子後一人而已揚雄王通之流未足多也而又氣韻豪勁才力卓犖凡事之所當言與心之所欲言一經其手輒指切如在目前而縱横曲直輕重疾徐隨所向而皆得如意眞若與神遇而莫測其心原之所起者此退之之所以為能而世人之瞠乎其後葢以此也當退之時人已尊仰之矣及宋歐陽永叔蘇明允父子相與表章而退之之名遂益大顯於世厯元逮吾國初曽未有訾之者𢎞治正德間海内無事人文勃鬰遂至異論紛囂譏􅅓前古而退之亦不幸而與其擯棄之中至詢所慕尚則動以六經左國秦漢六朝為言如退之輩恒鄙偶之置度外耳於戯為此者其亦知退之莫能深乎夫以退之之才豈不足方駕古昔者色色而雕刻之種種而模擬之不求其神情而惟取其形似在退之當更能耳然而退之必不為此者恥蹈襲之不足為而欲自為其家也夫恥蹈襲而欲自為之則凡今人之所誇以為髙而欲陵轢退之者迺退之所羞道而不為者耳而何以服退之之心乎且退之於古人之文所以包舉而採掇之亦不遺餘力矣特其繩墨所到心匠由已力能融貫之而不見其迹耳故余以謂退之學古而不泥於古如今人則直謂之古矣此所以異也使退之而亦如今人之為捕風逐塊而不能有所自立則何以驚動千古而其言至於今不廢耶昔宋之中葉其文亦過於艱深若劉煇輩所為是已歐陽永叔從而排斥之以歸於雅馴而復乎退之之舊故後世言文者毎以宋為凖的焉則永叔之功於是為大也嗟乎今時亦必有永叔者而後其頺波可止余非其人也然所見如此不敢以不盡又安知世不有由吾之說憐退之而寛假之者乎夫使退之而果見寛假則其於為文也亦必有所折衷矣書臨川集後王格夫介甫曠世之逸才也議者徒見其非薄宋制創立新法卒之黨同已排異議以醸成靖康之禍遂從而詆訶之若㓂讐然亦過矣夫世之士學古纂言竊仁義道德之腴以恱澤其辭而取禄位者其自待雖孔孟無以過之及攷其所樹立往往脂韋勢利視其言百不一酬如是者古今不少也余觀介甫之人亦採摭百家蹂躪羣籍而自舉已意以鍵制之其所稱說憂憤動必依於先王而奇辭逺旨多有世儒所未窺者變法之端已見於少作葢其生平不肯以流俗自處其髙才銳志本如是也一旦都要津受知世主遂盡舉而力行之以為堯舜之治眞可必其親見者斯豈有意於亂天下哉自信之大過而弛張之無漸也然較其言行亦畧相符葢庶㡬古人所謂㓜學壯行非茍為富貴而已者也當介甫時大儒輩出程張諸君以道學顯歐蘇諸子以古文名而介甫介其間意葢欲兩取之觀其議論可見矣然而卒無以勝而其名乃為衆賢所掩至論其實亦無甚媿焉所可憾者遭時太驟而畢露其底裏以成其僻遂為世所指目耳假令所涉稍蹇亦如正叔子瞻之遇於時而畧低佪於儕列之中則人方珠璣其唾餘扼腕其用之未竟以為宋之天下惜矣何至鄙薄而怒斥之耶介甫有言人言亷潔而直者非終然也規有濟耳又謂八司馬皆天下之奇才雖䧟於不義而猶能自强以列於後世於戲介甫亦不幸而類是乎余又稽宋之末造羣奸竝進固介甫之所遺而國勢所以不競者其原誠在於此然才賢之生不必皆世用而天欲亡人之國必盡使其不肖之人布列於位以壊亂其所為宋至徽欽天時人事可知矣雖微介甫能保滿朝皆君子乎即使皆君子又能保完顔之不南牧乎而其咎乃盡歸於介甫所謂君子惡居下流天下之惡皆歸焉者也亦枉甚矣昔朱晦菴列介甫於名世而國初蘇伯衡稱古今之士自左丘眀以下僅二十餘人而介甫亦與焉嗚呼以此論介甫庶㡬得其平耳附原刻任少海稿序王九德德少時讀鄉賢髙蘇門所叙任文抄略葢稱固陵先生始舉進士奉大對今上親題其文直詞絶識名冠海内當是時蘇門已即世不可問矣德問之東都士大夫乃知固陵先生者今虚陵洞天隠君子任霞父也後來德歴官司㓂司徒則又見薦紳中亟稱任先生在世宗朝以清修方正著聞初從翰林改吏部為考功大夫骨鯁自持不與權貴人通關節其考察去者多勢力門下人或嘗先事以姓名相請託者一切皆罷去不問以故權門多按劍疾之如讐及皇太子出閣講學先生奉廷推稍遷宫坊司直兼史館經筵官時號得人獨按劍者馮藉寵靈悒悒不能釋常欲嗾私人持公短奏上竟無所得先生聞之但笑某嘗抱琴出關逰黄葉寺坐聽梵塔風鈴如聞天樂持斗酒相勞三日不能歸又嘗欲掛冠宣武門浮海上尋安期生是其所短而時人未之知也遂毅然抗疏乞骸骨辭甚懇至疏三上然後賜歸居無何聞前怗寵者就刑西市先生猶函辭數千里使人投鄱湖水上弔之有謂智侔秦相適逢上蔡之悲才近中郎偶蹈承家之恨其渾厚如此先生還山四十年間前後經中外薦剡者三十餘疏凡以髙明見忌孤介難容終與世圜方不相入不能用也嘉陵江上有山田數畞釣臺一區不足資口食而先生惟日坐草廬中彈琴著書澹然忘老德自出守兹土既嘗慕先生之髙節而乂篤愛其文章可以雄峙百代因命諸生就隱所求之見先生題其户曰龎德公衣掛漢江雲已知身在風塵表魯仲連脚踏滄海水何用名垂天地間既無所用名則又安所用詩文為也諸生但得其漁蓑中逸稿數篇皆應世之作徳不敢自私因叙而傳之行於世時先生年九十不减丁壯云任宫坊集序歐陽德始任子舉進士奉大對敷陳政務憂時悼俗憤頑嫉邪剴切數千言今上嘉其忠親擢置髙第始釋褐一旦名隱動京師羅子逹夫程子舜敷楊子實卿唐子應徳與任子友也余因數子者得佐下風數觀其詩文疇昔所憂憤熟數上前者往往見之乎辭予毎讀一篇未嘗不慷慨三歎也任子操持砥礪其交逰必類已者其於浮沉巧宦削觚而圓轉坦外而深中阿隨人意頡頏以取世資者相疾視如讐於是自考功主事用薦補太子司直國史檢討官上駸駸大用之矣而竟不能安其位所交數子亦先後以言譴余抱疴林卧為憮然莫知所為比一二歲余從蜀中人士聞任子杜門讀書家之有無不問部使者至不得見其面時從幽人文士倘徉山水摛藻鑄辭益工益富憂憤之情浸為恬夷或云任子殆與世抹摋而翫之以文耶將寡與俗搆無所迫鬬其中故氣得其飬平停而不形者耶言心聲也心以御氣氣以昌詞詞以宣志志以制行而功德因之立焉是故媚世之士其志羣故其行隨其詞靡可與諧衆不可與入德翫世之士其志逹故行靡檢柙詞無涯涘可與樂性不可與濟物憤世之士其志矯故其行狷其詞隘可與震俗不可與興化仁以為志道以為體渾然同物廓爾天遊和而不從介而不乖好惡忘已因應無常故其詞肆而不蕩貞而不偪厲而不猛優柔而不弛用志精一之致然也君子曰夫志與其羣也寧矯矯而返之宜可以基德既其逹矣於道也㡬乎任子之始志既基之矣而況日有造焉其德立功崇將莫之能禦其詩文必傳今行逺匪直以其訓足愛者於是其甥李子刻之首大廷之對葢本乎其始若曰深造自得由此其基也任子名瀚字少海西陵人李子名某字某時少叅江藩同任子之志者伐檀集序黄衷伐檀識始事也嘉靖丁亥大内將營仁壽之宫余由三楚撫臺擢貳冬卿以綜楚蜀貴筑之木政奉制維楠維杉維栢維檀皆在次焉故曰始事云爾夫木譬則士也簡木譬則柄士焉余嘗陟戎瀘之岨永保之區思南石阡之岵見楠杉焉戞雲者隂數畝者阿娜扶疎者越嶽而綿谷匠石視焉巻曲棄震裂棄螘竅而半斃棄繩曰正引曰度而可採者十四耳採而覆視焉擁腫棄疏理棄澤外而稿中又棄中梁棟而可獻者十四耳栢雖不盡規以繩引然以礧砢偃亞棄者固多矣惟檀也理楠而縝幹杉而勁姿栢而加貞修踰丈徑踰尺者列獻籍焉夫楠杉鉅材也震裂螘竅不免也栢奇材也礧砢偃亞不免也檀美材也宜無可簡也故曰譬則士焉耳才鉅者節奇者噐美者去繩引而能成業也乎哉詩曰不素餐兮士之繩引也是故伐檀有君子之道焉因以名編明文海巻二百四十七
