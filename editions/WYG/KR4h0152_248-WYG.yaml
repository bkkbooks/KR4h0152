body:
  text: 明文海巻二百四十八餘姚黄宗羲編序三十九文集周氏集序孫宜周氏集者山隂周天保著也正德辛巳天保舉進士與蒲圻鳴吾沔陽童子士疇嶺南黄材伯關中何伯直四明陸舉之今尚書甌寧李公時言皆以詞學名未㡬鳴吾輩選為庶吉士而天保出補來安令改給事中已棄其官去慕崆峒李子之學馳書訊質李重其文答之而天保於是名益顯集凡若干巻夫詩以詞勝亦以音先然南北氣殊音則象焉中原之音渾雄沈著含藴弗露吳越地偏厥音輕俊纎靡㡬乎濫矣斯西施若耶之遺而勾踐事夫差之所習也然學士大夫往往從之者非以其流曼易入而委媚足以悦人故遂淫漸如此哉東橋顧氏曰崆峒詩近粗夫粗必涉俗匪俗不粗崆峒詩俗耶是所謂中原之響而渾雄沉著之正韻也此而麤名之則顧之作雖列諸吳越間奚不可邪且麤與細疑似當辯麤以俗配麤即非渾沉細以宻言細亦非輕媚也譬諸黄鍾大釡洞扣洪播而迤邐中具彼彈絲鳴竹者一聽盡焉俗人不知顧以為妙音於是乎病矣今觀天保集賦則而龎樂府婉而厚五言淳而鉅柏梁驟而典近體諸篇脫纎略冶持重宗樸序記書贊則髣髴漢儒而駕唐絶宋逺甚謂非崆峒家出耶夫流風遺俗未論衆常雖豪傑士論之故詩以拔去陳故為尚天保者非吳越間人哉乃其詩顧若是斯亦謂特立不移者矣初天保舉進士也余葢髫丱侍其父京師毎見余所作輙以為難及天保卒其子允大者余世交且殊材也書抵余言天保疾亟時以得子評其詩為屬請奈序之嗚呼哲人已矣序成余為之欷歔者久之吕江峰集叙李開先古有建安七子大厯十才子今嘉靖十年後更有八才子之稱八人者遷轉憂居聚散不常而相間不過數年其久者亦止八九年而已不知天下何以同有此稱詳其所作任忠齋以奇警熊南沙以簡古唐荆川以明暢而陳後岡之精細王遵巖之委曲趙浚谷之雄渾各隨其材力吕江峯獨以雅致擅名七子所長果是不可及但任失之靡麗熊失之慳濇唐失之軟弱而失之深晦者陳失之疏蕩與纒糾者乃趙與王也吕亦自謂有方板之失其短處自不可掩古人多不諱短如曹子建貽楊德祖書備論同時數子不少假借雪浪齋等與大厯詩人各有評駁惟余兼有七病素無一長亦幸得厠名於其間任有考功集熊有内外集并同易象旨决録唐集十二巻陳集不分巻二冊王有家居玩芳堂二集各七巻而趙集十五巻奈亦雜著外集亦不分巻凡十一厚册惟江峯不知其集之多少存亡忽其長子克念致書云編定先君遺稿頗有次第已托桂陵胡子為之後序而以前序屬余余方為其集繫心聞此不勝喜慰遂為之序其槩以見諸子同遊之美及得譽之隆如此雖為之作序尚未得其全集止據平日所見詩則沉著痛快文則平正詳明而雅致不足以盡之方板不足以病之矣陸子餘集序魏學禮余讀陸先生文未嘗不太息流涕也曰嗟乎天之重才固若是哉當古昔時葛天大容伊摯公旦召伯仲尼屈平董生桓次公之徒建德植義名稱鬱流萬世師焉紬其末緒固足制理百物靖寧寰海間以聖智昌之文辭蔚乎可覽觀是數公者固當世賢聖俊豪士也闚其大者固不曰文文則符其德矣然葛天大容伊摰召伯勲銘敦鼎身享富厚顯榮而毋疵厲譬若神龍升於青霄之上雲蒸霧合衡變化而從巻舒遭㑹遇際顧不休與及至公旦仲尼至聖也赤心奉國勞身焦思而横被流言之謗奔走天下執贄謁䇿者七十二邦而卒無所遇屈平董生桓次公駿雄博辯人也殫精竭思匡正國議批鱗逆心引義固爭上前而身横江流廢放横淪絀怫以死何其厄與天之生賢聖也葢寡即其人賢聖而流棄不振故曰賢不必用忠不必以悲夫悲夫殆天侈其德故儉其身耶陸先生粲者字子餘蘇之長洲人也六歲則誦書日數千言諸賢豪長者故從父游時時與語奇愛之欲困以時擿句使對對輙奇敏客驚則謂父曰兒非庸人他日當為天下士先生問師漢髙祖何如人哉師曰寛仁大度之主也先生曰然則何以殺韓彭師驚怪其明悟而謂先生父曰吾不能為若師也遂謝罷去九歲能著文十四歲選入邑校嘉靖乙酉鄉舉丙戌舉於大宗伯皆奏名冠經生天子臨軒䇿試上第選翰林吉士閣試第一者八昔所未有當是時貴寵用事者操勢軒輊人朝中皆震恐先生嫉其阿諛希世不肯見見弗之揖以故用事者不恱則以為工科給事數上書言事諸所建白語在奏議中頃之有寃獄中貴人持之堅魏郎中應召執法爭之御史大夫熊浹是魏君議上怒罷浹謫魏君戍公卿皆不敢言先生上章諫天子震怒搒笞之輸以鬼薪尋赦之復疏輔臣張璁桂蕚罪上方倚用兩人兩人者尊倨甚公卿皆側目而視疏奏羣臣皆驚懼且不測賴天子明聖為罷璁蕚而已上曰璁蕚有罪粲疏何暮也左遷都勻驛丞尋遷永新令邑中稱為神明居亡何乞歸養母天子報可竟以母養致􅉵而死夫竭身以事父母為臣不避險難可謂臣子矣先生之細行不采即其言論風指足以概其為人文辭行之華也華而少實君子病焉先生則華實兼至者也今覽觀其文章載事之辭則師司馬子長而直鯁毋所詘時時兼用韓生諸子而與吕侍御書則效宋齊人銘辭毎古簡而福濟觀辭則閎麗肆逸大類山𤣥卿五言古詩效選律絶則多效白甫其聲亷其節哀其詞宏綽而莊鬱信乎善文哉儒生白首章句語之古辭則鄂眙而相顧先生顧獨尊好古書數規摹之非洪儒鉅彦聰智軼奇者其能是哉余少而好慕奇節毎讀書至忠臣孝子未嘗不廢書泣涕也魏郎中者禮季父也以故余知先生之事獨詳而心竊敬之顧少且賤不獲執鞭先生之門先生没而其子某以先生之文視余請序之余因慨然歎曰天之生才若先生者葢寡而績功弗竟抑鬱以死是天重才而輕祿爵也非耶當先生論獄得譴裁獲少假復靡大吏之吻身乃蹷焉非壯烈節士哉文奚足以盡先生亦足明其志藻矣葢仲尼之訓曰有德者必有言千載而後考先生之德者於言亦見其微哉少岷先生拾存篇序董復亨拾存篇者故建昌守少岷曽先生所著也先生蜀之瀘産早憇岷山之勝維易瀘安樂山曰少岷因自主之故稱曰少岷先生當武宗朝先生才名藉甚與峨眉錦江竝平生所撰次溢目盈耳㡬於車弗載棟弗庋顧雅志聖學不欲以辭賦名家而先生棄世時諸子尚幼以故文多散佚不存及少子少沂公長而成進士搜覽先生遺稿始板行於浙然亦十存其一耳故用拾存名集少沂公今為山東行省㕘知政事不以亨椎魯少文一日出拾存篇觀余曰足下於文字似稍窺見一斑幸為校而序之亨退而浹月始獲概先生之大全古歌在靈均廊廡間襍習植傅奕四言出常武江漢五言古學陳伯玉時出入六朝七言古詩祝老杜五七言律幾奪王孟之座五七言絶太白以後遂無敵手序記誌傳諸襍著規步昌黎廬陵而集外有河圖洛書解春王正月考與樂律諸論發自靈心妙悟中又非兩家所望大都謝朝華啟夕秀拮据百氏馳驟一家盡洗酊􅀈詰曲之調而粹然一禀於正信乎先輩大雅之作也余按蜀志其用文章起家者如王子淵揚子雲司馬長卿之於漢陳伯玉李太白之於唐蘇明允父子之於宋竝以繡虎雕龍之藻泣鬼驚風之技領袖一代標榜千秋然諸集具在不過流連月露之景掇摭騷莊之餘穆叔所稱三不朽者僅得其一先生少與楊用修齊名晩歲結爾汝驩詩文往復外商略諸經思繼服鄭之業而海内講學談蓺之士如吕仲木何仲黙鄭繼之輩悉與先生引繩批根稱莫逆交當先生守建昌時值寧藩變先生提一旅之師直磨其牙後先斬首七百餘顆王文成公極多之業聞於朝竟以功髙不賞且緣此中蜚語罷歸而相羊瑞鹿資江間没齒無㡬微形於色然則穆叔所稱三不朽者先生饒有之假令楊馬諸君子而在不當鴈行而兄事先生耶余又按王文成十一歲賦金山寺詩有打破維揚水㡳天玉簫吹徹洞龍眠之句楊用修十二歲擬賈誼過秦論亦膾炙士大夫口後兩公果以文章功業􅂋而先生七歲時見隙光即呼為野馬丈虹因足一聯曰明透屋山光似玉影浮書案氣如龍嗟乎名世之士相出而撐持宇宙未有不根於夙慧爾故夫先生之集眞天授非人力也重刻曽南豐先生文集序李璣夫文辟則水也隨地賦形用至不一矣莫不有道焉學未明乎其道則言各狃於見之所及而不見於所不及或失則偏或失則駁詞旨紕繆亦何所藉以發明而其甚又果於叛道挾其押闔之口徒以攘襲於其外是則古謂虚車雖以覆瓿焉可也乃或陶鑄既凡才非天授則内見雖融詞不足逹而强顔譔述斯尤無足觀也已求以行逺奚可哉向余讀書中秘葢嘗覽觀古今之際莫不代有作者而究其才若學并吾於宋得曽氏南豐焉南豐之文才天授者也意念所注詞必逹焉頃刻千言成章有斐而彬彬焉衍裕雅鬯誠足自名其家矣及詳其書而味之則又統一道德上本六經詞有厥源異乎攘襲是故書數之作婉而確論序之作辨而則而代言諸制又皆詞嚴理正㕘之典謨無愧焉葢孟學不傳之後程學未顯之前言美而傳而絶無偏駁之弊者如公葢寡矣嗚呼是豈可以易言乎嘗即公所為學記者觀之公年十五篤志六經之文矣已而周流於外晚休於家皇皇不暇息而一有間無不力於學則公所深造自得而言有本者誠非偶然矣世之士無其學而肆言非其才而妄作效顰接踵務以欺人而卒之自誣不以反其本此其弊至今為日甚而公之集尤不可以無傳也公集有元豐類藳五十巻續藁四十巻外集十巻類藁刻久矣續藁外集成化間刻之於本邑無錫安氏邇選其粹刻之乃侍御黄君伯容謂未之廣也又板多脫謬爰檄蘇守王君翻刻之因屬余以序夫學未明道而才之劣宜莫如余者何敢序公之文哉侍御君之請不可虚而因識其由如此抑以見吾景仰之私爾侍御君察吳中風裁籍甚而雅意於斯文此固其一驗云海樵先生全集序薛天華余得交海内山人以文賦名者不啻十數家至如陳海樵所忻慕焉初余登第與同年宗子相輩十數友為文賦㑹於時謝山人自趙苑至羅山人自吳苑至日夜相過從葢希志古始意氣甚盛自以聯藉文圃蜚藝詞林為足極吾生吾力之所至矣尋之謁選天曹補南比部尚書郎與諸君别者久之乃窅然聞吾至學之所在於是又以深謝文字聲偶之業為亟而惟恐足以動吾之内夫其初為之甚力而卒謝之亟何也一以獵乎其華一以逰乎其眞其大致相遼也然而見善於獵者猶有喜焉昔秦人有倦燕趙之㳺方習靜入太華惟恐其不深也久之其所與遊者卒然至則蛩然而喜故余在留都八年自山人逰金陵者未嘗不相過過未嘗不欵洽翺翔務盡其所有至其形神忻適心竊慕之則海樵是已海樵浙之山隂人先世起家百戸侯夫以山人才假令用兵家法術致名稱動卿相取討侯印如探嚢取物又不然為進士業以競䇿試髙第邀逢盛世殊易易者山人顧皆厭薄此不為曰吾不能以身世俛仰於人履危機險阱獨攄情述作間冀有以見於世於是蒐摭六典採討羣籍至如漢魏初盛唐大家之製極力為之葢不獨厚羽毛而疎筋骨僅獵乎其華已也山人入金陵峩冠博帶儀容甚偉縉紳大夫翕然稱慕葢賓客滿席應接辯折傍無留滯吐言下筆皆有音彩時人以為有江左風致焉嗟乎今去與山人遇時何如矣向之所忻與羅謝二山人曽未幾時又不知聚散何如矣余嘉靖中督學南中與山人之子少野君遇未及論其集至是余為東粤亷訪使少野君復為都尉於此方梓山人集乞余序之豈亦有待也於是因以江左昔慕之志叙焉夫江左風流碩公以君德致通顯者亡數然皆非專寘力於文其專以績之流聲當世而致通顯者􅍦二陸與謝康樂焉今綜其遺事衂身晉室欲聽鶴唳而不能抗志浪逰至蓄健兒而樷謗覽其文不亦愀然有湘屈之志乎斯山人避諠趨寂與白雲俱潔厭榮捨紱以海壑為情遂其冲挹之性燦其淡鬱之文身名俱得弈世竝榮者其與俛仰於人履危機䧟阱奚啻千里然則山人可謂有以見於世矣序以貽之亦以志余序山人集之非偶云自知堂集序朱衡古今修辭之士何其多也力研苦攻附於作者之林自謂握瑾襲珠矣而曽不旋踵向隨人殂其或寄聲問於後世者百不一二耳及稽其類率多曲材靡所總攝即不至與繁華好音同焉澌燼顧以語乎鴻才妙緒揚幟立言之范則戞乎難矣大都有三韜櫝經訓服膺道術感之而成迫之而應譬則端人位明堂舒紳緩珮宏綽容與大將建牙森嚴五兵一政令之出縱横疾徐惟其所之而百辟六軍㒺敢踰越者其次窺經傳之餘覽流家之故纜意鑄詞互臻厥妙譬則九官羣牧分治畫封職思其居咸竭心力均之可以通政可以感人矣至於剽竊支言採華捐實志不輟著述之䇿口不釋雅頌之什厥志愈辨厥音愈離此則訟者之具白理司輿皂揣摩塞長官之對爾其詞雖工而其意已僦僦不足觀甚哉立言之難也同年友蔡子木竒發幼頴翰披神解質具既異於人而十八登朝仕行人奉使於燕齊趙魯之墟遍厯名山川交逰海内賢喆而又徘徊兩都得肆其力於典籍篇章之間每一著作出海内人爭傳誦之中嵗厭薄故習盡削一切塗澤之態而專心經學神悟處輒援筆劄記既學觀其大逰神塵􅅽之表上疏乞歸養弗果乃宦轍所至輒注膏澤慨然思以功業自期許非關於教與夫世時之故不卑卑抽毫吐詞振藻析理鈎深大者海受小者河溢駸駸乎上乘矣與余結交垂三十年道誼切劘即踪跡殊方未嘗不以篇章相將故子木所為詩文余毎得諦視今夏來為山東按察使而余適承乏藩長朝夕談𣙜甚歡無何赴江西之役乃盡出平生稿若干巻視余俾余序之序曰白石年方逾壯其所就已如是自是以往余不知所底止矣自余觀古今名集合白石所著律以吾所次三品之說後之世當有辨之者安俟余言之也蔡可泉文集序蘇濬昔春秋列卿遭時逢適類以倬絶殊尤之勲屹然表見乃其辭命章疏至今讀之爛然遂使立功立言兼垂竝重何綦隆哉輓近世功名文章岐為兩途故潤皇猷者力單於修詞工雕蟲者業恥於壯夫即有志之士亦苦於不能兼固其技之巧拙殊也吾郡可泉蔡先生與王尊岩公梁學泉公俱以髫年賓上國當時以三鳳目之已而梁公逝王公早廢而廟廊之望則獨推轂先生云當先執鉞時王公業已跧伏故園上下千古其文章獨造𤣥微與毗陵君頡頏一世而先生則銳意事功日求國家便宜事後之論者謂王公閴寂丘園故其文獨工如承蜩之叟用志凝神先生日當盤根故其諳練獨熟如庖丁之解㳺刃無厚二者蓋相逓為桓文哉乃濬幸與先生之仲子逰時撿其遺笥之一二讀之則又知先生之名不徒以其功已也夫引宫刻徵敲金戞石至工矣而猶假於人力咳唾呻唫至微細也而天機自動即造化自然之音存焉若先生者以倥偬之餘發為詞章信心而出矢口而成非字櫛旬鳩者比先生之文所謂天機自動者非耶藉令先生舍其桓桓肅肅之勲而修含英咀華之緒計其所就安知與文人孰多太史公曰何知仁義享其利者為有德先生誦法虚齋以陶後學江右人士至今猶稱之為後蔡夫子則豫章彭蠡之墟皆先生湯沭地也先生之利𢎞矣哉濬繫籍章縫猥云道古纔登司士什八舍業作者之門固自度其見麾也兹將蒐今故考機宜讀先生諸奏疏規條益爽然顧化矣詞致録序蘇濬四六非古也自六朝始也古之文圓而四六則變而方矣夫圓之不能不方也勢也試觀大塊之間流動委宛莫之端倪然層巒互峙奇葩相映未嘗不井然分森然列也噫氣相觸衆竅為虚然截而和之未始不别雌雄而諧律吕也故文者以象形也以諧聲也圓而能方方而復歸於圓此文之精也初唐之瑰麗也沿六朝之餘也然其類諧其事核如大將軍擊刁斗雖衆不譁也迨昌黎氏柳州氏破觚削方絺繡之章變而爾雅靡曼之音變而平淡說者謂唐文三變至韓栁而極良足多者宋興而廬陵眉山諸公一洗西崑之習而力振之絶纎巧杼眞愫意若貫珠而詞若束帛故稱四六者必以宋為工非求工也不蘄工而自工乃工之至也邇來操觚之士爭以絺繪博世資然有意求工亦反以工而失之當其藻思綺合繁詞縟說馳神於月露之態刻意於丹青之章豈不斌斌灑灑充耳溢目然剪綵刻木非化工之餙繁聲急響非大雅之風騷人墨客之緒言非廟堂對揚之𦕈論欲以象形而諧聲也不亦相左失當耶祥宇李公以觀風暇隟上下千古逖稽六朝爰及唐宋掇其四六之粹者命之曰詞致録不佞授簡而卒業焉其色契𤣥㝠其聲中疏越削煌煌之觀而崇渾渾之樸力挽頺波直追大雅所以風世者豈其微哉傳曰聲音之道與政通者也不佞聞𢎞正以前士不巵言俗鮮詐諼龎眉草衣足不至城郭第椎魯少文耳邇人文日盛智巧叢生蓬樞多士以鞶帨炙輠相先而課其功實竟成虚劵編戸疏寮爭奇炫飾氷紈𤣥黄之觀魚鱗星布而服韋素者儐而不得㑹往來問勞恢張捷給而太古醇樸之意鮮有遺焉葢質極而文文極而靡風㑹固然迺吳越其尤甚耳昔季子觀風而談其謡俗與其政理往往相類然則讀是編也能無返古之思哉尚友堂文稿序劉文卿余何以深使君之文也於其人與政契之余何以深使君之人與政也於其文證之意得即盡不得即不盡精之所委也而三先生羣正之子建曰後世誰相知以定吾文者耶則使君欲言意也余觀害馬之對即大蒐之見其無以相益乎夫文盡理止矣是淵雲所欲稽首耳余安知夫色澤之不今而古也質之不新而放也檀弓之為法天問之為哀墳汲之為典非今所稱萬世而無以相譐者乎彼豈必有百世以前者而摹之桑間載馳桂裳里巷之諧其何以當於采訪之節士今亦莫哂其故也恒河之見髪盡鬚白而不改六籍之教𤣥黄相攘而不易血氣心知之倫無訝亦無厭煥哉天下之至文也其復以世系祖述相叱咤歟子勤學儒而服政者也雕篆非所競而文焉者蘇子所謂行乎不得不行止乎不得不止之樞也往子勤守秀州而余以觀察在境禁教旦暮及發摘阜貸無微忽不下子勤之通逹與人善也再奉命駐甌越山川悠阻而令望日至五刑七政之所鑄子勤若不知其非吾士秀之人不知非我恒有之父若母也余益用不德而來往衢婺次及於事今又㕘臬浙習子勤無如余者氣充而不囮量汎而不􅪩決匏剔蠧力無不蹂靡而道德率澤於身南宋先生之要詣極探而發之詞章其觧深矣其原則葱嶺懸度之𣲖放潰而變幻不測其樞崟杌􅑾不窮詞人之纎致而未嘗杯苴遷董之業其精足以傳聖賢之意為鏄為函何區區燕越乃能適乎若且古也而無有以古也若且新也而無有以新也寄興於淺韻而暢發於奥窔劃然無詭於千百世之正脉伯夷不得亷而莊蹻不得奪尚友不惑意在兹乎夫以余之所以證子勤與子勤之所以自證者猶將陶鑄秦漢者也而或謂文不儒儒不文孰與兩存而一於道夫使退之不足與黄初之盟子雲不得覩天地之大或難之耳海内分鑣逐業河濁濟清總一能發宇宙之華而紛於古今新故之議閛然而止必使宫商一管而出者則斯集之尚友哉且頻頻然求别於世系而曰昆吾豕韋氏也則有諸君子之表子勤者馬見田紀行稿序包節余昔與見田子逰未嘗見其言詩迺别數稔寄余紀行稿則爛然盈帙和璧隋珠始露光怪嗚呼胡超詣頓悟若此豈偶有感寓然耶見田子少負其才儁倜儻瓌瑰傲睨當世謂計日取通顯當以功名事業煇弈於時雕蟲小技鄙棄弗為既四十困塲屋不得意俛首低徊隨例入太學平生髙奇俊上之氣鬰紆盤礴無所宣洩迺托於詩冀少自見大抵賢人逸士不得志斯詞賦所為作也靈均而後遞相祖襲詩可以怨其在是乎故其篇什獨師懐抱直寫性靈不屑屑旁沿前人以諧附時俗好尚然髙山大川明堂清廟亦無乎不備矣世之論詩者類皆曰唐人夫唐詩莫盛於景龍中修文館二十四學士之作非不為一代絶倡特恨其遭逢侍從日夕宸幄不能出踦語單謡剴拂君上徒狎猥佻佞誇詡麗奢組繪雖工失詩教矣迺若山林里巷野老閨娃豈必夙諳律吕動合宫商時感物緣情舒懐蕩憤一發其冲素幽閒之旨而風雅具焉吾取於紀行稿者非以是耶且古之士自信人亦信之今之士自疑人亦疑之東方曼倩員半千之徒皆徒步造闕庭髙自稱許而人不以為非後世抱舉子業以干試有司者一坎􅇄則腆墨萎謝縮縮愧沮何古今人不相及若此哉迺兹觀見田子自序之詞曰莫我知也夫知我者其惟詩乎庶㡬劼然自信者矣其慷慨激昻可與曼倩輩相為頡頏此吾重有取焉然又不能無感也夫夜光明月貴在先容三都表譽於皇甫阿房借誦於武陵古來已然矣嘗聞前此三十年崆峒大復諸公揚旍藝苑噓奬後進故一時被褐掞藻之士名動京國侯王虚左逮近日公卿大夫則又敦尚治功究心世務士有談詩者大老輒齽齘之遂使縉紳以詩為諱使兹稿遇何李諸公將必奏之朝廷采之郊廟奈正值諱言詩之日則曷為知見田子也夫舉世諱言詩而見田子獨詠歌盈帙不傅時上下益見其能自信矣豈藉以求知於人哉嗚呼此吾重有取焉爾莊渠魏先生文集序胡松他日讀書則嘗誦今人與居古人與稽之語不能休意謂今之世不復有斯人矣乃今盡讀莊渠魏先生集而夷考其行則先生葢其人與先生仕正德間當是時凶閹擅朝士大夫浮湛茍仕髙者留意春秋左氏開元天寶間詩晉二王帖若唐顔魯公字書則已足誇示自矜重次者圍棋酌酒而已乃古人修已以安人安百姓之學則奚暇省憂哉先生資材既别志識夐異始為南刑曹則思業乎其官覃精法理既而卑之尚友天下之士矢心經畧㳺思宇宙凡丘氏衍義所載經世之業必加討論務期底績其後謂本之不在是也反之身心學於天地萬物其學大抵無慮三變故其居江湖麋鹿之間則思其君處臺省廊廟之上則憂其民要不獨敷納論思講說獻致即其寄懐贈答書命問遺所以忠告善道陳誼責難弼翼匡救靡所不用其極可謂切切偲偲齗齗侃侃通天下四海為一身者矣他文弗論即如周禮世稱殘闕斷爛不經之書繁其人矣先生綱分縷析發聖人代天覆民至公無我之心宛然可掬至謂後王能盡其道因而不革則天地可以位奠萬物各止其所而安且追憾於秦之廢古任法而歎曰古一宇宙也今一宇宙也自秦限之矣而自京口渡江踰淮浮河覽觀輿地凡古今山川經絡之大界溝洫河渠之往跡轉漕都㑹之形勢車騎馬步田收之便利與否舉中原方數千百里之地指畫經緯運諸掌握此其胸懐志慮豈三代而下隨世就功名者可得窺其藩屏耶又病學者多言貿道虚文妨實嘗曰人從開闢以來虚文日勝一日自孩提後聲臭日増一日何由至道今須塞兊深根還淳反樸以囬造化又曰收斂停蓄深造黙成方是天機之學其機只在此心操則存舍則亡所以君子貴於戒慎恐懼也於戲微矣故所著六書精藴時發此意於象形意事之間要不獨是正古文釐匡俗書而已當是時上方雅意稽古禮文正學之事而時宰異意遂丐以歸悲夫悲夫正直難容奸謟易合葢吕惠卿章惇之徒更進而韓忠獻富文忠諸公絀至如元城涑水衆君子且目為邪等奸彚而惟恐復用矣此又世道人心升降之㑹人材消長之機而豈人力之所能為也歟不然君子在位聲應氣求以類而升陽内隂外彼其人才國用禮教風俗寧止如後來之汙下匱詘也歟尚友前賢三歎隕涕他日舟過姑蘇邂逅太守王君問郡之故語及先生亟知慕重因托君為余抄寫一部君不鄙余屬以序論將圖梓行余何人斯能效斯役乃君侯崇尚至意不榖私淑雅懐又不能己巳遂論其大都如此云若先生之平生歴履言行政事則先生入室弟子鄭君伯魯纂輯偹矣浚谷趙公文集序胡松余他日讀書至秦誓讀詩至駟鐵小戎終南黄鳥之什愛其質直武毅明信悃愊而文采蔚爛煥乎成章則以謂先王禮樂教化之餘澤又經仲尼化工刪潤理固宜然比年起廢忝藩守在關右由雍歴豳從涇遡渭西陟崆峒吳嶽諸山觀於朝那汧汭諸水見其盤礴雄秀厥崇際天曼衍逶迤其流駛激則知山川原本逺有自來秦人而為秦聲猶楚人之為楚語要無惑其然也居久之行部髙平往來固原訪浚谷先生於藏書閣之逥光亭因得盡讀先生平生所為詩若文乃其感事憂時詠懐撰物酬答寄贈則何其宛然秦繆公后子蹇叔孟明氏之烈而小戎駟鐵黄鳥終南之流風也然又豪如太白而不淫雄如子美而多變䟽暢跌蕩如司馬子長班叔皮至其卒澤於道德仁義之歸典禮中正之粹又非諸君子之所能簉此又曷故也葢先生資材卓犖本自不羣束髪登朝徧交一世之名士竝時如羅子逹夫唐子應得皆與之食息臥起上下其議論而講於孔氏之正學故其言戅而文譎而則直而不倨肆而成章閎衍鉅麗而弗靡逖追典謨而上薄風雅要亦其理也則豈秦風之所能限耶蓋前乎諸君子得於天地者同而其養於已者不能無異故蘇子由古史譏子長淺陋而不學意率有感乎是即彼班生李杜諸君子亦何能逭輒也之誚耶善乎仲尼之言曰十室之邑必有忠信如丘者而不如丘之好學他日則又以學之弗講為憂故學苐以為詩若文人焉而已也為哲為謀為肅為乂為賢聖人君子之業否則藝焉爾矣甚乃為佞為諛為誣為慝為禹歆操丕之流葢學與弗學所由致相逺矣然則學詎可一日弗講哉余葢於趙子得師焉趙子以余之論與之合而因屬余題其集今不敢讓浚谷子其將益有以教䝉乎舊集自序屠長卿今學士譚詩文者何其砉虖戰方内哉腹不罥先民足不登大雅嘗試吚嚶稍比音節輒奓口而薄古人夫古人安可薄也當其卒業此道神揺揺乎蹈􅝉荒而上之之而逰乎九天之而逰乎九淵取精多矣用物𢎞矣業大以侈矣及其日久論定名言幾何其大者才寥寥數篇爾而今學士往往富極於數百萬言則古人不既拙乎古人之業專精一家而今人好獵众體及其卒也無當一家即奚論众體矣則古人非拙也余自總角學伊吾時有所得多棄而不收今存者什不當一二曽不敢望今之君子而何以夢寐古人焉客語屠子曰往子與客論詩文於京師則古證今甲是乙不此瑕彼瑜多所彈射言辨矣而持論卒無定子知詩美與惡與何說而定屠子曰余惡知詩又惡知詩美其適者美耶夫物有萬品要之乎適矣詩有萬品要之乎適矣今夫天青日出山川晶皛六合曠朗黝黒霮䨴雷電交至崩雲走雨惡風谽谺其狀異矣今夫閬風之上泰山之巔鴻䝉超忽萬里几席隂崕盤谷下臨千仞紆逥澒洞龍蛇鬼神窅不可測其境殊矣今夫長波鉅海囬蕩六幕天地若翻日月倒行險壯無極也而清溪白石之閒渟泓瀺灂浸日星鑑鬚眉小大易觀矣今夫鄭衛之郊邯鄲之道茸茸者草耶華灼灼耶歌懐春之章稱芍藥之詩則可謂至麗而方曈綠睛之夫采芝茹松刳形息景叩大石而歌履巉巖而遨榮枯殊致矣今夫翟冠翠翹縞衣綦巾文質盩矣洪鐘鼉鼔清濁辨矣然而當之無弗適也夫當之無弗適斯兩存之也余讀古人之詩則灑然以適而讀今人詩則不適斯其故何也其美惡之辨與余惡知詩又惡知詩美曰若是則崆峒子所稱金元之樂今盛行民間淫媟而哀思響越而瀏湸亦快人矣美與惡與曰噫嘻是惡乎快哉余方入耳則歡然而心動已則悄然以悲久則氣索索然而沉余嘗讀古詩歌讀數過稍厭束書起過而復新讀可老也嘗試取民間音讀之能終篇乎何論金元此適不適之辨與即余之作吾取吾適也吾取吾適而惡乎美而惡乎不美吾又安能知之沈青霞集序跋茅坤右余所為青霞序其文章詩歌若干巻僕葢僅得覽都其所為小言鳴劍及籌邉詩刻而序之者也已而卒讀終帙中多斷簡訛字以之覆青霞所故寄余者或下或多不合余因前扣伯子敬敬復泣曰此特先大夫故帙之什一耳余少隨先大夫几席為文章先大夫每落紙輒自喜屬敬繕寫累四十巻而余之從塞上返越也業已裒次成帙將携歸入刻而先大夫不可竟留之篋中比余歸而先大夫之始發難也督府以下故受宰執所嗾欲搆之他罪以為功而外又以先大夫所從塞垣擘畫務一切便宜緩急類列與諸帥以下不合甚且即其閉壘養㓂詐馘奏功者往往發之篇什而其所最忌者方大同右衛之被圍也先大夫數移書促督府乘間勒兵襲破圍督府業已謝如約已而督府公㦏愞竟不敢出兵城之圍凡六匝月㡬䧟者數矣而三戍卒從圍城中突圍出走也其二人名某某者入以告於督府督府立笞斃杖下其一人名某惶怖乘間走乞食道上或問之輒涕告前狀先大夫稍就問之益憤激嗚咽為書萬餘言以告督府大略並指陳之虚實及縱我兵宜擊之概將以聳踴督府公也而文詞間又稍稍侵毁督府督府愈窘不自安且恐先大夫以其事聞之中朝因間某御史互為飛語上疏以搆殺先大夫而又懼先大夫所著文辭稍及流布則其中所載情事多與疏搆者不合他日士大夫或按其事而覆之禍且不測也於是即日籍没余家因發先大夫所篋留故帙並燬之而又以先大夫帷中故多弟子諸弟子必有副本蔵於其家復榜書於市凡蔵某遺稿片紙隻字者即按捕同罪於是先大夫帷中諸弟子相錯愕股慄輒悉以毁而今所僅存者特小言鳴劍籌邊諸稿故已入刻者而兵說八十一首及他所著詩什與蘇司馬以下書則諸弟子間武國忠所獨以死抗而私蔵者也然武亦業已窘陳所手繕稿欲燬甫焚香而禱腸若刃倳者俄仆地若隕夢先大夫緋衣而劍叱曰子亦燬我之遺文以媚帥府也乎遂驚寤於是大怖即掘地為窰而以稿蔵之故稍得無燬然督府又以集持憤咽累故不自已恐為先大夫訟其事於朝也輒移檄過浙并收捕余比逮繫過督府余泣訴無他罪狀督府曰爾父好著文章詆訶當世爾其悉出之吾猶當爾貸余以實聞督府益發嗔厲聲搒笞不已明日送御史臺御史臺復如督府狀搒笞不已誡守獄者三日内以絶狀聞當是時余亦分死矣翌日忽聞給事中吳公時來劾督府及御史罪狀詔杖督府及御史臺以下余始獲出獄及出獄家已散而因遍從先大夫諸弟子泣請故稿卒無可得晚僅得武君所穴地而蔵者如此其中斷簡脫字則又武君故稿所不及載而或他弟子所私相口熟而傳之者其令漂陽令茌平令清豐及錦衣諸稿則又釋獄後所遍從先大夫交逰中轉録之者也敬之所口誦本末者如此余聞而系之以言曰嗟乎古之賢人志士所被讒搆而以罪奪其官或没其身窘其妻子者有矣未聞有并其文章而燬之者宋歐陽文忠公嘗痛蘇子美之被宰執擊去其官也序其文章以為世之忌子美而擯斥摧挫流離窮厄其怨家仇人嘗出而擠之死矣然其文章已自行於天下不能少毁而揜蔽之也嗚呼青霞之所罹既誅其身籍其家繫累其妻子而又舉其生平文章而燔之其慘刻獨至於此又安在其不能毁耶嘻亦可以覘世變矣明文海巻二百四十八
