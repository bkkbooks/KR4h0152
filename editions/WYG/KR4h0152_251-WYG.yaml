body:
  text: 明文海巻二百五十一餘姚黄宗羲編序四十二文集小草自序黄道周仁義之教衰則文行之途塞文行之途塞則聖賢之言無以命的於天下古之君子本仁於身修義以及人然後布為文辭其髙者繫於清微其堅者以藥石天下其平易通曉使治忽善敗循之共白也其所未白者以勸人静正反之墳典端居淵尋疑難逆折然後不逐於聲色嘲笑僮姁料得之事故白者以白其道章其志未之白者以探其繫深其義故學問之道不廢也今之君子為利以考文為文以飾行茍取習俗以誣聖賢以愚黔首以誑天子其稍有意義者選妙徴雋自命而已其平易通曉則里巷之所周譬揆於古今治忽善敗則䝉然未視見之而喜去之不思自是而學問之道可廢也夫茍有令捐聖賢塞道德則止猶是制也而顯棄其教以仁義為迂衺髙堅為僻昧則閭巷白望者皆可臯比自命粉靘而耀先王之業即使天子一旦顧盼詢治忽之故善敗之紀亦将囁吚舉所熟習某葢聊且以對則是聖賢所教人仁義文行為權利貿市者逋薮也且無論聖賢旒冕在上但使妻子董之是良人者脫冠帶弛竈下其情態言説具僮姁之所料得而出巍冠坐髙堂衡量天下無敢難者退而私怪此其方法豈可使兒孫復習之乎故天子而修聖賢之治則必通聖賢之志通聖賢之志而後有得於治忽善敗若白不白之理而後其公卿大人有所别察以為典禮上不失先王之教下不失髦士之所履視故進而可以相習退而可以相道語也予老矣少寡疑難長而無所進自以誦述皆里巷僮姁之所共白然猶以是費其言説将還之童稚以考初業使後之為聖賢者有以相質而定其白黒故復伏枕為之前後得二十五篇時崇禎辛未夏五月也應本序黄道周修其文而不足以明天下則不若蓬巷而處修其質而不嫓於天下則不如椎髻而舂臯傅之為文以視天下皆蓬巷而處夷施之為質以視天下皆椎髻而舂信其言則涇舟之側無有譽髦有嗿之田無有媚婦不信其言則狸斑與豹蔚争坐隴亷與娵孟同宫是兩者皆説之無定者也亦有定説神農為帝不能使五糓貴于金玉堯禹佐之不能使疏羃尊於絺繡五糓貴於金玉疏羃尊於絺繡則土塊掬飯皆為鼎烹人脯鬼血雜揉於道矣故三家之子不能為金玉絺繡則必寳其糠覈鍼錐寳其糠覈鍼錐以為尊於金玉絺繡此亦恒情明主不誅必以為用其道可以治天下可使鉛松不御金玉齊價是則大呰明王之所惡也故仁義者精微之産也禮樂者奥博之致也奥博精微著于心貌而施于文章在生者之身猶是疏羃五糓也而少見者多怪多怪者重創明主亦因之以為必屏圭璧蕩金錫而後可為治於天下則是燧皇卻竈結䋲復作也三家之子茍其才不至於作􅋆智不至於窺盗見人金玉絺繡則斂手屏氣正容却立退而視糠覈鍼錐雖無艷志亦有安色是石户之農所引避于庭堅涓成務光所霣心于莘野也必使英娥挾刃以伺夷光胥靡感圖以譟版築則情慮不至古今絶類繇斯以談予見鴻寳則不復談文章亦不復談易豈為慢乎予之蓬巷而椎髻固亦乆矣朱御史集叙鄭以偉舉天地者大氣也舉國家者士氣也故愛國家者毎於所以舉者三致意焉不佞居常慨士氣已三盈竭矣有忍九族之滅不肯成革除之一詔甚至樵夫牧子固首陽之節為一盈少焉脂韋成俗遂釀土木之禍為一竭孝宗時言官上殿大臣重足立為一盈至大璫盗秉而媚者半為一竭大禮議起伏闕者聲徹内廷為一盈嗣後不無少骫矣為一竭然治莫隆於肅皇而士之氣莫盛於嘉靖余鄉汪文莊以言禮兄弟相繼去位費文憲贈以詩有始終不變師丹議之句葢直之也而莆中又有損岩朱御史之疏方昭聖夀誕有㫖免命婦朝賀御史拜官不閲月輒上䟽大略謂朝賀在興國太后固以舉行慈夀誕晨乃聞報罷事體相類禮數頓殊傳報之間闗係不小且武宗上賔當時後孝廟惟慈夀所欲立耳手挈神器付陛下母子至情昭天日一浹旬而一廢一行彼此相較形迹大著何以安母后心慰孝宗在天之靈語多偘直㑹莆同官馬御史明衡亦争指與御史同上不能無恚下詔獄召輔臣蒋冕曰是曹以不孝誣朕當論死頼輔臣護罷為民嗚呼使兩御史少緘口從異議公卿可立取而顧去菀集枯甘心左較長輸而不折吁何戇耶乃上固宥之直與孝宗之宥李夢陽者同一寛仁而夢陽所論不過一夀寕椒房之寵非直批逆鱗在人母子間也然後知肅皇之度符於孝宗而御史之論難於夢陽吁又何盛也御史既歸奉親為娯不干公府若民間利害不難鰓鰓言之上官如里甲協辦之弊貽書當事得以除去語在柯公維騏傳中而所著文詞無幾微窮鬱怨尤語吁何恬也昔屈子不得志懷襄其形為騷多拂逆無聊至沈汨羅而原其心者曰謂與日月争光國風好色而不淫小雅怨誹而不亂若騷者可謂兼之御史志深行亷與屈子同惔心癙憂與屈子同而繾綣惻怛出以忠厚并騷之無聊而融之遇時矜茹不翅函葢夫豈惟騷即進之雅其可與夫以氣如彼之戇以文詞又如此之恬葢天地盛大流行之氣不得之彊陽而本之乎恬澹寂寞辟水之激為龍門吞天浴日及其無觸則悠然中凖不失平耳御史諱淛字必東嗣絶聖世識者悲之其從子廷揚為信學博梓其集若干巻學博賢者有世父風自叙鄭以偉鄭以偉字子籥詩曰八月萑葦萑小葦大故謂之偉有大之義焉其字從韋荀子曰柔從若蒲葦非􅪟懾也有緩之義焉葦可緯為簿席不如蘆之或折也故音完有完之義焉爾雅曰葦醜艻言其華皆有艻有秀之義焉禮曰土鼓蕢桴葦籥伊祁氏之樂也葦之管中籥有中和之義焉乃鄭子輯其雜著名之曰絚泥則盡與籥之義反宋景文曰作文乃静中之一業而余多得之動兹集也或待詔金馬門給尚方之筆札或奉祠碧鷄使摭𤨏碎於輶軒或乘謝康樂之屐染嵐色于毫端或應皇甫謐之題涴雒陽之紙價或文或武倣露玉之浮沉或空或𤣥披沙金於仙梵或模孟堅之答戯或倣子雲之解嘲或勒韓山之石拙同鳴吠聲中或䟦石鼓之文識漏婆羅門外至記素王廟堂尤愧紫陽羽翼投之巾笥積成故紙大抵忙中稿也暇取閲之凡陋可厭者四躁一多一雜一俗一研京練都必假夙斤腐毫驚夢非可卒搆余才非子野速成於心客阻任昉文誰與定据案當食乍躑躅於燥吻腹稿手揮即流離於柔翰江蠏穴沙而弗深蜻蜓㸃水以略渉率爾不精一凡陋書稱尚要孔貴逹意故羸卒十萬不敵精騎三千而余遇題輙作如徐世勣少年逄人便殺一作輙蕪若秦延君解經三字萬言枚臯疾而多累和凝縷以貽譏愛而不割二凡陋荆公評文先體製而後工拙即以范文正公岳陽樓記不免裴硎傳竒之誚余駁類龜兹安取羸質純非𤣥圃那積夜光刃未煆其吹毛鹽乃痛於滿口龎而少裁三凡陋學文如蜣螂弄丸乆乆脫化方能出穢濁之殻而登十二紅樓之上余則如新亭傖父一徃似揚州共語語便態出又如李重光所彈書法如田舎漢了無都人士意俚而不韻四凡陋然總在忙中濡染則躁字盡之求如景文言胡可得風俗通曰女媧初造人物用黄土搏弄及其劇力不暇供也則引䋲泥中舉以為人故富貴聰明黄土人也貧賤凡陋絚人也此言諔詭不經乃精氣為物漓淳清濁之異疑亦有然者夫以女媧之神聖尚未能劇成黄人以此知大聖賢大豪傑不常有造化匆匆中孕育不出故五百半千須空閒一㑹方纔摶弄得就况以人心成文豈能䖃苴籑出一篇好文字故朱晦翁謂漢末以来只管氣弱蘓頲著力變不得直到韓昌黎盡掃亦變不盡故造化生黄人少絚人多皆在於劇而漢前文强漢後文弱亦是造化與人心竝劇而不能供也余意匠經營既無五色爐錘秉筆覼縷自笑如班孟嚼墨一噴成文譬塑偶人者不斟酌於目鼻大小之間與引䋲泥中何異欲其大而能緩緩而能完完而能秀秀而能中和比黄鐘焉又何可得世有貌寝者時目以人槀此亦人槀也已矣字書絙與絚異絙之言緩而絚之訓急以此名之亦祛急成緩攝動歸静之㫖也且余絚人也又安得不絚其業夫絚業将安用之豈可奏於黄人之側與或曰寝假雨水黄人之壞将復歸於土而絚人将浮浮無所受之未必不與子之笨合也余曰是曷敢知是曷敢知反其朴無造無作吾以觀乎未有人物之先窅窅莫莫玩大象於未揑棄斧斤而不琢詩不云乎晝爾于茅宵爾索綯亟其乗屋其始播百糓我田舎郎也願為伊祁氏之民将亟為乗屋計無所落我事明文海巻二百五十一
