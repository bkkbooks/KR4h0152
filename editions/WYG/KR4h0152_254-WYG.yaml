body:
  text: 明文海巻二百五十四餘姚黄宗羲編序四十五文集周樾林先生稿序薛寀樾林先生以氷雪雲霞之品擅氷雪雲霞之才因吐為氷雪雲霞之言沆瀣一泓綏山萬叠斤竹志暑雕薪却寒毋論作之者具奇慧即閲之者亦享奇福今珠源汨之瞬息枯湮凡我同人應嘆風流頓盡矣次君爾宣暨長孫予甥保明以先生與予夙有小友之目病魔書淫依稀追步屬為釐訂而傳之予謂若先生者盖彼蒼縱之以才而成之以骨洗濯之以時變而曲全之以病者也士當為諸生時入窘室中米鹽出困有司甲乙神沮氣索藝必不工即工矣主司或不識即識矣不能旁獵千古而暢其胸懐先生幼鍾世族瓊膚㸃漆乳保嬉娱便與縹緗為伍而又十行俱下百史供録酣恣淋漓選腴割艷於是毘陵諸生中始首闢妮古振奇之學而出就小試亦遂頭頭第一無敢掣簟徑去者矣名噪者乆之乃開麈壇闢榛徑臂鷹緤犬俯狥獵師纔登仕版又有甘陵南北部之戰士之負時名者不為東南聲氣之所羅即為西北風尚之所掇先生舊為貞父黄先生弟子貞父與涇陽石帆諸公善而先生不借幟於道南後受靜初方給諫暗索之知靜初以間道偏鋒為中璫所依託而先生力却鬱輪袍之援甘受禠削而不悔至今諷鹿馬一論掉臂孤行滿身是膽猶令人舌翹而不能下而况當時乎再躓再起獨往獨来甫陟監司旋以病廢厯數先生筮仕迄懸車平干之謡頌粉署之劻勷清源如水之曹荆南肅霜之署非不握蘭轉蕙芬人頰而沁人脾即一觴一詠中具有古人情性而屈指嵗月以邑令遘齮齕者十之一以冷曹酬循良者十之一以遷客起以監司出者亦十之一而跋涉脩途雞聲霜月者且居其三擁書䕃竹紅消白墮者固居其五矣盖先生有勝情無濃情有超骨無媚骨亦有清縁兼有清福故其集繁重而工麗如是記予幼時與仲舅氏讀書古廟先生與二無先生遇之側聆數言心推淵異嗣是偕為諸生見其霍霍飢鷹摩天獨運未嘗不驚而禮之乙卯以後晤言少疎至清源一葉神京半朞則相與較古於毫芒探奇於琅笈落紙屑飛停杯羮冷先生嘗命予南北史鈔序予亦稍稍獻其狂言不謂俱託沉𠖇盈盈齋閣而人琴之痛僅僅付之丹黄箋疏之下也嗟乎先生艷固雲霞清真氷雪昔有食霞漿而悶者亟以嵰山之雪沃之乃克起先生詩文於吾鄉株守經義時首推博奥而邇則獺祭競雄食生不化尤遜先生為清駛之最爾宣保明英標振發讀父書而追祖烈當必有延清颷於縑素置太傅書於衣帶中而寳持之者雖以擬瑯琊氏之七葉青箱何不可梨雲館集序許士柔何仙郎風雅之譽乆振詞林不倩棗梨流布乃名士耳熱則如日披其編把其臂快其心者以仙郎吐字皆珠不易落在巻册間一襲人潤含蛟宫之水見者生寳色惟其襲人者少故獲見者倍珍珍者至而秘密之藏不得不託之木於是相為徵隠舉從巻册間抱珠還蛟宫而歸之綃市斯得人披其編快其心勝把其臂也仙郎自不欲以風雅聞其自言曰非所以存仙郎盖初服青衫寄思聖諦必進風簷之牘似賦子虛者動帝王生不同時之感遇合一日經緯萬端鴻駿或存焉兎華泠人孤賞短氣本色既剥生面非真矧學士病抑於風人經生户排於詞客存在風雅所亡不既多乎殊有不然者士人立名總此數行字耳合一日易合千秋難合隻眼易合羣目難千秋存仙郎則一日為短萬目存仙郎則隻眼為孤且讀集中文詞秦筋漢骨宋艷班香盡切藝家之脈參作者之宗若數行攫時物想仙郎又不屑存矣予所心就者不獨是仙郎家貧而形臞豪挺逾富人壯士尚友樊於期魯仲連李太白諸人時不合意命酒三雅之復淵冲清潔不露詞采面目不乞哀憐齒牙甫接之木然入其韻遂躍如也生平不輕許人及披肝析膽不知身為已有十年論心有懐幽憤必命駕尋之憶辛酉秋促膝六橋感懐多菀指西湖曰負此清水予為悲壯意海内思交臂仙郎為韻事即偶經座不啻荀香三日武陵佳山水轉不能留人致逸在江淮間令人以風人詞客相映又安得以此集存仙郎耶仙郎既字梅臣又晉生又欲仙又仙臞變易以避風雅之號若陳伯玉買琴破琴貽詩文之名於長安其得失為何如哉自序譚元春夫詩文之道非茍然也其大患有二朴者無味靈者有痕故有志者常精心於二者之間而驗其候以為淺深必一句之靈能回一篇之運一篇之朴能養一句之神乃為善作譚子曰古人一語之妙至於不可思議而常借前後左右寛裕朴拙之氣使人無可喜而忽喜焉如心居内目居外神光一寸耳其餘皆皮肉膚毛也若滿身皆心心外皆目人乃大不祥矣然前後左右所以藏此一語者亦必真如古人之寛朴茍以古人不可思議之語藏於今人漫無精氣之篇將幷其妙語而累之譬如人懐仙佛之心而所裹皮肉膚毛疥癩猶可豈可市井乎予進而求諸靈異者十年退而求諸朴者七八年予所謂靈與朴者終隔而不合而其意亦未嘗不思以傳也所謂名根也人不忘名則自愛名若有根則不浮藏諸名山傳之其人沈碑於水安知後世不在山巔所以取之者逺矜之者重不必親見名之我歸而寜忍百年之寂寂以自結於不可知之人其為根亦良可念矣嘗見迫於求傳者不傳避一世之誹貪衆人之譽究竟不切於後世之好惡而生前心血光隂付之可惜又有步趨古人乆淹晩出以為可傳者不傳夫古人所可傳之處未必皆在所傳處而古人所自傳之路豈有復為人可以傳之路雖毫釐相準苦心有年然迷於山者漸深漸迷矣譚子言至此竦然喪其所謂名根曰靈與朴吾所不敢忘也傳不傳固亦有數耳吾何知焉吾何知焉明文海巻二百五十四
