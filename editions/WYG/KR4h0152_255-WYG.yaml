body:
  text: 明文海巻二百五十五餘姚黄宗羲編序四十六文集懷初集序呉伯與今之詩若文人人能言之夫其巧倩妖睇倚閭而望歡自視豈在夷光下然競為名耳非其質矣且名之所尚又好推尊其時顯重者耳傳而共爲其名語語月露人人長慶沿好成俗以趨顯赫而幽士下吏無問焉甚或薦紳先生雅好巖穴以自引重人亦遂從而名之名其耳目之所及者而已不知天下之不能為名者固多也其不能為名者無倖名者也無倖名者不必以詩若文名而直寄焉以行吾意者也予得之懷初先生先生業儒屢蹶省試竟以郡幕終退而老於柴桑間吟咏泉石竟十餘年而歿有子逹時不忍冺其父已乞序沈侍御矣而復問序於予予因念懷初之於詩文自適其情而不必於托其名熈熈乎處於不争之間而甘於無待之鄉則不知耳而目之者盖逃而隠於下吏翩翩乎雅有風人之致矣其子復以其所厭而不欲得之名識而行之寓吾無盡之思所為昭曠切至交伸於父子之間者有可想也是予序之之意也戴初士文序陸培勢變相激迺見俠烈豈不信哉辰龍之歲予嘗客燕徃來黄金臺每與海内賢士大夫深相結其高材生豪俠士促膝交歡恐不暇也客遊益廣獨好與石陽黄商侯交商侯智深勇沉名在公卿藉甚多計數慷慨好大畧丞相大司馬執金吾之徒屏棨㦸從車騎日㡬至門至不得通留謁而去商侯非矜名高者予知其非常人也時石齋先生就檻車徴至豫章邸金金吾幕校尉從取囊中錢先生苦貧無有幕卒以三木囊先生頭纒鏁割刺益困苦之急而金吾法求為械繋使者率納錢大僚小使百金方許就道罪𨽻率倍息償之不如意則箠楚格决辱詈交至方先生困急人或謂豫章兩孝亷一短而黧一長而赤與先生無平生歡各輸其家半為先生營錢得二千金幕卒稍怠長赤者恐先生中齮齕者鴆日侍先生傳中卧起服食與俱石齋先生安流北向全身待罪兩孝亷功多而所謂兩孝亷者何也一為吾客商侯而長而赤是宜豐邑人所謂戴初士者也初士任俠工文詞其所交皆名卿暨大父行好遨遊從歌姬健兒三十人轍跡遍天下細士不察猥以初士侈麗非經此初士重自愛烏可與流俗道哉荆卿在燕燕太子間進車騎美女以順適其意荆卿終已不辭文信國性奢豪自奉甚厚聲伎滿前此等豈溺羣婢歌彼婦蹈昔人之戒哉良以異日冀得一當死忠孝之事標節烈之名所以用此身者甚重且艱則今日初士之聲樂充下陳粉黛極趙衛誠不為過明年初士商侯計偕方榮華膴自茲以徃名通宦逹建勲植節必兩孝亷也華元以于思著漢壽以髯稱子罕以黔顯晏嬰以六尺雄然則短黧長赤遂成名臣豈不異乎王逸季遺稿序張士偉逸季死而西弇熸遺文散弗收收得剞劂草創之餘二百篇裒而得其十三刻有日矣桃源江禹疏以尊人之令長洲也憐部中兩亡生合刻其遺文而并以逸季稿屬予予曰是烏足以存逸季哉異時文厄通波選愞已甚竒服羣吠未知向方逸季興淵獻困敦之間憫學者之不逹而師悖於是躬夷楚昧首振夏聲禰毘陵而躋鹿城與天下建鼓而趨之當是時也㑹藝之盛北盡江東南極閩越喑嗚宿將莫不負弩矢當左騑以庶幾執事之顔行逸李目瞬口讐人無不滿意去者而更徴材他山之石舉已陳之芻狗􅉫之汰之自墨巷小題兩刻出紙直湧而目界寛天下遵之廓如也故文之盛於今也雖癸未諸公唱之於上亦由逸季導之於下唱者顯收倚門學步者之情而導者嘿移人於語言色笑之間而不自覺吳士之知向方則逸季大有造矣且逸季窮不遇時而非不遇於文夫以一子衿執三寸之管奔走羣彦天下非其讃誦之師資之則以意見牴牾訾議之者也為名者求一訾議之不可得而逸季廣羅𢎞長之中詎寧子衿而並逸季者即有大成之風苖而不秀若兩亡生者人憐之而人永之可也逸季方苞穎栗既實矣又藉此區區者著稱乎哉江禹疏曰若是胡刻也胡刻附附必以宦義也逸季而因大人以成名也予蹵然曰逸季不大人乎哉明之制舉義唐之詞賦也左司湘靈紫薇阿房應舉之美終唐世指一二數而號為一世正宗者且白衣遷斥於窮崖莽江之濵即今詮唐音者能越李杜而録餘子乎其附也以志思也無情而之有情者文也有情而之無情者貎也今逸季將亡之手澤在是而舍曰不併行焉無是也予答是語已因手帙付賈人客從旁揶揄曰銳矣子之為逸季也即不藉此區區者而直以此區區也予曰是足傳矣業厚流光業薄流卑世有知逸季者終不越制義而問洪濛且逸季之行也實感異夢延壽感異夢而垂極筆逸季感異夢而謝綺言而卒之日月則相先後焉其得其失必有辨之者又不徒區區制義爾也兩亡生者為馮為文俱長洲人因禹疏屬逸季語及之竹寓軒文集序黄端伯夫山水之趣生而有之非學所能益也然非宿於學者不能測高深之容虎兕蛟螭分王山川以為城郭宫室友臣妾嗣子孫乃嘯呼風霧之中習而不察其趣殊也今夫孝子之敬其親也猶以登高臨深為戒況其散焉者乎禹平水土伯益從東蹈海西涉流沙南渡江北窮朔漠凡山川財賦人物神怪無不包舉而志之嶽嶽淵淵直與高山大海相配後世立言者宗之司馬遷從漢武帝廵行足跡半天下故行文汪洋突兀有河傾嶽立之威儀耳目之靈通於性命異哉潯陽文用昭家在廬山之􅅢長江九𣲖收之襟帶間遊宦越中風流日甚舟車所至必載四方之山水以行過則遊遊則記傳神布景逸興遄飛即雜之禹貢山海經太史公傳幾不辨其為一人為二人矣吾聞上帝秘書常以名山大川為寄禹藏書於石室而子長欲留副墨於名山物之所始者終必歸之天之道也潯陽有上霄峰與越之包山石匱相峙文子之文至矣請以名山大川藏之明文海巻二百五十五
