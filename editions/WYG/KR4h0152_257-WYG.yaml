body:
  text: 明文海巻二百五十七餘姚黄宗羲編序四十八詩集張潞國詩集序蘇伯衡故元翰林學士承㫖北行省平章事致仕潞國張公既薨之十一年其方外友北山上人橐其詩來南京属前靈隠住山見心復禪師彚次之将刻以傳㑹伯衡自金華召至乃請為之序伯衡曩在史局讀公之傳念其詩文莫之収拾乆且軼墜嘗竊歎焉則今於北山之請也其能以不敏辭乎夫文辭之盛衰固囿於世運而世運之盛衰亦於文辭焉見之然則誦其詩而欲知其人可不尚論其世乎昔元起朔方有天下至元貞大德而盛莫加焉公之生也適際其時其所鍾者粹矣其言之昌也有以哉然而覉窮不偶留滯江湖之表詠歌寂寞之濵幾五十年至正初始用薦者通朝籍至是而昔之耉老凋謝殆且盡矣由國子助教轉拜翰林承㫖遂擅文章之柄而雄視乎天下斯文之未冺實有頼焉而孰知夫養之也厚而用之也不亟是以其望實如彼之暴著也豈僥倖於一旦坐致顯融者所可同日語哉自公居翰林國事日非疆圉日蹙故其鋪張帝載黼黻王度之什既與清廟我将之頌鹿鳴鳬鷖之雅比隆至於縁情物發為聲歌顧於匪風下泉有取焉方鳴其盛而遽履其衰不亦悲乎夫何天不憖遺而公云亡公亡不獨其詩亡而元尋亦亡矣文章世運固迭為盛衰者歟抑觀漢唐以來凡以文鳴者際乎天地之運之盛也其制述乃有治古之風逮夫光嶽分裂皆靡然若緒風之泛弱卉不有作者不能自振焉今公晩年之作雖當運去祚移之際其情舒而不廹其氣淳而不散其言簡以壮和以平猶之盛年也其然非其中有不隨世轉移者存然乎不謂之作者可乎則其詩誠不冝無傳也公平生寓情詩酒所作至多而不自惜掇其遺尚五百餘篇皆可垂憲來學者公無子一女亦先卒其薨也卜地燕京城南而安厝之北山之力居多北山廬陵人受業衡之福巖寺逰燕京三十年雖佛之徒而喜從吾儒者逰與公交最善今老矣而圖公之不朽者甚篤視惠勤之於六一居士庻幾無愧也已伯衡之㑹試禮部也公實同知貢舉得所對策嘆賞不寘同事者以其言切直黜之公争之不得毎與歐陽文公言之以為恨而文公以語伯衡雖不獲綴公門生之末而公亦伯衡之知已者矣執筆序公之詩於改圡之後俯仰今昔泫然乆之申屠先生詩集序蘓伯衡申屠君以詩鳴元統至正時其藁既多類皆放失於兵燹之間幸而流傳於好事者十猶二三其子徴極力収拾葢自君沒後十二年始克彚次成集以授余求序其端余聞君自總丱知學即善記覧工辭章號稱雋永時岀為歌詩先軰争下之而君不自足也延祐間故侍講黄公筮仕於其州遂委已事焉侍講文詞為世楷模然剛中少容從之逰者鮮克當其意而獨器重君悉授以心法他從逰不得者君盡得之而君又能因侍講之言以治經之餘力力追古之作者於是君之詩與年日進沛然莫禦而其聲光勃然而起炳然而不可遏時之名能詩者風斯下矣祕卿逹兼善外史張伯雨至謂侍講之有君也猶吾祖文忠公之有黄山谷陳後山其取重縉紳間如此哉始余謁伯雨於杭之開元宫伯雨以君和其詩三章示余私心慕焉及君来為經師吾鄉校遂獲與之交自是或嵗一再見或間嵗一見見必以文字為娯樂海㝢變故以來出處不同山川間之思見其人邈乎不可即矣比余歸自江東過其舊逰之䖏輙為之腹痛間見其遺篇翰伏讀數過不自休而不能無九原可作之歎則余於徴之請其能已於言乎昔者浦陽方先生韶父括呉贊府善父粤謝軍諮臯父皆以古詩人自任東南之士翕然師尊之論者獨推侍講為得其宗而君侍講之世嫡也則其所詣亦可概見矣余復何言哉竊獨慨君生長文明之代才髙而學贍使其與一時鴻生望士文學侍從之臣通籍著廷之間鎔金鑄辭作為雅頌播為歌咏以鋪張太平雍熈之盛豈不優為之然年踰四十再舉于鄉始以春秋中乙榜棲遲學校幾十五年未及改官而運去物改愁居惕處曽不數年竟以不幸死矣今其詩之見於集中者多黍離麥秀之音則其志不亦可哀乎尚幸有子若徴寳其遺藁世其家學足以慰君於地下云爾此余所為撫巻不自知悲喜之交集也君諱性字彦徳申屠氏越諸暨人友桐軒詩序胡儼金川之玉峽毛咨詢其先吉水人父省夫為陳氏贅壻始徙今居咨詢性嗜琴以友桐名其軒今年秋領鄉書将之京求賢士大夫之賦詠先余為之序夫琴者古先聖王之雅樂君子無故不去葢取其中和之音養吾中和之德動盪血脉流通精神格神人和上下移風易俗合于八音冝乎君子之所尚也余少時亦嘗從事於斯承顔奉歡之際先祭酒公聽之常曰吾聼白雪有八荒無塵萬籟俱寂之意聴春江有波濤浩蕩魚龍鼓舞之勢聼歸樵有伐木丁丁山鳴谷應野猿幽鳥之音聴佩蘭有楚江湘浦和風麗日幽人詠士之興聴夢蝶有蘧蘧栩栩齊物之心聴御風有凴虚欲仙冷然善之感於離騷楚歌則如逐臣慕君勇士赴敵慷慨不勝其情也於長清短清則如雪山清曉風鼓瓊林鏗鏘之振乎寥廓也於水雲則有擊空明泝流光放棹滄浪之樂於大雅則黄鐘一鈞始終條理有太􅃵𤣥酒之味獨秋鴻如萬里闗山黄雲白草衘枚入塞風逈電馳霜降水落月冷江空團沙倚渚嘹嘹嚦嚦顧侣呼羣超然逺舉而琴於斯為盛乎又嘗承乏禁林得侍太宗文皇帝於武英進講之餘帝命出響泉親鼓南薰之操繼之以猗蘭之曲和鳴肅雍宣暢道徳㳺魚出聴於金河龍仰秣於天廐感通之至鳯儀獸舞品物咸遂於今三十餘年矣儼自嬰末疾手足不仁毎對桐君不能一加指於氷絲之上追憶君臣父子之間悵然今昔不覺涕淚之交零也咨詢以英妙之年得琴中之趣而又取以為友逈然㧞乎流俗矣遊長春宫遺址詩序梁潛長春宫在北京城西南十里金故城中白雲觀之西也元方士丘真人者與其徒常居於此當是時琳宫秘字儗於王者今其宫既毁獨其遺址之存據平陸巍然以髙登而覧之猶足以盡夫都邑之勝葢其東則都城䑓闕府庫之壯榮光佳氣輝然燭乎天表其南則曠然原陸而薊門髙坵之間荒䑓遺沼之可見者皆昔者遼與金所嘗經營其間者也其西則西山之崖雄峻㧞出而蒼翠紺碧之色隠然煙霞之中其比則連山崔巍雄闗壯峙凡仕於朝與居於城中者葢未嘗知唯閒暇登覧於此而後得之也是時皇上親御六師於隂山大漠之北故凡居守侍從之臣皆優㳺無事遂相與遊焉既周覽而樂之困又以知夫國都之壯且險誠天府之固也葢都城西北諸山皆起自太行綿亘屬於居庸岀榆闗碣石至遼以東而後止豈天之所以限外裔而安中夏者固在此耶然自五代至宋三四百年之間皆遼人割據其中故其禍害終宋氏有不能免者及元之興又百年然後聖明受命攘除而剷削之其民既安養生息熈然以樂夫太平之治而上方振耀神武於窮荒萬里之外嗚乎其為生民社稷乆逺之慮者葢深矣詩曰之綱之紀燕及朋友又曰不懈于位民之攸塈此言人君能振作綱紀勤勞於其上而臣頼之以安也由是觀之今吾二三人得以恬然嬉遊於此者其誰之力耶誠使在夫五代與宋之際雖欲側足其間以竊窺夫山川城郭之壯其又可得耶夫士君子歡娯盛美之事多在於太平之日而能託之歌詠則有以傳之永乆况元之諸賢若虞公邵菴袁公伯長皆嘗臨眺而賦詠焉因以其所分韻蓬萊山在何處為韻各賦六首同時而賦者翰林侍講鄒君仲熈魯君子棨修撰王君時彦王君行儉刑部主事周君恂如其一人則予也六人之作見於辭者各不同而其志氣則皆可謂盛矣既相與録而藏之因為之序後之人得而讀之尚能想見夫今日之盛也哉中秋宴集詩序梁潛士君子當四方無事朝廷清明交㳺盛而志氣同進無諱忌之嫌退有講學之益如此亦足以樂矣固不在乎嘉時勝集樽酌淋漓而後樂其樂也然而樂之於心者無因見也必有暢其志氣發其歡欣形之詠歌使當時讀之者皆為之擊節羡慕傳之來世思見其盛而有後時不及之嘆則雖盃酒殷勤卒然相遭固亦一時之盛也於是永樂七年中秋之夕翰林學士胡公合同院之士㑹于北京城南公宇之後於時凉露既降清颷悠然明月方升而酒行樂甚公乃命分韻賦詩凡若干首諷其和平要妙之音有以知夫遭逢至治之樂念其勁正髙邁之氣有以明夫培植養育之功是皆平時蓄之於中隨所感而發之於此也豈非盛哉其或因事寓思有物外無窮之情興起感發為萬世不盡之慮者亦足以見君子之心也因之為序以明夫君子㑹合之美誠朝廷亨嘉之際而凡是作非泛然辭語之細也楊宗彛詩集序王縉丙子之春予以情事未申将抵南詔道經于普安適宗彛楊先生過予於官舎宗彛㑹稽人也與予為隣郡然而宦逰四方者二十年予又廹於騃稚故未之識及予入蜀始稔聞其名今復胥㑹於萬里外遂握手歡如平生繼岀其所著貴竹稿為示予讀之累日愛其音韻沉雄體裁嚴正流麗不至於放平實而不失於俚殆有古作者之風焉故因其平生岀處歴履感遇悲喜一發於詩以寓其志且請予序其端嗚乎夫詩豈易言哉自三百篇而下歴漢魏晋宋以來至於唐於五代於宋元作者不可以數計而以之名家者百不一二焉何則葢工於辭者每戾於理而得於理者必嗇於辭况又因之以世運之隆汚氣習之衰盛格製之變易而態故百出無復古人之遺意矣此世之談詩者各拘於所溺之偏人或詰之則必指古人以自誣且曰吾學某者也嗚乎是猶學射於逄䝉而用其故鏃學醫於扁鵲而竊其遺方所謂得其末而遺其本若此者是可以言詩乎哉予患乎此者乆矣今觀宗彛之作固足以一洗盲瞽之病苐恨世之知宗彛者尚少而予言未足以取信於人也雖然任公惠公有言石韞玉而山輝水含珠而川媚若宗彛之詩豈終冺者耶世有采歌詩以偹盛朝之風雅者尚因予言而有得矣劉大有詩集序王縉夫詩者主乎理而發乎情性者也天下之理無窮而人之情性則一為能不失於理而得乎情性之正斯足以言詩矣何必鈎竒衒怪如牛鬼蛇神之不可以状詰屈曲聱牙若殷彛周卣之不可以意求者乃謂之詩哉嘗聞嚴滄浪論詩體者五十有六有以世代為一體者有以年嵗為一體者有以地理為一體者有以一人為一體者何其屑屑之多體哉殊不知造化之理無窮而文章亦為之無窮譬如聲音笑貌人人不能皆同獨言語可以强同乎哉是故淵明天性冲曠而得於渾然東野厄於困窮而得於寒苦政是各類其人夫何世之談詩者徃徃以章分體或謂體偹諸家是猶刻舟而求劍俯地而捉影愈勞而愈逺矣抑不知諸家之體其能外三百篇而岀於六義者乎茍其不然曷亦宗三百篇本六義而出入於諸家之為愈予有見於此者乆矣而未遇知已者為之道也丙子之春予邂逅劉大有於滇陽一見握手歡若平生未幾出其平日所作詩數百篇見示予閲之累日見其犖犖有竒氣而凡措辭命意皆不茍誠作者也間嘗與之論議詩之為道大有益以予言然因徴文以序其首簡時予以情事未伸心志欝欝若酲人故諾之而未及為暨還成都追思故人逺不可及且以前言之不可食也故舉予與大有所嘗論者以為序大有其終以予言為然耶鄭本初詩集序貝瓊昔宋景公使弓人為弓九年乃成曰臣之精盡此弓矣公登虎圈之䑓援弓射之矢踰西霜之山集於彭城之東餘力逸勁猶飲羽於石此功之倍也有窮氏與賀呉北逰賀使羿射雀志其左目而誤中其右羿抑首而愧終身不忘故善射名天下此發之巧者也功不及弓人則其器弗良巧不及羿則其射弗神余謂詩人之於詩亦若是焉天下之善詩者非一而詩之工者甚寡務速者不暇工惰而不進者不能工必思之精如弓人之弓發之不茍如羿之射然後可言工矣余獨得之鄭君本初焉本初之詩有曹劉之氣而不肆有隂何之趣而不廹鳴物之妙濃秀千態可謂工已非其功倍於人巧踰於人而能之乎自國朝混一以来八十餘年宗工鉅匠以詩名世者不少矣本初恒病其無古作者意故起而力掃一時之陋未嘗妄作而輕出之或積思累月而後成終嵗所得者無幾片言隻字不合矩度則屢易不輟或謂其無倚馬之敏而有閉門之苦夫弓人以九年之勤不失為良弓羿懲一發之廢遂至於善射則本初之詩不以遲為病在於遲而工不以屢易為難在於易之而後進也余學詩二十年未能窺詩人之閫奥至正二十一年始交本初於九峯三泖間因得所著五言古詩若干篇五言律若干篇精神心術皆盡於此而中州之綺麗有不足觀矣其門生弟子将鋟梓以余知本初之深也求序冠其篇端故不辭而書之本初錢塘人性坦夷與物無競蚤逰四方凡山川形勢欣戚感慨一於詩形之而世之勢利泊如也觀其詩可以知其人矣自序詩集劉楚自余入小學從祖父授詩即應口成誦若無留難者乆之天機振觸吐辭出語宛合音韻年十嵗先君令賦雞鳴渡江等詩識者類以逺志許之年十六逰興國為童子師然猶日誦書千數言至夜仍賦詩若文以自程勵居三年未有異也㑹有傳臨川虞翰林清江范太史詩者誦之五晝夜不廢因慨然曰邈矣余之於詩也乃歛蓄性真渝滌故習盡出初藁焚之益求漢魏而下盛唐以來號為大家者得數百家徧覧而熟復之因以䆒其意之所在然後知體製之工與夫永聲之妙莫不隠然天成悠然川注初不在屑屑乎一句一字之問而巳也故嘗為之説曰詩本諸人情詠於物理凡歡欣哀怨之節之發乎其中也形氣盛衰之變之接乎其外也吾於是而得詩之本焉知怪誕之不如雅正也艱僻之不如和平也委靡磔裂之不如雄渾而深厚也於是而得詩之體焉知成樂必本於衆鈞故未嘗執一器以求八音之偹知調膳必由於庻味故未嘗泥一品以求八珍之全於是而又得夫詩之變焉是道也前乎千百嵗之已徃後乎千百嵗之方來其能深造而全之者固不多見其真知而信之者亦寡矣竊嘗志慕􅋖㳺希蹤巖壑榮輕宦逹抗志烟霞或抱膝窮廬經訓以之嚌嚅或放情廣座醪醴以之暢酣至於騁五陵逰俠之豪道方閨華年之思以至離亭送逺繫馬停舟絶塞從征鳴笳奏凱莫不口占成什手冩連編發之揶歈繼之感慨抒懐遣興積日窮年顧存者既無足稱而逸者又多不載故由已卯以迄於已酉三十一年之間其可録者不啻十之四五而時勢人物則㮣有可感者矣毎嵗彚為一藁而毎稿必因所寓之地以為之名曰鍾陵曰五雲曰鄧溪曰雙溪曰鳯山曰瑶峯曰墨池曰東門曰株林曰龍灣曰北巖曰龍門曰戊已通十有三稿先時避難山中凡囊槖賫挈可以資患難偹饑寒者不啻極百計而巧匿之然皆不能以保而有也惟兹稿一十三帙貯以小篋野人不知其為文字也深瘞之草間乃獲存焉非幸歟他日余友蕭翀取而校之既慮其雜而無所属復懼其漫而無所徴也乃析諸體而類次之若五七言長短古律併絶句四三言等作通得若干首釐為三帙将以藏於家俟余兒之長而歸之也其意不亦厚且逺哉若余也方㓜而竊銳於學逮壮而未之充既强而益以不競忽焉老之将至而不知追惟徃時父兄師友所以期待之意毎一念之輙不覺悲憤之相仍而涕泗之交下也凡其呫囁噂沓而不能自已於言者譬如幽鳥之鳴春秋蛩之號寒有莫知其所以然之故者矣若曰是可以觀可以咏可以興則吾不知之矣請以俟後之君子擇焉朱宗珏行巻詩序王褒昔予内叔禮部員外郎林鴻子羽與今紀善鄭定孟宣待詔髙棣廷禮首取滄浪嚴羽氏評詩獨師夫唐而周𤣥又𤣥黄𤣥𤣥之從而唱和之力挽元季頺波而廻之東以道其性情彬彬乎正聲矣一時閩海之作其大者徃徃造乎開元天寳李杜髙岑名家之閫奥其次者亦躋夫大厯諸才子藩籬間冠珮儼雅金石鏗鏘誠有唐之音焉後予隨牒四方獲見吾閩作者篇什亹亹追蹤先逹之武嘗嘆夫後生之可畏而詩學之有傳也近朱生拱其父獻中氏官嶺南司徼當考秩銓曹生携詩囊走問安於京師解其囊得閩中朋㳺餞贈之詩長篇短章咸可諷咏予竊讓先進之獨識而私予言之不誣矣厥後内叔捐舘舎又𤣥官禮曹員外郎𤣥之去為泉郡師亦物故獨紀善待詔公偕予軰校理秘閣獲侍杖屨末時窺一斑禆益多矣以生年方壯文采振發誠用力從事於斯以鳴國家之盛於閩之南者非生而誰予将以是考其詩之學焉㳺雲居詩序王褒洪武二十七年春余以承乏來教筠郡訖兹年舊職教者旋例謁選於京師遂出居於蜀江之觀而筠之大夫士與余為文墨㳺者逺近謁請殆無虚日殊不知車馬之有行色矣越二月既望胡先生商用洎四三君子過余寓所且謂予曰兹辰花朝雲居盛刹且風日好甚無他出余距躍而作願摳衣以侍繼而郡諸生陳常邀余飲諸賔且欲中輟邑司訓華子安氏走而促曰置酒髙㑹将有日矣且四美二難之并先生其能遂已乎余曰厥言良是遂命二生拏舟於江舟次岸下同官丞蕭彦良偕張如山時來謁有若不期而㑹者耶與把臂談笑提壺挈榼共載舟中日亭午廼至危不能夷行予與彦良如山年且富蹀屐先登諸君子翼舟子以上童子從者牽蘿援木以從遂席於寺之西岡酒數行松檟䟽日色逼人不可乆復移席於寺之丈室獻酬交錯盤盂狼籍彦良歌太古詞以侑觴日轉西衆沾醉覔舟以旋時山花盛開重坐掀篷興猶未已援舟以上呼酒於濵江之田舎日将入倒影江中江水盡赤須叟圓月東上江流如練酬酢之頃景色頓異宋遂賔劉伯章謂予曰兹㳺之良固冝有記况旬月之間聚散之不可保乎余應曰然遂各就席賦詩余醉章未能成倚舷而寐翼日裒諸佳作殊将成軸僉属余序其端噫雲居勝地也諸賔勝士也以勝士而集勝地勝㑹也天壤之間此樂豈多見乎雖然方三十年外十室之邑萬家之郡烽火相望營壘相隣垂髪戴白左提右挈宵行晝伏纍纍若䘮家之狗惴惴若首丘之狐豈知復有今日哉自昔而今少而壯壮而老舉忻忻然含哺鼓腹而樂者絲毫皆帝力也僉以手加額曰不知所自同㳺者胡商用宋遂賔蕭彦良燕山劉伯章張如山蘄水劉允中天台華子安道士一人廬陵劉洞雲王謙何定其二生也童子二人誠善共十又三人云明文海巻二百五十七
