body:
  text: 明文海巻二百六十六餘姚黄宗羲編序五十七詩集唐二張詩序髙叔嗣二張九齡韶州人字子壽諡文獻有曲江集說雒陽人字道濟諡文貞有燕公集馬氏經籍通考載之自文章道熄脩文之士㑹粹篇類畧求名作悉所目見不復知有諸家集余曩嵗得曲江集京師葢丘文莊公録自閣本刋傳之求燕公集亡有也後再至都始獲寫本友人大理評事應君子陽有宋刻然不完二集缺謬亡復可考二公俱唐相事𤣥宗遭李林甫文獻出為荆州文貞出為岳州叙曰夫詩之作豈不縁情哉余讀二公詩方其登台衡執鼎鉉抽筆蘭室雍容應制詞何澤也及臨荆南履岳牧懐人寄言託物寫心何其悽也夫士抱器丁年曷嘗不欲感㑹雲龍道佐明主建不朽之業垂非常之譽乎而時謬不然逺跡江海之澨放意魚鳥之區事與願違心以跡孤况逢按劒之怒方同竊鉄之疑知讒不免欲語從誰是以憂來無端咸宣於詩爾嘗觀文獻在荆詩云一跌不自保萬全焉可尋又云衆口金可鑠孤心絲共棼文貞在岳詩云誰念三千里江潭一老翁又云平生歌舞席誰憶不歸人詞㫖悲凉令人太息然文貞特牽歸思而文獻良多懼心豈其遭傾奪之餘尚險仄未平耶今集中載林甫秋夜一篇公酬答甚遜得於周易避咎之道焉彼讒人者竟泯澌何在而公名徳爛然存於終古嗚呼哲哉叔嗣游郎署時覽公詩未覺沉痛既渉江漢三復焉乃知意所繇興復以嘗踐兹地也因合刻之置廣視堂齋中堂據江夏山首下瞰江漢前使君葉縣衛正夫修築嘉靖丁酉夏四月朔自得園四稿序呉時來自得園四稿孰為之石湖呉先生稷也曷以四先是有初稿續稿三稿矣先生潛心理學初伊洛宗白沙病世儒靡言語無益而顓事操行其論入門則津津喜談良知之説早年有志用世既舉進士出補藩邦知不用遂謝歸築室里中為終焉計其觸遇有感往往見吟咏間故稿多詩吳子讀之嘆曰其斯以為有道之言乎夫道盈天壤間粗之於鳥獸草木精之於道徳政事三百篇為詩之經興比賦不同要之本性情歸禮義今之詩猶古之詩也辭有工不工道曷嘗有二哉自嚴滄浪論詩謂有别才近方石謝氏又集伊洛以来詩一帙為道學詩是詩與道學判然二家膠之乎論矣詩不闗理奚取於工必直指道而後為道學詩則二雅為經而國風可無刪必烝民物則方為知道而多識之訓吾夫子亦何取於鳥獸草木之名而學之也某愧未聞道尤不能詩偶逰先生之邦三年以来冦盗侵尋無能朝夕請益間嘗叩先生一室斗大風雨不蔽衣鶉履穿端居自適今年踰七十矣手古人書隆冬盛暑不以輟葢尚徳若大雅整之於身者先生其人歟其詩即景成意即意成詞當其賦歸来而作也有採菊東籬意則類陶既而處田里樂熙明有擊壤意則類邵若四稿流離冦盗中擊事傷心不勝憂命悲窮之意則類杜若格調渾融意趣平淡又純自類其為人雖其詩不専主理亦不専咏物然而不謂有道之言也奚謂余慚肉食不能靖艱乃俾先生樂道自得之懐化為憤世憂時之詞余葢忸怩甚雖然嘗與先生論近世諸先進先生慕賀醫閭憫其不與理學名臣録也特著正學編以章之夫道有遇不遇醫閭微先生將泯泯無傳耶先生契醫閭於隔世而余不能識先生於面炙然而先生之學必傳於世有不係於謭劣者特為序此亦竊附表章醫閭之意云人日草堂引朱白藩升菴先生在江陽以厥象託玉泉陳君寄我白下予即掲於白下寓齋日夕䖍奉如在函丈之下乃己未人日積雨稍霽西域金子東海何子呉門文子黄子郭子秣陵盛子顧子相約過予觴之齋中賔主凡八人齋南嚮先生象在壁間諸君不肯背之坐各東西其席如侍側之禮先是比丘圓瀾自焦山来罌中冷泉見餉罌未啟置在牆脚乃覔得陽羡貢茶一角烹泉為供茶熟以宣甌注之焚沉水香於爐作禮畢就坐各瞻仰嘖嘖嘆曰幸甚今日乃得覩升菴先生之象郭子曰先生長耳重頤壽者之相今甲子幾何矣予屈指曰戊申甲子乙丑庚辰今年七十有二金子曰先生風骨癯然而胷中藴蓄如此殆所謂芥子約須彌者耶盛子曰博哉精哉宋以来無此人予曰先生此中如大圓鏡燭理精瑩不以纎豪臆見自覆豈宋人之學可語文子曰今日之㑹奇矣詎可無述予當勉作人日草堂圖以寄先生庶幾因象見象如子所謂大圓鏡重重發光也予不覺欣然拊掌大笑因歌人日題詩寄草堂遥憐故人思故鄉之句擇其平聲去其重字令童子作八􅍐散諸君前約曰請各賦一篇并寄先生見吾輩萬里馳仰之懐何如於是諸君欣然拊掌大笑曰幸甚越二日文子圖成又二日諸君詩次第成予為之引復以諸君姓字鄉里及生平列於後彷彿季倫金谷之敘康樂鄴中之擬云爾重刻擊壤集序萬士和太音希聲有餘音焉雖焉太音不終希聲也始於無聲散於千萬聲聲苟得乎音之自然則猶無聲也知希聲之有餘音則知千萬聲之為無聲其妙一矣言心之志者曰詩詩之未作志在吾心當其不言非為不足詩之既作志在於辭雖曰己言非為有餘何者謂其出於自然也彼詩有所未法者夫豈離乎自然哉自太音之散於千萬聲輕清重濁相生相間不得不然而音之法具矣自人心之見於詩辭開合首尾有始有卒不得不然而詩之法具矣詩因心生則謂之無詩可也法非外得則謂之無法可也世之摹人以言取古為法者末己有宋邵堯夫先生游心高明包括萬象與造化為徒既有得於無言之詩則其吟弄風月玩侮一世千變萬化皆其自然所謂詩而非詩法而非法者古今一人而已先生嘗曰刪後無詩蓋以自况也故以擊壤名篇夫擊壤而有聲是聲果奚從生乎世之不知者或病其率易其知者亦且謂寄興品題以廢其豪傑之胸襟云爾至陳白沙子始以匹杜然猶曰别傳也而余師荆川先生乃贊其法之兼乎少陵豈非獨得其妙者與先生以舊刻無善本且諸體雜出命余分類成帙而以屬江隂黄古甫氏刻之刻成吉甫仍謂余宜題其首嗚呼余豈知詩者哉跋尚友堂詩集馮夢禎此吾郡守錫山龔先生所著詩也先生筮仕為令厯曹郎至牧守先後踰十年所而吾邑若郡幸兩得之士民習先生安之如慈父而先生亦盡洗一切之政寛然噢咻之不啻親子弟然蓋交相習且安也已先生自少喜為詩厯壯强且艾而益工前後著述不下千餘篇門下士張君者裒録之為集者六曰游學曰筮仕曰里居曰呉川曰金陵前後曰檇李而總名之曰尚友堂集蓋超然一本之情性而自得於矩度之外者也夫强笑不樂强哭不哀餙婦人以鬚髯則不韻傅男子以粉黛則不莊何也性情不可假也故田夫牧豎婦人女子何嘗習聲律工文辭哉而其率然自鳴之語反見采於史氏陳於先王至於今尊之曰經而後之文人才子竭其精力求一言之似而不可得田夫牧豎婦人女子所易而文人才子所難則其性情離也夫詩而本之性情近取諸身逺取諸物隨感而動天機自呈譬如臨鏡自見其面亦如水銀撒地大小皆圓寧待安排布置耶龔先生為詩不務詭奇大都吐其心之所欲言而止清夷簡逺類其為人亦類其為政所謂自鳴其性情者也先生之詩王元美先生及吾鄉沈純甫先生序之詳矣明月夜光識者望而知其為異寳不佞可無辨故拈性情之說以請正於先生且使讀斯集者不徒玩其皮而忘其質也詩集自序彭輅曩余弱冠薦於鄉有餘功暇日可以蒐獵百氏凌厲千古奈何晏遊惰學復以楸枰送流景也余當其時雖性好為詩而莫知詩之所以為詩後十餘年登第寓京師則京師者四方賢豪之凑而騷墨藻翰之窟也於是有談初唐者且掲風神拔俗之雋純璞未雕之眞聞其言若不復有高岑李杜也有談杜少陵者稱其清輕雄壯頓挫而沉鬱在朝言朝在野言野在悲言悲在樂言樂各殫厥趣聞其言若不復有錢劉皇甫也已而又有談中唐者予拒之曰中唐氣凡而體弱是何足溷吾耳哉而談者則官曹之長翹翹先輩也强聒不余舍俛而聽者累日始知其詩之為吐露條達而大厯諸子爛然名家不虚也自是循所聞而試為之奈何䝉魯之質徒隔涯睇望恍然目擊而身莫之詣也蓋詩之所以為詩者其神在象外其象在言外其言在意外故中唐之視初盛逺矣初盛唐之視晉宋有間矣晉宋之視魏祖與孫也魏之視漢父與子也不同言而同妙以稍得其神也夫神者何物也天壤之間色聲香味偶與吾觸而吾意適有所㑹輒矢口肆筆而泄之此所謂六義之興而經緯於賦比興之閒者也賦實而興虚比有慿而興無據不離字句而有神存乎其間神之在興者什九在賦比者半之此國風小雅不傳之秘而靈均之騷所獨濡染而淋漓者也莊周嘗以𤣥珠喻道為離朱喫詬有不能得而惟象罔得之夫象罔之所得者豈可得而强哉予之詩每不足於興其詩猶無詩也且予既好為詩則於無韻之文何啻雞肋顧自宦而省署隱而巗林人往往以文字索我日言余之所不欲言又貧不舉火姑賣文為活於是空空曵白之夫與屠沽市販咸來以文見索藉其微貲以備晨炊濟枵腹日言余之所不屑言故急書而畀之仍急煅其草不藏副也語曰目不兩視而明耳不兩聽而聰騰蛇無足而飛鼯鼠五枝而窮言貴專也余之詩所以弗入工臻奥者殆文為之障乎失之文而又不得之詩是以藝家惡夫兼也頃者友人進余以戒定之學諄諄䇿余以年長日暮曷不思所以脱離生死而猶業此浮蔓贅疣之言為余聞而是之嗟乎人當意氣盛壯之時科目之不足而希富貴富貴之不足而希功名功名之不足而希詞藝即齟齬弗獲無不攘臂而圖之迨乎晚節末路悉幻而歸諸空於吾無與也余自是可以忘言矣第平生所撰著精神肝膽寄焉幸而存之家塾俾後之子孫不見吾之鬚眉顴頰而見吾之精神肝膽况酸梨苦李之嗜或有同於予者倘非其人而捐以覆瓿余亦何能與焉明文海巻二百六十六
