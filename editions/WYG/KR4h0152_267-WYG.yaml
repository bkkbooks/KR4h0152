body:
  text: 明文海巻二百六十七餘姚黄宗羲編序五十八詩集錢生漫游詩草序顧冶桐鄉叔問錢生者其家酷貧而頗耐游耐詩詩則嚴事京口汝翼鄔生余識錢生巳踰十年亦以汝翼故而每遇之輒改色家嘗稍起矣遂忽不振如故貧也今年春余返自吳西山而錢生進其首尾詩草曰漫游者總若干首乞余為之證且曰某詩殊惡何敢薦學士先生顧欲代雉學士先生之門而集差多鈍於腕研不勝涸穎不勝秃也始重謀災之木謂非得憐某者片言冠諸首恐雉未前而指其後者踵踵矣子憐某尤甚奈何靳於言不為某地故某願借子序者如此余聞之不能讓序曰夫唐以詩賦羅天下士其元臣碩佐如陸宣公裴晉公等大抵向詩賦人也惟齷齪腐生乃不羞出訓故下聊亦獵一第博一官而巳諸英雄跅􅕟之流皆不與焉將所謂訓故儒者不如詩賦豪哉盖詩賦軼於駕訓故束於教此真藏拙之府而非程材之路也即唐事效畧可見矣世徒見君家仲文湘靈鼔瑟篇餘平平不類落語便謂仲文猶幸而充賦安在得士曾不知造物特假人手以陶鑄之而其權有不専在人者及至唐中葉藩鎮碁置繡錯都得擅拜官爵於是詩賦之權又旁奪諸侯凡以詩䞇者蜂擾烏集隨䞇隨傳傳者垂百輩而最後貫休者獨堅不肯倒易一字甚之朝東走越夕西走蜀也卒乃休名亦不泯於後世嗟乎為唐詩人者豈有幸不幸耶方其盛也上心以富貴逼之而其詩神王者或不盡布逮其衰也下力以僭竊驅之而其詩氣弱者或更大著殆非從時升沉要之因人高下彼以一字而且不果狥也假令效里婦而喪敝帚乎必不欲矣固宜考論者不偏廢耳錢生貧而無寄舉口莫能言者一切聲於詩詩既日工名亦寖滿其游故廣其贄益多苐所跡者不過咫尺吳越所通者不過二三薦紳所賢者不過割俸贏錢所尊者不過分庭左席止矣何論黙而徼神夢為仲文助不可得即陽而發狂言為貫休地亦不可得也雖然錢生且去而汗漫游矣凡窅㝠之鄉罔兩之野直其龜殻中物况世人猥以詩云者其壤蟲乎汝翼錢生本師也晚而好道當有聞者試以余言質之金臺集序顧冶余友丹徒鄔汝翼少以公子為諸生即錚錚任俠負奇氣喜談兵及天下大事音若洪鐘歲就學使者試輒高等稍食廩瞽宗聲益蔚起然卒不得第遂不肯竟博士業去而業詩以故家日貧游亦日放跡徧兩都㑹間其游黃金臺也京師諸公凡繕辭賦者爭慕之無不願一當鄔先生乃汝翼不樂也顧好與狥屠劍客縱飲擊筑悲歌燕市中醉則覔燕姬倚趙瑟撾秦箏多集鬬雞蹴踘諸戲分曹雜進粉黛狼籍便入温柔郷厭厭徹旦而汝翼還視其槖裝易水生寒可掬也則倦而歸歸而產加削髪益短因自請老罷弟子員去而㑹曇陽子仙至婁海汝翼始忻然學道盡斥其故業矣丁亥秋余反舊廬汝翼適至自江上當是時汝翼方辦嚴由錢塘訪旌陽鐵柱觀冠芙蓉支玉杖衣鶴氅余見之而驚以為神仙人也坐定汝翼手一編示余則往游金臺詩以屬余序云余笑曰以君之材情提固攀思襲兩登三最勝矣獨奈何蛻其幻形而尚顧其泡影為哉汝翼曰不然昔吾陟太行望居庸覽西山晴雪鱗鱗佛寺皆成金銀令人不風而翼已踏鳯凰池繞鳷鵲觀睹一切珍禽怪獸丹荷翠栁與綘幘珠襦窈窕絪緼萬狀綽有霞征雲舉想乃其殘香剰澤頗菀而無所寄聊復㸃染是集遺諸來者為千春逸響異日者倘邀寵旌陽出世五陵亦何論金臺彼三神五城殆吾眉睫間物耳吾去子矣與子尊形而薄影毋寧留影而寓形焉可也余然後悔聞道晚誠不知汝翼夫安期梅福兩生者其初不嘗䇿於項羽書擯王氏也邪一不用而棄妻子如屣得棗如𤓰者蓋恥其身之螢流電滅也汝翼不幸格于時無以銷雄心而奪遠志今且掠滄海而東並九江而西矣安梅兩生猶將旦暮遇之况是集者其汝翼之土苴乎余又惡能重汝翼也於是再酌巵酒為汝翼壽而别明文海巻二百六十七
