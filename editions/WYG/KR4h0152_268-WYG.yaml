body:
  text: 明文海巻二百六十八餘姚黄宗羲編序五十九詩集吳景猷詩集序邢侗今海内物力多絀獨文力校盛窮閻下邑人人工為詩然而外强者中恒乾聲炫者實類尠塗鴉佹署以為鳯畫虎自匿其近尨樗櫟無禆於巨匠竹木卒歸於瑣屑者矣其或渭城止限於一曲則全體之艱金刀未槩夫鬢毛則薙薉之艱雨既歇而星榆未耀則啟晦之艱天方春而甲萌弗則振秀之艱百年萬里反脣離合疇能為何李故物也中原白雪觭重雄桀誰其為王李濫觴也程季說餅右軍噉麫亦既著明矣而必文之以起搜䬪飥薄持牢九則用脩之為累乎秦時明月漢家長安亦既雅訓矣而或雜之以聯拳足蝎細看淺把則德涵之為病乎吟箋率承晚季則雲停之波靡乎壯氣間沿咤叱則樓居之俗漸乎加以人懷心競物情膺借傅武弗愧於人知柴郎力訟乎秃竊耐窮忽遞才致受困翾風下而緑珠上後彥媿交讓之䕃脫光靳而鸊鵜雋異才厄剸割之數嗟乎此道誠難言哉余年友閩漳吳景猷先生者墮地靈異等身渉誦不器允屬乎君子踰勺即推乎國士弱冠對策出握州篆入佐司冦厯渉藩臬間而里居廬處歲月屢易觸情抒性撫運感物階除移半甓之影燭花垂一寸之炧夏歌廣鬰陶之致楚謡極正則之變凡百先正嚆矢枚馬爰有貞婦擬議團扇劉司空之傷亂郭𢎞農之遊仙許徵君之自叙陶彭澤之田居盧照鄰之折栁陳子昂之感遇岑嘉州之滻水高達夫之安西孟襄陽之清鏡王右丞之輞川杜拾遺之秋興劉隨州之聽笛皇甫氏之江草靡不條流檃括興象速肖南車首路岐道下泣高宴排當簿主退舍襟情倐乎雲漾藻思洒其泉薄遡風華於麐閣儕隱淪於環堵梵靖抉其幽闑夷裔殫乎單外洵可謂詞躔七曜語陣三行者矣先生靜思孝子惻閔忠臣耿介廉士淹洽秀才忼慨將畧差分計智徒以短造未臻乎耄境齎志蚤親乎漆盌賈生未返乎前席仲舒竟虚其廷獻所謂交讓剸割之喻不獨詞華吁可悲矣䝉而持論眷言先生由前云云總之去瑣而攬巨彌巾而詣寔鴉尨遠於高里虎鳳還其所知四艱妙於風削八士守其寸長斯不亦盛明之罕覯吾黨之大涂哉先生有子亮恭嗣成進士代倡建鼓以䝉同人忝厠屬以前茅䝉也腹痛未申何心結綴嚶鳴在臆猥抱咄偪聊贊數言用質震旦騷壇云爾馮光禄詩集序于慎行蓋嘉隆間齊列大夫修騷雅之業者於歴下有李滄溟先生北海有馮少洲先生李先生所為歌詩力追古始以調高一代而馮先生所論網羅數百千載以富雄一代海内觚翰之士無不望李先生之鵠以為騶虞貍首而亦無不蒐獵於馮先生之苑以為陸海藍田於是齊以二先生見重於天下然馮先生所自著歌詩獨笥藏未出世莫得而睹也以為先生吐納萬有放之毫端必且鉤深索隠亢節髙張以凌厲當世而予從太史用韞得受其一二顧又淵然間靚粹然荘瑩浮聲切響按之無郤而有所不欲盡於音豐葩儁藻抽之愈出而有所不欲竭於辭不又與李先生異邪盖嘗以為古之脩辭者積閎而用嗇其神常應於有餘後之脩辭者入少而出多其力常操於不足有餘者得諸心故不厭為醇雅和平之調而自不能巳於高華不足者怵於目故愈務為壊奇亢厲之音而終不能脱於纎靡此不可以不辨也且夫才有所出而趣有所極李先生致在不能不為而馮先生致在能之而不為皆所謂應於有餘也譬之於水水之發源長而積也厚時而為洞庭為彭蠡汪洋淵涵一碧萬頃不見其波而弗謂之平時而至於巴東之峽吕梁之津砰礚洶湧傾洞天地而弗謂之險何也其所以為之者皆有餘而巳矣乃且有技於此激行潦之水出諸旋渦塪竇之間極其力之所操使之懸騰疊躍以騁陵潏之觀豈不亦洞心駭目而大智以為鑿文無有矣此無他不足之効也以此衡之二先生之指趣亦必有不謀而合者顧世無能深識之耳馮先生者其兄有三先生繼其先中憲公之業並以博學工文為齊魯諸儒冠冕而太史繩仲公之武益光大其家學以雄於著作之府故馮氏之於藝文若裘氏冶氏世治其官而天下以其閥閲方漢前將軍奉世父子則甚類矣然考大鴻臚野王於兄弟中名獨著尚書品第列卿推其行能第一而時亦不究其用以先生揆之又先後相符也信於才而絀於用自古然矣彼天道於名實之際其酌損何如哉先生文賦稍多尚未及付梓先刻其詩若干巻盧子明詩序車大任我明自國初迄今重熈累洽海宇晏然薦紳及韋布之士摛華掞藻代有其人噫噫盛矣在永樂時有髙廷禮氏集唐詩品彚一書從中拔其尤者題曰正聲誠大有功於詩教云及閲廷禮其生平所自為詩如片影懸珠斗微光下玉鈎旌旗半捲天河落閶闔平分曙色來諸如此類神韻超然蓋其時風氣醇厚直取唐音而追配之矣乃子明去廷禮頗逺而志竊慕焉亦取國朝詩刪繁撮要拔其尤者彚為六十巻約四千二百篇有竒亦名之曰正聲而其生平所自為詩不與也有愛子明者因取子明先後作合而梓行之請予言弁諸首予則以詩不易言三百篇尚矣降而楚騷而漢魏而六朝而三唐其體愈新其變愈極無亦世代使之然歟要之神韻則千古一轍不然者櫛字餖句刻鵠效顰謂之詩也可乎今觀子明詩辭藻氣骨種種過人而又寓悲愴於和平藴神奇於渾樸大都神韻居多則亦奚讓廷禮氏矣詩如廷禮而後能選唐詩詩如子明而後能選明詩上下二百年間兩君不多見也頃余在金陵與子明談藝朝夕知其坦衷直度蕩無城府又從倪生江生聞其先君廣文公暨兄子孝俱有詩名子明少承家學矢志博雅自築室於狼山之巔俯瞰大海忻然有得閉户幽探者二十年意興所到輒於詩焉發之巳而幡然縱情江湖之上先裹糧走白下眺秦淮之故墟追六朝之遺事復從姑蘇就虎山禪林居焉抵錢塘放棹西湖悠然樂也返轡姑孰訪謝眺之青山登采石弔李謫仙之墓又欲登衡山渉彭蠡遵海岱為五嶽之遊其用心已勤取益亦廣矣且居常屏謝囂塵寄情寥廓不妄與人交即素所知識薦紳不通一刺蓋與物寡營而專心大雅此其人眞不與世之談詩者同日語矣以故其詩益奇進若狼山之東走數百里而烟霞變幻可覩也若大海之善下而萬派朝宗莫測其涯涘也予是以信志士立言良不易云假令子明無潛修遠覽之助則神韻不生神韻不生則雅道不昌詩固不易言也雖然亦幸遇太平之時而歌咏之耳噫嘻盛哉此今時風雅之所以超軼徃代哉是為序汪明生詩序邢侗夫輈以載也簋以盛也削以斷也帛以蔽也皆物也而法存為輈欲頎典簋欲胥厚削欲敝而無惡帛欲器蜃暴宿之相得皆縁法也無法則無物也由是以談文府稱詩是謂善物也而法或侈之抑或弇之巨人著態於逕肥小兒呈姿於妠婠皂𨽻僭質於乘韋王公降行於執㦸易形變位詩以衰巳明生故歙產比遊中原而立之齡戢身四壁藜牀布袱不關聲聞非石室玉板之藏不渉非甂甗敦鼎之識不辨非生金塡闕之幻不博非鐉燒破析之餘不闚而又窮煙於史籒獵紙於蔡倫搜筆於䝉氏討研於仲由㩁狂之市霾照隱名殆十餘年而書始出其書大抵皆稱詩今觀其詩不眡形不以造不定位不以發條流檃栝可借而言譬之純王則佖佖於冠冕譬之英霸則肅肅於壇坫譬之刑章則斤斤於科令譬之軍政則鑿鑿於詶厲而明生猶不自意也曰元范布衣簡賤奚知詩能不苟於為詩而巳夫輈之頎典不苟於為輈也簋之胥厚不苟於為簋也削之敝而無惡不苟於為削也帛之器蜃暴宿之相得不茍於為帛也明生其諸輈簋削帛之為工乎於志有之舌敝耳聾不見成功明生之詩怵慮刳心功乃以成關中南史子興雅負敬禮之識副在和凝之拔殺青甫己猋絶奔騰家見賞於郢音人盡赴乎渌水斯足傳己明生行詣渭川便姗磨鏡拜尊怳乎無及攀棺企其庶而明生其或張大乎殽函南史則亦關尹之續爾穀城山堂詩序邢侗吾師宗伯學士先生以日講事今皇帝最久受眷知最渥其予告家食穀城則以先生屢疏控懇移疾休休云乃今居諸荏苒十餘年往矣先生時年正六十色甚澤志甚愉而召還之㫖廹在旦暮先生一若弗聞也者比以一編馳示小子侗曰此余平生所為韻語也子其為我校之紀之侗受而恭讀焉凡踰旬稍稍渉其涯涘乃借論曰有是哉先生之値盛明也盛明之獲有先生也洵非偶然爾也夫有唐制作之業獨歸之詩要之擅絶而難繼則又獨歸開元天寳之際而名盛唐神龍以上詎乏宗工而以沿習近代之餘流波未泯靡麗勝則嗛其爾雅痕露態則失其穩嚴是之為初唐彼盛之軼於初而初之不及盛則時代人情之境㑹為之也譬之釀焉酎以重醰醖以法極漸漬深而藴愜洽靈和溢而天籟鳴盛之為盛可知已我明荷天隆運氣化涵融故其於詩儲精有獨厚表盛有間才愚得抒臆而談焉李何崛然並挺力振孤學猶之產神景而跨開元懇强竭蹶以為盛唐而化鳩之眼厥有微譏江東厯下據時全盛流羡開元之座即人士不無岐舌先生起於厯下之壯盛而成於江東之末年論其年代若合開元天寳大厯之世而先生者猗歟休哉昌明之際於斯為甚矣先生降神名嶽夙負㓜清蚤奉嚴亭青箱付授之日雅言乎詩而又加以熈朝之所淳湛逮官翰苑彌厲家學以兹地望不以資詼達而以窮秘檢不以廣游道而以適深衷性靈所㑹遂百同曹忩户溷藩畨置刀筆而後其書成書凡百巻不盡述今畧辨晰其詩清靜淳粹則孝子之處心乎優柔温厚則君子之厝躬乎欽嚴秀特則太華之孤標乎汪洋吐翕則重溟之巨觀乎華粲敷腴則霱瑞之巻舒乎條流總統則箾籥之集成乎從盛明而出先生之業就盛唐而測先生侗竊謂先生律絶歌行等取以擬盛唐則先生與盛唐兩無負若以樂府古詩而儕先生於盛唐則盛唐猶似負先生者此其故難言矣降而論代屈先生與李何角則李宜遜姿何宜遜骨不寧惟是假令江東以欱野山之勢而遇先生不能不左辟中原之固壘即起厯下而抵掌於黃石之次厯下能無爽然於銜勒而推先生國歩乎夫抗聲文苑則䕫龍弗愈於馬班正色台司則李杜或慙於伊傅何也則以全力之難而齒角翼之鮮備也先生貴為王佐尊則帝輔託詠屬詞卓焉名世不亦天授也歟先生係屬人心甚切有頃天子亟下黃麻而相之屬所司親勸駕焉則馬班李杜一日而都伊傅䕫龍之席所為稱報張大盛明者曷極而盛明與先生遘不徒以聲詩故斯又無前之緖矣門下士侗老於一壑學植雖薄尚能勉撰中和樂職宣布聲詩以為先生藉手丹陛下也程中權詩序董復亨凡學求似耳弗似弗是雖然似之而亦弗是也夫學又各自有眞也眞者人之精神血脈也似者人之面目皮膚也學之而似是舍已之精神血脈而借人之面目襲人之皮膚也嗚呼眞弗眞弗是矣而詩道更甚三百篇者三百篇詩人各自冩其精神血脈之所注向也漢魏似三百篇乎六朝似漢魏乎唐似六朝乎即唐人中青蓮捨遺長吉樂天文房子厚各相似乎不似也不似所以為眞詩近之為詩者學三百似三百學漢魏似漢魏學唐諸家似唐諸家夫似曷嘗非詩然而非詩之眞也無論學歩效顰祗益之醜即優孟為叔敖胡寛營新豐似矣然是眞敖不是眞新豐不故曰弗似弗是似之而又弗是也程中權者新安之詩友也其為詩近三十年余嘗取其詩偶一寓目求之唐弗似矣求之六朝弗似矣求之漢魏弗似矣即進而求之三百篇弗似矣惟肖題已耳不牽旁門物料寫情己耳不旁古人生活沈着而不必為俊亮之響辨博而不必為高古之調綿宻而不必為枯寂之思的確而不必為形似之語以行役詩者則中權行役之詩也以贈别詩者則中權贈别之詩也以寺觀詩者則中權寺觀之詩也以俠邪詩者則中權俠邪之詩也可莊可狎可淡可濃可近可遠可大可小而不可令似古人一語即古人亦欲似中權一語不可余謂此中權之詩中權之眞精神血脈也世為之詩者猶其面目皮膚也夫面目皮膚又何足言詩非不足言詩不足言詩之眞也余友顧太史嘗與余論史謂太史公列傳每於人紕漏處刻畫不肯休蓋紕漏處即本人之眞精神所以别於諸人也余嘆為知言噫知史則知詩知太史公之所以為史則知中權之所以為詩畢孟侯詩序方宏静畢孟侯使事既竣將還朝爰集其詩言曰康也勤萬巻而論百世則弗敢畫而茍不以正於當世長者將惑是懼請辨焉余讀之竟曰是大鄣之靈運也夫體具矣辭麗矣堂室之間無弗詣矣夫孟侯垂髫而摛藻已驚時輩弱冠幾立而委蛇於清華之署造物者不以簿書期㑹役之既縱之矣而孟侯之篤嗜苦心其揮屈壘而短曹牆何超軼也余年運而往矣秉燭之明奚以益於日中之煌煌哉蓋嘗讀涇野氏之序空同子之集也惜其為屈宋諸子而曾思程張胡弗為也曰君子哉涇野氏論歟余則有疑焉夫使空同子不為屈宋諸子始可曾思可程張邪即為屈宋諸子而不可為曾思為程張邪余以為道一而已矣理學詞章非岐為二者也且也洙泗之門固列之文學之科質勝則野草創之討論之潤色之是以善為命也辭之弗可以己也言不必有德則蔽非文之過也列宿之章也百卉之華也天地之文也而可曰何以為乎孔子曰文質彬彬一言盡道是以世為天下法涇野氏之論毋乃岐而二之歟余是以疑雖然子言之辭達而巳矣吉人之辭是以貴其寡也空同子之集或亦有可損者雖不掩瑜而元凱之僻皇甫之淫倘有攖之者歟故夫涇野氏之論君子也孟侯之才力自可屈宋諸子可程張可曾思涇野氏之論請以為孟侯益願孟侯兼之孟侯方以宅俊楨國其虛已以應世乎則定性之㫖也先憂以匡時乎則訂頑之度也事有道之朝言足以興不變塞焉則曾思之訓也若是而為屈宋諸子其文蔚以載道奚不可者合并而時出之大人之學具是矣木訥者薄華溺博者忽樸其於彬彬之道胥閒歟余年運而往矣其言世應以為迂雖然願孟侯之兼二者而一之也黃石函孝廉園居稿引劉文卿余往謂刪後亡詩而有詩有詩而亡詩竊不自揆於當時之作者相睨於工力色澤之外如塗毒鼓遠近聞者無不䘮身失地建安以來作者如林觸者如㦸死者如陳陶之兵朱殿草菜鮮可勝詰則詩之果位非夫古之所謂博大眞人哉然而鄭衛之什垓下之音無不取裁大成盛推辭苑所謂亡詩而有詩也王仲淹氏謂其性情不忘殆千古定論諸文士窮祖述惟恐其不肖也不焦氏而廬江也不同谷而七哀也遠别離烏栖曲奚必有所刺好色而輕失守謔笑唾淚蔑不有也而實則工伎也故其氣格有所得亦有所失於詩非吾宗也而猶然詩也余友右文氏素博物无銳詩歌俊慧清婉無所不當於諸家而近體言杜陵言右丞古言鮑謝如秋興宫詞等篇刻羽雕葉冲融映人如令其骨鑱然鬱鬱然程之五父之衢必有以幸明遠拾遺者右文始基之矣右文履迹稀於四方於邑之山水無他奇者每為園中膝吟坐嘯千里不忘土風乃太史公畱滯周南渡淮登岱宗而文章益工夫使之神氣飛踔與五嶽俱騫者非江山也耶而廬江垓下感於何有參諸至情響以天籟豈為地低昂擇乎右文知詩之本者也今以後日躪開元蹴梁甫求所謂果位者而證之則右文有詩即不格以聖流樸而始華略其凌厲假澤之態亦建安開元之墉也則右文有詩右文於詩固無所不得矣余輒以往日之測詩者而質之菊山黃先生詩集序鄭以偉今言詩者有二一主於摹以為斷木為綦捖革為鞠莫不有法况神明之物乎故奉唐以為功令夫摹何不可哉懼摹之不肖而以襲代也一主於創以為臨帖學書似之愈甚去之愈遠要於情迫境㑹破天地未有之吻為竒耳夫創何不可哉懼創之不得而以俚代也兩者皆蔽而襲為甚夫俚猶自道其情襲則拾藩丐瀝涕笑不得自由其巧者為優孟之叔孫可以一驚楚王而其拙則具面之技其肖人者亡矣惡乎可哉茍以我為詩而借法於唐則唐即我也以唐為我斯眞能唐者矣明之眞能唐者信陽北地以後温陵有菊山先生焉先生負經濟才困於一第筮任舒城移刺衢州各有惠政卒罷去徜徉於龍首紫㡌之間其為詩自出杼軸法不乖古多取精而簡出之奴選𨽻騷盡驅百代以供佐使讀之者如宫縣並奏競氣繁聲不專一族然先生之詩非有意匠古乃古之不得不為先生用也非先生用古而務脫其陳乃古之用於先生而新景出也先生摹唐唐摹先生乎哉吾不得而知也先生既逝冢孫少宗伯毅翁師既已發先生之藴而輯其詩凡若干巻授予同年李君繩伯鋟之蓋祖笏之瞿也鋟既成師以敘屬不肖偉不肖偉曰論詩於初變易論詩於既盛難何則凡初變當蕪累己極之後勢不得不劌之以歸於敦琢在去其俚而已改觀矣故曰易若己盛之後飾窮於無所加而習結於衆所趣非去其襲不可故曰難國初諸公易韎任之音為大雅之響亦猶王楊盧駱變駢麗為温厚似初唐然予以為洗勝國之舊而空之正始之音也至何李以後苞者盡吐厚者盡洩其在開元天寳間乎似盛唐既盛矣士之口誦目駭無之非時所嚮者遂不知其然而入於襲故去俚易而去襲難先生為詩自其天性無意於摭古故無文士雕蟲鬬鶴之態而體勢自渾師恒為不肖言先生詩若不經思叉手之間百韻俄成古所稱能事生於天殆其然矣並先生時閩復有鄭繼之亦以詩名評者謂如冰稜石骨質勁不華又如天寳父老譚䘮亂間事語語實際令人欷歔欲絶蓋得杜之骨先生詩其意義格律大略相當而才情過之可謂兼得杜之神然要之兩先生皆不相襲者哉楊泠然詩序鄭以偉宋玉之言風曰枳句來巢空穴來風人其詩之空穴乎故人不得己而有詩詩似非人之本然亦惟詩為人所不得己則人乃詩之本然也空穴具而風來矣人具而詩來矣當其來也孰禦之哉國風半出委巻歌謡之作矣非曰求工其來者皆其不得巳者耳余與楊泠然為二十年異姓兄弟各鳥獸散者數年忽送薛魯叔於楚宫見面如優曇花矣而張君一所敘冷然詩已盛行於天下冷然於詩若四威儀二六時中不廢其工者如君一所云朝嵐夕霏鳥聲雲影出入胸次見於嘯歌然皆其自來者也泠然令山陽有元道州風用才曹郎選侍藩邸講筵亡何罷去起為四門先生而好吟不輟若唐人所謂隂有程督者夫楚無風而有詩詩之萌芽自楚發之非其初無風也不見採於太史耳泠然從江右徙夜郎夫江右半楚地詩在宋以雙井為教主而列陳潘謝洪之徒為法嗣好事者至作宗派圖夜郎古荒服自青蓮乗風後豈無里巷歌謡如風人詩惜未有採之者耳其為詩空穴者固在也近世孫宗伯淮海起而振之淮海如臯產也而寓清平衛其論詩則謂不知學道不可以為詩數十年復有泠然泠然亦自廬陵徙貴州衛自是夜郎亦如楚無風而有騷謂自淮海泠然發之可也泠然仕宦即落拓氣類相許非雲霓椒蘭鑠金矰弋之離也逢世休明非有孔靜幽墨寃結紆軫之鞠也遇與三閭異而糅玉石於一槩悲方正之無媒或亦與三閭同讀其避暑錄如蟬蜕人間石林草閒閒十畝覺哀我生之無樂幽獨處乎山中之為迫狹乃其觸時掁世又不勝慷慨蓋趣味泠故作無情黠心腸熱故作有情癡屈子多憤而遠遊露其冲㫖淵明恬淡而荆卿一咏發其壯心泠然有陶之壯而出以恬得騷之幽而無其憤殆以學道為音韻者也使異日鳴國家之盛如淮海其誰謂黔不楚若邪嚴滄浪以禪喻詩古宿有問眼來屬形還復形來屬眼余謂水鏡接而道自然古人善詩皆有物於外以主之人情寂然析圏臼洼吹萬接則往來於泠然者亦風穴之交而己泠然深於禪其以余為具金剛眼睛不明文海巻二百六十八
