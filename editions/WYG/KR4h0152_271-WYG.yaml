body:
  text: 明文海巻二百七十一餘姚黄宗羲編序六十二詩集沈從先詩序徐熥徃友人陳履吉遊長安歸為余談吳門沈從先不去口時從先甫弱冠耳讀其所著衆刻草雖嘗鼎一臠而知全味矣既而因履吉得請交於從先乃從先亦不我鄙夷越數千里尺牘書郵徃返不絶辛夘嵗余有燕之役至吳門而病不知人者數日然神雖昏憒而心念從先不置時時從牀第間問沈郎無恙乎索十日不得竟去矣明年仲弟興公入吳始得造從先之廬而禮焉歸識其處曰某鄉某里圭竇蓽門有廡下風氣者是巳今年予復過吳閶日巳崦嵫入尋從先所居則鄰人云巳徙去踉蹌出閶闔門覓舟不得所與偕者王生元直露宿江干達旦竟去矣頃從建業歸始得與從先把臂而後喜可知也時從先方病足不出户庭余依依未忍别去令奚奴襆被其中從先貧不能為孺子設榻但與王生共跏趺几上耳因得卒業其所著尊巳撚枝閉戶諸集樂府古詩取材於漢近體得格於唐要皆抒所自得意不必古人有語不必古人道茍巳披之朝華直咳唾視之不以煩子墨也即置之古人中其誰能辨之夫詩所以言志也從先三旬九食捉衿見肘而閉戶弦歌聲出金石此其趣操列之參憲曽無異同未有胸臆古人而搦管操觚反掇拾餖飣落時人窠臼者也誦詩論世而其人可知矣或謂從先饑寒流落無以自存而習不售之業以遊於世嗟嗟從先不知其稅駕也噫方履吉談從先時云其娟娟韶秀有安仁叔寳之風不十餘年而顦顇枯槁己成壯矣由今而至於老死不知嵗月幾何乃榮通醜窮而為此拘拘也亦大惑矣夫藜藿膏粱短褐紈綺所適不同同歸於盡士顧不朽謂何耳後世有楊子雲乃知楊子雲此美談也從先勉矣陳惟秦詩序徐熥余既困於公車稍厭棄故業與仲季二氏杜門掃軌以柔翰自娛其所徃還最驩者莫如陳氏惟秦惟秦居南郊之柯嶼去城三十里而遙每入城必宿余家濁醪相命脱粟共飽或匝月經旬始别去而惟秦興復不淺或出遊未嘗以倦自免或分題探韻客猶謙讓未遑惟秦巳躡嚅喉吻間矣或秉燭夜談不漏沈不寢即余先寢寢而復寤猶聞惟秦呻吟牕壁間也其嗜學苦吟類如此其所為詩不喜蹈襲人語皆嘔心剔肝為之而卒不盭於法然性復謙抑一詩成必私問余可否而後出以示客一日余心賞其詩故佯言不佳以試之惟秦立加竄易顔色愈和余大笑乃止故其詩鑪錘工而機軸别也賦性恬淡不問家人産所與遊者皆山林草澤之士遇達官貴人則面赤心熱有鑿坏而遁耳夫今世操觚之士稍能占四聲者即曵裾彈鋏於顯者之門博錢刀以飽妻子惟秦木彊椎魯足不越四境名不挂縉紳塊處於蓬蒿之下以五字求信於後世所不知何人亦大惑矣余今年遊燕挾惟秦詩一册置槖中欲授之梓而且有待也過吳興謝在杭司理見而欲付於匠氏在杭於惟秦為微時之交稱同社故雖行其詩而不傷惟秦無求之介余遂許而授之在杭出山東而坐苕水者三年於此矣目之所見無非錢穀簿書耳之所聞無非譙訶捶楚一旦讀故人之詩宜其欣然有合若弱喪者之還其鄉也若在杭者可謂無赧薜蘿而有光猿鳥者矣斯舉也將布衣之重司理耶抑司理之重布衣耶識者自能辨之林若撫梅詠引俞琬綸與林若撫結嵗寒盟為千古人懷千古心相期而不可以相喻落落者吾痼疾也此期一訂於落落更宜一抹交情類蕭然有寒意于若撫則尤寒蓋兩寒而寒愈冽也氷入爐有消而己必不變而為火此寒徳也濯錦江邊殆與棘門寒塘徑逺然豈千古懷哉然又不可以不慮若撫特於湖上作梅詠百品頎然而來以詩擲吾寥然而去懷哉懷哉其嘯也歌隴頭雲逺花落春枯千里霜根一函寒意是豈在梅是豈在詩也若撫名雲鳳蘇州人崇禎庚午在南京余從之學詩見贈詩極多今皆失去止記其贈余及吳子逺周元亮同庚詩誰家得種三株樹老我如登羣玉峰一聨而巳其詩稿不知落誰人之手恐將煙沒矣國朝詩餘序錢允治詞者詩之餘也曲乂詞之餘也李太白有草堂集載憶秦蛾菩薩蠻二調為千古詞家鼻祖故宋人有草堂詩餘云若其分類箋釋則起於勝國人所為大都如六家文選必引某句出於某人未免牽合傅㑹殊為東坡所厭今茲集一遵舊本旁求博採彚萃本朝名人所製續於二集之後凡若干巻然什百之一尚多遺亡也與陳明卿孝亷稍為註釋略加標記然亦什百之一尚多掛漏也竊意漢人之文晉人之字唐人之詩宋人之詞元人之曲各擅所長各造其極不相為用縱學窺二酉才擅三長不能兼盛詞至於宋無論歐晁蘇黃即方外閨閤罔不消魂驚魄流麗動人如唐人七嵗女子亦復成篇何哉時有所限勢有所至天地元聲不發於此則發於彼政使曹劉降格必不能為時乎勢乎不可勉强者也我朝屛詩賦以經術程士士不囿於俗間多染指非不斐然求其專工稱麗千萬之一耳國初諸老犁眉龍門尚沿宋李風流體迨乎成𢎞以來李何輩出又恥不屑為其後騷壇之士試為拈弄才為句掩趣為理湮體段雖存鮮稱當行正嘉而後稍稍復舊而弇山人挺秀振響雜之歐晁蘇黄幾不能辨又何耶天運流轉天才駿發天地竒才不終詘於腐爛之程式必透露於藻繢之雕章時乎勢乎不可勉强者也然詞者詩之餘也詞興而詩亡詩非亡也事理填塞情景兩傷者也曲者詞之餘也曲盛而詞冺詞非冺也雕琢太過㫖趣反蝕者也詩降而詞觔骨盡露去漢樂府千里矣詞降而曲略無藴藉即歐蘇所不屑為而情至之語令人一唱三歎此無他世變江河不可復挽者也嗟乎有一代之興必有一代之製而我朝監於二代郁郁之文炳煥宇内即填詞小技遂出宋元而上茲非國家文運之隆人才之盛何以致是哉茲因太末翁少麓强為彚萃而見聞不廣收録艱難且時日局迫引用乖方未免顧此失彼遺編掛誤詎能嫓美草堂花間詞遷諸集又愧嘲風詠月無補世教然因詞以審音因音以知律因律以識樂引商刻羽鏗鏘鼔舞推之郊廟朝廷之上未必無助云知音君子尚頼是救正可也翁仍詩集序呉伯與世所稱美物必首富貴文章之流傳視富貴更甚故天不能兼與人不能兼取且生而世族焉擅富貴矣耳目四肢之奉天之與之己飫飫此而甘又攻苦於文章俗情未遑也曰窮而工者决其一力以争於造物之一所取易足耳且男子生身於世所乗惟時時至矣恐於身不得當當矣搆璅射騖之不免如上官子蘭蠖屈睢盱不平之鳴幾於天籟宜也然屈平之繼風雅固以幽憂采詩而觀列國之風周南召南孰非心和氣和適於所遇而龍門世業太史公固席有富貴建安之壁坐璣聫又岳岳矣安在必於窮余與翁仍束髪而談進取之業齧齧相責窮莫如余老抱一經遊四方於詩道猶馬耕也翁仍籍世業蚤舉於鄉下筆無所不快莽沿蕩深淪漪颷曵竒若海􅄓正若嶽厲蓋源風源雅何所能踰翁仍而上者猶自叙曰窮愁未工翁仍於才有餘於志若不足才有餘故縱心之所嚮蠭起響應而不可􅚙志若不足故不縱其遇之所適而引心窈㝠竒博不竭陸海之蔵溢積充羨不止是以與者不忘完不取之取不忌多天以答其勤耳余南遊數年間登鍾山步臺城覽勝雨花獻花見其冶者如蛾幻者如畫澹者如貧素不琢而工者如文章富而􅴒者如冠蓋逸而待者勞而馳者納納行行如豪客酒狂千態札茁固如博物多才剽刻古今者類如此乃翁仍又曰詩宅乎雅夫人人言詩亦人人言雅雅者三代盛時歌詠其盛徳大業合而名之者也翁仍貎盛而氣决從此體証於道抵掌於事勲余所覤覤以往尚未有艾矣翁仍果負余言哉明文海巻二百七十一
