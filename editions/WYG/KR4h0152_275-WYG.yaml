body:
  text: 明文海巻二百七十五餘姚黄宗羲編序六十六詩集訛草自題唐俞世界盡訛也自齊諧白雀開天為訛之祖而嗣是牛鬼蛇神種種不一遂有贅槐安飄羅刹騎鯨化鶴擾龍修羊伴入籠之雙鵞感渡河之三豕雲中雞犬月下箜篌是耶非耶傳疑傳信又况愛憎之口風影之談去来萍梗之蹤跡蒼黄誰主寵辱何憑於是吾友木叔氏甫入春明倐而目為烏有先生矣及天際歸舟布帆無恙相驚以伯有相慕以文成相怡恱以更生又羣譁曰此詩題也余蚤知木叔博物君子能辨實沈臺駘自可使不為祟何必乞南斗禱度索君且也修文之役上帝雖命而負此史才半臂子京雙椽影裏有人留住固無煩諸君子慼慼木叔一肚子不合時宜啼笑於詩文一肚子不合時宜之詩文禪於酒隠於色荷劉伶之鍤化鄭泉之壺隨蜂蝶於蓮香染唾華於廣袖即死亦不復恨雖然七尺可輕微言恐絶性癖耽佳有生之樂樂反生耳姑相與妄言之子以優孟衣冠余作黎丘供奉大招耶七發耶吞聲太白感夢巨卿聊借五言宫徴之音以當三日庚申之守此事訛也此句亦訛也命之曰訛草而以博好事者破涕而為笑也明文海巻二百七十五
