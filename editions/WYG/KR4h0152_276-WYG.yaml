body:
  text: 明文海巻二百七十六餘姚黄宗羲編序六十七詩集黄太沖野園詩序羅萬藻黄太沖勾餘才士故侍御贈太僕卿白安公之嗣公子也太僕公負忠正之節攖逆璫之燄抗疏直言殞身北寺天下莫之敢明太沖以弱冠伏闕訟寃義動當世咸曰忠臣之有子也如是太沖雖才何暇以文彩自見與才人韻士爭尺寸之席哉壬申冬崑山朱浮石先生以太僕公之門人手太沖所為詩一冊示予因傷太僕公事聲泪俱至汝南郭亮之風千載再見然予讀太沖詩感憤寓物之言十之一詠事十之三贈答十之五閨語十之一未嘗自譜其年月以其詞繹其志盖發憤于太僕之所為作多矣此浮石先生所以悲也古人忠孝之語哀激所次有則有倫况出之雄文博學之輩衝於口而被之音天地鬼神感通之至數該焉盖不求為韻語而不能不為韻語所謂長言之不足又從而詠嘆之是也三百篇之亡乃有離騷遂接風雅為後代詞賦之祖夫屈子義兼親賢使不遘上官子蘭之徒騷亦不作騷之為言憂也故屈原特以其憂傳而千餘年之後宋遺民謝翶者復以其哭不朽晞髪諸詩先儒以為直遡盛唐以上夫臯羽世經義之學應進士之科使不罹宋季之難感文信之死詩亦不作故臯羽之詩乃與其哭俱由此言之情不絶語必不至文字皆然而况詩之道乎太沖英才磊落挾以少年之氣今其詩幽折陟㧞而忳悒多思與老成積於世故者相類其鐵琴死戰馬老狐行諸篇命事稱名亦頗與原之山鬼國殤翺之鐵如意玉麈尾同至其紅閨麗事諸詩豈所謂托情男女亦宓妃佚女洗藍曲楚女謡之致類乎何其情之峭以深也哀心感之無言不疾故曰發憤於太僕之所為作多矣夫道彌往而風彌厲古今皆然文字之槩亦觀世之理也惟太沖負忠孝之極思佚按愆於心者既甚而後溢之為詩故不獨有詩而詩復鏗急絶人風氣逼古此予所以例之屈原之憂與臯羽之哭而為言爾不然太沖遭遇明聖忠臣之魂己雪黨人之碑己踣以彼其才進用於世非二子所可同日而語也明文海巻二百七十六
