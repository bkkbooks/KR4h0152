body:
  text: 明文海巻二百八十三餘姚黄宗羲編序七十四贈序題巻贈楊功部北上何遷始余未至留銓己聞華亭楊子朋石為敦行之學􅂱然著於時矣比至與之居者一年未有請也乃楊子顧時時為余盡余亦時時以其意先之一日楊子幡然起曰吁何子尚未可以言乎且聖人之學固余之所求也予乃笑而請曰且子有意於聖人之學也将以進於其道也而可以其敦行取乎哉聖人之學其修也以性故其爲體也主於虛後世之學其修也以行故其為意也存乎見存乎見則其神外察矣神外察則其行必修然􅂱然而著者性之所以鑿也其流也至於矜名主於虚則其神内藴矣神内藴則其性必修然闇然而章者行之所以成也其極也可以致道且子何學矣而辨諸此庻幾其有變乎於是楊子憬然而思凝然而觀居三月充充然若有所悟而入也乃考之乎六經證之乎諸儒研之乎二氏放之乎飛動流峙聲歌應感之間凡昔之所禁焉而不顧者一切舉而旁通之乎其心於是喟然而嘆曰嗟乎聖人之學其在斯乎其在斯乎雖然予且别矣性不可若是其幾也乆矣而予顧復以其初變而悟者㳺其間而獨求之如之何其可進於道也余乃復笑而請曰昔者孔氏之門其以樂羣而居者皆是也而庻幾之許惟顔氏之子以之斯其所悟於性也果由人者耶抑由已者耶是故學焉而悟則其黙而成之也以性而不以行故雖與衆違習而德不孤學焉而不得悟則其多學而識之也以行而不以性故雖與衆同方而道益逺夫子盖命之矣曰為仁由己而由人乎哉然則學之欲進於其道也夫固無病於獨求也歟於是楊子囅然一笑而去嘉靖庚戌十月十日書於正已堂宴養深處題巻贈楊椒山北上何遷戊申之夏予以罪謫徙官至南都而容城椒山楊子先以司封在省中予時未有請也居數月楊子過時時語及問學予窺其中盖津津乎動矣乃偕諸寮德化九崖余子慈谿龍山張子同安方洲洪子華亭朋石楊子漢州任齋塗子即省中結五日之㑹其時巳酉冬也踰眀年庚戌金陵白野殷子以代龍山子至而一時問學之意愈益相發不可已無何楊子以奏績行予送之嘆曰嗟乎楊子茲行逈矣毋寜忘所習哉夫學之繫乎習也乆矣友也者習之之地也鄉也童而習之從其質也今也學而習之化其質也皆於友有取焉習之可否烏得以無辨乎鄉之為習也以節槩名義相砥礪以勲庸藝文相期待自童時巳然或剛或柔質有偏重而習皆從之反諸所性剛柔而得其中則不逮焉斯習也毋亦聖人之所不屑乎何也習以質未嘗習以學也學也者修於其性将以化其質而趨於中之務也學必有見見不以黙是神識也非性之眀覺也學必有造造不以深是襲取也非性之直養也學必有措措不以時是力魄也非性之動以天也性者上天之載無聲無臭見而無見是為真知造而無造是為實詣措而無措是爲當㡬故習以學者不離乎節槩名義勲庸藝文之間而不得夫節槩名義勲庸藝文之迹此於其質不己化而趨於中乎中者所性自然之體聖人之所以知天也而今也之習實繇之乃其所以習則於友有不能一日舎者頃嵗省中五日之㑹是已楊子於此舎所習而事事既己有得回視鄉也之習其能無辨乎哉雖然楊子别矣由是反乎其鄉㳺於上京其友益衆其所習益廣将倡人以今所習而與之習乎抑因其鄉所習而習焉而㤀其所自習乎吾固知楊子必能究辨之其於道也思過半矣楊子曰知天之旨予固将事事焉庶以毋㤀所習踰年復茲㑹焉必有以覆吾子贈十峰丈人文王格王子罷梁大夫歸楚與十峰丈人遇於京源之澨王子曰叟来竊聞叟有至樂僻在山阿連峰十座獻伎一室信有之乎丈人曰唯唯丘壑之夫聊以自娛未敢爲達者道也王子曰嘻是何言也吾聞至人不累大隠必深走既出金門謝靑紫方將娛志於泉石僂身於林藪髙揖時人與叟為朋徒而何叟相拒之深也丈人曰惡敢然辱大夫不鄙降禮芻蕘請與大夫一逰可乎於是命崑崙秣欵段載偏提乗明曉丈人當前王子從後遵邑而南踰嶺涉澗險峻闇漠愈進愈奇乆之遂達於丈人之峯丈人乃手長房之杖足謝客之屐擕王子而登焉登竟日陟其巔於是北臨聖嶺有仲尼之轍跡焉南眺龍山有陸生之舊址焉東望天門則漢帝出師之途經焉西臨釣臺則嚴子避世之軌存焉而所謂十峰者纍纍然若連珠奠於其中則有奇葩異卉修篁叢木可蔬而樵也有珍禽怪獸殊形巧囀可觀而聴也有危石巖巖清泉冷冷可坐而飲也有雲霞蕩漾風月清嘉可撫而玩也王子心動目驚終日極樂與丈人和杖而歌歌招隠之詞數闋丈人曰子疲矣請下息鄙人之廬王子諾之遂造其室室倚峰而結草堂數畞精潔出塵乃見孫子迎門衿佩鏘楚架有姬孔之籍口諠老易之談皆濟濟翼翼雍雍穆穆環丈人而侍已乃啗我以山田之粲飫我以山市之尊從我以山客宿我以山房盖方外之樂丈人有之於數十年者王子一旦而共之矣事己乃揖謂曰聞大夫有文辭頗稱於人今抽子祕思騁子妍詞為鄙人一言永寶山家如何王子囅然曰昔孔子受誚於微生仲由不禮於荷蓧今叟以輕世肆志之行有淵潛山棲之樂而顧取重於我倦逰者賢於古人逺矣遂命筆敘其由贈汪子擢守永州郡序陸銓都水在工曹事獨煩而掣肘不可行中官奉尺紙下公庭大司空捧而課輸於民惟謹日運月納㒺敢後亦㒺敢㑹計其餘汪子自南戸曹調官來事事乃嘆曰明天子在上宿弊尚不可一洗而淸乎遂隨事具疏出納惟稽濫侈惟節贏餘惟㑹估辦值閱數月内無妄索官無虛費商無冐貸吏無横需大司空曰才為朝廷節省浮費嵗以萬計如斯乎乃嘉靖庚寅八月汪子出補永州郡大司空若失其左右手而汪子亦若有不釋然者其友陸子聞而嘆曰嘻志期於終事期於成汪子於是乎不可及矣夫王良御千里之驥將犯羊腸之險豈惟衆人拭目視之其範馳驅淸節奏固欲一逞其技於拭目之際而乃易以他馬使之中道解轡王良将不扼腕嘆息哉雖然尚不免拘於成事而不達觀於天下也汪子以今日之弊獨在工曹為多乎舎工曹之外其救之當如拯焚而不可少緩者又無甚於工曹乎昔人好憫人之窮而賑之出門見粗衣糲食者即出所有以恤之行至途中見無衣無食者又罄所有以恤之行至國門之外見菜色将仆枵腹餘息者思所以振之而且無其具矣工曹之弊得無猶在粗衣糲食之間乎天下之事去京師愈逺則其弊愈滋永州介在蠻裔之中供億之費竭於禦侮畫一之法廢於狥蠻俗以慓悍啓争民以啙窳失業刑以覊縻改律賦以逋逃減額湖廣郡稱難治者必於永州屈指焉夫見粗衣糲食者即欲罄其所有孰若活菜色之殍生枵腹之尸其為功多乎或以之吿汪子汪子曰達哉急於趨事而㤀情於既往者斯言也乃授軸於陸子俾之書所言以往匠喻贈陳尹馬駙東郭氏之富人将治其居使其人求匠之良焉奴不知而傭乎庸其庸也又藏其陰而任其良入東郭氏之門則黔之楓楚之豫章徂徠之松吳之櫧越之椐閩之柟東海之椿太行之檟南山之梓蜀之杉鵲華之桐皆委而輸之庭充道而塞路疉足而後進於是一委之庸焉庸侈然受之入其上直約日而将舉東郭氏偶過求其材而視焉其中之極為北郊之老樗左之承極者為則之楮受栱而入題者為下里氏之朴危其後而從其前左有穴焉空其右之完以符傴偃縮勒淺翼而俯衡壞其材己過半東郭氏大駭箠其奴而逐其庸始逢於人周詢焉有吿以秀之南有工治其主人之屋良平其直而不過兹竣事而将代也東郭氏使人急求工工果來視其貌温然聽其言不驚動人入其室徐授羣工某為某某以某易去其危作其崇登其良盡反庸之度而一新之東郭氏復過焉其中深而衡廣也其榮外翼而櫩之牙整也其極與受皆天下之良而榱題梴桷欂櫨侏儒椳闑扂楔亦非其材弗用也於是東郭氏大喜過望以為得工之晚他日屋成復進上値於工不受而取其中曰吾往年治秀未嘗貪上值吾以知於主人為榮然吾聞君子引常以成務小人集虚而售名吾豈以彼而易此耶居無何天子開明堂以受天下詔求良工将作匠氏以工之名應工遂入於王之宫江都人吿陳令之善於越西生越西生方與客談匠事笑曰其類是也哉事不同而理同作匠喻以歸之敘循守贈致齋黄公陳昌積自古守官之士施敎𨗳民效騐純粹曷嘗不依於儒術者究道徳之際而為振民宰世之源也牒記以往靡得而著巳漢諸薦紳先生文翁化蜀厥有春秋平當行河厥有禹貢贛君典郡本之文雅彭宣司牧獲諸讐易君公射䇿甘棠沛郡翁卿明經子惠南陽至如孔安國龔少卿之屬此皆學士所謂淑人長者也藉於有民社之寄發其素業凛凛焉便宜以為治雖所施殊科然皆行有其根本焉此如瓊茅而莖能紹鬼神非苟矜見所長其産殊且厚也鄙諺曰有道之門儀表具存昔吏之庭煩苦傷恩誠使朱邑鄭𢎞與定襄義縱河内温舒程較鷙敢靡宻之治不同堂而唯諾矣要以守道遵軌起元滋脉俾吏治日烝烝不致於奸其官則又在此不在彼吉故斗牛之域而好行禮義之郡也始未嘗不敦固秀文今稍凌遲健黠也先後良二千石俱班見於郡史余甚式之以余所聞明興有金華朱子絳人藺子寜波陳子江浦張子句章黄子此五人者斯稱其表率矣所以然者各以儒術潤飾吏事而仁義表見於當世也自今覩記之朱省扑擊耨士經術藺罷銀冶政必白母陳絶請寄乆益利愛張弛扄鐍亷足儀範黄躬敎化稚子不訾窳退名猾蠕選之儔戮弗貞之婦迹其所為豈不庶幾儒術哉至其播諸歌詠形諸碑銘咸為其有所勸導諷采之旨可以助流文敎也言不虚立政不虚布故曰登髙造感民之詞才智斟酌可與興事而為大夫而况於傳先王語非仁義不發憤者乎覃盈非常之利固其所也近世錙銖之士不窺經術不辨甄盎徒以隂猾腹鷙刻深次骨推減淑儻市交疆外自計可譁衆賈上攝隆貴於唇齒然竟録録為天下笑此與耳食足持何異余悲此類自穽其身以故論次諸循長吏俾守官者知儒術之有大受也贈髙白洲陟貴陽節推序侯一元夫講學行禮莫良於師儒明刑弼教莫要於司理二者一先之一後之禮固以刑輔也而刑亦以禮省矣白洲髙先生者江右之名人而節母之子也盖太夫人節甚髙事具氷節流芳録中先生實肖其徳亦忠信剛毅既掇巍科仕邑宰直道不容来敎吾甌余親見其端方之履而敬之其敎諸生必踐繩墨略於彌文而嚴於科指苟扞其教即宿學不貰也諸生亦以是服之余觀宋儒闗中之學獨先禮與濂洛異卒之規矩立而成就多先生殆其人乎夫鄉飲酒者校庠之嘉禮也髙皇帝出天下於水火而齊之以禮莫是為大萬厯已夘之冬郡伯欲行是禮也而難其人乃以屬余余不德固讓弗獲則亦以先生之持之也先生其獨何取於余哉行禮之日先生實為司正聞其誨言焉意洒然為之變色易容以可終身佩而服也無何報至以先生為貴陽之節推貴陽省㑹也節推理官也始而降典折民既而制刑敎徳三后之功先生有焉亦偉矣哉於是先生之寅暨諸生詣余請言以贈嗟乎余則何言哉請即先生所以誨余者為贈其可乎或曰今之鄉飲酒禮其亦周公之舊歟曰余見聖祖之儀註釋例矣固周公之舊也盖天下之達尊三而是禮則惟二焉德與齒是也主必東方何也曰固主之位也主東則賔西而又特尊之焉故使南面也其稍西者盖避君師之正位也若僎者則公卿大夫之致事而来觀禮者也故亦尊之於北而稍東焉其意猶之賔也盖非德則固不至公卿大夫而非齒則固不致其事二者既具矣非以爵也然則主之東也固非屈也賔僎之北也與介之西也固非隅也若夫仁氣義氣兼舉二方而以介輔賔以僎輔主則漢人之文之焉耳而後宋儒嚴陵方氏者始從而實之豈知隅固童子之坐而主下輔上今之僎固非古之僎乎斯禮也盖自昔相沿以至於元而後我太祖始起而明之可不謂大聖人之所為直接周公而與之比隆哉夫禮有本有文有㑹通凡禮之所有者皆文也而貴徳尚齒其本也今庶人之老若管㓜安王彦方者不可多得而公卿大夫之来觀禮者亦鮮然則以僎為賔而缺其餘也姑以備賔主之儀存齒徳之意豈不亦㑹通之宜而聖祖之心哉愧余非其人爾乃若先生揚觶所稱為臣盡忠為子盡孝夙興夜寐無忝所生之數言者則終身由之有不能盡也先生今往觀於貴陽之禮其有能式遵聖祖儀註之舊以逹於周公之儀禮乎哉雖其地非中土倘亦如春秋之郯子固仲尼之所深歎而學焉者也夫人情相與習於禮則必逺於刑耳目濡染於爼豆辭讓之儀則自脱離於嚚訟鉗􅎂之苦猶之去荆棘而康荘也先生往哉司理之職其可坐嘯而舉之也己由茲清階而上三后之任可幾也余方拭目而觀之贈别敬所王子序侯一元夫引道先路致媺而替惡期不獨濟者非友之力哉以舜文之聖也猶有四鄰四友之臣而况學士乎故居則觀摩出則贈處所由来逺矣至如相慕之篤千里命駕鷄黍之信經嵗不渝抑又其次也嗟乎盖友之不為友乆矣余少則嘗慕學讀濂洛之書好之求友不得迺心獨自喜乆則益衰既而攻古文好荘周馬遷間遇諸學士好者往往而有語相樂也余才不能入而亦自以逰其藩比壯為吏師法令即與諸法家習法講治縱觀當世名流鉅公循吏節士蜚聲騰實意躍然慕之退自程其力不逮逺甚又未嘗不悵然恨也然余有以自多者得逰其賢豪為聲焉年既逾盛氣血頓減向之嗜好亦益衰顧少所慕迺始眷眷焉庶㡬遇其人盖晚而得敬所王子王子故台州貧士也余同年秦大史先生識異之女以女己而王子果以文名當世及王子為吏則又明敏㢘節有氣所居稱佳吏董士士翕然歸之每以暇日繙經述史推以教人而王子是時循循深於道術矣王子轉廣東參議余幸官聨其後比舎出入讀其文司馬子長不過也言議政事練達慷慨賈生陸贄之流凡今昔賢俊所為名家者王子盡有之然余獨有所闚於王子其文行確然自内出與世之綺靡袨襮為的者殊趣斯其所謂躬行君子者耶已問道王子則王子果知道者也王子之言曰今學者誦法孔氏非求仁謂耶顧己所病若疣癰然懐痛不能去迺外求藥多聞多識獨如余何哉因出兩編書示余商㩁朱陸以明致一溯流而源則王子之學較然明矣余愚無以復難間嘗請王子曰所謂多聞多識者果外耶耳固不駐聲目固不駐色故傳曰合内外之道又曰萬為一一者萬之分也多聞多識庸詎多乎哉如王子之於墳籍無所不討身所更踐靡不練習則王子且自艾以皆外馳非性與道顧今王子所以能絶流踰險自濟於道者亦墳籍更踐梯航之力也故君子必有友有尚友以邵其德上士一之中士十之下士百之自有生民以來未之有改也乃若耳目為漏見聞為病斯則異學所守也窽士藉之以恣其猖狂曰由吾規矩以出方員嗟乎規矩既己磨矣精神為聖成心為師先王之經綸法行不幾廢乎哉夫道五百嵗而一禪或聞之或見之則禮樂是也禮之别三百極之三千可謂多矣然孔子之周盖每事而問之以知禮稱而其言曰非禮不立博而約之顔氏子鑄焉儒者至今世守之其所以懸於宗祝有司者詎有異故哉老氏析仁義於禮則見以為薄而譏之而老子固嘗知禮者也故余以老子非薄禮也所見於禮者薄佛氏之病聞見也亦所見於聞見者病故善者得之不善者失之推此則王子之文章氣節何遽不為道術而道術何遽非氣節文章哉余持此反覆於王子者數矣王子時濡沫余庶幾哉江湖居無何而王子業入賀行矣王子絶特天穎自出無假外助余尫然病夫以王子為藥石獨何能一日而去王子也王子其何以處我哉然吾聞王子之行方手抄孔氏書載經史兼兩間孶孶從同志請所以為行者王子之於聞識固不舎也而王子言若彼者推文而忠以云救歟嗟乎是王子之處我也其良深哉書以為别贈别王道思序顧璘夫天将興一代之文必生天資絶出之賢力學好古以成其業考之前代可見己今余觀於海内若王子道思其人也道思弱冠舉進士為郎讀書過目成誦文詞爛然嘗主廣東試事刻文甚奇余以故志其名今年来為南京禮部主客郎中㑹余余稱其試文乃蹙然曰公㒺某邪某初學文好擬古最先六經語已而學左氏又之遷固試文則是物也殆揚雄所謂雕蟲技乎近乃愛昌黎為文曰見其難及不知昔者何視之易也璘驚曰有是哉今英賢並易昌黎文而淺晦菴於道子睿質强氣乃遜志如此乎再㑹則又曰古之聖人必有學後世或失其傳故秦漢而後雖純徳篤行之士盛矣終不可以稱聖豈所謂得其門者或寡乎余因歛袵向之曰子真絶出人也今天下有大患二異端惡徳不存焉學道務虚學文務竒其究至於蕩人心傷國體非細事也夫聖人之道自灑掃應對以至精義入神初無二物在安勉之間耳今學者遺躬行而索虛無盖不知聖人之静為無欲而以為無事也顧又曰非佛老之𤣥寂非㒺乎至於文則眀道達意止矣淺深大小唯其所造六經異體非羣聖人之殊致邪擬之維肖繪工耳故君子醜之道思曰今之賢者其言皆異於是某請識之又數月道思乃拜山東督學之命二者則其所從政也諸公賦詩贈之余遂書前説為引是非之衷願吾子終裁之修大業以承天意其在此行矣贈楊子任序顧璘楊子子任将監蕪湖之税病其雜也憤而作曰吾聞襲芳者唾鮑肆持潔者遠汙池財利之柄髙士所恧政闗聚歛仁人蹙額吾何事於此乎吾寜納檄於省乞骸於朝潜伏以從吾好安能抑志苦身以蒙世俗之疑議乎東橋子聞之笑曰異乎吾所聞莫非政也子取其清孰處其雜擇便而順私此巧宦之所希也而謂吾子為之乎君子務彊夫巳之所不可易而不患夫事之所不可為故德成於獨立功絶於羣疑夫然後謂之貞固良玉磨而不磷其質堅也水華泥而不滓其性潔也伊尹放君人益頌其忠栁下惠昏夜懐女人益信其介非以已勝者乎子之執是政也公私别則官政清矣義利嚴則中徳固矣毁譽置則浮言沮矣若夫操籌而校權金而貢乃斯職之所有事也抑何與於我乎子節髙而器逺人方以公輔見期幸無淺焉自視而令有道者闚子也明日子任遂束書裹糧告行而去贈歸少㕘赴滇南序茅坤近代以来學士大夫之宦逰中朝者往往由通籍迄衰白不欲一日離去輦轂其當次補藩臬郡縣又多擇便地以自結納稍稍移置邊徼非其左遷即孤之士無厚援者爾間獨按古傳記彼所謂竒節自喜之士或自請使絶國其飄忽魁岸之氣若非世之閭里兒女之情所得而覊且濡涊之者何其壮也予數以是陰求天下之士而頃聞長洲歸公来方其由給諫言事出僉予浙予頗疑其孤且矣越三年又㕘滇南以行滇僻處象郡百越之最南界去京師萬里士大夫所不樂逰者也公引車之日無離色予祖觴錢塘道上且謂之曰聞漢武皇帝嘗於長安上林中令水衡都尉穿池象昆明以習戰彼其意氣若此此所以鞭撻四方也公今入滇當過其下攬其山川道路之勝間觀伏波将軍所奮立戰功處得無有翹然自喜之心乎噫嘻公倘圖其山川道路之勝以歸今世之仕宦故不出長安者見而指畫之予又知其當爽然自失泚然汗發霑衣也巳賀陶中丞平連冦序王漸逵青蘿王子曰難測者天下之兵也原野次之險絶為甚難料者天下之謀也人為次之無容力為甚是故言天下之險絶者莫過於山矣言天下無容力者莫過於海矣廣之冦東通漳汀北連雩贑西迄郴桂抵於湖南往來出没莫測其境是故二廣者山冦之藪也溟渤巨浸渺無津極環接島嶼風翔潮游舟楫匪力是故二廣者海冦之滙也我朝設官定制三邊二廣稱重鎭焉浙之司馬中丞陶公承命撫臨適當叢斥之㑹惟公文武丕憲孚於遐邇𤣥機秘畧裕於衷素故能降海冦於虎門摧西山於髙電茲復奏績連陽筭之所加靡或有遺不數年之間定兹三冦稽諸馬援之銅柱狄靑之崑崙蔑以過焉雖天威所臨中丞之勲為不誣矣先是公未鎮撫之先有白氣如匹練見於西方占曰氛氣也其下當有兵惟有德可以消之夫西酉也酉為自刑其徳為丙丙者己之次南之位也迄於中丞竟以南海之兵平之盖厯數嵗其言始騐英德何尹世綸造予求賀言予不能文然嘗學刑德之説於軒轅之遺矣其言究而奥學險易之謀於孫吳之流矣其言核而畧學天人之占於星官之書矣其言散而逸𢎞肆而弗近吾是以迂之今觀中丞之用若是益見古之説者不謬吾前之所學者有徴焉夫然後不惑而私竊慰幸是故吾於中丞其能已於言賀胡梅林序薛應旂人嘗有言天下無難處之事及事至於前則天下鮮見有能處之人矧今東南之冦土侠倭夷實相表裏潜窺宻覷而我之虛實動静彼皆知之而彼之乗間伺隙詭譎閃爍一如蜂屯鳥散莫測端倪其視西北之兵雖長驅直入而聲息先傳猶可以豫為制御者盖實不同且承平日乆而江左晏安人不習武一旦罹此目炫兵革比之九邊将士日與敵人對壘者尤萬萬不同也是不謂天下之所甚難處者乎前此制帥無怪乎其僨事矣梅林胡公初以御史按淅目擊冦勢心恫民殘遂奮然有蕩平之志監軍王江殱厥醜類三千有餘固己奪其心而褫其魄矣事聞當宁進公御史大夫總督戎務公於是設謀發畫不避危疑而渠魁如徐海陳東葉麻相繼擒滅唯王直號稱徽王擁衆海島分遣入㓂欲進兵征討則洪波弱水之險彼實據之欲設計招撫則徐海陳東之滅彼或知之天下之事之難又莫有難於此者矣公乃委曲圗維卒致之麾下以正法典於是閩浙江淮數千里之慘害東海三十六島之妖氛一旦廓清蕩定而士民舉手加額載道歡呼咸遂更生之願矣天子聞而嘉之特進公太子太保畀之蠎玉且録其子入直禁近以彰殊錫兵憲宜峰陳君鏡湖熊君職在分閫樂茲盛事屬余文為賀余唯公之德在人心勲在社稷望在天下彛鼎勒之太史書之而一時能言之士操觚染翰之家莫不頌公為周之方召漢之衛霍唐之裴郭宋之韓范不可謂不知公矣又奚假於余言哉然而數公處其易而公處其難則或未盡知也余前所言其難難矣然而有非言所能喻者而公獨任之亦唯公自知之而己盖古者出師受成於廟而閫外之事将軍制之故相守數年日以牛酒犒士而不以為怠倐忽出戰損軍千百而不以為失公家之奉日費千金縱其出入而不以為費夫是以能克有成功也今公纔一舉事而人之未解者輒操文墨以議其後向使公避嫌逺疑祗為全身保家之計則大事去矣公則矢心從事一意報主而一身之利害休戚悉置度外曰為之自我者當如是而人言之異同不敢知也誠積而孚感極而應今日之克成大功豈偶然哉先是言者請立賞格有能主設竒謀生擒王直者封伯予萬金部議從而上之詔曰可至是有言及此者公乃曰凡古人臣之所能為雖有格天之德盖世之功皆自其君委任之專所致不然則如樂毅旬月之間下齊七十餘城功非不髙而騎刼之代将如何哉今日之事皆賴主上明聖勿貳勿疑始克有濟臣何敢貪天功以為己力哉是大聖賢無我之心古人臣事君之義公實素具之矣以是而處天下之事雖至難者固宜其若易易然也我國家養士二百年雖文武士後先接踵然得如公者有幾人哉是不特可為公賀而己也雖然余知公之隠憂猶未己也議者謂江浙地非上㳺自古英雄起事率非首務但今財賦盡在東南而吳越唇齒未必非奸宄窺伺之地比之西北尤更可虞公必熟慮慎防申畫封守而潜消黙奪永紓九重南顧之憂矣此固公之餘事而區區一念之愚亦不能不為公申告之也明文海巻二百八十三
