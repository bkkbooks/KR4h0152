body:
  text: 明文海巻二百八十五餘姚黄宗羲編序七十六送序送江浙叅政偰公赴司農少卿序趙汸世南公名國家既收中原兵革之後所在為墟聖天子思有以惻然安集之訪求故老宿儒忠厚暢逹習知畎畆事者為勸農使綰印綬載官屬行田里間呼其父兄子弟家人語告諭之闢榛莽疏溝洫立阡陌假牛貸粟皆因其所欲而利導之遣屬吏行旁郡招徠其人時江南民苦重役應之者衆不數年生聚大復官府之設公上之供始得施其政令於是罷使以其權歸憲府郡邑之長皆以勸農繫銜大司農司實總覈其事盖古后稷之官至我朝始復視前代㑹計出納弛張權利者不可同年而語矣然承平日久良法美意寖失其初嘗見江南郡邑每嵗使者行部縣小吏先走田野督里胥相官道旁有牆塹籬援類園圃者輒樹兩木大書畦桑二字掲之使者下車首問農桑以為常吏前導詣畦桑處按視民長幼扶攜竊觀漫不解何謂而種樹之牘己上之大司農矣使職農事者皆若所為則國朝富有四方之實何自而可充乎夫古之帝王所以長治久安者無他焉能使天下之民均齊方一以奉其上無所偏而己矣今經費所出以東南為淵大河以北水旱屢臻流亡未復居民鮮少二帝三王之所井牧燕趙齊晉梁宋魯衛之所資以為富强其丘墟故迹多蕪沒不治安得裒衣博帶従容阡陌間勞来綏輯復如至元聖時哉大司農位尊而職専長貳卿佐皆公卿輔相其人必有念此者矣至正九年冬十一月詔以江浙行中書省叅政事偰公為司農少卿公北庭文儒由初科進士髙等厯官省憲所至具有成績古所謂天子之寳臣者也舉國家之舊典以復唐虞三代之至治安知不在公乎士民懐公盛徳多見于歌頌芻蕘之言憂在畎畆非公之賢則不能自逹也故竊附其説送鄭徴君應詔入翰林詩序趙汸至正十五年冬詔以新安鄭子美先生為翰林待制時先生卧疾精舎使者與郡監守致朝廷之意甚厚先生堅辭不能拜命者久之憲使番陽周公在郡親為之勸駕其門生子弟進言曰今聖天子舉群策以清海内大丞相集衆思以圖治功不惜禁苑次對之職起先生於山林豈惟以先生業􅒀翰攻文章哉先生學通古今以詩書禮樂教於鄉長於治亂興衰之説正誼直言不忘憂世先生不出如朝廷何時先生疚良已乃幡然曰欲報朝廷者吾素志也吾將辭官赴召親見聖主陳所欲言爾乃命趣裝諏日偕使者北行郡長貳縣大夫與寓公搢紳之士張郡南門外設祖道為先生别里中耆俊文學諸生又相與作為歌詩以咏嘆其行休陽趙汸病不能陪搢紳之後又不善為詩則獻言曰先生應詔趨朝得極言天下事此千載一時也今為天下患者盗賊而己自淮蔡發難據於江湖所在蠭起為禍嘗烈矣然雄傑怙衆有功名智力足以横騖四出亦無聞焉視前代中世巨宼不能什一疑若不足平者國家以四海全盛之力命將出師今五六年民力己屈而盗猶未息何也不舉天下大勢以定攻守之宜而所在浪戰不求智勇之士真可任將兵者而使臺省貴人與郡縣俗吏紛然羣起共軍旅之權自軒轅氏以来未有能以是而全師制勝者也仗行省討賊御史臺督視如平時而賈兇鬻頑誅求刼奪之弊僨軍殺將反覆壊爛之由朝廷終無自知兵財兩匱郡縣之間繁征横歛一切以矯假病民而上官大吏方且拘文法守故常不思變通長久之道賞罰者用兵之大權也賞罰不明而是非淆亂天下之士不復以功名自期而中世以來治安撥亂之術行軍克敵之方皆廢不講吾未知其所以為天下國家者何也今羣盗大者跨郡邑小者據一城植根固矣茍不盡反前失而欲以嵗月削平安可得哉為國家計欲并兩淮而南盡江湖之間求要㑹形便之地為四五巨鎮鎮各屯精兵二萬選士大夫公亷有威信方畧能撫士愛民招納降附可為大將者付以一鎮之權慎簡中外有文武才學者為之副凡辟士募兵刑賞律令訓練程式進退節度土功城守禁防要束皆自朝廷考求故事為法以授之郎官博士出入覘視以資廟謨而事大小皆得専逹列鎮屯軍屹然相望脈絡貫通首尾如一内可以尊京師之勢外可以消奸雄之心鼠竊狗偷進退無據者將不戰而自服其尤崛强者四鎮出兵犄而攻之無不破矣其要在得人而己郡邑之間皆什伍其民以相守䕶毋使散越於下一家而三男子則簡尤壯一人為郡守之兵以大戸之税衣食之郡皆選賢守以防禦繫銜各將以兵固其封圉盖郡守必兼有軍民之權而後緩急可望不然雖重其失地之罪無益也此制一定則列邦有備而民心不揺矣夫使諸郡各制其兵以保一郡之民而四五大藩皆握成軍據形勢以掃清群盗則奠安東南誠當今之急務也若夫知人之明任使之術在朝廷矣昔漢以六萬討西羌㣲族趙充國定計必分兵屯田以待其敝貴萬全也周亞夫將三十六將軍擊呉楚終不肯與梁分兵審於勢也李徳裕平澤潞軍中利害有將帥不知而廟堂輒知之者得居中制外之宜也今羣盗么麽非有漢七國唐藩鎮之强而充國亞夫徳裕之故智則有今日所當師者矣汸無謀臣策士之術也當其避地間闗朝不夕謀毎恨民間利害不能上聞以至於此是以於鄉先生之行而竊致其畎畆之思焉先生倘以為然雖言之可也若夫本源之深切有非草茅所知知無不言言無不盡在先生矣使朝廷收得士之效於一時而先生之功及乎天下則雖銘彛鼎而被絃歌可也豈惟一時一鄉之所咏嘆哉送髙則誠歸永嘉序趙汸髙君則誠學博而深文髙而贍自為舉子已為學者所歸及登進士第調官括蒼郡録事學道愛人治教具脩郡官前憲副徐公深敬異之比滿不忍聴其去即學宫設綘帳身率子弟迎君而請業焉行中書聞其名辟丞相掾儒生尚其才華法吏推其練逹而君亦雅以名節自勵公卿大夫咸器其行能毎他掾有故輒以君兼其事君稽典策定是非酬應如流意所不可輒上政事堂慷慨求去時東南乂安藩府無事叅政趙郡蘇公方以文治作興其人君與臨川葛元哲俱見稱譽日承言議聲聞益隆矣俄台民弄兵僭城邑驅丁壯集其徒海浦連巨艦數百以自固帥閫吏弗能治有㫖行省臣總諸郡兵平之省臣謂君温人知濵海事擇以自從君亦庶㡬因得自效時浙東帥逹公以除兇為己任一見君歡然既開幕府乃以論事不合避不治文書於是師出踰三時卒遣大臣自京師来以上意撫之而後定解嚴分憲列諸將校緩急市利便獨君不聞一辭以秩滿日還省垣告歸矣於是交遊之士咸造君且謂儒者雖臨事不見用卒能究所守以自旌别為君賀君設爼豆觴客酒行笑謂座中曰前輩謂士子抱腹笥起鄉里逹朝廷取爵位如拾地芥真榮至矣孰知為憂患之始乎予昔卑其言於今乃信雖然予方解吏事歸得與鄉人子弟議論詩書禮義以時游赤城雁蕩諸山頫澗泉而仰雲木猶不失故吾也時客多君里人樂君之歸皆甚喜有起自末席而言者曰朝廷以科目取士久矣時方承平自軍國要務至百司庶事舉不待士而後集士亦得以浮沈簿書文墨間稍有牽制輒効俗吏便文自解由是賢否混淆有志者無以自見宜乎君之悠然遐想於去就間歟雖然今中原多故聖天子賢宰相幸一旦懲膏梁刀筆之弊盡取才進士用之則如吾髙君者雖欲輒遁思山林亦將不可得然則入踐著廷陪老成之讜議出臨郡邑布恩徳於罷民使殊功茂績炳然一時以答清朝設科盛意豈非君平昔之志而亦吾黨所望於君者哉衆皆曰然乃共舉酒属君賦白駒而别送操公琬先生歸番陽序趙汸聖天子既平海内盡輦勝國圖史典籍歸於京師乃詔脩元史起山林遺逸之士使執筆焉凡文儒之在官者無與於是在廷之臣各舉所知以應詔汸以衰病屢謝徴命亦誤在選中使者至郡太守將吏皆能言其病狀然莫肯受其咎者故不得終辭舟過嚴陵適前太史金華宋公景濓亦至曰有詔召王子充於臨漳矣予曰汸衰病日増非可出者縱出亦無補於事所幸者平生故人重得一見於契闊之餘事故有非偶然者宋公曰然盖予與宋公不相見者數載而子充則十有餘年矣既至京師聞番陽操公琬先生在書館卧病旦夕以聞即可歸私又自念番歙接境自弱冠則知先生先生學道諸經百氏述作滿家諸兄之家於番者與先生有連姻相好也毎相見輒能言先生動静而未獲一識予乃得相見於此豈非向所謂非偶然者乎自是日上堂與諸公從事筆硯間退則省先生疾先生疾少間輒俾予連榻卧譚論經史晝夜亹亹相扣擊不少休予盖有愧焉俄而禮部尚書崔公侍郎偉公同至局中以得㫖先生且為别先生乃為文一篇以告同舎同舎之士莫不惜先生之歸咸賦詩為先生贈予辱知有自則進言於先生曰先生歸矣士之在山林與在朝廷異其於述作也亦然纂釋羣經折𠂻百氏處則充棟梁出則汗牛馬雖其説未必盡合於聖人非素業與之相出入者不敢議也崇古學貴文章凌厲漢唐上擬三代使窮鄉晩進謏聞淺見之士目動神聳不敢出聲以誦自揆終身不能為者又况陶冶性情吟咏風月或以單辭或以偶句為人所稱皆足以名世雖或無取於作者於人非鬼責亦何有焉此皆山林之士所為得也若夫朝廷之士則不然太史公網羅舊聞上接春秋下迄麟趾其序髙帝創業文景守成至今使人如親見之書封禪平凖傳貨殖皆諫書也而後世以為謗韓退之未遇時欲作唐一經以垂無窮既入史館不敢有為栁子厚苦辭迫之曽不少動僅以執事成順宗實録數巻卒困於讒口竄走無完篇司馬文正公受知神宗作資治通鑑垂十九年始就而小人出鄙句以訾之此皆鉅人碩徳名實孚於上下以著書為大業者也猶或所遭若是今吾人挟其山林之學以登于朝廷之上則其茫然自失凛然不敢自放者豈無所懼而然哉尚賴天子明聖有㫖姑即舊志為書凡筆削悉取睿斷不以其所不能為諸生罪徳至渥也於是先生得以病辭歸而支離昏昧如汸者亦得以預聞纂修自詭豈非其幸歟然則汸於先生之行獨不能無所感者良有以也先生曰子姑遲之吾待子於番歙之間不逺矣送國子正蘇君還金華山中序宋濓同郡蘇君平仲成均教胄子者五年近臣有薦其才於上者即日召見親擢為國史編摩之職平仲詣丞府辭曰禁林地望清切日侍天子左右備顧問區區幼有瞶疾雖粗通文史誠不足以堪之敢辭丞相以聞上亦弗之强也而銓曹將别奏官之平仲念去親日久望天末飛雲慨然有感於中復走白丞相許之戒行李且有日與平仲游者重惜其去咸發為聲詩而以首簡授予序平仲予素敬畏者將何言哉以論乎家世則三蘇之名聞於天下隆徳重望至今與岷峨争雄遺書流落四海日月赫而風霆噴璇玉綴而瑶球懸韶鈞鳴而律吕諧師表百世人無異辭奚藉予之言哉以論乎學術則嚅嚌鄉學之懿遡淵源於伊洛蹈軌轍於闗閩義理精㣲析如蠶絲訓考是非判若黒白亦既心凝而身履之矣又奚藉予之言哉以論乎辭章則體裁嚴比姿態横逸如春陽被物或根或荄或卉或條或大或小或圓或扁各随其物而暢之無有同者其視膠滯一體常守而不變者何如也是故大夫士公卿欲文詞者必曰我徴之蘇君也平仲之令聞勃然興煥然不可掩又奚藉予之言哉無己則有一焉古者國有國史下至閭巷之間亦有閭史皆據官守勿失紀善惡以勸戒其國史之法見乎書備乎春秋以事繫日以日繫月以月繫時以時繫年殆猶山嶽之有定形不可易者太史遷别出新意輕變編年之舊創為十二紀以序帝王十表以貫嵗月八書以述政事三十世家以録公侯七十列傳以志士庶厯代史官遵之而春秋之義類隠矣荀悦蕭穎士頗譏之而未能大有匡逮至司馬温國公光始取法於春秋采繫國家盛衰生民休戚之事起周威烈王訖于五代成一家言號曰資治通鑑劉恕直謂非遷之所可擬盖公論云然五代之後而宋承之宋之後而元承之宋有李燾雖嘗著為編年異同之論皆並存之盖不敢當作者之任特廣記備言以俟刪削元史幸新脩縱有遺漏十四朝之行事亦賴粲然可觀有能蒐纂以續司馬之書者將不在今日乎平仲學術之富如此而辭章之美又如此其東還也晨昏定省之餘集諸俊英繙閲新舊所蔵獨操筆削而成百代不刋之典將不在平仲乎平仲之家少公以馬遷淺近不學疎畧輕信上觀詩書下考春秋及秦漢雜記成古史一書至今傳之平仲因其家世之懿肆其鑒裁之公使人稱之曰蘇氏一門世濟其美將不在吾平仲乎予也不敏以荒唐之學雜凡庸之識嘗思有所著作玩時愒日莫能就緒今年已邁矣雙鬢皤矣形骸弗强而精神寖衰矣徒恃寸管為無用空文以應四方之求日不暇給茍不於平仲是望果誰望乎平仲將行率六館之士祖餞於龍江之上睇晴雲之孤飛觀白日之易流酌巨觥而屬平仲曰嵗不我與暌離之言不足以汙平仲予之所深望者不朽之盛事鑑世之元龜也平仲幸聴之願舉此觴為夀平仲曰敢不惟吾子之命一飲輒盡於是抗手而别送徐大年還淳安序宋濓觀人之法當察諸心不可泥其迹仕不仕有弗暇論者其心在朝廷雖居韋布操觚染翰足以鋪張鴻偉上裨至化脱或志不在斯雖綰銅章佩黒綬朝受諜訴暮閲獄案政績藐然無稱古昔君子盖獨竊慎之余於徐君大年之歸不能無所感大年生淳安萬山中載籍兼該而辭藻豐縟有聲於浙河東西當皇上龍興招延儒雅大年懽然被山人服趨輦轂之下同脩前代史史成㑹有詔集諸儒議禮大年復與其事廷議將命官大年以宿疾辭去年秋中書奉㫖纂脩日厯朝紳各薦所知余以大年知本末義例可以觀㑹通而無首尾衡決之患疏其名以聞使使者持書下郡國大年即懽然應命詣闕入館之後俛首採刺惟恐一事有遺記注者闕畧悉補足為完文日厯成廷議又將錫之官大年固辭如初嗚呼使大年初受命為一縣令長不過簿書期㑹爾招徠撫綏爾又其大者教化行百里爾一旦白身召入史館大書特書使聖天子宏謨駿烈烜赫萬古與天無極此其功與試宰者孰重孰輕雖不仕猶仕也藉令自兹終老山林可謂無負於國亦可謂無負於學世之好議論者見其辭禄而歸揺唇鼔喙詡詡相夸奬不曰潔身而自髙則曰獨善以固窮夫士遭不願治之世披腹呈琅玕無有舉目睨之者故不得已引退今當堯舜在上䕫龍滿朝之日以此疑大年者謂之誣士不學則已學則必期世用有如大賈行廢舉術寳貨填溢市區乃振鐸號諸人曰我不售我不售萬萬無此理以此窺大年者謂之矯矯與誣要皆非真知其心者雖然在昔宋盛時布衣入史館者僅六七人皆兩制八座所薦引其任甚不輕大年雖不受禄寵靈所被溥博汪洋有加徃昔大年將何以自效且春秋猶未髙沈疴容有却藥之時行當扶策造朝門盡展所藴以驚動世俗使向之疑且窺者瞠目不敢吐一辭則出處兩無憾不然長徃山林而弗思返日與猿鶴為友餐霞雲而潄泉石髙固髙矣如不仕無義何洪武七年春正月一日宋濓引送甘肅衛經厯張敏行之官序宋濓長安張敏行至正癸夘進士也入國朝以来部使者薦起之擢為翰林典籍時四庫之書多蔵之文華堂堂在禁中舊為諸俊秀肄業之所抵奉天門不百武車駕嘗臨之敏行早趨朝已即危坐堂中中使或傳宣索書即啟鑰以上如是者二年雖得時近日月之光然未暇謁其氏名一日上御東房遥見敏行委蛇入堂召而前問勞備至且曰爾能詩乎對曰臣雖不能願學焉乃命之題敏行研墨濡毫跪寫以進上覽畢悦曰詩甚佳北産如爾者鐵中之錚錚也由是日承顧問見其性秉忠慤可以任事特命為甘肅衛經厯賜内府白金五十兩錢一萬二千文以寵其行凡所與遊皆為賦詩予時侍講禁林送至都門外執爵立而言曰甘肅在漢為酒泉為張掖等郡初因張騫言建置城府稍發徙民充實之隔絶西域而斷匃奴右臂當時匃奴悍彊西域未盡服故其策不得不爾也今皇明在御天威所至如雷如霆西域稱臣者接踵道路而元君遺𦙍奔竄沙漠粗存喘息惴惴自保孰敢持一矢東向非漢時比也聖天子特念生靈久罹兵燹不得以自寜設衛置屯一以備不虞一以招懐創殘之民其責亦甚重也敏行亦知其所以重於斯行也當導宣上徳曰吾皇一視同仁罔間南朔夙夜惟爾民之憂恐爾寒也使来授爾裘恐爾餒也俾来給爾食或無以耕予爾牛或無以獵賚爾馬若弓爾其寜哉氓縱曰愚離水火而升袵席云胡不樂將見荷旃被毳者于于而至矣經厯幕府之長無所不當問敏行宜以此報上毋若翰林時危坐咏詩而自逸也他日賛畫成功乗赭白馬周流弔古曰此霍去病擊匈奴處也此公孫賀敗虜兵遺蹟也把馬潼滿壺白眼望天而飲醉後耳熱發為聲詩以洩生平磊落之氣斯亦奇男子之事敏行以為如何敏行喜曰先生之言至矣是為序送許時用還越中序宋濓婺與越為鄰壤越屬縣曰嵊有許氏居之世以詩禮相傳為名門而時用則又其最秀者也濓家婺之金華距嵊為不逺在弱齡時即與時用相聞方以文墨自漸摩無風雨無晝夜危坐一室不暇見暨同藝浙闈旅進旅退於千百人中無有為之先容者又不能見自時厥後時用以禮經擢上第為諸暨州判官金華抵諸暨比嵊為尤邇將騎驢走鈴下而謁焉時用又入行御史臺治百司其地清嚴雖時用亦不宜與人接又不敢見曽未㡬何金華䧟於兵士大夫螻蟻走惟流子里為樂土亟挈妻孥避焉流子里𨽻諸暨地在嵊之東南僅數舎即至濓時苦心多畏而土著民徃徃凌虐流寓者白日未盡墜輒翳行林㘭鈔其囊槖物甚者或至殺人又不可見及至兵戈稍息予還金華日采藥以自娯間念及時用即欲約二三子徃候之以解夙昔之思去年冬間時用被弓旌招使者趣迫上道急於星火又不及見濓竊自念時用英俊士此行何所不至鸞臺鳯閣將以次而升何日能賦歸縱時用欲歸上之人未必聴也濓雖少時用一嵗則已皤然成翁度何由至南京既不能至又安能與時用一抵掌笑談耶慨然遐思者久之㑹朝廷纂修元史宰臣奉特㫖起濓為總裁官使者亦見迫如前逮濓將戒行李時用至武林始旬日耳濓又自念史事甚重當有鴻博之士任其責者濓豈敢與聞藉是以徃或得一見時用亦豈非至幸歟濓来南京寓於䕶龍河上方求時用館舎之所在忽有偉丈夫来見者問其姓名亟曰我許時用也子豈非景濓乎濓驚喜不及答亟延入坐備陳五欲見而弗能之故時用知濓嚮徃之久亦相與傾倒凡風晨月夕無不相徃来一旦忽悽然堕淚曰余先朝進士也春秋又髙矣不足以辱明時使者不我知委幣而迫之来我不敢違今已陳情於丞相府矣丞相儻言之上遂得歸田焉不翅足矣他日又来言曰聖天子寛仁今用丞相言如所請矣己具舟大江之濵吾子遇我厚幸一言以為别嗚呼婺與越其壤相接邇其見甚易也乃積四十年而莫之遂厥後始見於千里之外逺或三四春秋近或及期相與論學以盡夫情可也未及兩月而即去既去矣或買一小艇相隨五六百里間采江花之幽靚殷勤道别亦云可也脩史事殷足不敢踰都門悵然而别既别矣一二年間或再聚首如今日焉猶可也然向者巳如此自今而後其可以必期而取之耶人事之叅差不齊何可復道尚奚言為時用之别耶雖然時用之歸也其有繫於名節甚大時用采蕺山之蕺食鑑湖之水日與學子談經以為樂者果誰之賜歟誠由遭逢有道之朝故得以上霑滂沛之恩而適夫出處之宜也夫道宣上徳以昭布於四方者史臣之事因不辭而為之書區區聚散之故一已之私爾則又當在所不計也送鄧貫道還雲陽序宋濓周官之制以鄉三物教萬民而賔興之所謂三物若六徳六行六藝是也六行之中而婣居其一焉釋者曰婣者親於外親也夫人之生也内則諸族外則諸親歡然有恩以相愛粲然有文以相接盖一出於彛倫之正故賔興之際特於此察其行焉嗟夫世逺俗紛古之道不明久矣今於雲陽鄧貫道氏見之貫道本儒家富而好禮御史大夫陳公之女兄實歸焉當家居時公與貫道無日不相親或講論道徳性命之奥或品量古今人物之盛以至雲亭月榭酣觴賦詩以寫冲和之情其樂殆懽如也及元季兵興所在繹騷貫道避地巖谷間深蟄而不出公間闗走江表擇真主以為依歸自赴於風雲之㑹名譽起而勲業日盛貫道之與公不相見者一十有二年矣洪武七年冬貫道思公之切厯湖湘泛大江直抵南京欲與公胥㑹公聞貫道之至亦喜不自勝出迎於龍闗相與序兵火離合問故舊存歿悲喜交集舉酒酹地各私相欣慶自是共周旋者且一月貫道以離家之久翻然動歸興有不可遏者予因謂之曰夫自辛卯以来龍虎雄争塵霾翳昏父子乎東西戚姻乎南北其離别之思盖有不忍言者今也六合清明車同軌而書同文水陸數萬里山行水宿無一髮蜂蠆之虞有親婣在遐方者不行則己行則刻日可至貫道亦知所以然之故乎誠由帝徳廣被如天之覆如地之載蕩蕩乎難名乃克致有是也頗聞貫道富學問能辭章何以不稍攄所藴以禆治化乎貫道則曰吾老矣不能用也雖然雲陽有紫㣲山七十一峯森列如畫秀氣甚磅礴自漢以来為封侯之邦唐雖有肥遯之士而無大顯融者至陳公始以正大亷平之學出佐明時而足以當山川之勝貫道之歸也宜以公之事厯言於巖穴抱道之士且告之曰聖天子在上可以出而仕矣予敬愛貫道篤親婣之義故舉周官六行之一序以贈之詩自侍講學士樂公而下凡十八人分題為九詠古今詩各賦其一云送東陽馬生序宋濓余幼時即嗜學家貧無從致書以觀每假借於蔵書之家手自筆録計日以還天大寒硯水堅手指不可屈伸弗之息録畢走送之不敢稍逾約以是人多以書假予予因得徧觀羣書既加冠益慕聖賢之道又患無碩師名人與游嘗趨百里外從鄉之先逹執經叩問先逹徳隆望尊門人弟子填其室未嘗稍降辭色予立侍左右援疑質理俯身傾耳以請或遇其叱咄色愈恭禮愈至不敢出一言以復俟其欣悦則又請焉故予雖愚卒獲有所聞予之從師也負箧曳屣行深山巨谷中窮冬烈風大雪深數尺足膚皸裂而不知至舎四支彊勁不能動媵人持湯沃灌以衾覆久之乃和寓逆旅主人日再食無鮮肥滋味之享同舎生皆被綺繡戴朱纓寳飾之㡌腰白玉之環左佩刀右備容臭煥然若神人予則緼袍敝衣處其間畧無慕艷意以中有足樂者不知口體之奉不若人也盖予之勤且艱若此今雖耄老未有所成猶幸預君子之列而承天子之寵光綴公卿之後日侍坐備顧問四海亦謬稱其氏名况才之過於予者乎今諸生學於太學縣官日有廩稍之供父母嵗有裘葛之遺無凍餒之患矣坐大厦之下而誦詩書無奔走之勞矣有司業博士為之師未有問而不告求而不得者也凡所宜有之書皆集於此不必若予之手録假諸人而後見也其業有不精徳有不成者非天資之卑則心不若予之専耳豈他人之過哉東陽馬生君則在太學已二年流輩甚稱其賢予朝京師生以鄉人子来謁予譔長書以為贄辭甚暢逹與之論辨言和而色夷自謂少時用心於學甚勞是可謂善學者矣其將歸見其親也予故道為學之難以告之謂予勉鄉人以學者予之志也詆我夸際遇之盛而驕鄉人者豈知予者哉送陳庭學序宋濓西南山川惟川蜀最奇然去中州萬里陸有劍閣棧道之險水有瞿唐灧澦之虞跨馬行篁竹間山髙者累旬日不見其巔際臨上而俯視絶壑萬仞杳莫測其所窮肝膽為之掉栗水行則江石悍利波惡渦詭舟一失尺寸輒糜碎土沈下飽魚鱉其難至如此故非仕有力者不可以遊非材有文者縱遊無所得非壯彊者多老死於其地嗜奇之士恨焉天台陳君庭學能為詩由中書左司掾屢從大將北征有勞擢四川郡指揮司照磨由水道至成都成都川蜀之要地揚子雲司馬相如諸葛武侯之所居英雄俊傑戰攻駐守之跡詩人文士遊眺飲射賦咏歌呼之所庭學無不厯覽既覽必發為詩以紀其景物時世之變於是其詩益工越三年以例自免歸㑹予於京師其氣愈充其語愈壯其志意愈髙盖得於山水之助者侈矣予甚自愧方予少時嘗有志於出遊天下顧以學未成而不暇及年壯可出而四方兵起無所投足逮今聖主興而宇内定極海之際合為一家而予齒已加耄矣欲如庭學之遊尚可得乎然吾聞古之賢士若顔回原憲皆坐守陋室蓬蒿沒戸而志意常充然有囊括於天地者此其故何也得毋有出於山林之外者乎庭學其試歸而求焉茍有所得則以告予予將不一愧而已也明文海巻二百八十五
