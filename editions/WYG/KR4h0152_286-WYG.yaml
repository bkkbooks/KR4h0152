body:
  text: 明文海巻二百八十六餘姚黄宗羲編序七十七送序送陳仲經赴京師序胡翰括蒼陳仲經將為京師之行其姻友韓進之為之請贈言予問仲經何如人也曰醫者也子知其醫乎曰否昔河東張仲舉嘗稱其術本東垣李氏又善鍼法則其人固善醫也予於鍼砭不暇論嘗聞李氏之學視人之疾瘠根於中氣不足善治體以脾胃為主其用謹於内外有餘不足之際窮其潰瀉升沈之理随證加損而為之方其意較可見矣故世多尚之嘗有中風不仁者醫視之投以人參數觔而愈有痢者蠱者醫視之取白术當歸佐以他劑投之以木香傷中氣人所用者輒去之痢者服之三月不愈又以蠱者之證為不足投某劑亦不愈母氏始病熱不汗頭若脅皆痛甚七日而氣懣醫視之或曰此傷寒也或曰非也病且革醫猶恬而視之耳比予至京師京師之醫十倍而甚於此者有之然不皆主李氏嗚呼明之患世人以元氣不足為外傷淫邪而反瀉心肺是重絶其表也安知為明之之學者槩以寒邪積滯為元氣不足視之間有中者則其術神矣不幸徃徃而死寜不為之寒心乎若是者盖有由矣昔扁鵲之言曰凡外傷有餘之證必見於左手左主表故人迎脉緩而大倍於氣口或再倍或三倍内傷不足之證必見於右右主裏故氣口脉大倍於人迎傷重者在少隂則再倍太隂則三倍是豈不明甚矣今世學之者得其書之所言而不得其所不言其於脉固有不能盡明者矣茍不能明何怪其誤也唐許𦙍宗不欲著書以為脉之候幽而難明吾意之所解口莫能宣也由今視之𦙍宗之言豈不信乎世皆知鍼砭刺人一撥見病之應㨗於飛矢以故不敢輕用就令用藥皆以鍼砭視之豈不庶㡬乎予未識仲經而輒以是告者重進之之請也告之以予所見者欲其慎之也仲經誠審於脉而又慎之則善學李氏者矣方張君在翰林雅善推轂士仲經徃矣吾見戸外屨滿矣送呉思道歸金陵序胡翰東南都㑹稱金陵為最始予至其地從先生長老考徳問道則知李公晉仲之賢次則陳子恭許可進羣輩崛起則邦之彦也子恭每偕朋輩山行臨大江四顧徘徊由翠㣲之巔下憇清凉寺拈花揮麈談笑為樂懐玉鄭復初先生賦詩薩天錫暨諸生皆和之盖亦一時之髙風逸韻予再至求其人則徃徃随牒四方存者無㡬矣又其後予至焉則山川改觀求其人之存者莫不化為異物矣及来信安之地亦予故所游者其民物罹兵燹避之他郡凋瘵滋甚顧凡朋類多賔客游士爰有呉思道者晉仲之鄉人也與可進為同行予徃時雖不及識之而翺翔諸公間固久為予言其事厯厯如在眉睫予思晉仲不可復作見其鄉人於世異事殊之後豈不猶幸也耶思道甚直而不求異於人甚能而不求售於俗志慕古雅尤善畫好鼓瑟居庠序之職阨於單窶郡邑鮮克知之其知者又力不足振焉於是揖予而别因述夫盛衰之故離合之情而釋之曰天地之化終則有始知恒而不知變則浚恒也知變而不知恒則振恒也浚則困振則凶不知天者也故鳯凰乗乎風聖人乗乎時天将啟之則聖人作矣賢人君子出矣子歸而視夫黄旗紫盖之氣則知予言為可徴矣幸毋効白面書生蟫食經傳槁死而無聞也子其行哉送胡先生序王禕尚論吾婺學術之懿宋南渡以還東莱吕成公龍川陳文毅公説齋大著唐公同時並興吕公以聖賢之學自任上繼道統之重唐公之學盖深究帝王經世之大誼而陳公復明乎皇帝王霸之畧而有志於事功者也即其所自立者觀之雖不能茍同然其為道皆著於文也其文皆所以載道也文義道學曷有異乎哉有元以来仁山金文安公以其傳於北山何文定公魯齋王文憲公者傳之白雲許文懿公實以道學名其家而司丞永康胡公待制蒲陽栁公侍講烏傷黄公以及禮部蘭溪呉公翰林東陽張公則以文章家知名雖若門戸異趨而本其立言之要道皆著於文文皆載乎道固未始有不同焉者淵乎粹哉皆可謂聖賢之為學者矣以故八十年間踵武相望悉為世大儒海内咸所宗師夫何後生晩進顧乃因其所不同而疑其所為同言道學者以窮研訓詁為極致言文章者以脩飭辭語為能事各立標榜互相排詆而不究夫統宗㑹元之歸於是諸公之志日㣲而學術之弊遂有不可勝言者矣故褘與仲申胡先生毎論及此未嘗不太息焉盖慨夫鄉學之淵源不可不勉於繼承也嗟乎先生其可謂能繼承者乎先生資器卓絶自許公栁公而下皆及師友之博考精思封殖深固其言明潔雋徤善自馳騁用以雄文奥學著聞東省然素無仕進意今宰臣雅重其才名遣使聘之而重煩以政乃授三衢郡文學褘竊告之曰師道之不立久矣况比年以来海㝢多故惟干戈是尋而禮樂爼豆之事廢不復講然碩果不食君子無終窮之道主教一郡雖其職非顯融而斯道之作興係焉昔文昭公之教授湖學也分經義治事諸科以教弟子凡出其門者皆為成材東都言師道者莫於斯為盛文昭於先生為逺祖其所以教湖學者先生於衢将不以為己任乎嗟乎繼鄉學之懿而任師道之重吾之望於先生於是為至先生其以為然否乎送汪尚志東遊詩序趙撝謙登太山者陵阜丘垤不足以稱其幽隠起伏觀東海者淵渚溪沼不足以方其深潛變怪是以豪放不羇之士徃徃鄰巷天下而溝渠江河遇知則握手放歌而極歡於雲霞峯島之間不遇則林棲野處而奮歌悲嘯豈若齪齪者懐土於邑里間哉友人汪君尚志少敏於學博該經史尤善謳吟五七言長短詩嘗道金陵探西北名山大地矣既而不諧於俗遂竄伏於四明林谷中猶以為東海之量我未遂契欲航舟徃泛以擴其志而發其憤懣結積者焉壬戌之春過余山中居而以東遊告出其交友送行詩章若干首曰子亦有贈我者乎余遂問之曰子徃東海其将如太公之儔而與時消息乎且将如安期羡門之屬而樂居蓬莱方丈乎抑将以覷日出聴風生觀波濤浩汗蛟鼉出沒龍鯨變化星蟾映印神歌鬼笑發為文章之踴躍奇壯者歟君曰我姑行我亦未知我所得所適何如耳請書若言遂書以為送東遊詩序送趙中孚詩巻後序趙撝謙凡古聖賢名士英傑俊良之輩聞於天下後世者皆志之所志者也故孔子曰吾十有五而志於學孟子曰尚志孔孟而上三代盛時斯道大明著於六經而卓卓然固不待言夷考孔孟而下如荀况司馬遷揚雄班固陳夀韓愈栁宗元歐陽脩蘇軾之志於文韓信衛青班超鄧禹諸葛武侯李勣郭子儀張浚之志於武董仲舒管寜陶淵明司馬光周程邵朱之志於道龔遂黄霸房杜韓富之志於平治蘇武楊彪王導顔真卿文天祥之志於忠江革茅容王祥朱夀昌之志於孝枚乗曹植王粲謝靈運杜甫李白之志於詩程邈王次仲史游蔡邕鍾繇王逸少歐虞禇李之志於書皆極其至而沈潛篤樂者故其名華於後厯千萬代而不漫也下而至於卜筮醫數伎術奕射之流雖不能若聖賢英俊之久逺顯赫而其所存亦異於庸衆人禽獸草木之随滅者由其心之所在造其閫奥咀其膚髄而不以勞苦為辭者也宋人趙中孚有志士也其卒業於寏庠也虀鹽苦淡而不易事其親也勤勞色養而不怠困苦頓弊志於道於孝於詩文者固已足徴今因薦者而登天朝則於忠於平治之道必能更加其志其不失望於所交歟於其行凡在等夷皆賦詩為規或頌既序之矣予復道其志之大者於末簡盖亦以其已然者為中孚頌復期其未然者為中孚規欲中孚之必至於古聖賢名士英雄俊良而後己也中孚其勿以予言為瀆乎送易生序陶安國朝重惜名爵而銓選優視中州人刀筆致身入拜宰相出自科第徃徃登崇臺參大政才學隠居輒徴聘授官下至一技一能牽援雅薦取緋紫不難中州人遂布滿中外榮耀於時惟南人見阨於銓選省部樞宥風紀顯要之職悉置而不用仕者葢寥寥焉山林草澤之士甘心晦遯窮理髙尚終老文學故近年四書五經論釋益粹纂附益精其書遍天下聖賢之道如日月麗天江河行地輝光潤澤無所不至使朱子理學之緒益盛以昌其淵源有自来也哉以是觀於今之世南士志於名爵者率徃求乎北北士志於文學者率来求乎南求名爵有命得不得未可期也求文學委心窮理必期於得也南陽易生彦忠氣質樸厚生長北方年既冠矣游姑熟從予究義理為詞章頎然羣衆中朝夕徃来専勤誠確今告别北歸贈詩成軸請予序其端予謂生之南来志於文學者也夫學無先於窮理理萃於四書五經體之於心驗之於身踐以强毅之力居以𢎞裕之量使行成於内文著於外况以北産則名爵可翹足得矣嗚呼文學難而名爵易宜申告於中州之人也送胡先生還金華序蘇伯衡前年秋伯衡以非材忝教成均㑹許先生為大司成相與甚親且樂也未數月而張君孟兼亦来為學録吾三人者婺人也人已愛慕婺多士友矣及詔書招延儒臣纂修元史而宋先生以前起居注来胡先生以前郡博士繼来王先生以漳州通守又繼来相見益親且樂三人者亦婺人也人皆謂婺信多士友而伯衡與諸先生亦自慶夫㑹合之盛焉夫士君子出而宦遊其所至之處一旦遇夫同郡邑井里之人為樂固無以加也而况於其所遇者有親戚之好有同門之雅又皆以文事為職業議論沾濡翰墨輝映有相觀相長之道其樂何可量哉許先生歸且踰年今史書告成胡先生復引年同辭而歸則於伯衡私心如之何其不歉然也雖然尚論東南文獻之邦未有先於吾婺者也其人材之衆學術之懿盖自昔年矣奈何比年迫於公私之多故非其父兄之甚賢教有所不暇非其子弟有超卓之才傑特之見不終學者亦多矣他日求士於婺萬一如求釡錡錢鎛刀斧於鐵爐歩則豈不大可愧乎伯衡竊懼焉幸而教於鄉閭若古之所謂父師少師者有許先生乃今胡先生又歸推夙傳於先生者以淑之二三子薫蒸而成就夫何難焉則人材秀出足為邦家之光猶及見之其樂又可量哉此伯衡於先生之歸始則歉然而更以喜也昔仲尼念吾黨小子之狂簡於是乎歸而裁之今二先生固不敢自同仲尼然二先生學仲尼者也仲尼之於魯二先生之於婺其為父母之邦同也而婺亦伯衡父母邦也則以仲尼之所以造魯諸生者而造婺之諸生不惟二先生是望而望之誰哉先生歸㑹許先生於四賢精舎幸為伯衡謝焉送徐先生歸嚴陵序髙啟嚴陵徐先生大年嘗被召至京師與脩元史書成上進詔擇纂脩之士官之先生以老乞還甚力㑹春官議脩五禮為一代之典乃復奏留之未㡬其書又成先生固申前請大臣知其志不欲强煩以事乃命有司具禮傳送以歸其鄉都之大夫士相與祖餞幙府門外有言者曰先生之學宜備顧問先生之文宜掌綸綍先生之經術操履宜在成均為學者師今皆不可得顧今以布衣老於家歸雖先生之志然豈不為司人物之柄者惜哉予進而解之曰皇上始踐大寳首下詔徴賢又責郡國以嵗計貢士欲與共圖治平甚盛舉也故待賈山澤者羣然造庭如水赴海而隠者之廬殆空矣朝廷待以庶秩猶梓人用材鉅細畢取豈獨於先生有遺哉盖先王之為政莫先於順人情亦莫先於厚民俗力有所不任者不迫之使必為義有所可許者必與之使自遂所以人之出處皆得而亷恥之風作矣今先生以齒髮非壯厭載馳之勞戀考槃之樂抗辭引歸上之人不違其請者盖将縱之山林使其鳥飛魚泳於至化之中以明吾天子之仁乂将以風厲海内使皆崇退讓而息躁競也順人情而厚民俗實在於是故寜失一士之用而不惜以其所得者大也不然先生豈茍去之徒而大臣豈棄材之士哉况先生之歸也必能著書立言以淑諸人詠歌賦詩以揚聖澤則又非潔身獨徃而無所補者也尚何疑哉吾又聞漢祖中興嚴光不屈後世莫不髙之今先生之鄉即光之鄉也嘗遊其耕釣之處山髙水長想瞻遺風必有邈契乎千載之上者矣今之歸其無負於夙昔之志哉若予遭逢明時不能禆益萬一懐恩茍禄而不去於先生盖有愧焉矣於是言者是之請書貽先生以識别送張履順復入胄監序烏斯道漢元始中為太學博士舎即太學列槐為市命諸生各持郡所出物相貿易揖遜議論予謂古者天子之養士也教之以六樂厥後教之以六學不専以此而以貿易者何哉予曲求其意不可得謬度其故曰漢未嘗廢六學特以諸生比於物歟郡之物皆有用之物猶諸生皆有用之才也郡各有其物猶四方各有其才郡之物皆萃於太學猶四方之才皆萃於太學也物有髙下有長短猶才之有髙下有長短也以吾之短而下者易彼之長而髙者則天下之物皆備於我凡通詩者不通於書通書者不通於易通易者不通於春秋禮樂以吾之通易彼之通則六學皆備於吾猶以吾物之短而下易彼之長而髙者較然矣諸生果能從事於此則才有不備者乎才備則徳備徳備則逹之於文章施之於事業建功於天朝不難矣太學貿易之意豈如此歟定海縣庠諸生張履順氏専詩經以才俊升胄監肄業有日矣以丁内艱歸而讀禮今以終制復入胄監将行其同門之友相率為歌詩以餞請予序諸首予覩今之朝廷取士雖百方獨視胄監為至重亦以儒者席上之珍也珍者何若金璧翠羽象犀珠貝則貴重為世所稱當何如哉履順實貴重之物非郡所有之常物比也兹之徃也益自寳必無負於朝廷之望斯可耳履順喪服無違禮此孝子常道予不具述止以太學貿易事比而告之庶㡬味於予之言哉送鄭千之序貝瓊四明鄭千之之徃中州也國子諸生與之遊者載酒祖於江之滸行二日抵書貝瓊曰真幸與門生之列今典教百里邑且居國都之内可無一言贈真邪乃復曰盍亦觀於水乎海門之濤一晝夜凡再以驗天地之大信者子既得以見之矣道出姑蘇又見震澤之蓄矣既而絶江泝淮即魚龍之蟠互鳬雁之飛集而其深且廣者可見彼溪澗溝澮之小朝盈夕涸不可以投芥者奚足覩哉然猶未也水之有本而最巨者莫過於河盖自崑崘至積石自積石至龍門從天而落徑山硤間干數百里而巨石之所盤束梗於前而薄於後不得紆餘漫衍而行也故其暴怒喧豗非江淮衆流可敵及其山窮岸濶豁然奔放繞華隂厯砥柱下孟津道洛汭注大伾逹洚水北折而南南折而東一日千里夷然至大陸而趨於海矣惟其勢之悍也遏之而愈起聲之洪也撓之而益震涌若雲翻怒若雷奔觸者無不崩而當者無不敗此河之奇觀見於龍門之阻非龍門亦無以見河之浩浩湯湯也使無其本而朝盈夕涸求其渙而為文盪而為聲烏可得哉士之厄而通者亦然聖人弗論也若唐之韓退之栁子厚李太白杜少陵宋之歐陽永叔蘇子瞻所謂天下之士亦皆起於困踣顛頓則掲陽栁州夜郎䕫子夷陵儋耳其猶河之龍門歟六子至是道益彰文益奇譽益崇又孰得而抗之也由其所蓄類於河之有本而最巨者矣故嘗謂物之去於尋常者不抑則不振不塞則不昌今日之屈後日之伸今日之伸後日之屈此理之必然不可誣也君子於是察之而反諸身焉千之試藝有司遂冠四十人之選其上春官也咸謂必顯於時而位不稱其才能無戚戚於中耶殊不知進之之機實在於是此天所以成其大者使動其心志充其所未至非止於弟子師己尚益勵無怠予雖老當拭目俟之送稽古劉先生還鄉序朱善江西士之好古者莫盛於廬陵廬陵士之好古者莫盛於劉君劉君授徒南昌弟子從之遊者皆稱曰稽古先生劉君從而受之亦自稱曰稽古焉洪武丙辰冬十有一月君束書将歸廬陵来告别且曰人之以稽古稱我者未足為稽古也吾子以稽古許我斯誠稽古矣予曰吾所謂稽古有三説焉不知子将稽古人之心乎稽古人之迹乎抑稽古人之文乎如稽古人之心則堯舜禹之精一執中湯武之建中建極孔門之一貫忠恕果能端居端念而彼此意㑹焉則古人之心法在是矣如稽古人之迹則堯之平陽舜之箕山商之㑹稽湯之景亳文武之豐鎬下及齊晉之㑹盟燕趙之攻圍楚漢之戰争鄒魯諸儒之講習必将如太史公之周覽遐觀而後聖賢揖遜之雍容征伐之奮揚巡狩㑹朝之嚴肅英雄豪傑之喑啞叱咤嘻笑慢罵皆必有故老遺黎能道之者然而先生老矣予懼其不能徧厯也如稽古人之文則四聖之易四代之書齊魯韓毛之詩髙堂大小戴之禮公榖賈董之春秋下逮莊騷子史靡不搜羅可謂閎且肆矣若乃倉頡之鳥跡岐陽之石皷孔壁之科斗湯之盤周之卣龔伯之敦衛孔悝之鼎及岱山鄒嶧岣嶁浯谿之石刻凡漢魏以来之桓碑彛器古文篆籀分𨽻諸家之字畫幽而窮崖絶谷之隠淪外而僻壤遐陬之遺逸皆古今之奇寳華夏之偉觀然非如歐陽子心誠好之力又足以致之則亦未能遽集也吾子其将何稽劉君於是慨然曰求諸外者逺而難求諸内者近而易吾請從其易者書曰稽古人之徳又曰稽謀在天在天之理即在人之徳也稽諸古而於徳有所徴稽諸天而於理無所咈庶㡬其可以俯仰上下而無愧乎予曰斯言得之矣於劉君之行也謹述斯語以為贈送趙永明之金華序王琦有志於逺大之學者非茍以文辭自衒而已盖文所以載道外於道而有工於文無有也世之言曰文者言之精言不精不足以成文故日罷於誦夜費於思鋪縷連疊縁飾繪繡以為工且至然卒不過如遊説之浮辭俳優戲談且老生傳之以欺後輩後輩得之以侮同列於道無與也道者所以扶綱常而紹典則今也學於師則曰彼雖善於是而謬於此彼長於此而短於是吾亦聊從而師之講於友則曰彼雖長於我而才不及彼後於吾學而智不逮吾亦聊從而友之於道無取也嗚呼求言之精而無與於道求學之専而道無取焉使蔓辭日興繆説日廣詆訾辯議訕謗排擊則文安得不為學者累哉予舊學於金華潛溪宋公聞緒論之末未嘗不以此為深戒黄巖趙永明弱冠為文逈出倫輩而予未之友今年秋至郡城友人林公輔出永明文數首皆烜爛敷腴閎闊肆縱比物引類悉有可稱且将從潛溪公而取正其殆有志乎逺大之學者文固不足為永明之累也文中子曰文乎文乎茍作云乎哉必也貫乎道學乎學乎愽誦云乎哉必也濟乎義予誦斯言也久於永明之行不敢不以告永明異日造予必如公所以教永明者亦嘗不外乎文中子之意也明文海卷二百八十六
