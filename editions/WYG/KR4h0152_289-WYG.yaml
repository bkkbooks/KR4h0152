body:
  text: 明文海巻二百八十九餘姚黄宗羲編序八十送序送陳直夫先生序莊㫤余在京師時見天下之賢者多矣得與十人者交焉如陳白沙之大羅一峰之廓陳直夫之直李賔之之敏婁克讓之公潘應昌之偉章德懋之浩沈仲律之温黄仲昭之暢林緝熈之雅皆予所不敢望而及者予皆取以為友是十人者不以余為不肖亦皆有願納交之想而直夫與余又有婚媾之雅視他人尤厚善未嘗不責過未嘗不規凡所以教誨余者無一不盡而余亦不敢負直夫也其後余以憂歸病不能出是十人者或逺或近或去或不去與余聚散不常而直夫亦十載不一見今年直夫起復御史余喜得侍時或聽其議論以助不及未幾直夫又與應昌出而僉憲大藩矣余之喜者又不能不為之懼也余終於何所歸哉直夫将行過江與余言别余留之三宿不能舍去直夫亦以逺别於是極論古今上下人物題品略盡凡所以規余者亦無不至直夫視前日盖加直矣直夫因自謂去其官居於鄉者十年鄉之人皆以直夫之直為好竒雖直夫亦不能與之以自辨者於乎直夫果好竒哉世俗之人軟美圓熟上下雷同不以為怪偶見吾直夫之直抗不容物譬之夏雪冬雷見者必駭不謂直夫之好竒吾不信也直夫學聖賢之學以孔孟為法直夫之竒其殆孟子之英氣伊川之過剛者哉人以伊川孟子為非聖賢不可雖然聖賢以純粹為質寛恕為心攻其惡不攻人之惡見其短不見人之短坦坦乎寛平廣大之地廓落乎天包海納之中而冺然渣滓之渾融形迹之俱化也若夫英氣過剛者不能無少瑕疵圭角一世而凌厲萬古自攻之旗累仆累踣而攻人之陳則雷動鼓行於鴻門井陘之間為之不少貸矣嗟乎嚴霜烈日果如和風甘雨之可親乎龍蛇羆虎果如鳯凰麒麟之可愛乎孟子之與伊川吾固知其非顔淵明道之比也直夫於此當何如哉賔之贈直夫之詩曰病來緘口坐今日為誰開事忌於名近身寧與世猜鳯鸞終瑞物鷹隼亦雄才畢竟將安作煩君次第裁盖將進直夫於聖賢廣大之中而望其划削乎﨑嶇稜層之地故耳故今於直夫之行亦以是為言非以孟子伊川為非聖賢也吾聞白沙以東白先生之請將主白鹿洞直夫出此以求印正當知余與賔之為不敢誑也送戴侍御提學陜西序莊㫤浮梁戴先生以侍御提學南畿既数年績用告成擢陜西提學副使江浦掌教吾先生送其行先生謂冝有詩吾先生曰吾詩豈足為先生重請一言以重於子夫吾先生以屬予以迂屬者不足為先生重迂者豈足為先生重哉吾先生曰何謂予曰世方病迂見夫迂者不以為狂輒以為怪予知世之病此輒謹閉其口不敢茍出一言戴先生雖不予病然越雪蜀日不疑足矣尚敢望其九鼎予乎吾先生曰言之吾請致之當有擇也予乃告曰楊墨之害甚於申韓佛老之害過於楊墨人皆知之科舉之學其害甚於楊墨佛老者人豈知哉夫何甚為我兼愛寂滅虚無楊墨之學盖足闢矣至於富貴利逹患得患失謀之終身而不知反者則又佛老之所無也是故古之學者八嵗入小學十五入大學灑掃應對進退之節格致誠正修齊治平之理自近而逺自易而難施之有本進之有序科舉之學亦有是哉惟能斯能盖夫必也屬聨比對而㸃綴紛華某題立某新説某題主某程文皮膚口耳媚合有司五經四書擇題而出變風變雅學詩者不知喪弔哭祭學禮者不知崩薨卒葬學春秋者不知嗚呼此何學哉富貴而己利逹而己覬覦剽竊而己明德新民果如是乎性分之内果有此乎昔朱子謂廬山周宜幹有一言極好朝廷若要恢復中原須罷三十年科舉始得科舉得士恢復中原計也周宜幹乃欲罷之何哉豈以科舉為媒利之階而其人不足以知親上死長之道故欲罷也昔胡楚浚又謂科舉之外自有義理曰外云者科舉自科舉義理自義理科舉無義理也夫道不明豈道罪哉科舉害道也凡人得所恃以為人者道也所恃以參天地者道也所恃以經邦國者道也科舉之學是害道人何學哉今之世科舉之學盛行求者曰是取者曰是教者曰是學者曰是三尺童子皆知科第為榮人爵為貴一得第者輒曰登雲輒曰折桂輒曰登天府懽忻踴躍鼓動一時自童習以至白紛率皆求之殫竭心力必獲乃己至於所謂義理所謂性分曾不知果何物也糜爛横流不可收拾把持斯道今果誰乎先覺後生今果誰乎予則不能不有望於提學諸君子也戴先生安能辭其責哉吾先生曰有是時王之制要之不可盡廢予曰君子仕道必科舉哉如慮廢也利逹絶之義理開之教其涵養道德於平時不得己而發為科舉亦無不善昔東萊得一文巻便識為西江陸子靜時王之制廢乎否乎吾先生曰似矣毋重自迂請書以告戴先生送三峰歸南海序羅倫南海之涘有三峰焉蟠居廣博意氣端重色如頳玉者兩峰也風骨巉巖氣度軒豁如神人異僧使人望而敬之者南峰也娟好靚秀如素女靜姝逺之可愛而近之不可狎者東峰也烟消霞歛風清日明隂陽和暢萬景嫵媚眉睫間一接佳氣則精爽飛動神情怡悦及夫雲霧歘起雷電晦明則神没鬼出駭目驚心倐忽萬狀此三峰之所同也兩峰在東良容君彦昭有之南峰在玉樓之西易君德元有之東峰在魁江之上陳君秉常有之三峰之外在畨禺者何氏有矩峰在東莞者林氏有熈峰三峰髙出白雲九曜石鼓大奚諸山皆俛伏其下不敢抗視五峰脈脊皆自崑崙崑崙在白沙南世傳潁川白龍所宫天下文明則見海南諸山崑崙最髙䝉泉潤澤可被千里屯雲膚寸可雨天下與羅浮相望羣峰列岫層巒叠巘凡出崑崙者皆磊落竒詭特異衆觀雖跨州超邑横河絶海而端嚴拱抱尊面崑崙如弟子之服先師無違背者武夷之西雲谷之東蔡氏有九峰胡氏有五峰成二山之偉觀此五峰者不亦重白沙崑崙之偉觀乎客有好竒者曰子知南海之崑崙矣知西海之崑崙乎吾能言之其大蟠天地其髙蔽日月閬風之苑𤣥圃之墟宫天帝而館神人其入中國者北紀則嵩華恒岱南紀則岷峨衡廬小天下塊三山杯五湖者皆崑崙之支脉為之也子欲盡天下之大觀吾與子其俱徃三峰主人同聲曰諾吾將由南海之崑崙陟西海之崑崙矣遂仗劔長歌浩然而徃送叅政盛公以端之江西序張弼古稱為政者以移風易俗為難葢非有其本者不能也有其本矣非持之以乆不能也是故虎狼噬人驅之而止洪水墊溺䟽之而止旱暵為虐一雨而止劇寇弄兵戡之而止惟風俗偏蔽不可以力競不可以智攻不可以期近效所以難於禦大灾捍大患也若江西大藩文獻攸萃民服農商士尚經術海内鮮儷然郡縣之間文獻彌盛徤訟彌張珥筆懐牒者百十為曹鑿空煽虚變幻竒詭雖絶人之辯莫能致詰詩云雀角鼠牙未足以為喻也嗚呼豈經術使之然耶而世之知經者未必然也若曹不知有經耶而儼然嬰冠束裳者亦或蹈之何也將假經而濟姦肆姦而賊經耶經而至斯戾亦大矣然不世之士徃徃挺出其間豈以訟徒苛責深求能成人之賢耶何斯賢之化反不能及皇明撫治百年良吏臨之亦既多矣抑山川之秀有戾氣以間之歟皆不可知也吾鄉盛公拜江西叅政而聊一問之公績學有聞凝然重負謙厚慎宻内明外和嘗任兵部之武選而釐弊設條績效獨著近任工部之營繕甫逾三月上下咸愜真良吏也化民成俗之本立矣協恭寮寀期以嵗月頑風陋俗縱不能頓革寧不少為止息以從善良耶吾不信也昔人謂天下無難事書以俟之公名綸字以端以戊辰進士起家云送學士王先生之南京翰林院序張弼夏商周皆盛治之代也而後世之治出於周特詳不徒文武造周成康守成宣王中興之大制也后稷公劉太王王季之生養㣲顯獸腓鳥翼複窑伉門下及閭巷荒遐閨闥之幽筐笤之細靡不有聞豈其時近其文備哉去於諸侯燬於暴秦文非備也文武而上與夏商俱時弗後也盖惟二南七月思齊生民崧髙江漢諸詩傳播在人簡籍雖毁亦不能泯故三百篇獨全於後世而言周之治特詳也我朝仁祖淳皇帝發祥啓聖於中都太祖髙皇帝肇基建極於南都迨太宗文皇帝肅清纉述其宏綱宻紀固掌在有司載在史官萬世攸遵然其委曲深㣲非史法可得而悉也弼嘗遊南都好從長老問遺踪徃緒欲就一隙之光以窺日月之明傳聞罕覈滋乆滋惑間見篇章亦多膚末哤蕪弗足稽也韓昌黎所謂揚厲無前之偉績鋪張對天之宏休非今日作者事乎毘陵王先生廷貴拜學士之命之南京翰林聞者咸以斯任優游恬曠若在風塵物表所謂吏隠者也弼竊以原荼豐芑岐鳯囿麟徒以發舒於咏歌者盖有年矣今先生徃履其地撫其跡質其事仰聖謨之淵𢎞左右之忠藎而所以篤無疆之基業者不於此時而述之將何俟乎不可謂郊廟有頌而風雅可略也矧編之簡籍幸徹宸聰則可以鑒創造之良艱持守之不易黙格潛孚殆不必昔之侍細㫋伏青蒲而功自倍豈徒言治者得其詳哉吾知先生之不自暇矣况南京之職文事者惟先生而己少暇則應四方之求銘功焯以垂金石亦所以著國家之盛治於悠乆也先生何能自暇哉有鄉進士李應貞者生長於南都好古博洽百年之跡頗言之有據先生叙述於咏歌間其亦容賛一辭乎弼辱先生之知於斯行不敢徒羡先生之暇也尚聽雅頌之音洋洋盈耳駕皇明於成周之上矣先生何暇自逸哉送劉世美還京序章懋成化丙戌春三月廷試進士賜羅倫等三百五十有二人及第出身有差既而循故事選進士充庶吉士員居之翰林膳以大官而不勞以職務俾之盡讀中秘之書以修其所能充其所未至盖將儲養成就大其器業以大他日之用其為人才治道計者至重也惟時在列之士閩中林亨大王世英吉水宋爾章華亭張汝欽姚江邵惟貞天津劉世美莆陽黄仲昭東安施彦厚洛陽翟廷光淳安商懋衡安成李廷章耒陽謝元吉江浦莊孔易石宗海貴溪畢廷珍新淦何惟一山海鄭克修甬東章元益上虞陸克深海虞李世賢番禺鍾美宣閩中王文魁張夀夫皆一時俊髦而懋之不肖亦獲厠名其間凡二十有四人咸以布衣首際隆遇罔不感憤思奮圖惟報稱相與切磨講習端乃心正乃學砥礪乃名節平居論議必以古人上不負天子下不負所學相規勉慷慨自許契誼相投盖金可斷而蘭與臭也豈非一時之幸哉居嵗餘而夀夫文魁相繼以卒亨大復以母喪去存者葢二十有一人未幾而拜官之命下矣爾章世賢仲昭懋衡與某皆為翰林編修孔易檢討彦厚廷光元益皆給事中元吉克修汝欽惟貞惟一廷章皆監察御史世美世英宗海美宣主事戸部而克深禮部廷珍水部出視事於濟寧或官守或言責各有攸司曽未踰時而某與仲昭孔易俱以罪責補外仲昭知湘潭孔易判桂陽某亦待罪臨武遐荒萬里自分永與朋舊暌隔矣己而以言者留南都仲昭暨某評大理孔易副行人其後元吉以言事忤㫖出為南陵丞惟貞謫知浦江美宣謝病歸南海皆道出金陵邂逅一叙平生獨恨爾章又爾物故徒以旅櫬過此某等又相與哭而送之江之滸追感疇昔寧不為之慨然也耶去年冬世美適以公事來南都寓於館人者四閲月因得數相過從間與道舊則世英復以憂去克修諸人亦徃徃銜命走四方其朝夕聚首於京師者無幾矣離合升沈可慨如是而况數十年後耶世美他日還都訪舊其意念當何如也别湛甘泉序王守仁顔子沒而聖人之學亡曾子唯一貫之㫖傳之孟軻絶又二千餘年而周程續自是而後言益詳道益晦析理益精學益支離無本而事於外者益繁以難葢孟氏患楊墨周程之際釋老大行今世學者皆知宗孔孟賤楊墨擯釋老聖人之道若大明於世然吾從而求之聖人不得而見之矣其能有若墨氏之兼愛者乎其能有若楊氏之為我者乎其能有若老氏之清淨自守釋氏之䆒心性命者乎吾何以楊墨老釋之思哉彼於聖人之道異然猶有自得也而世之學者章繪句琢以誇俗詭心色取相飾以偽謂聖人之道勞苦無功非復人之所可為而徒取辯於言詞之間古之人有終身不能究者今吾皆能言其略自以為若是亦足矣而聖人之學遂廢則今之所大患者豈非記誦詞章之習而弊之所從來無亦言之太詳析之太精者之過歟夫楊墨老釋學仁義求性命不得其道而偏焉固非若今之學者以仁義為不可學性命之為無益也居今之時而有學仁義求性命外記誦詞章而不為者雖其陷於楊墨老釋之偏吾猶且以為賢彼其心猶求以自得也夫求以自得而後可與之言學聖人之道某幼不問學陷溺於邪僻者二十年而始究心於老釋頼天之靈因有所覺始迺沿周程之説求之而若有得焉顧一二同志之外莫予翼也岌岌乎仆而復興晩得友於甘泉湛子而後吾之志益堅毅然若不可遏則予之資於甘泉多矣甘泉之學務求自得者也世未之能知其知者且疑其為禪誠禪也吾猶未得而見而况其所志卓爾若此則如甘泉者非聖人之徒歟多言又烏足病也夫多言不足以病甘泉與甘泉之不為多言病也吾信之吾與甘泉友意之所在不言而㑹論之所及不約而同期於斯道斃而後已者今日之别烏容無言夫惟聖人之學難明而易惑習俗之降愈下而益不可囘任重道逺雖己無俟於言顧復於吾心若有不容已也則甘泉亦豈以予言為綴乎别甘泉子序黄綰予欲學以全夫性之道知寡聞不足與乎大明欲其友三年而不得求其師六年而不遇自謂終焉棄德者矣反而視之其身常如槁其意常若失得一官若負穢或有告之曰越有陽明子來矣子何不知親耶乃亟趨其館而見之陽明子坐與我語歸而猶夢之覺恍若陽明子臨之而不敢萌一毫於私於是乃源源而見之遂不知有我之百骸九竅矣陽明子曰有南海甘泉子者在予交也子豈欲見之乎翼日偶於陽明子之館見之其容簡其心一其示我之言蓄而盡入其館遂拜之於是二子之庭日必有予跡矣陽明子曰吾将與二三子啓雪竇帝西湖以居諸甘泉子曰吾其拂衡嶽拓西雲行與我三人遊之又相謂予曰子其掲天台掀雁蕩以候夫我二人者予曰我知終身從二子游二子有欲我何弗勤且我結兩草亭各標其號以為二子有焉何如無幾甘泉子將帝之命欲之於安南之國予則憂之曰聚散其自此乎子其舍我矣或問曰何憂也子過矣天地之道理以同聚物以異散今子三人理則同矣物則類矣浮遊之間何徃而不與聚而子猶疑其散耶曰吾欲之甚而易之惑也夫自世喪道世之君子白玉於外而中䃉也其不可與道也乆矣而吾忽得二子者不啻景星快見而鳯凰樂覩之今離索於此此吾之所以為憂也是何過哉子行矣遂書其言投諸其笥以蘄子之不我違也送太守程君之任序羅欽順昔陽道州自署其考云撫字心勞催科政拙余嘗以為拙之一字當為巧者發爾不然未為得也夫巧固傷民矣而拙将無瘠其國乎國誠瘠未必有肥民矣何以驗之徃年賊瑾用事有司率承望風㫖累年租調之違負者舉之如不及縁此横取民財一郡多者奚啻千數萬名為勸借而實則威之以嚴刑徴諸前聞是謂白著吾民皆不堪命而卒無所於告也巧之為禍其烈如此不可畏哉然推尋事端則凡違負之多未始不由累政之拙在平時或可牽補一旦事變百出國用且窘元載之䇿勢將必行斯民安得不重傷乎是知巧與拙皆不可也嘗聞漢宣帝論及良二千石首以政平為言要之催科之政惟平乃善夫所謂平者豪强不得以茍免貧弱不至於見侵惟正之供取必以其時其非時之調發必不得己則審其輕重緩怠而通融之有術如是而己矣夫有地數百里民小大以數十萬計政事之當平者誠不少乃若關於利害之大者宜莫過於催科催科之政平則實惠及民而國用常足上下之情兩得為郡者庶無負矣今之君子可以此言告者程君汝南非其人乎君初以家學登𢎞治壬戌進士第授南京戸部主事歴陞員外郎郎中詳敏寅恭聲稱籍甚當道兼采其資望爰請於上俾知衢州夫以君存心之良得名郡而理之其致勞於撫字也必矣而况在戸部日乆中間屢奉堂劄有事於外服其於民情之舒慘國計之盈縮緩急之際可恃與否夫孰非其所諳則夫催科之必平不傷於巧不失於拙又當於君見之矣且為郡之贈豈無安養教化可言而顧於催科是講則以大學之教固嘗深致意於理財也理財之道得然後安養可遂教化可行不然心雖勞竟何益哉用敢以此告之君以附忠告之義以復其寮友楊君景竒朱君廷輝輩之請送太守歐陽君之任序羅欽順吾邑稱士族推歐陽氏百數十年來登仕版者後先相望徃徃以才行著聞於時賜之其一人也君初以己酉貢士典教湖廣之應城應城學者皆樂從其教人才為之一盛後登壬戌進士授南京工部主事遭外艱去服闋改吏部進文選郎中所至皆能其官盖其識見明應酬敏動必稽乎典法而未嘗不合於人情此所以克有佳譽也兹拜金華太守之命輿論翕然以為宜之任有期其同官諸君子來請余言以為贈余與君居同邑且有連同官南都相處之日乆􅁩固不容以無言也惟金華乃淛東名郡其景物之勝自齊梁時已為詩人所賞逮宋中葉大儒吕成公出卓然以興起斯文為已任遂啓一方道學之源相去未百年而何王金許四君子相與導其委至於近世則又有楓山章先生相與揚其波漸及士民其習俗要為端且厚矣君徃而為之守豈待於他求哉余嘗聞古之有邦家者其才智雖逺過於人人然猶必有所友有所事葢稽謀考德既以為在我之資而養老尊賢又所以為士民之勸身不出戸庭之近而化行千里者此其機也世降以還人情多喜於自用師友之誼鮮克致隆所以功業如彼其卑無足怪者今淛中大老幸有若楓山先生在君所敬禮宜莫先焉考德稽謀匪朝伊夕於以𤼵揮於政事將見舉無不中勸無不從其士習固將益端民俗固將益厚矣夫如是君且優優然得以其暇濯八詠之清風翫雙溪之明月􅆳都人之麗句以繫他日之去思其佳譽之有終名位之逺到也不可必乎余嘗佐楓山先生於南雍多辱教益奉違日乆每用馳情輒因君行附致區區之敬明文海卷二百八十九
