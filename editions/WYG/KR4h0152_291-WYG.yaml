body:
  text: 明文海巻二百九十一餘姚黄宗羲編序八十二送序送馬布雲序李夢陽馬君布雲主事戶部四年矣一旦致其事而去同僚既醵爲之餞而又屬予之言予幸接下寮日以簿書期㑹爲事其何言之能爲雖然竊有聞焉君臣之義道不合去言不聽去不得其官去年及去疾去以予觀布雲年未及也非疾者也布雲前爲中書舍人九載克厥職乃擢主部事布雲又克部事鄉督太倉粟吏不敢蹈奸於是舉督天津粟天津之人咸藉藉稱明斯非不得其官者也非所謂言迕而道違者也而何以遽去無可去而去予於是知布雲之賢也夫自士大夫以官爲家進退之義擯而不講於是有老死於位而不悟者穢行詭迹之士遂宴然在列䝉垢詈不顧甚有病卧牀褥猶日探除拜問調遷者使其弗事事則巳苟或事事而能以不得不聽不合去否也嗟乎予於是知布雲之賢也使布雲不得其官去言不聽去道不合去老去疾去猶爲賢矧無可去而遽去邪夫宦譬之海也百險備焉逆之則危犯之則溺不知而不去謂之逆知可去而不去謂之犯布雲兹去譬若泝恬波而行興意竆極舍舟登陸其有不樂者邪布雲偉軀幹美髭鬚豪爽尚義少失意於科第老復弗究其官必考夀樂其餘年必生賢子孫昌大其家不然何以與危者溺者别也送東谷序康海東谷子由崑山改盩厔居盩厔者三年乃以考績上京師過予爲别又十三日往餞東谷子於思政之軒覩近遡往嘅然興懐焉於是賦詩悲歌以贈東谷子詩成遂序以書之於巻嗟夫士於平居莫不以天下之道是是而非非謂如契以要貸也然而天下之事恒出於精神思慮之外蓋有是矣而或非非矣而或是者於是聖人之道不能信於天下而姦詐之徒爲其所不當爲獲其所不當獲者往往而是故小人亂君子邪説奪正辭遂使士大夫之口善者不知是惡者不知非聖如周公孔子而處士横議䝉疑於當時此其故豈一日之漸哉闗中郡縣之吏崇廉恥遵德義者一二人往往憎於多口而貪饕僥倖之徒反冒薦牒此非獨當塗者之過習而不察居而不疑由𢎞治之季大抵然也東谷子以名進士出宰兩劇縣不幸而當其流俗志貞操㓗而上弗知民安治興而譽弗逮登仕十年而貧蹇憂否不得推餘於僕毀愈積而操愈固行愈屯而心愈紓由是則豈但可以首先闗中之吏雖之天下可也易曰震驚百里不喪匕鬯東谷子由吳抵秦闗數千里而所遭值若合符節乃能獨以無垢是居毀譽憂患沓至乎前畧無少動其心由是雖古之人亦巳難也今士大夫并古人之難爲者而責中人之才乃其所予又固喜怒而重違其本指由是雖周公孔子立乎其前未有不非之者此其意非真非周公孔子者茍其名非旦與丘則雖百周公孔子無非可非者也予有别業在彭麓雜聞於民博考其政親見其爲人而有美不誇抱器罔售其過安歸耶東谷子行矣然天下之廣士大夫之多無有深知東谷如予與渼陂石崗東巖涇野太微者况東谷非求人之知而爲是者乎求人之知而爲是則别有所爲而不爲乎此矣知不知豈東谷之志哉送豐原學先生序王九思四明豐原學先生在翰林爲侍講纂修孝廟實錄有功進秩右諭德而爲諭德未久也迺奉上命視事南京翰林院其事蓋在正德己巳之六月云臨别而先生曰何以幸教我也當是時九思亦由檢討纂修調爲文選主事以公事故不果其明年庚午秋罪人斯得而予迺坐鄉里爲吏部有權遂黜爲壽州同知壽州去南京五百里先生賜書存問稱執事曰執事格心之學忤逆寺者誰則弗知也又曰執事弗幸教我邪當是時又公事未果也居壽州一年而辛未冬十二月上迺用諫臣議蓋曰壽州同知前在翰林得出爲吏部而狼籍賄賂破壞選法宜罷棄去應上天之變於是上報曰同知致仕矣先生聞之迺又賜書存問而曰嗟玉石共焚迺至於此執事不暱罪人舉朝所知何至今猶未明邪執事固但知桑梓之樂孰知慨世道者何如也而又曰執事迺弗幸教我矣予讀之竟於是感激發憤嘆息曰嗟乎世復有知我者乎人固有明乎禮義而陋於知人心者也果如人言則九思者蓋小人之下者也天地弗能容鬼神而訶斥之者也又奚以其言如曰以其言己也則世豈乏人而必小人之言何也嗟乎世復有知我者乎昔者在翰林蓋應制而風諌寓撰述而美刺備羣居而規戒形九思不佞固奉教於先生矣蓋若是者十年比其南也而經籍典墳古文遺書反復而諷詠有味哉如啓清廟奏金石美哉洋洋乎蓋九思弗得而與焉兹者竊聞上意開明堂興禮樂陶鎔萬類軼駕唐虞是未可知也是豈可乏人行且召先生矣而予退處巖谷老農老圃終其身可矣莊周之言曰小知不及大知故夫鵾鵬則大知之類也而蜩鸒鳩斥鷃者則小知之類也蓋亦各安其分耳矣故曰知小而謀大鮮不及矣獨念世無知我然如先生者又逺别弗待矣向所欲爲先生言者亦汗漫弗稱述矣屈子曰竭忠誠而事君反離羣而贅疣又曰交不終兮怨以長是故水搏則勢激情極而感興幽昧險塞困拂抑鬱日月不能照山嶽爲之摧此所以烈夫壯士擊劍悲歌拊膺流涕而至痛哭弗自知者有矣嗚呼惜矣知我者謂我心憂不知我者謂我何求巳焉哉然非先生孰弗謂小人之文過矣送王令序王九思予在翰林時每見述職之典其年春正月天子郊祀畢越旬日御奉天門視朝是日諸司始奏事於是方岳郡縣諸吏咸趨御橋南跪免冠俯伏首至地待罪刑部尚書率左右侍郎上御街北面跪讀彈文繼而六科給事中十三道監察御史皆有彈文各推老成一人北面跪讀大意言方岳郡縣吏若弗能事事宜寘之法以示懲勸予所見凡三度天子咸口出德音特宥之以勉圖後效於是方岳郡縣諸吏不下萬餘人輙踴躍頓首謝口呼萬嵗響聲若春雷在空既退出翌日早具公服謝午門外然後吏部以黜陟上聞𢎞治壬戌吏部言方岳郡縣吏政有卓異不可但己宜稍稍旌之以勸豪傑於是推轂二人其一大名知府韓福其一宜陽知縣胡獻敬皇帝覽奏甚喜命錫宴禮部未幾皆右遷蓋近代曠典予所幸見者也自予麾出外郡竄伏林莽歴述職者又三度矣未聞有所旌拔如壬戌時然山城僻野邸報不及或有之而罔聞知也抑固未之有也皆弗可知矣正德庚辰春又當其期吾邑令王君朝暮戒行李北上邑中諸大夫謀有以贈請予爲之言君固多善政兹行賢書在藩臬考覈在吏部意者天子勵精圖治復舉先朝之典則夫嗣韓胡二人以興者其王君乎是未可知也若夫奉天奏事乃恒格待諸吏予偶及之云爾送幕吏陳君序王廷相撫養以惠生教化以植德緝暴革奸使民衎衎於田里其敷政有如此者淡泊以自守一私無所營志潔而操貞使人仰之若天日之皎其行檢有如此者斯人也百姓必戴之有司必嘉之其以賢而進進而陟諸崇階必然矣刻峭以爲公聚斂以爲能民隠弗恤而蒼鷹乳虎之是志其敷政有如此者媚上以求容攘下以自潤踪跡祕於鬼蜮汙濁肆於貪饕其行檢有如此者斯人也百姓必怨之有司必惡之其以不肖而舍舍而困於草野必然矣有不能明察而覈實者賢者反退焉不肖者反進焉是顛越之政也下不爲有司病上不爲大政累者幾希矣儀封典史陳君天秩今年以述職罷歸令長曰奪我良尉吾政烏乎以贊百姓曰舍我幕君吾生烏乎以惠瞿瞿蹙蹙若不忍其有此而無所爲之控訴者而君方且處之豫然無鄙心無怨言無戚容返漁於江返耕於澤若大獲其固有之樂忘得失於物我焉者君不其賢乎哉且夫黜陟幽明大政也天下之廣且逺庶職之賢與否固非一耳目之可以周而察也勢必寄於有司矣使寄非其人則善徼倖者掩其醜巧逢迎者市其譽執法者以爲過刻守道者以爲不通甚至未覩其人誤以少壯爲邁老未審其政誤以平易爲孱弱如君之賢而見羅者不可勝紀矣嗟乎一邑之尉其得失所繋尚尠也騎刼將而樂生亡則齊城七十爲之盡復林甫相而曲江退則開元之治以之不終是治亂之機不在災祥妖孽而賢否進退乃其大關鍵矣余於君之罷歸也安得不三歎於黜陟之政也哉送儀賓劉君還秦中序楊循吉秦與呉東西相望在今之時秦極天下之雄傑呉極天下之繁華今言形勝者必曰秦言物産者必曰呉故游觀之士茍以南而之北則秦誠不可以不至不至秦則無以知山川之險固有如此者也茍以北而之南則呉誠亦不可以不至不至呉則無以知賦之充豐又有如此者也人能西觀乎秦東觀於呉若是雖不他觀亦足以盡其游矣余呉人也嘗慕乎秦而未得游是獨見其東南之美耳于秦之勝莫睹也今儀賓劉君生秦中而東游呉是既盡其勝於秦而又兼其美於呉者也豈不偉哉雖然有可論者君其願聞之乎昔秦在列國以一闗自限不通於諸侯雖以漢定鼎唐建社亦莫不憑其險以東臨天下非王者示人以公之道也呉則春秋時僻在海濱而魚鹽榖帛亦不過爲一國之利耳其後濞驕權替而鍵據亦時裂爲偏土而不能恒入于貢也今天下一家四方化洽盡徹河之備使秦爲西外屏而呉之財賦並入於度支非太平極治其能然哉而余與君得以二地之人㑹是游焉則將何如其爲幸也噫西有秦固東有呉餉此誠今天下之所資也而人人知之然得以形勝而有此財賦今天下之治實出焉而人豈知之哉君之行也無以爲道則談其幸際乎盛世者以相與樂焉君和易恭謹好學而嗜文國賓之賢者也送楊起巖序陸容雲間楊起巖從游於内翰陸先生鼎儀踰年而歸婁東之士請言贈之予時數往來於鼎儀亦嘗聞起巖之爲人及其踵予門拜焉則又見其衣冠之飾步趨之謹語言應對之不茍信所謂方進而未已者哉故因諸君之請而進之昔魯之富人有竒病者輕暖之弗適也肥甘之弗嗜也細氊廣厦之弗樂與居也而垢汚之是衣穢敗之是食腐鼠之壤鮑魚之肆遇之以終日焉然亦自醜其病之竒也徧謁於里之醫里之醫鑱石之毒以熨之湯液醪醴以攻之弗已也聞千里之外有若秦越人者則治任裹粮竆日之力而造焉至則鑱石毒熨之試湯液醪醴之攻不加於里之醫也而飲食嗜好之復其常者日駸駸焉富人者乃趨蹌而歸以誇其里里之醫莫能詰也踰年而病復作凡爲醫者笑之何則始之病者蔽於欲而失其好惡之正也醜之而求療焉者心之明也衆醫之弗效者視之玩也居無何而愈者所向專而易爲力也踰年而復作者自足害之也起巖昔之所自病者吾固不得而知之游於鄉之校盡友於鄉之善士者有年其志未足也不逺數百里而游學於兹是不猶舍里醫而慕越人之尊者乎兹其聞道而往充然有得是不猶求療之復常而徜徉以歸者乎夫引槁藥石以已病者醫師之功而撙節愛䕶不貳其病者存乎其人焉耳醫弗與也君子之於學何以貳於是哉起岩慎是以往無忘疢疾則亦將駸駸乎心廣體胖之域而膚受之病君子有弗病矣不然予恐先生長者之病吾子也又奚翅衆醫之竊笑而巳哉送提學孔文谷先生序張治道備率履之德者開道化之源值頽靡之運者獲俄頃之助故人材之興係提學教化之助在運㑹此非其至難者與我明百六十年天下科目凡五十有幾運㑹之隆替人材之消長監司提學之得失不止於近雖遠亦可説自嘉靖以來輔臣奏以京官有文名者出主各省鄉試凡校文取士一任專之自是校閲不通乎監司聲名不採於提學及入院而日以試錄爲急編輯補奏之難日不暇食其於多士文章之優劣髙下漫不知省甚者一委之内簾而御史藩臬諸君曽不得有所干與若爾無才者得以倖進而豪俊知名之士多遺棄弗錄其試錄又獨出巳見不兼衆長體制破碎詞義乖僻而一時傳誦模倣遂以成風幾不能變此非一運㑹之厄哉嘉靖癸已關中提學缺朝命乃以我文谷孔先生來以次年甲午時值開科深慮士習之佔侸科目取士之茍且敦崇教化嚴制科條淑士必先根本爲文必法秦漢刪蘩薙稊剗異歸同變近時嶮澁乖盭之習以復成化𢎞治博雅渾厚之氣士彬彬然盛矣乃又一運㑹也無何朝廷復罷京考仍以監司主試文谷聞而喜曰是科也必得士而士之穎拔者必盡錄及期乃以所得士薦之巡按御史范君子仁子仁曰有士若此何有於科目哉乃以傳諸藩臬諸君諸君曰有士若此何有於科目哉而西安守夏君又因其優續試之無不一當百者比試遵制得六十五人案首三十六優等二十八遺材一皆盡先生之選此固運㑹之難而先生提學之得教化之隆轉移造旋之妙超絶前後矣夫豈尋常者所能及哉八月癸巳先生以例貢左遷歸門生舉人張文卿率諸舉人謂余曰余宗師孔先生將行矣余不忍别請先生言而余遂應之若此至於先生德行文章節義操履有非凡近所可企及他日立廟堂以風動天下士樹勲表績爲一代偉人又非諸士子所能識而余言者亦末矣嗚呼盡得一方之材以事君乃以衰庸之七貢貶削焉君子行道之難有如此哉可慨也夫可慨也夫送提學劉松石先生陞南京太僕寺少卿序張治道嘉靖丁亥松石劉老先生以陜西按察司提學副使陞南京太僕寺少卿陜之士大夫不忍先生去陜之父老百姓嗷嗷焉如赤子之失慈母不知先生果何道而得民而民感先生若是深也且先生來關中未周嵗而其職又不專民事士之感固也而百姓之感何也説者曰先生當武宗朝嘗巡按闗中矣以故百姓至於今思之曰闗中自有明以來巡按者非特先生也而民何獨思先生曰闗中自有巡按以來而巡按之難未有若先生時也先生以正德癸酉來闗中而太監廖堂時當鎮守堂弟鵬以錦衣衛指揮事上左右鵬子愷又以巧猾奸黨立名於時下結錢寧以爲心腹上挾朝廷以張虐熖陜之官府自撫按以下皆望風奔走莫敢誰何凡差陜西巡按來者㒺不惴惴焉茍且將就以延嵗月故廖之惡日張而百姓之困日急是年值陜西巡按缺朝論以先生來鵬聞之懼迺托先生之厚以求見曰鵬得從此伺候於先生之門以求教先生然其意實欲來闗中依其兄堂爲勾取計時鵬值有南京之命鵬辭以親老不敢離膝下朝廷准在京養母矣先生即厲言曰聞汝辭南京之命而不赴爲親也又何得往闗中哉縱欲往獨不思朝廷命耶鵬語塞即趨出遂不敢來闗中暗以書與堂曰劉御史非他御史比至當避之無何先生來即糾堂不法察其奸枉縛其左右一切害民蠧國之政悉剪革無餘凡河南深鈎巧取之術一毫不敢施於闗中行之數月官府清紀綱正百姓樂業堂弗能堪遂奏於上厚賂鵬黨以誣先生上遂差錦衣來繫繫之日天地改色惡風振揚百姓攀轅死轍咸寧人郭鎮死於車轍之下至不得行先是堂戒有司下吏不得私相送送者罪又遣參隨覘其行止他人莫敢近既而百姓集者數萬人噪呼奮躍哭聲震野若將引而至於亂焉堂懼斂其左右收其覘者而不敢復令一人至車下逮至之前上卒察其誣謫金壇縣丞既陞湖州府知府既陞山西按察司提學副使無何改陜西按察司提學今又將陞矣嗚呼方先生之未來也百姓思之若赤子之於慈母幸來矣今又復舍去而百姓感之安有不重且深也是先生之心無一日不在闗中而闗中百姓之心無一日不在先生也矧先生之來視學也廣棫樸之化開𤣥牝之門拔異掄竒刪蘩薙稊而士之從教者若響之於聲數月之間文風振而道義興此又諸士子之所感而百姓之所未知者其不忍先生之去之意安有不重且深也思先生他御史又安可比也持此以往雖宰天下可也豈但闗中哉豈但闗中哉治道等迺先生試取士也迺親見我先生之良畧序其事以别先生若其人品髙行誼峻富貴利達一無所動於中此又天下之所共聞余别有載記兹不贅送華源㓗遊南雍序儲巏今天下之士試於内廷惟進士與嵗貢士監以御史環以禁衛其嚴且重蓋同間有賢良遺逸被荐而至者不過試於有司以狀上聞而巳國初進士之額未定有一嵗放榜僅取百十人者當時充有司庶府卿大夫之選稱任使而著功謨大率皆嵗貢士也承平久積漸甄别之然士特立自負要其所樹立不减於進士者猶徃徃有之至於今則寢不逮矣嗟夫豈人才夐異於疇昔耶蓋亦有由然矣何也祖宗得天下征戰殺伐之餘當儒學衰熄之日人才未盛隨所得而用之乘其强富精明之時鼓以奮迅邁往之氣而又隨之以賞罰懲勸之實當是時人才豈可以方類分耶今則羣取多士而養之學限以嵗月而取之貢既貢矣又限以嵗月而注之選將選矣又限以嵗月而授之官年阻而地拘業荒而志沮一日課功覈績乃俾與新進之士等抑何怪其不相及也歟夫天生人才自足以供一世之用雖時君世主各以意尚設科分類而求之然大要不出其人也故在漢則曰賢良文學茂才孝廉隋唐以後則曰明經有道進士制科使易其時更其目吾見前之充賢良文學之選者即後之明經有道其人也後之充詩賦制科之選者即前之茂才孝廉其人也夫豈借才於異代哉是則今之進士與嵗貢士其初亦均是人也特有司錄用之法與士之自待其身者不同故異時成就者遂差殊以觀爾脱今之世悉罷科舉而惟責郡國嵗貢士焉則世之趨尚號進士者又胥藉是以出矣豈能避有司之求而借他塗以自見乎吾友華君源㓗篤厚而雅慎明敏而通練自少治進士業勤且精矣厄于造物者屢試場屋不利今年貢至春官及入試褎然占前列詞翰燦然意氣壯盛縉紳多士皆器異之事竣復遊南雍揚人仕於朝及諸嘗往來者咸屬予言以贈巏與源㓗同里閈且有連交遊最久源㓗母孺人居孀有節操今年埀八十矣源㓗以年而貢非所好也姑以慰母氏之心巏故罄意所欲言者以告南雍之士異時有擬髙科列膴仕以才業聞於世使人不敢例以嵗貢少之者其在於兹乎其在於兹乎送鄭先生知博白縣序儲巏始先生典教泰之日巏年十七八在諸生後獨奬與之間語巏曰春秋一經自先聖筆削後厯數大儒箋釋微辭奥義多闡白然尚有可議者予嘗脱去傳註直取聖經讀而玩之其詞簡其事覈其義深其理直凡當時國君卿大夫之功罪㑹盟征伐交聘之是非中國四夷之内外亂臣賊子之隠微莫不昭然簡冊有不待三傳而見者學者有得於是則爲子爲臣臨大事決大疑殆不難矣子質敏可更授之巏時方治毛詩工舉子業弗暇然冀有待焉迨癸夘領鄉荐甲辰遂貢春官與賜進士第欲往授其説不可得矣嗟夫學莫大於師友之益古之人有越境去國従之遊者幸而即之雖罹飢餓觸厄難瀕死不忍去誠以所樂在是也巏幸先生臨教之且欲授以所自得者挈而躋諸髙明之域不可謂不過矣而庸惰玩愒卒不果従事是可慨嘆也已又明年巏授南京考功先生亦滿九載竢選於吏部當道者重其才超授知博白縣道過江東巏謁之先生曰予卑官也藉子稍有聞子奚贈我巏曰先生明春秋經剔去浮僞獨得聖人之粹精其用力勤且久矣巏雖不竟其業博白之衆必有豪特雋偉者在其間又奚患乎無所傳也然昔者惟見於文字議論之間今則得百里而治之措諸政事而行其所學矣是固先生夙願也論者謂五經之有春秋猶法律之有㫁例挾而治天下有餘裕矣矧一邑哉敢以是爲贈明文海巻二百九十一
