body:
  text: 明文海巻二百九十三餘姚黄宗羲編序八十四送序别周龍岡念庵先宜人所生幸存者予與女兄二人女兄許聘龍岡周君已而以目眚遂贅於我輸年而夭故予視龍岡猶女兄存也予年十四未屬文龍岡時時爲語東泉師舉業法其後師事陽明王先生於贑又時時爲語學問正傳及冀闇齊篤力處予於是慨然有志聖賢之業父母憐愛不令出戶庭然每見龍岡未嘗不自憤憤也龍岡身多病舉業不竟然其性行淳實一無改於相語之時予雖以二業冒虛名亦誠有感於當時之語而年巳垂老卒無所成白沙有云白頭不負垂髫志記得城南就館時同心之言一字一涕當垂髫時何意遂至白頭即白頭何意所期止此交游滿前誰復可告故每見龍岡又未嘗不自惻惻也龍岡長予六年今以太學生待次公車且三就矣當語二業時其自視何若亦何意遂止於此昔不能改性行於久病豈以一命之寄受變流俗耶憶龍岡嘗自贑病歸附廬陵劉子吉舟劉與陽明先生素厚善㑹母死往請墓志實以濠事暗相邀結不合而返顧龍岡呻吟昬瞀意其熟寢也呼門人王儲嘆曰初意專倚陽明兩日數調以言若不喻意更不得一肯綮不上此船明矣此事將遂己乎且吾安得以一身當重擔也儲拱手曰先生氣弱今天下大事屬先生先生安所退託陽明何足爲有無哉劉曰是固在我多得數人更好陽明曽經用兵爾儲曰先生以陽明爲才乎吾見其怯也劉曰誠然贑州峒賤髦頭耳乃終日練兵若對大敵何其張皇哉相與大笑而罷龍岡反舍語予若此己夘二月也其年六月濠反子吉與儲附之七月陽明先生以兵討賊八月俘濠是時議者紛然曰是附濠而資以爲利者也或曰與劉期而中變賣友也或曰擒濠者伍吉安而攘爲功也予與龍岡竊嘆莫能辨比見詆先生者問之曰吾惡其言是而行非蓋其僞也龍岡舌尚在至京師見四方人士猶有爲前言者否乎盍以語予者語之以解其惑且告之曰其及時自修賢聖之業乎無若予之垂老而徒惻惻爲也尹道輿令太和序羅洪先道輿與余栖巖飲壑不相離者十餘年以親老就祿得蘇之崇明崇明在東海中數百里奔謁承稟諸部使必駕快舸乘風颿竟日始得艤岸海風歘忽無定東西趕蕩失尺寸檣傾舵敗往往不捄而其民以漁爲業出沒驚濤巨浸之中性不畏死衆寡不敵即彼此更相屠磔盡入其貲以歸不爲諱余同年進士有除其地者號哭連日走吏部以死自誓不敢往當道輿試令時巳得浦城爲有力者所奪易以是地道輿色不懼欣然就道有相吊者應之曰前吾而往後吾而來不知幾何人矣令崇明者獨余乎哉余方大觀於天地間浮海適得素願甚幸無慮在崇明二年風舸往來瀕於危者數四意卒不動爲之蠲徭省費實畝禁暴崇明之民戴若父母不敢爲盜負明府恩德邑嚙於海出其餘力將徙避之㑹以母憂去民泣追送有至家者行至浙而倭難作若有天幸起復如京師諸貴人聞崇明治狀各競爲鄉邑冀得之當道不能決乃補滇之太和諸貴人以爲恨詠歌以壯之太和去雲南且三十餘舍去中土萬里外言者憐其親老莫不嘖嘖道輿色不懼欣然就道歸而視其親尚徤雖違離無戚戚也余送之曰古之仕者不獨無擇於地與民而且以艱大困疲爲請者其意以爲吾之力足以勝之固未可以遜勞於人人之慮或未之及斯亦必且有待於巳使其地善而民淳人人可以卧治矣奚必我哉太和視崇明逺近有間矣吾聞大理爲滇名郡其山川竒詭實西南大觀太史公所欲騁望而不可得者其風謡俗尚視中土幾無辨其士人多雅秀而博碩其道路所經崇山深箐幽絶突兀之狀要皆可以解體劬而發性靈視驚濤巨浸汩沒之變未可同日語也子誠何懼且與子巖栖壑飲相期者何若將以天地爲一體萬物爲生機疾痛疴癢通乎天下而我擴然無所繫累其逺近險夷萬萬不侔者皆吾所當投足處也而又何辨乎吾知子以是養親之志而毋以口體爲也余且有炊臼之變既不能詠歌繼京師諸貴人後因叙所見與所語者俟政成併考之送蔣助教序歸有光全州蔣先生教崑山六年入爲國子助教崑山之學者四百餘人從兩先生祖道郭門外而請予爲文序之國家文治熙洽宇内萬里士無遐邇皆通明六學彬彬然出爲王國之用故先生來自嶺表司教圻甸今又進陟天子之成均以其教於一邑者推之天下可知矣古者十五入大學學先聖禮樂而知朝廷君臣之禮其有秀異者移鄉學於庠序庠序之秀異者移國學於少學諸侯嵗貢少學之異者於天子學於太學曰造士而後爵命焉今州縣之貢舉近古逓升之法矣而太學之官屬亦取郡邑博士之髙第夫豈亦因其意而爲之歟三代教養之制不可復詳而遺書之存者猶可以知其一二自宋之大儒以戴記所載大學篇爲古大學教人之法其説以古之明明德於天下者必始於格物致知誠意正心脩身齊家治國而後天下平其爲格致之論條理甚析而近世之説乃又有不然者夫學於太學而不知其所以爲教則所以爲治國平天下者果何道也天下之士方讙然以爭矣至以前之所爲説者以應有司之求而以其所自爲説者爲私門傳授之奥旨而有司者無與焉豈不誖於建學立官之意哉今世貢舉之格要以爲一定之説徒習其辭而巳茍求其意則六經聖人之言有非一人之説所能定者矣漢之儒者號爲專門至於大㑹異同紛紛務求其是而不主一偏故有石渠白虎之論是乃所以一道德而同風俗也天子憲天稽古數十年來郊丘宗廟明堂之禮多所裁定而車駕親御太學者再矣而予獨疑今之六館之條格猶牽於巽愞之議而月書季考非所以作成天下之人材以仰體天子所以崇化厲賢之意而徒得猥瑣流俗之徒習其辭者以應有司之格焉非所以興四方太平之原制禮作樂鎮撫四裔之具也予太學弟子也故於先生之行而私以質焉送張司訓序歸有光昔天下初定士之一材一藝咸思所以奮起樹立以自見於世而上之所甄别進退激揚風勵之者靡不至天下之小官其名常達於天子之庭朝而爲善夕以聞於朝而旌擢之命加焉夕而爲惡朝以聞於朝而誅削之令加焉故懷不肖之心者懼而不得逞有一命之寄者皆以自愛而不輕棄其身夫是以能鼔舞變化一世之人材而賢者恒自下僚崛起卓然爲天下之望蹋冗無能之徒終身沈淪而不敢有分外之思承平既久士無賢不肖率以資序交馳横騖布列天下之要位以行其恣雎之意竆閭之民愁苦籲告而扳援憑藉巧文覆䕶時得忠勤之褒至於仁人志士不幸偃蹇於卑服竭力以行其所志雖䝉其惠者交口贊頌上之人猶掩耳弗聞而獨以其意輕重於其間公論在於下而上弗知此有識之士所以淹鬱喪氣而長歎也夾江張先生司邑之教寛和樂易不設防畛而介然之操不爲勢利之所沮屈先生之愛士與士之愛先生不啻如家人父子邑之人自縉紳先生下至於市井童穉皆聞其賢乃者有同州之命莫不咨嗟嘆息爲之徧訪士大夫之遊宦長安者知其風土之不逮吾呉中而咸爲憂之以爲先生之賢宜得顯擢使出於格例之外顧復奔走於常調此所以不能不致恨於先生之去也夫天下之官上自公卿下至於州縣之吏其等級不知其幾而數之至於學官此豈有意知其可否而黜陟進退之者然則又烏能知吾邑人之情之如此也哉予爲弟子員事先生於學宫者四年見先生再遭子壻之喪孀女寡婦年老撫抱幼孫客居千里之外先生之官乂世之所謂竆苦寂寞而無聊者而處之裕如未嘗有愠色則區區較計於毫毛之間者非先生之情獨予與邑人之情不能自巳者如此也送童少瑜序歸有光越中人多往來吾呉中以粥書爲業異時童少瑜從其先人遊崑山尚少也數年前艤舟婁江余過之少瑜示余以其詩巳能過人今年復來吾友周維岳見余爲念其先人相與之舊謂少瑜旅泊蕭然恨無以䘏之者巳而少瑜以詩來益清俊可誦然少瑜依依於余有問學之意余尤念之嘗見元人題其所刻之書云自科舉廢而古書稍出余蓋深嘆其言夫今世進士之業滋盛士不復知有書矣以不讀書而爲學此子路之佞而孔子之所惡無怪乎其内不知修巳之道外不知臨人之術紛紛然日競於榮利以成流俗而天下常有之材之患也少瑜於書蓋厯能誦之余以是益竒少瑜夫典籍天下之神物也人日與之居其性靈必有能自開發者玉在山而草木潤淵生珠而崖不枯書之所聚當有如金寶之氣如卿雲輪囷覆䕶其上被其潤者不枯矣莊渠先生嘗爲余言廣東陳元誠少未嘗識字一日自感激取四子書終日拜之忽能識字以此知書之神也非書之能爲神也古人雖亡而其神者未嘗不存今人雖去古之遠而其神者未嘗不與之遇此書之所以可貴也雖然今之學者直以爲土梗己爾少瑜粥古之書然且幾於不自振今欲求古書之義吾懼其愈竆也嵗暮將往錫山寓舍還歸太未書以贈之送狄承式序歸有光予與狄君承式同舉於鄉試於禮部皆不第予以爲所以來應舉者期於得而巳不得即浩然以歸雖阨竆不恤也而承式獨以祿養爲急徘徊都下送予出崇文門外謂當得官浙中因約予遊錢塘西湖遠則在天台雁蕩之間欲爲東道主人然又數不果今年始得處之青田青田在萬山中足以與其徒讀書講道優游自適而浙東學者近嵗被陽明之教爲致良知之學承式爲人敦樸斂約不喜論説而中有自得者今爲人師不容黙黙而巳亦將出其所有以考論其同不同何如也浙東道學之盛蓋自宋之季世何文定公得黄勉齋之傳其後有王㑹之金吉甫許益之世稱爲婺之四先生益之弟子爲黄晉卿而宋景濂王子充皆出晉卿之門髙皇帝初定建康青田劉文成公實與景濂及麗水葉景淵龍泉章三益四人首先應聘而至當是時居禮賢館日與密議浙東儒者皆在蓋國家興禮樂定制度建學養士科舉之法壹出於宋儒其淵源之所自如此近嵗以來處之科第至闔郡不見一人或者遂目以爲深山荒絶之區而不知天地山川之氣時有蓄而不發者夫果實繁者不能碩大假令縣貢數十輩未可以爲得人以甌粤區區二百年有文成公爲帝者師不可謂之乏才也天下承平日久士大夫不知兵一旦邊圉有警束手無䇿徒望之勇猛强力之人如此則古所謂合射獻馘於學宫者何事耶文成以書生當方國珍起海上即毅然建𠞰滅之䇿佐舒穆嚕元帥擒殄山冦卒以保障鄉里挈全城以歸興王之運其文武大畧未可以一鄉一國之士槩之也承式入公之鄉覽其山川而與其子弟遊能無慨然有感矣乎夫山川之氣積二百年未有不發者况以先王之道六經孔孟之語訓迪之將見括蒼之士必有文武忠孝出而爲國家之用者矣送程龍峯罷歸序王慎中嘉靖二十三年制當黜陟天下百司庶職報罷者凡若干人而吾泉州儒學教授程君龍峯名在有疾之籍當致其事以去程君在學方修廢起墜蒐遺網失以興學成材爲任早作晏休不少惰怠耳聰目明智長力給非獨其精爽有餘意氣未衰至於耳目之所營注手足之所蹈持該涉器數而周旋儀等纎煩勞憊莫不究殫勝舉不知司枋者奚所攷而名其爲疾也黜陟之典固將論賢不肖以馭廢置人之有疾與否則有命焉賢不肖之論非可借此以爲㫁也况於名其爲疾者乃非疾乎人之賢不肖藏於心術効於治行其隠㣲難見而形似易惑故其論常至於失實非若有疾與否可以形決而體定也今所謂疾者其失若此則於賢不肖之論又可知矣此余所以深有感也又有異焉古者憲老而不乞言師也者所事也非事人也所謂以道得民者是也責其筋力之强束課其骸骨之武健是所以待猥局冗司之末也古之事師者其飲食於飯患其噎於胾患其哽而祝之也其居處於坐則有几於行則有杖皆所以事師而修其輔羸攝疴之具未聞以疾而罷之也古之道其不可行於今乎程君之僚與其所教諸生皆恨程君之去謂其非疾也余故論今之失而及古之誼使知程君雖誠有疾亦不可使去也君去矣斂其所學以教鄉之子弟徜徉山水之間步履輕翔放飯決肉矍鑠自喜客儻有訝而問者君胡無疾也聊應之曰昔者疾而今愈矣不亦可乎送俞志輔序王慎中生當封萬戶侯死當以革裹尸此古之英雄貪功殉節者所爲慷慨而自許也其生以封侯爲悦不惜一死以求侯既得侯矣乂烏能死哉狗馬實於外廏玉帛羨於内府子女聲色之美充於下陳耳目之好既以給矣口體之養既以備矣患日之不足而巳又烏能死哉非獨然也其始所爲犯難而忘死者志固不在死而在侯也然而有死者矣所謂以此始終者其事有所不免而豈其所自許者然哉慷慨之士不絶於世矜奮而自許吾將何以信之曰其事有在乎犯難而志不存於侯者吾將以是而信之矣自國家以武舉求天下之虎臣幾百年而吾泉州未有應者吾友俞君志輔始奮然而出以百戶中其科居常作止動息與兵爲徒擊劎馳槊適於持棰之嬉關弓舍矢狎於投礫之娯擐甲戴胄而踞鞍馬若袵枕席而便紈綺也其爲千戶於金門爲守備都指揮於汀漳所至與士卒同甘苦爨無精稻厨無庋肉而營伍之井庾竈必善具拊循勞勉人人必至惟恐傷之其誠心惻怛發於中而周於外不徒色之仁詞之厚而己予見其所爲嘗駁之曰所謂大將者視方畧計數如何烏在自操凶器與卒伍爭技而較勇則是身不勝衣射不穿札者不得將上軍而冠征南歟號令明而嚴威致則市召烏合之夫可使前死必人人得其心而後與之蹈白刃彼行厨棄梁肉而士有饑色者非漢之名將哉君所以復予則謂凡吾所爲必始于盡巳不習其事而茍據其權不得其心而欲用其力吾以爲於己不盡故不爲也今使方畧計數明矣而且習兵事號令威嚴振矣而又得士心不尤爲兼備而無患哉且古之不夙習兵而堪將不素養士而立勲者推轂而出鑿凶門而前行其權得以斬艾磔裂人而無所制于法故能以威使衆而可以有功今將無殺人之權而制之益多吾又將率之而與之共死茍爲不素畜其心則有渙然而走耳士誠與我而自不習其事悍然率而爲之先是委虎以肉也吾雖不愛死乃當以不習兵死哉以其所言考其所爲豈果以狗馬玉帛聲色子女干其志耶吾信君之能死也以此今僨軍亡將之釁屢見於邊上方聞皷􅎏而思將帥行且召君必不愛髙爵以酬立功之臣君既習兵而素拊士所向宜無不成功君固當侯而無所致其死吾之說將不驗吾誠信君而人將不信吾之言人固不吾信而吾尤自信其信之也不妄于君之爲僉書都指揮於廣衆也序以爲贈送陳百戶序王慎中善騎者不忘馳善射者不忘彀彼其體習於衘轡玦彇之具而心悦乎罄控縱送之能使其約束委頓於衢巷里門曲囏而跼蹐不出一室目竆於前堵而足極乎四隅越月踰時而不得一逞則倜然而不樂故見平岡峻坂則思介馬而驟見廣場易圃則思決拾而起有其技者固喜利其用也勇敢武毅之士矜鬬樂戰按劍而語喜難而幸危聽皷􅎏而意奮撫介胄而色厲居閒無事常有死封疆之心今將使之酣豢於甕盎盆牢之間據妻抱子以老而溘然盡一息於牀簀之上宜其有所不樂也泉州衛百戶陳君經綸毅然有勇武人也百戶固小校而泉州又内地君雖矜鬬樂戰而無所用其勇一日以事至都下自言於兵部乞𨽻兩廣軍門爲贊畫官軍門所轄五營巖峒牙踞蠻徭雜種之所蕃育人質而獸知挻挺呼嘯所在而有無日不用則君之好勇而得𨽻於此此亦騎者之平原峻坂射者之廣場易圃也有嫺習之技而得便利之地心動於皷􅎏之讙氣盈於介胄之肅何其壯也然亦可謂樂矣君爲此乞固死是求計反顧而慮還踵豈君所以求往之志哉然今司馬中丞張淨峯公實爲兩廣總制吾聞張公在鎮經文緯武以仁義行師既以擇其大憝巨酋之不可化服者蒐薙而誅斬之其可以化服者皆以人畜之不絶以獸雍容尊俎而偃戈休甲訖威聲於四遐君誠矜鬬樂戰而冦發益稀兵不輙出雖時有所用其勇而巳不愜其矜樂之志矣張公於用兵每以律授將佐不得越教誡違期約妄有所事常節其黷而養其鋭不以竆武力爲功用能軍無躁敗賊無濫殺君誠好勇且有所用之亦且善勝而完歸又安所得死矣君於此毋乃有不樂哉夫所爲寢食不忘死者壯士之志也將死之求求死而不得則爲之不樂毋乃過於壯而茍以蹈一夫之勇歟予既壯君往得其地而又幸其所事之得人勇有所用而死之無所也爲序以送之無使其過於壯而有所不樂也送沈青門序王慎中詩人之不偶者有性靈觸發之能而無物役拘糾之害此天民之佚樂者矣其視富貴之人宜如檻狙牢豕閔然於中而不足近名器寵數俗所謂尊華者皆瓦礫塗炭瑣屑而朽穢也然予觀唐世詩人不偶者顧不以謁顯者爲戒呈巻投軸左睨右矚幾幸一遇如秦關燕壁游説之客結軫馳叩朝失於此而暮冀乎彼皇皇然者有所迫而不得休吾未見其能樂也其時公卿得以薦士節鎮得以辟官故不偶之詩人雖失意於場屋而多僥倖於薦辟斯人也之與顯者遊因其詞藝矜美相爲標致而藉援恃力之圖爲不淺矣彼顯者皆亦才學詞章名一時其吟詠風格非出不偶者下也顧能不愛屈巳以成不偶者之名如張燕公之於孟浩然賀監之於李白栁子厚之於符載杜牧之於張仲吉殆不可勝舉以斯論之唐世語今淪落江湖者未可爲貴而諸顯者能成人之名其道有足尚矣近世風騷將絶江湖之上有能爲詩歌視唐世難得何啻千百而一二也而士大夫取髙資都盛位蓋有不能爲詩若以顯者所少在此而江湖之士難得又如彼相求之跡固當在此而不當在彼矣且此之與彼游也無薦引之門無辟用之途彼亦無所藉恃於此而倡和往反之間果相矜于藝而非有皇皇之奠矣江湖淪落之人誠可大貴於今之時而士大夫往往不知所以成其名以自附于唐之顯者豈不過哉錢塘青門山人沈仕江湖之能詩者自壯而强行游四方多與富貴之人游其能屈巳以成青門之名宜必有之吾未之及知而知青門無所藉恃於諸顯者以其來遊閩中之跡推見之也青門入閩枲袍布衾從一僮黧面而㣲跛踽踽然憊也唐之以詩謁顯者一見則欲廢其半餉之享輟其一姬之貲如執劵責負傲然必得何至如青門之憊也予用是知今之顯者之所以遇江湖淪落之人矣予閒居寂寞絶意當世好事之徒顧辱青門枉與之游予之不能有益於青門可知矣獨不難屈巳以爲之重而又非有文章之名也雖俯躬匍匐胡能増昻青門之錙銖爲青門計當且改圖庶幾有遇也青門顧謂余曰斯行遇公歸亦將終隠矣不復有望於餘人也斯言其爲謾耶其非謾也則青門之踽踽南行而竆宜矣古有得人一雙之璧百鎰之金盼若毫毛惟以一言知之爲重此豪士佳公子之所爲非所以施之今也青門行四方受雙璧百鎰于人宜不少矣今乃持嶺外迂廢無用之人一紙之序以歸曰可以終隠巳青門雖自不爲謾世其不有以爲謾者乎是可笑也送林龍湖序王慎中事不得乎其職實不愜乎其名君子愧諸終日處乎其所愧而不怍於心非其懵然悍然安行而强拒也未嘗以其職者恊其事以其名者隠其實事常匿於其職實常遁於其名誠以爲足以據其職而無不效之恐都其名而無不符之憂則何愧之有如是者世之君子筮仕入官者之通患而吾以爲尤甚者學官也學官之名師也其職教人者也學之不知道德之不立冒焉而處之者皆是也問其官之名師也問其職教人也問其人則學之不知道德之不立也直冒焉處之而己方且偃然當之以爲彼無所不足於是官也方且茍然就之以爲彼猶有所不屑於是官也吾將舉其職而稽之循其名而責之使修其事而後得居其職充其實而後得有其名彼且瞿然四顧惕然内歉走避之不暇而敢以偃然茍然乎哉嗚呼事實之不著而名與職不足以愧夫處之者之心於是今之學官始爲士之困於進而倦於學者偃休之蘧廬其置其廢殆無損益於得失之數而不爲世之冗員猥品蓋無幾矣人材之不得成世道之不得隆其不以此哉以予所感於世如此茍有不愧之君子出乎其間雖不及見猶將聞而慕之况於得友其人相遊之歡而相講之篤哉今龍湖林先生是也先生學乎孔子孟子之學其道既明其德既成如是而爲人師吾信其無愧矣人材之成世道之隆蓋深有冀於先生而先生其亦嘗以自覈耶士之講於學者鮮通乎道而成其德者未有聞也豈其職分而不專其於事之修猶有不副乎其意哉然則先生之於是官充其實以有其名則可以無愧而修其事以居其職亦不能以無憾焉今去而爲河池其職專矣有先生之實而又得修其事人材之成而世道之隆其必自河池始而諸生之事先生者方且悵然其師之去悼前日之怠而作其今日之勇先生之講猶存則於明道成德不爲無助不必在先生之側而先生其終可以無憾乎故余爲諸生述其意以贈先生併以爲諸生告云送求春尹謝夢麟序王慎中仕於州縣守職而以功獲罪愛身而以理受惡者蓋有其故矣磽磽皎皎好爲危激震耀以鬻長伐異而見謂難能立鵠以來射建鼓而招擊上之人不忍其下而必於勝之故其磽磽皎皎以自見者乃所以自敗而貽缺汙也其不然則不幸處非其地膄邑名區蕃阜麗都物産之富被服謡俗人所愛悦足以起誅責而召徴求上意之不副亦所以賈禍仕之患此者而欲以功見賞以理得譽蓋亦難矣謝君夢麟爲永春所謂守職愛身者也而以劾罷去君謹畏醇深言若不出口内自修敕絶不爲表飾峭露以不堪其上永春又僻陋儉偪據羣山之中虎豹之虞瘴厲之毒非有珍物竒産有他侈羨以揺撼人耳目而君乃用以得劾嗟乎仕者欲以功名理行尊其身以發其志亦河所望而勸以効於斯時乎君肅然邸舍無妻子之奉脫粟之飯芑藿之羮人不堪其寡約而君甚安之方聞報罷束書冊褚衣裘不滿四五篋蒼頭奴兩人踽踽然行如羈人竆旅見者不知其爲宦歸也君行乃因友人謁予曰某罷去甚恨如得先生一言雖去不恨矣嗟乎在勢處顯之人力足以變置白黒當時所倚以決賢不肖爲吏者之所輻輳奔走而求之幾幸一語之得先以爲榮辱君既無求於彼而乃有意於予文豈以予言爲足以重君哉昔之廉士仁人苦思勤行坎坷淪躓竆於一時而因君子之言以白於世蓋多有之此豈余任而何足以副君之所勉哉毋亦以其戅愚孤特觸忤權近以取廢棄有與君類者遂以好其人而思得其言耶世之所趨在勢處顯之人君顧好愚戅孤特枯槁離羣之道喜其無用之空言趨舍好惡傎悖如此用是以得罷亦其宜也雖然信於巳者不茍同於俗得於内者無所待於外君之趨舍好惡其亦有以獨得而自信也夫則余言又何能爲君重哉平涼令李侯入覲序浚谷吾邑當西陸孔道雜以藩府監司監牧之奉不一而足故爲令不專於爲民民力不專於奉公役故今天下之民皆病而吾邑爲尤病令治視它方爲獨難自嘉靖甲午至戊申隕霜皆殺禾菽真定李侯之來宰吾邑也適丁其㑹故尤爲難侯上事諸司旁待彊禦下率疲民至巳酉秋迺大登羸疲者漸蘇棼督者就緒憲司以侯爲才聞諸朝廷亦嘉吾邑之無冦菑許侯入朝覲文學諸生爲侯交慶請余言以送其行夫余哀斯民之竆爲之求援於上者衆且屢矣然卒無以一指擘畫焉者豈仁人之用獨匱於今哉蓋以所任或非其人而其人或非所任今以侯之身犯其難而其才又足以當所任則夫余之所賴以仁斯民而力爲之求援者舎侯其孰語之大凡平涼之剥民者至衆而利民之途盡窒侯悉之熟矣䇿之審矣其無可爲也昭矣是宜捐之以爲荒塞以投狐兎可也顧每嵗勞遣承明之臣執憲之使賢士大夫轍環魚貫以爲傳舍何哉侯之擁箒奉䇿擎拳曲跽以事之顧亦曰天子之土地府庫在焉人民社稷在焉茍凡天子之命臣皆得以曲庇而主持之吾將以求哀斯民耳今土地且盡矣府庫竭焉人民十不存一壇墠爲人圃無祀所果孰與庇而孰與爲邑乎以侯之才宜無所不能爲顧其勢力大於侯侯無奈之何而力能爲之所者又坐視弗問然則民之窮其殆盡乎井邑之荒殘其將墟乎束手而待之有日矣兹將以覲於明天子賜清問於丹墀侯得以借籌而對焉斯民庶幾尚與受仁人之賜哉余日望之送易教諭序趙時春吏職莫重乎教養士志莫尚乎進退吏知養非難知教爲難士知進非難知退爲難也平涼之民其獲乎養也㣲矣况於教乎明聖不鄙陋其邦選士造學一視名都鉅邑然不肖者不克教賢者教又不克施職當引義以決去雖然士之能以義決進退者幾人哉吾家居二十年僅得三人焉曰藩府長史新野喬君木當是時縉紳尚重風教其王又賢吾為之申其説藩府以戒羣不逞耳又十有八年才得一人焉曰審理齊肥雷君楷其爭於職也甚烈其見稱於下也甚備而見憎於上也特至吾於是不避仇訕引義以大其説欲使巨蠧朋淫稍知宇宙間有終不可冺㓕之民彞庶幾赧沮而世之英哲有所嗣以憤發此吾之志也又一年而重得一人焉曰平涼儒學教諭成都易君書其人雅素無所獲戾於上而獨念其職終不可行遂先幾引去尤爲從容合義嗚呼若三君子者之官皆非尊顯而其去於時爲輕吾何以獨違世之所尚而私有取於三君子哉顧吏無大小均以教養爲職士之有志於義者其進其退又不當以崇卑得失爲増損設不能盡職於其小又安能有爲於其大不能勇退於卑官又安知其不媕娿茍合以求膴仕而謀利乎士而謀利其將無所不至矣使士俗至於無所不至則吾民其孰與保乎悲夫此所以道殣富於田里而王人轉爲私𨽻也矧責其養與教哉故吾深有感於能退之士而於易君之歸也特表其名以大之不復諱送應太僕詩序趙時春嘉靖丁亥冬余自秘館除刑曹郎於時同年進士之試政於三法司及己任御史郎官評事者六十有餘人入則接席講議出則連鑣繼武誾誾偘偘咸輳其理衣冠俊乂時稱盛焉而浙之遂昌儆菴應君獨有偉望於其間又按勲將之侵盜官物者迺往年受流賊金縱之渡河鞠成貫死其狀載後鍳錄中者也時與郭勛姻家欲仍以勢反噬法官君獨先倡與余繼按之御史梁君祖容又按之三法司覆廷按之司刑給事趙君信臣又廷劾之而獄始具二年余罷去應君名益振法亦有大典非君莫可治劇郡要地衆望必屬君故自郎中守濟南守常州雖忤要人意下遷寶慶守卒得督學湖廣督牧關西而復與余合首尾幾二十年余以閒廢久盡忘官式品儀所習皆耕稼野態其勢難處縉紳中而君獨以故舊見收其汙行常見恕其迂言爲可取時復逍遥巾屨於崆峒涇水之間銜杯酒道故事爲樂亦往往賦詩唱和顧君見二毛而余亦雙髭白矣更摘示大笑未數月君當賀九廟時嘉靖丙午春初也余爲五言四章有餘悲焉幸其僚有代行者復得半嵗居而君又當恭賀聖節矣復爲七言三章其辭稍平而意亦舒蓋幸其情巳伸於朋友而義更盡於君臣也雜以讌遊之詩凡十五章著其合并之樂也巻獨余爲之而他人不與焉見君之不妄交而余之寡諧乃見取於君也他日君政暇時取而觀巻余亦諷咏舊編如見面焉自有宇宙則有賢聖英豪身生間代心符同時獨以紙上數言耳余以此納交於古人多矣後之人其亦有以是而納交於余者乎况與君同年同朝而又再接於鄉視余之有得於前後之人者獨加厚焉而又貽此鄙言可以永交談於巻冊之中固不必再識面而相得亦既多矣况余未老而君方大用疆圉戎馬之際安知不庶幾其不再見乎敬識之以俟而虛其左右送方太僕致仕序趙時春余自山西督軍罷歸之春同年進士三桐方君亦以前御史守泉府久次稍遷行太僕少卿至平涼蓋自丙戌至是凡二十有九載君以廉靖惇德當世横流固非所好而部符久不至迺有論君稽緩者君遂請老得允厥友某請余言以贈之行夫世變之相激久矣從而靡者命曰時人未得爲君子也舉世以爲是焉而質諸道非是也君子從其非是者舉世以爲非焉而質諸道乃是也君子從其爲是者夫道亦有時有君子則君子惡乎從曰君子從其允於人情而恊於天理者時汶汶焉唯欲是嗜情棼棼焉唯勢是狥則君子惡乎從曰君子從天天不可知也人又悖之度其久而有定者從之則天可得而知矣天惡乎定乎曰定諸無欲天唯無欲故能久人唯多欲其勢暫相合而終相軋也富與貴之交迸也權與利之相競也詐與術之相病也榮辱生死之迭横也故曰終不可久而胡寧有定時之無定久矣羣操敗舸逆風浪以奪驪龍之珠淩蛟鱷之淵取蝦鮞以恣饕餮而不憂其偃檣覆舟也君子以其昭昭而䝉昏昏以其欵欵而辱嗃嗃君子之不合於時固也遊神於無物之墟宅身於至正之鄉腐臭横逆之區君子不斯須處也欲固無如君子何矣而時亦且奈何方君其有意於是乎余將與君厯首陽濯潁水陟箕山釣嚴瀨挹往哲之髙芬以抗斯世於軒堯虞周之匹以尊吾君而振頽風顧瞻叔季羿浞操莽殞元朽骨之墟䀌然憫悼與滌之以清流煦之以和風使其遊魂清漠中慚内悔變化於元凱十亂之徒豈非久而有定之道與君辴然而笑曰吾往矣遂輯其詞以置諸行李明文海巻二百九十三
