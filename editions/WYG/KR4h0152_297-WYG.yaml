body:
  text: 明文海巻二百九十七餘姚黄宗羲編序八十八雜序上饒張孟循行巻趙東山昔者吴公子札使魯觀於周南召南以及雅頌其徳之大小治之盛衰與夫憂勤怨思之情莫不如親見之至孔子教其弟子亦以誦詩雖多而不能從政専對為無益詩道與政通固如是乎盖嘗聞之古之為詩者辭與聲皆出於其情夫人情者禮樂之原而治道所從出也士將學為卿大夫以任天下國家之事交四方之政則必盡人情以通於禮樂詩三百篇雖異時殊事發於人情之天則一而己後世為詩者辭與聲既非出於其情則固不通於禮樂而無闗乎治忽君子乂奚取焉雖然時有古今道有汙隆而人情則無以相逺大風作於漢而河汾王子知其霸心之存石壕新安作於唐而魏國韓公有感於兵制之失夫豈皆不出於情而二公所言若是士不以三代卿大夫自期無事於四方而學不足以盡人之情則後世之詩雖有合於古者亦鮮或能通其意焉爾若張侯孟循父之言詩其有志於古者乎侯上饒之選也癸夘之春自旴江來新安為其使君左轄公結同姓之好于總制王公王公所以深敬乎左轄者不於其幣而於其使禮成將返則命郡中士咸賦詩以餞之又出其在鎮所得詩文以觀之侯於星溪之篇盖有取焉既為詩一章題其後復手書之以寄予海寕山中予寢疾累年舊學都忘因三復孟循父所賦而竊有感焉夫盡人情達事變明乎得失之迹本其廢興之由此詩道所以與政通盖古卿大夫之學也而孟循父得之其卒成二公之好而以佳賓見重於主人冝矣乃即其詩辭所及推本季子之賢孔門之教暨近世名公鉅人髙識逺度以廣夫言外之㫖焉嗟夫吾聞國風止於澤陂盖春秋之季也今四方多故雅道陵遲有偉人焉上下古今究觀真濫以其法於人情之天者振而起之其文運復昌之候與吾於張侯有望矣跋黄侍講送鄭仲舒序蘇伯衡右侍講黄公送鄭仲舒還朝序前本乃公門人今翰林應奉傅藻所録公親改定凡二十八字後本則公之親筆與録本多不同盖初草也伯衡前九年觀於南京仲舒至自北平兵革之餘以僅存為幸今再觀於麟溪之上則裝潢成巻矣竊聞公平生為文改處輒塗以濃墨既脱稿即以齒練之糜爛乃巳巳必投諸水雖子姪弗使見之今顧於仲舒面加改定且併初草遺之此其相知之深相與之無間為何如則其期望之逺且大尚何怪哉公為此文時年已七十有七孟子所謂達尊盖兼之矣而不自滿假臨文詳審作字端謹詩曰雖無老成人尚有典刑其斯之謂歟初學小子衒耀材能稠廣之中肆筆疾書略不檢㸃亦可少愧哉仲舒官成名立足以當公之厚望君子類能言之伯衡獨表此以為世法戒且以自警云跋陳子上書蘇伯衡嗚呼重其身愛其妻子不能忘其墳墓去其鄉里人之情也而至違鄉里捐墳墓棄妻子而置身於艱險之地則以所重者甚於身所愛者甚於妻子所不可忘者甚於墳墓所不可去者甚於鄉里也身非不重也而有重於身者焉妻子非不愛也而有愛於妻子者焉墳墓非能忘也而有不可忘於墳墓者焉鄉里非能去也而有不可去於鄉里者焉夫安得不舍彼而取此哉然非識輕重之人亦烏乎能之吾讀陳子上貽謝復元書未嘗不歎其於輕重也明於取舍也審而又悲其適丁斯時也使子上不丁乎斯時則固重其所重愛其所愛不忘其所不能忘不去其所不可去若尋常矣於戲子上何其不幸也耶子上余友也同薦於鄉同試於禮部後再一見於四明而遂永訣矣曩在京師從掲兵部伯防得其所著子上埋銘讀之而髙其行而偉其志今讀此二書愈益信其行之髙其志之偉雖去之二十年餘而生氣猶凜凜焉於戲子上真賢乎哉錢用壬傅子敬趙時泰唐元嘉皆子上同年進士也彼惟重所重而不重其所不可不重愛所愛而不愛其所不可愛不忘所不能忘而忘其所不可忘不去所不能去而去其所不可去卒之身首異處妻子戮辱墳墓無主而為鄉里羞然則子上之不幸固未若彼四人之不幸也子上雖客死山東然喪𦵏以禮墳墓妻子皆無恙而鄉里與有榮耀然則子上豈真不幸也耶甚矣輕重之當明而取舍之當審也雖然向㣲復元子上安能决去而其墳墓妻子亦安能保全是故子上之遂其去志而墳墓妻子之獲保無他虞者以復元能委曲調䕶之也於戲復元真子上友哉復元亦賢矣哉羣書百考跋尾蘇伯衡余自兒童時從長者遊竊聞其道宋乾淳間義烏有杏溪先生於天文地理明堂封建井田兵制律厯三類靡不窮究根穴訂其譌謬資取博而參考精事為一圖累至於百號曰羣書百考説齋唐公聞其升陑分陜之説以為職方輿地盡在其腹中大愚吕公閲其禹貢考以為是書集先儒之大成夫以唐公之該洽吕公之精詳其推敬先生如此則先生之書豈徒事空言以為著述者比哉思一見之垂三十年而不可得未嘗不以為憾也比邂逅先生諸孫桴而叩焉則散落久矣獨十二五僅存焉耳因出以相示始得見之少償夙願又未嘗不以為幸也益將求其全書而卒業焉於戲道與器曷嘗相離哉經制之所在精義之所在也先生寤寐先王於數千百載之上疲思耗精於斷編殘簡之中明絶學之指歸示一王之凖則可謂至矣而學者方玩思空言髙談性命顧以是為近者小者而弗知甚貴可不悲哉則夫去之未二百年而將遂冺墜無傳豈曰勞而少功云乎亦曰世好酸醎之異嗜切近之意㣲誇誕之氣勝云耳且三代之制度托之簡編以傳者其存㡬何朝廷垂意稽古卒然有所訪問往往無以應吾見亦多矣而是書也可措於實用有禆於治道冺墜者既如彼其僅存者亦終莫之講何哉况今無板本則後余而生者將不止不見其全而巳此余不惟幸於得見而乂撫巻為之慨且懼焉書清晏閣讌記後蘇伯衡洪武庚戌秋髙麗國王遣其陪臣刑部侍郎金柱來朝獻柱頗知文墨折節從朝之名公遊間出此記以相示自言其八世祖縁所作也以其時考之實宋重和之七年時淵聖在御日久狃於晏安荒於盤樂嘗讌宰輔蔡京王黼等於宣和殿而京作曲宴記流傳四方以為盛美是以髙麗聞而慕之清晏有讌而縁為之記也則知上行下效其㨗如此况中國之為君臣者以道徳仁義化成天下表儀萬方則遐方之觀感慕效又當何如哉且蠻夷僻陋之邦而其文學侍從之臣紀事陳義之善有若縁者代之詞臣盖不能無愧焉而有宋文治之懿作養之盛人材之衆言語之工無内外逺近之間於此亦可以見矣是以録之環秀樓序朱升秀悉救切説文禾實也從禾乃聲證以夫子之言秀在苗後在實之前則非禾實先儒以為吐華詩毛氏傳荼茅秀也或謂茅秀於茅華非也茅之未華方自苞而出者柔輭潤澤其名為荑荑荼聲相近若其既華則蓬蓬然詩人不當取以為比矣以此而意之則禾之秀亦其將華者也爾雅木謂之華草謂之榮不榮而實者謂之秀後人以秀為草木茂美之通稱故歐陽稱嘉禾曰秀東坡稱花竹曰秀俯察之書以秀言山始於赤松述論以秀言水始於管公明指䝉是後山經地志因之登髙之賦臨流之詩言秀者不可勝舉王制命鄉論士之秀者升之司徒曰選士司徒論選士之秀者升之學曰俊士漢始舉秀才東漢避世祖諱曰茂才魏晉以來復曰秀才至唐中葉秀才科目甚髙而難得無敢應者漢謡有曰天下俊秀王叔茂晉羅含為江左之秀謝道韞為閨房之秀宋袁淑謝莊江東無我卿當獨秀以秀言人始於夫子人者五行之秀氣極於周子人也者得其秀而最靈新安巖鎮方公搆樓生墳之側顔曰環秀想是樓也近則環之以竹樹之秀逺則環之以山水之秀而人之秀者游居其中也游居其中者主也環其外者賓也有是主斯有是賓也方公字聖清清秀之義也其女夫孫仁逺秀人也裒諸秀句積成巻軸請朱升秀才為之序跋西臺慟哭記後劉崧方文丞相海上被執時吾郡有王鼎翁者丞相同舍生也即為文生祭丞相復手書數十通遣人掲之通衢館舍以俟丞相過而見之以自决及聞死燕市也則乂為酹文一通為位北望哭而祭之若幸丞相之得死者夫丞相之所以自處固有不待於人言而仁人用心若鼎翁者亦何厚哉後有張毅翁者丞相門下客也始與十義士者從丞相赴燕及丞相死翁以百金贖丞相首骨徒步七千里負而完𦵏焉一日過梅溪曽氏與劉惟吉顔省身及先祖實存府君四人者是夕㑹於見山堂在梅溪上距丞相宅一舍許曽為丞相外家而堂名見山者寓思丞相也是夕舉酒三酹翁自賦摸魚兒一闋三人同聲和之有千年華表㑹有鶴歸來之句每歌一再輒聲淚俱下至嗚咽不自勝則相與掩袂罷去其詞至今可考惜新傳未及載而世亦鮮有知之者今觀張孟兼所注釋謝翺臯羽西臺慟哭記及冬青樹引然後知與鼎翁之生死祭文毅翁之摸魚兒盖彼此同一情而先後同一聲也因記所聞二事於先祖者附於巻末使知當時忠義之士最多其感激憤惋於荒閒寂寞之濱者不止臯羽一人而巳也臺江夜汎詩文後序王褒昔司馬子長登龍門探禹穴徘徊江淮之上而文氣振發蘇子瞻望泰山騁黄河揖讓京畿之内而文思宏博此覽形勝訪陳迹俯仰上下古今豪傑之士所同也而世之人矻矻勢利役役聲色坐為得意咸目此以為迂噫局量褊狹思慮汙濁其有識於斯哉洪武辛未之冬鳳陽王公子守正客於閩艤舟城下閩郡鄭孟宣廬陵胡光大過之遂脱裘命酒共載舟中於時霜降木脱月出水生㳂洄螺女之渚顧瞻粤王之基餉屈原酹伍胥揖彭蠡酒酣擊節寒風北來索筆摛文分題賦詩章就而寐明日袖所作走以示余余披誦四三猶入大藏登武庫雖寳玉器物滿前而隋之珠卞之璧兊之戈和之弓終玩不厭公子且徴序其後夫蘇與司馬所厯者逺而所見者大故泄於文者振發而宏博執是唱和其有得於古人之所得而世之所謂得者烏可齒哉書以繼之能無形穢之覺跋劉府君墓碣後方孝孺李元賓文學在當時最為韓退之所推而退之銘其墓不過百餘言稱其美者不過十言然非元賓莫能當也古人之文要而不煩也如此近世銘墓者為言多至數千少亦不減數百否則求者怫然有不滿之色是豈特文之不逮古哉習俗之弊也久矣吾友劉君剛養浩請銘其父處士之墓於太史公公為之銘辭約義該得退之之意盖欲矯積弊而復諸古也養浩學古而攻其辭故公以古道處之由是而求處士之為人其亦古之所謂善士夫題韓復陽墓銘後方孝孺爵位所以取尊於當世而非取信後世之具也達官顯人苟無足傳則聲與身泯隱約之士道術文學誠過乎人人其居雖困而其所有昭乎若日月之掲夫孰能掩之世俗不能察託傳世之任者不於其道而於其位親沒而圖銘墓之文往往於位號華顯者求之甚者或假辭於文士而寓名於公卿豈知古之傳世者固不以禄位而重哉其陋也甚矣金華胡翰先生異時常以一布衣入史館出為衢府教授退處田里以終士之貧困無出其上者然其操履髙介文章雅馴當世之士多自謂不能及之先生既不妄稱譽而世俗亦鮮知其文故四方得其文者為最寡吴郡韓君奕示余以先生所作先府君墓銘盛有所推許於知愛先生之文可知奕之異乎衆人於先生亟與之言可信其先君果奇士也余年二十一見先生於金華先生不余賤待以國士與語連日夜不休今亡矣思重見而弗可得讀其文如接其聲容因書巻末以授韓氏使世俗知韓氏之求先生之不拒皆古道也題靈隱寺碑後方孝孺天地間至堅固者莫如金玉木石脆薄者莫如簡筆縑紙礲石攻木範金坏土以成室其成也難其傳也宜其可久操筆書紙率然而成文非假金石以刻之宜其易毁滅也然而世之為堅固之具者常托其傳於易毁之物則豈不以其所托之人為足恃耶錢唐佛寺最鉅麗者曰靈隱當元皇慶壬子嘗改而新作之距今洪武癸酉僅越八十二春秋求其一榱一瓦皆巳毁燎無遺而金華石塘胡公及吴興趙文敏公所撰而書之文述寺之創始與其山水之勝棟宇之麗僅盈尺之紙耳誦而觀之當時之事猶儼乎如在則夫天下之可恃以求久者果安屬哉亦可以慨然而有感矣石塘在元位最不顯而行最篤文最奇趙公名最髙每得其文必欣然為之書於是又可見茍有足恃固不以外物為重輕而二公之過乎人必有出乎文辭翰墨之外者而世之尊二公者方拘拘然求之於此而不知求之於彼不亦重可感哉翰林脩撰練君子寧以此巻示余子寧多學而甚文必以余言為然明文海巻二百九十七
