body:
  text: 明文海巻二百九十八餘姚黄宗羲編序八十九雜序題項明軒先生筆後林右予聞諸父老云當宋亡之時其民不忍歸元村落間皆結壘自戰守至力盡闔門就死不辭及易衣冠相顧涕泣其老者至於負固終身不肯易去嗚呼何宋徳入人之深如此哉嘗考之自三代以後享國家久者曰漢曰唐曰宋然漢唐之亡也其君皆得罪於天下故奸臣悍將因時而取之取之之際民亦安然其覆下不知先孰為漢孰為唐也如宋之諸君皆仁義人也不幸廹於强敵一旦而亡天下之民有如赤子之去慈母戀戀恩養之深如之何其可忘也以民之不忘宋如此則當時受其禄者可知矣㑹稽明軒項先生嘗仕宋為鄆州參軍當元丞相巴延駐兵金陵先生與御史賈餘慶同奉使至兵前視巴延直辭不少慴及宋垂亡聞文丞相斬闗出戰恨不得與之同死噫使先生得秉國大柄當必有所建如天不祚宋則其死節豈文丞相之後哉惟位不滿徳姑處山澤故因之以恨死不瞑目矣先生之孫復今以進士起家仕列侍從將致通顯此亦忠孝家之報耶題雪夜清興倡和後楊士奇右永樂七年正月胡文穆公雪夜見過倡和之詩是年二月公扈從太宗皇帝巡守北京予侍仁宗皇帝監國時善畫者皆詣北京公言至北京必作一圖附録二詩以示後人公既至北京屬時職務繁不果作及南還又皆縻職務既久遂不復在念憶公嘗語予術者言同官中吾兩人將老得退果若其言即各具小舟可二童操者舟中貯書册楮筆壺觴棋局如廣訪君艤舟君門外一里所遣童子招君君徑入舟同沂流至五雲驛望夫容峯則返櫂及君入舟處君獨歸廣不過君竟去君訪廣亦然但㳂流至玉峽而返嵗必五六過訪用此共適餘年他日又語予曰吾兩人情義實兄弟後死則銘予諾之顧時亦謾言耳豈謂公溘先予沒也公沒後半嵗餘夜夢偕公泛舟自快閣至郡城下同載甚樂共聮詩公起首句僕續第二第三公續第四第五僕又續第六第七八終結句既覺而忘第五至第七三句余悲愴不勝遂補之詩曰金螺瀟灑對夫容鷺渚魚洲窈窕通逺樹白雲秋色净故人清興酒船同河山夢冷謳吟後生死交深感慨中猶想勝縁如夙昔並騎黄鶴過江東則乂思具舟過訪之約皆夢中語也空餘後死亦何樂哉盖公沒九年始克譔述公墓碑乂十一年理舊書得公雪夜過訪之詩遺墨如新永嘉謝君庭循觀之為作雪夜清興圖遂録予所和詩附公詩之後冠以謝圖而識其末遂因以及吾交友存沒之情云正統二年秋九月七日某識題六檜堂巻黄淮忿之激於中者必徴於辭色徴諸色其發疾以暴徴諸辭其㫖婉以深稽之往古藺相如忿秦之欺趙欲以頭與玉俱碎樊噲忿鴻門之背盟拔劍瞋目以脇楚王徴諸色者也國風嘆薈蔚之朝隮楚騷悲菉葹之盈室徴諸辭者也色之所發雖足以快意於一時而辭之所寓誠足以垂戒於萬世其淺深固不同日而語也今觀胡裒之六檜堂其亦忿之徴於辭者歟裒温之永嘉人當宋運中㣲屛處華盖山中讀書自娱忿秦檜之誤國痛入骨髓然而未能伸其志也遂於堂階之下手植檜六本掲其扁曰六檜盖以六之音與戮同於以識夫檜之罪當致顯戮冀他日得以酬其素願云耳嗚呼裒獨何心哉不得巳也當時有若胡澹菴者上髙宗封事請以檜之頭懸藁街詞雖切而不見信况裒未獲進用於朝者乎後雖一出竟以奸權媢嫉僅至滁陽通判而止徒使空言與國風楚騷同傳於編簡良可悲夫然其氣象從容詞意懇至後之覽者足以寒心而駭膽誠非僥倖快意於一時者之可比也九世孫鏞裒集成巻鏞之子奥復求士大夫詩文以彰厥美其亦善於繼述者與題宋歐陽澈譔告身後楊士奇宋陳東歐陽澈皆以忠言見殺髙宗朝後髙宗悔之此誥其褒恤之命也盖初為小人所蔽追悔之詞雖切無及然覆轍尚可以戒後而無㡬胡銓韓紃言和議何充言馬伸存趙之功梁勛言金兵必至宜有偹皆逺竄雖不死死等耳惡睹其克戒也哉嗚呼為國之患莫大於殺忠言為臣之禍莫慘於以忠言見殺此誥至今三百九十年矣雖傳之千載不能使人讀之不興慟也題金陵送别巻後蕭鎡大理寺丞李君奎為監察御史常受命巡厯浙江適戸部侍郎河南王公督運於杭頗失紀律君即劾奏之既而復巡厯蘇松諸郡郡人相謂曰是御史盖常劾奏王侍郎者也皆狼顧脅息凜然不敢犯一時語御史得大體者李君為稱首其還朝也大夫士相率賦詩贈焉題曰金陵送别至是君以求予追作之予以為古之人為文章皆述耳目所聞見以紀一時之實若追作之則必想像摹擬致揄揚諷詠之意其失甚矣君安取斯乎予非敢以古人自居然與君皆學古道者也學古道則無以復嚴命君其無責焉書渭北張公弔祭國使王翰林文後程本立昔元世祖之取雲南也師未出境遣三使入大理諭之許不殺掠三人者言祖宗之法殺詔使者城拔必屠萬一蠻方怙惡或賊殺臣願無以臣而使是城噍無遺類至則彼以誑磔其屍於樹下師及城勅姚文獻公樞盡裂槖帛書止殺之令分號街陌而急求三使之首或曰投洱水中遣漁者網之無得也俾文獻為文以祭火其骨亟送三家賜其家蠻口人數十世無有與中一人秦州士子王姓蠻口分於州俟其子壯付之後三十年詔西省臣訪求其家在亡蠻口己為郡豪冒有王氏子事見姚文公燧集中本立嘗聞而悲之夫人莫難於殺其身三人者不難於殺其身而難於屠城可不謂仁乎然名位不詳於記載子孫不終其恩惠何以勸天下後世之為人臣者哉今讀渭北張公弔祭國使王翰林文而後知上有咸五帝而登三王之君則近代之規模為無足觀下有浮英華而湛道徳之臣則士之碌碌者無足數也何以言之元大理之役使於興師之後師既無名勢巳必取縱三使能諭降之亦不存段氏之國矣自元氏取宋以有天下百年之間天實厭之眷命皇明掃除湔洗永清四海元君北遁天下巳定而其遺孽梁王猶負固西南漸被弗及於是翰林待制臣禕奉詔以往諭以天命俾知所歸彼乃自絶於天待制公遇害而國亡矣然天朝猶以八年之久而後聲罪致討其於師未出境而遣使者規模之大小何如哉嗟乎一人生死闗乎一氣之分合天之所以不靳公之一死者盖將以剪元之孽也所以剪元之孽者盖將以雪中國之恥一天下之心也然則以公之所處者言之死可輕於鴻毛以公之所闗者言之死可重於泰山矣而况公以博古通今之學養徳制行之實發之為經世載道之文流聲於當時而垂耀於後世者又豈三使所能望其萬一哉不然何三使若是之碌碌無聞也雲南平之十年賢王在蜀顧瞻西南慨然興懐若曰善善長而惡惡短國朝文節之臣有如王待制者我其可弗恤其嗣爰命使訪公之家於金華得其子紳字仲搢者致之國中恩遇甚至且嘗筆於近臣曰匪私王氏於以勸忠於戲古之列王有若是之賢乎彼三使之子孫有若是之榮乎仲搢又得請於王自蜀走滇將求父之遺骨以歸求之百方不得乃設主而祭號慟㡬絶於是渭北為文以弔公之靈以慰仲搢之哀即其文而論其事則天朝功徳之盛也王國風化之美也臣之忠而子之孝也皆於是乎在本立能無言乎雖然纂脩元史公實總裁不知得三使之姓名而書之否果得而書之則三使亦賴公以不朽矣跋韓國華神道碑何喬新右宋諫議大夫韓國華神道碑富弼彦國撰王珪禹玉書國華魏國公忠獻公之文而富王二公常與忠獻公同居政府其文與書皆可傳也富公以勛業名世其文章不多見今觀此碑序事質而不俚贍而不穢殆非稚筆所及盖宋之諸君崇尚儒雅公卿百執事率用文學之士故士大夫争自淬礪於問學在當時雖不以文名其文亦自有以過人如富公是己自元以來所用以為公卿大臣者苐取其體貌瓌梧音吐洪暢而以文學進者十不一二焉故雖耳目近事亦懵然無所知不獨誤以伏臘為伏獵枤杜為杖杜而巳或譏其然則諛佞者又從而解之曰䕫龍稷卨所讀何書絳侯灌嬰重厚少文者也執用人之柄者遂以為當然而不之怪嗚呼以卿相之位而委諸不學無術之人冝夫治之不古若也悲夫書岳鄂王廟記徐溥宋建炎間金烏珠南侵攻陷常州羣盜四掠冝興皆為所蹂躪時岳鄂王方提兵抗禦邑令迎王移屯其地兵出屢捷遂保無事避地者亦賴以免邑人圖像祠之學録周端朝實為之記厯嵗既久人習稱岳廟因訛傳為東岳之神嵗時男女雜糅祈福於是盖廟記既亡而王出兵時手書紀功小碑後人築城復寘之亂石間莫有知王之功者近嵗士大夫稍知之欲正謬妄而小碑亦以城圮而出雖殘缺不完尚可考信盖王之功當不可泯也於是今邑令武陵陳君重脩其廟而仍刻端朝記於石陳君報功之心其即宋令戴君之心也乎刻成予故書其事於後記云王設方畧降馬臯慴林聚而史則云盜郭吉遁入湖王遣辯士馬臯林聚盡降其衆其事不同豈臯聚既降而後遣之耶俟考之亳溪書舍巻序柯暹冝興邑西二十里為亳溪上舍生尹廷佐家在焉廷佐年少嗜學家多書因號亳溪書舍及領鄉薦來京師求搢紳大夫士詩文一巻謁余叙諸首余初未識廷佐時見劉養正鮑景昇道其為人若出一口欲一見之既見廷佐年甚富氣甚清言動甚規矩信二子之言無過情及觀今亳溪書舍巻吾友張君士謙為記勉而期之無不至諸君子亦皆許之無異於養正景昇信之無異於余且知其雞群野鶴之見稱師友間巳非一日而余將何以復其請焉夫一勺之水似海之水淺深不同衡茒之居似數仭之居髙下不同匹夫之言似聖人之言是非不同亳溪近大江去海不逺觀者知其淺深書舍之左右有隣逺近有郡邑有都城居者知其髙下若書之是非則自六經之外子史百家棼棼若牛毛繭絲之雜出仁義道徳之言雖廣吾安居闢吾正路茍不得其門未易入也去仁義道徳之言雖誘人於荆棘之塗而能快人之所欲防之少懈未嘗不駸駸入於其中廷佐體之已久擇之冝精而余復有是説殆以奕射規矩語秋羿輸也然游聖人之門聞學不厭矣聞加年而學易矣聞學如不及矣聞仕優則學矣未聞知可盡而學可止也昔晦菴朱先生以易之敬義名齋得持敬之本於中庸之戒慎恐懼得明義之端於大學之致知格物劉屏山得不逺復三字謂入徳之門范文正得忠恕二字謂用之不盡廷佐於此亦必有所得顧余未盡悵悵焉進不能師古退不能諧俗不自知其為不可或又謂通於今不必根於古諧於俗不必本於經吾斯之未能信廷佐擇焉書鐵崖先生傳後張汝弼鐵崖先生雖出自㑹稽而寓吾松之日最久遺稿最多故沒垂百年而松之稍識文字者罔不能道先生之名然謂其為邊上梅則所未聞也豈邊梅乃先生家居時所號而特行於㑹稽諸郡耶在松所書鐵崖之外有鐵雅鐵笛鐵史鐵龍精鐵仙鐵龍仙伯老鐵東維子抱遺先人之號不一如香奩詩等則書桃花夢叟錦窩老人此又因事而偶筆固非常號也常號不脱一鐵字雖各有所因亦豈不以胸中之錚錚烈者有佀之乎故其隨所寓而署其所者亦不一如小蓬臺等亦皆泯迹獨草𤣥樓尚在郡中迎仙橋之西不知㡬易主而今為朱氏之居然嘗詢諸故老皆不知先生之後果何如也今年予以㑹試寓京而其族孫豹亦由貢而至適得見其所裒鐵崖律贊諸作因識書陳僉憲先生墓誌後張汝弼故國子學録安福李先生本素司教吾華亭時嘗謂弼言台郡陳先生璲提學江西語學者曰永樂間脩大全諸書始欲詳緩為之後被逮促成諸儒之言間有不暇精擇未免牴牾虚心觀理自當得之不可泥也又聞宣徳間章丘教諭餘姚李應吉疏於朝言大全去取有未當者下其議於禮部禮部下之天下學校許兼采諸説一斷以理噫纂脩臣言如此廷議如此盖以萬世至公之論開來學也泥者中無權度執以為斷陋哉石鍾山記跋張汝弼弼東吴人也未嘗一至彭蠡湖口但嘗誦蘇東坡文有所謂石鍾山者謾不加之意今年取進士觀政兵部之武庫郎中王公尚忠出是山今古題咏觀之快讀一過嘆曰嗚呼甚矣知己之難遇也豈直其人哉自有天地即有此山名之以石鍾者其誰固知之矣酈元東坡亦知之矣李渤固弗知也然酈元東坡知之亦未盡歟盖元之言曰㣲風鼔浪與石相搏而聲坡以石有罅竅㣲波入焉而聲皆曰㣲而巳驚風怒濤奔騰撞擊之時將何聲乎豈止噌吰乎窽坎鏜鎝乎意其雄偉詭怪極天下之奇觀正在於是不止景王之無射獻子之歌鍾也然而㣲風鼓浪可舟而聴適驚風怒浪傾檣摧楫誰暇詳耶評之者正漁工水師不能言者耳所以極古以來無一人詳著文字間者嗚呼人之於山非有情以蔽忌之也知者尚如此其鮮人以𦕈然之身寄於百年之間必欲人之盡知任之必當不巳惑乎所以古之豪傑恒鮮遇雖然事不目見耳聞而臆斷之如此必有能探東坡之意而詳告我者亦兹山之遇也明文海巻二百九十八
