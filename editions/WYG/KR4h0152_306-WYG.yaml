body:
  text: 明文海巻三百六餘姚黄宗羲編序九十七序事張氏紀畧序湯顯祖晉人有言比來離别常數日作惡余為寛言之曰生别猶可死别何若年過耳順愈不喜逆戒客幸無以悲傷事相聞即世間悲傷文字亦不必見也何也其叙述世家坎坷流連乃至若數冬而不遘一春恒夜而不經一旦者固却無視視亦不竟早衰恐神傷也屬者客乃以崑山張元長所志六世以來行畧見示則有不忍不視視而不忍不竟者竟而去之去之而復在几閣間悱惻慨嘆一月而神弗怡客曰夙若某若某者皆嘗述其世家以煩子目未見子不呴然而艷也讀張氏略而泫然傷之太比於人情與余解之曰固也吾亦世人耳世之所喜吾得不喜世之所悲吾得不悲且彼其家男子而世纓組婦女而世禕翟外内休融夀考咸遂何徳而至斯張之世徳詎逺於斯與何乆瘁而不艷也客曰何如曰其六世祖道瑾起於贅壻立而與婦願歸孝弟力田以有其子徳聲為縣從事輒自免自領賦萬石以休其同人迂騎而避少婦之渉者嵗晚則與婦方浣枲紉緼以衣里中㷀孺廣糜餌以飼囚有徳者矣而子諸生唐文乃二十二嵗而死且死衣冠強起坐使畫工傳之曰後人庶知吾齎志以歿乎妻為盧節婦也撫其子抑甫六嵗時秋夜起見月華雲成五色蔽天呼母盧起視驚喜令兒整襟肅拜見短髪蕭蕭印月下慟欲絶為述亡考讀書時事相抱痛哭而雲中雁聲裂然嗟乎聞此而有不泫然者情耶抑甫為諸生巳復棄去而其婦晉孺人嵗祭掃必戒必泣曰先姑有言兒孫奉養有盡但緑楊紙錢年年如故則兒家之祥也至抑甫有子諸生宗翰能文章有當世之志幸乃五十二而貢于鄉矣終六十二而不受一命之榮婦季行年八十矣而為其子食貧䌟纑不能自休以末此豈不足悲乎生子也才如元長發舒五世之鬱伊將是焉在而為諸生且五十年竟以病廢至云母子之間徒以聲相聞者四十年母病時以手按母肌肉消減含泣大恐而母夫人猶喘喘好語曰恨兒不見吾面猶未有死理也斯語也聞之而不亦悲乎天下有目者皆欲與元長目不可得矣有子鐵兒而殤有女孝仲秀慧端婉曉書傳大義所謂閏閣中鍾子期也為孟家婦幾年而復殤天之困元長也不愈悲乎凡此數端者客以為何如也客曰若然誠悲矣安知前所云世家者之先容愈張氏而張氏後乃終不如前數世家耶夫冬之必有春而夜之必有旦亦天道也予為嘻然乆之曰固也語不云乎天不可與期道不可與謀元長且置無悲需諸季之後幸乃如客言可也䟦孫尚書仲益尺牘七條馮夢禎嘗過震澤僧寺見有孫尚書覿仲益手牘數條石刻大似大蘇公書因徘徊其下乆之今用卿所示手牘七條與石刻書法無二雜之書帖中不能辨也帖中語及東坡先生者一而與徳固者半其自守之正為人之厚彷彿可見不獨尺牘之工書法之妙也首二帖多戰筆似晚年書聞之毘陵人士尚書實大蘇公遺體孫老得公棄婢而生尚書畏時禁不能自明而詳其顛末於家乗則尚書書法其淵源盖有自矣明文海巻三百六
