body:
  text: 明文海巻三百十八餘姚黄宗羲編序一百九技術琴譜序鄭以偉古今聖於琴稱嵇中散矣其言曰琴瑟之體聞遼而音埤變希而聲清以埤音御希聲不虚心靜聽則不盡清和之極是以靜聽而心閒也嗟乎不佞猛心人耳惡乎知琴乎哉雖然居恒善病謂導養神氣宣滌性情琴徳最優欲時一玩苦勿習也居長安數從蕭君遊蕭君杖不掛一錢而一琴三十年每過我便鼓一曲隠几聽之則觸􅔊如意美音載興抑按藏摧祕弄忽發其悲悽則澤畔被放也其流喨則鴻聲蘆中也其雜然驟至萬騎集也其清虚澹宕騎𤣥鶴而俯視也其紆以和鄒生之律而峭以峻髙山墮石也伎至此乎不知夙痾之去體已一日出譜請不佞文叙之不佞曰子譜曲乎則古曲之亡如夢游太平引亡論即師襄七十二調八十九曲子期百二十曲五百八十弄二十八調及蔡中郎所稱青雀别鶴飲馬長城楚曲明光俱不可攷他若履霜掇蜂大遁小游平陵狡兔亦多湮沒蓋絶而不傳者非獨一廣陵散也世所傳惟毛詩五曲十二操九引蔡氏五弄間什一顧瞽師能終數耳是可譜者世共傳而其不傳者又無從譜也子譜音乎則正宫之絃二十九絲按以左大指升以右食指者黄鐘也少宫之絃四十五絲按以左大指升以右食指者大吕也商絃五十四絲按以左大指剔以右食指者太蔟也角絃六十三絲按以左大指剔以右食指者夾鐘也徵絃七十二絲按以左無名指勾以右中指者姑洗也羽絃八十一絲按以左中指剔以右中指者仲吕也正羽絃九十絲按以左中指剔以右中指者㽔賓也而林鐘同仲吕重剔夷則同姑洗南吕同夾鐘無射同太簇應鐘同大吕重勾此古音之凡也今大岑宫絃二百四十綸中琴宫絃一百六十綸以次降而小琴袖琴各以次降亦一瞽師能終數耳夫酌絲之數而發之以手音從出焉謂音在手指當自鳴若出乎絲何事摘樓如從虚來應為鈞天若附於耳耳非繁絲此數者皆非也音果安在是其妙者不可譜而其譜者又非妙也子烏乎譜琴君曰雍門之譜尚矣顧吾傳之師而知其有不可亂者吾取不亂者譜之凡若干篇雖與古譜間有同異要之商之白雪扣角漪蘭𤣥鶴宜隠士羽之雉朝飛佩蘭宜曠士黄鐘之大雅宫意之修禊宜徳士不獨音不奪倫亦且調從所好今太和在宇寧無諸士者流觀予譜而知其解者哉其於古樂豈曰少苴夫傳糵方者不必善釀也而釀之所從出兹亦琴之糵方也巳矣不佞曰唯唯君勉矣第世諧宫意有鶴舞洞天今無之而益之以陽春廣寒商意有殘形八公今無之而益之以霜猿嘯月角意有子游凌虚今無之而益之以蒼梧徴意有南薰霜夜鴻今無之而益之以醉漁唱晚羽調有烏夜啼玉樹臨風今無之而益之以漢宫秋惟商角二調如故而㽔賓凄凉差有增損豈門師之異歟抑亦闕疑之意也譜在負竒聽者自知之不佞即非其人乎將結廬於廬山飛瀑之間冥心息念而後聽子琴董君玉几印章叙鄭以偉結繩邈矣雨粟以還科斗之變凡五篆一變而籀也周以訓童而孔壁異矣籀再變而斯也秦以紀功而大篆失矣斯三變而八分與𨽻也上谷下邽用其捷而古書破矣八分𨽻四變而章草也史游用其放而八分𨽻體散矣章草五變而行也徳昇用其狎而正書剥矣大抵改莊而佚易煩而便至於真行草書出而大小篆益廢於今可見蟲書之蹟者僅鐘鼎之欵識而世又不用州郡印文畧用斯篆而大篆終成烏有惟於私記中往往有篆然而不識於甄酆所云六書之繆篆者何如况于保氏之教乎嗚呼難言哉蓋偃師之槃延陵之墓篆柏寢之刻栒邑之銘余不得而見之矣山鑱冢出苦不盡覩恒摹石鼓文即甄司空所謂竒字而李斯采之以為小篆者半己不可讀存者若昌黎集中快劎砍斷生蛟鼉而已登焦山先龎鼎龎者髙也云是畢公分邑鼎為周物識復古雅又不及摹以歸癸丑長安偕薛天谷詣祕書董君玉几所見君所鐫公卿大夫私記上至宸章小璽精工神駿殆不復論而其刻畫形象必古篆是師雖間出已意尚方大篆有十一二叠者而大致不殊鐘鼎不茍以已變古使人讀之猶可見大小篆之遺焉於私記中見鐘鼎文於鐘鼎中見籀斯迹斯亦所謂存千百於一二者也嗚呼竒矣抑予謂鐫之難工者三焉好篆者漢莫如馬援上書言臣所假伏波將軍印文伏字大外嚮又成臯一印令從白下羊丞從四下羊尉從白下入入下羊非制下大司空正郡國印章識者非之謂伏無外嚮臯不從羊夫以援在漢尚爾况今去漢又若干年耶童習白紛况不習乎故博學難字形正矣然篆與他書異有反有折有正有轉有遶有圍有倒取有反取有向背取有近取有加取減取有微加減取有上下中取有方圓取有曲直取有離合從横取有順逆内外中間取若積柴然疎密空狹不若他書之嫵媚當使如空中有物物中有空也位置失宜不作鹵莽氣乎故堆垜難凡他書筆可喻手手可喻心而刀非筆也他書可以如印印泥而剞劂不能如筆從手是以兔鋒易透紙背而撥鐙莫施金石也故用刀難君當萬厯初及與李于鱗王元美徐子與黎惟敬吳明卿遊明卿偶書一添字君曰忝下以心從水者非明卿以為一字師祕府舊印文有難解者詔輙問君君恭釋以進儕輩無能易者咸服其博雅而運字有法鼓刀有神即吾丘衍不能過固宜其獨擅一時也歟余嘗謂十指間有不壊色身殆君之謂矣雖然君遍交諸貴人恥事竿摩貧日西食淡如也長安䇿一蹇馬歸閉户焚香誦法華金剛諸經以一切欲空諸所有者諺云天不以識字為賢智安知君不一切空之哉㑹君求言於余余多病願作跋題河外人姑一為之濡拂又未始不爽然思結繩之治君名鳳元爵里在明卿序中聽彈琵琶詩序趙樞臣夫聲猶色也能感人亦易以移人樂於宇宙間其聲之翕合有倫者邪大雅之外爰有琵琶琵琶之作本於胡馬制自漢宫象形傳聲推前引却其樂聲之幻化無窮者邪夫聲藏無形托器以宣器具聲存因人以傳則一撚指間天之精地之靈人之情粲然具矣而况彈之者樂府之娉婷聽之者藝林之騷彦彼其斂容按調流韻凝空咽松風而落磵泉悲秋蛩而泣嫠婦將使鴝鵒聽而移時靈侯托而言事烏得不令知音者傾心擊節哉然而玉門塞外胡月紛紛潯陽江頭荻風瑟瑟即此聲也情胡為而遷思胡為而悲異哉乎聲之移人矣嘗試論之聲以器宣不以器具何則人含天地萬物之精以生凡天地萬彚交感而成聲者心咸統之惟手與耳心之所寄手之不彈耳之不聽人心之聲未嘗不存故鵾絃急張龍撥漫拊轉關䕶索疾徐協度彈之為美也冶容綽約黙坐夷猶側耳傍聽風恬韻幽不彈之為美也一聲裂帛鸞驚鳯矯入耳曲煩留情奥眇聽之為美也無絃之琴大音冥冥窒兊塞聽返乎無聲不聽之為美也夫然則雖有彈者孰為聽之雖有聽者孰為賦之若余友袁魯望氏者内含純白外擷英華謂琵琶為技誠微矣然莫非性命之旁流翰墨之支裔博雅君子未或遺焉於是春遊白下選技青樓得董氏秀華者雅善兹聲激清音於四絃忘肉味於三月渢渢乎如聞秦女而蔑曹綱也乃賦聽彈琵琶一篇歸市吳中好事者相與咏歌之夫摭樂經之緒論闡律譜之新聲豈鮮其人乎向非涵天籟於太空翫希聲於沕穆一唱百和揄揚盛美則彈者亦子雲之𤣥聽者僅桓譚之知耳余故樂為之序冀諸君聞而和之吳元定印譜序劉世教夫摹印之學至今日而最盛學士大夫亡不人人能言之蓋自顧氏之印藪始昔在嘉靖中吳文氏兄弟以博雅故旁及兹藝最為有聲其上足曰王君幼和余不及見文氏兄弟而少時曾一再從幼和游幼和年七十老矣猶鼓刀如壯夫大都圓美工緻若勝國趙文敏諸私印耳即文氏兄弟所流傳者率多類是夫非典型文敏然邪自印藪出而人始知秦漢遺法於是文氏之緒息而新安何君主臣始張甚主臣骯髒負氣其游公卿間若汪司馬王司冦諸公並禮之如重客與余邂逅建業盡發其故所手勒者幾數十帙以示余直若瑯琊邸中所覩靡非國寳摩挲竟日不忍釋蓋摹印之觀止矣名固不虚耳其稍後主臣而著者為蘇君爾宣爾宣亦産新安偉岸饒酒徳當其神合足與主臣鴈行然其所得法不盡繇主臣或言故嘗從文博士游或言晚不及也其並爾宣而起者曰虎林陳君公獻公獻恂恂長者其所淵源實自新安而絶不繇二君出踰壯玉折遂不及與二君爭先故與余交頗久既歾而其所摹贈余者悉篋笥不忍發間聞人道摹印事未嘗不心悲公獻舌橋然而不能下也今爾宣亦且老當非復壯盛時後起之士紛如蝟毛超乗而上實難其人乃今而得之吳君元定焉元定與余同里閈少年負儁材意不屑頫首帖括而又負其磊塊欲用其竒以自見於世且令後世得覩其芳烈計惟有摹印一家可以冥蒐秦漢以降諸名家之心畫而其所效用且與法書名畫並流穹壤將千百禩而寳翫閟惜無己時於是結嗜精宻必欲合符昔人乃已遂盡摹古公私璽印之嘉者與其手勒之合者為譜而問序於余余少時頗亦雅意此藝而故所交游若松陵周公謹長水李𤣥白諸君皆攻文章精鑒識赫然負重聲藝苑而癖與余同暇輙抵掌相對為辨晰其致得一竒語輙擊節相賞公謹遂草印說一巻見者往往祕之枕中未幾公謹竟游岱𤣥白與余相去不三舍而歲中不過再三見於是疇昔賞心游藝之樂亦寥寥且盡乃今覩元定譜而不覺雕篆之童心潛復戚戚且因而有山陽聞篴之感圖欲窮而中寢將再發而躊躇者此譜行不知元定於主臣諸君孰當右席要必令印藪奪色左次矣異日者有如天子采伏波將軍議詔下大宗伯釐正中外印章推擇六書之士孰能舍元定而他適哉賞心集引袁宏道雨中坐草堂閱明教所裒賞心集用心良苦如好方人處處覔方或敝簡冊或田翁野嫗或㕘訪道侣所有丹方異藥盡入手籍凡天下祕密之症與不可救療之疾指掌無復遺恨而一遇常病寒熱相反隂陽少􅆾歴試諸方無一驗者其人乃大惱曰我方非不竒而世人之病自不與方值諸人以不善病病吾方非吾方咎也必欲取天下祕密之病以驗方而所謂祕密者又百出於此其人煩懣不知所出請問醫王醫王笑曰諺不云乎學方三年無病可醫學醫三年無方可學子但能察脉識源方在汝心不須覔也其人媿服明教徧歴方藪儲藥如丘余適有覺病乞一海上異方未知可否有則願為檢出不然是吾不善病適不與方值也江西有葛道人者客予里善談隂陽生尅每一病出則云東垣若何丹溪若何素問内經又若何病者聽之以為盧扁復出而及其取效反不得與余村鄢草頭陳打封等此非不遇病之過泥於治之過也明教好方人也余則談隂陽生尅之葛先生而己因書巻首以俟公異日一笑古今醫統序余孟麟余嘗讀黄帝書云若窺深淵而迎浮雲一何難究哉夫人之所病病疾多醫之所病病道少古人屬意甚微窮力甚大其術洞鬼神含造化至精矣猶然噤咍睢盱蓋其慎也周之時醫師𨽻于冢宰嵗中有稽十而失一即次其食未必人鏡於道乃斤斤守法論究經脉五胗竒胲不敢以墮有足尚焉後之業醫者較視之何如哉靈蘭石版既未有能明其説專家授受者藥性脉理病機治法尚茫如而肆炮縱合以規偶中之利又未有以稽其失者師無所承憲無所畏以眇微幽窅不可致思之術而滅裂若此焉吁其可嘅矣吾邑東臯徐君少時學儒去而學醫攻探研極究尋諸名家謂淳于意以醫狀王叔和以脉經錢乙五臟方楊士瀛以直指論劉宅素以元病式羅益以衛生寳鑑類不可勝數然人各師其見家各顓其方辭説叢衍則譯導難簡牘浩汗則裒蓄難機指甲乙則審諦難鍼石離合則該驗難欲以提綜五行參緯十二候啓𤣥命之秘而施𢎞濟之功何繇哉乃逺稽古哲近述名流宗㫖必存小技兼録纂成一書名曰古今醫統紀衆術之所從則河濟殊派窮萬病之攸致則溟瀚同趣使讀之者如籠挫韜略掄算無遺或張旗整列而接刃廣原或銜枚循間而決驟頃刻雖竒正不常要之皆足制勝何也其法具也余聞法之示人迹而己至于不以湯液醴灑而湔洗腸胃不以石炙熨而解搦筋脉非通於神明者不能與幾徐君以法公諸人而其所治病則神在秋毫毎遺外而自得故從治逆治罔不輙效其于聲稱甚著蓋又以用法而不膠於法也明文海巻三百十八
