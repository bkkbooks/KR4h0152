body:
  text: 明文海巻三百三十三餘姚黄宗羲編記七居室海山亭記毛紀東萊郡城之艮隅僅里許有故臺焉實當教場公署之後巋然數仭日就荒頺過而睥睨莫有問之者考之郡志為南燕慕容氏所築號為燕臺然父老相傳舊名望海疑秦漢間占望氣候者之所為也乂嘗憶國初沿海設有望海臺以備倭㓂此臺殆其墩之遺址邪皆未可知也蓋世道恬熈之餘斯民相忘於無事之天久矣嘉靖丙戌廵察海道山憲副碧厓馮公子際偶於閲武之暇陟而觀之則見神洞諸峯羅於東南渤澥洪濤匪於西北而其雄峻渾闊之氣悉於是乎㑹萃焉乃慨然嘆曰兹一方之勝槩也可使其蕪没於荒煙野草之際而與尋常丘垤等邪爰命工氏因其舊基増而拓之髙廣加三之一壘石於麓甃甓於巔樹亭其上棟楹桷檻黝堊丹漆繪斵舉以法亭外繚以垣墉可慿可倚前為石磴四十有九級縈迴以上若凌虚御風然以文計髙不踰三而圍可二十有八亭以尺計髙至二十而圍則百餘材用以百計皆取諸公羡人力以千計皆取諸怠逋里閭之下不知有是役也經始於是年二月凡八越月告成居然異境突出海邦山川為之改色公於是援孟軻氏登山觀海之説以名其亭毎值戎憲餘閒時一登焉或芳辰令節與郡之士夫燕㑹其中把酒長吟凝眸逺眺鯨波蜃氣浩瀚杳靄潝潝濊濊髣髴蕩乎吾之襟次而層巒疊巘蒼翠硉兀相對恍然若超出於塵埃之表者至若風清雲淡雨霽霞飛市火村煙林霏鳥語若逺若近出沒不常朝暮之間變態萬狀㑹心感懷可喜可愕則斯亭之景豈非所謂瑰偉絶特之稱者哉公欲圗所以識其事一旦請於紀曰時雍受天子命特節東方己三閲歳于兹境内幸爾無虞庶㡬有是舉也然豈敢忘所自邪實惟我國家承平既久率土底靖至於今日治化益隆以洽故職於兹地者得以餘力構此逰觀之所亦欲與民同其樂耳請一言紀之夫先正有云善為政者急其所急以及其所緩而經理於緩急之際亦各有方至於臺榭亭圃之區區差可以緩而不可廢者公之蒞海道也脩城防建營戍禁奸宄清獄訟百度具飭凡其所急者槩己先為之矣從而及其所緩而且上無所費下無所勞非經理有方能若是乎遂使盛跡閟而克彰豈偶然哉愚因是而有感於天下之事廢興相尋蓋有自然之數一時鬱堙沉埋而不獲表著者多矣及遇仁人智士為之發露其精英加以潤飾播之文辭遂得暴白於世托名不朽蓋不獨一臺為然也昔韓昌黎名連州王𢎞中所逰之處為燕喜亭六一翁治滁建亭於清泉之上名之曰豐樂兹臺之出處顯晦亦畧同焉詎非有所待而然邪然燕喜但頌其有於上而豐樂則幸其有於下二亭之意求之於今蓋兼得之矣而海山云者特舉其山川之大者乎是工之初創也適大中丞王公伯圻撫臨其地暨藩臬諸公咸謂碧厓此舉亦興滯補敝之一事也亟贊成之碧厓其别號云酬字堂記徐渭鎮海樓成少保公進渭曰是當記子為我草草成以進公賞之曰聞子久僑矣趣召掌計廪銀之兩百有二十為秀才廬渭謝侈不敢公曰我愧晉公子於是文乃遂無愧湜儻用福先寺事數字以責我酬我其薄矣何侈為渭感公語乃拜賜持歸盡槖中賣文物如公數買城南東地十畝有屋二十有二間小池二以魚以荷木之類果花材三種凡數十株長籬亘畝䕶以枸杞外有竹數十個笋迸雲客至網魚燒笋佐以落果醉而詠歌始屋陳而無次稍序新之遂額其堂曰酬字半禪菴記徐渭人身具諸佛性辟如海水結諸業習辟如海氷當其水時一水而己安得有氷及其氷時雖則成氷水性不㓕又如煉赤求朱矯白為赤齊鉛作粉熨白為𤣥變染而成各有界畔如由吳逹越必經錢塘江心之際吳越分矣然投東則吳還西則越分無定形際難剖趾由斯以宣半義舉矣徽之休寜居士程希正甫家黄石潭上大谷中萬松最深處垣園百畝名松逸園裁勝構建既成八區景聚心娯莫不畢備乃就半山束茅以菴用㫋檀肖大士及諸菩薩栖其中而題曰半禪書其鄉王山人仲房園記以來而責菴記於予予惟正甫為人風雅勻停根塵融㑹所云半禪将謂居士未離家園是則半俗稍脱塵網是則半禪斯義諒爾辟像工人以一石香屑和一石土沙而為一佛香穢襍處終不成半又如鶩鷄攣生一頭東行一頭西赴不着一邊大脩之人不若頓超諸縁盡澄性海則兹半俗莫非半禪舉兹将化未化之氷悉還一水無禪可半何况半俗鉛白汞赤越東吳西義復如是天池居士方堕無限俗中有全禪契真諦不妄為作是記儻書入石記持向仲房古矜二長者叅之夢墨亭記祝允明子畏天授竒頴才鋒無前百俊千傑式當其選形㧞而勢孤立峻則武狹童㓜所志以為世勲時位茂禄侈富一不足為我謀少長縱横古今肆恣千氏一日忽念欲了其先人之遺望且以畢近易事􅋟乃苞銛坊滔萃神於科第業閉户一歲信歩闈塲遂録薦籍為南甸十三郡士冠人駭之而子畏自顧折草爾由益信人間事無必煩智慮者當是時且以謂崇爵顯章晨金午玉階升而矢流耳曽儌朕於閩之神所謂九里湖者夢神惠之墨萬箇子畏謂塗楮畫素或但成細𤨏藝玩殆澁儒腐生之業亦何直許云是殆匪如響者也領薦之明年㑹試禮署乃用文法詿誤卒落薦籍人又駭之而子畏夷如也去覈求神鈐天軌至理極事山負海茹鑽琢窈恍於是心益精學益大而跡益放或布濩餘蓄以為圗繪日月山河霄漢風氣煙雲霧雨花鳥樹石仙崖鬼竇竒夫曠人俠子媚女薪釣戎胡虗市舟騎千形萬模皆務為凌誇横突峻掘譎詭周曲碎雜無可求詣各至妥帖地必将躪古人之輹蹤惴惴然懼一失足俗駕當其妙解超然𡨕㑹乃復以為業無大小神適斯貴是誠可以陶寫浩素我心獲兮比自四方而歸結亭閶門桃花塢中目之曰夢墨章神符也謂獨余為可記陳前故以來請於乎子畏自以為志暢矣神符章矣余忖度之其果謂之然哉於乎然而不盡者也往者王子安嘗夢墨而以文章名余以嘗夢墨未知以何名審子畏之夢墨其果以畫名哉墨之用獨畫哉子畏之文豈特余等亦豈特欲勃等第哉子畏不謂符文而以為符畫子畏格氣乃果獨是哉以為符文余且謂不盡而又卑於文者哉子畏以文自居予猶進之有盡之用者猶為非子畏志之真也又以畫余肯為之真哉設余第徇子畏云爾已矣當不畏人笑失倫又不畏神怒忽畧茍且阿人哉神之祥子畏不唯是也必然矣然而人之志最易止止子畏之志無亦果本爾乎或是則不可不可必進以從余如子畏不然又何煩以余文為哉鳳嬉堂記趙釴貴州古九夷地也嘗讀魯逸論云孔子欲居九夷從鳳嬉心竊疑其言夫九夷自秦漢始通中國春秋時武陵之蠻猶未欵順孔子欲居於此豈信以為可化乎然當時屢於列國之君與其卿大夫竟不能一入其説然猶可諉曰不親至於七十子者日相從左右日絃誦洙泗之間亦不能使由之不勇師之不辟求之不斂况九夷乃能化而入乎至于所謂鳳者古今曽㡬見之岐陽一鳴收聲已久豈逆知其猶在九夷否邪則又寥逺難期此必聖人有為之言也今九夷内附悉為郡縣溪洞之民皆崇禮教其酋長盤辟雅拜隨羣吏抱牘日趨事不少怠問其俗而標枝野鹿之風猶彷彿近古其時孔子之時何如使天下無鳳則已有鳳不在中土必在此無疑余偶承役來此人皆以夷為辭余獨喜猶冀一聞鳳鳴乃為堂於玉池之上題曰鳳嬉又徧樹梧竹邀求琳琅之實此其可以招致乎夫唐虞之時鳳凰來儀雖遇文武神聖之君益禹稷契臯䕫奮庸之臣内外相成協氣四匝故靈物畢致今主上方隆唐虞之徳而臣人不能廣脩和之政况庸庸如釴者鎮撫兹土雖有鳳恐嗈嗈避長吏去矣此吾所以有無窮之思也雖然鳳之來不來不可知而臣人奉職治此猶以陋目之不樂久于其地豈以為必不可化耶夫在昔本不可居聖人猶欲居之今可居而人猶不欲居其志意去闕愛山堂記趙釴凡人之情必有所適適者多外假假外以為適者其終必移何則能適於其所適而不能適於其所不適今夫樵者日入山而不知山之美漁者日㳺水而不知水之美非山水不能恱愉其心彼其中本無丘壑川澤故耳是以好竒之士以風流自命毎探巖穴對靈勝鬯意𤣥逺歌咏所懷翛然有出塵之想及轉而投之陿阸之區寂寞之野少拂所願欲反氣挫悲歎豈情好固有時而異耶所謂能適其所適而不能適其所不適也適其所適者遭適其所不適者忘其相去逺矣吾自少愛山毎讀書山中嘗終日不櫛雖深谷峻嶺有命之逰者即躡履相從其性然也辛酉秋忽有貴州之役問所嘗徃來者輙顰蹙為余躊躇曰其山狂川怒最為駭人而蠻煙瘴雨又昕夕莫定所謂捫天揑石之難也余惑其言不能不來來則前所謂險者若失毎度嶺見飛鳥出人履下其懷益曠及循登入谷仰視後騎蹀蹀在頃上如畫几前見羣峯碧圍雲出肘腋間則又恐列不密余無得於山而愛好若此雖亦不能自解然貴之諸峯惟南郭最秀舊有使館既卑隘不飭又背山臨市余廼徙而南正與諸峯對堂成見山勢欲來嵐光蓊勃飄飄若與雲浮旅思頓捨非惟吾樂之而諸大夫久滯於此雖有不樂者無不色喜因以愛山名之獨怪世之傲者好詭為論説不讓近見太史升菴氏品叙山岩之異徧於天下於貴州之山獨醜為詆辭此其説當乎夫内適則培塿泰華内不適則泰華培塿其境在内不在外茍樂必選勝則所不足樂者必多昔人有云美者自美吾不知其美惡者自惡吾不知其惡吾惟愛其崒嵂䓗鬱有拒日槩雲之狀而已恐後之人惑于其言有不樂於兹山者故又為之説云倚豐亭記趙釴倚豐亭者倚豐山而作也豐蓋滁之望山人皆環而居之山亦鬱負靈異往往朝冠雲則晝必雨故滁人凡有事於場圃耕耨興作必望豐山雲氣以卜晴雨其歲時水旱祀之尤應嘉靖戊午余督收至滁時秋多雨雨反敗稼至已未春不雨夏亦不雨民始望而禱之謂雨可立致已而久不雨民咸咨歎曰天不我仁豐山廼亦不我雨邪何昔雲而今不雲也若有移怨于豐山然者余廼解之曰大山雨天下小山雨一國山豈不欲時風雨興利百物使民奠安其土哉况民所以祀而禮之歲亦勤矣今廼有不盡然者非豐山之所能為也雖然豐故雨之矣然雨未至而人望之雨既至而人棄之溝瀆不遂隘障水不安其藏隨洩而隨取之雖有慈親弗給矣山川若之何此專倚豐山而不善用者也使善用之則昔雨即今雨矣何也吾嘗見吾鄰人翁矣東鄰貧西鄰富吾就西鄰而問之曰若何以富於東鄰也曰亡它惟得天而不盡用乎天得地而不專任乎地如斯而已矣曰其道何如曰天有時吾則相之見生樹生見死穰死天有澤吾則留之存其有餘不棄其既往故為池塘為陂澤為畎澮務期足用往往天之澤十之三吾之自澤十之七故三時不害於地亦然剛者令柔柔者令剛燥者令濕濕者令燥又棘則肥下則埤髙則抑險則易地方人力相半歲率多穰東鄰翁則土冝不任草穢不剪時盈則澇時涸則止故種稑禾不為稑種穜禾不為穜以是與吾異噫此善用者且無多求於天地况山川乎知此則知豐山能利滁滁人不能自利耳又何怨于是滁人始知耕此吾亭之所以作也亭在豐山之麓旱時嘗同僚友與民望雲於此故因以立亭又恐民之時至而忘吾説也故書其言於亭中俾逰者觀焉所以告儆也偕樂亭記趙釴桐四塞皆山其最勝者東則有浮渡山白雲巖南則有大龍山小龍山皆去縣百里北則有洪濤山麒麟山西則五嶺挂車山皆去縣四五十里其最近則龍眠山鳯凰山靈泉山然龍眠其山邃鳯凰其山峭逰者嵗不能一至惟靈泉山秀而磅礴為縣之後龍自仙姑至王母塔横亘數里皆其支也民枕山為居為縣之右閭閭之中為正學書院為輔仁㑹所書院之後有山窿然而起圎上泰下髙不數仭見可百里是年古泉盛亞卿欲移居其上力不能就侯登而四望見羣山垣列而村居市㕓秩秩于白雲紫霧之中龍眠水桐陂水穿閭里左腋蜿蜒如白龍南下而練潭鴨湖白兎河諸水緯注而絡滙之與山演漾生竒侯曰有以也桐無城郭而安不貿易而足豈非山水鬱盤風氣完聚故邪是山誠不可無亭廼郭其巔為屋三楹期月始成一時觀者欣忭如突入層霄山水驟合因名亭曰偕樂其丞李君某簿張君某尉丁君某伐石紀侯建亭日月求余書其事以傳余曰曠哉侯之見也今之仕者喜言憂而忌言樂故其之官也與小民言憫其窮而恤其困嗚嗚然如新出湯火而浣濯之計不十全不已其與上大夫言又極言民俗之憊而吾所以拯之者若此之勤使聞者惻然稱歎以故其聲日廣以大其擢而去也常不待期至于山谷之美溪壑之勝可以一覽而樂者亦垂睫不顧比叙不入曰吾暇乎哉及考其政則未必然此無他無愛心故也夫樂生乎愛故愛蔭者及樹愛屋及烏豈有愛其人民而不及山川土地哉吾嘗見家人翁過其諸子之舎矣雖一山一水一草一木無不如念環視其田疇易陂塘固林園茂則陶然樂之否則怒及其過它人之舎則不然矣故古之人與民偕樂非真列屋而居之推甘而食之懸鐘鼓而恱之各得其情焉爾夫樂者何情之所適也吾適人之所適人亦適吾之所適交相愛者也知此道者吾于周侯見之矣周侯之至桐也適萬事更新之日人皆鋭于求治其于民事猶之比櫛髪髪及之矣侯詢俗察情日民不以為苦柰何勞之一切與民休息人曰桐人悍侯曰人畏罪云何悍人曰桐人詐侯曰獵者狡兎安得不狡云何詐桐人曰人多訟侯曰人情不得其平則鳴云何不訟上既安于清凈而無徴召㪣扑之煩下亦安於閭閻而無奔走震驚之擾是不偽為憂戚以相譽恱者也但見以里役至者不及庭而退以糧稅至者不弛肩而退以告言至者不越宿而退恬然相安于無事此亭之所由作也雖然吾嘗疑古之賢者喜雨有亭豐樂有亭本因一事而作亭乃至今存使其意止此然則雨有時而暵豐有時而歉将若之何審此則知所以為樂矣侯以乙丑進士來令桐年不滿三十以赤心臨民惟其心真故樂亦真憂亦真余愛其與人真也故樂為之記侯名芸字用馨别號仰南湖之景陵人助山堂記趙釴善哉山水之勝登臨之樂莫如栁栁州但栁州挾盛氣多慿陵山水余嘗疑其言曰地雖勝得人焉而居之則山若増而髙水若闢而廣堂不待飾而己奐是人有加於山水矣後入貴陽由武陵辰沅而上見山峻水冽而怪石嘉樹交贊為竒竊歎為仙靈之都逹者所宜考槃曽無一人樂於其地反罪及山水曰山狂水怒然後知地雖勝不得其人秖以陋信矣人之有加於山水也余有田一區在麒麟山中見髙峯疉嶂四顧墻立而竹樹駢植蒼翠相輔意其中必有人不及知者因令土人為導日逰一山見篤山之孤特小龍之峭麗麒嶺之崔嵬石鼓之蜿蜒蓮花峯之髙秀舞蹈嶺之徊翔𤣥𤣥峽之鬱盤龍門冲之幽深雖不能與名山爭勝亦一方偉觀矣因為堂於石鼓山下盡揖羣山而友之山亦交臂結駟迤邐若向吾而奔風雨晦明拱立不去尤宜月出如營壘中觀天刁斗不鳴繞身戈㦸各賦詩一章告于好事者好事者樂余之樂往往有欲逰者則迎致之其欲逰而不能逰者則强致之逰而不欲去者則慰留之山亦稍稍聞於人矣毎酒酣輒酹地而諗之曰山乎靈乎其不靈乎如其靈則吾効力於山抑大勤矣山固漠然於我其清淑磅礴之氣既不能尊我徳行又不能興我事功績我文章徒以色象索我則余誠無負於山山實負余矣聞者大笑因名其堂曰助山欲山靈之嘉貺於我也堂成於嘉靖乙丑九月發奸亭記馮恩乃嘉靖壬辰夏四月七日予按事至寜入院署翌日過東亭見照壁繪畫一麟頭角蹄鬛為矢中傷問左右云此射亭也舊設號矢監司按臨公餘則射中之以舒牘簿之勞予不忍之示宣城尹汪俸以宋奸臣秦檜代之仍置彤弓二鏃矢百凡我同官暇則援弓發奸中其黒心為上勝中其首次之中其腹其四肢又次之不中者為負焉嗚呼好直惡佞人之秉彛麟王瑞也孰俾之蹷足於東山檜奸雄也又孰俾之保首領於牖下今麟逝矣檜死矣麟逝而形存焉檜死矣而臭遺焉形存吾愛焉己矣夫孰知其逝臭遺吾惡焉己矣夫孰知其死逝者吾且愛之况忍以中傷之乎生者吾既惡之况肯以附㑹之乎不忍中傷不肯附㑹則舎麟而矢檜也亦宜明文海巻三百三十三
