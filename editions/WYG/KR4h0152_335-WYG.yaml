body:
  text: 明文海巻三百三十五餘姚黄宗羲編記九居室六經堂記趙貞吉六經堂者泰和胡廬山之居也其逺祖字昭叔者宋慶厯丙戌進士宦至屯田員外郎階朝奉大夫所治以循良稱晩多藏書友名士同時分寧黄文節公特與公善嘗贈詩有云逺縣白頭坐朝省乞身歸來猶好書手抄萬巻未閣筆心醉六經還荷鋤胡氏子孫蓋世寶之其後多明經發科者至於廬山先生學經聞道名益著於今時遡追前徳楔堂訓後以示不忘殆回生氣於千載矣嘉靖癸亥先生叅莅蜀政過内江叙契闊之外即命予記之豈予於六經之義稍亦有聞入矣乎遂作記曰士誠不可不自愛哉胡黄二公在當時皆士之徬徨而不達者然其自顧則皆有可以待來世者若以告當世之士恣睢得意者之前曰是二人者皆當不朽有百代之名者也則必羣笑之矣今竟何如哉嘗見士欲有聞于後者競致力于術藝之美膚華之末而不知培其本根以待食其實也夫六經者士之所以培根本之具也然治經而不聞道則亦膚華之末已耳是士之負經也嗟乎後之治經者愚竊惑焉訓詁已耳疏義已耳傳註已耳謂不尊夫經則不可謂之知經大義則於培其本根何與耶子思孟子之後知經大義者予求之得數人焉然今世之論皆以為不合孔氏而棄之矣此予之所以益惑也夫莊生之治經也達其智圓矣荀卿之治經也約其履端矣子雲之治經也奥其機深矣仲淹之治經也辨其才周矣堯夫之治經也貫其用宜矣此五子者卓爾如此皆以為不合孔氏而棄之矣則後來者欲以明道將安所歸哉此予之所以益惑而莫與之辨耶且五子者以為盡合孔氏則猶有餘説至于大義未乖微言不泯則數先生者誠學海之巨筏矣士之欲培其其本根以不朽于百代者可不務乎噫予安得起帶經而鋤者以問之耶聊為記以諗胡氏之後人因以博于胡子之教我也觀易臺記薛應旂薛子署白虎洞書院日盤桓於五老峰下樂其竒勝自謂與僻性相宜但好事者時或至止亦未免接應欵答諸生中好静者稍以為言于是講習之暇相從游覽逖訪窮探踰年幾徧匡廬諸勝矣一日偃息於東林寺中僧𢎞演出廬山志視之且指説往跡遺事余謂之曰此皆吾所知亦古今人所共遊也兹山鎮壓九江南康盤據三百餘里其幽崖絶壑不可勝計必有人跡所罕至者汝尚為我言之僧遲疑踰時謂此中有人相約勿洩然業巳露矣翊旦僧遂引余出寺東稍南折踰澗水入山坡僻仄陡峻不容竹兠余乃攝衣徒步攀崖縁澗登涉窈窕紆迴灌莽無慮數十里始于香爐峰之隂長松修竹中得紫雲菴而棲息焉菴有禪僧獨趺坐榻中始若弗懌既亦相解余遂樂而留之菴之東有巨石如砥縱横約三丈餘余終日坐于其上恍若有悟時閩遵巖王子以叅議分守是方聞之亦徒步過訪遂屬有司為余築室三間題曰觀易臺云余時倦于支離行不挾冊或進而問曰吾見先生之居于是也終日頽然爾矣觀易之義將無負乎余顧謂諸生曰夫夫也謂易為真有畫也謂易為真有卦爻彖象也二三子不觀乎日月之往來草木之榮悴雲物之巻舒俯仰咫尺變態倐忽上下六合消息萬狀無在而非易也無時而非易也吾之觀易也觀是焉爾矣諸生聞吾之言若有契焉遂請書以為記時嘉靖戊戌秋九月既望也藏書閣記李濓書貴於多乎哉曰不貴多也有一言而終身可行者矣有半部論語而足以治天下者矣奚以多為書不貴於多乎哉曰多書所以博聞也易大畜之象曰君子多識前言往行以畜其徳夫前言往行載諸書君子欲大其藴蓄以成其學舍多書奚以哉是故六籍之堂萬巻之樓尊經之閣古之名卿鉅公咸屬意焉寧有安於固陋以自畫者耶孟子曰博學而詳説之將以反說約也夫惟博而後可以言約未有不原於博而徑約者此為學之大方也余自孩童時酷好書册實出天性然少孤而貧雖好之而莫能購也洎登甲第遊宦于四方俸金之所易胥史之所録寮寀朋好之所餽遺月增嵗益頗充篋笥顧鞅掌王事莫能讀也嘉靖丙戌免歸始取舊所儲書用唐人法分經史子集為架以貯之而屋隘莫能容也乃建藏書閣於客堂之後蓋自伏羲至於文武自周公孔子至於周程張朱自六經諸史至稗官小説凡幾千巻臚分類别填塞列庋雖不能盡有天下之書凡士之所當讀者亦粗備矣余寢室在閣之下夙興盥潄畢即登閣披覽校讎有舛錯者則補正之其六經三史註疏暨切要諸書輒用丹鉛㸃勘俾後人易讀間有一得則又私為論著以識知新之益食時侍者以饌至食巳披覽校讎如初倦則倚欄凝佇而書猶在手也歸休以來垂二十年于兹飲食坐卧呻吟疾痛無日弗與書俱客有叩門訪者童子必辭焉非素稔者不之通客或怒而去久之知予無他亦弗深咎也暇時召二子至閣上而訓迪之曰古人無書求之甚艱既得之必熟讀不忘今人有書而不肯讀何迷謬之甚也昔王充家貧無書常詣洛陽市肆閲所賣書潛心黙讀遂博通諸家臧逢世欲讀班固漢書苦假借難久乃從親友丐求客刺及書翰紙尾手自抄之卒以漢書聞陽城不能得書求寫書於集賢因竊官書讀之逾六年無所不通夫三子者其家無書而勤苦如此余儲書滿閣巻帙頗富汝曹從事於斯不必閲諸市肆丐夫客刺寫之集賢終身讀之有不能盡者矣忠臣孝子碩儒佳士皆由是出汝曹勉乎哉茍知有書不能讀者之可恥而専力於卒業焉異日倘成令名人將指而稱曰此某之子也厥父善教厥子亦善學豈不有光於斯閣矣乎不然則閣中之所藏祇為蟲鼠蠧魚之資耳雖多亦奚以為也汝曹其書是于簡而警惕於無斁哉蓮花石巖室記傅夏器南安附郭之勝有蓮花峰層巒疊石纍纍若蓮花之錯落嶐者几張卧者繡盤錯者棊設架者鐘懸罅者劒斷呀者鼇伏怒者虎踞貫者魚頡突者鳥䀪迤南崇岡磷碕竅然為石室如豎有棟如覆有翬上有箭道通天光朗融下照層宫岒熒而嵯峨與蓮花峰峛崺嶜崟争竒瑰向之蔜藂土湮草翳藜蕪者不知幾厯禩矣姪孫履約始披翦䝉薄艾劂荆榛鑿石門闢石徑甃凉亭砌欄榭雜植嘉木異葩翍蘭桂鬱芷蕙而記以八勝余履巉巖攀危石攝衣而上四顧嶄嶄嶟嶟崔巍壁立稜層聳骨簸立跳陵騰清霄而馺雷霆山水大觀有在是者古之賢豪覽其勝而樂之則有抗節危言披鱗折檻即百折而不屈姜公輔氏以是流寓此間今北望姜相峰是也余至石室入坐烟火迢杳䬠霧䝉曨軨軒婥約寥廓靚邃水瀾不驚山青長環迥絶乎塵埃山水大觀有在是者古之賢豪覽其勝而樂之則有挂巾投劾鏟采埋光即没世而不悔秦系氏以是盤隠此間今西望隠君亭是也余縱登其巔逺瞰目盡海色烟浮天光霞繞列嶂雲屯溪流蜒蜷吞吐萬千曠若躡閬風閶闔之閎閌山水大觀有在是者古之賢豪覽其勝而樂之則有神契真倪與造物游障百川迴狂瀾宇宙無能為廣大江海無能為盈虛朱紫陽以是曠覽遊戀此間九日而還今西望九日山是也子之搆兹勝也古未有聞發之自子始不知山川有助于人邪不知子助山川靈邪不知吾子與山川之靈兩有待發邪因為之記東溪記羅洪先吉水蘭溪曾氏所居之傍有峰巍然東峙曰寨山泉出其下泠泠潺潺鳴如沸釡少焉渟泓演迤虺盤絙引匯為東溪春雨驟至潢潦四集其聲壯怒萬雷隠地秋水既澄明月吐華夜氣寂寥心與境㑹曾君佐朝氏樂之朝汲而暮游暑浴而渴飲洩其餘以溉膏壤嵗穫幾千萬斛而魚鼈蒲芡之利不謀於他州而自給于是棄去儒生衣冠製居士服以居非有大故未嘗一日去東溪也嘗自言曰世之泛江湖踰河濟逐名利之所聚而趨焉者我知之矣其始也利斧資選徒旅戒糗糒而易舟檝更彌嵗月而後能達然猶不免乎風濤之驚湍石之險其峭岸之崩壓暗洑之横潰晨夕凌突不測之變十恒居其一二焉而所逐者又有得有不得其徒手完歸又其最幸者也吾以是戚心焉吾嘗泊南浦望彭蠡巨浸未之迫觀而神已先禠為之悲曰兹非昔日陳氏赴南昌之役敗于火攻處耶想其建黄屋鳴旗鼓載兵甲以艨艟揚帆而上亦欲決勝一戰保富貴於無窮也乃今所見汀洲宿莽與烟濤過鳥而巳又嘗陸走長沙訪賈誼之宅弔湘江之魂又有大慨焉人生逝水耳逝有遲速時有後先即使功成名遂終不能挽頽波而返故壑吾擇其順而不累焉者可也且汩沒于濁流使人相訾竊指其後孰與吾被髪行歌東溪之上不出戸庭十餘武足以肆志而畢願不猶愈於浮沉之士乎念菴子聞之謂門弟子曰昔也吾誦緇林丈人之事登岸而歎挐船而去孔子拱立向之退而自失以為是寓言也乃今觀東溪君信矣彼所謂往而不返有懲于溺焉者也雖然豈必仕者之為溺哉夫人亦有之貴止其所思不出位焉爾矣小子記之吾少與之同師東泉先生吾見其佔􅖶矣吾見其綴文矣彼非不慕仕者也然乃其樂止于東溪是果有懲者耶抑亦其跡似耶吾不能測也小子記之養魚池記趙時春夫窮天下之大觀未始知觀者也海之瀾冀之河呉之江越之潮楚洞庭之湖彭蠡之澤極天下之大觀矣其形勝横絶括囊宇宙使怯者懼而壯者悲彼方悲懼之不暇而奚有於觀乎苟於紛錯繁擾之中而有悠然由然之趣蓋不俟窮極其觀而後得夫所為美者刑部事於諸曹最劇部置獄置㕔以諸司主事主之監察繫囚之出入月更其人嘉靖八年夏五月適余莅事桎械滿前呻吟哀號之聲不絶於耳左右皆湫隘未有縱余觀而適余心者乃尋㕔之後隟地圍可丈許請於寮友蔡直夫得其董作之羨材鑿池横六七尺縱裁之深更裁之甓以周郭北内為臺方約其廣髙倍其深下為洞一門三汲井為沼清奫澄泠養黄白錦斑青黑之魚凡三十六尾池中一覆以萍芡之屬潛伏往來上下出沒儵然而行忽然而止或掀其鬛或膨其腮或鈎其尾或磔其鱗或箕其口更迭迴遡五色陸離孰使余心恬而神怡縱目徜徉而手足莫知其所如乎始余嘗道三晉周秦之境留滯渤海者五年所謂海之瀾河之廣幸獲見之獨大江之南未窺然夢寐懷想其名川巨浸庶幾若在余腷臆其䧺偉瓌壯變態古今使余慷慨激烈而悲悼往昔生憤世不平之心則有之矣卒未有使余心悠然由然而得其趣者余以是知觀之未始窮而余之未始知觀也大觀書屋記趙時春余始以言謫𨽻氓猺僦舟間行歸陜西釋縲絏箠楚之阨而望故國丘壠之樂忘其憂而怡然幸也猶未足以泄讎者憤為盜狙諸滸幸不死而重創焉罄其資以歸報雖脱虎口還家而垂囊枵腹無以供菽水然猶以為殆類古賢聖者困而發憤者之事使其身僅存而聰明不廢吾獨後之乎其志軒然不少衰而觀世利鈍成敗榮辱屈伸之變其心衎然不少渝也然佞便之徒方視以為竒貨而市利既浸潤無所得而鑽摩不可入則將以百方困之是以恐恐然圬扉而削跡褐被捆屨優游於山澤草莽之間而脱世之陷阱耜于山可以食藝於郊可以圃葺茅於木可以觀詩書古今之變皇帝王霸之畧鍤土於汙刳木承流可以觀魚水之性情天雲之浮影其升沈陟降隂晴遲速之期其與人事利鈍成敗榮辱屈伸之故疑若有數焉而不可必與理勢之自然而不能解者值山水驟漲汩其溝斷其流水既竭而魚待嚅命小童汲升斗之水以活之則垂綸以嬉其不掛于鈎者半為涸轍之枯其茍存者無以聊其生而向之可觀者乃失其半嗚呼魚之於人何心哉使其躍於江湖乘風濤作雲雨為鯤為龍變化不測雖有廉噭賁育之勇孰不望而靡焉使直游於泠淵悠然而逝油然而吸霏霏脈脈而羣出以嬉斯又幽人逸士之所嗟賞而字育以寄其性情焉者也不幸而困閼淖泥滓之中不逢仁人之恤而陷於狡童庸孺之手然幸余雖非仁人而竊有志焉方將復其故奫其波安知不遂其性情如曩之可觀乎反觀於余無乃大有相類者而後益信夫所謂有數焉而不可必理勢之自然而不能解者雖以觀夫詩書所稱古今之變皇帝王霸之畧其利鈍成敗榮辱屈伸之機厯億萬年而如一日亦何異於此乎舉天下億萬年不可必之數與不能解之理勢而違之欲困人以求利者大惑也居其中而不能反觀又不能以觀人欲逃焉弗安者亦惑也觀於天下自然之數之理之勢以喻衆人之惑斯可謂大觀也已然則發天下之大觀者自余始發余之觀者當自書屋始故不敢以讓夫人而擅以名吾屋述之為大觀書屋記漣漪亭記趙時春初余尚友天下之士於浙得屠子文昇焉文昇有憂先天下之志過計其不遂而欲樂己之樂思構浙水之最佳勝處巢以為亭而觀游焉請余名之曰漣漪而為之辭㑹余以言譴廢退伏自念與世已矣雖欲與之共憂無所施而所望以憂吾君者夫二三子也固將使之憂吾君而乃為之言其所樂以懈其中而誘其外使二三子者各完其樂而不與吾君同憂吾罪人也姑以不暇為解者三年時屬王制肇新慎遴禮官而文昇之位實貳儀曹又進而為祠部長則其所以憂者愈急而思所以遂其樂者益切夫以愈急之憂而懷愈切之樂余懼文昇之志將懈而為斯亭之所誘也是故寓言於亭以廣忠告之義大凡水之源於泉而奫於泓者漣而清漪而旋澓不汩於物者性也其導而為江為河以通舟檝匯而為陂為澤為湖以資溉灌以阜百物以饒茭蒲菱芡魚鹽之利以養兆民於是清者激而為風濤旋澓者溷而為淖閼而水之樂有不得全焉其幸為吾子亭下之觀雖不濤於風不溷於淖閼亦且掘其泥而揚其波使之不得遂其清塓以埴鞏以石文以五材使之無所得以旋澓則不汩之真日以離而水之憂愈大矣是豈水之性也哉其勢則然也人之寂而順安而適與物偕樂而不役於物者其性也為之衣冠而縲縶之為之髙車文蓋而閑檻之使之舍已之好而狥人之欲則寂順安適之妙日以離而其存於應物之餘者幾希而人之憂愈大矣是豈人之情也哉其用則然也水之性奪於勢雖欲漣而漪焉有不可得矣聖賢君子之用於世雖欲獨遂其情之所樂焉有不可得矣夫其樂者難全而其憂者踵至是故禹燋湯短髮文王不康食孔子不煖席墨翟不黔突故曰樂天知命有憂之大者聖賢君子之謂也其偃仰棲遲不知所以憂而私便一身之樂者衆人也余與文昇乃道義數年之交非燕樂旦夕之好也故不敢以衆人望文昇而期以聖賢君子之事是故寓言於亭以廣忠告之義淨香亭記趙時春秦山之北麓為虢城之南泉壑之幽深者以十數而西峪為最峪之水源于其峪之西益窮而為山處其間沮洳汪漫以百數而東注于峪之口始得停蓄縈瀏之處以為迴塘塘之坻以為亭曰淨香者為最據亭而四顧南絙熊耳武關之山北渡即入數萬里洶濤之洪河東西通殽函開闢以來角爭之區秦洛二京往來之道其間世代之興廢人事之得失大者王侯卿相之所經營小者幽人隠士之所棲遲牧夫樵子之所奔馳而呼嘯欣然而喜戚然而悲愕然而可駭其變故之不可常必者以鉅億萬數而秦山之峪西峪之水流峙而不息者然則又當為其最古之人其號為英雄豪傑者衆矣然皆馳逐於聲利波蕩於功名力疲心倦無可柰何則又以其餘腐腥臊泉石之清幽舉其奫澄静徹之本性而圬汩之古今相尋以為髙是又不可以鉅億萬數矣亭之主人許廷議氏乃獨曰吾不若然吾少有四方之志故嘗欲借筯籌九邊之兵機折箠制百蠻之死命矣然而有得為焉有不得為焉吾適意而巳不能必其為也吾家世業儒吾又以儒進身儒與禪至不相謀而吾又悦禪吾之于禪也或學焉或不學焉吾適意而已不能必其學也吾亭有竹而塘有荷而杜甫之詩所謂風吹翠篠娟娟浄雨裛紅蕖冉冉香者適與吾塘亭契吾既悦甫詩而益信吾塘亭之先有得於甫也故以名吾亭云亭繫乎塘者也吾則無所不之也故吾之於亭也猶乎其兵與禪也姑適吾意而己矣豈必以為吾之所繫而固有之矧敢以其世味之餘腐而圬汩之也乎哉友人平凉趙時春得其説而樂之為之辭以銘諸亭曰亭之香兮子徳之芳兮亭之浄兮子徳之映兮竹實可以棲鳳凰虯螭偃蜷於荷柄兮嗟今昔之俊良孰委蛇大道以受命兮伸子之往而不柅其方匪直斯亭之最爽而子又其最勝者與郯莊觀音堂記趙時春吾嘗慕元城劉忠定公之為人紹聖黨禍久而自信益篤者公與陳忠肅而巳嘉靖甲申以舉子請婚於大名遊忠定公之鄉始熟公事又讀其語釋觀音經之刀尋段段壞者適外舅氏之堂有此經本遂從而細繹之所舉至衆然大要不過以無畏力忘情於利害而巳忠定本從司馬公學自誠而入非但忘情於利害者吾因此頗曉觀世音大義大類告子之不動心而其曰無畏者即告子之强制也是年始申大禮嗣是余登第仕於朝值郭勛等造大獄少師大學士楊公謀去大學士張公桂公而不克楊與桂兩罷去張獨操柄桂之徒夏給事權附於張以自救既迺建議更郊祀以浸漬引入嚴父配天之説遂與張相軋士大夫風俗一變獨縱横之術大行能如告子者亦罕矣庚寅秋吾亦以狂言考詔獄恩貸除名食貧無以自活又為縱横家困甚思逺城市聞南去七十里有郯氏之山郯氏久無後羣盜鄭本康惠等穴焉官軍討盪底定其税糧無所屬里甲困於賠納因共請吾治之迺稍芟林莽逐去虎豹始通道於白崖山之巔有泉泓焉其面正陽為板屋蓺茼麥以居之柞山木以市衣凡十年而大熟居者或井迺作屋三楹屋之前有峰焉下瞰百泉林壑幽美學浮屠人圓滿被草為菴吾時登禾稼於其側輙發其語悵然不能對問其所業則日奉觀音像與經而已吾因宿樹下取而讀之併法華在焉法華多文藻其質又不如觀音經也夫觀世音一言而已其經已自多而又况於法華乎老僕李子華樂嵗之屢豐而憫觀世音與吾常暴露也請於衆曰人柞一木負一石束薪以給圬者嘉靖旃䝉大荒落之夏觀音堂告成其制僅足容吾與觀世音而巳吾少而狂戅不自度量深慕孟子不動心之學年十四舉於禮部公卿貴人多樂與游而吾悍然不敢有所附麗獨思以一旦自見結明主之知以無愧於其職以伸其迂濶不可用之學既兩遷郎官再入翰林言其職事而俱得罪以退重思自愛其身以求無負於天之所予而其侣羅子唐子又各逺去獨與編氓日談干戈以興其好殺之心農夫固質樸可道又役役升斗之利卒隘吾意夫所謂觀世音者崛起西南萬里之外談笑夷貊之中能不以聞見利害動其心其視縱横子真奴僕與兹吾之所以不以其異于吾而外之也然吾之所以與之異者何哉彼以為妄而吾以為實彼以其妄不足動而吾之實自不能動耳吾方病彼説之多而吾之辭又甚焉者何也彼既以為妄矣妄不可言也而多言之是多妄言也吾以為實理惟恐説之不詳而辨之不至也多又何疑哉遂以兹夏端陽之日刻之於石以與同志者共焉思子亭記歸有光震澤之水蜿蜒東流為呉淞江二百六十里入海嘉靖壬寅予始攜吾兒來居江上二百六十里水道之中也江至此欲涸瀟然曠野無輞川之景物陽羡之山水獨自有屋數十楹中頗𢎞邃山池亦勝足以避世予性懶出雙扉晝閉緑草滿庭最愛吾兒與諸弟遊戲穿走長廊之間兒來時九嵗今十六矣諸弟少者三嵗六嵗九嵗此予平生之樂事也十二月己酉攜家西去予嵗不過三四月居城中兒從行絶少至是去而不返每念初八之日相隨出門不意足跡隨履而沒悲痛之極以為大怪無此事也蓋吾兒居此七閲寒暑山池草木門堦戸席之間無處不見吾兒也葬在縣之東南門守冢人俞老薄暮見兒衣緑衣在亭堂中吾兒其不死耶因作思子之亭徘徊四望長天寥廓極目於雲烟杳靄之間當必有一日見吾兒翩然來歸者於是刻石亭中其詞曰天地運化與世而遷生氣日漓曷如古先混沌檮杌天以為賢矬陋癡躄天以為妍跖年必永回壽必慳噫嘻吾兒敢覬其全今世有之死固宜焉聞昔郄超沒於賊間遺書在笥其父舍旃胡為吾兒愈思愈妍爰有貧士居海之邊重趼來哭涕淚潺湲王公大人死則無傳吾兒孱弱何以致然人自胞胎至於百年何時不死死者萬千如彼死者亦奚足言有如吾兒真為可憐我庭我廬我簡我編髧彼兩髦翠眉朱顔宛其緑衣在我之前朝朝暮暮嵗嵗年年似耶非耶悠悠蒼天臘月之初兒坐閤子我倚欄杆池水瀰瀰日出山亭萬鵶來止竹樹交滿枝垂葉披如是三日予以為祉豈知斯祥兆兒之死兒果為神信不死矣是時亭前有兩山茶影在石池緑葉朱花兒行山徑循水之涯從容言笑手擷雙葩花容照映爛然雲霞山花尚開兒巳辭家一朝化去果不死耶漢有太子死後八日周行萬里甦而自述倚尼渠余白璧可質大風疾雷俞老戰栗奔走來告人棺巳失兒今起矣死其在室吾朝以望及日之昳吾夕以望及日之出西望五湖之清泌東望大海之蕩潏寥寥長天隂雲四密俞老不來悲風蕭瑟宇宙之變日新月茁豈曰無之吾匪怪譎父子重懽兹生巳畢於乎天乎鑒此誠壹見南閣記歸有光嘉靖十九年余為南京貢士登張文隠公之門其後十年沔州陳先生為文隠公所取進士余為公所知公時時向人道之先生由是知余無從得而見也其後十五年先生山西按察副使罷家居久之而余始與先生之子文燭玉叔同舉進士在内廷遙見相呼問姓名甚懽知先生家庭父子間道余也因與之往來論文益相契間屬余記其所居見南閣者先生家在雲夢間而沔江漢二水繞之先生於其居為花圃中為小閣沔之勝可眺也蓋取陶靖節悠然見南山之語以為名每與玉叔讀書論道之暇攜之登閣逺覽而沔去南江諸峰絶逺實無所見姑以寄其悠然之意而巳一日天新晴而清浄無雲與玉叔凭欄忽見諸峰湧出樓觀層叠峥嶸靚麗久之而後散而實非江南諸山也余聞登州有海市而史稱衞州城既徙而故時城堞樓櫓浮圖之影皆於日中見之神理變幻不可知夫海旁蜃氣象樓臺廣野氣象宫闕雲氣各象其山川殆有是耶登州海市出於春夏而東坡以嵗晩禱海神一日而見之賦詩以自喜云重樓翠阜出霜曉異事驚倒百嵗翁又云潮陽太守南遷歸喜見石廪堆祝融今之所見又非海市石廪比也先生父子必能賦之余與陳氏兩世師門之誼又重以玉叔之請且又因以自通於先生而為之記云明文海巻三百三十五
