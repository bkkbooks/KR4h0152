body:
  text: 明文海巻三百三十六餘姚黄宗羲編記十居室聚樂堂記王慎中世之所謂樂者可知矣粉白黛緑雜進迭侍衿襦璫珮交於几席觴俎之間而不知夜之將旦則悦色者之所尚而夸者訾其内極意六博叫梟盱盧揶手交臂之頃車馬乘徒離合於一枰之上百萬為擲曽不足以盈其一睨則博奕者之所樂而豪者嫉其辟擊槊試劍砉然雷奮霍然風靡始陽卒隂術殫於角而勇於力神王而勢多變其樂進於技而以豪自喜不虛也有嗜圖畫鑒古玩物者過而哂之曰是何麤猛而近鬬也則發秘冢壞壁之藏旁搜而善購一珍一異聚徒縱觀以炫博而長價自以其樂在乎藝與能也又有譏其側者風騷自命之士矜才于形容盡態於藻繢此唱彼和騁竒競巧當其元本之冥思摸寫之妍狀可以廢食寢而忘昏旭彼鑒古者之所好蹴然退舍而知其不足稱矣儒者猶且稱之則樂之所至豈有涯哉西亭君築室以居業貯書數千巻百家衆技稗諧小説佛老異典莫不畢具其要在於六藝詩書之文晝誦夜諷矻矻焉竭其心思之所極恍焉而前疑窒焉而中悱意挫形頓而不敢休客非有事於斯文者不得闖其戸非但歌舞博塞技擊之以内辟麤猛見誚者無所干于斯室而玩物好事之閒適與夫絺繪律句才人一伎之工且以為壯夫所悔而不足為也當其覃精于一息之近而妙契乎千載之逺若古人之在而與之為酬酢客之以斯文至者攷證辨説窮浩蕩之倪而析杪忽之端自以為舉世之可樂者莫斯若也名其堂曰聚樂以書至清源山中乞記夫生于宗室富貴之家則醟於歌舞放於博塞技擊而不患乎内辟麤猛之誚以其居養所致然也有能鑒古自適琢句為工則可以自拔倫萃而為學士大夫之所道君所為樂乃在此而不在彼至樂之涯其果不出於斯堂之所求哉嗟乎是書也吾見夫讀之者之多端而所以致其樂者不一也得之者以繕性而失之者以溺心悟之者以反本而狥之者以滅質方其悦於博而耽於文則心愈溺質愈滅而愈足以為樂吾又安知是書之不為聲色之娯博塞技擊之靡而何以賢夫鑒古琢句者之所好耶君誠以吾説而自究焉則今日之讀固向日之書也今日之樂有非向日之所樂矣客之來者有逌然而忘於所知亦有瞿然而惑於所見者矣然後謂之能窮至樂之涯而不復為過者之所譏如是則請西亭君終日讀書於斯堂而勿輟大觀草堂記唐順之尚書西磐張公既歸老於家以書來屬余記其大觀草堂者曰願子為我言大觀之義我雖老矣而不敢不勉也蓋余嘗獲聞公之為人進無驚於寵辱而退無詘於隕穫躬盛徳之容而謙乎其若不足甘委順之節而坦乎其若有餘其幾乎古之與天游者歟竊意所謂大觀者公既已獨得之於心而人不能知而余也執器而不通於方曲學而不見乎天地之全是儒之陋者也而惡足以知公之大觀矧公之所謂大觀蓋得乎心而寄之草堂者也公之得乎心者既深乎其不可窺而想像乎公之草堂之景則其戴形肖貌露情獻態森然而萃以縱乎公之所觀者吾又未能即而登焉以觀公之所觀也而惡足以知公之大觀而又惡能為公記之雖然予未能登公之草堂以觀公之所觀而嘗登吾之草堂以觀吾之所觀矣方吾之心閒而無事以逍遙乎草堂而觀於魚鳥之飛鳴而潛泳烟雲之出沒而隠映融然若有凝於精爽然若有釋於神是以物無逆於目目無逆於心而心無逆於物一旦情隨事以遷勃焉而有鬬於是而心逐逐焉而目􅍃􅍃焉凡向之飛泳而出沒若有凝於精而釋於神者舉皆不知所在矣徐徐焉鬬解而機息乃始還而觀之則草堂向之草堂而烟雲魚鳥向之烟雲魚鳥也於是為之憮然而一笑嗟乎嗜欲有蔽乎其中則凡物舉皆得而匿乎其外物舉皆得而匿乎其外則雖與之游乎瀛海之表而騁乎坱漭憑虛之域亦窅然若無覩也而况於草堂乎夫大觀者通宇宙而為觀也故謂吾草堂之景非公草堂之景不可謂吾所觀於吾之草堂非公所觀於公之草堂者不可則願以我所觀於吾之草堂者而記公之所觀於公之草堂者以為公之能得其大觀蓋不蔽於欲而物不能匿也西峪草堂記唐順之靈寶陜洛之衝也環而山者以數十而西原獨當其僻處西原蔽秦山之南委蛇數百里散而藪者以數十而西峪又獨當其最深處峪口偪仄始疑路窮忽然中開更出異境茂林淺草森隂蔽虧水泉㶁㶁若驚蛇出沒草間其人鹿視而穴居可二十餘家於是許君廷議遊而樂之乃即峪口作草堂於其上仰而眺秦山俯而顧西峪烟雲竹樹隠見千態不下席而盡取之其勝又於是為最已亥嵗予見許君於京師君為人鬯達魁岸尤以兵自䧺余固意其必且為國家建萬里勲也一日與予論草堂之勝且曰吾將去而休於此矣余笑而詰之曰君不聞馬文淵昆弟之相笑者乎夫嵬才傑士其所寄意必於奔漰洶湧之川㠝岏崔巍之峰泱漭千里之野極世間險怪瓌偉超曠之觀然後足以饜其耳目而發其跌宕濩落不羈之氣若夫耽水竹之清幽䕃樹石之蘙薈此則窮愁枯槁之人漠然無所振於世而有以自足其樂於此夫固各自為尚而不能兩得也今君試料才氣與文淵少游竟何似國家且北收河南南繫交酋之頸假令據鞍躍馬今之人孰能先君者乃欲乘欵段優游閭里自比少游其寧可得耶三門之間洪河巨石怒而觝擊砰砰磕磕若戰鼓然百里之外有聲而殽函又秦漢以來百戰故處過而覽者莫不躊蹰慨然想見乎揮戈濺血虓虎喑嗚之䧺此皆險怪瓌偉世所駭詫且近在君衣帶間君何不寄意於此乃欲自託於寂寞背嵬才傑士之好而就窮愁枯稿之所樂此又何説耶噫嘻吾知之矣君居河上豈嘗受河上公語耶故曰養辨於其訥藏勇於其怯然則君之欲為彼而姑為此也其有意乎儵而蠖屈儵而虎躍則余不能窺也己任光禄竹溪記唐順之余嘗游於京師侯家富人之園見其所蓄自絶徼海外竒花異石無不致而所不能致者惟竹吾江南人斬竹而薪之其為園亦必購求海外竒花石或千錢買一石百錢買一花不自惜然有竹據其間或芟而去焉曰毋以是占我花石地而京師人茍可致一竹輒不惜數千錢然纔遇霜雪又槁以死以其難致而又多槁死則人益貴之而江南人甚或笑之曰京師人乃寶吾之所薪嗚呼竒花石誠為京師與江南人所貴然窮其所生之地則絶徼海外之人視之吾意其亦無以甚異於竹之在江以南而絶徼海外或素不産竹之地然使其人一旦見竹吾意其必又有甚於京師人之寶之者是將不勝笑也語云人去鄉則益賤物去鄉則益貴以此言之世之好醜亦何常之有乎余舅光禄任君治園於荆溪之上徧植以竹不植他木竹間作一小樓暇則與客吟嘯其中而間謂余曰吾不能與有力者争池亭花石之勝獨此取諸土之所有可以不勞力而蓊然滿園亦足適也因自謂竹溪主人甥其為我記之余以為君豈真不能與有力者争而漫然取諸其土之所有者無乃獨有所深好於竹而不欲以告人歟昔人論竹以為絶無聲色臭味可好故其巧怪不如石其妖豔綽約不如花孑孑然有似乎偃蹇孤特之士不可以諧於俗是以自古以來知好竹者絶少且彼京師人亦豈能知而貴之不過欲以此鬬富與竒花石等耳故京師人之貴竹與江南人之不貴竹其為不知竹一也君生長於紛華而能不溺乎其中裘馬僮奴歌舞凡諸貴人所酣嗜一切斥去尤挺挺不妄與人交凜然有偃蹇孤特之氣此其於竹必有自得焉而舉凡萬物可喜可玩固有不能間也歟然則雖使竹非其土之所有君猶將極其力以致之而後快乎其心君之力雖使能盡致竒花石而其好固有不存也嗟乎竹固可以不出江南而取貴也哉吾重有所感矣求志園記王世貞吳城之東北隅為友人張伯起園園當其居之後閣道以度入門而香發則雜荼蘼玫瑰屏焉名其徑曰采芳示呉舊也徑逶迤數十武而近有庭廓如名其軒曰怡曠示所遊目也軒之右三而楹者以奉其先隠君像名之曰風木堂示感也堂不能當軒之半然不敢以堂名怡曠者示有尊也軒之右齋以栖圖史名之曰尚友友古也齋之後舘舘臨大池中多金銀玳瑁雜細鱗名之曰文魚池所蓄也穿池而橋循橋稍西南為古梅十餘樹名其廊曰香雪言梅徳也伯起之言曰吾呉以饒樂稱海内冠不佞夫差之墟甲第名圃亡慮數十計即屈諸君指且徧亡及吾園者諸材求之蜀楚石求之洞庭武康英靈璧卉木求之百粤日南安石交州鳥求之隴若閩廣而吾園固無一也然至於旦而旭夕而月風於春雪於冬諸甲第名圃所不能獨擅而長秘而吾得竊其餘吾他無所求求之吾志而巳且不見夫都將相貴重用事於長安東者耶彼其於志若無所不之然往往人得挾其遇以屈吾志吾外若伸而中則屈甚或發其次且慨歎於所見而輻輳沃麗之地等之於荆榛鳥雀之區聞歌以為哭見樂以為憂而不悟其所自吾無所求伸於外然吾求之千百禩之前而若吾俟求之八荒之際而若吾應求之千百禩之下而若吾為之符節者此豈可與豪舉跡賞者道哉王子聞之歎曰善乎子之求也志則可與聞乎伯起笑而不答王子有間曰命之矣平逺臺記宗臣平逺臺在省城中東南閩志三山此即所謂鼇峰山也山固竒在城中尤竒宗子入閩十朔未登也蓋以戎故而客有好宗子者乃召宗子登焉凡幾折始上又折而東登鼇石臺天風髙揚萬象蕭瑟宗子於是仰而思俯而嘆也客曰大夫何嘆宗子曰嗟客乎嗟客乎客聞其説余恐客之投觴於地而莫余飲也夫閩者豈非記所稱東南巨麗哉家纓弁人詩禮農嬉於疇而商歌於塗也當是時而登厥臺焉髙山大川游雲芳草罔弗觸吾目也則罔弗快吾心也今何時也吾見兹臺三駐軍矣客亦東眺大海乎樓船組練隠隠起也南睇於江故里婦日濯錦漂絮其中者今健兒飲馬矣西瞻烏石蓋有鍛甲礪刃鼓笳鐃吹之聲焉北闚閭井則父老子弟被戎執戈者怨讟盈道也且千里之内亡者未葬瘡者未起流者未歸繫者未釋吾念之吾不知汗之淫淫至於踵也昔何以驩今何以悲昔何以靖今何以擾斯其故難言哉難言哉夫君子之謀人國也上憂主憂而下憂民憂者也今帝心常在萬里而民瘼充充之在吾前也方請纓枕戈不暇餐沐矣客乃欲吾覩髙山大川游雲芳草而嬉乎此吾所謂嘆也昔元臣據閩之險以抗我旅皇祖乃命樓船將軍從大海徑搗其穴空之帝謨燀赫日月同炳乃今䇿事之臣顧不能設一竒制敵而使倭人往往截海闚我此視皇祖諸臣何如哉吾嘆之實愧之也客於是起辭曰吾不能解大夫之嘆而大夫又安能飲吾之酒請大夫為客記之以示後之登斯臺者毋徒嬉此髙山大川游雲芳草而忘厥民憂也宗子於是采客之言以為之記清舉樓記劉鳳予居循郭之西左控河渠諸川匯焉四方之所走集也右招西南山經帶絡繹有若圜衞然間葺餘緒為樓北址名之清舉以藏古圖籍且以遊目放志焉請之司勲大夫記其事又為季郎諸君賦以張之于予樓侈矣顧予早馳騖俗間執細業已舎去從當世名公卿大夫㳺則志慕榮進甘顔色伺候時所向背逡次請謝與之上下且文法吏隨而裁其短長各以事中之安得肆吾意無所顧忌哉今返初服遵閭里求所游者欲相與恣睢歡笑俯仰傲睨自以為得矣然已變化不可概務為孅趣局促齷齪自喜謀權利結客任俠小者以文史玩弄㗖天下喜遊子弟其獲十倍甚者盛推轂世之賢豪權行州域伉烈暴强猶復盜處士名傲然自負此其經營附託仡仡苦身殆有甚於賣請阿意竊富貴者卒之身名俱敗顧得優游樂耶余自以不能於時晦跡空虛又安能降心從俗無所擇也夫龍所以能神化不測者以無所憑藉也鳳所以稱於靈徳者以不可馴畜也士所以輕千載而驕萬乘者以不嬰累於庸俗也假令為雲雨必階而登天翔千仞而未忘唼夫粱藻亦猶士假譽於鄉曲流連於舉任是何以超逺絶詣出則煇煌於當世處則沈冥要眇沒世不見而名稱無窮哉故古人之有陸沈於世混跡市人而屠狗雜處者雖不必匿身巖藪而故寥寥與世絶况其自以不用於時退且塵滓貴勢陵轢豪傑眇小才術蔑棄典文而邁往千載雖有希世之觀遐久之業尚不足勸而更復能論汚濁之事聞䙝昵之詞沈諂諛之態納竒邪之人無愛違已之性哉是以寧孤立不交一人不營一務逍遥於樊圃之間而志逸宇宙之外不越楹軒之内神棲風露之上羡門子髙之流日相與呼吸吐納御六氣之和服朝霞飛景意睨涘溘之表隨風往來使盧生輩亦且笑而不休其為榮適恬暢怡快固遺耳目忘心志泊然不知天地四方當斯時也何燥濕之能干寒暑之能入鄰於曠垠淪於窈㝠吾何以識其然哉故謂斯樓也雖在塵寰若縣圃增城之内登踐游眺若躡雲霧而笑語時出蕭漻間人之望此尚不知途之修逺曲直固息意於藩牆之下矣張君東墅記董份潯地小人衆民稠居而櫛比無閒曠之隙曠特在四野其東倚大道有廣原畮田益東頗有林澤之饒嵗時好事者毎多東游而予家潯東也曩予甚困時時行林澤間道誦其書罷即時與客取飲醉卧歌呼與游者相應樂也已而感嘆坐中欷歔莫知其所為者然好數往率以是為常其後仕宦京師陸沈金馬間多黙不自得毎思潯林澤之可游者積十數年乃得請告歸而居潯好事者益駕艇設樓斾多從鼓鐘笙歌招邀載酒為樂慷慨道故厯厯曩時事而諸公雅游輒授簡為文辭賦詩雍容甚盛當是時張君在坐予私觀其有翩翩之思焉會予告滿復治裝道由潯東泝北入都駐葢俯仰林澤久之與客别而去其後予入都而病每念未嘗不在潯東所歌游處也其悔之甚嘗與客言人强其性則怫而病滋辟之笱魚笯鳥雖日飾以芬餌饗以珍粒不如縱之湛淵任之林蔚也且既不可同日語矣乃者暫游淵而適蔚又復内之笱笯其情可勝道哉良久予病不已徐子者好方多竒素予與甚善乃從溽暑赤日中走數千里入都視予病病方瘥因從容曰楚人有云人之思故在其病予越人也其聲之越久矣今潯東諸林澤處何如諸游者今無恙不徐子為備道其處因言張君者最喜客慕游數為樂潯之東其自稱東墅也予蹶而歎曰嗟乎夫潯予有終焉之志向者將樂而忘老顧不早自定驅馳於塵埃車馬之間使張君得藉而有之誠不能無少望也予聞張君厭纖嗇好閒雅曩之所見其翩翩者不誣也夫人既己委質於朝此於魚鳥之性宜不自遂己張君年方少不為禄宦即其所性比之濯波清泠而負風寥廓也則東墅且屬之張君明矣徐子曰予行急張子則有言曰夫人所居不同其事亦異棲林托泉媚一丘壑以自榮者偏方之士也贊廟堂佐區宇攬四海以為度者達觀之情也今夫子上遇明天子下得任職他日得究其度使丘壑者有所庇而安焉不亦偉與而顧争勤於田墅之間尤矣徐子因挾一巻請所以贈張君予既髙徐子之義又美張君之言遂記其本末如此雖然予病不適用為我謝張君甚厚予當歸潯水之上與張君言於東墅矣石洲記許相卿海寧東北郭迤北可十里許市逺村深水漸廣林樾蓊然瀕水有洲甃以石而屋其上者徐氏也徐農於斯而食飲其水土更五世厯百六十餘年洲之屋猶故也至徐君時舉始有榜曰石洲以志夫承之先足乎巳無所待於外之意其子禾秀而知學與予遊而以記屬予少則聞太史公之言曰海上有神山曰瀛洲諸仙聖及不老不死之藥皆在焉葢嘗有至者業未卒而飄飄然有凌雲之氣似遊天地之間矣逮夫壯遊三十年足跡幾半天下都邑大家儵而赫奕忽而銷歇名田甲第有不能以終其身者顧夫石洲十畝之宫數頃之壤傳之五世而子孫方讀書修行以延之亦可多巳予老矣盛者所不願處而逺者殆倦也夫將反初服以從君遊農談石洲之上其許我乎明文海巻三百三十六
