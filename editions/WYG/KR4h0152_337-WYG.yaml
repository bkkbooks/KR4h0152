body:
  text: 明文海巻三百三十七餘姚黄宗羲編記十一居室巢居記沈鯉余西圃石假山中植巨槐四本於新闢蓬逕左右兩雨相對方時之茂清樾四合如幕斯張可避微雨其中間旁出老榦越道相及如伸肱援手者狀余命圃人揉而曲之約之以繩可容人卧起其上而其下可通行往來與樓居之狀彷彿也余時或有所厭苦欲逃去之則即此攀援而上凝眸趺坐習為養生家吐納引導熊經鳥伸率常至移刻乃罷罷而呼童子進茗茗既薦觴觴至則自酌自飲自歌自侑無所與賔客酬酢獨時有雜鳥百許翼繞相飛鳴如舞如和其名稱不可悉辨余時為引滿浮白而鳥不習余或睨余伸縮吐納然有瞿然羣起而去者余黙自愧豈吾徳有闕乎至人所居鳥不亂羣吾今乃見疑若此於是益習為養生之術墮體黜聰比於木鷄鳥至是始不驚散余時復以所啖餘臠散擲樹枝而噀酒招之鳥乃滋狎有攫余豆中之臠以去者久之且來巢吾樹髙髙下下比余而鄰殆將遍焉而余柴處其中央以羣兹羽族共稱有巢氏之民而倐然身世兩忘也無所羨富人樓居矣夫始吾未有斯巢也嘗即田中廬以居而牽牛者蹊吾田巳遊城市灑掃庭内邀賔客取適賔客或醉而督過之入室而室人交徧謫我吾所為厭苦而欲逃之也今去而遊方外棲此巢而羽族與處若其同類敢自謂習養所得可希至人頓感孚至此乎抑煉性柔形元同物我之理有在此而不在彼者余求之不得其説也姑為文記之耐辱子坊記沈鯉余涉世不謹既謝事歸猶有以惡聲加余者或謂予宜辯予曰莊生不云乎呼我牛也謂之牛呼我馬也謂之馬丈夫宜自處若此矣何必辯竟止不辯人謂余耐辱也則呼予耐辱子余自稱亦耐辱子云耐辱子老矣顧善樂又不但能樂也且好為兒戲居嘗植花竹成叢所居宫不二畝而山池臺舘隨宜布列者居强半焉復於其堂前建坊坊題曰天民逸豫自署曰總理穀熟鎮等處農事兼提督本宗學校詔賜還上農三品服耐辱子自題諸與耐辱子游者入其坊睹其所陳列知其真逸且豫也顧所署總理提督者不知其云何必異之以問耐辱子前解曰吾假此一戲耳曩吾備位秩宗國有大役奉璽書以行間嘗稱總理提督佹尊矣今歸在田亦不知吾之不尊也則擬此發一粲葢余不腆之田二曰穀熟鎮者其一也余方春課耕夏課耘秋督収入合千畝之衆披簑戴笠痔鎛植耔者無慮數百手皆惟吾頥指是視左左右右無敢有不共吾命者吾賞罰時行焉或時駕小車循行阡陌吾具吾上農服當軸處中無與吾分席而坐者有所號召罔不凜凜惟吾得専制之不可謂總理乎比事竣而歸則我倉既盈我稛斯積臨我池舘以逸以豫時復有暇則進我家塾子弟小小大大各隨其䝉師執經而前而吾據上坐有叩則鳴裒然先覺其諸子弟進退秩如也無敢有弛吾閑馭者吾綱紀之矣非提督而何古人云施於有政是亦為政奈少不自量濫竽仕路欲勉竭不肖之力以富教兩言效鉛刀一割而卒不能今歸在田以為家督使蒸嘗有備頫仰可資一門之内父父子子長長幼幼各安其所亦少盡此心耳然既歸在田而猶假通人之號以屈彊蓬艾之間者葢道可苟行則天池榆枋各自有適而性真無不可樂也豈有所慕哉故曰直假此一戲耳客聞而笑曰有是哉吾子之好戲如此也古之人有行之者矣其殆東方生之流乎雖然人生幻夢何榮何辱亦直戲焉耳矣作耐辱子坊記存蠧齋記沈鯉嵗辛卯余居室西偏構齋三楹儲古今書籍可數千巻縣額其上曰存蠧云存蠧者何余有書不能讀而蠧乘之以為食邑余弗驅也故以為名嗟乎始余壯齡力能强記而家故赤貧自舉業章句外則終日兀然面壁耳烏知宇内有何書可讀及後叨一官薄遊都下有常禄之入得稍購四方之篇籍廣其睫眥乃復以職事縈繫役役奔走雖有書不暇讀今幸解組歸遊神方外得肆力學問而髪已種種雙眸已眊轉盼忽忘雖有暇不能讀吾居然書肆一賈也可勝嘆哉今年夏積雨彌旬巻帙之上苔痕四溢比晴則命兩童子出而曝庭堦之下而羣蠧縱横腹皆果然今還視吾腹乃枵然也捧而一笑已顧見童子之色怒若于蠧有憾者且蒐而殲之余亟止之曰何為其然物成毁有時吾有書不能讀而蠧乘其隙為我一飽吾實使然蠧則何罪假令蠧不蝕而余終庋束之髙閣以待一再傳之後即不有魚蠧得無有人蠧乎盈虛消長往復有數雖强且知靡得而逃焉故積之太盛者未有不散失者也君子於此有所好不得不求求之得不必皆備苟備矣不必堅執為已有而珍惜之太甚葢昔右文之主嘗遣輶軒之使分道四出購山藪遺書藏之於金匱石室天禄文昌之署與奎壁並爛今存者幾乎而惜吾一室之儲乎所惜吾有書不能讀蠧雖飽不知味則此書之不遇而無用均也㫁簡殘編猶有存者或有待後人乎亦余所不敢必也莊生云火傳也不知其盡也此言夫六經常道不待儲而自足者也何蠧之虞其非是者蠧與不蠧任之而已殲之何為童子聞余言怒解為斂書還故處而蠧逸者半仍竄處帙中者亦幸俱無恙焉嗚乎人世之積而無用而終不免於人蠧者宜不止是編也余因是也悟乃援毫記之鄰壁記沈鯉余甲戌八月請告歸里先君子為予寘莊田二所其一在城北四十里而與吾鄰壤者為諸生管渭渭死遺一孤學林猶襁抱嫠某氏則遣使以田來鬻予初不知其意謂有所不贍也而渭故有常稔田二所稱饒富何為其然已探其微意則曰予為宦彼羸然嫠也牆覆壓境詎豈安業不如早見幾為愈耳予聞之愴然乃進其使者語之曰歸語而母若果為門祚衰不能多有田則鬻其他田而留其與吾鄰壤者吾力能庇若非是則先人遺業豈可輕棄若恐吾佃者之或軼汝也則吾當束以法使不敢拾汝一遺穗惟而母自擇嫠聽予果鬻其他田數百畝以安鄰壤至今而學林亦壯而受室矣予田卒無改於舊越十有五年戊子余謝宗伯事歸田而先君久厭世吾無廬可居也則假家弟之閒宅以居凡五丈即今亦玉堂是也惟家指甚夥率多有僦居於外者鄰嫠盛氏年逾六旬矣且無嗣亦時以鬻居為言予知其意亦管之意也為引子罕處鄰人之事慰止之盛至今安堵予居亦無改於舊然自鄰管氏至今垂二十年未嘗一日不稱安飽也余即東拓宅西斥畝何益即不拓不斥亦何損嗚呼昔人有躬耕畎畝恥匹夫匹婦不被堯舜之澤者及出用世卒能使鰥寡孤獨皆各得所而予乃無當於世今歸在田扶此兩嫠使皆無恙或稍存此意於萬分一乎抑有愧昔人多矣惟吾諸昆季子姓有曠然知足閔然以振窮恤孤為事而演予此意以傳無窮者是予志大行也予乃為述意於鄰人之壁域外三槐記沈鯉里居以藩垣為域域之外吾不得而享其有也惟吾居有竒者予性不耐暑方盛夏夕陽毒人極為酷烈而居廬不堪禦暑也適隣人盛氏以宅來鬻予不忍受鬻苐假其東界餘壤之直吾西垣之外者種樹資夕䕃乘凉其下盛許諾予復與約言曰吾假壤以樹壤而壤則樹亦而樹也畢吾生而已盛曰諾予乃以辛卯仲春宜栽種之日植佳槐三本髙俱可丈餘圍兩搤有半幸雨多及時無不活者葢一年如蓬二年如葢迨今三逾夏而樹隂迴合不見夕日時維六月羲和將委轡於咸池予兀處一室方鬱蒸不可當忽從間西闚佳景在彼則亟命兩童子舁一竹牀與一几安寘其下而吾披襟岸幘手一編而趨之矯顱一望樹隂周環如幕斯舉予不覺囅然一笑謂吾無一斤一斧之費而突起大厦若此乎少頃凉颸起樹端踰垣而至濯我煩襟若故人逺來灑灑出衷言相喻也已復有隂雲籠樹上方英英而白忽蒼然改色若深潭倒映在空也樹間有雜鳥可百翼乘風上下時往時來睍睆其音不知其為彼為此也予樂焉則更命童子治具招邀吾一二弟兄坐竹牀為河朔之飲酒後耳熱有賦歸來有歌棠棣有譽嘉樹者或擬我羲皇上人而吾獨感時事為泫然泣下葢吾同里巷諸公當年起大厦連雲治髙臺廣榭以鳴得意者何可勝數也今皆不知其踵跡之所在而吾託䕃於鄰人之尺壤以遂其茍安乃輒便得之而寛然有餘樂豈有常處哉今而後茍可適吾意不必皆已有為快矣悟迷橋記沈鯉余亦玉堂西直杏花舘前面地稍下過隂雨則行者褰裳頗為不便於是始運甓為橋以通往來且借為遊觀之適橋三孔上可布二席環四周飾以欄楯後徑直可尋惟由前出入者道迂曲不易辨故往來於此者多迷焉必徘徊審視之良久而後悟而余乃題其前坊曰悟迷云夫迷一也其有不同者則自外及内迷於入而由内達外迷於出也予數年來奔走世路問津問渡冗無虛日迷葢久矣今幸得歸而由是橋也以入吾室誠利於悟既歸而卧頗遂苟安回憶曩時問津問渡日寄命長年三老之手而不敢自必其身吾直欲裹足於斯不復循是橋出也則猶利於迷迷悟各有互也可執一論哉昔之論迷者有言家有言國其内外出入不同也獨迷於國者貿貿矣彼其遇九逵之道紛然多岐可安之乎九崍之坂曲如羊腸可終避乎縱不其然得無有載饑載渴靡室靡家乎語云千金之子坐不垂堂羝羊觸藩勢難退遂思深哉此尼父所為深慨於東西南北之人也夫安可迷而不返也而迷於家者則坐而飽食聚族而語無悲歡離合之感無饑渴寒暑之患其居于于其行徐徐身日游顓頊盤古與鴻䝉混沌為友也迷何為不可者今而後一寘足此橋宜辨其出入矣不睹諸忘者乎夫迷與忘之迹相似也昔有善忘者朝聞言夕忘夕睹事朝忘久之而親識骨肉無不忘也何不可者乃其子憂之而為求善方已之忘者頓悟舉數十年可憂之事一旦而擾其心胷曽不若昔者之忘之適也則怒而杖其子然不可復得矣吾今之迷得無類之乎苟愛我者慎無以治忘之方治予迷也予今且忘之矣扶杏舘記沈鯉余市㕓五丈中為亦玉堂三間兩旁隙地則各建小樓一所覆之以茅若兩翼然曰醉竹樓者其一也其西為扶杏舘云扶杏者何舘前有杏樹二株其一居左畔者兩榦駢起糾纒而上若相為扶也故名而直舘之前為悟迷橋時方春和升橋北望花開如錦籠舘其中若有若無隠隠一杏花村也昔人有詩云借問酒家何處有牧童遥指杏花村余每哦此句於扶杏舘中意有所慕則假為酒肆時以欵客其諸凡器用及詩歌圖畫之類亦無不摹倣市肆者前後兩楹書聯句各一皆市肆酒帘所書故余皆襲書焉而更取里巷歌謡庸工繪畫襍綴壁間以資捧腹而所儲欵客具則當室正中衡長槕一張可左右坐坐以櫈櫈俱可容數人而槕上所寘則僅柴竹箸一筩瓦器數事長頸大眼壺數把客至而飲進山蔬野飯而已間或招道童侑酒擊漁鼓歌方外曲使人欲翩翩逺舉也詩所咏杏花村者余不知何狀豈即此景象哉抑又有金勒馬嘶玉樓人醉者葢他所非吾舘也然可望望去矣余老且病足不及環堵外於吾童子時所嘗見杏村酒家者欲一至其地不可得今倣而為之於吾廬得日與親識兄弟酣暢於此情意綢繆依然扶杏其庶幾償吾夙志乎若更有盜飲甕下而至大醉者亦增吾杏林景色也舘人宜延之客坐恣使盡興無恡焉時已丑清明日記四鳩巢記沈鯉予成亦玉堂之再月旋即堂東偏隙地小構一室以為燕寢又閲月告成事方自他所徙居為適有鳩一偶亦遂來巢予異焉謂卜居之初有此物兆吉乎否與不可不詳論之也葢聞詩鵲巢之説曰鳩性拙顧又云居鵲之成巢何也夫天下無兩而立者也巧則巧拙則拙觀物於巧拙之際與觀人於清濁之間君子皆不能無疑也鵲雖巧豈能不拮据而成巢而鳩獨口不瘏手不瘃一旦乘所有以居葢鵲反不如者猶可謂拙乎鳩乎鳩乎豈其拙名而巧實陽外而隂内者乎物如斯吾不欲自覯也豈兆之佳者乃亟命涓人驅除之而鳩繞其巢飛鳴惶惶如泣如訴若將止予者予感而益異焉而為鳩原之則終亦拙者而已矣蓋大厦成而燕雀相慶此物之巧者也色斯舉矣翔而後集此物之知者也比吾之闤闠為大厦何限鳩不知巢焉而巢於吾室其卵翼可俯而闚也顧非拙而何予賦性顓䝉不喜涉世世之君子方將有討予之拙欲覆其巢者既徴諸色矣而鳩顧適吾以居乎是游於羿之彀中耳知巧者豈如是由斯以談則鳩非拙名而巧實陽外而隂内無惑也兆亦何不佳之有乃更命涓人謹䕶之而鳩巢始定自是予讀書其聲吾吾鳩呼雨其鳴呱呱如唱如和如戀如慕與吾有甚相狎者予不但無疑於鳩且轉自疑也向所以來鳩之巢者何耶世嘗言海翁忘機鷗鳥不飛鳩豈為是也者而來與抑暏予之貌一鳩也而不能辨與或吾室極拙且陋也遂以為鳩巢而附居之與抑聲氣有相感者與皆予所不能知也第嘗聞善為道者巧欲日損拙欲日益其損其益在所與處矣今以鳩之拙巢於吾室是鳩益一拙也以吾之室有鳩之巢是吾益一拙也鳩乎我乎我乎鳩乎其俱有益之象者乎予是以宜鳩日益甚乃欲賡鵲巢為詩也困而未能少頃假寐夢二羽士褐衣斑文儀觀整暇揖予而前曰幸托君之宇以庇予榦又借君之譽以白予心予既拜君之明賜敢不卒復以所聞詩云靡不有初鮮克有終予雖拙無似然猶有血氣心知焉君往昔葢不能無疑也今竊見主君之杖有刻予形者有貌無心比之木雞其徳全矣君倘亦有意乎今而後彼扶爾行予伴爾居相守一拙永不畔去其庶君三益乎予與若葢得君而四矣幸主君盟之夢語未畢蘧然而寤開戸視之閴其無人顧惟見二鳩之栖吾簷也嗚呼噫嘻我知之矣在昔有巢氏而後有稱爽鳩等五氏以名其官者疑羽士得姓之始與於是扁吾室為四鳩巢而賡詩以歌曰鳩來巢其音鏘鏘予卜居終焉允臧時庚寅穀雨日也放鶴記沈鯉予性極好清尤好觀物其在羽族則形質最清者宜莫如鶴矣予極心愛之顧非家常畜者不易致旁求之僅得一偶以寘吾緑林之軒瀟瀟交映予少有不快則扶杖往觀之飲且食有不甘則對之食飲客詣予予不能欵客則指鶴謂曰盍為若羽士留客無不大飲至醉者予于是彌篤焉時徧賛於客曰美哉暠暠乎其衣縞其裳𤣥其幹頎而頂朱裒然一竹林隠者也吾與若其相共死生矣興方濃適見一蜣蜋推糞丸轉輪而行逐逐不休予惡其穢也而敗予之興欲斃之不忍姑縱而舍之而一心惟吾鶴是好一日予逺行未歸童子飼鶴者不戒其常餉致鶴餒甚及歸入門忽睹其食穢也則駭而大驚以為吾老且眊也不能審視邪迫視之鶴也予愴焉神喪茫然如有失向對之食飲者欲咯之不出更悔其曩昔之徧贊於客者之甚無當也而恥之欲斃之不可亦縱之而去而向之推丸者則化為𤣥蟬矣方髙棲茂樹之林吸風飲露不需乎人世一粒兩翼飄然如霧縠微渺也不染乎一塵已復見樹上粘一殻肢體備具若尸解然者不知其所化圉人告予曰此所謂蟬蜕即曩時轉丸者之所變化也予黙悔其初幸不使就斃為嘆息無已嗚呼吾向來好鶴謂其質至清也今若此已惡於轉丸則謂其近穢也而今又若此物安可皮相哉予表而出之為世之持衡者存鑒戒亦因以自儆也五愚公同社記沈鯉宋四周皆河山迴環而中蟠奥壤數百里川澤之氣鬱而不宣故土風顓固而其人多愚考諸傳記則有若守株待兔拔苗助長刻舟求劒襲石為玉者是為古四愚也越數千載及我明萬厯中乃又有今愚公一人其行事與古四愚極相類然以其無不愚故不以一事成名也而第稱今愚公以别於古之四愚者而宋有五愚云古四愚先後生田間終其身不離其鄉土其所與皆其曹也故雖愚而無害於世今愚公乃誤羈一宦以北遊帝鄉與四方髙明才知之士伍而乃習其謡俗不能依阿其語言動静而與之相上下提其耳則弗喻鑿其竅則不通坦途在前而莫之知由伏弩在後而莫之知避如是數年卒以愚取敗幾不至兵在其頸也而不知所税駕有蹴而為之謀者曰人各有宜居亦各有宜偶子誠宋人也則亦復而所求而比徳者而與之為偶而庶幾無患而處非其據偶其所不敢望以罹此重困何為也今愚公聞言類瞿然覺者乃即日徒步歸歸而視其里之人雖顓䝉如故然靡有類已者必比徳而偶則惟古四愚乎而四愚公已遐哉邈矣可奈何於是始益徙宋城之東荒曰䝉昧之谷者受一㕓辟草萊而室焉室成而粉其四壁繪古四愚公故事於上而閉關却掃日迴翔徙倚審視之走趨之一有所行事必曰古之人古之人復時自語言吚啞若有所質對者食且飲必祭而先焉若與之酬酢或從間闚之未有不竊笑者也今愚公顧自喜益甚而曰此真吾偶乎特不言不笑耳因自稱五愚公之社嗚乎古今人安可相及哉而同社其取笑宜矣雖然竊聞諸先民志苟同道茍合雖越千載旦暮遇之也志不同道不合比隣千里也今愚公之與四愚者雖生不並世乃其鶉居而鷇食有貌而無心則固同裯也而渠且圖其形列其事與共處一室而朝夕目在焉安可謂非偶也然而無血氣心知無得失利害與是非毁譽以生其憎愛而兆其瑕釁也則可全交也彼向與髙明才知者詎不亦相得懽甚乃其臨得失利害與是非毁譽之小小拂意也能使不畔我去乎不被我以兵乎比是以度則友知不若友愚也友貴不若友賤也友今人不若古人與稽也貌而言貌而笑不若其不言不笑也今愚公置偶若此者豈有所懲哉即以稱同社何不可葢自五愚公既結社之後有復要今愚公為帝鄉遊者今愚公輒揺首閉目誓裹足不出其里社以輕負吾偶而予惜其始而誤終而得不逺之復也而嘉之為作五愚公社記以告夫宋人取友者而諱其名氏不書時屠維困敦攝提𤣥㝠之月也愧軒記顧憲成昔柳子厚落職永州其所為文辭往往有無聊之色至如蘇子瞻又何超然自得也其詩曰日啖茘枝三百箇不妨長作嶺南人可謂知所處矣予竊惟順逆時也窮通命也君子素其位而行不願乎其外何則以憂臣之事君猶子之事親也臣不得於君子不得於親所宜日夜省愆補過兢惕以將之誠懇以格之動心忍性增益其不能以俟之何則以憂近嫌樂近盈是故柳既失矣蘇亦未為得也雖然是二子者固有説焉子厚倜儻負竒有經世心其暱於叔文等非直冀富貴而已一旦被不祥之名以出將何以堪子瞻髙曠拔俗不能下人人以故争疾而中之非必上意也若是者曽不啻浮雲之過太虛而何足以介於臆然則子厚之憂子瞻之樂並自不茍耳且非獨此也子厚誠不勝無聊卒能發憤淬礪列于不朽與韓昌黎並驅則亦可以洗滌夙垢用自愉快消其窮愁子瞻豈不稱超然哉而忠君愛國出自天性顧坐戅直數賈罪俾讒邪得氣重貽主徳之累則黯慘懇惻殆有甚焉者矣此又以知子厚之憂未嘗無樂子瞻之樂未嘗無憂非恒情可得而測也予無似自度去二子逺甚敢謬附於憂與樂兩者之間惟是奉譴以來自監司而下卒儼然而客之不及以政其州之耆老子弟顧以為是父母我也一切供事惟謹而予靡毫髮報塞間嘗與諸士有所揚㩁大都不離於訓詁非能益之也於是乎歸而求之六尺之軀猶然故我徵發囷衡總歸鹵莽又靡毫髮表樹怠其職而勤其享據其名而隳其實有愧而已予考州乘往莊公定山亦嘗謫於此甚有恩徳至今人能道説之若焦泌陽雖貴在日月之際莫之問也得失之鑒昭然甚明予將奚居哉因顔之曰愧軒而為之記水居記髙攀龍漆湖之干有洲焉可二十步三分贏一以為廣其外池周之其外堤周之其外湖周之又其外山周之所謂軍將漆塘諸山也主人即洲作居以水為垣豁然四達主人偃息其中以水為娯泊然自得或憑軒而眺或隠几而瞑或曵杖而遊目之所赴意之所遇魂魄之所安無非水也居久之於是主人閲日月升沉雲霞起滅草木榮瘁禽魚去來與四時百物相代謝於一水之間而忘乎其為我也居又久之於是主人且宅天宇之寥廓餐元和之膏潤乘浩氣而翩􅗁上下於無窮之門而忘乎其為水也或曰子之樂微矣獨矣主人謝不敏曰夫造化者固逸余於是夫吾請問之及命之泰筮得節之兑其卦曰水澤其辭曰安節亨主人莞爾而笑乃歌曰可以樂饑泌之洋洋兮所謂伊人在水中央兮可樓記髙攀龍水居一室耳高其左偏為樓樓可方丈牕疏四闢其南則湖山北則田舍東則九陸西則九龍峙焉樓成髙子登而望之曰可矣吾於山有穆然之思焉於水有悠然之㫖焉可以被風之爽可以負日之暄可以賔月之來而餞其往優哉游哉可以卒嵗矣於是名之曰可樓謂吾意之所可也曩吾少時慨然欲遊五嶽名山思得丘壑之最竒如桃花源者托而棲焉北抵燕趙南至閩粤中踰齊魯殷周之墟目觀所及無足可吾意者今迺可斯樓耶噫是余之惑矣凡人之大患生於有所不足意所不足生於有所不可無所不可焉斯無所不足矣斯無所不樂矣今人極力以營其口腹而所得止於一飽極力營其居處而所安止几席之地極力營苑囿遊觀止於嵗時什一之托足耳將焉用之且天下之佳山水多矣吾不能日涉也取其足以寄吾之意而止凡為山水者一致也則吾之於兹樓也可矣雖然有所可則有所不可是猶與物為耦也吾將繇兹忘乎可忘乎不可則可樓者贅矣明文海巻三百三十七
