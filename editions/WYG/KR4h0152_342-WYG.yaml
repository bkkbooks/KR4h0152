body:
  text: 明文海巻三百四十二餘姚黄宗羲編記十六紀事記女醫李東陽京師有女醫主婦女孩稚之疾其為人不識文字不辨方胍不能名藥物不習於炮煉烹煮之用以金購太醫求婦女孩稚之劑教之曰某丸某散某者丸之某者散之載而歸人有召者攜所購以往胍其指炙其面探藥囊中與之雖誤投以他藥弗辨也然而婦女之愛其身若子者舉其軀付之無疑焉幸而不至於喪敗捐榖帛金珠予之不少吝其恒喪且敗者曰命也且傳引譽之於隣里而不足則譽之鄉黨而不足則又譽之婣戚識知之人隣里鄉黨姻戚凡識知之人有疾者皆樂而求之幸而不至於喪敗則又引譽之其喪且敗者則又曰命也非女醫之所治者雖名家術士未嘗信之其彊而治之者雖治亦弗之貴也其不幸而喪且敗者則悔且吝之矣曰不用女醫之過也雖士大夫家亦不免焉其愚不明亦甚矣嗚呼豈獨女醫哉記女巫李東陽女巫者主呼召鬼物問吉凶禍福祛疾病凡疾病者女醫不能治則之焉女巫華飾盛服或披髮手刀劍自試以神其不能傷或衣錦衣腰數十鈴跳梁呌號或嘯以呼鬼且至則呼先姓名曰某為神某為女神某為祟某為禍可禳可除惟令之從祈而聽者曰某之先誠有是誠有是或稽首伏地不能起願殺雞澆酒化楮以為謝葢人之死者無有不為神神者無有不祟且禍焉者也又令圖其神之形於家以祀以禱乃棄毁其所祀之主而鬼其親之身若是者家有之焉有所喜則召女巫至鼓舞號噭以為福有所憂患則因以除之雖湛溺老佛亦未有若是甚者卜巫而下弗論也彼女醫者予恒慨之若是者將何如耶夫女醫者不過殺人之身而巫乃能䘮其心此其害又有甚者人不自愛其身又不有其心其愚不明又甚矣嗚呼又豈獨女巫哉秘録李夢陽初詔下懇切夢陽讀既退而感泣己嘆曰直詔哉於是宻撰此奏葢體統利害事草具䄂而過邉博士㑹主事王守仁來遽目予䄂而曰有物乎有必諫草耳予為此即妻子未之知不知王何從而疑之也乃出其草示二子王曰疏入必重禍又曰為若筮可乎然晦翁行之矣於是出而上馬並行詣王氏筮得田獲三狐得黄矢貞吉王曰行哉此忠直之繇也及疏入不報也以為竟不報也一日忽有㫖挐夢陽送詔獄於是知張氏有本辯矣張氏論我斬罪十然大意主訕母后謂疏末張氏斥后也掌詔獄牟斌牟斌問曰夀寜胡不指其事實羽翼予曰慮對耳斌曰我能據事實剪厥羽翼奚對焉獄成牟斌叅之其畧曰原情應詔論法亦違而渠云十罪者悉置弗入奉聖㫖李夢陽妄言大臣姑從輕罰俸三個月此十八年四月十六日也居頃之龍馭上賓矣痛哉何忍言何忍言太醫院使呉釴高郵人也謂我曰上崩之明日釴往見一近侍閹㑹閹挈其白綾褶子出褶子自肩以下血淋淋未乾也閹迎釴以褶子泣曰此口鼻中血也釴相與泣問故言上氣絶時閹負之自寢出云已閹收淚謂釴曰怎更能得此聖明皇帝釴扣之閹曰前李夢陽事知否釴曰不知閹曰上初無柰夀寜軰逼何金夫人又日在上前泣訴不平上欲借官人每力一日朝退召三閣老上問曰李夢陽言事若何劉健輒對曰此狂妄小人耳上黙然良久謝遷對曰其心無非為國上頷之曰然㑹科道官交章入李夢陽由是得釋然釋之日金夫人猶在上前泣訴求重刑上怒推案出竟批止罰俸三月此等皇帝能更得否言既二人相對大聲哭而尚書劉公大夏曰釋李夢陽時㑹上召我言閹軰事因遂及李夢陽事上曰朕初欲輕譴此人而左右者輒乃曰輕莫如打二十放了已顧大夏曰汝知渠意乎大夏叩頭對曰臣不知上曰打必送錦衣衛渠拴關節打之必死也於渠軰則誠快矣如朕殺諫臣何正徳間予至江西則見都御史艾璞曰璞往為光禄卿故事光禄寺有攅盤云攅盤者供近侍閹者也孝宗末尚儉節斯格不行矣而一日未申間有㫖趣辦攅盤百餘衆驚愕辦矣久不之取也例辦不入卿不出璞守至昏黑東安門將下鎻矣一老閹來曰官苐出璞於是倉皇出明日入至寺寺閹耳語璞曰知攅盤否璞曰璞何由而知也閹曰昨夜上葢逰南宫云皇后皇太子金夫人從而二更時召二張自東安門入璞曰何事閹曰上和解二張耳為李主事璞叩詳細閹不答而予因記往錦衣百户郭勲曰上逰南宫時二張在入侍酒中皇后皇太子金夫人皆迤邐出逰上獨召大張促膝語左右咸莫知聞苐遥見大張免冠觸地謝云予始不甚信今以艾公言質之符矣孝猿記李承箕廣東之某鄉猺人嘗樵於山見黄猿忽自樹墮地死一黑猿從號鳴不止人往來於其側逼犯之了無懼乃子母猿也猺人取以歸投以果物皆不食而益號鳴不已猺人揣其情致其母之皮於前則亟趨而抱之且號且食衆亦莫不憐之於是獻之憲長陶公戲下告以實公命試之果如其言云李承箕曰行一不義殺一不辜而得天下不為者仁人之所不容已也漢王陵之母死於楚陵卒附漢以成大功在母知大義割至情誠哉其為賢矣若陵者獨何心乎成功止於圖名吾寜殺其身不忍棄其親猿之孝明明也又嘗聞昔之下蜀人嘗取一稚猿猿母隨舟奔走而下數百里擲身舟中以死剖而視之腸寸斷矣則猿之愛又明明也夫猿不畜於家無詩書禮樂之教與豹狼狐等耳人徒知其能吟嘯風月又惡知其性之足以感夫怨臣屏子於怪風厲雨中又烏知其性之足以感夫怨臣屏子之所不足者有如是哉其在白沙石翁過楚雲臺為予道之且曰是猿若能知人語雖教以孝經論孟節目且能不違其内無雜也塼墉記謝復土其墉遇水則崩石其墉遇火則裂求其歴水火而安堵如故者其惟塼墉乎夫塼乃煅土為之故其性耐久非土石比也予家東鄰泮牆先是限以土墉至永樂辛丑則蕩無遺矣先大父嘗為此懼以石易之自以為悠久之業也成化癸已災石皆缺裂其尤破碎而不堪植立者始以塼易之時邑大夫谷山王侯深偉其事惜未能遍易之以塼也夫自國初至今甫百餘年吾墉已三易矣頃因事往蘇浙訪古遺踪凡幾經兵焚而塼墉猶有存焉者則土之與石石之與塼其歴世久近較然矣丁未冬家君命予兄弟者即西山之麓築書屋五間環屋葢欲塼其墉而封之將以圖不朽也先期募陶人煅土為塼輦而至於其所尋井其下旋入沙土築而實之其稍虛處則釘以木楗始安石其上縱横布塼於石虛其中塞以瓦礫和以灰泥以次疊而崇之其始四五層塼皆眠置次則一眠而四立又其次則五立而一眠焉其上四層亦皆眠置以瓦覆之既而煤其外以禦風雨之蔽素其裏以通户牖之光門其東西以便出入徑其北以履園地之勝且以輔吾墉焉其制上鋭下方廣尺有四寸高二丈二尺有竒其右高處視東西榮周圍十有八尺起工於𢎞治戊申二月初吉夏秋大旱罷其役嵗十月既望始訖工凡二百有八日以工計者八百以費計者百餘兩勤勞朝夕與匠氏相處者吾弟嘉也供使令者仲子勞也朝夕環甓而胼手胝足者黌與夢也匠氏歙方昶而記其事者西山居士復也其有缺壊以時修理而至於堅且久者則尤不能不望於後之人也因併及之一笑山雪夜歸舟記張寜方洲草堂叠石為山山之上有蒼玉峯東垣柱頰峯宿雨岩滴露岩歸雲洞蘭雪坡茶烟岫咏月橋卓筆礐洗硯泉映山池皆鑱石刻字周植小檜梅竹雜卉高曠未滿尋丈而欲擬諸大山可發一笑彼山之大者非已所有亦非草堂所能貯此山可貯而有以其能小也山雖小而氣象景色生意畢具庶幾一拳廣大之意則亦自有可喜而笑者在名之曰一笑山其北有舍南向深僅及尋而横廣以倍其上環竹為覆篷仰飾粉素牖户内外皆墁堊一色通明虚白恍若一舟寄泊於湖山風雪間自念平生薄逰江海超然順適者凡二十年早以衰病還家休卧蓬室譬諸剡溪夜泛茍未及門而遽迴則歸興當復不減名之曰雪夜歸舟總七字而揭諸簷楣所以志余之自得也傳李景瓉事張寧予初不喜人談相命自謂禍福利鈍本無先形倚伏之機固亦在我耳何以術為余之有是言聞者亦相舍去而相命之士無留跡於余庭者正統丁卯隨計北上行江湖中聞李君景瓉善子平術言人禍福利鈍皆可閲實心惑焉未暇求也及甲戌登第榜中皆盛稱其能競相延謝始今侍御魏孔淵訪景瓉於太常官署索余二人始生嵗月未幾果驗余始心喜之知世之固有是術也相與傳致其事於江君元勲勲時方觀政大理將待補左右寺缺員叩景瓉請所許與應聲曰五日内當衣繡矣他無庸也江以遜格不及笑其妄後四日以變例授監察御史丙子冬刑部郎中歐時熙邀余飲景瓉酒酣以女婦一人生辰謂之率然語曰此婦生當從貴然今以血疾死已時熙撫掌大笑詰之則其故妻因産而没數年矣戊寅中秋元勛孔淵過舍㑹景瓉自山東來舉酒相屬歡如平生慰勞之餘試以四人同生時月小異者難之則侍御公貴項憲副藎臣莆田尹李宗浩郡學生某也景瓉黙良久曰皆貴人一死一司憲一登科補外一請舉未成下三人皆竒中獨公貴以䘮服居廬未有他故疑其詞氣太逼後一月得南中報書云公貴以是月就木益神其術初刑部尚書陸公為方伯學士吕公為通政叅議禮部侍郎李公為學士時景瓉皆以今所居期許無一爽者其識鑒精切大率類此為人疏豁善吟咏閒居服大布衣著方巾作西江書生態眞若無所取材至於酒酣興發雖問答累數十人言論如流初若不經意緒而條理畢具百折不窮要其所發未必盡合子平之書而旁駕曲出動極理致莫知其所自來豈其人天分高絶今以經術推演之妙而假是以立名於人乎哉聞其初以詩經應舉復賢良方正應薦一皆失之斯其所謂命矣而復皇皇焉不肯自已務將有得而後去豈其明於人而不明於已哉夫既知老而有得則少之時不必求也而嘗求之知命者固如是乎哉是不然天之於物有定者焉理與數未始相違也每觀景瓉論人雖一二弗驗則曰是亦命爾未嘗實其説以求通於其人繇其所自處觀其所處人則景瓉之學豈不眞知禍福利鈍之原者子平之書焉足以求景瓉哉是其言雖多不驗猶足考也况重有驗耶宜士大夫之喜景瓉者不獨余一人而止也壺中丘壑記周瑛鎮陽有怪石禹貢所不載者𢎞治庚戌夏季弟敬叔來視予一日入後圃循讀騷臺而東見有礌砢伏莽中者發之皆怪石也告予曰兄癖類柳州性好山水藉此為山凡諸形勝可不驚逺陵危而得之矣予曰善乃稍稍為正中峰分左右麓伏者啓之滿者虛之對峙者差互之直往者迂迴之於是立者為峰側者為厓深者為洞空者為谷復取蘭菊竹木分植上下然後歐陽子所謂鬱然而深秀者次第而成山山成復杵地而窪之覆水其中命曰勺湖予曰此非誣也季弟曰世固有以小為大者越人賈汝易嘗言其郡有秘圖湖僅大如椀此之為湖孰曰不然復命家僮縛茅為亭取蔽風雨告予曰昔黄龜齡嘗記其第所謂笠亭者此得無近耶他日予登焉見夫所謂山者微尖寸碧掩映林麓宛然如對太山華嶽又見夫所謂湖者輕瀾淺波拍滿涯岸恍然如臨震澤洞庭因題曰壺中丘壑進季弟而告之曰夫天下事有實體可據者是謂之真無實體可據者是謂之幻世有以幻為真者亦有以真為幻者以真為幻此妙識也妙識入於無故不有其有以幻為真此俗識也俗識膠於有故不知所為無者然此二者為説皆有非也是為有所纒繞强自排遣耳君子則不然君子之於天下也以天下之理應天下之事其中廓如也季弟作曰因丘壑之談而得處世之説請書以為記月華記邵寳已卯中秋之夜月踰午矣有言其光之異者開戸視之則見夫月之外有黄赤二暈暈之外祥雲絢爛五綵五色紛披輪囷互映旁射千竒萬麗不可名狀月在暈之中清虚相涵丸如其圜如懸如其麗如浴如其旋如鑠如其輝如濯如其潔如其輪廓若加而大焉凡一圍許少焉有朶雲來掩之漸曀而散月乃復故葢吾華氏女言如此予嘗聞言月華者人人殊今於是獨有得焉月水之精也秋之氣於行為金秋中則金盛金盛則水因以滋故於望也受日之光於他月之望為尤重月之華日為之也是故其望也倏其華也忽不然水隂物也金亦陰物也烏能動盪騰躍如是也哉是日久雨初霽酉刻復大雨震電亥盡稍霽尋復雨至是乃大霽僊應圖記韓世能不肖世能藉庇先澤官翰林十九年而陟亞卿又七年始以考績䝉恩贈祖至厚幸已顧祖先遺像舊失於家無從追補念此日夜心怦怦也所善友周秉忠氏精繪事又能為人召僊貌像久請未許丙申元春潔誠致懇乃許以二月初吉舉事法當先期齋戒禱告至十日丁未設壇陳供於延真小閣葢寒寓之三層樓也是日寅刻肅周君入一見語能曰此来有異香隨車入宅意公精誠所感神必至矣能謝不敏辰刻到壇作法命能手緘素紙一幅書求賜言於封上置僊壇送焚符走檄周測之曰今日之僊宜至自未公苐存神注想坐層樓中候之俄有三白鶴飛來壇所忽自三而五而七而九而十二摩空耀日迴翔久之其時瑞雲繽紛可摘也觀者揶揄奔告驚喜能端坐及未僊果至矣劃然有聲擲果空中并早所緘原封飛至能跪受之僊語周云韓學士多禮且云䕶法神至者衆周對言如嚮為僊法具於中堂應之啟視所封則雲烟滿紙如前題云見者驚艷謂此廼無上法書匪乩仙所能成也周君遂謂重扃壇所静俟庚戌兩日内用其言覔得舊妣二舊像往事如見矣聚族羣需時至啟扃則壁間所粘絹已畫成祖像衣冠笑貌儼若生存不爽毫髮綵繪鮮妍所餘丹粉諸色染浸杯水非人間有不知何來圖上復有題句神采煥發子孫見者慟哭且愕且喜左右親舊皆雨泣羅拜嘖嘖於戲雖使軒后遺弓孔壁出經自能視之孰可當此者乎淑人兩像再託周繪克肖宛然實由神助竒哉靈哉靈哉奇哉考之仙傳古惟吳道𤣥幕墨成畫極其神妙不聞其書清臣大師萬仞縣崖丹書飛度世謂神仙渺茫術家變幻難憑而無用之言未然矣能何幸身遇之獨所過䝉忠孝之許省循實切冰淵謹勒貞珉奉藏家廟俾嗣世子孫無忘黽勉非敢以示人也秉忠名時臣號丹泉子家有黄芝出地白鵲來巢之異信參靈入妙執術非凡品云譙樓鼓聲記祝允明居卧龍街之黄土曲北鼓出郡譙聲自西南來騰騰沈沈如莫知其所在嗚呼鳴霜叫月浮空摩逺敲寒擊熱察公儆私若哀者若怨者若煩寃者若木然寡情者徒能煎人肺腸枯人毛髮催名而逐利弔寒人惋孤娥戚戚為天涯之薄宦嶺海之放臣雪竇之枯禪沙塞之窮戍江湖之逰女以至惸孽背燈之泣畸幽玩劍之憤壯俠撫肉之嘆迨於悲鴉苦犬愁螿困蚓且鳴號不能已嗚呼鼓聲之悽感極矣嵗庚戌五月十八日丙戌聞之以為記興寧永記祝允明昔者夫子之稱水曰美哉水洋洋乎水之美能濟物也澤百谷煦羣動利舟楫飪鮮食濟之庸無涯唯田功大焉使無水無稼絶飲廢粒人物且盡舟楫焉往興寧小邑一陴不可舒舞䄂然四郊皆平疇千山鎻合民稼環堵中水出山為泉四壁雜下曳練縈帶信土分走注而為溪廣而為湖障而為陂塞而為塘瀦而為潭通而為河砂而為灘涉而為渡穿而為池皆有濟也而農之利不啻十九自其一源一流游阡泳陌涵禾潤壤灌沃滋䕃達自然之才以為庸者動越千畝見者徒覺其或平渟而静或奔湊以勇與物曠然無情苐澄懐爽氣一暢耳目而未覺其恬行黙運輔吾烝人尺浸萬鈞力也其或髙卑勢違乃稍助以人力輪而挈之澤乃亦罔缺凡水之力大小必與田稱葢凡兹邑之水勺勺滴滴無不濟人者勲莫與之京也視他邑或水踰土功病参半若全病者害至倍蓰焉夫海之鉅江河之逺殖財利涉事狀信雄濶能無墊溺之𤯝歟唯兹邑之水無小無大靡不有善無害育萬生口甚矣乎美哉洋洋者歟然民以私決壅利已病物以起訟者每不免嗚呼井法不存溝洫亡制水克恒濟人人有弗克用水悲夫予既美水功又傷其局於新域而弗溥又傷夫人乃有更弗克用水聊列焉以颺於其邑之人明文海巻三百四十二
