body:
  text: 明文海卷三百四十五餘姚黄宗羲編記十九紀事盜記羅洪先里有二人居者盜十餘人夜踰垣拔其扃揚揚入室取貨器二人覺而逐之盜為四方音以自混若官府虚喝然者曰咄敢作聲聲出死吾手下二人驚走升屋號曰盜滿吾室矣鄰舍聞之大譟出羣盜方逃余鄉極淳厚有保伍約三四十年無刼掠事間有狗䑕行者不過穴壁探囊聞人聲急外走惟恐踪跡及之故竊盜必不以聲以聲相撼自今始於乎不已怪乎彼豈見世以四方音虚喝者萬一有漁獵其間乎昔乘人虚而今不掩其寶乎黨與扳縁之者衆即無敢與敵乎審若是是吾鄉見竊於淳厚也其久而盜固有化之者矣今虚喝者衣冠其都吾黨之士且以四方音媚焉逺近望之有如神明不可測乃今為盜所窺盜亦大黠矣哉雖然使聞譟不善逃則其虚喝實自敗嘻亦險矣為吾黨者其愼為四方音割圃記羅洪先癸卯冬余為芸館西南有圃出彭氏以葬其祖敏敬而復售之李李以償余明年冬將垣之彭請改墓而病於匱余悲之曰古之王者掩骼非獨布惠亦以哀吾同類也帷葢之義至於犬馬盡然况人乎且彼昔主圃者圃不期其他適也今之為物主者尺寸而較之表衛而疆之契約而籍之曰無使有侵軼哉至其蕩而他適也固不出於所患而出於所遺之人彭之子孫是矣彼以身託其地而子孫旦夕居守之非若蓄長物也然且不自保而再易主况其勢逺踪疎取盈而務廣者乎吾既為彼悲又因以悲世人也向使非其人不免於水火焉溝壑焉不然則踐蹂而鋤治焉又不然據所售而垣焉縱不去其故遇嵗時觴酒豆肉邱壠之禮子孫不得而享也不得享則於心必重割茍挈尋丈而損之所損者圃耳視輕重何什百也然不聞有豫待之者不已忍乎吾又幸易主之未再也古之言曰死則擇不食之地葬我其達焉者固如此是以賤其身而身存逺於利而利久不眤榮勢不居貴竒不示人以可欲不據人之必争自不及於難然彼無知不可語此矣非後人之鑒哉於是割墓地垣外俾其子孫主之其傍不可畦必免於他適復為記識後人無與彼争而思所患焉即吾之遺矣戰馬記羅洪先王䕫齋公禎濟陽公孫也濟陽死靖難公死賊獲贈於朝任一子廣吉水稱忠義家莫過之至其戰馬事有足為世戒者始公以太學生除䕫州府通判纔五月㑹荆襄賊石和尚流刼入䕫焚巫山縣治是時同知蘇州王公受牒捕賊性柔怯而險猾故託疾不敢出一兵公忿忿面數之曰汝食朝廷禄所主何事忍委赤子餓虎口耶即代勒所部民兵晝夜行至則巫山已破賊方聚山中索擊之殺渠桀三十三人餘盡遁乃行縣撫傷殘招潰散久乃得歸居三日賊復刼屬邑大昌公促王王又不行而瞿塘衛指揮曹能柴成兩人與王素黨結避禍多方詭辭庇之且激公曰公誠為國家出氣力肯慨然復行乎公即聲應曹柴兩人故酌酒賀更許以身相翼實為脱王計公即日勒民兵夾曹柴兩人赴之與賊夾水陣已而麾民兵畢渡趣戰曹柴望走公陷圍中自寅入申人馬疲誤入淖田不得脱賊欲降之公大奮罵賊怒以刀斷其喉及右臂墮淖中馬逸去時成化丙戌五月九日也始公赴大昌道宿木商家商故新淦人且稔知賊不敵不敢言是日將歸有物嘯於山者商驚祝之曰為王公耶果爾當三嘯止如其言商宻與家人負簀往尋亂尸見衣白紗半臂者公也載簀上令不深没自死所至府三百餘里馬奔歸府門闔長嘶踶其扃若告急狀守者納之血淋漓毛鬛盡赤衆始駭公已死而賊猶不解後死之二十五日子廣始隨木商往殮之面如生不以暑腐然貧甚不能歸盡售行李與馬為資而王意在馬不償直竟徒手得之櫬既行距殮之二十五日夜且半馬哀鳴特異王命秣者加莝豆不為止王疑秣者紿已自起視櫪馬驟前囓其項不釋口久乃得脱復奮首擣胸仆之地不省人翌日嘔血數升死賊既平有司正功罪曹柴亦被誅嗚呼自昔相傳義馬事不一二皆言臨難能相濟也若夫辨讐怨微隠間切齒碎膺期在必報即在人猶且難之豈公忠義之氣通於鬼神有使之然哉彼欺人不見中以機既得自全復利其所有此其計至深秘也然卒不可逃若此世嘗言至靈者人畜之至賤宜莫犬馬若也銜轡所制鞭䇿所驅固有衣冠介胄所不逮者至於施報反覆巧發間直竒崛變怪反出於貴賤靈蠢之外是孰為之主而一不少錯嗚呼可不畏哉可不戒哉公志狀載此事不盡情實公之孫鑾常灑涕言之余疑未信後十餘年始得實為之記而鑾死已久則授鑾之子植用補狀志之畧且藉以告世人曉江漁者記王愼中江潭大澤之畔緇帷杏壇之林皆有人焉顚白眉龎杖挐鼔枻而見為業漁三閭大夫之貞尼丘孔子之聖僅足以發其人之一盻而問之躊躇高視廹而後答若以一賢一聖者為未足與語其放且傲如彼彼所謂頽曠淳野没於𦕈莽遥蕩之逰惟其釣餌之知而鱣魴之索倫類不可得而拘詩書不可得而詔者耶然其出而見於澤畔林中葢非大夫之所訪孔子之所求而彼微示其迹以啟其端又非其偶然過而相遭者説之既竟而其意見矣乃始泯形收聲而去欲質其姓名與其居舍之所止而卒不可得吾又不敢逆處其為治鈎餌而謀鱣魴之獲者之人也嗚呼彼且被髪龜手而老於風波之上荻葦之間其果何為者耶吾既不得見其人而見所謂曉江漁者吾之於漁者葢往訪而求之而後得見也於是有可傳道之姓名而有可踪跡之居舍矣漁者之於漁足未甞履舟手未嘗操犗而終日未嘗得魚也吾以有罪黜於時猶不能忘其憤常抱直被廢而正見疑之懟不知所以自釋然後進而求於孔子之道誦説詩書蹈習禮樂以自苦勵而休其不平之怨以此其陋使其逢澤畔林中之人當不足以辱其一盻而何問之可得漁者方且以詩書禮樂之言强聒而博喻之唯恐吾誦説之不勤蹈習之不固而其感於廢興之由理亂之故往往扣舷蹙歌聲薄林莽有餘悲者使吾始悦而中疑焉漁者其猶未足以方於澤畔林中之人歟胡為使吾得求其姓名訪其居舍而與吾言之多且盡如此嗟乎此漁者之所以為漁者也歟無方之為有方者語無當焉則驚過焉則惑漁者之為吾言固當亦如是而止爾他日吾又訪焉而其室已虚倀倀焉不可得見悵然如有望忽然値於非意之頃禮之而不答叩之而不應刺舩而逝使吾惝然若失而卒不得所聞則吾其幾矣吾未可以行乎江潭之濱坐乎緇帷之林而反以疑漁者不足與澤畔林間之見者比吾猶如此而何怪乎昏昏者之舉以漁者為漁是則雖不舟楫之事罟網之為而以漁自著其號葢有所存矣彼其姓名非徒後將不得傳而世且莫之為意而吾獨得而知之故為之記胡貿棺記唐順之書傭胡貿龍㳺人父兄故書賈貿少乏不能賈而以善錐書往來諸書肆及士人家余不自揆嘗取左氏厯代諸史及諸大家文字所謂汗牛塞楝者稍刪次之以從簡約既披閲㸃竄竟則以付貿使裁焉始或篇而離之或句而離之甚者或字而離之其既也篇而聯之句而聯之又字而聯之或聯而復離離而復聯錯綜經緯要於各歸其類而止葢其事甚淆且碎非特他書傭往往束手雖士人細心讀書者亦多不能為此貿於文義不甚解曉而獨能為此葢其天竅使然余之於書不能及古人蠶絲牛毛之萬一而貿所為則蠶絲牛毛之事也嗟乎書契之不能還於結繩書契又繁而不能還於簡也固也然余所以編書之意逺矣非貿則予事無與成然貿非予則其精技亦無所用豈亦所謂各致其能者哉貿平生無他嗜好而獨好酒傭書所得錢無少多皆盡於酒所傭書家不問傭錢必問酒能饜否貿無妻與子傭書數十年居身無一壠之瓦一醉之外皆不復知也其顓若此宜其天竅之亦有所發也予年近五十兀兀如病僧益知捐書之樂視向所謂披閲㸃竄若讐我者葢始以為甘而味之也甚深則覺其苦而絶之也必過其勢然也余既不復一有所披閲㸃竄貿雖尚以傭書餬口諸士人家而其精技亦虚閒而無所用然則古所謂不能自為才者豈獨士之遇世然哉此余與貿之相與始終可以莞然而一笑者也予既不復有所披閲㸃竄世事又已一切無所與則置二杉棺以待長林貿無妻與子無一錢之蓄死而有棺無棺不可知念其為我從事久也亦以一棺畀之而書此以為之劵云嗚呼百餘年後其書或行於世而又或偶有好之者慨然追論其故所刪次之人則予之勤因以不没而貿乃無以自見是余專貿之功也余之書此亦以還功於貿也雖然余既以披閲㸃竄為讐而豈欲後人又以披閲㸃竄知余也哉然則貿之硉硉勤苦從事於割截離合而一付之無何有之鄉也與一醉亦無以異也其亦何憾之有西曹記王樵國初稽古建官正六卿之職以錢糓刑獄事視諸司為劇故分其子部各十有三如外藩之數承平以來訟獄稀簡西曹號為無事郎官日以其三時治事而以其餘挾䇿請書晡衙既散檜隂寂寂静如太古有留而弗去者焉他曹僚友不嘗接接或以迹相拘不能相洽惟西曹燕叙以齒不以官事至分理有疑相酌政事之外道義切磋眞有朋友之義焉且牘必自成不假吏手故居是官者多精於吏事刑雖一職而諸事之情偽無不在焉非通於諸事之情偽者不足以决獄予在刑部治律令如士人治本經後兩任按察皆得其力治獄之難在得情嘗譬之醫治律如按方鞫事如診病有人方書雖明而不中病如人明法而不能得情則所明竟亦何用又有人精於法而易入於刻法非使人刻也倚法以削則入於刻而不自知故用心又以仁恕為本南城羅惟徳終日趺坐虚室生白至臨大事决大疑每出人慮外此陸象山所謂精神不輕用以待有用處者與羅素羸疾在告日多或連月不入堂官不問京山高伯宗土木形骸敝袍布鞾帶結不完出乘欵叚馬誠如杜詩所謂骨骼硉兀如堵牆者人笑之則曰馬行遲我起早何患不與君同到晉江章士元心無機械言呐呐不能出辭而忠信之行可望而知其夫子所謂善人有恒者與泰和胡正甫安福鄒繼甫同司日以講學為事朝暮升散行坐必耦時稱江西三子三子謂羅胡鄒也羅子提調獄事予以廵風詣之故事擕酒肴夜坐羅先使止予勿設但邀予蚤過清話相見甚歡問見荆川云何予對以所憶大意而不能敷衍但曰静曰静則能見自家不是處曰人往往認賊作子羅頷之久之曰尚欲為兄有説予曰願受教羅曰知止而后有定定而后能静兄未知止如何便教兄静得予悚然起謝羅又曰知止是聖功起脚第一歩總於文義無交渉向外尋討不得試言兄一生聰明有幾日在自家屋子裏用予蹶然大有省羅省㳺西山不至貽之以詩有十里春花走馬看之句燕都西直門外多中貴人别業時當春明衆花盛開予以有期不及下馬住覽而空還故云羅答以唐詩二句云誰言不同賞俱是醉花間陪祀康陵與羅惟徳同宿於神宫監耳房康陵者武宗陵也去長陵十里在天夀山最北地僻道險有事此陵者多以往返為艱是夕予豫襆被為宿計使𨽻覔便室未得祀畢衆轟然散道中湏逐大隊不敢獨行予行止未定忽遇羅與錢君同文遂同宿羅為予言勾勾崖之勝勾勾崖在九龍池西峰之西由槱徑攀蘿而入崖半有古刹老衲子數人眉長寸餘視其寢食猿鳥也守陵奄多於此避喧云次日行經九龍池側羅指示予其處曰其峰巒甚似江南九華山予馬上遥望不能詳諦予雖不能㳺而意已獨往為之作長歌河汾趙子謂予耳之羅子無異身逰可名曰聽逰予喜斯語前未經道遂用之前代帝王陵各一邑惟天夀山環抱如玦玦口為紅門紅門内天開地豁諸陵列焉予在刑部凡三上陵於春者再所謂八陵果園者花卉盡開逺望如霞綺陣布尤為勝景九龍池在西南隅文皇嘗駐蹕焉嘗作一詩以冩之頗盡山陵壯觀其間有山内看山山更好與燈火千林晝冠裳兩道回之句意身經之者未必不莞爾而笑也嚴氏當國賄賂公行大小官職有價國家財力困於供邊而邊臣巧於侵盜專以餽送大半出户部者入權門也以此邉政盡廢弛蹂踐墩堡十殘八九又圍困大同右衛説者曰欲得此以處丘富丘富者中國叛人也無右衛則大同危矣於是給事中呉君時來疏劾督臣楊順本兵許論罪狀世宗為之震怒逮楊順下吏按法當斬嚴氏欲為之地又慮上窮竟邉事及己思有以中呉時呉當使琉球未行聞嚴氏意㫖遂上章攻嚴氏而刑部主事張君翀董君傳䇿亦同上章大㫖皆謂上付政於嵩嵩付政於子世蕃一家盤據朝廷作威作福父子濟惡近代所未覩前世所未聞嵩乘此亟上章自辯謂呉時來實憚過海先論一二邉臣以嘗陛下意本在臣也臣以贊上事𤣥為人所嫉惟陛下矜察於是上下三人吏議充軍遣給事中鄭茂往勘楊順事欲貸其死再下刑部予謂尚書鄭公山可移判不可改當以去就争之鄭公謂事不可激若如此則上怒不測何止我一人區區之去就恐啟士大夫之禍與其激上過舉寜我不能執法守議有愧於張釋之而已遂改充軍後隆慶中楊順卒論死呉張董三子之獄在浙江司莊晉江為員外郎署事予與高京山為主事堂上鄭公以莊口訥予性直兩遣高通言於西直西直者内閣直廬也在西苑時嵩勢張甚諸衙門事無不關白而後敢决三子所憂者廷杖又恐嵩宻進揭帖必擠之死士大夫多懐此慮故鄭公欲稍有以開導嵩意以保全言官成上盛徳然三子所以得全者葢是時上已察嵩之姦特未决計去之耳後高伯宗竟以三子之故陞景王府長史出嵩意也三子行時高嘗出城送贈之詩嘉靖中用法重者有數條邉方廵撫總督官係文臣舊時失事重者充軍而已後比依守邉將帥守備不設為賊所掩襲因而失陷城寨斬罪文臣比依將官自此始也言事者自有對制上書詐不以實與風憲官挾私彈事本律後加以廷杖後又加以比依子罵父死罪比依子罵父之法自此始也曾銑建議復河套夏言從中主之法司以律無正條後乃引交結近侍官員之律楊繼盛劾嚴嵩罪惡疏中援引二王法司無以罪之乃引詐傳親王令㫖之律郭希顔建請安儲引妖言律此數者猶以干上怒上所欲重而法官不能争至於沈鍊在戍所罵嚴嵩與人角射象嵩為的而射之楊順誣以妖言而殺之於是乎無天甚矣然嘉靖末年海剛峰一疏直而無禮亦幾乎罵矣而聖度優容卒待以不死乃知前此皆大臣不能調度之罪非世宗本心也郭希顔疏云不敢言立儲請言安儲大意欲景王出封耳而中引嚴氏乃嵩自謂關伊家族者故摘其疏中建帝二字以觸上怒而必殺之觀其後對人曰希顔止望拏問不過充軍即論殺亦不過監候他日新政便得入閣豈料聖明洞燭其姦即時殺了此言之出肺肝可可照矣王直背國召冦攻破城池傷文武將吏軍民無算而胡總督乃以招納為功嚴氏父子主之欲以投降宥死衆頗惑予謂之曰寜使胡宗憲失信不可使朝廷失典刑尚書鄭公見與予同卒擬謀叛律梟示海上王直徽人據胡總督私史已稱王海曲矣此中厚有所許故彼有所恃而來實非投降也聞斬王直時衆推荆川發言王直出不遜語刑不可不盡心如近日餘姚翁公最號老法家其恤刑録為人所傳誦而晚猶以失决一獄追論削秩况餘人乎予見人多以留心案牘為俗吏專以文墨詩酒為風雅往往法律都不細觀鞫問又不耐煩正不知如錢若水宻訪女奴卒置同州富民於不死前軰用心乃如此正是古人為學實用處於此無所用心飽吃官飯受成吏胥而可謂之風雅乎在外有司招案尤不堪著目姑舉二事有三人盜採人桑趙甲因拒捕鎗戳失主身死律當坐律錢乙鎗戳出救人孫丙傷右臂右肋亦引竊盜臨時拒捕傷人之律予謂律云臨時拒捕臨時二字正有深意葢正竊時為事主所覺乃不棄財逃走而䕶財格鬬非强而何所以坐斬若已離盜所因追趕而拒捕者即非臨時矣今孫丙以鄰人聽知喧嚷出來救䕶則非捕盜也錢乙因怪伊出救而行兇則非拒捕也已離本地追趕在孫丙門首則非臨時也只合以兇器傷人引例充軍後此人卒得減死又一事詐為文書者按律必套畫押字盜用印信而後是印押二者又以印為重故有例凡詐為各衙門文書盜用印信者不分有無押字依律坐罪若止套畫押字各照所犯事情輕重查照本等律條科斷適嘉興兗州俱有此事嘉守見予批詳極口稱服兗守因予弔騐乃回稱廵撫已詳允遂與予有隙人之不同如此戊申筆記王樵五代史周世宗嘗夜讀書見唐元稹均田圖嘆曰此致治之本也詔頒其圖法使吏民先習知之期以一嵗大均天下之田元稹均田圖法今不傳宋林勲本政書頗為朱子所取其法是以田為母人為子竊謂元稹圖法今天下豈無有能講求之者誠欲均田湏頒圖法使吏民先習知之然後擇人以主其事不得人終無益也今法以户計里以田繫户正是田不為母故姦豪得以欺隠飛灑有田無税有税無田非丈量不能得實非得人則仍墮里書之手矣歐東先生遺事侯一麐歐東先生實録詳矣然麐頗採薦紳言先生逸事以為先生醇性天植其學務實用凡規為建白篤於為民如守河間乞蠲糧草疏畧曰始亢旱苖枯死繼積雨滔陸又遭蝗蝻軍民流離有如全責秋糧馬草莊田子粒臣竊以為不便且邉警急各軍輸盡取給窮民若復全責民何堪命疏累千言何懇惻也及參政守嶺南時侍御信趙通判委之全省徴輸所至以墨聞且及先生所部先生即廷白侍御以通判漁獵官民侍御黙然罷委先生又謂宜遂令解職去又某守酷墨先生專書請都臺應公擊之嗟乎令兩司於當路委曲而讋伏之矣尚曰吾無廼有拂排者乎而先生獨不然在廬於蘇侍御在閩於龔朱二中丞事亦類此侍御有媚子謂先生是子能作對可令補學官弟子先生正色曰青衿可濫此輩耶且有職者龔公提兵贑鎭擬廵視漳南㑹先生署漳南時方務獲廼上書具列軍門在責效備兵諸道諸道有如不職則暴其狀明棄之此不勞民而郛疆坐定也公廼止朱公方嚴聲甚厲至閩移屯田糧與廵海納出先生曰吾職屯專命也今使臣自來代之然則吾贅員乎吾知敬事奉上而已於是朱有意扞格先生毎侵先生而先生亦用盛徳不狎侮檄闗司以屈直之當是時先生幾以直賈禍賴鄮西張公謙署司篆寢不行云先生為治專務除殘不肯養交安禄如初蒞嶺南條六事麐嘗尋繹其言夫先生以為有衣冠之盜而後有干戈之盜因推其源委反覆列之要在責覈於守令潔已足民明教正俗如是則盜息而民安若夫守令正矣而盜又蠭起不變者則文擊躡尋之過也因推攀援傳致之獄或逮及收至有死老遷籍易世而不為反也是以其徒明乎死處若我固錮之而不得變也今惟推下車泣罪之心明三驅失禽之誼榜示首惡不赦餘歸脅從讐報盡除之而又督以稽察如是則其徒咸知肆𤯝幸生我而重犯法矣清海道者海南為大艦海中者率假貴勢為號曰某府一府率百餘張旂幟給牌符因而其下市畨為剽官軍不敢執墟主者貴勢於墟市而借公家以㩁㑹侵牟五民先生曰此大亂之道也於是請為鄉先生艦籍之約不得出港外有港外挾鄉先生為奸利官軍擒之縱者相坐又請革各墟主而令小女以類儈市市價平墟主復與重罪之葢自是貴勢家望深而小民無不忭躍稱其便以至禁和買事若小煩然自司郡估定埒於民間葢自竒嬴極乎菓茹三尺之童𨽻不得欺此何異王政所以待商賈而燒葦草伐林木驅蛇蝎之害求民旅之安亦豈緩者耶前令既下於是有上事者而先生署之畧曰據鑄耕器而六艦裝悉鎗斧魚叉旗纛顯與官軍逆非盜而何盡坐之部下大肅先生斷訟又有王舉人劉舍生朱某三事王撫州人鬻故宦託其穴葬焉先生具獄令徙之王窘則謁廵撫公公屬其辭他吏而反恚先生曰世有迂儒不循生者而顧為死者拳拳乎劉廬人攘孤嫠之産至無粒先生惡之奪為編民當路書為請日再三至終不聽也朱某者亦廬人分田紿其二弟以婦翁嘗有債謬以腴田數百償之從其籍已而翁弟即據籍謬曰吾父遺也訟之十年不决至先生繫二氏使召翁翁來忽索兩家文書騐不讐乃判曰此豈非朱詭籍以自遺者耶訟遂平其待寮屬亦畧可言有林巽峰者以部郎謫倅而先生遇之視他臺諫謫來者有加禮人則大服先生之禮人不惟其官又有鄭推官者嘗倚侍御查河間先生與争廼侮先生惡之於侍御後先生拜胡臬使者鄭調守隨州至則喙息先生顧從容以公好惡忘物我慰之後鄭有惠政先生亦與良署卒流涕於先生去云先生又善遇士在河間選民幼敏者從諸生觀禮泮宫常身為剖解去郡百里曰泊頭泊頭諸生廬者近百人先生因其請也毁廢寺為明倫書院里人王侍御惡先生於董學使者使者至則撻督工曲主簿主簿大呼曰太守以為私第耶其人大慙去所至士之賢者先生每躬下之致書帛甚恭以故士人人勸夫自于公署門至今死生凉燠之閒偷甚矣先生廼常無所為而為仕所至名卿碩儒卒先生輙祠之殆徧天下云先生素亷無故不擕家捐館之日㑹侍御按韶而李公萬實王公徳為治後事發其笥皆圖籍所餘俸不滿數鎰始侍御牾先生至是則大嘆服廼檄郡厚資之而南海諸賢大夫相與樹墮淚碑而奉祠不絶也先生故治士知不知語次無不為先生泣下嗚呼廼所以為先生哉麐摭先生行事葢反覆三嘆之天胡厚畀先生而竟不卒乎始先生與郭似庵公同武選時相李公有所屬常不能得一日大司馬以一應襲諭意而先生堅曰例應華又曰主事恪立其官者守此例耳例一動摇謁者相踵夫先生事時相本兵法不少撓然竟坐詿誤落職起不四載而復坐誣奏繫獄屬嚴寒而先生宿嬰痰疾大作鉗鐵困篤久之聖明還印綬馴叅廣藩天下喜謂先生素所藴藉之業既習於憂患而年僅六十耳廼先生亦自喜為國百挫不廻豈不冀徳勲著於無窮也而寜知天奪之速耶嗚呼顔淵好學而蚤夭孔子慟夷齊積仁死清而太史悲諸葛志决身殱而怨者泣屈原公正憤世而賈生弔長孺莊嚴居郡而識者慨循數聖賢以觀先生而豈為菀枯哉徒以暴戾恣睢者而竟夀終犯忌諱不軌而身逸樂公孫𢎞立談取相封侯司馬安巧宦四至九卿以為見報善之如彼感助㐫之如此遂疑天道靡定怵惕多岐故有曠達之士振諸無竟而馮生之庶溺於倖福彼惡知先生所以脩身立命乎哉麐讀先生吉凶篇葢脱然悟爽然自失矣四貧士記侯一麐四貧士者徐子銘林子成用張子正立李子志淑皆永嘉人也徐子情致瀟灑林子志操古質張子心事夷易李子持守端慤語云樝梨橘柚味殊而美一也殆四子之謂歟徐子雅飲飲不擇醇愈多而愈不亂情益怡往親在以其廪錢時時奉觴而前歌舞以娯親亦如老萊子云林張二子稍稍飲李子時一酣非其好也皆令人久益親徐子之居南塘也時入城聞且至則余已滌觴至而飲飲即酣酣即倚而歌陶陶熙熙不知醇漓内消柴栅外忘樽犠張子居比晤數語率平平無動人者然野老不疑海鷗不飛與張子俱令人忘機廼林子又不然力學授徒簡棄人事一日過吾案上閲唐詩即訝余奚以唐詩為也余因請曰當事何書曰六經聞者或謂何見之拘拘廼余則嘆其慥慥醇儒也至李子甞與余論素位而因自述云自先君子居仙洋當春耕樓彌望緑疇頗吾有也時吾童習章句殊不曉艱嗇事無何轉盻則故業已靡且先君子徒屬意我儒也廼儒竟不酬其志貧至於無居雖樂山朱君義而居我身則恬矣然而時時惻於余𠂻焉余曰奚害無居而居知我者固義也葢徐子失婦再娶頗有貲一夕竊者胠篋囊而去亦了無慍色直曰吾依然我也林子一失不娶張子再娶再失惟李子偕老焉而其單孑也窶空也皆不以屑意龍門子曰語云同病相憐余亦貧士也故四子皆得而㳺之葢瀟灑者理之腴也古質者誠之榦也夷易者履之坦也端慤者孚之盈也皆可以共學而適道者也友若人焉益矣因紀之以永觀摩明文海巻三百四十五
