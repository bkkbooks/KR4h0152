body:
  text: 明文海巻三百四十九餘姚黄宗羲編記二十三紀事孤山種梅初記陳萬言孤山僻在湖隂無巉怪峰石足以頡頏南北兩高之勝而幽韻過之逋叟種梅山巢亦千古韻事也往挂瓢戴笠之客間向此作方外逰而逰人停屨戒勿入者一二紈綃粉黛家挾歌兒踉蹌畫樓酒艦中雅與地不肖一舉子挾冊登塲詫以為赤松青鳥之侣弗利於形家言而去之嵗癸卯余始讀書山麓小軒中聊破岑寂諸君子嗣是多踵至者哦哦聲嵗不絶而余友新都呉君巽之復為低徊故址領䄂勝因感桑棘之蔽墟懐寒花之振秀謀所以為逋叟續者余為規之逺近量花影之疏宻度自望湖亭而北左沿湖濵右倚周垣修亘可植五百本朅武而東參差欹仄拾級而至放鶴亭之隂循亭而上山墓之巔下者可襲髙者可照亦可五百本盤紆山背而西從四賢祠直竟于小軒之陽其地迤而景曠可容二千本之役也有五勝焉美人高士㸃綴名山使弔古者銷離離彼黍之悲一勝也山隈疎影之下可雪而可晴可風而可月煙蓑釣艇數武朅来不愁夫濟勝之勞無俟乎餱糧之裹二勝也兩堤雜蒔多桃蕡栁絮爭緋鬬緑而且鶴亭遺種乃更有寒香臘蒂之奇葩傲不言之成谿招如玉之迴影三勝也樵夫繭販無采筐伐薪之刑山靈斧斤庶獲免焉四勝也山有祠以俎豆逋叟合香山坡老鄴侯而四名花效靈而後覽眺者其有興乎辟榖神仙仿隴西之霞舉登高大夫效蘇白之風流豈獨為一逋叟生色哉五勝也余結盟于兹山亦已久矣嵗一至湖上未嘗不躡屐巖扉間懐企遺勝恨未及與桂叢蘭譜恢數百年沉劫之縁幸有呉君先之異日畢向平婚嫁謀築一楹於梅花塢中重修千古之韻事當不啻囊圗五嶽矣左手篆文記陳萬言嵗在𤣥黓困敦月中仲吕之朔日指申矣余偶登卧樓偕俞子㑹嘉暨仲季聚立而語有間出兩手欠伸微見左臂隠隠然若有文旋膚理若動而赤文中起廣可寸許修過之諦視之則玉筯篆一進字也三人詫觀咸以為奇余戲以朱塗其文用楮印倒篆數紙鈎畫宛然晡而稍平隔宿猶可摹而見也每對客語之客多不信輒出所印倒篆以示之其好我者曰此何祥也余應之曰否否其懼我者曰此何殃也余亦應之曰否否昔者孟子有云人之於身也無尺寸之膚不愛焉則無尺寸之膚不養也以為愛之者是則善譽者不能解也以為不愛之者是則善毁者不能詬也考之奇書稗乗古之人未有見也諏之故老博聞之士今之人未有聞也夫唐叔虞之有文在手曰虞也魯成季之有文在手曰友也宋仲子之有文在手曰為魯夫人也皆生而賅存焉未有立譚顧盼之頃手腕皮肉之間斐然而成章忽然而變化起滅不可思議者也佛氏因緣或言神通變現胸面手足皆可湧出蓮花卍字庶幾近之然而此時非想非觀其因不可測也道之費也雖聖人有所不知焉浸假而化余之指以為龜龍浸假而化余之腕以為蟲魚浸假而化余之肱以為垂禾倒薤浸假而化余之身以為史籀倉頡吾烏得而知之夫亦存而弗論也已矣紀登瀛客許烱甲辰嵗仲春予下第南還買舟將發有客虬髯布屨肩負草囊求附舟至天津篙師索其直許之既登舟予見其丰神秀偉頗異之問其姓名曰姓丁名登瀛問其何許人也曰雲中人也問其所能曰善奕予雅好奕因延之語自言家素業儒少時不樂仕進去從方士逰以為長生可致遂鋭意求度世之術又言舊名拱辰因夢異人指示相期東海上故更今名兹行將逰東海訪蓬瀛以赴其約云其言皆恍惚世外事不知其信然否予獨愛其風致磊落不類塵土中人稍狎之㝷與對奕予不能敵損數十子猶劣方布局即知其勝負且曰吾於人事亦如此矣究其術笑而不答革囊中古劒一口長尺餘碎銀數片青石子十餘枚他無所有時出劒把玩意濶如也一日予偶誦云瑟鼓齊門雖工何益而况未工乎客應聲云劒藏楚匣縱掩彌光况莫能掩也予始謂其跌宕不羈之士漫與之狎不意其能文也及聞其語更駭異之適日初出予倚篷眺望客指而言曰纔升扶桑忽及天半人間三萬六千日亦易易耳遂朗吟曰羲和龍馭急如梭好景人間莫浪過予因續之云天際未須愁日昃䄂中吾有魯陽戈客笑謂曰子可謂有志者舟抵天津遽辭登㟁叩其所往曰前已言之矣臨别口誦詩贈曰萬里相逢豈偶然三生有分是前縁天南天北多鴻鴈時寄小山叢桂篇予答贈曰莫學當年傳逸人雲山消息斷追㝷須知大隠金門客依舊烟霞萬里心客曰張乖厓有仙才無仙骨不足相邀子殆可語柰喫烟火已多塵縁方重俟他日議之予非漠然者善自愛而已語罷飄然登㟁而去予惘然者久之竟不知其何物後數夕忽夢一童子持書相授曰丁山人所命也啟之有詩二首云别來已在東海東笑叅金母揖黄公相思莫道無青鳥試向陂前覓竹籠又云南北東西共一天乘槎泛斗亦丁年君今欲問予歸處萬樹桃花水半川讀罷遂覺急呼童子索燭記之客殆異人乎遇仙記李朴萬厯三十有二年予有汝墳之役道河以南適許襄經鄭野地墳起一俯一仰若山谷間有水蜿蜒㵼於兩崖瀑瀑有聲也予褰裳渉之俄見危峰聳翠林木深秀初不知其有路可通問諸御者御者曰此昇天洞也亦不知起自何年代相傳以為有仙姑煉丹服食羽化飛昇遺洞在焉予㝷之果一孔自東岩入窅然汩然漭不辨色已而一㸃微明自上下埀徐視石磴盤曲因攀縁達於頂四望周覽宛然别一世界予有初疑雲樹路不同偶出空虚四望通之句時正暮春天氣和暖滿院桃花相錯如繡深樹中黄鸝三三兩兩巧語如簧庭左一井横轆轤其上洞之去平地可百尺許計水之淺深高出平地綆之長短可量而知也因小憇顧庭右樹下坐一老道士蓬頭赤足亦不著裏衣詰問所從來答曰道人何去何來問其年曰曾見黄河清矣問若所言似知道者何不登遐倒影而顧棲遲紅塵為曰天之上地之下隨處皆可逍遥若終日在十洲三島亦有倦逰時候問其名居曰我板章道人也無名無居予侈其言猶河漢而無極不甚信㝷舊路下焉常以語人有識者曰果板章哉仙人也傳彼自秦終南來逰伊洛嵩少間露頂赤脚冬著單衣坐大雪中雪為飛五百嵗猶有童顔予急使人訪之迷不知所往予嘗以為天地間人老壯相㝷有無轉化盡終是要盡作甚大羅天仙及觀黄鶴天台武陵遺事則疑信半比及遇板章於昇天洞中始信乾坤内果有一種不死仙人乘天地之正而御六氣之辨無有也無不有也葢與造化相終始矣眞仙果有宜赤松接踵羡門比肩有餐葉茹芝鳥伸熊經竟不見跨鶴遺世又何寥寥仙人家術予不曉亦無心於遇廼得與板章邂逅數語斯又何以説耶昔廣成子之告黄帝曰無勞爾形無摇爾精乃可長生循是道也行之以無意則遇之以無心况遇固仙不遇亦仙又安知道成之後不朝崑崙夕𤣥圃與大羅天仙終日為侣也是為記粤事論蘇濬今之䇿粤事者類曰獞猺亂内地不知釁不在猺也猺不習漢語不識文書自中國亡命之徒扞文網吏捕之急則竄身窮谷教猺伺嚮又有㳺手罷民不事傭作喜椎埋叫呼計無復之輙自結於猺於是㗖以厚利導以剽掠猺貪且狠墮其彀中而禍中於村落矣大征之後黠者遁深藪痴者飽白刃根株未拔計不得不議撫撫之誠是也顧里胥桀黠素習猺語恃口舌㳺揚名曰招主素封之家藉猺人為力作名曰田主此數族不惟以夷市而且以官市公家畝鍾認為已有而課穜稑於佃丁官清其籍則以猺為解每秋成與夷𤓰分之至督賦則以公家懲急復加歛於猺人猺畏束濕視敵朴甚於刀鋸呼之見吏則縮首寜死不敢詣惟里胥田主言是聽里胥田主率視其人為竒貨未亂則交搆以摇之未征則陽為漏洩而寄其孥畜或誑以隂庇免誅或執以要賞而没其所寄懼其見吏言狀已無售欺則多飾威以嚇之猺人懼吏滋甚猺不聊生益復思亂縣官不急奸人而惟急猺左右猾胥反為夷耳目猺之出没什不得一我一啟頰令未及頒而環聽風馳賊無不窺其淺深者故中國之禍舉中國人貽之豈在猺哉何休曰王者不治夷狄非不治夷狄也治中國即以治夷也苟得良有司勝於兵千百矣柳州馬平蘇濬柳州西北界於楚黔諸蠻而桂之古田平之修仁連岡扼險互相盤結永樂初柳州馬平縣五都賊梁公竦等作亂都督韓觀勦之斬首萬餘級馬平十八里之民盡被屠戮其存者三不得一後耕民日少沃壤荒蕪往往募獞人耕種獞人日繁而剽掠滋甚宣徳間洛容縣蠻賊出刼屯聚指揮王綸縱兵殺害良民山雲以聞上命建治其後山雲上征𠞰柳州蠻賊首功上謂尚書張本曰蠻性好亂自取死亡可憎亦可憫也其令雲善撫之𢎞正以後古田多梗馬平洛容諸獞聚黨嚮應魚峰賊周鑒復相煽為亂柳州太守劉璉率兵數百禦賊賊敗走璉追之賊偵知援兵不繼還戰獲璉剖腹實草焚其尸督臣不以實聞自是賊益肆官兵莫之誰何馬平田土蠶食幾盡縣擁空籍耳嘉靖間賊首韋金田等占據水陸二路村落為屠者不可勝計都御史張岳總兵陳圭征之調漢土兵七萬分三哨並進攻雷巖同良平田落滿都博等巢克之遂圍魚窩巢魚窩石壁峭立拔地高數千丈從來用兵莫能一勝諸將以為難岳曰魚窩不破即他寨破無為也遂移鎭柳州督諸將攻愈力賊急呼他寨賊與併守山四周傾仄難置足賊晝夜守不徹山頂繩懸􅛡石兵一臨寨賊斷繩􅛡石亂下如雨岳陽令諸將撤圍寨中賊稍稍有逃者岳復移鎭柳城召授諸將方畧作久困計諸將猶請罷兵岳度諸將不足與計事間召副總兵程鑒令選勇敢士備親軍鑒選三千餘人請所用岳曰吾欲有膽力不懼死者任吾指揮死且優恤其家於是願從者七十人岳曰足矣遂以七十人屬之鑒令刼寨鑒有難色岳顧左右酌酒灑地誓必滅賊復出䄂中紙示之曰此二疏草也寨破薦爾首功不破爾養冦為首罪惟君所擇耳鑒泣曰鑒且為公死矣時賊巢苦乏水臭穢觸人日數人共水一瓶涓滴必争一日五賊當守險逕者争寨中曰熱甚可多予水衆持不肯大諠五賊怒而去比夜堅卧不廵警而鑒將七十人至寨下未敢發也先五死士持尺刀學猿猱攀而上五賊守險逕者熟睡弗覺五死士斬之代為廵警七十人者冐險夜登聲諠寨中賊併力出戰而山下兵復乘之山頂賊架木橋通往來兵至頂賊蹙毁橋兵臨橋火炮矢刀迅激交發呼聲震山谷間而賊中主計老媪八十矣急呼衆自焚毋為官兵所魚肉也於是魚窩遂破俄而高挽同銀馬鞍諸巢俱破前後俘斬四千餘級時議乘勝兵窮其黨類者岳曰自秋徂夏兵老矣武固不可黷也因命夷諸險巢戢其餘黨由是馬平之三都四都來賔者甚衆凡渠魁皆自投軍門願為編民諸蠻種類蘓濬嶺表諸蠻種落不一皆古百蠻之種也一曰猺介巴蜀楚粤間綿亘數千里椎髻跣足衣斑襴布褐采竹木為屋繩樞蓽竇覆以菁茅種禾黍粟豈山芋雜以為糧暇則獵山獸以續食嶺磴險阨負戴者悉著背上繩繫於額僂而趨俗喜讐殺又能忍饑行闘上下履險若飛兒能行燒鐵石烙其根蹠使頑木不仁故能履棘茨根枿而不傷兒始生稱之以鐵如其重漬之毒水兒長大煆鐵製刀試刀必斬牛仰刃牛項下以肩負刀一負即殊者良刀也弩名偏架弩以一足蹶張背手傅矢往往命中鎗名棹鎗長二丈戰則一弩一鎗相將而前執鎗者前郤不常以衛弩執弩者口銜刀而手射人或冐刀逼之釋弩取口中刀奮擊退去必有伏弩嵗首祭先雜糅魚肉酒飯於木槽扣槽羣號為禮十月朔祭都貝大王男女各成列連袂相携而舞謂之踏猺意相得男則伊唔跳躍負所愛去奔入巖洞揷柳避人遂為夫婦樂有鐃鼓胡盧笙竹笛之屬其合樂時衆音競閧擊竹筒為節山谷間稻田無幾天少雨稑穜不收無所得食則四出剽掠踉蹡篁竹飄忽往來州縣覺知則已入巢官軍但分屯路口山多險蹊不可徧防久益勞費猺亦有數種有生猺有熟猺又有白猺黑猺生猺在窮谷中不與華通熟猺與州民犬牙或通婚姻白猺大類熟猺黑猺大類生猺此其大較也一曰獞與猺雜處風俗畧同而生理一切陋簡冬編鵞毛雜木葉為衣搏飯鞠水而食居室茅緝而不塗衡板為閣上以棲止下畜牛羊猪犬謂之麻欄子大娶婦别欄另爨娶日妻即還父母家夜與鄰女作處數年回時間與夫野合二三覺有娠乃宻告其夫作欄又數年延師巫結花樓祀聖母親族少男少婦數百千人歌飲號叫劇戲三四日夜乃畢謂之作星少婦於春時三五為伴採芳拾翠於山椒水湄歌唱為樂少男亦三五為羣歌以赴之一唱一和竟日乃已以衣帶相贈答去又善為毒矢為蠱毒本類相仇纎芥不已雖累世必復其闘或誤殺人者以牛畜為償或數十頭至百頭名曰人頭錢流刼則糾黨麇起亦有渠長人先給銀三錢贍其家曰鎗頭錢在山三五為羣要人於路伏草在江突衝而出縶船取貨羈以求贖謂之勾船或攻打村民棄田廬以遁即其村據之謂之打地且其人耐饑啖鹽數顆草木皆可食師興則逺遁絶嶠莫可誰何獞亦有生獞熟獞與生熟猺大抵相類一曰犵狪獠人凡二種依山林居無酋長版籍以射生為活一村中推有勇力者曰郎火餘俱稱火男女三四日用米粓沐髮不間寒暑婚葬用五行以雞卜吉凶樂有六管笙兩脚踏地而吹衆歌以倚之又以大木一枝埋地作獨木樓高數丈上覆瓦鋪板男歌唱者夜則縁宿其上謂之羅漢樓器械與猺同而勇㨗過於獞每出剽掠皆冐稱為猺一曰狑人一曰􅬍人一曰狪人一曰蠻人有西原廣源諸蠻皆依山為生其氣習多與猺獞同又有蜑人世以舟為居無土著不事耕織惟捕魚供食不通土人婚姻又有山子夷人無版籍定居惟斫山種畬鏃木盆鍋射獸而食之食盡又移一方男女皆徒跣夫婦野合類獸與人異又有班衣種女著短裠僅及膝坐則以膝齊跪地為禮又有大良言語服食居處與獞大同而性與獞異有户口版籍較人民尤淳朴租賦尤易辦其俗敦厚人至其家不問識否輙具牲醴欵待任大嚼劇飲無吝意後被獞殺占逃散去之城廂村落傭落樵採此數種者自為部落不侵中國其為中國患者莫如猺獞云安南志蘓濬安南即古交趾書云宅南交禮王制云南方曰蠻雕題交趾有不火食者矣山海經言交趾國人交脛東漢書云男女同川而浴故云交趾近是其地東距海西抵雲南老撾宣慰司南抵占城北抵廣西思明憑祥山則勾漏佛跡江則富良為最大其俗夷獠雜居不知禮義其性輕悍以富為雄役屬貧弱椎結剪髮文身跣足暑熱好浴於江便舟善水其産多魚鹽亦金砂珠璣玳瑁之凑也周成王時交趾南越裳氏重譯來朝迨其衰也荒服不至秦置象郡以謫卒戍之秦末為南粤王趙陀所併漢武帝元鼎五年平南粤以其地為交趾九眞日南三郡領縣二十有二先是粤王遣二使者治交趾九眞聞漢兵至合浦籍户口以降即拜二使者為交趾九眞太守置交州刺史領之是時雖置郡縣而猶夷俗不習漢文書苐羈縻耳平帝時錫光為交趾太守始導以禮義光武中興遣使貢獻封鹽水候而有任延者用徴辟為九眞守鑄田器教民墾闢示以嫁娶禮法於是徼外蠻夷舉鄉華風云建武十六年交趾女子徴側徴貳仄命伏波將軍馬援討平之立銅柱為漢界一在欽州一在思明府而日南林邑間亦有建者其詞曰銅柱折交趾滅交人往來叠石以固之援鑿南塘通九眞置望海太康縣自是銅鼓銅馬始入中華矣永和間日南蠻夷為梗朝議發荆揚諸郡兵討之中郎李固駮其不可謂宜選有勇略仁惠可任將帥者為刺史太守帝從固議即拜祝良為九眞太守張喬為交趾刺史喬至開示慰誘並皆降散良單車入賊中設方畧招以威信降者數萬人由是嶺外復平三國間呉魏與蜀更置官吏不能相統一晉平呉蜀始置刺史以便宜選用長吏陳隋以來改九眞為愛州日南為驩州皆設刺史又添設九徳新昌諸郡唐始分嶺南為東西二道置安南都䕶開元間大興文教而九眞姜公輔遂用經學起家入翰林為名宰輔交人自是益嚮於文學矣大中時李琢為安南經畧使苛墨自私以斗鹽易一牛夷人不堪命結南詔以叛攻䧟南經畧使蔡襲死焉都䕶高駢復其地因以府為静海軍授駢節度五代間土豪互相簒奪十二州大亂部民嘯聚後有丁部領者自稱萬勝王以子璉為節度使宋初璉遣使入貢太祖封之璉没為校黎桓所簒太宗怒議興兵問罪命水陸二軍分道並進前軍侯仁寶没於賊旋議班師桓遣使貢方物謝罪因而撫焉桓倨驁宋使至受詔不拜信宿後乃張筵飲宴桓跣足持竿入水標魚毎中一魚左右皆譟呼或自歌勸酒莫能曉其辭後李若拙為使稍以禮詘之眞宗即位封南平王黎氏有安南自此始傳三世大校李公藴簒黎氏自稱留後遣使奉貢上以蠻夷不足責遂用桓故事授公藴交趾王再傳日尊僣稱帝改元神武子乾徳繼之尤誖謾熈寜間王安石謀立竒功議者以開邉中之言交夷可取狀沈起劉彞後先經畧益挑釁結禍交人遂叛分三道入冦䧟欽廉又䧟邕州殺守臣蘇緘屠其民五萬餘口詔以郭逵為招討使趙卨為副討之二將相左至富良江不敢渡官軍八萬死者什六僅得四州一縣而還逵卨皆得罪乾德乞再修職貢還所奪州時置戍鎭守罹瘴霧多病没朝廷知其無用以四州一縣還之自端拱迄嘉祐以來兩江州峝數為蠻所侵軼潜舉外鄉蘇茂廣源甲源等處入交趾者六十二村累朝以其僻在海隅不復與較也傳十一世至昊旵無子婿陳日煚遂有其國傳子光昺元世祖既平雲南光昺上表奉貢遂封光昺為王光昺死子日烜自立世祖召入覲稱疾不朝右丞唆都等收占城遣使假道不聽世祖命鎭南王脱懽征之左丞唆都中書李恒以兵㑹日烜空其國航海而遁李恒等追襲於海敗之㑹盛夏軍中疾作霖潦暴漲議者請班師恒弗能奪遂還蠻軍追敗後軍恒及唆都俱戰死官軍溺死者什有五六二十三年詔發江淮䝉古雲南黎兵九萬餘人水陸並進日烜及其子復走入海鎭南王追之海口不知其所之㑹張文虎等糧船不至諸將恐糧盡師老無以支久議全師還日烜分兵二十餘萬以遏歸師鎭南王由間道歸日烜死子日燇遣使來貢時復謀大舉平章布呼密曰獸窮則噬勢使之然今日燇襲位若遣一介之使諭以禍福彼能悔過則不煩兵而下帝從之於是交趾遣昭明王詣闕謝罪成宗即位命罷征皇慶二年交趾犯鎭安歸順二州䧟禄洞知洞焚養利州官舍民居殺掠數千人中書省遣使詰之安南飾辭以謝因飭邉吏母令侵越自是貢獻不絶我太祖既集大統安南陳日煃遣使奉貢封日煃為安南國王且戒後世毋伐其國日煃死封日熞為王五年安南陳叔明奉表貢馴象禮部主事曾魯取其副視之曰前王乃日熞今曰叔明必有以也亟白尚書詰之使者具言日熞為叔明逼死故託貢以覘上意上曰島夷何狡獪如此却其貢不受七年叔明詭稱奉詔視事且自稱年老以弟煓代許之十一年煓死弟煒襲叔明仍專國政二十一年國相黎季犛廢煒尋弑之立叔明子日焜主國事次年又弑日焜立其㓜子顒假煒名遣人來貢二十九年思明府奏安南奪丘温如嶅慶逺淵脱五縣上令以地還思明日焜不聽上曰蠻夷相争自古有之彼恃頑不服終必取禍姑待之而已三十二年黎季犛復弑顒而立其㓜子㝷復弑而奪其位季犛詭姓名為胡一元子蒼易名􅐏尚偽稱日焜奉貢永樂初季犛詐稱陳氏嗣絶􅐏陳氏甥求署國事上不虞其詐許之踰年日焜孫天平間道由雲南走愬京師㑹安南賀正旦使至上出陳天平示之使者識其故王孫也皆錯愕下拜有感泣者上遣使責之黎季犛詭辭謝罪請天平還國上遣廣西都督黄中吕毅大理卿薛嵓等以兵五千人送天平還既入境季犛遣陪臣黄晦卿等迎候禮甚恭具牛酒犒師中等遣騎覘之壺漿屬路無他也遂進度雞陵關至芹站山路險峻林莽䝉宻軍行不得成列㑹天雨季犛乃伏兵山谷中衆數萬鼓譟出斷橋後騎不得進遂刼天平格殺之嵓亦死中等以聞上大怒决意討之命成國公朱能西平侯沐晟新城侯張輔都督柳升率裨將李彬陳旭等分道並進尚書劉儁黄福叅賛軍務㑹朱能疾卒以輔代之輔入安南破隘留雞陵等關沐晟率雲南兵與輔合遂自三帶州招市江口造舟以進敗賊衆於嘉林江夜入多邦城進克東都西都聞之焚宫室倉庫以遁於是宣江洮江等州縣皆降輔等督舟師攻賊於富良江賊以海舟横截江中而用划船載木立柵以拒輔乘柵未備躬督將士力戰賊不能支都督柳升以舟師横擊之賊大敗乗勝長驅得船三百艘復引兵出竒羅海口生擒賊首黎季犛李保并其子澄及黎蒼黎芮黎潡偽柱國胡杜等安南平先上勅張輔求陳氏子孫不可得國中官吏耆老咸稱安南本中國地願復古郡縣齒於齊民輔以情聞乃置交趾三司以都督吕毅黄中掌都指揮使司尚書黄福兼掌布按二司事前侍郎張顯宗為左布政使置交州北江諒江三江太原宣化建平新安建昌奉化鎭蠻諒山新平又安順化新華等十七府統四十七州一百五十四縣衛十所十三市舶一遴選文武諸臣守之張輔等班師各進爵級賞賚有差六年交趾餘黨簡定反上命沐晟討之晟與簡定戰於生厥河敗績都督吕毅尚書劉儁叅政劉昱都指揮柳琮皆没上復命張輔往征時賊黨阮師等推簡定為偽上皇别立陳季擴為偽皇輔進兵慈廉州攻喝門江粉社營柵皆破之獲賊首簡定檻送至京伏誅八年陳季擴請降上以為交趾布政使九年張輔奏反賊陳季擴外示順服中實詭詐終無悛心請討之十年輔遣都指揮師佑獲季擴於老撾賊黨皆平十五年召輔還京命李彬鎭交趾御史黄宗載言交趾新入版圖勞來尤在得人今府州縣多嵗貢生乞仕逺方遂授以職既乏大學教養之素又非諸司厯試之才以故牧民者不知撫字理刑者不諳法律宜令御史二司嚴覈上狀黜陟從之十六年季擴餘黨黎利等復叛先是上因給事中馮貴奏賦安南金珠命中官馬騏鎭守擢貴叅政時官吏貪夷財物人不勝徴求靡有固志馬騏尤為不法土官州縣不勝其毒反者四起而黎利尤劇馮貴有土兵二千人驍勇善戰馬騏嫉之盡奪其兵貴與叅政侯保俱力戰死李彬分兵勦捕時有擒獲然反者愈多終不能制也亡何彬卒利賊益張都督方政敗績指揮伍雲陳忠俱死之仁廟初即位遣中官山夀諭黎利授以清化知府命都督方政榮昌伯陳智鎭守交趾利不受職日肆摽掠政智素不相能山夀擁兵觀望宣廟元年智等進兵至茶籠州敗績知府岑彭死之上命成山侯王通都督馬瑛往征交趾尚書陳洽叅賛軍務至寜橋遇伏軍遂敗陳洽死之指揮李騰等俱䧟於賊通奏賊猖獗復命安逺侯柳升保定伯梁銘都督崔聚由廣西黔國公沐晟興安伯徐亨新寜伯譚忠由雲南㑹兵討賊命尚書李慶參賛軍務黄福仍掌交趾二司事二年黎利䧟昌江成都指揮李任指揮顧福劉順知府劉子輔中官馮智死之利攻交趾城通等歛兵不出利致書與通請和通自寜橋之敗氣大沮䘮遂許以清化等州地按察使楊時習曰奉命討賊乃與賊和而擅棄地旋師何以逃罪通厲聲叱曰非常之事惟非常之人能之汝何所知自是人無敢言九月柳升師至隘留關利及大小頭目具書遣人詣軍門乞罷兵息民立陳氏後升等授書不啟封遣人奏聞時賊於官軍所經處列栅拒守官軍連破之直抵鎭夷闗升意易之不嚴戒備至倒馬坡獨與百數十騎先馳所履皆泥淖地賊伏兵四起升中鏢死從升者皆没是日梁銘李慶相繼病死都督崔聚率官軍進至昌江遇賊敗績聚為賊所殺官軍或死或奔竟無降者利益侵我内地西平州禄州及欽州四峝皆没於安南通與利盟遂宴利遺以金織文綺利亦奉重寶為謝是月利遣人至京表以陳暠為名實出利上集大臣議之張輔等謂太宗經畧數年得此土今棄之無名徒示弱耳上問楊士竒士竒曰求立陳氏後者太宗初心也求之不得乃郡縣其地今陳氏既有後封而嗣之何謂無名楊榮亦曰永樂中費數萬命得此無益國家今勞者未息困者未甦更發兵不可上曰爾兩人正合吾意皇祖言吾亦聞之乃出暠表示羣臣諭罷兵意通馳奏暠獻叛人蔡福等遂班師時文武臣多不能返惟尚書黄福自交回為關戍所獲守闗者羅拜曰公交民父母也利聞之曰朝廷遣治交趾使人人如黄尚書皆按兵不復興矣遣人馳往守䕶送至龍州三年通等至京下廷鞫言通等失律䘮師山夀縱賊馬騏激變藩方論死餘坐罪有差贈交趾死節諸臣武官世襲文官復其家誅叛臣蔡福等籍其家遂大赦交趾令具陳氏嫡孫之實以聞利遣人奉表奏陳暠病死國人推利守國以俟朝命上命再求陳氏子孫利再疏稱陳氏無後上屢降勅責之六年利遣人貢方物并上國人奏言陳氏果絶利撫綏有方得民心乞令管攝永為藩臣詔利權署國事八年利死子麟襲自黎氏據安南雲南鎭逺州復為所侵欽州昭浪如昔二都亦入安南朝廷置不問正統元年麟遣陪臣來賀封麟為安南國王并賜印四年安南冦掠安平州思陵州竊據二峝二十一村上遣官諭之麟乃謝罪悉行退還七年麟死子濬襲天順三年濬為庶兄宜民所弑國人討平之四年濬弟灝襲𢎞治中灝死子暉襲暉死子敬自立未及請封而死以敬弟誼襲正徳初安南臣阮种弑誼立其弟阮伯勝國人黎廣等討平之以灝庶子晭襲時安南謀蠶食占城占城上聞諭禁之輙陽聽命侵盜如故已而國人多潜入安南至有受偽御史者教之窺伺雲南太監錢能貪殘令指揮郭景往來安南猾夷奸闌出入莫敢誰何遂誘我逋逃覘我虚實鎭南關外類多華人而臨安諸郡所在有夷賊矣於是撫臣屢請增置文武吏士控制彈壓然交人侵冦我州里我亦不能禁時晭懦弱羣下專權虐政暴征國人怨之十一年社堂燒香官陳暠作亂弑晭詭為陳氏後酋目莫登庸者故有勇力晭以為都力士亦叛降暠㝷復與黎氏大臣阮仲裕等共立黎譓為主而攻敗陳暠時譓方十嵗兵柄在登庸掌握黎氏臣鄭綏以登庸不臣譓擁虚位仍復立其族子酋榜為主登庸攻鄭綏捕酋榜殺之十六年登庸率兵攻陳暠暠敗死嘉靖元年勅編修孫承恩等齎詔往諭即位登庸自稱安興王謀弑譓譓走清華登庸立譓庶弟慮為王國亂道梗承恩等不能達三年冐譓名遣人進貢并求封四年黎譓遣人請兵救援俱不能通五年登庸賂欽州判官唐清為慮求封都御史張嵿寘於獄六年登庸復使國人范嘉謨偽作慮禪位詔遂簒之立子方瀛為偽太子㝷弑慮九年登庸禪位於方瀛自稱太上皇退居都齊海陽為方瀛外援擅作大誥五十九條秋黎譓卒於清華鄭江黎埛共立黎寜為嗣十五年黎寜差頭目鄭惟憭泛海至京厯奏登庸僣逆之罪是年以皇子生先議頒詔諸夷禮部尚書夏言奏安南不貢逾二十年宜罷使上命兩廣督臣潘旦覈其罪狀及寜奏至遂下廷議禮兵尚書嚴嵩張瓚等㑹府部多官議興兵致討命工部尚書毛伯温為兵部尚書從宜撫勦兩廣侍郎潘旦疏稱莫氏奸雄之賊黎氏逆利之裔皆非所宜立如以夷狄處之則元昊可爵不義可侯而黎利可王也二氏紛争兵甲未息皆欲假天朝名號以為之主只宜静以觀其變與廷議不合因召旦還以侍郎蔡經代之是時欽州知州林希元奏交人侵欽州如昔貼浪二都澌凛金勒古森了葛四峝蔡經問岳曰空言罷兵亡以塞明詔子能保勿用兵降登庸乎岳曰欲降之必令納地令貶號且令匍伏詣闕獻國中圖籍聽上處分夫國體固不可䙝也督撫曰如此能令登庸聽乎岳曰祗岳一檄之力足矣於是督撫以兵事調度一屬之岳具有成畫司馬毛伯温至岳以先所論列者告之復手賊情地形冊子授伯溫曰公計用兵則圖進取方畧無踰此者然不若罷毋征為完計也顧公䇿安决耳連數日語輙當伯溫意伯溫宻謂岳曰交事屬子矣先是登庸聞廷議興師遣使上表乞降未幾方瀛死以福海嗣之登庸宻遣使輸情於岳岳絶不與通至是求益懇岳用前言於督撫者要之登庸初猶倨驁岳懼以禍令蚤自為計於是登賢惟命㑹岳遷浙江督學㝷轉叅政登庸復首鼠兩端伯溫徑奏乞還岳廣東登庸宻覘曰廉州守安在岳至登庸曰張太守在吾無恐矣伯溫檄重兵駐節南寜而叅政翁達者素負雄畧諸所筴如張岳議伯溫益信之萬達使指揮王良輔通判蘇廷瓛傳譯令束身軍門歸地繳印去僭號奉正朔復遣良輔等作書諭之登庸乃以十一月素衣繫組躬率頭目耆士人等各以尺帛束頸候于南關萬達等先於關内近地開張幕府設龍亭覆以黄幄傳令開關登庸暨其姪莫文明并頭目人等由關道左出脱履跣足面北而跪傳解其組及接受降書遣指揮王良輔馳送莫文明等赴京奏曰安南自漢晉雖稱内附然夷俗瘴鄉終不宜中國大率數嵗一亂又必數嵗而後定昔張輔以十餘年勞費僅得數年郡縣叛者相繼卒歸于夷此明驗也參酌前世利害莫若外而不内如以登庸有罪未宜輕授爵玉伊孫福海見今待命倘䝉矜宥或可别與都䕶總管等項名色如漢唐故事此所謂以夷治夷者也至若黎寧雖稱為黎氏子孫節據諸司查勘或以為阮淦子或以為鄭氏詐俱難憑據但黎氏修貢已久若遺裔尚存似宜體恤合行雲南撫鎭官查勘果有可據仍令於漆馬江居住不致失所如此處分庶為曲盡登庸亦上表謝罪願以如昔貼浪二都澌凛金勒古森了葛四峝歸之欽州如林希元議上從之乃降安南國為安南都統使司以莫登庸為安南都統使改海陽山南等十三路各設宣撫司盡取欽州侵地仍令守臣勘訪黎寧果係黎氏後授以境土以承宗祀制下登庸已死伯溫等請以制命授其孫福海從之乃以二十年班師各陞賞有差二十五年福海死子宏瀷方五嵗國内多亂又五年始襲時黎氏雖居一隅而黨類實繁黎寧死其臣鄭檢立其子黎寵寵死復立其宗人黎維邦㑹莫臣黎伯驪亂檢以兵㑹之宏瀷奔海陽自是不能赴關領職而貢使亦不能行矣四十三年莫宏瀷卒今上萬厯元年子莫茂洽襲自嘉靖四十三年入貢迄十餘年方以期修貢葢邦内多梗也其後黎維邦死鄭檢子松立維邦子維潭襲以師攻殺茂洽輔黎氏據安南莫氏越在草莽僅數十人或竄欽州或竄思明未有振者黎氏叩闗求欵聽天朝處分然黎維潭眞否論者不一上命覈實以聞論曰昔漢武帝北破匈奴西征大宛西南入牂牁夜郎之墟南平甌閩暨粤東西以其餘力定交趾九眞日南三郡如反掌然何其烈哉䝉古混一區宇北不備胡西不備羌而以宇内之全力不能下一安南何也漢以文告而元以兵威也余觀漢武時樓船下瀨之師未嘗渡富良也龍編諒山之域不以煩戍卒也彼且無町畦吾與之無町畦禮所謂修其政不易其俗者殆庶幾哉光武能閉西域之闗而不能忘徴側之叛雖銅柱標名千古爛然而海徼之役從此濫觴矣試即建武之功方于元鼎已不可共轡而驅而况于元乎元以北方長技滅宋厓山自謂車騎艨衝靡不如意而不知交南非用武地也驅中原之民入瘴癘之鄉兵未及交而死者過半矣况貪墨之吏先擕其心虎狼之習難革其舊即得之而終不能守乎我國家兩犂南交擒其罪人而郡縣置之豈不稱烈然旋復平旋復叛則非勝之難也乃守之難也至宣宗時强將隕干戈勁兵潤草野糧餉不繼海内為墟雖欲不息兵庸可得耶後之議者猶以三楊棄安南為失策噫老成碩畫固未易為少年善功者道也明文海巻三百四十九
