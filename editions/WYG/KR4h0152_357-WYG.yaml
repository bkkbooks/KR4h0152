body:
  text: 明文海卷三百五十七餘姚黄宗羲編記三十一遊覽流觴叙别記陳鶴嘉靖癸丑之歲𢎞宇王膳部既遷越郡之三月即擢建寜倅車鞍馬将行山人陳鶴具觴薦蔬於蘭亭而别焉時凉雨新霽山光益明林鳥不語曲流淙淙羽觴三行鶴乃愀然興思抱膝而言曰夫人之聚散豈不各有時哉然惟賢豪之士為能見幾測變達升沉之故每一有所遇輙遺落身世縱浪大化之中欣然成趣曾不以得失寵辱縈懷及至時移事遷追憶已往之樂皆若夢幻則乂感之從於思未嘗不摛文嗟惜也在昔永和右軍以一時文物之盛集樂於兹賦詩酌酒遂成曠世奇遊述文記事寓今昔存亡之情書辭兩絶然其問多有禄仕之人故後蹤跡漂渙處者則怡志丘園達者則功名四海雖欲復踐當時之㑹不可得矣遂使千載之後視此勝事愈為難及今繕部偶以他往暫得與鶴流連兹亭慕前賢之髙風泛觴曲水散襟咏言坐見清風生於脩竹飛泉響於崇山即其所遇可云樂也但恐情興或闌别離生緒倐焉分手又成殊方之歎矣况復長才繫念於廊廟善政非居於一地他日緬懷兹遊又成故事耳古人云萍聚不常勝遊難再信非誣也是知乖違伏於所聚悲傷生於相歡以今揆古不益有感於右軍之文哉膳部聞言却席浩歎鶴於山僧索紙與筆繪流觴之圖載言於其端以為别滹沱河記石珤恒山之陽有鉅川焉曰滹沱源出代郡泰戯山下匯為三泉流稍延曼循太行掠晉冀蜿蜒而東注之海按班固叙禹貢九河所謂徒駭者是也至宋蔡沈疑之蓋亦惑於夾右碣石之説遂以九河皆淪没於海滹沱中髙不與大河相涉非之夫九河固淪於海滹沱豈亦淪没乎滹沱固不與大河相涉然所謂九河者亦猶九川云爾豈謂大河播而為九乎故知山川經絡茍非目覩身歴而欲據文字定之鮮有不失者矣是則滹沱亦未見其的不為徒駭也顧太行以東地勢頓下且河道淤沙窪壅不常旁無澗壑以洩水怒故霖潦相仍山谷諸流叢奔㑹趨洶湧而至敗城郭没田廬其害有不可勝言者今禹貢舊道既不可見而西漢於此置蒲吾渠通漕船亦堙没無迹豈非亦以兹水之害甚不可䟽瀹而廢與河經藁城自國初至今不知凡幾徙成化壬寅始廹城下凈土寺没焉自後每秋漲至則汎濫於縣三五十里市野皇皇無所遁棲適有天幸未為洿沼𢎞治六年太守張君淑始開新河於郡南費以萬計未再逾夏水大入復趨故道功竟不成老氓相傳云是河不宜修築惟祭則可蓋神明之也於乎諸侯得祭其境内山川則祭典固不可闕然禦災捍患以寜邦家為民父母者職也往者宣防之塞近時張秋之築具在焉疏理之功亦豈可少哉顧得其要與否耳誠得善工相髙下量順逆遲以歲月鑿山開原廣拓水境要其上流而放之寜棄百里之地以全城池則雖鑚龍門折伊闕尚可為也而此獨難哉不然為石隄以捍之亦再歲之利也又其上者平政惠民薄聚歛省刑罰尊老慈幼修祭祀順天時使五行各得其所則火炎上水潤下百川用寜無墊溺之苦雖古昔賢者之論豈能外乎是哉若復迂之于是洪範可遂廢而天下之害付之末如何矣智者試反而思之萬一得其效豈以某之言為老生之談哉錢塘江觀潮記王文禄錢塘江劃分吳越凡三折故名淛江秦望山脚揷入江心舟犯之輙覆乂名羅刹江江口有兩山南曰龕山北曰赭山並峙如門曰海門下有沙潬跨江東西三百餘里如伏檻然閩楚諸山奔㑹於天目水隨下出海門赴鹽官經澉浦及武原㵼乍浦轉金山九淞三泖水䦨接俱放於大洋惟秋金旺水生百川灌注大洋瀰漫湧入海門逼礙沙潬囘薄激射抑怒不洩則奮躍上躋以故潮頭特髙數仞趨富陽扺嚴瀨始平隆慶戊辰秋七月晦天台花桃村羣龍穴起山奔水溢踰台城蕩析廬舍予家武原並海海桴撩取器物無數萬千浮骸閣沙塗八月既望予至錢塘乂二日乃十八俗稱潮生日士女聚觀如堵劉子邀予酌望江亭須臾白光横亘如長城女牆推來自東北轉西南夭矯如玉龍拏雲散飛如霰雪宻灑駛騰如萬馬駕素車鬛翻輪擊繽紛凌亂聲殷殷又如雷霆倐轟震撼坤維浩渺間沙堤盡没劉子舉酒酌曰奇觀也校往年潮尤大蓋以諸山水溢故予曰觀固奇矣獨不念台民之溺乎夷舶之擾乎宋之觀潮元之駐兵乎錢鏐之射乎秦始之渡乎予與子同諸友自戊午辛酉凡三觀矣聚散升沈不猶潮中一泡沫乎噫江山如舊風景不同舉目有古今之感也限東字各賦一詩練痕遙上海門東日映金沙捲玉虹白鳥若隨舟楫轉青山應閲古今同掀天浪激層層雪震地雷殷陣陣風吳越劃開剛一水誰收强弩濟川功韭黄門觀瀾記王文禄秦駐山故有韭黄門徑僻人罕至去鹽城廿里餘夙聞奇勝正德甲戌春季望就傅暇一僕負之行登山巔逺望未悉也萬厯癸酉春季紹坡狄叅帥督海防寓始皇廟訪之偶客盈坐擕酒同遊循山腰狹徑轉步峻截陟降數匝始至石崖錯列如堵側足踐級抵平崖坐方石上隔崖小山屹峙夾如峽門潮正長湧入峽内峽外潮過接南岡闌峽内潮不得出束之𦂳激射而漰湍倒遡縈洄旋渦層疊圓如車輪渙如綺縠滚如沸湯浪花簇起白煙瀰茫噴雪跳珠觸石怒聲如雷震山如螺浴地如桴浮恍忽如鴻濛肇開呼酒大酌稱快亶勝槩奇觀云有客拂石擇而指之曰此宜直書韭黄門三大字此宜横書觀瀾二大字速命云削砥石如榜勒之不朽盛事也即賦七言一律各隨賦紹坡曰請記以識之使後人知今日之興併勒之石王生曰然追惟髫齡一至周一甲子始遂初心非數乎何幸也噫海山奠軸日月奔駒性靈同天歴刼豈壞益悟瀾必有源尾閭須彌一脈旋轉控清澄濁各當勉旃夙抱何從根器非妄日斜騎返攬轡取澄清之懷韭黄訛九王或曰山突曲汪洋凡九汪轉諧王或曰韭旅生黄芽以故得名皆莫稽也嘉靖丁亥秋大魚乘潮入峽脊如山兩崖脊離尺許亦一奇勝云併記之系以前律詩曰門開突峽豁青天花簇旋渦生白煙大地欲浮潮正長髙峰将没日斜懸影移戰艦雲中盪聲振奔鯨谷口傳三傑興豪題柱石一盃風便引飛仙華山遊記陳以忠戊寅春余被譴當之寶雞道出華隂陳君潤夫有湘中之舊時為令李諫議若虚移書先之謂余将登華山也入潼關或云陳君且他去余曰三峰在即吾主人矣既抵華隂乃陳君歸凡山行之供無弗豫者二月之十八日也㑹觀察賈公擕其子及王公子登山賈舊在長沙余為之屬今又屬也遂從之出南城三峰在望揷天寒碧映入心髓七里至雲峯有雲臺觀周武帝時築以居焦道廣者乂南行二里至山麓有玉泉院則宋端拱中築以居希夷先生者也院後有冢或曰希夷仙去骨蛻峽中已乃道流持其顱向人乞施嘉靖間姚侍御者收瘞之念希夷生也遺世死也遺蛻後人浪為生情耳冢後巨白石工穴之像希夷卧其中如生蓋所謂寢無夢覺無憂者慨焉慕之陳君有酒筵余從賈公飲數行乃入山兩山對開嵐光交墮吏卒導從上下宛轉纚纚無絶亦自有態行五里至五里關往時避兵者就險累石為關陳君欲稍増治之額之曰通天第一門云行四里為希夷峽山勢壁立澗水經其中滙作小池從石室旁下如琴如筑鳴聲快耳希夷蛻骨於此或云即張超卧仙坪也半壁有穴飛石掩之又里許至桫羅坪賈公不能上余請曰與山靈為三峰之約當更上之陳君笑余曰乃復見拄笏王生賈公與二公子俱下陳君亦從之下余獨留日已西西山髙恍有暝色度不能至青柯遂止桫羅陳君已命道士郭全銘左右余導余登山桫羅菴郭所搆也步菴外東面石壁可數十文鳴瀑掛壁而下有坎兩兩直上可容足趾郭曰此通上方峯指石罅為西𤣥門唐金仙公主脩真於此駕鶴飛去白雲宫細辛坪在焉余欣然欲上郭曰每歲三月香火輻輳華州道士來始向峯頭斬荆棘開徑懸鐵鏁而上之不似三峰時通人跡也余徘徊太息北望山頭有石如柱為繫馬峰西望西山山桃花石罅盛開不知絶壁何縁著種或云風吹花片粘之輙生山山有之命僕夫攀崕就低埀者折得一枝花疎淡不似人間濃艶也望頃花間似有物去來余謂猿猱乃云山羊善走險棲嶔㟢中人利其毳能伺取之南有四峰青柯所從之路也四山髙起余臨澗坐石奇秀滿前應接不暇恨友人陳七已死不得丹青手圖之有頃酒至余問酒何來郭曰君侯遣壺榼到處從公也飲石上山已暝閴寥中泉聲更自清逈還就菴中晩食食已獨步空庭仰天視星斗忽驚黑雲四面壓瓦謂風雨且大至乃林樾無聲漸聞啼猿稍稍辯峰巒草樹忽自笑忘其身在山圍也呼炬火夜遊問道士将無虎狼邪郭曰山面面陡絶虎狼不得上山愈深愈益奇愈益險請以兹夕休其足力余笑而就寢清逼魂夢曉聞孤鶴長鳴過山頭輙起櫛髪宿雲經簷間與炊煙冉冉出谷峰頭積翠浮浮欲流色潤髯鬂呼酒四五行乘肩輿亟上或舍輿而騎或舍騎而步視所經險夷以為勞逸每望前峰已如路絶既乂踰焉至十八盤者山最陡十有八折乃得上故名盤盡峰囘忽見垣瓦屋鱗鱗綴前巘則青柯坪至矣至則祠廟神像俱經地震頽圮間已葺治數楹獨地勢愈髙天然之景爭獻秀爽視桫羅又進之余竚立四望遙見泉掛山腰如練郭曰此水簾洞也直下三千尺自蓮花峰來又還視山徑中客四五輩方傴僂欲上有角巾翩然者将遣人物色之郭曰此某君故為藍田簿與君侯為僚别有僧導之來余方苦無伴使人先之則又使郭往趣之簿至同入山館供事者甚謹余强之杯酒局局邊幅不暢與約登山敬諾郭曰士大夫能至青柯者十之二三自青柯而上僅僅可數君侯知公必登三峰戒吾徒之善縁崕者及諸濟險者皆具苐恐公不任此險也余戯曰懸崕撒手一著重蘓豈丈夫而畏險邪易草屩起步石橋從左徑上可里許有回心石焉郭曰從此上千尺撞遊人見險心悸率退轉是名囘心余笑曰我心匪石不可轉也至千尺撞下蓋絶壁壁裂之兩傍稍施斧鑿斷樹枝横之以承足枝相離尺許凡千尺云郭使其徒以吕公縧束余腰而扱衣衽於縧則乂以長繩繫之縧二人自上引之而一人下佐余足右偏復長繩下埀余手長繩躡横枝以上賴有後先之者竟忘其勞既上乃下望魂搖搖也問簿所至已自囘心石去矣西折上百尺峽峽似撞而裂在峽之内出峽登望仙臺方丈平石可佇立逺眺忽南峰片雲欲墮不墮作嬾態風吹斷之如人乘鶴來者童子得句云雲到嶺頭嬾人來鶴背輕余頷之度二仙橋石梁跨壑草樹清幽余不能捨去從者促余行遇車箱崕崕如車箱人縁輪以行乃至老君離垢絶壁有坎如西𤣥余上之如撞如峽而險更甚謂老君登華從此離却氛垢云過擦耳崕崕峭立躡處僅容足乂下臨深壑余面壁兢兢移步即隆凖公不得過此不獨大耳兒也忽成獨笑復至一崕奇峭甚仰攀折旋出石穴以上有鐵猿顰踞㟁畔曰猢猻愁因誦猿猱欲度愁扳援之句過此忽開朗則白雲峰也有菴郭道人在焉出茶供相與坐長松下叩其所有曰吾所為入山者不見可欲使心不亂聊去俗耳余為㸃頭坐有頃起去之郭送至際曰此閻王邊也謂隣於鬼矣余攝衣以登了無所怖乃至日月崕謂兩崕髙起日月出没從山隙射之當是奇觀余攀躋倦又渴甚息足松下顧安所取水童子從崕隂捧雪至余飡之清凉刺骨歴金天洞洞最宏敞往年地震時洞裂神座皆下䧟可五寸郭道士因言山之四周下䧟盈天山足土痕至今存也又經三元洞洞比金天差小蒼龍嶺在其前嶺中起旁殺蜿蜒入雲人從龍脊行危甚或一失足轉圜千仞石平處暫得休伏視下方松頂若蓬藋在蒼煙中濤聲萬壑疑泛巨海罡風時時捲人衣覆面嶺百尺危可禠魄兩旁穴石施鐵柱有仆有立郭云舊嘗有欄漢武帝登山御道也度嶺望見雙樹聳出空際曰此将軍樹矣自青柯以上無他樹樹多青松白楊山髙風鋭振撼無定枝􅆬盤屈獨此二松挺然離立有石曰上馬石者余曰即渥洼龍種何縁上此從者曰有風道人不知姓名游行山頭一日天馬下之風道人就石跨馬行空而去石旁有老松倒挂若虬龍下雲端忽昻首攫挐奇奇恠恠丹青所不能貌余愛之坐石凝盼忽西峰雲來迷漫澗壑恐驟雨至亟趨雲山崕崕有宗土地祠謂華為羣山之宗也已頽圮有四仙菴為譚紫霄為丹陽劉海蟾丘長春脩煉之所就其中坐石小憩雲入菴沾人衣皆濕雲過乃復步凡歴數險則玉女峰矣大如石龜背甓瓦皆鐵郭云陶瓦則山風能颺之去也前一圓坎水紺碧為玉女洗頭盆又其前石裂裂可五寸以石投之食頃猶有聲或云下通黄河唐𤣥宗禱雨進簡於此刳龜腹為石室舊有楊妓師事韓姑姑於此韓肉身猶在槁而不腐楊壽百餘歲不知所去又南為三清洞王道人結菴其左余過之王出松子為供味鮮美甘香溢口余問山頭五粒松凝脂千歲可延年即此是耶右偏新架板屋余憩其中屋角松房成積其長丈皆風落而收之者童子擊之子滿其下囊得升許余問道士将安宿耶曰五峰道人今在東峰不逺矣遂相與陟岡上東峰岡石斜削可數十丈稍鑿足跡無草樹枝蔓可攀躡從者手接而上之遂達於巔有三茅洞前為小殿殿左有巖五峰道人居之依巖置扉當其缺處稍亦架椽為屋可坐客可爨余至道人出迓曰清晨黙念當有佳客命弟子灑掃石床公自何來余曰來此訪道相與坐茶頃起臨崕逺眺當東峰盡處東南北三面無他峰礙蔽道人指㸃中條首陽諸山疑隔數里黄河如綫則近縈山足矣目際村落比比乃云此同此蒲此商此陜某某等州千里之内可俯而視人生不髙我足底曠我眼界大我胸次如甕中蚊蚋裩中蟣蝨真憶仲尼登太山而小天下也與道人相對慨歎忽雲生首陽英英欲起道人因言山頭雲態甚悉髙低逺近濃纎遲速去來有無至不可状又言雲彌布峰巒即數日下方不雨一流動則下方雨矣有時晴雲冉冉孤飛入谷忽已失之蓋歸雲也步前岡老君碁所碁石方徑五尺三十二子鐵為之重不可舉豈臨局下著慎重當如此耶已風色寒天漸暝還入巖下道人請就其寢室室入巖之幽蓋一大炕可容三四人余與道人洎道士相與箕踞而語忽聞鼓聲頃之如雷余呀焉道人曰風入巖坎耳余曰劒首之吷而管之嗃也華山之巖宜其雷矣問之神異曰夜靜時扉外有足聲令弟子無窺扉一任之恐變幻能動人青柯坪道士某為師守舍見緋衣方山冠者甚偉長可十餘丈坐山腰埀其足呼曰爾師山口失足往擕之言已失所在某如其言攜師以歸蓋山神也又聞白雲峰郭道人云遇異人於上方遍體長毛採細莘以啖就之則去之追之已失之矣又問他奇曰青柯坪以上無鳥山頭有一青雀時來乞食一老猿每危坐前岡視衆猿採核輙復棄去語久忘倦擁衾啜茶乃就枕枕上閉目追念所過諸險數數魂墜覺得此身已與人間隔絶心泠泠無塵神翩翩欲舉如寐如寤作遊仙夢山頭坐石看閒雲巻舒有異香縹緲羣仙來集各道姓字宛若平生希夷手紫栢一栢埀埀葉露啖余余因得邀秦玉姜彈琴杜長春吹笛王伯遼刁自然輩鼓五舌簧聽之樂甚壺公授余竹杖欲乘余俱去念諸同心有初約徘徊未可顧謂焦仙曰倩汝三青鳥一向金門報王元馭一向江南報范伯楨胡原荆王承父一向㸃蒼山畔報顧益卿因令各乘之來也羣仙聞余言皆笑忽然想滅夢斷已涉幻妄爾時道人正趺坐聽余鼻鼾振余曰睡無昏昏然當起坐令清氣余曰正自不為道之濁道人曰宰官身故自有仙縁因口授坐卧吐納之法復為講叅同數言㫖趣可繹偶及化書曰見聞入道者也證以忘形養氣忘氣養精忘精養神之説曰忘即助長矣余悚然俄而東壁有隙光余曰曙色耶曰未曙月出之光也啓窻片月方起光上射巖端白雲纎潔如素錦月漸髙浮雲蔽之擬觀日出状及旦雲竟不開也余急於覽勝又趨起櫛髪道人炊胡麻飯余青雀飛止道人肩道人曰雀來矣就掌中食已復飛去余歎道人忘機飯已相與出扉重臨崕端下望雲如飄棉飛絮平鋪萬里僅小尖上出余謂道人曰王司勲汝明登太山見此景語在吾耳也因下岡忽風來余與道士及從者數人手接而下一人仆則兩人蹲而挽之或不能當風則三四人連仆道人獨行亦仆宛轉石上復起其身輕翔且習之矣循岡北行觀仙掌巖巖壁黑色石膏自璺中流出隨膏凝結黄白相間逺望之見其大者五岐如指相傳謂巨靈劈山掌跡猶存也還至王道人所乃余憩板屋已為風吹去蓋聞雷時也王導余左折觀新洞洞頗髙廣同州馬君怊額之曰迎陽蓋華當少隂迎陽以配合之令有生氣云又上之為雷神洞復右折為朝元洞洞之下為賀老避靜處穴石埀雙鏁而下之鏁盡乃板道以銅杙揷之峻壁而板載之銅杙之上復綴壁以鏁攀之而行板道下皆絶壁松林隨山麓起伏翠濤彌望賀所棲室憑於突厓焬竈猶在室傍有巖髙十餘丈遙覆其室朱書全真巖三大字蓋憑空仰作之者亦神奇矣還出石穴復經閻王邊西折以上為避詔巖希夷表九重仙詔休教丹鳳銜來蓋此巖上覆如屋多怪状余往游分寜清水巖其勝畧等西上為嶽殿下有希夷睡處相傳希夷睡經旬鍾離雲房過焉候其息以紙墨作黑白圈圖之授純陽子曰先天混沌譜也乂下為老君煉丹所石爐經丈餘髙可六尺余聞老子青牛出關遂入蜀關尹喜索之青羊之肆安從燒煉於此道德𤣥𤣥又安事爐中龍虎耶或好奇者托之以増靈勝耳北行為西峰石罅二尺直下相傳香子斧劈之留有足跡或曰巨靈足也又北上為西嶽大殿殿之北為舍身崖古之有道者皆於此仙去崖之東稍折而下為鎮嶽宫玉井在焉深可十文圓徑半之記云生千葉白蓮服之羽化或謂開花十丈藕如船也乂北上為蓮花峰視諸峰不知更髙幾許身疑在太清中吞吐靈氣五内百骸灑灑如濯不一到此虚生此生昔李白僅登落鴈峰便為呼吸之氣上通帝座不知上此更作何語峰之下有石窪如臼凡二十有八上應列宿自南而北如貫珠水經其中由崖端挂下山腹水簾洞洩之道人為余指㸃雲臺白雲白羊松檜朝來玉柱玉秀毛女諸峰張超石羊黄神藏馬諸谷歴歴詳説余恨無羽翰横飛乂恨不遂鑿巗結廬遯世以老天漸晦道人曰雨至宜且歸始予登山從數人持三日粮不謂陳君所遣供事者倍之計再宿當無贏又聞山頭雨人不得上下經月雨即經月不得上下乃與道人别取道下山下山較易蒼龍嶺遇雨淅淅灑面避之三元洞雨止復行下離垢如初上時則先一人納余足坎中而上縋余者徐縱其手乃以身下下峽下撞如之余既下笑謂童子曰腓股酸楚如斮幸猶我有也抵青柯坪陳君别遣人供張候余余飯乃就輿令僕夫倒輿而肩之峰巒層疊隠見如拱如揖追隨送余余亦如去知已别情親愛戀難割又如劉郎之失天台漁郎之失桃源悔其還也嗟乎未斷塵縁重來人世清都此去托足何期千載一時感慨無際矣既抵客舍恍惚碧雲青靄猶在衣履奇峰怪壁纍纍囊袖泠然充然不自知所得云何也余為時棄擬從蓮花峰頭把酒問天乃到時忘之矣山骨立五千仞洞皆琢成不似吳粤間土石㟏岈錯互水蕩滌出之者山㘭山罅有土乃有樹樹底多墮葉摧枝歲月朽腐無寸草石上生萬年松草類亦蘚類也皆枯莖一雨還青記稱華山神林斧犯之輙逢虎狼豈然哉山自青柯以上樵者所不能到故棟樑之材干霄合抱皆得自全不獨樗櫟臃腫匠所棄也余婚嫁未畢五嶽在念不圖竄逐首踐西華嘗怪韓昌黎以彼雄豪登華山頂驚悸不能下至痛哭狂呌欲死乃余是游而幾死者亦數矣峽千尺撞百尺一躡朽枝将墮援余者安能為力死矣即余不先墮援余者失足墮余與俱墮死矣離垢時足一躡空或繩斷手痺死矣山頭或下片石死矣蒼龍嶺風决起安所留足死矣車箱諸險莫可先後莫可左右一失足死矣扳道銅杙多鏽損板或墮死矣東巗架空支牀當聞雷時風或頽架死矣余犯數死以成兹遊竟能容與三峰歴太虚搜仙窟豁耳目開心魂筋骨逾强意興飛動将無山靈䕶持之耶而陳君仙令能愛客於煙雲間幸哉余之遭矣陳君謂余當紀遊将伐巨石刻之山頭以傳奇詭余方自適何暇適人姑存其概時自披覽當坐遊云黄羅山記黄允交黄羅去敝廬只二里餘余每從郎川還山中輙一登其彷彿可紀者五初與諸從兄弟遊陟山半忽霾晦登頂見下方白露瀰茫諸山頭出霧中如青蘋白波共浮蕩黄白二嶽時露一峰兩峰隨霏靄之淡濃為現滅熹微倐忽類海市然次為四月晦與程平仲偕天燥不可耐四望昏䨴如前遊坐䕃山半横厓中見近畝麥熟萬頃黄金地緑畔界之井井也一偕同業汪爾占諸君是日稍霽遙山可數輕嵐媚之近則千丘晶熒弄日日下舂霞綵四起為絳為紺為蒼碧與巒巖紫翠相映發俄而巨光一線横竟西北天非黄非縹作青金光雲門蓮花諸峰􅌑瓏岞崿悉視光中疑是軒轅浮丘鼎中丹氣真使人作凌雲想一偕程用修汪于田鄭本寜以觀梨花至乘興登澹隂四埀疎雨時灑俄而煙歛俯視原樹隴麥嫩色如染清江帶之或一片緑玉布颿飛其中如水田白鷺也不食頃霧復集諸君謂山靈為我輩出阿閦觀耳一偕族侄明逺用夏則秋閏九日風甚勁碧空澄朗可辨纎毫歴指諸峻嶒者為某峰某峰諸培樓為某丘聚落為某鄉浮圖五出為某某刹松飈萬壑轟響如海潮西日射大川中晃爛沸蹙遙眩人眥帆檣㸃㸃落冶金中不復向者觀矣夫山川不改余五登而見各殊煙雲雨日屢遷而流峙若與之俱幻乃信世界多幻境攬勝者何可謂一探輙盡也遊馬鞍山記俞允文崑右婁縣縣之山馬鞍艮次形勝婉麗不類土俗敦驕奢華歲向春鄉里通衢之人闔户以往才豪强梁襲以相勝窮獨貧賤賴以為日當其時人有羸者矮者癡者瘖者跛者羶者口嚙者疥痔者聾者耳偏枯者眇者瞎者矇􅕓者牙黄者峻頰者髯如拖朱者肥豕腹者韋條長者鼻削不辨臭穢者口耳缺者廣顙突脊頂秃髪鬈者首縮而足掘唇掀而齒豁者面五色具千怪萬象或數疾而同一人或一人而同一疾如是之人老幼男女蝟集蟻擁或羣而嬉或列而行或㧞距走鞚或張弮帣韝或喜相奔逐或怒相搏擊或提罌挈盂絡盛壺飡或邂逅交遊扳連而往或握手道舊或倚樹歌咏或乘興而至興盡而歸或興盡而歸援之而止或以事牽道經而遊或以遊至事牽而返或戯謔人貌或滑稽射逺或恃勇乘危或反接特行或喘或溺或嘯或笑或坐或卧或俯而僂或揖而讓如是之人不可殫状山行郊遊巷集道溢當其時人有鮮好衣服張蓋擁衛瞋目咳唾擬於王公狡童雋妓曜色增態挽袂憑肩迎風掩笑千聲百氣弄影驕艶枹鼔摐金鳴絲擊筑羣呼聚飲列炬而還如是者才豪强梁也翠㔩金璫朱衣華裳拂擊目睛五色並輝足若蓮瓣輕盈㸃石刺蔓鈎蘿丹碧支裏數步之内香澤襲人左右侍女前呼後應人莫敢仰坐口評論如是者皆才豪强梁家也夾道歡呼笑罵騰踊卒然之間目不及張遺簪墮珥破襟絶襦婦女鬟髪彷徨孤立目落神沮埀首斂色如是者男女交錯也其侣聞之莫不䝉羞疾行自謂至此死有餘恨乃今屏跡然猶有不畏者牽引乘攜左顧右盼妄稱故道迷復環視肢體皤腇腰若束芻髻秃􅆙鮮塗澤衣服故舊不相掩覆解衣市物且㗖且行如是者鄉里貧賤也牲酒羅列揖跪拜立但恨無地先後卜祝吉者忻然凶者復續灌酒謝神丐者環立禱頌紛紜盆盂髙下一人廻旋莫可指畫如是者歲時廟祭也牛牽馬驅髫齔行隊恃力扛石從事野燒競走益薪超烮越熖爭以為能如是者牧豎也數十百人攅一短褐閉目捋鬚摇首舚舌語言若注不吃一字解衣散錢者為王公嫚佛諸天者為馬牛愚頑無知憑依若神如是者為浮屠也曲席結舍圖形繪象衺人穢夫極口稱道其状與浮屠等者皆星士望氣人也無賴男子駢肩累足衆口交喝一時之内山崩谷沸反走却避豁然成路如是者擊毬也白眼嫚罵足蹩不前偃卧隨道者遊人醉也黄衣撾縚尼僧道士也幅巾厥襖武藝術人也屠酤酒肆星紛豆貯乘軒弛擔植然梗道百色之人莫不投業以為盛事人聲鳥禽相和煙日風火焱發繽繽紛紛文文章章具一時觀豈不偉哉俞子徃觀而歎曰韓子云脉病而肥者死今之天下疲聾殘疾㷀㷀孤苦破衣敝屨盎無斗粟日暮無食談笑自若數千百人罕有出此皆沿習成俗猶敦驕奢華是亦脈病而肥者也何豪貴豐顯作一大官以囊槖計而視以為樂悲夫三山遊記屠隆秣陵長干寺沙門欽義渡江來朝普陀訪余紫煙閣曰貧道髫年祝髪西遊峩眉朝普賢北遊五臺朝文殊迄今東航海抵普陀朝觀音大士所至皆遇物顯化光景殊勝且窮列名山大川神臯靈壤險壮峭絶雜遝參差忻然有㑹於中嘗欲為文記之恐筆不逮心請得口之吾子筆焉余曰唯義公年十七隨師入楚由巴東浮巴江巴江險急清泚可鑑其上羣峰岝􅩨往往刺天兩岸狹束僅容一刀水中亂石谽谺怒張利如鋒刃舟上行者百丈牽挽難於升天下者建瓴躍矢瞬息千里彌迅彌險所歴瞿塘灎澦白帝黄陵三峽之間峰巒秀媚草樹蒙茸鳥啼猿嘯使人且喜且愕神骨蕭爽從東行萬里抵峨眉未至峩眉三十里望兩峰濃黛欲滴似明似滅乍逺乍近來迓人俄而峰頂佛光忽起光五彩作横空巨梁状衆驚顧以為虹霓獨義公心知其佛光少頃梁上復起一圓光如滿月光中現出一白象其上乘一菩薩衣裳纓絡宛然若月中現出河山地影而明了過之良久圓光冉冉墮東峰梁光隨滅詰朝登山參普賢道塲山周迴千里形半彎如蛾眉故以名兩名刹一曰白水一曰黑水俱在山半其餘叢林以千計僧徒以萬計又明日登天門絶頂天門者兩石若擘開髙而揷天人從石中度罡風峭勁殿宇不可以覆瓦瓦皆以銅鐵錫為之其上多奇花怪木靈禽異獸鳥有如鵶者如雀者俱能言誦佛號朗朗聲徧山谷小獸有如松鼠者能隨大衆禮佛後雙足人立擎前雙足作合掌状人拜亦拜了不怖人以米飼鳥雀結縁羣飛下繞人前後如素狎習然稍起一機心瞥然翔舉矣一花五色若蕣英不知何名有放光石日照之則有光作五色閃爍射人山髙寒六月飛雪隂厓積萬歲氷中産雪蛆玉色可愛人登山夏月披裘冬月僧衆移居山下留一二苦行者掩户地炕而居所遇多髙衲異人後二十九北遊長安從涿鹿入代州上五臺五臺者五峰平列如臺故名一名清凉山按華嚴經云大支那國有山名曰清凉其中常有一萬肉身菩薩於内脩行即此山上有清凉石廣僅丈許可立千人上濶下狹状若仰盂盤旋搖動久而不墜義公登東臺禮菩薩罷出據峰頂瞩眺山距遼海千里微茫窅靄逺見聲色時日向西見峰影雜人影隨落照而去直墮海面義公目眩魂駭咄咄奇事時關中人王大理道純䘏刑太原在山下召僧徒齋課為二親祈年作福某嘗聞此山靈異某至而不得覩見豈其意固未誠耶頃之見燭忽吐花迸開如五色寶蓮蕋瓣􅌑瓏少頃變作狻猊状其上坐一菩薩光彩如畫王君愕眙大喜遍召徒衆入觀無不歡呼頂禮久之漸隠燭亦漸滅比王君入室更衣燭明如故時義公親見其事王君亦自譔神燭記萬厯丙戌春義公東渡羅刹走㑹稽由甬江出鼇柱峰下泛海朝普陀觀音大士一葦在大海水浮天無岸海上諸山逺近厯厯大者如拳小者如粟天黑風起波濤洶湧義公寂照觀空兀然不動但髙吟謝康樂詩揚帆采石華掛席拾海月普陀一名落伽山孤懸海中四方僧衆士女來朝者殆無虚日夫文殊普賢觀音並古佛應身出世各就南贍名山以為道塲而義公先後卓錫覽勝㝷真參佛証道斯以勤矣古今文人藻士好遊天下名山川崇躋幽探務窮勝絶以此散其胸懷解其煩懣是未免於往也取境解心境在則解境去旋縳此其於道無毛髪益故林栖穴居之士標格翛然風流掩映而並不聞証道度世此其騐也義公三山遊非徒擥結雲霞討求松桂其與尚平許邁之遊猶有間焉余故為筆而記之東門觀桃花記王衡蓋今人多偽為雅而吾吳尤甚蘭菊㡬家置一譜焉次則君竹而友松第而至桃花極矣廼予性獨深愛桃花每春未嘗不遊遊必徧今年二月之十七日予與汝増約使人往探城四隅問花之所止而之焉具報東門好則步出東門踏菜花行望見一村居小有花栁可觀則酒鎗與蒲席已次第設矣其居在小谿中桃花左右溪約有三四十株甚嫩美既乂移至吳氏庄庄宅與池相遶畧同前而廣五倍之花碩大且繁中一緋色據水上者特異長楊數章列池外如偉丈夫衣冠拱手而䕶少女子於内桃花亦醉面埀埀傍水洗粧不輕見頭額也飲樹下留連久之顧日尚未晡廼復信步㝷花其在水濱者牆角橋畔者菜花栁樹叢中者輙灑水施茵曰與爾延客或遇之矮簷下及坑塹竈突之間則含酒滿舌噀之曰為汝浣衣席暖更移酒盡復買忘其去城之遂逺也汝増曰夫桃價不堪與牡丹作奴人且以市娼辱之子何好之甚余笑曰子品花乎品價乎夫價則百十桃者有之然皆如口脂面粉不粘人意刻畫綵繢人能盗天夫桃也逺而睇之光浮浮然近而即之若有煖暈焉蓋頌桃德者夭夭近之灼灼則已下矣擬之於春殆巽女乎陽出震而得梅桃與梅其得氣獨完故於香味色中具有别韻即刻畫綵繢者巧愈不似似愈不真子舍是而貴夫盆鴦拳握之觀何歟且夫天下之貴賤失所久矣餖飣貴而粱肉賤土偶貴而人物賤品題貴而考課賤桃之賤於子無惑也汝增無以對遂泚筆志其語香山雪遊記王衡余以前歲遊真覺寺訂雪盟比連日雪乃鼓舞周季良同客尤伯固王元敬張伯新遊焉甫出門目神外淫雪乂彌甚遂遣童子歸将襆被來而止飯真覺寺據浮圖騁望間露石骨者隨捧雪綴之飯已循堤行則黄日已逗雲影中逺近諸山黛白錯而東一山受晡日色獨爛如丹霞驚睨者良久比到香山且昏夜矣賴夾道積雪奕奕導余行俄而星見天井山僧報曉霽急科頭起則千峰一雪凍雲頽倚山頭如醉玉人乃将諸子涉環翠亭雪徑深二尺許從者幾以雙趺印之觴數行轉而憩於碧雲之余公墓平臺坐林巒中眺雪頗勝已乃從舊道歸則昨日之絲者繭環者化為玦矣因相與錯叙其勝今雪毰毸欵舞且倦且驕舊雪晶明浩漾積矣而若不有試從卑望髙如鉢和國人仰面不見山若登髙臨逺則又身在凈界視三千大千沙礫皆凈土也其封谷完其揣樹宻其印沙如鳥篆其附城郭若魚麗其幕紅寺襯落葉俄淺絳俄又淡黄種種作態可喜至於寒雁空横素鳬旅坐暗泉界響老松低枝枯蘆有聲村火斜出於是間更有深致吾曹戴髙簷㡌披貂幨㡏奔車鞭蹇爭相指盼以為山林入吾畫圖而亦知吾曹乃山林畫圖中人耶季良叫曰此致佳固安得不消之雪而弄之余曰噫嘻自古汗竹繡石簮筆技劍者等於朝雪而况雪乎子欲得雪而不消者則為玉為鹽為絮為練種有幾似矣而實非此歐公所簡棄也且子寜粉增乎寜雪減乎傍一客應曰然雪則何必不消顧吾輩雅善消雪彼熱肺腸子封簾守户者吾猶得以頃刻之觀傲之余曰毋人各有適子以徽之舟東郭履鄭棨驢為至矣乎則風不出而不出之叟亦能笑人顧謂伯固子弟圖之余姑為之記明文海巻三百五十七
