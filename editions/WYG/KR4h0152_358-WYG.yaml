body:
  text: 明文海卷三百五十八餘姚黄宗羲編記三十二遊覽遊驪山記袁宏道驪之山鬱然而清而其水浩浩然鳴九衢也古木森森然翳東西嶺故宫遺址多不可識山下之民有雪領而杖者作而前曰民雖耄猶彷彿憶之指其巍然而墳者曰是舉火臺褒女之所笑也指其温然而澄澈者曰是蓮花湯明皇妃子之所浴也問山下之故壘曰是嘗錮三泉而開七曜者始皇帝之地市也余倚松四顧蒼茫久之乃披荒榛踞危石楚聲而歌曰涓涓者流與山俱逝兮空潭自照影不至兮吁嗟乎兹山祟三世兮歌竟浴於長湯遂登老氏宫極於臺東過石瓮寺休焉稍倦假寐僧榻忽有丈夫峩冠修髯揖予而言曰吾子失言夫山奚能祟使吾幸而遇嚴匡諸君子豈不亦嘉遯之藪吾子謂九疊之屏七里之灘何遽出吾上耶乂使吾所遭者為宣城孤山輩騷壇之士豔稱久矣吾豈復戎吾姓也余蘧然覺自悼言之失也復喟然歎曰異哉天子之貴不能與匹夫爭榮而詞人墨客之隻詞有時為山川之九錫也異哉今之處士誰能入山而為水石所倚重者吾當北面事之華山記袁宏道凡山之名者必以骨率不能倍膚得三之一竒乃著表裏純骨者唯華為然骨有態有色黯而濁病在色也塊而獰病在態也華之骨如割雲如堵碎玉天水煙雪雜然綴壁矣方而削不受級不得不穴其壁以入壁有罅容人隂者如井陽者如霤如井者曰㠉曰峽如霤者曰溝皆斧為銜以受手足銜窮代以枝受手者不没指受足者不盡踵鐵索累千㝷直埀下引而上如粘壁之鼯壁不盡罅時為懸道巨巒折折相逼若故為亘以嘗者横亘者綴腹倚絶厓行足埀磴外如面壁如臨淵如屬垣撮心於粒焉知鬼之不及夕也長亘者搦其脊匐匍進危磴削立千餘仞廣不盈背左右顧皆絶壑唯見深黑吾形􅤢􅤢然如負甕自視甚贅然微風至搖搖欲落第恐身之不為石矣夫人所憑仗者手足而督在目方其在罅目著暗壁升則寄視於指也降則寄視於踵也目受成焉耳罅盡而厓目乃為祟眩於削為栗眩於深為悼眩於仄為喘愚者不然心不至目故也今乃知嶮之所以劇矣余衣不蔽腰下著窮袴見影乃笑豋厓下望攀者如猱側者如蟹伏者如蛇折者如鷂山之廞乃至此自恨無虎頭冩真筆也踰仙掌壁折入石弄北旋上石滑而不級為東峯過坪躡厓道尊持而中斷為南峯度峯足蜿蜒上石葉上覆而横裂為西峯南峯踞兩峯之上如人危坐而雙引其膝下有土徑異樹交絡峽水鳴其間峯頂各有池如臼如盆如破瓮鮮壁澄澈古松覆之西峯石多璺乍視如未稳南峯之背有靜室埀雙鏁鏁盡為鐵杙以承板道東峯南下為衛叔卿博臺鏁對懸拓厓自達皆奇嶮華山後記從玉泉院至青柯坪東西皆石壁澗水縈洄出踰張超谷壁乃峭至希夷峽石忽具態摩雲綴日壓叠而上行大石纍纍卧澗中水不得直去則躍舞飛鳴與山爭奇於一罅之内至青柯坪西峯斗絶出諸山忽若屏息奇者平髙者俯若童子之見嚴師不知其氣之微也西峯之奇在水簾洞逺視見竇下有丹石瀑布羃之千尺㠉而上大奇則大險小奇則小險寸寸焉如弱夫之挽勁弩至蒼龍嶺千仞一脊仄仄如蜕龍之骨四帀峰巒映帶秀不可状遊者至此如以片板浮顛浪中不復謀目矣然其奇可直一死也若日月巖前方石峭壁直上止險耳無他奇也踰嶺路絶折身反度其險更甚而不名者厓不甚修也過五将軍樹度橋至通天門險乃盡山自仙人拇始為嶽嶽以内若自為天地者諸星曜平視得人間之半其地微膚長松檜汚處齊雲臺峰頂雲臺直北當入㠉時猶干霄諸峯之在雲臺下者猶矗矗也南上即落雁峯千山環之如羽林執㦸兒山皆奇峭鋒鍔林林一峯直背如輪若與峯爭秀渭水東行與黄河合下見樹影東峯即玉女峰也祠玉女者乃峰之一臂所謂洗頭盆亦渴而淺而東峯有之圓滑深潔錫以盤名亦稱西峯最幽奥石態生動有石葉如蓮瓣覆厓巔其下有龜却立昻首如欲行蓋葉上物也是即所謂蓮花峰矣玉井在峰足二十八潭圓轉而下瀑布上流也恨不於雨後觀之山壁樹如錯繡鳥時從隙中來云無鳥者悞洞少天成然整潔可居廬舍亦有而黄冠不至歲一至以館香客耳山靈之寂寞無侣可知矣華山别記少時偕中弟讀書長安之社莊伯修出王安道華山記相示三人起舞松影下念何日當作三峰客無何家君同侍御龔公惟長從蒲坂回云登華至青柯坪險不可踰此則昌黎投書處余私語中弟近日于鱗諸公皆造其幽彼獨非趾臂乎然心知望厓者十九矣余既登天目與陶周望商略山水勝處周望曰聞三峯最勝此生那得至後余從家君遊嵾上有數衲自華來道其險甚具指余體曰如公决不可登余憤其言然不能奪今年以典試入秦見人輙問三峰險處而登者絶少惟汪右轄以虚曹司理逺生楊長安修齡曾一至巔然面矜而口呿似未嘗以造極見許也余至華隂與朱武選非二約索犯死一往既宿青柯坪導者引至千尺㠉見細枝柴其上頂如覆鐺天際一望不覺心怖因思少年學騎馬有教余攀鬛蹙鐙者心益怯後有善騎者謂余曰子意在馬先常恨霜蹄之不速則馳驟如意矣余大悟試之良騐今之教余拾級勿下視者皆助余怯者也余手有繘足有銜何虞吾三十年置而不去懷者慕其險耳若平莫如地上矣安所用之捫級而登唯恐險之不至或坐或立與非二道山中舊事若都不經意者頃之越絶厓踰溝度蒼龍嶺嶺盡至峰足地稍平衍余意勌百步一休從者相謂何前㨗而後澁也余曰蹈危者以氣喜一而怖十絶在險也怖一而喜十絶在竒也吾忘吾足矣去危即夷以力相角此輿𨽻之長何有於我哉下舂乃躋南峰之巔與非二席峰頭待月是日也天無纎翳青厓紅樹夕陽佳月各畢其能以娛遊客夜深就枕月光蕩隙如雪余彷徨不能寐呼同遊樗道人復與至巔松影掃石余意忽動念吾伯修下世已十年而惟長亦逝前日蘇潜夫書來道周望亦物故山侣幾何人何見奪之速也樗道人識余意乃朗誦金剛六如偈余亦倚松和之辛夘宿華隂邑令以華山志及圖來觀壬辰飯雲臺觀夜宿青柯坪癸已宿太華之巔甲午窮東西峰之勝欲寄宿玉女祠不可仍還峰頂乙未次於邑郵袁宏道記峩眉後記尹伸山海經志海内諸山奇禽詭獸怪草靈藥已非人間所有至西王毋豹尾虎齒之異鍾山龍身人面之妖皆世俗之所驚笑莊生之鯤鵬也列子之岱輿員嶠龍伯終北國也世儒皆以寓言目之由今而觀古人不盡誕也峩之巔去地百餘里耳物候形色遂與人世絶異其草箭䉋其松浮屠其雲兠羅綿其水糜粒而中堅其上恒不雷雷之威寄於風而松受之仰葉叠成故名塔松他木多瘣此目前之所見者也三冬廡下時有宿虎若依人就温而晝則避人有獸焉虎質而差短小其鳴陀佛人因以比丘字之當是貔貅之誤此得之傳聞者也志載龕洞凡百五十餘人多不能到偶當積雨之後東嶺新旭韶采媚人宣告予曰此放光之日也遂戒僕治装市村醑以往是役也車徒倍減於前而躋勝之具稍稍服習短衣芒履猛氣十倍誅崖討谷力補前遊之缺窮日之力達化城寺至八十四盤而暝時五月十有九日戴幕横騖不怖險而怖迷道旁古木竒石秀薄芳林往往戈之㦸之虎之魅之望炬影於翠微明滅之上臆是圓覺庵無何而兩僧篝燈至矣踉蹌次精舍漏可二鼔急需杯中物澆此寒澀開瓶試之已化為醯屬饜酪奴而已詰旦詣光相臺白雲歊然而出纎濃靡宻漸騰漸厚久之天失其空地失其塊陵失其牡谷失其牝上下一素遊人似處卵白中無復縫隙雲之觀極於此矣然吾以身之在上不若其在下也上之得下不若下之得上也降而觀焉始知臺上欄筍人物俱浮於靉靆游移之中東溟蜃市不幻於此時道人僧侣楚聲如雷無不仰企佛光而不知光反在下然其始猶烏景也景大於盤搖曳不自安若有物撼之少選没入化為巨輪其暈乃復青白週外黄赤碧週内内之中央一規洞明觀者取鑑焉雖千百人林立了無他形此所謂攝身光也至夜登七寶臺下瞰如望光而爛紅數㸃忽離迷於萬仞巗谷之下冉冉欲上苦為勁風所抑又復散去遂至千百萬億文以美名曰聖燈然亦深山所未曾有矣此中看光利於得雲而逺眺則忌之其明日又偶然無雲倚樓一盼畨蜀數千里遂在目前景物濃纎無不畢照其最奇者則西域雲山也此山本萬古氷雪結成諸峰厯厯直揷天表初日暎之空瓏艶耀光彩晶瑩安得虎頭銀管為縱寫空明世界乎下臺里許一泉正出僧云龍穴其中吾可以鉢録之既至則蜥蜴也余曰此下方蛇醫安得謂龍僧指手爪示余果微異旋入僧舍得一碣昔曾誤汲入釡者頃刻雷電大作天地晝晦諸僧不知所為一老僧厲聲曰得無煑龍子乎急發釡出之立霽此亦一異也是日下頂東南行為九老洞之徑嶺有九徑其三每下一嶺即度下一溪其下如墜不測之淵上亦稱是然險不在此也一線之道齒以錯薪隨踐隨動蛇虺縱横青衣操杖驅之乃行者又不苦蛇而苦蛭蛭入人足僅從毛竇出之遂如手指鮮血淋漓亦山行之苦趣矣自辰至未乃達慈延寺寺剏於烱公而成於周藩公初采山至峩聞此幽絶欲往廬之是時洞之左右前後皆龍虎巨蛇之所宫人多泥其行者洞不可竟茇洞左以居終日危坐間探野蔬自給久之猛獸毒蛇皆徙去於是始有以米蔬餉之者已而發周王之夢數千里走中使持畫圖求肖得公乃大喜發千餘金寺之而洞之鴻濛開矣公緑瞳黄面真有道者其言亦簡重無宗門氣習洞深廣不知其盡入數步即暗列炬照之石色微白上下兩壁或有餘而垂或不足而陷或盤為虬龍或蹲為獅象或驚若翔禽或挺若寳塔或葳蕤為花葉或縹緲為雲物隂寒峭甚僅從煉魔堂而返聞炯公曾深入經兩畫夜耳邊風水聲甚急不得前洞之背即化城寺與雷洞坪通自此遡鬼谷女媧諸洞當亦不逺但非飛鳥不得度余以是窺峩眉真形嵌空谽谺非獨塊然稱髙也者昔一頭陀連枲數千觔從雷洞坪縋身而下周觀諸洞人因目為風道人此亦奇士並記之奉命恭祭天壽山記鄭以偉天啟元年辛酉三月上命禮部右侍郎兼翰林院侍講學士臣以偉恭祭天夀山之神以新御極告也臣誦世宗實録十五年四月上遊九龍池諭從臣曰天夀山乃長陵主山之名適看之小山名天夀者誤也昔皇祖在上飲酒是日萬夀百司臣庶上夀因進名天夀朕欲作一小亭為記以正其訛傳可名此山為平臺山皇祖乃成祖也夏文愍題平臺山詩云勝蹟昔因皇祖駐佳名今為聖人傳即指此也諸陵皆名以天夀為主山而命名本於成祖之上壽殆天所畀以鍾靈毓秀為億萬年丕基所闗乎但文愍詩首云東山山口衆山前百尺圓峰一水環東山今不知何山耳臣又閲張𨽻大金國志云金都上京本無山陵止卜葬䕶國林之東至海陵從燕始令司天臺卜地於燕山之四圍年餘方得良鄉西五十餘里之大洪山曰大洪谷曰龍銜海陵毁其寺遷其祖宗叔父改葬於寺基之上又將正殿原位佛像處鑿穴以安太祖旻太宗晟父徳宗幹其餘各隨昭穆序焉夫燕山之四圍即我明陵也長陵在黄土山考永樂七年成祖營山陵於是命禮部尚書趙羾以形家江西人廖均卿等定焉海陵求地於北方年餘矣而他營於良鄉殆天留此以畀我明惟能順天意者始足以當王氣非偶然也且冀州為軒轅故都唐堯因之朱子稱為天地一大風水碣石號為天柱雖漢元光後淪入海而完氣自在兹山自石晉以來隣於邊塞宋人不能越横山以圖燕雲至我朝遂為神靈衣冠所逰因成祖上壽而得名又得世宗正其訛傳乃始與鼎湖並隆則山之遇又可知已然臣又考陵近邊亭世宗曾納輔臣李時言置總兵於昌平其後十六年命塞天夀山東西通黄花鎮口世宗之慮逺矣臣奉命恭祭因恭考其詳如此金華三洞逰記張維樞金華山道書稱三十六洞天之元有赤松鹿田九天𤣥女煉丹諸奇蹟在焉而其北總名三洞世所傳黄初平叱石成羊與劉仲卿隠身處也癸卯春仲余同濲水程大坤輿呉寜郭丈振龍浦陽須丈日華湯溪汪丈東台以公事至􅄔山主人折柬招逰余不覺屐齒為踊連輿出郭見古木森離立道左澗流潺湲從亂石噴瀑珠跳雪飄聲與林笙相和俗腸漸為一洗已近洞數叟來迎白髪蒼頭具有野意類武陵桃源中人俗言附洞居民多壽良信已觀上洞石如亂雲如堆卵嵯砑分裂勢欲飛墮足駭人目有玉女端坐類觀音纓絡具備中洞舊傳有水簾飛涎濺沫内藏石壺深不可測今直空濛一片地而土氣深幽膚骨幾栗下洞則石壁卓立一巨石亘空約脩數十丈石下可坐數百人一水縁石門流出旱極不涸汲以煎新茗清韻不減惠泉近石門處其水深四五尺人仰卧舟中離石僅五六寸許用竹竿箭入丈餘乃達視門外則是一洞天舉火燭四壁多宋元人墨跡中有搗藥臼泉滴其中終歲不滿有仙人田有耕犁跡有蝙蝠大如鵶白如玉石纍纍下埀空翠欲滴叩之其音噌吰如鐘鼓惜缺一部霓裳與之按拍相傳此山有三十六里照以松炬可徑行第亦未有竟其底者時振龍丈怖甚入後出先許久神色乃定曰吾目中未見有奇險如此洞内洞者也近晩設供巨石下情各酣適因縱觀張大參慎吾屠赤水長卿諸公所題咏攜襆被宿山間樓房日華丈善滑稽諸丈佐以雅謔兼松風石泉聲入枕畔徹宵僅成假寐而數叟之蚤茗至矣梳洗畢主人邀集共榻為山後之行見髙峰層巒亂石襞積即黄初平羊石也雖多礧砢豈無空瓏予謂此石若遇米元章石丈之癖將不獲寢處山巔耶諸丈為頥解山行數百步細雨微吹乃各登籃輿坐盼諸山波湧峰峙覆者如螺奔者如駿怒者如獅吼翠者如屏障而長松數千曲直參差間插層崗之表斯乂僊洞後之奇觀也余惟兹山以勝著者若赤松若鹿田若白石若紫薇巖而皆以佐水洞之奇其以仙及儒隠著者若張𤣥真若仲卿孝標二劉若兩黄冠若陳簡縣掾而總以分初平叱石之韻今吾黨交臂而來旋目而返一入城市啾囂塞膺欲覔洞中一拳一勺之趣了不可得尚安望其餐石衣嵐脱傖父習氣乎日華丈曰吾黨身世皆幻也適然共處適然共遊各適吾適足矣服食求仙何如今日一盃酒因再就郡中歡㑹而别遊髙梁橋紀吳伯與江南遍地皆水其陁靡案衍與水繁㑹燕中則沙礫所撩望水光香氣如隔天河帝宫紫城之西有蓮池焉其噴嘘於林霏宻織荷枝搖曵之間在夏秋最宜以其蓊鬱之䕃滿接浪紋暑氣不得入也水脈則源於髙梁橋髙梁橋在西直門外兩水夾堤精藍布岸珠塔丹砌緯疊溪面春羅埀楊萬餘樹珂繫枝枝縉紳布舄蔽地遊女猗靡而翕呻自相糅若其人影直趂波光徑入宫河流照呷浪之細魚從水底自呈其鱗鬛層層生動而西山娟然如拭開新鏡之光掠髻鬟之影朝夕娛遊人於几席最率真者隨地布䕃隨䕃張席一切禮法盡捐喜氣溢於樽罍據髙臨逺恍如身在淨界視三千大小沙礫皆淨土矣余乃知天下之躍機莫過於水而京師囂塵蔽天白日欲昧值此於面睫間宜其樂也猶怪喧襍於青娥閹貴之塲者未知其樂也雖然魚樂予樂子知我知孰循其本亦知之於濠上而已且輞川入吾圖畫耶亦吾曹為輞川圖畫中人耶是日同行者則黄陽平徐春宇姜仲訒周玉䋲各極歡而退余作極樂寺留春詩四首乙夘之四月朔也内南城紀畧吳伯與客有談南城之勝者維時已奔注吾胸一日偕諸子肅冠紳而行自東華門進至麗春門凡里餘碧欄紅榭盆行徑松各相暎也漸入翻喜其邃而虞其嚴不敢恣足導者指𢎞慶殿而頂禮焉殿之中座寶璐莊嚴琉璃光暎我佛慈悲妙相也左右兩殿供我佛變像藍面赤身具三眼駢拇手足肥而矬人道具焉導者指為寶也引之撫摩所執皆兵刃形狀蹲而伏其下者多人獸之怪蓋西畨所供多此像凡殿廡陳設鳳香龍草之屬類不可識左折有通靈碑二座碑髙丈餘横如之厚數尺上刻郊祀廟享御製頌文透光如水有若紋浪隔面視之衣裳牆宇之類飄飄生動歴皇史晟門至龍德殿一𣲖隙地皆種蔬瓜藤棚松架注水負甕宛如村舍過此則飛虹橋橋石窈窕秀出刻為羅虎禽鳥之狀虬曲而削不受足傳為西洋僧取裁布勢装載而來架置不爽尺寸獨留一罅緝以北地巻石此石時欹時泐竟不敢望諸石之危立則謂西洋僧故為表異以見神通是也橋之南北柱石而題曰戴鰲曰飛虹相距數十步有洞嵌石壁壁上刻秀巖二字疊而上蘿棘抉石罅以出􅏟嶔太古蝕壁皆翠循石磴數十級有方丘焉勢若箕踞然而碧欄紅亭與翠巘相暎發最上為乾運殿古松大栢覆之沉隂亞風有聲䎕䎕衆各徙倚於竹礲石楠松棚蘿幄之間覺敗址殘苔皆有喜氣記稱北海𤣥洲多太𤣥仙官金芝玉草得無似之耶然北海𤣥洲探竒者猶得取道此固天帝之宫也誰得而望焉乃予他日又以事入兔耳山登旋磨臺臺洽洇左右盤轉若輪髙數百丈石色紫翠相雜如零星一步一變態然下視甚削鍔登來横豎不立轉覺平衍其規制奇巧也蓋臺為世廟所搆以奉諸仙往來直是上據莽蒼視下猶隔一塵不覺身之欲仙矣折而下為山前殿宇一石當門之左硿礲透脱視其骨皆玉也晶晶然如鏡之欲開而冷光之下出於匣睨立久之從此振衣肅入至觀花臺皆宸遊處也臺砌牡丹凡數千本新竹以屋覆之防其凍折耳而風枝搖曵若沉若起何啻騎龍脊煙霄氣來凑人但天威若近不覺汗出浹背急望大耳山出夫吾最好遊所遊諸山水奇相代也而此若山水中之洞空悄然殆非人間不可得而代者且山水可以形遊亦可以神遊此亦神之所不得設者矣轉服思之忽忽如隔世事不敢盡記不容不記以志吾幸南城之入為五月望前二日偕遊者曰周峩樵謝耳伯阮集之周玉繩其以蔬品至者懷寜侯孫心菴導而前且佐之具中侍范誠軒也靈璧侯湯念嵩則懷寜甥以懷寜來者也遊而且叙其事則香醉山人也其後所入大耳山總之生平大觀因附志於此明文海巻三百五十八
