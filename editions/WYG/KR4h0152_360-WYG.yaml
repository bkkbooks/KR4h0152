body:
  text: 明文海卷三百六十餘姚黄宗羲編記三十四古蹟尋醉翁亭記陳循徃時嘗讀醉翁亭記以謂如滁信可遊而樂也心竊慕之而未能得永樂丙申始以備員翰林得扈從還南京南京於滁最近而滁又為兩京徃來所由陸地於是竊有幾幸一造之意然未敢自必也歲之庚子三月壬辰始得以職事偕朝士數人者徃遊焉既至值公稍暇因問所謂醉翁亭處於滁人與滁之賓客者或告或否然皆少其蕪廢求導致之莫有能者余度越宿當還以為不得遂所志矣為之悵然終日明旦介行有語太僕寺丞楊聞達以予志者楊欣然喜即率從事載酒殽具鞍馬拉予數人以徃自豐山下馳六七里而止棄馬登山未十數步而獲少平楊曰此即醉翁亭遺趾也廣僅容亭瓦礫猶存四面而觀皆髙山環無路亭所負山之石壁刻醉翁亭三篆字其大如斗筆意頗佳傍去丈許又刻二賢堂三𨽻字大視篆書半之皆無書人氏名草木䝉翳芟治而後可觀意亭既廢後人刻之以識其處或非當時所書也其所謂二賢者未考圖記意其一醉翁其一必繼翁者莫知謂誰或曰王元之張文定曾文昭張天覺皆嘗為滁守者豈其一在此耶葢去其時久矣豐樂醒心在州東南一二百步之近滁人老長尚猶罕有知其處者况於此耶豈予不及久留固有知者而詢之未周耶亦知與否係乎其人之好尚何如也凡記之所有而存者山泉禽鳥四時朝暮之景滁人之遊與凡人力所不能移者耳亦可感矣於是芟茅席地擷野簌酌釀泉相與放情其上以庶㡬如醉翁之遊而樂者焉既而又從數騎西南馳六七里入瑯琊山山愈深草木泉石愈幽路傍有石數十端方而鉅亂置草間葢遺物也石壁時見字刻所云漸入佳境之類極而數峯髙絶下有松竹數萬雜樹交䕃仰不見日所謂臨壑尤美者也中有一蹊介然以險不可以騎繫馬松下而止上有屋數百柱髙卑曲折一因崖麓之勢屋壁繚垣之石徃徃雜以殘碑斷刻存僅數字不可屬讀其地蓋山之僧智仙所居曰瑯琊寺者也有僧壽八十餘布袍素履不出戸者二十餘年既無意於世矣而其應客甚恭若有求於人者問其名不應相值既坐竒花異草交映前後幽篁野鳥舉目皆是喧呼摩戞之聲不絶於耳楊乃舉酒更酌而樂賓益歡焉酒酣既去而數人者有中書舍人錢塘王君直太常博士豐城丁君鉉行人永豐袁君賀王丁二君謂余於醉翁郡人後進者於是行不可以無記余謂袁君於醉翁為同邑尤宜有記袁君辭曰子詞職也可以辭乎遂記之以見吾黨之士治公之暇其所樂者如斯而己矣重建岳陽樓記商輅岳陽樓在岳州府治西南右瞰洞庭左挹君山波光巒影萬景在目誠一郡偉觀也圖誌莫詳創始然考之唐李杜諸賢皆有賦岳陽樓詩其來己久至宋慶厯間郡守滕宗諒子京重建范文正公希文作記而後岳陽樓之名益顯於世慶厯至是四百餘年中間興廢不知其㡬矣成化丁亥進士睂山吳節以郎官有聲出守兹郡登覽之餘憮然有感謂吳山景象不減舊聞而樓之規模大非昔比詢之則後來郡人所構卑陋弗稱亟欲改作還於舊觀視篆之初年飢用乏力未暇及久之政務漸舉歲時漸稔廪有積粟庫有積貲乃謀諸僚佐稍出羨餘兼助已俸募工飭材撤其舊而新之始事於辛夘冬十一月訖工於壬辰夏五月傑棟崢嶸層簷翬飛髙宏壯麗有加於前落成之日衆皆欣恱以為盛事不可無述於是太守具事狀介太僕寺丞鄧君廷瓚來徴予記嗟乎物不自美因人而美此理也夫以岳陽為樓據有洞庭之勝既云美矣而范公為記又厯叙因情變態之妙以寓夫先憂後樂之心使人誦而味之非惟不出戸庭而湖山景物盡在目中凡素存憂國憂民之念者自將惕然警省而油然興起矣然則是樓之建豈為遊觀之好哉蓋深有慕於公之為人而追尋芳躅思欲企而及之也予聞太守治岳廉慎有為九載之間士安其教民安其政而吏亦怡然於禁令之下無敢侈然以肆者夫為郡而能仁於其民無愧於公之心也建樓而欲復於舊無愧於公之文也公何人也希之則是予於太守有取焉於是乎書重修醉翁亭記商輅滁州城西南六七里舊有醉翁亭創於瑯琊僧智仙而名於歐陽文忠公宋慶厯間由龍圖閣直學士改知制誥守滁以平易為政民安之暇日與賓客宴飲於此自號醉翁因以名其亭并記之蓋寓情於酒耳後滁人慕公之德思前守有合於公者於亭後建二賢堂祀公及王元之元之明道中由翰林學士出守文章政事與公相埒合而祀之人心之公也久之亭堂寖廢僅存遺址國朝宣德丙午歲重建於是始翼然如舊規迨今數十年風雨震凌梁柱摧折㡬於復圮南京太僕卿旴江鄭君悠少卿天台魯公崇志寺丞河南吳君箎毘陵李君廷芝知州安陸周君正慨然以修建為任各捐俸貲以為衆倡一時仕宦及義士聞之多樂為助遂鳩工度材闢地廣基亭因其舊而増修之益以梁拱飭以丹漆堂撤其舊而改建之髙廣倍昔輪奐有加焉亭西南隅别構屋數楹召方外士居守割近亭周圍隙地畀之令力耕自給亭下故有釀泉原無亭蓋圓亭覆之亭前後山瀕溪雜植松竹栁凡數千百株鑿石甃橋築巨堤水環遶亭前澄澈可愛經始於成化己丑冬十一月至明年夏五月畢工鄭君暨同志具始末來徴予記惟文忠公治滁在慶厯丙戌至是已四百餘年而所謂醉翁亭者其興廢屢矣世之君子聞醉翁之名誦醉翁之記恍然如醉翁在目矧親厯瑯琊之間徘徊釀泉之上遐想芳躅寧不為之惕然有感於中乎此亭堂之修建所為有補於風化非徒游觀之樂而己且公以救時行道為心不能使其身安於朝廷之上而名亭之意特寓情焉耳顧使人思慕不忘如此何耶蓋不能安於朝廷之上者小人間之也不然韓范富歐皆王佐之才使得盡行其志宋之治將㡬於三代矣然公自是厯典名郡重升廟堂與二三執政同心輔治功業煥然有光簡策此又以見小人終不能勝君子詩云髙山仰止景行行止後之思慕公者獨滁之人士哉祀舜陵記曽鶴齡舜為萬世所宗之聖而其死與葬皆有可疑書言舜南廵至於南岳則南岳者舜廵狩所止也今其陵乃在九疑去南岳千有餘里此其可疑一也史言舜崩於蒼梧之野今蒼梧乃在廣西去九疑又五六百里此其可疑二也孟氏言舜卒於鳴條鳴條在東方徼外今不聞有舜塜此其可疑三也書又言舜三十登庸三十在位五十載陟方乃死則是在位通八十年未嘗一日釋去今零陵志載舜厭治天下修道於九疑後遂仙去而蔡邕九疑山銘言舜尸解升天此其可疑四也疑者雖多解者率無的論以予觀之舜既廵狩至於南岳其或事畢又幸九疑遂崩而葬其地也蒼梧在當時𨽻零陵郡亦未可知據史與書其述略同而鳴條之說出於孟氏蓋有不可曉者若零陵志及蔡邕之銘灼然不足辨矣自古聖人有生必有死豈有修道化去之事也九疑在寧逺縣南七十里人迹罕至故凡有事於此者禮成即去皆不暇誌其事予奉命代祀既畢有來請曰斯乃今之盛事不可無記遂謹記之曰皇帝始遣臣來祀實宣德元年二月十一日也其所吿則即位改元之事其所賫則香幣祝文其禮則用太牢其祀之日則四月庚辰其陪祀官則寧逺令劉董臣則為翰林院修撰鶴齡夫智者不惑孔子猶不自居况衆人乎予因記祀吿之事遂併列其疑於前且略記之俾後來者少去其惑也祀神農陵記曽鶴齡神農氏教民畊稼蜡祭醫藥交易之事開萬世衣食相生相養之源故凡後世有天下者皆祀之而新即位者則吿焉示不忘本也今年今上即位實遣臣鶴齡賫香幣祀文求其陵行祀告之禮而陵在衡州之酃縣酃縣深僻若獠洞然故自衡舍舟陸行越峻坂涉深塹五宿始至至之後又三宿始將事事皆如儀奠獻有䖍稱上所以親遣之意既畢始若釋重負然猶不敢忽慢遂跼步山麓見有石壁髙二尋許廣半之正面而直立或指以為塜門又上少許有杉二株一榮一枯其大數十圍根節如鐵石或以為異人所種莫敢剪伐者杉下有壇壇下有墠葢舊有之新又更置或能言更置之由而未詳也至問陵之所始訖莫能對退坐公舘取縣志閱之亦落莫不載以問酃庠諸生有進而前者對曰聞諸長老宋太祖求帝王之應祀者獨神農氏之陵不可得一夕夢神人戴一笠持兩火訴不血食覺而咨羣臣皆曰是非炎帝乎火位南方宜徃南求焉遂遣使至長沙之境求不獲將歸遇一老人引而指示之曰是即炎帝塜也忽不見使者還報即遣祀之遂成故典噫斯亦近於誣也雖然殷髙宗夢得傅說遂舉為良弼孔子夢見周公卒明其道以教萬世由是觀之則太祖之事亦精神所感有然也不可以弗信矧炎帝之神在天無所求而不獲今茍因其故典盡其誠以享焉有不獲者耶予故存其說以告後之來祀者宜盡誠焉耳陵之是否雖置弗辨可也廉石記吳寛石之産於吳者奇形怪狀不可盡述良工采之好事者賞之君子則藐之於此有石焉頑然數尺重而不奇蠢而不怪盡山中皆是物也良工棄之好事者藐之君子則賞之豈徒賞之乂從而貴之敬之視其物殆與魯璜秦璧等非物也人也葢當漢末吳郡陸公績仕於孫氏為鬱林太守相傳泛海歸吳舟輕恐覆取巨石為裝蓋其廉如此公家婁門之内臨頓里之北石留民家至今猶存而埋沒土中僅露其背過者猶能指而稱之曰此漢陸公鬱林石也然未有表識之者今監察御史胙城樊君祉廵按吳中聞而美之謂知府史侯簡曰先哲遺物固宜表識且有可以風厲乎人者在顧其石僻在東城非官吏朝夕屬目之所其為埋沒等耳吾將有以置而立之侯以為然於是吳知縣鄺璠長洲縣丞王綸相與督役夫曳置察院之側作亭覆之而樊君為名之曰廉石石始僻而通久湮而顯觀者閧然足蹟不絶皆曰古之才御史必以揚清為事樊君此舉雖去之千四百年之人猶且揚之况其近者乎且御史之職在乎舉賢舉賢者可以激勸乎一時石之不朽雖至於千萬年可也其有功於風紀甚大且久惟昔南中有貪泉焉飲之者見寶貨以兩手攫而懐之物之能移人心如此今之廉石正與此戾自兹以徃凡過而視之者其廉士固欣然摩挲愛玩以益勵其操若夫貪者將俛首赧顔趨而過之有不動心而改行者尚得為人類也乎石之立為𢎞治丙辰四月越月而亭成樊君既題其楣曰漢鬱林太守陸公廉石復别琢石請予為記予美其事故諾而助成之登牛山記喬宇牛山在臨淄之南十里余徃而登之泰泝駝稷四顧而有風烟雲日百里而見余因悵然而悲筦然而笑戚然而憂從者曰公登牛山何悲也何笑也而乂何憂也余曰昔齊景公與文孔梁丘據晏嬰登此顧其國而流涕曰美哉國乎若何去此而死也二子皆從而泣晏子以為君不仁二子謟諛而獨笑余則以景公亦名諸侯也其在當時朝圖暮策輕服薄膳與二三子皇皇然以應答乎友邦者為此尺寸之地也乃不得常御而終奄然以逝在人情孰曰不悲余固悲之也為晏子者當吿之曰君悲之誠是也但自軒農以來皆不免於黄土而其聲昭赫至於今蓋有萬世不死者在顧君修之何如耳乃徒吿之曰使賢者勇者不死則太桓莊靈常守之矣吾君安得此位乎若然則如云賢者亦死又何必賢勇者亦死又何必勇且歆之以位則子孫者皆幸其先君之死而及之也晏子齊之賢臣也而其言若此予故笑之也昔孟軻氏以牛山之濯濯非山之性乃繇斧斤牛羊而致以喻人之禽獸也非人之性乃繇梏亡而致於今登兹山也見其濯濯如當時所云而天下之不梏亡其性者亦鮮矣仁義之心雖予固有存存亡亡云胡能定余故憂之也從者曰善乎公之登牛山也一覽而三益八陣圖記楊慎諸葛武侯八陣圖在蜀者二一在夔州之永安宫一在新都之彌牟鎮在夔者蓋侯從先主伐吳防守江路行營布伍之遺制新都為成都近郊則其恒所講武之塲也武侯之人品事業前哲論之極詳不復勦同其說獨其八陣有重可嘅者叟謂侯推演兵法作為八陣咸得其要自令行師更不覆敗深識兵機者所不能洞了蓋勝之於多算而出之於萬全非借一於背城而僥倖於深入也惜乎其方銳意以向中原而溪蠻洞獠左跳右䟦以裂其勢外冦方殷内境自憊使夫八陣之妙不得加於二曹三馬之梟敵而乃止試於七縱七擒之孟獲天威神算不騁於中原王者之區宇而僅以服南中巴僰之偏方事機既已遲精力又已虧勇賈其餘師用其分以為大舉譬之逐盗捄火之家挺刃決水猶恐不濟而内有讐賊自相乘機胠篋助燎則雖有倍人之智力亦自無如之何侯之不幸勢正類此天之所壞誰能支之祚去炎漢不待隕星而後知矣嗟乎國之興亡天也君子獨遺恨於蜀漢之事者非以武侯故耶至其故壘遺墟獨為之愛惜不已乃其忠義之激人不獨其法制陣伍之妙也不然則竇憲嘗勒八陣以擊匈奴晉馬隆用八陣以復凉州是在侯前已有之而後亦未嘗亡也功既有成而後世猶罕稱述况能傳其遺迹至今乎慎嘗放舟過夔門吊永安之宫尋陣圖之迹維時春初水勢正殺自山上俯視下百餘丈皆聚細石為之凡八行六十四蕝土人言夏水盛時沒在深淵水落依然如故在吾新都者其地象城門四起中列土壘約髙三尺耕者或剗平之經旬餘復突出此乃其精誠之貫天之所支而不可壞者蓋非獨人愛惜之而已耳慶陽韓君大之以進士出宰吾邑始至拜侯之荒祠次觀遺壘重有感焉謂慎曰之罘篆鍥燕然銘石藝焉爾人不足稱也愛其藝者人不冺其迹矧侯之地而可忽諸今陣圖在夔者有和叔獨孤之記少陵東坡之詩四方灼知而此顧泯焉無所表識使徃來不軾樵牧不禁非缺歟祠宇行當新之陣圖所在欲伐石樹道左大書曰諸葛武侯八陣圖碑隂之辭君宜為之夫崇賢存古以示嚮徃焉循良事也推表山川考記徃昔者則史氏職也遂書之使刻焉登黄金臺記鍾芳正德己巳春予過易州客指示金臺偕徃視之土阜漫漶不可辨疑焉據史記昭王為隗改築宫而師事之新序通鑑皆言築宫築臺字後漢孔文舉謂昭築臺以延隗梁任昉謂臺在幽州燕王故城中土人呼賢士臺亦謂招賢臺始有臺名而無黄金字李善引上谷郡圖經曰黄金臺在易水東南十八里昭王置千金其上以延天下士水經注云固安縣有黄金臺遺址沿久或訛而此地亦據圖經得名耳因謂客曰嗚呼自昔建邦啟土君於兹者不知更㡬姓閱㡬代興衰互變磨滅無紀而燕昭敗亡餘孽乃獨以好賢名託不朽至今過故址者尚挹流風焉韓子謂事有越百世而相感者其謂是耶夫燕之仇於齊也舊矣一得樂毅以寄國政遂能結趙以約四國河北之地掉臂而舉之濟上不數月下齊七十餘城湣王走死僅以身免齊器設於寧臺大吕陳於元英故鼎反乎磨室薊丘之植植於汶篁尊賢而效乃如此使天未悔禍王不中夭則齊之為齊未可知也而毅也卒傷讒以逃以墮垂成之功此君臣之際所以為難而士所以恒苦於不遇也今予與子登臺嘯歌景仰前哲徒見夫雲物之飛流山河之環帶而禮賢之盛不可復尋則感愴激烈之懷又不待讀報燕之書而泣矣夫天下不患無特立之士而無知已之君自古讒疑見疎功成而毁者豈獨毅哉仲宣樓記王世貞自王粲仲宣依劉表於荆州作登樓賦而江陵有仲宣樓後襄陽有樓亦曰仲宣而友人襄少史周紹稷至是修楚乘還斷以屬之襄陽其辭甚辨而其㫖以劉表始至宜城用二蒯蔡瑁計討平諸賊北據漢川以臨中土幾十五年而其子琮始降曹氏蓋終始不離襄陽而江陵特其支郡仲宣之依表為幕下叅佐以共朝夕不應去襄陽而登江陵之郡樓也然劉良注兹賦猶以為江陵而盛𢎞之荆州記則直以為當陽其所稱陶墓昭丘云江陵西有陶朱公塜其碑云是越之范蠡又當陽東南七十里有楚昭王墓登樓則見之按張華志稱范蠡葬南郡之華容又云濟州平隂東有陶山山有陶朱公冡則所謂陶墓者未必確而楚昭王避吳去郢北徙郡為襄州之樂鄉其所謂者亦未必在襄之近境也賦又云倚曲沮之長洲注引地理志漢水房陵東山沮水所出今房陵實為襄壤邑而沮水至郢入江故不走江陵道然酈道元謂沮水南逕麥城西又南逕楚昭王墓東對麥城而據此賦語為證則仲宣之所登者一而後人之所擬者三其在襄陽去賦事辭稍逺而於理為近也夫襄陽之必為仲宣與江陵之必不為仲宣吾固不暇論其辭之􅍇稱於後世若士衡兄弟之所讓筆亦無足以容吾贊獨怪當仲宣時天下半糜躪於戈㦸其可借而託足者獨荆州而幽憂感愴之極自謂其身莊舄而心鍾儀若有羨於求羣之獸與舉翼之鳥豈以景升之將阽而荆社之不木歟迨其一說琮而歸操甘為其用事之掾而豔其所從之神武遂忘先太尉司空所以相漢其於辭蓋不以風而以頌矣然則仲宣之所為懷思故土也非故國與故主也予既以語紹稷而會襄國王有所拓飾於樓使使來請記今天子累葉神聖薄海内外為一雖窮髪不毛之地梯航所可及者若在堂隍之下而無所慮其私王以親賢有國兹土世世共奉唯謹亦寧若景升之不恤其祀而自阽於宗衮哉予故不辭而書之石以示夫遊者仰而國俯而家靡所不衎衎即欲有撰述以鳴熈代之盛而附於登髙能賦之義足矣固不必以仲宣輕重也復清容軒記王世貞吳興水至多割地幾十之五其城西南隅為勝西南隅枕水而宫者多慈感寺為勝慈感寺之景至多清容軒為最勝軒故傍寮然其地據寺左而獨南向前枕通塘有蓮芡木芙蓉之地屬橈吹容與笭箵散布軒之中碧浪諸山凌睥睨而上其外碧浪諸水穿睥睨而下以故其景最勝考志所以名則故元學士袁先生桷號清容者㣲時客吳興讀書其中因取其號軒之趙文敏公孟頫為題字而文敏亦時徃來流憩若舍舘以故其名稱益著軒業以屬寺然寺僧不得而有之而以供邦君大夫鄉薦紳豪賢之遊目者二百餘年於今矣少時不戒於火余來吳興過慈感寺問軒於范太史而得其故意㣲欲復之以屬守黄君丞藍君司理孫君則有郡士嚴姓者慨然出而應募發其帑而竹木墁瓦至不逾月而軒復雖其宏壯侈麗不逮前而山水之觀爭出於睥睨之上下者如故也始余未為吳興則讀吳興諸書稱文敏公第環三面而水勝甲一郡及余至而訪求其故址所謂水晶宫者蓋陸沈於闤闠釐祝之間想像於暮烟春波而不可得為之愾歎而其旁一軒獨以伯長之所偶遊文敏之所偶題二百餘年而不隳一隳而輙復之若新抑何說也物吾自有之則吾為主吾有盡而代吾而主者亦有盡物吾不自有之不得已而付之天地天地無盡而為天地之人者亦無盡故驪山之陽翠㣲玉華更而為禪室佛廬而能有永者恒也人見夫王珣周顒之徒舍其宅而寺之誚以為媚佛及余遊虎邱望而知其為千年之宫且因以知有殉也則夫世之君子隂利其有而陽文之曰廬其居其不一轉而泯其主再轉而泯其迹者㡬希也作復清容軒記明文海巻三百六十
