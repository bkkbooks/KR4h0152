body:
  text: 明文海巻三百七十四餘姚黄宗羲編記四十八寺觀祇洹精舍記顧紹芳自呉淞江南折為千墩浦自千墩浦東折為湓浦自湓浦又北折瀦為迴溪而聖像寺當其處平疇蒼莽修林薈蔚浦東西之勝度無與鴈行者而異時海内豐登民物殷樂佛者得以侈大其教精廬蘭若所在而有而聖像剏自典午之代其名尤古以其地勝而名古人尤爭趣之寺凡五院院有層甍疊閣幽房曲林靚麗宏玅無與為比葢自余曽大父徙家千墩浦上其地無他名山茂園可以登覽獨時時遊行寺間以為娯其後余伯父上舍公家大夫並讀書其中嗣而負笈遊者其廬常滿葢三十餘年而余兄弟復尋家大夫之迹則銷歇之感非復曩時之所聞者矣層甍疊閣或鞠而為蔓草幽房曲林或化而為平蕪此非佛氏之教頓有利鈍而吾民方椎髓剥膚養生送死之不贍而何暇以其餘潤色異教哉故非其徒確苦自立以尊其教吾見佛氏之宫日圮而嵗了葺與凡物同盡已耳寺之西北院有老僧曰鎏葢古支逺之流而其孫越以慷慨嗜義佐下風院有閣乆廢弗治顧嘗每飯念之而余之棲其廬也越指其隙圃謂余曰閣之工鉅矣吾以力弗竟吾志而竊嘗好禮賢士大夫將小築數椽環以卉木貯罏鐺香茗其間以休客之來者然莫能攘而先之落成之日請顔其額曰祇洹精舍而徼子一言為記余甚壯越之志而私怪其難讐當是時越囊空無一錢特苦漫請而漫應者葢余去一年而越欵門告成事且來請記噫以今天下之物力非及鄉時之什一而兩上人自鉢衲之外未嘗懸募請謁以勤長者而獨攻苦茹荼出其節縮之餘不日而成斯舉且不以居緇黃而以待士大夫之賢而遊於是者此其賢豈直釋氏之翹然者而已哉吾量其志事無弗可辦者閣且次第舉矣精舍凡五楹地在萬木中不山而髙不谷而深幽詭奥絶入之者以為異境此即昔之幽房曲林宜無與爭勝者余獨賢兩上人興于既衰之後為尢難不宜冺冺而余世于兹土若有夙因故卒踐諾而為之記臨川縣古永安寺復寺田記湯顯祖天下有閒人則有閒地有忙地則有忙人縁境起情因情作境神聖以此在囿引化不可得而遺也何謂忙人爭名者於朝爭利者於市此皆天下之忙人也即有忙地焉以苦之何謂閒人知者樂山仁者樂水此皆天下之閒人也即有閒地焉而甘之甘苦二者誠不知於道何如然而趣則逺矣朝市之積則有田廬山水之餘則為寺觀故寺觀者忙人之所不留而田廬者閒人之所不奪也臨川古為名郡五峯三市在焉三市者市也五峯之間聞有觀九寺十三葢入明以來大為忙人割奪盡乃至稗粥無所而古永安寺境界巋然獨完其田則大半無有矣邑侯袁公起於蘄黃來宰於兹廣山川之精深性相之學披圖而嘆曰臨川人之憎閒人也一至此乎有能從吾言而反其田者吾徒也於是郡弟子劉某􅈡籍所買田若干畝上之侯以歸于寺侯為欣然告世尊而撫之曰此所謂孝子劉某也而適是時有僧大千購得南都藏經以至而尊置之寺侯曰有其書矣而無其人何於是有浮梁僧水月為達觀先生弟子精心苦行通於評唱之義適來寓斯人士與遊始知有所謂宗門者乆之長干寺僧大初來講蓮華經聴者千餘人得田而食無不歡喜贊嘆曰此固我侯之福田也嗟夫當忙人之急得此田也豈不曰彼無父母妻子之屬先王所禁遊民者吾非真有所憎利其田姑以蕃其種類云耳嗟夫此所謂奪閒人之物以將養忙人也固一其説然試以語彼使天下皆忙人而無一閒人皆忙地而無一閒地則亦豈成其為世相也哉且今所從遊於二氏者彼亦有所業非所禁遊民也如其為遊民法固禁之乆矣所惜者遊人之非遊而閒人之未嘗閒也非閒非遊不可以涉道是故聚百閒人而食之必將有意乎道者焉聚千閒人而食之必將有進乎道者焉不已而食閒人至於萬猶將有得道者焉道之喪世也乆矣幸而有一人焉其何禁於千萬人之閒而奪其養哉即未有之庶幾有之如以食百千萬人之閒者奪以養百千萬忙人其必無冀于有道者矣則亦有蕃其種類而已然則侯所為存寺者或不在田而在道飯器無殊香色有異後之遊閒􅉨來食于兹田者其亦有感於侯之𢎞願云琉璜里下庄菴自置庵田記秦㟠大地盡墦壠也有可以自喻適志而澹然無求者意惟披緇髠頂之流乎萬鍾之奉以有妻妾五鼎之享以有兒孫而若輩皆無之是宜澹然無求者莫僧若也然而沿門乞食之教又似偏為若輩設者忘其清浄之本來而盡化為乞人之行徑世之熾然多求者又莫僧若也有説於此足矣而後可無求僧之不能食槁壤而飲黄泉亦猶人也舉其一飦一粥而盡寄命於他人雖欲不求而有所不可有人焉積其窮年梵唄之所得拓之為恒業率其徒力耕焉而有以自給則亦僧中之錚錚者矣琉璜里之有下庄菴也二百年於兹自守中上人之奉瓣香而來也晨鐘夕磬無間寒暑乃漸累其經懴餘貲恢其址之隘者葺其棟之頺者飾其牆之穢者甃其地之汚者更以其贏貿汚邪二十畝春秋倩工以耕力或不給間驅徒以佐之偕其道侣復霞隠霞誓世世守焉於是環璜水而居者咸額手上人之有功兹菴也秦子曰上人非獨有功兹菴且有佛氏矣吾聞古之君子有為佛教攻輸者永叔歐陽氏之正本論康侯胡氏之崇正辨是也有為佛教守墨者純甫李氏之鳴道集天覺張氏之䕶法論是也而説者各不相下而近日眉公陳氏更剏為朝廷大養濟院之説以解脱之夫彼法中故不乏神僧散聖激揚宗㫖簸弄神通而至埒之於無告窮民不又以調停之過近于不恭耶且佛氏之故以沿門乞食為澹泊家風不為貪癡人作地明甚吾願學佛者不師其乞而師其不乞如上人者差可謂有其意者也設有人詰之曰爾何以不耕而食亦既耕矣又詰之曰爾何不自食其力則此數畝汚邪者皆三十年晨鐘夕磬之積也亦既自食其力矣必如是而佛教可與儒教並行不悖攻不必輸守不必墨于大地墦壠中超然為恬澹無求之人以一洗眉公養濟院之名之辱胡為不可明文海巻三百七十四
