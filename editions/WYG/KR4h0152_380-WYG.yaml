body:
  text: 明文海巻三百八十餘姚黄宗羲編記五十四功蹟廣徳州同知蔡侯政績碑記唐順之蔡侯之始去州也州人哭而送之境後十餘年侯以宦遊過江南有傳言侯將取道於州州人喜於復見侯也逆諸境數日侯從他道去州人哭而歸則相與謀紀侯之政於石於是署州事判官張君遣陳生潘生来請為之書石余辭謝後一年知州歐陽君繼遣陳生濮生来復以請曰先生與蔡侯相知為深宜為之書余復謝曰余惟與蔡侯相知之深也是以未敢為之書夫蔡侯者居乎今而學古之道者也古之道盡乎已而不蘄乎人先其實而深避乎其名不然畏壘之民規規然感慕而俎豆之此庚桑子之所為懼而逃去者也且古之以循吏書於其傳者有之矣其在當時權任既重且專其居官也又久而信是以能為百姓立殊絶可紀之功而後史氏因書之為傳若蜀郡以興學書南陽以溉田書書渤海也以弭劇盗書膠東也以増户至十餘萬自漢時得書者纔數人而一人又各以一事殊絶自見而已自此之外其縁俗而治者豈遂少哉則以其事無殊絶故不書也蔡侯蒞州之日淺矣又州佐也操柄所不在故其所可見者大率縁俗而治侯之心且自謂不能有殊絶功徳加於細民而歉然不以為足也侯之所不自以為足而州之人乃欲為侯張而侈之不亦拂乎抑古之以循吏書於其傳者非特以殊絶之故亦以位不至通顕其所樹立施設止以一郡一邑而不究乎其大者故史氏亦從一郡一邑書之而謂之循吏傳若黄潁川薛馮翊其治績尤異固不在於蜀郡渤海之後以其事業有大焉者則不得從一郡一邑書之故不以循吏而别自為傳蔡侯行完而才鉅以方顯庸於時其勒之竹帛而銘之鼎彛固將有待若夫一州邑之績豈足為侯書之由前言之殆非侯所以致謙之意由後言之殆非州人所以尊侯之意也二生起而對曰先生為蔡侯言之則可矣而未始為州人慮之也廣徳負山之州也往時為吏者患州人獷悍多豪黠齘齘不可理以柔道於是一切爭為嚴峻深文痛法以䋲督之而人亦遂相傳以為非刻深不可治廣徳盖州人之䝉兹詬而病焉者久矣蔡侯乃獨先教化而後誅罰事無劇易處之一以鎮靜人無奸良御之一以誠慤是以侯既去而人懐思之至今嗚呼此豈深文峻法之所及也哉由此言之州之所以為治者盖在此而不在彼也是故州之人欲為之書以示後之為吏者使知州之所以為治者在此而不在彼也余曰若是則可以書矣蔡侯名克亷字道卿泉之晉江人中嘉靖已丑進士今為江西提學僉事其同知廣徳也以刑部即中坐獄事謫以某年至州某年遷廬州府同知以去皆宜書平沙事略記朱元弼嘉靖庚子太倉州崇明縣三沙居民王艮秦蕃宋其藉世魚鹽頗有膐力聚黨掠劫縱横海上官兵捕之輒敗衂朝廷命撫按操江並駐於州集兵議剿又以守邳州都指揮湯慶本信國世家有招安沿江草冦功令自邳州率兵行都督僉事來州㑹討湯至謁兩都院請與原駐本州兵備同往相機剿賊既至海上募習知海道者優人陳熈應陳熈者以其業徃来三沙賊所狎也宻受湯指先投於宋㑹宋疽背不同蕃艮策應乘間反覆疑之令其要艮議事刺於坐上持首與熙来奔自贖蕃即就擒事聞慶實陞都督僉事駐守金山其子克寛襲都指揮並賜金帛撫按操江俱受上賞兵備准免前罪仍其官大抵皆湯力也初官兵既敗兵備恐事聞上令知州知縣同崑山嘉定知縣往招之三人民服見已一知縣驟厲聲色躍而拒命震驚朝廷勤師逺集比湯至州問海道於兵備兵備又不能悉致湯募得陳熙既成功撫按亦竟不具實奏聞但以宋歸湯以蕃歸湯之子克寛而以艮歸兵備俱臨陣功陳熙僅私以兵備獲王艮賞予之不為叙用以故爵賞功實俱不相當後湯駐金山不久罷去克寛至任兩廣頗有威名以張經事逮死於獄陳熙居蘓州盤門自號西園居士以壽終事距今六十年矣余偶閱姜隅石平沙紀績故畧書其事存以待考余嘗謂克寛癸丑甲寅間守余海鹽屢却重圍脫民倭難地方當祀其功此亦一州公案也姜諱白老諸生憲副公龍之子本州人余同館姜正菴先生父紀凡千有餘言叙陳成功處甚詳不及備録當湖剿冦紀事馮汝弼嘉靖丙辰春三月劇冦徐海即明山和尚大合賊黨及倭奴數萬由乍浦趨桐鄉攻圍甚急巡撫阮公守禦逾月㡬不可支時梅林胡公以兵部侍郎總督軍務未閱月也兵僅二千餘勢難與敵乃陽示招撫為緩賊計海果就撫解圍其黨陳東獨與海異然以勢孤旋亦引去復合於乍浦公知賊有隙也遣人間於海曰若誠降必執酋首葉麻来海即執葉麻獻適尚書趙公以天兵至公復遣人間於海曰若誠降必執酋首陳東来海即執陳東獻余入賀曰徐海信不負公矣公曰海不負我我欲負海耳余以是知公之終必剿海也公謀秘人鮮有知者公復遣人間於海曰天兵靖亂非立大功無以自贖海因紿衆陽為聴撫而隂約我軍乘其懈撃之公令預泊敝舟數十艘於海灘行兵備劉公潜入乍浦城覘賊知諸倭疑海有賣衆歸降意咸伺海海不得自出入劉公曰賊心離矣㡬不可失也約諸路兵城上舉火齊發先是阮公督諸路兵伏各要害處諸路兵見城上火起爭趨奮撃海挈妻妾率精銳二千餘人循城来賊遂潰我軍追殺斬首七百餘級餘賊爭奔海舟自相殺及蹂踐溺死者甚衆海率衆由梁庄入據沈家庄去縣治僅十餘里衆心洶洶且驚且懼公覊縻之間諜往来不絶未㡬海率黨二百餘人詣公降時趙公阮公及巡按趙公俱在座賊介而入弦弓藥銃勢甚猙獰一見即復去公亦不復留也邑人轉驚懼若不可一朝居者一日公及阮公邀巡按趙公過余山園登山亭盡屏諸從人議剿賊事聞是議者惟東匪吕通政及余耳趙公曰賊名雖降我觀其情狀抗我也不速剿必遺大患公謂賊黨方固我兵不精剿之必不能勝不若姑少待之時間諜未成永保兵未至阮公及吕東匯咸同公議趙公謂余曰公家此地利害切身必有定見余曰僕山野之人安敢與廟堂之計然僕家此地得此賊早離此地一日則此地之人獲一日之安耳趙公惻然謂公曰能五日内驅此賊使離此地乎公舉其大指曰不去此則可今去此賊不信矣安能驅之海之聴撫質其弟洪於公公處之嘉興尚書趙公㫁其手大指趙公沉思久之曰公前奏海巳降今縱能驅之外地倘遁歸海島朝廷有處分將何以復命又曰不若姑少待之盖欲為萬全之舉也是日設宴於聚樂草堂酒纔數行即罷志有在也海所據沈左有新舊二宅海居舊宅是為東巢陳東葉麻之黨居新宅是為西巢公遣人間海使攻西巢以自效海猶豫未决公復使人遺金珠美飾於海愛妓翠翹紫雲者翠翹紫雲曰夜勸海攻西巢以自效也海以罪重恐西巢既覆東巢亦所不免尚在遲疑公使人洩其謀於西巢西巢之賊始相疑懼離心於海矣適永保兵至公遂欲大舉為擣巢之計乃恊於尚書趙公及阮公督諸軍齊發公親履行陣尚書趙公及阮公俱駐軍中隨宜經畧而兵備劉公獨率驍勇先登先是西巢之賊疑海之圖之也悉奔東巢以制海海亦知西巢之疑之也居其衆於外舍而擁兵自衞由是互相疑忌不為戰兵備劉公率衆直抵賊巢賊有格鬭者輒射却之乃舉火焚巢時東南風急烟熖蔽天賊莫知所措我軍齊進斬首一千四百餘級焚溺死者不知其數廣兵名海底鬼者獲海屍於浜水中盖二千餘賊殱焉無一人得脫者時八月二十五日也海之禍首尾五年方數千里生民咸遭其毒殺害諸路官兵不可勝計而一旦殱於吾邑公之運籌决勝固自有成筭而吾邑人心效順於公山川鬼神其亦有以識公之忠誠而黙相之與謹識滑縣尹西蜀張公擒賊記盧柟西蜀張公尹滑之三年是為嘉靖癸丑其時京邑多巨盜大俠囙伺挾勲貴人獲金寳殆遍中有盜魁任敬髙章一日謀曰聞三輔州縣帑金多可挾取乃隂賄西臺吏得諸直指所奏署帑金簿惟滑帑金一萬有竒相語曰此竒貨也於是隂結其黨王保劉竣任鬍子等㰱血盟各市良馬一匹潜至滑城外王保等三賊倚馬待而敬章二賊則入城是其嵗三月之望日也公甫上計歸晨起坐堂皇延見父老畢忽有二人稱錦衣使投刺門者難之輒手撾門者敬詐稱錦衣百户從甬道入章詐稱校尉懸圓牌從左角門入二賊直闖堂階北向立公竊意此必猾人之𨽻籍錦衣歸取帖辦者而胡狂悖乃爾心怪之判案如故敬前厲聲曰此何時大尹猶然倨見使臣乎公稍動容避席與揖敬曰身奉㫖不得揖公自謂是必逮我矣乃命左右設香案請㫖謝就繋敬復附公耳曰非逮公也㫖欲屬公沒耿主事家耳其時滑有鄉先生耿君隨朝者任户部主事管明智坊草塲火詔繋都官獄公聞之益信而顔始解公遂延二賊後堂始揖敬曰吾與公了此事不可令左右聞公乃出令屏左右敬右顧堂西一室問此何室也公曰此踐更卒夜直所敬拉公左手章擁公背同入室敬拉公並坐炕上章坐其門公問曰若既欲沒耿氏家何不商諸堂中而至此室也敬掀髯笑曰公不知我耶我霸上客来借公帑中萬金遂出匕首章亦出匕首交置公頸曰事成則生不則有如此匕首公始知為賊亦不為動乃從容語二賊曰爾所圖者財非報仇也吾即愚奈何以財故輕吾生耶即不匕首吾書生孱夫耳能摶爾耶爾休矣且爾既詐稱錦衣天使何乃自露本相如是邑中必有窺之者非爾之利也二賊以為然遂䄂匕首公曰滑小邑帑藏安得萬金敬即出劄記録直指使所報諸州縣帑金數以視公而滑所貯果萬金有竒公覽而驚異之遂不復辨但請勿多取以累吾官反復開諭語久之二賊曰吾黨五人當予五千金公謝曰爾減半矣幸甚但爾僅兩人奈何橐中可裝五千耶抑何策出此官舍耶二賊曰公慮良是公當為我具大車一乘載金其上仍械公如詔逮故事坐公車門勿令一人從從即先刺公候車行及夜深時吾黨從沙中出人各携千金躍馬去然後釋公歸吾計如此云當是時邑中士民無不知其為賊無不願為公出死力者苐慮公未必知也而公又慮邑中無有知者二賊又數數語公屏左右無敢前者一身獨苦意欲緩二賊徐圖之乃語二賊曰吾即取諸帑中易易耳但爾逮我而晝行非爾之利也邑人必潜尾其後豈有邑父母逮去而子民恝然者邑人困爾爾必刺我即爾亦何利焉為爾計夜行則無從覷耳二賊相顧稱善公又語二賊曰爾既待夜矣吾又為爾計帑金皆諸司積貯其錠大鑿有字號不宜動動則諸司分捕易以物色亦非爾之利邑中多富民不若如數貸之以遺爾爾可安枕且於庫藏無失不累吾官爾之徳也爾從則貸不則即出帑金利害孰便惟爾擇之二賊益善公計惟公命公屬章傳命吏劉相来相大有心計人也相至公謬為語曰吾不幸遭意外事若逮去死無日矣今錦衣公有大氣力不欲逮吾去心甚徳之吾欲具五千金為壽相吐舌曰安得辦此公躡相足曰非辦於我者每見汝邑人富而好義吾令汝為貸遂取紙筆手書某也上宜若干某也中宜若干共九人符五千數令之陸續来報是九人者善捕力士也公又語相曰天使在九人者固富室宜盛服謁見勿以貸金故作窶人狀盖不欲露其力士本相也相乃大悟出公心知外間有為之計者矣奈不得出此室則語二賊曰吾為爾計不淺爾既詐稱錦衣天使顧不為禮於後堂而跼蹐賤卒直所啓外人疑亦非爾之利也吾即與爾偕出吾豈能翼飛耶二賊首肯敬假錦衣官體貌與公揖讓出後堂分賔主而坐供茶㳟遜如禮章假校尉體貌聲言官長在不敢坐則擁公背侍立不旋踵公自計無可脱身㑹寒風拂面公託言避風與二賊復入室中以示無他意二賊則喜公又與二賊曰爾逺来饑矣吾令門子取酒食與爾酬酢爾慎勿露本相二賊又首肯果復如禮公先飲食以示不疑戒二賊勿多飲以示懇欵則二賊益喜酒畢曩所屬九人者各鮮衣如富家子以紙褁鐡器捧之陸續門外謬云貸金已至但貧不能符其數作哀免状二賊聞金至且見其人果富家状則又大喜謂公不我紿也公心知外間業已有備奈何得再出此室則髙聲語二賊曰吾待僚友素厚吾今有罪而僚友不相恤意何薄也吾固不足重錦衣天使彼不當謁見耶陽浮怒之語聞於外少選稽縣丞張主簿各持刺相候於後堂二賊不欲出見公曰同僚專為爾来公乃固為揖讓而二僚在後堂距此室數武耳瞻盼二賊乂固為揖讓而二賊又假錦衣體貌遂不覺互相揖讓而出與二僚交拜又復如禮公欲乘其答拜時擒之則章擁公背固不旋踵計無可施公乃謂二僚曰吾貸富人金以予錦衣正頼同僚在此明證其事他日償之彼無辭耳二僚乃畱不去而二賊相與雍容揖讓為錦衣體貌不得復還入室矣公謬為予金状呼天平則天平至呼几案則几案至公又呼曰此几小寘金㡬何庫中素有長几能寘多金胡不取以来則長几至横之後堂其時敬據客位南向坐公與二僚據主位北向坐而長几界於其間公幸與敬稍隔矣奈章固擁公背不旋踵北向侍公計所以稍逺之則起持法馬語章曰汝官長方與吾輩為禮何暇視法馬則視法馬者爾之事也章利在得金稍就几視法馬而九人者捧其所褁鐵器競前謬為發金状公稍脫身離章數武則大呼九人者擒賊公與二僚從前堂出敬起撲追公不及抜刃刎於樹下章亦将刎為捕人持之得不死拷訊出城外王保等三賊主名亟捕之已亡命入京矣公為上状今太傅陸都督盡付諸理與章等俱論死磔於市盧柟曰公尹滑裁逾弱冠耳賊豈不謂公易與哉乃公神明内藴鎮靜外施白刃交加了無懼意賊之魄先奪之矣至於從容應對委曲中窽聴其言無非為賊謀亦無非所以謀賊所謂中理之言可以集事賊竟不能出公成筭中矣竊謂公處此事倉卒不亂逆境兩忘一動一言若或相之此盖本之以徳運之以量發之以智成之以福異日肩天下大任卜於兹矣善乎萬太史碑畧曰宋韓魏公所遇殆荆軻者流彼固莭俠故能激之以忠義如二盜者貪利之心固結於中化不可入威不可用藉令魏公當之寧復過此知言哉公之徳政非一滑之民尸而祝之矣兹特論處盜一莭以示天下後世臨利害者知所取衷云御史大夫左司焉崌翁張公定浙變記董份初浙之有兵變也按部使者以聞因請重臣鎮之而朝議以右司馬張公者自為令有應變才名重天下及四為鎮撫而定皖難定上谷虜難彰彰著大功名益重即欲坐鎮非張公不可乃以右司馬兼中丞督撫浙云浙故無兵有兵自總督胡公始方嘉靖間倭剽掠甚暴而胡公盡括浙中儲以禦倭因募甌婺間若奉驕子厚其月餉恤其家時時數校閲多設金帛屠牛羊豕賞勞一閲費數百千而兵亦自恃能抗倭漿酒藿肉好氣為雄豪多恣胡公故濶大輕揮金略文法頗縱舍當是時倭急其勢然也而胡公亦以此成禦倭功及既久倭不来兵無事而浙中儲已括盡乏軍興繼者不得不莭縮月餉益減校閱亦益希賞益薄夫其始汰而末簡㣲也兵皆有怏怏心㑹執政益務節省名多刻核言者承指復議减浙餉部既覆矣而中丞吳公性節亷多畏慎悉如部覆行兵怏怏益甚又見浙無他兵而九營者其七防汛二居守皆藉其力因言執羈靮效扞衞積有勞而餉益減不聊生遂從汛甬東而營中譟吳公曰是有言者覆者已著令吾知奉詔㫖行事耳豈吾得專數諭之而譟不已遂治其甚者以軍法兵益恨之而執政行錢法益峻餉既減乂雜錢而市中錢不行食益不給而馬文英吳廷明二酋者兵之尤桀黠者也遂畫謀率衆首難乃先詣按部使者愬而按部兩人皆豁達知人情閔其食不給慰撫之因力言吴公吴亦悟示以明日集所司議矣而兵既聚洶洶不能即還復詣治餉僉事愬治餉厲聲罵衆益激而二酋攘臂前欲捽治餉治餉亟辟匿衆無所發怒而二酋謂衆曰業已搆不可解矣遂皆至幕府譟而轅門閉乃斬門入廨發其橐意有重貲而盡發無有也因躡尋吴公擁至營所以犯吴者不可勝道復跪責吴朘削私橐勒手状而以官帑金二千酬之其時天久隂晦冥乾坤㡬易置矣以是浙中人日夜望張公来定變而張公夕受命朝辭闕以單車疾馳數千里過嘉禾而諜以民變告矣二變交作兇逆參㑹人錯愕而公不顧叱其馭曰驅之復疾馳數十百里至浙入幕府入則車未解驂餐未及下咽而民擁二千餘當幕府前譟矣公命大開轅門屏騶從單車出當衢旁無一人輿𨽻皆股慄公獨正色諭毋反且問所以譟者何而丁仕卿者尤民之最桀黠首難者也相率言吏矯䖍不公踐更有私不法愬上官見抑不平公乃笑曰此特易耳何至以細故取族罪乃下檄悉如愬責吏除之檄已因遣散去而民先一日燔縉紳家虜金錢得利又見兵變有利無害以為官莫奈我何也夕益聚各據諸巷以所奪諸絳􅃭裙折竿為旗矯令令每家懸一燈十家揷一旗巷如白日而益燔諸大姓虜金錢益多燒掇焚杆火光燭天震呼動地公乃宻召遊撃徐景星曰反果反矣顧今無見兵而能制民者獨營兵耳營兵方負重罪汝試往說之宜動動即與来徐知兵善辭說一緩頰得要領且宣布公威徳無貳兵果動而是時七營兵已出汛獨兩營與二酋在因悉来公乃召其伍長曰前幕府誠過欲汝捐軀而食不給又軍法治汝非盡汝罪也然汝亦甚矣今有可以轉逆為順易禍為福者於汝何如夫汝衆皆鷹揚甲士而亂民烏合取之如几上肉耳汝能自効否皆叩頭曰願盡力又召二酋諦視曰昔首難而自縛以獻者非汝耶曰死罪有之公笑曰誠壯士然古壮士死義耳昔自縛為逆鬼而今自効為忠魂二者不可同語矣且汝知不免而不知立功知重負而不知贖罪何不智也以鷹揚士而不能取烏合何無勇也即智且勇是轉逆為順易禍為福在須叟時矣二酋復叩首曰願盡力出以諭衆衆皆叩首曰願盡力於是以徐遊撃所將為中軍以兩營為左右翼連三戰三捷遂於民所燔擄家擒百五十人而以丁仕卿韓謹等渠魁五十人奉勅便宜誅之而其餘或末減或釋有差厪三日而事定公乃曰亂民當誅良民當撫乃亟改踐更役罷間架税間架税者天下所無而㑹城所獨有者也因䟽亟罷之而㑹城人懽呼感曰公天人也吾屬自是得生矣益問諸郡疾苦而小者立斷大者䟽聞曠然與更始諸郡人亦懽呼感曰公天人也吾屬自是得生矣而公以民心既定軍志當安安之必自月餉始月餉者前如胡公則太浮後如吴公則太減乃損胡公十之五裒吴公三之一而酌其中焉兵食足矣乃録平亂功而二酋得冠服諸營得賞賚兵知信矣乃開顔以接之虚懐以待之真實不欺表裏靡間兵無疑矣而公獨念名分者國家之大體綱常者天地之大經故君臣無将上下無越越者将之漸也漸不可長㣲不可忽故權宜者一時之術而法紀者萬世之防當其變則權或可行及其終則法所當正是以脅從或㒺治而渠魁必先决然公又念假以他事而宻决之則法不當其情無以服反仄待其汛地而分决之則刑不與衆共無以示大公故復召徐遊撃遍示各營以幕府雖尚寛而天子必無赦然誅一以警百者天子之法而借一以安百者幕府之仁誠各營皆送一渠魁則五千人安矣於是一日而得七渠魁皆反接就戮曰罪自取無怨而二酋者既陷諸營於大惡又歛諸營之鉅財稔惡不悛衆憤所積宥不可再得倖不可屢徼諸營棄出之亦反接就戮曰罪自取無怨而諸營以有罪既得無辜益安皆懽呼感曰公天人也吾屬自是有生矣然予聞公始受命也有勸公請調兵者公弗應有欲以兵助公者公亦弗應而遂單車至浙又單車出臨衢斯亦岌岌哉而竟能轉瞬不旋踵成是功也使非成算定於中斯豈以身試者哉及其以一身居正千人之上可謂虎穴嚮使舉事一不當可勝道㢤而戮者無怨存者騰懽斯所謂抗其背扼其喉卒取虎子以出者㢤夫非常之原黎民懼焉及臻厥成天下晏如也至其正名分定綱常光明磊落益不可及矣史董氏曰始張公成浙功而予浙人也以父母之邦親所聞覩而蔑賢公卿之勲業弗録心恧焉遂稍次為記而㑹天子之眷寵轉公左司馬晉御史大夫召還将得代移幕府湖郡而湖守熊侯舊為公屬欲公功名垂永久與其倅來乞予言以贈公予遂以平日之所記著者授之云綏交記楊寅秋萬厯乙未六月西粤貴縣蠻觸糜沸孤城危若累棊寅秋既單騎馳定之今督撫陳公戴公前直指黄公合䟽條其状有龍荒鎻鑰豸繡干城之叙乞下部紀録需後用詔可㑹秋有殷憂病連牘乞罷三臺以安南搆訌弗戢不許越月百户余承武持檄部領三臺所譯審夷目黎早用范彦等抵邕陳公復手勞曰夫非所期子鎻鑰干城乎國威邉防中外簡冊瞻仰若先文貞遺畫而若鄉逹毛司馬公故事具在努力圖之寅秋頓首受命先是嵗壬辰交都統使莫茂洽荒淫無度羣臣側目黎維潭者黎暉之四世孫而黎利後也用世臣鄭松計因内應襲執茂洽殺之收其印尋殺莫敬邦殱其族㡬盡族之孑遺敬用敬恭等奔竄我土司維潭乘勝逐北盡有交地亦具欵文以首事故重譯叩闗則陳公方鎮撫粤西以夷叵測弗請命戕我貢臣即弗觀之兵宜閉闗絶之語在馳報䟽中明年癸巳維潭復遣使函封稱主臣黎氏世孫仗天朝威靈復讐復國願乞如先朝從象胥後嚮風内附陳公乃合前督撫陳公直指涂公疏以請若曰彼之雪仇有名来者弗拒及茲勘處西南生靈免於蹂躪尚亦有利下部議報可亦既遴督備指揮吴懐仁知州孫繼先臨闗體覈有日道路遥阻維潭不勝徯望至是更遣早用等間道泛海抵端叩轅門如前請云余秋既奉檄則採祖宗朝制馭安南載在令甲者熟筴之敬用等亦遣目阮諍等以窮乞援語多恢張則探情形揣事勢質諸共事靡有堅决有謂黎欵詐也懼我乘其後姑緩我師有謂莫分道屯據所收拾喪亡不下萬餘如阮諍云有謂維潭未必黎利後或鄭松牛易馬即利後利猾夏負積怒先朝亡國裔不宜再許余曰嘻似矣未覩其全夫黎豈不知負彼方張而卑詞請命毋亦藉我名號彈壓乎誠如殘莫所收喪亡寧啻三户一旅安用以窮奔我利罪章皇帝宥之矣維潭即非利後蠻夷易姓如奕棋誠利後也登庸逐黎以篡維潭逐莫以恢復可同日語哉今日之事不拒黎不棄莫惟㫁乃成則下檄黎曰汝實負擅殺罪無赦其遵往事範身束組銜璧仰關請死其以爾世系綴旒以報且何以明非鄭冐也其以爾首事偽印封還其議安揷莫氏如異日棲爾漆馬江例下檄莫曰安南土宇誰家故物既無捲土之期當思一枝之安其早引决以存綫緒則又進勘官誓之曰所不共矢精白而甘心辱國剖身干憲人将不食其餘㑹孫知州遷秩去請以左州知州楊繼顯代無何安平州土官李天爌以交黎劫虜烟邦等村告龍州土官趙英以農倘等村被擄告下雷州土官許應珪以更峒等村被焚刦吿龍英歸順相繼告余愕然夫黎不以長驅追北掠我邉鄙而掠於傾心乞欵之日乎是殆匿莫為之招詰之故莫依土司為逋藪土司藉莫為侵地囮即日馳報三臺棲莫出境外申督諸土司牟利挑釁者按軍法敬用等竄七源峝界邇龍州龍州之村墟枕交者被髪結衽與交類時以兵翼敬用知州洎督備抵闗敬用赴勘擁衛不下數百餘所置對張皇某虎視海東某雄據髙平知州以為然抱杞憂余曰左矣若以為擁衛盡莫氏子弟所置對果赤情乎是有沈命者苐窮治之飛鳥依人嫌於棄莫下石耳頃之安平出敬用手書流離乞哀㡬為溝中斷吴懐仁亦以敬用等所具結乞安揷願得髙平如勾踐㑹稽需後圖以報人始咋然知莫之自量審曩所謂分道屯據安在而維潭亦遣諒山衛官黎重華等詣勘官陳其籲欵尋以叩闗限請余便宜期以次年二月母後時則嚴飭毋信土目恐喝鼓煽悮事機毋信狡獪指私覿陳謝以垢清肅毋以修詞弗格或涉抗衡失藩臣體則請徴調諸土司精銳碁布要害委㕘戎李君鳯森扈揚千彰威嚴請添委南太知府蘇民懐吴大紳南寧同知黄淙南太推官盧碩黄喜之共効劻勷請發商税若干金佐軍實徴發賚予一切部署機宜每有稟决三臺隨報如響陳公更益發梧餉若干金犒師銀牌等物稱是且曰毋靳小費䙝國體明年丙申正月余會分道㕘藩林君震以循行先後至太平至則維潭遣候命官杜汪范彦等條具宗枝封識所收銀章候諒山我土司兵亦雲集戱下令諸土司曰有能乘時扶義共襄綏懐盛舉吾能優異之思明府土官黄承祖以所探海東莫敬章被殱事率先應命余覘知其故負譴欲自贖且有夙憾於龍州稍推誠鼓之承祖勃勃思奮㑹勘官黄淙等報杜汪等所輸吐率變幻讕辭舛午驁然負彼恢復若曰以登庸之例例之非其辜維潭亦函封亦陽為銜戴隂欲以族目代欵無事身抵闗意余曰異哉立遣承祖擇土目可者持檄督之天朝以包荒綏戢汝汝狙詐橋䖍干命来則臣妾不則俘虜已又深念彼豈有戒心與更檄之汝脫有虞於意外許爾陳兵擐甲入衞成禮而退則又促范彦之稍習漢語者面折之彦加額願奉條列手檄以還維潭始回腸改襟報曰荒臣無罪擅殺其罪請以範身金人代死謹率臣耆俟命詰偽印曰描摸權使耳必得詔請更鑄詰安揷曰夫叛裔也而援我漆馬江例哉惟天朝所裁擇無敢逆命余顧林君是足藉手報成事乎印之不存烏用更鑄遂發江州經受降城抵幕府早用等瓣香望塵道左以代身来驗以飢病告請期且與之期越日忽稱䟽欵未備土宇授之天子先君不敢聞命以安揷莫裔暫求南歸人人相覷失色何物鹿豕驚駭倐忽若是亟躡之乘夜抜營以去即日趣沿邉繕闗隘飭烽燧示必絶馳報三臺投袂回珍余尋奉祝釐之役當行則耳屬督備是有土夷煽恐之者去必悔悔必復請請必抑遏之三而許之承祖力能得黎隂事制土夷命若必與之交讙毋相猜宻諭承祖曰幕府隳成得毋以若見妬敗乃公事乎兩人以此深相結納宻白三臺局已中變訛言當朋興願以投杼故遂狡計三臺頷之交舉觴勞余曰行哉毋留滯鄉土三臺尋以情形聞省垣以黎酋志在蓄威當事不及時操割剪萌恐遺養虎積薪憂嗟居者固安知荷擔之勞哉御史黄公將得代乃發憤上䟽其略曰臣聞以虎捕鼠必用全力國初物力强盛威武奮揚自季犁之役數遣勲舊大臣四路提兵驛騷數省轉輸萬億勝負畧相當終鮮勘定今何時臣等以征安南請將求莫氏後立之乎遺孽不振死灰難燃將遂郡縣之乎前鍳豈逺今可復蹈妄揣歸著不過許以納貢稱臣而已急而兵之固可必得緩而撫之未必終失兵而得之固足揚威撫而有之寧遽不武而勞逸鎮擾相距萬矣宜稍寛時日再行檄勘部覆如御史請越月維潭乞欵官目鄭公義等趾錯於塗不許則極陳諒城以飢病請命歸整檢奏欵非宵遁而懐仁承祖咸合詞稱其誠懇今日受命有死無霣督撫陳公戴公乃下檄曰是反覆如反掌其以欵物嚴装抵闗候進止時御史林公受事入境築舍鑠金之口蠭起則簡委潯州府同知黄宇思明府同知李陶成往覆按且計畫一而督撫兩公遣差檄余就道接踵余舍余竣役突未黔適有窀穸事即從壠間據鞍窮旦夜度庾抵端謁督臺陳公顧余曰人情左圓右方僉謀未同誰能立功徼外者余竦然敬諾抵桂林林公方行部南邕謁撫臺戴公首詰余曰必安莫黎所執言甚正棄莫可乎余曰不可彼耳語者必不深惟重輕徒以推亡固存之義若之何敝屣棄之然則奈何余曰迫黎以吐退不能所退必非人所居髙平尚觀望莫亦願得之疇非我幅􅊷即自我剖給之所謂治以官府之法何不可公喜形於色明當歳除㑹督備報維潭遣杜汪通事唐世畑等運欵及闗聴騐余曰機不容髪即日謝撫臺戴星行丁酉正月朔後四日抵賓州聞承祖以所驗欵目引世畑等抵邕流言洶洶土夷冐莫屯兵七源剽掠交境揚言奪欵疑我而承祖懐仁同夷使候浹旬格不得入城夷使徘徊解體懐仁索然如死灰承祖怏怏賦歸去㡬且畫餅立飛騎馳諭懐仁且止夷使戒承祖母鼓棹明日余至邕謁林公立譚若逆稍及交事余從容陳往局與今結局状公為仰屋良久曰不請命􅍀然戕貢臣不篡乎厪厪請欵方物不䙝乎終不聞命安揷不抗且詐乎余曰彼所執春秋復讐之義非簒也律以黎利登庸之徃事簒猶許之雪仇快於一朝請而圖之庸可冀乎欵物遠人區區靖獻非貢貢有常數欵無常數澗溪沼沚之毛可也薄来謂何不宜與之銖兩彼儼然自謂天以吴賜越身為前鑒詎肯安揷以存禍本請以天朝之法剖之誰敢不服林公霍然洞解詰朝諭承祖懐仁率世畑等投謁宣恩威各頒賞有差夷使土官加額大喜過望即日遣世畑還促維潭如限抵官土夷屯兵聞之望風解去余尋别林公横浦巡太平道路流布莫兵且遮道且頓兵欽州四峝余曰此黄趙自修怨何與於莫恩城吏目吴俊哲者從龍州還甚張莫連營結壘鬼門闗以東為梗一倡羣和余曰梗矣安得黎使往来不絶乎知龍州酋以賄行亦有隨聲隂壊者将乘不意縛龍州寘諸法督備稱無左驗且未綏外夷先收土司維潭亦當却步宜寛之效狗馬從之念非具司馬無以預塞狡謀則請委㕘戎楊君元調三里營兵與土兵犄角有頃范彦鄭公義以奏草来驗維潭猶然泄泄詰之云去臘不腆欵物及闗逢上國之不閑靡所頓寄運還壽昌是用次且犇命遣彦等伺前旌請更期余曰嘻我實為之使彼得藉口乃更與之期差舍人王建立部領彦等䕶之行因覘之一日懐仁等馳報莫夷勾亡命千餘乘夜縱火燒坡壘諒山黎營㡬盡黎將將死之余曰果莫夷耶諜之一出平而隘一出岜口隘余曰安得莫兵自内出耶彼直以此足恐哃阻遏我耳上下錯愕僉謂宜及時返斾李同知從上石具報毋以夜襲故摇欵事黎大隊且臨餘息直壓卵意與余合即日下俊哲獄有言返斾如軍法則矯三臺檄遣李加貞等分督諸土司交之役非獨綏逺夷亦為爾土司計邉鄙無聳有貪小圖忘隠禍逞狡計隳成功快私怨敗公事者天憲具在土司惴恐不數日維潭率黄廷愛等總兵象熛起次諒山既大索諸燒營壘者遣范彦等辦香来迎如初閱承祖掲則云奉禁肅清至凜凛夷相顧囁嚅余曰若以前日之五申三令徒貌言乎立馳示誓之但萌念不生還明日勘官發南闗余與楊㕘戎相繼發幕府至則誓漢土師以遷隆峝土官黄兆基領兵千五百有竒守岜口隘以應襲黄應雷領兵千二百有竒守强村隘以上石土舍黄應宿領兵五百守絹村隘應雷應宿皆承祖之後兆基其壻而龍州平而隘則以把總周大倫領營兵三百名合龍州兵九百名恊守龍州官男趙元璧請行行已之則以欵槓計信地道里屬元璧等部領戒之曰是天府藏脫疏虞孰職其咎越日黄李兩同知以勘驗還自闗一餼無所染取其所對状若世系臣耆供結井井綸綸咸有經紀獨維潭入闗匍伏有難色余曰胡以昭示威稜彼所虞土司包藏禍心其盡撤土司兵退數舍許之陳兵露刃以入其可乎立遣督備戒維潭必入闗凡三徃報如命遣候命阮澧等請期期以四月初十日則頒發漢儀及相見禮諭令演習祗對必飭至期以官男趙元璧從余發南闗登昭徳臺陳設龍幄儀衞備盛余偕㕘戎諸供事官行禮畢分班列侍啟闗先夷使率夷槓鱗次入次夷目率衞兵魚貫翼而入次維潭皂㡌縞衣赤跣白組率通國臣耆入北面伏地既釋組聴唱五拜三叩頭以次進金人代身進伏罪疏臣耆乞恩疏同知黄宇宣布朝廷恩威待以不死維潭復拜叩如前恭徹龍亭請余以主賓禮見余曰今日受欵非頒封孰為賓不可請稍降余曰銜天子命不降階見纍臣不可承祖從旁厲聲曰復國不費梹榔半咽而靳此四拜乎乃拜各耆目俱頭搶地羅拜因諭之莫祀未可絶也量給以髙平府治彼有一隅可棲我土司毋敢為之逋藪安莫詎非安黎其敬應母更侵軼維潭唯唯既退張具犒之遣候命杜汪等報謝遂閉闗是日維潭進止不失尺寸凜凜交㦸之下不是過漢夷兵㡬半十萬無敢喧嘩干令土酋匣測假令以偽莫虚噪蹂我五步之變未可知然余不以元璧防隘覊之啟闗業已制其命何者非天威赫濯即日馳報三臺遣指揮羅萬善督土司䕶欵行遍賚各土司銀幣牛酒懽聲震山谷余振旅東還所過龎眉父母策杖扶笻追惟往事徴發之痛感激㡬於泣下則率夷使自桂及端以余所勘處端委若諸文武流土之共有效於欵事者惟三臺可否三臺無不撃節勞苦之尋據實以聞諸流土無勞不録余秋獨䝉上賞而褒辭稱露布有光銅柱雲仍世啟玉闗則以黎利之事余先文貞實賛廷議云五月夷使馮克寛等度庾經白下以少牢祀先文貞祠邑人觀者如堵八月上萬壽克寛等将欵詣闕下上喜從部覆授維潭安南都統使掌國事錫之勅印上既重念夷邦不可無統推及勞臣賜督撫鎮臣白金文綺寅秋得増秩一級賚有加流土各分别陞調賞有差嗟夫余於交欵未嘗不抵掌仁哉章皇之禔福兩粤無窮也縉紳學士弗身遘猥云文皇得之艱難章皇棄若遺跡詎知實匏不可器而石田之不可藝哉庚子之役副使翁萬達多算知兵毛司馬實托重之卒從欵附後六十年有今日之事然後知章皇不忍塗中國肝腦以事外夷千古明鑑胡可易也要以定欵等耳於登庸之日易於今日難難者非獨一紙之與十萬徑庭異時殘黎在老撾徼外我土司隔絶無梗遏壅閼之虞今殘莫匿近闗藩籬中夷酋百相疑土司百相敗人情百相傾呼吸變幻之状余難言之矣幸當事掌玩夷情一腔忠猷屹然期於崇國體宣國威以保乂南土寧言舞干毋言標柱而又不鄙夷余也肉食蚉負傾信獨任至不難出空墨之印檄俾之便宜從事亦數以翁公故事勅勉之翁有勤施於粤厥後禦虜為名臣余何敢望而當事所推轂付托類若斯余即不蓽露蠻烟馬革褁疆場得乎哉是役也督撫賞不酬伐適有岑峒之擢遂靳重巽夫曲突徙薪自古記之矣陳公諱大科維揚人戴公諱耀清漳人前督府陳公諱蕖安陸人林公諱道楠莆中人前直指黄公諱紀賢眉山人凃公諱宗濬豫章人余寅秋以戊戌三月作綏交記明文海巻三百八十
