body:
  text: 明文海卷三百八十三餘姚黄宗羲編記五十七興造仗錫寺興復記戴洵余以萬厯庚寅九月至仗錫阻雨閑話因及本寺興廢之由自太白祖師開山來皆無記可考若近日興復則自正徳間文綱上人始也寺故有田千八百畆大半入鄞姚貴勢家而糧仍存僧不能支訴諸官時髙太守者於鄞人吕憲使有舊右之僧智禮智欽死獄中文綱先籍餘姚廣濟寺早服習太白教憫其將廢也賫貲來仗錫盡贖故産又具奏豁虛糧下胡叅政審㫁於是吕憲使田亦得贖盡豁虛糧乃剪荆棘芟蓬蒿修殿宇飾佛像創法堂廣僧舍繁衍至今日其勞費則大半又出文綱孫徳滋也滋公余及見之最儉朴終日不發一語蓋其所得於安忍靜慮者多矣余獨怪古初寺産豈一僧能致之蓋皆貴家大族所捨施而今為貴家大族者既不能施也又從而侵之何耶而官于此土者又不責其侵也而右之又何耶豈易以侵欺踵其習俗耶嗟乎佛者覺也覺者空也寺而有産妄矣而貴勢家侵之又妄矣而僧又諍之執之益妄矣而官府又抑僧右貴勢家尤妄矣寺産也僧也貴勢家也官府也皆妄也則亦所謂平等者也平等則亦佛之法也佛亦不以為怪也耶雖然佛之有寺産共諸異姓而貴勢家之侵寺産則獨與其孫子誰公誰私孰大孰小也共諸異姓則有即無也色即空也獨與其孫子則有執矣不空矣然而終不能執也不能不空也嗟乎此佛之所以為覺而世之所以為夢也乎余故為之記余之意乂豈特為一仗錫寺已也揚州門新造石牐記吕原汴梁宋東京元河南行省治所而其地則所謂天下之樞者也肆我皇明混一之初嘗建為北京既乃分封州周王于此并置河南都布按三司而附以府縣衛所焉其城周迴二十七里外則繚以土城當宋時近于城者惟汴蔡諸水而黄河流經城之東北以達於海至元時河始南徙逼城合汴泗入淮國朝正統戊辰亦嘗分決張秋口東北入海其後復東南入淮如故築隄䕶城其來蓋已乆矣夫土疏固易遷徙而流雜泥沙又易淤澱以其故水載髙地隄日増而城日下也天順五年七月二日客水暴至河溢踰防土城遂決越六日風急浪擁突北門以入平地水深丈餘王府及官衙儒黌廬井市廛無慮數萬區盡浸摧圮力能結筏者僅以身免而老弱者徃徃溺死事聞上特命工部右侍郎瓊薛公遠徃治之璽書授以事宜公星馳至汴敷宣帝徳綏妥衆慼即移粟以賑其饑躬率三司官僚按視地形商度工用及以緩急詢之故老乃命左布政使侯臣按察使呉中徵集丁夫預調塞治之物于所屬委開封知府魚侃通判蔡保管領應役先令右布政使豐慶副使項􅋛于决口上流督夫下椿捲埽作截水隄二百四十餘丈浹旬隄就決口絶流而水趨故道又令副使張諫叅議王鉉于土城東起獨蠻岡訖猫兒岡督夫鑿渠二千二百七十八丈引水東注而城中積水日漸耗减又令㕘議史敏僉事髙逵于土城東城南曰揚州門浚舊渠之湮塞者起太平岡直抵陳留渠長一萬二千四百八十丈以洩城中積水使下流達於黄河自是地稍髙者咸得修葺舍宇凡府第廨署亦漸可居而軍民蕩析流離者接踵復業野田堪乂者俱播粟麥矣顧城中地最低窪積水莫能盡出則令叅政蕭儼李浩叅議黄廷儀僉事王紹督夫車戽叅議何陞又導而分閲月水盡乾涸初環城五門俱有潦水河決後水溢瀰漫浩無津畔徃來者必藉舟楫一遇風濤莫或敢濟由是米薪之價湧貴數倍則又令項􅋛等築道路于大梁仁和等三門以通車馬内外莫不便之且令李浩修補城垣缺處及剏築各門月隄軍民有貧餒及缺種子者給以粟麥凡八十餘石有屋居漂蕩無存者給以榱檩共一萬五千餘株事將竣因念積水全頼開渠濬導議即揚州門置牐以限内外倘後内水有積啟而洩之或外水欲入閉而塞之庻為永乆之利適巡按御史梁公覲至議用克協即委布政司照磨金景輝率工於鄭之賈峪山採石煉灰勸客舟如期輸至就令景輝及開封推官劉琦董役未㡬牐成蓋首事於某年九月十二日而又明年某月某日輟工凡役丁夫三萬八千四百二十一用椿木三萬一百七十四艾稍以束計者一十二萬七千四百挺囤以件記者三千二百麻以觔計者九千七百八十六而牐用石八百餘觔磚二萬餘塊灰三萬餘觔是役也諸公開誠勸諭人心感恱故勞雖乆而無怨費雖鉅而易完也及薛公已還闔城士庻咸謂其仰體朝廷之心既極民於昏墊又防患于未然其徳宏其慮遠宜有術以告來者而崇明訓導祥符艾俊為書屬大理寺卿王公宇以求予記嗟夫中原水患惟河為甚而禹之治河也務多其委以分其勢故當時大伾而下析為二渠大陸而下播為九河今河失禹道治之固難如能先事為備訪求遺瀆以為委則亦不至臨事而失措矣穿渠置牐蓋知從事於委者然恐委弗多而泛濫所當虞也因記夫施工次第并贅以是説云新修擬峴臺記戊申陣九川予蚤嵗讀南豐所為擬峴臺記見其敘臨觀之美與風俗之龎躍然興慕以為雖他州有是猶一徃覽而問之况為吾土又近在州城之東隅者哉然二百餘年民風日下所謂野牧不収露積不垣者已邈然莫覩其遺俗意惟江山之勝固無變也及登臺而望則千金陂決江不走臺下而抱城惟白沙漫漫乆矣則所謂洶浪漫流㣲風遠響與夫危檣勁櫓沙禽水獸上下而浮沉若出乎履舄之下者亦不可復見矣獨其所謂蒼厓秀壁挾光景而薄星辰與夫野林荒墟遠近髙下宏廓怪竒之觀環撫之東南者固猶可坐而見也還山以來數與諸邑之彦講學其中相與追先哲之遺風以為隄潰江遷莫之能復也其於頺俗庸亦有可挽者乎故凡登臨未嘗不徘徊終日然每一徙倚則其甓䧟軒腐凛然惟恐隕墜風雨時至則其間上注傍灑凄然不可少留又烏覩所謂出雲氣而臨風雨者哉郡縣大夫凡欲洗煩囂寄遊觀修燕饗之娯亦莫能舍兹臺而他適然未有能理而新之者閩五山陳公一貫守杭有聲尋以南省故郎謫倅太倉嘉靖丙午秋稍遷貳兹郡其冬前守曽君汝檀入覲公至適攝郡符外和内介開心布誠不立畛畦百廢具舉脱然不知其為謫也凡文書訟獄之廢積紛糾者公櫛理而斤觧之其隴畆之爭度非躬蒞弗平者不憚暑遠上報下流日無留牘故得數乘休暇寓其樂於此春漲浸淫則乘小艇泝流循臺以諦察故道擊楫浩歌慨然有復隄之志聞海塩顧公霑來守而寝尋夏秋繼旱公即臺為壇再禱再雨民獲有秋而守未至公乃因民之欲宏旌善之亭修麗譙之樓以翼政府已復登臺而嘆曰文王之憂民也而靈臺是營豈為耳目役哉今千里侯邦惟此故臺坐視其日壞以憂后賢人其謂我何惟是習役於公者皆利之也故費糜而功隳乃擇耆民章甫董焉公既區畫有方而郡推茶陵彭君宷復協相之于是上覆下甃中櫺旁檻悉易其故而加壮宻焉費不民擾而功不踰時臺若闢而廣甍若増而崇矣公以賓屬落之邦人胥慶于是臨川令象山應君雲鸑屬余為之記余邦人也既樂公之美又竊幸得載名其上以從南豐之後遂不辭而記之應侯方建白復隄事公亦樂其志兹吾州萬世之利也豈獨復兹臺之觀哉如上下孚而有成也頌聲作余又敢多讓乎山隂縣柘林牐記王㒜鑑湖之水出平水若耶諸溪其源三十有六皆西北流入小江以達於海漢永和中太守馬臻始築堤瀦水以鑑湖名周三百五十有八里溉田九千餘頃在㑹稽山隂二縣境内其地勢南髙北下故湖髙于田田髙于江皆丈許水溢則泄田水入于江水涸則決湖水以溉田宋初又建斗門八所以時閉縱其餘堰牐隂溝之類不可殫述而民享其利亦已乆矣至熙寜中並湖之民始有盗湖為田至九百頃者乆之益甚至取其利以歸公上湖所剩僅數百畆而利之所入復未必盡在官而所害凡數千頃蓋湖與堤自是俱廢而水旱之患起矣既而蕭山磧堰又廢西南諸水逕趨入海其小江名錢清江在郡治西北以受斗門諸堰牐之水者遂壞塞不通斗門八所皆毁雨乆則江水逆入内河衆流併入玉山斗門宣洩不及而郡又有浸淫之患國朝天順間為郡者嘗横江建白馬牐以逆上水入江其意本以濟旱而江愈淺隘時遇暴漲則徧決江塘水退復募工修築反覆勞擾寖妨農時而民尤受弊成化癸已浮梁戴君廷節來知府事宣上徳意問民疾苦時有以水利言者咨諏而審度之曰馬臻之築隄障湖水也趙彦倓之修塘防海水也今水勢髙下與古不同而猶襲故跡欲収成效詎可得乎於是相地之宜順水之性于小江南北建四牐曰新竈柘林匾拖夾縫以泄二邑之水又于蕭山邑境建龕山斗門以殺西水以乙未九月興作卒功於丙申三月由是水患可息嵗計可成一舉而上下兩得之矣予友監察御史陳君壮以書來道其民意請為之記予復之曰鑑湖之利害昔人嘗有論定矣以為公上不利絲毫之賦守令不恤豪右之民毋惑於紛紛之議毋付之悠悠之口何患乎利不興害不除君其庶㡬於是乎不然自熙寧迨今閲數百年為郡者經㡬何人而卒未有能為之者大抵施小惠者以民勞為辭恤浮議者以公費為解而君獨奮然以興利除害為任而他無所顧忌故能保成功而開永圖是誠不可以無述也復蘭亭記陳鶴蘭亭在吾越蘭渚之上實晉賢之遺勝世遠人遐棟宇頺落址亦榛蔓曲澗雖存又非昔時觴咏所也余每探其跡俯仰上下悵焉興嗟因簡毘陵唐太史請倡其事不報值呉江法曹沈公出守吾郡之明年迺于袁推府燕次吿之公博學好古一聞余言即愜然于懷舉廢存遺直以己任于是與余入山遍索其蹟偶于畎畆之中得其故地遂各捐俸搆亭復舊制増新流嘉林載茂名山益崇清湍仍激于左右惠風不减乎疇昔余乃從公登亭上流觴而咏焉山川不殊人物非故髙懷逸調僅存石中之言而人不可作矣嗟夫内史在永和以清真之才振文倡㑹一時宦路之賢應響而聚山僧遺老咸能奔走其間遂為一代之髙士惜乎止于觴咏而已爾設使出所藴之學内確性情外籌世務互諏治道縈紆經濟之事代相模尚永埀諸士之賢則其亭豈得與榛蔓同腐哉所頼芳詞絶翰流播人寰若寶金玉故遐荒異域至今猶傳山隂修禊事也奈何人風漸移情興亦改雖衣冠接踵鮮有及于兹者公以良才撫越不奪民力一旦亭于椔翳之間四方覽古之人始得有所曕止豈山之靈必俟其人而啟之歟或者天道進退物理廢興亦固然也其亭公新之越民樂之人遊之後世稱之則公之遇斯亭也亦幸矣重築髙家堰記李春芳高家堰者在山陽西北四十里剏自漢陳登所以障淮也至我朝黄河由壽厯潁循淮而㑹于清河口繼由孫家渡趙皮寨渦而㑹于清河口以故髙家堰愈益重陳恭襄瑄則増築之乃其後黄河由飛雲橋出小浮橋循徐邳而下司水諸臣遂無復事髙家堰以是堰日頺頻年以來黄河分流入渦而故所行道若桃源清河口多壅閼水不得盡歸海稍溢則滅堰直入髙寳於是淮南北並䝉河患矣主上宵旰九重思得大臣有才畧能治水者乃簡命江公總漕政潘公任河漕相與協理河道潘公至行河遡小浮橋復浮淮觀於海口巡覽地宜採納羣議遂決筴以築髙家堰為首務江公同心運謀力賛之於是瓜分其工部署百執事計帑以請上賜温㫖褒答盡如兩公議時有司道生異議中朝斥之潘乃得展布無中沮是時恭襄舊堰若上堰下堰猶參差可指見若中堰則湯恩口羊六口具滿口大澗口為崩浪所前洗日深先是總漕王公者亦嘗修築之以公帑告匱卑薄善崩當事者遂謂堰不可築又以中堰深不易築也潘公則以中堰屬郎中張君譽指揮俞尚志諸葛堯賓宋大斌率鋭士以從以戊寅五月某日到堰所是夜諸口塞且半明日㫁流又明日堰合㑹六月霖雨至七月不止風濤自西來洶洶如山而新堰復圮八月水落視諸所塞口皆決且深矣衆謂堰必内徙乃可成潘公謂中堰深者不過三十丈耳如内徙則益深且遠至數十里舍近易役遠囏非便計也又外増數十里風濤撞擊堰將益危於是堅舊堰之議申命文武之屬分督中堰諸決口卒之數日而塞諸決口惟大澗口最深傳云鼉窟于是夜風雨中果聞鼉鳴塞決以埽每置一埽則潘公立埽上以其故埽堅鞏昔者諸決口既塞而河淮合流趨海勢雄鉅漂駛清口之沙積數十年莫能濬者盡滌海口之沙自開衆始嘖嘖謂髙家堰所宜築築之晚矣於是愈益集繇夫増培之至冬繇夫手足皸􅏿褁創而作潘公亦衝冐風雪暴露堰上與繇夫同辛苦至春大風雨潘公則乂與百執事徃來泥淖中飛濤撲面矻矻不少休蓋潘公急於王事不特以身示勸也乃以已夘某月日落成堰髙一丈五尺厚五丈基厚十五丈大澗口則為月堰廣三十丈堰外有田去湖尚遠堰形沿湖曲折水自西而東直衝六羊堰西轉復東犯貝溝堰自貝溝而西湖水浩淼撞大澗堰特險其次衝湯恩堰乃於諸堰宻布樁入地深浪不能撼樁内置版版内置土土則致自遠皆堅實者又創公宇堰上以弭使節為大使㕔設大使一員弓兵百名以守為舖舍若干老人八名夫千名以修又議嵗費著為例云堰成兩公以聞上大悦各賜彩衣二襲白金三十兩加賜潘公豸緋以旌特勩諸臣賞有差兩公以堰内田出流民即歸貧不能耕於是上請破格優兩淮貧民又巡漕御史陳公亦具疏以請上允其請萬厯六年以前逋盡蠲七年以後其議免淮人烝烝吐氣矣余家興化蓋患水尤甚今得覩平成之績安於田里有厚幸焉淮守宋君伯華山陽令魯君錦屬余為記余嘗觀漢武之世河決瓠子以萬乘之力躬自臨河沈馬璧令羣臣從官皆負薪塞之不免悼功之不就乃為瓠子之歌千載之下詠之猶可想見其時之難也惟是聖天子剛明獨㫁委任得人兩督府視飢溺由已協心幹濟斯功之所由成耳是安可不紀其事以垂示萬䙫江公名一麟婺源人癸丑進士潘公名季馴烏程人庚戌進士其董衆作治則郎中張譽新建人其與勞堰事者則主事陳瑛莆田人叅政游季勲豐城人副使張純漳浦人都司俞尚志仁和人把總諸葛堯賓丹徒人宋大斌徳州人指揮胡一道山陽人至於經理一切則淮守益都宋伯華而隨事輒辦則前山陽令朝希舜署山陽安東令象山史遷今山陽令某地魯錦清河令興國石子璞若山陽主簿胡大濟呉一道亦與效馳驅者也灋得備書重建煙雨樓記李春芳嘉禾舊有煙雨樓嵗深圮廢乃其守左山趙君惻焉曰是不可以不復也相城之南馬塲湖空棄可塞㑹濬河積土充市運而實之不旬日而窪者已崇可四五丈許廣可十七八丈搆樓其上凡五楹繚以垣圍蒔以桃李軒牖洞豁而一覽嘉禾可盡也仍其名曰煙雨夫嘉禾三呉奥區山泉佳麗草樹蓊欝當其煙雨空濛天地變色氤氤氲氲不可識辨雖胥豐長墻若竹望雲碁列四峙而亦潛形匿崿黯乎難别信哉宇内一大觀也然斯時也政通刑平時和嵗登百姓恬熙四境清宴桀黠不縱村壕不驚民有挾纊之温野無向隅之泣為民父母者固可引觴相慶也雖若許明府之從容對奕令狐挺之吟盡江南亦豈為逸豫哉使政刑多舛恩澤不下鷹鸇峻擊鳥兎奔逸瘡痍呻吟達於四境當斯時也則天地㝠晦適以増愴其能以帖然乎然則斯樓信不可以不復也雖然天地之氣氛而為雲沛而為雨以時而降則潤澤茂鬯萬物露生不以時則為充為溢民且病之矣故人之心一也顯為政刑以其道則民安不以道則民危其何以異於是繼是而登者宜有以動深長思矣此太守之所以拳拳也太守名瀛字文海號左山樓方落即擢山西憲副乃命其屬秀水令予同年方君某嘉興縣丞予業師丁某走信使于都下而予遂不能以不文辭是役也太守主之而襄之者則郡判陳君守義閻君大詳汪君伊節推姜君文序新鑿瀧路記歐陽鐸桐栢水入溱逕臨武縣西是為武溪溪東南流與黄冷水合入藍豪山崖嶨峻岨交柯雲蔚懸湍自中㵼逥注噴薄是為瀧水皆當樂昌西界漢太守周昕疏鑿之始通舟楫然東西陟絶不可駐足無他道可逥避舟行飛沬中稍失尺寸即顛覆如敗葉過者徃徃恨世無復若周侯者潁川符君宜臣初判韶知民間苦瀧水為沴滇水次之而路尤衝嘗請治滇未竟事遷去又十年來守卒棧魚臺如志于是士民復以六瀧請者㑹田方伯某亦至自樂昌言之色動且曰太守棧滇峽甚善奈何舍瀧遺士民憂君辭不敢退而以問樂之耆老若士咸無謂可者曰此殆未之熟慮耳路將軍時豈不可為瀧船乳源驛置詎知後梅嶺尤便邪吾不能自為之黄善者治滇效可再使之因召而來告之曰吾欲闢路六瀧上舟從瀧則人從陸庶㡬有完理善諾而徃數日報曰可為也與之百金蓋兩月而六瀧平君視之曰可矣而未盡也若自樂邑城西開道底于羅渡則八十里之險皆平地矣乃選鄉民習知山逕可與知利病者得二人焉曰鄧富春曰李隆各擇數人副之授以意徃邑士人亦感動相與訪究卒得要領具圖帖而來君覆度之可乃發閒役募匠石鋤土山鑿石山梁谿谷廣昃徑路窮則濟水兩岸互行蓋自縣城西由北岸至大延上五十里為期門渡而北由期門三十里為許灘渡而南舟皆官設于是行者相屬於道又慮夫孽伏其間請于督撫御史大夫蔡公經巡按御史姚君虞得即大延改建髙勝巡司以時譏之可無後悔矣樂令蘇瀾氏以予嘗視學過其邑而樂人駱堯知舊知名鄧子魯時為諸生因之告成夫有司之職在興民利而除其害因天任地廣哉不費矣鑿渠紓泓築圩累堰則猶與民勞之也鑿瀧棧峽去農時遠然橋梁道路莫非王政貿遷有無化居亦樂人之頼也而况及於四方乎路將軍抉南粤門户微周府君則猶閉之也六瀧底治水陸並行彼其視粤直東西出入間耳雖然仁不足與愛知不足與謀公不足與受明不足與㫁蓋亦難乎其成矣嗚呼獨治瀧為然哉石阡途記萬士和自鎮遠至石阡為里者百四十路瀨居其中其南北坡深林奥苗盗出沒人烟絶少行旅多恐守巡即其地築過客之館又徙熟苗之散居者數家於館後招川民之流移者處其左右鬻酒漿以飯宿所徃來者稍資其守望之力過客恃以無警戊午季春余以考校事至其地發鎮遠值天霧露上下於雲氣中抵暮宿公館雷雨大作山嶽震動翼日至石阡兩日間顛頓於山谷谿磵者不知其數其有名於路瀬南者為思南坡為大小金鵬坡為大小茶園坡其曰路瀨坡者則陟絶而不可步者也其有名於路瀨北者為木根坡為馬騌嶺為大地方嶺木根與路瀨相對髙險畧同其曰爛泥山者則深骨而沒足者也余既冐雨在途憫輿人之痡去車就騎當夫策馬層巔路徑可三四尺一線外即飛崖萬仭顧視其下魂悸魄動其遇泥深滑處有一竅可閣足則人馬顧之皆喜其最峻處跨四五尺纔得一步馬足或交不能開開不能収自上就下勢如轉丸崢嶸不止余所乘馬疲退墮數步以前足蹶而止余汗沾背幸得脱焉其石之峭然壁立者出乎其傍勢如傾壓杈枒森列者履乎其上如虎豹露齒作嚙人状遠望林木邃宻人跡不至則猴猿猛獸攀縁號嘯於其間此遠臣覊旅離鄉去國登髙極目而興悲者也然當其山腰雲潤雨過翠落峻坂既下暫即安舒如底平鐵厰左右可桑可田異境不㫁其河下山一帶皆竒峰近水石如荘嚴峭㧞幽絶水自包溪流出曲折百轉石亦隨之縁源己窮忽得谿處又桃李梨花散漫山谷若綺霞霜雪平生見花無此多者夫其雲山明媚花木燦爛此种放觀之而不窮龎公住之而忘返漁郎逐之而迷處者也人特以遠臣覊旅之懷遇之不覺其勝耳余樂之欣然若有㑹意且不復知有人世又何有離鄉去國之嘆哉雖然余之樂亦因物也不記其懸崖萬仞魂悸魄動馬倒險途流汗浹背者乎夫倐而雲倐而雨倐而險倐而夷天地之變吾既得觀於反掌之間倐而恐倐而喜吾心之變其轉換於一日之中者亦屢矣蘇子曰自其不變者觀之則物與我皆無盡也然則天地與我其不變者必有在矣吾惡足以知之明文海卷三百八十三
