body:
  text: 明文海巻三百八十七餘姚黄宗羲編傳一名臣葉伯巨鄭士利傳方孝孺葉伯巨字居升寧海東蒼里人也好讀書年二十餘有名於鄉黨選為縣學弟子員善説禮凡朋友有昏䘮必禮相之為人耿介不能藏人短見人不善立折之不頋其喜怒人知其無它終亦不恨也以年長通經術陞入太學未乆詔諸生分教河北子弟伯巨得平遥縣待諸生如子諸生亦愛之如父兄洪武九年星變下詔求言伯巨曰今天下有三事最切其二事易見而為患小其一事難知而為患大此三者積於吾心乆矣縱不求吾猶将言之况有明詔乎即為書言三事曰分封太侈也求治太急也用刑太煩也今四方平矣民庶思治矣而不務以寛厚御之視誅殺人如㓕螻蟻使民不獲安息欲以圖治難矣夫圖治於亂世之餘猶理絲於棼亂之後緩之則端緒可得欲速則膠結而不可理今病民之不安奸邪不止朝夕異令賞罸不凖君勞於上臣困於下治烏可致乎此二者人皆知其不可然非敗之根也所謂分封太侈者天子畿内地止千里而燕秦晋楚踰千里之國以封年少未逹事之王無事則易驕佚有事則易僣亂此人所未知而臣所謂為患難見者也其語皆切直上大怒曰小子乃何敢踈間吾家骨肉我見之且心憤况使吾兒見之耶速取以來吾将手射之而啖其肉耳伯巨至丞相乗上喜乃敢奏詔繫刑曹問状瘐死獄中其同時言事有鄭士利士利字好義亦寧海人嘗為縣諸生其兄士原以儒薦為河南懐慶府同知遷湖廣按察司僉事士利因告於師去侍其兄逰學有名洪武九年天下考校錢榖䇿書空印事起凡主印吏及署字有名者皆逮繫御史獄獄凡數百人士利兄亦以河南時空印繫獄中天子方怒空印事以為欺罔行省言臣二十餘軰守令署印者皆欲置之死佐貳以下榜一百免死為軍逺方丞相大夫皆知空印者無它罪可恕莫敢諌士利獨歎曰上不知以為空印大罪誠得人言之上聖明寧有不悟懐欲言之適星變求言士利曰可矣既而讀詔有假公言私者罪之乆之士利曰吾所欲言者為天子殺無罪為可痛耳吾兄非主印者固當出需吾兄杖出乃言言吾死不恨其兄免死出士利乃為書數千言言數事而於空印事最詳其意以為誠欲深罪空印者恐奸吏得挾空印紙為文移以虐民耳臣以為文移必完印乃可今考校䇿書合两縫印非一印一紙之比縱得之亦不足用况不可得乎且錢榖之數府必合於省省必合於戸部其數誠不可懸斷預决必至户部而後定省府逺者去户部六七千里近者三四千里待䇿書既成而後用印則徃來之難非期年不可至故必先用印而後書此權宜之務所從來逺矣何足深罪且國家諸法必明示之天下而後罪犯法者以其知不可而故犯之也自立國以至於今未嘗有空印之律有司丞相不知其罪今一且捕而誅之則何以使受誅者甘心而無詞乎朝廷求賢士而置之庶位得之甚難位至於郡守者皆數十年所成就通逹㢘明之士非如草菅然可刈而復生也陛下奈何以不足罪之罪而壊足用之才乎臣竊為陛下痛惜之耳其書既成欲上者數矣而未决毎歸逆旅則閉門俛首而泣數日其兄子侍行者疑而問之曰何所苦乎士利曰吾有所自耳我以觸天子怒必受祸然殺我活餘人我更何恨遂持書詣丞相府士利短小容貎如常人見丞相禮頗倨丞相問何書士利曰吾将為天子言之丞相何問也丞相因御史大夫入奏上覧書大怒詔丞相大夫雜問誰教若為必有主謀者士利笑曰頋吾書可用與否如何耳且吾業已為國家言事自分受禍人誰為我謀乎辭卒不屈然猶輸作終身而竟殺空印者桂彦良傳史明古桂彦良者慈谿人也洪武中以文學為司經正字事懿文皇太子於東宫髙皇帝甚重之嘗呼為老桂而不名貴妃薨上詔皇大子服齊衰期杖太子曰在禮惟士為庻母服緦大夫以上為庻母則無服又公子為其母練冠麻衣縓縁既𦵏除之盖諸侯絶期以下無服諸侯之庻子雖為其母亦厭於嫡母不得伸其私故權為此制也然則諸侯之世子不為庻母服也明矣今陛下貴為天子臣雖不肖地居嫡長幸得備位儲副而為庻母服期非所以敬宗廟明正體重繼世也上必欲太子服之太子終不奉詔上怒顧取劍太子走上逐之羣臣震讋皆不知所為彦良當前跪抱上泣曰陛下之於太子愛之深故責之重也上為之止彦良乃追太子及之諫曰貴妃逮事至尊殿下當縁君父之情為之制服不可執小禮以虧大孝也因持衰衣之太子不得已乃拜以謝上怒解擲劍於地曰老桂爾今日竟能和朕父子者矣上嘗詠科斗詩曰池上㸔科斗分明古篆文詔彦良足成之彦良頓首曰只因藏水底秦火不能焚上悦彦良後遷晋府右傅致仕卒周憲使傳黄佐周志新字日新南海人文皇帝嘗呼為周新因改焉而以志新為字洪武已邜舉於鄉筮仕大理寺評事毎有疑獄一言而白壬午拜監察御史弹劾敢言貴戚畏之目為冷靣寒鐡京師中或怖小兒輙曰冷靣寒鐵公來皆匿永樂元年廵按福建奏言朝廷設立軍民諸司彼此頡頏兩非統屬令都司所轄各衛每府官過門或遇諸途輙怒府官不下馬甚致鞭辱僕𨽻衛所公務徑行有司理辨稍不從即呵責吏典請自今府衛相見行平禮遇諸途則分道而行所有公務不許徑行府縣有司官吏毋得凌辱遇聖節正旦冬至在外衛所悉於府署行禮開讀詔書雖邉海衛所亦從布政司差人都司毋與上悉從之二年廵按北京時制令所屬吏民有犯徒流者免罪就發北京民稀處種田監候詳擬往復數月多死獄中新奏請今後死罪及職官有犯詳擬待報其吏民犯徒流者悉從北京行部或廵按詳允就發種田如此則下無淹滯之患上不負寛恤之恩上諭都察院官曰御史言是也且命北京百姓有犯應决者許其收贖燕民大悦三年九月擢雲南按察司未赴有㫖改浙江有寃民淹繫聞之喜曰冷靣寒鐵公來也吾無患矣乃至洗其寃放之自是異政日多一日視篆忽旋風吹異葉至前左右言城中無此木獨一僧寺有之去城差逺新悟曰此必寺僧殺人埋其下也寃魂報我矣發之得婦人屍人稱為神明一巨商逺還未抵家而日暮恐孤行為人所圖潜以其貲置一祠石下至家妻問之告以故明日求之無有也往訴之新新曰必是爾妻有外遇也覆之果然盖歸語妻時摟之者竊聼先往取之矣遂并治之有訴争雨傘者甲曰我傘乙曰我傘也彼奪之所言記騐皆同新命剖之各持其半去隂遣人尾其後甲曰我始欲助汝傘價之半得非汝利也乙荅曰傘本我物寧能低價屬汝於是甲就縛正其罪燭奸類此境中有虎害為文告城隍湏臾得虎格殺之初往浙道上蝇蚋迎馬而聚尾之見一暴屍惟小木布印及至任令人市布得印誌同者鞫之乃刼布商賊也悉以其賍召布商家給之家人大驚始知其死於賊也它如辦豆獲盗人皆服之其除暴類如此會夏秋潦窪田盡没永樂九年湖洲府無徴糧米一十七萬二千四百餘石所司一槩催徴民日逃亡奏乞遣官覆騐上即命戸部覆實蠲免嘗廵屬縣微服觸縣官收繫獄中與囚語遂知一縣疾苦明日往迓乃自獄出縣官恐懼伏謝竟以罪去由是諸郡邑吏聞風股栗莫敢恣肆錢塘知縣葉宗行號亷能嘗偵之入其居無長物惟笠澤魚腊一束其家所寄者也袖少許以出明日召飲出示葉葉益砥礪號錢塘一葉清後卒於任為文往祭哭之甚哀其旌别淑慝類此寮宷一日餽以鵞炙懸於室後有遺者指示之新未顯時其妻治耨以給及同官内燕荆釵布裙以往大類田野婦各相慚恧更為澹素其亷介類此故當是時周憲使之名震天下澤及無告民自不寃雖三尺童子皆誦其美焉初錦衣衛指揮紀綱用事使千戸往浙緝事多作威福受吏賕新時進湏知如京師遇諸涿州捕繫之千戸脱走訴於綱綱乃更誣奏新上怒令馳馬逮新承綱意者榜掠無全膚既至伏陛前猶抗聲曰按察司行事與在内都察院同陛下所詔也臣奉詔擒奸惡奈何罪臣臣死且不憾上愈怒命戮之臨刑大呼曰生為直臣死當作直鬼他日顧問侍臣曰周新何許人對曰廣東上嘆曰廣東乃有此好人耶柱殺之矣後紀綱以罪誅事益白新既不禄其妻獨挈遺衣及書數卷歸廣貧居如洗然都御史楊信民廵撫時存問其家周以月俸嘗語人周志新當代第一人吾黨所未及也新無子景泰初其妻卒於家浙人在廣東藩臬皆會𦵏云贊曰嗚呼新之死於紀綱也誠可哀也哉律身之亷臨政之明洗寃澤物之仁與夫持風裁臨患難之直而不撓可謂剛且大也語曰直木先伐又曰物忌芳潔其新之謂與同里彭森傳其行曰公發奸擿伏有廣漢風而宋有鐡靣御史公似過之擬人於其倫矣又曰被刑之夕司天奏文星墜上以是悔自後見一人衣紅立日中呵之問為誰曰臣周新也上帝以臣剛直命為城隍為陛下治奸臣貪吏言已不見天顔憮然嗚呼豈其然乎豈亦鄭伯有魏元徽之比乎近世劉球毛吉為奸盗所殺嘗附魂於人傳者亦著其説夫何疑於新乎要之新之清風勁節固不待於此而自可傳於不冺也愧齋先生傳王鏊愧齋先生陳姓音名字師召福建莆田人為人古貎古心於世故細碎米鹽筐篋殊若無所幅尺遇人無貴賤賢愚輙傾盡小事無可不可輙曰也罷人戲稱為也罷先生又稱愧齋先生居官三十餘年頽然而已胸中是非輕重涇渭甚辨與人交際錙銖不􅐩遇大事有不可必如其志自羅倫王徽等貶斥中外結舌以言為諱先生為編修上䟽曰竊見近年災異屢見雨晹愆期翰林論思之地也臣敢不竭其愚臣觀春秋二時陛下雖開御筵以講聖學然勢分尊嚴上有所疑未嘗問下有所見不敢陳顧于退朝之暇擇一二儒臣有學行者引對便殿少霽天威有疑輙問務使聖心渙然而止方今人才日降言路日塞異端日熾宜召還致仕吏部尚書李秉修撰羅倫編修張元禎評事章懋給事中王徽舉人陳憲章置之䑓諫革去法王佛子真人位號禁止創建寺觀則正人用言路開妖妄息不報司禮監王賜母死省寺監院無弗弔祭翰林獨未之諧也一日徐侍講瓊言於衆曰時且如此獨得不往乎衆或應或默先生忽奮然大怒作而言曰堂堂翰林相率而拜内臣之門天下其謂何斯文其謂何詞氣憤激聲淚俱下於是言者大沮事遂己汪直之在西厰也氣㷔烜赫出沒如鬼神一日有校士突入兵部郎楊仕偉家收縛仕偉拷掠及其妻屬衆駭莫敢闖焉先生其隣也登墉呵之曰爾何人敢爾不畏國法其人曰爾何人敢不畏西厰先生曰爾欲知我乎我翰林侍講陳某也聞者為之縮頸劉文穆之起復也先生自南京與書止之文穆不悦其後當路有缺吏部擬先生文穆輙沮曰某腐儒也不可用先生由進士為庻吉士授編修進侍講擢南京太常寺少卿九年乃進卿云先生為文典實有理致尤邃於經學四方舉子質經者填門塞坐得一語人人各厭其意中外顯仕多出門下者太史公曰語有之仁者必有勇勇者不必有仁信哉余觀愧齋先生平居恂恂語若不出口至其䟽時事叱邏卒排衆議何其壯也於戲其所謂篤行君子者乎太傅王文恪公傳文徴明公名鏊字濟之世稱守谿先生呉洞庭山人也其先有百八者自汴京扈宋南渡遂居山中至是族屬衍大號其地為王巷其初未有仕者正統間有司選生徒𨽻學官里中子弟咸走匿公父朝用獨請入學為弟子員後仕為光化知縣光化未仕時公己有名年十八随光化在太學聲稱益藉時葉文莊在禮部召與相見公體幹纎弱而内藴精明舉止静重文莊大竒之挑試所學益以為非近時經生所能時王忠肅公翺新逝文莊以公嫌名相近戲曰失一王某復一王某安知非後來忠肅乎越日親具儀帛遣從陳音先生學時陳官翰林有聲從游者衆獨許公善學無㡬盡得其肯綮成化戊子將歸試應天文莊欲留卒業不果意甚惜之曰科目不足以挽子也既歸補郡學生一再試不利而文名日益起甲午遂以第一人薦明年試禮部復第一廷試以第一甲第三人及第時制䇿以教養為問公舉周書無逸易之自强不息以對大要言保治在勤勤在教養偹教養偹而王道成矣反覆數千言皆當時利害人所難言者時承平乆朝廷頗怠於政故公以是為言之激而直當國者惡之假以冗長不可讀欲抑置次甲尹恭簡為冡宰不可曰朝廷䇿士取其能言言而抑之豈臨軒之意乎因力争得賜及第遂入翰林為編修時文莊已逝陳先生者方為編修遂與同列一時以為盛事九年陞侍講洪治初充經筵展書官尋充講官毎進講必分天理人欲君子小人至治亂用舍之際必反覆開導務禆時政時中官李廣用事公隠然有所指陳上退謂左右曰若知今日講官之意乎大抵謂廣也方春上出遊後苑公講文王盤於游田詞嚴意暢上為竦聽自是絶不復出修憲廟實録成進右春坊右諭徳尋進侍講學士充經筵日講官武宗出閣進兼左春坊左諭徳再陞詹事府少詹事兼侍讀學士𢎞治甲子陞吏部左侍郎初李廣得幸於上朝士或附麗取寵廣敗賍賄狼藉大臣多被玷汚惟公絶無一蹟夀寧侯貧賤時與公有連比貴方凴藉用事勢傾中外公絶不與通嵗時問遺亦輙麾去或者以為過公曰昔萬循吉攀附昭徳吾竊耻之今乃自蹈之耶盖公入朝至是三十年砥節履方不少骩骳一時士論翕然向之孝考末年勵精為治遂用為吏部且有爰立之漸㑹公以憂去而仙馭亦遂賔天矣武宗登極復起為吏部侍郎修孝廟實録充副總裁時上冲年頗事逸逰中官馬永成等八人實從中導誘給事中陶諧劉􅉅首上䟽論之己而諸諫官相次論列中外洶洶而大臣未有言者公言於戸部尚書韓文此國家大事治亂所闗大臣百寮師率獨無一言救正乎于是六部相率會䟽以請凡會䟽必推一人官尊者屬草時焦芳在吏部曰吾聞大臣格君心之非不聞議其用人行政之失其意盖不欲居首也公以語韓韓遂奪筆具䟽言上踐阼之始不宜狎妮羣小逰燕無度因罪狀八人請逐去之䟽入上大怒召諸大臣至左順門中官宣㫖詰責因言八人事上乆不忍遽逐之意時聖怒叵測衆相視莫敢言公獨進曰今日之舉正為八人八人者實蠱聖心不去將亂天下韓公亦從而言之上知衆意不回將有處分會内閣大臣欲寘八人于理八人者環泣上前抱足乞命事遂中變于是大學士劉健謝遷相繼去國而文亦以罪去八人遂分布要路瑾居中用事而天下事權悉屬之矣公時被命與焦芳入閣辦事初瑾用事芳實首附之劉謝既去芳欲得其位顧公譽望出已上而一時輿論又皆屬公遂與芳並命然公僅以本官兼翰林學士仍班尚書後上顧見問得其故遂進户部尚書兼文淵閣大學士國史總裁同知經筵事尋加少傅進兼太子太傳武英殿大學士時瑾日益驕横疾視文臣如仇所尤惡者大學士謝遷兵部尚書劉大夏户部尚書韓文韓既去瑾必欲殺之百方詗伺既無所得而意猶恨之公衆中大言韓文清忠粹徳朝野所知萬一死非其罪天下後世謂何後竟釋不問雖瑾自畏公議亦昌言有以讋之也劉在廣西嘗變置土官岑氏至是致仕家居自華容逮去至坐以激變當死公曰所謂激變激之使叛或縁是致地方失守也今地方無虞岑氏守職如故何名激變劉得减死先是有司奉詔舉經明行修之士及是舉至悉皆餘姚人事在謝當國時瑾謂謝私其鄉人摭以為罪亦以公言得釋郎中張瑋等咸以微服荷百觔重校暴烈日中瀕死不貸公亟言于朝謂士可殺不可辱今既辱之又殺之極矣吾等何顔復立于此遂與大學士李東陽上䟽極言得貸死戍邉他如免逋戍連坐之法正廢后呉氏及景皇妃汪氏喪塟之禮雖與李恊議而公從臾賛决為多時内閣舊臣惟李一人又多卧病不出芳既與瑾合一意迎附又隂賊喜中傷善類惟公時時正言折其奸謀一時中外咸恃頼之然用事積迕瑾意瑾雖無意斥公而公不可留矣會所言不合遂堅䟽乞去䟽三上得請詔有司給餘禄終身仍賜璽書馳傳以歸歸二年而瑾敗時公年齒方壯海内咸冀公復起而公優游林泉方以文學自適不復有意當世中外臣僚數有論薦亦皆報罷於是公閒居十有六年年七十有五矣嘉靖三年甲申三月十一日以疾卒於家訃聞上為輟視朝一日追贈太傅謚文恪賻米若干石布若干匹詔工部遣官營塟自始卒至塟賜諭祭者九公歴官自編修十有二遷至少傅兼太子太傅階自文林郎至光禄大夫勲柱國贈其曾祖伯英祖惟道父朝用皆光禄大夫柱國太傅兼太子太傅户部尚書武英殿大學士曾祖妣祖妣妣俱一品夫人娶吳氏張氏俱累贈一品夫人子男四人延誥大理寺寺副延素南京中軍都督府經歴延陵中書舍人延昭郡學生女五人適吏侍郎徐縉貴州都司都事朱希召宜興縣學生邵鑾中書舍人靳懋仁郡學生嚴濡公為人敦悃静謐于世寡與而能以道自勝初性恇怯一日讀程子明理可以治懼之言恍然有得曰在我者有理在天者有命吾何畏乎哉自是剛果自信遇事直前無少係吝雖勢利在前不為屈折植志髙明下視流俗莫有當其意者與人處不為翕翕熱而黙然之間意已獨至平生未嘗干人以私人亦不敢以私意干之立朝四十年權門利路不一錯足班資上下未嘗出口毎進官輙遜避不敢當晚益韜歛以踰越為戒今上入正大統首賜璽書遣行人存問同時大臣被賜者遣子弟入謝即授中書舍人公不可曰吾在閣日淺沗竊已多豈可更此儌冐遂自逓中入䟽有㫖特官一子中書舍人力辭不允公卒後乃卒授之好學專精不為事奪少工舉子文既連㨗魁選文名一日傳天下程文四出士争傳録以為式公嘆曰是足為吾學耶及官翰林遂肆力羣經下逮子史百家之言莫不貫總嘗言伏羲畫卦文王繫辭周公爻辭共為二篇謂之正經孔子翼以上下彖傳繋辭傳文言傳説卦傳共為十篇謂之十翼其後商瞿梁丘賀分上下二翼于各卦之下鄭康成移文言于乾坤二卦之後王弼又移彖傳于各卦之後經此三變而經與翼辭非復易之舊矣詩之小序序所以作者之義朱子一切刪去自諷其詩而為之説固為卓見但古人作詩必自有題借使亡焉國史取之亦必著其所自不然千古之下安知其微意所在毛鄭泥於小序宛轉附合多取言外之意不為無失而朱子不泥序説獨味詩之本㫖恐亦未為得也又言朱子以鄭聲淫之一言遂致疑于鄭衛多指為淫奔之詩然季子觀周樂為之歌衛曰美哉淵乎歌鄭曰美哉其細已甚夫鄭衛既皆淫詩何季子皆曰羙哉於鄭雖譏其細而亦未嘗及其淫也又言諸經惟禮最為繁亂朱子嘗欲以儀禮為經以禮記為傳經傳相從庻成全書然而未暇也其後呉草廬遂各以其類相附如以冠義附士冠禮婚義附士婚禮之類是矣然其中不可附者固無如之何也朱子晚年著儀禮經傳始家禮次鄉次學次邦國次王朝秩然有序可舉而行然其間襍引大戴禮春秋内外傳及新叙孔叢子之流雜合成之乃自為一書非所以釋經也至於周禮雖皆經世大典而其間亦有可疑者冢宰掌邦治正百官其職也何宫禁婦寺之屬獸人􅈄人之屬皆在而天府外大小内外史乃屬之春官司徒掌邦教而分掌郊里征歛財賦紀綱管鑰何以謂之教職方氏形方氏述師之屬豈得歸之司馬大小行人之職豈得歸之春官又甚若夷𨽻掌鳥言貉𨽻掌獸言庻氏以嘉草攻毒蟲硩蔟氏覆天鳥之巢之類是何𤨏屑之甚亦豈必盡可用耶其論春秋王正獲麟尤極精詳他書論説尤多每言六經淵㣲不可妄議漢儒傳註雖未盡聖經微㫖而專門名家各有授受自宋儒性理之學行而漢儒之説盡廢然其中要有不可廢者盖公每潜心質義必深竟顛末務其要不肯茍同于俗如此為文淵宏博贍而意必已出時翰林以文名者呉文定公寛李文正公東陽皆傑然妙一世公稍後出而實相曹耦議者謂公于經術為深故粹然一出於正晚益精詣鑄詞發藻必先秦兩漢為法在唐亦惟二三名家耳宋以下若所不屑其見諸論撰莫不典則雅馴麗質兼偹至所得意不知于古人何如也惟公之學本欲見之行事屬以記載為職周旋于文詞翰墨之間者三十年未嘗有兵民錢榖之寄時或因事一見而其髙才卓識亦自有不可得而揜者𢎞治末火篩冦邉上偹邉八議正徳初論時政四事會去國不果今上登極復進講學親政二篇其他所著如國猷如食貨如儗辠言如教太子皆卓然經世逺圖惜乎不䆒厥用晚雖邂逅一奮而適丁時艱正言危行㡬以身殉盖方救過之不暇又奚能有為哉及今聖天子圖治方切求賢如不及而公則既老而逝矣嗚呼豈天不欲斯道之行邪抑人事之罪邪方正徳之初故老相繼去國天下事未有所付而公又以正去於己則得矣其如天下何故有隠忍以就功名者君子與之然自今日觀之果孰多少哉嗚呼人臣之義要當出于正也毅齋王公小傳羅洪先正徳間逆瑾僣禮威虐搢紳中稍懐耻者鮮不見忤得禍而先大夫在武選以事不闗白㡬就逮余每聞人談瑾事輙恨當時大臣不能相正則已反蒲伏乞哀門下思假其勢以自便是禍搢紳者不在瑾而在此數人也然瑾得肆威虐大抵得藉口祖宗之法以持人長短使大臣各思自盡無所缺失不得其職則斷斷相諍繼之以去瑾雖兇悍烏能累犯衆難哉及讀象山王君子長所撰毅齋公墓誌始知余言未至也公嘗為御史連上䟽指斥時事被杖朝堂除名既歸猶以他事論輸邉其䟽有曰捄亂之道貴防於未然及其已成噬臍何及漢之黨錮唐之甘露之變其所由來豈一朝一夕之故哉於戲可謂至論矣瑾之勢至是已成而公云云者盖自盡其職不復虞其禍之及也瑾伏誅諸謫徙者皆復起當道銜公故嘗直已竟抑不用於戲用不用於公何與吾獨念瑾未振而縱其萌惡瑾已敗而幸其餘威者不知凡㡬人矣而率逃於後死之誅則是可恨也説者多咎韓忠定伏闕之請不行為縱瑾之漸夫㡬事不宻韓或有之至於淺露取媚以致報復相尋者誰歟然竟為時名碩老死牖下一時被禍之人妻孥流離道路困厄病餓隕絶於瘴烟荒塞之外言之使人掩泣拊心不下於黨錮甘露之惨則公為幸多矣彼其流離困阨既已不暇他顧而病餓殞絶於遐方者又倉卒于嚴禁之時其多湮没無聞何疑也而公有子子長能暴白行事于既往使不肖亦得以欷歔感嘅于數十年之後方思追戮始禍者以為後鑒則直道豈必盡屈而逃刑者顧可乆恃哉子長慷慨自許必不辱公余與之相厚善故傳其事補史文之闕公名渙字時霖𢎞治丙辰進士初令長樂有善政為御史所上諸䟽皆可誦生七子而挺最顯即子長云張簡肅公傳羅洪先國家當盛治之時必有維持培植之人生乎其間其博厚純實剛介平恕若出於天性而不可己未嘗有矯戾眩餙纎靡􅆭薄之態入於見聞是以朝廷刑賞簡當公議清明天下趨向咸歸一時君子恃之得以無恐譬之少壯之年元氣充滿起居以時嗜好有節自足以凝精而握固不待服食導引之外助嗚呼此其所係何如哉某數嵗有知聞先大夫與客談皆𢎞治時事且言當時六卿大臣江右有安成張公浮梁戴公二公行事酷類古人至若剛嚴難犯張公又其最也我朝廷在内閣士之始進以翰林為極選競進者率規計恐後公與華容劉公堅避不往且曰願就部曹習聞民事為國家建勲業甚幸没没徒老文字竊所耻也於是自兵部郎中出為浙湖両藩擢副都御史廵撫山陜進尚書都御史掌院事歴仕凡四十年所在咸有樹立搢紳之間倚以為重其後閹瑾用事憚公執法相尼一日假内降促令致仕公去而紀綱廢矣悲夫公致仕時瑾遣人道偵之禁假官舟且不得與有司見公乗敝艇至徐州洪觸石敗漏適先大夫以工部治洪夜且半聞扣署聲問之知為公也於是宻往慰勞時寒甚衣盡濡乃解裳治具相授鷄且鳴易所乗便舟以行臨發公嘅然曰吾受先帝厚恩恨莫能報頼君復生吾有孫當以今夕事語之必且遂吾志也先大夫灑泣而别後洪先既長見公孫御史鰲山詢其所聞於公良然御史者即公所指之孫也御史嘗為余言公初為郎中奉使畿内夜遇盗刼其嚢得俸銀㭍兩慚悔而去一日屠人告衙𨽻易公銀同官紿之曰焉知非張衙銀乎屠叩首曰張衙惟有俸銀以是知之是時為浙右轄尊貴家口衆矣日料肉止一斤公子以嵗乆來省體魁碩食兼數人公笑曰吾固慮汝不飽也尋遣歸楚中任滿庫羡金二萬餘公盡籍録之副在諸司歸見路夫人戯曰汝常笑我貧今羡二萬不已富乎自夫人侍公至是始聞戯言則為應曰得子孫無饑寒常如今日足矣於是相顧一笑公不獨在官無所私也即以小物餽遺亦必有義路夫人卒有以帨奠者公返其人御史從傍問故公曰帨以為奠知我亷矣不知帨非奠物也我故返之孟子曰身不行道不行於妻子觀夫人之言與其處子者益可信矣此至隠細者也當陜西用兵即有俘獲止以地方事入奏不為張大語故事兵部多幸外功冐恩賞銜公所為妨已數窘詰之竟不少變及督漕運入京諸閹用事者聞公名樂與結納因李西涯戴浮梁傅新喻三公通姓名復以名香為夀冀得往謝公固辭曰三公以公會故得朝夕某則不敢三公强之公不得己各報以幣使者纔入内城急追還曰㡬悞矣吾平生無内交忍一旦自敗乎其後劉公薦公於上上曰朕非不知張敷華但忒難為人耳公之處已若此然遇人無問善惡休戚相通不為峭厲山西鎮守閹人劉瑯以公不便已入賄于朝移之陜西及代者至相視無禮悔思至於泣下掌院當考察京朝官三山林公為吏部欲青汰鄙薄以厚風俗公於中獨多保全有坐帷簿謗者咸欲黜之公曰彼不幸而有遭非其罪也曷謫之使自勵嘗曰寧失不明無為不仁林公亦莫能奪瑾之害搢紳也多詗倉庾之虧以為奸贓公坐楚中耗粮三百石禍且不測翰林武功康公與髙陵吕公皆公賞識士也康恃瑾鄉里故以弄語調瑾曰公陜人也陜人愛張某如父母忍相薄耶瑾意始解其後吕與御史云然吕素鳴康之寃言之將以掲康也然公忠厚之報於是乃見夫喜功者易於矜而持正者近於刻公捐辭美秩視若贅疣切念一時意氣激發若可矯强至於功名之際不事表暴與人欵欵而自操之潔凛於氷霜非博厚純實剛介平恕迭用而不悖者烏足以語此古人有言人臣執法而不求情盡心而不近名出死力以捍社稷使天下之人心繫於一人而己不與公不其庻㡬乎宜其遭處聖明先資畢効以身許國逮擯斥而不悔也盖嘗因先大夫所論推之當𢎞治時朝廷之上未嘗無小人也雖其憚於公議限於刑賞欲亂君子之所為而不可得亦以君子者以其道相勝是以得乆於位稍行其言以遂其維持培植之力若公者是也彼狥俗以就功名之會委曲以拯時之艱斯人也吾莫得而詰矣惟任己者悻悻以自是皦皦以自異其始未嘗不藉口於公輩也然饑寒之慮或奪於妻孥利害之機或間于朋友賣直則訐隂細而忘大體好剛則觸㓙虐而啟釁端理不制欲之流誠不勝私之積内乏堅凝外無孚感卒之不免於矯戾眩餙纎靡惨薄之歸而小人相乗翻為鑒戒國家元氣因以摧傷若是者視公何哉使其有以自勝即不幸擯斥矣其於世豈竟無所補哉此余所以語公行事語若頌而不厭也御史所述皆志銘行狀所未載且憶先大夫遺言不敢忘忽竊縁世誼别為列傳抑亦備史闕文冀或風於君子云爾丘中丞傳王慎中嗚呼功之難立名之難成豈獨生才之難哉時變之隆汙而趨背異其得失人情之好惡而忤合乖于愛憎因時者其事便而見為尚通矯之則足以尊己而鮮濟于時忤衆者其名髙而見為寡偶狥之則足以同物而不嚴于衆夫其受材之禀既專致用之宜各適亦足以事副其功業載其名而時變人情之難一如彼故有智力足以因時而固矯之以求濟趣好足以同物而不忍狥焉以取嚴宜其収兩得之功博兼獲之名而猶不免于違時之咎憎衆之謗此魁磊閎逹之士所以常悼恨于功名之難也中丞邱集齋公名養浩字以義由易經起家為進士值今天子新即位盡更正徳以來弊政士大夫興幕風采争欲為材公於其時自視不獨在同軰上直以古人為不足為也賜第未乆即受牒知淛之餘姚縣餘姚于淛東西為最劇公為之績業奮起日升月長賢名四出無足而馳疆聞壌望或愧恚不及或傳講以相師勵不知邱餘姚為何如人大江以南部使者撫臣相語炙口至倡以激其部邑士大夫行過淛東西訪為吏之美者於其土必聞餘姚之名他令森立踊企非不見為賢皆掩於公聲翔於朝遲以為法從滿考召為試御史閲數月真拜方廷中清明侍從皆極一時之選公居其間如楚之在薪同臺多自以為不如令下當議事倚待决公必得聞雖入臺後而預政與宿舊臺僚等大夫中丞咨訪有加焉公卿多欲致公與相締投雅公汎如也不適為好與雅者尤愛而憚之時方清明而當柄大臣進退危疑繫國是得失士心趨向已潜有移奪化蘭為蕭㡬在忽焉公獨早覺不失足他徙羣公中有憂國救世持衡於消長之際冀以負為勝倚助臺中明于得失如公曉然不移者可一二數凛凛乎有寡助之嘆公亦以母䘮去職比起服入臺枋臣改置國更其是公瞿然内憂端居深念未有所發而公未憂去時嘗首論議禮大臣再論宦寺又論戚畹當事者忌其然不欲令乆處臺中公故有文名會南畿督學憲臣缺即奏以公往公亦樂得其事謹條教考藝文專意於作人興學自是不復預臺論矣及終父䘮再入臺臺僚多變易宿舊少存者因黙自悲欲乞外而臺資已髙於格不得外授上方蒐討古文建典禮於成周之上營立九廟務極曼碩以稱嚴祀制璽書畀公董其役乆之資益髙遷拜南京大理寺丞盖公在臺其去來逺近之跡淹十五年通其入仕之日殆二十餘年人旦暮望以為公卿公尤雅意本朝以天下善類消長為計其口誦心存未嘗一日不在於海内排擯放廢之名流惟恐其老死而不叙収甚於已之失位而咋舌决齒於怙權妨賢之夫如不欲與共立每一縱言目光横射意氣㨗出旁聽激竦頗以此取嫉特以前後所領職皆有制書専事視學董役有以黽竭自効得不以極言充責意氣雖過而怨怒未集知之者則信其果有志於世也為中丞廵撫西蜀則以權當其力欲變一時偷宴之風官司相蔽紿以具文而慮不及職持三尺法為市茍娱大室要津交以自肥而瘠民公惡之若仇又能窮其㣲瞹穴竇闗節探窒觧剥無毫髪遁失汚吏猾豪營搆巧秘徂伏鬼倐見摘皆驚謂神山谷遐深砦碉昧阻寃苦疾痛舉在目前戸行家到未喻其悉其所長如是諸司既已逆為公折詘公尤思震動恐聳之警其視聽而新其氣以作起功庸然後與為寛碩以樂其成非專以察㫁為嚴而愛不濟者也蜀人已害其不可動而公在西未乆功名迅發精采先於諸路時江西撫臣張净峰公擢總制兩廣朝論以張公名臣難其繼移公往代於是忌者始側目思中公而害者以流語乗間潛行公亦抗章求退以避之盖公在蜀其意未䆒其治未終而徒見為多威以宋張乖崖田元均之賢治蜀寛猛不同未聞論者優田劣張然張易嚴以寛必在民信之後而比民之信非前後八年不可雖其自言亦曰只一信字五年方得成公為蜀未期日月淺其所能變動者精采氣勢之間耳然以武侯論治次第求之則法行在恩加之首而知榮乃限定之餘公所施為正不為悖而獨執未䆒之意以訾偏㨿不終之治以疵猛是使仲尼子産未終三年而且用以得殺也習茍且養交私上下相玩之時不愛出力一矯之疾雷破蟄享昭蘓之快自是瑰瑋絶時不愧道説又不當論其䆒不䆒也公濶逹恢廓如無所擇而簡别精審細入曲折具有條理憂時憤事殆不可堪而器貎敦博無小丈夫悻悻之陋為文不䂓䂓古法才馳氣駕姿態俊發有以踰人晚善為詩歌藻澤腴贍聲韵平妥篇出皆可詠也其最長在奏對移駁之文指畫利病摘抉情偽元本法令縁飾以典訓使躬受者讋服側聆者省畏張公誡民集王公異斷今不得見度公所移駁當不慚也公天性篤至内行甚修事父孝謹有對則立有諫則跪不以既貴少有所懈事兄如父撫弟如子一門之内肅敬而和雍如也入室燕笑有則與夫人相敬不為嫚寢無飾容侍御之人其不邇於色非溺情焉而矯為制者於族婣厚有用情之過至於蒙謗而人知其仁之所存也今仕者往往毁其土之惡以自明所難公在餘姚深言其君子逹理可與慮善其小人明法而易以去非比入朝縣之士民至京師者必見公問起居安否曰吾賢父母也乆而益篤其在土飲食必尸祝公彌嚴於為縣時後令至未有所為民輙相語曰得如邱公無按山海關所薦士皆由伍中㧞起為名將而論留馬永一䟽尤有烈士之風在蜀以薦何卿被言者所衊然天下皆知公之言當也其在臺大獄起故相永嘉張公來視臺事巧者皆曲意媚之以求進用公與張公同年才名又張公所欲收嘗語公得君與我閲稿獄事濟矣公遜謝不能而已張公滋不悦公卒以憂去免己而附麗之者多至大官還臺視之漠如公嘗以言事一謫推官旋蒙召復一下詔獄未㡬得釋而意氣不少挫嗚呼可謂明於大義尚風節偉丈夫也始公受命赴蜀寓書於余有不俎豆張忠定之側非夫之語觀其詞㫖感淬將在前修林見素彭幸庵胡静庵諸名卿頡頏之列單車入棧志意慷慨有叱馭過坂之心何其壯也今其風烈雖著而緒業不竟談誦方顯而謗懟参半又可悲夫公殁余哭之哀其子維禎出公篋中故書予檢數十札皆京師貴人所與公札中亹亹皆美詞余謂維禎曰此皆不足為尊公重獨太史貞吉一札寂寞數語有云僕嘗揚言于人人使蜀中得借留集齋三年百姓瘳矣斯言僕與公皆可無愧也此札所言宜使當世知言之君子共記之耳維禎謹藏而録之公塟太史孫季泉公狀其事而半洲蔡可馬公銘其藏余於公最雅故獨論其意而傳之而銘狀所載皆不復出也明文海巻三百八十七
