body:
  text: 明文海巻三百九十六餘姚黄宗羲編傳十文苑三王仲房傳汪道昆余家食業已聞王仲房比釋事歸乃益相習王仲房者吾郡中俶儻人也父賈淮北納高氏姬舉仲房於淮仲房名寅命曰淮孺少年英氣勃勃自負具文武才時李獻吉居大梁以著作傾當世士而少林諸僧習兵杖則扁囤最精於是仲房馳一騎謁獻吉大梁會獻吉留闗中不至居大梁一月則之少林扁囤遂以其術授仲房什得五六及還歙補縣諸生顧獨攻古文詞不喜舉子業時處士程自邑從獻吉受詩詩名大起仲房則以自邑由獻吉重其人易高乃約客賦詩黄山白岳間仲房為約長郡中善詩者北面之太守余公入郡盖夙知仲房名將授室仲房遣其二子受業仲房不欲也謝曰毋在寅未能從公子游於是余公過仲房於家遺之金供母肉帛部使者劉公行縣試諸生詩得仲房乃大喜引居門下從劉公太平太平守請以郡没青山田餉仲房凡數百畝仲房不可終不以諸生困故受他縣人田乃著别青山賦留舍中竟拂衣去劉公聞之自喜曰存徳奈何從海内得王生將言王生於朝請得以布衣召用會劉遷去不果聞督學使者黄公合試七郡諸生則仲房舉首且超格授廪仲房固辭黄公笑曰此何辭他日洪毗上書願得超貢如嘉靖初法貢且及子會黄遷去又不果聞仲房歎曰人生駒隙耳奈何以是儻然者受命造化乎乃求異人冀得不死之藥然卒無騐而其家益貧海陽令林君急仲房屬邑中富人奉百金為夀明日仲房往謝卻其金令私語富人仲房義不受金為之置烝嘗之田十畝其後仲房棄諸生籍周游呉楚閩越名山逺覧冥搜不遺餘力得當意居旬月而後返不問家所至則縉紳大夫争致仲房惟恐不蔇而滁陽胡莊肅中都劉晋初廣陵朱子价晋人喬景叔齊人馮汝强馮汝言浙人蔡子木徐子興童元功方禹績蜀人毛元喜相結甚驩仲房獨出入諸沙門不喜就館榖即不自給務傾身振人之窮中年喜談禪習内典嘗執弟子禮禮古峯禪師長跪請曰寅往往遇異人無如師者師將安之師曰吾徧游海内五岳者三乃今將歴海外五岳而後出世仲房愈益嚮慕因自號十岳山人云及海上用岳仲房客督府尚書胡公所諸客率諂事督府仲房以諤諤獨聞督府多疏節又不納仲房言竟以敗仲房西入歙家猶故貧就里中營佛子軒好佛愈甚會隣省賊起數窺近闗仲房客項氏家卒聞警諸項皆走匿不者箕踞自如仲房誓之曰即賊乗夜至公家為墟第聚族為先聲毋自及也賊知有備乃引去頃之賊復起土人匿不以聞仲房馳書告有司屬郡從事縣簿二人部民兵往賊且近按兵不行仲房入軍中讓曰公等不扼賊於險逗遛里中脱賊踰嶺長驅是以險予敵也他日簿責公等其將何辭苐勒兵鼓行賊且望風卻矣從事簿皆曰善乃乗連嶺賊聞之卻如仲房言會浙兵追賊及之遂殱盡里人語曰山人故喜子房畫䇿乃字仲房使果在行間於緩急何有仲房笑曰非吾事也吾逃儒入老逃老入禪乃今無所逃矣汪道昆曰人言仲房才髙獨逹巷黨人猶有遺論夫名者實之賔也有道者逃焉古人不得志則龍蛇無用名矣世鮮知仲房者顧獨知仲房詩仲房嘗言知我者希則我者貴由是則可以成名而有不屑也雲邨許先生傳馮臯謨嘉靖初主上新政厲精省掖臣侍左右持橐簪筆㒺諱忌雲邨許公時給事兵科公故踔行負竒得益發舒嵗餘章上無慮十數其辭曰臣聞有功不賞有罪不誅雖唐虞不能治天下今閹豎張鋭等罪惡婁訊具服載在刑書百死莫贖祖宗立法為千萬世防陛下不宜輕貰令法自今日廢又曰爵人於朝與衆共之刑人於市與衆棄之頃者内璫張欽舍人兒賢䕃緹綺部臣彭澤持之科臣許復禮言之安監言之陛下始諭曰已有成命再曰已有㫖三曰該衙門知道是必欲私之也臣按于謙王守仁勲烈爛焉録其子冕憲欽何如二臣賢之官廼崇於冕憲天下狥忠死事之人將因之觧體又陛下登用耆舊嘉納忠讜申勑法司裁抑僥倖曾未再朞秕政日甚崔某左道熒惑輔臣懇切言之置不荅羅洪載守職逮繫諸臣疏十七上寢不行又庇崔某之奴奪法司之守林俊且罪斥矣事渉中人曲降温㫖於法有擬則曰免提問於罪難贖則曰送司禮監奏請發落無功乞䕃則曰與錦衣衛百户然則昔登用者今播棄昔嘉納者今拂逆昔申勑者今沮撓昔裁抑者今批復此與正徳之初何異哉又曰臣伏覩給事中李學曾章僑主事林應驄言事罰俸有差臣愧乏三臣之忠而深惜陛下氣驕志溢也嘉靖改元以來陛下批荅言者始曰所言有理益深嘉之繼曰知道了姑漫應之又曰如何此等來説則怒之矣今者直罰之耳又曰本當重䆒則將有甚於此者矣語伉直慨切多類此由是許給名滿闕下云公奉職敢言不避逆鱗識者方以大用期之而公雅志恬退雖居禁近不忘丘壑思未㡬拜章乞歸歸而居考妣憂相繼廬冢上茹饘枕塊啜泣衰褎朱殷陽明甘泉二先生時以講學稱天下宗工各詒書慰唁之䘮畢徘徊墓田顧瞻紫雲之勝喟然嘆曰吾將營菟裘於茲老矣因自號曰雲邨去紫雲數里有山曰茶磨坏然豐蔚公樂之遂居焉因自矢曰士被冠紳入邑里役屬輿從擁大盖閒雅令里父兄亟走避旁舍奚安自此誼不入公府矣令胡公嘗從學官諸生言豎棹楔於門五皷歩郊坰叩令門再拜去令卧尚未起部使者敦促勸起謝不應山居置斗笠長簑畜二鶴翩􅗁庭下間遇大雪載笠披簔跨一黄犢登南巖絶頂以為竒賞日與逰者孫太白董從吾四三閒曠髙士盤礴山谷藉草䕃樹分韻賦詩或譚論經學人餽之食飲輙食飲或目公貴人也即拂衣去故相貴溪夏公使招公公口報曰位髙者多憂不佞有罷癃之疾不能從也貴溪嘆服乆之詔補給事禮科公復具疏以疾辭以徙茶磨山屬監改鮑郎塲籍為海鹽人鹽值倭難公逋播浮家撫巡以下數數問籌策為箸畫便宜事多效忽得噎疾曰老人生世七十九年寢疾知不起豫書墓石以付之卒之日夢指太極動靜交處吸清露三巨觥覺而遂彌留云公為家不事生産非道義一介峻拒喜貯書自墳典洎古石室秘文略備尤好秦漢人語手掲班馬二家雙行並書題曰史漢方駕其文多攷正冠笄婚喪祀祭經理論載忠臣孝子悌弟貞婦遺事佶屈不可句讀亦大類秦漢家言然公自命云櫪車鞲隼縧緤萬里飛騰之雄於眉睫指顧間則文章者公之緒餘耳公諱相卿字伯台號杞山又號雲邨舉正徳二年鄉試十二年成進士告歸十六年授前官公卒後十年紫雲里人羣百人醵金錢貰牢醴跽公龍山墓下呼許翁有涕泣者輓近士方釋草屩則驟然傲其鄉曲甚者暴戾恣睢為里人罵端何前者相嚮慕之誠後相背之盭也學使甌寜滕公明章教化檄縣祠公學示風勸焉公子聞造囑余傳紀其事東莆太史傳林大春余嘗歴觀自宋以來制科士至東莆太史嘆曰嗚呼才不其難乎廼太史一朝掘起海隅受知當宁名動京師可謂竒士而論者乃不深維本始徒以其年弗永勲業未就之故將并其人冺之以是靡所稱述於後世焉此其責宜在予矣於是為之傳以廣之曰東莆者以里為號大欽名敬夫其字也其先世與予俱出殷太師之後宋元之間始自閩遷海陽或居南桂或居東莆而在南桂者為予族氏至太史始以對䇿入翰林為展書官因遂退而里居故稱東莆太史也太史生而頴敏㓜嗜學家貧無書年十二三時嘗從其父如潮過書肆顧見眉山蘓氏嘉祐集心絶好之輙佇玩移日不能去頃之成誦已乃操筆為文文絶似搢紳先生咸噐重焉會中道失怙家益貧獨與其母居常自書給之間頗交逰列邑士資其載籍以自廣由是旁通子史百家言揣摩曰此足以角當世之士矣嘉靖辛邜就試有司督學王公得其文竒之以薦於廵按御史相與嘆曰是必大魁天下者其年果首薦於鄉連舉進士及第如其言先是天子臨軒賜對一時待問之士集於大廷者三百餘人殿閣大臣第其文得孔生而下十二䇿以進而太史不與上覽而問曰是安得無異者乎始以太史對上遂大稱㫖中外莫不翕然以為海内復有蘓子矣乆之以母老䟽乞歸養東莆山中築室以聚族人族人待而舉火者數十餘家而吉水羅念菴武進唐荆川復時時寓書潮州言學問事太史顧獨自負竒以為儒者多論議而寡事實又䋲趨尺歩弗獲舒其志氣乃遂寄意於詩酒䑓榭聲技之間自謂豪舉其故所與逰謝生黄生之徒輙稍稍引去客至或莫見其面其簡抗如此後母以天年終太史哀毁踰禮及既葬歸道病竟卒于家天下聞而惜之詩丐傳陳九川詩丐者樂安人李姓興生名年十六七患風痱籧篨其口箝如眼喎如手攣如欲食則仆卧於地乃能下咽欲言則畫地作字始逹其意然頗能詩昔董侍御時望未第時在鄉會中而丐至僉令獻董詩丐首肯之湏臾就中云鵰鶚直翀霄漢逈龍泉髙射斗牛光清時早展為霖手莫遣蒼生望八荒董禮而食之欲使養於官辭以老母在遂為述其跡嘗讀莊子序支離子輿事世咸謂其寓言耳今觀詩丐豈可謂無若而人哉然疏鼓筴播精可食十人而又時受上粟三鍾薪十束子輿能道其孫觧而又有莫逆三人者先後之今李㷀然行乞於市以養其母又若喑啞即有乗尻輿神馬之志孰宣其意哉其不幸視二子尤可悲矣夫駘有尊足者存籍未嘗盲於其心彼皆托文以傳丐形支離而孝其心閒而無事將不與杞犂諸子同逰方之外哉即用其餘以精詩其為籍無難矣故傳之以風狂痱其心乞墦施施者世且以為巵言可乎徐方伯子與傳王世懋始于鱗與余兄元羙六子逰也于鱗而下則子與稱最長云而世懋自齠時已竊侍諸君子比長被家難從家兄歸田里而子與亦數偃蹇家居又近得時過從余固莊事之而子與固讓為爾汝交逮二十年晚又同官豫章其卒也余自南康往赴之慟哭經紀其喪以歸世謂死生交余於子與近之矣文人不嫺於政類為俗訾而子與官至左伯所在有治辨聲其大者載在碑誌中可無論已其為文章海内能誦之集具在可考也獨其至性過人風流被物文章所不傳宦蹟所不載者余徒能寤寐見之乃竟與其人朽矣太史公有云無不善盡者即子與可圖而安得化工筆端者令可傳述哉余不揣輙採其軼事與耳目所親睹記者傳當世萬一有述焉其傳曰徐中行者字子與湖州長興人也家貧父某布衣教授里中弟子百十人有三子而子與其季也子與生而白晢豐下羙言笑樂交游少為諸生寠甚然出必鮮衣司冦顧公目之曰貴人也妻以甥女楊氏為鄉進士不第乆之而好為古詩文益甚里中若劉清惠公軰皆與忘年交矣庚戌成進士為比部郎時即李于鱗與余兄元羙方力為古詩文自振子與至則大悦其説而嶺南梁公實廣陵宗子相武昌呉明卿皆先後締交驩益甚諸君子皆刻厲相責課務在絶他游好一意行其説即流軰有時名者視之蔑如也子與居其間最為樂易矣然業已好之不願為兩端自觧以是其文益竒進而側目者日益衆相嵩者貪而忮亦自負能詩謂諸郎皆輕薄子敢出乃公上相繼外補或斥逐而子與得汀州守子與守汀州有善政未㡬以憂歸服闋再補汝寧政益善而㑹六載大察竟用郎時蜚語謫初子與為郎時數擊鮮為賔客懽士亡論識不識慕而干者輙傾貲賑之多貸里中富人金乆之未能償典兩郡所入租俸輙随手盡其官謗猶用賔客奸利事實亡狀而家居賔客日益進貲日益竭邑邑無以為懽客勸之謁選貧不能上元羙為具百金裝乃出補鹽官稍遷瑞州倅時相嵩敗諸忌者稍稍觧而子與以愛人長者人最憐之後丁母憂即䘮中超為山東按察司僉事為若弗聞也者子與終䘮乃得用新秩治楚也為滇少叅知以入賀為閩觀察使以述職凡兩至京師諸公卿慕之者日造其門及諸游客詞人戸外屨常滿子與人與為讙造請尺牘恒窮日夜獨子與能之他人不能也門下客而客亦輙為畢技佐其不逮以故子與名益盛而諸公皆以為用子與晚稍遷江西右伯居一年所晋為左人謂旦暮且大用竟以瘁卒初朝議汰諸藩臬弗任者其左以壯齒去而子與顧來代之感上恩益自力諸錢榖案牘皆手自闗署紙落如飛㑹宗藩有搆者訐諸隂事於朝竟法坐削者衆子與心憐之為得間從末减業就草病作不能語一夕卒子與好飲酒酒態頽唐有叔夜玉山之風口不喜道人過人有相負者衆為切齒子與恬不為怒乆益忘之遇事有不可意者未嘗見辭色客醉之以酒辭挑之始伉浪為怒態作數不平語已復陶然醒而氷釋矣其荐士汲汲恒恐弗及揚之多過其量貧士有所請數不休度力不能猶强應之曰奈何令客有慚心所至愛䕶其屬吏不啻若子弟卒之日海内知與不知咸歎曰奈何令伯道以無兒死門生故吏經而泣送者不可勝數僚友賻歛無不人人破例為厚者檢其遺槖蕭然圖書而已所負子錢籍諸賻遺僅僅足償仕宦垂三十年至方嶽家不留一錢㢘足稱矣初子與守汀時子相兩為藩臬其地捍冦有功死而子與為祠武夷祀之先大夫撫浙閩閩人追思謳歌子與再入閩則復為王中丞祠祠子相左而手記其碑及是子與卒閩人就子相祠並為兩賢云無子初以伯兄子詠為後已謂伯兄一子不可後而旁竟無可立世懋乃以詠子承孝遥接之世人謂為悲伯道者也明文海巻三百九十六
