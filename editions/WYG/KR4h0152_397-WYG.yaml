body:
  text: 明文海巻三百九十七餘姚黄宗羲編傳十一儒林黄景昌傳宋濓黄景昌字清逺一字明逺縣之靈泉人其先與太史公黄庭堅同所自岀四歲入小學十二歲能屬文長從方鳳吳思齋謝翺逰益通五經諸子詩賦百家之言尤篤意書春秋學之四十年不倦三傳異説學者不知所從景昌據經為斷各採其長有不合痛辭闢之不少恕作春秋舉傳論巴川陽恪著夏時考正言三代悉用夏時不改月數景昌以左氏縱不與孔子同時亦當近在孔子後作周正如傳考建安蔡沈集衆説為書傳世無敢議其非景昌獨疏其倍師説數十百條作蔡氏傳正誤古今詩體製雖相襲而音節則殊近代以此名家者亦罕知其説景昌以古人論詩主於聲今人論詩主於辭聲則動合律吕可以被之金石管絃辭則文而已矣乃集漢魏以來諸詩各論其時代而甄别之作古詩考景昌善持論出入經史衮衮不窮如議法之吏反覆推鞫其人辭不服不止故其所言皆綽有理致他著述尚多不能備陳景昌年既耄猶執筆刪述不已或勸其休景昌曰吾豈不知老之宜佚哉恐一旦即死無以藉手見古人耳晚自號田居子述田間古調辭九章賔客至輙揭甕取酒共飲酒酣取辭歌之以筴擊几為節音韻激烈聞者自失不知世上有富貴也景昌事親孝親歿哀泣至終䘮遇孤姊甚戀戀懷鄉人有恩重紀至元二年卒年七十六贊曰縣之立言之士名不著者三人宋元祐紹聖間有朱恮者師黄山薛大觀大觀得平陽孫復春秋之學恮悉傳之嘗著春秋羣疑辨若干巻宋季有蔡慶宗光逺者以春秋舉於鄉後以恩補官至武進丞亦著春秋集解若干巻有陳訥升之者通周易得先儒未發之祕亦著河圗易象本義八巻今皆散佚無存或僅存人亦鮮知之者竊意事功之實行難忘語言之空文易冺故致是爾然則世之傳者亦何往而非空文哉必繫其學之醇疵醇則習之者多疵則傳之者少也嗚呼信如是説古之荒誕不經之文縱横捭闔之術可謂極疵矣至今熟在人口者又何其多耶是蓋有不可曉者意亦有幸不幸存焉幸不幸天也天則非人之所知矣雖然人衆者勝天文之得傳與否實繫乎後之人天何預哉今觀景昌所著之書亦捋散佚無存矣濓為此懼故得而備論之葉秀發傳宋濓葉秀發字茂叔其先由括徙金華為金華人秀發師事吕祖謙唐仲友極深性理之學以餘力為文輙擢慶元丙辰進士第弟子慕之從其學者歲至數百人初授福州長溪簿丁父憂而歸服除轉慶元府學教授秀發嘗著論語講義發越新意以誨諸弟子且曰聖門授業之源無過此書然義理無窮倘一切沿襲舊説吾心終無所得若欲見諸行事是猶假他人之器以為用用之於已且惴惴焉不以為便况欲假人乎哉時鉅儒樓鑰史彌鞏婁昉鄭性之楊簡袁爕皆器秀發與之交而于簡問難尤切毎至日昃忘食簡自謂有所啟發得邊詹顧葉四子為喜葉蓋指秀發也秩滿闗陞循從政郎建寜府政和令丁母憂服闋調安慶府桐城丞金人犯蘄黄二州桐城為隣壤萬目睽睽不能保騎兵將廹家人號泣求避秀發叱之曰此正臣子竭力致身之日雖死何憾茍先去之如一邑生聚何修城浚濠日為備禦計㑹金人使諜者至秀發擒之亟斬于城上以狥金人計沮不得近邑賴以完事定制閫忌其功不自已出上其擅斬非法降廸功郎未㡬再叙改合入官授宣教郎知徽州休寜縣俄以前事論奪秀發退居餘十年無一毫觖望意獨憤李誠之之寃上書訟於朝初誠之守蘄蘄陷一城士卒皆戰死無降者誠之亦望闕再拜㧞劍自剄議者不録其忠反咎其不能全人故秀發不平而訟之言辭朗烈聞者降歎史彌逺當國人有自桐城來者彌逺以秀發事為問其人厯言撫綏安定之詳且謂某等得保首領至今皆葉桐城之賜不然已無桐城久矣彌逺頷之從容問參知政事宣繒其言同彌逺嘆曰㡬失賢矣即日起發擢知真州楊子縣轉奉議郎差監都進奏院越七日僉知髙郵軍髙郵為淮東𦂳治時尚繹騷弗寜秀發上五䇿一曰防海道二曰審邊城三曰擇武守四曰練軍實五曰蓄財用而以正人心作士氣為之本言多聽髙沙三十六湖水髙而田下隄防不固則千里一壑民且無稼秀發建石埭以䟽水勢瀦洩有恒無乾溢之病其後馬光祖來為守行埭上思秀發功構堂樊梁之隄以祠焉尋轉承議郎疾作上書乞致事特陞朝奉郎已而疾甚力劾去貪墨吏人勸其何自苦如此秀發曰不可吾死後彼必殘吾民以逞同列來問病整襟對坐惓惓以究心邊事為屬無他言其忠義出於天性至死不變如此紹定庚寅九月卒年七十卒之日惟遺書籍數篋弊衣一襲至無以為殮當屬纊時民夢秀發擁髙牙大纛入嶽祠民疑其為神遂肖像而祠其中云秀發夷險一節臨事惟可以義動不可以勢利刼澤物之念則若饑渴然居田里日有犯私鑄者縣令趙善琛欲重其刑而連坐之秀發曰刑一成而不變君子所盡心焉縱姦固失傷善亦豈為得哉善琛為之止有悍戾者日嗜鬬富人疾之欲以嘯聚之名寘於法秀發白於郡守鄭如剛曰血氣之爭則有之嘯聚則未之聞也民因得不死秀發卒後累贈朝議大夫學者尊之曰南坡先生所著書有易説周禮説論語講義及詩文行於世子夢擇孫振祖皆出仕能以清白世其家云贊曰濓嘗讀國學進士王若訥記秀發桐城斬諜事未嘗不流涕而嘆也當金人陷蘄士大夫析圭儋爵者或納欵賣降之不暇有若秀發者官僅一丞耳則不顧妻子嬰城固守法宜在所褒嘉顧以擅斬而罪之果何道耶譬有丈夫焉居深山中盗欲舞刀劍刼其財先遣㳺偵以察虗實其𨽻怒殺偵者丈夫乃不責盗而責𨽻可乎不可也國之政如此將何以致乎治耶宋自是而微矣嗚呼自古當季世變白為黑倒上為下若斯之類甚衆人所不能堪而秀發安之抑賢矣哉喻偘傳宋濓喻偘字伯經義烏人其從祖良能與兄良倚同入太學又同登紹興丁丑進士第其季良弼亦太學生晚以特科補新喻尉皆以文學稱而良能最知名偘早從良弼學繼受經于永康陳亮復由太學諸生登慶元己未進士第調宣城尉有境外盗狙入尉界内偘登執之歸于府府帥臣丘崈異之乃立所由尉庭下曰盗逃出境尉不執䦨入境他尉乃執邪所由尉震恐開禧丙寅金人犯淮府檄令尉二人餉軍由歴陽逹鍾離鍾離乃敵衝要法當以重兵䕶糧䕶不滿千人令畏縮不敢前偘奮不顧難諭鄉長老召募足千數即行道經含山有兵敗回揚言於衆曰我曹潰矣將以糧資敵乎弗去懼殱耳民愕視亡䇿將逃偘曰事急矣乃命弓率執大斧而前曰設遇敵尉必先死職也終不負國汝未必死乃負尉耶欲去視吾斧民不敢動卒致饋於濠糧有羡衆謂尉宜得偘悉歸于公府遷慶元府觀察推官丁父憂不赴調隆慶府觀察推官真德秀來為帥素知偘能文見偘與屬吏迎道左為之改容思論薦之未薦德秀去偘乃以選人為宜春丞宜春地連贛吉吏珥筆成風民善訟偘為人怦怦諒直聽必以情民退無後言凡訴臺部者必曰得宜春丞一聽死無憾居久之由承直郎改奉議郎僉書鎮南軍節度判官聽公事改章服尋陞朝奉郎初偘久從諸老㳺幕中多新進少年議論雅不合偘嘆曰吾髪已種種寜能與翩翩小兒競短長哉遂請祠而歸築室夫人峰下曰蘆隱若將終焉嘉熈丁酉九月年八十四卒子二人宣子武子偘性豪談論今古輙目光如注氣軒軒出鼻􅝉間人莫能抗尤長於文辭通直郎杜㳺嘗稱之曰質而不俚華而不靡憤而不激怨而不懟不以食膾炙為美澹乎其有味不以刺文繡為工黯乎其有光其感時念故推物類情抑揚離合必窮其源以揚其波其不合于律者鮮矣君子以為知言當乾道淳熈間朱熹吕祖謙陸九淵張栻四君子皆談性命而闢功利學者各守其師説截然不可犯陳亮倔起其傍獨以為不然且謂性命之微子貢不得而聞吾夫子之所罕言後生小子與之談之不置殆多乎哉禹無功何以成六府乾無利無以具四德如之何其可廢也於是推尋孔孟之志六經之㫖諸子百家分析聚散之故然後知聖賢經理世故與三才並立而不廢者皆皇帝王覇之大略明白簡大坦然易行人多疑其説而未信偘獨出為諸生倡布磔綱紀發為詞章扶持而左右之使亮之門惡聲不入于耳髙名出諸老上皆偘之功也已而亮為世議所扼當路必欲擠之死地凡再下詔獄偘與同志生極力營解㡬陷羅織遂脱亮于萬死一生之中亮顧偘曰此生死而肉骨也人多義之偘所著有隨見類錄二百巻蘆隱類稿五十巻首論六經之功用云從弟南强喻南强傳宋濂南强字伯强自㓜負竒氣父直方以與陳亮類俾從之㳺時著錄牒者歲數千百人南强周旋其間獨能探深索隱語移日義益精亮曰喻伯强文墨翰議凜然可畏也慶元乙卯戊午連貢於鄉未㡬入太學中監舉月書率占前列上禮部皆不得第嘉定庚辰俛奉南廊對授邊功部臨安前富陽縣尉轉修職郎南强創射樓補闕卒額時其練習春秋則都肄府中徽幟精明行列整肅夐出他縣上縣民譚甲與丘乙閧譚女以癎死誣丘驚跌所致挾王丙為左縣以命南强南强召譚與王列於庭且詰譚曰汝以病死女誣人汝不吐實將坐汝譚色動顧謂王曰汝嗾我也亟袖案白上言抵譚罪境内多盗販舳艫尾相銜不絶徼卒與豪猾為市弗可敗南强一切禁捕雖犯權勢貽怨讟弗懼也寳慶初禮部侍郎真德秀以言事去廟堂風京尹跡其所至欲并以為罪德秀舟過富春江南强亟見且賦詩為餞人皆壮之轉承直郎處州縉雲丞未上紹定庚辰三月卒年七十一南强讀書不為口耳學必欲見之實踐毎至名義可喜事擊節慷慨謂心契可致初當路欲排善類指陳亮為根煆煉刺骨罪且不測門人畏其威焰噤不敢出聲南强義形辭色貽書誚責言先生無辜受罪捋賫恨入土吾曹為弟子當怒髪衝冠乃影響昧昧是得為士類耶復走東甌見葉適備陳寃狀適曰子真義士也即秉燭為作書數通南强又持走越袖見諸臺官誦言無忌卒直亮之寃南强為人不立崖岸而見義勇為聞朝廷行一善政輙昂首吐氣或有司苛虐彈指長吁終日不樂暇時旅肴設醴與賔友握手劇談日至再三不倦為文善馳騁下筆輙數千言不繩削而自合大篇短章恣人取去往往不甚愛惜惟梅隱筆談十四巻尚存子二厚祖埜埜業進士贊曰自道廢民散師弟子之誼缺平居則謬為恭敬視其影或不敢踐一逢患難輙反目若不相識然甚者更名他師使偘與南强見之必將唾去之矣傳曰民生於三事之如一惟其所在則致死焉其偘南强之謂乎義烏宋先逹小傳王禕宗澤宗澤字汝霖母夢雷電紅光下燭寤而生澤自㓜有大志元祐六年登進士第調館陶尉厯龍游膠水趙城令皆有能名改知掖縣差通判登州忤道士得倖用事者予祠而歸復坐削奪覊置鎮江尋監鎮江酒税靖康元年朝廷議遣使與金人講和用薦者假宗正少卿充和議使澤奏名不正改計議使衆謂澤方剛難合必不能屈且徒死無補不若付以河朔一要郡除直祕閣知磁州從羸卒十餘人倍道之官至則治城池修器械廣儲畜募勇敢為必守計且條畫邊防要䇿與勤王之議上之除祕閣修撰河北義兵都總管髙宗以康王使金過磁澤力止之朝廷因命為兵馬大元帥澤副元帥加集英殿修撰髙宗承制復加徽猷閣待制凡與金兵十數戰皆有功方進兵臨濮而京城不守矣金人逼徽宗欽宗北行澤即引兵趨滑抵大名将徑渡河據其歸路邀還之而勤王之兵無一至者又聞張邦昌僭位即欲先行誅討乃還軍衞南且上書髙宗勸進建炎元年五月髙宗即位南京趨詣行在所入對涕淚沾臆陳興復大計踰千言且曰願陛下一怒以安天下之民臣雖駑怯當冐矢石為諸将先得捐軀報國家志願誠足矣髙宗壯其言擢龍圗閣學士知襄陽府改知青州俄改知開封府尋遷延康殿學士京城留守真除開封府其訓辭曰雖蕭何之守闗中㓂恂之狥河内以卿比迹於古有光澤素蓄忠義至是益自感奮招集四方義士得百餘萬復有河北山寨效順者數十萬來聽節制京城内外所屯兵實百八十萬方尅日大舉渡河而遽屬疾諸將入問狀矍然起曰吾固無恙政以二聖䝉塵至此汝能北定中原吾死何恨衆皆洒泣同聲應曰敢不盡力翌日遂薨臨終連呼渡河者三二年七月也時髙宗南渡已久至是有㫖除澤門下侍郎御營副使命未下而訃聞詔贈觀文殿學士通議大夫賜諡忠簡始澤身任中原之事既修復京城力請回鑾疏凡二十四上而黄潛善汪伯彦從中沮之以故憂憤成疾澤既薨數日間民人散去者十五六議者謂其子穎嘗居戎幕得將士心宜用以卒父功於是朝廷已用杜充為留守乃除穎秘閣留守判官穎尋服䘮而歸所集義士悉散去而中原不守矣穎後為兵部郎中贊曰髙宗之南渡也中原之事一委於忠簡及中原尅復而髙宗乃無有北還意忠簡以中原無所倚因請以信王榛為兵馬大元帥信王榛者髙宗親弟也潛善伯彦軰輙譖其有異圖遂有門下之命雖曰尊任之然實奪之權家傳國史皆不書其事蓋諱之也嗚呼髙宗之無意於中原固不足論使忠簡而緩死則神州全璧社稷長靈實嘉賴之矣然則盛衰之際庸非天乎徐僑徐僑字崇甫淳熈十四年進士調主簿上饒始受業考亭朱子之門歴紹興南康司法皆以憂去開禧主和議函大臣之首僑上書言非所以立國時多其能盡言嘉定七年由嚴州推官考滿差主管刑工部架閣文字除國子錄召試館職除祕書正字遷校書郎請外知和州徙知安慶府十一年除提舉江南東路常平茶鹽事上書極言朝廷時政請詔大臣以正已之道正人憂家之慮憂國庶㡬致安於已危迓治於將亂丞相史彌逺怒令言者劾罷之久之理宗即位禮部侍郎真徳秀奏亮直敢言如徐僑者願寘之言地而彌逺猶在相位不報葛參政洪喬丞相行簡時在侍從代為請祠迄不受祿遂引年吿老紹定六年朝廷更化收用老成落致仕除直寳謨閣江東提刑尋除祕書少監改太常少卿屢辭逾年始造朝入見論奏數千言大略謂君心正則朝廷正以至百官萬民莫敢不正矣除兼侍講尋兼權國子祭酒勸講之際數開陳友愛大義遂復皇子竤爵且建言子思宜肥享孔子二程子宜列從祀王安石宜廢勿祀趙汝愚宜配享寜宗後皆施行以論王檝奉使狀與時宰論不合力求去除工部侍郎求去益切陞集英殿修撰提舉佑神觀兼侍讀僑奏領祠勸讀乃體貌重臣之殊禮力辭不敢當遂以寳謨閣待制提舉太平興國宫既歸援舊比上疏請辭待制乃復除集英殿修撰與其子京官固辭命下如所請而疾以革卒年七十有八訃聞仍除寳謨閣待制致仕諡曰文清初僑之兄侃倬皆學於東萊吕成公而僑師事朱子朱子毎語人曰崇甫明白剛直士也因俾以毅名齋朱子之學詘於慶元及伸於端平僑與度正業味道實發之其在人君前論學則曰正心論治則曰在知人其教學者以命性中誠仁為窮理之要九思九容為主敬之本平日奉身苦約人不堪其貧嘗入對衣敝甚上問曰卿何貧甚耶對曰臣不貧陛下乃貧耳陛下國本未建疆宇日蹙權倖用事將帥非材旱蝗相仍盗賊並起經用無萟帑藏空虗民困於横斂軍怨於掊克羣臣養交而天子孤立國勢阽危而陛下不悟臣不貧陛下乃貧耳理宗為改容優納焉其所著有讀易記三巻讀詩記詠一巻雜説一巻文集若干巻門人曰朱元龍康植朱元龍朱元龍字景雲嘉定十六年進士厯温州平陽池州青陽兩縣尉調饒州司理參軍徳興令誣其民董氏五兄弟溺死縣卒具獄上力辨其非辜其兄弟得不死後皆為名進士他所平反者甚衆嘉熈元年以處州縉雲縣令治最擢幹辦行在諸司糧料院尋除宗正簿陞宗正丞兼權左司郎官京局官或挾權貴勢求舉牘輙斥之曰舉牘可以勢取耶中官有求封節者力持不可宰臣傳上㫖令改擬對曰吾職可罷擬筆不可改也宗室有圩田之訟衆莫敢决元龍毅然决之時方括兩淮浮鹽致書執政以謂朝廷行商賈之事廟堂踵諸閫之規使史氏書曰括浮鹽自今始不可又兩上封事言自宫禁朝廷以及百官萬民皆可痛哭流涕於是史嵩之入相疾其直言遂以斥去差知衢吉二州皆旋予祠改知台州以憂不上既而鄭清之再入相清之尤素惡其剛直遂以朝奉大夫致仕家居十年乃卒元龍早受業於僑既又從四明袁正獻公爕逰爕象山陸氏門人也故元龍之學得朱陸之異而㑹其同有文集若干巻子㓜學用蔭入仕為臨安府觀察推官能世其家業康植康植字子厚父曰仲穎字蘊之淳熈十四年進士復試中教官仕為尚書吏部郎中涖官以清白稱植用世科登嘉定七年進士第授奉化縣主簿三遷為武安軍節度掌書記與制置使史嵩之不協對移江南酒官未㡬除刑工部架閣文字遷國子正改通直郎論對言事抗直忤喬丞相行簡意差通判廣德軍救荒有法陞知本軍以治最聞召知大宗正丞遷兵部郎官除浙西提㸃刑獄公事劾奏平江守臣史宅之治郡無狀嵩之宅之兄也時為丞相并連及之其言以為宅之不思掩前人之愆專務聚斂以事貢獻是以小忠而成其大不忠也嵩之不知而使之不智知而使之不仁其上罔陛下又不忠之大者也羣臣明知其罪而不言皆逆探陛下之意而不敢攖其鋒是逢君之惡亦不忠之徒也疏入理宗震怒欲重罪之杜丞相範時在樞府為之極諫謂憲臣言事既不中又加之罪如天下公議何理宗尋悟乃徙宅之隆興而植提刑福建改知寜國府兼權江南東路提舉茶鹽義倉奏免和糴行經界法除都官郎中出知吉州改福建路轉運判官兼攝建寜府賑水災拯鹽弊政恵大孚赴闕奏事卒于建谿驛積階朝奉郎其在廣德時取大學語名其齋曰誠求仲穎與僑為同年植以故早師之師門中獨植從㳺最久與同邑祕書丞王世傑皆號稱髙弟焉贊曰文清則學行純篤風節髙峻誠可謂道學之宗師矣朱子之傳閩中則有黄幹氏而浙東為文清然黄幹氏一再傳為何基氏為王柏氏皆文清同郡人而皆隱德不仕文清之傳如元龍植則皆起科第躋政路故著於大節表表如是焉王柏氏稱植操尚之堅風力之勁有文清之遺則嗚呼寜獨植而已哉魏純傳薛瑄魏純字希文山東髙密人也其先世多仕者至其父為官江南希文就學於江南初治易後明春秋詩書大義亦皆知之其父為績溪令時希文客金陵一時逹官貴人聞希文名屏勢就見請交因合幣羅致館中俾訓其子弟未㡬人有所指摘語及希文謫戍邊衞寓薊州玊田縣先君子永樂七年教訓其邑希文復誨諸官將子於學宫傍瑄因得納交為心友自是往返凡十年議論連日夜不舎瑄之踈劣賴希文規輔之益為多先君子官滿去希文徒歩送數十里執手為别别三年嘗一得書自是信音不相聞者又三年其後先君子丁大父母憂起復至北京時希文亦以薦至吏部因同膺薦者有所不合復退於初又二年為宣德元年侍從有薦希文學行者復召至京師集試吏部文既合格將上其名於朝以官之而希文竟暴卒於旅次是年某月某日也明年春瑄在河南始聞其訃先是瑄有詩懷希文考希文亡日與瑄作詩時皆在宣德元年冬豈非交情之密黙有感觸於中而不能自已於言乎嗚呼瑄嘗觀古人論富貴貧賤必皆曰有命瑄少猶未之信年來經渉既久數數考之於己驗之於人然後有以見夫富貴貧賤蓋皆有决然不易之命而非人之私智所能去取也以吾希文觀之其賦質粹而明其為學正而純其立心必欲一毫無媿於屋漏其制行必欲一事不悖於天理是則以徳言之希文之賢固當見用於時也處戎伍僅三十年超然自適不為顯者焜燿而有自沮之色其貧至於床無完衾身無完褐耕穫薪芻之事靡不備嘗而操行堅如金石略不少變其所處蓋有古人所難者而希文優處之以時言之希文困極宜通當不至於終困也至其忠信之行積於中徴於外武夫小子皆信其為善人而起尊敬之心搢紳大夫皆知其為君子而咸欲其得位於時是則以人事言希文名實孚於逺邇亦當顯於世也三者皆無絲髪可疑而乃卒至於窮死不得一試其有則所謂决然不易之命豈不信哉瑄又竊有疑焉夫所謂命者果何自而然哉蓋出於天也天必貴有徳福仁人希文乃不克䝉其貴與福則所謂天者竟何如哉豈貴徳福善者其常而貴福差爽者不得其常乎果天道自然而然初無心於其間乎抑人之生也適丁其氣之清濁厚薄不齊而非天之所能為乎是皆不可知也或者又謂天於善人不有以福其躬必有以昌其後是又未可必也雖然古之所謂善人君子者顧自處謂何耳固未嘗以今之厚薄為輕重也昔固有貴為卿相富累千金生無益而死無聞者命則厚矣其於道果何如哉以希文之賢雖卒至於窮死其徳行名譽孚於人人其自處者既已無媿於道矣命之厚薄奚足道哉瑄與希文交最久情最密始以希文之不遇質之命而自疑終以希文之無媿揆之道以自解又恐希文之潛德懿行久而或冺於世也遂作傳以志於私篋以傳之悠久且俾世之君子當力於為善而無疑於命云羅倫傳陳獻章吾平生有故人曰羅倫字彛正江西永豐人宋羅開禮之後也性慷慨樂善不疑人欺遇事無所廻避有不可輙面斥之舉成化丙戌進士䇿對大廷頃刻萬言中引程正公語人主一日之間接賢士大夫之時多親宦官宫妾之時少執政欲截其下句倫不從直聲震於時奏名第一為翰林修撰㑹内閣大學士李賢遭䘮朝廷留之臺諫皆不敢論説倫詣其私第告以不可李公始以其言為然既數日復上䟽厯陳古今起復之非是且曰如其不然必凖富弼故事終䘮劉珙故事言事反復數千言一本於天理人心之不可已者孔子曰勿欺也而犯之倫以犯顔切諫為大救時以行道為急其負荷之重未嘗一日忘天下故發憤如是疏奏遂落職提舉泉州市舶司倫雖見逐而士論益榮之由是天下之士爭自刮磨向之不言以養忠厚者為之一變而終倫之世臺省未聞有起復者矣雖以此為人所知然亦以此取嫉於人明年召還復修撰改南京尋以疾辭歸開門授徒日以註經為業垂十年卒於退居之金牛山世之知倫者不過以其滂沛之文竒偉之節果敢之氣而已至其心之所欲為而力之所未逮未必盡知也嘗欲倣古置義田以贍族人或助之堂食之錢謝而弗受或衣之衣行遇乞人死於途輙解以覆之客晨至留其飯其妻語其子曰瓶粟罄矣之旁舎干之比舉火時已近午亦曠然不以為意提舉泉州時官例應得折薪錢其人欺以乏告即放遣之不復問予嘗遣人訪之山中結茅以居取給於隴畝往來共樵採若無意於世者時或作為文章以發其感慨之意而人亦莫之知也論曰倫之必為君子而不為小人較然矣如倫之才少貶以徇人雖欲窮晦其身寜可得也以其所學進説於上世目之為狂何足怪也孟子稱豪傑之士雖無文王猶興若倫者今所謂豪傑非與無導於前而所立卓然人莫能奪之又曰倫才大不及志其青天白日足稱云李評事傳石珤李承芳字茂卿湖廣嘉魚人也與弟承基俱好古博學有名毎慕陳白沙公甫不逺千里攀渉嶺海往從之游既舉進士為大理評事非其志居二歲以病乞歸親力耕播與漁父牧䜿樂數晨夕或過客訪之便簑笠相見又數歲卒承芳心貌並古為歌詩亦竒麗議論古今人物毎不主故常務在與世抗遂短誚朱子註疏以為拘縛後學至詆為罪人又性頗躭佛嘗與客登西山逢路僧設供便解帶與之近行怪也至其居家清素與朋友交誠慤不阿言動佩服任真簡古過人甚逺獨疾末俗媕婀矯枉過直云蘿石翁傳黄綰蘿石翁者不知為何人也姓董氏諱澐字復宗蘿石其别號也其先汴人始祖曰健為宋武功大夫扈從南渡家於澉浦其後曰仲真者遷海寜之錢山澉浦世肄戎習其兄源長當往戍蘿石請代之遂復家澉浦初學為詩不解隨俗營生業獨好吟咏遇時序之更風物之變古跡竒蹤幽岑逺壑及夫人情世態之可歡可哀可駭可愕可慨可慶一於詩以寓之家徒四壁一毫不入於心時名能詩者吳下沈周闗西孫一元閩中鄭善夫皆與逰往來賡倡遇佳辰輙携親知蕩舟江湖拖屐雲山凌危履險吟嘯忘返放浪於形骸之外凡所欲之或衝風雪或冐零雨或乘夜月雖豺虎交前鬼魅伺途衆不能從亦獨行孤往不顧吳越好事家毎懸榻伺之乃紀為五館記平居樂義好施不計囊橐有無兄貧則捐已産粥以給之海寜衞指揮某人因貧不能赴京襲職竭所有與之以速其行所知鄔魯者以田易值易畢魯疾亟出劵燬焉卒復紀其𦵏毎聞當世之賢人君子所在不計寒暑逺近輙投贄納交見後生工一辭勵一行亟稱屢嘆不能已晚聞陽明先生講良知之説趨聽數日乃悔曰不爾可稱人乎遂幡然就子弟列時年六十七矣舊所與逰聞皆笑之但曰吾從吾所好而已遂更號從吾道人且讀内典遂究心釋老忽若有悟乃喟然曰今日客得歸矣於是援廬山故事與海門僧法聚者集諸緇俗結社寺之丈室又號白塔山人澉浦廢寺有鐘卧地俗傳其靈異乃募資樹樓以登之甫訖工而疾不起屬纊之日視日早晚曰吾其歸與又口占一詩曰我非汚世中者儔偶來七十七春秋自知此去無汚染一道天泉月自流遂暝目其子舉人穀以予與蘿石嘗有一日之雅乃以九杞山人許台仲所為誌寄王宗範請予為傳乃叙而論曰人各有志品各不同其事毎不相為然論世而考徳者必歸一之其志其為其品始定若蘿石翁者始嗜吟詩習之垂老晚乃執弟子禮於陽明先生之門欲為儒學既而又逃釋老遂以沒世吾誠不知其何志何為何品者也雖然就其所志而言則蘿石者實可謂超然斯世錙銖不入樂善無求其賢於人何如哉湛文簡公傳郭棐湛若水字元明増城人初名露更名雨字民澤生而穎悟自少知學從白沙先生逰白沙與其沉潛逺到𢎞治壬子以書魁鄉薦専心理學遂焚引隱居更今名日侍白沙講心性之學豁然有得久之以母命復出僉事徐紘為勸駕過南昌謁莊定山問學亟為稱詡讀書南雝祭酒章楓山懋試睟面盎背論竒之乙丑㑹試學士張元禎楊廷和主考見其論用至近至神等語知為白沙髙徒置第二名登進士選庶吉士授編修時陽明王守仁在吏部相與倡明正學而修撰吕柟主事王崇慶軰往來辨論時名大著出使安南陽明贈文中有謂晚得友甘泉而志益堅其學務求自得者世未之知且疑為禪甘泉其聖人之徒與推重若此既至安南嚴却餽金黎晭贈詩有白沙門下更何人之句便道奉母南都日設講席有甘泉問辨諸書正徳丁亥宅母憂歸葬荷塘廬墓三年産瑞𤓰人以為孝感卜築西樵多士來學毎講必端坐澄心灼見道體嘉靖初召補原官累績遷南祭酒與諸生講學刻心性圗説教以隨處體騐天理為要晉禮部侍郎上天徳王道及聖學諸疏大指謂天徳王道本於慎獨即聖諭所謂敬一帝王之學一貫而已一貫非他心事合一之謂論語二十篇無非一貫之義無非心事合一之學故敬一箴序文首云敬者存其心而不忽一者純乎理而不雜此二言極為明切黙契道體即孟子必有事焉而勿正勿忘勿助長之㫖誠於日用之間隨時隨處隨動隨靜存其心於勿忘勿助之間而天理日見焉上嘉納之所著獻納篇又倣大學衍義補作格物通錄進足補衍義所未發者累遷南禮吏兵三部尚書講學新泉書院滿九年考年逾七十致仕所著心性書遵道錄樵語古小學四書測五經測楊簡折𠂻非老子及甘泉全集門人永康程文德武陵蔣信稱其功在禹右嘗於天闗精舎立祝聖臺置講田以贍四方學者庚申卒於小禺洞年九十有五訃聞諭賜祭葬隆慶初賜諡曰文簡海内翕然稱為近代道學儒宗云明文海巻三百九十七
