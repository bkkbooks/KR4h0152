body:
  text: 明文海巻三百九十八餘姚黄宗羲編傳十二儒林貞靖周先生傳王世懋嘉靖間雲間有賢大夫曰萊峯周先生既沒而其子紹元紹節尚㓜未能悉闡其先人之姱行已垂廿載鄉曲父老時時為二孤道其遺行及齊楚義故往來者咸能稱説宦蹟以是日聞所未聞紹元乃泣而請於同志曰吾今而後知先人之賢誌十之三狀十之五耳吾聞之諡以尊名非獨國典亦有私諡焉黔婁太丘而後代可考也倘吾先君子之行不媿願徼恵於二三子於是徐君益孫軰同辭而獻議曰諡法清白守節曰貞恭已鮮言曰靖説者曰貞行清白也執志固也靖恭正已身也少言而中也維先生好遯食貧易簀不變可不謂貞乎力學躬行功徳並濟可不謂靖乎維是劉瓛陶潛之美先生實兼之請以貞靖為先生諡議成以質於外史氏王世懋曰可為作貞靖先生傳曰先生姓周氏名思兼字叔夜號萊峯松江華亭人也祖禋某縣簿父雲鵠以先生貴封工部員外郎先生生有異質少為大父母所器恒抱著膝上曰此我家千里駒也大父尉興國先生年五歲從尉所視獄從旁輙能解曲直嵗時知故有問遺尉者循故事或未郤先生抗言曰此不當受大父益竒之歸而令受業於外舅楊臨江之門臨江公試以對偶輙應聲屬以詩有范寗王忱之句因命與其子豫孫同學即朋石中丞也中表競爽葩藻流聞時人以為機雲復出云年十七補邑諸生才氣横溢下筆毎千言不能休大為督學使者楊公所知嘗為古詩歌詹事陸文裕公見之謂其子曰吾年二十發解時不辨生此語爾善視之先生乃從陸君所益窺羣籍同里髙才若陸范諸名軰咸自謂不能及也兩試南畿皆預選以文體踰格為監試者所抑罷先生益力學弗懈因抱羸疾㡬殆癸卯秋試疾間入闈始稍斂就時遂㨗丁未計偕竟與楊中丞同舉進士謁選得山東平度州州故凋敝歲屢祲守皆以不善去先生至亟下令曰救荒莫若省事凡諸政令不便者悉蠲之而身自廵行阡陌不從輿𨽻厪縛一籃輿置飯一盂其上令其鄉民以次舁行民皆歡呼迎曰吾父來吾民更生矣居一歲州大治父封公嘗携家就養潛行宿東萊民舎試問守何狀曰往太守理一訟輙經歲月亡論枉曲即理民亦坐困今守神明一食頃可立决乃吾民感德終不忍訟吾知如是而已晨起見其家一塑像民率妻子環起而祝之廹視則守像也封公以是知先生真能得民云藩府閹縱莊壯奪民産民訟之分廵僉事僉事捶莊奴斃之獄閹嗾王奏之下所司鞠選愞吏惕王威久不决竟擬當僉事大辟撫院彭公疑其事檄先生往王召先生宴衆虞有他先生攝衣竟往王身自陪宴先生為飲酹巵竟席王不敢吐一辭先生出則閲成案對衆歎曰是胡難决僉事亡意殺人决杖不如法當得杖曰今為宗藩故加罪一等閹誣告法當戍以宗藩故末减足矣卒據以請於朝僉事者竟得復故職旁郡饑民掠食民間卒持之急且作亂幕府復檄先生治之將加剿焉先生曰此軰皆赤子饑求食耳奈何激之使為變亟作小木牌數千為招戢語散四郊令饑民得執牌來就撫民得牌雲集城下吏恐不敢納先生大開城門召之入而諭之給以錢穀皆復業為良民兵罷不用幕府益竒之先生居官亷甚即所得月俸又割以贍士之賢而貧者往往不能具朝夕餐忽有野鴿來巢種類甚繁因取膳二親州人以為天所恵亷吏也庚戌入覲時分宜用事而墨計吏多有餽遺先生僅持銀一鐶詩而贄之分宜亦知其亷能歸其一鐶而報以詩吏部考先生治行第一辛亥擢膳部員外郎督厰清源州人遮道哭送擁車不得行清源去平度不甚逺其人思先生輙往訊候至則嗚咽不能返先生人人慰勞或曰賴公恩妻孥幸飽食先生為色喜或曰不幸受某官虐使公在吾豈至此因大泣先生亦大為泣同年生李姓者貌類先生使經平度州人爭傳呼先生至皆踴躍來奔比見各太息去李初不測所以繼知之過清源為先生道其事云去後十年民竟為立生祠祀之事見崔桓碑記中窑厰故多羡利猾民蠶食其中先生至則以常例獻怒却之已摘其姦狀尤著者杖而戍之蠧弊盡剔晏坐堂皇時呼吏卒為擔水濯階曰毋汚我階故事公私船北上者皆帶磚獨中使不肯先生在清源中使惕不敢不帶時河勢將决先生為禱於神募民囊土築隄身立赤日中督之蓋隄成三日而秋漲大發萬井免於魚鼈先生之賜也州人方元煥德之為序以傳先生居清源雖不治民其頌聲不减平度云比先生家居時親故至京師道出清源清源人爭問先生多泣下有張某者遇厰中舊胥知為先生至親即率妻子羅拜具飡問先生子嗣甚詳問有二子復率妻子仰天謝其所至得人心類如此甲寅晉水部郎廵通恵河政如清源滿三載考得封父母先生望闕拜舞曰吾藉是稍報二親矣時倭難大作先生因力求外補得僉湖廣按察司事奉二親之官先生既夙著亷能聲至則臺使僚屬所事受成墨吏豪民望風屏跡武岡州有宗庶將軍五人藉藩封恣為奸利糾集亡賴白日探丸殺人莫敢誰何嘗持刃入王宫王亟走匿斫柱而出州倅而下悉奉其指使監司為不入境者垂二十年民積怨氣無所控訴公聞而命駕之州民遮道迎訴者千餘人先生度非逰徼可辦即聽民自捽捕去城十里守備祝明來迎先生知其人可任即與密謀盡得諸奸狀五將軍者氣盛而入為搆公不動頃之羣嫗㦸手呼噪於門公又不動已而民各縛其黨至先生悉置之獄五將軍無可奈何則臂匕首而入先生逆知之佯為揖而捫其臂曰毋妄動吾為足下百口計足下乃為此曹死耶五將軍計沮而退先生乃密條其罪於撫院馳奏聞上詔即訊逮得㫖竟械置髙墻所奪田宅子女竟還之民自是吏得為治民得為生皆焚香抃舞為先生塑像立祠先生拒不可則使人毁像仆碑民爭舁碑藏之攝篆江防有巨盗劉某者其黨挾妖術積不能擒度無可自容於先生暮夜密投千金先生怒廣設方畧擒捕竟殱之江黄之間威恵流聞聲稱籍甚一時藩臬諸公皆民譽也爭媿歎自謂不及云兩臺薦疏皆極揄揚而先生已丁内艱去矣初二親就養先生雖不在官舎朝夕跪問起居孝謹備至已聞倭㓂稍平思其㓜子堅欲歸先生不得已送之過九江備兵使者駭謂先生胡至此先生曰坐吾親得罪亦復何恨使者退而服其言母夫人歸未㡬以訃聞先生慟殞於地者再徒跣而歸水漿不入口者累日終三年䘮親故勸之出仕先生嘆曰吾安得復抱前悔日具甘㫖百計為封公懽庚午封公患風痺復不起先生哀毁雞骨如母夫人䘮服除竟不復出優㳺林泉者逾八年足跡不入官府屬歲饑食指不給闔門食貧終不為人闗説一事時或操小艇携圗書數巻逰吳越佳山水間嘯詠自得終不令人知侯公東萊守嘉興先生門下士也遣小吏持幣候且訂謁期先生峻却之毋以我故蹈嫌疑已聞唐公樞講學苕溪買舟訪之聞先生至出迎傴僂舴艋間侯甫别去而先生已解維不可跡矣已至茗溪訪一學博士亦故膠東弟子戒勿言有司已竟洩之分廵其人先生故吏乃迎致供張先生變色不語趨棹歸其狷介至此先生雖厲於士節乎然其居鄉和易慈愛藹然嘗養痾南禪寺聞鄉人金姓者坐官逋訟繫且死亟徒走歸捐貲為贖之其人踵門謝則拒弗見元旦肩輿出市中亡賴少年指先生曰夫夫名為善者吾試衆辱之乃呼其名先生歸而使人召之來其家叵測先生好諭之曰若幸遇我毋為犯他冠蓋恐不汝宥也笑而遣之有市賈貿米誤遺數十金而去先生覺之亟令歸其人而終不自言先生沒二十餘載其人始自言甚詳也乃知其隱德不可勝紀云吏部即家起先生為浙西僉事時徐文貞當國絶重先生書來以古人許之且促之仕而楊中丞亦移之書曰廟堂方以兄為學問中得力人奈何不為蒼生一出先生猶堅卧不起未㡬復召為廣西督學副使實有意大用之而先生已遘痺疾竟不聞新命卒年僅四十有七云疾革之辰妻孥環哭先生晏然謂宜人曰吾生平兢兢常恐失墜今幸歸全何恨謂二子無荒學問吾以清白遺汝搢紳能念我者汝不孤矣訃聞朝野惋嘆逺近奔哭諸生羣議請祠學宫督學耿公教曰周先生清修博雅毋煩再覈而直指孫公以師生義撫䘏尤至若平度父老謝禹氏軰率其弟子百餘人為文釃酒頓地長號握手二孤泣不能止蓋先生宦蹟所至有聲其在平度人以為朱邑桐鄉云先生少豪於文駕軼蘇氏詩歌類太白已稍出入歐曾博宗王孟善行草兼工小畫評者謂得趙承㫖米南宫之趣晚年悉斂而焚之凡世俗所慕宫室輿服聲伎珍玩之屬都無染著而一意靜修學道聚宋儒理學諸書及當代名儒口義辨析叅互手綴口占略無停晷間與同志往復質疑然終不集生徒標道學名故人莫得而窺也所著有西齋日錄道學記言若干巻行於世其為詩若文往往不留稿以故多散失二孤從殘剰中輯之為周叔夜集要以見先生之不屑意云病中嘗語門人曰蟬蜕人欲之私春融天理之妙龜山此言殊有意㑹又嘗嘆曰大丈夫當為百世謀若偷為娛悦耳目前釜魚幕燕耳此豈其深意所寄耶嗚呼若先生者於人可謂通才於才可謂完人矣而降年不永天下咸悼其施之不究然漢郭林宗聲垂千古其年尚减先生五歲人似不在長年藉令天假餘齡出而用世亦事功粗迹耳倘所謂精意流行性靈常在亦詎於今日有加損哉紹元兄弟以先生懿行實繁恐久愈湮沒故余為總集所聞以比於家乗周志也後之覽者其毋罪於蕪之不剪乎江西奉新縣縣丞李恭懿先生傳張佳𦙍恭懿先生沒余守官不得啟手足為訣既殯讀舒太守所為誌言先生家世行履甚備先生愛門下士惟余門下士知先生者亦惟余毎退食則記憶先生言行皆誌所不載者不可不傳先生卜築别業東郭外層岡翠柏油然若雲先生讀書其中人稱為柏山先生云先生上世俱隱據負郭膏腴相繼以貲粟自贍給然未有以經學起家者先生生而質靈明自少寡言笑簡重類大人長者遇圗籍輙手之不成誦不休稍壯治周易余邑夙號文獻取科第者多以四經顯而易學未行時有老生趙某者方以易教授國中弟子先生師事之老生故俗儒有私錄經解不知傳何物學究日夜扃錮笥中如寳諸生非厚利不得視先生一日竊觀之掩口笑曰此物可覆瓿且不能辱主司一盼何云説羲皇耶乃究意圗學務在自得聖賢之㫖一切糟粕筌蹄僅資渉獵非所嗜也先生學既充粹文日益有名毎試必髙等竟困於有司先生一無愠色嘉靖戊申貢入太學文學褎然冠四方之士餘姚李司成大器之應順天鄉試又不第竟謁選授江西奉新縣縣丞先生不喜操切務以徳拊循其民奉新人狡悍見先生仁亷諸所供應夫馬故慢命以累先生先生捐俸為之不足則倒槖中物以此先生官愈貧也後罷政歸日掃榻讀書内外弟子横經問難洋洋乎巴水之上先生好深沉之思平居不言人過不妄取與而惡惡甚嚴人無敢犯且絶跡公府先生嘗對弟子談舉業甚精故門人多髙第者至讀書不求章句亦未嘗輕與人言余自滇督學歸里中數月毎暇造先生廬嘗謂余曰易學久晦坊肆中所售者尤可憎厭與諸弟子言又非舉業所宜因問余曰六十四卦始於何時余曰文王重之先生曰非也觀繫辭取諸渙等卦則三皇堯舜時事書言龜筮協從則唐虞時事則六十四卦上古已然矣又曰伏羲八卦非盡取於河圗觀繫辭言仰觀象於天諸句及天生神物諸句亦自可見又曰先天南乾北坤後天何不代之長男女而南離北坎耶此大道之𤣥老易所同又曰古人釋經不敢自信故傳不與經相叅小象原自為類試讀之無不叶韻至後人始分經傳故宋人俞琰集説不為無見若使易無序卦傳不知後人將六十四卦顛鑿何狀矣又曰原始反終故知生死之説與無極而太極同一意無極云者從前推後原始云者由後遡前又曰讀乾之彖見文王興周之徳讀坤之彖見文王事殷之心余毎聽先生言輙聳然悟以為今之儒者莫之先也嗟乎先生官不滿百石宦囊僅十餘金瀟然物表潛心至理先生洵有道人也余既率同列倣古議諡事諡先生為恭懿再舉先生平日言行所未播人耳目者使史氏採焉若先生家世及子姓男女語在誌中論曰先生食天之報是耶非耶始先生窮經好修不能博一第惑矣已而領一丞功徳甚著卒不得陟明焉惑又甚矣然先生嘉言善行垂憲罔極巴川之士人人能道之先生可以不朽矣諺曰桃李不言下自成蹊先生無求於天下後世而名與天壤俱由是言之天道於先生豈無意哉八厓周公傳孫宜孫子曰華容古章華墟也山嶽雄峙川湖襟帶談者率以為楚之鉅焉自邑中馳者槩謂東山東山之秀乃又甲等一邑前代勿論已開國迄今名紳碩弁冠冕鄉土景頌華夏若朴翁忠宣者流大抵咸東山産山自東復北行數十百里則其勢愈益雄巍壁峭嶂叠嶺巉阜仰軋日月竒刺雲漢眎東山蓋上下㡬之於是有異人生焉曰八厓公八厓者山之特也而公居其下故稱八厓云公姓周氏名廷用字子賢父樂山翁公之孕也樂山翁方吏慈利夢幢蓋儀從冉冉自天降直入其廨明日而公生樂山翁以吿其令令曰此貴徴也翁於是棄役歸乃公長而聰異夙逹罔由師授年十八始讀書然又家貧為諸生也諸生率卑易眎之曰周氏子窮而粗鹵即免死溝中倖耳凡有酒食聲伎之㑹即屏避公不欲近而公顧倜儻靡較遇酒食聲伎直入座中坐髙論濶談旁若無諸生者諸生愈益卑易眎之㑹有誦公文者謂諸生曰若無輕周氏子其人才可得志若咸非其敵也於是諸生亦求公文誦之亦稍稍敬重視公居無何公鄉試武昌榜欲出也戯隱其名姓謂他邑同候生曰今年解知之乎華容周廷用也同候者曰此人中解乎公即曰此故竒才也設令試禮部䇿廷對猶當首耳已公果列第八錄其文式之明年正德辛未而公與家大夫舉進士出為宣城令宣城者縣之壯也公為之迎刃破節排錯解棼芟强抑豪靡有遺缺又日從事文章詞翰為山川亭閣之逰不三年入為陜西道監察御史按貴州夷獠帖息㓂暴屏除文學詞翰愈益加進駸駸内遷已㑹公疏詆銓部厥辭直烈當事者怒公思有以阨之未一考竟陟公浙江按察僉事以去人或憤而心靡平而公則坦然泊如曰此何足以困我也乃益自砥礪聲績日起當事者無如何也進公福建右參議與見素林公論詩文于壺山之陽林公大喜竒焉為文以贈未㡬又進四川按察副使是時屬亂芒部撫鎮者委公討之芒居深僻窮絶境有司罕至其地蓋數十百年云公冐險闢阻宣徳布恵綏懐勦撲遂平芒部之亂又攝武科舉士科舉士率精實無謬即公所期許者鮮不立取髙第列華要於是蜀有編修楊名給事中王繼宗等焉然公終不自耀其能征芒部也同事猥隨者間得美遷而公顧三載於蜀居久之始擢為江南按察司江俗故刁强弗馴其縉紳大夫罷居例日請託受賕累家富厚公為按察也毎痛抑其弊凡搢紳大夫以書問至者令二吏於㕔事公拆之以此故請囑皆廢不行而其居四川嚴亦若此於是毁讒交集咸欲推刃公㑹三載入覲銓部都御史汪鈜首摘公黜之尚書王公瓊者知公謂汪君曰此故有名豪傑何可黜也汪即曰公不黜此人他日得志將盡殺天下士吾與公茍存亦無噍類矣王公故嘗以剛摘其復起也蓋不能不稍依違計卒無以留公於是搢紳相語曰周某性髙傲氣人也今黜必且疏直寃乃相率詣慰公勉之行而公顧逹言曰天下大矣假令黜廷用軰數百千人亦能容耳於是卒歸歸而與家大夫為石磯八厓之社其文益大進明年嘉靖甲午公微病疥醫謂下之愈乃下之而增病病不數日而卒年五十三孫子曰世蓋有真豪傑者非八厓公哉夫公東山之布衣也前無師承之助後無汲引之階總角寒素乂非有萬石之積四海之交也乃其所植立則輝煌炳煥文足鳴世政足樹紀言足以經國氣足以食一時兹非有特㧞靡羣之貲陰厚獨得之具能然哉夫豪傑之士天既生之矣即俾其鷹揚嶽立雷動風駛掀揭宇宙照耀日月奚不可耶而顧窒抑阻撓位不稱徳行與世乖使人籲蒼叩帝莫能伸逹嗚呼天生之天抑之乎抑闒茸齷齪者其得志宜久而孤騫卓邁者造物固有所難容而鬼神亦或忌之乎嘉靖壬辰予以文試禮部是時公始黜也人率喜謂予曰八厓子去矣予曰若謂今日之去能八厓子屈哉夫天下有真豪傑亦有真毁譽真豪傑者必真毁譽而後能明之者也夫八厓子誠去已庸流恒軰視厥偃蹇跛躓胥靡之狀誠已内快中足喜其計行矣衆口之鑠弭而積毁之銷既息子猶賢人君子也今所覩闒茸齷齪僥倖通顯者非世之所誇耀駭震所崇侈以為不可及人哉然不數十年灰盡煙滅即使三尺童子微有識知謂其品視八厓則何如此非所謂真毁譽者耶夫真者定也定者人為之實天道之公也八厓子亦俟其定已耳故曰造物無終窮然公之黜歸也語諸子若弟曰而屬以我故怨乎吾聞之丈夫進不獲於時退必有知已者夫石磯子吾之知已也令天稍俾我年吾得與石磯子日以文酒過從足矣嗚呼公果未㡬而死乎天之於豪傑嗇其位復嗇其年乃以身致之毁若譽虗名耳何益乎初公既與家大人為同年婚姻交㑹予稍長亦能以文自樹立有聲稱已諸時人乃咸仇嫉擯陷之罔置即號至親内戚恨不欲其朝暮淪入目死焉而公獨冒衆怨排俗紛忘年友之又播其名海内於是海内人間曰華容有周八厓復有洞庭子乎嗚呼斯亦謂國士知矣公卒予為詩十章哭之已又書其墓碑今又作八厓周公傳然予尚欲刻其歸休詩并序其文論曰華容故文獻也前哲之士若朴翁兩山率以文自樹立然其體顧咸不髙乃八厓子之文則彬彬異焉予讀其古賦樂府及五七言詩亦庶㡬秦漢魏晉李杜之間矣故曰八厓子於文章蓋中興吾邑吾不謂特立豪傑哉公既已違世獨化而海内識者未嘗不誦愛其所作稱八厓八厓以此卜之百世之下必有聞矣夫不於位於其文不於其年於其垂範斯又非天道昭昭未冺者耶八厓子固可以死哉八厓子固可以死哉見吾陳公傳張元抃自考亭朱子倡道於閩中一時及門髙弟砥行植節者滿郡邑故閩中之學在有宋熈寜之世為最盛迨明興以來朱子之書布四方家傳而人誦之然特習其説以獵取科第影響剽竊而朱子之宗㫖轉晦夫自蔡虗齋陳紫峯兩先生相繼出乃始一洗俗儒之陋習獨採朱子之精微而閩中之學在皇明正嘉之間又最盛見吾公蓋紫峯之從弟自少即禀學焉盡得其衣鉢之傳而統承於先生者也然當兩先生時陽明先生方講良知之學獨異於朱子世之為兩先生之學者泥於舊聞相率而排之公既尊信兩先生而亦無疑於陽明之説嘗與人論學有云陽明先生懼人謂格物只是窮理窮理只是讀書故以格物為主于行懼人以致知為致聞見之知故加一良字於知之上非良知不足以言知非格物不足以言致良知又云陽明之學入頭處在格物要妙處在慎獨獨者獨知也獨只是良知慎只是致良知此學初無足異不知世人縁何而異之又云宋儒之學萬分之中不無一失陽明發明其所未至將以為宋儒之忠臣益友而非欲拾彼之短以形已之長也今講陽明之學者輙掇拾宋儒之短以為口實語養德之學則為薄徳語講學之事則無益於學而徒使陽明得罪於先儒可為深戒由是推之公於朱王二氏之學蓋皆超然自得而非徒依傍口耳私開户牖者使論學者人人如公則二子之説不惟不相悖而實相濟矣尚何辨論之紛紛哉公姓陳名讓字原禮少穎異不羣為文竒崛遒勁不為蹈襲語嘉靖辛卯舉閩省第一尋登進士授紹興府推聽獄稱平暇則進諸生校藝講學士彬彬興起天真祠之寘圭田三江閘之捍海患公區畫贊襄之力為多徴拜監察御史遇事敢言無所諱避執政愛其才令所知諭之曰賢御史稍須安靜公即對曰為我謝相御史非安靜官由是與執政忤肅皇帝既嗣大統迎興獻太后入仁壽張太后悉以潘妃禮遇之兩宫以是有郤巨俠劉東山者睥睨兩宫間將以竒論取富貴乃令其黨搆誣張鶴齡兄弟有逆謀左道呪詛詞連宫禁逮繫無辜數十百人都城騷動諸司不敢出一語於是公方視東城遂捕東山下獄究其彎弓射父之罪東山度不可脱益令其黨告變且誣公為張氏羽翼併下公獄公從獄中上疏謂陛下有帝堯九族既睦之徳而東山乃敢對陛下倡言漢武巫蠱之禍陛下有帝舜克諧底豫之孝而東山乃敢對陛下暴母之事宜亟正典刑以安宗社上覽疏意稍解㑹西曹鞫東山所奏悉無驗併其黨坐欺謾伏誅公得還職京師晏如當是時微公仁壽宫危人心摇矣已而興獻太后登遐廷議遷興獻帝合塟天壽公以藩王不宜入祔皇陵乃借堪輿家為言顯陵氣脉不可洩又重於勞民請以衮帔交塟便上初覽奏怒甚投疏於地少頃復取視曰此言亦是於是遂定不遷之議而執政從旁擠公竟賜罷然公身雖退而言則已行矣公在臺中二年疏屢上皆侃侃大計獨此二事尤人所不敢為不敢言者咸謂公有社稷之功焉既退休里中日夜靜坐讀書孜孜學問口不談當世事惟地方利病所闗輙不惜齒頰亹亹為上官陳説為人剛方亷介見者竦憚然與之久處談論慷慨真意溢出入益信慕之上自承天還猶問公姓名臺使者至閩輙以公薦於朝而執政終忌之置不用家居十五年而卒隆慶改元錄先朝諫者贈公光祿少卿所著有見吾文集二十巻邵武府志若干巻行於世夫公始終出處大致如此世之知公者徒謂公為亷吏為直臣為博雅之儒為剛介之士而不知公之學其所見者定其所造者深其所養者粹蓋真有以紹紫峯之家傳振閩中之末響凡其平生所表見凛然偉然者皆其所學之緒餘而非襲取於外也公沒未㡬其子孫無以具饘粥予往嘗見其子孫某於溧陽蓋短褐不完予甚憐之頃者走二千里外來謁余請為公傳且曰吾父之事行誌若狀既備矣惟學術所統承未有發其微者是以竊有請也嗚呼某之志若此亦可謂知所重矣故予傳公特詳其學之所自以附於誌狀之後范栗齋傳張元抃先生生而頴異讀書不務記誦能尋究大指弱冠棄諸子業卓然以古聖賢自期當是時士徒以章句相馳騖不知有道徳之師久矣先生首事王司輿許半圭兩先生兩先生者並以道徳重於時者也既又師陽明先生所造益深然先生性狷介議論時相左既而博考羣經仰讀俯思乃恍然有悟以為孔孟的傳惟周程得之朱陸而下皆弗及也家貧無旦夕儲嘯咏自若人莫能測嘗謂某曰天下有至寳得而玩之可以忘貧作古詩二十章厯叙道統及太極之説其奥義未易窺也㓜而孤事母盡孝授業於外給其毳毎御一時品則愀然曰吾母安得嘗此輙投筯不食既沒執哀如古制至病瘠骨立醫者勸之茹葷先生泣曰生死命耳何可一日忘吾母母嗜芋終身不忍食芋二兄皆早䘮極力殮之撫其侄如已子積塾資為婚娶侄又早䘮其婦將改適所得聘金悉以授之族人竊議其迂先生嘆曰吾恨貧不能止其他適也而又可利其入乎晚嵗名益著士大夫咸樂從之逰然或以粟帛周之堅却勿受也先後守令屢表其閭辟為鄉賔為社長輙以疾辭隆慶戊辰先生年八十偶病且革呼其子語曰我卒不諱寜薄殮毋妄受人賻以汚我與其邪而有餘寜正而不足獨不能效黔婁氏之妻乎尋獲愈一二助殮者悉反之其生平亷㓗類如此某嘗屈之家塾數年雖盛暑冠服儼然道古今夜分不倦與人煦煦無倨容而歩趨不越尺寸里中人無老㓜皆以范聖人呼之其孜孜問學老而不衰毎誦衞武公之言語人曰毋以耄而棄我庚午秋病卧數日忽起沐振衣危坐三拱手而逝先生㑹稽人范氏名瓘廷潤其字别號栗齋蓋温潤而栗然可想見其人云仲山王先生傳龔勉嗟夫經以載道古者講經即所以講道也後世講學之名立於是始目經為訓詁而與道遂岐而二自八閩虗齋蔡公以理性之㫖發明經術務與前儒相統承而士始有所凖繼此而紫峯陳公次崖林公各以其學專門為書而經學益著然其書亦互有得失而未能的然不詭於聖賢也至我仲山先生潛心理窟闡揚經㫖本三公之説而折𠂻之著為定論學者治經欲求通於紫陽朱氏以窺孔孟之藩籬舎是其無蹊徑矣今其日抄講意諸書托剞劂以行世者可具論也厥功豈不偉哉先生王姓諱問字子裕學者稱為仲山先生比沒又私諡曰文靜云先生父曰樂莘翁以經學師邑中而伯兄計部公夙有文譽先生無他傳獨父子兄弟相師友穎敏絶人得父兄指授而精詣之學益進髫年遂與兄齊名相繼登薦嘉靖壬辰中式南宫引疾歸讀書山中從逰者日衆學益大進戊戌廷試賜進士髙第授户部主事丁内艱服闋補原官以便養乞南改兵部尋轉車駕司郎中擢廣東按察司僉事行抵桐江乞致仕時先生年甫五十當事者夙才先生欲大用之而乃决䇿引去無㡬微遲廽顧望事蓋欲修色養之孝於樂莘翁也比歸日奉親遨逰凡可以娛悦者無不至而與計部公白首怡怡情愛彌篤孝友刑於鄉邦大為觀風使者所欽仰薦疏屢上而先生若不聞也者夫篤於至性而爵祿曽不足芥其𠂻則先生之學詎徒空言也哉家居却掃一室焚香靜坐上下千古而一切世故澹如也時徜徉山陽水涯與漁樵伍築室寳界山極幽人逸士之致又於東郭搆綠蘿菴招名僧居焉講出世之學扁舟几杖往返湖山間人蓋望而疑其仙云絶跡公府監司郡邑守相冀一面為快注意傾下先生折簡相報或短詠數言而已先生雖不久於官乎而其所設施則有卓然可紀者由户曹視榷徐州力刷積蠧而又權粟貴賤以本折配支戍卒稱便在南駕部嵗修馬快船諸軍最苦帮甲往往逃竄以死先生憫之為白大司馬疏請官造不以煩軍遂不復有帮甲累其他請營房覈軍籍嚴查軍政優快平船月糧經畫鑿鑿迄今著為令而獲免帮甲者則家尸祝之先生之經濟此足以窺十一矣先生自少至老未嘗一日廢文學四方負笈者雲集開示指要亹亹不倦莫不虗往實歸藉先生之教以掇髙第者接踵於時然要以立身行已忠孝為本不僅事飾繪已也郡先逹文莊邵公道徳文章表一時而太守喻公中丞唐公學憲薛公並以經學稱海内宗匠先生始從喻公逰喻公謝以不及乃師事文莊公一見輙稱許曰異日子不予讓也已與唐薛二公友善雖學術行誼動相頡頏而至其超然出處之際則二公不無心服退舎矣先生形癯神清體不勝衣而志甚勁色温而莊無悦人之容然久輙自醉與人交情溢於文而尤篤親故賙恤無間馭左右甚嚴乃其體恤又甚至也天性澹泊無嗜好惟以翰墨自娛詩冲澹入陶韋室字遒勁得晉魏人法間或㸃染人物山水花鳥則神形兩至即專門名家不逮矣楮墨流傳㡬遍海内寸箋尺素人競珍之蓋先生之學無間精粗咸潛心究意故雖一藝而其工至此先生勇退似錢若水而才略過之冲雅若杜祁公和厚若邵康節而浴沂風詠之趣使得逰於聖門則當與顔氏子者翩翩而並駕矣嗟嗟可不謂有道之士乎某在門墻辱先生知愛最深嘗手書相勉謂他日衣鉢當以付子某深媿駑劣無聞大有負先生先生沒而冡嗣吏部君以傳見屬夫予方負先生自媿而又烏能傳先生哉然知先生而能言之者某又不敢辭也故獨推本其經學之詳撰次為傳而使後人知淵源所自云吏部君名鑑方以文學經術顯於世是足繼美先生矣胡敬齋傳鄧秀胡居仁字叔心餘干梅溪人穎異有大志家世業農至叔心益窘鶉衣蔬食若將終身焉方童年得鄰家遺物還之嘗從于同知凖受春秋知無所得曰學詎止此乎及聞吳聘君與弼講學崇仁徒步從之逰聘君亟稱嘆以為非常人退而益加充廣盡棄舊學以斯道自任㑹親䘮哀毁骨立䘮塟依古典不茍卜兆為鄉里彫兒所阨墨縗走有司訟之卒得直既免䘮乃上靈山浮錢塘厯太湖弔虎丘窮金陵閩淛之勝幡然歸故山築室講學謝絶人事學士張元楨修撰羅倫郎中婁諒咸嘉之修書通慇懃提學李齡鍾鉞繼請主白鹿洞未久輙謝去余侍郎祐來稟學一見異之妻以女陳獻章起廣南學者逺趨之叔心謂其近於陸氏戯玩天理不能順以自然其學以窮理盡性至命為期謂身心内外必主於敬故以敬名齋雖在暗室屋漏夫婦如賔楎椸筐篋沒齒不淆亂應接賔客巾履儼然涵養體認動靜不違發諸議論醇如也逹於晝夜死生之變而忻戚富貴利逹舉不足動其心言學與治以為己王道為凖的嘗語學者曰農工商賈皆有益於世而釋老俗儒非徒無益反害人心朱子有三綱淪九法斁之戒非虗語也又曰正學不明名教無主髙者入於空虗卑者流於功利惕然警懼勿忘勿助定其紛擾雜亂之心則虗靈瑩凈心無不存道無不明天下無難處之事矣又曰人能端莊靜一則天理存大本立極其至也篤恭而天下平茍不莊敬則百邪交侵去禽獸不逺矣抱志獨立遁世無悶成化甲辰以疾卒所註有居業錄敬齋集易春秋通解未脱稿贊曰宋李儒俗弊天下其效使宗社淪湮黎元塗炭三綱五常之懿或㡬乎息矣雖名為大儒豢養於元之爵祿冒榮名而鮮髙節若叔心者知俗儒之弊而反之正可謂超然獨得也已陳紫峯先生傳蘇濬自虗齋蔡先生以理學起家一時執經之朋門外屨常滿而所最推轂者莫如紫峯陳先生云余聞之故老曰蔡先生陽嘘甘㴻飲人以和其氣象似程伯子陳先生鞭駕風霆其氣象似邵堯夫至其尋繹六經歩趨鄒魯闢榛莽而引之周道則先生之於虗齋也猶虗齋之於考亭也先生名琛字思獻自為諸生時已厭薄一切鑽研聖學常自題曰發憤三年須是不爐不扇把持一敬莫教媿影媿衾蓋其志也初逰季木齋之門虗齋見其文嗟異之先生以師禮請虗齋曰子吾友也不當在弟子列先生固請因師焉虗齋曰吾與人語直憒憒耳廼與思獻語輙心開也且足以發吾道南哉㑹虗齋督學江右延先生訓二子先生時以所得證之虗齋而旋以所聞者課若子諸所談説淺而使之深深而敷之淺險而安常而偉約能不遺肆能不亂若倒萬源注之萬壑也其言曰理一也人所見殊耳茍一旦豁然則剛風上轉不為髙南極下入不為深茫茫載地不為大涓涓穿石不為小屈伸往來不為微榮悴開落不為顯四海九州不為逺閨門袵席不為近聖賢制禮作樂不為精童子灑掃應對不為粗陸象山之主靜不為禪朱晦翁之分析不為支周濓溪授太極於二程不為輕洩天機二程不授太極於諸子不為自孤道統蓋太極渾然何所不具而吾人耳目心思有所不得則繇分也先生自江右歸日以經學訓都人士所著有正學編四書淺説易經通典先生顧謂諸弟子曰余所談未盡管中見必相從塵埃外細論顔子之所謂彌髙彌堅者而後至也余將忘言矣庚午年舉於鄉丁丑年成進士時編修尹公襄得先生文大竒之以語學士靳公靳公曰是固醇儒必蔡虗齋陳白沙門下士已而知其為先生則翕然稱得人云先生釋褐授比部主政比部務故簡先生謂古人不以仕廢學剖决紛𤨏之暇必却律例前書史而時出其意於法律拘束之外則日與同舎郎説經學旁及今古而時時有所規益冠帶之族靡不願交驩先生者先生顧念母氏春秋髙請於朝曰臣母寡居年踰七十時光薄暮衰病侵尋定省踈曠無一時而不起憂思南北暌違有終年而不聞信息臣之處此實難為情乞調南曹以便迎養遂得請調南度支郎司淮安闗事時闗吏多競錐刀牟倍稱之息先生盡弛諸禁以通滯財當道者欲有沮格先生遺書曰論王道則鈔闗可無設洿池網罟仁者不為也奈何欲多取贏餘為功其人媿屈已而轉南銓部郎銓部多暇則益大肆力於學問學者摳衣踵至淺深髙下各就所長告之令人人意得㑹上兩宫徽號例得封先生曰是足慰吾親矣遂移疾歸歸則不入城市不通逹官貴人書時獨坐一室中髙之無垠逺之太始微之於喁粗之蠉動以及盛衰開闔得䘮炎凉之態或然笑或喟然太息先生不以告人人亦莫測也或興所至縱行山水間與田父野叟問節候話桑麻以為娛毎佐風月泛一葦持一樽二簋與一二朋儕懽然道故而時時出金石聲詠而觴觴而復詠漏下不休也僕人曰雞既鳴矣先生曰今日雞鳴明日雞又鳴其逹如此先生故無町畦然遇大是非利害則殫力爭之如陂與水利修涂築堤凡可恵甿黎者侃侃如也而郡邑諸大吏欲覯先生不可得則以得先生一言為重㑹當道者薦先生碩儒不宜置丘壑即家拜貴州學憲未及行調江右學憲先生竟以親老不就徵苐時摘園中蔬採江上蘋昕夕侍匕箸以為此足自老矣亡何而太安人終先生年㡬六十猶依依孺慕云今世稱先生者謂先生浴沂風詠似曾㸃醉北牕自謂羲皇上人似陶元亮不知先生之學以孝弟為宗㫖以宇宙為襟懷而天機圎徹觸處洞然彷徨乎塵垢之外從容乎不夷不恵之間其所得深矣所謂虗齋之後惟先生一人者非與先生詩文若干卷瀟灑有致出於天機而余所最愛者靜菴詩云大道自圎融稍偏便作病仰看鳥雲飛俯察魚川泳俯仰物何多一一闗吾性文公祠堂記云千流萬𣲖同歸於海手舞足蹈於焚膏繼晷之餘㗳爾忘言於千言萬語之外味斯語也可與嘔心搦管剪綵雕龍者同日道耶先生圽而海潮不至者三日外史蘇濬曰孔子至老而談韋編乃孟氏獨稱善用易豈以章句哉易首乾乾首初其繇曰潛龍勿用釋之曰龍徳而隱夫隱者非伏其身而不出也非與世相違也入於深潛徹於微隱獨往獨來莫窺其際耳先生以無用為用而不可知其用殆所謂潛龍者耶吾鄉韋編之學舉宗先生余謂先生不惟善明易且善用易明文海巻三百九十八
