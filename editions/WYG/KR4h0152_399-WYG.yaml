body:
  text: 明文海巻三百九十九餘姚黄宗羲編傳十三儒林東園金先生傳顧璘先生名賢字士希江寜人上世本籍永平曽祖洵國初始徙江寜先生性資穎敏魁岸閎逹有巨人度少學易於吳公彦華之門窮探妙解有聲庠序於是晉江蔡氏著易説行海内乃與董生林軰推衍傳授盡其精微以之發科登進士第乃嘆曰聖人精蘊盡於易矣而妙用見諸行事則在春秋學者不通春秋終不逹聖人之用遂取三傳及諸家之説研究異同發所未發著紀愚若干巻其自序畧曰昔壺遂問于司馬遷曰孔子何為而作春秋哉遷曰周道廢孔子知時之不用道之不行也是非二百四十二年之中以為天下儀表逹王事而已矣夫平王東遷周室雖衰遺法尚存禮樂征伐尚或自天子出及齊桓主伯天下宗齊而禮樂征伐自諸侯出矣溴梁之㑹羣臣主盟降自大夫出矣陽虎作亂季斯見囚又降自陪臣出矣此春秋之大勢天下㡬於無君經不容以不作也若其誅亂臣討賊子内中華外楚國崇仁義黜詐力尊君卑臣貴王賤伯程子所謂大義數十炳如星日衆人皆可得而誅之至若有功者或不錄有罪者或見原如齊桓違王志而㑹世子反或許之鄭文承王命而背首止乃致譏焉晉厲弑於臣而書國蔡昭弑於臣而書殺晉昭徴㑹欲示威也而或取其功吳師從蔡欲謀楚也而或進其爵桓公無王定公無正權衡獨裁於聖心是非不拘於衆見此則程子所謂微詞奥義時措從宜者也學者非深於道其孰能識之哉或曰仲尼之意發於傳左氏述事公穀研理廣發於諸儒大備於文定盡矣紀愚何為而作也曰今夫山草木生之而樵者不能盡採今夫水魚鱉生焉而漁者不能盡取聖言淵㣲義理𢎞博傳者雖多而各有所得探之益深推之益廣譬之飲河者各充其腹而源不竭此紀愚所由作也夫先生之學識其大者如此故其逹於政事恒以王道為心不徇俗矜張以希近譽初為仁和知縣事上以誠接賔以禮御衆以義涖事以勤文而無害寛而不弛竟與杭守楊孟瑛疏復西湖數百餘頃民賴其恵召入為兵科給事中時閹瑾擅國毒流薦紳先生獨持大體不亢不隨嘗勘淮安獄正知府某罪明周給事自殺之寃雖拂瑾意而莫之能害他如論宗室寘鐇逆謀議圻輔平㓂利害於時都御史有治軍無狀濫殺無辜者並見奏黜君子謂之有識服父䘮再起轉右給事中時瑾既伏誅錢寜繼起亂政以事見啣求補外避之遂出知大名府下車以後清淹禁止横政繩長吏之桀驁辨黠盗之牽誣民以安堵乃繕城浚池興舉百度修子貢祠又以狄梁公㓂萊公有恵於郡為建祠置祀刻元城劉公語錄以興學者地瀕黄河民罷障塞乃建議請䟽交渠分殺其流俾無泛溢為害臺臣是其議而不果行郡歲有贏金三千兩不登於籍吏言之先生先生曰吾不忍厚私以負國家遂白御史籍之官入覲言官有不悦者漫詞誣劾乃改知福建延平府先生曰官非吾志矣不往則跡不明因之郡受事者七日即上疏乞骸不俟報而歸旋得請致仕日與朋舊為樂公卿不先加禮未嘗往見孜孜以興起後學為念講析疑義終日不倦讓舊業於諸弟仍出歸田之餘治其家室婚嫁其友王太僕韋沒嘗貸白金百兩以上往哭之即曰嗟嗟欽佩毋念我逋以恤而後於是義聲重一時嘉靖戊子大禮成推恩進亞中大夫年七十一卒於家子男四大車大輿大輹大軏大車鄉進士有文行大輿府學生善詩並稱於鄉論曰六經道之綱也茍舉其綱萬目咸正今仕者治經用世往往紛糾耗亂而乏治理以文不以道也金先生學易與春秋皆盡其微斯身心與之化矣故治民則恵司言則直豈非綱舉目正之效耶夫然後知六經可貴而聖人之道果濟於世用不誣也陳紫峯先生傳王慎中嗚呼士敝於場屋之業而固陋浮淺牿其心腑專一經以自業茫焉皓首尚不能通其義以傳於繩尺之文又烏知所謂聖人之學哉宿輩未生相尋以敝出虚齋蔡先生出乃始融釋羣疑張王新意推明理性於字析句議之間以與前儒相統承夫所謂聖人之學者其駢拇於條畫枝指於解訓要以詳乎場屋之業而其意則進乎此矣虚齋先生之學方顯士猶鮮能習其傳者而紫峰陳先生稍後自以其意為前儒文公朱氏之學未嘗聞虚齋先生之説也一日虚齋先生得其文於故長史李木齋公所嗟異乆之李曰此吾徒也虚齋先生瞿然曰吾乃得此人為友足矣不敢為之師也於是先生乃介李公禀學於虚齋虚齋先生曰吾所為發憤沉潜辛苦而僅得者以語人嘗不解不意子皆己自得之今且盡以付子矣于講為師弟虚齋得先生而其學益尊盖虚齋有托於先生而先生無所待於虚齋也先生之書布於四方家而有之學者治經求通於朱氏微先生之書如瞽者失相從禽無虞倀倀然不知所往士之専精自名所業以授生徒者徃往為書其卑者望先生之外藩而不見其門其髙者不能以有加也故其為書矜名立號何啻千百皆滅沒蔽塞小行而不廣暫誦而輙廢惟先生之書焯乎昭布大行而乆存雖與世相弊可也今書肆板四書淺説易經通典是也嗚呼可謂盛矣先生姓陳名琛字思獻别號紫峯學者稱為紫峯先生正徳丁丑進士始授刑部主事乞為南京户部以便養轉南京吏部考功請告家居就家起為貴州按察僉事調江西僉事皆督學政並辭不赴考功督學皆美官假令徊翔不去與牽挽而出又當有美於是者穹堦峻秩當世有用人之柄者急欲得先生畀之以是詭得賢之名先生乃勇退而堅卧無幾微遲回顧望意世竟不得而榮之盖為母太安人之養也篤於天性而不見有可懐之爵禄由其大以推其細則先生之學著於書者非茍能為言而己也家居却掃一室俯仰其間察見稍長於草木葩卉榮悴開落之際景象委蛇與物共得一枝一葉照映闌檻人所同視而先生茂對之趣獨逺矣時放於山砠水涯漁樵相問或夤縁原隰農圃滯談彼各自為話言先生觀取感倡黙有所樂不問其解否也絶跡公門監司郡邑諸大夫冀睹其面為快注意傾下先生折簡相報或報以一詠而己亦不盡報也其有報不報惟意所到不視名勢崇劣禮數汚隆為度量也由先生之大推之既無可懐之爵禄又烏有可羡之勢利可畏之毁譽而舒心綽形以逰於世宜其浩然自適而一無所累也先生在位不乆事功無所表見其為刑部好在生人不喜於得情為户部謹於利邈不以自汚此皆砥行植節之士所能不足以論先生之大也昔由求言志千乘之國方六七十里之邦自課其用所以使民有勇而能足者可計歲而見效何其確也若夫及春而制祫與六七童子五六成人為侣望沂而浴見雩而風此何為者然孔子喟然而深與者乃不在彼而在此其意可知也以先生之髙使與曽㸃並時而生同門而學則鏗然舎瑟之對曽㸃必不異撰於先生而喟然之嘆先生宜越由求而見賞矣始丁丑榜得士吾郡最有名給事史筍江公于光今僉事林次厓公希元中丞張凈峯公岳與先生並以經學為海内巨工張公尤號為閎博而傑於文給事公淡於仕進與先生同趨好滯一官以卒僉事公喜事功齟齬於世迭起迭仆卒無所就中丞公方據榮顯事功為一時傑出然林公悔其顛躓張公亦以酬俗成務為多憂而恨道之難行未嘗不髙先生之决而慕其清也慎中生最晚猶及侍言於給事公林公張公皆辱俯與為友忘其年軰之後也謬學乖駁與二公有所往反二公不以為是予猶謬自信且不揣而思有以易二公也獨不及事先生而請其説然以二公推之知其不予是而予亦宜無以易先生也然而知先生之心而能言之者慎中則不敢讓也先生之書其天趣極詣神機妙契在於言語文義之外而己至於言語文義之所存字謹其訓句詳其義顓名一門粥粥然如恐渉他足而誤塗徑固與治塲屋者設為如是耳其超然心㑹離去形跡而遺忘物累庶㡬所謂不枝葉於道而全其真者由是以推先生之大然則論先生者不徒有考有書而讀其書者尚當有以求先生與如是則小子雖不及請於先生而傳先生之學以明於人固其冝也夏叟傳耿定向夏叟繁昌人下里田夫也性孝友忱恂里人敬信之吾友張甑山以司徒即左遷主繁昌教物色之招與講學一日甑山號於㑹衆曰夫為學學為人也而今須求為真人毋為假人叟憮然内省曰吾平日修持為人者得毋未真耶時時循省求所為真者隆慶庚午偕數友訪余天窩山中與處踰時一日忽對鏡諗其貌肖兄感念淚數行下辭歸跪而請益余曰白下省焦子弱侯者往與資切之可既歸從焦子㳺因漸知向裡久之自信得自然㫖趣以書抵焦子商正焦子報書曰要自然便不自然可將汝自然抛去他方世界也叟聞而自省謂時胞中砉然如洗云叟故未事詩書至是始請於焦子讀何書焦子曰讀四書可乃日取學庸論孟次第咏誦時以已意詮解萬歴戊子叟曵杖來訪余於留臺曰比以焦先生教讀四書閲諸註釋中更不了了儂苐將白文反身尋繹覺有㑹處敢以質焉中庸曰思知人不可不知天竊謂仁者人也人原是天人不知天便不是人何如能事親稱孝子又論語所謂異端云者謂其端異也吾人須是研究自己為學初念其發端果是為何乃為正學今人讀孔孟書若祇為榮肥計便是大異端如何又闢異端又曰吾人須是自心作得主宰凡事只依本心而行便是大丈夫若為世味牽引依違從物即名學道者不能自信本心勦襲紙上陳言挨傍别人口吻此皆孟子所云妾婦道也又一日侍忽喟然問曰天理人欲不知誰氏作此分别儂反身細求理欲似難分别止在迷悟間悟則人欲即天理迷則天理亦人欲也余聞之大為嘆賞曰嘻叟能及此耶難言之矣叟又嘗謂焦子曰吾讀論孟竊思孔孟之學同其道同乃孔子為至聖孟子何未能與擬蓋嘗疑之近日反覆誦思如論語篇中孔子自謂未能者也謂何有於我者也乃孟子七篇更未見有此類語意毋乃孔孟之所以别乎非與叟諸詮解多類此倘所謂以我觀書非以書博我者哉又一日白下同志㑹有友詢良知指意一友曰良知非究竟宗指更有向上著無聲無臭是也叟戄然起立抗聲曰良知曽有聲有臭耶余聞之大鬯嘆曰近學之蔽於虗無見也陷而離矣叟乃見及此哉因述之以諗同志惟昔茂叔之於李初平近代文成之於王心齋董從吾皆以隤然野老坐進此道而英敏才儁博聞强識者反遜焉彼皆空空故也吾黨可省己里中三異傳耿定向嘉靖季里中有方山人己鄧僧來自蜀己梁狂至自吉寓余里皆踰年所跡其行事大都與庸衆人異語曰光黄之間多異人其然乎異奚傳審異所以致同也梁也孔慕而俠行吾哀其志方也𤣥修而羶逐吾惜其姿鄧也釋崇而言穢吾憫其陷而離也是皆可監己故傳之楊子云妄譽近鄉愿妄毁近鄉訕吾於人也誰毁誰譽哉兹傳三子也時若三子臨之在傍者噫嘻假佩縲絏子卒成上賢得所託爾藉令三子幸取裁於尼父寜至是乎念及此怛然内疚矣何狂者姓梁名汝元後自變易姓名為何心隱余懲其行不中而悲其志故稱曰何狂云狂蓋吉州永豐右族也家累萬金族衆數千指少補邑庠弟子員從永新顔鈞㳺與聞泰州王心齋立本指悦之遂亢然思自樹時吉州三四大老方以學顯於時狂倚知見咸狎侮之獨脉脉心欽鄒文荘曰此孔氏胚胎也意謂大學先齊家乃構萃和堂以合族而躬總一族之政聨族諸子姓督課之為一家學凡徭賦緡錢時斂而輸之公不給者代為輸薄息而緩其償一歲邑下令督征狂謂中有非正供者抗弗輸為書抵令令怒以狀白當道當道故夙有聞也趨捕逮下獄擬遣時制府績溪胡公宗憲經略浙直孝感程學顔氏在幕用事説之檄江省撫臺安陸何公因得脱狂居幕踰年胡公語人曰斯人無所用用在左右能令人神王耳狂沾沾自喜謂胡公善用己也嗣程君陞冏丞狂從之來孝感與方山人㑹礦山語具方山人傳中程君北狂與居嘉靖庚申歳也余時官北臺狂匿程君邸即同里士紳避不見間從北部羅汝芳氏㳺余故與程羅兩君交善時相往反因晤之聆其言貌若癲狂然間出語有中吾𠂻者時張江陵為少司成予挈之城東僧舎與晤狂俯首凝睇目江陵曰公居大學知大學道乎江陵為弗聞者㳺目而攝之曰爾意時時欲飛却飛不起也江陵别去狂㗳然若䘮曰夫夫也吾目所不及多見異日必當國殺我者必夫也吾黨學移别掉不則當北面矣比部主政錢同文者日與㳺最暱錢故不飲一夕與語有契歡傾一巨卣至謂父母可無斯人不可無云無何程冏丞卒於京邸予有西夏之命狂移舘别邸從之游者諸方技及無賴㳺食者咸集焉余瀕行謂之曰子慎所與哉應曰萬物皆備於我我何擇焉尋分宜子為言官論敗或曰狂有力焉蓋嘗授為箕巫者以密計因逹宸聰也其黨因張之士紳中有遭抑而覬重用者傾貲授室舘穀其徒藉之運竒通奥援禍蓋孕於此矣既冏丞䘮歸狂附舟往過白下以刺投何少司冦何公故前為脱難者嗛狂刺不恭麾之不見狂遂遁廵城臺史捕逮其徒董姓者甘心杖斃以衞狂狂乃得潛依錢主政㳺閩粤間壬戌冬予赴南畿督學遇之潯陽江中予責錢奉命慮囚出不報命而為狂所誘逰方外大不恪趨令絶之北上錢時唯唯謾予而仍與偕逰踰年始至北都書來托予為䕶狂予乃為轉心文招之意其格而易行也狂一夕潛入予署予謂之曰惜哉子懷此志而行若此死矣夫他日予苐繞而墳而三號哀子志也居頃之狂見吾門徒諸不悦一夕復遁去從此依錢東萊或依冏丞弟程學博氏重慶己在越中舘沈茂材沈為子訟詿及之乃復還居孝感隆慶壬申程學博士挈之來我仲子詰之曰子毁家忘軀意欲何如曰姚江始闡良知指眼開矣而未有身也泰州闡立本指知尊身矣而未有家也兹欲聚友以成孔氏家云仲子曰成家欲何如狂云云仲曰嘻道二仁與不仁而己矣孔氏求仁子不仁以若所為求若所欲豈直縁木求魚哉後災且不免矣辭之去余尋起符丞北上狂居孝感撫臺長樂陳公初聞人言有狂有将檄下捕逮其徒檢所嘗與士紳往復書舎之且寓書於余曰初不知為志學人也予報書悉其素如是而中辨其學術蓋所謂差毫釐而謬千里者如人所言有託則重誣也時有娟嫉予者中于政府曰陳公捕治某己得某乃以情囑而庇之故又以書恐陳公曰政府訝公狥人舉義不終也陳公大惴恐亟更檄捕令益峻乃執之新安械繫入楚安陸人乘而文致其辜㑹新城王公繼陳公來撫楚初不詳其始末也走書閩中詢余余即錄前報陳公書報之且寓書李司空託為解司空報曰政府左右且藉此中公也公兹從井救人也狂以是竟斃楚獄無敢收者瘞之㑹城堙踰年余屬其徒取其骸歸孝感與程冏丞合殯焉因其志也而為文以招魂略曰决命捐生汝何營模孔陳迹失孔真孔門宗㫖曰求仁蹈仁而死未前聞仁與不仁㡬微分吾昔與子曽極論子既去余余又移汝轉心文汝心匪石何弗悛塵埃識相汝何明明珠照乘不照身傾萬金之産了不惜犯三公之怒以為欣庸言庸行孔訓靡遵舎南容效禰衡鷽斯之黨又頻頻衆惡歸汝汝何云憶昔與子久要言子卒死兮哭汝墳念子無歸傷我神惟子雄心雖九死其不冺爾憶予言尚自新魂兮歸來寜為璧為祥雲毋寜為厲為妖氛云天臺病叟曰泰州立本説繄豈非孔氏指哉惟孔氏立天下之大本者無所倚而肫肫仁也是故淵淵浩浩若斯巳狂以意識承之不免於刑戮有以也然則狂可殺與曰髙皇有彛訓在惜時不執此正其罪以明學也噫志學孔者㡬微之差且至於此况志異學者乎余懼學者不辨之早至自殺且殺天下故為之傳而附及鄧僧方山人嘗惟處其厚不處其薄山人戾猶龍斯指矣鄧僧見謂先天與後天不相聨屬豈大雄氏不二法門哉傳之亦為學二氏者鑒也鄧豁渠者蜀之内江右族也名鶴少補邑庠弟子員屢試列髙等初聞里中大洲先生談學心厭之己漸有入則時時從之逰即大洲家衆峻拒之勿為阻其家故去邑城三里而近居嘗寓一蕭寺中時往來邑城就大洲問學道經家門過不入兒女子或見邀之牽裾呱呱啼勿顧也時父年七十餘在堂室有女踰笄未嫁又有祖䘮未舉皆不顧一旦髠髪逰方外父尋䘮亦不奔大洲重以為恨為詩書諸名山招之不至慕余仲來余里時年㡬七十矣仲舘之髙筍塘寺屬友人劉姓者昕夕贍之劉事之惟謹不當意而昵里中一狡童祝姓者欲集貲為狡童輸粟為從事卒為狡童欺取其貲而叛乃其子間闗萬里來省見即譙訶居一二宿即斥遣之時余督學南中廵部遇是子于鳳陽道中泣愬如此余哀而斥廪稍資之歸鶴尋北逰衞輝時其宗人為郡司理因依之適大洲起官過衞輝渠出郊迎大洲遥望見驚異已識之下輿把手徒行數十里彼此潸然流涕大洲且泣且痛自悔責曰誤子者余也余學往見過髙致子於此吾罪業重矣向以子為死堕此大罪惡為不可改今子幸尚在可亟歸廬而父墓側終身以補前愆吾割田租百石贍子即作劵給之於時中州數孝亷來就大洲問學大洲令鄧與答問大洲聆己大恚曰吾藉是試子近詣何如時聆子言論乃荒謬一至是耶夫以顔子之質其學惟曰有不善未嘗不知知之未嘗復行如此奈何為此虗罔語誤巳誤人耶重嘆息而去大洲既入京宗人尋以外艱歸渠封還田劵不歸而復逰齊魯間嗣大洲入相乃來京候謁大洲拒不容見而心故又憐之斥俸十金屬里中一仕宦者携之歸仕宦者携至涿州渠病作而仕宦者急於赴仕棄之去竟死野寺中無所殯云余過涿令人訪其遺骸不可得矣耿子曰鄧鶴寓吾里時曽集其言論名曰南詢錄中言色欲性也見境不能不動既動不能不為羞而不敢言畏而不敢為者皆不見性云云余覽此甚惡之曰是率天下人類而為禽獸也渠後寓通州屬其徒刻傳之中無此一叚語毋亦渠自不得於心刪去之耶近麻城令即衞輝司理子亦大洲門人也嘗從余逰為述其始終如此予惟此老敗缺處稍有識者胥能明之顧其捐身忘親陷溺若此所入者何因所為者何事所成者何果至所以迷蔽若此者其㡬微之差必有所在矣昔孟子自任知言蓋知所自生於心而究竟其所終也予覽大洲與吾友胡正甫書深訝其自負張皇輕侮前訓堕罪業而不覺云云其師門亦己重斥之矣吾黨尚多惑之豈不誤哉方山人黄陂人也名一麟後更與時自號湛一嘉靖間弱冠為諸生初婚不安其室託逰方外潛走太和山之陰習攝心術岩居數年其父兄莫知所在也山人故英標雅質靜久稍稍發慧時毗陵唐公養晦在里負世重名山人特徃從之逰一見竒之唐公方鋭志用世時苦倭患言兵事而山人兼嫺武技益竒焉于時吉州羅先生姚江王先生因皆與之逰二先生誘之歸聖學山人時斤斤檢飭即一茶一扇餽遺亦不茍受也一日謂二先生曰吾儕方外學亦有秘訣待人而傳談聖學何容易耶羅先生因密叩之山人自負得息心訣謂學聖者亦須靜中恍見端倪始得羅先生然之偕約之入山習靜吉州諸長者咸尼羅先生不聽遂與王先生偕至山人里居頃之王先生先辭歸羅先生獨留棲道明山中短榻夜坐踰時諗山人無所得憤悔至發疽無恙乃還既還其夫人又殂不及訣以是心益恨山人山人尋趨吉州謁先生先生拒之峻山人出槖金若干跪請願築室受業終身先生以為嘗巳也叱遣焉山人邑邑不得意歸歸時予適訪山人覩其覯羣書盈床意將以博綜為業者一歳孝感程太僕偕永豐梁子期㑹礦山聨數百騎來山人以兩僮舁一籃輿往甫揖梁把山人袂曰假我百金鍰山人曰唯唯即千金如命程梁二君覩其色詞閑雅心欽之遂與欵語説之以所學術干上云異日有遇羅公當拜下風也山人由是漸易夙操挾重貲為薊北逰至雲中依李制府娶二姬余時官内臺山人書來言欲入京予報曰翔而後集慎哉時都門二三老陰招之山人遂入京寓廣慧寺予就密室叩之山人曰予兹行志将納約耳即得巷遇如此敝衲進亦以此敝衲退榮貴非吾願也予曰唯唯顧子所積蓄欲陳於上前者何先山人盡𠂻以告皆儒生常談余哂曰主上明聖如子所欲陳者耳熟稔矣子志雖大其所欲効者無當也子其休哉時都門名公亦多與往還張江陵謂余曰昨晤山人視其神情中若有所為者機逹於目矣予以其意告江陵曰方生此皷從此撾破矣尋嚴分宜任子聞其有黄白術欲紿之挾賄李宗伯知其情密以告予予乃促山人亟避之㑹予有廵西夏命因挈之歸行間一日山人謂予曰吾從此息機志學己顧學以何為宗予曰與友朋披赤剖心可矣山人曰吾志欲以明先天為宗如何予曰披赤剖心即先天也山人惟時若亦易志為學而多機予故説之如此既歸而先所出妻家訟之郡郡守持之而拘辱其伯兄予便為解乃免山人為此滋不得意復出逰汴洛鄖郢間流言籍籍起仲諭之銷聲息影也諸兄懼乃强招之歸予尋闕告在里人于白雲山中築室下惟且孜孜為導鄉善俗事隆慶中羅先生門人胡廬山氏督楚學咎山人往迋其師也檄下有司捕治業就逮山人以計脱走予寓書為解意曰昔山人之招致爾師於里也率其父兄弟侄嚴事之其家遂益勉于為善樂施好義家聲為之一振予謂山人只此是其㧞宅飛昇而嘆服羅先生有過化功山人故未迋而師師亦非為山人迋者學使不然捕之急山人遂走附俠黨邵義受知髙新鄭且誤疑胡公之事由予因於新鄭所搆予譖予潛乘小艇走雲間從㬰徐文貞謀復起也新鄭怒遂矯㫖特察諸臺諫竄予横州余笑曰不意鄉里後生亦能為􅑂如此若為勿聞也者新鄭特疏欲用山人不果無何今上改元新鄭罷相邵義亦誅山人踉蹌走匿太和山循君山中居無何病瘵歸歸而死年甫四紀耳疾之者疑其畏罪托焉而夙竒之者猶紛紛謂其得服食不死也亦可姍笑哉昔山人之出逰假其貲於季父者累千未償及病革時乃手撫中笥曰平生苦心所得惟此蓋以所錄丹方與鉛汞餘餌嘗季父也其家素孝友乃為此閧爭㡬至相夷余為解曰丹能長生山人當不死矣黄金可成渠又何假而貲哉山人多以此愚世士紳世士紳往往為所愚尤可姍笑哉天臺病叟曰嗟嗟世之贊毁亦何常之有初山人一出而士紳相艷竒以為子房長源復生譽何溢也及行敗身沒世遂被以大不韙名禍延家門至形諸志載抑何慘與余去山人居僅五里許計其始終事行知之頗悉惟山人故富室豢養子也一旦脱屣世累兀然巖栖者累年斯不亦飄然風塵外哉彼其時以神情見賞識諸名公非偶也顧諸名公始則奨與太過以滋溢其名根而後復摧抑已甚挺之走險以致堕墜如此假令羅先生始聽其築室山人或亦終身善士既而胡學使不有以激之亦當勉老里中一學究曷至若是狼狽乎雖然使山人始出即遇世廟亦陶仲文等耳安免遺詔之辟晚即大用于髙相當與邵義諸俠駢首圜墻中安能全要領牖下哉以是識世之讚毁得䘮其禍福倚伏不可知也顧予撫兹宇下小子以彼其資知慧方啟而使之向往無路末知所裁語曰範圍而不過曲成而不遺余因有重恧矣明文海巻三百九十九
