body:
  text: 明文海巻四百九餘姚黄宗羲編傳二十三獨行王進徳方孝孺王進徳者名敏台之寜海人其上世多為儒以進士官于家而從兄璞字藴徳尤文而賢進徳兒時從長兄竊觀縣庭見縣令威儀甚盛歎曰吾豈不足為彼耶從兄聞而竒其志因令入縣學為諸生同舍治經為文辭者易進徳年少問其文法靳不以告進徳憤而奮兼日夜攻習不休踰年輙出其上進徳氣剛有亷隅不與人為欵狎其所為事每欲異恒人其家固貧當其為學饑渴歸取杯水飲休休然若飫梁肉者人非其類雖欲飲食之不能也嘗與友夜讀空舍中夜半隣女叩門求宿甚哀其友欲納之進徳叩門厲聲罵曰吾在此誰敢入此門因疾呼使聞于外其友愧謝不敢出聲女逸去後學舍諸輕蕩士指目進徳相戒不敢為非義或飲酒歡笑聞其欵歩即皆畏避始易之者至是皆歎服之㑹太學徴郡縣士遂貢于京師試列髙等廷議遣太學生分教北方賜衣陛見以行進徳得太原時天子方注意太學學中少年被寵頗異甚入預近事外官見諸生秀才從京師來奔走伺候若貴戚重臣其分教者亦多驕横奴視吏民不為禮進徳獨以禮自約束如平時不復過涯分守令敬愛退相語以為儒者不可媚犯藩鎮主將苦其清介異巳欲試其所為召使飲酒床幃婦人于偏室酒酣内進徳其中鑰門以去進徳入見婦人大呼排門取廐馬乘之逃還主將驚謝稱之以為難後徴分教諸生還京師郡邑恐其入奏發巳罪多賂以金錢貪者受至數百千緡進徳一揖辭父老即行無毫髪私奉㫖監收嘉興新城糧後督舟運糧輸蜀峽江悍急行者多舍運舟陸行為自全計進徳坐舟中不顧曰王事君命也死生天命也祇君命以俟天命何以陸為後自全者多以失舟獲罪進徳拜監察御史旬日以例免歸再起為刑部司獄坐㣲法輸作赦歸暴疾五月以洪武十五年五月初八日卒于家年三十有一進徳容貌端偉有威重愼交與不挫屈于人而善事父兄得孝敬意其所從為學從兄藴徳方進徳卒時為紀善于燕王府還書與弟琦相弔極痛惜之琦有文章謹操行有名然常語人謂不若進徳葉伯巨居升郭濬士淵皆竒士伯巨以上書論封事死濬亦言事後以它事死二人皆負豪氣不服人至稱進徳則自謂弗如也贊曰金華胡翰先生髙介人也嘗與余論獨行士自言于衢得一人曰汪瓘余昔至京師見瓘故嘗仕斥不用敝衣繩履間纍然卒以窮死然其論議犖犖不少貶而進徳亦喜瓘為人古所稱方以類聚者進得與瓘之謂耶跡進徳操持可謂篤義君子矣而所遭乃如此子罕言命其以是夫貧堅子王直貧堅子廬陵忠節坊人也自祖父時以貲聞鄉里其後以多故失之至貧堅子有室一區圃數畦薄田㡬百畆在泰和山中頼其利自給無所求于人所居當郡城南門之衝凡仕者冠葢騶從呵擁出入相屬于門而貴㳺子弟豪俠之徒負其所有遨嬉上下裘服相炫耀輿馬相雄髙不絶于路花時月夕長筵廣座笑歌而管絃不在東鄰在西肆貧堅子處乎其中漠然無所慕其于朋友雖汎愛而獨喜從賢士大夫遊唯恐不得當其意與之文則謹藏之自謂金玉不過也予嘗與處而别去者久矣去年予從京師還故鄉貧堅子數訪予不獲見今年七月索租來㤗和布袍草㡌徒歩將入山忽遇之于途遽前執予手曰子豈忘我耶視之乃貧堅子也相慰勞久之問其年與家事對曰吾年則長矣而貧猶在也前四五年有子足任事今巳死矣予貧其有巳乎邀予坐其故人家相與道舊故忽記予所為文朗誦而起曰此非子所作耶憶予年十五六時浪㳺郡城中方以跅弛自奇貧堅子請止其家簞食豆羮相對不厭也一日大雪貧堅子沽酒飲予歌呼大笑以為懽時其弟方結姻醉求予作書予援筆立就貧堅子驚喜絶倒以為竒至今能道之然予亦不自知也方是時心壯氣銳視諸事皆若不足為唯酷好逰覽浮屠老子之宫及青原螺子諸山無不到遇清泉白石長林茂樹輙終日忘歸貧堅子亦忘其貧而與予樂也于今二十餘年貧堅子將老矣而予齒益壯貧堅子猶念之不忘則其意氣之盛可知矣既乂曰吾堅守吾貧而貧亦不吾棄庶㡬有終始者子能不棄我為我傳之庶㡬後世知有貧堅子也昔太原王霸貧居以自樂不求人知有故人子擁騎造其門霸之子見客沮怍不能前而霸亦甚慙之霸之節㡬變矣所以克終者其妻之助也士大夫晚節保守之難如此貧堅子其慎之歟貧堅子劉其姓士𢎞其名疾退子楊士竒疾退子者吉之西昌人鄧氏鄧故西昌儒家宋神童復之其五世祖也兄子方及弟子靜博學雄文為鄉碩師號二鄧其伯父父也國朝四川鹽運司經厯崇志以文學徳操與楊子淵羅子理齊名稱楊羅鄧者其兄也疾退子名學詩字崇雅有孝行元季之亂安成冦猝入西昌恣殺掠母劉氏老病不能行負之走避隘巷空舍中踰日冦窮索獲之解所懐金得免繼復有獲之求金巳盡矣斮之㡬斃繼乂有冦至見老母哭其傍甚哀憫之予善藥傅創乂解衣覆之久乃蘓起負母走避逺處道遇渠冦詢知其儒者憫之予酒肉乂為詩嘉之遣其下導出城渡河使逺去疾退子少好學負材具有用世之志謂功名可以俛首取其父母亦驚詫其不凡曰是必復振吾宗者皇明既定天下御史劉昭先知縣事以材舉江西行省留為宣使則慨然嘆曰士當局促效奔走人階庭下哉即謝病歸無㡬縣復舉送于朝授固陵稅課使忻然曰乗田委吏可以行道到官持亷施寛商賈爭欲出于市所入貲羨舊額數倍秩滿徙平陽持巳愛民如固陵甫再嵗兩目發内障䘮明郡以聞命致仕歸則戚然傷其命之窮也自號疾退子疾退子耿介修潔氣岸軒豁不屑意生事為文章長于詩蚤䘮妻無子既罷官歸輙貧無侍養者是時里中故人親友及好義長者往往多在知疾退子生平抱負爭延致之疾退子挾僮奴日東西往來飲酒談笑相懽時為歌詩以自適縣令丞皆知而禮之疾退子亦數出直言以禆其政之闕故疾退子雖廢于盲而其所適于中者猶不廢也歴三十餘年向之故人親友及好義長者或死或逺出在外里後生晚出雖以士名有不能究知疾退子平生矧令丞乎于是疾退子巳八十餘氣力益衰貧益甚冠帯垢敝十數年不得易衣薄歉歉嚴冬不能出門户然其所操執益堅不屈人片語不合拂袖去不顧不肯一毫脂韋淟涊徇人以求所欲孔子云歳寒然後知松栢後凋疾退子非其人歟建寜陳士希為縣文學獨愛重疾退子官滿將去念疾退子將無以為終也倡率素所還往者為備歛塟之具廼去自士希去知重疾退子者加鮮矣今有人焉猝起日暮之間其勢鉅貲厚足以葢一鄉不必其有徳即一鄉之人奔走阿附之恐後至于疾退子則漠然如秦人視越人之肥瘠何趨向之異乎古哉葢又有以盛衰存沒為戚疏而施諸其同氣者非獨于疾退子然也然疾退子之為人世其可少乎孫僉事石珤孫博字約之河間景州人也倜儻有志節通毛詩博極羣籍尤精語孟酣飫沈泆著為論說深得聖賢之指諸儒競傳誦之釋褐為歴城教諭登進士授禮科給事中論事不避強梗聲振鎻闥成化庚子汪直用事立西厰宻令左右親校覘察公卿以下官得失輙注考語乘間聞奏有所黜陟或徑自捕繫考鞫内外恐忷里巷細人爭詣厰汚衊官吏權柄下移謁私門行苞苴者益大起博上疏論直盜弄國柄作福作威使君相廢職漸不可長疏入上令毁西厰直大恨之㑹北兵冦雲中直與都御史王越保國公朱永受詔北伐將團營軍五萬人出山後直乃奏用博紀官軍功隂用中傷縉紳危之博曰論諫吾職也榮辱生死命也將安避乎遂行既扺雲中敵勢猖獗每出戰輙令紀功官隨行營博雖書生意氣峭㧞兜鍪繡袂彎兩石弧馳突萬衆間如徤將時或聚議機務益侃侃雄辨指畫利害不少挫衂直始心敬之越亦從旁時時救䕶得不死師還論功陞山西按察司僉事博既禁闥舊臣乂襟韻疏暢居法司鬱鬱不得志㑹當道時欲有所指摘遂乞致仕還鄉里茅茨蕭然未嘗有戚色日役蒼頭課田園或遇故人賔客觴咏不倦凡仕宦至景州者猶時時勞問𢎞治甲子知州馬某貪虐毒民博諫之不懌遂以事侵之博發憤詣京師論其罪惡及人命十餘事得賜詔獄問且遣使者詣景州覈實知州度不可觧乃佯為謝罪置酒毒死聞者莫不憤歎初公且死囑其夫人曰吾以孤直不容于朝幸奉先人之業得休息田畮敎誨子弟百無所恨今乃為羣小所害命也夫我死勿埋吾屍庻幾朝廷覺悟得為百姓除暴去亂吾且含笑九原矣遂死馬後竟伏誅太史氏曰先子按察晉陽嘗與孫公為寮宷珤兄弟又嘗侍几杖質問九經親見其為人卓犖開爽有古國士之風然慮事不欲為太深又不設城衛故始以此立節中以此去位終以此致死語云直如弦死道邊其信然哉何奉祠公陳昌積夫遺寵利脫屣功名之士何可易也掀揭建立輝煌經綸表人楷俗之事必薄世俗希羨忘積習狎溺而紛華不撓于内者乃克堪之固非沾沾進退顧此惜彼者之可任也漢班固撰人物表置介子推母子于智人之列與方叔仲逹等同品豈不以鴻性鶴舉視附龍鱗而成駿業者俱命代之才伯仲之能也惟各如志遂命以適于所乘之㑹爾然咸聲施于後世能不絶假令介子推踐方叔之位則其所著于廊廟亦必如詩頌所稱方叔元老克壯其猷云惡肯僅僅成就餘力而讓能耶故曰人有不為也而後可以有為余傳何奉祠公遺榮之事知公藴藉甚逺因歎班固評擬之㫖㣲㣲而核焉奉祠公諱某字某其先鳯翔人父諱某仕元任四川廉訪使過閬中縣覩其俗質直可居解官居䦘中遂為䦘中人閬中四川轄縣公以故吏與編氓雜處見父老行輙執卑處羣從怡怡如梓里項輩閬人至忘其為故吏公亦不自知其寄寓也課勅子弟毅甚每讌見輙條家行所宜為督以躬行故諸子恒凛凛為慤循奉祠公最甚公當少小時昕夕不敢離父母所眡父母舉指察其情所安者倣習不替廉訪公手所閱經史受之公刻行細讀暗乙其詞㫖精切者撮為私淑雖兵革衝斥竄避亡虛夕然必袖書自隨行坐諷誦久之融貫徹繹操紙治文根經串史詞意邃茂于是川中諸儒自以為植經規行不及先生矣明興太祖髙皇帝首建太學詔天下各選孝弟博聞之士及香才通一藝以上充弟子員受業祭酒閬中推擇公以應詔公就學益力裹火炊糗寒則注沸水于壺納卧被下熨足以乙書雖遇勝節放假坐號舎理常調自如數年足跡不履成賢街外其刻苦如此是時碩儒壊材咸集國學獨推先生行藝為冠首積分升率性堂生員洪武九年上念北平為山陜堂奥思建壯王以綏轄之察諸子中惟成祖文皇帝聖仁天錫文武具禀宜鎮雄畿特册封于燕即今北京云尋令祭酒擇上舍生經術通明器識老誠者備官屬從徃祭酒以公名上詔授燕府奉祠者禮官也專典祠事其慎重非他王國臣云公慨然曰半爵一職即足以自獻所患不忠勤爾何唧唧計寒顯而自限也營職務甚勤每遇月祀嵗蒸及禋望之事輙先盥祓入坐齋室預習升降獻奠儀度爼器等物皆袒韝自浴日一躬省養犠香幣靡宻檢䆒不遺遇同列執事者預舉上所頒戒詞戒之有不曉解亹亹指喻無敢一人慵渙以故祠事常秩甚當上意上雅重之常宣至帷幄屏人咨議公具以質對不可則力諍于上前曰臣下求訢合于主固其常情若逆知其不可而謬順以攫榮恐不旦暮而伏斧鑕矣固何敢上察其無他腸又能以惇恂長者處官親洒翰為忠恕二大字賜之公稽首謝曰臣愚經術淺無能賛助宏謨殿下寵臣甚盛飛白賜臣教臣為臣之方臣之子孫與臣誠當身先犬馬以報公感殊知退為忠恕銘以自盟且以策諸來世其辭贍核可紀云其後成祖入靖内難承繼大統踐皇帝位藩邸諸臣各次第登朝廷茹常為兵部尚書張玉丘宗等各封公侯餘膺顯秩者不可勝數公獨稱疾固不起以奉祠終于家夫榮寵爵級世之龍斷所決性命以必趨者也彼披褐結履伏衡引軛之羣或以賤技角抵之戲曾蒙人主一瞬或以奉葢屬車提引厠窬之役備末𨽻于左右非有大因縁之資也一聞飛龍之㑹逺者累趼擔囊賂眤臣以通故近者當駕伏蒲自陳說其出身其乏因縁者則連疏聯紙摭假借之事飾麗美之辭援旁證曲傳之故務聳九重聽聞而動其舊憐百出秘刺削首領而營之不得不巳此無他葢欲承日月之盻以發越其門戸爾幸而蒙右眷位膴貴則坐髙輿披賜服操呼吸風濤之勢以恫愒薫赫人使趨巳不暇視黼裳玉紱為生賦世襲之具晝忖宵摩以覔持保之術茍可媒購不辭臧獲婦寺語態而甘心之甚則叙感訴昔簌然出無情之涕固要上意有組刖之所不為而為之矣嗚呼朝廷之士入而不能出又何惑其然也奉祠公躬被文皇帝寵知有年國邸羣臣鮮出其右顧棄槖嚢之富貴而甘遯丘壑舍魚水之君臣而與牧叟為伍殊異乎世之嗜習矣豈聞介子推之風而興起耶抑所托𤣥㣲不可測度耶昔漢憲王聰逹有才宣帝奇愛之㡬代儲者數矣既出封淮陽帝懼其習驕欲諷以推讓之臣念韋𤣥成陽狂讓侯兄經明行髙特起廢為中尉憲王卒賴其風導以寢異志此有備無患之明騐也向使公不樂畎畆進序朝請上重公耆行或簡相漢藩施其温克抑畏之規自然消其携心必不至自蹈非常以貽大戾公之功名烈烈與𤣥等無疑矣而乃去彼取此其志誠深逺難測哉世傳成祖能容仗節髙尚之士培治世精神以故公得竟行其志云昌積曰揚子雲有言君子徳名為㡬蜀嚴湛㝠不作苟見不治茍得久幽而不改其操雖隨和何以加諸然實蜀之産也古謂蜀多大隠之士以奉祠公觀之詎不然耶公托素人主又非若嚴湛㝠乏平生于巖著也棄華而就髙尚尤不其難哉萬崖黄公耿定向余覩士競紛華閭閻日瘁仰思古人不可得見時為之噓唏嗟嘆焉乃一再見萬崖黄公始爽然坐銷鬯然愉快自慶庶㡬猶及見古人云憲副黄公諱巻萬崖其别號也由嘉靖己丑進士官比部出補山西僉憲晋陜西少叅巳晋憲副即解紱歸歸年才四十五耳公敭歴中外嘉靖辛酉余被命往廵西夏由秦嶺道經商洛間因止郵亭覩壁間多公題咏知公曾宦此中㑹父老祇迎者百十數予訊之曰汝等猶識黄公耶僉對曰是我黄青天也拊循我民如子去之㡬廿年矣徳猶一日也言時哽咽欲涕焉即此証之迺孫所述宦績似猶未盡狀也公歸葢即真明農云春夏間家衆悉驅之田作而獨與其配操杵臼炊釡作飲食躬荷而饁之嘗假農具鄰舍鄰舍子欲舁送之公曰毋此何時也假我具即徳厚矣奈何又妨汝務遂自肩之如田焉公性故孤介悃朴而趣興甚豪雅嬰情山水間域中山嶠水浚靡不遊至或乘敝輿或䇿欵叚或曵杖躡蹻翛然咏嘯飄飄若仙也家去城邑四十里而近經嵗不一至至則市童撫掌歡呼相指曰黄公來矣葢騐其輿敝陋云公居常好客客至座巳徐起臨庖服犢鼻衣治具具無兼味治畢乃盥手更衣出即新婣上客率以為常余一日偕元孚同進士候公公歡甚縱談名理因及疆場時事奮然有請纓之志移日不輟巳有婢從屏間禀曰烹鷄且熟矣請割公曰少需葢劇談方適無間也有頃婢禀如初公又曰少需如是者三而公談益劇乃命婢曰汝姑自割既共饌出胾肋狼藉不為意也公間起入室余從之闞其室一榻蕭然不啻僧舍巳余時若泠然噓以清風灑然沃以瓊漿也退謂元孚曰吾與子今幸遊羲黄世矣相與嗟嘆不置云耿子曰夫世約其躬為苦節行者類多齷齪迂滯不能事事彼葢矯飾為名髙者也其真漓其性牿矣公率性之真從心之安孟子所謂人有不為可與有為者非乎藉今世誠重用之請纓之志計能酬賞不虛也余又嘗聞里中前輩若鄒劉周李董阮諸公其風軌大都如是顧所覩記者惟公因憶父老相傳宣正成𢎞間里中民物殷盛閭巷熈熈有以也乃今里中身有完服面無菜色父子兄弟相聚而無愁嘆聲者盖鮮曷故哉吏治之曰媮也吏治之日媮則士節之不立也士節之不立則古道之寖㣲而紛華之為蔀甚也即吾一鄉而天下可類知巳嗟嗟孰謂公履為細謹哉公葢古道之碩果矣余兹重有慨焉爰拾公一二淺事為外傳云黄忍江先生耿定向余束髪為諸生偃蹇黌序葢十年所更庠師凡六七大都如出一型其不為子雲所譏刺者尠矣嘗觀里中諸寒士擔簦徒跣為俯仰計良苦辛也嵗時矉容聚族而謀則又以無能修儀為楚或稱貸拮据以往至學宫前頭岑岑加重足儃儃不敢前既候之署閽人預探有贄巳乃出見見則往往以怒容盛氣臨之巳納贄則手受納袖中黙以指度腆菲稍如意始漸降顔色相遇否則怒益熾設諸難督過若責償夙逋然諸低徊逡廵曲辭窽說第得免譙訶以出則自幸矣乃富室豪族子弟至則輙欵狎杯酒交歡甚至謔浪媟䙝無復夷等而富室貴族子弟出則揚揚捫腹都騶奴横行衢街間覩朋儕旁若無目流視之而巳余每慨然太息焉不謂禮義相先地而陵夷至此極也乃晚而始遇忍江黄先生先生故未嘗為嶃絶竒異之履恂恂然貌若不勝衣言若不出諸口中介而氣和色温而語簡與人無封而中鍳井井余友彭公輔故孤寒士先生一見輙器之謂余曰彭生有仙風道氣子得友矣先生遇余两人至輙留坐竟日談亹亹無倦余兩人亦樂聽先生語每至深夜忘歸也先生嘗謂余曰吾初授官命下時一夕念之不寐竊謂官以訓導名豈漫哉即字義從言從川朝廷欲吾諄諄以善言與諸生相切劘也而導字又從首從辵從寸則乂欲吾首躬行以倡諸生不可踰尺寸矣非徒言已也顧名思義厥任為艱耶先生故愽洽多聞從先生游者咸虛往實歸欣得聞所未聞憶余嘗病先生為述范仲淹示子書曰青年何苦多病豈不以攝生為意耶時時為余稱引其鄉先正若虛齋之操履次崖之風節淨峯之長厚其行事甚詳竟日無一庸俗談也維時邑庠士餘五百人賢者孚不肖者格貧寒者依依若怙而貴富驕蹇者亦戢戢歛飭先生故未嘗一厲聲色也僚胥鄙且悍日爭腐鼠相詬閧而顧獨嚴敬先生不忍忤一日有緇衣欲葺梵宇持籍丐助于先生先生曰嗟吾亦孔氏之守祀也吾目擊吾孔氏之宫不足以妥靈而不能謀吾時心惻矣而顧為若謀耶邑令聞之感乃亟為葺理殿廡先生言不辯而中類如此尋先生陞海康掌教行邑之士紳弟子不戒而追送者無慮數千車馬塞途先生瀕行留衣一襲遺代已者寓相傳意尋代先生者雖不能盡繼先生志然亦感先生意指待諸生不為虐矣先生陞任後越㡬年而余弟子健補弟子員弟時猶髫也釋莱歸而邑邑無歡余詰之曰父兄覩汝髫年得泮游為榮矣而不色喜何也弟曰吾向以學宫仁義府也而今殆異所聞矣吾始偕諸士謁先師繼升堂伐鼓拜揖禮成庠師儼然升座吾儕肅而侍意初筮必有發教吾方延跂以聆乃庠師旋從中座起掀髯信眉而揚聲曰若等公堂幣金尚不具何也今而後不辦者視吾夏楚諸士慄然而恐吾為之赧然汗下矣若斯而謂仁義府耶游之不足榮矣余曰咨小子後矣惜未得侍余忍江先生也先生任海康凡㡬年聞海康士徳先生如余邑相率建祠生祀之後先生思告歸余時典學南畿也聞之寓書部使者屬遂先生志先生歸而婣友周元孝氏來督學元孝故亦出先生門者鄉人士相率屬元孝當優遇先生聞元孝之校士于泉也敬謁先生先生儼然以師道臨之更不一語及私元孝以此益欽先生余鄉人士相傳以為美談云余茲承乏來意先生尚無恙將操几杖而秉度也居無何而先生之訃聞嗚呼悲哉余少年盛年聞先生諸緒論憬憬奮起私心謂即不敏當亦少自樹不負先生乃今髪種種然而齒纍纍而猶然支離悠謬若此不已重負先生哉嗟夫悲矣先生諱傑字一貞泉之同安人學者稱為忍江先生云朱貧士馮從吾朱藴竒字子節西安右䕶衛人家貧甚僦屋而居妻子織網巾為生讀書古東嶽廟嘗併日而食宴如也聴講寳慶寺寒暑不輟一日其子因差徭下獄㑹天雨四日不食氣息淹淹待盡矣時嶽廟有大戸收糧米者黄冠憐之因取其米少許為粥以食藴竒知其故心計以為此官米何可竊也曰死即死耳豈可以臨死改節竟不食而亦不明言其故同舎生素誚藴竒迂矯至此始深服其節操以為不可及因出其食食之藴竒曰此可食也由是始得不死而劉孝㢘必逵聞而義之因白于衛官始出其子于獄當路諸公及士大夫有髙其節而周之者必擇而後受一毫不肯妄取先是嘗之市途有遺網巾二頂其子拾之藴竒曰彼之失猶我之失也使我失此二網則舉家懸磬矣即命其子追而還之其人感甚欲分其一為謝藴竒竟謝不受父早喪飬母曲盡其孝母沒毁㡬滅性人死多用青烏之説秦俗當于某日某時避殃殃謂死者之魂来辭家而家人或庶㡬見之者也而見之者㓙以故當避此其説幻妄不足道而秦人多惑之藴竒曰使果有此殃也吾猶可藉此一見吾母使果無此殃也吾又何為避之伏棺痛哭竟不避而卒亦無恙人稱其孝秦俗之惑由此少破年五十一以布衣終盖已酉八月十八日也生平苦節篤行一步不茍人共稱之歿之日貧無以為殮葬聞義而賻者㡬數百人始克襄事有子五人貧㡬不能聊生長安令修齡楊公為搆屋三楹居之仍匾其門曰髙士藍田令思軒梁公祭之以文學臺青巖段公亷憲祥宇李公各捐金優恤其後段公匾曰處士李公匾曰懿行範俗聞者莫不咨嗟太息以為為善之報而諸公之髙誼尤近世所罕覩風世勵俗功盖不小云馮子曰學問之于人甚哉朱生操行如是固天性使然亦講學之效不可誣也生每赴余寳慶之㑹見衣敝履穿人或誚之以為貧至此不聼講可耳余聞之應曰如此是聴講者皆當鮮衣華服以飾觀美矣誚者語塞嗚呼死生亦大矣朱生死且不貳天下又何物能貳之哉傳云見利思義見危授命若朱生者亦庶幾近之矣明文海巻四百九
