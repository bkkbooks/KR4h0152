body:
  text: 明文海巻四百十五餘姚黄宗羲編傳二十九方技齊琦王禕齊琦者字仲圭饒之徳興人也别號易岩時人咸稱之曰易岩先生因不復以字行曾祖明善宋端平甲午鄉貢進士祖潛起父顗世以儒學名初齊從祖有夢龍貴澄者皆明易専心邵子之學而貴澄嘗註經世觀物等書琦讀其遺書自幼即領悟其㫖又廖應淮者建昌人精通邵氏學在宋季言國家運祚禍福如指掌而琦同郡傅立號初學者實得其傳立當至元間以其學顯世祖甚敬信之又祝泌者亦琦同郡人其於邵學尤精與應淮同時出其學則有子傳焉琦既承家學又兼得祝氏傅氏之傳葢其為術由聲色氣味以起數而推􅿵乎元㑹運世即其數之所見天地氣運之否泰生人吉凶休咎之徴無不可以預定嘗至衢有周孚者邀詣其家問以家事琦曰自子造居屋必厯一紀乃始生育人今滿一紀則嵗中當添三子男今年十二月七日明年二月九日及八月子生之月日也孚補縣幙軄待次于家明年三月當上琦曰子赴官在今年九月乎與同適市指一女子曰此為子家八月生子者也孚因納為子妾未㡬其前官有故九月即之官十二月七日某妻果産子二月九日子婦復育子至八月所納妾亦生子矣當琦留孚家有二客扣門者琦聞其聲輙曰二人必皆三品官然不久且至坐重罪二人者一為潭守别多喇卜丹一為衢守將趙甲後果俱以罪廢同郡馬氏者故相家琦至其家隔垣聞婦人聲曰是婦来嵗其舉子乎其夫曰吾婦年巳四十矣生七女子矣縱娠亦恐非男耳琦曰不然来嵗舉子當在秋中癸酉日明年八月癸酉果得子至休寧金南庚逺迓之問曰今日至吾家首何見琦曰子家首見我者與我同甲辰生人也比至果然琦曰子家今夜子時後山有不動之物動明日辰時前山有不動之物動是夕家後土庫棟橈崩明日大石墜前山巔金氏以問琦曰土庫崩萬二千時内損小口大石墜萬二千時有一布衣受宣命者未三年其孫自經死既三年其子用大臣薦授武畧將軍平江萬户府鎮撫江浙行省平章呼圗克布哈致琦問動静琦曰朝廷今日除公矣問軄為何琦曰軄三品耳且當理財賦後旬日報至果以其日除大府卿又曰然公還半塗必改除入中書明年當復為平章矣比至中途果改除中書右丞明年果復為平章有進士三人曰扎拉伊埓台曰伊納克哈雅曰布延同謁琦琦各問其今何官扎曰我以階五品矣琦曰子當作郡推官而散階仍五品又曰子當作郡守階三品又曰皆非也子當作行省理問官散階四品也巳而江西行省遷調除潮州推官湖廣行省遷調又除髙州捴管而中書皆不准復除湖廣行省理問官所得散階亦悉如所言伊曰我亦當及五品階琦曰子不能五品也府判縣尹縣尹府判府判縣尹終六品耳已而中書除興和府判官而福建遷調又除崇安縣尹厯十月中書不理俾復任興和比至興和而過期不得任再授延平路判官又以故不赴復除浦城縣尹以終布曰吾階當至六品琦曰子可及五品為漕運官已而除海道鹽運千户果五品也江浙提學黄晉卿年六十有六將致仕琦謂之曰来年乃可致仕當帶秘閣軄名七十後于是起位一品然公性褊少容止二品耳于是明年以秘書少監致仕至七十有三復召為翰林直學士陞侍講學士而歸樞宻參議歸暘謁琦琦謂曰公旦夕當陞軄本府尋任風紀為三品又登政府二品矣頃之陞樞宻判官即擢河西㢘訪使遂拜四川行省參政中書平章嘉琿致琦問琦曰不出旬日公出中書矣越九日除大司農又問琦琦曰當復逺出耳俄遷平章行省江浙琦嘗語所知曰自今以往天下多故不十五年京邑南遷千里矣未㡬海内大亂朝廷削弱而權臣挾皇嗣駐河南今且十五年又嘗語人曰南士行入風憲矣方是時省臺擯南人不用已久不久果有詔用南人其術精驗類如此琦㳺京師名貴人非可與語者雖以禮来致末嘗往門外候謁者車馬如市亦未嘗輕語人而樂從韋布之士㳺琦嘗用薦者署初庵書院山長至正已丑自京師歸屛居番陽山中邈焉若與世絶或勸之出則曰時行時止吾豈固必者哉嵗庚子乃携妻子至金陵居焉琦于經史悉究通大義雖精于數學然耻于術數名家講論易道剖析理趣多昔儒所未發立言建議必要歸于仁義道徳有闗于世教故士大夫間用是尤尊慕之贊曰先天之學秦漢而下唯魏伯陽能知之至陳圗南乃發其秘一再傳而邵子出焉邵子之言曰先天學心法也萬化萬事何莫不由心生心者理與數之會而世之言邵氏學者乃唯論數而舍理何哉隂陽五行有是理斯有是氣及其生物氣聚而有形則象與數所從出理者太虚之實義數者太虚之定分治亂禍福不能外于數而數曷嘗離于理乎故夫數囿于理理函乎數者先天之教也世傳邵子以其學授王豫天恱天恱蜀人死無所授以所著皇極經世軆要一篇内外觀象數十篇者同塟玉枕中未百日吳曦叛盗發塜出其書道士杜可大得之以授廖應淮而應淮所著又有𤣥𤣥集畫前妙用等書數十萬言悉以授傅立而齊琦得之則其淵源所自来可徴巳余數從琦㳺聞其言未嘗不以理為本蓋程子所謂加一倍法者然世之淺于知琦者徒謂其于數為精何也余故取世之稱琦者録其一二而特論其學術之大要著于兹郭守敬王禕郭守敬字若思順徳邢臺人也生有異質不為兒童戯祖榮號駕水翁通五經精于算數水利之學時鎦秉忠張文謙張易王恂皆同學州西紫金山而秉忠與翁為同志友以故守敬就學秉忠所秉忠學通天人守敬學之悉得其㫖要而又兼承家學之懿故其所造有異于尋常年十五六時得石本蓮花漏圗即能凖其式為之又得尚書璇璣圗規闕為之尤極其精順徳城北有石橋嵗久為泥潦所沈沒無能知者守敬輙審其地形而求得之人以為神中統三年文謙為中書左丞薦守敬習水利且精制度有巧思徵詣􅊴召對稱㫖乃面陳水利六事其一中都舊漕河東至通州權以玉泉水引入行舟嵗可省僦車錢六萬緡通州以南于蘭榆河口徑直開引由䝉村跳梁務至揚州還河以避浮鷄􅞇盤淺風浪逺轉之患其二順徳達活泉開入城中分為三渠引入城東可灌溉其地其三順徳灃河東至古任城失其故道沒民田千三百餘頃此水開修成河其田即可畊種其河自小王村經滹沱合入御河通行舟楫其四磁州東北滏漳二水合流處開引由滏陽邯鄲洺州永平下經鷄澤合入灃河其間可溉田三千餘頃其五懐孟沁河雖巳灌溉尚有漏堰餘水東與舟河餘水相合開引東流至武陟縣北合入御河其間溉田亦可一千餘頃其六黄河自孟州西開引少分一渠經由新舊孟州中間順河古岸下至温縣南復入大河其間亦可溉田二千餘頃上覽其奏喜曰成吾國家之務者其斯人乎即授提舉諸路河渠明年加授銀符副河渠使至元元年從文謙行省西夏興復瀕河諸渠先是西夏瀕河五州皆有古渠在中興州者一名唐来長四百里一名漢延長袤二百五十里其餘四州又有正渠十各長袤二百里支渠大小共十八計溉田可九萬餘頃兵亂之後廢壊淤淺守敬為行視因故道而濬導之更立閘堰役不踰時而諸渠皆通利夏人徳之為立生祠于渠上二年遷都水少監入奏言臣向自中興還順河而下四晝夜至東勝可通漕運及見香泊烏梁海古渠甚多皆可修理又言金時自燕京之西麻峪村分引盧溝東流穿西山而出是謂金口其水自金口以東燕京以北可溉田利甚溥兵興以来典守者懼有所失因以大石塞之今若按視故道使水得通流上可以致西山之利下可以廣京畿之漕納其議行之又言當于金口西預開減水口西南還大河令其深廣以防漲水突入之患衆皆服其識十二年丞相巴延捴師南伐宋議立水站詔守敬行視所便自陵州至大名又自濟州至沛縣又南至吕梁又自東平至綱城又自東平清河逾黄河故道至與御河相接又自衛州御河至東平又自東平西南水泊至御河乃得濟州大名東平泗汶與御河相通形勢為圗奏之悉如其言十三年都水監併入中書工部除工部郎中是嵗改修新厯立局以庀事先是秉忠言大明厯自遼金承用二百餘年浸以後天宜在所立改未及用其議而秉忠沒至是江南平天下混一上思其言遂舉行之詔守敬與恂率南北日官分掌測驗而文謙易領其事前中書左丞許衡亦叅領焉守敬乃言厯之本在于測驗而測驗之器莫先于儀表今司天渾儀宋皇祐中汴原所造與此處天度不符比量南北二極差約四度表石年深亦復欹側宜盡攷其失更置之又擇髙塏之所造木為重棚創簡儀髙表用相比覆又以為天樞附極而動昔人嘗展管望之未得其的作候極儀極辰既得天體斯正作渾天象象雖形似莫適所用作仰儀以表之矩方測天之正圎莫若以圎求圗作仰儀古有經緯結而不動是之作立運儀日有中道月有九行合而作證理儀表髙景虚其象非真作景符月雖有明測景則難作闚管凡厯法之驗在于交會作日食月食儀天有赤道輪以當之兩極低昻標以指之作星晷定時儀其器凡十有三又作正方按丸表懸正儀凡四等為四方行測者所用又作仰規覆矩圎異方渾盖圗月出入永短圗凡五等與上諸儀互相叅攷十六年改而為太史院以恂為太史令守敬同知太史院事乃進所造儀表式于榻前指陳理致一一周悉自朝及夕上不為倦因奏唐開元問僧一行令南宫說測景天下其可考者今十三處今疆宇比唐尤廣必多方測驗而後日月交會分數時刻之不同晝夜長短之不同日月星辰去天髙下之不同可得周知上可其奏乃置監候官十四人分道而出先從南北取直立表以測景南海北極出地二十五度夏至景在表南長一尺一寸六分晝五十四刻夜四十六刻衡嶽北極出地二十五度夏至日在表端無影晝五十六刻夜四十四刻岳臺北極出地三十五度夏至景長一尺四寸八分晝六十刻夜四十刻和林北極出地四十五度夏至景長三尺二寸四分晝六十四刻夜三十六刻鐵勒北極出地五十五度夏至景長五尺一分晝七十刻夜三十刻北海北極出地六十五度夏至景長六尺七寸八分晝八十二刻夜一十八刻繼又測驗上都北極出地四十二度少北京北極出地四十二度强益都北極出地三十七度少登州北極出地三十八度少髙麗北極出地三十八度少西京北極出地四十度少太原北極出地三十八度少安西府北極出地三十四度半强興元北極出地三十三度半强成都北極出地三十一度半强西涼州北極出地四十度强東平北極出地三十五度太大名北極出地三十六度南京北極出地三十四度太强陽成北極出地三十四度太弱揚州北極出地三十三度半闕州北極出地三十一度半吉州北極出地二十三度半雷州北極出地二十度太璚州北極出地十九度太十七年新厯成守敬與諸太史同上奏曰帝王之事莫重于厯自黄帝迎日推策帝堯以閠月定四時成嵗舜在璇璣玉衡以齊七政爰及三代厯無定法周秦之間閏餘乖次至漢造三統厯百三十年而是非始定東漢造四分厯七十餘年而儀式方備又百三十一年鎦洪造乾象厯始悟月行有遲疾又百八十年姜岌造三紀甲子厯始悟以月食衝檢身宿度所在又五十七年何承天造元嘉厯始悟以朔望及弦皆定大小餘又六十五年祖沖之造大明厯始悟太陽有嵗差之數極星去不動處一度餘又五十二年張子信始悟日月交道有表裏五星有遲疾留逆又三十三年鎦焯造皇極厯始悟日行有盈縮又三十五年傅仁均造戊寅元厯頗采舊儀始用定朔又四十六年李淳風造麟徳厯以古厯章蔀元首分度不齊始為捴法用進朔以避晦晨月見又六十三年僧一行造大衍厯始以朔有四大三小定九服交食之異又九十四年徐昻造宣明厯始悟日食有氣刻時三差又二百三十六年姚舜輔造紀元厯始悟食甚泛餘差數以上計千一百八十二年厯經七十改其創法者十三家自是又百七十四年惟我聖朝統一六合肇造區夏専命臣等改治新厯臣等用創造簡儀髙表憑測到實數所攷正者凡七事一曰冬至自丙子年立冬後依每日測到晷影逐日取對冬至前後日差同者為凖得丁丑年冬至在戊戌日夜半後八刻半又定丁丑夏至得在庚子日夜半後七十刻又定戊寅冬至在癸卯日夜半後三十三刻已卯冬至在戊申日夜半後五十七刻半庚辰冬至在癸丑日夜半後八十一刻半凡減大明厯十八刻逺近相符前後應凖二曰嵗餘自鎦宋大明厯以来凡測景驗氣得冬至時刻真數者有六用以相距各得其時合用嵗餘今攷定四年相符不差仍自宋大明壬寅年距至今日八百一十年每嵗合得三百六十五日二十四刻二十五分其二十五分為今厯嵗餘合用之數三曰日躔用至元丁丑四月丁酉望月食既推求日躔得冬至日躔赤道箕宿十度黄道箕九度有畸仍憑每日測到太陽躔度或憑星測月或憑月測日或徑憑星度測日立術凖算起自丁丑正月至乙卯十二月凡三年共得一百三十四事皆躔于箕與月食相符四曰月離自丁丑至今每日測到逐時太隂行度推算變從黄道求入轉極遲極疾并平行處前後凡十三轉計五十一事内除不的者外有三十事得大明厯入轉後天又因考驗交食加大明厯三十刻與天道合五曰日交自丁丑五月以来憑毎日測到太隂去極度數比擬黄道去極度得月道交于黄道共得八事仍依日食法度推求皆有食分得入交時刻與大明厯所差不多六曰二十八宿距度盖自漢太初以来距度不同互有損益大明厯則于度下餘分附以太半少皆私意牽就未嘗實測其數今新儀皆細刻周天度分毎度為三十六分以距線代管窺宿度餘分並依實測不以私意牽就七曰日出入晝夜刻大明厯日出入晝夜刻皆據汴京為凖其刻數與大都不同今更以本方北極出地髙下黄道出入内外度立法推求每日日出入晝夜刻得夏至極長日出寅正二刻日入戍初二刻晝六十二刻夜三十八刻冬至極短日出辰初二刻日入申正二刻晝三十八刻夜六十二刻永為定式所創法者五事一曰太陽盈縮用四正定氣立為升降限依立招差求得毎日行分初末極差積度比古為宻一曰月行遲疾古厯皆用二十八限今以萬分日之八百二十分為之限凡析為三百三十六限依垜疊格差求得轉分進退其遲疾度數逐時不同盖前所未有三曰黄赤道差舊法以一百一度相減相乗今依算内勾股弦矢方圎斜直所容求到度率積差差率與天道實為脗合四曰黄赤道内外度據絫年實測内外極度二十三度九十分以圎容方直矢接勾股為法求毎日去極與所測相符五曰白道交周舊法黄道推變白道以斜求斜今用立渾比量得月與赤道正交距春秋二正黄赤道正交一十四度六十六分擬以為法推逐月毎交二十八宿度分于理為盡是嵗有詔頒行新厯賜名授時于是厯雖已頒而推步之式立成之數猶未有成書會太史卒守敬乃比次篇類整齊分杪裁為推步七巻立成二巻厯議擬稿三巻轉神選擇二巻上中下三厯注式十二巻二十二年陞太史令遂奏上其書又為時候箋注二巻修改源流一巻儀象法式二巻二至晷景考二十巻五行細行考五十巻古今交食攷一巻新測二十八舎雜座諸星八宿去極一巻新測無名諸星一巻月離攷一巻並藏之官二十八年有言漕事利便者或謂灤河自永平挽舟踰嶺而上可至上都或謂瀘溝自麻峪可達尋麻林上命守敬裁度之其言灤河者至中道不可行而言瀘溝者亦以石阻舟不可通皆罷守敬乃别陳水利十有一事其一言京城運糧河不用一畮泉舊源别引白浮泉水西折而南經瓫山泊自西水門入城環滙淤積水潭復東折而南出南水門合入舊運河毎十里一置閘北至通州凡為閘七距閘里所止重置斗門互為堤閼以過舟止水上覽其奏甚喜有㫖令速行乃復置都水監命守敬領之庀事于二十九年春明年秋告成賜名通恵河興役之日上命丞相以下皆親操畚鍤為侣而守敬指授之其建閘處往往得地中舊置磚木人謂非偶然先是通州至京城陸運糧嵗若干萬石方秋霖雨驢畜死者不可勝計及是舟運既通公私便之是秋上自上京還過積水潭見舳艫蔽水大恱特賜守敬錢萬二千五百緡仍以舊軄兼提調通恵河漕運事守敬又欲于澄清閘稍東引水與北壩河接置閘麗正門西流舟楫得環城往来事不果行三十一年拜昭文館大學士知太史院事大徳二年成宗用廷臣言開鐵幡竽渠召守敬至上都議守敬言山水頻年暴溢渠堰非廣五十步不可而執政者吝于工費縮其廣三之一明年上北狩會大雨山水下注渠不能容漂沒人畜廬帳㡬犯行殿上謂宰臣曰郭太史神人也使用其言豈有此耶守敬以年老絫請謝事不允七年詔内外官年及七十並聽致仕獨守敬以先朝舊臣朝政賴以施為不許其請其後凡翰林太史官不致仕蓋自守敬始守敬以純徳實學為世師法其學所最長者曰天象衍數水利事功初守敬之在西夏也嘗遡窮河源又自孟門以東循黄河故道縱廣數百里間皆為測量地平或可以分殺河勢或可以灌溉土田具有圗誌又嘗以海面較京師與汴梁地形髙下之差謂汴梁之水去海甚逺而流峻急京師之水去海甚近而流舒緩其言皆信而有徵古厯天周與嵗周小餘同于日度四分之一漢魏以来漸覺不齊而破分之論起守敬乃用百年為率小餘之下增損各一以之上推往古下驗方来無不脗合乃積年日法寫分換度之說皆所不用其所為厯測驗既精設法詳具今且九十年無分毫差者舊儀悉多蔽礙且距齒有度刻而無細分以管望星漸外則所見漸展尤難取的守敬所為儀但用天常赤道四游三環三距設四游于赤道之上而附直距于四游之外與雙環兩間同結環距端測日月星則以兩線相望取其正中所當之刻之度之分之秒至為切宻八尺之表夏至景長尺有五寸千里為差一寸其說見于周官周髀唐一行雖嘗疑之而未之有改守敬乃為表比古制加五倍上施横梁毎日中以符竅夾測横梁之景折取中數視舊法但取表端之景者加審矣又嘗造七寳燈漏毎大明會置殿中其中鐘鼓皆應時自鳴又造櫃香漏及屛風香漏行漏以備郊廟行幸所用又起靈臺水渾運渾天漏大小機輪二十有五皆刻木為衝牙轉相撥擊上為渾象㸃畫周天星度日月二環斜絡其上象則如天左旋環則各依行度退而右轉又欲依張平子為地動儀及候氣宻室皆究極其妙而未就也王恂以學自負者也毎詣守敬見其匠制輙深嘆服之許衡學為世師語及守敬則以手加額曰天祐我元故生斯人也延祐三年卒年八十六臣禕曰自古國家之興相與鞏丕基而宏大業者固資龎臣碩輔之力而又必有博識特見之君子通天人之學而明于術數事功者出其間以致夫彌綸之用然後一代之治可得而成焉觀乎世祖之世若鎦秉忠竇黙王恂郭守敬是已守敬視諸人雖稍後其尤稱宏博而傑特者乎夫自金宋以来學者務攻辭章以譁世而取重鮮有措諸實用者况乎天象術數水利事功之故當世不講久矣而守敬獨能任其絶學精神心術之所及度越古人逺甚用能成一代之制而示百王之法元之為國于是繼古帝而無媿矣嗚呼賢才之生天實使之夫豈偶然哉吕復戴良滄洲翁者姓吕氏名復字元膺晚號滄洲翁其先河東人也東莱先生成公與其季忠公自河東徙婺吏部郎知台州事諱寳之者復自􅄔徙鄞家焉大父克徳父居敬比三世皆早喪翁幼孤且甚貧獨依母氏居既長從鄉先生受尚書周易久之棄去習詞賦後以母病復喜攻岐扁術而恨其無師一日遇三衢鄭禮之逆旅中即知為醫中毛遂也毎謹事之鄭亦見翁醇謹無他頗心愛翁因呼翁語曰我有古先禁方及色脈藥論諸書知人生死定可治甚精我年老欲具以授公翁即避席再拜盡得其書受讀可一年所輙試之有驗然尚未精也鄭復教翁日記診籍攷方藥驗可否悉為叅訂不使毫釐失理又若干年所積為人治診病效無不神自是鄞之病家及凡寓公過客以病留鄞者必歸翁翁皆樂應之浙省平章尊達納實哩在帥閫時病無睡睡則心悸神懾如處孤壘而四面受敵兵達旦目眵眵無所見耳瞶瞶無所聞雖堅卧宻室睫未嘗交也即選醫之良者處劑累月勿瘉後召翁診翁切其脈左闗之陽浮而虚察其色少陽之支外溢于目眥即告之曰此得之胆虚而風諸公獨治其心而不祛其胆之風非法也因投禁方烏梅湯抱胆丸日再服遂睡熟比寤病如失郡人蘇伯支病衂旬浹不止時天暑脈弱衆醫以氣虚不統血日進耆歸茸附彌甚則告術窮家人皆容貌變更蘇亦流涕長澘泣命其子强翁診翁至未食頃其所衂血已三覆器矣及切其脈兩手皆虚芤右上部滑浮數而躁且其鼻赤查而色澤即告之曰此得之湎酒酒毒暴悍而風暑乗之熱畜于上焦故血妄行而淖溢蘇曰某常饑走赤日巳而醉酒向風卧公診當是翁為製地黄汁三升許兼用防風湯半劑飲之立驗童芳仲幼女華病嗜卧頰赤而身不熱命小兒醫三四人療之皆以為慢驚風屢進攻風之劑兼旬不愈翁切其脈右闗獨滑而數他部大小等而和因告童曰女無病闗滑為有宿食意乳母致之乳母必嗜酒酒後輙乳故令女醉非風也及詰其内子李李曰乳母近掌酒庫鑰茍竊飲必任意潜使人視卧内有數空罌榻下翼日拘其鑰飲以枳梖葛花日三二服女起如常時童良輔子年十二患内癰腹脹臍凸而頗銳醫欲刺臍出膿其母靳不許抱子獨泣童馳告翁邀與俱及至卧内見一野僧擁爐熾炭然銅筯一二枚烈火中瞪目視翁曰此兒病癰發小腸茍舎刺臍無他法翁喻之曰臍神闕也鍼刺所當禁矧癰舎于内惟當以湯丸攻之茍如若言必殺是子矣僧怒趨而出翁投透膿散一匕明日膿自氣分潰繼以十竒湯下善應膏丸句浹瘥趙氏子病傷寒十餘日身熱而人静兩手脈皆伏俚毉以為死也勿與藥翁診之三部舉按皆無其舌胎滑而兩顴赤如火語言不亂因告之曰此子必大發赤斑周身如錦文夫脈血之波瀾也今血為邪熱所摶淖而為斑外見于皮膚呼吸之氣無形可依猶溝隧之無水雖有風不能成波瀾斑消則脈出矣及揭其衾而赤斑爛然即用白虎人参湯化其斑脈乃復常繼投承氣下之瘉發斑無脈長沙所未論翁盖以意消息耳普濟寺主僧體無為病蹶已三日不知人翁切其脈右口之陽弦而遲少隂之脈堅而勁不滿四十動而止此寒邪乗于腎肝所致法當以辛甘發其陽為作闕湯三升頓服遂起對客如不病然一藏已絶去此若干日當復病病即死果死如其日臨川蕭雲泉羽客也偶游鄞造翁告曰某病兩目視物皆倒植屢謁名醫勿喻翁曰視一物為二視直為曲古人常言之視物倒植誠所未喻也願聞其因雲泉曰某常大醉盡吐所飲酒熟睡達曙遂病翁切其脈左闗浮促餘部皆無恙即告之曰當傷酒大吐時上焦反覆致倒其胆腑故視物皆倒植此病由外因而致内傷者也法當復吐以正其胆腑遂授藜蘆𤓰蔕俾平旦湧之湧畢視物不倒植東臯寺僧述無作族姓孫氏一女子病厲風為夫所出家貧不能致醫無作過翁約曰吾女姪病可念早舁致就翁診顧僧舍不宜能速為我治療乎翁曰諾他日匿患者于宻室召翁診其脈翁曰脈来疾而去遲上虚而下實盖得之醉酒接内而風毒乗之今雖髪光眉墜然鼻根幸未陷肌肉幸未死遂以防風通聖而益以下藥下淤血數升及蟲穢青黑物併進蘄蛇長松等湯丸復佐以雄黄楓油作膏摩之逾月瘥餘姚州守郭文煜病噦十餘日州之以醫名者畢至悉以附子丁香等劑療之益甚翁切其脈陽明大而長右口之陽數而躁因告之曰公之噦即古之欬逆由胃熱而致或者失察而反助其熱誤矣飲以竹茹湯未終劑噦止帥府經厯哈克繖侍人病喘不得卧老醫製麻黄之劑以散其肺邪翁後至診之脈口盛人迎一倍厥隂弦動而疾兩尺俱短而離經因告之曰病盖得之毒藥動血以致胎死不下奔廹而上衝非風寒作喘也乃用催生湯倍芎歸煮二三升服之夜半果下一死兒喘止哈克繖密嘱曰病妾誠有懐以室人見嫉故藥去之衆人所不知也老醫聞之慚而去樞宻董孟起在帥閫時命翁臨診俾審新故病翁切其脉兩寸俱浮弦脈法浮為風弦為痛兩寸屬上部即告之曰明公他無所苦首風乃故病也盖得之沐而中風當發先一日則劇劇則大吐而後已董笑曰然余少時喜沐毎迎風以晞髪因致頭作痛痛則一如公所言公善診幸予療也為製龍腦芎犀丸四分二之一遂愈帥府從事特穆爾實呼病下痢完榖衆醫咸謂洞泄寒中日服四逆理中輩彌劇翁診其脈兩尺寸俱弦長右闗浮于左闗一倍其目外眥如草滋盖知肝風傳脾因成飡泄非蔵寒所致飲以小續命湯損麻黄加术三五升痢止續命非止痢藥飲不終劑而痢止者以從本治故也純孝廟祝楊天成女夀在室病不月命媍人醫療之不得其名狀及五閱月其腹如有姙求其色脈即怪因紿之曰汝病非有異夢則鬼靈所憑耳女不答趨入卧内宻語其侍媪曰我去夏追凉廟廡下薄暮過黄衣神心動是夕夢一男子如暮間所見者即我寢親狎由是感疾我慚赧不敢以告人醫言誠是也媪以告翁翁曰女靣色乍赤乍白者鬼也脈乍大乍小者祟也病因與脈色符雖劇無苦乃以桃仁煎下血類豚肝者六七枚俱有竅如魚目病已延慶寺僧珂瑩中病翁診其脈獨右闗浮滑餘部皆無恙曰右闗屬脾絡胃挾舌本盖風中㢘泉得之醉卧當風而成瘖珂舞手索筆書几上曰酒吾先佛所戒自祝髪来未常飲露坐當風誠所不免其師天紀在座即怒訶曰汝處别業時毎飲輙醉乃諱疾自悞耶翁取荆瀝化至寳丹飲之翼日遂解語湖心寺僧履師者偶搔中疥忽自出血汩汩如湧泉竟日不止痬醫治療勿驗邀翁往視履時已困極無氣可語及持其脈惟尺部如蛛絲他部皆無即告之曰夫脈血氣之先也今血妄濫故榮氣暴衰然兩尺尚可按惟當益榮以瀉其隂火乃作四神湯加荆穂防風不間晨夜併進明日脈漸出更服十全大補一劑遂痊全本然病傷寒旬日邪入于陽明俚醫以津液外出為脈虚自汗進元武湯以實之遂致神昏如睡熟其家邀翁問死期翁切其脈皆伏不見而肌熱灼指即告其季曰此必榮血致斑而脈伏非陽明病見隂脈比也見斑則應候否則畜血耳乃去衾裯視其隠處及小腹果見赤斑臍下石堅且拒痛為作化斑湯半劑繼進韓氏生地黄湯逐其血是夕下黑矢若干枚即斑消脈出後三日又腹痛遂用桃核承氣以攻之所下復如前乃愈内子王病傷寒乃隂隔陽靣赤足踡而下痢躁擾不得眠論者有主寒主温之不一余不能决翁以紫雪匱理中丸進徐以氷漬甘草乾姜湯飲之愈且告之曰下痢足踡四逆症也茍用常法則上焦之熱彌甚今以紫雪折之徐引辛甘以温裏此熱因寒用也聞者皆嘆服集賢修譔南宏逺奉㫖往閩諭土猾余蠻子余嘗戮人尊爼之間以恐之遂驚氣入心疾作似心風比啣使命来鄞疾屢作逐逐奔走不避水火與人語則自賢自貴且或泣或笑翁切其脈上部皆弦滑左倍勁于右盖痰溢膻中灌心胞因驚而風經五臓耳即投以湧劑湧痰涎一頮器徐以驚氣丸服之盡一劑病瘳郡吏虞東村内子王年盛嗜酒且善食忽疾作肌肉頓消骨立翁診其脈則兩手三部皆洪數而左口尤躁疾遂語虞曰此三陽病由二水不能勝五火乃移熱于小腸不癃則淋王曰前溲如脂者已數日語未竟趨入卧内漩及需其溺器以視則如餁釡置烈火湧沸不少休翁以虎杖滑石石膏黄栢之劑清之痛稍却而湧沸猶爾也繼以龍腦辰砂末之蘸以椑柿食方匕沸輙止餘姚余慎言子孟仁病寓湖心僧舎以求治翁至其處而孟仁方飯坐甫定即摶爐中灰雜飯猛噬且喃喃詈人翁命左右掖之切其脈三部皆弦直上下行而左口尤浮滑盖風痰留心胞症也法當湧其痰而凝其神既湧出痰沬四五升即熟睡竟日乃寤寤則病盡去徐以治神之劑調治之神完如初御史王彦芳内子病飡泄彌年衆醫皆謂休息痢療以苦堅辛燥之劑弗效翁診其脈當秋半雙弦而浮即告之曰夫人之病盖病驚風非飲食勞倦所致也以肝主驚故虚風自甚因乗脾而成泄當金氣正隆尚耳至明春則病將益加法當平木太過扶土之不及其泄自止夫人曰儂寓南閩時平章燕公以銅符宻授御史俾出入自如吾兒闗闗玩弄久之遂失去平章一日追符甚急儂心懼焉由是疾作公指為驚風信然乃用黄㹀牛肝和以攻風徤脾之劑服之踰月泄止郡守李孝文妻母龎病小腹痛衆醫皆以為瘕聚藥之浹月勿愈繼命翁診翁循其小隂脈如刀刄之切手胞門芤而數知其隂中痛癰結小腸也即告之曰太夫人病在幽隠不敢以聞幸出侍人宻語之乃出老嫗翁曰患者苦小腸癰以故臍下如瘕聚今膿已成腫廹于玉泉當不得前後溲溲則痛甚嫗拜曰公神人也所苦一如公所言遂用國老將軍為向導挾麒麟竭琥珀之類以攻之膿自小便潰應手愈浙東憲使曲出道過鄞病卧涵虚驛召翁往視翁察色切脈則靣帶陽氣口皆長而弦盖傷寒三陽合病也以方渉海為風濤所驚遂血鬱而神懾為熱所摶遂吐血一升許且脇痛煩渴譫語適是年嵗運左尺當不應其輔行京醫以為腎已絶泣告其左右曰監司脈病皆逆不禄在旦夕家人皆惶惑無措翁曰此天和脈無憂也為投小柴胡湯減葠加生地黄半劑後俟其胃實以承氣下之得痢愈副樞張息軒病傷寒踰月既下而内熱不巳脇及小腹偏左滿肌肉色不變俚醫以為風矢所中膏其手摩之浹四旬所其毒循宗筋流入于睾丸赤腫若瓠子􅅑醫刺潰之而左脇腫痛如故既選醫之尤良者在門更召翁診翁以闗及尺中皆數滑而且芤因告之曰脈數不時則生惡􅅑闗内逢芤則内癰作季脇之腫癰作膿也經曰癰疽不得頃時回下之慎勿晚乃用保生膏作九衣之以乳香而用硝黄作湯以下之下膿如糜可五升許明日再圊下餘膿立瘥樞府陳斷事内人病召翁視翁切其脈左口弦而亂餘部皆和翁即起宻告陳曰夫人病當隂中痛而出血且少隂對化在玉泉心或失寧則玉泉應心痛痛則動血而與經水不相闗蓋得之因内大驚神懾而血菀陳曰公醫誠良也致病一如公所言翁乃為製益榮之劑且納藥幽隠再劑即無苦翁之治病雖若不甚搆思然其鈎取古法洞中肯綮多類此其于醫門羣經及古今方論無不考索其要歸他老諸醫為術之精粗施治之工拙亦皆品彚區别無一義之或遺所考羣經及古方論諸多不録有曰内經素問世稱黄帝岐伯問答之書及觀其㫖意殆非一時之言其所撰述亦非一人之手劉向指為諸韓公子所著程子謂出于戰國之末而其大畧正如禮記之筆于漢儒而與孔子子思之言並傳也盖靈蘭秘典五常正六元正紀等篇無非闡明隂陽五行生制之理配象合徳實切于人身其諸色脈病名鋮灸治要皆推是理以廣之而皇甫謐之甲乙楊上善之太素亦皆本之于此而㣲有異同醫家之大綱要法無越是書矣然按西漢藝文志有内經十八巻及白氏扁鵲二内經凡三家而素問之目乃不列至隋經籍志始有素問之名而不指為内經唐王氷乃以九靈九巻牽合漢志之數而為之註釋復以隂陽大論託為其師張公所蔵以補其亡逸而其用心亦勤矣惜乎朱墨混淆玉石相亂訓誥失之于迂疎引援或至于未切至宋林億髙若訥等正其誤文而增其缺義頗于氷為有功今于名篇之内註意與經相類者仍斷章摘句而釋以已意冀與同志商確非敢妄議前修也内經靈樞漢隋唐藝文志皆不録隋有鍼經九巻唐有靈寳註及黄帝九靈經十二巻而巳或謂王氷以九靈更名為靈樞又謂九靈尤詳于鍼故皇甫謐名之謂鍼經即隋志鍼經九巻茍一書而二名不意唐志别出鍼經十二巻也所謂靈寳註者乃扁鵲太元君所箋世所罕傳宋季有靈樞略一巻今亦湮沒紹興初史崧併是書為十二巻而復其舊較之他本頗善學者當與素問並觀盖其㫖意互相發明故也本草三巻舊稱神農本經漢藝文志未嘗録至梁陶隠居始尊信而表章之謂此書應與素問同類但後人多更修飾之耳秦皇所焚醫方卜術不與故猶得全録及遭漢獻之遷徙晉懐之奔迸文籍焚㸏千不遺一今之所存有此三巻是其本經然所書郡縣乃多後漢時制疑張仲景華元化所記舊經之藥止三百六十五種陶氏進名醫别録亦三百六十五種因而註釋分為七巻唐李英公世勣與蘇恭叅考得失又增一百一十四種分為二十巻世謂之唐本草宋劉翰等又附益醫家常用者一百二十種偽蜀孟昶亦命其臣韓保昇等以唐本圗經叅比增廣世謂之蜀本草至宋掌禹錫等補註新舊藥合一千八十二種定以白字為神農所說黑字為名醫所傳草石之品可謂大備他若雷公以下蔡邕徐大山秦承祖王季璞鄭䖍諸公所譔名本草者凡三十九部三百五十巻雖顯晦不齊無非輔翼舊經焉耳近代陳衍作本草折衷王好古作湯液本草亦刪繁之遺意也竊意舊記郡縣古今沿革不同及一物而根苗異名或同名異質而主療互見者尚須考定俾歸于一可也難經十三巻廼秦越人祖述黄帝内經設為問答之詞以示學者所引經言多非靈素本文盖古有其書而今亡之耳隋時有吕博望註本不傳宋王惟一集五家之說而醇疵或相亂惟虞氏粗為可觀紀齊卿註稍宻乃附辨楊元標吕廣王宗正三子之非周仲立頗加訂易而考証未明李子埜亦為句解而無所啟發近代張潔古註後附藥殊非經意王少卿演繹其說目曰重元亦未足以發人之藴余嘗取諸家之長先訓詁而後辭意竊附鄙說其間以便後學未敢以為是也傷寒論十巻乃後漢張機仲景用素問熱論之說廣伊尹湯液而為之至晉王叔和始因舊說重為譔次而宋成無已復為之註釋其後龎安常朱肱許叔㣲韓祗和王實之流因亦互有開發而大綱大要無越乎吐汗下温四法而已盖一症一藥萬選萬中千載之下如合符節前修指為羣方之祖信矣所可憾者審脈時汩王氏之言三隂悉多斷簡况張經王傅亦往往反覆後先亥豕相離自非字字句句熟玩而精思之未有能造其閫奥者陳無擇常補三隂症藥于三因論其意盖可見矣近人徐止善作傷寒補亡恐與先哲之意不合余因竊舉大要以補成氏之未備知醫君子或有所取也脈經十巻乃西晉大醫令王叔和本諸内經素問九靈及扁鵲仲景元化之說裒次而成實醫門之龜鑑診切之指的自與近代倣託鈐訣者不同厯嵗既深傳授不一各秘所蔵互有得失至宋秘閣林億等始考正謬妄頗加改易意其新譔四時經之類皆林氏所增入陳孔碩何大任毛升王宗卿輩皆常審訂刋傳今不多見近人謝堅白以其所蔵舊本刻于豫章傳者始廣余常摭其精語并引内經之辭作切脈樞要之巻非敢剪其冗複間亦補其闕漏且附私說各條之下以與同志研究耳脈訣一巻乃六朝髙陽生所譔託以叔和之名謬立七表八裏九道之目以惑學者通真子劉元賓為之註且續歌括附其後辭既鄙俚意亦滋晦今代王光國刪其舊辭而益以新語既不出其畦徑安能得乎本原餘如清溪徐裔甄權李上交輩皆自譔著凡十餘家亦毎蹈襲前說在叔和之所不取讀者止記入式歌以馴至乎脈經可也病源論五十巻乃隋大業太醫博士巢元方等奉勅撰集原諸病候而附以養生導引諸法裒成一家之書醇疵相混盖可見矣宋之監署乃用為課試元復循襲列醫門之七經然附會雜糅非復當時之舊具眼者當自見之吳景賢亦作病源一書近代不傳太始天元玉冊元誥十巻不知何人所作厯漢至唐諸藝文志俱不載録其文自與内經不類非戰國時書其間有天真皇人昔書其文若道正無為先天有之太易無名先于道生等語皆老氏遺意意必老氏之徒所著大要推原五運六氣上下臨御主客勝復政化淫正及三元九宫太乙司政之類殊為詳明深足以羽翼内經六㣲㫖五常政等篇太元君扁鵲為之註猶郭象之于南華非新學之所易曉觀其經註一律似出一人之手謂扁鵲為黄帝時人則其書不古謂扁鵲為秦越人則傳中無太元君之號醫門倣託率多類此元珠宻語十巻乃啟元子所述其自序謂得遇元珠子而師事之與我啟萌故自號啟元子盖啟問于元珠也目曰元珠宻語乃元珠子宻而口授之言也及考王氏素問序乃云辭理秘宻難粗論述者别譔元珠以陳其道二序政自相戾意者元珠之名取諸䝉莊子所謂黄帝遺元珠使㒺象得之之語則師事元珠子而號啟元者皆妄也宋髙保衡等校正内經乃云詳王氏元珠世無傳者今之元珠乃後人附託之文耳雖非王氏之書亦于素問十九巻二十四巻頗有發明予常合素問觀之而宻語所述乃六氣之說與髙氏所指諸巻全不侔疑必刋傳者所誤也原其所從盖攟摭内經六㣲㫖及至真要等五篇洎天元玉冊要言而附會雜說其諸紀運休祥之應未必可徵實偽書也茍啟元别譔果見于世又豈止述氣運一端而已覽者取其長而去其短可也中蔵經八巻少室山鄧處中云華先生佗游公宜山古洞值二老人授以療病之法得石牀上書一函用以施試甚驗余乃先生外孫因弔先生寢室夢有所授獲是經于石函中其託為荒誕如此竟不考傳獄吏焚書之實其偽不攻自破按唐志有吳普集華氏藥方别無中蔵之名普其弟子宜有所集竊意諸論非普輩莫能作鄧氏特附别方而更今名耳盖其方有用太平錢并山藥者盖太平乃宋熈陵初年號薯蕷以避厚陵偏諱而始名山藥其餘可以類推然脈要及察聲色形症等說必出元化遺意覽者細為審諦當自知之聖濟經十巻宋徽宗所作大要祖述内素而援引六經旁及老氏之言以闡軒岐遺㫖政和間頒是經于兩學辟雍生吳禔為之解義若達道政紀等篇皆足以禆益治道啟廸衆工餘如孕元立本制字命物二三章釋諸字義失于穿鑿良由不考六書之過瑕瑜俱存固無害于美玉也其論諸醫有曰扁鵲醫如秦鑑燭物妍蚩不隠又如奕秋遇敵着着可法觀者不能測其神機倉公醫如輪扁斵輪得心應手自不能以巧思語人張長沙如湯武之師無非王道其攻守竒正不以敵之大小皆可制勝華元化醫如庖丁解牛揮刀而肯綮無礙其造詣自當有神雖欲師之而不可得孫思邈醫如康成註書詳于制度訓詁其自得之妙未易以示人味其膏腴可以無饑矣龎安常醫能啟扁鵲之所秘法元化之可法使天假其年其所就當不在古人下錢仲陽醫如李靖用兵度越縱舎卒與法會其始以顱方著名于詩盖由扁鵲之因時所重而為之變爾陳無擇醫如老吏斷按深于鞫讞未免移情就法自當其任則有餘使之代治則繁劇許叔㣲醫如顧愷寫神神氣有餘特不出形似之外可模而不可及張易水醫如濂溪之圗太極分隂分陽而包括理氣其要以古方新病自為家法或者失察剛欲指圗為極則近乎畫蛇添足矣劉河間醫如槖駞種樹所在全活但假氷雪以為春利于松栢而不利于蒲栁張子和醫如老將對敵或陳兵背水或濟河焚舟置之􅂮地而後生不善效之非潰則北矣其六門之法盖長沙之緒餘也李東垣醫如獅弦新縆一鼓而竽籟並熄膠柱和之七均由是而不諧矣無他希聲之妙非開指所能知也嚴子禮醫如歐陽詢寫字善守法度而不尚飄逸學者易于摹倣終之漢晉風度張公度醫専法仲景如簡齋賦詩毎有杜陵氣韵王徳膚醫如虞人張羅廣絡原野而脫兎殊多詭遇獲禽無足算者翁之學問該博非獨醫門為然他如經史傳記諸子雜家以及天文地志厯算兵刑食貨卜筮釋老之書亦靡不精求熟玩故其見之言語文字皆有考據可徵不為浮葩以炫世至于為詩尤雄徤蒼古有古作者之遺風常以晦迹丘園薦為台州仙居縣儒學教諭後調臨海及陞本郡教授俱不上善著書有内經或問靈樞經脈箋五色診竒胲切脈樞要運氣圗說養生雜言脈緒脈系圗難經附說四時爕理方長沙論傷寒十釋運氣常變釋松風齋雜著稿各若干巻傳學者為人恭勤詳緩與人交欵欵常若不自足狀貌不踰中人語言如不出諸口卒然遇之不知其學之富也年老無子而有女四人生女不生男人以太倉公方之論曰自古疾醫叅之以九蔵九竅之變通之以五味五榖之資五色五氣五聲以視其生死五毒五藥以攻其疾疢其為術博矣故非聰明洽達知夫天地神祗之次眀乎性命吉凶之數處虚實之分定順逆之節以與神聖為徒未易以臻此若滄洲翁豈近是乎翁之為醫一遵古昔神聖之格言而且博考載籍叅取化原著之于方冊余論次翁事頗采其意云使翁自拔醫術之中一意儒學著書以垂世可謂稽古之士矣袁廷玉戴良袁廷玉名珙以字行其先南昌人也五世祖子誠仕宋知臨安府以事至鄞遂留家焉父寧老元翰林檢閱博學善文廷玉幼襲其學于書多所觀覽迨壯益爽秀常游東海補怛洛伽山僧有别古崖者善相見而竒之以為眼光如電法當以術顯因紿令仰視赤日待兩目盡炫濳布赤黑豆于暗處俾辨之又夜懸五綵絨線窓紙外使映月光别其色所試已皆中然後悉以相家之術授焉且曰子後當出我右慎勿妄泄也其法候夜將二鼓或五鼓罷燃兩炬坐對占者數以其炬左右視形狀氣色既得第叅以所生年月而吉凶之徵有若契節然在西浙與憲史陳泰項昕沈博鄭文祖游謂泰曰君神庭金櫃有黑氣日中當黜謂昕地角有魚鱗文不三日家將火謂博中部赤白氣貫㸃㸃如梅花三月之内有父服謂文祖印堂山根紅氣見夏秋當赴辟辟必南地泰于其日午漏上都沁布哈僉事糾退之昕次日所居屋灾博以父憂去果閱三月文祖為福建帥史亦如期憲副李志憲僉都沁布哈富珠哩育布延達實史銓有所問廷玉答曰李公蘭臺色惨將旬日死沁以天庭色紅四十九日遷官南方魯公口有赤光而青黑乗之三百日内不禄布公隂位㣲紅主禄位然不宜動動則凶矣史公禄庫權凖赤黑氣如雲行兼之法令有白氣三七日將解官李以次年已月卒沁除福建憲僉湖南路監郡南臺經厯三仕皆南地魯至期以䘮赴布復軄後寄死野人家史以言不行去在鄞南臺大夫布哈特穆爾公由閩海道鄞見廷玉廷玉曰公神氣嚴肅舉動風生大貴驗也但印堂司空有赤氣到官一百十四日當奪印然守正秉忠名垂後世願自勉布署臺事于越果為張太尉逼取印綬抗節而薨見江西憲副程徐曰君帝座上黄紫氣見千日内有二美除但冷笑無情非忠節相也徐于一年後拜兵部侍郎陞尚書後歸欵為吏部侍郎劉仁本張啟源鄭文寳丘楠請占廷玉視仁本清中之濁視啟源濁中之清視文寳視楠九州光澤精神澄徹曰公等不十年官二品但晚節皆得譴吾且見之其後俱授樞宻分院副使改物後啟源文寳就戮仁本死獄中楠亦責貶啟源在分院時廷玉曰公山根赤色浮見二日内當有火厄次夕啟源家燬質明又曰火氣猶未退啟源猥曰我家一夕盡尚何火耶俄而莊所亦告焚南臺中丞伊埒布哈公治書胡公均兵部郎中揭公汯將赴北會于上虞廷玉曰伊公膚似凝脂目如㸃漆聰睿而文官二品今秋有中臺之命然不宜往往則不祥公問為何廷玉曰面有紫赤氣如玉印文玉印除拜象也然紫赤火色豈宜往水位胡公鼻梁聳得隂貴助司空揚州分野紅氣潤澤六八日内除南方臺職揭公骨氣巉岩舉動端慤館閣器也但神庭金櫃黑氣如弓此去大不利縱有美擢而到任難矣伊沿海而北果為倭㓂所害妻妾皆被擄胡拜侍御史開臺于閩揭與倭冦之難脫身赴北授秘書少監未任而國事去廷玉回鄞見方國瑛曰公神氣不常舉止急速性靈而氣暴當以武處官十年至一品乃見其從子明鞏明敏曰明鞏眼長而眉太重額廣而日角不瑩非喪父官不顯也明敏邉地赤氣如刀劍紋二九日内因父功進爵可二品國瑛官浙江分省後至平章政事明鞏父死于兵對品襲爵至分省左丞明敏從父克太倉有功拜分省叅政張彦珪曾詵葉堅見曰張君且貴法曰肉滑筋蔵骨更清早年名位達天庭況凖頭權印黄紫氣如圎珠百五日内當有功除到官必五馬職也然不可言善終曾君魚尾笏紋朝耳耳無輪郭他日死將無歸官亦不過五品且毛髪乾枯眼光顧地主身死而禍起葉君首尾不欺權衡職也然氣色青浮主七七日内恐懼成疾張以公事朝京授樞宻副使兼台州路總管兵出髠而遁卒追殺之曾為理官死兵發其屍以戮葉為左司郎中得驚而病風陶凱張順祖楊天顯往見問之廷玉曰凱五岳朝揖而氣色未開五星分明而光澤未見宜蔵器待時不十年以文進為異代臣子官二品顯名其在荆揚間耶順祖面如洗而中凖黑蘭臺惨福去禍来非夀兆也天顯色青身小語言清亮亦主其文進且邉地有氣如行雲日出交夏四七日逺動得吉凱當内附之初禮部尚書湖廣叅政順祖次年病死天顯授差赴北為省都事趙宜訥陳麟求鑒廷玉曰趙君色温而黄氣和而恱當應憲臺薦官五品但騰蛇氣居火星内過三年方蒞事陳君正面外青内黄憂中有喜況青龍氣在天庭若祥雲瑞氣横貫秋月進官累累可四品然終不到職趙後三年赴僉都元帥任陳擢户部主事改瑞安知州陞秘書監丞俱不克赴謝理洪珏胡熊黄有猷請于廷玉答曰謝君五岳峻四水相朝官可至理問然朱雀氣居印堂當貴人見怒罷職所幸司空黄光明潤来年五月必復任洪君面方如田富貴相也但妻位氣青主損兩配生平多心術長子必見刺貶胡熊氣固清瑩然貴而未實惟喜明堂兩㸃如紅豆端陽後當實授也黄君中正廣而印堂清地閣豐而人中斜既富且貴但不久耳謝果以方丞相怒被黜後二年除省理問次年五月到官洪後有田五十頃官至省員外兼理問一妻死其一出也長子刺屯逺地胡于後五月實授省都事黄後有田七十頃為省理問許方蒋杰黄益謙皆廷玉宻友廷玉常語方神氣澄徹學堂氣全優必以文顯一萬日内官至三品然宜早進日下白氣散年夀上一季之間弟將溺死又左右魚尾氣動須急成㛰否則遲一千日盖内外三陽雲行紋見必大服動也􅇐有剛毅汪洋之氣亦主以文顯十年内官四品但眼尾山根氣滯其娶當遲益謙氣有餘而形不足後當處冗職而富難久也方後二月次弟過桃花渡果溺水死姻將成果以父䘮止後果為南昌知府三年再任還鄞迎其母廷玉曰公兩臉桃花氣見兼之魚尾赤氣貫入太陽法曰游魂無宅死將臨焉母不可往次女將亡涉秋必皆應也因諫其母得不往八月以疾卒于家又一月次女死南昌而自身死金陵獄杰為刑部主事姻尚未成益謙為司稅官而家日落其術之精類如此廷玉常言吾毎占人吉凶即知其心之善惡心善必吉其不善者反是以故占其吉則喜苟凶則怒輙念之為之反覆化導期轉禍以為福人不畏義理而畏禍患廷玉之言格心改行者至衆廷玉豪放曠達重義輕財與人言相未常及于私家徒四壁處之晏若然介直無阿人有求占者某忠某詐輙憑占繇以斷不少廻䕶或以是咎之論曰占人形狀氣色以定其吉凶盖自古記之矣荀卿著書乃列非相篇以拒之豈不以其相形而不論其心哉廷玉之於是術必以形狀氣色本之于其心心有善惡則見于外者亦從而異焉于是吉凶之徵應矣嗚呼若廷玉者其可盡拒之耶姑布子卿之後善相者衆矣然必以袁天罡為稱首廷玉豈其苗裔也哉明文海巻四百十五
