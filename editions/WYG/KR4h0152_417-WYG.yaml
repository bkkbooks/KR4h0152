body:
  text: 明文海巻四百十七餘姚黄宗羲編傳三十一方技吳偉李濂吳偉字次翁江夏人少孤貧善繪畫之技不師而能山水人物入神品性戇直有氣岸與俗寡諧求者非其人不應雖素與之昵好一言弗合輙投硯而去成化間成國公某延至幕下一見以小僊呼之因以為號平江伯某禮聘渡江聞譽日起憲宗皇帝召至闕下授錦衣鎭撫待詔仁智殿偉有時大醉被召蓬首垢面曳破皂履踉蹌行中官扶掖以見上大笑命作松泉圖偉跪翻墨汁信手塗抹而風雪慘慘生屏障間左右動色上嘆曰眞僊人筆也偉出入掖庭奴視權貴人權貴人求畵又多不與于是權貴人怒數短之居無何放歸南都偉好劇飲或經旬不飯其在南都諸豪客日招偉酣飲顧又好妓飲而諸豪客競集妓餌之孝宗召見便殿命畫稱㫖授錦衣百戸賜畫狀元印章寵賚日厚偉思還楚武昌數月還次采石有㫖趣回京賜西街居第逾三年偉稱疾得歸居秦淮之東涯正德初遣使召之使者至未就道而中酒死時年五十子山從遺命葬于金陵野史氏曰竒哉偉國朝畫者之冠也往余客武昌詢偉之里居諸父老或稱偉有異質繪事蓋其生知云乃余登黄鶴樓則見江漢湯湯合流而鳴黄鶴大别諸名山蜿蜒委蛇色蒼蒼抱城郭變態弗可勝也靈淑鍾㑹宜有偉之竒京師語曰千金一圖江夏吳嗟乎偉今亡矣一圖雖千金尠也雲嶠翁李濓雲嶠翁者夷門之遁士也姓鄭氏名鎰字尚直篤嗜書冊縁蚤攻醫術而所蓄方伎之書尤多乃鈎𤣥闡㣲多所自得以之治病􅉨􅉨奇効有一宗室偶患口眼喎斜翁診之曰左闗脉緩而滑兩尺緩大而虚是得之醉飽乗凉守真所謂將理失宜者也盖陽明之脉起鼻交額中下循鼻外上入齒中還出俠口環唇下交承漿却循頤後下亷出大迎循頰車上耳前背胃脈經行之地胃中火盛頰顋綳急則口眼為之喎斜故丹溪謂之胃風乃先用清胃行氣之劑續用東垣清陽湯數貼而愈又一宗室年三十歲因勞役嗔怒痰嗽出血頃之盈盌脈雙弦而𦂳左甚于右翁曰經不云乎上者下之乃用補心湯減乾葛人參桔梗加童便香附黄連梔子黄芩二貼而愈一少年婦人偶大崩須臾升許翁曰經不云乎下者上之乃用涼血地黄湯加荆芥葛根生地黄四貼而愈喬儀賓年三十歲患腹隂囊曁雙足俱腫右為甚脈沈遲它醫莫能療翁用木香白术散腫脹漸消後二日嗽痰中帶血翁仍用本方減木香官桂加黄芩桑白皮痰少血止腹覺㣲痛前方内復減滑石脈體漸大翁笑曰瘳矣脈訣所謂腹脹浮大是出厄也果瘳姚學職允夫每大便輙出蟲三四枚如蓽蔴仁狀脈細小而遲目睛藍闇精神困憊翁用平胃散加苦楝根黄連檳榔烏梅令五更初服之質明下蟲長七八尺許首大如黑豆尾細如線節節相銜如蛇皮然葢醫方所未載者蟲出而安它若是者甚多弗能悉述也余與翁交四十年稔知其為人質直坦易平生無它好而獨好書老而靡倦著書凡數十種悉可傳嘗自言曰某少而孤貧性嗜方技之書苦無力致之每向人屈意求假隨讀隨抄殆忘寢食故所儲書頗足覽間摘出單本者百種惜古無摹板皆世人所未見者命之曰醫書百朋每一展閱如張樂于洞庭之野洋洋乎美哉弗知衰老之我迫也又嘗曰忽吉甫之金蘭循經滑伯仁之經絡發揮皆經脈流注孔穴髙下外景也華元化内照圖言臟腑形象氣血多寡内景也各得其一而朱奉議二景圖雖兼二家之説又畧而弗詳某以馬宗素通明形氣圖補外景王好古臟腑用藥圖補内景庶為全書爾于是著内外二景圖補若干卷又嘗曰本草備載藥性修于有宋政和間自隋唐以來明察藥性者東垣一人而已抑能用東垣之氣味而上兼仲景之方法丹溪其庶幾乎然二子元人也生于政和修書之後髙見絶識本草中寔未之載某備録二子之言間出己見以補本草之闕于是著本草補遺若干巻翁因宋人張杲李明博採經書子史中有關于醫術者千事裒輯成編名之曰醫説顧所載有未盡者乃用其所立門類亦採傳註中醫類方劑總千餘條釐為十卷名之曰續醫説皆李明之所未及者旣成編屬余序之較諸李明所輯尤為博洽云翁平生著述甚富多未脱藁兹弗殫述翁之術盛行于梁宋間梁宋人稱醫中讀書多燭理明者必曰雲嶠翁雲嶠翁汴中故多醫翁之前有周溥文淵者亦以善醫鳴所著有方法攷源藏于家嵩渚子曰余所讀司馬遷史記竊見其為太倉公作傳博載其應詔所對自齊侍御史成至公乗項處凡二十有三人攻療之騐甚具何其與它傳之體不同也葢醫寄死生厥係至重故變例以紀事愼之也嗣觀國初諸大老文集如宋潛溪戴九靈朱天台為丹溪滄洲抱一攖寧作傳復備列其著述之㫖是又一變例也余為雲嶠翁作傳兼用二體以成之第愧文思彫落筆力萎弱弗足以傳逺爾草創旣成付其家俾其子孫寶藏之以詔來裔王叔和李濂王叔和髙平人也仕西晉為太醫令性度沉靖潛心方脈精意診切洞識攝養之道平生雅好著述乃本黄帝素問秦越人八十一難經曁張仲景華元化之書撰脈經十巻凡九十七篇叙隂陽表裏辨三部九候分人迎氣口神門條十二經二十四氣奇經八脈五臟六腑三焦四時之痾粲如指掌其文約其㫖逺其理奥使人占外以知内視死而别生按其法而用之厥騐如神毫髮不爽自難經之後闡明脈㫖殆無餘藴觀其自叙有曰脈理精微其體難辨弦𦂳浮芤展轉相類在心易了入指難明謂沈為伏則方治永乖以緩為遲則危殆立至况有數候俱見異病同脈者乎夫醫藥為用性命所繫和鵲至妙猶或加思仲景明審亦候形證一毫有疑則考校以求騐故傷寒有承氣之戒嘔噦發下焦之問而遺文逺㫖代寡能用舊經祕述奥而不售遂令末學昧于源本互滋偏見各逞已能致微痾成膏肓之變滯痼絶振起之望良有以也今撰集岐伯以來逮于華陀經論要訣合為十卷百病根源各以類例相從聲色證候靡不該備誠能篤志研窮究其微賾則可以比蹤古賢代無夭横矣夫自王氏脈經出而海内學醫之士咸知所宗論者以為經論之龜鏡攻療之梯航廣仁術而利天下厥功甚溥叔和又有脈訣四卷脈賦一卷纂次張仲景傷寒論為三十六卷行于世云嵩渚子曰宋熙寧初光禄卿直祕閣林憶校諸醫經方書而王氏脈經始鏤板于廣西漕司序之者長樂陳孔碩也元泰定間醫學教授謝縉翁又刋于龍興儒學而東陽柳道傳寔序之其曰脈訣出而脈經隱正如俗儒知誦時文而不知誦經史切中後世徇末忘本之弊然晦庵朱子則謂脈訣辭雖鄙淺而直指髙骨為關之說合于難經本㫖葢亦取之抑脈訣雖非叔和書其亦嘗讀脈經而有得者邪但其自立七表八裏九道之目與脈經所載二十四種之名義弗合是故世之國手遂以為贋書而輕之恐亦終不可廢也知醫君子其尚審察之哉啟𤣥子李濂王冰一作砅自號啟𤣥子唐寶應中為太僕令篤好醫術得黄帝内經素問靈樞曁隋人全元起訓解乃大為次註且自為之序曰夫釋縛脱艱全眞導氣拯黎元于仁壽濟羸弱以獲安者非三聖道則不能致之矣孔安國序尚書曰伏羲神農黄帝之書謂之三墳言大道也班固漢書藝文志曰黄帝内經十八卷素問即其經之九卷也兼靈樞九卷乃其數焉雖復年移代革而授學猶存懼非其人而時有所隱故第七一巻師氏藏之今之奉行惟八卷爾然而其文簡其意博其理奥其趣深天地之象分隂陽之候列變化之由表死生之兆彰不謀而遐邇自同勿約而幽明斯契稽之言有徵騐之事不忒誠可謂至道之宗奉生之始矣假若天機迅發妙識𤣥通藏謀雖屬乎生知標格亦資于詁訓未嘗有行不由徑出不由戸者也然刻意研精探微索隱或識契眞要則目牛無全故動則有成猶鬼神幽贊而命世奇傑時時間出焉則周有和緩漢有淳于公魏有張公華公皆得斯妙道者也咸日新其用大濟蒸人華葉遞榮聲實相副葢教之著矣亦天之假也冰弱齡慕道夙好養生幸遇眞經式為龜鏡而世本紕繆篇目重叠前後不倫文義懸隔施行不易披㑹亦難歲月旣淹襲以成弊或一篇重出而别立二名或兩論併吞而都為一目或問答未已别樹篇題或脱簡不書而云世缺重合經而冠鍼服併方宜而為劾篇隔虛實而為逆從合經絡而為論要節皮部為經絡退至道以先鍼諸如此流不可勝數且將升岱岳非逕奚為欲詣扶桑無舟莫適乃精勤博訪而并有其人厯十二年方臻理要詢謀得失深遂夙心時于先生郭子齋堂受得先師張公祕本文字昭晰義理環周一以參詳羣疑冰釋恐散于末學絶彼師資因而撰註用傳不朽兼舊藏之卷合八十一篇二十四卷勒成一部冀乎究尾明首尋註㑹經開發童䝉宣揚至理而己其中簡脱文斷義不相接者搜求經論所有遷移以補其處篇目墜缺指事不明者量其意趣加字以昭其義篇論吞併義不相涉闕漏明目者區分事類别目以冠首篇君臣請問禮儀乖失者考校尊卑増益以光其意錯簡碎文前後重叠者詳其㫖趣削去繁雜以存其要辭理祕密難粗論述者别撰𤣥珠以陳其道凡所加字皆朱書其文使今古必分字不雜糅庶厥昭彰妙㫖敷暢𤣥言有如列宿髙懸奎張不亂深泉淨瑩鱗介咸分羣生無天枉之期舉世有延齡之望俾工徒勿誤學者惟明至道流行徽音累屬千載之後方知大聖之慈惠無窮冰年八十餘以壽終嵩渚子曰啟𤣥子所撰𤣥珠世無傳者今有𤣥珠十卷昭明隱㫖三卷皆後人依託為之雖非啟𤣥子眞書然于素問閫奥頗有發明其隱㫖三卷實與世所傳天元玉册相表裏葢亦不可廢云抑又聞啟𤣥子註素問二十四卷書成獻之唐令列之醫學遂使上古聖人精微幽眇之書顧付之方技之流于是縉紳先生咸罕言之而是道益衰矣嗚呼惜哉葛應雷子乾孫李濂葛應雷字震父姑蘇人也攻于醫嘗著醫學㑹同二十卷推五運六氣之標本察隂陽升降之左右以定五臟六腑之虚實合經絡氣血之流注而知疾病之候死生之期處方制劑砭率與它醫異時按察判官李某中州名醫也因診父疾復咨于應雷聞其答論父子相顧駭愕曰南方亦有此人耶乃盡出所藏劉守眞張潔古書與之討論無不脗合而劉張之學行于江南寔自是始應雷曲平江醫學教授擢浙江醫學提舉子乾孫字可久生有奇氣體貌碩偉膂力絶人好擊刺戰陳之法以至隂陽律厯星數靡不精究長乃折節治經屢試不第遂棄去肆力古學為文章有盛名于時父應雷取醫書授之乾孫稍治輒精而不屑施行或施之輙取異効其名與丹溪朱彦修並稱云一日嘗炒大黄過焦悉棄之不用其愼如此人來迎致不問貧富皆徃貧人以楮鏹來貿藥準病輕重乾孫貯善藥緘以與之仍歸其直或楮鏹有不佳者顧為之易佳者以還使供饘粥人皆稱其仁一書生傷寒不汗發狂循河走乾孫就捽置水中良久出之裹以重繭乃汗而解同郡富家女年可十七八病四肢痿痺目瞪不能食衆醫莫能治迎乾孫乾孫視之笑曰此不難治命悉去其房中香奩流蘇之屬發藉地板掘土為坎舁女寘其中扃其扉戒家人伺其手足動而作聲當報我久之女果舉手足而呼投藥一丸明日自坎中出矣葢此女平日嗜香而脾為香氣所蝕故也壬辰徽寇轉掠蘇人震恐亷訪僉事李仲善請乾孫圖之乾孫勸城之以守然後請自徃討賊仲善從之卒城之而濟又善以生辰推禍福嘗語光禄徐顯曰聞中原豪傑方興而吾不得與命也今六氣淫厲吾犯咸池殆將死矣一日見武士開弓取挽之而彀歸而下血亟命其子煎大黄四兩飲之子惡其多密減其半飲之不下問其故子以實對曰少耳亦無傷也我命來年當死今則未也再服二兩愈明年果卒嵩渚子曰吳門故多醫最知名者曰葛可久其後乃有劉觀士賓盛寅啟東沈𤣥以潛王敏時勉皆有時名而以顱䪿著者又有錢瑛良玉云聞唐開元中有周廣者亦吳人每觀人顔色即知抱疾深淺言之神騐無事診候也流風相承議論指授是故吳中多善醫迄今猶然故傳可久父子行事併著之戴原禮李濂戴思忠字原禮以字行婺州浦江人也家世儒業究心醫術而志在澤物少隨父老徒步至烏傷從朱丹溪先生游先生見其穎悟絶倫乃盡授其術原禮以之治療諸病􅉨􅉨奇騐其從叔仲章六月患大熱面赤口譫語膚發紅斑他醫投以大承氣湯而熱愈亟原禮診之曰左右手脈皆浮虚而無力非眞熱也張志和云當解表而勿攻裏此證似之法當汗遂用附子乾姜人參白术為劑烹液冷飲之大汗而愈方氏子婦瘧後多汗呼媵人易衣不至怒形于色遂昏厥若死狀灌以蘇合香圓自是聞人足音及雞犬聲輙厥逆如初原禮曰脈虚甚重取則散是謂汗多亡陽乃以黄茋人參日補之其驚漸減至浹旬而安松江諸仲文盛夏畏冷身常御重纊食飲必令極熱始下咽微温則嘔他醫授以胡椒煮伏雌之法日啖雞者三病愈亟原禮曰脈數而大且不弱劉守眞云火極似水此之謂也椒發隂經之火雞能助痰祗益其病耳乃以大承氣湯下之晝夜行二十餘度頓減纊之半復以黄連導痰湯加竹瀝飲之竟瘳姑蘇朱子明之婦病長號數十聲暫止復如前人以為厲所憑莫能瘳原禮曰此欝病也痰閉于上火欝于下故長號則氣少舒經云火欝則發之是巳遂用重劑涌之吐痰如膠者數升乃復初樂原忠妻亦蘇人因免乳後病驚身翩翩如升浮雲之上舉目則室廬旋運持身弗定它醫飲以補虚治驚皆不騐原禮曰左脈芤且澁神色不動是因驚致心包絡積汚血爾法宜下之下積血如漆者一斗即愈劉守衛吏陸仲容之婦病熱時見神鬼手足瞤動他醫用黄連清心湯不中原禮視之曰形瘦而色不澤乃虚熱爾法當用東垣甘温除大熱之法為治即經所謂損者温之也服人參黄茋而安它若此者甚衆當時游丹溪之門者弟子頗多惟原禮父子最得其傳父蚤卒原禮盛行于浙之東西晚年遭際聖明以名醫被徵為御醫積官至太醫院使宋學士景濓有文贈之亟稱其醫術之妙非一時諸人可及平生著述不多見僅有訂正丹溪先生金匱鈎𤣥三卷間以已意附著其後又有證治要訣證治類方類證用藥摠若干卷皆櫽括丹溪之書而為之君子以為無愧師門云嵩渚子曰學貴淵源道須傳授是故師心自是者術必疎宗非其人者業斯謬矧醫之為道也以人命死生為寄而可以苟簡草率為哉原禮之學得諸朱震亨彦修而彦修之學得諸武林羅大無羅大無得諸荆山浮屠氏而浮屠氏則劉河間守真之門人也守真之學寔得之于内經寥寥千百年而錢仲陽氏首發其祕金元之劉張李三子益闡其説丹溪崛起大江之南又統㑹而斟酌之原禮乃其髙第弟子也篤志精思百發百中是故聲聞四馳大顯其術于本朝裒然為名醫稱首余竊惜其著述鮮少恐無聞于後世輙採摭遺事以為傳俾方來有攷焉拙修黄鞏拙修蘇生名潛龍字在淵莆望江人宋徽猷待制煜公之十四世孫也幼孤母抱適涵江林氏林家故貧鬻書自給生旣稍有知志圖徙業旣而見宗家東坡公之言曰悦于人之耳目用而不弊取而不竭隨其才分而求無不獲者其書乎乃嘆曰吾旣不能讀書鬻書猶不能離書也其眞吾業矣業遂仍林舊未幾林復亡家益貧書以不售又嘆曰售不售命也吾業莫易此矣乃益旁購諸經史古文以充其肆時他肆率鬻時文活套之類規近利無異書惟生肆特有之故凡求異書者弗之他肆而惟生是趨書大售利顧出他肆上以日之入事其母育其弟若妹有贏餘終日坐肆中且鬻且讀覺稍稍有得又舉東坡公和陶之詩曰下士晚聞道聊以拙自修斯言殆為吾設也遂號為拙修子由是凡為士大夫業儒學者生皆得以書故見焉嘗謂人曰吾於鬻書識人多矣其購求經義程文者科舉之士也其購求先秦兩漢以前文字者好古之士也其購求濓洛關閩諸書者學道之士也其以家貧無書常游吾肆求閲者篤志之士也其尋訪先世遺文故集者孝敬之士也其以家之藏書來鬻者則世之不肖子也一日有羣士過門見生執書讀笑曰兹書肆也而讀書耶生輙怒曰子以我為書肆乎吾早不幸孤貧不克讀書而托鬻書以讀世固不有藏而不能讀讀而不能用者乎是亦一書肆也吾書肆而讀書人讀書而書肆子不笑彼而我笑耶羣士羞縮噤不能出一語以去予聞之重愧且懼因為之傳以傳且以自警焉野史氏曰昔宋穆叅軍伯長嘗以韓柳集鏤版鬻于京師有儒生數輩取閲輙謂之曰能讀一篇當以一帙為贈自是經年無售者又有陳道人起鬻書睦親坊以賦春風楊柳相公橋之詩忤史相得奇禍後村臞軒諸老亟稱之古書肆中未嘗無人也蘇生隱鬻書而志尚不凡言論激發有足取者無乃伯長陳起之流亞與然猶號拙修而退托于下士之列者何也韓襄祝允明韓公名襄字克贊長洲人也韓自武王庶子昉封及王室東遷失國而子孫遂氏之後更受采地于晉至景侯虔復受天王命列為諸侯迨秦而滅漢興王信復封傳四世國絶孽孫説以功封龍雒侯子増嗣増子寶無子國除寳弟騫遷南陽自騫十世為河東太守純其七世孫播徙昌黎乃祖純而為昌黎之族播生後魏揚州别駕紹紹生北齊膠州刺史胄胄生後周商州刺史䕶䕶生隋邠州刺史賢賢生唐巫州刺史符符三子仲大智生休相𤣥宗休生滉相徳宗當安史之亂迺自鹽山徙博野唐末徙贊皇五季徙安陽入宋惟潁州安陽二族為大安陽再世為魏忠獻王琦當時稱為相韓以别潁川族琦生駙馬都尉太師秦端節公嘉彦嘉彦生紹慶路節度使諮諮生保信軍節度使仰胄仰胄生浙西路兵馬都監廖始居平江廖生浙西路兵馬步軍副總管性卿性卿生龍龍生榮甫始業醫榮甫生信仲信仲生斗一斗一生凝凝生奕夷當皇明永樂中夷與從兄奭並事太祖皇帝以醫太宗皇帝官奭為太醫院使夷為院判寵賚優渥多越常典而奕尤以儒行表于山林間當時視其族如宋世之視朱張顧陸矣公為院判長孫葢仲子布出也幼而孤後仲之兄存其行首諸房孱苦成立獨精先業明允確亷不隨不同侃侃如也介介如也老益恬淡無干于時而平生以其術澤人者則弗勝紀王氏婦體碩年老升樓蹶而仆諸醫都不終脈搖首言中風立死耳後至公公曰病是趺撲家授藥融導氣血氣血平當瘉已而果然從兄之子之夫嚴恒病胸膈閼滯溺赤精滑作寒熱呂骨族間成核如胡桃比一枚特熱而痛不能言發在間日旣三年公視之曰病自虚火之動為滋隂降火藥丸引以龍腦服一月熱止更為參耆補兩月病已病得之心切于生財而不足也所以知者診其脈六部虚大時數數然也將歸姪女止之公言留無為特留一冬藥耳明年春應來蘇吾逺迎矣卒如之相城沈大隱君貞歲八十公去賀壽賀頃倏忽不寧便沈劇公脈之報無害飲以湯劑訖君就枕席公與客宿隱君猶子今隱君周舍丁夜聞内大哭聲客李者嗤先生誤耶公言事有非理所必吾終不見其死耳黎明問焉葢哭以他故所以知者脈惟虚無他八十之人應然也今隱君室陳碩人病胭㗋結丸小腫不痛不癢衆醫並以為痰癥也公謂隱君非痰癥一潰應死隱君戚其言姑從衆謀攻痰無幾丸決破閲日便逝所以知者其脈弱其形衰年及耆而不復榮滋部分在開閤也宋徳妻病其友深夜叩公門請決治公徃從帷前秉燭望見之即回步不施藥强之診脈亦竟許以死明日更醫無言同者三日以死問之公云白如枯骨死也金陵軍人妻獨居暴怒口鼻頓出血五六升公視面壁臥不能吐一語氣欲屬不屬奄奄然診之六脈盡脱取參膏加地黄生犀飲之三日夜止龍塘橋陳家娣姒有言齊成疾居一年姒死娣甚恐力求醫連易數子弗瘳皆委去公治之刻以兩月可巳從之良已公曰形不衰脈有根蔕而已周生内年二十八中風不語諸治者束臂矣公藥之任以亡慮旣而然所以然者外無六經之形證脈虚遲本情爾也上元人潘病瘵死未死無或以死告告死獨公公後告人大骨枯大肉脱是為形脈俱壞羅僉事中風公診之其脈如弓弦曰入鬼録遲三日程耶三日遂亡成化元年公省婦翁張御醫豫于京師閣老南陽公延張治塾賓南海貢士梁俶一晨間張入直李以請公公告李梁病犯厥隂六脈絶不可為已言訖趨而出李與數達官共訝之復迸命三五醫雷然荐湯液暮而死矣周善婦病于娠公斷尺脈不固胎雖成其下也母命其偕乎莫不誚笑不三辰如言焉相城僧病腫脹喘逆旦夜反覆不能寢一息公為沈公邀視視旣語云急矣病得之酒遽投辛熱味而救俄而甦咸以為慶公曰胡慶為病本猶未斷慶在他日耳果三年二發甫除乃以好酒不能禁好厚味不能禁故所以知更發者診其脈伏逆不應也又姻家趙郎年未壯好酒甚酒不離朝夕以酒廢食忽病肌腫浮漫腹彭彭而鼓滿時狂憒可愕家人謂之妖禦以祝由病益劇公觀之趙神方清言無變易也須臾病乃發公曰病得之酒酒以亂神祝由何關焉噀之水麾之劍符祝嘈雜重實其實虚其虚也令悉屛去留身對病者徐徐譬解之陳以正説戒之絶飲重命之要間以湯飲遂安所以知其非狂邪脈無怪無絶色無惡也戚女倪氏室而抱病公曰疾無傷祇憂天乎衆驚問故公曰質微脈細小是謂形脈不應尋而病果已已無何嫁張生嫁無何得娠産亡焉太伯鄒節婦八十傷寒不終朝便委頓欲絶公診之語其孫炯脈洪而無根然年髙氣弱將無虞炯謂市醫探利恒態獻白金如干挺公却去與之匕劑越日遂瘥王侍郎仲兒四十患痰喘晝夜不得休伯氏評事請公與盛用美氏議治許酬銀于二公公曰藥當出盛君療而酬亦當盛君僕則不能評事問所以然曰脈徃來啄焉漏焉候厥逆也評事心竊惡之已乃符其説王家遂謂公口不利絶不復乞醫矣公之不震富貴又然也𢎞治已酉允明秋試南都舘舅氏符臺李公貞伯齋宇曉起繙閲縹帙入夜飲酒數巵就寢自謂和神也積濕熱浹旬漸潰潰不舒八月三日肌大燔灼徹曙自謂困伏故出遨遊數里愈不舒亟返歸中路遇旋風吃吃忍之還齋不及解衣俯几一大嘔即伏枕頭岑岑如擊碎夜誤飲表劑汗出湢不解明日添重易以痰劑亦不解又明日成痎又易醫易痎劑乃稍定扶歸蘇痎尚未已乞救于公延久憊甚公變換救之厯五十日迄痊云允明生晚居姻家幼行欽感旣久因從叩得治狀一二筆述如右所覬傳之為報而猶惜不能以盡公贊曰公之善也夫心行淑焉道業良焉𦙍胄華焉公善葢三矣昔韓伯休假于賣藥以存其隱操公旣先伯休行業又然葢三善兼肖之矣斤斤然君子哉明文海巻四百十七
