body:
  text: 明文海卷四百十八餘姚黄宗羲編傳三十二方技漢章凌先生慎䝉先生姓凌諱雲字漢章别號臥岩湖之歸安人也世居歸安雙林村因號雙林凌氏云先生自幼善屬文補弟子員屢試連不得志于有司乃喟然嘆曰丈夫志在萬里顧屑屑研析章句如置身矮屋不能擡頭是鴻鵠抑志于燕雀也乃屏舊藝以游游至山東泰山山下見古廟前病人氣息垂絶嗟嘆者久之忽遇一道人在旁問先生曰汝欲生之乎先生曰固欲生之耳乃命公驗腿氣之冷熱先生曰氣尚蒸蒸然汗微出也乃針其左股遂蘇因語公曰此毒氣内蔽非死也毒散則生因與語本輸根結終始順逆之法自是引伸觸類妙悟神解有未之或知者姑即予所面受于先君與傳聞于父老者言之信哉予先君南槐公病哮𠻳日夜吼不絶聲至不能就枕且絶粒者五日切脈者以為虚也法宜補藥投而病愈甚計無所出就先生而問焉曰如諸醫言是有餘而以不足治之非也此寒濕積也穴在頂針必暈而苦死者半餉須假四人以分扯其髮使勿傾跌針入果昏眩踰時予祖父母皆行哭先生乃言笑自若少頃氣漸舒復加補始出針針微染血因而嘔吐痰積將及一斗餘先生曰病根自此拔矣先生兄天章亦稱明醫有男子病後舌吐狀如懸物天章語乃弟云此症乃病後近女太早夫舌者心之苗腎水竭不能制心火病在隂虚先生曰然其穴在左股太陽是謂以陽攻隂先生曰然遂如其穴針之久之舌吐如故兄亦茫然自失以問先生先生曰失在于知瀉而不知補先生就視之轉而補者三其舌以漸而入遂不復懸河南淮陽王病風臥病不起者三年矣請于朝數省名醫畢集針與藥交治之不効先生至投之以針不三日而行動如奔眞為起廢臨行贈之詩云千般藥餌渾無効分寸針芒却有功甚者感恩刻骨圖其形以祀之焉又金華有一富家婦少寡淫火方熾遂致喪心始見屋柱𦂳抱之若有所契久之雖見箒杖諸物即以兩手爬之甚至裸形野立亦忘其為恥時先生年已七十令渠就針先生熟視之曰是謂喪心乃先命二人紾其左右手并扼其二肩忽以冷水噴面欲令渠忽然驚惕且云針後用帳以蔽之計其心正而知恥也然後啓之乃以針入其心次名曰鳩尾補泄法治不踰時婦人狂疾頓除復語其家人曰宜以好言慰解以泄其愧恥庶病不復發矣又先生某年日夜泊吳江有憲副陳冷菴子媳臨産胎不下者三日夜其心痛如割遂呼號遶地惟求以自盡至夜分燈火煌煌出以迎醫先生起而詢其所以然因語主人曰何必多醫假吾一針足矣衆目之為狂怪且曰姑試之以觀其效也先生即燈下以針刺其心穴針出孩亦應手而下如𤓰脱于蒂然問何以故先生曰此謂抱心生也針出則手舒手舒則胎下因即兒手掌騐之針眼甚明衆醫皆搖手吐舌而去夫母之心與其子之手相為聯屬母之命與其子之命相為存亡差之毫釐兩敗俱傷無疑也非洞見臟腑意與神通者孰能與此以此名聞當宁召試之太醫院乃出銅人以衣蔽其體命先生就針針無虚穴則知先生之醫得心應手要非襲取所致者且公性素豁達不事居積凡親戚之貧而苦于飢寒者婚與喪不能舉者橋梁道路之修甃有求于先生者先生曰吾貧不能為汝助但至某日吾設座施針即其所饋遺者計其數之所盈與之而止其輕財樂施有足述焉抑予又聞之先生少年與晟舍閔莊懿戴山王長史偶望日以行香畢步出東門有一相士前進而揖閔曰伏犀貫頂玉帶腰懸揖戴曰好一金肚皮但有科無甲揖先生曰旣非科甲出身又不以異塗入仕惟有名髙天下後閔官至尚書宫保戴以進階腰金先生大名垂之宇宙至今不朽然則先生之術殆天授非人力也故傳以表其神異云論曰予讀史記謂扁鵲得長桑君方書與異藥飲三十日見垣一方人以此視病盡見五臟癥結以為作史者特神其説以誇示天下後世未必其醫術之工至于如斯之神也及觀吾漢章凌先生之醫也信哉夫湯液醴灑撟引吐納均之所以治病養生至於濕熱壅腫手足痿痺甚至毒氣内攻存亡係於呼吸有藥力導引之所不及者非針砭以補泄之死可立待故曰取五胍者死取三胍者恇奪隂者死奪陽者狂誠毫髪不可僣差者是故唐之狄梁公去鼻贅而却絹千匹髙誼流芳梁之道人慧龍能開帝胄之雙瞽後世有述今觀先王之五醫其起廢生死効信若風之吹雲明乎若見蒼天與唐狄公梁之慧龍入於神聖者一也即其胸次豁達不事居積乃知古之精於伎術文章有以大過於人者不惟聰明得於天縱而其心胸開拓抗立物表亦自與人殊云張琴師王寵張琴師吾同閈人也楠其名大本其字大本無他長獨于琴則専握門戸浙東西之操縵者咸奔走之名琅玕聞江湖人也然不事家人生産年五十四以窮死悲夫大本嘗謂余言始習琴于陸墓張氏吳之最名能琴者也大本羈貫而操張氏師年已七十餘矣遽曰孺子繼我孺子繼我遂倒其譜授之既乃涵精揉思窮幽析㣲宵吟晝揮手與心維儼乎其若幾茫乎其若迷積之三十年而汪洋恣睢窅眇希夷濁清疾徐惟我之施鸞虬鏘鳴若或鼓之鬼神嘯啼不可端倪葢于是而陸墓之傳益恢以竒也豈韓子所謂造其堂而嚌其胾者耶嗚呼琴亦藝也古聖人兼焉今之君子日從事於古聖之糟粕而于揮絃神韻則不暇焉然其磨礱洊至有類夫學道者之為吾是以有感也而大本坎􅇄困躓纒其身者數十年而寂寂以死若造物者尤焉吾是以重有感也今天下名都沃區自侯王貴人以至素擁厚資之富人游琴其門者如麻出則陪輿入則交舄突梯滑稽軟媚脂韋以私其金錢以席其靈寵而藝不必大本若也聞其名皆嚄唶縮恧即遇之羞不敢露手乃大本則弛置自便都不識覘伺人飲酒呼歌揚揚如也唯其中獨有所得于中而于世之成敗利鈍置之若忘故其窮而死也則宜為之贊曰雞鶩爭食靈鳥不顧有嗈其音爰合韶濩洩彼天和師曠徃愬洞庭斯張帝聿其怒于搏于鎩棲之故伍琅玕之林崑崙之圃庖人汪道昆庖人吳三五者婺浦陽人也以屠為事善治庖韓長公為浦陽令喜賔客令置酒召三五為具數當令意三五時時給事縣中令察三五馴謹不譙讓壬子冬十二月三五從令上計至彭城黄河氷不得渡度且失期泗上亭長紿令曰旦日第開冰渡令信之旦甚寒㑹泗水大至舟半渡冰合上流冰如矢石下擊破舟徒屬皆號泣爭脱死令棄舟走冰上冰解令出沒水中者三令舍人韓祿下索令令執舍人手俱不得濟三五頓足曰公死矣倍公不祥乃赴令令呵止三五毋俱死三五又溺一丈夫臨泗上垂綆下三人引綆賴不沒舍人大呼曰我公貴人活我公者予百金于是船人崔桐刺船開冰來出三五三五謝曰臣死且不恨亟活我公我公長者也崔桐出令載樓船中次出舍人次出三五三五死矣無何令活令仰天哭曰嗟乎三五從予千里游奈何以余故殺三五哉乃傾囊中金治喪具葬三五彭城西云汪子曰吳三五市井之鄙細人也方其鼓刀以屠録録未有奇節及事令不見知一旦急令之危顧傾身為令死雖烈丈夫何加焉余過浦陽其俗齪齪纎嗇少壯士令獨能得死士則自令賢矣查八十汪道昆野史氏曰古之人不卑小道務有所成名彼操一技之能必入其室君子葢有述也查八十名鼐休寧北門人也字廷和鼐父珂母劉氏母夣靈龜入臥内遂有身旣而生男㑹大父華年八十大父喜命曰八十云大父以賈起家鼐從父已受賈少負意氣務上人嘗過毘陵倡家鼐為絃歌佐客酒倡引琵琶侘鼐目攝之鼐怒祭酒謂倡他日不以此擅場有如酒時壽州鍾山琵琶最善故嘗師藥師張六老及老將謝彦明一時俠少若工師即善彈盡出山下鼐奉千金為山壽師事山無何盡得山法鼐臥起服習日夜不絶音居頃之過山逺矣山嘆曰郎君吾師也山何敢為郎君師于是乃過故倡倡不知也一彈而四座辟易以為神倡蒲伏下堂涕泣莫敢仰視鼐愈益自負事事務上人當是時滑人李貴善技擊襄陽吳奇善騎射豫章孫景善蹴踘金陵馬清善簫吳人張大本善琴皆獨步鼐悉從之受業務盡其長客曰䕫猶不免于窮吾懼吾子之力詘矣鼐乃緩一切仍專事琵琶旣託賈而游所至人人親鼐之吳習祝希哲楊用脩王履吉唐伯虎文徵仲引為布衣交之大梁周王使人召鼐鼐語使者王能客鼐鼐來不能鼐裹足逝矣于是長揖而據客坐盡王驩竇得意以倡幸鄢陵王且蠱太原公子得意深自閉絶外交旣聞鼐名私事鼐鼐方結客得意歲出百緡佐客資居七年事鼐唯謹得意請得備箕帚妾幸託終身鼐謝曰鼐即窮身顧自有婦卒不可入楚楚愍王遣使操幣逆之蘄鼐遂留蘄辭使者及愍王殺蘄人多之入廣陵大賈李從堯執贄請業鼐笑曰郎得富家翁為弟子鼐將鬻技乎哉嘉靖中江以南競南音廢聲伎鼐且老復過金陵嘗入平康里為清彈諸美人無知者安氏媪年七十瞽矣聞之大驚曰此先朝供奉曲也國工張六老能之客何為者旣而知其鼐也起為按節相視以為知音鼐還休寧未有子繼室請置妾數以為言鼐嘆曰天地樂我以能事假我以長年廣我以交遊延我以聲譽于我過矣安能復昌阜我後邪日從諸少年游鬬黄雀樹花木鄉人王仲房陳達甫亦時時過之野史氏曰世俗言琵琶一部樂耳鼐獨以此稱絶技其專壹之効與先民或以荑稗為美博奕為賢有以也昔髙漸離易衣而驚坐客視鼐詘故倡何異焉彼以匹夫而距王公藉令事貴主以干進彼且羞為之矣吾鄉故多節俠則鼐其人乎樗仙呉鼎樗仙者東海散人也少負奇氣有囊括萬象流觀宇宙之意嘗為學官弟子舉于有司弗成輙棄去曰是不足學益浪跡五湖三江之間神悟所到山川草木禽魚飛躍隂陽雨露所變現古今豪傑之跡得其精意一發諸畫圖所至薦紳爭館于家捐重貲購請尺縑片楮如獲重器然由是聲名焯然滿公卿間顧其言曰樗無用物也寓言之士有稱焉畫者虚無景象也長康道子名于今亦不卑要亦無用之用不物之物天行而神㑹游藝而道存庶幾古眞人之流哉因自號樗仙云士嘲之曰仙者豈是為利邪解之曰吾未能辟糓輕舉于塵􅅽之表則亦惡免以此易彼自濡其身乎士笑曰若是樗非果無用者矣外史氏曰江海之士翩翩文采多伎術扼腕談神仙顧其効鮮足徵者嗟乎衆人用物之跡仙者用物之精能運其精而變化莫測往來不窮雖名曰仙奚怪焉樗仙之于畫殆悟是旨否邪不然恍㒺弗可象者夫孰能象之學仙者可以思過半矣樗仙謝氏名時臣與予善聊為論著于篇周汝衡顧璘周汝衡蘇人也上世善隂陽星厯之學國初徵𨽻欽天監遂徙家金陵又以醫行至汝衡資絶人見世工率習近世脈訣方書諸家説不究本源即見病莫知從來一切揣度施治乃悉屏去衆習書獨取内經本草難經等書徹書夜讀務窮精奥初為小兒醫輙有奇効聲稱歘然時楊茂者學古大方脈醫羣工視為迂怪皆笑之獨考功王與余等數人尊信之時時賴其効汝衡好其論議獨相與往來講究甚密益歴閫域由是吾黨並重汝衡後楊茂死南都病家獨爭迎汝衡凡汝衡至診病立方多與衆殊指諸富貴家所饋金錢恒倍它工汝衡獨知斯道深永或失手則殺人重于用藥遇有故輙不赴人召及赴召或見病疑輙不投藥大率如倉公所設意凡以重故諸人弗測所操或謂其難致汝衡終不言又善談名理及神仙幽怪家説每過士大夫言即移日多失諸富貴人召故所獲金錢反不逮他工士大夫久益愈重汝衡余家人病無貴賤必迎汝衡汝衡無不至藥亦皆應手効余嘗問之曰若子于醫可謂入室矣乎汝衡曰噫嘻言過矣言過矣夫醫者聖人之學也非盛徳莫能操其慮非明哲莫能通其説如銓者尚未能瞥藩籬安敢望堂階乎是故士有能知草木金石昆蟲之藥辨類審性析經致能弗乖其宜弗亂其忌是謂知物知物者巧士有能知人之疾病淫于四氣薄于五臟動于七情見外知内按微知巨占始知終執生知死由是以審施湯液醪醴鍼砭按摩之治是謂知證知證者工士有能知臟腑之所表裏經絡之所離㑹榮衛之所輔勝命脈之所消息選物説方制于未形體微發慮決于衆惑是謂知生知生者聖士有能知天地之情隂陽之本變化之因死生之故立教布法使人專氣含精以握樞機汰穢葆眞以固根柢疾疢不作神乃自生是謂知化知化者神夫神聖者上智之能事未易冀及工巧之道術學之所造也醫不臻此不足以名業請借事實譬之是故不知藥理盲投鈎試是將兵者使人以弓刺而引矛盾射也察病不定揣摩施治是相國者昧國所患而寛猛倒施也尚焉得為將相平哉此敗亂所以接迹于天下也銓為此懼於是聞召如赴難臨病如對敵探匕握勺兢兢如不得己心有所重也今怒者乃以慢詆安得戸説而家告乎已矣巳矣盡吾之心愼吾之術苟餬吾口而巳請勿以醫名我可也東橋子斂袵謝曰仁哉汝衡知道之難而不輕治人其所全治可勝量哉昔者齊桓公欲相鮑叔牙叔牙曰如欲霸天下必管奚吾可相秦始皇欲以二十萬卒伐荆王翦曰非六十萬不可此真知將相之道者也故卒有功於人國汝衡之于醫殆類此乎余患世之人終不知汝衡為作小傳盛少和先生徐顯卿太史氏曰遊于物之外者其心閑而無事其所究藝術必精吳中世公卿亦世醫名與公卿埒曰盛氏御醫寅字啟東生而髯侍文皇帝數賜密叙家人語上亟稱其髯不名啟東有五世孫更精其術功被大江南北皆知有少和先生盛翁其為人脱疎當其作癖不可控揣斯其醫擅天下者哉盛翁諱應宗字斯因其别號少和特著其世系顯貴與翁生平起人于阽危奇驗不可殫述王大司冦元美誌其墓頗悉余不復贅大都翁診脈自世所謂名醫者皆曰寒翁獨曰熱皆曰熱翁獨曰寒以至曰虚曰實皆洞察出人意表皆曰某傷寒曰某瘧翁獨曰不或暴死投劑一服而甦或似亡恙竟不治其生死久近一一刻期不爽治老者輙決其自此壽幾年治婦人病已能令其有子治貧子輙密寘金卹其窶于是吳越間所尸祝而願為翁之子孫者有之翁白晳美鬚髯疎眉目葛巾白袷行山水間望之若神仙中人寒微有疾召之不待再而往劑必精至富貴有力人盛車馬迎之君不樂與周旋輙匿身狹斜或廣野中不復可踪跡久而强致之所得金帛輙隨手散盡性好聲伎有所善姬解琵琶音律翁晚節弗得是弗驩曉事者俱不即迎致翁而預致大舫鼓樂匿所善姬要之翁輙至一大貴人迎候浹旬始至巳及門忽失翁所在蒼頭遑遽跡之乃窺其鄰陋屋傴僂而進診窶人脈調劑已始過大貴人大貴人恚不敢言所過人嚴奉之重于卿相已而忽去不可留嘗中秋過大家伶優兩行盛供帳待月翁忽去跡之乃挾所善姬拍浮石湖中奏絲竹徹旦大樂人多謂之癡年七十餘幸内不衰瀕終屬歲除問訊相踵翁使悉為酒屬善謳者謳歌枕而聽之樂元旦示起色已而熟寢至五鼓卒翁天性孝友以獨身奉母姜姜病亟刲股糝羮進之遂愈既夀考終猶毁瘠逾禮嚴其伯氏如父其閨閫間肅如也余少聞正嘉間吳中草聖曰祝希哲其畫登神品曰唐子畏兩公當盛暑皆散髪祼飲雖以直指使者之重臨之以傲然不屑也盛翁知有聲伎而不知有公卿故能精其術如此彼其所托寄逺矣近來之文章技能多不及前輩何論古人哉嗟乎翁不朽矣二客曽朝節先生故多方外交慕養生家言則交運運不善病若葉松崖旱能致雨病則不禳不藥能立起若劉清溪皆延致之舍至於沒齒余獲睹記二客之所為揮麈而談有足警發者焉為作傳劉清溪者名道𢎞江西之髙安人其初流寓桂陽州與諸賈人處闠中而不以積著自營獨持數編符篆呪誥科書所受於其師者即其文訛舛不改為謂是足以號召諸鬼神而祛邪滅祟如響州人傾信之焉先君還里中過而遇其人喜之曰往在衡山耕將有糓乍不雨輙半收久則苗或槁死有束手歎耳孰若以劉君居吾田則無憂豐歉君葢有嫗同食貧使人舟載其所奉之神像俱之龍隱日手抄其書諷誦而叩其所以役鬼神者云旱乃為壇與之晝夜日中擁重絮以汗難易多少方向為刻應雲將起以舌黙書符篆望其方作勢運之雲合而隂將雨矣雷電交作結幡成龍蛇形手且以令板呼雷之名如在其左右觀者見其電光著兩鬢固愈快甚得意雨水倐而决渠併塍間矣郡苦旱嘗召之亦然書符呪棗已疾而猶好以桃箕下神告凶吉即余甲科名第預决于二十年前嘗語余曰吾身後當作仙余哂之曰作仙必脩鍊有道術萬一能成君何脩而能仙乎則應曰吾乃為仙官旣死數歲有村覡某者盗請其所供神像將安座而魂附其子斥曰而安得饗吾神雷電驟作閃鑠其戸以刀自擊其胷覡乃大恐亟冐雨奉還之余之丙子上春官也附著于余老僕輔告以所中第如前言眞若己仙者焉余乃慨然語人曰人第患無眞志乎眞志為聖人則聖人矣眞志為仙佛則仙佛矣劉君鄙行其教專篤白首不懈冬寒猶晨起跪念諸鬼神誥盡香一炷自粗糲外不肻置一念果足以不死豈有眞志為聖人而不能者哉其嫗賢與之相守沒皆厝龍隱山原歲時為祭掃其墓松崖葉君名伯誠徽州歙縣人幼從其親族賈眞州性巽慈澹於財利收本貲之直亦噤而不能出一語以是責家多負之貲遂盡落其販地産也主常昂其直予之至鬻必折意葢不屑心計㑹兩目病幾瞽乃從脩鍊之士遊欲以治目脩錬之士亦往往喜其為人以其所傳授之最後自江東而遊衡陽所得於運氣之術功巳積久不運而能通三關以下丹田其髪如鶴其目如電其面瑩然如玉見莫不知其為脩仙者流當先君居龍隱山中一晤而語合凡君之術先君固稍稍用之足以不病然不竟行余之家食病也母孺人嘗令人詰之曰君自負有大藥坐視吾兒病安乎君即入視余臥内口授余而病立瘥自先君沒余與諸弟逓舘糓之余又迎之京師相與處者三年君不善病然吾知其不能仙仙有夙生胎骨名在仙籍中生而慕𤣥真之道一物不能入其心異人將祕授之而祕脩之功行滿而沖舉矣故功非偏至之積也行非一術之成也性命雙脩道術渾成天人輻凑乃得上昇不然孰能逃五行之數哉今年冬弟守齋書來曰葉松崖君物故矣余旣悼君之不得再見而重嘆仙道之果難成如此髙石門丘雲霄世之慕曠達者皆謂嵇阮劉李諸賢得醉鄉之樂為能養其眞以成其名丘子曰醉鄉之徒乃負其不羈以俛仰于時不得直其志乃托諸酒以自廣焉耳當其酣湎沈著任眞率出繩度以傲睨一世眞若有以忘天地之為髙厚日月之為晦明古今之為久暫與萬物相忘于無何有之鄉矣使其酲解寐寤或觸而感其能釋然于懷邪愚謂醉鄉之徒非眞樂也晉安石門子早善屬詞不樂進士業每謂文至牽飾比偶猶之留鬚眉以傅脂粉無足學也遂洗意爵祿之門而結霞上之居又自號曰霞居子善畫善𨽻草善八分書家貧性嗜酒日以飲為事遇飲輙盡醉醉則狂叫放歌由由焉任所適醉甚則散髮赤脚飄然舉舞仙幻宇宙又自號曰髼仙子由是孤潔一世知名海内時軒葢造之迫則見之求其所能則不得葢不欲以所能工媚也及醉則雖尋常人投之楮素懽然揮墨任意縱横而結搆峻古意態突兀醒則雖工意為之皆所不逮葢其適在酒而神在醉故邪鄉有宋子者與之善瘧歲弗愈一日造問之宋强疾移榻就堂相見因享之酒酣宋出素請畫遂染筆寫鞠數本倒垂懸厓而掩映于江波之間香態隱隱有飄拂流動之狀宋子泠然疎爽因再請復寫奇石亭立雙竹凌空蕭蕭數葉風韻若有聞焉宋躍起視之毛髮俱竦是日瘧不復發而少瘥焉因為之語曰少陵有佳句不若霞仙筆醉後掃丹青往往神鬼泣其妙入神態有如此者夫求樂而得所樂樂在物也樂所樂而忘所樂樂不在物在我也石門子于酒視醉鄉諸賢托以自廣焉者何如也歲癸卯行年五十疾革夣有畫舫載巵酒促其登舟者遂呼家人進之酒再飲而醉先數月武夷霞峰子卒相去千里不及有聞垂沒之日曰霞峰子先我往矣此人志在當時不酬所欲惜也聞者謂其讝語而不知其守靈不亂而能前知如此旣沒聞者惜之丘子曰孰謂忘勢分一貴賤者顧不能了生死邪夫生寄也死歸也彼不悲而人悲之不能使彼之不悲人也石門子姓髙氏名濲字宗吕居于石門山貧以自耕又自號曰庖羲谷老農氏云景榮丘雲霄工者景榮氏巧人也精于製器凡厥施巧雖大匠莫之喻者葢忘于法而得之心也有索其器必越數月然後得或期年得或一二年得或四三年得遲囘而出之昭其重也命以衆之能則辭設難以困其知則勇躍窮思以應之戹于貧必窘餓然後出一器而鬻于市好事者奔之僅免則否弗病力焉一日見丘子丘子曰廣若巧則富若直何憂于貧對曰小人工于巧而不工于求富也取者弗誠我且弗輕以衆遇我心且弗樂又何枉其巧為亟亟器于家僕僕衒于市雖得之如倚頓則如死于餓丘子悵然曰今之工仕者不泚若人也其幾作景榮傳楚人丘雲霄楚人有入閩業鎖鑰者居清憲河之上巨足求履于市弗可稱者乃囑皮氏為製之成持以鬻之又弗稱楚人自憤曰約而還之是不信也取而寘之是不情也終身而不履是亡禮也遂引槌鑿刖左一趾噴血滿室不色變又則其右趾雀躍于河之干濯以就履焉視者環堵而愚之楚人莫之顧傲然若得丘子聞之曰使天下皆能痛治其私以循厥度如楚人之勇焉俗其幾矣其後丘子遭之途果無二趾明文海巻四百十八
