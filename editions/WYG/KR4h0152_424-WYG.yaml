body:
  text: 明文海巻四百二十四餘姚黄宗羲編傳三十八雜傳中山盗録楊維楨客有言中山某氏者聚亡命為盗往來江淮間未嘗掠農舍鷄犬賈舶子女必廉某州某郡吏之沓而狼戾者中夜至其家擒其主反接于柱盗坐堂上令持刀者刲其指肉反啖其口問之曰痛楚乎主哀吼曰痛楚痛楚盗曰汝割剥民膏痛亦爾貸其妻子使野處悉取其財置諸通衢使民爭取之訖殺其主焚其室楊子曰繡斧不聽沓吏也久矣而盗能之殱其魁而不逮其孥仁也窮帑藏而還之於民義也嗚呼盗而仁義謂之盗可乎不盗而不仁不義謂之不盗可乎堇之毒能殺人亦能治病醫之良者使之盗能殺人亦能攻盗亦顧其使之者如何耳吾聞晉文公用中山盗而伯於城濮之盟也非文公能樂收而亟用者乎吾故志其事使用才者聞知勿俾吏者不仁而盗者仁也天刑生蘇伯衡天刑生者名闕天刑生其號也生生而病闕因名闕而自號闕翁及年壯更得盲瞶拘攣病生傷目之不明也耳之不聰也手之不能執也足之不能履也曰類若吾矐吾薰吾攭吾􅎂者孰為之天也天何刑我酷也吾殆有隱慝乎古之刑幾而吾今具四刑悲夫以此更今號曰天刑生云或曰生嘗坐族子徳修乾没内庫物簿録其家就逮南京今天子燭其非罪卒還其家財而縱之歸天子即天也今天子不忍生罪而謂天且刑生孰信之或曰生大父父仕皆不大顯未嘗竊主柄作威福倚法報復鬻獄而漁色滛刑而黷貨亦未嘗武斷而兼并極奢窮欲而暴殄天物生又讀書循理未嘗多行不義事熟視生不得所以致疾狀而生乃有斯疾信隱慝致邪夫天於人也隱慝猶且察之而矐之薰之攭之􅎂之如此則陽為不善者又當何如人之竊主柄以作威福者倚法以報復者鬻獄漁色滛刑黷貨者武斷而兼併者極奢窮欲而暴殄天物者多行不義事者可劓可刵可刖可戮者何可勝數不於彼是劓是則是刖是戮顧乃隂矐生目薰生耳攭生手􅎂生足不既失刑乎所謂福善禍滛者非耶或曰天人曷嘗相干生者生死者死吉者吉凶者凶天何與焉而生乃謂天刑之不亦厚誣天也歟哉或曰若生者而信天刑之則亦天之未定耳天定且將以刑生者而刑其可劓可刵可刖可戮者善者可怠而惡者可肆耶生俱弗之答驟然歌衛人之詩曰已焉哉天實為之謂之何哉生姓潘氏金華人其先世仕宋中書舍人黙成先生最顯後六世而宋亡又二世乃至生生通經能詩文而詩出語尤絶人生口吃然喜面臧否人是非得失期期言不已喜怒一弗顧人以此嚴憚之有隂事惟恐生知之而發之見生輙趨避之去生今杜門不復出遇事猶輙作詩風刺向令生不以廢疾詔起文學儒生且首推上生使生得如汪何輩拜御史亦且諤諤如乃祖而生竟以疾廢矣君子皆為之太息曰不幸不幸云論曰天道無親常與善人若潘生者得不為善人乎而其疾患至於此則夫善人天何與之之有哉仲尼而不得位顔淵而短命死冉伯牛而有疾子夏而䘮明聖賢且如此獨潘生乎人皆謂生之自號為激察其言乃可謂能自反者莊生云知其無可奈何而安之若命者其潘生之謂與都城故老李東陽傳曰民函五常之性剛柔緩急音聲不同繫乎水土之風氣者謂之風都邑之人習見閑熟大抵尚通而寡執此世之恒言然不可㮣論也國家定鼎順天幾百年發甲科躋宦途著見功澤在人耳目者固不俟論己或居小官或終布衣抱一節守一善違衆離俗以求自遂亦非無足稱述者顧偶無所憑藉其名與姓不白於世以死豈不重可惜哉予生也晚竊聞先祖父言遺民故老之名行幼騃不能記幸所及見亦既彫謝無餘矣恐從此遂冺没略舉一二為後進君子道之庶他日有續焉劉志字景仁順天人通經史為近體詩有警句性謹朴言若不能出口毎論禮必以朱子家禮為的為某國公府教書訓導某公欲遷其嫡母之墓而以生母配葬請具奏草志禮折之某公强焉志曰以若所為非獨悖理且不免於法某公乃賂他訓導錢暄者草疏以進英廟震怒責某公究所為謀者枷暄於市人皆服志之有識志又嘗勸某公毁銅佛以鑄器某公不肯强之乃從後志年未五十得竒痬被面以死人指以為毁佛之報嗟乎志所存一也幸而免於禍則服以為是不幸而得病以死則指以為非世俗之溺人如此哉今異端之說愈久益熾殆無以易天下如志者尚可得哉悲夫路貴字秉彞順天人粗涉經籍少為童子師性抗直不匿人過母䘮發引倣家禮去旛幢鼓樂用人為方相市兒爭譁笑之尤不喜神怪嘗有降鸞者人各獻香楮貴脫所趿雙鞵置案上曰吾無他物聊以供神觀者縮頸貴大笑而去後以壽終徐本字以道姑蘇人籍京師嘗出入楊文貞公之門及見諸老能道前朝典故氣棘棘好面折人過徐天全兄呼之本殊不相假言輙中其肺腑曰吾史筆也一時名徳如葉文莊岳䝉翁輩皆禮為上賔素習家禮士大夫家有事斂殯請之必徃然非禮致不輕造訪訪亦不俟茶而出獨嗜書毎得一書手自披對缺板脫字則界烏絲欄紙乞善書者補之笑謂人曰吾猶老鼠搬生薑勞而無用也年八十餘乃卒其自號曰竹軒所輯有竹軒詩一巻陳謙字士謙姑蘇人居京師能楷行書專效趙松雪華媚可人時染古紙為作趙書猝莫能辨購書者踵接戸外勢家貴人毎酬以金帛用是起家年七十餘卒家所蓄古書名畫其子并其屋盡鬻之人多傷之賀道字士完南京人世醫家常居善藥人呼為賀生藥然能通文義尚儒雅有聲士大夫間其行余不能詳大抵名勝輩也余所及知者止此其樸茂無文片言隻行幸中而偶人者瑣瑣不足録已又有趙某者順天人本楊姓鬻醬為業人呼為醬楊天順初迎鑾之役武官胄士爭乗勢納賂以冒官賞至累千數百人或以語某某搖手謝曰我粗人無食肉相財帛非所惜恐反蹈禍機耳不越嵗冒官者事敗盡革職任或遭貶竄人始曰趙某不若也某尤好意氣其女夫刑部朱主事鐸貧而有守某毎遺錢榖以助其廉朱病卒子又死某歸其女俾不失節暨某壽終某子敏贍其女弟以居至於今存焉蔡通者府軍衛籍也既老而代毎步行匝皇城見其甎石垝壊黙數之自某門至某門凡損幾千幾百有幾傭善書人具奏疏赴通政司上之請命工修葺事下工部寢弗行越數年復然又寢之又數年欲復奏其子諫之不可其妻苛止之索傭書錢弗得乃潛脫銀簮具疏竟上之項郎中文泰惡其瀆也送法司訊治之既贖罪費家貲數兩其妻若子交怨不置通已老病遂鬱悒以死當具疏時通素不識字習讀其章對客口誦累數百言尺寸一二無少差失及遭沮抑輙嘆曰朝廷養士嵗糜官禄數十萬孰肯計及此者或以為此細事惡足計則應曰自某年至某年已加損若干數矣久而不治必大壊極弊所費何可勝計哉嗚呼通所見誠小譬之以管窺天天雖小乃真見也以庶人計此亦不為細彼所謂有官禄者不能觸類而長計直而事而顧笑且抑之獨何心哉獨何心哉治溷生童軒治溷生不知何許人始來京師僦屋以居其妻子頗知書懵然無為嘗謀諸婦曰京師甲第連甍高者翬飛低者鱗次皆有匽舍其中吾顧無他能將求治溷以為業不識可乎婦曰唯唯生乃置溲器二臿一恒冠幘曵履負器荷臿日往富貴者之門為之治溷治溷一輙取錢數文人見其巾幘類儒生也因呼為治溷生生聞而喜曰甚善名我乃益勤其業日治數溷得錢數十文雖身䧟淄汙顔面淟涊須眉穢濁亦不少惜也莫則以錢市酒肉施施從外歸相與婦子醉飽酣歌以為樂旦則復出莫歸復如之如是者累年將以為起家之業子孫可世守而弗易也有見而哀之者曰汝何至為是也汝冠儒必且知書要必博古今潛道徳抗浮雲之志礪清風之節以與古之賢人哲士照耀後先斯於儒服為稱審不能焉則必吐竒出策樹立功名以與時之忠臣義士爭雄並馳斯亦無愧于儒也又不能焉則求老農老圃而往師之亦足給以自活汝何至為是耶且古之君子敦廉潔之行明取舍之分雖以朝夕不食飢餓不能出門戸苟非道義其視千駟萬鍾若將凂已而不顧視況汝之䝉不潔觸穢臭困惾中顙如是使其人見之必將掩鼻而疾走矣汝何至為是耶生聞而笑曰吾業非汝所知也且子謂博古今潛道徳吐竒出策樹功立名非勞心者不能也農圃之事暑雨祈寒終嵗勤動非勞力者不能也且勞心者道徳之傳必繫乎天功業之建必因乎時彼欲强而行之人皆罵為迂虽者耳至若勞力農圃苟或水旱不時則饑饉相仍卒至困窮轉徙是則道之不行不免招尤而速謗農之不穫不免啼饑而號寒孰與吾之治溷内不勞於心外不勞於力負吾器荷吾臿窺甕小大淺深從而鍬鍩焉從而陶宂焉少用其勤則剰獲其利歸而持酒肉而吾婦子又醉飽嘻嘻視彼勞心力而無成者真所謂迂蚩者耳子何足以知吾業乎今夫駢拇枝指縣疣附贅固出性而成於形也子又何以能使吾改其業乎童氏曰治溷之事其視道徳功業固不待辨雖五尺童子亦皆知其薰蕕高下也然生方視以為得計反指勞心力者目為迂蚩而不為何其言之狂悖若是吾聞古有逐臭之夫豈其人耶不然則惑於厠鬼而為之也於乎廉者不飲盗泉之水賢者不受嗟來之食況欲治溷以求其活耶張風夏鍭張風天台山中農家風貌惡善為優盡得於笛能以鼻成聲用是不欲蓄其家其家固傳視焉日食於富人之館聚少年晝夜謳弄或讙沸達旦旭入無一食之儲出有終身之饋故凡邑里之為燕㑹鼔音席上必有風雖不召風風固且往自得之出見富人大廬輙止廧下振管踑踞冀徹室中以曉富人小子羣走環之以入曰五且入就食矣未嘗潔其言為不欲狀風之為人如此或以笑而賤風風曰人飽其欲誰不如我我固易盈而鄙人耳彼謂之則曰士大夫乃得而貪焉此為利其惡有紀極哉且若是而閉焉匿焉則能不失一語不見一跡以示於人齒舌至引神鬼相證設禍福應子孫以求其蓋嗚呼吾何故而為是也於此吾有求必以在於口吾心之未往足已舉而加之矣放而隨之不蓋而益彰之吾是以處世而人不我貴則世固有夢而不寤者也又曰吾持身以食於富貴之人富貴之人或以利敗有方貧賤而以植徳興去其一而存者猶是也去其二而存者猶是也敗者相屬而患不及我吾常得食焉他日遇其人於道路見項而趨之其衣履甚不似也顧而見我自若焉曰始吾為富而有今日子以貧而守某常吾乃以後不敢輕子矣嘻子見晚矣雖子前日庸得乎乃今其固也吾嘗客於子子飲酒亦飲酒子持梁亦持梁吾求子不能勝我也且衣冠加於子之身而視於吾之目積榖如山金錢布地傳子而守不使子用子之身憂且勞焉子行其勞而以得食也我棄其勞而亦得食焉子食我而以其憂也我食於子而不與子之憂焉子用其名我用其實是子嚮也幾不見為吾賣顧猶可追而傲我耶嚮也吾固以目子矣而子不知則子亦夢也赤城居士曰是為夢固然矣風蓋處其地因而夢夫人風亦幸也然吾得其言而思之吾亦有夢於此而不知也世之夢多矣為之傳以告夫寐者而自取焉憂心四傳馬一龍有毁孟河子者或請以自白乃作憂心四傳因時觀己而質諸古之聖賢也庶幾可見乎且吾且吾見毁於人也幸哉此盛世之事君子進徳之助也必也君子在位小人不得趁矣以不趁之志肆無稽之言故有毁使在位者非君子彼小人方且盤縁締結各與其黨如豺狼犬豕咆哮蹢囓以爭路胔奚暇從容造言隂為中傷之計乎嘗讀易見君子處泰之貞傾否之喜是有幸於今之毁也君子小人之道消長繫於時時天時也易曰天地交萬物通上下交其志同泰也否反是時泰而泰時否而否君子也小人亦然是故君子在上則順時而知化為拔茅之征在下則蔵器而知命為包桑之繫小人得志不能察時幾在上則肆不得志不能安義命在下則怨非擠排善類必謗訕吉人故毁出於小人不得志之時世道之盛衰可觀矣君子聞毁而惕然以懼俛然以思考諸其身以盡巨細隱顯之故無一如其言退而益以檢飭不遺不已進於是乎君子聞毁而惕然以懼俛然以思考諸其身以盡大小隱顯之故無一不如其言或不如其言未能邈乎與之相去也豈不刺心芒背若䝉不潔遇蝮虺澡濯遁逃之不暇不亦庶幾免夫何忌何忌於人而毁我者之言日至乎古之人如文王如周公如孔子徳盛而人歸位高而勢逼道隆而望重忌之招也而後有樊虎臣有管霍有叔孫武叔如某者上無文王之業中無周公之才下無孔子之名人不歸已勢不偪君望不重於天下其在朝也大人雖見知非其實也其在野也小人雖不欺憐其愚也言不足以文身學未嘗以經世退然山澤之間更多病不能强力學問區區飭身勵行不過求為鄉里自好者而已何有忌於身如古之人不得免於今之毁乎但生平竊慕古道其志必堯舜君民於斯世然後為足故居家欲善於一家建祠立宗以明一本睦親叙義以著一體修禮定則以觀一機損吾過積其餘去吾太得其平庶幾斂發高危滿溢以為恒久不已之道謂可推之一鄉如吾家推之一邑如吾鄉推之天下如吾邑不逺於此而得之耳或是以務也氣剛而峻言危而激行迓而難從他無竒術可以致盛名取高位樹大澤矣何忌於人而毁我者之言日至乎隂巫宋有隂巫者能以面目機發為神為鬼鬼者神者皆造焉因所造而施巫異或張目被髪而噪若狂或屏氣斂容舒徐而恭若賢柔聲如女子欬若翁啼若嬰惰若病怒如殺神者見為神鬼者見為鬼隨其指使意欲無弗從以巫而致積或然之曰子之術儀秦不如然名不稱於大賢君子行不道於王公貴人聞有明道先生者其徳望尊出其門見禮於人殊巫者走見先生先生終日端坐如泥塑人居三日而巫者病退而語諸人夫子土梗耳天生耳目口鼻手足以為吾用也狐之涉也以善聽不濡兎之營也以明眎三窟鳥喙而啄象鈎而食申陽援扳韓盧疾走禽獸之資生各用所長而況於人乎而況於夫子乎夫子目不視耳不聽口不言鼻不嗅手不持而足不蹈也直土梗耳窮餓死耳以夫子之望備諸身者盡吾所謂長而集焉濟之以吾術探天下富貴何求不得何所欲不遂哉或告之曰夫子非不視視不流非不聽聽不滛非不言不動不敢不以禮必子而後可子何以為夫子謀曰夫子習焉能如欽明思譯則可已不然有華氏者古之醫聖也其法能置心腐脾剖而出納之有許氏者古之仙人也其法能伐毛洗髓出其腸而吐易之夫子求是法也割耳劓鼻剜目鑿齒斷手足取吾所謂長者如狐兎者而集焉備諸身濟之以吾術探取天下富貴何求不得何所欲不遂哉噫此忌其言行異已而得名也而欲殺之也禽獸之也欲殺之也以絶異己之望欲禽獸之也以免勝已之加不復顧其言之無稽矣假令一旦集所長致富貴如巫言不違若毁易其身為禽獸愚者弗就況賢如明道者哉為之類者信之而君子以為巫也陽虎史記孔子貌似陽虎虎得魯國政為暴魯童謠曰虎貌丘季子囚丘貌虎終得魯虎聞以為不利於已欲害孔子而畏魯國不與將假手於路隂使人謂孔子柳下大夫賢矣跖之為弟也魯之君臣莫能改其行憂其為亂於他日君曰子之徳跖必從之孔子往虎已先私於跖跖不從而返乃譖言丘攝相君郊不致膰焉乃憤然往而就跖跖之暴也魯人無能後加丘之智以趁君其如何魯君懼而疑之問諸朝朝之卿大夫皆曰求富貴而不得得之而無厭足者斯與跖矣丘也嘗在衛南子欲相之明日遂行是非欲貴也寧與跖問之野野之氓曰求富貴而不得得之而無厭足者斯與跖矣丘也嘗在楚王欲封之田而不受是非欲富也寧與跖魯㑹虎作亂囚其主季平子竊寶玉大弓以逃魯君怒知虎之跖而欺已以禍丘致諸邑而僇之噫此忌其形體類已而賢也而欲跖之殺之也孔子之不與跖亦幸哉使魯之朝野有一跖焉孔子不跖於朝則跖於野矣故孔子不得跖扵魯君魯之朝野無跖焉虎也者然虎亦愚矣哉知孔子賢之而忌之何不為孔子使已且踰之知跖之惡可以殺孔子而不虞已之跖也以自殺董大理黄佐董大理名恬字世良上海人也其先居汴宋南渡初徙家吴㑹里世多隱君子至父綸仕為御史公初領鄉薦入太學為司成林文安所知歴事承運庫手書進呈揭帖孝宗見其字類沈度欲官之中書左右諭上意公辭乃已𢎞治九年擢進士授工部主事分司徐州洪約束漕舟公私稱便滿考改刑部歴員外郎郎中明習律例有族子二人同毆殺叔母公謂法當叙服制重輕司冦不從擬以同罪果為大理所反始悔不用公言十八年秋奉勑録囚浙江平反死獄六十餘人減釋徒流以下數千人無不明慎人人感泣至有圖像奉之者事竣還朝時逆瑾干政凡復命者必往謁又無所賂遺大拂其意乃摭公踰限罰米二百石餉邊正徳三年吏部以歴俸十年已上練達刑名晉大理寺丞又明年始遷右少卿時中外多故公兩署印參駁明當㑹審大獄折以片言具得其情吴僉事廷舉被瑾逮繫止坐以枉道陶給事中諧劾瑾謫戍肅州家人至都黨禁方嚴公獨周旋其間卒獲保全他多類是凡事涉危疑展采錯事以身當之以是受知閔莊懿許㐮毅二公獨深屢以奉讞忤瑾意奪俸三月㑹瑾敗言官謝訥論康修撰黨瑾因及公猥謂驟遷由是落職家居久之始上疏略曰臣本東海編民材質庸劣遭遇先帝明聖列官郎署臣待罪工部者三年刑部者八年陛下俯從廷議㧞臣於淹滯之中擢官大理恩數踰分然祖宗用人著在令甲如臣循資遷轉者亦常有之而言者以為驟方逆瑾憑寵肆虐時罰米奪俸回話待罪挫辱百至而言者以為夤縁臣實寃之臣身為執法既不能誅討元惡又不能乞身求退罪深責薄放歸田里臣復何言但禮進義退人臣之節不可不明乞勑銓曹覈臣履歴及推舉事由明臣心迹以禮致仕俾臣素節得白於後世即死無憾矣事下吏部不報今皇帝即位覃恩詔以章服閑居嵗有薦辟皆辭不行居常娱情書史意興所到輙發為歌詩客至惟以觴奕為樂不復問人間事嘉靖六年八月九日卒年七十有四予蒞南雍公子宜陽嘗受業至是具狀及太宰朱懋忠先生所為墓碑銘來請曰先公年五十七而始生不肖孤不肖孤生十八年而先公沒顧遺行雖表表宜陽亦何能悉獨念先公浮沉常調晚始一奮人方謂淹也而乃以驟去一斥不復齎志以歿此馬遷所以抒情於少卿栁子以之哀鳴於京兆者也宜陽歴觀傳記所載自昔賢哲困於多口者衆矣屈平譖於上官伍員毁於宰嚭賈傅短於絳灌董相沮於公孫千載而下心竊傷之先公有昔人之行而不幸同其跡先生倘覽其事而悲之為傳藏之名山俾後世知有先公獲附諸張釋之于定國之後以並託不朽乃宜陽又何憾焉予於是大書其事云夫國史考見得失之迹以傳信異代乃不盡然都縁愛憎翻衺正以故論建失真予在史館閲實録見謝給諫彈事㑹吕仲木至問徳涵何如人曰直節人也致孝於親且篤交義嘗拯獻吉於死獄然性度高邁偘偘面斥人短坐是致怨比在留都馬伯循為余言獻吉下獄時瑾欲殺之急乃書片紙出曰徳涵救我家人往告康康即上馬馳至瑾門門者不為通呼曰我天下魁人也汝公乃我鄉里瑾素聞康名常冀一見不可得聞之即攝衣迎康康遽上坐瑾留飲康談笑睨瑾曰自古三秦豪傑有幾瑾愕然曰請先生見教康曰昔桓溫問王猛三秦豪傑何以不至猛捫蝨而談世務三秦豪傑舍猛其誰乎何温闇若此哉瑾面發赤疑其譏已因問曰於今三秦豪傑有幾康黙然屈指曰三人爾昔王三原秉銓衡進賢退不肖今則有密勿親信秉大鈞者意蓋指瑾也瑾轉發喜色因復問曰尚有人其先生乎無謂王猛在前而我不識康曰公何謬稱海也此一人乃今之李白也海何能為後瑾固問之則曰海不敢道海不敢道昔曹操憎禰衡假手黄祖殺之奸雄小智李白醉使髙力士脫鞾可謂輕傲力士力士脫鞾而不辭容物大度也瑾俯首思曰先生豈謂李夢陽耶此人罪當誅康即起辭出曰海不敢道者此也瑾謝曰敬聞命矣明日即赦出其後獻吉反嫉害徳涵優伶至為中山狼雜劇以刺獻吉然徳涵未嘗讐獻吉也由此觀之黨耶非耶大理之寃可類推已論曰先王慎罰不聞株連諺有之曰戈必有鉍縑必有匹給諫儕大理於康子以其倫也嗟乎康子信豪傑哉余聞伯循言愸寘于耳而宜陽述大理孝行縷縷且其天性卞急坦直無他腸絶與康子類當逆瑾毒痡薦紳大理必有拯救人不及知者乃得齊名青史稱康董焉辟諸日月相焜燿于無窮嗟乎偉矣明文海巻四百二十四
