body:
  text: 明文海巻四百二十七餘姚黄宗羲編傳四十一雜傳東靈公翁萬達東靈公一日坐虚堂午静有客偉如揖之進三叩之始言曰余聞人也世家海之南嶠西丘有貴士行吾惑焉東靈公曰余聞如何客曰西丘士少也貧偕其兄效登瀛鄉人愛之後遊江浙間學事親之道遂以孝名海内一旦其親病顧謂隣之子曰相而之股肥吾聞股可以食人今吾親病且劇請借而之股以充如何隣之子難之士曰而好善乎吾苟可以成孝名而何愛一股隣之子曰股之割痛曷勝哉士曰君子成人之美是之謂得其本心不忍其膚之痛則本心安在以彼易此而奚擇隣之子退以語其友友恕導之使反之曰而欲行而孝而有股何求於我士曰予股瘠而股即予股予親即而親之身予聞至徳不有已大道不絶人求而勿與仁者勿為也隣之子聴之疑退以語其友友益怒導之使反之曰而利借予肥予親使不幸而有疾則將使誰割乎且君子不以非禮養其親割他人之股以食之非禮也而奚過而固請以而之股易予股痛惟均食惟均而士且撫親之腹以俟東靈公曰先生且休矣今之士多類此也客再拜而退痼居先生王格先生漢左之餘民也始嘗仕至簽察矣後以罪廢先生性禀孱弱冠即瘠癯類老人生平抱肝脾之疾不能多食多輙彭亨噯日夜不肯已年三十五病大進家人為求方餌及他吐納食氣之術居嵗餘良間先生以為適然耳不足深慮即出與人間事擾擾者踰十年而病又作遂更治治略如昔愈之期亦同先生益易之御塵鞅不少省嗇至五十九先生老矣有以文學事干先生者先生素不能然心好其名不欲遽謝閉戸操筆硯數月而訖事遂乂病病五年先生年六十三矣而竟痼無瘳初先生病也坐一室惡聞人聲人有造先生者語刺刺壯以近先生先生黙然而己夜無多寐即寐亦不能甘夢中多迂怪事獨處未嘗輟呻吟慘色被面常對左右自言狀殊頻複厭聽其子見其然大懼於是行療治視前二度更力下及卜算禱祠不絶於門卒無騐勢既窘則為辦衾襲椑器請凶具卒卒可畏計先生之活似不能朝夕者雖先生亦自以為然也朋舊間聞之日偵音耗慰而餽之者頗屬於道然先生則未即死遲廻嵗月以至於其久如此於是人稍疑焉懼而療而偵且慰者悉漸少於常時蓋自憎先生者其心固不可測愛先生者或以先生為可起矣而不知先生實困篤視初病無少損未必其究竟也先生無以自明因自號痼居先生以諭其家之衆而定其意焉嗚呼先生有七尺之軀而不能自愛以至於此昔楊子雲造小賦至病氣一年能與否雖不可並語其類於人一也此先生之所知而顧蹈之何歟語有之曰三折肱為良醫夫肱之於人幾也而折焉以至於三雖為良醫弗願矣先生之折蓋有不止於肱者而所遭適與之符而又未能為良醫其將安所底止耶吁可哀己嘉靖甲子嵗旦先生自撰王承奉張居正王承奉大用者霸州人也逮事敬皇帝為奉御侍慈壽皇太后於仁壽宫毅皇帝時陞御馬監太監賜蟒衣内苑乗馬通顯矣然性刻廉剛直弗能下其儔輩以是不得久内庭出為遼府承奉是時遼莊王病不能視事委政國妃毛氏國妃賢通書史沉毅有斷而承奉内佐之所釐正國家事不可勝道頃之莊王與國妃相繼薨嗣王立王聰敏辯給而嗜利刻害及長多不法常出數百里外游戲有司莫敢止故無所憚然心獨憚承奉承奉好直諫王積弗能忍乃曰承奉老矣宜免朝請於是承奉希得見王王少無子所幸樂婦生子置外舍久之王有痿病度終無子乃取外舍兒内宫中時兒己八嵗詐曰宫人某氏子欲以聞於朝故事王子生承奉司郎具所生母姓名及産媪狀闗相長史乃得奏玉牒王以其事下承奉奉愕曰王安得有子承奉乃不識何宫人有娠及産子狀不敢奉令王大怒曰老奴敢爾者死耶於是盡捕承奉諸用事者皆榜笞數百被重罪欲以迫脇承奉承奉終不為動王乃召承奉繆為好語曰而不知予之為病耶事成而有後主而富貴可長保獨奈何為他人忠承奉伏地叩頭流涕曰老奴受國厚恩死無以報顧此事涉欺罔法例甚嚴王子非真子外悉知之後有發者禍且不測老奴死不敢奉命王繆謝曰承奉言是也乃以計紿奪其印而自署承奉名行之承奉既見欺無可奈何懟以首撞壁大呌曰生不幸為刑餘又棄外藩今王所為如是吾弗能匡救禍且及矣誠不忍老見刑獄即閉戸自經繩欲絶㑹有救者得甦日夜涕泣竟至失明以死國人悲焉太史張氏曰余在史局好問先朝事諸老閹語及孝廟時輙流涕有哽咽者及歸楚見王承奉憶往事猶能歴厯道也何敬皇帝時人物之茂其厮𨽻亦莫不有大臣風節焉觀其臨議執正毅然不為利回不為威惕雖壯夫哲士何以加焉第令乆内庭筦樞密如近時興安懐恩輩詎足多哉余以是知敬皇帝之澤入人深矣朱山人赦敬朱山人名衡字平甫山人生而魁梧有膂力警悟過人年十五乃逺遊之大梁適齊魯乆客京師挾竒方醫術能詩能畫能琴能射挽五石王弧如牽絲巧貫蝨也是時孛賊反於寧夏倭奴擾於東藩山人拊臂嘆曰士不能為隋陸當忍意作絳灌何至守刀筆泣窮途乎手不釋孫吳百將七畧八陣諸書重趼擔簦走薊門度遼海入大同寧夏榆林九邊要害涉厯頗遍彈鋏無門而蒯緱行欲斷矣自知數竒還里賃居如甌簍與屠狗賣醬者為隣有詩云借居編户小如拳半掩琴書半坐眠不是啟期能自解那將三樂向人傳比值嵗儉半菽不飽有詩云老去難禁韋布寒愁懐未遣一時安而今始信凶年榖細數瓊瑤并日餐邑侯王南垣公雅重之山人義不枉以詩謝有犬卧山村月牛忙榖雨田逢人問子羽未敢至堂前之句南垣公時時損庖廪周之晚益貧罄無子遣懐詩云疎竹藏風雨寒花䕶槿籬王陵尚有母伯道己無兒所著有紫衲道人吟巻皆激楚之音也余初棄官歸聞山人名籍甚闕面造焉歡如舊識余時為園西郊外與山人日攜手往來泉石間夜或共被旬日一别别一二復聚言笑晏晏至忘爾汝園工小就余謝客著書門跡如掃獨山人月一至省試余所為歡然相勸勉也門外有事不知則山人來一起余門内有事不達則山人去為余謝過仲尼嘗言自吾有由惡言不至於耳余年來潛心經籍得以從容卒業離羣索居而不見愠於鄉黨者良朋之助也死生契濶於今三年念我共人涕零如雨昔嵗遼左西川變起倉卒當事者募財官謀士余勸山人駕山人曰少不如人老何能為年過六十家無血𦙍萬里裹革誰為輿尸忿悁鬱鬱不得志遂抱中懣之疾朝夕不能搤一米而軀幹猶偉談笑昂藏如常一日舉所蓄怪石一枚貽余曰平生一片心惟石丈知我盡檢書硯琴劍賣以為棺有田數畝分給從子麟振壻甘應澤以其老妻託二子遂絶粒不食七日而卒容色莞爾如生舍者異之時天啓壬戌九月二十日也先是余有内艱山人扶病來哭越十有五日山人訃聞余哭之苫塊間不得往視殯比葬扶杖送之門外又不得執紼及坎抱此長恨如何可言嗚呼平甫士生於亂世立名易於平世立名難求知己於豐盛時易於蕭索時難世亂雖微節可表世平即多才何用豐盛雖他人易合蕭索即親戚亦疎才如山人而竟老死飢寒沒沒牖下所遇之時然也余罷官幽棲茅衡晝掩二十年蓬逕羅雀獨山人一榻孤懸豈余能知山人山人知余耳昔虞仲翔見放自恨生無可與語死以青蠅為弔客使天下有一人知己足以不恨惜哉余有一人知己而先余死更求一似山人者則空谷之足音矣荒庭寂寞舊雨來稀憔悴衰老生無密友死誰為弔客我其己矣忽今五月八日夜夢山人向予呼石工覺而悟山人臨死贈我石意在斯乎久欲為山人勒碑以諒隂廢業而山人入夢要我如生平可謂投分寄石友者矣昔蔡中郎常為人碑文獨郭有道為無愧余才謝中郎何足以傳山人顧山人知余生平不為人作傳為人作傳者獨山人一人而己矣時天啓四年嵗在甲子仲夏同邑友人郝敬撰雲浦陳先生顧憲成雲浦陳先生者無錫之宅仁里人也名忠言更名以忠字貞浦先生生而恢竒多智弱冠補邑諸生居數年去為太學生太學生之四年舉明經又四年釋褐知寧鄉縣已稍遷知寧州無何用事貶知寳雞縣居一年復徙知光州所在有聲跡天下知其非庸人也先生好讀書能古文辭又好孫吴家言徧通其指少暇輙習騎射以為即一日得備當世緩急不虚耳先生有大度於天下無所不可簡而近人其好善天性也其有當於意即王公大人津津誦說之終不以為嫌即在下輩惟恐其不得亟聞於人即其人故所習恨知之晚即不習欣然遇之也當余結髪而習句讀最微鮮耳先生顧數見賞異之已數謂余弟若當不減而兄也先生亦數對客稱其子耕似已或曰殆其勝之客笑謂固有父譽子者乎先生亦笑也而曰自我有之何不可者我乃父子自為知已也松陵王山人承甫著聲於詩酒往來燕趙間欲以隂求天下長者而是時先生適游太學遇諸婁江王太史座上心異之徐引與語大悅曰吾相天下士多矣無如足下者因從之游不去其大司成亦内竒先生為寛諸約束益得自愉快時時相對說劍為豪飲酒酣仰天嗚嗚意氣淋漓慷慨無賴間衣敝衣行市中數問市人荆卿高漸離安在市人不省何語以為怪呵之先生愈喜同舍生齊人王明經榮中誣於法應得戍衆寃之莫敢發言先生遽入白諸大司成壯而許之王得落為諸生未幾復舉於其鄉矣先生以是益籍籍公卿間矣而顧愠謂王山人乗人之急而食其名吾不忍為也亞相慈溪袁公生貴甚意薄小一世而㑹從其客張户侯所見先生文才之特欲知先生則以私於大司成謂此貴人必無往先生曰固也雖然不可以貴人而賤吾等耳遽往袁公一見遽命酒如生平歡坐語移日先生侃侃益發舒絶不似儒生故有所貶損而袁公之下之益甚左右皆驚竊竊言渠何為者妄人耳乃敢與我主人翁鈞聞者賢袁公而重先生久之客益日進先生曰是徒為名高者非能解我也意頗厭之遂與山人次第歸歸而為園於居之偏築室數椽旁樹竹萬竿日夜讀書其中謂山人而今而后庶幾成一家之言藏諸名山老矣山人張目不答先生知其指稍試為吏遂又裒然稱名吏也而第其為人廓落人視之表裏立見亦立盡不能隂陽與俱又其才雄形不為人下易傾也又終其身不能博一第既晚而后仕少年耳目狹尋常畜之以故無由越州縣以顯而世亦無由盡先生之用余嘗從容言其意先生黙然良久曰子知其一不知其二始余為寧鄉以湖北暴胥故惡於分廵度旦夕廢爾顧余投劾乞歸者三不得也直指且過寧勞余余請曰明公必不去某者其盡縛諸暴胥以謝寧士民直指許之其后竟以最遷及其為寧州州最苦盧源賊莫能誰何余先后計下其渠魁數人俘五十人破散其黨數十百人州賴以完中丞擬特疏薦余矣俄而流賊二十四人道寧且竄去御史者不知何聞賊中寧也上疏論余而屏其功不録竟以罪貶功名之際聖哲不能定而何以為言乎子休矣先生又善邑人胡御史通州顧少參湖州范太史其人皆倜儻自喜瑕瑜不掩非閹然媚世求免非刺者也其善武進謝令嘗忤一御史坐論賔客故人相引而怠傲先生獨迎而舍之為供具甚設又為資募辨客百方居間事得己其居田善余先府君日者善京山李大參及髙邑趙計部始計部為汝南司理先生其屬吏也而獨偉視先生即往謁司理輙止飲飲輙醉有時誤為爾汝先生覺之前為謝司理笑曰其固以余為非夫乎後遂不謝及先生没計部過余為涕泣而言先生也退而相與撰次其行事余往聞里中父老言先生故嘉定人其先有道真者與僧道衍善嘗遺詩諷之隱不報乃稍稍自匿一日挈其妻子而來因家焉子孫皆貴以修約為名惟先生之父石村翁亦然至於先生亦如此顧憲成曰余故與先生同里里於邑東偏其人木强少智略於是乎有先生見為易豪耳及余長而從三吴長者㳺其慕說先生甚於其里已客燕從四方長者游其慕說先生又甚於其邑也乃今慕說先生者又甚於其在時矣余於是而知先生之不易盡也方以其淹於州縣之間以死為恨嗟乎誠以其淹於州縣之間以死為恨夫何足以窺先生哉明文海巻四百二十七
