body:
  text: 明文海巻四百二十九餘姚黄宗羲編墓文一文苑趙詵仲墓銘宋濓括趙君諱友桂字詵仲一字國芳漢恭憲王元佐十二世孫也曽祖曰崇祖曰必㘻國子進士父曰良贇集慶路錄事司典史君少有志載籍中鈎索義訓如廷尉持法不激不阿務得其平雖經諸講師詮定一有釁罅必讞而鬯之弗鬯弗止也其于天官律厯聲音制度之學尤能窮其㑹通蓋君於古書無所不究援據精博君子多其有徴間發為辭章珠潔玉温絶無鴟盤弩拔之病山中李桓先生自號文章家極慎推與數稱君典雅不羣君亦視學愈於人恒不可一世客袖文來見讀一二語弗契輙手掩几上視雲漢作他語獨善臨海舒卓卓至夜談屢及旦或怒罵如鬬勢或大噱墮幘在地惟恐卓去亟故挽遊僊都山遲之沿道行言猶刺刺逢舊館人揖有目不見飯至且辨且食入咽不計多寡斥去人皆指笑之謂病狂易云君負氣高意功名可以引手致屢試藝屢黜去蹇剥且益久志不少變每拊髀喟曰文未至爾文至禄烏能逃我未幾隨父宦金陵嵗丙申金陵大亂幸萬死得存驚讋内傷六月十五日患暴下毉不能方越三日卒年甫三十三未娶無爲主後者所著書有夏小正解詩書易諸疑辨南泉稿兵後多亡其兄友松深哀之蒐羅成書且收君骨還括以某年月日塟南明山之西抱書詣予哭丐銘其墓予發書讀之亦泣下嗚呼自師廢民散士安於寡陋獵取凡近以斧藻厥躬妄相標榜謂彼爲毛鄭此爲韓張疑然若可名世及叩其傳記所存雖古人常通習者吃吃不能道一語惟瞪目視左右若木偶人是果何爲者耶如君者殆可哀已銘曰不昭其熹不融其奇不洩其施遽淪於隳我懐伊人中心孔悲南明之西有氣吐霓化爲龍文上貫少微後千萬年於赫弗虧徐方舟墓銘宋濓庚子之夏皇帝遣使者奉書幣起濓於金華山中時則有若青田劉君基麗水葉君琛龍泉章君溢同赴召遂出雙溪買舟泝桐江而西忽有美丈夫戴黄冠服白鹿皮裘腰綰青絲繩立於江濵揖劉君而笑且以語侵劉君亟延入舟中葉章二君競來讙謔各取冠服服之竟欲載上黟川丈夫覺之乃止濓疑之問於劉君曰此何人斯諸公乃愛之深邪劉君曰此睦之桐廬徐舫方舟也濓故聞方舟名亦起而鼓譟爲讙共酌酒而别聲迹不相聞者久矣自時厥後葉君出守南昌殁于王事後五年章君為御史中丞以卒又後十年劉君亦官至御史中丞受封伯爵投老于家復以一疾不起又五年濓亦乞骸骨還山白髪垂領頽然成老翁矣今年冬來朝京師忽方舟之子膺持中書舍人史靖可之狀來請隧道之銘則知方舟之死厯一十二年矣嗟夫人生如寄石火電光眞不堪把玩如此良可悲哉濓因語膺以舊事為之悽惻者久之乃序述其事曰方舟故簪纓家自幼有俠氣好馳馬試劒尤善毬踘之戲視拘拘法度士如無物稍長幡然悔曰此豈君子道哉即從師受章句為進士業操觚為文輒爛然成章己而又悔曰是如蠧書蟫出入於故紙中何有終期哉人生貴適意盍習古歌詩以吟咏性情庶幾少遂其願耳先是睦多詩人唐有皇甫湜方干徐凝李頻施肩吾宋有高師魯滕元秀世號為睦州詩派方舟悉取而諷詠之鉥肝劌腎期超邁之乃己積之旣久圓熟璀璨明珠走盤而玉色交映也方舟猶以為未足出游江漢淮浙間與名士相摩切而詩道益昌江浙行省叅知政事蘇君天爵聞其賢力欲薦之方舟曰吾詩人爾其可縻以章紱邪竟避去築室江臯日苦吟於雲烟出没間翛然若與世隔因自號曰滄江散人天大雪獨泛舟釣江中終日戀戀若不忍舍去見者疑其非世間人元季兵亂益韜閉不出易為隠者服人莫知其踪跡所在有瑶林滄江二集各若干巻唐詩通考若干巻藏于家云方舟平居喜怒不形于色無急步無疾呼㒺測涯際性尚風義宛陵羅氏率五百指來避兵方舟衣且食之病者注藥死無所歸則擇地藏之久而弗懈事平具巨舟載還其家至正丙午正月九日方舟以疾卒壽六十八其年某月日葬於某縣霞山之原君子稽其自號題曰詩人滄江徐方舟墓表其志也方舟高祖某宋四川制置使曽祖某某路提舉常平公事祖某始自淳安遷桐廬今爲桐廬人父子奇元中順大夫平江路總管府治中致仕妣皇甫氏妻張氏有婦道前二十九年卒子三人長曰行蚤世次曰鼎次即膺以文學受薦授淮安桃源丞女二人適某某孫男九人某某孫女二人未行濓謂君子出處固立志之不同然亦有命焉當劉君之出也銜方舟以隱自高數欲挽起之㑹有故而止方舟獲終老於山林亦豈偶然之故哉余思方舟其人而不可得俯念疇昔䀌然傷情乃厯叙其故而銘之曰有才不施一發乎詩日星月露草木走飛人事變遷可愕可悲舉無遁情入我範圍咳唾所及皆成珠璣一旦觀化魂無不之非湧醴泉定生靈芝昭德之符千載弗虧楊鐵崖墓銘宋濓元之中世有文章鉅公起於浙河之間曰鐵崖君聲光殷殷摩戛霄漢吳越諸生多歸之殆猶山之宗岱河之走海如是者四十餘年乃終瀕死召門弟子曰知我文最深者惟金華宋景濓氏我即死非景濓不足銘我爾其識之卒後三月吏部主事張學暨朱芾等七人奉其師之治命來請濓旣為位哭復繫其爵里行系而造文曰君姓楊氏諱維楨亷夫其孚也裔出漢太尉震震十八傳至唐分爲四院第二院太師虞卿生堪堪生承休承休生嵓五季時錢氏有國嵓仕至丞相自譜爲浙院嵓之孫都兵馬使佯徙浙水東又分爲浙左院佯之子成隱居㑹稽諸暨之陽復為諸暨人君之十世祖也高祖文振曽祖文修以善嗜義聞人呼為楊佛子祖敬父宏贈奉訓大夫知温州路瑞安州事飛騎尉追封㑹稽縣男妣李氏追封㑹稽縣君宋丞相宗勉四世孫也當縣君有妊夢月中金錢墮懐翼日而君生大夫公摩其頂曰夢之祥徴其應於爾乎稍長從師授春秋說講析辨刺幾踰百十家大夫公期以重器至弱齡不為授室俾游學甬東鬻廏馬以益装錢君節縮不妄費購黄氏日鈔諸書以歸大夫公讙曰此顧不多於良馬耶躬為裝褫使之周覽泰定丁卯用春秋擢進士第署台之天台尹階承事郎天台多黠吏慿陵氣勢執官中短長先以餌鉤其欲然後扼吭使不得吐一語世號為八鵰者君亷其奸中以法民方稱快其黨頗蚓結蛇蟠不可解君卒用是免官久之改錢清埸鹽司令時鹽賦病民君爲食不下咽屢白其事江浙行中書弗聽君乃頓首涕泣于庭復不聽至欲投印去訖獲減引額三千俄相繼丁外内艱結廬於桐原墓族屬有酹墓者植竹笻於前發孽芽枝葉鬱如也自是不調銓曹者十年㑹有詔修遼金宋三史君作正統辨千言大司徒歐陽文公𤣥讀之嘆曰百年後公論定於此矣將薦之又有沮之者尋用常額提舉杭之四務四務爲江南劇曹素號難治君日夜爬梳不暇騎驢謁太府塵土滿衣襟間有識者多憐之而君自如也轉建德總管府推官陞承務郎君悉心獄情必使兩造具備鉤摘隠伏務使無寃民居無何陞奉訓大夫江西等處儒學提舉未上㑹四海兵亂君遂浪跡浙西山水間及入國朝天下大定詔遺逸之士纂修禮樂書頒示郡國君被命至京師僅百日而肺疾作乃還雲間九華山行窩疾且亟移拄頰樓中呼左右謂曰我欲觀化一巡如何乃自起捉筆撰歸全堂記頃刻而就擲筆曰九華伯潘君招我我當徃車馬俟我且久遂泊然而逝似聞數十人從函道登樓其步履之聲相接時明之洪武庚戌夏五月癸丑也年七十五及門之士上書於郡守林君公慶以封塋為屬林君欣然從之擇地華亭縣修竹鄉干山之原以六月癸亥舉柩藏焉君初聘錢氏忽遘惡疾錢父母請罷昏君卒娶之疾尋愈繼鄭氏陳氏子男一人杭鄭出也孫男一某女一未行所著書有四書一貫錄五經鈐鍵春秋透天闗禮經約君子議厯代史鉞補正三四綱目富春人物志麗則遺音古樂府上皇帝書勸忠辭及平鳴瓊臺洞庭雲間祈上諸集通數百巻藏于家初君為童子時屬文輙有精魄諸老生咸謂咄咄逼人暨出仕與時齟齬君遂大肆其力於文辭非先秦兩漢弗之學久與俱化見諸論撰如覩商敦周彞雲靁成文而寒芒横逸奪人目睛其於詩尤號名家震盪凌厲駸駸將逼盛唐驟閱之神出鬼没不可察其端倪其亦文中之雄乎名執政與憲司紀者艶君之文無不投贄願交而薦紳大夫與岩穴之士踵門求文者座無虚席以致崖鐫野刻布列東南間然其風神夷沖無一物縈懐遇天爽氣清時躡屐登名山肆情遐眺感古懐今直欲起豪傑與游而不可得或戴華陽巾被羽衣泛畫舫於龍潭鳳洲中横鐵笛吹之笛聲穿雲而上望之者疑其為謫仙人晚年益曠達築元圃蓬臺於松江之上無日無賔無賔不沈醉當酒酣耳熱呼侍兒出歌白雪之辭君自倚鳳琶和之座客或蹁躚起舞顧盼生姿儼然有晉人高風或頗加誚讓亟罵曰昔張籍見韓退之退之命二姬合彈筝琶以為樂爾謂退之非端人也蓋君數奇諧寡故特托此以依隠玩世耳豈其本情哉性疎豁與人交無疑貳賤而賢禮之如師傅貴而不肖雖王公亦蔑視之平生不藏人善新進小子或一文之美一詩之工必為批㸃黏于屋壁指以厯示客尤不錄人以小過黠奴負君金度無以償逼君書収券君笑與之家藏古名畫為西隣所竊其傔人追執之君曰吾業與之無賴之徒偽君文以冒受金繒或疑以爲問將發其奸君曰此誠予所作也不論逺近皆知君為寛厚長者云激者之論恒謂名者天所最忌矧以能文名則又忌之尤者也所以文人多畸孤坎壈以終其身視富與貴猶風馬牛不相及也嗚呼豈其然哉彼貨殖者不過朝歌暮絃之樂爾顯榮者不過紆朱拖紫之華爾未百年間聲銷景沈不翅飛鳥遺音之過耳叩其名若字鄉里小兒己不能知之矣至若文人者挫之而氣彌雄激之而業愈精其嶷立若嵩華其昭回如雲漢衣被四海而無慊流布百世而可徴是殆天之所相以彌綸文運豈曰忌之云乎嗚呼君真是巳然君不可謂不幸也使君志遂情安稍起就勲績未必專攻于文縱攻矣未必磨礪之能精藉曰精矣亦未必歳積月累發越如斯之夥也斯文如元氣司化權者每左右馮翼俾其延綿而弗絶則其燾育以成君者豈不甚侈也耶一世之短百世之長如君亦足以不朽矣或者乃指此為君病豈知天哉濓投分於君者頗久相與論文屢極𤣥奥聞君之死反袂拭涕久之念君之不可再得不敢有孤所屬故為具記其事而又為些辭一章以代勒銘庶幾招君歸來矣乎其辭曰魄淵流金降空眚些結英揚靈潰于成些獨騎麒麟傷遺經些衮鉞是非嚴天刑些孰軋以摧勢相傾些濬發厥辭益崇閎些芳潤内洽光精外形些離方遯圓班部自寧些流霆下舂百里震驚些鸞鶱鳥瀾天機呈些鐵甲琱戈百萬宵征些苕翹穎竪媚韶榮些籠絡萬象槖籥三靈些弹壓物怪晝夜哀鳴些九華丈人召還紫清些白鹿夾轂五霞軿些迴風翛翛雲繩繩些天人殊軌誰强攖些絳府雖樂母淪洞冥些盍歸乎來返些曽得之墓碑宋濓治古之時非惟道德純一而政教修明至於文學之彦亦精贍宏博足以為經濟之用蓋自童丱之始十四經之文畫以歳月期於黙記又推之於遷固蔚宗諸書豈直覽之其黙記亦如經基本旣正而後徧觀厯代之史察其得失稽其異同㑹其綱紀知識益且至矣而又叅於秦漢以來之子書古今譔定之集錄探幽索微使無遁情于是道德性命之奥以至天文地理禮樂兵刑封建郊祀職官選舉學校財用貢賦户口征役之屬無所不詣其極或廟堂之上有所建議必旁引曲證以白其疑不翅指諸掌之易也自貢舉法行學者止以摘經擬題為志其所最切者唯四子一經之箋是鑽是窺餘則漫不加省與之交談兩目瞪然視舌本強不能對嗚呼一物不知儒者所恥孰謂如是之學其能有以濟世哉此濓銘亡友曽公之墓憤激於中而復繼之永嘅也公諱魯字得之曽其氏也孔門弟子郕公五十七代孫其居新淦吉陽里者己久世裔之傳與夫轉徙之詳昔著于公之先墓兹不重載曽大父兼善宋贈大理評事祖天麒宋宣教郎軍器監主簿父順元韶州路儒學教授妣劉氏公年七歳能暗誦九經一字弗遺奉禮郎簡君正理欲以神童舉于朝其父力止之及齒稍長取三史日記之尋及其餘數千年間國體治亂人材忠佞制度沿革咸能言之有叩之者如山川出雲層見疊敷杳莫察其端倪公殊不以為足所藏子集動至數百家各攬其精而掇其華聞有僻書隠牒不憚道里之逺必購得之旣得必篝燈讀之達旦不寐發為辭章龎蔚炳朗毅然有不可奪之氣廬陵劉提舉岳申與之語連日夜不休嘆曰不意後生中能至於斯也其將以文鳴乎杜内翰鄉之丈人行也公負笈從之游益充拓其所未至析疑辨惑惟日不足遂以博極羣書稱于時公猶謂未要于至道述長書一通謁虞文靖公集於臨川虞公大恱曰昔程子與張敬夫年十六七慨然有志聖賢之道子能如是復何讓古人公年蓋十九矣由是益潛心濓洛闗閩之學分别義理密如蠶絲牛尾而尤愛吳文正公澂之書吳公亦居臨川其著書滿家無大無小公一一訪獲之玩繹未嘗釋手久之充然有得盤桓林泉以道自娛若將終身焉至正壬辰天下大亂州縣所在驛騷公召里諸豪集健兒持兵以保障乎一方仍椎牛釃酒開陳逆順禍福言甚剴切衆皆聳耳而聽卒無敢犯非義者人號曰君子鄉及入國朝有詔纂修元史勒成一代之典遣使者起公于家公贊決部居補苴罅漏者不一而足其功為最多史成上坐端門召諸史臣有白金束帛之賜公居其首焉公將乞身還山㑹朝廷開局編類禮書輿論以老成之士無踰於公者共堅留之議禮之家有如聚訟自古難定於一公於羣言沸騰之中揚言曰某禮宜據某書則是從某說則非有不服者争相辨詰公厯舉傳記答之各心醉而去俄選入儀曹為祠部主事階承事郎時洪武二年十二月也常忠武王薨高麗王遣使來祭公索其文觀之使者靳不與公不可使者不得已出之外則襲以金龍黄帕内則不書洪武之號公責之曰龍帕固不宜誤用若納貢稱藩而不奉正朔君臣之義果安在耶使者頓首謝過皆命易去之乃已安南來貢主客曹己受其表將入見公取其副覽之其王乃陳叔明公曰前王陳日熞爾今驟更名必有以也亟白尚書詰之使者不敢諱蓋日熞為叔明所逼而死遂簒其位中心懐懼故托修貢以覘朝廷之意曰島夷何狡獪如此却其貢不受五年二月上問丞相曰曽魯在禮部今何職也對曰不過主事耳即日超六階拜中順大夫禮部侍郎公以順字犯父諱辭就朝請下階吏部以國法有定不之許倭夷入冦戍將每捕獲之上憫其無知命儒臣草詔歸其俘公之所譔有中國一視同仁之語上悅曰頃觀陶凱文已起人意今魯復如此文運庶其昌乎凱禮部尚書也八月奉旨考京畿鄉試入院之後忽吐血一升公猶力疾閱巻不息自是遂奄奄不振九月膏露降鍾山羣臣咸見諸詠歌公獨譔賦以進十月上將郊祀出宿齋宫命取諸作使侍臣更畨誦之至公獨曰此曽魯作耶援據既精鋪叙有法豈新近之可驟至哉十有一月疾愈篤上章乞骸骨甚至中書以聞上惻然許之十有二月辛卯歸舟至南昌公謂次子圭曰吾命止明日不能至家矣然吾以一介韋布之士受國寵恩位躋法從又得守正而斃死復何憾所憾者不見二孫之成立也即趣具觚翰為書戒之壬辰次石岐潭果斂袵而逝距家纔兩驛爾丙申至故居丁酉始具棺斂擇地於縣南屏山之陽以六年某月某甲子祔葬九世祖高安府君之塋從治命也公蓄德熙和人近之者温如春風不見忿戾之色然其人則山澤之癯身退然若不勝衣未嘗有所矯飾其處家也事親克孝父喪哀毁致疾踰年而後能起己而二兄諸姪相繼捐館公抆淚經紀凶事三年間葬十餘喪且撫存其孤惸惟恐或失其所平生輕財仗義喜周人之急四方賔客日登其門公倒屣迎之了無倦容嘗一試江西鄉闈有司寘諸乙榜人為不平而公亦澹如也其出仕也精白一心有知無不為凡典禮涉于制度者必經公損益而後定雖古者吏牘之繁簡署字之上下人所不能知公獨稽諸書以為決公誠所謂濟世之學者非耶公屬文不喜畱稾其徒雖有所輯錄猶未成書其自著書有六一居士集正訛南豐類藳辨誤藏于家他咸未脫稿當公修元史時濓實為總裁及入南宫又有僚友之好故相知號爲最深共坐官齋更析互辨每至夜分嘆末學之空虚傷古道之寥落又復相視囅然一笑嚴陵徐導生嘗有言曰南京有博學之士二人一以舌為筆一以筆為舌其意蓋指公與濓嗚呼導生過矣濓也何人而敢上儷于公哉雖然公未嘗欲棄也相期他日幸歸休必胥㑹焉共成一書庶可藉手以見前賢公今不可作矣故因銘墓之文而屢興懐于治古之時也世之讀者必將深感焉公讀書之室曰守約齋學者遂稱守約先生享年五十四歳娶聶氏先二十年卒公再不納配一榻蕭然如山林枯槁之士人難之子男二人長塾今來請銘者次即圭出為仲兄後女一人應真適劉奉孫二人正龍夢龍銘曰氣化糾纒人文昭宣萬類斯甄兮天設地施一偶一奇形聲相資兮載籍繽紛六藝攸尊各闢其門兮枝分葉敷散爲千塗混其精觕兮彌綸大邦物采文章有變有常兮不生碩儒孰軋其樞孰苞其腴兮玉笥之陽神珠吐芒莫自翳藏兮有明麗天束帛戔戔蒐羅俊賢兮衮褒鉞誅寓于䇿書輿論所孚兮儀曹之升議禮稽經日維烝烝兮黼黻帝猷上窺殷周功在刪修兮所積之忱所發之深開陽闔隂兮正笏垂紳其色誾誾邦之老臣兮媚學躚躚其中枵然何翅霄淵兮天胡降喪一鑑之亡四國之傷兮其神上征化為列星寒光晶熒兮下射屏山馬鬛桓桓名在不刋兮高漫士墓銘林誌永樂二十有一年二月三十日翰林典籍漫士高先生廷禮卒於南京之官舍年七十有四子三人還櫬以葬于長樂縣崇丘里之半占山使致韓府長史楊曜宗狀來北京俾某為詞將以刻焉先生博學能文尤雄于詩雖談笑奮筆而精思力摹莫及蓋詩始漢魏作者至唐號為極盛宋失之理趣元滯于學識而不知由悟以入自襄城楊士宏始編唐音正始遺響然知之者尚鮮閩三山林膳部鴻獨倡鳴唐詩其徒黄元周元繼之以聞先生與皆山王恭起長樂頡頏齊名至今閩中推詩人五人而殘膏賸馥沾漑者多黄終于校官周顯刑曹員外郎先生與皆山並以詩遇今上初二人自布衣召入翰林皆山即除典籍卒先生爲待詔九年始陞典籍平生賦咏流傳海内有稿曰嘯臺集曰木天清氣集毋慮千餘篇其選唐詩品彚九十巻拾遺十巻議者服其精博能書工畫時稱三絶書得漢𨽻筆法畫原於米南宫父子出入商高間方壺子畫妙貞一初識先生稱賞不置曰異時當為名家在翰苑二十年四方求詩畫者争致金帛脩餼歳常優於禄入神瑩氣融懐高簡善飲酒喜談謔與人無賢愚新故盎然如一素彊無病晩得風眩疾歳輙發無甚苦一日與故人飲極歡夜分乃寐旦忽眩作弗能言卒考諱駒清才不羈蚤世諡皎白居士妣陳氏宋樞密使洽之孫先生事母孝謹年五十七方貴未幾而母殁娶陳氏先卒葬得佳兆虗右夀藏三十四年乃合葬三子曰熊曰熟曰然五孫曰箕曰唐曰黙曰堅曰莆城先生諱棅字彦恢仕名廷禮漫士其號也實宋尚書張鎮之後曽祖麟以出繼高氏祀復無子取猶子隆為後遂從高姓是為先生之祖系曰吳航山川蜿蟺扶輿是生偉人間氣之符嘯風嘘雲山含川嚅乾文坤象隨厥吐舒金石鏘鳴琚珩拱趨他人戛戛己獨于于上追杜李高岑為徒畫船烟埃石經𤣥圃精聚神交視無今古三絶何資一官而旅眷夢芸臺晩心棋墅龍門其居樓曰玩宇落月綺裘清風玉麈鴻儀冥冥蝣羽楚楚其神天游而蛻兹土王仲縉墓表王汝玉仲縉諱紳姓王氏其先太原人初遷祖彦超為周鳳翔節度使始由㑹稽徙居金華之義烏今王氏遂為義烏人十三世祖固從安定胡先生遊登宋皇祐五年進士第得官思陽令其後子孫皆業儒躋膴仕詳著王氏家乗考褘字子充以文行重海内與潛溪宋先生齊名大明初擢儒臺校理厯官起居注出佐南康臨漳二郡後朝廷開館修元史召為總裁官尋擢翰林待制使雲南仗節死時仲縉甫十三嵗聰明過人落筆為文沛然不可禦鞠于伯氏綬事母夫人何氏盡孝及卒哀毁踰禮未幾綬亦没仲縉獨綜理生産作業㷀㷀憂患中而傑然負奇志視世務瑣瑣無足動其中暇日益取經史百氏言窮其浩博㑹其指歸曲而暢之引而伸之縱横磅礴出入上下務探擷其精英乃已潛溪先生一見即器之曰吾友王待制其有後乎一時俊傑多自服不逮蜀王尊賢下士聞之馳書幣聘致待以客禮仲縉痛先待制死節蠻徼遺骸未返丘隴白其情事王悼憫之給道里費以行至雲南訪求不獲遂即死所奠祭仰天號慟幾絶過者為之泣下霑襟述滇陽慟哭記以著志旣還王慰勞備至蜀人無貴賤咸知敬愛居無何有以仲縉名行薦者徴詣天官授國子博士諸生方翕然嚮慕而仲縉不幸卒焉實洪武庚辰十二月丙午也享年四十有一明年三月壬申子稌奉柩歸葬象鼻岡之原娶丁氏曹氏生四子長穆次即稌次稔次稚仲縉平生無他嗜好惟喜為文章有繼志齋集三十巻藏于家昔勝國之季海隅割裂光岳氣分不完學者所習肄委靡極矣待制公以豪傑挺邁之姿力矯時弊追古道而反之倡為雄偉閎大之辭際皇朝龍興之運俾天下後生晩進有志斯文者讀之若披雲翳而睹青天不知心目開朗也及持節使絶域慷慨狥義視死如歸遂使倔彊巒酋凜知中國威風氣燄之可畏迨王師南征勢若破竹而六詔數千里咸入版圖公實有功焉僉謂天之佑相盛德不在其身必在其後人仲縉年富力强學篤而行修其來者殆未艾異日必能繼厥先緒成一家言以黼藻皇猷鳴國家太平之盛夫何未及中壽而遽奪其生耶葬之五年王汝玉氏悲待制公不昌其後仲縉之不遂其志而表其墓曰天之于人賦以才者或不能賦之以壽豈二者不得而兼有耶抑亦抱魁梧之才者能漏造化之機先事物之兆非特為人所忌嫉鬼神亦將忌嫉之耶夫亦天下之事有不期而相值耶若仲縉之才之夀其必居一于此矣余不得而知也待制公靈爽在天地間與日月争而乃靳嗇其報竟何為哉竟何為哉然稌也積學能文王氏之澤庶幾在是自述誄王偁王偁字孟楊其先東阿人宋寳元康定用兵西方士有没于元昊者王氏遂為西方人元有天下其地最後附賜姓唐古氏高祖王父某從下江淮授武德將軍總管鎭廬州曽祖王父某祖王父某相繼襲爵改上千户没俱葬上蜀山下先府君某當搶攘以材用薦者調民職廬州路治中厯江西福建行省郎中至階朝列大夫潮州路總管當時稱亷吏第一人所涖政績卓異子惠小民攘剔豪右禮賢士植綱紀民奉以祠元運改旺度時不可為浮海去之道閩閩父老遮畱退居永福山中為黄冠服者十年朝廷聘之恥爲二姓臣遂自引決嗚呼是時偁生方六齡家蕭然壁立太夫人守節自誓艱阻備嘗手疏先君之蹟與古今豪傑大畧教之外王父姓劉氏諱某由宣文閣博士出僉閩憲再召為祕書丞没王事贈嘉議大夫福建行省㕘知政事其學淹貫靡不究博古好雅翰墨之妙絶當世不及見之閩先正聞過齋吳公學行醇偉為士林望與先君交誼相與也先君没時屬偁夫子教之第未弱冠夫子没倀倀㒺依歸賴外王父遺圖書手澤多杜門自研礪少多病負第者三年莫臻其至弱冠入庠序與陳君從範游陳蚤入閩過夫子室獲其指授懇汰其瑕礫示以瑜瑾一旦如發蔀矣洪武庚午賔興歳領薦方去海濵觀光上國㑹試禮部不利例入國子處縉雲朱先生館下日求齊魯士與談訪其遺風及四方之賢者而私淑之上表陳情乞終養高皇帝憫之南歸越震澤徘徊吳㑹間不敢畱趨侍湯藥膝下始冀収其實而從範己物故閩故老亦凋剥殆盡四睇毗落無可與語晩得晉昌林誌相與論學假以柯範抗顔為多暇則窮幽極深徜徉物表趣豁如也未幾太夫人捐館舍居喪哀痛不敢渝禮旣合先君塋廬墓下者六年永樂初元以推轂者至京師待命黄閣因自陳願處學校勵人材不允授從事郎史官翰林檢討進講經筵以文字供職時錢塘王洪擅詞垣與同官一見過相排重勅修大典萃内外儒臣及四方韋布士毋慮數干人濫竽總裁之列大將軍英公復征交阯辟居幕下於是泛洞庭浮沅湘厯九嶷弔蒼梧徴兵南海旣而窮象桂道五管觀師于日南九真之交時有贊勷大將軍待以為揖客歸仍守其舊官先娶鄭氏新安人前名御史潛之孫女先卒再娶薛氏閩故族孝養于姑貞淑内得其職生男一人振女子某一人其次男拱女子某一人側室李氏出也此族系出處之㮣少鋭志于有為毅乎思準古以馭今而用弗克施學雖服羣聖獵百家窮幽明亟于聞道而質淪惷愚遇登高弔古慨然發歎悲壯愉樂一寓于詩若文而辭愧土苴其為人則似隘而容似傲而恭家貧而心樂身困而處裕然疾惡太過遇權貴不能俛眉下之任情以直不能骩以徇人成功此其見短于世也見人善不啻若己有之雖匹夫問未嘗不竭以盡與人交内外莫敢攜此則自以為長焉若夫抱以為終身之憾者齔失所怙哭吾父幾不能生粗知學而哭吾師如哭吾之父焉未幾哭吾友如哭吾之師比得禄而太夫人不逮養有子教之未立荷兩朝之恩而莫一舉報嗚呼况兹身繫縲絏西山東陵淆而未分孤臣之號庶女之痛南音之戚梁坪之章孰為發之日者以支幹推定人禍福生死謂吾年日皆庚迄于今歳在閼逢麗于鶉火其弗延矣嗚呼其果然耶孟子曰桎梏死者非正命也晝夜之理吾嘗念之因述其系而極之以呼天之辭用自誄俾後之為烏鳶為螻蟻在陽城在回禄或返其遺骸或招其魂魄或藏其衣冠庶令有考者憫其志而哀之焉辭曰予㮣觀夫古之人怙材者恒困于弗施志大者願聖賢之之可躋嗚呼孟楊矧爾乏古之才而尚其志焉得不奇於時而諉於戾爾負而君爾負而親嗚呼誰其白之悠悠蒼天劉先生墓志銘王禕處有文學之君子曰劉先生演字浩卿生於大德庚子九月十日卒於至正壬辰三月九日享年五十有四嗣子師曽以己亥十月十三日奉柩葬於麗水縣孝行鄉之桐原旣乃以書扺禕曰先人所與遊者衆矣然相知深者宜莫子若葬必有銘兹誼為古銘先人者非子而誰以惟子也請昔先生之典教義烏也禕時在諸生列托斯文雅故非一日重以師曽有請銘安敢辭劉氏世為處之麗水人祖桂父澤皆不仕先生生有美質於書無不讀自少工為文章有聲籍甚上饒鄭君原善其學長於經而明於性理天厯間以名進士為處州錄事先生因從受業焉磨礱浸灌所資日深其於經書春秋尤精著其大義輯為成書一時學者皆誦習之其為說務以察前儒所未及非特利後生小子場屋之業而己其他所為文皆從容順適不戾於矩矱講辨論議咸足以達其意要其歸無不本于理者至於詩歌則舂容大篇如奔濤怒颿勢不可遏鏗鏘短句如鳴金戛玉粹然成音流麗而平實自成一家言嗚呼先生之所自致若此所謂文學之君子非歟先生姿貌豐整儀度醖藉性倜儻且和易樂周人之急與人交無間親疎久益相好四方士大夫至是邦無不款門者先生與之或談經術或論政理或以詩章相倡和莫不厭其情乃去餘膏賸馥霑被於人為多至正初起為義烏儒學教諭又為龍泉教諭後署明善書院山長未及上而遂卒蓋先生之志甚逺其材甚周也惜乎不克顯榮不及展其材之蘊而推其志之所欲為故其卒也無不爲之嗟悼嗚呼抑豈知先生之自致於不朽者固不在彼而在此也先生娶同郡葉氏有婦道前十一年卒至是合葬焉子男三人長則師曽次師夏皆能世其家業者也次師雍早夭孫男一人煜女二人銘曰嗚呼先生邦之良也學韞于躬氣又昌也振華舒耀為文章也儒林文苑肆翺翔也雖遏厥施所存者長也亦旣全歸兹其藏也後千百年勿壞傷也凝熙先生聞人公墓表王禕凝熙先生姓聞人氏諱夢吉字應之婺之金華人也凝熙者門人之所以諡先生謂先生為德執醇而弗變含和而有耀以凝熙易名為稱情也然先生非隠者也嘗仕於時有官位矣不見為先生稱而稱以私諡者先生之德不因官以為重故不稱其官而稱其德也維聞人氏系出漢太子舍人通後居於蜀宋季有諱韶者為金華縣令因家焉子孫遂為其縣人縣令生逸孫元初為温州路儒學教授教授生詵老仍世業儒號桂山翁翁生三歳而孤母王再適項氏翁鞠于碩氏因從其姓娶劉侍郎諸孫女實生先生乃以先生還氏聞人云先生幼有異質學知嚮方郷先達定菴王公某與其魯齋文憲公柏崇高伊洛之學以承朱子之傳翁皆及其門而所學得之定菴為多於是以其所得者以教先生父子自為師友夙夜磨切所資日深先生於七經傳疏悉手鈔成帙義理所在必深究而密察雖其微隱剖析靡遺凡訓詁家之說有紛挐牴牾者皆爲别白是非使歸於一閉户討論逾十年不出郊一日有約游城南者取所藏革履御之履久弗御底腐且穿矣久之乃開門講授四方學者咸來受業婺為憲府所治司憲者每禮致先生坐郡庠為學者師及厯仕教官所至學者争從之游先生設教先道德而後文藝有以經傳疑義為問辨者必為敷陳衆議而以已說折衷之使其領解乃巳前後學徒毋慮二千人隨其資而裁補之多為成材先生信道甚篤持己應物一本於誠涵養既純内外一致長身山立而退然不勝衣氣貌沖粹如𤣥文之玉温潤無瑕而孚尹煥然平居未嘗有惰容雖祁寒盛暑常正襟危坐淵然若有思令人望之起敬即之愛慕不能舍以去蓋識與不識莫不稱為有德之君子者也泰定丙寅先生舉進士於郷上禮部不合繼復連中鄉貢副榜用薦者為校官厯處州學錄衢州西安縣學教諭昌國州學正以累考及格授泉州學教授至正戊戌朝廷遣治書侍御史李君國鳳經畧江南得承制封拜君嘗從先生游知位不稱其德除福建等處儒學副提舉而吏部亦以先生年勞當陞調慶元總管府知事皆不上壬寅三月某日卒於永康之寓舍享年七十以其年八月某日葬於某郷某山之原夫人胡氏無子以弟之子復亨後女二人長適唐壽道次適胡裕夫人之姪也先生之没門人前翰林編脩宋濓原道書院山長吳履仁和縣丞唐元嘉等既相與謀私為先生諡又告郡太守祠之學宫而濓復述其所履為狀今國子學錄張丁嘗集先生遺文為六卷且以狀授禕曰子吾郡人知先師為詳冡上之石宜有以刻之惟子也屬先生禕執友也誼不敢辭乃論次如右而復爲之言曰嗚呼聖賢之學先生之所為學也觀其立誠以致乎本推善以及於人表裏融通始終純壹稱爲有道之君子夫何憾焉嗚呼先生為足以不朽矣揭其徽猷著於貞石後之來者尚有考於斯明文海巻四百二十九
