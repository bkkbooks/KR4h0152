body:
  text: 明文海巻四百三十一餘姚黄宗羲編墓文三文苑俞潤夫墓銘莊昶番陽俞潤夫旣葬之二十年其子錫始以其遺命持姑蘇君邱先生書來曰願有銘予於潤夫止相識成化丁亥予自翰林得罪黜為南京行人司副潤夫以成均上舍來厯事潤夫儀觀舉止偉然一儒予意其必蔚然有文者也亟詢之潤夫出所業舉子文字眎予其頓挫布置若栁子厚樊宗師家數者屢屢視今所謂時文殆五陵年少而衣以深衣大帶其安于體者雖殊而所以待夫人者則已厚矣旣又出楓落稿詩一帙其不得志者類郊島其理到之語視山谷后山少減其鬯達而茂者又皆出入簡齋若所謂鈍如茶山易如放翁亦瞠乎其潤夫後也由是姑蘇沈仲律紹興徐大華嘉興沈元節諸公莫不與為文字交而潤夫之名隠然起京師間矣居數月潤夫以代去謁選天官有自京師來者皆曰潤夫死矣識潤夫者以其不得一第而死莫不為之痛惜為之延訪以為其真死否也方未定潤夫以痴兒事了歸其郷過南京别予予見之驚曰君何自而至哉豈傳之者誤也君曰非誤自非納言劉先生深于醫厚于戚璠登鬼錄久矣而今得先生見者幸也予與潤夫一時相對如在夢寐言畢潤夫抗手去且顧曰天不死我我當熟五經徃拜白沙先生而學焉歸而就正其是非於先生矣時潤夫去甚急予不得更以一言入蓋成化庚寅也潤夫去未三載潤夫與某御史救張同知書傳至矣未幾病灼艾答族兄某詩又傳至矣未幾屬纊之言乞墓銘於予者又傳至矣方潤夫以書與御史争張同知事其氣何壯曽幾何時灼艾屬纊之言相繼而出亦獨何耶嗚呼豈潤夫之死昔固非真而今固亦非真耶抑誤潤夫者乃復誤耶臨決之言一何琅琅乃若是耶而潤夫乃真死耶非耶潤夫之可與言不特區區文字之間而己其寡黙其謹肅已可入於君子使其未死得舍所學以周旋於白沙之門潤夫未可量也而江門品第豈在陳秉常下哉雖上下林南川無恧己惜乎天不假年而為聖賢糟粕也名之聞與不聞第之得與不得直潤夫之浮雲者耳惡足為潤夫惜哉潤夫之曽祖諱可載祖諱杌齋父諱思誠娶於徐氏男三人長男某次某次即錫邑庠生女一適劉生宣德庚戌七月十四日生成化壬辰十月十八日卒葬古城山予與潤夫非泛然朋友比而錫之來也抱其遺言又重以邱公之懇錫可無銘于潤夫于邱得無銘潤夫哉銘曰道以口者譟道以心者了其譟其了潤夫亦早有拜潤夫墓者將亦知其千萬古之抱耶吳静觀墓碑林俊文章漢劉揚班馬而下唐二家宋四家其間負豪樹勇與之角要皆一時翹楚國朝文明以止昭回下飾潛溪東里嗣照而聯聲迨天順甲申十八庶吉士之選盛矣莆與者陳常卿愧齋吳學士静觀愧齋温純爾雅公瓌奇跌蕩限韻命題即席聯句動輙數百言豪詞警語如壯濤激浪飛雪走雷雲觸山而電迸發同時文正公西涯峯回海立公直欲相長雄無畏風稜孤峻不屑取同俗當其意畧分忘年間有未愜意氣衰冷言語為之無味以故躐収巧化率無公銜名官幾三十年僅一與實錄金綺之錫由檢討而修撰諭德皆九載後遷又三年朝論滯淹以久始侍讀學士署而南君子以為得立官之介公雖文字職業而決擇内定宿所知與無間賤貧每長篇短章伸紙立付自他時有干購必覈事是非人望實可否不爲勢隆赫儀幣豐腆易素君子以為植己之嚴其修實錄也要人子冦某賂優其父半詞公曰苟為是負所學負朝廷他日何以見董狐地下君子以為得持論之公兩領㑹試同考所得多名士㑹元儲公殖庵其尤者也諱衍字希賢以字行更字汝賢吳自沈坡徙鰲峯又徙東井父諱熊有郷行封檢討再封南京侍讀學士母黄有内懿與配朱俱封至宜人公事親孝敬而友其弟希亨以厚嘗一乞歸省歳時致俸金文綺食品之奇猶惴惴然屬心曲于弟以為親慰頃之肉未寒而家遽落平生無他嗜好書巻不釋手有惠本必閱之盡然猶酒未忘情予郷國特愛嘗有忠告公為予止三月竟以知舊復勸勸復飲𢎞治戊申予赴滇南公載餞我于龍灣舟次淚油油若弗勝嗚呼謂竟是訣耶乙酉五月二十八日也壽僅五十三訃聞孝宗念儒學之臣優以祭旣之二親亦長逝谷清蔡山之葬子彰符彰武彰憲强為力今惟彰憲乎在二孫正誼正宗二曽孫某某復始錫類將有泣中書之石而著紹訓之書者矣嗚呼公文章為莆立幟名家落落擅響者誰與假之年又可知也昔人論退之元賔之誌謂不在壽夭之間夫元賔之才其誰則限之使公而在文正將不怗怗於文宗之席惜公亦為莆山川靈氣惜也位遇詣極其將誰計哉序而文之碑銘曰莆始自唐文昌發祥日杲星寒有曄其光豹躍龍翔鸞鵠停峙公起詞垣嫡宗是祀蘭臺芸閣疲神役精奏彼金石羣喧寂鳴公時舊學亦古良史侍直帝旁妬生于美物不尚全才名忌盛並收兼容天子之聖維世孔縮維名孔修維生以弗酬維後之收凌谿墓志銘李夢陽嘉靖五年十二月乙丑中奉大夫雲南左㕘政凌谿先生卒于家越明年十二月庚申葬郭東三里官庄原先是訃至大梁其友人夢陽旣為位哭將絮酒束芻使使徃奠之㑹其弟應辰以書狀來徴銘曰先生天下士也先兄固雅善公敢以銘請而厥子藩致懇辭更苦讀之令人淚簌簌下曰凌谿以文崇其身所謂世人皆欲殺之者乃天亦忌之使弗延耶夫人者顧子誄之備矣乃其心康之文足白之矣而予復奚言者志曰凌谿先生姓朱氏名應登字升之揚之寳應人也生而犖奇童時即解聲律諳詞章十五盡通經史百家言其父江陵公者異之然懼其踰也約之古凌谿悟乃著申臆賦以見志而力殫于淵學於是飫醇探臠程猷經用噴英摛華樹聲藝林矣年二十舉進士時顧華玉璘劉元瑞麟徐昌穀禎卿號江東三才凌谿乃與並奮競騁吳楚之間歘為俊國一時篤古之士爭慕嚮往樂與之交而執政者顧不之喜抑之北人樸恥之黼黻以經學自文曰後生不務實即詩到李杜亦酒徒耳而柄文者承弊襲常方工雕浮靡麗之詞取媚時眼見凌谿等古文詞愈惡抑之曰是賣平天冠者於是凡號稱文學士率不獲列于清銜乃凌谿則拜南京户部主事隂欲困之凌谿剸棼斷錯乃顧亨于官而其學愈淵居無何陞延平知府意州郡吏必難乃凌谿為之愈益亨乃於是陞陜西按察副使使提學凌谿闢正學院集秦士高等於中置官設徒豐餼嚴約談經講道至者且數千指風教大行文自韓歐來學者無所師承迷昧顯則我明旣興隆本雖切然要奥未聞也及凌谿等出創覩駭疑大不容於人人各以所不勝相壓而凌谿性挺直不解假詞色於人更多憎口恨不即穽之幸例謫荒裔徃禦魑魅尋陞㕘政卒罷去凌谿歸潛伏草莽中温繹前業期十年讀書償所願而今亡矣噫嗟嗟悲乎悲乎人忌之天亦忌之邪夫蛾眉胎禍才美秧毁順徃逆來孰非爾者然英人志士每甘心窮約而不悔者徒以人者難必而天者足恃也十年之内徐何載淪凌谿胥殁天實忌之矣人何尤哉噫嗟嗟悲乎悲乎凌谿生成化十三年正月己未得年五十毉旨曰先富後貧病從内生言淺狹之易折也凌谿廓落易直憎口日哆而聽之如蒼蠅過耳斯其量可與伈伈俔俔者道哉退研精肫推訂律厯運數讐史質經底詮名實流覽今古横睨宇宙視軒駟直芻狗耳大命中奪齎志長畢非天忌之而誰忌耶卒之日適邑官來謁揖讓而氣絶斯病内生之㫖否邪噫嗟嗟悲乎悲乎凌谿他所奇節隠行與凢厯履宦業忠孝友義言動細小莫之具述第述其生死大槩闗運數者如此詩文則自有集行于世江陵公諱訥封南京户部主事配范氏封安人江陵父瓘以處士州郡徴之不應嘗與修英廟實錄處士父宗泰宗泰父彦明徃㑹凌谿面咨其家世趙宋間名之修者居于吳為學官宋季北徙徐名寳臣者元初為將軍元季徙寳應我朝名鼎者通判耀州後謫戍為京衛兵然莫詳其系次凌谿娶于陶亦封安人生子一曰藩孫子女各一藩篤古世其家學朱氏弗衰矣銘曰陸有時洋湖有時桑不崩者人於惟其文凌谿子墳禮曹郎楊君生壙碑楊循吉堪輿上下元化處中是生萬物予得為人其所居距大海十舍許蓋宇内東南之陋夫也今則素餐于世八十五年行將奄歸𤣥宅返乎大初相彼廬右有邱焉我之永歸庶幾在是恐一旦先朝露無人紀述乃自為文琢石而鐫之君姓楊氏名循吉字君謙𢎞農郡望族周宣王子楊侯之後漢太尉震之逺裔也唐丞相綰清德著聞宋學士億文辭蓋世至于國朝三内閣文貞敏定名彰華夏門閥盛矣君世家崑山元末雲擾來居吳城西市坊高祖子中性忠勇䇿名天府戰死妣陶守節嫠居洪武中選為内庭姥姥供職事末年放歸今先塋首穴配葬衣冠者是已陶生子五人曽祖考居長以富民填實京師供億有年仲氏商閩尤富廛屋跨里叔亦眉壽從居同稱淑士最幼二季由母故得官御用少監及神樂觀提㸃雖非顯融亦不下賤考府君封承德郎母劉封安人安人之兄擢解元於正統間官至三品楊業儒自此始君少習易弱冠登科又七年憲祖御天成化甲辰科幸叨黄榜擢拜儀曹為京官末職幞簡青袍入參朔望荷人生之極榮𢎞治初逮事孝廟時五王冊封備員執事獲從堂官拜華蓋殿得覲龍顔事竣賜宴直房弁賞羅綺福薄命蹇痞癖内攻日食米止三合恐曠職致尤上奏乞換校官不果遂乞歸蒙恩准放次年貤封典下郡諸侯具彩輿迎賜二親冀報劬勞之萬一矣自惟受官無補己未歳清寜宫災下求直言不揣應詔上疏請復建文君尊號以禮文事分所當言用是塞責帝衷欲允大宗伯以事體重大弗敢覆存為文案傳聞收入太史氏未知然否旣而謹厚大臣逺貽如瓶之戒一向守黙性偶好書結廬天峯院折松枝為籌課麟葩經稍通章句傍涉子史百家又及千卷時或歸省從郡使君游或為文章吐言亦未名家正德初嚴慈旣殁寢苫先隴傾貲修築糜千金既畢大事每歳率持齋誦經一百日不出以報如此十三年庚辰歳武宗在南都蒙呼試樂府三次扈駕凡九易蓂莢告歸是冬復取如京莫辭趨命歳齋不廢明年夏南歸别築室支硎山下修葺舊聞名雲峯廣要檢書旣多稍諳典故然以筆耕度日不作生業有負郭田百畆悉賣不存如此又十年皇上龍飛嘉靖十五年田野間樂聞盛事時則恭逢九廟肇興上頌文一篇蒙頒史館薄表葵藿之敬諒無補益也外華陽求嗣齋儀十巻同進亦蒙嘉納金枝應禱慶洽普天而有日精射稿之祥屢見于室奇哉山農共覩非敢妄道是年冬自西山還歸故村埋頭隱伏終日惟與古聖賢相對輪蹄斷迹亦不尤人自是年益老耳聵目昏龍鍾彊步起拜必俟扶自知去死不逺昔李白一子逺遊不歸不幸類之君配趙生子二一從北上僕僕於外未歸一喪京口舟中今停柩在殯所庶生二𦙍尚幼頗賴應門不得肄學書無紹焉有墳自築前溪後城亦足偃臥文集方斟酌未定書三四種有完有未完愧無寸長不欲勞他人之筆所貴以自述為不誣故撰其碑云爾誄曰上古人淳壽常百許今兹耋年久寄逆旅歸休何時宜有告語凢人之生口體為主如何到予無一克舉彼炫文繡浣衣我處彼富倉箱我之朝黍静言思之不乃自取有官不作此身日卑無財可恱親友益離古之高行豈汝能追弗蒙其享但招寒饑原憲長貧李廣數奇命也奈何莫為而為抑别有道非時所知景公千駟民稱伯夷念昔辭官常虞早萎豈意還存雪鬢霜髭一壽僥倖他從缺遺人之墓也期千百年我則不必其然亦不必其不然掩骸之後悉付于天畊黎表樹皆非己專常存不化惟有神仙廣成千歳亦隨雲烟不化還孶日増萬千宇宙雖大莫能充塡三山六水一分之田穀少人多將何具饘乃生變化隂陽互遷前除後續世以相沿大鈞制則不足深憐古多達士裸葬未䖍從容自祭靖節為賢有書方編有文未鐫無非糟粕不希流傳且夫生也憂死則否逺恥辱平仇讎萬苦千辛一筆都勾以還造物與鴻蒙游錫汝長眠草綠仍秋所以供我惟此樂邱自古有死聖謨垂休曽啟手足完軀是謀老佛徒誇忉利瀛洲纒綿不了又起一頭大哉簡要儒家者流時來委順至死彌收舉此玉符更不他求重負國恩涓埃靡酬亦負罔極自同蜉蝣嗚呼傷哉嗟斯人之在世無一日得志遭讒履厄人百遐棄夫亦何愆坐不富貴終當舉手永謝塵世陳辭旣舉請刻以記過者來觀莫厭辭費明故中順大夫浙江温州府知府宗儒文公墓誌銘楊循吉𢎞治丁丑冬十一月上起南京太㒒寺丞文公於家以為温州府知府公扺廟堂書力辭不果從遂以單舟赴任至之日首釋繫徒千人民大恱旣而以法約豪强咸遭于令設施詳明惠洽黎庶尊禮耆德風以丕厚明年夏六月己未卒官年五十五凡遺所著文章總三十巻别為奏議三巻瑯琊漫抄一巻嗚呼惜哉公諱林字宗儒其先衡山人相傳以為宋丞相信公之族高祖俊卿元末鎮逺大將軍湖廣管軍都元帥假金虎符鎮武昌曽從祖定逺從高皇帝平偽漢賜名天龍功授徐州衛左所副千户曽祖定璁散騎舍人始徙浙西祖惠遂居長洲不仕父洪易州淶水教諭贈太僕寺丞公舉成化壬辰進士試令永嘉即有擊强名調博平以其邑小更用簡治蒙恩召為南京太僕寺丞丞威久弛振而剛之屬吏尊奉如法官又撰馬䇿三篇以獻時嘉其識尋移疾歸家而温人思之不忘朝廷遂以為守公乗宿望徃守故民聲振東土為之立族範以教化為先設止訟法禁民毋得溺女而前後所毁淫祠殆盡在任前後凡上七疏皆賦役章程不可己之事猶以為道有所沮恥唯諾徇故常將圖潛逸人輙知之閉其城不得行濵殁家人扣榻請遺命大言曰我男子死即死耳復何言人謂正直精爽臨終不撓稱其平生云公配祁氏繼吳氏皆安人子男三人奎璧室奎卜以卒之年十二月丙申葬梅灣之原以予旣親而知遂來請銘銘曰烈烈文公信國是承克肖剛大厥氣孔盈包絡洙泗知權守經忠戅自許允惟邦楨公才旣優仍篤政理連宰二邑咸肅風紀司民之牧衡秉繩履庸靖乃人納于仁軌帝寵休嘉式還之朝俾職廏圉國武光昭司馬曰賢拜疏以薦舍旃來歸處晦用晏在易之遯其道元吉温人謳思僉冀公出天子有命徃恢明績德風載揚爰徴治實赫焉方隆胡殞之亟有墓于梅來旐翩翩旣耕有田斯卜其旋何以世之垂光永延刻銘兹石用質幽𤣥明故丹邱先生姚公墓誌銘楊循吉公姓姚氏諱綬字公綬浙西嘉善人也天順末第進士拜監察御史成化初元尋出知永寧縣解官歸所居在大雲里東繞水竹作室曰丹邱嘯詠其中自稱丹邱先生大抵多取老莊神仙之說以自况又作滄江虹月之舟遊泛吳越間甚適𢎞治八年四月十日卒于家年七十三公少有才名攻古文辭弱冠始業舉子遂取科第以至為御史政能多出人右嘗奉勅巡鹽兩淮鈎剔積弊旣盡勢人惴惴弗敢漁利布令張體務以激揚為事淮饑曰吾御史宜無所不可行畫䇿賑饑民多復生巡撫三山林熙敏公奇之具以聞朝廷特降璽書俾終厥事未幾被言而有永寧之命遂弗復思仕矣公善書法鍾王勁婉咸妙詩賦暢茂皆有法畫初水墨後遂進學唐品得古意載所謂滄江虹月者出遊粉窻翠幙擁童奴自奉備極珍養設香茗皆世所鮮有或命彈絲吹竹讌笑彌日人望之飄飄然有霞外心家設亭館稱是客多就之初號穀庵又號雲東子蘭臺逸史天田老農上清仙史懶仙仙癡紫霞碧月翁並著聞人間而丹邱先生稱尤顯所著有大易天人合旨十巻詩文集三十卷姚氏在宋本汴人南渡徙餘姚再徙今邑在前元元祐時有仕為大使者蓋舊族曽大父瞻雲大父隠庵父松雲皆不仕公配洪氏生旬前鴻臚寺序班一女菊芳適張訓繼潘氏生旦嘉興府學生孫男薝亦府學生次芹次葵次芷孫女寄奴雪英西英淑申淑酉曽孫男昌齡昌陽余辱公引為忘年交旬以是來請曰先人有言願得子之銘今卜日矣在𢎞治十一年正月之朔胥山之陽墓也先世皆葬是敢以請或言公好道家言公臨終猶賦詠懐之詩此豈恒化者直亦儒耳公其東南之威鳳歟銘曰明興運昌文士交鳴懿兹南陲有公特生藴臆維富宣詞乃鑑鳳凰喈喈儀于治平才難自古莫不願有孰知有之適成忌藪當塞乃通弗履其咎其通伊何躓以援静放乎山林貴得所便屏處非遺皇仁賚全作為歌詩列于管弦禆化陳風公乃為賢才生有係匪嫉能棄玉湧珠流式彰國麗矧恬以高亦亷于吏佳城峨峨爰奉以瘞瘞弗名俱永耀其裔故栁州府通判桑公墓誌銘楊循吉吳郡思元先生桑公少好詞賦師司馬相如揚雄以其長振名一時至為他文章皆本是凡為數巻旣而力探羣經自易春秋周禮皆有義釋又數十巻合二者總二十餘萬言𢎞治癸亥六月四日以栁州府通判卒于故鄉常熟之寓館年五十七邑令計君栁進士也盡發其書觀之為具殮加厚其將葬也從郷貢進士喬以邇言請銘于我嗚呼先生之道裕而能容介而不羣充其辯可美於將來極其用宜大於匡國胡獨以一技名耶先生諱恱字民懌其先有舉齋公者仕元為都水庸田副使傳六世至廷貢壻穿山周氏先生生年十九領郷薦累試禮部不第負才遊京師無所於屈竟以乙榜授泰和訓導三為考官皆大省號能得士秩滿冢宰三原公執政將薦用之不果以資拜長沙府通判又以催課無績調栁州府栁邊氓雜居多竊發先生出入賊巢穴示以恩信來附者萬家栁人至為繪像以祀然由是名聞于㑹府因得召致幕下待以賔禮俾司謀畫道方行㑹母喪歸遂不起以至于没蓋先生之設施可見者若此先是未卒之前一月友人薛大章夢見先生乗高車擁入𤣥㝠云與神遨遊己而果卒說者謂先生躬萃元精以神明其心志又不大于事業以有蓄焉一旦而死其不逐逐為常鬼亦明矣夢所見殆將然乎先生配章氏故贈都御史孟端女子男一人阜先卒女二人長適吳樟吳文恪公四世孫次適歸應祥蘇州衛援例指揮僉事孫男二人内曰接外曰溥愛皆嗣阜為後幼未克立夫人實主喪事先生先世皆葬故邑虞山今以十月十六日葬湄溪之原從其先府君兆禮也在太倉州南四十里與穿山三里而近先屬邑今屬州故先生又為州人銘曰有才不售澤不大施滇粤縱奇以昌厥詞休休三原非不己知疏直以交始孚終遺黄髮鮐耉世所謂壽賢者不然道德之富髧彼兩童亦旣樹後祭祀克紹在禮不繆歸終於寓邑令是主返葬湄原爰祔父母遺書滿家蠙珠琳琅聲光若新不腐以亡百世有考尚於銘章卞公墓銘薛章憲章憲髫穉時聞郷先生說公蚤歳治舉子業甚專館徐氏徐氏家大多賔客公應客不廢書巻雖行臥偃溲亦時時聞伊吾聲用能有所成就其後章憲稍長往來外大父趙民望家始得連拜公旌孝里第庚寅蜡月先君從郡中夜歸與公共載時雪甚公惡三四日章憲從旁竊視公公方讀揚子法言不離手時時得好語輙疏小冊上幾不成字時公年巳就衰其勤乃爾乃知異時聞可信不疑竊識之爾來曽幾時而外大父與先君子相繼下世公亦不禄矣悲夫公諱榮字華伯姓卞氏甫二十以明經中正統乙丑進士第試大司馬厯官户部主事員外郎郎中能為古歌詩客京師邸舍巻冊填委几上每公退食輙磨墨泚筆頃刻就數十篇初若不經意而人或抵死所不能道也嘗奉上命檢校戎馬南畿監稅河西務幹辦金沙洲公事所至皆能其官驅馳中外二十年稍以鞅掌為煩後歸陶城私第益取古人書讀之益肆力於詩隠然名動吳越間尋常乗欵段入城中好事人争先迎致又争先來乞詩户外之屨常滿公口占手綴盡日不得休無矜容靳色下至馬醫走卒咸知羨慕宛轉得之則持以誇人蓋自大江以南南抵越北抵吳無一人不知公名無一家不蓄公篇什或者贋書公詩持以售人輙得錢縉紳之徃來是邦者無晝夜扣門請而富人大賈捐重貨購求所得遂不貲性儉嗇每有投遺徃徃從人索紙筆不妄破一錢士人傳以為笑然視他貴人之武斷豪奪則吐舌縮首不欲為也人皆以是多公所著詩其門生吳綎為刻梓行于世平生少許可視人所為篇章茍不當其意則聳肩支頤不復出一語間有可取稱道之不置故得公假借者咸知自慶以不抉摘人疵纇亦無有怨之者甚善飲酒人或為廣筵招之不可得遇知己輙不待召徑造索酒談笑飲燕婆娑終日或至夜分達旦未嘗以醉辭人亦未嘗見其號呶傾側也蓋曠達如此父時濟母張皆以公貴再受封父至奉直大夫母至太宜人配徐氏故大司馬之兄之子之女也封宜人公卒之又明年為𢎞治二年其子邦慶方卜日襄事㑹宜人亦卒遂以十一月十八日葬崇壽山之新阡公生永樂己亥穀日卒成化丁未重九日享年六十九子二人長即邦慶次邦㑹公且死把筆書小紙畀其子以墓中石來委章憲視公為丈人行幸嘗望見履舄雅受公知辱不以不肖使紀述平生其何說以辭銘曰杜子美之詩畢茂世之酒民部可謂兼有之弱冠已仕未老先歸逍遥徜徉殆三十年將得之人歟抑得之天歟崇壽新阡陶城故居後有過者吾知馬必下車必式如董生墓商容閭矣明文海巻四百三十一
