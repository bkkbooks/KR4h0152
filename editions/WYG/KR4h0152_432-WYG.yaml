body:
  text: 明文海巻四百三十二餘姚黄宗羲編墓文四文苑張東海墓表王鏊公諱弼字汝弼讀書不治章句獨慕古奇節偉行慨然思與之齊視世之齪齪無足動其意而世亦莫之用也其壞竒卓犖之氣無所洩則時發之于文發之于詩發之于草書而發之事業殆不能十之一二而亦足以名世矣公少為弟子員已博覽無不觀及長始中南畿郷薦成化丙戌登進士授兵部武選主事改武庫進車駕員外郎出守南安六年以病乞歸卒公天分高朗出語不凢其發于文則病近世委靡腐爛之習痛掃去之自立一家言顧嘗自許得古人矩度而世莫之知也為詩每寓感時憂國抑邪與正之意翰林修撰羅應奎上疏劾時宰得貶人無敢送者公作詩贈之慷慨激烈膾炙人口送章德懋黄仲昭莊孔易外調之作警句徃徃為人傳誦而亦不免忌者之嫉也其草書尤多自得酒酣興發頃刻數十紙疾如風雨矯如龍蛇欹如墮石瘦如枯藤而狂書醉墨流落人間雖海外之國皆購求其跡世以為顛張復出也其在南安拆毁淫祠以百數表章先賢作唐張文獻祠宋李丞相亭立鐵漌樓而人仰凜然不改之操作吟風弄月臺而人挹悠然自得之趣鑿梅嶺之嵌巖行者願出於其途梁横浦之崩湍濟者無病涉定中途博換之例而南雄南安之争端永息及去之日民為生祠以祀其政事有如此者使公得竟其施其樹立豈止是哉公仕京師時方尚交謁每正歳投刺紛然人馬交道公一切謝絶有嘉召必赴嘗自言曰嬾於投謁勤於赴宴後府護月邏人行不如法人皆辟易公舉牙牌示之曰若欲知我乎我武庫張某也又數以直言忤司馬當道者積不能堪故出之南安而公自得也曰吾學可以試矣公以成化丁未六月某日卒其年冬十一月卄五日葬郡城北之鳳凰山安人王氏有賢行子男六宏正宏宜宏至宏圭宏玉宏金女二孫男四宏宜以進士官至按察副使宏至以進士官户科都給事中至是宏宜亦己卒宏至與弟收拾遺文得若干巻刻之又求予表其墓於乎後世有欲知公者尚考於兹文沈石田墓銘王鏊有吳隠君子沈姓諱周啟南字而世稱之唯曰石田先生先生世家長洲之相城里曽大父良琛始闢田以大其家大父孟淵考恒吉皆不仕而以文雅稱先生風骼潔修眉目娟秀外標朗潤内緼精明書過目即能黙識凡經傳子史百家山經地志醫方卜筮稗官傳奇下至浮屠老子亦皆涉其要掇其芳華發為詩雄深辨博開闢變化神怪疊出讀者傾耳駭目其體裁初規白傅忽變眉山或兼放翁而先生所得要自有不凡近者書法涪翁遒勁奇倔間作繪事峰巒烟雲波濤花卉鳥獸蟲魚莫不各極其態或草草㸃綴而意已足成輙自題其上時稱二絶一時名人皆折節内交自部使者郡縣大夫皆見賔禮搢紳東西行過吳及後學好事者日造其廬而請焉相城居長洲之東偏其别業名有竹居每黎明門未闢舟已塞乎其港矣先生固喜客至則相與讌笑咏歌出古圖書器物摸撫品題酬對終日不厭間以事入城必擇地之僻隩者潛焉好事者已物色之比至則屨滿乎其户外矣先生高致絶人而和易近物販夫牧豎持紙來索不見難色或為贋作求題以售亦樂然應之數年來近自京師逺至閩浙川廣無不購求其蹟以為珍玩風流文翰照一時其亦盛矣先生自景泰間已有重名汪郡守滸欲舉應賢良不果王端毅公巡撫南畿尤重之延問得失而先生終不及時政曰吾野人也於時事何知焉然每問時政得失則憂喜形於顔面人以是知先生非忘世者初先生事親色養無違母張夫人以高壽終先生已八十而孺慕毁瘠杖而後興弟病瘵終年與同臥起館嫠妹撫孤姪皆有恩義尤喜奬掖後進有當其意者為延譽不已先生娶於陳生子曰雲鴻官崑山縣隂陽訓術早卒庶子復孫履皆郡學生先生以正德四年八月二日卒壽八十有三復相履治喪以壬申十二月二十一日葬相城西牒字圩之原所著石田稿石田文抄石田詠史補忘客坐新聞沈氏交游錄若干巻獨其詩已大行於時文徴明曰石田之名世莫不知知之深者誰乎宜莫如吳文定公及公闡其潛而掩諸幽則唯公在予諾焉銘曰或隆之位而慳其受或敓之秩而移其有較是二者吾其奚取嗟嗟石翁掇衆遺棄發為渾鍠震驚一世彼榮而庸磨滅皆是相城之墟湖水沄沄於戯邈矣我懐其人徐昌國墓誌王守仁正德辛未三月丙寅太學博士徐昌國卒年三十三士夫聞而哭之者皆曰嗚呼是何促也或曰孔門七十子顔子最好學而其年獨不永亦三十二而亡說者謂顔子好學精力瘁焉夫顔雖旣竭吾才然終日如愚不改其樂也此與世之謀聲利苦心焦勞患得患失逐逐終其身耗散其神氣奚啻百倍而皆老死黄馘此何以辨哉天於美質何生之甚寡而壞之特速也夫鼪鼯以夜出涼風至而𤣥鳥逝豈非凡物之盛衰以時乎夫嘉苗難植而易槁芝榮不踰旬蔓草薙而益繁鴟梟虺蝮遍天下而麟鳳之出間世一覩焉商周以降清淑日澆而濁穢薰積天地之氣則有然矣於昌國何疑焉始昌國與李夢陽何景明數子友相與砥礪於辭章既殫力精思傑然有立矣一日諷道書若有所得嘆曰弊精於無益而忘其軀之斃也可謂知乎巧辭以希俗而捐其親之遺也可謂仁乎於是習養生有道士自西南來昌國與語恱之遂究心𤣥虚益與世泊自謂長生可必至正德庚午冬陽明王守仁至京師守仁故善數子而亦嘗没溺於僊釋昌國喜馳徃省與論攝形化氣之術當是時増城湛元明在坐與昌國言不恊意沮云異日復來論如初守仁笑而不應因留宿曰吾授異人五金八石之祕服之沖舉可得也子且謂何守仁復笑而不應迺曰吾隳黜吾昔而游心高𤣥塞兊歛華而靈株是固斯亦去之競競於世逺矣而子猶余拒然何也守仁復笑而不應于是黙然者久之曰子以予為非耶抑又有所祕耶夫居有者不足以超無踐器者非所以融道吾將去人世而宅於埃􅅽之表子其語我乎守仁曰謂吾為有私道固無形也謂吾謂子非子未吾是也雖然試言之夫去有以超無無將奚超矣外器以融道道器為偶矣而固未嘗超乎而固未嘗融乎夫盈虚消息皆命也繊巨外内皆性也隠微寂感皆心也存心盡性順夫命而已矣而奚所取舍於其間乎昌國首肯良久曰沖舉有諸守仁曰盡鳶之性者可以沖於天矣盡魚之性者可以泳于川矣曰然則有之曰盡人之性者可以知化育矣昌國俛而思蹶然而起曰命之矣吾且為萌甲吾且為流澌子其煦然屬我以陽春哉數日復來謝曰道果在是而奚以外求吾不遇子幾亡人矣然吾病且作懼不足以致逺何如守仁曰悸乎曰生寄也死歸也何悸津津然旣有志於斯已而不見者踰月忽有人來訃昌國逝矣王湛二子馳徃哭盡哀因商其家事其長子伯虬言昌國垂殁整衽端坐託徐子容以後事子容泣昌國笑曰常事耳謂伯虬曰墓銘其請諸陽明氣益微以指畫伯虬掌作冥冥漠漠四字餘遂不可辨而神志不亂嗚呼吾未竟吾說以待昌國之及而昌國乃止於是吾則有憾焉臨殁之託又可負之昌國名禎卿世姑蘇人始舉進士為大理評事不能其職於是以親老求改便地為養當事者目爲好異抑之已而降為五經博士故雖為京官數年卒不獲封其親以為憾所著有談藝錄古今詩文若干首然皆非其至者昌國之學凡三變而卒乃有志於道墓在虎邱西麓銘曰昌國吾見其進未見其至蚤攻聲詞中迺謝棄脫淖垢濁修形鍊氣守静致虚恍若有際道幾朝聞遐夕先逝不足者命有餘者志璞之未琢豈方頑礪隠埋山澤有虹其氣後千百年曷考斯誌明江西按察司副使空同李公墓表徐縉嘉靖己丑十二月二十九日前江西按察司副使空同李公卒於大梁聞京師其友人縉為位以哭復絮酒束芻使使往奠之既客從大梁來附其子枝所述年譜道公遺言曰知我者鄴郡司成崔子呉郡少宰徐子也我即死崔當為銘徐為表我無憾矣嗟乎公實命我我忍以不文辭邪則為之表其墓曰公秦人也生於慶陽後乃徙大梁曽大父恩大父大忠父正官阜平縣學訓導陞周王府教授累贈奉直大夫戸部貴州司員外郎號吏隠母髙氏累贈宜人詳李氏族譜始髙夫人夢日投懐中寤生公乃名曰夢陽既字獻吉吏隠公教授藩府遂家於梁故扶溝籍也已又歸慶陽時邃庵楊公提學陜西見公大奇之補為弟子員𢎞治壬子舉陜西郷試第一癸丑舉進士第官户部山東司主事厯陞員外郎郎中終江西提學副使敬皇帝朝天下宴然人文熙洽才賢奮興而文章多法唐宋公乃精思高視宗經稽史包羅百家言尤好遷史左氏傳而公才雄奇善叙事下筆即馳驟兩漢相上下詞賦取材于騷詩則衆體兼長渾厚沈著格高調古尤工七言古歌詞開闔縱横人不能述者公獨模冩曲盡雄健可喜即錯之杜甫高適歌行中莫能辨也于時大梁何仲黙吳郡徐昌國咸懐雋才工古文詞與公名頡頏而二子秀潤清藻微乏雄渾一時稱藝文者必首曰空同子云公初監稅三關也立法嚴整請謁不行勲璫誣之逮獄尋釋已又應詔言事陳二病三害六漸之目語在年譜中言頗危激侵勢者必欲寘之死誣下詔獄幸敬皇帝聖明且宰臣木齋謝公申救遂獲輕譴張主事鳳翔死于官母子孤貧不能歸公為奏乞贍養終其身武皇帝初年逆瑾輩擅柄洪洞韓公等劾之瑾知疏草出公手必欲殺不果竟奪官降山西布政司經厯尋勒令致仕歸居康王城著書乃脩李氏族譜作游渾軒集又作賦弔申徒狄以明志而瑾恨未已復羅織他事械至京師再下詔獄以伯氏營救乃免歸梁瑾敗起為江西提學副使至則奬進人才敦崇風化士論翕然歸之嘗修白鹿洞書院清書院田修紫陽遺恵倉修白鹿洞志然以才氣高不肯折下人又嫉惡嚴同官咸忌毁之宸濠之謀逆也官江西者多受籠絡莫敢迕迕即受顯禍獨公不為屈宸濠乃詭術以誘公弗察也未幾乃覺絶弗與見而同官者故有隙遂巧文搆公于里就鞫無驗時見素林公為司寇秉公申理乃已然竟以閑住放歸道襄陽愛峴山習池之勝留四月歸大梁乃寄情詩酒自沈晦久之士論明譽望日高當路者數薦之弗果用嘉靖戊子病己丑病大作就醫京口㒺効歸卒于家享年五十有八弟子私諡曰文毅先生所著有空同子八篇詩文集六十三巻傳於世配左氏封宜人儀賔左夢麟女先卒子男四長枝嘉靖癸未進士南京工部主事謫海州判官敏而文次楚梁柱女二孫男四孫女一墓在大陽山麓徐縉曰高才興謗直節忤俗自古然也獨一空同子邪名榮身辱小官中壽造物使然無所恨已今之論公者獨慕誦其文稱為文士鮮有知其氣節行誼慷慨激直若斯之奇顯者也即求之漢廷其賈誼劉向之儔乎使時見用功業未可量也予素辱公知且知公頗深乃撰次其大者表之墓道俾後世有考焉他見崔子銘無容表翰林院修撰滄洲張先生行狀陸容張先生諱泰字亨父先世蘇州太倉人曽祖原瑞祖興宗父顯忠母徐氏亨父少以聰敏聞於里閈有司選為衛學生書過目輙成誦為舉子業下筆徃徃多驚人語然性豪邁不能受記誦師拘束見時輩日夜兀兀抄讀人陳腐文字頗自鄙笑人亦由此忌之訓導嚴州許鑾懼其廢業嘗解冠於案曰汝之質稟如此才器如此而不勤學何耶吾寜棄此官必不汝棄由是感激自勵肆力於為文天順已卯應應天府郷試主司得其巻異之擢為易經魁且錄其文以傳明年㑹試中乙榜不就甲申再試登進士尋改翰林庶吉士名隠出行輩中劉文安公時為學士月試諸士學業嘗批某吉士卷曰律詩如象戲古選如棊昨見張某之作各得體汝與羣居宜優柔從容以叩其妙也其見重於人己如此乙酉聞父喪南歸丁亥復臨母喪得痞疾攻熨治療幾不能起或者曰此憂困彌年所致不宜切切秉禮自取傷勸令出遊以舒鬱結於是買舟求醫江浙間聞許先生歸老於家直扺嚴州山中拜焉幼嘗從郷人胡友蘭李文耀游及筮仕而二先生己謝世乃具牲醴即僧舍合祭也或譏其非禮亨父曰禮緣人情而為之何必一一蹈襲古人陳迹吾所以為此重報本也非禮而何時人義之疾少愈郷里後生執經問學者逺近歸之辛卯服闋赴吏部奏除翰林院檢討聲名籍甚四方之士游學京師者願受業焉甲午三載考最封徴仕郎賜勅命贈其父如其官母孺人乙未禮部㑹試天下貢士充同考試官進典雅出穿鑿一時號稱得人未幾河南提學副使員缺當道以亨父學行堪為師表欲薦之亨父亦以提學師儒之任始欣然欲就旣而聞河南巡厯多陸行非病軀所宜白於知者乃止庚子十月九載考績陞本院修撰人方以為遲且滯也踰月而得暴疾嘔血數升死十一月十九日也年四十有五初娶管氏繼武氏皆贈孺人武氏生一子再繼楊氏生二子某某亨父之先本姚姓洪武間朝廷方隆重軍士而畿内之民徭賦煩重其曽祖原瑞圖所以自便晉陵張某者有軍籍𨽻太倉衛因冒其姓至亨父未之改嘗自草一疏其畧曰臣思祖先以來的係姚姓一時因畏匠役附入軍籍冒姓未改臣昔登進士時已於登科錄報書姚氏三代名字臣今猶冒張姓背棄本原心實不安云云疏雖成未果上所著有詩文若干巻皆其平居令從子瓛所錄今藏于家云亨父為人倜儻率直不詭行以絶俗不矯情以干譽然而耿介自守毅如也與人交雖在造次其情無不周至人亦以是樂與之交居常抱病人有持巻軸求詩文者未嘗以病自沮揮毫應客若不顧名而名於是乎愈彰酒酣耳熱談論當世不平之事激烈奮發每為之攘臂岸幘而後止迹其憤世疾邪之心雖賈生之痛哭流涕不能過之自亨父入翰林朝廷數有纂修之舉後進者多以此沾被恩澤次第進階而亨父獨不得一與其列其自處則退然止足畧不見有嗟卑之意也旣為修撰嘗語予曰明年於例得省祭將率婦子南歸祭掃先人之墓求美材為壽櫬奉吾兩兄若嫂俾無身後之憂然後如期還朝以圖報稱此吾志也而竟止於此嗚呼悲夫瓛將奉柩歸葬太倉古塘之原以某相知頗深請狀其行痛惟亨父職在文史位未顯融無履厯政事可書而言論風旨之在人者又不能悉記姑述其槩如此庶幾立言君子有所考焉將仕郎翰林院待詔衡山文徵仲先生墓誌銘黄佐公初諱璧字徴明後以字行更字徴仲世為衡山人故人稱之曰衡山先生其先自蜀徙廬陵宋衡州教授寳始家衡山於文信公天祥為叔父兵亂失其譜系可知者元鎮逺大將軍管軍都元帥俊卿佩金虎符鎮武昌長子定逺從高皇帝平偽漢賜名天龍終荆山左䕶衛千户次子定聰選充散騎舍人從其妻父湖廣都指揮蔡本守蘇州永樂中復從本徙浙定聰次子惠贅于張氏遂留居蘇州實公曽祖也吳有文氏自惠始惠生洪淶水縣學教諭公之祖也贈南京太僕寺丞復以次子森貴加贈南京太僕寺少卿祖母陳氏贈安人繼顧氏吕氏皆贈恭人洪生林公之父也仕終温州府知府文章政事為世名臣學者稱交木先生母祁氏繼吳氏贈封俱安人公生而少慧貌古神完八歲語言猶不分明他人或易視之而其兄奎爽朗俊偉交木獨器公曰此兒他日必有所成非迺兄所及也隨侍徃滁讀書務稽古人之德能自得師交木命徃從莊定山㫤游㫤與語奇之贈行有忘年得友之句旣而見諸人浮談上達互相標榜其勢甚熾遂口不談及乃受業於吳文定公寛被選爲郡校弟子員時作為詩文漸臻精工性簡静居常不喜受人之惠有俞中丞諫者知其貧極力欲周旋之因謁見間問曰聞汝甚貧何以為生公對曰生亦未甚貧俞指其襴衫曰何得破損至此公復對曰雨下惟衣舊衣耳蓋不欲受其惠也俞益敬服嘗造其廬見門前河道湮塞謂曰據堪輿家言此河一通汝必第矣吾當為汝通之公懇告曰開河必壞民廬舍孰若不開為愛他日俞悔曰此河當通向不與文生言則功成久矣家中穿井有二缸相合驩呼以為財有欲啓之者公亟止之曰儻其中有異物將何以處之耶於是家人恐懼不敢復視其亷慎類此𢎞治已未聞交木有疾挾醫而徃至則殁己三日矣故事卒于官者郡邑咸賻官尊則益厚時則賻幾千金公盡卻之為書以謝曰吾父以亷吏稱而吾忍汙其死耶傳不云乎父死之謂何又因以為利温人駭異曰亷官則吾見之矣未有為公子而亷者也由是聲稱籍甚温人為立郤金亭以識之公善書畫初遊郡校時校官嚴厲辨色而入張燈而散羣居無所事事諸生或飲噱嘯歌或投壺博奕公日惟臨冩千文以十本為率書遂大進尤工八分駸駸漢魏西涯李文正公東陽以篆自負及見公隷曰吾之篆文生之𨽻蔑以加矣同郡有沈周先生者博學多才而善於畫公慕之見其所作徃徃彷彿得冩意益以神采遂出其上嘉靖壬午冬予初授官史館得公藝文於王司業同祖因雅知公居無何聞巡撫李梧山充嗣以公及故元老劉文肅公忠同薦公尋以歳貢至㑹予寓舍與之上下議論古今經籍無一不知者且折衷具有卓識予出白沙墨蹟即歎訝久之因曰吾初入學忽夢一老人告曰他日出處與陳獻章同己而命下擢公翰林待詔蓋白沙亦以薦為檢討適相類也時楊修撰慎薛吏部蕙皆有文名楊則自負博洽菲薄宋賢薛則專精内典泡影經籍聞予談公學行皆未以為然己而晤公二人乃大詘服遂為莫逆交時大司冦見素林公俊愛公尤深每晤余必速公共語三日不相見輙折簡邀之一時諸名士覿德相先户外屨常滿共奉二年輙引疾求去疏下吏部寢不行强起就列又一年考滿例磨勘馬考功理勸詣部當得恩澤君不肯徃或勸暫且告病笑而不答復上疏乞休至于再至于三語益懇切吏部始以聞於是詔從其請時年纔五十有七非懸車之期也鄭御史洛上章請畱不報士論莫不高之㑹予省親南歸丙戌孟冬與公同辭朝出潞渚阻凍同寓灣中旦夕過從相與倡和殊甚驩洽比凍消乃聯舟而下將抵臨清則有官吏率數人負䪍矢跪路左以迎或誰何之則曰兵備道迎候文公比至則一豸服者詣舟稽首四拜捧縑綳請染翰公峻拒之其人復詣予語及復稽首四拜托余轉請公乃諾焉其為人所重類此蓋公於書書雖小事未嘗茍且或答人簡札少不當意必再三易之不厭故愈老而愈益精妙有細入毫髪者或勸其造次應酬曰吾以此自娛非為人也閒則為之忙則己之孰能强予耶有商人以十金求作畫者公面斥曰僕非畫工汝勿以此汚我其人大慚而去凡富貴者來求多靳不與貧交徃徃持以獲厚利片楮隻字争得以為寳玩至有待而舉火者尤好賙人之急或有所入徃徃緣手散去有感泣者張少傅孚敬始名璁交木守温州時所取士也嘗薦諸吳文定公嵗壬午張在畱都部曹遇公即以大禮為言公唯唯而己旣而官京師方柄用公遂逺嫌不相徃來楊邃庵一清起用至京師止都門外傾朝徃見公獨不徃曰尚未面君吾何見焉及㑹謂曰余汝父同年相好何相見之晩也公曰生非敢後自先君之没有一字見及者未嘗不答楊曰此則余之罪也聞者為之縮舌嘗訓諸子曰道德性命宋儒講之詳矣而孝弟忠信禮義亷恥則人之所當行者也今人孰不知之一關利害便不能踐汝等於日用彛倫但不安於心者勿為之是即孝弟忠信也便宜於己者勿為之是即禮義亷恥也循是而行雖不至於聖賢亦可以寡過矣寜藩宸濠嘗遣使召之力辭而遯使者求公弗得案間書幣封識如故乃持之而返世皆稱公見幾然各王府以幣納交者公悉卻不受如周府以古鼎古鏡露封其書徽府以金寳瓶及銀約數百鎰悉卻不受使者謂意本無求惟少通微誠於賢者爾盍啟封一觀乎公謝曰旣見書當有回啟不若不見之為愈也平生足跡未嘗一涉邪狹之館嘗謂諸子曰交結親王狎妓飲酒律有明條安可犯哉汝其識之致仕後監司以修理牌坊故為多致厚餽公並謝卻曰吾非欲自異也但以利交私心自不安耳優游林壑三十餘年四方文儒道吳者莫不過從亦有枉道至者名士如彭年陸師道周天球文行並有顯聞皆出其門藝文布滿海内家傳人誦而公勞謙自牧未嘗一置身於有過之地壽屆九十嘉靖己未二月二十日與嚴侍御杰書其母墓誌執筆而逝翛然若僊人皆稱異先是予遣人持薄禮豫觴之抵吳以戊午冬月公復余書謂懸孤之辰尚隔朞月不知能到此否且錄前數載初度詩意若有所跂者至是仙逝殆類前知云夫人崑山吳氏河南㕘政愈之女其母夏氏出太常卿㫤㫤受知成祖文翰傳家夫人素守家範及歸事公惟謹家食時凡朔望行香及居官早朝必躬自薪爨不委他人代公料理家事婚嫁築室公皆不與聞而百務具舉性雖慈而教子亦甚嚴厲手不廢絲枲而經畫調度井然有條燈下必親書一日出入之事至于没齒事或差謬按籍稽閱則日月並存與公同生于成化庚寅十一月夫人初一日而公則初六也卒于嘉靖壬寅八月二十一日壽七十有三生子男三人長彭嘉興府學訓導次嘉縣學生次臺先卒女二人長適王曰都次適劉鯤孫男五人元肇國子生元發府學生俱彭出元輔元弼府學生俱臺出元善嘉出女四人長適袁夢麟次適未循次適顧咸寜次適尹象賢曽孫男四人應周應孔應珠應辰女四人𤣥孫男一人禾孫以庚申十月二十九日權厝於花橋之新阡彭以予與公交厚最久知公素詳惟撰事畧來速銘銘曰奕奕衡山傳秀吳中展也徴仲炳靈祝融遷自廬陵始揆文教中奮武衛復摛光耀敦詩說禮淶水承家施于交木邦傑國華交木惟橋衡山惟梓節操文章高朗南紀其守堅白其言明清廓而閎之苞湘帶荆意象經營神氣盈軸瞻而仰之朱陵青玉衡山之陽惟直是行彼為眇論尚口匪誠衡山之門惟寔是履沖泊粹醇誦義千里中丞騰薦元輔齊名彈冠充賦委珮揚廷待詔金門含毫玉署疇不少需鴻漸鳳翥確乎懐巻翩然不畱停雲構館頫視虎邱墨妙筆精四方是寳賙及困窮且以娛老期頤之壽歸潔其身志為帥氣天不違人至大而剛不愧以怍懿此碩儒光于信國明文海巻四百三十二
