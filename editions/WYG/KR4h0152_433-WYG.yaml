body:
  text: 明文海卷四百三十三餘姚黄宗羲編墓文五文苑江西按察司副使空同李君墓誌銘崔銑𢎞治中空同子興陋痿文之習慨然奮復古之志自唐而後無師焉已汝南何景明友而應之空同子之雄厚仲黙之逸健學者尊為宗匠又咸激厲風節敢上直諫安於冗散鄙忽驟貴空同子方雅簡黙稍飭廉棱仲黙恬淡温孫不露方美公空同子諱夢陽字獻吉慶陽人徙大梁甫冠舉𢎞治癸丑進士授戸部主事再遷至郎中才敏氣雄簿書外曰招集名流為文會酬倡講評遂成風致常監三關招商用法嚴格勢人之求被搆下獄尋得釋每抗疏言出令不平宫府殊法一涉宦戚即尼不問不報乙丑應詔陳二病三害六漸之弊末言皇親横則外戚驕恣之漸為掩義之害張侯辯愬摘奏中張氏字為訕母后遂令回話乃列張侯不法狀悉實可按遂下獄衆為卓卓巳僅奪俸三月上語尚書劉大夏曰朕欲寘夢陽輕典左右謂當廷杖渠忿則泄如朕殺諫臣何正徳改元八閹導上燕遊閣臺部諫協請誅之不克閹遂竄斥諸臣巳知部之奏實空同子贊成奪官降山西布政司經歴致仕戊辰劉瑾必快前忿羅以他事械赴京人意其必死是時瑾敬禮修撰康子康子謂瑾曰李生能法皇祖為之殺之大失天下言學者望瑾嬖人姜達亦申理瑾乃賢空同子既釋繋又欲用之選部空同于託以痼疾康子為力請得免辛未瑾誅起為江西副使提學勅許舉聞重事空同子振學涖士外大有建白臺使及同官者病其侵官空同子非其隳職各起訟當路素忌空同子才名落職閒住要辭曰臨官不尚云爾聞者笑之曰斯以虞之臣責過空同耶寧庶人方蓄異圖威刼諸内省臬受制知空同子不可撼陽下之及庶人叛滅有言空同子亦疑於黨附者當路又將陷以法司冦見素公不可止空同子以成化壬辰十二月七日生嘉靖己丑九月二十有九日卒享年五十八配左氏子一枝舉進士由主事佐官州同知側室宋子三楚梁柱桂女一王一女枝四子一䕫二典三謨四維女一葬大陽山左宜人闕空同子家世自有譜所著詩文集若干卷空同子八篇銘曰伊天閟之伊人嫉之專方者礙固正則危隱約委蛇于河之湄大昌厥嗣永式来思殷近夫墓誌銘崔銑殷氏鳳陽大族也元末有諱仲名者避亂東平因家於夀張仲名生尚文尚文生勝勝生鐸鐸生玘號剛齋以貢士為昌黎令剛嚴多知民畏愛之剛齋娶張氏繼室以任氏皆不孕子乃内李氏孕七月生近夫既長脩眉碧目口可容拳體羸而骨健讀書數行下既成誦終身不忘年二十有六舉𢎞治乙丑進士明年以疾歸卜居石川作蓄艾堂聚書數千卷旦夕誦思欲以作者自名著書十餘篇正徳辛未病愈還京師授靖江知縣近夫明察有斷不勞而治薊盜過淮渡江掠常州將如靖江近夫有備盜諜知之乃如江隂近夫發兵追之江隂得完常守檄近夫修郡城又自修學宫費省而工堅民朱鎧死于文廟西廡中莫知殺之者忽得匿名書曰殺鎧者某也鎧素讐其人衆謂不誣近夫曰此嫁賊以緩治也宻問左右與鎧狎者誰對曰胥姚明近夫乃集羣胥於堂曰吾欲冩書各呈若字視明字類書詰之曰爾素狎鎧殺之何故明大驚曰鎧將販于蘇獨吾餞之利其貲故殺之耳近夫歎曰利重忘親交非其道者必凶嗟乎嗟乎乃殺明癸酉調青田青田劇邑也近夫去其害民者六七事他無所更張近夫雅好游眺川壑覽物歌詠靖江青田有大江孤山混元峯每暇輒出嘯詠其間曠然自得乙亥考績如京師青田民號泣而送之吏部以最聞選授南京工科給事中上疏言事者五曰清弊蘇民曰安重地曰防奸微曰除邪以全治曰公賞罰既病封其疏題曰理真事曉意中詞訓付母言曰兹以歸雲霓弟遂卒丙子七月七日也享年三十有七近夫諱霄號石川娶岳氏男子一人曰冔女子三人初剛齋卒近夫則禮治喪既卒服始冠將婚與其妻之父母約必如昏禮乃舉後又考訂古今祭禮行之唯謹故魯人多執禮者近夫愛誦程氏朱氏書其為文非秦漢人語不習又以詩者抒情表志風人所善自漢魏至唐作者皆辨其音節而擬之作古樂府四百篇集志穀錄金僕姑數十巻又覽莊周書說其達性善喻最後自病太博必六經之旨然後究心焉近夫方峭克約國子司業穆伯潛篤行苦學無匹也猶畏近夫曰近夫之恥不善不啻負穢近夫居常不談人過及論文則指摘疵瑕不以一言假人葬於石川之南會者千人咸哭之失聲銘曰嗟我友行如璧文孔曄明有儒垂世模杭州知府吕君表崔銑𢎞治辛酉予游大學廣人梁宗烈與予善宗烈亟稱永豐吕祖邦曰明爽有氣節能效唐人詩巳而予識吕君又得其經學其研究宻會意註外經義簡明發越無他長語時孝皇有道之朝卿大夫怙恩耽寵耄不知退清議鄙之吕君作落葉詩寓風刺曰千山落處偏於曉一片飛来即是秋又曰天南天北堪容汝莫送多情出御溝都士傳誦壬戌春試正巻公掄之作魁吳文定升其次巻魯文恪鐸也君名第九入對䇿賜第二甲進士八月授南虞衡主事分司真州釐棼削冗因以救荒貧民皆受分司雇役錢負傭視其力以品其食不得籍記而勾稽之作義塚以瘞殍巳自莅祭泣感左右益以其暇攻詩似唐王維自題曰近来官舎清如水更喜官清水不如真州士曰無愧詞後遷員外郎又遷南文選郎中予亦来為封部主事與吕君為寮講肄故聞抄集往史南選閒曹也而吕君考覈詳嚴申敕典制劉鐵柯在司冦時恃其奥援陵壓諸曹常為撥厯吕君遺文責難之人皆喜君之直而快鐵柯之挫也君配婁氏一齋先生子邑博之女號水溪一齋莊敬切實精貫性言化孚家人廸蹈彛典而婁安人解經書全貞懿吕君得内友之助士有售欺於名公者致譽籍甚予贈之言吕君臥牀上誦之安人曰是文有大意存焉人炫名無不敗露者猶文壁然日就湮剝吾聞之吾大父云次日吕君語予服其識正徳庚午吕君晉杭州知府杭自前宋来為麗地習尚奢逸遨樂過客厨傳上官供億曷有極限吕君一切裁削志在教化御史張承仁恃才頤使各司獨於君加禮御史他日告予曰吕君不但氣不降而乃無隙偵之甫八月以憂歸丁丑走赴銓將以君守寧國有仇家之訟君固請終訟歸家其仇健險而所告事人糾紛織練踰年乃白君築室山水之間不求仕己卯闕十八而卒吕君大父晟景泰辛未進士終䕫州知府有愛浹民因名吕君曰䕫父祥舉人封主事母俞氏繼母姜氏婁安人治家政如君存時二子振武振芳孫一大衍安人有教各業儒嗟乎古之司刑者兩造俱至三訊即施或懲惡或白寃不踰時而定示民以中吉也後世首䑕之徒持兩解之說淹留歳月壯士負屈而死富人終訟而貧而造誣之凶得志矣如吕君者邦之良民之主所須如水火而訟久未白予時承乏太史未嘗不含憤疾言於當路者而亦末如之何嗟乎可恨哉吳泉亭墓銘許相卿嘉靖一十四年二月乙卯朝列大夫廣西布政司左參議泉亭先生吳君卒訃予予扶而哭諸門君之子鄉舉士遵晦郡博士諸生遵道書君顧言来曰知我者許子其託之識我藏噫嗟巳乎吳君速死予信忍以疾為解志曰吳君諱鼎字維新錢塘城北隅人也父宗裕封承徳郎刑部主事母陸氏繼母戚氏妻顧氏贈封並安人咸以君故君少慧嗜學父母念獨子重苦之交禁弗為止選錢塘文學弟子員朗秀駿踔氣蓋一時衿佩少年諸司勸學較藝輒皆取君冠其曹君正徳中進士釋褐試吏尹臨淮臨淮帝鄉壯縣民多優復習游惰公私玩敝謾偷政廢不舉糾紛倍十于小邑宿吏側目少君君穎敏識裁便宜張弛更以辨治稱監司使者僉上君治行異等堪風紀選不報毅皇帝南征侍衞中外諸臣騎乗數十百萬所過縣次續食有柄事中貴人道臨淮非分征索供具無厭横甚君從民吏往致常饋不去中貴人大動望憤詬呼梃君銳身先民吏當之民吏争前衞君撃傷中貴人奏逮君凡詔獄一歳而後廷議白君還治用舉者徴為南京刑部主事展南京兵部主事以承徳公喪罷歸除喪謁告不仕者十有五年用舉者補南京兵部員外郎展南京禮部郎中遷廣西布政司參議乞侍養亡何病卒年五十三君方病甚二僮奴擁之坐氣漸微而神不亂忽左右視曰爾執誰耶吾其死於吾兒之手二子舉扶代之若將寐者而絶君起寒約性鯁諒力學自立危行不疑恥媕阿茍同孤立行一意而巳俗咸病其不諧以哆憎口然居約奉繼母當其心裝嫁四女弟甚周與人謀必為之盡當官事關利病直往敢任不顧計前後故所至舉職大節斷斷士亦以此多之一時顯望魁人往往折輩行與之交然仕不充志夀不盡年懐挾其所未究溘然長終巳知君者莫不傷懐垂涕云君生好文特甚其為臨淮罷劇猶手一編吾伊空堂中治當南北逺途過客時有中原文獻家博文好古諸名士大夫君輒委己交歡與相下上其論既謝病屏居愈益專力萃精償其積志六籍而下九流諸子䇿士春秋先秦盛漢之譔古金石竹簡之傳旁逮外家雜說譎誕怪迂之語凡竒古文字罔不雋飫醇酣江左北朝以還唐宋近代諸名家亦皆抉藩入奥神詣作者故其文深涵大放贍蔚閎肆能盡達其意所欲言淵乎蒼然有西京氣骨君卒歳一訪予紫雲山中坐語移日扼腕論文灑灑弗能休予曰雅哉辯然藝事末耳吾棄弗事此也久矣君素多病奈何敝精以徇末孰與歛英沃根疏神以貴而生乎君憮然離席曰愛我哉陳義甚髙僕將從子於忘言矣然君文聲籍甚紹介屬筆者彌衆不容自解免焉每一篇出學生争傳諷之郡諸老先生辯博能言者皆自以為弗及也時有紀述莫適自任必推泉亭云二子好學世其家女一孫男從周從時女一墓在積慶山南麓葬之日是歳十二月戊申銘曰有崇斯封有坎斯宫有斐君子歸藏於中有氣隆隆湖天亘虹後有王朔氏揚袂障日而望之曰咄咄佳哉其下殆古之人以文雄者乎楊僉事墓銘許應元楊君諱祐字汝承一字晉卿世為蘭谿楊塘著姓曾祖永政徙嚴之建徳祖莆田丞大昇再徙錢塘於是為錢塘人父象明易學為錢塘學生已而棄去教授閭里間然鄉人目之必曰善人也夫人郎氏是生君君生六歳能為詩歌十歳受父學易十七補縣學生十九當嘉靖元年領浙江鄉試貢入京師道鄒魯之墟過稷下周游渤碣之間登郭隗之臺慷慨悲懐有統揖千古之意巳而罷歸治一室河壖散列羣籍流覽其中而專覃思於經術於是君之學益深博矣八年登進士第覆試月初生賦改翰林庶吉士明年除知興國州考薦輒最入為刑部員外郎遇謗出知濮州稍遷濟南府同知十八年擢江西按察司僉事復以謗待次家居歳餘調補湖廣僉事二十二年七月十日暴疾卒于官年止四十先是江西巡撫今司徒王公薦君文行卓偉宜令董學官當有以風厲人士其後湖廣部使者又薦君器用堪兵備皆報聞及卒士大夫交相弔曰嗟乎楊子在何不可為者今巳矣初𢎞治間海内淳濯搢紳先生翕然興于學厭時俗頽薾踔厲振迅務橅先秦西京之書而詘唐宋當是時北地李獻吉尚型范而信陽何仲黙貴窈眇號稱復古天下鄉風矣大江以南文章奥區也於杭則故翰林修撰江君景孚參議吳君維新及君生後崛起雄視中土君初與計吏上京師也吳君嘗論叙送之以為賈生明國體而匡衡推經術紹兹哲軌其在楊生君亦獨喜自負為文章奔放陵轢若馳車九折之坂而河決金隄莫之禦也其議論雄辯勇決飈起泉涌卒然聞之駭汗愕視其他才用更自天性他人縮䘏己獨奮前硎發穎脫勞不見曹伍然終以此見媢疾羣擠偶踣蹶益騰距豈非琦瑋卓絶不羣之士哉君嘗自謂仕宦居職無以逾人使得當一校之任率先士大夫能使人趨死不顧乗邊守塞雖不敢邀一旦功然敵不足畏也時時以謂予嗚呼今則死矣借令無死其所自樹將不與古所謂豪傑者並驅乎雖使遭尤被謗退處岩穴固當託志儒雅成一家之言附於作者之後而今之所著白特其至微淺者可君在兩州皆有惠愛民思而碑之其在荆楚尤得士民心君卒即為祠以祀所著有端居興國西曹鄄城濟南西江荆南諸集余欲為會梓成書未果也君所至學士輒從以講業晚蓋稱丹泉先生云宜人許氏余從姊也先伯祖刑部府君之孫伯父沂州府君仲女端静婉順能通知古賢婦人事雅有慕尚年十八歸于君事大人相夫子皆有儀法凡歸楊氏二十年如一日内外稱懿無間一辭年三十九先君一日卒生二男子曰春先春元三女子一適餘姚學生徐銑一許聘吏部主事張君子某一許聘刑部主事王君子某君先娶亦許氏無出始君夫婦相繼卒諸子女皆幼纍纍持二喪歸父母老未克葬今二十四年正月母氏又卒天之禍楊氏其可謂至於此極也君之父即以是年月日合葬君夫婦于某山之陽謂余與君至深命以銘銘曰生之無故其曷畀之嫮謂有以生孰尊尊以傾顥穹蒼蒼曷以質疑瑰辭琅琅光何離崇宫撃鮮瞑何知皬然白首穉齒年曷不監是超若遺下何雙宫上并崔重泉幽扃啟何時何不臻虬躡虹霓浮游紫廷返故棲君曷不聞我心悲髙廉使墓銘霍韜嘉靖丁酉夏湖廣按察司使髙叔嗣子業卒叔嗣先淆川人洪武初髙有祖曰義徙居祥符遂為祥符人義生清清生勤勤生珣珣生三男曰伯嗣曰仲嗣曰叔嗣叔嗣生而慧日誦數千言未弱冠著申情賦殆萬言大梁之墟文士萃駭曰髙氏才子也武皇帝之十四年已卯舉于鄉嘉靖紀元之二年癸未舉進士任工部營繕主事調吏部稽勲主事展考功主事陞稽勲員外郎郎中時崇祀禮成議禮之臣皆進秩有述子業語曰髙稽勲云宜攢議禮者之尸刴諸几又曰髙稽勲與人奕伸其臂毛遂生如施宜生云渭厓子乃為之解曰髙云刴議禮者之尸乃以禮未明也禮明髙必不云云又曰髙之臂施宜生之毛舜項之瞳之類也烏足異然而是年髙竟以疾歸又三年起復又明年出泰山而藩政兩告致仕渭厓子與汪太宰言髙之才可惜也留焉丁酉之夏子業書来云頼公教遷秩湖臬弗任是惕尚終教我渭厓子復曰第慎之乃踰旬日子業訃至兵渭厓子曰髙子業與世人交人謂之傲亦宜嘗餞送中丞巡撫於江之滸藩臬同僚曰盍逺詣子業問候吏曰往年詣此旋也子業旋舟返不偕逺詣初入襄陽有撫民副憲者聞子業至出迓徐徐吏曰盍姑遲待之子業曰予寮長也解纜去巳而撫民副憲来子業接之于于如也山西有同僚論事與子業忤疑子業中傷一日集議僚厲聲曰某與某有怨子業笑不答其人復厲聲曰某與某有怨子業復笑不答僚有旁解者曰予聞髙君時時稱君之長也僚乃釋然夫逺送中丞同僚曰厚也子業曰吾止諸禮也僚長不候副憲謂副憲地道主也出遲不候禮之節也同僚忌且怨不辯不報量也不知子業謂子業傲實非也渭厓子又曰凡人文學優者政理自拙自怠曰不屑云子業官山西有代州生員江橰與鄰之人争宅址將鬨傷兩族人孜等匿二屍圖誣鄰人鄰人知不鬨全畀以宅橰埋屍室中數年橰兄千户楫狂殺其妻橰囑妻家訟楫併誣楫殺孜事楫拷死無後橰與弟槃争襲楫職訟上巡撫院付子業鞫焉子業問橰曰孜等屍何在橰對曰楫殺孜埋屍其室不知在所曰楫何事殺孜橰愕然對曰為橰争宅址曰爾與同宅居乎對曰異居曰為爾争宅址殺人埋屍已室乎有斯理乎問吏曰搜屍橰室未也對曰未也乃命搜屍橰室掘地得二屍於橰立所兩跡宛然橰伏罪州人曰十年寃獄也石州豪吳世傑誣族人吳世江世澤姦盜拷瘐死二十命世江更數冬不死子業覆獄牘問曰盜贓祗布裙一穀數斛世江有田若廬富行刼何也世傑曰賊餌色姦問婦栁曰盜姦若曰姦也何時對曰夜曰夜姦何故識賊對曰世傑教我賊名世傑伏誣殺人罪祁縣千長趙逺捕盜起家萬金常縛村民野寺誣為盜得貲逸僕更汙民妻慮其發覺致民縣獄妻列狀上官逺曰民不死禍且及乃設譎紿縣官縣官懼聴逺入獄磔民死擲屍獄外上官止治逺僕屬罪薄逺罰子業曰安有屬殺人而長若主不與者乎卒正逺罪渭厓子曰世言儒不能獄謂腐也子業通儒能獄不足多也惟是豪民殺人取賄如趙逺誣縛齊民家累萬金呉世傑構一誣詞殺二十命有司不察反右焉如是求怨魂不結疾疫不興災變不流行豈可得哉故為論次子業察獄三事例焉俾有司知職業之重云爾又曰予讀髙子業序薛蕙老子集解而知異端之禍未息也惜也子業亦惑於老又曰惜也子業不夀子業而夀必歸中道任重詣極弗可量也巳子業祖某封某官母甄氏娶袁氏皆封淑人子男二不危不過女三人長適某次聘某次未聘子業生𢎞治辛酉十二月十四日卒嘉靖十六年六月十七日年月曰葬某地某原兄仲嗣求銘其墓渭厓子為之銘曰嗟嗟子業生世三十七才何太過夀何不及疇不惻惻嗟嗟子業生世三十七亦任冢司亦任藩臬亦最加績嗟嗟子業生世三十七亦友逖哲亦友邇傑子業徳式嗟嗟子業河洛萃靈子業逖矣盡是友生盡是友生况爾父兄翰林院修撰對山康先生狀張治道嘉靖庚子十二月十四日前翰林院修撰對山康先生卒二十四日其弟南川君稍錄其行實以書抵余請為先生狀以余知先生者曰嗟乎余忍狀我先生耶為狀他人在稱其徳為狀先生在白其誣誣茍未白徳將何稱作志君子採而擇焉先生諱海字徳涵别號對山又號滸西山人其先河南固始人其世系顯晦見康長公行事序述康長先生二子長阜負才夭折其次即先生先生道亞生知才具經濟讀書不專記誦但通其大義餘能類融下筆數千言不竭時提學楊邃庵先生竒其才即以天下士許之其為文脫去近習上追漢魏以詩經中𢎞治戊午鄉試壬戌進士第一除翰林院修撰是時孝宗皇帝㧞竒掄才右文興治厭一時為文之陋思得真才雅士見先生䇿謂輔臣曰我明百五十年無此文體是可以變今追古矣遂列置第一而天下傳誦則效文體為之一變朝野景慕若麟鳳龜龍間世而一覩焉修撰一年歸關中三年北上復為修撰其在翰林能面道人過失論古今文藝不少假借一時在翰林者罔不斂手服之又常曰南北人才之用舎天下治亂之所關也時武宗皇帝初即位宦官用事八黨行權而興平官劉瑾用事尤專百僚被其竄逐而吾鄉折罰尤甚聞先生名常欲其至而先生獨不之往瑾以是銜之有時見直言諷勸在他人不能堪先生獨言之無忌蓋瑾素重其名自能壓其心耳是時瑾怒吾鄉户部郎中李夢陽蓋以夢陽為主事時尚書洪洞韓文卒諸大臣劾瑾等專恣擅權而彈文出夢陽手朝廷怒罷諸大臣夢陽官後瑾居司禮忌前彈文構夢陽以他事奏下錦衣獄欲致之死人情忷忷莫敢拯救夢陽自獄中傳帖甚急曰對山救我此帖尚存編修何柏齋謂衆人曰康對山若往瑾救之獻吉可活也人以是語先生先生曰我何惜一往而不救李耶先生先雖承往而人尤難之先生同御史某往左順門值柏齋自内閣出曰此為獻吉来耶先生曰是柏齋附先生耳曰此可獨往不可與他人同也先生遂不之往且謂柏齋曰瑾横惡肆權人也性好名可詭言而奪不可正言而論也柏齋曰此惟先生能之他人不能也又明日先生往瑾所瑾聞先生至倒屣迎之留飲坐話久之瑾謂先生曰自謂自来狀元俱不如先生真為關中増光先生紿言曰海何足言今關中有三才古今所希少也瑾驚曰何三才古今希少也先生曰李郎中之文章張尚書之政事老先生之功業瑾曰李郎中為誰乃與我並焉先生曰是今獄中李郎中也瑾曰非李郎中夢陽耶先生曰是瑾曰若應死無赦先生曰應則應矣殺之關中少一才矣晚飲罷出明日瑾奏上赦李夢陽其顛倒小人愚弄奸臣即孟子告齊王謂好貨好色之意而昧者不知論為諛瑾可笑哉一日瑾令親宻者謂先生曰主上欲以汝為吏部侍郎先生曰我服官纔五越歳矣翰林未有五越歳而陞部郎者請為我辭之事遂寢而瑾嫌其不附内益銜之一日起文選郎中張彩尚質之京先生謂尚質曰我輩欲去而不可得汝又何来耶尚質曰我見挐髙世徳恐慘禍及我髙世徳者吾鄉御史髙𦙍先也為御史有名瑾銜之挐焉無何尚質陞為吏部侍郎先生曰不来恐禍既来受官矣曷引病辭耶及瑾坐反尚質下獄中謂同獄者曰悔不聴康徳涵之言尚質為郎中時有進用之勢一日與先生同諸公會飲尚質盛稱許冢宰之才徳先生曰只要常如此稱其意謂尚質不久為尚書排擠之意勢所必有無何瑾果逐許矣孝宗時謝閣老遷見知主上其子丕為翰林編修文亦有名焦閣老芳其子黄中亦為翰林檢討争勝于謝各樹黨與互為標榜焦欲引先生為附一日置酒厚請先生先生往見客座皆邪媚者曰此為排謝招我耶遂正言責之座客皆愧服銜先生者益衆矣是時李西涯為中台以文衡自任而一時為文者皆出其門每一詩文出罔不模效竊倣以為前無古人先生獨不之倣乃與鄠杜王敬夫北郡李獻吉信陽何仲黙吳下徐昌穀為文社討論文藝誦說先王西涯聞之益大銜之戊辰先生同考會試場中擬髙陵吕仲木為第一而主者置之第六榜後先生忿言於朝曰吕仲木天下士也場中文巻無可與並者今乃以南北之私忘天下之公蔽賢之罪誰則當之會試若能屈吕矣能屈其廷試乎時内閣王濟之為主考甚怒先生焉及廷試吕果第一人又甚服之無何丁母憂歸關中往時京官值親殁時持厚幣求内閣誌銘以為榮而先生獨不求内閣文自為狀而以鄠杜王敬夫為誌銘北郡李獻吉為墓表臯蘭段徳光為傳一時文出見者無不驚歎以為漢文復作可以洗近文之陋矣西涯見之益大銜之因呼為子字殷蓋以數公為文稱子故也若爾非大銜也耶歸關中居喪以禮哀毁怨慕無何瑾敗而異者仇者喝言官以鄉里指為瑾黨論先生罷其官嗚呼先生以修撰罷歸官不加陞阿瑾何謂大抵先生以才名致謗口語招讒又何論焉又謂先生還家時被刧有司為追捕其所亡蓋追捕所亡有司素重其名且為翰林而追捕之也先生阿與焉聞者無不驚歎曰假手折才嫉賢附黨有天乎而先生聞之畧無愠色且曰自審無疚禍將從人瑾天下大惡也余常憂其禍國今果敗論死矣深為國家慶也余官何惜余官何惜罷官後一切國家事罔論葛巾古服放情山水為文讀書造日益精學日益充又常曰為官化民為宦化俗欲化民俗先敦族黨族中長者敬幼者育窮者周顛者扶無親疎逺近皆得其歡心而數弟顯達成名皆先生教導訓誨之力其於鄉黨處之以仁義接之以禮敬人有争者不之官而之先生求其決判而先生别其是非論其曲直雖數年之争罔争以至給人困乏婚喪不得舉者貲助之俾無不舉余在告後值父喪困不能葬先生聞之適有先生相識以百金餽者先生完封遺余余固辭弗受先生曰余大事畢矣得此不過日用費耳何若助吾弟喪余固再辭之先生曰賻喪故遺授受有名非假借討償耳曷辭焉余不得巳受之遂克葬事其敦友之義周人之急事悉類此又日與故舊童冠徜徉詠歌雖身居小縣而名動四方求文者日踵其門碑版傳刻天下為徧家居三十餘年探聖賢之學别王霸之道以至物理性命篆隸巫卜無不克講洞曉常與予論曰道以無定為真學以適用為是文以達質為良三代堯舜罔有不同至有宋以来執一以為道訓詁以為學庸冗以為文論其學則有適其用則無講一身之行為似是救國家之急難則非也觀乎此言非振古豪傑天挺獨出者哉家居不離聲妓管絃絲竹一飯必用人或議之不知大節所關凛不可犯先生少時夜行家園中值園牆傾有鄰女子奔先生先生正色斥之鄰女走不敢近此與栁下惠何異焉為學道披𤣥門識該宗旨議論如孟軻為文類馬遷詩以興致為先格髙詞俊凌駕古人樂府數百篇可羽翼騷雅使遭時用事管晏不足為伊傅不足追也夫何厄塞不遇終老以歿是天未欲振擢斯文俾先生厄塞不遇終老以歿也距生成化乙未六月二十日享年六十有六先娶尚氏有丈夫行持家訓衆極有規度雖先生亦敬畏之生男子粟為縣學生闕卒女子三一適華州舉人張之榘貞烈剛明如母尚氏之榘亡生子光孝為廩膳生次適生員李世貞次適監生馬襲古繼張氏側室楊氏李氏俱無出韓氏生子梣趙氏生子梴張氏殁立李氏為適主家事而楊氏副焉將以某年闕月闕日葬嗚呼先生之言行可誦說者尚多余不能悉悉其所知者耳聞鄠杜王漢陂為先生墓碑三原馬谿田為先生志髙陵吕涇野為先生墓表咸寧許少華為先生傳而先以狀誄委余前四君子皆先生所厚而王馬吕又先生同業同朝其知先生事又真且多也其為碑為志為表記載傳述必有出余狀次之外俾先生行為之良不至遺失無傳可也余與先生交二十餘年矣授㫖開方被教良多余時或有所論議亦必採擇聴受人有一善雖一介鄉黨之士亦稱賞取法人有不善雖公卿權貴之人亦面斥之不貸不逐好以違情不黨同而伐異此雖堯舜三代之時恐不能用况末世薄俗直道難行而欲取大位建大功以求如古人之所為不亦難哉不亦難哉常聞先生對孝宗皇帝曰使古今豪傑之士而不遇雖子思孟軻之流則亦徒耳今觀先生之出與處則前所云子思孟軻者其亦自謂也與其亦自謂也與太學生丘君行狀蔣冕君姓丘氏諱敦字一成號必學齋大宗伯深庵先生之冢子也先世閩人在宋官於瓊始占籍瓊山曽祖諱普臨髙醫學訓科鄉稱思貽先生祖諱傳不仕俱以先生貴贈禮部尚書曽祖妣柯氏祖妣李氏居孀不二朝廷旌為節婦俱贈夫人母吳氏累封夫人先生生子多不育年四十始生君於京師君生有異質自幼莊重寡言笑不好弄於凡兒童嬉戲之具一不接于手與儕輩羣居端坐竟日或公肆戲侮亦視之如無對人未嘗自有所言問之亦多不答就學家塾中師授以書雖少僅百十言讀數十遍亦不能成誦蓋其心巳了了特口不習其辭耳衆見其然遂疑為不慧雖先生亦不之察也先生恒言人家仕宦不常而生業不可廢方居太夫人憂還瓊山將起復北来時從子二人尚幼先生庶生二稚甫能言皆聰悟絶倫將他日諉以書香之托君在諸子姪中為最長遂以世業畀君留侍吳夫人家居佐伯父訓科公奉宗祀先生遂行方先生行時訓科公故無恙君所以事伯父一如事先生者而訓科公以君簡黙猶疑其果不慧他日見君綜理家政一一悉中度始知其不凡由是事無鉅細必質問而後行有所經畫多出人意表訓科公又大驚恨知君之晚臨終呼至前盡付以後事訓科公既卒一切喪葬事悉據先生所訂家禮儀節以行客有来弔祭者見君舉措中節無過舉無廢事咸嘖嘖稱歎蓋至是始知其有隱德云既免訓科公喪家無經紀之僕君多主家事鄉人多無賴藐其幼弱公肆侵犯君處之自如方汲汲自奮于學素苦多疾先生又北上鄉郡間一時學者多惟舉子業是務四子一經外漫不加省君左顧右盼無所適從未嘗不茫然自失也於是困臥書樓中日取先生所留書閱之若不識字惟以意會久之因其所巳通以達其所未通恒謂人曰人之於字皆先識音而後知義余則因義以求音於是先羣經次諸史又次子集下至稗官小說晝夜不釋手或三五日足至樓下慨然以老泉自期夜夢見一儒者與之談皆經史奥義問之知其為東萊吕成公也覺而深有所感發由是一意聖賢之書有寤寐不忘之意焉自謂筆路尚生於文章家修辭之法患不得其蹊逕又摘出諸史書泛觀廣覽至興衰成敗之際輒反覆究玩於凡一代顛末一君始終皆撮其行事而以聖賢理道斷之如史家之贊辭云者横豎穿貫上下數千載間由是博極羣書而藻思日以逸發矣君自視欿然方幸人不見知鄉邑賓友胥會當衆論呶呶之際獨塊坐如土木偶人禁不出一語退而自歎曰丈夫生天地間當與天下豪傑角何至從鄉里小兒輩競銖兩毫末於頰舌之間哉是時人雖不知君而君獨明于自知故其自許如此壻文昌韓氏魏國忠獻公之裔邦鉅族也壻其門將期矣婦翁猶不之知意君必失學見君至每令幼童以對句及舉業破題試之輒不應一日賓客會其家命題賦詩獨不及君婦翁數視君而色甚愧已而以椰子為題或戲君曰盍賦此君援筆成唐律似略不經意婦翁喜其速命數十題詩皆立就每詩成輒飲飲多至三十餘觴不亂由是隠然名動郡邑間部使者某公問先生三子優劣於瓊之舉子率爾應曰二稚慧甚長者殊憒憒爾部使者亦謂信然會與君言異之時將舉兵征黎因問征黎利病君區畫精當而議論英發部使者愕然語座中人曰某言丘公之子憒憒公之子豈憒憒哉彼言者乃真憒憒爾素不事請謁家居近郭無故足不履城市非有事未嘗涉迹公庭藩臬有按部至瓊者不肯輒先趨謁或為先生来視即日投刺報謝時事不一挂口問之亦不對或有所詢叩至數四察其心果誠乃更為之委曲詳盡焉聴者心服親舊有事于州司覬得君片言為助不可當路以先生故重君不事干請或誘之言終亦無所言方伯某公按瓊謂君曰有事不妨来言諾之而不復閱月召君問故對曰敦素不習此故人無来託者他日某公詢諸郡縣果然歎曰丘先生可謂有子矣有某某者守瓊見先生素不預公府事遂欲啗君以利因隂結于先生間遣其子語君曰鄉人茍有訟事能餽君五百金者盍為之解紛乎應之曰此言何為至於我尊公但循亷則闔郡皆受五百金之賜奚必敦哉其人歸語其父甚慙語人曰丘氏父子相似蓋尤君之太峻也始君之居鄉州司見君不肯趨謁惡其簡禮姻舊不為解紛怒其不情君耿耿自信持之終不變厥後州司樂其不侵擾姻舊安其不偏矯因更翕然賢之海外俗尚侈巨室子弟出遊多乗馬張蓋君獨徒步徐行不輟當街衢中道遇諸塗者望而知其為君也初先生北来獨攜二稚侍行未幾相繼殤亡始以書召君来侍久之君不至先生恒以書香為憂每道及二稚幼慧事輒悲慟不自勝雖時時數聞君進徳徒以久不之見尚未測知其淺深君時作一書達先生書幾萬言大槩論家事而偶及髙雷治河事其言曰此河一成即有無窮之利然使區處乖方則恐無其利而先受其害元人治河因之召亂往事蓋可鑒矣先是髙雷有故河遺迹先生欲開通之以便舟楫而任事者或因之擾民故君書及之故大司空謝先生見君此書驚謂先生曰此子當世公家學何可使之獨學無友乎先生由是屢書趣君来成化甲辰夏始至自瓊山初君歸瓊山甫十齡又五年先生列文北来前後十二春秋而父子始相見至是君之齒亦二十有四矣既朝夕侍先生左右日聞所未聞於是所見益恢𢎞矣居亡何朝廷以先生官三品錄君為太學生時先生方主教事門下諸生數千人君避逺形迹不妄交一人遇有所往獨自䇿蹇挾一僮以行羣然埃壒中雖諸生不識其為先生子也是時當塗用事者多縁子敗君因作詩以志戒有近世大臣多子敗而繼之以肥馬輕裘真桎梏明忩棐几即山林之語聞者賢之始君於羣經尤好春秋傳時給事中安成劉君孟進士新安唐君弼在太學諸生中皆以業春秋知名先生間遣君從二君習舉子業資進取非其好也會京闈秋試黽勉一入場屋既不第歸笑自謂曰區區舉子業曷足以溷吾乎盍屏諸於是經史百家之言歴代帝王治天下之法度與凡禮樂兵農天文地形律吕星厯以至醫卜筭數之說益無不研究焉而於典故沿革世家爵里考覈于近代以至我國初者為尤詳慮其遺忘有所得即書疏之于冊蓋自是絶無進取之意矣君自幼未嘗一日去母夫人側既逺别蚤夜思之不置欲歸則先生不可恒鬱悒不自聊時發憤歎于詩歌来京師無幾即得疾疾甫愈復作在京師六寒暑而疾居其多疾作時輒不喜見人人有来問候者雖姻舊或父執長者亦罕得其一面惟困坐一室中日掩關焚香以誦讀著作為事雖盛暑鑠金猶口談手校不輟蓋君惟恐學不進名没世無聞而不知其身之既病而將死也方疾之復作也飲藥輒不效京師諸醫大率多泥東垣丹溪之說而不得其妙用藥往往無近效君自謂深於醫道獨不能診脈耳於諸醫槩庸視醫每進藥多疑不肯服即服之亦不過數劑即止已而更一醫復然疾勢殆不可為而歸心尤切少間先生漫遣之歸君甚喜旦暮躬治任且未嘗一日置書不觀形日益尫羸而者作不廢疾遂増劇而卒時𢎞治庚戌五月十三日也距其生天順庚辰六月六日得年僅三十有一君之學以積思自悟為主有所疑必思方其致力於思也或終日凝然如癡繼以通夕不寐雖疾病呻吟中而苦心自若也其軀幹似不能勝衣而勇猛精進毅然不可奪沈潛玩索蓋將斃而後已故其學無所不窺下至釋氏書亦能悉其精微間出以示人有觸其機鋒者肆口辨詰傾河㵼海不見有窮竭態予每親見其然雖深于其學者亦或難之其才奔迅竒健為文多不起草當喧溷倉卒間若不致慮睥睨而起落筆如飛馳頃刻數百言詩雄爽善用事每酒酣耳熱逸興頓發拈筆向人覓題一揮殆數篇多有不經人道語初過南安華亭張汝弼為守一見竒之目為小坡蓋擬之於東坡之後身也識者不謂其溢美然君雅自慎重有所著作不肯輕示人雖先生父子間亦未嘗盡見之蓋用心於内者其道固然與既卒侍史出其遺稿于二鉅篋中始得雜文若干巻古今詩若干首發蒙論一卷凡數十篇所著書號醫史未嘗稿者四十六册他所輯錄者尚多皆未及成書君於醫家書獨酷嗜素問一書宏深浩博而每病讀者之難間閱丹溪所作讀素問批㸃凡例而増補訂定之以為新法按其法以求其書久之若有所得廼探其源委審其脈絡章分而句釋之僅成十數紙如上古天真論四氣調神大論諸篇多有發舊註所未發者又先生嘗病瓊僻處一隅文獻無所於稽恒欲於古今載籍中採其故實之有涉于瓊而可資見聞者會萃之以成一郡之書不果君奉庭訓唯謹每繙閱簡册遇可錄者悉手錄之積久成數帙編題甲乙以識别將攜之南歸欲用數年之力詳搜精覈以成先生夙志瓊人士謂此書若成郡自有志以来所無也至今咸以不覩其成為憾其所謂醫史書雖未及成而規模次第大略可考見其意蓋病世醫外方書古法而惟以醫者意也之說藉口肆意妄為以冀其一中故其言曰公輸不外規矩而巧師曠不外六律而聰醫之道亦然蓋必先明於法而後可以言意意生於法而亦不外於法舎法而言意則蕩舎意而言法則拘雖不中亦不逺蕩則無所不至故與其失之蕩也寧拘素難本草暨諸名醫著述與其所行之事跡非醫家之規矩六律乎於是上溯農黄下迄金元以来裒錄而辨析之論病以及國原證以知政治疾必先治心明術必先明理會衆說以成一家言有史道焉故名其書曰醫史其書有本紀有表有攷有列傳大畧如史家書以為易有太極是生兩儀兩儀生四象四象生八卦八因於八而成六十四卦易道備矣易主卜筮卜與醫皆民用所資不可一日無者其道一也易有君子之道以制器者則尚其象故虚一以象太極著本紀二以象兩儀表四以象四象考八以象八卦列傳則象六十四卦之數本紀則神農黄帝表則運氣五藥之類考則醫書職官醫器服食攝養之類列傳則岐伯扁鵲而下以至國初諸名醫既自序其著述之意而於其篇終復曰予述此書總四十八篇七與八皆少數也老變而少不變用少而不用老然則此書其終不變而遂無用乎吾道窮矣其兆蓋先見矣嗚呼悲矣其運氣表曰醫時錯六氣于五運所以參天地之機補造化之缺者也蓋運有五金木水火土是也氣有六燥暑風濕寒火是也天以六為節故氣以六期為一備地以五為制故運以五歳為一周五氣平則生物遂五氣乖則生物苦蓋陸産生于氣猶水族生于水也生于水者病于水故水清則魚勞水敗則魚病水毒則魚死生于氣者病于氣故木氣勝則風氣流行脾土受邪民病餐泄火氣勝則炎暑流行肺金受邪民病痰瘧而水火亦由之變徴動植亦因之榮悴故曰天地之道寒暑不時則病風雨不節則飢又曰土敝則草木不長水煩則魚鼈不大氣衰則生物不遂聖人有憂之觀法天地把握隂陽逺取諸物近取諸身順八風之理處五行之用步運行於機式稽變化於度數而運氣制焉是故從其類序分其部主别其宗司調其氣數之偏反其和平之化使之剛氣不怒柔氣不懾天道既順民氣可調五運適于平而無害於人各成其功不相奪倫此非所謂參天地之機補造化之缺者乎左氏載醫和之言曰天有六氣降生五味即此五運六氣之數蓋與大易洪範月令同一致也非天下之至材其孰能與於此邵子嘗言素問于術之理可謂至矣其殆謂此類與夫氣運猶厯法也久則不能無差厯法之差則既隨時修改以與天合然後寒暑不爽而薄蝕可知矣自有運氣厯法以来數千百載于兹厯法之差不知其幾修改矣而運氣猶故也夫一日之頃而凉温異候百里之近而雨暘異若欲持一定之法以應無窮之變安望其能相入哉故敦阜之紀未必風雨大至鱗見於陸也委和之紀未必天地凄慘日見矇昧也姑以宋論之元豐四年歳在辛酉推以彼之術其說以為陽明司天是為上商少陰在泉是為下徴故其應則當天氣燥地氣熱運為少羽歳水不及名曰涸流之紀是歳河決大水與其所名紀曰涸流者異焉或以此難胡源源雖辨之甚力而卒亦有不可誣者素問黄帝問於岐伯曰夫子之言歳候不及其太過而上應五星今夫徳化政令灾眚變異非常而有也卒然而動其亦為之變乎答曰承天而行之故無妄動無不變也卒然而動者氣之交變也其不應焉故曰應常不應變是固然矣隂陽有勝復也常變恒因仍也豈一於變哉何後世常之少而變之多也無乃亦積歳一差積之益甚天日新運法猶舊天左故其應難稽乎是非聖人之法有不足徴也蓋繼承纂述之無其人也至於今日其弊滋甚忽於本而致詳於末舎其大而徒牽强附會支離決裂幸其一之偶中而遂悉神其說焉不亦大惑乎泥者至云某生人於某日某經病者治以某藥按圖膠柱其謬甚矣故程子曰氣運之說堯舜時十日一雨五日一風始用得而褚澄亦曰隂陽多端未易窮也道術破碎未易知也簡編不全未易依也不若先論病能守經隧一本諸人事之為近也素問有曰知其要者一言而終不知其要流散無窮此之謂也而古者名醫所以亦往往置此而不之論與雖然體天地法四時别隂陽順人性其理蓋亦有不可易者醫而忽此曷足為醫于是論次其槩以備觀覽焉其書中又有三因說又論李明之不準古方以治病言皆有補於世三因說曰病有三因其說尚矣然又有因於天因於地因於人者豈但内外因而已周官有云四時皆有癘疾春病首夏疥秋瘧寒冬𠻳上氣此非因於天者乎仲長統昌言有云北方寒其人夀南方暑其人夭此非因於地者乎韓詩外傳有云國無道則癘風疾雨夏寒冬温故民多疾病而羣生不夀月令孟春行秋令則其民大疫凡此之類豈非因於人者乎因於天者醫經有五運之方可以治之因於地者醫經有五方之治可以療之獨因於人者醫經缺焉嘗求後世之方書惟張子和李明之畧有其說子和之言曰瘧疾嘗與虐政並行或虐政行于先而瘧氣感于後或瘧氣行于先而酷政應于後治平之時其民夷静故瘧疾常少擾攘之時其民勞苦故瘧疾常多元好問序李明之所著書謂汴京被圍五六十日間為飲食勞倦所傷而歿者將百萬人當時皆謂由傷寒而致後見明之辨内外傷及飲食勞倦傷論而後知世醫學術之不明誤人乃如此二說皆有禆于醫術然醫能治之于已然其惠小君相能治之于未然其仁大嗚呼明君賢相勿使人瘧其勿使人疫死於飲食勞倦其勿使小道曲藝得行其私惠哉其論李明之曰明之嘗言古方新病勢不相入故其為人治病候其脈既乃斷之曰此某證也然後執筆處方命藥一切撰于臨時而不用其故以為病證無窮我亦與之無窮欲以一洗世醫按圖膠柱之固武帝欲教霍去病兵法去病辭曰顧方略何如耳何至學古兵法夫古今異勢敵情萬變而無窮茍不能通變而惟古法之拘其不輿尸也難矣去病可謂知兵者明之之知醫何以異於去病之知兵然業醫者不能皆明之也脈未必能如明之之精證未必能如明之之審而亦效明之之為恣睢杜撰不能去人病而反以益病者安保其能必無也故茍未有李廣之才則不若守程不識之法之為愈如是者十數萬言辭多不錄其曰發冢論蓋取蒙莊氏詩禮發冢之義而托名於兀該拙卜古温是六言者蕃語也譯以華言謂無是人蓋用漢賦亡是公之例其大略以為古者政龎民淳官無文武内外之分後世政繁文武始岐而二之迨世道日汙於是又分而為三矣其岐而為二也如車之有兩輪去其一則脫輻矣其分而為三也如鼎之有三足折其一則覆餗矣今既不能合其岐而二之文武而顧欲去其分而三之中官豈不難哉中間又有宦官讀書不讀書之辨大約如漢書韓安國王恢撃匈奴議凡十數段其終篇又設為甲乙辨詰之詞略云甲與乙交莫逆異内外辭曲直乙曰人之男者腐之則惡馬之壯者腐之則良人腐則鬚脫雞腐則尾長何為相反也甲曰人土屬而體陽其隂在勢去其勢則陽亢矣故惡馬金屬而體隂其陽在勢去其勢則隂純矣故良人表陽而裏隂隂傷而鬚脫者伐其根也雞表隂而裏陽陽損而尾長者力之專也乙曰宦者無鬚醫經以為去其宗筋傷其衝脈血㵼不復皮膚内結脣口不榮故鬚不生然與甲曰不然夫鬚之有無天所以别隂陽殊内外也首楞嚴經列十官之目紫微帝垣有宦官之星何莫非潞涿君也豈皆去宗筋而傷衝脈之故哉乙曰宦官可去乎甲曰宦官禎祥也禎祥何可去也乙曰汙穢人君徳濁亂人朝綱殘賊人忠良渙散人民心喪失人天下此為禎祥孰為妖孽甲曰自古創業垂統之君為之防範維持之慮至周至悉矣繼承之者茍非大無道則國勢未易摇也雖厯數有歸而人衆勝天無資以作於是熒惑降精下為宦䜿依阻城社人亦不能勝而天下亂矣然後瞻烏爰止景命維新焉譬之猛獸物莫能攖反為毛間蟲所困然後斃於物也是故漢之興也趙髙蠧秦魏之造也常侍蟊漢梁之簒也北司蛆唐是秦之趙髙漢之常侍唐之北司乃漢乃魏乃梁之禎祥也天降禎祥為興國瑞又可去乎乙曰國家將興固有禎祥然齊宫之刺投河之辱千百輩盡誅之慘人生亦不幸而為禎祥哉甲曰夫宦官㧞迹糞壤之中致身霄漢之上可以將可以相可以聖可以賢可以仙可以佛蓋無往而不可禍患其變也禎祥其常也君子語常而不語變乙曰請得聞之甲曰内握禁兵外監方鎮成功賞則先敗績罰弗及非可以將與圖謀帷幄寄之國命濁亂天下弗受其責非可以相與佞子貢媚擬倫伊霍陞座講易係籍聖賢非可以賢與附之者白日飛昇忤之者生入地獄非可以仙可以佛與時又或能廢置人主呵叱天子則遂可以為上帝矣雖衰兇鞠頑終底滅亡然又足以快天下心攄天人憤為興王之資垂後世之戒亦不徒禍矣庸何傷如此者亦數千言君嘗謂予曰予為此論乃癡人說夢中事也夢者固癡矣安知聞人說夢者亦不癡其人哉夫天下之事心有所蔽則以惡為美以非為是以害為利者多矣古人不云乎箕糠眯目則天地四方易位自是其是者蔽於所見但見其是而不知其非人一切有言舉不能入自非為之說者逆探其所料指摘其所信推極其所期竭兩瑞而盡之凡彼所以為之地者一一皆豫為之言若彼之自為言者又曷足以感悟其心也邪予為此論意蓋出此雖然天下事可言者多矣何獨論此哉殷鍳不逺在夏后之世事莫急焉故也君又嘗著論辨公山不狃之非畔其言曰公山不狃以費畔召子欲徃程子曰聖人以天下無不可為之事亦無不可改過之人故欲徃雖然弗擾之畔畔季氏耳非畔魯也封略之内誰非君臣大夫跋扈家臣起而逐之以張公室季氏烏得以畔名之哉迨仲尼行乎季孫將墮費不狃率費人以襲魯蓋未喻乎聖人之志妄動以取戾也其出奔在呉呉將伐魯問于叔孫輒曰魯有名而無情伐之必得志焉退而告不狃不狃曰非禮也君子違不適讎國未臣而有伐之奔命焉死之可也所託也則隠且夫人之行也不以所惡廢鄉今子以小惡而欲覆宗國不亦難乎若使子率子必辭王將使我王問不狃對曰魯雖無與立必有與斃諸侯將救之未可以得志焉晉與齊楚輔之夫魯齊晉之脣脣亡齒寒君所知也不救何為呉伐魯不狃率故道險魯是以不危夫不狃以畔亡之餘而處心尚能如此賢于人逺矣孔子之欲往也詎無意夫况其據邑以畔不召畔人逆黨而顧夫子之召今夫人有一非理之事鄉里有自好者不欲使之知焉况以畔名乃敢召吾夫子邪必其志有所在言有可執焉耳聖視天下固無不可為之事無不可改過之人至堅至白無所磷緇亦何至助畔逆之事黨大惡之人邪於是乎必有以諒之矣而曰夫召我者而豈徒哉如有用我者吾其為東周乎噫畔逆之人能革面效順亦既多矣而欲因之以興周道于東方焉則所以望之者侈矣或曰子路為季氏宰則墮三都乃心罔不在公室也使不狃而有張公室之心固子路之所願也亦不恱焉何也曰甚矣風俗之移人也王室衰諸侯横為大夫者不敢忠于王室諸侯弱大夫肆為家臣者不敢忠于公室故萇𢎞興周史臣著其貶家臣死黨舉世以為賢當時列國魯號秉禮昭公之十二年南蒯與公子憗謀逐季氏昭公與焉其鄉人有知之者歎曰家臣而君圖有人矣哉迨昭公伐季氏叔孫氏之司馬曰我家臣也不敢知國救季氏而昭公孫則是舉國臣民惟知忠於所事矣當時諸侯齊景為賢南蒯奔齊景公曰畔夫對曰臣欲張公室也子韓晳曰家臣而欲張公室罪莫大焉則是天下諸侯不以背公為罪矣風氣相扇上下相師背公死黨之心盛愛君忠國之念消致人主孤立於上大夫强横於下公室欲張而不得簒弑削弱之禍相望於世雖以聖門髙弟或不暇知其非也故顓臾近費冉有興戎孔子欲往子路不恱此則一時風俗之移人耳然則畔不為非與曰臣而畔君固不得為欲張公室則未可深非也後世莽操炎裕之徒其黨有舉兵而欲誅之者君子固與之矣昔者安祿山數顔杲卿我奏汝為判官不數年超至太守何負於汝而反杲卿曰天子何負於汝而反我世為唐臣官爵皆唐有雖為汝所奏豈從汝反耶我為國討賊恨不斬汝萬段何謂反也祿山不得反杲卿則季氏豈得畔不狃哉不狃非畔則孔子之欲徃也固宜於佛肸也亦然然則何以卒不往曰不狃之張公室亦桓文之奬王室耳其他議論多類此君卒時庶弟京僅三歳所生二子長僅五歳幼甸亦三歳時先生之年暮蓋不勝宗祊之慟也得君著作不忍讀終一紙天下大夫士無論識與不識莫不聞而悲之君雅好儉素雖生長富貴中自奉養率如寒士少時不肯著新衣客至呉夫人强之然後著客甫出門亟麾去或問其故曰無他吾特惡其華耳蓋淡泊之性自幼則然矣見利顧義辭受無細大必謹方伯陳公士賢先生考會試時本房門生也因君北行贐白金二錠遣人致辭曰某平生不餽遺人徒以老門生之故故破戒為此郎君其勿郤君愧其辭不受陳自愧失辭亟謝過往返數四竟不受陳歎息而止治家嚴明有法度臧獲數百人見之凛然無一敢涕唾者與人交任真無鉤距是是非非明白無回䕶然剛中少容觸物不平輒勃勃形詞色間遇人一語不相入即兩目左右視若寂然罔聞者甚則徑去弗顧不善效時俗俯仰見人委曲巧媚態疾之如讐絶不交一語每自訟以為過激終亦不能改也然外雖嚴毅中有惻隠心每欲修先曽祖思貽公掩骼埋胔故事往往施徳於不報北来時嘗夜宿會通河舟中夢至一江岸旁有古墓土為水所囓其棺石也盡露而缺其一方明日過一處儼然夢中所見也亟戒徒掩以土仍欲求楮幣酒漿致奠而舟已不可留猶以不及致奠為恨其所娶韓氏無子既抵京先生深惟嗣續計欲為納側室君以娶妻未久情有所不忍因固拒閣老徐先生聞君言呼之至前責以義申論至再三始黽勉從命納徐氏生二子女三某韓出君来後二年殤亡某媵某氏出今九歳某徐出今五歳嗚呼以先生之仁而不能夀君以君之賢而不能自夀茫茫者天吾又安從而詰之乎使天少假君以年其所就當有大過人者而乃止于斯也豈但君身一家之不幸哉予從先生學最久與君相得甚歡間嘗為予道其少年事皆歴歴可敬病中又手書平生立身行已之大端易簀時將持以授予不及與君訣其意蓋有所託也君卒既踰期其柩亦歸抵瓊山而懿行未白幽冥之中負此良友多矣情雖不忍書而義則不可不書因即所見聞暨得諸君之鄉人而信者次為事狀一通凡君之世次言行與其著述之有闗世教者皆載焉謹錄以求銘於當代立言者以紓先生暮年之悲以慰君之靈于地下辭繁而不敢畧者蓋專有待于筆削也𢎞治四年六月十二日友生蔣冕狀明文海巻四百三十三
