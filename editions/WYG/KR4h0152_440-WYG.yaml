body:
  text: 明文海巻四百四十餘姚黄宗羲編墓文十二儒林黄菊東墓銘謝肅先生諱珏字玉合菊東其號也姓黄氏世居剡髙祖諱某仕宋官至某州别駕徙餘姚之四明鄉而家焉祖韓雷字震卿妣翟氏父諱士儀字正甫妣舒氏先生天資亷静朴厚端慤恭謹八嵗始能言言已中節人共竒之未幾喪母擗踊哀毁儷如成人出就外傳雖值大寒大暑雞鳴必起盥靧而誦習至夕則秉燭對巻不知急雪之打牕而飛蚊之咂膚也十二三嵗祖令説所讀春秋而謬於經㫖祖慨然曰吾欲爾紹儒術乃竟若斯耶遂身親教之至十五六嵗從戅菴先生受蔡氏尚書以求二帝三王之心研極根柢既有所得而郡邑巨室共争致先生於師席遂客授者餘四十年中間屢試江浙鄉闈不一售則又嘆曰明經豈專為决科計哉况得失命也遂絶仕進意然未嘗一日舍書不觀尤喜翫邵子皇極經世書指趣精妙貫徹天人有以自樂嘗曰天人之理微邵子能推帝王之道大蔡氏能解然非朱子訂定而發明之愚亦何能窺見彷彿邪其為學蓋至老而益勤先生有同母兄璧庻母弟瓊瑤玠庻母䜛先生先生失愛於父而孝友益篤卒無間言父令諸子析㸑先生於家貲悉聽諸弟所欲無幾微靳色及父歿囑先生以後事先生治父䘮所費皆已出不取於弟人或難之先生曰從先人志耳尋常中語及母夫人輙涕泣不能食嵗時祭祀必極誠敬每自誦曰父子兄弟天屬也其可以死生而貳其心乎有富人兄弟以嫡庻分貲產不均弟欲擴地訟兄醸致其罪先生沮之再四弗聽則怒之曰若所訟䧟兄死地何靣目入祠堂見祖宗乎况若子孫相讐不共戴天祸可測乎必若所為吾絶交矣因感泣而止其兄聞之驚曰微先生我家幾破為置田宅以奉先生先生曰吾言義也不可以圖利終不受其所行類如此先生平居衣服飲食給於學徒晩益空乏且末疾所纒未嘗咨嗟胸中曠然唯誨人以善日益慊慊壻劉景祚居上虞白馬湖上延先生訓其子既至與太原王萬石陳郡謝肅數為文字飲以逍遥乎海雲山月閒一不關餘事凡十閲月而先生之女卒哭之哀遂還海濵寓所國朝洪武三年冬十有一月五日夜三鼔疾甚召其子熈命之曰吾歸矣汝善自持其身語畢正衣冠端坐而逝年七十一士大夫哭之曰篤學力行君子亡矣熈奉柩以是月甲子祔塟於上虞建隆嶴先塋兆次遵治命也先生娶同邑宋氏宋忠嘉公諱師禹之五世孫諱某之女有懿範先先生九年卒子男一人即熈能力貧事親女一人某即先卒者孫一曰階在先生卒後生有詩文若干巻其道事理大抵由戅菴以泝慈溪者也又七年熈具行實踵門而泣請於余曰先生親舊惟吾子相知尤深而墓未有銘敢請余惟先生學有師承行為鄉表不及用於世而安貧守道以終其身今其子熈知讀書善治生買田築室以紹先業族姻朋友咸稱其能又能顯揚先徳不使無聞則先生為有後而天之報施之者其在斯乎遂銘之曰於學允殖於行允飭兹為老成式孝且友義信是守以表宗鄉帝王治體天人奥理探索孔明厥畜靡施自求所志斯遂而亨敢美於石終古弗泐後人之慶周皜齋墓銘烏斯道皜齋處士諱堅字砥道皜齋其自號也姓周氏慈溪金川人曽祖諱夀祖諱實父諱祥無嗣以處士為後處士蓋餘姚䨇溪河孫一之季子也性孝友直諒有識見稍長貌若玉雪出就外傅言笑容止如成人至縂角歸䨇河覲母氏母氏異之母曰周氏既得汝自生子一人汝宜留以守吾宗祧處士拜且泣曰堅生甫七十日即後周氏其鞠養教誨恩若已出不可忘也堅聞背義不祥且守宗祧有二兄在不敢奉大人命也母氏感其言復遣之如初既冠益好學楚楚然自餙或與二人謀植身計一曰貨殖一曰科第處士曰士當眞實踐履富與貴命也奚可必哉咸服其讜論時相山王先生寳峯趙先生閲慈湖楊文元公遺書有覺一時出其門者甚衆而浮議者亦衆處士奮不顧浮議一從二先生游寳峯知其載道器也為漆漆然啟廸處士聞日用尋常即道之誨意殊喜作而問曰見道之功安在寳峯曰其反觀乎昔楊夫子猶反觀入道某亦嘗事此良騐子其試哉是夕歸而黙坐反觀意念俱冺忽見天地萬物有無一體不知我之為我惟光明滿室而已詰旦白二先生先生笑而頷之寳峯曰此知及之也正孔子曰明目而視之不可得而見也傾耳而聽之不可得而聞也又曰無聲之樂曰聞四方者是也處士又問曰光明滿室者何寳峯曰是心之光也古人所謂虛室生白吉祥止止者是也他日二先生過處士見榴花瓶中相山問處士曰花與枝葉紅緑間出果孰為之處士答曰吾所為也寳峯曰孔言庻生無教也砥道領其教矣至暮童子秉燭寳峯問曰此燭之明燭歟火歟答曰非燭非火此榴花之變化也二先生曰反觀之效豈欺子哉處士樂不可言因取曽子讃孔子曰皜皜乎不可尚矣之句名燕處之室曰皜齋日以自鍳金川室燬乃僦縣治中楊夫子祠左之室以居蓋楊夫子舊業也靣湖際山東西有熈光詠春之門其流風餘韻可想見且俾子孫得以習爼豆事也日與相山寳峯暨小隐楊先生是齋時先生向君樂中李君原善王君彦真余斯道及伯氏性善等日徜徉山水間論修已治人之道不知嵗之邁也即以金川故址及所積崇構英材悉讓仲氏有私處士者沮之處壬正色曰天倫與土木孰重輕乎卒不聽自是規行矩歩罔敢失節嘗服役官府元至正間冦亂大造兵甲邑之役於官者就瘠民肥已以歛民怨處士所覈鄉井取給公用外未始漁獵其民郡侯阿因圖方收粮過半處士率里民輸賦侯見其端謹曰必有識之士也問郡之利病處士對曰今嵗旱暵民無所出租既失於上聞宜緩竒零之征使規米入官侯之惠也侯偉之賜帽與酒民果受其惠縣令陳麟咨治道於縉紳諸公處士與焉居無何邑以從化處士於賑貧恤患尤汲汲一日見小女子風雨中病卧馬通上將絶急命僕負歸飲食治療得瘥問其故則行乞食於市者也久之遣還其家有定海戴氏子從母乞食母紿而辟之號泣無所歸處士蓄之嵗餘歸其母餘姚嵗飢䨇河困乏者羣至處士食三日復與之粟且奉書伯氏曰飢者天民粟者天物幸勿靳天物飢天民以逆天意伯氏感焉如其言賑之里有徐氏被銜私怨者謀孽重罪置之獄處士憫其枉而貧也為資其費使納賂輕之遂受笞而脫處士至䨇河伯氏家疽發背諸從子請致􅅑醫處士不許曰有命惟清心定氣而愈越數載以疾卒實元至正幾年癸卯十月三日春秋五十有七嵗乙已十月二十有三日塟於縣西黄庫嶴之原配董氏子男二曰鍵曰鎔女二長適同邑馮應彰次適劉叔瑀孫男五人孫女四人斯道與處士同在先生門冀吾道之亨以少補斯世不幸師友及吾之伯氏俱淪䘮而處士亦歿僅存者亦皆老矣大明啟運斯道被薦忝宰石龍再調吉之永新不得㧞茅連茹以發揚楊夫子之學恒䀌於心洪武十七年春鍵鎔介人走永新請曰先人卒塟久未銘惟先生與先人同講習知先人為最深非先生銘之不可敢奉狀以請嗚呼斯道詎忍銘處士哉義不可辭乃銘之曰人之從物不知所歸卓哉處士惟道是依其道光明匪騰於口既騐於見亦騐於守樂不可喻徜徉湖間水之渙渙雲之閒閒雖處韋布輕於爵位雖處里閭軼乎天地遭時弗亨尚復何言不瑕以終亦全其天身不可起道則不滅孰其徴之湖上之月故成齋王先生墓表王禕先生諱珹字玉城姓王氏學者不全稱其字而用成齋為先生稱者尊之之辭也王氏系出太原五代時有為節度使曰彦超者來居婺義烏之鳯林鄉至宋自鳯林徙居郡城者曰三府君五世而生本贈太師追封魯國公本生登政和二年進士知湘隂縣贈太師追封魏國公登生四子師醇鄉貢進士贈奉議郎師心政和八年進士累遷給事中兼侍讀權吏部尚書除顯謨閣直學士知紹興府充两浙東路安撫使爵東陽郡開國侯贈特進諡莊敏師古亦鄉貢進士師徳宣義郎贈太師追封楚國公莊敏次子渷知桂陽軍贈正奉大夫是為先生之曽祖而楚國長子淮紹興十五年進士淳熈中致位左丞相封魯國公贈太師諡文定則先生曽叔祖也祖諱槐由大理寺丞知汀州終朝請大夫父諱侊將仕郎監南康北院先生㓜頴悟資禀温厚雅不樂華靡事唯篤志問學不少懈初先生從高叔祖直煥章閣两浙西路提㸃刑獄師愈嘗從鄉先生徽猷閣待制潘公良貴及龜山先生楊公時中書舍人呂公居仁游其子為主管建昌仙都觀瀚受業東萊呂成公之門其孫為魯齋先生文憲公栢傳道於鄉先生北山何文定公基何公得於勉齋黄文肅公幹黄公即考亭朱子門人也先生於文憲為諸孫又在弟子列未嘗輙去左右而丞相之孫直敷文閣福建轉運副使敬巖先生佖其學得於撝堂劉公炎䨇峯饒公魯皆本於朱子復與文憲公諸父子姓一門自為師友先生於敷文為從子故又得以朝夕承教而無間討論經義講説理趣微辭奥㫖聞見日深其家學之淵源與他人號稱師弟子者不侔矣先生之學既粹然一出於正而固未嘗標榜以立異矜持以為高同時若葉公閭者丞相衡之孫何公欽者文定之子皆與先生以風流文雅相尚為忘年交先生素無仕進意或勉之曰世禄不可墜也乃赴銓試中其首選補修職郎監建康酒稅院未及上而運去物改因不復出棲遲先廬遂為終焉計矣乆之遺民故老日就淪謝先生與剡源戴公表元永康胡公長孺浦陽方公鳯粤人謝公翶皆以節操相激厲時唱和於殘山剰水風月寂寥之鄉黍離麥秀之音往往而見讀之令人有慨然之思焉於時浙東宣慰按察二司並治於婺握帥符持憲節而來者與其僚佐悉碩夫鉅人若恒山周公鍇隴西李公思術洛陽陳公元禮河東臧公夢解曹南完顔公貞漁陽鮮于公樞郡守倅若高平孟公淳錢唐夏公若水薊邱李公衎無不略勢分内交於先生造先生之廬無虛日或咨叩義理或商榷詞翰或講求典故之沿草或訪問政務之得失先生歴歴與之言莫不厭服以謂前代文獻之遺惟先生足徴而已先生丰采明朗儀榘淹習而冠帯偉然望而知其為喬木故家之君子也婺為呂成公過成之地後人因立祠宣憲二司欲招徠學者講肄祠下圖屈致先生為之師而先生不欲以師道自任則薦仁山金先生履祥且以書勉之出仁山文憲門人也時方高卧蘭江上因先生言不得已為起文憲之道繇以大明故凡學者猶以事仁山者事先生焉先生生於宋淳祐丁未十二月十七日卒於今㤗定元年四月二十一日享年七十有八以卒之年十一月日塟於金華縣東安期里黄枇塢之原去魏國兆域若干歩所著詩文若干巻手抄若干巻娶永嘉趙氏二子長邵孫次雲縣將仕郎江隂縣尹致仕孫男四人閑閠誾閭並以文學世其家嗚呼宋南渡後以及於今婺之衣冠家莫盛於王氏矣爵禄道徳聯蝉奕葉而先生有以承其先子孫賢才是佀是續而先生有以垂其後徴諸其身不亦盛徳之君子乎嗚呼雖無老成人尚有典型自先生沒而百年之老成典型盡矣然其所以不朽者久猶未有登載遺風餘範將就涇㣲是用追述其梗概掲於墓道庻幾來者有所鍳觀焉李愚菴墓銘王尚絅公諱希顔姓李氏號愚菴本夾谷隐士也學源伊洛遥出東魯去尚絅百年於兹慨生也晩願乖几枚嘗聞之父老云公性行峻茂貫酣羣籍太祖高皇帝用薦手書徴之南畿擇為諸王子師今分建十王者是已教法嚴毅雖諸王子有弗若教者或擊額以管帝撫而怒仁孝高皇后問故曰惡有以堯舜訓爾子顧怒之耶帝威用霽立朝風節巍然傳聞海宇授左春坊賛善大夫既而太宗北歸公歸舊隐矣道窮根柢期於力行得意則容與謳歌立論首忠孝遇事以仁義嘗於夾谷孔子廟教授生徒優㳺耕讀落魄顑頷時或陶情以酒或資以􅓙祈囂然有操築鼔刀之風感時懷憤足跡不渉城市一日藩司騶輿訪公途遇一老枕袋側卧前驅噈之乃先生也遂與班荊傾囊以别首戴箬笠身著緋袍時臨盛㑹客嘲之曰戴者本質著者君賜也榘矱莫周鄉井罔識時惟先太僕王公亞卿張公乃翁獨從公游見各翁墓碑學諭李君嘗邀為諸生開講公訖以詩謝之先君尚識其丰懷篤信守度孤介寡合卒忍㷀以死塟合塔亭保八畆地生卒嵗月茫無從考國初猶給户繇告身蠲賦後嗣後守司㒺恤二子流落宛鄧田廬就墟祠墓荒蕪害逼耕犂寖有嵗年乃下無所舉而上焉弗詢觀風弔古心兹名教者其可歎已平生著述諌草詩文散逸所及見者大學中庸心法張公嘗刻之陜藩嵗久並毁有醫士祖良左翁抄本幸存先君擕之漢中毎經更定命絅識之一統郡邑誌畧可徴云嗚呼道之無傳也久矣非道之無傳人心之不明也使人皆知之則聖賢可以無言安有所謂心法云也軻慕子思子思慕孔子得諸意象曰傳與授凡以理在人心者同爾絅兹藐焉去先生輙復二紀顧惟冲年蠢㝠犬馬賤齒荏苒四十使旦夕填委溝壑則百世之下鍾靈毓秀聞風興慕者往孰以傳來孰以據絅罪孰與辭哉乃相與求公之墓祠之謹再拜刻銘曰孰用非義卓彼西山孰悟非愚陋巷如顔忠兮必用湘水其先義兮必舉介阜胡然義賛太公賢歸尼父柅姤膏屯匪今伊古席珍罔傳渾璞罔售粤言與行厥迹可究乃迹孔嘉來孰釋女乃恩孔渥抑孰其所拜公斯名繹公斯號聲跡寥廓貽子至教維名伊何去階而天維教伊何乗波而淵不同者世繄同者心世遠心邇無絃有琴孰云夾谷而隐斯文山崩谷壊此墓常存亷頑昭藴庻格其神掃松祭菜嗟爾後人白沙先生墓表張詡天旋地轉今浙閩為天地之中然則我百粤其鄒魯與是故星臨雪應天道章矣哲人降生人事應矣於焉繼孔子絶學以開萬世道統之傳此豈人力也哉若吾師白沙先生蓋其人也先生以道徳顯天下天下人嚮慕之不敢名字焉共稱之曰白沙先生先生生而資禀絶人㓜覧經書嘅然有志於思齊間讀秦漢以來忠烈諸傳輙感激齎咨繼之以涕洟其嚮善蓋天性也壯從江右吳聘君康齋遊激厲奮起之功多矣未之有得也暨歸杜門獨掃一室日静坐其中雖家人罕見其靣如是者數年未之有得也於是迅掃夙習或浩歌長林或孤嘯絶島或弄艇投竿於溪涯海曲忘形骸捐耳目去心智久之然後有得焉於是自信自樂其為道也主静而見大蓋濓洛之學也由是致力遲遲至於二十餘年之久乃大悟廣大高明不離乎日用一真萬事本自圓成不假人力其為道也無動静内外大小精粗蓋孔子之學也濓洛之學非與孔子異也中庸曰誠者天之道也誠之者人之道也誠者誠之其理無二而天人相去則遠矣由是以無思無為之心舒而為無意必固我之用有弗行行無弗獲有弗感感無弗應不言而信不怒而威故病亟垂絶不以目而能書不以心而能詩天章雲漢而諧金石胡為其然也蓋其學聖賢也其功效絶倫也固宜或者以其不大用於世為可恨者是未知天也天生聖賢固命之以救人心也救人心非聖功莫能也聖功叵測其可以窮達限耶且治所以安生也身生而心死焉若弗生也吾於是乎知救人心之功大矣哉孟子曰禹稷顔回同道韓子曰孟子之功不在禹下此之謂也先生雖窮為匹夫道徳之風響天下天下人心濳移黙轉者衆矣譬諸草木一雨而萌芽者皆是草木蓋不知也其有功於世豈下於抑洪水驅猛獸哉若此者天也非人力也先生諱獻章字公甫別號石齋既老曰石翁吾粤古岡產也祖居都㑹先生始徙居白沙白沙者村名也天下因稱之其世系出處見門人李承箕銘湛雨狀者詳矣詡特以天人章應之大者表諸墓以明告我天下後世俾知道統之不絶天意之有在者蓋如此石翁陳先生墓誌銘李承箕先生身長玉立眼正黒色有光右臉有七黒子如斗為兒時讀孟子有天民者達可行於天下而後行之自誓曰為人必當如此二十年領鄉薦又七年從遊吳康齋聘君門聘君之學主敬窮理之學也先生退而家居一守其轍助之長失先放之忘失後而不得古人之所以好而樂之者也乃擲書而嘆曰古先賢聖其不可及矣乎於是習静端坐積以嵗月以我之所得者取正於古先賢聖格言始似各得其職者矣於是又優㳺停涵積以嵗月翳者去而明者來往者過而來者續冺然無支離糠粃之患怡然無内外動静之別洒然與萬物同其上下而不庸我矣先生之學厭據故迹故能超然自得有如此性至孝事母朝夕不離側後來廣東布政使彭公韶總督两廣軍務都御史朱公英交薦於朝至京師一造朝隐隐得疾而母亦有疾報至先生乃上䟽曰臣生五十又六年臣母七十有九臣母以貧賤早寡俯仰無聊殷憂成疾老而彌劇今臣遠客異鄉母憂日甚憂病相仍理難長久臣又以病軀憂母年未暮而氣則衰心有為而力不逮夫内無攻心之疾則外不見從事之難上有至仁之君則下必多曲成之士願乞終養䟽奏詔授翰林院檢討親終疾愈仍來供職遂以表謝而南歸矣蓋其所以得已與其所欲及人者非随世以就功名畸殘而補偏舉弊者也随世以就功名畸殘而補偏舉弊者殆秦漢以後自獻其身者之學非其志也先生不著書嘗曰六經之外散之諸家百子皆剰語也許魯齋謂湏焚却顧我何復云云性喜吟咏故其進退語黙之㡬無為自然之㫖悉發於詩此非示著書遺意乎予從先生十有三年凡四見也先生每云以已養心持身由微至著自得無待於外之要惺惺策之者不但一二而已也其故人有羅一峯倫者莊定山㫤者一峯改官修撰南京先生謂之曰子未可以去乎一峯即去之蓋其言説精明處義至到立人如已有如此先生諱獻章字公甫號石齋廣州新㑹人高祖判鄉曽祖東源祖永盛考琮早卒母林氏二十四年而寡居七十二年而受旌表九十一年而卒先生生於宣徳戊申十月二十一日搆疾於𢎞治戊午卒於庚申二月十日塟於圭峯左股深坑元配張氏子男二人景雲景陽張卒先生獨居十餘年繼娶羊城羅氏女無子銘曰虛以立本動而能神孰握其機孰闢其門凝而㴠之天飛淵淪不以我故何往非真我撮其迹抹摋譫諄用納𤣥原示委及顛大理寺副東嶠先生行狀李承箕吾兄資禀高生七月以筯畵灰上作土地两字見蒼蠅溺糞溷中以枝拯之人問之曰此其地也使其在盤盂則撻之矣方九嵗伯父酒豪公常坐之膝上謂之曰鄉人孔御史每愛誦衣紫腰金拜彩堂今騐矣兒能如是乎對曰富貴不滛貧賤樂男兒到此是豪雄兒愛此耳當是時年十四聞者異之稍長游邑庠先生長者見所行與言愛且敬之有喇嘛僧進貢經嘉魚數十人晝夜坐宿縣㕔勒索銀米縣官不敢誰何召諸生諭之喇嘛僧持刀梃亂擊諸生皆逸兄被執欲使跪其主僧兄曰以遠人而敢於侮王官托進貢而使公家有無益之費廪餼外勒要官錢違法固如是乎喇嘛僧懼即去之提學副使莆陽嚴公洤者性嚴刻議論好異試科巻文字披其巻曰楊文定公解學士不足多也欲使教諸司子弟兄曰不可吾不能以科舉文字為人師聞者不樂惡先儒註脚以為破裂聖經聞者皆嫉之矣其言曰夫詩書者吾道之迹而已矣必得知道者以為之師帥於是而授人以詩書則詩書於人庻乎其有益也使徒事詩書亦末焉耳古之時此學校也後世亦此學校也古之學者為已今之學者為人古之學者為君子今之學者為小人也豈學校之罪哉予觀近代以來害天下之人心者莫甚於學宮害天下之士習者莫甚於科舉率天下士類為惡而無所紀極者莫甚於學官必將天下學宮學官一切而廢去之惟天下之守令擇天下有道徳之人以為之於郡邑之内求老師宿儒而為之一鄉之善士則師其一鄉一國之善士則師其一國凡士子之所習者六徳六行六藝以立其本經書以擴其用而經書則惟原文而已至於力田畆及錢榖兵甲律令之屬而皆一一究極之而可施之實用焉守令各詣其所㑹之地卑躬盡禮而訪問之其道成徳就者則舉之夫舉而用不用則在執天下之政者之責也然士之道成徳就者用則行不用則藏之亦不可以在外者為欣戚也有司惟知舉賢才士惟知守道實惟相得之他非所計由郡邑而達之國由國而達之天下斯可矣年三十有七領鄉薦四十一嵗登進士西涯先生謂之曰子盍與錢與謙謁閣老徐先生乎兄對曰吾恐張師徳之見薄於王旦矣廷試榜出與謙及第兄列名同進士出身拜大理評事三年陞寺副憮然曰權不能救人之死生才不能識時之變正身不能應時之俯仰負此官矣其言曰尚世之達官理得而勢順勢順而事從官則易矣中世之達官迹狥而理窒理窒而事逆無怪其勢之難矣勢同而理同理逹而官易惟今時則然也評事之職古之士師也今之所伍諌官也刑可評也事可言也評事之職也今之刑罰也不中時事之得失亦多矣三年之淹亦何所為評事之難為也謂評事之難為若昌黎所謂丞之難為也夫心與事一則專二則雜專則成雜則敗理固然矣舉官者人也集事者官也官不負人人常負其官人負其官官則廢其事吾見亦多矣即以疾歸予嘗築釣臺於村庄黄公山至是兄奉母太孺人居之徜徉臺上或兄倡而弟和之或弟倡而兄和之歌以侑親觴家固貧窮甚每嵗貸食於人雖菜羮麥飯每絶乏了無悔意或勸之復仕曰予素無作官才非敢要譽以薄世也湖西義學十四世祖宗儒所建嵗久傾圮與族人修葺之將以教來學者又有六世祖墓見侵於蒲城隣封人予嘗告白沙陳先生先生曰必訟之官兄曰貧者自古無托心之助富者忽然有傾葢之知予不能忍訟之憲司而華亭韓公謂人家五世祖墓不該修曲歸我李氏予甚愧兄能先事覺㣲也辛酉之冬十月太孺人卒兄徒歩經營塟事冒寒多飢苦竟以枯羸不起為壬戌五月二十二日距其生年景㤗庚午才五十有三兄性逹見人有飢寒色多少盡與已之帯索啜水無毫髮後日計較也成化十四十五年湖廣既澇復旱餓死道路者相枕藉乃作為歌謡數十首當道聞之大發賑貸存活頗多二十三年及𢎞治元年大旱自貸邑人榖百餘斛以贍族人不能還既而其人適以輸嵗辦物料之京兄一一償之兄名承芳字茂卿别號東嶠居士十七世祖名璠自南唐時居嘉五世祖名名遠仕元為譯史曽祖名煥洪武間舉西蜀塩課大使祖善教諭叔珙咸以叙父官贈都察院右副都御史曽祖母熊氏祖母童氏俱贈太淑人父阜號鷗賔不仕以兄官贈大理評事母鄧氏封太孺人娶同邑古氏封孺人先七年卒子二人肇啟女三人曽思進周䕫袁褒婿也繼蕪湖嚴氏一子瑗以卒之年臘月塟兄於蒲圻烏石湖旁陳梅峯墓銘林俊正徳乙亥陳先生如賔書林墳成明年丙子得目眚哭母封太孺人張氏加疾謂山齋曰吉凶未可知吾生平所事見素所友執事又甚謂予曰畢竟如何予曰吾而兄也勉就藥以觀天意私叩其家無一新衣為之宻備甫畢氣絶十二月十有六日也是日天氣惨黒道路流歎弔者皆失聲先生無子予立其族子遠揚為後與松崖山齋治其䘮守馮君以棺來助越明年正月六日遠揚奉張及先生暨配贈孺人鄭氏以塟墳土未乾徳人先逝噫其如何士民具純行羣請之守帥言之廵按王君應鵬以聞禮部覆可蓋坊賜額表宅里進之鄉賢以祀月給米以䘏其家始先生以孝亷為吏部所知奏食學禄養母辭繼以布政使陳君珂薦上特嘉清苦月賜米三石資養又辭上温㫖諭受及是命三曠典也先生諱茂烈字時周陳為瑞安大川顯姓曽祖伯洪功陞興化衛總旗傅慶四又傳贈吉安府推官善祥為先生父父卒先生甫四十嵗家貧忍食以飽黄氏祖母讀書時夜分黄憫其羸諭止遂韜燈黙誦究心道學作省克録自考黄卒易所居資其餘直買山碧瀨以塟二䘮親負土石墳成間日一視久之三五日一視哭盡哀而還胡憲副榮重古行禮為子師㑹試道遇刼徙附之者幸在抵京如封付之附者請半先生曰某者去若者存何半太學試第一進士出使東廣盡却贐金脩禮陳白沙因領静一之誨退而與東沙論難知吉安持大體開至誠通以民彛之懿豪家利寡婦財誣許婚斷從守志夫制悍妻嫁有娠之妾既生子歸承其業族人争之騐與姊氏為類争者媿服時張守本以嚴擊强徐輔以寛當道尚深峻徐開解為霽信孚上下官有賢薦而民有去思郡志列在名宦考績歸至淮以乏寒具凍幾死所知覆以敝裘為救為監察御史袍服樸素借騎一牝馬身若無官而自係風紀之重尚書佀者子受賂崔者以道士起皆根植自固言者屢劾先生再劾佀去而崔猶留先生以母老乞終其養供母外短床敝席不辦一蚊帳身治畦一蒼頭給薪出則執小油蓋妻子服食麄糲一女適彭惠安孫輔嫁具凉薄皆人甚不堪而㤗然自足日坐斗室究極五經四書之㫖體騐心身随得随録嘗曰儒有向上工夫詩文特土苴耳孝廟上賔與予相對慟哭逆瑾亂政相對憂憤至羅織重罰以恣毒士夫先生曰某僅有死耳予起征藍先生杜門養静悟領深而充養熟隐𠂻粹行對天地質鬼神鄉國有懼先生知為愧予嘗評等物品黄憲管寧之右得在孔門可幾閔冉程朱高弟子無讓焉薦者謂亷約如石守道而養獨純孝行如徐仲車而所處尤困殆未足盡者予始識先生諸生韓洪洞問莆人物予曰從吾又問以先生對韓曰以莆再指一書生耶予曰是友自純家居相信尤深每晤言躁心息宿疾為頓愈先生亦惟予言獨契嗚呼由今其復斯人耶予既誌其壙又銘其墓其先生私耶張夀八十九先生夀五十八墓五竁封孺人蔣及余夀邱預焉銘曰化樞物冶陶靈範精光氣之㑹公得其清星爛日章後先輝映迨宋儒宗於斯焉盛公有正悟意往神趨静存動克一真自如搜竊記聞亦敏則有探幽索微𤣥象誰友世局斯下邪論崩湍始風聿還亦允斯觀眀文海巻四百四十
