body:
  text: 明文海卷四百四十一餘姚黄宗羲編墓文十三儒林故禮部左侍郎兼翰林院學士薛公墓誌銘彭時公諱瑄字徳温姓薛山西河津人曽祖常祖仲義父貞世以經學相傳為儒家仲義貞以公貴贈通議大夫大理寺卿祖妣某氏妣齊氏俱淑人洪武中貞教諭元氏齊淑人嘗夢一紫衣人前揖既而有娠遂生公祖仲義筮之吉曰此兒他日必有大過人者五六嵗目光如漆讀書日記千百言居母䘮朝夕哭奠如成人禮年十二随教諭公官滎陽監司得其所作詩賦大竒之因為延譽於衆同軰見其才敏詞工亦無不推高之者然志不以是自滿及聞魏范二先生自南方至皆明於理性之學招延於家日從講授得濓洛諸書讀之歎曰此道學正脉也自是用心益篤二先生相謂曰此子踐履篤實真畏友也永樂十七年随官鄢陵補本學増廣生明年應河南鄉試遂領解魁又明年登進士第時年三十三矣尋丁教諭公憂塟祭一循古禮不肉食者三年是時從㳺者衆公悉誨以理學踰五載赴京簡授雲南道監察御史監銀塲先是監銀塲者多致富公獨亷潔著名政暇手不釋巻精思妙契殆忘寢食至是所造益深矣正統元年以吏部尚書郭公薦授山東按察僉事提督學政公曰以規待人學之末也先榜諭學者俾由經以求道根理以為文山東士習為之一變未幾用楊文貞公薦遷大理寺少卿時内臣王振權傾中外或邀公往拜其門公曰安有受爵於朝謝恩私門耶拒不往一日遇諸途公弗為禮振不悦㑹有死獄實寃分辨之力都御史王文知振嗛公因誣劾公當以大辟公怡然曰辨寃獲咎雖死何憾在繫讀易不輟後得大臣申救乃罷官還家家居六年日以講授著述為事後學成就者多正統已巳秋起為大理丞時北兵犯京城公分守北門號令嚴肅總戎因訪策焉景㤗元年春師征叛苖益急公受命給軍餉既至見民供輸困敝曰敝中國以事荒徼豈良策耶即上䟽乞寛賦緩征不報乃歎曰民力竭矣吾忍重急之耶遂懇乞致仕有惜公去者力為調䕶乃召還明年陞南京大理寺卿有富豪多犯罪執法多貸之公至力抵於法衆稱快有薛公到來始斷絶之謡司寇楊公寧都憲張公純俱以才名相尚每曰如薛先生當於古人中求之非予所及也五年召還大理平反寃獄甚多蘇州民有飢乞粟富豪不與遂火其居者事聞命太子太保王文往騐之文悉論以謀叛并籍其家至京衆知其寃莫敢言公抗章辨之得不死者百餘人天順丁丑英廟復位進公禮部侍郎兼翰林院學士叅預機務尋命考㑹試士論服其公明自入内閣五月餘卓然欲以正道匡時政而武臣中有恃寵亂法者公策其人必敗乃懇乞致仕去至家四方從學者益衆公誨之不倦天順八年甲申六月十五日以疾卒庭有白氣上升人咸異之享年七十有六所著有讀書録御史箴解大理箴詩文集藏於家配寗氏贈淑人子男四溥淳濬治治為邑庠生與濬俱先卒孫男四祺甲申進士祐禮祜孫女五人公外和内剛言温而貌肅其為學與教人一以復性為要嘗曰吾日用間必體察何事是仁之發見何事是義之發見因其發見恒加實踐之功其語學者亦曰為學不知性之至不踐性之至是徒學也平生有得於此故其持已敬以亷其接人謙以恭其出處進退光明峻潔惟義是從而於貴賤貧富利害禍福有不暇顧也此其履道惇徳之實豈一時名公卿所可及哉公之塟進士祺奉公門人閻禹錫之狀來求銘銘曰世之誦公正直亷潔孰知其學體究真切蓋志欲探乎性理之淵源行必循乎聖賢之軌轍窮逹一心夷險一節斯其所以有異今人而無慙往哲我銘有徴後之人將不信其為當時之傑也歟廣東左布政使陳君墓志銘謝鐸成化丙午夏五月廣東左布政使臨海陳君士賢卒於江西之南昌南昌太史張先生廷祥以禮殮歸其䘮且抵予書將表其墓而俾為之志予執書為位哭明日吾友通政黄君世顯復以書俾其子戴來速銘嗚呼君天下士也其赫赫不可蓋者固不繫銘有無獨念君故知我者重以二公大義要責其奚敢辭初君之在廣東也權貴人有據市泊餘户假貢獻通私畨以毒民蠧國者君連三䟽抗折之遂誣罔君頼上聖明不即罪然卒從吏議將逮君詔嶽民老稚號泣遮道以從者動千億計有故吏張某嘗為君所黜至是權貴人鈎致之將并中君張顧廷䟽訟君寃君雖幸死道上然天下益以是壯君且信其得民之深有如此者而一時貪冐患得以傅成嶽者聞兹吏之風亦可以少愧矣始君之為御史也上方厲精開言路諸在言責者争拾苛細以自售君獨抗䟽請追復直言之士并斥大臣之將柄用者且曰君子小人之進退否泰關焉一時風采獨楊御史琅與之抗君子謂其憂治世而危明主也蓋如是雖其言不盡行然天下自是始畏公議而進者沮矣暨其出而提學南直𨽻河南也念學政久廢士之務浮棄實者比比而是所至必先使習小學而後及科舉之業學立齋舘至則居宿以身為教仍下冠昏祭議俾諸生習焉既至廣猶特刻道學傳以詔之蓋至今稱提學之善於其職者舍君亦無所與歸君歴官後先幾三十年服食居室無所増嘗呼其子謂曰吾藉祖宗慶官二品禄入之產汝何可獨享其分十之六為思遠莊以祀祖先周宗族其克已為義尤君子所難於是益足以見君平生之大節不誣矣於戯君天下之士也而止於斯吾安得不為天下惜哉君諱選别號充菴士賢其字也陳氏本宋國子司業左輔之後由婺徙台之仙居再徙而為臨海曽祖濬圭號鈍静祖泰生贈監察御史父諱員韜景㤗初仕至福建右布政嘗活沙尤盗之脅從者數萬人民至今徳焉母金累贈夫人繼母沈封夫人配王封孺人繼張氏子男四長藩次翼俱郡學生早卒次戴次某女二孫女一俱㓜戴將以某年某月某日塟君某山之原君學博而深於經詞章非其所好嘗從翰林檢討逸菴陳先生游先生深器之以禮經領景泰庚午鄉薦天順庚辰㑹試第一人歴御史按察四轉以至今官生宣徳已酉享年五十有八而已有丹崖集若干巻藏於家君性内剛外柔居常謙謙言若不出口至其臨大事决大疑則屹然萬夫之勇而卒莫之奪吾嘗求古節槩之士得一人曰君其陽道州乎遺州為諌議且七年始一論裴延齡陸贄事君為御史三年耳而愷切論諌急於其職乃若是道州為司業曰與諸生親宜其罔不率教者君徧歴徐揚冀豫之域而教澤所至亦無不及焉道州為刺史自以催科政拙不奉侏儒之貢君力障五嶺之民忤權奸以至於死於戲凡若是者君子謂視道州事難而功倍非耶君之行不止是輙敢取其大者以銘庻天下後世之欲知君者得以考焉銘曰深文傅比訐私拾細臺史法吏嵗課月論棄根掇芸提學校文國肥民瘠下損上益轉運方伯世方競趨我絶不窺世所不為我勇赴之於戯士賢而止於斯吾安得不為斯世而悲李大厓墓表王鏊楚之嘉魚有两李先生伯承芳字茂卿人稱東嶠先生仲承箕字世卿人稱大厓先生二人皆清修苦節好古力行鬱鬱抱竒氣不屑與世俛仰學皆不治章句必欲直探孔孟遺㫖成化間為庠生已厭科舉之學所司廹蹙不得已就試嵗丙午同占湖藩鄉書庚戌茂卿登進士授官大理世卿不肯㑹試時五嶺之南有陳公甫者號白沙先生以道學名重天下白沙之學不立文字教人端坐澄心優游停㴠久之渣滓消融神明内朗其學號簡易直㨗一時學者翕然趨向然亦或訾且議之大厓心獨喜其説往見白沙大喜曰吾與子神交久矣自嘉魚至新㑹渉江浮海水陸幾萬里君往見者四白沙與之登臨弔古賦詩染翰投壺飲酒終不及為學之方久之世卿曰箕得之矣凡學以言傳非真傳也其有目擊而道存者乎遂歸初世卿讀書山中作亭瞰水扁曰洗耳固已超然有混濁寰宇之意及歸自白沙日端坐一室洗滌身心不渉階級徑造本真或勸之著述曰近世箋註繁蕪郢書燕説鼎沸絲棼方欲一剗去之而更推波助瀾耶顧猶喜吟咏客至相與劇飲賦詩醉起書之劄草濡墨斜斜整整無不如意及為文章刮濯陳垢無起無止莫可端倪如山川出雲雷雨交至倐然雨霽天日清朗亦可謂竒偉傑特者矣久之茂卿自大理得謝歸二人日聚黄公之臺更唱迭酬伯仲之間自相師友家徒壁立罄縣家人告不足二人相視而笑曰吾道非耶壬戌五月茂卿卒己丑二月二十日君亦無疾而終春秋五十有四天下惜其學之不及顯也李之先自江西武寧來居嘉魚宋慶厯間有宗儀宗儒開義學於湖西之濵曽祖煥鹽課大使祖善珙縣學教諭考阜封大理評事配任氏亦甘貧苦節子男六教嚴整䖍改放整鄉貢進士女一歸鄉進士胡堯愷孫男八以正徳丁卯正月八日祔塟何公崙之原昔茂卿之塟君命教整自楚來吳屬予表其墓及是整與放復來請豈以余嘗窺其造詣之一二耶且二子遠來之意不可虛辱則為之表於暮曰人或曰白沙之學不事著述大厓之見於文與詩抑何多耶豈以是為非著述乎余曰道去言耶去行耶聞昔之君子有終日言而未嘗言者余何足以知之大厓之銘白沙曰虛以立本動而能神凝而㴠之天飛淵淪其殆以自見也夫其殆以自見也夫李子長暮銘霍韜甘學曰世道日下世利交征挾寸能片長者罔弗投合於時黜智守分篤志尚友於古者無幾抱真李子孔脩子長少從白沙游飄然鶴思不伍於世破廬薄產蔬食不繼未嘗作皺眉狀作詩冩字不履律於前自為一家或觀眺山水間歸而圖之見者争愛而酬之曰李子長畵云平居管寧㡌朱子深衣入夜不違近廿年足不越城閾惟攻周易城中兒童婦女皆稱曰子長先生云間出廬户則遠近環視以為竒物今年病卒無子學又曰惟孔脩有古之林逋魏野种放孺子雲卿之風誠皇明一代之高士於是憲使李子庸少參王崇教聞學之言皆高李子長之風遺貲以經治其塟謹按李孔脩子長行履世人稱述多過其實今摭其可傳信者如左李子長有庻母父没母改適民家誣訟子長没奪其產縣官繫鞫之子長無言抑廹之輸供操筆供曰母告委是情真縣官疑之為之覆鞫得其情乃知其賢禮敬之世人由是誚子長曰癡漢云李子長少年輸粮於縣官縣官異其容止詢姓名不答惟一拱手縣官叱曰何物百姓乃爾拱手耶呵之退又再拱手縣官怒笞之五竟無言以出白沙先生知之戯之詩曰如何义两手剛被縣官笞蓋實録云李子長少游白沙之門白沙先生抗節振世之志子長獨得真傳若東所張詡葵山謝祐皆於師門無玷云是故子長之詩曰月明海上開樽酒花影船頭落釣簔白沙先生亟稱之曰後廿年恐子長無此句云謝祐之詩曰活水引龍歸后洞古松棲鶴上高枝志嘉遯也又曰看花得意流連舞坐竹随隂次第移言自得也東所之詩曰人才似寳真堪惜宇宙如家合要扶全仁之量也孔脩於東所葵山為久要云或問於陳秉常庸曰子長廢人有諸秉常曰如子長誠廢則顔子誠愚蓋秉常與子長同師白沙故相知信如此君子以為知言後學霍韜不能加片言惟為之銘曰嗚呼子長去矣子長逖矣子長後世於何望古風子長古節子長逖矣子長後世於何臧古貌子長古心子長子長逖矣後世於何坊鄭敬齋墓表鄭善夫先生諱伉字孔明其先赤石魯氏七世祖正叔出姑子後遂為鄭氏居常山之象湖世濟其徳至先生而大先生吳康齋之高業弟子也風聞楚越之交蓋闖然游於萬仭者余生也晩不及挹先生之容近季子道者揖余於京師求表先生之墓因得睹行蹟聞風慨然樂為執鞭而恨不可得者先生三嵗聞父母哭而知哀五嵗誦故事十三讀易治舉子文理蔚然二十為博士及省試一再不合棄之曰顯親揚名恐不在是也乃走豊城拜於丁潜軒之門求踐履實學時年三十有幾矣廼復見康齋先生於崇仁康齋曰此間工夫非朝夕可得恐誤子遠來對曰此心放逸已久求先復之耳敢欲速乎因受小學日自騐之身心徐得聞四子六籍之文久之於道若有見焉乃歸築室龍池之上日取諸儒論議一切折𠂻於朱子凡古載籍鮮不讀但不讀佛老之書嘗謂其毁肢體滅人倫即不容誅又何待讀其書而後辨其謬哉一時名士若蘭谿章楓山開化吾文山南昌張東白皆與相可否所著有易義發明卦賛讀史管見觀理餘論哇鳴集凡數十萬言惜以燬盡其存者僅十之一云吾嘗聞康齋之學最强毅直致不屑屑於文字箋註約破碎而大同之卓然有六經註我之見誠所謂發章句之迷而立於獨者夫章句猶筌蹄然本以發迷欲學者既得而忘之也非為終身溺之而不究心於章句之外者也吾聞其執䘮極哀祠墓殯塟一本之家禮設義學立社倉事事皆著實地上作業要非所謂𤨏𤨏破碎者故自號曰敬齋又曰斷迷子蓋有得之康齋者矣然挾經濟之術三謁公卿而不一試豈所謂逆流退飛者耶古之君子知之則言言之則行聖人之心顧亦何嘗忘天下哉使假先生以年其用舍内外之辯必有分矣先生行履備見傳志此特其大者余故表之以詔後之尚友者楊黼墓誌李元陽楊黼太和蟠溪村人也素好學讀五經皆百遍訓誨鄉里子弟口不言人過尤好釋典口絶羶味工書善篆籀人勸其入庠校應舉必當有獲笑曰性命不理而理外物乎畢竟何用庭前有大桂樹縛板其上題曰桂樓日夕偃仰其中詠歌自得嘗以方言著竹枝詞數千首皆發眀無極之㫖每出遊遇林泉㑹意輙連留不能去然以父母在堂不欲遠離家雖貧躬耕數畆以為養親甘㫖但求親悦不願餘也一日聞蜀有無際大士悟道因辭親往訪之半途遇一老僧問曰何往曰欲訪無際老僧曰見無際不如見佛曰佛安在曰汝但囘遇著某色衣履者即是佛也遂囘數日無所遇暮夜至家叩門其母聞聲喜甚即披衾倒屣出户乃向來老僧所言佛狀也自此知父母是佛不用遠慕因竭力以事親不下桂樓註䟽孝經數萬餘言引證羣書極談性命編摩皆小古篆作字研滴既乾欲下取水研池已盈不知其故自是常然人以為孝感所致秃筆盈家作筆塜於西原以瘞之為銘以志示不忍棄也父母歿為傭以營塟塟畢入雞足山棲於羅漢壁之石窟十餘年夀既八十子孫迎歸一日沐浴令子孫拜吾明日午時行矣人見無恙不之信以為戱言時至誦倡而瞑家人哭泣既畢子孫親戚皆在柩前燈火熒熒見其自外而入大笑自稱名曰楊黼先生今日事纔了也家人驚呼曰爹囘來也遂不見蟠溪距城北約二十里城中親友及素所往來之家一時皆見其來言笑如平生而不知其已入棺一日矣李子曰昔邵康節先生將殯於伊川祖塋自洛陽舉䘮時司馬温公二程横渠四先生在送半塗棺墜蓋底空然無復有康節軀矣此理何居豈欲破世儒之執耶不然黄帝騎火龍上升堯攀龍舜冲舉非吾儒之祖宗乎予小子何足以識此竊因蟠溪先生而有感焉故為之立傳梁古谷先生墓誌銘崔銑予聞石翁陳子之學去支離之用全虛圓之神始乎靜終乎自然先生首與李伯温兄弟從之每退入山室静坐暇則考覧墳籍十年而學成翁舘先生於家俾訓其諸孫翁晩年居碧玉樓嘗與先生極論名理知其大有得也乃號先生曰見玉先生與嘉魚李世卿吳獻臣相厚善詩劄之遺無虛嵗餘無所與親李世卿者李承箕也攻古文養志不仕吳獻臣者吳廷舉也有經濟才劉瑾竊政時䟽論中使黷貨械首十曰不死釋之不屈交友有終未冠䘮親有聞平生無擔石儲晏如也語曰不知其人視其所事及所予先生弱體多病年十二母猶負之一日在褓中直其足將及地其父笑曰爾且與母長矣尚作嬌乎稍長好讀書母常滅燈令寢且戒勿宿火先生姑從之後復之舅家與儕讀焉父歿塟始有灰隔䘮尚哀素不用浮屠始用質明行祭祀性好吟詩不苦鍜削石翁贈詩曰得雨花畦潤随風鳥韻長公來詩不少排日两三章不嗜酒武人强引一杯酌之病两月而差先生名文冠字華卿廣東順徳人少號鶴山晩居古谷種梅録所為詩千篇櫝之號古谷老人正統辛酉生正徳辛未九月一日卒年七十有一壬申正月八日塟妻陳氏之子五人曰景復景行景孚景熈景倫側室之子二人曰景與景望女一人曰宜孫四人曰肇阜凖卞景行銑友也亷直有文為崇明知縣銘曰鼔樓之陽先生藏矣於萬斯年先生享矣陳紫峯志張岳正徳丁丑天下士羣試於禮部將掲曉易考官尹編修襄持一巻語總考大學士靳公以為造詣精深出舉業谿徑之外宜置首選公為反覆數遍曰信然必出陳白沙門下不然則蔡虛齋他人不能為此然竟以程式格之置次本經比拆號乃虛齋門下高第弟子紫峯陳先生琛也是時先生傳虛齋之學已有聲諸考官皆伏尹公為知人而先生聲譽一旦愈暴顯士大夫無貴賤小大稱學者必曰陳紫峯云釋褐後數月授刑部山西司主事以母老乞改南都得户部雲南司已復調考功吏部又以母老乞歸養戊子大臣有薦先生有用之學不宜在散地下詔徴用辭又一年即家拜貴州按察司僉事提督學校俄改江西皆力辭由是每有文學清署擬議用人必念及先生而知其必以親老辭竟不果用始虛齋先生以深微踐履之學教人及門之士率常數百人能得其言語者有矣未有得其精微或能并精微之意傳之者其於反躬履踐又未能如其所言至出處去就大節其能悉合於義無愧師門者益鮮矣先生資禀明邁閉門獨學不茍同於人時軰未甚識也虛齋一見其文字以為絶倫亟詣所舘屈行軰與為禮先生辭焉遂以師禮事虛齋其為學先得大㫖宏濶流轉初若不由階序而其工夫細宻意味悠長遠非一經專門之士所能企及其淵源承受之功不可誣也始入仕郎署刑户二曹人或疑先生儒者刑名財榖非其所長先生涖官勤謹夙夜弗少懈其在户部嘗督船稅淮安嚴水閘啟閉之禁以革私弊小舟舊不由閘從傍梁往來者悉弛其征人大稱便而漕院之撫淮安者微欲有所干撓先生移辨甚力曰正額不虧而多取贏以為功吾不忍為也其人愧屈考功居閑無事益得肆力於學問學者造門請業日踵至淺深高下各就所長告之皆有以自得也㑹上两宮徽號例得封贈先生曰吾持此歸足以慰吾母矣於是乞終養既歸足跡不入城府不通達貴人書問即所居旁闢一室朝夕偃仰其間静觀天地萬物消息之變以及世之興衰治亂世態之炎凉向背或逌然發笑或喟然太息先生不以告人人亦莫能測也其興趣所至時或縱行田野間與農夫野叟譚叙風俗舊故桑麻節候為樂發為詩歌往往自在脱灑超乎浮􅅽之外其論事是非得失侃侃不阿與人交藹然可親愈久而愈不可猒其出處大節及為人如此虚齋既沒所謂無愧師門者先生一人而已歸養若干年太夫人以夀考終先生年幾六十矣執䘮如禮後十一年先生亦終士大夫聞之識與不識咸為太息有司為祀於學宮嗚呼先生既有以自信無待於外則官資之久近崇卑事為大小俱不足言余獨記其督税一事者見儒者之用小試如此設不退而為親必進而有為於世其事功可勝述哉所著有四書易經淺説文集若干傳於學者先生字思獻紫峯其號先居在晉江青陽山於元延祐間始遷㴠江曽祖保祖福考體成皆有隐徳至先生貴乃贈考承徳郎南京吏部考功司主事母吳氏封太安人生成化丁酉十月十六日卒嘉靖乙已閏正月二十六日年六十九配王氏封安人鄉進士一曜先生宣妹一曜亦虛齋先生高第弟子子男三長敦履娶張氏次敦艮娶潘氏次敦豫娶曽太守仲魁女女二謝道夫柯華新其婿也孫男三長復次徠次未名女三敦履以公遺命將以戊申冬十月某日祔塟於秀林山承徳公兆酉山邜向先期來徴銘余與先生同年進士先生改官南部也余方為行人祖餞崇文門外先生臨别告曰北風雨雪之詩吾兄得無意乎余不能自决俄南廵事譁余繫杖瀕死以是有愧先生銘曰道宗先覺學異專門精詣洞觀貫於本原鐘鼎非豐菽水非貧求仁而得時哉屈伸一卧廿年衆望方殷天不憖哲遽爾乗雲涵江紫帽流峙髙深英爽飛沉千古來今體魄所藏山曰秀林父母在慈式慰孝心余認齋碑張岳公諱祐字子積別號認齋其先自歙之篁墩遷鄱陽清泥高祖浩又自清泥遷仙壇別為方山余氏而二族俱以繁衍曽祖企周祖泰福清知縣父瀾以公貴贈承徳郎南京刑部主事母吳氏贈安人公自㓜頴異始入小學即慨然有求道之志聞餘干胡敬齋先生居仁潜心踐履徒歩往師之先生一見謂其器可以遠到以女女焉公學問谿徑啟發於敬齋者最蚤成化丙午領鄉薦登𢎞治己未進士授南京刑部貴州司主事轉廣西司員外郎正徳戊辰勲臣有争襲者公嘗署其案忤逆璫劉瑾意落職瑾誅大臣以亷正執法薦起家知福州府愛人䘏獄事先大體不以耳目摘發為聪明鎮守内臣豪買市物不予之直乂以白金二百両强府令為市改機若干公入其金於帑民以不予直訴者十百為羣涕泣慰遣之將以狀聞於朝鎮守懼稍戢欲以事撓公公行素高媒孽竟無所得則謾為好言曰余知府好官但好官亦無庸慢我㑹遷山東按察司副使始觧丁父憂未上服除補山東整飭徐州兵備南京進貢内臣多挾商貨索夫馬價至數倍知州樊凖白公公命詰其私貨入之誣逮錦衣獄謫廣西南寧府同知稍遷韶州知府投劾去今上登極詔復副使陞河南按察使屢與撫按両院争可否平反寃獄按黜巨贓以數十當其據理以争辭氣侃侃聽者至不能堪乃因考察横中之其劾章有心慕乎古氣失之偏之語公聞之笑曰偏則有之慕古吾豈敢也坐調廣西按察使遷湖廣右布政使雲南左布政使以太僕卿召未行轉吏部右侍郎公自調廣西後公論益以明白當國者知公剛正可大用故三任皆未久而遷吏侍報至公已不及聞矣嘉靖戊子某月日也享年六十四公學務有用不事空言發端於敬齋而推其本原以為出於程朱故於程朱之書尤究心焉微言精義多所自得其言曰程朱教人拳拳以誠敬為入門學者豈必多言惟去其念慮之不誠不敬者使心地光明篤實邪僻詭譎之意勿留其間不患不至於古人矣其時公卿間有指主敬存養為朱子晩年定論者公摭朱子初年之説以折之謂其入門功夫非晩年乃定又輯朱子書之切治道者為經世大訓其論及文章辭翰者為游藝録見其學之備體用兼大小非近時所謂單傳妙訣者可擬也其篤如此蓋公進欲以其學施之天下退欲著書立言以垂後來不幸皆未及成就其餘緒之見於世者公不自以為至也好善嫉惡出於天性所交㳺皆賢士大夫而於莊渠魏公子才尤善人有過不能忍常靣斥之而退無後言有以其過攻之者欣然樂受人以是而重之推論當世正人必及公云先娶胡氏敬齋先生之女逾年而卒贈安人繼娶劉氏封安人子男三長烋次炵俱側室出次煥邑庠生女一適劉時澤孫男一圭曾孫男一公素清貧歿後無以為塟越十四年為辛丑六月壬申始克塟於縣治之東利陽鎮劉安人祔焉墓石未樹又三年為甲辰冬門人張某來撫江右乃叙公世系官閥與夫學術出處之闗世教者刻石墓道繫以銘曰學宗程朱如射之正一言以盡曰敬與誠前哲既遠異説震驚羣聽方瞶公心如醒剛明邁往期一廓清仁聲義色方矩直繩推以臨政物莫之攖公所獨持公所力争如有降監寧畏譏評滇海萬里少宰上卿甫命而仆視天懵懵番水上游欝欝佳城學術尚論千載作程臧君墓誌銘湛若水惟兹故禮部精膳司主事臧君賢徴應奎之墓其弟應璧以其友徳安推官韋賢尹庠生蔣審卿狀來請銘焉甘泉子曰嗚呼吾忍銘吾賢徴哉嗚呼吾忍不銘吾賢徴哉嗚呼斯道之在宇宙何其得之難而䘮之易也孔氏之門稱徳行者數人顔淵短命死冉伯牛則以疾死閔子騫不死則亦孤而不禄何耶豈所謂天之小人耶而當其時盗跖横行天下日殺不辜而幸老死豈所謂天之君子耶天之於善惡人其有意耶其無意耶余求志聖人之學者於天下僅百數人得其門者其在湖州自吾賢徴之外有若評事韋希尹商臣有若刑曹唐子正樞陳忠甫良謨其在廣之順徳則有若儀制主事張景川澯澯與應奎以諍禮跪門同死於杖商臣以言禮刑落職靖江丞正樞亦以論大獄禠職編管良謨雖不死亦病且去二年瀕死乃不死然則天之於善人何其恝然耶而世之人有生而積惡日惟不足以至公相而老死牖下又䝉身後之澤者何耶天果有意福之殺之耶其無意耶嗚呼若臧張二子者其偶自死耶其天死之耶天耶人耶然則吾之於吾賢徴其忍銘之哉若賢徴者其果可以死之耶韋子曰奎也少禀天聰丙子舉鄉薦丁丑成進士以父䘮去及授南車駕尋以庻祖母䘮求去例不得承重猶執私䘮三年以重所自出其孝如此可以死之乎蔣生曰賢徴之事親也吾嘗偕出焉歸不過期途不廢業曰家所程也母氏病痰憂形於色旁求名醫療必親焉前母之墓過必瞻拜悽然乃去可謂孝矣是未可死也又曰同泊邑城見旁郡之流民老稚過者傾粟與之不顧晨炊其仁如此可以死之乎韋子曰賢徴恭儉不踰見人之善惟恐不及色為騂然其恵宗族雖患難孤􅊔弗遺焉其賢固未可死之也蔣生曰賢徴之為車駕留都憤中官以進貢索多舡利私載則為裁抑遣卒譁焉則叱左右執之乃遁去勢力者謀造舟之利以糜金害民則出身拒而沮之其正直剛方若此顧可以死之乎又曰賢徴心地光明而義氣充實嘗過文廟廡下慨然歎曰吾軰歿亦當爼豆其間乎及官禮部學於甘泉先生得知行並進體認天理之説而惓惓於審卿之未聞也如其無死所至可量耶韋君曰賢徴聞先生之學曰吾欲終身得所宗執弟子禮而受學焉甘泉子曰嗚呼若賢徴者豈易得哉使假之年以其忠信不欺之心篤其志以往擴同體之仁而全歸焉且為天之孝子矣其可死之哉其可死之哉天之意固不得而知矣吾獨忍不銘賢徴也乎賢徴號損齋生𢎞治三年四月二十五日其不幸而死為嘉靖三年八月四日也世居吳興城曽大父和贈工科給事中大父瓛父維副千户贈如其官母黄氏封太安人妻嚴氏封安人嚴嘗割股和藥以療賢徴之疾云臨絶其從父太學生志觀視之索筆書云不當與弟應璧異居可以觀弟友矣子二人長繼英次繼藎女二人銘曰大道渾渾胡生之難而覺之難成之又難胡不永年以身隕捐胡然其人胡然其天亦已焉哉死而知性不亡者存李一清墓銘魏校君諱滄字一清姓李氏初號石泉後以彌文且近名遂去之世為金華永康人其先有諱遠者唐杭州刺史其子暘為叅軍破賊有功遂家於杭暘之孫徳明為永康始遷之祖曽祖諱秉良常代父詣獄而卒人稱其孝祖諱仁仲父諱鑑母蔣氏蘭溪楓山章先生嘗誌其墓君自㓜凝重不妄語笑常侍父母側承候起居如成人見者莫不歎異甫長即有志讀書事師唯謹年十四補邑庠生𢎞治戊午領鄉薦赴春官落第南還適父疾特延明醫湯藥必親嘗衣不觧帯者月餘及卒哀毁骨立塟奠悉凖文公家禮服除入太學時楓山先生為祭酒甚器之正徳戊辰登進士第奔母䘮哭至絶而復蘓者數四每以不得躬視湯藥殯殮忽忽如癡醉者两閲嵗遇忌日輙涕泣曰今雖欲盡孝敬不可得矣仲兄患足疾每自外歸必至寢前省視祁寒盛暑不廢家事無巨細必咨禀後行季兄澤蚤世遺孤友杜方在抱撫育教娶若已子卒以成立辛未冬服闋赴選除授南京工部營繕司主事工曹嵗造恒裒民財將以縁是乾沒事渉内府多宦寺参主之故積弊牢莫可破君涖官一以清慎勤自將夙夜奉公視官事不啻家事爬姦剔蠧毛髮不可干以私不為利勢回屈始而物情齟齬久之遂安以定今冡宰孫公為工部尚書雅知君凡有興作悉委之君條其材用徒庸卒减前費什之五六不忍糜國家一錢以重病民孫公甚敬信之儀真嵗運甓俵官民船附京師命君督其事君安靜識大體不為細苛民用不擾而吏亦無所容其姦事可便民則為指畫纎悉舟航往來及居民商賈之在儀真者無老稚賢愚咸頌其徳儀真當漕河衝置壩蓄水惟大潦廼啟閘洩之中貴人利舟便多决閘以行君以法守拒之動懾以威屹不為動懼而止者甚多或贈以文綺之屬君例堅辭不受中貴人亦雅聞君名不敢强平生有守皆此類踰年竣事而還復差司龍江抽分竹木厰君以疾辭時少宰石公署工部曰此非李主事不可必需其愈而遣之不得已起而視事藩府戚里有漏税者君追而治之不少假借雖在同事者亦憚其風采初乾清坤寧災至是勅取大木上供君視事如平日持法謹嚴而用意一本於仁恕不忍重𣙜商人財令價踴貴以病民頌聲播遠近冡宰陸公聞其名方欲擢置吏部以自助不意寢疾而卒實正徳十年七月十七日也享年四十有七病革時顧謂其所親曰吾死慎勿湏材於公家為吾平生之累及卒無以為殮妻徐氏盡鬻其裝始克歸柩賢士大夫相與弔於朝行旅之人故有徳於君相與哭於野門生耆老之在鄉者相與白於有司為立里門以旌之表曰清修吉士蓋君之積誠動人也友人蜀王教以詩哭之云傷心病革買棺言千古同符易簀論識者以為名言子男彬臣謄尹氏所出尚㓜以卒之明年月日卜塟於露里祖塋之傍去家二里而近一清資質近道好義樂善不啻饑渇之於飲食遊太學聞楓山論學慨然有求道之志及官南都日以親賢講學為事欿然自視若愚退食自公輙閉門不出潜心六經語孟及程朱文字而求窮理修身之方凡異端之説及近世詞章功利之習不以一毫經心嘗曰人之為學當從人倫日用上實下功夫庻幾歩歩著實不為空言金華之學始於成公而何王金許其傳出於考亭高弟黄文肅公君守其鄉學甚至未嘗議及前軰短長尤尊信文公按其成説佩而行之一字不敢易余嘗曉之曰文公晩年論學及觧經要議雖聖人復起不能易也乃若小小文義程朱已不盡同不可深泥也一清曰不然吾軰學未見道今日正當不信已而信先儒之言庻幾求之而可得先儒論或有未定者吾且闕所疑可也余深以為然於戲一清質魯志確以其近道之資而又學不畔道蓋踐履多於講明可謂平正篤實者矣天假之年則其所造非余所得以知而不幸齎志而沒不亦重可哀耶昔大道既隐漢儒秪以訓詁明經而釋教流入中國久微程朱則聖學其遂無傳矣今天下家誦程朱之書而六經燦然明世然世降浸薄士往往務空言而闕於實行學益支離好高者復竊禪語而託於經傳謂可一蹴入孔室而輕訶宋儒號空而不踐實噫弊也久矣若吾一清以躬行為學而足履實地者安可得耶余不幸生於絶學之後方欲求助於人以進此道得友如一清而又一旦化去踽踽凉凉獨學無助則所哀者豈直朋舊之情而已耶因誌其墓而銘之銘曰昔在孔門曾以魯得確哉李君學以魯入垂絶有言事符易簀後欲識君視此石刻損益大意一昌黎墓誌學史記列傳體而太史公尚矣列傳若為一人作而當時天下事皆備見其體甚大今一清官卑國家事闗係亦多亦宜叙見一二然亦不必煩一表厥宅里漢人君子鄉高陽里猶有遺意與今之以官爵甲第立坊者異矣永康此舉可振頽俗法宜得書今但云立里門以旌之傷於畧當増表曰清修吉士一文公作曹立之墓表未嘗深闢陸學而象山之徒已譁然不平今門户太高黨事將起憂其將害蒼生但實修吾學是真難滅是假易除吾學果大成將不大聲色而自定矣奈何以口舌與争激成其勢况風人之義貴於微婉使言之者無罪而聞之者足以戒庻得性情之正今直云近時一種便儇激勵之資空虛恠僻之論異説蜂起程朱之書又將為天下大禁余為此懼而力不足以震之則幾於罵矣且彼正因厭俗學支離故喜禪學之㨗徑而䧟溺多世之高明之士今捨却俗學一邉專攻彼一邉一失語意亦欠平正而未足服其心也今畧改云云庻幾不偏乂意蓄而不甚露因稱一清起此議論非欲謫彼且亦足以為諷而不至激其怒也明文海巻四百四十一
