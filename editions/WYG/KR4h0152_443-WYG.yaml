body:
  text: 明文海巻四百四十三餘姚黄宗羲編墓文十五儒林泰州王心齋先生墓誌銘趙貞吉明興八葉之世越中王先生論學名世從游若㤗州王子稱最者王子名艮字汝止少先生十一嵗先生歿王子論學如先生故學者亦稱王先生先生㤗州安豐塲人先自姑蘓徙居四代祖仲仁為塲百夫長生文貴文貴生公美公美生處士艮配湯氏成化十九年六月十六日生先生於安豊里先生生有珠在手左一右二隆顙修臞安豐俗負鹽無宿學者先生逮粗識論語孝經章句即邈焉希如古賢人信口談觧如或啟之塾師無敢難者一日天甚寒至親所親方急務盥冷水廼痛哭曰艮為人子令親天寒盥冷水而不知也尚得為人乎自此遂出代親役入掃舍捧席哺二老晨省夜問如古禮唯謹時年二十矣先生孝出天成久益行純心明悟性無礙於是秉禮為儒者以經徴悟以悟釋經行即悟處悟即行處如此有年人未識也嘗一夕夢天墜壓身萬人奔號求救先生身托天起見日月列宿失序又手自整布如故萬人歡舞拜謝醒則汗溢如雨頓覺心量洞明天地萬物一體自此行住語黙皆在覺中題其座曰正徳六年間居仁三月半即先生悟入之始已能如此是時越中王先生自龍塲謫歸與學者盛論孔門求仁知行合一泥者方讐争之至十四年王先生廵撫江西又極論良知自性本體内足大江之南學者翕然從信而先生顧奉親鶉居皆末及聞也有黄塾師者江西人也聞先生論詫曰此絶類王廵撫公之談學也先生喜曰有是哉雖然王公論良知艮談格物如其同也是天以王公與天下後世也如其異也是天以艮與王公也其自信如此即日往造江西蓋越两月而先生再詣豫章城卒稱王公先覺者退就弟子間出格物論王先生曰待君他日自明之久之從先生居越歎曰風之未遠也是艮之罪也辭還家駕小蒲車二僕自随比行所至化導人聳人聽觀無慮千百皆飽義感動未至都下先一夕有老叟夢黄龍無首行雨至崇文門變為人立晨起往候而先生實應之先生風格既高古所為又卓犖如此同志相顧愕然共匿車勸其止之先生留一月竟諧衆心而返然先生意終遠矣越五年戊子王先生卒於師先生迎哭於桐廬經紀其家而還開門授徒遠近皆至先生剛骨氣和性靈澄徹音咳盼顧使人意消即學者意識稍踈漏不敢正以視先生引接人無問𨽻僕皆令有省雖顯貴至悍戾不悦者聞先生言皆對衆悔謝不及往往見人眉睫即知其心别及他事以破本疑機應響疾精藴畢露廓披聖途使人速進蓋先生之學以悟性為宗以格物為要以孝弟為實以太虚為宅以古今為旦暮以明啟後學為重任以九二見龍為正位以孔氏為家法可謂契聖歸真生知之亞者也獨不喜著述或酬應之作皆令門人兒子把筆口舌授之能導其意所欲言而止晚作格物要㫖求仁方諸篇或百世不可易也卒配越中為二王云或問先生何不仕曰吾無往而不與二三子是艮之仕也或謂先生為隠曰吾無往而不與二三子艮何敢隠也兩救海濵之荒活千萬人洪鄉史垣構舍居其徒呉御史悌抗疏薦之不報某年某月日卒於正寢配湯氏生五子以某月日葬於某里先生門人貴溪徐子直氏道州周季翰氏謂予之向往甚勤先生之念予亦切義當誌其墓中之石辭不獲遂强作銘曰越中良知淮北格物如車兩輪實貫一轂後有作者來登此車無以未覺而空著書明文海巻四百四十三
