body:
  text: 明文海卷四百四十六餘姚黄宗羲編墓文十八儒林劉靜之墓銘高攀龍孔子曰三軍可奪帥也匹夫不可奪志也故曰隠居以求其志孟氏亦曰士之事在尚志故士平居辨途慎術擇乎中庸及乎得善固執之死矢靡他焉即功業文章不少槩見於天下天下信之以其身卜世之安危豈非篤仁義誠之不可掩者哉萬厯壬子五月七日劉靜之卒於家靜之官未列大夫年不及强仕海内士咨嗟痛悼以為國家失其柱石人倫失其冠冕此何以故嗟乎此所謂誠不可掩者也靜之名永澄别號練江靜之其字也世為揚之寳應人大父徳齋公曰憲父春宇公曰繼善司訓鎮江母曰王氏靜之生有至性八嵗誦文信國正氣歌衣帶賛即立信國位朝夕謁拜人以此見其志矣十四補諸生十九舉賢書同年中召靜之飲酒有娼佐觴靜之即謝不二十而娶家貧不能具新衣王孺人力經營之靜之曰休矣吾意中自新不必衣也戊戌下第築土室自鍵并晝夜讀乂善病室中書籖藥裹外無一長物辛丑成進士選讀中秘書為有力者所奪人為不平靜之無幾微見顔色以善病告授順天教授慨然曰師失其道乆矣進諸生相期勉以聖人之學嚴程課飭行檢伸寃抑懲汙濁審勤惰寒者衣之饑者食之羔雉之贄不及於門北方學者稱淮南夫子而靜之益考求國家典章名臣言行六曹之職九邊之要兵農錢榖之數矻矻如居土室時巳遷國子學正權要為子弟居閒一切格不行㑹雷震郊壇有詔令禮部具修省事靜之曰災異求直言自漢唐宋及我祖宗未有改也萬安劉吉時惡人言災異鄒汝愚一疏炳烈千古今者一切報罷塞諤諤之門務容容之福傳之史册尚謂朝廷有人乎當事者為靜之座師亟言之不省亡何楚宗獄妖書獄及京察事繼起靜之具疏陳得失而司訓公適至京不果上靜之作甲乙襍志邸中襍記又為歸徳相國所器重咨對出處之道時人愈側目滿三載不遷靜之曰昔陽城為國子師斥諸生三年不省親者京兆李諤乆不歸省李皋謂無親之子不可與事君吾歸矣遂歸杜門讀書三年而司訓公王孺人俱未艾健飯㑹皇太后覃恩人謂靜之奈何不以一命賁兩尊人靜之乃至京候命而王孺人訃矣靜之力行喪禮墨面柴骨三年苫塊外寢壬子春補職方主事未赴卒靜之質甚弱獨目烱烱然英采逼人善談論其於古今治亂人才短長如指之掌嘗曰某當某時有某事惜放過彼寧知千載而下有劉靜之者指其空缺處然吾軰在今日寧知千載而下無劉靜之者指其空缺處乎而靜之内行純備孝事其父母及大父母訓廸子弟出於至誠每謂子弟不類非盡子弟過父兄鑪錘不具火力不足不能使入鎔鑄中也嘗書薛西原語於座右云雖小事不可囑托自損亷心故竿牘不及郡邑大夫至伸人寃抑援人疾苦不啻若身受毒螫者以呼吸間去之為快靜之即尸居蠖伏乎其神常周六合以内於世道民生所闗下至閭閻情偽江海盗賊咨諏詢度無不得其要領世固不乏修身潔行士也然飭治象貌不為世訾詬而巳至神理血脉與斯人之徒通洽無二者視靜之何如哉靜之官不過七品其志以為天下事莫非吾事若何而聖賢吾君若何而聖賢吾相若何而聖賢吾百司庻職斯道一日行於天下即死可不恨生不過三十年其志以為千古事莫非吾事生前吾者若何揚掲之生當吾者若何左右之生後吾者若何矜式之斯道一日不明於天下即死有餘責其所謂道何道也正人心息邪說距詖行使天下曉然知君君臣臣父父子子天理民彛自不容巳匪是者即入無父無君之途下弑父弑君之種衰世此道不明務黨人之媮樂誤皇輿之敗績蓋千古一轍也故靜之註離騷於此三致意焉推此志也百世以俟聖人可矣靜之得年三十有七配韓孺人弟永沁子心學山隂劉起東按國論私諡曰貞修先生長洲文文起摭遺事為貞修狀攀龍知靜之深矣得文起文為誌其大者人言靜之成進士三年郡學三年國學三年洗沐三年宅憂世曽不能用其萬分之一余謂靜之所為靜之不以用不用也銘曰自昔聖賢與時衰盛盛時所駕衰世所屏浩蕩乾坤不容何病川泳巖逰理情繕性明吾之是不與世競吁嗟靜之天之所命憫此道微以是亂正俾示正見為千秋鏡世所取正是謂為政有如不信上視孔孟明文海巻四百四十六
