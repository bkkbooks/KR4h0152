body:
  text: 明文海巻四百五十餘姚黄宗羲編墓文二十二名臣故太子太保吏部尚書贈特進光禄大夫太保諡忠肅王公神道碑銘彭時公諱翶字元臯姓王氏其先世家灤州自公之父避元季兵亂徙居滄州之鹽山故今為鹽山人公生有異徴氣清質秀甫十嵗能讀書父即勉以仕進克自勤勵學遂有成永樂乙未登陳循榜進士二甲第一名改庶吉士甲辰授大理寺左寺正因詿誤左遷行人司行人宣德丙午用廬陵楊文貞公荐陞行在山東道監察御史當是時任風紀者多事矯激惟公謹重逹大體上下賢之乙夘陞都察院右僉都御史正統丙辰奉勅鎮守江西政不苛刻吏民畏愛未幾往浙江除土豪理鹽法能聲大著己未四川松潘番賊為患命將往征以公參賛軍務公欲懐以㤙信有來降者即以所賜白金寳楮易牛酒犒之畨酋商巴感悦率生畨來歸受約束者一十八寨邉境以寧辛酉出鎮陜西飭兵備壬戌往遼東提督軍務時遼東守將屢失機朝廷以為憂特簡任公且授以便宜之權公至守將以下庭參公詰責玩寇失機故將斬之再三哀請乃己於是官軍咸股慄莫敢不用命逾月躬出廵邉治障塞嚴斥堠仍簡閲戍卒更老弱賑貧窮配鰥寡俾成室家人人感激其治訴訟専行贖罪法雖人命亦然曰償命無益死者之家而財或足以濟用故行之不疑有指揮孫璟者因漏闗鞭戍卒至死其妻女哭之相繼死他卒被鞭者訴璟殺一家三人公判曰甲死以罪妻女死於夫非殺也其令璟償塟埋費璟後為將有名非公優容不及此癸亥陞左副都御史丁夘率師出境破敵有功陞右都御史己巳陞左都御史是年秋西邊額森分衆寇廣寧公下令堅壁清野以困之敵乃遁去公在遼東十數年勤訓練廣儲蓄食足兵彊為諸邉最其㧞用將校如施聚焦禮輩皆以勇略知名亦非他邉所有也綏懐東陲女直恩威兩盡往來朝貢者無不惕威而感徳景泰壬申召理都察院事尋加太子太保㑹廣東西賊寇擾攘兩鎮將官互相觀望不即捕朝廷命公總督兩廣軍務公至推誠撫諭蠻夷向化思恩知府岑瑛土官也屢有勞効或疑其反側公令瑛領兵屯桂林聽調人言乃息其他土官有争職者公度勢量情予奪得宜人心帖服癸酉少傅王文端公以清徳雅望居吏部年且老矣朝廷思得剛明果斷者以濟之乃召公還命以太子太保兼吏部尚書士夫以得人相慶乙亥公年踰七十乞致仕不允己而乞歸展省又不允命有司為公起第于縣郭西盖以慰其心也公掌銓衡孑孑持公道進退人才必察其實而於抑僥倖杜請托尢嚴選法為之一清天順乙丑英廟復位罷舊官僚公上䟽乞致仕南陽李文逹公言於上曰王某亷謹老成吏部非此人不可乃不聽其去任用益篤己而文逹被䜛黜公力言其淳實可用以故文逹復被寵任焉當是時上眷遇公加隆特官其子國子生竚為錦衣衛副千戸而賞賚以金玉東帶錦綉衣服銀幣玩器等物嵗無虚月屢召與近臣同遊西苑南城及扈從獵近郊燕賜優渥一時擢用廷臣惟公言是聽有出他人荐者亦必待公而後决每召見便殿訪問從容呼以老王而不名其見敬禮如此辛已秋加太子太保甲申今上嗣位賜銀五十兩鈔五千緡是冬命遇雨雪免朝參乙酉春復加太子太保公年雖髙精力如少壯人然無嵗不引年致仕且䝉優詞褒答勉留不果行丁亥公有疾上命中貴挾御醫往視并致白粲上尊之賜七月疾益篤請益懇切上不得巳允之居數日遣中貴齎賜勅諭并金織衣一襲銀三十兩鈔三千緡時己不能就道至十一月六日卒于京邸距其生洪武甲子二月十一日享年八十有四上聞訃嗟悼贈特進光禄大夫太保諡忠肅遣官諭祭營墳給驛送柩還其鄉以卒之明年某月某日塟于某原曽祖進昌祖大老父得林俱贈榮禄大夫太子太保吏部尚書曽祖妣徐祖妣劉妣張俱夫人配宋氏先公二十三年卒累贈夫人次張氏亦先卒子男一即竚也女一適河南參政賈傑孫男二長田次疄國子生孫女二曽孫男女二公天資仁厚操履端方居官涖政謹繩墨蹈規矩一毫不茍待人外若嚴毅而中實寛和好惡所加善者悦而惡者不怨論事語簡而質是是非非確乎不易持己亷潔無私而自奉甚儉薄自初仕勤勞於外與晩處廟堂皆然未嘗以壯老異心忠君愛國之誠愈篤不懈真厚德君子也盖無愧于古之大臣矣大宗伯姚公狀公行詳且實矣公子竚欲列石于神道請予文之予素敬重公茍可以焯徳信後義奚容辭銘曰有美王氏世居于灤積善秉義隠處是安避兵鹽山遂定厥家再傳而顯掲徳振華其振伊何自公特起降誕之祥虹光兆異乃勵儒業乃第科名荐歴顯位駿望鏗鍧公出四方憲度肅清弊革利興兵民攸服其在中朝恪秉銓衡賢才彚進治道乃成公何能然惟道之進惟公惟亷惟勤惟慎公以接物繩直凖平亷以律巳玉潔冰清勤以涖事夜寢夙興慎以存心晨惕夕兢祇事五朝始終若一為國元老為士矜式官躋一品夀踰八旬推今較古如公幾人公今往矣疇不嗟悼匪私于公惟徳是好渤海故郡髙墳峩峩於乎忠肅千古不磨奉天翊衛推誠宣力守正文臣特進光禄大夫柱國靖逺伯王公墓誌銘彭時公諱驥字尚徳姓王氏其先太原人自秦漢以來為將相者踵接蟬聫族逺而分世次莫可考後有宦逰雲中者因家宣寧即公所自出也曽祖守道克世儒業祖思宗仕元保定髙陽尹父成以宦家子留居于束鹿吕村里入國朝遂占籍焉成以讀書力農為務里鉅族程子晉見而賢之妻以愛女是為公之母夫人也公生而岐嶷警敏年十三遊邑庠刻志問學日記數千言識者咸以逺大期之永樂丙戌登進士第拜兵科給事中剛正敢言嘗奉命出鎮山西奏蠲徐溝鹽池虧課二十餘萬民困以蘇尋陞山西按察副使理寃獄戢奸盜風紀肅清入為順天府尹弛張得宜畿内稱治宣德丁未陞行在兵部右侍郎越九載遷尚書練逹兵政得大臣體正統丁巳西邊阿爾台多爾濟巴勒數寇邉甘凉數州驚擾尤甚朝廷患之命公西廵許以便宜從事公至稽閲邉備知守將法弛而令不嚴嘆曰如此而欲敵無侵凌難矣翊日集衆轅門詢平日畏敵而不畏將者得都指揮安敬即斬以徇曰自今畏縮者視此一軍震慄失色簡閲戍兵以甘州戍兵冗濫乃定為去留使相更代於是兵得休息民減轉輸之勞敵嘗入莊浪公遣兵授以方略使擊敗之敵乃引去及公還敵復窺邉公馳赴甘肅遣副將蔣貴率精騎出擊戒曰勉之去而不能成功無相見也貴感奮追敗其衆於石城兒臬公計敵勢猖獗不一大㨵刈無以示威既諜知敵巢穴所在復以貴為先鋒擣之自牽驍騎與都督任禮等分道而刻期夾攻轉戰二千餘里俘男女二千餘口敵首走死西陲以寧捷聞上遣中貴勞以金幣命兼大理寺卿支二俸明年還京辛酉雲南麓川宣慰思任發叛亂擾邉命公總督諸軍征之陛辭賜金兠鍪細鎧弓矢蟒龍緋袍以寵其行公至雲南方盛暑衆謂進兵非宜公曰賊毒吾民行可緩乎敢言不進者斬遂部分諸軍以進至金齒分為三道徑抵上江上江者賊砦所在也夾攻三日不下㑹天大風公命縱火焚栅因督衆乘勢力戰斬首五萬餘級賊敗走保險為拒公益麾兵深入破連環七砦于沙木籠山又破象陣于馬鞍山之隂死者十餘萬賊首潛遁乃振旅而還先是維摩州賊韋郎羅僣稱廣新王命公還師勦之至是公還雲南計曰此不足以血吾刃當以謀破之乃遣偏師抵其境聲言王尚書大將軍至矣賊黨聞而潰韋賊計窮遁安南傳檄追之安南懼斬其首并妻子來獻廣南與富州接境二土官交惡十餘年公諭以禍福兩讎乃釋凱旋上遣官迎勞數百里外廷見宴賜甚厚特封靖逺伯食禄千二百石號推誠宣力文臣階特進榮禄大夫勲柱國賜誥劵追封三代如其爵未幾聞麓思任發羈于緬甸復以公督軍往取之既至緬人懐詐黨惡而不遣公縱兵攻緬緬破而麓賊遁去俘其妻子象馬而還加禄三百石是年春西廵寧夏甘凉申飭邉備訓練士卒其於守戰攻擊俱有方法西人聞風畏避不敢近塞戊辰春賊孽思機發復據孟養跳梁公復督兵往征兵抵金沙江賊栅西岸以拒公作浮梁渡兵一鼓破之賊退立三栅自保公督戰益急不日而三栅㧞賊孽殱焉西南自是悉平有苖蠻富者偽稱剗平王别將屢征失利命公掛平蠻將軍印總兵致討卒檻送京師餘黨悉降公還詔増禄百石令世其爵景泰初以南京根本重地委公鎮守公嚴立禁條宿弊一清不便者撼以流言乃解機務就閑天順元年春上復臨朝召公便殿慰諭以勲舊命兼兵部尚書不數月軍政修明賜金織蟒龍衣二襲尋以年邁請解部事從之特免常朝賜誥加封奉天翊衛推誠宣力守正文臣特進光禄大夫勲爵世襲如舊而寵遇益加隆焉天順四年五月十一日終于正寢享年八十有三訃聞上嗟悼輟視朝一日追封靖逺侯諡忠敏公初娶張氏生二子曰玉曰瑢俱早卒繼娶劉氏子二人長曰瑺廕襲次曰珩勲衛義子曰祥以征南功授錦衣衛指揮僉事孫男三人女四人諸子扶柩歸束鹿以是年七月某日塟于邑之平原祖塋禮也公天資沉毅識量宏偉有文武長才遇事剛果剸煩治劇不以為難行師征討用法嚴明而料敵制勝雖老于軍旅者有不及故所至即能成功及其晩節保身全名守以謐虚而忠愛之心始終如一誠一代之偉人也然所稟猶異年雖髙邁精力踰於少壯疾且亟神猶不亂遺言托冡宰王公狀行而以墓志屬時時謭才穉筆曷足以公不朽公既有命庸可固辭銘曰天佑皇明輔以忠良修文立武咸展厥長於惟王公挺生兾土川岳孕靈才兼文武早遊藝苑被服書詩乃登黄甲給事鎻闈流譽飛英踐敭中外爰陟司馬式儀有位雍容殿陛正笏埀紳手提樞軸潜斡化均視師三邉程勇戒怯兵將力齊敵聞震疊其有狼噬輙稱以兵䤋强俘弱西北用寧蠢爾逺夷敢為民毒帝師命征惟公總督建牙秉鉞令一而嚴兵威逺震如火斯炎挫鋭摧堅勢同拉朽止弗窮追懐以仁厚彼昏不知伺間竊發公而再往根株悉㧞和風甘雨妖曀廓清西南萬里同我太平惟帝念功官賞是懋列爵䟽封寵延先後入文出武邈乎無倫名照宇宙允為元臣天不憗遺而遽不起山頽梁傾朝野哀止爰稽德烈著于幽堂於千百世赫其有光南京工部侍郎黄公墓誌銘謝鐸𢎞治辛亥夏六月十有七日南京工部右侍郎黄公卒公得疾甚暴予亟往視至中途公訃已至於乎痛哉先是予蒙恩休致公悵然不樂且期太常陳先生師召邀予徧遊南都諸名山以别盖予自謝病來與公别者十餘年乃今始得一㑹詎意公方恨予之别而予遽以哭公也哉公卒之明日予既三往三哭之乃與其子俌商塟事遂謀所以銘公之墓不得以不能解於乎公其止是哉公諱矅字孔昭後以字行更字世顯别號定軒姓黄氏其先昭武鎮都監緒避五代之亂徙居黄巖洞山山今分屬太平公以其地隘不能容始再遷舊邑之西而定居焉曽祖與庄不仕鄉稱長者祖諱禮遐號松塢性稱介鄉人服其行義無異詞以公貴贈南京工部右侍郎父諱彦俊以正統丙辰進士擢兵部職方主事其操其才人猶至今稱之累贈右通政南京工部右侍郎母金氏累贈淑人公自幼頴㧞屹然如成人未弱冠職方公即世扶櫬歸塟撫其弟妹益篤初以明經舉不合乃退而為縣學生刻苦問學公辱與予友予少且劣日追之日見不可及未幾領丙子鄉薦登庚辰進士第擢工部屯田主事屯田號濁曹公稍持以正顧為其僚所怨嗾惡吏誣毁之公雖不之較然彼竟坐是落職而公之舉亦因以起尋遷都水員外郎調吏部文選郎中在職守法據例不示恩不賣直凡所舉錯不獨人莫之不干雖同事亦或以公為辭而若有所憚每公退輙過予予望而見其喜則知賢者之進見其憂則知小人之不得退如是者盖十有五年終始一節不少變後先在文選者卒驟遷輙敗至或并累其上之人為天下笑公循循滿考始擢右通政乂五年乃遷今職公既去吏部乆人益思之大冡宰王公兩以公與今亞卿彭公鳯儀張公時敏薦不得果然物論在人駸駸未己要皆以鈞衡望公也於乎詎其謂公而遽止是哉公生宣徳戊申迄今享年六十有四而己配蔡淑人巴東知縣思之女子男三長即俌次侹嘗聘予女俱夭次佐亦夭孫男五紹繹綰約紒俌以辛丑進士為工部主事實克公吾台父子祖孫相繼登進士第者亦惟公而己公讀書不事章句往往能窮前人所未至精思之餘下筆沛然而尤長於詩與吾叔殳王城山人慨詩道中絶將力振之有定軒集若干卷藏于家性恬静寡嗜好平生無所茍取而亦不以一毫茍費雖官至三品居室服食無所増惟事闗倫理則惓惓每欲自盡以舊宅之直讓其弟以餘俸之金周其甥乂嘗謂予吾族貧甚且不知學先職方有田若干吾將以是終先人之志立義塾焉乃嵗出束修若干為之兆初公為主事時憤慈懿太后山陵事輙草疏數百言示予將上之㑹事定乃己未幾為㑹試同考有權要子暮夜來謁公叱之去終其身不與語今年春大臣復以例當舉官公舉金華章德懋於是徳懋謝病而歸者幾二十年天下皆知其賢而卒莫之能舉凡此皆足以見公之大者盖公晩嵗雖寛厚有容與世無忤而剛直之氣人固有莫得而測之者予交公乆知公最深因為之銘銘曰豐而譽困而遂不矯以躓盱以覬安吾常以聴其至吁嗟乎我銘不愧尚後之人以考徳論世吏部侍郎贈禮部尚書諡文懿楊公神道碑銘王㒜憲宗皇帝臨御之日遴選文學侍從之臣既自擢用之而尤簡其質重才良博雅有道術者兼任東宫官職俾之日侍儲君以講明義理輔成徳性以期他日嗣守太平之業其寄任之専責望之重謂非賢不可也古人有言匹夫愛其子猶知求明哲之師而教之况萬乘之嗣繫四海之命乎故吏部右侍郎楊公在景泰初以淛省第一人發觧明年辛未登進士第改翰林庻吉士天順戊寅授職編修與修大明一統志癸未禮部㑹試聘為同考官成化初開經筵以選為講官有白金寳鏹文綺之賜丁亥編修九載滿陞侍講踰月英廟實録成陞司經局洗馬賜白金三十兩綵幣六表裏戊子謁告歸省辛夘主考應天鄉試壬辰遷侍講學士校正通鑑綱目賜楮幣五百貫預修宋元通鑑綱目未成聞母太孺人䘮上念公侍從乆特㫖遣官諭祭庚子順天鄉試復為主考壬寅今上出閣公侍講讀文華大訓成陞詹事府少詹事兼侍講學士賜楮幣千貫丁未陞吏部右侍郎戊申纂修憲廟實録為副總裁己酉七月辭部務命以本官兼詹事府丞専典史事盖公在先朝不出木天石渠者三十有七年吏部雖嘗薦公為祭酒在廷大臣又嘗合辭舉公入内閣皆不果用後雖稍遷詹事六年而遇今上登極始有吏部之命初當道猶擬公南京吏部上覽䟽取御筆去南京二字左右謂吏部右侍郎劉宣故在上曰劉宣轉左比公再上章請解部事皆不許既而章三上辭益懇始許之觀此則先帝之不盡用公與今上之果於簡用而眷遇之其意固各有在也奈何天不假年不臻柄用以大展其經濟之才非命也夫公諱守陳字維新鄞人也自其逺祖仁爽以來十世居鄞之鏡川大父棲芸先生潛心理學逺宗楊慈湖黄東發諸公卓然為時名儒父自懲為泉州司倉以公貴累贈翰林侍講學士母張氏贈宜人公在妊時母嘗夢大星入懐及生天庭有七黒子狀如北斗人以為異八嵗入小學已敏慧絶倫讀書目數行下日記數百言稍長能作詩文下筆有驚人語然棲芸教之不以記誦文詞為能而以精思力踐為務公感悟遂作致知力行持敬三銘又題銘于牖以自勵比登第入翰林學益進文益竒議論益醇正每進講必傳經義以納忠誨一日講書説命篇有曰明君圖治嘗患其臣不言忠臣進言惟恐其君不行臣不言則君徒負聰明而罔聞乎治要君不行則臣徒費辭説而無補乎上德臣言之而君行之若髙宗傅説可以為萬世法矣於武成篇有曰魯論稱舜無為治周書稱武王埀拱而天下治是則帝王之治皆不勞而佚也然後世人主有欲悉耳目所娯窮心志所樂而深拱禁中委政内侍者乃召望夷之禍有以朝事付宰相邉事付諸將而髙居無為惟寵嬖艷者乃啟禄山之變是何也盖舜所以無為者由其封山濬川以至舉相去凶無一不盡其道武之所以埀拱者由其列爵分土以至崇德報功無一不究其心皆嘗憂勞而有為乃始佚樂而無為也後世人主則孟子所謂安其危而利其菑樂其所以亡者耳聖狂治亂之異端繫於此上歛容聽之大臣退班相語曰真講官也至於應制詩文亦不忘勸戎嘗作内宴樂語以時方事逸豫則曰謂豐大必宜日中故亨泰尚虞城復以時方尚邉功則曰慕帝舜之格有苖思宋國之相司馬以時方貴異物則曰不作無益而功成不寳異物而民足乃召公之格言無輕民事而惟艱無安厥位而惟危乂伊尹之明訓公既進呈退語他學士曰萬一天子過聽不賢於優孟滑稽之談乎㑹有詔議祧廟公上䟽言禮天子七廟祖有功而宗有德我太祖皇帝有大功於天下當為百世不遷之祖今憲宗升祔宜併祧德懿僖三祖自仁祖以下為七廟異時祧盡太祖居初室四時享祭正位南嚮三嵗一祫則徳祖居南嚮之位各不失其尊庻無悖禮時禮官以定儀九廟以德祖為始祖不祧第祧懿祖而一嵗一祫不盡如公議然知禮者韙之成化改元正月公上講學聽政之䟽其略曰精一執中此堯舜之得於内而為出治之本也眀目逹聰此堯舜之資於外而為致治之綱也臣願陛下遵用舊制開經筵以講學御午朝以聽政一日之間居文華殿之時多處乾清宫之時少力行堯舜之道而深得於内博資於外則宿弊可革善政可成而唐虞之治可馴致矣反覆數百言於正心修德保邦致治存天理遏人欲親君子逺小人凡有益於天下國家者靡不詳盡而辭極剴切上嘉納之即日諭禮部以三月御經筵禮部請併午朝如楊某奏制報可至於作史其予奪一出於公書法一以春秋通鑑綱目為凖公謂古人云國可滅史不可滅太祖定天下即命儒臣撰元史太祖靖内難其後史官於建文君事諱而不書遂使當時朝廷政事與忠於事者皆缺略無傳及今猶可補緝景皇帝己復位號而英廟實録標目猶書郕戾王附是宜改正前代人臣章奏雖不報者猶書近時留中之奏例不得書乞宣付史館凡若此者數事章未及上而公己屬疾識者猶深惜之己酉十月太白犯進賢甚急占者云賢人厄既而公卒於是月十八日盖其應也春秋六十有五上聞訃嗟悼贈禮部尚書賜諡文懿命禮部諭祭工部營塟配丁氏邑名家女初以公貴封孺人後進宜人時節入朝賀兩宫加賜賚貴富矣猶日課諸婦習女紅不輟教諸子勤問學以至於有官於朝猶訓飭之使無忘儆戒宗姻外内頌其賢年六十四以庚戌六月十一日卒其年十一月六日與公合塟玉堂山之原三子茂元中乙未進士累官湖廣按察副使茂貞早卒茂仁中丁未進士授刑部主事孫男七美珩郡庠生美璜美琚美美瑶美環美瑜女三公天性孝友與人交篤於信義居常退遜體若不勝衣言若不出諸口至商確義禮論事是非曲直則侃侃剛直雖壯夫不逮也嘗被命教内侍省嚴立規範無少假貸教成多去為近倖與公同事者率因之取寵貴而公獨無少資藉士論多之公勤學喜讀書遇有所得即為註著蚤嵗嘗作五經四書私抄叙正其錯簡更定其章句擇取諸家傳註而自以所見立説晩年屢加刪定皆擴前賢之所未發而詩書二經尤為精到至其家庭授受而用以取科者則専門易學盖公既得之棲芸而遂以傳之弟若子公弟三人並舉進士守阯亦魁浙省歴官翰林侍講春坊諭德守隨由應天尹為廣西參政守隅工部主事文學正禮理争爽競秀而茂元茂仁尤濟美焉公為文舉筆立成不煩宿構詞雖閎博而卒澤於理詩尤渾雄流麗然不戾於雅正四方求者接跡戸外公應之不以為凟也其所著有晉庵鏡川東觀桂坊金坡銓部諸稿藏于家公疾亟語諭德君洎茂仁曰吾學至為君子仕登三品年邁六袠夫復何憾惟新天子厚恩未能報先祖棲芸先生未及封汝曹其勉圖之又曰吾所交皆文章鉅公然知我深者惟冡宰王廷貴我死汝求作神道碑言訖精神猶耿耿喘息漸微瞑目端坐而逝公卒後越月茂元犇訃過金陵以公治命告予既而諭德君遂以公行述來顧予何人乃敢承公之託耶苐以同年及第同官翰林道義相親之日乆公三弟府尹諭徳嘗同宦兩京工部從予受業南雍而予子參政沂乂公考應天時所取士公子憲副復與沂同年契誼之深誠無有過于予者遂不揣菲陋撮公言行之大論次之而系之以銘銘曰惟古盛時士方多聞窮理以學載道以文世教日淪俗儒滅裂學殖將落辭有枝葉有煒楊公越産竒才夙承示訓茂擢倫魁繼登甲科列職翰苑更事三后荐沐天眷今皇紹統信任不疑曰予舊學先帝所遺公感知遇誓竭忠藎銓管稱平論諫無隠春秋之筆周孔之言總裁國史勸講經筵道合議從秉用伊邇邦國殄瘁而公己矣訃音上聞當宁興嗟寵終之典視衆有加感恩未報公有遺恨易簀之言以朂厥𦙍有弟有子世學世科三鳯二雛踵接肩摩諸孫振振亦復穎異世徳方殷其承未己公雖云亡簡編具存殘膏賸馥沾丐後人公亡無何宜人奄逝淑徳令儀殆不勝紀玉堂之山有封若堂既固既安雙璧共藏墓門有石過者必式公有治命予無愧色謝文肅公行狀黄綰先生姓謝氏諱鐸字鳴治别號方石少頴敏能為韻句年十四其叔父逸老先生授四子毛詩輙悟大意將冠遊邑校與綰先大父少司空友大父樹立堅特罕比獨先生相與砥礪慨然以古人自期天順己夘發觧第一人甲申登進士第與今少司長沙李公大司馬華容劉公同選入翰林為庶吉士益肆力學問學士永新劉公莆田柯公典教皆深器之成化乙酉授編修預修英廟實録賜銀幣陞俸從六品癸已被㫖校通鑑綱目先生因指歴代得失為䟽數千言以進曰宋神宗好通鑑理宗好綱目徒知留意其書不能推之政治因論時政之失宜求賢講學見諸行事不為二君之徒好甲午被㫖入讀中秘書條上西北備邉事宜略曰河曲一方近失聲援敵人伏為窟穴夫大河為闗輔之限而受降東勝又大河之藩籬失此則河不可守其何能及况綏延經榆林至寧夏二千餘里列堡二十有三馬歩軍二萬三千有竒老羸半之是以往嵗冦掠如入無人之境東自孤山柏林諸堡中自平夷懐逺諸堡西自靖邉清平諸堡又西則寧塞諸處直抵金湯川安邉諸處直抵環慶花馬池諸處直抵固原以至土門塞門山城諸處莫非冦入之路朝廷乆為搜套之䇿疑而未决及此無事正宜蓄兵養鋭于大同寧夏以為東西之援漸圖收復漢唐故疆與國初東勝之地據三受降城以極形勢守其不攻者䇿之上也又曰今用將帥皆晚唐之債帥也戰没者士卒而名數不聞克㨗者士卒而賞歸權勢剋減之暴辦納之艱怨塞胸腹得而使之乎言甚剴切皆鑿鑿可用乙未秩滿陞侍講入預經筵反覆推説皆人所難言庚子丁外艱再罹内艱守禮如古壬寅終制謂人曰初心冀禄為親今無及矣茍仕非義也遂以疾聞明年癸卯吏部趣起復堅以疾謝楗門讀書暇則侍逸老登眺方巖㕍巖之上仕進之念泊如也孝皇初新庶政于是廷臣交章論薦㑹修憲廟實録詔起之先生未决大父與長沙公貽書來勸遂行入朝供事兵館書汪直王越開邉事最直庚戌陞南京國子祭酒以亷節為教士皆刮滌有以請托自愧者又䟽上國學事宜曰擇師儒慎科貢正祀典廣載籍復㑹饌均撥歴其論祀典略曰孔廟從祀之賢萬代瞻仰教化之原龜山楊時程門髙弟實衍延平之𣲖新經之闢足衛吾道而不預從祀臨川邵公呉澄生長于宋而顯于元夫出處聖賢大節忠義古今大防身事二姓跡其所為不及洛邑頑民顧在從祀之列臣固不能無惑况二人皆太學之師其于廟祀黜陟不可不正先生以師道難盡疏請致仕不許明年辛亥仲子死先祀無托遂致仕諸生以狀歴部臺請留于朝先生嘗抑諸生之納粟馬者至是舉則多所抑者一時薦紳榮其歸皆祖于郊外家居幾十載惟讀書求志日不少懈勢利一毫不嬰于懐天下之思其人想其風者皆謂可望而不可即而薦者益力孝廟于是深知先生欲大用之戊午㑹國子缺祭酒吏部以先生名進上特命陞禮部右侍郎掌祭酒事遣使就其家起之先生兩具疏辭疾長沙公在政府貽書諭上意乃行次越得疾徑歸以狀投紹興府繳進力求致仕不許又疏投台州府轉奏知府不敢上給事中呉世忠主事潘府言當速起以盡正人之用使者再至有司勸駕益急遂行至京以求退而得遷非義所安辭以舊官供職不許始受命其為教如在南雍時地震詔諸司言事因上章論維持風教四事而論黜呉氏及納粟馬之害尤切連疏乞致仕六館師生上章乞留廷臣呉世忠張芝呉蕣薦益力被㫖不允癸亥上命㑹輯通鑑綱目并續編為纂要先生為潤色官論黜晉隋胡元之統説皆有據任職三載念祖母趙氏守節未白俟滿考請以本身誥命易為趙氏旌表例死者不旌上特破格行之仍給誥命既而復疏乞致仕半嵗之間疏凡五上辭署印至再四上皆以温㫖勉留又不能奪方許養疾命驛歸俟疾愈以聞正德戊辰吏部上其名㑹權奸用事遂令致仕先生歸六嵗終于正寢享年七十有六正徳庚午二月二日也有司以聞贈禮部尚書諭祭賜諡文肅命進士桂蕚治其𦵏塟其里暘嶴大夢山之原先生性孤介簡朴無華節操堅勵慎取予有防畛晚始寛涵有容居常坦坦雖庸人孺子得親之及遇事則斷斷一定不可奪志耻温飽布素䟽食將以終身常曰吾無他長惟安分知止而己故其生平不吝義退不榮倖進其進也反覆辭免至不己而後就其退也量任揆己奮而决去此其出處大節本末甚明夫豈偶中倖致者前時學士大夫務希世進取巧躋㨗攫揚揚得意由二三君子天下乃始貴名節尚亷恥嗚呼先生志不究才不盡用澤不加于民惟流風猶悚動後世先生之功可少哉國學自㑹膳不行膳夫之輸常為祭酒故有先生獨不然盡籍貯于公不私銖兩乃措之廢墜如南雍搆二樓庋故典刻板北雍増號房寘官廨修文廟開廟前衢奏均屬官與諸生之貧者有餘貯之以需㑹膳之復行諸生至館用賂教官謂之班錢為禁止之又捐己皁銀以賑教官之亷者平生不喜與内侍徃來在纂局有内侍之執權者每設食恭禮丐一言不可得見義必為先公有遺田若干畆以供先世祠墓禄食稍羸輙買田代之分給諸弟置家塾資宗族貧塟又買田分諸姪而又剏方巖書院築牛橋閘與賙親故婚喪患難之不贍者郷郡先哲行義著述靡不蒐輯表闡君子小人進退消長之機未嘗不感慨深嗟而掩袂也于書無不讀其所為文甚多尤長于詩盖其精識絶人論議歸於一是所著有桃溪集續真西山讀書記伊洛遺音伊洛淵源續録四子擇言元史本末宰輔沿革國朝名臣事略尊鄉録赤城志及文集詩集論諫録緦山集百餘巻先生裔出晉康樂公宋經略使鞅始遷黄巖縣學西元末孝子温良再遷桃溪今𨽻太平曽祖原睦祖性端贈禮部右侍郎妣趙氏贈淑人即節婦考世衍封編修贈禮部右侍郎妣髙氏贈淑人從叔父省寳慶太守所謂逸老先生及其弟王城山人續皆以學行重于時先生娶陳氏繼孔氏宣聖五十七代孫皆贈淑人子男三興仁興義皆夭興寅側室焦氏出女二長聘綰叔父侹俱夭次適金忻孫男一必祚興義遺腹子以䕃補國子生曽孫男二某某綰竊惟早嵗受業受知先生特深世契尤篤非綰無以摭其詳故必祚以遺行見屬義有不得辭者謹為狀以告立言君子庶先生大節百世之後有考謹狀南京都察院右僉都御史張公墓誌銘吕原公諱楷字式之世為寧波慈谿人曽祖好古祖叔皆有隠徳父惟哲及從父咸以能詩稱惟哲以公貴贈監察御史母毛氏贈孺人公少頴異書一覽即成誦年十四為邑庠生習詩書兩經又習通禮記甫十七中鄉試登永樂甲辰進士第例賜歸益肆力古文詞宣徳初試政兵部以公務詣陜西有能名還擢江西道監察御史時刑部獄吏受賕繫囚有佯死得脱者事公劾奏尚書而下十數人皆坐黜越六年考績赴行在因獻頌留候鴻臚寺今上初服乃詔還任江寧人有夏三者詭誘鐫工呉謙書牒而用以己所造偽印事覺謙誣服公亷得其實乃以謙罪夏三又有指揮陳旺其養子俊與妖僧搆逆罪當連坐審俊係蘇州人幼育旺家稍長逃去且乆已因置旺勿論其讞獄明恕多此類正統庚申遷陜西按察使僉事再遷副使董屯田水利及讞决郡縣疑獄咸有成績嘗以地震上封事乂上安邉十二策悉見嘉納嵗丁夘召拜右僉都御史值畿郡蝗即遣公廵撫所歴授以捕蝗之法蝗為悉衰并奏懲長吏之不恤民者聲望凜然是年延平盜起朝命都督劉聚往討而以公賛其事臨行賚以金綺寳楮公榜諭前途其兵所過民不知擾抵廣信聞賊圍延平急亟令善馳者賫榜諭以威信賊觧去尋圍將樂公遣别將由間道襲擊賊敗潰死者甚衆賊首鄧茂七退保陳山公駐師建寧潜遣兵趨延平用降者為間示以弱賊乃復出攻延平公指授方略命以南京浙江江西分兵伏沙溪諸處而以福建弱兵挑之賊果坌集發兵合擊大破之俘馘萬計茂七死于亂兵茂七扇亂閩盜所在紛起朝廷慮公兵寡弗敵繼遣寧陽侯陳懋等將大兵以往至則茂七已死乃與公分討餘寇公與劉都督自延平進攻石門襲五臺館皆大捷遂入邵武㧞峽陽最營觀音山下時賊寨九龍山巔留渡溪筏于峽間公夜選壯士三千設伏復遣舟兵遡峽撒其筏且戒曰賊覘我營兵少必悉衆來攻當速入其寨而反攻之比旦賊果悉衆去至溪滸以無筏奔還而我兵己據其寨賊窮蹙盡降延平郡邑遂定初處州葉宗留者與茂七同時倡亂朝命都督徐恭往討乆未克及是命公與恭掎角還至金華聞恭師次金公山下勢危甚即倍道抵其境立寨甫畢賊至公令語之曰吾斬鄧茂七者爾能戰乎否則來降賊氣索而去䇿其必復來預部署以俟明日賊果大至公麾兵擊之少頃佯北賊追逼栅中樹大赤旗伏兵四起斷其歸路一鼓殱之餘留寨者望風降欵處州復平公初議以賊皆良民脅從者可憫故所至先招後𠞰全活者不可勝計景泰初凱旋嫉公功者誣公以罪罷官歸天順更元始詔公復職致仕明年公入謝時陜西方用師禦邊議擇選臣往佐師以給餉備騎莫果敵士遂以屬公公往悉心區畫事完召還命往南京蒞任又明年冬公以賚表來京卒于朝邸訃聞宸𠂻悼惜遣官諭祭特令有司塋塟盖異恩也公之生以洪武戊寅三月二十二日而其卒為天順庚辰十一月七日享年六十有三前配丘氏贈孺人繼胡氏封孺人子男三應麒醫學正科應麟寧波衛撫應鵬率材抱德女二長適余凱次適萬宗希孫男女十有二人公早孤事母孝心地坦豁喜奨誘人之善接賔客有禮而周窮拯難有恩義其學自經史諸子至天文醫卜釋老之書靡不渉獵為文章有古法善行草篆𨽻尤耽於詩平生吟咏未嘗一日廢口占下筆頃刻立成而俊逸清麗新意叠出嘗選詩和唐音草堂詩餘及李詩古樂府七言律許渾丁夘集髙季迪缶鳴集來中峰梅花百味總數百巻餘若輕侯集百琹操出於自作者尤多海内之士皆耳熟其名而朝鮮來使往往市其和唐音以歸其他所著乂有四經糠粃大明律條撮要武經小學増廣事物紀原及孔子聖跡圖賛諸篇應麟應鵬將舁襯歸乃以翰林編修同郡楊守陳所為狀來乞銘銘曰峩峩四明鍾英發竒是維張公早齡岐嶷爰飭儒術擢第于時以司邦憲聲華四馳載承天討威彰恵施功成進退行藏自怡起佐南臺益將有為溘焉告終吁嗟可悲生平飽蓄申以文詩弗亾者存其在于斯胡端敏墓銘呉鼎嘉靖九年秋九月丙辰晦致仕太子太保兵部尚書胡公薨于家天子聞訃輟朝賜諡端敏䇿贈少保遣官祭凡九勅有司營塟墓在五雲山之岡其子純卜十年九月癸酉襄事請銘公諱世寧字永清别號静菴世杭州仁和人祖諱暠考諱瑢俱贈吏部右侍郎祖妣張氏妣馮氏俱淑人公起家昌化諸生舉𢎞治五年鄉試第二人六年第進士八年授德安府推官十三年拜南京刑部主事十八年署員外郎毅皇帝即位詔實授加奉訓大夫正徳二年署郎中三年出為廣西太平知府未幾以母喪去職六年復守寳慶七年擢江西按察使兵備東鄉十年命為福建按察使未拜而坐前告言寧庶人宸濠反謀謫戍遼東十五年起徒中就家拜湖廣按察使旋擢僉都御史廵撫四川今上改元以吏部右侍郎召聞父喪還四年以兵部左侍郎徴入五年改南京吏部六年拜南京工部尚書是年秋以左都御史徴拜刑部尚書未上加太子少保左都仍舊入見辭免宫保俄改刑部尚書七年轉兵部加太子太保八年得請致仕巳而召起南京兵部尚書參賛機務太子太保仍舊公固辭不拜而明年薨矣享年六十有三配李氏封淑人子男一純也録為太學生女一嫁富陽學生何機公㓜有大志數夢偕于少保立朝與議軍國事其學務實用凡規為建白具出定見决非偶然者為人亷約剛方遇義不可毅然必逹其志不肯養交安禄専心奉上而己然亦坐是寡合遭訕怒初為推官以才節著應風憲召顧拜留都散郎乆之得補逺惡郡郡領州縣率土官雅不庭參公下令延訪長吏土官有求謁者推至誠與語却絶其餽獻及因他出過其營单騎直入坐帳中縱閲騎射良乆乃還他日子弟應嗣官者輙為任之良厚由是民夷感其恩信唯太平州李璿悖父據印坐法不就逮公知龍英州趙元珤善用兵宻檄其捕璿且授之方略元珤乘璿不意猝起師攻之飛炬焚其州治璿走保山寨未㧞公觧衣齎犒元珤曰以吾衣贖一州生靈也寨中兵聞之感泣觧散元珤擒璿及其印章名馬來獻公發璿所聚粟以賑被困之民且悉除其租賦一年遂能懐服諸夷治聲大起其為兵憲時宸濠反有狀人莫敢言公獨上䟽略曰南昌失火延燒萬室基地便利盡歸王府債負所責遍及閭閻庄田所侵激民立寨都司布政司按察司官多為鈐東問刑參吏受成而行近者買辦漸行於外府騷擾遍及於窮鄉臣下懼有隠禍多懐二心禮樂政令漸不出自朝廷地方之事益有可慮者矣寧王自得衛兵以來威勢日横而上下官司承奉太過臣請戒諭寧王遵依祖訓止治其國内官僚勅鎮巡以下官凡王府所委事必須奏可方行庶幾小民有再生之望地方無意外之虞累千餘言不果用濠乃賄結諸用事者計欲殺公杜衆口而指擿䟽中禮樂政令不出朝廷諸語為離間親親妖言誹謗奏逮公捕繫錦衣獄考掠困篤於是給事中御史交章訟公寃乆之得減死論及濠反書聞議除公謫籍還鄉里待次今上更化首以忠直受知馴至大用矣其自留都召入當路者頗有力然公不肯與黨坐臺僅踰月忽更司寇實踈之也迨陳九疇獄起人始服公持正九疇為兵備時有禦土魯畨之功先機掊殺其内應夷人事連故總制彭公澤至是憸人聶能遷上書言哈宻不能興復由九疇啟釁徴陳下刑部獄蓋時有主之者將議陳極刑奪彭為編氓公嘆曰使我典刑獄而殺一忠臣吾寧先死乃宻䟽為彭陳申理人為公危之頼聖明感悟九疇得不死然王尚書瓊遂主通畨以復哈宻為任㑹公拜大司馬得竟其事且列夷情變詐非由啟釁今圖復哈宻無益而嵗受土魯畨之挾我為奸利則宜有覺而速改因陳轉危為安之䇿意在勿勤逺略専撫近邉上悦其言屬時宰有所軒輊遂不盡用其䇿公乂䟽請増武備足邉儲而薦馬昊陳九疇施儒揚必進堪統軍旅上為起馬都御史昊將用之他亦付所司議行矣桂冡宰詆公侵官䟽昊不可用事中止公遂疾求去且以任人之要為上極言之上留公公求去益力詔乘傳還鄉里優賜輿人月廩未幾上更諸用事臣思公强起之公遂稱疾篤然猶勸上圖廣嗣育容受直言愛惜人才云公所至具有政跡入朝隨事效讜言多不詳紀紀其大者以銘其辭曰維南有鴞天鑒厥慝乃錫忠貞鎮衛社稷謇謇正言式遏寇賊居東四年罪人斯得以我公歸保乂皇國更踐四卿文武作憲匪躬是謀嘉猷入獻自牖納忠此曰黨同違衆匡拂彼曰沽直憂心如惔孰窺其極刺姦若讐體國若子秉志不回誓以九死好爵弗縻捨車就徒髙朗令終足愧鄙夫有蟠名山有折大江有峩兹封與國無疆都察院左副都御史惺菴龎公行狀郭棐世有讜言直諫之臣而後天下以氣節自植世有宏濟劻勷之臣而後天下以勛業自見世有純誠介直之臣而後天下以道徳自珍世有論納黼黻之臣而後天下以文章自顯君子修此可與翊世運矣吾鄉惺菴龎先生其庶幾乎先生諱尚鵬字少南其先文王之裔畢公之子封於龎因為氏至宋有諱晏者由雄州珠璣里遷居南海叠深是為始祖髙大父元曽大父英大父閒樂公弼以先生貴贈嘉議大夫都察院左副都御史父賔梅公憲封文林郎福建道監察御史贈嘉議大夫都察院左副都御史母鄺氏封太淑人先生以嘉靖三年甲申正月十七日生是日五星聚娵訾之次七嵗就外傅初名諫字懐忠九嵗善屬對客有試之曰揷田士女退行還有進工夫應聲曰出塞將軍死戰豈無生富貴時竒之識者知為大器年十六從舅氏鄺養吾學日益進就三水邑試近午納巻令郭公梅竒其文置優等十七嵗上書代巡洪公垣送白沙祠作養二十一嵗試儒士邑令方公大樂太守胡公鳯督學林公雲同俱置第一應本省鄉試未第充順徳諸生丙午秋中式鄉試又逾年娶淑人楊氏乃月竹公女也癸丑舉進士觀政兵部從尚書聶公豹講心性之學暇則講讀律令辨析疑義甲寅授江西饒州府樂平知縣樂平號難治甫下車即問民疾苦與當興革者首禁兩闗格鬬民始不敢争競立崇正敦和興賢永新四社學以造蒙士捐俸置田設學約㑹規以淑生徒又剏宋洪公皓明許公瑗及漢孝女曹娥祠邑人知重忠義節孝先生之力也且持己亷介一毫贖鍰不入私嚢至猾胥豪族則法繩之不少貸丁已部使者首薦賢能應召入京士民泣留追送三百里為立去思碑是秋改福建道監察御史廵視南城時錦衣官校暴横害民中貴長隨冐勉差役先生悉正之法革火房濫支隨朝之米裁五城𣲖歛公堂之席事似纎細而所關者匪小戊午奉命覈浙直餉己未疏劾總督胡宗憲欺罔不報秋上防倭五事一曰總督駐劄二曰酌𣲖徴分糧三曰禁専泥訊地四曰修要害衛所五曰重臨海府分其防倭法綦備矣庚申廵歴事竣疏劾總督胡宗憲鄢懋卿等冐破邉餉語侵嚴相幾中竒禍風紀肅然復疏通變宜民究軍伍庫役之弊請建清逺府治論控握形勢之要皆切時務辛酉春考績封父賔梅公如其官母鄺氏太孺人妻楊氏孺人三月差往河南夏五月抵開封涖試事所録何洛文等悉一時名士汴梁强宗多撓法首鋤抑之藩封歛戢貪墨吏望風解印綬時稱龎鐵面云白鹿見嵩山蔡廵撫議以獻先生執不可事遂寢冬疏賢否備大察務極精核議處宗室禄糧條陳州縣賑䘏及論左使濫陞巡撫風裁凜然壬戌春聞賔梅公艱計即跣出汝南先後文武宴席交際金幣盡令貯使司變價支用既抵家哀毁擗哭踰度癸亥冬塟賔梅公于近泰山是年刻宗圖以聫族定鄉約以淑人甲子捐貲建三祠以祀其先夏四月服闋冬補江西道御史廵按浙江仍留理大察事舊例賢否秪據各省五花冊報及南科道劾疏黜調無一免者先生言于御史大夫曰此非宋人所謂依様畫葫蘆耶何以服人當就中選譽望者破格留之其惜才之意盖殷殷也乙丑四月次南安劇寇李文標流劫郡縣騷動先生畫策築土城練民兵以嚴保障復議建大庾學既抵浙不逾月䟽上里甲均平悉著為令節中嵗織造以供尚方先生䟽陳利病遂立局以便民省費數十萬修岳武穆公墓建孫忠烈公祠在浙多所條陳節冗費以甦里甲查冒免以恤竈戸慎廩貢以别人才行條鞭以均徭役其最大者初議條鞭之法有司及鄉士夫皆以為疾先逹鄭公曉趙公錦陸公光祖移書力言其便議遂决嚴禁騷擾驛逓南都差官有蹈其轍先生抗章劾大司馬自後通行勘合别省符驗一均裁革首鋤豪强無所假借士夫横縱輙置于法或奏禠其冠裳議處有司廵鹽事宜計靖浙直江西三省礦賊廵撫劉公幾勦平之屬公紀驗釋出㓜小者千餘命至議處蠔鏡澳夷議節東省兵費又皆桑梓切膚之慮丙寅五月奉勅提督北直𨽻學校發杭州日父老泣留者數千人諸郡並立生祠百姓争尸祝之及抵京首言重學校以養人才次言正朝議以肅綱紀都諫胡應嘉劾太宰得罪先生申捄甚力劾輔臣郭安陽與髙新鄭表裏為奸不報隆慶改元糾正百官朝議復䟽言𢎞獻納以光聖治順服御以重郊禋舉遺佚以惜人才劾輔臣以申戇直廣䘏典以勸忠義嚴考察以儆官邪又䟽言兵部尚書翁萬逹湛若水以勲庸道徳而贈諡未及張澯王漸逵黎貫戴銑薛侃以建言得罪而褒䘏未聞題覆悉如先生言夏六月侍經筵預修肅皇帝實録冬十一月陞大理寺右寺丞上舉劾䟽戊辰覆審罪囚左右寺任意考扑呼號徹天先生言于堂曰廷尉持天下之平求當其罪而己何箠苦之是月擢都察院右僉都御史總理兩淮山東長蘆鹽法兼理南直山東河南遼東保定薊北三邉屯田先是上諭輔臣集九卿科道議備邉長䇿以修理鹽法復興邉屯為第一事廷議推服先生三月立東宫貤贈賔梅公中憲大夫都察院右僉都御史母鄺氏太恭人妻楊氏恭人是月駐東昌劾内監張恩擅懸金牌馬船假威漸不可長由是宦寺屏息五月至淮安請建兩淮鹽運司學校復上通鹽法講屯政議處民竈糧差諸䟽時廵鹽孫御史賍贖不明檢舉查覈大察遂罷之張給事淆亂國是阻誤邉餉亦以事干職掌論罷而言官惡傷其類遂紛然思中之原任三邉總督都御史曽銑議復河套殺身亡家先生請加存恤以勵忠義且謂收復河套之舉為御戎第一義云政暇著復古八議皆以挽流俗矯奓靡確然有關世教又毁鄢懋卿生祠于滄洲以祀漢龔遂盖滄洲乃古渤海郡也秋九月大學士張公居正及兩都臺諫論列屯鹽廢置狀事下吏戸兵三部覆議裁革督臣獨留先生専理薊遼宣大榆林寧夏陜西甘肅三邉屯務己已上薊鎮屯田䟽曰借征調以實邉塞曰固邉防以興農業復上儲養邉才疏請通行撫臣各舉一人自代嚴申濫舉之罰令勿狥私疏薦宻雲兵備副使張守中以示優録任事之臣又上修聖政酌時宜䋲薄俗正風紀優言官廣忠益伸公論銷禍本諸疏復言世廟大禮得罪諸臣盡皆䘏録獨大獄得罪者未䝉議䘏盖闕典也且追劾郭武定清亂國是之罪又疏遼東宣大延安寧夏甘肅各該屯田事宜復進㑹計録言邉民愁苦臣欲繪鄭俠之圖時壯其言十一月次甘州作儒學記深戒俗學支離之弊是月與總督尚書鄭公崇古搗河套巢穴大㨗疏聞朝議邉臣互相標榜故功不行庚午春正月至莊浪御史郜永春誣論之疏下吏部太宰楊公􅄎抗言先生敭歴中外並著風裁今當疇咨邉才難得髙新鄭不悦傳㫖切責楊公罷去先生落職歸里於是兩京九卿科道各㑹疏留楊公與先生不報遂出蘭州紅城子渡黄河而南先生廵歴各邉躬詢士卒悉諸險要隨筆輙録作行邉漫紀於邉事為最詳既抵家卜築疊深不出城市辛未春正月作師儉堂修俗譜家訓鄉閭咸以為式四月以浙江織造事削籍先是揀觧從寛或有諷者先生曰此舉省數萬金之費活千百家之命吾何愛一官卒果如其言壬申著殷鑒録始以奸邪終以災異可為鑒戒拳拳見憂世之懐是冬南都科道㑹薦先生癸酉春本省撫按乂㑹薦甲戌春陪推廵撫鄖陽秋陪推操江冬陪推河南乙亥秋陪推貴州八月陪推四川丙子春陪推江西冬十一月以僉都御史提督福建軍務兼理廵撫丁丑春抵福州先廵撫劉公堯誨苦心經畫積餘餉銀七十萬可足三年兵食故先生得以寛恤奏減免徴幾四十萬按院商公為正同心共濟閩人謡曰龎公為父商公為母來我閩中捄民疾苦至今頌之不衰上薦㧞異才疏舉漳州同知沈植秋七月上防汛叙功疏舉副使喬懋敬等尋陪推協院左僉都御吏十月彗星見上疏自劾戊寅春正月陞左副都御史協理院事是時執政張江陵奪情起復公移書規之曰自古大臣遭喪强留多非出上意自好者不為公顧為之乎語甚剴直同事閩中給諫蕭公崇業大行謝公杰鄉先生宗伯林公濓知江陵必不能容請遣使追囘不聽戊寅二月上考滿疏三月陪推總督河漕恭遇皇上大婚禮成贈閒樂公賔梅公如其官母鄺氏封太淑人妻楊氏淑人夏四月出福州士民扳留哭聲震天八郡為立生祠其撫閩時所興者若條鞭法保甲法建鎮東衛營房修洪山萬安江東橋道開省城河三十六灣修龍溪縣儒學定守城及防火事宜刻節約迎候規則酌蠲免錢糧條欵皆閩民大利也所革者若庫夫斗級舖行官價地方夫坊長管辦十里管徴站銀頭戸課殿兵船各澳抽盤觧官請托管糧常例橋夫索商銀皆閩民積害也其禁約則如公差凌虐驛逓站頭扣索常規保家包攬過闗錢米衙門坊里迎春到任劇雜皆有功於民嵓其奏免則如軍餉餘銀各埠秤䅋驛逓站銀解部防夫餘丁年例寺田充餉多者數十萬少者不下數千皆有甦于民瘼者陳給事㕘先生考滿年月差錯命囘籍聽用盖同官王某與江陵尼之也部議猶謂其才終不可棄時太淑人病篤抵家逾時獲與永訣識者謂先生純孝所致云先是廣中通省均徭十年一役凡編庫子斗級站頭即千金之産費於一旦官戸冐免田錢難售先生率行條鞭法以一年之差分之十年抑且十甲之中止免一甲近來富民免賦役之苦細民無追呼之擾田貴三倍士民咸捐貲為先生建生祠元輔趙公志臯扁其額曰永頼鄉先生有恩德及民而祠祀者宋有崔菊坡公明有先生二人而己庚辰重建三祠修百可亭其上男二長端業府學生娶周氏太學生周履祥女繼娶陳氏李氏次端穆娶岳州知府霍藎臣女女一適吏部郎中呉中謙次男庠生吴繼亨孫男五女孫四先是七月斗昏中先生知天文指示家人曰嵗星在南斗予命登磨蝎其不免乎八月二十二日尚巾櫛酬書札次日沐浴更衣疾篤家人問後事不答惟以未報國為念須臾正襟而卒享年五十有八訃聞無問識不識莫不於邑流涕嗟夫天何奪先生若是速哉先生生而頴悟長而敏逹為文章下筆滚滚萬餘言不休其學博而識練其慮事周詳動中肯綮其器宇宏大不為瑣屑齷齪態其事親孝其待弟和而有恩與人交而有信平居無疾言遽色而凜然不可干以私雖燕居必巾服肅然至接人則和氣恂恂可挹也其立朝守官披竭肝膽知無不言自為御史歴今官上封事何啻百餘首其言讜其意忠其指陳剴切而多闗民隠所條奏多得温㫖未題覆者補綴前疏復上如優容言官疏凡四上正朝儀疏凡三上其論劾則正氣稜稜不避權貴而猶以培植人才為念至其臨大事决大疑持論侃侃雖賁育不能奪海内士大夫莫不想望風采嘉其有大臣度嗟夫先生氣節足以亷頑立懦而不瑣屑委靡以干赫赫之名勛業足以禆國安民而不矯激詭異以狥皎皎之譽道德足以作人範俗而不媕阿脂韋以乖耿耿之心吐為文詞汪洋浩蕩如長江大河精宻清新如豐林叢秀所著奏議十巻詩文集十六巻殷鑒録三巻史略卧遊録二氏測各一巻行邉漫紀五巻咸宏博明逹大都不詭于聖門而有補于世教傳稱立德立功立言為三不朽若先生者其洵足不朽哉予嘗評先生學問醇粹如董江都通逹國體如賈太傅直道敢言如汲長孺引事比類如陸賔客疏朗洞逹如冦平仲孤忠直節如蘓子瞻即列于昭代名臣何愧哉某不敏承先生以道義砥礪易簀前旦手書猶惓惓相朂嗟乎何得復起先生九原哉先生仲弟尚鴻持論侃侃不隨流俗有先生風節兹偕先生嗣子端業詣予請為先生狀將以丙戌年某日與楊淑人合塟于沙坑清水岡未坤向之原求名公志表其墓謹述所見聞用備大方採擇云明故南京太僕寺丞王子敬先生墓誌銘董份明興重翰林自庶吉士始昔周歌吉士未有其官皇祖舉數千載曠典開文樓置館駕數幸親校肄優異之而肅皇帝諭閣臣以翰林承顧問俾輔弼宜慎選而壬辰嵗選而報罷罷復選之甚慎重也至辛丑嵗上親命題覽巻定其次而浙王子敬者在選中浙首省而子敬發省解第一人為東南才子海内博士翕然退讓之稱王先生云而諸吉士見之亦曰此所謂東海王先生者也皆推焉而子敬獨善予予兩人自以幸居著作庭紬天閣東觀書益渉躐貫穿法古昔矯近世反之乎正成一家言自許當不負乆之予承乏史局而子敬改刑科給事中每恨同趣殊途不復能究其業而予嘗語諸君觀子敬身不踰五尺志雄一時數卭首伸眉論天下事意欲有所出之得其當以報主上匡國家其素所蓄積也而兹列諫争即他日有披肝瀝胆仗下誓死不囘者必吾子敬也㑹禮部試天下士故事考官入試闈中各扄戸閲所分巻人不得數往來巻不得更易而考官彭者分宜人怙勢險詖剛暴士也居常突入他考官所强其巻奪之他考官不能拒己相顧咤矣及出而輔臣翟公二子皆在彭取中覈之則奪他考官巻也以是人益咤而京師大俠張者亦江西人與彭乾沒以財通而故從二子所鬻權而奸利至是益出入彭翟間醉酒宣洩事甚露諸師無不傳相語咤矣而翟方當國人未敢動又翟在諸輔中能恭謹下士士感其煦濡忍之而子敬獨奮曰所以稱耳目臣者謂其抉幽發隠備所未睹聞也業己彰著而忍不發謂耳目何且天下事孰有大于貢舉者乎而輔臣以提衡總綱紀表正百官為職而令貪人大猾挾其子行私籍籍播汙惡言而猶欲掩耳目蔽日月又何可忍也乃抗疏疏上肅皇帝下其事詔獄逮彭張雜考之引䋲批根得其實上盛怒立罷翟黜其二子而彭張或黜或戍他考官謫有差盖天威赫赫震矣先是言事者多不測事至則錯愕揺手皆寒心及子敬挺身撼鼎鐺犯忌諱而赫赫若此人乃謂天子本神聖而下無正言即言不當耳觀王給事疏一入而譬之震霆一擊天地開朗矣于是人皆稱壯偉而權貴人目之恐其建白益多將及己乃因事出為湖廣按察司知事轉廣東新㑹縣知縣縣負海習獧利如訟争而懻忮多豪豪皆賄官怵民恣吞噬民畏苦之子敬乃宻召縣父老具列諸豪姓名奸宄狀次第剪艾人不知所出稱神明而盡案諸訟訐傳爰書論讞考當無枉始而訟者嘗數百人至是咸輸服稽首稱神明者益衆踰月訟遂清縣固椎埋多藏而黄毛鼠者大盜也怙險聚黨數刼掠莫能制子敬乃部民兵嚴號令設方略立擒黄毛䑕散其黨千人戮有罪宥無辜而大盜既誅小偷咸息枹皷亦益稀矣而瀕縣海口最鉅數决子敬令諸猪載土與石贖既具因多置破艘實土石其中沉之口遂塞堧地盡為肥田新㑹稱樂土焉初遷謫者畏嶺海從來乆矣或抑鬰失志自傷或負貴不親事廢職乃子敬獨晝夜竭力為民勞人以是益稱之暇則引博士諸生傳以經術親授師指而擇其俊乂厚廪餼朂其成而邑人白沙陳先生者儒宗也延禮其裔梓其書使學者知所誦法在楚則校選文苑詩布天下而苑詩天下不多見見則苦其繁及校選一出皆踊躍稱善盖子敬屬任事而以其間崇文重道孳孳如不遑多此類而楚中諸生呉國倫者嘗以文投謁一見驚曰此我輩人也當取髙第以文顯既而呉亦發省觧第一人為給事數遷謫而與李于麟王元美稱七才子大略與子敬埒云子敬自新㑹轉南京太僕丞人猶以淹屈而終以權貴人啣之言者受其㫖論去焉夫士以挺身誓死披肝胆言天下大事於前而望風承指之人乘瑕釁擿細㣲以議其後此巷伯之所為作也亦可深歎矣然子敬篤孝歸而父母幸無恙旦夕具甘㫖治樽爼奉觴上夀數自暢二大人前愉愉樂也若不知有罷官者及父殁而哀痛毁瘠殆矣及母歿而積痛益殆數埀絶若不知有生者尋遂卒哀哉然子敬卒十年而子荁亦舉進士選吉士授國史編修繼其父稱才子而國史君奉使還紆道百里枉車轡而臨予㑹予間出而駐車解轡者越五日見則欷歔持狀乞銘予因謂之曰古言求名于朝今予自長安來欲顯其親名而以臨予左矣然予與王先生遊踰四十六年而歴歴在心目事本末非外人所具知也予固當銘然予聞王先生將卜室嘗夢巍樓嶪嶪有大槐樹亭亭覆其上旁有指之者曰此公家樹也寤而立起如卜室所則樹果在焉因定築居之今緑槐堂是己夫槐者古三公象王之上世嘗植之且王先生膺先皇帝慎重之選而其志未畢今在予乎夢實命之矣予因論次其事歸焉王先生名交字子敬一字徴乆别號龍田晩乃號同齋慈谿德門里人其先羲仲弟璘之實為始祖越二十世而大父珫為廣德判官父舉進士母周氏配費氏早卒繼配薛氏封太孺人子男四益國子生娶張氏荃娶董氏堇娶蔡氏荃堇皆庠生荁則國史君也娶陳氏闕繼娶包氏封孺人女二長適包覲次適顔子望俱庠生先生生丙辰六月八日卒隆慶庚午九月七日益等卜以萬歴丁亥十月塟闕之原銘曰髙山峩峩誕降厥靈大海湯湯遹凝其精精靈鬰結明哲挺生荷帝之選禁祕是登圖書之府著作之庭珪璋既琢琬琰以承謂當朝夕式奉凖程始同末異獨往難并舍我偃息趨彼諫争虎豹九闗逆鱗是攖鳯凰千仞朝陽一鳴志貫金石力撼鼎鐺皇赫斯怒震驚在廷正國之紀顯主之明如日斯朗如雷以轟凡百有位孰敢不貞悠悠昊天不鑒孤立羣邪醜正黨黒惡白朝以言進暮以䜛謫人不必用貴其正直言不必多貴其匡國維此一舉何媿竹帛要觀南海祝融之域九疑㣲茫蒼梧可質心既不諐人則何恤澤有可施地又可擇與民周旋帶星出入諸所建樹亦足暴白彼何為哉復此訿噏孰取䜛人投卑有北賦吊湘纍歌咏巷伯嗟嗟彼蒼曷其有極惟此王氏將必有興帝召掌夢示以明徴有人在下欲輔其成再世而起莫之與京相彼槐矣實應台星禎祥將集符兆先呈用占爾裔當秉國衡安此窀穸世世其寧明文海卷四百五十
