body:
  text: 明文海巻四百五十三餘姚黄宗羲編墓文二十五輔臣自撰墓銘劉忠野亭字司直别號野亭世系姓氏里族載於先少傅公銘誌中茲不具野亭年二十三舉河南成化甲午鄉薦二十七舉進士改翰林庶吉士除編修纂修憲廟實録成陞侍講九載陞侍讀學士乙丑今上即位以春宫講讀恩陞學士明年陞南京禮部左侍郎未旬曰陞本部尚書丁夘轉南京吏部尚書尋被召改吏部尚書兼翰林院學士掌詹事府事入内閣専掌誥勑是年秋九月仍以尚書兼文淵閣大學士叅預機政尋晉少傅兼太子太傅武英殿大學士尚書如故十月以病老具疏請退休未允自是疏七八上皆荷温㫖勉留辛未春省墓歸歸未㡬再求休退乃俞允仍賜勑并月給米五石嵗撥輿夫八名廕子元嗣為中書舍人時年六十也歸之日有先公敝屋數楹城之南有别墅一區田百畆桑棗榆栁百餘株繼又於居舍後鑿小池放一舟其中每當春暖秋晴病起意適之時或駕輿登野或張席命舟徜徉自放於水雲林月之際其所獲賜餘則嵗分十之三四以頒諸流離貧餓者間嘗進元嗣而諭之曰吾老且病没之日勿請塟祭諡贈勿干名筆為誄文輓詩有一於是吾不汝子矣文成或者乃曰公筮仕幾四十年所厯非一官各有所職今何為不書盖予雖以文翰著銜其所職則啓沃輔翼有闗於上下者頗重大予於是無一能効焉書之徒以自貽愧也公孤穹階而居之若不能一日安者盖予性峭直狷介既無功業以為顯明之資又乏低昻以為植立之地不即去則罪日大愧日集士夫清議并以先所有者而奪之矣其歸而居家雖杜門謝客然猶有車馬遊從之樂有貧餓周恤之恵若未能絶意於世者盖遊從之樂所以章君上之賜周恤之恵所以侈君上之恩外此則非所知焉其不敢有䘏典文誄之請者盖無實徳而尚虛名此予平日所深恥者今若是是使予昭昭累士夫之餘㝠㝠為地下之愧魄矣尚幸有不死可持之以見先祖考於九泉者自揣平生無大過尤此心無少負焉耳今附諸石者俾來世子孫皆當嘆予不負以副其所無負者野亭配王氏同邑知縣覽女貞順柔則内範嚴整於女紅之事尤精巧初封孺人夫人今晉封一品夫人生景泰甲戌八月二十六日今年六十五庶黄氏生女二長王出適醫官姚錕次黄出適生員尹郊俱蚤寡子一即元嗣亦黄出孫男文孫女恩孫梅孫俱幼野亭生景泰壬申八月十五日誌成於正徳戊寅九月十五日時年六十有七也没之日久近未可卜元嗣續當鑱諸銘詞之末銘曰嗚呼野亭胡為而生胡為而仕胡為而歸胡為而死盖其生也窮天地之委和其仕也濫皇明之介祉考諸巳考諸人則歸有餘裕委者還濫者收則死獲所止嗚呼世有為野亭嗤者曰如斯如斯後有為野亭嗟者曰乃爾乃爾特進光禄大夫左桂國少師兼太子太師吏部尚書華盖殿大學士贈太保楊文忠公神道碑趙貞吉惟皇天篤我明之祐間出節臣為社稷𨽻二百年間如仁和于公暨新都楊公乗所遇時力於𨽻事最著矣盖正統己巳土木北狩正徳辛巳威武南征隕空沉陸變起非常非有握補天之器挾移斗之能安敢授受其間哉傳曰仲之生為齊也仲在則齊存矣徃事二際社稷之計賴二公居多安可忘耶于公巳表於憲皇之世楊公之没久矣頃者恭遇我皇上奉我世宗皇帝遺詔復公之官加贈太保諡文忠廕一孫為尚寳司丞一孫入監遣官祭葬恩數備至嗚呼休哉不忘臣下之勞其國家有道靈長之福乎于是始皆談誦公行事矣楊氏宗廕改窆公墓祠而祀之以碑辭屬予噫公希世之英也予茲之論其敢茍耶公事業詳具家傳今掇其大者以引士評之先導可乎公名廷和字介夫系出湖廣之麻城五世祖某避亂入蜀居新都父某母某氏以天順巳夘九月十九日生公幼以竒穎舉于鄉少年讀中秘書才器恢廓鄉先達司馬余肅敏夙重之歸老之日獨持大明律與别曰介夫當相天下為我熟此以助他日謀斷盖居館三十年修文講讀聲譽茂籍時輩視之巳若麟角鳳毛然久之以正徳丁夘冬自南戸尚書同長沙李公辦閣事是時孽璫之熖毒蒸寰宇數年内駭奔未息南平北討政府囂欱而長沙亦倦念去欲令公代巳也嘗語人曰吾於文翰有一日之長若經濟事須歸介夫夫余公識公于早嵗李相察公于同事非楊氏之鮑叔哉壬申冬李去公始獨任時公丁憂朝議奪情疏亟上議得寢惟令撫按官與坐守長随刻服制日促上道此起用輔臣之異數也噫公再進而時事益難為矣武皇帝匹馬捶居庸闗踰上谷入雲中望獵隂山旋以威武南下則天位虚拱將踰嵗矣嗟嗟自宸濠播亂訛言載路包藏禍心者難盡防禦人心將渙大勢將傾仕者詠同車之招居者懐恤緯之憂此何景耶公血誠隻影周旋其間逺奉綸音近承慈㫖大合衆謀小事獨斷竟俾邊無鳴鏑衢寡驚柝安平且泰俟上之回嗚呼可不謂公勞巳乎大駕至自通州事勢愈急四家銳卒環布蕭宻梟獍在側磨牙舕舌儻機事有一髪之纇則禍不測可忍言耶嗚呼危哉公外示安徐宻祈内㫖許其從事始以一刺詒彬入賀獸吻縳之按柙虎之機此蕭張擒信之智也旋以優賞犒思歸官卒令掃迹出闗成逐羊之勢此周勃收軍之勇也軍收而司農之印可不倒矣信擒而郿塢之臍可不焚矣嗚呼可不謂公功巳乎然後清宫警道迎真主開明堂而治之布明詔與天下更始而天下大定矣嗚呼可不謂公忠巳乎當是時公之勲名著矣風烈髙矣將造物者亦忌公耶尊親議起而事之大難處者亦随至矣遂以癸未冬去位盖公去而時事日異矣聞長老云公始定策迎立之際亦援徃代母子故事以動宫陛矣盖以安社稷為急不恤其他也建詔中外上于時無難焉遂行之耳心豈有他哉四子起而持之是矣第無肯亮公之心耳公可辨耶公嘗嘆曰衆尤交責吾何逃乎義之尤我命也人之尤我遇也事之尤我時也吾惟有去巳耳夫以公之圓機達識豈不奉詔者上之令也不便雖十易之孰禦特以處君父骨肉情理之間身任兩宫之責豈敢撡一切徑情之説必推心絜度劑量而調適之以和夫禮之至禮保忘名之完名俟泰陵掃宫役作而徐圖其後豈必盡晚哉然欲即以回執禮之論則勢有不可也豈非命哉公之决於去以免夫義之為我尤也徃在漢廷博議是者不以加秩負者不以奪糈據經研義非擊搏之司是當求裁無取立異之四子之於公奚為異是乎豈非遇哉公之決於去以免乎人之為我尤也世復有不齊之論出於意見之偏錮於習聞之久附聲和響齟齬實繁徒致聖主懐怒疑有諷嗾罪且不測豈非流俗未易卒變時固然哉公之決於去以免夫事之為我尤也以公之功勞靖忠而博此三去惴惴焉懼補過之無地也人臣之道豈易盡哉悲夫易曰王臣蹇蹇匪躬之故詩曰我思古人俾無尤兮殆公之謂也夫君子曰去易事也而公之去則天下惜之者為大業之未終也然聖皇念公則未嘗巳也何則漢宣偶一思故劒而左右測其意在於伉儷我世皇亦數起用舊臣而因識皇心之黙存於定策豈不然耶故十年之内九重懐憐意切矣然環詔雖勤而膚效未奏也假令公垂老尚在則皇慈豈忍俾終於棄捐乎應知珮可宵還劒當晝合矣惜乎天之靳之也恭惟我皇上知世皇之意也改元之初一洗釋之嘉勞憫忠以慰仁人志士之心勸忠臣孝子於來裔猗乎盛徳曷以加哉徃者奪門輩争甚于公之譴乃英皇獨難之爭者曰不如是則今日之舉無名而于公殱焉時惟憲皇帝知英皇帝之意也即改元初亦為洗雪而嘉勞憫忠于公復完嗟乎二公力於公家其忠同其受報亦類顧不異哉乃若我二聖之心則如天之覆也如地之載也如日月之照也窮刼賛頌不能盡矣傳稱公幼讀書日以巻計長於學無不貫惟以資經濟故於當代典章條格人才政蹟邊防阨塞軍伍錢役叢𤨏逺邇心計耳濡如身周旋而抵掌可述酬答機務之際殆裕如也張永以東厰功乞封巳持内㫖引内官劉馬兒例要公公曰劉以功封其族人非封自身也事載岳正類博稿中取示之乃巳其談笑解紛易易如此而不知由於宿昔之精博也至當大事智勇奮溢臨九死而不回此則非人易及亦非可易測者矣初輟草威武勑已濱死逮嗣君未至承制専斷者廿七日駕抑奸雄如泰如瓊稍疎皆足以死新詔裁革人數十四萬八千七百餘嵗省太倉粟一百五十三萬餘怨者洶洶謡曰終日想想出一張殺人榜于是公出入䕶以衛士益岌岌隣死矣然而不死也者才也亦忠也有黙相也者耳論者謂公委任半於古人而功勛倍之徃代以負荷危艱名世者皆當出公下信夫獨公閣僚廣東梁公之論尤確梁公曰天生斯人以了今日之事大匠之任不可代也於是虚閣中首席俟公起復至而居之斯則公未卒而論巳定如此故公少時常夢天門開遥瞻綽楔曰際昌時而公顯其老也復夢天門開有二幡導公冉冉以去而公卒公殆天人稟間氣而生者耶公在位一辭伯爵及太師太傅二辭錦衣衛千户廕三辭文職四品世襲廕居家儉素食不兼味衣命服外皆布素子弟科第相望不以為喜曰此末事也謹言行修身齊家斯人道之大者幼不好弄比老而聲伎不一至於前位極人臣而居處同於寒素顧濟物之心則拳拳無時巳也公生多宦遊每歸則為郷人建一恵政初通水利灌涸田萬頃鄉人徳之號為學士堰次建坊牌費修縣城城成賊至救生命以萬計次置義田於城西北以贍族人盖三歸而修創利物業三焉公之加意人間世何如哉若他言行之詳當有如王巖叟馬永卿輩書之今未易舉也公上三世皆贈如官元配黄氏贈一品夫人生子慎正徳辛未科及第第一繼室喻氏内江人封一品夫人無出側室蔣氏封孺人生子惇兵部主事恒中書舍人先公卒忱舉人女二長嫁修撰余承勛次嫁舉人劉大昌孫男十人某尚寳司丞某廕生公以嘉靖己丑六月二十一日卒於正寢於是慎以議禮謫戌永昌以撫臣議奏許一奔喪巳而惇忱亡而諸孫幼公處淺士者四十年紀綱家務以付慎繼室黄氏云氏遂寧黄尚書第二女有才志幾幾楊氏嬰臼矣亦天以報公勤勞王家也嗟乎宣孟之忠成季之勲天之所以報公者豈有既哉某曰惜乎予言也陋不能為公重聊持論以俟後之賢者耳因憶年二十時以諸生謁公公器之去四十五年得矢公薦藻之辭俯仰人代傷慨悲謌為之唏嘘辭曰坎坎擊皷導江之浦雲頂山前鶴化仙鶴鳴壘畔雲騰雨聊騁目兮四顧望夫君兮容與九疑雲淨喜回峯三峽濤平愁枉渚愁莫愁兮夜未央思莫思兮東方曙衡門空閉鎻松筠水逺山長會能取跂靈駕兮未來悄睊睊而延佇右迎神之曲擊鼔其鏜鳳山之傍松鳴風兮聲琳琅葭涴月兮容蒼蒼渺一夕兮平生睹君子之輝光琴瑟齊御千徽張妙舞並奏進樂方樂莫樂兮兼相忘醉莫醉兮無何鄉天庭忽有䨥華飛薪傳火兮燈交光儼雲駢兮羽盖顧形骸兮難將右侑神之曲擊鼓其嘈金沙之郊雲㝠㝠兮水滔滔嘯于岫兮鳴于臯君乗舫耶乗屩石嚙月兮山嵪掀髯扼腕談何髙登樓慷慨意初消喜相逢兮雲中簫愁相追兮澗中濤百年懽會在今朝君不留兮我心勞忽空明兮澹足蹇獨立兮逍遥右送神之曲特進光禄大夫上柱國少保兼太子太傅吏部尚書武英殿大學士致仕贈太傅諡文襄桂公墓表胡松余行部徃來安仁過故相桂文襄公里問其遺言徃事叅以他日睹記盖泫然悲焉嗟乎世人貴耳賤目智既不足以知人而情又蔽於先入亦何惑乎賢哲之蒙猜詆也公平生大節在讀書好古篤志躬行孝友介特甘貧尚志以聖賢行業為巳任跡其執禮守正不謟不回三為令尹至遭讒積忤數被折辱而曽弗有所悔易此豈章句豎儒伈伈然以冠纓組綬為性命者哉唯其志不茍合故釋褐至十五年仕纔厪厪南京刑部主事爾至於遭被知遇致身思報日夜敷納罄竭忠慮其大者如専聖學明聖敬與其希天之學之疏若皇極訓解修明學政公之學忱識其逺且大矣盖公少與其兄古山先生師事康齋吳聘君門人張先生方在布衣即有匡濟天下之志故其在家在邦論議蹈迪事依於古而深天人之藴此其淵源所自來逺矣余嘗誦讀公集其言無非天下國家大計若明倫大禮諸疏論定久矣姑置不論即如輿地圖叙論一書其於兵樞民政戎索海防鹺法儲要備殫心力真有王臣蹇蹇匪躬之故夙興夜寐洒掃廷内之義使當時百執事有味其言交相修飭屢省力行于巖廊之上而施及朔易炎海之壖豈至使主上憂勞南北赤子若此其亟耶盖公巳逆睹豫策于三十年之前矣世徒見公由主事不數年致位公孤遂爾娟嫉譁然攻之而豈知古人自耒耜版築間即以爰立顧勝與否耳矧公其時登第且二十載而其才與徳又恢恢實有餘地耶今之世固有官為太宰身都上相而野無百畆之腴家乏百金之積蕭然敝宅澹然不異為令尹時耶或又謂公嘗排王先生伯安之學殆於􅎱忌余竊以為不然盖陽明兩廣之役實由公薦其謂一時天下之才無出陽明右者田州之事非斯人不足以濟是心也天下之公心也乃其後或被訶禁操切自其並時在位意見識趣之不同為人所誤則有之所謂晏嬰不知仲尼命也然晏嬰雖不知仲尼而其節儉正直能以其君顯於天下後世要無損其賢也可以一眚病大賢耶矧加誣増飾其鄉人固有說也盖孟子曰人有不為也而後可以有為陸敬輿曰吾上不負天子中不負所學下不負斯民公實兼而有之其必為賢臣名弼而不為俗吏陋儒無疑余恐後世距公日逺不盡知公行事爰語長史君請為掇其大都表諸隧道焉大學士對南山隂王公墓誌銘董復亨萬厯三十一年嵗在癸夘十二月二十二日前吏部尚書兼東閣大學士對南王公卒於家訃聞上為輟朝震悼曰此朕舊學骨鯁臣勅賜祭葬如一品禮遣行人徃營葬事特贈少保廕一子尚寳丞予諡文端公先是雖以儲議忤上㫖然上素重公為人意公年未至旦暮召用故於公之没所為褒䘏録廕有加禮云巳公冢子濬初孝亷以某與公後先讀中秘書意氣素相契合持狀乞銘按公諱家屏字忠伯號對南先世太原人後徙鳳翔國初有長眉王者以南京龍江衛士從文皇帝北征留屯塞上遂即大同之山隂家焉七世祖顯生文秀文秀生得林俱種徳不顯得林生沖仕為邑尉沖生縉仕為臨邑令縉生黄坡公朝用朝用生石溪公某即公父舉明經不仕配韓淑人以嘉靖丙申閏十二月二日舉公而石溪公當公舉之夜夢仙仗擁玉童自雲中下覺而心獨自喜曰必大吾門公生而警敏絶倫顧端凝不好弄戯七嵗韓淑人見背繼母梁再繼景皆子公如其所出髫嵗𨽻博士籍才名籍甚甲子舉本省郷試乙丑禮部試不利歸丁石溪公艱又三年隆慶戊辰成進士廷試讀巻原擬一甲二名既傳臚二甲二名盖穆廟偶有所錯綜故然公亦若為罔聞也已選庶吉士髙第庚午授翰林院編修與修世廟實録尋教習内書堂辛未分校禮闈暨萬厯改元又與修穆廟實録甲戌陞修撰乙亥建復起居注佐以史臣六人公首與選會日講員缺公又以翰撰先補時上沖齡向學日御講筵公從諸耆宿後開導剴切音吐瀏亮上為傾聽親書責難陳善四字賜之巳退謂左右曰王講官大是端士盖巳識公為公輔器有意用公矣居一年所以病謁告賜金幣許馳驛行巳夘仍以翰撰召充日講官同修會典又三年壬午陞洗馬踰月陞庶子明年癸未主考武塲進少詹兼侍講學士掌院篆明年甲申春解院篆教習庻吉士亡何陞禮部左侍郎兼官如舊巳改吏部左踰月詔兼東閣大學士入閣辦事與大倉王公同日宣麻麻下都人士動色相慶上聞之喜甚曰宋相文富朕相二王當俱賢於夢卜矣公既受上知遇黒頭大拜每感奮思報遇召對暖閣或偕同官議處章奏多所籌賛乙酉從視夀宫賜一品飛魚服風霾為灾公同閣臣條上寛䘏四事大旱扈上步禱南郊召對面奏俱蒙嘉納明年丙戌景淑人卒于京邸詔賜賻布銀幣給三代誥命祖父俱贈如公官公既奉景淑人喪還山隂而上猶虚位待公有以推閣臣請者上不允巳丑公服方禫除即家詔進禮部尚書趣還内閣遣行人徃迎凡三疏辭俱不允踰年至是時上御朝漸疏公入數月猶未及面於是上言臣非敢希一覲天顔為恩寵但邇來朝講久闕儲位久虚郊廟久代章奏久留似於聖徳朝常闗係不細請以聖節出御畢發章奏以慰海内喁喁之望上覽疏感動遣中官諭㫖曰巳悉卿忠愛翌日為出御門延公進見庚寅元日上御便殿召閣臣入對因出元子見之公同長洲新安太倉面請諭教退復再請冊立久之公自以受上特恩起用踰年諸所靖獻多鬱結不得伸乃累上疏自劾大畧謂日來灾異頻見疆圉弗靖重以議論紛拏風紀漸壊臣伴食中書一籌莫效更皇子沖睿中外繫心不宜延稽大禮以開羣疑又禁庭僕御之臣喜怒過當訶責太嚴恐上累聖徳下滋危懼臣雖私抱隱憂而才誠綿薄不能動主請如漢用灾異策免三公例罷臣以應天變上未允温㫖敦趣至三乃出視事公既不得請而私念建儲一事乃國家安危一大機括若大小臣工以去位争明主可為言當不難轉移十月公復同諸閣臣請冊立而大宗伯東阿于公亦合九卿三請詔諭候㫖行且譙讓廷臣激聒奪禮官秩於是長洲新安太倉三公各惶恐歸第引疾謝而新安太倉奉諭㫖陳謝疏中語涉冊儲上復持不下公居中調劑上意稍解詔趣三公出旋遣中使李浚諭公冊儲之禮當明年舉行若廷臣再有奏擾直過十五嵗方行公見聖示有期喜曰此宗社之福也乃擬傳札以進請宣示百僚且曰十五嵗之諭宻示恐不宜入之帖中又度未必下以便先録馳報大宗伯于公即具疏覆并隱十五嵗語而科臣亦具疏回話如公㫖上復遣諭公浚所傳原不許宣示奈何令禮臣知之且部科疏是何等語然雖不懌而無奈中外公論何僅奪部科俸儲議遂決公居閣七日疏凡七上於是長洲新安太倉亟推公有定策手各自以為不如公公方且杜門請罷累詔趣公始出明年辛夘八月工部郎張有徳以造辦錢粮請時太倉歸省長洲乞告獨公與新安直閣恐有徳言入激上怒因具揭署三臣名引前諭㫖請上果大怒責輔臣朋黨比下長洲欲於中委曲調劑因宻揭前疏臣不與聞而上怒竟不解乃更期三年新安策免長洲亦用言者罷免公力引罪言國今日所請本臣前嵗所宣臣實誤國且悮部科諸臣稽宗社大計請留國併留時行獨罷臣還不報而手諭公携藥餌扶掖入閣公乃擬敇請趣大倉入侍而是時蘭溪業以長洲荐同公直閣辦事矣明年壬辰正月科臣李獻可等以豫教請嚴㫖降罰公封還且力請寛宥獻可等不報而他會救科臣者更得重譴甚諭杖於是公力請求罷疏中大畧謂臣竊不自揣妄希古人但道臣沆以為不可之意輙敢封還御批不謂致激上怒譴訶謗榜株連累累是諸臣之得罪皆自臣始且詢之同官知奉㫖責臣希名臣所希之名不過期上為堯舜之君而臣得附堯舜之臣若棄名不顧將阿諛茍容雖許敬宗李林甫之奸佞無不可為是乃九廟神靈所隂殛天下萬世所唾罵也上不省而公復疏言臣犬馬微誠不能感迴天意至建儲大典冊立或可少待豫教委宜蚤圖科臣所言未為差謬譴訶一出逺近驚疑使臣復依違保禄淟涊茍容正汲黯所謂從諛承意䧟主不義貽辱朝廷者也願亟賜罷歸以全晚節上復不省巳遣中官諭卿洗沐數日其亟入閣辦事公去志益決復上疏言臣不能委曲停調從容緩解而封還御批咈上取罪誠萬死不敢辭但皇子于皇上父子至親冊立與豫教典禮至大言係至親事闗大典有何宜怒既荷天言切責又兼温㫖慰留雨露霜雪靡非至教但臣以孤忠自立之身抱下愚不移之疾俯循沈痼既非數日可痊仰冀生全實以一裭為幸仍不省公堅卧不出至三月廷試公辭免讀巻乃予告賜乗傳歸公具疏備條君徳時政安攘大畧末猶及建儲事且云情依依而戀主猶回棄婦之頭心惙惙以憂時横洒孤臣之淚讀者皆為隕涕當公之去或有以書挽之者曰以道事君不可則止謂止而不諫也公大臣也獨不能濡忍以就大事而悻悻如言官取一決自快為公怫然曰漢有胡廣中庸今乃有公論語乎且古之人主惟所欲為皆以大臣持禄小臣畏罪有輕下心耳假大臣不愛爵禄小臣不畏誅罰事尚有濟聞者服其確論公雖去而上素重公竟思公言黙定萬世之策以甲午年元子出閣講學又七年辛丑冊立公聞之仰天舉手加額曰上幸用臣言臣死可瞑目齋沐具表賀壬寅上亦遣行人賜羊酒存問官一子中書舍人公具疏謝疏中猶及勤視朝罷礦稅起廢佚諸大事而入奏者為削數言公大懊恨明年癸夘公病病中夢同司馬文莊公應制詠獻芹獻曝詩寤猶能舉其詞及委頓寢語悉君國事一語不及家公體貌魁岸器局恢𢎞雅負經濟才而空欵悃愊力以天下為己任居嘗喜愠不形至遇國家大事與闗生平名節則嶄嶄嶽嶽即賁育無以奪之方公纂修時適新鄭當國見公所書其兄中丞事恚甚諷改之公屹不為動江陵病劇盈朝為建醮予時目公笑曰古人為君父禱今禱為相耶因約不徃既江陵敗上怒不測禍且及泉壤予宻與公約謂其人功過不相掩公即慨然屬草將以經筵日同疏面奏會有㫖從末減乃巳其不隨人炎涼固如此又公直閣時曽少卿乾亨有條陳汰武弁疏未及上以閲邊行而各衛官聞之因遮少卿兄尚書同亨於朝大呼噪欲甘心焉公聞狀亟出遣人傳諭曰若曹無狀敢于禁庭窘辱大臣獨不畏赤若族耶衆始解散巳下兵部欲貰不問公曰恐啓奸雄窺伺之心元魏張尋事其前車也因行五府詰主名者置之法聞者莫不多公鎮定之功先是蒲坂張公繼江陵為政以同里故數從公受策多所規益其後時政益務發舒而一二新進少年務詭激射名爭求多于當事者公正色中立不稍假借獨以大義擘解之即一二新進少年又靡不嚴重公也公于書無所不窺下筆風發泉湧千百言立就自成一家獨不喜聚徒講學曰學貴躬行標榜何為敦倫砥節内行純備奔景淑人之喪號擗過毁人尤難之與人交有始末居郷豈弟寛和人人自謂親巳然非意相干輙以理遣慎取與一介不茍宗族親友窘急不惜傾貲賙之嘗大書客座有橐裏金錢揮巳盡枕中軒冕夢皆空之語殁之日幾不辦葬焉大宗伯于公業草公傳稱公守城深堅招不來麾不去有古社稷臣風盖以汲長孺況公也余謂公風度鑒裁似張子夀忠誠體國負海内重望似司馬君實然明皇於子夀生不用其言没始思之遣人祭吊曲江公以議儲去位而即以建儲蒙上存問録廕遇若過子夀獨君實起家入中書變熈豐為元祐史稱其有旋乾轉坤之功數十年來礦稅使者四出殃民不啻熈豐之政余輩碌碌即叩閽泣血無力回天公上畏相也海内望公如望嵗旦暮且兾公再起同心協力拯濟一二乃公顧溘焉先徃不及如君實一奏旋乾轉坤之功嗟嗟上即用公而不能終用公國家即得公之用而不能竟公之用人之云亡可勝痛悼然上之終始以禮遇公與公之死生以道事主真可云聖主貞臣百代一時者矣元配霍氏封兵部主事宗嶽女未廟見卒累贈淑人繼配李氏處士松女累封淑人貞靜勤敏善事舅姑饗客供祭事事精辦然性朴素既貴猶綦縞過諸戚屬諸戚屬相視而笑不顧也曰吾自安之公課弟璽或過嚴淑人輒從旁解之至譙責諸子輒不少寛假曰我子豈同先姑子哉遇霍氏有加禮至李氏外家竟不肯私一錢以公歸之明年卒公每念之輒泫然泣下公生嘉靖丙申閏十二月初二日卒萬厯癸夘十二月二十一日霍淑人生嘉靖丙申七月十三日卒嘉靖甲寅五月二十五日李淑人生己亥閏七月二十八日卒癸巳十一月初二日子男八濬初乙酉舉人娶大理寺評事霍廷楠女湛初中書舍人娶兵部主事孫訓女繼娶陕西兵備按察使李楠女泲初廩生娶陕西兵備副使薛綸女汲初廪生娶湖廣布政使安嘉善女俱李淑人出㵸初庠生亦娶綸女側室林出演初聘山東兵備副使薛綸女灝初未聘俱側室徐氏出泂初㓜側室某氏出女二長李淑人出適國子生郭煥然早卒次徐氏出適庠生李昌時孫男六濬初出者泰庚娶戸部主事焦承光女泰筴娶舉人鄧應元女泰符聘張進士爾基女泰籥聘文學隣女沛初出者劉寄尚㓜孫女七濬初出一適施應圻一適郭震祥湛初出一泲初出一汲初出一瀹初出二俱㓜曽孫男一泰庚出卜以甲辰十一月安葬桑乾之陽銘曰雲并之間昴畢分野七寳五峯盤礴南下人文苞孕千年未吐宋唯畢公公今繼武公之心事月白風清公之器宇川静岳停賈董文章富韓經濟講筵侃侃受知於帝帝曰良弼侍予左右先後匪躬謇諤匡救儲議紛紜公獨疑悃雖忤帝㫖終定國本歸休山右人仰東山新法嗷嗷日望賜環繼拜儲詔隂館之里仰天跪呼臣死可矣踰嵗告灾星流雲淡黄鳥有悲青史無恨帝念魚頭吾之舊學褒䘏録廕禮崇恩渥予常目公殆庻王佐文端易名千古不磨鬱葱佳氣桑乾之陽偕兩淑人于焉徜徉施及子孫永世匪懈石馬秋風望之下拜明文海巻四百五十三
