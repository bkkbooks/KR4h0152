body:
  text: 明文海巻四百五十九餘姚黄宗羲編墓文三十一名士郭半山墓銘王維楨吾外舅安陽縣丞半山郭公以今年六月五日卒於家其子曰岱者走价京師以書泣告曰嗟吾父竟坐前疾不起矣且卒張目呼岱曰若銘我則累壻王太史連呼曰致意致意岱泣應乃瞑予手書驚迷戰栗書失墮地拾復讀則大哭己為位再三哭曰鄉楨之北也即其帷與公别公疾且稱已何謂其至是也痛哉痛哉公兄弟二人稱鳳谷公者兄弟也𢎞治中督學邃菴楊公試華州士公及兄咸躋高等邃菴公極嘆之稱曰今二俊乃何遜東氏子東氏者指副使葵軒翁之子今顯者四公時為士有聞望也然郭氏母實葵軒同母弟葵軒之子若車駕公都運公御史公刑部公斯四公者皆呼郭氏為兄弟校業相上下然四公早達二俊乃愈益發憤増修有試輒冠其曹至大比則數困弗利鳳谷竟用貢為滑縣丞公丞安陽當其時與谷氏齊稱俊者又有管白泉氏後亦以阨塞為瀘州學官里人語曰無為嶽嶽盍觀管郭言負才氣不大售也初公之貢於太學也諸海内才藴之士無慮數百公與游皆輒敬服之久之司成趙公聞遣子來從曰郭生關中才也從之當益其雄在安陽六年丞壓於令不專制大施所司皆米鹽細務一至輒了乃日為嘯咏有所抑鬱不平盡泄之詩又為教民謠數十章咸剷文從質令易曉安陽人崔後渠先生者以文章議論高一代鮮許可見公製每賞之公既高自負恃而守彰郡者又鄉里後生故常尊禮公今為下吏勢絶公以舊遇之少謹畏容竟以是中傷之遂致仕歸歸之十年為嘉靖丁未卒公諱從禮字以行本蒲城人曽祖瑄以棲霞丞歸過華州樂其勝著土遂為華州人瑄子璽璽二子長曰經聞喜主簿次曰絃驛丞驛丞二子長從義號鳳谷為滑縣丞者也次則公滑縣二子山為寶慶通判岳為太學生公一子即岱書顔體有名籍禮部儒士而又有岫者為江都主簿於公為從子郭氏蓋世有衣冠云公三女楨娶者季長嫁生員魏自修魏父知縣次嫁生員東夏夏祖吏部考功郎中皆碩人朱氏出朱氏為岱娶知縣李公傑女傑女賢岱有三子祐之祜之一尚在抱郭氏雖世禄禄入隨費亡為子孫立業故官罷輒窘自公謝歸而管白泉氏者亦從瀘還二人者倡里中長老約為酒㑹旬六七舉不舉日公宴於家岱及孫為勸觴間逆諸女為具食用客禮接之因遂竭資然公竟不以貧故戚懐訢訢如也恢恢如也人與居多親愛之亦每急人之難不言人之過其甥故代州太守楊南涯氏取温厚坦曠四字狀公徳信哉疾比卒里中弔問者履接於戸公生成化九年五月六日距卒年七十有五即用卒年十月某日塟竁在滑縣公右楨既奉遺令次其生事始終遂銘曰矯矯郭公兮噫位卑才崇兮噫傑者固窮兮噫此屋藋蓬兮彼楝隆隆兮噫張唯忠墓銘顧璘張君唯忠諱翌本姑蘓長洲人也洪武初易置海内編戸徙其先世於上元遂為京師人君以上四世皆善人不顯父諱晟倜儻有風誼嘗憤憤思大其家謂儒者取青紫在詩書非真天人也吾老矣責在兒輩乃大購古書藏於家君性沈逺知父志力修學業能讀厯代史記及國朝典故居常非定省及父召不逾戸限或出過里人不識為張氏子也家本在市凡俚語玩劇一切不通曉每對客自尋奥義謾不知客語云何唯唯而巳人多以為癡常從司勲陳宗之受尚書𢎞治甲子以應天儒學弟子員中鄉試再上禮部不遇其勤學在舘如家在舟如舘不奪於可欲及家家人問京國事與所過城邑皆不知也試事大理日取獄案勘詳輕重曰用世貴知律否則腐學究耳其學雖天文地理星卜草木之書無不渉獵非以干祿為也今年夏夢神語曰金公請作調覺而愀然曰金秋氣也調與弔同音秋人將弔我也一日往别墅有自城中來者曰某坊火君曰吾里也恐燬吾萬卷急馳馬歸馬羸多頓遂得疾竟以九月六日卒生纔二十七年而已嘗補蘓伯修名臣事畧缺遺纂定元名臣言行録四巻又采宋史臨奠大臣之禮為一編曰臨奠録示大臣宜厚也夫六籍道衰學者率汩意於利禄自子夏高弟且曰出見紛華盛麗而喜况下者乎唯忠五歲露芒穎太常陳公師召呼為徳羙而不名七歲屬對過人十三知讀書二十二舉鄉進士世所嘗言聰明者易流而君恂恂謹愿如此豈所謂篤信好學者非耶惜乎未見其止也母周氏前母羅氏配鄭氏與君居年久耳熟文義至能屬辭男曰鶴齡女曰淑賢皆㓜君疾革遺言屬執友陳魯南為狀十月某日將𦵏君於建業鄉張家山之原其弟翶持狀來請銘銘曰顔氏好學以夭終也噫兹有同志夭復同也噫豈曰斯道不可宗也噫天乎天乎莫得而窮也噫余山人墓誌董份史董氏曰才難之稱自昔以來久矣予睹傳記詭時自放之士肆志佚行大雅所不述而紀册載之達者誦焉蓋其才亦有竒也予獨傷世慕榮顯而忽簡傲喜常蹈而惡殊軌故齷齪者進跅􅕟者退彼俶儻負俗者生不得籍死不得誄而豐爵厚植之家力能附名公先生振揚其先以施於後而名公先生亦往往假借於文辭傅益其事以為重故富貴之家仁義存而貧賤之士名行晦予竊嘆之乃予於余山人有足悲者即使山人與世之勲徳馴行之士自較其長短予知其不同日而語矣比之庸庸浮沉里巷藉著親負纎鄙而有所託以施後者此其人何如哉予故稍撰叙其事毋令其䝉晦没而不著焉山人字濟之始自稱月山後乃稱華陽山人然月山之稱行於世吳越間自士人以至甿𨽻皆知有余月山氏者其先餘姚人後徙海鹽至山人徙潯溪潯溪為烏程大里多士人雍容好辭賦山人喜遊之賃舍其南里居焉性敏辨善記問少嘗從所親間詣郡吏乞部使者所下狀郡吏重有難色約以重賂吏乃持牒手示之山人方一舉目因躡所親曰第出出而覆其辭所親復以核吏不遺一事乃皆大驚人或口舉其歌詩至數十山人覆之不遺有難以多者至十數人皆舉數十山人益覆不遺當其舉時旁顧諧笑雜以酧答若不經意者人以是稱服居常能日誦數千言然山人亦自恃其博其於書不暇深也讀書不肯為舉子業專為歌詩皆取立就常從人呼韻韻畢句成能輒至數十篇皆亮節逸響慷慨超絶見者稱善而山人酣頽呌讙亦若不經意者人以是愈稱服然山人亦自恃其捷其於詩不暇深也好大言盛自詡奬徧易其坐中人坐中知其多端有口輒交務相折而山人詼諧百出莫能窮者坐中皆靡其遇富貴人愈益甚富貴人聞其才有欲振其貧者見之皆否終其身竟困然其所屈服如茅勲部蔡歸徳則又從少年識之傾身抑下此又異也家貧嗜酒喜六博常治小舟繫所居畔每所遊吳越間好事者贈之滿舟即還多畜酒饌遇過從者醉飽歌呼誇羡所有數見擊鮮不自知貧也或時召博家一擲而盡則又泛空舟出遊而返返復如初人或規之以子之材稍自損抑何落魄至是且不及此事稍以贈遺漸歛贏省一買田舍為後日計乎山人乃嘆曰吾非不知顧不能邑邑從人間選耎求活吾願適意以樂吾貧耳取死之日千金與虛篋等也吾又何後日之計乃益縱酒博然山人其後亦賴勲部諸子居田數畝屋數椽吳江某地之上遂卒於此勲部厚賻之移書告歸徳及予經營其後事㑹勲部謫廣平郡而予北上夜遇於清河屬予志余山人既而廣平轉南駕部予乃寄錢為山人買墓地寄志以告山人嗟乎如山人之才予志之使人知貧賤而有竒者不至晦没又惜山人不重慎其材而放達以死也山人死某年某月日年若干父某母某氏繼妻某氏子某女嫁紀某某年月日𦵏某地明文海巻四百五十九
