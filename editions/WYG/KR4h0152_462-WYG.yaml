body:
  text: 明文海卷四百六十二餘姚黄宗羲編墓文三十四忠義楊椒山墓銘徐階公諱繼盛字仲芳别號椒山忠愍者諡也國家之制非大臣不得與於易名公位下乃得諡者今皇帝御極遡觀化源謂公死諫節甚偉宜尊顯以勵士大夫故奉遺詔贈公太常寺少卿廕子應尾為國子生而特賜今諡其義則取諸危身奉上在國逢難云初公舉嘉靖丁未進士授南京吏部驗封主事師事大司馬苑洛韓公盡通其天文地理太乙壬竒兵陣之學名聲重一時辛亥遷兵部車駕員外郎當是時大将軍仇鸞驕然心憚敵欲利啖之以緩兵請與敵為馬市有成議矣公上䟽斥其不可者十辨其説之謬者五鸞因詆公撓邊計惑衆心詔錦衣衛逮公置訊獄具貶狄道典史踰年擢知諸城尋遷南京户部主事又遷刑部員外郎調兵部之武選嘗獨居深念至夜分配張安人問其故公曰吾受上恩思有以報耳安人曰嚴相國方用事此豈君直言時耶公不應而心自計欲報恩其道莫如去姦人使不得亂政遂以癸丑正月䟽論少師嚴嵩十罪五姦請召二王問状公意以嵩在位久其黨與布滿中外上即問必不肯言而今皇帝以明聖在東府冀一召問可盡得其實嵩更借以為䜛詔逮公訊所以引二王者公具對侃侃至斷指折脛不易詞詔杖公百送刑部獄郎史君朝賔議從輕比而其長貳皆嵩黨竟當公詐傳親王令㫖絞公之将受杖也或遺之蚺蛇膽却不受曰椒山自有膽或謂公勿怕公笑曰豈有怕打楊椒山者及繫刑部創甚吏畏禍莫敢睨公公乃自破甆碗刺右股出血數升已復手小刃割左股去其腐肉旁觀者咸為戰悚公顧自如在獄三年以乙卯十月晦死西市臨刑賦詩云浩氣還太虚丹心照千古平生未報恩留作忠魂補天下相與涕泣傳誦之嗚呼士方平居語及節義往往扼腕張眉目自謂能之一旦臨患害僅如毛髪輙心悸色變不敢出一詞或走匿以規茍免有能自奮如其言者寡矣未有蹈必死而不懾者也偶出不意蹈一死及既脱率深自懲創毁方以為圓又或自滿足不復肯為危言正色者有矣未有慷慨激烈赴再死而不顧者也公始忤仇鸞偶不死奔走絶塞間稍稍徴用去訊繫時無幾痛苦之状宜猶在心目張安人所以語公與古牛衣之説亦何以異而公不懼不惑卒直諫以殞其生此其視唐子方諸人且猶過之矧世碌碌者耶公死之嵗刑部郎今藩㕘王君世貞為求救於嵩所厚嵩曰行卜之其子世蕃不可而其黨鄢懋卿等亦相與爭曰不殺某所謂養虎自貽患也故公竟死公死而地為震者累年其後給事中今中丞呉君時來刑部主事今中丞張君翀太僕卿董君傳策相繼論嵩嵩又将殺之奏上地忽震先皇帝悟而止由此觀之精誠之至天地且為之動矣嵩業已仇公等其必欲殺公不足怪彼黨嵩者獨何心哉夫其導嵩以殺公恐遺患也然公死七年先皇帝用御史今中丞鄒君應龍言罷嵩政逮世蕃謫戍嶺南又二年御史今中丞林君潤發世蕃逆状詔棄市籍其家則夫所謂患者果可以計免否也公死時應尾尚㓜藩㕘君與其友呉君國倫徐君中行宗君臣倡諸縉紳經紀其後事兵部主事今中丞王君遴歸公喪且以女婚其次子由是諸君者相繼獲罪而藩㕘家禍尤酷今十有二年公既受恩䘏於朝又以御史郝君杰請建祠保定賜額曰精忠諸君亦次第登用而嵩之黨則盡己斥逐嗚呼後之欲為君子小人者可以鑒矣公先世小興州人洪武中有諱伯源者奉詔徙容城傳四世至青青生贈兵部署員外郎富是為公考公生以正徳丙子五月十七日年僅四十子二長即應尾次曰應箕皆張安人出昔嵗甲辰公領鄉薦卒業國學予時為祭酒竒公文因日進公為講説經義與所以立身事君者公亦不鄙而聴之故予與公相知深公死予悲之倍於衆數謀於中丞王君視諸孤而日跂望於恩䘏之及去年幸聞末議然後所以悲君者獲少紓萬一焉某月某日應尾改𦵏公某山之原奉藩㕘君状來徴銘予義不得辭也為摭公大節俾歸而納諸墓中若公居家之行狄道之政詳具公所編年譜及藩㕘君状銘曰萬物禀氣以為命公生其中得厥正位卑身仆益自奮君恩必報以死狥人心為憤地為震嵗星一終天乃定羣姦澌滅主明聖易名建祠錫贈廕制詞前後相輝映嗟公一死重孰並我銘掲之為世鏡霍上蔡墓表髙叔嗣嘉靖八年秋守河南都指揮軍事盧龍霍君録其考上蔡知縣妣劉宜人死王事事河南髙叔嗣讀其書其奏曰給事中臣瓚言河南廵撫都御史臣璋廵按御史臣鰲言上蔡破賊殺其知縣恩裂尸四置縣門其妻先自磬於室武皇帝曰其贈光禄寺少卿劉贈宜人録其子下有司治祠屋共祀事其碑曰賊斷上蔡頸無血白氣縷縷若騰龍面猶生其傳碑同而與奏絶異人曰霍氏不忍其酷故傳避之碑䝉其誤始賊入上蔡城上蔡人相與謀脱霍使一人衣冠偽走賊呼我知縣來賊則羣執以去以其間使霍可亡去霍不肯傳皆漏不載傳不可信要之死不可諱徒使後萬世人疑者當以奏為正於是采上蔡遺事勒石墓上遺事上蔡始為山陽設法省共餽私費為安邑不受富民請初富民翁獨死其妾私其貨於養子乃逐其養子歸其貨於其族以食其妾罷山民之為吏樵者遭宦者劉瑾奪其官起家為上蔡賊攻上蔡城凡一日夜城破猶巷戰城卑於故蔡城而附之故破劉宜人先上蔡一日死宜人築臺曰望夫宜人少上蔡十二嵗繼娶始人以上蔡少子免賊初戕上蔡於南門縣人收其尸上蔡少孤事繼母孝性不飲酒人不敢干其介三仕家不益皆碑未載者十五事合前十七事沈束墓銘張元忭嗚呼自昔忠臣烈士感激於一時引領就斧鋸而不避世尚以為難至若以直諫䝉幽囚十有八年既出而辭榮忍凍餓以終其身如吾㑹稽沈公者古今有幾哉公諱束字宗安自稱梅崗子當肅皇帝季年分宜父子怙寵専政諸所進退一以賄入為低昂公初拜給事中每觸事憤愾将論列其罪状語稍漏㑹總兵周尚文卒請䘏典嚴氏憾其素不附己報寝公抗疏曰臣聞上有必行之賞斯下有必效之忠尚文忠勇素著國之長城其死也邊人亡不灑淚者而身後之典格而不議其何以示勸夫當事之臣不能上體聖心任己意為予奪臣竊悼之疏入嵩大恚條㫖杖公闕下尋繫詔獄垂絶者三四恍惚見神人金甲頎然立於前呼先生者三徐曰少忍亡恙既數月而創始愈先是公配張孺人自㑹稽來念公未有子置妾潘與俱既至則公己下獄三日矣張孺人語潘曰吾忍死以視夫朝夕分也若艾年且未識夫面寕能共守乎潘涕泣誓以死待卒相與茹荼苦拮据女紅易升斗公獄中槖饘頼以僅繼日惟兀坐玩周易著周易通解及文言説内外本末稱名辨多要眇自得不茍襲先儒齒頰發為詩歌悲壮悽惋令讀者裂眥酸鼻庚戌冬敵入犯闕京師戒嚴詔集廷臣策所以退敵者國子司業趙公貞吉抗言於朝曰釋沈束之囚以求直言録周尚文之功以勵邊将即敵可不戰而退亡何趙公竟斥去公在獄聞敵状輙具疏請得精騎五千往來督戰以外疑敵而内翼蔽都城且度敵飽而歸必道涿鹿出遵薊或衝突於宣大宜傳檄諸路乗其惰歸設竒夾擊必大勝嵩見疏輙又斥去曰囚安得上書其後餘姚趙公錦以御史上虞徐公學詩以刑部主事㑹稽沈公鍊以錦衣經厯先後上書論嚴氏率被逮譴謫以去時號越中四諫而嚴氏恨越人特甚㑹有搆者謂錦衣與公本同宗疑有連於是益切齒欲甘心於公屬主者加械公手足公分且死誡家人庀後事張孺人徬徨紉衣袂具兩棺期俱死已而華亭徐少師聞之為中救得免然嚴氏日夜以蜚語中公浸惑上聴壬戌嚴氏敗公繫獄既十有四年而公父邠州公年八十有七疾且革思一見公於是張孺人伏闕上疏請以身代繫令夫得一見父以瞑凡三上乃下部部議上不報然上意稍稍動矣當是時上常居齋宫好鉤察外事即獄中一語動日録以聞謂之監帖然守者或亡所得則姑塞以謾語丙寅冬帖進云有鵲當沈束噪不休束曰豈有喜及罪人者耶葢謾語而上信之㑹何公以尚疏救海公瑞忽有㫖下何於獄而釋公公歸而邠州公己不待矣乃踊而號曰痛乎生不菽死不含吾尚得為人乎於是枕塊水飲佯狂自廢丁卯荘皇帝登極首録諸諫者起公原官上疏乞補制尋遷都給事中再遷南通政竟以疾辭自是獨掃一室左右經史日夕研討其中所著有易圖洪範律吕諸説書詩春秋周禮諸解及潮候集雜詩藁惜多逸者家故貧僅有田十餘畆婦妾并日而食處之怡然有司蘄一望見顔色不可得也辛已年六十有八微疾而逝少時好讀蘇武傳每讀輙掩巻欷歔當食或廢箸由今觀之蘇處北海十九年白首歸漢公繫獄十八年亦白首歸田蘇之歸也以鴈書公之歸也以鵲帖皆託之人而成於天事誠有不偶然者然蘇尚拜官而公不拜蘇有子而公卒無子其節愈苦而數愈竒天道其何如哉沈青霞墓誌銘王世貞當先皇帝已酉庚戌間余守尚書刑部郎而沈公由清豐令入為錦衣衛經厯數從故尚寶丞張遜業飲沈公少飲輙醉醉則擊缶嗚嗚誦出師二表赤壁賦已慷慨曼聲長嘯泣數行下余私心慕異之無何而敵䦨入塞都門不啟天子坐西齋宫憂之亡所出㑹敵獲我中貴人為嫚書附以進曰予我幣通貢即解圍否者嵗一髠而郭時華亭公領大宗伯要諸大臣以御朝請而天子下其書大宗伯㑹文武羣臣計即予貢弗予執便甫就計國子司業趙先生貞吉曰敵所謂貢者何耶彼傅城而軍我城下盟耳竊以為天子御奉天門出内帑饗士釋言者旌功臣敵固當自退而檢討毛先生起囁嚅言吾姑寛敵以予貢而出之而後議守便趙先生廷叱之爭之堅而沈公復為申趙理刺刺不休太宰夏公怪而問曰若何小吏也沈公目攝之曰大吏噤弗言故小吏言胡怪也且不曰主辱臣死耶太宰意不自得罷而華亭公持衆議上竟弗予貢次日天子出視朝有所誅進矣當是時沈公氣甚壮欲力吞敵幾得以身當一面畢見其長乃上疏言請以萬騎䕶陵寝萬騎防通州餉而合勤王之師十餘萬鼓而薄其惰歸必大勝報聞罷葢是時相嚴嵩獨貴幸用事數寝抑邊事不以報而見事急則若為開言路有所誅進者将帥當事臣廹誅益入脉居間嵩以免而其進有時賄賄價暴起言者日以益嵩日以重於是沈公飲張丞所泣而歎曰詩不云乎潝潝訿訿亦孔之哀謀之其臧則具是違謀之不臧則具是依已矣亡所信吾謀矣吾即不死而苞苴日蠅然過我而集於西第何也吾不言社稷何頼焉乃抗疏言相嵩父子翼虎鼠社悞國大計請僇之以謝天下太宰阿私亡所異同宜從坐詔以公昔嵗喧譁亡人臣禮今復誣詆大臣自為名廷榜之數十謫田塞外而先是趙先生亦坐他法謫斥矣沈公當田保安倉卒寄妻子廣柳車未有舎而保安賈某者傍睨公曰公非上書請誅嚴氏人耶揖之入徙家而家沈公里長老問知沈公状咸大喜助薪粲而遣其子弟來從學公稍與語忠義大節則又大喜而塞外人戅爭為公詈相嵩以快公公亦大喜日相與詈嵩父子以為常至為偶人三象唐相林甫宋相檜及相嵩而射之語稍稍聞嵩父子銜之切骨思有以報公而侍郎楊順來總督順故嵩客也前大帥某業以選愞避敵俟其解則縱吏士取死人首甚者夜徼避兵人僇之以為功沈公亷得其首主名貽書誚之前大帥恚既得代即以屬順曰是故撓乃公事者丁巳敵大入破應州堡四十餘順見以為失事當坐益縱吏士殺僇避兵人上首功以自解而公復亷得其状貽書誚順語加峻且賦詩及樂府者二或謂公遷人非有言責母為爾公怒曰吾嚮者豈亦有言責耶若視眼在否而欲盲我夫殺人而欺其君以要賞吾誓不與共天順聞益恚以其私人經厯金紹魯指揮羅鎧走嵩子世蕃所曰是夫也結死士擊劍習射将以間而取若父子世蕃曰吾固知之即以屬廵按御史李鳳毛鳳毛謬為謝曰有之竊隂已解散其黨矣鳳毛得代歸遷為光禄少卿而御史路楷來楷又嵩客也世蕃為酒夀楷而使謂順曰幸為我除吾瘍事成大者侯小者卿順則與楷合筴捕諸白蓮教通敵者竄公名籍中以謀叛聞而前大帥時理兵部無異取中㫖僇公籍其家而予順一子錦衣千户楷候選五品卿寺順猶怏怏曰丞相負我薄我賞猶有所不足乎謀之楷取公二子杖殺之而移檄越逮公長子諸生襄至則日掠治困急且死㑹給事中呉君時來上疏論順楷誤國大罪上怒相嵩不及為之地急下緹騎捕治順楷而襄得釋居久之相嵩敗世蕃論死御史維新復論順罪而微為襄理還其諸生今皇帝初詔褒言事者沈公寃始大白贈光禄少卿賜祭録一子太學襄用諸生久次膺貢上春官伏闕上書極言總督順廵按楷殺人姦黨状而給事時亮瓚相繼以封事請詔可捕順楷司冦獄論抵罪始沈公少而讀書有異質從故王伯安先生游先生一再與語即竒之曰生千里才也辛卯舉鄉試又七年成進士為溧陽令其治以摶擊豪强衛赤子為急用伉倨忤御史得調茌平以父憂歸服除補清豐令愈自刻苦有惠愛聲故錦衣帥陸炳聞而賢之請吏部得公為經厯至則與鈞禮不敢以分加公公愈益發舒嘗從世蕃酒所世蕃虐所狎客給事飲非其任强灌之公即以灌世蕃曰吾代客酬也當敵掠近郊時都門閉公急謂陸公勿閉門閉門予敵民矣陸公為言於上而許之所入男女以巨萬計公既謫保安而屬嵗大祲傾橐装作粥粥饑者收百里内骸買地而瘞之其人率相而為祠生祀公公於詩文援筆立就竒麗甚而不能盡削其牢騷憤激之氣往往多楚聲竟以是獲禍其傳者十不能一二人讀而憐之沈公諱鍊字純甫别號青霞山人其死以丁巳之十月十七日距其生丁卯得年五十有一父處士公璧母俞夫人娶於徐有丈夫子四長即襄次衮次褒即死於公難者也最少子􅐆以穉免襄既白報公讎推太學恩於􅐆而身之金陵謁呉君表其墓已復之呉興謁不佞某志而銘之以慰公嗚呼公有子矣銘曰為國擊嵩不勝公徙為嵩擊公勝而公死公死不死神韡韡者億百千紀嗚呼嵩乎蕃乎順乎楷乎死而死矣明文海巻四百六十二
