body:
  text: 明文海巻四百六十四餘姚黄宗羲編墓文三十六忠義黄忠端公神道碑銘文震孟本朝奄禍凡三見王振劉瑾魏忠賢而逆賢之亂幾亡社稷三者未有甚於此則朋黨與奄宦合而為一也振瑾之時小人附之者猶視為旁門曲徑惟恐人知而兩奄祗惡其害己者亦未嘗概仇正人聞之為正人則慕其名而願下之振之於薛文清陳澹然瑾之於蔡介夫王懋學康徳涵皆是也逆賢之時小人附之者視為康荘大道共知共見凡為正人者為小人所惡即為逆賢所仇不必其積怨逢怒於已也夫一人之仇有限以衆小人之仇仇天下而君子始滌地無類矣使其時而外廷之朋黨無與於奄宦一勝一負即君子常負小人常勝亦不過如皇祖之末年而止奄宦之擅權無與於朋黨手握王爵口含天憲亦不過如振瑾之凶徳而止嗚呼新法之行吾黨不為無過使小人計無復之借奄人以報復者則君子激之之過也其時白安黄公憂深慮遠彌縫於機失謀乖之際葢每事必盡其忠告無奈諸君子喬然各有自喜之心未嘗不是其言是其言而不能降志相從卒使公與諸君子同盡吾反覆公先機之智始喟然委之運數耳自東林為物望所歸清議出焉海内謂之正人浙人承三相之衣鉢崑宣附益之與正人為難者也天啟癸甲間主持國是者多屬東林浙人以累勝之餘一時見挫其人每好竒計㑹逆賢挾客氏内收宫中之權猶慮不能無反側者思結外廷以為羽翼當是時内外之勢浸浸欲合雖然范文子曰能内睦而後圖外不睦内而圖外必有内爭使君子無内爭之隙亷耻名節人所共惜何至竊比薫腐自甘涕唾乃内爭迸集於數月之間奄禍黨禍始相須為烈矣阮大鋮長吏垣桐城嘉善不睦大鋮上疏終養借一去以發難公移書大鋮勉之和衆子不去吏垣則嫌隙可弭也古之君子其議論亦多不合其意見亦各有偏念及國家之故則不得不隱忍相成未有逞於一激者也太宰調鄒新昌於考功不由咨訪同鄉臺省章允儒陳良訓起而爭之公為調人於江右髙邑之間冀衰其禍而桐城嘉善待小人甚疎考功又出疏傷其鄉人阮章之禍遂不可遏給事傅櫆結逆賢養子傅應星東厰理刑傅繼教為兄弟阮章合謀使傅櫆奏左魏與汪文言交通状逆賢從中主之收汪文言下詔獄汪文言者以布衣遊公卿間計天下事嘗欲知公公不與見曰夸者死權文言之謂乎至是乃曰文言不足惜使君子之禍由文言不可從劉鎮撫喬計畫得不竟其獄亡何而楊副院二十四罪之草具公曰諌官章入或聽或不聽可姑置之公大臣也一擊不中禍移之國矣副院曰何謂也公曰從來除君側者必有内援公有之乎副院黙然而卒上之逆賢於是杖萬郎中杖林御史震恐廷臣公勸副院致政而去曰公一日在朝則魏忠賢一日不安事愈决裂矣副院曰吾一身生死成敗莫要照管死而有益亦是不妨公曰君子可不顧生死成敗不可不顧出處言既不用在朝何益身名俱全者上也身死名存者次也副院然之深念者數日而令李仲逹過公再决去留公謂李公曰去留當决諸己姑息之議豈肯以去之一言進乎南樂魏廣微者縁逆賢得相其父允貞故以風裁有名於東林由是未敢顯背嘉善因其大享不至将發露之公曰不可昔劉瑾之禍成於焦芳二魏之交過於劉焦使其無返顧之慮吾輩何所税駕乎嘉善笑曰應山擊内魏某擊外魏無論濟否皆後日史冊大節目也公正色曰奈何以國家之事殉兄名節乎嘉善不以為然疏上而廣微悻悻疾視取朝籍甲乙於姓名之上惎其宗人魏忠賢曰此東林黨人公之所不便者也公而視此可舉網盡之矣晉撫缺其鄉人共推郭尚友冡宰吏垣不聽公曰新昌入銓難端未己今晉撫又違鄉人之好抵巇投隙難将復至卒用謝應祥御史陳九疇承二魏㫖言應祥於吏垣有師生之誼私也内批著議而東林之主持國是者一時盡逐從此小人競進呼嵩勸進立祠裂土妖母奄兒榮於四路寒庫檻車填茲俊及此皆振瑾時之所無也而其激而成之者皆在此數月間從公曲突徙薪之謀亦豈遂至是乎然公於二十四罪未上之先䟽言阿保重於趙嬈集旅近於唐末蕭墻之憂惨於㓂盗毫末不札将尋斧柯己為客魏所恨及楊公劾奄公又言小人為惡往往畏人言畏主知則尚有顧忌及其己知之已言之形見勢窮始與士大夫為仇繼将以皇上為注此時不惟臺諌折之不克即干戈取之亦難為力矣萬郎中杖死公又痛諌廷杖非制王振劉瑾為之一二奸人踵而行之後世有秉董史之筆作朱子之綱目者書曰天啟四年夏六月戊戌工部郎中萬燝上疏劾閹宦魏忠賢廷杖一百而卒可不為皇上之累哉公三疏逆賢妖媪皆激烈或請與和平之説異公曰某諌官也諌官遇事則言義無隱避與大臣當休否之任者其設施不可一例也公諱尊素字真長别號白安黄氏其先婺人有仕為慶元府通判者建炎四年金人䧟慶元守臣劉洪道遁通判死之子萬河避亂徙居餘姚之黄竹浦其後七世孫文茂登泰定甲子進士授餘姚州州判從學於呉草廬為髙第弟子入國朝均保為北平御史墀失其官與同邑陳子方死遜國之難又數世璽萬里尋兄三年而遇之道旁璽生諒諒生稔稔生大綬贈太僕寺卿大綬生曰中封太僕寺卿公之考也母盧氏封太淑人公學不專章句肆力於詞賦不名一家舉萬厯丙辰進士授寕國府推官郡中湯祭酒世之所號為宣黨者也居鄉頗横公繩其紀綱不許干吏法考選将行大姓置私獄殺人公按之如始至弗委後來入為山東道御史請召用鄒南臯馮從吾劉念臺諸賢以惜老成請召對以勤聖學而尤注意於邊事凡公所陳皆安攘大計不欲以末務小言暇豫清時也臺省㑹東閣救止廷杖羣奄數百人恣口横詈閣臣俯首不敢發語公叱之曰内閣絲綸要地司禮非奉命不得至若等何為者公身長八尺聲若洪鐘羣奄懾其氣岸皆辟易而去公精典故言事皆有原委中州進玉璽廷議開大明門迎入行受璽禮公曰黨禍将興宋哲宗得璽蔡確等傳會之改元元璽君子貶黜無虚日今天人之數何相合哉乃上言有𢎞治中令甲不當襲衰宋事五星聚張或言張之分野當生異人公曰嘉靖三年聚室占主營建殆有三殿之工耶已皆如公議廵視茶馬出城曹欽程論之削籍奄人李實又劾公家居講學被逮使者至呉為百姓箠死公聞之間道投獄縣令祁逢吉疑其亡命操兵到門公移書曰抱頭䑕竄豈免一死昂首伸眉落得骨香耳君何小視海内男子也山隂劉公念臺追送之見而涕泣不己公祗以無濟國是抱愧而己友朋相愛之情季通不挫之志古今再見公至獄與李公仲逹周公蓼洲周公季侯繆公當時高談忼慨怒罵之後繼以詩歌門人徐虞求私問之公曰子無用戚我我於此豈减黄覇之受書哉逆賢使許顯純以次拷掠李公困甚公考竟次及李公公復就拷許顯純詰之公曰吾忍見李公負病受楚毒乎顯純愍然為之改容公致命之事秘不能詳有商人童徳維出獄語公之子宗羲曰被害之日公與李公隔壁而處公索酒痛飲遥謂李公曰某先行候兄於帝所耳起攝衣北向再拜謝君南向再拜謝父母賦詩一章而後就死葢天啟六年閏六月朔日也明年今上即位魏忠賢以謀反伏誅贈公太僕寺卿賜祭𦵏立祠捕曹欽程李實抵死己上辨李實原疏墨在硃上乃逆賢追取其印信空本命李永貞填寫之者於是以李永貞代李實减李實成之公娶翁氏贈淑人繼姚氏封淑人子五人長宗羲次宗炎宗㑹宗轅宗彛崇禎丙子二月宗羲過余将以是年冬十二月𦵏公化安山請銘懸棺之石往余庚午識宗羲於京口舟中時南都試回出其硃巻讀之余惜有司不能知之後當以古文名世今宗羲及宗炎宗㑹巳皆有文譽詩云神之聽之終和且平公和平之徳其食報自當過於諸君子也銘曰常侍黨錮漢用以亡本朝宦者亦累猖狂亦有黨人盛於神皇未嘗合併故世祚以長熹宗之初厝火伏殃内則奄媪外則𤣥黄兩者欲合曖昧未彰於惟黄公憂來無方惕號同志戒其用剛勿啟内爭化奸為良奈何君子視聽茫茫盲風惡浪敵起艅艎抱薪救火佐鬬逢僵黨禍奄禍遂使相将頌功勸進於莽有光百爾君子寄命鋃鐺吁嗟黄公血染朝裳不以智免不以勇傷碧化名山濤湧錢塘帝曰忠臣三錫龍章千秋萬世下馬徬徨明文海巻四百六十四
