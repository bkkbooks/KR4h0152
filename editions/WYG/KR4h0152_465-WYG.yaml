body:
  text: 明文海巻四百六十五墓文三十七名將沈紫江先生墓碑記唐順之沈氏世官奉儀衛其先臨淮人也有諱葆者髙皇帝時以功授湖廣蘄州衞指揮同知改廣西馴象衞葆傳于忠調奉儀衞景泰間遷奉儀衞于貴縣于是沈氏家貴縣忠三傳至錠皆世官錠以功陞指揮使子瑛襲指揮使娶于鮑生公公既貴而贈祖父皆都指揮同知祖母母皆夫人公名希儀字唐佐以生時紫水出故號紫江自少英氣磊磊雄膽畧廣俗尚弩而公獨精弓射能挽强命中正徳三年襲指揮使年十八掌衛印八年剿木頭十二年征永安剿陳封所至常先大軍摧鋒毒弩中膊中股陞都指揮僉事十四年征府江剿滑石殱之奪還賊所擄掠剿義寧桑江杉木諸巢深入親斬大酋一人首虜多礧中其顛十五年征古田先登奪隘為多陞都指揮同知掌司印嘉靖五年剿龍山深入是年田酋猛叛五哨進兵公自請當中哨奪其隘而潛結猛婦翁歸順知州璋使内間猛以走死田州平功最己而追殺猛弟禮于陣跌馬折左脇骨六年陞思田參將七年剿落春多首虜八年調柳慶參將居二年謝病明年而復為柳慶參將帶鏢佩弩箐箭聫絡環廣右為巢者以千數柳慶最勁小刼大掠燒城掊庫無月不有廓清為難擅地擁兵殺生恣睢環兩江而州府者以百數江右最勁喜人怒獸籲黨鬭讐無歲不有鈴轄為難公御諸猺蕩巢摧壁不專以威綏緝善猺視同吾人是以諸猺畏而信公御土酋解紛排難不專以恩洞其隂事坐豶其牙是以土酋睦而懼然則世雄之與烏合情狀各異攻心之與奪氣變化亦殊猺賊慮其散走聚其黨而獵之則公之所以殱淥里也土酋慮其藪衆散其黨而孤之則公之所以縳岑金也在柳慶先後十三年所剿皂嶺懐縛二層馬峽火黄馬輦七山曇應諸谿峝凡五十餘所獲覃韋鄧雷諸大姓渠帥或馘或磔或剜目截耳縱之凡數十人首虜積至五十餘級身為大將常先登散家財為賞得狼兵死力尤善用諜兵行所向雖肘腋不得先聞或己薄賊壘賊尚醉酒齁寢入其巢未嘗妄殺是以動輒成功柳人徳之比于山都督雲為木主而生祀之以配于雲祠十九年復謝病二十年起為都督僉事搃兵貴州居二年謝病歸二十二年北敵大入邊召天下名將至京師公在召中而佐戎事于宣大遂搃兵江淮二十五年調搃兵廣西公為參將嘗奏言於朝曰狼兵亦猺獞也猺獞所在為賊而狼死不敢為賊者非狼兵之順而猺獞之逆其所措置之勢則然也狼兵地𨽻之土官而猺獞地𨽻之流官土官法嚴足以制狼兵流官勢輕不能制猺獞莫若割猺獞地分𨽻之旁近土官得古以盜治盜之䇿可使猺獞皆為狼兵矣或慮土官地大則益難制土官富貴己極自以如天之福勢不敢有他望又躭戀巢穴非能為變即使為變及其萌芽圖之易也且夫土官之能用其衆者倚國家之力也不然肘腋姻黨皆勍敵矣國家之力足以制土官土官之力足以制猺獞臂指之勢成則兩廣永無盜賊其論甚偉然世莫之能用也公善揣事情練於當世大計然世獨以能將知公公為將其竒䇿逺筭世亦不能盡知然世獨以膽勇敢戰知公耳初田猛既誅督撫議設流官公曰必且挾思恩為變矣十八年立堡弩灘以控峽賊公曰賊據其險我乗其衝此與投肉虎口何異後皆如所料公既連為賊所中每隂雨輒痛自為參將數以病告製道冠山人服治生墓而時徃遊焉自江淮徙廣右也以書來請余記余復于公曰古之為將者據鞍矍鑠至老不敢言疲若乃自為塋竁臥而飲酒此山澤自放者之所為也二者甚不兩得而公乃欲兼之邪雖然公之志則逺矣公為人精悍其臨敵目光逆射兩顴頳色挺刀一呼人馬辟易其平居嬉怡謔笑臧獲輿庖無不歡然處族人雖讐至相賊殺不記更厚施之與人交重然諾腸胃如直繩一視可盡至於臨敵應機腹裏谿谷飛箝網絡神鬼不能測或誚公譎公曰吾譎賊耳非譎人也知公者以為然配帥夫人子三學有父風其次覺次黌俱業儒所治生墓在貴縣城北其地曰廖家井南望淥里北睇龍山左黔右鬱兩江縈紆皆公曩所揮戈軒級處異日有過公墓者得毋慨然而思乎且夫古者人君尊寵立功之臣則或為之象祁連山象鐵山于其墓以旌其烈于不朽公平諸猺清廣右猺中多大山則宜何象然天子方且駕撫四夷以大事推轂公公所建立計不止西南一陲也其所象葢未定云明文海巻四百六十五
