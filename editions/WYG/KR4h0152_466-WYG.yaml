body:
  text: 明文海巻四百六十六餘姚黄宗羲編墓文三十八方技韓復陽墓碣胡翰吳郡韓奕既𦵏其先君子某于郡支硎山之陽己而以墓石乆未有辭于是言于金華胡翰以疾未能趨命致書來告曰奕聞之公卿大夫貴而在上其賢可紀人巳知之雖殁而自足見於世惟窮在下者有善而人不及知知而傳不及逺無以自見於世則於法宜得銘昔朱子有是言而奕之先人不幸踐之奕為此懼願先生有以貽之以葢其不孝噫何言之悲也是用叙次其事韓氏系出魏國忠獻王故安陽人宋末始家於杭徙於蘇髙祖至君遂為蘇人君之曾大父曰某大父曰某而曰某者其考也妣唐氏君諱某字復陽少孤奉母以孝聞于鄉里鄉人以能子稱之力學好古尤精於醫家之説為人治疾由江而逹於淮周逰貴人長者之門所全活甚衆所至必求當世人物魁偉特逹有才藝者承其下風即庸衆無所取長雖富貴人以富貴視之不屬意也淮隂龔遂昌鄭元祐在吳中為士林之望獨折行輩與君欵洽四方来者問吳中士兩人者以君為稱首於是人知君之於醫葢寓也元之始亂張士誠據蘇州恐衆不附大結人心引士類為己用或强君起君固以母老辭母亦遽曰是不可起也藉令富貴如汝家世何訖不就退然以奉親教子為務年五十在母旁依依若孺子居圍城中食飲必適母常愉愉無不堪意疾革囑其子奕曰善事吾母吾負阿婆矣遂以洪武四年某月日卒以是年六月日塟春秋五十有四娶唐氏先卒子一人女一人女亦先卒子即奕也其孫曰貽君為人性剛而色温見人有善欣然動眉頰有過則面質之人始若不堪而心卒愧服嘗論醫以為醫之為術與儒者之學皆出古聖人而後世粗工皆庸妄去聖人逺甚以庸妄業聖人之事又不習其書又不資于儒宜其失之者多矣吾所以求賢豪之士意必有隱者焉及君得烏傷朱彦修所著格致論推本黄帝靈樞素問以為説犁然當于心時彦修没巳數歲君迺命奕從其門人盡受其術奕讀書未嘗識余其于不斐之辭何取乎而欲寄重焉余觀君之在吳雖不有位為公卿為大夫其平生砥礪自可為縉紳學者稱道公卿大夫用事者一時若甚炳烈茍怵于利害臨變故俯就折辱身殞名滅雖鄙夫賤人皆得唾詈焉其得失相去為何如也故君子之可貴者甚於爵祿矣奕也何患其不傳哉乃銘曰有相之術不用於國用之靡疾遭世大擾不屈于暴處之有道孝思孔樂奚不可作近乎元宅則有子是若顧雲屋墓銘趙吉大明洪武十有五年九月初六雲屋先生卒于鄞之定海崇丘鄉其伻馮安來赴吉則與吳剛陳鑄哭于陳慎家且召方暹㑹哭明日鄭相張徑駱誠来予于陳氏又哭十二日吉則率慎暹走鄞致奠賻既而其孤觀衰絰拜泣以墓誌為請義有弗可得辭遂求譜牒及所藏書于其家乃得其家誥命三通以知其曾祖祖考之所自得玉山名勝集十巻春夜樂唱和一軸以知其家世貴盛之由得交誼巻二軸以感其好賢尚義之篤得游剡贈言靜得齋鶴夢詩文各一巨軸以感其雅性逸情之實皆名卿韻士仙翁佛氏一時之選者凡三百餘人其不在軸帙而散積于几格間者不與噫何好竒博學樂道人善之如是哉夫處富貴而不驕不淫居貧賤而不凟不辱非知道而孰能若此是宜銘遂序而銘之先生姓顧氏名園字仲園雲屋其别號也其先吳縣崑山望族曾祖諱文儒贈某搃管祖諱文顯武備搃將軍上海等處海道運粮千户贈萬户侯考某妣盛氏贈大興縣君先生生而聰逹勇鋭有逺志不羈讀書一過即記不㤀然好武不顓於學年十六北游燕都出入王侯將相門晝則相與馳馬擊劍射博取勝夜則邸舍兀坐一室開百氏諸史觀書法名畫有得然後己凡三徃返乃得朝命襲父爵為千户侯所厯有績未幾遭時弗寧南北隔阻因卜居定海葢樂其山水之勝也遂杜門謝世事痛刮去舊事絶嗜慾刻志文藝卒以善畫名于世不喜作詩然時出一聨半篇輒清竒駭人其畫尤為世所貴尚識者以為不減虎頭筆法改物以来恣游鄞越山水間不妄交接嘗有權貴人欲一見之時夜將半遽踰走避好周貧濟急而未嘗取受毫末于人性剛直或折人過失而人服之卒時年六十二先娶姑蘇應氏再娶杭之陸氏一子觀陸出也觀將以某月日塟塟地未兆謀買山於崇丘鄉顧嶴之原謀既協而貲未辦馮安將謀諸與先生交游者吉則曰可俾成之銘曰少而勇勇於武壯而仕仕乃阻克奮于學師厥古徳施不昌以昌其後劉允中墓表解縉劉守中河間人宋末𨽻籍於金天下重其醫術稱劉河間而不名其醫上與長沙相接下與郾城為宗郾城得麻知幾為作儒門事親書能發明河間之旨世皆喜傳之予嘗過郾城求其遺跡訪其士人咸謂知幾能文然不甚知醫故其書多遺獨劉河間自能著書若宣明直格之類行於世者甚多然又皆非其奥也其子孫後遷江南必有得其傳者予因記少時聞吾縣先輩劉君允中有河間秘書從其子日升所借讀而嘆之曰吾固謂河間當有秘書嘻其是矣日升泫然以泣曰先子之所屬也系本河間而莫詳其世數矣予以質之家君君曰有之初允中之祖芳茂自河間徙居江州宋季逹泉梁先生以醫遊江州義同倫合與俱歸吉水焉芳茂生德榮榮生允中子七人允中其季也淳厚寡言恪然忠信撫孤濟貧不為徳色至元中為吉水醫學教授壬辰之亂遇賊於鄉刃既及之有數人大呼而前曰是真善人何可殺也得免所至盜不忍害論其學行葢無愧于河間者也予竊識之允中入國朝醫術尤振治無不愈不獲迎至以為枉死連郡人敬信之車輿騎從常絡繹不以早夜絶其門尤通習地理百家之言不自炫耀退然若不勝與人言如恐傷之生延祐甲寅十一月二十六日没以洪武癸亥四月八日配李氏子方升醫有名江淮間先卒繼李氏有家法亦習于醫善訓戒其子文升復升日升其季也君没時尚少能自力於學後二十三年以書選入翰林始克狀其行請于予曰知先人莫若君先大夫先大夫巳矣得聞論説宜莫如君余徃年嘗欲輯次允中父子所治竒病異效事繼太史淳于倉公傳因循弗果為今亦未暇細也姑述其所聞大略為之銘曰昔在河間卓哉守真著書傳術千載一人孫在江南書傳允中謂藥非補而惟主攻去病而己百發百中譬之用兵豈必持重我欲傳之著其治功後有作者其書可宗沈學士墓表楊士竒嗚呼此吾友翰林學士沈公之墓沈世家松江華亭大考諱德輝嘗為郡吏平反寃獄百數十人鄉稱長者妣宋氏考諱易仕為諮議參軍無幾棄官養親而授徒里中惇行倫誼集五倫詩以教學者而甘貧樂義人號苦節先生妣顧氏有善德二子長即公諱度字民則次粲字民望公天資温雅敦實自㓜嗜學博涉經史洪武中郡邑交舉文學弗就坐累謫雲南䟦涉萬里處患難其中豁然時同謫者多名人率與公交逹官重帥爭欲迎致公舘下岷王具禮幣聘之既至屢進直言居無幾辭去都督瞿能知賢下士延于家塾為弟子師旦暮躬請益焉其入京師也以公偕行時太宗皇帝初臨御命翰林舉賢才今禮部尚書江陵楊公為編修以公名上擢翰林典籍時方制勑填委既視草學士以下率分書之上獨覽公書稱善一時翰林善書如解大紳之真行草胡光大之行草滕用亨之篆八分王汝玉梁用行之真楊文遇之行皆知名當世而胡解及公之書獨為上所愛凡玉册金簡用之宗廟朝廷藏秘府施四裔刻之貞石傳於後世一切大制作必命公書公之書婉麗飄逸雍容矩度兼篆八分八分尤髙古渾然漢意而日侍清密無間嘗賜二品金織衣新製象笏鏤公氏名塗金以賜以其弟與子皆善書皆官之近侍父子兄弟並榮於朝古今以書遭承寵遇莫或加公書葢公一藝耳為文章尚興致平淡雅則不為浮靡事上必盡誠被顧問必以正對由典籍陞檢討復陞修撰遂陞侍講學士奉直大夫仁宗皇帝賜誥命進協正庶尹贈其考奉直大夫協正庶尹翰林侍講學士其妣宜人予誥歸焚黄賜鈔給驛傳宣宗皇帝臨御進翰林學士奉政大夫年踰七十再上章乞致仕歸不聽公事親孝與弟粲友愛相篤終身與人交乆益敬為人貞靜不茍附初入翰林鄉人有為大宗伯者得君有氣勢赫赫朝士希進者日奔走其門公以故舊獨自守未嘗輕造間或邀公輒以禮辭士論髙之閒暇閉户焚香鳴琴賦詩以自樂人號自樂先生襟宇澄澹風韻蕭散所好惟載籍法書名畫古器自題其齋居曰樂琴書處襍列花卉竒石髙人韻士至必具觴酌或吟或奕意度翛然所作詩文有滇南藁隨筆録西清餘暇自樂藁藏於家年七十有八一日微病猶作和王行儉詹事小洞天詞明日捐舘宣德甲寅十月廿二日也訃聞上遣禮部郎中陳謨賜祭給驛舟歸喪命有司營塟元配顧贈宜人繼陳子二芹先十五年卒藻中書舍人陞大理右寺副孫男二潮秀敏好學先十年卒次源女三長歸俞珙餘在室曾孫男一士竒與公同入翰林相交三十有三年最相得其没也葢哭之慟于是粲及藻求余表墓余忍以衰朽而㤀情老友哉敬為之表陳思孝墓銘楊士竒永樂甲申詔吏部簡士之能書者儲翰林給廪禄使進其能將用之清密之地長樂陳登思孝篆籕最先至時吳中滕用亨待詔翰林工篆籕自視天下無愈己者且恃春秋髙輕後進徃徃折屈之稠人廣坐中思孝初至謹黙謙下用亨連三日折之文淵閣六卿大臣皆在旁眎不可耐思孝怡然從容進曰登幸辱在此親教益愚陋願有所質就用亨語之戾許叔重者十數事相辯難思孝道許氏說文娓娓皆用亨素所忽者用亨乃始黙黙斂鋒鍔不復自矜大思孝聲譽遂起時四明王尹實篆書擅名海内至考據精博亦推讓思孝云思孝于六書本原精考詳究志篤而力勤周秦以來二千年間其石刻有在而委棄山顛水厓荒蕪瓦礫之墟者皆深求而必得之雖殘缺剥落歲月氏名無可考然審度其出某代某人十率中七八其收蓄之富蓋歐陽文忠趙明誠之後所僅見也思孝初舉才學為湖廣羅田縣丞數月改浙江蘭溪丞月餘又改江西浮梁丞所至視民如子務寛恤之而明决以革奸弊在浮梁時房安為江西按察使以嚴憚屬吏獨禮遇思孝歲餘丁内艱去服闋遂選入翰林仍給縣丞禄厯十年擢中書舍人朝廷大題扁率出其手而四方求者無虚日未嘗有厭倦意又十年給告歸歸而疾作又四年還京還兩月疾復作遂卒宣德甲申七月十五日也享年六十有七其為人博學謹禮耿介負直氣是是非非率依義不肯媕阿假借雖屢以是召怨不悔極貧薄而勇於為義曰人道當然也其先居光之固始唐季從王審知入閩家福唐之玉融數世徙長樂宋福清令世榮思孝髙祖也曾祖宗振祖嗣朋父仲逹洪武中厯宜陽韓城兩縣丞陞江山知縣皆有惠政江山民尤徳之母某氏其配髙氏先卒其子男二中旉同旉女一嫁丘汝中孫男一維楨女四思孝所用心六書今得其所傳者吏部郎中旴江程南雲于是中旉奉史官陳叔剛所具狀介南雲求余為銘將歸而納諸墓余雅厚思孝義不可辭銘曰六書之教周典傳史籕所作時同文逮于秦斯古尚存邈趨簡便降𨽻分東都沿晉騖草真傳葩逐葉失本根唐宋復古稽前聞後有作者承餘熏思孝之作溯深源竒跡密義窮寒温涵積而放波瀾翻落手揮霍風雨奔交金屈鐵雕璵璠雄渾傑特時絶倫大書深刻盤繡雲嗚呼思孝今九原有偉其著垂不刋琴樂先生墓誌銘岳正琴樂先生年五十有八當景泰六年十二月九日卒于家其嗣子前戸部主事延津典史琮卜域于京城東南八里許髙村里原將以其月十有九日禮而􅉎之其子婿中書舍人江容宗海買石以誌其墓其表姪翰林編修童縁大章狀其生平以求刻辭于予予及第之明年頒己已之朔禮成而觀其書書二至之晷有晝夜六十一刻之文即怪其故退而求古諸家厯法無有也先生時為五官司厯予雅相知者主事君又同進士因以所私問之先生曰子以為何如予曰天行最健日次之月又次之以月㑹日以日㑹天天運常舒日月常縮歴象以其舒者縮者之中氣置閏以定分至然以三百六十五日四分日之一之日乗除之積三歲而得三十二日五十九刻者其法常活以三百六十五度四分度之一之天分南北二極日行中道冬至行極南至牽牛得四十刻為日短夏至行極北至東井得六十刻為日長春秋分則行南北中東至角西至娄為晝夜均均者各五十刻也其法常死死者必不可易而活者不能不變故古者以厯名家者必以其變者立差法以權衡之則變者常通而死者得其所矣有如今厯也者毋乃不揣其本而齊其末也歟先生曰如子言誠然予曰若然者先生將居其職而不與其事邪先生掀髯笑曰能者不必用用者不必能又何今日咎也又曰厯者聖政之所先本也茍以私智撥之能無揺其支乎予始悟當時用事者方赫赫必以先生為忌己而果有土木之變益以服先生之髙識矣既又自念漢志五星東井之聚不能避髙允之陋身為史官天文家不可不一知之也方圖就先生而學其所能不意先生竟失官屏居予亦不幸丁倚廬之禍不獲朝夕以亟見承教嗚呼今以銘先生之墓其奚忍也邪先生姓王諱義字孟宜自號樂琴先生世為吳人髙祖某曾祖某祖茂華皆居杭不仕考文誠妣斯氏先生生永樂中行役京師受㕓赤縣為大興人正統巳未徵𨽻欽天監丁夘拜官庚午受褒典進階修職郎辛未而失之配張氏允宜厥家嗣子一即主事琮女一婿中書舍人容也先生為人謹飭典雅博古多能好琴瑟每焚香撫弄翛然有塵外之想然不善與時俯仰竟為邏者所中而失官云銘曰京城東南髙村里原崇四尺者先生之墳敬告來世刻我銘文元故成全郎江浙官醫提舉恒齋葛先生墓表祝允明士抱賦頴粹砥行修業綜古聖人經術固將以自効逹志用時兼濟上下流華于方來也或世代戾契既不能用于是背廷闕面林臯吾志己矣然而澤物之仁函乎中活世之方寓乎手緬觀斯人有病心惻乃有智者舉而試之雖地隘施小吾且應之亦有以發志成效不孤天禀為聲永身後則獨非君子之心哉是亦君子之道也采籙瀕訖竒傑之士散落草莽者何限吾鄉尤衆其稍出効用于勝國雖百售一二固稱于時以貤于後不可誣也若葛提舉先生其最也先生業行與其蹈履有黄文獻公晉卿誌墓之文其裔孫懌比治飭遺冡以文在幽不得外暴雖人多憙傳録故不普因斵穹石掲其前特請予屬詞刻其上因撮黄志大略為之叙云先生諱應雷字震甫别號恒齋世平江人大父曰宣義郎思恭父曰進義校尉從豫先生私受周禮于季父某為舉業業成而宋亾無所用之進義故儒者而學多能通九流百家醫尤工先生既無意干禄儒業之外遂專治父所遺醫法黄帝樞素諸篇搜抉研核無餘力自得甚深以為當世所謂醫者株守近代意見論病執方如檢畫一絶不識原委誠異古法乃推運氣之標本察隂陽升降之左右以定臟腑虚實而合諸經絡氣血之流注於是疾病之候死生之期無能逃焉從而立方法為之湯液砭焫自不能雷同他人竒效乃著聲華日騰焉時浙西提刑按察使判官中州李某推醫名嘗治其父疾亦致先生决之先生為之語云云李父子驚相顧謂南方乃亦有斯人乎因盡發藏書河間潔古諸説相共討尋凡先生之語無弗諧合去益以其道行南方之醫始能言劉張法者先生啟之也先生嘗謂守真若子和當女真强盛時人氣勁悍故宜多用宣泄逮其兵饉衰殘之餘民瘁氣困于是潔古與李明之輩乃加以補益此其下工也宋既杪末醫多襲目見務守護不能為攻伐是謂養病非治病此由不知醫當視時世盛衰不知變通者也故所著書曰醫學㑹同凡二十巻大旨類如此于時近逺病家乞治無曠日幣馬塞門大夫士内交益衆皆敬禮推譽大德十年遂被薦授平江路醫學教授先生亦不辭為之治田疇嚴廟祀教育其徒徃徃去為善醫無幾省臺交舉擢江浙等處官醫副提舉進提舉階自醫愈郎至成全郎延祐之某年也至治二年以内艱歸執喪過毁竟不久卒於家三年正月十八日也享年六十其子乾孫以泰定元年春二月二十八日塟之于吳縣至德鄉望墅墩先域之次乾孫字可久其學得諸先生而發之益竒取績轉神異世傳不衰吳中視為文獻家自先生五世乃至懌與予至善故墓文不得辭系之曰士惟無所可見見之或無本抑淺局故其所及名實廣狹以之有如先生劌心羣經且將用周公之典以輔斯世既不果退用其餘以被物亦取十全功葢亦得上古聖人之秘其震于時而引于後何如也黄公謂先生既棄去時業更以詩授乾孫又云先生質和粹識量明逹外嚴内寛孝友篤於家而惠賑澤在閭里然則先生誠德人偉丈夫文獻重吾邦邦人世當重之豈獨其子孫恭慎乎丘樹而巳也沈希明墓誌銘史鑑沈先生吳人也性嗜學于書無所不讀尤長於易及老耼莊周列禦冦之言縱横鈎貫汜濫浸漬大得也其性靜其志專其行潔性靜故居四通五逹之逵望其門悄然履其庭寂然上其堂閴如在山澤也志專故自壯至老守道彌篤不惑志于富貴不改節于貧賤不吝情于去就其介然之分確乎不移也行潔故一介之利不以取諸人一力之役不以煩諸人人請教子弟則徃請與燕游則未嘗徃也其見先生者不與之言先生終日不言與之言則世道之升降物理之變遷人事之得失若决江䟽河而注之海滔滔汩汩莫有終極也中歲常用薦者言起試禮部一不利即歸杜門不復肯出市人罕識之惟鄉先生少詹事劉文恭太僕少卿李貞伯南安守沈行敏陳留令王抑夫布衣杜用嘉賀美之時與交徃初先生遇秦僧𢎞慈濟授祿命及飛白秘術其書不肯示人間與一二知者衍其説自以為天下之人莫能逾其祿命曰格局格之數三百有六十局之數萬有一千五百二十格有相同局人人異且世運無窮造化迭變前乎甲子之一周後乎甲子之一周其間干支雖同夀夭富貴貧賤不同也而今之術者以一定之説槩之宜其不騐矣余之所謂八字者元㑹運世年月日時也非世人所謂八字也曰五星自唐一行創為十三家之言其應各有時在唐為厯象在五代為轆轤在宋為殿駕南渡為喬奥在元為耶律在國朝為空實徃者如彼來者可知也其飛白曰定位曰飛流曰直殿曰交㑹得此失彼未為全利也若吉凶參焉則以其要者為用舍世之所行惟紹興數即定位耳其三者無聞焉此其大較也其他因事徵騐觸類引諭更千數百條辭多不能盡紀𢎞治六年先生年七十七正旦忽謂妻子曰吾將死矣問其故不答至三月盡焚所秘書囊其灰投横澤水中五月病作預剋死日曰我必以乙夘日寅時死既而果然先生諱誠字希明父諱彦中母某氏初娶周氏生一子曰孟母子皆前死再娶丘氏生二子曰雍曰泰以某年月日塟先生于太平鄉梅家灣先塋其門人都穆哀師之道不行恐死遂冺滅無聞買石請銘于史鑑鑑最為知先生且數接其言論者也銘曰衡門卑棲其蓄不貲從者如雲虛徃實歸先生己矣人誰將諮太虚冥冥不死者神招之或來莫聞其言我銘無愧以告後人明清狂郭君墓誌銘劉節君名詡字仁𢎞姓郭氏自稱于人曰清狂人稱之亦曰清狂志其素也清狂生有異質魁岸頎麗肌媺白如晳性豪逸不樂縻束賢人髙士與處意傾洽出肺肝相示貴逹挾矜傲不欲見見不欲數數徃語不合望望去不顧旅食豫章慕徐穉蘇雲卿風構亭湖上曰二夢間為蹋跼鬬奕擊筑鳴瑟響歌放遊騖駟豢􅆐諸戲示不羈識者知其有所遁也少時與同舍生師師肄文藝稍試燦然賢習業者無何輟而嘆曰夫務浩觀者遂瑰瑋之思者也立極藝者著周旋之跡者也拘學則不然循咫尺之諷誦市榮當世此與蛭螾何異喪四方之志矣遂棄去體極其能於畫乃南窺九疑踐衡嶽轉溯建康東入吳越折北度淮經汶泗吊古齊魯之墟觀容尼父之堂極抵帝里遡代汴荆楚以歸曰畫在是矣爰肆手模即成畫興神竒妙發於聲詩詩不盡肆為畫畫不盡又盡于詩好為抱膝辟榖諸圖多以自貌寓其逍遥之想世莫之測也時楚人吳偉吳人沈周燕人杜堇擅能畫覽清狂畫退避延頸願交焉藝苑名籍籍起海内競傳清狂畫購畫百金嘗畫羲農周孔及古列賢像攝衣巾俯伏從事貌聖儒如圖史所記若有神授者南海陳白沙髙蹈一世徃謁之甚見禮遇豫章張學士東白在告僑居湖亭時數見親洽一日擔夫某倚賊東白門問故對曰小人乏食覯清狂畫畫畀我貿米食食足喜故竊視公東白曰清狂知予矣隆貴人恃勢欲多得畫心繆之卬首瞠目數屋梁不對盤金固索即跮踱狂趨叫奡跳號去隆貴人大笑曰狂生狂生中常侍蕭敬最近倖異其能㗖以錦衣世祿假他故辭卻敬不能强先寧康王荆和王好術學招致賓客獨以方外服見風度逸曠王望之類有道術者呼曰清狂道人厚贈金為飲食費則散諸兄弟朋友及當意者所得亦緣手盡焉家人諷之子貸金錢豐生産怒麾去少保尹公文和解相里居引為㤀年交比應以下闕章篔谷墓誌銘王世貞章叟諱文字簡甫後以字行其先自閩徙而為吾吳之長洲人趙宋時己負善書名兼工鐫刻而叟之大父㫤父浩尤著至叟則益著叟生而羙鬚眉善談笑動止標舉有儒者風寧庶人國豫章慕叟能而羅致邸中與故知名士唐伯虎謝思忠偕伯虎覺其意陽清狂不慧以免而庶人卒謀反挾叟與思忠從行謀脱身不得至中道乃盡出所賜金帛予守者弛之夜分偕跳宵行亂軍中幾死者數矣裸袒二千里而歸謁其父相抱哭時叟年僅三十自是其萟益髙貲亦小裕葢又十年而復游豫章時朱邸諸王孫故亡恙素聞叟名爭延致為上客叟飲醉間游庶人故宫徙倚嘆息歌黍離之章作羊曇慟而後返吾郡文待詔徵仲名書家也而所書石非叟刻不快待詔每曰吾不能為鍾成侯戴居士手自登石章生非吾茅紹之耶紹之者趙文敏客也而是時祝京兆希哲王太學履吉陳太學復甫彭徴士孔嘉有所言亦必屬之叟叟他所摹刻華氏真賞齋帖陸氏懐素自叙孫氏太清樓右軍十七帖其能奪古人精魄如生動即搨者贋古得善價而其人莫辨也郡歲遭倭亂修塜墓者多叟日以困而故分宜相欲登肅帝所賜制書劄諭於石而聘叟徃留相邸四歲而後歸分宜敗邸客無得免者於叟略不濡人謂叟善為客徃客寧庶人不死今客分宜相復不濡叟笑曰吾嚮者以智免今者以廉免叟性好客雖一室亦必潔治庋閣圖籍彛鼎之屬客至相與摩娑盤礴嘆賞少時則呼茗茗己呼酒酒至命炙諸賢士大夫如待詔輩磬折而入委巷不避也叟好客且時時從博徒游所得貲隨手散盡至卒而不能具喪禮其明年仲子藻為人傭書强自力以倡其伯季塟叟於武丘鄉采字圩祖塋葢萬厯甲戌之三月也翁以𢎞治辛亥生得夀八十有二娶劉氏側室周氏子三人草娶朱氏藻娶周氏芝娶沈氏女三人嫁吴銓髙某孫枝孫男女共若干人叟不欲自名其書而楷法絶類待詔嘗為待詔書三乞休草家弟以為待詔也示藻而後知之三子皆能習叟業藻於書尤精客吾家久葢葬之十年而始謁余誌且銘之狀草自錢處士元治銘曰跡乎藝心乎士食乎徵仲氏何以不朽惟藻意元美為之銘且誌明文林郎大理寺左寺左評事研山顧先生墓誌銘陳所蘊嵗萬厯戊子顧廷評研山先生卒其孤九斿等貧不能舉窀穸越三載始克襄大事圗所以不朽先生者而以朱文學季則狀来徵銘嗟乎仲宣告殂子建表徳孝若云亡安仁述行銘惡可辭哉先生姓顧氏諱從義字汝和松江之上海人也顧氏自典午時即望于東吳元末有友實公者居邑淞宅里後徙邑治四傳而廣南守英起家明經拜二千石顧氏文獻始此矣子澄䝉故業家益阜昌澄子二長東川公定芳官御醫次上川公世芳官署正其后御醫以伯子從禮貴贈光禄少卿配李贈宜人實先生之自出而署正之得階儒林郎與配周之為太安人則以先生為所後贈封皆以先生貴也先生生而端重聰明絶人讀書過目輒成誦顧不喜博士家訓詁語喜戰國先秦諸書晉魏開元以前諸大家詞賦及古李斯程邈篆籕文日坐烏皮几伏讀而摹畫之遂以筆札擅長葢自天性矣㑹先生父兄宦京師遂為太學生嵗庚戌有詔六館士端行善書者入直文華殿先生首應詔故事殿直選率從中貴人第甲乙中貴人第責金錢多寡為殿最不復校藝工拙人皆以貲進而是役也肅皇帝實稱制決焉御筆署為第五授試中書舍人葢異數也當是時殿直諸郎多賈人子炫服怒馬鳴騶呵導揚揚得意甚不知所課何業先生抑首受策供事惟謹故衣羸馬恂恂書生耳己奉使留都便道歸省適上川公捐館舍遂以憂解官時上川公業巳舉子從周先生後公自若公故多藏比歿而周安人􅋵家柄無所分予僅提空言執三年喪知交或有後言先生苐擗踊號慟而己開府曹公某雅集先生行部至縣謂令劉曰吾聞顧舍人貧甚為人後而不能名其父一錢令奈何不為持平令出亟語先生將收其家監問狀先生避席對曰先君子故無餘貲即有之始念不及此且從義幸得以文墨侍天子俸入足自給即貧未至填溝壑奈何以此傷太安人心願明公毋復出口異日猶可見先君子於地下令乃止不窮竟也而開府公聞之亦多先生長者矣除服還守故官肅皇帝坐西齋宫效甘泉宣室故事祠祀上清太乙諸神祝詞不領於祠官特令儒臣撰青詞舍人執筆書簡策諸舍人以為華惟是制誥兩房以給事輔臣故得與選殿中舍人體稍卑不得與而先生獨為肅皇帝簡任即日召八西内與兩房諸舍人同直齋宫先生既入直益勤敏不懈旦夕含毫搦管非賜休沐不出也而書法精工尤稱上意一時金泥玉檢文書出先生手數被寵賚踰於諸舍人無何穆皇帝即天子位以久次遷大理評事時禮官請祀天下岳瀆則以先生陪祀海岱先生為趣治裝登泰山日觀峰觀日出臨海而嘆秦皇漢武之愚曰惡覩所謂海中三神山盡幻妄耳己于事而竣則下榻白雲樓與李于鱗相唱和遂遡洙泗上鄒嶧山過故闕里為低徊不忍去者久之比以便道歸里中則與太安人喪㑹復以憂解官先生久宦减父産居然食貧獨其所以治太安人喪一與弟從周等不以貧困為解人復謂從周私太安人貲者先生笑曰不佞利金錢為人後當藉手開府公矣聞者韙之先生之撫從周備極友愛門外事悉以身任不令有支禦憂從周卒而所遺孽子起方在襁褓人皆為起危賴先生護持謹幸而有立此其故即起不能知惟先生亦不欲令起知也服除復守故官㑹今上登極奉璽書詔諭滇南滇帥沐黔國以百金為先生夀先生謝曰陸賈使尉佗受佗千金裝以為辱國從義即不肖何敢效賈尤以王命為市却不受既報命嘆曰予幸得以薄技載筆三朝日請俸邑餐錢尺寸無所報稱三奉使節馳驅齊魯吳越荆楚滇蜀之郊予倦游矣仕宦不止車生耳予其歸乎遂上書乞骸骨優詔許焉先生即日解進賢冠挂春明門服山人之服而歸是時伯兄光禄汝由仲兄鴻臚汝修業先致政歸先生歸而家自為社相從杖屨飲酒賦詩先是潘恭定公與弟比部别駕光祿先後歸稱潘氏四老至是人以先生并光禄鴻臚而三為顧氏三老矣先生故與徐少師有連先生絶口不道或以居間請必峻謝却之己少師公歸而有修故恡者嗾直指監司齮齕公里中羣不逞遂以徐氏戚為竒貨挾取金錢而郡邑有司有所承望狀牒非連徐氏戚置弗署以故里中争訟徃徃籍先生名速先生于訟先生時時囚服對簿當事者欲螫先生以希上㫖陵誶侮詈無所不至出則諸惡少手磚石隨其後且擲且詬先生自若也第問平頭奴猿鶴無恙責園丁樹梅種菊耳語在朱太學邦憲二記中皆實録也先生與人交落落莫莫不作囁嚅態乆而不㤀平生有故人某子甲麗重辟先生以廣栁車載其子出都門變姓名俱歸里中為築丙舍居之人比之魯朱家云先生篤志慕古又精賞鑒所畜鼎彛罍甑甗鐓璧刀劍匜盤皆三代以前物書法名畫非妙絶神品不居居恒好購古帖善本得即摹勒上石無論淳化定武膾炙人間即硯旁小品好事者亦購之如吉光片羽矣先生性尤好石嘗得米元章硯山而寳之遂以硯山為别號復購梧臺泗濱諸恠石列盆中為小山山隙樹松栢橘柚栟櫚芭蕉諸種髙不盈尺而扶踈偃仰居然有千霄薄雲勢先生日婆娑其間手自盥濯以為樂性尤巧慧衣履綦帶每以己意緣飾古制為之嘗製癭匏石竹芝五冠吴門王百谷為作五冠贊又以卭湘粤衛曲竹為杖為几為簪為如意為鈎并其身而六為六君子則四明沈嘉則傳之里中少年浮慕先生名每一製出輒争相倣傚然終不能及也居恒好客客自逺方来望先生如赴家歲入不足則典裘帶稱貸子錢家而家故勤織絍織布美有蘭花菱花紫花天水碧諸名賴是有以佐客驩客日益進而先生之聞譽亦日益起矣先生善稱詩詩法陶韋所著有荆溪唱和重㳺荆溪稿滇南使集藏于家至於書法小楷逼鍾尚書行草在右軍大令父子間徑尺大字則入顔常山趙承㫖矣先生性冲夷藴藉恬惔謙和驟而迫之而不得其疾言遽色久而察之而不得其惰容厭心横逆加之而不驚權貴邇之而不昵博物似張茂先陸沉類東方曼倩淳謹孝友不减萬石君鄭義門而竒好癖嗜則嵇叔夜阮遥集其人矣若先生者可於今人中求之哉而今己矣先生生于嘉靖癸未四月八日卒于萬厯戊子十月二十八日享年六十有六配朱氏封孺人子男三長九斿側室丁出娶喬氏次九防側室黄出娶予女次九逸側室蕭出娶朱氏女三長適楊舉人繼美先生姊女也先生以姊早寡育而嫁之者今其遺孤尚䝉顧姓次受孫士彦胡夢龍聘者皆夭銘曰世道交喪風雅亦傾疇挽疇振厥惟先生既有内美亦備修能人不厭舊是曰典型斧如堂如言言佳城過而式者服此徳馨盛溪緑生誌胡𦙍嘉吾鄉吕水山先生通博異才微及萟事率爾造極書法精勁在二令之間畫無塵埃氣余嘗得其所寫雙柑圖枝葉扶映生氣可摘性好奬成人材凡有片長引接不倦盛世者安溪人也避仇居先生前廡下盛故工寫照及神儀佛像以餬其口先生諦視之殊有思理一日懸子昭四時圖于堂促盛至曰子能捉筆乎盛素有膽智又心屈服先生不敢違漫應曰諾鍵户臨染三日始成先生掀髯曰子可教也遂與語山水去就曲折草木舒結芉綿之致盛大悟筆法頓上髙巒截雲層陵新霧展拓得勢由是摹東村無不東村矣摹徵仲無不徵仲矣苐其自布一局自出一意則亦為其溪綠者而己一日與余飯卓仲昌齋中是年適其六十誕期余戯謂盛君長松大椿子所自有余何以夀子盛立庭下飲泣哀咽若不自勝余恠駭之拭涕言曰余哭吾母也世生匝歳痘發熾然纍纍著面目腫如覆盂母苗日夜䑛吮一目復開六十年留偏明於人間見日月光不至懵懵作死人者皆吾母涕唾餘也母亾矣雖有目視之不見矣世何以報吾母子能言憐而志其痛世死且不朽何以夀為余蹙然許之世為人直戅無粉藻胸腹所欲言落落喉間若吐矣居恒以孝弟忠信禮義廉恥自矢道拾遺金必還其人分與勿許也瓶無常粟需十指為活然見人窮迫如刺心肺袖中一錢兩錢不爾即為解衣務期必濟無難割之色六歳就外傅善占對筆嬝嬝輒作人物形祖鶴亭鍾愛之十歲祖亾父龍橋不問生産又為同役者欺弄家日消落十四而父母相繼殁不聊生矣夫耕於前婦播於後擔薪績麻襍作繼之僅足自立隣有怨家徙居塘西即所稱吕先生廡下得授畫者也其畫老益精進前輩名筆無不心摹手追於戴文進更覺有微合處余嘗與之言曰畫山水不必盡似山水不似而似晻曖斐亹子瞻所謂得其意思所在是也畫山水而畫似山水畫草木而畫似草木中有不相似者矣畫之不可不似者莫如行象顧長康之益頰上三毫傳神正在阿堵則其神明感㑹亦不在舉體皆似矣子能為似不能為不似不可不解此妙諦也余性愛丘壑窮崖極巔㤀其疲曵當其獨處無人之野浩然而吟神散氣開詩即無形之丘壑也君苦煨塵張綃素以映托坐卧觀玩不覺自徃畫又無聲之詩也由有形而無形有聲而無聲遞轉而𦕈矣宗少文豈真倦游人哉亦曰暢神而已神超理得又何必稱屐底杖頭乃具濟勝耶畫不必其似愛不必其有此有進於畫與游者也子于此悟入可矣君生于嘉靖某年某月日今萬厯庚戌得年六十有一婦沈氏同其甘苦者無子果蠃之負為子生孫男一甫四歲初為錢唐安溪人今為仁和塘西人溪緑其别號也明文海巻四百六十六
