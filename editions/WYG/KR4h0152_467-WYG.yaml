body:
  text: 明文海卷四百六十七餘姚黄宗羲編墓文三十九二氏外史張公墓碑銘姚綬嗚呼此句曲外史貞居先生張公墓也南屏之右西湖之陽梁題玉鉤澗度靈石路披篠樹隖帶煙霞石室藏書碑文紀事其形雖逝其神則存翰墨在人文章垂世儼然生氣之張皇謦欬無聲周旋滅影穆若太虚而示寂開元精舍久無繼續之賢句曲貞居全乏訪求之彦遂使墓門荒翳兆址崩奔松柏摧薪莫設時樵之禁身世何物曾罹夜客之侵痛兹劔躍雷津慨爾研離玉匣既徃何咎將来可圖曠世而黙契乎心尚友而景行前哲爰合佳士聿來嗣人即冡土之增崇求體魄之綏靜其灌其例于以植夫羙材有紀有堂于以開夫幽隧不有伐石將安載詳是欲喚起令威再返遼東之白鶴招還曼倩同瞻雲外之青鸞苐恐紫極髙棲罔由下適自謂黄中密邇端冀旁臨先作傳以述夫始終貞珉是託復贅銘以紀夫歲月彤管庸書銘曰於厥張公天雨伯雨是名是字早曰貞居晚曰外史厥號不一幻僊亦爾文章闖古鑿鑿齒齒書法俊逸不邕以止樂道忘我人莫之訾相靈石澗爰墓於此有峯而岌有水而駛喬喬者林盈盈者芷逈絶風塵攸驅虎兕以巖為扃以雲為畤朝烟夕霏紆青委紫時逺世異毋恠頺圮聿増修之屬後来士於厥張公克具衆美周耼之學洞究𤣥旨獨立羽化匪忽焉死光華曷居天漢之涘誦予銘者式味妙理矧嗣教人其不興起薦溪之毛挹齊之醴公恒賁斯以陟降只明進士胡伯子墓誌銘許宗魯少華山人曰余嘗讀内典及古髙僧傳見其載授胎奪舍事每怪其誕妄不經不之信也今讀胡舉人傳狀其從子進士伯子事行其大異也乎哉志曰明有髙僧凈敖者戒行修潔始居寧夏寧靜寺與胡封君璉友善嗣又納交封君之子襄陵尹汝楫世好弗替襄陵伯兄司馬公汝礪卒於官勅塟咸寧縣韋曲里襄陵罷縣遂依之居長安城中而净敖尋亦来居終南山豐徳寺與襄陵交益善敖毎至襄陵第諸子姓皆以先輩事之敖感其善遇每形之言曰吾受君家供養累世吾當為犬以報德敖年八十餘一日入城過襄陵若將訣别者告襄陵曰吾行且歸盡顧君家遇我厚吾當生為若子弟酬君厚遇此自吾釋家事君勿訝也語竟别去正德甲戌四月十九日夜襄陵假寐夢見敖突入室中己而變虎躍出襄陵驚寤語其子佑且共駭之語未脱口佑之室喻就蓐伯子生矣時漏下乙夜逮丙夜聞扣門聲甚棘訊之乃凈敖之徒德中奔告曰師夜二鼓趺坐而化於黄氏館中襄陵詫曰異哉敖師真乃爾耶師固謂為吾子弟其言在耳且歲舍甲戌其為犬之騐乎遂以和尚名志其報也伯子有知識不為兒嬉不樂世態沉黙寂處若禪定然長惡飲酒絶葷味造請都謝居然一僧也弱冠勉從家世遂精儒業嘉靖甲午中鄉試明年乙未登進士人以其年少得第率皆欣艶伯子顧獨塵視不歡隨例試政工部樸素自隐不求階薦歲餘遘病京邸瞑卧超想若有厭俗反真之意將屬纊尚以功名誤我為言又詠杜甫青袍白馬有何意金谷銅駝非故鄉之句蓋悔其墮落而嘆其漂泊也其父佑為裹巾幘伯子攬鏡顧視笑曰原一僧也易形為儒今乃裹巾若道士本来面目固如是耶語畢溘然長逝時二十有三爾貧弗克殮同朝大夫贈之始克殮弗克歸駕部給傳始克歸十年弗克𦵏當路部使者賻之始克塟墓在慈恩寺雁塔東南時則戊申四月十六日也伯子名叔元字允卿先世溧陽人國初徙寧夏今為咸寧人厥室王氏生一女字于王三才無子乃以其弟舉人叔才次子楨為伯子後少華山人曰余志進士胡伯子墓詮其事行始信而終疑焉夫敖僧之報胡氏固其感德之誠乗氣嚮徃寓體化生此釋氏所謂念頭不差終遂果願者然生之未幾尋以寂滅報之無實徒以眩幻何言行不相䝉耶説者謂禪宗之妙惡洩其幾方其見夢襄陵入室化虎固己示其變現有符易象大人之占而乃命名昭灼發其𤣥藴遂使果報不終人實為之於敖奚疑然耶否耶觀其臨命之嘆葢亦悔心矣語曰道不同不相為謀余又何所究竟哉銘曰其來奚自其返奚歸泡光石火倐熄倐輝四大雖假一真不迷生亦何利死亦何違委形𤣥化靈照幽微嗟嗟伯子孰測其機治平僧曉公骨塔記蔡羽治平寺入門而右為曉公之房蓋寺之西南房也寺僧多不能忘俗曉獨由由云爾矣故能僧而不能俗能道而不能僧夫能俗者官不以其僧而免於給使俗不以其僧而免於里社曉皆不能故里舍之而愚若號官舍之而貧若身視寺之諸苾蒭猶夫不克家之子也其道獨宜於僧夫能僧者有空之名無空之實者也我觀爾時諸苾蒭受一切諸福地諸金玉弟子請聘競為懴悔主因亦競廣爾道塲結爾應果以名解寃資福以大有舍於桑門而曉不與也能俗者有僧之名無僧之實者也我觀爾時一切諸香火諸苾蒭其惟善男子不罪過於爾菩薩地諸常爭論不屈里則建爾為曲直主亦有人家諸吉凶鄉則建爾為慶弔主以均其酒食燕㑹而曉不與也乃衲衣苦空長齋學道懵懵然衆誚之不爾媿人或謂之無衣則曰吾尚多爾衲或謂之無食則曰尚多飽爾伊蒲塞是故青雲之士髙俗之家反有取焉予之識曉也在𢎞治甲子吾於爾時持有弟子李時賢狥于爾室曉於爾時亦集有弟子禮弟子鶴説法於爾首座予之再識曉也在正徳丙子吾于爾時持有弟子王履約王履吉亦狥于爾室曉於爾時亦教有弟子一山弟子正説法於爾竹林社夫得之無喜失之無嗔豈惟我衆寡能哉吾視一切苾蒭弟子亦病多煩惱乃曉公無見於不足恒由由焉爾矣固請其術初無别諸識懵懵然爾矣我觀爾教從空中現爾空中一切受用皆煩惱蛻爾形亦他人形而何問於人已哉曉號聽松嘗以諸施主緣修行春橋迄某年月日遂湼槃僧臘幾十弟子正立塔請為記皇明戒僧真􅢫塔碑李黙嘉靖癸丑京師南闗初作重城有掘得廢塜者啟之乃僧真􅢫藏龕處也距塟凡十有三年龕壊獨僧趺坐屹然如故都人聚觀者竟月崔中貴利覩而異之舁至慈源寺西廂稍加粉繪奉以佛禮流聞四方觀者噂㳫一時香火甚盛明年夏太保錦衣陸公邀余過其南園偶話及之寺即太保少時讀書處去園里許遂偕大宗伯闗中王公徃觀咸共驚嘆焉按僧本京城大軍倉人俗姓林名春年三十七始從萬峰師祝髪持教律良謹又三十年而趺化啓竁時尚有識其面目者再踰年中貴以其事希覯懼為時駭乃謀於太保甃塔寺背移奉其中從佛法也予惟佛之為教本求脱離生死了無罣礙故有蹈罹兵刃水火猛獸而無貪怖者貴佛性不貴殻漏子也然予嘗過曹溪清源山覩所謂六祖與𢎞濟大師者其法身固宛然而在永樂間馬璫三至西洋嘗記釋迦湼槃遺跡頗具然則佛不貴是而如是者徃徃非佛不能是僧行業深淺性根利鈍予不可知然而乃亦能是皆予之所未喻也中貴圖示永久輒來請記乃為述所覩聞如此中貴祁州人酷慕佛其竭力所事大抵此類也塔成於是年乙夘首夏塟以其月八日因作偈語俾併刻之偈曰汝本無生孰云有身汝無無身孰知汝身既脱煩惱永離四大自覔自我我又何物汝性汝觀赤灑灑地作如是觀觀汝身是四義僧舍利碑銘記馮恩皇帝三十有二祀内華化洽守在四夷萬國諸酋曰昔賓貢其在東南日本琉球莫敢不享粤自徃歲海氓黷貨倭奴搆禍入冦兩浙天子赫怒爰命廷臣討諸不軌都御史王思質公應命至乃按先中丞朱秋崖公梓行圖籍曰野倭宗叛寨集馬積蹲危逗深負海為固非破其巢弗可乃遣將湯克寛焚其板寨㓂窮奔逸癸丑春順流舟乗巨颿日踔數百里首攻太倉次刼上海于時安乂備弛民不識兵賊曵兵行市巷若踐無人之境燒聚屠邑煙熖相接奔越長吏毒劉文武俘馘男女慘烈殊劇時巡撫彭草亭公操江蔡可泉公相繼督臨未經題請兵食未備二公矢心討賊或權調兵餉或親冐矢石百具俱飭兵威稍震先是鎮江六合邳揚官兵調集處州坑兵亦募至賊鋒大鋭數進皆衂二公患之聞少林僧兵勇義可泉公亟遺書鹿園公禮迎之僧官月空統百餘僧至再起在告韓都閫璽督諸路兵進因𨽻之韓懲前欲持重行㑹方雙江郡公初視郡見諜報曰事迫矣兵貴神速乃三進禮拜亟為勸駕以六月初四啟行結營南滙所初六日聞海洋有賊舶月空率僧數騎擊之走遂破其三艘燔之十一日韓遣指揮朱楊等先率兵行樊景暘李某次之僧兵又次之十二日六合尹董邦政指揮朱揚遇賊戰于八團皆不利樊與李晚駐兵于六團僧兵亦至賊聞韓督兵臨欲南奔僧兵夾衆兵徹夜翼追之十三日至白沙灣相值月空諭衆僧曰汝等日夜不飲食毋自餒賊虐殺衆僧勢不俱生當發汝父母本来元氣無忘偈戒貪生以墮落僧曰諾皆怒目裂眥月空身先躍馬大呼曰殺賊衆奮擊戈穿賊喉刀剸賊骼側者十餘人賊有綠睛鉅人名趙大王者䲭張螳怒攘奮踉蹌而進衆刃十餘而仆其傷殘枕籍死者及百人羣賊潰走葢賊水戰時為解守備所破陸戰數月來則未有此大衂也自是無深入志矣大兵乗勝前追不虞殘孽後伏起乗其殿勇夫奔躡僧有了心者起格鬭僧徹堂一峯真元援之方交兵村人逺招曰僧且走四僧不顧鬭益急皆死之嗚呼僧本緇流習西方之教中國有君父者弗與也月空了悟心性超然上乗乃能以君父之道率其徒其徒翕然急君父焉生者濟艱死者善道心心相印生順死安豈非昌黎所謂墨名而儒行者哉悲夫今之以儒名者言徹孔孟學飾程朱孝躐參騫忠許逄干自謂死生以之一旦臨利害介死生則喪心掉魂家焉不能保其親國焉不能急其君甚至偷生行同狗彘賣國視君冦讎則援儒而羽角之又安能摩頂放踵以利天下如墨名而儒行者哉義僧徹堂一峯蘇門人真元楚人了心杭人月空其師也居虎跑寺四人皆無海内責勤王死事禮有祀典監司重其懿命有司給官帑為塟埋郡公方雙江邑侯王韋軒又為市地優錫以禮將以某月日函厥舍利作四石塔窆于余山之北樹碑建祠乞予言以詔世嗟乎生為禪丈死為國殤予己悲乎海上千百人之死于賊之無名尤悲乎四僧為夫千百人而死於賊之有名乃為之銘曰四僧異端明我常道捨身弗迷圓寂覺妙海上清風輪迴大造死者奚愧生者則傚余山塔碑永世立教蛾眉山别傳和尚碑銘瞿汝稷法季聖逺栴檀凋落波旬竊衣裂我釋網不有鵬耆髙騫法宇則昏衢冥行孰為燭迷若别傳和尚非今之鵬耆哉和尚名慧宗别傳其字族出楚之雲夢汪氏㓜則慈和志薄世尚甫弱冠即逺離愛纒獨遊巴蜀禮綦江吉祥寺宗實法師驅烏受具俄念大事未明辭師徧參凢蜀之名席靡不歴扣一錫百城寒暑不避既入歸宗之室有所省發旋登峨嵋瞻謁普賢道塲至雙飛橋忽值大士放無量光和尚因嘆曰三曼䟦陀心與我等世界何刹非是大士行願衆生心悉具足顧汩淆煩塵不能追躡妙躅耳我今承此光相力𢎞大願則舉足下足嘗在此光明中矣因自號𢎞願釋時峰頂白水寺圮落已久緇白共惜莫能興復和尚即力荷營葺唱導甫播士民悦來殿宇鼎新復闢基搆銅瓦大殿周以寮廡像設精嚴規制𢎞麗為蜀勝冠既又封樹嘉木十萬八千株既又念始雙飛橋遇光相因即其地飯僧十萬八千衆日夕乾聖毗耶梨有所舉作若造經像繕浮圖種種净因悉以十萬八千為期謂世之言佛國逺者則云十萬八千而諸净因皆菩提路衆生由之可入聖域也蜀人士向風歸德自大學士趙公貞吉而下皆以師禮延之和尚竟棄去遊京都手一應器容斗餘分衛四衢隨出恒滿亦隨給孤獨及十方應供所如是者若干年如一日道聲藹著七衆恃若慈母度諸難化罔不信受金張許史争為建普賢庵居之章和尚行願也未幾亦棄去念支那至乃隠感激希有因結茅補陀東巖繹聞覃思習三摩地化諸逺來越三載吾邑少師徐公階宗伯陸公樹聲素嚴事三寳不啻漢之牟傳晉之宗陶聞和尚微韻敦迎至邑之某寺諸名宿為大法㑹和尚為唱導文二公見之懽踊讚嘆且著三大士現相頌呈和尚和尚夷然不屑㑹畢亦旋棄去乃陟五髻行過京師緇素競留和尚曰人生有死當有别幻化之軀詎能常保諸仁者但能信樂至道慈惠及物老僧雖去猶常在也聞者感泣遂入臺山金閣寺垂一載一日謂衆曰今夜聲鐘吾當去矣爾等闍維收骨埋道旁題曰蜀大峨山𢎞願釋家之塜俾徃來者見我名念佛一聲是吾身後與大結緣也言畢泊然而逝世夀八十有二坐六十二夏衆兩分其靈骨一分歸峨嵋白水寺一分歸五髻舊路嶺龍泉寺弟子鎮源等為浮圖藏之時來京師求余塔銘余方慨世之緇流其伊蘭瘂羊無論即見解入微辨才無碍而或忍鎧漶漫戒瓶黕㸃足不逮目者有之終不副初者有之乃和尚一覩光相遂力荷願至矻矻一世老而彌篤所至翛然如白雲在空莫能繫留示寂之際尚期以窣堵波度生真足以澂濁氛而揚智月故樂為之銘朂諸將來銘曰日城掩耀迷雲曀人天聿皇津梁罔寄猗歟宗公覺苑珪璋一瞻邲輸遂荷願王五衍恒轉萬行紛披人見公勤而公無為妙嚴鴛藍錦紆霞爍人勞其蹟而公無作東吴西蜀煙水萬程飛錫靡駐公未嘗行金閣安居補陀寂黙六用都滅公未嘗息公来豈來公去寧去心月朗然今古常住我銘貞石示諸初心一念能入六牙儼臨五臺山大博庵無邊和尚塔銘瞿汝稷每讀傳燈諸録見唐宋諸名宿棋布寰區靡適無秉拂之英拈花之聖未嘗不心慕其盛而恨今之寥寥竊慮慧炬日沉伊蘭日茂則何必三武法且自替彼毁之而不可正以開士林林含識攸仰即有波旬難惑衆聼耳道以人𢎞奈何今之寥寥耶及見密藏諸上人以真參自荷擔慧目精朗靈根卓越則私自喜謂正法眼藏其寄之此數衲子乎萬厯庚寅幻予上人過予談五臺無邊和尚詣行甚卓及辛夘藏公手一編而示余曰此無邉和尚狀也願子銘其塔予讀之至施菴一事真足澂昏衢之濁氛開法苑之智鏡葢􅋏然重之按狀師諱某無邊其法號也山西代州崞縣曹氏子㓜孤母胡鞠之穉齡則志慕出家謁無相禪師求薙染無相曰苐能悟道家何繫汝師問如何得悟道相曰發决定志轉不退輪即得悟道師終不釋然一日遂辭母至忻州謁無碍原禪師薙染原示師令起疑叅求本來面目未幾辭去發心立禪久之謁汾州禮空安公安令叅萬法歸一語安一日舉波斯區王觀河語問師師求指示安曰我不辭説何與汝事汝須自悟一日涉河若有所領尋過牛山龜石謁大圓入火塲既復謁流山敏安翠峰圓諸名宿俄聞汾州安公有疾遂復趨侍安公究萬法歸一語一日汜掃次聞誦阿陀經者至其土有佛號阿彌陀今見在説法師忽失聲見安曰某識得一也安曰在甚麽處師曰今見在説法安曰一歸何處師茫然安遽掌曰學語之流師退泣曰我固分明柰對鏡復迷何自是侍安復十餘載安鉗錘甚密師寢食寒暑都忘既謁秋山示以死心實叅師因得輕安覺叅語如順流行舟不事費力既叅玉峯忽然内不見有身心外不見有山河大地師呈所証峰曰汝心空矣既謁崞陽寳山寳機鋒甚峻諸方畏之師見問答次稍擬議寳批師頰至流血師禮謝陳後先厯叅語寳曰前僧與汝去病汝不能領後僧與汝繩索汝却肯他師低頭寳喝曰瞎漢又甚麽去也師洒然汗下復相酬復寳不許曰汝今正在夢未得如睡夢覺也師不肯寳因舉九峰勘首座因緣相詰師不能對寳曰于此不瞥地其餘知解皆是障子正光明處學道非學語鸚鵡何濟生死子必欲真悟必盡颺却從前珍惜如愚若啞向塜間林下叅去師聞悚然禮辭至臺山靜室一麻一麥者五年一日大雪恍然若證圓覺所云三千大千世界雨皆知滴數復聞林中鳥鳴不覺身心踊躍遂述一偈偈見師所自叙行脚因緣中後以人事煩雜忽於酬酢間似有碍膺偶聞樵者曰人苦不歇心師聞復爽然曰萬法本閒惟人自閙古人豈欺我哉復述一偈亦具行脚因緣中趨見龍樹楚峰樹印可樹濟下二十六代法裔也侍樹三年一日語師曰荆壁大士授我心印我久未得所授今子雖未證悟己得少悟我今授子宜善䕶持師自是韜光晦跡巖棲谷飲人莫能窺其涯涘久之徒侣奔凑爭為結庵遂剏今大博庵住山以枯淡自持食作必與大衆同有古人風住山三十年如一日逺近爭頌之萬厯戊子密藏幻予二上人以刻方册大藏道塲卜之於曼殊大士三卜皆五髻吉因圖買山搆室以舉此勝因師聞曰僧庵乃十方常住而今之人悉私之吾素以為恥兹幸際此勝因吾將盡以此菴及所有施之藏公使方册大藏早行閻浮提一日是吾法輪一日轉也于是悉召山中耆宿為証一日而盡施且立約云徒屬以一盂一錫自私者即擯出藏公初尚猶豫未敢承既見師意懇至因聽焉時師己有疾又三月而化其在病苦中日夕與藏公徵决第一義諦絶不以病苦少蹙額云那羅延窟學人瞿某曰如来出世度生不過善破諸有耳凡夫人執有無論彼二乗人沉空空亦二乗之有也如来以空諦破凡夫人之有于有以中諦破二乗之有于空其破若異而為有一也故曰破有法王今觀無邊之所行持真有志于破有者哉簞食豆羮人不能無恡色師舉生平所蓄一朝而授之人固己行人所難矣四大欲離風火相逼人所叫號惶怖不暇為理時而師諄諄惟以第一義相决擇不尤難哉是能遺身矣夫惟能遺身故能遺此菴如敝屣也不可為末法之光明幢耶至師于宗乗所詣則悉如上述具眼者自能别之銘曰華嚴知識各標一法一法入流何泫不逹猗歟上人末法寳幢善破諸有皭然孔光照耀尋幽開朗矇瞽不言之教㴻大法雨波利不出均是韜靈五髻突兀伊蘭叢生上人之來允如来使一澂濁氛雲林吐氣公骨雖窆公心詎淪冷風寒月千秋儼存我銘貞石于窣堵波瞻者禮者悉超愛河明文海巻四百六十七
