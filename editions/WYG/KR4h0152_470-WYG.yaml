body:
  text: 明文海卷四百七十餘姚黄宗羲編墓文四十二雜類草亭逸人墓銘羅玘草亭逸人吳氏崇仁人也居白馬嶺下比晚縳草爲亭託以老焉年六十三正徳三年十一月十八日卒仲子學生鎬季子訓科錫視屬纊孟子監察御史鉞奉命理軍事於浙越明年正月始克聞訃哭哭哀擗踊疲憊毁甚特不絶乃晨夜乘傳反命畢奔歸迂道白下以誌銘委諸玘玘曰子來予嘗誰銘誰嘗曰予能銘人乎雖然不得曰嘗誰銘人而遂不銘而翁也而翁用薦起官序班先予在館者八年已褎然老成能導予升降陛戺别識掖闥觀闕名額指目班行誰某隆殺疏數其所宜施予徳之間以爲言輒蹙額曰吾先南城也且今相距幾何哉而乃自爲異邪居既久備見大老皆耆年勌勤諸藩國册制外大蠻夷詔命將帥行師璽書除拜封章代言檢就則以下之看詳彭文憲公每呼曰吳序班以爲何如對曰得則公曰以是頒出或覆視之曰吳序班手書乎欣欣然頷之而巳修文華大訓宋元資治通鑑公必引以自助及修憲宗實録丘文荘公喜得之日引之與語如公引者録成遷翰林院典籍喜謂玘曰天順初嘗有官此者舞其柄以窘府部幕司至不能一朝居府部羣公出怨言懲是顧用頽墮者至今若尸寄然事遂弛今吾酌厥中存體要耳既而幕司果羣聚驚語慮罹謫譴咸以爲憂居數月覺無苦又咸以爲善文淵閣藏書數萬卷標目亦數帙或問之矢口縷縷如注先是館寮一人假考訂私丐史冊擬竄易其先世之穢未成覺之乃赧銜至骨則設譎間于炎炎者曰典籍扃鑰在其手恣取巳好入其室左右希合左騐之乃乘在告諷吏部貶爲義烏主簿而丐史者遂栩栩快其志鉞泣曰不知也玘又曰𢎞治初致郊齋羣屬咸集院予二人入夜語于奥時張宫保言事忤仇黜南部語次及而寃之不虞張仇遍置偵偵白仇仇怒遹起大獄意置二人予幸脫而而翁亦乃困至是今已矣鉞遂拜且泣玘亦泣鉞出状發之與考其世得諱庭桂曰吾父曽祖也來自南城者也得諱日昇曰吾父祖也贈順天治中者也得諱衡與氏曰吾父父母也自治中至山東叅議而封宜人也先諶氏繼趙氏曰吾母也而趙則吾鉞鎬錫所自出也鎬生浩再生演吾父孫纔二人也又拜且泣曰惟諾銘吾决以嵗十月日葬某原嗚呼逸人名孜字景賢與其六書古近體詩天下人能知之其所自立亦可曰天下人知之乎其身則仕而其性則逸也否則惡止于是哉而亦惡取斯困哉古士有易名如曰逸人庶幾來世有考銘曰吾惡乎悲逸人乎人之大賢與誰不巳與而誰則爲之所人之不賢與無乎其自取而誰非巳忤其命也與噫夫如是而能不失其故吾又奚之而銘其墓安千戸墓銘羅玘景泰初額森未即悔禍南土弄兵之戎所在蠭起一二奔命之臣乘時觀望多其身圖由是姦伏于肘腋間莫可擿拔景皇帝赫然震怒恐有以戚我上皇遂嚴偵探之柄拔錦衣羣校置之東厰使之入微擣深不以時達時則有若安君諱順字子和者尤傑然夐出君汝之新蔡人幼侍其世父整于京整錦衣總旗也老以君代至是以才見使用事然其童年播遷東西浮寓以身薪水無隙以學而心獨恨且無攸適従則惟遇僧梵于市亦梵瞽説于途亦說久乃口通佛書諸多傳竒野史後亦厭棄惟喜人讀書従旁聴之輒能成誦積至儒生所恒習者張口縷縷而出間能辨析疑義至史傳所紀即斷曰此治朝也或矍然曰此政失當亂若真能了了者其實手眼漠如也性無鏃礪之鑿事必流其真誠心寡蓋覆不主嫌疑凡闗涉政治大體即貴幸勲戚麗于憲度不避茍曖昧非其辜雖上意叵測必以身任之一時姦人飛竒反間嫁禍于人者皆見沮塞歛手避去坊市惡少年相語必曰母嬰安順威寧伯王公爲御史時晨入闕吏紿其家金器匿娼家不得公以語君吏聞君至股栗舉其槖伏辜扶風人趙才興従貴將久無功怨望誘妖僧以星炁煽人刑牲誓天朝陽門空舍中約旦夕變有詔覘之同事二三不即發君曰厝火必焚焚而沃之晚也捕之得其事状并黨磔于市閱月蔚人吳伯通與其黨余郭福亦謀踵才興之爲者亦皆墮于君手故未期連受賞自試戈㦸司百户至真百戸皇上復辟奉迎乘輿多見任使㑹朝廷入廷議以君九擒劇盜功最多授副千户先皇帝即位初妖人趙春隂部署僞將僞擬國號于滄瀛間灤河竝邊謀誘虜入其盜曰王成玉曰李端曰傅洞淵匿機誑脅民洶洶且走且惑君以次擒之以獻進今官享榮三十餘年階武徳將軍封妻張氏宜人贈父齊如其官母程氏如其妻皆是功也初君念職禁近母老新蔡不得朝夕侍迎之京竟食君禄以壽終躬歸其喪合父窆人以爲孝仕不仕少有知者皆聞君名尤爲内相劉文和公所竒見于文焉𢎞治八年年九十十二月十六日辛酉卒子賢蚤卒嗣副千户者也寧入粟爲郎視七品亦卒泰以戰功官錦衣百户孫璲瑜璽瑁瑋璽嗣賢官今爲百户女宋通妻也明年正月十八日葬大興縣東湖社豐臺村墓與張宜人合然宜人之窆巳九年矣其幽堂宜有銘來屬翰林院編修羅玘玘與御史潘楷友楷妻通之女君之甥也楷言其世與貫而巳君之爲人有不待言者銘曰執威弗威國威在斯炎石及玉而豈可爲蠧既糞木衆亦灼鑚毒其初生木乃得完是惟安侯克遇三帝秘宻爪牙耳目攸寄侯率其性暗與道俱蹈是二美史有可書大都之郊此維髙丘有石誌幽是曰安侯都豫軒墓誌羅玘封都水主事八十三翁號豫軒姓都氏諱印字維明姑蘇閶門南濠人蘇之地最天下以閶門閶門以南濠南濠以都尉諸氏都尤以節槩傳高廟初文信至能當婦翁殊死特貸之生彦容作月樓濠上顯名當時得尉氏妻之人謂連綿呼兆當有竒嗣翁生異質天成目數行俱下十二三能賦詩鼓琴日陪諸老宿杖屨爲適長遂酣飫超越太異度非支離陸沈莫救敗然苦蘇故吳㑹易聲張曰吾以淺示之乃挾易詩禮三經從鄉業舉子者游幸一不利即諉曰難如是棄去去就里塾集羣䝉訓聲律髙門大姓爭招致悔曰是謂畏影而逃日中可乎又謝去以醫浮湛閭里或少露芒穎巳病如掇萌然旬日喧騰神之詭曰古方偶中爾隂自擲餌劑掉手詈曰乃幾敗吾事遇爲道士說者過境喜乃便旋與之周游講説服食卦炁支吾嵗年至子穆登進士官都水賜封乞南得武庫便養欣然來就曰吾今脫蘇吾知免矣居二年以正徳三年六月十八日卒配姚氏繼朱氏俱贈安人穆穗其子元翁次翁其孫祖齡其曽孫女二人谷源茹喆其壻卒之日穆當考先入闕也穆歸諏十二月扶葬縣薦福山泣謂玘曰子知吾翁吾翁須子銘於乎玘忍辭知翁哉昔頻道吳下人言翁居室極奥窔隣竝婚媾無一飯過逢乞貸泉布日湧出至落莫不悔穆既用世差變易終以咈教愠之其泓涵溔淼障窒牢宻及間爲籕𨽻罨畫暨諸小藝臻妍逞妙蓋渗溜滴瀝有不能盡秘者若占辭前知則又自負神授也是夏五月戊年晨興卦之遇損之睽占曰立土頺淵三年暵其田二女號轅鬼車其前赤古下然厥載用顛擲地呼穗曰吾其巳矣乎其速以吾木來六月大暑灼地不可耐得寝疾昏弗辨物藥食咽入懵然已夘日中忽作坐無苦也呼蜜孫以蜜進呼茗孫以茗進咽之如是不火食者七日甲申僕自蘇來入報未至遂呼具盤盤具入浴浴畢喜曰快哉吾其蟬蛻也目遂瞑豈道家者所謂蛻殻解者歟所著三餘贅筆衛生家寶存于家銘曰彼有風襮其憂憂藏此有潛伏其憂憂章亦各其志君子考成卒謂藏之者臧高君墓誌銘徐渭君諱陞字進之其先江都人靖難師起五世祖觀音保以従征轉徙遂來居紹之紫金里始官百户後落秩總旗三傳至賢有子五人其季名奉者娶謝氏生君與按察經厯陽君爲人如出冶劍少即露鋒鍔師參議胡公某某數睨以語人君時尚窶其伯父泰無子嘗提千金産欲後君君謝去人竒之無何果以賈數致千金歸則跽進其尊人恣所以既乂澤其宗連若窶舊故必遍且嵗襲了不見厭倦時於是自家至燕齊數千里内皆知髙髯公孝友嗜義有古俠士風復善料有急輒投君益爲營且費往往傾囊然至貴游或黠少年有所挾者欲出其一銖於匭不得也晩尤好結賢豪文士與磨切事一裁於義時召客把髯以談切齒不平風雨颯颯集座中忠孝人遇災禍輒攬仇思有以快以故客燕一旦跨驢度居庸馳保安把沈錦衣袂痛哭旅寓錦衣出匣中猫睛睒睒若果核意以酬舊逋君笑曰沈大夫仕茌平清豐時當吾賈道寸步耳吾不入取金今投窮邊萬里雪没脛來取金耶擲不顧去大扺君所爲皆此類也君敏絶數解文理其交我也實以文乃終不請乞一字人恠之君曰辟諸山川挹其秀止耳何用採掇爲及繫君每入餉我必日仄而唏以出噫豈亦有痛哭保安意耶君殁之前三日其長子文明持君書來訣故今葬也諸子來告日曰今隆慶之壬申閏二月之卄有八日告所曰荻阜告銘曰先生幸銘之予以罪不可某君涕曰君志也余亦遂涕以銘銘曰馳雪塞哭霜臣擲狸睛眇蚨緡過我之日兮風伐木樸兮􅈪爾兮孰重修宋太師魏國丘文定公神道碑薛憲章由里山在縣東南若干里有宋資政殿學士刑部尚書同知樞宻院事贈太師封魏國諡文定丘公墓在焉宋既改物鞠爲灌莽樵牧朘削居民侵耕久矣其幾世孫鼎居江西廣信之貴溪者以都御史督漕于淮爲書召其族人其族弟載叔厚遣其子景文往焉至則惓惓以太師墳墓爲念且圖度葺治未果也無幾何時㑹新天子御極詔所在名臣賢士墳墓有毁廢者有司即時修理仍復近民一丁使守之于是叔厚父子咸泣理于今巡撫南畿都察院右副都御史福建王公得移檄下江隂邑大夫任公適來知縣事覽檄慨然以修復爲任曰此吾職分内事也矧詔㫖丁寧若是遂出官帑銀若干兩使景文領之仍委官董其事凡地之侵于民者歸焉樹之杉檜繚之垣墉攻木攻石之工並手皆作作饗堂十二楹華表石四輪焉奐焉行路歡喜又斥其餘作文公坊坊舊在縣東門里第今改築安利橋下東門人曰坊舊在此而築于彼吾人不得被道徳之光矣後生小子其何所觀感啟發吾實恥之則相率于官然業以就不可更動遂相與出私錢市木植立坊故處此豈有爲而爲之於乎休哉公諱崈字宗卿世家江隂以進士起家隆慶中厯仕三宗致位樞府謇謇諤諤爲一代偉人自公之薨迄今凡一萬六千九百幾甲子矣盛徳大業載在方冊照耀後世至于墳墓亦被光寵有道之澤何其深且長哉當公之補外也韓侂胄方用事與有力焉想其一時氣燄當何如既抵法天下後世至不欲道其名字其墟墓所在不知至今無恙否乎借其幸而猶存欲其愛䕶封植于百年之後如公之墓得乎傳曰人無所不至惟天不容僞豈不信然耶始天子下詔愚夫鄙人不知聖天子微意所在以爲蠲逋賦省徭役誠當惟修墓事所不省嗟夫武王克商天下事所當爲者何限乃獨汲汲求比干墓封之其故可知矣是豈特褒表功徳與慰其後之人蓋旌别淑慝彰善癉惡其道固然史著孝宗嘗使范成大使金祈陵寢公言泛使無益徒驕敵人上怒曰卿家墳墓爲人所據亦須理索否公對曰臣但能訴不能請識者韙之今公墓爲人所據而叔厚父子能訴復之可謂能用公言異日可以見公地下矣初景文持其家乘以父命來俾書其事余辭焉小子何足以知公至于再三請益力遂拜手稽首而著其大都如此公之事功在國史文章在集録世次在譜系此不復著系之銘曰惟宋太師丘姓崈名匡辟三朝厯孝光寧時方弗靖金鉄鏦錚有冦在垣跳梁憑陵偷者主和縻費金繒夸者主戰踊躍用兵公當是時持重老成不求勇功不求知名曰毋屢盟曰毋遽爭以全取勝以重取輕勿以惡名寧用參苓凡所蓄積方及施行憸人撓之噂沓背憎公白天子幡然歸耕所以志士至今拊膺邦人小子惟公典刑惟公典刑式勒斯銘孫見山墓銘許相卿監察御史孫君葬其父見山徵君于盈山南麓嶽神祠之左述徵君世行而來謁余書其墓石曰徵君諱鸞字鳴逺其先富春人粤自漢季孫氏國吳傳四世六十餘年胄裔布于湖南江左根盤蔓延矣富春迺孫氏所肇迹云徵君常自言相傳裔出長沙桓王䇿之後逺莫究其緒來籍海寧也亦莫記其世其始有徵者曰富一提領春春嘗問學於包心齋氏包選春諸生中以壻其子春生以敬以敬生文達文達生裕裕生煜煜生禋是稱遺安配董氏祝氏徵君父母也徵君而上八世家黄灣黄灣逺都市瀕㵼滷地亢土瘠無水泉林藪之饒百穀桑麻率仰澤于天以殖農圃盡瘁三時高秋旬日不雨則嘉種稿無遺穗而艾蕭藜藋芃芃彌望壟畦間以故呰窳偷生鮮積聚而多貧豪有力者居停鹽盬廢著鬻財機巧乾没以與上爭利頑弱無能爲計則交通海賈屏匿幽隠爲之駔儈以私竒羨官爲峻法苛禁姦利相告日聞徵君於是喟然嘆曰吾聞本富厚生蠶穀是巳將如吾地何乃如鄉習雖子本纎鋭而贏得過當然謂姦富抵禁亡命有家如寄謀其左矣孰與教吾子以大吾家乎御史時方嶄然見頭角徵君則爲訪明師友市經藝諸籍趣辦資糧裘葛厞屨簦笈及凡装需縦使游學而時課督淬厲之嵗無幾何御史以嘉靖丁酉名鄉薦戊戌舉進士至今官列侍従司風紀便道過家斾旌騶駟呵呼導従塞塗盈門御史豸繡登堂稱觴爲父母壽雍容閒雅甚都鄉人士以爲寵諸父兄乃後漸舎故習而延經師課子弟以徵君父子故徵君晩以子貴益閒無事時出嬉游巷陌讌集里社従故親知農談情話坦坦夷夷不矜重改其舊人多愛譽以爲美談徵君年五十九卒以嘉靖某年月日葬以某年月日娶許氏子二長御史喬其季高也女二孫男四狀述徵君孝友庸行可稱者不一予特取其卓見不淪于習者著之銘曰帶海負山墓於是間風氣盤旋庇爾子孫於千萬年劉紹卿墓表陸粲紹卿自太學生得按察司經厯銓注雲南先是余以給事中言事調貴州都勻驛丞雲貴接壤皆古西南夷地貴州地尤瘠惡非人所居余行數月乃至境上屬盛夏暑雨所經由皆大山長坂下上勞憊盡日道無行人俄有騎而自後至者紹卿也與俱憩坐林樾間語相勞苦仰視山兩崖斗絶數百千丈色如積鐵霧氣浡浡起山巔虎跡交錯道上紹卿憮然不樂余顧笑曰子悔來耶丈夫不經此當何由知艱難子行矣紹卿亦笑且頷之上馬去余至都勻㑹驛舎久廢僦居平越平越者雲貴往來孔道也諸自雲南來者時時傳說有新官劉經厯者彊執不受請託蠻酋武官放恣淫虐不畏大官府獨難劉經厯耳余聞之良喜自余去平越及歸吳中三四年間與紹卿不相聞既而紹卿上計京師撫按者署其考爲諸幕官最當遷秩矣迺有飛語聞吏部於是以不謹罷則聞有按察官以細故相望實隂中之云紹卿自失官家居十餘年病卒卒後若干月且葬其子瑊詣余泣請表墓余許諾因爲道往時事曰吾知若父久矣忍無以慰其死哉紹卿諱逺先世家臨江國朝有編戍蘇衛者今爲蘇人自其従祖父刑部尚書與清始起進士至大官父佃母陳氏紹卿生有至性十四喪父執喪循禮而力學工書事母以孝聞在雲南涖政明决上官才之事多倚成焉所平反疑獄甚多土官楊訓殺人帥府桀黠奴髙壁亦坐事當謫戍兩人要重貨投之不納卒案致如律千户胡學詩戕其妻行賕要人脫罪一詢得實狀論死王髯者圉奪殺人道中郡吏名捕之一兵官子亦姓王而髯疑懼自髠爲吏所録既誣服成獄矣紹卿徃覆按立得殺人者而出兵官子嵗饑視督平糶計㑹詳宻而賦授必均民以不殍死閱視迤東庾積姦蠧爲清他所建易尚多不悉紀令仕職差久其功緒當益有可觀者顧僅逾一考輒以晻昧之過去談者惜之或曰紹卿平生剛急少醖藉用此觸忤貴人卒見廢退斯自取之也非耶余謂不然夫仕在不失已耳乃禍福則有不可知者昌黎公曰祗繫其逢不繫巧愚信矣今世仕者或工於語言日蒲伏公卿户下拜起候望顔色然其人固自有利不利利則躐取華要不利則亦放棄流落死耳要之榮達有定分非必以諂傲爲通塞也如紹卿雖骯􅗣食貧以終亦何恨哉亦何恨哉紹卿之卒以嘉靖丙午四月九日年五十二其葬處曰靈巖鄉桃花塢室人郭氏余族姑之夫之女也一子即瑊吳縣學生秀敏有文世其家董隠君墓表何良俊董隠君者名懐字世徳别號三岡居士董氏上海之望族也蓋其先世已自雄長里中至御史公而益大御史公生子六其五即隠君隠君生甫冠御史公謝世隠君能自奮嘗授經於同郡宋檜雪先生所檜雪名瑛罷工部郎家居經學專門四方従游者丙舎常滿隠君學二年許不肯竟學檜雪公見隠君資性秀穎歸隠君女勸隠君竟學隠君遂竟學學既成一再試於有司不利輒棄去嘆曰吾兄既巳用之於國吾欲施于家遂不復試檜雪公前歸隠君女曰宋孺人者佐隠君理家政檜雪公有家範雖女子皆能誦說典訓知古女婦賢孝故實習女工下至烹餁皆有準式故隠君夫婦事謝太宜人常得其懽隠君兄弟五人三仲皆游宦伯季相繼夭死獨隠君在太宜人側隠君與宋孺人旦夕視寒煖之宜撫摩疴癢有一魚一肉宋孺人持作羮躬調劑甘㫖必宜適與隠君捧持進太宜人太宜人老逾懽忘其三子在外三子亦得專意守官無内顧憂皆隠君力也隠君持門户起家家漸裕然一由力本人有假貸責索通以情不盡法暴横與里巷人處和易率直人樂與之親不知其爲勢門也隠君急然諾慷慨任義親舊有匱乏者時加賑贍雖數至無勌色里中馮熈者年九十病痿隠君月出廪給之郡中有戚公韶以能詩有聲縉紳間隠居雅與游及死家甚貧隠君爲具棺斂皆従厚親撫其喪以歸晚年欲出田立義塜以息火葬又以賦役煩苦欲買田儲粟助其經費將上書撫巡行之後格於異議不果至今人猶惜之隠君三兄従宦者皆爲經理其家事從次第歸老隠君以全産付之毫髮不自私有過責隠君者曲意承順終不至失懽隠君於大理公最厚善大理公歸時年已五十餘與隠君同處二十年每日必共食非旦暮不至私舎大理公好賢隠君常延致郡中名士相與琴奕觴詠酬倡竟日客退則探養魚種樹書疏渠藝竹備林泉之致兄弟徜徉其間間取彛鼎圖史摩挲賞玩共陶暮年家之有無與嵗事登耗相與共之不問爾汝故人以爲隠君獨私厚大理公不然亦其同好恊趣也大理公苦無子後有子宜陽甫冠而大理公卒宜陽有文能自立所交皆江左賢俊隠君賛成其業功居多隠君亦累不育末始舉子光裕讀書能世隠君家與宜陽後先相望以起則天之報隠君者宜然也隠君殁之十四年爲嘉靖丙辰墓道之石尚闕而不書光裕再拜以請良俊乃爲論著其大者如此隠君細行可述者甚多具奉化令徐先生墓誌語中史氏走何良俊曰東海有三岡身者余家並之以居自海上北達于黄浦隠君家在焉相望一舍所隠君之澤沾潤數里里中人有徳隠君者時時來道之若隠君孝友細瑣之事外人不得而知者則余女弟爲董氏婦每一歸省輒爲余誦說其詳又余家先府君好賢能得客四方客有道隠君所來者必過先府君或造先府君者亦必過隠君余爲童子時従旁竊聴之每客至語及隠君客盡傾故余所述隠君事皆實不虚余交隠君子光裕光裕曰先隠君有高世之行三法得表于世夫所謂高世之行如前所指者是也然是三者前輩尋常有之不甚爲竒節迺今俗漸漓矣故有毁人之兄遺以一疋縑訾人之父投以一束素其子弟欣然納之吐欵恐不盡出財物貸親故厚息取償計必得然籍數家之産僅以供妻孥一夕之歡耳有賢士挾一冊持一藝造之閽者謝去不速必加譙呵一富者在門沾沾喜出肅唯諾猶顧侍者曰得毋少需客否客得毋色動否厚設否客去猶蹴蹴不自安此事在縉紳間尤甚由隠君視之即謂之高世之行非耶然此風其所由來者漸矣郡大夫有斯世之責者讀其文其尚軾隠君之墓見者必曰隐君之行如此一布衣且死猶爲郡大夫所禮孰謂爲善無效耶則斯世尚庶幾有敦哉來君墓誌銘許應元嘉靖丙申嵗吏部最天下有治行吏五十人上名迹天子請以爲従臣制可於是五十人皆徵入而丹陽令來君名在選中既入拜兵部職方主事改禮部精膳居有頃精膳主事臣汝賢昧死言臣幸以甲科待罪縣令爲陛下䕶元元無狀陛下不以臣能薄拔擢郎署臣志分榮矣而臣不幸有犬馬疾不能朝夕門下汚省署臣不勝大願願賜罷臣得近醫藥再望見闕庭願盡死力於是天子哀憐之與告歸歸五日爲閏十二月朔日卒于家年僅三十六爾嗚呼賈誼短折歐陽詹生李賀皆不待終養死又何其不幸之軌一也造物者不常幸生才幸生才而中道委棄不觀其成此又何也當正徳末季東南士習猥陋極矣經生不欲究明指歸踵悖馳舛幾幸利禄文士則凑飣偶儷蜿孌蟺聯剽掇故藻以爲容澤此猶不能涉靡曼之堂户又焉覩爾雅深厚者哉來君起童子華采振暴及壯乃益沈思術學探抉微眇自六經先秦漢以來諸家言貫穿附離撿押其辭以肆其文然後其爲道閎逺奥雅將與古作者同風而竟死矣豈非天乎始君鄉舉及禮部試皆第二比當大對同對生謂來子必高等巳而第三甲同進士出身士論稍譁矣及當授官謂來子必京朝諸郎官然竟奉新知縣莫誰何其然奉新江西陋邑也其俗獷鬬狠訟抵訐扲鍵務必勝不勝則隂伺持上官短以責右巳無何依違之不且立去君至批根其尤數人痛法繩之既而曰此豈道化意邪其他固赤子于是開學館延進諸生爲指示經法爲文章躬行如是而飭諸生歸以諷其父老子弟父老子弟皆曰吾令良頗輯不爲非諸部使者大異之薦上其能凡在奉新十月而調丹陽丹陽道衝兩都舟車至西郭門日數十百縣令日出出河滸造請諸大夫賢者磬折爲禮視供具徒𨽻一一口指授無失賔客意久之歸縣中爲民均賦平爭訟調徭作不暇給矣又時時延進學官諸生説經訓勸行如奉新時愈開廣館穀諷誦不絶亦自其中心好樂之然巳罷甚竟積瘁嘔血至不支云君居職亷歸時予親見其橐中不能十金所至務爲民興利在奉新開下五鄉塘瀦水令田肥饒視上鄉等在丹陽則濬練湖溉田田少旱患生平無所玩好但嗜讀書自爲諸生至劇吏口未嘗廢稱說也雅游自同年之雋與四方賢豪有名皆願交親之武進唐順之閩中王慎中錢塘楊祐以道義文藝相取其樂善詡詡推置自喜誠其中不能自解也觸情縱談不忌慮旁後人亦以此忌之謗怒興矣且自古號稱賢者孰能免多口哉彼於世齟齬其心誠有所合也豈弟君子無信讒言夫惟君子而後無聴語曰蓋棺事迺定來子死至不能爲斂而謂其去而受同列之餽金也安在哉安在哉初君病甚應元省之涕泣執應元手曰余有心子知之乃今巳乎遂卒二嵗而應元爲論次其大節刻之墓石系曰來君諱汝賢字子禹壬辰進士也其先世河南鄢人系出宋龍圖學士之邵之邵孫時知紹興死而葬蕭山遂爲蕭山人去紹興十一世而爲君髙祖雍雍生曽祖珪珪生祖昉昉生父東母孫氏配安人錢氏仁和人也生二男二女二男長曰獻䇿次曰獻功二女長許聘山隂胡芾後二嵗未嫁死次許聘錢塘許暘孫應元子也銘曰與子游兮澤宮庶見君子兮其文有容嗟君子兮胡見爾樹松兮與子游兮上國庶見君子兮其儀不忒嗟君子兮胡見爾樹栢兮巋其窽中堅且好矣嗟君子兮遐不壽矣噫明文海卷四百七十
