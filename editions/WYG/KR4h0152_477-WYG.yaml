body:
  text: 明文海巻四百七十七餘姚黄宗羲編哀文五祭于健文瞿汝稷歲在柔兆予遇吾子于青鴛之宫時予羈旅廓落世之目予無異巻蓬方與老衲晏坐論空而吾子適擁騶來從予盤旋欲避老衲謂予此今之少文遺民葢深入吾宗耳聞其風當千里命駕尚何疑乎適逢及面則目接心通矢口所談莫牾于中既而金沙于中甫亦一見深契三人者㳺于長安之市悦乎其無係謷乎其不可制秉燭相對恒盡漏忘寐鸚林鷺池之苑猴江龍窟之地青目交眉之名宿滌腸易首之開士時與窮五衍之源索十通之柢予之所詣子無不至子之所同予未始異而子最嚴于好惡介于義利服勤王事搰搰盡瘁劘壺旁之玉女繳宫鄰之金虎阽危亡而不惜指萇胥而拾武息陰避于曲木秣駒擇于蘅渚寜佩芳而顑頷恥歠醨以容與而又樂人之善惟懼弗副規人之過惟恐弗悟古稱郭有道為善誘吾子當齊駕而並御也予嘗試語之曰子既棲志禪寂而猶蹩躠儀刑将無未復是非之劓尚負仁義之黥耶子笑曰知形之未嘗形者斯生生而無生矣萬善詎云有作大定寜是沈㝠哉苟離事而蘄寂是羊鹿之權乗自吾觀之禮干無異於忍鏜義櫓無異於戒瓶井榦麗譙吾之塚間林下九市五陵吾之慧室覺城子與吾同逍遥於此域久矣胡此日而復吾徵耶于是相視而笑元規之塵為之一清乃衆枉矯直孤忠靡白子操愈峻羣猜愈積豈昧諤諤來怨之的豈昧多偶可以燕息志之所存九死弗易先君後身困而彌適庚寅之秋虜窺凉陲詔出雲中馳驅視師子憂軍興少府弗支覃精而籌牢纎絡微白簡所刺塞之窮竒其人盖狎列蹷以為譎連諸渠而相維嘯呼䕫魈竊化太儀彼叢而滋固子殫忠而以危子之兹行我送于圻予謂吾子疇識前期子之來歸予寜在兹子亦依依不忍我違及子返斾舉酒相屬夷猶觴詠庶幾濠濮壬辰九月予徙南服瑶華之遺每勤雁足憂世遐思亹亹牋牘鑿枘日殊聲華日馥孰謂神羊肯替厥角論列諤諤六符蜷兹歲孟陬聞靈有隕珠之傷累章上陳乞歸柴桑未幾而得吾子矯首而北睇日覯夫耿光約既久而弗踐徒忡忡以迴腸仲秋之末中甫忽走札眡予稱見吾子于江都疾勢靡留和緩莫圖病中眷眷惟吾二人是需予聞悲愕不遑脂車匍匐見子則精華已竭魂氣欲徂予問子定力何以心亦何所懸乎曰吾反吾真奚懸吾神既而中甫泣問之垂絶嫂夫人號而問之卒無異陳資斧如洗蕭然甑塵治木營歛悉自中甫夫兄弟九列廿年垂組赤貧若此砥節良苦矣懐忠不達烝嘗莫主身沒羈旅所遘鉏鋙矣自世人言之盖有不勝其悲而吾子泊然翛然一無所縻非向吾與子抵掌而談者寔有所窺孰能涉生死而無變閲萬有其若遺哉是知吾子雖棲皇百致而實無為也雖奄然形謝而實靡虧也凡五帝之所争三王之所馳闗吾子之目直渤澥一漚之盛衰耳吾子置渤澥於骭之一毛又何於一漚而規規耶提挈斡維游於無涯彼滿志於一漚而恣睢豈與之相雄雌哉其相摩相刃適足以瑩子之徳輝亦何能措其刃若靡耶乃今而後吾與子目接心通於招提者其有稽矣彼糾纒於形骸之末又何以知之吾絮酒而告子亮欣欣而格思祭趙汝師宗伯文瞿汝稷繄殷高之神明兮卒放棄夫孝已賢不諒於所生兮矧悠悠之足恃嗟夫子之嶕嶢兮崪薄雲以隆起行不周於今之人兮卒侘傺以沒世忳憯結以汍瀾兮吾何為而聞是方予履之多屯兮鬿雀睨予而期括荃眷眷以掩翼兮出百危而不死及余游于燕市兮悲夫子之道窮阽沒人之文身兮而盛繡其華蟲物我邈其殊尚兮詎余美之云從豈不知易初之媮樂兮曰吾有畏于皇穹也寜謇謇而葅醢兮恥靡靡以從容也涉九死吾其無悔兮拾龍梅之餘蹤穆合堂而同席兮耿相劘以為忠進鉏鋙以離尤兮洎就遷于南國析白榆于雲臯兮搴平露于靈域紛相遺于離居兮願黽勉於令徳及復覿于國門兮愕精爽之非昔憂疑積而樊和兮曷比肩于金石事緯繣而總總兮聚未浹而中析荃送予于郊坰兮意繚悷而靡釋予謂夫子其少降兮請無邇于機辟别未遠而厲作兮終然鎩其鸞翼繄荃志之所存兮遠猶卑于高稷何嶮巇之嫉妬兮伏短狐以潛射馳懸圃云趨卑兮佩朝華云匪晳長儃佪以紆軫兮孤憤死而靡白嗟乎方金虎之哮哮兮搏一世于指掌當袒括而笑歌兮驅中夏于夷壤彼宿儒若聞人兮競蹀躞以相賞荃捐軀以止之兮還彜常于既喪豈喔咿與嚅唲兮可聨軌而同量汲生立于漢廷兮淮南為之寢謀子罕哭介夫而哀兮敵國􅌢其戈矛嗟夫子之不作兮豈獨軫予之私憂揚哀些之纒綿兮慟凴尸之靡由采正則之畹蘭兮挹汨羅之清流于是薦之先生兮庸著余不忘先生之嘉猷祭傅長孺文瞿汝稷遡癸已之仲春予遇吾子于留都時以無㫖之㫖詔人首稱吾子與徳夫維都中之英俊方鱗萃而星鋪或皭白擅曽史之秀或文章吐左馬之腴或契三幡之秘或握兩𤣥之符吾子與徳夫率白眼而容與之曰未證吾骭一毛之太初茍證此初則洙泗與濓洛不得専美于儒而霄驂鸞鶴之侣掌移世界之徒皆順吾指顧隨吾步趨不然雖各仡仡以終世而卒未入于一如時羣英咸陶鑄于吾子率望崖而趦起予一日笑樹指而語吾子凡子之所稱不越吾此一指云目擊而心詣已隔濶于萬里况蹩躠以擬議雖華顛而愈否子瞋目而恫喝云何子之誇謾責時夜于未卵飫梟炙于擬彈予捧腹而嗢噱語吾子其毋誕吾子遂以定莫逆之交是夕互嘯歌以申旦時中州有張孺子者亦于瞬次而㳺此變幻孺子未幾歸于中州惟徳夫與吾子旦暮數以予㳺觴詠放言窮討遐搜食于苟簡之田翔于揺蕩之陬摧紛膠之桁楊出攌拏之拘囚棄罷牛之蹣跚乗騏驥之瀏瀏杳蹠有以入無競灼隠以暴幽既徳夫以符卿北涉吾子與予交益密予間謂吾子惟徃哲之詣此率欽欽而慎密發威儀之三千坦無作而燕逸彼嗣宗之滔蕩寔既華而未既實試以是而稽古孰云三軌之未一吾子謂予勉之期皓首其彌飭涉乙未之孟秋而吾子亦以司勲徵予謂吾子繼兹當相與以神無索于形子登要樞國賴持衡予有牋素不入子庭烟霞日月孰非我汝何必疏麻效情兒女吾子謂予吾行吾素子率子榘孰有吾子可滓沮洳為别未久而子之遺書于予者不可指數予不一報而子愈心許今開篋而諸書具在予毎見則淚汍瀾而若雨也嗟乎宣尼歔欷于銅鞮䝉荘致慨于郢斤吾子既棄予而反真予藏狂言将曷陳世之愍子者謂子事皆未竟是猶指溟渤于一漚窺蒼蒼于尺鏡未望洋而向若昧登高而測影殊不知吾子右衽拂于不周左袪挂于扶桑挈隂陽而闔闢超天地而馳驤于何未竟于何不光予所汍瀾于吾子直一時之情傷豈真以子為不可作而予為尚未亡耶自靈輀之南旋方羈守于江黄日雜遝于簿書媿束芻之未将穆東睠以陳辭聊薦忱于𤣥堂靈昭昭兮我臨美連蜷兮樂康瘞古誌石文鄒觀光去先塋數百武而近工人掘地得古甓焉縱横尺有奇余拭而讀之則唐人墓誌銘字尚未剥落可讀古色黯然其葬以大中元年十月癸亥其先世皆貴盛三世父子兄弟簮纓相望而獨葬者誌者其姓名蝕不可辨其地則安鳳鄉其人誌稱其聰明仁孝然文甚簡質不作近代諛墓語嗟乎葬者藏也骨肉歸于土無不壊也誌以志之銘以名之庶幾陵谷變遷而名不朽而唐大中距今千有六百年羨門潛闥玉匣珠襦一切無有是誌落他人手供累塊耳張籍詩千金立碑高百尺終作他人柱下石今既不幸而見發又幸而遘余而又不幸終不能舉其名世之人役役百年之内復規規百年之外敝精竭神以蘄不朽亦何益哉晏平仲所言焚之亦可沈之亦可其衮衣繡裳而納諸石槨亦可其衣薪而棄諸溝壑亦可達哉其言之矣雖然余既巳耳而目之矣安知爾之神氣不傅抔土以存哉余命童子瘞之故處而仍以觴酒豆肉為文以吿之曰千百年之前貴邪賤邪賢邪愚邪吾不爾知千百年之後存邪滅邪顯邪晦邪爾不自知又更後此而千百年爾銘無恙邪吾言存邪吾與爾皆不能知而向為爾也者惻怛悲哀而誌之今為爾也者歔欷太息而瘞之是造化小兒之愚吾與爾而吾與爾又不知也悲夫天目徐公誄俞允文并序公諱中行字子與姓徐氏湖州長興人也舉嘉靖庚戌進士歴刑部主事員外郎出為汀州太守外艱服闋補汝寜被謗貶長蘆鹽運使運判内艱家居遷瑞州府同知服闋擢湖廣按察僉事雲南布政司參議福建按察副使轉按察使遷江西右布政尋轉左布政春秋六十有二萬歴六年冬十月十三日得暴疾卒於位嗚呼哀哉公自少知名結綬登朝所至遺愛刻石頌徳其所友善才彦則陜西按察使濟南李攀龍于鱗南大理卿吳郡王世貞元美福建按察副使廣陵宗臣子相山人臨淄謝榛茂秦與公為五人時謂之五子餘數年子相于鱗茂秦皆先後淪謝而兵部左侍郎歙汪道昆伯玉河南左參政荆楚呉國倫及元美弟江西按察副使世懋敬美最後入亦謂之五子初元美未嘗與余交顧毎稱余五子間以為不可使若人湮沒不起長譽于人間也由是五子者各遣書致慇懃多驩而辱公愛厚尤至餘二十年矣奄忽摧折傷其奈何公之歿也敬美方與公同官遂得經紀其䘮定其後嗣元美亦己周䕶其家為撰神道碑文伯玉銘其墓石謂余宜作誄詞旌之余曰公等皆通顯清譽滿天下其文必能俾子與之遺聲昭當年而垂後代為不朽矣且子與誠知人而沒世率多賴公等之力若允文衰廢末才又奚能厠大雅以訓其厚徳然述近情而極纒綿悽愴之詞非長戚幽居如允文者不能為也輙為哭而誄之其詞曰穆矣徐公天挺哲人純懿敦大慈恵恭温研幾隠賾博綜典墳發篇􅇨麗蘭敷蕙芬聲實之隆靡不彰聞爰惟厥初矯翼斯升乃署爽鳩克允克明哀矜折獄衆彌歸誠平反寔多益大厥聲作牧于汀廣㓂凴陵日肆侵偪萬姓震驚公納流竄城門寢扄險備周悉梟風不行簡稽猋勇要擊武平斬首藍屋餘黨是懲亂繩以理境内肅清乃罹厥艱尋補汝寜殫精圖治細齊民情隄障决河革剗煩徵恢崇孝弟甄奨湮淪𢎞開講堂登進諸生扶衰拯廢贍死周貧化極中和俗以還淳天貺休瑞郊出麒麟桂生有蠧人實害能公遂遭貶鹽筴是經遮道願留攀輪失聲古之遺愛權此為輕逢辰之缺内艱荐仍茹憂成疢閉絶巖衡沈彩終發藏輝必呈公于此時華問載興累遷藩臬楚澤滇雲竭心公朝罔憚劬辛迺建隼旟廉察八閩紀綱條振列辟儀型進陟藩伯保釐豫章吏懐其徳民識其方曽不踰歲遽及殘殃哭位夭乏柩櫬荒涼寮屬軫動父老増傷含禭致禮賻贈充箱神駕東還川塗感咽楚招幽怨齊挽遥切天不憖遺仁賢殞絶嗚呼哀哉惟公才彦秀越時倫惟公光儀輝映珩珉泛愛博約賓客盈門家雖屢匱公獨自欣鄭荘既遠文舉亦陳其在於公事近猶新𤣥牀未妥素榻隨塵嗚呼哀哉公昔奉使按部呉鄙枉駕蓬窟許為知巳款睠之厚與日積累其後汝寜郡志失紀謬延纂輯遣幣千里具言嵩高二室之美菖蒲九節巨柏千祀倦㳺潛盤歆其必至值公被播臨發旋止公愈加勤慰藉無已諸所推拔匪終伊始毎謀我貧餽遺相繼我之懐慚曽不遐棄綢繆恵好合志同氣如何奄忽頓成異世嗚呼哀哉曩者首夏公還京師契濶既久枉櫂東來元美亦集置酒河湄流連信宿以副渴飢余時規公沈湎奚為願保精粹黄髪為期公笑緩答行當佩之朅來四書並審安恞忽承訃問驚怛且疑連得後信公果長乖胡疾之亟卒使不治如公仁賢受數則奇晚就榮路大位日躋将闡王略以贊明時命不終泰才不盡施銜恨沒齒吉徃凶歸嗚呼哀哉人之相知始終幾何余徃狷狹公以寡和若石投水莫覿瀾波追想歡言怳然在目昔之徃也談笑華屋今之徃也涕淚相續徒有百身痛不可贖余既衰病生日苦促死有遺靈見公亦速死儻無知永隔㝠邈嗚呼哀哉祭張幼于先生文俞琬綸公於先子稱忘形而於綸忘年綸何人哉而迺與忘年亦足以見公之竒公一生竒而死更竒閭里接公之竒状百出無不怪而笑公言及公之死又無不怪而笑公嗟乎不知公而但見公之状與公之死烏得不笑何怪乎里人哉然則公之死當唯是風雲帶憤泉石下愴不復可於人間求痛公者乃一日遇東浙人數丁相與集舟中齒及公之死一人云太白扶風豪士歌天津流水波赤血白骨相撑如亂麻不意為幼于草堂作䜟因數人相對垂淚綸以為皆公生平交也而曰曽未獲一識面噫此可見公之為人不當於竒不竒間求矣祭胡一俞琬綸爾一伎家未嘗習禮自幼于死斷棄歌舞視梅梅而言繭繭若居䘮然其出至情可知及設祭哭之撫棺擊胸下拜不能起從此遂病即病或不盡從此而當此適病亦足多也病中忽忽見幼于無所怖懼一日有老媪同幼于及難者促之使去乃翻然而起顧謂夫曰即與汝長别汝勿悲吾得死所矣頃即氣絶嗟乎幼于即才人然才豈爾儕所好載鼷以車焉樂鷃以鐘鼓何大不倫而迺不能忘情幼于若是豈不難哉玉骨寒灰金粉黄土流傳蒨桃死得事冦公亦事屬有無爾搔背不如麻姑灑掃不如玉女乃得與賢者相從於碧山紫烟之間復何憾矣祭半齒文俞琬綸有序為齒蟲齧去半齒埋之玉園梅花下因摘花祭之泣而告曰三十年苦辛爾噤之二十年酸味爾嚼之千萬斛愁惨爾嚙而忍之徒有飲聲不識笑口爾固賤骨也賤愈可憐賤莫如焉馬骨猶埋矧爾乎卜花下少人行處埋爾鄰爾以花本覆爾以花瓣沁爾以花露䕶爾以花神蚓窟為斧蟻穴為堂草雨為芳醪蜂蝶為死友使寒微片骨雖賤能香復懴來生毋墮業軀也憶維吾生三十有幾此日何日齒落之始毛骨無恙半齒己死人間煙火爾先獲洗言語凶咎爾先謝委舌本滋毒七情所忌半逺舌者俾先脱穢半近舌者墮業未已若有深意微示衆齒半雖未已方衆則邇零丁揺動旋将繼此誰料一齒瘞之二地况本分者是惡足倚祭桃影俞琬綸有序園南有桃二株左臨小池右傍齋牕牕外即莽蒼四野間有人跡迺常掩牕日對桃影就桃相影就影闢牕南齋之勝半在此牕也戊申之水為禍竹木南園雙梧園南二桃相踵而斃予業有文祭雙梧矣桃影之功不減梧葉復有祭桃影文自我得爾夙暮對向爾亦親我案几依傍分裂酷炎逓引清凉宛弄旖旎拂掃塵障動無風聲因風以颺可瘦可長時偃時仰仰去聲月高爾低月下爾上愛不可摘畫不可状收去迴波送來翻浪伴我孤寂形影相望又低徊相望示我至理空色一相蝶舞朦朧鳥飛想像蟬吟掩隠蜂簧鬬撞争妍助幽皆爾之貺牕設常闗暈濕書幌有時而開清移幃帳誦讀寝處頼無俗況醫瘦猶可醫俗難量方與爾盟升恒莫忘忘去聲無何天災佳樹為障雙梧已死爾寜無恙樹隕葉凋枝亡影喪月冷風凄鶯悲蝶悵猛雨破紙烈日肆炕爾巳歸虚我心則悵顧彼齋牕愈増憤愴遂廢此齋并歸消蕩誄雙梧俞琬綸有序南園庭中二椅梧以水死主人某設酒脯祭而别之春荑秋榦誰諧心契之交樽淚猿腸為報情深之樹痿猶望起枯不復榮酣酣桃李是豈鳳條槭槭松楸亦非佳種南園既無遺秀東君固有餘思是有誄文雙雙椅梧列吾南居兩柯交錯滿庭扶疎人坐其下苦不開虚毎翦其繁翦為薪芻南居多木寜唯爾與然而唯爾近我坐隅鸎歌蟬吟有功讀書破碎烈日弄風南徐如是以來二十年餘天灾流行江南漆沮天非殃我我亦受痡天非殺爾爾亦命徂嗟爾前生翦除煩紆煩紆既去蕭疎亦無良鳥哽咽清風欷歔請無欷歔人世蘧廬蘧廬同盡豈私吾居吾居復然况爾雙梧明文海巻四百七十七
