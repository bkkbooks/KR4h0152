body:
  text: 明文海巻四百七十九餘姚黄宗羲編稗一佛學王禕佛氏之學其未入中國也世尊大弟子阿難陀多聞縂持有大智慧結集世尊所説為脩多羅藏而諸尊者或後或先各闡化源優波羅集為四部律謂之毗尼金剛薩埵於毗盧遮那前親授瑜珈五部謂之秘密章句無著天親頻升知足天宫咨參慈氏相與造論發明大乗謂之唯識宗旨西竺龍勝以所得毗羅之法𢎞其綱要謂之中觀論燉煌杜法順深入華嚴不思議境大宣𤣥旨謂之華嚴法界觀此其大略也自漢永平二年佛法始入中國厥後離為異宗曰教曰禪曰律凡三焉魏嘉平初曇阿羅始持僧祇戒本至洛陽曇無德曇諦等繼之立羯磨法唐南山澄照律師道宣作疏以明之四分律遂大行是為南山之宗薩埵以瑜珈授龍猛猛授龍智智授金剛智唐開元中智來中國大建㬅茶羅法事大智道氤大慧一行及不空三藏咸師尊之是為瑜珈之宗唐貞觀三年三藏𤣥奘徃西域諸國㑹戒賢於那蘭陀寺因授唯識宗旨以歸授慈恩基基乃網羅舊説廣製疏論是為慈恩之宗梁陳之間北齊惠聞因讀中觀論悟旨遂遙禮龍勝為師開空假中三觀止觀法門以法華宗旨授慧思思授天台國師智顗其説乃大備顗授灌頂頂授智威智威授惠威惠威授𤣥朗𤣥朗授湛然是為天台之宗隋末順以法界觀授智儼儼以授賢首法藏至清涼國統國師澄觀追宗其學著華嚴疏論數百萬言圭峰宗密繼之而其化廣被是為賢首之宗瑜珈久亡南山亦僅存其行於今者惟慈恩天台賢首而天台為尤盛此則世之所謂教也世尊大法自迦葉二十八傳至菩提達摩乃𢎞教外别傳之旨謂不立文字可以見性而成佛達摩傳慧可可傳僧璨璨傳道信信傳𢎞忍忍傳曹溪大鑒禪師慧能而其法始盛能二弟子懐讓行思皆深入其閫奥讓傳道一一之學江西宗之其傳為懐海海傳希運運傳臨濟慧照大師義𤣥𤣥立三𤣥門以策厲學徒是為臨濟之宗海之旁出為溈山大圎禪師靈佑佑傳仰山智通大師慧寂父唱子和微妙𤣥機不可凑泊是為溈仰之宗思傳希遷遷之學湖南宗之其傳為道悟悟傳崇信信傳宣鑑鑑傳義存義存傳雲門匡真大師文偃偃之語言如青天震雷聞者掩耳是為雲門之宗𤣥沙師備實偃之同門友其傳為珪琛琛傳法眼大師文益益雖依華嚴六相唱明宗旨而逈然獨立不涉凡情是為法眼之宗遷之旁出為藥山惟儼儼以寳鏡三昧五位顯訣三種滲漏傳曇晟晟傳洞山悟本大師良价价傳曹山元證大師本寂而復大振是為曹洞之宗法眼再傳至延夀流入髙句麗仰山三傳至芭蕉徹石晉開運中亦亡弗繼雲門曹洞雖僅存然不絶如綫惟臨濟一宗大用大機震蕩無際久盛於今此則世之所謂禪也律學均以南山為宗真悟智圎律師允堪著㑹正記等文實出六十家釋義之外是為㑹正之宗至大智律師元照復别以法華開顯圎意作資持記乃與㑹正之説不能有同是為資持之宗二宗今雖並存而學者多遵資持之教此則世之所謂律也大抵佛之為道本無二門自去聖既逺源逺而流益分於是師異指殊各建戸庭互相矛盾禪則譏教為滯於名相教則譏禪為溺於空寂若律之為用雖禪教所共持而取舍各不同至於為教禪之學者又各立異以取勝一彼一此不相出入自教宗言之慈恩立三教天台則分四教賢首則又為五教自禪宗言之慧能與神秀同受法於𢎞忍能則為頓宗秀則為漸宗道一神㑹同出於能一則密契心印神㑹則復於知解其不同如此至若天台教宗之一也而四明知禮孤山智圎性善性惡之説如氷炭之不相投臨濟禪宗之一也而或以棒或以喝至横川拱則復以聲偈其示人之要如枘鑿之不相合支流乖錯論說紛紜殆不得而悉數也道家王禕老子之道本於清靜無為以無為為體以無為而無不為為用道德經五千餘言其要旨不越是矣先漢以來文帝之為君曹參之為臣常用其道以為治而民以寧一則其道固可措之國家天下者也自其學一變而為神仙方技之術再變而為米巫祭酒之教乃遂流為異端矣然而神仙方技之術又有二焉曰鍊養也曰服食也此二者今全真之教是矣米巫祭酒之教亦有二焉曰符籙也曰科教也此二者今正一之教是矣鍊養之事黄帝之書雖頗及之而皆後人依倣而託之者及赤松子魏伯陽者出實始為之宗至於盧生李少君欒大之徒則又變鍊養為服食其為術愈偏矣符籙之事黄老之書所未嘗道張道陵冦謙之等實創為其法及杜光庭與林靈素輩則又變符籙為經典科教其為事益陋矣然嘗論之鍊養之説歐陽子嘗刪正黄庭經朱子嘗改注參同契二公大儒皆不以其説為非山林獨善之士用以養生全年固未為得罪於名教科教之説鄙陋不經庸黄冠資是為逐食之具為世患蠧亦未甚鉅也獨服食符籙二説本邪僻謬妄而凡惑之者鮮不罹禍欒大李少君于吉張津之流以此殺身栁泌趙歸真之徒以此禍人而卒自嬰其僇張角孫恩吕用之輩遂以此敗人天下國家而不顧矣今也鍊養服食其術具傳而全真之教兼而用之全真之名昉於金世有南北二宗之分南宗先性北宗先命近時又有真大道教有七祖康禪之教其説又自相乖異至於符籙科教具有其書正一之家實掌其業而今正一又有天師宗師分掌南北教事而江南龍虎閣皂茅山三宗符籙又各不同先儒有云道家之説雜而多端其信然矣又謂其書皆昉於漢桓帝之時今其經典以為天師永夀年間受於老君是也世傳太平經最古且多今不復存然其所言興國廣嗣之術殆不過房中鄙䙝之談若大洞等經大率六朝以來文士之所造雖文采可觀而徃徃淺陋無甚高論朱子謂佛學偷得老子好處後來道家只偷得佛家不好處執是説以求之道家之本末可論矣評二相海瑞中𤣥是箇安貧守清介宰相是箇用血氣不能為委曲狥人之人一時保留存翁攻中𤣥者頗多中𤣥嘆曰非鄉愿不可以得人聖人中和氣象行無過差有不得人者乎中𤣥說於責巳不是世俗習為和同論世俗則是耿楚同以貪戾二字論説戾之害大以戾病中𤣥最當其他大抵出私見黨同不然也然中𤣥後出首相吏部可為之權一旦在巳何如哉何如哉人言嘖嘖縱中𤣥果無入巳之贓不能防閑覺察以致有是入己入人其罪不大相逺縱舍此一節不論首相設施吏部黜陟猶夫人而已興利除弊亦未見其有以當人心合天道比隆虞夏反我國初良法守而行之中𤣥其得為賢哉瑞嘗先謂存翁不如中𤣥之高中𤣥不如存翁之穏悔己一言之誤於中𤣥有深望焉非以伊傅周召望之也我朝諸公稍涉髙位便是全然模稜養望因因循循度日保官孟子謂自以為是而不可以入堯舜之道今之謂也國無幸矣民無望矣中𤣥鬱火强陽猶可藉之以進飲食嗜味調攝真陽反手而之太和元氣或可完復比之存翁一味甘草不為烏頭附子亦不為參苓耆术無大利益相逺也今則又如此矣豈髙者虚曠無用穏者猶縝密顧前顧後無大失少有濟耶存翁為富中𤣥守貧此未論及人之難知人之難得如此哉天下有非禮非義人情世態牢不可破未易挽而回之者居今之世欲成天下之事不得己似亦不可不為調和之劑然甘草國老為佐為使則可存翁以之為君和柔之義勝直方之德微此其所以誤也産業之厚亦坐此病彼非不為富貴人也然天資近善害人為富彼必不為優柔不斷人為之彼亦聽之亦不免掩耳盜鐘之心耳近日贊成遺詔謂之伊傅周召可也而前後不稱居家致富尤大為累可惜可惜存翁之論定於是矣中𤣥再相逺未詳知大概血氣用事較之存翁得失無大相逺均之無足取也社中新評有序孫七政嵗在乙亥之秋僕抱病索居情悰落莫緬懐社中諸子及一二友生自蔣逕求羊謝家昆季外或屏迹千里或事變生平遡往則樂事傷心悲來則佳期慘緒僕雖壯夫能無驚骨莫覯者之子清揚莫忘者斯人粹美而予所欲忘者形也所欲遘者心也故曩嘗贈尹教甫詩云但今襟期茍相許白首不見心相通豈若人間行路難輕言托友九疑峯以此思情則情可知遂各著風神合陳標致凡四十有三人題曰詩社新評又曰懐知篇揭諸座右譬若層城瓊樹朗照目前洛浦明珠交輝席上雖風雨如晦而若聆飛屑之音山河云邈而恍覩映玉之度矣緘諸同好用代折麻所歉者先達則莫罄揄揚神交則未能彷彿非敢謂曰一代風流盡在是也莫廷韓為人正如淮南小山作招隠悲懐逺意不出乎騷家宗㫖而以氣韻峻絶獨稱髙作宜其為風流之宗主殷無美為人如魏武帝短小精悍雄視諸傑故其經營四方動多神明䇿畧而阮陳文雅更自婉媚酷似其為人梁伯龍為人如闗門敗俠聞雞出走雖壯心猶在而神氣索然忽遇少年遊俠恩情篤至匪特才情乃爾亦其所遇故然楚王孫為人如藺相如澠池之㑹氣陵秦昭而能為亷將軍折節千古生氣若置我竹林則山吏部之留心時務也張仲立為人才髙燦發而託意幽𤣥正如冰壺秋月本宜著煙霞外去迺強使適俗故少年即多子建憂生之嗟顧茂儉為人如班伯遊許史子弟間迹寄綺紈心居風雅邇來茅山諸作大似靈運遊山尹教甫為人如聲子班荆道故旁若無人論交至此殆萬物莫移黄金落色之句令人感慨擊節江右風流首見之子王世周為人嘗評其苦吟若禪定與世若處子大足稱佳惜其不拘小節幾為多情所累羅居士為人正如桃李不言下自成蹊僕與綢繆最密更不能得其不可人處此真有長者風沈嘉則為人無論其才情富逸向本四明豪士一不稱意便爾投筆其任達如此猶存賀監風流黄淳父為人如陶𢎞景聽松風幽意可對而心存竒節朗朗照人今長逝矣倘不遇羊曇醉時那能更過西州門又曰今幸有青甫在朱邦憲為人卓犖有氣是一男子能使王元美目為孺子林宗此非偶然周若年為人括黙而有深沉之思人與之居宛若李青蓮獨對敬亭山相看兩不厭者詩藝精工是神龍間品格張幼于為人好賢如渴有古人之風前輩風流蕭索殆盡若非之子吳門大為岑寂是于我輩中有中興之功也俞孟武家本臨安貴公子遭家多釁闕康山人幽致灑然直意其閒猿野鶴羣耳及為君死友萬里負骨竟有鐵石心腸豈惟山人少有抑且國士無雙董子崗於荆溪盍簮毛鄭甫自金陵贈縞晤言何遽契濶何深董則練達先朝惜未見蔡邕獨斷而竟以貧死遺書散亡毛則以急難友誼故辛苦獄中若更有急難者鄭甫當不至此乃知我輩不可無郭元振又不可無魯國孔融古疁自吾家無美唱之文采得不寂寞曾與詩筩往還者僅見金張二君金則季野春秋張則子國顔子倘有宋玉景差復出無美遂為辭賦之祖矣陸無從聞其獨步江都嘗於黄淳父座中目擊而己不交一言然其佳句有云匣有魚腸堪借客座無狗監莫論文其人已可想見苕溪戚元佐未知為何如人迺能知僕於明妃曲隴頭水等篇賞識獨至謂為絶倫方欲締交而遽云徂謝㝠㝠之中負此良友墨談邢侗三十年前墨止利劑成餅不施文采貴在草細煙真膠清杵到即無香料汪汪池腹間作清泠觀䑛筆不膠入紙不暈今製一取古文竒字篆籀填銘鼎敦饕餮神怪千態花木蟲魚幻象百出妙奪化工即皮相之髹采可鑒梔表蠟裏無益文苑有慚上𤣥今三四十年故家所藏舊市墨玩之如枯松枝略無容華磨之鬱勃起藍煙不深黒和汁餘升許都如止水毫端滑脱落紙清潤惜不多得羅文龍墨是豪游中哲匠金相玉質水煤盡屬上清髙華鮮令别作妙觀空青水碧木難珊瑚一笏之費價抵連域僕十五年前於都下得一挺署記為辛亥政與我生之辰相值此三十八年間閲幾家梅月幽香迺落余手彈之鏗鏗作金石聲色理闇然鑽之彌堅即煩博浪一擊不能驟碎然亦不欲研磨寳若軀命再三十餘年擬作河間壙中殉不復令從世代間磨人吾鄉孟大中丞好藏書墨一旦朝露便為里兒攘取殆盡聞有一挺為新安朱紫陽先生欵是趙宋時物不審作何色象計今不為邨舍女兒畫眉則為塾師小童塗鴉千年尤物類至失職何但中郎竈下桐焦見江南奉使大璫製進御數墨多龍文采翠表冒黄金塗中用珠粉金泥龍腦麝臍色奪朝曦芬溢九竅如内法醖濃郁饒舌然乏荷露清逺韵朝堂髙貴不比寒松居士墨亦宜然松江製墨挺作薄片多署龍香劑磨之質清起重嵐不甚深黒比之士品則逸民之儔有墨徳有墨才有墨韵太上重𤣥非石而堅入水不漬著手不汚徳也小而片研大而巨斗譬之飲河無不具足捺管可作蠅頭拓箒極于方丈利可截紙汁堪入木才也黒擬㸃漆翳若浮嵐澄乃秋水泛則天花水煤結其氤氲木石鬰其爛熳韻也合此三者致足為墨卿解嘲乃知隃麋䇿勛不減凌烟墨欲至實實則煙沈墨欲至虚虚則質清實實虚虚既沈復清是曰墨神松煤不膚光桐膏太骨露要之松煤則君子闇然桐膏乃文士符采研發墨猶之錐利木穴墨磨研猶之水滴石穿剛柔相制齒落舌存物亦爾爾墨月可以盡一笏筆半之硯可逮乎雲仍三者功力悉敵世間夀夭不必程能課勞當自賦質有差耳豨膏墨不知從何作始見今歙製墨銘云爾僕不深知墨法苐以臆測恐豨膏不能取汁清想以粙勝耳粙勝非墨所由得貴也鹿角作膠從來稱尚何渠不辦此乃辦豨膏抑亦宰夫多於捕鹿人耶言之可資嗢噱方于魯擅名歙州當以色澤規橅取勝磨之若糨有香氣無墨氣所署非煙寥天一殊謬不然左司馬公差愧太𤣥氏董狐余托年友巡江孫公侍御為製數墨云是受方氏方畧磨之糊筆不堪作字百計為墨原不可得貯之四年所卒無一當又從年友牛觀察得數挺愈不任側理用然獨新様可人不欲棄置因自失笑非真賞流于魯墨滿天下聞亦能走四裔想心手與世代低昻此猶末季烏衣中僑􅆄耶倘亦别有秘合獨為司馬公出一瓣香故司馬據實標目乎北士局曲井蛙不免為墨氏司馬氏揶揄程幼博燃漆成劑遂一時光價幾成墨妖余譙幼博墨劑乏香幼博譙余墨有墨香即蘓合贅焉矧夫龍腦余復謂幼博今日墨為政胡弗自後香並為政乎然香有至韻沈水栴檀非品也雕房綺閣非地也肥肉醇酒非主也傖邋遢非客也勞薪獸炭非僚也淪肌撲鼻非賞也狎湘而將身卧淚颸送微熏鬭荈而借合清魂煙凝弱縷或無見鄙於萬初爾幼博有意荀令君余將霑匄三日邵安與朱萬初帖曰深山髙居爐香不可缺退休之久嘉品乏絶野人為取老松柏之根株葉實共擣治之斫楓舫羼􅛱之每焚一丸亦足助香苦今年大雨時行土潤溽暑特甚萬初致石鼎清晝香高齋蕭閒遂為一日之借良可喜也萬初本墨妙又兼香癖蓋墨之與香同一闗紐亦猶書之與畫謎之與禪也有徴余書者㑹持一螺半挺以代鵞羣久之古墨盈筐彊效人製豹囊明光錦諸件别貯之一日有知我者當為立𤣥晏先生傳也羅小華舊合雖聲光奕奕尚不及今中駟不審何説王梅溪履厯丁自申王梅溪公以紹興二十七年進士及第時年四十有一二親俱早世馳書與弟而示其子聞詩聞禮以榮恩感慕之意其辭簡切而有餘思羅大經嘗採而載於鶴林玉露可考也公厯官最後以乾道三年知泉州次年賈夫人卒於郡舍年五十有五公長夫人二歲耳攜喪歸葬樂清故里祭文壙志叙有三十年夫婦之好出公手筆後三年而公亦卒汪玉山誌公墓南軒晦翁為之書丹題額皆一代偉人其言鑿鑿可信而無根之誣横為世俗所指㸃所謂無影而造形變白以為黑者公何不幸之甚哉今優人作劇每陳於縉紳大㑹間恬不為怪余謂公學本真儒仕為名宦而在吾邦尤沐此公循良牧守之化於今為烈有風教之責者宜為先賢痛闢邪説使不浸淫於世以愚人耳目可也間有雖知其誣而未詳公之履厯者余固不厭備書云山中雜言四條繆一鳳里中有頑童見羣鴈之集於江渚以為人之鵝浴於江也遂驅己之鵞而從其浴鴈見鵝至羣飛而起童不知其為鴈也羨人之鵞能飛而責巳之鵞不能欲盡殺之而别易其種其母聞而止之曰彼能飛者是鴈也非鵝也非人之所可畜也吾子欲責鵞而求其飛雖日易其種不可得矣噫世人責鵞之飛者何限其頑童之見歟啄木鳥嘴長而光曲棲止於古木之上以嘴啄木作聲羣蟲之隱於梢葉之僻者皆驚跂而動遂伺而㗖之蟲啗已盡復吐其舌於樹竅舌甚腥羣蟻聞之縁附而集於其舌遂從而餂之飽乃飛去後蟻猶不知為噬巳之物而復求之其迷於慕腥者如此噫人亦有以聲色勢利為舌者矣慕其腥而卒陷其軀於不覺者哀哉鄉民開畬種粟於深谷之原者粟將熟二人徃視之見狙猴引羣而啗其粟二人持竿驅逐羣猴見之略不為警二人乃析木為弓掛竹為矢作張射之狀猴少却而卒莫能驅也二人相與議曰可於常徃來處設機圈以繫之何如遂設機旦日徃偵果繋其一見羣猴環抱之為解其縛竟脫去二人歸而嘆曰吾之粟今無遺矣因述其故有一人曰爾之機設無法也盍覔勁長之竿植其根於險要之處繋其繩於末曲其梢而密其栝獲彼必矣二人如其言果又繋其一倒懸於竿之顛羣猴驚駭遂解而得之一人曰斃之而啗其肉以償予之粟以洩予憤可也一人曰一拳之肉不足以充吾二人之腹吾之所望於粟者甚多試生致而謀之挈至家尋以紅組衣其身而以緑組袖其手足索固而縫之次日樊至山俟羣猴之復來集者出而放之此猴見其羣追之惟恐不及彼猴訝其為異類避之惟恐不速一追一避旦夕皆踰萬山矣是歲粟獲以登人皆曰狙詐狙詐而不知人之詐有甚於狙也有樵者遇獵人於中逵獵人招樵者而語之曰吾逐獸至此獸窮而無所遁今在此峽中子盍助余獲之分其半與子樵者謝曰予朝饔而出妻績於廬粟蔵在罌蔬摘在筥待予薪以熟之予得薪而歸飽飱以息足矣外有所求不望也獵人曰子之得薪直不數文若從予得獸直不可以文數也子其何愚樵者曰爾今日得一獸明日復能得一獸耶獵人曰未知也樵者曰明日得獸若乃未知推而數日亦莫之知矣是圖僥倖於一得也而又有行險之虞不如吾樵日得一薪可以終嵗矣吾惟事吾事以不能從辭今觀樵者之言所見所守幾於智矣書之亦可以風乎時之務茍得者分諸子書目萬士和書籍天下公器也凡讀書好古者無不欲藏之於家以貽子孫期以通達古今此固勝於黄金滿籯者矣然昔人又云子孫未必能讀余謂不讀猶可若因而鬻以自利為蠧書魚則又甚矣吾邑舊有一士夫性喜聚書種種畧備此其子孫不肖悉貨於書傭之手每紙一斤得銀三四分固不計其板之今古紙之高下也如是則積書以貽之何為哉世人所謂能繼書香者亦指其能繼志述事云爾書云乎哉雖然後世子孫茍有好學求多聞者出則書之助聪明益智慮亦豈小補吾未見其可廢也余筮仕至今四十年初荆川唐先生者博物君子也其家之書無所不有先生無所不讀余從之遊竊怪浩漫無極汗牛而充棟也久而聽其言論時至夜分或舉經册典要或討三教異同或尚論古人徧及二十一史而上下其人物先生誦説如流余對之無以應也嘆曰此非韓愈氏所謂馬牛而襟裾者於是始有蓄書之志時初得一第家貧四壁蕭然無力可致嗣後宦遊四方力或可致矣然以増重行李恐累驛卒亦不敢多滯也萬厯乙亥冬由宗伯致仕家居檢㸃平生所積而編次之僅有一二千巻每部一套無有重複聚於一處足備查考散在各室則彼有此無此盈彼缺猝然取究其何便乎故余昔年葢一小樓悉貯其中遇有疑難則命諸子按號繙閱向來無異今年秋余年六旬有三神疲氣索髮短目耗業已捐書不用若不著落致使遺逸不無可惜故品搭前書分作五分令五子各管其一如遇有疑難查考某書在某房者即速送看看畢即還原所藏者無得閉錮看者無得狼籍如是則雖分猶合也嗟乎嗟乎後世為蠧魚為馬牛吾不能保其無然所戒在是為好學多聞為聪明智慮吾不敢必其有然所願在是雖然世固有胸藏萬巻自矜其博輕世傲物百行瓦解居鄉臨民為世大害者此所謂讀書不識字者也若然則吾願為蠧魚云耳為馬牛云耳為吾子孫者其尚求志事之所在而存之不忘庶幾書香其有托哉遺珠忘者來知德陳近夫以近日得忘病書此以與之唐人有病忘者朝之事則暮忘焉夜之事則日忘焉行其庭則忘宫室之美入其室則忘妻妾之顔色人或有忤則忘其人之姓名大家巨室則忘其人之崇髙富貴而不諂屈見貨財則忘其藏畜忘其遺於子孫處事則忘其軀體如疙如䫉淡如也以忘之故貧甚其妻求醫以療夫之病累不愈張說為相聞而憐之有記事珠玩弄於掌即能記事價萬金遣人遺之忘者曰忘固不可記猶不可吾鄉有能記者怜然而憽然而慧甫八嵗日能記萬言舉於鄉舉於朝官至獨坐能記書能記子史獨不能記其親記其君居家則有私財而忘其親居國則曠官職而忘其君日惟聲色宫室貨利是記余之忘不過忘其日用之常耳君親大者念念未㤀也以是而記不如不記之為愈還其珠於相公來子聞而嘆曰此忘者必隠者也無意必固我之私蓋聖人之徒也繼而來子又悟之曰惟其能忘所以不忘惟其不忘所以有忘忘之義大矣哉而今而後始知忘物忘我者而後不忘君親也忠臣孝子惟忘而已矣明文海巻四百七十九
